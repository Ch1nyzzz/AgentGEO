_AKLAN" title="BORACAY TRAVEL REQUIREMENTS FOR TOURISTS FROM MANILA OR OUTSIDE AKLAN"><span data-dcnode-id="3877" instrument_node="">BORACAY TRAVEL REQUIREMENTS FOR TOURISTS FROM MANILA OR OUTSIDE AKLAN</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3872"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="3873" href="#BORACAY_TRAVEL_REQUIREMENTS_FOR_TOURISTS_RESIDING_IN_AKLAN" title="BORACAY TRAVEL REQUIREMENTS FOR TOURISTS RESIDING IN AKLAN:"><span data-dcnode-id="3874" instrument_node="">BORACAY TRAVEL REQUIREMENTS FOR TOURISTS RESIDING IN AKLAN:</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3854"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="3868" href="#HOW_TO_GET_TO_BORACAY" title="HOW TO GET TO BORACAY"><span data-dcnode-id="3869" instrument_node="">HOW TO GET TO BORACAY</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="3855"><li class="ez-toc-heading-level-3" data-dcnode-id="3865"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="3866" href="#MANILA_TO_BORACAYCEBU_TO_BORACAYDAVAO_TO_BORACAY" title="MANILA TO BORACAY/CEBU TO BORACAY/DAVAO TO BORACAY"><span data-dcnode-id="3867" instrument_node="">MANILA TO BORACAY/CEBU TO BORACAY/DAVAO TO BORACAY</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3862"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="3863" href="#KALIBO_TO_BORACAY" title="KALIBO TO BORACAY"><span data-dcnode-id="3864" instrument_node="">KALIBO TO BORACAY</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3859"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="3860" href="#ROXAS_TO_BORACAY" title="ROXAS TO BORACAY"><span data-dcnode-id="3861" instrument_node="">ROXAS TO BORACAY</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3856"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="3857" href="#ILOILO_TO_BORACAY" title="ILOILO TO BORACAY"><span data-dcnode-id="3858" instrument_node="">ILOILO TO BORACAY</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3851"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="3852" href="#WHERE_TO_STAY_IN_BORACAY" title="WHERE TO STAY IN BORACAY"><span data-dcnode-id="3853" instrument_node="">WHERE TO STAY IN BORACAY</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3814"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="3849" href="#BORACAY_THINGS_TO_DO" title="BORACAY THINGS TO DO"><span data-dcnode-id="3850" instrument_node="">BORACAY THINGS TO DO</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="3815"><li class="ez-toc-heading-level-3" data-dcnode-id="3846"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="3847" href="#1Swim_at_Boracay_White_Beach" title="1.Swim at Boracay White Beach"><span data-dcnode-id="3848" instrument_node="">1.Swim at Boracay White Beach</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3843"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="3844" href="#2Boracay_Island_Hopping" title="2.Boracay Island Hopping"><span data-dcnode-id="3845" instrument_node="">2.Boracay Island Hopping</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3840"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="3841" href="#3Boracay_Land_Tour" title="3.Boracay Land Tour"><span data-dcnode-id="3842" instrument_node="">3.Boracay Land Tour</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3837"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="3838" href="#4Try_Boracay_Water_Sports" title="4.Try Boracay Water Sports"><span data-dcnode-id="3839" instrument_node="">4.Try Boracay Water Sports</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3834"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="3835" href="#5Boracay_Fruit_Shake" title="5.Boracay Fruit Shake"><span data-dcnode-id="3836" instrument_node="">5.Boracay Fruit Shake</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3831"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="3832" href="#6Boracay_Food_Trip" title="6.Boracay Food Trip"><span data-dcnode-id="3833" instrument_node="">6.Boracay Food Trip</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3828"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="3829" href="#RELATED_BLOG_PIG_OUT_BISTRO_REVIEW" title="RELATED BLOG: PIG OUT BISTRO REVIEW"><span data-dcnode-id="3830" instrument_node="">RELATED BLOG: PIG OUT BISTRO REVIEW</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3825"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="3826" href="#7Boracay_Sunset_Watching" title="7.Boracay Sunset Watching"><span data-dcnode-id="3827" instrument_node="">7.Boracay Sunset Watching</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3822"><a class="ez-toc-link ez-toc-heading-26" data-dcnode-id="3823" href="#8Boracay_Pub_Crawl" title="8.Boracay Pub Crawl"><span data-dcnode-id="3824" instrument_node="">8.Boracay Pub Crawl</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3819"><a class="ez-toc-link ez-toc-heading-27" data-dcnode-id="3820" href="#9Buy_Boracay_Souvenirs" title="9.Buy Boracay Souvenirs"><span data-dcnode-id="3821" instrument_node="">9.Buy Boracay Souvenirs</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3816"><a class="ez-toc-link ez-toc-heading-28" data-dcnode-id="3817" href="#_10_Boracay_Side_Trip" title="&nbsp;10. Boracay Side Trip"><span data-dcnode-id="3818" instrument_node="">&nbsp;10. Boracay Side Trip</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3811"><a class="ez-toc-link ez-toc-heading-29" data-dcnode-id="3812" href="#BORACAY_ITINERARY_BUDGET" title="BORACAY ITINERARY + BUDGET"><span data-dcnode-id="3813" instrument_node="">BORACAY ITINERARY + BUDGET</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3808"><a class="ez-toc-link ez-toc-heading-30" data-dcnode-id="3809" href="#BORACAY_TRAVEL_TIPS_AND_REMINDERS" title="BORACAY TRAVEL TIPS AND REMINDERS"><span data-dcnode-id="3810" instrument_node="">BORACAY TRAVEL TIPS AND REMINDERS</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3792"><a class="ez-toc-link ez-toc-heading-31" data-dcnode-id="3806" href="#RELATED_TRAVEL_BLOGS" title="RELATED TRAVEL BLOGS:"><span data-dcnode-id="3807" instrument_node="">RELATED TRAVEL BLOGS:</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="3793"><li class="ez-toc-heading-level-3" data-dcnode-id="3803"><a class="ez-toc-link ez-toc-heading-32" data-dcnode-id="3804" href="#GUIMARAS_TRAVEL_GUIDE" title="GUIMARAS TRAVEL GUIDE"><span data-dcnode-id="3805" instrument_node="">GUIMARAS TRAVEL GUIDE</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3800"><a class="ez-toc-link ez-toc-heading-33" data-dcnode-id="3801" href="#CAPIZ_THINGS_TO_DO" title="CAPIZ THINGS TO DO"><span data-dcnode-id="3802" instrument_node="">CAPIZ THINGS TO DO</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3797"><a class="ez-toc-link ez-toc-heading-34" data-dcnode-id="3798" href="#ILOILO_ITINERARY" title="ILOILO ITINERARY"><span data-dcnode-id="3799" instrument_node="">ILOILO ITINERARY</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="3794"><a class="ez-toc-link ez-toc-heading-35" data-dcnode-id="3795" href="#ANTIQUE_TRAVEL_BLOG" title="ANTIQUE TRAVEL BLOG"><span data-dcnode-id="3796" instrument_node="">ANTIQUE TRAVEL BLOG</span></a></li></ul></li></ul></nav></div><h2 data-dcnode-id="3782"><span class="ez-toc-section" data-dcnode-id="3788" id="BORACAY_PRE-TRAVEL_GUIDE"></span><span data-dcnode-id="3784" style="color: #000000;"><strong data-dcnode-id="3785"><u data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">BORACAY PRE-TRAVEL GUIDE</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3783"></span></h2><hr data-dcnode-id="3781"><ul data-dcnode-id="3772"><li data-dcnode-id="3773"><h3 data-dcnode-id="3774"><span class="ez-toc-section" data-dcnode-id="3780" id="ABOUT_BORACAY"></span><span data-dcnode-id="3776" style="color: #000000;"><strong data-dcnode-id="3777"><u data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">ABOUT BORACAY</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3775"></span></h3></li></ul><p data-dcnode-id="3770" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3771" instrument_node="">The influx of tourists in Boracay started sometime in 1970’s, when the it was used as filming locations of the US movies Nam’s Angels and Too Late Hero.&nbsp; After that, in 1978, German Writer Jens Peter mentioned Boracay as paradise on Earth in his book about the Philippines. Since then, foreign backpackers started to travel to Boracay and it quickly became a budget beach destination. Back in the days, Boracay is just one of the unfamiliar places in the province of Aklan, in the Philippines inhabited by the Ati and Tumandok, the indigenous people of Panay Island who thrive on coconut farming, fishing, and goat raising.</span></p><p data-dcnode-id="3768" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3769" instrument_node="">Sadly, as Boracay quickly became one of the world’s best beach destination and developed as a prime tourist destination, the Ati and Tumandok people, the original inhabitants of the island, were displaced on a mere 2.1 hectare walled community. Dexter Condez, the spokesperson of the Boracay Ati Tribal Organization (BATO) was gunned down, and the suspect is a security guard of a popular hotel chain. BATO, accused the management of the hotel and 2 other nearby resorts as allegedly interested in the lot occupied by the Ati people. The hotel strongly denied any involvement in the murder.</span></p><p data-dcnode-id="3766" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3767" instrument_node="">It is unfortunate that despite being the original residents of Boracay, the Ati and Tumandok people seem to have lost their rights and place in the island. Over the years, only a few of them work in hotels and restaurants around Boracay, when they should be the first ones benefitting from the influx of tourists there. I have visited other ASEAN countries, and I’ve seen how proud they are of their culture. They found a way to somehow preserve, integrate, and showcase their local culture and the way of life of the indigenous people to help educate visitors. Hopefully, in the near future, tourism in Boracay can create better economic opportunities for the Ati and Tumandok, after all, the island is originally their ancestral territory.</span></p><hr data-dcnode-id="3765"><ul data-dcnode-id="3756"><li data-dcnode-id="3757"><h3 data-dcnode-id="3758"><span class="ez-toc-section" data-dcnode-id="3764" id="WHEN_IS_THE_BEST_TIME_TO_VISIT_BORACAY"></span><span data-dcnode-id="3760" style="color: #000000;"><strong data-dcnode-id="3761"><u data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">WHEN IS THE BEST TIME TO VISIT BORACAY?</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3759"></span></h3></li></ul><p data-dcnode-id="3754"><img alt="BORACAY ITINERARY: OFF-PEAK SEASON IN BORACAY" class="aligncenter" data-dcnode-id="3755" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318192567_5968e83717_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="3752" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3753" instrument_node="">Boracay is a tropical beach destination, its peak season is around late March to May, the summer months in the Philippines. But take note that since it is the peak season, expect the prices of flights and hotels to skyrocket. Also, there are lots of tourists during the summer.&nbsp; If you want to travel with less tourist, best time to visit Boracay is around January to early March, before the peak season.&nbsp; August to November is low season, due to the rainy season and typhoons in the Philippines, but prices can be pretty low during this season, so if you want to save on flights and hotels, you can try visiting Boracay at your own risk during this season. Best to check the weather updates before your trip though.</span></p><div class="code-block code-block-9" data-dcnode-id="3746" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="3751" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-9926496706747222" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="9445416236" data-dcnode-id="3750" style="display:block; text-align:center;"></ins><span data-dcnode-id="3749" instrument_node=""> </span></div><hr data-dcnode-id="3745"><ul data-dcnode-id="3736"><li data-dcnode-id="3737"><h3 data-dcnode-id="3738"><span class="ez-toc-section" data-dcnode-id="3744" id="BORACAY_WI-FI"></span><span data-dcnode-id="3740" style="color: #000000;"><strong data-dcnode-id="3741"><u data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">BORACAY WI-FI</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3739"></span></h3></li></ul><p data-dcnode-id="3734" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3735" instrument_node="">While most accommodations, cafes, and restaurants in Boracay offer free internet, having your own pocket Wi-Fi is still recommended. You can connect securely online when you have your own Wi-Fi and you can stay connected online even outside the confines of your resort or hotel.</span></p><h5 data-dcnode-id="3725" style="padding-left: 40px;"><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/16618-4g-wifi-asia/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3727" style="color: #ff0000;"><strong data-dcnode-id="3728"><span data-dcnode-id="3732" style="color: #000000;"><span data-dcnode-id="3733" instrument_node="">PHILIPPINES POCKET WI-FI:</span></span><span data-dcnode-id="3731" instrument_node=""> </span><u data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">RENT HERE</span></u></strong></span></a></h5><hr data-dcnode-id="3724"><ul data-dcnode-id="3715"><li data-dcnode-id="3716"><h3 data-dcnode-id="3717"><span class="ez-toc-section" data-dcnode-id="3723" id="BORACAY_ATM"></span><span data-dcnode-id="3719" style="color: #000000;"><strong data-dcnode-id="3720"><u data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">BORACAY ATM</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3718"></span></h3></li></ul><p data-dcnode-id="3713" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3714" instrument_node="">There are a handful of ATMs in Boracay (BDO, BPI, and Metrobank) and money exchange centers. Best to stack up on cash when in the island because almost everything is on a cash basis. Some establishments and hotels accept major credit cards.</span></p><div class="code-block code-block-5" data-dcnode-id="3704" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="3712" instrument_node=""> </span><span data-dcnode-id="3710" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-9926496706747222" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="9445416236" data-dcnode-id="3709" style="display:block; text-align:center;"></ins><span data-dcnode-id="3708" instrument_node=""> </span><span data-dcnode-id="3705" instrument_node=""> </span></div><hr data-dcnode-id="3703"><ul data-dcnode-id="3694"><li data-dcnode-id="3695"><h3 data-dcnode-id="3696"><span class="ez-toc-section" data-dcnode-id="3702" id="BORACAY_DRONE"></span><span data-dcnode-id="3698" style="color: #000000;"><strong data-dcnode-id="3699"><u data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">BORACAY DRONE</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3697"></span></h3></li></ul><p data-dcnode-id="3692" style="padding-left: 40px;"><span data-dcnode-id="3693" instrument_node="">Is drone allowed in Boracay? Yes, but only if you have a permit. You need to secure a permit at the Municipal Mayor’s Office to fly your drone in Boracay. Here’s how:</span></p><p data-dcnode-id="3687" style="padding-left: 40px;"><span data-dcnode-id="3691" instrument_node="">1.Make your way to the Municipal Mayor’s Office near Station 1. It is located near Our Lady of Most Holy Rosary Church, just above MSWD’s office. Head to the 3</span><sup data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">rd</span></sup><span data-dcnode-id="3688" instrument_node=""> floor. Inform the staff that you want to get a permit for drone flying.</span></p><p data-dcnode-id="3685" style="padding-left: 40px;"><span data-dcnode-id="3686" instrument_node="">2.Fill out the form.</span></p><p data-dcnode-id="3683" style="padding-left: 40px;"><span data-dcnode-id="3684" instrument_node="">3.Pay the fees at the cashier. Registration fee is ₱500 ($10), Special Permit ₱1000 ($21), Certification Fee ₱100 ($2).</span></p><p data-dcnode-id="3681" style="padding-left: 40px;"><span data-dcnode-id="3682" instrument_node="">4.Get your drone permit, make copies if needed, but keep the original copy. You may need to give your hotel a copy.</span></p><p data-dcnode-id="3677" style="padding-left: 40px;"><strong data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">IMPORTANT:</span></strong><span data-dcnode-id="3678" instrument_node=""> If you’re flying the drone for COMMERCIAL PURPOSES or flying a drone that weighs 7kg or more, a CAAP license is REQUIRED. For personal use, CAAP license is not required, only the Mayor’s Permit to fly your drone.</span></p><p data-dcnode-id="3675" style="padding-left: 40px;"><span data-dcnode-id="3676" instrument_node="">Always bring your drone permit when flying your drone.</span></p><p data-dcnode-id="3673" style="padding-left: 40px;"><span data-dcnode-id="3674" instrument_node="">Enforcers may approach you when you fly your drone, politely show them your permit. But they may still try to stop you even if you have a permit if you are flying the drone in crowded areas. For safety, fly the drone in less populated areas.</span></p><hr data-dcnode-id="3672"><ul data-dcnode-id="3663"><li data-dcnode-id="3664"><h3 data-dcnode-id="3665"><span class="ez-toc-section" data-dcnode-id="3671" id="BORACAY_SAFETY"></span><span data-dcnode-id="3667" style="color: #000000;"><strong data-dcnode-id="3668"><u data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">BORACAY SAFETY: </span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3666"></span></h3></li></ul><p data-dcnode-id="3661" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3662" instrument_node="">Is it safe to travel to Boracay? Yes, of course. Boracay is a tourist-friendly place and has been receiving tourists from around the world since time immemorial.&nbsp; Locals here are easy going and pretty friendly.&nbsp; But you have to understand that lately, due to the pandemic, which led to unemployment and closure of many businesses around the island, many locals are desperate to earn a living, so, please forgive some touts if they can be quite persistent to sell you tours or souvenirs. Thing is, Boracay is heavily dependent on tourism, that’s why the suffered a major blow when Covid-19 struck the world in 2020, because of the travel restrictions imposed by many countries. But overall, Boracay is still a great and safe destination to visit and enjoy, if you are looking to travel soon. It is also safe for solo female travelers, but I’d still recommend visiting in groups since it’s a beach destination that you’d cherish more if you are with your loved one, family, friends, or colleagues.</span></p><p data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">&nbsp;</span></p><div class="code-block code-block-8" data-dcnode-id="3650" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="3658" instrument_node=""> </span><span data-dcnode-id="3656" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-9926496706747222" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="9445416236" data-dcnode-id="3655" style="display:block; text-align:center;"></ins><span data-dcnode-id="3654" instrument_node=""> </span><span data-dcnode-id="3651" instrument_node=""> </span></div><hr data-dcnode-id="3649"><h2 data-dcnode-id="3642"><span class="ez-toc-section" data-dcnode-id="3648" id="2022_BORACAY_TRAVEL_REQUIREMENTS"></span><span data-dcnode-id="3644" style="color: #000000;"><strong data-dcnode-id="3645"><u data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">2022 BORACAY TRAVEL REQUIREMENTS:</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3643"></span></h2><hr data-dcnode-id="3641"><p data-dcnode-id="3639"><img alt="boracay travel requirements" class="aligncenter" data-dcnode-id="3640" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317343173_224ae9c287_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="3636"><h3 data-dcnode-id="3631"><span class="ez-toc-section" data-dcnode-id="3635" id="BORACAY_TRAVEL_REQUIREMENTS_FOR_TOURISTS_FROM_MANILA_OR_OUTSIDE_AKLAN"></span><strong data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">BORACAY TRAVEL REQUIREMENTS FOR TOURISTS FROM MANILA OR OUTSIDE AKLAN</span></strong><span class="ez-toc-section-end" data-dcnode-id="3632"></span></h3><hr data-dcnode-id="3630"><p data-dcnode-id="3621" style="text-align: justify;"><span data-dcnode-id="3629" instrument_node="">Due to the recent rise in Covid-19 cases in Boracay, </span><span data-dcnode-id="3623" style="color: #000000;"><strong data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">only travelers from GCQ and&nbsp; MGCQ (Modified General Community Quarantine)</span></strong><span data-dcnode-id="3626" instrument_node=""> </span><strong data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">areas can travel to Boracay</span></strong></span><span data-dcnode-id="3622" instrument_node="">, provided, they meet the 2022 Boracay travel requirements (effective February 10, 2022)&nbsp; listed below.</span></p><p data-dcnode-id="3614"><strong data-dcnode-id="3616"><em data-dcnode-id="3617"><u data-dcnode-id="3618"><span data-dcnode-id="3619" style="color: #000000;"><span data-dcnode-id="3620" instrument_node="">1. GOVERNMENT-ISSUED ID. </span></span></u></em></strong><span data-dcnode-id="3615" instrument_node="">All tourists must present a valid government-issued ID such as passport, driver’s license, etc. For foreigners, OF, and OFW, you must present your passport.</span></p><p data-dcnode-id="3608"><strong data-dcnode-id="3609"><em data-dcnode-id="3610"><u data-dcnode-id="3611"><span data-dcnode-id="3612" style="color: #000000;"><span data-dcnode-id="3613" instrument_node="">2. PROOF OF VACCINATION STATUS.&nbsp;</span></span></u></em></strong></p><ul data-dcnode-id="3550"><li data-dcnode-id="3589"><strong data-dcnode-id="3603"><em data-dcnode-id="3604"><u data-dcnode-id="3605"><span data-dcnode-id="3606" style="color: #000000;"><span data-dcnode-id="3607" instrument_node=""> For Fully Vaccinated Tourists. </span></span></u></em></strong><span data-dcnode-id="3602" instrument_node="">Must present any of the following:</span><ul data-dcnode-id="3590"><li data-dcnode-id="3595"><span data-dcnode-id="3601" instrument_node="">VaxCertPH Covid-19 Vaccination Certificate with full vaccination status from </span><strong data-dcnode-id="3596"><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vaxcert.doh.gov.ph/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3598" style="color: #ff0000;"><u data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">vaxcert.doh.gov.ph</span></u></span></a></strong></li><li data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Locally-issued Vaccination Card/ID with full vaccination status and with verifiable QR Code or, with contact details of the vaccination center; or,</span></li><li data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">World Health Organization International Certificates of Vaccination and Prophylaxis/Vaccination Card of Vaccination Certificate issue Abroad.</span></li></ul></li><li data-dcnode-id="3551"><strong data-dcnode-id="3580"><em data-dcnode-id="3585"><u data-dcnode-id="3586"><span data-dcnode-id="3587" style="color: #000000;"><span data-dcnode-id="3588" instrument_node="">For Unvaccinated or Partially Vaccinated Tourists.</span></span></u></em><em data-dcnode-id="3581"><u data-dcnode-id="3582"><span data-dcnode-id="3583" style="color: #000000;"><span data-dcnode-id="3584" instrument_node="">&nbsp;</span></span></u></em></strong><ul data-dcnode-id="3552"><li data-dcnode-id="3562"><span data-dcnode-id="3575" style="color: #000000;"><strong data-dcnode-id="3576"><em data-dcnode-id="3577"><u data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Negative RT-PCR Test Result</span></u></em></strong></span><strong data-dcnode-id="3571"><span data-dcnode-id="3573" style="color: #000000;"><span data-dcnode-id="3574" instrument_node="">:</span></span><span data-dcnode-id="3572" instrument_node="">&nbsp; </span></strong><span data-dcnode-id="3570" instrument_node="">Must present a negative RT-PCR Test Result (saliva, nasopharengeal or oropharengeal) for Covid-19 that must be taken within 72 hours before your trip to Boracay. Click </span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hfsrb.doh.gov.ph/%3Fpage_id%3D1729" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3569" instrument_node=""> </span><span data-dcnode-id="3565" style="color: #ff0000;"><strong data-dcnode-id="3566"><u data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">HERE</span></u></strong></span></a><span data-dcnode-id="3563" instrument_node="">, for a list of accredited COVID-19 testing centers in the Philippines.</span></li><li data-dcnode-id="3553"><strong data-dcnode-id="3554"><span data-dcnode-id="3560" style="color: #000000;"><span data-dcnode-id="3561" instrument_node="">RT-PCR TEST:</span></span><span data-dcnode-id="3559" instrument_node=""> </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/activity/57592-covid-rt-pcr-manila-healthtek/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3556" style="color: #ff0000;"><u data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">BOOK HERE</span></u></span></a></strong></li></ul></li></ul><ul data-dcnode-id="3534"><li data-dcnode-id="3535"><strong data-dcnode-id="3545"><em data-dcnode-id="3546"><u data-dcnode-id="3547"><span data-dcnode-id="3548" style="color: #000000;"><span data-dcnode-id="3549" instrument_node="">For Tourists Below 12 years old</span></span></u></em></strong><ul data-dcnode-id="3536"><li data-dcnode-id="3537"><span data-dcnode-id="3544" instrument_node="">Must accomplish the Certificate of Undertaking Traveling with Minors template </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aklan.gov.ph/travel-details-template/certificate-of-undertaking-traveling-with-minors/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3540" style="color: #ff0000;"><strong data-dcnode-id="3541"><u data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">HERE</span></u></strong></span></a><span data-dcnode-id="3538" instrument_node="">. Travelers aged 2 years old and below are not required to undergo RT-PCR Test.</span></li></ul></li></ul><p data-dcnode-id="3525"><span data-dcnode-id="3527" style="color: #000000;"><strong data-dcnode-id="3530"><em data-dcnode-id="3531"><u data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">3. ACCREDITED BORACAY HOTEL BOOKINGS</span></u></em></strong><strong data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">: </span></strong></span><span data-dcnode-id="3526" instrument_node="">All tourists in Boracay who intend to stay on the island overnight are required to show confirmed hotel bookings from accredited Boracay Hotels. You can check out the list of some Boracay hotels accredited by DOT below, under “Where to Stay in Boracay”.</span></p><p data-dcnode-id="3521" style="padding-left: 40px;"><strong data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">IMPORTANT: </span></strong><span data-dcnode-id="3522" instrument_node="">Room sharing is only allowed for couples or family members who share the same household. All guests will be required to present a government or company ID with the guest’s residential address. Your hotel may impose other guidelines, so, for further inquiries, ask your hotel.</span></p><p data-dcnode-id="3508"><span data-dcnode-id="3515" style="color: #000000;"><em data-dcnode-id="3517"><strong data-dcnode-id="3518"><u data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">&nbsp;4.CONFIRMED ROUNDTRIP FLIGHT/TRAVEL TICKET.</span></u></strong></em><span data-dcnode-id="3516" instrument_node=""> </span></span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepinaysolobackpacker.bookaway.com/s/philippines/manila-to-caticlan-panay-island%3Foffer_id%3D34%26aff_id%3D1814" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3514" instrument_node=""> </span><span data-dcnode-id="3510" style="color: #ff0000;"><strong data-dcnode-id="3511"><u data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">SEARCH FLIGHT HERE</span></u></strong></span></a></p><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">&nbsp;</span></p><p data-dcnode-id="3493"><strong data-dcnode-id="3501"><span data-dcnode-id="3503" style="color: #000000;"><u data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">5. BORACAY TOURIST QR CODE.</span></u></span><span data-dcnode-id="3502" instrument_node="">&nbsp; </span></strong><span data-dcnode-id="3500" instrument_node="">&nbsp;</span><strong data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">All required documents must be verified first before you are allowed to travel to Boracay</span></strong><span data-dcnode-id="3497" instrument_node="">. You will be given a Tourist</span><strong data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node=""> QR Code, which is a mandatory pre-boarding requirements on airports/seaports. NO QR Code, NO Acceptance. Always have a copy of the QR Code with you, digital or printed copy. </span></strong><span data-dcnode-id="3494" instrument_node="">This is due to some incidents of tourists faking travel documents before, and some of them actually tested positive to Covid-19, endangering the locals and other tourists in Boracay. Here’s what you need to do:</span></p><div class="code-block code-block-11" data-dcnode-id="3486" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="3492" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-9926496706747222" data-ad-slot="8548519191" data-dcnode-id="3491" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="3490" instrument_node=""> </span><span data-dcnode-id="3487" instrument_node=""> </span></div><p data-dcnode-id="3467" style="text-align: left;"><span data-dcnode-id="3485" instrument_node="">All tourists entering Boracay must register at </span><strong data-dcnode-id="3480"><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.touristboracay.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3482" style="color: #ff0000;"><u data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">touristboracay.com </span></u></span></a></strong><span data-dcnode-id="3479" instrument_node="">and submit/e-mail all the Boracay travel requirements above to </span><span data-dcnode-id="3478" instrument_node="">touristboracay@gmail.com</span><span data-dcnode-id="3477" instrument_node=""> prior to your visit to Boracay.&nbsp; You are allowed to e-mail and apply for a QR Code </span><strong data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">3 days prior to your arrival date.&nbsp; &nbsp;</span></strong><span data-dcnode-id="3474" instrument_node="">Subject of email should be: </span><strong data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">OHDC</span></strong><span data-dcnode-id="3471" instrument_node=""> – </span><strong data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Family Name, First Name</span></strong><span data-dcnode-id="3468" instrument_node=""> (your family name and first name). Attach the following documents in the e-mail:</span></p><p data-dcnode-id="3464"><strong data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Health Declaration Card (HDC)</span></strong></p><p data-dcnode-id="3461"><strong data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Proof of Vaccination Status/Vaccination Card or Copy of RT-PCR Negative Result (taken within 72 hours before date of travel)</span></strong></p><p data-dcnode-id="3458"><strong data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">&nbsp;Copy of Hotel Booking confirmation (Should be accredited hotels in Boracay)</span></strong></p><p data-dcnode-id="3455"><strong data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">&nbsp;Proof of Identification (Valid Government-issued ID) with Philippine Residency</span></strong></p><p data-dcnode-id="3452"><strong data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">&nbsp;Roundtrip flight tickets</span></strong></p><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">&nbsp;</span></p><p data-dcnode-id="3445" style="padding-left: 80px;"><strong data-dcnode-id="3447"><em data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">NOTE</span></em></strong><span data-dcnode-id="3446" instrument_node="">: If traveling with family, friends or with a group, you can submit all your documents in one e-mail. Just include the names of each individual including children and infants.&nbsp; You must submit the documents 3 days before your flight/travel to Boracay. For faster processing, you are encouraged to get your RT-PCR Test with laboratories that include a QR Code in their result certificates. Send only valid documents as falsification is punishable by law.</span></p><p data-dcnode-id="3441" style="padding-left: 80px;"><strong data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">IMPORTANT:</span></strong><span data-dcnode-id="3442" instrument_node=""> If you have not received a response within 24 hours after submitting the required documents above, please send another follow up e-mail or contact</span></p><p data-dcnode-id="3438"><strong data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Travel Info Aklan Assistance Center</span></strong></p><p data-dcnode-id="3427"><strong data-dcnode-id="3428"><em data-dcnode-id="3429"><span data-dcnode-id="3437" instrument_node="">Smart: 0939 878 0715</span><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node=""> Globe: 0975 580 9013</span><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node=""> Email:&nbsp; </span><span data-dcnode-id="3432" instrument_node="">travelinfo@aklan.gov.ph</span><span data-dcnode-id="3431" instrument_node=""> or </span><span data-dcnode-id="3430" instrument_node="">touristboaracay@gmail.com</span></em></strong></p><p data-dcnode-id="3424" style="padding-left: 80px;"><strong data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Once your application is approved, you should get an e-mail with a copy of Health Declaration Card (HDC) with Boracay tourist QR code.&nbsp; The QR Code is a mandatory pre-boarding requirements on airports/seaports. NO QR Code, NO Acceptance. Always bring a copy of the QR Code with you, digital&nbsp; (QR Code saved on your phone) or printed copy.&nbsp;</span></strong></p><p data-dcnode-id="3421" style="padding-left: 80px;"><strong data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">NOTE:</span></strong></p><p data-dcnode-id="3415" style="padding-left: 80px;"><span data-dcnode-id="3420" instrument_node="">The Boracay Tourist QR Code expires in 12 hours from the checkout time. If the individual is going to extend their stay in Boracay, s/he must send an e-mail of a new booking slip showing the extension to </span><span data-dcnode-id="3419" instrument_node="">touristboracay@gmail.com</span><span data-dcnode-id="3418" instrument_node=""> before the original check out time</span><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">&nbsp;</span></strong></p><p data-dcnode-id="3408" style="padding-left: 80px;"><strong data-dcnode-id="3410"><em data-dcnode-id="3412"><u data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Observe health protocols</span></u></em><span data-dcnode-id="3411" instrument_node="">: </span></strong><span data-dcnode-id="3409" instrument_node="">You must wear face mask at all times (except when dining, drinking, or when inside your hotel room), regularly wash your hands, and observe social distancing while in Boracay. Children aged below 2 years old are exempted from the above rules, but kids aged 2-8 years old must use face mask under adult supervision.</span></p><p data-dcnode-id="3404" style="padding-left: 40px;"><strong data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">IMPORTANT:</span></strong><span data-dcnode-id="3405" instrument_node="">&nbsp; Stay updated about the latest government, hotel, and airline regulations before traveling. Local government units may also have additional travel requirements. For further information, contact the following numbers:</span></p><ul data-dcnode-id="3398"><li data-dcnode-id="3399" style="list-style-type: none;"><ul data-dcnode-id="3400"><li data-dcnode-id="3401"><strong data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Municipality of Malay</span></strong></li></ul></li></ul><p data-dcnode-id="3396" style="padding-left: 80px;"><span data-dcnode-id="3397" instrument_node="">(036) 288 8775</span></p><ul data-dcnode-id="3390"><li data-dcnode-id="3391" style="list-style-type: none;"><ul data-dcnode-id="3392"><li data-dcnode-id="3393"><strong data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Malay Municipal Tourism Office</span></strong></li></ul></li></ul><p data-dcnode-id="3388" style="padding-left: 80px;"><span data-dcnode-id="3389" instrument_node="">(036) 288 2493</span></p><ul data-dcnode-id="3382"><li data-dcnode-id="3383" style="list-style-type: none;"><ul data-dcnode-id="3384"><li data-dcnode-id="3385"><strong data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Civil Aviation Authority of the Philippines (CAAP)</span></strong></li></ul></li></ul><p data-dcnode-id="3380" style="padding-left: 80px;"><span data-dcnode-id="3381" instrument_node="">(02) 7944 2031</span></p><p data-dcnode-id="3378" style="padding-left: 80px;"><span data-dcnode-id="3379" instrument_node="">(02) 7944 2030</span></p><ul data-dcnode-id="3372"><li data-dcnode-id="3373" style="list-style-type: none;"><ul data-dcnode-id="3374"><li data-dcnode-id="3375"><strong data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">NDRRMC</span></strong></li></ul></li></ul><p data-dcnode-id="3370" style="padding-left: 80px;"><span data-dcnode-id="3371" instrument_node="">(02)8912 5668</span></p><p data-dcnode-id="3368" style="padding-left: 80px;"><span data-dcnode-id="3369" instrument_node="">(02)8911 1873</span></p><p data-dcnode-id="3366" style="padding-left: 80px;"><span data-dcnode-id="3367" instrument_node="">(02) 8911 1406</span></p><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="3363"><h3 data-dcnode-id="3358"><span class="ez-toc-section" data-dcnode-id="3362" id="BORACAY_TRAVEL_REQUIREMENTS_FOR_TOURISTS_RESIDING_IN_AKLAN"></span><strong data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">BORACAY TRAVEL REQUIREMENTS FOR TOURISTS RESIDING IN AKLAN:</span></strong><span class="ez-toc-section-end" data-dcnode-id="3359"></span></h3><hr data-dcnode-id="3357"><p data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">If you are a tourist residing in Aklan, here are the Boracay Travel requirements for 2022:</span></p><ul data-dcnode-id="3305"><li data-dcnode-id="3335"><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Boracay QR Code.</span></strong><span data-dcnode-id="3352" instrument_node=""> Register at </span><span data-dcnode-id="3348" style="color: #ff0000;"><strong data-dcnode-id="3349"><u data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">touristboracay.com </span></u></strong></span><span data-dcnode-id="3347" instrument_node="">and e-mail the Boracay travel requirements below at </span><span data-dcnode-id="3346" instrument_node="">touristboracay@gmail.com.</span><span data-dcnode-id="3345" instrument_node=""> You are allowed to e-mail and apply for a QR Code </span><strong data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">3 days prior to your arrival date.&nbsp; &nbsp;</span></strong><span data-dcnode-id="3342" instrument_node="">Subject of email should be: </span><strong data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">OHDC</span></strong><span data-dcnode-id="3339" instrument_node=""> – </span><strong data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Family Name, First Name</span></strong><span data-dcnode-id="3336" instrument_node=""> (your family name and first name).</span></li><li data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Attach the following Boracay travel requirements/documents in the e-mail:</span></li><li data-dcnode-id="3329"><strong data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Vaccination Certificate.&nbsp;</span></strong><span data-dcnode-id="3330" instrument_node="">You must present your locally-issued vaccination certificate or vaccination certificate from VaxCertPH.</span></li><li data-dcnode-id="3325"><strong data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Valid ID.</span></strong><span data-dcnode-id="3326" instrument_node=""> Present a valid ID. Passport is required for Foreigners, OF, and OFW.</span></li><li data-dcnode-id="3316"><strong data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Confirmed hotel booking.</span></strong><span data-dcnode-id="3322" instrument_node=""> Remember to stay only in LGU-registered accommodations. In absence of booking, please use the Certificate of Undertaking for Accommodation template </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aklan.gov.ph/travel-details-template/certificate-of-undertaking-accommodation/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3318" style="color: #ff0000;"><strong data-dcnode-id="3319"><u data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">HERE </span></u></strong></span></a></li><li data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">If using private vehicle, take a photo of the vehicle plate.</span></li><li data-dcnode-id="3306"><span data-dcnode-id="3313" instrument_node="">If using public transportation, use the Certificate of Undertaking for Travel Details in </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aklan.gov.ph/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3309" style="color: #ff0000;"><strong data-dcnode-id="3310"><u data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">aklan.gov.ph </span></u></strong></span></a><span data-dcnode-id="3307" instrument_node="">under Tourism –&gt; Travel Details Template.</span></li></ul><hr data-dcnode-id="3304"><h2 data-dcnode-id="3297"><span class="ez-toc-section" data-dcnode-id="3303" id="HOW_TO_GET_TO_BORACAY"></span><span data-dcnode-id="3299" style="color: #000000;"><strong data-dcnode-id="3300"><u data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">HOW TO GET TO BORACAY</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3298"></span></h2><hr data-dcnode-id="3296"><p data-dcnode-id="3294"><img alt="BORACAY TRAVEL GUIDE: How to Get to Boracay" class="aligncenter" data-dcnode-id="3295" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317343528_ceea00e04e_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="3292" style="text-align: justify;"><span data-dcnode-id="3293" instrument_node="">Though you can reach Boracay by flying to Kalibo (Aklan), Roxas (Capiz), or Iloilo, because of Covid-19, Caticlan Airport (Godofredo Ramos Airport) is the only airport that accepts tourists traveling to Boracay because the IATF has implemented a one-entry-one exit policy for easier monitoring of tourists.</span></p><hr data-dcnode-id="3291"><h3 data-dcnode-id="3285" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="3290" id="MANILA_TO_BORACAYCEBU_TO_BORACAYDAVAO_TO_BORACAY"></span><span data-dcnode-id="3287" style="color: #000000;"><strong data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">MANILA TO BORACAY/CEBU TO BORACAY/DAVAO TO BORACAY</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="3286"></span></h3><p data-dcnode-id="3281" style="padding-left: 40px;"><strong data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="3282" instrument_node="">If you want a hassle-free trip from Caticlan Airport to your hotel, you can book a Boracay Airport transfer.</span></p><h5 data-dcnode-id="3274" style="padding-left: 40px;"><strong data-dcnode-id="3275"><span data-dcnode-id="3280" instrument_node="">Caticlan Airport to Boracay (Shuttle Van) : </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepinaysolobackpacker.bookaway.com/s/philippines/caticlan-panay-island-to-boracay-island%3Ffromstation%3Dcaticlan-airport-godofredo-p-ramos-airport-mph%26departuredate%26passengers%3Foffer_id%3D34%26aff_id%3D1814"><span data-dcnode-id="3277" style="color: #ff0000;"><u data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">RESERVE HERE</span></u></span></a></strong></h5><h5 data-dcnode-id="3264" style="padding-left: 40px;"><strong data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Caticlan Airport to Boracay (and vice versa):</span></strong><span data-dcnode-id="3271" instrument_node=""> </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/20025-godofredo-ramos-airport-shared-transfers-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3270" instrument_node=""> </span><span data-dcnode-id="3266" style="color: #ff0000;"><strong data-dcnode-id="3267"><u data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">BOOK HERE</span></u></strong></span></a></h5><p data-dcnode-id="3262" style="padding-left: 40px;"><span data-dcnode-id="3263" instrument_node="">But if you want a DIY Tour of Boracay (Do-It-Yourself), here’s how:</span></p><ol data-dcnode-id="3225"><li data-dcnode-id="3226" style="list-style-type: none;"><ol data-dcnode-id="3227"><li data-dcnode-id="3258"><strong data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">From Manila (1.25 hours), Cebu (1.5 hours), or Davao (6+ hours, via Manila or Cebu) you can fly to Caticlan Airport. </span></strong><span data-dcnode-id="3259" instrument_node="">Several airlines offer flights to and from Caticlan. Terminal fee is PHP 200 ($4), but that’s usually already included in your flight tickets.</span></li><li data-dcnode-id="3254"><strong data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">At Caticlan Airport, take a tricycle to Caticlan Jetty Port. </span></strong><span data-dcnode-id="3255" instrument_node="">Fare is about ₱150 ($3) per tricycle, good for 2-3 passengers. Travel time is approximately 10 minutes.</span></li><li data-dcnode-id="3250"><strong data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Find the Registration Booth at Caticlan Jetty Port and register</span></strong><span data-dcnode-id="3251" instrument_node="">.</span></li><li data-dcnode-id="3246"><strong data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Proceed to the Verification Area and present the Boracay requirements:</span></strong><span data-dcnode-id="3247" instrument_node=""> the QR Code for the Health Declaration Card (HDC), the negative RT-PCR Test Result taken within 48 hours before your trip, and your confirmed hotel bookings.</span></li><li data-dcnode-id="3242"><strong data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Pay the Boracay fees (boat fee, environmental, and terminal fee). </span></strong><span data-dcnode-id="3243" instrument_node="">There are 2 types of boats to get to and from Boracay:&nbsp; the cheaper boat costs ₱25 ($0.52) per person one-way, whereas the fast craft costs ₱100 ($2) per person one-way. Meanwhile, the Boracay environmental fee is ₱75 ($1.55) and the terminal fee is ₱100 ($2).</span></li><li data-dcnode-id="3239"><strong data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Enter the Caticlan Jetty Port Building and clear security check.</span></strong></li><li data-dcnode-id="3236"><strong data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Proceed to the Passenger Waiting Area. Wait for your boarding.</span></strong></li><li data-dcnode-id="3232"><strong data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Board your boat.</span></strong><span data-dcnode-id="3233" instrument_node=""> Make sure to follow security protocols while on board. Travel time is approximately 15 minutes.</span></li><li data-dcnode-id="3228"><strong data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Upon arrival at Boracay Port, ride a tricycle to your hotel.</span></strong><span data-dcnode-id="3229" instrument_node=""> Chartered tricycle fare is roughly ₱100 ($2). Or if you’ve booked hotel pick-up through your hotel, look for your hotel shuttle.</span></li></ol></li></ol><p data-dcnode-id="3221" style="padding-left: 40px;"><strong data-dcnode-id="3222"><u data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">IMPORTANT:</span></u></strong></p><p data-dcnode-id="3219" style="padding-left: 40px;"><span data-dcnode-id="3220" instrument_node="">Caticlan Jetty Port first trip starts at 5:00 AM and there’s one trip approximately every 15 minutes until 10:00 PM, daily.</span></p><p data-dcnode-id="3217" style="padding-left: 40px;"><span data-dcnode-id="3218" instrument_node="">On your return to Caticlan from Boracay, you need to pay the same fees at Cagban Port in Boracay – Environmental fee ₱75 ($1.55), Terminal fee ₱100 ($2), and boat fee ₱25 ($0.52) or ₱100 ($2) for fast craft.</span></p><hr data-dcnode-id="3216"><h3 data-dcnode-id="3211" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="3215" id="KALIBO_TO_BORACAY"></span><strong data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">KALIBO TO BORACAY</span></strong><span class="ez-toc-section-end" data-dcnode-id="3212"></span></h3><ol data-dcnode-id="3202"><li data-dcnode-id="3203" style="list-style-type: none;"><ol data-dcnode-id="3204"><li data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">1.From Manila, you can also fly to Kalibo to get to Boracay. However, due to Covid-19, the IATF has implemented a one-entry-one exit policy for easier monitoring of tourists. Currently, only returning residents and OFWs are allowed to fly to Kalibo as of last year.</span></li><li data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">.From Kalibo Airport, take a shuttle to Caticlan Jetty Port. Travel time is roughly 1 hour. Fare is about ₱500 ($10).</span></li><li data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Follow Step 3-9 above</span></li></ol></li></ol><ul data-dcnode-id="3188"><li data-dcnode-id="3189" style="list-style-type: none;"><ul data-dcnode-id="3190"><li data-dcnode-id="3191"><h5 data-dcnode-id="3192"><strong data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">KALIBO TO BORACAY BUS + FERRY</span></strong><span data-dcnode-id="3199" instrument_node="">: </span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepinaysolobackpacker.bookaway.com/s/philippines/kalibo-panay-island-to-boracay-island%3Foffer_id%3D34%26aff_id%3D1814" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3198" instrument_node=""> </span><span data-dcnode-id="3194" style="color: #ff0000;"><strong data-dcnode-id="3195"><u data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">RESERVE HERE</span></u></strong></span></a></h5></li></ul></li></ul><p data-dcnode-id="3186" style="padding-left: 80px;"><span data-dcnode-id="3187" instrument_node="">Alternatively, you can also take the local yellow Ceres Bus to Caticlan Bus terminal. Then from Caticlan Terminal, take a tricycle to Caticlan Jetty Port.&nbsp; Bus fare is roughly ₱120 ($2.47).</span></p><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="3183"><h3 data-dcnode-id="3177" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="3182" id="ROXAS_TO_BORACAY"></span><span data-dcnode-id="3179" style="color: #000000;"><strong data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">ROXAS TO BORACAY</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="3178"></span></h3><p data-dcnode-id="3175" style="padding-left: 40px;"><span data-dcnode-id="3176" instrument_node="">If coming from Roxas, Capiz, here’s how to get to Boracay:</span></p><p data-dcnode-id="3173" style="padding-left: 40px;"><span data-dcnode-id="3174" instrument_node="">1.Take a shuttle bound for Kalibo. Fare is roughly ₱100 $2) to ₱150 ($3) per person.</span></p><p data-dcnode-id="3171" style="padding-left: 40px;"><span data-dcnode-id="3172" instrument_node="">2.Then once you’re in Kalibo, take a shuttle to Caticlan Jetty Port. Travel time is roughly 1 hour. Fare is about ₱500 ($10).</span></p><p data-dcnode-id="3169" style="padding-left: 40px;"><span data-dcnode-id="3170" instrument_node="">3.Follow Steps 3-9 above.</span></p><hr data-dcnode-id="3168"><h3 data-dcnode-id="3162" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="3167" id="ILOILO_TO_BORACAY"></span><span data-dcnode-id="3164" style="color: #000000;"><strong data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">ILOILO TO BORACAY</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="3163"></span></h3><p data-dcnode-id="3160" style="padding-left: 40px;"><span data-dcnode-id="3161" instrument_node="">If coming from Iloilo City, you may travel to Boracay by public transport. Here’s how:</span></p><p data-dcnode-id="3158" style="padding-left: 40px;"><span data-dcnode-id="3159" instrument_node="">1.Make your way to Ceres Bus Terminal in Tagbak, Jaro, District, Iloilo.</span></p><p data-dcnode-id="3156" style="padding-left: 40px;"><span data-dcnode-id="3157" instrument_node="">2.Board a Ceres bus bound for Caticlan, Aklan. Fare is roughly ₱327 ($7) for aircon-bus and travel time is roughly 5 hours.</span></p><p data-dcnode-id="3154" style="padding-left: 40px;"><span data-dcnode-id="3155" instrument_node="">3.At Ceres Bus Terminal in Caticlan, take a tricycle to Caticlan Jetty Port, fare is roughly ₱150 ($3) per tricycle, good for 2-3 passengers. Travel time is approximately 10 minutes.</span></p><p data-dcnode-id="3152" style="padding-left: 40px;"><span data-dcnode-id="3153" instrument_node="">4.Follow Steps 3-9 above.</span></p><ul data-dcnode-id="3140"><li data-dcnode-id="3141"><h5 data-dcnode-id="3142"><strong data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">ILOILO TO CATICLAN VAN :</span></strong><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepinaysolobackpacker.bookaway.com/s/philippines/iloilo-panay-island-to-caticlan-panay-island%3Foffer_id%3D34%26aff_id%3D1814" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3149" instrument_node=""> </span><span data-dcnode-id="3144" style="color: #ff0000;"><span data-dcnode-id="3148" instrument_node=""> </span><strong data-dcnode-id="3145"><u data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">RESERVE HERE</span></u></strong></span></a></h5></li></ul><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="3137"><h2 data-dcnode-id="3130"><span class="ez-toc-section" data-dcnode-id="3136" id="WHERE_TO_STAY_IN_BORACAY"></span><span data-dcnode-id="3132" style="color: #000000;"><strong data-dcnode-id="3133"><u data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">WHERE TO STAY IN BORACAY</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="3131"></span></h2><hr data-dcnode-id="3129"><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">&nbsp;</span></p><p data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">During my multiple visits in Boracay, I stayed at different hotels in different areas. One is located in Station 3, another in Diniwid Beach, and there’s also one in Station 2.&nbsp; The most convenient&nbsp; is the one at Station 2 of course, but I also liked my stay at Diniwid Beach it is quiet and the sunset was really great. Meanwhile, what I like about my hotel at Station 3 is, it’s inexpensive.&nbsp; But my personal favorite is the one hidden in Bulabog Beach – Ferra Hotel and Garden Suites because it is spotless and has excellent customer service.&nbsp; You can read my full review through the blog link below.</span></p><ul data-dcnode-id="3107"><li data-dcnode-id="3122"><strong data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Ferra Hotel and Garden Suites</span></strong></li><li data-dcnode-id="3120"><span data-dcnode- f the top accredited hotels in Boracay according to online users.</span></p><h4 data-dcnode-id="3089" style="padding-left: 40px;"><span data-dcnode-id="3090" style="color: #000000;"><strong data-dcnode-id="3091"><u data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">1.Boracay Station 1&nbsp;</span></u></strong></span></h4><p data-dcnode-id="3087" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="3088" instrument_node="">White Beach in Boracay is divided into 3 stations, Station 1, Station 2, and Station 3.&nbsp; Boracay Station 1 is often considered as the best place to stay in the island because of its more quiet and relaxing location compared to its neighbors. It’s the area where Willy’s Rock is located and has the finest, white shore in the island. Many of the luxury resorts in Boracay is concentrated in this area, accommodations here are pricey.</span></p><p data-dcnode-id="3085" style="padding-left: 40px;"><span data-dcnode-id="3086" instrument_node="">Here’s some of the top-rated hotels and resorts in Boracay Station 1:</span></p><h5 data-dcnode-id="3081" style="padding-left: 80px;"><span data-dcnode-id="3082" style="color: #000000;"><strong data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Budget:</span></strong></span></h5><ul data-dcnode-id="3055"><li data-dcnode-id="3056" style="list-style-type: none;"><ul data-dcnode-id="3057"><li data-dcnode-id="3058" style="list-style-type: none;"><ul data-dcnode-id="3059"><li data-dcnode-id="3077"><span data-dcnode-id="3078" style="color: #000000;"><strong data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Boracay Backpackers</span></strong></span></li><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Location: Boracay Station 1</span></li><li data-dcnode-id="3060"><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agoda.com/partners/partnersearch.aspx%3Fpcs%3D1%26cid%3
