/strong></span></p><ul data-dcnode-id="2406"><li data-dcnode-id="2407" style="list-style-type: none;"><ul data-dcnode-id="2408"><li data-dcnode-id="2409" style="list-style-type: none;"><ul data-dcnode-id="2410"><li data-dcnode-id="2427"><strong data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Niu Ohana East Bay Apartment</span></strong></li><li data-dcnode-id="2423"><strong data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Location:</span></strong><span data-dcnode-id="2424" instrument_node=""> Bulabog Beach</span></li><li data-dcnode-id="2411"><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agoda.com/partners/partnersearch.aspx%3Fpcs%3D1%26cid%3D1602301%26hid%3D271380" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2419" style="color: #ff0000;"><strong data-dcnode-id="2420"><u data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">RESERVE HERE</span></u></strong></span></a><span data-dcnode-id="2417" instrument_node=""> or </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/ph/niu-ohana-east-bay-apartment.en.html%3Faid%3D1191859%26no_rooms%3D1%26group_adults%3D2" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2413" style="color: #ff0000;"><strong data-dcnode-id="2414"><u data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">BOOK HERE</span></u></strong></span></a></li></ul></li></ul></li></ul><h4 data-dcnode-id="2405"></h4><hr data-dcnode-id="2404"><h2 data-dcnode-id="2398" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="2403" id="BORACAY_THINGS_TO_DO"></span><span data-dcnode-id="2400" style="color: #000000;"><strong data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">BORACAY THINGS TO DO</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2399"></span></h2><hr data-dcnode-id="2397"><p data-dcnode-id="2395" style="text-align: justify;"><span data-dcnode-id="2396" instrument_node="">You’ll never really run out of things to do in Boracay. Here’s some of the top activities in the island.</span></p><h4 data-dcnode-id="2388"><span data-dcnode-id="2389" style="color: #000000;"><strong data-dcnode-id="2390"><span data-dcnode-id="2394" instrument_node="">RELATED BLOG:&nbsp; </span><span data-dcnode-id="2391" style="color: #ff0000;"><u data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">TOP BORACAY TOURIST SPOTS</span></u></span></strong></span></h4><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="2381" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2385" id="1Swim_at_Boracay_White_Beach"></span><strong data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">1.Swim at Boracay White Beach</span></strong><span class="ez-toc-section-end" data-dcnode-id="2382"></span></h3><p data-dcnode-id="2379" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="2380" instrument_node="">Mention Boracay and the image of White Beach with Willy’s Rock immediately comes to mind. &nbsp;This jaw-dropping beach has powdery white shore lapped by a beautiful blend of blue and mint water. Tourists from all over the world are drawn to White Beach, which is now dotted with hotels, restaurants, cafes, bars, and souvenir shops. It is usually pretty busy during the summer months. White Beach deserves its fame, it boasts of the finest sand and definitely one of the best beaches I’ve visited in the Philippines. Even its seafloor has powdery sand, which makes it ideal for swimming.</span></p><p data-dcnode-id="2377"><img alt="BORACAY TRAVEL GUIDE: BOARACAY WHITE BEACH" class="aligncenter" data-dcnode-id="2378" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318192747_73be02d375_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="2375" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="2376" instrument_node="">White Beach is divided into 3 Stations: Station 1, Station 2, and Station 3.&nbsp; Station 1 and 2 has finer sand compared to Station 3, and it is where most mid-ranged and luxury hotels are located.&nbsp; That’s where you can find the posted boy of Boracay – Willy’s Rock.&nbsp; Meanwhile. Station 3 is where most budget hotels are concentrated and is pretty popular to backpackers in Boracay.</span></p><p data-dcnode-id="2371" style="text-align: justify; padding-left: 40px;"><strong data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">How to get to White Beach: </span></strong><span data-dcnode-id="2372" instrument_node="">Take a tricycle to D’Mall.&nbsp; From there, you can walk to Boracay White Beach Station 1, Station 2, and Station 3.</span></p><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="2363" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2368" id="2Boracay_Island_Hopping"></span><span data-dcnode-id="2365" style="color: #000000;"><strong data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">2.Boracay Island Hopping</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2364"></span></h3><p data-dcnode-id="2361"><img alt="BORACAY ISLAND HOPPING" class="aligncenter" data-dcnode-id="2362" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317344033_82a1f9df78_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="2359" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="2360" instrument_node="">If you still can’t get enough of Boracay, there are many beaches and isles sprinkled around this tiny island. &nbsp;And the best way to get there is by hiring an outrigger boat or joining a Boracay Island Hopping Tour. &nbsp;Island hopping boats can Boracay can accommodate 25 to 45 persons, depending on its size. You can join a Boracay Island Hopping Tour that typically costs ₱1,000 ($20) to ₱1,500 ($31) per person depending on the agency.&nbsp; The group tour usually includes buffet lunch and roundtrip transfer to your hotel, entrance fee is typically excluded, you may have to pay separately. &nbsp;The Boracay Island Hopping Tour usually includes a visit to:</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="2342"><li data-dcnode-id="2343" style="list-style-type: none;"><ul data-dcnode-id="2344"><li data-dcnode-id="2353"><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Puka Beach</span></strong><span data-dcnode-id="2354" instrument_node=""> – Free entrance</span></li><li data-dcnode-id="2349"><strong data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Crocodile Island</span></strong><span data-dcnode-id="2350" instrument_node=""> – ₱20 ($0.41) entrance fee</span></li><li data-dcnode-id="2345"><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Crystal Cove</span></strong><span data-dcnode-id="2346" instrument_node=""> – ₱300 ($6) entrance fee</span></li></ul></li></ul><h5 data-dcnode-id="2333" style="padding-left: 40px;"><strong data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Boracay Island Hopping Tour:</span></strong><span data-dcnode-id="2339" instrument_node=""> </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/1025-island-hopping-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2335" style="color: #ff0000;"><strong data-dcnode-id="2336"><u data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">DISCOUNTED HERE</span></u></strong></span></a></h5><p data-dcnode-id="2329" style="text-align: justify; padding-left: 40px;"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Important:</span></strong><span data-dcnode-id="2330" instrument_node=""> Always verify the meet-up point with the travel agency, especially if your hotel is NOT located around White Beach. Because usually the meet-up point is at D’Mall, which may be far from Yapak area or Diniwid Beach.</span></p><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="2321" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2326" id="3Boracay_Land_Tour"></span><span data-dcnode-id="2323" style="color: #000000;"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">3.Boracay Land Tour</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2322"></span></h3><p data-dcnode-id="2317" style="padding-left: 40px;"><strong data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2318" instrument_node="">If you want to explore other far more peaceful Boracay beaches without taking a boat, you can do so by hiring a tricycle for ₱500 ($10), good for 2-3 persons.&nbsp; Alternatively, you can also rent an ATV for ₱800 ($17) – ₱1,000 ($21) per unit, good for 2 pax, and visit Mt. Luho Viewpoint. I took a tricycle tour during my last trip to Boracay and I enjoyed it, especially the view of Boracay from Mt. Luho Viewpoint.&nbsp; The farther beaches of Boracay are undeniably more tranquil and still retains the appearance of a fishing village.</span></p><div class="wp-caption aligncenter" data-dcnode-id="2313" style="width: 810px"><img alt="boracay travel guide: Puka Beach" data-dcnode-id="2316" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317343938_0df8f149e1_c.jpg&amp;raw" width="800"><p class="wp-caption-text" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Puka Beach</span></p></div><div class="mceTemp" data-dcnode-id="2312"></div><p data-dcnode-id="2310" style="padding-left: 40px;"><span data-dcnode-id="2311" instrument_node="">Here’s the usual list of Boracay tourist attractions included in the land tour:</span></p><ul data-dcnode-id="2277"><li data-dcnode-id="2278" style="list-style-type: none;"><ul data-dcnode-id="2279"><li data-dcnode-id="2280" style="list-style-type: none;"><ul data-dcnode-id="2281"><li data-dcnode-id="2305"><strong data-dcnode-id="2307"><em data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Puka Beach</span></em></strong><span data-dcnode-id="2306" instrument_node=""> – free</span></li><li data-dcnode-id="2297"><strong data-dcnode-id="2302"><em data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node=""> Luho Viewpoint</span></em></strong><span data-dcnode-id="2301" instrument_node=""> – </span><strong data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">₱</span></strong><span data-dcnode-id="2298" instrument_node="">150 ($3) entrance fee</span></li><li data-dcnode-id="2292"><strong data-dcnode-id="2294"><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Ilig-Iligan Beach</span></em></strong><span data-dcnode-id="2293" instrument_node=""> – free</span></li><li data-dcnode-id="2287"><strong data-dcnode-id="2289"><em data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Bulabog Beach</span></em></strong><span data-dcnode-id="2288" instrument_node=""> – free</span></li><li data-dcnode-id="2282"><strong data-dcnode-id="2284"><em data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Diniwid Beach</span></em></strong><span data-dcnode-id="2283" instrument_node=""> – free</span></li></ul></li></ul></li></ul><div class="wp-caption aligncenter" data-dcnode-id="2273" style="width: 810px"><img alt="boracay itinerary: Boracay Land Tour" data-dcnode-id="2276" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318193347_b3871bf94b_c.jpg&amp;raw" width="800"><p class="wp-caption-text" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Ilig-Iligan Beach</span></p></div><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="2264"><li data-dcnode-id="2265" style="list-style-type: none;"><ul data-dcnode-id="2266"><li data-dcnode-id="2267" style="text-align: justify;"><span data-dcnode-id="2268" style="color: #000000;"><strong data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Boracay Tricycle Tour</span></strong></span></li></ul></li></ul><p data-dcnode-id="2262" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="2263" instrument_node="">Usually ₱500 ($10) for a chartered tricycle, good for 2-3 persons. Just walk up and talk to a tricycle driver in Boracay. Discuss first the places you want to visit, the duration of the tour, the rate (per tricycle), and how many persons can the vehicle accommodate (pre-Covid19, it’s usually 2-3 pax).&nbsp; Make sure you agree with the price and duration of the tour before hopping inside the vehicle for the Boracay Land tour.</span></p><ul data-dcnode-id="2251"><li data-dcnode-id="2252" style="list-style-type: none;"><ul data-dcnode-id="2253"><li data-dcnode-id="2254"><strong data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Boracay ATV Tour: </span></strong><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/8535-ATV-experience-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2256" style="color: #ff0000;"><strong data-dcnode-id="2257"><u data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">BOOK HERE</span></u></strong></span></a></li></ul></li></ul><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">&nbsp;</span></p><div class="wp-caption aligncenter" data-dcnode-id="2245" style="width: 810px"><img alt="boracay itinerary: Boracay ATV Tour" data-dcnode-id="2248" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318193127_72fd48a189_c.jpg&amp;raw" width="800"><p class="wp-caption-text" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Boracay ATV Tour</span></p></div><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="2237" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2242" id="4Try_Boracay_Water_Sports"></span><span data-dcnode-id="2239" style="color: #000000;"><strong data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">4.Try Boracay Water Sports</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2238"></span></h3><p data-dcnode-id="2235" style="padding-left: 40px;"><span data-dcnode-id="2236" instrument_node="">Boracay is a highly commercialized beach destination, it is crowded and crammed with water sports for adventure seekers. Here’s some of the water sports you might want to experience while in Boracay:</span></p><p data-dcnode-id="2233"><img alt="BORACAY ITINERARY: KAYAKING IN BORACAY" data-dcnode-id="2234" height="502" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318009906_d990711d6e_c.jpg&amp;raw" width="800"></p><ul data-dcnode-id="2151"><li data-dcnode-id="2152" style="list-style-type: none;"><ul data-dcnode-id="2153"><li data-dcnode-id="2154" style="list-style-type: none;"><ul data-dcnode-id="2155"><li data-dcnode-id="2225"><h5 data-dcnode-id="2226"><strong data-dcnode-id="2227"><span data-dcnode-id="2232" instrument_node="">Boracay Helmet Diving: </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/7943-helmet-dive-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2229" style="color: #ff0000;"><u data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">DISCOUNTED HERE</span></u></span></a></strong></h5></li><li data-dcnode-id="2217"><h5 data-dcnode-id="2218"><strong data-dcnode-id="2219"><span data-dcnode-id="2224" instrument_node="">Boracay Parasailing: </span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/1027-parasailing-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2221" style="color: #ff0000;"><u data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">BOOK HERE</span></u></span></a></strong></h5></li><li data-dcnode-id="2209"><h5 data-dcnode-id="2210"><strong data-dcnode-id="2211"><span data-dcnode-id="2216" instrument_node="">Banana Boat Ride: </span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/9282-banana-boat-ride-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2213" style="color: #ff0000;"><u data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">BOOK HERE</span></u></span></a></strong></h5></li><li data-dcnode-id="2201"><h5 data-dcnode-id="2202"><strong data-dcnode-id="2203"><span data-dcnode-id="2208" instrument_node="">Boracay Fly Fish: </span><span data-dcnode-id="2204" style="color: #ff0000;"><u data-dcnode-id="2205"><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-US/activity/1059-flyfish-ride-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2207" instrument_node="">BOOK HERE</span></a></u></span></strong></h5></li><li data-dcnode-id="2192"><h5 data-dcnode-id="2193"><span data-dcnode-id="2194" style="color: #000000;"><strong data-dcnode-id="2195"><span data-dcnode-id="2200" instrument_node="">Boracay UFO and Hurricane Activity: </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/9277-ufo-activity-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2197" style="color: #ff0000;"><u data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">RESERVE HERE</span></u></span></a></strong></span></h5></li><li data-dcnode-id="2182"><h5 data-dcnode-id="2183"><span data-dcnode-id="2184" style="color: #000000;"><strong data-dcnode-id="2185"><span data-dcnode-id="2191" instrument_node="">Boracay Jetski:</span><a data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/7946-jet-ski-experience-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2187" style="color: #ff0000;"><span data-dcnode-id="2190" instrument_node=""> </span><u data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">BOOK HERE</span></u></span></a></strong></span></h5></li><li data-dcnode-id="2174"><h5 data-dcnode-id="2175"><strong data-dcnode-id="2176"><span data-dcnode-id="2181" instrument_node="">Boracay Mermaid Swimming:</span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/3580-mermaid-swimming-introduction-course-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2178" style="color: #ff0000;"><u data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node=""> BOOK HERE</span></u></span></a></strong></h5></li><li data-dcnode-id="2166"><h5 data-dcnode-id="2167"><strong data-dcnode-id="2168"><span data-dcnode-id="2173" instrument_node="">Boracay Mermaid Photoshoot Only: </span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/3581-mermaid-photoshoot-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2170" style="color: #ff0000;"><u data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">RESERVE HERE</span></u></span></a></strong></h5></li><li data-dcnode-id="2156"><h5 data-dcnode-id="2157"><strong data-dcnode-id="2158"><span data-dcnode-id="2164" style="color: #000000;"><span data-dcnode-id="2165" instrument_node="">Boracay Scuba Diving:</span></span><span data-dcnode-id="2163" instrument_node=""> </span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/3809-discover-scuba-diving-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2160" style="color: #ff0000;"><u data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">BOOK HERE</span></u></span></a></strong></h5></li></ul></li></ul></li></ul><h5 data-dcnode-id="2150"></h5><h3 data-dcnode-id="2144" style="text-align: justify; padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2149" id="5Boracay_Fruit_Shake"></span><span data-dcnode-id="2146" style="color: #000000;"><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">5.Boracay Fruit Shake</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2145"></span></h3><p data-dcnode-id="2142" style="padding-left: 40px;"><span data-dcnode-id="2143" instrument_node="">Boracay is well-known for its delicious fruit shake, and Jony’s Fruitshake is the original in the island, founded in 1982.&nbsp; I was lucky enough to meet the amiable owner of Jony’s Fruitshake – Mr. Dionisio “Jony” Salme, who also owns Maya’s Restaurant, Pig Out Bistro, Jony’s Resort, and Jony’s Boutique Hotel. Jony’s Fruitshake is also served at Maya’s Restaurant and Pig Out Bistro.</span></p><p data-dcnode-id="2140"><img alt="Boracay itinerary: Jony's Fruitshake" class="aligncenter" data-dcnode-id="2141" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318010276_e9d909769f_z.jpg&amp;raw" width="400"></p><p data-dcnode-id="2138" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="2139" instrument_node="">Mang Jony is the long-time President of Boracay Business Foundation Incorporated (BFI), an organization of business owners in Boracay. He told me how he arrived in Boracay, back in March 2, 1972, when there was no electricity yet in the island. Back then, Boracay is still virtually empty, occupied mostly by Ati and Tumandok indigenous people, and a few foreign backpackers who visit the island occasionally. Mang Jony, who is originally from Pontevedra, Negros Occidental, worked for the Elizalde Group of Companies. But due to the land grabbing issues during the Marcos era, he was assigned to Boracay by his boss to manage the properties of Elizalde Family like the age-old D’Mall and a local radio station. Since there was no electricity yet, they use a generator. Jony’s Fruitshake started when an Austrian Dutch Backpacker who visited Boracay had a blender with him and sold him the blender when he went back to his country.&nbsp; Apparently, the young guy got tired because there was no place to charge his blender.&nbsp; Since they have a generator, Mang Jony eventually bought it, but said it was pretty expensive to maintain it since they had to travel all the way to Kalibo, which takes a whole day, just to buy gasoline for the generator to run the blender, to buy ice, and to buy fruits. Fortunately, a co-worker gifted him a refrigerator powered by kerosene where he made ice.&nbsp; Soon enough, foreign tourists started lining up for his fruit shakes. He then added Mexican food to his menu, like tacos and burritos, since that’s what the foreigners like back then. He set up umbrellas and tables along White Beach, and the rest is history.&nbsp; Today, you can get Jony’s Fruitshake beside Maya’s Restaurant and at Pig Out Bistro.</span></p><p data-dcnode-id="2135"><strong data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">&nbsp;</span></strong></p><h3 data-dcnode-id="2129" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="2134" id="6Boracay_Food_Trip"></span><span data-dcnode-id="2131" style="color: #000000;"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">6.Boracay Food Trip</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="2130"></span></h3><p data-dcnode-id="2127" style="padding-left: 40px;"><span data-dcnode-id="2128" instrument_node="">Boracay may not be the best place in the Philippines to go on a food trip, but it sure has a handful of relaxed restaurants and cozy cafés that serve both unfussy and creative dishes. Also, take note that because of Covid-19, many restaurants, cafes, and bars have closed. Here’s some of my personal favorites:</span></p><p data-dcnode-id="2125"><img alt="boracay travel guide: Pig Out Bistro" class="aligncenter" data-dcnode-id="2126" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318193577_ae5185dea4_c.jpg&amp;raw" width="800"></p><ul data-dcnode-id="2114"><li data-dcnode-id="2115" style="list-style-type: none;"><ul data-dcnode-id="2116"><li data-dcnode-id="2117"><h4 data-dcnode-id="2118"><span data-dcnode-id="2119" style="color: #000000;"><strong data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="2120"><u data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Pig Out Bistro</span></u></strong></span></h4></li></ul></li></ul><p data-dcnode-id="2107" style="padding-left: 80px;"><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2111" instrument_node="">If you are wondering what Boracay looked like before the arrival of tourists, a huge mural painting inspired by one of the remaining old photos of Boracay taken by Dieter Schrottmann can be seen on the wall of the Pig Out Bistro in Boracay. But aside from the painting, what draws tourists to this tiny café is its ingenious food. Take for example the fresh oysters from Aklan, like the Oyster Mignonette, which, as its name suggests is garnished with mignonette sauce to balance out the brininess of the oyster. My favorite is the Green Oyster relished with herbed compound butter. And there’s also Oyster and Pearl, savored with egg roe, cucumber, and dill. If you’re in a group, try the seafood platter composed of grilled prawns, octopus, and </span><em data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">gindara</span></em><span data-dcnode-id="2108" instrument_node="">, oyster mignonette, baked oyster, steamed clams, and garlic steamed clams.</span></p><p data-dcnode-id="2106"></p><div class="code-block code-block-2" data-dcnode-id="2097" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2105" instrument_node=""> </span><span data-dcnode-id="2103" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-9926496706747222" data-ad-slot="8548519191" data-dcnode-id="2102" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="2101" instrument_node=""> </span><span data-dcnode-id="2098" instrument_node=""> </span></div><span data-dcnode-id="2096" instrument_node=""> </span><img alt="boracay food" class="aligncenter" data-dcnode-id="2095" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/51109064068_aac1fa5b40_c.jpg&amp;raw" width="800"><p data-dcnode-id="2094"></p><h3 data-dcnode-id="2083"><span class="ez-toc-section" data-dcnode-id="2093" id="RELATED_BLOG_PIG_OUT_BISTRO_REVIEW"></span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">RELATED BLOG:</span></strong><span data-dcnode-id="2090" instrument_node=""> </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.happyphilippines.org/the-pig-out-bistro-boracay/" rel="noopener" target="_blank"><span data-dcnode-id="2086" style="color: #ff0000;"><strong data-dcnode-id="2087"><u data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">PIG OUT BISTRO REVIEW</span></u></strong></span></a><span class="ez-toc-section-end" data-dcnode-id="2084"></span></h3><ul data-dcnode-id="2055"><li data-dcnode-id="2056" style="list-style-type: none;"><ul data-dcnode-id="2057"><li data-dcnode-id="2058" style="list-style-type: none;"><ul data-dcnode-id="2059"><li data-dcnode-id="2080"><strong data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">The Pig Out Bistro Boracay</span></strong></li><li data-dcnode-id="2075"><strong data-dcnode-id="2077"><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Address:</span></em></strong><span data-dcnode-id="2076" instrument_node=""> Brgy.Balabag Boracay, Aklan</span></li><li data-dcnode-id="2070"><strong data-dcnode-id="2072"><em data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Open Hours:</span></em></strong><span data-dcnode-id="2071" instrument_node=""> Daily 7:00 AM – 10:00 PM (last order at 9:30 PM)</span></li><li data-dcnode-id="2065"><strong data-dcnode-id="2067"><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Facebook:</span></em></strong><span data-dcnode-id="2066" instrument_node=""> @pigoutbistro</span></li><li data-dcnode-id="2060"><strong data-dcnode-id="2062"><em data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Instagram: </span></em></strong><span data-dcnode-id="2061" instrument_node="">@thepigoutbistro</span></li></ul></li></ul></li></ul><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="2044"><li data-dcnode-id="2045" style="list-style-type: none;"><ul data-dcnode-id="2046"><li data-dcnode-id="2047"><h4 data-dcnode-id="2048"><span data-dcnode-id="2049" style="color: #000000;"><strong data-dcnode-id="2050"><u data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Maya’s Restaurant</span></u></strong></span></h4></li></ul></li></ul><p data-dcnode-id="2042" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="2043" instrument_node="">This good old restaurant has been in Boracay since 1982, it was founded by Mang Dionisio “Jony” the same year as Jony’s Fruitshake. Maya is derived from the local name of a bird and the name of the indigenous people of Mexico – the Mayans, because the resto serves both Filipino and Mexican cuisines.</span></p><p data-dcnode-id="2040"><img alt="boracay food trip" class="aligncenter" data-dcnode-id="2041" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/51108911534_649933d8a0_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="2038" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="2039" instrument_node="">The palm-fringed Maya Restaurant is a beach-front diner located in White Beach Station 1 in Boracay, in front of Jony’s Hotel and beside Jony’s Fruitshake. It exudes an airy, tropical atmosphere and the interior is decked with modern-designed rattan chairs where you can sit snugly while sipping your favorite Jony’s Fruitshake.</span></p><p data-dcnode-id="2018" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="2037" instrument_node="">The dishes here are also created by Chef Jun Salme of the Pig Out Bistro. The Mexican flavors include: </span><em data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Tacos Al Pastor</span></em><span data-dcnode-id="2034" instrument_node="">, comprised of homemade fresh corn tortilla, slow-cooked pork, avocado, beans, onions, and cilantro rice. The </span><em data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Carnitas Burrito</span></em><span data-dcnode-id="2031" instrument_node=""> was inspired by the shared recipe of a former Mexican Ambassador to the Philippines.&nbsp; Meanwhile, some of my favorite Filipino cuisines at Maya’s Restaurant are the </span><em data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Kansi</span></em><span data-dcnode-id="2028" instrument_node=""> – softened beef bone marrow stewed in lemon grass, ginger, and</span><em data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node=""> batwan</span></em><span data-dcnode-id="2025" instrument_node="">, and of course, the </span><em data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Lechon Kawali</span></em><span data-dcnode-id="2022" instrument_node=""> – the popular pork belly served in small </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">kawali</span></em><span data-dcnode-id="2019" instrument_node="">, which is oven-steamed to preserve the crunchiness of the skin and the juiciness of the fat.</span></p><ul data-dcnode-id="1994"><li data-dcnode-id="1995" style="list-style-type: none;"><ul data-dcnode-id="1996"><li data-dcnode-id="2015"><h4 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Other Places to Eat in Boracay</span></h4></li><li data-dcnode-id="2006"><h4 data-dcnode-id="2007"><span data-dcnode-id="2008" style="color: #000000;"><strong data-dcnode-id="2009"><span data-dcnode-id="2014" instrument_node="">Nonie’s Restaurant: </span><span data-dcnode-id="2010" style="color: #ff0000;"><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/30540-nonies-restaurant-boracay/%3Faid%3D480" rel="nofollow noopener" style="color: #ff0000;" target="_blank"><u data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">RESERVE HERE</span></u></a></span></strong></span></h4></li><li data-dcnode-id="1997"><h4 data-dcnode-id="1998"><span data-dcnode-id="1999" style="color: #000000;"><strong data-dcnode-id="2000"><span data-dcnode-id="2005" instrument_node="">STATION X Dip and Dine Experience: </span><span data-dcnode-id="2001" style="color: #ff0000;"><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/21647-station-x-experience-boracay/%3Faid%3D480" rel="nofollow noopener" style="color: #ff0000;" target="_blank"><u data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">RESERVE HERE</span></u></a></span></strong></span></h4></li></ul></li></ul><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="1991"><h3 data-dcnode-id="1985" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="1990" id="7Boracay_Sunset_Watching"></span><span data-dcnode-id="1987" style="color: #000000;"><strong data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">7.Boracay Sunset Watching</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="1986"></span></h3><p data-dcnode-id="1981" style="padding-left: 40px;"><strong data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1982" instrument_node="">The sunset of Boracay is legendary.&nbsp; It is a big attraction on the island, while enjoying your fruit shake or beer at a beach-front café or a nearby swanky restaurant.</span></p><p data-dcnode-id="1979"><img alt="BORACAY TRAVEL GUIDE: PARAW SAILING" class="aligncenter" data-dcnode-id="1980" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317342913_c1f51e03da_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="1958" style="text-align: justify; padding-left: 40px;"><span data-dcnode-id="1978" instrument_node="">But if you want an extraordinary sunset watching experience, try the </span><strong data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Boracay Paraw Sailing</span></strong><span data-dcnode-id="1975" instrument_node=""> tours during sunset.&nbsp; In the Philippines, </span><strong data-dcnode-id="1972"><em data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">“paraw”</span></em></strong><span data-dcnode-id="1971" instrument_node=""> is a term for small boat with two </span><em data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">katig</span></em><span data-dcnode-id="1968" instrument_node=""> (outrigger) that is propelled by sail. And there’s a plethora of </span><em data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">paraw </span></em><span data-dcnode-id="1965" instrument_node="">boats on the beach of Boracay used for sunset watching activity.&nbsp; </span><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Paraw </span></em><span data-dcnode-id="1962" instrument_node="">can accommodate up to 8-10 persons. Basically, you will ride the</span><em data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node=""> paraw </span></em><span data-dcnode-id="1959" instrument_node="">and glide along the cerulean sea during sunset. Book ahead below to reserve a seat.</span></p><ul data-dcnode-id="1943"><li data-dcnode-id="1944" style="list-style-type: none;"><ul data-dcnode-id="1945"><li data-dcnode-id="1946" style="list-style-type: none;"><ul data-dcnode-id="1947"><li data-dcnode-id="1948"><h5 data-dcnode-id="1949"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Paraw Boat Sailing:</span></strong><span data-dcnode-id="1955" instrument_node=""> </span><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/9287-paraw-sailing-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1951" style="color: #ff0000;"><strong data-dcnode-id="1952"><u data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">RESERVE HERE</span></u></strong></span></a></h5></li></ul></li></ul></li></ul><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="1935" style="text-align: justify; padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="1940" id="8Boracay_Pub_Crawl"></span><span data-dcnode-id="1937" style="color: #000000;"><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">8.Boracay Pub Crawl</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="1936"></span></h3><p data-dcnode-id="1933" style="padding-left: 40px;"><span data-dcnode-id="1934" instrument_node="">Boracay is well-known for its night life.&nbsp; Back in the days, during my first time in the island we met some friendly fire dancers who took us to local bars in the island where locals party like there’s no tomorrow. Nowadays, if you’re into party scenes, best to join the Boracay Pub Crawl where an experienced local guide will take you different popular bars in Boracay and get free shots and special drinks at every stop while still enjoying different activities.</span></p><ul data-dcnode-id="1918"><li data-dcnode-id="1919" style="list-style-type: none;"><ul data-dcnode-id="1920"><li data-dcnode-id="1921" style="list-style-type: none;"><ul data-dcnode-id="1922"><li data-dcnode-id="1923"><h5 data-dcnode-id="1924"><span data-dcnode-id="1925" style="color: #000000;"><strong data-dcnode-id="1926"><span data-dcnode-id="1932" instrument_node="">BORACAY PUB CRAWL:</span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/9293-pub-crawl-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1931" instrument_node=""> </span><span data-dcnode-id="1928" style="color: #ff0000;"><u data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">RESERVE HERE</span></u></span></a></strong></span></h5></li></ul></li></ul></li></ul><p data-dcnode-id="1915"><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">&nbsp;</span></strong></p><h3 data-dcnode-id="1909" style="text-align: justify; padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="1914" id="9Buy_Boracay_Souvenirs"></span><span data-dcnode-id="1911" style="color: #000000;"><strong data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">9.Buy Boracay Souvenirs</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="1910"></span></h3><p data-dcnode-id="1907"><img alt="boracay souvenirs" class="aligncenter" data-dcnode-id="1908" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318193367_4100b09cf8_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="1905" style="padding-left: 40px;"><span data-dcnode-id="1906" instrument_node="">For a beach destination, Boracay is surprisingly a shopping haven, oozing with boutiques, souvenir shops, restaurants, cafes, and bistros. Its compact downtown area is perfect for shopping, strolling, and people-watching at an outdoor cafe. There are also souvenir stores in Puka Beach selling all kinds of beach outfits and Boracay souvenirs made of local materials.</span></p><h3 data-dcnode-id="1895" style="padding-left: 40px;"><span class="ez-toc-section" data-dcnode-id="1904" id="_10_Boracay_Side_Trip"></span><strong data-dcnode-id="1900"><span data-dcnode-id="1903" instrument_node="">&nbsp;</span><span data-dcnode-id="1901" style="color: #000000;"><span data-dcnode-id="1902" instrument_node="">10. </span></span></strong><span data-dcnode-id="1897" style="color: #000000;"><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Boracay Side Trip</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="1896"></span></h3><p data-dcnode-id="1891" style="text-align: justify; padding-left: 40px;"><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1892" instrument_node="">While in Boracay, you can actually make day trips to neighboring tourist destinations.</span></p><ul data-dcnode-id="1882"><li data-dcnode-id="1883" style="list-style-type: none;"><ul data-dcnode-id="1884"><li data-dcnode-id="1885"><h4 data-dcnode-id="1886"><span data-dcnode-id="1887" style="color: #000000;"><strong data-dcnode-id="1888"><u data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Cliff Diving at Ariel’s Point</span></u></strong></span></h4></li></ul></li></ul><p data-dcnode-id="1874" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="1881" instrument_node="">This popular tourist destination in Buruanga, Aklan is hugged by emerald and turquoise water and swimming holes hemmed in by rock formations. It’s often crowded with tourists, mostly foreigners, who want to try cliff diving from its 5 different diving boards starting at 3 meters to 15 meters high. If you’re not into cliff diving, </span><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Ariel’s Point Day Tour Package</span></strong><span data-dcnode-id="1878" instrument_node=""> includes: paddle boarding, snorkeling, kayaking along Buruanga coast, and sunbathing with a scenic view of the Sulu Sea. A day trip here already includes a buffet lunch (traditional dishes), </span><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">merienda</span></em><span data-dcnode-id="1875" instrument_node=""> (afternoon snack), and unlimited drinks (beers, rum, soda, mixed drinks, and water). If you book Ariel’s Point Day Tour Package below, it already includes a boat transfer to and from Boracay. Pick up from Boracay is around 11:15 AM, and return to Boracay is around 5:00 PM, so you have the whole day to spend at Ariel’s Point. You can book at least a day in advance through the link below to secure a slot since this is a popular destination.</span></p><ul data-dcnode-id="1861"><li data-dcnode-id="1862" style="list-style-type: none;"><ul data-dcnode-id="1863"><li data-dcnode-id="1864" style="list-style-type: none;"><ul data-dcnode-id="1865"><li data-dcnode-id="1866"><h5 data-dcnode-id="1867"><strong data-dcnode-id="1868"><span data-dcnode-id="1873" instrument_node="">ARIEL’S POINT DAY TOUR: </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/1053-ariel-point-cliff-diving-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1870" style="color: #ff0000;"><u data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">RESERVE HERE</span></u></span></a></strong></h5></li></ul></li></ul></li></ul><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="1850"><li data-dcnode-id="1851" style="list-style-type: none;"><ul data-dcnode-id="1852"><li data-dcnode-id="1853"><h4 data-dcnode-id="1854"><span data-dcnode-id="1855" style="color: #000000;"><strong data-dcnode-id="1856"><u data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Carabao Island</span></u></strong></span></h4></li></ul></li></ul><p data-dcnode-id="1848" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="1849" instrument_node="">If there’s one day trip from Boracay that I would recommend, it’s Carabao Island. I’ve spent a few days in this tiny quiet island, far from the trappings of commercialization, and I loved it. But if you don’t have much time to spend, you can book a day tour to Carabao Island.</span></p><ul data-dcnode-id="1834"><li data-dcnode-id="1835" style="list-style-type: none;"><ul data-dcnode-id="1836"><li data-dcnode-id="1837" style="list-style-type: none;"><ul data-dcnode-id="1838"><li data-dcnode-id="1839"><h5 data-dcnode-id="1840"><strong data-dcnode-id="1841"><span data-dcnode-id="1847" instrument_node="">CARABAO ISLAND DAY TOUR:</span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/31845-carabao-island-tour-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1843" style="color: #ff0000;"><span data-dcnode-id="1846" instrument_node=""> </span><u data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">BOOK HERE</span></u></span></a></strong></h5></li></ul></li></ul></li></ul><p data-dcnode-id="1832" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="1833" instrument_node="">And if you have the luxury of time after your Boracay trip, you can also visit other equally charming neighboring provinces.</span></p><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="1822"><li data-dcnode-id="1823" style="list-style-type: none;"><ul data-dcnode-id="1824"><li data-dcnode-id="1825"><h4 data-dcnode-id="1826"><strong data-dcnode-id="1827"><u data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Gigantes Island</span></u></strong></h4></li></ul></li></ul><p data-dcnode-id="1820" style="text-align: justify; padding-left: 80px;"><span data-dcnode-id="1821" instrument_node="">If you still can’t get enough of the beach and islands, head to Gigantes Island, a group of islands off the coast of Carles in Northern Iloilo. Gigantes Island is speckled with islands and islets covered by dramatic rock formations, rough-hewn coves, and emerald lagoons. For details on how to get there and Gigantes Travel Guide, click the link of my blog below.</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="1809"><strong data-dcnode-id="1810"><span data-dcnode-id="1816" style="color: #000000;"><span data-dcnode-id="1817" instrument_node="">RELATED BLOG:</span></span><span data-dcnode-id="1815" instrument_node=""> </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepinaysolobackpacker.com/gigantes-island-travel-guide-itinerary/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1812" style="color: #ff0000;"><u data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">GIGANTES ISLAND TRAVEL GUIDE</span></u></span></a></strong></h4><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="1806"><h2 data-dcnode-id="1800"><span class="ez-toc-section" data-dcnode-id="1805" id="BORACAY_ITINERARY_BUDGET"></span><span data-dcnode-id="1802" style="color: #000000;"><strong data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">BORACAY ITINERARY + BUDGET</span></strong></span><span class="ez-toc-section-end" data-dcnode-id="1801"></span></h2><hr data-dcnode-id="1799"><p data-dcnode-id="1797" style="text-align: justify;"><span data-dcnode-id="1798" instrument_node="">Here’s a sample DIY Boracay itinerary with possible expenses. The sample Boracay budget below is good for 1 person, it can be cheaper if you are sharing the cost with someone or with a group.</span></p><p data-dcnode-id="1795"><img alt="boracay white beach" class="aligncenter" data-dcnode-id="1796" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50317343068_d996fcf130_c.jpg&amp;raw" width="800"></p><p data-dcnode-id="1790" style="text-align: justify;"><strong data-dcnode-id="1792"><u data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">REMINDER:</span></u></strong><span data-dcnode-id="1791" instrument_node=""> You need to present the 2022 Boracay Travel Requirements and have it verified before traveling to Boracay. &nbsp;See my instructions above.</span></p><p data-dcnode-id="1788" style="text-align: justify;"><span data-dcnode-id="1789" instrument_node="">Airfare + hotel + souvenirs are NOT included in the calculation of&nbsp; sample Boracay expenses below.</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">&nbsp;</span></p><table data-dcnode-id="1058"><tbody data-dcnode-id="1059"><tr data-dcnode-id="1779"><td data-dcnode-id="1785" width="170"></td><td data-dcnode-id="1780" width="430"><span data-dcnode-id="1781" style="color: #000000;"><strong data-dcnode-id="1782"><u data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">BORACAY ACTIVITIES</span></u></strong></span></td></tr><tr data-dcnode-id="1770"><td data-dcnode-id="1775" width="170"><span data-dcnode-id="1776" style="color: #000000;"><strong data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">DAY 1</span></strong></span></td><td data-dcnode-id="1771" width="430"><span data-dcnode-id="1772" style="color: #000000;"><strong data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Boracay Land Tour or Boracay Water Sports + Sunset</span></strong></span></td></tr><tr data-dcnode-id="1765"><td data-dcnode-id="1768" width="170"><span data-dcnode-id="1769" instrument_node="">08:45 AM</span></td><td data-dcnode-id="1766" width="430"><span data-dcnode-id="1767" instrument_node="">ETD Manila</span></td></tr><tr data-dcnode-id="1760"><td data-dcnode-id="1763" width="170"><span data-dcnode-id="1764" instrument_node="">10:00 AM</span></td><td data-dcnode-id="1761" width="430"><span data-dcnode-id="1762" instrument_node="">ETA Caticlan</span></td></tr><tr data-dcnode-id="1737"><td data-dcnode-id="1758" width="170"><span data-dcnode-id="1759" instrument_node="">10:30 AM</span></td><td data-dcnode-id="1738" width="430"><strong data-dcnode-id="1755"><u data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Option 1:</span></u></strong><span data-dcnode-id="1754" instrument_node=""> Boracay Airport Transfer</span><span data-dcnode-id="1749" style="color: #ff6600;"><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">(</span></strong><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">₱</span></strong></span><strong data-dcnode-id="1742"><span data-dcnode-id="1747" style="color: #ff6600;"><span data-dcnode-id="1748" instrument_node="">590 – $12.13) </span></span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klook.com/en-PH/activity/20025-godofredo-ramos-airport-shared-transfers-boracay/%3Faid%3D480" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1744" style="color: #ff0000;"><u data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">RESERVE HERE</span></u></span></a></strong><p data-dcnode-id="1741"></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">&nbsp;</span></p></td></tr><tr data-dcnode-id="1729"><td data-dcnode-id="1736" width="170"></td><td data-dcnode-id="1730" width="430"><strong data-dcnode-id="1733"><u data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Option 2:</span></u></strong><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node=""> DIY Boracay travel: </span></strong></td></tr><tr data-dcnode-id="1725"><td data-dcnode-id="1728" width="170"></td><td data-dcnode-id="1726" width="430"><span data-dcnode-id="1727" instrument_node="">1. Claim luggage. Exit at Caticlan Airport.</span></td></tr><tr data-dcnode-id="1712"><td data-dcnode-id="1724" width="170"></td><td data-dcnode-id="1713" width="430"><span data-dcnode-id="1723" instrument_node="">2. Tricycle to Caticlan Port. </span><span data-dcnode-id="1714" style="color: #ff6600;"><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">(</span></strong><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">₱</span></strong><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">150 – $3) </span></strong><span data-dcnode-id="1715" style="color: #333333;"><span data-dcnode-id="1716" instrument_node="">(good for 2-3 passengers)</span></span></span></td></tr><tr data-dcnode-id="1707"><td data-dcnode-id="1710" width="170"><span data-dcnode-id="1711" instrument_node="">10:45 AM</span></td><td data-dcnode-id="1708" width="430"><span data-dcnode-id="1709" instrument_node="">3. Find the registration booth at Caticlan Port.</span></td></tr><tr data-dcnode-id="1703"><td data-dcnode-id="1706" width="170"></td><td data-dcnode-id="1704" width="430"><span data-dcnode-id="1705" instrument_node="">4. Proceed to the Verification Area. Present your QR code, hotel bookings, negative RT-PCR Test result if needed.</span></td></tr><tr data-dcnode-id="1658"><td data-dcnode-id="1702" width="170"></td><td data-dcnode-id="1659" width="430"><span data-dcnode-id="1701" instrument_node="">5. Pay the fees:</span><p data-dcnode-id="1700"></p><ul data-dcnode-id="1660"><li data-dcnode-id="1690"><span data-dcnode-id="1699" instrument_node="">environmental fee </span><span data-dcnode-id="1694" style="color: #ff6600;"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">(</span></strong><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">₱75- $1.55</span></strong></span><strong data-dcnode-id="1691"><span data-dcnode-id="1692" style="color: #ff6600;"><span data-dcnode-id="1693" instrument_node="">)</span></span></strong></li><li data-dcnode-id="1680"><span data-dcnode-id="1689" instrument_node="">terminal fee </span><span data-dcnode-id="1684" style="color: #ff6600;"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">(</span></strong><strong data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">₱100 – $2</span></strong></span><strong data-dcnode-id="1681"><span data-dcnode-id="1682" style="color: #ff6600;"><span data-dcnode-id="1683" instrument_node="">)</span></span></strong></li><li data-dcnode-id="1661"><span data-dcnode-id="1679" instrument_node="">boat ticket </span><span data-dcnode-id="1662" style="color: #ff6600;"><span data-dcnode-id="1678" instrument_node="">(</span><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">₱25-$0.52) </span></strong><span data-dcnode-id="1674" style="color: #333333;"><span data-dcnode-id="1675" instrument_node="">slow boat</span></span><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node=""> – </span></strong><span data-dcnode-id="1671" instrument_node="">&nbsp;</span><strong data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">(</span></strong><strong data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">₱2</span></strong><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">00 – $4) </span></strong><span data-dcnode-id="1663" style="color: #333333;"><span data-dcnode-id="1664" instrument_node="">fast craft</span></span></span></li></ul></td></tr><tr data-dcnode-id="1654"><td data-dcnode-id="1657" width="170"></td><td data-dcnode-id="1655" width="430"><span data-dcnode-id="1656" instrument_node="">6. Queue and board your boat or fast craft.</span></td></tr><tr data-dcnode-id="1640"><td data-dcnode-id="1653" width="170"></td><td data-dcnode-id="1641" width="430"><span data-dcnode-id="1652" instrument_node="">7. Upon arrival at Cagban Port in Boracay, board your hotel shuttle, if you have one, or charter a tricycle to take you to your hotel. Fare is roughly </span><strong data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">(</span></strong><span data-dcnode-id="1647" style="color: #ff6600;"><strong data-dcnode-id="1648"><span data-dcnode-id=" id="1076" instrument_node=""> + watersports fee</span></strong></td></tr><tr data-dcnode-id="1060"><td data-dcnode-id="1072" width="170"></td><td data-dcnode-id="1061" width="430"><strong data-dcnode-id="1067"><u data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Option 2: </span></u><span data-dcnode-id="1068" style="color: #ff6600;"><span data-dcnode-id="1069" instrument_node="">₱</span></span></strong><span data-dcnode-id="1062" style="color: #ff6600;"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">3,540 – $73 (€61, </span></strong><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">SGD98, RM333, KRW 81K)</span></strong></span></td></tr></tbody></table><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="1055"><h2 data-dcnode-id="1048"><span class="ez-toc-section" data-dcnode-id="1054" id="BORACAY_TRAVEL_TIPS_AND_REMINDERS"></span><span data-dcnode-id="1050" style="color: #000000;"><strong data-dcnode-id="1051"><u data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">BORACAY TRAVEL TIPS AND REMINDERS</span></u></strong></span><span class="ez-toc-section-end" data-dcnode-id="1049"></span></h2><hr data-dcnode-id="1047"><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Remember that you are only a visitor in Boracay, so, please, follow their rules and regulations for your safety and other people.</span></p><p data-dcnode-id="1043"><img alt="boracay beach" class="aligncenter" data-dcnode-id="1044" height="534" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/65535/50318193222_d22496b3c4_c.jpg&amp;raw" width="800"></p><ul data-dcnode-id="1024"><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">All travelers must present the Boracay travel requirements for 2022 mentioned above this blog.</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Only 6,000 persons per day are allowed in Boracay.</span></li><li data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Urinating, defecating, vomiting, and spitting in public areas are prohibited.</span></li><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Dogs and other animals aren’t allowed to roam freely in public areas and beaches around Boracay.</span></li><li data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Visitors can only smoke at designated areas.</span></li><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Open fire and use of kerosene gas aren’t allowed on the shores of Boracay, that’s why fire dancers can only use LED lights.</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Flying a drone is only allowed to those who are able to secure permits. See details above.</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Building of sand castles in Boracay are prohibited. If caught, you may be jailed for it. This activity is prohibited because it may interfere with the natural terrain of the beach, resulting to prolonged presence of irregular contours which affect the natural symmetry of the beach.</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Visitors who faked their Boracay requirements especially the RT-PCR Negative Result will be banned in Boracay.</span></li></ul><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="1021"><h2 data-dcnode-id="1016"><span class="ez-toc-section" data-dcnode-id="1020" id="RELATED_TRAVEL_BLOGS"></span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">RELATED TRAVEL BLOGS:</span></strong><span class="ez-toc-section-end" data-dcnode-id="1017"></span></h2><ul data-dcnode-id="977"><li data-dcnode-id="978" style="list locals knew about it, and I couldn't understand the Indo blogs either. So, not knowing how to go, I left my room and asked the concierge.  His face lightened up. &quot;That's my hometown!&quot;, he exclaimed. He connected me to his brother,  Puto/King, who happened to be a tour guide on the island.  The next day,  l left Bali and went to Nusa Penida. There I met King, a well-trained guide who really cares about his hometown. He took me to a small homestay surrounded by a beautiful garden. The place is so laid-back and reminds me of the countryside back home.  I decided to stay for a few days on the island and hired King to tour me around the island by motorbike. Back then I only met 1 or 2 tourists.  He took me to the best beaches and islands in Nusa Penida and the Hindu cave temple where I got to see how the locals pray.  He introduced me to his diver friends who work to protect the marine life in Nusa. We watched the manta rays swim freely in the sea. I also took a snorkeling trip to the underwater temple. The current was so strong though, I was so worried I'd drown. Then one night King invited me to watch wayang, a traditional puppet theater play. I enjoyed it so much that I didn't want to leave. Oftentimes, travel creates memories that last a lifetime.  My Indonesian friends then included Nusa Penida on the next influencer trip. Bloggers and influencers started sharing about Nusa Penida online. The island suddenly rose to fame on IG and attracted so many tourists. Kelingking Beach became the poster boy of Nusa Penida. It's now a popular day trip from Bali. But I recommend you stay for a few days and hire a local guide.  #itstimeforbali" data-dcnode-id="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepinaysolobackpacker.com/wp-content/plugins/instagram-feed/img/placeholder.png&amp;raw"><span data-dcnode-id="241" instrument_node=""> </span></a></div></div><div class="sbi_item sbi_type_carousel sbi_new sbi_transition" data-dat Missing solo travels like this. After a Christmas party at a friend's house in Subic, I went alone to Pundaquit in San Antonio, Zambales for island hopping. Still feeling groggy and unwell because of a hang over. I have low tolerance for alcohol that's why. 😆 So, I arrived in Pundaquit at night and found a chill place to eat and hang out. I was thankful that the tricycle driver was a good soul and he brought me to the right place. The pitch black road fringed by towering Agoho trees and grasses was eerily quiet. I realized he could easily just dump me somewhere in the grassland and forest there. Yeah, I overthink sometimes when I travel alone. 😅 But yeah, this place is safe for solo travelers. I have traveled a few times here before and never had a bad experience, except for the maddening waves. 😅  Anyway, this destination has a special place in my heart. Because this is the place of my first island hopping with my sisters. Even my first blog header was taken here. I wish I could still retrieve our photos back then. 😔  Capones Island, Anawangin Cove, and Nagsasa Cove are timeless. Despite the crowd during the weekend, they still exude a laid-back atmosphere. 🌳  These islands, first became popular to hikers and mountaineers. There's a trail somewhere in the mountains with a river crossing. My brother has tried it, but he said it's quite difficult. Not recommended for noob hikers like me. 😂  If you're planning a weekend getaway soon, visit Zambales, there's a lot of new beach and surfing destinations here. 🌊
