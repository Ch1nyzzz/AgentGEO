arine waters of Raja Ampa - best tropical vacation spot in Indonesia" class="wp-image-292768" width="580" height="326" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-1536x864.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-700x394.jpg 700w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Man floating in the aquamarine waters of Raja Ampa - best tropical vacation spot in Indonesia" class="lazyload wp-image-292768" data-dcnode-id="1492" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-1536x864.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters-700x394.jpg 700w" height="326" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20326%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Nothing is better than doing nothing.</span></figcaption></figure></div><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The Raja Ampat archipelago bobs around in Indonesia’s distant West Papua province. It’s hardly one of the easiest tropical places to vacation due to its remoteness. That being said, if you want to get as off-grid as possible, then Raja Ampat is your dream destination!</span></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Once you reach this faraway cluster of jungle coated islands, you can choose to immerse yourself in snorkelling, scuba diving, kayaking, and much more.&nbsp;</span></p><p data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">A number of protected areas have been established in Raja Ampat to maintain the marine environment. That means, on the one hand, unspoiled nature and thriving wildlife. On the other, it does result in Raja Ampat being a costlier choice for those </span><a aria-label="backpacking around Indonesia's 17,508 islands (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/indonesia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1482" instrument_node="">backpacking around Indonesia’s 17,508 islands</span></a><span data-dcnode-id="1480" instrument_node="">.&nbsp;</span></p><h3 data-dcnode-id="1477" id="h-what-to-do-in-raja-ampat"><span data-dcnode-id="1478" instrument_node="">What to Do in Raja Ampat</span></h3><ul data-dcnode-id="1472"><li data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">See for yourself what a difference it makes when we protect the natural environment.&nbsp;</span></li><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Get the full Robinson Crusoe experience with a cruise out to some of the deserted islands in the archipelago.&nbsp;</span></li></ul><div data-dcnode-id="1469" id="vanuatu-an-overlooked-gem-of-a-tropical-destination"><h2 class="has-text-align-center" data-dcnode-id="1470" id="h-vanuatu-an-overlooked-gem-of-a-tropical-destination"><span data-dcnode-id="1471" instrument_node="">Vanuatu – An Overlooked Gem of a Tropical Destination</span></h2></div><div class="wp-block-image" data-dcnode-id="1462"><figure class="aligncenter size-full is-resized" data-dcnode-id="1463"><noscript data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset.jpg" alt="Young boys play on a sunset beach during a tropical holiday in Vanuatu" class="wp-image-292779" width="580" height="434" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset-250x187.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset-768x575.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Young boys play on a sunset beach during a tropical holiday in Vanuatu" class="lazyload wp-image-292779" data-dcnode-id="1466" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset-250x187.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-vanuatu-sunset-768x575.jpg 768w" height="434" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20434%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">For those that would prefer a little less mass tourism in their isolated island retreat.</span></figcaption></figure></div><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Of all the tropical places to visit in the South Pacific, Vanuatu ticks a lot of the boxes for your island escape. Vanuatu has managed to steer clear of mass tourism, and accommodation options are more along the lines of independent boutique bungalows and hideaway retreats.&nbsp;</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">This fiery island has an ample scattering of simmering volcanoes, including a number beneath the water. There’s some of the best wreck diving in the South Pacific off the islands, making Vanuatu a top tropical vacation for adventure junkies.&nbsp;</span></p><h3 data-dcnode-id="1456" id="h-what-to-do-in-vanuatu"><span data-dcnode-id="1457" instrument_node="">What to Do in Vanuatu&nbsp;</span></h3><ul data-dcnode-id="1446"><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Set yourself the challenge of seeing how many words you can pick up from the 100+ indigenous languages spoken throughout Vanuatu.</span></li><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Duck beneath the palm trees with a platter of brie and a bottle of red wine – a hangover from the time the nation was a French colony.&nbsp;</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">Sip on </span><a aria-label="kava – a natural narcotic drink (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rollingstone.com/culture/culture-news/kava-inside-the-all-natural-high-thats-sweeping-america-125828/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1450" instrument_node="">kava – a natural narcotic drink</span></a><span data-dcnode-id="1448" instrument_node=""> made from the root of the malok plant.&nbsp;</span></li></ul><div data-dcnode-id="1443" id="koh-lipe-like-the-maldives-but-cheaper"><h2 class="has-text-align-center" data-dcnode-id="1444" id="h-koh-lipe-like-the-maldives-but-cheaper"><span data-dcnode-id="1445" instrument_node="">Koh Lipe – Like the Maldives but Cheaper</span></h2></div><div class="wp-block-image" data-dcnode-id="1436"><figure class="aligncenter size-full is-resized" data-dcnode-id="1437"><noscript data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe.jpg" alt="A town in Koh Lipe, Thailand, with a beautiful tropical beach beyond" class="wp-image-292788" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-1536x1024.jpg 1536w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A town in Koh Lipe, Thailand, with a beautiful tropical beach beyond" class="lazyload wp-image-292788" data-dcnode-id="1440" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-koh-lipe-1536x1024.jpg 1536w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">There are countless tropical Thai Isle retreats to choose from, but Koh Lipe is a pretty swell choice!</span></figcaption></figure></div><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">If you like the sound of the Maldives but are less enthused by the prices, Thailand has the perfect alternative. Dubbed the Maldives of Thailand for its turquoise bays and alabaster-white sand, you could almost convince yourself you really were sitting in the middle of the Indian Ocean. With no jetty to speak off, arriving on Koh Lipe is an adventure in of itself!&nbsp;</span></p><p data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">With its romantic beachfront resorts, Koh Lipe is one of Thailand’s best tropical islands for couples. But it also caters well for budget explorers on the </span><a aria-label="Southeast Asia backpacker trail (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-southeast-asia-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1432" instrument_node="">Southeast Asia backpacker trail</span></a><span data-dcnode-id="1430" instrument_node="">. There’s a scattering of hostels and budget bungalows that – while pricier than other Thai islands – won’t break your budget.</span></p><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">From Koh Lipe, you can even take the ferry onwards to Langkawi, one of Malaysia’s top tropical vacation spots.&nbsp;</span></p><h3 data-dcnode-id="1425" id="h-what-to-do-in-koh-lipe"><span data-dcnode-id="1426" instrument_node="">What to Do in Koh Lipe</span></h3><ul data-dcnode-id="1420"><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Set up camp in one of Koh Lipe’s awesome beach bars and chat the afternoon away with friendly locals.&nbsp;</span></li><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Watch the sun come up at Sunrise Beach and dip back below the horizon at Sunset Beach.&nbsp;</span></li></ul><div class="product-plug product-plug__black component-margin" data-dcnode-id="1384" id="grayl-plug"><div class="product-plug__title" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node=""> Save $$$ • Save the Planet • Save Your Stomach!</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1385"><div class="product-plug__image" data-dcnode-id="1413"><span data-dcnode-id="1417" instrument_node=""> </span><picture data-dcnode-id="1414"><source data-dcnode-id="1416" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="Grayl Geopress Water Purifier Bottle" class="lazyload" data-dcnode-id="1415" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='588'%20width='481'%20viewBox='0%200%204 grayl-geopress-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Buy a Geopress!</span></span></a><span data-dcnode-id="1390" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/grayl-geopress-review/" rel="noopener" target="_blank"><span data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Read the Review</span></span></a></div></div></div><div data-dcnode-id="1381" id="lombok-and-the-gili-islands-lots-of-islands-lots-of-vibes"><h2 class="has-text-align-center" data-dcnode-id="1382" id="h-lombok-and-the-gili-islands-lots-of-islands-lots-of-vibes"><span data-dcnode-id="1383" instrument_node="">Lombok and the Gili Islands&nbsp;– Lots of Islands, Lots of Vibes</span></h2></div><div class="wp-block-image" data-dcnode-id="1374"><figure class="aligncenter size-full is-resized" data-dcnode-id="1375"><noscript data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island.jpg" alt="Woman scuba diving with a sea turtle in the tropical waters of the Gili Islands" class="wp-image-66788" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Woman scuba diving with a sea turtle in the tropical waters of the Gili Islands" class="lazyload wp-image-66788" data-dcnode-id="1378" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Island-hopping-at-GIli-Island-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">You’ll find more of Indonesia’s world-class diving scene in Lombok and the Gili Islands.</span></figcaption></figure></div><p data-dcnode-id="1366"><span data-dcnode-id="1373" instrument_node="">Lombok suffered greatly in the wake of the 2018 earthquake, which destroyed homes and paused the island’s tourism. But now, the island is getting back on its feet, and tourists are a welcome sight. Plus, </span><a aria-label="staying in Lombok (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-lombok-indonesia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1372" instrument_node="">staying in Lombok</span></a><span data-dcnode-id="1370" instrument_node=""> is awesome; it’s even more laid-back than Bali and </span><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">way</span></em><span data-dcnode-id="1367" instrument_node=""> less commercialised.</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Besides Bali, Lombok is a springboard to the </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Gili Islands</span></strong><span data-dcnode-id="1362" instrument_node=""> – three of the most tropical places in Southeast Asia. These are essentially broken down into:</span></p><ul data-dcnode-id="1348"><li data-dcnode-id="1357"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Air</span></strong><span data-dcnode-id="1358" instrument_node=""> – For mediation, yoga, and wellness as well as stellar diving.&nbsp;</span></li><li data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Trawangan</span></strong><span data-dcnode-id="1354" instrument_node=""> – For hedonistic backpackers hungry for nightlife.&nbsp;</span></li><li data-dcnode-id="1349"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Meno</span></strong><span data-dcnode-id="1350" instrument_node=""> – For a romantic tropical island paradise or family holiday.&nbsp;</span></li></ul><h3 data-dcnode-id="1346" id="h-what-to-do-in-lombok-and-the-gili-islands"><span data-dcnode-id="1347" instrument_node="">What to Do in Lombok and the Gili Islands&nbsp;</span></h3><ul data-dcnode-id="1338"><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Support as many local businesses as you can and tip generously – it’ll help the locals regenerate their lost earnings.</span></li><li data-dcnode-id="1339"><span data-dcnode-id="1343" instrument_node="">If you’re short on time, stick to </span><a aria-label="staying on one Gili Island (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-gili-air-indonesia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">staying on one Gili Island</span></a><span data-dcnode-id="1340" instrument_node=""> rather than hopping around all three.&nbsp;</span></li></ul><div data-dcnode-id="1335" id="bohol-tropical-sights-and-adventure-delights"><h2 class="has-text-align-center" data-dcnode-id="1336" id="h-bohol-tropical-sights-and-adventure-delights"><span data-dcnode-id="1337" instrument_node="">Bohol&nbsp;– Tropical Sights and Adventure Delights</span></h2></div><div class="wp-block-image" data-dcnode-id="1328"><figure class="aligncenter size-full is-resized" data-dcnode-id="1329"><noscript data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572.jpg" alt="The Chocolate Hills in Bohol - beautiful tropical destination in the Philippines" class="wp-image-13242" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="The Chocolate Hills in Bohol - beautiful tropical destination in the Philippines" class="lazyload wp-image-13242" data-dcnode-id="1332" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/shutterstock_541469572-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">The Chocolate Hills of Bohol.</span></figcaption></figure></div><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Selecting the most beautiful tropical islands in the Philippines is no simple feat, but the chocolate hills of Bohol make it an easy choice alongside Palawan.&nbsp;</span></p><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Bohol is the epicentre of outdoor nature fun in the Philippines. Once you’ve roamed the chocolate hills, you can take your pick from ziplining above the dense canopy, waterfall climbing, exploring caves, and cruising along jungle rivers.</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">Bohol is the </span><a aria-label="perfect area to stay in the Philippines (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-philippines/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1322" instrument_node="">perfect area to stay in the Philippines</span></a><span data-dcnode-id="1320" instrument_node=""> for wanderers on a budget who want to see some otherworldly natural sights.</span></p><h3 data-dcnode-id="1317" id="h-what-to-do-in-bohol"><span data-dcnode-id="1318" instrument_node="">What to Do in Bohol&nbsp;</span></h3><ul data-dcnode-id="1312"><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Let yourself get gooey-eyed over the googly-eyed Tarsiers.</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Take a day trip to neighbouring Panglao Island – accessible via a bridge.&nbsp;</span></li></ul><div data-dcnode-id="1309" id="mauritius-man-mauritius-is-just-the-best"><h2 class="has-text-align-center" data-dcnode-id="1310" id="h-mauritius-man-mauritius-is-just-the-best"><span data-dcnode-id="1311" instrument_node="">Mauritius&nbsp;– Man, Mauritius is Just… the Best</span></h2></div><div class="wp-block-image" data-dcnode-id="1295"><figure class="aligncenter size-large is-resized" data-dcnode-id="1296"><noscript data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch.jpg" alt="Leon Cascade - a beautiful waterfall on the tropical island of Mauritius" class="wp-image-192541" width="580" height="412" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-768x546.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-1536x1092.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-330x235.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-690x491.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-1050x747.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-816x580.jpg 816w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Leon Cascade - a beautiful waterfall on the tropical island of Mauritius" class="lazyload wp-image-192541" data-dcnode-id="1306" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-768x546.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-1536x1092.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-330x235.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-690x491.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-1050x747.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/03/mauritius-hiking-basic-bitch-816x580.jpg 816w" height="412" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20412%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1297"><span data-dcnode-id="1305" instrument_node="">It doesn’t get much more chill than Mauritius.</span><br data-dcnode-id="1304"><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Photo</span></em><span data-dcnode-id="1301" instrument_node="">: </span><a aria-label=" (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">@themanwiththetinyguitar</span></em></a></figcaption></figure></div><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Don’t be fooled into thinking Mauritius is solely for honeymooners. Mauritius is still one of the best tropical vacation spots out there, even if you haven’t recently declared your undying love for your other half.</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">There’s not much of a backpacker scene on the island, but you can </span><a aria-label="most definitely backpack Mauritius (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-mauritius-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1291" instrument_node="">most definitely backpack Mauritius</span></a><span data-dcnode-id="1289" instrument_node="">! Despite the lack of a budget travel and hostel scene, there are some really dope accommodations on Airbnb fit for less financially buoyant travellers.&nbsp;</span></p><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Mauritius is a real playground for those who like their idyllic tropical destinations to come with a side of adventure. Hiking, watersports, skydiving, and regular ol’ scuba diving: it’s an island where all your scary dreams can come true.&nbsp;</span></p><h3 data-dcnode-id="1284" id="h-what-to-do-in-mauritius"><span data-dcnode-id="1285" instrument_node="">What to Do in Mauritius&nbsp;</span></h3><ul data-dcnode-id="1274"><li data-dcnode-id="1279"><span data-dcnode-id="1283" instrument_node="">Take a helicopter tour to see the </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">‘underwater waterfall’</span></em><span data-dcnode-id="1280" instrument_node=""> off the coast of Morne.&nbsp;</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Find a secluded spot in the less developed south end of the island for a wilder experience.</span></li><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Alternatively, head north for tropical beach feels at a slow fishing village tempo.</span></li></ul><div data-dcnode-id="1271" id="kauai-hawaii-expensive-yes-but-worth-the-cost"><h2 class="has-text-align-center" data-dcnode-id="1272" id="h-kauai-hawaii-expensive-yes-but-worth-the-cost"><span data-dcnode-id="1273" instrument_node="">Kauai (Hawaii) – Expensive, Yes, but Worth the Cost</span></h2></div><div class="wp-block-image" data-dcnode-id="1264"><figure class="aligncenter size-full is-resized" data-dcnode-id="1265"><noscript data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii.jpg" alt="Coastal views of the tropica island vacation spot Kauai in Hawaii" class="wp-image-120237" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Coastal views of the tropica island vacation spot Kauai in Hawaii" class="lazyload wp-image-120237" data-dcnode-id="1268" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/05/Kauai-Hawaii-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Prepare for the lushness.</span></figcaption></figure></div><p data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node="">You can’t go wrong with </span><a aria-label="visiting Hawaii (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-hawaii-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1262" instrument_node="">visiting Hawaii</span></a><span data-dcnode-id="1260" instrument_node=""> no matter which of the state’s eight islands you choose as your destination. But – if you’re not sure where to start – check out Kauai. Kauai is perhaps the prettiest of the islands, with drop-dead gorgeous natural sights and the beaches to match</span></p><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">Besides that, Kauai is also the most backpacker-friendly Hawaiian island. It’s cheaper than the ultra swanky Maui and quieter than Big Island. Though there are still affordable </span><a aria-label="villas in Kauai (opens in a new tab)" class="ek-link" data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-villas-in-kauai-usa/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1257" instrument_node="">villas in Kauai</span></a><span data-dcnode-id="1255" instrument_node=""> for those wanting a more traditional stay.</span></p><p data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">It’s also the wettest of the islands, seeing short bursts of rain more or less every day of the year. However, it’s for that very reason the </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">‘garden isle’</span></em><span data-dcnode-id="1250" instrument_node=""> is so vividly green and gushing with waterfalls, such as the jaw-dropping Wall of Tears.</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">That being said, if you’d rather see a backdrop of spewing lava, stick with Big Island.&nbsp;It’s </span><em data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">magma</span></em><span data-dcnode-id="1245" instrument_node="">-nimous.</span></p><h3 data-dcnode-id="1242" id="h-what-to-do-in-kauai"><span data-dcnode-id="1243" instrument_node="">What to Do in Kauai&nbsp;&nbsp;</span></h3><ul data-dcnode-id="1232"><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Scout out the famous shoot locations used in such films as the Pirates of the Caribbean, Raiders of the Lost Ark, and Jurassic Park.&nbsp;</span></li><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Explore the ‘other’ Grand Canyon – Waimea Canyon State Park.</span></li><li data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">Leave the accommodation behind in exchange for a tent under the stars. There’s </span><a aria-label="mad camping in Hawaii (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-camping-in-hawaii/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1236" instrument_node="">mad camping in Hawaii</span></a><span data-dcnode-id="1234" instrument_node="">.</span></li></ul><div class="colored-note green component-margin" data-dcnode-id="1208"><div class="colored-note__content" data-dcnode-id="1209"><p data-dcnode-id="1218"><noscript data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">&lt;img class="alignleft" src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/165400/bus-png-e1577990696264-800x800.png" alt="bus icon" width="150" height="150" /&gt;</span></noscript><img alt="bus icon" class="lazyload alignleft" data-dcnode-id="1229" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/165400/bus-png-e1577990696264-800x800.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookaway.com/routes/mexico/%3Foffer_id%3D34%26aff_id%3D1391" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Use Bookaway</span></a><b data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">&nbsp;</span></b><b data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">to find the best deals on transport – buses, planes, trains, and ferries. </span></b><span data-dcnode-id="1222" instrument_node="">It’ll save you a&nbsp;</span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">load</span></em><span data-dcnode-id="1219" instrument_node=""> of time when organising transport and you’ll probably nab an EPIC DISCOUNT too!</span></p><p data-dcnode-id="1214"><b data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Book your transport on Bookaway NOW</span></b><span data-dcnode-id="1215" instrument_node="">. Get the best price for the best ride… then use those savings to buy the best feed in town!</span></p><span data-dcnode-id="1213" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookaway.com/%3Foffer_id%3D34%26aff_id%3D1391" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Book Your Transport Here!</span></span></a></div></div><p data-dcnode-id="1207"></p><div data-dcnode-id="1204" id="bermuda-tropical-vacay-gone-mia"><h2 class="has-text-align-center" data-dcnode-id="1205" id="h-bermuda-tropical-vacay-gone-mia"><span data-dcnode-id="1206" instrument_node="">Bermuda – Tropical Vacay Gone MIA</span></h2></div><div class="wp-block-image" data-dcnode-id="1194"><figure class="aligncenter size-full is-resized" data-dcnode-id="1195"><noscript data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa.jpg" alt="A beautiful beachside villa on a tropical beach in Bermuda" class="wp-image-292814" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-1536x1025.jpg 1536w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A beautiful beachside villa on a tropical beach in Bermuda" class="lazyload wp-image-292814" data-dcnode-id="1201" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropic-islands-bermuda-beach-villa-1536x1025.jpg 1536w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Bloody hell… now </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">that’s</span></em><span data-dcnode-id="1197" instrument_node=""> a place to stay!</span></figcaption></figure></div><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">With its pink tropical beaches, swathes of British phone booths, and the biggest monopoly on shipwrecks in the world, Bermuda isn’t your standard tropical paradise.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1191" instrument_node="">Bermuda is pricey, but it’s a top island destination if you’re a big spender with money to burn. It’s so expensive that even cooking in </span><a aria-label="your Airbnb (opens in a new tab)" class="ek-link" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/vacation-rentals-in-bermuda-uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1190" instrument_node="">your Airbnb</span></a><span data-dcnode-id="1188" instrument_node=""> kitchen won’t make the slightest difference – even groceries come with x-rated price tags. That being said, it’s a very beautiful tropical island, and easily one of the coolest places to say you’ve visited and there are tons of cool </span><a aria-label="places to stay in Bermuda (opens in a new tab)" class="ek-link" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-bermuda/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1187" instrument_node="">places to stay in Bermuda</span></a><span data-dcnode-id="1185" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">Another popular option is to join a cruise that stops over at Bermuda. You can </span><a aria-label="pack your beach gear (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/beach-packing-list/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1182" instrument_node="">pack your beach gear</span></a><span data-dcnode-id="1180" instrument_node="">, spend a day soaking up the Bermuda rays, and then be back somewhere cheaper by nightfall!</span></p><h3 data-dcnode-id="1177" id="h-what-to-do-in-bermuda"><span data-dcnode-id="1178" instrument_node="">What to Do in Bermuda</span></h3><ul data-dcnode-id="1172"><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Swizzle a rum swizzle while watching the skies turn pink over the pink sands</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Take a glass-bottom boat and snorkelling combination tour out to the shipwrecks of the Bermuda Triangle.</span></li></ul><div data-dcnode-id="1167" id="ilha-grande-felicidade"><h2 class="has-text-align-center" data-dcnode-id="1168" id="h-ilha-grande-felicidade"><span data-dcnode-id="1171" instrument_node="">Ilha Grande – </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Felicidade</span></em></h2></div><div class="wp-block-image" data-dcnode-id="1160"><figure class="aligncenter size-full is-resized" data-dcnode-id="1161"><noscript data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande.jpg" alt="Brazillian flag surfboards on a beach in tropical Ihla Grande" class="wp-image-292823" width="580" height="385" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande-768x511.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Brazillian flag surfboards on a beach in tropical Ihla Grande" class="lazyload wp-image-292823" data-dcnode-id="1164" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-ihla-grande-768x511.jpg 768w" height="385" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20385%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Brazil + Beaches + Booties = Three Good Reasons to Never Go Home</span></figcaption></figure></div><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">Less of a holiday destination in its own right, the small tropical island of Ilha Grande is more a weekend getaway or day trip when </span><a aria-label="staying in Rio de Janeiro (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-rio-de-janeiro-brazil/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1158" instrument_node="">staying in Rio de Janeiro</span></a><span data-dcnode-id="1156" instrument_node="">. Only an hour’s boat ride away from the city, the island allures with its white sandy beaches, crystal clear waters, and exciting forest trails.</span></p><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">As Ilha Grande has managed to avoid mass development, the island remains mostly unspoiled with an easy-going atmosphere.&nbsp;</span></p><h3 data-dcnode-id="1151" id="h-what-to-do-on-ilha-grande"><span data-dcnode-id="1152" instrument_node="">What to Do on Ilha Grande&nbsp;</span></h3><ul data-dcnode-id="1146"><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Take a boat tour and visit the even tinier tropical islands around the main island. You’ll find even wilder beaches with marine rich waters crying out for a snorkelling session.&nbsp;</span></li><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Have a wander around the abandoned maximum-security prison, Candido Mendes. You might bump into Julio de Almeida, a former inmate who decided to stay after the prison closed down.</span></li></ul><div data-dcnode-id="1143" id="san-andres-colombia-meets-the-caribbean"><h2 class="has-text-align-center" data-dcnode-id="1144" id="h-san-andres-colombia-meets-the-caribbean"><span data-dcnode-id="1145" instrument_node="">San Andrés – Colombia Meets the Caribbean</span></h2></div><div class="wp-block-image" data-dcnode-id="1134"><figure class="aligncenter size-full is-resized" data-dcnode-id="1135"><noscript data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia.jpg" alt="A beach house on a tropical palm-lined beach on San Andres island, Colombia" class="wp-image-292831" width="580" height="384" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia-768x509.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A beach house on a tropical palm-lined beach on San Andres island, Colombia" class="lazyload wp-image-292831" data-dcnode-id="1140" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-san-andres-colombia-768x509.jpg 768w" height="384" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20384%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1136"><em data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Technically</span></em><span data-dcnode-id="1137" instrument_node=""> Colombia, yes, but still so damn Caribbean.</span></figcaption></figure></div><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Officially a part of Colombia, the seahorse-shaped Caribbean island of San Andrés brings together a sparkling mix of Latino, English, and Creole culture.&nbsp;</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">San Andrés is on the whole populated with Colombians who take advantage of budget flights from the mainland. They also waived the tourist tax fee on arrival. While the exotic island doesn’t generally appear on Latin American travel itineraries, it’s pretty backpacker-friendly.&nbsp;</span></p><h3 data-dcnode-id="1128" id="h-what-to-do-in-san-andres"><span data-dcnode-id="1129" instrument_node="">What to Do in San Andrés</span></h3><ul data-dcnode-id="1123"><li data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Island hop to the Johnny Cay Natural Regional Park, a protected coral islet inhabited by iguanas and reggae tunes.&nbsp;</span></li><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Hire a golf cart from your hotel or local rental company and tour the island in style.&nbsp;</span></li></ul><div data-dcnode-id="1117" id="saint-vincent-and-the-grenadines-yet-more-caribbean-islands-to-visit"><h2 class="has-text-align-center" data-dcnode-id="1118" id="h-saint-vincent-and-the-grenadines-yet-more-caribbean-islands-to-visit"><span data-dcnode-id="1122" instrument_node="">Saint Vincent and the Grenadines – Yet </span><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">More</span></em><span data-dcnode-id="1119" instrument_node=""> Caribbean Islands to Visit</span></h2></div><div class="wp-block-image" data-dcnode-id="1110"><figure class="aligncenter size-full is-resized" data-dcnode-id="1111"><noscript data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship.jpg" alt="A sailing ship in the tropic ocean waters on the coast of Saint Vincent and the Grenadines" class="wp-image-292841" width="580" height="381" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship-250x165.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship-768x506.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A sailing ship in the tropic ocean waters on the coast of Saint Vincent and the Grenadines" class="lazyload wp-image-292841" data-dcnode-id="1114" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship-250x165.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-st-vincent-grenadines-kingstown-ship-768x506.jpg 768w" height="381" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20381%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Ahoy!</span></figcaption></figure></div><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Comprising the main island and a chain of smaller islands, Saint Vincent and the Grenadines lingers in the south-east of the Caribbean Sea. The topography is unusual; besides your sky-blue seas and emerald green jungle, you’ll also find spiky cacti!&nbsp;</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">With yacht-filled harbours and chic private islands, this is a top island destination for sailors and boat owners. Affordable self-catering apartments and guesthouses are available on the main island. The further out you travel, however, the costlier and more exclusive your accommodation will become.&nbsp;</span></p><h3 data-dcnode-id="1104" id="h-what-to-do-in-saint-vincent-and-the-grenadines"><span data-dcnode-id="1105" instrument_node="">What to Do in Saint Vincent and the Grenadines</span></h3><ul data-dcnode-id="1099"><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Visit Wallilabou Bay, where Captain Jack Sparrow escaped execution at the hands of the British Navy.</span></li><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Summit the smouldering La Soufriere. Once at the crater, you can take a rope-guided walk down into the caldera of the volcano and get a closer look at the lava dome.</span></li></ul><div data-dcnode-id="1096" id="the-whitsundays-in-the-tropics-down-under"><h2 class="has-text-align-center" data-dcnode-id="1097" id="h-the-whitsundays-in-the-tropics-down-under"><span data-dcnode-id="1098" instrument_node="">The Whitsundays&nbsp;– In the Tropics Down Under</span></h2></div><div class="wp-block-image" data-dcnode-id="1089"><figure class="aligncenter size-large is-resized" data-dcnode-id="1090"><noscript data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-scaled.jpg" alt="A boat tour in the Whitsundays, Queensland - Australia's most tropical places" class="wp-image-217334" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-scaled.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-1536x1024.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-2048x1365.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A boat tour in the Whitsundays, Queensland - Australia's most tropical places" class="lazyload wp-image-217334" data-dcnode-id="1093" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-scaled.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-scaled.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-1536x1024.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-2048x1365.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/elena-emmy-L3jKCYPYpec-unsplash-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Expensive to explore, however, you’re always paying a preium to be in Australia. Cause Australia’s pretty rad.</span></figcaption></figure></div><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Some of the world’s most beautiful tropical islands are located in the heart of the Great Barrier Reef. Being Australia, the Whitsundays aren’t the cheapest tropical islands to explore, but they can be explored on a backpacker budget.</span></p><p data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">You’ve got some choices for </span><a aria-label="where to stay in the Whitsundays (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-whitsundays-australia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1085" instrument_node="">where to stay in the Whitsundays</span></a><span data-dcnode-id="1083" instrument_node="">. Use Airlie Beach as your base if you’re looking to form a crew to split costs with.&nbsp;And while you’re in the area, hitting up the Great Barrier Reef – the longest coral formation in the world – for a spot of diving is an unmissable experience.</span></p><h3 data-dcnode-id="1080" id="h-what-to-do-in-the-whitsundays"><span data-dcnode-id="1081" instrument_node="">What to Do in the Whitsundays</span></h3><ul data-dcnode-id="1075"><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Book a boat trip to explore the uninhabited islands.&nbsp;</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Feast on some of Australia’s best seafood.&nbsp;</span></li></ul><div data-dcnode-id="1072" id="the-canary-islands-its-not-all-tropical-beaches"><h2 class="has-text-align-center" data-dcnode-id="1073" id="h-the-canary-islands-it-s-not-all-tropical-beaches"><span data-dcnode-id="1074" instrument_node="">The Canary Islands – It’s Not All Tropical Beaches!</span></h2></div><div class="wp-block-image" data-dcnode-id="1065"><figure class="aligncenter size-full is-resized" data-dcnode-id="1066"><noscript data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes.jpg" alt="Woman running across sand dunes in the tropical Canary Islands" class="wp-image-292858" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-1536x1024.jpg 1536w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Woman running across sand dunes in the tropical Canary Islands" class="lazyload wp-image-292858" data-dcnode-id="1069" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-canary-islands-dunes-1536x1024.jpg 1536w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Can you hear the squeaks?</span></figcaption></figure></div><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Strictly speaking, the islands of </span><a aria-label="Gran Canaria (opens in a new tab)" class="ek-link" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-gran-canaria/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1063" instrument_node="">Gran Canaria</span></a><span data-dcnode-id="1061" instrument_node=""> and its neighbours aren’t tropical destinations, but rather subtropical. But who likes rules, ey? Also – these islands have some of the most unique landscapes on the planet, encompassing mini deserts and volcanic black sand.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">With guaranteed sun year-round, the Canary Islands are popular with Northern Europeans after some winter sunning. Gran Canaria is one of the </span><a aria-label="most popular areas to stay (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-gran-canaria/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1058" instrument_node="">most popular areas to stay</span></a><span data-dcnode-id="1056" instrument_node="">, however, branching out just means you’re going to discover areas much less ventured by tourists!</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">You can also score some very budget-friendly package deals or camping spots.&nbsp;You just gotta break off the beaten path!</span></p><h3 data-dcnode-id="1051" id="h-what-to-do-in-the-canary-islands"><span data-dcnode-id="1052" instrument_node="">What to Do in the Canary Islands</span></h3><ul data-dcnode-id="1046"><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Clamber around the volcanoes of the exotic island Gran Canaria.&nbsp;</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Visit the lesser-known El Hierro for unspoilt beaches and rural solitude.&nbsp;</span></li></ul><div data-dcnode-id="1043" id="bora-bora-the-pacific-isles-are-woefully-overlooked"><h2 class="has-text-align-center" data-dcnode-id="1044" id="h-bora-bora-the-pacific-isles-are-woefully-overlooked"><span data-dcnode-id="1045" instrument_node="">Bora Bora – The Pacific Isles are Woefully Overlooked</span></h2></div><div class="wp-block-image" data-dcnode-id="1038"><figure class="aligncenter size-full is-resized" data-dcnode-id="1039"><noscript data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora.jpg" alt="A bird flies in fron of a mountain on the tropical island of Bora Bora" class="wp-image-292872" width="580" height="366" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora-250x158.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora-768x485.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A bird flies in fron of a mountain on the tropical island of Bora Bora" class="lazyload wp-image-292872" data-dcnode-id="1040" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora-250x158.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-bora-bora-768x485.jpg 768w" height="366" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20366%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">Exclusive, expensive, and dripping with luxury, Bora Bora is one of </span><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">the</span></em><span data-dcnode-id="1034" instrument_node=""> tropical places to vacation if you’ve got the cash. It’s expensive to get there, it’s expensive to sleep there, it’s expensive to eat there.</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">However, it’s also painfully beautiful, and the moment you plant your weary feet into the soft white sand of French Polynesia, all those money-shaped worries will drift away. It may not be one of the </span><a aria-label="cheapest places in the world (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/cheap-places-to-travel-broke/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1031" instrument_node="">cheapest places in the world</span></a><span data-dcnode-id="1029" instrument_node=""> to travel, but man, it’s one of the best looking.</span></p><h3 data-dcnode-id="1026" id="h-what-to-do-in-bora-bora"><span data-dcnode-id="1027" instrument_node="">What to Do in Bora Bora</span></h3><ul data-dcnode-id="1021"><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Lie back and soak up those desktop wallpaper views.</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Hike up to the summit of Mount Pahia for a close-up of neighbouring volcano Mount Otemanu.</span></li></ul><div data-dcnode-id="1018" id="in-conclusion-its-time-to-plan-that-tropical-island-vacation-retreat"><h2 class="has-text-align-center" data-dcnode-id="1019" id="h-in-conclusion-it-s-time-to-plan-that-tropical-island-vacation-retreat"><span data-dcnode-id="1020" instrument_node="">In Conclusion, It’s Time to Plan That Tropical Island Vacation Retreat</span></h2></div><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">And that concludes our thoughts on the 25 best tropical places to visit! We hope that at least one of these tropical islands has sparked your wanderlust urges.&nbsp;</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">While tropical islands used to be reserved for the rich and famous, fortunately, that’s changed. While not always cheap, affordable accommodation is out there – even in places like the Caribbean and Indian Ocean.</span></p><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">A growing emphasis on </span><a aria-label="eco-tourism and sustainable travel (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/responsible-travel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1012" instrument_node="">eco-tourism and sustainable travel</span></a><span data-dcnode-id="1010" instrument_node=""> also means that it’s not all about booking a deluxe resort anymore. That’s always an option, of course, but many islands have shifted to low-impact or independent accommodations and tours.&nbsp;</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Before you know it, you’ll be sipping on fresh coconut water while the salty sea air ruffles your hair.</span></p><div class="wp-block-image" data-dcnode-id="1000"><figure class="aligncenter size-full is-resized" data-dcnode-id="1001"><noscript data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg" alt="A man on vacation on a tropical island drinks from a coconut" class="wp-image-292885" width="580" height="326" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-1536x865.jpg
