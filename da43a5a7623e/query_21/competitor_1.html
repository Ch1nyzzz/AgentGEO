 like anything is possible in the tropics. With all kinds of adventure activities to keep you busy, you can easily spend days diving, sailing, trekking, and practising yoga. There’s nothing quite just like planting your tush on the sands of tropical beaches and breathing in those sunkissed vibes.</span></p><p data-dcnode-id="2194"><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">But of all the beautiful tropical places that grace the planet, how to choose which one to visit next?</span></strong></p><p data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">Everyone deserves their fair share of vitamin sea, which is why we’ve scoured the globe to collate the&nbsp;</span><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">25 best tropical islands!</span></strong><span data-dcnode-id="2190" instrument_node="">&nbsp;Whether you’re after adventure or simply want to practice your supine pose under the sun, one of these tropical island paradises are sure to float your boat. First up, it’s to the island of the gods…</span></p></div></div><div class="table-of-contents" data-dcnode-id="2103"><div class="table-of-contents__title" data-dcnode-id="2183"><span data-dcnode-id="2186" instrument_node="">Table of Contents </span><span class="table-of-contents__trigger" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Show</span></span></div><ul data-dcnode-id="2104"><li data-dcnode-id="2180"><a data-dcnode-id="2181" href="#bali-the-tropical-island-of-the-gods"><span data-dcnode-id="2182" instrument_node="">Bali – The Tropical Island of the Gods</span></a></li><li data-dcnode-id="2177"><a data-dcnode-id="2178" href="#seychelles-tropical-paradise-at-a-premium-price"><span data-dcnode-id="2179" instrument_node="">Seychelles – Tropical Paradise at a Premium Price</span></a></li><li data-dcnode-id="2174"><a data-dcnode-id="2175" href="#barbados-caribbean-islands-are-a-no-brainer"><span data-dcnode-id="21 7-330x245.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-690x513.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-1050x780.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-781x580.jpg 781w" height="431" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837.jpg&amp;raw" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837.jpg 1833w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-150x111.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-300x223.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-768x571.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-1024x761.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-330x245.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-690x513.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-1050x780.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/Handara-Gate-in-Bali-e1547306245837-781x580.jpg 781w" width="580"><figcaption data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Where tropical tourism meets Hindu mysticism.</span></figcaption></figure></div><p data-dcnode-id="2088"><span data-dcnode-id="2092" instrument_node="">Bali is that rare jewel that hits the sweet spot with backpackers, honeymooners, and family holidaymakers alike! Neither the cheapest destination in Southeast Asia nor the priciest, you’ve got the full spectrum </span><a aria-label="tourist accommodation in Bali (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-bali-indonesia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2091" instrument_node="">tourist accommodation in Bali</span></a><span data-dcnode-id="2089" instrument_node=""> from fancy beachfront resorts to cosy guesthouses, chilled-out dorms, and wicked party hostels.</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">In Bali, it’s easy to cram your days with activities and excursions. Steeped in spirituality, there are thousands of Hindu temples dotted around the island with just as many yoga retreats.&nbsp;Or you can find a spot in the sun and kick back with a tropical juice or cold beer – there’s no judgement on Bali.</span></p><p data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">Take your pick between partying until sunrise or waking up at the crack of dawn to practise your warrior pose on the beach. Choose to eat beside locals at warungs or order the floating breakfast buffet to your private pool.&nbsp;When you’re </span><a aria-label="visiting Bali (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-bali-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2084" instrument_node="">visiting Bali</span></a><span data-dcnode-id="2082" instrument_node="">, it’s all good.</span></p><h3 data-dcnode-id="2079" id="h-what-to-do-in-bali"><span data-dcnode-id="2080" instrument_node="">What to do in Bali</span></h3><ul data-dcnode-id="2067"><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Hire a scooter and explore the hundreds of temples, paddy fields, beaches, and jungles of Bali.</span></li><li data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Strengthen your body and soothe your mind with a cocktail of surf and yoga classes.</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Nurture your Instagram feed with delicious smoothie bowls.&nbsp;</span></li><li data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node="">Hop on the boat and </span><a aria-label="travel to Nusa Penida (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/nusa-penida-bali/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2071" instrument_node="">travel to Nusa Penida</span></a><span data-dcnode-id="2069" instrument_node="">, a small tropical island featuring a t-rex shaped cliff and manta ray snorkelling.&nbsp;</span></li></ul><div class="post-form-cta" data-dcnode-id="1968"><div class="post-form-cta__image" data-dcnode-id="2052"><span data-dcnode-id="2066" instrument_node=""> </span><picture class="behave-as-bg" data-dcnode-id="2059"><source data-dcnode-id="2065" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/386931/will-tuk-tuk-adventure-crop-2-795x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/386931/will-tuk-tuk-adventure-crop-2-1590x400.jpg 2.000x" media="(min-width: 1200px)"><source data-dcnode-id="2064" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/386931/will-tuk-tuk-adventure-crop-2-533x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/386931/will-tuk-tuk-adventure-crop-2-1066x400.jpg 2.000x" media="(min-width: 992px)"><source data-dcnode-id="2063" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/386931/will-tuk-tuk-ad 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A family visiting a topical beach bungalow resort in Seychelles" class="lazyload wp-image-176064" data-dcnode-id="1962" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/Is-Seychelles-safe-to-travel-for-families-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">One of the worlds premier tropical island holiday destinations… if you can afford it</span></figcaption></figure></div><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">With the softest sand and the warmest ocean, the name alone makes is enough to relax your sense. This dreamy archipelago of 115 islands sits in the middle of the Indian Ocean, far off the East African coast.</span></p><p data-dcnode-id="1942"><span data-dcnode-id="1955" instrument_node="">You’ve got a lot of options for choosing </span><a aria-label="where to stay in Seychelles (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-seychelles-africa/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1954" instrument_node="">where to stay in Seychelles</span></a><span data-dcnode-id="1952" instrument_node="">. Choose a base on </span><strong data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Mahé</span></strong><span data-dcnode-id="1949" instrument_node="">, </span><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Praslin</span></strong><span data-dcnode-id="1946" instrument_node="">, and </span><strong data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">La Digue</span></strong><span data-dcnode-id="1943" instrument_node="">, and spend your days cruising around the smaller, uninhabited islands.&nbsp;</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Given the location and just how utterly pristine Seychelles is, it’s a very expensive tropical destination for a vacation – especially during December and January. It’s definitely smarter to visit between May and September when temperatures are the most pleasant, and it rains less.</span></p><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">After all, you don’t want to spend all those dollars to just sit in the rain.</span></p><h3 data-dcnode-id="1936" id="h-what-to-do-in-seychelles"><span data-dcnode-id="1937" instrument_node="">What to Do in Seychelles&nbsp;</span></h3><ul data-dcnode-id="1926"><li data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Book a crazy swanky resort complemented suited only to the grandest tastes.</span></li><li data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Dine on a diet of fancy cocktails and the finest imported food (or go find some local grub).</span></li><li data-dcnode-id="1927"><span data-dcnode-id="1931" instrument_node="">Sit at the end of your private pier and contemplate the effects of </span><a aria-label="climate change on small island nations (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edition.cnn.com/2017/07/10/africa/seychelles-climate-change-coral/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1930" instrument_node="">climate change on small island nations</span></a><span data-dcnode-id="1928" instrument_node="">.</span></li></ul><div data-dcnode-id="1923" id="barbados-caribbean-islands-are-a-no-brainer"><h2 class="has-text-align-center" data-dcnode-id="1924" id="h-barbados-caribbean-islands-are-a-no-brainer"><span data-dcnode-id="1925" instrument_node="">Barbados – Caribbean Islands are a No-Brainer!</span></h2></div><div class="wp-block-image" data-dcnode-id="1916"><figure class="aligncenter size-full is-resized" data-dcnode-id="1917"><noscript data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit.jpg" alt="Small town in Barbados - top topical vacation destination in the Caribbeans" class="wp-image-182718" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Small town in Barbados - top topical vacation destination in the Caribbeans" class="lazyload wp-image-182718" data-dcnode-id="1920" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Is-Barbados-Safe-to-Visit-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Calm and colourful days in blissful Barbados.</span></figcaption></figure></div><p data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node="">Barbados is an absolute banger Caribbean island! With zesty nightlife, awesome local communities, and a surprising number of botanical gardens and other more sedate activities, there really is something for everyone in Barbados. It is easily one of the </span><a aria-label="best islands to visit in the Caribbean (opens in a new tab)" class="ek-link" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-caribbean-islands/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1914" instrument_node="">best islands to visit in the Caribbean</span></a><span data-dcnode-id="1912" instrument_node="">.</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Young travellers relish the vibrant festivals that take place throughout the year ranging from musical throwdowns to the harvest season and even a fish festival.</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node="">At the same time, families will also have a hoot! </span><a aria-label="Barbados is a safe destination (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-barbados-safe/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1907" instrument_node="">Barbados is a very safe destination</span></a><span data-dcnode-id="1905" instrument_node=""> swimming in family-friendly resorts and villas. It’s a much-beloved island for a tropical vacation in the Caribbean for travellers with a younger brood.</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">On the eastern side of the island, you’ll find some rad surfing spots. Every beach on Barbados is open to the public, which means you can take your pick from the 80 tropical beaches the island has on offer. The food is delicious and you can always pick between the pricey restaurants and the cheaper hangouts favoured by locals.&nbsp;</span></p><p data-dcnode-id="1894"><span data-dcnode-id="1901" instrument_node="">If you have the cash, you’ll have no shortage of activities to throw it at, but Barbados is also one of the more affordable islands in the Caribbean. There are so many amazing</span><a aria-label=" places to stay in Barbados (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-barbados/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1900" instrument_node=""> places to stay in Barbados</span></a><span data-dcnode-id="1898" instrument_node=""> – you’ll find mid-range hotels and hostels to suit a whole variety of budgets.&nbsp;If you want a truly authentic experience, you could consider staying in a </span><a aria-label="vacation rental in Barbados (opens in a new tab)" class="ek-link" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/vacation-rentals-in-barbados/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1897" instrument_node="">vacation rental in Barbados</span></a><span data-dcnode-id="1895" instrument_node=""> which is usually someones home that they have rented out.</span></p><h3 data-dcnode-id="1892" id="h-what-to-do-in-barbados"><span data-dcnode-id="1893" instrument_node="">What to Do in Barbados&nbsp;</span></h3><ul data-dcnode-id="1882"><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Swim alongside turtles in the warm, azure water.&nbsp;</span></li><li data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Gorge on fish fry washed down with plenty of locally distilled Mount Gay.</span></li><li data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">Visit Scotland. That’s right – the region known as Saint Andrews bears a striking resemblance to the architectural landscape of Scotland (just with much, </span><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">much</span></em><span data-dcnode-id="1884" instrument_node=""> better weather).&nbsp;</span></li></ul><div class="product-plug product-plug__red component-margin" data-dcnode-id="1859" id=""><div class="product-plug__title" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node=""> What is the One Item Every Traveller NEEDS???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1860"><div class="product-plug__image" data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node=""> </span><picture data-dcnode-id="1876"><source data-dcnode-id="1878" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="1877" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1861"><p data-dcnode-id="1871"><span data-dcnode-id="1874" instrument_node="">There is one item every traveller NEEDS. Some travellers don’t even know they need it, </span><strong data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">but those travellers need it more than anyone.</span></strong></p><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">What is this forgotten essential of the backpacker-life? SPOILERS! </span><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Guess you’ll just have to click the button to find out.</span></strong><span data-dcnode-id="1867" instrument_node=""> 😉</span></p><span data-dcnode-id="1865" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/ItBhB03" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Find Out What It Is!</span></span></a></div></div></div><div data-dcnode-id="1856" id="phuket-southern-thailand-is-magnificent"><h2 class="has-text-align-center" data-dcnode-id="1857" id="h-phuket-southern-thailand-is-magnificent"><span data-dcnode-id="1858" instrument_node="">Phuket – Southern Thailand is Magnificent</span></h2></div><div class="wp-block-image" data-dcnode-id="1847"><figure class="aligncenter size-full is-resized" data-dcnode-id="1848"><noscript data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand.jpg" alt="Longboats at a tropical beach in Phuket, Thailand" class="wp-image-177926" width="580" height="402" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-300x208.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-1024x711.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-150x104.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-768x533.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-330x229.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-690x479.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-1050x729.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-835x580.jpg 835w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Longboats at a tropical beach in Phuket, Thailand" class="lazyload wp-image-177926" data-dcnode-id="1853" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-300x208.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-1024x711.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-150x104.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-768x533.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-330x229.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-690x479.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-1050x729.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Phuket-Best-Places-to-Stay-in-Thailand-835x580.jpg 835w" height="402" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20402%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1849"><span data-dcnode-id="1852" instrument_node="">Regardless of your feelings on Thailand, the southern areas are </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">magnificent.</span></em></figcaption></figure></div><p data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">Thailand’s largest island is the top tropical vacation for a wide mix of traveller styles and budgets. With its idyllic tropical beaches – pearl-white fringed with palms, glittering seas, and a myriad of peaceful temples – what’s not to like? Although, be sure to do your research when choosing </span><a aria-label="where to stay in Phuket (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-phuket-thailand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1845" instrument_node="">where to stay in Phuket</span></a><span data-dcnode-id="1843" instrument_node="">.</span></p><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">As a rule of thumb, central Phuket is popular with backpackers and party animals looking for some of Thailand’s best nightlife. Meanwhile, families or couples seeking a romantic escape may prefer the north or south areas. You’ll find no shortage of digs, ranging from budget hostel beds and homestays to whopping resorts and luxury retreats.&nbsp;</span></p><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">As a general tip for the Thai islands – don’t write off the monsoon season (May-October). This means sharing Phuket with fewer tourists and netting cheaper accommodation while you’re at it. But don’t forget your rain jacket! It may not be the most tropical place in the world during this season…</span></p><h3 data-dcnode-id="1836" id="h-what-to-do-in-phuket"><span data-dcnode-id="1837" instrument_node="">What to Do in Phuket</span></h3><ul data-dcnode-id="1823"><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Embrace the full breadth of Thai culture. Experience an acrobatic massage, the vigour of a Muay Thai match, and find zen in a Buddhist temple all in the same day.&nbsp;&nbsp;&nbsp;</span></li><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Eat, eat, and eat some more. Surf on local delicacies at the various night markets dotted around the island or enrol in a Thai cooking class.&nbsp;</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1831" instrument_node="">Find out </span><a aria-label="why you should never ride an elephant (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/stop-abuse-elephant-tourism/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1830" instrument_node="">why you should never ride an elephant</span></a><span data-dcnode-id="1828" instrument_node=""> at the </span><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Phuket Elephant Jungle Sanctuary</span></strong><span data-dcnode-id="1825" instrument_node="">. At this ethical retreat, you can instead walk alongside the gentle giants.&nbsp;</span></li></ul><div data-dcnode-id="1820" id="the-maldives-the-ritziest-destination-in-south-asia"><h2 class="has-text-align-center" data-dcnode-id="1821" id="h-the-maldives-the-ritziest-destination-in-south-asia"><span data-dcnode-id="1822" instrument_node="">The Maldives – The Ritziest Destination in South Asia</span></h2></div><div class="wp-block-image" data-dcnode-id="1813"><figure class="aligncenter size-large is-resized" data-dcnode-id="1814"><noscript data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial.jpg" alt="The Maldives" class="wp-image-235396" width="580" height="325" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-690x388.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="The Maldives" class="lazyload wp-image-235396" data-dcnode-id="1817" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/07/fuck-covid-maldives-aerial-690x388.jpg 690w" height="325" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20325%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Believe it or not, there is a local side to the Maldives too.</span></figcaption></figure></div><p data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">Luminous sapphire seas, blinding white sand, and flowing all-you-can-eat buffets are trademarks of the Maldives. Of the 1,200 islands that form this tropical paradise, around 100 are used for tourism. The most luxurious resorts straddle an atoll in its entirety, providing a more private (and luxurious) </span><a aria-label="accommodation for visitors. (opens in a new tab)" class="ek-link" data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-the-maldives/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1811" instrument_node="">accommodation for visitors.</span></a><span data-dcnode-id="1809" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">A top tropical place to visit for affluent explorers, the Maldives is synonymous with honeymooners and loved-up couples with deep pockets. However, a number of the Maldivian resorts are set up to attract families too, with kids’ clubs, water slides, and other fun activities to keep the gremlins occupied. Make sure you check out the target market of any resort so you end up in the right place for your holiday.&nbsp;</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">You’re more likely to find a Maldivian bargain between June and October – the monsoon season. </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">‘Bargain’</span></em><span data-dcnode-id="1802" instrument_node=""> being relative: take that with a pinch of salt. They’d charge you for farting in the Maldives if they could.&nbsp;</span></p><h3 data-dcnode-id="1799" id="h-what-to-do-in-the-maldives"><span data-dcnode-id="1800" instrument_node="">What to Do in the Maldives&nbsp;</span></h3><ul data-dcnode-id="1789"><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Blow a year’s salary and rent a bungalow over the water to spend your days gazing at the abundant marine life swimming beneath your feet.&nbsp;</span></li><li data-dcnode-id="1792"><span data-dcnode-id="1796" instrument_node="">Discover all manner of world-class diving and snorkelling; the Maldives is a </span><a aria-label="spectacular destination for a liveaboard trip (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-places-to-dive-on-liveaboard/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1795" instrument_node="">spectacular destination for a liveaboard trip</span></a><span data-dcnode-id="1793" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Utilise the ferry system to escape the all-inclusive lifestyle and explore neighbouring islands with a more local vibe – the real Maldives.&nbsp;&nbsp;&nbsp;</span></li></ul><div data-dcnode-id="1786" id="the-perhentians-two-tropical-places-to-visit-for-the-price-of-one"><h2 class="has-text-align-center" data-dcnode-id="1787" id="h-the-perhentians-two-tropical-places-to-visit-for-the-price-of-one"><span data-dcnode-id="1788" instrument_node="">The Perhentians – Two Tropical Places to Visit for the Price of One!</span></h2></div><div class="wp-block-image" data-dcnode-id="1776"><figure class="aligncenter size-full is-resized" data-dcnode-id="1777"><noscript data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia.jpg" alt="A beautiful beach in the Perhentians - top tropical island destinations in Malaysia" class="wp-image-292710" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-1536x1152.jpg 1536w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A beautiful beach in the Perhentians - top tropical island destinations in Malaysia" class="lazyload wp-image-292710" data-dcnode-id="1783" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-perhentians-malaysia-1536x1152.jpg 1536w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">Malaysia actually has </span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">heaps</span></em><span data-dcnode-id="1779" instrument_node=""> of exquisite tropical locales.</span></figcaption></figure></div><p data-dcnode-id="1771"><span data-dcnode-id="1775" instrument_node="">A short boat ride from the Malaysian coast sits two of the most beautiful tropical islands in Southeast Asia. People come to the Perhenthians for two reasons – to dive or snorkel in the crystal clear water, or to lounge on the beach and do a fat load of nada.&nbsp;Featuring some of </span><a aria-label="Malaysia's most beautiful tropical beaches (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-beaches-in-malaysia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1774" instrument_node="">Malaysia’s most beautiful tropical beaches</span></a><span data-dcnode-id="1772" instrument_node="">, the Perhentians are perfect no matter your preferred travel vibe!</span></p><p data-dcnode-id="1766"><span data-dcnode-id="1770" instrument_node="">Head to </span><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Perhentian Besar</span></strong><span data-dcnode-id="1767" instrument_node=""> for a peaceful escape in a world-class resort with all your creature comforts supplied. This island is popular with families and honeymooners and comprises mid-range to top-tier hotels.&nbsp;</span></p><p data-dcnode-id="1761"><span data-dcnode-id="1765" instrument_node="">Those of you counting the pennies, follow the rest of the broke backpackers off the boat at the more rustic and (slightly) rowdier </span><strong data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Perhentian Kecil</span></strong><span data-dcnode-id="1762" instrument_node="">. This is actually one of the most affordable places to get your open water diving certificate in the whole of Asia. The diving conditions are mint too, so it’s totally worth it!</span></p><h3 data-dcnode-id="1759" id="h-what-to-do-in-the-perhenthians"><span data-dcnode-id="1760" instrument_node="">What to Do in the Perhenthians&nbsp;</span></h3><ul data-dcnode-id="1752"><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Accidentally-on-purpose miss your boat back to the mainland and extend your stay (indefinitely).</span></li><li data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Don’t even bother asking for Wi-Fi codes on Perhentian Kecil. It won’t work, and you’ve got better things to do.&nbsp;</span></li><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Experience tropical camping on Perhentian Kecil.</span></li></ul><div class="product-plug product-plug__black component-margin" data-dcnode-id="1714" id=""><div class="product-plug__title" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node=""> Small Pack Problems? 😉</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1715"><div class="product-plug__image" data-dcnode-id="1745"><span data-dcnode-id="1749" instrument_node=""> </span><picture data-dcnode-id="1746"><source data-dcnode-id="1748" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="1747" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='615'%20width='800'%20viewBox='0%200%20800%20615'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='615'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1716"><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">My missus travels with all her clothes in ziplock bags:&nbsp;</span><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">don’t be like my missus.&nbsp;</span></strong><span data-dcnode-id="1741" instrument_node="">UP YOUR PACKING GAME!</span></p><p data-dcnode-id="1727"><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1183579%26u%3D1096578%26m%3D79898%26urllink%3Dwww.wandrd.com%252Fproducts%252Fpacking-cubes%26afftrack%3DPacking_cube_plug" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1739" instrument_node="">Packing cubes</span></a><span data-dcnode-id="1737" instrument_node=""> for the globetrotters and </span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/766677/sea-to-summit-ultra-sil-compression-sack%3Fcm_mmc%3Daff_AL-_-178833-_-227769-_-NA%26avad%3D227769_e25a7aaf9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1736" instrument_node="">compression sacks</span></a><span data-dcnode-id="1734" instrument_node=""> for the&nbsp;</span><em data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">real </span></em><span data-dcnode-id="1731" instrument_node="">adventurers – these babies are a </span><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">traveller’s best kept secret.</span></strong><span data-dcnode-id="1728" instrument_node=""> They organise yo’ packing and minimise its volume too so you can pack MORE.</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Or, y’know… you can stick to ziplock bags.</span></p><span data-dcnode-id="1724" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1183579%26u%3D1096578%26m%3D79898%26urllink%3Dwww.wandrd.com%252Fproducts%252Fpacking-cubes%26afftrack%3DPacking_cube_plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">View Our Fave Cubes</span></span></a><span data-dcnode-id="1720" instrument_node=""> </span><a class="button button--normal button--black" data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/766677/sea-to-summit-ultra-sil-compression-sack%3Fcm_mmc%3Daff_AL-_-178833-_-227769-_-NA%26avad%3D227769_e25a7aaf9" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Or Check Out the Sacks!</span></span></a></div></div></div><div data-dcnode-id="1711" id="palawan-for-some-of-the-best-diving-in-the-philippines"><h2 class="has-text-align-center" data-dcnode-id="1712" id="h-palawan-for-some-of-the-best-diving-in-the-philippines"><span data-dcnode-id="1713" instrument_node="">Palawan – For Some of the Best Diving in The Philippines</span></h2></div><div class="wp-block-image" data-dcnode-id="1704"><figure class="aligncenter size-full is-resized" data-dcnode-id="1705"><noscript data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon.jpg" alt="A tropical lagoon in Palawan, the Philippines" class="wp-image-41687" width="580" height="389" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon.jpg 1600w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-300x201.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-768x516.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-1024x687.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-690x463.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-1050x705.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-864x580.jpg 864w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A tropical lagoon in Palawan, the Philippines" class="lazyload wp-image-41687" data-dcnode-id="1708" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon.jpg 1600w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-300x201.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-768x516.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-1024x687.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-690x463.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-1050x705.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Palawan-Philippines-Lagoon-864x580.jpg 864w" height="389" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20389%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Honestly, some days aren’t beach days. Some days are lagoon days.</span></figcaption></figure></div><p data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">Many say that Palawan is the most beautiful tropical island you’ll find while </span><a aria-label="travelling in the Philippines (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-the-philippines/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1702" instrument_node="">travelling in the Philippines</span></a><span data-dcnode-id="1700" instrument_node="">; it’s hard not to see why: the beauty of this tropical island paradise slaps you right in the face! (Gently and lovingly.)&nbsp;</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1698" instrument_node="">Palawan boasts two UNESCO World Heritage sites. Wiggle into your diving gear and explore </span><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Tubbataha Reefs Natural Park</span></strong><span data-dcnode-id="1695" instrument_node=""> or hop aboard a canoe for the </span><strong data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Puerto-Princesa Subterranean River National Park</span></strong><span data-dcnode-id="1692" instrument_node="">.</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">In keeping with the rest of the Philippines, Palawan is a brilliant tropical island for backpackers on a budget. With plenty of hostels and cheap food, you can stretch your money far here. Travellers flock to Palawan, so if you’re travelling solo, you’re guaranteed to </span><a aria-label="make some new travel buddies (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-find-a-travel-buddy/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1689" instrument_node="">make some new travel buddies</span></a><span data-dcnode-id="1687" instrument_node="">.&nbsp;</span></p><h3 data-dcnode-id="1684" id="h-what-to-do-in-palawan"><span data-dcnode-id="1685" instrument_node="">What to Do in Palawan</span></h3><ul data-dcnode-id="1676"><li data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">Island-hop around the lagoons and islands of </span><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">El Nido</span></strong><span data-dcnode-id="1680" instrument_node=""> in the northern stretch of the island.&nbsp;</span></li><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Tickle your tastebuds with Filipino cuisine. Bull’s testicle soup (mysteriously branded Soup Number 5) and boiled duck embryo (balut) are two such delicacies. In fact, the termite of the sea – tamilok – is a Palawan speciality.&nbsp;</span></li></ul><div data-dcnode-id="1673" id="fiji-a-growing-top-island-destination-on-peoples-radars"><h2 class="has-text-align-center" data-dcnode-id="1674" id="h-fiji-a-growing-top-island-destination-on-people-s-radars"><span data-dcnode-id="1675" instrument_node="">Fiji – A Growing Top Island Destination on People’s Radars</span></h2></div><div class="wp-block-image" data-dcnode-id="1666"><figure class="aligncenter size-full is-resized" data-dcnode-id="1667"><noscript data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906.jpg" alt="Diving with manta rays at Yasawa's famous coral Reefs" class="wp-image-135809" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-1050x699.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-871x580.jpg 871w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Diving with manta rays at Yasawa's famous coral Reefs" class="lazyload wp-image-135809" data-dcnode-id="1670" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-1050x699.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/Manta-in-Yasawa-shutterstock_1523585906-871x580.jpg 871w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Swim with Manta Rays in Yasawas Famous Coral Reefs, Fiji</span></figcaption></figure></div><p data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">Another of those islands formerly seen as a honeymoon destination, Fiji’s appeal has soared over recent decades. It now attracts a mixed bag of solo backpackers and younger explorers as well as the usual tropical vacation crowd. This is in part because Fiji is not that </span><a aria-label="expensive (opens in a new tab)" class="ek-link" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-fiji-expensive/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1664" instrument_node="">expensive</span></a><span data-dcnode-id="1662" instrument_node="">!</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1660" instrument_node="">As the most developed Pacific Island, it’s also the most popular for family holidays. Made up of more than 300 islands, there is no shortage of </span><a aria-label="awesome places to stay in Fiji (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-fiji/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1659" instrument_node="">awesome places to stay in Fiji</span></a><span data-dcnode-id="1657" instrument_node="">. However, you will find most of the tourism across the western islands – particularly </span><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Viti Levu</span></strong><span data-dcnode-id="1654" instrument_node=""> and </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Vanua Levu</span></strong><span data-dcnode-id="1651" instrument_node="">.</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Fiji has something for everyone! There’s diving and snorkelling, sailing and surfing, hiking and whale watching, and, of course, there’s embracing the tropical island lifestyle by swaying in a hammock for days at a time. The temperature remains mostly constant throughout the year, with cyclones occurring between November and January.</span></p><h3 data-dcnode-id="1646" id="h-what-to-do-in-fiji"><span data-dcnode-id="1647" instrument_node="">What to Do in Fiji</span></h3><ul data-dcnode-id="1635"><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Take a break from the beach to slather yourself up in the therapeutic mud baths of Viti Levu.&nbsp;</span></li><li data-dcnode-id="1636"><span data-dcnode-id="1643" instrument_node="">Befriend the friendly locals at a Fijian village. Rather than taking a tour, you can do this independently… as long as you brush up on the customs. Don’t forget to cover up and take a </span><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">sevusevu </span></em><span data-dcnode-id="1640" instrument_node="">(gift) for the </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">turanga ni koro</span></em><span data-dcnode-id="1637" instrument_node=""> (village chief).</span></li></ul><div data-dcnode-id="1632" id="the-galapagos-islands-exotic-islands-dont-come-much-more-exotic"><h2 class="has-text-align-center" data-dcnode-id="1633" id="h-the-galapagos-islands-exotic-islands-don-t-come-much-more-exotic"><span data-dcnode-id="1634" instrument_node="">The Galapagos&nbsp;Islands – Exotic Islands Don’t Come Much More Exotic</span></h2></div><div class="wp-block-image" data-dcnode-id="1625"><figure class="aligncenter size-full is-resized" data-dcnode-id="1626"><noscript data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k.jpg" alt="A seal on an exotic beach in the Galapagos Islands" class="wp-image-64408" width="580" height="384" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-768x509.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-1024x678.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-690x457.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-1050x695.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-876x580.jpg 876w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A seal on an exotic beach in the Galapagos Islands" class="lazyload wp-image-64408" data-dcnode-id="1629" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-768x509.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-1024x678.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-690x457.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-1050x695.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/9336160816_4f47fe4707_k-876x580.jpg 876w" height="384" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20384%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Finding the right Galapagos tour comes down to your budget and what you want to do.</span></figcaption></figure></div><p data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">Some 1,000 km from the South American continent, the 19 exotic islands that form the Galapagos are a melting pot of all forms if abundant fauna. With its undisturbed ecosystem and isolated location, wildlife is able to flourish in the Galapagos. Rather than lying still on the beach, a </span><a aria-label="trip to the Galapagos Islands (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/galapagos-on-a-budget-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1623" instrument_node="">trip to the Galapagos Islands</span></a><span data-dcnode-id="1621" instrument_node=""> is all about early starts and days trawling the coast for nature sightings.&nbsp;</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">While the Galapagos used to be exclusively for the wild-loving wealthy, there is more scope for a budget tropical vacation these days. If you have the cash to splash, sure – go ahead and book that liveaboard cruise.</span></p><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">If not, however, you’ll find dorms, guesthouses, and affordable local food. There are </span><a aria-label="cheaper areas in the Galapagos Islands (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-galapagos-ecuador/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1616" instrument_node="">cheaper areas in the Galapagos Islands</span></a><span data-dcnode-id="1614" instrument_node=""> to stay, and then once you’ve got your feet on the ground, you can shop around for tours and excursions.&nbsp;</span></p><h3 data-dcnode-id="1611" id="h-what-to-do-in-the-galapagos"><span data-dcnode-id="1612" instrument_node="">What to Do in The Galapagos&nbsp;</span></h3><ul data-dcnode-id="1606"><li data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Ponder what the world would look like if we left nature in peace beyond this cluster of beautiful tropical islands.</span></li><li data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Put down your camera and binge on the extraordinary wildlife you’ll encounter with your own two eyes.&nbsp;</span></li></ul><div data-dcnode-id="1600" id="niue-technically-its-not-a-tropical-island"><h2 class="has-text-align-center" data-dcnode-id="1601" id="h-niue-technically-it-s-not-a-tropical-island"><span data-dcnode-id="1605" instrument_node="">Niue – Technically It’s </span><em data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Not</span></em><span data-dcnode-id="1602" instrument_node=""> a Tropical Island</span></h2></div><div class="wp-block-image" data-dcnode-id="1593"><figure class="aligncenter size-full is-resized" data-dcnode-id="1594"><noscript data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue.jpg" alt="Coconut Crab - indigenous wildlife on the tropical island nation of Niue" class="wp-image-292737" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue-768x512.jpg 768w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Coconut Crab - indigenous wildlife on the tropical island nation of Niue" class="lazyload wp-image-292737" data-dcnode-id="1597" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-coconut-crab-niue-768x512.jpg 768w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Coconut crabs and coconut vibes.</span></figcaption></figure></div><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Not so much a tropical island, the minuscule island nation of Niue is technically a coral atoll. In fact, it’s one of the largest raised coral atolls on Earth (as well as being one of the most beautiful tropical places on Earth… obvs).</span></p><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">You’ve got rock pools in the north and rainforest in the southwest with secret tropical beaches connecting the two. Oh, and it’s so small you can hike across the length of the island in about five hours!</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1588" instrument_node="">At present, Niue is only accessible from New Zealand, which does make it trickier to access. It’s most popular with vacationing Kiwis (though not the feathery and cute kind), travellers </span><a aria-label="backpacking in New Zealand (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-new-zealand-on-a-budget/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1587" instrument_node="">backpacking in New Zealand</span></a><span data-dcnode-id="1585" instrument_node="">, and other South Pacific islanders. But it’s way more chill than its neighbouring South Pacific islands, making it one of the top tropical islands in the vicinity for some R&amp;R.&nbsp;</span></p><h3 data-dcnode-id="1582" id="h-what-to-do-on-niue"><span data-dcnode-id="1583" instrument_node="">What to Do on Niue</span></h3><ul data-dcnode-id="1577"><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Swing by the Police Station to pick up your Niue driver’s licence – mandatory before you hire a car. Best souvenir ever, right?</span></li><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Experience the underwater world – diving off Niue comes with a visibility of up to 100 metres.&nbsp;</span></li></ul><div class="product-plug product-plug__red component-margin" data-dcnode-id="1543" id=""><div class="product-plug__title" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node=""> Is This the Best Backpack EVER???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1544"><div class="product-plug__image" data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node=""> </span><picture data-dcnode-id="1571"><source data-dcnode-id="1573" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="Osprey Aether" class="lazyload" data-dcnode-id="1572" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1545"><p data-dcnode-id="1563"><span data-dcnode-id="1569" instrument_node="">We’ve tested countless backpacks over the years, but there’s one the OG Broke Backpacker STILL travels with: </span><strong data-dcnode-id="1564"><span data-dcnode-id="1568" instrument_node="">the backpacker-approved </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1120579%26u%3D1096578%26m%3D76443%26urllink%3Dwww.nomatic.com%252Fproducts%252Fthe-nomatic-backpack%26afftrack%3Dnomatic_backpack_review" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1567" instrument_node="">Osprey Aether</span></a><span data-dcnode-id="1565" instrument_node="">.</span></strong></p><p data-dcnode-id="1554"><span data-dcnode-id="1562" instrument_node="">Want more deetz on why it’s </span><em data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">so damn perfect? </span></em><strong data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">Then read our </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/osprey-aether-70-liter-pack-review/" rel="noopener" target="_blank"><span data-dcnode-id="1558" instrument_node="">comprehensive review</span></a><span data-dcnode-id="1556" instrument_node=""> for the inside scoop!</span></strong></p><span data-dcnode-id="1553" instrument_node=""> </span><a class="button button--branded button--osprey" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3D798fccde-f6a9-4548-b54b-2adfad6c3703%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.osprey.com%252Fus%252Fen%252Fproduct%252Faether-trade-55-AETHER55F20_214.html%26ctc%3DOsprey%2520osprey-aether-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">View on Osprey</span></span></a><span data-dcnode-id="1549" instrument_node=""> </span><a class="button button--branded button--rei" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F177492%252Fosprey-aether-55-pack-mens%26ctc%3DREI%2520osprey-aether-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">View on REI</span></span></a></div></div></div><p data-dcnode-id="1542"></p><div data-dcnode-id="1539" id="koh-rong-thai-isle-feels-at-a-more-chilled-pace"><h2 class="has-text-align-center" data-dcnode-id="1540" id="h-koh-rong-thai-isle-feels-at-a-more-chilled-pace"><span data-dcnode-id="1541" instrument_node="">Koh Rong – Thai Isle Feels at a More Chilled Pace</span></h2></div><div class="wp-block-image" data-dcnode-id="1532"><figure class="aligncenter size-full is-resized" data-dcnode-id="1533"><noscript data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong.jpg" alt="A sole female traveller on a beach on tropical Koh ROng" class="wp-image-170642" width="580" height="385" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-872x580.jpg 872w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A sole female traveller on a beach on tropical Koh ROng" class="lazyload wp-image-170642" data-dcnode-id="1536" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/02/shutterstock-cambodia-woman-paradisiac-beach-koh-rong-872x580.jpg 872w" height="385" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20385%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Chilled beach days and wild party nights.</span></figcaption></figure></div><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">Koh Rong is Cambodia’s answer to Malaysia’s Perhentian Islands. Again, you get to take your pick between two islands to visit both easily accessible for those </span><a aria-label="staying in the Sihanoukville area (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-sihanoukville-cambodia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1530" instrument_node="">staying in the Sihanoukville area</span></a><span data-dcnode-id="1528" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1520"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Koh Rong</span></strong><span data-dcnode-id="1524" instrument_node=""> is the more happening of the two with regular raves and parties at </span><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Police Beach</span></strong><span data-dcnode-id="1521" instrument_node="">. It’s not quite on par with Thailand full moon parties, but it’s getting pretty damn close at this point.</span></p><p data-dcnode-id="1513"><span data-dcnode-id="1519" instrument_node="">Conversely, however, for a quieter tropical escape, </span><a aria-label="head to the sleepier Koh Rong Samloem (opens in a new tab)" class="ek-link" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.projectuntethered.com/koh-rong-samloem-island/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1518" instrument_node="">head to the sleepier </span><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Koh Rong Samloem</span></strong></a><span data-dcnode-id="1514" instrument_node=""> and nap on untouched tropical beaches in humble bamboo huts.&nbsp;Alternatively, you can just take the 45-minute boat ride between the two islands whenever you’re feeling like a change of pace!</span></p><p data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">While Koh Rong works out at a lower cost overall, both islands are ideal for budget travellers. They’re mainly frequented by travellers on a circular lap </span><a aria-label="backpacking around Cambodia (opens in a new tab)" class="ek-link ek-link" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-cambodia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1511" instrument_node="">backpacking around Cambodia</span></a><span data-dcnode-id="1509" instrument_node="">, and long-term wanderers who still haven’t left.</span></p><h3 data-dcnode-id="1506" id="h-what-to-do-in-koh-rong"><span data-dcnode-id="1507" instrument_node="">What to Do in Koh Rong</span></h3><ul data-dcnode-id="1501"><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Fill your tummy on the catch of the day at the nightly beach barbecues while local kids dressed in British football shirts run riot.&nbsp;</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Switch your phone off and embrace the castaway vibe of Koh Rong Samloem – Wi-Fi is in short supply.</span></li></ul><div data-dcnode-id="1495" id="raja-ampat-for-a-tropical-vacation-off-the-beaten-path"><h2 class="has-text-align-center" data-dcnode-id="1496" id="h-raja-ampat-for-a-tropical-vacation-off-the-beaten-path"><span data-dcnode-id="1500" instrument_node="">Raja Ampat – For a Tropical Vacation </span><em data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Off</span></em><span data-dcnode-id="1497" instrument_node=""> the Beaten Path</span></h2></div><div class="wp-block-image" data-dcnode-id="1488"><figure class="aligncenter size-full is-resized" data-dcnode-id="1489"><noscript data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-raja-ampat-waters.jpg" alt="Man floating in the aquam
