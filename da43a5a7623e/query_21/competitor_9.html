61" instrument_node="">This book is the ULTIMATE culmination of more than 10 years of travel experience. It’s full of valuable insider hacks and secrets that will help you unlock your full potential as a traveller.</span></p><p data-dcnode-id="1151"><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">AND… </span></em><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">it’s also FREE at the moment!</span></strong><span data-dcnode-id="1155" instrument_node=""> All you need to do is </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-the-world-on-10-a-day/" rel="noopener" target="_blank"><span data-dcnode-id="1154" instrument_node="">click this link</span></a><span data-dcnode-id="1152" instrument_node=""> (or the sexy image of Will flexing his handstand skillz), provide your email, and we’ll email you the ebook lickety-split!</span></p></div></div></div><h3 data-dcnode-id="1146" id="h-52-don-t-try-to-do-too-much"><span data-dcnode-id="1147" instrument_node="">52. Don’t try to do too much</span></h3><p data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">We all have one – an </span><a aria-label="epic bucket list of places to go (opens in a new tab)" class="ek-link" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/bucket-list-adventures/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1144" instrument_node="">epic bucket list of places to go</span></a><span data-dcnode-id="1142" instrument_node=""> and things to do that we will stop at nothing to complete.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">We’ll ride buses for 30+ hours just to get to the mountains. Some will pay hand over fist to travel into the wilderness, all to see an oversized cat. Others will take four connections and a fuckin ferry to reach some abandoned island in the middle of the East Indies.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">As much as love seeing that lost civilization or unnamed peak, seeing </span><em data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">everything</span></em><span data-dcnode-id="1135" instrument_node=""> is exhausting. By the end of some journeys, you look and feel more like a refugee than an adventurer.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Do yourself a favor and take a break every once in a while. Trying to knock out every single point of interest in a given place is going to wear you out. Then, you probably won’t enjoy them much either.</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">That’s a top international travel tip from your humble Broke Backpacker. Don’t burn out.</span></p><div class="wp-block-image wp-image-60432" data-dcnode-id="1123"><figure class="aligncenter size-full is-resized" data-dcnode-id="1124"><noscript data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185.jpg" alt="Top backpacking travel tip - Chill out sometimes in a hammock" class="wp-image-60432" width="580" height="326" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1024x576.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1050x591.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1031x580.jpg 1031w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Top backpacking travel tip - Chill out sometimes in a hammock" class="lazyload wp-image-60432" data-dcnode-id="1127" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1024x576.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1050x591.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/sunset_hammock_relaxation_bali_asia_indonesia_sun_water-1370185-1031x580.jpg 1031w" height="326" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20326%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Cool off.</span></figcaption></figure></div><h3 data-dcnode-id="1121" id="h-53-bring-along-a-stash-of-coffee-and-or-tea"><span data-dcnode-id="1122" instrument_node="">53. Bring along a stash of coffee and/or tea</span></h3><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Are you addicted to coffee like me?</span></p><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">I tend to always travel with either a personal stash of coffee or a handful of my favorite tea bags. Often the coffee served at hostels is shit. Going to a cafe every morning to get your fix gets expensive quick. Even if you are just carting around a plastic bag full of instant coffee, you are doing well.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">If you are not a coffee drinker, pack some of your favorite tea. This strategy provides both convenience and a way to cut costs down every single day.</span></p><div class="wp-block-image wp-image-62736" data-dcnode-id="1108"><figure class="aligncenter size-full is-resized" data-dcnode-id="1109"><noscript data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487.jpg" alt="A cup of coffee" class="wp-image-62736" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="A cup of coffee" class="lazyload wp-image-62736" data-dcnode-id="1112" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/d2bf98d676caea95894584536d75-1430487-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Oh hell yes. You’ll thank me for this travel tip.</span></figcaption></figure></div><h3 data-dcnode-id="1106" id="h-54-learn-new-languages"><span data-dcnode-id="1107" instrument_node="">54. Learn new languages</span></h3><p data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">Try to </span><a class="ek-link" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-learn-a-new-language-for-travel-and-why-you-should/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1104" instrument_node="">learn at least a handful of words of the language spoken</span></a><span data-dcnode-id="1102" instrument_node=""> in the country you are traveling in. Locals really appreciate you making an effort to learn their language.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Knowing the local languages has huge advantages for you as well. If you can count in the local language, you are less likely to get ripped off. And it’s much easier to haggle in the local language too.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1098" instrument_node="">Even learning how to say “</span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Thank you</span></em><span data-dcnode-id="1095" instrument_node="">,” and “</span><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">How are you?</span></em><span data-dcnode-id="1092" instrument_node="">” and being able to count to ten will take you far. That said, I’m sure you will take your learning far beyond that!</span></p><div class="wp-block-image wp-image-104251" data-dcnode-id="1079"><figure class="aligncenter size-full is-resized" data-dcnode-id="1080"><noscript data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies.jpg" alt="Making friends in Japan" class="wp-image-104251" width="580" height="372" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies.jpg 2362w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-150x96.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-768x494.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-1024x658.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-330x212.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-690x443.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-1050x675.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-902x580.jpg 902w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Making friends in Japan" class="lazyload wp-image-104251" data-dcnode-id="1088" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies.jpg 2362w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-150x96.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-768x494.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-1024x658.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-330x212.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-690x443.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-1050x675.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/language-004-homies-902x580.jpg 902w" height="372" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20372%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1081"><span data-dcnode-id="1087" instrument_node="">Make a squad!</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">Photo: </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">@themanwiththetinyguitar</span></em></a></figcaption></figure></div><h3 data-dcnode-id="1077" id="h-55-memorize-the-location-of-your-hostel"><span data-dcnode-id="1078" instrument_node="">55. Memorize the location of your hostel</span></h3><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">One of the best travel tips, for Europe especially, that I can give is to know where your hostel is and how to get it. Some cities, particularly the older ones, can be a labyrinth and navigating them can lead to frustration or, worse, danger.</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">When you arrive at your hostel, seriously study where it’s located – learn the local landmarks, find where the bus/train lines are, plan intended routes.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">If you’re having trouble orienting yourself, at least ask for a business card from the hostel. You can show it to some locals and they can give you directions.</span></p><h3 data-dcnode-id="1069" id="h-56-don-t-drink-at-bars-every-day"><span data-dcnode-id="1070" instrument_node="">56. Don’t drink at bars every day</span></h3><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Going to a bar in a new place is fun; I get that, though it’s a little too fun. Going out for drinks is always going to be more expensive than buying drinks from a supermarket or shop and drinking in the hostel.</span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Unfortunately, going out drinking at bars every night will murder your budget faster than you can put down five shots. Going out once in a while is ok, sure, but you should get used to buying booze from supermarkets or wherever it is cheapest.</span></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">I still recommend buying the local stuff. You can try local beers, wines, and liquors at the supermarket, and for even cheaper too!</span></p><div class="wp-block-image wp-image-29461" data-dcnode-id="1056"><figure class="aligncenter size-full is-resized" data-dcnode-id="1057"><noscript data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami.jpg" alt="Breathing fire at a bar" class="wp-image-29461" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Breathing fire at a bar" class="lazyload wp-image-29461" data-dcnode-id="1060" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/12/Beds-and-Drinks-Best-Party-Hostels-in-Miami-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">This shit rarely happens, so you’re not missing much by not going out to the bar…</span></figcaption></figure></div><h3 data-dcnode-id="1054" id="h-57-be-careful-buying-drugs"><span data-dcnode-id="1055" instrument_node="">57. Be careful buying drugs</span></h3><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">In many countries of the world, drugs are abundant and cheap. Backpackers and drugs seem to go together like fucking steak and chips. In many cases, you don’t have to look far to find whatever substance you seek.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Sometimes though, buying drugs can put you in sketchy situations, either with dealers or with the police. Be smart about how and where you buy your drugs. Check a country’s policies, and if a country has especially strict drug policies, you should think twice before making a huge life mistake.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Be aware that many dealers don’t give a shit about you… They may sell you MDMA and it could be speed instead (which is fine) or rat poison (which is not). In general, I tend to avoid buying MDMA unless a local friend who I trust provides the hookup. Weed is easy – what you see is what you get.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">NEVER try to smuggle drugs across an international border. The last thing you want is to end up in a jail filled with murderers and lunatics.</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1045" instrument_node="">Check out my post on&nbsp;</span><a class="ek-link" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/drugs-on-road-mushroom-shake/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1044" instrument_node="">drug advice for backpackers.&nbsp;</span></a></p><div class="wp-block-image wp-image-49681" data-dcnode-id="1035"><figure class="aligncenter size-full is-resized" data-dcnode-id="1036"><noscript data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720.jpg" alt="Buying drugs smartly - advice for traveling backpackers" class="wp-image-49681" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Buying drugs smartly - advice for traveling backpackers" class="lazyload wp-image-49681" data-dcnode-id="1039" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/weed-2517251_960_720-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Enjoy your smoke, but be safe about how you get it.</span></figcaption></figure></div><h3 data-dcnode-id="1033" id="h-58-have-safe-sex"><span data-dcnode-id="1034" instrument_node="">58. Have safe sex</span></h3><p data-dcnode-id="1029"><a class="ek-link" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/sex-in-hostels/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1032" instrument_node="">Have sex! Lots of sex!</span></a><span data-dcnode-id="1030" instrument_node=""> It’s good fitness… But be smart and safe about it. Use condoms or some other sort of protection whilst you are traveling and having sexual encounters on the road.</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Flings and one-night-stands are common on the backpacker trail. Keeping yourself and your body safe is an important lesson not&nbsp;just&nbsp;for traveling, but life itself. I won’t get all philosophical on you; just remember that STD infections are no fun, and if you take the steps to protect yourself you’ll be fine.</span></p><div class="wp-block-image wp-image-156501" data-dcnode-id="1020"><figure class="aligncenter size-full is-resized" data-dcnode-id="1021"><noscript data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios.jpg" alt="Dude wiith a condom" class="wp-image-156501" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Dude wiith a condom" class="lazyload wp-image-156501" data-dcnode-id="1024" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/11/010-sex-in-hostel-shutterstock-LightField-Studios-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Ta-dah!</span></figcaption></figure></div><h3 data-dcnode-id="1018" id="h-59-buy-a-kindle"><span data-dcnode-id="1019" instrument_node="">59. Buy a Kindle</span></h3><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">I’m all for the nostalgia of smelling a dusty old book, not to mention the tactile feeling of actually turning the page.</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">But carrying physical books can be super tedious when you travel – they’re heavy, cumbersome, and difficult to pack. You also need to swap them out with others when you finish, which can be fun or frustrating depending on what’s available.</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">I eventually packed a Kindle on one of my backpacking trips (upon receiving some packing travel tips from a friend). Since then, I’ve never looked back.</span></p><p data-dcnode-id="1008"><a class="ek-link" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/qZJXiT" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1011" instrument_node="">Having a Kindle</span></a><span data-dcnode-id="1009" instrument_node=""> is such a convenience. You can literally store thousands of digital books on a device that is often half the size of a regular one. The newer ones have amazing battery life as well and can even behave in a very similar fashion to full-on tablets.</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1007" instrument_node="">So while I miss having a real book in my hands sometimes, I do not miss carrying them around. A Kindle is way better for traveling in my opinion. </span><a class="ek-link" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-books-to-read-while-travelling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1006" instrument_node="">And there are so many good books to read.</span></a></p><h3 data-dcnode-id="1002" id="h-60-use-maps"><span data-dcnode-id="1003" instrument_node="">60. Use maps!</span></h3><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Cell phone maps can be unreliable whether they are offline or not. If you plan on doing going on road trips or backcountry trekking, pick up a hard copy of a map and put it into use.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Familiarize yourself with how to read a map properly before you start driving down the highway or out on the trails! Many local tourism offices or national park entrances will give or sell you a map.</span></p><div class="wp-block-image wp-image-62738" data-dcnode-id="991"><figure class="aligncenter size-full is-resized" data-dcnode-id="992"><noscript data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1.jpg" alt="An old timey map" class="wp-image-62738" width="580" height="385" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-1024x681.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-1050x698.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-872x580.jpg 872w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="An old timey map" class="lazyload wp-image-62738" data-dcnode-id="995" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-1024x681.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-1050x698.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/9f796baf03e899b6c873596464d0-1418873-1-872x580.jpg 872w" height="385" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20385%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Yes, an old explorers map!</span></figcaption></figure></div><h3 data-dcnode-id="989" id="h-61-get-off-the-beaten-path"><span data-dcnode-id="990" instrument_node="">61. Get off the beaten path</span></h3><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Getting off of the main backpacker trail is crucial to finding unique life experiences and really getting to know a country well. Some of the most rewarding parts of any journey are discovering places you’ve never heard of, or where few foreigners go.</span></p><ul data-dcnode-id="976"><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Get to know a country’s national parks and reserves.</span></li><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Spend time in small villages and communities.</span></li><li data-dcnode-id="979"><a class="ek-link" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/workaway-review/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="982" instrument_node="">Volunteer abroad.</span></a><span data-dcnode-id="980" instrument_node=""> Get lost in cities (within reason).</span></li><li data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Camp out under the stars.</span></li></ul><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">However you want to get off the beaten path, there are countless opportunities to discover new places, people, and things…it’s all up to you.</span></p><div class="wp-block-image wp-image-8635" data-dcnode-id="967"><figure class="aligncenter size-full is-resized" data-dcnode-id="968"><noscript data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks.jpg" alt="Travel To Pakistan" class="wp-image-8635" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks.jpg 1020w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/06/friendly-Paks-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Travel To Pakistan" class="lazyload wp-image-8635" data-dcnode-id="971" data-sizes="(max-width: 580px) 100vw, ens when you are traveling. You get hurt, sick, or you lose something valuable. For these scenarios and countless others, you’ll need to have health insurance.</span></p><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">This is our mantra: </span><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">As a wise man once said, if you can’t afford travel insurance, you shouldn’t be traveling</span></em><span data-dcnode-id="952" instrument_node=""> – so be sure to get your&nbsp;backpacker insurance&nbsp;sorted before you head off on a backpacking adventure.</span></p><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">Even if you are only going on a short trip, you should always be armed with a </span><a class="ek-link" data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-insurance/"><span data-dcnode-id="949" instrument_node="">good travel insurance provider</span></a><span data-dcnode-id="947" instrument_node=""> — like World Nomads!</span></p><div class="wp-block-image" data-dcnode-id="940"><figure class="aligncenter size-full is-resized" data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/Turnstile/AffiliateLink%3FpartnerCode%3Dtbpg%26utm_source%3Dtbpg%26source%3Dwn-sitewide-banner-plug%25C2%25A0%26utm_content%3Dweblink%26path%3Dhttps%3A//www.worldnomads.com/travel-insurance/" rel="nofollow" target="_blank"><noscript data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/09/world-nomads-plug-creative-1.jpg" alt="A banner creative for World Nomads travel insurance" class="wp-image-441983" width="700" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/09/world-nomads-plug-creative-1.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/ cnode-id="913" instrument_node="">pretty fucking beautiful.</span></strong></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">You’ve now got 63 (plus 1) of the best backpacking tips available straight from me – The Broke Backpacker! With these traveltips, applied with finely-targeted abandon, you’re going to have a truly epic time. I promise.</span></p><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Whether you’re a veteran extraordinaire catching up on some revision, or a first time backpacker, let these tips for backpacking guide you on an amazing adventure. Be safe, never be sorry, and just keep traveling.</span></p><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">As you do go frolicking across the globe, be sure to take note of your own habits and secret backpacking tips and tricks. If you think they’re worth sharing, please do so in the comment section below! Honestly, we’re never done learning and would love to hear any </span><a aria-label="more travel tips (opens in a new tab)" class="ek-link" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/things-i-wish-i-knew-before-travelling/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="905" instrument_node="">more travel tips</span></a><span data-dcnode-id="903" instrument_node=""> that you may have for us.</span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Have a fucking grand time, amigos.</span></p><div class="wp-block-image" data-dcnode-id="895"><figure class="aligncenter size-full is-resized" data-dcnode-id="896"><noscript data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/adventure-travel-004-beginner-steps.jpg" alt="Man sets off on an adventure" class="wp-image-110836" width="580" height="386" srcset="https://www.thebrokebackpacker.com/ "">Ditch Your Desk</span></a><span data-dcnode-id="725" instrument_node="">. </span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node=""> </span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node=""> He is passionate about self-development and finding meaning and strength through personal challenges. Currently, Will is based in Bali where he has opened his first hostel and co-working space - Tribal Hostel!</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node=""> </span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node=""> And his mantra? </span><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Growth begins at the edges of your comfort zone.</span></strong></div></div></div></div></div></div></div><div class="col-12 order-1 offset-sm-3 col-sm-7 d-md-none d-lg-block offset-lg-1 col-lg-3 order-lg-2" data-dcnode-id="562"><div class="social-sharer" data-dcnode-id="678"><div class="social-sharer__image-wrapper" data-dcnode-id="698"><div class="social-sharer__image" data-dcnode-id="699"><span data-dcnode-id="707" instrument_node=""> </span><picture class="behave-as-bg" data-dcnode-id="700"><source data-dcnode-id="706" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/521170/lifestyle-posts-backpacking-tips-pin-382x286.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/521170/lifestyle-posts-backpacking-tips-pin-764x572.jpg 2.000x" media="(min-width: 1200px)" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/521170/lifestyle-posts-backpacking-tips-pin-382x286.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/521170/lifestyle-posts-backpacking-tips-pin-764x572.jpg 2.000x"><source data-dcnode-id="705" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/521170/lifestyle-posts-backpacking-tips-pin-297x223.jpg 1.000x,https://www.thebrokebackpacker.com/wp-
