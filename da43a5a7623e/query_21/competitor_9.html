n data-dcnode-id="2583" instrument_node="">&nbsp;being on the road. After a decade of backpacking, traveling, and living as a digital nomad myself, I am still learning new tricks every time I hit the road on a new adventure…</span></p><p data-dcnode-id="2576"><span data-dcnode-id="2581" instrument_node="">Over the last ten years, I’ve learnt a lot of lessons and I’ve compiled some of them into&nbsp;my</span><strong data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">&nbsp;63</span></strong><strong data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">&nbsp;best travel tips.</span></strong></p><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">It doesn’t matter if you are traveling in Paris or Kathmandu, the mountains of Pakistan or the jungles of Colombia… my backpacking tips will give you an edge wherever you find yourself on this amazing planet.</span></p><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Becoming an expert traveler takes time, but if you’re armed with the right travel tips, tricks, and hacks, and just generally know how to go backpacking, you will have an advantage as you gain new life experiences traveling around the world.</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2571" instrument_node="">So, in no particular order,&nbsp;</span><em data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">let’s get stoked</span></em><span data-dcnode-id="2568" instrument_node="">&nbsp;on the best backpacking tips and tricks to be found anywhere in the backpacking blogosphere! These tips for traveling are going to make your adventures smooth and your landings soft.</span></p></div></div><div class="table-of-contents" data-dcnode-id="2553"><div class="table-of-contents__title" data-dcnode-id="2561"><span data-dcnode-id="2564" instrument_node="">Table of Contents </span><span class="table-of-contents__trigger" data-dcnode-id="2562"><span data-dcnode-id="2563" instru response-output" data-dcnode-id="2453"></div></form></div></div></div><h3 data-dcnode-id="2447" id="h-1-don-t-pack-too-much-stuff"><span data-dcnode-id="2448" instrument_node="">1. Don’t pack too&nbsp;much stuff</span></h3><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">The number one backpacking tip is to remedy the classic backpacker mistake: bringing too much shit on. We’ve all seen backpackers carrying WAY too much fucking stuff – don’t be one of them, you look like an idiot and getting on public transport is a nightmare.</span></p><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">The more you travel, the more you’ll discover that you really don’t need that. Traveling with three pairs of shoes, a make-up bag that weighs four kilos, three or four jackets, 15 t-shirts, five different cameras, and more than one full-sized backpack is just not necessary.</span></p><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Firstly, when packing for a backpacking trip, take the pile of clothes you think you need and cut the number in half. Then cut it in half again. Seriously.</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2440" instrument_node="">Rather than pack multiple items of mediocre quality, invest in </span><a class="ek-link" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-backpacking-gear/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2439" instrument_node="">multi-purpose backpacking gear</span></a><span data-dcnode-id="2437" instrument_node=""> and clothing that will give you years of use in a variety of different climates. In time, you will find you only pack the bare essentials and you’ll be much happier when your pack is a comfortable weight.</span></p><p data-dcnode-id="2431"><span data-dcnode-id="2435" instrument_node="">If you are not using what you packed at least once a week, then it doesn’t belong in your </span><a class="ek-link" data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-backpacks-for-hiking/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2434" instrument_node="">backpack</span></a><span data-dcnode-id="2432" instrument_node="">.</span></p><p data-dcnode-id="2427"><span data-dcnode-id="2430" instrument_node="">For plenty more inspiration on what to pack, check out my full&nbsp;</span><a class="ek-link" data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-packing-list/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2429" instrument_node="">backpacking packing list.</span></a></p><div class="wp-block-image" data-dcnode-id="2422"><figure class="aligncenter size-full is-resized" data-dcnode-id="2423"><noscript data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675.jpg" alt="Hiking in the mountains with minimal backpacking packing" class="wp-image-62725" width="580" height="390" title="travel tips" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-300x202.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-768x516.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-1024x689.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-690x464.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-1050x706.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-862x580.jpg 862w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Hiking in the mountains with minimal backpacking packing" class="lazyload wp-image-62725" data-dcnode-id="2424" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-300x202.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-768x516.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-1024x689.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-690x464.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-1050x706.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/yosemite_park_nature_national_california_travel_forest_usa-1067675-862x580.jpg 862w" height="390" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20390%22%3E%3C/svg%3E" title="travel tips" width="580"></figure></div><h3 data-dcnode-id="2420" id="h-2-be-mindful-of-your-health"><span data-dcnode-id="2421" instrument_node="">2. Be mindful of your health</span></h3><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">It’s easy to go overboard while you travel because there’s often no one around to call you out. This means you’ll be more susceptible to drinking too much, overeating, and doing reckless or dangerous activities.</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Is it any wonder that some backpackers just look like shit after a couple of months? They just sacrificed half their savings and whatever figure they’ve been working on for the sake of complete hedonism.</span></p><p data-dcnode-id="2409"><span data-dcnode-id="2415" instrument_node="">If you’re going backpacking for a long period of time and don’t want to break down halfway, then take care of yourself: it’s the best piece of backpacking advice for any traveler and one of </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/the-broke-backpacker-manifesto/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2414" instrument_node="">The Broke Backpacker Manifesto</span></a><a aria-label="Broke Backpacker Manifesto (opens in a new tab)" class="ek-link" data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/the-broke-backpacker-manifesto/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2412" instrument_node=""> </span></a><span data-dcnode-id="2410" instrument_node="">tenets. Eat as you would back home, that is, consciously. Don’t drink too much. It may be one of the hardest traveling tips to follow, but maybe try and work out every once in a while as well.</span></p><div class="wp-block-image wp-image-13335" data-dcnode-id="2402"><figure class="aligncenter size-full is-resized" data-dcnode-id="2403"><noscript data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy.jpg" alt="Travel tip: keep excericising (in pretty places)" class="wp-image-13335" width="580" height="325" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy.jpg 1020w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-768x431.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-690x388.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Travel tip: keep excericising (in pretty places)" class="lazyload wp-image-13335" data-dcnode-id="2406" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy.jpg 1020w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-768x431.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/yoga-on-a-lake-copy-690x388.jpg 690w" height="325" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20325%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Keep dat core straight!</span></figcaption></figure></div><h3 data-dcnode-id="2400" id="h-3-stay-in-hostels-with-free-breakfasts"><span data-dcnode-id="2401" instrument_node="">3. Stay in hostels with free breakfasts</span></h3><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">There are </span><a class="ek-link" data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/hostel-life-guide-101/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2398" instrument_node="">some hostels I have stayed in</span></a><span data-dcnode-id="2396" instrument_node=""> that I will never forget, both for the right and wrong reasons… However, I always remember&nbsp;hostels that serve amazing breakfasts!</span></p><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">A crucial hack for the broke backpacker and a top tip for first time backpackers, free breakfasts can sometimes provide the entire nutrition required for one day of adventuring… I have in the past survived just off breakfasts. So – book a hostel that serves free breakfast. Free hostel breakfasts can come in the form of muesli and milk, plain white toast and jam (shit), or a full spread including pancakes, eggs, and coffee!</span></p><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Whatever form the breakfast comes in, it is a blessing because free breakfast means that you only have to sort out and pay for two other meals that day. Or one. Or none if you’re hardcore</span></p><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">A hostel serving breakfast might be a few dollars more than the competition (though not always), but if the price difference isn’t huge, you’ll save money in the long run if you consistently don’t have to pay for breakfast!</span></p><div class="wp-block-image wp-image-62728" data-dcnode-id="2382"><figure class="aligncenter size-full is-resized" data-dcnode-id="2383"><noscript data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1.jpg" alt="Best travel tips: find free breakfasts" class="wp-image-62728" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-1050x699.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-871x580.jpg 871w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Best travel tips: find free breakfasts" class="lazyload wp-image-62728" data-dcnode-id="2386" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-768x511.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-1050x699.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/breakfast_eggs_pan_cutting_board_bread_fork_food_cup-860706-1-871x580.jpg 871w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Mmm… free.</span></figcaption></figure></div><h3 data-dcnode-id="2380" id="h-4-travel-with-a-group-to-split-costs"><span data-dcnode-id="2381" instrument_node="">4. Travel with a group to split costs</span></h3><p data-dcnode-id="2375"><span data-dcnode-id="2379" instrument_node="">There are certain places in the world that are just really expensive to travel alone in. </span><a class="ek-link" data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-usa-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2378" instrument_node="">Backpacking in the USA</span></a><span data-dcnode-id="2376" instrument_node="">, Norway Australia; all of these countries can be destroy your finances if you foot the bill for everything by yourself.</span></p><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">One of the best budget travel tips that you can take advantage of is traveling with a larger group in order to split costs. Booking a shared apartment, paying equal parts for a rental car, switching up who pays for gas or groceries; these are great ways to save cash while traveling.</span></p><p data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node="">It’s also a good way to </span><a class="ek-link" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-travel-safely/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2371" instrument_node="">travel safely.</span></a><span data-dcnode-id="2369" instrument_node=""> Larger groups are more intimidating to would-be thieves and everyone can watch each other’s back. It’s strength in numbers, my friends: backpacker travel gets easier with a team.</span></p><div class="wp-block-image wp-image-31986" data-dcnode-id="2361"><figure class="aligncenter size-full is-resized" data-dcnode-id="2362"><noscript data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137.jpg" alt="The beautiful Machu Pichhu backpacking experience" class="wp-image-31986" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="The beautiful Machu Pichhu backpacking experience" class="lazyload wp-image-31986" data-dcnode-id="2365" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/01/DSC03137-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Welcome to the A-Team!</span></figcaption></figure></div><h3 data-dcnode-id="2359" id="h-5-pack-a-quality-tent"><span data-dcnode-id="2360" instrument_node="">5. Pack a quality tent</span></h3><p data-dcnode-id="2355"><a class="ek-link" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/camping-checklist-master-packing-list/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2358" instrument_node="">I’m a broke backpacker – I camp.</span></a><span data-dcnode-id="2356" instrument_node="">&nbsp;But it’s not just because I like to save money…</span></p><p data-dcnode-id="2350"><span data-dcnode-id="2354" instrument_node="">Sleeping in a tent under the stars, away from WiFi signals and the huddled masses of humanity, is one of the main </span><a class="ek-link" data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-the-world/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2353" instrument_node="">reasons why I go backpacking</span></a><span data-dcnode-id="2351" instrument_node="">. I like to be in wild places (preferably with a joint and an attractive girl).</span></p><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Traveling with a tent does have one major disadvantage – it’s added weight.</span></p><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">But, with a tent, you have the freedom to sleep in places you otherwise would not be able to. The door to multi-day hiking escapes suddenly opens. Getting off the beaten path just got much easier!</span></p><p data-dcnode-id="2341"><span data-dcnode-id="2345" instrument_node="">On top of all of that, bringing a tent backpacking will </span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">save you money</span></em><span data-dcnode-id="2342" instrument_node="">. On countless occasions, I have stayed at hostels that allowed me to pitch my tent outside for a fraction of the cost of staying inside the hostel itself.</span></p><p data-dcnode-id="2336"><span data-dcnode-id="2340" instrument_node="">Plus, camping is the only way to backpack in </span><a class="ek-link" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-scandinavia-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2339" instrument_node="">places like Scandinavia</span></a><span data-dcnode-id="2337" instrument_node=""> affordably. It’s also the only way to see some pretty remarkable natural places only accessible by foot.</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">If you are prone to spontaneous adventures, mountain exploration, and finding yourself in beautiful remote places, then having a tent with you is a no-brainer backpacking tip.</span></p><p data-dcnode-id="2326"><span data-dcnode-id="2333" instrument_node="">If you are in the market for a solid, lightweight, and reliable tent, I highly recommend the</span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F141933%252Fmsr-hubba-hubba-nx-2-tent%26ctc%3Dbudget_travel_tips" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2332" instrument_node="">&nbsp;MSR Hubba Hubba NX 2-person tent</span></a><span data-dcnode-id="2330" instrument_node="">. This compact tent is up to the challenge of battling uncooperative weather. To get to know this tent better, check out my in-depth&nbsp;</span><a class="ek-link" data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/msr-hubba-hubba-nx-tent-review/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2329" instrument_node="">MSR Hubba Hubba Review</span></a><span data-dcnode-id="2327" instrument_node="">.</span></p><p data-dcnode-id="2321"><span data-dcnode-id="2325" instrument_node="">For a more budget, check out our review of the </span><a class="ek-link" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-budget-backpacking-tents/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2324" instrument_node="">best budget backpacking tents</span></a><span data-dcnode-id="2322" instrument_node=""> to take traveling here.</span></p><div class="wp-block-image wp-image-20127" data-dcnode-id="2314"><figure class="aligncenter size-full is-resized" data-dcnode-id="2315"><noscript data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362.jpg" alt="Going backpacking with a tent - top travel tip" class="wp-image-20127" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Going backpacking with a tent - top travel tip" class="lazyload wp-image-20127" data-dcnode-id="2318" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/05/SDC11362-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Living that #tentlife.</span></figcaption></figure></div><h3 data-dcnode-id="2312" id="h-6-bring-a-microfiber-towel"><span data-dcnode-id="2313" instrument_node="">6. Bring a microfiber towel</span></h3><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Relying upon hostel/hotel towels can get really annoying – they are either gross, stolen immediately, lost, or absent altogether(or cost extra). For that matter, nothing is worse than getting out of a lukewarm shower and drying yourself with something that feels like a cat’s tongue.</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2309" instrument_node="">I’ve gotten to the point where I just pack my own towel. Not just any old towel though – I insist upon using </span><a class="ek-link" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/the-best-microfibre-towel-to-take-backpacking/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2308" instrument_node="">a good microfiber one</span></a><span data-dcnode-id="2306" instrument_node=""> – this </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/ActiveRootsTowelSet" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2305" instrument_node="">travel towel set</span></a><span data-dcnode-id="2303" instrument_node=""> in particular.</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Microfiber towels can absorb more, dry quickly, and are very lightweight. For travelers, they are one of the most useful items that they can have in their bag.</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">My travel tip for backpacking with one of these? Hold onto to it tightly because everyone will want it!</span></p><div class="wp-block-image wp-image-24865" data-dcnode-id="2291"><figure class="aligncenter size-full is-resized" data-dcnode-id="2292"><noscript data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock.jpg" alt="Best microfibre towel and an essential backpacking tip" class="wp-image-24865" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Best microfibre towel and an essential backpacking tip" class="lazyload wp-image-24865" data-dcnode-id="2295" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock.jpg 1280w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/10/AR-hammock-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Mmm yummy… the towel! I was talking about the towel.</span></figcaption></figure></div><h3 data-dcnode-id="2289" id="h-7-pack-a-badass-sleeping-bag"><span data-dcnode-id="2290" instrument_node="">7. Pack a badass sleeping bag</span></h3><p data-dcnode-id="2284"><span data-dcnode-id="2288" instrument_node="">Like a tent, having a </span><a class="ek-link" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-backpacking-sleeping-bags/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2287" instrument_node="">quality sleeping bag</span></a><span data-dcnode-id="2285" instrument_node=""> is crucial to staying warm, safe, and comfortable whilst camping. Not everybody needs a sleeping bag – it really does depend on where you are going and how much camping you plan to do, but if you want to camp a sleeping bag often means the difference between a comfortable night’s sleep and a shit night’s sleep.</span></p><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">The tent + sleeping bag combination means that you have shelter and warmth with you on your back where ever you go, which is an awesome feeling.</span></p><p data-dcnode-id="2271"><span data-dcnode-id="2281" instrument_node="">Again, I’ll emphasize packing a&nbsp;</span><em data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">quality</span></em><span data-dcnode-id="2278" instrument_node=""> bag. It’s worth spending the extra money if this is your main sleeping gig. Moreover, you want to pack a</span><em data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">&nbsp;light</span></em><span data-dcnode-id="2275" instrument_node=""> sleeping bag that packs down as </span><em data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">small</span></em><span data-dcnode-id="2272" instrument_node=""> as possible since you are stuffing everything you own inside a backpack!</span></p><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">And make sure you pack a sleeping bag suited for the conditions you’re heading into!</span></p><div class="wp-block-image wp-image-50219" data-dcnode-id="2252"><figure class="aligncenter size-full is-resized" data-dcnode-id="2253"><noscript data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1.jpg" alt="Woman waking up after sleeping in a bag" class="wp-image-50219" width="580" height="401" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-150x104.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-300x208.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-768x532.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-1024x709.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-330x228.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-690x478.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-1050x727.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-838x580.jpg 838w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Woman waking up after sleeping in a bag" class="lazyload wp-image-50219" data-dcnode-id="2266" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-150x104.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-300x208.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-768x532.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-1024x709.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-330x228.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-690x478.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-1050x727.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-1-838x580.jpg 838w" height="401" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20401%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2254"><span data-dcnode-id="2265" instrument_node="">Nothing beats a good sleeping bag…</span><br data-dcnode-id="2264"><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Photo</span></em><span data-dcnode-id="2261" instrument_node="">: </span><a aria-label="Kyle Murphy/@briskventure (opens in a new tab)" class="ek-link" data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/briskventure/" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Kyle Murphy</span></em><span data-dcnode-id="2258" instrument_node="">/</span><em data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">@briskventure</span></em></a></figcaption></figure></div><h3 data-dcnode-id="2250" id="h-8-bring-a-deck-of-cards-or-a-book-of-games"><span data-dcnode-id="2251" instrument_node="">8. Bring a deck of cards or a book of games</span></h3><p data-dcnode-id="2245"><span data-dcnode-id="2249" instrument_node="">One of the first things that I do when I check into a hostel is to convince everyone to play a game of cards with me. Why? Because card games </span><a class="ek-link" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-games/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2248" instrument_node="">(and any travel game, really)</span></a><span data-dcnode-id="2246" instrument_node=""> are great ice breakers.</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">I cannot tell you how many weird and awesome interactions I have had with people over a game as simple as rummy. If there’s alcohol involved, you can be sure that we’ll all be passing out together that night.</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">If you need some help thinking of a game to play, then I suggest picking up a compendium of sorts that illustrates various games. One of my favorite types of games involve questions, like the ones </span><a class="ek-link" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/501wouldyourather" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2241" instrument_node="">you find in this one.</span></a><span data-dcnode-id="2239" instrument_node=""> Pick a copy to kill those awkward silences.</span></p><div class="wp-block-image wp-image-5937" data-dcnode-id="2231"><figure class="aligncenter size-full is-resized" data-dcnode-id="2232"><noscript data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263.jpg" alt="Playing chess with a host while backpacking" class="wp-image-5937" width="580" height="325" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-1024x575.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-1032x580.jpg 1032w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Playing chess with a host while backpacking" class="lazyload wp-image-5937" data-dcnode-id="2235" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-1024x575.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/06/P1030263-1032x580.jpg 1032w" height="325" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20325%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">This lovely lady fucked me up pretty hard.</span></figcaption></figure></div><h3 data-dcnode-id="2229" id="h-9-keep-your-backpack-within-sight"><span data-dcnode-id="2230" instrument_node="">9. Keep your backpack within sight</span></h3><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">This is a travel safety tip that applies more or less to different regions. If you’re backpacking somewhere like Scandinavia or Japan, then chances are you can leave your backpack somewhere and it’ll be there when you return. If you’re backpacking in </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-south-america-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2227" instrument_node="">South America</span></a><span data-dcnode-id="2225" instrument_node=""> or </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-southeast-asia-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2224" instrument_node="">Southeast Asia, </span></a><span data-dcnode-id="2222" instrument_node="">keep that backpack in sight at all times!</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2220" instrument_node="">Countries like </span><a class="ek-link" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-colombia-safe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2219" instrument_node="">Colombia</span></a><span data-dcnode-id="2217" instrument_node="">, Cambodia, Brazil, and </span><a class="ek-link" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-south-africa-safe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2216" instrument_node="">South Africa</span></a><span data-dcnode-id="2214" instrument_node=""> are notorious for bag snatchings. If given the slightest chance, thieves will snatch your backpack right out from under your nose. They could steal it from the back of your chair, your feet in a park, the beach, or when you’re sleeping on the bus.</span></p><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Read up to see if certain countries suffer more or less from petty theft and then take the proper measures. Keep your bag literally on you while on the bus (I wrap a strap around my leg at all times). Get a bag tag if you’re putting it in a storage hold.</span></p><div class="product-plug product-plug__red component-margin" data-dcnode-id="2181" id=""><div class="product-plug__title" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node=""> Is This the Best Travel Pack EVER???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="2182"><div class="product-plug__image" data-dcnode-id="2204"><span data-dcnode-id="2208" instrument_node=""> </span><picture data-dcnode-id="2205"><source data-dcnode-id="2207" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="2206" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/369713/nomatic-travel-pack-20-30-liter-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="2183"><p data-dcnode-id="2197"><span data-dcnode-id="2203" instrument_node="">We’ve tested countless packs over the years, and now we’ve found our absolute favourite: </span><strong data-dcnode-id="2198"><span data-dcnode-id="2202" instrument_node="">the nomad-approved </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1120579%26u%3D1096578%26m%3D76443%26urllink%3Dwww.nomatic.com%252Fproducts%252Fthe-nomatic-backpack%26afftrack%3Dnomatic_backpack_review" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2201" instrument_node="">Nomatic Travel Bag</span></a><span data-dcnode-id="2199" instrument_node="">.</span></strong></p><p data-dcnode-id="2188"><span data-dcnode-id="2196" instrument_node="">Want more deetz on why we love it&nbsp;</span><em data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">so damn much?&nbsp;</span></em><strong data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">Then read our </span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/nomatic-travel-bag-review/" rel="noopener" target="_blank"><span data-dcnode-id="2192" instrument_node="">comprehensive review</span></a><span data-dcnode-id="2190" instrument_node=""> for the inside scoop!</span></strong></p><span data-dcnode-id="2187" instrument_node=""> </span><a class="button button--outline button--red" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1120579%26u%3D1096578%26m%3D76443%26urllink%3Dwww.nomatic.com%252Fproducts%252Fnomatic-travel-bag%26afftrack%3Dnomatic-travel-bag-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Learn More Now!</span></span></a></div></div></div><h3 data-dcnode-id="2179" id="h-10-eat-street-food"><span data-dcnode-id="2180" instrument_node="">10. Eat street food</span></h3><p data-dcnode-id="2175"><a class="ek-link" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-street-food-in-the-world-2/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2178" instrument_node="">Experiencing new foods</span></a><span data-dcnode-id="2176" instrument_node=""> is one of my favorite parts of traveling. Some of the tastiest meals of my life have been purchased from random dudes on the street serving mind-blowing meals from tiny carts, food trucks, or market stalls.</span></p><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">The best part? Street food is always the cheapest eating-out option in town.</span></p><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Eating street food does come with its own dangers. Almost every backpacker has a story about getting sick after eating street food somewhere in the world; I admit it does happen. Though the risk-reward ratio in the long-term is very positive indeed.</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">You will probably get sick at least once from eating street food over the course of your backpacking career. This is your body reacting to bacteria it has never encountered before. For me, getting sick from street food is a rite of passage and my advice for backpackers is to weather it: before long your constitution will toughen up.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">I have eaten at some very questionable street food venues over the years, and I don’t really get sick these days. ‘Cept maybe in India,</span></p><div class="wp-block-image wp-image-62729" data-dcnode-id="2160"><figure class="aligncenter size-large is-resized" data-dcnode-id="2161"><noscript data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1024x683.jpg" alt="backpacking new york city" class="wp-image-53855" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-870x580.jpg 870w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="backpacking new york city" class="lazyload wp-image-53855" data-dcnode-id="2164" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1024x683.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162-870x580.jpg 870w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/night_street_food_sign_new_york-147162.jpg 1200w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The best eats.</span></figcaption></figure></div><h3 data-dcnode-id="2158" id="h-11-carry-a-water-bottle-always"><span data-dcnode-id="2159" instrument_node="">11. Carry a water bottle, always</span></h3><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Having a water bottle with you is one of my best travel tips on this list. You’ll save money and you’ll reduce plastic going into the oceans…</span></p><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">From a budget perspective, it is a complete waste of money in most countries to purchase water in one-liter quantities multiple times a day. Buying bottled water every day of your trip for months on end gets expensive.</span></p><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">More importantly, the world is facing a HUGE plastic pollution crisis right now. Backpackers around the world contribute to this problem by purchasing plastic water bottles with staggering frequency. Don’t be that backpacker!</span></p><p data-dcnode-id="2147"><span data-dcnode-id="2151" instrument_node="">Instead,&nbsp;</span><a class="ek-link" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/reduce-plastic-footprint-sustainable-travel/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2150" instrument_node="">reduce your plastic footprint</span></a><span data-dcnode-id="2148" instrument_node="">:&nbsp;Perhaps the best thing you can do for our planet is to make sure you do NOT add to the plastic problem all over the world. Don’t buy one-use water bottles; the plastic ends up in a landfill or in the ocean.</span></p><p data-dcnode-id="2139"><span data-dcnode-id="2146" instrument_node="">Instead, pack a&nbsp;tough and</span><a aria-label=" cool travel water bottle (opens in a new tab)" class="ek-link" data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F150116%252Fgrayl-geopress-water-purifier-bottle-24-fl-oz%26ctc%3Dpacking_list_series" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2145" instrument_node=""> cool travel water bottle</span></a><span data-dcnode-id="2143" instrument_node="">. For every Active Roots water bottle sold, we donate 10% to&nbsp;PlasticOceans.org – an awesome initiative aimed at educating people on the risk of single-use plastic and helping to clean up our oceans. Help save the planet and pick up </span><a class="ek-link" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-water-bottles/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2142" instrument_node="">a travel water bottle</span></a><span data-dcnode-id="2140" instrument_node="">.</span></p><div class="wp-block-image wp-image-101180" data-dcnode-id="2132"><figure class="aligncenter size-full is-resized" data-dcnode-id="2133"><noscript data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle.jpg" alt="Tip for packing - take a reusable water bottle" class="wp-image-101180" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Tip for packing - take a reusable water bottle" class="lazyload wp-image-101180" data-dcnode-id="2136" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-bottle-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Take a uke too! Ukes are great.</span></figcaption></figure></div><h3 data-dcnode-id="2130" id="h-12-pack-a-camera"><span data-dcnode-id="2131" instrument_node="">12. Pack a camera</span></h3><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">I used to hate traveling with a camera because I always thought they were cumbersome, expensive, and, in a way, took away from the raw experience. I opted instead for shitty photos from my camera phone and making imprints in my memory.</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">After years of traveling, I kinda regret not having a camera all of those years. I could have taken some awesome photos on some Brazilian beach or in the streets of Buenos Aires. Instead, I have grainy pieces of shit.</span></p><div class="wp-block-image wp-image-175506" data-dcnode-id="2112"><figure class="aligncenter size-full is-resized" data-dcnode-id="2113"><noscript data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1.jpg" alt="Traveling with a camera and taking sunset shots" class="wp-image-175506" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1536x1152.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Traveling with a camera and taking sunset shots" class="lazyload wp-image-175506" data-dcnode-id="2123" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1536x1152.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/01/ptv-israel-002-tel-aviv-sunset-opt-1-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="2114"><span data-dcnode-id="2122" instrument_node="">Plus, taking photos is pretty fun.</span><br data-dcnode-id="2121"><em data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Photo</span></em><span data-dcnode-id="2118" instrument_node="">: </span><em data-dcnode-id="2115"><a aria-label="@themanwiththetinyguitar (opens in a new tab)" class="ek-link" data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2117" instrument_node="">@themanwiththetinyguitar</span></a></em></figcaption></figure></div><p data-dcnode-id="2105"><a class="ek-link" data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-camera-for-backpacking/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2111" instrument_node="">Do bring a travel camera</span></a><span data-dcnode-id="2109" instrument_node=""> with you. It doesn’t have to be the best Canon DSLR on the market – it could be something as simple </span><a class="ek-link" data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/sony-alpha-a5100-review/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2108" instrument_node="">as a point-and-shoot.</span></a><span data-dcnode-id="2106" instrument_node=""> The point is you have something to help record all of your amazing adventures.</span></p><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">A friend of mine actually brings a Fuji Instax with him so that he can hand photos to local people, which, if you ask me is an awesome idea. If I could give my former backpacking self any piece of travel advice, it would be to do this.</span></p><div class="product-plug product-plug__black component-margin" data-dcnode-id="2065" id=""><div class="product-plug__title" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node=""> Small Pack Problems? 😉</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="2066"><div class="product-plug__image" data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node=""> </span><picture data-dcnode-id="2097"><source data-dcnode-id="2099" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="2098" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='615'%20width='800'%20viewBox='0%200%20800%20615'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='615'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="2067"><p data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node="">My missus travels with all her clothes in ziplock bags:&nbsp;</span><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">don’t be like my missus.&nbsp;</span></strong><span data-dcnode-id="2092" instrument_node="">UP YOUR PACKING GAME!</span></p><p data-dcnode-id="2078"><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1183579%26u%3D1096578%26m%3D79898%26urllink%3Dwww.wandrd.com%252Fproducts%252Fpacking-cubes%26afftrack%3DPacking_cube_plug" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2090" instrument_node="">Packing cubes</span></a><span data-dcnode-id="2088" instrument_node=""> for the globetrotters and </span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/766677/sea-to-summit-ultra-sil-compression-sack%3Fcm_mmc%3Daff_AL-_-178833-_-227769-_-NA%26avad%3D227769_e25a7aaf9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2087" instrument_node="">compression sacks</span></a><span data-dcnode-id="2085" instrument_node=""> for the&nbsp;</span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">real </span></em><span data-dcnode-id="2082" instrument_node="">adventurers – these babies are a </span><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">traveller’s best kept secret.</span></strong><span data-dcnode-id="2079" instrument_node=""> They organise yo’ packing and minimise its volume too so you can pack MORE.</span></p><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Or, y’know… you can stick to ziplock bags.</span></p><span data-dcnode-id="2075" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1183579%26u%3D1096578%26m%3D79898%26urllink%3Dwww.wandrd.com%252Fproducts%252Fpacking-cubes%26afftrack%3DPacking_cube_plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">View Our Fave Cubes</span></span></a><span data-dcnode-id="2071" instrument_node=""> </span><a class="button button--normal button--black" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/766677/sea-to-summit-ultra-sil-compression-sack%3Fcm_mmc%3Daff_AL-_-178833-_-227769-_-NA%26avad%3D227769_e25a7aaf9" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Or Check Out the Sacks!</span></span></a></div></div></div><h3 data-dcnode-id="2063" id="h-13-use-rideshare-apps-not-taxis"><span data-dcnode-id="2064" instrument_node="">13. Use rideshare apps, not taxis</span></h3><p data-dcnode-id="2055"><span data-dcnode-id="2062" instrument_node="">I hate taxi drivers. Over 70% of the negative encounters I’ve had whilst traveling have been with taxi drivers trying to fuck me over. Rideshare apps like </span><a class="ek-link" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uber.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2061" instrument_node="">Uber</span></a><span data-dcnode-id="2059" instrument_node=""> or </span><a class="ek-link" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lyft.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2058" instrument_node="">Lyft</span></a><span data-dcnode-id="2056" instrument_node=""> make getting around cities both affordable and a lot more pleasant.</span></p><p data-dcnode-id="2050"><span data-dcnode-id="2054" instrument_node="">I love that with Uber, the price is always fixed. You can save your haggling energy for other stuff instead! Moreover, in some cities – especially at night – Rideshare apps are safer. </span><a class="ek-link" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grab.com/sg/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2053" instrument_node="">Grab</span></a><span data-dcnode-id="2051" instrument_node=""> works best in Asia.</span></p><h3 data-dcnode-id="2048" id="h-14-buy-public-transportation-tickets-in-bulk"><span data-dcnode-id="2049" instrument_node="">14. Buy public transportation tickets in bulk</span></h3><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">I’m just rolling with the transportation theme now. When backpacking in big cities, you need to use public transportation to get around.</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Almost without fail, subway/bus/tram tickets are always cheaper when purchased in bulk or as a multi-day pass. Not only that, you’ll save a lot of time queuing up for tickets for every ride.</span></p><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">If you know you will be backpacking in Paris for a couple of days, you can buy multi-day passes to save you from buying tickets individually every time you take the subway. In many cities, the tickets are universal for public transportation, meaning you can use them for the bus or the subway!</span></p><div class="colored-note green component-margin" data-dcnode-id="2018"><div class="colored-note__content" data-dcnode-id="2019"><p data-dcnode-id="2028"><noscript data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">&lt;img class="alignleft" src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/165400/bus-png-e1577990696264-800x800.png" alt="bus icon" width="150" height="150" /&gt;</span></noscript><img alt="bus icon" class="lazyload alignleft" data-dcnode-id="2039" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/165400/bus-png-e1577990696264-800x800.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookaway.com/routes/mexico/%3Foffer_id%3D34%26aff_id%3D1391" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2038" instrument_node="">Use Bookaway</span></a><b data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">&nbsp;</span></b><b data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">to find the best deals on transport – buses, planes, trains, and ferries. </span></b><span data-dcnode-id="2032" instrument_node="">It’ll save you a&nbsp;</span><em data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">load</span></em><span data-dcnode-id="2029" instrument_node=""> of time when organising transport and you’ll probably nab an EPIC DISCOUNT too!</span></p><p data-dcnode-id="2024"><b data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Book your transport on Bookaway NOW</span></b><span data-dcnode-id="2025" instrument_node="">. Get the best price for the best ride… then use those savings to buy the best feed in town!</span></p><span data-dcnode-id="2023" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookaway.com/%3Foffer_id%3D34%26aff_id%3D1391" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Book Your Transport Here!</span></span></a></div></div><p data-dcnode-id="2017"></p><h3 data-dcnode-id="2015" id="h-15-take-advantage-of-layovers"><span data-dcnode-id="2016" instrument_node="">15. Take advantage of layovers</span></h3><p data-dcnode-id="2010"><span data-dcnode-id="2014" instrument_node="">If you’re like me and </span><a class="ek-link" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-way-to-find-flights/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2013" instrument_node="">take advantage of awesome flight deals</span></a><span data-dcnode-id="2011" instrument_node="">, you may end being stuck in a very long layover. If it’s no extra cost to you, then why not turn it into a couple of days?</span></p><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">I would much rather spend my time exploring a city than being stuck in its airport. Hell, it’d be worth it to me even if I had only a couple of hours. (I once spent a 4-hour layover going on a pub crawl in Amsterdam at 9 am.)</span></p><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">In summation, one of the best airport travel tips I can give to you is don’t stay in them at all. Get out, use your time wisely, and enjoy every moment you can.</span></p><div class="wp-block-image wp-image-175789" data-dcnode-id="1994"><figure class="aligncenter size-full is-resized" data-dcnode-id="1995"><noscript data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1.jpg" alt="Backpacking tip for old self - leave the airport" class="wp-image-175789" width="580" height="325" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-300x168.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1024x575.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-768x431.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1536x862.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-690x387.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wh
