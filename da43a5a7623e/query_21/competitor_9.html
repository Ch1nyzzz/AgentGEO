wp-content/uploads/2018/10/IMG_6485dxo-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Be prepared for any adventure with a good pair of hiking shoes…</span></figcaption></figure></div><h3 data-dcnode-id="1529" id="h-35-book-your-plane-tickets-early-but-not-too-early"><span data-dcnode-id="1530" instrument_node="">35. Book your plane tickets early, but not too early</span></h3><p data-dcnode-id="1524"><span data-dcnode-id="1528" instrument_node="">Typically, the best time to </span><a class="ek-link" data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-find-cheap-flights/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1527" instrument_node="">book airplane tickets</span></a><span data-dcnode-id="1525" instrument_node=""> is 1.5 – 3 months in advance. Booking plane tickets one year in advance is not a good idea in terms of price or flexibility.</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Of course, waiting until the last second won’t get you the best price either. Finding that sweet spot is a challenge. Airline fares are constantly changing and there is no set formula regarding how to get the guaranteed best price.</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">I recommend checking out price comparison websites like </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyscanner.pxf.io/c/346818/1027991/13416%3FsubId1%3Dbudget_travel_tips%26associateid%3DAFF_TRA_19354_00001%26u%3Dhttps%253A%252F%252Fwww.skyscanner.com%252F" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1520" instrument_node="">Skyscanner.com</span></a><span data-dcnode-id="1518" instrument_node="">. You can easily check prices by the whole month, which can help you decide which day of any given month has the cheapest flights.</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">For how to find great deals on flights, check out this article on </span><a class="ek-link" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/mistake-fare-flights-secret-flying/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1515" instrument_node="">secret flying</span></a><span data-dcnode-id="1513" instrument_node="">.</span></p><h3 data-dcnode-id="1510" id="h-36-travel-during-the-off-seasons"><span data-dcnode-id="1511" instrument_node="">36. Travel during the off seasons</span></h3><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">One of the truest and most tested international travel tips out there is that you should take advantage of off-season prices. Seriously, some of the most famous cities in the world can look completely different in low season. Museums will be deserted, streets will be inhabited by locals – not tourists – and prices will be much more reasonable.</span></p><p data-dcnode-id="1504"><span data-dcnode-id="1507" instrument_node="">If you plan your backpacking trip very acutely, you can even have your cake and eat it too. Shoulder seasons – the period between high and low – are great times to travel because you’ll benefit from thinner crowds AND comfortable weather. This is my </span><a class="ek-link" data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cntraveler.com/story/secrets-of-shoulder-season-travel" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1506" instrument_node="">preferred time to travel.</span></a></p><div class="wp-block-image" data-dcnode-id="1499"><figure class="aligncenter size-full is-resized" data-dcnode-id="1500"><noscript data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania.jpg" alt="Woman taking photo with New England foliage" class="wp-image-66556" width="580" height="384" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-690x458.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Woman taking photo with New England foliage" class="lazyload wp-image-66556" data-dcnode-id="1501" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/11/woman-taking-photo-by-the-lake-in-autumn-bucharest-romania-690x458.jpg 690w" height="384" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20384%22%3E%3C/svg%3E" width="580"></figure></div><h3 data-dcnode-id="1497" id="h-37-carry-a-headlamp"><span data-dcnode-id="1498" instrument_node="">37. Carry a headlamp</span></h3><p data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node="">In addition to your other camping necessities, </span><a class="ek-link" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/the-5-best-headlamps-for-travelling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1495" instrument_node="">buying a headlamp</span></a><span data-dcnode-id="1493" instrument_node="">&nbsp;is very important when traveling in areas prone to power cuts or if you plan on camping.</span></p><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">There are countless practical uses for a headtorch. From cooking in the dark whilst camping to finding your way to the hostel bathroom in the middle of the night, you will find yourself using your headtorch for one thing or another every single day.</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">This is a number one backpacking tip:&nbsp;</span><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">do not skip the headlamp</span></strong><span data-dcnode-id="1486" instrument_node="">. I cannot stress there imprtance enough.</span></p><div class="wp-block-image wp-image-17158" data-dcnode-id="1478"><figure class="aligncenter size-full is-resized" data-dcnode-id="1479"><noscript data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1.jpeg" alt="man with headlamp" class="wp-image-17158" width="580" height="388" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1.jpeg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-150x101.jpeg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-300x201.jpeg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-768x515.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-1024x686.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-330x221.jpeg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-296x197.jpeg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-690x463.jpeg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-1050x704.jpeg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-865x580.jpeg 865w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="man with headlamp" class="lazyload wp-image-17158" data-dcnode-id="1482" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1.jpeg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1.jpeg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-150x101.jpeg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-300x201.jpeg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-768x515.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-1024x686.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-330x221.jpeg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-296x197.jpeg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-690x463.jpeg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-1050x704.jpeg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/best-headlamps-gear-patrol-lead-retina-1-865x580.jpeg 865w" height="388" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20388%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Let this light guide you in the darkest of places Samwise.</span></figcaption></figure></div><h3 data-dcnode-id="1476" id="h-38-stash-copies-of-your-passport-and-visas"><span data-dcnode-id="1477" instrument_node="">38. Stash copies of your passport and visas</span></h3><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">A nightmare scenario for backpackers involves losing a passport. Nobody wants that. That said, it does happen and having copies of your passport and other important documents will really help you get by until you have a replacement passport.</span></p><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Furthermore, in certain countries like Pakistan, you need to have copies of your passport on hand to give to police at checkpoints.</span></p><p data-dcnode-id="1467"><span data-dcnode-id="1471" instrument_node="">An expert traveler has this mentality: </span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">hope for the best, prepare for the worst</span></em><span data-dcnode-id="1468" instrument_node="">. It’s a very important piece of advice for backpacking. Even if you don’t end up needing copies of your passport during the course of a trip, it is always a good habit to have them around anyway.</span></p><h3 data-dcnode-id="1465" id="h-39-pack-a-first-aid-kit"><span data-dcnode-id="1466" instrument_node="">39. Pack a first aid kit</span></h3><p data-dcnode-id="1460"><span data-dcnode-id="1464" instrument_node="">Having a </span><a class="ek-link" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/wilderness-survival/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1463" instrument_node="">well-stocked first aid kit</span></a><span data-dcnode-id="1461" instrument_node=""> is always a good idea. Inevitably you or a fellow backpacker will slip with the knife whilst chopping onions, burn a hand on a hot stove, have itchy bug bites, get a scrape from a hiking fall, or twist an ankle after a drunken mishap on the stairs. Shit happens.</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">With a first-aid kit handy, you’ll have everything you need to manage minor incidents as they happen without having to rely on other people (or an unnecessary trip to the local hospital).</span></p><div class="product-plug product-plug__light-blue component-margin" data-dcnode-id="1431" id=""><div class="product-plug__title" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node=""> DON'T DIE OUT THERE! …Please 🙂</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1432"><div class="product-plug__image" data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node=""> </span><picture data-dcnode-id="1452"><source data-dcnode-id="1454" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="packable travel medical kit" class="lazyload" data-dcnode-id="1453" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1433"><p data-dcnode-id="1447"><span data-dcnode-id="1450" instrument_node="">Things go wrong on the road ALL THE TIME. </span><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Be prepared for what life throws at you.</span></strong></p><p data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node="">Buy an </span><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">AMK Travel Medical Kit</span></strong><span data-dcnode-id="1443" instrument_node=""> before you head out on your next adventure – don’t be daft!</span></p><span data-dcnode-id="1441" instrument_node=""> </span><a class="button button--branded button--rei" data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F113007%252Fadventure-medical-kits-mountain-series-backpacker-medical-kit%26ctc%3DREI%2520amk-first-aid-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Buy on REI</span></span></a><span data-dcnode-id="1437" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/HtvA" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Buy on Amazon</span></span></a></div></div></div><h3 data-dcnode-id="1429" id="h-40-carry-generic-antibiotics"><span data-dcnode-id="1430" instrument_node="">40. Carry generic antibiotics</span></h3><p data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">Part of a well-stocked first aid kit should include some basic antibiotics. On a </span><a class="ek-link" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-to-pakistan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1427" instrument_node="">recent trip to Pakistan</span></a><span data-dcnode-id="1425" instrument_node="">, I needed antibiotics within a few days of arriving into the country. Instead of having to go to the hospital with a horrible illness, I was able to mitigate the situation by taking antibiotics as soon as I broke out in a fever.</span></p><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">In big cities of developing countries, antibiotics are cheap and readily available. If you did not have time to pick up antibiotics before leaving your home country, absolutely pick some up in the city where you arrive. That way you don’t find yourself out in some far-flung corner of the country—sick as a dog—without any proper medication. I tend to carry amoxicillin.</span></p><h3 data-dcnode-id="1420" id="h-41-travel-solo-for-a-period-of-time"><span data-dcnode-id="1421" instrument_node="">41. Travel solo for a period of time</span></h3><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">If you can manage it, traveling by yourself can be an extremely rewarding experience. You’ll have the freedom to go where you want, when you want, and how you want. You’ll experience local cultures without any filters that may be created by compatriots. Best of all, you’ll really get to know yourself.</span></p><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">But traveling alone can be difficult because it can be:</span></p><ol data-dcnode-id="1409"><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Lonely</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Expensive</span></li><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Stressful</span></li></ol><p data-dcnode-id="1404"><span data-dcnode-id="1408" instrument_node="">It really comes down to toeing that fine line between being free and secure. If you can set yourself up for success though – by making friends, being flexible, </span><a class="ek-link" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-the-world-on-10-a-day/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1407" instrument_node="">and traveling on a budget</span></a><span data-dcnode-id="1405" instrument_node=""> – then you’ll soar.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1403" instrument_node="">We’ll be releasing a list of the best places to travel alone soon. In the meantime though, my top choice would be Europe. For travel tips on doing this, you can</span><a class="ek-link" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelandleisure.com/trip-ideas/solo-travel/best-european-cities-solo-travelers%23stockholm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1402" instrument_node=""> read this article here.</span></a></p><div class="wp-block-image wp-image-90766" data-dcnode-id="1393"><figure class="aligncenter size-full is-resized" data-dcnode-id="1394"><noscript data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller.jpg" alt="Backpacking solo in Brazil" class="wp-image-90766" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Backpacking solo in Brazil" class="lazyload wp-image-90766" data-dcnode-id="1397" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/04/5-Brazil-Solo-Traveller-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">You will learn and you will grow.</span></figcaption></figure></div><h3 data-dcnode-id="1391" id="h-42-visit-the-free-attractions"><span data-dcnode-id="1392" instrument_node="">42. Visit the free attractions</span></h3><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">All destinations around the world have awesome free things to do. You don’t need to spend any money on activities to have a good day. Here’s a wholde damn list of things you can do for free:</span></p><ul data-dcnode-id="1374"><li data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Explore city parks.</span></li><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Go to museums on days where admission is free.</span></li><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Catch some live music at a bar.</span></li><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Walk through open-air markets (the sweet treats aren’t free).</span></li><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Take free city walking tours.</span></li><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Visit beautifully constructed churches/mosques/religious buildings.</span></li><li data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Take the time to just wander around taking photographs.</span></li></ul><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Keep the awesome free backpacking tips coming!</span></p><div class="wp-block-image wp-image-42105" data-dcnode-id="1365"><figure class="aligncenter size-full is-resized" data-dcnode-id="1366"><noscript data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1.jpg" alt="best travel tips" class="wp-image-42105" width="580" height="392" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-300x203.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-768x519.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-330x223.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-690x467.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="best travel tips" class="lazyload wp-image-42105" data-dcnode-id="1369" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-300x203.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-768x519.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-330x223.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Waterfall_in_the_Grotte_Parc_des_Buttes-Chaumont_Paris_19e_140427_1-690x467.jpg 690w" height="392" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20392%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Discovering beautiful (free) parks in Paris</span></figcaption></figure></div><h3 data-dcnode-id="1363" id="h-43-travel-with-a-notebook-and-pen"><span data-dcnode-id="1364" instrument_node="">43.&nbsp; Travel with a notebook and pen</span></h3><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Traveling with a notebook and something to write with is very handy indeed. If you’re like me, you may find you get a lot of ideas on the road and having a way to record your thoughts is invaluable.</span></p><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Journaling is a great practice to have whilst traveling as well. A single journal entry can transport you back in time to that very moment when read several years later. Your memory is never as good as your same-day notes are. I follow a bullet-journal system.</span></p><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">I find myself constantly writing down bits of information (not just because I’m a writer). Plus, if you always have paper, you never have an excuse not to write a letter to someone.</span></p><div class="wp-block-image wp-image-101404 size-full" data-dcnode-id="1345"><figure class="aligncenter size-full is-resized" data-dcnode-id="1346"><noscript data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal.jpg" alt="Backpacking tip for first time travelers - keep a journal" class="wp-image-101404" width="580" height="373" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal.jpg 700w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-150x97.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-330x213.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-690x445.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Backpacking tip for first time travelers - keep a journal" class="lazyload wp-image-101404" data-dcnode-id="1354" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal.jpg 700w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-150x97.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-330x213.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/camping-journal-690x445.jpg 690w" height="373" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20373%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1347"><span data-dcnode-id="1353" instrument_node="">Journals are important. </span><br data-dcnode-id="1352"><em data-dcnode-id="1348"><span data-dcnode-id="1351" instrument_node="">Photo: </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1350" instrument_node="">@themanwiththetinyguitar</span></a></em></figcaption></figure></div><h3 data-dcnode-id="1343" id="h-44-employ-earplugs"><span data-dcnode-id="1344" instrument_node="">44. Employ earplugs</span></h3><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Have you ever spent a night in a room with someone who sounds like the devil is trying to escape through their throat? It fucking sucks. When you are constantly sleeping in hostels, dealing with people snoring is a fact of life. Sleep deprivation&nbsp;never makes for an enthusiastic or happy backpacker.</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Bring along several pairs of earplugs and fight the good fight for a decent sleep. I promise you earplugs make the world of difference!</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Be sure to try the earplugs before you use them on a backpacking trip. They should be comfortable and most importantly, they should work! I prefer foam earplugs myself.</span></p><h3 data-dcnode-id="1335" id="h-45-use-a-water-filter"><span data-dcnode-id="1336" instrument_node="">45. Use a water filter</span></h3><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Portable water filters like a Grayl Geopress&nbsp;are extremely useful at times when clean water is scarce. They take up virtually no space within your backpack.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Also, using a water filter is a great way to avoid buying single-use plastic containers. Whether you are hiking or in a city, water filters save you money, keep you healthy, and help the environment.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Think of it this way, for the price of buying a month’s worth of plastic water bottles, you can own a water filter that you’ll use again and again. That’s a pretty massive deal!</span></p><div class="product-plug product-plug__black component-margin" data-dcnode-id="1293" id="grayl-plug"><div class="product-plug__title" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node=""> Save $$$ • Save the Planet • Save Your Stomach!</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1294"><div class="product-plug__image" data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node=""> </span><picture data-dcnode-id="1323"><source data-dcnode-id="1325" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="Grayl Geopress Water Purifier Bottle" class="lazyload" data-dcnode-id="1324" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/205416/Grayl-Geopress-Water-Purifier-Bottle-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='588'%20width='481'%20viewBox='0%200%20481%20588'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='481'%20height='588'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1295"><p data-dcnode-id="1315"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Drink water from ANYWHERE.</span></strong><span data-dcnode-id="1319" instrument_node=""> The Grayl Geopress is the market’s leading filtered water bottle protecting your tum from </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">all</span></em><span data-dcnode-id="1316" instrument_node=""> the waterborne nasties. PLUS, you save money and the environment!</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1314" instrument_node="">Single-use plastic bottles are a MASSIVE threat to marine life. Be a part of the solution and </span><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">travel with a filter water bottle.</span></strong></p><p data-dcnode-id="1304"><span data-dcnode-id="1310" instrument_node="">We’ve tested the Geopress&nbsp;</span><em data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">rigorously&nbsp;</span></em><span data-dcnode-id="1307" instrument_node="">from the icy heights of Pakistan to the tropical jungles of Cuba, and the results are in: it WORKS. Buy a Geopress: </span><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">it’s the last water bottle you’ll ever buy.</span></strong></p><span data-dcnode-id="1303" instrument_node=""> </span><a class="button button--branded button--grayl" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F150116%252Fgrayl-geopress-water-purifier-bottle-24-fl-oz%26ctc%3Dgrayl-geopress-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Buy a Geopress!</span></span></a><span data-dcnode-id="1299" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/grayl-geopress-review/" rel="noopener" target="_blank"><span data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Read the Review</span></span></a></div></div></div><h3 data-dcnode-id="1291" id="h-46-bring-a-sleeping-pad"><span data-dcnode-id="1292" instrument_node="">46. Bring a sleeping pad</span></h3><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Sleeping pads are not just great for camping. They’re useful in any situation that may be uncomfortable to sleep in.</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Let’s say you have a long layover in Kuala Lumpur (everyone does, seriously; KLA can burn in a fire) and are contemplating sleeping on the ground. Well, good thing you packed your sleeping pad! (Must’ve been that great airport travel tip you read about.)</span></p><p data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">Or, maybe you’re a group of three and accidentally booked a room that sleeps two. “</span><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Don’t worry guys, I’ll sleep on the ground with my self-inflating mattress. Y’all can buy me dinner tomorrow.</span></em><span data-dcnode-id="1283" instrument_node="">”</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">Honestly, packing one of these is a game-changer, as you’ll be able to sleep soundly just about anywhere. That’s professional backpacking advice right there. Here’s our roundup of the </span><a class="ek-link" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-sleeping-pads-for-backpacking/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1280" instrument_node="">best sleeping pads for backpacking</span></a><span data-dcnode-id="1278" instrument_node="">.</span></p><div class="wp-block-image wp-image-60136" data-dcnode-id="1270"><figure class="aligncenter size-full is-resized" data-dcnode-id="1271"><noscript data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091.jpg" alt="Sleeping pad floating in a pool" class="wp-image-60136" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Sleeping pad floating in a pool" class="lazyload wp-image-60136" data-dcnode-id="1274" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091.jpg 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSC05091-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">They float too!</span></figcaption></figure></div><h3 data-dcnode-id="1268" id="h-47-find-free-wifi"><span data-dcnode-id="1269" instrument_node="">47. Find free WiFi</span></h3><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Let’s be honest. WiFi is important for travelers. You should know how to find free WiFi (that doesn’t require you to purchase anything to use). Here are some places that nearly always have free WiFi:</span></p><ul data-dcnode-id="1255"><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Libraries</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Sometimes coffee shops will let you use WiFi without buying anything</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Mcdonald’s and other big fast food chains have free WiFi (WiFi should be the only reason you ever set foot in a Mcdonald’s)</span></li><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Many airports offer free internet connections</span></li><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Some downtown areas of big cities now offer free wifi too.</span></li></ul><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">When using public wifi, I highly recommend using a VPN to protect yourself from data thieves. You never know who is on a public wifi network with zero security.</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">I always have a VPN ready to go on both my phone and laptop, I personally use&nbsp;</span><a class="ek-link" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/tUdZm8t" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1251" instrument_node="">Hide Me</span></a><span data-dcnode-id="1249" instrument_node="">&nbsp;which is one of the fastest and most reliable options out there. This particular VPN allows for up to five connections, handy for keeping all devices connected without&nbsp;purchasing multiple VPN packages.</span></p><div class="wp-block-image wp-image-62735" data-dcnode-id="1241"><figure class="aligncenter size-full is-resized" data-dcnode-id="1242"><noscript data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060.jpg" alt="Tips for backpackers - find free WiFi" class="wp-image-62735" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Tips for backpackers - find free WiFi" class="lazyload wp-image-62735" data-dcnode-id="1245" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-1050x788.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/wifi-787060-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Sweet, delicious WiFi.</span></figcaption></figure></div><h3 data-dcnode-id="1239" id="h-48-travel-with-a-sleeping-bag-liner"><span data-dcnode-id="1240" instrument_node="">48. Travel with a sleeping bag liner</span></h3><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Sleeping bag liners are basically soft bed-sheet like cocoons that add a few degrees of warmth to your sleeping bag and crucially keep you from touching anywhere not-so-clean you may have to sleep.</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">When times get tough, they are also totally necessary when sleeping at un-hygienic hostels. If you arrive at a hostel/guesthouse/hut and the sleeping conditions are not the cleanest, you simply whip out your liner (which the French call a ” meat bag”) and avoid coming in direct contact with the mattress or unclean sheets below.</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node="">You can pretty much sleep anywhere and be sure that you’ll have some sort of a barrier between you and whatever you have to sleep on. Here’s our review of the </span><a class="ek-link" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-sleeping-bag-liners/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1233" instrument_node="">best sleeping bag liners</span></a><span data-dcnode-id="1231" instrument_node="">.</span></p><h3 data-dcnode-id="1228" id="h-49-keep-in-touch-with-people-that-you-meet"><span data-dcnode-id="1229" instrument_node="">49. Keep in touch with people that you meet</span></h3><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">I’ll be the first to admit that a lot of relationships that you form on the road are pretty vapid. Most people are just blips on the radar; acquaintances that may be good for a wild night out or for visiting a temple or two.</span></p><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">In these cases, I don’t blame people for not following up.</span></p><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">But there are some people that you have a genuinely awesome time with – people that you vibe with, share the same interests, maybe even have amorous possibilities.</span></p><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">In these situations, my traveling advice is to pursue these rad folks. Try to travel with them some more! Organize a meetup in a different country! Host them in your own home if they ever pass through!</span></p><p data-dcnode-id="1216"><a class="ek-link" data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-find-a-travel-buddy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1219" instrument_node="">I have lots of travel buddies.</span></a><span data-dcnode-id="1217" instrument_node=""> Maybe 1 in 10 of them are people that I call friends. For me, that’s a pretty good ratio.</span></p><p data-dcnode-id="1213"><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Understand that friends come and go, but for the precious few you should hold on. Work hard to bridge the gaps in geography and lifestyle.</span></em></p><div class="wp-block-image wp-image-140207" data-dcnode-id="1197"><figure class="aligncenter size-full is-resized" data-dcnode-id="1198"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/furysuri/" rel="nofollow" target="_blank"><noscript data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise.jpg" alt="Friends backpacking in Sri Lanka" class="wp-image-140207" width="580" height="390" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise.jpg 1442w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-300x202.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-768x517.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-1024x689.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-690x464.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-1050x706.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-862x580.jpg 862w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Friends backpacking in Sri Lanka" class="lazyload wp-image-140207" data-dcnode-id="1210" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise.jpg 1442w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-150x101.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-300x202.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-768x517.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-1024x689.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-330x222.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-690x464.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-1050x706.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/10/006-sri-lanka-yoga-sunrise-862x580.jpg 862w" height="390" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20390%22%3E%3C/svg%3E" width="580"></a><figcaption data-dcnode-id="1199"><em data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Because the older you get, the more you need the people you knew when you were young.</span></em><br data-dcnode-id="1206"><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Photo</span></em><span data-dcnode-id="1203" instrument_node="">: </span><em data-dcnode-id="1200"><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/furysuri/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1202" instrument_node="">@furysuri</span></a></em></figcaption></figure></div><h3 data-dcnode-id="1195" id="h-50-read-up-on-the-country-you-are-visiting"><span data-dcnode-id="1196" instrument_node="">50. Read up on the country you are visiting</span></h3><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Gaining a basic understanding of the history and culture of where you plan to go backpacking is important. An important tip is to always prepare for your backpacking trip.</span></p><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The more you know about a place, the more you can appreciate and enjoy it. Having knowledge about your destination can also help you break down barriers with locals. If you show a genuine interest in their country, they are more likely to open up to you.</span></p><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Becoming familiar with places and the history of those places offers up the chance to connect with the country even before you set foot there. Plus, reading up on a place is a sure way to get yourself amped to go backpacking.</span></p><div class="wp-block-image wp-image-13441" data-dcnode-id="1182"><figure class="aligncenter size-full is-resized" data-dcnode-id="1183"><noscript data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking.jpg" alt="Tibetan flags and the Himalayas" class="wp-image-13441" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Tibetan flags and the Himalayas" class="lazyload wp-image-13441" data-dcnode-id="1186" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/01/nepal-hiking-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">What the hell do those prayer flags symbolize? Read up on it to find out 😉</span></figcaption></figure></div><h3 data-dcnode-id="1180" id="h-51-listen-to-podcasts"><span data-dcnode-id="1181" instrument_node="">51. Listen to podcasts</span></h3><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Long bus rides, rainy afternoons, flights, train journeys, beach loafing—at each instance you have downtime on your hands. Podcasts are awesome for keeping yourself informed, engaged, and entertained on any long journey. You can find a podcast on just about every subject these days.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Whether it is staying up with world politics, listening to a comedy show, or going deep within a series of TED Talks, podcasts are great for killing time.</span></p><p data-dcnode-id="1172"><span data-dcnode-id="1175" instrument_node="">Be sure to download podcasts over wifi before traveling so you can access them offline later. </span><a class="ek-link" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-headphones/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1174" instrument_node="">And take a good pair of headphones!</span></a></p><div class="box-shortcode box-shortcode__red component-margin" data-dcnode-id="1148"><div class="box-shortcode__title" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Get Your Copy of the Backpacker Bible Totally FREE!</span></div><div class="box-shortcode__content box-shortcode--one-column" data-dcnode-id="1149"><div class="box-shortcode__column-1" data-dcnode-id="1150"><p data-dcnode-id="1162"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-the-world-on-10-a-day/" rel="noopener" target="_blank"><noscript data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&lt;img class="alignright wp-image-441743" src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/09/tbb-bible-plug-creative.jpg" alt="" width="280" height="280" srcset="https://www.thebro
