eelchair-delivery-p1-1050x590.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1033x580.jpg 1033w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Backpacking tip for old self - leave the airport" class="lazyload wp-image-175789" data-dcnode-id="2003" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-300x168.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1024x575.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-768x431.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1536x862.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-330x185.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-690x387.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1050x590.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/007-travel-for-free-wheelchair-delivery-p1-1033x580.jpg 1033w" height="325" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20325%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1996"><span data-dcnode-id="2002" instrument_node="">Two nights in Kuala Lumpur airport… perhaps I should have gone for a walk.</span><br data-dcnode-id="2001"><em data-dcnode-id="1997"><span data-dcnode-id="2000" instrument_node="">Photo: </span><a aria-label="@themanwiththetinyguitar (opens in a new tab)" class="ek-link" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1999" instrument_node="">@themanwiththetinyguitar</span></a></em></figcaption></figure></div><h3 data-dcnode-id="1992" id="h-16-look-for-food-and-drink-specials"><span data-dcnode-id="1993" instrument_node="">16. Look for food and drink specials</span></h3><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">It’s always happy hour somewhere guys! (Am I right?) There’s always some sort of special deal going on down the street and on certain days of the week. Granted, not every country or city celebrates happy hour but that doesn’t mean that aren’t other savings around.</span></p><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">So do your research, ask locals, and look for deals around town. Amass coupons and check online for nightly specials. As one local once told me: “</span><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Only suckers pay full price.</span></em><span data-dcnode-id="1986" instrument_node="">”&nbsp;This is a tip for saving money backpacking to not ignore.</span></p><h3 data-dcnode-id="1983" id="h-17-cook-your-own-food"><span data-dcnode-id="1984" instrument_node="">17. Cook your own food</span></h3><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Want to learn an important secret to traveling long term? Learn to cook budget meals for yourself!</span></p><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">Eating out at restaurants every single night in any country will eat into your budget big time. If you are </span><a class="ek-link" data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-europe-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1979" instrument_node="">backpacking in Europe</span></a><span data-dcnode-id="1977" instrument_node=""> for a couple of months, there is simply no way you can eat out every night without blowing through money.</span></p><p data-dcnode-id="1971"><span data-dcnode-id="1975" instrument_node="">Moreover, eating out consistently for more than a couple weeks probably isn’t the healthiest option. Learn </span><a class="ek-link" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/wilderness-cooking-101/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1974" instrument_node="">how to cook your own food on the road</span></a><span data-dcnode-id="1972" instrument_node=""> and you will make new friends in the hostel kitchen, eat well, and save a fuck-ton of money long term.</span></p><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">A backpacker well-versed in healthy budget cooking is always the most popular person at the hostel, so to prepare for your backpacking trip, learn a few cheap and easy recipes before you take off</span></p><div class="wp-block-image wp-image-62730" data-dcnode-id="1962"><figure class="aligncenter size-full is-resized" data-dcnode-id="1963"><noscript data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875.jpg" alt="Best travel yip - cook for yourself" class="wp-image-62730" width="450" height="450" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-150x150.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-300x300.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-768x768.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-1024x1024.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-330x330.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-690x690.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-1050x1050.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-580x580.jpg 580w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript><img alt="Best travel yip - cook for yourself" class="lazyload wp-image-62730" data-dcnode-id="1966" data-sizes="(max-width: 450px) 100vw, 450px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-150x150.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-300x300.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-768x768.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-1024x1024.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-330x330.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-690x690.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-1050x1050.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/lunch_egg_tomato_cooking_mushroom-55875-580x580.jpg 580w" height="450" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20450%20450%22%3E%3C/svg%3E" width="450"><figcaption data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Cooking healthy food on a budget is easy… Make an awesome meal for the fraction of the cost of eating out.</span></figcaption></figure></div><h3 data-dcnode-id="1960" id="h-18-learn-how-to-use-a-keffiyeh"><span data-dcnode-id="1961" instrument_node="">18. Learn how to use a keffiyeh</span></h3><p data-dcnode-id="1955"><span data-dcnode-id="1959" instrument_node="">I used to judge those dudes who would show up to parties in a </span><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">keffiyeh</span></em><span data-dcnode-id="1956" instrument_node="">. You know, those guys who rock a black v-neck, cargo pants, a fedora, and this military-looking scarf.</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">While I still get irked a bit when I see one of these scarfs in a lounge or restaurant, I’ve found that they </span><a class="ek-link" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stepfeed.com/8-little-known-facts-about-the-keffiyeh-2456" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1953" instrument_node="">are extremely useful in general</span></a><span data-dcnode-id="1951" instrument_node="">. I now include them almost always in my packing travel tips.</span></p><p data-dcnode-id="1942"><span data-dcnode-id="1949" instrument_node="">Seriously, you can do so much with one of these scarfs while traveling. They can be used as an extra blanket, a headdress, a </span><em data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">sarong</span></em><span data-dcnode-id="1946" instrument_node=""> (for temples), as a sling; all of that and then some. Honestly, I never travel anywhere without one of these accessories now and I fear that I too will soon show up to a club in one… Another trave; tip for backpacking packing is </span><a class="ek-link" data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-harem-pants-in-2019/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1945" instrument_node="">harem pants</span></a><span data-dcnode-id="1943" instrument_node=""> – they’re so comfortable, light, and dry super fast!</span></p><h3 data-dcnode-id="1940" id="h-19-bring-a-stove-to-make-cooking-real-easy"><span data-dcnode-id="1941" instrument_node="">19. Bring a stove (to make cooking real easy)</span></h3><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">When a hostel kitchen isn’t an option, you’ll still need a way to cook.</span></p><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Having a small lightweight backpacking stove means you can make a coffee, cook a meal, and even heat up water to wash your face no matter where you are. Emphasis on the coffee! No need to buy a latte every single day; just another way to kill your long-term budget.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">If you are trekking, having a backpacking stove is absolutely essential.</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">For backpackers looking to have real freedom, adding a stove to </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-packing-list/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1932" instrument_node="">your gear checklist</span></a><span data-dcnode-id="1930" instrument_node=""> is just another step to self-sufficiency and an important travel tip for long-term backpacking.</span></p><p data-dcnode-id="1918"><span data-dcnode-id="1928" instrument_node="">Check out the </span><a class="ek-link" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-backpacking-stove/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1927" instrument_node="">best backpacking stoves for traveling</span></a><span data-dcnode-id="1925" instrument_node=""> here. My two personal go-to stoves are the&nbsp;</span><a class="ek-link" data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/jDZhb6" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1924" instrument_node="">MSR Pocket Rocket 2</span></a><span data-dcnode-id="1922" instrument_node="">&nbsp;and my&nbsp;</span><a class="ek-link" data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/jetboil" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1921" instrument_node="">Jetboil</span></a><span data-dcnode-id="1919" instrument_node="">.</span></p><div class="wp-block-image wp-image-18846" data-dcnode-id="1911"><figure class="aligncenter size-full is-resized" data-dcnode-id="1912"><noscript data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o.jpg" alt="Cooking stove for backpackers" class="wp-image-18846" width="580" height="372" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o.jpg 1400w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-150x96.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-768x494.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-1024x658.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-330x212.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-690x444.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-1050x675.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-902x580.jpg 902w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Cooking stove for backpackers" class="lazyload wp-image-18846" data-dcnode-id="1915" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o.jpg 1400w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-150x96.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-300x193.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-768x494.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-1024x658.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-330x212.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-690x444.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-1050x675.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2017/03/6246570011_100445997a_o-902x580.jpg 902w" height="372" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20372%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Coffee. Anywhere. Sorted.</span></figcaption></figure></div><h3 data-dcnode-id="1909" id="h-20-pack-synthetic-clothing"><span data-dcnode-id="1910" instrument_node="">20. Pack synthetic clothing</span></h3><p data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node="">Ever heard the expression </span><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">rotten cotton</span></em><span data-dcnode-id="1905" instrument_node="">? It refers to the fact that cotton materials degrade rapidly after heavy use and exposure to certain elements like heat and water.</span></p><p data-dcnode-id="1897"><span data-dcnode-id="1903" instrument_node="">Now, guess what popular backpacking destinations </span><a class="ek-link" data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-central-america-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1902" instrument_node="">like Central America</span></a><span data-dcnode-id="1900" instrument_node=""> or Southeast Asia have lots of? You guessed them – </span><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">the sun and the ocean. </span></strong></p><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">I guarantee you that your cotton singlet and your whitey tighties will fall to shreds after a month of backpacking in places like these. By the end of the third month, you will be a shell of your former self – a bumbling Robinson Crusoe clinging to nothing but a loincloth.</span></p><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Synthetic clothing is much more durable and much easier to wash than cotton clothing. A couple of good synthetic shirts and pants will last you much longer and will not fail you as quickly. You’ll need to be careful around hot irons though so make sure you tell the person cleaning your clothes.</span></p><h3 data-dcnode-id="1891" id="h-21-make-sure-your-backpack-has-a-rain-cover-and-bring-a-rain-jacket"><span data-dcnode-id="1892" instrument_node="">21. Make sure your backpack has a rain cover and bring a rain jacket</span></h3><p data-dcnode-id="1886"><span data-dcnode-id="1890" instrument_node="">When the skies open up and the rain pours down you need to protect your stuff. Unless you are traveling to the desert or some other dry place, it will rain at some point during a multi-month trip. Regardless of where I am traveling, I </span><em data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">always</span></em><span data-dcnode-id="1887" instrument_node=""> have a rain cover with me.</span></p><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Without fail, as soon as you visit the driest place on earth without a rain cover, that’s the afternoon when it rains for the first time in 200 years. You get my point. Rain seems to come in especially vicious torrents when somebody is unprepared for it.</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">You need some way to keep your shit dry so if your backpack is NOT at least water-resistant, it is worth buying a rain cover.</span></p><div class="wp-block-image wp-image-113132" data-dcnode-id="1875"><figure class="aligncenter size-full is-resized" data-dcnode-id="1876"><noscript data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408.jpg" alt="Packing dry clothes for waterfall exploring" class="wp-image-113132" width="700" height="232" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-150x50.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-300x100.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-768x255.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-1024x340.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-330x109.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-690x229.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-1050x348.jpg 1050w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="Packing dry clothes for waterfall exploring" class="lazyload wp-image-113132" data-dcnode-id="1879" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-150x50.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-300x100.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-768x255.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-1024x340.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-330x109.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-690x229.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/08/waterfall_rainbow_spray_water_flow_cascade_person_freedom-874062-e1565463898408-1050x348.jpg 1050w" height="232" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20232%22%3E%3C/svg%3E" width="700"><figcaption data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">I am dryyyyyy!</span></figcaption></figure></div><h3 data-dcnode-id="1873" id="h-22-wash-your-own-clothes"><span data-dcnode-id="1874" instrument_node="">22. Wash your own clothes</span></h3><p data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node="">If you’re looking for some </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/budget-backpacking-101/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1871" instrument_node="">more budget backpackign travel advice</span></a><span data-dcnode-id="1869" instrument_node="">, then I suggest that you wash your own clothes to save a penny. </span><a class="ek-link" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.tortugabackpacks.com/how-to-do-laundry-while-traveling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1868" instrument_node="">The process isn’t as hard as you think it might be</span></a><span data-dcnode-id="1866" instrument_node=""> and you can make your clothes look pretty crisp with practice.</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">You’ll also avoid losing or ruining your clothes at the hands of the cleaning staff. Stuff always seems to go missing – be it accidental or intentional – when you hand over a giant bag of clothes. Maybe it’s best that you do it yourself then.</span></p><h3 data-dcnode-id="1861" id="h-23-haggle-your-heart-out"><span data-dcnode-id="1862" instrument_node="">23. Haggle your heart out</span></h3><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">For many cultures around the world, haggling is a fact of everyday life. It is just an unwritten fact that the first price is never the best price, and one needs to negotiate.</span></p><p data-dcnode-id="1855"><span data-dcnode-id="1858" instrument_node="">In many countries, there is a local price and a foreigner price. This is not necessarily unfair and I don’t mind paying a small premium – say 10-20% more than a local. But I’m not cool with paying 500% more than the item, service or whatever is worth… India is the worst place I’ve ever been from the point of view of touts attempting INSANE rip off prices: </span><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">you have to hold your ground and haggle.</span></strong></p><p data-dcnode-id="1851"><a class="ek-link" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-haggle-backpackers-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1854" instrument_node="">Knowing how to haggle</span></a><span data-dcnode-id="1852" instrument_node=""> is knowing how to go backpacking. More common than not, vendors at street markets will try to rip you off once they see your face or hear your foreign accent. You have two choices: accept the bullshit price they are quoting you or unleash your haggling game on them.</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">It is important to remember to be reasonable and fair when haggling. Don’t haggle so low for a handicraft that someone else spent hours upon hours crafting. Pay people what they deserve, but at the same time don’t get ripped off. Haggling truly is a finely tuned skill that needs to be developed and it’s a backpacking trick you will master with time</span></p><div class="wp-block-image wp-image-14211" data-dcnode-id="1842"><figure class="aligncenter size-full is-resized" data-dcnode-id="1843"><noscript data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6.jpg" alt="Learn how to haggle - important backpacking tip" class="wp-image-14211" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Learn how to haggle - important backpacking tip" class="lazyload wp-image-14211" data-dcnode-id="1846" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2014/07/FullSizeRender-6-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Haggling for art in Bagan.</span></figcaption></figure></div><h3 data-dcnode-id="1840" id="h-24-bring-toilet-paper-everywhere"><span data-dcnode-id="1841" instrument_node="">24. Bring toilet paper everywhere</span></h3><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">Ah, the infamous </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">squatter</span></em><span data-dcnode-id="1836" instrument_node=""> toilet; what fond memories I have your cavernous portal, your undeniable aroma, the unassuming water can that is intended to clean my glorious nether regions. I cannot tell you how many times I mistakenly walked into on these and immediately regretted not having brought toilet paper with me.</span></p><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">If you’re traveling in an Asian or Middle Eastern country, chances are you will be using a squat toilet. Most likely, said squat toilet will not have toilet paper either. Unless you become a master of watering your own crack or scrub your hand to a nub after doing your business, I suggest you have a roll with you.</span></p><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Another backpacking travel tip is that you can use the toilet paper for other uses, like lighting a campfire, wiping your nose, and cleaning up a food mess. TP sounds pretty necessary now, right?</span></p><div class="product-plug product-plug__red component-margin" data-dcnode-id="1808" id=""><div class="product-plug__title" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node=""> What is the One Item Every Traveller NEEDS???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1809"><div class="product-plug__image" data-dcnode-id="1824"><span data-dcnode-id="1828" instrument_node=""> </span><picture data-dcnode-id="1825"><source data-dcnode-id="1827" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="1826" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1810"><p data-dcnode-id="1820"><span data-dcnode-id="1823" instrument_node="">There is one item every traveller NEEDS. Some travellers don’t even know they need it, </span><strong data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">but those travellers need it more than anyone.</span></strong></p><p data-dcnode-id="1815"><span data-dcnode-id="1819" instrument_node="">What is this forgotten essential of the backpacker-life? SPOILERS! </span><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Guess you’ll just have to click the button to find out.</span></strong><span data-dcnode-id="1816" instrument_node=""> 😉</span></p><span data-dcnode-id="1814" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/ItBhB03" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Find Out What It Is!</span></span></a></div></div></div><h3 data-dcnode-id="1806" id="h-25-hitchhike"><span data-dcnode-id="1807" instrument_node="">25. Hitchhike</span></h3><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Hitchhiking is an exciting and rewarding part of the backpacker experience. It offers up the chance to meet locals and to save tons of money on transportation costs (it’s a crucial budget travel tip). If you are in no huge rush to get somewhere, hitchhiking is an excellent way to go.</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">You never know who is going to stop and pick you up! Knowing that you need to be smart when hitchhiking anywhere in the world. Assholes do exist in every country.</span></p><p data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">I would NOT try to hitchhike in or around major cities. When accepting a ride ALWAYS have your&nbsp;</span><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">spidey</span></em><span data-dcnode-id="1798" instrument_node=""> senses&nbsp;firing. If a person sketches you out, fuck em. You have time.</span></p><p data-dcnode-id="1789"><span data-dcnode-id="1796" instrument_node="">Be polite (don’t say&nbsp;</span><em data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">fuck em</span></em><span data-dcnode-id="1793" instrument_node="">),&nbsp;but turn the ride down all the same. Better to wait for a ride that makes you feel 100% comfortable. Check out my </span><a class="ek-link" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/hitchhiking-101-backpackers-tips/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1792" instrument_node="">mega hitchhiking guide</span></a><span data-dcnode-id="1790" instrument_node=""> for more practical tips.</span></p><div class="wp-block-image wp-image-175517" data-dcnode-id="1777"><figure class="aligncenter size-full is-resized" data-dcnode-id="1778"><noscript data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt.jpg" alt="Hitchhiking in Israel - travel tip for saving money backpacking" class="wp-image-175517" width="580" height="414" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-300x215.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1024x733.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-150x107.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-768x550.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1536x1099.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-330x236.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-690x494.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1050x751.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-811x580.jpg 811w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Hitchhiking in Israel - travel tip for saving money backpacking" class="lazyload wp-image-175517" data-dcnode-id="1786" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-300x215.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1024x733.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-150x107.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-768x550.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1536x1099.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-330x236.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-690x494.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-1050x751.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/ptv-israel-012-eilat-dirtbaggin-opt-811x580.jpg 811w" height="414" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20414%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1779"><span data-dcnode-id="1785" instrument_node="">Fuck ’em. </span><br data-dcnode-id="1784"><em data-dcnode-id="1780"><span data-dcnode-id="1783" instrument_node="">Photo: </span><a aria-label="@betweendistances (opens in a new tab)" class="ek-link" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/betweendistances/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1782" instrument_node="">@betweendistances</span></a></em></figcaption></figure></div><h3 data-dcnode-id="1775" id="h-26-don-t-over-plan"><span data-dcnode-id="1776" instrument_node="">26. Don’t over plan</span></h3><p data-dcnode-id="1770"><span data-dcnode-id="1774" instrument_node="">Leaving room for spontaneity&nbsp;whilst backpacking is very important indeed. </span><a aria-label="Planning your trip (opens in a new tab)" class="ek-link" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-plan-a-trip/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1773" instrument_node="">Planning your trip</span></a><span data-dcnode-id="1771" instrument_node=""> down to the last hour is not practical because having rigid plans where one delay derails the trip is far too stressful to be fun.</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node="">Whilst you </span><em data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">should</span></em><span data-dcnode-id="1766" instrument_node=""> book your accommodation in advance when visiting expensive places during the high season or going somewhere during a festival, don’t over plan your trip.</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">The essence of backpacking is to let events develop and unfold before you. You need to be open and ready for the curve balls life throws at you. A happy backpacker is one who is organized and driven, yet not obsessive in regards to planning and booking shit. Being flexible is just another characteristic of the expert broke backpacker…</span></p><div class="wp-block-image wp-image-50230" data-dcnode-id="1746"><figure class="aligncenter size-full is-resized" data-dcnode-id="1747"><noscript data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9.jpg" alt="Camping in Ireland" class="wp-image-50230" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Camping in Ireland" class="lazyload wp-image-50230" data-dcnode-id="1760" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/06/Briskventure-9-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1748"><span data-dcnode-id="1759" instrument_node="">Go with the flow, maaaaaan. </span><br data-dcnode-id="1758"><em data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Photo</span></em><span data-dcnode-id="1755" instrument_node="">: </span><a aria-label="Kyle Murphy/@briskventure (opens in a new tab)" class="ek-link" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/briskventure/" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Kyle Murphy</span></em><span data-dcnode-id="1752" instrument_node="">/</span><em data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">@briskventure</span></em></a></figcaption></figure></div><h3 data-dcnode-id="1744" id="h-27-get-organized"><span data-dcnode-id="1745" instrument_node="">27. Get organized</span></h3><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">You can always judge the experience of a backpacker by the looks of their backpacks.</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">The novices have their stuff strewn everywhere in a chaotic mess and appear to have no method to their madness. Most likely, there’s a sandal in their diddy bag and a toothbrush in their hiking boot.</span></p><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">The veterans have a system in place – their stuff is packed away in space bags, in packing cubes, and in ziplock bags. Hell, some backpackers (like me) even label their individual bags, which may or may not be a sign of sociopathy.</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">Be a pro and </span><a class="ek-link" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-pack-a-backpack/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1736" instrument_node="">prepare for a backpacking trip properly</span></a><span data-dcnode-id="1734" instrument_node="">. Organize your stuff and save yourself the stress (and embarrassment) of repacking it haphazardly. You’ll gain some peace of mind and will be better prepared when you need to move on.</span></p><div class="wp-block-image wp-image-152472" data-dcnode-id="1726"><figure class="aligncenter size-full is-resized" data-dcnode-id="1727"><noscript data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358.jpg" alt="Nomatic Toiletry bag - excellent traveler packing" class="wp-image-152472" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Nomatic Toiletry bag - excellent traveler packing" class="lazyload wp-image-152472" data-dcnode-id="1730" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/untitled-7-of-1358-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Such organization… I’m a little bit turned on.</span></figcaption></figure></div><h3 data-dcnode-id="1724" id="h-28-pack-a-power-bank-external-battery"><span data-dcnode-id="1725" instrument_node="">28. Pack a power bank/external battery</span></h3><p data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">In the developing world, electricity cuts are sudden and frequent. Having a </span><a class="ek-link" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/ravebattery" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1722" instrument_node="">power bank</span></a><span data-dcnode-id="1720" instrument_node=""> to keep your electronics charged on the road is an integral tip for backpacking.</span></p><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">I’ve done 30+ hour bus and train journeys… when you run out of power, it sucks.</span></p><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Some power banks can be bulky and heavy. Depending on what your electricity needs are, I recommend going with an external battery that has multiple USB ports so you can charge several devices at one time.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">For long bus/plane/train rides, power banks keep all of your devices charged and ready to go. If you’re on the trails, you can use your power bank for your camera. Don’t forget to charge your power bank before embarking on long journeys!</span></p><h3 data-dcnode-id="1711" id="h-29-go-trekking"><span data-dcnode-id="1712" instrument_node="">29. Go trekking</span></h3><p data-dcnode-id="1707"><a class="ek-link" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/beginners-guide-to-hiking/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1710" instrument_node="">Trekking and hiking</span></a><span data-dcnode-id="1708" instrument_node=""> are two of the most rewarding activities one can do whilst backpacking… Discovering the wild, beautiful landscapes of a country is arguably the best way to connect with that country.</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">The best part? Trekking is very cheap if not free! Apart from paying national park entrance fees, trekking permits, or mountain hut costs, trekking is cheap and accessible for all backpackers.</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Many of my top life experiences have occurred on various trekking adventures around the world. All you need is some motivation, your own two legs, and the right gear.</span></p><div class="wp-block-image wp-image-62726" data-dcnode-id="1690"><figure class="aligncenter size-full is-resized" data-dcnode-id="1691"><noscript data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1.jpg" alt="Trekking in mountains" class="wp-image-62726" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Trekking in mountains" class="lazyload wp-image-62726" data-dcnode-id="1700" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1.jpg 2000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-1024x682.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/DSCF0590-1-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1692"><span data-dcnode-id="1699" instrument_node="">You don’t need a ton of stuff to enjoy this.</span><br data-dcnode-id="1698"><em data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Photo</span></em><span data-dcnode-id="1695" instrument_node="">: </span><em data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Ralph Cope</span></em></figcaption></figure></div><h3 data-dcnode-id="1688" id="h-30-talk-to-locals"><span data-dcnode-id="1689" instrument_node="">30. Talk to locals</span></h3><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Far too often there is a divide between backpackers and locals. Certainly, every backpacker wants an authentic travel experience, and connecting with locals is a great way to get the most out of your travels.</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Being on your phone is the best way to miss out on interactions and spontaneous connections – don’t waste all your time on your phone or use it as a social crux to hide anxiety (I have at times been guilty of this)… Break free from phone addiction and get back to the real purpose of traveling; meeting people and having mind-expanding experiences. (Not buying a SIM card is a backpacking tip to force this.)</span></p><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Don’t let your only interaction with locals be from ordering food at a restaurant or buying a beer in a shop. Take the time to stop and talk with locals. Try to bridge the language gap if possible.</span></p><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Ask questions about their reality. Find out what they like to eat. Learn about what they enjoy doing in the place where they live.</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">After years of doing just that, you will find that you have gleaned a collective amount of wisdom from folks around the world – a priceless part of the travel experience.&nbsp;</span><a aria-label="Couchsurfing is an epic way to meet local people (opens in a new tab)" class="ek-link" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/couchsurfing-reviews-tips/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1678" instrument_node="">Couchsurfing is an epic way to meet local people</span></a><span data-dcnode-id="1676" instrument_node="">.</span></p><div class="wp-block-image" data-dcnode-id="1661"><figure class="aligncenter size-full is-resized" data-dcnode-id="1662"><noscript data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n.jpg" alt="backpacking cuba" class="wp-image-55394" width="479" height="600" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-120x150.jpg 120w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-240x300.jpg 240w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-768x960.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-819x1024.jpg 819w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-330x413.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-690x863.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-1050x1313.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-464x580.jpg 464w" sizes="(max-width: 479px) 100vw, 479px" /&gt;</span></noscript><img alt="backpacking cuba" class="lazyload wp-image-55394" data-dcnode-id="1672" data-sizes="(max-width: 479px) 100vw, 479px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n.jpg 1080w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-120x150.jpg 120w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-240x300.jpg 240w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-768x960.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-819x1024.jpg 819w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-330x413.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-690x863.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-1050x1313.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/08/27578941_1004600676360914_8872878829777977344_n-464x580.jpg 464w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20479%20600%22%3E%3C/svg%3E" width="479"><figcaption data-dcnode-id="1663"><span data-dcnode-id="1671" instrument_node="">Hanging out with this local dude in Cuba. </span><br data-dcnode-id="1670"><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Photo</span></em><span data-dcnode-id="1667" instrument_node="">: </span><em data-dcnode-id="1664"><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/keshph/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1666" instrument_node="">Andrea Cacciatori/@keshph</span></a></em></figcaption></figure></div><h3 data-dcnode-id="1659" id="h-31-get-the-touristy-stuff-out-of-the-way-first"><span data-dcnode-id="1660" instrument_node="">31. Get the touristy stuff out of the way first</span></h3><p data-dcnode-id="1654"><span data-dcnode-id="1658" instrument_node="">As much as </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/overrated-travel-experiences/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1657" instrument_node="">touristy places irritate me</span></a><span data-dcnode-id="1655" instrument_node=""> – with their crowds and insistent panhandlers – sometimes you just gotta do them. After all, how can you travel to Rome and not see the Colosseum or San Francisco and not see the Golden Gate? Attractions like this are worth your attention, but not all of it.</span></p><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">When I travel to a really famous city, I spend the first day knocking out as many tourist attractions as I can. That way, I can spend the rest of my time actually exploring a city and enjoying it.</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">With no commitments, I can visit the little intimate restaurants, the overlooked art galleries, and whatnot. Best of all, I won’t feel pressured to see or do anything.</span></p><div class="wp-block-image wp-image-42172" data-dcnode-id="1643"><figure class="aligncenter size-full is-resized" data-dcnode-id="1644"><noscript data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower.jpg" alt="The Eiffel Tower while backpacking in France" class="wp-image-42172" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-690x460.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="The Eiffel Tower while backpacking in France" class="lazyload wp-image-42172" data-dcnode-id="1647" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/04/Tour_eiffel_paris-eiffel_tower-690x460.jpg 690w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Get in and get out quick.</span></figcaption></figure></div><h3 data-dcnode-id="1641" id="h-32-couchsurf"><span data-dcnode-id="1642" instrument_node="">32. Couchsurf</span></h3><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">One of my favorite ways to meet locals and save some cash is to use&nbsp;Couchsurfing. Couchsurfing truly is one of the best tools available to help save you money traveling. Plus, you are always bound to meet interesting people!</span></p><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">If you really want to experience life with a local, I can’t recommend Couchsurfing enough. Couchsurfing has opened up so many awesome friendships for me over the years that I have lost count.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Sure you save money, but the real reason to Couchsurf is to meet new folks and gain new insights into what life is like for people living in any given place. You can make life-long friends through the platform as well as gain a perspective you would have otherwise never considered.</span></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Let me be clear. Couchsurfing hosts are NOT free hostels. You are NOT entitled to a free place to stay. Make sure you do something for your host; any of these:</span></p><ul data-dcnode-id="1620"><li data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Offer to cook a meal or two.</span></li><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Chip in for groceries.</span></li><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Bring a bottle of wine.</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Clean up after yourself.</span></li><li data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Peel the potatoes.</span></li><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Be flexible with their schedule.</span></li></ul><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Just do something!</span></p><div class="wp-block-image wp-image-10298" data-dcnode-id="1611"><figure class="aligncenter size-full is-resized" data-dcnode-id="1612"><noscript data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144.jpg" alt="COuchsurfing in Iran - backpacking tip for first time backpackers" class="wp-image-10298" width="580" height="434" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-150x112.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-330x247.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-690x517.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-774x580.jpg 774w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="COuchsurfing in Iran - backpacking tip for first time backpackers" class="lazyload wp-image-10298" data-dcnode-id="1615" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-150x112.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-1024x768.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-330x247.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-690x517.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2016/09/IMG_2144-774x580.jpg 774w" height="434" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20434%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">With my Iranian host…</span></figcaption></figure></div><h3 data-dcnode-id="1609" id="h-33-hide-your-money"><span data-dcnode-id="1610" instrument_node="">33. Hide your money</span></h3><p data-dcnode-id="1602"><span data-dcnode-id="1608" instrument_node="">I don’t care what other people say, hiding your money in a travel money belt is a great idea. I never hit the road without </span><a class="ek-link" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/f1LPIdB" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1607" instrument_node="">my security belt</span></a><span data-dcnode-id="1605" instrument_node="">. This is a regular looking belt with a concealed pocket on the inside – you can hide up to twenty notes inside and wear it through airport scanners without&nbsp;setting them off. This is hands down the best way to hide your cash</span><del data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">and weed.</span></del></p><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">It is important to remember to actually conceal your money belt if it is more of a pouch than a belt. If you wear it on the outside of your shirt like a fanny pack, you are basically signaling to all the pickpockets within the vicinity exactly where all of your cash and valuables are.</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Use common sense and be discreet about how you wear your travel money belt.</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1597" instrument_node="">Pickpockets the world over are highly skilled individuals. It doesn’t take much of a window for them to rip you off. Protect your cash! Hide it! I’ve written a whole post about </span><a class="ek-link" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-hide-your-money-when-travelling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1596" instrument_node="">how to hide your money on your person!&nbsp;</span></a></p><p data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">Check out this article for more awesome </span><a class="ek-link" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-money-belt/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1592" instrument_node="">travel money belts</span></a><span data-dcnode-id="1590" instrument_node="">.</span></p><div class="product-plug product-plug__light-blue component-margin" data-dcnode-id="1566" id=""><div class="product-plug__title" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node=""> Travel with peace of mind. Travel WITH a security belt.</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1567"><div class="product-plug__image" data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node=""> </span><picture data-dcnode-id="1583"><source data-dcnode-id="1585" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="Active Roots Security Belt" class="lazyload" data-dcnode-id="1584" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/179512/amazon-active-roots-security-belt-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='425'%20width='425'%20viewBox='0%200%20425%20425'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='425'%20height='425'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1568"><p data-dcnode-id="1578"><span data-dcnode-id="1581" instrument_node="">Get your cash stashed with this awesome Pacsafe money belt. It will </span><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">keep your valuables safe no matter where you go.</span></strong></p><p data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node="">It looks exactly like a normal belt&nbsp;</span><em data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">except</span></em><span data-dcnode-id="1574" instrument_node=""> for a SECRET interior pocket perfectly designed to hide a wad of cash or a passport copy. Never get caught with your pants down again! (Unless you want to.)</span></p><span data-dcnode-id="1572" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/146838/pacsafe-cashsafe-travel-belt-wallet" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">View on REI!</span></span></a></div></div></div><h3 data-dcnode-id="1564" id="h-34-wear-good-shoes"><span data-dcnode-id="1565" instrument_node="">34. Wear good shoes</span></h3><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Apart from your backpack, your shoes might just be the most useful piece of gear you own.</span></p><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Ideally, you should travel with versatile, lightweight shoes good for both urban walking and hiking. This doesn’t mean you need to travel with a heavy hiking boot if you are primarily visiting cities.</span></p><p data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">That said, save yourself from packing multiple pairs of shoes. Just pack one pair that covers all of your needs. Personally, I’ve been wearing </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/Egg0H" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1558" instrument_node="">North Face Hedgehogs</span></a><span data-dcnode-id="1556" instrument_node=""> for ten years and I doubt I’ll ever change.</span></p><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">In my experience, it is better to have shoes that can easily transition from the mountains to the city with more emphasis on the mountains. That way, you will never find yourself saying “</span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Oh, I&nbsp;can’t do that hike because I don’t have the right shoes.</span></em><span data-dcnode-id="1551" instrument_node="">“</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">For all of your travel shoe needs, check out these articles:</span></p><ul data-dcnode-id="1538"><li data-dcnode-id="1545"><a class="ek-link" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-waterproof-boots-for-men-review/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1547" instrument_node="">Best waterproof boots for men</span></a></li><li data-dcnode-id="1542"><a class="ek-link" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-shoes-review/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1544" instrument_node="">The ultimate guide to travel shoes</span></a></li><li data-dcnode-id="1539"><a class="ek-link" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-hiking-boots-to-carry-on-your-adventures/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1541" instrument_node="">Best hiking shoes to take traveling</span></a></li></ul><div class="wp-block-image wp-image-60693" data-dcnode-id="1531"><figure class="aligncenter size-full is-resized" data-dcnode-id="1532"><noscript data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo.jpg" alt="Hiking eith good shoes" class="wp-image-60693" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-1050x700.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Hiking eith good shoes" class="lazyload wp-image-60693" data-dcnode-id="1535" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo.jpg 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-1024x683.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/IMG_6485dxo-330x220.jpg 330w, https://www.thebrokebackpacker.com/
