pener" target="_blank"><span data-dcnode-id="1291" instrument_node="">compression sacks</span></a><span data-dcnode-id="1289" instrument_node=""> for the&nbsp;</span><em data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">real </span></em><span data-dcnode-id="1286" instrument_node="">adventurers – these babies are a </span><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">traveller’s best kept secret.</span></strong><span data-dcnode-id="1283" instrument_node=""> They organise yo’ packing and minimise its volume too so you can pack MORE.</span></p><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Or, y’know… you can stick to ziplock bags.</span></p><span data-dcnode-id="1279" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1183579%26u%3D1096578%26m%3D79898%26urllink%3Dwww.wandrd.com%252Fproducts%252Fpacking-cubes%26afftrack%3DPacking_cube_plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">View Our Fave Cubes</span></span></a><span data-dcnode-id="1275" instrument_node=""> </span><a class="button button--normal button--black" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rei.com/product/766677/sea-to-summit-ultra-sil-compression-sack%3Fcm_mmc%3Daff_AL-_-178833-_-227769-_-NA%26avad%3D227769_e25a7aaf9" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Or Check Out the Sacks!</span></span></a></div></div></div><div data-dcnode-id="1266" id="whats-covered-by-allianz-travel-insurance"><h2 class="has-text-align-center" data-dcnode-id="1267" id="h-what-s-covered-by-allianz-travel-insurance"><span data-dcnode-id="1268" instrument_node="">What’s Covered By Allianz Travel Insurance?</span></h2></div><div class="wp-block-image wp-image-63274" data-dcnode-id="1259"><figure class="aligncenter size-full is-resized" data-dcnode-id="1260"><noscript data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214.jpg" alt="best travel insurance" class="wp-image-63274" width="580" height="383" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-768x508.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-1024x678.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-690x457.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-1050x695.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-877x580.jpg 877w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="best travel insurance" class="lazyload wp-image-63274" data-dcnode-id="1263" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214.jpg 1200w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-300x199.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-768x508.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-1024x678.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-690x457.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-1050x695.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/helicopter_water_police_austria_mountains_rescue_use-638214-877x580.jpg 877w" height="383" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20383%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Yep, most travel insurance pays for that.</span></figcaption></figure></div><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">We’re now going top drill down and look at the various things that may be covered by Allianz travel insurance. Remember that some of these are covered by some policy types but not others, and note that coverage amounts and excess’ also vary depending on the exact Allianz policy type.</span></p><ul data-dcnode-id="1252"><li data-dcnode-id="1253"><span data-dcnode-id="1256" instrument_node=""> </span><strong data-dcnode-id="1254" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1255" instrument_node="">Emergency Medical Coverage</span></strong></li></ul><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Got food poisoning in Delhi? Got hit by a moped in Bangkok? Or maybe you just slipped in the shower and broke your wrist in Madrid? These things can, and do happen and will all require emergency medical treatment. Being sick, infirm and unable to play Candy Crash is bad enough as it is, so the last thing you want is a hefty medical bill which you have to pay out of your own pocket.</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Emergency accident and sickness coverage is quite likely the most important aspect of any travel insurance plan.</span></p><ul data-dcnode-id="1243"><li data-dcnode-id="1244"><span data-dcnode-id="1247" instrument_node=""> </span><strong data-dcnode-id="1245" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1246" instrument_node="">Emergency Transportation</span></strong></li></ul><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Medical Evacuation is when you need to be sent to your home country, or another country for further or continued medical treatment, and are too sick to travel home normally as a regular passenger. For example – if you are stuck in a hospital bed on a drip in a leg cast.</span></p><ul data-dcnode-id="1236"><li data-dcnode-id="1237"><span data-dcnode-id="1240" instrument_node=""> </span><strong data-dcnode-id="1238" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1239" instrument_node="">Trip Cancellation</span></strong></li></ul><p data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">Reimburses for prepaid, non-refundable cancellation charges if you must cancel your trip </span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">(after the effective date of your insurance plan)</span></em><span data-dcnode-id="1232" instrument_node=""> due to covered sickness, accidental injury, or death of you, a family member or traveling companion; inclement weather, unforeseen natural disaster at home or at your destination, strike or other covered reasons.</span></p><ul data-dcnode-id="1226"><li data-dcnode-id="1227"><span data-dcnode-id="1230" instrument_node=""> </span><strong data-dcnode-id="1228" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1229" instrument_node="">Trip Interruption</span></strong></li></ul><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Includes the same stipulations as listed above in “Trip Cancellation”. Includes the caveat of covering the cost of accommodation to you if you are delayed.</span></p><ul data-dcnode-id="1219"><li data-dcnode-id="1220"><span data-dcnode-id="1223" instrument_node=""> </span><strong data-dcnode-id="1221" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1222" instrument_node="">Baggage Loss/Damage</span></strong></li></ul><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Being compensated for lost personal gear is likely the second most important aspect of your insurance. This is one of the most common reason for Travel Insurance Claims. This covers reimbursement for loss, theft, or damage incurred during the trip. It can be applied to all personal items that were lost, stolen, or else accidentally blown off the roof of a chicken bus traveling at top speed.</span></p><ul data-dcnode-id="1212"><li data-dcnode-id="1213"><span data-dcnode-id="1216" instrument_node=""> </span><strong data-dcnode-id="1214" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1215" instrument_node="">Baggage Delay</span></strong></li></ul><p data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">In the event your checked baggage is delayed or misplaced by the air carrier </span><em data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">(for more than 12 hours)</span></em><span data-dcnode-id="1208" instrument_node="">, you can claim reimbursement for any necessary items you need to purchase until your bag arrives. This will typically mean toiletries but may even mean some clothes if you can demonstrate the purchase to have been essential.</span></p><ul data-dcnode-id="1202"><li data-dcnode-id="1203"><span data-dcnode-id="1206" instrument_node=""> </span><strong data-dcnode-id="1204" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1205" instrument_node="">Travel Delay</span></strong></li></ul><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Travel Delay cover protects you when you’re unable to reach your destination on time due to circumstances beyond your control. If your airline cancels your flight due to a technical fault, Allianz will reimburse you for any meals, transportation or accommodation costs you incurred as a result.</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Note that delays of less than 6 hours are not covered.</span></p><ul data-dcnode-id="1193"><li data-dcnode-id="1194"><span data-dcnode-id="1197" instrument_node=""> </span><strong data-dcnode-id="1195" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1196" instrument_node="">Change Fee Coverage</span></strong></li></ul><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Have you ever tried to change or vary a flight date or add or remove a passenger?! The fees can be insanely high. This is where Change Fee coverage comes in. If you have the AllTrips Executive, OneTrip Prime or OneTrip Premier plan, you can claim up to $500 to cover the cost of the airline change fee.</span></p><ul data-dcnode-id="1186"><li data-dcnode-id="1187"><span data-dcnode-id="1190" instrument_node=""> </span><strong data-dcnode-id="1188" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1189" instrument_node="">Travel Accident Coverage</span></strong></li></ul><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">If you are in an accident, you may be entitled to claim a compensation payment in addition to your medical/repatriation costs. This is usually reserved for loss of limb/eyesight type scenarios and you can’t claim for whiplash or emotional trauma from falling from a donkey!</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The Travel Accident Coverage is also payable to your family in the event of your death.</span></p><ul data-dcnode-id="1177"><li data-dcnode-id="1178"><span data-dcnode-id="1181" instrument_node=""> </span><strong data-dcnode-id="1179" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1180" instrument_node="">Rental Car Damage and Theft Coverage</span></strong></li></ul><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The AllTrips polices also include rental car damage cover. This can often prove considerably cheaper than obtaining insurance direct from the rental car provider.</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">If you are resident of the US, this feature may not be available to you. For clarity, we suggest you speak with Allianz direct.</span></p><div data-dcnode-id="1170" id="whats-not-covered-by-allianz-travel-insurance"><h2 class="has-text-align-center" data-dcnode-id="1171" id="h-what-s-not-covered-by-allianz-travel-insurance"><span data-dcnode-id="1172" instrument_node="">What’s Not Covered by Allianz Travel Insurance</span></h2></div><div class="wp-block-image" data-dcnode-id="1165"><figure class="aligncenter size-full is-resized" data-dcnode-id="1166"><noscript data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip.jpg" alt="vietnam road trip motorbike na hang" class="wp-image-93652" width="580" height="290" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-150x75.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-300x150.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-768x384.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-330x165.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-690x345.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="vietnam road trip motorbike na hang" class="lazyload wp-image-93652" data-dcnode-id="1167" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-150x75.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-300x150.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-768x384.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-330x165.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/05/vietnam-road-trip-690x345.jpg 690w" height="290" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20290%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">There are some notable omissions from Allianz’s cover. Let’s take a look at them.</span></p><ul data-dcnode-id="1158"><li data-dcnode-id="1159"><span data-dcnode-id="1162" instrument_node=""> </span><strong data-dcnode-id="1160" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1161" instrument_node="">Pre-Existing Medical Conditions</span></strong></li></ul><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">If you have a pre-existing medical condition which causes you problems on your trip, it is not covered under the Allianz policies. This is fairly common amongst insurers. It is important that you do declare any pre-existing conditions when taking the policy out.</span></p><p data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">If you do have a PEMC, then you may be very interested to hear that</span><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node=""> SafetyWing</span></strong><span data-dcnode-id="1152" instrument_node=""> can offer full coverage for PEMC’s in their policies.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1147"><span data-dcnode-id="1150" instrument_node=""> </span><a class="button button--safetywing button--branded" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safetywing.com/%3FreferenceID%3D24736554" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1149" instrument_node="">Visit SafetyWing</span></a></div><div class="product-plug product-plug__light-blue component-margin" data-dcnode-id="1120" id=""><div class="product-plug__title" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> DON'T DIE OUT THERE! …Please 🙂</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1121"><div class="product-plug__image" data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node=""> </span><picture data-dcnode-id="1141"><source data-dcnode-id="1143" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="packable travel medical kit" class="lazyload" data-dcnode-id="1142" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/302960/8P645TqW-min-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1122"><p data-dcnode-id="1136"><span data-dcnode-id="1139" instrument_node="">Things go wrong on the road ALL THE TIME. </span><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Be prepared for what life throws at you.</span></strong></p><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">Buy an </span><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">AMK Travel Medical Kit</span></strong><span data-dcnode-id="1132" instrument_node=""> before you head out on your next adventure – don’t be daft!</span></p><span data-dcnode-id="1130" instrument_node=""> </span><a class="button button--branded button--rei" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F113007%252Fadventure-medical-kits-mountain-series-backpacker-medical-kit%26ctc%3DREI%2520amk-first-aid-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Buy on REI</span></span></a><span data-dcnode-id="1126" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/HtvA" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Buy on Amazon</span></span></a></div></div></div><ul data-dcnode-id="1115"><li data-dcnode-id="1116"><span data-dcnode-id="1119" instrument_node=""> </span><strong data-dcnode-id="1117" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1118" instrument_node="">Extreme Sports</span></strong></li></ul><p data-dcnode-id="1107"><span data-dcnode-id="1114" instrument_node="">Allianz Travel Insurance does not any kind of adrenaline sport such as Quad Biking and Parachuting. The lack of coverage for extreme or adventure actives is one of the many reasons why we </span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">now prefer World Nomads.</span></strong><span data-dcnode-id="1111" instrument_node=""> To get full details of the kind of activities </span><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">World Nomads</span></strong><span data-dcnode-id="1108" instrument_node=""> can offer coverage for, head over to their site and get a tailer made quote.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1103"><span data-dcnode-id="1106" instrument_node=""> </span><a class="button button--worldnomads button--branded" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/Turnstile/AffiliateLink%3FpartnerCode%3Dtbpg%26utm_source%3Dtbpg%26source%3Dweblink%26utm_content%3Dweblink%26path%3Dhttps%3A//www.worldnomads.com/Turnstile/AffiliateLink%3FpartnerCode%3Dtbpg%26source%3Dlink%26utm_source%3Dtbpg%26utm_content%3Dlink%26path%3D//www.worldnomads.com/travel-insurance/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1105" instrument_node="">Visit World Nomads</span></a></div><div data-dcnode-id="1100" id="who-is-allianz-travel-insurance-suitable-for"><h2 class="has-text-align-center" data-dcnode-id="1101" id="h-who-is-allianz-travel-insurance-suitable-for"><span data-dcnode-id="1102" instrument_node="">Who Is Allianz Travel Insurance Suitable For?</span></h2></div><div class="wp-block-image wp-image-158445" data-dcnode-id="1095"><figure class="aligncenter size-full is-resized" data-dcnode-id="1096"><noscript data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building.jpg" alt="Is Turkey safe to travel for families?" class="wp-image-158445" width="580" height="386" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-870x580.jpg 870w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Is Turkey safe to travel for families?" class="lazyload wp-image-158445" data-dcnode-id="1097" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/01/shutterstock_turkey_family_travel_selfie_ampitheater_building-870x580.jpg 870w" height="386" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">So as you can see, Allianz offers a lot of different policy types for a lot of different people. Allianz Travel Insurance may therefore be suitable for the following kinds of travellers;</span></p><ul data-dcnode-id="1077"><li data-dcnode-id="1086"><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Annual Travelers – </span></strong><span data-dcnode-id="1090" instrument_node="">With the Allianz annual plan, you may be covered for a full Gregorian year! Your whole rotative journey around the sun may be covered in the policy no matter how many times you travel! Annual plans are great for frequent and long term travelers as they can save you money in the long run. If you intend on travelling a lot this year, consider this. On the other hand though, </span><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">SafetyWing</span></strong><span data-dcnode-id="1087" instrument_node=""> offers a month by month policy which you can stop and start with depending on how much you travel; this may prove to be more cost effective.</span></li><li data-dcnode-id="1082"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Senior/Ageing Travelers –</span></strong><span data-dcnode-id="1083" instrument_node="">&nbsp;There is no age limit for Allianz insurance policyholders. Believe us, not all insurers offer this and we have had a LOT of queries from over 65’s &amp; over 70’s who have struggled to find insurance elsewhere on the market.</span></li><li data-dcnode-id="1078"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Traveling Families –</span></strong><span data-dcnode-id="1079" instrument_node="">&nbsp;Allianz travel insurance policies may allow children under the age of 17 to travel with their parents for free, on selected plans. This is great for families with kids. My earliest travel memory is of a Spanish ER department, my parents were glad they have me on their policy otherwise my foot would still be bleeding 33 years later!</span></li></ul><div data-dcnode-id="1074" id="who-isnt-allianz-travel-insurance-suitable-for"><h2 class="has-text-align-center" data-dcnode-id="1075" id="h-who-isn-t-allianz-travel-insurance-suitable-for"><span data-dcnode-id="1076" instrument_node="">Who isn’t Allianz Travel Insurance Suitable For?</span></h2></div><div class="wp-block-image wp-image-59294" data-dcnode-id="1067"><figure class="aligncenter size-full is-resized" data-dcnode-id="1068"><noscript data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch.jpg" alt="Around The World Backpackers best hostels in Christchurch" class="wp-image-59294" width="580" height="326" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-690x388.jpg 690w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Around The World Backpackers best hostels in Christchurch" class="lazyload wp-image-59294" data-dcnode-id="1071" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch.jpg 800w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/09/Around-The-World-Backpackers-best-hostels-in-Christchurch-690x388.jpg 690w" height="326" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20326%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Around The World Backpackers</span></figcaption></figure></div><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Whilst they do offer a myriad of different plans to cover most travellers types, Allianz is perhaps not the ideal travel insurance company for absolutely everybody out there.</span></p><ul data-dcnode-id="1049"><li data-dcnode-id="1058"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Adventure Travelers –</span></strong><span data-dcnode-id="1062" instrument_node="">&nbsp;Allianz Travel Insurance does not offer protection for extreme activity or sport of any kind! If you plan on doing any dangerous, adrenaline type activities, then perhaps consider </span><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">World Nomads </span></strong><span data-dcnode-id="1059" instrument_node="">who can offer coverage for over 201 different extreme sports. SafetyWing are also rapidly extending their extreme coverage.</span></li><li data-dcnode-id="1054"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Travelers Wanting High Medical Coverage –&nbsp;</span></strong><span data-dcnode-id="1055" instrument_node="">&nbsp;We usually recommend traveling with at least $100,000 of emergency medical coverage. Unfortunately, Allianz do not offer this amount of coverage under any of their plans. If you come down with a severe illness or are mangled by a badger, you might be stuck with thousands of dollars in medical bills so need to be prepared. On the contrary, World Nomads do offer $100,000 in medical emergency cover.</span></li><li data-dcnode-id="1050"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Corporation Haters –</span></strong><span data-dcnode-id="1051" instrument_node="">&nbsp;Allianz are a major international finance company and we know some of you prefer not to deal with such organisations. That’s a perfectly legitimate point of view. However, remember that even a lot of “boutique” insurers are in fact ultimately shop fronts for big insurers such as Zurich, Lloyds or even Allianz. In fact, all some boutique firms do is sell you the illusion of dealing with a small firm and charge you a hefty commission for the privilege.</span></li></ul><div data-dcnode-id="1046" id="how-much-does-allianz-travel-insurance-cost"><h2 class="has-text-align-center" data-dcnode-id="1047" id="h-how-much-does-allianz-travel-insurance-cost"><span data-dcnode-id="1048" instrument_node="">How Much Does Allianz Travel Insurance Cost?</span></h2></div><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">So now we know the details, the next burning question is how much does Allianz Travel Insurance cost? The exact pricing details do vary depending on a whole wide range of factors such as your age, location, your trip plans and numerous other factors that only the gods of insurance can compute.</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">However, as a loose guide we have set out some typical pricing below.</span></p><div data-dcnode-id="1039" id="other-travel-insurance-providers"><h2 class="has-text-align-center" data-dcnode-id="1040" id="h-other-travel-insurance-providers"><span data-dcnode-id="1041" instrument_node="">Other Travel Insurance Providers</span></h2></div><div class="wp-block-image" data-dcnode-id="1034"><figure class="aligncenter size-full is-resized" data-dcnode-id="1035"><noscript data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/10/World-Nomads.jpg" alt="World Nomads Travel Insurance" class="wp-image-6624" width="700" height="223"/&gt;</span></noscript><img alt="World Nomads Travel Insurance" class="lazyload wp-image-6624" data-dcnode-id="1036" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/10/World-Nomads.jpg" height="223" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20223%22%3E%3C/svg%3E" width="700"></figure></div><ul data-dcnode-id="1029"><li data-dcnode-id="1030"><span data-dcnode-id="1033" instrument_node=""> </span><strong data-dcnode-id="1031" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1032" instrument_node="">World Nomads</span></strong></li></ul><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">World Nomads offers coverage for backpackers and adventure trailers. They are one of our favourite travel insurance providers and we have used them for years.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Unlike Allianz, World Nomads are a travel insurer with a focus on backpackers.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">World Nomads do offer 2 separate plans depending on how much cover you want and what exactly you intend to do. World Nomads can also offer trip cancellation, electronic gadget, and theft cover in the policies.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">Word Nomads can cover over 140 countries </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">(but not Pakistan which is a shame for us)</span></em><span data-dcnode-id="1019" instrument_node="">. They can also cover a wide range of adventure sports which Allianz do not. However, they do not offer home country cover and do not offer open ended cover.</span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The big pro with World Nomads is that they can cover a lot of extreme and adventure stuff like mountaineering. For many, this gives them a big edge over Allianz.</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">If you are not planning on doing any adventure stiff though, then you may find World Nomads to be a bit expensive.</span></p><p data-dcnode-id="1011"><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">For more information about World Nomads – check out our World Nomads Review.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1007"><span data-dcnode-id="1010" instrument_node=""> </span><a class="button button--worldnomads button--branded" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/travel-insurance/%3Faffiliate%3Dtbpg%26subId%3Dwn-insurance%26affiliateTrackingId%3Dcdc301caa74a487f94bdda9d5a4b9780%26utm_source%3Dtbpg%26utm_medium%3Daffiliate%26utm_campaign%3DAffiliate%26utm_content%3Dweblink" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1009" instrument_node="">View on World Nomads</span></a></div><ul data-dcnode-id="1002"><li data-dcnode-id="1003"><span data-dcnode-id="1006" instrument_node=""> </span><strong data-dcnode-id="1004" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1005" instrument_node="">SafetyWing</span></strong></li></ul><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">SafetyWing are a relatively new player on the scene. They are founded by travellers, for travellers and their primary target is Digital Nomads – people like me who move around the world working from our laptops. We can go many years without ever going “home” and SafetyWing recognises this and can offer open ended cover.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">What we LOVE about SafetyWing is that their insurance operates like a monthly subscription that you can stop and start as and when you need it. They are also one of the few providers who may be able to cover some pre-existing conditions, provide assistance with “routine” health stuff and their COVID cover is some of the most interesting we have yet seen.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="994"><span data-dcnode-id="997" instrument_node=""> </span><a class="button button--safetywing button--branded" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safetywing.com/%3FreferenceID%3D24736554" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="996" instrument_node="">View on Safety Wing</span></a></div><div class="product-plug product-plug__red component-margin" data-dcnode-id="960" id=""><div class="product-plug__title" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node=""> Is This the Best Backpack EVER???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="961"><div class="product-plug__image" data-dcnode-id="987"><span data-dcnode-id="991" instrument_node=""> </span><picture data-dcnode-id="988"><source data-dcnode-id="990" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img alt="Osprey Aether" class="lazyload" data-dcnode-id="989" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/307311/DSCF1311-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="962"><p data-dcnode-id="980"><span data-dcnode-id="986" instrument_node="">We’ve tested countless backpacks over the years, but there’s one the OG Broke Backpacker STILL travels with: </span><strong data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">the backpacker-approved </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D1120579%26u%3D1096578%26m%3D76443%26urllink%3Dwww.nomatic.com%252Fproducts%252Fthe-nomatic-backpack%26afftrack%3Dnomatic_backpack_review" rel="nofollow noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">Osprey Aether</span></a><span data-dcnode-id="982" instrument_node="">.</span></strong></p><p data-dcnode-id="971"><span data-dcnode-id="979" instrument_node="">Want more deetz on why it’s </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">so damn perfect? </span></em><strong data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Then read our </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/osprey-aether-70-liter-pack-review/" rel="noopener" target="_blank"><span data-dcnode-id="975" instrument_node="">comprehensive review</span></a><span data-dcnode-id="973" instrument_node=""> for the inside scoop!</span></strong></p><span data-dcnode-id="970" instrument_node=""> </span><a class="button button--branded button--osprey" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3D798fccde-f6a9-4548-b54b-2adfad6c3703%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.osprey.com%252Fus%252Fen%252Fproduct%252Faether-trade-55-AETHER55F20_214.html%26ctc%3DOsprey%2520osprey-aether-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">View on Osprey</span></span></a><span data-dcnode-id="966" instrument_node=""> </span><a class="button button--branded button--rei" data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F177492%252Fosprey-aether-55-pack-mens%26ctc%3DREI%2520osprey-aether-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">View on REI</span></span></a></div></div></div><p data-dcnode-id="959"></p><div data-dcnode-id="956" id="when-should-you-buy-travel-insurance"><h2 class="has-text-align-center" data-dcnode-id="957" id="h-when-should-you-buy-travel-insurance"><span data-dcnode-id="958" instrument_node="">When Should You Buy Travel Insurance?</span></h2></div><div class="wp-block-image" data-dcnode-id="951"><figure class="aligncenter size-full is-resized" data-dcnode-id="952"><noscript data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop.jpg" alt="working on my travel blog" class="wp-image-8555" width="580" height="435" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-773x580.jpg 773w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="working on my travel blog" class="lazyload wp-image-8555" data-dcnode-id="953" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-150x113.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-300x225.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-330x248.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-690x518.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2015/08/me-on-laptop-773x580.jpg 773w" height="435" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20435%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">By this point you may well know which travel insurance is best for you. Maybe it’s Allianz, or maybe it’s one of the others.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">The question now then is, when should you buy travel insurance?</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">You can buy travel insurance up until the start date of your trip. Most insurers will not cover a trip that has already began with the exception of World Nomads. Note that if you ever do make a claim, you may well be asked to provide evidence of the start date so I do not recommend trying to hoodwink insurers – be totally honest or it will come back on you.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">However, in our experience, the earlier you book your travel insurance, the better. This is for a number of reasons;</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Things sometimes go wrong before the trip even starts. For example, what if the airline goes bust the next day after you buy your ticket?! This happens to 1000s of people every year. Or what if you get very sick a week before flying and have to cancel?! If you have the right travel insurance in place, your insurer may cover you in these scenarios.</span></p><p data-dcnode-id="932"><span data-dcnode-id="940" instrument_node="">Secondly, the vast majority of policies include a </span><a class="ek-link" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economictimes.indiatimes.com/wealth/insure/how-to-cancel-an-insurance-policy-during-free-look-period-and-get-a-refund/articleshow/68328963.cms%3Ffrom%3Dmdr" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">cooling off period</span></strong></a><span data-dcnode-id="936" instrument_node="">. This is a period of time </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">(usually 28 days)</span></em><span data-dcnode-id="933" instrument_node=""> when you can cancel the policy and get all of your money back. We suggest using the cooling period to read through the policy documents and ensure that the cover fully meets your needs. If upon a closer look it does not, you have time to either contact the insurer and amend the policy, or cancel it and obtain more suitable travel insurance from somebody else.</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Personally, I usually book my travel insurance the very same day I book my flight. The only exception is if I already have long term or annual cover in place at the time. In these scenarios, instead be sure to check the last date on your annual/long term cover and make sure it covers your whole trip.</span></p><div data-dcnode-id="927" id="how-to-make-an-allianz-travel-insurance-claim"><h2 class="has-text-align-center" data-dcnode-id="928" id="h-how-to-make-an-allianz-travel-insurance-claim"><span data-dcnode-id="929" instrument_node="">How to Make an Allianz Travel Insurance Claim</span></h2></div><div class="wp-block-image wp-image-171411" data-dcnode-id="922"><figure class="aligncenter size-full is-resized" data-dcnode-id="923"><noscript data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee.jpg" alt="Is the food in Costa Rica safe?" class="wp-image-171411" width="580" height="387" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-768x513.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-690x461.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-868x580.jpg 868w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Is the food in Costa Rica safe?" class="lazyload wp-image-171411" data-dcnode-id="924" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-768x513.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-690x461.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-cuisine-breakfast-coffee-868x580.jpg 868w" height="387" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20387%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">First up, it is unlikely you will ever need to make a travel insurance claim. Yipee!</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">In case you do though, you will be very pleased to hear that the process is usually pretty straightforward and designed to be user friendly as long as you are dealing with a reputable company. If you are not – then, it may be a lot harder.</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">To initiate a travel insurance claim all you need to do in contact (call) Allianz and chat with their 24/hour multilingual staff. You should do this as soon as possible or as soon as you know you will need to make a claim even if the full extent of the cost is not yet known.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">You will need to tell them about your claim including details of what has gone wrong, and what it the damage seems to be. You can also initiate the process online by signing into your account.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">If you are claiming for lost or stolen items, you will need to write up a formal sworn statement of events, detailing what happened and what was lost. You will also need to have an official police report made up – it is highly important that you obtain this even if it means you having to pay a fee/bribe or hassle the police to do it. Try to get it in both the native language and in English if possible.</span></p><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The Insurance company may well wish to contact you to discuss your claim further. You may even be subjected to a bit of an anti-fraud interview and your call may even be ran through voice detection software designed to spot deceit! However, you have nothing to worry about if your claim is legitimate and in order.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">It is very helpful to get all of your receipts and invoices together first and submit all expenses for your claim at once. Do keep copies of every expense, bill, invoice and report as you will need to provide these to the claims team so they can assess your claim. They may pay out small amounts without a bill, but in the case of extra hotels, flights or electronics, the rule is usually “no proof = no payment”.</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">List all accrued expenses for the amount shown on your receipt/invoice and answer all other questions.</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">After that is sorted, you upload all of your information and documents, review the claim and then click submit. The Allianz team will get cracking and will stay in contact with you throughout this process. Note that resolution time does vary from one case to the next – it may be days, weeks or sometimes months depending on the details of your claim.</span></p><div data-dcnode-id="901" id="staying-safe-on-your-adventure"><h2 class="has-text-align-center" data-dcnode-id="902" id="h-staying-safe-on-your-adventure"><span data-dcnode-id="903" instrument_node="">Staying Safe on your Adventure</span></h2></div><p data-dcnode-id="897"><span data-dcnode-id="900" instrument_node="">We sincerely hope you never have to claim on your travel insurance and we wish you many a long, happy, safe adventure!</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">In order to help you stay safe, we do have some top tips for you.</span></p><div class="video-embed component-margin" data-dcnode-id="894" data-embed="f0xar1wP_3A"><div class="video-embed__play-btn" data-dcnode-id="896"></div><img class="lazyload" data-dcnode-id="895" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.youtube.com/vi/f0xar1wP_3A/sddefault.jpg&amp;raw"></div><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Firstly to make things far more difficult for potential thieves to take your money, pick yourself up a backpacker security belt to keep your cash safe &amp; hidden on the road. Also be sure to read our Backpacker Safety 101 post for tips and tricks to stay safe whilst on the road.</span></p><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">For hiding bigger wads of cash (hello Iran &amp; Venezuela), check out this post on ingenious ways to hide your money when traveling.</span></p><p data-dcnode-id="882"><span data-dcnode-id="889" instrument_node="">Oh, and we strongly recommend traveling with a headlamp whilst backpacking anywhere in the world </span><em data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">(every backpacker should </span><a class="ek-link" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/the-5-best-headlamps-for-travelling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="887" instrument_node="">have a good headtorch</span></a><span data-dcnode-id="885" instrument_node="">!)</span></em><span data-dcnode-id="883" instrument_node="">. They can prevent you falling down a well on a dark night and can light darkened alleyways where thieves may lurk.</span></p><h3 data-dcnode-id="880" id="h-final-thoughts-on-allianz-travel-insurance"><span data-dcnode-id="881" instrument_node="">Final Thoughts on Allianz Travel Insurance</span></h3><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">I hope you found this Allianz Travel Insurance Review to be informative – it certainly took a lot of work on our part to put together! Travel Insurance is important and you need to carefully choose the best provider for your needs. Once again, we wish you an awesome and safe trip!</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="877"><h3 class="has-text-align-center" data-dcnode-id="875" id="h-thanks-for-reading-that-was-fun-d"><span data-dcnode-id="876" instrument_node="">Thanks for reading – that was fun! 😀</span></h3><p class="has-text-align-center" data-dcnode-id="870" id="h-we-bring-you-free-content-find-out-how-you-can-support-the-site"><strong data-dcnode-id="871"><span data-dcnode-id="874" instrument_node="">We bring you epic FREE content!</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">Find out how YOU can help support us.</span></strong></p><p class="has-text-align-center" data-dcnode-id="855"><span data-dcnode-id="869" instrument_node="">We’re a big site </span><a aria-label="with a big team (opens in a new tab)" class="ek-link" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/meet-the-team/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="868" instrument_node="">with a big team</span></a><span data-dcnode-id="866" instrument_node=""> and this job isn’t always easy. But we do it because we love it – we love providing epic and free content. We love the knowledge that </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">our</span></em><span data-dcnode-id="863" instrument_node=""> content keeps </span><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">you</span></em><span data-dcnode-id="860" instrument_node=""> adventuring. We don’t ask for money, but if you’d like to find out how you can help the site in more organic ways, click the button below. </span><br data-dcnode-id=
