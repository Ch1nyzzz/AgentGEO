=""> </span><input class="search-bar__text-input" data-dcnode-id="1907" name="s" placeholder="Where to?..." type="text"><span data-dcnode-id="1906" instrument_node=""> </span><input class="button button--red button--rounded button--no-margin button--inline" data-dcnode-id="1905" type="submit" value="Search"></form></div></div></div></div><div class="header-notice" data-dcnode-id="1891"><div class="container" data-dcnode-id="1894"><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">Lessons from 10 years of Backpacking and Entrepreneurship from the OG Broke Backpacker… </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/2021-in-review/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1898" instrument_node="">It’s 2021 in Review</span></a><span data-dcnode-id="1896" instrument_node="">.</span></p></div><div class="header-notice__mobile-close" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Close</span></div></div></header><div class="site-content" data-dcnode-id="538" id="content"><article class="post-single" data-dcnode-id="551"><div class="container" data-dcnode-id="552"><div class="row" data-dcnode-id="553"><div class="col-12 offset-md-1 col-md-10 offset-lg-2 col-lg-8" data-dcnode-id="1863"><div class="post-single__breadcrumbs" data-dcnode-id="1864"><div class="breadcrumbs" data-dcnode-id="1865"><div class="breadcrumbs__meta" data-dcnode-id="1879"><span data-dcnode-id="1888" instrument_node=""> </span><span class="breadcrumbs__author" data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node=""> By </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/author/aiden/"><span data-dcnode-id="1886" instrument_node="">Aiden Freeborn</span></a><span data-dcnode-id="1884" instrument_node=""> </span></span><span data-dcnode-id="1882" instrument_node=""> </span><span class="breadcrumbs__date" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node=""> Last Updated February 27, 2022 / </span></span></div><div class="breadcrumbs__crumbs" data-dcnode-id="1866"><p data-dcnode-id="1867" id="breadcrumbs"><span data-dcnode-id="1868"><span data-dcnode-id="1869"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/"><span data-dcnode-id="1878" instrument_node="">Home</span></a><span data-dcnode-id="1876" instrument_node=""> » </span><span data-dcnode-id="1870"><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/blog/"><span data-dcnode-id="1875" instrument_node="">Blog</span></a><span data-dcnode-id="1873" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Brutally HONEST Allianz Travel Insurance Review</span></span></span></span></span></p></div></div></div></div><div class="col-12 offset-md-1 col-md-10 offset-lg-2 col-lg-8" data-dcnode-id="1859"><div class="post-single__title" data-dcnode-id="1860"><h1 data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Brutally HONEST Allianz Travel Insurance Review</span></h1></div></div><div class="col-12 order-2 offset-md-1 col-md-10 offset-lg-0 col-lg-8 order-lg-1" data-dcnode-id="700"><div class="post-single__main-content" data-dcnode-id="701"><article class="post-content" data-dcnode-id="744"><div class="post-intro" data-dcnode-id="1845"><div class="post-intro__content" data-dcnode-id="1846"><p data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node="">Planning and preparing for a trip can be fun and exciting. Personally I love flicking through Lonely Planets seeking out those </span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">“Must See”</span></em><span data-dcnode-id="1855" instrument_node=""> places and I even enjoy&nbsp;scouring through forums for insider advice. I relish the challenge of arranging sophisticated logistics and revel in finding bargain flights from London to the ends of the earth.</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node="">Indeed, the feeling I get during the days before I start a trip is both exciting and invigorating. In fact, sometimes I wonder whether I’m equally as addicted to this </span><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">“state of leaving”</span></em><span data-dcnode-id="1850" instrument_node="">&nbsp;as I am to travel itself – they do say that often anticipation is even better than the event itself.</span></p><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">What is far less exciting though, is comparing Travel Insurance policies. There are far too many policies and providers out there with far too many fine print details to scrutinise. Yep finding the best travel insurance is confusing, and finding cheap backpacker insurance can seem impossible. But, to make finding and buying Travel Insurance that bit easier for you, we have tried, tested and reviewed all of the major providers out there.</span></p></div></div><div class="colored-note green component-margin" data-dcnode-id="1820"><div class="colored-note__content" data-dcnode-id="1821"><p data-dcnode-id="1840"><em data-dcnode-id="1842"><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Hey you there!</span></strong></em><span data-dcnode-id="1841" instrument_node=""> Before you delve any further or waste any more valuable time on this Allianz Travel Insurance Review, let me just tell you straight up front that we at The Broke Backpacker no longer use Allianz for our travel insurance needs.</span></p><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Basically we simply found other providers who we found to be better suited to the needs to travellers and backpackers whilst&nbsp;offering VERY competitive quotes.</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1837" instrument_node="">If you are taking a single trip or going backpacking, then we would instead invite you to consider looking over our </span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/world-nomads-travel-insurance-review/" rel="noopener" target="_blank"><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">World Nomads Insurance Review</span></strong></a><span data-dcnode-id="1833" instrument_node="">.</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1831" instrument_node="">Alternatively, if you are a Digital Nomad working and traveling remotely from all over the world, then you may be VERY interested to check out our detailed </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/safety-wing-travel-insurance-review/" rel="noopener" target="_blank"><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">SafetyWing Insurance Review</span></strong></a><span data-dcnode-id="1827" instrument_node="">….</span></p><span data-dcnode-id="1825" instrument_node=""> </span><a class="button button--branded button--world-nomads" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/travel-insurance/%3Faffiliate%3Dtbpg%26subId%3Dwn-insurance%26affiliateTrackingId%3Dcdc301caa74a487f94bd" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Visit World Nomads</span></span></a></div></div><div class="table-of-contents" data-dcnode-id="1766"><div class="table-of-contents__title" data-dcnode-id="1816"><span data-dcnode-id="1819" instrument_node="">Table of Contents </span><span class="table-of-contents__trigger" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Show</span></span></div><ul data-dcnode-id="1767"><li data-dcnode-id="1813"><a data-dcnode-id="1814" href="#does-travel-insurance-cover-covid-19"><span data-dcnode-id="1815" instrument_node="">Does Travel Insurance Cover COVID-19?</span></a></li><li data-dcnode-id="1810"><a data-dcnode-id="1811" href="#allianz-travel-insurance-review"><span data-dcnode-id="1812" instrument_node="">Allianz Travel Insurance Review</span></a></li><li data-dcnode-id="1807"><a data-dcnode-id="1808" href="#do-you-need-travel-insurance"><span data-dcnode-id="1809" instrument_node="">Do You Need Travel Insurance?</span></a></li><li data-dcnode-id="1804"><a data-dcnode-id="1805" href="#what-does-travel-insurance-cover"><span data-dcnode-id="1806" instrument_node="">What Does Travel Insurance Cover?</span></a></li><li data-dcnode-id="1801"><a data-dcnode-id="1802" href="#should-i-get-insurance"><span data-dcnode-id="1803" instrument_node="">Should I Get Insurance?</span></a></li><li data-dcnode-id="1798"><a data-dcnode-id="1799" href="#who-are-allianz"><span data-dcnode-id="1800" instrument_node="">Who Are Allianz?</span></a></li><li data-dcnode-id="1795"><a data-dcnode-id="1796" href="#allianz-travel-insurance-policies"><span data-dcnode-id="1797" instrument_node="">Allianz Travel Insurance Policies</span></a></li><li data-dcnode-id="1792"><a data-dcnode-id="1793" href="#whats-covered-by-allianz-travel-insurance"><span data-dcnode-id="1794" instrument_node="">What’s Covered By Allianz Travel Insurance?</span></a></li><li data-dcnode-id="1789"><a data-dcnode-id="1790" href="#whats-not-covered-by-allianz-travel-insurance"><span data-dcnode-id="1791" instrument_node="">What’s Not Covered by Allianz Travel Insurance</span></a></li><li data-dcnode-id="1786"><a data-dcnode-id="1787" href="#who-is-allianz-travel-insurance-suitable-for"><span data-dcnode-id="1788" instrument_node="">Who Is Allianz Travel Insurance Suitable For?</span></a></li><li data-dcnode-id="1783"><a data-dcnode-id="1784" href="#who-isnt-allianz-travel-insurance-suitable-for"><span data-dcnode-id="1785" instrument_node="">Who isn’t Allianz Travel Insurance Suitable For?</span></a></li><li data-dcnode-id="1780"><a data-dcnode-id="1781" href="#how-much-does-allianz-travel-insurance-cost"><span data-dcnode-id="1782" instrument_node="">How Much Does Allianz Travel Insurance Cost?</span></a></li><li data-dcnode-id="1777"><a data-dcnode-id="1778" href="#other-travel-insurance-providers"><span data-dcnode-id="1779" instrument_node="">Other Travel Insurance Providers</span></a></li><li data-dcnode-id="1774"><a data-dcnode-id="1775" href="#when-should-you-buy-travel-insurance"><span data-dcnode-id="1776" instrument_node="">When Should You Buy Travel Insurance?</span></a></li><li data-dcnode-id="1771"><a data-dcnode-id="1772" href="#how-to-make-an-allianz-travel-insurance-claim"><span data-dcnode-id="1773" instrument_node="">How to Make an Allianz Travel Insurance Claim</span></a></li><li data-dcnode-id="1768"><a data-dcnode-id="1769" href="#staying-safe-on-your-adventure"><span data-dcnode-id="1770" instrument_node="">Staying Safe on your Adventure</span></a></li></ul></div><div data-dcnode-id="1763" id="does-travel-insurance-cover-covid-19"><h2 class="has-text-align-center" data-dcnode-id="1764" id="h-does-travel-insurance-cover-covid-19"><span data-dcnode-id="1765" instrument_node="">Does Travel Insurance Cover COVID-19?</span></h2></div><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">When COVID-19 first rocked the world in 2020, most travel insurers were quick to invoke their cancellation clauses and pull all cover relating to either illness, cancellation or disruption caused by the pesky pandemic.</span></p><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">These days, most insurance providers are offering some form of COVID coverage included within their policies, but some are more useful than others. Whilst many now cover hospitalisation caused by COVID infections, fewer are offering any kind of cover for disruption or cancellation such as being refused boarding on a flight for displaying symptoms, or having to cancel your trip because of a positive test.</span></p><div class="wp-block-image" data-dcnode-id="1754"><figure class="aligncenter size-full is-resized" data-dcnode-id="1755"><noscript data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass.jpg" alt="" class="wp-image-415608" width="550" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-1536x1024.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-150x100.jpg 150w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><img alt="" class="lazyload wp-image-415608" data-dcnode-id="1756" data-sizes="(max-width: 1920px) 100vw, 1920px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-1536x1024.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/volunteering-during-covid-fuck-corona-in-the-ass-150x100.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20550%20366.666666667%22%3E%3C/svg%3E" width="550"></figure></div><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Whilst the pandemic has largely subsided, COVID is still able to severely disrupt travel plans. Therefore do consider paying close attention to the finer details of any insurers COVID-19 cover.</span></p><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Both World Nomads and SafetyWing can offer COVID-19 coverage in their policies and may be able to cover you for illness, evacuation cancellation and interruption.</span></p><div data-dcnode-id="1747" id="allianz-travel-insurance-review"><h2 class="has-text-align-center" data-dcnode-id="1748" id="h-allianz-travel-insurance-review"><span data-dcnode-id="1749" instrument_node="">Allianz Travel Insurance Review</span></h2></div><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Today we are going to review Allianz Travel Insurance. I have spent hours going through their policies and breaking them down for you. By the end of this post you should know whether Allianz is the right travel insurance for you or whether you would be better served elsewhere.</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Before we begin the Allianz Travel Insurance review, please note that a number of the links in this post are affiliate links. This means that if you click them, we may receive a commission. Furthermore, do note that terms and conditions of insurance policies are subject to changes and are always ultimately based on your individual circumstances. Therefore, it is very important that you read any policy terms and conditions yourself.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1742" instrument_node="">I would say that it also equally important that you also take some time to look at other travel insurance providers too. If you have neither the time nor the energy to this then worry not because we already did the hard work for you – you can view our findings for yourself in our </span><a aria-label="Best Travel Insurance review. (opens in a new tab)" class="ek-link" data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-insurance/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1741" instrument_node="">Best Travel Insurance review.</span></a></p><div class="post-form-cta" data-dcnode-id="1640"><div class="post-form-cta__image" data-dcnode-id="1724"><span data-dcnode-id="1738" instrument_node=""> </span><picture class="behave-as-bg" data-dcnode-id="1731"><source data-dcnode-id="1737" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-795x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1590x400.jpg 2.000x" media="(min-width: 1200px)"><source data-dcnode-id="1736" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-533x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1066x400.jpg 2.000x" media="(min-width: 992px)"><source data-dcnode-id="1735" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-572x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1144x400.jpg 2.000x" media="(min-width: 768px)"><source data-dcnode-id="1734" data-srcset="https: ></form></div></div></div><div data-dcnode-id="1637" id="do-you-need-travel-insurance"><h2 class="has-text-align-center" data-dcnode-id="1638" id="h-do-you-need-travel-insurance"><span data-dcnode-id="1639" instrument_node="">Do You Need Travel Insurance?</span></h2></div><p data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">Do you need travel insurance? Does anybody really </span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/do-i-need-travel-insurance/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1635" instrument_node="">need travel insurance</span></a><span data-dcnode-id="1633" instrument_node="">?</span></p><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">After shelling out for flights, Visa’s and </span><a class="ek-link" data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-travel-backpack/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1630" instrument_node="">a new backpack</span></a><span data-dcnode-id="1628" instrument_node="">, having to find a few more bucks for travel insurance may feel a bit depressing. I mean, all you get is a “Policy Certificate” a boring 100 page booklet to read. Aren’t there more sexy &amp; fun things to be spending that money on?</span></p><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">So you may well be asking yourself, ‘Do I need travel insurance?’ Afterall, most trips, vacations and odysseys end happily and safely without any ill occurrence. There is no definitive answer to this.</span></p><div class="wp-block-image" data-dcnode-id="1620"><figure class="aligncenter size-full is-resized" data-dcnode-id="1621"><noscript data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels.jpg" alt="travel insurance" class="wp-image-105718" width="580" height="383" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-300x198.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-768x508.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-690x456.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-877x580.jpg 877w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="travel insurance" class="lazyload wp-image-105718" data-dcnode-id="1622" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels.jpg 960w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-150x99.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-300x198.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-768x508.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-330x218.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-690x456.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/07/insurance-for-travels-877x580.jpg 877w" height="383" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20383%22%3E%3C/svg%3E" width="580"></figure></div><p data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">Here at the Broke Backpacker, we have probably spent around 10 years backpacking the globe and have probably visited over 100 countries. Most of those trips ended without incident. However, we have also clocked up a fair few mishaps along the way ranging from inflected legs, to tropical disease, all the way </span><a class="ek-link" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-central-america-safe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1618" instrument_node="">to gun-point robberies</span></a><span data-dcnode-id="1616" instrument_node="">. These incidents were all bad enough in of themselves, sometimes leaving physical and mental scars.</span></p><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Thankfully though, we were all insured at the time. This meant that we were spared the further trauma of paying out $10,000 medical bills or of having to find $400 for a new iPhone.</span></p><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Basically, insurance is one of those things that most people never actually need to use but the ones who do, are very glad that they have it. Its all a matter of your own risk appetite and your own cost/benefit analysis.</span></p><div data-dcnode-id="1608" id="what-does-travel-insurance-cover"><h2 class="has-text-align-center" data-dcnode-id="1609" id="h-what-does-travel-insurance-cover"><span data-dcnode-id="1610" instrument_node="">What Does Travel Insurance Cover?</span></h2></div><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">To help you to decide whether you personally do need travel insurance, let’s take a general look at some of the things Travel Insurance can help with, and where you would be without it.</span></p><ul data-dcnode-id="1603"><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node=""> Lost Luggage</span></li></ul><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Luggage gets lost both on planes and in airports. It shouldn’t happen, but it sure as hell does. In fact, the aviation watchdog states that 5.73 items of luggage are lost for every 1000 passengers. That means that if you take 10 flights, then there is a 5% chance of your luggage getting lost forever. Some airports and airlines lose more baggage than others but all of them are equally as obtuse and obstructive when it comes to trying to make a claim.</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Lost luggage can ruin your whole trip. I mean, imagine you head to Iceland and they lose all your cold weather gear?! That in itself is bad enough but replacing everything you own can mean you then have to find $1000 to replace your clothes, and get a new camera. Any decent travel insurance policy usually covers lost luggage, usually up to at least $1000.</span></p><ul data-dcnode-id="1594"><li data-dcnode-id="1595"><span data-dcnode-id="1598" instrument_node=""> </span><strong data-dcnode-id="1596" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1597" instrument_node="">Medical Bills</span></strong></li></ul><p data-dcnode-id="1586"><span data-dcnode-id="1593" instrument_node="">Foreign medical care costs can be very high. Our founder Will Hatton was once </span><a class="ek-link" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-costa-rica-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1592" instrument_node="">hospitalised in Costa Rica </span></a><span data-dcnode-id="1590" instrument_node="">and ran up bills in excess of $10,000. More recently he spent 1 night in a Thai hospital, was billed $1,000 and his passport was used as a ransom </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">(that boy has no luck. Maybe he should stay at home?)</span></em><span data-dcnode-id="1587" instrument_node="">. Personally, I don’t have $10,000 to pay to Costa Rican Doctors, but I do have maybe $50 to buy myself a travel insurance policy.</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">If you come from the UK or Europe, the cost of medical care in some parts of the world can be quite a revelation. If you’re in the US, then you already know all about health extortion. But do remember, your domestic health insurance will most probably not cover you outside of the US.</span></p><p data-dcnode-id="1579"><span data-dcnode-id="1583" instrument_node="">Accidents do happen </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">(and without warning…)</span></em><span data-dcnode-id="1580" instrument_node=""> and ill health can strike any of us down at any time, anywhere. In fact, if you have experienced the driving or the hygiene standards in India, you’ll already know that you are actually at a much higher risk of coming to some harm out on the road than you are at home. Yeah, travelling can be dangerous.</span></p><ul data-dcnode-id="1574"><li data-dcnode-id="1575"><span data-dcnode-id="1578" instrument_node=""> </span><strong data-dcnode-id="1576" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1577" instrument_node="">Travel Disruption &amp; Cancellation</span></strong></li></ul><p data-dcnode-id="1569"><span data-dcnode-id="1573" instrument_node="">Travel disruption comes in all shapes and sizes. Every year a few airlines or travel agents go out of business usually leaving passengers stranded. Recently the UK lost Thomas Cook and </span><a class="ek-link" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/business/2020/02/01/flybe-aircraft-owners-track-debts-amid-jet-impound-fears/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1572" instrument_node="">nearly lost FlyBE</span></a><span data-dcnode-id="1570" instrument_node="">.</span></p><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Booking flights home at short notice is costly. Not getting home on time on the other hand, can mean getting sacked from your job. Ouch. If you have to stay a few more nights at your destination waiting for a flight home, then that can also stretch a maxed out travel budget.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Having travel insurance can therefore mean the difference between desperately raiding your overdraft to pay for a hostel, or getting a few extra days vacation free of charge.</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">This can also include cancellation – if you for some reason, something comes up and you are no longer able to take your trip. For that reason, it is often worth taking out Insurance as soon as you book your trip.</span></p><ul data-dcnode-id="1558"><li data-dcnode-id="1559"><span data-dcnode-id="1562" instrument_node=""> </span><strong data-dcnode-id="1560" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1561" instrument_node="">Robbery</span></strong></li></ul><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Sadly, tourists are a target for thieves in many parts of the world. Our team have been robbed with guns in South America and I know people who’s hotels have been burgled, leaving them without diamond jewellery and MacBooks.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Being robbed can be scary. But having to find $400 for a new iPhone on top of that just sucks. This is why having insurance can be a good thing.</span></p><ul data-dcnode-id="1549"><li data-dcnode-id="1550"><span data-dcnode-id="1553" instrument_node=""> </span><strong data-dcnode-id="1551" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1552" instrument_node="">Repatriation</span></strong></li></ul><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">In the unlikely event of your demise, your travel insurance can cover the cost of repatriation or sending your body home. The costs of this can otherwise run into several thousands of dollars.</span></p><div class="product-plug product-plug__red component-margin" data-dcnode-id="1524" id=""><div class="product-plug__title" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node=""> What is the One Item Every Traveller NEEDS???</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1525"><div class="product-plug__image" data-dcnode-id="1540"><span data-dcnode-id="1544" instrument_node=""> </span><picture data-dcnode-id="1541"><source data-dcnode-id="1543" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="1542" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-800x800.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/441037/clickbait-amazon-plug-image-1600x1600.jpg 2.000x" src="data:image/svg+xml,%3Csvg%20height='800'%20width='800'%20viewBox='0%200%20800%20800'%20xmlns='http://www.w3.org/2000/svg'%3E%3Crect%20x='0'%20y='0'%20width='800'%20height='800'%20fill='%23e4e4e4'/%3E%3C/svg%3E"></picture></div><div class="product-plug__content" data-dcnode-id="1526"><p data-dcnode-id="1536"><span data-dcnode-id="1539" instrument_node="">There is one item every traveller NEEDS. Some travellers don’t even know they need it, </span><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">but those travellers need it more than anyone.</span></strong></p><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">What is this forgotten essential of the backpacker-life? SPOILERS! </span><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Guess you’ll just have to click the button to find out.</span></strong><span data-dcnode-id="1532" instrument_node=""> 😉</span></p><span data-dcnode-id="1530" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geni.us/ItBhB03" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Find Out What It Is!</span></span></a></div></div></div><div data-dcnode-id="1521" id="should-i-get-insurance"><h2 class="has-text-align-center" data-dcnode-id="1522" id="h-should-i-get-insurance"><span data-dcnode-id="1523" instrument_node="">Should I Get Insurance?</span></h2></div><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Nobody ever thinks it will happen to them and yet, it clearly does happen to somebody.</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Furthermore, the law of averages dictates that if you travel enough, something, somewhere will eventually go wrong. Just like you should always look twice before crossing the road, and always wear your helmet before riding a bike, you really should think about getting travel insurance.</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">By the way, some</span><a class="ek-link" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itij.com/latest/news/where-travel-insurance-mandatory" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1515" instrument_node=""> countries even require you to obtain insurance </span></a><span data-dcnode-id="1513" instrument_node="">before even letting you enter. Imagine been turned back at the airport for the sake of a few quid?!</span></p><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">So do you need travel insurance? Only you can decide that. But I personally never leave home without a first obtaining travel insurance either from World Nomads or SafetyWing.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1503"><span data-dcnode-id="1509" instrument_node=""> </span><a class="button button--worldnomads button--branded" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/travel-insurance/%3Faffiliate%3Dtbpg%26subId%3Dwn-insurance%26affiliateTrackingId%3Dcdc301caa74a487f94bdda9d5a4b9780%26utm_source%3Dtbpg%26utm_medium%3Daffiliate%26utm_campaign%3DAffiliate%26utm_content%3Dweblink" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1508" instrument_node="">Get A Quote at World Nomads</span></a><span data-dcnode-id="1506" instrument_node=""> </span><a class="button button--safetywing button--branded" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safetywing.com/%3FreferenceID%3D24736554" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1505" instrument_node="">Get A Quote at SafetyWing</span></a></div><div data-dcnode-id="1500" id="who-are-allianz"><h2 class="has-text-align-center" data-dcnode-id="1501" id="h-who-are-allianz"><span data-dcnode-id="1502" instrument_node="">Who Are Allianz?</span></h2></div><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">If you’re reading this then I guess you decided that you do need travel insurance. Welcome to the world of sensible adults (AKA, accepting your own mortality and the fact that you have no control whatsoever over the universe, despite whatever bullshit “The Secret” may have told you).</span></p><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Allianz are perhaps one of the biggest insurance companies in the world. They have been trading for over 120 years and they have offices a functions across the globe in a number of business areas.</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Travel Insurance is by no means their primary focus or modus operandi, but this is not a bad thing. Note that even “specialist travel insurers” are often in fact, brands or shop fronts backed by big insurance companies like Allianz.</span></p><div class="wp-block-image wp-image-176015" data-dcnode-id="1487"><figure class="aligncenter size-full is-resized" data-dcnode-id="1488"><noscript data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45.png" alt="Allianz" class="wp-image-176015" width="580" height="362" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45.png 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-300x188.png 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1024x640.png 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-150x94.png 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-768x480.png 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1536x960.png 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-2048x1280.png 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-330x206.png 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-690x431.png 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1050x656.png 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-928x580.png 928w" sizes="(max-width: 580px) 100vw, 580px" /&gt;</span></noscript><img alt="Allianz" class="lazyload wp-image-176015" data-dcnode-id="1491" data-sizes="(max-width: 580px) 100vw, 580px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45.png" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45.png 2500w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-300x188.png 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1024x640.png 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-150x94.png 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-768x480.png 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1536x960.png 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-2048x1280.png 2048w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-330x206.png 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-690x431.png 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-1050x656.png 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/02/Screenshot-2020-02-02-at-08.51.45-928x580.png 928w" height="362" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20362%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Allianz Travel Insurance</span></figcaption></figure></div><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">They are governed by the Financial Services regulators in pretty much every national market they trade in. This means that if you have a problem with them, you can squeal on them and have your case reviewed independently and fairly by an adjudicator free of charge.</span></p><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Now that the introductions are out of the way, let’s take a look at the policies they offer.</span></p><div data-dcnode-id="1480" id="allianz-travel-insurance-policies"><h2 class="has-text-align-center" data-dcnode-id="1481" id="h-allianz-travel-insurance-policies"><span data-dcnode-id="1482" instrument_node="">Allianz Travel Insurance Policies</span></h2></div><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Allianz are a major financial service provider and as such, they offer quite a few different cover types, policies and plans aimed at different travellers. We’re now going to quickly run through them and examine the crucial differences between them.</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Firstly, Allianz can offer travellers 2 main types of policy. Within these main policy types are little variations. The main policy types are OneTrip and AllTrips.</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">As the name kind of suggests, OneTrip covers one single, specific trip generally with a fixed start and end date. For example, if you are headed to Amsterdam for 4 days next June and then coming home, that is One Trip.</span></p><p data-dcnode-id="1466"><span data-dcnode-id="1473" instrument_node="">AllTrips on the other hand covers any and all trips that you make in a one year period. The period runs from the date you take&nbsp; out the policy, or a date of your choosing, and lasts for 365 days </span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">(or 366 in a leap year)</span></em><span data-dcnode-id="1470" instrument_node="">. You can take an unlimited number of trips in the year, and spend a total of up to </span><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">x</span></strong><span data-dcnode-id="1467" instrument_node=""> days traveling. Do be sure to note that all of your chosen destinations are covered by the policy though, otherwise you may need to obtain additional cover.</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">Within both the OneTrip and AllTrips umbrellas are 3 variations</span><em data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node=""> (Basic, Prime, Premier)</span></em><span data-dcnode-id="1462" instrument_node=""> which vary depending on how much cover you want and how much you want to pay.</span></p><ul data-dcnode-id="1456"><li data-dcnode-id="1457"><span data-dcnode-id="1460" instrument_node=""> </span><strong data-dcnode-id="1458" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1459" instrument_node="">OneTrip Basic</span></strong></li></ul><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">This policy covers all of the travel insurance basics such as medical costs, cancellations and lost luggage. Look at it as the entry level “classic cover” if you like.</span></p><p data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">The plan </span><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">may be able</span></strong><span data-dcnode-id="1450" instrument_node=""> to offer;</span></p><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">Emergency Medical and Dental Coverage up to $10,000 and $50,000 for Medical Evacuation </span><em data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">(ie, being sent home on a stretcher)</span></em><span data-dcnode-id="1445" instrument_node="">. Whilst these amounts may seem high, they may not always be enough especially if you need to be airlifted home from the other side of the world, from the remote jungle, or from high mountains.</span></p><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Lost or Stolen Baggage Cover up to $500 and $200 for Delayed Baggage. Now, $500 may be enough for your baggage depending on how expensive your clothes are, and whether you pack any specialist equipment. However, a decent backpack is usually worth around $200.</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Cancellation Cover up to $100,00. One of the best features of the OneTrip Basic plan is that Allianz may be able reimburse the full cost of your trip if you need to cancel or terminate the trip early. However, the reason for cancellation needs to be one of Allianz Global Assistance’s list of acceptable cancellation reasons – you can’t claim simply because you got bored or changed your mind.</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">This policy is a good all rounder and ideal for travelers on a budget. However, it does have some limitations. Some of the coverage amounts may feel a bit on the tight side. Furthermore, OneTrip Basic plan does not include coverage for missed connections or airline change fees. There are also relatively fewer accepted reasons for claiming on the trip cancellation clause.</span></p><ul data-dcnode-id="1433"><li data-dcnode-id="1434"><span data-dcnode-id="1437" instrument_node=""> </span><strong data-dcnode-id="1435" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1436" instrument_node="">OneTrip Prime</span></strong></li></ul><p data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">Broadly speaking, Prime is more or less the same as the basic package but with increased coverage amounts. The policy </span><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">may be abl</span></strong><span data-dcnode-id="1429" instrument_node="">e to offer;</span></p><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Emergency Medical and Dental Coverage up to $25,000 worth of and $500,000 worth of emergency evacuation coverage.</span></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Lost and Stolen Baggage Cover up to $1,000 which should easily cover most people’s hold luggage. However, do note that the per item max is $500 so if you pack your $8000 leather jacket into the hold, you will only get $500 back for it. It also includes Baggage Delay Costs of up to $300.</span></p><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Missed Connection Coverage up to $800.</span></p><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Airline Change Fees up to $250.</span></p><ul data-dcnode-id="1415"><li data-dcnode-id="1416"><span data-dcnode-id="1419" instrument_node=""> </span><strong data-dcnode-id="1417" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1418" instrument_node="">OneTrip Premier</span></strong></li></ul><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">In case you need a bit more on top of that, then we have One~Trip Premier. The Allianz OneTrip Premier policy is essentially the Prime one with even higher coverage amounts. OneTrip Premier </span><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">may be able </span></strong><span data-dcnode-id="1411" instrument_node="">to offer cover to;</span></p><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Emergency Medical and Dental Coverage of up to $25,000 to $50,000.</span></p><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Emergency Evacuation Coverage also increases to $1,000,000. With international evacuation averaging around $100,000, this amount is more than adequate to cover your transportation back home.</span></p><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Lost or Stolen Baggage of up $2,000. However, like with the OneTrip Prime plan, you can only claim for a maximum of $500 per item (up to $2,000 in total). $600 in Baggage Delay.</span></p><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Travel Delay coverage up to $1,600.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Missed Connection Coverage up to $1,600.</span></p><h3 data-dcnode-id="1398" id="h-other-allianz-onetrip-options-offshoots"><span data-dcnode-id="1399" instrument_node="">Other Allianz OneTrip Options &amp; Offshoots!</span></h3><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">In case that wasn’t choice enough for you, Allianz also offer 2 offshoots of their OneTrip policy. If you like, look at them as the highly specialised cousins of the OneTrip family.</span></p><ul data-dcnode-id="1391"><li data-dcnode-id="1392"><span data-dcnode-id="1395" instrument_node=""> </span><strong data-dcnode-id="1393" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1394" instrument_node="">OneTrip Cancellation Plus Plan</span></strong></li></ul><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">OneTrip Cancellation Plus Plan is definitely Allianz’s budget policy. With this plan, you are only covered against trip cancellations, interruptions and delays. Medical coverage, medical transportation and baggage loss is not included.</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Personally I would only consider this policy if (1) you are not checking luggage (2) you have medical coverage elsewhere. For example, this may be OK if you are an EU citizen taking a short break to another EU country where you only have carry-on luggage and an EU emergency healthcare card. That said, I am not sure why you should be so concerned about delays or interruptions in such a scenario!</span></p><ul data-dcnode-id="1382"><li data-dcnode-id="1383"><span data-dcnode-id="1386" instrument_node=""> </span><strong data-dcnode-id="1384" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1385" instrument_node="">OneTrip Emergency Medical Plan</span></strong></li></ul><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">This policy is great for travellers who only want Medical coverage on one single trip. It provides up to £50,00 in emergency medical coverage, and $250,000 in emergency medical transportation coverage.</span></p><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Remember that this plan only offers protection for medical costs. If you are robbed, your cuts and bruises are covered but your stolen phone is not. If the airline loses your luggage it is not covered and you claim for heartbreak. If your trip is cancelled, it will not be covered.</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">This plan is, therefore, for anybody who’s sole and only concern is healthcare costs.</span></p><h3 data-dcnode-id="1374" id="h-alltrips"><span data-dcnode-id="1375" instrument_node="">AllTrips</span></h3><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Remember, the OneTrip policies cover one specific trip. The AllTrips policies we are going to detail below cover long, or multiple trips within a one year period.</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Note that AllTrips policies may also be able tp offer Rental Car damage cover as well Dismemberment Cover. On the flip side, the Cancellation Cover is either non-existent or is limited.</span></p><ul data-dcnode-id="1365"><li data-dcnode-id="1366"><span data-dcnode-id="1369" instrument_node=""> </span><strong data-dcnode-id="1367" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1368" instrument_node="">AllTrips Basic</span></strong></li></ul><p data-dcnode-id="1360"><span data-dcnode-id="1364" instrument_node="">The AllTrips basic </span><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">may be able</span></strong><span data-dcnode-id="1361" instrument_node=""> to offer coverage for the “classic” issues on multiple trips within a one year period. Let’s see those numbers.</span></p><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Emergency Medical Coverage of $20,000,00 and $100,000 in Emergency Evacuation Coverage. Note that $20,00 on medical emergencies may still be a little on the low side in the event you get very sick in an expensive part of the world such as the US.</span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Lost/Stolen or Damaged Baggage up to $1,000. Yes, this may be able to cover most checked bags but remember the $500 max item clause. Baggage Delay is offered up to $200 and then $300 for travel delay.</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">Note that the AllTrips Basic plan does not come with Trip Cancellation or Interruption Coverage. Remember that means you will </span><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">not</span></strong><span data-dcnode-id="1352" instrument_node=""> be reimbursed in case you are unable to go on your trip!</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Rental Car Damage Coverage up to $45,000. Note that additional premiums may apply.</span></p><ul data-dcnode-id="1344"><li data-dcnode-id="1345"><span data-dcnode-id="1348" instrument_node=""> </span><strong data-dcnode-id="1346" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1347" instrument_node="">AllTrips Prime</span></strong></li></ul><p data-dcnode-id="1339"><span data-dcnode-id="1343" instrument_node="">As you probably guessed, AllTrips Prime is more or less the same as the basic package with some increased coverage amounts. The policy </span><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">may be able</span></strong><span data-dcnode-id="1340" instrument_node=""> to offer;</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Emergency Medical Coverage of $20,000,00 and $100,000 in Emergency Transportation Coverage.</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Trip Cancellation or Interruption Coverage up to $2,000.00. Remember that the reason for cancellation needs to be one of Allianz Global Assistance’s list of acceptable cancellation reasons.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Lost/Stolen or Damaged Baggage up to $1,000 and $200 for Baggage Delay.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Travel Delay up to $300.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Rental Car Damage Coverage up to $45,000. Note that additional premiums may apply.</span></p><ul data-dcnode-id="1324"><li data-dcnode-id="1325"><span data-dcnode-id="1328" instrument_node=""> </span><strong data-dcnode-id="1326" style="color: inherit; font-size: 1.56em;"><span data-dcnode-id="1327" instrument_node="">AllTrips Premier</span></strong></li></ul><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">If you want even more coverage, then we have AllTrips Premier. The Allianz AllTrips Premier policy is basically the Prime one with even higher coverage amounts. AllTrips Primer </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">may be able </span></strong><span data-dcnode-id="1320" instrument_node="">to cover;</span></p><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Emergency Medical Coverage of $50,000,00 and $500,000 in Emergency Transportation Coverage.</span></p><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Trip Cancellation or Interruption Coverage up to $2,000.00.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Lost/Stolen or Damaged Baggage up to $1,000 and $200 for Baggage Delay.</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Travel Delay Coverage of up to $1,500.00.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Rental Car Damage Coverage up to $45,000. Note that additional premiums may apply.</span></p><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Dismemberment and Travel Accident up to $50,000 if you lose a limb or your eyesight when traveling.</span></p><div class="product-plug product-plug__black component-margin" data-dcnode-id="1269" id=""><div class="product-plug__title" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node=""> Small Pack Problems? 😉</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1270"><div class="product-plug__image" data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node=""> </span><picture data-dcnode-id="1301"><source data-dcnode-id="1303" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-plug-800x800.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/487201/exploding-suitcase-packing-cube-sack-pl
