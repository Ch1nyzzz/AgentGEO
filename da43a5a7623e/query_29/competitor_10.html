</span><p data-dcnode-id="9616"><img alt="Canal in Amsterdam" class="alignnone size-full wp-image-5976" data-dcnode-id="9619" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2011/12/amsterdam-boats-canals.jpg&amp;raw" width="640"><noscript data-dcnode-id="9617"><span data-dcnode-id="9618" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-5976" src="https://santorinidave.com/wp-content/uploads/2011/12/amsterdam-boats-canals.jpg" alt="Canal in Amsterdam" width="640" height="440" /&gt;</span></noscript></p><span data-dcnode-id="9615" instrument_node="">
</span><h3 data-dcnode-id="9613"><span data-dcnode-id="9614" instrument_node="">Amsterdam Highlights</span></h3><span data-dcnode-id="9612" instrument_node="">
</span><ul data-dcnode-id="9578"><span data-dcnode-id="9611" instrument_node="">
</span><li data-dcnode-id="9606"><span data-dcnode-id="9610" instrument_node="">Boat tour: Hop on board a </span><a data-dcnode-id="9608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stromma.nl/en/amsterdam/" rel="noopener noreferrer" target="_blank" title="Tour information for Amsterdam's canals"><span data-dcnode-id="9609" instrument_node="">canal tour</span></a><span data-dcnode-id="9607" instrument_node=""> or rent your own pedal boat (from the same shop) to see Amsterdam’s famous canals. There are 3 lines for the canal tours and 14 stops. Day passes are available and most of Amsterdam’s major sites are easily accessible from the</span></li><span data-dcnode-id="9605" instrument_node="">
</span><li data-dcnode-id="9603"><span data-dcnode-id="9604" instrument_node="">Bike tour: Amsterdam is famous for it’s bike friendly culture and visitors will feel quite comfortable getting around it’s compact center on 2 wheels. Numerous shops rent bikes and little ones can hop into a bakfiets — the local version of a bike trailer.</span></li><span data-dcnode-id="9602" instrument_node="">
</span><li data-dcnode-id="9598"><a data-dcnode-id="9600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nemosciencemuseum.nl/" rel="noopener noreferrer" target="_blank" title="Information on visiting the NEMO science center in Amsterdam"><span data-dcnode-id="9601" instrument_node="">Science Center NEMO</span></a><span data-dcnode-id="9599" instrument_node="">: Lots of hands-on fun at the Netherlands largest science museum for children aged 6 to 16.</span></li><span data-dcnode-id="9597" instrument_node="">
</span><li data-dcnode-id="9580"><span data-dcnode-id="9596" instrument_node="">Visit one of Amserdam’s beautiful parks: Both </span><a data-dcnode-id="9594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsterdam.info/parks/amsterdamse-bos/" rel="noopener noreferrer" target="_blank" title="Information on Amsterdamse Bos"><span data-dcnode-id="9595" instrument_node="">Amsterdamse Bos</span></a><span data-dcnode-id="9593" instrument_node=""> (cheese farms, watersports, and horse riding) and </span><a data-dcnode-id="9591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsterdam.info/parks/vondelpark/" rel="noopener noreferrer" target="_blank" title="Information for visiting Vodelpark"><span data-dcnode-id="9592" instrument_node="">Vondelpark</span></a><span data-dcnode-id="9590" instrument_node=""> (walking, biking, an open air theatre, &nbsp;playground, and near to </span><a data-dcnode-id="9588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsterdam.info/museums/rijksmuseum/" rel="noopener noreferrer" target="_blank" title="Info"><span data-dcnode-id="9589" instrument_node="">Rijksmuseum</span></a><span data-dcnode-id="9587" instrument_node="">,&nbsp;</span><a data-dcnode-id="9585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsterdam.info/museums/stedelijk_museum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="9586" instrument_node="">Stedelijk Museum</span></a><span data-dcnode-id="9584" instrument_node=""> and&nbsp;</span><a data-dcnode-id="9582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amsterdam.info/museums/van_gogh_museum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="9583" instrument_node="">Van Gogh Museum</span></a><span data-dcnode-id="9581" instrument_node="">) are great parks that could keep the kids busy for hours.</span></li><span data-dcnode-id="9579" instrument_node="">
</span></ul><span data-dcnode-id="9577" instrument_node="">

</span><li data-dcnode-id="9342"><a data-dcnode-id="9344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dublinzoo.ie/" rel="noopener noreferrer" target="_blank" title="Visit the Dublin Zoo"><span data-dcnode-id="9345" instrument_node="">Dublin Zoo</span></a><span data-dcnode-id="9343" instrument_node="">: One of Europe’s best zoos. Easy access with the hop-on hop-off bus.</span></li><span data-dcnode-id="9341" instrument_node="">
</span><li data-dcnode-id="9337"><a data-dcnode-id="9339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kilmainhamgaolmuseum.ie/" rel="noopener noreferrer" target="_blank" title="Information for visiting Kilmainham Gaol"><span data-dcnode-id="9340" instrument_node="">Kilmainham Gaol Historical Museum</span></a><span data-dcnode-id="9338" instrument_node="">: A great introduction to Ireland’s history. Located out of town but on the hop-on, hop-off bus route.</span></li><span data-dcnode-id="9336" instrument_node="">
</span><li data-dcnode-id="9332"><a data-dcnode-id="9334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.museum.ie/en-IE/Museums/Archaeology" rel="noopener noreferrer" target="_blank" title="Visiting the National Museum of Archeology in Dublin"><span data-dcnode-id="9335" instrument_node="">The National Museum – Archeology</span></a><span data-dcnode-id="9333" instrument_node="">: Features items pulled from the bogs (including mummified bodies) and a viking exhibit that are very popular with kids.</span></li><span data-dcnode-id="9331" instrument_node="">
</span><li data-dcnode-id="9327"><a data-dcnode-id="9329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.museum.ie/en-IE/Museums/Natural-History" rel="noopener noreferrer" target="_blank" title="The Natural History Museum in Dublin"><span data-dcnode-id="9330" instrument_node="">The Natural History Museum</span></a><span data-dcnode-id="9328" instrument_node=""> (a.k.a. the Dead Zoo): An amazing collection of animals that kids love.</span></li><span data-dcnode-id="9326" instrument_node="">
</span><li data-dcnode-id="9322"><a data-dcnode-id="9324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/VikingSplashDublin/" rel="noopener noreferrer" target="_blank" title="Viking Splash tours of Dublin"><span data-dcnode-id="9325" instrument_node="">Viking Splash</span></a><span data-dcnode-id="9323" instrument_node="">: Tour Dublin and get a (small) spattering of history aboard an amphibious WW II vehicle.</span></li><span data-dcnode-id="9321" instrument_node="">
</span><li data-dcnode-id="9310"><span data-dcnode-id="9320" instrument_node="">Take the </span><a data-dcnode-id="9318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dublin.ie/live/life-in-dublin/getting-around/" rel="noopener noreferrer" target="_blank" title="Information for the DART train in Dublin"><span data-dcnode-id="9319" instrument_node="">DART</span></a><span data-dcnode-id="9317" instrument_node=""> train to </span><a data-dcnode-id="9315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishtourist.com/location/ireland/co-dublin/howth/" rel="noopener noreferrer" target="_blank" title="Things to do in Howth, Ireland"><span data-dcnode-id="9316" instrument_node="">Howth</span></a><span data-dcnode-id="9314" instrument_node=""> (north) or </span><a data-dcnode-id="9312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bray.ie/" rel="noopener noreferrer" target="_blank" title="Information on Visiting Bray"><span data-dcnode-id="9313" instrument_node="">Bray</span></a><span data-dcnode-id="9311" instrument_node=""> (south): Get to the coast, go for a walk, play on the beach, and take a break from the city.</span></li><span data-dcnode-id="9309" instrument_node="">
</span></ul><span data-dcnode-id="9307" instrument_node="">

</span><h3 data-dcnode-id="9250"><span data-dcnode-id="9251" instrument_node="">Edinburgh Highlights</span></h3><span data-dcnode-id="9249" instrument_node="">
</span><ul data-dcnode-id="9211"><span data-dcnode-id="9248" instrument_node="">
</span><li data-dcnode-id="9244"><a data-dcnode-id="9246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edinburghtour.com/" rel="noopener noreferrer" target="_blank" title="Edinburgh double decker bus tours"><span data-dcnode-id="9247" instrument_node="">Edinburgh Bus Tours</span></a><span data-dcnode-id="9245" instrument_node="">: It’s a hilly city with lots of up and down (on cobblestoned streets that don’t lend themselves to strollers). This hop-on hop-off bus has 24 stops sprinkled around the city center.</span></li><span data-dcnode-id="9243" instrument_node="">
</span><li data-dcnode-id="9239"><a data-dcnode-id="9241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edinburghcastle.scot/" rel="noopener noreferrer" target="_blank" title="Edinburgh Castle"><span data-dcnode-id="9242" instrument_node="">Edinburgh Castle</span></a><span data-dcnode-id="9240" instrument_node="">: Just about everyone’s favorite attraction in Edinburgh. A must.</span></li><span data-dcnode-id="9238" instrument_node="">
</span><li data-dcnode-id="9234"><a data-dcnode-id="9236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edinburghmuseums.org.uk/venue/museum-childhood" rel="noopener noreferrer" target="_blank" title="The Museum of Childhood in Edinburgh"><span data-dcnode-id="9237" instrument_node="">Museum of Childhood</span></a><span data-dcnode-id="9235" instrument_node="">: 4 floors of games, toys, and action figures. Lots of hands on fun for kids of all ages.</span></li><span data-dcnode-id="9233" instrument_node="">
</span><li data-dcnode-id="9229"><a data-dcnode-id="9231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dynamicearth.co.uk/" rel="noopener noreferrer" target="_blank" title="Dynamic Earth in Edinburgh"><span data-dcnode-id="9232" instrument_node="">Dynamic Earth</span></a><span data-dcnode-id="9230" instrument_node="">: Fun, educational, and engaging. An interactive museum with films and presentations.</span></li><span data-dcnode-id="9228" instrument_node="">
</span><li data-dcnode-id="9224"><a data-dcnode-id="9226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nms.ac.uk/national-museum-of-scotland" rel="noopener noreferrer" target="_blank" title="National Museum of Scotland"><span data-dcnode-id="9227" instrument_node="">National Museum of Scotland</span></a><span data-dcnode-id="9225" instrument_node="">: Hands on fun for kids. Loads of Scottish history for the adults.</span></li><span data-dcnode-id="9223" instrument_node="">
</span><li data-dcnode-id="9213"><a data-dcnode-id="9221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edfringe.com/" rel="noopener noreferrer" target="_blank" title="The Edinburgh Fringe Festival (also for families)"><span data-dcnode-id="9222" instrument_node="">Edinburgh Fringe Festival</span></a><span data-dcnode-id="9220" instrument_node="">: If you’re in Edinburgh in August — and can find accommodation — be sure to take in the festival’s children’s theatre, puppetry, kids comedy, and dance and music workshops. If your visit is in May then the </span><a data-dcnode-id="9218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imaginate.org.uk/" rel="noopener noreferrer" target="_blank" title="Imaginate Children's Theatre and Arts Festival"><span data-dcnode-id="9219" instrument_node="">Imaginate Children’s Theatre Festival</span></a><span data-dcnode-id="9217" instrument_node=""> is a can’t miss event. And for April there’s the wonderful </span><a data-dcnode-id="9215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencefestival.co.uk/" rel="noopener noreferrer" target="_blank" title="Edinburgh Science Festival"><span data-dcnode-id="9216" instrument_node="">Edinburgh International Science Festival</span></a><span data-dcnode-id="9214" instrument_node="">.</span></li><span data-dcnode-id="9212" instrument_node="">
</span></ul><span data-dcnode-id="9210" instrument_node="">

</span><h2 data-dcnode-id="9152"><span data-dcnode-id="9153" instrument_node="">Greek Islands with Kids</span></h2><span data-dcnode-id="9151" instrument_node="">
</span><p data-dcnode-id="9142"><img alt="Cruise ship docked off Santorini." class="alignnone size-full wp-image-5985" data-dcnode-id="9150" height="440" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise.jpg 640w, https://santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise-624x429.jpg 624w" width="640"><noscript data-dcnode-id="9148"><span data-dcnode-id="9149" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-5985" src="https://santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise.jpg" alt="Cruise ship docked off Santorini." width="640" height="440" srcset="https://santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise.jpg 640w, https://santorinidave.com/wp-content/uploads/2011/12/greece-santorini-cruise-624x429.jpg 624w" sizes="(max-width: 640px) 100vw, 640px" /&gt;</span></noscript><br data-dcnode-id="9147"><span data-dcnode-id="9146" instrument_node="">
Taking ferries between the </span><a data-dcnode-id="9144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/best-greek-islands" rel="noopener" target="_blank"><span data-dcnode-id="9145" instrument_node="">Greek Islands</span></a><span data-dcnode-id="9143" instrument_node=""> is fun and easy (though if you’re on a tight schedule booking tickets in advance can be frustrating). If island hopping is what you want then the Cyclades (Santorini, Naxos, Paros, Mykonos, Milos, Ios) are the best islands to visit as they’re close to each other and have lots of ferry connections between them.</span></p><span data-dcnode-id="9141" instrument_node="">
</span><h3 data-dcnode-id="9139"><span data-dcnode-id="9140" instrument_node="">Greece Highlights</span></h3><span data-dcnode-id="9138" instrument_node="">
</span><ul data-dcnode-id="9106"><span data-dcnode-id="9137" instrument_node="">
</span><li data-dcnode-id="9133"><a data-dcnode-id="9135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/santorini-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9136" instrument_node="">Santorini</span></a><span data-dcnode-id="9134" instrument_node=""> – Incredible views and scenery. Take a boat tour of the caldera which was formed by a volcanic explosion and forms a huge cliff that runs the length of the entire island. The beaches are not Greece’s best but there is a water park with slides.</span></li><span data-dcnode-id="9132" instrument_node="">
</span><li data-dcnode-id="9128"><a data-dcnode-id="9130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/crete-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9131" instrument_node="">Crete</span></a><span data-dcnode-id="9129" instrument_node=""> – The largest island in Greece. Lots to do and see. Great beaches, historical sites, small traditional villages, thriving cities, and some wonderful hikes. Crete offers a little bit of everything – or rather, a lot of everything.</span></li><span data-dcnode-id="9127" instrument_node="">
</span><li data-dcnode-id="9123"><a data-dcnode-id="9125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/rhodes-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9126" instrument_node="">Rhodes</span></a><span data-dcnode-id="9124" instrument_node=""> – A great island if you’re looking to visit Turkey – whether it be a day trip or a more involved trip up to Istanbul. Rhodes has great beaches and an incredible Old Town.</span></li><span data-dcnode-id="9122" instrument_node="">
</span><li data-dcnode-id="9118"><a data-dcnode-id="9120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/naxos-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9121" instrument_node="">Naxos</span></a><span data-dcnode-id="9119" instrument_node=""> – The best island for families in all of Greece. Wonderful kid-friendly beaches, with a gentle slope, and calm shallow water. The main village is packed with fun restaurants and shops. The island’s interior offers interesting traditional villages and great walks.</span></li><span data-dcnode-id="9117" instrument_node="">
</span><li data-dcnode-id="9113"><a data-dcnode-id="9115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/paros-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9116" instrument_node="">Paros</span></a><span data-dcnode-id="9114" instrument_node=""> – A hipper version of Naxos with a bit more partying and shopping and perhaps beaches that aren’t quite so kid-friendly – though still wonderful. Nearby Antiparos is a great day trip for its laid-back charm and quiet beaches.</span></li><span data-dcnode-id="9112" instrument_node="">
</span><li data-dcnode-id="9108"><a data-dcnode-id="9110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/corfu-family-hotels" rel="noopener" target="_blank"><span data-dcnode-id="9111" instrument_node="">Corfu</span></a><span data-dcnode-id="9109" instrument_node=""> – One of Greece’s most beautiful islands. Corfu Town is a beautiful old city and makes a great base for exploring the island. Lots of kid-friendly activities on the island (including a water park) and some great beaches.</span></li><span data-dcnode-id="9107" instrument_node="">
</span></ul><span data-dcnode-id="9105" instrument_node="">

</span><li data-dcnode-id="9029"><a data-dcnode-id="9034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ltmuseum.co.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="9035" instrument_node="">The London Transport Museum</span></a><span data-dcnode-id="9033" instrument_node=""> and </span><a data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iwm.org.uk/visits/iwm-london" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="9032" instrument_node="">The Imperial War Museum</span></a><span data-dcnode-id="9030" instrument_node="">: My kids loved these museums and they’re 2 of London’s best attractions for kids.</span></li><span data-dcnode-id="9028" instrument_node="">
</span><li data-dcnode-id="9021"><a data-dcnode-id="9026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrp.org.uk/tower-of-london/" rel="noopener noreferrer" target="_blank" title="Tower of London"><span data-dcnode-id="9027" instrument_node="">Tower of London</span></a><span data-dcnode-id="9025" instrument_node=""> and </span><a data-dcnode-id="9023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.towerbridge.org.uk/" rel="noopener noreferrer" target="_blank" title="Tower Bridge"><span data-dcnode-id="9024" instrument_node="">Tower Bridge</span></a><span data-dcnode-id="9022" instrument_node="">: History and sightseeing; torture chambers and a medieval castle.</span></li><span data-dcnode-id="9020" instrument_node="">
</span><li data-dcnode-id="9016"><a data-dcnode-id="9018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.londoneye.com/" rel="noopener noreferrer" target="_blank" title="London Eye"><span data-dcnode-id="9019" instrument_node="">London Eye</span></a><span data-dcnode-id="9017" instrument_node="">: Great views of the city from the world’s tallest observation wheel.</span></li><span data-dcnode-id="9015" instrument_node="">

</span><h3 data-dcnode-id="8920"><span data-dcnode-id="8921" instrument_node="">Paris Highlights</span></h3><span data-dcnode-id="8919" instrument_node="">
</span><ul data-dcnode-id="8889"><span data-dcnode-id="8918" instrument_node="">
</span><li data-dcnode-id="8914"><a data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/" rel="noopener noreferrer" target="_blank" title="Information for visiting the Eiffel Tower"><span data-dcnode-id="8917" instrument_node="">The Eiffel Tower</span></a><span data-dcnode-id="8915" instrument_node=""> (of course): Great views are often dismissed by kids as boring, but not from the Tour Eiffel. The city looks small far below but never feels distant. If your kids are old enough walk the stairs instead of wait in line for the elevator.</span></li><span data-dcnode-id="8913" instrument_node="">
</span><li data-dcnode-id="8909"><a data-dcnode-id="8911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catacombes.paris.fr/" rel="noopener noreferrer" target="_blank" title="The Catacombes in Paris"><span data-dcnode-id="8912" instrument_node="">The Catacombs</span></a><span data-dcnode-id="8910" instrument_node="">: Run this by your kids first — you’ll descend 20 metres below street level where you’ll be able to explore 1.7km of corridors walled with the remains of long dead Parisians. They’ll either be thrilled or terrified and you can make your plans from there.</span></li><span data-dcnode-id="8908" instrument_node="">
</span><li data-dcnode-id="8901"><a data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.motherofalltrips.com/2013/09/louvre-with-kids.html" rel="noopener noreferrer" target="_blank" title="Information for visiting the Louvre with kids"><span data-dcnode-id="8907" instrument_node="">Musée de Louvre</span></a><span data-dcnode-id="8905" instrument_node="">: It’s a huge intimidating museum that can make for a long visit for kids or an enthralling cultural journey depending on how you approach it. Read and discuss some of the paintings and sculptures before you arrive. Buy postcards of famous paintings and hunt for them during your visit. The </span><a data-dcnode-id="8903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/louvre-museum-skip-the-line-entrance-ticket-t145779/%3Fpartner_id%3DSOFBH69%26cmp%3Dmln-euro" rel="noopener sponsored" target="_blank"><span data-dcnode-id="8904" instrument_node="">Skip the Line Guided Tour</span></a><span data-dcnode-id="8902" instrument_node=""> is worth the expense.</span></li><span data-dcnode-id="8900" instrument_node="">
</span><li data-dcnode-id="8896"><a data-dcnode-id="8898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mnhn.fr/" rel="noopener noreferrer" target="_blank" title="The Paris Natural History Museum"><span data-dcnode-id="8899" instrument_node="">Musée d’Histoire&nbsp;Naturelle de&nbsp;Paris</span></a><span data-dcnode-id="8897" instrument_node="">: France’s best science museum could fill a whole day. The highlight for kids is usually the Galerie de l’Evolution.</span></li><span data-dcnode-id="8895" instrument_node="">
</span><li data-dcnode-id="8891"><a data-dcnode-id="8893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.notredamedeparis.fr/" rel="noopener noreferrer" target="_blank" title="Notre Dame Cathedral in Paris"><span data-dcnode-id="8894" instrument_node="">Notre Dame Cathedral</span></a><span data-dcnode-id="8892" instrument_node="">: Climb the 422 steps to the cathedral’s towers and you’ll be face to face with some fierce Gargoyles and an incredible view of Paris. Kids will recognize the scenes from The Hunchback of Notre Dame.</span></li><span data-dcnode-id="8890" instrument_node="">

</span><h2 data-dcnode-id="8818"><span data-dcnode-id="8819" instrument_node="">Prague With Kids</span></h2><span data-dcnode-id="8817" instrument_node="">
</span><p data-dcnode-id="8813"><img alt="Prague with Kids – Things To Do and Best Prague Tours for Families" class="alignnone size-full wp-image-8787" data-dcnode-id="8816" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/03/prague-with-kids-best-tours-things-to-do.jpg&amp;raw" width="640"><noscript data-dcnode-id="8814"><span data-dcnode-id="8815" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/03/prague-with-kids-best-tours-things-to-do.jpg" alt="Prague with Kids – Things To Do and Best Prague Tours for Families" width="640" height="440" class="alignnone size-full wp-image-8787" /&gt;</span></noscript></p><span data-dcnode-id="8812" instrument_node="">
</span><h3 data-dcnode-id="8810"><span data-dcnode-id="8811" instrument_node="">Prague Highlights</span></h3><span data-dcnode-id="8809" instrument_node="">
</span><ul data-dcnode-id="8792"><span data-dcnode-id="8808" instrument_node="">
</span><li data-dcnode-id="8806"><span data-dcnode-id="8807" instrument_node="">Petřín Hill has a funicular that goes up to the top you’ll have great views, a mirror maze for kids, pony rides on the weekends, and a sizeable rose garden. For an even better view, climb up to the top of Lookout Tower or visit the observatory to take in the stars through their collection of telescopes.</span></li><span data-dcnode-id="8805" instrument_node="">
</span><li data-dcnode-id="8803"><span data-dcnode-id="8804" instrument_node="">Nostalgic Tram No. 91 is a unique way to see the city. Vintage tram cars from the early 1900s travel along a special route that runs throughout Prague and past many of the city’s best sights. Not well known among tourists and for an affordable $1.50, it’s popular with both young and old.</span></li><span data-dcnode-id="8802" instrument_node="">
</span><li data-dcnode-id="8800"><span data-dcnode-id="8801" instrument_node="">Theater and Puppet Shows – There are several kid friendly theater options unique to Prague including the Black Light Theater which combines elements of dance, animation, mimes and illusions. Puppet shows also have a strong tradition in the Czech Republic and the National Marionette Theater does puppet versions of Mozart’s Don Giovanni and the Magic Flute.</span></li><span data-dcnode-id="8799" instrument_node="">
</span><li data-dcnode-id="8797"><span data-dcnode-id="8798" instrument_node="">Kid-Friendly Museums – At the Art Gallery for Children (Galerie umění pro děti) children are encouraged to interact in this multimedia space by touching, creating or even altering the art installations. Workshops are available for kids 5-12 and it’s a great way to introduce them to art. Or visit the Lego Museum – the largest in Europe. You’ll get to see lego versions of classic Prague landmarks like the 5 meter tall Charles Bridge.</span></li><span data-dcnode-id="8796" instrument_node="">
</span><li data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">Children’s Island – Though there are numerous outdoor playgrounds around Prague, this one is devoted entirely to kids. It features a full range of swings, slides, climbing nets, sandpits, open space to run around. Most importantly it offers a great place for parents to sit and relax on the bank of the Vltava River with a nearby café for coffee and refreshments.</span></li><span data-dcnode-id="8793" instrument_node="">
</span></ul><span data-dcnode-id="8791" instrument_node="">

</span><ul data-dcnode-id="8684"><span data-dcnode-id="8719" instrument_node="">
</span><li data-dcnode-id="8708"><span data-dcnode-id="8718" instrument_node="">The cities of </span><a data-dcnode-id="8716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travelforkids.com/Funtodo/France/provenceregion/arles.htm" rel="noopener noreferrer" target="_blank" title="Visiting Arles with kids"><span data-dcnode-id="8717" instrument_node="">Arles</span></a><span data-dcnode-id="8715" instrument_node="">, </span><a data-dcnode-id="8713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Avignon" rel="noopener noreferrer" target="_blank" title="Information on Avignon"><span data-dcnode-id="8714" instrument_node="">Avignon</span></a><span data-dcnode-id="8712" instrument_node="">, and </span><a data-dcnode-id="8710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aixenprovencetourism.com/" rel="noopener noreferrer" target="_blank" title="Tourist office for Aix-en-Provence"><span data-dcnode-id="8711" instrument_node="">Aix-en-Provence</span></a><span data-dcnode-id="8709" instrument_node=""> — Three cultural giants that are beautiful, walkable, and packed with cool attractions. Each is overflowing with art and architecture and all are within an hour’s drive of each other.</span></li><span data-dcnode-id="8707" instrument_node="">
</span><li data-dcnode-id="8705"><span data-dcnode-id="8706" instrument_node="">Beaches: The southern coast of France is known for it’s fantastic beaches with the best found between St Tropez and St Raphael.</span></li><span data-dcnode-id="8704" instrument_node="">
</span><li data-dcnode-id="8696"><span data-dcnode-id="8703" instrument_node="">Monaco: A small city state whose narrow winding streets are fun to explore. Highlights for the kids will undoubtedly be the fantastic </span><a data-dcnode-id="8701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musee.oceano.org/" rel="noopener noreferrer" target="_blank" title="The aquarium in Monaco"><span data-dcnode-id="8702" instrument_node="">Oceanographic Museum</span></a><span data-dcnode-id="8700" instrument_node="">, the Prince’s </span><a data-dcnode-id="8698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.palais.mc/en/museum-and-visits/the-cars-collection-of-h-s-h-the-prince-of-monaco-1-27.html" rel="noopener noreferrer" target="_blank" title="Information on the Prince of Monaco's collection of cars"><span data-dcnode-id="8699" instrument_node="">collection of antique cars</span></a><span data-dcnode-id="8697" instrument_node="">, and the parks and gardens that fill the city.</span></li><span data-dcnode-id="8695" instrument_node="">
</span><li data-dcnode-id="8691"><a data-dcnode-id="8693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pontdugard.fr/" rel="noopener noreferrer" target="_blank" title="Information on visiting Le Pont du Gard"><span data-dcnode-id="8694" instrument_node="">Le Pont du Gard</span></a><span data-dcnode-id="8692" instrument_node="">: This Unesco World Heritage Site is a wonder of Roman planning and architecture. The kids program for 5-12 year olds is enriching, well designed, and describes in detail how the aqueduct was built and used.</span></li><span data-dcnode-id="8690" instrument_node="">
</span><li data-dcnode-id="8686"><a data-dcnode-id="8688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carcassonne.org/" rel="noopener noreferrer" target="_blank" title="Tourist information for the Carcassonne"><span data-dcnode-id="8689" instrument_node="">Carcassonne</span></a><span data-dcnode-id="8687" instrument_node="">: A remarkably well preserved medieval city. Le Cite can be painfully busy during July and August but as it’s one of Europe’s largest city fortifications it’s probably worth enduring the crowds.</span></li><span data-dcnode-id="8685" instrument_node="">
</span></ul><span data-dcnode-id="8683" instrument_node="">

</span><p data-dcnode-id="8624"><img alt="Trevi Fountain in Rome." class="alignnone size-full wp-image-5983" data-dcnode-id="8627" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2011/12/rome-trevi-fountain.jpg&amp;raw" width="640"><noscript data-dcnode-id="8625"><span data-dcnode-id="8626" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-5983" src="https://santorinidave.com/wp-content/uploads/2011/12/rome-trevi-fountain.jpg" alt="Trevi Fountain in Rome." width="640" height="440" /&gt;</span></noscript></p><span data-dcnode-id="8623" instrument_node="">
</span><h3 data-dcnode-id="8621"><span data-dcnode-id="8622" instrument_node="">Rome Highlights</span></h3><span data-dcnode-id="8620" instrument_node="">
</span><ul data-dcnode-id="8585"><span data-dcnode-id="8619" instrument_node="">
</span><li data-dcnode-id="8615"><a data-dcnode-id="8617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travelforkids.com/Funtodo/Italy/romecity/colosseum-forum.htm" rel="noopener noreferrer" target="_blank" title="Information on visiting the Colosseum and Forum with kids"><span data-dcnode-id="8618" instrument_node="">Colosseum and Roman Forum</span></a><span data-dcnode-id="8616" instrument_node="">:&nbsp;the highlight of a trip to Rome (likely for the whole family). Visit early to avoid the heat and crowds.</span></li><span data-dcnode-id="8614" instrument_node="">
</span><li data-dcnode-id="8610"><a data-dcnode-id="8612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travelforkids.com/Funtodo/Italy/romecity/borghesegardens.htm" rel="noopener noreferrer" target="_blank" title="Villa Borghese Park in Rome for kids"><span data-dcnode-id="8613" instrument_node="">Villa Borghese Gardens</span></a><span data-dcnode-id="8611" instrument_node="">:&nbsp;rent row boats and bikes, have a picnic, hop on the #3 tram for a tour of Rome, and visit the Cinema dei Piccoli for afternoon and evening children’s movies. This large park can easily form the basis of an entire day’s activities.</span></li><span data-dcnode-id="8609" instrument_node="">
</span><li data-dcnode-id="8605"><a data-dcnode-id="8607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdbr.it/" rel="noopener noreferrer" target="_blank" title="Rome's kid museum"><span data-dcnode-id="8608" instrument_node="">Explora</span></a><span data-dcnode-id="8606" instrument_node="">: Rome’s top notch kids’ museum has lots of hands-on fun, an outdoor play area, and an ice cream shop. Visits are limited to 90 minutes.</span></li><span data-dcnode-id="8604" instrument_node="">
</span><li data-dcnode-id="8596"><span data-dcnode-id="8603" instrument_node="">Tivoli’s temples and gardens make a great day trip out of the city. The nearby </span><a data-dcnode-id="8601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aquapiper.it/" rel="noopener noreferrer" target="_blank" title="The Water park near Rome"><span data-dcnode-id="8602" instrument_node="">Aquapiper</span></a><span data-dcnode-id="8600" instrument_node=""> water park makes it worthwhile for the kids as well. (</span><a data-dcnode-id="8598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydromania.it/" rel="noopener noreferrer" target="_blank" title="A water park near Rome"><span data-dcnode-id="8599" instrument_node="">Hydromania</span></a><span data-dcnode-id="8597" instrument_node=""> is another water park closer to Rome.)</span></li><span data-dcnode-id="8595" instrument_node="">
</span><li data-dcnode-id="8587"><span data-dcnode-id="8594" instrument_node="">Visiting the </span><a data-dcnode-id="8592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vatican.va/content/vatican/en.html" rel="noopener noreferrer" target="_blank" title="Visiting the Vatican with kids"><span data-dcnode-id="8593" instrument_node="">Vatican</span></a><span data-dcnode-id="8591" instrument_node=""> and the </span><a data-dcnode-id="8589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.museivaticani.va/content/museivaticani/en.html" rel="noopener noreferrer" target="_blank" title="Info on visiting the Vatican museum"><span data-dcnode-id="8590" instrument_node="">Vatican Museum</span></a><span data-dcnode-id="8588" instrument_node=""> probably won’t be at the top of your children’s to do list. If you decide to go anyway, a private tour will allow you to skip the long entrance lines and pick out the highlights of the museum’s extensive works.</span></li><span data-dcnode-id="8586" instrument_node="">
</span></ul><span data-dcnode-id="8584" instrument_node="">

</span><p data-dcnode-id="8521"><img alt="Tuscany and Umbria Agriturismo with swimming pool for Family" class="alignnone size-full wp-image-8788" data-dcnode-id="8524" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/04/agriturismo-with-kids-family-friendly-farm-stay-in-tuscany.jpg&amp;raw" width="640"><noscript data-dcnode-id="8522"><span data-dcnode-id="8523" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/04/agriturismo-with-kids-family-friendly-farm-stay-in-tuscany.jpg" alt="Tuscany and Umbria Agriturismo with swimming pool for Family" width="640" height="440" class="alignnone size-full wp-image-8788" /&gt;</span></noscript></p><span data-dcnode-id="8520" instrument_node="">
</span><p data-dcnode-id="8512"><span data-dcnode-id="8519" instrument_node="">This is so much fun for families. Stay at one of the </span><a data-dcnode-id="8517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/tuscany-agriturismo" rel="noopener" target="_blank"><span data-dcnode-id="8518" instrument_node="">Best Agriturismo in Tuscany</span></a><span data-dcnode-id="8516" instrument_node=""> or </span><a data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/umbria-agriturismo" rel="noopener" target="_blank"><span data-dcnode-id="8515" instrument_node="">Best Agriturismo in Umbria</span></a><span data-dcnode-id="8513" instrument_node="">. These are working farms typically with a beautiful setting and a rustic atmosphere (though accommodations can range from spartan to luxurious). Getting a villa that has a swimming pool is a good idea when traveling with kids. Meals are often included (and delicious). Getting a rental car is close to mandatory as agriturismos are off the usual bus and train routes.</span></p><span data-dcnode-id="8511" instrument_node="">

</span><ul data-dcnode-id="8496"><span data-dcnode-id="8507" instrument_node="">
</span><li data-dcnode-id="8503"><a data-dcnode-id="8505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/it/salvadonica.html%3Faid%3D346426%3Blabel%3Dmln-eurokids" rel="noopener sponsored" target="_blank"><span data-dcnode-id="8506" instrument_node="">Salvadonica</span></a><span data-dcnode-id="8504" instrument_node=""> – Family rooms sleep family of five. Nice swimming pool.</span></li><span data-dcnode-id="8502" instrument_node="">
</span><li data-dcnode-id="8498"><a data-dcnode-id="8500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/it/castello-vicchiomaggio.html%3Faid%3D346426%3Blabel%3Dmln-eurokids" rel="noopener sponsored" target="_blank"><span data-dcnode-id="8501" instrument_node="">Castello Vicchiomaggio</span></a><span data-dcnode-id="8499" instrument_node=""> – Two-bedroom apartments and family junior suites sleep families of four and five. Nice swimming pool.</span></li><span data-dcnode-id="8497" instrument_node="">

</span><p data-dcnode-id="7985"><span data-dcnode-id="7986" instrument_node="">This is a great resource. I was reading all the previous questions and answers, trying to triangulate to an answer. But, I thought I’d comment directly – I have a 13, 11, 9 year-old kids who have never been to Europe. We have a week (plus weekends) off in April and trying to figure out a good european destination. Based on your insights, I was thinking Barcelona, but wanted to see if you thought hitting another location there is feasible/recommended, and if so, what do you suggest? They’ve never been on a “real” train to date, so wondering if Nice or Madrid would be a good experience. Anyhow, I’m very open if you have any recommendations since we are a blank slate. Thanks in advance.</span></p><span data-dcnode-id="7984" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="7903"><span data-dcnode-id="7907" instrument_node="">
</span><p data-dcnode-id="7905"><span data-dcnode-id="7906" instrument_node="">I’d suggest San Sebastián in northern Spain’s Basque Country. Set on a beautiful bay near the French border, it has a fabulous beach and an atmospheric Parte Vieja (old town) that’s easily covered on foot. It’s also renowned for its amazing food. There are several Michelin-starred restaurants in and around the city and its attractive streets are lined with bars serving pintxos (delicious bar snacks like a Basque version of tapas). At the other end of the country in Andalucía, Almuñécar is a beach resort much loved by Spanish holidaymakers. It boasts a couple of long pebbly beaches and a small historic quarter capped by a hilltop castle. From the town, you can take trips to the Sierra Nevada mountains and to Granada, whose Alhambra palace complex is one of Spain’s most magnificent sights.</span></p><span data-dcnode-id="7904" instrument_node="">

</span><p data-dcnode-id="7876"><span data-dcnode-id="7879" instrument_node="">Hi Dave, Heaps of good info here. Could you please recommend a picturesque small coastal Italian town/village to stay in with a 10 year old. A swimming beach is a must, and being within striking distance of Rome and other kid friendly day trips would be ideal. Amalfi Coast and Capri look amazing, but they do seem extremely busy with tourist traffic. September/October time period. Any ideas? Thank you.</span><br data-dcnode-id="7878"><span data-dcnode-id="7877" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7866" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7864"><span data-dcnode-id="7865" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7858"><b class="fn" data-dcnode-id="7862"><span data-dcnode-id="7863" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="7861" instrument_node=""> </span><span data-dcnode-id="7859"><span data-dcnode-id="7860" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="7857" instrument_node=""> </span></header><span data-dcnode-id="7855" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7850"><span data-dcnode-id="7854" instrument_node="">
</span><p data-dcnode-id="7852"><span data-dcnode-id="7853" instrument_node="">The Amalfi Coast and Capri are both wonderful but they’re some way from Rome. For somewhere closer, Sperlonga has two glorious sandy beaches and a charming hilltop center. The only problem is it’s something of a hike to get to – you’ll need to take a train from Rome Termini to Fondi-Sperlonga (about one and a quarter hours) and then a connecting bus. Some 90km south of Rome, Sabaudia is another possibility. It’s not the most beautiful of towns but it boasts a fabulous beach and a good range of restaurants and pizzerias, and there’s great walking/cycling in the nearby Parco Nazionale del Circeo. North of Rome, Santa Marinella is a pleasant resort town with an excellent beach and good train connections. Alternatively, you could try Lago di Bracciano, a large volcanic lake popular with weekending Romans. The best base here is Anguillara Sabazia, a small lakeside village accessible by train from Roma Ostiense station. Hope that helps.</span></p><span data-dcnode-id="7851" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7837" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/3ebd366f5a0f961835a00836b05318cf%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/3ebd366f5a0f961835a00836b05318cf?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/3ebd366f5a0f961835a00836b05318cf?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/3ebd366f5a0f961835a00836b05318cf?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7831"><b class="fn" data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">Lisbon or Porto with Kids</span></b><span data-dcnode-id="7832" instrument_node=""> </span></cite><span data-dcnode-id="7830" instrument_node=""> </span></header><span data-dcnode-id="7828" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7821"><span data-dcnode-id="7827" instrument_node="">
</span><p data-dcnode-id="7823"><span data-dcnode-id="7826" instrument_node="">Hi David,</span><br data-dcnode-id="7825"><span data-dcnode-id="7824" instrument_node="">
We are heading to Barcelona in late January and early February and have two kids (1.5 and 4 years old). We are in the area for two weeks and were also contemplating a visit to Portugal. Would you recommend Lisbon or Porto for two toddlers? Are there any other cities in Spain that would be good for a winter trip? Thanks so much for all the tips. Love all the recommendations! Irene</span></p><span data-dcnode-id="7822" instrument_node="">
</span></section><span data-dcnode-id="7820" instrument_node="">
</span></article><span data-dcnode-id="7818" instrument_node="">
</span><ol class="children" data-dcnode-id="7776"><span data-dcnode-id="7817" instrument_node="">
</span><li class="comment byuser comment-author-hogg bypostauthor odd alt depth-2" data-dcnode-id="7778" id="li-comment-187217"><span data-dcnode-id="7816" instrument_node="">
</span><article class="comment" data-dcnode-id="7780" id="comment-187217"><span data-dcnode-id="7815" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="7803"><span data-dcnode-id="7814" instrument_node="">
</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7813" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7805"><b class="fn" data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="7808" instrument_node=""> </span><span data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="7804" instrument_node=""> </span></header><span data-dcnode-id="7802" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7782"><span data-dcnode-id="7801" instrument_node="">
</span><p data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">In general Lisbon has more attractions for families with toddlers than Porto, though in Porto there are a few places that’ll keep you occupied. Zoo Santo Ignacio is fun for kids, and it’s possible to feed lemurs and penguins. Then there’s the World of Discoveries, where staff in period costume and a boat ride takes you through Portugal’s discoveries, though that’s more for your older child than the younger one. The neighbourhood of Foz, where the Douro River joins the Atlantic Ocean, is a great place to go for a walk by the sea with a stroller. Apart from that, Porto’s attractions for families with young children are limited to the Crystal Palace Gardens, where there are plenty of ducks and peacocks, plus the gardens at the Serralves contemporary museum and Gaia Biological Park, with trails suitable for strollers, replica rural houses to explore, and an otter tank.</span></p><span data-dcnode-id="7798" instrument_node="">
</span><p data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">As a bigger city, Lisbon has quite a lot in terms of kid-friendly attractions. There are some nice beaches a short train ride from the city, and though you’ll be visiting in winter, Mediterranean winters are mild and it should be warm enough for your kids to play in the sand. Lisbon Oceanarium, with its shark tank, tropical fish and more, is popular with families, though I’d avoid it on weekends when it gets rather congested with strollers. Lisbon Zoo has well-cared-for animals and a petting zoo for young kids. The zoo is at one end of the Parque das Nacoes (Expo Park), which has interactive outdoor features for your older child, plus a cable car. Riding on the classic Tram 28 through the narrow streets of the Alfama neighbourhood is a big hit with some kids, though avoid taking the tram during rush hour. The one challenging thing about Lisbon is that it’s hilly, and there are many cobbled streets, which make pushing a stroller hard work.</span></p><span data-dcnode-id="7795" instrument_node="">
</span><p data-dcnode-id="7793"><span data-dcnode-id="7794" instrument_node="">In Spain, Barcelona’s an excellent choice for a vacation with small children, especially since most attractions are accessible year-round because of the climate. There’s Barcelona zoo, with a farmyard section, petting zoo and pony rides, the excellent L’Aquarium with shark tunnels and the nearby marina and long stretch of the Barceloneta Beach, which is great for wandering along with a stroller. If your older child likes museum, the Museu Egipci is a good place to learn about mummies, the secrets of the pyramids and pharaohs. Museu Blau, part of the Science Museum, has a skeleton of a whale, plus the Science Nest with interactive activities for young kids up to the age of 6. For great views of the city and some gentle fairground rides, it’s worth making the trip to Parc D’Attracions Tibidabo, up in the hills above Barcelona. Apart from that, there are large parks for kids to let loose in – Montjuic, with its cable cars and gardens, plus Parc de la Citadella being just two of them.</span></p><span data-dcnode-id="7792" instrument_node="">
</span><p data-dcnode-id="7790"><span data-dcnode-id="7791" instrument_node="">As for other Spanish cities worth a visit in the winter, Seville immediately springs to mind. It’s not too cold during the day, and you can visit the Alcazar Palace with its extensive gardens and beautiful rooms, go for a horse-drawn carriage ride through the streets of the historic centre, take a stroller along the picturesque Guadalquivir river, visit the aquarium or take the kids to the large, popular Maria Louisa park with a large playground and pigeons to feed.</span></p><span data-dcnode-id="7789" instrument_node="">
</span><p data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">Madrid can be quite cold in winter, but if you don’t mind the cold, there’s plenty to do as a family. Parque de Retiro with its lake and extensive gardens is very popular, plus there’s a good zoo, aquarium, and Faunia (kind of like a zoo, with different climatic areas, penguin enclosure and interactive sections where kids can feed goats and donkeys. Then there’s a Natural Science Museum, which would be particularly fun for your older child, with its different interactive displays.</span></p><span data-dcnode-id="7786" instrument_node="">
</span><p data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">The nice thing about Spain (and Portugal) is that families with kids are generally made to feel very welcome in cafes and restaurants, and even if there’s no child menu, waiters tend to make an effort to keep kids happy, so feeding your kids is very rarely an issue.</span></p><span data-dcnode-id="7783" instrument_node="">
</span></section><span data-dcnode-id="7781" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7769" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/87b2711c6c00512c196ec31d71b688e3%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/87b2711c6c00512c196ec31d71b688e3?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7767"><span data-dcnode-id="7768" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/87b2711c6c00512c196ec31d71b688e3?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/87b2711c6c00512c196ec31d71b688e3?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7763"><b class="fn" data-dcnode-id="7765"><span data-dcnode-id="7766" instrument_node="">Europe with 3 Boys</span></b><span data-dcnode-id="7764" instrument_node=""> </span></cite><span data-dcnode-id="7762" instrument_node=""> </span></header><span data-dcnode-id="7760" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7720"><span data-dcnode-id="7759" instrument_node="">
</span><p data-dcnode-id="7755"><span data-dcnode-id="7758" instrument_node="">Hello,</span><br data-dcnode-id="7757"><span data-dcnode-id="7756" instrument_node="">
We are traveling from this summer June 10-August 20 with our 3 boys (Ages 14,12, 8). We are at the very beginning of our planning and I have some general transportation questions. We were thinking of renting a camper van or could be get by with a small rental car and staying in AirBnbs. Or could we get around by train. We want to be efficient in our travels because we have a lot we want to see.</span></p><span data-dcnode-id="7754" instrument_node="">
</span><p data-dcnode-id="7730"><span data-dcnode-id="7753" instrument_node="">We are very big into hiking and the mountains but we are also wanting to see many of the historic sites. The countries we would like to visit are as follows:</span><br data-dcnode-id="7752"><span data-dcnode-id="7751" instrument_node="">
Spain: 2 weeks. Do you recommend Barcelona over Madrid? We also are going to see a friend in Santandar for one week</span><br data-dcnode-id="7750"><span data-dcnode-id="7749" instrument_node="">
France: Chamonix looks amazing or is there another area is Southern France you like. We may or may not make it to Paris.</span><br data-dcnode-id="7748"><span data-dcnode-id="7747" instrument_node="">
Switzerland: We want to see the cute mountain towns and do some hiking. Any base area you recommend? Number of days required. Maybe 2 different bases for a few days each.</span><br data-dcnode-id="7746"><span data-dcnode-id="7745" instrument_node="">
Northern Italy: I want to see the Dolomites and we want to take the kids to Venice</span><br data-dcnode-id="7744"><span data-dcnode-id="7743" instrument_node="">
Austria: My son wants to see Salzburg and Vienna but Innsbruck and Hohe Tauern National Park looks gorgeous</span><br data-dcnode-id="7742"><span data-dcnode-id="7741" instrument_node="">
Slovenia: Bled and Mt Triglav looks amazing but wondering about places with historic significance in Slovenia. Or could we skip Slovenia.</span><br data-dcnode-id="7740"><span data-dcnode-id="7739" instrument_node="">
Croatia: Plitvice Lakes National Park and Split</span><br data-dcnode-id="7738"><span data-dcnode-id="7737" instrument_node="">
Hungry: Budapest (A must)</span><br data-dcnode-id="7736"><span data-dcnode-id="7735" instrument_node="">
Poland: Krakow, my boys know everything about WWII and they want to see this.</span><br data-dcnode-id="7734"><span data-dcnode-id="7733" instrument_node="">
Southern Czech Republic and several small towns.</span><br data-dcnode-id="7732"><span data-dcnode-id="7731" instrument_node="">
Amsterdam for a few days at the end.</span></p><span data-dcnode-id="7729" instrument_node="">
</span><p data-dcnode-id="7727"><span data-dcnode-id="7728" instrument_node="">My main question is transportation. We have been saving for this trip for years and will be on a budget with 5 but we can spend the money where we need to. Do you recommend renting a camper van, trains for 5 people and staying in apartments or are there some countries where a car is necessary to get to the little towns and mountains.</span></p><span data-dcnode-id="7726" instrument_node="">
</span><p data-dcnode-id="7722"><span data-dcnode-id="7725" instrument_node="">Thanks so much</span><br data-dcnode-id="7724"><span data-dcnode-id="7723" instrument_node="">
Jenny</span></p><span data-dcnode-id="7721" instrument_node="">
</span></section><span data-dcnode-id="7719" instrument_node="">

</span><ol class="children" data-dcnode-id="7627"><span data-dcnode-id="7716" instrument_node="">
</span><li class="comment byuser comment-author-hogg bypostauthor odd alt depth-2" data-dcnode-id="7629" id="li-comment-187214"><span data-dcnode-id="7715" instrument_node="">
</span><article class="comment" data-dcnode-id="7631" id="comment-187214"><span data-dcnode-id="7714" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="7702"><span data-dcnode-id="7713" instrument_node="">
</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7712" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7704"><b class="fn" data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="7707" instrument_node=""> </span><span data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="7703" instrument_node=""> </span></header><span data-dcnode-id="7701" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7633"><span data-dcnode-id="7700" instrument_node="">
</span><p data-dcnode-id="7698"><span data-dcnode-id="7699" instrument_node="">If I had to choose between a camper van or a car and staying in Airbnb’s, I would definitely do the latter. It’s just that in many European cities, streets tend to be too narrow to navigate in a camper van and finding a parking space can be very difficult. Narrow mountain roads can also be a problem. Plus, staying in AirBnbs gives you a much more immersive experience, since you’d be staying with and interacting with locals. It would make your trip more memorable, especially if it’s a once-in-a-lifetime trip.</span></p><span data-dcnode-id="7697" instrument_node="">
</span><p data-dcnode-id="7689"><span data-dcnode-id="7696" instrument_node="">Train travel is also viable, since many European destinations are well-connected by train. It’s worth figuring out exactly where you’d like to go before making a final decision about transportation, and to do that it’s worth having a look at </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eurail.com/" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7695" instrument_node="">Eurail</span></a><span data-dcnode-id="7693" instrument_node=""> and </span><a data-dcnode-id="7691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.interrail.eu/en" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7692" instrument_node="">Interrail</span></a><span data-dcnode-id="7690" instrument_node=""> to get an idea of where you can easily get to by train and how much rail passes would cost for the entire family. Also, cities such as Barcelona, Madrid, Budapest, Vienna and Amsterdam have excellent public transportation, so you wouldn’t need a car when in the cities themselves.</span></p><span data-dcnode-id="7688" instrument_node="">
</span><p data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">The one advantage of renting a car is being able to get to and around the more out of the way places more easily, especially since you’re keen hikers, though all places you mention are reachable by public transportation. Depending on your final plans, you can spend most of your time travelling by train (and public transportation in cities) and only rent a car from time to time, just to get out to more remote areas. Out of all the places you mention, there’s nowhere where having a car is an absolute must; it’s just that having your own wheels means getting around remote places quicker rather than having to adjust your plans in order to catch the one or two daily buses or trains heading into the mountains. Also, having a car gives you that extra flexibility in case you decide to change your plans somewhat and stay a bit longer in one place or another. Travelling around Europe by train is very doable, though on some popular routes, it means booking train tickets in advance, which makes it most difficult to change your plans. Cost is something to consider as well: renting a car for the entire time that you’re in Europe may work out cheaper for the five of you than a train passes for the whole family. It’s worth comparing the costs of the two.</span></p><span data-dcnode-id="7685" instrument_node="">
</span><p data-dcnode-id="7683"><span data-dcnode-id="7684" instrument_node="">Spain: if you have time to visit both Madrid and Barcelona, I would recommend both, because they’re both vibrant, interesting cities with a lot to see and do, and they’re very different in character. If I had to choose, Barcelona would probably just about win because if its stunning location by the sea and surrounding attractions. Since you’re going to Santander, you might want to consider spending a couple of days in the Picos de Europa national park – it’s about an hour’s drive from Santander and there’s some excellent hiking to be done there. During the peak season of July to September, some access roads into the park are closed to private vehicles, and served by local buses and taxis instead.</span></p><span data-dcnode-id="7682" instrument_node="">
</span><p data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">France: For hiking, Chamonix really is amazing and the hiking is excellent; if I had to choose one region in France to go hiking, it’d definitely be Chamonix. If you find that you have a couple of days for Paris, it’s well worth a visit because it’s a wonderful, interesting city.</span></p><span data-dcnode-id="7679" instrument_node="">
</span><p data-dcnode-id="7671"><span data-dcnode-id="7678" instrument_node="">For Switzerland, </span><a data-dcnode-id="7676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zermatt.ch/en/hiking" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7677" instrument_node="">Zermatt</span></a><span data-dcnode-id="7675" instrument_node=""> in the south of the country makes an excellent hiking base, with numerous day hikes of varying length and difficulty amid stunning mountain scenery. Grindelwald is another good base with a good variety of hikes, from easy to challenging, plus on the </span><a data-dcnode-id="7673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.myswitzerland.com/en-gb/eiger-trail-the-swiss-alpine-experience-trail.html" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7674" instrument_node="">Eiger Trail</span></a><span data-dcnode-id="7672" instrument_node=""> you can get close to the famous Eiger mountain popular with mountain climbers.</span></p><span data-dcnode-id="7670" instrument_node="">
</span><p data-dcnode-id="7662"><span data-dcnode-id="7669" instrument_node="">Austria: </span><a data-dcnode-id="7667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visit-salzburg.net/travel/hiking.htm" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7668" instrument_node="">Salzburg</span></a><span data-dcnode-id="7666" instrument_node=""> is small and beautiful and if you’re fans of the Sound of Music, that’s where the movie was shot and you can easily do a tour of the movie locations. It’s hard to beat Vienna for culture (and good food) and Innsbruck is a superb destination for hikers; it’s in the heart of Tyrol, Austria’s scenic mountain region, and you’re spoiled for choice when it comes to trails. There’s some very good hiking around Salzburg as well, but not quite on the same scale as around Innsbruck. </span><a data-dcnode-id="7664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hohetauern.at/en/" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7665" instrument_node="">Hohe Tauern National Park</span></a><span data-dcnode-id="7663" instrument_node=""> is another beautiful location and worth visiting; it all depends on how much time you want to spend and where.</span></p><span data-dcnode-id="7661" instrument_node="">
</span><p data-dcnode-id="7656"><span data-dcnode-id="7660" instrument_node="">Northern Italy: Dolomites is an excellent choice for </span><a data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dolomitemountains.com/en/resources/resources146.htm" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7659" instrument_node="">hiking</span></a><span data-dcnode-id="7657" instrument_node=""> and Venice is an absolutely unique city – there’s nowhere in Europe quite like it.</span></p><span data-dcnode-id="7655" instrument_node="">
</span><p data-dcnode-id="7653"><span data-dcnode-id="7654" instrument_node="">Slovenia: If you visit one place, make it Bled – it’s a really beautiful location with a lakeside castle and the country’s best hiking in Triglav National Park, right on the doorstep. Places of historic significance in Slovenia include old towns such as Ljubljana (the capital, with an old historic centre, castle, cathedral) and Celje (centuries-old town with medieval castle), but if you find yourself short of time, Slovenia is not Europe’s must-see.</span></p><span data-dcnode-id="7652" instrument_node="">
</span><p data-dcnode-id="7650"><span data-dcnode-id="7651" instrument_node="">Croatia: Can’t argue with Plitvice Lake National Park – absolutely beautiful lakes, waterfalls and some great walking trails. Split is one of Croatia’s most beautiful cities and it’s only a couple of hours away from Dubrovnik, further south, which has a gorgeous maze of medieval streets (and it’s also where parts of the Game of Thrones was shot, in case you’re fans).</span></p><span data-dcnode-id="7649" instrument_node="">
</span><p data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">Budapest: Absolutely. It’s a very scenic city, sitting on both sides of the Danube River and there’s plenty to see – it’s heavy both on medieval history and WWII history, plus there’s good hiking in the Buda Hills nearby, there are lots of great places to eat and it’s also famous for its thermal baths – both indoor and outdoor ones.</span></p><span data-dcnode-id="7646" instrument_node="">
</span><p data-dcnode-id="7641"><span data-dcnode-id="7645" instrument_node="">Poland: Krakow is definitely one of the two places I’d visit in Poland, the other being Warsaw. And yes, it’s a must-see for WWII history, not least because the remains of the Auschwitz concentration camp are an hour away from the city and easy to visit. For something completely different, it’s also worth visiting the </span><a data-dcnode-id="7643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wieliczka-saltmine.com/" rel="noopener nofollow noreferrer ugc" target="_blank"><span data-dcnode-id="7644" instrument_node="">Salt Cathedral</span></a><span data-dcnode-id="7642" instrument_node="">, one of Poland’s biggest attractions.</span></p><span data-dcnode-id="7640" instrument_node="">
</span><p data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">Czech Republic: The Czech Republic has the densest network of hiking trails in the world so you are spoiled for choice. I’d head to the northern mountains – Krušné and Krkonoše, taking in castles and spa towns on the way. Of course you’d want to see Prague, perhaps at the start.</span></p><span data-dcnode-id="7637" instrument_node="">
</span><p data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">Netherlands: Amsterdam is a great way to finish off the trip – lots to see, culture-wise, easy to get around, either on public transportation and hiring bicycles, and lots of good places to eat.</span></p><span data-dcnode-id="7634" instrument_node="">
</span></section><span data-dcnode-id="7632" instrument_node="">

</span><p data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">Heading to Madrid to visit relatives for a week with our 12, 10 and 7 year old. We have a second week and exploring our options for other locations. This will be their first time to Europe. In their minds, they want to see the Eiffel Tower, but wondering if London would be more suitable? Jessica</span></p><span data-dcnode-id="7607" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="7547"><span data-dcnode-id="7559" instrument_node="">
</span><p data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">We are travelling to Europe next August for a wedding in Sicily, with two active boys aged 4 and 23 months. Any suggestions for where to visit for 6 nights after Sicily, before we end our trip with a week in Lake Como? We want to stay in one location to minimize packing, and has to be kid-friendly in terms of accommodation, the sights &amp; activities and getting around.</span></p><span data-dcnode-id="7556" instrument_node="">
</span><p data-dcnode-id="7552"><span data-dcnode-id="7555" instrument_node="">Options we are considering include either Nice / Provence region, Sardinia, Athens (or one of the islands), Paris or Amsterdam?</span><br data-dcnode-id="7554"><span data-dcnode-id="7553" instrument_node="">
We are from Australia and this will be the first long-haul trip with the kids, and (apart from a few nights in Paris 12 years ago), we have not visited any of these places before to know what they are like. The boys love the outdoors and are not interested in sitting in restaurants watching the world go by.</span></p><span data-dcnode-id="7551" instrument_node="">
</span><p data-dcnode-id="7549"><span data-dcnode-id="7550" instrument_node="">Josh</span></p><span data-dcnode-id="7548" instrument_node="">

</span><p data-dcnode-id="7496"><span data-dcnode-id="7499" instrument_node="">Love your tips! I enjoy travelling with my kids and showing them the world so much. Before every trip me and my husband always try to make an itinerary and find as many attractions for our family as possible, and some children-friendly spots, it saves us so much time when we have it ready. Last time we went to Poland and had so much fun. We got some recommendations from our Polish friends and the one place that we really loved was a restaurant called the Akademia, it was in Warsaw. We had great time with delicious food and our kids were not bored, as they have a special corner for children. I wish more restaurants follow the example. All in all, Warsaw and Poland was amazing and it is perfect for a trip with kids.</span><br data-dcnode-id="7498"><span data-dcnode-id="7497" instrument_node="">

</span><p data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Hi, I like your suggestions and agree that there are some superb places in Greece that can’t be beaten (but remember there is more to Greece than the islands and the mainland (esp. Peloponnese) is equally interesting and fun).</span></p><span data-dcnode-id="7336" instrument_node="">
</span><p data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">I’d like to suggest a new blog idea for you – we are tentatively planning a 12-month road trip with two kids aged, maybe 9 and 10 by then, almost certainly in a camper-van, starting in, say, Holland and ending in Portugal where we live. We will exclude the UK &amp; Ireland, since we have visited there a couple of times, and our focus is to visit must-see places important for children to know about i.e. predominantly historical sites and maybe some natural wonders and any other must-see-in-a-lifetime places.</span></p><span data-dcnode-id="7333" instrument_node="">
</span><p data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">If you see my first-pass without-thinking list below you will get the idea. I wonder if you’d like to make a few suggestions or a full blog?</span></p><span data-dcnode-id="7330" instrument_node="">

</span><p data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">Thank you for your information. My family of 4 would like to visit Naxos, Greece from your recommendation for best family friendly places with a beach. Which is the best way to get to Naxos? I believe we will fly into Athens or is flying into Santorini. Dee Dee</span></p><span data-dcnode-id="7219" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="7210" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="7208"><span data-dcnode-id="7209" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="7202"><b class="fn" data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="7205" instrument_node=""> </span><span data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="7201" instrument_node=""> </span></header><span data-dcnode-id="7199" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="7194"><span data-dcnode-id="7198" instrument_node="">
</span><p data-dcnode-id="7196"><span data-dcnode-id="7197" instrument_node="">Naxos is the single best beach destination for families in Europe, so good choice. Both Santorini and Athens have direct flights from western European hubs. Naxos does not (but does have flights from Athens). Santorini is closer to Naxos than Athens and it’s quicker/easier getting from Santorini airport to the ferry port, than from Athens airport to the ferry port. If you’re interested in both Athens and Santorini I would fly into one, spend a night or two to see the sights, ferry to Naxos, ferry to the other one, see the sights, and fly home. No need to arrive and depart from the same place.</span></p><span data-dcnode-id="7195" instrument_node="">

</span><p data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">Crete (in Greece) has the warmest weather in October/November of any European beach destination. It will be fine for swimming and beach activities in mid-October but by late October / early November it will be getting cool and it would take an unseasonable heat wave for you to be swimming in early November. The south side of Crete will be more likely to be warm late into October.</span></p><span data-dcnode-id="7144" instrument_node="">

</span><p data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">Those are all great ideas but the first place that jumped into my mind was Crete: great beaches, hikes, history, and culture. I’d do 10 days there then ferry to Santorini for 3 or 4 more days. Santorini has some stunning walks/hikes and you can do a caldera boat tour with a visit to the volcano and hot springs. The destruction of the island by the volcano is interesting for both kids and adults. You can fly directly into Crete from Western Europe and fly back out from Santorini (don’t retrace your steps to Crete).</span></p><span data-dcnode-id="6876" instrument_node="">
