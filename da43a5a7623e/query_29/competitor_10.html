</span><header class="comment-meta comment-author vcard" data-dcnode-id="709"><span data-dcnode-id="718" instrument_node="">
</span><img alt="" class="avatar avatar-44 photo avatar-default" data-dcnode-id="717" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo avatar-default' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="711"><b class="fn" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Chicago to Europe with Kids</span></b><span data-dcnode-id="712" instrument_node=""> </span></cite><span data-dcnode-id="710" instrument_node=""> </span></header><span data-dcnode-id="708" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">We’ll be flying from Chicago to Europe in the fall and are wondering what you’d recommend for a family trip itinerary. We’ll have almost 2 weeks (probably 12 or 13 nights) and are open to anything. We’re a family of 4 with an 8 year old and 13 year old. My wife went on a school trip to France in high school but other than that this will be our first trip to Europe. Thanks for your time.</span></p><span data-dcnode-id="704" instrument_node="">
</span></section><span data-dcnode-id="702" instrument_node="">
</span></article><span data-dcnode-id="700" instrument_node="">
</span><ol class="children" data-dcnode-id="626"><span data-dcnode-id="699" instrument_node="">
</span><li class="comment byuser comment-author-hogg bypostauthor even depth-2" data-dcnode-id="628" id="li-comment-187010"><span data-dcnode-id="698" instrument_node="">
</span><article class="comment" data-dcnode-id="656" id="comment-187010"><span data-dcnode-id="697" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="685"><span data-dcnode-id="696" instrument_node="">
</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="695" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="687"><b class="fn" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="690" instrument_node=""> </span><span data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="686" instrument_node=""> </span></header><span data-dcnode-id="684" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="658"><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Hi Jim. That sounds awesome. Europe is a fantastic destination for kids – especially slightly older ones that will enjoy the history, castles, hikes, and urban attractions. There are so many places to visit it’s hard to pick one perfect itinerary. You’ll always be left feeling like you didn’t see enough.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">My first recommendation would be to fly into one city and out of another. This saves time, effort, and money. Though “open-jaw” tickets, as they’re called, usually cost a bit more it’s more than made up by the savings in a return train ticket, one night in a hotel, and the wasted time spent retracing your steps.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">So with that in mind, I’d look for flights into London and a return flight from either Barcelona, Madrid, or Rome. Spend 4 nights in London, then take the train under the Channel to Paris. 3 or 4 days there – perhaps with a day trip to Versailles – should keep you busy and happy.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Both Paris and London have some wonderful museums for kids and the subway systems in both are an easy and exciting way to get around the city.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">I’d spend the end of the trip in either Rome, Madrid, or Barcelona – probably favoring Barcelona if you wanted some beach time, Rome and Madrid if the kids were really enjoying the historical sites. Train connections from Paris to all 3 of these cities are great – though you should book in advance, especially if you plan to get a family sleeper.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">If you had a few more days or shortened your time in some of the cities, then a few days at the beaches of Provence and the Cote d’Azur would be a great option.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Also, IcelandAir has some great prices on trips to Europe with free stopovers in Reykjavik. It breaks up the trip and allows for a day or 2 to explore the city and maybe visit the Blue Lagoon.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Good luck.</span></p><span data-dcnode-id="659" instrument_node="">
</span></section><span data-dcnode-id="657" instrument_node="">

</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Hi…I love travelling and so do my Family..We’ve done entire India and have done few South East countries. I have two great daughters aged 10 and 8 Years and would want to take them out for the first time outside India..although they have been to our neighbouring countries. It would be in October for 10 days max and I would want to budget my travel..so that I can show them a new country every year..where in Europe would you suggest..that appeases to all and make memories ..and how much would be the budget and how can we make use of Eurorail ???</span></p><span data-dcnode-id="606" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Hi Jaya. Train travel can be expensive in Europe so my first piece of advice – especially if you’re planning to return multiple times – is to focus on just one area, one country, or a couple of cities and keep the travel (and train ticket purchases) to a minimum. Generally the north and west of Europe are the most expensive countries. As you move south and east things are cheaper – often much cheaper. Greece is a great family destination for a first trip to Europe. The islands are great to visit and kids love the ferry trips. Greece is much cheaper than, say, France or Spain, (though not nearly as cheap as it was 10 or 20 years ago), and you can often find great deals on flights between Athens and Mumbai or Delhi. I hope that helps a little. Good luck.</span></p><span data-dcnode-id="582" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="491"><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Hi Ashley. I’m going to be doing a blog post on this soon — as I get lots of questions on it — but here are a few quick ideas:</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">– If you’re serious about your blog and about (maybe) putting some serious time and effort into it, then go with a WordPress self hosted blog. That means you’ll have to buy a domain, host it on a site (like Godaddy for example) and then use WordPress to run it.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">– On the other hand, if you just want a site for friends, family, and people you meet along the road, then blogger.com is perfectly fine.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">– Plan before you start blogging. There are lots of little decisions you’ll make along the way, and doing a little prep work (or a lot of prep work) before you start will save you having to tear things down and start again.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">I hope that helps, let me know if you have a specific question.</span></p><span data-dcnode-id="492" instrument_node="">

</span><p data-dcnode-id="464"><span data-dcnode-id="467" instrument_node="">Dear Friends, We are a family of 4 , 2 adults and 2 kids ( 16 &amp; 8 ) from India.We plan to visit Europe in May for 10-12 days. My budget is around Euro 1250 per head. Total Euro 5000 . Can somebody please suggest some itineraries? This will be my first trip to Europe and any suggestions/advice are welcome.</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">
Best wishes.</span></p><span data-dcnode-id="463" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="454" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="446"><b class="fn" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="449" instrument_node=""> </span><span data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="445" instrument_node=""> </span></header><span data-dcnode-id="443" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="435"><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Hi JV. If I had to suggest some spots it would probably be a route between 2 cities, say Paris and Rome (or Paris and Barcelona). Fly into one, take the train between them, and then fly out of the other if you’re able to – thus saving the time and expense of backtracking. My perfect trip would probably include a few days in Paris, followed by 2 or 3 days in the south of France. Then on to Florence or Siena. And finishing in Rome. If anything take a stop out before adding any more. Keep it simple and don’t rush and you should have a great time.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Good luck.</span></p><span data-dcnode-id="436" instrument_node="">

</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">What keeps our travel dreams on hold is flight cost? How do you cut that down?</span></p><span data-dcnode-id="379" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="370" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="362"><b class="fn" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="365" instrument_node=""> </span><span data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="361" instrument_node=""> </span></header><span data-dcnode-id="359" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="342"><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Hi Loraine. I agree that’s a huge part of being able to travel – the initial cost of plane tickets. My biggest suggestion is to be flexible – as flexible as you can. The more you’re able to pick and choose from the different seat sales – whether it be the dates, the days of the week, the destination, or all 3 – the better the deal you’ll get.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">The good thing is that many places that require a bigger expense on the tickets side: Thailand, Vietnam, Greece, Turkey, Venezuela, offer great value to travelers. So once you’re there, if you really watch what you spend you can make that big expense up front pay off.</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Mexico is one place where you get both great deals on airfare and – if you stay away from the big tourist resorts like Cancun or Puerta Vallarta – you can still get great deals and very affordable accommodations.</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">I’m currently writing a piece on finding great deals on air travel. I’ll be sure to send it to you once I’ve finished it.</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">David</span></p><span data-dcnode-id="343" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="306"><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">These are wonderful tips for families traveling to Europe! We have been on an open ended, non-stop world tour as a family since 2006 &amp; many of our 32 countries &amp; 175,000 miles (most overland) so far have been in Europe.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">We travel &amp; live large on just 23 dollars a day per person. We’ve done everything from 5 star hotels to hostels, cargo ships to camels, but our main lodging AND transportation mode is by small motorhome.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">It is a fantastic way to see Europe with most campsites being 5 star resorts near all the sites with easy access via mass transit, biking or walking. Great for families as there is no packing &amp; unpacking and almost all have kid’s clubs and great pools, restaurants, stores and beaches for after touring days.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">It’s a wonderful educational opportunity that will last you a lifetime!</span></p><span data-dcnode-id="307" instrument_node="">
</span></section><span data-dcnode-id="305" instrument_node="">
