</span><p data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">My main recommendation would be to take the train instead of driving. Much easier, more relaxing, and feels more like a trip to Europe. Take the train and your kids will remember for years running through the station, finding your seats, and the border guards walking down the aisles of the train. Drive a car and it will blend it with the trip to your hometown mall.</span></p><span data-dcnode-id="6360" instrument_node="">

</span><p data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">Naxos is a wonderful Greek island that might be exactly what you’re looking for. Fantastic beaches, great food, interesting history and culture, and pretty cheap (for Europe). Could also do some island hopping to Paros, Mykonos, or Santorini as jumping on a ferry is always fun (for kids and adults). For Naxos accommodations, using Booking.com or Hotelscombined is best for price and convenience. </span></p><span data-dcnode-id="6248" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="6212" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="6210"><span data-dcnode-id="6211" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="6204"><b class="fn" data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="6207" instrument_node=""> </span><span data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="6203" instrument_node=""> </span></header><span data-dcnode-id="6201" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="6196"><span data-dcnode-id="6200" instrument_node="">
</span><p data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">There are lots of family friendly areas along the border where France, Switzerland, and Italy meet. A beautiful, family friendly area is Lake Annecy which is popular in both summer and winter due to its great skiing as well as cultural attractions. The lake is one of the most beautiful in Europe and the region is home to an ancient chateau. The town of Annecy looks like it is out of a fairy tale and has a charming medieval quarter. Chamonix is another town to consider because not only does it have rustic charm, you’re also at the base of Mont Blanc, the highest peak in the Alps. Mont Blanc is covered in snow year round, even in summer. There are cable cars that take you up to the peaks where you can see panoramic views and glaciers. If you’re looking for more of a family friendly resort with lots of different activities, then one of the most popular is Avoriaz. They don’t allow cars (only horse drawn carriages and snow mobiles) and they have the “Village des Enfants” which hosts everything from a daycare center for infants to a beginners ski school for kids ages 3-16. Lessons are even timed so that parents start their classes 15 minutes after the kids, and there is something for all ages.</span></p><span data-dcnode-id="6197" instrument_node="">

</span><p data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">We are planning a trip for a week overseas. We have a 13 year old and 11 year old who have never been outside the US. Where would you recommend taking them for their first trip overseas? We would be going in mid April. Was thinking maybe London/England but open to suggestions. They love to travel and we want to make it special and fun for them!</span></p><span data-dcnode-id="5896" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="5871"><span data-dcnode-id="5875" instrument_node="">
</span><p data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">It doesn’t get much better than a trip to London and Paris. Fly into one and home from the other so you don’t have to retrace your steps (can cost a little more but worth it for the money and time you save not having to return to where you started). Take the Eurostar train (kids love it) from city to the other. So much to do in both cities and the big crowds will not have really kicked in yet. Weather could be surprisingly pleasant, though do pack for anything.</span></p><span data-dcnode-id="5872" instrument_node="">

</span><p data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">We are a family of 5 – 2 Adult+1 senior and 2 kids ( 6 yrs and 4 month old). We are planning our first trip to Europe from Austraila. We have about 25 days to spend in Europe. Can you please suggest some country/attraction that is pram friendly? We definitely want to see Paris and London. Rome is something we would like to see but not sure if its going to be challenge with a 4month old. Thanks for your time</span></p><span data-dcnode-id="5783" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="5758"><span data-dcnode-id="5762" instrument_node="">
</span><p data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Amsterdam and Berlin are the two most pram-friendly cities in Europe. London and Paris are both pretty easy with kids (taking the bus is often better than metro since you don’t have to descend the stairs) but the streets are hit and miss for strollers. Nice and Barcelona are two other cities that are very easy to get around with kids and have a great family-friendly vibe.</span></p><span data-dcnode-id="5759" instrument_node="">

</span><p data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">I am due to take my kids (3.5 and 1.5) to England in Feb. I will be working during the day in Crouch End and my mother will be watching the kids during the day. Any recommendations on where to stay? We are thinking of renting a apartment/condo for 7-10 days, any neighborhoods that are great for kids? It will be easier for me to travel to work than her to travel with 2 small kids each day.</span></p><span data-dcnode-id="5729" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="5674"><span data-dcnode-id="5705" instrument_node="">
</span><p data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Taking your kids’ ages into consideration, I’d suggest renting an apartment in the South Kensington area, since it’s right near two museums which are excellent for small children. Crouch End is also fairly easy to get to on the tube from South Kensington tube, with a change at Leicester Square to the Northern Line.</span></p><span data-dcnode-id="5702" instrument_node="">
</span><p data-dcnode-id="5691"><span data-dcnode-id="5701" instrument_node="">The </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sciencemuseum.org.uk/" rel="nofollow" target="_blank"><span data-dcnode-id="5700" instrument_node="">Science Museum</span></a><span data-dcnode-id="5698" instrument_node=""> has lots of hands-on sensory exhibits to play with and two areas specifically for toddlers. Right next to it, the </span><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nhm.ac.uk/" rel="nofollow" target="_blank"><span data-dcnode-id="5697" instrument_node="">Natural History Museum</span></a><span data-dcnode-id="5695" instrument_node=""> has its Dinosaur Room (great for under-5s), plus the Mini-Beast Room with lots of buttons and hands-on displays, as well as the Investigate Room for older toddlers (this one tends to be booked for school groups on weekdays, so it’s best to visit in the afternoon). South Kensington is also near Hyde Park, where your mother and the kids can go walking, feed the ducks and play on the playgrounds. South Kensington is also a short tube ride from Regent’s Park, where there are also play areas, as well as </span><a data-dcnode-id="5693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zsl.org/zsl-london-zoo" rel="nofollow" target="_blank"><span data-dcnode-id="5694" instrument_node="">London Zoo</span></a><span data-dcnode-id="5692" instrument_node="">.</span></p><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5685"><span data-dcnode-id="5689" instrument_node="">Covent Garden/Leicester Square would be another good place to stay because it’s really central, your mother could take the kids to the National Portrait Gallery (www.npg.org.uk), which toddlers tend to find entertaining, plus there’s also the excellent </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ltmuseum.co.uk/" rel="nofollow" target="_blank"><span data-dcnode-id="5688" instrument_node="">London Transport Museum</span></a><span data-dcnode-id="5686" instrument_node=""> where kids can climb aboard different modes of transport, dress up in the designated play areas and play with model cars and buses. Your mother could also take the kids on a boat from Westminster Pier to Tate Modern, where there are family activities on weekends (11am-4pm) and digital sketch pads for the little ones to create their own masterpieces at the Bloomberg Connect Drawing Bar on Level 3 of the gallery. Leicester Square is even more convenient for your commute to Crouch End (straight up the Northern Line), but the drawback of staying there is that there are no green spaces/playgrounds nearby, unlike South Kensington.</span></p><span data-dcnode-id="5684" instrument_node="">
</span><p data-dcnode-id="5676"><span data-dcnode-id="5683" instrument_node="">As for apartments try </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.booking.com/booking-home/city/gb/london.html%3Faid%3D346426%3Blabel%3Dcmt-mln" rel="nofollow" target="_blank"><span data-dcnode-id="5682" instrument_node="">booking.com</span></a><span data-dcnode-id="5680" instrument_node=""> lets you specify the neighbourhood and your accommodation preferences. </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.com/" rel="nofollow" target="_blank"><span data-dcnode-id="5679" instrument_node="">Airbnb.com</span></a><span data-dcnode-id="5677" instrument_node=""> can also be a good option, since you can also look for apartments for a short-term stay in your preferred part of London. For flying, make it fun. Kids pick up on your energy. If you’re worried and anxious they will be too. If you say, “wow, this is going to be great,” then it’ll be fun (hopefully).</span></p><span data-dcnode-id="5675" instrument_node="">

</span><p data-dcnode-id="5469"><span data-dcnode-id="5484" instrument_node="">Hi, I’m trying to plan a trip for the family – two kids age 6 and 7. We will have around 25 days to spend in Europe, which sounds like a lot, but I’m quickly learning it’s not! I have a list pf places I would love to see – this is the first time there for any of us (hopefully not the last). Ideally we were thinking of having three different bases in Europe and travelling to other places from there so we can get a feel of what it’s like to actually live there, rather than just do the tourist things, but I’m not sure about that because everyone keeps telling us it’s a terrible idea!!</span><br data-dcnode-id="5483"><span data-dcnode-id="5482" instrument_node="">
So, I’m going to have to cut some places out. What would you recommend? This is the (very long) list of places we are interested in:</span><br data-dcnode-id="5481"><span data-dcnode-id="5480" instrument_node="">
France: Troyes, Strasbourg, Colmar, Paris</span><br data-dcnode-id="5479"><span data-dcnode-id="5478" instrument_node="">
Czech Republic: Prague, Cesky Krumlov</span><br data-dcnode-id="5477"><span data-dcnode-id="5476" instrument_node="">
Austria: Vienna, Salzburg</span><br data-dcnode-id="5475"><span data-dcnode-id="5474" instrument_node="">
Italy: Venice, Siena, Cinque Terra, Florence</span><br data-dcnode-id="5473"><span data-dcnode-id="5472" instrument_node="">

</span><p data-dcnode-id="5192"><span data-dcnode-id="5197" instrument_node="">Getting Around: London to Paris take the Eurostar train. Fly or train Paris to Barcelona. Fly to Italy, then train within Italy. Fly to Greece.</span><br data-dcnode-id="5196"><span data-dcnode-id="5195" instrument_node="">
Where To Go: Those are all great places, but it’s a lot for 2.5 weeks so might need to drop one (probably Venice or Florence).</span><br data-dcnode-id="5194"><span data-dcnode-id="5193" instrument_node="">
In Greece: Naxos is the most kid-friendly and has great beaches. Mykonos is busy but lots of fun. Ios has a handful of incredible beaches. Santorini is not known for it’s kid-friendliness but it’s so incredible do at least a few days there.</span></p><span data-dcnode-id="5191" instrument_node="">

</span><p data-dcnode-id="4873"><span data-dcnode-id="4888" instrument_node="">Hi David, My husband and I have decided to pack up our three children, aged 8,6 and 4 and take them on a year long adventure around western Europe and GB.</span><br data-dcnode-id="4887"><span data-dcnode-id="4886" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4834" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/bae8b9926500006ad5eec7d1a85eadab%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/bae8b9926500006ad5eec7d1a85eadab?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/bae8b9926500006ad5eec7d1a85eadab?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/bae8b9926500006ad5eec7d1a85eadab?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4828"><b class="fn" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">Where in Europe To Go with Kids</span></b><span data-dcnode-id="4829" instrument_node=""> </span></cite><span data-dcnode-id="4827" instrument_node=""> </span></header><span data-dcnode-id="4825" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="4811"><span data-dcnode-id="4824" instrument_node="">
</span><p data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">Hi there. Your website has been so helpful to me in planning vacations with my kids, so thank you! Last year, we went to Paris, Bruges and Amsterdam, and my 8 year old twins loved it. I want to plan a spring break trip at the end of March to probably Europe again. They will be 9 at the time and really loved staying in neighborhoods (Saint Germain in Paris and on a houseboat in Amsterdam) on the last trip, so I’d be looking to do the same on this trip. The kids also loved Bruges and all of the medieval architecture, riding on boats through the canals, etc.</span></p><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">We will have around 8-10 days for the trip and would like to hit a couple of places either within one country or possibly 2 if we fly into one and out of the other.</span></p><span data-dcnode-id="4818" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">Initial thoughts were Barcelona and some other area along the coast in Spain or Germany/Austria or something in Italy. Any thoughts on what might be best?</span></p><span data-dcnode-id="4815" instrument_node="">
</span><p data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">Lindsey in Denver</span></p><span data-dcnode-id="4812" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4803" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4795"><b class="fn" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="4798" instrument_node=""> </span><span data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="4794" instrument_node=""> </span></header><span data-dcnode-id="4792" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="4781"><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">There are so many places to go that meet the “magical” criteria. Barcelona is wonderful – just a great vibe. Nice, along the southern French coast, is super family-friendly – it’s a stone-beach but otherwise perfect for kids and a great base for making fun day trips around South France. Italy is loaded with magical hill towns or old classical villages: Orvieto, Perugia, Lucca, Gubbio, San Gimignano, Todi, or Siena are all great (and there are many others).</span></p><span data-dcnode-id="4788" instrument_node="">
</span><p data-dcnode-id="4783"><span data-dcnode-id="4787" instrument_node="">And for something really different and wonderful try staying at a </span><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/best-tuscany-villas" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="4786" instrument_node="">Agriturismo in Tuscany</span></a><span data-dcnode-id="4784" instrument_node="">. It’s basically a farm out in the countryside with some rooms to rent (though some have been converted to full-blown hotels or B&amp;Bs). Many have pools and your kids will love it.</span></p><span data-dcnode-id="4782" instrument_node="">
</span></section><span data-dcnode-id="4780" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="4727"><span data-dcnode-id="4731" instrument_node="">
</span><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">Based on what you’ve told me, I would suggest Barcelona. In general, Spain is cheaper than France and the time of year you’re planning your trip for (late December-January) is a period when many shops in France close. It’s very common for the French to take the week off between Christmas and New Year’s Eve which would be a significant part of your holiday! Even in Paris, many of the better restaurants and mom and pop shops close up. The opposite is almost true in Barcelona and there will be lots of activity to choose from. Plus, besides nicer weather, Barcelona has both mountains and a beach (for walking and playing – you won’t be swimming in December or January). You’ll also be in a great position to explore other parts of Europe. For example a new high speed train links Barcelona and Paris in about 6 hours. You’re roughly a 5 hour drive to the Cote D’ Azur and from there just a few hours to Northern Italy. In Spain, you’re about a 6 hour drive to Bilbao or Madrid or a cheap and quick 2 hour flight away from Portugal, Germany, or the UK on Ryanair.</span></p><span data-dcnode-id="4728" instrument_node="">

</span><p data-dcnode-id="4696"><span data-dcnode-id="4703" instrument_node="">Hi David,</span><br data-dcnode-id="4702"><span data-dcnode-id="4701" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4686" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4678"><b class="fn" data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="4681" instrument_node=""> </span><span data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="4677" instrument_node=""> </span></header><span data-dcnode-id="4675" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="4664"><span data-dcnode-id="4674" instrument_node="">
</span><p data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">Most hotels in London will provide cribs on request, but it’s best to contact them in advance to make sure; many provide cots free of charge, but some may charge a little extra. Chain hotels such as Novotel tend to be well-geared towards families. Other hotels that are child-friendly include Queen’s Gate Hotel (www.thequeensgatehotel.com; boutique town house with comfortable family rooms, near museums, 5min walk from Hyde Park), Rydges Kensington Hotel (www.rydges.com; boutique hotel 10 min walk from Hyde Park, right near Gloucester Rd Underground station, really nice beds, stylish rooms, good location for bus tours); the friendly, family-run Rhodes Hotel (www.rhodeshotel.com), also near Hyde Park – and the Nadler Kensington (www.thenadler.com; spacious family rooms, offers large discounts if you book in advance, rooms have mini-kitchens). If you’re after something top-end, The Athenaeum (www.athenaeumhotel.com) in Mayfair has a great location and they offer services such as organic baby food, nanny service, etc.</span></p><span data-dcnode-id="4671" instrument_node="">
</span><p data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">If you’re looking for good places to take your baby in London, the Dulwich Picture Gallery (www.dulwichpucturegallery.org.uk) in Southwark (South London) has a Mini Masterpieces workshop on Tuesdays where parents and babies up to 18 months old can get messy. The V&amp;A Museum of Childhood (www.vam.ac.uk/moc) in Bethnal Green has a sensory pod with water- and bubble-filled columns and mirrors, and the visual and touchy-feely displays are very popular with toddlers.</span></p><span data-dcnode-id="4668" instrument_node="">
</span><p data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">As for the English countryside, it’s hard to top the villages in the Cotswolds (West England) when it comes to green country lanes, thatched-roofed cottages and rustic pubs. It’s worth renting a car to get around; most of the villages are 2-3 hours’ drive from London, but if you don’t fancy making your way through London traffic, you can take a train to Oxford (1 hour from London) and rent a car there instead. The prettiest villages in the Cotswolds include Bourton-on-the-Water (stone cottages, cosy pubs, traditional tea rooms), Lower Slaughter (landscaped Manor Gardens, an old mill museum), Castle Combe (cute limestone cottages, good pubs), and Kingham (stone cottages, open village green). Kingham is actually reachable by train from Oxford if you don’t want to drive and are happy to stay and relax in one village. If you’re looking for somewhere good to stay, The Dial House in Bourton-on-the-Water is a 17th century manor with comfortable rooms; it also served creative British food. In Kingham, I can recommend The Wild Rabbit (rustic pub with inventive dishes and cosy rooms). If you’re after something fancy, Lords of the Manor in Upper Slaughter (near Lower Slaughter) is a historic hotel with beautifully landscaped gardens and a Michelin-starred restaurant.s). Kingham is actually reachable by train from Oxford if you don’t want to drive and are happy to stay and relax in one village. If you’re looking for somewhere good to stay, The Dial House in Bourton-on-the-Water is a 17th century manor with comfortable rooms; it also served creative British food. In Kingham, I can recommend The Wild Rabbit (rustic pub with inventive dishes and cosy rooms). If you’re after something fancy, Lords of the Manor in Upper Slaughter (near Lower Slaughter) is a historic hotel with beautifully landscaped gardens and a Michelin-starred restaurant.</span></p><span data-dcnode-id="4665" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4595" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/38dda97f34f172bae5919cc5446b0f66%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/38dda97f34f172bae5919cc5446b0f66?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/38dda97f34f172bae5919cc5446b0f66?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/38dda97f34f172bae5919cc5446b0f66?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4589"><b class="fn" data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">Good Neighborhood in Paris for family</span></b><span data-dcnode-id="4590" instrument_node=""> </span></cite><span data-dcnode-id="4588" instrument_node=""> </span></header><span data-dcnode-id="4586" instrument_node="">

</span><p data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">Hi David,</span></p><span data-dcnode-id="4582" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Thanks for this awesome load of information on travelling with kids. I just wanted to pick your brains on selecting the right neighbourhood for our 4 nights in Paris. I was highly impressed and influenced by your recommendation for StayCity Serviced Appartment (Gare de l’Est) as the best budget hotel option in Paris. However, I then encountered some threads on different forums about the whole Gare De l’est location being too near the station and being far from real Paris experience. And of course I am confused now.</span></p><span data-dcnode-id="4579" instrument_node="">
</span><p data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">Just to add to the confusion I also read your recommendation for Marais neighbourhood and I found one budget hotel option – Hôtel Du Vieux Saule [ 6 Rue De Picardie, 3rd arr., 75003 Paris, France] .</span></p><span data-dcnode-id="4576" instrument_node="">
</span><p data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">Could you help us select between – Marais neighbourhood Vs StayCity apartment considering the cost of the two is almost the same.</span></p><span data-dcnode-id="4573" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4559" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4551"><b class="fn" data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="4554" instrument_node=""> </span><span data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="4550" instrument_node=""> </span></header><span data-dcnode-id="4548" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="4543"><span data-dcnode-id="4547" instrument_node="">
</span><p data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">If the cost of both options is the same, I’d choose the Marais. However, that’s not to knock the Gare de L’est area which has a lot going for it too. It’s definitely not a tourist destination, but that’s also part of its charm. You’ll be in an area that sees few tourists but has been steadily gentrifying over the years. Its biggest advantage is that you’ll be right by the Canal Saint Martin, a fantastic area with lots of cool boutiques and restaurants. The StayCity is also right by a great park if you’re traveling with kids (Jardin Villemin) and also one of the city’s secret gems, Cafe A. The space was once an abbey and has now been converted into the Maison de l’Architecture. Within this setting you have a large, open terrace, perfect for having a coffee or drink in the summer with regular exhibits and jazz concerts. Since you mentioned that your goal was to have a “real Paris experience” though, I’d lean towards the Marais because you’ll be better positioned to enjoy the museums, the Seine, the farmer’s market at Bastille, as well as shopping and restaurants. Just in that area alone you can visit the Picasso Museum, the Centre Pompidou, the historic Place des Vosges and one of the oldest covered markets in Paris, the Marche des Enfants Rouge. And don’t miss the falafel at L’as on Rue des Rosier or the crepes at Cafe Breizh on Rue Vieille du Temple. Both will have a line but totally worth it!</span></p><span data-dcnode-id="4544" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="4400"><span data-dcnode-id="4404" instrument_node="">
</span><p data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">Hi, I was just wondering what your thoughts are.. we are thinking of going to Europe in July and have two girls 3 &amp; 5 years old. We are thinking of doing coastal Italy (for a relaxing holiday) and then would like to do either Copenhagen, Paris, or London for a week (for site seeing), before we travel to Hong Kong (Disney) on the way home to Australia. Do you have any suggestions for coastal Italy with kids? And which city would you suggest for sightseeing? Angela</span></p><span data-dcnode-id="4401" instrument_node="">
</span></section><span data-dcnode-id="4399" instrument_node="">
</span></article><span data-dcnode-id="4397" instrument_node="">

</span><article class="comment" data-dcnode-id="4362" id="comment-187100"><span data-dcnode-id="4394" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="4382"><span data-dcnode-id="4393" instrument_node="">
</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="4392" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="4384"><b class="fn" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="4387" instrument_node=""> </span><span data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="4383" instrument_node=""> </span></header><span data-dcnode-id="4381" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="4364"><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Italy’s coast is very varied, boasting everything from long sandy beaches to rocky bays and heaving resort towns. Some of the most spectacular beaches are on Sardinia. The island is well set up for family holidays with a vast array of seafront accommodation and regular flight/ferry connections. On the south coast, Chia is a popular spot with two gorgeous sandy beaches.</span></p><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">On the Italian mainland, Tuscany has some wonderful seaside retreats. Between Livorno and Piombino, Marina di Bibbona is a relaxed family-friendly resort set near a pine grove and a lengthy stretch of sand.</span></p><span data-dcnode-id="4374" instrument_node="">
</span><p data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Down in the heel of the country, the southern region of Puglia is where many Italians take their summer holidays. It has some stunning beaches and its laid-back atmosphere is great for families. Particularly beautiful is the Salento area near the baroque city of Lecce.</span></p><span data-dcnode-id="4371" instrument_node="">
</span><p data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">For stunning coastal scenery nowhere can top the Amalfi Coast, south of Naples, and the Cinque Terre in Liguria. But while both are fabulous to look at, the practicalities of getting to and around them can make them difficult with small kids.</span></p><span data-dcnode-id="4368" instrument_node="">
</span><p data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">For city sightseeing those are all great. London definitely has the most kid-friendly attractions but at that age they might not get as much out of them as they will in a few years. I’d say you can’t go wrong with any of those 3 so perhaps base your decision on the most convenient and best priced connections.</span></p><span data-dcnode-id="4365" instrument_node="">
</span></section><span data-dcnode-id="4363" instrument_node="">

</span><p data-dcnode-id="4275"><span data-dcnode-id="4285" instrument_node="">There’s no one website for booking your trip. The best for finding cheap airfares (and widest selection of flights) is </span><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kayak.com/flights" rel="nofollow noopener noreferrer ugc" target="_blank"><span data-dcnode-id="4284" instrument_node="">Kayak.com</span></a><span data-dcnode-id="4282" instrument_node="">. The best websites for finding good hotel deals are </span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/continent/europe.en-gb.html%3Faid%3D346426%26label%3Dmln-cmt" rel="nofollow noopener noreferrer ugc" target="_blank"><span data-dcnode-id="4281" instrument_node="">Booking.com</span></a><span data-dcnode-id="4279" instrument_node=""> and HotelsCombined.com. And the best website for train information is </span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seat61.com/Europe-train-travel.htm" rel="nofollow noopener noreferrer ugc" target="_blank"><span data-dcnode-id="4278" instrument_node="">Seat61</span></a><span data-dcnode-id="4276" instrument_node=""> (you can’t book tickets on the site but each page has very specific info on the best way to reserve seats).</span></p><span data-dcnode-id="4274" instrument_node="">

</span><p data-dcnode-id="4218"><span data-dcnode-id="4223" instrument_node="">Morning, We’re a family with 2 boys (6yrs and 2yrs) who live in Sydney and headed back to visit England this July. We currently have non stop flights on Singapore to LHR (may amend one flight to stop) and looking to include London, Paris and Lanzarote!! London for the usual reasons, plus we have family with young kids about 35 mins away from central London on the train. I also would like to visit a friend in Paris (although she’s North Paris). In terms of Lanzarote it’s not somewhere we would chose to go except for the fact my parents in law moved there from he UK. I speak Spanish and French and I’m nervous it will be Brits abroad and not at all my thing! We are committed</span><br data-dcnode-id="4222"><span data-dcnode-id="4221" instrument_node="">
To 5 nts in Playa Blanca but will Stay longer if you think it’ll be ok. We’re looking for a balance of culture (love the Spanish) and showing them England (London Eye, Zoo, Dinosaur Museaum, beach/pool for kids, relaxing, them getting to understand the culture, while combining with what we want as adults….we also have friends in Southampton/Bristol/Essex and no idea how we fit all in in 4wks!!! so thinking to prioritise London, Paris, maybe Barcelona and Lanzarote! Help!</span><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">
Cara Davis</span></p><span data-dcnode-id="4217" instrument_node="">

</span><p data-dcnode-id="3757"><span data-dcnode-id="3762" instrument_node="">Hi David</span><br data-dcnode-id="3761"><span data-dcnode-id="3760" instrument_node="">
This is a great site! We are needing some planning advice. We are traveling to Europe from Western Canada with our 3 yr old and 14 yr old in March/April. We have planned for 3.5 weeks, with key highlights including Athens, Rome, Venice, Monaco/south of France, Paris then either London and/or Copenhagen and Oslo (where we have family). We want to see historical sites but also have a chance to relax a day here or there without being over scheduled with sightseeing time. Is going south to north the best route? Plane or train? Thanks for your help!!!</span><br data-dcnode-id="3759"><span data-dcnode-id="3758" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="3728"><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3730"><span data-dcnode-id="3734" instrument_node="">You’ll need to fly to get to Athens and then best to fly from there to Rome (you could take the ferry from western Greece to Venice but it takes a fair bit of time and effort to take the bus from Athens to Igoumenitsa). But from Rome to Paris you can do all by train. Train is fun and easy (though can get a little boring on the longer journeys). It saves you from the airport/security/hassle and train stations are centrally located so that makes the train travel much more convenient. There’s a good </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seat61.com/thello-train-from-paris-to-italy.htm" rel="nofollow" target="_blank"><span data-dcnode-id="3733" instrument_node="">overnight train from Venice to Paris</span></a><span data-dcnode-id="3731" instrument_node=""> (if you ever decided to skip south France). London is wonderful if your kids like history and train/military museums.</span></p><span data-dcnode-id="3729" instrument_node="">

</span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Hi David, What a great site. My husband and I are planning a 3 month trip to Europe next summer with our two young children (ages 4 and 2 ). We are trying to figure out where to visit. We know that we probably will just choose 3-5 places and stay at each for a few weeks.</span></p><span data-dcnode-id="3594" instrument_node="">

</span><p data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Any thoughts or suggestions to help us narrow down our list? Also, if there is another location that you highly recommend (especially given the toddler factor), we are open to ideas!</span></p><span data-dcnode-id="3588" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3587" instrument_node="">Thanks!</span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">

</span><p data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Those are all great places. I have to throw in London as there’s just so many awesome kid-friendly attractions there (5x what Dublin has). South of France is more expensive than the Italian Riviera but also has more to do for families. The Italian coast is cheaper and less busy – though this changes as you move east. I highly recommend the Greek Islands for families. They’re just great – laid back, great food, great beaches, and so much fun island hopping on the ferries.</span></p><span data-dcnode-id="3559" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="3459"><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">My wife and I are considering spending 3-4 weeks in Europe next Spring (March); the timing and spot are linked to a meeting I will attend in The Hague, Netherlands in early March. So we thought it would be a good opportunity to travel with our two kids (son will be 5 and daughter 3). We were considering home exchange or apartment/house rental, either in Amsterdam, Belgium, or Paris, close enough for a short trip from The Hague by train.</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Our main concern is the climate and time of the year. We are from Canada, so used to cold and snow, but we wonder whether we would be able to take advantage of what these countries/cities have to offer in March (obviously too early for tulips, but maybe too late for real winter activities)…</span></p><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">What are your thoughts about travelling to Amsterdam/Paris/Belgium in early Spring?</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3461"><span data-dcnode-id="3464" instrument_node="">Thanks, your input would be much appreciated,</span><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">

</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Hello David –</span></p><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">What a wonderful resource for information you have put together – tremendously helpful!</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">I will be traveling with my 7 year old daughter in early June and she wants to go to Venice and London from Boston. Her older sister did a “mommy and me” trip at age 7 also, but was very focused on London and Paris. There were many thongs to do in both cities and the logistics were easy because we flew into London, took the train to Paris, flew back to London and then back on to Boston. My younger daughter wants to go to Venice because of the Olivia books she read as a child and her main desire is to go on a Gondola (my older daughter wanted to go to see the Eiffel Tower).</span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3206"><span data-dcnode-id="3217" instrument_node="">A few questions:</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">
1. Is there enough to do in Venice for the 7 year old and is it worth the trip to go on a Gondola ride? It is proving to be difficult to get to Venice ad then back to London from Boston.</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">
2. Are there museums there? How many days would you stay?</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">
3. Other than going back to Paris, is there another city or region that would be fun for her and easy to get to from London? She wants to do something different from her sister.</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">
4. Whats the easiest way to fly from Boston to Venice, back into London for 4 days and then back to Boston?</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">
5. Do you recommend taking the train from London to Venice?</span></p><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Many thanks for your help here! Berret</span></p><span data-dcnode-id="3202" instrument_node="">

</span><p data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Venice is great but it’s more about wandering around, exploring the city, and taking a gondola ride than about seeing any particular museums (though the Gallerie dell’Accademia is a must-see). Getting there from London requires taking the Eurostar to Paris and then the overnight train to Venice. Of course, there are plenty of direct flights from London to Venice too. 3 or 4 days in Venice is plenty of time.</span></p><span data-dcnode-id="3178" instrument_node="">

</span><p data-dcnode-id="3094"><span data-dcnode-id="3099" instrument_node="">Hi David,</span><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">
We are from Canada and want to take our two sons (12&amp;14) to Italy in October for 11 days. My husband wants to go at that time of year for the grape harvest. After reading your posts I know this is not enough time to see and do all there is. I would like to see Venice. What would be your suggestions as to where to fly into, drive to, and fly out of given the time we have. We want to experience European culture and history. Beaches are not a priority for this trip. You had mentioned to another reader to go to Greece in October. Is this because the weather is not good?</span><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="3068"><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Yes, the weather in October is very nice in Greece – especially if you’re not interested in beaches as it can dip just enough to make it hard to enjoy the sea but is still wonderful for touring, hiking, sightseeing. I wouldn’t recommend both Italy and Greece for an 11 day trip, however – it’s just too much for a short amount of time. Sticking to one country or another with maybe one other city (say, Paris, Barcelona or Amsterdam) would be fine. For Italy, flying into Rome and out of Venice makes for a good trip with Florence or Siena in the middle.</span></p><span data-dcnode-id="3069" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Monaco is great for kids (just be prepared for lots of hills). There’s a great aquarium there that is very kid-friendly. There are easy day trips by train to other cities along the coast (Cannes or Nice). And there’s an open-air trolley tour the kids should enjoy. I’d split my time between Monaco and Paris. Lots of great kid-friendly activities in the city. You could easily fill a week with your kids in Paris. I find cities to have lots to do and it’s the quieter places that you might think have a more kid-friendly vibe that leave you scratching your head to find things to do. But both Monaco and Paris should offer you plenty to keep busy. Good luck.</span></p><span data-dcnode-id="2386" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="2021" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c28c4a9855786be55fb842a79a183fad%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/c28c4a9855786be55fb842a79a183fad?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/c28c4a9855786be55fb842a79a183fad?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/c28c4a9855786be55fb842a79a183fad?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="2015"><b class="fn" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Bambi</span></b><span data-dcnode-id="2016" instrument_node=""> </span></cite><span data-dcnode-id="2014" instrument_node=""> </span></header><span data-dcnode-id="2012" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="2007"><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Lay your fears to rest! So many horror stories. So little reality. We just returned from living for three months in Spain with our 9 and 12 years old children and we had the opportunity to go to all the places you are hoping to visit. We had also heard may stories about pickpocketing on the Ramblas in Barcelona, and Gypsie scams in the south, but none of them came to fruition. Spaniards absolutely ADORE children! The family is the core of their culture, and you will be quite welcome when you bring your little ones along. In San Sebastian just wander around and hit the beach and eat every chance you get. The pintxos are fabulous! In Toledo be sure to buy a sword that can fit in your luggage – there will be so many options to choose from. The kids will love clambering up the stairs to the top of the Giralda Bell Tower in Sevilla. They’ll feel a sense of accomplishment that they made it, and be rewarded with great views. The Sevilla’s Alcazar has a whole group of ducks and peacocks running around, and it’s a great place to spend some time. Watch out for the duck that thinks one of the peacocks is his girl – he’ll bite your shoelaces if you get close to her! And as for Madrid – go! Madrid is fabulous. There are so many little parks and playgrounds sprinkled throughout the neighborhoods and the Parque Buen Retiro has little boats to rent. Your kids are younger than mine are, but we also traveled part of the time with my sister-in-law who had a 2 and 5 year old. We all had a great time and they were the hit at all the restaurants. Above all, just enjoy. We always stopped in pastry shops and had the local goodies, and when we had car journeys we would let the kids pick a bag of small Spanish candies from a corner store and distribute them through the ride. They loved looking at all the different wrappers and not knowing quite what they were going to get. As for lodging go with Booking.com. We booked 75% of out places through there and they all turned out outstanding. Giralda Suites in Sevilla were fabulous. In Madrid we stayed in an apartment from Homes for Travellers called the La Latina Loft. Apartments are the way to go. With that many people you are paying too much in a hotel, and they often don’t have the right size of beds to fit everyone. They don’t do two queens like we do here in the US. Also, once you are past 2 people it is sometimes the same price to taxi as to metro. We used the metro a lot, but sometimes a taxi was the better option and just as reasonable. Buen viaje!</span></p><span data-dcnode-id="2008" instrument_node="">
</span></section><span data-dcnode-id="2006" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1908"><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">First off, the more you travel the more you’ll spend. There’s the cost on travel itself plus the longer you’re in one place the more your costs tend to come down. You get comfortable with an area, find the grocery store, the cheaper restaurants, a place to eat a picnic. The faster you’re moving about the more compromises you make and say, “Oh, lets just eat at that place over there – I’m tired, I don’t care how much it costs.”</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">If it were me I’d head from Paris to South France for a few days and then onto Rome for the final 3 or 4 days and fly home from there.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1913"><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/%3Fa_aid%3D41040%26label%3Dcmt-europe" rel="nofollow" target="_blank"><span data-dcnode-id="1916" instrument_node="">Hotelscombined.com</span></a><span data-dcnode-id="1914" instrument_node=""> is the best website for finding discounted hotels throughout Europe. It searches every other major (and minor) site and gives you a list of available rooms and prices at each website.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Good luck.</span></p><span data-dcnode-id="1909" instrument_node="">

</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Lots to see of course. Paris is great. London, Rome, Amsterdam. So many great cities. If you’re there in summer the beaches in northern Europe are great too (e.g. the Atlantic coast of France) so no need to visit the Riviera if you didn’t want to. Not sure when you’re going but Legoland Windsor does close from December to March. Not sure about the Legolands in Germany and Brussels. I’d buy tickets to attractions like those in advance. Good luck.</span></p><span data-dcnode-id="1856" instrument_node="">

</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">For destinations you’ll be very central and by the sounds of it you’ll have 2 different weeks to fill. I’d choose between either Barcelona, Madrid, and Spain; Paris and central France; or Rome and Tuscany. Don’t do too much so just choose 2 of those 3 regions and enjoy yourself.</span></p><span data-dcnode-id="1796" instrument_node="">

</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Renting a place in Paris for a 2 week stay is a great idea. I think you’ll love it.</span></p><span data-dcnode-id="1625" instrument_node="">

</span><p data-dcnode-id="1579"><span data-dcnode-id="1582" instrument_node="">Hi David,</span><br data-dcnode-id="1581"><span data-dcnode-id="1580" instrument_node="">
Your site is fantastic and I’m glad I found it.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">I’m 21, and my family has put me in charge of planning our 18/19 day trip to Spain, Italy and France. We are planning on visiting Barcelona, Madrid, Alicante, Rome, Porto Recanit and Paris.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">We have home bases in Madrid and Porto Recanti (family, and we’ll be lodging there for a few nights). I was curious if you would recommend, if we start in Spain or Italy? What should we consider as a form of travel between the countries on a budget, we’ll all be adults by then and don’t mind traveling in unconventional ways, its all part of the adventure.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1571" instrument_node="">Also, any recommendations as to what things in those cities most people tend to miss?</span><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">
(We’ll be there flying out of MCO on either 5/28/13 or 6/3/12 with 18 nights. What do you think?)</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Juan</span></p><span data-dcnode-id="1564" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1533"><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Hi Juan. Firstly I would recommend flying into and out of different cities so that you don’t have to backtrack. It saves time and money. Maybe fly into Paris and fly home from Rome. It might cost a little more for the air tickets but it’s easily made up for by the return trip (e.g. from Rome to Paris) and hotel/lost time.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">I’d take the train between the major cities. It probably won’t be worth it buying a eurail pass. The cheapest way to buy tickets is through each individual country’s train website – so don’t book through the more general Eurail site. Italy’s website, in particular, offers good rates.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Hope that helps.</span></p><span data-dcnode-id="1534" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1437"><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">We have traveled with the kids (now ages 9 and 11) to Europe 3 times. We just returned from our most recent trip in which we spent 4 weeks going through Germany, France, and Italy. We followed your advice to fly home from a different city than we arrived in and it was wonderful. Great tip. Previously we would fly to London, then over to France only to have to return by train to London for that final night. A big expense with no benefit.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">On this trip we spent time in Berlin, Munich, camping in northern France with some friends, Paris (of course), the south of France (mainly around Cannes), and then Milan briefly, Florence, and Rome. We would have liked to visit Venice but ran out of time and seeing as we were very rushed at the end I’m glad we didn’t try to squeeze it in.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The kids most enjoyed Rome (they had both shown an interest in Roman history in the few weeks before we left and there was lots to see there). The sites of Rome seemed to lend themselves to being enjoyed by kids. They’re right there in front of you so it’s very personal and hands-on, or I guess eyes-on. Paris is always nice but the kids had been twice before so there wasn’t much new there. The beaches of Southern France were wonderful. Very family friendly in their feel and amenities.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">I think our next trip we’ll try to make it to Venice and then ferry (maybe!) to Greece. That’s the plan anyways.</span></p><span data-dcnode-id="1438" instrument_node="">
</span></section><span data-dcnode-id="1436" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="1428" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4642c7d4c0c29ea81e2ffa4af3f0d444%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4642c7d4c0c29ea81e2ffa4af3f0d444?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/4642c7d4c0c29ea81e2ffa4af3f0d444?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/4642c7d4c0c29ea81e2ffa4af3f0d444?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="1422"><b class="fn" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Traveling to Europe with School Kids</span></b><span data-dcnode-id="1423" instrument_node=""> </span></cite><span data-dcnode-id="1421" instrument_node=""> </span></header><span data-dcnode-id="1419" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">We are wanting to take our kids out of school for a period of 1-2 years and possibly place them into a school somewhere in Europe. Public or international school we are not quite sure. Where would be the easiest place for children aged 7 &amp; 9 from Canada best integrate into? Would probably have to take our two dogs, so can a person rent homes in the countryside that accept pets? Just looking for some ideas that would be best for the kids and from there we could use it as a base to explore the remainder of Europe. Thanks for any suggestions.</span></p><span data-dcnode-id="1415" instrument_node="">

</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">There are lots of great places and fantastic international schools all over Europe. The biggest difficulty will be securing a visa for that long (unless you have EU passports, but it doesn’t sound like it). Without a visa you can only spend 90 days in any 6 month period in all the Schengen countries (basically Western Europe and Greece). That’s 90 days total, not in each one.</span></p><span data-dcnode-id="1391" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Unless you’re traveling for more than 3 or 4 weeks I would suggest finding some cheap flights to Paris, Rome, Barcelona, or anywhere around Europe that you want to go. For example, if you wanted to see Barcelona, south France, and a bit of Italy, I would fly to Barcelona, train along the coast of France to Rome, and then fly home from there. If you really want to take in a lot of spots and are going on an extended trip then the car could save you some money. But a shorter trip that hits just 4 or 5 spots is probably cheaper with a combination of train and plane. I hope that helps. Good luck.</span></p><span data-dcnode-id="1362" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1304"><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Train is the funnest way to travel but flights often turn out to be cheaper (and obviously faster). Use airninja.com to find the budget airlines for the routes you need. But remember that many budget airlines depart from smaller airports that are often well outside the city center, so be sure to factor the time and expense of getting out there when comparing to taking the train which will leave from a terminal within the city.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Good luck.</span></p><span data-dcnode-id="1305" instrument_node="">

</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Hi David! We are planning a six week trip to Europe this coming June to July. We are looking for the best options/itineraries for a large family of two adults and 6 kids ranging from 16 to 2 years old. I have looked at house/apartment rentals which seem to make more sense economically. Can you please suggest an itinerary and transportation modes that will be convenient/less costly for all of us? We want to go as many places as possible but would also want to be realistic about it. Thanks in advance!</span></p><span data-dcnode-id="1274" instrument_node="">

</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">I’d pick out 8 or 10 places that you really want to see and then try to develop a line through a majority of them that starts and ends at different major cities. Fly into the first one and fly out of the last one. You save time and money by not backtracking. If it were me going on my first trip to Europe I’d start in Paris, train to Barcelona, then train to Rome with stops in the Cote d’Azur and Florence along the way.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Train is usually always the best way to get around.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/%3Fa_aid%3D41040%26label%3Dcmt-euro" rel="nofollow"><span data-dcnode-id="1246" instrument_node="">Hotelscombined</span></a><span data-dcnode-id="1244" instrument_node=""> is the best for finding hotel deals.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">vrbo.com is good for apartments and houses.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Good luck.</span></p><span data-dcnode-id="1236" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The best way to save money is to travel around as little as possible. So with that in mind, the best budget route would be to fly into Rome (or maybe Paris, Madrid, or Barcelona), travel north to London and then Scotland, and then fly home from there. Rectracing your steps is costly. (You could also do this trip in reverse but the weather will be much nicer in Italy and Spain at the end of October rather than the middle of November.) I hope that helps. Good luck.</span></p><span data-dcnode-id="1171" instrument_node="">

</span><img alt="" class="avatar avatar-44 photo" data-dcnode-id="1038" height="44" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/51229ac504ffca20951b766990350738%3Fs%3D44%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;d=mm&amp;r=g 2x" width="44"><noscript data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&lt;img loading="lazy" alt='' src='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=44&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/51229ac504ffca20951b766990350738?s=88&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-44 photo' height='44' width='44' loading='lazy'/&gt;</span></noscript><cite data-dcnode-id="1030"><b class="fn" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Santorini Dave</span></b><span data-dcnode-id="1033" instrument_node=""> </span><span data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The Hotel Expert</span></span></cite><span data-dcnode-id="1029" instrument_node=""> </span></header><span data-dcnode-id="1027" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="1007"><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">The easiest way to keep expenses down is to visit in the off or shoulder season, somewhere between late September and late May. That said, London is always expensive and the cities of Western Europe are never cheap. </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/%3Fa_aid%3D41040%26label%3Dcmt-europe" rel="nofollow"><span data-dcnode-id="1024" instrument_node="">hotelscombined.com</span></a><span data-dcnode-id="1022" instrument_node=""> is an awesome site for finding good deals on hotels.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Also, the more you move around the more you’ll spend. Train tickets are expensive and you tend to spend more in a place on your 1st day then on your 4th (when you have a better feel of where to shop, eat, and how much things should cost). You’ll often get better hotel deals for a longer stay too.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">To save money on trains book early. There are a limited number of cheap tickets and once they’re sold they’re gone. You’ll have to do the math to see if a train pass is worth it. Don’t assume that the train pass will be cheaper. The greater the number of stops you plan to make the more a train pass pays off. Also, check the websites of the individual countries when buying train tickets. So if you’re buying tickets for Italy visit the Italian train website instead of buying through the general Eurail site.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Plane tickets can be cheaper than the train but they require more planning and the airports for the budget airlines often lie far out of town making even a short flight a half-day ordeal. The train is much funner, easier, and feels more European. Airports have a more generic, “I could be anywhere” feel.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">I hope that helps.</span></p><span data-dcnode-id="1008" instrument_node="">

</span><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">That sounds great. Check out the new </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nam.ac.uk/" rel="nofollow" target="_blank"><span data-dcnode-id="935" instrument_node="">Kids Zone at the Army Museum</span></a><span data-dcnode-id="933" instrument_node=""> which is perfect for those ages (though you need to book in advance).</span></p><span data-dcnode-id="931" instrument_node="">

</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">We stayed a week at the </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.booking.com/hotel/gb/jurys-clifton-ford.en-us.html%3Faid%3D346426" rel="nofollow"><span data-dcnode-id="923" instrument_node="">Marylebone Hotel</span></a><span data-dcnode-id="921" instrument_node=""> which was great and has a pool (though it’s only open for kids from 3:30 to 5:00 which you need to plan around). But the staff are great with kids and make every effort to keep them happy. The neighborhood around the hotel is fantastic and very central. Good luck.</span></p><span data-dcnode-id="919" instrument_node="">

</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Hi. My husband and I have decided to take our 4 kids (13,12,11 and 9) to the UK and Italy, Spain and Belgium (family connections) for 9 weeks beginning in March this year. We are still undecided on the best mode of transport – trains/public transport seem too expensive, car ok but then we need to find accommodation; motorhome seems good option but so large and very expensive …. ahh! Does anyone have any suggestions? We are happy to see less and experience more, and would love flexibility to change plans as we go… We have no experience of youth hostels or their cost/availablity, or of actually driving around in a motorhome – indeed of anything much! Ideally we would camp but feel the weather may be far too cold and maybe wet? Some may say we are travelling blind! thanks in advance for any comments.</span></p><span data-dcnode-id="892" instrument_node="">

</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Hi Jackie. Both are great, but very different. Since you’re planning to travel with another family then I think Bali wins out as it’s much more easy going and chill-out friendly. Big cities are great for kids, but I think trying to negotiate all the challenges, planning, arranging that Western Europe requires would be too much for 2 families and probably result in some unneeded headaches. Go simple, go Bali.</span></p><span data-dcnode-id="790" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Hi Rachel. It does sound reasonable and if you’re certain you’ll take the trip then I’d book it. Could there be cheaper fares? Yes. But, at best, probably not less than $1300 or so. Whereas it could move in the upwards direction several hundred dollars. My only suggestion for getting a cheaper ticket would be to leave the Paris to Rome leg off your ticket and do this by train or a cheap budget airline. It likely wouldn’t save you a lot of money but you would gain some flexibility (maybe stopping in South France, Milan, or Florence on your way to Rome) and the kids would get to do an overnight train ride which they’d love. Good luck.</span></p><span data-dcnode-id="731" instrument_node="">
