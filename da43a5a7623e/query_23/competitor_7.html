</span><span class="by author" data-dcnode-id="939"><span data-dcnode-id="942" instrument_node="">By </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/author/iladmin/" rel="author" title="Posts by International Living"><span data-dcnode-id="941" instrument_node="">International Living</span></a></span><span data-dcnode-id="938" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">21 Great Value Beach Destinations Around The World</span></h1><span data-dcnode-id="921" instrument_node=""> </span></header><span data-dcnode-id="919" instrument_node="">
</span><div class="entry-content" data-dcnode-id="260"><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Eventually, planes will fly again—making all sorts of beautiful corners of the world accessible once more. Among them will be these 21 great-value beaches.&nbsp;They’re all spots where it’s possible to live with the sand and surf steps from the front door—and that luxury won’t cost a fortune.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The world is a big place, and there are scores of beautiful beaches where retiring and living the good life is within reach of anyone.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Each of our 21 beaches has its own distinct personality, but between them they offer snorkeling, surfing, paddle boarding, whale-watching, and national parks—not to mention delicious seafood and friendly, warm-hearted people.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Whatever your style, whether you want to be active or just sip a cold beer with sand between your toes, these beach destinations are certain to have something for you.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Read on to discover which beach destination in one of our 12 countries around the world is the perfect one for you.</span></p><span data-dcnode-id="903" instrument_node="">
</span><h2 data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="902" instrument_node="">1.</span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/ecuador/salinas-ecuador/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="901" instrument_node=""> Salinas, Ecuador</span></a></strong></h2><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><img alt="" class="wp-image-703730 aligncenter" data-dcnode-id="896" height="408" sizes="(max-width: 613px) 100vw, 613px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Salinas-Ecuador-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Salinas-Ecuador-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Salinas-Ecuador-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Salinas-Ecuador.jpg 600w" width="613"></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">Salinas is a fully-fledged beach resort—among Ecuadorians, it’s probably the country’s best-known resort. This is the place for those who like all amenities: modern condominium buildings (which line much of Salinas’s miles-long beach), restaurants, coffee shops, bars, and discos. Plus, there’s regular bus services to </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/ecuador/guayaquil-ecuador/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="892" instrument_node="">Guayaquil</span></a><span data-dcnode-id="890" instrument_node="">, only two hours away, which has an international airport. All of this makes retirement in Salinas an attractive option.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">Despite the flurry of activity that is Salinas, it may be one of the world’s least-expensive beach resorts. A nice private room in a boutique hotel just one block off the </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">malecón </span></em><span data-dcnode-id="884" instrument_node="">(boardwalk) can be had for $30 a night for a single. A steak or seafood dinner in one of those trendy restaurants costs just $5 or $6. Or chow down on fish or shrimp, cooked any way imaginable, at the local </span><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">mercado</span></em><span data-dcnode-id="881" instrument_node=""> (market) for about $2.50.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">A couple can live well in Salinas for about $1,400 per month including rent.</span></p><span data-dcnode-id="876" instrument_node="">
</span><h2 data-dcnode-id="871"><strong data-dcnode-id="872"><span data-dcnode-id="875" instrument_node="">2. </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/panama/pedasi/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="874" instrument_node="">Pedasi, Panama</span></a></strong></h2><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><img alt="Pedasi Beach Panama" class="aligncenter size-full wp-image-694258" data-dcnode-id="869" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Pedasi-Beach-Panama.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Pedasi-Beach-Panama.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Pedasi-Beach-Panama-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Pedasi-Beach-Panama-300x200.jpg 300w" width="600"></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">Pedasi is a wonderful place to live for ocean lovers. Scuba diving, snorkeling, windsurfing, and deep-sea fishing are just some of the things to do here. The town has all the necessary amenities for day-to-day living—the Minsa-Capsi hospital in Pedasi offers most services with a variety of specialists—there are a few grocery stores, gas station and even a public library. </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/panama/las-tablas-panama/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="865" instrument_node="">Las Tablas</span></a><span data-dcnode-id="863" instrument_node="">&nbsp;is the nearest shopping city and it’s only a 45-minute drive away.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">The safety of Pedasi is one reason why many </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/what-is-an-expat-qa/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="859" instrument_node="">expats</span></a><span data-dcnode-id="857" instrument_node=""> move here. In Pedasi, there is little to no petty crime. Locals and expats all look out for each other, and locals welcome expats and expat businesses.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">A typical two-bedroom, two-bathroom home starts at around $135,000 in Pedasi.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Including rent, a couple can live well in Pedasi on about $1,265 per month.</span></p><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="848" instrument_node="">3. </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/panama/bocas-del-toro-panama/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="847" instrument_node="">Bocas del Toro, Panama</span></a></strong></h2><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><img alt="" class="wp-image-703731 aligncenter" data-dcnode-id="842" height="386" loading="lazy" sizes="(max-width: 579px) 100vw, 579px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Bocas-del-Toro-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Bocas-del-Toro-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Bocas-del-Toro-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Bocas-del-Toro.jpg 600w" width="579"></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Also in Panama, Bocas del Toro may well be one of the best-kept secrets in the Caribbean with ocean breezes, soft reggae music, stunning scenery, and a laidback atmosphere. Views are quintessential Caribbean—white-sand beaches, perky green palms, and warm crystal-clear water. Typical visitors range from backpackers and surfers to wealthy adventurers who enjoy traveling to off-the-radar locations.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Expats living here tend to be very involved in island life. Some have started businesses, helping fuel the island economy, others enjoy teaching local students, and others find time to volunteer for important causes or charities. Much good has come of this growth, and the community has worked to protect the flora and fauna, and local marine life such as sea turtles. Bocas Del Toro is also a perfect place to test drive your dream Caribbean lifestyle. The expat community is welcoming, it’s organized, and it gives back. A few days is all that’s required to start networking and making friends.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">A single person could spend as little as $80 a week on food—mostly local produce, with some organic or imported items in the mix.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">A couple can rent and live well in Bocas del Toro for about $1,400 a month.</span></p><span data-dcnode-id="828" instrument_node="">
</span><h2 data-dcnode-id="823"><strong data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">4. </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/sayulita-mexico/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="826" instrument_node="">Sayulita, Mexico</span></a></strong></h2><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><img alt="" class="wp-image-703732 aligncenter" data-dcnode-id="821" height="366" loading="lazy" sizes="(max-width: 551px) 100vw, 551px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Sayulita-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Sayulita-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Sayulita-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Sayulita.jpg 600w" width="551"></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">It’s all about the beach and the water in Sayulita. Enjoy world-class surfing and standup paddle boarding, as well as fishing in the local open wooden boats for a good price. Sayulita is an active town, with plenty of expat get-togethers, happy hours, and other events, as well as volunteer activities, to stay busy night and day.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">A considerable advantage of living in Sayulita is that while there are markets, stores, restaurants, and even medical clinics to cover day-to-day needs, it’s also easy to head south to the larger town of Bucerias or even further to Puerto Vallarta to get anything not found in Sayulita. This makes it very convenient to get the funky vibe of a bohemian beach town with the conveniences and comforts of the big city available just down the road.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">You can expect to pay around $1,000 per month for a two or three-bedroom home or condo in a convenient area.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">With rent, a couple can live comfortably in Sayulita for about $1,800 per month.</span></p><span data-dcnode-id="807" instrument_node="">
</span><h2 data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="806" instrument_node="">5. </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/portugal/cascais-portugal/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="805" instrument_node="">Cascais, Portugal</span></a></strong></h2><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><img alt="" class="wp-image-703733 aligncenter" data-dcnode-id="800" height="367" loading="lazy" sizes="(max-width: 551px) 100vw, 551px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Cascais-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Cascais-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Cascais-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Cascais.jpg 600w" width="551"></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Cascais is blessed with a year-round moderate climate, with temperatures ranging from 55 F to 77 F. Golfing is nearby, and favorable sun and wind conditions make sailing, kite surfing, and windsurfing—in addition to traditional surfing—popular activities in this region whose economy hinges on tourism. These factors—pleasant climate, lovely natural surroundings, accessible culture, and more—combine to make Cascais an ideal choice for retirement.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Cascais has not forgotten its origins as a fishing village. Seasoned fishermen still leave from shore in early morning, returning with their catch of sardines, crabs, mussels, robalo, dorado, and octopus. At lunch time, the men eat on the dock, family-style, from huge stock pots of simmering fish stew, sharing stories washed down with local wines. The arresting beauty of the bay charms locals and visitors alike.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">If you opt to live in a house instead of an apartment or condo, you might want to add a gardener to your budget. Generally, you can expect to pay about $25 per visit</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">A couple can rent and live well in Cascais for about $1,580 per month.</span></p><span data-dcnode-id="786" instrument_node="">
</span><h2 data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="785" instrument_node="">6. </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/belize/placencia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="784" instrument_node="">Placencia, Belize</span></a></strong></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><img alt="Placencia Beach Belize" class="aligncenter size-full wp-image-694263" data-dcnode-id="779" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Placencia-Beach-Belize.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Placencia-Beach-Belize.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Placencia-Beach-Belize-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Placencia-Beach-Belize-300x200.jpg 300w" width="600"></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="776" instrument_node="">Placencia is a charming little seaside town found at the tip of a peninsula off the coast of mainland </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/belize/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="775" instrument_node="">Belize</span></a><span data-dcnode-id="773" instrument_node="">. It’s fast becoming Belize‘s most desirable location as it fronts the gorgeous Caribbean Sea to the east and a resplendent freshwater lagoon, full of wildlife and with a view of the gorgeous Maya mountain chain, to the west.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">One of only three villages on the entire peninsula, Placencia is still largely seen as a vacation spot, but has everything needed to build a life, including supermarkets, brightly painted restaurants, a small domestic airport, and a medical clinic. The Placencia Peninsula has a population of less than 5,000, and many of these are expats. The combination of relaxation with adventure makes Placencia a perfect beach paradise.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Placencia retains more of a Caribbean atmosphere than found in other parts of Belize. Food, entertainment, and the area’s general appearance all have Caribbean flavor. Beaches are wider, whiter, and in many places, almost empty except for the occasional egret or ibis. And English is the official language in Belize. You can rent a property for $500 a month, if you are looking for a simple wood cabin on the beach, for beachfront luxury you are looking at around $850.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Including rent, a couple can enjoy the good life in Placencia for about $1,760 per month.</span></p><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="757"><strong data-dcnode-id="758"><span data-dcnode-id="761" instrument_node="">7. </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/belize/caye-caulker/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="760" instrument_node="">Caye Caulker, Belize</span></a></strong></h2><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><img alt="Caye Caulker Beach Belize" class="aligncenter size-full wp-image-694265" data-dcnode-id="755" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Caye-Caulker-Beach-Belize.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Caye-Caulker-Beach-Belize.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Caye-Caulker-Beach-Belize-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Caye-Caulker-Beach-Belize-300x200.jpg 300w" width="600"></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Caye Caulker, a five-mile long island off the coast of mainland Belize, is a charming </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/the-caribbean/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="751" instrument_node="">Caribbean island</span></a><span data-dcnode-id="749" instrument_node=""> where “go slow” is the motto. This island is known for its stunning seascapes, diverse water sports, eco-tours, and friendly community. It takes only 30 minutes by water taxi to reach Caye Caulker from its big sister Ambergris Caye. While it is much smaller, with less than 2,000 residents compared to Ambergris’ 20,000, it’s just as beautiful on this island and the pace is much slower. The streets are still composed of packed sand, and you won’t need to dodge traffic here. You’ll see a few golf carts, but no cars or trucks.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">This charming island is graced with pastel-colored B&amp;Bs, bars, and cafés. The lifestyle is laidback and low key. It’s a perfect spot for those who wish to live on the Caribbean Sea, surrounded by nature. Artists and writers, who seek creative inspiration, will find plenty here, given the spectacular natural environment.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Most residents take the high-speed water taxi for their local trips, priced at $25 (round trip). It takes 45 minutes to get to Belize City, 30 minutes to reach Ambergris Caye. Flights take 15 to 20 minutes, but are pricier, at $80 (round trip) to Belize Municipal Airport.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">A couple can rent and live well in Caye Caulker for about $2,000 per month.</span></p><span data-dcnode-id="738" instrument_node="">
</span><h2 data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="737" instrument_node="">8. </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/malaysia/penang-malaysia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="736" instrument_node="">Penang, Malaysia</span></a></strong></h2><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><img alt="Penang Beach Malaysia" class="aligncenter size-full wp-image-694266" data-dcnode-id="731" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Penang-Beach-Malaysia.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Penang-Beach-Malaysia.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Penang-Beach-Malaysia-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Penang-Beach-Malaysia-300x200.jpg 300w" width="600"></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">Penang is a small tropical island off the west coast of peninsular </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/malaysia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="727" instrument_node="">Malaysia</span></a><span data-dcnode-id="725" instrument_node="">. It is a former British colony, so English is widely spoken. Its population is just over 700,000 with a majority of the people living in its capital, George Town. Penang has been one of the top expat destinations in Malaysia for years. It is not a bustling city like Kuala Lumpur, yet it still has all the comforts of home. There is everything from beaches and shopping to great food and a vibrant culture.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Penang is a multicultural island with about 60% of its inhabitants being Chinese, 32% Malays, and 7% Indian. Culturally it’s a mind-blowing place to live, and with a mix of these cultures, the food is touted to be the best in all of Southeast Asia.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Eat where the locals eat and you can’t go wrong. It’s safe for foreigners, delicious, and you can get a filling meal for less than $5.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">A couple can rent and live well in Penang for about $1,455 per month.</span></p><span data-dcnode-id="714" instrument_node="">
</span><h2 data-dcnode-id="709"><strong data-dcnode-id="710"><span data-dcnode-id="713" instrument_node="">9. </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/ecuador/manta-ecuador/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="712" instrument_node="">Manta, Ecuador</span></a></strong></h2><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><img alt="Manta Beach Ecuador" class="aligncenter size-full wp-image-694267" data-dcnode-id="707" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Manta-Beach-Ecuador.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Manta-Beach-Ecuador.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Manta-Beach-Ecuador-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Manta-Beach-Ecuador-300x200.jpg 300w" width="600"></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">Manta is one of coastal </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/ecuador/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="703" instrument_node="">Ecuador’s</span></a><span data-dcnode-id="701" instrument_node=""> great success stories. Always a prosperous fishing city, with an economy that revolved around the tuna industry, the city has emerged as a major cargo port and beach resort in recent years, attracting increasing numbers of foreign residents.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">It is Ecuador’s fourth largest city, with a population of around 300,000 people. There is a beautiful new shopping mall in Manta that has opened within the last two years and there are also hundreds of craftsmen and businesses here that offer just about anything you might be looking for.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">In recent years, Manta has become a popular stop for international cruise liners sailing from the Caribbean to Latin America. The stopover business has added to the city’s nightlife, and new bars and discotheques have opened.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Luxury condominiums can go as high as $1,200 (and more) per month and it will cost you no more than $2 for a taxi to get you around to the better restaurants in town.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">A couple can rent and live well in Manta for about $1,800 per month.</span></p><span data-dcnode-id="687" instrument_node="">
</span><h2 data-dcnode-id="682"><strong data-dcnode-id="683"><span data-dcnode-id="686" instrument_node="">10. </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/cozumel-mexico/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="685" instrument_node="">Cozumel, Mexico</span></a></strong></h2><span data-dcnode-id="681" instrument_node="">
</span><figure aria-describedby="caption-attachment-703734" class="wp-caption aligncenter" data-dcnode-id="677" id="attachment_703734" style="width: 626px"><img alt="" class="wp-image-703734" data-dcnode-id="680" height="417" loading="lazy" sizes="(max-width: 626px) 100vw, 626px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Recovered-Cozumel-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Recovered-Cozumel-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Recovered-Cozumel-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Recovered-Cozumel.jpg 600w" width="626"><figcaption class="wp-caption-text" data-dcnode-id="678" id="caption-attachment-703734"><span data-dcnode-id="679" instrument_node="">©LUNAMARINA/iStock</span></figcaption></figure><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">Just 12 miles off the coast of Playa del Carmen, along Mexico’s famed </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/riviera-maya/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="674" instrument_node="">Riviera Maya</span></a><span data-dcnode-id="672" instrument_node="">, Cozumel is a well-established, world-class vacation destination. Especially known for its warm, tropical water, snorkelers and scuba divers from across the globe enjoy exploring the island’s reef, teeming with aquatic life.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Those wanting to enjoy an active, lifestyle while also appreciating the pleasures of island life may wish to consider Cozumel for their retirement home. In addition to unlimited water-born recreational opportunities such as boating, fishing, swimming, snorkeling, scuba diving, sailing, and kayaking, Cozumel also provides modern infrastructure with a stable electrical grid and high-speed internet.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">In Cozumel you can buy a couple of fish tacos for about $5 and wash them down with a $2 local brew, or splurge on an elegant steak and lobster dinner by the sea.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">A couple can rent and live well in Cozumel for about $1,890 per month.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h2 data-dcnode-id="656"><strong data-dcnode-id="657"><span data-dcnode-id="660" instrument_node="">11. </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/tulum-mexico/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="659" instrument_node="">Tulúm, Mexico</span></a></strong></h2><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><img alt="" class="wp-image-703735 aligncenter" data-dcnode-id="654" height="401" loading="lazy" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tulum-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tulum-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tulum-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tulum.jpg 600w" width="602"></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Tulúm is a charming and growing resort town on the southern end of Mexico’s famed Riviera Maya. With a palpable Bohemian vibe and a plentiful scattering of yoga practitioners and therapeutic massage businesses, this growing community retains its backpacker roots. Some say they can feel the presence of the ancient Maya culture which dominated this region over 1,000 years ago.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The town of Tulúm, bisected by the coastal highway, is a stone’s throw from the sparkling sand and warm waters of the Caribbean Sea. About 80 miles and two hours south of Cancún, the town is no longer the hidden gem it once was, but is now well into the development phase with construction of homes and condos on the rise to keep up with those wishing to claim their slice of paradise.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">A local beer will cost about $2, and an inexpensive meal will set you back about $4. A nice dinner for two in a mid-range restaurant will cost about $23.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">A couple can rent and live well in Tulum for about $3,175 per month.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h2 data-dcnode-id="635"><strong data-dcnode-id="636"><span data-dcnode-id="639" instrument_node="">12. </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/puerto-vallarta/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="638" instrument_node="">Puerto Vallarta, Mexico</span></a></strong></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><img alt="Puerto-Vallarta-Beach-Mexico" class="aligncenter size-full wp-image-694271" data-dcnode-id="633" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Puerto-Vallarta-Beach-Mexico.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Puerto-Vallarta-Beach-Mexico.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Puerto-Vallarta-Beach-Mexico-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Puerto-Vallarta-Beach-Mexico-300x200.jpg 300w" width="600"></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">Set on Mexico’s central Pacific coast, Puerto Vallarta first gained fame in the 1960s, when it served as the setting for the classic film, </span><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Night of the Iguana</span></em><span data-dcnode-id="627" instrument_node="">, starring Elizabeth Taylor and Richard Burton. In the decades since then this once quiet fishing village has grown exponentially into the world-class and world-famous vacation destination it is today, attracting travelers from around the world, as well as a large contingent of retirees and other expats—most from the U.S. and Canada. The heart of PV is the Zona Romantica, also known as Old Town. It’s a pedestrian friendly zone of narrow streets and historic buildings mixed in with modern construction. Here you can find shops, bakeries, cafes, restaurants, condo buildings, and more within a stone’s throw of the water.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The outskirts of the town are modern, with large shopping malls, big box, stores, marinas, and large housing developments, including the showpiece Nuevo Vallarta residential and resort complex.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">There are one or two-bedroom condos to rent within walking distance of the beach and the entertainment district, Zona Romantica, starting at $600 to $700.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">A couple can rent and live well in Puerto Vallarta for about $2,049 per month.</span></p><span data-dcnode-id="616" instrument_node="">
</span><h2 data-dcnode-id="611"><strong data-dcnode-id="612"><span data-dcnode-id="615" instrument_node="">13. </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/cancun/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="614" instrument_node="">Cancun, Mexico</span></a></strong></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><img alt="Cancun-Beach-Mexico" class="aligncenter size-full wp-image-694272" data-dcnode-id="609" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Cancun-Beach-Mexico.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Cancun-Beach-Mexico.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Cancun-Beach-Mexico-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Cancun-Beach-Mexico-300x200.jpg 300w" width="600"></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">Cancun, the northern anchor of Mexico’s Riviera Maya, has long been a favored destination for those seeking a suntan and a hangover. In fact, with over 5 million visitors each year, Cancun is the most popular vacation destination in the Caribbean. Combined with the growing communities of Puerto Morelos, Playa del Carmen, </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/mexico/akumal-mexico/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="605" instrument_node="">Akumal</span></a><span data-dcnode-id="603" instrument_node="">, and Tulúm to the south, the Riviera Maya may well be a top competitor for the best vacation destination on the planet.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">With dozens of sprawling, all-inclusive resorts standing watch over miles of sparkling sugar-sand beaches, swaying palms and the warm, turquoise water of the Caribbean Sea, along with a vibrant night life, Cancun could easily define the ideal tropical retreat. With temperatures anchored in the mid-80s F for most of the year (some summer days breach 90 F), and plentiful sunshine, a casual lifestyle and amazing food, what’s not to like?</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">To buy a 1,200-square-foot home, you’ll spend about $125,000 and rent for a two-bedroom apartment will run about $1,200 to $1,800 a month.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">A couple can rent and live well in Cancun for about $2,040 per month.</span></p><span data-dcnode-id="592" instrument_node="">
</span><h2 data-dcnode-id="587"><strong data-dcnode-id="588"><span data-dcnode-id="591" instrument_node="">14. </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/italy/sorrento-italy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="590" instrument_node="">Sorrento, Italy</span></a></strong></h2><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><img alt="Sorrento Beach Italy" class="aligncenter size-full wp-image-694273" data-dcnode-id="585" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Sorrento-Beach-Italy.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Sorrento-Beach-Italy.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Sorrento-Beach-Italy-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Sorrento-Beach-Italy-300x200.jpg 300w" width="600"></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">Gazing north across the Bay of Naples, Sorrento is the tourism hub of Campania’s coastal region. Visitors have been flocking to Sorrento since the rule of Imperial Rome, when it was a noted vacation resort for the wealthy. They called this region </span><em data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Campania Felix</span></em><span data-dcnode-id="579" instrument_node=""> (the happy land).</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">Sorrento is a colorful and vibrant place, not quite a city but not a small town either. Maybe it’s the famed </span><em data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">limoncello</span></em><span data-dcnode-id="573" instrument_node=""> liqueur that infuses a high-octane sweetness, but the people just seem to radiate a self-satisfied happiness. If you want a dose of liquid sunshine, just stroll down Via San Cesareo where artisanal shops make the liqueur and dole it out liberally. This is also where you’ll find handmade leather goods and plenty of restaurants and gelato shops, too. You won’t go hungry here; there are loads of restaurants around Sorrento, serving up mozzarella-laced pasta and fresh seafood, and of course that famous Neapolitan pizza.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">While you could easily spend $67 a person for a full meal, or more than $100 a head for a Michelin-starred restaurant, you can just as easily sidle into a homey </span><em data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">trattoria</span></em><span data-dcnode-id="567" instrument_node=""> for a plate of pasta that costs $7.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">A couple can rent and live well in Sorrento for about $2,817 per month.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h2 data-dcnode-id="557"><strong data-dcnode-id="558"><span data-dcnode-id="561" instrument_node="">15. </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/spain/alicante-spain/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="560" instrument_node="">Alicante, Spain</span></a></strong></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><img alt="Alicante Beach Spain" class="aligncenter size-full wp-image-694274" data-dcnode-id="555" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Alicante-Beach-Spain.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Alicante-Beach-Spain.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Alicante-Beach-Spain-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Alicante-Beach-Spain-300x200.jpg 300w" width="600"></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The weather here is as near perfect as it gets for a beach destination. Alicante’s temperatures average in the mid-80s F in summer, and in the low to mid-60s F in winter, with only moderate humidity. And most days are sunny.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">No wonder Alicante has been a favored beach resort for decades. Northern Europeans flock here for its warm sea and warmer sun. They can fly into Alicante’s international airport, which connects the city to destinations all over Europe. Spaniards, too, frequently come here for their annual beach vacation.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">With a population of about 330,000, Alicante is large enough to offer all the city amenities: shops and department stores; traditional markets and supermarkets; art and archaeological museums; excellent public transport (including buses out to the airport); a wealth of restaurants, bars, and cafes; and historic monuments galore. In short, there’s plenty to keep visitors and residents happy and occupied.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">You can rent a two-bedroom apartment for about $633 a month. And sale prices for two- and three-bedroom apartments start well under $100,000.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">A couple can rent and live well in Alicante for about $1,985 per month.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h2 data-dcnode-id="533"><strong data-dcnode-id="534"><span data-dcnode-id="537" instrument_node="">16. </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/spain/malaga/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="536" instrument_node="">Malaga, Spain</span></a></strong></h2><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><img alt="Malaga Beach Spain" class="aligncenter size-full wp-image-694275" data-dcnode-id="531" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Malaga-Beach-Spain.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Malaga-Beach-Spain.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Malaga-Beach-Spain-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Malaga-Beach-Spain-300x200.jpg 300w" width="600"></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">On </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/spain/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="527" instrument_node="">Spain’s</span></a><span data-dcnode-id="525" instrument_node=""> southern Mediterranean Coast, Malaga is the gateway to the Costa del Sol, long one of Spain’s biggest beach-tourism regions. Málaga’s international airport greets more than 14 million tourists, primarily Europeans, each year on their way to Torremolinos, Marbella, and a dozen or more whitewashed villages along this coast that today make their living from tourism.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Málaga is clean and bright, with a pedestrian-only city center and a revamped harbor area that is a joy to stroll. The city is brimming with museums, great dining, and plenty of shopping to suit all tastes and budgets. Best of all, it remains a very Spanish city, even in the prime tourist areas. So, if you enjoy big-city life with laidback charm and a side of seashore, give Málaga a whirl. You can even get by in English.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Outside the historic center, tapas can run just a couple of dollars apiece, and a draft beer about $1.80.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">A couple can rent and live well in Malaga for about $2,237 per month.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="509"><strong data-dcnode-id="510"><span data-dcnode-id="513" instrument_node="">17. </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/costa-rica/tamarindo-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="512" instrument_node="">Tamarindo, Costa Rica</span></a></strong></h2><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><img alt="" class="wp-image-703736 aligncenter" data-dcnode-id="507" height="395" loading="lazy" sizes="(max-width: 593px) 100vw, 593px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tamarindo-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tamarindo-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tamarindo-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Tamarindo.jpg 600w" width="593"></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Originally a tiny surfing town, Tamarindo now has the reputation of being one of the most developed on the North Pacific Coast, but it still has lots of rugged charm, as well as luxury houses, restaurants with cuisines from around the world, sophisticated nightlife, and a choice of 18-hole golf courses 20 minutes to the south or north. There’s also terrific fishing and surfing.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Aside from the world-renowned surf and paradise-like atmosphere, Tamarindo proved to be no one-hit wonder when it garnered international attention once again in 2004 for being located within one of the world’s five “Blue Zones”—areas where people regularly reach the age of 100, and in good health.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="498" instrument_node="">All that said, it’s easy to understand how this town has become one of </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="497" instrument_node="">Costa Rica’s</span></a><span data-dcnode-id="495" instrument_node=""> most popular beach towns; popular among</span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node=""> Ticos</span></em><span data-dcnode-id="492" instrument_node=""> (Costa Ricans), but also a large expat community and tourists from around the world. With a growth in popularity has come a growth in amenities and infrastructure.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">If you need to take a taxi for any reason, it will usually cost between $2 and $4 and public bus fare to get you to surrounding cities are low.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">A couple can rent and live well in Tamarindo for about $2,145 per month.</span></p><span data-dcnode-id="484" instrument_node="">
</span><h2 data-dcnode-id="479"><strong data-dcnode-id="480"><span data-dcnode-id="483" instrument_node="">18. </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/costa-rica/nosara-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="482" instrument_node="">Nosara, Costa Rica</span></a></strong></h2><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><img alt="Nosara Beach Costa Rica" class="aligncenter size-full wp-image-694277" data-dcnode-id="477" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Nosara-Beach-Costa-Rica.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Nosara-Beach-Costa-Rica.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Nosara-Beach-Costa-Rica-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Nosara-Beach-Costa-Rica-300x200.jpg 300w" width="600"></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Nosara is an idyllic Pacific beach town located on the Nicoya Peninsula in northwestern Costa Rica. As the saying goes in Nosara: no shoes, no shirt, no problem. It’s a laidback place to live. The Nicoya Peninsula is one of only five Blue Zones in the world, and Nosara is included in this. Living longer here is attributed to natural eating habits, physical lifestyles, strong familial bonds, and good friendships.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">As this area is surrounded by the Nosara Biological Reserve (over 90-acres), the zoning will never change to allow the sort of development seen elsewhere in popular beach towns in the country. And the nearby mangroves, dry forest, and beaches are passionately protected by Nosara’s residents. This lack of development directly on the beach makes Nosara desirable for locals and visitors alike.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">With a registered population of only 5,800 people, Nosara swells in winter with tourists and seasonal residents. They are well catered for with over 30 restaurants—from local </span><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">sodas</span></em><span data-dcnode-id="465" instrument_node=""> (small Costa Rican family restaurants) to fine dining options.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">A nice family home in Nosaro with three to four bedrooms and all the modern amenities can be found for around $600,000 to $800,000.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">A couple can rent and live well in Nosara for about $3,375 per month.</span></p><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="452"><strong data-dcnode-id="453"><span data-dcnode-id="456" instrument_node="">19. </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/portugal/lagos-portugal/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="455" instrument_node="">Lagos, Portugal</span></a></strong></h2><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><img alt="Lagos Beach Portugal" class="aligncenter size-full wp-image-694278" data-dcnode-id="450" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Lagos-Beach-Portugal.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Lagos-Beach-Portugal.jpg 600w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Lagos-Beach-Portugal-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Lagos-Beach-Portugal-300x200.jpg 300w" width="600"></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">Lagos is in the western </span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/portugal/the-algarve-portugal/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="446" instrument_node="">Algarve</span></a><span data-dcnode-id="444" instrument_node="">, where the beautiful rock formations of Ponta da Piedade and inviting sands lure beach lovers, while a large number of bars, cafés, and restaurants offer food and beverage choices for all. You can have a Portuguese breakfast at a local hangout across from the marina for a couple of dollars, with coffee and thick-sliced local bread toasted and dripping with butter.</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Summer temperatures range from around 68 F to 82 F and drop by 20 F in winter on average.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">An impressive new construction project on the waterfront will offer spectacular views of the harbor, but with a commensurate price tag: Average prices are $399,000 and up for two- or three-bedroom apartments. Prices relax a bit just 10 minutes from the town center, in the hills surrounding Lagos, where white, terracotta-topped houses and bougainvillea-draped duplexes suggest low-key suburban life.</span></p><span data-dcnode-id="436" instrument_node="">
</span><h2 data-dcnode-id="431"><strong data-dcnode-id="432"><span data-dcnode-id="435" instrument_node="">20. </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/colombia/santa-marta-colombia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="434" instrument_node="">Santa Marta, Colombia</span></a></strong></h2><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><img alt="" class="wp-image-703738 aligncenter" data-dcnode-id="429" height="399" loading="lazy" sizes="(max-width: 599px) 100vw, 599px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Santa-Maria-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Santa-Maria-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Santa-Maria-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Santa-Maria.jpg 600w" width="599"></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="426" instrument_node="">Pressed between the Caribbean Sea and the snow-capped Sierra Nevada mountain lies Santa Marta, South America’s oldest surviving city. With a population of 500,000 residents, Santa Marta is half the size of the more well-known city of </span><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/colombia/cartagena-colombia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="425" instrument_node="">Cartagena</span></a><span data-dcnode-id="423" instrument_node="">. But don’t let size fool you. Santa Marta is quickly becoming a sought-after destination for both tourists and retirees.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">If your definition of retirement means staying active, eating well, enjoying cultural events, and soaking up natural beauty, then Santa Marta will check all these boxes and more.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Walking or riding your bicycle around the city’s flat streets is an easy and inexpensive way to keep active. Spending time in the area’s eco-parks is a fabulous way to appreciate the gorgeous scenery while exercising. Banks, pharmacies, grocery store chains, air-conditioned shopping malls, medical care, and beauty shops are scattered around the city and easy to get to either by walking or via public bus system or taxi.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">A couple can rent and live well in Santa Marta for about $1,590 per month.</span></p><span data-dcnode-id="412" instrument_node="">
</span><h2 data-dcnode-id="407"><strong data-dcnode-id="408"><span data-dcnode-id="411" instrument_node="">21. </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/indonesia/canggu-bali/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="410" instrument_node="">Canggu, Bali</span></a></strong></h2><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><img alt="" class="wp-image-703739 aligncenter" data-dcnode-id="405" height="393" loading="lazy" sizes="(max-width: 590px) 100vw, 590px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Canggu-Bali-300x200.jpg&amp;raw" srcset="https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Canggu-Bali-300x200.jpg 300w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Canggu-Bali-150x100.jpg 150w, https://cdn.internationalliving.com/wp-content/uploads/2019/07/Body-Canggu-Bali.jpg 600w" width="590"></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">The island of </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internationalliving.com/countries/indonesia/bali/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="401" instrument_node="">Bali</span></a><span data-dcnode-id="399" instrument_node=""> has enticed many expats to retirement overseas. And, for quite some time, the towns of Sanur, Legian, and Seminyak have been popular choices. But just up the coastline is Canggu and it’s quickly growing in popularity.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Canggu, pronounced “changoo”, is a village located only 9 miles north of the more well-known party resort, Kuta. The western coastal stretch spans about five miles, running from Berawa beach to the village of Cemagi.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">While Canggu is known as the new hotspot in Bali, the population hovers around 40,000. Old-time Bali still exists and appears to be prospering, with locals, tourists and expats, a mix of old and new all merging well.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">As a potential retirement location, Canggu offers a laidback lifestyle, close enough to the bigger town amenities without the hustle and bustle. The international airport is only a one-hour drive away and popular Seminyak only 15 minutes.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">A furnished villa, located in a quiet area and close to one of the beaches, can be rented from $780 a month. Some even come with rice-paddy views and you’re only minutes away from restaurants and cafés.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">A couple can rent and live well in Canggu for about $1,266 per month.</span></p><span data-dcnode-id="382" instrument_node="">
</span><div class="post_snippet_insert" data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">
