		New Zealand is one of the best place to vacation in January. 
Fox Glacier Guiding is an eco-adventure company that offers a series of scenic walks and hikes that get you up close and personal with New Zealand's beautiful glaciers and rainforests. A good way to get started is the "Half Day Walk" which lasts about 4 hours with the bus transport to the glacial valley. The guided walk leads past the river bed to the glacier terminus. Another 30-minute hike uphill leads to the edge of the ice and onto the middle of the glacier where you can enjoy spectacular views. The company provides you with leather boots, crampons and other equipment for the trip. The guides provide a lot of information along the way about the natural surroundings.  Fox Glacier Guiding offers other trips, including heli-hiking, overnight adventures, climbing and more. The company is a 6-hour drive west of Christchurch and 5 hours north of Queenstown.

		Peppers Cradle Mountain Lodge is a spa hideaway located in the Tasmanian wilderness next to the Cradle Mountain/Lake St. Clair National Park in Australia. Enjoy pristine nature, spectacular views, and a choice of outdoor activities.
There are 20 different guided walking tracks around the lakes, ranging from easy to difficult. Activities at the lodge include a ropes course and a native animal slide presentation. In summer, guest can enjoy canoeing, mountain biking and fly fishing, while winter vacation activities include tobogganing and a snow shuttle. You can also sign up for a Tasmanian wine and cheese tasting tour.

</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The hotel spa offers relaxing spa treatments, perfect after a day of outdoor activities. Arrive early to enjoy the beautiful Sanctuary at the spa.  There are 88 guest cabins, ranging from Pencil Pine Cabins to luxurious Spa Suites.  If you are planning a romantic getaway, book a King Billy Suite which has an oversized bathroom with a two person spa and a large deck with a private hot tub. Book between December and February (Tasmanian Summer) for a wider choice of activities and average high temperatures in the 60s degrees Fahrenheit.

		The Fresh Hotel is a luxury hotel in downtown Athens, </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/islands/greece.html" target="_blank"><span data-dcnode-id="833" instrument_node="">Greece</span></a><span data-dcnode-id="831" instrument_node="">. On your vacation to Athens, head to the Air Lounge Roof Bar at the hotel, relax next to the pool, and enjoy the view of the Acropolis from your poolside lounge chair. 
In addition to the roof-top swimming pool with panoramic views of Athens, the spa at the hotel has a sauna, Turkish bath as well as various massage treatments. 
The Fhotel has 124 standard rooms, including 6 executive rooms with private zen gardens and 3 suites. If you are planning a family vacation to Greece, remember to request connecting rooms.

</span></p><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">
The Magenta Restaurant and the elegant Orange Bar serve fresh-from-the-market </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">nouveau grec</span></em><span data-dcnode-id="826" instrument_node=""> cuisine. The roof-top Air Bar serves finger food and cocktails overlooking the Acropolis and the town (from May to September). 
The hotel is located in the heart of Athens, in the business district, just steps away from the old city of Plaka and Monastiraki. There is easy access to Syntagma and Kolonaki and the Omonia Metro station is very close to the hotel. Room rates at the Fresh Hotel start at €125 (+30 210 5248511).

</span><h2 class="sectionMain" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">More Great January Vacation Ideas</span></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span class="sectionTitle" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The Caribbean</span></span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
The Caribbean islands are a beach lover's paradise. Great romantic January vacations include The House in Barbados where you can get a suite overlooking the blue Caribbean sea. Covecastles beach resort in Anguilla has villa accommodations and offers a variety of vacation activities. 

</span></p><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Bahamas is relatively easy to get to and offers several family-friendly vacation resorts. </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/islands/bahamas.html%23slide7"><span data-dcnode-id="663" instrument_node="">Melia Nassau Beach</span></a><span data-dcnode-id="661" instrument_node=""> features a beautiful sandy beach, pools, waterfalls, whirlpools, a kid's pool, and a swim-up bar. Atlantis Paradise Island Resort continues to be a Caribbean family vacation classic, offering something for everyone, including jaw-dropping attractions, pools, spa, restaurants and a choice of accommodations for a range of budgets.

</span></p><p data-dcnode-id="655"><span class="sectionTitle" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Maui and Oahu</span></span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">
January winter vacation ideas in Hawaii include Wailea Beach Villas, stylish beach resorts on Oahu, and more secluded getaways on the Big Island of Hawaii, such as The Fairmont Orchid. 

</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">A sunset from Waikiki Beach is a sight not to be missed on your romantic Hawaii vacation. Enjoy the sunset right from the beach or plan a romantic dinner for two at a beachfront restaurant such as the Surf Room Restaurant at the Royal Hawaiian. If you decide to go for a walk along Kalakaua Avenue which runs parallel to the beach, watch the sunset from the Duke Kahanamoku Statue or Kuhio Beach Park.  Watch the surfers catch the waves just off Waikiki Beach when the sun sets behind the Pacific Ocean. 

</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">It's usually the case that if you rise early on your vacation you can have the place to yourself. This is certainly true when staying on Waikiki Beach. If you enjoy walking on vacation, take a morning stroll down the beach and along Kalakaua Avenue which runs parallel to Waikiki Beach. Most stores will be closed and you'll encounter few people. Places that are crowded during the day will be empty, except for an occasional jogger or surfer. A few places open quite early for breakfast, so that on your way back you can sit down and enjoy a good meal after your walk.

</span></p><p data-dcnode-id="646"><span class="sectionTitle" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Hawaii's Big Island in January</span></span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
Few things will ruin your vacation faster than arriving at the resort of your dreams only to be given the key to a unclean room. Hotels and resorts all around the world understand the fact that guests won't stay in a filthy room and endeavor to do their best to clean every room and public area of their hotel thoroughly. However, in their quest to eradicate dust, stains and germs from all surfaces in the hotel, many hotels are using very harsh chemicals in large quantities. Chemical build-up can also be bad for guests but not many realize it.
 
</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">In Hawaii, the Fairmont Orchid has taken environmentally friendly hotel maintence to a higher level. The housekeeping team has switched to botanical cleansers and disinfectants, while the landscaping team (in charge of the resort's beautiful grounds) has switched to organic methods. At the same time oceanographers are monitoring the health of the coral reef at the resort.

</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The hotel uses Benefect, a Canadian product line developed by Sensible Life Products that surpasses both the Environmental Protection Agency (EPA) and Health Canada requirements for hospital-grade disinfectants.  When you walk through the hotel you won't smell any harsh chemicals but a fresh spring-like aroma from a blend of thyme, clove and lemongrass oils. So when you return from at vacation a the Fairmont Orchid you may not realize it but the hotel's use of botanical cleansers and disinfectants is one more reasons that you will leave feeling relaxed and refreshed. You may decide to switch to natural cleansers in your own home.

</span></p><p data-dcnode-id="636"><span data-dcnode-id="641" instrument_node="">You are reading "Top 20 January Vacations " </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/january_winter_vacations.html"><span data-dcnode-id="640" instrument_node="">Back to Top</span></a><span data-dcnode-id="638" instrument_node="">

</span><p data-dcnode-id="614"><span class="sectionTitle" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Miami</span></span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">

Miami is easy to get to with so many daily flights available, and offers a wide range of things to do: from relaxing on the sand, to spas and nightclubs. If you want to be right in the heart of the famous South Beach, stay at the stylish </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/florida/south-beach.html%23slide8"><span data-dcnode-id="620" instrument_node="">Tides Hotel</span></a><span data-dcnode-id="618" instrument_node="">.  </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/florida_weekend_getaways.html%23slide6"><span data-dcnode-id="617" instrument_node="">The Biltmore Hotel of Coral Gables</span></a><span data-dcnode-id="615" instrument_node=""> is located on 150 acres near Miami, offering golf, spa and poolside luxury.

</span></p><p data-dcnode-id="603"><span class="sectionTitle" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Mexico</span></span><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
Expect to find some great winter deals in Mexico this year and several new hotels. </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/10_Most_Romantic_Beach_Wedding_Destinations.html%23slide15"><span data-dcnode-id="609" instrument_node="">Banyan Tree Mayakoba</span></a><span data-dcnode-id="607" instrument_node=""> is an all-suite getaway with a luxurious spa. </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/romance/mexico_honeymoon.html%23slide5"><span data-dcnode-id="606" instrument_node="">Grand Velas Riviera Maya</span></a><span data-dcnode-id="604" instrument_node=""> offers scenic ocean views from nearly every suite. Set on a private peninsula in Baja California, Palmilla Resort is another great resort in Mexico.



</span></p><p data-dcnode-id="598"><span class="sectionTitle" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Los Angeles</span></span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">

The Mosaic Hotel Beverly Hills is a boutique hotel near Rodeo Drive. The hotel has a heated garden pool where guests can relax in the sun and provides a luxury base for exploring the area. There are 49 guest suites furnished with luxury amenities like the Bose stereo system, Bulgari bath products and 450tc Fili'Doro linens. In addition to high-speed wired and wifi internet access, each room has a wireless keyboard access in case you decide to leave your laptop at home. Choose from rooms facing the quiet garden courtyard or a residential street. Each morning, the hotel delivers a newspaper of your choice. The Sports Activity Center features a Wii fitness area, treadmills and flat screen TVs. If you prefer, the 40,000-foot Equinox fitness complex is available to hotel guests for $30 per day Signature restaurant Hush serves California cuisine for breakfast, lunch or dinner.  
Room rates start at $225 per night.


</span></p><p data-dcnode-id="587"><span class="sectionTitle" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Ski Trips</span></span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">
For ski enthusiasts, there are many excellent options. If you have time, plan a trip to Europe and stay at the </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/christmas_vacations.html%23slide2"><span data-dcnode-id="593" instrument_node="">Cristallo Palace</span></a><span data-dcnode-id="591" instrument_node=""> in Cortina, a famous Italian ski town. In Colorado, </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/best-colorado.html%23slide4"><span data-dcnode-id="590" instrument_node="">The St. Regis Aspen</span></a><span data-dcnode-id="588" instrument_node=""> offers attentive service and a central location. The Sonnenalp Resort of Vail has a European spa and is near 5,000 acres of skiable terrain.

</span></p><p data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">The Woodstock Inn in Vermont is a destination for cross-country skiing fans, offering 75 kilometers of trails. </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/from-new-york-city.html%23slide6"><span data-dcnode-id="585" instrument_node="">Castle Hill Resort</span></a><span data-dcnode-id="583" instrument_node=""> provides access to Okemo Mountain Resort's skiing, snowboarding and snowshoeing.

</span></p><p data-dcnode-id="577"><span class="sectionTitle" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Romantic</span></span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">
Head to the tropics for sunbathing, spas and ocean views. Likuliku in Fiji offers great scuba diving and romantic accommodations. The British Virgin Islands are well known for their powdery white beaches. 

</span></p><p data-dcnode-id="566"><span data-dcnode-id="576" instrument_node="">Romantic inns in California, Vermont, Virginia, New York and other destinations provide a quick winter getaway from the city. Browse getaways by month: </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/december_winter_vacation.html"><span data-dcnode-id="575" instrument_node="">December</span></a><span data-dcnode-id="573" instrument_node="">, </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/february_travel_destinations.html"><span data-dcnode-id="572" instrument_node="">February</span></a><span data-dcnode-id="570" instrument_node=""> and </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/march_vacation_travel.html"><span data-dcnode-id="569" instrument_node="">March</span></a><span data-dcnode-id="567" instrument_node="">.
