</span><div class="propertyListing-description" data-dcnode-id="3298"><span data-dcnode-id="3310" instrument_node="">Experiment a unique stay in that wonderful penthouse with a breathtaking view terrace. It is located in the heart of the historical centre between Forum Place, Constantin thermae and Van Gogh Foundation, it spreads on the 3rd and 4th floors, the top two floors of a storied</span><span class="read-more" data-dcnode-id="3306"><span data-dcnode-id="3309" instrument_node="">… </span><a class="more-link" data-dcnode-id="3307" href="#"><span data-dcnode-id="3308" instrument_node="">+</span></a></span><span data-dcnode-id="3305" instrument_node=""> </span><span class="details" data-dcnode-id="3299" style="display: none;"><span data-dcnode-id="3304" instrument_node=""> building. The apartment is ideally located to visit all the museums, monuments and enjoy the city center its shops and restaurants. The place is a safe haven and luminous. The terrace looks over Arles’ rooftops with an unoverlooked point of view on the frères Prêcheurs church, the Alpilles mountain and the Rhône river. The duplex has been totally renovated and furnished by the interior designer Julie Reilles with a delightful bohemian chic style. The building was constructed on the place of a former civil basilica erected in the 4th century AIR CONDITIONING. A vault of that monument is still perfectly preserved into the wall of the apartment. The surface area is 80 square meters. A beautiful full-equipped kitchen is open on the dining room on 3rd floor. On the same floor, a 2 hosts bedroom has a palace bed and a private bathroom with shower. Toilets are separated an located on 3rd floor also. A second bedroom, the living room and a large terrace are located on the 4th top floor. This second bedroom is made for 2 people and also equipped with a palace bed and a bathroom. You will enjoy nice evenings in the cosy living room. A high-end sofa bed can welcome 2 extra guests. In the prolongation of the living room, a large bay window open directly on the terrace with a stunning panoramic view. You will take advantage of unforgettable dinners on the terrace watching sunset on the city and Camargue. The apartment has a 4K 103 cm width flat screen and a high speed Wifi connection. Phone calls toward landlines and most of mobile phones (USA, Europe, Canada) are included. Towels and sheets are provided. This penthouse is perfect for a stay for 4 people whatever you are artists working in Arles, in family, in couples or with friends ;)</span><span class="read-less" data-dcnode-id="3300"><span data-dcnode-id="3303" instrument_node=""> </span><a class="less-link" data-dcnode-id="3301" href="#"><span data-dcnode-id="3302" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="3297" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="3180"><span data-dcnode-id="3192" instrument_node="">Magnificent five bedroom 1830's spacious family home in Gascony with private swimming pool. This is a charming remote house in peaceful Gascon countryside. This lovely "maison de maître" is a real get-away-from-it-all location, yet only 3kms to the pretty village of Moustey. 5</span><span class="read-more" data-dcnode-id="3188"><span data-dcnode-id="3191" instrument_node="">… </span><a class="more-link" data-dcnode-id="3189" href="#"><span data-dcnode-id="3190" instrument_node="">+</span></a></span><span data-dcnode-id="3187" instrument_node=""> </span><span class="details" data-dcnode-id="3181" style="display: none;"><span data-dcnode-id="3186" instrument_node=""> bedrooms, 3 bathrooms, modern kitchen, dining room with open fireplace, and a large living room with woodburner. Private and securely fenced gardens. Entire place - Have the property to yourself. 5x11m swimming pool. 45 mins to Bordeaux. THE AREA - MOUSTEY, LANDES My house is located in Moustey, Les Landes, Nouvelle-Aquitaine, France. It is a great base for exploring the Parc Naturel Régional des Landes de Gascogne. The beaches of the Atlantic coast and large lakes are less than an hour away. The fantastic vineyards in SW France are a great attraction; Léognan in the Graves area of the Bordeaux county has 6 chateaux and is 44kms from the house. Plenty of activities for groups of friends or families. Swimming (pool, rivers, lakes, and sea), kayaking (local rental), biking/hiking/jogging on forest trails, dog walking, horse riding (local stables very close at end of forest track). Bordeaux city can be reached in under an hour. Immediately on the boundary of the property is the forest which is ideal for hikes and all manner of outdoor activities. The property is located between the Grande Leyre and the Petite Leyre rivers. These small calm rivers are great for kayaking/canoeing (available for rent locally), a paddle or a bracing dip. Plenty of activities for groups of friends or families. Swimming (pool, rivers, lakes, and sea), kayaking (local rental), biking/hiking/jogging on forest trails, hiking, dog walking, horse riding (local stables very close at end of forest track). There are numerous games available in the house including, a whole trunk of board games, badminton set (net plus 6 rackets), table football, and garden lawn darts. Just 45 mins from Bordeaux airport it is easily accessible by plane, train and automobile. The bedrooms &amp; bathrooms Each bedroom and bathroom is named after a local town. The sleeping arrangements are listed below (photos of each room can be found in the Photo Gallery). Bedroom 1 | Mano | Upstairs | 1 Queen Bed | 3 windows | 20m² Bedroom 2 | Ychoux | Upstairs | 1 Queen Bed, 1 Double Bed | 2 windows | 23m² Bedroom 3 | Sabres | Upstairs | 1 Queen Bed, 1 Double Bed | 1 window | 22m² Bedroom 4 | Luxey | Downstairs | 1 Queen Bed | 1 window | 13m² Bedroom 5 | Mimizan | Downstairs | 1 Double Bed | 1 window | 10m² Loft Hallway | Upstairs | 1 Double Sofabed | 1 Window | 20m² Bathroom 1 | Lüe | Upstairs | Shower, Twin Sinks, Toilet | 1 Window | Option to configure as an ensuite for Bedroom 1 - Mano. Bathroom 2 | Lugos | Upstairs | Shower, Sink, Toilet | 1 window Bathroom 3 | Pissos | Downstairs | Accessible for infirm/disabled (see below) Bath, Shower, Sink, Toilet | 1 window | There is the option to configure as an ensuite for Bedroom 5 - Mimizan. Accessibility

</span><div class="propertyListing-description" data-dcnode-id="2945"><span data-dcnode-id="2957" instrument_node="">Le Priolet was originally an 18th century priory built on the banks of the Dordogne river. It has been beautifully converted into a luxury, 4 bedroom villa with a pool, gardens and private access to the river for swimming, fishing and bird watching.. Just 15 minutes east of the</span><span class="read-more" data-dcnode-id="2953"><span data-dcnode-id="2956" instrument_node="">… </span><a class="more-link" data-dcnode-id="2954" href="#"><span data-dcnode-id="2955" instrument_node="">+</span></a></span><span data-dcnode-id="2952" instrument_node=""> </span><span class="details" data-dcnode-id="2946" style="display: none;"><span data-dcnode-id="2951" instrument_node=""> UNESCO World Heritage site of Saint-Émilion, you are surrounded by some of the greatest wine-makers in the world. Le Priolet is a tranquil escape, and the perfect home-base from which to explore the Bordeaux region. The open plan gourmet kitchen and dining area for 6-8 people is warmed by a large stone fireplace, and opens up to a patio and outdoor dining area overlooking the river. You will spend many hours with your coffee/tea or a glass of wine, watching the river drift by. And when the weather is warm, we eat outside every meal. It is not uncommon for swans and other water birds to spend their days in the river by Le Priolet, watching us as we enjoy their presence. The kitchen opens to a large double height living room with a second smaller dining or games table and it's own freestanding fireplace. A bluetooth speaker and drinks cart helps you set the mood. The villa has 4 large bedrooms. The master bedroom is upstairs with a king size bed and ensuite bathroom. There are two bedrooms on the main level, one with a queen sized bed, and the other with two twin beds that can be separate or pushed together for another king size bed. These rooms share a large bathroom adjacent to them. The loft bedroom has a queen size bed and it's own ensuite bathroom. There is also a separate toilet off the living room. Extra sleeping room for 2 can be arranged in the large den with a pull-out sofa and a day bed. Other amenities include, wifi, satellite TV, washer/dryer, ping pong table, bikes, canoes and kayaks. Set your own pace with activities. You can spend your day with a book watching the river go by, or ... - Explore the countryside with our 2 bikes - Castillon-la-Bataille is a 15-20 min ride away along the river. - Swim, fish or kayak in the river (it's perfectly clean)! - Ride horses - there are stables nearby - Play golf at the nearby Grand Saint Emilion Golf Club (designed by Tom Doak) - Visit the markets - there are local markets nearly every day where farmers bring their wares. - Sampling homemade artisanal foie gras and cheeses made locally - Wine tasting &amp; touring the Chateaux - we can help your organize or you can follow your nose - Visit stunningly beautiful St. Emilion and it's famous 12th century monolithic (underground) cathedral. - Touring the historic Bastide towns and Les Plus Beaux Villages de France surrounding the area - Visiting the castles in the nearby Dordogne valley - Visit the magnificent city of Bordeaux - 45 min drive - Go to the beach - amazing Atlantic-facing beaches near Lège-Cap-Ferret are 90 min away - surfing, kite-surfing, and oyster tasting! - Visit the Dune du Pilat - the tallest sand dune in Europe - also 90 min away We can arrange for a private chef, babysitting and more frequent cleaning service - whatever will make your stay more enjoyable.</span><span class="read-less" data-dcnode-id="2947"><span data-dcnode-id="2950" instrument_node=""> </span><a class="less-link" data-dcnode-id="2948" href="#"><span data-dcnode-id="2949" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="2944" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="2424"><span data-dcnode-id="2436" instrument_node="">This is a traditional stone farmhouse in the rolling hills of the Languedoc, just above the Mediterranean. It is more than a holiday rental; it is peaceful retreat for you, your family, and your friends. With five bedrooms and a private, heated pool, the house sleeps ten or more</span><span class="read-more" data-dcnode-id="2432"><span data-dcnode-id="2435" instrument_node="">… </span><a class="more-link" data-dcnode-id="2433" href="#"><span data-dcnode-id="2434" instrument_node="">+</span></a></span><span data-dcnode-id="2431" instrument_node=""> </span><span class="details" data-dcnode-id="2425" style="display: none;"><span data-dcnode-id="2430" instrument_node=""> in comfort and style. A large French farmhouse, the home is renovated with everything you might need for a relaxing and comfortable holiday in the hills of southern France. The garden borders a year-round stream and the house is surrounded by the protected forest, orchards, and mountains of the High Languedoc Natural Park. Just over an hour’s drive from the Mediterranean coast, the house gives you easy access to the sea as well as the rivers, lakes, mountains, and wineries of the Languedoc. The medieval village of Olargues, only a few kilometres away, is officially listed as one of the most beautiful in France. The rustic house is part of a small hamlet of three houses, situated on their own a short drive from the village. Nestled in the hillside, the house and garden are completely private, and the result is a quiet and secluded natural setting. The large stone house can easily sleep ten to twelve people, so it is perfect for big families, extended family get-togethers, or multiple families. With two separate living areas, there is plenty of room for everyone. Three bedrooms downstairs share a large family bathroom. One room has two single beds, one has a super king bed, and one has a traditional, king-sized bed. The first floor features two large master suites, each with a WC and shower. One suite has a double bed, and the other has a super king bed. The two suites are connected by a large salon, which itself has a comfortable sofa bed and two large armchairs--a perfect room for reading or playing games. The house is completely self-catering, but pillows, sheets, and bath towels are provided. The house is easily accessed by air or by road from the UK, with flights available to several airports within an easy two-hour drive: Beziers (75 km), Carcassonne (85 km), Montpellier (135 km), and Toulouse (150 km).</span><span class="read-less" data-dcnode-id="2426"><span data-dcnode-id="2429" instrument_node=""> </span><a class="less-link" data-dcnode-id="2427" href="#"><span data-dcnode-id="2428" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="2423" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="2205"><span data-dcnode-id="2217" instrument_node="">As soon as you set foot in this medieval village perched on a hill above the Mediterranean, you are captivated by the poignancy of its timeless serenity, amidst ramparts and castle ruins, meandering stone walled labyrinthine, covered passageways, alleys of countless stairs</span><span class="read-more" data-dcnode-id="2213"><span data-dcnode-id="2216" instrument_node="">… </span><a class="more-link" data-dcnode-id="2214" href="#"><span data-dcnode-id="2215" instrument_node="">+</span></a></span><span data-dcnode-id="2212" instrument_node=""> </span><span class="details" data-dcnode-id="2206" style="display: none;"><span data-dcnode-id="2211" instrument_node=""> flanked by bougainvillea-covered houses of pink tiled roofs — and flowers everywhere. It has won the national flower prize numerous times, boasting 700 species of plants and flowers. Wherever you come from, you are immediately withdrawn from your world and immersed in the removed tranquility of an ancient environment. In the heart of the village, on the tourist circuit, sits the property, a fully renovated medieval cottage, nestled in an enclave adorned with bougainvillea. On three stories, each of which had to be assembled from separate levels of stone pathways, the cottage has the full comfort of modern living. The living room is on the ground floor, separated from a modern, fully equipped kitchen by a three-foot thick medieval wall and a doorway arch. The master bedroom is on the top floor with a sitting area and a large, aged travertine marble provençal bathroom. The lower floor, accessed charmingly through an exterior stoned stairway, is a separate, romantic studio redone with aged marble tiles, with a queen size bed under a stone arch embedded with miniature dimmable lights, a modern kitchenette and aged marble-tiled bathroom. The patio, surrounded by bougainvillea and ancient walls, is used for outside dining. Stroll up through alleyways to the village square, passing by the twelfth century St. Trophymus church. Or take the tourist circuit amid flowers and flagrances up to the castle from where a stupendous view of the village, the sea and Islands unfolds before your eyes. You can also trek up to the chapel of Notre Dame de Constance, isolated on a 340 meter hilltop dominating a quiet, peaceful view of the valley and the forest du Don. A few kilometers down the hill from the village are delightful beaches, from the private, well-catered C Beach or Cabasson beach, which faces the presidential retreat of the Fort de Brégançon on a peninsula, to the wild beaches of Pellegrin and Estagnol. On the same road from Cabasson are the famous vineyards Domaine Ott, Chateau de Brégançon and Leoub. St. Tropez is 22 miles away. Besides its well known, unique attraction, It has a lively marché on Tuesdays and Saturdays. There is a welcoming package for guests at Madiana with the details of restaurants, beaches and places to visit.</span><span class="read-less" data-dcnode-id="2207"><span data-dcnode-id="2210" instrument_node=""> </span><a class="less-link" data-dcnode-id="2208" href="#"><span data-dcnode-id="2209" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="2204" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="2031"><span data-dcnode-id="2043" instrument_node="">'We had a brilliant time!' Our beaming visitors say Béral is the perfect getaway for adults and for kids. The traditional 18th-century farmhouse in white Quercy stone is matched by the splendour of its private pool, large terrace with ping-pong &amp; barbeque, orchard and</span><span class="read-more" data-dcnode-id="2039"><span data-dcnode-id="2042" instrument_node="">… </span><a class="more-link" data-dcnode-id="2040" href="#"><span data-dcnode-id="2041" instrument_node="">+</span></a></span><span data-dcnode-id="2038" instrument_node=""> </span><span class="details" data-dcnode-id="2032" style="display: none;"><span data-dcnode-id="2037" instrument_node=""> exquisite setting. All has been sensitively restored to be characterful but with modern conveniences. The property is set into the side of a hill, with everything facing south; the terrace, pool and gardens are spread out to give wonderful views over the fields of sunflowers. Inside, the farmhouse has a large main living room, with stone and whitewashed walls, a traditional corner kitchen and a beamed open fireplace. To either side are delightful bedrooms, one with a double bed, the other with a king and a cot if needed. All the rooms have views over the valley. The upstairs bathroom has a hipbath with a shower, and a toilet. Downstairs are two more bedrooms - both with antique floor tiles and two single beds - and a second bathroom. The house has been tastefully restored to retain all its ancient character, but with modern facilities throughout. The house is particularly well laid out for a single family or two families together. But the upper floor is also fantastic for a couple traveling alone. There are too many attractions in the area to suggest more than a few. Among the distinctive villages, Lascabanes has beautiful flowers and a lovely church; Lauzerte, high on a hill, a carefully restored bastide with a remarkable town square and good festivals; Saint-Cirq Lapopie, a 45-minute drive up the Lot, is the most famous village of the area, a medieval town in a spectacular cliffside setting hanging over the river - good restaurants too; Montpezat-de-Quercy has a beautiful arcaded square, and half-timbered houses. Rocamadour is not far away. Figeac is well worth a visit, with its museum to Champollion, who cracked the code of the Rosetta Stone. With the porous limestone prevalent on the causse, there are important caves in the area. The most famous is the huge underground village of Peche Merle, with its prehistoric paintings and traces of early man (up the Célé river from Cahors). The most well-known museums in the area include the Toulouse Lautrec museum in Albi (which also has a wonderful red-brick cathedral), the Musée des Beaux Arts in Agen, and the Musée d'Ingres in Montaubon. There are many other types of museum covering every aspect of Quercy life. Among the cathedrals and abbeys, apart from Albi, you might consider driving to the wonderful abbey at Moissac, which also has a stunning set of well-preserved cloisters. 'I thought I would drop you a line to let you know what a wonderful time my family and I had at Béral. You are truly lucky to own such a beautiful house set in picturesque countryside. We all felt that the improvements you had made complimented the house and were in keeping with its origins. We all felt so relaxed and extremely sad when our week came to an end - no-one wanted to leave. Many, many thanks for letting us experience Béral.' 'We had a brilliant time while we were at Béral. It was the first time we have visited this area and were bowled over. The house was a perfect place to put your feet up and catch up with your reading.... Carol loved the Sunday market at Montcuq. Most of all the boys enjoyed jumping in and out of the pool!'</span><span class="read-less" data-dcnode-id="2033"><span data-dcnode-id="2036" instrument_node=""> </span><a class="less-link" data-dcnode-id="2034" href="#"><span data-dcnode-id="2035" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="2030" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="1972"><span data-dcnode-id="1984" instrument_node="">Standing in a very private location with 25 acres of land around, the farmhouse offers great family friendly facilities including a swimming pool and tennis court, both exclusive to Guests. The location is a few miles north of Cahors, in the Lot département of South West France,</span><span class="read-more" data-dcnode-id="1980"><span data-dcnode-id="1983" instrument_node="">… </span><a class="more-link" data-dcnode-id="1981" href="#"><span data-dcnode-id="1982" instrument_node="">+</span></a></span><span data-dcnode-id="1979" instrument_node=""> </span><span class="details" data-dcnode-id="1973" style="display: none;"><span data-dcnode-id="1978" instrument_node=""> an area of outstanding natural beauty and other attractions. Paris is about 2 hours away by train (TGV to Cahors) or about five hours by road. The nearest major airport is Toulouse, just over an hour to the south or there are flights to the regional airports of Bergerac, Agen and Rodez all about 40 miles away. The house is at the end of a road, so there is no passing traffic, other than possibly the occasional farm vehicle, so Guests should be able to relax and enjoy a peaceful time in the wooded landscape surrounding the house. The house has 4 bedrooms: A master ensuite double, A double or twin room with bathroom, a twin room with shower room and a twin room with bunk beds that also has an adjacent bathroom. The property has internet connected, although as with many in this sparesely populated part of France, linespeeds are not great, and whilst ok for email and social media are unlikely to be very good with high requirement streaming applications. There is a television with DVD player. Besides the court and pool there is a table tennis table and an assortment of other games and books. There is plenty of lawn space for soccer, baseball, cricket etc. Within walking distance is Le Lac Vert, a leisure lake with swimming, fishing, boats, bars and restaurants. The nearest town for shopping is Catus about 3 miles away for everyday needs, or the historic regional centre of Cahors is about 25 minutes by car. It's a great area to visit, with history and prehistory around: There are prehistoric sites close by (Plage de Pterosaurs - Pterosaur's Beach) and the world famous Lascaux cave paintings are around 90 mins away. Cahors and its famous Pont Valente are on the world renowned pilgrim way of St Jacques de Compostela, and there is evidence of Roman activity around the area, quite apart from the numerous villages and towns with many buildings from the 12th and 13th centuries still surviving. Other notable villages and towns to explore include Rocamadour and St Cirq La Popie, cliff side villages in spectacular locations, and a number of villages of 'Les plus beau villages de France' nearby including Lauzerte, Pujols and Domme. Food and drink of great quality will be found everywhere here: The area produces much food and drink, and the famous red wine of Cahors is produced locally with many wineries available for tasting and sales. Restaurant quality is good, and prices usually very reasonable. There are markets somewhere near every day with the freshest of produce and other products available direct from producers. With a strong English expat community in the area, language is rarely a problem, and all nationalities are welcome in this most friendly part of France - those who have experienced Paris are often surprised how warm the welcome is.</span><span class="read-less" data-dcnode-id="1974"><span data-dcnode-id="1977" instrument_node=""> </span><a class="less-link" data-dcnode-id="1975" href="#"><span data-dcnode-id="1976" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1971" instrument_node="">

le and chairs, oak beams, comfortable settee and armchair, large fully equipped kitchen, windows or doors to both sides of the room giving a superb sunny aspect.
To the side you enter: The lounge, which has old oak beams. There are comfortable sofa's, coffee tables, TV with free-view channels and the bookcase and games for those who want them.
A further door leads to: Separate WC with wash hand basin
Fully tiled shower room containing shower cubicle and wash hand basin, large mirror with lights over, washing machine and ironing board.
A wide staircase leads to the: First Floor Landing leading to: Master bedroom with king-size bed, wardrobe, dressing table and bedside tables
Bathroom with shower cubicle, vanity unit and WC
Second large bedroom with king-size bed, chest of drawers, wardrobe and bedside tables
Third double bedroom with 2 single beds, wardrobe, bedside tables
Fourth double bedroom with 2 single beds, wardrobe, bedside tables
Outside Leading from one side of the kitchen/diner is a sunny terrace for al fresco dining. A bbq is available for you to use
Delightful large grassy area to the rear with play equipment for the children

</span><div class="propertyListing-description" data-dcnode-id="1567"><span data-dcnode-id="1579" instrument_node="">A quiet corner, of a quiet corner of France. This is a converted water mill that dates to the 1760s. It is located on the banks of the River Aume, a tributary of the Charente and is surrounded by farmed fields. It is very quiet and very safe. It is suitable for families or</span><span class="read-more" data-dcnode-id="1575"><span data-dcnode-id="1578" instrument_node="">… </span><a class="more-link" data-dcnode-id="1576" href="#"><span data-dcnode-id="1577" instrument_node="">+</span></a></span><span data-dcnode-id="1574" instrument_node=""> </span><span class="details" data-dcnode-id="1568" style="display: none;"><span data-dcnode-id="1573" instrument_node=""> groups of friends. Experience relaxation, privacy and tranquillity in a quiet region of France. The property sleeps 12 in total being 5 double bedrooms (four en-suite) and a room containing bunk beds. On the ground floor there is a large kitchen diner with an AGA, conventional oven, gas and induction hobs, dishwasher and washing machine, coffee machine and microwave. There is a large lounge with a wood burning fire. Sky Freeview is available as is a DVD player and collection of DVDs. There is broadband WiFi which is quick and stable enough to conduct zoom calls. There are patio areas both at the front and rear and a 18th century bread oven which can be used to cook pizza. The home has been well cared for over generations; indeed the property used to belong to the family of President Francois Mitterrand who used to spend his summer break there, landing the presidential helicopter in the garden. The property is situated in sizeable gardens (see the overhead photo) which are perfect for children and pets to play in and for games of badminton, cricket or croquet. There is a pool (which is alarmed) which you can relax beside. A five minute drive is the large village of Aigre which has many amenities such a pharmacy, bakery, butcher, beautician, public transport links, supermarket, restaurants and post office. Further afield are Cognac (where the famous brandy is made), Saintes (Roman capital of the province of Aquitania) La Rochelle (seafood) and the Isle de Re (beaches). For cyclists the region is criss-crossed with cycle routes, indeed route 33 starts and ends in Aigre. For equestrians and walkers the Pilgrim’s route to Santiago de Compostela can be ridden or walked. Budget airlines fly to airports at Bordeaux, Poitiers, La Rochelle and Limoges. The journey time from Calais is 7 hours on quiet French motorways, though the ports in Normandy and Brittany are closer. The TGV stops at Angouleme which is on the fast line between Paris and Bordeaux. Paris is approximately 90 minutes on the TGV making it a viable day trip.</span><span class="read-less" data-dcnode-id="1569"><span data-dcnode-id="1572" instrument_node=""> </span><a class="less-link" data-dcnode-id="1570" href="#"><span data-dcnode-id="1571" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1566" instrument_node="">

A wing of the manor remains at the disposal of the owners. The cottage for 7 people: A renovated 18th century charming cottage surrounded by the garden and the fields with on the ground floor large living and dining, large old fireplace, a bar with a full equipped kitchen. On the first floor 3 large rooms with 2 queen size beds and 3 single beds. 2 bathrooms equipped with shower or bathtub, wash-hand basin, WC, wood floor in bamboo. Patios with tables are available. Around:

</span><div class="propertyListing-description" data-dcnode-id="1392"><span data-dcnode-id="1404" instrument_node="">Just 10 km from St Remy de Provence and Avignon, this traditional Mas just outside the historical village of Noves has been beautifully restored and now consists of 380sqm of luxury living space. It has recently been decorated and is spacious enough to comfortably host up to 8</span><span class="read-more" data-dcnode-id="1400"><span data-dcnode-id="1403" instrument_node="">… </span><a class="more-link" data-dcnode-id="1401" href="#"><span data-dcnode-id="1402" instrument_node="">+</span></a></span><span data-dcnode-id="1399" instrument_node=""> </span><span class="details" data-dcnode-id="1393" style="display: none;"><span data-dcnode-id="1398" instrument_node=""> persons. The property is surrounded by fruit plantations and therefore you will not be bothered by neighbors. The domain has a park of 6000 sqm with palm trees and oleanders, it's completely surrounded by a brick wall providing maximum privacy and security. There is a large 6x12 heated swimming pool, a pool house and a fully equipped summer kitchen with a Barbecue. About the Villa:
The Villa is blessed to be centrally located amongst the most famous sites and scenes of the Provence; all of these treasures are within a radius of just 40 kilometers. The protected heritage of the Provence, its cities such as Avignon, the city of the Popes; the world heritage UNESCO-listed Theater and Arc de Triomphe of Orange; the delightful St-Remy-de-Provence resting at the foot of Massif Les Alpilles; Beaux-de-Provence, one of France’s ‘plus beaux village’; Vincent van Gogh's Arles, the Pont-du-Gard another UNESCO- listed site; Nimês with its famous Roman arena portrayed in the film 'The Gladiator'; the fashionable Aix-en-Provence; the National Parc of Luberon boasting stunning landscape views from Gordes, Bonnieux, LaCoste and Oppede-les-Vieux; the lavender fields ofAbbaye de Sénanque, and the ochre of Roussillon; the breathtaking Nesque river canyons, situated between Villes-sur-Auzon and Montieux; the Mont Ventoux, the highest mountain of the Provence; the medieval and Roman city of Vaison-la-Romaine; the vineyards and cru's of Chateauneuf-du-Pape, Vacqueyras, Beaume-de-Venise and Gigondas; the National Parc and nature reservation of the Camargue and the sandy beaches of Saintes-Maries-de-la-Mer.... Just to name a few, are all within a stone's throw from the property.</span><span class="read-less" data-dcnode-id="1394"><span data-dcnode-id="1397" instrument_node=""> </span><a class="less-link" data-dcnode-id="1395" href="#"><span data-dcnode-id="1396" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1391" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="1229"><span data-dcnode-id="1241" instrument_node="">Our 2-bedroom house is in a charming village which sits on the River Yonne and Canal du Nivernais in rural Burgundy. The interior has been kept faithful to the style and decor of the prior owner, an old Frenchwoman. Fast wifi internet is available in the house. It features two</span><span class="read-more" data-dcnode-id="1237"><span data-dcnode-id="1240" instrument_node="">… </span><a class="more-link" data-dcnode-id="1238" href="#"><span data-dcnode-id="1239" instrument_node="">+</span></a></span><span data-dcnode-id="1236" instrument_node=""> </span><span class="details" data-dcnode-id="1230" style="display: none;"><span data-dcnode-id="1235" instrument_node=""> good-sized double bedrooms, a large dining room, a sitting room and a small kitchen. The bathroom has a shower, toilet and illuminated vanity/sink. Towels and washers are provided, and the cleaning costs are included in the price. The village is very well appointed for its size with amenities including a tiny but comprehensive supermarket, a superb boulangerie (bakery), cafe/bar, restaurant, pharmacy, hairdresser, service (gas) station, marina on the canal and more. The village is overlooked by a lovely old church which has a 9th century crypt. The neighbours are friendly, and the rural nature of the area makes driving easy. Don't miss the Thursday morning markets in the main square, or for larger shopping needs, Avallon and Auxerre are just 26km (16 miles) and 37km (23 miles) respectively. Or catch a train to Clamecy (17km). The village has a railway station (Corbigny line) which is 1km (0.62 miles) from the house - a 10-12 minute walk. We recommend drives in the country; walks or bike rides along the canal tow paths; fishing in the river and canal; visiting vineyards; chateaux and abbeys, sampling the delicious local cuisine and wines, and browsing in antique stores or even at various village flea markets (vide-greniers) in summer. Buy fresh bread, croissants and delicacies every day from the bakery, and on Wednesday (when it's closed), have a croque monsieur and a coffee at the cafe/bar in the main square while watching the world go by. Vezelay is a UNESCO heritage-listed village just 15km (9 miles) away, and the Caves of Arcy-sur-Cure are just 18km (11 miles) away. The wine growing area of Chablis is about 40km away - the whites are superb. Even if you don't book with us, you can use our Facebook page to help plan your visit to the region. In Photos, there are Albums covering the house, village and some ideas for day trips and excursions. Https://www.Facebook.Com/Holiday-Home-Burgundy-France-105361821222071</span><span class="read-less" data-dcnode-id="1231"><span data-dcnode-id="1234" instrument_node=""> </span><a class="less-link" data-dcnode-id="1232" href="#"><span data-dcnode-id="1233" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1228" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="570"><span data-dcnode-id="582" instrument_node="">Our chalet sites at 1100m, perched on the side of a mountain with stunning views across to the Three Valleys and even a glimpse of Mont Blanc. The chalet is on a small private road and has plenty of parking. The main roads and the private road are always cleared of snow each day</span><span class="read-more" data-dcnode-id="578"><span data-dcnode-id="581" instrument_node="">… </span><a class="more-link" data-dcnode-id="579" href="#"><span data-dcnode-id="580" instrument_node="">+</span></a></span><span data-dcnode-id="577" instrument_node=""> </span><span class="details" data-dcnode-id="571" style="display: none;"><span data-dcnode-id="576" instrument_node=""> and driving in the area is safe.
The ground floor is a 2 Bedroom apartment which is fully self contained and encompasses the entire floor of around 60m2. 2 large double bedrooms with plenty of wardrobe space, bathroom with bath and shower. Large fully fitted kitchen with utility room containing a washer and dryer, all cooking utensils are included as is a dishwasher, microwave, full oven and hob.
Living room with dining area complete with wood burner, beamed vaulted ceiling and plenty of light thanks to large windows.
Outside has a large decking area in front of the living area, large terrace across the front of the bedroom area, large patio area and garden all south facing with great views. The terraces and garden are yours to explore.
Amazing views at any time of year. Snow capped mountains and forest all around. Many walking routes and cycle trails that are all well signposted and easy to explore. The area is renowned for cycling with the Tour De France passing through. Motorcyclists love the area and it is popular with bikers and classic car drivers in summer. We have 13 "switchbacks" on our road ! Doucy Combelouviere ski station is just a 2km drive away and roads are always clear. The chalet sits at 1100m and the ski station at 1250m. From Doucy you can take a chair lift up and change to a drag lift (new chair lift coming 2021) to the top of the Grand Domain ski area. Links then to Valmorel and St Francois Longchamp with 165km of pistes.
For further skiing, the 3 Valleys ski area is accessible via gondola from Bride les Bains which is a 20 minute drive away. This gives a further 650km of pistes and the world famous Courchavel and Meribel.
La Lechere is a short drive down the mountain and has a famous thermal spa.
Local shopping in Aigublanche and larger shops in Moutiers and Albertville. There is a train station in Moutiers that links to Lyon and Geneva. We are happy to collect you from there but a car is recommended for your stay.
The apartment includes all linen and towels. Anything else you need to make your stay special can be provided upon request.
If you have any queries please don't hesitate to contact us</span><span class="read-less" data-dcnode-id="572"><span data-dcnode-id="575" instrument_node=""> </span><a class="less-link" data-dcnode-id="573" href="#"><span data-dcnode-id="574" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="569" instrument_node="">
