</span><div class="propertyListing-description" data-dcnode-id="1682"><span data-dcnode-id="1694" instrument_node="">Welcome to your large, comfortable, home away from home, nestled among the evergreens of The Knoll in Silver Star Resort. We welcome guests from all over the world by offering a truly relaxing holiday environment with all the mod cons our guests expect. Truly ski in/ski out home</span><span class="read-more" data-dcnode-id="1690"><span data-dcnode-id="1693" instrument_node="">… </span><a class="more-link" data-dcnode-id="1691" href="#"><span data-dcnode-id="1692" instrument_node="">+</span></a></span><span data-dcnode-id="1689" instrument_node=""> </span><span class="details" data-dcnode-id="1683" style="display: none;"><span data-dcnode-id="1688" instrument_node=""> via the Silver Queen Quad Chair with fabulous views of the mountain and chairlifts, easy access to nordic trails, snowshoeing and Tube Town and only a short walk or 3 minute shuttle bus ride from the main village. This is a spacious home offering 3 large double bedrooms (one en suite) in the main house and another double bedroom in the connecting downstairs suite. All the bedrooms are spacious and comfortable with cozy bedding, plenty of storage and black out blinds to ensure restful sleep. Three living rooms allow plenty of space for larger groups and the main living room boasts a gas fireplace. The second living room can be converted easily to an additional bedroom and is adjacent to a bathroom. Two fully equipped kitchens make for easy catering, with 2 dining areas seating 10 and 6 people respectively. A total of four bathrooms ensure there are no long queues at busy times of day. Entertainment is provided via 3 flat screen, HDMI enabled TVs, a Blu Ray player and 2 DVD players. Free wi-fi is also on offer. We also have a selection of board games and books. Heated floors add a touch of comfort after a long day on the mountain and all rooms have individual thermostats. Fancy a dip in the private hot tub. It is conveniently located on the covered deck, 2 steps from the kitchen door, so you never need to clear away the snow. The deck also has a high end, large gas barbeque. There is parking for up to 6 cars on two driveways. Two spacious entryways provide both exterior secure ski lockers and interior storage for boots, helmets, jackets etc. We have guests who return year after year and we are more than happy to share their feedback on the house. Silver Star Mountain Resort is open from November to April for winter sports and July to September for hiking, biking, and wine and beer festivals. It is conveniently located 20 minutes from Vernon.</span><span class="read-less" data-dcnode-id="1684"><span data-dcnode-id="1687" instrument_node=""> </span><a class="less-link" data-dcnode-id="1685" href="#"><span data-dcnode-id="1686" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1681" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="1260"><span data-dcnode-id="1272" instrument_node="">The view from here is - "just stunning but wait until you see the pool..." ... Villa is - "simply beautiful " Two comments form guests in August 2016 Villa is for sure, a really special property for both friends and families to enjoy. Tucked away on the sleepy hillside of</span><span class="read-more" data-dcnode-id="1268"><span data-dcnode-id="1271" instrument_node="">… </span><a class="more-link" data-dcnode-id="1269" href="#"><span data-dcnode-id="1270" instrument_node="">+</span></a></span><span data-dcnode-id="1267" instrument_node=""> </span><span class="details" data-dcnode-id="1261" style="display: none;"><span data-dcnode-id="1266" instrument_node=""> Castiglion Fiorentino and where guests can make this their "home from home" - The property welcomed its first guests in May 2016, - The villa is set within an olive grove where the visible ruins of an ancient defence castle of Castiglion Fiorentino can be explored and enjoyed.
Adjacent to the larger villa is a (deconsecrated) church from the 12th century which has also being restored. The Villa and its annex provide three bedrooms, three bathrooms, modern kitchens, 2 sitting rooms, a vast terrace with some of the loveliest views of the valley and the town of Castiglion along with the private Infinity Edge pool - strategically situated to enjoy the fabulous views.
It is about 3 km from the town, where there are many restaurants, bars and shops and, there is also small shop,bar and restaurant just across the valley if you did not want to travel into the town, Much like the other villas here, this is also a good location - an excellent base to explore Tuscany its many hill towns, festivals, wineries and countryside including easy easy day trips to Cortona, Pienza, Montepulciano, Siena etc - Florence is also easy by either car (1 hour) or by train from our local station. This is one of our first reviews from May 2016.
A first review says: “The houses are surrounded by a beautiful old olive grove. There are two terraces overlooking the valley and a very nice infinity swimming pool. The view is breathtaking. I have been in this valley before but the view here beats everything. There is a small terrace in the back to catch the early morning sun. The large (Giant) terraces in the front catch the sun from 10 am to sunset. For people like me who love to read in the shade : plenty of shade available under the surrounding trees. The olive groves around the houses are actually grassy meadows, ideal for children's play. In the woods on top of the hill behind the house lie the remains of a 13 th century castle. You have to drive up a drivable access road from the valley floor to reach this house. The next and only other house is 100 m down. The road continues up the hill for another 1.6 km, winding through beautiful olive groves and forests, offering breathtaking views. Then then for easy hiking, road changes into a hiking trail that joins the hiking trail that circumvent the valley. We were the first occupants in a newly developed property. We were two couples and stayed a week in May 2016. The property consist of two houses. The smaller one , just a few meters away, has one bedroom, with a king size bed, bathroom and a living space with kitchen. Tho main house has two bedrooms, with king size bed and the other with two single beds. The main house has two bathrooms. A dining room, sitting room and separate kitchen. Hendrik, NL. Also in the area are tennis courts, horse riding and , now the new Golf Course at Cortona -</span><span class="read-less" data-dcnode-id="1262"><span data-dcnode-id="1265" instrument_node=""> </span><a class="less-link" data-dcnode-id="1263" href="#"><span data-dcnode-id="1264" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1259" instrument_node="">
