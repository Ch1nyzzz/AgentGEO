</span><div class="location-description" data-dcnode-id="4279"><span data-dcnode-id="4293" instrument_node="">

</span><div class="resource" data-dcnode-id="4255"><span data-dcnode-id="4276" instrument_node="">It can sometimes be hard to find Florida accommodations that will accept pets but not anymore. With the help of Owner Direct Vacation Rentals software, our system helps you search for all available Florida vacation rentals that will accept pets during your specified dates. We have many pet friendly lodging options to choose from such as those in </span><a data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ownerdirect.com/pet-friendly-vacation-rentals/clearwater-beach" id="complexID0"><span data-dcnode-id="4275" instrument_node="">Clearwater Beach</span></a><span data-dcnode-id="4273" instrument_node="">, </span><a data-dcnode-id="4271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ownerdirect.com/pet-friendly-vacation-rentals/dania-beach" id="complexID1"><span data-dcnode-id="4272" instrument_node="">Dania Beach</span></a><span data-dcnode-id="4270" instrument_node="">, </span><a data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ownerdirect.com/pet-friendly-vacation-rentals/disney-world-central-florida" id="complexID2"><span data-dcnode-id="4269" instrument_node="">Disney World Orlando Florida</span></a><span data-dcnode-id="4267" instrument_node="">, </span><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ownerdirect.com/pet-friendly-vacation-rentals/east-central-florida" id="complexID3"><span data-dcnode-id="4266" instrument_node="">East Central Florida</span></a><span data-dcnode-id="4264" instrument_node="">, </span><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ownerdirect.com/pet-friendly-vacation-rentals/hollywood-beach" id="complexID4"><span data-dcnode-id="4263" instrument_node="">Hollywood Beach</span></a><span data-dcnode-id="4261" instrument_node="">. As each owner sets their own pet policy, there are many owners that do allow dogs, cats and even other critters to stay at their vacation rental home in Florida.
	</span><br data-dcnode-id="4260"><br data-dcnode-id="4259"><span data-dcnode-id="4258" instrument_node="">
	We have 80 pet friendly vacation rentals in Florida resorts. For your next holiday or vacation, consider bringing your pet and staying at a vacation rental. From condos to villas to homes, there is an accommodation option for every type of group. Owner Direct's friendly and responsive customer service and detailed website can make finding that perfect pet friendly rental a breeze.

 Dedicated concierge desk to assist you with dinner reservations or pre-purchase tickets to any attractions.( save queuing at the gate!) is on site where multilingual staff can offer advice based on their extensive local knowledge. Pamper yourself in the Regal Palms health beauty and fitness centre offering wide range of beauty treatments including facials, specialized nail care, make-up artistry and massage therapies on site. With brand new flat screen TV's in all the rooms along with new carpets throughout , bask in the comfort and convenience of staying in a home close to the clubhouse and pool and walking distance from the nearest shopping centre. The resort fee of $20(+tax)/day/household charged by the Resort to access the club facilities is already included in our price. This includes unlimited access to the pools, water slide, lazy river, hot tub, gym, sand volleyball court, children's play area, outdoor hot tubs, steam room, sauna, fitness center, daily pool towels etc. Please do not pay this when you check in. Pets up to a maximum of 10 kg each are allowed. A one-off fee of $150 is charged. A maximum of 2 pets are allowed at any one time. Please contact me if your requirements are different from these stated. Pets must be house - trained and are not allowed on furniture or in beds. Please dispose of any waste from your pets in the home and in community. Please clean up any hairs or any other wastes from your pets prior to your departure. Please bring your own waste bags and bowls as these are not provided. As per community rules, pets are to be always kept on their leash. Any violations of these pet rules could result in loss of your security deposit. For guests without pets we do use professional cleaners but cannot guarantee absolute allergen - free.</span><span class="read-less" data-dcnode-id="3154"><span data-dcnode-id="3157" instrument_node=""> </span><a class="less-link" data-dcnode-id="3155" href="#"><span data-dcnode-id="3156" instrument_node="">re ou'll find a great area for sunbathing, relaxing, dining, and relax and soak up the Florida sun in a hammock fit for 2. The landscaping was just completed in October 2020 and a bocce ball court, putting green. You'll also find a flagstone patio with a gas fire pit and BBQ surrounded by Adirondack chairs where you can roast hot dogs and marshmallows. We have chairs, toys, and towels specifically for the beach as well as fishing poles. An outside shower is available at the house so you can rinse off and feel more comfortable. There's an outside shower to rinse off after a glorious day at the beach.There are also outside stairs to take straight up to the deck to catch the last rays. The max occupancy per city regulations is 8 people over the age of 24 months--children under 24 months are not counted in that maximum and are welcome.</span><span class="read-less" data-dcnode-id="1894"><span data-dcnode-id="1897" instrument_node=""> </span><a class="less-link" data-dcnode-id="1895" href="#"><span data-dcnode-id="1896" instrument_node="">read less</span></a></span></span></div><span data-dcnode-id="1891" instrument_node="">

</span><div class="propertyListing-description" data-dcnode-id="1774"><span data-dcnode-id="1786" instrument_node="">VACATION AT THE BEACH WITH ALL THE COMFORTS OF HOME!!! Our condo unit is a DIRECT OCEANFRONT spacious 2 bedroom/2 bath second floor unit. Watch the sunrise from the LARGE PRIVATE OCEANFRONT BALCONY in this very comfortable condo. As soon as you walk in you will feel relaxed.</span><span class="read-more" data-dcnode-id="1782"><span data-dcnode-id="1785" instrument_node="">… </span><a class="more-link" data-dcnode-id="1783" href="#"><span data-dcnode-id="1784" instrument_node="">+</span></a></span><span data-dcnode-id="1781" instrument_node=""> </span><span class="details" data-dcnode-id="1775" style="display: none;"><span data-dcnode-id="1780" instrument_node=""> This unit is a direct oceanfront unit offering a beautiful view of the beach and beach-side pool directly below from the living room and master bedroom. The beach is just footsteps away from the condo which is located directly on the NO DRIVE ZONE portion of Daytona beach. The Sea Fern condominium is located on a small peninsula of land between the Atlantic Ocean and the Halifax River on South Atlantic Ave., Daytona Beach shores. We rent by the WEEK (SATURDAY to SATURDAY) and your rental period can extend multiple weeks or months depending on availability. Our rental periods go from Saturday to Saturday, however you are welcome to stay anytime within the rental period if you decide you want to stay less than the full rental period. This is not your typical small 2 bedroom condo you'll find elsewhere in Daytona Beach. This SPACIOUS condo (over 1400 sq-ft) has 2 full baths, living room, separate dining area, a FULL KITCHEN, and a full size WASHER and DRYER. The large master suite has a QUEEN BED and en suite private master bathroom with walk-in shower with floor to ceiling sliding glass doors that open to the oceanfront balcony, for an amazing oceanfront view. The second bedroom contains TWO TWIN BEDS with its own full size bathroom in the hall. The unit has a QUEEN SLEEPER SOFA-BED allowing the unit to comfortably accommodate 6 people. We can provide an additional Queen or twin air mattress on request. Our condo units are DOG FRIENDLY!! We are happy to allow our guest's canine companions to stay with them on their vacation. Up to two, well behaved, non-aggressive, housebroken dogs (12 months of age or older, no puppies) are welcome to accompany our guests during their stay with us. We do not permit cats (due to family allergies) or any other pets. We provide an ELECTRIC GRILL for your grilling pleasure on our large, private, oceanfront balcony. We have a ROKU HDTV in the living room providing you almost unlimited streaming content at your fingertips in addition to traditional digital cable service. We provide free access to NETFLIX as well as several other streaming channels giving you access to hours of ON DEMAND entertainment when your not out enjoying the beach. Digital cable HDTV is provided in the living room and both bedrooms with a DVD player in the living room. FREE LOCAL AND LONG DISTANCE CALLS within the United States, Canada, and Puerto Rico. FREE HIGH-SPEED WIRELESS INTERNET (WiFi). Our condo includes ALL THE COMFORTS OF HOME, as it is FULLY EQUIPPED with EVERYTHING you need from silverware, to linens, to beach chairs and towels. We even provide you your initial soap, paper towels, toilet paper, detergent, and dryer sheets so that you can start relaxing as soon as you walk in the door. A RESERVED COVERED PARKING SPACE is provided. There is additional parking in front of the building for your guests. The 2nd floor unit is level with the parking in front of the building and only a quick walk or elevator ride down one floor to the beach. There is an OCEANFRONT POOL with adjacent sunning deck.</span><span class="read-less" data-dcnode-id="1776"><span data-dcnode-id="1779" instrument_node=""> </span><a class="less-link" data-dcnode-id="1777" href=
