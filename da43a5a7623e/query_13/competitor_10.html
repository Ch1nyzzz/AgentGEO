</span><main class="main" data-dcnode-id="681" id="main"><span data-dcnode-id="1081" instrument_node="">
</span><article class="post-32148 post type-post status-publish format-standard has-post-thumbnail hentry category-roundup category-travel tag-austin-family-events tag-central-texas-resorts tag-do512-family tag-great-wolf-lodge tag-hill-country tag-homepage tag-hyatt tag-kid-friendly tag-lost-pines tag-omni-barton-creek tag-spring-break tag-summer-travel" data-dcnode-id="683" id="post-32148"><span data-dcnode-id="1080" instrument_node="">
</span><section class="post-content" data-dcnode-id="816"><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1078" instrument_node="">Want to book a getaway with the kids? Central Texas boasts some amazing resorts with children’s amenities out the wazoo — lazy rivers, water slides, s’mores by the fire, day camp activities, horse rides, and much more. Below is a little list of some favorite nearby resorts that are within an easy drive from Austin, but where you’ll also feel miles and miles away from it all.</span><i data-dcnode-id="1077"></i></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Family Friendly Resorts Near Austin</span></strong></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1070" instrument_node="">—</span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lakewayresortandspa.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1069" instrument_node=""> Lakeway Resort and Spa</span></a><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
</span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Lake Travis, TX</span></em><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
Lakeway Resort and Spa is approximately 18 miles northwest of downtown Austin on the shores of beautiful Lake Travis. Amenities include sailing, boating, fishing and water activities, a boutique spa, a Kids Zone recreation center, a pool playground featuring with a water slide as well as an adult-only pool with a swim-up bar. This resort also offers day camp programs for the kids. Learn more at </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lakewayresortandspa.com/" rel="noopener noreferrer" tabindex="-1" target="_blank"><span data-dcnode-id="1061" instrument_node="">lakewayresortandspa.com</span></a><span data-dcnode-id="1059" instrument_node="">. </span><em data-dcnode-id="1052"><span data-dcnode-id="1058" instrument_node="">You can also </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/family-staycation-lakeway-resort-spa/"><span data-dcnode-id="1057" instrument_node="">click here</span></a><span data-dcnode-id="1055" instrument_node=""> to read our review.</span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
</span></em></p><span data-dcnode-id="1050" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1045" id="attachment_44120" style="width: 806px"><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/wp-content/uploads/2016/02/lakeway-resort-and-spa-austin-kids-pool-fountains.jpg" title="fun kid’s pool playground – photo from the Lakeway Resort’s Facebook page"><img alt="" aria-describedby="caption-attachment-44120" class="wp-image-44120 size-full" data-dcnode-id="1049" height="484" loading="lazy" sizes="(max-width: 796px) 100vw, 796px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/wp-content/uploads/2016/02/lakeway-resort-and-spa-austin-kids-pool-fountains.jpg&amp;raw" srcset="https://do512family.com/wp-content/uploads/2016/02/lakeway-resort-and-spa-austin-kids-pool-fountains.jpg 796w, https://do512family.com/wp-content/uploads/2016/02/lakeway-resort-and-spa-austin-kids-pool-fountains-300x182.jpg 300w, https://do512family.com/wp-content/uploads/2016/02/lakeway-resort-and-spa-austin-kids-pool-fountains-768x467.jpg 768w" width="796"></a><p class="wp-caption-text" data-dcnode-id="1046" id="caption-attachment-44120"><span data-dcnode-id="1047" instrument_node="">fun kid’s pool playground – photo from the Lakeway Resort’s Facebook page</span></p></div><span data-dcnode-id="1044" instrument_node="">
</span><hr data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1041" instrument_node="">— </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hsbresort.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1040" instrument_node="">Horseshoe Bay Resort</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
</span></a><em data-dcnode-id="1033"><span data-dcnode-id="1036" instrument_node="">Horseshoe Bay on Lake LBJ</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
</span></em><span data-dcnode-id="1032" instrument_node="">In the heart of the Texas Hill Country, Horseshoe Bay Resort overlooks Lake LBJ with its blue waters and hillside vistas. The resort offers a variety of indoor and outdoor venues, plus a wide range of activities for all ages and interests: golf courses, water sports, a dining yacht, pools, spa. mini-arcade, tropical birds, giant lawn games, and a little sandy beach area for kids to play. Learn more at </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hsbresort.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1031" instrument_node="">hsbresort.com</span></a><span data-dcnode-id="1029" instrument_node="">. Read about their COVID-19 FAQs </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsbresort.com/covid-19-faqs"><span data-dcnode-id="1028" instrument_node="">here</span></a><span data-dcnode-id="1026" instrument_node="">.</span><em data-dcnode-id="1019"><span data-dcnode-id="1025" instrument_node=""> You can also </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/fun-family-getaway-at-horseshoe-bay-resort/"><span data-dcnode-id="1024" instrument_node="">click here</span></a><span data-dcnode-id="1022" instrument_node=""> to read our review.</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
</span></em></p><span data-dcnode-id="1017" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1012" id="attachment_44119" style="width: 968px"><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/wp-content/uploads/2016/02/horseshoebay2.jpg" title="surrounded by great lake views – Photo from Horseshoe Bay Resort’s Facebook page"><img alt="" aria-describedby="caption-attachment-44119" class="wp-image-44119 size-full" data-dcnode-id="1016" height="657" loading="lazy" sizes="(max-width: 958px) 100vw, 958px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/wp-content/uploads/2016/02/horseshoebay2.jpg&amp;raw" srcset="https://do512family.com/wp-content/uploads/2016/02/horseshoebay2.jpg 958w, https://do512family.com/wp-content/uploads/2016/02/horseshoebay2-300x206.jpg 300w, https://do512family.com/wp-content/uploads/2016/02/horseshoebay2-768x527.jpg 768w" width="958"></a><p class="wp-caption-text" data-dcnode-id="1013" id="caption-attachment-44119"><span data-dcnode-id="1014" instrument_node="">surrounded by great lake views – Photo from Horseshoe Bay Resort’s Facebook page</span></p></div><span data-dcnode-id="1011" instrument_node="">
</span><hr data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="1008" instrument_node="">— </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hyatt.com/en-US/hotel/texas/hyatt-regency-lost-pines-resort-and-spa/auslp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1007" instrument_node="">Hyatt Regency Lost Pines Resort &amp; Spa</span></a><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
</span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Bastrop, TX</span></em><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
Nestled in 405-acres of picturesque wilderness, the Hyatt Regency Lost Pines Resort and Spa boasts championship golf, tennis, a fitness center, a world-class spa, youth spa for kids, horseback riding, archery, trap shooting, lots of river recreation programs from kayaking to rafting, and much more. The onsite water park features a two-story water slide with beach area, lazy river, pools, hot tubs, waterfalls and fountains for splashing fun. For more information visit </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hyatt.com/en-US/hotel/texas/hyatt-regency-lost-pines-resort-and-spa/auslp"><span data-dcnode-id="999" instrument_node="">www.hyatt.com</span></a><span data-dcnode-id="997" instrument_node="">. </span><em data-dcnode-id="991"><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//do512family.com/hyatt-lost-pines-review/"><span data-dcnode-id="996" instrument_node="">Click here</span></a><span data-dcnode-id="994" instrument_node=""> to read about our stay at the Lost Pines.</span><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">
</span></em></p><span data-dcnode-id="989" instrument_node="">
