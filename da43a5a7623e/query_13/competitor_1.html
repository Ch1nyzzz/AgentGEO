iginal-srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-696x478.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-300x206.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-768x528.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-218x150.jpg 218w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-611x420.jpg 611w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min-100x70.jpg 100w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/JR-UTFAD_3_Chris-Gotshall-min.jpg 774w"></a><figcaption class="wp-caption-text" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Credit: Chris Gotshall for Atlantis Paradise Island</span></figcaption></figure></div><div class="mailmunch-forms-before-post" data-dcnode-id="1194" style="display: none !important;"></div><p data-dcnode-id="1187"><span data-dcnode-id="1189" style="font-weight: 400;"><span data-dcnode-id="1193" instrument_node="">After the years that 2021 and 2020 were, everyone could use a </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/category/travel/"><span data-dcnode-id="1192" instrument_node="">well-deserved vacation</span></a><span data-dcnode-id="1190" instrument_node="">. Escape to one of these tropical family friendly resorts that have something to offer hotel guests of all ages. </span></span><span data-dcnode-id="1188" id="more-4816"></span></p><span data-dcnode-id="1186" instrument_node="">
</span><h2 data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">Atlantis Paradise Island, </span><i data-dcnode-id="1182"><span data-dcnode-id="1183" style="font-weight: 400;"><span data-dcnode-id="1184" instrument_node="">The Bahamas</span></span></i></h2><span data-dcnode-id="1180" instrument_node="">
</span><figure aria-describedby="caption-attachment-4819" class="wp-caption alignnone" data-dcnode-id="1176" id="attachment_4819" style="width: 1396px"><img alt="Atlantis Resort Kayaking" class="wp-image-4819 size-full td-animation-stack-type0-2" data-dcnode-id="1179" height="1000" sizes="(max-width: 1396px) 100vw, 1396px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins.jpg 1396w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-300x215.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-1024x734.jpg 1024w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-768x550.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-696x499.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-1068x765.jpg 1068w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kayak-Dolphins-586x420.jpg 586w" width="1396"><figcaption class="wp-caption-text" data-dcnode-id="1177" id="caption-attachment-4819"><span data-dcnode-id="1178" instrument_node="">Courtesy of Nassau Paradise Island Promotion Board</span></figcaption></figure><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1173" style="font-weight: 400;"><span data-dcnode-id="1174" instrument_node="">The world’s most remarkable resort destination, </span></span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlantisbahamas.com/"><span data-dcnode-id="1171" style="font-weight: 400;"><span data-dcnode-id="1172" instrument_node="">Atlantis Paradise Island</span></span></a><span data-dcnode-id="1168" style="font-weight: 400;"><span data-dcnode-id="1169" instrument_node="">, is a lush, oceanside resort escape in The Bahamas. The perfect family getaway happens on property where newly created guest experiences will surely bring the family closer together.&nbsp;</span></span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1157"><br data-dcnode-id="1164"><span data-dcnode-id="1163" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9396499633916931" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5756697283" data-dcnode-id="1162" style="display: block; text-align: center;"></ins><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">
</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" style="font-weight: 400;"><span data-dcnode-id="1155" instrument_node="">Atlantis offers exciting adventures such as immersive aquatic life encounters at Dolphin Cay, private sunset speedboat tours, kid-friendly shark and mermaid underwater camps, dive-in movies, or even setting a different kind of kitchen table with private family dinners on the beach.</span></span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node="">The resort features the renowned Aquaventure. Aquaventure is an innovative 141-acre waterscape of thrilling slides and river rides, pools, and white sand beaches for both children and </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/mayan-astrology-inspired-cocktails/" rel="noopener" target="_blank"><span data-dcnode-id="1150" instrument_node="">adults to enjoy</span></a><span data-dcnode-id="1148" instrument_node="">. Other marine life fun includes Sea Squirts and the Jr. Ultimate Trainer For A Day.&nbsp;</span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" style="font-weight: 400;"><span data-dcnode-id="1144" instrument_node="">Parents can rejuvenate themselves at the tranquil Mandara Spa, an award-winning 18-hole golf course, or the renowned Atlantis Casino.&nbsp;</span></span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node="">Diverse culinary options including Fish by </span><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Chef José Andrés</span></strong><span data-dcnode-id="1137" instrument_node="">, Nobu by Nobu Matsuhisa, Olives by Todd English and Casa D’Angelo by </span><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Chef Angelo Elia</span></strong><span data-dcnode-id="1134" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1129" style="font-weight: 400;"><span data-dcnode-id="1130" instrument_node="">Complimentary COVID-19 Rapid Antigen testing is available for up to two guests returning to the United States. The tests will be administered by experienced clinical technicians and </span></span><span data-dcnode-id="1127" style="font-weight: 400;"><span data-dcnode-id="1128" instrument_node="">registered nurses and are available at the resorts Beach and Royal Towers.</span></span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">Families can support the Atlantis Blue Project Foundation during their stay. Atlantis works together with local marine scientists to conserve and preserve the coral reefs, sea turtles, sharks, and manatees. Families can participate in Blue Adventures activities like snorkeling, scuba diving and more, which all support the Atlantis Blue Project Foundation.</span></span></p><span data-dcnode-id="1121" instrument_node="">
</span><h2 data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Banyan Tree Mayakoba, </span><i data-dcnode-id="1117"><span data-dcnode-id="1118" style="font-weight: 400;"><span data-dcnode-id="1119" instrument_node="">Mayakoba, Mexico</span></span></i></h2><span data-dcnode-id="1115" instrument_node="">
</span><figure aria-describedby="caption-attachment-4828" class="wp-caption aligncenter" data-dcnode-id="1111" id="attachment_4828" style="width: 800px"><img alt="Banyan Tree Mayakoba children recycle craft activity" class="size-full wp-image-4828 td-animation-stack-type0-2" data-dcnode-id="1114" height="533" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Recycling-Paper-Workshop_Banyan-Tree-Mayakoba-min-630x420.jpg 630w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1112" id="caption-attachment-4828"><span data-dcnode-id="1113" instrument_node="">Credit: Banyan Tree Mayakoba</span></figcaption></figure><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1108" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">Ideal for families seeking a much-needed tranquil escape after 2020, </span></span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.banyantree.com/en/mexico/mayakoba"><span data-dcnode-id="1106" style="font-weight: 400;"><span data-dcnode-id="1107" instrument_node="">Banyan Tree Mayakoba</span></span></a><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node=""> is the perfect beachfront getaway located in beautiful Mexico.&nbsp;</span></span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1100" instrument_node="">The five-star eco family friendly resort recently unveiled 34 newly built beachfront pool suites, 7 lagoon over-the-water pool villas, a brand-new kids club, and the chic Sands Beach Club. Sands is available for all-day dining as you enjoy pristine views of the Riviera Maya coastline. It also features two new oceanfront pools and a barefoot raw bar.</span></span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" style="font-weight: 400;"><span data-dcnode-id="1096" instrument_node="">While on-property, families can enjoy authentic Mayakoba culture. Experiences include an In Villa BBQ hosted by your own private chef, and mystical Mayan dining where ancient civilization stories are brought to life. </span></span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node="">There are also sunrise/sunset cruises along the canals of Mayakoba, mezcal tastings, Mexican cooking classes and recycling paper workshops, just to name a few.</span></span></p><span data-dcnode-id="1089" instrument_node="">
</span><h2 data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">Hilton La Romana, </span><i data-dcnode-id="1085"><span data-dcnode-id="1086" style="font-weight: 400;"><span data-dcnode-id="1087" instrument_node="">Dominican Republic</span></span></i></h2><span data-dcnode-id="1083" instrument_node="">
</span><figure aria-describedby="caption-attachment-4833" class="wp-caption alignnone" data-dcnode-id="1079" id="attachment_4833" style="width: 800px"><img alt="hilton la romana dominican republic" class="size-full wp-image-4833 td-animation-stack-type0-2" data-dcnode-id="1082" height="532" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min-768x511.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min-696x463.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Hilton_La_Romana_All_Inlcusive_Resorts_Aerial_00-2-min-632x420.jpg 632w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1080" id="caption-attachment-4833"><span data-dcnode-id="1081" instrument_node="">Credit: Hilton La Romana</span></figcaption></figure><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" style="font-weight: 400;"><span data-dcnode-id="1077" instrument_node="">Hilton La Romana Family Resort features a brand-new water park where guests of all ages can challenge exhilarating slides. Surrounded by lush, tropical forest, the beachfront all-inclusive resort is perfect for your family getaway.&nbsp;</span></span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" style="font-weight: 400;"><span data-dcnode-id="1073" instrument_node="">The family resort overlooks Bayahibe Bay, one of the island’s most pristine beaches. </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hiltonbyplaya.com/la-romana" rel="noopener" target="_blank"><span data-dcnode-id="1072" instrument_node="">Hilton La Romana</span></a><span data-dcnode-id="1070" instrument_node=""> offers high-end accommodations and amenities with multiple pools, a spa and live entertainment nightly. During the day, guests can enjoy a variety of activities such as windsurfing, snorkeling, volleyball, and merengue lessons. </span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1066" instrument_node="">In addition, guests can enjoy countless cuisine options at the </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/category/food-and-drink/restaurants-and-dining/"><span data-dcnode-id="1065" instrument_node="">specialty restaurants and bars</span></a><span data-dcnode-id="1063" instrument_node=""> at the resort.</span></span></p><span data-dcnode-id="1060" instrument_node="">
</span><h2 data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Ka’anapali Beach Hotel, </span><i data-dcnode-id="1056"><span data-dcnode-id="1057" style="font-weight: 400;"><span data-dcnode-id="1058" instrument_node="">Maui, Hawaii</span></span></i></h2><span data-dcnode-id="1054" instrument_node="">
</span><figure aria-describedby="caption-attachment-4832" class="wp-caption aligncenter" data-dcnode-id="1050" id="attachment_4832" style="width: 800px"><img alt="Ka’anapali Beach Hotel outdoor breakfast spread orange juice hawaii" class="size-full wp-image-4832 td-animation-stack-type0-2" data-dcnode-id="1053" height="532" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min-768x511.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min-696x463.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/GerardsTPI_4web-1-min-632x420.jpg 632w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1051" id="caption-attachment-4832"><span data-dcnode-id="1052" instrument_node="">Credit: Ka’anapali Beach Hotel</span></figcaption></figure><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" instrument_node="">Maui is Always a Good Idea. </span></span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kbhmaui.com/"><span data-dcnode-id="1045" style="font-weight: 400;"><span data-dcnode-id="1046" instrument_node="">Ka’anapali Beach Hotel</span></span></a><span data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" instrument_node="">, widely known and loved for being Hawai’i’s Most Hawaiian Hotel, is the perfect island getaway for the whole ‘ohana (family).</span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" style="font-weight: 400;"><span data-dcnode-id="1039" instrument_node="">Immerse yourself in the Hawaiian way of life with Ka’anapali Beach Hotel’s collection of Hawaiian activities. From Nala (weaving) and Kapa (cloth-making) to ‘Ōlelo (Language) and Ho‘olaule‘a (Music), dive into local culture and engage with the illustrious and knowledgeable staff.&nbsp;</span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">Then head out on the water with Hale Huakaʻi! The ocean activity center launched a new Waʻa Paddle Tour, an outing on a traditional outrigger canoe.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" style="font-weight: 400;"><span data-dcnode-id="1031" instrument_node="">The smallest members of the family will enjoy the free “Aloha Passport” program. This program guides them to various destinations throughout the hotel to participate in activities that are both fun and educational. At each destination, the child receives a gift and a stamp in their passport.</span></span></p><span data-dcnode-id="1028" instrument_node="">
</span><h2 data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">Ocean Club Resorts, </span><i data-dcnode-id="1024"><span data-dcnode-id="1025" style="font-weight: 400;"><span data-dcnode-id="1026" instrument_node="">Turks and Caicos</span></span></i></h2><span data-dcnode-id="1022" instrument_node="">
</span><figure aria-describedby="caption-attachment-4822" class="wp-caption alignnone" data-dcnode-id="1018" id="attachment_4822" style="width: 2560px"><img alt="Ocean Club Resort Bikes" class="wp-image-4822 size-full td-animation-stack-type0-2" data-dcnode-id="1021" height="1707" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-scaled.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-scaled.jpg 2560w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-1024x683.jpg 1024w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-1536x1024.jpg 1536w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-2048x1365.jpg 2048w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-1068x712.jpg 1068w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-1920x1280.jpg 1920w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/OC-RESORTS_DEC18_0306-min-630x420.jpg 630w" width="2560"><figcaption class="wp-caption-text" data-dcnode-id="1019" id="caption-attachment-4822"><span data-dcnode-id="1020" instrument_node="">Courtesy of Ocean Club Resorts</span></figcaption></figure><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-weight: 400;"><span data-dcnode-id="1016" instrument_node="">Located directly along the world-renowned Grace Bay Beach and turquoise waters of Providenciales, Turks and Caicos sits Ocean Club Resorts. They are two all-suite properties that include SUP boarding, snorkeling, biking and kayaking, and direct beach access for guests to enjoy.&nbsp;</span></span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" style="font-weight: 400;"><span data-dcnode-id="1012" instrument_node="">The resorts have partnered with local diagnostic laboratories to provide </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oceanclubresorts.com/us-and-canadian-covid-19-border-entry-requirements/" rel="noopener" target="_blank"><span data-dcnode-id="1011" instrument_node="">onsite COVID testing</span></a><span data-dcnode-id="1009" instrument_node=""> at the Ocean Club East location, guests of the West location will be provided complimentary transportation for their testing appointment.</span></span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" style="font-weight: 400;"><span data-dcnode-id="1005" instrument_node="">Additionally, Ocean Club Resorts are the first properties to be Green Globe Certified in the Turks &amp; Caicos Islands.&nbsp;</span></span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" style="font-weight: 400;"><span data-dcnode-id="1001" instrument_node="">Eco-forward initiatives include: </span></span></p><span data-dcnode-id="998" instrument_node="">
</span><ul data-dcnode-id="984"><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" style="font-weight: 400;"><span data-dcnode-id="996" instrument_node="">placing cloth reusable shopping bags in each suite</span></span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" style="font-weight: 400;"><span data-dcnode-id="992" instrument_node="">replacing plastic straws with paper and Styrofoam containers with paper boxes</span></span></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="987" style="font-weight: 400;"><span data-dcnode-id="988" instrument_node="">using LED lighting</span></span></li><span data-dcnode-id="985" instrument_node="">
</span></ul><span data-dcnode-id="983" instrument_node="">
</span><h2 data-dcnode-id="978"><span data-dcnode-id="982" instrument_node="">The Ritz-Carlton, </span><i data-dcnode-id="979"><span data-dcnode-id="980" style="font-weight: 400;"><span data-dcnode-id="981" instrument_node="">Aruba</span></span></i></h2><span data-dcnode-id="977" instrument_node="">
</span><figure aria-describedby="caption-attachment-4829" class="wp-caption aligncenter" data-dcnode-id="973" id="attachment_4829" style="width: 800px"><img alt="dog on tropical beach in cabana white sand" class="size-full wp-image-4829 td-animation-stack-type0-1" data-dcnode-id="976" height="533" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/40116314_1343899525745240_6224756759915921408_o-min-630x420.jpg 630w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="974" id="caption-attachment-4829"><span data-dcnode-id="975" instrument_node="">Credit: The Ritz-Carlton, Aruba</span></figcaption></figure><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" instrument_node="">The</span></span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ritzcarlton.com/en/hotels/caribbean/aruba%3Fscid%3Ddb248552-9f3d-40b0-8814-f3be30edbf1e%26ppc%3Dppc%26pid%3Dustbppc%26nst%3Dpaid%26gclid%3DCjwKCAiAzNj9BRBDEiwAPsL0d2E1awddyVsy78YuM9LUS6EvMbfmGGSvUCqwfwre4meDT-tiXhYTzBoCjbYQAvD_BwE%26gclsrc%3Daw.ds"><span data-dcnode-id="968" style="font-weight: 400;"><span data-dcnode-id="969" instrument_node=""> Ritz-Carlton, Aruba</span></span></a><span data-dcnode-id="962" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node=""> in </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/six-luxurious-resorts-in-the-caribbean/" rel="noopener" target="_blank"><span data-dcnode-id="965" instrument_node="">the Caribbean</span></a><span data-dcnode-id="963" instrument_node=""> engages with its natural surroundings to provide guests with exclusive social-distance experiences. Every member of the family can find a spot at the beach with the private cabanas, customized kids’ cabana, and doggy cabanas.&nbsp;</span></span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="960" style="display: none !important;"></div><p data-dcnode-id="957"><span data-dcnode-id="958" style="font-weight: 400;"><span data-dcnode-id="959" instrument_node="">This family friendly tropical island resort is also offering private dining experiences with a 3-course dinner under the stars. The resort is also offering a gourmet picnic equipped with a selection of the chef’s favorite snacks and bottle of prosecco.&nbsp;</span></span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="947"><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9396499633916931" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5756697283" data-dcnode-id="952" style="display: block; text-align: center;"></ins><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">
</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" style="font-weight: 400;"><span data-dcnode-id="945" instrument_node="">Guests can also explore the culturally diverse and historically rich island. The resort’s concierge can arrange private tours for guests to explore Aruba’s cultural charm, rugged vistas, and a National Wildlife Park.</span></span></p><span data-dcnode-id="942" instrument_node="">
</span><h2 data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">Shangri-La’s Le Touessrok Resort &amp; Spa, </span><i data-dcnode-id="938"><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">Mauritius</span></span></i></h2><span data-dcnode-id="936" instrument_node="">
</span><figure aria-describedby="caption-attachment-4824" class="wp-caption alignnone" data-dcnode-id="932" id="attachment_4824" style="width: 1707px"><img alt="Shangri-La Resort Child paddleboarding" class="wp-image-4824 size-full td-animation-stack-type0-1" data-dcnode-id="935" height="2560" loading="lazy" sizes="(max-width: 1707px) 100vw, 1707px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-scaled.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-scaled.jpg 1707w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-200x300.jpg 200w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-683x1024.jpg 683w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-768x1152.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-1024x1536.jpg 1024w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-1366x2048.jpg 1366w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-696x1044.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-1068x1601.jpg 1068w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-1920x2879.jpg 1920w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Kids-Watersports-min-280x420.jpg 280w" width="1707"><figcaption class="wp-caption-text" data-dcnode-id="933" id="caption-attachment-4824"><span data-dcnode-id="934" instrument_node="">Courtesy of Shangri-La’s Le Touessrok Resort &amp; Spa, Mauritius</span></figcaption></figure><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="930" instrument_node="">Located on the east coast of Mauritius in one of the island’s most breathtaking bays, </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shangri-la.com/en/mauritius/shangrila/" rel="noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">Shangri-La’s Le Touessrok Resort &amp; Spa</span></a><span data-dcnode-id="927" instrument_node="">, Mauritius is the perfect getaway for island seekers. The country is currently allowing travelers to enter from the US.</span></span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" style="font-weight: 400;"><span data-dcnode-id="923" instrument_node="">The resort’s 200 rooms and suites all offer spectacular Indian Ocean Views and direct access to the talcum-white sands of the most prestigious beach on the island. The resort boasts a secluded private island, Ilôt Mangénie, with bountiful pristine beaches, reserved exclusively for guests.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" style="font-weight: 400;"><span data-dcnode-id="919" instrument_node="">Open from 8am to 6 pm daily, the resort’s T-Club is dedicated to fun for children. Children between four and 11 years old can access the T-Club at no cost.&nbsp;</span></span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" style="font-weight: 400;"><span data-dcnode-id="915" instrument_node="">This family friendly tropical island resort initiates local environment protection and conservation through Sanctuary, Shangri-La Group’s Care for Nature Project. The resort team is dedicated to helping local wildlife including three tortoises aged 69, 77 and 124 years old.&nbsp;</span></span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" style="font-weight: 400;"><span data-dcnode-id="911" instrument_node="">The resort maintains 10 beehives that produce honey year-round. Maintained by Tony Myrtle, the resort’s villa butler and passionate beekeeper, the first harvest in March 2019 collected 1.5 liters of honey.</span></span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" style="font-weight: 400;"><span data-dcnode-id="907" instrument_node="">In line with Shangri-La Group’s sustainable food and beverage initiative, Rooted in Nature, the resort supports local businesses, farms and fisheries by purchasing approximately 70 percent of fish, seafood and vegetables locally.</span></span></p><span data-dcnode-id="904" instrument_node="">
</span><h2 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Sheraton Kona Resort &amp; Spa at Keauhou Bay</span></h2><span data-dcnode-id="901" instrument_node="">
</span><figure aria-describedby="caption-attachment-4817" class="wp-caption alignnone" data-dcnode-id="897" id="attachment_4817" style="width: 2560px"><img alt="Sheraton Kona Resort &amp; Spa" class="wp-image-4817 size-full td-animation-stack-type0-1" data-dcnode-id="900" height="1707" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-scaled.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-scaled.jpg 2560w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-1024x683.jpg 1024w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-1536x1024.jpg 1536w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-2048x1365.jpg 2048w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-1068x712.jpg 1068w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-1920x1280.jpg 1920w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Sheraton-Kona-Resort-Spa-at-Keauhou-Bay-7-min-630x420.jpg 630w" width="2560"><figcaption class="wp-caption-text" data-dcnode-id="898" id="caption-attachment-4817"><span data-dcnode-id="899" instrument_node="">Courtesy of Bread &amp; Butter</span></figcaption></figure><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="895" instrument_node="">With an unparalleled location on the iconic lava rocks of Hawaii’s Kona Coast, </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marriott.com/hotels/travel/koasi-sheraton-kona-resort-and-spa-at-keauhou-bay" rel="noopener" target="_blank"><span data-dcnode-id="894" instrument_node="">Sheraton Kona Resort &amp; Spa at Keauhou Bay</span></a><span data-dcnode-id="892" instrument_node=""> offers something for the whole family. Families can try traditional Hawaiian activities like hula lessons and enjoy history and entertainment at Haleo Luau.&nbsp;</span></span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" style="font-weight: 400;"><span data-dcnode-id="888" instrument_node="">The family friendly tropical resort overlooks Kailua-Kona’s Manta Ray coastal feeding grounds, where Manta Rays come to feed on plankton. Families can swim or snorkel among manta rays and sea turtles in Keauhou Bay.</span></span></p><span data-dcnode-id="885" instrument_node="">
</span><h2 data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">Timbers Kauai, </span><i data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="883" instrument_node="">Kauai, Hawaii</span></span></i></h2><span data-dcnode-id="879" instrument_node="">
</span><figure aria-describedby="caption-attachment-4827" class="wp-caption aligncenter" data-dcnode-id="875" id="attachment_4827" style="width: 800px"><img alt="Timbers Kauai at Hokuala children's room" class="size-full wp-image-4827 td-animation-stack-type0-1" data-dcnode-id="878" height="550" loading="lazy" onload="Wpfcll.r(this,true);" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/plugins/wp-fastest-cache-premium/pro/images/blank.gif&amp;raw" width="800" wpfc-data-original-src="https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min.jpg" wpfc-data-original-srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-300x206.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-768x528.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-218x150.jpg 218w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-696x479.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-611x420.jpg 611w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/TKAU-childrens-room-min-100x70.jpg 100w"><figcaption class="wp-caption-text" data-dcnode-id="876" id="caption-attachment-4827"><span data-dcnode-id="877" instrument_node="">Credit: Timbers Kauai at Hokuala // Children’s Room</span></figcaption></figure><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="873" instrument_node="">Kauai’s newest oceanfront resort, </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timberskauai.com/" rel="noopener" target="_blank"><span data-dcnode-id="872" instrument_node="">Timbers Kauai</span></a><span data-dcnode-id="870" instrument_node=""> offers the privacy and security of a private vacation home in a 5-star resort setting. Activities include watersports, hiking/biking (a fleet of cruisers are available for complimentary use), golf, and educational programming for the entire family. </span></span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" style="font-weight: 400;"><span data-dcnode-id="866" instrument_node="">All age groups are welcome at their popular aggregation program. This program teaches guests about traditional canoe crops and how to plant/harvest produce from their 15-acre organic farm and orchard.</span></span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node="">Accommodations range from 2- to 4-bedroom residences with fully equipped gourmet kitchens, spacious living and dining areas.</span></span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">A once-overgrown golf course has been artfully molded into a beautiful fruit orchard and organic vegetable garden. The property’s Farm at Hokuala features greens, fruits and vegetables, edible flowers, pineapples and 12 traditional Hawaiian canoe plants.</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><h2 data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">True Blue Bay Boutique Resort, </span><i data-dcnode-id="851"><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">Grenada</span></span></i></h2><span data-dcnode-id="849" instrument_node="">
</span><figure aria-describedby="caption-attachment-4823" class="wp-caption alignnone" data-dcnode-id="845" id="attachment_4823" style="width: 2048px"><img alt="True Blue Bay Cocoa Pod Pool" class="wp-image-4823 size-full td-animation-stack-type0-1" data-dcnode-id="848" height="1365" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min.jpg 2048w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-1024x683.jpg 1024w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-1536x1024.jpg 1536w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-1068x712.jpg 1068w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-1920x1280.jpg 1920w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/Cocoa-Pod-view-to-Pool-min-630x420.jpg 630w" width="2048"><figcaption class="wp-caption-text" data-dcnode-id="846" id="caption-attachment-4823"><span data-dcnode-id="847" instrument_node="">Courtesy of True Blue Bay</span></figcaption></figure><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" style="font-weight: 400;"><span data-dcnode-id="843" instrument_node="">This family run resort is totally family friendly and gives a taste of authentic Grenada.</span></span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="834"><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.truebluebay.com/"><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">True Blue Bay</span></span></a><span data-dcnode-id="835" style="font-weight: 400;"><span data-dcnode-id="836" instrument_node=""> is the island’s first climate-smart resort with sustainable measures including having carbon neutral rooms in the shape of a Cocoa Pod. Here, there is rainwater harvesting, solar panels generate electricity and ethically sourced wood is used for the furnishings. The resort also has the island’s first solar powered minibuses that are used for airport transfers and beach shuttles.</span></span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node="">Resort activities include cooking lessons, chocolate and rum tastings, a street food night and yoga classes.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" style="font-weight: 400;"><span data-dcnode-id="828" instrument_node="">There are several playgrounds and a children’s club for younger children. An onsite dive shop arranges diving and snorkeling trips to reefs, wrecks and the world’s first underwater sculpture park.&nbsp;</span></span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">Sample local bush teas that are locally made ice cream flavored with spices such as nutmeg and cardamom as well as the local, organic chocolate. For a special treat, you can have a chocolate spa treatment.</span></span></p><span data-dcnode-id="821" instrument_node="">
</span><h2 data-dcnode-id="815"><span data-dcnode-id="820" instrument_node="">Zadun, a Ritz-Carlton Reserve, </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">San Jose del Cabos </span></em><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Mexico&nbsp;</span></em></h2><span data-dcnode-id="814" instrument_node="">
</span><figure aria-describedby="caption-attachment-4826" class="wp-caption aligncenter" data-dcnode-id="810" id="attachment_4826" style="width: 800px"><img alt="zadun hotel bedroom" class="size-full wp-image-4826 td-animation-stack-type0-1" data-dcnode-id="813" height="533" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min.jpg&amp;raw" srcset="https://eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min.jpg 800w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min-300x200.jpg 300w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min-768x512.jpg 768w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min-696x464.jpg 696w, https://eastendtastemagazine.com/wp-content/uploads/2021/02/A_zadun-reserve-bed_dtl-2-min-630x420.jpg 630w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="811" id="caption-attachment-4826"><span data-dcnode-id="812" instrument_node="">Credit: Zadun, a Ritz-Carlton Reserve</span></figcaption></figure><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">Explore the Baja California Peninsula with the Family Getaway to Cabo package at </span></span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ritzcarlton.com/en/hotels/mexico/los-cabos"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">Zadun</span></span></a><span data-dcnode-id="802" style="font-weight: 400;"><span data-dcnode-id="803" instrument_node="">, a Ritz-Carlton Reserve. This package includes family dinner at HUMO, family lunch at El Barrio, and 3 nights in a family suite. The suite features a private plunge pool and two bedrooms.&nbsp;</span></span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" style="font-weight: 400;"><span data-dcnode-id="799" instrument_node="">The package at this family friendly tropical resort also includes a family day at Zadun’s ultra-luxury spa, Casa Grande. Parents can enjoy a relaxing couples massage while the kids experience a Mexican chocolate manicure and pedicure and reconvene for a private family yoga session.&nbsp;</span></span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" style="font-weight: 400;"><span data-dcnode-id="795" instrument_node="">Families can also immerse themselves in nature with an Ambassador of the Environment Naturalist. Families can be guided on a private journey of Baja California’s natural wonders with excursions to Sol de Mayo Waterfall and stargazing under the Los Cabos sky!</span></span></p><span data-dcnode-id="792" instrument_node="">
