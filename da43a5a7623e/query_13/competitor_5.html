</span><h2 class="" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Best all-inclusive resort for families with babies</span></h2><span data-dcnode-id="2419" instrument_node="">
</span><h3 data-dcnode-id="2416"><strong data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Beaches Turks &amp; Caicos</span></strong></h3><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2410" dir="ltr"><span data-dcnode-id="2414" instrument_node="">Beaches Turks &amp; Caicos hooks kiddos of all ages with its incredible on-site amenities. We’re talking a 45,000-square-foot water park, which includes a story-high SkySlide (the tallest of its kind in Turks and Caicos), plus six swimming pools, multiple kids clubs geared toward infants through teens, an Xbox Play Lounge, and even a teen nightclub. Families can sprawl out in the seaside villas and suites, and with nearly 20 restaurants to choose from, even the pickiest eater can find something to eat. The property also boasts five distinct villages, each one featuring architecture inspired by a different destination, such as Italy, France, and Key West. And then there are the 12 miles of </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/beaches-with-the-clearest-water/"><span data-dcnode-id="2413" instrument_node="">pristine beaches</span></a><span data-dcnode-id="2411" instrument_node=""> perfect for swimming, lounging, or trying out a bevy of water sports. Beaches Turks &amp; Caicos is the only Caribbean resort to offer a comprehensive scuba program—and it’s included in your daily rate.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407" dir="ltr"><span data-dcnode-id="2408" instrument_node="">But parents of babies and tots just might get the best deal here. A stay at a Beaches Resort includes care from certified nannies at the Kids’ Camp, which has an infant-to-staff ratio of 3:1 for 0 to 11 months, and 5:2 for 12 to 24 months—and nannies are included every day of your stay. (Yes, you read that right!) Additionally, there is a nurse on property all day, every day. Private childcare services are also available at additional cost.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p class="" data-dcnode-id="2403"><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Pros:</span></strong></p><span data-dcnode-id="2402" instrument_node="">

</span><li data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Nannies watch the kids at no extra cost</span></li><span data-dcnode-id="2398" instrument_node="">

</span><p data-dcnode-id="2286" dir="ltr"><span data-dcnode-id="2296" instrument_node="">How does a 19th-century resort set in a Victorian castle peering over a lovely lake and surrounded by 40,000 acres of forest sound to you? Nestled in the Hudson Valley and situated on a private glacial lake with views of the Catskill Mountains, Mohonk Mountain House is located at the top of a rocky bluff, and the words </span><em data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">scenic</span></em><span data-dcnode-id="2293" instrument_node=""> and </span><em data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">stunning</span></em><span data-dcnode-id="2290" instrument_node=""> don’t even begin to do it justice. It’s just 90 miles north of New York City, so it’s a great getaway for city folks. Guest amenities at this all-inclusive family resort include three incredible farm-to table-meals a day, archery, arts and crafts, disc golf, tennis, swimming, guided hikes, kayaking, and a spa for the adults. The resort offers a vast slate of winter programming, too, including snowshoeing, cross-country skiing, and ice skating. It’s the kind of vacation your family will always remember and one of the </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/east-coast-vacations-you-need-to-take-at-least-once/"><span data-dcnode-id="2289" instrument_node="">East Coast vacations</span></a><span data-dcnode-id="2287" instrument_node=""> you need to take at least once.</span></p><span data-dcnode-id="2285" instrument_node="">

</span><h3 class="" data-dcnode-id="1631"><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Grand Solmar at Rancho San Lucas, Mexico</span></strong></h3><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">With sweeping vistas, infinity pools, swim-up bars, and spacious suites that allow plenty of room for the whole family, the Grand Solmar starts out strong as a top all-inclusive resort. All the rooms have full kitchens, like your very own </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/best-beach-house-rentals/"><span data-dcnode-id="1628" instrument_node="">beach house rental</span></a><span data-dcnode-id="1626" instrument_node="">, so you can always have snacks nearby, and you can enjoy a pristine private beach and watch migrating whales pass. But what puts it over the top for families is the mini water park and saltwater lagoon with rope swings and waterslides that will keep the kids occupied for hours; you can even paddle a kayak around in the lagoon. In addition, the property has a kids club for ages four to 12 (included in the all-inclusive rate), so Mom can go the spa and Dad can play golf at the new Greg Norman Signature golf course.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">There are also multiple restaurants, cooking classes, movie nights, and a weekly market with live Mexican music and crafts. Plus, there’s a 24-hour tacos and tamales menu in case you get a late-night craving!</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p class="" data-dcnode-id="1618"><strong data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Pros:</span></strong></p><span data-dcnode-id="1617" instrument_node="">

</span><h2 class="" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Best all-inclusive resort near national parks</span></h2><span data-dcnode-id="1385" instrument_node="">
</span><h3 data-dcnode-id="1382"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Red Mountain Resort, Ivins, Utah</span></strong></h3><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1376" dir="ltr"><span data-dcnode-id="1380" instrument_node="">Nature lovers, this one’s for you! You probably already know that Utah is home to some of the best state and </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/best-national-park-road-trips/"><span data-dcnode-id="1379" instrument_node="">national parks</span></a><span data-dcnode-id="1377" instrument_node=""> in the country, which makes it an amazing place for a family vacation. But you may not know that there’s an all-inclusive resort that makes it incredibly easy to visit some of them. The Red Mountain Resort in Ivins is just 40 miles from Zion National Park and about 140 miles from Bryce Canyon National Park (a two-and-a-half-hour car ride). Plus, Snow Canyon State Park is right down the road.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373" dir="ltr"><span data-dcnode-id="1374" instrument_node="">But you don’t even have to go anywhere to get an amazing view. Just look out your window to be treated to red-rock bluffs rising out of the Southern Utah terrain. Choose from 82 rooms and 24 villa suites and you’ll also get three healthy meals a day, access to swimming pools, complimentary loaner bicycles, s’mores at the fire pit, Tuacahn amphitheater performances, guided hiking and biking, cooking demonstrations, and more.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p class="" data-dcnode-id="1369" dir="ltr"><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Pros:</span></strong></p><span data-dcnode-id="1368" instrument_node="">

</span><p data-dcnode-id="1318" dir="ltr"><span data-dcnode-id="1319" instrument_node="">Set within more than 100 acres of pristine rainforest in the UNESCO World Heritage–listed Val des Pitons, Sugar Beach offers breathtaking views of the Caribbean Sea and the Pitons, along with all of the 18th-century colonial charm that St. Lucia is known for. The recently renovated resort boasts a variety of different luxury rooms, cottages, bungalows and villas—all of which have private pools and butler service, a luxurious perk for exhausted parents.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315" dir="ltr"><span data-dcnode-id="1316" instrument_node="">Children ages four to 12 years old can head to the kids’ club, which offers fun activities like treasure hunts, arts and crafts, archery, and coconut bowling, as well as fish feeding and sandcastle building at the beach. Teens can join the onsite Sailing Club to learn the basics of sailing, including rigging, basic boat handling, and seamanship. And the whole family can set sail to discover the beauty of the Val des Pitons from the sea.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p class="" data-dcnode-id="1311" dir="ltr"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Pros:</span></strong></p><span data-dcnode-id="1310" instrument_node="">
