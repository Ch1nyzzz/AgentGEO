7" instrument_node=""> </span><span data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">USA</span></span><span data-dcnode-id="694" instrument_node=""> </span><span data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Feb, 2021</span></span><span data-dcnode-id="691" instrument_node=""> </span></div><span data-dcnode-id="689" instrument_node=""> </span></div><span data-dcnode-id="687" instrument_node=""> </span><div class="testimonial-text" data-dcnode-id="677"><span data-dcnode-id="686" instrument_node=""> </span><p data-dcnode-id="679"><span data-dcnode-id="685" instrument_node=""> </span><svg data-dcnode-id="681" height="24" viewBox="0 0 24 24" width="24"></svg><span data-dcnode-id="684" instrument_node=""> </span><path d="M10,7L8,11H11V17H5V11L7,7H10M18,7L16,11H19V17H13V11L15,7H18Z" data-dcnode-id="683" fill="#000000"></path><span data-dcnode-id="682" instrument_node=""> </span><span data-dcnode-id="680" instrument_node=""> Excellent service: quick, friendly, helpful, detailed &amp; high standards.We truly enjoyed our trip and had no single issue even during covid times!Highly recommended! </span></p><span data-dcnode-id="678" instrument_node=""> </span></div><span data-dcnode-id="676" instrument_node=""> </span><div class="clear" data-dcnode-id="675"></div><span data-dcnode-id="674" instrument_node=""> </span></div><span data-dcnode-id="672" instrument_node=""> </span><div class="responsive-tabs-wrapper" data-dcnode-id="477"><span data-dcnode-id="671" instrument_node=""> </span><div class="responsive-tabs responsive-tabs-packages responsive-tabs--enabled" data-dcnode-id="478"><span data-dcnode-id="670" instrument_node=""> </span><ul class="responsive-tabs__list" data-dcnode-id="659" role="tablist"><span data-dcnode-id="669" instrument_node=""> </span><li class="responsive-tabs__list__item responsive-tabs__list__item--active" data-dcnode-id="667" data-show="#tablist1-panel1" id="tablist1-tab1"><span data-dcnode-id="668" instrument_no "">$</span></span><span data-dcnode-id="637" instrument_node=""> </span></div><span data-dcnode-id="635" instrument_node=""> </span></div><span data-dcnode-id="633" instrument_node=""> </span><h3 data-dcnode-id="630"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">‘Tropical Family Break’ is perfect for:</span></strong></h3><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Families who want to experience the best of Costa Rica’s nature and adventure.</span></p><hr data-dcnode-id="627"><h2 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Personalized Family Travel by Local Experts</span></h2><p data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">Take your loved ones on the </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vacationscostarica.com/packages/family/"><span data-dcnode-id="623" instrument_node="">Costa Rica family vacation</span></a><span data-dcnode-id="621" instrument_node=""> of a lifetime. We have selected two of Costa Rica’s deluxe&nbsp;resorts for your accommodation and two of Costa Rica’s greatest locations for your enjoyment: the Arenal Volcano area and Guanacaste.</span></p><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">Depending on your needs, start your trip near the volcano and then descend to the beach, or start by relaxing near the Pacific Ocean and then head up the mountains in search of the volcano and adventure. </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vacationscostarica.com/contact-us/"><span data-dcnode-id="618" instrument_node="">Talk to your travel expert</span></a><span data-dcnode-id="616" instrument_node=""> about what suits you best and let the experience begin!</span></p><h2 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Arenal Volcano: Fun and Adventure!</span></h2><p data-dcnode-id="604"><span data-dcnode-id="612" instrument_node="">Begin your adventure in Arenal where the famous volcano rises from the jungle and provides an almost prehistoric feel to the landscape. Your hotel here is the luxurious</span><span data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">&nbsp;</span></span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vacationscostarica.com/hotel/the-springs-resort-and-spa/"><span data-dcnode-id="609" instrument_node="">Springs Resort and Spa</span></a><span data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">&nbsp;</span></span><span data-dcnode-id="605" instrument_node="">where the rich and famous like to stay.</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">From here you can take part in all manner of adventure tours, from whitewater rafting and zip lining to canopy hiking. For those with relaxation in mind, you can simply enjoy the hot springs or relax around the pool.</span></p><h2 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">The Westin Experience</span></h2><p data-dcnode-id="593"><span data-dcnode-id="599" instrument_node="">From Arenal, a private transfer will take you to Guanacaste, where you will stay in one of the country’s&nbsp;deluxe all-inclusive resort. The</span><span data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">&nbsp;Westin</span></span><span data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&nbsp;</span></span><span data-dcnode-id="594" instrument_node="">is known for its great restaurants, service, and activities. Then head out to see the sunset on your own private catamaran tour into the ocean!</span></p><hr data-dcnode-id="592"><h3 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">The ‘Tropical family Break’ Vacation Package Includes:</span></h3><ul data-dcnode-id="564"><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Airport Meet and Greet—we’re there as you get off the plane so you have a stress-free arrival</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Private transfer to The Springs Resort and Spa with an English-speaking driver</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">3 nights lodging at The Springs Resort and Spa</span></li><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Rainforest Combo tour</span></li><li data-dcnode-id="575"><span data-dcnode-id="581" instrument_node="">Private transfer to</span><span data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&nbsp;The Westin Resort and Spa</span></span><span data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">&nbsp;</span></span><span data-dcnode-id="576" instrument_node="">with an English-speaking driver</span></li><li data-dcnode-id="571"><span data-dcnode-id="574" instrument_node="">4 nights lodging at the all-inclusive</span><span data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">&nbsp;the Westin&nbsp;</span></span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">All meals and drinks included while at the&nbsp;Westin</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Sunset catamaran tour</span></li><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Private transfer to the airport</span></li></ul><span data-dcnode-id="563" instrument_node=""> </span><div class="center200" data-dcnode-id="560"><a class="boton inquireNow-botton cta-inquirenow" data-dcnode-id="561" href="#"><span data-dcnode-id="562" instrument_node="">Inquire Now</span></a></div><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node=""> </span><div class="disclaimer" data-dcnode-id="553"><span data-dcnode-id="557" instrument_node=""> </span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">You will receive a 100% accurate price when you inquire with us and share your travel dates. Final package pricing includes taxes, domestic transport, tours and lodging as described unless otherwise indicated. The package does NOT include international airfare or optional travel insurance or any other services not expressly mentioned.</span></p><span data-dcnode-id="554" instrument_node=""> </span></div><span data-dcnode-id="552" instrument_node=""> </span></div><span data-dcnode-id="550" instrument_node=""> </span><h2 class="responsive-tabs__heading" data-dcnode-id="548" data-show="#tablist1-panel2"><span data-dcnode-id="549" instrument_node="">DAY BY DAY</span></h2><span data-dcnode-id="547" instrument_node=""> </span><div class="responsive-tabs__panel" data-dcnode-id="490" id="tablist1-panel2" style="display: none;"><span data-dcnode-id="546" instrument_node=""> </span><h3 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Day 1: Welcome to&nbsp;Costa Rica!</span></h3><p data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">Begin your&nbsp;family resort Costa Rica vacation&nbsp;as you arrive in San José and one of our representatives will meet you and show you to your private transfer. From here, travel to Arenal where you will stay at the luxurious Springs Resort &amp; Spa.</span><br data-dcnode-id="542"><em data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The Springs Resort &amp; Spa</span></em></p><h3 data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Day 2: Rainforest Combo Tour</span></h3><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">See the canopy three different ways! Soar through the forests of Arenal, suspended by cables on a zip line, as you see nature up close. You’ll also explore the forest in an aerial tram and via hanging bridges.</span><br data-dcnode-id="535"><em data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The Springs Resort &amp; Spa</span></em></p><h3 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Day 3:&nbsp;Relax at the Hotel</span></h3><p data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">The Springs has plenty of pools with mineral waters from natural hot springs. Spend the day resting those sore muscles and enjoying the hotel’s world-class service.</span><br data-dcnode-id="528"><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The Springs Resort &amp; Spa</span></em></p><h3 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Day 4:&nbsp;A Change of Scenery</span></h3><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">A private transfer will take you to Guanacaste where you will stay at the&nbsp;deluxe all-inclusive The Westin Resort and Spa. At The Westin, there is little you’ll have to worry about – everything is included!</span><br data-dcnode-id="521"><em data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The Westin Resort and Spa</span></em></p><h3 data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Day 5: Sunset Catamaran Tour</span></h3><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">Sunsets on the Pacific Ocean are a true dream – and you’ll see one from the comfort and elegance of a catamaran. Enjoy drinks, a relaxing atmosphere, and snorkeling.</span><br data-dcnode-id="514"><em data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">The Westin Resort and Spa</span></em></p><h3 data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Days 6 &amp; 7: Enjoy the&nbsp;Westin</span></h3><p data-dcnode-id="501"><span data-dcnode-id="508" instrument_node="">Make the most out of your stay a </span><span data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The Westin Resort and Spa</span></span><span data-dcnode-id="505" instrument_node="">. With countless dining options and on-site activities like dance lessons, pool activities, and golf, you’ll pass the hours away joyfully.</span><br data-dcnode-id="504"><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">The Westin Resort and Spa</span></em></p><h3 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Day 8: Head Home</span></h3><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">A private transfer will take you to Liberia International Airport where you will catch your flight back home. We’ll definitely miss you!</span></p><span data-dcnode-id="496" instrument_node=""> </span><div class="center200" data-dcnode-id="493"><a class="boton inquireNow-botton cta-inquirenow" data-dcnode-id="494" href="#"><span data-dcnode-id="495" instrument_node="">Inquire Now</span></a></div><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node=""> </span></div><span data-dcnode-id="489" instrument_node=""> </span><h2 class="responsive-tabs__heading" data-dcnode-id="487" data-show="#tablist1-panel3"><span data-dcnode-id="488" instrument_node="">LODGING</span></h2><span data-dcnode-id="486" instrument_node=""> </span><div class="tabsPackage listing-650-left responsive-tabs__panel loadbyajax" data-dcnode-id="485" data-id="18958" data-type="hotel" id="tablist1-panel3" style="display: none;"></div><span data-dcnode-id="484" instrument_node=""> </span><h2 class="responsive-tabs__heading" data-dcnode-id="482" data-show="#tablist1-panel4"><span data-dcnode-id="483" instrument_node="">TOURS</span></h2><span data-dcnode-id="481" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="tablist1-tab4" class="tabsPackage listing-650-left responsive-tabs__panel loadbyajax" data-dcnode-id="480" data-id="18958" data-type="tour" id="tablist1-panel4" role="tabpanel" style="display: none;"></div><span data-dcnode-id="479" instrument_node=""> </span></div></div><span data-dcnode-id="476" instrument_node=""> </span><div class="loadbyajax" data-dcnode-id="475" data-id="18958" data-type=
