                    Barnacle Historic State Park is a dog-friendly attraction in the Coconut Grove area of Miami. The Barnacle itself is a house built in 1891, a throwback to a bygone era. Although Fido can't go inside the building, you can explore the 5 acres of land surrounding it together, including a a winding buggy trail through the hammock and forest that still remains intact. Barnacle Historic State Park is also the home of Woofstock, an event that has previously featured pet adoptions, a dog and owner look-alike contest, K-9 officers, food, and live music. The fee for entrance into the park is $2 and it's open every day of the week from 9am to 5pm.
