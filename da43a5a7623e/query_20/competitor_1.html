</span><div class="td-a-rec td-a-rec-id-content_top tdi_7 td_block_template_5" data-dcnode-id="1121"><span data-dcnode-id="1130" instrument_node="">
</span><div class="g g-8" data-dcnode-id="1122"><div class="g-single a-371" data-dcnode-id="1123"><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iowaclinic.com/bone-and-joint-center/%3Futm_medium%3Dsocial%26utm_source%3Dfitness%2520world%2520%26utm_campaign%3Dbone%2520%26%2520joint%25202022/" onclick="gtag('event', 'click', {'event_category': 'Adverts', 'event_label': 'TIC Bone- Joint Ad April - May 2022', 'value': 1.00,  'non_interaction': true});" rel="nofollow" target="_blank"><img class="lazyloaded" data-dcnode-id="1127" data-src="https://desmoines.momcollective.com/wp-content/uploads/2022/04/337-7973_BoneJoint_DMM_728x90.jpg" onload="gtag('event', 'impression', {'event_category': 'Adverts', 'event_label': 'TIC Bone- Joint Ad April - May 2022', 'value': 2.00, 'non_interaction': true});" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2022/04/337-7973_BoneJoint_DMM_728x90.jpg&amp;raw"><noscript data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">&lt;img onload="gtag('event', 'impression', {'event_category': 'Adverts', 'event_label': 'TIC Bone- Joint Ad April - May 2022', 'value': 2.00, 'non_interaction': true});" src="https://desmoines.momcollective.com/wp-content/uploads/2022/04/337-7973_BoneJoint_DMM_728x90.jpg" /&gt;</span></noscript></a></div></div></div><p data-dcnode-id="1114"><b data-dcnode-id="1116"><img alt="Winter Bucket List" class="alignleft size-full wp-image-58680 lazyloaded" data-dcnode-id="1120" data-sizes="(max-width: 1068px) 100vw, 1068px" data-src="https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png" data-srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-696x378.png 696w" height="580" sizes="(max-width: 1068px) 100vw, 1068px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png&amp;raw" srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-696x378.png 696w" width="1068"><noscript data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">&lt;img class="alignleft size-full wp-image-58680" src="https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png" alt="Winter Bucket List" width="1068" height="580" srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/WinterBucketList-696x378.png 696w" sizes="(max-width: 1068px) 100vw, 1068px" /&gt;</span></noscript><span data-dcnode-id="1117" instrument_node="">After the holidays, making it thru winter can seem daunting. </span></b><span data-dcnode-id="1115" instrument_node="">A bucket list is a great way to help get out of that wintertime rut.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" style="font-weight: 400;"><span data-dcnode-id="1112" instrument_node="">From fun and unique things to do around Des Moines, to creative and boredom-busting ideas you can do from the comfort of your living room, there’s something for every age and stage!</span></span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1108" instrument_node="">Here’s the inside scoop on how to </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/winter-survival/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1107" instrument_node="">survive winter</span></a><span data-dcnode-id="1105" instrument_node=""> in Des Moines (and create some new memories along the way)!</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
</span></span></p><span data-dcnode-id="1100" instrument_node="">
</span><h4 data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">How many items can </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">you</span></i><span data-dcnode-id="1096" instrument_node=""> check off on this winter bucket list for kids and families?</span></h4><span data-dcnode-id="1094" instrument_node="">
</span><h2 data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">30+ Family-Friendly Winter Activities in Des Moines</span></h2><span data-dcnode-id="1091" instrument_node="">
</span><h3 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Explore Des Moines</span></h3><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1081"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Book an igloo </span></strong><span data-dcnode-id="1085" instrument_node="">at </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barntownbrewing.com/igloo" rel="noopener" target="_blank"><span data-dcnode-id="1084" instrument_node="">Barntown Brewing</span></a><span data-dcnode-id="1082" instrument_node="">. Grab some friends and enjoy your own cozy igloo keeping you warm while dining and imbibing outside. See their website for full details. &nbsp;</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1066"><b data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Take in some culture at the </span></b><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.desmoinesartcenter.org/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Des Moines Art Center</span></b></a><span data-dcnode-id="1074" instrument_node="">.&nbsp;</span><span data-dcnode-id="1072" style="font-weight: 400;"><span data-dcnode-id="1073" instrument_node="">It’s free! Check out their </span></span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.desmoinesartcenter.org/calendar/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">calendar</span></span></a><span data-dcnode-id="1067" style="font-weight: 400;"><span data-dcnode-id="1068" instrument_node=""> for fun, family-friendly events like Baby + Me tours and workshops.&nbsp;</span></span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1055"><b data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Get your nature fix at the </span></b><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dmbotanicalgarden.com/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Greater Des Moines Botanical Gardens</span></b></a><b data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">.</span></b><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node=""> Ditch the gloves and hats and enjoy the tropical and temperate oasis in the heart of downtown Des Moines.</span></span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><b data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Burn some energy in the skywalks of downtown Des Moines.</span></b><span data-dcnode-id="1050" style="font-weight: 400;"><span data-dcnode-id="1051" instrument_node=""> Whether you’re pushing a stroller or exploring with bigger kiddos (some even bring little bikes or scooters), there’s lots of room to run and plenty of cars to watch on the streets below.</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1046" style="font-weight: 400;"><span data-dcnode-id="1047" instrument_node="">Have older kids? </span></span><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Take a tour of the Iowa Capitol – it’s quite impressive!</span></b><span data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" instrument_node=""> Tours are free. Click </span></span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legis.iowa.gov/docs/publications/CT/794834.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1040" style="font-weight: 400;"><span data-dcnode-id="1041" instrument_node="">here</span></span></a><span data-dcnode-id="1035" style="font-weight: 400;"><span data-dcnode-id="1038" instrument_node=""> for more information. Due to Covid19 building hours may change. Please call before you visit the Capitol 515-281-5591.</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
</span></span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" style="font-weight: 400;"><span data-dcnode-id="1032" instrument_node="">Check out the metro’s newest entertainment venue. </span><strong data-dcnode-id="1029"><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sparetimeentertainment.com/desmoines/%3Ffbclid%3DIwAR1htGHN5eM7qpVJs7uFdHBRWmx45D3wbJJEtYWVNsS7NMKHlIYoxLW0Vr0" rel="noopener" target="_blank"><span data-dcnode-id="1031" instrument_node="">Spare Time</span></a></strong><span data-dcnode-id="1028" instrument_node=""> in West Des Moines is set to open this Winter and guarantees </span><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">hours of fun.</span></strong></span></p><span data-dcnode-id="1023" instrument_node="">
</span><h3 data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Get Creative</span></h3><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1015"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.triedandtrueblog.com/easy-fake-sand-recipe/" rel="noopener" target="_blank"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Make your own snow!</span></strong></a><span data-dcnode-id="1016" instrument_node=""> Get a big bin and make fake snow inside for the kids to play in without having to get all the gear on and face the cold.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">Got </span><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">boxes</span></strong><span data-dcnode-id="1010" instrument_node=""> leftover from the holidays? Let the kids have them to create cities, games, food stands, robots. A few markers and maybe a little tape can add to hours of creativity.&nbsp;</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1006" style="font-weight: 400;"><span data-dcnode-id="1007" instrument_node="">Want a mom-approved way for your kids to entertain themselves? </span></span><b data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Get a large roll of drawing paper (you can find them at local craft stores), provide some crayons or markers, and sit back and relax.</span></b></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="1000" style="font-weight: 400;"><span data-dcnode-id="1001" instrument_node="">Not a fan of supervising messy craft projects at home? Check out one of the fun, unique classes at</span></span><span data-dcnode-id="999" instrument_node=""> </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pckidscreate/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="997" style="font-weight: 400;"><span data-dcnode-id="998" instrument_node="">Kids Create</span></span></a><span data-dcnode-id="994" style="font-weight: 400;"><span data-dcnode-id="995" instrument_node="">, a mobile art studio offering kid-friendly art classes in and around the Des Moines metro area. Your kids are sure to love the unique event themes and special (animal) guests!&nbsp;</span></span></p><span data-dcnode-id="992" instrument_node="">
</span><h3 data-dcnode-id="987"><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png"><img alt="let it snow printable" class="aligncenter wp-image-48347 size-full lazyloaded" data-dcnode-id="991" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png" data-srcset="https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png 600w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-300x200.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-150x100.png 150w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png&amp;raw" srcset="https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png 600w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-300x200.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-150x100.png 150w" width="600"><noscript data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">&lt;img class="aligncenter wp-image-48347 size-full" src="https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png" alt="let it snow printable" width="600" height="400" srcset="https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow.png 600w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-300x200.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2020/01/snow-150x100.png 150w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></a></h3><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="985" instrument_node="">Download this </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2020/01/LetitSnow.DMMB_.XOLP_.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">FREE Let it Snow printable</span></strong></a><span data-dcnode-id="981" instrument_node=""> from XO-LP and start coloring!</span></p><span data-dcnode-id="979" instrument_node="">
</span><h3 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Cheer on the Home Team</span></h3><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="974" style="font-weight: 400;"><span data-dcnode-id="975" instrument_node="">Go Bulldogs! </span></span><b data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Don your blue and white and cheer on the men and women’s </span></b><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//godrakebulldogs.com/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Drake Basketball teams</span></b></a><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">!</span></b><span data-dcnode-id="965" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node=""> Here’s the </span></span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//godrakebulldogs.com/schedule.aspx%3Fpath%3Dmbball" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node="">schedule</span></span></a><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">.</span></span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="956" style="font-weight: 400;"><span data-dcnode-id="957" instrument_node="">Argh! </span></span><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Attend a </span></b><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bucshockey.com/page/show/537138-home" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Des Moines Buccaneers hockey game</span></b></a><b data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">.</span></b><span data-dcnode-id="945" style="font-weight: 400;"><span data-dcnode-id="948" instrument_node=""> Tickets are affordable, and they boast frequent deal nights.</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
</span></span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Get Outside!</span></h3><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="938" style="font-weight: 400;"><span data-dcnode-id="939" instrument_node="">Kids have energy to burn? </span></span><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Go sledding!</span></b><span data-dcnode-id="935" instrument_node=""> </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//urbandale.org/Facilities/Facility/Details/Winter-Park-46" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="933" style="font-weight: 400;"><span data-dcnode-id="934" instrument_node="">Winter Park</span></span></a><span data-dcnode-id="930" style="font-weight: 400;"><span data-dcnode-id="931" instrument_node=""> is a fun place to visit – it has a free outdoor ice arena, too. Families also rave about the hills at Waveland Golf Course. Be sure to enjoy some hot cocoa when you get home. Pass the marshmallows!</span></span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="927" instrument_node="">Head just a bit north for a little </span><strong data-dcnode-id="923"><span data-dcnode-id="926" instrument_node="">skiing and tubing. </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sevenoaksrec.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="925" instrument_node="">Seven Oaks Recreation</span></a></strong><span data-dcnode-id="922" instrument_node=""> is family-owned and operated and offers year-round outdoor recreation in central Iowa. Winter activities include </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sevenoaksrec.com/ski-iowa-rentals/"><span data-dcnode-id="921" instrument_node="">skiing</span></a><span data-dcnode-id="919" instrument_node="">, </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sevenoaksrec.com/snowboard-iowa-rentals/"><span data-dcnode-id="918" instrument_node="">snowboarding</span></a><span data-dcnode-id="916" instrument_node="">, </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sevenoaksrec.com/snow-tube-iowa-rentals/"><span data-dcnode-id="915" instrument_node="">snow tubing</span></a><span data-dcnode-id="913" instrument_node="">.&nbsp; Check their website for schedules and pricing.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="903"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Take a hike! </span></strong><span data-dcnode-id="908" instrument_node="">Bundle up and enjoy beautiful winter scapes along a </span><strong data-dcnode-id="905"><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyinyourstate.com/iowa/iowa-winter-hikes-ia/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="907" instrument_node="">hike</span></a></strong><span data-dcnode-id="904" instrument_node=""> in the metro area and beyond.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="901" instrument_node="">Try your hand at a </span><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">new winter sport </span></strong><span data-dcnode-id="898" instrument_node="">at </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jesterparknaturecenter.com/plan-your-visit/things-to-do/" rel="noopener" target="_blank"><span data-dcnode-id="897" instrument_node="">Jester Park.</span></a><span data-dcnode-id="895" instrument_node=""> Rent cross-country skis or snowshoes and enjoy the sites of the park during winter.</span></p><span data-dcnode-id="893" instrument_node="">
</span><h3 data-dcnode-id="888"><img alt="Bucket List Library Family" class="alignleft size-full wp-image-58654 lazyloaded" data-dcnode-id="892" data-sizes="(max-width: 1068px) 100vw, 1068px" data-src="https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png" data-srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-696x378.png 696w" height="580" sizes="(max-width: 1068px) 100vw, 1068px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png&amp;raw" srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-696x378.png 696w" width="1068"><noscript data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">&lt;img class="alignleft size-full wp-image-58654" src="https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png" alt="Bucket List Library Family" width="1068" height="580" srcset="https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family.png 1068w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-300x163.png 300w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-1024x556.png 1024w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-768x417.png 768w, https://desmoines.momcollective.com/wp-content/uploads/2021/12/Bucket-List-Library-Family-696x378.png 696w" sizes="(max-width: 1068px) 100vw, 1068px" /&gt;</span></noscript><span data-dcnode-id="889" instrument_node="">Indoor Reading Fun</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">Spend an afternoon at the library! </span></span><b data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Here’s a list of all the </span></b><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dmpl.org/locations-hours" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Des Moines Public Library</span></b></a><b data-dcnode-id="878"><span data-dcnode-id="879" instrument_node=""> locations and hours.</span></b></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="875" instrument_node="">Have a family </span><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">reading challenge, </span></strong><span data-dcnode-id="872" instrument_node="">set goals, and have special prizes(bookmarks, book-themed meal, etc.), or check your library for programs like Waukee Public Library’s </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//waukeepubliclibrary.org/winter" rel="nofollow noopener noreferrer" target="_blank"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Ticket to Ride</span></strong></a><span data-dcnode-id="868" instrument_node="">.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="865" instrument_node="">Find a book or series to read through as a family with a </span><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">movie night</span></strong><span data-dcnode-id="862" instrument_node=""> goal. Check out this list of </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aliciahutchinson.com/books-made-into-movies/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="861" instrument_node="">children’s books made into movies</span></a><span data-dcnode-id="859" instrument_node="">.</span></p><span data-dcnode-id="857" instrument_node="">
</span><h3 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Have Fun at Home</span></h3><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849"><b data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Set up an indoor obstacle course.</span></b><span data-dcnode-id="850" style="font-weight: 400;"><span data-dcnode-id="851" instrument_node=""> Whether your home is big or small, a little rearranging can turn a living room into a test track! Bring in bikes, scooters, Power Wheels, Cozy Coupes, play tents, and tunnels.</span></span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><b data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Bring winter fun inside.</span></b><span data-dcnode-id="844" style="font-weight: 400;"><span data-dcnode-id="845" instrument_node=""> Scoop up some snow and place it into big bowls or plastic containers. Add food coloring and measuring cups, and you’ve got a good twenty minutes of solid entertainment for kids of all ages!</span></span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="827"><b data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Enjoy some endorphins with a </span></b><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/just-dance-have-a-toddler-dance-party/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">family dance party</span></b></a><b data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">.</span></b><span data-dcnode-id="833" style="font-weight: 400;"><span data-dcnode-id="834" instrument_node=""> Turn off the video games and turn up the music! Create a Spotify playlist with some family-friendly tunes (hey, Kidz Bop isn’t </span></span><i data-dcnode-id="830"><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node="">so</span></span></i><span data-dcnode-id="828" style="font-weight: 400;"><span data-dcnode-id="829" instrument_node=""> bad….) and get your boogie on!</span></span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="824" style="font-weight: 400;"><span data-dcnode-id="825" instrument_node="">Warm-up in the kitchen! </span></span><b data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Have the kids help you make a pot of soup</span></b><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node="">. Here are our three favorite&nbsp;</span></span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/soup-recipes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="818" style="font-weight: 400;"><span data-dcnode-id="819" instrument_node="">soup recipes</span></span></a><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node=""> to try!</span></span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="812" instrument_node="">Set up a </span><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">hot cocoa bar. </span></strong><span data-dcnode-id="809" instrument_node="">Pour some hot cocoa and let the family top their own with things like mini marshmallows, whipped cream, peppermint sticks, chocolate chips, or whatever your favorites are. For even more fun, grab some </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/where-to-buy-hot-cocoa-bombs/" rel="noopener" target="_blank"><span data-dcnode-id="808" instrument_node="">Hot Cocoa Bombs</span></a><span data-dcnode-id="806" instrument_node=""> ahead of time!</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="794"><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Go camping in your living room</span></b><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">! Dig out the tent and sleeping bags and set up a </span></span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crateandbarrel.com/plush-campfire-set/s247298%3Fst%3DPlush%2520Campfire%2520Set%26ta%3Dcampfire%26rac%3Dp1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="798" style="font-weight: 400;"><span data-dcnode-id="799" instrument_node="">pretend campfire</span></span></a><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node=""> for a fun indoor campout at home. Don’t forget to make a stop at the grocery store for marshmallows, chocolate, and graham crackers, because you can’t have a campout without s’mores!&nbsp;</span></span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="791" style="font-weight: 400;"><span data-dcnode-id="792" instrument_node="">Get physical! </span></span><b data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Bring a small basketball hoop inside, set up a small trampoline, or push all the family room furniture to the side for a rousing soccer game.</span></b><span data-dcnode-id="787" style="font-weight: 400;"><span data-dcnode-id="788" instrument_node=""> Tour your garage and challenge yourself to put an indoor twist on the fun items you already have. A little imagination goes a long way, and </span></span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/3-easy-indoor-activities-winter-survival/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="785" style="font-weight: 400;"><span data-dcnode-id="786" instrument_node="">kids beating cabin fever</span></span></a><span data-dcnode-id="782" style="font-weight: 400;"><span data-dcnode-id="783" instrument_node=""> saves your sanity, too!</span></span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="779" instrument_node="">Check out some of our other resources for indoor activities, </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/toddler-activities/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="778" instrument_node="">7 Easy Toddler Activities</span></a><span data-dcnode-id="776" instrument_node=""> &amp; </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/indoor-activities/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="775" instrument_node="">50+ Things To Do When You’re Stuck at Home</span></a></strong></p><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Burn Some Energy</span></h3><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="766" style="font-weight: 400;"><span data-dcnode-id="767" instrument_node="">Too cold to go outside? </span></span><b data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Channel your inner ice skater with a stop at </span></b><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oakmoorsports.com/schedule-ice-rink/" rel="nofollow noopener noreferrer" target="_blank"><b data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Metro Ice Sports Facility</span></b></a><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">, which features two indoor NHL-sized rinks.</span></b><span data-dcnode-id="757" style="font-weight: 400;"><span data-dcnode-id="758" instrument_node=""> Skate rental is $3, and kids 12 and under skate for $5. Admission for adults is $8.</span></span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">Everyone thinks of ice skating during the winter, but rollerskating is also a fun way to burn some energy and beat cabin fever. </span></span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skatenorthdsm.com/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Skate North Incrediroll</span></b></a><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node=""> in Des Moines has open skates as well as lessons — check out their </span></b><b data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">schedule</span></b><b data-dcnode-id="744"><span data-dcnode-id="745" instrument_node=""> to find the right time and price for your family.</span></b></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="732"><b data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Try your hand at cosmic bowling at Warrior Lanes in Waukee.</span></b><span data-dcnode-id="738" style="font-weight: 400;"><span data-dcnode-id="739" instrument_node=""> The bowling center features family bowling parties that include glow-in-the-dark bowling, mom-approved music, and yummy food. Check their schedule for </span></span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//warriorlanes.com/bowling/specials-family-bowling-events/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="736" style="font-weight: 400;"><span data-dcnode-id="737" instrument_node="">upcoming events</span></span></a><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">.</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">Sometimes, you just need to get out of the house. But where do you go safely? </span></span><b data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Check out </span></b><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//desmoines.momcollective.com/des-moines-indoor-play/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">our guide to indoor play areas</span></b></a><b data-dcnode-id="720"><span data-dcnode-id="723" instrument_node=""> in Des Moines.</span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">
</span></b></p><span data-dcnode-id="718" instrument_node="">
</span><h3 data-dcnode-id="715"><i data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">What are your go-to’s for winter fun and beating cabin fever?&nbsp;</span></i></h3><span data-dcnode-id="714" instrument_node="">
