</span><div class="card-text" data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Kids love mysteries, and that's what makes a visit to America's Stonehenge in Salem, New Hampshire, a great trip for your family. A half-mile trail through the pine woods leads to megaliths, stone chambers, a rock altar, and other strange artifacts. Were they built by colonial farmers or Native Americans? Or constructed by ancient people -- Druid priests, perhaps -- who left similar monuments all over great Britain. Adding to the mystery is the fact that you'll find  megaliths of the same type scattered around New England. Our site, however, is one of the largest collections. What's more, many other sites are on private property, and off limits to visitors. So come visit our woods, and find out why they've left scholars confused for decades.</span></div><span data-dcnode-id="3597" instrument_node="">

</span><div class="card-text" data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Here is a farm with 200 years experience the whole family will enjoy with scenic views, four season fun, and lots of maple syrup, jams, jellies and other goodies to discover. The Morse’s do it right in so many ways  whether its showing you their maple syrup process  or presenting displays and artifacts and a humorous educational video in the Woodshed Theater. There are monthly events. a nature trail, a country store filled with local crafts and gifts, and an outdoor farm life museum. The Ski Touring Center has cross country and snowshoe trails for sliding, snowmobiling and skating. Once sugarin’ time comes around in March, take part in their annual maple tastings. And don’t miss the sugar on snow.</span></div><span data-dcnode-id="3543" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">The kids will love driving through the clouds to the summit of Mount Washington!</span></p><span data-dcnode-id="3498" instrument_node="">
</span><div class="card-text" data-dcnode-id="3494"><span data-dcnode-id="3497" instrument_node="">For over 150 years, families have enjoyed visiting the legendary Mt. Washington Auto Road, a one-of-a-kind experience offering ever-changing weather extremes and panoramic views as you climb to the highest peak in the Northeast.</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">
Choose to drive your own car or take a comfortable, 2 or 3-hour guided tour led by one of our accomplished and dedicated guides. Adventure can be found all the way up to the 6,288-foot peak where, on a clear day, visitors can discover panoramic views spanning the mountains and valleys of New Hampshire, Maine, Vermont, and north into Canada! Rain or shine, and included with your Auto Road ticket, the entire family will love the new interactive museum “Extreme Mount Washington” located on the summit, brought to you by the Mount Washington Observatory.</span></div><span data-dcnode-id="3493" instrument_node="">

</span><div class="card-text" data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Kids of all ages (and their adults) will love all the interactive habitats at Mystic Aquarium. Plus: dinosaurs and whales! Visitors can touch stingrays and Epaulette sharks in pools, walk through a digital interactive watershed model and watch as breathtaking Beluga whales glide through the Arctic Coast, the largest outdoor beluga whale habitat in the nation. Watch as seals and sea lions are fed or trained, then head to Jurassic Giants to see enormous animatronic dinosaurs “come to life” and enjoy two 4-D movies that combine your senses of smell, touch, and more. Check out Japanese Spider Crabs in the Weird and Wonderful exhibit or paint with a seal in a scheduled animal encounter. Sandwiches and snacks are available at the Saltwater Cafe.</span></div><span data-dcnode-id="3439" instrument_node="">

</span><div class="card-text" data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">This is family fun on a grand scale with activities and excitement to create memories that last a lifetime. This amazing flight park in the Connecticut River Valley in New Hampshire is your launching point to enjoy scenery you can see from the ground or high up on hang gliders, paragliders and zip lines. Bring the gang and stay in a variety of camping options from small cabins and platform tents to your own plot of ground with restrooms and shower facilities available to all campers. Get into a game of laser tag, kayak together, go fishing or swimming, light up a barbecue and have a picnic. Great for day long adventures or weekend getaways, birthday parties and family events.</span></div><span data-dcnode-id="3357" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Pure Joy, Family Style.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><div class="card-text" data-dcnode-id="3298"><em data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Santa's Village is now accepting online ticketing for Summer 2022! Opening in May!</span></em><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">
Santa’s Village is Santa’s summer home in the White Mountains, and named by TripAdvisor's Travelers’ Choice Awards as one of the Top 25 Amusement Parks in the USA - and number one in New England for straight years in a row. With reindeer and elves, cookies and ice cream, a roller coaster, a log flume, a monorail, and plenty of other rides and activities, it’s everything you’d imagine Santa’s favorite theme park to be. Admission covers an entire day of memory-making for families with young children. For nearly 70 years and three generations, from our family to yours – Santa’s Village is pure joy, family style.</span></div><span data-dcnode-id="3297" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">At its core, apple-picking at this orchard is the ultimate in great family activities</span></p><span data-dcnode-id="3246" instrument_node="">
</span><div class="card-text" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Years from now, when your kids are old enough to reminisce about their childhood, it’s a guarantee that one of the family activities they will remember most fondly is apple-picking. So start to create that memory today at the Scott Farm Orchard, a 571-acre farm where “pick your own” means gorgeous, ecologically grown heirloom apples and strolls through beautiful surroundings. The farm, in active cultivation since 1791 and now owned by landmark Trust USA and listed on the National Register of Historic Places, grows over 130 varieties of apples, including Jonagold, Gala, Honeycrisp (a kids’ favorite) and Fuji. Stop in at the Farm market, with pies from fresh-picked fruits, apple cider, pumpkins and other regional fare. Check the website for pick-your-own updates.</span></div><span data-dcnode-id="3243" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Family memories are sure to be made at this activity-filled lakeside resort</span></p><span data-dcnode-id="3195" instrument_node="">
</span><div class="card-text" data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Make The Margate on Winnipesaukee, right on the pristine lake’s shore, part of your family’s memories and traditions. You’ll experience all the comforts of home in your family suite, with mini fridge and free wifi. Resort activities include sunbathing and swimming off the 400-foot private sandy beach. Swim out to the floating raft, or rent a kayak or stand-up paddle board to glide around the islands of Paugus Bay. There are summertime beach campfires (don’t forget your s’mores), fireworks and movies as well as a game room. There’s an outdoor pool and a large indoor heated pool and oversized whirlpool. Nearby activities include a huge arcade center, farms to visit, lake cruises, old-fashioned train rides and guided rail bike tours.</span></div><span data-dcnode-id="3192" instrument_node="">

</span><div class="card-text" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Get yourself and you kids up and moving, enjoy some (overdue?) exercise for yourself, and build family bonds with a day or afternoon at Central Rock Gym Warwick, an indoor rock climbing facility that welcomes everyone. Kick it free-style and just spend some time messing around on the walls with your kids, or get more serious by joining a coach-led weekly climbing team. The 20,000-square-foot facility offers space for adult or kid birthday parties. Try staffed climbing, when experts take you out on high wall ‘top rope’ climbing in any area of our facility. Create a family outing tradition!</span></div><span data-dcnode-id="3132" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Otters, touch tanks with sharks, an aviary with lorikeets: Kids will love this aquarium</span></p><span data-dcnode-id="3093" instrument_node="">
</span><div class="card-text" data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">The Living Shores Aquarium, next door to Story Land, represents the best sort of family activity: where the kids learn something and have a great time. They will love the touch pools, interacting with sting rays, urchins, shrimp, horseshoe crabs – and friendly sharks! In the walk-through aviary, tropical lorikeets will fly from perch to perch overhead, and you might spot a red-foot tortoise or two. And everyone will enjoy watching the otters entertain with their mischievous antics. There’s a digital sandbox where kids can dig and discover marine life, a drawing station and exhibits showcasing colorful clownfish, lake trout and denizens of Caribbean reefs. The Bistro restaurant offers breakfast and lunch items, snacks – and Dunkin’ coffee.</span></div><span data-dcnode-id="3090" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">History in a New Light</span></p><span data-dcnode-id="3036" instrument_node="">
</span><div class="card-text" data-dcnode-id="3031"><span data-dcnode-id="3035" instrument_node="">Plimoth Patuxet Museums creates powerful encounters with history built on thorough research about the Indigenous and European people who met along these shores of change. At our immersive, outdoor living history sites you’ll encounter costumed actors portraying iconic figures such as William Bradford and Myles Standish, as well as contemporary interpreters who discuss the Indigenous heritage of the Northeast and 17th-century life-ways of a culture that continues to thrive today. Permanent exhibits that tell the complex and interwoven stories of two distinct cultures – Indigenous and English  –  include the 17th-Century English Village, Patuxet Homesite, Plimoth Grist Mill, and </span><em data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Mayflower II</span></em><span data-dcnode-id="3032" instrument_node="">.</span></div><span data-dcnode-id="3030" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Family-centered activities a particular specialty at this art museum</span></p><span data-dcnode-id="2979" instrument_node="">
</span><div class="card-text" data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Looking for an art museum that will engage the kids as well as the adults? At the Worcester Art Museum, families are a top priority. That means new interactive elements in many galleries (some that involve iPads), special family guides, 20-minute “zip tours: that focus on one artist or work of art, scavenger hunts and other fun activities from drawing to designing your own jousting helmet. (The kids will love the chivalric arms and armor collection.) Special touch carts allow children to, yes, touch things in a museum! On community days, there’s art-making, storytime, demonstrations and music-making. The museum, with exhibits ranging from medieval to modern times, also has a quiet-time Family Nook. Check the website for timed-admission information and safety protocols.</span></div><span data-dcnode-id="2976" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Families valued by this historic South Shore city</span></p><span data-dcnode-id="2919" instrument_node="">
</span><div class="card-text" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">From the home of one of the nation’s first families, the city of Quincy offers your family a variety of activities from which to plan a day outing or a long vacation. Take the trolley trip at Adams National Historical Park to see the home of John and John Quincy Adams, and the nation’s first presidential library, boat over to Boston Harbor Islands National Park, sunbathe at Wollaston Beach (or one of 10 other city beaches), fish from a pier or just relax at one of 52 parks, many with playgrounds, picnic areas and ball fields. Enjoy autumn colors strolling marsh-side and riverside trails. In the winter, go ice skating or try skiing or snow-shoeing at Blue Hills Reservation.</span></div><span data-dcnode-id="2916" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Fishing excursions, nature cruises fun-filled activities for the whole family</span></p><span data-dcnode-id="2865" instrument_node="">
</span><div class="card-text" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">It’s no wonder that dozens of the “regulars” at Black Hawk Sportfishing out of Niantic, Conn., are kids. Fishing cruises are fun-filled activities for the whole family, and there’s no minimum age for children. Experienced captains take you out on one of the fastest, safest and most comfortable boats of its kind in New England to catch everything from stripers and bluefish to cod, fluke and tuna. Bring a cooler or grab a burger, a soda and snacks on board. The kids might even get a chance to honk the horn or win a t-shirt! Or, if you’re not up for fishing, take a nature cruise, seal cruise, eagle-watch cruise or sunset cruise. Private charters for kids’ birthday parties are available.</span></div><span data-dcnode-id="2862" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Outdoor Fun That's Just Right for The Entire Family</span></p><span data-dcnode-id="2814" instrument_node="">
</span><div class="card-text" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">At the Great Glen Trails in Pinkham Notch, N.H., we offer adventures in all shapes and sizes. During the spring and summer you can set out on a hike, run, or bike ride on any of our scenic trails through New Hampshire's White Mountains. Or join us for a guided bird watching tour or a paddling trip on the Androscoggin River. In winter, the cross country skiing and snowshoeing is absolutely glorious. Our trail system of easy and rolling terrain allows skiers of all abilities to find the right level of activity, challenge, and fun. The trails are groomed with both double tracks and a skating lane and run through the forests at the base of Mt. Washington. And the SnowCoach makes everything accessible to all, with or without skis. It's the natural vacation plan for you and your family.</span></div><span data-dcnode-id="2811" instrument_node="">

</span></h5><span data-dcnode-id="2778" instrument_node="">
</span><p class="card-text font-weight-bold" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">From skiing to shopping, there’s something fun for every member of the family</span></p><span data-dcnode-id="2775" instrument_node="">
</span><div class="card-text" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Bring the family to Bethlehem, N.H., and be prepared to be entertained, White Mountains-style. There’s fantastic alpine skiing and snowboarding, of course, at six nearby mountains: Cannon, Bretton Woods, Attitash, Loon, Waterville Valley and Wildcat. Miles of cross-country skiing, snowshoeing trails, snowmobile trails, and fat biking trails wind through the area. In the warmer months, those trails are great for biking and hiking for all ages. There’s also tennis and basketball on public courts, two golf courses, a movie theater, town pool, pristine rivers to cool yourself down and a lively downtown area with all sorts of shops and cafes. It’s a short drive to a variety of attractions including Santa’s Village, Story Land, Whale’s Tale Waterpark, the Flume Gorge and the Mount Washington Cog Railway.</span></div><span data-dcnode-id="2772" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Great music, great venue, great family atmosphere make these concerts a must</span></p><span data-dcnode-id="2727" instrument_node="">
</span><div class="card-text" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">A second season of exciting Concerts in the Clouds at spectacular Castle in the Clouds has been announced by Great Waters, which has been entertaining visitors to the New Hampshire Lake Region for over 25 years. Opening night kicks off a stellar season with “1964: The Tribute,” a popular Beatles performance. The summer lineup continues with Broadway artist Michael Cavanaugh, an ELO tribute band and, a must for those who loved the ultra classic sound of Fleetwood Mac’s “Rumours,” the Classic Albums Live presentation of “Rumours” on Aug. 6. Act fast if you want tickets to “One Night of Queen: Gary Mullen &amp; The Works.” Jaw-dropping mountain views, hiking trails, a duck pond and historic Lucknow Mansion add to this not-to-to-missed family event.</span></div><span data-dcnode-id="2724" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Lots to do and see from your perfect perch in the family-friendly Okemo Valley</span></p><span data-dcnode-id="2682" instrument_node="">
</span><div class="card-text" data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Fun activities and attractions, comfortable accommodations, countless dining options: It’s no wonder families love visiting and staying in the Okemo Valley. Places to play include ski slopes and trails, skating rinks, rock-climbing centers, hiking trails and bike parks. You can visit the baby goats on a farm, fly down the mountain on a coaster track or through the trees on a zip line. Pick apples in an orchard or go on a snowmobile tour. Take a scenic train ride, go horseback riding or hang gliding. Lots of great places to shop, too, from country stores to unique boutiques. Stay in a mountain resort with indoor and outdoor pools, a hotel with a playground or a tucked-away inn with family-style dining.</span></div><span data-dcnode-id="2679" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Full-dome Plymouth planetarium a shining star for visitors of all ages</span></p><span data-dcnode-id="2628" instrument_node="">
</span><div class="card-text" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">The sky’s the limit for visitors to the W. Russell Blake Planetarium, the only 4K full-dome planetarium south of Boston. As you sit back in angled chairs, you’ll gaze at a ceiling filled with stars and planets while learning to identify them and how to use a star map (that you can take home). It’s a spectacle of light and color not to be missed. Regular seasonal stargazing programs take advantage of the high-tech surround-sound system and jaw-dropping full-dome views.</span></div><span data-dcnode-id="2625" instrument_node="">
</span></div><span data-dcnode-id="2623" instrument_node="">

</span><div class="card-text" data-dcnode-id="2579"><span data-dcnode-id="2582" instrument_node="">African lions, ring tail lemurs, prairie dogs, and so much more for families to see and do at York’s Wild Kingdom where kids and parents come to play.  Observe animals from A (alligators) to Z (zebras) in beautifully landscaped exhibits, walk into the colorful Butterfly Kingdom, feed and pet African pygmy goats, deer and ducks.  You can also ride a Ferris wheel, carousel or play a round on the mini golf course.  Bring a picnic lunch or feast from our snack bars, ice cream and fried dough stands. </span><em data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">York’s Zoo will be open daily starting 5/29-9/26/21, 10am-5pm daily! Amusement park is open weekends only 5/29-6/25/21, then daily 6/26-9/6/21, hours 11:30am-5pm</span></em></div><span data-dcnode-id="2578" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Thrill ride up Mt. Washington continues to delight railroad fans of all ages</span></p><span data-dcnode-id="2530" instrument_node="">
</span><div class="card-text" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Families from all over the world come to the majestic White Mountains of New Hampshire to be thrilled by the ride up Mt. Washington on the historic Cog Railway. The dramatic ascent to the summit of the Northeast’s highest peak features amazing views of lush forests, deep chasms and the steepest railroad trestle in the world in Jacob’s Ladder. (Yes, the trees are straight: It’s you who are at an angle!) Kids will love the commentary of the entertaining and knowledgeable engineer and brakeman or brakewoman. The journey begins at a base station with a great interactive museum and observation deck and, at the summit, there’s an interactive weather exhibit as well as a summit post office to mail postcards direct from the mountain. Trains run from late April through November.</span></div><span data-dcnode-id="2527" instrument_node="">

</span><div class="card-text" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">New England’s largest zoo is opening April 21 for the 2014 season with an all new prairie dog digs, two toed sloths and cheetahs. Learn about your favorite animals at the Earth Discovery Center. You’ll find 115 species of animals large and small on foot, from the Woodlands Express train ride or high above on the Skyfari Sky Ride, Meet elk, native birds, painted turtles and toads, Step into the 35 acre deer forest, ride over the playful chimpanzees, stately camels, scary alligators, colorful zebra and ostrich. Enjoy a day’s worth of shows, animal encounters, a petting zoo, parakeet aviary and animal exhibits to take your breath away with big cats, white rhino, snakes, dragons, and WATCH OUT - the popular Madagascar Hissing Cockroach. Always free parking and handicap accessible.</span></div><span data-dcnode-id="2476" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Must-see family vacation destination includes outdoor activities, interactive museums</span></p><span data-dcnode-id="2419" instrument_node="">
</span><div class="card-text" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Family-friendly Plymouth has been a must-see vacation destination for kids and parents for generations. It may start with trips to Plymouth Rock and the majestic Mayflower II, but pretty soon you’ll discover a host of other fun activities, from whale watches and paddleboat cruises to ghost tours and playgrounds. At Nelson Memorial Beach Park, there’s a splash pad area, biking and hiking path as well as a great beach. There’s camping, canoeing, kayaking, fishing and swimming in state and local parks, with pleasant ponds for picnicking and boating. There are local theaters, interactive museums, all kinds of restaurants and unique shops. Visit the Plimoth Patuxet Museums to see a dugout canoe being made or to help soldiers in a muster drill! Please call 1.800.USA.1620, or visit our website to learn more about these activities and others to prepare for your trip to Plymouth.</span></div><span data-dcnode-id="2416" instrument_node="">

</span><div class="card-text" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Fun for all ages is an understatement at New Hampshire’s two Chuckster’s locations. At Chuckster’s Ice Cream &amp; Miniature Golf in Hooksett, you can tee off from inside a fire tower on a multi-level mini golf course (one of two huge courses) and, after 18 amazing holes, adjourn to the ice cream barn. At Chuckster’s Family Fun Park in Chichester, mini golf is one of 17 unique attractions, including a go-kart speedway, a 27-foot climbing wall, and Timbertrek where you go from tree to tree on everything from a horse saddle to a snowboard. Fun games include Balloon Blast, Shoot-N-Shower (foul-shot loser gets a watery surprise) and Light Frenzy. Need recharging? There’s ice cream, pizza, chicken wings and more.</span></div><span data-dcnode-id="2365" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Something fun for everyone, from a Splash Pad to a dinosaur trail, at this adventure park</span></p><span data-dcnode-id="2314" instrument_node="">
</span><div class="card-text" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">From the tiniest tots to young-at-heart adults, there is something for everyone to do, and love doing, at The Dinosaur Place at Nature’s Art Village. At the Splash Pad, a zero-depth water playground, there’s a separate area for infants to toddlers, while older kids will love the water cannons, dino rib cage waterfall and dumping buckets. Over at T-rex Tower, obstacles include zip lines, slides and bridges. There’s also a tricky dino maze and, of course, the 50 life-sized dinosaurs who inhabit 1.5 miles of easy-to-travel trails (and caves!). Adults will also enjoy Copper Creek Mini Golf and the variety of shops, from those selling fossils and minerals to an ever-changing antiques marketplace.</span></div><span data-dcnode-id="2311" instrument_node="">

</span><div class="card-text" data-dcnode-id="2247"><em data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Opening for the season May 1st, 2022!</span></em><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">
Sail away aboard the traditional sailing schooner Argia for a journey into the past. The adventure begins as the Ship's horn blows and you depart from Mystic's historic Bascule Bridge, a national historic landmark. As the ship travels down the Mystic River, join the crew in raising sail the old-fashioned way...or lend a hand steering the ship! Morgan Point Lighthouse and the quaint fishing village of Noank greet you at the river’s mouth, followed by islands and peaceful sailing.</span><br data-dcnode-id="2252"><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">
</span><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">May 1st through mid-October, choose a day or sunset cruise aboard ARGIA!</span></strong></div><span data-dcnode-id="2246" instrument_node="">

</span><div class="card-text" data-dcnode-id="2192"><em data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Opening for the Season on Memorial Day Weekend!</span></em><br data-dcnode-id="2195"><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">
Write your own tale of adventure with a day at Story Land! Every moment is an exciting chapter in your book of fun family memories. You’ll find your favorite Nursery Rhymes come to life along the pathways of Story Land. Experience an eye-popping kid friendly magic show at Loopy Lab and sing along with Daniel Tiger during his NEW Grr-ific Stage Show. Make a splash on the Bamboo Chutes, meet real-life storybook characters and scream aboard our thrilling roller coaster, Roar-O-Saurus. Have dinner with Humpty Dumpty and friends or sit with Cinderella at Tea Time. Uncover prehistoric fossils and enjoy an exciting array of games, shows and rides! There’s even a free kennel for your pooch. Then snuggle up together in one of the great family lodgings nestled among the scenic White Mountains.</span></div><span data-dcnode-id="2191" instrument_node="">

</span><div class="card-text" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Crab Apple ran the first ever raft trips in 1989 on the dam controlled Deerfield River. The excitement continues on a wide range of full day and half day trips. Kids 8 and up can enjoy rafting trips on mild Class 1-3 rapids, teens on more aggressive Class 3-4 rapids, and those age 5 and up will have a great fun time in guided rafts or inflatable kayaks on mild whitewater. The guides are great with kids of all ages and help rafters explore the Deerfield sharing information about local history, wildlife and hydrology along the way. There’s great food, hospitality and service, the best equipment, and riverside base camps with the comforts and convenience to make your rafting adventure one that you’ll never forget.</span></div><span data-dcnode-id="2134" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2088"></p><span data-dcnode-id="2087" instrument_node="">
</span><div class="card-text" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">A sunny weekend any time of the year draws flocks of families to Goddard Park, Rhode Island’s most popular park (which is actually located at the end of a long country road). With its spacious lawns and forested walking trails, the park is a serene place, but it is also a place for family play. The park has 355 picnic tables, some with grills, where families enjoy restful gatherings. Eleven game fields and lots of open space invite kids for Frisbee and games. A sandy swimming beach is a big draw on hot days. The park also has a performing arts center for weddings and other family gatherings.</span></div><span data-dcnode-id="2084" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Family-friendly programs educate and entertain in and along Narragansett Bay</span></p><span data-dcnode-id="2045" instrument_node="">
</span><div class="card-text" data-dcnode-id="2039"><span data-dcnode-id="2044" instrument_node="">On land and sea, you can’t beat the family activities offered by the nonprofit Save The Bay organization. Among the family-friendly public programs led by trained educators and naturalists to connect the community to the bay all year long are seal-watch and nature cruises, ranging from one to one-and-three-quarters hours, and daylong lighthouse tours that motor by up to 20 lighthouses and include lunch and exploration at Rose Island. At the very interactive Exploration Center and Aquarium in Newport, three touch tanks and dozens of exhibits get you up close and personal to skates, dogfish sharks, urchins, crabs, lobsters, seahorses and turtles – all in all, more than 40 species from the bay and Rhode Island waters.</span><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">
</span><em data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Boat tours depart from Newport, Westerly, and Providence RI.</span></em></div><span data-dcnode-id="2038" instrument_node="">

</span><div class="card-text" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">It’s no wonder families flock to the Roger Williams Park Zoo &amp; Carousel Village: There’s so much to do! Watch an African elephant take a bath or a Masai giraffe reach high for a snack. See if you can spy the secretive snow leopard or the shy red wolf. From bison to bears to bald eagles, the zoo’s animals will amaze you. Even explore amongst free-roaming sloths, birds and monkeys at the Faces of Rainforest. Time to dine? Grab a gourmet burger or made-to-order salad at a comfortable concession. Glide 115 feet above the zoo in side-by-side seats on the Soaring Eagle Zip Ride. Or visit the nearby Carousel Village, ride a colonial horse on a classic carousel or take a train ride.</span></div><span data-dcnode-id="1981" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Every day in the White Mountains brings a new adventure or activity for fun-seeking families</span></p><span data-dcnode-id="1924" instrument_node="">
</span><div class="card-text" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">You know what people who bring their families to the White Mountains never hear? The words “I’m bored.” There is simply too much to do! Shoot down North America’s longest alpine slide, visit a park where fairy tales come to life, explore the area in a Side X Side vehicle or on a cog railway. Let the kids poke their way through glacial caves, go mountain biking at a ski resort, slide and splash their way through a world-class water park. Learn about loons at a wildlife center or about rural living at a country doctor museum. Visit an aquarium, the largest arcade in the world or a sled dog kennel. From disc golf to gondola rides, there’s a thrilling family experience around every corner in the White Mountains. To find out more, follow our link above or call us today at 1-800-346-3687.</span></div><span data-dcnode-id="1921" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Family activities abound from one end of this Cape-to-island ferry voyage to the other</span></p><span data-dcnode-id="1864" instrument_node="">
</span><div class="card-text" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Fabulous beaches, scenic hikes and bike rides, great restaurants, interesting shops and museums: There is so much for your family to love about Cape Cod and Martha’s Vineyard! Connecting these two vacationlands is the Island Queen passenger ferry, which turns the 35-minute sail from Falmouth to Oak Bluffs into a fun activity of its own, with amazing views and a full-service snack bar. On the Vineyard, you can visit the Whaling Museum in Edgartown, the “Flying Horses” carousel in Oak Bluffs or the astonishing red clay cliffs of Aquinnah. In Falmouth, there’s the Shining Sea Bikeway, Falmouth Museums on the Green and Cape Cod League baseball. And of course the Cape has New England’s most beautiful beaches and quaint seaside towns.</span></div><span data-dcnode-id="1861" instrument_node="">

</span><div class="card-text" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Families who immerse themselves in the varied exhibits at the Concern Museum find that learning about America’s history can be both enlightening – and fun! Start at the Family Station to get a Family Trail guide and drawing materials so you can hunt for objects, learn fun facts and and sketch favorite objects (don’t forget to share your artwork). Favorite objects include Native American stone tools and one of the lanterns that signaled Paul Revere to take his famous ride. There are several hands-on areas as well as activities to take home. The museum has plenty of places to rest, chat and draw – and strollers are welcome! Check the online calendar for special holiday and school vacation events, crafts sessions and other group activities.</span></div><span data-dcnode-id="1807" instrument_node="">

</span><div class="card-text" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">An adventure awaits family members of all ages at the It Adventure Ropes Course inside Jordan’s Furniture. The world’s largest indoor ropes course includes more than 100 exciting challenges, from crisscross angled rope ladders and zig-zag swinging beams to cargo nets and tricky bridges. And, zip rails that sit at heights up to 56 feet let you fly over a liquid fireworks water show from one end of the course to the other. A full-body harness and sling line keeps  you connected the entire time. For children under 48 inches tall, there’s the fun Little It course, with platforms less than three feet above the ground and adult chaperones nearby to lend assistance if needed.</span></div><span data-dcnode-id="1750" instrument_node="">

</span><div class="card-text" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Family fun comes easily at this park, whose very name, for Rhode Islanders, recalls a large, fabulous amusement park that entertained people with neon-lit splendor on this site for almost 150 years. The Rocky Point Park rides are gone, but families now enjoy walks along the elevate coast, picnics, playing on the wide fields, and fishing. A large, new fishing pier will offer plenty of space to cast a line off a planned 260-foot-long wooden walkway leading from the existing blacktop path out to a 21-by-111-foot main deck above the water’s surface.</span></div><span data-dcnode-id="1697" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">From exploring mansions to feeding pond fish, there’s a lot for kids to do at Castle in the Clouds</span></p><span data-dcnode-id="1658" instrument_node="">
</span><div class="card-text" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">There are so many things for kids to explore at Castle in the Clouds, they’ll want to visit more than once! At the 1914 Lucknow Mansion, they can check out vintage clothing and, on the basement tour, see how the servants lived, or go on a scavenger hunt. (Check the website for other interactive activities.) Outside, there are 28 miles of hiking trails and carriage roads, many of them going past cascading waterfalls. In the winter, the trails are perfect for skiing and snowshoeing. After grabbing a snack and an ice cream at the Cafe in the Clouds, it’s a guarantee that your children will want to buy some fish food there to toss to the trout in Shannon Pond, who jump out of the water for the food.</span></div><span data-dcnode-id="1655" instrument_node="">

</span><div class="card-text" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">What do most kids need? They need to move and they need a certain degree of silliness. Launch Trampoline provides both, in an indoor setting immune to changes in weather. Come and burn up some young energy on 11,000 square feet of huge jumping surface. Even better: you can bounce off the (angled) walls! This indoor trampoline park is suitable for all ages and fitness levels. If you or your kids run out of their own ideas for movement, options for activities include group exercise classes, trampoline dodge ball, and a foam pit. Great choice for active kids for a birthday party or family gathering. And, adults, don’t sulk – come hit the trampolines for your corporate event.</span></div><span data-dcnode-id="1608" instrument_node="">

</span><div class="card-text" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">You want to be called the best parent on the planet? Book an ATV or snowmobile experience at Bear Rock Adventures. They rent new-every-season, fully equipped Polaris vehicles and will give you a customized itinerary, guided or unguided, to help you get the most out of your day riding through fields, forests, by waterways and up mountain trails. Spot wildlife in its natural habitat, go past an 80-foot waterfall, walk underneath giant turbines in a wind farm, picnic by a pond. Ask about Play and Stay packages where discounted multiple-day rentals are combined with accommodations at a fully furnished lodge apartment or at a relaxing glamping site on top of a mountain. (And, yes, well-behaved family dogs are allowed on vehicles.)</span></div><span data-dcnode-id="1563" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">A spectacular frozen fantasy for the young – and young at heart</span></p><span data-dcnode-id="1509" instrument_node="">
</span><div class="card-text" data-dcnode-id="1504"><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Ice Castles is now closed for the season - See you again next winter!</span></em><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">
Ice Castles in North Woodstock is a fun-filled winter activity that has everything a child – or a child at heart – could fantasize about: ice slides, mazes of tunnels, crawl spaces, frozen fountains, thrones and towers of cascading ice. This frozen fortress is the perfect place to make unforgettable memories as a family. But the fun doesn’t end when the sun goes down. In fact, there’s always a spectacular light show at night, as LED lights embedded inside the ice turn the castles from brilliant shades of blue, to vibrant red, purple, and green. Families are advised to buy tickets online in advance (you can spend as much time as you like once you’re inside), to dress warmly with boots, and to consider a small sled instead of a stroller for really little ones. There’s also a concession stand with hot chocolate, cider, and warm treats.</span></div><span data-dcnode-id="1503" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Everywhere you turn in the Berkshires, there’s something fun for families to do</span></p><span data-dcnode-id="1467" instrument_node="">
</span><div class="card-text" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Family fun is everywhere in the Berkshires in the spring and summer. The kids will love outdoor activities including whitewater rafting, zip lining, horseback riding, kayaking and biking. There are scenic mountain trails to hike and farms to visit. You can check out the Berkshire Scenic Railway Museum, Hancock Shaker Village and the Magic Wings Butterfly Gardens. And, like the region’s spectacular gardens, the arts are in bloom in the summer, from extraordinary concerts at Tanglewood to a dozen live theater venues. Shopping is fun, too, in the picturesque mountain towns, where dining options are also plentiful and kid-friendly. Lodging possibilities include full-service resorts with on-site tennis courts and indoor and outdoor pools, affordable hotels, quiet inns, cabins, campgrounds and vacation rentals. Learn more at Berkshires.org or follow “Visit the Berkshires of Western Massachusetts” on Facebook.</span></div><span data-dcnode-id="1464" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Inside and out, lots to fascinate and entertain families along our riverbank!</span></p><span data-dcnode-id="1410" instrument_node="">
</span><div class="card-text" data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">There are so many things to do outside at the family-friendly Connecticut River Museum – winter cruises to see majestic bald eagles, sailing adventures aboard the 1614 replica ship </span><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Onrust</span></em><span data-dcnode-id="1406" instrument_node="">, strolling the harborside grounds, walking to historic Essex Village for lunch – that you might forget to go inside. But don’t! The kids will love to examine the handmade tools used for fishing and hunting in and along the river, old navigation tools, the model train layout set up every fall, the three-story river mural that snakes up and down staircases and the model of the very cool Turtle, the first submarine to be used in combat (during the Revolutionary War).</span></div><span data-dcnode-id="1404" instrument_node="">

</span><div class="card-text" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">There’s adventure ahead on land and water and the whole family is invited. Enjoy warm weather rolling dog sledding that’s educational and hands on. Meet the sled dogs, help the musher harness and hitch the team, enjoy the dog sled ride, and share treats with the sled dogs after your ride. Get out on the water with Raft NH, a family-friendly, rafting outfitter offering whitewater trips for ages 6 and up. You’re in for unforgettable mild to wild rafting! Check out the “Paws &amp; Paddles” package and enjoy a daytime whitewater raft trip and an evening rolling dog sled trek for a full day of outdoor fun.</span></div><span data-dcnode-id="1356" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Families have a blast at this giant combination amusement and water park</span></p><span data-dcnode-id="1305" instrument_node="">
</span><div class="card-text" data-dcnode-id="1297"><em data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Opening for the season in late spring 2022! Check our website or Facebook for specific details!</span></em><br data-dcnode-id="1302"><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
It’s easy to see why families keep coming back to Funtown Splashtown USA: There’s so much to do! In the water park, there are family raft slides as well as translucent and completely dark tube slides, a corkscrew slide and the Pirates Paradise Aquaplay where 500 gallons of water are dumped every two minutes! Amusement park rides include two roller coasters, a log flume, Thunderbolt, Tilt-a-Whirl, bumper cars and boats and the breathtaking Dragon’s Descent (220 feet up). Lots of eating options here, from pizza to pulled-pork sandwiches, a tiki bar with smoothies and the Sweet Tooth Ice Cream and Candy Shoppe. </span><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">A family owned and operated business, Funtown Splashtown puts guest safety first and is strictly following CDC guidelines.</span></em></div><span data-dcnode-id="1296" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Boats and trains: a combination bound to be a sure-fire hit with everyone in the family</span></p><span data-dcnode-id="1239" instrument_node="">
</span><div class="card-text" data-dcnode-id="1235"><span data-dcnode-id="1238" instrument_node="">Imagine telling the kids that today you are going to go on a train, or a riverboat – or both! Or maybe you’ll book a four-seat rail bike and tool along the tracks from Essex Station to Old Saybrook. Or you’ll get up close to vintage train locomotives – and perhaps a caboose! Great family activities await you at Essex Steam Train &amp; Riverboat, the only steam and riverboat connection in the country, with two operating steam locomotives and multiple classes of passenger service taking you through the scenic countryside to Deep River Landing, where you can board the 70-foot Mississippi-style riverboat, the Becky Thatcher, for a 1 1/4-hour cruise past the rocky shores and wildlife along the Connecticut River and its wildlife, including swans, herons and bald eagles. </span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Please check our website for current train &amp; riverboat schedules.</span></em></div><span data-dcnode-id="1234" instrument_node="">

</span><div class="card-text" data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Families will find so much to do in central New Hampshire in the winter that they will need an itinerary. The Lakes Region Tourism Association can help, offering suggestions on all sorts of family activities, from skiing, snowboarding or snow tubing down one of the region’s many slopes to ice skating, sleigh-riding across a snow-filled field, a museum, doing a little boutique or outlet shopping (tax-free!), taking in a craft show or scarfing down breakfast at a down-home pancake house round out fun winter outings. The holidays bring special treats, from Santa Express trains to festivals celebrating the lights of the season.</span></div><span data-dcnode-id="1174" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">An exciting family adventure in America’s naval history</span></p><span data-dcnode-id="1114" instrument_node="">
</span><div class="card-text" data-dcnode-id="1103"><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Battleship Cove is now open from 9am-5pm daily! Please remember to follow our safety &amp; social distancing guidelines!</span></em><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
America’s naval history inspires the whole family at this world class heritage museum in Fall River. Explore the world's largest collection of US naval ships including the mighty </span><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">USS Massachusetts</span></em><span data-dcnode-id="1107" instrument_node="">, the destroyer </span><em data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">USS Joseph P. Kennedy, Jr.</span></em><span data-dcnode-id="1104" instrument_node="">, and PT Boats used in the South Pacific. The sheer size and impression these ships and their stories leave is overwhelming. There’s the state-of-the-art special effects Pearl Harbor Experience, the only outdoor multimedia reenactment anywhere. Scouts and youth groups can participate in a year round maritime camping program, overnights, and family nautical nights with affordable camping on site. Whether a casual visitor, history buff, student, teacher or scout leader, everyone learns. Special exhibits honor our men and women in uniform then and now.</span></div><span data-dcnode-id="1102" instrument_node="">

</span><div class="card-text" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Everyone in the family will enjoy the classic train excursions offered by the Conway Scenic Railroad. Check out the Victorian-style 1874 station in North Conway Village and pick up some snacks in the gift shop. Then board a 1950s-era passenger car and sit back to enjoy the scenery, including a trip over Crawford Notch, on the Mountaineer excursion train. Or, choose the Conway and Sawyer River Valley trains, classic heritage train rides with vintage passenger cars from the 1920s. There’s also a winter Snow Train to Attitash. At just under an hour, the Conway Valley train is best for small children. Kids under 4 can ride free in coach. Come see why families rave about this old-fashioned railroading experience.</span></div><span data-dcnode-id="1057" instrument_node="">

</span><div class="card-text" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">If your family has always wanted to try whitewater rafting, now’s the time, and Raft N.H. is the place. The rafting center is offering Class II rafting adventures for everyone age 6 and up, so they’re perfect for families. The run goes down a 2.5-mile section of the scenic Androscoggin River, below the Pontook Dam. It includes sections of milder rapids and calmer water, which means plenty of time to get in some swimming. The adventure includes a guide, safety gear, comfort gear, a small snack and transportation to and from your beginning point in Gorham. It’s a great way to experience the beauty of the White Mountains, the Great North Woods and the river as a family.</span></div><span data-dcnode-id="1003" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Kids will have a interactive experience at this re-created 1830s village</span></p><span data-dcnode-id="949" instrument_node="">
</span><div class="card-text" data-dcnode-id="941"><em data-dcnode-id="945"><span data-dcnode-id="948" instrument_node="">Old Sturbridge Village is open! Advanced ticketing required is required. </span><a class="track-click" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osv.org/" rel="nofollow" target="new"><span data-dcnode-id="947" instrument_node="">Please visit our updated policies &amp; procedures before reserving your visit.</span></a></em><br data-dcnode-id="944"><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">
Learning comes alive like never before at Old Sturbridge Village, where kids can try their hand at farming, get up close and personal with baby animals, take a horse-drawn wagon ride, walk through a covered bridge and see how everything from horseshoes to lanterns were made in the early 19th century. The 200-acre village is designed to transport guests back to a rural New England town of the 1830s – and it’s really an immersive experience. Costumed historians at schoolhouses, trade shops, farms and homes are happy to answer questions. There are nature trails through woodlands, pastures and along the river, with wildlife from great blue herons to mallards and turtles.</span></div><span data-dcnode-id="940" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Beginning of ‘Great Race’ at state park lets everyone get up close to vintage cars</span></p><span data-dcnode-id="883" instrument_node="">
</span><div class="card-text" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Spend a spectacular Saturday checking out the 120 vintage automobiles that will assemble in Rocky Point State Park to begin the nine-day, 2,300-mile Great Race. Talk to the driver-navigator teams before they set out on their adventure that will take them across 10 states, passing through secret check points and ending in Fargo, N.D. This year’s vintage cars include a 1916 Hudson Pikes Peak Hillclimber and a 1917 American LaFrance (all cars must be manufactured in 1974 or earlier; most are pre-World War II). Other area events include a tour of a private car collection in Providence, and “Newport Day,” featuring the Audrain Automobile Museum and Newport Car Museum. The 120-acre park by Narragansett Bay is also great for hiking, biking and fishing.</span></div><span data-dcnode-id="880" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Super-sized fun for families at this resort nestled in the beautiful Berkshires</span></p><span data-dcnode-id="826" instrument_node="">
</span><div class="card-text" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The family that stays together plays together at Jiminy Peak Mountain Resort, where families have come for years for the great summer activities, skiing, snowboarding and snowshoeing. Whether your idea of fun is zooming down one of 45 ski trails or zipping through trees in the Aerial Adventure Path, that fun is super-sized at Jiminy Peak. An alpine roller coaster and slide, a bungy trampoline, a rock-climbing wall, a chairlift ride up to a magnificent summit: Those are just a few of the attractions at this scenic resort. Stay in a spacious country inn suite or a perfect-for-families condo unit. Stop by for a burger at a rustic tavern. Nearby activities include theaters, museums, horseback riding and golf.</span></div><span data-dcnode-id="823" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">It truly is fun for kids (and adults) of all ages at this colorful, exciting zoo</span></p><span data-dcnode-id="766" instrument_node="">
</span><div class="card-text" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Age is no barrier to the delights of the Franklin Park Zoo. Littlest visitors (ages 2 to 4) have fun in the Curious Cubs Playgroup; other activities kids love include breakfast with the animals, behind-the-scenes tours, the petting zoo at Franklin Farm, a Children’s Zoo for climbing and the outdoor playground with wildlife-inspired designs. And, of course, there are the animal environments, from the Tropical Forest with Western lowland gorillas and hyenas to the lions of the Kalahari Kingdom and the giraffes and zebras of the Savannah. Families love the butterfly exhibit, watching kangaroos and kookaburras along the Outback Trail and feeding the budgies in the Aussie Aviary. For dining, there are burgers, pizzas and plenty of picnic spots.</span></div><span data-dcnode-id="763" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Trek through a White Mountain wonderland at Lost River Gorge</span></p><span data-dcnode-id="706" instrument_node="">
</span><div class="card-text" data-dcnode-id="700"><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Opening for the season in May 2022!</span></em><br data-dcnode-id="703"><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
Take your family on a journey beneath the earth at Lost River Gorge &amp; Boulder Caves in New Hampshire's White Mountains. You'll find yourself exploring a spectacular wilderness wonderland formed millions of years ago by glaciers, water, and wild weather. Located on a preserve owned by the Society for the Protection of New Hampshire Forests, Lost River Gorge is home to granite cliffs, spectacular waterfalls, rugged caves, and a river that plays hide-and-seek amid the rocks. Hike along a three-quarter mile boardwalk, or step off and explore the boulder caves, including the Sun Altar, Thor's Workshop, the Devil's Kitchen, the Lemon Squeezer, and the Judgment Hall of Pluto. Sturdy footwear and outdoor clothing are recommended. Open early May to mid-October.</span></div><span data-dcnode-id="699" instrument_node="">

</span><div class="card-text" data-dcnode-id="640"><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Advance reservation, with timed ticketing, is required. Masks are required, but must not have an exhalation valve or vent.</span></em><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
What is there for kids to see at the Bruce Museum, where art collections and science collections sit side by side? Through November 2020, the Museum's science exhibition, "Under the Skin," highlights a dozen recent discoveries through a combination of remarkable imagery and real biological specimens. And in December 2020, we open a wonderful exhibition featuring the captivating work of Maurice Sendak. Over at the museum’s Seaside Centereach summer, there’s a variety of family activities as well as a marine tank where kids can get a feel for some of the creatures that live in the region’s waterways.</span></div><span data-dcnode-id="639" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">A memorable &amp; amazing journey into our world's history</span></p><span data-dcnode-id="588" instrument_node="">
</span><div class="card-text" data-dcnode-id="580"><span data-dcnode-id="587" instrument_node="">For families, it’s hard to beat the 16 galleries in this museum displaying 500 taxidermy animals -- full-size elephant, rhino, hippo, tiger, bison, even a 15-foot giraffe -- not to mention huge whale skeletons. Don’t miss the skull of one of the first </span><em data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Triceratops</span></em><span data-dcnode-id="584" instrument_node=""> ever discovered and the world’s only mounted skeleton of the 42 ft.-long </span><em data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Kronosaurus</span></em><span data-dcnode-id="581" instrument_node="">. Explore a timeline of Earth’s history, and admire 3,000 rare minerals and gemstones. Touch a meteorite from outer space. New and changing multi-media exhibitions showcase cutting-edge research. The museum is an easy 8-minute walk across the historic Harvard campus from Harvard Square with its popular shops and restaurants and MBTA station. The museum is connected to Harvard’s Peabody Museum, and one admission fee covers both museums.</span></div><span data-dcnode-id="579" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Endless list of activities, adventures to excite every family member</span></p><span data-dcnode-id="546" instrument_node="">
</span><div class="card-text" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Your challenge isn’t going to be finding fun family activities in the Mount Washington Valley region – it will be persuading the family it’s time to go home. In the winter, ski, skate, snowboard or take a dog-sled tour. In the summer, go kayaking, check out a water park or go ziplining over the forest. Take a cog railroad trip up Mount Washington, squeeze through caves, tackle a corn maze, visit a family farm, a 600-game arcade or the country’s oldest continuously operated general store. Go see the bear show at Clark’s Trading Post, the elves at Santa’s Village or fairy tale characters in Story Land. Visit a weather museum, a nature center or an inter-active science museum.</span></div><span data-dcnode-id="543" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">You and the kids will have a wild time at this multiple-environment zoo</span></p><span data-dcnode-id="489" instrument_node="">
</span><div class="card-text" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Tell the kids you are going to have a really wild time, and let the Stone Zoo do the rest.
Stroll through a series of environments bringing you up close and personal to animals from arctic foxes, reindeer and cougars to roadrunners, gila monsters and sloths. In the Caribbean Coast, feed the flamingos and play native percussion instruments; check out yak and snow leopards in the Himalayan Highlands and listen to the eerie calls of the gibbons and watch otters frolic in the Treetops and Riverbeds exhibit. Attractions include a children’s train, playground, hands-on Animal Discovery Center and nature play areas for children to climb into an oversized bird’s nest and build forts. The zoo has single and double strollers to rent.</span></div><span data-dcnode-id="486" instrument_node="">

</span><p class="card-text font-weight-bold" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Ready to Explore?</span></p><span data-dcnode-id="429" instrument_node="">
</span><div class="card-text" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">From experiencing hurricane-force winds in The Arctic Next Door: Mount Washington exhibit to watching life below the surface in the Fresh Water habitat, there is so much to explore at the EcoTarium, Worcester’s unique indoor-outdoor museum. Meet live animals, watch exciting shows in the Alden Digital Planetarium: A National Geographic Theater, and try a variety of hands-on exhibits that examine the world around us. Then head outdoors for an easy hike along nature trails that include pond, meadow and forest environments, as well as endless play in the Nature Explore® Outdoor Exhibit. And while you are there, take a trek through the treetops on the Tree Canopy Walkway (seasonal). Rain or shine, summer or winter, there’s always something fun for the whole family to discover at the EcoTarium!</span></div><span data-dcnode-id="426" instrument_node="">

</span><div class="card-text" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">This maritime-oriented science museum is located right on the shore of Lake Champlain, and its expertise is to study and enjoy the natural history of the Lake Champlain Basin. A visit to ECHO is a wonderful science and ecology expedition for children and families. Lots of expert work has gone into creating permanent exhibits about the ecology, wildlife, plant life, and Native human inhabitants of the region. Plenty of changing exhibits and fun seasonal activities to encourage kids to get involved in this fascinating maritime world. ECHO is open year round, 10am - 5pm daily, except Thanksgiving, Christmas Eve &amp; Day.</span></div><span data-dcnode-id="373" instrument_node="">

</span><div class="card-text" data-dcnode-id="323"><span data-dcnode-id="334" instrument_node="">This super-cool museum on the edge of Lake Champlain is filled with unusual attractions that are sure to entertain every person in the family. Kids and parents will love the authentic paddlewheel steamboat Ticonderoga, which was a workhourse of passenger and cargo transportation on the lake for decades in the 19th century. Shelburne Museum is one of the nation’s most eclectic museums of art, Americana, and design, displaying 150,000 objects on 45 acres in 25 historic New England buildings. There's even a lighthouse. A full day of family fun waits here.</span><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">
</span><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Hours:</span></strong><span data-dcnode-id="329" instrument_node=""> Open Tues-Sun May 15 through late October, 10am - 5pm.</span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">
</span><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Museum Admission:</span></strong><span data-dcnode-id="324" instrument_node=""> Adults $25, Ages 13-17 $14, Ages 5-12 $12, Under 5 Free. Discounts available for VT residents, students, seniors, Museum or AAA members, and active military.</span></div><span data-dcnode-id="322" instrument_node="">
