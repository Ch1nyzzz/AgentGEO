</span><p class="post-meta" data-dcnode-id="1879"><span data-dcnode-id="1890" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1887"><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfamily.org/author/jennifer/" rel="author" title="Posts by Jennifer Bryant"><span data-dcnode-id="1889" instrument_node="">Jennifer Bryant</span></a></span><span data-dcnode-id="1886" instrument_node=""> | </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfamily.org/category/guest-posts/" rel="category tag"><span data-dcnode-id="1885" instrument_node="">Guest Posts</span></a><span data-dcnode-id="1883" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="1880"><a data-dcnode-id="1881" href="#respond"><span data-dcnode-id="1882" instrument_node="">2 comments</span></a></span></p><img alt="" class="" data-dcnode-id="1878" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfamily.org/wp-content/uploads/2016/12/20.png&amp;raw" width="1080"><span data-dcnode-id="1877" instrument_node="">

</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_2 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1833"><span data-dcnode-id="1847" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1835"><span data-dcnode-id="1846" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1837"><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Our kids are almost 7 and 8 so we are always on the lookout for places to take them. The easiest thing now that they’re older is to get them down to the beach and let them run wild. But when they were young, the need to get them (and me) out of the house was just as urgent. I developed this list of 20 kid friendly activities on our island of Oahu for my own reminder, for friends and family in our community, and for any who are thinking about visiting!</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">If you’re planning a trip to Oahu soon, check out these options as suggestions from a local family. This list is in no particular order, just some things we have done with the kids that are the most enjoyable for them. I split this into two categories: Outdoor and Indoor, because… sometimes it rains on your outdoor parade.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Click on the images for each activity’s main website.</span></p></div><span data-dcnode-id="1836" instrument_node="">
</span></div><span data-dcnode-id="1834" instrument_node="">
</span></div><span data-dcnode-id="1832" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1825"><h1 data-dcnode-id="1826" style="text-align: center;"><span data-dcnode-id="1827" instrument_node="">Outdoor</span></h1></div><span data-dcnode-id="1824" instrument_node="">
</span></div><span data-dcnode-id="1822" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1813"><h2 data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">1. Hiking Trails</span></h2></div><span data-dcnode-id="1812" instrument_node="">
</span></div><span data-dcnode-id="1810" instrument_node="">
</span></div><span data-dcnode-id="1808" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_4" data-dcnode-id="1794"><span data-dcnode-id="1806" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_5 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1796"><span data-dcnode-id="1805" instrument_node="">

</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_6 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1769"><span data-dcnode-id="1792" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1771"><span data-dcnode-id="1791" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1773"><p data-dcnode-id="1774"><span data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Whether you carry the babies in a&nbsp;</span></span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B005F5LYQO/ref%3Das_li_tl%3Fie%3DUTF8%26tag%3Dpractic05-20%26camp%3D1789%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3DB005F5LYQO%26linkId%3Dc1e783ff0c6f36b2d492a361212b51d8"><span data-dcnode-id="1788" instrument_node="">carrier</span></a><span data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">&nbsp;or make them walk, being outside in Hawaii is simply the best. The fresh air, the smell of the tropical plants… it’s so rejuvenating. Not every hiking trail is best for kids, so check that our first. I joined a Facebook group called&nbsp;</span></span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/groups/hikingwithkeiki/"><span data-dcnode-id="1784" instrument_node="">Hiking with Keiki</span><span data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">&nbsp;</span></span></a><span data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">but recently found this list through&nbsp;</span></span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oahufamilyactivities.com/p/family-friendly-hikes-in-oahu.html%3Fm%3D1"><span data-dcnode-id="1778" instrument_node="">Oahu Family Activities</span></a><span data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">&nbsp;that helped a lot and gave real family input based on their experiences.</span></span></p></div><span data-dcnode-id="1772" instrument_node="">
</span></div><span data-dcnode-id="1770" instrument_node="">
</span></div><span data-dcnode-id="1768" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_6" data-dcnode-id="1755"><span data-dcnode-id="1766" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_7 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1757"><span data-dcnode-id="1765" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1759"><span data-dcnode-id="1764" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1761"><h2 data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">2. Family Friendly Beaches</span></h2></div><span data-dcnode-id="1760" instrument_node="">
</span></div><span data-dcnode-id="1758" instrument_node="">
</span></div><span data-dcnode-id="1756" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_7" data-dcnode-id="1744"><span data-dcnode-id="1754" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_8 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1746"><span data-dcnode-id="1753" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_3" data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1750"><img alt="" data-dcnode-id="1751" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfam.wpengine.com/wp-content/uploads/2016/12/Lanikai2.jpg&amp;raw" title=""></span><span data-dcnode-id="1749" instrument_node="">
</span></div><span data-dcnode-id="1747" instrument_node="">
</span></div><span data-dcnode-id="1745" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_8" data-dcnode-id="1681"><span data-dcnode-id="1743" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_9 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1683"><span data-dcnode-id="1742" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1685"><span data-dcnode-id="1741" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1687"><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">We live on the south shore of Oahu, and while there are many other beaches on the island – these are just our favorite based on our location, the type of waves that are appropriate for young kids, space to lay out and relax, availability of shade, restrooms, parking… things that make a family visit easier.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><ul data-dcnode-id="1694"><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1731"><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Ala%2BMoana%2BBeach%2BPark%2BMagic%2BIsland/%4021.2865639%2C-157.8475008%2C16z/data%3D%214m5%213m4%211s0x7c007207f0e008af%3A0xa9081c625754e49f%218m2%213d21.2818754%214d-157.8459842"><span data-dcnode-id="1736" instrument_node="">Ala Moana Beach Park</span></a><span data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1732" instrument_node="">– Magic Island lagoon at the end of the peninsula, beautiful view of the ocean, and waters within the lagoon or the bay are perfect for swimming and paddle boarding.</span></li><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1724"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Lanikai%2BBeach/%4021.3930921%2C-157.7176242%2C17z/data%3D%213m1%214b1%214m5%213m4%211s0x7c0014dd17442541%3A0x88415fbfd50f90b8%218m2%213d21.3930921%214d-157.7154355"><span data-dcnode-id="1729" instrument_node="">Lanikai Beach</span></a><span data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1725" instrument_node="">– soft white sand and smoother waves</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1717"><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Bellows%2BField%2BBeach%2BPark/%4021.3681122%2C-157.7120006%2C17z/data%3D%213m1%214b1%214m5%213m4%211s0x7c001463a934e9e3%3A0xb258ad092a8943b7%218m2%213d21.3681122%214d-157.7098119"><span data-dcnode-id="1722" instrument_node="">Bellows Beach</span></a><span data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1718" instrument_node="">– soft sand, trees for shade, may need military access to further campsite areas</span></li><span data-dcnode-id="1716" instrument_node="">
</span><li data-dcnode-id="1710"><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Kaimana%2BBeach/%4021.2633956%2C-157.8239599%2C17z/data%3D%213m1%214b1%214m5%213m4%211s0x7c00726f5d7f0b13%3A0x6b7daefc35220608%218m2%213d21.2633748%214d-157.8216761"><span data-dcnode-id="1715" instrument_node="">Kaimana Beach</span></a><span data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1711" instrument_node="">– relaxed family beach, mostly locals, close to Waikiki</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1703"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Pupukea%2BBeach%2BPark/%4021.6495198%2C-158.0648298%2C17z/data%3D%214m5%213m4%211s0x7c0059ed1a239de5%3A0x762ac3b2fd91b599%218m2%213d21.6481969%214d-158.0628199"><span data-dcnode-id="1708" instrument_node="">Pupukea Beach Park</span></a><span data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1704" instrument_node="">(Sharks Cove) – tidepools for babies to sit together in shallow water</span></li><span data-dcnode-id="1702" instrument_node="">
</span><li data-dcnode-id="1696"><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Waimea%2BBay%2BBeach%2BPark/%4021.642958%2C-158.0714368%2C16z/data%3D%214m5%213m4%211s0x0%3A0x39f7c2ce689f8022%218m2%213d21.6398138%214d-158.0633631"><span data-dcnode-id="1701" instrument_node="">Waimea Bay</span></a><span data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1697" instrument_node="">– large beach area, but parking can get full quickly in the busy summer months. Watch for strong current advisories at different times of the year</span></li><span data-dcnode-id="1695" instrument_node="">
</span></ul><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1692" instrument_node="">Be aware of jellyfish warning or strong current advisories. Usually the lifeguards will post a sign in the sand, but check&nbsp;</span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hawaiibeachsafety.com/"><span data-dcnode-id="1691" instrument_node="">Hawaii Beach Safety</span></a><span data-dcnode-id="1689" instrument_node="">&nbsp;for&nbsp;alerts ahead of time.</span></p></div><span data-dcnode-id="1686" instrument_node="">
</span></div><span data-dcnode-id="1684" instrument_node="">
</span></div><span data-dcnode-id="1682" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_9" data-dcnode-id="1669"><span data-dcnode-id="1680" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_10 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1671"><span data-dcnode-id="1679" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1673"><span data-dcnode-id="1678" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1675"><h2 data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">3. Pearl Harbor</span></h2></div><span data-dcnode-id="1674" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">
</span></div><span data-dcnode-id="1670" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_10" data-dcnode-id="1656"><span data-dcnode-id="1668" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_11 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1658"><span data-dcnode-id="1667" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_4 et_pb_has_overlay" data-dcnode-id="1660"><span data-dcnode-id="1666" instrument_node="">
</span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pearlharboroahu.com/"><span class="et_pb_image_wrap" data-dcnode-id="1663"><img alt="" data-dcnode-id="1665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfam.wpengine.com/wp-content/uploads/2016/12/Perfect-Visit-to-Pearl-Harbor.jpg&amp;raw" title=""><span class="et_overlay" data-dcnode-id="1664"></span></span></a><span data-dcnode-id="1661" instrument_node="">
</span></div><span data-dcnode-id="1659" instrument_node="">
</span></div><span data-dcnode-id="1657" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_11" data-dcnode-id="1643"><span data-dcnode-id="1655" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_12 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1645"><span data-dcnode-id="1654" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1647"><span data-dcnode-id="1653" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1649"><p data-dcnode-id="1650"><span data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">This is an educational experience of the history of World War II and the attack on Pearl Harbor by the empire of Japan (December 7, 1941). We took the kids out on the ferry ride to the Arizona Memorial and through the walking tours onto the U.S.S. Missouri and the U.S.S. Bowfin submarine. Their first visit was when they were 5 and 6 years old – my advice would be to go according to their own pace. You&nbsp;might be&nbsp;fascinated by all the history and details on an adult level, but depending on their attention span, just let them experience it through their own eyes and interests and questions.&nbsp;The kids&nbsp;loved all the mechanical elements, the guns, the ammo, the crawl spaces and the vastness of the ships themselves.</span></span></p></div><span data-dcnode-id="1648" instrument_node="">
</span></div><span data-dcnode-id="1646" instrument_node="">
</span></div><span data-dcnode-id="1644" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_12" data-dcnode-id="1631"><span data-dcnode-id="1642" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_13 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1633"><span data-dcnode-id="1641" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_8 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1635"><span data-dcnode-id="1640" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1637"><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">4. Wet&nbsp;‘n’ Wild Water Park</span></h2></div><span data-dcnode-id="1636" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_13" data-dcnode-id="1618"><span data-dcnode-id="1630" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_14 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1620"><span data-dcnode-id="1629" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_5 et_pb_has_overlay" data-dcnode-id="1622"><span data-dcnode-id="1628" instrument_node="">
</span><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wetnwildhawaii.com/"><span class="et_pb_image_wrap" data-dcnode-id="1625"><img alt="" data-dcnode-id="1627" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfam.wpengine.com/wp-content/uploads/2016/12/WW-4258_header.jpg&amp;raw" title=""><span class="et_overlay" data-dcnode-id="1626"></span></span></a><span data-dcnode-id="1623" instrument_node="">
</span></div><span data-dcnode-id="1621" instrument_node="">
</span></div><span data-dcnode-id="1619" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_14" data-dcnode-id="1582"><span data-dcnode-id="1617" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_15 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1584"><span data-dcnode-id="1616" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1586"><span data-dcnode-id="1615" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1588"><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">The kids love this park, I would say it’s safe to bring children as young as 2 – there is a shallow kids pool area where you can help them, and when they are tall enough to walk along the bottom by themselves. It’s most fun when the kids are at least 42″ tall and can go on most of the rides or slides. There are plenty of chairs or loungers around the park for parents, also lockers to keep valuables.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1611" instrument_node="">I recommend getting there when the park opens to get good seats, otherwise there are open lawn areas that may not be situated close enough to watch the kids. There is also a small fee for parking. There are season passes for local families, but also one time purchase discounts through</span><span data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papajohnshawaii.com/"><span data-dcnode-id="1608" instrument_node="">Papa John’s Pizza</span></a><span data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1604" instrument_node="">stores and</span><span data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tacobellhawaii.com/"><span data-dcnode-id="1601" instrument_node="">Taco Bell</span></a><span data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1597" instrument_node="">on the island. Check the</span><span data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wetnwildhawaii.com/"><span data-dcnode-id="1594" instrument_node="">Wet n Wild Hawaii</span></a><span data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1590" instrument_node="">website for more seasonal discounts. They have a snack bar on site, but we bring our own cooler of food to save money except… they do not allow outside food in the park, so we leave to eat in the parking lot and come back in (they give you re-entry wrist bands).</span></p></div><span data-dcnode-id="1587" instrument_node="">
</span></div><span data-dcnode-id="1585" instrument_node="">
</span></div><span data-dcnode-id="1583" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_15" data-dcnode-id="1570"><span data-dcnode-id="1581" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_16 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1572"><span data-dcnode-id="1580" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_10 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1574"><span data-dcnode-id="1579" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1576"><h2 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">5. Polynesian Cultural Center</span></h2></div><span data-dcnode-id="1575" instrument_node="">
</span></div><span data-dcnode-id="1573" instrument_node="">
</span></div><span data-dcnode-id="1571" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_16" data-dcnode-id="1557"><span data-dcnode-id="1569" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_17 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1559"><span data-dcnode-id="1568" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_6 et_pb_has_overlay" data-dcnode-id="1561"><span data-dcnode-id="1567" instrument_node="">
</span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polynesia.com/"><span class="et_pb_image_wrap" data-dcnode-id="1564"><img alt="" data-dcnode-id="1566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalfam.wpengine.com/wp-content/uploads/2016/12/north-shore-polynesian-cultural-center-luau-tour10.jpg&amp;raw" title=""><span class="et_overlay" data-dcnode-id="1565"></span></span></a><span data-dcnode-id="1562" instrument_node="">
</span></div><span data-dcnode-id="1560" instrument_node="">
</span></div><span data-dcnode-id="1558" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_17" data-dcnode-id="1525"><span data-dcnode-id="1556" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_18 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1527"><span data-dcnode-id="1555" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1529"><span data-dcnode-id="1554" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1531"><p data-dcnode-id="1547"><span data-dcnode-id="1553" instrument_node="">If your family has seen the new</span><span data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//movies.disney.com/moana"><span data-dcnode-id="1550" instrument_node="">Disney movie Moana</span></a><span data-dcnode-id="1548" instrument_node="">, the culture represented there is from the Māori people, very distinct from the Fijians, Samoans, Hawaiians, and others. This is a cultural experience unlike any other that I think everyone needs to do at least once. The Polynesian Cultural Center is on the northernmost part of the island, so you will have a beautiful drive on your way there, but the center itself was created to educate people on all of the different Polynesian cultures. There are activities for the whole family in each “village” that represents each culture. The first time I went was in 2004, and I have never forgotten the specific distinctions because each demonstration and activity was so unique!</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1545" instrument_node="">The tickets are a bit pricey, but you can find discounts through military connections, or check these sites:</span><span data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiidiscount.com/oahu/polynesian-cultural-center.htm"><span data-dcnode-id="1542" instrument_node="">Hawaii Discount</span></a><span data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1538" instrument_node="">/</span><span data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.groupon.com/%3F%26utm_source%3Dbing%26utm_medium%3Dcpc%26utm_campaign%3Dus_dt_sea_bng_txt_naq_sr_cbp_ch1_ybr_k%2Ahttp%253A%252F%252Fwww.groupon.com%252F_m%2Ab_d%2Agroupon-variations_g%2Agroupon-variations-broad"><span data-dcnode-id="1535" instrument_node="">Groupon</span></a><span data-dcnode-id="1533" instrument_node="">.</span></p></div><span data-dcnode-id="1530" instrument_node="">
</span></div><span data-dcnode-id="1528" instrument_node="">
</span></div><span data-dcnode-id="1526" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_18" data-dcnode-id="1513"><span data-dcnode-id="1524" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1519"><h2 data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">6. Hanauma Bay</span></h2></div><span data-dcnode-id="1518" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_13 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1482"><span data-dcnode-id="1497" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1484"><p data-dcnode-id="1488"><span data-dcnode-id="1496" instrument_node="">This is a beautiful, relaxing, and educational experience for the whole family. If it’s your first time visiting the park, you will be required to watch a 10 minute video about the coral reefs and how not to contribute to the damage of these naturally growing life forms, and to stay safe among them and the water currents.</span><span data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="1490"><span data-dcnode-id="1493" instrument_node="">Do not swim past the reef, even as an experienced swimmer.</span><span data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="1489" instrument_node="">There is snorkel equipment to rent for kids and adults, but we like to bring our own. Also a good idea to bring your own food and drinks, but there is a small snack bar at the top of the hill.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Speaking of… there is a steep hill to walk down, but for a small fee (haha) they will ride you down on a large golf cart vehicle. If you are in&nbsp;decent shape and able to carry the babies and your stuff, go ahead and walk down yourself. There is a safe railing to hold onto. If you are otherwise not able to lean on your knees, take the cart. Enjoy a beautiful view of the bay!</span></p></div><span data-dcnode-id="1483" instrument_node="">
</span></div><span data-dcnode-id="1481" instrument_node="">
</span></div><span data-dcnode-id="1479" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_21" data-dcnode-id="1466"><span data-dcnode-id="1477" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_15 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1446"><span data-dcnode-id="1452" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1448"><p data-dcnode-id="1449"><span data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">The Zoo! We live within walking distance now so we go more often. Before, the parking situation annoyed me because it was always full and you have to pay to park, but that’s my only little rant. The rest of this experience is just great – the landscaping inside is beautiful, and they even have a little kid area with a jungle gym to play and a petting zoo in one of the corners. We also attended a friend’s birthday party hosted here in the community area. If you’re local, it is well worth getting an annual pass, and we also brings our own drinks and snacks into the park. There is a snack bar but it can be pricey. A wonderful educational experience, my kids are old enough to follow the map they give you at the entrance and plan their own excursion. The new elephant exhibit is quite nice and more spacious than before. We also just go and throw down a blanket on one of the beautiful lawn areas and relax.</span></span></p></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1404"><p data-dcnode-id="1405"><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honolulu.gov/parks/hbg.html"><span data-dcnode-id="1413" instrument_node="">Oahu’s botanical gardens</span></a><span data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">&nbsp;are an excellent way to experience nature with your children. There are thousands of beautiful plant species, colors, shapes, sizes – wonderful opportunities to explore Hawaii in a natural state.&nbsp;</span></span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honolulu.gov/parks/hbg.html%3Fid%3D569%3Aho%2396%3Bomaluhia-botanical-garden%26catid%3D182%3Asite-dpr-cat%26Itemid%3D2069"><span data-dcnode-id="1409" instrument_node="">Hoomaluhia Botanical Garden</span></a><span data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&nbsp;is a peaceful place on the east side of the island, outside of the major city areas. The park allows&nbsp;kids to feed ducks and fish and&nbsp;provide simple fishing poles to fish directly from the water, great for younger kids, too!</span></span></p></div><span data-dcnode-id="1403" instrument_node="">

</span></div><span data-dcnode-id="1399" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1362"><p data-dcnode-id="1363"><span data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">It’s our little version of Sea World right here on the island! This park is very kid-friendly, including interactive exhibits with starfish, turtles, penguins (yes,&nbsp;</span></span><em data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">penguins!</span></em><span data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">), and of course, the dolphin show. They even have a jungle gym in the middle of the park. Actually a very smart move on their part because it’s a great way for the kids to burn off energy during the visit and in between shows. We can spend most of the day there, so again, we bring lunch with us.</span></span></p></div><span data-dcnode-id="1361" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1324"><p data-dcnode-id="1325"><span data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">This property offers quite a few family fun activities including ATV riding, horseback riding, tours of the places where they filmed Jurassic Park. They even raise cattle on site and sell fresh grass-fed beef, which a lot of my goodie friends go nuts about. Fresh beef is a big deal when most of our meat is shipped from the mainland. We also attended a friend’s wedding which was just an incredible sight in the view of the beautiful Ko’olau mountains in the background. This side of the island is simply breathtaking, and there are many more activities the property offers.</span></span></p></div><span data-dcnode-id="1323" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1272"><p data-dcnode-id="1273"><span data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">If you want to experience real Hawaiian food and dancing, a luau is a great family experience. Prepare for at least 4 hours of activities and games, maybe a canoe ride, temporary tattoos lei making&nbsp;and&nbsp;basket weaving.&nbsp;The two most popular luaus on the island are&nbsp;</span></span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.germainesluau.com/"><span data-dcnode-id="1281" instrument_node="">Germaines</span></a><span data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">, or&nbsp;</span></span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paradisecove.com/"><span data-dcnode-id="1277" instrument_node="">Paradise Cove</span></a><span data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">. My husband and I went to Paradise Cove with another couple on a date night, but we would go back with the kids now that we know what it’s about. Especially now that they’ve tried Hawaiian food.</span></span></p></div><span data-dcnode-id="1271" instrument_node="">

</span><p data-dcnode-id="1223"><span data-dcnode-id="1229" instrument_node="">By the way… never refer to shave ice as a snow cone. And it’s not shav</span><span data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">ed</span></span><span data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1224" instrument_node="">ice. It’s shave ice. And it’s delicious because the consistency of the ice should be as close to powder as you can get. That’s what&nbsp;determines the quality of the shave ice place.&nbsp;It’s even better when they put a scoop of ice cream at the bottom… and condensed milk on top. Here are a few of our favorite places:</span></p><span data-dcnode-id="1222" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_30 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1101"><span data-dcnode-id="1107" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1103"><p data-dcnode-id="1104"><span data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">This place is amazing! I wish I could show you all the pictures of all the little mini towns and kid-sized areas this place has to offer. It is completely educational, but completely fun for kids between ages 2&nbsp;to 12. My kids could play here all day, but I find it best to get there early and try to be done by lunch time. I’ve been to this place so many times that I pretty much let them go in each room, set the timer for 30 minutes, then move on to the next room. Each area is full of surprise and wonder, completely hands on, and it allows for the kid’s creativity. They get to be mini grown&nbsp;ups for the day… check it out and be blown away.</span></span></p></div><span data-dcnode-id="1102" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_32 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1065"><span data-dcnode-id="1071" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1067"><p data-dcnode-id="1068"><span data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">There are&nbsp;four parts to the Bishop Museum, the planetarium, the old hall, the exhibition hall, and the new hall. The building itself is beautiful, and an architecture lesson in and of itself. The planetarium has chairs where you sit and look up at the computerized constellation program on the domed screen ceiling. It may be too much to handle for younger kids who may not understand what is happening. The images are really in your face. The original hall is three stories, and includes mostly Hawaiian heritage displays as well as a giant life size sperm whale (so cool!) The exhibition hall is for mobile exhibits that are only open for a limited time. The new hall is totally awesome because it features every phase of a volcano and the impacts of waves and wind on the environment. There are three floors to explore and hands on activities. Bring a lunch and enjoy on the lawn outside or under a covered pavilion.</span></span></p></div><span data-dcnode-id="1066" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1019"><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">This museum, operated&nbsp;out of the active military base Ford Island, is located in the middle of Pearl Harbor. There is so much history in this space, not to mention gigantic airplanes from almost every war era in the 20th century. Walking into the old hangars (some of which still have original bullet hotels from the attack on Pearl Harbor) and seeing the kids up in awe at these amazing machines is just incredible. There are also volunteer docents who give tours and explain the history as you walk through each hangar. It’s fun to let the kids take their own pictures of these exhibits (if you trust them with your phone or camera for a bit).</span></p></div><span data-dcnode-id="1018" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="858"><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">Yes, there is an ice skating rink in Hawaii. In fact, I think it’s the only one in the middle of the Pacific Ocean. My kids love this place, mostly because they get to wear layers of clothing, haha. Chloe has been saving up her money to go again, she absolutely loved learning to skate with the little trainer bars they have on the side, now she wants to do it without the bar and go all the way around the rink with Daddy. There are </span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icepalacehawaii.com/public-hours"><span data-dcnode-id="871" instrument_node="">public skating hours</span></a><span data-dcnode-id="869" instrument_node="">, so make sure you don’t go during a hockey practice! They&nbsp;have a snack bar, a small arcade area, picnic tables, and stadium seating. Skates are available for rent at the front.</span></p><span data-dcnode-id="867" instrument_node="">
