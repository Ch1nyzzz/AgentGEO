</span></div><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">A perfect getaway destination for adventure-seeking families who crave outdoor activities, Hawks Cay Resort in Duck Key is a slice of paradise. Boasting 60-acres of lush landscaping in what feels like your small private village, guests arrive by boat as they are greeted by an array of family-friendly features. From the full-service marina to the abundance of water activities, guests can swim with dolphins, cruise on wave runners, snorkel for underwater marine life or paddle to a nearby tropical island. After a day of thrills, the kids can soak in the sunshine and play at the on-site pool, visit the resort’s private lagoon or participate in one of the many kids’ club activities. Adults will find multiple places to unwind, from the on-site Calm Waters Spa to the adults-only pool with bar service.</span></p><span data-dcnode-id="2600" instrument_node="">

</span><h3 class="slide-title" data-dcnode-id="2534"><a data-dcnode-id="2535" data-event="" data-event-conversion-point="repeater-headline" data-event-partner="Hotels.com" data-event-partner-channel="Hotels" data-event-raw-external-url="https://www.hotels.com/ho449206/four-seasons-resort-orlando-at-walt-disney-world-resort-lake-buena-vista-united-states-of-america/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7588837/type/am/sid/__EVENT_ID__/https%3A//www.hotels.com/ho449206/four-seasons-resort-orlando-at-walt-disney-world-resort-lake-buena-vista-united-states-of-america/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2536" instrument_node="">Four Seasons Resort Orlando at Walt Disney World, Orlando</span></a></h3><span data-dcnode-id="2533" instrument_node="">
</span><div class="ecommerce-link-wrapper" data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">
</span></div><span data-dcnode-id="2530" instrument_node="">
</span><div class="hotel-link" data-dcnode-id="2522"><span data-dcnode-id="2529" instrument_node="">
</span><a data-dcnode-id="2524" data-event="" data-event-conversion-point="repeater-title" data-event-partner="Hotels.com" data-event-partner-channel="Hotels" data-event-raw-external-url="https://www.hotels.com/ho449206/four-seasons-resort-orlando-at-walt-disney-world-resort-lake-buena-vista-united-states-of-america/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7588837/type/am/sid/__EVENT_ID__/https%3A//www.hotels.com/ho449206/four-seasons-resort-orlando-at-walt-disney-world-resort-lake-buena-vista-united-states-of-america/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Prices &amp; Photos</span></span><span data-dcnode-id="2526" instrument_node=""> </span><i aria-hidden="true" class="icon-arrow-right-alt" data-dcnode-id="2525"></i></a><span data-dcnode-id="2523" instrument_node="">
</span></div><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node="">Located just at the gates of Walt Disney World, families will find a luxurious vacation destination at Four Seasons Resort Orlando Walt Disney World. Boasting one of the </span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripstodiscover.com/most-extravagant-hotel-pools-in-orlando-fl/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2519" instrument_node="">coolest hotel pools in Orlando</span></a><span data-dcnode-id="2517" instrument_node="">, guests are treated to the typical Four Seasons type of top-notch service from the moment they step onto the property. In addition to being just steps from the Magic Kingdom, the kids will love the resort’s variety of water slides and lazy river at the 5-acre water park and climbing wall and activity center on Explorer Island. The adults will be delighted with the multiple on-site restaurants and bars, 18-hole Tom Fazio golf course and the 13,0000 square foot spa with luxurious body treatments.</span></p><span data-dcnode-id="2515" instrument_node="">

</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Consistently ranking high as the most kid-friendly resort in Florida, South Seas Island Resort caters to a variety of families. A sprawling property with 335 acres on Captiva Island, it is surrounded by water and offers picturesque views of the ocean from everywhere you stand. An extensive list of amenities makes this resort stand out, as it boasts 18 sparkling swimming pools and exciting water slides, in addition to a golf course, full-service spa and nature center. The on-site dining choices are equally as impressive with an ice cream shop, tiki bar and multiple on-site restaurants. Sitting on 2.5 miles of beautiful beach, there are also a variety of day trips available for families to enjoy, from nearby parks to tropical islands.</span></p><span data-dcnode-id="2348" instrument_node="">

</span></div><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Located on St. Pete Beach, TradeWinds Island Grand Resort boasts modern rooms spread across its sprawling property. One of the largest hotels in the area, guests will find a palm tree-lined lobby and beautiful outdoor pond with covered walkways. Nestled on 20 picturesque acres of beachfront property, families will be delighted to discover the resort’s array of water sports available. The highlight of the property for many guests is the giant 60-foot blow-up-slide on the beach and the over 15,000-square-foot Splash Island Water Park that floats in the ocean. In addition to a family-friendly pool, guests can find many water sports rentals to enjoy such as paddle boards, wave runners and jetpacks along the resort’s gorgeous stretch of white-sand beach.</span></p><span data-dcnode-id="2181" instrument_node="">

</span></div><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">A truly magical property for both kids and adults alike, Disney’s Animal Kingdom Lodge is like stepping onto a real-life wildlife preserve in Africa. One of the most unique resort’s in Florida, guests&nbsp;at the Animal Kingdom Loge can wake up in the morning and stroll to their private balcony to watch a giraffe casually enjoying their breakfast only a few feet away. Perfect for animal lovers, next visitors might spot a gazelle, zebra or colorful flamingo roaming through the&nbsp;preserve, as 30 species of wildlife are found throughout the four lush savannas that the property sits on. After soaking in the views of exotic animals, kids can refresh at the 11,000-square-foot pool with a waterslide and spring pool, all surrounded by large canopy trees and Floridian palms.</span></p><span data-dcnode-id="2099" instrument_node="">

</span><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">Perfect for families who enjoy a bit of luxury, Aqualina Resort &amp; Spa On The Beach is one of the </span><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripstodiscover.com/floridas-acqualina-resort-spa/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2018" instrument_node="">top beachfront resorts in the world</span></a><span data-dcnode-id="2016" instrument_node="">. A Mediterranean-inspired resort, guests are given the 5-star experience while also catering to travelers with kids. With an award-winning spa and a view that can’t be beaten, the adults are treated well with luxury services, while kids will enjoy the pristine beach just steps away from the room and the fantastic kids’ program, AcquaMarine. Featuring a computer center,&nbsp;the program focuses on all things oceanic, where kids can learn about anything from the Coast Guard to ocean waves or play in the on-site zero-entry pool.</span></p><span data-dcnode-id="2014" instrument_node="">

</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Located on the coast of Sarasota, the Resort at Longboat Key Club is nestled on a narrow strip of land between Sarasota Bay and the Gulf of Mexico. A large property, guests will find an impressive 20 tennis courts, an on-site spa and 45 holes of golf. The expansive white sand beach is perfect for a day of making memories in Florida’s brilliant sunshine, while the multiple on-site restaurants, serving anything from Italian favorites to fresh seafood, are ready for when you’re ready to refuel. A year-round Camp Loggerhead is available for kids, while mother and daughter manicures and pedicures and guided kayak tours through the mangroves offer unique family experiences. Guests are also only 5 miles from the famous Marie Selby Botanical Gardens&nbsp;and only a 15-minute drive from the John and Mable Ringling Museum of Art.</span></p><span data-dcnode-id="1920" instrument_node="">

</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">An upscale resort with family-sized guest rooms, Pink Shell Beach Resort &amp; Marina is located at the northern end of Estera Island. Located between the Gulf of Mexico and the Matanzas Harbor, guests will find a condo-style resort with full kitchens and plenty of amenities to keep the entire family entertained. Volleyball and water sports are available for use, in addition to a popular Octopool complex with a giant octopus and waterfalls paired with a variety of shells, sponges and underwater speakers for the kids to enjoy. A splash area for kids is available for those who need to cool down, in addition to a Kids’ Camp with games, crafts and water activities. Parents can relax in the 6,000-square-foot on-site spa, while the resort is less than a mile from the center of Fort Myers where families will find plenty of restaurants, shops and attractions to keep their itinerary full.</span></p><span data-dcnode-id="1838" instrument_node="">
