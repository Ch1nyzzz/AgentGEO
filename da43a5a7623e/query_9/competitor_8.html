</span><div class="wp-block-image wp-image-43463" data-dcnode-id="1411"><figure class="aligncenter" data-dcnode-id="1412"><img alt="Puerto Jimenez main beach" class="wp-image-43463" data-dcnode-id="1417" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2018/03/Puerto-Jimenez-beach.jpg" height="495" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20495'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&lt;img width="880" height="495" src="https://mytanfeet.com/wp-content/uploads/2018/03/Puerto-Jimenez-beach.jpg" alt="Puerto Jimenez main beach" class="wp-image-43463"/&gt;</span></noscript><figcaption data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Puerto Jimenez beach</span></figcaption></figure></div><span data-dcnode-id="1410" instrument_node="">
</span><h3 data-dcnode-id="1407" id="h-distance-from-sjo-and-lir-airport-11"><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="1406" instrument_node="">
</span><ul data-dcnode-id="1389"><li data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">By driving: </span></strong><span data-dcnode-id="1403" instrument_node="">From SJO airport, Puerto Jimenez is about 6 hours. From Liberia, it is about 8 hours.</span></li><li data-dcnode-id="1398"><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">By bus:</span></strong><span data-dcnode-id="1399" instrument_node=""> From San Jose, there is a bus from Calle 14 that departs at 8 and 12. This takes 8 hours. From Liberia, it’s best to bus first to San Jose and then take the bus to Puerto Jimenez. You have to split it into two days.</span></li><li data-dcnode-id="1394"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">By flying:</span></strong><span data-dcnode-id="1395" instrument_node=""> Puerto Jimenez has a local airport. A direct flight from San Jose airport is about 40 minutes.</span></li><li data-dcnode-id="1390"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="1391" instrument_node="">A shared shuttle from San Jose is around $99 USD one way and a private can be around $400 USD one way for 1-4 people.</span></li></ul><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1387"></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Fly into San Jose International Airport for Puerto Jimenez. Most people will then take a local flight to Puerto Jimenez,</span></p><span data-dcnode-id="1383" instrument_node="">
</span><h3 data-dcnode-id="1380" id="h-tourist-friendly-14"><strong data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Many tourists use Puerto Jimenez as the home base in Osa Peninsula or as stopover for those who plan to hike Corcovado National Park. You can find all the services in town that you won’t in other places in the Osa Peninsula. </span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">This is also where you can find naturalist guides to hire for Corcovado, hardware stores for equipment, pharmacies and car rental companies. If you stay at one of the nicer lodges or hotels in Puerto Jimenez, you can use that as your homebase and do day trips from there.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><h3 data-dcnode-id="1370" id="h-best-things-to-do-14"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="1369" instrument_node="">
</span><ul data-dcnode-id="1346"><li data-dcnode-id="1363"><strong data-dcnode-id="1365"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/san-pedrillo-sirena-station-corcovado-national-park/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1368" instrument_node="">Corcovado National Park</span></a><span data-dcnode-id="1366" instrument_node="">: </span></strong><span data-dcnode-id="1364" instrument_node="">Visit the national park on a day trip hike or plan the overnight to Sirena station.</span></li><li data-dcnode-id="1359"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Matapalo:</span></strong><span data-dcnode-id="1360" instrument_node=""> Matapalo is the southern most tip of the Peninsula and you can take a day trip there to hike, go wildlife watching or surf.</span></li><li data-dcnode-id="1355"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">See dolphins:</span></strong><span data-dcnode-id="1356" instrument_node=""> Take a boat ride around the Golfito Bay to see huge groups of dolphins.</span></li><li data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Surf:</span></strong><span data-dcnode-id="1352" instrument_node=""> Surfing is excellent down in the Matapalo beaches.</span></li><li data-dcnode-id="1347"><strong data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Fish:</span></strong><span data-dcnode-id="1348" instrument_node=""> The Crocodile Bay Resort is famous for sport fishing</span></li></ul><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1344"></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Turtles also come to this area during certain times of the year to lay their eggs. You can take a turtle watching tour with Osa Conservation and they also take volunteers.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1337" id="h-recommended-hotels-11"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">There aren’t a ton of hotels in Puerto Jimenez and there isn’t much in between high end and extreme budget. </span></p><span data-dcnode-id="1333" instrument_node="">
</span><ul data-dcnode-id="1322"><li data-dcnode-id="1328"><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/iguana-lodge-osa-peninsula/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Iguana Lodge:</span></strong></a><span data-dcnode-id="1329" instrument_node=""> This hotel is ideal for those who don’t want to plan very much. They can put together a package for you which includes transportation, tours, dinners and lodging. They also offer yoga, SUP/boogie boards for guests. More on the high-end range.</span></li><li data-dcnode-id="1323"><strong data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Crocodile_Bay_Resort.htm%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1327" instrument_node="">Crocodile Bay Resort</span></a></strong><span data-dcnode-id="1324" instrument_node="">: Another high end resort that is great for fishing and can put together packages.</span></li></ul><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1320"></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">The Osa Peninsula is huge with a few different places to visit and stay, so make sure to read our </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/where-to-stay-in-osa-peninsula/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1317" instrument_node="">Osa Peninsula</span></a><span data-dcnode-id="1315" instrument_node=""> guide to help you plan your trip.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><h2 data-dcnode-id="1310" id="h-puerto-viejo"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Puerto Viejo</span></strong></h2><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">Known for its laid back, chill Caribbean vibes, </span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/puerto-viejo-de-talamanca-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1307" instrument_node="">Puerto Viejo</span></a><span data-dcnode-id="1305" instrument_node=""> is a destination unlike any other in Costa Rica. With pristine white sand beaches with crystal clear water, it’s a favorite for snorkeling and a relaxing beach vacation. Combine that with common sloth sightings, unique dishes and friendly locals, Puerto Viejo finds its way into every visitor’s heart.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><div class="wp-block-image wp-image-43461" data-dcnode-id="1296"><figure class="aligncenter" data-dcnode-id="1297"><img alt="Puerto viejo de talamanca downtown aerial picture" class="wp-image-43461" data-dcnode-id="1302" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2018/03/Puerto-Viejo-Talamanca-downtown.jpg" height="567" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20567'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">&lt;img width="880" height="567" src="https://mytanfeet.com/wp-content/uploads/2018/03/Puerto-Viejo-Talamanca-downtown.jpg" alt="Puerto viejo de talamanca downtown aerial picture" class="wp-image-43461"/&gt;</span></noscript><figcaption data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Puerto Viejo Downtown</span></figcaption></figure></div><span data-dcnode-id="1295" instrument_node="">
</span><h3 data-dcnode-id="1292" id="h-distance-from-sjo-and-lir-airport-12"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="1291" instrument_node="">
</span><ul data-dcnode-id="1274"><li data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">By driving: </span></strong><span data-dcnode-id="1288" instrument_node="">It’s about 5 hours from San Jose and 8 hours from Liberia. This road goes through a national park and is fairly straightforward using GPS.</span></li><li data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">By bus: </span></strong><span data-dcnode-id="1284" instrument_node="">There is one bus from San Jose that leaves daily at 6, 10, 14:00 and 16:00 which takes around 4.5 hours. From Liberia, it is best to bus to San Jose and then take the bus to Puerto Viejo.</span></li><li data-dcnode-id="1279"><strong data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">By flying:</span></strong><span data-dcnode-id="1280" instrument_node=""> The closest airport is Limon. You can fly from San Jose to Liberia and then take the bus from Limon to PV, every day from 5 AM – 18:00 or take a shuttle.</span></li><li data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="1276" instrument_node="">A shared shuttle is $57 USD per adult with Interbus, a private is around $300 USD one way.</span></li></ul><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1272"></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Fly into San Jose International Airport to get to Puerto Viejo. Most people will land at SJO Airport, book a shuttle to Puerto Viejo, rent a car for their time there and then shuttle or bus back to San Jose (if they are only staying in Puerto Viejo). You can also fly into the Limon domestic airport from SJO and then pick up a rental car, take the bus or grab a shuttle to Puerto Viejo.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><h3 data-dcnode-id="1265" id="h-tourist-friendly-15"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Puerto Viejo town is small, but has everything for tourists. If you venture outside of town or stay in a hotel at the neighboring beaches, you’ll have to go to town for those services. </span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1260" instrument_node="">The entire Puerto Viejo area and the small </span><em data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">barrios</span></em><span data-dcnode-id="1257" instrument_node=""> can be easily explored by foot or bicycle. One thing tourists should note is that this area doesn’t adhere to a strict rainy-dry season. It can rain all year long with October as the driest month.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><h3 data-dcnode-id="1252" id="h-best-things-to-do-15"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="1251" instrument_node="">
</span><ul data-dcnode-id="1218"><li data-dcnode-id="1235"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Explore the beaches:</span></strong><span data-dcnode-id="1248" instrument_node=""> Some of Costa Rica’s most beautiful beaches are near Puerto Viejo. Check out </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/playa-cocles-puerto-viejo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1247" instrument_node="">Cocles</span></a><span data-dcnode-id="1245" instrument_node="">, </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/punta-uva-puerto-viejo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1244" instrument_node="">Punta Uva</span></a><span data-dcnode-id="1242" instrument_node="">, </span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/playa-negra-puerto-viejo-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1241" instrument_node="">Negra</span></a><span data-dcnode-id="1239" instrument_node=""> or </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/playa-chiquita-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1238" instrument_node="">Chiquita</span></a><span data-dcnode-id="1236" instrument_node="">.</span></li><li data-dcnode-id="1231"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Eat:</span></strong><span data-dcnode-id="1232" instrument_node=""> Costa Rican Caribbean cuisine is completely different than the rest of the country. Indulge in rice and beans, pati and other unique dishes.</span></li><li data-dcnode-id="1225"><strong data-dcnode-id="1227"><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-national-park/cahuita-national-park-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1230" instrument_node="">Cahuita National Park</span></a><span data-dcnode-id="1228" instrument_node="">: </span></strong><span data-dcnode-id="1226" instrument_node="">Visit this national park to see wildlife and hike.</span></li><li data-dcnode-id="1219"><strong data-dcnode-id="1221"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/jaguar-rescue-center-puerto-viejo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1224" instrument_node="">Jaguar Rescue Center</span></a><span data-dcnode-id="1222" instrument_node="">:</span></strong><span data-dcnode-id="1220" instrument_node=""> If you want to get up close with animals such as jaguars, sloths and toucans, head to the Jaguar Rescue Center. They take in injured animals and rehabilitate them.</span></li></ul><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1216"></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">Read about other </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/things-to-do-puerto-viejo-de-talamanca/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1213" instrument_node="">things to do in Puerto Viejo</span></a><span data-dcnode-id="1211" instrument_node=""> here.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><h3 data-dcnode-id="1206" id="h-recommended-hotels-12"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">There are a lot of lodging options in Puerto Viejo and the neighboring communities. You can find hostels, standard hotels and vacation rentals. No all inclusive resorts or big resorts. Mostly all small boutique hotels.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><ul data-dcnode-id="1184"><li data-dcnode-id="1196"><strong data-dcnode-id="1198"><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/hotel-banana-azul-puerto-viejo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1201" instrument_node="">Hotel Banana Azul</span></a><span data-dcnode-id="1199" instrument_node="">: </span></strong><span data-dcnode-id="1197" instrument_node="">Located in Playa Negra, Hotel Banana Azul has a beautiful property with a beach club, gardens and ponds and a delicious on-site restaurant.</span></li><li data-dcnode-id="1190"><strong data-dcnode-id="1192"><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Tree_House_Lodge.htm%3Fa_aid%3D229074" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1195" instrument_node="">TreeHouses lodge</span></a><span data-dcnode-id="1193" instrument_node="">: </span></strong><span data-dcnode-id="1191" instrument_node="">5 luxury treehouses on Punta Uva.</span></li><li data-dcnode-id="1185"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Villas_del_Caribe.htm%3Fa_aid%3D229074" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Villas del Caribe:</span></strong></a><span data-dcnode-id="1186" instrument_node=""> This hotel is on Playa Chiquita. They have a pool and rooms are big enough for families with AC. About a 5 minute drive to town.</span></li></ul><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1182"></p><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1178" id="h-samara"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Samara</span></strong></h2><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1173"><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/cities-costa-rica/samara-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1176" instrument_node="">Samara</span></a><span data-dcnode-id="1174" instrument_node=""> is a very family friendly beach town in the South Guanacaste zone. It is an excellent town to see beautiful beaches, surf, relax and adventure. If you are flying into Guanacaste and Tamarindo sounds too much of a party town for you, definitely check out Samara.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><div class="wp-block-image wp-image-16050434 size-full" data-dcnode-id="1165"><figure class="aligncenter" data-dcnode-id="1166"><img alt="Best places in Costa Rica to visit - Samara" class="wp-image-16050434" data-dcnode-id="1171" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara.jpg 880w, https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara-300x200.jpg 300w, https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara-768x512.jpg 768w" height="587" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20587'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">&lt;img width="880" height="587" src="https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara.jpg" alt="Best places in Costa Rica to visit - Samara" class="wp-image-16050434" srcset="https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara.jpg 880w, https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara-300x200.jpg 300w, https://mytanfeet.com/wp-content/uploads/2018/11/Best-places-in-Costa-Rica-to-visit-Samara-768x512.jpg 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript><figcaption data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Samara beach</span></figcaption></figure></div><span data-dcnode-id="1164" instrument_node="">
</span><h3 data-dcnode-id="1161" id="h-distance-from-sjo-and-lir-airport-13"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="1160" instrument_node="">
</span><ul data-dcnode-id="1144"><li data-dcnode-id="1153"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">By driving: </span></strong><span data-dcnode-id="1157" instrument_node="">Samara is a 2 hour drive from Liberia airport and 4 hours from San Jose. From San Jose, you can take the </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/cities-costa-rica/puntarenas-pearl-costa-rican-pacific/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1156" instrument_node="">Puntarenas ferry</span></a><span data-dcnode-id="1154" instrument_node=""> to Naranjo.</span></li><li data-dcnode-id="1149"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">By bus:</span></strong><span data-dcnode-id="1150" instrument_node=""> From Liberia, you need to first take the bus to Nicoya and then to Samara. From San Jose, there is one bus at 12 PM and 5 PM every day with company Alfaro. This route takes 5 hours.</span></li><li data-dcnode-id="1145"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="1146" instrument_node="">From Liberia airport, Interbus has shared shuttles for $57 USD per person. Private shuttles are around $145 USD from Liberia and $290 from San Jose.</span></li></ul><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1142"></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Fly into Liberia International Airport to get to Samara.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><h3 data-dcnode-id="1135" id="h-tourist-friendly-16"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Samara is very tourist friendly with plenty of hotels, restaurants, info centers, banks and tour operators. It’s a small town and is a very family friendly with a low key, mellow atmosphere. Ideal for yogis and surfers too. Some businesses don’t accept credit card so make sure to have local currency or USD with you.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><h3 data-dcnode-id="1128" id="h-best-things-to-do-16"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="1127" instrument_node="">
</span><ul data-dcnode-id="1109"><li data-dcnode-id="1123"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Surfing: </span></strong><span data-dcnode-id="1124" instrument_node="">Samara has waves for beginners. You can take a lesson or rent a board.</span></li><li data-dcnode-id="1119"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Kayak and snorkel at Isla Chorro: </span></strong><span data-dcnode-id="1120" instrument_node="">Nice thirty minute kayak to the nearby island. Has decent snorkeling at the island</span></li><li data-dcnode-id="1114"><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/playa-barrigona-costa-rica/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Playa Barrigona</span></strong></a><span data-dcnode-id="1115" instrument_node="">: Gorgeous beach close by. It’s quiet so nice place to get away from crowds at Samara. Sometimes has surfing competitions. Must need 4×4/4wd in rainy season.</span></li><li data-dcnode-id="1110"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Samara Waterfall</span></strong><span data-dcnode-id="1111" instrument_node="">: there is a small waterfall just outside Samara like 10 minute drive.</span></li></ul><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1107"></p><span data-dcnode-id="1106" instrument_node="">
</span><h3 data-dcnode-id="1103" id="h-recommended-hotels-13"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="1102" instrument_node="">
</span><ul data-dcnode-id="1071"><li data-dcnode-id="1096"><strong data-dcnode-id="1098"><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/The-Hideaway-Hotel%2CCostaRica-c54076-h786581-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1101" instrument_node="">Hideaway Hotel Samara:</span></a><span data-dcnode-id="1099" instrument_node=""> </span></strong><span data-dcnode-id="1097" instrument_node="">Cute boutique hotel at the south end of the beach. Very quiet. </span></li><li data-dcnode-id="1089"><strong data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node=""> </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Villas-Kalimba%2CCostaRica-c54076-h2853509-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1094" instrument_node="">Villas Kalimba</span></a><span data-dcnode-id="1092" instrument_node="">: </span></strong><span data-dcnode-id="1090" instrument_node="">6 independent villas. Has a garden and large pool with a waterfall and Jacuzzi.</span></li><li data-dcnode-id="1083"><strong data-dcnode-id="1085"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Hotel-Sol-Samara%2CCostaRica-c54076-h315782-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1088" instrument_node="">Hotel Sol</span></a><span data-dcnode-id="1086" instrument_node="">: </span></strong><span data-dcnode-id="1084" instrument_node="">Standard hotel rooms and a family suite. In a quieter area of Samara. </span></li><li data-dcnode-id="1078"><strong data-dcnode-id="1080"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Villas-Playa-Samara-Beach-Front-Resort-All-Inclusive%2CCostaRica-c54076-h93363-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1082" instrument_node="">Hotel Villas Playa Samara: </span></a></strong><span data-dcnode-id="1079" instrument_node="">All-inclusive resort on the beach with a spa, restaurant, pool and bungalows and villas.</span></li><li data-dcnode-id="1072"><strong data-dcnode-id="1074"><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Azura-Beach-Resort-All-Inclusive-Adults-Only%2CCostaRica-c54076-h3654357-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1077" instrument_node="">Azura Beach Resort:</span></a><span data-dcnode-id="1075" instrument_node=""> </span></strong><span data-dcnode-id="1073" instrument_node="">all inclusive resort for adults </span></li></ul><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1069"></p><span data-dcnode-id="1068" instrument_node="">
</span><h2 data-dcnode-id="1065" id="h-san-jose"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">San Jose</span></strong></h2><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">San Jose is the capital city of Costa Rica. As the capital city, it’s actually a bit small with several nice cultural and historical gems so it’s perfect for 1 or 2 nights. There are some excellent restaurants in Costa Rica and is one of the best places to visit in Costa Rica to learn about culture and history.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><div class="wp-block-image size-full wp-image-27056027" data-dcnode-id="1054"><figure class="aligncenter" data-dcnode-id="1055"><img alt="San Jose is the capital city of Costa Rica" class="wp-image-27056027" data-dcnode-id="1060" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose-300x200.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose-768x512.jpg 768w" height="587" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20587'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">&lt;img width="880" height="587" src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose.jpg" alt="San Jose is the capital city of Costa Rica" class="wp-image-27056027" srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose-300x200.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-San-Jose-768x512.jpg 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript><figcaption data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">San Jose</span></figcaption></figure></div><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">We don’t highly recommend staying in San Jose for your entire trip. However, it is possible as you can stay in the city and do day trips from there. This is a very easy way to visit Costa Rica.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 data-dcnode-id="1047" id="h-distance-from-lir-airport"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Distance from LIR airport</span></strong></h3><span data-dcnode-id="1046" instrument_node="">
</span><ul data-dcnode-id="1029"><li data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">By driving: </span></strong><span data-dcnode-id="1043" instrument_node="">From Liberia airport, it’s about a 5 hour drive.</span></li><li data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">By bus: </span></strong><span data-dcnode-id="1039" instrument_node="">There is a bus from Liberia to San Jose everyday at 5, 6, 7, 8, 10, 12, 14:00, 16:00, 18:00 and 20:00. This takes about 4.5 hours.</span></li><li data-dcnode-id="1034"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">By flying:</span></strong><span data-dcnode-id="1035" instrument_node=""> You can take a local flight to San Jose from all the other local airports.</span></li><li data-dcnode-id="1030"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="1031" instrument_node="">A shared shuttle from Guanacaste to San Jose is $57 USD per adult with Interbus and a private is around $250 USD one way for 1-4 people.</span></li></ul><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1027"></p><span data-dcnode-id="1026" instrument_node="">
</span><h3 data-dcnode-id="1023" id="h-tourist-friendly-17"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Being the capital city, San Jose has absolutely everything for tourists. The only thing I’d say is not nice is the driving and traffic and the sidewalks are not well maintained. It is also sketchy at night.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><h3 data-dcnode-id="1016" id="h-best-things-to-do-17"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="1015" instrument_node="">
</span><ul data-dcnode-id="993"><li data-dcnode-id="1009"><strong data-dcnode-id="1011"><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/national-theater-in-san-jose-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1014" instrument_node="">National theater</span></a><span data-dcnode-id="1012" instrument_node="">: </span></strong><span data-dcnode-id="1010" instrument_node="">The national theater is the most beautiful building in Costa Rica. They hold plays and orchestras and you can tour it during the day.</span></li><li data-dcnode-id="1005"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Museums: </span></strong><span data-dcnode-id="1006" instrument_node="">The Gold Museum and Costa Rican Center of Science and Culture are two excellent museums.</span></li><li data-dcnode-id="1000"><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/san-jose-costa-rica-city-tour/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">San Jose city tour:</span></strong></a><span data-dcnode-id="1001" instrument_node=""> Learn more about the capital city on this informative guided city tour.</span></li><li data-dcnode-id="994"><strong data-dcnode-id="996"><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/doka-estate-coffee-tour-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="999" instrument_node="">Coffee tour</span></a><span data-dcnode-id="997" instrument_node="">:</span></strong><span data-dcnode-id="995" instrument_node=""> Coffee is readily grown in the outskirts of the Central Valley and you can take a tour to learn how Costa Rica processes their coffee.</span></li></ul><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="991"></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="989" instrument_node="">Read our </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/things-to-do-in-san-jose-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="988" instrument_node="">San Jose travel guide</span></a><span data-dcnode-id="986" instrument_node=""> and post about </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/day-trips-from-san-jose-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="985" instrument_node="">day trips from San Jose</span></a><span data-dcnode-id="983" instrument_node="">. (We offer small discounts on San Jose day tours. Please </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/special-deals/san-jose-day-tours-discount/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="982" instrument_node="">click here</span></a><span data-dcnode-id="980" instrument_node=""> to get it!)</span></p><span data-dcnode-id="978" instrument_node="">
</span><h3 data-dcnode-id="975" id="h-recommended-hotels-14"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Most hotels in San Jose are perfect for a home base and the airport.</span></p><span data-dcnode-id="971" instrument_node="">
</span><ul data-dcnode-id="954"><li data-dcnode-id="966"><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/adventure-inn-in-san-jose/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Adventure Inn:</span></strong></a><span data-dcnode-id="967" instrument_node=""> A cozy boutique inn with a gym, office area and restaurant. It’s kind of halfway in between the San Jose airport and downtown so nice location. The furnishings and decorations are some of the most Costa Rican inspired I’ve seen. Get 10% off your booking in the link!</span></li><li data-dcnode-id="961"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Gran_Hotel_Costa_Rica_Curio_Collection_By_Hilton.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Gran Hotel</span></strong></a><span data-dcnode-id="962" instrument_node="">: This hotel is excellent for a home base in downtown San Jose. You’re close to all the attractions and walking distance to pretty much everything.</span></li><li data-dcnode-id="955"><strong data-dcnode-id="957"><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hotel_Presidente_San_Jose_City_Center.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="960" instrument_node="">Hotel Presidente</span></a><span data-dcnode-id="958" instrument_node="">: </span></strong><span data-dcnode-id="956" instrument_node="">Another hotel in downtown San Jose, has a cafe/bar with a great view of the Avenue, perfect for people watching.</span></li></ul><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="952"></p><span data-dcnode-id="951" instrument_node="">
</span><h2 data-dcnode-id="948" id="h-santa-teresa"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Santa Teresa</span></strong></h2><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">Santa Teresa’s vast beaches, excellent surfing waves and remote location is another beloved surfing, yoga and wellness destination in Costa Rica. Although </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/cities-costa-rica/santa-teresa-costa-rica/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="945" instrument_node="">Santa Teresa</span></a><span data-dcnode-id="943" instrument_node=""> is a bit far from the airports, it’s worth the journey to visit this idyllic beach town in the Nicoya Peninsula.</span></p><span data-dcnode-id="941" instrument_node="">
</span><div class="wp-block-image size-full wp-image-32058124" data-dcnode-id="934"><figure class="aligncenter" data-dcnode-id="935"><img alt="best places to visit in Costa Rica - Santa Teresa" class="wp-image-32058124" data-dcnode-id="940" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa.jpg 880w, https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa-300x169.jpg 300w, https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa-768x432.jpg 768w" height="495" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20495'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">&lt;img width="880" height="495" src="https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa.jpg" alt="best places to visit in Costa Rica - Santa Teresa" class="wp-image-32058124" srcset="https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa.jpg 880w, https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa-300x169.jpg 300w, https://mytanfeet.com/wp-content/uploads/2020/03/best-places-to-visit-in-Costa-Rica-Santa-Teresa-768x432.jpg 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript><figcaption data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Playa Santa Teresa</span></figcaption></figure></div><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="930" id="h-distance-from-sjo-and-lir-airport-14"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="929" instrument_node="">
</span><ul data-dcnode-id="916"><li data-dcnode-id="925"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">By driving: </span></strong><span data-dcnode-id="926" instrument_node="">From San Jose, it’s about a 5 hour drive with taking the Puntarenas ferry. It’s about 4 hours from Liberia International Airport.</span></li><li data-dcnode-id="921"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">By bus: </span></strong><span data-dcnode-id="922" instrument_node="">There is a bus from San Jose to Mal Pais (ending in Santa Teresa) every day at 6 AM and 2 PM leaving San Jose. It costs around 7000 colones one way per adult and is a 5.5 hour ride. This bus goes by the way of the ferry and includes the ferry ticket.</span></li><li data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="918" instrument_node="">You can find shared shuttles with Interbus from San Jose that costs around $57 USD per person. Private shuttles are around $250 USD depending on number of passengers.</span></li></ul><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">You can fly into San Jose International Airport and then take the Puntarenas ferry or drive to Santa Teresa. If you fly into Liberia International Airport, make sure to drive around the Nicoya Peninsula via Route 21 past Montezuma. 4×4/4wd required.</span></p><span data-dcnode-id="912" instrument_node="">
</span><h3 data-dcnode-id="909" id="h-tourist-friendly-18"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Santa Teresa’s location makes it far from main services like hospitals but it has pretty much everything for tourists at least for hotels, tour desks and restaurants. Santa Teresa is a cash heavy community so make sure to bring plenty of USD and Costa Rican colones because there is only one ATM servicing this entire community and it runs out of money often. </span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">There are many hotels, vacation rentals, a bank in Mal Pais, restaurants, surf shops and cars/ATV/bike rentals. It’s a really popular destination for digital nomads, young adults, surfers and older families.</span></p><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="899" id="h-best-things-to-do-18"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="898" instrument_node="">
</span><ul data-dcnode-id="889"><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Surfing. Santa Teresa has great surfing waves. Stay at a surf and yoga camp to learn how to catch waves!</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">ATV. Rent an ATV (main mode of transportation) and drive around the beaches.</span></li><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Fish. Mal Pais is the main fishing hub in the area.</span></li><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Tortuga Island and Curu Wildlife Refuge: For hiking and more beaches</span></li></ul><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="887"></p><span data-dcnode-id="886" instrument_node="">
</span><h3 data-dcnode-id="883" id="h-recommended-hotels-15"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="882" instrument_node="">
</span><ul data-dcnode-id="851"><li data-dcnode-id="876"><strong data-dcnode-id="878"><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Hotel-Playa-Santa-Teresa%2CProvinceOfPuntarenas%2CCostaRica-c58665-h2784560-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="881" instrument_node="">Hotel Santa Teresa:</span></a><span data-dcnode-id="879" instrument_node=""> </span></strong><span data-dcnode-id="877" instrument_node="">We stayed here with my brother and enjoyed it. It’s in Carmen and very close to the beach.</span></li><li data-dcnode-id="870"><strong data-dcnode-id="872"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Casa_Chameleon_Hotel_Mal_Pais.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="875" instrument_node="">Casa Chameleon Mal Pais</span></a><span data-dcnode-id="873" instrument_node="">: </span></strong><span data-dcnode-id="871" instrument_node="">Upscale adult only hotel with villas in Mal Pais. Great for couples.</span></li><li data-dcnode-id="864"><strong data-dcnode-id="866"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Selina_Santa_Teresa_North.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="869" instrument_node="">Selina Santa Teresa</span></a><span data-dcnode-id="867" instrument_node="">:</span></strong><span data-dcnode-id="865" instrument_node=""> Selina has Santa Teresa North and South. Beachfront, good for young adults.</span></li><li data-dcnode-id="858"><strong data-dcnode-id="860"><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Florblanca.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="863" instrument_node="">Florblanca Resort</span></a><span data-dcnode-id="861" instrument_node="">: </span></strong><span data-dcnode-id="859" instrument_node="">Luxury resort, great place for couples.</span></li><li data-dcnode-id="852"><strong data-dcnode-id="854"><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotelscombined.com/hotels/Lua-Villas%2CProvinceOfPuntarenas%2CCostaRica-c58665-h3514571-details%3Fa_aid%3D229074" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="857" instrument_node="">Lua Villas</span></a><span data-dcnode-id="855" instrument_node="">: </span></strong><span data-dcnode-id="853" instrument_node="">In Playa Hermosa, 5 minutes to the beach. Cute hotels with fully furnished studios and apartments. </span></li></ul><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="849"></p><span data-dcnode-id="848" instrument_node="">
</span><h2 data-dcnode-id="845" id="h-sarapiqui"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Sarapiqui</span></strong></h2><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">The largest canton in Heredia has much to offer for nature lovers and sustainable travelers. Famous for agriculture, white water rafting, birdwatching and hiking, it’s also a popular destination for student groups. The capital of the </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/cities-costa-rica/sarapiqui-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="842" instrument_node="">Sarapiqui</span></a><span data-dcnode-id="840" instrument_node=""> canton is Puerto Viejo.</span></p><span data-dcnode-id="838" instrument_node="">
</span><div class="wp-block-image size-full wp-image-32058173" data-dcnode-id="831"><figure class="aligncenter" data-dcnode-id="832"><img alt="Sarapiqui" class="wp-image-32058173" data-dcnode-id="837" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui.jpg 880w, https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui-300x169.jpg 300w, https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui-768x432.jpg 768w" height="495" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20495'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&lt;img width="880" height="495" src="https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui.jpg" alt="Sarapiqui" class="wp-image-32058173" srcset="https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui.jpg 880w, https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui-300x169.jpg 300w, https://mytanfeet.com/wp-content/uploads/2020/07/best-places-to-visit-in-Costa-Rica-sarapiqui-768x432.jpg 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript><figcaption data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Sarapiqui</span></figcaption></figure></div><span data-dcnode-id="830" instrument_node="">
</span><h3 data-dcnode-id="827" id="h-distance-from-sjo-and-lir-airport-15"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="826" instrument_node="">
</span><ul data-dcnode-id="813"><li data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Driving: </span></strong><span data-dcnode-id="823" instrument_node="">Sarapiqui is about a 2 hour drive from San Jose and 4 hours from Liberia. Sarapiqui has mostly paved roads throughout the canton (main roads) so a 4×4/4wd is not absolutely necessary. But make sure to ask your hotel/host first.</span></li><li data-dcnode-id="818"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Bus: </span></strong><span data-dcnode-id="819" instrument_node="">Everyday, there is a bus from San Jose to Puerto Viejo de Sarapiqui with Terminal del Caribe (Calle Central, Ave 15) at 630, 730, 10, 1130, 130 PM, 230 PM, 330 PM, 430 PM and 6 PM that takes 2 hours. The Vara Blanca Terminal Del Caribe has another bus from San Jose to Puerto Viejo de Sarapiqui at 630, 1 PM and 5 PM that takes 3.5 hours.</span></li><li data-dcnode-id="814"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Shuttle: </span></strong><span data-dcnode-id="815" instrument_node=""> You can find shared shuttles from Puerto Viejo, La Fortuna and Guapiles with Interbus. A private shuttle is around $165 USD from San Jose.</span></li></ul><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="811"></p><span data-dcnode-id="810" instrument_node="">
</span><h3 data-dcnode-id="807" id="h-tourist-friendly-19"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Sarapiqui has it all for tourists since it is has all services like banks, pharmacies, ATM’s and clinics in Puerto Viejo. Since Sarapiqui is a large canton, the hotels are spread out throughout these districts: Horquetas, Puerto Viejo and La Virgen. </span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Additionally, hotels are built with a more eco-conscious theme in mind so that means only soloar-powered hot water (which tends to run out fast with a lot of people). Additionally, most hotels do not have air conditioning. Or if they do, those rooms cost more. Sarapiqui is more ideal for those looking for a non-touristic destination to connect with nature as hotels tend to be like modest nature lodges.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Something to know is  that during the summer months (May – end of August), Sarapiqui gets incredibly busy with student groups. We visited in June and it was very noisy at the hotel, Many activities were already fully booked for the students.</span></p><span data-dcnode-id="797" instrument_node="">
</span><h3 data-dcnode-id="794" id="h-best-things-to-do-19"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="793" instrument_node="">
</span><ul data-dcnode-id="786"><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">White water rafting: The pristine Sarapiqui River offers Class 2 and 3 rapids, perfect for beginner rafters or those looking for a more chill outdoor adventure.</span></li><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Cooking classes: All the hotels have their own garden and offer cooking classes.</span></li><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Chocolate and pineapple tour: This area produces much of Costa Rica’s pineapples</span></li></ul><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="784"></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="780" id="h-recommended-hotels-16"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="778" instrument_node="">We stayed at </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/selva-verde-lodge/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="777" instrument_node="">Selva Verde Lodge</span></a><span data-dcnode-id="775" instrument_node=""> which we enjoyed and </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/hotels-in-costa-rica/hacienda-pozo-azul-sarapiqui/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">Hacienda Poza Azul</span></a><span data-dcnode-id="772" instrument_node=""> which has tents (they are in need of an upgrade though). For a nicer hotel with air conditioning, check out La Quinta.</span></p><span data-dcnode-id="770" instrument_node="">
</span><h2 data-dcnode-id="767" id="h-tamarindo"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Tamarindo</span></strong></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="762"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-beach-information/playa-tamarindo-costa-rica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="765" instrument_node="">Tamarindo</span></a><span data-dcnode-id="763" instrument_node=""> is a popular beach town in Guanacaste with excellent surfing waves and a fun nightlife. The beach is beautiful with stunning sunsets. It’s a favorite for families looking for a fun beach and convenience.</span></p><span data-dcnode-id="761" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="756"><figure class="aligncenter" data-dcnode-id="757"><img alt="Best places to visit in Costa Rica for first timers - Tamarindo" class="wp-image-27056020" data-dcnode-id="760" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-300x225.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-768x576.jpg 768w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-702x526.jpg 702w" height="660" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20660'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&lt;img width="880" height="660" src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo.jpg" alt="Best places to visit in Costa Rica for first timers - Tamarindo" class="wp-image-27056020" srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-300x225.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-768x576.jpg 768w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tamarindo-702x526.jpg 702w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript></figure></div><span data-dcnode-id="755" instrument_node="">
</span><h3 data-dcnode-id="752" id="h-distance-from-sjo-and-lir-airport-16"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Distance from SJO and LIR airport</span></strong></h3><span data-dcnode-id="751" instrument_node="">
</span><ul data-dcnode-id="734"><li data-dcnode-id="747"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">By driving:</span></strong><span data-dcnode-id="748" instrument_node=""> Tamarindo is 1 hour from LIR airport and 4-5 hours from SJO.</span></li><li data-dcnode-id="743"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">By bus:</span></strong><span data-dcnode-id="744" instrument_node=""> There are 2 buses from San Jose to Tamarindo. The one that leaves from Calle 14 departs daily at 11:30 by way of Liberia and 15:30 by way of Tempisque. The one that leaves from Calle 20 departs daily at 7:15 and 16:00. Both routes take 5.5 hours. From Liberia, the bus leaves at 3:50, 4:30, 5:15, 6:10, 7:30, 9, 10. 11, 13:00, 14:00, 16:00, 17:00 and 18:00 which takes 1.5 hours.</span></li><li data-dcnode-id="739"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">By flying:</span></strong><span data-dcnode-id="740" instrument_node=""> Tamarindo has a local airport. From San Jose it is a 35 minute flight, from Liberia it is 10 minutes.</span></li><li data-dcnode-id="735"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">By shuttle: </span></strong><span data-dcnode-id="736" instrument_node="">A shared shuttle from LIR airport is $20 USD a person with Tamarindo Transfers and Tours, minimum 2 people. A private is around $65-80 USD for 1-4 people one way.</span></li></ul><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="732"></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Fly into Liberia International Airport for Tamarindo. You can also fly to SJO Airport and then take a local flight to Tamarindo.</span></p><span data-dcnode-id="728" instrument_node="">
</span><h3 data-dcnode-id="725" id="h-tourist-friendly-20"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Tourist friendly</span></strong></h3><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Tamarindo has everything: an airport, car rental companies, hostels, banks, souvenir stores, pharmacies, tour companies and supermarkets. It’s a small enough that you can walk everywhere. They have a good selection of international restaurants. </span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">One downside is that parking is limited and there are no secure parking lots in Tamarindo. Additionally, we don’t really like the pirate taxi drivers but there aren’t really any official taxis or Ubers in Tamarindo.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Tamarindo is also a party town and it can get fairly rowdy during national holidays and the high tourism season. The beach can get packed in December, March and April. The many bars downtown will play loud music on weekends. In January, Tamarindo is host to a couple of big electronic music festivals and it gets quite crazy during that time as well. It is important to note that Tamarindo is both a family friendly and party beach town.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="712" id="h-best-things-to-do-20"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Best things to do</span></strong></h3><span data-dcnode-id="711" instrument_node="">
</span><ul data-dcnode-id="698"><li data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Surfing: </span></strong><span data-dcnode-id="708" instrument_node="">Tamarindo’s excellent for learning and there are tons of surf shops.</span></li><li data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Sunset sailing: </span></strong><span data-dcnode-id="704" instrument_node="">Sail into the ocean on a catamaran, snorkel with some fishies and then come back under a beautiful sunset.</span></li><li data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Estuary boat ride: </span></strong><span data-dcnode-id="700" instrument_node="">Take a leisurely boat ride through the Tamarindo estuary for wildlife watching.</span></li></ul><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="696"></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="694" instrument_node="">There are a bunch of activities outside of Tamarindo such as ziplining, sport fishing and hiking. Read our post for more info on </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/things-to-do-in-tamarindo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="693" instrument_node="">things to do in Tamarindo.</span></a></p><span data-dcnode-id="690" instrument_node="">
</span><h3 data-dcnode-id="687" id="h-recommended-hotels-17"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Recommended hotels</span></strong></h3><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">There are a ton of lodging options in Tamarindo from hostels to Airbnbs.</span></p><span data-dcnode-id="683" instrument_node="">
</span><ul data-dcnode-id="657"><li data-dcnode-id="677"><strong data-dcnode-id="679"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hotel_Mar_Rey.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="682" instrument_node="">Hotel Mar Rey</span></a><span data-dcnode-id="680" instrument_node="">: </span></strong><span data-dcnode-id="678" instrument_node="">This budget to mid range hotel is smack dab in the middle of town. It’s just steps from the beach and restaurants.</span></li><li data-dcnode-id="668"><strong data-dcnode-id="673"><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Coral_Reef_Surf_Hostel_and_Camp.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="676" instrument_node="">Coral Reef Surf Hostel</span></a><span data-dcnode-id="674" instrument_node="">: </span></strong><span data-dcnode-id="672" instrument_node="">One of the best hostels in Tamarindo right in town. It’s next to some restaurants and only a 5 minute walk to the beach. </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Selina_Tamarindo.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="671" instrument_node="">Selina</span></a><span data-dcnode-id="669" instrument_node=""> is also in Tamarindo.</span></li><li data-dcnode-id="662"><strong data-dcnode-id="664"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Jardin_del_Eden_Boutique_Hotel.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="667" instrument_node="">Jardin del Eden</span></a><span data-dcnode-id="665" instrument_node="">: </span></strong><span data-dcnode-id="663" instrument_node="">This luxury adult only hotel is perfect for romantic getaways or group trips. Some rooms have balconies with ocean views and the hotel has their own beachfront area.</span></li><li data-dcnode-id="658"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Diria:</span></strong><span data-dcnode-id="659" instrument_node=""> Luxury hotel on the beach with pools and restaurants.</span></li></ul><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="655"></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">There are a couple surf camps/vacations in Tamarindo such as Witch’s Rock and Iguana Surf.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h2 data-dcnode-id="648" id="h-tortuguero"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Tortuguero</span></strong></h2><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">Although </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-national-park/tortuguero-national-park/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="645" instrument_node="">Tortuguero</span></a><span data-dcnode-id="643" instrument_node=""> is in a remote area of the North Caribbean that is only accessible by boat or plane, it’s actually one of the best places in Costa Rica for first timers. This area, nicknamed the “Little Amazon” of Costa Rica is one of the best for wildlife, nature and rainforest!</span></p><span data-dcnode-id="641" instrument_node="">
</span><div class="wp-block-image size-full wp-image-27056022" data-dcnode-id="634"><figure class="aligncenter" data-dcnode-id="635"><img alt="Tortuguero: a small village in the North Caribbean of Costa Rica, great for wildlife and nature" class="wp-image-27056022" data-dcnode-id="640" data-lazy-sizes="(max-width: 880px) 100vw, 880px" data-lazy-src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero.jpg" data-lazy-srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero-300x168.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero-768x431.jpg 768w" height="494" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20880%20494'%3E%3C/svg%3E" width="880"><noscript data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&lt;img width="880" height="494" src="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero.jpg" alt="Tortuguero: a small village in the North Caribbean of Costa Rica, great for wildlife and nature" class="wp-image-27056022" srcset="https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero.jpg 880w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero-300x168.jpg 300w, https://mytanfeet.com/wp-content/uploads/2019/03/Best-places-to-visit-in-Costa-Rica-for-first-timers-Tortuguero-768x431.jpg 768w" sizes="(max-width: 880px) 100vw, 880px" /&gt;</span></noscript><figcaption data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Tortuguero</span></figcaption></figure></div><span data-dcnode-id="633" instrument_node="">
</span><h3 data-dcnode-id="630" id="h-distance-from-san-jose-and-liberia-airport"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Distance from San Jose and Liberia Airport</span></strong></h3><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">To get to Tortuguero, visitors must take a plane directly to the village or drive to the La Pavona dock and take the boat. From San Jose, Tortuguero is around a 4-5 hour journey by bus and boat. The plane ride is only about 45 minutes. </span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="625" instrument_node="">You can travel independently or book a </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/activities/tortuguero-packages/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="624" instrument_node="">Tortuguero package</span></a><span data-dcnode-id="622" instrument_node=""> that includes roundtrip transportation (get our </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/special-deals/pachira-tortuguero-packages-discount/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="621" instrument_node="">Tortuguero discount</span></a><span data-dcnode-id="619" instrument_node=""> here!) and find out </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/costa-rica-travel-tips/how-to-get-to-tortuguero-by-boat-and-plane/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="618" instrument_node="">how to get to Tortuguero</span></a><span data-dcnode-id="616" instrument_node=""> in our post.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">We usually recommend to visit Tortuguero as your first destination after landing in San Jose because of the logistics. From Liberia, you have to stay a night in San Jose as it is too far to travel. It’s all the way from one coast to another.</span></p><span data-dcnode-id="611" instrument_node="">
</span><h3 data-dcnode-id="608" id="h-tourist-friendly-21"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Tourist Friendly</span></strong></h3><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Tortuguero receives a good chunk of visitors (mostly Europeans) and is getting more tourist friendly. The small village just put in the first ATM and there are more hotel options. We always say that Tortuguero is an excellent first destination in Costa Rica because it’s such a lush rainforest with abundant wildlife, giving tourists a great first impression of Costa Rica.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">This area is quite small though with not a ton to do, so most people stay 1-3 nights in Tortuguero.</span></p><span data-dcnode-id="601" instrument_node="">
</span><h3 data-dcnode-id="598" id="h-best-things-to-do-21"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Best Things to Do</span></strong></h3><span data-dcnode-id="597" instrument_node="">
</span><ul data-dcnode-id="590"><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Turtle tour: Tortuguero is the best site in Costa Rica to see Green Turtles and Leatherbacks. May – November are the best times to see nesting turtles and babies.</span></li><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Boat ride through the national park: Tortuguero National Park is made up of canals and sandbars, so taking a boat ride or kayaking is a must.</span></li><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Hiking: The national park also has several trails for good hiking.</span></li></ul><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="588"></p><span data-dcnode-id="587" instrument_node="">
</span><h3 data-dcnode-id="585" id="h-recommended-hotels-18"><span data-dcnode-id="586" instrument_node="">Recommended Hotels</span></h3><span data-dcnode-id="584" instrument_node="">
</span><ul data-dcnode-id="564"><li data-dcnode-id="577"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Evergreen Lodge, Aninga and Pachira:</span></strong><span data-dcnode-id="581" instrument_node=""> Lodges owned by Pachira that are next to the national park. All have a pool, restaurants, Wi-fi, bars and variety of rooms and bungalows. (Get our </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mytanfeet.com/special-deals/pachira-tortuguero-packages-discount/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="580" instrument_node="">Pachira Tortuguero packages discount</span></a><span data-dcnode-id="578" instrument_node=""> here!)</span></li><li data-dcnode-id="572"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Manatus_Hotel.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Manatus:</span></strong></a><span data-dcnode-id="573" instrument_node=""> Another lodge near the national park. Only hotel with AC.</span></li><li data-dcnode-id="565"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Mawamba_Lodge.htm%3Fa_aid%3D229074" rel="nofollow noopener noreferrer" target="_blank"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Mawamba</span></strong></a><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">: </span></strong><span data-dcnode-id="566" instrument_node="">Lodge with its own entrance to Tortuguero beach and village.</span></li></ul><span data-dcnode-id="563" instrument_node="">
