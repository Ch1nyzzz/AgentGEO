</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">On the Beach act as an agent providing a web search interface between you and various third party suppliers of travel products (e.g. flight, hotel or transfer). For flights we act as your agent in processing your booking with the airline; we are not the airline’s agent. Each product you choose creates a separate contract between you and the supplier of that product.
</span></p><span data-dcnode-id="122" instrument_node="">
</span><div class="footer__travel-advice" data-dcnode-id="97"><span data-dcnode-id="121" instrument_node="">
</span><img alt="Travel Aware" class="footer__image" data-dcnode-id="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthebeach.co.uk/packaged-assets/application/icons/travelaware-2d2b99631ca94e446e80cca5eafd325f207885e360de161bd9fda2bfdcdff8b4.jpg&amp;raw"><span data-dcnode-id="119" instrument_node="">
</span><span data-dcnode-id="99"><span data-dcnode-id="118" instrument_node="">
</span><h3 class="footer__travel-advice-heading" data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Stay safe whilst you travel</span></h3><span data-dcnode-id="115" instrument_node="">
</span><p class="footer__travel-advice-text" data-dcnode-id="111"><span data-dcnode-id="114" instrument_node="">For the latest foreign travel advice visit </span><a data-dcnode-id="112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/foreign-travel-advice" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="113" instrument_node="">www.gov.uk/foreign-travel-advice</span></a></p><span data-dcnode-id="110" instrument_node="">
</span><p class="footer__travel-advice-text" data-dcnode-id="106"><span data-dcnode-id="109" instrument_node="">Follow our </span><a data-dcnode-id="107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthebeach.co.uk/travel-updates"><span data-dcnode-id="108" instrument_node="">Travel Updates</span></a></p><span data-dcnode-id="105" instrument_node="">
</span><p class="footer__travel-advice-text" data-dcnode-id="101"><span data-dcnode-id="104" instrument_node="">Get the latest on </span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthebeach.co.uk/faqs/coronavirus"><span data-dcnode-id="103" instrument_node="">our COVID-19 (Coronavirus) response and travel information</span></a></p><span data-dcnode-id="100" instrument_node="">
</span></span><span data-dcnode-id="98" instrument_node="">
</span></div><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="88"><span data-dcnode-id="95" instrument_node="">As an online travel agent, we let you build your own holiday by giving you access to a wide range of cheap flights, hotels and transfer suppliers, saving you money. And it’s great to know that when you book a package holiday (including a flight) through On the Beach, every part is financially protected by the ATOL scheme. Find out why you can </span><a data-dcnode-id="93" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthebeach.co.uk/book-with-confidence"><span data-dcnode-id="94" instrument_node="">book with confidence</span></a><span data-dcnode-id="92" instrument_node="">. On the Beach Limited is an Accredited Body Member of On the Beach Travel Ltd (ATOL number 11549). Some of the flights and flight-inclusive holidays on this website are financially protected by the ATOL scheme. But ATOL protection does not apply to all holidays and travel services listed on this website. This website will provide you with information on the protection that applies in the case of each holiday and travel service offered before you make your booking. If you do not receive an ATOL certificate then the booking will not be ATOL protected. If you do receive an ATOL certificate but all of the parts of your trip are not listed on it, those parts will not be ATOL protected. For package holidays that do not include a flight, all monies paid to us in relation to such holidays are fully protected in the event of our insolvency. This insurance protection has been arranged by International Passenger Protection Limited. Please see our booking conditions for further information or for more information about financial protection and the ATOL certificate go to </span><a data-dcnode-id="90" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caa.co.uk/" rel="noreferrer nofollow" target="_blank"><span data-dcnode-id="91" instrument_node="">www.caa.co.uk</span></a><span data-dcnode-id="89" instrument_node="">.</span></p><span data-dcnode-id="87" instrument_node="">
