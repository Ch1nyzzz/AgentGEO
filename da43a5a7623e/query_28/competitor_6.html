		This bed and breakfast is in a tranquil and historic location among the Georgia Mountains by the Blue Ridge Mountain foothills. For more than a century, this bed and breakfast has been providing a getaway in one of 16 exquisite guest rooms. Every room has a private bath and combines period antiques and local furniture with modern amenities and luxury linens. King or queen rooms feature custom-milled bath products, robes, gourmet coffeemakers, wireless Internet, private entrances, spa sound machines, and covered porches with rocking chairs. The Three-Room Suites and Penthouse Suites add even more amenities like gas fireplaces and mini-fridges. 

</span></p><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Glen-Ella Springs is on17 acres surrounded by the Chattahoochee National Forest and its own perennial herb and flower garden. There is also a fine-dining restaurant on-site that serves the public as well as inn guests and it is one of the best ranked in the area. The complimentary breakfast has hot entrees, seasonal fruit, fresh bread, assorted tea, freshly ground gourmet coffee, and juice.

		The Blue Heron Inn is perfect for couples who want to relax and enjoy the natural beauty of Georgia. The five rooms each have their own unique theme and have amenities like flat screen TVs, king beds, ceiling fans, individualized air conditioning and heating, hair dryers, toiletries, and private bathrooms featuring walk-in showers. Some also have decks with tables and chairs, French doors and whirlpool tubs. 

</span></p><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">The inn is surrounded by winding tidal creeks and an expansive marsh, offering great views from every room. The area is perfect for bird-watching or other nature observing and the inn is just minutes from prime viewing locations. Guests can borrow kayaks or bicycles to explore the area or just sit on the dock and watch the beautiful nature. The daily full breakfast varies but includes fresh herbs and vegetables from the garden. Some favorite dishes include ginger bread Belgian waffles, shrimp or fresh vegetable omelets, eggs McIntosh, and lime French toast. With advance notice, the inn can accommodate special diets.

</span></p><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">The outdoor porch has a ceiling fan and plenty of furniture and most rooms feature direct access to it. Guests can also enjoy concierge services, the media room and the exercise room. The complimentary continental breakfast is served as a buffet in the Oak Room, which is inspired by a European pub. You will find freshly ground coffee, sausages, bacon, toasted bread, fresh waffles, fresh fruit, yogurt, pastries, quiches and juice. The Spa is right next to the inn and part of it, meaning you can opt for a spa package to save money on your stay.

</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The inn has seen some stories of haunting, making it a perfect location for those who are curious about ghosts but don't want anything too intimidating or scary. If you know where to look in the building you will see original wood shingles. The on-site restaurant sits up to 100 people and is known for its professional service, elegant setting and delicious food for brunch, lunch, dinner and dessert. The restaurant has been in operation for over a century and has built up quite a reputation. The inn and restaurant also has a lounge perfect for relaxation and a few drinks.

</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">The day begins with a gourmet breakfast; the afternoon features a hors d'oeuvres and wine reception with piano music on Fridays; and there is a coffee service and homemade biscotti following dinner. Fresh cookies are delivered as part of the turn down service. The breakfast is made-to-order and features an extensive menu.

</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Romantic Getaways Near Me: Tybee Beachview Bed &amp; Breakfast

</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Tybee Beachview Bed &amp; Breakfast is located right by the beach so guests can enjoy gorgeous views and easy access to all their favorite outdoor activities in a historic property. The eight rooms have private porches, fireplaces, luxurious linens, and air conditioning. There is also a private cottage with one bedroom available for more privacy, making it perfect for romantic vacations. </span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Guests can spend some time in the fragrant gardens before or after a trip to the beach. The day begins with a farm-to-table breakfast and there is a complimentary dessert every evening. You can also always find cookies in the kitchen, and cold beverages, homemade snacks and fresh coffee in Ophelia's Lounge at any time of the day. As the only commercial Bed and Breakfast in Tybee, guests can buy wine and beer on-site. </span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="713"><i data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">1701 Butler Avenue, Tybee Island, GA, Phone: 912-786-5500</span></i></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Resorts in Georgia: The Twelve Oaks

</span></p><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">The Twelve Oaks home actually inspired the famous mansion in </span><i data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Gone with the Wind</span></i><span data-dcnode-id="706" instrument_node=""> and gives guests the chance to visit and tour the building or spend a night. The antebellum home has almost 12,000 square feet and was built in 1836 with meticulous renovations. The home is listed on the National Register of Historic Places and features elegant rooms with private luxury bathrooms, flat panel TVs, wireless Internet and remote control fireplaces. Some rooms also have spa tubs and grand suites feature original ribcage showers. Rooms also include Egyptian cotton sheets and soft Turkish robes. You can choose from one of four guest rooms with queen beds and three with king beds, one of which can also feature double beds. </span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">In the morning, guests can enjoy a home-cooked southern breakfast made with local ingredients. The complimentary turndown service features cold water and chocolate truffles. The evening also features a Southern Sippin' and Nibblin' Hour with snacks, cheese and drinks. </span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698"><i data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">2176 Monticello Street SW, Covington, GA, Phone: 770-385-4005</span></i></p><span data-dcnode-id="697" instrument_node="">

</span><p data-dcnode-id="677"><b data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Venue Spotlight: Stonehurst Place</span></b></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">Set in an art-filled 19th-century mansion in Midtown </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-atlanta-ga.html"><span data-dcnode-id="674" instrument_node="">Atlanta</span></a><span data-dcnode-id="672" instrument_node="">, Stonehurst Place is an award-winning boutique hotel and one of the most luxurious retreats in the city. Locate in the heart of the historic Atlanta neighborhood and bustling business district; the hotel is ideally placed for exploring the city, as well as hosting special events and offers a unique combination of grace and charm from a bygone era and modern amenities. The hotel features luxurious accommodations, modern amenities and upscale facilities, acclaimed dining, and gracious hospitality and service.

</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Stonehurst Place features six exquisitely appointed guest rooms and suites with comfortable furnishings, elegant décor and museum quality art, en-suite bathrooms, and stylish amenities. A delicious gourmet breakfast is served every morning, and an airport shuttle is available for guests. The hotel also specializes in intimate weddings, special celebrations, and elopements, with beautiful indoor spaces, and pristinely manicured gardens and grounds for outdoor ceremonies and receptions.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Stonehurst Place offers a variety of elopement packages that include a private ceremony, a cake cutting and toast and gracious accommodations for the bridal party and guests. For larger occasions, wedding packages offer additional services such as music and entertainment, while general packages include accommodations for the wedding couple, bridal bouquet of roses and boutonnière, non-denominational ceremony with an officiant, a Stonehurst Place signature wedding cake, a pair of Stonehurst Place keepsake champagne flutes, Stonehurst Place keepsake gown hangers, and music of choice.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="662"><b data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Amenities &amp; Services</span></b></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Amenities and facilities available with the rental of the venue include a dressing room for the bride and the groom, a gourmet catering kitchen, state-of-the-art audiovisual and sound systems and lighting, dance floor, tables, chairs, linens, silverware, and glassware, and security for the duration of the event. A wedding coordinator is available to take care of all the details on the day, and the set-up and clean-up of the venue are included, as well as a complimentary suite for the bride. The venue also offers high-speed wireless Internet, liability insurance, and ample parking for guests at the site in a large parking lot.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Bespoke amenities include approved and vetted caterers, photographers, and florists, a Mason &amp; Hamlin Grand Piano, iPod docking stations and a house music system, guest laptops, and onsite parking.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="652"><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">General Information</span></b></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Stonehurst Place is located at 4108, 923 Piedmont Avenue NE in Atlanta, is wheelchair accessible, and offers ample parking for guests.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Atlanta is packed with things to see and do, such as the Georgia Aquarium. The Georgia Aquarium is the world's largest aquarium and is home to more than 500 species from around the globe that live in more than 10 million gallons of fresh and marine water. Situated in downtown Atlanta near Centennial Olympic Park and World of Coca-Cola, this magical aquarium promises an experience like no other.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">The aquarium is spread out across six large galleries, with more than 70 incredible habitats, ranging from freshwater river scenes and brightly colored coral reefs to penguin colonies and deep-sea tanks. Home to thousands of marine animals, including whale sharks, beluga whales, sea otters and exotic fish, the aquarium aims to support, preserve and educate visitors about the incredible biodiversity of the ocean system.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The aquarium has live shows, such as the spectacular “AT&amp;T Dolphin Tales Show,” which highlights the connection between animals and humans, and the animated “Deepo’s Undersea 3D Wondershow”, which focuses on the importance of conservation and protection of marine animals. Special encounter programs allow visitors to get up close and personal with some of the animals, like dolphins, sea otters, and penguins and brave guests can dive with whale sharks and manta rays in the Ocean Voyager, the world's largest aquarium habitat.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="636"><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">4108, 923 Piedmont Ave NE, Atlanta, GA 30309, Phone: 404-881-0722</span></i></p><span data-dcnode-id="635" instrument_node="">

</span><p data-dcnode-id="610"><b data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Venue Spotlight:  The Biltmore Ballrooms</span></b></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">Built in 1924, The Biltmore Hotel is a beautiful landmark and historic hotel in </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-atlanta-ga.html"><span data-dcnode-id="607" instrument_node="">Atlanta</span></a><span data-dcnode-id="605" instrument_node=""> that offers luxurious accommodations, fine dining, and upscale amenities. Designed by the architecture firm Schultze and Weaver, the hotel recently underwent a total renovation to restore the retreat to its former glory when it was known as “The South’s Supreme Hotel” and once again boasts originally handcrafted plaster relief ceilings and elegant crystal chandeliers, grand Palladian windows and Tennessee marble floors. The Biltmore Ballrooms offer a spectacular venue for romantic weddings and other special celebrations, with two exquisite locations to choose from, namely the Georgian and Imperial Ballrooms. The magnificent Georgian and Imperial Ballrooms are connected by a suite of the lobby and pre-function spaces and can accommodate parties of up to 1500 guests in a variety of layouts and room combinations.

</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The Georgian and Imperial ballrooms are spectacular European-style ballrooms with hardwood floors, handcrafted plaster ceilings, stately columns, sparkling crystal chandeliers and Palladian windows. Each ballroom has its salon area, private catering kitchen, separate entrance, and restrooms, offering guests an elegant environment with regal charm. The Biltmore also features convenient parking, a beautiful courtyard, and room for up to 1,500 guests.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598"><b data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Amenities &amp; Services</span></b></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">The Biltmore Ballrooms uses exclusive catering company Novare Events, which provides full catering and beverage services, including barware, glassware, and professional staffing from the preferred caterer and event décor company, Bold American Events.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Other amenities and services available with the rental of the venue include a dressing room for the bride and the groom, a gourmet catering kitchen, state-of-the-art audiovisual and sound systems and lighting, dance floor, tables, chairs, linens, silverware, and glassware, and security for the duration of the event. A wedding coordinator is available to take care of all the details on the day, and the set-up and clean-up of the venue are included, as well as a complimentary suite for the bride. The venue also offers high-speed wireless Internet, liability insurance, and ample parking for guests at the site in a large parking lot.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><b data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">General Information</span></b></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The Biltmore Ballrooms is located at 817 W Peachtree Street NW #400 in Atlanta is wheelchair accessible and offers ample parking for guests.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Atlanta offers an array of exciting attractions, activities, and things to see and do, including fantastic tours and excursions around the city. See the best of Atlanta on a traditional Peachtree Trolley Tour, which takes you to all the major attractions and the ‘must-see’ sights of the city.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Leaving from the Hilton Garden Inn at Centennial Olympic Park, the tour takes around 90 minutes and is fully narrated, explaining the history, stories, and legends of all the major sights. Visit the world-renowned Georgia Aquarium, the World of Coca-Cola, the Oakland Cemetery, and The Fabulous Fox Theater, amongst others.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Trolleys are traditionally designed to take you on a journey back in time to the early 20th Century, with enclosed sides, park bench seating, and a clanging bell, however, are fully climate-controlled with heat and air. Tours run every day except Mondays and tickets can be purchased online or once on board.</span></p><span data-dcnode-id="575" instrument_node="">
