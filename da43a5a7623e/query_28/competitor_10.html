		Welcoming guests for over 100 years, the Omni Severin Hotel knows how to provide a memorable and stress-free stay for anyone who walks through its doors. In fact, it’s known as the longest-running luxury hotel in downtown Indiana. Restored to keep its early 1900’s elegance, the hotel’s age definitely doesn’t get in the way of offering modern amenities. Every room features a luxurious granite and marble bathroom amongst other thoughtful amenities, and guests are free to use the fully serviced fitness center and indoor pool. Dining options are endless, with a Starbucks in the hotel lobby along with other dining options within and nearby the hotel. It’s central location provides guests loads to do, only walking distance from the Circle Centre Mall, Indianapolis Convention Center, Lucas Oil Stadium, and Bankers Life Fieldhouse.

</span><h2 class="sectionMain" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">More Places to Visit in Indiana</span></h2><span data-dcnode-id="792" instrument_node="">
</span><h4 class="sectionTitle" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Things to do in Bloomington</span></h4><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">Many people living in </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-bloomington-in.html"><span data-dcnode-id="787" instrument_node="">Bloomington</span></a><span data-dcnode-id="785" instrument_node=""> are students at Indiana University Bloomington. No wonder so much of what is going on in Bloomington is linked to the University. Take a tour of the university campus, which is considered one of the most beautiful in the country. Once at the campus, visit the world-renowned Indiana University Art Museum with more than 45,000 priceless works of art. 
</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Indiana University Jacobs School of Music is another highly acclaimed university institution with a range of performances. Take a tour of the Wylie House Museum with its beautiful garden. Today a museum, it was once the home of Andrew Wylie, the first president of Indiana University. Even Oliver Winery, the largest in the country, is linked to the Indiana University – it was founded by the University law professor William Oliver in the 1960. Take a tour of the winery and the vineyards and enjoy some excellent samples.

</span></p><h4 class="sectionTitle" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Jasper</span></h4><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-jasper-in.html"><span data-dcnode-id="778" instrument_node="">Jasper</span></a><span data-dcnode-id="776" instrument_node=""> is charming small town on the banks of picturesque Patoka River.  Start your exploration at the Dubois County Museum with 36,000 objects, including the faithful reconstruction of an 1890s main street, an 1850 log house, and a model train display. Enjoy a stroll along the two-mile Jasper Riverwalk or take a trip on the antique restored Spirit of Jasper Train. </span></p><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Baseball fans should not miss a visit to the Indiana Baseball Hall of Fame, and history buffs will definitely want to check out the historic Jasper City Mill where Abraham Lincoln used to grind his grain with his father in 1828. You do not have to be a Catholic to enjoy the beauty of the Romanesque Revival style St. Joseph Catholic Church with its 235-foot tall bell tower.
 
</span></p><h4 class="sectionTitle" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">South Bend</span></h4><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">Home of the highly acclaimed University of Notre Dame and snuggled on the banks of the St. Joseph River, </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-south-bend-in.html"><span data-dcnode-id="768" instrument_node="">South Bend</span></a><span data-dcnode-id="766" instrument_node=""> is a modern city with 150 years of history. Visit the History Museum with a range of exhibits depicting the history of South Bend and the area. </span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Find out what local and regional artists are doing at the South Bend Museum of Art. As you stroll along the river in downtown South Bend, you can enjoy River Lights, an interactive light show with colorful light displays. Kids will probably equally enjoy a visit to the 400 wild animals at the Potawatomi Zoo and the free samples at the South Bend Chocolate Factory and Museum.

</span></p><h4 class="sectionTitle" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Things to do in Fort Wayne</span></h4><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="756"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-fort-wayne-in.html"><span data-dcnode-id="759" instrument_node="">Fort Wayne</span></a><span data-dcnode-id="757" instrument_node=""> is a modern, lively city that grew around the fort built to protect the pioneers and settlers from the native Indian tribes in 1794. Visit the reconstructed Old Fort Wayne and the grounds around it to learn about the way of life of the early settlers. Visit the History Center located in the historic 1893 City Hall to see a number of original artifacts and documents. </span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Eagle Marsh Nature Preserve is a birder’s paradise with more than 200 birds that make their home on the marshy lands. The African/African-American Historical Museum tells the story of the culture and history of the African American population of Fort Wayne. Try to catch a show and a dinner at the popular community Arena Dinner Theatre. Lakeside Park &amp; Rose Garden will enchant you with stunning blooms and the fragrance of more than 1,500 roses.



</span></p><h4 class="sectionTitle" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Indiana Dunes State Park</span></h4><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Along the three miles of the magnificent Lake Michigan southern shore lays an ancient primitive landscape of huge sand dunes created by the relentless work of winds and waters. Towering two hundred feet over the shoreline, the dunes form a diverse range of habitats for plants and animals that adapted to this stark world. </span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">To protect this unique environment, scientists and the government established a park in 1925 with the goal of protecting the species that make their home among the dunes, as well as to provide controlled access and enjoyment for the people of Porter County and the rest of the world. Hikers can access the renowned Calumet Trail from the dunes, birders can enjoy spotting a variety of birds depending on the season and swimmers,and fishermen can enjoy the calm lake waters and fine sandy beach.

</span></p><h4 class="sectionTitle" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Nashville</span></h4><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Tiny village of Nashville, Indiana does not have the bright lights and notoriety of its namesake in Tennessee, but it has more than its share of charm, artists, galleries, boutiques, and restaurants. </span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Catch a play at the lively Little Nashville's Brown County Playhouse, see what the local artists are creating at the Brown County Art Gallery Artists, or visit T. C. Steele State Historic Site to learn more about this renowned Nashville artist and his works. Take the kids to the popular Brown County State Park where they can hike, ride a bike, ride ponies, or swim.

</span></p><p data-dcnode-id="734"><span data-dcnode-id="739" instrument_node="">You are reading "25 Best Romantic Weekend Getaways in Indiana " </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/best-in-indiana.html"><span data-dcnode-id="738" instrument_node="">Back to Top</span></a><span data-dcnode-id="736" instrument_node="">
</span><br data-dcnode-id="735"></p><p data-dcnode-id="724"><span data-dcnode-id="733" instrument_node="">
</span><span data-dcnode-id="731" instrument_node="">
</span><span data-dcnode-id="729" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9262452885249978" data-ad-format="auto" data-ad-slot="7063306102" data-dcnode-id="728" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="727" instrument_node="">
</span></p><span data-dcnode-id="723" instrument_node="">
</span><h4 class="sectionTitle" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Michigan City</span></h4><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">When snows melt and the winds across the vast Lake Michigan fade away, Michigan City opens up like a flower to the tourists from Chicago and elsewhere, allowing them to enjoy the beautiful and diverse attractions found indoors and outdoors. The city's iconic Michigan City Lighthouse, the only one still working in Indiana, is located in scenic Washington Park together with the city zoo, a sandy beach, and kids' playground. </span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Visit LaPorte County Historical Society Museum to see, among other interesting exhibits, one of the largest collections of antique firearms in the world. Enjoy the art created by local artists at the Lubeznik Center for the Arts, have some fun at the huge Blue Chip Casino, and sample some surprisingly good Lake Michigan wines at the Shady Creek Winery.

</span></p><h4 class="sectionTitle" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Indiana vacation spots: French Lick</span></h4><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">French Lick residents are used to people making fun of this small spa town's name, but French Lick has been famous for its Sulphur springs with healing properties since the 19th century. Animals tend to lick minerals coming freely out of the soil, hence the name. The 20th century brought casinos, and the city spa became popular among the rich and famous from the area, including Joe Luis and Al Capone. </span></p><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">Better known today for its famous son Larry Bird, French Lick offers fun for all ages. Enjoy the lovely scenery of the Hoosier National Forest on board of the French Lick ScenicRailway. Kids will have endless fun at the Big Splash Adventure Hotel &amp; Indoor Water Park. Pick a unique gift at the Fox Hollow Gallery,which offers the works of more than 25 local artisans. Try your luck at the French Lick Casino, admire the imposing Greek Revival Orange County Courthouse, and learn about the history of the area at the Orange County Museum. More ideas: </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/travel/birthday_vacation.html%23slide20"><span data-dcnode-id="709" instrument_node="">French Lick Resort</span></a><span data-dcnode-id="707" instrument_node="">.

</span></p><h4 class="sectionTitle" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Santa Claus</span></h4><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">It is easy to feel like Christmas is every day in Santa Claus, Indiana when the city's attractions are named Santa's Candy Castle, Santa Claus Museum, Christmas Lake Golf Course, Santa's Stables, Lake Rudolph Camp ground, and Santa Claus Post Office (this is where letters to Santa go.)The residents of this small Indiana town are taking full advantage of their town's odd name and making their town a popular tourist destination for families. But, not everything in Santa Claus is about Christmas. </span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Lincoln Boyhood National Memorial is the place where young Abraham Lincoln spent his childhood. You can try to catch a concert at the magnificent Lincoln Amphitheatre, an outdoor performance venue in Lincoln Park. Take a tour of the Colonel Jones Home, a 1834 Federal-design house and museum that shows the way of life in 19th century Indiana.


</span></p><h4 class="sectionTitle" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Evansville</span></h4><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Evansville is a modern metropolis on the beautiful Ohio River with a thriving economy, fun attractions, and beautiful outdoor spaces. Visit The Evansville Museum of Arts, History &amp; Science with more than 30,000 exhibits and learn about city's German origins at the Germania Maennerchor. </span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">See giant rock formations at the Garden of the Gods in the Shawnee National Forest, or you can visit fascinating AMAZONIA at the Mesker Park Zoo and see the tropical world of the South American jungles. Explore Angel Mounds State Historic Site,which tells the fascinating story of the Middle Mississippian people who lived in this area from 1000 A.D. to 1450 A.D.

</span></p><h4 class="sectionTitle" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Brookville</span></h4><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Brookville is quaint, pretty little town on the Whitewater River and Brookville Lake, world famous for its wall eye fishing. Stroll through the Brookville Historic District with beautiful examples of Greek Revivaland Federal architecture.One of the greatest examples is Franklin County Seminary,a historic 1831 school. Visit Hermitage, home and studio of artist J. Ottis Adams. </span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">The outdoor life naturally revolves around the beautiful Brookville Lake, which offers great sandy beaches for swimming and an endless expanse of quiet lake waters for boating, sailing, and fishing. There are miles of hiking, biking, and horseback riding trails along the lake that provide great opportunities for bird and wildlife watching and enjoying the spectacular views from the surrounding forested hills.

</span></p><h4 class="sectionTitle" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Turkey Run State Park</span></h4><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Spectacular sandstone ravines and gorges cut deeply into the unique Mansfield sandstone rock by the relentless passage of Sugar Creek waters – these are the main features of Turkey Run State Park, located southwest of Crawfordsville on Sugar Creek. </span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">If you are looking for romantic things to do in Indiana, the park offers spectacular hiking through narrow gorges with high, steep walls, a suspension bridge, and steep ladders. In the summer, going down the creek in inner tubes, kayaks, or canoes is great fun. A must see is Lieber Log Cabin built from the native, locally grown tulip trees in 1848. It isnow the museum honoring Colonel Richard Lieber, Indiana State Parks system's first director.

</span></p><h4 class="sectionTitle" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Lafayette</span></h4><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Located on the banks of the Wabash River and home to Purdue University, Lafayette, Indiana, is a history-buff's dream and a lively college town with spectacular parks and gardens. Learn about the city's history at the Tippecanoe Battlefield &amp; Museum. Explore diverse habitats of the beautiful Prophets town State Park with numerous hiking trails, an aquatic center, picnic areas, and camp grounds. </span></p><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Stroll through the Lafayette down town with its lovely turn-of-the-century buildings, quaint historic neighbourhoods, and elegant churches. Learn about Indiana 19th and 20th century art at theArt Museum of Greater Lafayette. Try to catch a performance at the Purdue Theatre or Purdue Black Cultural Center. Get the map of Lafayette's spectacular outdoor public art and conduct a self-guided tour of some of the work of the country's most renowned artists. 
</span></p><p data-dcnode-id="665"><span data-dcnode-id="670" instrument_node="">You are reading "25 Best Romantic Weekend Getaways in Indiana " </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/best-in-indiana.html"><span data-dcnode-id="669" instrument_node="">Back to Top</span></a><span data-dcnode-id="667" instrument_node="">
</span><br data-dcnode-id="666"></p><p data-dcnode-id="655"><span data-dcnode-id="664" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-9262452885249978" data-ad-format="auto" data-ad-slot="5419886097" data-dcnode-id="659" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="658" instrument_node="">
</span></p><span data-dcnode-id="654" instrument_node="">
</span><h4 class="sectionTitle" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Spring Mill State Park</span></h4><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Located about 3 miles from the town of Mitchell, Spring Mill State Park is a 1,358-acre parkon the Mitchell Karst Plain where soft limestone gives way to the park's numerous sink holes and caves. There is a fun tour of one of the biggest, Twin Caves, which goes about 500 feet into the bowels of the earth. </span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The area was heavily exploited at the beginning of the 19th century, and there is only a small stand of virgin timber left, protected today as part of the Donaldson Woods Nature Preserve. The original settler village with a historic watermill is located in a small valley in the park. In contrast to the historic features, there is also a memorial to Mitchell's native resident Gus Grissom, anastronaut who died in the tragic accident of Apollo 1.

</span></p><h4 class="sectionTitle" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Indianapolis</span></h4><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">Best known for the world famous Indianapolis 500 car races, </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-indianapolis.html"><span data-dcnode-id="642" instrument_node="">Indianapolis</span></a><span data-dcnode-id="640" instrument_node=""> is a beautiful planned city on the confluence of Fall Creek and White River. Stroll through the lovely Canal and White River State Park in the heart of the city and watch the modern office towers reflected in the clear waters.  To see the old Indi, stroll through the charming shady streets of the Lockerbie Square Historic District. </span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Visit Indianapolis Museum of Art with its 54,000 art pieces by masters such as Gauguin and Turner. The Indy Racing Experience allows you to drive a racecar on the Indianapolis 500 track, either alone or with a driver.  Sport car enthusiasts should not miss the Indianapolis Motor Speedway and Hall of Fame Museum with a great collection of famous racecars. Kids will love the Children's Museum of Indianapolis, and they will be thrilled with the 3,800 animals from 320 species living in the Indianapolis Zoo.
