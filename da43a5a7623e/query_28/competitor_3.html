		An important part of the travel experience is choosing the best place to stay where you can return and relax after a day of exploring the busy city or exhausting business meetings. Dream New York is a great choice because of its central location, cozy lounges, gourmet food and modern guest accommodations. The hotel is located in a historic Beaux-Arts building and features unique design touches such as a two-story aquarium and an art gallery with portraits hanging only on the ceiling. Located at between Broadway and 7th Avenue on the 55th Street, the hotel is close to Central Park, Lincoln Center and Times Square. You'll be surrounded by a variety of restaurants and tourist attractions, and have easy access to the subway for exploring other parts of the town. 
There are 216 guestrooms and suites with large flat screen TVs, Hydro Basic bath products, and 300-thread-count Egyptian cotton sheets. There are 14 floors at the hotel - ask for a room on one of the highest floors for best views.  Serafina restaurant serves Italian food while AVA Lounge offers panoramic views of the city skyline from its rooftop location. Another popular meeting spot is Rm.Fifty5, the chic lobby bar where you can watch colorful fish swim in the giant aquarium.  Rooms start at $190.

ument_node="">The Inn at Irving Place</span></a></li><span data-dcnode-id="744" instrument_node=""> </span><li data-dcnode-id="741"><a data-dcnode-id="742" href="#slide14"><span data-dcnode-id="743" instrument_node="">NYC Hotels: St Giles - The Tuscany</span></a></li><span data-dcnode-id="740" instrument_node=""> </span><li data-dcnode-id="737"><a data-dcnode-id="738" href="#slide15"><span data-dcnode-id="739" instrument_node="">NYC Hotels: The Sherry Netherland</span></a></li><span data-dcnode-id="736" instrument_node=""> </span><li data-dcnode-id="733"><a data-dcnode-id="734" href="#slide16"><span data-dcnode-id="735" instrument_node="">Hyatt Place New York/Midtown-South</span></a></li><span data-dcnode-id="732" instrument_node=""> </span><li data-dcnode-id="729"><a data-dcnode-id="730" href="#slide18"><span data-dcnode-id="731" instrument_node="">Romantic Hotels in NYC: Cassa Hotel</span></a></li><span data-dcnode-id="728" instrument_node=""> </span><li data-dcnode-id="725"><a data-dcnode-id="726" href="#slide19"><span data-dcnode-id="727" instrument_node="">NYC Hotels: Wyndham Midtown 45 at New York City</span></a></li><span data-dcnode-id="724" instrument_node=""> </span><li data-dcnode-id="721"><a data-dcnode-id="722" href="#slide20"><span data-dcnode-id="723" instrument_node="">Hotels Near Me: St Giles Hotel New York - The Court</span></a></li><span data-dcnode-id="720" instrument_node=""> </span><li data-dcnode-id="716"><a data-dcnode-id="718" href="#slide21"><span data-dcnode-id="719" instrument_node="">NYC Hotels: The Chatwal</span></a><span data-dcnode-id="717" instrument_node="">, Photo: The Chatwal</span></li><span data-dcnode-id="715" instrument_node="">

</span><p data-dcnode-id="705"><b data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">More Ideas: Hotel Plaza Athenee</span></b></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">Standing regally at 37 East 64th Street between Park and Madison Avenues in </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/new_york_city.html"><span data-dcnode-id="702" instrument_node="">New York</span></a><span data-dcnode-id="700" instrument_node="">, Hôtel Plaza Athénée has been providing discerning guests with an unparalleled hotel experience for more than 30 years. Characterized by its vibrant red awnings and bronze logo set into the sidewalk, the discreet and distinctive 143-room hotel has been a luxurious home-away-from-home for guests who appreciate its stylish and sophisticated style, glamor and luxury. 

</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">This legendary hotel features beautifully appointed guest rooms and suites with elegant accommodations, private en-suite bathrooms, modern amenities, and breathtaking views.  The hotel has several renowned restaurants, including Arabelle at Hôtel Plaza Athénée and the seasonal cocktail Bar Seine, modern meeting and event spaces, including a grand ballroom, and a personalized limousine service. </span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Hôtel Plaza Athénée features stylishly elegant guest rooms decorated in soothing tones of apricot and gray and styled in the grand tradition of France with French-inspired upholstered furnishings in plush velveteen. Guest rooms and suites feature sumptuous beds in imported linens, en-suite marble bathrooms with walk-in showers and soaking tubs, and modern amenities, such as flat-screen televisions, complimentary Wi-Fi Internet access and 18th-century French artworks on the walls. 

</span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Classic King rooms are approximately 320 square feet in size and feature sumptuous king-size beds in imported linens, and en-suite marble bathrooms with walk-in showers, soaking tubs, thick towels and deluxe bath products. Spacious seating areas have comfortable seating and a work desk with chairs, and modern amenities include 42-inch LCD Plasma TVs, iPod docking stations, alarm clocks, fully stocked minibars, and complimentary wireless Internet.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Classic Two Twin Beds combine European flair with beautiful views and offer 320 square feet of space with two twin beds in imported linens, while Deluxe King rooms boast 365 square feet of space on floors three through 16. Both room types feature sumptuous king-size beds in imported linens, and en-suite marble bathrooms with walk-in showers, soaking tubs, thick towels, and deluxe bath products. Spacious seating areas have comfortable seating and a work desk with a chair and modern amenities include 42-inch LCD Plasma TVs, iPod docking stations, alarm clocks, fully stocked minibars, and complimentary wireless Internet. These rooms have beautiful views of the sweeping NYC skyline.

</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Deluxe Two Double Beds are 320 square feet in size and feature two double beds with imported linens, and the same amenities as the other rooms. Grand Deluxe King rooms offer extra levels of space and luxury at 450 square feet in size with king-size beds in imported linens, and en-suite marble bathrooms with walk-in showers, soaking tubs, thick towels, and deluxe bath products. Spacious seating areas have comfortable seating and a work desk with chairs, and modern amenities include 42-inch LCD Plasma TVs, iPod docking stations, alarm clocks, fully stocked minibars, and complimentary wireless Internet. </span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Hôtel Plaza Athénée features 26 luxurious suites, individually designed and decorated with Art Deco design elements, Thai-inspired sensibility, and soft plum hues. All suites feature separate bedrooms and living spaces, guest toilets, fully equipped kitchenettes with fridges, microwaves, and Nespresso machines, and enjoy front-facing outdoor terraces and private atriums with beautiful views. Modern amenities abound, ranging from 42-inch flat screen televisions, iPod docking stations and complimentary wireless Internet to 

</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The hotel also features two spacious one-bedroom duplex penthouses on the 16th and 17th floors, each of which has a spacious living room with opulent décor and furnishings, bedrooms with solariums and expansive outdoor terraces overlooking the city. Spanning 1,972 square feet of space, these exquisitely appointed suites also have separate lounges and media rooms with two flat-screen televisions, fully stocked equipped kitchenettes and minibars, and private dining for up to six guests. King bedrooms have en-suite marble bathrooms with walk-in showers and deep soaking tubs, and deluxe Bulgari toiletries and modern amenities abound. </span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Hôtel Plaza Athénée has two fine dining establishments, the elegant Arabelle and the plush Bar Seine. 

</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Arabelle at Hôtel Plaza Athénée is a beautifully appointed fine dining restaurant in the heart of New York’s Upper East Side that offers guests a charming spot for breakfast, lunch or dinner. Once known as the Chateau Henry IV restaurant and Le Regence in the 1980s, the captivating space boasts richly paneled walls, an elegant gold domed ceiling and Murano chandeliers and accents of hand-painted Chinoiserie. The restaurant serves an innovative menu of American cuisine on fine bone China and silver serving dishes with gracious hospitality akin and offers both general and private dining for discerning guests. </span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The intimate Bar Seine is decorated with accents of rich velvets, bold animal print fabrics, and leather floors, and serves a menu of sophisticated cocktails, an extensive list of hand-selected wines and champagnes, as well as traditional afternoon high tea and light fare. </span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="670"><b data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Amenities/Recreational Activities </span></b></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Hôtel Plaza Athénée is home to the Spa Valmont, an elite V35 Spa with Swiss heritage that features four Asian-inspired treatment suites, each featuring an en-suite bathroom, steam shower, and private relaxation area, and an array of spa services, including massages, body treatments and more. All treatments begin with a complimentary foot bath and massage and a hot cup of tea, and signature treatments include the Precieux L’Elixir des Glacier facial and the anti-aging Time Master Sublimating Program. 

</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Hôtel Plaza Athénée offers an array of first-class amenities, ranging from a 24-hour fitness center complete with cardio equipment and free weights to a full-service business center with printing, copying, and faxing facilities, and complimentary wireless Internet. Other amenities include daily newspaper delivery, 24-hour room service, overnight shoe shine and laundry services, twice daily maid service, and the use of a house car to destinations within a few blocks of the hotel. The hotel has a full-service spa that offers a range of pampering and indulgent massages and body treatments, and Clef d’Or Concierge services. A 24-hour coffee and tea service provide guests with refreshments throughout the day. 

</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Hôtel Plaza Athénée boasts over 2,700 square feet of upscale event and meeting space that cater for a variety of special functions from weddings, receptions, anniversaries, and more. In addition to modern and fully-equipped event spaces, the hotel also provides a host of services, such as catering and hospitality services, event planning and management and other tailor-made services. </span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="661" instrument_node="">Back to: </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/weekend_getaways/honeymoon_east_coast.html"><span data-dcnode-id="660" instrument_node="">East Coast Honeymoon Vacations</span></a><span data-dcnode-id="658" instrument_node="">, </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/new_york_city/best-things-to-do-in-nyc-with-kids.html"><span data-dcnode-id="657" instrument_node="">Things to Do in NYC</span></a><span data-dcnode-id="655" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-9262452885249978" data-ad-format="auto" data-ad-slot="7063306102" data-dcnode-id="638" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="637" instrument_node="">

</span><p data-dcnode-id="630"><b data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">More Ideas: Dream House, New York</span></b></p><span data-dcnode-id="629" instrument_node="">

The Dream House is a nondescript black door located at 275 Church Street, New York 10013. If you don’t know what you’re looking for, you could walk straight past none the wiser; those in the know, however, can pass through the doorway into a wall of sound and light and immerse themselves in the dream. The only real notification is a small cryptic white sign reading “The Dream House,” but it’s enough.

</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The combined immersive art experience is the work of a married couple consisting of composer La Monte Young and visual artist Marian Zazeela. It was created in 1993 and combines 40 years of their work together. </span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Zazeela has said that the culmination of their combined art forms provides an experience that requires a whole new mode of attention from the visitor. Even a slight move will change the pitches you hear as you move through the resonating sound fields created by Young. </span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Whilst the sound is fluctuating constantly, the lighting and ambience are created by the accompanying neon pink reflections of light, designed and orchestrated by Zazeela herself. It offers a refuge and a place of relaxation for overextended New Yorkers; the incense-fumed rooms are a meditative space. </span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The installation is a nonprofit and is donation funded and run by La Monte Young’s MELA Foundation and supported by the Dia Art Foundation, amongst others. It also perhaps owes its continued life to a sympathetic landlord who is a fan of the exhibition. </span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The exhibition has essentially remained the same for the last 23 years, but occasionally hosts a change from the normal schedule. When they do collaborate with other artists, it remains a multi-platform event, and perhaps it should explore these opportunities some more. </span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="613" instrument_node="">You are reading "15 Best NYC Hotels for a Romantic Getaway " </span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/new_york_city/top-romantic-hotels-in-nyc.html"><span data-dcnode-id="612" instrument_node="">Back to Top</span></a><span data-dcnode-id="610" instrument_node="">

</span><p data-dcnode-id="594"><b data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">More Ideas: The Lexington Hotel </span></b></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">New York City is one of those places that any traveler simply needs to visit at least once in their lives. It's a city like no other, filled with towering skyscrapers, fascinating landmarks, expansive shopping and entertainment districts, world class restaurants, and so much more.

</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">It's a place where everything feels possible and one can truly feel and see the city's heart beating all around them as they roam the streets and feel the history and power of the Big Apple. If you're heading to NYC and need a great place to stay, consider The Lexington Hotel.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="585"><b data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The Lexington Hotel - Top Midtown Manhattan Hotel </span></b></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Built way back in 1929, The Lexington Hotel has almost a century of history behind it, making it one of the city's most storied hotels and a wonderful place to stay for anyone wishing to explore Manhattan in style and retreat to the comfort and luxury of their room each evening.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">- The History - The Lexington Hotel was built in 1929 and still retains a lot of the features and original 1920s stylistic flourishes that made it such an iconic building in its day and have helped to preserve its status over the years. Back in the 1950s, the legendary Marilyn Monroe lived at the hotel during her short-lived marriage to Joe DiMaggio, and other celebrity guests over the years have included the likes of Frank Sinatra and Ella Fitzgerald. The Lexington was particularly popular with famous faces for its 'Hawaiian Room', in which guests could enjoy live hula shows and exotic cocktails. The vibrancy and elegance of the Jazz Era has been preserved over the years, while the hotel has also gone extensive renovation and modernization to move with the times, allowing guests to still enjoy that authentic Art Deco feel with plenty of 21st century luxuries too.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">- Rooms at The Lexington Hotel - Guests at The Lexington Hotel will be able to enjoy the comfort and class of a great range of stylish rooms and suites. The rooms vary in style and size, ranging from the 150 square feet Standard Queen to the 275 square foot Studio King. All of the rooms pay homage to the hotel's Jazz Era heyday, decorated with vibrant, colorful art and equipped with comfortable beds, cozy seating, ultra plush mattresses, work desks, HD TVs, and a great range of standard amenities including a safe, an iHome docking station, blackout blinds, PURE bath amenities, cable TV, air conditioning, a hair dryer, and free Wi-Fi access</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">- The Suites - Those looking for even more elegance and comfort during their stay at The Lexington Hotel in Midtown Manhattan may opt to stay in one of hotel's deluxe suites. From the 440 square foot Junior Suites to the entirely one a kind options like The Conservatory, The Hemingway Suite, The Arthur Godfrey Suite, and The Norma Jean Suite, there are a lot of options. Each of the upscale suites is uniquely decorated, with its own identity and style. The Norma Jean, for example, was inspired by Marilyn Monroe and was actually her home for a brief period in the 1950s, while The Lady Ella Suite's colorful design was inspired by the Queen of Jazz herself, Ella Fitzgerald.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">- Amenities of The Lexington Hotel - The Lexington Hotel offers a range of amenities and services for its guests. This is a pet-friendly Manhattan hotel, for example, with a range of designated dog-friendly rooms for you and your furry friend to share. The hotel also features its own 1,000+ square foot fitness center, which is open all day and night and features a range of state of the art fitness and exercise equipment. The Lexington also partners with trusted beauty and wellness brand NOMI Beauty for in-room massages and beauty treatments, while also providing live entertainment in the form of jazz performances down in the lobby. There's also a business center at The Lexington, as well as a Starbucks near the entrance to get your morning coffee and a full concierge service</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">- Food and Drink at The Lexington Hotel - Guests of The Lexington can head down to the on-site Starbucks at any time for high quality coffees and other delicious drinks, as well as a range of snacks, sandwiches, and pastries throughout the day. Those looking for something a little different can visit The Starton Room. Named in honor of US Navy Captain William Stayton, The Stayton Room features art deco interior and offers a superb selection of craft cocktails and bar fare made from locally sourced ingredients. </span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="565" instrument_node="">You are reading "15 Best NYC Hotels for a Romantic Getaway " </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/new_york_city/top-romantic-hotels-in-nyc.html"><span data-dcnode-id="564" instrument_node="">Back to Top</span></a><span data-dcnode-id="562" instrument_node="">
