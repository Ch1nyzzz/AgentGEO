		Standing proudly on a beautiful tree-lined street in downtown Eureka Springs at the foot of the Ozark Mountains, Heartstone Inn is a magnificent Victorian mansion built in 1903. It is located in the town’s historic district and is surrounded by art galleries, great restaurants and quaint shops. Charming Eureka Springs trolley stops right outside of the Inn’s door, and the sprawling estate is registered on the National Register of Historic Places. </span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The inn has 11 luxuriously appointed rooms, cottages, and suites with beautiful décor, spacious sitting areas, private bathrooms, opulent linens, and amenities such as free Wi-Fi and a flat screen TV. A large wrap-around porch offers a romantic locale where you can admire the lush gardens with the love of your life. An exceptionally good breakfast is served in the inn’s elegant dining room, and you can expect such treats as Crème Brulee French Toast, Hash Brown Bake, Baked Eggs Benedict and hot Peach Imperial Muffins.

</span><p data-dcnode-id="679"><b data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Attraction Spotlight: Museum of Discovery</span></b></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Just a block from the river and walking distance to the heart of downtown Little Rock, the Museum of Discovery is a unique and fascinating attraction. The museum is a member of the Arkansas Discovery Network, which is a partnership of other museums and science centers that serve underserved and rural areas of the state. 

</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The mission of this network is to increase inquiry learning, which is a process of encouraging learning through posing questions or problems, rather than just passing knowledge. Inquiry learning increases children’s involvement in the learning processes and can lead to improved comprehension. The Discovery Museum is a jumping off point for this learning process, working to provide accesses to this experiential education to all.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Originally established as the Museum of Natural History and Antiquities in 1927, the Discovery Museum is the oldest museum in Little Rock. It was given to the City of Little Rock as a Christmas present in 1929, and moved around the City, from City hall to MacArthur Park over the subsequent decades. Throughout the twentieth century, the Museum acquired roughly 14,000 artifacts, animals and insects. 

</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">It was accredited by the American Association of Museums in 1993, again in 2001, and became an affiliate of the Smithsonian in 2003. Moving to its current site in 1998 spanning 40,000 square feet, a 2011 renovation added a new entrance and interactive exhibits. The mission of the Museum of Discovery is to “ignite a passion for science, technology and math in a dynamic, interactive environment.”</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The museum features a wide range of permanent exhibits to educate, entertain and spur the imagination. Striving to give each visitor a one of a kind experience, the exhibits are interactive inviting visitors of all ages to look further, dig deeper and explore. These innovative and imaginative exhibits have drawn incredible attention, from setting world records to TV appearances from the Museum’s Science Experts.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="662"><b data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Amazing You!</span></b></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The Amazing You! Exhibit, presented by Arkansas Blue Cross and Blue Shield, is an adventure exploring a topic pretty close to home: the human body. This exhibit opens the mind with questions about the body, how it works, how the mind works, and how to take care of it all. From the impact of healthy choices on the body, to the energy it take to do what kids do every day, this illuminating exhibition will leave visitors with a little greater self-awareness. </span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="655"><b data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">AETN Public Media Center</span></b></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">This relaxing space is replete with everything needed to answer any remaining questions sparked from the Museum’s exhibits. Guests can watch videos, explore the internet and relax in a comfortable environment. A partnership with AETN Public Television, this feature compliments the other exhibits and promotes continued science learning.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="648"><b data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Discovery Hall</span></b></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Expansive and impressive, Discovery Hall dives into some very deep questions. From what is energy to how many really is a million, this exhibit creates questions and guides answers. Using Math as the instrument for exploration, visitors examine quantity, shape, pattern, energy, and force. </span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="641"><b data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Earth Journeys</span></b></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Earth Journeys take adventurers on a trip through Arkansas, discovering its specific geographic features and weather patterns over a huge map. In Tornado Alley Theater, visitors actually experience the sound and sight of a recreated miniature tornado, learning more about this extreme weather event common to Arkansas. The experience becomes even more real, complimented by voices of tornado survivors telling their stories. </span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">In addition to the geographic and meteorological activities at Earth Journeys, there are animal exhibits as well. With more than 65 creates that crawl, fly, slither, hop and hiss, the Discovery Museums practically has a miniature zoo within it walls. Animals in this exhibit include geckos, rabbits, hedgehogs, tarantulas, bearded dragons and many more. </span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Great Hall</span></b></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Covering 6,000 square feet of space, the Great Hall lives up to its name. Featuring a massive Helix Wave sculpture by distinguished artist Reuben Margonlin, the space is as impressive as it is large. Comfortable seating and smaller exhibits make this area a great place to sit down and take in all the learning from the day. Access to the gift shop is nearby, enabling visitors to take a bit of the Discovery learning process with them.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">With a dragon guarding a castle entrance, the Room to Grow captures the imagination from the start. Specifically targeted to children age six and under, this space focuses on the specific educational needs of the younger adventurers. With creative and interactive exhibits for parents to work on with their children, this room is a memorable experience for the whole family.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="621"><b data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Tinkering Studio</span></b></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Learning at the Discovery Museum is not just about the exhibits presented by the organization, but also about what each visitor does and creates while there. This is where the Tinkering Studio comes in. Hands on building, creating, forming and fashioning activities spur imagination and improvisation. Wild and crazy ideas are nurtured to grow in this unique environment.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><b data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Tesla Coil</span></b></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">A visit to the Discovery Museum would not be complete without experiencing the World Record Musical Bi-Polar Tesla Coil. Having debuted in July 2015, the coil has been featured in the Guinness Book of World Records. Named for inventor Nikola Tesla, the coil creates high-voltage electricity at a high frequency, making the phenomenon visible to the audience. Producing 200,000 volts of electricity, the device was built by Goodchild Engineering and donated to the Museum. The Tesla Coil is experienced in its own theater, and is a small additional charge.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="609" instrument_node="">You are reading "25 Best Romantic Getaways in Arkansas " </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/romance/best-romantic-getaways-in-arkansas.html"><span data-dcnode-id="608" instrument_node="">Back to Top</span></a><span data-dcnode-id="606" instrument_node="">
</span><br data-dcnode-id="605"></p><p data-dcnode-id="594"><span data-dcnode-id="603" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span><span data-dcnode-id="599" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9262452885249978" data-ad-format="auto" data-ad-slot="7063306102" data-dcnode-id="598" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="597" instrument_node="">
</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The Museum of Discovery displays an ongoing commitment to learning and education, offering programs, camps, and resources to accomplish this goal. The annual program guide provides a comprehensive overview of the yearly programs on offer, and include such intriguing activities as Lego® Robotics, theater shows, science labs, amusement park engineering, and many more. Overnight Experiences, known as Camp Ins are also available, giving guests the opportunity to wake up with wonder at the Museum. Family STEM (science, technology, engineering, mathematics) night provide more engaging classes to enjoy. Held after hours, these include all the exhibits of the museum, with additional demonstrations and special programming for families. </span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Other ongoing programs include a summer camp series, targeting children aged four to thirteen. Each week long camp provides an interactive experience, focused on one of a variety of topics, from Wiggle Worms Lil’ Chemists to Science Sampler. The fun is not just for kids, however, with the Summer Science institute providing STEM workshops for science enthusiasts of all ages. In addition, the Museum also brings science out to the community, with a variety of outreach initiatives that can be delivered in any classroom or auditorium.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="584"><b data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Events</span></b></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Outside of the programming, camps and classes, the Museum of Discovery also hosts a wide array of events. These include such topics as Discovering Excellence in Arkansas, which brings together STEM professionals to interact with students and engage in activities. Periodic Saturday Discoveries are workshops for children designed to cultivate a love of science. Wiggle Worms, also held weekly, is a popular program for the six and under group to engage in interactive, hands-on experiments and activities. Science After Dark, a monthly event just for adults, is a themed night of activity and fun in a unique setting. At the Girls in STEM events, held annually over two weeks, the Museum invites young women from age eleven to fourteen to meet women in the sciences and engage in science, technology, engineering and math activities. Other annual events include Tinkerfest, a day devoted to the art of creation and innovation through building and engineering, and Spark! The Museum’s annual gala fundraising event.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">To make the most of a visit to the Museum of Discovery, visitors are encouraged to visit the Museum’s Youtube Channel to see what they have been working on. The Latest News, available on the website, also provides updates about what is going on at the Museum, including events and feature exhibit schedules. The Museum is conveniently located in the downtown area of Little Rock, with free parking a short walk from the entrance. 



</span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">To keep the fun going after you have departed, visit the Museum of Discovery website to submit a question to the Mad Scientist. Ask anything science related on their easy to navigate form. Such past questions have included queries on the evidence of other solar systems in other galaxies and what is a white whole? This fun website feature encourages visitors to continue their journey of inquiry learning long after they have returned home. </span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Back to: </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vacationidea.com/destinations/best-things-to-do-in-little-rock.html"><span data-dcnode-id="573" instrument_node="">Best Things to Do in Little Rock, Arkansas</span></a><span data-dcnode-id="571" instrument_node="">
