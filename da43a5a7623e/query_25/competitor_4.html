</span><p data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">These tropical Christmas decorations will bring smiles to even the grinchiest souls—with beachy snowmen, sparkly lights, and quirky decorations that will make you want to plan a Florida holiday getaway vacation.</span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Florida residents and businesses are obsessed with creating tropical Christmas decorations that while over the top, are always fun.&nbsp;Below are some places where to find the best Christmas lights in Florida.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3097" instrument_node="">I grew up in </span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/8-great-places-to-see-miami-like-a-native/"><span data-dcnode-id="3096" instrument_node="">South Florida</span></a><span data-dcnode-id="3094" instrument_node=""> and fondly recall palm trees wrapped with white lights. Now when I visit Florida in early December, I see Christmas spirit exhibited in prolific and clever ways. Many houses are absolutely overloaded with Christmas decorations.</span></p><span data-dcnode-id="3092" instrument_node="">
</span><h2 data-dcnode-id="3081"><span data-dcnode-id="3090" style="color: #008000;"><span data-dcnode-id="3091" instrument_node="">Tropical</span></span><span data-dcnode-id="3089" instrument_node=""> </span><span data-dcnode-id="3087" style="color: #ff0000;"><span data-dcnode-id="3088" instrument_node="">Christmas</span></span><span data-dcnode-id="3086" instrument_node="">&nbsp;</span><span data-dcnode-id="3084" style="color: #008000;"><span data-dcnode-id="3085" instrument_node="">Decorations</span></span><span data-dcnode-id="3082" style="color: #ff0000;"><span data-dcnode-id="3083" instrument_node="">: Florida Edition</span></span></h2><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Floridians make the most of ocean views, palm trees, and sunshine during the holiday season. Take some classic and quirky ornaments, add a little color, and let beaches and pools provide the perfect backdrop. Here are some fun Christmas trees decorated to capture the Florida vibe.</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3076" instrument_node="">Put your toes in the sand next to this lovely tree at&nbsp;</span><em data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">5 O’Clock Somewhere</span></em><span data-dcnode-id="3073" instrument_node="">&nbsp;at </span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/margaritaville-hollywood-beach-resort/"><span data-dcnode-id="3072" instrument_node="">Margaritaville Hollywood Beach Resort</span></a><span data-dcnode-id="3070" instrument_node="">. Sand buckets and flip-flops make perfect Florida Christmas ornaments.</span></p><span data-dcnode-id="3068" instrument_node="">
</span><figure aria-describedby="caption-attachment-16663" class="wp-caption aligncenter" data-dcnode-id="3062" id="attachment_16663" style="width: 740px"><img alt="tropical Christmas tree at Margaritaville Hollywood Florida" class="wp-image-16663 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="3067" data-lazy-loaded="1" data-recalc-dims="1" height="1000" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg%3Fresize%3D750%252C1000%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg?resize=225%2C300&amp;ssl=1 225w" width="750"><noscript data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">&lt;img class="wp-image-16663 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg?resize=750%2C1000&amp;#038;ssl=1" alt="tropical Christmas tree at Margaritaville Hollywood Florida" width="750" height="1000" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Margaritaville.jpg?resize=225%2C300&amp;amp;ssl=1 225w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3063" id="caption-attachment-16663"><span data-dcnode-id="3064" instrument_node="">Margaritaville Christmas decorations</span></figcaption></figure><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3060" instrument_node="">Bright colors and a tiki bar backdrop brighten this tropical Christmas tree in </span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usgulfcoasttravel.com/things-to-do-in-anna-maria-island/" rel="noopener" target="_blank"><span data-dcnode-id="3059" instrument_node="">Bradenton Beach</span></a><span data-dcnode-id="3057" instrument_node="">.</span></p><span data-dcnode-id="3055" instrument_node="">
</span><figure aria-describedby="caption-attachment-16659" class="wp-caption aligncenter" data-dcnode-id="3049" id="attachment_16659" style="width: 740px"><img alt="tropical Christmas tree at Kokonut Nut in Bradenton" class="wp-image-16659 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="3054" data-lazy-loaded="1" data-recalc-dims="1" height="1000" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg%3Fresize%3D750%252C1000%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg?resize=225%2C300&amp;ssl=1 225w" width="750"><noscript data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">&lt;img loading="lazy" class="wp-image-16659 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg?resize=750%2C1000&amp;#038;ssl=1" alt="tropical Christmas tree at Kokonut Nut in Bradenton" width="750" height="1000" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Tiki-Christmas.jpg?resize=225%2C300&amp;amp;ssl=1 225w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3050" id="caption-attachment-16659"><span data-dcnode-id="3051" instrument_node="">Bradenton Beach Christmas tree at Gulf Drive Cafe and The Kokonut Hut</span></figcaption></figure><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3047" instrument_node="">Bok Tower Gardens gets in the spirit with a tree made from beautiful bromeliads in Lake Wales in </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/things-to-do-in-central-florida/"><span data-dcnode-id="3046" instrument_node="">Central Florida</span></a><span data-dcnode-id="3044" instrument_node="">.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><figure aria-describedby="caption-attachment-16679" class="wp-caption aligncenter" data-dcnode-id="3036" id="attachment_16679" style="width: 740px"><img alt="Bromeliad Christmas Tree at Bok Tower Gardens" class="wp-image-16679 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="3041" data-lazy-loaded="1" data-recalc-dims="1" height="500" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg%3Fresize%3D750%252C500%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg?resize=300%2C200&amp;ssl=1 300w" width="750"><noscript data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">&lt;img loading="lazy" class="wp-image-16679 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg?resize=750%2C500&amp;#038;ssl=1" alt="Bromeliad Christmas Tree at Bok Tower Gardens" width="750" height="500" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Bok-Tower-Christmas.jpg?resize=300%2C200&amp;amp;ssl=1 300w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3037" id="caption-attachment-16679"><span data-dcnode-id="3038" instrument_node="">A Bromeliad Tree at Bok Tower Gardens in Lake Wales, Florida</span></figcaption></figure><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">These lights are more traditional, but you have to be impressed with the scale of this 100 foot tree in Delray Beach, Palm Beach County. Wow!</span></p><span data-dcnode-id="3032" instrument_node="">
</span><figure aria-describedby="caption-attachment-16680" class="wp-caption aligncenter" data-dcnode-id="3026" id="attachment_16680" style="width: 740px"><img alt="Delray Beach Florida 100 foot Christmas tree" class="wp-image-16680 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="3031" data-lazy-loaded="1" data-recalc-dims="1" height="504" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg%3Fresize%3D750%252C504%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg?resize=300%2C202&amp;ssl=1 300w" width="750"><noscript data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">&lt;img loading="lazy" class="wp-image-16680 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg?resize=750%2C504&amp;#038;ssl=1" alt="Delray Beach Florida 100 foot Christmas tree" width="750" height="504" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Delray-Beach-100-foot-tree-Tree-Lighting-2017-Photo-credit-Ellithorpe-Photography_preview.jpg?resize=300%2C202&amp;amp;ssl=1 300w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3027" id="caption-attachment-16680"><span data-dcnode-id="3028" instrument_node="">Delray Beach Florida 100 foot Christmas tree</span></figcaption></figure><span data-dcnode-id="3025" instrument_node="">
</span><h2 data-dcnode-id="3014"><span data-dcnode-id="3023" style="color: #008000;"><span data-dcnode-id="3024" instrument_node="">Tropical</span></span><span data-dcnode-id="3022" instrument_node=""> </span><span data-dcnode-id="3020" style="color: #ff0000;"><span data-dcnode-id="3021" instrument_node="">Christmas</span></span><span data-dcnode-id="3019" instrument_node="">&nbsp;</span><span data-dcnode-id="3017" style="color: #008000;"><span data-dcnode-id="3018" instrument_node="">Decorations</span></span><span data-dcnode-id="3015" style="color: #ff0000;"><span data-dcnode-id="3016" instrument_node="">: Fun Activities</span></span></h2><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">You know that saying, “Give experiences, not things.”? These fun activities nicely deliver fabulous memories with some holiday fun. Christmas card photo opp!</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Zip-line over the gators, watch a show, and get up close to Florida’s famous amphibians with a holiday visit to Gatorland. Wouldn’t these jaws make a great spot for a family Christmas pic?</span></p><span data-dcnode-id="3007" instrument_node="">
</span><figure aria-describedby="caption-attachment-16678" class="wp-caption aligncenter" data-dcnode-id="3001" id="attachment_16678" style="width: 740px"><img alt="Christmas decorations at Gatorland in Florida" class="wp-image-16678 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="3006" data-lazy-loaded="1" data-recalc-dims="1" height="422" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg%3Fresize%3D750%252C422%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg?resize=300%2C169&amp;ssl=1 300w" width="750"><noscript data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">&lt;img loading="lazy" class="wp-image-16678 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg?resize=750%2C422&amp;#038;ssl=1" alt="Christmas decorations at Gatorland in Florida" width="750" height="422" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Gatorland-Christmas.jpg?resize=300%2C169&amp;amp;ssl=1 300w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="3002" id="caption-attachment-16678"><span data-dcnode-id="3003" instrument_node="">Christmas decorations at Gatorland</span></figcaption></figure><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="2999" instrument_node="">Everyone loves a parade, and Florida’s canals make ideal routes for </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/florida-holiday-events/"><span data-dcnode-id="2998" instrument_node="">festive Christmas flotillas</span></a><span data-dcnode-id="2996" instrument_node="">. Dennis Littley of&nbsp;</span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/5-minutes-with-ask-chef-dennis/"><span data-dcnode-id="2995" instrument_node="">Ask Chef Dennis</span></a><span data-dcnode-id="2993" instrument_node=""> sent this collage of lighted boats festooned with fun tropical Christmas decorations.</span></p><span data-dcnode-id="2991" instrument_node="">
</span><figure aria-describedby="caption-attachment-16660" class="wp-caption aligncenter" data-dcnode-id="2982" id="attachment_16660" style="width: 740px"><img alt="tropical Christmas decorations: Florida edition" class="wp-image-16660 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2990" data-lazy-loaded="1" data-recalc-dims="1" height="600" loading="eager" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg%3Fresize%3D750%252C600%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg?resize=300%2C240&amp;ssl=1 300w" width="750"><noscript data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">&lt;img loading="lazy" class="wp-image-16660 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg?resize=750%2C600&amp;#038;ssl=1" alt="tropical Christmas decorations: Florida edition" width="750" height="600" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Winterfest-Christmas-Boat-Parade.jpg?resize=300%2C240&amp;amp;ssl=1 300w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2983" id="caption-attachment-16660"><span data-dcnode-id="2987" instrument_node="">tropical Christmas decorations:&nbsp;Winterfest in Ft. Lauderdale. Photo by </span><a data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mccooltravel.com/5-minutes-with-ask-chef-dennis/"><span data-dcnode-id="2986" instrument_node="">Dennis Littley</span></a><span data-dcnode-id="2984" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">How cool is this scene? You can ice skate under gently falling snow in downtown Celebration, Florida. Thanks for the tip, Experience Kissimmee.</span></p><span data-dcnode-id="2978" instrument_node="">
</span><figure aria-describedby="caption-attachment-16667" class="wp-caption aligncenter" data-dcnode-id="2972" id="attachment_16667" style="width: 740px"><img alt="tropical Christmas decorations: Florida edition" class="wp-image-16667 size-full jetpack-lazy-image" data-dcnode-id="2977" data-lazy-sizes="(max-width: 750px) 100vw, 750px" data-lazy-src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?resize=750%2C501&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?w=750&amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?resize=300%2C200&amp;ssl=1 300w" data-recalc-dims="1" height="501" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg%3Fresize%3D750%252C501%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="750"><noscript data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">&lt;img loading="lazy" class="wp-image-16667 size-full" src="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?resize=750%2C501&amp;#038;ssl=1" alt="tropical Christmas decorations: Florida edition" width="750" height="501" srcset="https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?w=750&amp;amp;ssl=1 750w, https://i0.wp.com/www.mccooltravel.com/wp-content/uploads/2017/12/Celebration-Christmas_13.jpg?resize=300%2C200&amp;amp;ssl=1 300w" sizes="(max-width: 750px) 100vw, 750px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2973" id="caption-attachment-16667"><span data-dcnode-id="2974" instrument_node="">tropical Christmas decorations: downtown Celebration, Florida</span></figcaption></figure><span data-dcnode-id="2971" instrument_node="">
</span><h2 data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Beach-loving Florida Snowmen</span></h2><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Every kid (young and old) loves to make a snowman during the holiday season. Unfortunately, the weather doesn’t always deliver the needed snow. No worries in Florida. Beach sand and the sea provide the perfect material for a festive sandman.</span></p><span data-dcnode-id="2965" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2964" instrument_node="">Seaweed and shells decorate this cute surf-side snowman sent to us by Cheryl MacDonald of </span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//whatboundariestravel.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2963" instrument_node="">What Boundaries</span></a><span data-dcnode-id="2961" instrument_node="">. This is how Florida snowmen melt.</span></p><span data-dcnode-id="2959" instrument_node="">
