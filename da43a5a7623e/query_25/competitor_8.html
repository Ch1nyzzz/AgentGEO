</span><p data-dcnode-id="1348"><span data-dcnode-id="1355" instrument_node="">Getting away is expensive. According to an&nbsp;American Express survey, the average American spends $1,145 on summer travel. That figure includes everything from long weekends in affordable </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-outdoor-adventure-vacation-destinations/"><span data-dcnode-id="1354" instrument_node="">outdoor adventure destinations</span></a><span data-dcnode-id="1352" instrument_node="">, to extended holidays in spendy international hotspots, to once-in-a-lifetime getaways to exclusive </span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-honeymoon-destinations-resorts-world/"><span data-dcnode-id="1351" instrument_node="">honeymoon resorts</span></a><span data-dcnode-id="1349" instrument_node="">.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">No matter what you have in mind for your next trip, you’ll want to keep its budgetary impact manageable.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Over the years, I’ve taken long, relatively expensive trips with little to no adverse impact on my day-to-day finances, and short, relatively inexpensive getaways that put me in a bind. More than anything else, I’ve learned that the secret to successful pre-vacation saving is time: The earlier you start, the easier it’ll be to meet your savings goals.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Beyond that, I’ve picked up quite a few tips to save more, faster, for planned vacations. I’ve shared them below.</span></p><div class="money-content" data-dcnode-id="1328" id="money-1933677556"><div data-dcnode-id="1329" style="border:1px solid #CACACA; padding:20px; margin-bottom:20px;"><img data-dcnode-id="1338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/02/the-motley-fool-logo-300x82.png&amp;raw" width="125px"><br data-dcnode-id="1337"><span data-dcnode-id="1330" style="font-size:15px; line-height:160%;"><span data-dcnode-id="1336" instrument_node="">Motley Fool Stock Advisor recommendations have an </span><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">average return of 618%</span></strong><span data-dcnode-id="1333" instrument_node="">. For $79 (or just $1.52 per week), join more than 1 million members and don't miss their upcoming stock picks. 30 day money-back guarantee. </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/motley-fool-stock-advisor/incontent" rel="nofollow" style="text-decoration:underline;" target="_blank"><span data-dcnode-id="1332" instrument_node="">Sign Up Now</span></a></span></div></div><span data-dcnode-id="1327" instrument_node="">
</span><h2 data-dcnode-id="1325" id="how-to-save-up-for-your-next-vacation"><span data-dcnode-id="1326" instrument_node="">How to Save Up for Your Next Vacation</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><h3 data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">1. Set a Firm Budget</span></h3><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">First, set a firm budget for your planned vacation. This should be a hard upper-limit that you pledge not to exceed, barring an unforeseen emergency.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1317" instrument_node="">Precision isn’t the goal here. Your vacation budget is an educated estimate based on the expected contours of your trip: round-trip travel, lodging, local transportation, meals, sightseeing, activities, shopping, incidental costs. If you have your budget set up through </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/personal-capital" rel="nofollow" target="_blank"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Personal Capital</span></strong></a><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">,</span></strong><span data-dcnode-id="1311" instrument_node=""> you’ll be able to quickly go in and see how much you’ve allocated for previous vacations.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Do some research to get a sense of what you can expect to pay for big-ticket items like airfare and lodging, then gut-check your expectations for your daily expenditures at your destination. Do you expect to eat at restaurants or prepare your own meals? Rent a car or get around on public transportation? Hunt for bargains at local markets or keep a tight fist?</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Arrive at cost ranges for each category. Add them together to get a total expected cost range. Pad with a reasonable buffer – say, 10% to 15%, to account for higher-than-expected travel costs or currency fluctuations (for international travel). This final number is your upper budget limit.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><h3 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">2. Set Travel Dates and Pin Down Likely Costs for Airfare, Lodging, and Local Transportation</span></h3><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Before you make any reservations, set your travel dates, then drill down on your budget’s tentpole expenses: round-trip travel, lodging, and local transportation. Since these items are expensive, you’ll want to have a good sense of what they’ll cost you, so that you know:</span></p><span data-dcnode-id="1297" instrument_node="">
</span><ul data-dcnode-id="1290"><li data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">What you need to do to save</span></li><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">What sacrifices you need to make along the way</span></li><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Whether the trip you’ve planned is a wise choice given your present financial situation</span></li></ul><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1288" instrument_node="">Block off a few hours on an evening or weekend for detailed research. Use multiple online booking and price-comparison sites to narrow down what you’re likely to spend on each major item given your origin, destination, travel times, and expectations for quality and comfort. I like using </span><strong data-dcnode-id="1285"><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/hotels" rel="nofollow" target="_blank"><span data-dcnode-id="1287" instrument_node="">Hotels.com</span></a></strong><span data-dcnode-id="1284" instrument_node=""> and </span><strong data-dcnode-id="1281"><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/travelocity" rel="nofollow" target="_blank"><span data-dcnode-id="1283" instrument_node="">Travelocity</span></a></strong><span data-dcnode-id="1280" instrument_node=""> to do my research.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Remember that the prices you see online don’t always include extra expenses like baggage fees, resort fees, and lodging taxes. A $25 daily resort fee adds $150 to the cost of a six-night stay, for instance – not an insignificant expense. Be sure to factor these extras into your cost ranges.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Understanding what your trip’s biggest expenses are likely to cost helps you set the parameters of your vacation savings campaign. Given the same deadline, saving up $1,000 for a round-trip international flight and another $1,000 for a nice hotel in a major European city is a very different prospect than setting aside $300 for a round-trip domestic flight and $200 for a private Airbnb room.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1269"><figure class="aligncenter" data-dcnode-id="1270"><img alt="Set Travel Dates" class="wp-image-235288" data-dcnode-id="1271" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2018/02/set-travel-dates-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2018/02/set-travel-dates-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2018/02/set-travel-dates-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2018/02/set-travel-dates-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1264"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="1265" instrument_node="">:&nbsp;If you see a great deal during this part of the process, jump on it. Airline and hotel pricing models are increasingly sophisticated, and great deals don’t last as often as they used to. Most online booking sites have algorithm-driven features that advise users to buy or wait based on past and expected future price fluctuations. While they’re not perfect, they’ve served me well in the past.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><h3 data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">3. Identify Potential Splurges Ahead of Time</span></h3><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Traveling for pleasure is special by definition. Even frugal travelers can be forgiven for loosening their belts once in a while.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">If you have some budgetary breathing room, do yourself a favor and look for an opportunity or two to treat yourself as you research your destination. Your ideal splurge might be a spa day, a fancy restaurant meal, a chartered fishing trip, a guided city tour – it all depends on your destination and personal preferences.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1253" instrument_node="">Identify and budget for any splurges well in advance, so that they don’t adversely impact your ability to save for the rest of your vacation. Set up a separate savings through </span><strong data-dcnode-id="1250"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/cit-bank-savings-builder" rel="nofollow" target="_blank"><span data-dcnode-id="1252" instrument_node="">CIT Bank</span></a></strong><span data-dcnode-id="1249" instrument_node="">&nbsp;or money market account just for this expenditure and build it into your savings plan – say, an extra $10 per week into your splurge account on top of the $30 you’re already putting into your general travel account.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">On our most recent trip, my wife and I set up a splurge fund for two specific bucket list items: dinner at an exclusive, critically acclaimed restaurant and a boat trip to a remote archipelago. We started saving far enough in advance that neither expenditure affected our household budget nor hampered any other part of our vacation. I’m glad we did – they were the two most memorable experiences of the trip, hands down.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><h3 data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">4. Set Up a Special Savings Account for Your Vacation Fund</span></h3><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1240" instrument_node="">I’m a big proponent of goal-oriented savings accounts. Once you have the basic parameters of your vacation in place and a general sense of how much the adventure will cost, open a savings account for the sole purpose of funding the trip. </span><strong data-dcnode-id="1237"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/cit-bank-savings-builder" rel="nofollow" target="_blank"><span data-dcnode-id="1239" instrument_node="">CIT Bank</span></a></strong><span data-dcnode-id="1236" instrument_node=""> has a Savings Builder account where you can earn up to 1.80%.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Ideally, you’ll make this account your sole funding source – no dipping into other accounts or racking up credit card charges without a plan to pay off the balance in full at the end of the month. That said, don’t hold yourself hostage to your cash flow. Feel free to seed your new account with whatever portion of your current savings you’re comfortable setting aside for the vacation. Moving forward, you’ll pad the account with regular deposits, helped along by the tips I’ve outlined below.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1228"><figure class="aligncenter" data-dcnode-id="1229"><img alt="Setup Special Savings Account Vacation Fund" class="wp-image-235302" data-dcnode-id="1230" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2018/02/setup-special-savings-account-vacation-fund-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2018/02/setup-special-savings-account-vacation-fund-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2018/02/setup-special-savings-account-vacation-fund-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2018/02/setup-special-savings-account-vacation-fund-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1220"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="1224" instrument_node="">: Grow your vacation savings with a </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-new-bank-account-promotions-offers/"><span data-dcnode-id="1223" instrument_node="">high-yield savings account</span></a><span data-dcnode-id="1221" instrument_node="">. Your yield might not be generous enough to support a five-star upgrade, but it’ll net you a few extra bucks by the end of your savings campaign – enough for a round of drinks or extra-long massage, perhaps.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><h3 data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">5. Automatically Transfer Funds to Your Account Each Week or Month</span></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">In a perfect world, saving would be second nature for all of us.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">In the real world, saving is more likely an unwelcome afterthought. With so many things competing for finite dollars, it’s easy to put off something that sequesters those dollars for months or years.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Remove the human element from your vacation savings plan by scheduling automatic transfers to your account. Decide whether weekly, biweekly, or monthly deposits work best, and how much you can afford to set aside at each interval.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Make these regular transfers from your </span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-free-checking-accounts/"><span data-dcnode-id="1205" instrument_node="">primary checking account</span></a><span data-dcnode-id="1203" instrument_node=""> – preferably, the account into which you deposit your paycheck. Secondary accounts are more likely to run dry, delaying transactions and potentially exposing you to overdraft or NSF fees.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Don’t let your automatic savings transfers stop you from manually transferring money into your vacation fund when you’re able. Many of the tips I’ve outlined below necessitate manual, variable-amount transfers at irregular intervals.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><h3 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">6. Stop Raiding Your Coin Jar</span></h3><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">My coin jar is my petty cash fund – literally, the loose change I use for small, frequent expenditures like parking and snacks on the road.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">While saving for my most recent vacation, I stopped dipping into my coin jar completely. I kept adding to it as normal, letting its balance grow for three or four months. Then, a couple weeks before I left for my trip, I emptied it out, counted what I had, and transferred an identical amount into my vacation fund.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">This exercise wasn’t make-or-break for my vacation – it netted about $40, if I remember correctly. But it was an important symbolic step that got me into an accumulative mindset.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><h3 data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">7. Set Aside a Portion of Your Tax Refund</span></h3><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">If you’re in line for a tax refund this year, resist the urge to tap it for discretionary purchases you wouldn’t otherwise make. Instead, set aside as much as comfortably possible for your vacation fund. You’ll still use the money for something fun – just not right away.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1170"><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="1177" instrument_node="">: Use a </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/free-online-tax-preparation-software-services/"><span data-dcnode-id="1176" instrument_node="">free or low-cost online tax prep service</span></a><span data-dcnode-id="1174" instrument_node=""> to trim your tax filing costs and maximize your refund. If you’re willing to invest a few hours of your free time, forgoing a human accountant and </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/taxact-vs-turbotax-vs-hr-block-best-tax-prep-software/"><span data-dcnode-id="1173" instrument_node="">choosing the right tax prep software</span></a><span data-dcnode-id="1171" instrument_node=""> can substantially reduce your filing outlay.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><h3 data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">8. Set Aside a Portion of Your Performance Bonus</span></h3><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Not expecting much of a tax refund this year? If you’re fortunate enough to earn a quarterly or annual performance bonus at work, put some of it into your vacation fund.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Don’t shortchange other bonus-related priorities – many people rely on performance bonuses to get ahead on debt service or purchase holiday gifts for friends and family. Just make sure your vacation fund is on the list.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><h3 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">9. Get a Travel Rewards Credit Card</span></h3><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">Do you have solid credit and the discipline to pay off your credit card balances in full each month? Then check out our roundup of the </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-travel-rewards-credit-cards/"><span data-dcnode-id="1155" instrument_node="">top travel rewards credit cards</span></a><span data-dcnode-id="1153" instrument_node=""> and apply for your favorite.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">Your new credit card won’t single-handedly pay for your trip, but the sign-up bonus could significantly reduce its cost. Some of the most sought-after travel rewards cards, such as </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/chase-sapphire-preferred-credit-card-review/"><span data-dcnode-id="1149" instrument_node="">Chase Sapphire Preferred Card</span></a><span data-dcnode-id="1147" instrument_node="">, offer sign-up bonuses worth hundreds of dollars against travel purchases.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Every purchase made with your card earns points or miles that you can redeem for future travel expenses. Depending on the card, travel-related purchases, such as airfare and hotel stays, may earn at higher rates.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="1139" instrument_node="">: If you prefer to keep your options open, check out our list of the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-cash-back-credit-cards/"><span data-dcnode-id="1138" instrument_node="">best cash back credit cards</span></a><span data-dcnode-id="1136" instrument_node=""> on the market.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><h3 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">10. Pay Off Credit Card Debt</span></h3><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">“Spending” money to save money sounds counterintuitive, but </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/debt-snowball-vs-avalanche-vs-snowflake/"><span data-dcnode-id="1129" instrument_node="">paying off debt</span></a><span data-dcnode-id="1127" instrument_node=""> isn’t ordinary spending. Every dollar you put toward high-interest debt, especially credit card debt, is a dollar that won’t accrue interest ever again. Over time, a slimmer debt load loosens the belt on your discretionary budget, freeing up more funds for luxuries like vacations.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">Paying down debt is a long-term project that outlives individual discretionary spending plans. The key to success here is setting aside a manageable, sustainable portion of your income for the cause and </span><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">sticking with it</span></em><span data-dcnode-id="1121" instrument_node="">.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1110"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Pro tip</span></strong><span data-dcnode-id="1116" instrument_node="">: If you’re struggling to pay down your balance because of high interest rates, consider a personal loan through </span><strong data-dcnode-id="1112"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/sofi-personal-loans" rel="nofollow" target="_blank"><span data-dcnode-id="1115" instrument_node="">SoFi</span></a><span data-dcnode-id="1113" instrument_node="">.</span></strong><span data-dcnode-id="1111" instrument_node=""> This will help consolidate your balances at a lower interest rate. This can help you save thousands.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1106"><figure class="aligncenter" data-dcnode-id="1107"><img alt="Pay Off Credit Card Debt" class="wp-image-235273" data-dcnode-id="1108" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2018/02/pay-off-credit-card-debt-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2018/02/pay-off-credit-card-debt-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2018/02/pay-off-credit-card-debt-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2018/02/pay-off-credit-card-debt-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="1105" instrument_node="">
</span><h3 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">11. Cancel Your Nonessential Subscriptions</span></h3><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">My household is a sucker for subscriptions.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">My wife’s beloved Birchbox membership eats away at our monthly budget, $10 at a time. I have a couple leftover print magazine subscriptions that collectively account for another $100 or so per year. Our Hulu subscription is a comparable drain. We can do without them all, but the insidious combination of habit and inertia keep us bound.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1095" instrument_node="">Learn from our example. If your budget is hostage to nonessential subscriptions, cancel them. Sure, you’ll miss having the </span><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">option</span></em><span data-dcnode-id="1092" instrument_node=""> to try all those personal care products or discover yet another mediocre show, but your life will go on much as before. Look into a service like </span><strong data-dcnode-id="1089"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/trim" rel="nofollow" target="_blank"><span data-dcnode-id="1091" instrument_node="">Trim</span></a></strong><span data-dcnode-id="1088" instrument_node=""> because they will go through your finance and find subscriptions you might not even know you had. They will also help by negotiating different things like cable and internet.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">12. Eat Out Less</span></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Most people, especially those with no love for home cooking and limited appetite for prepared and processed meals, appreciate a nice dinner out. Likewise, on-the-go meals at quick-serve restaurants are godsends for busy students, parents, and professionals (who often occupy the same skin).</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">The problem is the cost. Whether it’s a $50-a-head dinner at a fancy restaurant or a $5 sandwich at your local sub shop, eating out (or grabbing takeout) is almost always more expensive than prepping your own meals.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Here’s an idea. Before you begin scrimping to save for your next vacation, commit to eating one fewer meal out each week. If you dine out less frequently than once per week, commit to halving your restaurant meal allotment.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">It’s impossible to say how much you’ll save from this simple change. That depends on the quality and cost of your favorite restaurants, how many mouths you’re feeding, and other factors. But it’s assured to make a noticeable difference. Deposit some or all of the resultant savings into your vacation fund and watch it grow that much faster.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1064"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="1068" instrument_node="">: No one’s saying you need to swear off restaurant meals altogether – you deserve to take a break from preparing your own dinner every once in a while. But a little restraint goes a long way. Check out our post on </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/save-money-eating-out-restaurants/"><span data-dcnode-id="1067" instrument_node="">easy ways to save money eating out at restaurants</span></a><span data-dcnode-id="1065" instrument_node=""> for frugal dining ideas.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><h3 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">13. Get an Insulated Coffee Container (and Stop Buying Lattes)</span></h3><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">This change is even easier to make.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1056" instrument_node="">First, buy a durable, sealable, </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2W8gk6R" target="_blank"><span data-dcnode-id="1055" instrument_node="">well-insulated coffee container</span></a><span data-dcnode-id="1053" instrument_node="">. You can find quality models for less than $15 online. It’s a little more expensive, but I love my </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2EeBZQQ" target="_blank"><span data-dcnode-id="1052" instrument_node="">Yeti coffee mug</span></a><span data-dcnode-id="1050" instrument_node="">. I can put coffee in before I go to the gym in the mornings and it’s still hot by the time I get back in the car and head to work.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Second, start brewing coffee at home, or increase your brewing volume if you already start your day with a cup of joe. You may need to invest in a </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2YyLaDk" target="_blank"><span data-dcnode-id="1046" instrument_node="">larger coffee maker</span></a><span data-dcnode-id="1044" instrument_node="">. A base model will set you back $20 or $30 – a reasonable investment that you won’t have to repeat in the near future. (I’ve been brewing a pot of coffee a day, at least, with the same cheap coffee maker for going on five years.)</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Third, stop visiting Starbucks (or your local equivalent) on your way to work. Quitting your latte-a-day habit cold turkey is worth a $20-to-$25 bottom-line bump </span><em data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">each week</span></em><span data-dcnode-id="1038" instrument_node="">. That’s an extra $100 per month to put toward your vacation fund.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Yes, you’ll go through more coffee at home, but even great coffee costs no more than $10 to $12 per bag at the grocery store. Two per month reduces your latte savings by $25, at most, leaving $75 for the trip.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">14. Trim Your Grocery Budget</span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Trimming your grocery budget doesn’t necessarily mean compromising on quality, healthfulness, or freshness. You can still shop at your local </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/food-coop-costs-benefits-drawbacks/"><span data-dcnode-id="1028" instrument_node="">food co-op</span></a><span data-dcnode-id="1026" instrument_node="">, buy in-season produce, and avoid ecologically harmful or ethically questionable ingredients.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Everyone’s diet is different, so I can’t get too specific with my advice here, but you can likely adapt most of these tips to your situation:</span></p><span data-dcnode-id="1021" instrument_node="">
</span><ul data-dcnode-id="980"><li data-dcnode-id="1017"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Substitute Cheaper Produce</span></strong><span data-dcnode-id="1018" instrument_node="">. Why reach for the kale when chard will do? Shiitakes instead of button mushrooms? Honeycrisp over Gala apples? Sure, the flavors might not pop quite the same way, but saving money tastes good too.</span></li><li data-dcnode-id="1007"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Avoid Prepared Foods</span></strong><span data-dcnode-id="1014" instrument_node="">. Skirt past the prepared foods counter. Don’t even look at the hot bar. Delicious as all its greenery looks, </span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">do not pick up that salad tray</span></em><span data-dcnode-id="1011" instrument_node="">. Wait until you’re home to indulge – and stick to cooking with the </span><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">ingredients</span></em><span data-dcnode-id="1008" instrument_node=""> you buy.</span></li><li data-dcnode-id="1000"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Don’t Shop Hungry</span></strong><span data-dcnode-id="1004" instrument_node="">. The easiest way to run up your grocery bill is to shop hungry, when </span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">everything</span></em><span data-dcnode-id="1001" instrument_node=""> looks good. Adjust your routine such that you’re shopping after a full meal whenever possible.</span></li><li data-dcnode-id="985"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Use Coupons</span></strong><span data-dcnode-id="997" instrument_node="">. No, you don’t have to adopt </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/coupons-from-casual-to-extreme/"><span data-dcnode-id="996" instrument_node="">extreme couponing</span></a><span data-dcnode-id="994" instrument_node=""> or even spend time clipping from your local grocery circular. There’s an app for that. </span><strong data-dcnode-id="991"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.redplum.com/" target="_blank"><span data-dcnode-id="993" instrument_node="">RedPlum</span></a></strong><span data-dcnode-id="990" instrument_node=""> has hundreds of printable and downloadable grocery coupons on its website. You can probably load coupons right to your store loyalty card too – check the site to make sure your favorite store is covered. If you don’t want to click coupons you can use </span><strong data-dcnode-id="987"><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/ibotta" rel="nofollow" target="_blank"><span data-dcnode-id="989" instrument_node="">Ibotta</span></a></strong><span data-dcnode-id="986" instrument_node=""> and still save a lot.</span></li><li data-dcnode-id="981"><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Buy in Bulk When Appropriate</span></strong><span data-dcnode-id="982" instrument_node="">. When you start throwing unused perishables out, buying in bulk stops being a good deal. It makes more sense for nonperishable items that you use at reasonable volumes: coffee, toilet paper, healthy packaged snacks, personal hygiene products, and whatever else makes sense for your house.</span></li></ul><span data-dcnode-id="979" instrument_node="">
</span><h3 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">15. Get a Part-Time or Seasonal Job</span></h3><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Thought your days of working multiple part-time jobs were over for good? Maybe it’s time to bring them back for a limited time.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">Choose a part-time job that pays decently well, offers reliable hours with the option to pick up more, and preserves your dignity. I pad my savings and add some variety to my routine with occasional shifts as an in-store sampler for a local brewery, for instance. The gig pays well above </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/living-on-minimum-wage-possible/"><span data-dcnode-id="971" instrument_node="">minimum wage</span></a><span data-dcnode-id="969" instrument_node="">, involves talking to people who like beer, and gives me a chance to promote a product I respect and enjoy.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Another example: Each fall, my cousin – an elementary school teacher – spends his weekends picking apples and giving hay rides at an orchard near his semirural home. He gets to spend time outside in crisp, sunny weather and entertain some of the same kids with whom he spends weekdays in the classroom.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Your part-time or seasonal job won’t make you rich. But even if it leaves you with a couple hundred extra bucks each month, it’ll go a long way toward funding your next vacation.</span></p><span data-dcnode-id="961" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="958"><figure class="aligncenter" data-dcnode-id="959"><img alt="Get Part Time Seasonal Job" class="wp-image-235318" data-dcnode-id="960" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2018/02/get-part-time-seasonal-job-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2018/02/get-part-time-seasonal-job-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2018/02/get-part-time-seasonal-job-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2018/02/get-part-time-seasonal-job-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="957" instrument_node="">
</span><h3 data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">16. Pick Up Extra Hours at Work</span></h3><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">If you’re paid by the hour and don’t mind spending more time on the job, ask your supervisor about picking up extra hours. Even if the first answer is “no,” you’ll make it clear that you’re open to working more, sparing your supervisor some hassle when he or she actually does have to fill extra shifts.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">For a while, I worked at a college town restaurant that got </span><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">super</span></em><span data-dcnode-id="947" instrument_node=""> busy on game days. It was a no-brainer to pick up extra shifts on those days, which were all-hands-on-deck affairs anyway. Between wages and tips, I’d reliably make $200 for four or five hours of work, doubling what I’d take home on a good normal day.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Extra work really pays once you cross the 40-hour-per-week threshold and become eligible for overtime at 1.5 times your regular pay rate. Just make sure your employer is on board – many low-margin companies have strict no-overtime policies.</span></p><span data-dcnode-id="942" instrument_node="">
</span><h3 data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">17. Hold a Yard Sale</span></h3><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">Don’t wait until your attic starts overflowing to make your move. Start organizing and cataloging your extra stuff today. Determine what’s fit to sell and what’s well and truly junk. Hold a </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/successful-garage-sale-tips/"><span data-dcnode-id="937" instrument_node="">yard or garage sale</span></a><span data-dcnode-id="935" instrument_node=""> to get rid of as much of the former as you can, then give what you don’t sell (and everything in the second category) to your favorite charity.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Once you’re done, deposit your yard sale’s take into your vacation fund. Then check with your tax professional to determine which of your charitable contributions you can safely write off on next year’s taxes. If you travel before tax day, no sweat – just put that write-off toward your next vacation.</span></p><span data-dcnode-id="930" instrument_node="">
</span><h3 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">18. Drive for a Ridesharing App</span></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="926" instrument_node="">Is your car relatively new? Is it still in good shape? Do you enjoy driving, or at least find it bearable? Do you mind having strangers in your car? If you answered “yes” to all of these questions, look into driving for a ridesharing app like </span><strong data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/uber-review/"><span data-dcnode-id="925" instrument_node="">Uber</span></a></strong><span data-dcnode-id="922" instrument_node=""> or </span><strong data-dcnode-id="918"><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/lyft-review/"><span data-dcnode-id="921" instrument_node="">Lyft</span></a><span data-dcnode-id="919" instrument_node="">.</span></strong><span data-dcnode-id="917" instrument_node=""> If you’d prefer to have a little interaction with people you could deliver food for&nbsp;</span><strong data-dcnode-id="914"><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/doordash-dasher" rel="nofollow" target="_blank"><span data-dcnode-id="916" instrument_node="">DoorDash</span></a></strong><span data-dcnode-id="913" instrument_node="">&nbsp;or groceries with&nbsp;</span><strong data-dcnode-id="909"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/instacart" rel="nofollow" target="_blank"><span data-dcnode-id="912" instrument_node="">Instacart</span></a><span data-dcnode-id="910" instrument_node="">.</span></strong></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">You don’t have to quit your job or give up your social life to earn real money on the side as a ridesharing driver. You just have to commit to setting aside some of your free time to drive others around. I know a few professionals who work full-time and still find time to drive a few hours each week. Some build their ridesharing time into their daily commutes; others set aside a weekend night for transporting revelers around town. It doesn’t matter how you do it, as long as you meet your earning goals.</span></p><span data-dcnode-id="904" instrument_node="">
</span><h3 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">19. Monetize Your Skills</span></h3><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Driving isn’t most people’s idea of a fun, relaxing hobby, but driving for ridesharing apps is lucrative enough to make up for the added stress.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">I’m betting you have at least one pastime that’s more enjoyable than endlessly circuiting your city. Perhaps you’re a talented graphic designer. Maybe you’re an eloquent writer. You could have a knack for conveying math or science concepts to young people. I don’t know; you do.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">These skills, and countless others, have real value. No matter how busy you are, you can surely find a few hours per month to devote to paying </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/become-freelancer-types-work/"><span data-dcnode-id="893" instrument_node="">freelance projects</span></a><span data-dcnode-id="891" instrument_node="">.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="888" instrument_node="">Your first move: Create free accounts on popular freelancing platforms like Upwork and </span><strong data-dcnode-id="884"><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freelancer.com/" target="_blank"><span data-dcnode-id="887" instrument_node="">Freelancer.com</span></a><span data-dcnode-id="885" instrument_node="">.</span></strong><span data-dcnode-id="883" instrument_node=""> Then talk to a seasoned freelancer or two about their experiences – how did they find their first clients, determine what to charge, differentiate themselves from the competition, and </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/draft-freelance-contract-agreement-template/"><span data-dcnode-id="882" instrument_node="">put together binding freelance contract agreements</span></a><span data-dcnode-id="880" instrument_node=""> that protect their rights and interests?</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">With some luck, your freelance side gig’s trickle of income could soon turn into a substantial stream. One day, it might even replace your main source of income. Take it from me: I began my writing career during my spare time, more as a creative diversion than anything else, and built it until I was earning enough, consistently, to quit my 9-to-5.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">In the meantime, keep that freelance income stream pointed squarely at your vacation fund.</span></p><span data-dcnode-id="872" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="869"><figure class="aligncenter" data-dcnode-id="870"><img alt="Keep Freelance Income" class="wp-image-235256" data-dcnode-id="871" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2018/02/keep-freelance-income-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2018/02/keep-freelance-income-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2018/02/keep-freelance-income-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2018/02/keep-freelance-income-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="868" instrument_node="">
</span><h3 data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">20. Rent Out Your Spare Bedroom</span></h3><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">The United States has tens of millions of empty or underutilized spare bedrooms. Whether it’s a closet-sized space in a detached </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/accessory-dwelling-unit-granny-flat-costs/"><span data-dcnode-id="863" instrument_node="">accessory dwelling unit</span></a><span data-dcnode-id="861" instrument_node=""> or a palatial upstairs suite without anyone to call it home, your spare bedroom is worth more occupied than empty.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">There are two routes you can go here: short-term or long-term.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="855" instrument_node="">If your town or neighborhood sees lots of visitors, short-term is the way to go: Do some research to determine the going nightly rate for similar rooms in your area, then list the space on </span><strong data-dcnode-id="848"><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/airbnb" rel="nofollow" target="_blank"><span data-dcnode-id="854" instrument_node="">Airbnb</span></a><span data-dcnode-id="852" instrument_node="">, </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/homeaway" rel="nofollow" target="_blank"><span data-dcnode-id="851" instrument_node="">HomeAway</span></a><span data-dcnode-id="849" instrument_node="">,</span></strong><span data-dcnode-id="847" instrument_node=""> and other reputable short-term rental platforms.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">If short-term rental demand is limited in your neck of the woods, opt for traditional rental arrangements instead. List your place on local apartment-finder websites or put up a “roommate wanted” ad on Craigslist. (Just be safe about it.) Depending on your market, you could earn anywhere from a couple hundred extra bucks to well over $1,000 each month in rental income – a huge and perhaps decisive boon for your vacation fund.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">21. Downsize to a Smaller Place</span></h3><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Is moving to a smaller, cheaper apartment a proportional response to vacation-induced financial worries?</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">Maybe, maybe not. If you’re entirely happy with your current place, and your monthly rent payments aren’t straining your budget, I wouldn’t recommend moving </span><em data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">just</span></em><span data-dcnode-id="832" instrument_node=""> to up your vacation savings rate.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="829" instrument_node="">On the other hand, if you’ve been considering a move for some time </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">and</span></em><span data-dcnode-id="826" instrument_node="">&nbsp;expect to be able to find a cheaper, perhaps smaller place that’s perfectly adequate for your needs, your upcoming vacation could be just the motivator you need to </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/declutter-downsize-home-tips/"><span data-dcnode-id="825" instrument_node="">downsize and declutter</span></a><span data-dcnode-id="823" instrument_node=""> your life.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="820" instrument_node="">In </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/fun-things-do-minneapolis-st-paul-twin-cities/"><span data-dcnode-id="819" instrument_node="">Minneapolis-St. Paul</span></a><span data-dcnode-id="817" instrument_node="">, my home market, downsizing from three bedrooms to two in a new-construction apartment building is good for $300 to $600 in monthly rent savings, depending on location and amenities. In more expensive markets, like </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/fun-things-do-san-francisco-activities-attractions/"><span data-dcnode-id="816" instrument_node="">San Francisco</span></a><span data-dcnode-id="814" instrument_node=""> and New York City, a comparable move saves a lot more.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="808"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="809" instrument_node="">: Before and during your move, review your lessee obligations and make sure you’re doing everything possible to recoup your security deposit. After all, the more you recover, the more you’ll have to spend on vacation.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">For more information, check out our article on </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/get-security-deposit-back/"><span data-dcnode-id="805" instrument_node="">common things that can reduce your security deposit refund</span></a><span data-dcnode-id="803" instrument_node="">.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h3 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">22. Put a Freeze on Your Household’s Discretionary Spending</span></h3><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">Much of this list is devoted to variations on a common theme: reducing discretionary spending. Restaurant meals, lattes, expensive produce, nonessential subscriptions – all are </span><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">wants</span></em><span data-dcnode-id="794" instrument_node="">, not needs.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Maybe it’s time to ditch the piecemeal approach and impose a temporary, across-the-board freeze on your discretionary spending. Break out your past few months’ credit card and bank statements, add up everything you’ve spent on nonessentials during that time, and declare: “That’s it.”</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Then, resolve not to exceed those spending levels until you’re done saving for your vacation, or some external event (like a raise or unexpectedly large performance bonus) changes your financial situation.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="785" instrument_node="">The U.S. Congress basically did this back in 2011, when lawmakers enabled a government-wide spending freeze known as </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/sequestration-definition-national-debt-budget/"><span data-dcnode-id="784" instrument_node="">sequestration</span></a><span data-dcnode-id="782" instrument_node=""> in an effort to fight the </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/raising-national-federal-debt-ceiling-definition/"><span data-dcnode-id="781" instrument_node="">national debt</span></a><span data-dcnode-id="779" instrument_node="">. Our representatives and senators might not be wildly popular, but perhaps this is one time you can safely follow their example.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="764"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Pro Tip</span></strong><span data-dcnode-id="774" instrument_node="">: Your discretionary spending </span><em data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">freeze</span></em><span data-dcnode-id="771" instrument_node=""> shouldn’t prevent further spending </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">cuts</span></em><span data-dcnode-id="768" instrument_node="">. It’s a hard cap on spending growth and </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/ways-avoid-lifestyle-inflation/"><span data-dcnode-id="767" instrument_node="">lifestyle inflation</span></a><span data-dcnode-id="765" instrument_node="">, not a license to continue with unnecessary or wasteful outlays.</span></p><span data-dcnode-id="763" instrument_node="">
</span><h2 data-dcnode-id="761" id="final-word"><span data-dcnode-id="762" instrument_node="">Final Word</span></h2><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">It’s almost inevitable that you’ll need to make some sacrifices during your pre-vacation savings campaign, even if they involve relatively minor luxuries like restaurant meals and subscription boxes.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Just try not to cut too deep. If you find yourself contemplating serious trade-offs, like forgoing a long-planned return to school for a career-critical degree, you might need to reassess your itinerary or timing. Why cut to the bone to afford that once-in-a-lifetime tropical vacation when a few small lifestyle tweaks can bring within reach a long weekend at the seashore? Paradise can wait.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">What are you doing to save up for your next vacation?</span></p><span data-dcnode-id="751" instrument_node="">
