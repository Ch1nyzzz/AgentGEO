dy-container" data-dcnode-id="971" data-has-loaded-ads="true" data-title="Things to Do in the Tropical Savanna in Africa" data-url="https://traveltips.usatoday.com/things-tropical-savanna-africa-61257.html"><span data-dcnode-id="1645" instrument_node=""> </span><div class="article-content-container" data-dcnode-id="1018"><span data-dcnode-id="1644" instrument_node=""> </span><div class="related-articles-float" data-dcnode-id="1594"><span data-dcnode-id="1643" instrument_node=""> </span><div class="main-image-wrap expandable" data-dcnode-id="1621"><span data-dcnode-id="1642" instrument_node=""> </span><div class="image-wrap" data-dcnode-id="1634"><span data-dcnode-id="1641" instrument_node=""> </span><img alt="Things to Do in the Tropical Savanna in Africa" data-dcnode-id="1640" id="main-image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/560x560p/s3-us-west-1.amazonaws.com/contentlab.studiod/getty/a4e115c9e4cc4e1b8e5a47198e50ad5e&amp;raw"><span data-dcnode-id="1639" instrument_node=""> </span><span class="toggle" data-dcnode-id="1638"></span><span data-dcnode-id="1637" instrument_node=""> </span><meta content="Things to Do in the Tropical Savanna in Africa" data-dcnode-id="1636"><span data-dcnode-id="1635" instrument_node=""> </span></div><span data-dcnode-id="1633" instrument_node=""> </span><p data-dcnode-id="1623"><span data-dcnode-id="1632" instrument_node=""> </span><span class="cutline" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Things to Do in the Tropical Savanna in Africa</span></span><span data-dcnode-id="1629" instrument_node=""> </span><meta content="" data-dcnode-id="1628"><span data-dcnode-id="1627" instrument_node=""> </span><span class="credit" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">(Photo: )</span></span><span data-dcnode-id="1624" instrument_node=""> </span></p><span data-dcnode-id="1622" instrument_node=""> </span></div><span data-dcnode-id="1620" instrument_node=""> </span><div class="related-articles-list" data-dcnode-id="1596"><span data-dcnode-id="1619" instrument_node=""> </span><h3 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Related Articles</span></h3><span data-dcnode-id="1616" instrument_node=""> </span><ul data-dcnode-id="1598"><span data-dcnode-id="1615" instrument_node=""> </span><li data-dcnode-id="1612"><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/cheap-african-tours-60406.html"><span data-dcnode-id="1614" instrument_node="">Cheap African Tours</span></a></li><span data-dcnode-id="1611" instrument_node=""> </span><li data-dcnode-id="1608"><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/kind-scenery-see-african-safari-102903.html"><span data-dcnode-id="1610" instrument_node="">What Kind of Scenery Do You See on an African Safari?</span></a></li><span data-dcnode-id="1607" instrument_node=""> </span><li data-dcnode-id="1604"><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/lodges-kruger-national-park-south-africa-30065.html"><span data-dcnode-id="1606" instrument_node="">Lodges in Kruger National Park in South Africa</span></a></li><span data-dcnode-id="1603" instrument_node=""> </span><li data-dcnode-id="1600"><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/nature-tours-east-africa-16786.html"><span data-dcnode-id="1602" instrument_node="">Nature Tours of East Africa</span></a></li><span data-dcnode-id="1599" instrument_node=""> </span></ul><span data-dcnode-id="1597" instrument_node=""> </span></div><span data-dcnode-id="1595" instrument_node=""> </span></div><span data-dcnode-id="1593" instrument_node=""> </span><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">The continent of Africa features two giant belts of savanna, running east and west, where the occasional tree dots grassland in a region of transition from jungle to desert. Look at a map of the continent and envision a line running from the top of Senegal to Ethiopia, and another across the middle of Namibia and South Africa. Subtract from this area the tropical rainforests of Zaire, Congo, Cameroon and Gabon, and you have delineated the tropical savanna of Africa. Within this giant swath of territory are many incredible adventures for visitors to pursue.</span></p><span data-dcnode-id="1590" instrument_node=""> </span><div class="inline-ad" data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="1584"><span data-dcnode-id="1589" instrument_node="">
</span><span data-dcnode-id="1587" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3235755782694080" data-ad-format="auto" data-ad-slot="9092532056" data-dcnode-id="1585" data-full-width-responsive="true" style="display:block; width: 400px"><span data-dcnode-id="1586" instrument_node="">
</span></ins></div><span data-dcnode-id="1583" instrument_node=""> </span><h2 data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Go on a Wildlife Safari</span></h2><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Most tourists from Europe and North America head to East Africa for wildlife safaris, visiting classic examples of tropical savanna such as the Serengeti in Tanzania or Masai Mara in Kenya, two adjoining wildlife parks. Just after dawn and just before sunset, you can take a game drive in a pop-top vehicle designed for amateur photographers. The savanna's remarkable wildlife is most active at these times of day. See groups of warthogs, elephants walking single file, lions gazing across the horizon and herds of grazing antelopes, tails flicking in the dim light. You can click the shutter nonstop or just watch baboons bounding in a clearing or hippos bellowing in a river. The time not on game drives can be spent enjoying international cuisine at a luxury lodge or fine grub prepared by the safari chef around a campfire.</span></p><span data-dcnode-id="1578" instrument_node=""> </span><div data-dcnode-id="1577" id="mobile-player-container"></div><span data-dcnode-id="1576" instrument_node=""> </span><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">View Tribal Life</span></h2><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Bomas, the villages in the savanna where Masai people live, may admit your safari group for a fee to meet tribe members for part of the day. Children tend to take particular interest in your cameras and want to see photos of themselves. Full-scale cultural safaris arrange visits for you with natural healers and artisan cooperatives or sign you up for a community volunteering project. The three leading tourist magnets for American tourists – Kenya, Tanzania and Uganda – provide opportunities for your party to get a glimpse of authentic nomadic life in the savanna. You might visit culture centers outside the capital cities to enjoy a show of traditional dancers, singers and musicians.</span></p><span data-dcnode-id="1571" instrument_node=""> </span><div data-dcnode-id="1567" id="ad-mobile-bottom"><span data-dcnode-id="1570" instrument_node=""> </span><div data-ad-unit-name="usatoday_mobile/mobileweb-banner_bottom/travel/partner_demandmedia" data-dcnode-id="1569" id="320x50_BTF"></div><span data-dcnode-id="1568" instrument_node=""> </span></div><h2 data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Go Birding</span></h2><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">You can combine cultural encounters with birding by hiring a trained guide from a rural village in the savanna to lead you on a nature walk. While you can figure out such giant specimens as the ubiquitous marabou stork or the bright pink flamingo on your own, there’s no substitute for local knowledge when it comes to figuring out whether that pretty feathered creature is a hornbill or spoonbill. Uganda and Kenya both offer opportunities for guided bird-watching safaris.</span></p><span data-dcnode-id="1562" instrument_node=""> </span><div data-ad-unit-name="sticky-video-player" data-dcnode-id="1276"><span data-dcnode-id="1561" instrument_node="">

</span></section></div><span data-dcnode-id="1275" instrument_node=""> </span><h2 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Try Rafting</span></h2><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">You may associate whitewater rafting and bungee jumping with thrill-seeking vacations in the west more than the African savanna, but Uganda is making a move into the adventure travel market with activities that focus on adventures on the Nile. Tour operators offer easy raft floats with a look at bird life near the Victorian source of the Nile as well as more extreme rafting that sends you plunging through rapids. If you want instead to get a look down at the savanna, you can join a trek to the top of Mount Kenya in Kenya or Mount Kilimanjaro, just across the border in Tanzania.</span></p><span data-dcnode-id="1270" instrument_node=""> </span><div class="adsense-main-ad" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="1266"><span data-dcnode-id="1269" instrument_node="">

 id="main-image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/560x560p/photos.demandstudios.com/getty/article/94/146/107405484.jpg&amp;raw"><span data-dcnode-id="935" instrument_node=""> </span><span class="toggle" data-dcnode-id="934"></span><span data-dcnode-id="933" instrument_node=""> </span><meta content="A leopard relaxes on a rock at Kruger National Park in South Africa." data-dcnode-id="932"><span data-dcnode-id="931" instrument_node=""> </span></div><span data-dcnode-id="929" instrument_node=""> </span><p data-dcnode-id="919"><span data-dcnode-id="928" instrument_node=""> </span><span class="cutline" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">A leopard relaxes on a rock at Kruger National Park in South Africa.</span></span><span data-dcnode-id="925" instrument_node=""> </span><meta content="Warren Little/Getty Images Sport/Getty Images" data-dcnode-id="924"><span data-dcnode-id="923" instrument_node=""> </span><span class="credit" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">(Photo: Warren Little/Getty Images Sport/Getty Images )</span></span><span data-dcnode-id="920" instrument_node=""> </span></p><span data-dcnode-id="918" instrument_node=""> </span></div><span data-dcnode-id="916" instrument_node=""> </span><div class="related-articles-list" data-dcnode-id="892"><span data-dcnode-id="915" instrument_node=""> </span><h3 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Related Articles</span></h3><span data-dcnode-id="912" instrument_node=""> </span><ul data-dcnode-id="894"><span data-dcnode-id="911" instrument_node=""> </span><li data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/things-tropical-savanna-africa-61257.html"><span data-dcnode-id="910" instrument_node="">Things to Do in the Tropical Savanna in Africa</span></a></li><span data-dcnode-id="907" instrument_node=""> </span><li data-dcnode-id="904"><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/nature-tours-east-africa-16786.html"><span data-dcnode-id="906" instrument_node="">Nature Tours of East Africa</span></a></li><span data-dcnode-id="903" instrument_node=""> </span><li data-dcnode-id="900"><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/travel-kenya-africa-30232.html"><span data-dcnode-id="902" instrument_node="">How to Travel to Kenya, Africa</span></a></li><span data-dcnode-id="899" instrument_node=""> </span><li data-dcnode-id="896"><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//traveltips.usatoday.com/adventure-tourism-himalayas-105151.html"><span data-dcnode-id="898" instrument_node="">Adventure Tourism &amp; the Himalayas</span></a></li><span data-dcnode-id="895" instrument_node=""> </span></ul><span data-dcnode-id="893" instrument_node=""> </span></div><span data-dcnode-id="891" instrument_node=""> </span></div><span data-dcnode-id="889" instrument_node=""> </span><div class="section summary" data-dcnode-id="882" id="section-0"><span data-dcnode-id="888" instrument_node=""> </span><p data-dcnode-id="887"></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">You can go elegant and high end on your tour of Africa, staying only at the best lodges. A Kenyan safari with a famed outfitter such as Abercrombie &amp; Kent costs from $6,000 to more than $13,000 at time of publication. A tour of Africa doesn't have to be expensive, though, with plenty of alternatives available for travelers on a budget. The savvy traveler can find specific tours for under $1,000 for the land portion of the trip.</span></p><p data-dcnode-id="884"></p><span data-dcnode-id="883" instrument_node=""> </span></div><span data-dcnode-id="881" instrument_node=""> </span><div class="inline-ad" data-ad-unit-name="adsense-inline" data-dcnode-id="880"></div><span data-dcnode-id="879" instrument_node=""> </span><div class="section" data-dcnode-id="869" id="section-1"><span data-dcnode-id="878" instrument_node=""> </span><h2 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Least Expensive</span></h2><span data-dcnode-id="875" instrument_node=""> </span><p data-dcnode-id="874"></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">To get the best deals, call or email travel agents in Nairobi in Kenya or Arusha in Tanzania. These two bustling hubs offer bases for affordable travel in East Africa -- the main destination for tourists. Agents can design safaris of three to seven or more days and come up with a per-day rate for the well-worn circuit between Kilimanjaro and the famed game parks at Amboseli, Masai Mara, Tsavo and the Ngorongoro Crater. Prices may run around $120 to $150 per person per day depending on how far in advance you book and the size of your party. Ask prospective safari operators for a list of references to be emailed to you and check them.</span></p><p data-dcnode-id="871"></p><span data-dcnode-id="870" instrument_node=""> </span></div><span data-dcnode-id="868" instrument_node=""> </span><div data-dcnode-id="867" id="mobile-player-container"></div><span data-dcnode-id="866" instrument_node=""> </span><div class="section" data-dcnode-id="856" id="section-2"><span data-dcnode-id="865" instrument_node=""> </span><h2 data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Still Affordable</span></h2><span data-dcnode-id="862" instrument_node=""> </span><p data-dcnode-id="861"></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">If you want the ease of dealing with a tour agency in the U.S. or United Kingdom instead, you'll pay more but have the benefit of your agent's experience in finding reputable and affordable tour operators. U.K.-based tour operators such as Trailfinders and African Trails (trailfinders.com) know East Africa well. For less than $1,000, Trailfinders offers a Masai Mara safari in Kenya for three days, flying in and staying in camps or lodges, with standard morning and afternoon game drives. For $500 to $700, African Trails (africantrails.com) in Lancashire offers tours in East Africa as well as Malawi, Zambia and Botswana.</span></p><p data-dcnode-id="858"></p><span data-dcnode-id="857" instrument_node=""> </span></div><span data-dcnode-id="855" instrument_node=""> </span><div data-dcnode-id="851" id="ad-mobile-bottom"><span data-dcnode-id="854" instrument_node=""> </span><div data-ad-unit-name="usatoday_mobile/mobileweb-banner_bottom/travel/partner_demandmedia" data-dcnode-id="853" id="320x50_BTF"></div><span data-dcnode-id="852" instrument_node=""> </span></div><span data-dcnode-id="850" instrument_node=""> </span><div data-ad-unit-name="sticky-video-player" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node=""> </span></div><span data-dcnode-id="847" instrument_node=""> </span><div class="section" data-dcnode-id="837" id="section-3"><span data-dcnode-id="846" instrument_node=""> </span><h2 data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">South Africa Options</span></h2><span data-dcnode-id="843" instrument_node=""> </span><p data-dcnode-id="842"></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">At just under $750, Drifters African Adventure Travel Specialists (drifters.co.za), based in Johannesburg, offers its five-day Bushveld safari package from Johannesburg to a private reserve featuring walking trails and open vehicle drives and to Kruger National Park. For $1,000, you can go overland for 10 days from Cape Town to Durban and ultimately Jo-burg, visiting beaches and nature reserves and staying in bungalows and inns.</span></p><p data-dcnode-id="839"></p><span data-dcnode-id="838" instrument_node=""> </span></div><span data-dcnode-id="836" instrument_node=""> </span><div class="section" data-dcnode-id="826" id="section-4"><span data-dcnode-id="835" instrument_node=""> </span><h2 data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Botswana Options</span></h2><span data-dcnode-id="832" instrument_node=""> </span><p data-dcnode-id="831"></p><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">To get well off the beaten path and see hippos and birds in lush streams, you can try the Okavango Delta in Botswana. Greenloons (greenloons.com), a Virginia-based company dedicated to ecologically sensitive travel, offers a 10-day trip that starts in Namibia, proceeds to the delta and crosses the Zambezi River into Zambia. All told, Greenloons offers 31 small-group nature tours in Africa at under $1,000, including eight days in Tanzania at Serengeti National Park and the Ngorongoro Crater.</span></p><p data-dcnode-id="828"></p><span data-dcnode-id="827" instrument_node=""> </span></div><span data-dcnode-id="825" instrument_node=""> </span><div class="section" data-dcnode-id="815" id="section-5"><span data-dcnode-id="824" instrument_node=""> </span><h2 data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Uganda Options</span></h2><span data-dcnode-id="821" instrument_node=""> </span><p data-dcnode-id="820"></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Fast emerging as the budget headquarters for visitors to East Africa, Uganda's travel agencies focus on authentic cultural experiences and market themselves through a consortium called Pearls of Uganda (pearlsofuganda.org), after Winston Churchill's description of Uganda as the "pearl of Africa." Adrift Adventures (adrift.ug) in Kampala can set you up with two days of rafting on the Nile for just $250, with accommodation choices including chalets, dorms and camping. Red Chilli Hideaway (redchillihideaway.com), also in Kampala, offers three-day and four-day tours ranging from $285 to $370 per person. You can visit Murchison Falls, the Ziwa Rhino and Wildlife Reserve for rhino tracking and trek in the foothills of the Ruwenzoris.</span></p><p data-dcnode-id="817"></p><span data-dcnode-id="816" instrument_node=""> </span></div><span data-dcnode-id="814" instrument_node=""> </span><div class="adsense-main-ad" data-ad-unit-name="adsense-main" data-dcnode-id="813"></div><span data-dcnode-id="812" instrument_node=""> </span><div class="dropdowns-wrapper" data-dcnode-id="736"><span data-dcnode-id="811" instrument_node=""> </span><div class="dropdowns-container" data-dcnode-id="738"><span data-dcnode-id="810" instrument_node=""> </span><div class="headings-line" data-dcnode-id="743"><span data-dcnode-id="809" instrument_node=""> </span><p class="heading" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">References</span></p><span data-dcnode-id="806" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="777"><span data-dcnode-id="805" instrument_node=""> </span><ul data-dcnode-id="779"><li data-dcnode-id="800"><span data-dcnode-id="804" instrument_node=""> </span><a aria-label="https://www.abercrombiekent.com/travel-destinations/africa-safari/east-africa/kenya/kenya-safaris" data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abercrombiekent.com/travel-destinations/africa-safari/east-africa/kenya/kenya-safaris" rel="nofollow"><span data-dcnode-id="803" instrument_node=""> Abercrombie &amp; Kent: Kenya </span></a><span data-dcnode-id="801" instrument_node=""> </span></li><li data-dcnode-id="795"><span data-dcnode-id="799" instrument_node=""> </span><a aria-label="https://www.africantrails.co.uk/tours/search?price-range=0" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.africantrails.co.uk/tours/search%3Fprice-range%3D0" rel="nofollow"><span data-dcnode-id="798" instrument_node=""> African Trails: Tours </span></a
