</span><h4 data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">1. New York City</span></h4><span data-dcnode-id="3099" instrument_node="">
</span><div data-dcnode-id="3092"><span data-dcnode-id="3098" instrument_node="">There is no doubt that </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-days-in-nyc/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3095" style="text-decoration: underline;"><strong data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">New York City</span></strong></span></a><span data-dcnode-id="3093" instrument_node=""> is a real bucket list destination in the United States. This city has so much to offer to any kind of visitor, and whether you are a solo traveler, a couple looking for a romantic break, a group of friends, or even a family traveling with children, you are bound to have a good time.</span></div><span data-dcnode-id="3091" instrument_node="">
</span><div data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3088" instrument_node="">
</span><div data-dcnode-id="3081"><span data-dcnode-id="3087" instrument_node="">It takes a while to fully visit the city. The recommendation is to spend at least </span><a data-dcnode-id="3083" data-saferedirecturl="https://www.google.com/url?q=https://myadventuresacrosstheworld.com/4-days-in-new-york-itinerary/&amp;source=gmail&amp;ust=1590080811185000&amp;usg=AFQjCNHabzCoZvXsPzZuboq9oMXRc8E4SA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myadventuresacrosstheworld.com/4-days-in-new-york-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3084" style="text-decoration: underline;"><strong data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">several days in New York</span></strong></span></a><span data-dcnode-id="3082" instrument_node="">.&nbsp;</span></div><span data-dcnode-id="3080" instrument_node="">
</span><div data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3077" instrument_node="">
</span><div data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">During that amount of time, make sure not to skip a visit to the Financial District, from where you can hop on the ferry to the Statue of&nbsp;Liberty. This is one of the most iconic places in&nbsp;the country. A guided tour can be expensive,&nbsp;so if you are only interested in the sights, make sure to get on the Staten Island Ferry, which is free. Take your camera with you!&nbsp;</span></div><span data-dcnode-id="3074" instrument_node="">
</span><div data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3071" instrument_node="">
</span><div data-dcnode-id="3064"><span data-dcnode-id="3070" instrument_node="">Once you get off the ferry, make sure to head to the </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/new-york-city-l59/new-york-one-world-observatory-entrance-ticket-t52132/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="3067" style="text-decoration: underline;"><strong data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">World Trade Center</span></strong></span></a><span data-dcnode-id="3065" instrument_node=""> and the nearby Oculus. The first one will give you incredible views of the city from its observation deck, and the second is a new, fun place to visit – a mall and transportation hub with a funky architecture. Not far, you will find Chinatown and Little Italy, two must-see neighborhoods.&nbsp;</span></div><span data-dcnode-id="3063" instrument_node="">
</span><div data-dcnode-id="3054"><noscript data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-10809" src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg" alt="Brooklyn, NYC US Bucket List" width="750" height="564" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List--300x226.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg"&gt;</span></noscript><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-10809" data-dcnode-id="3055"><img alt="Brooklyn, NYC US Bucket List" class="lazyload" data-dcnode-id="3060" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List--300x226.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="564" id="mv-trellis-img-12" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg.webp&amp;raw" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List-.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Brooklyn-NYC-US-Bucket-List </span><div data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3050" instrument_node="">
</span><div data-dcnode-id="3043"><span data-dcnode-id="3049" instrument_node="">Fans of Sex and the City should go on a </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/new-york-city-l59/sex-and-the-city-hotspots-tour-t464/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="3046" style="text-decoration: underline;"><strong data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">tour of Greenwich Village</span></strong></span></a><span data-dcnode-id="3044" instrument_node=""> to discover all the filming locations.&nbsp;</span></div><span data-dcnode-id="3042" instrument_node="">
</span><div data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3039" instrument_node="">
</span><div data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">If you fancy museums, you have plenty to pick from. The Metropolitan, MOMA, and Guggenheim are all interesting for different reasons, but if you have time just for one, you should probably opt for the Metropolitan.&nbsp;</span></div><span data-dcnode-id="3036" instrument_node="">
</span><div data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3033" instrument_node="">
</span><div data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">For stunning views of Manhattan, cross the Brooklyn Bridge and head to Brooklyn Heights Promenade. It’s a lovely neighborhood!&nbsp;</span></div><span data-dcnode-id="3030" instrument_node="">
</span><div data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3027" instrument_node="">
</span><div data-dcnode-id="3021"><em data-dcnode-id="3022"><span data-dcnode-id="3026" instrument_node="">Submitted by Claudia from </span><strong data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">My Adventures Across the World</span></strong><span data-dcnode-id="3023" instrument_node="">.&nbsp;</span></em></div><span data-dcnode-id="3020" instrument_node="">
</span><div data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3017" instrument_node="">
</span><div data-dcnode-id="3009"><span data-dcnode-id="3016" instrument_node="">Planning to see a lot of NYC in a short amount of time? Get the </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/new-york-city-l59/new-york-city-explorer-passtm-t5721/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="3012" style="text-decoration: underline;"><strong data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">New York City Explorer Pass</span></strong><span data-dcnode-id="3013" instrument_node=""> </span></span></a><span data-dcnode-id="3010" instrument_node="">that includes discounts and options for free entrance to many museums and attractions!&nbsp;</span></div><span data-dcnode-id="3008" instrument_node="">

</span><h4 data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">2. Austin, Texas</span></h4><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2984" dir="ltr"><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-day-austin-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2992" style="text-decoration: underline;"><strong data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Austin, TX</span></strong></span></a><span data-dcnode-id="2990" instrument_node=""> is one of the only places in the world where you can get traditional (&amp; delicious) breakfast tacos, paddleboard next to the city’s skyline, participate in a game of chicken shit bingo, and go two-stepping at a western dance hall – all in one day. This little capital of Texas is popular with the </span><span data-dcnode-id="2986" style="text-decoration: underline;"><strong data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">residents</span></strong><span data-dcnode-id="2987" instrument_node=""> </span></span><span data-dcnode-id="2985" instrument_node="">– and visitors – for a BIG reason.&nbsp;</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981" dir="ltr"><span data-dcnode-id="2982" instrument_node="">In the hot summer months, you can cool down at Barton Springs, Lake Travis, Hamilton Pool, or any of the other fantastic watering holes around town. During cooler weather (or hot weather if you can handle it) there is plenty of outdoor recreation inside and outside the city. Zilker Park and the Greenbelt are short drives from downtown Austin, while Mt. Bonnell, Hippie Hollow, and McKinney Falls State Park are less than 30 minutes away.&nbsp;</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2978" dir="ltr"><span data-dcnode-id="2979" instrument_node="">When you need a food break, there are honestly too many options to count. From Gordo’s epic doughnuts to Franklin’s Barbecue and all the authentic Tex-Mex in between, Austin is THE foodie hub of Texas. It probably doesn’t need mentioning that Austin’s live music scene is one of the best in the country. Think ACL, SXSW, and all the great venues on and around 6th St – which is a destination in and of itself.&nbsp;</span></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2975" dir="ltr"><span data-dcnode-id="2976" instrument_node="">Austin shouldn’t be left off anyone’s USA bucket list, because there is something for everyone in this uniquely hipster – with a flair of western – city. Hopefully, y’all are now “ready and rarin’ to go” to Austin, Texas.&nbsp; &nbsp;</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p data-dcnode-id="2968" dir="ltr"><em data-dcnode-id="2969"><span data-dcnode-id="2973" instrument_node="">Submitted by Ashley and Nick from</span><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node=""> Impact Winder</span></strong><span data-dcnode-id="2970" instrument_node="">.</span></em></p><span data-dcnode-id="2967" instrument_node="">

</span><h4 data-dcnode-id="2955" dir="ltr"><span data-dcnode-id="2956" instrument_node="">3. Asheville, North Carolina</span></h4><span data-dcnode-id="2954" instrument_node="">
</span><div data-dcnode-id="2947"><span data-dcnode-id="2953" instrument_node="">When it comes to bucket-list destinations in the USA, Asheville, NC is high on the list. In order to really get a taste of the city, it’s best to spend at least&nbsp;</span><a data-dcnode-id="2949" data-saferedirecturl="https://www.google.com/url?q=https://www.gratefulgypsies.com/3-days-in-asheville/&amp;source=gmail&amp;ust=1590080809192000&amp;usg=AFQjCNF7qjGvVLi7JWA1aPF9idT0hGNaYw" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-day-asheville-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2950" style="text-decoration: underline;"><strong data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">3 days in Ashville</span></strong></span></a><span data-dcnode-id="2948" instrument_node="">. Nestled in the Blue Ridge Mountains, Asheville is a small town that packs a big punch!</span></div><span data-dcnode-id="2946" instrument_node="">
</span><div data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2943" instrument_node="">
</span><div data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">You can find things to do at any time of year here whether you prefer outdoor adventure, soaking up the culture, or sightseeing. Start your visit to the Biltmore Estate, the largest home in the USA that was built by George Vanderbilt. From there, head to the River Arts District to admire all the art on display in the galleries as well as the street murals. You’ll never go wrong simply wandering around downtown Asheville checking out the eclectic shops and stopping into some of the many craft breweries.</span></div><span data-dcnode-id="2940" instrument_node="">
</span><div data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2937" instrument_node="">
</span><div data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">If you enjoy sunsets and tasty cocktails then you’ll love Sky Bar. Get outside by taking a hike or a cruise along the Blue Ridge Parkway, or rent a tube and float down the French Broad River. If you enjoy taking in live music (like I do) there are plenty of options to do so every night of the week. Whether you’re planning a family vacation, romantic getaway, or a solo/friends trip, you can’t go wrong in Asheville!</span></div><span data-dcnode-id="2934" instrument_node="">
</span><div data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2931" instrument_node="">

ode="">
</span><h4 data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">4. Portland, Oregon</span></h4><span data-dcnode-id="2909" instrument_node="">
</span><div data-dcnode-id="2394"><span data-dcnode-id="2908" instrument_node="">
</span><p class="p1" data-dcnode-id="2905"><span class="s1" data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">One city that should be on your USA bucket list is Portland, Oregon. Located in the Pacific Northwest, this city has become widely known as a hip and trendy city within the US. Sitting at the junction of the Columbia and Willamette Rivers, it is a city that has it all; rivers, forests, shopping districts, mountains and so many great things to do.</span></span></p><span data-dcnode-id="2904" instrument_node="">
</span><p class="p1" data-dcnode-id="2890"><span class="s1" data-dcnode-id="2891"><span data-dcnode-id="2903" instrument_node="">Whether you are visiting </span><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//passportsandadventures.com/things-to-do-in-portland-with-kids/" rel="noopener noreferrer" target="_blank"><span class="s2" data-dcnode-id="2899"><span data-dcnode-id="2900" style="text-decoration: underline;"><strong data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Portland with kids</span></strong></span></span></a><span data-dcnode-id="2897" instrument_node=""> or not, there is something for everyone. Some of the best things to do in the city include cycling along the riverbanks, visiting museums such as the Oregon Museum of Science and Industry (which has great child-friendly areas), wandering through the Japanese Gardens and Rose Test Gardens in Washington Park or simply finding a place to admire the views of Mount Hood in the distance. You can drive to Multnomah Falls (or </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/portland-oregon-l1024/mt-hood-loop-tour-from-portland-t30227/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2894" style="text-decoration: underline;"><strong data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">take a fun day trip</span></strong></span></a><span data-dcnode-id="2892" instrument_node="">!) of the Columbia River Gorge- it’s a must!</span></span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2880"><noscript data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-5815" src="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg" alt="Multnomah Falls, United States, Portland, Oregon" width="750" height="1125" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon-200x300.jpg 200w, https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon-683x1024.jpg 683w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-5815" data-dcnode-id="2881"><img alt="Multnomah Falls, United States, Portland, Oregon" class="lazyload" data-dcnode-id="2886" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon-200x300.jpg.webp 200w, https://worldwidehoneymoon.com/wp-content/uploads/2019/08/Multnomah-Falls-United-States-Portland-Oregon-683x1024.jpg.webp 683w" data-trellis-processed="1" data-webp="true" height="1125" id="mv-trellis-img-16" loadin </span><p class="p1" data-dcnode-id="2876"><span class="s1" data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Pop into Downtown Portland for some retail therapy including visiting Powell’s City of Books before grabbing some Voodoo Donuts. Or you could head over to the very trendy Alphabet District to peruse the small, boutique shops there before finding somewhere cool for a coffee or stopping by Salt’N’Straw for some amazing ice cream. Try the salted caramel. It’s divine.</span></span></p><span data-dcnode-id="2875" instrument_node="">
</span><p class="p1" data-dcnode-id="2863"><span class="s1" data-dcnode-id="2864"><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-day-portland-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2872" style="text-decoration: underline;"><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Portland is a really cool city</span></strong></span></a><span data-dcnode-id="2870" instrument_node=""> and has something for everyone whether you love shopping, the outdoors, or are visiting as a family. Whether you visit </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/best-fall-vacations-in-the-us/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2867" style="text-decoration: underline;"><strong data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Portland in the fall</span></strong></span></a><span data-dcnode-id="2865" instrument_node="">, spring, summer, or winter, it is a city that will delight all your senses!</span></span></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2856"><em data-dcnode-id="2857"><span data-dcnode-id="2861" instrument_node="">Submitted by Cath from </span><strong data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Passports and Adventures</span></strong><span data-dcnode-id="2858" instrument_node="">.</span></em></p><span data-dcnode-id="2855" instrument_node="">

</span><h4 data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">5. Portland, Maine</span></h4><span data-dcnode-id="2842" instrument_node="">
</span><p class="p1" data-dcnode-id="2839"><span class="s1" data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Portland, Maine – a seafood lover’s heaven with a vibrant food scene, old-town charm, dynamic nightlife, and the city’s rich history make for one worthy USA bucket list destination!&nbsp;</span></span></p><span data-dcnode-id="2838" instrument_node="">
</span><p class="p1" data-dcnode-id="2831"><span class="s1" data-dcnode-id="2832"><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-days-in-portland-maine-ultimate-portland-maine-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2835" style="text-decoration: underline;"><strong data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Portland is a fantastic place to visit</span></strong></span></a><span data-dcnode-id="2833" instrument_node="">, but don’t just take my word for it. The city was named the 2018 Restaurant City of the year, according to Bon Appetit Magazine. The food scene is not only exceptional, but many restaurants support local farmers and source most of the ingredients locally. And if that wasn’t enough, Portland boasts many great breweries. If you enjoy a cold one, make sure to visit a few – or many – of the local breweries!&nbsp;</span></span></p><span data-dcnode-id="2830" instrument_node="">
</span><p class="p1" data-dcnode-id="2821"><span class="s1" data-dcnode-id="2822"><span data-dcnode-id="2829" instrument_node="">Check out my </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inbetweenpictures.com/blog/where-to-eat-in-portland-maine" rel="noopener noreferrer" target="_blank"><span class="s2" data-dcnode-id="2825"><span data-dcnode-id="2826" style="text-decoration: underline;"><strong data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">foodie’s guide to Portland, Maine</span></strong></span></span></a><span data-dcnode-id="2823" instrument_node="">&nbsp;for mouthwatering recommendations.&nbsp;</span></span></p><span data-dcnode-id="2820" instrument_node="">

</span><p class="p1" data-dcnode-id="2802"><span class="s1" data-dcnode-id="2803"><span data-dcnode-id="2809" instrument_node="">If modern cities are not your thing, don’t worry, Portland still manages to retain its old-town charm. Take a stroll in the old town and the old port where you will find galleries, independent boutiques, and other small businesses – the true heart of Portland. Not to mention, the </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/portland-maine-l108672/portland-maine-city-lighthouse-tour-t252112/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2806" style="text-decoration: underline;"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">scenic lighthouses on the coast</span></strong></span></a><span data-dcnode-id="2804" instrument_node=""> right outside the city.&nbsp;</span></span></p><span data-dcnode-id="2801" instrument_node="">
</span><p class="p1" data-dcnode-id="2793"><span class="s1" data-dcnode-id="2794"><span data-dcnode-id="2800" instrument_node="">If Portland, Maine wasn’t under your radar before, it should be on your US bucket list now! Plus, it is a great spot to start before exploring the incredible </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploremorecleanless.com/tips-to-have-the-best-trip-to-acadia-national-park-with-kids/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2797" style="text-decoration: underline;"><strong data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Acadia National Park</span></strong></span></a><span data-dcnode-id="2795" instrument_node="">!</span></span></p><span data-dcnode-id="2792" instrument_node="">

</span><h4 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">6. Sedona, Arizona</span></h4><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2770" style="font-weight: 400;"><span data-dcnode-id="2771" instrument_node="">One of the most underrated destinations in the USA is Sedona, Arizona, a region with red rock mesas that contrast against vibrant pine trees. Explore the tens of trails that weave over rust arches to the top of a rock that resembles a cathedral. There’s no shortage of natural features to discover.</span></p><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767" style="font-weight: 400;"><span data-dcnode-id="2768" instrument_node="">When it’s time to rest your legs, the in-town diners are generous when it comes to portion sizes. The Coffee Pot Restaurant, for example, has over 100 choices of omelets! Come dinner time, there are an array of spicy Mexican restaurants to satiate growling stomachs. To escape the midday heat, wander around the Tlaquepaque Arts and Shopping Village, where local artisans sell their work and mystics hawk crystals and offer palm readings.</span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2759" style="font-weight: 400;"><span data-dcnode-id="2765" instrument_node="">Have a penchant for supernatural (or just want to dabble in it)? Sedona, Arizona is supposedly one of the most spiritual places in the world thanks to its </span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chantae.com/sedona-vortexes-explained/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2762" style="text-decoration: underline;"><strong data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">energy vortexes</span></strong></span></a><span data-dcnode-id="2760" instrument_node="">. Believers in the paranormal claim that when you visit one of the major vortex sites in Sedona, you’ll feel a burst of energy and increased clarity. These vortexes are conveniently found at the most spectacular vistas in the region. Even if you don’t believe, you’ll feel a sense of serenity from the natural beauty alone.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2752"><em data-dcnode-id="2753"><span data-dcnode-id="2757" instrument_node="">Submitted by Chantae from </span><strong data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Chantae Reden</span></strong><span data-dcnode-id="2754" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2751" instrument_node="">

</span><h4 data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">7. Cupertino, California</span></h4><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">When I think of the United States of America, I think of San Francisco, California. South of San Francisco, more into the Bay Area, is the technology hub of the USA: the Silicon Valley.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">The city of Cupertino is a 45-minute drive from San Francisco and is a unique USA bucket list destination. Situated in the backdrop of the Santa Cruz Mountains, Cupertino is known for being the headquarters of the technology giant Apple, Inc.&nbsp;</span></p><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">This is a rare city in the USA, as it does not have a proper downtown. The two main streets in Cupertino are De Anza Boulevard and Stevens Creek Boulevard. Their intersection marks the business district of this city.&nbsp;</span></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">However, the Apple, Inc. headquarters – “Infinite Loop” and their latest headquarters “Spaceship” are beautiful modern pieces of architecture. Cupertino also has a few attractions like the Museum of Art and the Cupertino Historical Society and Museum for the history buff.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">If you are into wines, you could visit the Pichetti Winery Ranch.&nbsp; What we loved best was going for long hikes in Rancho San Antonio for its extremely picturesque landscape. With fresh air, the relaxed vibes, the solitude, and great food, Cupertino is the perfect destination for offbeat slow travel.</span></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2715"><em data-dcnode-id="2716"><span data-dcnode-id="2722" instrument_node="">Submitted by Sundeep from </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delhi-fun-dos.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2719" style="text-decoration: underline;"><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Delhi Fun Dos</span></strong></span></a><span data-dcnode-id="2717" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2714" instrument_node="">

</span><h4 data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">8. Las Vegas, Nevada</span></h4><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2700" instrument_node="">The U.S. is brimming with bucket list-worthy destinations and Las Vegas is one of them. </span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/las-vegas-honeymoon-guide/"><span data-dcnode-id="2697" style="text-decoration: underline;"><strong data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Vegas is an amazing place to visit</span></strong></span></a><span data-dcnode-id="2695" instrument_node=""> for several reasons. First of all, there’s something to do here for everyone. Vegas isn’t just about casinos, it also has world-renowned food; I always leave Vegas a few pounds heavier.</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">In addition, Vegas is close to other vacation destinations such as Zion National Park and the Grand Canyon. Moreover, Vegas is just an all-around fun and vibrant city with a lot to offer. When visiting, you should obviously check out the Las Vegas Strip, walkthrough world-class hotels, and admire the architecture.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2681"><noscript data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-10771" src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg" alt="Las Vegas, Nevada- USA Bucket List Travel" width="750" height="422" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel-300x169.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-10771" data-dcnode-id="2682"><img alt="Las Vegas, Nevada- USA Bucket List Travel" class="lazyload" data-dcnode-id="2687" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel-300x169.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="422" id="mv-trellis-img-22" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/wp-content/uploads/2020/06/Las-Vegas-Nevada-USA-Bucket-List-Travel.jpg.webp&amp;raw" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/La >
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">If you want to escape the busy city for a day, head over to the Hoover Dam. Don’t forget to catch a show or two. Vegas is known for its entertainment. The best way to end your night in Vegas is to watch the fountain show at the Bellagio. Lastly, a visit to Fremont Street is a must. All in all, Vegas is an incredibly fun city with so many things to do.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2669"><em data-dcnode-id="2670"><span data-dcnode-id="2676" instrument_node="">Submitted by Disha from </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dishadiscovers.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2673" style="text-decoration: underline;"><strong data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Disha Discovers</span></strong></span></a><span data-dcnode-id="2671" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2668" instrument_node="">
</span><h4 data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">9. Mobile, Alabama</span></h4><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Too often overlooked in favor of New Orleans, its larger and more famous neighbor, Mobile definitely deserves a place on your USA bucket list. It has many of the same charms as New Orleans, but without all the drunken debauchery, so for families, couples, and low-key travelers, it might even be a better option. While Mobile has been part of Alabama for some time now, originally it was the capital of the French Louisiana Territory.</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">That’s why you’ll recognize a lot of French influences here, especially in the city’s architecture and in its cultural traditions. The most obvious example is Mardi Gras, which locals will proudly tell you has been celebrated here longer than anywhere else in the United States! The parades and other festivities here are family-friendly, though, and local kids love catching moon pies and beads thrown from the floats.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Another local celebration worth timing your visit around is the Azalea Trail Festival, which takes place in the second half of March each year. This is when the pink and white azalea buds bloom on bushes all over the city, and a number of special public openings and tours are held at historic buildings and monuments.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2655" instrument_node="">But even if you can’t make it here for either of these celebrations, Mobile makes a great destination at any time of year. The weather is mild year-round, so you can always enjoy the streets lined with old oak trees, the nearby white-sand beaches, and </span><a data-dcnode-id="2651" data-saferedirecturl="https://www.google.com/url?q=https://www.thenomadicvegan.com/a-vegan-homecoming-mobile-alabama-2/&amp;source=gmail&amp;ust=1590080805949000&amp;usg=AFQjCNEvEWtbyR7anwmzh1RLim32PxmLjg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenomadicvegan.com/a-vegan-homecoming-mobile-alabama-2/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2652" style="text-decoration: underline;"><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Mobile’s great local restaurants</span></strong></span></a><span data-dcnode-id="2650" instrument_node="">.</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2642"><em data-dcnode-id="2643"><span data-dcnode-id="2647" instrument_node="">Submitted by Wendy from </span><strong data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">The Nomadic Vegan</span></strong><span data-dcnode-id="2644" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2641" instrument_node="">
</span><h4 data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">10. Savannah, Georgia</span></h4><span data-dcnode-id="2638" instrument_node="">
</span><p class="p1" data-dcnode-id="2630"><span class="s1" data-dcnode-id="2631"><span data-dcnode-id="2637" instrument_node="">Between its moss-draped oak trees, trickling fountains in garden-filled squares, and historic houses covered in vines, </span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/weekend-in-savannah-ga/" rel="noopener" target="_blank"><span data-dcnode-id="2634" style="text-decoration: underline;"><strong data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Savannah, Georgia</span></strong></span></a><span data-dcnode-id="2632" instrument_node="">, has definitely earned its title as one of the most beautiful cities in America. </span></span></p><span data-dcnode-id="2629" instrument_node="">
</span><p class="p1" data-dcnode-id="2626"><span class="s1" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Besides its captivating aesthetics, the culinary scene is to die for, so bring your appetite! Mrs. Wilkes Dining Room is a must for lunch, and be sure to grab dinner at Vic’s on the River or at The Grey, a culinary award-winning restaurant. After a scrumptious meal, keep the party going with a drink to go. Open containers, which locals lovingly dubbed “travelers,” are permitted in the Historic District! But it’s also worthwhile to explore the Historic District drink-free, especially River Street where you can enjoy many funky shops and businesses.</span></span></p><span data-dcnode-id="2625" instrument_node="">
</span><p class="p1" data-dcnode-id="2617"><span class="s1" data-dcnode-id="2618"><span data-dcnode-id="2624" instrument_node="">Looking to cool down on the water? Opt for a riverboat cruise on the Savannah River or take a day trip to </span><a data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/tybee-island-romantic-getaway/" rel="noopener" target="_blank"><span data-dcnode-id="2621" style="text-decoration: underline;"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Tybee Island</span></strong></span></a><span data-dcnode-id="2619" instrument_node=""> and laze away on the beach. Those who are more active can rent kayaks to visit Little Tybee, an uninhabited barrier island that’s only accessible by water. If you go to Tybee Island, make sure you end the day with a meal at Coco’s Sunset Grille.</span></span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2610"><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/romantic-things-to-do-in-savannah-ga/" rel="noopener" target="_blank"><span data-dcnode-id="2613" style="text-decoration: underline;"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Check out romantic things to do in Savannah here</span></strong></span></a><span data-dcnode-id="2611" instrument_node="">!</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2601"><em data-dcnode-id="2602"><span data-dcnode-id="2608" instrument_node="">Submitted by Brittany from </span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boutexploring.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2605" style="text-decoration: underline;"><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">B Out Exploring</span></strong></span></a><span data-dcnode-id="2603" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2591"><noscript data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-10773" src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg" alt="Love Statue, Philadelphia USA" width="750" height="499" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA-300x200.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-10773" data-dcnode-id="2592"><img alt="Love Statue, Philadelphia USA" class="lazyload" data-dcnode-id="2597" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA-300x200.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="499" id="mv-trellis-img-23" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg.webp&amp;raw" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Love-Statue-Philadelphia-USA-300x200.jpg.webp 300w" style="" width="750"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-right dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fworldwidehoneymoon.com%252Fwp-content%252Fuploads%252F2020%252F06%252FLove-Statue-Philadelphia-USA.jpg%26url%3Dhttps%253A%252F%252Fworldwidehoneymoon.com%252Fusa-bucket-list-travel-destinations%252F%26is_video%3Dfalse%26description%3DThe%2520Ultimate%252040%2520USA%2520Bucket%2520List%2520Travel%2520Destinations" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="2594"><svg data-dcnode-id="2595" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2596"></path></svg></span></a></div><p></p><span data-dcnode-id="2590" instrument_node="">
</span><h4 data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">11. Philadelphia, Pennsylvania&nbsp;</span></h4><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585" dir="ltr"><span data-dcnode-id="2586" instrument_node="">Philadelphia is often overlooked for New York City as a must-visit destination, but it shouldn’t be! You can walk through the footsteps of the American Revolution or run up the steps of the Museum of Art like Rocky. People often assume that you can see most of the city in a day, but to really dive into what Philly has to offer, I suggest spending 2 days or more.&nbsp;</span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2582" dir="ltr"><span data-dcnode-id="2583" instrument_node="">It’s hard not to be in awe at the amount of history in the city. From the Liberty Bell (built-in 1751) in Independence Hall to Reading Terminal Market (opened in 1893) spend a day walking through the birthplace of America. You can even walk down Elfreth’s Alley – the oldest residential street in the U.S. with houses dating back to 1728.&nbsp;</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2574" dir="ltr"><span data-dcnode-id="2580" instrument_node="">On the second day, visit one of the most unique attractions in Philadelphia, the </span><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/eastern-state-penitentiary-l4897/philadelphia-eastern-state-penitentiary-admission-t110998/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2577" style="text-decoration: underline;"><strong data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Eastern State Penitentiary</span></strong></span></a><span data-dcnode-id="2575" instrument_node="">. Operating from 1829 to 1971, the prison housed famous criminals such as Willie Sutton and Al Capone. Of course, no trip to Philly would be complete without a stop at the Philadelphia Museum of Art and a picture with the Rocky statue before running up the steps!&nbsp;</span></p><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2561" dir="ltr"><span data-dcnode-id="2572" instrument_node="">Other iconic </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directionallychallengedtraveler.com/visit-philadelphia-museums/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2569" style="text-decoration: underline;"><strong data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">things to do in the city</span></strong></span></a><span data-dcnode-id="2567" instrument_node=""> include taking a picture at the Love statue, exploring the Franklin Institute, and deciding who has the better cheesesteaks – Pat’s or Ginos! Or better yet,</span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/philadelphia-l60/philly-cheesesteak-tour-and-tastings-by-segway-t63249/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2564" style="text-decoration: underline;"><strong data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node=""> take a cheesesteak tour</span></strong></span></a><span data-dcnode-id="2562" instrument_node="">!&nbsp;</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2554" dir="ltr"><em data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">Submitted by Pamela from </span><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">The Directionally Challenged Traveler</span></strong><span data-dcnode-id="2556" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2553" instrument_node="">

2548" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2549"></path></svg></span></a></div><p></p><span data-dcnode-id="2543" instrument_node="">
</span><h4 data-dcnode-id="2541" dir="ltr"><span data-dcnode-id="2542" instrument_node="">12. Chicago, Illinois&nbsp;</span></h4><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2533" dir="ltr"><span data-dcnode-id="2539" instrument_node="">Chicago is well known as the Windy City, but the city has so much to offer beyond its most popular term. While true that the city experiences quite a bit of wind due to its location on Lake Michigan, the beauty of the city lies in its dozens of attractions and things to do. Spending </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/ultimate-guide-to-chicago-3-day-chicago-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2536" style="text-decoration: underline;"><strong data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">3 days in Chicago</span></strong></span></a><span data-dcnode-id="2534" instrument_node=""> is perfect to see many of the sights!&nbsp;</span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2525" dir="ltr"><span data-dcnode-id="2531" instrument_node="">Chicago has one of the tallest towers in the world, Willis Tower, formerly known as the Sears Tower.&nbsp;The tower has a </span><a data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/chicago-l225/skydeck-chicago-willis-tower-t205009/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2528" style="text-decoration: underline;"><strong data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">glass Skydeck</span></strong></span></a><span data-dcnode-id="2526" instrument_node=""> where visitors can move a few feet beyond the building and look down at the city below. Not far from the Willis Tower are the popular State Street and Michigan Avenue shopping locations.&nbsp; The Magnificent Mile on Michigan Avenue has dozens of shops and restaurants dotted along the street, including ones that serve Chicago’s famous deep-dish pizza.</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2517" dir="ltr"><span data-dcnode-id="2523" instrument_node="">If visiting in the summer be sure to go during the Taste of Chicago, a food festival that runs for a few days in July.&nbsp; Then take a </span><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/chicago-l225/architecture-river-tour-t46389/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2520" style="text-decoration: underline;"><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">boat cruise on the Chicago River</span></strong></span></a><span data-dcnode-id="2518" instrument_node=""> or even one out on Lake Michigan.&nbsp; Visit the free Lincoln Park Zoo or one of Chicago’s famous museums such as the Art Institute, Field Museum, or Museum of Science and Industry.&nbsp;</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514" dir="ltr"><span data-dcnode-id="2515" instrument_node="">Shedd Aquarium and Adler Planetarium are great family-friendly places and located right on the lake, so it’s easy to take a lakefront stroll right after.&nbsp; Or take in a baseball game with the Cubs or White Sox, some of the best-known teams in the US.</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2506" dir="ltr"><em data-dcnode-id="2507"><span data-dcnode-id="2512" instrument_node="">Submitted by Diana from </span><span data-dcnode-id="2509" style="text-decoration: underline;"><strong data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Travels in Poland</span></strong></span><span data-dcnode-id="2508" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2496" dir="ltr"><noscript data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-10775" src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg" alt="New Orleans Steamboat" width="750" height="563" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat-300x225.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg"&gt;</span></noscript></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-10775" data-dcnode-id="2497"><img alt="New Orleans Steamboat" class="lazyload" data-dcnode-id="2502" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat-300x225.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="563" id="mv-trellis-img-25" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg.webp&amp;raw" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/New-Orleans-Steamboat-300x225.jpg.webp 300w" style="" width="750"><a aria-label="Save" class="dpsp- </span><h4 data-dcnode-id="2493" dir="ltr"><span data-dcnode-id="2494" instrument_node="">13. New Orleans, Louisiana&nbsp;</span></h4><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2485" style="font-weight: 400;"><span data-dcnode-id="2491" instrument_node="">On a&nbsp;</span><span data-dcnode-id="2487" style="text-decoration: underline;"><strong data-dcnode-id="2488"><a data-dcnode-id="2489" data-saferedirecturl="https://www.google.com/url?q=https://robe-trotting.com/new-orleans-travel-tips-for-the-perfect-weekend-in-nola/&amp;source=gmail&amp;ust=1590080804895000&amp;usg=AFQjCNGr2bTmQRDki19MAG5Tc7rSfiB_tQ" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//robe-trotting.com/new-orleans-travel-tips-for-the-perfect-weekend-in-nola/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2490" instrument_node="">New Orleans trip</span></a></strong></span><span data-dcnode-id="2486" instrument_node="">, you can’t help but walk around with a smile, it’s just got an energy that you don’t feel anywhere else in America. The city has a blend of cultural influences including French, Spanish, and the Caribbean. You notice them all in the architecture, language, music, and food of New Orleans. While many people visit the city to party on Bourbon Street, the city offers so much more than hurricane cocktails on the street (but those are fun).</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2477" style="font-weight: 400;"><span data-dcnode-id="2483" instrument_node="">One thing you should do in the city is taking a </span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/new-orleans-l370/new-orleans-super-city-natchez-daytime-jazz-cruise-t23087/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2480" style="text-decoration: underline;"><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">riverboat ride on the Mississippi</span></strong></span></a><span data-dcnode-id="2478" instrument_node="">. There are many tours to choose from and some have sunset jazz dinners, others have bottomless mimosa brunches and others give you a history of the city.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2469" style="font-weight: 400;"><span data-dcnode-id="2475" instrument_node="">New Orleans is super flat and walkable, so tours on foot and even Segway are also popular. One of the best ways to tour the city is with a </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/new-orleans-l370/new-orleans-ghosts-vampires-witches-voodoo-walking-tour-t207234/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2472" style="text-decoration: underline;"><strong data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">ghost tour</span></strong></span></a><span data-dcnode-id="2470" instrument_node=""> where you can learn all about the legends and folklore of the fascinating city.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466" style="font-weight: 400;"><span data-dcnode-id="2467" instrument_node="">It’s also a great city for nightlife, and that also includes jazz music. Catch live music on Frenchman Street and mingle with locals that escape the crowds on Bourbon Street.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463" style="font-weight: 400;"><span data-dcnode-id="2464" instrument_node="">For foodies visiting New Orleans make sure to try beignets, deep-fried pastries with powdered sugar. They’re often served with chocolate and the most popular place to try them is Café du Monde.</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2456"><em data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node="">Submitted by Derek from </span><strong data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Robe Trotting</span></strong><span data-dcnode-id="2458" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="2455" instrument_node="">

</span><h4 data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">14. Washington, DC</span></h4><span data-dcnode-id="2442" instrument_node="">
</span><div data-dcnode-id="2436"><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/3-days-in-washington-dc-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2439" style="text-decoration: underline;"><strong data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Washington, D.C. is a place everyone</span></strong></span></a><span data-dcnode-id="2437" instrument_node=""> — at least every American — should add as a USA bucket list destination and visit at some point in their lives. And not just on their 8th-grade school trip. D.C. has something for everyone from gorgeous architecture to an incredible food scene, and of course, all of the rich history.</span></div><span data-dcnode-id="2435" instrument_node="">
</span><div data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2432" instrument_node="">
</span><div data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">While Washington, D.C. is fairly expensive to visit as far as hotel accommodations and prices of food go, it more than makes up for it with the multitude of completely free attractions. For starters, the Smithsonian Institution boasts 17 museums, art galleries, and a zoo, all of which are free to enter.</span></div><span data-dcnode-id="2429" instrument_node="">
</span><div data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2426" instrument_node="">
</span><div data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Note that each of the Smithsonian museums and galleries can get quite crowded from spring through early autumn, particularly its newest addition of the National Museum of African American History and Culture, for which passes often sell out.</span></div><span data-dcnode-id="2423" instrument_node="">
</span><div data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2420" instrument_node="">
</span><div data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">There are also other free attractions along the National Mall (which in and of itself is a must-visit and is reminiscent of the Champ de Mars in Paris) including the U.S. Capitol Building Visitor Center, the National Archives, the U.S. Botanical Garden, the Folger Shakespeare Library, and more.</span></div><span data-dcnode-id="2417" instrument_node="">
</span><div data-dcnode-id="2408"><noscript data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-10788" src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg" alt="Washington DC White House" width="750" height="422" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House-300x169.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg"&gt;</span></noscript><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-10788" data-dcnode-id="2409"><img alt="Washington DC White House" class="lazyload" data-dcnode-id="2414" data-pin-description="The Ultimate 40 USA Bucket List Travel Destinations" data-pin-media="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg" data-pin-title="The Ultimate 40 USA Bucket List Travel Destinations" data-src="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg.webp" data-srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House-300x169.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="422" id="mv-trellis-img-27" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg.webp&amp;raw" srcset="https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House.jpg.webp 750w, https://worldwidehoneymoon.com/wp-content/uploads/2020/06/Washington-DC-White-House-300x169.jpg.webp 300w" style="" width="750"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-right dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fworldwidehoneymoon.com%252Fwp-content%252Fuploads%252F2020%252F06%252FWashington-DC-White-House.jpg%26url%3Dhttps%253A%252F%252Fworldwidehoneymoon.com%252Fusa-bucket-list-travel-destinations%252F%26is_video%3Dfalse%26description%3DThe%2520Ultimate%252040%2520USA%2520Bucket%2520List%2520Travel%2520Destinations" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="2411"><svg data-dcnode-id="2412" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2413"></path></svg></span></a></div></div><span data-dcnode-id="2407" instrument_node="">
</span><div data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2404" instrument_node="">
</span><div data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">D.C. is incredibly walkable and has a fantastic public transportation system, so when visiting, try and explore some of the other gorgeous neighborhoods: Georgetown is quiet and lined with million-dollar row houses; Columbia Heights is trendy and vibrant; Dupont Circle is lined with embassies and delightful restaurants.&nbsp;</span></div><span data-dcnode-id="2401" instrument_node="">
</span><div data-dcnode-id="2396"><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Come to Washington, D.C. with an appetite, too, because it is foodie heaven. D.C. is extraordinarily diverse, which the food scene reflects. From Ethiopian to northern Thai to Brazilian, and everything in between, you can find literally every type of food here. And after your incredible meals, feel free to head over to the U Street corridor for some of the country’s best nightlife.&nbsp;</span></p><span data-dcnode-id="2397" instrument_node="">
</span></div><span data-dcnode-id="2395" instrument_node="">
</span></div><span data-dcnode-id="2393" instrument_node="">
</span><div data-dcnode-id="2385"><em data-dcnode-id="2386"><span data-dcnode-id="2392" instrument_node="">Submitted by Adriane from </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thiswanderingspirit.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2389" style="text-decoration: underline;"><strong data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">This Wandering Spirit</span></strong></span></a><span data-dcnode-id="2387" instrument_node="">.&nbsp;</span></em></div><span data-dcnode-id="2384" instrument_node="">

</span><h4 data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">15. San Francisco, California</span></h4><span data-dcnode-id="2371" instrument_node="">
</span><div data-dcnode-id="2332"><span data-dcnode-id="2370" instrument_node="">
</span><div data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">San Francisco is a must-visit USA bucket list destination on the West coast for every kind of traveler. Whether you’re after interesting museums, busy bars, good weather, historic sites, or just good grub, you’ll find it all in San Francisco.&nbsp;</span></div><span data-dcnode-id="2367" instrument_node="">
</span><div data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2364" instrument_node="">
</span><div data-dcnode-id="2357"><span data-dcnode-id="2363" instrument_node="">It’s an absolutely enormous city so there’ll always be more to explore but a few days is enough to get a good taste of all there is on offer. The Golden Gate Bridge is one of the top&nbsp;</span><a data-dcnode-id="2359" data-saferedirecturl="https://www.google.com/url?q=https://whatshotblog.com/50-things-to-do-in-san-francisco/&amp;source=gmail&amp;ust=1590080804016000&amp;usg=AFQjCNEOu--Fm4aRvdNYd4mJ1sCDOWK_tQ" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatshotblog.com/50-things-to-do-in-san-francisco/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2360" style="text-decoration: underline;"><strong data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">things to see in San Francisco</span></strong></span></a><span data-dcnode-id="2358" instrument_node="">&nbsp;and whether you choose to drive, ride or walk, you’ve got to make the crossing. It’ll be the windiest experience of your life but you’ll get amazing views of San Francisco, and the sea.</span></div><span data-dcnode-id="2356" instrument_node="">
</span><div data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2353" instrument_node="">
</span><div data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">It’s not just the wind you’ll have to battle here though as it’s also a famously hilly city. To navigate the city, definitely consider a tram ride which is both fun and practical. It costs around $7 a pop though so it definitely won’t be your main mode of transportation.&nbsp;</span></div><span data-dcnode-id="2350" instrument_node="">
</span><div data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2347" instrument_node="">
</span><div data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">For a fun afternoon out, visit Fisherman’s Wharf. Additionally there’s the Musee Mecanique where you can use up those spare dimes to play old arcade games which are all crammed into one space. &nbsp;Then you should grab a bowl of clam chowder and stroll around the pier to see a huge colony of sea lions sunbathing.&nbsp;</span></div><span data-dcnode-id="2344" instrument_node="">
</span><div data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2341" instrument_node="">
</span><div data-dcnode-id="2334"><span data-dcnode-id="2340" instrument_node="">Lastly, book a </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/san-francisco-l61/san-francisco-waterfront-guided-tour-and-alcatraz-ticket-t357745/%3Fpartner_id%3D5D95HV5%26utm_medium%3Donline_publisher%26utm_source%3Dkat%2540worldwidehoneymoon.com%26placement%3Dcontent-middle%26cmp%3DUSA-Bucketlist" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="2337" style="text-decoration: underline;"><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">trip offshore to Alcatraz prison</span></strong></span></a><span data-dcnode-id="2335" instrument_node="">, just 1km away from San Francisco’s coast. This island used to house America’s worst criminals and you should take the night tour for extra spookiness.</span></div><span data-dcnode-id="2333" instrument_node="">
</span></div><span data-dcnode-id="2331" instrument_node="">

</span><div data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2319" instrument_node="">
