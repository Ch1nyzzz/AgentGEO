el-Bucket-List.jpg 1500w" width="1440"></figure><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Discover over 101 dream destinations that demand a place on every travel bucket list!  As borders begin to reopen in 2022, wanderlust is growing daily and these incredible places are some the best places to explore around the globe. c</span></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">This list features our favorite “dream destinations” to visit now that the world is opening up to travel again.  These include some of nature’s greatest miracles, best beaches, beautiful cities and more.</span></p><span data-dcnode-id="3377" instrument_node="">

</span><p data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">We have put together our favourite 101 dream destinations from all over the world, grouped by continent.  These are all places we’ve actually visited and LOVED!  Honestly, it was even hard to narrow it down to 101!</span></p><span data-dcnode-id="3316" instrument_node="">

</span><p data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Despite being one of the smaller continents, Europe offers a melting pot of culture and history.  Add to this a seemingly endless supply of striking landscapes, from luxurious beaches to epic mountainscapes, ancient forests, and vast plains, plus a sprinkling of cosmopolitan cities and quaint villages.  </span></p><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">It should come as no surprise that Europe is home to some of the best places to visit in the world!</span></p><span data-dcnode-id="3296" instrument_node="">
</span><h3 data-dcnode-id="3294" id="london-england"><span data-dcnode-id="3295" instrument_node="">London, England</span></h3><span data-dcnode-id="3293" instrument_node="">

reamoftravel.com/wp-content/uploads/2020/04/Instagrammable-view-of-London-from-Garden-at-120-2-600x480.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Instagrammable-view-of-London-from-Garden-at-120-2-300x240.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Instagrammable-view-of-London-from-Garden-at-120-2-1536x1229.jpg 1536w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Instagrammable-view-of-London-from-Garden-at-120-2-2048x1638.jpg 2048w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Instagrammable-view-of-London-from-Garden-at-120-2-800x640.jpg 800w" width="1440"><figcaption data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">The iconic Tower of London and Tower Bridge in London.</span></figcaption></figure><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3270"><span data-dcnode-id="3287" instrument_node="">As a Londoner I’m biased, but no trip to England would be complete without a visit to its cosmopolitan capital.  Take a stroll through </span><strong data-dcnode-id="3284"><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/most-famous-streets-in-london/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3286" instrument_node="">London’s famous streets</span></a></strong><span data-dcnode-id="3283" instrument_node=""> to discover everything from </span><strong data-dcnode-id="3280"><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/notting-hill-colorful-houses-instagram-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3282" instrument_node="">colourful houses</span></a></strong><span data-dcnode-id="3279" instrument_node=""> to globally-iconic </span><strong data-dcnode-id="3276"><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/london-bucket-list/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3278" instrument_node="">bucket list places</span></a></strong><span data-dcnode-id="3275" instrument_node=""> such as Big Ben and the Tower of London, as well as quirky </span><strong data-dcnode-id="3272"><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/non-touristy-things-to-do-in-london/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3274" instrument_node="">hidden gems</span></a></strong><span data-dcnode-id="3271" instrument_node="">, that include secret bars and enchanting gardens.  </span></p><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3263"><span data-dcnode-id="3268" instrument_node="">One thing is for sure – you won’t be short of things to do in London!  Plan to spend at least a </span><strong data-dcnode-id="3265"><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/london-in-2-days-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3267" instrument_node="">couple of days in London</span></a></strong><span data-dcnode-id="3264" instrument_node="">, if not a lot longer!</span></p><span data-dcnode-id="3262" instrument_node="">
</span><h3 data-dcnode-id="3258" id="the-cotswolds-england"><strong data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">The Cotswolds</span></strong><span data-dcnode-id="3259" instrument_node="">, England</span></h3><span data-dcnode-id="3257" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3253"><img alt="Arlington Row in Bibury Village in the Cotswolds makes for a dream destination." class="wp-image-6042" data-dcnode-id="3256" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2-595xh.jpg 595w" height="800" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2.jpg&amp;raw" srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Arlington-Row-Bibury-Village_-2-595xh.jpg 595w" width="1199"><figcaption data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">The frozen in time Bibury Village in the Cotswolds is a must-see dream destination.</span></figcaption></figure><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3243"><strong data-dcnode-id="3249"><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/prettiest-villages-in-the-cotswolds/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3251" instrument_node="">The Cotswolds</span></a></strong><span data-dcnode-id="3248" instrument_node=""> are home to some of the </span><strong data-dcnode-id="3245"><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/prettiest-english-villages/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3247" instrument_node="">prettiest English villages</span></a></strong><span data-dcnode-id="3244" instrument_node="">.  They provide the perfect destination for a quintessentially British experience.  After a refreshing walk through the countryside, be sure to stop into any little tea room for a traditional afternoon tea, or perhaps a local pub for a cheeky pint.</span></p><span data-dcnode-id="3242" instrument_node="">
</span><h3 data-dcnode-id="3238" id="the-white-cliffs-of-dover-england"><strong data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">The White Cliffs of Dover</span></strong><span data-dcnode-id="3239" instrument_node="">, England</span></h3><span data-dcnode-id="3237" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3233"><img alt="The iconic White Cliffs of Dover in England." class="wp-image-5559" data-dcnode-id="3236" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London-360x245.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London-595xh.jpg 595w" height="817" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London.jpg&amp;raw" srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London-360x245.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/06/The-White-Cliffs-of-Dover-from-London-595xh.jpg 595w" width="1200"><figcaption data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">The iconic White Cliffs of Dover in England.</span></figcaption></figure><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3227"><strong data-dcnode-id="3229"><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/white-cliffs-of-dover-from-london-day-trip/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3231" instrument_node="">The White Cliffs of Dover</span></a></strong><span data-dcnode-id="3228" instrument_node=""> are one of England’s most astounding natural features.  The stories these cliffs could tell!</span></p><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Take a walk atop these iconic white chalk giants and admire breathtaking views across the azure water of the English Channel to the French coast.  </span></p><span data-dcnode-id="3223" instrument_node="">
</span><h3 data-dcnode-id="3221" id="stonehenge-england"><span data-dcnode-id="3222" instrument_node="">Stonehenge, England</span></h3><span data-dcnode-id="3220" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3212"><img alt="Stonehenge is perhaps the most iconic dream destination in England." class="wp-image-5814" data-dcnode-id="3219" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge-360x241.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge-595xh.jpg 595w" height="803" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge.jpg&amp;raw" srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge-360x241.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/07/Neowise-Comet-over-Stonehenge-595xh.jpg 595w" width="1199"><figcaption data-dcnode-id="3213"><span data-dcnode-id="3218" instrument_node="">Stonehenge with the </span><strong data-dcnode-id="3215"><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/photograph-neowise-comet/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3217" instrument_node="">Neowise Comet</span></a></strong><span data-dcnode-id="3214" instrument_node=""> overhead.</span></figcaption></figure><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3205"><span data-dcnode-id="3210" instrument_node="">With a history dating back to 5000BC, </span><strong data-dcnode-id="3207"><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.english-heritage.org.uk/visit/places/stonehenge" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3209" instrument_node="">Stonehenge</span></a></strong><span data-dcnode-id="3206" instrument_node=""> has awed and puzzled people for millennia.  It is still unknown how or why this grand Neolithic stone circle was built.  Today, it is a UNESCO World Heritage Site and continues to enamour and amaze visitors.</span></p><span data-dcnode-id="3204" instrument_node="">
</span><h3 data-dcnode-id="3202" id="st-michael-s-mount-england"><span data-dcnode-id="3203" instrument_node="">St. Michael’s Mount, England</span></h3><span data-dcnode-id="3201" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3197"><img alt="St Michael's Mount is one of the England's least known but most impressive travel bucket list destinations." class="wp-image-6090" data-dcnode-id="3200" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_.jpg&amp;raw" srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/St-Michaels-Mount-from-Marazion-Cornwall_-595xh.jpg 595w" width="1200"><figcaption data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">St Michael’s Mount.</span></figcaption></figure><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">St Michaels Mount is perhaps the most famous landmark in Cornwall.  The impressive medieval castles sit gloriously atop the tidal island, providing an impressive view from the nearby coastal village of Marazion.  During low tide, it is possible to walk across to St Michael’s Mount and visit the castle.</span></p><span data-dcnode-id="3193" instrument_node="">
</span><h3 data-dcnode-id="3191" id="isle-of-skye-scotland"><span data-dcnode-id="3192" instrument_node="">Isle of Skye, Scotland</span></h3><span data-dcnode-id="3190" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3186"><img alt="An absolute dream destination: A stunning sunrise at the Old Man of Storr on Isle of Skye." class="wp-image-1800" data-dcnode-id="3189" data-jpibfi-description="A stunning sunrise at the Old Man of Storr on Isle of Skye." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-1440x1079.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-1440x1079.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-1440x1079.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-600x450.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-300x225.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-800x600.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise.jpg 2000w" height="1079" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-1440x1079.jpg&amp;raw" srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-1440x1079.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-600x450.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-300x225.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise-800x600.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Old-Man-of-Storr-sunrise.jpg 2000w" width="1440"><figcaption data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">The Old Man of Storr at sunrise.</span></figcaption></figure><span data-dcnode-id="3185" instrument_node="">
</span><p data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Alright, the WHOLE of Scotland is a dream-worthy destination.  However, in the interest of keeping it (somewhat) succinct, we’ve selected our top 3 favourite places to visit in Scotland.</span></p><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3181" instrument_node="">The </span><strong data-dcnode-id="3178"><a data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/isle-of-skye-2-day-tour-from-edinburgh/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3180" instrument_node="">Isle of Skye</span></a></strong><span data-dcnode-id="3177" instrument_node=""> is the largest of the Inner Hebrides islands in </span><strong data-dcnode-id="3174"><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/10-days-in-scotland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3176" instrument_node="">Scotland</span></a></strong><span data-dcnode-id="3173" instrument_node="">.  This breathtaking island is home to marvellous scenery from enchanting waterfalls to a dramatic rugged coastline, jagged mountainscapes, idyllic lochs and historic castles.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><h3 data-dcnode-id="3169" id="glencoe-scotland"><span data-dcnode-id="3170" instrument_node="">Glencoe, Scotland</span></h3><span data-dcnode-id="3168" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3164"><img alt="A sudden rainbow bursts out over Etive Mor Waterfall near Glencoe." class="wp-image-1791" data-class="LazyLoad" data-dcnode-id="3167" data-jpibfi-description="A sudden rainbow bursts out over Etive Mor Waterfall near Glencoe." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-1440x961.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-1440x961.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-1440x961.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-600x401.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Etive-Mor-Waterfall-Rainbow.jpg 2000w" height="961" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">A sudden rainbow bursts out over Etive Mor Waterfall.</span></figcaption></figure><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3162" instrument_node="">Situated in the Scottish Highlands, Glencoe Valley is one of the most picturesque areas in </span><strong data-dcnode-id="3159"><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/10-days-in-scotland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3161" instrument_node="">Scotland</span></a></strong><span data-dcnode-id="3158" instrument_node="">.  A drive through Glencoe will have you stopping every few minutes to admire the awe-inspiring views over lochs, mountains and waterfalls.  The area is also renowned for its many trails, climbing peaks such as Buachaille Etive Mor and Bidean nam Bian.</span></p><span data-dcnode-id="3156" instrument_node="">
</span><h3 data-dcnode-id="3154" id="eilean-donan-castle-scotland"><span data-dcnode-id="3155" instrument_node="">Eilean Donan Castle, Scotland</span></h3><span data-dcnode-id="3153" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3149"><img alt="A pink sky sunrise at the most famous and best castle in Scotland, Eilean Donan Castle." class="wp-image-1748" data-class="LazyLoad" data-dcnode-id="3152" data-jpibfi-description="A pink sky sunrise at the most famous and best castle in Scotland, Eilean Donan Castle." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-1440x1079.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-1440x1079.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-1440x1079.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-600x450.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-300x225.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan-800x600.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/Eilean-Donan.jpg 2000w" height="1079" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Another morning, another magical sunrise.</span></figcaption></figure><span data-dcnode-id="3148" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Eilean Donan Castle is the most photographed castle in Scotland.  Dating back to the 13 century, this Scottish icon sits atop a tidal island surrounded by three lochs.  It is one of the most popular destinations in the Scottish Highlands and it’s easy to see why!</span></p><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3144" instrument_node="">While this is one of our favourites, there are many other </span><strong data-dcnode-id="3141"><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/top-20-best-castles-in-scotland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3143" instrument_node="">incredible Scottish castles</span></a></strong><span data-dcnode-id="3140" instrument_node=""> also worthy of a place on your travel bucket list!  And did you know you can even live out your fairytale dreams by </span><strong data-dcnode-id="3137"><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/an-unforgettable-stay-at-glenapp-castle/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3139" instrument_node="">spending the night in a real Scottish castle</span></a></strong><span data-dcnode-id="3136" instrument_node="">?!  </span></p><span data-dcnode-id="3134" instrument_node="">
</span><h3 data-dcnode-id="3132" id="snowdonia-wales"><span data-dcnode-id="3133" instrument_node="">Snowdonia, Wales</span></h3><span data-dcnode-id="3131" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3127"><img alt="Jaw-dropping scenery of Ogwen Valley, Snowdonia." class="wp-image-2293" data-class="LazyLoad" data-dcnode-id="3130" data-jpibfi-description="Expect to see plenty of jaw-dropping scenery during your 3 days in Snowdonia." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-1440x760.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-1440x760.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-1440x760.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-600x317.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-300x158.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano-800x422.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Ogwen-Valley-Sunrise-Drone-Pano.jpg 2000w" height="760" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Jaw-dropping scenery of Ogwen Valley, Snowdonia.</span></figcaption></figure><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3117"><strong data-dcnode-id="3123"><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/3-days-in-snowdonia-road-trip/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3125" instrument_node="">Snowdonia</span></a></strong><span data-dcnode-id="3122" instrument_node="">, located in North Wales, is full of amazing hikes, tumbling waterfalls, beautiful lakes, quaint towns, and </span><strong data-dcnode-id="3119"><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/snowdonia-photography-locations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3121" instrument_node="">picturesque landscapes</span></a></strong><span data-dcnode-id="3118" instrument_node="">.  Mt Snowdon is the highest peak in Wales at 1,085 metres (3,560 ft).  Snowdonia National Park is a dream destination for nature lovers.  It offers a variety of outdoor activities that include hiking, cycling, climbing, horse riding, caving, watersports and of course, photography.  </span></p><span data-dcnode-id="3116" instrument_node="">
</span><h3 data-dcnode-id="3114" id="giants-causeway-northern-ireland"><span data-dcnode-id="3115" instrument_node="">Giants Causeway, Northern Ireland</span></h3><span data-dcnode-id="3113" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3108"><figure class="aligncenter size-medium" data-dcnode-id="3109"><img alt="Nature's immaculate architecture on display during golden hour at the Giant's Causeway in Ireland." class="wp-image-8906" data-class="LazyLoad" data-dcnode-id="3112" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Giants-Causeway-Dream-Destinations-360x540.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Giants-Causeway-Dream-Destinations-360x540.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Giants-Causeway-Dream-Destinations-360x540.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Giants-Causeway-Dream-Destinations-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Giants-Causeway-Dream-Destinations.jpg 600w" height="540" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Nature’s immaculate architecture on display during golden hour at the Giant’s Causeway.</span></figcaption></figure></div><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Lava and water collaborate to create the intricate patterns of the Giant’s Causeway in Northern Ireland.  This is one of those destinations you have to see to believe!</span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Perfectly columnar rock create a natural staircase where lava and ocean meet.  Though this attraction gets quite busy, the crowds tend to drift off by sunset, which is when the real magic happens anyway!</span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">If you are able to tick this one off the bucket list, you will want to tie it in with a trip to the Dark Hedges as well.  Leave plenty of time to just wander about this amazing location.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><h3 data-dcnode-id="3096" id="dark-hedges-northern-ireland"><span data-dcnode-id="3097" instrument_node="">Dark Hedges, Northern Ireland</span></h3><span data-dcnode-id="3095" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3091"><img alt="One of the few &quot;spooky&quot; dream destinations to make the list is the enchanted Dark Hedges of Northern Ireland." class="wp-image-8907" data-class="LazyLoad" data-dcnode-id="3094" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Dark-Hedges-Ireland.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Dark-Hedges-Ireland.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Dark-Hedges-Ireland.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Dark-Hedges-Ireland-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Dark-Hedges-Ireland-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">One of the few “spooky” dream destinations to make the list is the enchanted Dark Hedges of Northern Ireland.</span></figcaption></figure><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">The Dark Hedges became a viral sensation following a Game of Thrones appearance.  It was a popular spot for photographers long before, but is now nearly impossible to photograph without people.</span></p><span data-dcnode-id="3087" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Still, it is one of those places that merits the hype.  This avenue of beech trees is actually a busy road, and was never intended to be a destination.  However, the haunting aesthetic it creates is just too irresistible for most.</span></p><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">We advise making a trip at NIGHT.  This will be your only chance to have it to yourself and provides some extra spooky feels.</span></p><span data-dcnode-id="3081" instrument_node="">
</span><h3 data-dcnode-id="3079" id="cliffs-of-moher-ireland"><span data-dcnode-id="3080" instrument_node="">Cliffs of Moher, Ireland</span></h3><span data-dcnode-id="3078" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3073"><figure class="aligncenter size-medium" data-dcnode-id="3074"><img alt="O'Brien's Castle stands stoically high above the towering Cliffs of Moher in Ireland.  " class="wp-image-8908" data-class="LazyLoad" data-dcnode-id="3077" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Cliffs-of-Moher-360x540.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Cliffs-of-Moher-360x540.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Cliffs-of-Moher-360x540.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Cliffs-of-Moher-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Cliffs-of-Moher.jpg 600w" height="540" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">O’Brien’s Castle stands stoically high above the towering Cliffs of Moher in Ireland.  </span></figcaption></figure></div><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">When I say the Cliffs of Moher are “breathtaking”, I really mean it!  These sheer cliff walls plummet 700 feet straight down into the Atlantic Ocean.  </span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Standing atop while the sea breeze blows, one may be reminded of how small we are compared to the forces of nature.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">The Cliffs of Moher offer miles of easy hiking and are best enjoyed on a day trip. </span></p><span data-dcnode-id="3063" instrument_node="">
</span><h3 data-dcnode-id="3061" id="kylemore-abbey-ireland"><span data-dcnode-id="3062" instrument_node="">Kylemore Abbey, Ireland</span></h3><span data-dcnode-id="3060" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3056"><img alt="The enchanted Kyelmore Abbey in Connemara NP, Ireland." class="wp-image-8910" data-class="LazyLoad" data-dcnode-id="3059" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Kylemore-Abbey.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Kylemore-Abbey.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Kylemore-Abbey.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Kylemore-Abbey-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Kylemore-Abbey-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">The enchanted Kyelmore Abbey in Connemara NP, Ireland.</span></figcaption></figure><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">The Kylemore Abbey feels like it has been borrowed from a fairytale.  You will find this treasure nestled in amidst a lush green forest in Connemara National Park.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">This monastery was built in the 1800s, so it’s history is not quite as storied as most of the castles you will find in Ireland.  Of course, what it lacks in history is made up for in pure good looks!  </span></p><span data-dcnode-id="3049" instrument_node="">
</span><h3 data-dcnode-id="3047" id="seville-spain"><span data-dcnode-id="3048" instrument_node="">Seville, Spain</span></h3><span data-dcnode-id="3046" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3041"><figure class="aligncenter size-medium" data-dcnode-id="3042"><img alt="Plaza de España in Seville is a dream destination in Europe" class="wp-image-3040" data-class="LazyLoad" data-dcnode-id="3045" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-300x375.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-300x375.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-300x375.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-600x750.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-1440x1800.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-1229x1536.jpg 1229w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-1638x2048.jpg 1638w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4-800x1000.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2020/03/Plaza-de-España-Seville-Spain-4.jpg 2000w" height="375" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="300"><figcaption data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Plaza de España in Seville.</span></figcaption></figure></div><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3039" instrument_node="">Despite being Spain’s 4th largest city and the Andalusian capital, </span><strong data-dcnode-id="3036"><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/3-days-in-seville-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3038" instrument_node="">Seville</span></a></strong><span data-dcnode-id="3035" instrument_node=""> maintains all the charm, culture and authenticity of a small town.  With its rich complex history, resplendent palaces, exotic gardens, impressive food scene and intoxicating flamenco, it’s easy to understand why the hottest city in Europe is such a dream destination.  </span></p><span data-dcnode-id="3033" instrument_node="">
</span><h3 data-dcnode-id="3031" id="barcelona-spain"><span data-dcnode-id="3032" instrument_node="">Barcelona, Spain</span></h3><span data-dcnode-id="3030" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3026"><img alt="Gaudí's Park Güell in Barcelona offers dreamy views over the city towards the sea." class="wp-image-8228" data-class="LazyLoad" data-dcnode-id="3029" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Park-Güell-Barcelona-Spain.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Park-Güell-Barcelona-Spain.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Park-Güell-Barcelona-Spain.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Park-Güell-Barcelona-Spain-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Park-Güell-Barcelona-Spain-595xh.jpg 595w" height="800" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1199"><figcaption data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Park Güell in Barcelona offers dreamy views over the city towards the sea.</span></figcaption></figure><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Barcelona is perhaps most well known for being home to many of Gaudí’s magnificent architectural feats and UNESCO sites including La Sagrada Família, Park Güell, Milà, Casa Vicens, and Palau de la Música Catalana.</span></p><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">However, this charming seaside city also offers beautiful sandy beaches, mouth-watering tapas and perfect Mediterranean weather.  As the capital of Catalonia, it maintains a distinct culture different from other Spanish cities making it a unique place to visit.</span></p><span data-dcnode-id="3019" instrument_node="">
</span><h3 data-dcnode-id="3017" id="milan-italy"><span data-dcnode-id="3018" instrument_node="">Milan, Italy</span></h3><span data-dcnode-id="3016" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3011"><figure class="aligncenter size-medium" data-dcnode-id="3012"><img alt="Milan and it's stunning Duomo di Milano should not be missed from your dream destinations list." class="wp-image-4109" data-class="LazyLoad" data-dcnode-id="3015" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Sunrise-behind-the-Duomo-di-Milano-Milan-Cathedral-360x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Sunrise-behind-the-Duomo-di-Milano-Milan-Cathedral-360x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Sunrise-behind-the-Duomo-di-Milano-Milan-Cathedral-360x450.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Sunrise-behind-the-Duomo-di-Milano-Milan-Cathedral-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Sunrise-behind-the-Duomo-di-Milano-Milan-Cathedral.jpg 1200w" height="450" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Milan Cathedral in the heart of the city.</span></figcaption></figure></div><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3009" instrument_node="">Tucked away in Italy’s northern Lombardy region, </span><strong data-dcnode-id="3006"><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/2-days-in-milan-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3008" instrument_node="">Milan</span></a></strong><span data-dcnode-id="3005" instrument_node=""> is an economic powerhouse and global fashion capital.  Home to Da Vinci’s “Last Supper” and the mighty Duomo di Milano, as well as contemporary architecture including the Unicredit Tower, Milan provides a harmonious blend of traditional and modern.  </span></p><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Discover historical art and architecture, modern skyscrapers, green spaces, high-end fashion and mouthwatering Italian cuisine all within this delightful city.</span></p><span data-dcnode-id="3000" instrument_node="">
</span><h3 data-dcnode-id="2998" id="lake-como-italy"><span data-dcnode-id="2999" instrument_node="">Lake Como, Italy</span></h3><span data-dcnode-id="2997" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2993"><img alt="The charming lakeside village of Varenna, Lake Como - a dream destination in Italy." class="wp-image-3857" data-class="LazyLoad" data-dcnode-id="2996" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_-1440x961.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_-1440x961.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_-1440x961.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Beautiful-town-of-Varenna-Lake-Como-Italy_.jpg 1500w" height="961" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">The charming lakeside village of Varenna.</span></figcaption></figure><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2987"><strong data-dcnode-id="2989"><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/day-trip-from-milan-to-lake-como/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2991" instrument_node="">Lake Como</span></a></strong><span data-dcnode-id="2988" instrument_node=""> is one of the dreamiest places in Italy.  Nestled into the foothills of the Alps, this region is home to colourful, picturesque villages surrounding Italy’s third-largest lake.  Meander through pretty streets and botanical gardens, take in dramatic mountain vistas, cruise past luxurious villas, indulge in Italian cuisine and relax at a lakeside bar in this stunning region.</span></p><span data-dcnode-id="2986" instrument_node="">
</span><h3 data-dcnode-id="2984" id="paris-france"><span data-dcnode-id="2985" instrument_node="">Paris, France</span></h3><span data-dcnode-id="2983" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2979"><img alt="The Eiffel Tower lit up at night" class="wp-image-8918" data-class="LazyLoad" data-dcnode-id="2982" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Paris-France-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Paris-France-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Paris-France-Dream-Destination.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Paris-France-Dream-Destination-360x237.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Paris-France-Dream-Destination-595xh.jpg 595w" height="949" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Is it any wonder Paris is known as the romantic city?</span></figcaption></figure><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Known as the city of love, this romantic city is a dream getaway for many couples.  However, it has plenty to offer for everyone.  From viewing the city from atop the Eiffel Tower to a stroll along the Seine, exploring its wealth of art and architecture, or taking part in its famous cafe culture, you’ll find plenty to do in Paris.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><h3 data-dcnode-id="2973" id="alps-switzerland"><span data-dcnode-id="2974" instrument_node="">Alps, Switzerland</span></h3><span data-dcnode-id="2972" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2968"><img alt="The Swiss Alps create incredible scenery everywhere you look, making Switzerland one of the prettiest countries in the world." class="wp-image-8849" data-class="LazyLoad" data-dcnode-id="2971" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Swiss-Alps-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Swiss-Alps-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Swiss-Alps-Dream-Destination.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Swiss-Alps-Dream-Destination-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Swiss-Alps-Dream-Destination-595xh.jpg 595w" height="959" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">The Swiss Alps create incredible scenery everywhere you look, making Switzerland one of the prettiest countries in the world.</span></figcaption></figure><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">You cannot say the words  “Swiss Alps” without daydreaming of exotic ski trips and unspeakable natural beauty.  This is a reputation well-deserved!</span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Winter sport enthusiasts all pine for a bucket-list adventure to the Alps, but nature lovers and landscape photographers should consider any time of year a good time to visit.  Even in the summer, the expanse of majestic mountains are striking.  </span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Whether you are packing skis, a camera, or just a credit card (Switzerland is NOT cheap), you will not be disappointed by this idyllic country.</span></p><span data-dcnode-id="2958" instrument_node="">
</span><h3 data-dcnode-id="2956" id="innsbruck-austria"><span data-dcnode-id="2957" instrument_node="">Innsbruck, Austria</span></h3><span data-dcnode-id="2955" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2951"><img alt="An angel watches over the stunning destination city of Innsbruck in Austria." class="wp-image-8850" data-class="LazyLoad" data-dcnode-id="2954" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Innsbruck-Photography.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Innsbruck-Photography.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Innsbruck-Photography.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Innsbruck-Photography-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Innsbruck-Photography-595xh.jpg 595w" height="959" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">An angel watches over the stunning city of Innsbruck.</span></figcaption></figure><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Many people fail to realize that the Alps run through much of Austria as well.  The city of Innsbruck was one I thought little of before visiting, but would become my favorite city of all in Western Europe!</span></p><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Set against the inspiring mountain ranges, Innsbruck has the charm of a small town with the pulse of a big city.  Couple that with the picturesque mountain setting in which it resides and you will understand what makes this a location worthy of being a dream destination.</span></p><span data-dcnode-id="2944" instrument_node="">
</span><h3 data-dcnode-id="2942" id="bruges-belgium"><span data-dcnode-id="2943" instrument_node="">Bruges, Belgium</span></h3><span data-dcnode-id="2941" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2937"><img alt="The historic city of Bruges in Belgium has charm, history, and drama all in once." class="wp-image-8851" data-class="LazyLoad" data-dcnode-id="2940" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Brugges-Dream-Destinations.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Brugges-Dream-Destinations.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Brugges-Dream-Destinations.jpg 1439w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Brugges-Dream-Destinations-360x241.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Brugges-Dream-Destinations-595xh.jpg 595w" height="962" sizes="(max-width: 1439px) 100vw, 1439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1439"><figcaption data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">The historic city of Bruges in Belgium has charm, history, and drama all in once.</span></figcaption></figure><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">In the year 2000, the historic city centre of Bruges became a UNESCO world heritage site.  This distinction was earned due to the incredible preservation of its medieval architecture.</span></p><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Bruges is often referred to as the “Venice of the North” due to its many canals.  Walking through Bruges is like stepping back in time.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">You do not have to be an architecture buff or a photographer to enjoy this time-capsule… but it helps!</span></p><span data-dcnode-id="2927" instrument_node="">
</span><h3 data-dcnode-id="2925" id="ghent-belgium"><span data-dcnode-id="2926" instrument_node="">Ghent, Belgium</span></h3><span data-dcnode-id="2924" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2920"><img alt="The moody weather and the gothic architecture of Ghent create a dramatic destination." class="wp-image-8852" data-class="LazyLoad" data-dcnode-id="2923" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Ghent-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Ghent-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Ghent-Dream-Destination.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Ghent-Dream-Destination-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Ghent-Dream-Destination-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">The moody weather and the gothic architecture of Ghent create a dramatic destination.</span></figcaption></figure><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Much like Bruges, also in Belgium, Ghent is a well-preserved city with a historic feeling.  However, the architecture and vibe of Ghent are both a bit more gothic.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">The other thing I noticed on a visit to Ghent is that they have allowed far more modern chains and commerce to buy up the city centre, forcing them to maintain the exterior facades that meet the ethos of the rest of the city.  </span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">The city is an aesthetically pleasing place to take a stroll, but it feels a bit more touristic than Bruges.  Expect to be constantly tempted by many of Belgium’s famous treats such as beer, stroopwafels, pomme frits, and Belgian waffles.</span></p><span data-dcnode-id="2910" instrument_node="">
</span><h3 data-dcnode-id="2908" id="amsterdam-netherlands"><span data-dcnode-id="2909" instrument_node="">Amsterdam, Netherlands</span></h3><span data-dcnode-id="2907" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2903"><img alt="The night life in Amsterdam can be rambunctious, or serene." class="wp-image-8854" data-class="LazyLoad" data-dcnode-id="2906" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Amsterdam-Bucket-List.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Amsterdam-Bucket-List.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Amsterdam-Bucket-List.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Amsterdam-Bucket-List-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Amsterdam-Bucket-List-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">The night life in Amsterdam can be rambunctious, or serene.</span></figcaption></figure><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Of course, Amsterdam is on the list of dream destinations; the question is “why?”.  There is something for everyone to love, and likely to dislike, in Amsterdam.  The trick is to focus on the aspects that appeal to you.</span></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">There is the obvious novelty sector, including marijuana cafes, the red light district, and the thriving nightlife.  However, I enjoyed just walking the canals at night and photographing one of the prettiest cities in Europe.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Regardless of your why, there is something for everyone to enjoy in the vibrant city of Amsterdam!</span></p><span data-dcnode-id="2893" instrument_node="">
</span><h3 data-dcnode-id="2891" id="vestrahorn-iceland"><span data-dcnode-id="2892" instrument_node="">Vestrahorn, Iceland</span></h3><span data-dcnode-id="2890" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2885"><figure class="aligncenter size-large" data-dcnode-id="2886"><img alt="Photographing aurora at the amazing Mt Vestrahorn in Iceland." class="wp-image-2192" data-class="LazyLoad" data-dcnode-id="2889" data-jpibfi-description="Photographing aurora at the amazing Mt Vestrahorn in Iceland." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-1440x1463.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-1440x1463.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-1440x1463.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-600x610.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-300x305.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection-800x813.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Vestrahorn-Aurora-Photography-Reflection.jpg 1979w" height="1463" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-square.png&amp;raw" width="1440"><figcaption data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Photographing aurora at the amazing Mt Vestrahorn in Iceland.</span></figcaption></figure></div><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2883" instrument_node="">Vestrahorn on the Stokkness Peninsula of Iceland provides a dramatic otherworldly landscape like no other.  Jagged peaks rise up out of windswept black sand and as the ocean recedes, a perfect mirror reflection appears in the wet sand.  It is also a dream place to visit to </span><strong data-dcnode-id="2880"><a data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/photographing-aurora-photography-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2882" instrument_node="">photograph the northern lights</span></a></strong><span data-dcnode-id="2879" instrument_node="">, providing the perfect scene for such a magical experience.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><h3 data-dcnode-id="2875" id="ice-caves-iceland"><span data-dcnode-id="2876" instrument_node="">Ice Caves, Iceland</span></h3><span data-dcnode-id="2874" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2870"><img alt="An ice cave in Iceland is carved out uniquely each year and is a dream place to visit." class="wp-image-8230" data-class="LazyLoad" data-dcnode-id="2873" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Arctic-Shrine.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Arctic-Shrine.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Arctic-Shrine.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Arctic-Shrine-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Arctic-Shrine-595xh.jpg 595w" height="800" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1199"><figcaption data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Ice caves are an incredible natural phenomenon found in Iceland.</span></figcaption></figure><span data-dcnode-id="2869" instrument_node="">
</span><p data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">While ice caves may not be unique to Iceland, they surely are spectacular here in the land of ice and fire.  The caves here are formed entirely from ice and are unique each year as new ice melts, carving out the caves and freezes.  Therefore, you could visit every year and never visit the same ice cave twice!  </span></p><span data-dcnode-id="2866" instrument_node="">
</span><h2 data-dcnode-id="2862" id="dream-destinations-in-north-america"><span class="ez-toc-section" data-dcnode-id="2865" id="Dream_Destinations_in_North_America"></span><span data-dcnode-id="2864" instrument_node="">Dream Destinations in North America</span><span class="ez-toc-section-end" data-dcnode-id="2863"></span></h2><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">North America offers a hugely diverse range of climates, landscapes, activities and destinations.  From frozen winter wonderlands to tropical sand beaches, ancient rainforests, active volcanoes, cosmopolitan cities, a plethora of wildlife, and so much more!  Here you’ll find something for every style of traveller and every type of vacation.</span></p><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2857" instrument_node="">In reality, North America has too many dream-worthy destinations to list them all!  Every National Park is worth a visit!  However, for this list we’ve picked our </span><em data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">absolute</span></em><span data-dcnode-id="2854" instrument_node=""> favourites that we think everyone should visit at least once in their life!</span></p><span data-dcnode-id="2852" instrument_node="">
</span><h3 data-dcnode-id="2850" id="olympic-national-park-washington-usa"><span data-dcnode-id="2851" instrument_node="">Olympic National Park, Washington, USA</span></h3><span data-dcnode-id="2849" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2845"><img alt="Standing above the clouds felt like a dream at Hurricane Ridge, Olympic National Park." class="wp-image-1027" data-class="LazyLoad" data-dcnode-id="2848" data-jpibfi-description="Standing above the clouds at Hurricane Ridge" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-1440x1080.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-1440x1080.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-1440x1080.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-600x450.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-300x225.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy-800x600.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Hurricane-Ridge-Olympic-NP-copy.jpg 2000w" height="1080" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Standing above the clouds at Hurricane Ridge, Olympic National Park.</span></figcaption></figure><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2843" instrument_node="">Encompassing nearly a million acres, </span><strong data-dcnode-id="2840"><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/olympic-national-park-photography-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2842" instrument_node="">Olympic National Park</span></a></strong><span data-dcnode-id="2839" instrument_node=""> is considered one of the most biodiverse national parks in the US.  It is truly a paradise for photographers and nature lovers alike with everything from glaciated mountains to rugged coastline, sandy beaches, ancient rainforests, crashing waterfalls, enchanting hot springs and an abundance of wildlife.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><h3 data-dcnode-id="2835" id="central-oregon-usa"><span data-dcnode-id="2836" instrument_node="">Central Oregon, USA</span></h3><span data-dcnode-id="2834" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2830"><img alt="Smith Rock State Park is one of the travel bucket list dream destinations for every Oregon visitor" class="wp-image-6481" data-class="LazyLoad" data-dcnode-id="2833" data-jpibfi-description="Smith Rock State Park is a bucket list place to visit for every ORegon visitor" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Smith-Rock-Sunset-Photography-Oregon.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Smith-Rock-Sunset-Photography-Oregon.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Smith-Rock-Sunset-Photography-Oregon.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Smith-Rock-Sunset-Photography-Oregon-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Smith-Rock-Sunset-Photography-Oregon-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Smith Rock in Central Oregon is a must-see destination for nature lovers.</span></figcaption></figure><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Oregon is the prettiest of the 50 states when it comes to natural beauty – that may seem a big claim, but as a native, I feel like I am allowed to make it.</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">The prettiest region in the prettiest state is the high desert of Central Oregon.  The city at the heart of the region is Bend, surrounded by mountains, rivers, waterfalls, volcanoes, lava tubes, and plenty more geologic marvels.</span></p><span data-dcnode-id="2823" instrument_node="">
