</span><figure class="wp-block-image size-large" data-dcnode-id="1790"><img alt="A long exposure photo of Melbourne - a dream destination in Australia" class="wp-image-8311" data-class="LazyLoad" data-dcnode-id="1797" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Melbourne-City-Australia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Melbourne-City-Australia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Melbourne-City-Australia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Melbourne-City-Australia-360x245.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Melbourne-City-Australia-595xh.jpg 595w" height="815" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1791"><span data-dcnode-id="1796" instrument_node="">A </span><strong data-dcnode-id="1793"><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/long-exposure-photography-beginners-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1795" instrument_node="">long exposure photo</span></a></strong><span data-dcnode-id="1792" instrument_node=""> of Melbourne.</span></figcaption></figure><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Melbourne is the perfect destination to start your Australian adventure. The city has plenty to do, with incredible food, coffee, theatre, art and sport cultures plus lots of hidden gems!</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Explore the city’s alleyways to find vibrant street art and cafes, where you’ll discover, hands down, the best coffee in the world.  Then spend the afternoon at the beach with a shoreline dotted with bright, colourful beach huts.  </span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1782" instrument_node="">Or take an amazing day trip to Phillip Island, Mornington Peninsula, Yarra Valley, Wilsons Promontory or the </span><strong data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/7-days-on-the-great-ocean-road/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1781" instrument_node="">Great Ocean Road</span></a></strong><span data-dcnode-id="1778" instrument_node=""> to get out in nature and discover Australian wildlife.  </span></p><span data-dcnode-id="1776" instrument_node="">
</span><h3 data-dcnode-id="1774" id="great-ocean-road-australia"><span data-dcnode-id="1775" instrument_node="">Great Ocean Road, Australia</span></h3><span data-dcnode-id="1773" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1769"><img alt="The 12 Apostles along the Great Ocean Road, Victoria, Australia" class="wp-image-2547" data-class="LazyLoad" data-dcnode-id="1772" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-1536x1024.jpg 1536w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive-800x533.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/12-Apostles-Great-Ocean-Road-Self-Drive.jpg 2000w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">The 12 Apostles along the Great Ocean Road should not be missed while in Australia.</span></figcaption></figure><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1767" instrument_node="">Taking a drive along the </span><strong data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/7-days-on-the-great-ocean-road/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">Great Ocean Road</span></a></strong><span data-dcnode-id="1763" instrument_node=""> is an absolute must while in Australia.  Beginning 90 minutes from Melbourne and spanning 249 miles (400km) along the southwest coast, it is easily one of the most scenic coastal drives in the world.  Enjoy nature in all its splendour with rugged coast, sandy beaches, lush waterfalls, temperate rainforest and plentiful wildlife.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><h3 data-dcnode-id="1759" id="sydney-australia"><span data-dcnode-id="1760" instrument_node="">Sydney, Australia</span></h3><span data-dcnode-id="1758" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1754"><img alt="The iconic Sydney Opera House and Sydney Bridge." class="wp-image-8312" data-class="LazyLoad" data-dcnode-id="1757" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sydney-Opera-House-and-Sydney-Bridge.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sydney-Opera-House-and-Sydney-Bridge.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sydney-Opera-House-and-Sydney-Bridge.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sydney-Opera-House-and-Sydney-Bridge-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sydney-Opera-House-and-Sydney-Bridge-595xh.jpg 595w" height="800" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1199"><figcaption data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">The iconic Sydney Opera House and Sydney Bridge.</span></figcaption></figure><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Sydney is the largest city in Australia and provides an invigorating blend of bustling city life and laid-back beach vibes.  Take in iconic sites such as the Sydney Opera House and Sydney Harbour Bridge then head to world-famous beaches such as Bondi and Manly for some seaside relaxation.  You’ll find plenty of places to visit in and around Sydney to suit every type of traveller!</span></p><span data-dcnode-id="1750" instrument_node="">
</span><h3 data-dcnode-id="1748" id="blue-mountains-australia"><span data-dcnode-id="1749" instrument_node="">Blue Mountains, Australia</span></h3><span data-dcnode-id="1747" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1743"><img alt="A large waterfall tumbles off the rock wall at sunrise while a eucalyptus mist gathers at Blue Mountains National Park in Australia." class="wp-image-8905" data-class="LazyLoad" data-dcnode-id="1746" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Blue-Mountain-National-Park-Australia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Blue-Mountain-National-Park-Australia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Blue-Mountain-National-Park-Australia.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Blue-Mountain-National-Park-Australia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Blue-Mountain-National-Park-Australia-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">A large waterfall tumbles off the rock wall at sunrise while a eucalyptus mist gathers.</span></figcaption></figure><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">The Blue Mountains National Park is located a couple hours from Sydney.  In just that time, you can escape the big city bustle and become completely immersed in lush green eucalyptus forest, explore countless waterfalls, and enjoy the magical natural world.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">While the Blue Mountains NP would be a dream destination without context, it’s local-yet-remote nature certainly adds to the appeal.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><h3 data-dcnode-id="1734" id="whitsundays-australia"><span data-dcnode-id="1735" instrument_node="">Whitsundays, Australia</span></h3><span data-dcnode-id="1733" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1729"><img alt="Swirling patterns of sand and water at Whitehaven Beach, Whitsundays, Australia " class="wp-image-8313" data-class="LazyLoad" data-dcnode-id="1732" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Whitehaven-Beach-Whitsundays-Australia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Whitehaven-Beach-Whitsundays-Australia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Whitehaven-Beach-Whitsundays-Australia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Whitehaven-Beach-Whitsundays-Australia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Whitehaven-Beach-Whitsundays-Australia-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Whitehaven Beach and its famous swirling patterns.</span></figcaption></figure><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Close your eyes and imagine swirls of heavenly white sands encompassed by turquoise waters… what you’re picturing is Whitehaven Beach, just one of many paradisiacal&nbsp;beaches in the Whitsundays.  </span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">The Whitsundays is an archipelago of 74 tropical islands next to the Great Barrier Reef, just off the Queensland coast.  Best explored by boat, the islands are perfect for swimming, snorkelling and just relaxing on secluded beaches and hidden bays.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><h3 data-dcnode-id="1720" id="tropical-north-queensland-australia"><span data-dcnode-id="1721" instrument_node="">Tropical North Queensland, Australia</span></h3><span data-dcnode-id="1719" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1714"><figure class="aligncenter size-medium" data-dcnode-id="1715"><img alt="An aerial view of Low Isles in Tropical North Queensland" class="wp-image-2964" data-class="LazyLoad" data-dcnode-id="1718" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/02/Low-Isles-Aerial-View-Tropical-Island-Cairns-300x400.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/02/Low-Isles-Aerial-View-Tropical-Island-Cairns-300x400.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="300"><figcaption data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Low Isles is just one of the many wonderful islands in Tropical North Queensland.</span></figcaption></figure></div><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">In the northeast corner of Australia sits Tropical North Queensland, offering an intoxicating mix of idyllic beaches, pristine islands, warm waters and lush tropical rainforest.  </span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1709" instrument_node="">Whether you’re looking for adventure or relaxation, this dream destination has it all.  From its main hub, </span><strong data-dcnode-id="1706"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/top-10-things-to-do-in-cairns/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1708" instrument_node="">Cairns</span></a></strong><span data-dcnode-id="1705" instrument_node="">, you can dive into the kaleidoscopic underwater world of the Great Barrier Reef, explore </span><strong data-dcnode-id="1702"><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/best-waterfalls-near-cairns/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1704" instrument_node="">enchanting waterfalls</span></a></strong><span data-dcnode-id="1701" instrument_node="">, or take a </span><strong data-dcnode-id="1698"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/port-douglas-to-daintree/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1700" instrument_node="">road trip to the ancient Daintree rainforest</span></a></strong><span data-dcnode-id="1697" instrument_node=""> and discover the indigenous culture.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h2 data-dcnode-id="1691" id="dream-destinations-in-asia"><span class="ez-toc-section" data-dcnode-id="1694" id="Dream_Destinations_in_Asia"></span><span data-dcnode-id="1693" instrument_node="">Dream Destinations in Asia</span><span class="ez-toc-section-end" data-dcnode-id="1692"></span></h2><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Asia is not only the largest continent by landmass, but also by population.  It’s therefore no surprise that it provides a wealth of diverse experiences to travellers.  Almost every climate on Earth can be found in Asia, along with the landscapes they shape.  From unspoiled beaches to arid deserts, snow-capped mountains, impenetrable jungles and smoking volcanoes.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">It’s not just the landscapes that are diverse.  Within Asia, there are countless cultures and a plethora of man-made wonders.  From sleepy villages to mega metropolises with towering skyscrapers to ancient religious relics and extraordinary temples.  Not to mention, some of the best cuisines on the planet!</span></p><span data-dcnode-id="1684" instrument_node="">
</span><h3 data-dcnode-id="1682" id="bali-indonesia"><span data-dcnode-id="1683" instrument_node="">Bali, Indonesia</span></h3><span data-dcnode-id="1681" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1677"><img alt="Banyumala Twin Waterfall in Munduk, Bali" class="wp-image-8314" data-class="LazyLoad" data-dcnode-id="1680" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Munduk-Waterfalls-Bali-Indonesia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Munduk-Waterfalls-Bali-Indonesia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Munduk-Waterfalls-Bali-Indonesia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Munduk-Waterfalls-Bali-Indonesia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Munduk-Waterfalls-Bali-Indonesia-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Banyumala Twin Waterfall in Munduk, Bali.</span></figcaption></figure><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Bali has become one of the most popular travel destinations and is a firm favourite of ours.  Surrounded by turquoise waters lapping against sandy beaches, it’s the ideal location for a beach holiday.  However, the island also offers so much more!  </span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">It has a rich and diverse culture of smiling and friendly people, with over 20,000 temples to explore on the small island.  Add to this thunderous waterfalls, forested volcanic mountains and iconic rice paddies and you’ll find plenty on offer on this paradise island.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h3 data-dcnode-id="1668" id="nusa-islands-indonesia"><span data-dcnode-id="1669" instrument_node="">Nusa Islands, Indonesia </span></h3><span data-dcnode-id="1667" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1662"><figure class="aligncenter size-medium" data-dcnode-id="1663"><img alt="Broken Beach, Nusa Penida island Indonesia" class="wp-image-8315" data-class="LazyLoad" data-dcnode-id="1666" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Nusa-Penida-Island-Indonesia-360x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Nusa-Penida-Island-Indonesia-360x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Nusa-Penida-Island-Indonesia-360x450.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Nusa-Penida-Island-Indonesia-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Nusa-Penida-Island-Indonesia.jpg 1200w" height="450" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Nusa Penida island is a tropical paradise.</span></figcaption></figure></div><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Just a short boat trip from Bali are the three Nusa Islands; Nusa Ceningan, Nusa Lembongan and Nusa Penida.  While they are becoming increasingly popular, they still see fewer visitors than Bali.  A visit to these islands allows you to experience some of the finest slices of paradise at a slower pace without the crowds, making it ideal for a dream vacation.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><h3 data-dcnode-id="1656" id="gili-islands-indonesia"><span data-dcnode-id="1657" instrument_node="">Gili Islands, Indonesia </span></h3><span data-dcnode-id="1655" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1651"><img alt="A double rainbow over the Gili Islands, Indonesia." class="wp-image-8332" data-class="LazyLoad" data-dcnode-id="1654" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Double-Rainbow-over-the-Gili-Islands-Indonesia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Double-Rainbow-over-the-Gili-Islands-Indonesia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Double-Rainbow-over-the-Gili-Islands-Indonesia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Double-Rainbow-over-the-Gili-Islands-Indonesia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Double-Rainbow-over-the-Gili-Islands-Indonesia-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">A double rainbow over the Gili Islands, Indonesia.</span></figcaption></figure><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Another tropical trio, the Gili Islands are located off the northwest coast of Lombok.  The three islands, Gili Trawangan,&nbsp;Gili Meno&nbsp;and Gili Air, each have their own unique charm.  However, all of these small coral isles contain powdery white sand beaches and coconut palms surrounded by crystal clear waters with some of the best diving and snorkelling on offer.  </span></p><span data-dcnode-id="1647" instrument_node="">
</span><h3 data-dcnode-id="1645" id="gardens-by-the-bay-singapore"><span data-dcnode-id="1646" instrument_node="">Gardens by the Bay, Singapore</span></h3><span data-dcnode-id="1644" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1640"><img alt="An aerial view of Gardens by the Bay and Marina Bay Sands in Singapore" class="wp-image-8330" data-class="LazyLoad" data-dcnode-id="1643" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Aerial-View-of-Gardens-by-the-Bay-and-Marina-Bay-Sands-Singapore.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Aerial-View-of-Gardens-by-the-Bay-and-Marina-Bay-Sands-Singapore.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Aerial-View-of-Gardens-by-the-Bay-and-Marina-Bay-Sands-Singapore.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Aerial-View-of-Gardens-by-the-Bay-and-Marina-Bay-Sands-Singapore-360x270.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Aerial-View-of-Gardens-by-the-Bay-and-Marina-Bay-Sands-Singapore-595xh.jpg 595w" height="899" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1199"><figcaption data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Gardens by the Bay provides a huge expanse of lush greenery in the heart of the city.</span></figcaption></figure><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Located in the heart of Singapore, covering over 101 hectares, is the surreal Gardens by the Bay.  Lush green scenery, kaleidoscopic flowers and Avatar-like super trees make this a place like no other.  Each evening this exotic wonderland comes alive in a whole new way with the Supertree Grove light show, a free spectacle of light and music.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><h3 data-dcnode-id="1634" id="kuala-lumpur-malaysia"><span data-dcnode-id="1635" instrument_node="">Kuala Lumpur, Malaysia</span></h3><span data-dcnode-id="1633" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1629"><img alt="Kuala Lumpur, Malaysia sees a mix of  old colonial buildings against modern skyscrapers" class="wp-image-8331" data-class="LazyLoad" data-dcnode-id="1632" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Kuala-Lumpur-Malaysia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Kuala-Lumpur-Malaysia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Kuala-Lumpur-Malaysia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Kuala-Lumpur-Malaysia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Kuala-Lumpur-Malaysia-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The beautiful capital city, Kuala Lumpur.</span></figcaption></figure><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">The capital city of Malaysia, Kuala Lumpur boasts an eclectic mix of glittering skyscrapers, colonial architecture, historic monuments, bustling street markets and lush green parks.  Some of its highlights include the Petronas Twin Towers (the world’s tallest twin skyscrapers), Petaling Street flea market, and the Batu Caves, which are over 400 million years old!</span></p><span data-dcnode-id="1625" instrument_node="">
</span><h3 data-dcnode-id="1623" id="gulf-islands-thailand"><span data-dcnode-id="1624" instrument_node="">Gulf Islands, Thailand</span></h3><span data-dcnode-id="1622" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1618"><img alt="Drone aerial view of Koh Tao, Gulf Islands, Thailand" class="wp-image-8334" data-class="LazyLoad" data-dcnode-id="1621" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Drone-Aerial-View-of-Koh-Tao-Gulf-Islands-Thailand.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Drone-Aerial-View-of-Koh-Tao-Gulf-Islands-Thailand.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Drone-Aerial-View-of-Koh-Tao-Gulf-Islands-Thailand.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Drone-Aerial-View-of-Koh-Tao-Gulf-Islands-Thailand-360x241.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Drone-Aerial-View-of-Koh-Tao-Gulf-Islands-Thailand-595xh.jpg 595w" height="802" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Aerial view of Koh Tao – one of the dreamiest islands in Thailand.</span></figcaption></figure><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">It’s hard to resist the tropical vibes of the dreamy Gulf Islands in Thailand.  This archipelago contains hundreds of islands, including the more popular and larger Koh Samui, Koh Phangan and Koh Tao, each a vision of paradise.  </span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Whether you’re looking to party the night away, kick back in 5-star luxury,  hike secluded jungle trails, learn how to scuba dive, or just enjoy the simple island life on sun-kissed beaches… these islands need to be on your travel bucket list!</span></p><span data-dcnode-id="1611" instrument_node="">
</span><h3 data-dcnode-id="1609" id="huay-mae-khamin-falls-thailand"><span data-dcnode-id="1610" instrument_node="">Huay Mae Khamin Falls, Thailand</span></h3><span data-dcnode-id="1608" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1604"><img alt="Huay Mae Khamin Falls is a fabulous hidden gem in Thailand and a dream destination." class="wp-image-987" data-class="LazyLoad" data-dcnode-id="1607" data-jpibfi-description="Tier 4 (Chat Kaew) is the highest drop at Huay Mae Khamin Falls" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/07/Tier-4-Chat-Kaew-Huay-Mae-Khamin-Waterfall.jpg 2000w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Huay Mae Khamin Falls is a fabulous hidden gem in Thailand.</span></figcaption></figure><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1602" instrument_node="">Despite being perhaps the best waterfall in Thailand, </span><strong data-dcnode-id="1599"><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/huay-mae-khamin-waterfall-thailand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1601" instrument_node="">Huay Mae Khamin Waterfall</span></a></strong><span data-dcnode-id="1598" instrument_node=""> is one that you have likely never heard of!&nbsp; Just an hour from its more famous neighbour, Erawan Waterfall, Huay Mae Khamin Waterfall is a local secret and hidden gem.&nbsp; Seven tiers of cascading beauty are nestled amidst a jungle landscape that makes this a must-see spot on any dream destination list!</span></p><span data-dcnode-id="1596" instrument_node="">
</span><h3 data-dcnode-id="1594" id="chiang-rai-thailand"><span data-dcnode-id="1595" instrument_node="">Chiang Rai, Thailand</span></h3><span data-dcnode-id="1593" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1589"><img alt="An angular view of the magnificent White Temple of Chiang Rai, as seen by Travels of Sophie." class="wp-image-824" data-class="LazyLoad" data-dcnode-id="1592" data-jpibfi-description="An angular view of the magnificent White Temple of Chiang Rai, as seen by Travels of Sophie." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/White-Temple-Chiang-Rai-daytime.jpg 2048w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">The magnificent White Temple in Chiang Rai.</span></figcaption></figure><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1583"><strong data-dcnode-id="1585"><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/chiang-rai-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1587" instrument_node="">Chiang Rai</span></a></strong><span data-dcnode-id="1584" instrument_node=""> is home to some of the most unique and photogenic temples in all of Thailand, perhaps even the world!&nbsp; While Chiang Rai is an increasingly popular tourist destination and one that has been firmly on the backpacker trail for years, it is still less explored than Chiang Mai and many other big cities in Thailand.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><h3 data-dcnode-id="1580" id="kuang-si-falls-laos"><span data-dcnode-id="1581" instrument_node="">Kuang Si Falls, Laos</span></h3><span data-dcnode-id="1579" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1575"><img alt="Cascading layers of rock create a staircase of natural beauty at the fourth tier of Kuang Si Falls." class="wp-image-768" data-class="LazyLoad" data-dcnode-id="1578" data-jpibfi-description="Cascading layers of rock create a staircase of natural beauty at the fourth tier of Kuang Si Falls." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Kuang-Si-Falls-Tiered-Pools.jpg 2000w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Cascading layers of rock create a staircase of natural beauty at Kuang Si Falls.</span></figcaption></figure><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1573" instrument_node="">Few experiences compare to that first breathless moment when you encounter the staggering beauty of </span><strong data-dcnode-id="1570"><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/kuang-si-falls-photography-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1572" instrument_node="">Kuang Si Waterfalls</span></a></strong><span data-dcnode-id="1569" instrument_node=""> in Laos.&nbsp; To date, Kuang Si Falls remains one of my favourite waterfalls in the world, so it had to be included in this list of dream destinations!</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Here you’ll discover a multitude of tiers of turquoise water tumbling over limestone steps.  Stop for a refreshing dip at several of the pools and get a free pedicure from the fish here that’ll happily nibble on your toes!</span></p><span data-dcnode-id="1564" instrument_node="">
</span><h3 data-dcnode-id="1562" id="vang-vieng-laos"><span data-dcnode-id="1563" instrument_node="">Vang Vieng, Laos</span></h3><span data-dcnode-id="1561" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1556"><figure class="aligncenter size-medium" data-dcnode-id="1557"><img alt="The view from Nam Xay Viewpoint Vang Vieng overlooking rice fields and mountains" class="wp-image-591" data-class="LazyLoad" data-dcnode-id="1560" data-jpibfi-description="The view from Nam Xay Viewpoint Vang Vieng overlooking rice fields and mountains" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-300x369.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-300x369.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-300x369.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-600x738.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-1440x1770.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos-800x983.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/06/Nam-Xay-Viewpoint-Vang-Vieng-Photos.jpg 1666w" height="369" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="300"><figcaption data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">The view from Nam Xay Viewpoint Vang Vieng overlooking rice fields and mountains/.</span></figcaption></figure></div><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1554" instrument_node="">Vang Vieng is a small town in </span><strong data-dcnode-id="1551"><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/northern-laos-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1553" instrument_node="">Northern Laos</span></a></strong><span data-dcnode-id="1550" instrument_node="">, located between Luang Prabang and Vientiane.  Nestled along the Nam Song River with dramatic limestone mountain scenery as its backdrop, Vang Vieng is absolutely breathtaking.  </span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1547" instrument_node="">It’s a top travel destination for adventure seekers and photographers.  Don’t miss the terrific views from Nam Xay viewpoint – the </span><strong data-dcnode-id="1544"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/top-5-vang-vieng-photos/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1546" instrument_node="">most Instagrammable spot in Vang Vieng</span></a></strong><span data-dcnode-id="1543" instrument_node="">.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><h3 data-dcnode-id="1539" id="angkor-wat-cambodia"><span data-dcnode-id="1540" instrument_node="">Angkor Wat, Cambodia</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1534"><img alt="A photo of Angkor Wat Temple, Cambodia at sunrise reflected in water." class="wp-image-316" data-class="LazyLoad" data-dcnode-id="1537" data-jpibfi-description="A photo of Angor Wat Temple at sunrise reflected in water." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise-1080x720.jpg 1080w, https://www.wedreamoftravel.com/wp-content/uploads/2019/05/Angkor-Wat-Sunrise.jpg 2000w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Angkor Wat Temple at Sunrise</span></figcaption></figure><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1532" instrument_node="">With over 1000 temples within a 400 square kilometre area, </span><strong data-dcnode-id="1529"><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/the-ultimate-guide-to-angkor-wat/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1531" instrument_node="">Angkor Wat</span></a></strong><span data-dcnode-id="1528" instrument_node=""> is considered the largest religious monument in the world.  Here you’ll discover one of the most enchanting travel destinations.  Walking through the captivating ruins of this UNESCO World Heritage Site feels as though you’ve been transformed to another world. </span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1525" instrument_node="">While it’s possible to see the highlights of </span><strong data-dcnode-id="1522"><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/angkor-wat-1-day-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1524" instrument_node="">Angkor Wat in 1 Day</span></a></strong><span data-dcnode-id="1521" instrument_node="">, it’s worth allowing more time for your </span><strong data-dcnode-id="1518"><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/angkor-wat-3-day-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1520" instrument_node="">Angkor Wat itinerary</span></a></strong><span data-dcnode-id="1517" instrument_node=""> to truly explore this magnificent place.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><h3 data-dcnode-id="1513" id="hội-an-vietnam"><span data-dcnode-id="1514" instrument_node="">Hội An, Vietnam</span></h3><span data-dcnode-id="1512" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1508"><img alt="Colourful lanterns decorate the town of Hội An, Vietnam, making it a dream destination." class="wp-image-8336" data-class="LazyLoad" data-dcnode-id="1511" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lanterns-in-a-shop-front-Hoi-An-Vietnam.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lanterns-in-a-shop-front-Hoi-An-Vietnam.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lanterns-in-a-shop-front-Hoi-An-Vietnam.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lanterns-in-a-shop-front-Hoi-An-Vietnam-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lanterns-in-a-shop-front-Hoi-An-Vietnam-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Colourful lanterns decorate the town of Hội An.</span></figcaption></figure><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">The delightful town of Hội An exudes a dreamy atmosphere.  Its pretty lanterns decorate the streets, casting warm light over the narrow alleys and reflecting in the river as night falls.  </span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Once a major port, it has maintained its authentic charm, having escaped modern development.  It is this preservation that has lent to Hội An being classified a UNESCO World Heritage Site.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h3 data-dcnode-id="1499" id="hạ-long-bay-vietnam"><span data-dcnode-id="1500" instrument_node="">Hạ Long Bay, Vietnam</span></h3><span data-dcnode-id="1498" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1494"><img alt="Thousands of limestone islands amongst emerald waters make up Hạ Long Bay, Vietnam." class="wp-image-8335" data-class="LazyLoad" data-dcnode-id="1497" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Ha-Long-Bay-Vietnam.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Ha-Long-Bay-Vietnam.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Ha-Long-Bay-Vietnam.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Ha-Long-Bay-Vietnam-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Ha-Long-Bay-Vietnam-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Thousands of limestone islands amongst emerald waters make up Hạ Long Bay.</span></figcaption></figure><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Another of Vietnam’s UNESCO sites, Hạ Long Bay is a true natural treasure.  Thousands of towering limestone islands, topped with green rainforest, protrude from emerald waters.  Sail through this magical landscape to discover why it remains Vietnam’s top travel destination year after year.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><h3 data-dcnode-id="1488" id="taroko-national-park-taiwan"><span data-dcnode-id="1489" instrument_node="">Taroko National Park, Taiwan</span></h3><span data-dcnode-id="1487" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1483"><img alt="My favorite please in all of Taiwan and an undisputed dream destination is the Taroko Gorge." class="wp-image-8917" data-class="LazyLoad" data-dcnode-id="1486" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Taroko-National-Park.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Taroko-National-Park.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Taroko-National-Park.jpg 1439w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Taroko-National-Park-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Taroko-National-Park-595xh.jpg 595w" height="960" sizes="(max-width: 1439px) 100vw, 1439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1439"><figcaption data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">My favorite place in all of Taiwan and an undisputed dream destination is the Taroko Gorge.</span></figcaption></figure><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Hands down the most exciting place for landscape photographers and nature lovers in Taiwan is Taroko National Park.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">In this pristine gorge, you will discover aqua flowing rivers, misty mountains, and just the right touch of culture in the isolated temples and pagodas.  </span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Grab a scooter and enjoy a self-tour of this impressive park.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><h3 data-dcnode-id="1471" id="taj-mahal-india"><span data-dcnode-id="1472" instrument_node="">Taj Mahal, India</span></h3><span data-dcnode-id="1470" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1465"><figure class="aligncenter size-medium" data-dcnode-id="1466"><img alt="A girl in a red dress and the Taj Mahal framed by a door way at sunrise." class="wp-image-8337" data-class="LazyLoad" data-dcnode-id="1469" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India-360x526.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India-360x526.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India-360x526.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India-1052x1536.jpg 1052w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Taj-Mahal-Agra-India.jpg 1200w" height="526" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Taj Mahal at sunrise is a must for any travel bucket list.</span></figcaption></figure></div><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Often regarded as the most beautiful building in the world, the immense white marble mausoleum in Agra is a sight to behold.  Built in the 17th century by the emperor in memory of his favourite wife, the Taj Mahal is an enduring monument to love.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Today, it is considered one of the new 7 wonders of the world and is visited by 7-8 million people per year.  It is truly a magnificent destination to visit, particularly at sunrise when the brilliant white marble twinkles in the rising sun.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><h3 data-dcnode-id="1456" id="mt-everest-nepal"><span data-dcnode-id="1457" instrument_node="">Mt Everest, Nepal</span></h3><span data-dcnode-id="1455" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1451"><img alt="Sunset over Mt Everest in the Himalaya Mountains, Nepal" class="wp-image-8339" data-class="LazyLoad" data-dcnode-id="1454" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/My-Everest-Himalayas-Mountains-Nepal.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/My-Everest-Himalayas-Mountains-Nepal.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/My-Everest-Himalayas-Mountains-Nepal.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/My-Everest-Himalayas-Mountains-Nepal-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/My-Everest-Himalayas-Mountains-Nepal-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Watching the sunset over the Himalayas was a dream come true for me!</span></figcaption></figure><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Standing at a mighty 29,029 feet (8,848 meters), Mount Everest is the tallest mountain in the world.  While climbing the summit of Mt Everest is a dangerous task undertaken by few, hiking to base camp is a dream achieved by many each year.  To date, reaching Everest base camp is still one of the most incredible personal achievements of mine.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The mere mention of Mount Everest evokes thoughts of adventure.  Whether you reach the pinnacle of Earth or hike the foothills amongst the giants, Mt Everest is guaranteed to provide you with memories you’ll never forget.  Awe-inspiring views surround you as you traverse through the majestic Himalayan mountains.  </span></p><span data-dcnode-id="1444" instrument_node="">
</span><h2 data-dcnode-id="1440" id="dream-places-to-visit-in-africa"><span class="ez-toc-section" data-dcnode-id="1443" id="Dream_Places_to_Visit_in_Africa"></span><span data-dcnode-id="1442" instrument_node="">Dream Places to Visit in Africa</span><span class="ez-toc-section-end" data-dcnode-id="1441"></span></h2><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Africa is the continent we’ve explored the least by far.  However, those countries we have visited definitely make it onto our dream destinations list.  In the future, when we can safely travel again, we hope to explore more of this vast continent and experience the many different cultures, wildlife and landscapes it has to offer.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><h3 data-dcnode-id="1434" id="zanzibar-tanzania"><span data-dcnode-id="1435" instrument_node="">Zanzibar, Tanzania</span></h3><span data-dcnode-id="1433" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1428"><figure class="aligncenter size-medium" data-dcnode-id="1429"><img alt="A traditional dhow sails just off the shore of Zanzibar at sunset." class="wp-image-8343" data-class="LazyLoad" data-dcnode-id="1432" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Zanzibar-Island-Tanzania-Africa-360x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Zanzibar-Island-Tanzania-Africa-360x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Zanzibar-Island-Tanzania-Africa-360x450.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Zanzibar-Island-Tanzania-Africa-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Zanzibar-Island-Tanzania-Africa.jpg 1200w" height="450" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">A traditional dhow sails just off the shore of Zanzibar at sunset.</span></figcaption></figure></div><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">With the warm Indian Ocean lapping against palm-tree lined white-sand beaches, Zanzibar is a paradise destination.  Located just off the coast of Tanzania, it has its own unique heritage and culture, despite being a semi-autonomous Tanzanian territory.  Spend your days relaxing on the beach, toes dug into the powdery white sand or exploring the delights of historical Stone Town.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><h3 data-dcnode-id="1422" id="red-sea-egypt"><span data-dcnode-id="1423" instrument_node="">Red Sea, Egypt</span></h3><span data-dcnode-id="1421" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1418"><figure class="aligncenter size-medium" data-dcnode-id="1419"><img alt="Scuba diving the Red Sea in Egypt was a dream destination" class="wp-image-8344" data-class="LazyLoad" data-dcnode-id="1420" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt-360x480.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt-360x480.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt-360x480.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt-1152x1536.jpg 1152w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Diving-the-Red-Sea-Egypt.jpg 1200w" height="480" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"></figure></div><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">As a scuba diver, the Red Sea was a big dream destination for me.  Few underwater locations compare to the immense biodiversity and colour found in the Red Sea.  If you prefer more land based activities, the coastline is full of beautiful beaches and resorts, or head into the desert for more adventurous activities such as quad biking!</span></p><span data-dcnode-id="1414" instrument_node="">
</span><h2 data-dcnode-id="1410" id="dream-destinations-still-on-our-travel-bucket-list"><span class="ez-toc-section" data-dcnode-id="1413" id="Dream_Destinations_Still_on_Our_Travel_Bucket_List"></span><span data-dcnode-id="1412" instrument_node="">Dream Destinations Still on Our Travel Bucket List</span><span class="ez-toc-section-end" data-dcnode-id="1411"></span></h2><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1408" instrument_node="">There are still many places we’d love to visit and plenty left on our travel bucket list to check off!  Realistically, there are few places we </span><strong data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">don’t</span></strong><span data-dcnode-id="1405" instrument_node=""> want to go to.  We live in such a beautiful world and each country offers something so unique that we’d love to visit them all.  However, we have chosen our top 5 destinations that neither of us has visited and we’re still dreaming about getting to!  We hope this will give you even more inspiration to create your perfect list of dream destinations:</span></p><span data-dcnode-id="1403" instrument_node="">
</span><ul data-dcnode-id="1382"><li data-dcnode-id="1399"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Safari in Africa</span></strong><span data-dcnode-id="1400" instrument_node="">: Yes I know this is vague and Africa is huge… but I can’t pick just one park when there are so many incredible options… Serengeti, Masai Mara, Kruger, Chobe, South Luangwa, Etosha etc.etc.!  From impressive, vast landscapes to spectacular wildlife, a safari somewhere in Africa is the BIGGEST adventure left on my bucket list.</span></li><li data-dcnode-id="1395"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Galápagos Islands, Ecuador</span></strong><span data-dcnode-id="1396" instrument_node="">:  Renowned for being one of the best places to see wildlife, I can’t wait to visit this beautiful archipelago one day.</span></li><li data-dcnode-id="1391"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Macchu Picchu, Peru: </span></strong><span data-dcnode-id="1392" instrument_node="">Considered one of the new 7 wonders of the world, marvelling at this famous icon of the Inca world is still an experience we’ve yet to have.</span></li><li data-dcnode-id="1387"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Bagan, Myanmar: </span></strong><span data-dcnode-id="1388" instrument_node="">This ancient city and UNESCO site has long been a dream destination for us, to watch the hot air balloons rise over the ancient kingdom.</span></li><li data-dcnode-id="1383"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Rockies, Canada:</span></strong><span data-dcnode-id="1384" instrument_node="">  We both love the mountains and can’t wait to be immersed in the brilliance of the Canadian Rockies… one day!</span></li></ul><span data-dcnode-id="1381" instrument_node="">
</span><h2 data-dcnode-id="1377" id="final-thoughts-on-our-dream-destinations-list"><span class="ez-toc-section" data-dcnode-id="1380" id="Final_thoughts_on_our_Dream_Destinations_list"></span><span data-dcnode-id="1379" instrument_node="">Final thoughts on our Dream Destinations list</span><span class="ez-toc-section-end" data-dcnode-id="1378"></span></h2><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">We really hope you’ve found some inspiration or a brief digital escape from life’s current craziness!  </span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Are there any places on your travel bucket list that we’ve missed and you think we should add?  Leave us a comment and let us know!</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1369" instrument_node="">You can find more travel inspiration through our various </span><strong data-dcnode-id="1366"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/travel-quotes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1368" instrument_node="">Travel Quotes blogs</span></a></strong><span data-dcnode-id="1365" instrument_node=""> as well as many different </span><strong data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/destinations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1364" instrument_node="">Destination Guides</span></a></strong><span data-dcnode-id="1361" instrument_node=""> to help you plan your next trip.  And if you’re an aspiring photographer or wanting to take your editing to the next level, check out our </span><strong data-dcnode-id="1358"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/learn-photography/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1360" instrument_node="">Learn Photography</span></a></strong><span data-dcnode-id="1357" instrument_node=""> section!</span></p><span data-dcnode-id="1355" instrument_node="">
