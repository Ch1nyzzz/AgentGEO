</span><p data-dcnode-id="2817"><span data-dcnode-id="2822" instrument_node="">A photo from Smith Rock State Park is featured above and ranked #6 on our </span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/best-places-to-visit-in-oregon/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">15 Best Places to Visit in Oregon</span></strong></a><span data-dcnode-id="2818" instrument_node=""> guide.</span></p><span data-dcnode-id="2816" instrument_node="">
</span><h3 data-dcnode-id="2814" id="painted-hills-oregon-usa"><span data-dcnode-id="2815" instrument_node="">Painted Hills, Oregon, USA</span></h3><span data-dcnode-id="2813" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2809"><img alt="Milky Way photography from the John Day Painted Hills of Oregon" class="wp-image-6498" data-class="LazyLoad" data-dcnode-id="2812" data-jpibfi-description="Milky Way photography from the John Day Painted Hills of Oregon" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Night-Photography-Painted-Hills-Oregon.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Night-Photography-Painted-Hills-Oregon.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Night-Photography-Painted-Hills-Oregon.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Night-Photography-Painted-Hills-Oregon-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Night-Photography-Painted-Hills-Oregon-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">While most popular by day, the night skies of the Painted Hills are truly special.</span></figcaption></figure><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">It is hard to explain what makes the Painted Hills of Oregon so amazing.  When you see them, you get it.</span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Striped hillsides of varying color tumble through this enchanted section of John Day National Monument.  The Painted Hills are located in a remote region of Eastern Oregon.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">While most popular by day, the night skies of the Painted Hills are something to behold as well.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><h3 data-dcnode-id="2797" id="umpqua-hot-springs-oregon-usa"><span data-dcnode-id="2798" instrument_node="">Umpqua Hot Springs, Oregon, USA</span></h3><span data-dcnode-id="2796" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2792"><img alt="An absolute dream destination... Heaven on earth can be found at the Toketee Hot Springs, Oregon." class="wp-image-2349" data-class="LazyLoad" data-dcnode-id="2795" data-jpibfi-description="Heaven on earth can be found on a day trip from Medford Oregon at the Toketee Hot Springs." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-1440x961.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-1440x961.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-1440x961.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-scaled-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-300x200.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Toketee-Hot-Springs-Photography-800x534.jpg 800w" height="961" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Heaven on earth can be found at the Toketee Hot Springs.</span></figcaption></figure><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2785"><span data-dcnode-id="2790" instrument_node="">Umpqua Hot Springs, also referred to as Toketee Hot Springs, provide a relaxing slice of paradise tucked away in the Umpqua National Forest.  One of the </span><strong data-dcnode-id="2787"><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/best-places-to-visit-in-oregon/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2789" instrument_node="">best places to visit in Oregon</span></a></strong><span data-dcnode-id="2786" instrument_node="">, these impressive hot springs are carved into the rock face in multiple layers offering pools of different temperatures.</span></p><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2783" instrument_node="">Oregon is truly a treasure trove of dream destinations and the Umpqua Hot Springs make for the perfect end to the day after exploring the many nearby </span><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/waterfalls-in-southern-oregon/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">waterfalls in Southern Oregon</span></strong></a><span data-dcnode-id="2779" instrument_node="">. &nbsp;</span></p><span data-dcnode-id="2777" instrument_node="">
</span><h3 data-dcnode-id="2775" id="crater-lake-oregon-usa"><span data-dcnode-id="2776" instrument_node="">Crater Lake, Oregon, USA</span></h3><span data-dcnode-id="2774" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2770"><img alt="Blue hour photography on a winter visit to Crater Lake National Park" class="wp-image-6521" data-class="LazyLoad" data-dcnode-id="2773" data-jpibfi-description="Blue hour photography on a winter visit to Crater Lake National Park" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Sunrise-Photography-Crater-Lake-Oregon.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Sunrise-Photography-Crater-Lake-Oregon.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Sunrise-Photography-Crater-Lake-Oregon.jpg 1439w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Sunrise-Photography-Crater-Lake-Oregon-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/08/Sunrise-Photography-Crater-Lake-Oregon-595xh.jpg 595w" height="960" sizes="(max-width: 1439px) 100vw, 1439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1439"><figcaption data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Blue hour at Crater Lake National Park, Oregon.</span></figcaption></figure><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Despite Oregon containing an unbelievable amount of natural beauty, Crater Lake is the only national park within the state.  However, anyone who has visited this magical place will appreciate how well-deserved this distinction is.  </span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2765" instrument_node="">Crater Lake is home to the deepest lake in the USA, created over 7000 years ago from volcanic activity.  Fed entirely by rain and snow, the impossibly blue lake is one of the purest in the world.  It is also one of the snowiest places in the USA, receiving 43ft of snow per year, transforming it into a winter wonderland and one of the most entrancing </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/southern-oregon-photography-locations/"><strong data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Southern Oregon photography locations</span></strong></a><strong data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">.</span></strong></p><span data-dcnode-id="2758" instrument_node="">
</span><h3 data-dcnode-id="2756" id="samuel-h-boardman-oregon-usa"><span data-dcnode-id="2757" instrument_node="">Samuel H. Boardman, Oregon, USA</span></h3><span data-dcnode-id="2755" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2750"><figure class="aligncenter size-medium" data-dcnode-id="2751"><img alt="King Tides rumble in at sunrise in Samuel H Boardman." class="wp-image-8856" data-class="LazyLoad" data-dcnode-id="2754" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Samuel-Boardman-Sunrise-Dream-Destination-360x540.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Samuel-Boardman-Sunrise-Dream-Destination-360x540.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Samuel-Boardman-Sunrise-Dream-Destination-360x540.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Samuel-Boardman-Sunrise-Dream-Destination-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Samuel-Boardman-Sunrise-Dream-Destination.jpg 600w" height="540" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">King Tides rumble in at sunrise in Samuel H Boardman.</span></figcaption></figure></div><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">The most popular of the Oregon dream destinations on this list will likely be Crater Lake National Park.  However, photographers, nature lovers, and seascapers may want to move Samuel H Boardman Scenic Corridor ahead on that travel bucket list.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">As landscape and destination photographers, we have had the unique joy in exploring a lot of various coastlines in a lot of countries.  The 11-mile stretch of Samuel Boardman is my favorite coastline in all of the world… especially for those willing and able to explore some unmarked trails!</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2742" instrument_node="">Read more about this idyllic coastal region in our </span><strong data-dcnode-id="2739"><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/southern-oregon-coast-photography-locations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2741" instrument_node="">guide to the Southern Oregon coast</span></a></strong><span data-dcnode-id="2738" instrument_node="">.</span></p><span data-dcnode-id="2736" instrument_node="">
</span><h3 data-dcnode-id="2734" id="yosemite-national-park-california-usa"><span data-dcnode-id="2735" instrument_node="">Yosemite National Park, California, USA</span></h3><span data-dcnode-id="2733" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2729"><img alt="Sunset at Yosemite National Park California USA" class="wp-image-8258" data-class="LazyLoad" data-dcnode-id="2732" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sunset-at-Yosemite-NAtional-Park-California.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sunset-at-Yosemite-NAtional-Park-California.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sunset-at-Yosemite-NAtional-Park-California.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sunset-at-Yosemite-NAtional-Park-California-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Sunset-at-Yosemite-NAtional-Park-California-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Sunset at Yosemite National Park.</span></figcaption></figure><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2716"><strong data-dcnode-id="2725"><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/yosemite-photography/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2727" instrument_node="">Yosemite National Park</span></a></strong><span data-dcnode-id="2724" instrument_node=""> covers an enormous area of 1,169&nbsp;square&nbsp;miles (3,029&nbsp;km</span><sup data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">2</span></sup><span data-dcnode-id="2721" instrument_node="">), almost 95% of which is designated wilderness.  Its vast landscape comprised of dramatic waterfalls, tumbling waterfalls, extensive meadows and forests, and some of the largest trees in the USA attract around 4 million visitors per year! &nbsp;Visit at the right time of year and you can even witness the natural phenomenon of </span><strong data-dcnode-id="2718"><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/yosemite-firefall/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2720" instrument_node="">Yosemite Firefall</span></a></strong><span data-dcnode-id="2717" instrument_node="">.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2714" instrument_node="">While most visitors remain within the 7 square miles (18&nbsp;km</span><sup data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">2</span></sup><span data-dcnode-id="2711" instrument_node="">) of&nbsp;the stunning </span><strong data-dcnode-id="2708"><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/yosemite-day-trip/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2710" instrument_node="">Yosemite Valley</span></a></strong><span data-dcnode-id="2707" instrument_node="">, there is so much more to see beyond that, with hundreds of spectacular hiking trails.&nbsp; </span></p><span data-dcnode-id="2705" instrument_node="">
</span><h3 data-dcnode-id="2703" id="shasta-trinity-california-usa"><span data-dcnode-id="2704" instrument_node="">Shasta-Trinity, California, USA</span></h3><span data-dcnode-id="2702" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2697"><figure class="aligncenter size-medium" data-dcnode-id="2698"><img alt="Talk about dream destinations -- this view out our tent of Mt Shasta is pure bliss." class="wp-image-8858" data-class="LazyLoad" data-dcnode-id="2701" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Mt-Shasta-Dream-Destination-360x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Mt-Shasta-Dream-Destination-360x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Mt-Shasta-Dream-Destination-360x450.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Mt-Shasta-Dream-Destination-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Mt-Shasta-Dream-Destination.jpg 600w" height="450" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Talk about dream destinations – this view of Mt Shasta from our tent is pure bliss.</span></figcaption></figure></div><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">The most beautiful mountain in North America is the twin-peaked Mt Shasta of Northern California.  A volcanic region of indescribable beauty surrounds its twin-peaked majesty.</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">While most of the dream destination bucket list-worthy hikes somehow include Mt Shasta, at least as a backdrop, there are also an assortment of other natural wonders worth exploring.  These include impressive waterfalls, natural hot springs, and some incredible caves.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2689" instrument_node="">You can (and should!) read more about exploring the region in our </span><strong data-dcnode-id="2686"><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/shasta-trinity-national-forest/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2688" instrument_node="">full guide to Shasta-Trinity National Forest</span></a></strong><span data-dcnode-id="2685" instrument_node="">.</span></p><span data-dcnode-id="2683" instrument_node="">
</span><h3 data-dcnode-id="2681" id="mono-lake-california-usa"><span data-dcnode-id="2682" instrument_node="">Mono Lake, California, USA</span></h3><span data-dcnode-id="2680" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2676"><img alt="The otherworldly &quot;tufa&quot; of Mono Lake create a dreamlike landscape." class="wp-image-8170" data-class="LazyLoad" data-dcnode-id="2679" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/10/Mono-Lake-Sunset-Northern-California.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/10/Mono-Lake-Sunset-Northern-California.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/10/Mono-Lake-Sunset-Northern-California.jpg 1439w, https://www.wedreamoftravel.com/wp-content/uploads/2020/10/Mono-Lake-Sunset-Northern-California-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/10/Mono-Lake-Sunset-Northern-California-595xh.jpg 595w" height="960" sizes="(max-width: 1439px) 100vw, 1439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1439"><figcaption data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">The otherworldly “tufa” of Mono Lake create a dreamlike landscape.</span></figcaption></figure><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2674" instrument_node="">In addition to being one of the oldest lakes in North America, what makes the saline waters of Mono Lake so impressive is the natural phenomenon known as </span><em data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">tufas</span></em><span data-dcnode-id="2671" instrument_node=""> that populate it.</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">A “tufa” is formed when the superheated waters from underground hot springs that are calcium-dense meet the carbonates of the lake water.  The result is a “tufa tower” that you have to see to believe!</span></p><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2665" instrument_node="">You can read more about Mono Lake and plan a </span><strong data-dcnode-id="2662"><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/northern-california-road-trip/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2664" instrument_node="">Northern California Road Trip in our travel guide.</span></a></strong></p><span data-dcnode-id="2660" instrument_node="">
</span><h3 data-dcnode-id="2658" id="redwoods-california-usa"><span data-dcnode-id="2659" instrument_node="">Redwoods, California, USA</span></h3><span data-dcnode-id="2657" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2652"><figure class="aligncenter size-medium" data-dcnode-id="2653"><img alt="The sun creeping between the giant redwoods in Jedidiah California" class="wp-image-2496" data-class="LazyLoad" data-dcnode-id="2656" data-jpibfi-description="The sun creeping between the giant redwoods in Jedidiah California" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA-300x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA-300x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA-300x450.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA-600x900.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA-800x1199.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/12/Jedidiah-Redwoods-California-USA.jpg 1334w" height="450" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="300"><figcaption data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Standing amongst the giants at Jedediah State Park.</span></figcaption></figure></div><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2650" instrument_node="">Tickling the sky at over 350 feet (107 m), Redwoods are the tallest trees in the world.  Located along the coast of </span><strong data-dcnode-id="2647"><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/northern-california-road-trip" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2649" instrument_node="">northern California</span></a></strong><span data-dcnode-id="2646" instrument_node="">, Redwood National and State Parks are a must-see in the USA.  Being immersed within a forest of these giants is an experience like no other!  There you can even drive </span><em data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">through</span></em><span data-dcnode-id="2643" instrument_node=""> three live redwood trees – that should give you an idea of just how enormous these trees are!</span></p><span data-dcnode-id="2641" instrument_node="">
</span><h3 data-dcnode-id="2639" id="san-francisco-california-usa"><span data-dcnode-id="2640" instrument_node="">San Francisco, California, USA</span></h3><span data-dcnode-id="2638" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2634"><img alt="The iconic Golden Gate Bridge and cable cars of San Francisco are part of what makes the city such a dream destination." class="wp-image-8936" data-class="LazyLoad" data-dcnode-id="2637" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/San-Francisco-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/San-Francisco-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/San-Francisco-Dream-Destination.jpg 1199w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/San-Francisco-Dream-Destination-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/San-Francisco-Dream-Destination-595xh.jpg 595w" height="800" sizes="(max-width: 1199px) 100vw, 1199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1199"><figcaption data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">The iconic Golden Gate Bridge and cable cars of San Francisco.</span></figcaption></figure><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Located on the central Californian coast, San Francisco may be small in size but it makes up for it in character and attractions.  With iconic sights including The Golden Gate Bridge, Alcatraz, Fishermans Wharf, Lombard Street and its cable cars, there’s lots to do in this eclectic city.</span></p><span data-dcnode-id="2630" instrument_node="">
</span><h3 data-dcnode-id="2628" id="los-angeles-california-usa"><span data-dcnode-id="2629" instrument_node="">Los Angeles, California, USA</span></h3><span data-dcnode-id="2627" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2623"><img alt="Girl amidst the LACMA lights installation in Los Angeles, a dream destination for every who loves Hollywood." class="wp-image-2017" data-class="LazyLoad" data-dcnode-id="2626" data-jpibfi-description="Girl amidst the LACMA lights installation in Los Angeles" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-1440x1066.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-1440x1066.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-1440x1066.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-600x444.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-300x222.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit-800x592.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/11/DSC0063-Edit.jpg 2000w" height="1066" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">The LACMA lights installation in LA.</span></figcaption></figure><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2621" instrument_node="">The City of Angels is known for being the home of Hollywood, the center of the US film and television industry.  But you’ll find plenty more </span><strong data-dcnode-id="2618"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/los-angeles-bucket-list/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2620" instrument_node="">things to do in Los Angeles</span></a></strong><span data-dcnode-id="2617" instrument_node=""> beyond Hollywood.  Sandwiched between the Pacific Ocean caressing golden sand beaches on one side and the mighty San Gabriel mountains on the other, LA has more nature than you may first imagine for the 2nd largest city in the US.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><h3 data-dcnode-id="2613" id="death-valley-national-park-california-usa"><span data-dcnode-id="2614" instrument_node="">Death Valley National Park, California, USA</span></h3><span data-dcnode-id="2612" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2608"><img alt="Zabriskie Point in Death Valley looks like something plucked from a dream or another planet." class="wp-image-8861" data-class="LazyLoad" data-dcnode-id="2611" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Death-Valley-Zabriskie-Point.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Death-Valley-Zabriskie-Point.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Death-Valley-Zabriskie-Point.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Death-Valley-Zabriskie-Point-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Death-Valley-Zabriskie-Point-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Zabriskie Point in Death Valley looks like something plucked from a dream or another planet.</span></figcaption></figure><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">At first glance, this semi-barren region appears flat, dull, and uninteresting. However, explorers will soon discover how wrong this is and why Death Valley is a dream destination for any nature lover.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Death Valley National Park is home to a plethora of unique desert landscapes, many of which you will not find anywhere else on Earth!  Those  who are willing to look will find a bit of extra magic at sunset and after dark, when much of the desert actually comes alive.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><h3 data-dcnode-id="2599" id="sequoia-national-park-california-usa"><span data-dcnode-id="2600" instrument_node="">Sequoia National Park, California, USA</span></h3><span data-dcnode-id="2598" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2593"><figure class="aligncenter size-medium" data-dcnode-id="2594"><img alt="Adam standing under the ancient giants of Sequoia National Park." class="wp-image-8862" data-class="LazyLoad" data-dcnode-id="2597" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Sequoia-National-Park-360x545.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Sequoia-National-Park-360x545.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Sequoia-National-Park-360x545.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Sequoia-National-Park-595xh.jpg 595w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Sequoia-National-Park.jpg 600w" height="545" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Adam standing under the ancient giants of Sequoia National Park.</span></figcaption></figure></div><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Walk amongst GIANTS at Sequoia National Park.  These are the largest trees in the world, and this national park is home to the biggest of the big in General Sherman.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Standing at a whopping 275 feet high with a base diameter of 36 feet, scientists estimate that General Sherman weighs nearly 650 tons and dates back about 2500 years!</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">A stroll through the enchanted groves of Sequoia NP is like walking through a dream!</span></p><span data-dcnode-id="2583" instrument_node="">
</span><h3 data-dcnode-id="2581" id="valley-of-fire-nevada-usa"><span data-dcnode-id="2582" instrument_node="">Valley of Fire, Nevada, USA</span></h3><span data-dcnode-id="2580" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2576"><img alt="Fire in the sky and in the landscape!! Valley of Fire is the ultimate dream destination!" class="wp-image-8863" data-class="LazyLoad" data-dcnode-id="2579" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valley-of-Fire.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valley-of-Fire.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valley-of-Fire.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valley-of-Fire-360x301.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valley-of-Fire-595xh.jpg 595w" height="1204" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Fire in the sky and in the landscape!! Valley of Fire is the ultimate dream destination!</span></figcaption></figure><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">While much of Nevada is a barren desert, there are some diamonds hidden amongst the sand and red rocks.  The Valley of Fire is, perhaps, the most special of them all!</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">This striped, colorful landscape is one of the most unusual regions we have ever explored.  Swirling patterns of mostly reds and oranges blend into cotton candy pinks, sky blues, and seemingly every other color in nature’s palette.  </span></p><span data-dcnode-id="2569" instrument_node="">
</span><h3 data-dcnode-id="2567" id="american-south-west-usa"><span data-dcnode-id="2568" instrument_node="">American South West, USA</span></h3><span data-dcnode-id="2566" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2562"><img alt="Goblin Valley is one of many incredible places to visit in the American Southwest." class="wp-image-9563" data-class="LazyLoad" data-dcnode-id="2565" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/02/American-Southwest-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/02/American-Southwest-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/02/American-Southwest-Dream-Destination.jpg 1439w, https://www.wedreamoftravel.com/wp-content/uploads/2021/02/American-Southwest-Dream-Destination-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/02/American-Southwest-Dream-Destination-595xh.jpg 595w" height="960" sizes="(max-width: 1439px) 100vw, 1439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1439"><figcaption data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Goblin Valley is one of many incredible places to visit in the American Southwest.</span></figcaption></figure><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2560" instrument_node="">Is it a cop-out to list the ENTIRE </span><strong data-dcnode-id="2557"><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/destinations/north-america-travel-guides/usa/southwest/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2559" instrument_node="">American South West</span></a></strong><span data-dcnode-id="2556" instrument_node=""> as a dream destination?  It may feel that way… until you’ve been there.</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2553" instrument_node="">The truth is, there is nowhere else in the world that you will find interstellar landscapes like those found where </span><strong data-dcnode-id="2550"><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/tag/arizona/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2552" instrument_node="">Arizona</span></a></strong><span data-dcnode-id="2549" instrument_node="">, Utah, Colorado, and </span><strong data-dcnode-id="2546"><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/tag/new-mexico/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2548" instrument_node="">New Mexico</span></a></strong><span data-dcnode-id="2545" instrument_node=""> converge. </span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2542" instrument_node="">The Wave, Antelope Canyons, Horseshoe Bend, Grand Canyon, Hoodoos of Bryce Canyon, Zion, “Goblins”, </span><strong data-dcnode-id="2539"><a data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/white-sands-national-park/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2541" instrument_node="">White Sands</span></a></strong><span data-dcnode-id="2538" instrument_node=""> and so much more… suffice to say, you could make a list of dream destinations from this region alone!</span></p><span data-dcnode-id="2536" instrument_node="">
</span><h3 data-dcnode-id="2534" id="yellowstone-national-park-wyoming-usa"><span data-dcnode-id="2535" instrument_node="">Yellowstone National Park, Wyoming, USA</span></h3><span data-dcnode-id="2533" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2529"><img alt="Reason 1 of 100 to add Yellowstone to your dream destination bucket list: Grand Prismatic Spring." class="wp-image-8867" data-class="LazyLoad" data-dcnode-id="2532" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Yellowstone-NP-Dream-Destinations.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Yellowstone-NP-Dream-Destinations.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Yellowstone-NP-Dream-Destinations.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Yellowstone-NP-Dream-Destinations-360x270.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Yellowstone-NP-Dream-Destinations-595xh.jpg 595w" height="1080" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Reason 1 of 100 to add Yellowstone to your dream destination bucket list: Grand Prismatic Spring.</span></figcaption></figure><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Look, a case could be made for each and every US National Park to make the dream destinations list, but there is only one that HAS to be on that list… Yellowstone National Park!</span></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Having been to nearly every NP in the US, I can confidently state that Yellowstone is the best of the best.  It is realistically 4 national parks, separated into distinct regions that offer different opportunities for travel, landscape, and nature photographers alike.</span></p><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Teeming with a diverse mix of wildlife, waterfalls, thermal activity, and so much more, Yellowstone National Park just has it all.</span></p><span data-dcnode-id="2519" instrument_node="">
</span><h3 data-dcnode-id="2517" id="grand-tetons-wyoming-usa"><span data-dcnode-id="2518" instrument_node="">Grand Tetons, Wyoming, USA</span></h3><span data-dcnode-id="2516" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2512"><img alt="The Snake River Bend lookout remains one of the most popular photography dream destinations." class="wp-image-8868" data-class="LazyLoad" data-dcnode-id="2515" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Grand-Tetons-Dream-Destination.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Grand-Tetons-Dream-Destination.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Grand-Tetons-Dream-Destination.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Grand-Tetons-Dream-Destination-360x269.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Grand-Tetons-Dream-Destination-595xh.jpg 595w" height="1074" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">The Snake River Bend lookout remains one of the most popular photography dream destinations.</span></figcaption></figure><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">On your way to Yellowstone, you may drive past a mountain range that seems like something straight out of a painting.  These are the Grand Tetons, and they are fantastic!</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The father of landscape photography, Ansel Adams himself, spent a lot of time here capturing the impressive vistas and scenery.  To this day, the Snake River Bend lookout point remains an iconic lookout for that postcard-perfect photo. </span></p><span data-dcnode-id="2505" instrument_node="">
</span><h3 data-dcnode-id="2503" id="badlands-national-park-south-dakota-usa"><span data-dcnode-id="2504" instrument_node="">Badlands National Park, South Dakota, USA</span></h3><span data-dcnode-id="2502" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2498"><img alt="Golden hour at Badlands National Park." class="wp-image-8869" data-class="LazyLoad" data-dcnode-id="2501" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Badlands-National-Park.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Badlands-National-Park.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Badlands-National-Park.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Badlands-National-Park-360x270.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Badlands-National-Park-595xh.jpg 595w" height="1079" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Golden hour at the Badlands National Park.</span></figcaption></figure><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">The Badlands was the first national park I visited, and to this day remains near the top of my list of favorites.  The sweeping plains and rolling striped hills were unlike anything I had ever seen, and remain fixated in my mind’s eye.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Spend a day hanging out with bison, exploring lost-in-time nearby towns, and hiking around a landscape carved out over thousands of years.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><h3 data-dcnode-id="2489" id="glacier-national-park-montana-usa"><span data-dcnode-id="2490" instrument_node="">Glacier National Park, Montana, USA</span></h3><span data-dcnode-id="2488" instrument_node="">

</span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">The final National Park we felt obligated to include is Glacier.  While it is still a stunning destination, the glaciers for which it is named are rapidly disappearing.  What’s worse, wildfires have ravaged much of the park.</span></p><span data-dcnode-id="2480" instrument_node="">

</span><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">New York is a city that truly has it all.  It really is the city that never sleeps, with a constant buzz of energy and an endless stream of entertainment.  There is no denying that NYC is one of the most iconic and exciting cities in the world.  </span></p><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">From towering skyscrapers to world-class museums and art galleries, expansive parks, a wealth of restaurants, unlimited attractions and vibrant cultures, a visit to NYC is a dream destination for millions.</span></p><span data-dcnode-id="2463" instrument_node="">

</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">While beautiful any time of year, this place is particularly dreamy following heavy rains and in the autumn as leaves change.</span></p><span data-dcnode-id="2451" instrument_node="">

</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">What make New Orleans and much of Louisiana so special is the unique culture that is only found here.  The Cajun influence is seen, tasted, smelled and heard everywhere in the city.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">There is a pulse in “Nola” that just isn’t felt elsewhere.  It’s something about the zydeco music… it’s something about the southern seasoning… it’s hard to describe, but impossible to ignore.</span></p><span data-dcnode-id="2442" instrument_node="">

strument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2433" instrument_node="">Tucked away on the remote shores of Maui is a sight like few others on this planet… a red sand beach.  The deep crimson colour of Kaihalulu Beach is a remarkable natural wonder.  Add this to the captivating shades of aqua, green and blue surrounding it and you have easily one of the </span><strong data-dcnode-id="2430"><a data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/maui-instagram-spots/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2432" instrument_node="">most photogenic places in Maui</span></a></strong><span data-dcnode-id="2429" instrument_node="">, perhaps even the world.</span></p><span data-dcnode-id="2427" instrument_node="">

</span><p data-dcnode-id="2412"><span data-dcnode-id="2417" instrument_node="">While black sand beaches may not be quite as rare as red sand, the depth and contrast that black sand provides are equally impressive.  The lava forged sand at Punalu’u Beach on the </span><strong data-dcnode-id="2414"><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/big-island-photography-locations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2416" instrument_node="">Big Island, Hawaii</span></a></strong><span data-dcnode-id="2413" instrument_node=""> contrasts brilliantly against the vibrant, tropical greens of the palm trees and local vegetation, while azure waters wash in and out to add the final touch to an already bewitching scene.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node="">And if all that wasn’t enough, you are almost sure to see one of the adorable resident </span><em data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">honu </span></em><span data-dcnode-id="2407" instrument_node="">(green sea turtles) relaxing peacefully on the shore.</span></p><span data-dcnode-id="2405" instrument_node="">

</span><h3 data-dcnode-id="2397" id="na-pali-coast-kauai-usa"><span data-dcnode-id="2398" instrument_node="">Na Pali Coast, Kauai, USA</span></h3><span data-dcnode-id="2396" instrument_node="">

</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Many photographers consider Kauai to be the most beautiful island, in large because it is the proud home to the unspeakably beautiful Na Pali Coast.  </span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Here, the splintered, jagged cliffs along the coast appear to have been carved by dragons themselves.  Meanwhile, secret golden-sand beaches dot a shoreline that is inaccessible by anything but boat, keeping their utopian beauty pristine.  Sea caves create hidden homes for waterfalls that tumble into the tropical blue waters of the Pacific…  The Na Pali Coast truly is a dream place to visit.</span></p><span data-dcnode-id="2385" instrument_node="">
