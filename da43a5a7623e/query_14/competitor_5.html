</span><p data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node="">This was voted the most photogenic beach in all of Hawaii and ranks near the top for</span><strong data-dcnode-id="2347"><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/photographing-hawaii/"><span data-dcnode-id="2349" instrument_node=""> The Best Places to Photograph in Hawaii.</span></a></strong></p><span data-dcnode-id="2345" instrument_node="">
</span><h3 data-dcnode-id="2343" id="hoomaluhia-gardens-oahu-usa"><span data-dcnode-id="2344" instrument_node="">Hoomaluhia Gardens, Oahu, USA</span></h3><span data-dcnode-id="2342" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2337"><figure class="aligncenter size-medium" data-dcnode-id="2338"><img alt="An Instagram favorite: the entrance road to Hoomaluhia Botanical Gardens." class="wp-image-3343" data-class="LazyLoad" data-dcnode-id="2341" data-jpibfi-description="An Instagram favorite: the entrance road to Hoomaluhia Botanical Gardens." data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-300x450.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-300x450.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-300x450.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-600x900.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-1024x1536.jpg 1024w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens-800x1200.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2020/04/Hoomaluhia-Botanical-Gardens.jpg 1333w" height="450" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="300"><figcaption data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">The entrance road to Hoomaluhia Botanical Gardens.</span></figcaption></figure></div><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Hoʻomaluhia Botanical Gardens feel like you’ve taken a trip into Jurassic Park.  Unlike many other botanical parks around the world, Hoʻomaluhia feels more like a national park than a manicured garden.  Their collection of plants from tropical regions worldwide fit seamlessly together creating a slice of heaven.  </span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2332" instrument_node="">The grand, palm-lined entrance provides one of the most scenic views and </span><strong data-dcnode-id="2329"><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/oahu-instagram-spots/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2331" instrument_node="">photography opportunities on Oahu.</span></a></strong><span data-dcnode-id="2328" instrument_node="">  But this is just the gateway to 400-acres of lush landscapes that make you feel like you’ve transcended Earth.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><h3 data-dcnode-id="2324" id="niagara-falls-usa-canada"><span data-dcnode-id="2325" instrument_node="">Niagara Falls, USA/Canada</span></h3><span data-dcnode-id="2323" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2319"><img alt="Niagara Falls has a bit more shine after dark." class="wp-image-8873" data-class="LazyLoad" data-dcnode-id="2322" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Niagara-Falls.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Niagara-Falls.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Niagara-Falls.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Niagara-Falls-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Niagara-Falls-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Niagara Falls has a bit more shine after dark.</span></figcaption></figure><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">An undeniable world wonder for our dream destinations list, Niagara Falls is worth all the hype.  This massive waterfall is one of the most impressive you will find anywhere in the world.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">There is no bad time to visit, but the scene is a bit extra special at night as the waters are illuminated in various colors and the crowds thin out.  </span></p><span data-dcnode-id="2312" instrument_node="">
</span><h3 data-dcnode-id="2310" id="vancouver-island-canada"><span data-dcnode-id="2311" instrument_node="">Vancouver Island, Canada</span></h3><span data-dcnode-id="2309" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2305"><img alt="Perhaps the best photo in all of Vancouver Island, this is the Elk River from the sky!" class="wp-image-1102" data-class="LazyLoad" data-dcnode-id="2308" data-jpibfi-description="Perhaps the best photo in all of Vancouver Island, this is the Elk River from the sky!" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-1440x1150.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-1440x1150.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-1440x1150.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-600x479.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-300x240.jpg 300w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River-800x639.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2019/09/Elk-River.jpg 2000w" height="1150" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Dazzling views of Vancouver Island from the sky!</span></figcaption></figure><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2303" instrument_node="">With vibrant green forests, massive waterfalls, cascading mountains, secluded beaches and abundance of wildlife, Vancouver Island should definitely be on your travel dream list.  Take a </span><strong data-dcnode-id="2300"><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/vancouver-island-road-trip-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2302" instrument_node="">Vancouver Island road trip</span></a></strong><span data-dcnode-id="2299" instrument_node=""> to discover winding roads leading you through a multitude of landscapes and the beginning of many multi-day hikes to immerse yourself in Canada’s natural wonders.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><h2 data-dcnode-id="2293" id="dream-places-to-visit-in-the-caribbean-and-central-america"><span class="ez-toc-section" data-dcnode-id="2296" id="Dream_Places_to_Visit_in_the_Caribbean_and_Central_America"></span><span data-dcnode-id="2295" instrument_node="">Dream Places to Visit in the Caribbean and Central America</span><span class="ez-toc-section-end" data-dcnode-id="2294"></span></h2><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">The first thing that will spring to mind for dream destinations in Central America are likely to be gorgeous beaches.  Yes, there are no shortage of those, but you can find beaches anywhere.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">In addition to the countless beach resorts, we have listed and described some of the rare and hidden gems, in addition to some better-known items for every travel bucket list.</span></p><span data-dcnode-id="2286" instrument_node="">
</span><h3 data-dcnode-id="2284" id="havana-cuba"><span data-dcnode-id="2285" instrument_node="">Jamaica</span></h3><span data-dcnode-id="2283" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2279"><img alt="Jamaica is a picture-perfect destination in the Caribbean." class="wp-image-19398" data-class="LazyLoad" data-dcnode-id="2282" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2022/03/Jamaica-Dream-Destinations.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2022/03/Jamaica-Dream-Destinations.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2022/03/Jamaica-Dream-Destinations.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2022/03/Jamaica-Dream-Destinations-360x247.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2022/03/Jamaica-Dream-Destinations-595xh.jpg 595w" height="822" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Jamaica is a picture-perfect destination in the Caribbean.</span></figcaption></figure><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2277" instrument_node="">Often referred to as the Jewel of the Caribbean, a visit to </span><strong data-dcnode-id="2274"><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beaches.com/jamaica/" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="2276" instrument_node="">Jamaica</span></a></strong><span data-dcnode-id="2273" instrument_node=""> is an experience for all the senses.  It is the taste and smell of jerk, the sound of steel drums and reggae music, the sight of tropical landscapes, and all the feelings of paradise.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Whether your visit is part of a typical cruise or something more adventurous, this is one of those places that never disappoints.  The rich culture and warm spirit promises the experience of a lifetime.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><h3 data-dcnode-id="2266" id="havana-cuba"><span data-dcnode-id="2267" instrument_node="">Havana, Cuba </span></h3><span data-dcnode-id="2265" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2261"><img alt="Havana is one of the most unique and culturally vibrant cities in the world." class="wp-image-8879" data-class="LazyLoad" data-dcnode-id="2264" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Havana-Cuba.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Havana-Cuba.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Havana-Cuba.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Havana-Cuba-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Havana-Cuba-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Havana is one of the most unique and culturally vibrant cities in the world.</span></figcaption></figure><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">While Americans may have some trouble legally visiting Cuba, that forbidden nature just makes it all the more enticing!</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Havana has a lot to offer that you will not find anywhere else; classic cars kept running for 50+ years, colorful fashion, vibrant and exciting night life, rum, cigars, beaches, and plenty of natural beauty.</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">I also found my visit to be extremely eye-opening to the complexities and impact of government.  The communist regime is certainly a very sharp, double-edged sword, and provides valuable perspective for those who take the time to consider it.</span></p><span data-dcnode-id="2251" instrument_node="">
</span><h3 data-dcnode-id="2249" id="yucutan-peninsula-mexico"><span data-dcnode-id="2250" instrument_node="">Yucutan Peninsula, Mexico </span></h3><span data-dcnode-id="2248" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2244"><img alt="The old Tulum ruins are graced with a vibrant rainbow and nothing but paradise surrounding." class="wp-image-8915" data-class="LazyLoad" data-dcnode-id="2247" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tulum-Mexico.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tulum-Mexico.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tulum-Mexico.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tulum-Mexico-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tulum-Mexico-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">The old Tulum ruins are graced with a vibrant rainbow and nothing but paradise surrounding.</span></figcaption></figure><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2242" instrument_node="">The Mexican Yucután Peninsula boasts tropical white sand beaches, ancient Mayan ruins, colonial cities and jungle swimming holes.  It is one of the most ecologically rich regions in the world with a vast array of flora and fauna finding a home in the area.  It’s also perhaps my favourite place in the world to dive, particularly </span><strong data-dcnode-id="2239"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clairesitchyfeet.com/scuba-dive-in-cozumel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2241" instrument_node="">scuba diving in Cozumel</span></a></strong><span data-dcnode-id="2238" instrument_node="">, where you’ll likely see an abundance of turtles! </span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">So whether you want to kick back on a beach, cocktail in hand, or seek out a thrilling adventure, the Yucután is the perfect place to visit.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><h3 data-dcnode-id="2231" id="costa-rica"><span data-dcnode-id="2232" instrument_node="">Costa Rica</span></h3><span data-dcnode-id="2230" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2226"><img alt="Two monkeys share an embrace in the jungle of Costa Rica." class="wp-image-8916" data-class="LazyLoad" data-dcnode-id="2229" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Costa-Rica.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Costa-Rica.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Costa-Rica.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Costa-Rica-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Costa-Rica-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Two monkeys share an embrace in the jungle of Costa Rica.</span></figcaption></figure><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">There is so much to love about this country that its hard to know where to begin.  The “Pura Vida” culture is not just something they put on for tourists, but a true way of life.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">The people are friendly, the wildlife is INCREDIBLE, the beaches are first class, and the jungles are lush.  Waterfalls, volcanoes, wildlife, and add in a bit of salsa… well, let’s just say it’s hard to not be impressed by Costa Rica.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><h3 data-dcnode-id="2217" id="volcan-de-fuego-guatemala"><span data-dcnode-id="2218" instrument_node="">Volcán de Fuego, Guatemala</span></h3><span data-dcnode-id="2216" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2212"><img alt="Watching a volcano erupt should be at the top of every bucket list!" class="wp-image-8880" data-class="LazyLoad" data-dcnode-id="2215" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Volcano-Guatemala.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Volcano-Guatemala.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Volcano-Guatemala.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Volcano-Guatemala-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Volcano-Guatemala-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Watching a volcano erupt should be at the top of every bucket list!</span></figcaption></figure><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">This was my absolute top choice for the dream destinations list, and remains my favorite natural experience of all time!</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Near Antigua, Guatemala, is a highly active volcano that erupts frequently.  Those willing can hike to the peak of the adjacent Volcan Acatenango to watch Volcan Fuego spew smoke and lava.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Technically, you make camp at the top to sleep, but who can sleep when a volcano is erupting nearby?!</span></p><span data-dcnode-id="2202" instrument_node="">
</span><h3 data-dcnode-id="2200" id="tikal-guatemala"><span data-dcnode-id="2201" instrument_node="">Tikal, Guatemala</span></h3><span data-dcnode-id="2199" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2197"><img alt="" class="wp-image-8881" data-class="LazyLoad" data-dcnode-id="2198" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tikal.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tikal.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tikal.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tikal-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tikal-595xh.jpg 595w" height="959" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"></figure><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Walk in the footsteps of ancient civilizations and explore the incredibly preserved ruins of Tikal!</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">While Chichen Itza in Mexico received the “Wonder of the World” nomination, Tikal is considered by many to be the more impressive site.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><h3 data-dcnode-id="2188" id="semuc-champey-guatemala"><span data-dcnode-id="2189" instrument_node="">Semuc Champey, Guatemala</span></h3><span data-dcnode-id="2187" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2183"><img alt="Paradise looks like Semuc Champey." class="wp-image-8914" data-class="LazyLoad" data-dcnode-id="2186" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Semuc-Champey-Dream-Destinations.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Semuc-Champey-Dream-Destinations.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Semuc-Champey-Dream-Destinations.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Semuc-Champey-Dream-Destinations-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Semuc-Champey-Dream-Destinations-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Paradise looks like Semuc Champey.</span></figcaption></figure><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Stair-stepping pools of emerald waters tumble through the lush forest at Semuc Champey.  Swim in their pools and try to remember this Garden of Eden is right here on Earth.</span></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">The easiest way to visit is to take a local tour, but you will be stuck on their schedule if you elect this option.  Instead, consider hiring a local driver and doing a solo visit.</span></p><span data-dcnode-id="2176" instrument_node="">
</span><h3 data-dcnode-id="2174" id="bocas-del-toro-panama"><span data-dcnode-id="2175" instrument_node="">Bocas del Toro, Panama</span></h3><span data-dcnode-id="2173" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2169"><img alt="You're not dreaming - this paradise is real.  Imagine having this beach completely to yourself!" class="wp-image-8883" data-class="LazyLoad" data-dcnode-id="2172" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Bocas-Del-Toro.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Bocas-Del-Toro.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Bocas-Del-Toro.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Bocas-Del-Toro-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Bocas-Del-Toro-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">You’re not dreaming – this paradise is real.  Imagine having this beach completely to yourself!</span></figcaption></figure><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">This archipelago of Bocas del Toro boasts thousands of islands and some of the best beaches anywhere in the world.</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Each island has a different vibe, but the developed ones all have one thing in common; pristine beaches and coconut-rich palms.  </span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">My particular favorite island was Red Frog Beach.  I spent a month living on the beach, sustaining life on fresh coconut and salt water.  Talk about a dream!</span></p><span data-dcnode-id="2159" instrument_node="">
</span><h2 data-dcnode-id="2155" id="dream-destinations-in-south-america"><span class="ez-toc-section" data-dcnode-id="2158" id="Dream_Destinations_in_South_America"></span><span data-dcnode-id="2157" instrument_node="">Dream Destinations in South America</span><span class="ez-toc-section-end" data-dcnode-id="2156"></span></h2><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">A continent comprised of breathtaking natural beauty from the spectacular mountain peaks of the Andes to the glaciers of Patagonia, the vast Amazon jungle, white-sand beaches and lush waterfalls.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">As well as man-made treasures from Incan ruins to colonial towns, buzzing markets, cosmopolitan cities and a dizzying nightlife.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2147" instrument_node="">Whether you’re </span><strong data-dcnode-id="2144"><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenmochila.com/backpacking-in-south-america-all-the-answers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2146" instrument_node="">backpacking in South America</span></a></strong><span data-dcnode-id="2143" instrument_node=""> or taking a well-deserved vacation, a wealth of bucket list worthy adventures awaits you.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><h3 data-dcnode-id="2139" id="rio-de-siete-colores-colombia"><span data-dcnode-id="2140" instrument_node="">Rio de Siete Colores, Colombia</span></h3><span data-dcnode-id="2138" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2134"><img alt="A waterfall spills along the River of Seven Colors in Colombia." class="wp-image-8884" data-class="LazyLoad" data-dcnode-id="2137" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/River-of-Seven-Colors-Colombia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/River-of-Seven-Colors-Colombia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/River-of-Seven-Colors-Colombia.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/River-of-Seven-Colors-Colombia-360x334.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/River-of-Seven-Colors-Colombia-595xh.jpg 595w" height="1334" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-square.png&amp;raw" width="1440"><figcaption data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">A waterfall spills along the River of Seven Colors in Colombia.</span></figcaption></figure><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">One of the most impressive, relatively unknown natural miracles in the world is the “River of Seven Colors,” hidden deep in the jungle of Colombia. </span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Seasonally, algae blooms in the rivers, transitioning through shades of pinks, reds, oranges, and yellows.  </span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">In order to access this destination, you must fly into the small village nearby and be guided by a local.  Due to guerilla activity nearby and in surrounding areas, tourists are not allowed to visit by land!</span></p><span data-dcnode-id="2124" instrument_node="">
</span><h3 data-dcnode-id="2122" id="tatacoa-desert-colombia"><span data-dcnode-id="2123" instrument_node="">Tatacoa Desert, Colombia</span></h3><span data-dcnode-id="2121" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2117"><img alt="A lone cactus resides over an otherworldly scene in the Tatacoa Desert of Colombia." class="wp-image-8885" data-class="LazyLoad" data-dcnode-id="2120" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tatacoa-Desert.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tatacoa-Desert.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tatacoa-Desert.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tatacoa-Desert-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Tatacoa-Desert-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">A lone cactus resides over an otherworldly scene in the Tatacoa Desert.</span></figcaption></figure><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The Tatacoa Desert in Colombia is one of very few dark sky reserves, making it a dream destination by day OR night.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2112" instrument_node="">Sadly, I had no idea </span><strong data-dcnode-id="2109"><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/night-photography-tutorials/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2111" instrument_node="">how to photograph at night</span></a></strong><span data-dcnode-id="2108" instrument_node=""> on my visit, but I still found the landscape to be extremely impressive by the light of sunrise and sunset as well.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">If the Badlands and the American Southwest had a scenic-lovechild, it would be the Tatacoa Desert.</span></p><span data-dcnode-id="2103" instrument_node="">
</span><h3 data-dcnode-id="2101" id="cocora-valley-colombia"><span data-dcnode-id="2102" instrument_node="">Cocora Valley, Colombia</span></h3><span data-dcnode-id="2100" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2096"><img alt="Walk amongst the outstretched &quot;wax palms&quot; of the Valle De Cocora, aka Cocora Valley, in Colombia." class="wp-image-8886" data-class="LazyLoad" data-dcnode-id="2099" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valle-de-Cocora.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valle-de-Cocora.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valle-de-Cocora.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valle-de-Cocora-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Valle-de-Cocora-595xh.jpg 595w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Walk amongst the outstretched “wax palms” of the Valle De Cocora.</span></figcaption></figure><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Known for rolling hills covered in the tall, unmistakable wax palms, the Cocora Valley is a must-see dream destination located in Colombia’s famous coffee triangle.</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Access the trails from the nearby town of Salento, catching the “colectivo” from town for a small fee and exploring by foot at your own pace.</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">If possible, try to get there with early or late light.  The greens glow rich in color with angled sunlight and the whole scene takes on new magic!</span></p><span data-dcnode-id="2086" instrument_node="">
</span><h3 data-dcnode-id="2084" id="rio-de-janeiro-brazil"><span data-dcnode-id="2085" instrument_node="">Rio de Janeiro, Brazil</span></h3><span data-dcnode-id="2083" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2079"><img alt="Sunset behind Christ the Redeemer and Rio de Janeiro in Brazil from Sugar Loaf Mountain." class="wp-image-8270" data-class="LazyLoad" data-dcnode-id="2082" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/IMG_3501.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/IMG_3501.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/IMG_3501.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/IMG_3501-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/IMG_3501-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Sunset behind Rio de Janeiro.</span></figcaption></figure><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">There are few cities on Earth as vibrant and captivating as Rio de Janeiro.  Its unique charm and vibe took my breath away, and it remains one of my favourite cities.  </span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The colourful cityscape nestled between sublime long, sandy beaches and impressive granite mountains, makes for a truly impressive scene.  Spend the day exploring Ipanema and Copacabana beaches before taking in the views from the base of Christ the Redeemer statue or taking a cable car to the peak of Sugarloaf Mountain.  Don’t miss Rio Carnival, which takes place each year before Lent, and is the largest street party in the world!</span></p><span data-dcnode-id="2072" instrument_node="">
</span><h3 data-dcnode-id="2070" id="lencois-maranhenses-brazil"><span data-dcnode-id="2071" instrument_node="">Lençóis Maranhenses, Brazil</span></h3><span data-dcnode-id="2069" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2065"><img alt="Lençóis Maranhenses sand dunes in Brazil" class="wp-image-8271" data-class="LazyLoad" data-dcnode-id="2068" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lençois-Maranhenses-Brazil.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lençois-Maranhenses-Brazil.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lençois-Maranhenses-Brazil.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lençois-Maranhenses-Brazil-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Lençois-Maranhenses-Brazil-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Lençois Maranhenses in northern Brazil.</span></figcaption></figure><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">The undulating, windswept sand dunes and blue lagoons of Lençóis Maranhenses National Park require you to get further off the beaten path – but it’s definitely worthwhile.  </span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Endless stretches of striking scenery await you and you’re likely to have the place to yourself.  The deep blue freshwater pools are seasonal, therefore for the best experience, plan to visit after the rainy season to really appreciate nature at its finest.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><h3 data-dcnode-id="2056" id="iguazu-falls-brazil-argentina"><span data-dcnode-id="2057" instrument_node="">Iguazu Falls, Brazil/Argentina</span></h3><span data-dcnode-id="2055" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2051"><img alt="The spectacular Iguazu Falls or Foz do Iguaçu in Brazil." class="wp-image-8273" data-class="LazyLoad" data-dcnode-id="2054" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Foz-do-Iguaçu.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Foz-do-Iguaçu.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Foz-do-Iguaçu.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Foz-do-Iguaçu-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Foz-do-Iguaçu-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Iguazu Falls in Brazil.</span></figcaption></figure><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">It would be impossible to create a list of dream destinations without including the world’s largest waterfall system!  Comprised of around 275 separate waterfalls, the impressive Iguazu Falls lie along the Brazilian/Argentine border and can be accessed from both countries.  Having visited both sides (twice!), I can’t pick a favourite – they’re both beautiful in different ways and it’s well worth visiting the falls from both sides.  </span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Prepare to be met with magnificent, thunderous waterfalls, and keep your eyes out for a variety of wildlife that calls this beautiful place home.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><h3 data-dcnode-id="2042" id="salar-de-uyuni-bolivia"><span data-dcnode-id="2043" instrument_node="">Salar de Uyuni, Bolivia</span></h3><span data-dcnode-id="2041" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2037"><img alt="Salar de Uyuni in Bolivia is the world's largest salt flat and a dream destination in South America" class="wp-image-8277" data-class="LazyLoad" data-dcnode-id="2040" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Salar-de-Uyuni-salt-flats-Bolivia.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Salar-de-Uyuni-salt-flats-Bolivia.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Salar-de-Uyuni-salt-flats-Bolivia.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Salar-de-Uyuni-salt-flats-Bolivia-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Salar-de-Uyuni-salt-flats-Bolivia-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Salar de Uyuni in Bolivia is the world’s largest salt flat.</span></figcaption></figure><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Encompassing an enormous 4,086 sq mi (10,582 km²), Salar de Uyuni is the world’s largest salt flat.  When the surface of this fascinating terrain is dry, you’ll find yourself surrounded by an expanse of pure white comprised of a mosaic of irregular polygonal shapes.  </span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">However, this landscape takes on a new dimension with a little water.  During the rainy season, a thin layer of water across the salt flats transforms the ground into a mirror.  The perfect reflection creates a surreal effect, making it feel as though you are walking through the clouds.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Unfortunately, I only got to witness the salt flats during the dry season – so this experience is still on my travel bucket list!</span></p><span data-dcnode-id="2027" instrument_node="">
</span><h3 data-dcnode-id="2025" id="san-pedro-de-atacama-chile"><span data-dcnode-id="2026" instrument_node="">San Pedro de Atacama, Chile</span></h3><span data-dcnode-id="2024" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2020"><img alt="Vicuña graze in front of an otherworldly landscape in the Atacama Desert, Chile." class="wp-image-8276" data-class="LazyLoad" data-dcnode-id="2023" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Vicuña-in-San-Pedro-de-Atacama-Chile.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Vicuña-in-San-Pedro-de-Atacama-Chile.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Vicuña-in-San-Pedro-de-Atacama-Chile.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Vicuña-in-San-Pedro-de-Atacama-Chile-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Vicuña-in-San-Pedro-de-Atacama-Chile-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Vicuña graze in front of an otherworldly landscape in the Atacama Desert, Chile.</span></figcaption></figure><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">A visit to San Pedro de Atacama feels like travelling to an entirely different planet.  With its beguiling landscapes comprised of unusual, otherworldly rock formations, sand dunes, the country’s largest salt flats, saline lagoons, softly smoking volcanoes and fields of steaming geysers, the Atacama Desert is a destination like no other.  </span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Some of the highlights include Valle de la Luna (Moon Valley), Valle de Marte (Mars Valley), the Salt Mountains, El Tatio Geysers and the Puritama Hot Springs.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><h3 data-dcnode-id="2011" id="patagonia-argentina-chile"><span data-dcnode-id="2012" instrument_node="">Patagonia, Argentina/Chile</span></h3><span data-dcnode-id="2010" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2006"><img alt="" class="wp-image-8274" data-class="LazyLoad" data-dcnode-id="2009" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/El-Chaltén-Patagonia-Argentina.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/El-Chaltén-Patagonia-Argentina.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/El-Chaltén-Patagonia-Argentina.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/El-Chaltén-Patagonia-Argentina-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/El-Chaltén-Patagonia-Argentina-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Mount&nbsp;Fitz Roy&nbsp;in Patagonia, Argentina.</span></figcaption></figure><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Patagonia encompasses an enormous 400,000 square miles across Argentina and Chile and its splendour is hard to put into words.  It is contained within Los Glaciares national park in Argentina and Torres del Paine national park in Chile.  Patagonia should be on every outdoor enthusiast and hikers travel bucket list, with innumerable trails to explore.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Around each new corner, you’ll discover more awe-inspiring views.  Imagine enormous dazzling glaciers, jagged mountain peaks, turquoise glacial lakes and the wonderful wildlife, and you can start to picture the beauty of Patagonia.  </span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Patagonia is also home to the southernmost city in the world; Ushuaia.  From here you can also reach the ULTIMATE dream destination…</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h2 data-dcnode-id="1992" id="the-ultimate-dream-destination-antarctica"><span class="ez-toc-section" data-dcnode-id="1995" id="The_ULTIMATE_Dream_Destination_Antarctica"></span><span data-dcnode-id="1994" instrument_node="">The ULTIMATE Dream Destination: Antarctica</span><span class="ez-toc-section-end" data-dcnode-id="1993"></span></h2><span data-dcnode-id="1991" instrument_node="">

</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Visiting Antarctica was long a dream destination for me and when I got to visit in 2016, it far surpassed every expectation.  It is worth noting that it is only possible to visit Antarctica by cruise, but it is a cruise unlike any other.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">As you leave the dock, you’ll soon find yourself accompanied by penguins, whales and seals splashing alongside the boat.  Then as you lose sight of the land behind you, icebergs start to float by, increasing into enormous natural ice sculptures size as you near the southernmost continent.  </span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1951" instrument_node="">Antarctica is a wilderness like no other.  Experience untouched landscapes, sharing the destination with only the immense wildlife.  Waddle alongside some of the many different (but all seemingly equally clumsy) </span><strong data-dcnode-id="1948"><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.passportandpixels.com/types-of-penguins-in-antarctica-a-photo-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1950" instrument_node="">types of penguin in Antarctica</span></a></strong><span data-dcnode-id="1947" instrument_node="">.  Kayak amongst floating ice sculptures and even spend the night camping on the ice.  No matter what, you’re guaranteed a once-in-a-lifetime experience!</span></p><span data-dcnode-id="1945" instrument_node="">
</span><h2 data-dcnode-id="1941" id="dream-destinations-in-australia-and-new-zealand"><span class="ez-toc-section" data-dcnode-id="1944" id="Dream_Destinations_in_Australia_and_New_Zealand"></span><span data-dcnode-id="1943" instrument_node="">Dream Destinations in Australia and New Zealand</span><span class="ez-toc-section-end" data-dcnode-id="1942"></span></h2><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1931"><strong data-dcnode-id="1937"><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/destinations/oceania-travel-guides/australia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1939" instrument_node="">Australia</span></a></strong><span data-dcnode-id="1936" instrument_node=""> and </span><strong data-dcnode-id="1933"><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/category/destinations/oceania-travel-guides/new-zealand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1935" instrument_node="">New Zealand</span></a></strong><span data-dcnode-id="1932" instrument_node=""> provide a wealth of diverse landscapes and have flora and fauna found nowhere else in the world.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Australia is a unique destination: it is an island, country and continent!  This vast country with some of the most varied landscapes on Earth.  Home to everything from snow-capped mountains (albeit smaller ones than its southern neighbour) to arid dusty desserts, ancient tropical rainforests, pure white sand beaches and the largest coral reef system on Earth.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1926" instrument_node="">New Zealand or Aotearoa, as it’s known in Maori, is renowned for being the capital of adventure and outdoor activities.  If you’re a nature lover then New Zealand would be the perfect holiday bucket list destination for you!  For photographers, </span><strong data-dcnode-id="1923"><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/new-zealand-landscape-photography/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1925" instrument_node="">New Zealand landscapes</span></a></strong><span data-dcnode-id="1922" instrument_node=""> are some of the best in the world, with a range of geographical features including volcanoes, geothermal springs, snowy mountains, alpine lakes, forest, sounds and beaches!</span></p><span data-dcnode-id="1920" instrument_node="">
</span><h3 data-dcnode-id="1918" id="mackenzie-region-new-zealand"><span data-dcnode-id="1919" instrument_node="">Mackenzie Region, New Zealand</span></h3><span data-dcnode-id="1917" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1913"><img alt="The road to Mt Cook, New Zealand is a dream destination in itself! " class="wp-image-4152" data-class="LazyLoad" data-dcnode-id="1916" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-1440x960.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-1440x960.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-1440x960.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-600x400.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-1536x1025.jpg 1536w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island-800x534.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Mt-Cook-south-island.jpg 2000w" height="960" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">The road to Mt Cook is a dream destination in itself!</span></figcaption></figure><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">The Mackenzie region of New Zealand includes the mighty Southern Alps, home to the two tallest mountains in New Zealand; Aoraki/Mt Cook and Mt Tasman.  The area is also famed for its impossibly crystal-blue glacial lakes; Lake Tekapo, Lake Pukaki and Lake Ohau.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1908" instrument_node="">Mt Cook National Park is also an International Dark Sky Reserve, making it the perfect place for </span><strong data-dcnode-id="1905"><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/stacking-night-photography/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1907" instrument_node="">astrophotography</span></a></strong><span data-dcnode-id="1904" instrument_node="">.  One of our all-time favourite night sky photos was taken at Hooker Lake and was even featured on the cover of the Mackenzie Tourism brochure!</span></p><span data-dcnode-id="1902" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1897"><figure class="aligncenter size-medium" data-dcnode-id="1898"><img alt="Mackenzie Region New Zealand tourism brochure featuring night sky photography at Hooker Lake by We Dream of Travel" class="wp-image-4770" data-class="LazyLoad" data-dcnode-id="1901" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Mackenzie-Visitor-Guide-New-Zealand-Itinerary-360x764.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Mackenzie-Visitor-Guide-New-Zealand-Itinerary-360x764.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Mackenzie-Visitor-Guide-New-Zealand-Itinerary-360x764.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Mackenzie-Visitor-Guide-New-Zealand-Itinerary.jpg 584w" height="764" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank-p.png&amp;raw" width="360"><figcaption data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Our image from Hooker Lake on the cover of the Mackenzie Region tourism brochure!</span></figcaption></figure></div><span data-dcnode-id="1896" instrument_node="">
</span><h3 data-dcnode-id="1894" id="fiordland-national-park-new-zealand"><span data-dcnode-id="1895" instrument_node="">Fiordland National Park, New Zealand</span></h3><span data-dcnode-id="1893" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1889"><img alt="A waterfall and rainbow in Milford Sound, Fiordland National Park, New Zealand - a dream destination to visit." class="wp-image-5197" data-class="LazyLoad" data-dcnode-id="1892" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Milford-Sound-Day-Cruise.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Milford-Sound-Day-Cruise.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Milford-Sound-Day-Cruise.jpg 1400w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Milford-Sound-Day-Cruise-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Milford-Sound-Day-Cruise-595xh.jpg 595w" height="934" sizes="(max-width: 1400px) 100vw, 1400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1400"><figcaption data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">The impressive Milford Sounds in Fiordland National Park.</span></figcaption></figure><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Tucked into the southwest corner of New Zealand’s South Island is the expansive Fiordland National Park.  This majestic, unspoilt wilderness is dominated by thousand-foot high cliffs with cascading waterfalls surrounding tranquil waters.  It is also home to unique wildlife including the Fiordland crested penguin, found nowhere else in the world.  </span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1884" instrument_node="">While a trip from </span><strong data-dcnode-id="1881"><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/queenstown-to-milford-sound/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1883" instrument_node="">Queenstown to Milford Sound</span></a></strong><span data-dcnode-id="1880" instrument_node=""> is included on most people’s </span><strong data-dcnode-id="1877"><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/new-zealand-south-island-7-day-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1879" instrument_node="">New Zealand itinerary</span></a></strong><span data-dcnode-id="1876" instrument_node="">, it’s also well worth a trip to the lesser-visited </span><strong data-dcnode-id="1873"><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/doubtful-sounds-overnight-cruise/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1875" instrument_node="">Doubtful Sound</span></a></strong><span data-dcnode-id="1872" instrument_node="">; the largest of the fjords.</span></p><span data-dcnode-id="1870" instrument_node="">
</span><h3 data-dcnode-id="1868" id="queenstown-new-zealand"><span data-dcnode-id="1869" instrument_node="">Queenstown, New Zealand</span></h3><span data-dcnode-id="1867" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1863"><img alt="Picturesque roads lead you to Queenstown, New Zealand - the ultimate destination for adventure." class="wp-image-4829" data-class="LazyLoad" data-dcnode-id="1866" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Queenstown-South-Island.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Queenstown-South-Island.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Queenstown-South-Island.jpg 1400w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Queenstown-South-Island-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Road-to-Queenstown-South-Island-595xh.jpg 595w" height="933" sizes="(max-width: 1400px) 100vw, 1400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1400"><figcaption data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Picturesque roads lead you to Queenstown.</span></figcaption></figure><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1861" instrument_node="">Queenstown in </span><strong data-dcnode-id="1858"><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/new-zealand-south-island-7-day-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1860" instrument_node="">New Zealand</span></a></strong><span data-dcnode-id="1857" instrument_node=""> is one of the best destinations out there for adventure sports!  Set against the backdrop of the aptly-named Remarkables mountain range, Queenstown provides year-round fun from bungee jumping to skiing, snowboarding, white water rafting, mountain biking, hiking, jet-boating and parasailing, to name just a few!</span></p><span data-dcnode-id="1855" instrument_node="">
</span><h3 data-dcnode-id="1853" id="wanaka-new-zealand"><span data-dcnode-id="1854" instrument_node="">Wanaka, New Zealand</span></h3><span data-dcnode-id="1852" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1848"><img alt="The heavenly mountain views from Roys Peak hike in Wanaka, New Zealand" class="wp-image-4413" data-class="LazyLoad" data-dcnode-id="1851" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-1440x952.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-1440x952.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-1440x952.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-600x397.jpg 600w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-360x238.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-1536x1015.jpg 1536w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography-800x529.jpg 800w, https://www.wedreamoftravel.com/wp-content/uploads/2020/05/Jumping-Roys-Peak-Track-Photography.jpg 2000w" height="952" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Take in the heavenly views from Roy’s Peak in Wanaka.</span></figcaption></figure><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1846" instrument_node="">Whether you’re </span><strong data-dcnode-id="1843"><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/campervanning-new-zealand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1845" instrument_node="">campervanning New Zealand</span></a></strong><span data-dcnode-id="1842" instrument_node=""> or on a well-deserved vacation, you shouldn’t miss a stop at Wanaka.  With incredible day hikes such as </span><strong data-dcnode-id="1839"><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/roys-peak-track-hike/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1841" instrument_node="">Roy’s Peak</span></a></strong><span data-dcnode-id="1838" instrument_node=""> and Rocky Mountain, as well as the </span><strong data-dcnode-id="1835"><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/new-zealand-landscape-photography/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1837" instrument_node="">NZ landscape photography</span></a></strong><span data-dcnode-id="1834" instrument_node=""> favourite “that Wanaka tree”, there’s plenty of beauty in this small town.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><h3 data-dcnode-id="1830" id="mcclaren-park-glow-worms-new-zealand"><span data-dcnode-id="1831" instrument_node="">McClaren Park (Glow Worms), New Zealand</span></h3><span data-dcnode-id="1829" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1825"><img alt="Glow worms surround a small but beautiful waterfall in McLaren Park in New Zealand." class="wp-image-8911" data-class="LazyLoad" data-dcnode-id="1828" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Glow-Worms-New-Zealand.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Glow-Worms-New-Zealand.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Glow-Worms-New-Zealand.jpg 1440w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Glow-Worms-New-Zealand-360x298.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2021/01/Glow-Worms-New-Zealand-595xh.jpg 595w" height="1190" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1440"><figcaption data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Glow worms surround a small but beautiful waterfall in McLaren Park in New Zealand.</span></figcaption></figure><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">There is a miraculous little creature found natively in one place on Earth.  The bioluminescent “glow worms” shine in the dark like fallen stars and are incredible.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">There are a number of places you can see glow worms in varying magnitudes, most of which are caves, but there is one place where you can see them at home next to a waterfall!  That place is McLaren Park in New Zealand’s North Island.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Turn off the flashlight and wait as the blue dots begin to pop up all around you while a small waterfall rumbles softly and try to remember that this is real life!</span></p><span data-dcnode-id="1815" instrument_node="">
</span><h3 data-dcnode-id="1813" id="wai-o-tapo-new-zealand"><span data-dcnode-id="1814" instrument_node="">Wai-o-Tapo, New Zealand</span></h3><span data-dcnode-id="1812" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1808"><img alt="Wai-O-Tapu Geothermal Wonderland, New Zealand." class="wp-image-8303" data-class="LazyLoad" data-dcnode-id="1811" data-jpibfi-description="" data-jpibfi-post-excerpt="A list of 101+ dream destinations for every travel bucket list to inspire wanderlust and help you plan your next vacation." data-jpibfi-post-title="101+ Dream Destinations: The Travel Lover’s Ultimate Bucket List" data-jpibfi-post-url="https://www.wedreamoftravel.com/dream-destinations/" data-jpibfi-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Wai-O-Tapu-Geothermal-Wonderland.jpg" data-src="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Wai-O-Tapu-Geothermal-Wonderland.jpg" data-srcset="https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Wai-O-Tapu-Geothermal-Wonderland.jpg 1200w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Wai-O-Tapu-Geothermal-Wonderland-360x240.jpg 360w, https://www.wedreamoftravel.com/wp-content/uploads/2020/11/Wai-O-Tapu-Geothermal-Wonderland-595xh.jpg 595w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/wp-content/uploads/blank.png&amp;raw" width="1200"><figcaption data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Wai-O-Tapu Geothermal Wonderland, New Zealand.</span></figcaption></figure><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Part of the Taupo Volcanic Zone, Wai-O-Tapu Thermal Wonderland is an area of world-famous geothermal elements.  A number of short trails traverse a collection of hot springs, spouting geysers, bubbling mud and surreally coloured mineral pools, from orange to fluorescent green!  </span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">It’s a popular place to visit in New Zealand and it’s of no surprise when you marvel at the surreal landscape here that has been sculpted by millennia of volcanic activity</span></p><span data-dcnode-id="1801" instrument_node="">
</span><h3 data-dcnode-id="1799" id="melbourne-australia"><span data-dcnode-id="1800" instrument_node="">Melbourne, Australia</span></h3><span data-dcnode-id="1798" instrument_node="">
