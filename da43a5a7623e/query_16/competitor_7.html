</span><header class="entry-header clr" data-dcnode-id="3215"><span data-dcnode-id="3219" instrument_node="">
</span><h1 class="single-post-title entry-title" data-dcnode-id="3217" itemprop="headline"><span data-dcnode-id="3218" instrument_node="">Alaska Bucket List: 13 Destinations You Must Visit (Including a Map)</span></h1><span data-dcnode-id="3216" instrument_node="">
</span></header><span data-dcnode-id="3214" instrument_node="">
</span><ul class="meta ospm-default clr" data-dcnode-id="3180"><span data-dcnode-id="3213" instrument_node="">
</span><li class="meta-author" data-dcnode-id="3207" itemprop="name"><span class="screen-reader-text" data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Post author:</span></span><i aria-hidden="true" class="icon-user" data-dcnode-id="3210" role="img"></i><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/author/traveling-anne/" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person" rel="author" title="Posts by Anne"><span data-dcnode-id="3209" instrument_node="">Anne</span></a></li><span data-dcnode-id="3206" instrument_node="">
</span><li class="meta-date" data-dcnode-id="3201" itemprop="datePublished"><span class="screen-reader-text" data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Post published:</span></span><i aria-hidden="true" class="icon-clock" data-dcnode-id="3203" role="img"></i><span data-dcnode-id="3202" instrument_node="">August 6, 2016</span></li><span data-dcnode-id="3200" instrument_node="">
</span><li class="meta-comments" data-dcnode-id="3194"><span class="screen-reader-text" data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Post comments:</span></span><i aria-hidden="true" class="icon-bubble" data-dcnode-id="3197" role="img"></i><a class="comments-link" data-dcnode-id="3195" href="#comments"><span data-dcnode-id="3196" instrument_node="">30 Comments</span></a></li><span data-dcnode-id="3193" instrument_node="">
</span><li class="meta-cat" data-dcnode-id="3188"><span class="screen-reader-text" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Reading time:</span></span><i aria-hidden="true" class="icon-cup" data-dcnode-id="3190" role="img"></i><span data-dcnode-id="3189" instrument_node="">13 mins read</span></li><span data-dcnode-id="3187" instrument_node="">
</span><li class="meta-mod-date" data-dcnode-id="3182" itemprop="dateModified"><span class="screen-reader-text" data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Post last modified:</span></span><i aria-hidden="true" class="icon-note" data-dcnode-id="3184" role="img"></i><span data-dcnode-id="3183" instrument_node="">November 7, 2019</span></li><span data-dcnode-id="3181" instrument_node="">
</span></ul><span data-dcnode-id="3179" instrument_node="">
</span><div class="entry-content clr" data-dcnode-id="1671" itemprop="text"><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3176" style="font-size: 0.8em;color:#999999; font-style: italic;"><span data-dcnode-id="3177" instrument_node="">Disclosure: We may get commissions for purchases made through links in this post.</span></p><p data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Looks like&nbsp;Alaska is our next major destination! I blogged about this before and now it's time to put together our "Alaska Bucket List": A list of the destinations that you absolutely must visit in Alaska.</span></p><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Mountains, lakes, glaciers and waterfalls...&nbsp;Alaska sounds like a dream destination. We will probably only have one month to spend in Alaska. Obviously, we want to make the most of the&nbsp;trip by focusing on the very best this amazing state has to offer.</span></p><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">We usually prefer slow travel but our own great Alaskan adventure will need to be a tad more focused.</span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3164"><del data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Why the time constraints? We want to experience the full eclipse of August 2017, so we have to&nbsp;be near Bend, Oregon for that on the morning of August 21st. Once the sun re-appears, we'll be heading up north - to Alaska! Our road trip will take us through the Cassiar Highway to Alaska and then back to the Lower 48 via the Alaska Highway. And there's the rub. I don't want to be driving the Alcan late into October. Shorter days and colder weather mean a higher chance of snow and icy roads. We have very little winter driving experience, so that's something I'd rather avoid.</span></del></p><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">Update! We didn't get to see the eclipse but we did drive all the way to Alaska and back and had a super trip! You can read more about our adventures in these posts -</span></p><span data-dcnode-id="3160" instrument_node="">
</span><p data-dcnode-id="3157"><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/driving-alaska/"><span data-dcnode-id="3159" instrument_node="">Driving to Alaska and back - everything that you need to know.</span></a></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3153"><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/cost-alaska-travel/"><span data-dcnode-id="3155" instrument_node="">Our 11 tips for reducing the cost of a trip to Alaska.</span></a></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">And that's why our trip to Alaska is going to have to be on a schedule. We need to focus on the things we absolutely want to see and do. Hence, today's post.</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3148"></p><div class="toc_white no_bullets" data-dcnode-id="3085" id="toc_container"><p class="toc_title" data-dcnode-id="3140"><span data-dcnode-id="3147" instrument_node="">Contents</span><span data-dcnode-id="3146" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="3141"><span data-dcnode-id="3145" instrument_node="">[</span><a data-dcnode-id="3143" href="#"><span data-dcnode-id="3144" instrument_node="">hide</span></a><span data-dcnode-id="3142" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="3086"><li data-dcnode-id="3093"><a data-dcnode-id="3138" href="#OurAlaska_Bucket_List"><span data-dcnode-id="3139" instrument_node="">Our&nbsp;Alaska Bucket List</span></a><ul data-dcnode-id="3094"><li data-dcnode-id="3135"><a data-dcnode-id="3136" href="#1_Denali_National_Park"><span data-dcnode-id="3137" instrument_node="">1. Denali National Park</span></a></li><li data-dcnode-id="3132"><a data-dcnode-id="3133" href="#2_Glacier_Bay_National_Park"><span data-dcnode-id="3134" instrument_node="">2. Glacier Bay National Park</span></a></li><li data-dcnode-id="3129"><a data-dcnode-id="3130" href="#3_Kenai_Fjords_National_Park"><span data-dcnode-id="3131" instrument_node="">3. Kenai Fjords National Park</span></a></li><li data-dcnode-id="3126"><a data-dcnode-id="3127" href="#4_Katmai_National_Park"><span data-dcnode-id="3128" instrument_node="">4. Katmai National Park</span></a></li><li data-dcnode-id="3123"><a data-dcnode-id="3124" href="#5_Fairbanks"><span data-dcnode-id="3125" instrument_node="">5. Fairbanks</span></a></li><li data-dcnode-id="3120"><a data-dcnode-id="3121" href="#6_Chena_Hot_Springs"><span data-dcnode-id="3122" instrument_node="">6. Chena Hot Springs</span></a></li><li data-dcnode-id="3117"><a data-dcnode-id="3118" href="#7_Anchorage"><span data-dcnode-id="3119" instrument_node="">7. Anchorage</span></a></li><li data-dcnode-id="3114"><a data-dcnode-id="3115" href="#8_The_Kenai_Peninsula"><span data-dcnode-id="3116" instrument_node="">8. The Kenai Peninsula</span></a></li><li data-dcnode-id="3107"><a data-dcnode-id="3112" href="#9Girdwood_Whittier"><span data-dcnode-id="3113" instrument_node="">9.&nbsp;Girdwood &amp; Whittier</span></a><ul data-dcnode-id="3108"><li data-dcnode-id="3109"><a data-dcnode-id="3110" href="#Update_following_our_visit"><span data-dcnode-id="3111" instrument_node="">Update following our visit</span></a></li></ul></li><li data-dcnode-id="3104"><a data-dcnode-id="3105" href="#10_Valdez"><span data-dcnode-id="3106" instrument_node="">10. Valdez</span></a></li><li data-dcnode-id="3101"><a data-dcnode-id="3102" href="#11_Juneau"><span data-dcnode-id="3103" instrument_node="">11. Juneau</span></a></li><li data-dcnode-id="3098"><a data-dcnode-id="3099" href="#12_Sitka"><span data-dcnode-id="3100" instrument_node="">12. Sitka</span></a></li><li data-dcnode-id="3095"><a data-dcnode-id="3096" href="#13_Skagway_Haines"><span data-dcnode-id="3097" instrument_node="">13. Skagway &amp;&nbsp;Haines</span></a></li></ul></li><li data-dcnode-id="3090"><a data-dcnode-id="3091" href="#Is_that_it"><span data-dcnode-id="3092" instrument_node="">Is that it?</span></a></li><li data-dcnode-id="3087"><a data-dcnode-id="3088" href="#Creating_an_itinerary_for_the_Alaska_Bucket_List"><span data-dcnode-id="3089" instrument_node="">Creating an itinerary for the Alaska Bucket List</span></a></li></ul></div><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3083"></p><span data-dcnode-id="3082" instrument_node="">
</span><h2 data-dcnode-id="3079"><span data-dcnode-id="3080" id="OurAlaska_Bucket_List"><span data-dcnode-id="3081" instrument_node="">Our&nbsp;Alaska Bucket List</span></span></h2><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">This is a list of&nbsp;destinations. Not activities and not even necessarily specific places. When two towns or places are very nearby, I lumped them together into one item. That's because&nbsp;once you're "there" you can easily see both places even if takes you an hour to drive between them. You could stay in one place and "hop over" for a quick "day tour".</span></p><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Without further ado, here are my top 13 destinations in Alaska. Scroll down for an interactive map of our Alaska Bucket List destinations.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><h3 data-dcnode-id="3069"><span data-dcnode-id="3070" id="1_Denali_National_Park"><span data-dcnode-id="3071" instrument_node="">1. Denali National Park</span></span></h3><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">We absolutely love national parks. National Parks&nbsp;make our visit to a new place so much more special.&nbsp;Plus, it's Denali mountain, the highest peak in the entire United States. Visiting Denali National Park is definitely on our&nbsp;Alaska Bucket List!</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3063"><img alt="Alaska Bucket List: Denali National Park" class="alignnone wp-image-687 size-full" data-dcnode-id="3064" height="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/denali-national-park.jpg&amp;raw" width="1000"></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3061" instrument_node="">Update: check out </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/visiting-denali-national-park/"><span data-dcnode-id="3060" instrument_node="">our guide for visiting Denali</span></a><span data-dcnode-id="3058" instrument_node=""> (including how we managed to see 19 Grizzly bears in one day!)</span></p><span data-dcnode-id="3056" instrument_node="">
</span><h3 data-dcnode-id="3053"><span data-dcnode-id="3054" id="2_Glacier_Bay_National_Park"><span data-dcnode-id="3055" instrument_node="">2. Glacier Bay National Park</span></span></h3><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Watching a majestic glacier&nbsp;create its own tidal wave as it calves&nbsp;is a once-in-a-lifetime experience. To have a ranger as your guide? Even better! We want to experience that at Glacier National Park.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3048"></p><figure aria-describedby="caption-attachment-688" class="wp-caption alignnone" data-dcnode-id="3044" id="attachment_688" style="width: 1688px"><img alt="Alaska Bucket List: Margerie Glacier in Glacier Bay National Park" class="size-full wp-image-688" data-dcnode-id="3047" height="1125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/Fotolia_98398049_Subscription_Monthly_M.jpg&amp;raw" width="1688"><figcaption class="wp-caption-text" data-dcnode-id="3045" id="caption-attachment-688"><span data-dcnode-id="3046" instrument_node="">Glacier Bay, Alaska. Ice calving at Margerie Glacier in Glacier Bay National Park</span></figcaption></figure><p data-dcnode-id="3043"></p><span data-dcnode-id="3042" instrument_node="">
</span><h3 data-dcnode-id="3039"><span data-dcnode-id="3040" id="3_Kenai_Fjords_National_Park"><span data-dcnode-id="3041" instrument_node="">3. Kenai Fjords National Park</span></span></h3><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Fjords and glaciers, from land and sea. Hiking the Exit glacier definitely makes it into our Alaska Bucket List! This park is also easy to reach&nbsp;(by Alaskan standards).</span></p><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3034"></p><figure aria-describedby="caption-attachment-690" class="wp-caption alignnone" data-dcnode-id="3030" id="attachment_690" style="width: 1000px"><img alt="Alaska Bucket List: Kenai Fjords National Park" class="wp-image-690 size-full" data-dcnode-id="3033" height="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/kenai-fjords-national-park.jpg&amp;raw" width="1000"><figcaption class="wp-caption-text" data-dcnode-id="3031" id="caption-attachment-690"><span data-dcnode-id="3032" instrument_node="">Hiking Exit Glacier at Kenai Fjords National Park</span></figcaption></figure><p data-dcnode-id="3029"></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3024" instrument_node="">Update: The park was amazing, especially our cruise to see the marine glaciers and whales. You can read our </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/kenai-fjords-cruise-seward-alaska/"><span data-dcnode-id="3023" instrument_node="">Kenai Fjords Cruise report here</span></a><span data-dcnode-id="3021" instrument_node=""> along with some important tips that can help you plan your own cruise.</span></p><span data-dcnode-id="3019" instrument_node="">
</span><h3 data-dcnode-id="3016"><span data-dcnode-id="3017" id="4_Katmai_National_Park"><span data-dcnode-id="3018" instrument_node="">4. Katmai National Park</span></span></h3><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Katmai National Park should be on everyone's must-see list. You have to fly into the park and stay at the local&nbsp;lodge, making it quite&nbsp;expensive to visit (especially for a family of four). I can't leave it out of the list but whether or not we'll be visiting it during the summer of 2017 remains to be seen. What's in Katmai? In three words: Waterfalls, salmon, bear. Mix these three, pour and enjoy!</span></p><span data-dcnode-id="3012" instrument_node="">

</span><p data-dcnode-id="2468"><span data-dcnode-id="2483" instrument_node="">Enough of National Parks. Time for some Alaskan city experiences. Fairbanks is full of them. It will be the most northern city we'll have been to. Places we want to visit include </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.morristhompsoncenter.org/"><span data-dcnode-id="2482" instrument_node="">the Morris Thompson Visitor Center</span></a><span data-dcnode-id="2480" instrument_node="">,&nbsp;</span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uaf.edu/museum"><span data-dcnode-id="2479" instrument_node="">University of Alaska Museum of the North</span></a><span data-dcnode-id="2477" instrument_node="">, the&nbsp;</span><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uaf.edu/lars/"><span data-dcnode-id="2476" instrument_node="">Large Animal Research Station</span></a><span data-dcnode-id="2474" instrument_node=""> where you can see live&nbsp;muskoxen&nbsp;and</span><strong data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="2470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//old.fnsb.us/ParksandRecreation/PioneerPark/default.htm"><span data-dcnode-id="2471" instrument_node="">Pioneer Park</span></a><span data-dcnode-id="2469" instrument_node="">&nbsp;with many attractions including the one where you can experience&nbsp;40 below zero...</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2466"></p><figure aria-describedby="caption-attachment-701" class="wp-caption alignnone" data-dcnode-id="2462" id="attachment_701" style="width: 1688px"><img alt="Alaska Bucket List: Fairbanks" class="wp-image-701 size-full" data-dcnode-id="2465" height="1125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/Fotolia_4836326_Subscription_Monthly_M.jpg&amp;raw" width="1688"><figcaption class="wp-caption-text" data-dcnode-id="2463" id="caption-attachment-701"><span data-dcnode-id="2464" instrument_node="">Fairbanks, Alaska</span></figcaption></figure><p data-dcnode-id="2461"></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Update: Been there, done that! Have the posts to show for that too:</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2444"><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/our-lars-fairbanks-trip-report/"><span data-dcnode-id="2456" instrument_node="">Visiting LARS</span></a><span data-dcnode-id="2454" instrument_node="">, visiting the </span><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/the-georgeson-botanical-garden-in-fairbanks-alaska-trip-report/"><span data-dcnode-id="2453" instrument_node="">Georgeson botanical garden in Fairbanks</span></a><span data-dcnode-id="2451" instrument_node="">, and you should also read these two posts: </span><a data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/visiting-fairbanks-alaska/"><span data-dcnode-id="2450" instrument_node="">Fun things to do in Fairbanks</span></a><span data-dcnode-id="2448" instrument_node=""> and </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/cheap-hotels-in-fairbanks/"><span data-dcnode-id="2447" instrument_node="">How to find a relatively cheap hotel in Fairbanks</span></a><span data-dcnode-id="2445" instrument_node="">.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><h3 data-dcnode-id="2440"><span data-dcnode-id="2441" id="6_Chena_Hot_Springs"><span data-dcnode-id="2442" instrument_node="">6. Chena Hot Springs</span></span></h3><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">North of Fairbanks are these amazing hot springs. I can only imagine what it's like dipping in hot springs during winter time. I'm hoping a summertime experience will be awesome enough to justify a spot on this list.</span></p><span data-dcnode-id="2436" instrument_node="">

4" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1942" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1937"><use class="ytp-svg-shadow" data-dcnode-id="1939" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1940" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1938" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1933"><use class="ytp-svg-shadow" data-dcnode-id="1935" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1936" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1934" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=hSE4cpjDXQA" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="1914" instrument_node="">
</span><h3 data-dcnode-id="1911"><span data-dcnode-id="1912" id="7_Anchorage"><span data-dcnode-id="1913" instrument_node="">7. Anchorage</span></span></h3><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node="">Speaking of Alaskan cities, we have to visit the largest one, Anchorage. Our itinerary could possibly&nbsp;include the&nbsp;</span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anchoragemuseum.org/"><span data-dcnode-id="1908" instrument_node="">Anchorage Museum&nbsp;at&nbsp;Rasmuson Center</span></a><span data-dcnode-id="1906" instrument_node=""> or&nbsp;the </span><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alaskaairmuseum.org/"><span data-dcnode-id="1905" instrument_node="">Alaska Air Museum</span></a><span data-dcnode-id="1903" instrument_node=""> and possibly Kincaid park. Which is just another big city park. Only with moose.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1900"></p><figure aria-describedby="caption-attachment-691" class="wp-caption alignnone" data-dcnode-id="1896" id="attachment_691" style="width: 1000px"><img alt="Alaska Bucket List: Moose at Kincaid Park" class="size-full wp-image-691" data-dcnode-id="1899" height="818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/moose-at-kincaid-park-ancho.jpg&amp;raw" width="1000"><figcaption class="wp-caption-text" data-dcnode-id="1897" id="caption-attachment-691"><span data-dcnode-id="1898" instrument_node="">Moose at Kincaid Park</span></figcaption></figure><p data-dcnode-id="1895"></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1893" instrument_node="">Update! Read these posts which were written following our visit: </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/things-to-do-in-anchorage-alaska/"><span data-dcnode-id="1892" instrument_node="">Fun things to do in Anchorage</span></a><span data-dcnode-id="1890" instrument_node="">&nbsp;and if you're traveling with kids, maybe also </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/anchorage-hotels-with-pools/"><span data-dcnode-id="1889" instrument_node="">Anchorage hotels that have swimming pools</span></a><span data-dcnode-id="1887" instrument_node="">. Oh, and Kincaid park itself was a bit disappointing. We didn't see any moose and just wandered around a large and fairly empty city park.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><h3 data-dcnode-id="1882"><span data-dcnode-id="1883" id="8_The_Kenai_Peninsula"><span data-dcnode-id="1884" instrument_node="">8. The Kenai Peninsula</span></span></h3><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Technically, it's a second mention on this list. Kenai Fjords National Park is on the Kenai Peninsula. Adding it here because there's more to the peninsula than the park itself. We definitely plan on making a road trip to the western side of the peninsula and visiting the fishing town of Homer as well.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><img alt="Alaska Bucket List: Homer, Kenai Peninsula, Alaska" class="alignnone size-full wp-image-693" data-dcnode-id="1877" height="555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/homer-alaska.jpg&amp;raw" width="1000"></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1874" instrument_node="">Update: So, we didn't visit Homer but we had a blast at the Kenai Peninsula. We took </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/kenai-fjords-cruise-seward-alaska/"><span data-dcnode-id="1873" instrument_node="">a cruise to see the Kenai Fjords</span></a><span data-dcnode-id="1871" instrument_node="">, and also visited some great places in Seward itself, including the Sealife center. </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/things-seward-alaska/"><span data-dcnode-id="1870" instrument_node="">Here's more about what you can do at Seward, Alaska</span></a><span data-dcnode-id="1868" instrument_node="">.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><h3 data-dcnode-id="1863"><span data-dcnode-id="1864" id="9Girdwood_Whittier"><span data-dcnode-id="1865" instrument_node="">9.&nbsp;Girdwood &amp; Whittier</span></span></h3><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1861" instrument_node="">This small resort town makes it into the Alaska Bucket List for several reasons. The&nbsp;</span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alyeskaresort.com/resort/about-aerial-tram.aspx"><span data-dcnode-id="1860" instrument_node="">Alyeska Aerial Tram</span></a><span data-dcnode-id="1858" instrument_node="">&nbsp;is one, </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fs.usda.gov/Internet/FSE_DOCUMENTS/stelprdb5320145.pdf"><span data-dcnode-id="1857" instrument_node="">Portage Glacier</span></a><span data-dcnode-id="1855" instrument_node=""> is another. I think the&nbsp;</span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskawildlife.org/"><span data-dcnode-id="1854" instrument_node="">Alaska Wildlife Conservation Center</span></a><span data-dcnode-id="1852" instrument_node=""> will be hugely attractive for us as well. Locals say that driving the Whittier tunnel in a must-do so visiting the town of Whittier also made&nbsp;it into our&nbsp;Alaska Bucket List.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1849"></p><figure aria-describedby="caption-attachment-694" class="wp-caption alignnone" data-dcnode-id="1845" id="attachment_694" style="width: 1000px"><img alt="Alaska Bucket List: Portage Glacier" class="size-full wp-image-694" data-dcnode-id="1848" height="662" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/portage-glacier.jpg&amp;raw" width="1000"><figcaption class="wp-caption-text" data-dcnode-id="1846" id="caption-attachment-694"><span data-dcnode-id="1847" instrument_node="">Portage Glacier near Girdwood and Whittier</span></figcaption></figure><p data-dcnode-id="1844"></p><span data-dcnode-id="1843" instrument_node="">
</span><h4 data-dcnode-id="1840"><span data-dcnode-id="1841" id="Update_following_our_visit"><span data-dcnode-id="1842" instrument_node="">Update following our visit</span></span></h4><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">So, Whittier was a no-go. We got to Portage Glacier and really enjoyed their visitor center but the weather outside was abysmal (in August!). The rain and wind were so bad we barely managed to hop out of the car and get to the visitors center and back. We were told that Whittier had the same weather that day, so we chose to drive on to Anchorage rather than cross the tunnel.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The Portage glacier area looked spectacular, as far as we could tell through the rain. We'll definitely be back someday.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">As for Girdwood, we spent a few hours in the Alaska Wildlife Conservation Center and had a great time. Lovely visit, even in somewhat gloomy weather. If you go, I recommend wearing hiking boots because it was kinda muddy out there.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><h3 data-dcnode-id="1827"><span data-dcnode-id="1828" id="10_Valdez"><span data-dcnode-id="1829" instrument_node="">10. Valdez</span></span></h3><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1825" instrument_node="">If the name sounds familiar it could be because of the 1989 Exxon-Valdez oil&nbsp;spill, or possibly even the earthquake of 1964. </span><a data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.valdezmuseum.org/"><span data-dcnode-id="1824" instrument_node="">The Valdez Museum</span></a><span data-dcnode-id="1822" instrument_node=""> tells the story of both of these catastrophes as well as other local historical events. However, </span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.valdezalaska.org/discover-valdez-maps-trails/keystone-canyon-pack-trail"><span data-dcnode-id="1821" instrument_node="">Keystone Canyon</span></a><span data-dcnode-id="1819" instrument_node=""> and the </span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dnr.alaska.gov/parks/aspunits/kenai/worthglsrs.htm"><span data-dcnode-id="1818" instrument_node="">Worthington Glacie</span></a><span data-dcnode-id="1816" instrument_node="">r are the places which earned Valdez its spot in the list.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><img alt="Alaska Bucket List: Valdez" class="alignnone size-full wp-image-695" data-dcnode-id="1813" height="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/valdez.jpg&amp;raw" width="1000"></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">Update: Loved Valdez! Saw all of the places I mentioned above as well as the Salomon Hatchery where we saw sea lions, seals, a bear and an unbelievable number of salmon fish - just about everywhere, including on the road! You can read more about them in </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/valdez-alaska/"><span data-dcnode-id="1809" instrument_node="">our post about the best things to do in Valdez, AK</span></a><span data-dcnode-id="1807" instrument_node="">.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><h3 data-dcnode-id="1802"><span data-dcnode-id="1803" id="11_Juneau"><span data-dcnode-id="1804" instrument_node="">11. Juneau</span></span></h3><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Getting into the Inside Passage could take us to&nbsp;Juneau, the capital of Alaska. The wet and relatively warm climate makes Juneau an ideal area for hiking the cold rainforests and visiting local gardens. Mendenhall Glacier alone is an Alaska Bucket List item in its own right. There are no roads connecting&nbsp;Juneau to the rest of Alaska, so whether or not it'll make it into our road trip itinerary is still a mystery.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><img alt="Alaska Bucket List: Mendenhall Glacier, Juneau" class="alignnone size-full wp-image-696" data-dcnode-id="1797" height="664" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/mendenhall-glacier.jpg&amp;raw" width="1000"></p><span data-dcnode-id="1795" instrument_node="">
</span><h3 data-dcnode-id="1792"><span data-dcnode-id="1793" id="12_Sitka"><span data-dcnode-id="1794" instrument_node="">12. Sitka</span></span></h3><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">If we do end up visiting the Inside Passage than Sitka is another Bucket List item. With a combination of native and Russian history, Sitka is home to the Sikta Historic National Park. The town and its surroundings combine a myriad of natural and cultural attractions.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><img alt="Alaska Bucket List: Sitka" class="alignnone size-full wp-image-697" data-dcnode-id="1787" height="1126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/Fotolia_109753103_Subscription_Monthly_M.jpg&amp;raw" width="1687"></p><span data-dcnode-id="1785" instrument_node="">
</span><h3 data-dcnode-id="1782"><span data-dcnode-id="1783" id="13_Skagway_Haines"><span data-dcnode-id="1784" instrument_node="">13. Skagway &amp;&nbsp;Haines</span></span></h3><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1780" instrument_node="">Skagway - &nbsp;which can actually be reached via a land road - offers travelers a taste of the historic Gold Rush. You can visit the&nbsp;Klondike historic national park or ride&nbsp;the famous </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wpyr.com/"><span data-dcnode-id="1779" instrument_node="">White Pass &amp; Yukon train</span></a><span data-dcnode-id="1777" instrument_node="">. Haines, on the other side of the Chilkoot inlet, can be reached via a short ferry ride and offers a more relaxed Alaskan experience.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1774"></p><figure aria-describedby="caption-attachment-698" class="wp-caption alignnone" data-dcnode-id="1770" id="attachment_698" style="width: 1688px"><img alt="Alaska Bucket List: Skagway " class="size-full wp-image-698" data-dcnode-id="1773" height="1125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/wp-content/uploads/2016/08/Fotolia_3605882_Subscription_Monthly_M.jpg&amp;raw" width="1688"><figcaption class="wp-caption-text" data-dcnode-id="1771" id="caption-attachment-698"><span data-dcnode-id="1772" instrument_node="">Cruise ship docked in Skagway</span></figcaption></figure><p data-dcnode-id="1769"></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">Haines was awesome. We got to see a Grizzly bear from just yards away. You can see the video of that encounter and find </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/haines-alaska/"><span data-dcnode-id="1766" instrument_node="">the list of things to do in Haines in this post</span></a><span data-dcnode-id="1764" instrument_node="">.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><h2 data-dcnode-id="1759"><span data-dcnode-id="1760" id="Is_that_it"><span data-dcnode-id="1761" instrument_node="">Is that it?</span></span></h2><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Well, of course not! There are tons more to do and see in Alaska, I'm sure. Researching for the trip, I found other places that I know we'd enjoy visiting. Tremendously! I think these 13 places are a great start though.&nbsp;That's why it's an "Alaska Bucket List" - it includes the places which I think are an absolute "must-see" in the state. There are many others which fall into the "you really should see if you can" category as well (that's not a bad category at all!).</span></p><span data-dcnode-id="1755" instrument_node="">
</span><h2 data-dcnode-id="1752"><span data-dcnode-id="1753" id="Creating_an_itinerary_for_the_Alaska_Bucket_List"><span data-dcnode-id="1754" instrument_node="">Creating an itinerary for the Alaska Bucket List</span></span></h2><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">This post also allows me to share the way I plan our trips. The very first stage is making a list of all the places we want to visit in a country or region.&nbsp;See above? Check!</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Next, I place the places on a map, to see where everything is. Sharing this map here as well. It's an interactive Google Map, so you can enlarge it, zoom in and out and generally play around. If you click on the icon that's at the top-left corner, it will open up a menu with the names of the places. Click any of them to see where it is on the map and get more info about it.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1692"><iframe data-dcnode-id="1693" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/embed%3Fmid%3D1x-js5KSCEblyvzXGqMrDwEUPokI&amp;raw" width="640"><html data-dcnode-id="1695" itemscope="" itemtype="http://schema.org/WebSite"><head data-dcnode-id="1722"><meta charset="utf-8"><title data-dcnode-id="1742" itemprop="name">Alaska Bucket List - Google My Maps</title><meta content="IE=edge,chrome=1" data-dcnode-id="1741" http-equiv="X-UA-Compatible"/><meta content="initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0,width=device-width" data-dcnode-id="1740" name="viewport"/><meta content="Find out more at www.TripMemos.com" data-dcnode-id="1739" itemprop="description" name="description"/><meta content="https://www.google.com/maps/d/viewer?mid=1x-js5KSCEblyvzXGqMrDwEUPokI" data-dcnode-id="1738" itemprop="url"/><meta content="https://www.google.com/maps/d/thumbnail?mid=1x-js5KSCEblyvzXGqMrDwEUPokI" data-dcnode-id="1737" itemprop="image"/><meta content="website" data-dcnode-id="1736" property="og:type"/><meta content="Alaska Bucket List - Google My Maps" data-dcnode-id="1735" property="og:title"/><meta content="Find out more at www.TripMemos.com" data-dcnode-id="1734" property="og:description"/><meta content="https://www.google.com/maps/d/viewer?mid=1x-js5KSCEblyvzXGqMrDwEUPokI" data-dcnode-id="1733" property="og:url"/><meta content="https://www.google.com/maps/d/thumbnail?mid=1x-js5KSCEblyvzXGqMrDwEUPokI" data-dcnode-id="1732" property="og:image"/><meta content="Google My Maps" data-dcnode-id="1731" property="og:site_name"/><meta content="summary_large_image" data-dcnode-id="1730" name="twitter:card"/><meta content="Alaska Bucket List - Google My Maps" data-dcnode-id="1729" name="twitter:title"/><meta content="Find out more at www.TripMemos.com" data-dcnode-id="1728" name="twitter:description"/><meta content="https://www.google.com/maps/d/thumbnail?mid=1x-js5KSCEblyvzXGqMrDwEUPokI" data-dcnode-id="1727" name="twitter:image:src"/><link data-dcnode-id="1726" href="https://www.gstatic.com/mapspro/_/ss/k=mapspro.gmeviewer.5yKvTbHncR4.L.W.O/d=0/rs=ABjfnFUGvQdE5pFHXnKJ_L-WkHwWgCdC-w" id="gmeviewer-styles" nonce="" rel="stylesheet"/><link data-dcnode-id="1725" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" nonce="" rel="stylesheet"/><link data-dcnode-id="1724" href="https://www.gstatic.com/mapspro/images/favicon-001.ico" rel="shortcut icon"/><link data-dcnode-id="1723" href="https://www.google.com/mymaps/viewer?mid=1x-js5KSCEblyvzXGqMrDwEUPokI&amp;hl=en_US" rel="canonical"/></meta></head><body data-dcnode-id="1696" jsaction="click:cOuCgd;" jscontroller="O1VPAb"><div class="c4YZDc HzV7m-b7CEbf SfQLQb-dIxMhd-bN97Pc-b3rLgd" data-dcnode-id="1697"><div class="jQhVs-haAclf" data-dcnode-id="1715"><div class="jQhVs-uMX1Ee-My5Dr-purZT-uDEFge" data-dcnode-id="1716"><div class="jQhVs-uMX1Ee-My5Dr-purZT-uDEFge-bN97Pc" data-dcnode-id="1717"><div class="jQhVs-uMX1Ee-My5Dr-purZT-uDEFge-Bz112c" data-dcnode-id="1721"></div><div class="jQhVs-uMX1Ee-My5Dr-purZT-uDEFge-fmcmS-haAclf" data-dcnode-id="1718"><div class="jQhVs-uMX1Ee-My5Dr-purZT-uDEFge-fmcmS" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Open full screen to view more</span></div></div></div></div></div><div class="i4ewOd-haAclf" data-dcnode-id="1713"><div class="i4ewOd-UzWXSb" data-dcnode-id="1714" id="map-canvas"></div></div><div class="X3SwIb-haAclf NBDE7b-oxvKad" data-dcnode-id="1711"><div class="X3SwIb-i8xkGf" data-dcnode-id="1712"></div></div><div class="Te60Vd-ZMv3u dIxMhd-bN97Pc-b3rLgd" data-dcnode-id="1704"><div class="dIxMhd-bN97Pc-Tswv1b-Bz112c" data-dcnode-id="1710"></div><div class="dIxMhd-bN97Pc-b3rLgd-fmcmS" data-dcnode-id="1706"><span data-dcnode-id="1709" instrument_node="">This map was created by a user. </span><a data-dcnode-id="1707" href="https://support.google.com/mymaps/answer/3024454?hl=en&amp;amp;ref_topic=3188329" target="_blank"><span data-dcnode-id="1708" instrument_node="">Learn how to create your own.</span></a></div><div class="dIxMhd-bN97Pc-b3rLgd-TvD9Pc" data-dcnode-id="1705" title="Close"></div></div></div></body></html></iframe></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Seeing the destinations on a map like this helps me start to plan our itinerary. Now I can tell which places are close to one another and what would make a sensible route. My next posts on this topic will include -</span></p><span data-dcnode-id="1688" instrument_node="">
</span><ul data-dcnode-id="1676"><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1683"><strong data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Similar lists for traveling in Northern British Columbia and in the Yukon</span></strong><span data-dcnode-id="1684" instrument_node="">. Southern British Columbia and the Canadian Rockies deserve their own Bucket lists, for sure. I will post these as well at some point (using our own photos too!)</span></li><span data-dcnode-id="1682" instrument_node="">
</span><li data-dcnode-id="1678"><strong data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Travel Itineraries for Alaska and for driving the Stewart-Cassiar road and The Alaskan Highway</span></strong><span data-dcnode-id="1679" instrument_node="">.</span></li><span data-dcnode-id="1677" instrument_node="">
</span></ul><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">So, what do you think? Did I forget something really important? Have you visited any of these destinations or are you going to? Let me know in the comments!</span></p><span data-dcnode-id="1672" instrument_node="">
</span></div><span data-dcnode-id="1670" instrument_node="">

</span><p data-dcnode-id="1060"><span data-dcnode-id="1070" instrument_node="">Hi Niki,</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
Let me start by saying that I think it would be hard to go wrong with pretty much any itinerary in Alaska! The cruise lines usually include places such as Juneau and other places that can’t be reached by road so it’s a good option in its own right. The cruise would also give you an opportunity to see some of the coastline glaciers etc. It really depends on the cruise itself. You can then add a 10-day long road trip taking in Anchorage, Fairbanks, Denali National Park, Seward etc. Or you could do three weeks on land, including Valdez, and then take a single-day cruise out of Seward and maybe another one from Valdez.</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
As I said, there are no bad choices here!</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
As for dates, anytime between mid-June and mid-September should be ok. Won’t be too cold and everything should be open. You may also want to check out </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/category/north-america-travel/alaska-travel/"><span data-dcnode-id="1063" instrument_node="">my other posts about Alaska here</span></a><span data-dcnode-id="1061" instrument_node="">. There are more tips and advice based on our own road trip there in 2017.</span></p><span data-dcnode-id="1059" instrument_node="">

</span><p data-dcnode-id="847"><span data-dcnode-id="861" instrument_node="">Hi Eileen,</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
There aren’t too many roads in Alaska, so a basic land itinerary is actually surprisingly simple. I should probably write an entire post on that sometime. Essentially, if you start in Anchorage, you should spend 3-4 days in the Kenai Peninsula (</span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/things-seward-alaska/"><span data-dcnode-id="858" instrument_node="">Seward</span></a><span data-dcnode-id="856" instrument_node="">) and then drive the circle that goes like this: Anchorage – Valdez detour – Tok Junction – </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/visiting-fairbanks-alaska/"><span data-dcnode-id="855" instrument_node="">Fairbanks</span></a><span data-dcnode-id="853" instrument_node=""> – </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/visiting-denali-national-park/"><span data-dcnode-id="852" instrument_node="">Denali</span></a><span data-dcnode-id="850" instrument_node=""> – Anchorage.</span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
Just how to divide your days depends on your budget and preferences – there’s plenty to do in each destination! You can click the links I added for my posts about these destinations. Enjoy your trip!</span></p><span data-dcnode-id="846" instrument_node="">

</span><div class="comment-content" data-dcnode-id="754"><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="771" instrument_node="">Sorry about the delay here, Ashley. I had some server issues and had to deal with that first.</span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">
I assume your starting and ending point would be Anchorage? If so, I would do the following – Drive up to Denali for 3-4 days and go into the park twice to include some hiking in the visit. You can </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/visiting-denali-national-park/"><span data-dcnode-id="768" instrument_node="">read about our Denali visit her</span></a><span data-dcnode-id="766" instrument_node="">e. We only went in once but we didn’t hike at all. I think it’s a great park for hiking so you may want to spend a couple of days there. I would then go south to the Kenai peninsula and spend the remaining days there. Take at least one glacier cruise (</span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/kenai-fjords-cruise-seward-alaska/"><span data-dcnode-id="765" instrument_node="">we took this one</span></a><span data-dcnode-id="763" instrument_node="">), hike Kenai Fjords National Park and drive out to Homer. There are tons of activities to do in the area, depending on what you like and your budget. Here’s </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripmemos.com/things-seward-alaska/"><span data-dcnode-id="762" instrument_node="">the list I put together when researching Seward</span></a><span data-dcnode-id="760" instrument_node="">. Don’t forget to get a day to visit Portage Glacier and that area, possibly even crossing over to Whittier. We tried to do that but the weather was terrible on that day so there wasn’t much point in getting to Whittier. We did visit the </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alaskawildlife.org/" rel="nofollow"><span data-dcnode-id="759" instrument_node="">Alaska Wildlife Conservation park</span></a><span data-dcnode-id="757" instrument_node=""> and liked it very much. If you still have time on your hands, you can take a day trip from Anchorage to see the Matanuska Glacier on the Glenn Highway. There’s a viewing point with a nice trail about 2 hours away from Anchorage but to be honest, I wasn’t too impressed with the view from the road. I think the glacier must be receding so it seems quite distant. You could look into doing some activity there, like snow hiking with a local guide. I’m sure you’ll have tons of fun whatever you do, Alaska is pretty awesome!</span></p><span data-dcnode-id="755" instrument_node="">

</span><p data-dcnode-id="670"><span data-dcnode-id="673" instrument_node="">Hi Julie, I would say about 3-4 weeks. We just returned from our own visit to Alaska. We visited Fairbanks, Denali, Anchorage, Seward, Valdez and Haines in approx. 3 weeks but took our time in some of the places. We didn’t visit Katmai National Park because it was too expensive for our budget and we didn’t visit anywhere along the inner passage (Sitka, Juneau etc) that we couldn’t reach with our car (so, basically we limited our inner passage experience to Haines). I think the inner passage would be at least another week of travel and Katmai another 3 days. The rest could probably be done in 2-2.5 weeks if you’re fast travelers. 3 if you want a more leisurely experience.</span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
I hope this helps! Keep following my blog as I’m working on our Alaska posts (the first one has already been published and I hope to publish the one about Denali today!)</span></p><span data-dcnode-id="669" instrument_node="">
