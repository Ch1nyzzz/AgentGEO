o marine life. Be a part of the solution and </span><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">travel with a filter water bottle.</span></strong></p><p data-dcnode-id="1110"><span data-dcnode-id="1116" instrument_node="">We’ve tested the Geopress&nbsp;</span><em data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">rigorously&nbsp;</span></em><span data-dcnode-id="1113" instrument_node="">from the icy heights of Pakistan to the tropical jungles of Cuba, and the results are in: it WORKS. Buy a Geopress: </span><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">it’s the last water bottle you’ll ever buy.</span></strong></p><span data-dcnode-id="1109" instrument_node=""> </span><a class="button button--branded button--grayl" data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dcl%26merchant_id%3De295c418-295a-447c-b265-734e25f82503%26website_id%3D471b555a-40b7-4294-8d2b-ea96d816425e%26url%3Dhttps%253A%252F%252Fwww.rei.com%252Fproduct%252F150116%252Fgrayl-geopress-water-purifier-bottle-24-fl-oz%26ctc%3Dgrayl-geopress-plug" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Buy a Geopress!</span></span></a><span data-dcnode-id="1105" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/grayl-geopress-review/" rel="noopener" target="_blank"><span data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Read the Review</span></span></a></div></div></div><h3 class="has-text-align-center" data-dcnode-id="1095" id="h-9-the-best-caribbean-island-for-couples-sint-maarten-saint-martin"><span data-dcnode-id="1098" instrument_node="">#9 The Best Caribbean Island for Couples: </span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">Sint Maarten/Saint Martin</span></h3><div class="wp-block-image" data-dcnode-id="1088"><figure class="aligncenter size-full is-resized" data-dcnode-id="1089"><noscript data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples.jpg" alt="Two chairs on a white sand beach in Sint Maarten" class="wp-image-211450" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-1536x1021.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-1050x698.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-873x580.jpg 873w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><img alt="Two chairs on a white sand beach in Sint Maarten" class="lazyload wp-image-211450" data-dcnode-id="1092" data-sizes="(max-width: 1920px) 100vw, 1920px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-1536x1021.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-330x219.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-690x459.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-1050x698.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/05/Where-to-Stay-in-Phillippines-for-Couples-873x580.jpg 873w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Two chairs for two cute people.</span></figcaption></figure></div><p data-dcnode-id="1084"><span data-dcnode-id="1087" instrument_node="">Sint Maarten and Saint Martin are like that couple who have been together so long, they’ve essentially become one. They’ve each got their fair share of problems – and a fair share of love – which make them emblematic of the </span><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">best Caribbean Island for couples!</span></strong></p><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Now, the island itself is also bloody gorgeous and teeming with romantic things to do with your boo. On the French Saint Martin side, there are luxury resorts (with clothes optional beautiful beaches, how French) and fine dining. There are fewer tourists and more stretches of idyllic beach to take in for yourself.</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The Dutch have always been good capitalists, and their side of the island is far more touristy. Dutch Sint Maarten side has the casinos, more diversity, and more of a party atmosphere! You can go out on the town with your partner and show off your dancing skills. 😉</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1079" instrument_node="">Isn’t it funny how couples come together and, in the spirit of avoiding all-out war, </span><a aria-label="decide to share an island (opens in a new tab)" class="ek-link" data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stmartin-stmaarten.com/st-maarten/st-maarten-history-st-martin/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1078" instrument_node="">decide to share an island</span></a><span data-dcnode-id="1076" instrument_node="">? There are shared secrets of slavery and genocide that get swept under the very beautiful carpet of </span><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">pristine sandy beaches and cocktails on the beach.</span></strong></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">This is a top-notch holiday destination to visit for couples. It’s romantic and a little wild, yet still classy!</span></p><h3 class="has-text-align-center" data-dcnode-id="1067" id="h-10-the-best-of-the-caribbean-on-a-budget-bocas-del-toro"><span data-dcnode-id="1070" instrument_node="">#10 The Best of the Caribbean on a Budget: </span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">Bocas del Toro</span></h3><div class="wp-block-image" data-dcnode-id="1060"><figure class="aligncenter size-full is-resized" data-dcnode-id="1061"><noscript data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg" alt="A man sips from a coconut in Bocas del Toro" class="wp-image-292885" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-1536x865.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-700x394.jpg 700w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript><img alt="A man sips from a coconut in Bocas del Toro" class="lazyload wp-image-292885" data-dcnode-id="1064" data-sizes="(max-width: 1920px) 100vw, 1920px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts.jpg 1920w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-1536x865.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/10/tropical-islands-yay-coconuts-700x394.jpg 700w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">No better place to put the lime in the coconut.</span></figcaption></figure></div><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">The Caribbean extends beyond the island chain that is roughly Cuba to Curacao. Caribbean culture – and Caribbean Islands – extend into what is also thought of as Central America.</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1057" instrument_node="">Some of the Caribbean might be known for its status as a tax haven or place of the rich and famous, but </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Bocas del Toro is a Caribbean Island you can visit on a budget!</span></strong></p><p data-dcnode-id="1046"><span data-dcnode-id="1053" instrument_node="">There are colourful buildings, fresh fish, fruit for breakfast, and utterly delicious surf breaks. There is still a bit of a resort feeling that you get in a lot of the Caribbean, but on Bocas, it is a</span><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node=""> run-down resort meets surf bum vibe</span></strong><span data-dcnode-id="1050" instrument_node="">. If you are on a </span><a aria-label="grown-up gap year (opens in a new tab)" class="ek-link" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/gap-years-for-grown-ups/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1049" instrument_node="">grown-up gap year</span></a><span data-dcnode-id="1047" instrument_node=""> Bocas del Toro can be a great place to kick back and ease into the travelling life.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">You can even trek through the jungle and hire lanchas to scoot about the smaller islands in the area. It is a badass mix of adventure and chilled out vibes – just what you want from the Caribbean!</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1040"><span data-dcnode-id="1043" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-hostels-in-bocas-del-toro-panama/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1042" instrument_node="">Find the BEST Hostels on Bocas del Toro HERE!</span></a></div><div data-dcnode-id="1037" id="other-amazing-caribbean-islands"><h2 class="has-text-align-center" data-dcnode-id="1038" id="h-other-amazing-caribbean-islands"><span data-dcnode-id="1039" instrument_node="">Other Amazing Caribbean Islands</span></h2></div><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">So while these islands didn’t make it to the top ten, I couldn’t leave without telling you about some of the other epic islands you can visit.</span></p><h3 class="has-text-align-center" data-dcnode-id="1033" id="h-the-cayman-islands"><span data-dcnode-id="1034" instrument_node="">The Cayman Islands</span></h3><div class="wp-block-image" data-dcnode-id="1026"><figure class="aligncenter size-full is-resized" data-dcnode-id="1027"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands.jpg" alt="George Town Cayman Islands" class="wp-image-478310" width="601" height="400" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-150x100.jpg 150w" sizes="(max-width: 601px) 100vw, 601px" /&gt;</span></noscript><img alt="George Town Cayman Islands" class="lazyload wp-image-478310" data-dcnode-id="1030" data-sizes="(max-width: 601px) 100vw, 601px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/12/George-Town-Cayman-Islands-150x100.jpg 150w" height="400" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20601%20400%22%3E%3C/svg%3E" width="601"><figcaption data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">George Town, Cayman Islands</span></figcaption></figure></div><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The Cayman Islands are known for being a tax haven for the rich and famous, but it’s also a very popular tourist spot. A lot of Caribbean cruises make Grand Cayman a port of call in their itineraries, and it’s no wonder why. The beaches, the vibe, the food – it’s everything you dream of when you think of the Caribbean.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1023" instrument_node="">Scuba diving is a massively popular activity in Grand Cayman and there is a huge diversity of marine life. Many people visit the resorts that line the famous seven mile beach, which is undoubtedly the best </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-cayman-islands/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1022" instrument_node="">place to stay in the Cayman Islands.</span></a></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Though it’s beautiful, it is one of the more overrun with tourist locations and that can take away some of the magic. So while I love the Cayman Islands, especially from the cruise ship trade. For that reason, it is just shy of my top 10 best places in the Caribbean but still worth a visit.</span></p><h3 class="has-text-align-center" data-dcnode-id="1016" id="h-turks-and-caicos"><span data-dcnode-id="1017" instrument_node="">Turks and Caicos</span></h3><div class="wp-block-image" data-dcnode-id="1009"><figure class="aligncenter size-full is-resized" data-dcnode-id="1010"><noscript data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos.jpg" alt="Grace Bay turks and caicos" class="wp-image-202384" width="602" height="401" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-870x580.jpg 870w" sizes="(max-width: 602px) 100vw, 602px" /&gt;</span></noscript><img alt="Grace Bay turks and caicos" class="lazyload wp-image-202384" data-dcnode-id="1013" data-sizes="(max-width: 602px) 100vw, 602px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/04/Grace-Bay-turks-and-caicos-870x580.jpg 870w" height="401" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20602%20401%22%3E%3C/svg%3E" width="602"><figcaption data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Whitby, Turks and Caicos</span></figcaption></figure></div><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Another incredible island in the Caribbean that just misses the list is Turks and Caicos. This British Territory is known for having stunning coral islands in the Atlantic Ocean, and is the gateway island to the Providenciales (or Provo, as it’s often called), home to the iconic Grace Bay Beach.</span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Here you will find luxury resorts, boutique shops and fine dining restaurants. Like most Caribbean islands, scuba-diving is a popular activity here, and there are over 14-miles of barrier reefs to explore just off of Grand Turk island.&nbsp;</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Being close to the Dominican Republic, Haiti, Puerto Rico and Cuba, it has much of the same vibe as you might find in these countries. It’s also, like the Cayman Islands, a popular spot on the Cruise ship itineraries.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">If you have time to spend and you want to explore more islands, then you should definitely consider taking a trip over to Turks and Caicos, but if time is limited, you could visit any of my top ten Caribbean islands miss T&amp;C and not miss out.</span></p><div data-dcnode-id="998" id="staying-safe-in-the-caribbean"><h2 class="has-text-align-center" data-dcnode-id="999" id="h-staying-safe-in-the-caribbean"><span data-dcnode-id="1000" instrument_node="">Staying Safe in the Caribbean</span></h2></div><p data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The Caribbean is not an overly dangerous place! </span></strong><span data-dcnode-id="995" instrument_node="">But much of it does lie square in the hurricane-prone zone. There are also plenty of jungles to explore and backflips on waterskis to try…</span></p><p data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">On top of that, the Caribbean is not known for being cheap. So rather than </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">not</span></em><span data-dcnode-id="990" instrument_node=""> backflip on waterskis, you might consider getting some insurance. That way, if shit hits the fan, you’re covered. That’ll help you sleep a little easier at night.</span></p><div class="wp-block-image" data-dcnode-id="984"><figure class="alignleft size-large is-resized" data-dcnode-id="985"><noscript data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1.jpg" alt="will in the wild" class="wp-image-257041" width="250" style="border-radius: 50%" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1.jpg 1363w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-250x250.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-768x767.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-450x450.jpg 450w" sizes="(max-width: 1363px) 100vw, 1363px" /&gt;</span></noscript><img alt="will in the wild" class="lazyload wp-image-257041" data-dcnode-id="986" data-sizes="(max-width: 1363px) 100vw, 1363px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1.jpg 1363w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-250x250.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-768x767.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2020/09/DSCF3028-1-450x450.jpg 450w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20250%20166.666666667%22%3E%3C/svg%3E" style="border-radius: 50%" width="250"></figure></div><h4 data-dcnode-id="978" id="h-why-you-should-consider-travel-insurancea-story-from-wild-will-hatton"><span data-dcnode-id="983" instrument_node="">Why You SHOULD Consider Travel Insurance</span><br data-dcnode-id="982"><span data-dcnode-id="981" instrument_node="">A Story from </span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Wild Will Hatton</span></em></h4><p data-dcnode-id="975"><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">“Many moons ago, I almost lost my leg in a sweltering jungle in Central America…&nbsp;</span></em></p><p data-dcnode-id="972"><em data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">I battled a seriously nasty infection that snaked up past my knee; by the time I made it to a local hospital, I was delirious, unable to walk, and near-incapacitated from the pain. The docs wanted to amputate – HARD NO. </span></em></p><p data-dcnode-id="966"><em data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">Luckily, I managed to call my insurance provider – they moved me to a much better private hospital where the doctors were able to save my leg. </span><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">I racked up $15,000 in hospital bills</span></strong><span data-dcnode-id="968" instrument_node="">, but these were completely covered by my travel insurance.&nbsp;Luckily, I still have my leg today, and I’m damn grateful every day it’s still attached!</span></em></p><p data-dcnode-id="960"><em data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">Moral of the story:&nbsp;</span><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">consider getting&nbsp;travel insurance before you head out into the wilds, people!</span></strong><span data-dcnode-id="962" instrument_node=""> Things get real out there.</span></em></p><p data-dcnode-id="954"><em data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">Me personally? I travel with coverage from </span><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">World Nomads</span></strong><span data-dcnode-id="956" instrument_node="">. They saved my leg once, and I’m confident they’d do it again.”</span></em></p><div class="button_block button_block__left" data-dcnode-id="945"><span data-dcnode-id="953" instrument_node=""> </span><a class="button button--branded button--world-nomads" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/Turnstile/AffiliateLink%3FpartnerCode%3Dtbpg%26utm_source%3Dtbpg%26source%3Dwn-wills-message-plug%26utm_content%3Dweblink%26path%3Dhttps%3A//www.worldnomads.com/travel-insurance/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Get a Quote Now!</span></span></a><span data-dcnode-id="949" instrument_node=""> </span><a class="button button--normal button--red" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/world-nomads-travel-insurance-review/" rel="noopener" target="_blank"><span data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Or Read Our Review</span></span></a></div><div data-dcnode-id="942" id="final-thoughts-on-picking-the-best-caribbean-island-to-visit"><h2 class="has-text-align-center" data-dcnode-id="943" id="h-final-thoughts-on-picking-the-best-caribbean-island-to-visit"><span data-dcnode-id="944" instrument_node="">Final Thoughts on Picking the Best Caribbean Island to Visit</span></h2></div><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The Caribbean is full of a slow pace of living and a true melting pot of cultures. Travelling through the Caribbean – by sailboat or by plane – and really exploring each island will have you trying to learn Spanish, French, Dutch, and many creoles.</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">One minute you might be eating beans, rice, and platanos and the next it’s spicy jerk chicken and fried johnnycakes. Always, there is fresh fish and fruit.</span></p><p data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">Island life is a dreamy getaway for couples and families alike. But </span><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">the Caribbean has more than just resorts</span></strong><span data-dcnode-id="934" instrument_node="">! There is a wild, adventurous side to the jungles and islands just waiting to be tapped into by sailboats.</span></p><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">And before you think the Caribbean is only for the rich and famous to visit, wait until you explore the Caribbean coast of Central America. Many budget-friendly spots are tucked away for the intrepid backpacker to fall into.</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">The Caribbean Islands and their wondrous cultures have a little something for every type of traveller. So what are you waiting for? There are conch shells to blow and paradise to be explored in the best Caribbean Islands!</span></p><div class="wp-block-image" data-dcnode-id="922"><figure class="aligncenter size-full is-resized" data-dcnode-id="923"><noscript data-dcnode-id="927"><span data-dcnode-id="928" instrument_n  out there!</span></figcaption></figure></div><hr class="wp-block-separator is-style-wide" data-dcnode-id="921"><h3 class="has-text-align-center" data-dcnode-id="919" id="h-thanks-for-reading-that-was-fun-d"><span data-dcnode-id="920" instrument_node="">Thanks for reading – that was fun! 😀</span></h3><p class="has-text-align-center" data-dcnode-id="914" id="h-we-bring-you-free-content-find-out-how-you-can-support-the-site"><strong data-dcnode-id="915"><span data-dcnode-id="918" instrument_node="">We bring you epic FREE content!</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">Find out how YOU can help support us.</span></strong></p><p class="has-text-align-center" data-dcnode-id="899"><span data-dcnode-id="913" instrument_node="">We’re a big site </span><a aria-label="with a big team (opens in a new tab)" class="ek-link" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/meet-the-team/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="912" instrument_node="">with a big team</span></a><span data-dcnode-id="910" instrument_node=""> and this job isn’t always easy. But we do it because we love it – we love providing epic and free content. We love the knowledge that </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">our</span></em><span data-dcnode-id="907" instrument_node=""> content keeps </span><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">you</span></em><span data-dcnode-id="904" instrument_node=""> adventuring. We don’t ask for money, but if you’d like to find out how you can help the site in more organic ways, click the button below. </span><br data-dcnode-id="903"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Thank you for your support</span></strong><span data-dcnode-id="900" instrument_node=""> 🙂</span></p><div class="button_block button_block__center" data-dcnode-id="
