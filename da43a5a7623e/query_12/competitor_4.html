 data-dcnode-id="1700"><form action="https://www.thebrokebackpacker.com/" class="search-form" data-dcnode-id="1701" method="get" role="search"><span data-dcnode-id="1705" instrument_node=""> </span><input class="search-bar__text-input" data-dcnode-id="1704" name="s" placeholder="Where to?..." type="text"><span data-dcnode-id="1703" instrument_node=""> </span><input class="button button--red button--rounded button--no-margin button--inline" data-dcnode-id="1702" type="submit" value="Search"></form></div></div></div></div><div class="header-notice" data-dcnode-id="1688"><div class="container" data-dcnode-id="1691"><p data-dcnode-id="1692"><span data-dcnode-id="1696" instrument_node="">Lessons from 10 years of Backpacking and Entrepreneurship from the OG Broke Backpacker… </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/2021-in-review/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1695" instrument_node="">It’s 2021 in Review</span></a><span data-dcnode-id="1693" instrument_node="">.</span></p></div><div class="header-notice__mobile-close" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Close</span></div></div></header><div class="site-content" data-dcnode-id="543" id="content"><article class="post-single" data-dcnode-id="612"><div class="container" data-dcnode-id="613"><div class="row" data-dcnode-id="614"><div class="col-12 offset-md-1 col-md-10 offset-lg-2 col-lg-8" data-dcnode-id="1660"><div class="post-single__breadcrumbs" data-dcnode-id="1661"><div class="breadcrumbs" data-dcnode-id="1662"><div class="breadcrumbs__meta" data-dcnode-id="1676"><span data-dcnode-id="1685" instrument_node=""> </span><span class="breadcrumbs__author" data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node=""> By </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/author/indigo/"><span data-dcnode-id="1683" instrument_node="">Indigo Atkinson</span></a><span data-dcnode-id="1681" instrument_node=""> </span></span><span data-dcnode-id="1679" instrument_node=""> </span><span class="breadcrumbs__date" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node=""> Last Updated April 24, 2022 / </span></span></div><div class="breadcrumbs__crumbs" data-dcnode-id="1663"><p data-dcnode-id="1664" id="breadcrumbs"><span data-dcnode-id="1665"><span data-dcnode-id="1666"><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/"><span data-dcnode-id="1675" instrument_node="">Home</span></a><span data-dcnode-id="1673" instrument_node=""> » </span><span data-dcnode-id="1667"><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/blog/"><span data-dcnode-id="1672" instrument_node="">Blog</span></a><span data-dcnode-id="1670" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Top 10 BEST Caribbean Islands to Visit on Any Budget! (2022)</span></span></span></span></span></p></div></div></div></div><div class="col-12 offset-md-1 col-md-10 offset-lg-2 col-lg-8" data-dcnode-id="1656"><div class="post-single__title" data-dcnode-id="1657"><h1 data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Top 10 BEST Caribbean Islands to Visit on Any Budget! (2022)</span></h1></div></div><div class="col-12 order-2 offset-md-1 col-md-10 offset-lg-0 col-lg-8 order-lg-1" data-dcnode-id="761"><div class="post-single__main-content" data-dcnode-id="762"><article class="post-content" data-dcnode-id="788"><div class="post-intro" data-dcnode-id="1636"><div class="post-intro__content" data-dcnode-id="1637"><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Some eighty million years ago, what is now the Caribbean Plate started its tumultuous tectonic journey. Through the temper tantrums of volcanic eruption and pubescent ice ages, there came to be over 700 islands, islets, reefs and cays.</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1653" instrument_node="">These incredible tectonics blessed us travellers with so many glittering gems waiting to be explored. But this presents a modern conundrum for the traveller: </span><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">which are the best Caribbean islands to visit?</span></strong></p><p data-dcnode-id="1645"><span data-dcnode-id="1649" instrument_node="">Well, the best of the Caribbean islands will depend on </span><em data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">why</span></em><span data-dcnode-id="1646" instrument_node=""> you are visiting.&nbsp;Romantic honeymoons, family getaways, and even budget backpacking are all possible in the Caribbean.</span></p><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">I spent eight months sailing and vagabonding the great Caribbean and I started to get a grip on the complexity within paradise. There are clandestine jungles and epic spearfishing to be found outside of the flashy resorts!</span></p><p data-dcnode-id="1638"><span data-dcnode-id="1642" instrument_node="">So, depending on what you’re looking for from your adventure to the Caribbean, you can easily pick the right island. So without further ado, </span><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">here are the top 10 best islands in the Caribbean –</span></strong><span data-dcnode-id="1639" instrument_node=""> for any type of traveller.</span></p></div></div><div class="wp-block-image" data-dcnode-id="1626"><figure class="aligncenter size-full is-resized" data-dcnode-id="1627"><noscript data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg" alt="Under the water in the Caribbean are some reef fish while on the beach there are palm trees. " class="wp-image-450393" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-150x113.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" /&gt;</span></noscript><img alt="Under the water in the Caribbean are some reef fish while on the beach there are palm trees. " class="wp-image-450393 lazyloaded" data-dcnode-id="1633" data-sizes="(max-width: 1160px) 100vw, 1160px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-150x113.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg&amp;raw" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-beach-beautiful-150x113.jpg 150w" width="580"><figcaption data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">Do you need some Vitamin </span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Sea</span></em><span data-dcnode-id="1629" instrument_node="">?</span></figcaption></figure></div><div class="table-of-contents" data-dcnode-id="1608"><div class="table-of-contents__title" data-dcnode-id="1622"><span data-dcnode-id="1625" instrument_node="">Table of Contents </span><span class="table-of-contents__trigger" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Show</span></span></div><ul data-dcnode-id="1609"><li data-dcnode-id="1619"><a data-dcnode-id="1620" href="#the-10-best-caribbean-islands"><span data-dcnode-id="1621" instrument_node="">The 10 Best Caribbean Islands </span></a></li><li data-dcnode-id="1616"><a data-dcnode-id="1617" href="#other-amazing-caribbean-islands"><span data-dcnode-id="1618" instrument_node="">Other Amazing Caribbean Islands</span></a></li><li data-dcnode-id="1613"><a data-dcnode-id="1614" href="#staying-safe-in-the-caribbean"><span data-dcnode-id="1615" instrument_node="">Staying Safe in the Caribbean</span></a></li><li data-dcnode-id="1610"><a data-dcnode-id="1611" href="#final-thoughts-on-picking-the-best-caribbean-island-to-visit"><span data-dcnode-id="1612" instrument_node="">Final Thoughts on Picking the Best Caribbean Island to Visit</span></a></li></ul></div><div data-dcnode-id="1605" id="the-10-best-caribbean-islands"><h2 class="has-text-align-center" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The 10 Best Caribbean Islands</span></h2></div><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The Caribbean is a delightful sprinkling of islands across some damn fine turquoise Caribbean sea. With a visit to a Caribbean island, you can expect all the beach chilling in the world – with some cheeky rum, swaying palm trees, natural beauty and good coffee to boot.</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">Blessed with steady trade winds, the </span><a aria-label="Caribbean makes for an incredible sailing trip (opens in a new tab)" class="ek-link" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/sailing-the-caribbean/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1601" instrument_node="">Caribbean makes for an incredible sailing trip</span></a><span data-dcnode-id="1599" instrument_node="">! It also has some of the world’s best diving, remarkable tropical jungles, and cactus-strewn deserts. The cultures are a melting pot of languages and delicious food.</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">For the tourist on vacation, much of the Caribbean Islands are easy: the wind carries you where you want to go, the staff speak English or French, and there are happy hours and everything!</span></p><div class="wp-block-image" data-dcnode-id="1586"><figure class="alignright size-full is-resized" data-dcnode-id="1587"><noscript data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n.jpg" alt="A girl drinking a coconut on a beach in the caribbean" class="wp-image-408992" width="270" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n.jpg 712w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n-189x250.jpg 189w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n-150x198.jpg 150w" sizes="(max-width: 712px) 100vw, 712px" /&gt;</span></noscript><img alt="A girl drinking a coconut on a beach in the caribbean" class="lazyload wp-image-408992" data-dcnode-id="1593" data-sizes="(max-width: 712px) 100vw, 712px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n.jpg 712w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n-189x250.jpg 189w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/06/207891743_295140339019526_8433949962566892469_n-150x198.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20270%20180%22%3E%3C/svg%3E" width="270"><figcaption data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node="">Fresh coconuts are where it’s at.</span><br data-dcnode-id="1591"><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Photo: Elina Mattila</span></em></figcaption></figure></div><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">For the dirtbag who might be crewing a sailboat – or ends up by some mysterious fate on one of the Caribbean Islands – the islands can be a bit of a whirlwind. They are also tax havens and there can be tension under the surface of paradise…</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">But food will bring us all together! There is a little something for every type of traveller in the Caribbean – budget backpackers to families alike! You’ll find something that satisfies everyone pangs:</span></p><ul data-dcnode-id="1573"><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Fresh fruit</span></li><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Ceviche</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Fried johnnycakes</span></li><li data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Jerk chicken</span></li></ul><div class="post-form-cta" data-dcnode-id="1474"><div class="post-form-cta__image" data-dcnode-id="1558"><span data-dcnode-id="1572" instrument_node=""> </span><picture class="behave-as-bg" data-dcnode-id="1565"><source data-dcnode-id="1571" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-795x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1590x400.jpg 2.000x" media="(min-width: 1200px)"><source data-dcnode-id="1570" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-533x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1066x400.jpg 2.000x" media="(min-width: 992px)"><source data-dcnode-id="1569" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-572x200.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1144x400.jpg 2.000x" media="(min-width: 768px)"><source data-dcnode-id="1568" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-540x145.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1080x290.jpg 2.000x" media="(min-width: 576px)"><source data-dcnode-id="1567" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-534x145.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-534x145.jpg 1.000x,https://www.thebrokebackpacker.com/wp-content/uploads/fly-images/364157/rickshaw-will-crop-3.1-1068x290.jpg 2.000x" media="(min-width: 0px)"><img class="lazyload" data-dcnode-id="1566" data-src="https://www.thebrokebackpacker.com/wp-content/upload kpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-768x514.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-150x100.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" /&gt;</span></noscript><img alt="Three vintage cars in Cuba" class="lazyload wp-image-450385" data-dcnode-id="1467" data-sizes="(max-width: 1160px) 100vw, 1160px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-250x167.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-768x514.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/cuba-havana-cars-150x100.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Cubans love their cars.</span></figcaption></figure></div><p data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">Beyond Che Guevara and Guantanamo Bay, there is a fledgling tourism industry in Cuba. Backpackers will find plenty of </span><a aria-label="things to do in Cuba (opens in a new tab)" class="ek-link" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/cuba-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1461" instrument_node="">things to do in Cuba</span></a><span data-dcnode-id="1459" instrument_node="">. There are bars, vintage cars, and plenty of hole in the wall shops selling the eponymous Cuban cigars. Plus, there are a ton of UNESCO world heritage sites like the Old Havana and its Fortifications and Desembarco del Granma National Park.</span></p><p data-dcnode-id="1453"><span data-dcnode-id="1457" instrument_node="">There are </span><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">over 5600 kilometres of coastline</span></strong><span data-dcnode-id="1454" instrument_node="">. So if you want a beach – oh Cuba’s got a beach!</span></p><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">My brief flirtation with mainland Cuba came when I was delivering a sailboat. Prehistoric looking mangroves hid a diverse range of birdlife and (apparently) monster crocodiles. The sky and Caribbean sea glimmered in matching shades of blue. I can think of worse places to travel to. 😉</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">If you have </span><a aria-label="travelled to Central America (opens in a new tab)" class="ek-link" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-central-america-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1449" instrument_node="">travelled to Central America</span></a><span data-dcnode-id="1447" instrument_node="">, you will find that Cuba has some familiar foods (platanos feature heavily) and familiar dance styles – cumbia and salsa reign supreme.</span></p><p data-dcnode-id="1437"><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Mi amor, mi corazon, mi vida</span></em><span data-dcnode-id="1443" instrument_node=""> AKA Cuba. You are</span><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node=""> the best Caribbean Island</span></strong><span data-dcnode-id="1440" instrument_node=""> because you’ve got everything I want from my vacation: rum, cigars, and picture-perfect white sand beaches. And, you package it all up in a sexy, fiesta laden and vintage car studded combo deal. Mwah! </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Te amo.</span></em></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1430"><span data-dcnode-id="1436" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-cuba-travel-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1435" instrument_node="">Read the FULL Backpacking Cuba Guide HERE!</span></a><span data-dcnode-id="1433" instrument_node=""> </span><a class="button button--black" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-cuba/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1432" instrument_node="">Where to Stay in Cuba Guide</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1426" id="h-2-the-other-best-caribbean-island-jamaica"><span data-dcnode-id="1429" instrument_node="">#2 The (Other) Best Caribbean Island: </span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">Jamaica</span></h3><div class="wp-block-image" data-dcnode-id="1419"><figure class="aligncenter size-full is-resized" data-dcnode-id="1420"><noscript data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica.jpg" alt="" class="wp-image-457599" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-700x394.jpg 700w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-150x84.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" /&gt;</span></noscript><img alt="" class="lazyload wp-image-457599" data-dcnode-id="1423" data-sizes="(max-width: 1160px) 100vw, 1160px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-250x141.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-580x326.jpg 580w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-700x394.jpg 700w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/Jamaica-150x84.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Jamaica, you sure are beautiful.</span></figcaption></figure></div><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">If Cuba is one cultural pole of the Caribbean, then Jamaica is the other. Jamaica is the first place many people think of when you say ‘Caribbean Islands’.</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">This is not without good reason. This is the home of Bob Marley, Rastafari, exotic jungles, jerk chicken and stunning white sand beaches. They also have a red hot cricket team. Damn Jamaica, you got some of everything!</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">Jamaica is equally as complicated as communist Cuba. For one thing, Jamaica has an undeniable violent crime problem. This doesn’t often spill over and affect tourists in their gated resorts, but it does add to the barrier between a traveller and locals. You’ll often be discouraged from walking certain places by other locals – especially if you’re </span><a aria-label="travelling solo as a woman (opens in a new tab)" class="ek-link" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/solo-female-travel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1413" instrument_node="">travelling solo as a woman</span></a><span data-dcnode-id="1411" instrument_node=""> or an LGBTQ traveller.</span></p><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">I find it ironic that the ghosts of the Golden Age of Piracy seem to be reliving their glory days as gunslingers in Jamaica.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node="">Jamaica still has this absolute magnetism that makes it </span><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">one of the best Caribbean Islands</span></strong><span data-dcnode-id="1404" instrument_node="">. And if you stay in the right </span><a aria-label="area such as Montego Bay (opens in a new tab)" class="ek-link" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-montego-bay-jamaica/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1403" instrument_node="">area such as Montego Bay</span></a><span data-dcnode-id="1401" instrument_node="">, you can find secure places to stay. Its music is particularly influential – and so is its jerk chicken spice. Also, once you do have an in with Jamaicans, you know you’ve got a true ride or die friend.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1393"><span data-dcnode-id="1399" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/is-jamaica-safe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1398" instrument_node="">Read This Guide to Staying Safe in Jamaica</span></a><span data-dcnode-id="1396" instrument_node=""> </span><a class="button button--black" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/best-places-to-visit-in-jamaica/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1395" instrument_node="">Find the BEST PLACES in Jamaica Here!</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1389" id="h-3-the-best-caribbean-island-for-families-puerto-rico"><span data-dcnode-id="1392" instrument_node="">#3 The Best Caribbean Island for Families: </span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">Puerto Rico</span></h3><div class="wp-block-image" data-dcnode-id="1382"><figure class="aligncenter size-full is-resized" data-dcnode-id="1383"><noscript data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset.jpg" alt="A family walks on the beach at sunset in Puerto Rico." class="wp-image-171406" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-870x580.jpg 870w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><img alt="A family walks on the beach at sunset in Puerto Rico." class="lazyload wp-image-171406" data-dcnode-id="1386" data-sizes="(max-width: 1000px) 100vw, 1000px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset.jpg 1000w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-300x200.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-150x100.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-768x512.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-330x220.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-296x197.jpg 296w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-690x460.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/12/shutterstock-costa-rica-family-beach-sunset-870x580.jpg 870w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Get in kids, we’re going to Puerto Rico!</span></figcaption></figure></div><p data-dcnode-id="1377"><span data-dcnode-id="1381" instrument_node="">Puerto Rico is what will happen when American Imperialism is set free in Cuba. Oops, too dark and too revealing of my bleeding leftie heart? Never fear, Puerto Rico is still one of the </span><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">best Caribbean Islands </span></strong><span data-dcnode-id="1378" instrument_node="">you NEED to travel to!</span></p><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Families, in particular, will love coming to Puerto Rico for the ease of travel and how connected the island is. There is a lot to keep the kids busy and there’s plenty of cocktails at happy hour to give the folks a vacation too.</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1374" instrument_node="">Puerto Rico has </span><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">three bioluminescent bays</span></strong><span data-dcnode-id="1371" instrument_node=""> – including La Parguera that you can swim in. It’s only a two-hour drive from San Juan which makes it a perfect road trip! There is also the </span><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">epic El Yunque jungle</span></strong><span data-dcnode-id="1368" instrument_node=""> for the outdoors-loving families to explore.</span></p><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">If you are </span><a aria-label="backpacking the USA (opens in a new tab)" class="ek-link" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/backpacking-usa-travel-guide/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1365" instrument_node="">backpacking the USA</span></a><span data-dcnode-id="1363" instrument_node="">, Puerto Rico makes for a natural stopover. The Caribbean and Latin cultures are in full swing here – and there are great street foods on offer to try! However, Puerto Rico is also quite developed so you can expect to find comfort foods from the West on the islands too.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1358"><span data-dcnode-id="1361" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-puerto-rico/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1360" instrument_node="">Read About Where to Stay in Puerto Rico HERE</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1354" id="h-4-the-caribbean-island-with-the-best-beaches-the-bahamas"><span data-dcnode-id="1357" instrument_node="">#4 The Caribbean Island with the Best Beaches: </span><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">The Bahamas</span></h3><div class="wp-block-image" data-dcnode-id="1347"><figure class="aligncenter size-full is-resized" data-dcnode-id="1348"><noscript data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig.jpg" alt="A pig swims in crystal clear blue water in the Bahamas" class="wp-image-450386" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-150x113.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" /&gt;</span></noscript><img alt="A pig swims in crystal clear blue water in the Bahamas" class="lazyload wp-image-450386" data-dcnode-id="1351" data-sizes="(max-width: 1160px) 100vw, 1160px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-250x188.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-768x576.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/bahamas-swimming-pig-150x113.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Just keep swimmin’ swimmin’ swimmin’!</span></figcaption></figure></div><p data-dcnode-id="1339"><span data-dcnode-id="1346" instrument_node="">The highest point in the Bahamas is just 63 metres! There are </span><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">over 700 mostly uninhabited islands</span></strong><span data-dcnode-id="1343" instrument_node=""> scattered amongst clear, pristine water. The sailing gods really smiled upon the Bahamas and blessed them with good winds, favourable anchorages, and </span><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">the best beaches in the Caribbean</span></strong><span data-dcnode-id="1340" instrument_node="">.</span></p><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">Whether you want a beach all to yourself, or a beach replete with a bar serving Bahama Mamas – the Bahamas has got you covered. With over 700 islands in The Bahamas, including the iconic Paradise Island, you can enjoy a secluded </span><a aria-label="vacation rental (opens in a new tab)" class="ek-link" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/vacation-rentals-in-bahamas/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1337" instrument_node="">vacation rental</span></a><span data-dcnode-id="1335" instrument_node=""> with a private beach, making it the perfect island retreat destination. In fact, you can even rent a private island, if you got the cash for it. There is even the famous ‘pig beach’ where – you guessed it – you can swim with pigs!</span></p><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">When you think of the ultimate beach vacation you’re damn sure to be thinking of balmy weather, calm and turquoise waters, and just a dash of rum. I can guarantee you that you’re thinking of the Bahamas!</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">And who knows, a beach holiday in the Bahamas might be just what you need to reset and </span><a aria-label="avoid travel burnout (opens in a new tab)" class="ek-link" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/travel-burnout/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1330" instrument_node="">avoid travel burnout</span></a><span data-dcnode-id="1328" instrument_node="">. That scenery is definitely suited to some calm, journal time reflections (over a glass of rum of course!).</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1323"><span data-dcnode-id="1326" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-bahamas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1325" instrument_node="">Click to Find the Best Places to Stay in the Bahamas</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1319" id="h-5-the-best-diving-in-the-caribbean-aruba"><span data-dcnode-id="1322" instrument_node="">#5 The Best Diving in the Caribbean: </span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">Aruba</span></h3><div class="wp-block-image" data-dcnode-id="1312"><figure class="aligncenter size-full is-resized" data-dcnode-id="1313"><noscript data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore.jpg" alt="A scuba diver explores a ship wreck in Aruba" class="wp-image-417621" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-150x100.jpg 150w" sizes="(max-width: 1160px) 100vw, 1160px" /&gt;</span></noscript><img alt="A scuba diver explores a ship wreck in Aruba" class="lazyload wp-image-417621" data-dcnode-id="1316" data-sizes="(max-width: 1160px) 100vw, 1160px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore.jpg 1160w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-250x166.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-768x510.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/07/cave-diving-explore-150x100.jpg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Deep diving in Aruba.</span></figcaption></figure></div><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">Scuba divers will love Aruba. Scuba diving through the Caribbean is almost guaranteed to be epic! But on Aruba, it reaches new heights (or is it new </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">depths </span></em><span data-dcnode-id="1308" instrument_node="">😉 ).</span></p><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">You can expect to find shipwrecks, diverse coral reefs, and underwater caves a-plenty here. There are cheeky lobsters hiding throughout the islands – as well as dolphins and turtles! Plus, the water is warm and the visibility is amazing. You can’t get a better combination than that for a diving holiday.</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">If you don’t want to scuba dive, you can always snorkel. Many of the reefs are quite shallow so you don’t need to get deep to get to meet some cute fishies.</span></p><p data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node="">The island of Aruba is quite different from other Caribbean islands. It is desert-like and full of cactuses! It’s also relatively affordable as there are many Caribbean </span><a aria-label="vacation rentals in Aruba  (opens in a new tab)" class="ek-link" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/vacation-rentals-in-aruba/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1301" instrument_node="">vacation rentals in Aruba</span></a><span data-dcnode-id="1299" instrument_node=""> suitable for budget travellers. Many people travel to Aruba as part of an ABC islands adventure (Aruba, Bonaire, and Curaçao), the western-most Caribbean islands of the Leeward Antilles.</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">It is also technically part of the Kingdom of the Netherlands, so along with learning Papiamento, you can try your hand at learning Dutch. It’s always good to stretch the brain on vacation and </span><a aria-label="learn a new language (opens in a new tab)" class="ek-link" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-learn-a-new-language-for-travel-and-why-you-should/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1296" instrument_node="">learn a new language</span></a><span data-dcnode-id="1294" instrument_node="">.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1289"><span data-dcnode-id="1292" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-aruba/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1291" instrument_node="">Read About Where to Stay on Aruba HERE!</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1285" id="h-6-the-best-caribbean-island-for-sailing-us-virgin-islands"><span data-dcnode-id="1288" instrument_node="">#6 The Best Caribbean Island for Sailing: </span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">US Virgin Islands</span></h3><div class="wp-block-image" data-dcnode-id="1278"><figure class="aligncenter size-large is-resized" data-dcnode-id="1279"><noscript data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1024x576.jpg" alt="A sailboat anchored outside of a small island in the US Virgin Islands. " class="wp-image-63085" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1024x576.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1050x591.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1031x580.jpg 1031w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k.jpg 2048w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="A sailboat anchored outside of a small island in the US Virgin Islands. " class="lazyload wp-image-63085" data-dcnode-id="1282" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1024x576.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1024x576.jpg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-150x84.jpg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-300x169.jpg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-768x432.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-330x186.jpg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-690x388.jpg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1050x591.jpg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k-1031x580.jpg 1031w, https://www.thebrokebackpacker.com/wp-content/uploads/2018/10/35467523155_f9b4f19247_k.jpg 2048w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Yeah, nah not bad.</span></figcaption></figure></div><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">What makes for good sailing?</span></p><ul data-dcnode-id="1267"><li data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Steady trade winds</span></li><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">A little sunshine</span></li><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Some diving and/or fishing upon arrival</span></li><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">And rum – always rum.</span></li></ul><p data-dcnode-id="1259"><span data-dcnode-id="1266" instrument_node="">The US Virgin has all four of these in spades – which makes it the </span><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">best Caribbean Island to go sailing in</span></strong><span data-dcnode-id="1263" instrument_node="">! St Thomas, St John, and St Croix (along with smaller flecks of islands) have been convincing many a-vagabond to come and </span><a aria-label="try out the boat life (opens in a new tab)" class="ek-link" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/how-to-live-on-a-boat/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1262" instrument_node="">try out the boat life</span></a><span data-dcnode-id="1260" instrument_node="">.</span></p><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">While there are cruise ships, million-dollar properties, and even </span><em data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">traffic </span></em><span data-dcnode-id="1255" instrument_node="">on St Thomas, there is still an air of wilderness. I don’t quite know how to explain it. I think it’s a combination of the ghosts of pirates past, a haunted trailer park vibe that is tinged with people realising paradise is just another place to call home, and the free-flowing rum.</span></p><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">But hey! I’m just some dirtbag who sailed around these parts embracing the pirate life. Some of the easiest sailing and sweetest dive spots call the US Virgin Islands home. There are even some sweet surf spots tucked away for those needing to get their Mama Moana fix!</span></p><p data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">Another great island in the Caribbean for sailing is the </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-guadeloupe/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1250" instrument_node="">Guadeloupe islands</span></a><span data-dcnode-id="1248" instrument_node="">, though these are far less touristy than the Virgin Islands.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1243"><span data-dcnode-id="1246" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-st-thomas-us-virgin-islands/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1245" instrument_node="">Read the Best Places to Stay in St Thomas Guide HERE</span></a></div><h3 data-dcnode-id="1241" id="h-test-the-waters-before-you-sail-the-liveaboard-experience"><span data-dcnode-id="1242" instrument_node="">Test the Waters BEFORE You Sail! – The Liveaboard Experience</span></h3><p data-dcnode-id="1235"><span data-dcnode-id="1240" instrument_node="">You can rent your dream boat for your trip to the Virgin Islands on </span><strong data-dcnode-id="1237"><a aria-label="Sailo (opens in a new tab)" class="ek-link" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sailo.com/%3Fsscid%3Da1k5_83gek%26" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1239" instrument_node="">Sailo</span></a></strong><span data-dcnode-id="1236" instrument_node="">.</span></p><p data-dcnode-id="1228"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Sailo is essentially the Airbnb of boats.</span></strong><span data-dcnode-id="1232" instrument_node=""> There are over </span><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">30 000 boats on offer</span></strong><span data-dcnode-id="1229" instrument_node=""> so you are bound to find one that fits your dream sailing holiday!</span></p><div class="wp-block-image" data-dcnode-id="1221"><figure class="aligncenter size-full is-resized" data-dcnode-id="1222"><noscript data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner.jpg" alt="boatlife-sailo-plug-banner" class="wp-image-424094" width="700" height="251" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner.jpg 1898w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-250x90.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-768x276.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-1536x552.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-150x54.jpg 150w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="boatlife-sailo-plug-banner" class="lazyload wp-image-424094" data-dcnode-id="1225" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner.jpg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner.jpg 1898w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-250x90.jpg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-768x276.jpg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-1536x552.jpg 1536w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/08/boatlife-sailo-plug-banner-150x54.jpg 150w" height="251" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20700%20251%22%3E%3C/svg%3E" width="700"><figcaption data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Sailo lets you charter a boat in style!</span></figcaption></figure></div><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">You might be gearing up to live on a sailboat full time and choose to go bareboat: that is, with no captain. This is a surefire way to learn if the boat life is really for you. Or you might be in the market for a splurge vacation – in which case you can choose from one of the amazing charter boats on offer.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">With so many boats on offer through Sailo, you’re bound to find one that suits your trip perfectly! The dreamy sailing conditions of the Virgin Islands just got that much more appealing.</span></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1213"><span data-dcnode-id="1216" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sailo.com/%3Fsscid%3Da1k5_83gek%26" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1215" instrument_node="">Click Here to Charter a Boat through Sailo Today!</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1209" id="h-7-the-best-caribbean-island-to-live-at-least-for-tax-purposes-the-british-virgin-islands"><span data-dcnode-id="1212" instrument_node="">#7 The Best Caribbean Island to Live (at least for tax purposes): </span><br data-dcnode-id="1211"><span data-dcnode-id="1210" instrument_node="">The British Virgin Islands</span></h3><div class="wp-block-image" data-dcnode-id="1195"><figure class="aligncenter size-large is-resized" data-dcnode-id="1196"><noscript data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1024x768.jpeg" alt="making money in the british virgin islands" class="wp-image-97618" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1024x768.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-150x113.jpeg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-300x225.jpeg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-768x576.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-330x248.jpeg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-690x518.jpeg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1050x788.jpeg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-773x580.jpeg 773w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains.jpeg 1812w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="making money in the british virgin islands" class="lazyload wp-image-97618" data-dcnode-id="1206" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1024x768.jpeg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1024x768.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-150x113.jpeg 150w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-300x225.jpeg 300w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-768x576.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-330x248.jpeg 330w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-690x518.jpeg 690w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-1050x788.jpeg 1050w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains-773x580.jpeg 773w, https://www.thebrokebackpacker.com/wp-content/uploads/2019/06/Mad-Gains.jpeg 1812w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1197"><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">This</span></em><span data-dcnode-id="1203" instrument_node=""> guy’s got coins for his offshore account.</span><br data-dcnode-id="1202"><em data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">Photo: </span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/themanwiththetinyguitar/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1200" instrument_node="">@themanwiththetinyguitar</span></a></em></figcaption></figure></div><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Guess whose residents don’t pay income tax? Like the Cayman Islands, the British Virgin Islands are also a tax haven. Is that a good reason to live here? Probably not. Paradise is only paradise because you get to go home afterwards.</span></p><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The US may have its faults, but the Virgin Islands were cleaned up very fast after Hurricane Irma. A mere two-hour sail away in the BVIs, there was still open sewerage and sinkholes after 8 months, post-storm.</span></p><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Oh c’mon Indi, this is not time to rant about the consequences of neo-imperialism! This is vacation inspiration…</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">And hey, while you’re here, the British Virgin Islands have got some pretty epic shit going on! Most people arrive by boat and go straight to </span><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">the (in)famous Soggy Dollar Bar</span></strong><span data-dcnode-id="1185" instrument_node=""> on the island of Jost Van Dyke. The owner’s Australian wife helped name the place because people usually swim to shore and pay with wet dollar bills.</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">I spent one (too many) nights downing ‘painkillers’ at the </span><a aria-label="Soggy Dollar Bar (opens in a new tab)" class="ek-link" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.soggydollar.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1182" instrument_node="">Soggy Dollar Bar</span></a><span data-dcnode-id="1180" instrument_node="">. Painkillers are a deceptively strong mix of rum, pineapple, and coconut – and they do indeed take all your pain away (until the hangover comes)!</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">There are some really beautiful nature spots. For example, the Virgin Gorda island is well known for its ‘bathes’. These are unique pools made from beachside boulders and ocean-flooded grottoes. Not to mention the incredible resorts that line the shores of the Atlantic Ocean.</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1176" instrument_node="">The BVIs also have some wicked diving – including the RMS Rhone. The water’s warm, the visibility is good, and there are always legends of mermaids and sirens dragging more ships to the bottom. So hey, if you’ve got a pile of money to burn through (or hideaway) the British Virgin Islands are </span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">the best Caribbean Islands to live on.</span></strong></p><div class="button_block button_block_mobile__center button_block__center" data-dcnode-id="1169"><span data-dcnode-id="1172" instrument_node=""> </span><a class="button button--red" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrokebackpacker.com/where-to-stay-in-british-virgin-islands-uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1171" instrument_node="">Find the BEST Place to Stay in the British Virgin Islands Here!</span></a></div><h3 class="has-text-align-center" data-dcnode-id="1165" id="h-8-the-best-parties-in-the-caribbean-trinidad-and-tobago"><span data-dcnode-id="1168" instrument_node="">#8 The Best Parties in the Caribbean: </span><br data-dcnode-id="1167"><span data-dcnode-id="1166" instrument_node="">Trinidad and Tobago</span></h3><div class="wp-block-image" data-dcnode-id="1152"><figure class="aligncenter size-full is-resized" data-dcnode-id="1153"><noscript data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">&lt;img src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival.jpeg" alt="A woman in a red headdress dances at Carnival in Trinidad and Tobago" class="wp-image-450392" width="580" srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-250x188.jpeg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-768x576.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-150x113.jpeg 150w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="A woman in a red headdress dances at Carnival in Trinidad and Tobago" class="lazyload wp-image-450392" data-dcnode-id="1162" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival.jpeg" data-srcset="https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival.jpeg 1024w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-250x188.jpeg 250w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-768x576.jpeg 768w, https://www.thebrokebackpacker.com/wp-content/uploads/2021/10/caribbean-carnival-150x113.jpeg 150w" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20580%20386.666666667%22%3E%3C/svg%3E" width="580"><figcaption data-dcnode-id="1154"><span data-dcnode-id="1161" instrument_node="">It’s PARTY TIME!</span><br data-dcnode-id="1160"><em data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">Photo: Michel Tissot (</span><a aria-label="WikiCommons (opens in a new tab)" class="ek-link" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ACarnaval_%25C3%25A0_trinidad_3.JPG" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1158" instrument_node="">WikiCommons</span></a><span data-dcnode-id="1156" instrument_node="">)</span></em></figcaption></figure></div><p data-dcnode-id="1148"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Trinidad and Tobago know how to bring the party</span></strong><span data-dcnode-id="1149" instrument_node=""> – especially the Carnival. They are far enough south of Jamaica to not be pulled into its cultural orbit. Instead of reggae and Rastafari, you’ll find calypso and more of a cultural conversation with Brazil and Venezuela.</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">For tourists who grew up culturally conservative, the fashion of Carnival is as loud and fabulous as the music. Parades take on a new meaning as the streets become awash with colour. You get the feeling that this joy is an act of resistance to the years of colonial oppression.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Carnival is a fabulous occasion – but there are more parties in Trinidad and Tobago than just Carnival!</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1143" instrument_node="">Trini is also home to the </span><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">largest Devali celebration in the Western hemisphere</span></strong><span data-dcnode-id="1140" instrument_node="">. The steel drum was invented here – and so was the limbo dance! This little nation is also ranked as the </span><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">happiest in the Caribbean.</span></strong></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">On any given day of the week, there is music playing, a party to be had, and a pristine beach to be swum in. If you need to let loose and party with nothing but good vibes, the best Caribbean destination to do it on is Trinidad and Tobago!</span></p><div class="product-plug product-plug__black component-margin" data-dcnode-id="1099" id="grayl-plug"><div class="product-plug__title" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node=""> Save $$$ • Save the Planet • Save Your Stomach!</span></div><div class="product-plug__content-wrapper product-plug__with-title product-plug__background-white" data-dcnode-id="1100"><d
