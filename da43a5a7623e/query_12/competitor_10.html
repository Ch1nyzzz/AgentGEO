</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Smoothies are a delicious and easy way to have a nutritious breakfast QUICK. Today we’re giving you a guide on how to make 30 smoothie freezer packs, with 5 different smoothie recipes, using one shopping list, that’s budget-friendly and can be prepped in under an hour! They’re paleo, vegan and will keep you satisfied until lunch!</span></p><span data-dcnode-id="3493" instrument_node=""> </span><p data-dcnode-id="3489"><img alt="Smoothie Freezer Packs in the freezer" class="alignnone wp-image-438537 size-full entered error" data-dcnode-id="3492" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg" data-lazy-srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-500x760.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-197x300.jpg 197w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-768x1167.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-674x1024.jpg 674w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-640x973.jpg 640w" data-ll-status="error" data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" height="1824" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg&amp;raw" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-500x760.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-197x300.jpg 197w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-768x1167.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-674x1024.jpg 674w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-640x973.jpg 640w" width="1200"><noscript data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">&lt;img data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" class="alignnone wp-image-438537 size-full" src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg" alt="Smoothie Freezer Packs in the freezer" width="1200" height="1824" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-500x760.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-197x300.jpg 197w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-768x1167.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-674x1024.jpg 674w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series-640x973.jpg 640w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></p><span data-dcnode-id="3488" instrument_node=""> </span><h2 data-dcnode-id="3486" style="text-align: center;"><span data-dcnode-id="3487" instrument_node="">30 Budget-Friendly Smoothie Freezer Packs</span></h2><span data-dcnode-id="3485" instrument_node=""> </span><p data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Smoothie freezer packs are so popular right now! You can order them via subscription or purchase them by the pack at most stores. We’ve tried some, and enjoyed a few, but ultimately they are SO expensive. So today we’re bringing you the best of both worlds: a convenient and delicious breakfast smoothie that you can make-ahead to grab and go that WON’T break the bank.</span></p><span data-dcnode-id="3482" instrument_node=""> </span><h3 data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">Let’s break down the math:</span></h3><span data-dcnode-id="3479" instrument_node=""> </span><p data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">One month’s worth of smoothie subscriptions can cost you about $240! Yes, there is definitely a convenience factor, but if you make your own, you control the ingredients and sweetness and it is SO much more affordable. Our 30 days worth of smoothie packs came in at a minuscule: $46.33!!! Or about $1.50 per smoothie! And we timed ourselves making the smoothie packs and can confidently say it should take you no more than 1 hour, or less, to put them all together.</span></p><span data-dcnode-id="3476" instrument_node=""> </span><p data-dcnode-id="3471"><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg"><img alt="Freezer Pack Smoothie Series" class="alignnone wp-image-438539 size-full entered lazyloaded" data-dcnode-id="3475" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg" data-lazy-srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-500x456.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-300x274.jpg 300w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-768x701.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-1024x934.jpg 1024w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-640x584.jpg 640w" data-ll-status="loaded" data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" height="1095" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg&amp;raw" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-500x456.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-300x274.jpg 300w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-768x701.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-1024x934.jpg 1024w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-640x584.jpg 640w" width="1200"><noscript data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">&lt;img data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" class="alignnone wp-image-438539 size-full" src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg" alt="Freezer Pack Smoothie Series" width="1200" height="1095" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-500x456.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-300x274.jpg 300w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-768x701.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-1024x934.jpg 1024w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series2-640x584.jpg 640w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="3470" instrument_node=""> </span><p data-dcnode-id="3465"><span data-dcnode-id="3469" instrument_node="">We wanted to use one shopping list interchanging the ingredients as much as possible when putting together these recipes. We came up with 5 smoothies that are all their own flavor, while still using some of the same ingredients. We’ve made a </span><strong data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">SHOPPING LIST </span></strong><span data-dcnode-id="3466" instrument_node="">&nbsp;that you can find below, as well as in the notes of the recipe.</span></p><span data-dcnode-id="3464" instrument_node=""> </span><p data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">It was also important that we kept the ingredients as common as possible so they’re easy to find. We’ve offered a few substitutions in the recipe for ingredients that are less common, like cacao nibs. And while we tend to like a sweeter smoothie, we know some people would prefer to keep it as low sugar as possible, so sweetness is optional for most (except the cacao ones, which we definitely feel that the bitterness needs to be countered). You can use maple syrup, honey, or stevia (use the amount suggested on your brand) to sweeten your smoothie.</span></p><span data-dcnode-id="3461" instrument_node=""> </span><p data-dcnode-id="3457" style="text-align: center;"><img alt="Freezer Pack Smoothie Series" class="alignnone wp-image-439244 size-full entered lazyloaded" data-dcnode-id="3460" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg" data-lazy-srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-500x749.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-200x300.jpg 200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-768x1151.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-683x1024.jpg 683w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-640x959.jpg 640w" data-ll-status="loaded" data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" height="1798" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg&amp;raw" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-500x749.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-200x300.jpg 200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-768x1151.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-683x1024.jpg 683w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-640x959.jpg 640w" width="1200"><noscript data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">&lt;img data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" class="alignnone wp-image-439244 size-full" src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg" alt="Freezer Pack Smoothie Series" width="1200" height="1798" srcset="https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02.jpg 1200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-500x749.jpg 500w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-200x300.jpg 200w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-768x1151.jpg 768w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-683x1024.jpg 683w, https://lexiscleankitchen.com/wp-content/uploads/2018/08/IMG_2785_Facetune_16-08-2018-15-44-02-640x959.jpg 640w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></p><span data-dcnode-id="3456" instrument_node=""> </span><h2 data-dcnode-id="3454" style="text-align: center;"><span data-dcnode-id="3455" instrument_node="">&nbsp;Tips to Make and Use Smoothie Packs</span></h2><span data-dcnode-id="3453" instrument_node=""> </span><ul data-dcnode-id="3407"><span data-dcnode-id="3452" instrument_node=""> </span><li data-dcnode-id="3448"><strong data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">Where should I shop?</span></strong><span data-dcnode-id="3449" instrument_node=""> We recommend purchasing the fruit at a large box store that offers organic frozen fruits, like Costco or BJ’s, or a place like Trader’s Joes (this is where we purchased some of our ingredients). Amazon Fresh also has some great options for bulk fruit.</span></li><span data-dcnode-id="3447" instrument_node=""> </span><li data-dcnode-id="3443"><strong data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">How Do I Make Smoothie Freezer Packs?</span></strong><span data-dcnode-id="3444" instrument_node=""> Simply place all the specified ingredients, except the milk, inside a plastic bag (or better yet, a reusable bag) and freeze until ready to use, up to one month.</span></li><span data-dcnode-id="3442" instrument_node=""> </span><li data-dcnode-id="3438"><strong data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Can You Freeze a Smoothie for Later?&nbsp;</span></strong><span data-dcnode-id="3439" instrument_node="">We do not recommend blending the smoothie too far in advance. Smoothies are best consumed immediately.</span></li><span data-dcnode-id="3437" instrument_node=""> </span><li data-dcnode-id="3433"><strong data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Have Some Leftover Smoothie?&nbsp;</span></strong><span data-dcnode-id="3434" instrument_node="">We pour any leftover smoothie into a popsicle mold and enjoy later as a frozen treat. Kids love this! Though frozen smoothie pops are best consumed within a few days of making.</span></li><span data-dcnode-id="3432" instrument_node=""> </span><li data-dcnode-id="3409"><strong data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Items we love for smoothie packs:</span></strong><span data-dcnode-id="3429" instrument_node=""> </span><ol data-dcnode-id="3411"><span data-dcnode-id="3428" instrument_node=""> </span><li data-dcnode-id="3425"><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2n3O02w" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="3427" instrument_node="">Reusable Silicone Bags</span></a></li><span data-dcnode-id="3424" instrument_node=""> </span><li data-dcnode-id="3421"><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2n2LhWQ" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="3423" instrument_node="">High-Speed Blender</span></a></li><span data-dcnode-id="3420" instrument_node=""> </span><li data-dcnode-id="3416"><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2KhDga2" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="3419" instrument_node="">Bag Opener</span></a><span data-dcnode-id="3417" instrument_node=""> (to fill your packs)</span></li><span data-dcnode-id="3415" instrument_node=""> </span><li data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Labels/Sharpies to label/date!</span></li><span data-dcnode-id="3412" instrument_node=""> </span></ol><span data-dcnode-id="3410" instrument_node=""> </span></li><span data-dcnode-id="3408" instrument_node=""> </span></ul><span data-dcnode-id="3406" instrument_node=""> </span><p data-dcnode-id="3402"><img alt="Freezer Pack Smoothies" class="alignnone size-full wp-image-439245 entered error" data-dcnode-id="3405" data-lazy-src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series8.jpg" data-ll-status="error" data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" height="5224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series8.jpg&amp;raw" width="2400"><noscript data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">&lt;img data-pin-title="30 Smoothie Freezer Packs (Budget-Friendly)" class="alignnone size-full wp-image-439245" src="https://lexiscleankitchen.com/wp-content/uploads/2018/08/Smoothie-Series8.jpg" alt="Freezer Pack Smoothies" width="2400" height="5224" /&gt;</span></noscript></p><span data-dcnode-id="3401" instrument_node=""> </span><p data-dcnode-id="3398"><strong data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">Want more make-ahead smoothie freezer packs? Check out the whole series here:</span></strong></p><span data-dcnode-id="3397" instrument_node=""> </span><ul data-dcnode-id="3379"><span data-dcnode-id="3396" instrument_node=""> </span><li data-dcnode-id="3393"><a data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/anti-inflammatory-smoothie/" rel="noopener noreferrer"><span data-dcnode-id="3395" instrument_node="">Anti-Inflammatory Smoothie Freezer Pack</span></a></li><span data-dcnode-id="3392" instrument_node=""> </span><li data-dcnode-id="3389"><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/antioxidant-smoothie/"><span data-dcnode-id="3391" instrument_node="">Antioxidant Smoothie Freezer Pack</span></a></li><span data-dcnode-id="3388" instrument_node=""> </span><li data-dcnode-id="3385"><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lexiscleankitchen.com/high-fiber-smoothie/" span data-dcnode-id="3051" instrument_node="">1 tablespoon</span></span><span data-dcnode-id="3049" instrument_node=""> maple syrup</span></li><span data-dcnode-id="3047" instrument_node=""> </span><li data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Drop of mint extract or small handful of fresh mint</span></li><span data-dcnode-id="3044" instrument_node=""> </span><li data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">For blending: 1 cup almond milk</span></li><span data-dcnode-id="3041" instrument_node=""> </span></ul><span data-dcnode-id="3039" instrument_node=""> </span><p data-dcnode-id="3036"><strong data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">For Chocolate Coconut (make 6 each):</span></strong></p><span data-dcnode-id="3035" instrument_node=""> </span><ul data-dcnode-id="2999"><span data-dcnode-id="3034" instrument_node=""> </span><li data-dcnode-id="3030"><span data-amount="1" data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">1</span></span><span data-dcnode-id="3031" instrument_node=""> banana, sliced</span></li><span data-dcnode-id="3029" instrument_node=""> </span><li data-dcnode-id="3022"><span data-amount="0.5" data-dcnode-id="3027" data-unit="cup"><span data-dcnode-id="3028" instrument_node="">1/2 cup</span></span><span data-dcnode-id="3026" instrument_node=""> (</span><span data-amount="2" data-dcnode-id="3024" data-unit="ounce"><span data-dcnode-id="3025" instrument_node="">2 ounces</span></span><span data-dcnode-id="3023" instrument_node="">) frozen mixed berries</span></li><span data-dcnode-id="3021" instrument_node=""> </span><li data-dcnode-id="3014"><span data-amount="0.5" data-dcnode-id="3019" data-unit="cup"><span data-dcnode-id="3020" instrument_node="">1/2 cup</span></span><span data-dcnode-id="3018" instrument_node=""> (</span><span data-amount="2" data-dcnode-id="3016" data-unit="ounce"><span data-dcnode-id="3017" instrument_node="">2 ounces</span></span><span data-dcnode-id="3015" instrument_node="">) frozen cauliflower florets</span></li><span data-dcnode-id="3013" instrument_node=""> </span><li data-dcnode-id="3009"><span data-amount="2" data-dcnode-id="3011" data-unit="tablespoon"><span data-dcnode-id="3012" instrument_node="">2 tablespoons</span></span><span data-dcnode-id="3010" instrument_node=""> cacao powder</span></li><span data-dcnode-id="3008" instrument_node=""> </span><li data-dcnode-id="3004"><span data-amount="1" data-dcnode-id="3006" data-unit="tablespoon"><span data-dcnode-id="3007" instrument_node="">1 tablespoon</span></span><span data-dcnode-id="3005" instrument_node=""> maple syrup</span></li><span data-dcnode-id="3003" instrument_node=""> </span><li data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">For blending: 1 cup coconut milk</span></li><span data-dcnode-id="3000" instrument_node=""> </span></ul><span data-dcnode-id="2998" instrument_node=""> </span></div><span data-dcnode-id="2996" instrument_node=""> </span></div><span data-dcnode-id="2994" instrument_node=""> </span><div class="tasty-recipe-instructions" data-dcnode-id="2957"><span data-dcnode-id="2993" instrument_node=""> </span><div class="tasty-recipes-instructions-header" data-dcnode-id="2988"><span data-dcnode-id="2992" instrument_node=""> </span><h3 data-dcnode-id="2990" data-tasty-recipes-customization="h3-color.color h3-transform.text-transform"><span data-dcnode-id="2991" instrument_node="">Instructions</span></h3><span data-dcnode-id="2989" instrument_node=""> </span></div><span data-dcnode-id="2987" instrument_node=""> </span><div class="tasty-recipes-instructions-body" data-dcnode-id="2959" data-tasty-recipes-customization="body-color.color"><span data-dcnode-id="2986" instrument_node=""> </span><p data-dcnode-id="2983"><strong data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">To Make Smoothie Freezer Packs:</span></strong></p><span data-dcnode-id="2982" instrument_node=""> </span><ol data-dcnode-id="2974"><span data-dcnode-id="2981" instrument_node=""> </span><li data-dcnode-id="2979" id="instruction-step-1"><span data-dcnode-id="2980" instrument_node="">For each individual smoothie flavor place all components except for almond/coconut milk in plastic bag and flatten and press any air out of the bag. You can use a straw to suck the air out, just be careful not to do this if you’re using any cacao powder.</span></li><span data-dcnode-id="2978" instrument_node=""> </span><li data-dcnode-id="2976" id="instruction-step-2"><span data-dcnode-id="2977" instrument_node="">Repeat this recipe for a total of &nbsp;6 smoothies per flavor. Place in the freezer until ready to use.</span></li><span data-dcnode-id="2975" instrument_node=""> </span></ol><span data-dcnode-id="2973" instrument_node=""> </span><p data-dcnode-id="2970"><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">To Blend Smoothies:</span></strong></p><span data-dcnode-id="2969" instrument_node=""> </span><ol data-dcnode-id="2961"><span data-dcnode-id="2968" instrument_node=""> </span><li data-dcnode-id="2966" id="instruction-step-3"><span data-dcnode-id="2967" instrument_node="">Combine all ingredients, including specified milk, in a high speed blender.</span></li><span data-dcnode-id="2965" instrument_node=""> </span><li data-dcnode-id="2963" id="instruction-step-4"><span data-dcnode-id="2964" instrument_node="">Blend until creamy, adding additional almond milk if necessary.</span></li><span data-dcnode-id="2962" instrument_node=""> </span></ol><span data-dcnode-id="2960" instrument_node=""> </span></div><span data-dcnode-id="2958" instrument_node=""> </span></div><span data-dcnode-id="2956" instrument_node=""> </span><div class="tasty-recipes-notes" data-dcnode-id="2908"><span data-dcnode-id="2955" instrument_node=""> </span><h3 data-dcnode-id="2953" data-tasty-recipes-customization="h3-color.color h3-transform.text-transform"><span data-dcnode-id="2954" instrument_node="">Notes</span></h3><span data-dcnode-id="2952" instrument_node=""> </span><div class="tasty-recipes-notes-body" data-dcnode-id="2910" data-tasty-recipes-customization="body-color.color"><span data-dcnode-id="2951" instrument_node=""> </span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">If the tropical mixed fruit at your store has banana included skip it and instead get 16 ounces mango, 16 ounces pineapple and 16 ounces strawberry.</span></p><span data-dcnode-id="2948" instrument_node=""> </span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Freezer packs will last around one month. After significant period of time of longer than a month the bananas start to get brown. That’s when you’ll know it’s time to use them up!</span></p><span data-dcnode-id="2945" instrument_node=""> </span><p data-dcnode-id="2942"><strong data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Shopping List:</span></strong></p><span data-dcnode-id="2941" instrument_node=""> </span><p data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">72 ounces frozen mixed berries</span></p><span data-dcnode-id="2938" instrument_node=""> </span><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">42 ounces tropical mixed fruit (see note)</span></p><span data-dcnode-id="2935" instrument_node=""> </span><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">30 ounces frozen spinach</span></p><span data-dcnode-id="2932" instrument_node=""> </span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">24 ounces frozen cauliflower</span></p><span data-dcnode-id="2929" instrument_node=""> </span><p data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">21 bananas</span></p><span data-dcnode-id="2926" instrument_node=""> </span><p data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">4 ounces cocoa / cacao powder or cacao nibs (we used a mix of cacao powder and nibs, but feel free to pick one)</span></p><span data-dcnode-id="2923" instrument_node=""> </span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">8 ounces honey or maple syrup (optional, but we like it with it)</span></p><span data-dcnode-id="2920" instrument_node=""> </span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">6 oz mixed seeds of choice (pumpkin, sunflower, chia, flax, etc.)</span></p><span data-dcnode-id="2917" instrument_node=""> </span><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">4 ounces sliced almonds</span></p><span data-dcnode-id="2914" instrument_node=""> </span><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">mint extract or fresh mint bunch</span></p><span data-dcnode-id="2911" instrument_node=""> </span></div><span data-dcnode-id="2909" instrument_node=""> </span></div><span data-dcnode-id="2907" instrument_node=""> </span><footer class="tasty-recipes-entry-footer" data-dcnode-id="2898"><span data-dcnode-id="2906" instrument_node=""> </span><h3 data-dcnode-id="2904" data-tasty-recipes-customization="footer-heading-color.color h3-transform.text-transform footer-heading.innerText"><span data-dcnode-id="2905" instrument_node="">Did you make this recipe?</span></h3><span data-dcnode-id="2903" instrument_node=""> </span><div data-dcnode-id="2900" data-tasty-recipes-customization="footer-description-color.color footer-description.innerHTML"><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Share a photo and tag us — we can't wait to see what you've made!</span></p></div><span data-dcnode-id="2899" instrument_node=""> </span></footer><span data-dcnode-id="2897" instrument_node=""> </span><span data-dcnode-id="2894" instrument_node=""> </span></div><span data-dcnode-id="2890" instrument_node=""> </span></div><span data-dcnode-id="2888" instrument_node=""> </span><h2 data-dcnode-id="2886"><span data-dcnode-id="2887" instru
