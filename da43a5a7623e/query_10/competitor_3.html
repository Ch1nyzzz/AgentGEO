Hike%2520%252B%2520Additional%2520Tips" rel="nofollow noopener noreferrer" target="_blank"><span class="novashare-button-wrapper novashare-button-block" data-dcnode-id="3133"><span class="novashare-button-icon novashare-button-block" data-dcnode-id="3137"><svg data-dcnode-id="3138" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M440.3 203.5c-15 0-28.2 6.2-37.9 15.9-35.7-24.7-83.8-40.6-137.1-42.3L293 52.3l88.2 19.8c0 21.6 17.6 39.2 39.2 39.2 22 0 39.7-18.1 39.7-39.7s-17.6-39.7-39.7-39.7c-15.4 0-28.7 9.3-35.3 22l-97.4-21.6c-4.9-1.3-9.7 2.2-11 7.1L246.3 177c-52.9 2.2-100.5 18.1-136.3 42.8-9.7-10.1-23.4-16.3-38.4-16.3-55.6 0-73.8 74.6-22.9 100.1-1.8 7.9-2.6 16.3-2.6 24.7 0 83.8 94.4 151.7 210.3 151.7 116.4 0 210.8-67.9 210.8-151.7 0-8.4-.9-17.2-3.1-25.1 49.9-25.6 31.5-99.7-23.8-99.7zM129.4 308.9c0-22 17.6-39.7 39.7-39.7 21.6 0 39.2 17.6 39.2 39.7 0 21.6-17.6 39.2-39.2 39.2-22 .1-39.7-17.6-39.7-39.2zm214.3 93.5c-36.4 36.4-139.1 36.4-175.5 0-4-3.5-4-9.7 0-13.7 3.5-3.5 9.7-3.5 13.2 0 27.8 28.5 120 29 149 0 3.5-3.5 9.7-3.5 13.2 0 4.1 4 4.1 10.2.1 13.7zm-.8-54.2c-21.6 0-39.2-17.6-39.2-39.2 0-22 17.6-39.7 39.2-39.7 22 0 39.7 17.6 39.7 39.7-.1 21.5-17.7 39.2-39.7 39.2z" data-dcnode-id="3139" fill="currentColor"></path></svg></span><span class="novashare-button-label novashare-button-block novashare-hide" data-dcnode-id="3134"><span class="novashare-button-label-wrapper" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Reddit</span></span></span></span></a><div class="novashare-total-share-count" data-dcnode-id="3125"><div class="novashare-total-share-count-wrapper" data-dcnode-id="3126"><div class="novashare-total-share-count-details" data-dcnode-id="3127"><div class="novashare-total-share-count-amount" data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">26.4k</span></div><div class="novashare-total-share-count-text" data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">SHARES</span></div></div></div></div></div></div><div class="elementor elementor-14132" data-dcnode-id="938" data-elementor-id="14132" data-elementor-type="wp-post"><div class="elementor-inner" data-dcnode-id="939"><div class="elementor-section-wrap" data-dcnode-id="940"><section class="elementor-section elementor-top-section elementor-element elementor-element-14a7c8c9 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="3094" data-element_type="section" data-id="14a7c8c9"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="3095"><div class="elementor-row" data-dcnode-id="3096"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-7998a5cd" data-dcnode-id="3097" data-element_type="column" data-id="7998a5cd"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="3098"><div class="elementor-widget-wrap" data-dcnode-id="3099"><div class="elementor-element elementor-element-7bf15a53 elementor-widget elementor-widget-text-editor" data-dcnode-id="3107" data-element_type="widget" data-id="7bf15a53" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="3108"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3109"><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Since I’ve had a handful of people ask me for tips for&nbsp;preparing for the Narrows hike, this post is for you! There are two hikes you can do for the Narrows at Zion National Park:</span></p><ol data-dcnode-id="3112"><li data-dcnode-id="3117"><strong data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">The top-down thru-hike</span></strong><span data-dcnode-id="3118" instrument_node="">&nbsp;starts at Chamberlain’s Ranch and ends at the Temple of Sinawava, the two entry points into the river. It’s a two day 16 mile hike with 1,189 ft (361 m) elevation change.</span></li><li data-dcnode-id="3113"><strong data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">The bottom-up hike</span></strong><span data-dcnode-id="3114" instrument_node=""> is a day hike starting at the Temple of Sinawava to as far as Big Springs. It’s essentially the bottom half of the Narrows.</span></li></ol><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">We did the top-down during the fall, and the packing list covers everything you need, but I will also leave some tips near the end of the post for what you need on the bottom-up day-hike.&nbsp;</span></p></div></div></div><div class="elementor-element elementor-element-64b3034 elementor-widget elementor-widget-text-editor" data-dcnode-id="3100" data-element_type="widget" data-id="64b3034" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="3101"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3102"><span data-dcnode-id="3106" instrument_node=""> </span><img alt="Backpacking Gear List for the Zion Narrows Hike Top Down." class="alignnone size-full wp-image-24287 lazyloaded" data-dcnode-id="3105" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//localadventurer.com/wp-content/uploads/2014/11/narrowshikex.jpg&amp;raw" width="100%"><noscript data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">&lt;img class="alignnone size-full wp-image-24287" src="http://localadventurer.com/wp-content/uploads/2014/11/narrowshikex.jpg" alt="Backpacking Gear List for the Zion Narrows Hike Top Down." width="100%" /&gt;</span></noscript></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-7b05e50 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2839" data-element_type="section" data-id="7b05e50"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="2840"><div class="elementor-row" data-dcnode-id="2841"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-44aca04" data-dcnode-id="2842" data-element_type="column" data-id="44aca04"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="2843"><div class="elementor-widget-wrap" data-dcnode-id="2844"><div class="elementor-element elementor-element-3619061 elementor-widget elementor-widget-heading" data-dcnode-id="3089" data-element_type="widget" data-id="3619061" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="3090"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="3091"><u data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">BACKPACKING GEAR LIST FOR THE ZION NARROWS HIKE TOP DOWN</span></u></h2></div></div><div class="elementor-element elementor-element-5d5c7e5 elementor-widget elementor-widget-text-editor" data-dcnode-id="2845" data-element_type="widget" data-id="5d5c7e5" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="2846"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2847"><ol data-dcnode-id="2848"><li data-dcnode-id="3074"><b data-dcnode-id="3085"><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/osprey-womens" rel="noopener" target="_blank"><span data-dcnode-id="3088" instrument_node="">Backpack</span></a><span data-dcnode-id="3086" instrument_node="">: </span></b><span data-dcnode-id="3084" instrument_node="">We used our Osprey packs. </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/osprey-kids" rel="noopener" target="_blank"><span data-dcnode-id="3083" instrument_node="">This</span></a><span data-dcnode-id="3081" instrument_node=""> is the one I use this the </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/osprey-womens" rel="noopener" target="_blank"><span data-dcnode-id="3080" instrument_node="">women’s</span></a><span data-dcnode-id="3078" instrument_node=""> one is too big, and </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/osprey-mens" rel="noopener" target="_blank"><span data-dcnode-id="3077" instrument_node="">this</span></a><span data-dcnode-id="3075" instrument_node=""> is the one Jacob uses. We ordered a couple of full-on waterproof bags, but we’ve found they don’t have very good support to carry a lot of weight.</span></li><li data-dcnode-id="3062"><strong data-dcnode-id="3070"><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/drysack" rel="noopener" target="_blank"><span data-dcnode-id="3073" instrument_node="">Dry Sacks / Bags</span></a><span data-dcnode-id="3071" instrument_node="">:</span></strong><span data-dcnode-id="3069" instrument_node="">&nbsp;We each used </span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/drysack" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3068" instrument_node="">one large</span></a><span data-dcnode-id="3066" instrument_node=""> and </span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/drysack" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3065" instrument_node="">one small</span></a><span data-dcnode-id="3063" instrument_node="">&nbsp;(4 total).</span></li><li data-dcnode-id="3054"><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/backpacking-tent" rel="noopener" target="_blank"><strong data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Backpacking Tent:</span></strong></a><span data-dcnode-id="3058" instrument_node="">&nbsp;</span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/backpacking-tent" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3057" instrument_node="">Our backpacking tent </span></a><span data-dcnode-id="3055" instrument_node="">is one of the best and packs down to 5.5 x 17.5 inches (14 x 44.5 cm) and weighs 3 lbs 2 oz. Whichever tent you decide on, it’s really important that it’s light and compact as possible. Some people forego having a tent altogether and sleep outside since you can’t backpack the Narrows if it rains anyways. I might be a little more high maintenance, but I prefer not being covered in dew when I wake up. ;)</span></li><li data-dcnode-id="3045"><strong data-dcnode-id="3050"><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/light-sleeping-bag" rel="noopener" target="_blank"><span data-dcnode-id="3053" instrument_node="">Sleeping Bag</span></a><span data-dcnode-id="3051" instrument_node="">:</span></strong><span data-dcnode-id="3049" instrument_node=""> We both have </span><a data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/light-sleeping-bag" rel="noopener" target="_blank"><span data-dcnode-id="3048" instrument_node="">REI sleeping bags</span></a><span data-dcnode-id="3046" instrument_node="">. Pay attention to the temperature rating, weight, and compressed volume. You want warmer, lighter, and smaller.</span></li><li data-dcnode-id="3037"><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sleeping-pad" rel="noopener" target="_blank"><strong data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Sleeping Pad:</span></strong></a><span data-dcnode-id="3041" instrument_node=""> We have </span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sleeping-pad" rel="noopener" target="_blank"><span data-dcnode-id="3040" instrument_node="">lightweight sleeping pads</span></a><span data-dcnode-id="3038" instrument_node="">, which packs small and is light. These are also optional, and our friends with us toughed it out, but we&nbsp;did get better sleep. :)</span></li><li data-dcnode-id="3025"><strong data-dcnode-id="3033"><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/trekking-poles" rel="noopener" target="_blank"><span data-dcnode-id="3036" instrument_node="">Walking Poles</span></a><span data-dcnode-id="3034" instrument_node="">:</span></strong><span data-dcnode-id="3032" instrument_node=""> I have these </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/trekking-poles" rel="noopener" target="_blank"><span data-dcnode-id="3031" instrument_node="">trekking poles</span></a><span data-dcnode-id="3029" instrument_node="">, and Jacob got a </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/zarentals" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3028" instrument_node="">rental walking stick</span></a><span data-dcnode-id="3026" instrument_node="">. They recommend that you rent walking sticks because yours might get dented up in the water, but mine did just fine. I think it also helped to have two for balance when navigating through the rapids.</span></li><li data-dcnode-id="3017"><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/water-reservoir" rel="noopener" target="_blank"><strong data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Water Bladder:</span></strong></a><span data-dcnode-id="3021" instrument_node="">&nbsp;We both have </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/water-reservoir" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3020" instrument_node="">platypus bladders</span></a><span data-dcnode-id="3018" instrument_node="">&nbsp;and filled it 2 liters to last us both days. We didn’t sweat much since it was fall. You can bring less and also bring a filter (see water filter tips below).</span></li><li data-dcnode-id="3009"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/softbottle" rel="noopener" target="_blank"><strong data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Collapsible Soft Bottle:</span></strong></a><span data-dcnode-id="3013" instrument_node="">&nbsp;I brought the&nbsp;</span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/softbottle" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3012" instrument_node="">0.5L soft bottle</span></a><span data-dcnode-id="3010" instrument_node=""> to mix in Emergen-C just in case I got sick.</span></li><li data-dcnode-id="3000"><strong data-dcnode-id="3005"><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/quick-dry-tees" rel="noopener" target="_blank"><span data-dcnode-id="3008" instrument_node="">Quick Dry Tees</span></a><span data-dcnode-id="3006" instrument_node="">:</span></strong><span data-dcnode-id="3004" instrument_node="">&nbsp;I brought </span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//localadventurer.com/north-face-reaxion-v-neck" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="3003" instrument_node="">two of these</span></a><span data-dcnode-id="3001" instrument_node="">, one for each day. I personally like to use the second clean shirt to sleep and then hike the next day in it, but if you don’t mind wearing the same shirt twice, go for it! Jacob brought a regular cotton tee the first day, but we don’t recommend cotton, because it doesn’t dry and doesn’t keep you warm. Luckily, his shirt only got wet near the end of day 1’s hike, so he didn’t have to stay wet long. The second day he just wore the quick-dry long sleeves.</span></li><li data-dcnode-id="2991"><strong data-dcnode-id="2996"><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/quick-dry-long-sleeve" rel="noopener" target="_blank"><span data-dcnode-id="2999" instrument_node="">Quick Dry Long Sleeves</span></a><span data-dcnode-id="2997" instrument_node="">:</span></strong><span data-dcnode-id="2995" instrument_node=""> I brought one and Jacob brought two. We always bring our </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/quick-dry-long-sleeve" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2994" instrument_node="">Patagonia base layers</span></a><span data-dcnode-id="2992" instrument_node="">. Ideally, wear two quick-dry layers: one tee and a long sleeve over.</span></li><li data-dcnode-id="2982"><strong data-dcnode-id="2987"><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/arcteryx-down-jacket" rel="noopener" target="_blank"><span data-dcnode-id="2990" instrument_node="">Down Jacket</span></a><span data-dcnode-id="2988" instrument_node="">:</span></strong><span data-dcnode-id="2986" instrument_node=""> It gets really cold early mornings and after dark. We both brought our </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/arcteryx-down-jacket" rel="noopener" target="_blank"><span data-dcnode-id="2985" instrument_node="">down&nbsp;jackets</span></a><span data-dcnode-id="2983" instrument_node="">, because they are really warm and also very compact. We also like to use these as pillows.</span></li><li data-dcnode-id="2970"><strong data-dcnode-id="2978"><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/convertible-hiking-pants" rel="noopener" target="_blank"><span data-dcnode-id="2981" instrument_node="">Quick Dry Shorts</span></a><span data-dcnode-id="2979" instrument_node="">:</span></strong><span data-dcnode-id="2977" instrument_node=""> Jacob wore </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/convertible-hiking-pants-mens" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2976" instrument_node="">these hiking pants</span></a><span data-dcnode-id="2974" instrument_node="">&nbsp;both days, and I wore </span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/convertible-hiking-pants" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2973" instrument_node="">these</span></a><span data-dcnode-id="2971" instrument_node="">&nbsp;both days. Dry your shorts on a tree overnight, and they’re good to go. We both left the zip offs at home. Our friends brought swim shorts.</span></li><li data-dcnode-id="2961"><strong data-dcnode-id="2966"><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/patagonia-capilene-bottoms" rel="noopener" target="_blank"><span data-dcnode-id="2969" instrument_node="">Long Underwear</span></a><span data-dcnode-id="2967" instrument_node="">:</span></strong><span data-dcnode-id="2965" instrument_node="">&nbsp;We both have the </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/patagonia-capilene-bottoms" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2964" instrument_node="">patagonia midweight bottoms</span></a><span data-dcnode-id="2962" instrument_node="">&nbsp;to keep us warm at night. Jacob just happened to forget his on this trip and got really cold.</span></li><li data-dcnode-id="2946"><strong data-dcnode-id="2957"><a data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/tropicfeel" rel="noopener" target="_blank"><span data-dcnode-id="2960" instrument_node="">Water shoes</span></a><span data-dcnode-id="2958" instrument_node="">:</span></strong><span data-dcnode-id="2956" instrument_node=""> Jacob has </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/tropicfeel" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2955" instrument_node="">these</span></a><span data-dcnode-id="2953" instrument_node="">, and I ended up </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/zarentals" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2952" instrument_node="">renting shoes</span></a><span data-dcnode-id="2950" instrument_node="">&nbsp;that had great ankle support but much heavier and slowed me down. I also own </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/keen" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2949" instrument_node="">keen water sandals</span></a><span data-dcnode-id="2947" instrument_node="">&nbsp;(kid’s of course. it’s purple and sparkly :P), but our guy friends with similar water sandals kept getting rocks in theirs during the hike, so Jacob’s shoes win.</span></li><li data-dcnode-id="2934"><strong data-dcnode-id="2942"><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/waterproof-socks" rel="noopener" target="_blank"><span data-dcnode-id="2945" instrument_node="">Waterproof Socks</span></a><span data-dcnode-id="2943" instrument_node="">:</span></strong><span data-dcnode-id="2941" instrument_node="">&nbsp;Jacob used </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/waterproof-socks" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2940" instrument_node="">these</span></a><span data-dcnode-id="2938" instrument_node="">,&nbsp;and I used the </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/zarentals" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2937" instrument_node="">rental socks</span></a><span data-dcnode-id="2935" instrument_node="">. We were both disappointed that they held in so much water. We were sloshing around even when we were on dry land.</span></li><li data-dcnode-id="2925"><strong data-dcnode-id="2930"><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/jetboil" rel="noopener" target="_blank"><span data-dcnode-id="2933" instrument_node="">Portable Cooking System</span></a><span data-dcnode-id="2931" instrument_node="">:</span></strong><span data-dcnode-id="2929" instrument_node=""> We use </span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/jetboil" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2928" instrument_node="">a jetboil</span></a><span data-dcnode-id="2926" instrument_node="">&nbsp;to cook so that we can have some warm food while hiking. You can also forego this and take a bunch of bars, but since the water is cold, we decided it’d be nice to have warm food.</span></li><li data-dcnode-id="2910"><strong data-dcnode-id="2921"><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/mountain-house-lasagna" rel="noopener" target="_blank"><span data-dcnode-id="2924" instrument_node="">Dry Food and Snack Bars</span></a><span data-dcnode-id="2922" instrument_node="">:</span></strong><span data-dcnode-id="2920" instrument_node=""> We brought </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/mountain-house-lasagna" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2919" instrument_node="">Mountain House Lasagna,</span></a><span data-dcnode-id="2917" instrument_node=""> </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/cliff-bars" rel="noopener" target="_blank"><span data-dcnode-id="2916" instrument_node="">Cliff bars</span></a><span data-dcnode-id="2914" instrument_node=""> and </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/kind-bars" rel="noopener" target="_blank"><span data-dcnode-id="2913" instrument_node="">Kind bars</span></a><span data-dcnode-id="2911" instrument_node=""> for me (6-8 each) and didn’t stop for lunches. We also brought 2 stingers per person.</span></li><li data-dcnode-id="2901"><strong data-dcnode-id="2906"><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/headlamp" rel="noopener" target="_blank"><span data-dcnode-id="2909" instrument_node="">Headlamp</span></a><span data-dcnode-id="2907" instrument_node="">:</span></strong><span data-dcnode-id="2905" instrument_node=""> We both have </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/headlamp" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2904" instrument_node="">these petzls</span></a><span data-dcnode-id="2902" instrument_node="">&nbsp;and they always help if you are stuck setting up your tent after dark or if you need to use the bathroom.</span></li><li data-dcnode-id="2893"><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/earplugs" rel="noopener" target="_blank"><strong data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Earplugs</span></strong></a><span data-dcnode-id="2897" instrument_node="">:&nbsp;If you’re a light sleeper and you have snorers in your group, you’re going to need </span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/earplugs" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2896" instrument_node="">these</span></a><span data-dcnode-id="2894" instrument_node="">. The river can be loud.</span></li><li data-dcnode-id="2886"><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sunblock" rel="noopener" target="_blank"><strong data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Sunblock:</span></strong></a><span data-dcnode-id="2889" instrument_node=""> There really isn’t much sun, but it’s good to stay protected so we brought </span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sunblock" rel="noopener" target="_blank"><span data-dcnode-id="2888" instrument_node="">this sunblock</span></a></li><li data-dcnode-id="2882"><strong data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Toiletries:</span></strong><span data-dcnode-id="2883" instrument_node=""> Toothbrush, toothpaste, wet wipes, emergen-C just in case I get sick.</span></li><li data-dcnode-id="2878"><strong data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Trash Bags:</span></strong><span data-dcnode-id="2879" instrument_node="">&nbsp;To double bag your dry sacks. No dry sack is 100% waterproof. And more bags to carry your poop bag and trash. 3 total since Jacob is such a great husband and carried out both our trash and poop bags, but bring 2 for yourself if you’re on your own. ;)</span></li><li data-dcnode-id="2872"><strong data-dcnode-id="2874"><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/flip-flops" rel="noopener" target="_blank"><span data-dcnode-id="2877" instrument_node="">Flip Flops</span></a><span data-dcnode-id="2875" instrument_node="">:</span></strong><span data-dcnode-id="2873" instrument_node=""> We both forgot these and it was a HUUUUGE mistake. After settling into our campsite and changing into dry clothes for the night, we still had to put on our wet shoes. It was miserable. Bring really cheap ones, I don’t care, but do NOT forget them!</span></li><li data-dcnode-id="2868"><strong data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Poop kit / bag (not pictured):</span></strong><span data-dcnode-id="2869" instrument_node=""> They give you one per person when you arrive at the Zion Welcome Center to pick up your permit.</span></li><li data-dcnode-id="2858"><strong data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Camera gear (not pictured):</span></strong><span data-dcnode-id="2865" instrument_node=""> We brought a tripod, a </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/canon-5d-mark-iv" rel="noopener" target="_blank"><span data-dcnode-id="2864" instrument_node="">Mark III</span></a><span data-dcnode-id="2862" instrument_node=""> with a </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/35mm" rel="noopener" target="_blank"><span data-dcnode-id="2861" instrument_node="">35/1.4L lens</span></a><span data-dcnode-id="2859" instrument_node="">. It’s really heavy and probably not the safest since I don’t have any waterproof gear for it. We were just extra careful to make sure we didn’t fall into the water, and if we did, we saved the camera instead of ourselves. Half the time it was tucked away in my smaller dry sack.</span></li><li data-dcnode-id="2849"><strong data-dcnode-id="2854"><a data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sunhat" rel="noopener" target="_blank"><span data-dcnode-id="2857" instrument_node="">Sunhat</span></a><span data-dcnode-id="2855" instrument_node=""> (not pictured):</span></strong><span data-dcnode-id="2853" instrument_node=""> I have </span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/sunhat" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2852" instrument_node="">this Columbia hat</span></a><span data-dcnode-id="2850" instrument_node="">, but it was more of a nuisance because it kept hitting the top of my backpack and falling off my head. A regular baseball cap was more effective. Also, the first day we barely got any sun. The second day was a little more exposed, but you’re going in and out of shade constantly.</span></li></ol></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-a4cf22a elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2799" data-element_type="section" data-id="a4cf22a"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="2800"><div class="elementor-row" data-dcnode-id="2801"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-384109a" data-dcnode-id="2802" data-element_type="column" data-id="384109a"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="2803"><div class="elementor-widget-wrap" data-dcnode-id="2804"><div class="elementor-element elementor-element-cc991ca elementor-widget elementor-widget-heading" data-dcnode-id="2834" data-element_type="widget" data-id="cc991ca" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="2835"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="2836"><u data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Car Camping</span></u></h2></div></div><div class="elementor-element elementor-element-1756cdc elementor-widget elementor-widget-text-editor" data-dcnode-id="2805" data-element_type="widget" data-id="1756cdc" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="2806"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2807"><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">The first night we decided to bring all our car camping gear so that we can get a good night’s sleep before our hike. It was nice because we could leave all of it in the car during our hike days.</span></p><p data-dcnode-id="2829"><strong data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">For Car Camping the night before and / or after:</span></strong></p><ol data-dcnode-id="2808"><li data-dcnode-id="2809" style="list-style-type: none;"><ol data-dcnode-id="2810"><li data-dcnode-id="2820"><strong data-dcnode-id="2825"><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/budget-tent" rel="noopener" target="_blank"><span data-dcnode-id="2828" instrument_node="">Car Camping Tent</span></a><span data-dcnode-id="2826" instrument_node="">: </span></strong><span data-dcnode-id="2824" instrument_node="">We have </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/budget-tent" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2823" instrument_node="">this Coleman 4 person tent</span></a><span data-dcnode-id="2821" instrument_node="">, a&nbsp;cheap tent that fits our mattress.</span></li><li data-dcnode-id="2811"><strong data-dcnode-id="2816"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/inflatable-mattress" rel="noopener" target="_blank"><span data-dcnode-id="2819" instrument_node="">Inflatable Mattress</span></a><span data-dcnode-id="2817" instrument_node="">:&nbsp;</span></strong><span data-dcnode-id="2815" instrument_node="">We used t</span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/inflatable-mattress" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2814" instrument_node="">his queen-sized mattress</span></a><span data-dcnode-id="2812" instrument_node=""> and blew it up using our car.</span></li></ol></li></ol></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-af0e5e1 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2786" data-element_type="section" data-id="af0e5e1"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="2787"><div class="elementor-row" data-dcnode-id="2788"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-eb4c6fd" data-dcnode-id="2789" data-element_type="column" data-id="eb4c6fd"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="2790"><div class="elementor-widget-wrap" data-dcnode-id="2791"><div class="elementor-element elementor-element-04a2ee8 elementor-widget elementor-widget-text-editor" data-dcnode-id="2792" data-element_type="widget" data-id="04a2ee8" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="2793"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2794"><div data-dcnode-id="2798" data-ratio="16:9" data-volume="70" id="eefsgw9akpwibaagv4nc"></div><span data-dcnode-id="2797" instrument_node=""> </span><span data-dcnode-id="2795" instrument_node=""> </span></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-cd5aac8 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2697" data-element_type="section" data-id="cd5aac8"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="2698"><div class="elementor-row" data-dcnode-id="2699"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-8bec5c5" data-dcnode-id="2700" data-element_type="column" data-id="8bec5c5"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="2701"><div class="elementor-widget-wrap" data-dcnode-id="2702"><div class="elementor-element elementor-element-d6e30f2 elementor-widget elementor-widget-heading" data-dcnode-id="2781" data-element_type="widget" data-id="d6e30f2" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="2782"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="2783"><u data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Additional Tips</span></u></h2></div></div><div class="elementor-element elementor-element-cf244b2 elementor-widget elementor-widget-text-editor" data-dcnode-id="2703" data-element_type="widget" data-id="cf244b2" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="2704"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2705"><ul data-dcnode-id="2706"><li data-dcnode-id="2774"><b data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Reservations:&nbsp;</span></b><span data-dcnode-id="2778" instrument_node="">Make them up to 3 months in advance&nbsp;</span><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nps.gov/zion/planyourvisit/narrowspermits.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2777" instrument_node="">here</span></a><span data-dcnode-id="2775" instrument_node="">.</span></li><li data-dcnode-id="2758"><strong data-dcnode-id="2771"><strong data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Permits:</span></strong></strong><ul data-dcnode-id="2759"><li data-dcnode-id="2763"><span data-dcnode-id="2770" instrument_node="">Permit Costs: </span><span data-dcnode-id="2768" style="line-height: 1.5;"><span data-dcnode-id="2769" instrument_node="">$15 for 1-2 people; </span></span><span data-dcnode-id="2766" style="line-height: 1.5;"><span data-dcnode-id="2767" instrument_node="">$20 for 3-7 people; </span></span><span data-dcnode-id="2764" style="line-height: 1.5;"><span data-dcnode-id="2765" instrument_node="">$25 for 8-12 people</span></span></li><li data-dcnode-id="2760"><span data-dcnode-id="2761" style="line-height: 1.5;"><span data-dcnode-id="2762" instrument_node="">Walk-In Permits can be obtained one day in advance from the visitor centers.</span></span></li></ul></li><li data-dcnode-id="2754"><b data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Hiking in Summer:</span></b><span data-dcnode-id="2755" instrument_node=""> The only thing I would change for the packing list for the summer is more water (about 4 L a person) and you can leave behind a warm jacket. The water is still cold.</span></li><li data-dcnode-id="2750"><strong data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Day hike Only:</span></strong><span data-dcnode-id="2751" instrument_node="">&nbsp;We recommend bringing&nbsp;water shoes, waterproof socks, 1L of water, snacks, and some comfortable clothes. We saw that most people stopped at Wall Street and turned back.</span></li><li data-dcnode-id="2746"><strong data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Lodging:</span></strong><span data-dcnode-id="2747" instrument_node="">&nbsp;We drove straight home after we got back from day 2 of our hike, so that we could have a warm shower and rest in our beds. The day before the hike, however, we went in and stayed at Watchman Campgrounds. It is a great campground with exceptionally clean bathroom facilities. They don’t have many campgrounds available at Zion, so you should try to book reservations early. We showed up and they happened to fit us into the overflow group camping area.</span></li><li data-dcnode-id="2739"><strong data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Shuttle:</span></strong><span data-dcnode-id="2743" instrument_node="">&nbsp;There is a shuttle service provided by</span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/zion-shuttle%3Fswcfpc%3D1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2742" instrument_node=""> Zion Adventure Company</span></a><span data-dcnode-id="2740" instrument_node=""> that takes you to the trailhead at Chamberlain’s Ranch. It is $37 a person. &nbsp;We took the shuttle to the trailhead of the hike. It’s a pretty rough road, so our friend’s forester would have been fine, but our Altima might have struggled a bit. Also, it would have added an extra hour and half or so of driving on the last day.</span></li><li data-dcnode-id="2735"><strong data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Renting Dry Pants and Suits:</span></strong><span data-dcnode-id="2736" instrument_node=""> I rented a whole set with a dry suit, waterproof socks, water boots, and a hiking stick because the company who provided the shuttle service recommended everyone to wear at least the dry pants when the water temperature drops below 55 degrees F (12.7 deg C). It was at the end of peak season where the temperature was 55 degrees F. They also told me I was too short and needed a dry suit because the water levels would go above my waist and my dry pants. In hindsight, I would go without any of the rental gear. All the guys did fine and the cold water wasn’t unbearable. Meanwhile, I was burning up in my suit, so I had the top part off and the sleeves tied around my waist most of the time.</span></li><li data-dcnode-id="2731"><strong data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Filtering Water:</span></strong><span data-dcnode-id="2732" instrument_node="">&nbsp;If you want to carry less water on your back, you can bring a water filter for after Deep Creek Junction / the campsites. It’s not recommended to filter and drink the water north of it, because there are cattle farms.</span></li><li data-dcnode-id="2727"><strong data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Number of People:</span></strong><span data-dcnode-id="2728" instrument_node=""> The top-down hike had a total of 10 people on the day we went. The first day, you feel like you have the Narrows all to yourself. The second day is the part where most people hike the bottom half on a day hike bottom up. While there will breaks in between groups of people, you definitely have to wait for photos.</span></li><li data-dcnode-id="2723"><strong data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Water Levels:</span></strong><span data-dcnode-id="2724" instrument_node=""> When we arrived, they told us the water level will go up to waist deep (for average height people) and chest-deep for me. The first day of the hike (top half) was roughly 80% ankle deep. The second day (bottom half) was roughly 75% ankle to knee-deep. I expected there to be longer portions of deeper water where I’m possibly swimming, but there were only 2 or 3 deep portions that were unavoidable and at most two steps in length. If you use your walking sticks to measure the depth of the water, you can easily navigate around a lot of the deeper waters. Also, clear to light green water is shallow, while darker blues / greens mean deeper water.</span></li><li data-dcnode-id="2719"><strong data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Time it Took: </span></strong><span data-dcnode-id="2720" instrument_node="">The map and the landmarks given to us didn’t seem very accurate. Day 1 was supposed to be a shorter day. We expected it to take less time, which felt demoralizing near the end. It’s all about setting expectations, right? The second day, we breezed through it.</span></li><li data-dcnode-id="2715"><strong data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Riverside Walk:</span></strong><span data-dcnode-id="2716" instrument_node=""> After you reach the Temple of Sinawava, there is still one more mile of hiking on the paved trail to the shuttle.</span></li><li data-dcnode-id="2711"><strong data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Cut Your Toenails!</span></strong><span data-dcnode-id="2712" instrument_node="">&nbsp;I ended up slicing the sides of my toes.</span></li><li data-dcnode-id="2707"><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Makeshift Toilet: </span></strong><span data-dcnode-id="2708" instrument_node="">Squatting and pooping in a bag can be a challenge especially after your legs are jello from the hike. The last thing you want to do is fall into your own poop. :) The second day, the guys created a makeshift bathroom with two rocks on both sides of the bag for you to rest your butt on.</span></li></ul></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-840b319 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="1159" data-element_type="section" data-id="840b319"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="1160"><div class="elementor-row" data-dcnode-id="1161"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-8f94e53" data-dcnode-id="1162" data-element_type="column" data-id="8f94e53"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="1163"><div class="elementor-widget-wrap" data-dcnode-id="1164"><div class="elementor-element elementor-element-ed9b35c elementor-widget elementor-widget-heading" data-dcnode-id="2692" data-element_type="widget" data-id="ed9b35c" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="2693"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="2694"><u data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Best Places to Stay in Zion</span></u></h2></div></div><div class="elementor-element elementor-element-4658d24 elementor-widget elementor-widget-text-editor" data-dcnode-id="2676" data-element_type="widget" data-id="4658d24" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="2677"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2678"><ul data-dcnode-id="2679"><li data-dcnode-id="2688"><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/zion-lodge%3Fswcfpc%3D1" rel="noopener" target="_blank"><span data-dcnode-id="2691" instrument_node="">Zion Lodge</span></a><span data-dcnode-id="2689" instrument_node=""> (luxury) – it’s the only hotel inside the park. You must reserve rooms at least 6 months in advance especially during peak season.</span></li><li data-dcnode-id="2684"><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/best-friends-roadhouse" rel="noopener" target="_blank"><span data-dcnode-id="2687" instrument_node="">Best Friends Roadhouse and Mercantile</span></a><span data-dcnode-id="2685" instrument_node=""> (mid-range) – in Kanab and great if you have your pets with you!</span></li><li data-dcnode-id="2680"><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.localadventurer.com/advenire" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2683" instrument_node="">The Advenire St George</span></a><span data-dcnode-id="2681" instrument_node=""> (luxury) – loved our stay here for Zion and also the nearby hikes. It has a nice luxury boutique feel and is conveniently located in historic St George with plenty of great walking distance food options after a full, active day.</span></li></ul></div></div></div><div class="elementor-element elementor-element-abbb620 elementor-widget elementor-widget-text-editor" data-dcnode-id="1165" data-element_type="widget" data-id="abbb620" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="1166"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1167"><p data-dcnode-id="1168"><iframe data-dcnode-id="1169" frameborder="0" height="460" id="stay22-widget" loadin pan></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Cheers,</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">R</span></p></div></div></div></article><ol class="children" data-dcnode-id="673"><li class="comment-container" data-dcnode-id="675" id="comment-69259"><article class="comment byuser comment-author-jacob odd alt depth-2 comment-body" data-dcnode-id="677"><div class="comment-content" data-dcnode-id="678"><div class="comment-author" data-dcnode-id="688"><h3 class="comment-link" data-dcnode-id="698"><a class="url" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//localadventurer.com/" rel="external nofollow ugc"><span data-dcnode-id="700" instrument_node="">jacob</span></a></h3><span data-dcnode-id="697" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="689"><span data-dcnode-id="696" instrument_node=""> </span><span class="comment-date" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">16 Jul 2018</span></span><span data-dcnode-id="693" instrument_node=""> </span><a aria-label="Reply to jacob" class="comment-reply-link" data-belowelement="comment-69259" data-commentid="69259" data-dcnode-id="691" data-postid="14132" data-replyto="Reply to jacob" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/embed/gm%3Faid%3D5fb572830099f500178b7a5a%26address%3D115%2520S%2520Main%2520St%2C%2520Kanab%2C%2520UT%252084741%26checkin%3D%26markerimage%3Dhttps%3A//res.cloudinary.com/huedhbm8g/image/upload/v1606334176/temp/5fb83b5143166b0017609095-1606334176.png%26maincolor%3D6A5A97%23comment-69259" rel="nofollow"><span data-dcnode-id="692" instrument_node="">Reply</span></a><span data-dcnode-id="690" instrument_node=""> </span></span></div><div class="clr" data-dcnode-id="687"></div><div class="comment-entry" data-dcnode-id="679"><div class="comment-content" data-dcnode-id="680"><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">That sounds amazing! It’s still one of the top hikes we’ve done. As far as wet socks go, you just deal with them. You’ll be in the water for the most part so there’s no point in trying to dry them. We had a pair of wool socks for night time and hung our water socks outside. In the morning, it was a bit of a struggle to get them back on, but once we were in the water again, it didn’t make much of a difference.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">If the water temps are really cold, then you should definitely get a drysuit. Otherwise, just have layers like you would normally for hikes/camping so you can take off or put on as needed. And remember to have a set of dry clothes for the campsite.</span></p><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Have fun!</span></p></div></div></div></article></li></ol></li><li class="comment-container" data-dcnode-id="624" id="comment-29434"><article class="comment even thread-odd thread-alt depth-1 comment-body" data-dcnode-id="651"><div class="comment-content" data-dcnode-id="652"><div class="comment-author" data-dcnode-id="658"><h3 class="comment-link" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Dan</span></h3><span data-dcnode-id="667" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="659"><span data-dcnode-id="666" instrument_node=""> </span><span class="comment-date" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">18 Sep 2017</span></span><span data-dcnode-id="663" instrument_node=""> </span><a aria-label="Reply to Dan" class="comment-reply-link" data-belowelement="comment-29434" data-commentid="29434" data-dcnode-id="661" data-postid="14132" data-replyto="Reply to Dan" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/embed/gm%3Faid%3D5fb572830099f500178b7a5a%26address%3D115%2520S%2520Main%2520St%2C%2520Kanab%2C%2520UT%252084741%26checkin%3D%26markerimage%3Dhttps%3A//res.cloudinary.com/huedhbm8g/image/upload/v1606334176/temp/5fb83b5143166b0017609095-1606334176.png%26maincolor%3D6A5A97%23comment-29434" rel="nofollow"><span data-dcnode-id="662" instrument_node="">Reply</span></a><span data-dcnode-id="660" instrument_node=""> </span></span></div><div class="clr" data-dcnode-id="657"></div><div class="comment-entry" data-dcnode-id="653"><div class="comment-content" data-dcnode-id="654"><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Your post was fantastic since I plan to hike this trail this coming saturday and as of right now the weather channel is saying it’ll be a high of 59F and low of 32F.  I didn’t know how extreme I needed to go for clothes.  I’m hiking the full trail in one day so I’m taking the 615am shuttle.  Do you think shorts and a t-shirt are enough?  I plan to rent the water shoes and socks.  I have trekking poles that I plan to use as well.  I plan to take my osprey manta 36 day pack with a 3 Liter bladder along with a filter just in case.  In my dry bag I’m bring two merino wool long sleeve shirts, marino wool long underwear, waterproof lightweight pants, extra pair of underwear, warm socks and a warm hat just in case.  Also bringing a head lamp, medical stuff, map, compass, lighter.  Also of course cliff bars, nuts and dried fruit.  Any recommendations based off of that?</span></p></div></div></div></article><ol class="children" data-dcnode-id="626"><li class="comment-container" data-dcnode-id="628" id="comment-29476"><article class="comment byuser comment-author-estherjulee odd alt depth-2 comment-body" data-dcnode-id="630"><div class="comment-content" data-dcnode-id="631"><div class="comment-author" data-dcnode-id="637"><h3 class="comment-link" data-dcnode-id="647"><a class="url" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//localadventurer.com/" rel="external nofollow ugc"><span data-dcnode-id="649" instrument_node="">Esther JuLee</span></a></h3><span data-dcnode-id="646" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="638"><span data-dcnode-id="645" instrument_node=""> </span><span class="comment-date" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">19 Sep 2017</span></span><span data-dcnode-id="642" instrument_node=""> </span><a aria-label="Reply to Esther JuLee" class="comment-reply-link" data-belowelement="comment-29476" data-commentid="29476" data-dcnode-id="640" data-postid="14132" data-replyto="Reply to Esther JuLee" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/embed/gm%3Faid%3D5fb572830099f500178b7a5a%26address%3D115%2520S%2520Main%2520St%2C%2520Kanab%2C%2520UT%252084741%26checkin%3D%26markerimage%3Dhttps%3A//res.cloudinary.com/huedhbm8g/image/upload/v1606334176/temp/5fb83b5143166b0017609095-1606334176.png%26maincolor%3D6A5A97%23comment-29476" rel="nofollow"><span data-dcnode-id="641" instrument_node="">Reply</span></a><span data-dcnode-id="639" instrument_node=""> </span></span></div><div class="clr" data-dcnode-id="636"></div><div class="comment-entry" data-dcnode-id="632"><div class="comment-content" data-dcnode-id="633"><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Thank you, Dan! It sounds like you have everything covered especially since you’re going around the same time of year as us. The only thing I would check is what it’s saying the water temperature and level has been at the parks visitor center / ranger station. It was fine without a dry suit with the water temp at 55 deg, but if it dips below that I don’t know if it will just be very uncomfortable without one. I know that plenty of people go without.</span></p></div></div></div></article></li></ol></li><li class="comment-container" data-dcnode-id="577" id="comment-26204"><article class="comment even thread-even depth-1 comment-body" data-dcnode-id="604"><div class="comment-content" data-dcnode-id="605"><div class="comment-author" data-dcnode-id="611"><h3 class="comment-link" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">JENNA</span></h3><span data-dcnode-id="620" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="612"><span data-dcnode-id="619" instrument_node=""> </span><span class="comment-date" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">25 Aug 2017</span></span><span data-dcnode-id="616" instrument_node=""> </span><a aria-label="Reply to JENNA" class="comment-reply-link" data-belowelement="comment-26204" data-commentid="26204" data-dcnode-id="614" data-postid="14132" data-replyto="Reply to JENNA" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/embed/gm%3Faid%3D5fb572830099f500178b7a5a%26address%3D115%2520S%2520Main%2520St%2C%2520Kanab%2C%2520UT%252084741%26checkin%3D%26markerimage%3Dhttps%3A//res.cloudinary.com/huedhbm8g/image/upload/v1606334176/temp/5fb83b5143166b0017609095-1606334176.png%26maincolor%3D6A5A97%23comment-26204" rel="nofollow"><span data-dcnode-id="615" instrument_node="">Reply</span></a><span data-dcnode-id="613" instrument_node=""> </span></span></div><div class="clr" data-dcnode-id="610"></div><div class="comment-entry" data-dcnode-id="606"><div class="comment-content" data-dcnode-id="607"><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">What food do you recommend bringing? We are doing the top down hike in one day! Starting early in the morning and pushing through. We will need at least two meals and need tips on what is best to bring. Thanks!</span></p></div></div></div></article><ol class="children" data-dcnode-id="579"><li class="comment-container" data-dcnode-id="581" id="comment-26210"><article class="comment byuser comment-author-jacob odd alt depth-2 comment-body" data-dcnode-id="583"><div class="comment-content" data-dcnode-id="584"><div class="comment-author" data-dcnode-id="590"><h3 class="comment-link" data-dcnode-id="600"><a class="url" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//localadventurer.com/" rel="external nofollow ugc"><span data-dcnode-id="602" instrument_node="">jacob</span></a></h3><span data-dcnode-id="599" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="591"><span data-dcnode-id="598" instrument_node=""> </span><span class="comment-date" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">25 Aug 2017</span></span><span data-dcnode-id="595" instrument_node=""> </span><a aria-label="Reply to jacob" class="comment-reply-link" data-belowelement="comment-26210" data-commentid="26210" data-dcnode-id="593" data-postid="14132" data-replyto="Reply to jacob" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/embed/gm%3Faid%3D5fb572830099f500178b7a5a%26address%3D115%2520S%2520Main%2520St%2C%2520Kanab%2C%2520UT%252084741%26checkin%3D%26markerimage%3Dhttps%3A//res.cloudinary.com/huedhbm8g/image/upload/v1606334176/temp/5fb83b5143166b0017609095-1606334176.png%26maincolor%3D6A5A97%23comment-26210" rel="nofollow"><span data-dcnode-id="594" instrument_node="">Reply</span></a><span data-dcnode-id="592" instrument_node=""> </span></span></div><div class="clr" data-dcnode-id="589"></div><div class="comment-entry" data-dcnode-id="585"><div class="comment-content" data-dcnode-id="586"><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Wow! When we’re trying to hike fast, we usually stick with bars just because it’s fast and easy. Otherwise, we’ll bring a JetBoil and Mountain House (lasagna is the best)!</span></p></div></div></div></article></li></ol></li><li class
