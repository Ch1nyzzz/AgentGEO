node-id="603" instrument_node="">I loved Santiago, probably even more so because we ended up couchsurfing here and making amazing friends with our hosts (we’re still in touch today and had a reunion in London recently).&nbsp;</span></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">But Santiago is quite a student city so it’s got a young vibe. It’s also got a bunch of really cool sights to see.&nbsp;</span></p><h5 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">San Pedro de Atacama</span></h5><p data-dcnode-id="595"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">This spot represents just how shockingly diverse Chile is.&nbsp;</span></em></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">I’ve just spoken about glaciers and mountain ranges, well now I present to you, the desert, with epic landscapes and star gazing like no other.&nbsp;</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Check out the iconic Valle de la Luna which offers moon-like landscapes and the amazing Laguna Verde and the unique Pukará de Quitor.</span></p><h4 data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Cost of backpacking Chile</span></h4><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">You’re looking at around $50 a day.</span></p><ul data-dcnode-id="578" role="list"><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Food - $6-15</span></li><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Transport - $5-35</span></li><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Activities - $15-50</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Accommodation - $12-30</span></li></ul><h3 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">18. Brazil</span></h3><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Brazil is a massive country with a lot to offer.&nbsp;</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">It was the first ever country Bradley and I went backpacking together and truly entered us into the world of travel.&nbsp;</span></p><p data-dcnode-id="569"><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">I love Brazil. I think it's bursting with culture, amazing food and great vibes.&nbsp;</span></em></p><p data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">It’s the home of the Samba, and a great place to learn, and their national drink in the </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquor.com/recipes/caipirinha/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="567" instrument_node="">Caipirinha</span></a><span data-dcnode-id="565" instrument_node="">, which is Bradley and I’s favourite cocktail.&nbsp;</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">They’re stupidly cheap, and there’s nothing quite like lying on the Copacabana beach in Rio and drinking a Caipirinha whilst tanning….bliss.&nbsp;</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Since Brazil is so big, there is a lot of ground to cover, so you’ll either need a lot of time to backpack this country, or just choose certain locations.&nbsp;</span></p><p data-dcnode-id="557"><em data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">But you'll soon discover there is so much to see, and it’s the gateway to the Amazon Rainforest, which honestly is a bucket list experience.&nbsp;</span></em></p><h4 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Best places to backpack in Brazil</span></h4><h5 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Rio De Janeiro&nbsp;</span></h5><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">It’s chaotic, it’s probably a little unsafe at times, but it’s brilliant.&nbsp;</span></p><p data-dcnode-id="545"><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/the-4-best-things-to-do-in-rio-de-janeiro" target="_blank"><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Rio is the heart of Brazil</span></em></a><em data-dcnode-id="546"><span data-dcnode-id="547" instrument_node=""> and I would happily return tomorrow.&nbsp;</span></em></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Check out the epic Christ the Redeemer, and the amazing Sugar Loaf Mountain for some beyond amazing views.&nbsp;</span></p><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Head into the jungle forests, or hit up the clubs and experience that famous Rio nightlife.&nbsp;</span></p><h5 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Manaus</span></h5><p data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">Whilst I will not suggest you undertake the </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/6-days-spent-on-a-boat-from-belem-to-manaus" target="_blank"><span data-dcnode-id="537" instrument_node="">Belem to Manaus boat ride</span></a><span data-dcnode-id="535" instrument_node="">, I will suggest you go to Manaus and use this as your gateway into the Amazon Rainforest.&nbsp;</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">From there you can get tours that take you on a 2 night stay in the forest. It’s epic.&nbsp;</span></p><p data-dcnode-id="529"><em data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">I mean, it’s the Amazon Rainforest, come on!</span></em></p><p data-dcnode-id="526"><span data-dcnode-id="528" instrument_node="">You’ll even have the chance to camp in the jungle in hammocks, which is actually a lot scarier than it sounds…</span><br data-dcnode-id="527"></p><h5 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Salvador&nbsp;</span></h5><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Salvador is the African capital of Brazil and it is bursting with culture.</span></p><p data-dcnode-id="519"><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">I LOVED it!&nbsp;</span></em></p><p data-dcnode-id="511"><span data-dcnode-id="518" instrument_node="">And, fun fact, it’s the setting to Michael Jackson's video: </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DQNJL6nfu__Q" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">They don’t really care about us</span></em></a><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">.</span></em><span data-dcnode-id="512" instrument_node="">&nbsp;</span></p><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">They kind of have a shrine to Michael which is cool. There’s lots of cool places to visit here and the beaches are great for swimming and relaxing.&nbsp;</span></p><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="506" style="max-width:1024pxpx"><div data-dcnode-id="507"><img alt="backpacking brazil " data-dcnode-id="508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/5e8b4e48752dd86d5a5eacb0_backpacking%2520brazil.jpg&amp;raw"></div></figure><h4 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Cost of backpacking Brazil</span></h4><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">You’re looking at around $50 /day</span></p><ul data-dcnode-id="493" role="list"><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Food - $3-15</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Transport - $20-100 (long distance travel is expensive)</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Activities - $5-30</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Accommodation - $10-30</span></li></ul><h3 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">19. Bolivia</span></h3><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Bolivia is the cheapest backpacking destination in South America, there is no doubt about that!&nbsp;</span></p><p data-dcnode-id="481"><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Bolivia is amazing and offers some of the most unique </span></em><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/things-to-do-in-south-america" target="_blank"><em data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">things to do in South America</span></em></a><em data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">.</span></em></p><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">The famous Bolivian Salt Flats are here, and honestly, they’re crazy unique and well worth doing.&nbsp;</span></p><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">Other amazing sights include </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intrepidtravel.com/adventures/your-guide-to-laguna-colorada-bolivia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="477" instrument_node="">Laguna Colorada</span></a><span data-dcnode-id="475" instrument_node=""> and its unique flamingos, Valle De Las Animas and much more.</span></p><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Bolivia is actually a really cheap country to take excursions.&nbsp;</span></p><p data-dcnode-id="469"><em data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Bradley and I got to go paragliding for less than $50 each and it was an unforgettable bucket list experience.</span></em></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">This makes it one of the best budget travel destinations in South America.&nbsp;</span></p><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="464" style="max-width:1024pxpx"><div data-dcnode-id="465"><img alt="backpacking bolivia " data-dcnode-id="466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/5e8b4e6369409f7cf3e431e4_backpacking%2520bolivia.jpg&amp;raw"></div></figure><h4 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Best places to backpack in Bolivia</span></h4><h4 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Uyuni</span></h4><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">This is the gateway to the famous Salt Flats of Bolivia, so it’s a great place to base yourself, however Uyuni also has some pretty cool sights to visit too.&nbsp;</span></p><p data-dcnode-id="455"><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">One of my favourites includes the unique train cemetery!</span></em></p><h5 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Potosi&nbsp;</span></h5><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">This is one of the highest cities in the world, so you’re going to experience your first dose of altitude sickness..</span></p><p data-dcnode-id="445"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/three-days-travelling-in-potosi" target="_blank"><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Potosi</span></em></a><em data-dcnode-id="446"><span data-dcnode-id="447" instrument_node=""> is a small city that boasts a lot of charm. It’s actually a UNESCO protected town, and you’ll see why as you wander around.&nbsp;</span></em></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">There are lots of beautiful churches and museums to explore, as well as a really vintage cinema!&nbsp;</span></p><h5 data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Isla De Sol&nbsp;</span></h5><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">This is a beautiful Bolivian island located on </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Lake-Titicaca" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="439" instrument_node="">Lake Titicaca</span></a><span data-dcnode-id="437" instrument_node="">. You get a boat to access the island and it’s all super remote.&nbsp;</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">There are only a few restaurants and accommodation on offer, but this makes it amazing.&nbsp;</span></p><p data-dcnode-id="431"><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">It’s so remote and just a peaceful place to really step back. The star gazing here is amazing too and there are lots of walks you can do on the island.&nbsp;</span></em></p><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="428" style="max-width:1024pxpx"><div data-dcnode-id="429"><img alt="isla del sol bolivia " data-dcnode-id="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/5e8b4e85c926ad37fd958d7e_isla%2520del%2520sol%2520bolivia.jpg&amp;raw"></div></figure><h4 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Cost of backpacking Bolivia</span></h4><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">You’re looking at around $25 /day</span></p><ul data-dcnode-id="415" role="list"><li data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Food - $2-8</span></li><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Transport - $4-15</span></li><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Activities - $5-25</span></li><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Accommodation - $5-15</span></li></ul><h3 data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">20. Peru</span></h3><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Last but not least, the final destination on this backpacking destination guide is Peru.</span></p><p data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">Peru is having a bit of a moment, lots of people seem to be flocking there since </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Machu_Picchu" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="409" instrument_node="">Machu Pichu</span></a><span data-dcnode-id="407" instrument_node=""> became more accessible (it wasn’t when we visited, so we didn’t go!).&nbsp;</span></p><p data-dcnode-id="403"><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">But apart from it’s most famous sight, Peru has a lot to offer. From beautiful beaches and great surf, to historic sites and ruins.&nbsp;</span></em></p><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Peru is a beautiful country with very friendly people. It does have a high drug scene, and you’ll get a lot of locals asking if you want to buy cocaine, say no and they’ll not bother you again.&nbsp;</span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Peru is easy to navigate, but if your budget allows you to fly, then fly, because I can tell you a 24 hour bus journey from Lima to Cusco was just...too long!&nbsp;</span></p><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="396" style="max-width:1024pxpx"><div data-dcnode-id="397"><img alt="backpacking peru " data-dcnode-id="398" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/5e8b512033bd3012d1921d98_backpacking%2520peru.jpg&amp;raw"></div></figure><h4 data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Best places to backpack in Peru</span></h4><h5 data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Cusco&nbsp;</span></h5><p data-dcnode-id="389"><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">This is one of the more popular spots in Peru as it’s the gateway to Machu Picchu, but Cusco itself is also bustling with amazing, historic sights.&nbsp;</span></em></p><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">My favourites include the Sacred Valley, Moray and the </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlasobscura.com/places/salt-pans-of-maras" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="387" instrument_node="">Maras Salt Flats</span></a><span data-dcnode-id="385" instrument_node="">.</span></p><h5 data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Lima&nbsp;</span></h5><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Lima is the capital of Peru and it’s got a lot to offer.&nbsp;</span></p><p data-dcnode-id="377"><em data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">It’s actually a strange city, in that it hides away it’s poor.&nbsp;</span></em></p><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">This isn’t a myth, if you head outside the main city, you’ll enter the slum areas, and you’ll see poverty.&nbsp;</span></p><p data-dcnode-id="371"><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pe/zig-zag-hostel.en.html%3Faid%3D1511299%26no_rooms%3D1%26group_adults%3D1%26label%3DBestBackpackingDestinations" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="374" instrument_node="">We stayed at a hostel</span></a><span data-dcnode-id="372" instrument_node=""> who runs a charity to help feed the children here, so we saw it first hand. If they leave the slum areas, they’re transported back there by the police!</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">On a happier note, Lima has some really cool surfing spots and beaches, perfect for catching some rays.&nbsp;</span></p><p data-dcnode-id="366"><em data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">In fact it’s here that Bradley learnt how to surf!</span></em></p><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="363" style="max-width:1024pxpx"><div data-dcnode-id="364"><img alt="salt farms in peru " data-dcnode-id="365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/5e8b513d69409f8c4fe44cc2_salt%2520farms%2520in%2520peru.jpg&amp;raw"></div></figure><h4 data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Cost of backpacking Peru</span></h4><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">You’re looking at around $35 /day</span></p><ul data-dcnode-id="350" role="list"><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Food - $2-10</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Transport - $8-20</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Activities - $10-50</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Accommodation - $10-20</span></li></ul><p data-dcnode-id="347"><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">So there you have it!&nbsp;</span></em></p><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">Our guide to the best backpacking destinations around the world. There really are so many great regions around the world that are backpacker friendly, and an up and coming area in popularity is the Balkans, particularly </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/things-to-do-in-montenegro"><span data-dcnode-id="345" instrument_node="">Montenegro </span></a><span data-dcnode-id="343" instrument_node="">&amp; Albania!</span></p><p data-dcnode-id="339"><em data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">I hope this post has helped you and given you some travel inspiration for backpacking around the world.&nbsp;</span></em></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Regardless of where you choose to backpack, you’re going to have a fantastic time and create unbelievable memories!&nbsp;</span></p><p data-dcnode-id="333"><em data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">If you think we missed any destinations off the list then just drop a comment below, we would love to hear your suggestions.</span></em><br data-dcnode-id="334"></p></div></div><div class="blog-post-author-block w-clearfix" data-dcnode-id="323"><a class="blog-post-author-image-block w-inline-block w-clearfix" data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/authors/cazzy-magennis"><div class="blog-post-author-image-block" data-dcnode-id="330" style="background-image:url(&quot;https://uploads-ssl.webflow.com/576fd5a8f192527e50a4b95c/60ce30da79fc3b6626a94379_Cazzy%20Magennis.jpg&quot;)"></div></a><div class="div-block-67" data-dcnode-id="324"><a class="blog-author-title-link" data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/authors/cazzy-magennis"><span data-dcnode-id="328" instrument_node="">Cazzy Magennis</span></a><div class="author-tagline" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">As the type 1 diabetic half of Dream Big, Travel Far, I'm passionate about encouraging fellow type 1's to travel the world and not let their diabetes hold them back. I'm proud to now be a full-time digital nomad. Meaning I live my life working and travelling all over the world and am here to help you achieve your dreams as well in any way I can.</span></div></div></div></div><div class="blog-column-right" data-dcnode-id="289"><a class="tinggly-link-block w-inline-block w-condition-invisible" data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreambigtravelfarblog.com/blog/tinggly-collaboration" target="_blank"><img alt="Tinggly badge" class="tinggly-badge tinggly-link-block" data-dcnode-id="321" loading="lazy" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/576fd5a8f192527e50a4b918/5dc5a7ac25de6e517e48a6d7_Tinggly%2520badge.png&amp;raw" srcset="https://uploads-ssl.webflow.com/576fd5a8f192527e50a4b918/5dc5a7ac25de6e517e48a6d7_Tinggly%20badge-p-500.png 500w, https://uploads-ssl.webflow.com/576fd5a8f192527e50a4b918/5dc5a7ac25de6e517e48a6d7_Tinggly%20badge.png 600w"></a><div class="sticky-div top-choice-box w-condition-invisible" data-dcnode-id="314"><div class="title" data-dcnode-id="318"><div class="title-for-cta-text w-dyn-bind-empty" data-dcnode-id="319"></div></div><img alt="" class="image-50 w-dyn-bind-empty" data-dcnode-id="317" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/&
