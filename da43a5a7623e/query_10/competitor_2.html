ps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/blog/pt/" hreflang="pt-BR" lang="pt-BR"><img alt="Português" data-dcnode-id="1082" height="11" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAALCAMAAABBPP0LAAAAn1BMVEUAYQAAWwAAUgAARwAAOgAALgAAIwB/voB4uni242pttG1kr2Rdq11RpFEAGAD9/Uv8/VT690U/mz83lTguki4ADQCp2lJ3d+Q+dfpkaun47zii1B9IoEhgslHOy6fZ5virw/Iubfhsc6v29iMfih+Wy3Nbg+lzm/m61vd+oNr08hZ2uDcAAQCPlLSuraIzmA8yjzKw3z8nXvcTgxM1pTDYD/UeAAAAfUlEQVR4AUWIA3oFMBCE/4mT2nbvf6biQ91n27tjAaDNi7gaFuLAIexiUDc6QKUfhKaVva5Dh/Xu3rwrqYPTzfeYVNvrRvUiUUbvO5hIVR0f8f7TYCo797+6POgOqtm9n8nGQ1qP/395v7cHw4FsQohnXhE3DOSQSETOmN8EHiUfBxs2q7sAAAAASUVORK5CYII=" style="width: 16px; height: 11px;" width="16"><span data-dcnode-id="1080" style="margin-left:0.3em;"><span data-dcnode-id="1081" instrument_node="">Português</span></span></a></li></ul></li></ul></nav></div></div></div></header><div class="wpbf-custom-section wpbf-custom-section-135005" data-dcnode-id="1067"><div class="top_diag_1" data-dcnode-id="1069"></div><div class="top_diag_2" data-dcnode-id="1068"></div></div><div data-dcnode-id="205" id="content"><div class="wpbf-container wpbf-container-center wpbf-padding-medium" data-dcnode-id="206" id="inner-content"><div class="wpbf-grid wpbf-main-grid wpbf-grid-medium" data-dcnode-id="207"><main class="wpbf-main wpbf-medium-2-3 wpbf-single-content wpbf-post-content" data-dcnode-id="548" id="main"><article class="wpbf-post-style-boxed post-57010 post type-post status-publish format-standard has-post-thumbnail hentry category-budget-tips wpbf-post" data-dcnode-id="549" id="post-57010" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="wpbf-article-wrapper" data-dcnode-id="573"><header class="article-header" data-dcnode-id="1050"><h1 class="entry-title" data-dcnode-id="1065" itemprop="headline"><span data-dcnode-id="1066" instrument_node="">The 20 best destinations for backpackers to visit in 2020</span></h1><p class="article-meta" data-dcnode-id="1051"><span class="article-author author vcard" data-dcnode-id="1061" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><a class="url fn" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/blog/author/ruan-hanekomhostelworld-com/" itemprop="url" rel="author" title="View all posts by Hostelworld Blog"><span data-dcnode-id="1063" itemprop="name"><span data-dcnode-id="1064" instrument_node="">Hostelworld Blog</span></span></a></span><span class="article-meta-separator" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node=""> | </span></span><span class="posted-on" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Posted on</span></span><span data-dcnode-id="1056" instrument_node=""> </span><time class="article-time published" data-dcnode-id="1054" datetime="2019-11-29T00:01:47+00:00" itemprop="datePublished"><span data-dcnode-id="1055" instrument_node="">November 29, 2019</span></time><span class="article-meta-separator" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node=""> | </span></span></p></header><section class="entry-content article-content" data-dcnode-id="581" itemprop="text"><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Hands up who’s already mentally spent their Christmas money on next year’s adventures? We know you’re all as totally travel obsessed as we are, which is why we’ve put together this hand-picked list of the best backpacking destinations for 2020, based on the biggest growth in bookings in the last twelve months. No travel clichés here friends – from paradise islands to underrated African cities, laid-back surfing towns to isolated mountain retreats, it’s time to start planning where in the world we’re heading next year. Spoiler alert: it’s far from the beaten track.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Introducing you to the 20 best backpacking destinations for 2020!</span></p><h2 data-dcnode-id="1039"><span data-dcnode-id="1045" instrument_node="">20. </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Sendai/ChosenCountry.Japan" rel="noopener" target="_blank"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Sendai</span></strong></a><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node=""> – Japan</span></strong></h2><p data-dcnode-id="1035"><img alt="best backpacking destinations - Sendai" class="aligncenter wp-image-124860 lazyloaded" data-dcnode-id="1038" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Sendai-Japan-@rogeriotoledo.jpg" height="1093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Sendai-Japan-%40rogeriotoledo.jpg&amp;raw" width="875"><noscript data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&lt;img class="aligncenter wp-image-124860  lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Sendai-Japan-@rogeriotoledo.jpg" alt="best backpacking destinations - Sendai" width="875" height="1093" /&gt;</span></noscript></p><p data-dcnode-id="1030" style="text-align: center"><span data-dcnode-id="1034" instrument_node="">📸&nbsp;</span><em data-dcnode-id="1031"><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40rogeriotoledo%3Futm_source%3Dunsplash%26utm_medium%3Dreferral%26utm_content%3DcreditCopyText" rel="noopener" target="_blank"><span data-dcnode-id="1033" instrument_node="">@rogériotoledo</span></a></em></p><p data-dcnode-id="1019"><span data-dcnode-id="1029" instrument_node="">Travellers will head to Japan in 2020 for the Tokyo Olympics, but if you’re not one to follow the crowds then Sendai is a great alternative. It’s made the list as one of next year’s best backpacking destinations. The best time to explore this modern city is in August, when the streets come alive for </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sendaitanabata.com/en" rel="noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">Tanabata Matsuri</span></a><span data-dcnode-id="1026" instrument_node=""> on the 6</span><sup data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">th</span></sup><span data-dcnode-id="1023" instrument_node="">-8</span><sup data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">th</span></sup><span data-dcnode-id="1020" instrument_node="">. This lively festival is held on the days when the stars Altair and Vega cross paths, and features live music, traditional dance, street food, fireworks, and most famously, thousands of colourful streamers decorating the city. If you can’t manage to time your visit to coincide with this, Sendai is still well worth a visit. It’s got bustling markets, wonderfully random nightlife options and a long list of impressive temples and shrines to check out.</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">Combining two of our favourite things, </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/ORIT-Hostel-and-Cafe-Bar-Lounge/Sendai/294216"><span data-dcnode-id="1017" instrument_node="">Orit Hostel &amp; Café Bar Lounge</span></a><span data-dcnode-id="1015" instrument_node=""> has an on-site coffee shop with a welcoming atmosphere. It’s perfect for solo travellers on the hunt for new travel buddies, or digital nomads needing a quiet space to chill with their laptops. The facilities are super modern, and there’s a terrace to enjoy your morning coffee overlooking the city.</span></p><h2 data-dcnode-id="1007"><span data-dcnode-id="1013" instrument_node="">19. </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Portland-Maine/ChosenCountry.USA" rel="noopener" target="_blank"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Portland (Maine)</span></strong></a><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node=""> – USA</span></strong></h2><p data-dcnode-id="1003"><img alt="best backpacking destinations - Portland" class="aligncenter wp-image-124862 lazyloaded" data-dcnode-id="1006" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Portland-Maine-USA-2-@hil.will_.jpg" height="583" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Portland-Maine-USA-2-%40hil.will_.jpg&amp;raw" width="875"><noscript data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">&lt;img class="aligncenter wp-image-124862 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Portland-Maine-USA-2-@hil.will_.jpg" alt="best backpacking destinations - Portland" width="875" height="583" /&gt;</span></noscript></p><p data-dcnode-id="998" style="text-align: center"><span data-dcnode-id="1002" instrument_node="">📸: </span><em data-dcnode-id="999"><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/hil.will/" rel="noopener" target="_blank"><span data-dcnode-id="1001" instrument_node="">@hil.will</span></a></em></p><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Trendy Portland Oregon has been on the traveller radar for ages, but we bet you haven’t added this small, East Coast city to your USA wishlist yet! Sure, the likes of NYC and LA are always gonna have us hooked, but can you really say you’ve experienced the US until you’ve ventured away from the big cities? Travellers to Portland are rewarded with a local, community feel and zero crowds. The Old Port’s cobbled streets and colourful mismatch of boutique shops and restaurants are a quirky surprise, and you might not expect the city to have such a vibrant arts scene that includes the oldest public art museum in the US. Throw in a famed farmers’ market and local craft breweries, and it’s hard to believe that more people aren’t shouting about Portland’s cool credentials!</span></p><p data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Wondering where to stay? Look no further than the outrageously funky </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/The-Black-Elephant-Hostel/Portland-Maine/287052" rel="noopener" target="_blank"><span data-dcnode-id="994" instrument_node="">Black Elephant Hostel</span></a><span data-dcnode-id="992" instrument_node="">. Much like the city itself, it’s equal parts cosy and cool, with a warm, family feel and colourfully mismatched interiors. It’s right next to the Old Port so exploring couldn’t be easier, and when you’re done you can snuggle up in front of the fireplace in the communal lounge.</span></p><h2 data-dcnode-id="984"><span data-dcnode-id="990" instrument_node="">18. </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Raglan/ChosenCountry.New-Zealand" rel="noopener" target="_blank"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Raglan</span></strong></a><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node=""> – New Zealand</span></strong></h2><p data-dcnode-id="980"><img alt="best backpacking destinations - Raglan Nouvelle-Zélande @otsu_91" class="aligncenter wp-image-124822 lazyloaded" data-dcnode-id="983" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/otsu_91_2019-11-21_3386120791.jpg" height="875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/otsu_91_2019-11-21_3386120791.jpg&amp;raw" width="875"><noscript data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">&lt;img class="aligncenter wp-image-124822 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/otsu_91_2019-11-21_3386120791.jpg" alt="best backpacking destinations - Raglan Nouvelle-Zélande @otsu_91" width="875" height="875" /&gt;</span></noscript></p><p data-dcnode-id="975" style="text-align: center"><span data-dcnode-id="979" instrument_node="">📸: </span><em data-dcnode-id="976"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/otsu_91/" rel="noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">@otsu_91</span></a></em></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The North Island town of Raglan is surrounded by incredible natural beauty and epic surf breaks. It’s best known for its unusual black sand coastline, but venture a little outside of town and discover peaceful walking trails through the Wainui nature reserve, cycling routes over an ancient volcano and the glistening green waters of the Bridal Veil Falls. Most backpackers come here to surf though, as there’s a spot for every ability. Ngarunui Beach is the place for those who’ve never picked up a board, as the waves are calm and there are several surf schools to choose from. If this isn’t your first rodeo, Manu Bay and Whale Bay offer some of the best waves in the world, set against breathtaking scenery.</span></p><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">To best enjoy all that Mother Nature has on offer in Raglan, base yourself at the eco-friendly </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Raglan-Backpackers-and-Waterfront-Lodge/Raglan/293043" rel="noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">Raglan Backpackers</span></a><span data-dcnode-id="969" instrument_node="">. You can hang out in a hammock or the hot tub in the garden, take part in an outdoor yoga class or venture out with a kayak or surfboard, both of which are available to rent from the hostel. With a killer location right on the water, you can wake up in your bunk to the sounds of waves crashing.</span></p><h2 data-dcnode-id="961"><span data-dcnode-id="967" instrument_node="">17. </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Pisac/ChosenCountry.Peru" rel="noopener" target="_blank"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Pisac</span></strong></a><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node=""> – Peru</span></strong></h2><p data-dcnode-id="957"><img alt="best backpacking destinations - Pisac" class="aligncenter wp-image-124874 size-full lazyloaded" data-dcnode-id="960" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Pisac-Peru-@willianjusten.jpg" height="686" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Pisac-Peru-%40willianjusten.jpg&amp;raw" width="875"><noscript data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">&lt;img class="aligncenter wp-image-124874 size-full lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Pisac-Peru-@willianjusten.jpg" alt="best backpacking destinations - Pisac" width="875" height="686" /&gt;</span></noscript></p><p data-dcnode-id="951" style="text-align: center"><span data-dcnode-id="956" instrument_node="">📸:</span><em data-dcnode-id="952"><span data-dcnode-id="955" instrument_node="">&nbsp;</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40willianjusten%3Futm_source%3Dunsplash%26utm_medium%3Dreferral%26utm_content%3DcreditCopyText" rel="noopener" target="_blank"><span data-dcnode-id="954" instrument_node="">@willianjusten</span></a></em></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">For a rural alternative to the nearby city of Cusco, many travellers to Peru are choosing to explore the Sacred Valley of the Incas by basing themselves in Pisac, a small village with a strong sense of spirituality. This is thanks to the unreal landscapes and mysterious history of the surrounding valley, the bohemian vibe and slow pace of life in the Old Town, and the range of wellness activities practiced here. It doesn’t get much more relaxing than yoga with these views, and you’re likely to feel like you’re floating on clouds after a few days in Pisac! Aside from achieving total zen, other things to do in Pisac include browsing for local crafts at the Sunday market, wandering the colonial streets of the Old Town and climbing the crowd-free Pisac ruins.</span></p><p data-dcnode-id="945"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Wolf-Totem-Guesthouse/Pisac/297581" rel="noopener" target="_blank"><span data-dcnode-id="948" instrument_node="">Wolf Totem Guesthouse</span></a><span data-dcnode-id="946" instrument_node=""> embodies the spirit of Pisac. This beautifully boho hostel has eco-friendly features, a bright communal space overlooking the valley and outdoor hammocks with some of the best views in South America. There’s an on-site café, outdoor yoga space and even a sauna to relax in after a day’s trekking.</span></p><h2 data-dcnode-id="938"><span data-dcnode-id="944" instrument_node="">16. </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Trapani/ChosenCountry.Italy" rel="noopener" target="_blank"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Trapani</span></strong></a><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node=""> – Italy</span></strong></h2><p data-dcnode-id="934"><img alt="best backpacking destinations - Trapani" class="aligncenter wp-image-124875 lazyloaded" data-dcnode-id="937" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Trapani-Italy-@racheleminunno.jpg" height="1094" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Trapani-Italy-%40racheleminunno.jpg&amp;raw" width="875"><noscript data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">&lt;img class="aligncenter wp-image-124875 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Trapani-Italy-@racheleminunno.jpg" alt="best backpacking destinations - Trapani" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="929" style="text-align: center"><span data-dcnode-id="933" instrument_node="">&nbsp;📸: </span><em data-dcnode-id="930"><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/racheleminunno/" rel="noopener" target="_blank"><span data-dcnode-id="932" instrument_node="">@racheleminunno</span></a></em></p><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">If you’re travelling to Italy in 2020, don’t skip over sun-kissed Sicily. The gorgeous Mediterranean island is home to sparkling beaches, smoking volcanoes and attractive cities like Trapani, one of next year’s best backpacking destinations. Take a stroll through the narrow streets of the Old Town and check out its churches and basilicas, before feasting on hearty Sicilian classics like arancini and cannoli. For the best vistas around, visit the clifftop medieval village of Erice. At 750m above sea level, you’ll get unbeatable views of Trapani’s sand-hued architecture and the surrounding Med. Trapani is also a perfect spot to base yourself for day trips around Sicily. The stunning Aegadian Islands are only 30 minutes away by boat, so you can spend a day of pure bliss exploring coves and snorkelling around white sand beaches.</span></p><p data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">For a budget-friendly stay in the city centre, </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Hostelleria/Trapani/295085"><span data-dcnode-id="925" instrument_node="">Hostelleria</span></a><span data-dcnode-id="923" instrument_node=""> is the top choice. It’s got a minimalistic design but has everything you’ll need, with dorms and private rooms, a shared kitchen and a lively bar next door.</span></p><h2 data-dcnode-id="915"><span data-dcnode-id="921" instrument_node="">15. </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Liege/ChosenCountry.Belgium" rel="noopener" target="_blank"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Liège</span></strong></a><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node=""> – Belgium</span></strong></h2><p data-dcnode-id="911"><img alt="best backpacking destinations - Liège" class="aligncenter wp-image-124877 lazyloaded" data-dcnode-id="914" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Liege-Belgium-@ahmedashoour.jpg" height="875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Liege-Belgium-%40ahmedashoour.jpg&amp;raw" width="875"><noscript data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">&lt;img class="aligncenter wp-image-124877 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Liege-Belgium-@ahmedashoour.jpg" alt="best backpacking destinations - Liège" width="875" height="875" /&gt;</span></noscript></p><p data-dcnode-id="906" style="text-align: center"><span data-dcnode-id="910" instrument_node="">📸: </span><em data-dcnode-id="907"><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/ahmedashoour/" rel="noopener" target="_blank"><span data-dcnode-id="909" instrument_node="">@ahmedashoour</span></a></em></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">It may have shied away from the spotlight in the past, but Belgium’s fourth largest city is barging the likes of Bruges and Brussels out of the way to get the backpacker appreciation it deserves. Despite being packed full of incredible architecture, cultural gems and amazing food, it manages to keep hold of a laid-back, small town vibe that makes you feel instantly at home. Grab a Liège waffle (which are famous for the exploding sugar grains inside!) and take a picturesque walk along the Meuse River, before exploring the medieval buildings of the main square. The best spot for a local tipple is Place du Marché, an assortment of traditional bars and pubs that come alive in the evening.</span></p><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">For a lively place to stay in Liège you can’t beat </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Liege-Youth-Hostel/Liege/15846"><span data-dcnode-id="902" instrument_node="">Liège Youth Hostel</span></a><span data-dcnode-id="900" instrument_node="">. Not only is it stylish and chic, it’s full of amazing social spaces, like an on-site bar with pool tables and foosball, outdoor space with ping pong tables and a colourful café to enjoy your free breakfast. It couldn’t be easier to meet new friends here – plus it’s just 5 minutes from Liège’s best nightlife when you’re ready to hit the town with them!</span></p><h2 data-dcnode-id="892"><span data-dcnode-id="898" instrument_node="">14. </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Buenaventura/ChosenCountry.Colombia" rel="noopener" target="_blank"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Buenaventura</span></strong></a><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node=""> – Colombia</span></strong></h2><p data-dcnode-id="888"><img alt="" class="aligncenter wp-image-125016 lazyload" data-dcnode-id="891" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Buenaventura-–-Colombia-689x875.jpg" height="1109" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="873"><noscript data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">&lt;img class="aligncenter wp-image-125016 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Buenaventura-–-Colombia-689x875.jpg" alt="" width="873" height="1109" /&gt;</span></noscript></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Colombia has transformed the world’s perception of it in recent years, nowhere less so than Buenaventura. Only a few years ago this Pacific Coast city was regarded as the most dangerous in the country, but now it’s an increasingly popular spot that’s set to be one of the best backpacking destinations of 2020. Though Buenaventura is packed full of lively salsa bars, Afro-Colombian seafood restaurants and waterfront entertainment, the city itself isn’t actually the main attraction – we’re most interested in the unspoilt beaches, tropical jungle and natural pools that surround it! Compared to the rest of the country, this area is still relatively under the radar, so you can enjoy surfing and beachfront cocktails minus the crowds of Colombia’s more famous destinations. Don’t miss a night-time cave swim with fluorescent plankton – an experience you’ll never forget.</span></p><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">For the ultimate peaceful stay, choose </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Pacifico-Hostel/Buenaventura/282373"><span data-dcnode-id="884" instrument_node="">Pacifico Hostel</span></a><span data-dcnode-id="882" instrument_node="">. It’s surrounded by virgin jungle and has its own private beach(!!), overlooked by a funky open-air bar. They choose sustainable options like growing their own veg and running their bathrooms with rain water, and they’ll lend you a kayak to explore the nearby mangroves. We’re starting to think city life is overrated…</span></p><h2 data-dcnode-id="874"><span data-dcnode-id="880" instrument_node="">13. </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Ha-Giang/ChosenCountry.Vietnam" rel="noopener" target="_blank"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Hà Giang</span></strong></a><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node=""> – Vietnam</span></strong></h2><p data-dcnode-id="870" style="text-align: center"><img alt="" class="aligncenter size-full wp-image-125067 lazyload" data-dcnode-id="873" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Hà-Giang-Province-Vietnam-@ourtasteforlife-1.jpg" height="1093" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">&lt;img class="aligncenter size-full wp-image-125067 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Hà-Giang-Province-Vietnam-@ourtasteforlife-1.jpg" alt="" width="875" height="1093" /&gt;</span></noscript></p><p data-dcnode-id="865" style="text-align: center"><span data-dcnode-id="869" instrument_node="">📸:&nbsp;</span><em data-dcnode-id="866"><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/ourtasteforlife/%3Fhl%3Den" rel="noopener" target="_blank"><span data-dcnode-id="868" instrument_node="">@ourtasteforlife</span></a></em></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Hà Giang is Vietnam’s most northern province, which despite being one of the most jaw-droppingly stunning areas of the country, is often overlooked by backpackers as it’s far away from the usual hotspots. This means no one spoiling your scenery shots – bonus! It’s easily (and cheaply) reached via overnight bus, and travellers who make the long journey will reap the rewards. Start your adventure in the provincial capital of the same name, and make like the other intrepid backpackers who rent a motorbike and journey through the region’s picturesque winding roads. You’ll encounter rural communities, small towns and ancient traditions, all set against the rolling green mountains that make Hà Giang so unforgettable.</span></p><p data-dcnode-id="859"><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/NoMadders-Hostel/Ha-Giang/299231"><span data-dcnode-id="862" instrument_node="">NoMadders Hostel</span></a><span data-dcnode-id="860" instrument_node=""> is the perfect base on the outskirts of the city to soak in that fresh, mountain air. Their gorgeous dorms cost as little as £4 a night, and you can treat yourself to a private hut from £20. There’s an outdoor pool and patio surrounded by jungle, a bar and a hot tub for living your best backpacker life!</span></p><h2 data-dcnode-id="852"><span data-dcnode-id="858" instrument_node="">12. </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Maputo/ChosenCountry.Mozambique" rel="noopener" target="_blank"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Maputo</span></strong></a><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node=""> – Mozambique</span></strong></h2><p data-dcnode-id="848"><img alt="best backpacking destinations - Maputo" class="aligncenter wp-image-124880 lazyload" data-dcnode-id="851" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Maputo-Mozambique-@eligetumiaventura.jpg" height="875" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&lt;img class="aligncenter wp-image-124880 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Maputo-Mozambique-@eligetumiaventura.jpg" alt="best backpacking destinations - Maputo" width="875" height="875" /&gt;</span></noscript></p><p data-dcnode-id="843" style="text-align: center"><span data-dcnode-id="847" instrument_node="">📸: </span><em data-dcnode-id="844"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/eligetumiaventura/" rel="noopener" target="_blank"><span data-dcnode-id="846" instrument_node="">@eligetumiaventura</span></a></em></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Mozambique’s charming capital city has seen a recent resurgence, with travellers enjoying the pastel-hued streets of Downtown and their cute cafes, colonial architecture and fascinating museums and galleries. It’s best explored on foot, and even better with an expert guide, so taking a walking tour is the best way to learn about Maputo’s tumultuous history and to discover insider secrets. For a local feast, head to the fish market, where you can pick your catch and have it cooked with chips or rice at one of the surrounding restaurants! And when city life all gets a bit too much, you can hop on a bus for 90 minutes to reach the quiet white sand beaches of Ponto do Ouro.</span></p><p data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">Maputo is only just emerging as a backpacker destination so there aren’t heaps of hostels, which means you should take full advantage of </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/The-Base/Maputo/288957" rel="noopener" target="_blank"><span data-dcnode-id="839" instrument_node="">The Base</span></a><span data-dcnode-id="837" instrument_node="">. A small hostel with a homely feel, you can cook up a feast on the BBQ and enjoy it on the terrace overlooking Maputo Bay! It’s within walking distance of the city’s best attractions, as well as plenty of bars and restaurants.</span></p><h2 data-dcnode-id="828"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">11.&nbsp;</span></strong><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Nassau/ChosenCountry.Bahamas" rel="noopener" target="_blank"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Nassau</span></strong></a><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node=""> – Bahamas</span></strong></h2><p data-dcnode-id="824"><img alt="best backpacking destinations - Nassau" class="aligncenter wp-image-124882 lazyload" data-dcnode-id="827" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Nassau-Bahamas-@rosefernndez.jpg" height="875" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&lt;img class="aligncenter wp-image-124882 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Nassau-Bahamas-@rosefernndez.jpg" alt="best backpacking destinations - Nassau" width="875" height="875" /&gt;</span></noscript></p><p data-dcnode-id="819" style="text-align: center"><span data-dcnode-id="823" instrument_node="">📸: </span><em data-dcnode-id="820"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/rosefernndez/" rel="noopener" target="_blank"><span data-dcnode-id="822" instrument_node="">@rosefernndez</span></a></em></p><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">You might not think of budget travellers when you picture the Bahamas, but then again you probably don’t think of cities either. Well that’s all about to change, because the Bahamas’ capital (and only) city is one of the best backpacking destinations for 2020 – especially if you’re the type of traveller who swerves the resorts and seeks out authentic experiences (i.e. all of us!) The city oozes Caribbean culture, nowhere more so than in the vibrant ‘Fish Fry’ neighbourhood, where colourful jerk joints, bars and street food vendors line the streets, the energy is electric and the soundtrack is provided by DJs and reggae bands. Other highlights include sipping rum at a </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.johnwatlings.com/" rel="noopener" target="_blank"><span data-dcnode-id="817" instrument_node="">local distillery</span></a><span data-dcnode-id="815" instrument_node="">, diving with sharks at Stuart’s Cove and shopping for crafts at the Straw Market. It’s better in the Bahamas!</span></p><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Hostels in the Bahamas – say what?! </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/BahaSea-Backpackers/Nassau/284452" rel="noopener" target="_blank"><span data-dcnode-id="812" instrument_node="">BahaSea Backpackers</span></a><span data-dcnode-id="810" instrument_node=""> gives you paradise on a budget, with two pools overlooking the sparkling turquoise ocean. They’ve got two rescued pigs who love to take a dip too! It’s in a quiet beachfront neighbourhood with easy public transport links to downtown, and has a mixture of private rooms, mixed and female-only dorms.</span></p><h2 data-dcnode-id="802"><span data-dcnode-id="808" instrument_node="">10. </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Gijon/ChosenCountry.Spain" rel="noopener" target="_blank"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Gijón</span></strong></a><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node=""> – Spain</span></strong></h2><p data-dcnode-id="798"><img alt="best backpacking destinations - Gijon" class="aligncenter wp-image-124884 lazyload" data-dcnode-id="801" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Gijon-Spain-@ellie_etlalune.jpg" height="875" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">&lt;img class="aligncenter wp-image-124884 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Gijon-Spain-@ellie_etlalune.jpg" alt="best backpacking destinations - Gijon" width="875" height="875" /&gt;</span></noscript></p><p data-dcnode-id="793" style="text-align: center"><span data-dcnode-id="797" instrument_node="">📸:</span><em data-dcnode-id="794"><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/ellie_etlalune/" rel="noopener" target="_blank"><span data-dcnode-id="796" instrument_node="">@ellie_etlalune</span></a></em></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Once a sleepy fishing port, the city of Gijón in Spain’s northern Asturias region is turning into a hotspot for surfing, eating and partying. Solo travellers will feel right at home here, as the atmosphere is always buzzing and social, thanks to al fresco drinking and dining in the Centro district (and of course, the hostels). Asturias is famous for its cider, and there are plenty of bars in the city where you can watch your order being poured from a great height – the traditional way to serve it! But before you have too much of that, you need to hit the soft golden sand of Playa de San Lorenzo for some beach yoga and surfing. Trust us, you won’t be able to resist the easy-going vibe!</span></p><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">If you want to make the most of the waves, </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Gijon-Surf-Hostel/Gijon/271616" rel="noopener" target="_blank"><span data-dcnode-id="789" instrument_node="">Gijón Surf Hostel</span></a><span data-dcnode-id="787" instrument_node=""> will help you out with cheap board rental, lessons and a convenient location close to the beach. It’s set in a massive house where you’ll meet heaps of other backpackers over beers in the garden or the free buffet breakfast. There’s even free yoga every night, so you’re sure to be channelling the chilled spirit of Gijón by the time you leave.</span></p><h2 data-dcnode-id="779"><span data-dcnode-id="785" instrument_node="">9. </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Siargao-Island/ChosenCountry.Philippines" rel="noopener" target="_blank"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Siargao Island</span></strong></a><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node=""> – The Philippines</span></strong></h2><p data-dcnode-id="775"><img alt="best backpacking destinations - Siargao Island" class="aligncenter wp-image-124886 lazyload" data-dcnode-id="778" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Siargao-Island-Philippines-@marinechanal.jpg" height="649" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">&lt;img class="aligncenter wp-image-124886 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Siargao-Island-Philippines-@marinechanal.jpg" alt="best backpacking destinations - Siargao Island" width="875" height="649" /&gt;</span></noscript></p><p data-dcnode-id="770" style="text-align: center"><span data-dcnode-id="774" instrument_node="">📸: </span><em data-dcnode-id="771"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/marinechanal/" rel="noopener" target="_blank"><span data-dcnode-id="773" instrument_node="">@marinechanal</span></a></em></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Another surfer’s paradise, Siargao is the wave-riding capital of The Philippines that’s low-key one of the most beautiful islands on earth. Full of treasures like waterfalls, lagoons, caves, jungle and of course, those beaches, it’s one of the best backpacking destinations for nature lovers. As with any South East Asian backpacker spot, you can expect awesome nightlife in the form of casual bars and cocktail buckets – the Jungle Party on Friday nights isn’t to be missed! Our top insider tip is to head out to the pier on Cloud 9 beach with a few beers one evening and watch the sun set over the ocean, as the last few surfers drift in. Totally magical!</span></p><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Mad Monkey hostels are the stuff of backpacking legend, and </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Mad-Monkey-Hostel-Siargao/Siargao-Island/295413" rel="noopener" target="_blank"><span data-dcnode-id="766" instrument_node="">Mad Monkey Siargao</span></a><span data-dcnode-id="764" instrument_node=""> is no exception. It’s got a huge social space set around the swimming pool, with a tiki bar and restaurant, beer pong and foosball tables. They’re known for their wild events and bar crawls, and every night after their bar closes the staff lead their tribe of travellers to the best parties on the island.</span></p><h2 data-dcnode-id="756"><span data-dcnode-id="762" instrument_node="">8. </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Nosara/ChosenCountry.Costa-Rica" rel="noopener" target="_blank"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Nosara</span></strong></a><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node=""> – Costa Rica</span></strong></h2><p data-dcnode-id="752"><img alt="best backpacking destinations - Nosara" class="aligncenter wp-image-124887 lazyload" data-dcnode-id="755" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Selina-Hostel-in-Nosara-Costa-Rica-@pepallama.jpg" height="1094" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">&lt;img class="aligncenter wp-image-124887 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Selina-Hostel-in-Nosara-Costa-Rica-@pepallama.jpg" alt="best backpacking destinations - Nosara" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="747" style="text-align: center"><span data-dcnode-id="751" instrument_node="">📸: </span><em data-dcnode-id="748"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/pepallama/" rel="noopener" target="_blank"><span data-dcnode-id="750" instrument_node="">@pepallama</span></a></em></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">It doesn’t get more chilled than Nosara, a gorgeous Costa Rican beach town with a free-loving hippy spirit. The adorable cafes, surfers and boutique shops give it a California feel, and when you stumble upon the graffiti-covered skate park in the centre of town you might actually forget what country you’re in. It’s a popular spot for yogis too, with plenty of studios all over town and pristine beaches to roll out a mat if you prefer to do your downward dog under the sun. When you’ve recharged your zen, it’s time to head out on safari in a riverboat (eco-friendly of course, this is Costa Rica!) Get ready to spot mammoth crocs, iguanas, monkeys and exotic birds.</span></p><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">Pick your jaws up off the floor – </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Selina-Nosara/Nosara/293641"><span data-dcnode-id="743" instrument_node="">Selina Nosara</span></a><span data-dcnode-id="741" instrument_node=""> is a hostel, and you can stay there for less than £10 a night! It’s got two pools, a bar (with regular live music) a cinema room, co-working space and way, way more, all set within incredible eco surroundings. Get your wellness fix with a yoga class, followed by a healthy vegan meal cooked at the on-site restaurant!</span></p><h2 data-dcnode-id="733"><span data-dcnode-id="739" instrument_node="">7. </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Isfahan/ChosenCountry.Iran" rel="noopener" target="_blank"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Isfahan</span></strong></a><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node=""> – Iran</span></strong></h2><p data-dcnode-id="729"><img alt="best backpacking destinations - Isfahan" class="aligncenter wp-image-124889 lazyload" data-dcnode-id="732" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Esfahan-Iran-@travelstan-1.jpg" height="1094" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">&lt;img class="aligncenter wp-image-124889 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Esfahan-Iran-@travelstan-1.jpg" alt="best backpacking destinations - Isfahan" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="724" style="text-align: center"><span data-dcnode-id="728" instrument_node="">📸: </span><em data-dcnode-id="725"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/travelestan/" rel="noopener" target="_blank"><span data-dcnode-id="727" instrument_node="">@travelestan</span></a></em></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Iran needs to be on your backpacking itinerary for 2020 and the city of Isfahan is our top pick – there’s a reason the old Persian proverb calls it ‘half the world’! Pictures of unbelievable Iranian architecture have probably already sparked your wanderlust, and you’ll find Isfahan’s Naqsh-e Jahan Square to be a treasure trove. With the iconic blue-tiled Imam Mosque, the dazzling Sheikh Lotfollah Mosque and the royal Ali Qapu Palace all in one place, your eyeballs (and camera lens) will be spoilt for choice. If you can handle being blown away even more, the 1,000-year-old Grand Bazaar totally lives up to its name, with intricately tiled ceilings, lantern-lit passageways and colourful courtyards. Stop for a cup of Persian chai and just take it all in!</span></p><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">Iranian hospitality is world-famous, and </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Ragrug-Hostel/Isfahan/288971"><span data-dcnode-id="720" instrument_node="">Rag Rug Hostel</span></a><span data-dcnode-id="718" instrument_node=""> has it in shedloads. They offer free daily walking tours, where your hosts will teach you about the city’s history, plus free Iranian breakfasts. The hostel is decorated in Persian tiles, and it has a beautiful leafy garden and a rooftop terrace with views over the city streets.</span></p><h2 data-dcnode-id="710"><span data-dcnode-id="716" instrument_node="">6. </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Kodaikanal/ChosenCountry.India" rel="noopener" target="_blank"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Kodaikanal</span></strong></a><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node=""> – India</span></strong></h2><p data-dcnode-id="706"><img alt="best backpacking destinations - Kodaikanal" class="aligncenter wp-image-124890 lazyload" data-dcnode-id="709" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Kodikanal-India-@ma___yuri.jpg" height="1094" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&lt;img class="aligncenter wp-image-124890 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Kodikanal-India-@ma___yuri.jpg" alt="best backpacking destinations - Kodaikanal" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="701" style="text-align: center"><span data-dcnode-id="705" instrument_node="">📸: </span><em data-dcnode-id="702"><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/ma___yuri/" rel="noopener" target="_blank"><span data-dcnode-id="704" instrument_node="">@ma__yuri</span></a></em></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The town of Kodaikanal in India’s scorching Tamil Nadu region offers a refreshing break from the heat, with a misty hillside location 2,000 metres above sea level. The town’s main attraction is the star-shaped lake in its centre, where you can take out a rowing boat and explore the eerily peaceful scenes. The area is home to serene waterfalls and breathtaking valleys, so it’s the perfect place to escape the hustle and bustle for a few days (as you probably know, India can be intense!) To really unplug, why not embark on the two-day trek to Munnar? You’ll be rewarded with out-of-this-world views over the Western Ghats and you might even spot some elephants along the way!</span></p><p data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">If you want to take your natural retreat to the next level, </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Zostel-Kodaikanal/Kodaikanal/293090" rel="noopener" target="_blank"><span data-dcnode-id="697" instrument_node="">Zostel Kodaikanal</span></a><span data-dcnode-id="695" instrument_node=""> will make you feel a million miles from it all. With rustic common spaces, outdoor terraces overlooking the hills and gorgeous dorms, it doesn’t get much cosier. You can hang out with other travellers around the garden bonfire, or hike around the hostel grounds with the resident pups!</span></p><h2 data-dcnode-id="687"><span data-dcnode-id="693" instrument_node="">5. </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Trondheim/ChosenCountry.Norway" rel="noopener" target="_blank"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Trondheim</span></strong></a><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node=""> – Norway</span></strong></h2><p data-dcnode-id="683"><img alt="best backpacking destinations - Trondheim" class="aligncenter wp-image-124892 size-full lazyload" data-dcnode-id="686" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Trondheim-@simowilliams-1.jpg" height="583" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">&lt;img class="aligncenter wp-image-124892 size-full lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Trondheim-@simowilliams-1.jpg" alt="best backpacking destinations - Trondheim" width="875" height="583" /&gt;</span></noscript></p><p data-dcnode-id="678" style="text-align: center"><span data-dcnode-id="682" instrument_node="">📸:&nbsp;</span><em data-dcnode-id="679"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40simowilliams%3Futm_source%3Dunsplash%26utm_medium%3Dreferral%26utm_content%3DcreditCopyText" rel="noopener" target="_blank"><span data-dcnode-id="681" instrument_node="">@simowilliams</span></a></em></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Scandinavia is as cool as it gets, but if you want to score serious hipster points then don’t just visit the big hitters like Oslo and Copenhagen. Vibrant Trondheim is one of the best backpacking destinations for 2020. A creative student city, it has a massive craft beer and local food scene, which you can sample at the many cafes and restaurants in the pedestrianised city centre. It’s full of prime Insta content, like the classic Scandi-style colourful buildings along the waterfront… just save some space in your camera roll for the towering gothic cathedral! As the first capital of Norway, this city is packed full of history for you to discover. You can even tick off a bucket list experience by seeing the Northern Lights here between September to March. So, what are you waiting for?</span></p><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">To save some bucks in this pricey city (that’s Scandinavia for you), </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Trondheim-Vandrerhjem/Trondheim/84897" rel="noopener" target="_blank"><span data-dcnode-id="674" instrument_node="">Trondheim Vandrerhjem</span></a><span data-dcnode-id="672" instrument_node=""> is the best budget accommodation option. It’s minimalistic but has everything you need, with comfy beds, a fully equipped kitchen and a communal TV area to mingle with other guests. It’s about a 15-minute walk from the centre of Trondheim, with a quiet location up a hill and great views of the city!</span></p><h2 data-dcnode-id="664"><span data-dcnode-id="670" instrument_node="">4. </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Hossegor/ChosenCountry.France" rel="noopener" target="_blank"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Hossegor</span></strong></a><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node=""> – France</span></strong></h2><p data-dcnode-id="660"><img alt="best backpacking destinations - Hossegor" class="aligncenter wp-image-124894 lazyload" data-dcnode-id="663" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Hossegor-France-@olaiazorrozua.jpg" height="1094" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">&lt;img class="aligncenter wp-image-124894 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Hossegor-France-@olaiazorrozua.jpg" alt="best backpacking destinations - Hossegor" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="654" style="text-align: center"><span data-dcnode-id="659" instrument_node="">📸:</span><em data-dcnode-id="655"><span data-dcnode-id="658" instrument_node=""> </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/olaiazorrozua/" rel="noopener" target="_blank"><span data-dcnode-id="657" instrument_node="">@olaiazorrozua</span></a></em></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Hawaii meets Europe in the adorable seaside town of Hossegor in south-western France. It’s another spot on our list that’s famous for surfing (it sounds like you lot will be spending a lot of time in the water in 2020!), and the atmosphere is insane during October when it hosts professional championships like the Quiksilver and Roxy Pros. The rest of the year is much more chilled, with a massive community of nomads passing through to enjoy its peaceful beaches, pedestrian and cyclist-friendly town centre, and café culture in the many French bakeries. We challenge you to not eat your bodyweight in pain au chocolat!</span></p><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">Hossegor’s hostel game is strong, with the highly Instagrammable </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/JO-and-JOE-Hossegor/Hossegor/276258" rel="noopener" target="_blank"><span data-dcnode-id="650" instrument_node="">JO&amp;JOE</span></a><span data-dcnode-id="648" instrument_node=""> offering quirky accommodation that fits right in with the town’s free spirit. It’s got its own sandy garden area for hanging out in the sun, massive comfy beds and a partnership with legendary surfing brands Quiksilver and Roxy, which means discounted surfing lessons for guests!</span></p><h2 data-dcnode-id="640"><span data-dcnode-id="646" instrument_node="">3. </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Maribor/ChosenCountry.Slovenia" rel="noopener" target="_blank"><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Maribor</span></strong></a><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node=""> – Slovenia</span></strong></h2><p data-dcnode-id="636"><img alt="" class="aligncenter size-large wp-image-125007 lazyload" data-dcnode-id="639" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Maribor-858x875.jpg" height="875" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="858"><noscript data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">&lt;img class="aligncenter size-large wp-image-125007 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/Maribor-858x875.jpg" alt="" width="858" height="875" /&gt;</span></noscript></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">While iconic Lake Bled and pretty capital Ljubljana have secured Slovenia a place on most traveller’s Interrailing itineraries, we’re exploring more of the country in 2020. Second city Maribor is the perfect place to start – a charming spot filled with medieval buildings, winding streets and cosy wine cafes. If you didn’t know, Slovenia is famous for its incredible (and ridiculously cheap) local wine, and Maribor is one of the best places to sample it. It’s surrounded by wine-growing hills and even has a wine museum that offers tastings! For such a small city Maribor packs a punch, with a strong line-up of summer festivals, a lively student vibe and a picturesque Old Town that rivals Europe’s biggest and best.</span></p><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Stay right in the heart of the city at colourful </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Uni-Youth-Hostel/Maribor/12790" rel="noopener" target="_blank"><span data-dcnode-id="632" instrument_node="">Uni Youth Hostel</span></a><span data-dcnode-id="630" instrument_node="">. This highly-rated hostel has common areas with pool tables and cosy couches, plus an on-site bar for even more of that Slovenian wine – we’re sure it counts as a cultural activity! Just make sure you’re up in time for the breakfast buffet full of local treats.</span></p><h2 data-dcnode-id="622"><span data-dcnode-id="628" instrument_node="">2. </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Suratthani/ChosenCountry.Thailand" rel="noopener" target="_blank"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Surat Thani</span></strong></a><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node=""> – Thailand</span></strong></h2><p data-dcnode-id="618"><img alt="" class="aligncenter size-full wp-image-125012 lazyload" data-dcnode-id="621" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/surat-thani.jpg" height="825" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">&lt;img class="aligncenter size-full wp-image-125012 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2017/12/surat-thani.jpg" alt="" width="875" height="825" /&gt;</span></noscript></p><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">You might be surprised that Surat Thani is one of our top backpacking destinations, because in the past it’s been known mostly as a jumping-off point for the eastern Thai islands. Well, that’s all about to change, as backpackers are wising up to the fact that Surat Thani offers an authentic Thai experience away from the tourists. Start your day exploring the crowd-free temples in the city centre, like the majestic Surat Thani Pillar Shrine, before hanging out with the locals with a few Chang beers on the laid-back Ban Don Pier. From here you can hire a longtail boat and be guided through the canals that surround the city, observing rural life and maybe even spotting a whopping monitor lizard. If nothing else, visit Surat Thani for some of the best Thai food you’ll ever find –&nbsp; classics like spicy papaya salad, pad Thai and crispy pork are on offer at the buzzing night market.</span></p><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Just two minutes’ walk from the market is </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Boundary-Hostel-and-Cafe/Suratthani/293865" rel="noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">Boundary Hostel and Cafe</span></a><span data-dcnode-id="612" instrument_node="">, a rustic, family-run spot that’s full of local charm. Expect unrivalled hospitality, free breakfast and cosy dorms. The staff are happy to recommend amazing local experiences, and when you’re ready to move on they can help you arrange transport to the nearby islands.</span></p><h2 data-dcnode-id="604"><span data-dcnode-id="610" instrument_node="">1. </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/findabed.php/ChosenCity.Nusa-Penida/ChosenCountry.Indonesia" rel="noopener" target="_blank"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Nusa Penida</span></strong></a><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node=""> – Indonesia</span></strong></h2><p data-dcnode-id="600"><img alt="best backpacking destinations - Nusa Penida" class="aligncenter wp-image-124896 lazyload" data-dcnode-id="603" data-src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Nusa-Penida-Kelingking-Beach-@giuliciu.jpg" height="1094" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="875"><noscript data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">&lt;img class="aligncenter wp-image-124896 lazyload" src="https://marylineg1.sg-host.com/blog/wp-content/uploads/2019/11/Nusa-Penida-Kelingking-Beach-@giuliciu.jpg" alt="best backpacking destinations - Nusa Penida" width="875" height="1094" /&gt;</span></noscript></p><p data-dcnode-id="595" style="text-align: center"><span data-dcnode-id="599" instrument_node="">📸: </span><em data-dcnode-id="596"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/giuliciu/" rel="noopener" target="_blank"><span data-dcnode-id="598" instrument_node="">@giuliciu</span></a></em></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Move over Bali, this new kid on the block is our top backpacking destination for 2020! Nusa Penida is an Indonesian island southeast of the famous backpacker haven, most known for the curved cliffs and unspoilt bay of gorgeous Kelingking Beach. This awe-inspiring sight is Nusa Penida’s star attraction, but there’s no end of magical experiences to be had on this incredible island. From attending prayer service in a sacred cave halfway up a mountain, to hiking to an abandoned treehouse turned insane lookout point and then swimming with playful giant manta rays, every moment is an adventure on Nusa Penida. Throw in those legendary Indonesian sunsets and plenty of ‘warungs’ serving delicious local food for pennies, and it’ll soon become obvious why it’s our number one backpacker hotspot for 2020.</span></p><p data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">An island paradise calls for a hostel of the same calibre, and </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hostelworld.com/hosteldetails.php/Nuansa-Penida-Hostel/Nusa-Penida/289540" rel="noopener" target="_blank"><span data-dcnode-id="591" instrument_node="">Nuansa Penida Hostel</span></a><span data-dcnode-id="589" instrument_node=""> doesn’t disappoint. It’s a boutique hostel with gorgeous bungalows, a beautiful Bali-esque pool and outdoor social spaces where you can enjoy your free daily breakfast. When you’re ready to explore the island, rent a moped from the hostel and do it in style!</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&nbsp;</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">These are our top 20 places to visit in 2020 – if you need us, we’ll be deciding which one we’re going to first! If you’ve visited any of next year’s top backpacker destinations already, please share your experiences with us. Or perhaps you’re planning a trip now? Let us know in the comments! Here’s to another year of meeting the world.</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">&nbsp;</span></p></section><footer class="article-footer" data-dcnode-id="574"><p class="footer-categories" data-dcnode-id="575"><span class="categories-title" data-dcnode-id="579"><span data-dcnode-id="580" ins
