</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">You can also take advantage of the Waikiki Trolley to shuttle you all over Waikiki, saving you the cost of a rental car, parking fees, or using Uber.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><h3 data-dcnode-id="2591" id="56-go-oahu-card"><span data-dcnode-id="2592" id="56_GO_OAHU_CARD"><span data-dcnode-id="2593" instrument_node="">56. GO OAHU CARD</span></span></h3><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">If you are planning on doing several activities on Oahu, you might consider buying the Go Oahu Card.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2586" instrument_node="">This card will get you free entry into the </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shrsl.com/2x9so" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Polynesian Cultural Center</span></strong></a><span data-dcnode-id="2582" instrument_node="">, Pearl Harbor attractions, </span><strong data-dcnode-id="2579"><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/things-to-know-before-visiting-kualoa-ranch-on-oahu/"><span data-dcnode-id="2581" instrument_node="">Kualoa Ranch</span></a></strong><span data-dcnode-id="2578" instrument_node="">, Iolani Palace, Wet ‘n’ Wild, and tons of classes and activities.</span></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">You can order them online through Costco.</span></p><span data-dcnode-id="2573" instrument_node="">
</span><h3 data-dcnode-id="2570" id="57-hoomaluhia-botanical-garden"><span data-dcnode-id="2571" id="57_HOOMALUHIA_BOTANICAL_GARDEN"><span data-dcnode-id="2572" instrument_node="">57. HOOMALUHIA BOTANICAL GARDEN</span></span></h3><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2568" instrument_node="">If you love looking at Hawaii pictures on </span><strong data-dcnode-id="2565"><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/ultimate-list-of-hawaii-captions-for-instagram/"><span data-dcnode-id="2567" instrument_node="">Instagram</span></a></strong><span data-dcnode-id="2564" instrument_node="">, you will for sure have seen Hoomaluhia Botanical Garden pop up in lots of photos.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2557"><figure class="aligncenter size-large" data-dcnode-id="2558"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: HO'OMALUHIA BOTANICAL GARDEN is a popular photo spot on Oahu" class="wp-image-2257" data-dcnode-id="2561" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: HO'OMALUHIA BOTANICAL GARDEN is a popular photo spot on Oahu" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-1024x683.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-1024x683.jpg 1024w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-300x200.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-768x512.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-270x180.jpg 270w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN-770x515.jpg 770w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HOOMALUHIA-BOTANICAL-GARDEN.jpg 1000w" width="1024"><figcaption data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">This is definitely one of the most Instagrammable spots on Oahu.</span></figcaption></figure></div><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2555" instrument_node="">It’s one of the most Instagrammable spots on Oahu. Plus it’s one of the</span><strong data-dcnode-id="2551"><span data-dcnode-id="2554" instrument_node=""> </span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/stunning-hawaii-botanical-gardens-you-must-visit/"><span data-dcnode-id="2553" instrument_node="">best botanical gardens in Hawaii.</span></a></strong></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2546"><em data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Note: Pay attention to signs to see where you are allowed to take photos. You can’t stand in the middle of the street, but you can get a similar shot standing in a parking lot.</span></em></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">What a lot of people don’t realize is that Hoomaluhia Botanical Garden also offers catch-and-release fishing every weekend. That makes it a cheap thing to do on Oahu.</span></p><span data-dcnode-id="2542" instrument_node="">
</span><h3 data-dcnode-id="2539" id="58-free-fireworks-show-in-waikiki"><span data-dcnode-id="2540" id="58_FREE_FIREWORKS_SHOW_IN_WAIKIKI"><span data-dcnode-id="2541" instrument_node="">58. FREE FIREWORKS SHOW IN WAIKIKI</span></span></h3><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Something that still amazes me is that the Hilton Hawaiian Village in Waikiki does a full fireworks show every Friday and it’s completely free!</span></p><span data-dcnode-id="2535" instrument_node="">
</span><div class="wp-block-image wp-image-2138 size-full" data-dcnode-id="2530"><figure class="aligncenter" data-dcnode-id="2531"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: The Hilton Hawaiian Village has a free fireworks in Waikiki show every Friday" class="wp-image-2138" data-dcnode-id="2534" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: The Hilton Hawaiian Village has a free fireworks in Waikiki show every Friday" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="688" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02-300x206.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02-768x528.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02-1024x705.jpg 1024w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/HHV_Fireworks_02-870x600.jpg 870w" width="1000"><figcaption data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Free fireworks show in Waikiki. Photo credit: Hilton Hawaiian Village</span></figcaption></figure></div><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Stake out a spot on Waikiki beach to watch them or splurge and head to the Hilton Hawaiian Village to order a drink and get a front-row view of the fireworks.</span></p><span data-dcnode-id="2526" instrument_node="">
</span><h3 data-dcnode-id="2523" id="59-hang-at-ala-moana-shopping-center"><span data-dcnode-id="2524" id="59_HANG_AT_ALA_MOANA_SHOPPING_CENTER"><span data-dcnode-id="2525" instrument_node="">59. HANG AT ALA MOANA SHOPPING CENTER</span></span></h3><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">While it may sound like hanging out at a shopping center isn’t really a budget-friendly option, Ala Moana Center offers a lot of free stuff.</span></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">First of all, they do incredible hula shows on their stage as well as other programming throughout the year.</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">You can also get free samples of items like those cute pineapple cookies from Honolulu Cookie Company!</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">And, they have a really awesome playground if your kids need a fun place to play.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><h3 data-dcnode-id="2507" id="60-free-classes-at-the-royal-hawaiian-center"><span data-dcnode-id="2508" id="60_FREE_CLASSES_AT_THE_ROYAL_HAWAIIAN_CENTER"><span data-dcnode-id="2509" instrument_node="">60. FREE CLASSES AT THE ROYAL HAWAIIAN CENTER</span></span></h3><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Like Ala Moana Center, the Royal Hawaiian Center is a shopping mall that also features free entertainment and classes.</span></p><span data-dcnode-id="2503" instrument_node="">
</span><div class="wp-block-image wp-image-2137 size-full" data-dcnode-id="2498"><figure class="aligncenter" data-dcnode-id="2499"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: The Royal Hawaiian Center is a fun place to window shop and they have free cultural activities in Waikiki" class="wp-image-2137" data-dcnode-id="2502" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: The Royal Hawaiian Center is a fun place to window shop and they have free cultural activities in Waikiki" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="347" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/09/Royal-Hawaiian-Center.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/Royal-Hawaiian-Center.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/Royal-Hawaiian-Center-300x104.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/Royal-Hawaiian-Center-768x267.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/Royal-Hawaiian-Center-1024x356.jpg 1024w" width="1000"><figcaption data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Free programs at the Royal Hawaiian Center. Photo credit: Royal Hawaiian Center</span></figcaption></figure></div><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Here is where you can join free classes on lei-making, hula dancing, and playing the ukulele.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Plus, you can always window shop.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><h3 data-dcnode-id="2488" id="61-check-out-a-swap-meet"><span data-dcnode-id="2489" id="61_CHECK_OUT_A_SWAP_MEET"><span data-dcnode-id="2490" instrument_node="">61. CHECK OUT A SWAP MEET</span></span></h3><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">When I was a kid, my favorite thing to do on Oahu was hit up the Aloha Swap Meet at Aloha Stadium.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">I admit it’s not nearly as cool or as massive as it was back in the 90s, but that doesn’t mean it’s not still worth checking out.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2480" instrument_node="">It’s a great place to find </span><strong data-dcnode-id="2477"><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/best-hawaiian-souvenirs/"><span data-dcnode-id="2479" instrument_node="">Hawaiian souvenirs</span></a></strong><span data-dcnode-id="2476" instrument_node=""> at a fraction of the price of souvenir shops. And you can always bargain!</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">If you are traveling with kids, you can give them cash and let them figure out how best to spend it.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><h3 data-dcnode-id="2468" id="62-visit-dole-plantation"><span data-dcnode-id="2469" id="62_VISIT_DOLE_PLANTATION"><span data-dcnode-id="2470" instrument_node="">62. VISIT DOLE PLANTATION</span></span></h3><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2462"><strong data-dcnode-id="2464"><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/how-to-visit-the-dole-pineapple-plantation-in-hawaii/"><span data-dcnode-id="2466" instrument_node="">Dole Plantation</span></a></strong><span data-dcnode-id="2463" instrument_node=""> can be hit/miss depending on families. I’d say it’s mostly geared for families with younger kids.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2456"><figure class="aligncenter size-full" data-dcnode-id="2457"><img alt="Image of the exterior of Dole Plantation on Oahu." class="wp-image-16749" data-dcnode-id="2460" data-pin-description="Image of the exterior of Dole Plantation on Oahu." data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="563" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2021/10/Dole-Pineapple-Plantation-in-Hawaii.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2021/10/Dole-Pineapple-Plantation-in-Hawaii.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2021/10/Dole-Pineapple-Plantation-in-Hawaii-300x169.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2021/10/Dole-Pineapple-Plantation-in-Hawaii-768x432.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2021/10/Dole-Pineapple-Plantation-in-Hawaii-150x84.jpg 150w" width="1000"><figcaption data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Dole Plantation on Oahu.</span></figcaption></figure></div><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">It’s free to enter and they offer activities like a free pineapple-cutting demonstration.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">But, for a fee, you can also join a Dole Plantation garden tour, explore a pineapple maze, or ride a little train.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2448" instrument_node="">And you’ll probably want to treat yourself to a </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/disney-pineapple-dole-whip-recipe/"><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Dole Whip</span></strong></a><span data-dcnode-id="2444" instrument_node="">!</span></p><span data-dcnode-id="2442" instrument_node="">
</span><h3 data-dcnode-id="2439" id="63-climb-the-aloha-tower"><span data-dcnode-id="2440" id="63_CLIMB_THE_ALOHA_TOWER"><span data-dcnode-id="2441" instrument_node="">63. CLIMB THE ALOHA TOWER</span></span></h3><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Another iconic place on Oahu is Aloha Tower. It’s been around since 1926 and has gone through a lot of changes in the past few decades.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Head up to the 10th floor to enjoy amazing views of the harbor (and spot the cruise ships!) and Honolulu from their observation deck.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">You can also visit the Observation Deck located on the 10th floor of Aloha Tower to find the perfect spot for beautiful views of the harbor on one side and the cityscape of Honolulu on the other. It’s totally free.</span></p><span data-dcnode-id="2429" instrument_node="">
</span><h3 data-dcnode-id="2426" id="64-visit-waimea-valley"><span data-dcnode-id="2427" id="64_VISIT_WAIMEA_VALLEY"><span data-dcnode-id="2428" instrument_node="">64. VISIT WAIMEA VALLEY</span></span></h3><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2424" instrument_node="">One of the most unique places to visit on Oahu is </span><strong data-dcnode-id="2421"><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/ultimate-guide-to-visiting-waimea-valley-on-oahu/"><span data-dcnode-id="2423" instrument_node="">Waimea Valley</span></a></strong><span data-dcnode-id="2420" instrument_node="">.</span></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Here, you can swim at the base of a waterfall, explore a botanical garden, and learn about the historical and cultural significance of Waimea Valley to the Hawaiian people.</span></p><span data-dcnode-id="2415" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2410"><figure class="aligncenter size-large" data-dcnode-id="2411"><img alt="Image of Waimea Falls on Oahu" class="wp-image-18527" data-dcnode-id="2414" data-pin-description="Image of Waimea Falls on Oahu" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="1024" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls-768x1024.jpeg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls-768x1024.jpeg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls-225x300.jpeg 225w, https://hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls-640x853.jpeg 640w, https://hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls-150x200.jpeg 150w, https://hawaiitravelwithkids.com/wp-content/uploads/2022/01/Waimea-Falls.jpeg 800w" width="768"><figcaption data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Waimea Falls on Oahu.</span></figcaption></figure></div><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2408" instrument_node="">And they have hands-on activities in Hawaii for kids! </span><strong data-dcnode-id="2403"><span data-dcnode-id="2407" instrument_node="">Check out our full guide to </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/ultimate-guide-to-visiting-waimea-valley-on-oahu/"><span data-dcnode-id="2406" instrument_node="">visiting Waimea Valley on Oahu</span></a><span data-dcnode-id="2404" instrument_node="">.</span></strong></p><span data-dcnode-id="2401" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2400" instrument_node="">If you are thinking about splurging for a luau, </span><strong data-dcnode-id="2397"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/2NZ7x5i" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="2399" instrument_node="">Toa Luau</span></a></strong><span data-dcnode-id="2396" instrument_node=""> is located at Waimea Valley and their luau tickets include entrance fees for Waimea Valley. </span><strong data-dcnode-id="2393"><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/2NZ7x5i" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="2395" instrument_node="">Find the best prices here.</span></a></strong></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2384"><em data-dcnode-id="2385"><strong data-dcnode-id="2387"><span data-dcnode-id="2390" instrument_node="">You can check admission fees </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waimeavalley.net/admissions/view/fees" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2389" instrument_node="">here</span></a></strong><span data-dcnode-id="2386" instrument_node="">.</span></em></p><span data-dcnode-id="2383" instrument_node="">
</span><h3 data-dcnode-id="2380" id="65-visit-a-chocolate-factory"><span data-dcnode-id="2381" id="65_VISIT_A_CHOCOLATE_FACTORY"><span data-dcnode-id="2382" instrument_node="">65. VISIT A CHOCOLATE FACTORY</span></span></h3><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Another unique Oahu tour is at the Manoa Chocolate factory. This is where you can learn about cacao farming and how chocolate is made.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">There are plenty of opportunities to try yummy chocolate samples and find out more about Hawaii’s blossoming chocolate industry.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2370"><em data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Note: The tour is only for kids ages 12 and older and adults.</span></em></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">However, all ages are welcome to just walk in for a chocolate tasting!</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2359"><em data-dcnode-id="2360"><strong data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">Learn more </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manoachocolate.com/pages/tours-tastings" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2364" instrument_node="">here</span></a><span data-dcnode-id="2362" instrument_node="">.</span></strong></em></p><span data-dcnode-id="2358" instrument_node="">
</span><h3 data-dcnode-id="2355" id="66-do-a-farm-tour"><span data-dcnode-id="2356" id="66_DO_A_FARM_TOUR"><span data-dcnode-id="2357" instrument_node="">66. DO A FARM TOUR</span></span></h3><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Something cool about Hawaii is that you’ll see lots of farms throughout the island growing all kinds of fruit and vegetables and raising animals.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2350" instrument_node="">While visiting Oahu, you can head to </span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/NaMeaKupono" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Na Mea Kupono Lo’i Kalo</span></strong></a><span data-dcnode-id="2346" instrument_node="">, a taro farm that’s so much more!</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Taro root has been the staple starch of the Hawaiian people for generations and generations. You’ll learn how to prepare, plant, and grow this important food on the farm tour.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2340" instrument_node="">Additionally, staff members share traditional crafts,</span><strong data-dcnode-id="2336"><span data-dcnode-id="2339" instrument_node=""> </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/most-famous-hawaiian-songs-you-need-to-hear/"><span data-dcnode-id="2338" instrument_node="">songs</span></a></strong><span data-dcnode-id="2335" instrument_node="">, stories, and games.</span></p><span data-dcnode-id="2333" instrument_node="">
</span><h3 data-dcnode-id="2330" id="67-check-out-a-night-market"><span data-dcnode-id="2331" id="67_CHECK_OUT_A_NIGHT_MARKET"><span data-dcnode-id="2332" instrument_node="">67. CHECK OUT A NIGHT MARKET</span></span></h3><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Night Markets are all the rage these days and that’s because they are so awesome!</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2325" instrument_node="">The Honolulu Night Market is a popular one and you’ll find local artists, designers, </span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/best-hawaiian-musical-artists-spotify/"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">musicians</span></strong></a><span data-dcnode-id="2321" instrument_node="">, artisans, and chefs. It’s perfect for your Hawaii vacation.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><h3 data-dcnode-id="2316" id="68-learn-about-ukuleles"><span data-dcnode-id="2317" id="68_LEARN_ABOUT_UKULELES"><span data-dcnode-id="2318" instrument_node="">68. LEARN ABOUT UKULELES</span></span></h3><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">The ukulele is such a huge part of Hawaiian culture nowadays. And one of the most famous ukulele makers is Kamaka Ukulele.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2307"><figure class="aligncenter size-full" data-dcnode-id="2308"><img alt="Man playing ukulele in Hawaii" class="wp-image-5944" data-dcnode-id="2311" data-pin-description="Man playing ukulele in Hawaii" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele-300x200.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele-768x512.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele-175x117.jpg 175w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele-450x300.jpg 450w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/06/Man-Playing-Ukulele-270x180.jpg 270w" width="1000"><figcaption data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Find out more about Hawaiian ukuleles.</span></figcaption></figure></div><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Join a guided factory tour and learn about the Kamaka family and how they have been leaders in their industry for nearly a century.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2302" instrument_node="">Their tours are Tuesday-Friday at 10:30 am. Find out more </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kamakahawaii.com/contact/contact-us.html" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">here</span></strong></a><span data-dcnode-id="2298" instrument_node="">.</span></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2289"><em data-dcnode-id="2290"><strong data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">Want to buy a ukulele? Find out the </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/kids-ukulele-buying-guide/"><span data-dcnode-id="2294" instrument_node="">best kids ukulele</span></a><span data-dcnode-id="2292" instrument_node="">!</span></strong></em></p><span data-dcnode-id="2288" instrument_node="">
</span><h3 data-dcnode-id="2285" id="69-visit-tide-pools"><span data-dcnode-id="2286" id="69_VISIT_TIDE_POOLS"><span data-dcnode-id="2287" instrument_node="">69. VISIT TIDE POOLS</span></span></h3><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Oahu has a ton of cool tide pools that are perfect for kids who want to explore Hawaiian sea life.</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Grab a pair of water shoes and head to Goat Island in Laie, Sandy Beach Tide Pools, or Makapuu Tide Pools for some free fun.</span></p><span data-dcnode-id="2278" instrument_node="">
</span><h3 data-dcnode-id="2275" id="70-find-the-wizard-stones-in-waikiki-beach"><span data-dcnode-id="2276" id="70_FIND_THE_WIZARD_STONES_IN_WAIKIKI_BEACH"><span data-dcnode-id="2277" instrument_node="">70. FIND THE WIZARD STONES IN WAIKIKI BEACH</span></span></h3><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">I’m a huge fan of learning the legends behind significant monuments when we travel.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Now, you probably would normally walk right past the Wizard Stones without realizing what they are. I know I have.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">So, I suggest finding the Wizard Stones and reading the legend on where they come from and what powers they are said to possess.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><h3 data-dcnode-id="2262" id="71-attend-a-torch-lighting-ceremony"><span data-dcnode-id="2263" id="71_ATTEND_A_TORCH_LIGHTING_CEREMONY"><span data-dcnode-id="2264" instrument_node="">71. ATTEND A TORCH LIGHTING CEREMONY</span></span></h3><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">One of my favorite moments in a luau is watching the torch lighting ceremony that usually kicks off the festivities.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">If you are in Waikiki at sunset, you can see a FREE traditional torch lighting ceremony and hula performance on Waikiki beach by the Duke Kahanamoku statue.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><h3 data-dcnode-id="2252" id="72-visit-iolani-palace"><span data-dcnode-id="2253" id="72_VISIT_IOLANI_PALACE"><span data-dcnode-id="2254" instrument_node="">72. VISIT IOLANI PALACE</span></span></h3><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">How often will you have the opportunity to explore a real royal palace?</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Iolani Palace was built in 1882 by King Kalakaua and it’s the only palace in the United States. It was home to Hawaii’s last reigning monarchs.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2240"><figure class="aligncenter size-large" data-dcnode-id="2241"><img alt="Royal Seal on a gate to Iolani Palace on Oahu" class="wp-image-3207" data-dcnode-id="2244" data-pin-description="Royal Seal on a gate to Iolani Palace on Oahu" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="1024" loading="lazy" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2020/02/Iolani-Palace-602x1024.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2020/02/Iolani-Palace-602x1024.jpg 602w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/02/Iolani-Palace-176x300.jpg 176w, https://hawaiitravelwithkids.com/wp-content/uploads/2020/02/Iolani-Palace.jpg 685w" width="602"><figcaption data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Royal Seal on a gate to Iolani Palace. Photo credit: Hawaii Tourism Authority (HTA) / Tor Johnson </span></figcaption></figure></div><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2238" instrument_node="">There’s a lot of history here, and I recommend reading </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2WmF1Kz" rel="nofollow noopener noreferrer" target="_blank"><em data-dcnode-id="2235"><strong data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Hawaii’s Story by Hawaii’s Queen</span></strong></em></a><span data-dcnode-id="2233" instrument_node=""> to really make the most of your experience.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">I’ve been a few times and I’m always in awe of how it’s been restored, including finding original pieces all over the country.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><h3 data-dcnode-id="2225" id="73-visit-pali-lookout"><span data-dcnode-id="2226" id="73_VISIT_PALI_LOOKOUT"><span data-dcnode-id="2227" instrument_node="">73. VISIT PALI LOOKOUT</span></span></h3><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">If you want a super cool stop while driving around Oahu, you have to visit Pali Lookout.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Yes, there are gorgeous panoramic views of where Kamehameha had a major battle. However, it’s also one of the windiest spots in Hawaii.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">I’m talking about having to hold onto things because it feels like you are going to blow away. It’s such a rush!</span></p><span data-dcnode-id="2215" instrument_node="">
</span><h3 data-dcnode-id="2212" id="74-see-hawaiian-art"><span data-dcnode-id="2213" id="74_SEE_HAWAIIAN_ART"><span data-dcnode-id="2214" instrument_node="">74. SEE HAWAIIAN ART</span></span></h3><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Oahu is a great place to meet local artists and admire their work. On the first Friday of every month, you can visit art galleries in downtown Honolulu at no charge.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2207" instrument_node="">Also, the Honolulu Museum of Art offers free admission on the 3rd Sunday of every month. Find out more </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honolulumuseum.org/events/bank_of_hawaii_sunday" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">here</span></strong></a><span data-dcnode-id="2203" instrument_node="">.</span></p><span data-dcnode-id="2201" instrument_node="">
</span><h3 data-dcnode-id="2198" id="75-waikele-premium-outlets"><span data-dcnode-id="2199" id="75_WAIKELE_PREMIUM_OUTLETS"><span data-dcnode-id="2200" instrument_node="">75. WAIKELE PREMIUM OUTLETS</span></span></h3><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">And if you are looking to shop on Oahu without paying full retail price, head to the Waikele Premium Outlets. It’s the only factory outlet on Oahu.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">I’ve scored some great deals here on baby clothes and clothes for myself.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Be sure to get a shopping voucher from their website AND pick up the discount vouchers at the airport. If you choose to take a shuttle bus to the outlets, they will offer you another set of vouchers.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2187" instrument_node="">See all the stores </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.premiumoutlets.com/outlet/waikele/stores" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">here</span></strong></a><span data-dcnode-id="2183" instrument_node="">.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><h3 data-dcnode-id="2178" id="76-uss-arizona-memorial"><span data-dcnode-id="2179" id="76_USS_ARIZONA_MEMORIAL"><span data-dcnode-id="2180" instrument_node="">76. USS ARIZONA MEMORIAL</span></span></h3><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2176" instrument_node="">Most people think that you have to join a tour to see </span><strong data-dcnode-id="2173"><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/pearl-harbor-with-kids/"><span data-dcnode-id="2175" instrument_node="">Pearl Harbor</span></a></strong><span data-dcnode-id="2172" instrument_node="">. That’s not true.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><div class="wp-block-image wp-image-2111 size-full" data-dcnode-id="2165"><figure class="aligncenter" data-dcnode-id="2166"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: You can visit Pearl Harbor for free" class="wp-image-2111" data-dcnode-id="2169" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: You can visit Pearl Harbor for free" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="664" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor-300x199.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor-768x510.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor-1024x680.jpg 1024w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/09/USS-Arizona-at-Pearl-Harbor-270x180.jpg 270w" width="1000"><figcaption data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">USS Arizona at Pearl Harbor.</span></figcaption></figure></div><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">In fact, you can see the USS Arizona Memorial for FREE. Well, as long as you get there early.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">They give out 1,300 free tickets every day and they are usually all dispersed by mid-morning.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2151"><em data-dcnode-id="2152"><strong data-dcnode-id="2153"><span data-dcnode-id="2157" instrument_node="">Find out more </span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/best-free-things-to-do-on-oahu/"><span data-dcnode-id="2156" instrument_node="">free things to do on Oahu</span></a><span data-dcnode-id="2154" instrument_node="">.</span></strong></em></p><span data-dcnode-id="2150" instrument_node="">
</span><h2 data-dcnode-id="2147" id="hawaii-on-a-budget-kauai"><span data-dcnode-id="2148" id="Hawaii_on_a_Budget_Kauai"><span data-dcnode-id="2149" instrument_node="">Hawaii on a Budget: Kauai</span></span></h2><span data-dcnode-id="2146" instrument_node="">
</span><h3 data-dcnode-id="2143" id="77-see-the-grand-canyon-of-the-pacific"><span data-dcnode-id="2144" id="77_SEE_THE_GRAND_CANYON_OF_THE_PACIFIC"><span data-dcnode-id="2145" instrument_node="">77. SEE THE GRAND CANYON OF THE PACIFIC</span></span></h3><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2141" instrument_node="">Probably the most well-known of the attractions on Kauai is the “Grand Canyon of the Pacific”, or </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/kauai/waimea-canyon-state-park/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Waimea Canyon</span></strong></a><span data-dcnode-id="2137" instrument_node="">.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><div class="wp-block-image wp-image-2023 size-full" data-dcnode-id="2130"><figure class="aligncenter" data-dcnode-id="2131"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: Waimea Canyon is one of the best free things to do on Kauai and has awesome Kauai hikes and views" class="wp-image-2023" data-dcnode-id="2134" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: Waimea Canyon is one of the best free things to do on Kauai and has awesome Kauai hikes and views" data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai-300x200.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai-768x512.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai-1024x683.jpg 1024w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai-270x180.jpg 270w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Waimea-Canyon-on-Kauai-770x515.jpg 770w" width="1000"><figcaption data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Waimea Canyon. Photo credit: Hawaii Tourism Authority (HTA) / Tor Johnson</span></figcaption></figure></div><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">At 14 miles long, over a mile wide, and 3600 feet deep, Waimea Canyon and the state park that surrounds it has some of the most beautiful views on the island, and maybe in the world!</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">The entry is free, but be prepared to pay $5 to park if you would like to go for a hike or get closer to the lookout points.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><h3 data-dcnode-id="2120" id="78-take-a-train-ride-on-kauai"><span data-dcnode-id="2121" id="78_TAKE_A_TRAIN_RIDE_ON_KAUAI"><span data-dcnode-id="2122" instrument_node="">78. TAKE A TRAIN RIDE ON KAUAI</span></span></h3><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">One of my kids’ favorite things to do on Kauai is going on the Kilohana Plantation Railway at Kilohana Plantation.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">It’s a 2.5 mile narrated tour in an open-air sugarcane train.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">You’ll learn a bit about plantation days and see fruit, vegetables and lots of animals. In fact, you get to feed pigs!</span></p><span data-dcnode-id="2110" instrument_node="">
</span><h3 data-dcnode-id="2107" id="79-kauai-coffee-company-tour"><span data-dcnode-id="2108" id="79_KAUAI_COFFEE_COMPANY_TOUR"><span data-dcnode-id="2109" instrument_node="">79. KAUAI COFFEE COMPANY TOUR</span></span></h3><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Even if you aren’t a fan of the most-consumed drink in the world, you don’t want to miss the biggest coffee farm in the US.</span></p><span data-dcnode-id="2103" instrument_node="">
</span><div class="wp-block-image wp-image-2017 size-full" data-dcnode-id="2098"><figure class="aligncenter" data-dcnode-id="2099"><img alt="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: Get a free cup of coffee at Kauai Coffee Plantation and take one of their free walking tours around the estate." class="wp-image-2017" data-dcnode-id="2102" data-pin-description="Tips for Hawaii on a Budget featured by top Hawaii blog, Hawaii Travel with Kids: Get a free cup of coffee at Kauai Coffee Plantation and take one of their free walking tours around the estate." data-pin-title="Hawaii on a Budget: 105 Essential Tips for Saving Money in Hawaii" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot.jpg&amp;raw" srcset="https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot.jpg 1000w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot-300x200.jpg 300w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot-768x512.jpg 768w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot-1024x683.jpg 1024w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot-270x180.jpg 270w, https://hawaiitravelwithkids.com/wp-content/uploads/2019/08/Kauai-Coffee-Instagram-Photo-Spot-770x515.jpg 770w" width="1000"><figcaption data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Kauai Coffee Plantation. Photo credit: Darren Cheung</span></figcaption></figure></div><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2092"><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kauaicoffee.com/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Kauai Coffee is headquartered on the southern coast of Kauai</span></strong></a><span data-dcnode-id="2093" instrument_node=""> and has free walking tours every day at 10 am, 12 pm, 2 pm, and 4 pm.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Upon arrival to the “Estate,” you will be offered a free cup of Kauai Coffee.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2083"><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kauaicoffee.com/visit-the-kauai-coffee-estate/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Plan your visit</span></strong></a><span data-dcnode-id="2084" instrument_node=""> and make sure you sign up for the scavenger hunt on Wednesday morning!</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Every team that completes it will get a free bag of coffee, and it is a great way to get kids involved without actually giving them coffee! (My boys have enough energy already, thank you very much!)</span></p><span data-dcnode-id="2079" instrument_node="">
