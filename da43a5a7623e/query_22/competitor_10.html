logistics! For more tips, check out </span><a data-dcnode-id="951" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/travel-tips/" rel="noopener follow" target="_blank"><span data-dcnode-id="952" instrument_node="">our travel tips resource page</span></a><span data-dcnode-id="950" instrument_node=""> or our </span><a data-dcnode-id="948" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/how-to-plan-a-trip-travel-planning-tips/" rel="noopener follow" target="_blank"><span data-dcnode-id="949" instrument_node="">guide to planning a trip</span></a><span data-dcnode-id="947" instrument_node="">.</span><ul data-dcnode-id="812"><li data-dcnode-id="939"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Booking Flights</span></strong><span data-dcnode-id="944" instrument_node="">: To score flight deals, search on Google Flights or </span><a aria-label="Kayak (opens in a new tab)" data-dcnode-id="941" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8242832/type/dlg/sid/ResourceBox/https%3A//www.kayak.com/flights" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Kayak</span></strong></a><span data-dcnode-id="940" instrument_node="">. Money-saving tips: fly mid-week or on the weekend; fly carry-on only on a budget airline; and take red-eyes or early morning flights.</span></li><li data-dcnode-id="903"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Accommodations:</span></strong><span data-dcnode-id="936" instrument_node=""> We usually stay in budget-friendly vacation rentals, boutique hotels or private rooms in hostels. We use </span><a aria-label="Booking.com (opens in a new tab)" data-dcnode-id="933" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/index.html%3Faid%3D1321795" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Booking.com</span></strong></a><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node=""> </span></strong><span data-dcnode-id="930" instrument_node="">to book hotels (</span><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">we love their flexible cancellation policy</span></em><span data-dcnode-id="927" instrument_node="">) and </span><a aria-label="Hostelworld (opens in a new tab)" data-dcnode-id="924" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hostelworld.prf.hn/click/camref%3A1011lII8/pubref%3AResourceBox/ar%3AResourceBox/%255Bp_id%3A1100l15345%255D" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Hostelworld</span></strong></a><span data-dcnode-id="923" instrument_node=""> to book hostels (</span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">low deposit, easy change/cancellation, and excellent reviews)</span></em><span data-dcnode-id="920" instrument_node="">. For vacation rentals, we prefer to book using </span><a aria-label=" (opens in a new tab)" data-dcnode-id="917" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/vrbo-2/" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">VRBO</span></strong></a><span data-dcnode-id="916" instrument_node=""> because they've got lower fees and better support than Airbnb, and we're not fans of Airbnb's unethical track record. You can also book vacation rentals on </span><a data-dcnode-id="913" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/expedia-vacation-rentals/" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Expedia</span></strong></a><span data-dcnode-id="912" instrument_node=""> and </span><a data-dcnode-id="909" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/hotels-com-vacation-rentals/" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Hotels.com</span></strong></a><span data-dcnode-id="908" instrument_node="">. We also use </span><a aria-label="TrustedHousesitters (opens in a new tab)" data-dcnode-id="905" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tidd.ly/b850bfaf" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">TrustedHousesitters</span></strong></a><span data-dcnode-id="904" instrument_node=""> as both hosts (for our home and our fur-child) and travelers!</span></li><li data-dcnode-id="888"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Travel Insurance: </span></strong><span data-dcnode-id="900" instrument_node="">We always, always, ALWAYS buy travel insurance for  international trips, and we STRONGLY suggest it - visit our </span><a data-dcnode-id="898" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/is-travel-insurance-worth-it/" rel="follow noopener"><span data-dcnode-id="899" instrument_node="">Travel Insurance Guide</span></a><span data-dcnode-id="897" instrument_node=""> to find out why. We recommend either </span><strong data-dcnode-id="894"><a aria-label=" (opens in a new tab)" data-dcnode-id="895" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/travel-insurance%3Faffiliate%3Dprctclwndr%26subId%3D%26utm_source%3Dprctclwndr%26utm_medium%3Daffiliate%26utm_campaign%3DAffiliate%26utm_content%3Dlink" rel="noopener nofollow" target="_blank"><span data-dcnode-id="896" instrument_node="">World Nomads</span></a></strong><span data-dcnode-id="893" instrument_node=""> or </span><strong data-dcnode-id="890"><a data-dcnode-id="891" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safetywing.com/a/practicalwanderlust" rel="noopener nofollow" target="_blank"><span data-dcnode-id="892" instrument_node="">SafetyWing</span></a></strong><span data-dcnode-id="889" instrument_node=""> for international travel insurance. SafetyWing is one of the few policies that covers Covid-19, and they have excellent monthly policies that are perfect for Digital Nomads and long term travelers!</span></li><li data-dcnode-id="882"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Travel Credit Card:</span></strong><span data-dcnode-id="885" instrument_node=""> We book all of our trips on our favorite travel credit card. Not only do we earn cash back that we can spend on more travel, but the card offers fantastic travel perks like travel insurance, trip delay and cancellation coverage, lost baggage reimbursement, and rental car coverage, which helps protect us on our travels. </span><a data-dcnode-id="883" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/best-credit-card-for-international-travel/" rel="follow noopener"><span data-dcnode-id="884" instrument_node="">Learn more here.</span></a></li><li data-dcnode-id="872"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node=""> Vaccines &amp; Meds: </span></strong><span data-dcnode-id="879" instrument_node="">We use the travel guides on the</span><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node=""> </span></strong><a aria-label="CDC website (opens in a new tab)" data-dcnode-id="874" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wwwnc.cdc.gov/travel/destinations/list/" rel="noopener external" target="_blank"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">CDC website</span></strong></a><span data-dcnode-id="873" instrument_node=""> to research recommended medications and vaccines for international trips. We always recommend getting every vaccine recommended by the CDC! You can get them at your primary care doctor's office or a walk-in pharmacy.</span></li><li data-dcnode-id="860"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Tours:</span></strong><span data-dcnode-id="869" instrument_node=""> We love booking guided tours, especially food tours and walking tours, to get a local's perspective and a history lesson while sight-seeing! We book our tours using </span><a aria-label="Viator (opens in a new tab)" data-dcnode-id="866" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.viator.com/%3Fpid%3DP00038815%26mcid%3D42383%26medium%3Dlink%26campaign%3DResources" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Viator</span></strong></a><span data-dcnode-id="865" instrument_node=""> and </span><a aria-label="GetYourGuide (opens in a new tab)" data-dcnode-id="862" data-gyg-scraped="1650807672747" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getyourguide.com/%3Fpartner_id%3D6LSTX00%26utm_medium%3Donline_publisher%26utm_source%3Dpractical_wanderlust%26placement%3Dcontent-end%26deeplink_id%3D12ce2fcb-45af-574c-95ac-5feede7afc57" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">GetYourGuide</span></strong></a><span data-dcnode-id="861" instrument_node="">.</span></li><li data-dcnode-id="844"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Transportation</span></strong><span data-dcnode-id="857" instrument_node="">: We use </span><a data-dcnode-id="854" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rome2rio.com/" rel="noopener external" target="_blank"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Rome2Rio</span></strong></a><span data-dcnode-id="853" instrument_node=""> to figure out how to get from place to place, and book local transportation online using </span><a data-dcnode-id="850" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/bookaway/" rel="noopener follow" target="_blank"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Bookaway</span></strong></a><span data-dcnode-id="849" instrument_node=""> wherever we can. When we book a rental car, we use </span><a data-dcnode-id="846" data-wpel-link="exclude" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8242832/type/dlg/sid/ResourceBox/https%3A//www.kayak.com/cars" rel="noopener nofollow" target="_blank"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Kayak</span></strong></a><span data-dcnode-id="845" instrument_node=""> to compare rental companies and find the best deal.</span></li><li data-dcnode-id="836"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Luggage Storage:</span></strong><span data-dcnode-id="841" instrument_node=""> Whenever we're checking out early or taking advantage of a long layover, we use </span><strong data-dcnode-id="838"><a data-dcnode-id="839" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/luggagehero/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="840" instrument_node="">LuggageHero</span></a></strong><span data-dcnode-id="837" instrument_node=""> to safely store our luggage while we're running around. Use the code PRACTICALW for 2 hours of free luggage storage on us.</span></li><li data-dcnode-id="829"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">VPN Service:</span></strong><span data-dcnode-id="833" instrument_node=""> A VPN keeps your digital information (like website login details, bank info, etc) safe, even when you're connected to an unsecured network while traveling. Plus, it lets you use Netflix &amp; other streaming sites abroad! We use </span><a data-dcnode-id="831" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/recommends/nordvpn/" rel="follow noopener"><span data-dcnode-id="832" instrument_node="">NordVPN</span></a><span data-dcnode-id="830" instrument_node="">. Use the code WANDERLUSTPROMO when you sign up!</span></li><li data-dcnode-id="813"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">What to Pack:</span></strong><span data-dcnode-id="826" instrument_node=""> </span><a data-dcnode-id="824" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/ultimate-packing-list-must-have-travel-items/" rel="follow noopener"><span data-dcnode-id="825" instrument_node="">Here are the travel essentials</span></a><span data-dcnode-id="823" instrument_node=""> that we bring on every trip. We also have packing lists for </span><a data-dcnode-id="821" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/backpacking-travel-essentials-hot-climates/" rel="follow noopener"><span data-dcnode-id="822" instrument_node="">hot weather</span></a><span data-dcnode-id="820" instrument_node="">, </span><a data-dcnode-id="818" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/cold-weather-travel-winter-packing-list/" rel="follow noopener"><span data-dcnode-id="819" instrument_node="">cold weather</span></a><span data-dcnode-id="817" instrument_node="">, and many more. Take a look at </span><a data-dcnode-id="815" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/packing-lists" rel="follow noopener"><span data-dcnode-id="816" instrument_node="">all of our packing guides</span></a><span data-dcnode-id="814" instrument_node="">!</span></li></ul></div></div></div><footer class="entry-footer" data-dcnode-id="783"><p class="entry-meta" data-dcnode-id="784"><span class="entry-tags" data-dcnode-id="785"><a data-dcnode-id="807" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/bali/" rel="tag follow noopener"><span data-dcnode-id="808" instrument_node="">Bali</span></a><span data-dcnode-id="806" instrument_node=""> </span><a data-dcnode-id="804" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/beaches/" rel="tag follow noopener"><span data-dcnode-id="805" instrument_node="">Beaches</span></a><span data-dcnode-id="803" instrument_node=""> </span><a data-dcnode-id="801" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/budget-travel/" rel="tag follow noopener"><span data-dcnode-id="802" instrument_node="">Budget Travel</span></a><span data-dcnode-id="800" instrument_node=""> </span><a data-dcnode-id="798" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/indonesia/" rel="tag follow noopener"><span data-dcnode-id="799" instrument_node="">Indonesia</span></a><span data-dcnode-id="797" instrument_node=""> </span><a data-dcnode-id="795" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/islands/" rel="tag follow noopener"><span data-dcnode-id="796" instrument_node="">Islands</span></a><span data-dcnode-id="794" instrument_node=""> </span><a data-dcnode-id="792" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/jungle/" rel="tag follow noopener"><span data-dcnode-id="793" instrument_node="">Jungle</span></a><span data-dcnode-id="791" instrument_node=""> </span><a data-dcnode-id="789" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/sponsored-post/" rel="tag follow noopener"><span data-dcnode-id="790" instrument_node="">Sponsored Post</span></a><span data-dcnode-id="788" instrument_node=""> </span><a data-dcnode-id="786" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practicalwanderlust.com/tag/warm-destinations/" rel="tag follow noopener"><span data-dcnode-id="787" instrument_node="">Warm Destinations</span></a></span></p></footer></article><h2 class="screen-reader-text" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Reader Interactions</span></h2><div class="entry-comments" data-dcnode-id="415" id="comments"><h3 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Comments</span></h3><ol class="comment-list" data-dcnode-id="416"><li class="comment even thread-even depth-1" data-dcnode-id="737" id="comment-62598"><article data-dcnode-id="759" id="article-comment-62598"><header class="comment-header" data-dcnode-id="766"><p class="comment-author" data-dcnode-id="771"><span data-dcnode-id= 616" instrument_node="">Warungs are definitely the place to eat.. cheap, authentic and delicious! But, it’s super hard to avoid a mean Bali brunch and smoothie bowl. We loved renting a scooter to get around in Bali as well – we actually went full loco and squeezed our family of 4 onto the one ride. Can confirm – it works. I think Uber left SEA last year and it’s been taken over by Grab. GoJek is also a great way of getting around and ordering food to your hotel. I actually forgot to return the registration to our scooter rental place when we left Sanur for Seminyak and I ordered a Grab Courier to deliver it across to the other side of the island lol. Amazing!</span></p></div><div class="comment-reply" data-dcnode-id="611"><a aria-label="Reply to Tina" class="comment-reply-link" data-belowelement="article-comment-17758" data-commentid="17758" data-dcnode-id="612" data-postid="6136" data-replyto="Reply to Tina" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/729656/3436285-bali-indonesia-or-don-t-trust-the-monkeys%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/729656/3436285-bali-indonesia-or-don-t-trust-the-monkeys.js%3Fcontainer_id%3Dbuzzsprout-player-2254595%26player%3Dsmall%23comment-17758" rel="nofollow"><span data-dcnode-id="613" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-even depth-1" data-dcnode-id="588" id="comment-17757"><article data-dcnode-id="589" id="article-comment-17757"><header class="comment-header" data-dcnode-id="596"><p class="comment-author" data-dcnode-id="601"><span data-dcnode-id="608" instrument_node=""> </span><span class="comment-author-name" data-dcnode-id="605"><a class="comment-author-link" data-dcnode-id="606" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twowanderingsoles.com/" rel="external nofollow noopener" target
