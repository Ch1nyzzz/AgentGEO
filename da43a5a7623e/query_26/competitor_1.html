</span><div class="post-content entry-content cf" data-dcnode-id="4264"><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Is stress wearing you down? Living in a highly-urbanised neighbourhood like Metro Manila can actually be very demanding. We all know that stress can cause us to be counter-productive in every way. So, why allow this kind of feeling to take its toll on us if we could just shake it in a day or two?</span></p><span data-dcnode-id="4832" instrument_node="">
</span><p data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">The good news is that Metro Manila is surrounded by stunning budget-friendly weekend getaways that will surely wash all your worries away. This list is a compilation of places where you can unwind, relax, and fine-tune yourself like a well-oiled machine again.</span></p><div class="code-block code-block-1 ai-viewport-1 ai-viewport-2" data-dcnode-id="4823" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="4829" instrument_node="">
</span><div data-dcnode-id="4824" id="div-gpt-ad-1615255659873-0" style="width: 728px; height: 90px;margin: 0 auto;"><span data-dcnode-id="4828" instrument_node="">
</span><span data-dcnode-id="4825" instrument_node="">
</span></div></div><span data-dcnode-id="4822" instrument_node="">
</span><p data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">They are ranked according to proximity from the metro! Read on.</span></p><span data-dcnode-id="4819" instrument_node="">
</span><h3 data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">1. Pinto Art Museum, Antipolo, Rizal</span></h3><span data-dcnode-id="4816" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4810" style="width: 800px"><img alt="Pinto Art Museum" data-dcnode-id="4815" height="529" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/0/f/97551_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4811"><span data-dcnode-id="4814" instrument_node="">Image credit: </span><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/lalaselosa/24791066522/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4813" instrument_node="">Gheila Selosa</span></a></figcaption></figure><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">The Pinto Art Museum is a fitting name for a place which will awaken your appreciation of art and nature. This place is perfect for those who love art, lounging, and more art!</span></p><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">The museum, set in the heart of a garden that separates you from the noisy city life, has a minimalist, Mediterranean-inspired architecture to it. Did you just say Instagram pictures? You can’t go wrong here, because every corner of this place is, well, Instagram-worthy! The museum is a photographer’s mecca. It has been a venue of a countless number of amateur and professional photo shoots since the day it opened in 2010.</span></p><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">The museum has a wide display of contemporary Filipino art, and entering its doors is like being transported into a different world.</span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4795"><em data-dcnode-id="4796"><strong data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4797" instrument_node=""> If you are from Cubao, you can ride either UV express van or jeepney to Antipolo in front of Farmers Market. There is also another terminal at Valero Street behind RCBC Plaza in Makati. Your nearest jump-off point to Pinto Museum is Ynares Center, but the easier route is from the Antipolo Church. Tell the driver to drop you off at either of these two places. From Antipolo Church, ride a trike to the Pinto Art Museum.</span></em></p><span data-dcnode-id="4794" instrument_node="">
</span><p data-dcnode-id="4783"><em data-dcnode-id="4790"><strong data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4791" instrument_node=""> ₱200 (regular); ₱180 (senior citizens, PWDs); ₱100 (children, students)</span></em><br data-dcnode-id="4789"><span data-dcnode-id="4788" instrument_node="">
</span><em data-dcnode-id="4784"><strong data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4785" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="4782" instrument_node="">
</span><p data-dcnode-id="4776"><span data-dcnode-id="4777" style="color: #ff6600;"><em data-dcnode-id="4778"><span data-dcnode-id="4781" instrument_node="">Also read:&nbsp;</span><a data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.ph/day-trip-antipolo-city-top-attractions-visit/711" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4780" instrument_node="">Day Trip to Antipolo City: Top Attractions to Visit</span></a></em></span></p><span data-dcnode-id="4775" instrument_node="">
</span><h3 data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">2. Angono Petroglyphs, Angono, Rizal</span></h3><span data-dcnode-id="4772" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4766" style="width: 800px"><img alt="Angono Petroglyphs" data-dcnode-id="4771" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/0/97552_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4767"><span data-dcnode-id="4770" instrument_node="">Image credit: </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAngono_Petroglyphs.jpg" rel="mfp" target="_blank"><span data-dcnode-id="4769" instrument_node="">Raffy-ish</span></a></figcaption></figure><span data-dcnode-id="4765" instrument_node="">
</span><p data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">Standing in front of petroglyphs or primitive rock carvings is not an everyday experience for everybody mainly because there is only a handful of these in the world. Fortunately, we have one here in Angono, Rizal. The Angono Petroglyphs that date back to the late Neolithic period can be found inside a cave discovered by National Artist Carlos “Botong” Francisco in 1965. Having such a rare archaeological gem is a priceless possession the world over, much more if it is just within reach! This rare archaeological treasure must be on your next budget-friendly weekend getaway list!</span></p><span data-dcnode-id="4762" instrument_node="">
</span><p data-dcnode-id="4757"><em data-dcnode-id="4758"><strong data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4759" instrument_node=""> There are two major terminals in Metro Manila where you can ride Public Utility Vehicles (PUVs) going to Angono, Rizal: across Cubao Farmers Market, and across Shang-ri La Plaza or EDSA Crossing at Shaw, Mandaluyong. From there, ride the Angono-bound jeepney at Angono town proper and hire a trike that would take you directly to the Petroglyphs, better known as “cave” to the locals.</span></em></p><span data-dcnode-id="4756" instrument_node="">
</span><p data-dcnode-id="4745"><em data-dcnode-id="4752"><strong data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4753" instrument_node=""> ₱20 (adults); ₱10 (students)</span></em><br data-dcnode-id="4751"><span data-dcnode-id="4750" instrument_node="">
</span><em data-dcnode-id="4746"><strong data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4747" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><div class="code-block code-block-4" data-dcnode-id="4738" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="4744" instrument_node="">
</span><div data-dcnode-id="4739" id="div-gpt-ad-1615258778588-0" style="width: 300px; height: 250px; margin: 0 auto"><span data-dcnode-id="4743" instrument_node="">
</span><span data-dcnode-id="4740" instrument_node="">
</span></div></div><span data-dcnode-id="4737" instrument_node="">
</span><h3 data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">3. Mystical Cave, Antipolo, Rizal</span></h3><span data-dcnode-id="4734" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4728" style="width: 700px"><img alt="Mystical Cave" data-dcnode-id="4733" height="467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/3/8/46648_700x.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="4729"><span data-dcnode-id="4732" instrument_node="">Image credit: </span><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travelswithpauandraya.wordpress.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4731" instrument_node="">The Wandering Roomies</span></a></figcaption></figure><span data-dcnode-id="4727" instrument_node="">
</span><p data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">As the name suggests, this cave in Puting Bato, Antipolo, is brimming with “mystical” stalactites and stalagmites adorning its insides. This place is deemed special by Catholic devotees because of its many natural rock formations that look like religious figures. Inside, you can see a section having a rock ceiling that resembles a typical cathedral. Because of this, the locals named it as such.</span></p><span data-dcnode-id="4724" instrument_node="">
</span><p data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">The cave, according to estimate, is eight storeys deep, but only the top-most part is allowed for the general public. The deeper sections are reserved only for advanced cavers and mountaineers.</span></p><span data-dcnode-id="4721" instrument_node="">
</span><p data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">The legend and overall beauty of the cave are mesmerising, enough to captivate the eyes of many filmmakers. More than five local teleseryes (TV series) have already been filmed here to date, including Encantadia, Dyesebel, and Marina. Come, meditate, and be renewed by the mystical aura of this place.</span></p><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4713"><em data-dcnode-id="4714"><strong data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4715" instrument_node=""> If you are from Cubao, you can ride either UV express van or jeepney to Antipolo in front of Farmers Market. There is also another terminal at Valero Street behind RCBC Plaza in Makati. If you are from Mandaluyong, get to the terminal across Shang-ri La Plaza and look for UV express van or jeepney bound for Antipolo. Get off at Antipolo Church. From there, ride another jeepney at the back of 7-Eleven bound for Antipolo Hills subdivision and get off at the terminal. Then you ride a trike going to Mystical cave.</span></em></p><span data-dcnode-id="4712" instrument_node="">
</span><p data-dcnode-id="4701"><em data-dcnode-id="4708"><strong data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4709" instrument_node=""> ₱40 per head inclusive of guide</span></em><br data-dcnode-id="4707"><span data-dcnode-id="4706" instrument_node="">
</span><em data-dcnode-id="4702"><strong data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4703" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="4700" instrument_node="">
</span><h3 data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">4. Daranak Falls, Tanay, Rizal</span></h3><span data-dcnode-id="4697" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4691" style="width: 800px"><img alt="weekend getaways near manila" data-dcnode-id="4696" height="534" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/1/97553_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4692"><span data-dcnode-id="4695" instrument_node="">Image credit: </span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/13763480%40N03/1424165432/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4694" instrument_node="">Richard</span></a></figcaption></figure><span data-dcnode-id="4690" instrument_node="">
</span><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Serenely nestled at the foot of Tanay mountains, this humble gift of nature is starting to catch the attention of local and foreign thrill seekers and movie producers alike. Its surrounding tropical vegetation is still unspoiled. No wonder it is considered as one of Tanay, Rizal’s finest tourist destinations.</span></p><span data-dcnode-id="4687" instrument_node="">
</span><p data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">Despite its growing popularity, Daranak Falls is still very clean as conservation efforts to preserve this amazing place is an ongoing task. Come and splash on its bright turquoise waters and wash all your worries away.</span></p><span data-dcnode-id="4684" instrument_node="">
</span><p data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">All around the falls’ vicinity are native picnic sheds and tables that you could rent and lounge for a day. If you want to bring fresh meat and fish for cooking on site, the place has a grilling area, too. If you don’t want to worry about cooking, however, a small canteen at the trail’s entrance leading to the falls can cook them for you.</span></p><span data-dcnode-id="4681" instrument_node="">
</span><p data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">Oh, did I mention that you can also indulge in a unique stress-relieving activity while in the area? Yes, you can try your hands at balancing rocks along the banks of the river feeding the falls.</span></p><span data-dcnode-id="4678" instrument_node="">
</span><p data-dcnode-id="4673"><em data-dcnode-id="4674"><strong data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4675" instrument_node=""> There are many junctions (terminals) going to Tanay, Rizal. You can find these Tanay-bound terminals at these locations: in front of Starmall EDSA, near Mandaluyong Police Station and Unilever Philippines, and near LRT Santolan Station. From these terminals, ride a jeepney and get off at Tanay Market Transport Terminal. Proceed to PATODA Riders terminal also known as Daranak Falls Tricycle Terminal.</span></em></p><span data-dcnode-id="4672" instrument_node="">
</span><p data-dcnode-id="4661"><em data-dcnode-id="4668"><strong data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4669" instrument_node=""> ₱50 (adults); free for children below 3ft</span></em><br data-dcnode-id="4667"><span data-dcnode-id="4666" instrument_node="">
</span><em data-dcnode-id="4662"><strong data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4663" instrument_node=""> ₱800 – ₱1,000 per person</span></em></p><span data-dcnode-id="4660" instrument_node="">
</span><h3 data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">5. Corregidor Island, Cavite</span></h3><span data-dcnode-id="4657" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4651" style="width: 800px"><img alt="Corregidor Island" data-dcnode-id="4656" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/2/97554_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4652"><span data-dcnode-id="4655" instrument_node="">Image credit: </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/spyderdos/4325543427/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4654" instrument_node="">spyderdos</span></a></figcaption></figure><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">Do you know that Corregidor is a tadpole-shaped rocky island at the entrance of Manila Bay? And how can a tadpole-shaped rocky fortress of an island become a stunning weekend getaway? Well, think about World War II and the island’s historically strategic location and you will know what I mean. The now silent war implements, stoic reminders of the island’s past still stand on the island today. Isn’t that inspiring enough to be in front of these war memorabilia that were once used to gain the freedom that we now enjoy?</span></p><span data-dcnode-id="4647" instrument_node="">
</span><p data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">The island can only be reached via a guided tour trip which makes the island ideal for unwinding. There are many awe-inspiring attractions in the island like the Mile-Long Barracks, the Spanish Lighthouse, and the Eternal Flame of Freedom, where you can make reflections and unwind. The relaxed, if not poignant ambience will surely ease all your troubles away.</span></p><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4639"><em data-dcnode-id="4640"><strong data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4641" instrument_node=""> The safest and most convenient way to Corregidor Island is via a guided tour by Sun Cruises International, which is operated by Magsaysay Shipping. Kindly visit their website for more information about bookings.</span></em></p><span data-dcnode-id="4638" instrument_node="">
</span><p data-dcnode-id="4633"><em data-dcnode-id="4634"><strong data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4635" instrument_node=""> ₱2,550 (weekdays); ₱2,749 (weekends) inclusive of roundtrip ferry transfers, entrance fee, guided island tour onboard a tram, &amp; buffet lunch</span></em></p><span data-dcnode-id="4632" instrument_node="">
</span><h3 data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">6. Sky Ranch Pampanga, San Fernando, Pampanga</span></h3><span data-dcnode-id="4629" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4623" style="width: 800px"><img alt="Sky Ranch Pampanga" data-dcnode-id="4628" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/3/97555_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4624"><span data-dcnode-id="4627" instrument_node="">Image credit: </span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/milst1/16278663055/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4626" instrument_node="">Martin Lewison</span></a></figcaption></figure><span data-dcnode-id="4622" instrument_node="">
</span><p data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Do you love theme parks but bored of the usual theme park rides? Then you should visit Sky Ranch Pampanga. It is a family-friendly amusement centre with 22 different rides. Among its exciting and fun rides, “The Eye” is the grandest. Standing more than 200 feet, this giant Ferris wheel is currently the biggest…no, the tallest…in the country, and it offers the grandest view of the legendary Mount Arayat not far from your air-conditioned gondola. The Eye also offers a breathtaking view of the setting sun.</span></p><span data-dcnode-id="4619" instrument_node="">
</span><p data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">If you are looking for a weekend stress reliever and an adrenaline-pumping adventure at the same time, Sky Ranch, Pampanga is open every day for a day of fun and bonding with family members and friends.</span></p><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4611"><em data-dcnode-id="4612"><strong data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4613" instrument_node=""> From Manila, Sky Ranch Pampanga is conveniently accessible from Caloocan, Cubao, Pasay, Manila, and Kamias terminals. Drop off point is in SM City Pampanga. From the mall, just take the Annex 1 exit and you’re there.</span></em></p><span data-dcnode-id="4610" instrument_node="">
</span><p data-dcnode-id="4599"><em data-dcnode-id="4606"><strong data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4607" instrument_node=""> ₱80 (weekdays); ₱100 (weekends); free for children below 3ft</span></em><br data-dcnode-id="4605"><span data-dcnode-id="4604" instrument_node="">
</span><em data-dcnode-id="4600"><strong data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4601" instrument_node=""> ₱700 – ₱800 per person (excluding food)</span></em></p><span data-dcnode-id="4598" instrument_node="">
</span><h3 data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">7. Villa Escudero Plantations and Resort, Tiaong, Quezon</span></h3><span data-dcnode-id="4595" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4589" style="width: 800px"><img alt="Villa Escudero Plantations and Resort" data-dcnode-id="4594" height="551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/c/e/97486_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4590"><span data-dcnode-id="4593" instrument_node="">Image credit: </span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//villaescudero.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4592" instrument_node="">Villa Escudero Plantations and Resort</span></a></figcaption></figure><span data-dcnode-id="4588" instrument_node="">
</span><p data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">If you are looking for a relaxation with a cultural twist, visit Villa Escudero Plantations and Resort. Tour the whole property in a day, learn Filipino cultures of the past, ride bamboo rafts, and dine with a twist! Waterfalls Restaurant, which is the heart of the whole villa, let’s you experience a one-of-a-kind dining – eating on native bamboo tables barefoot at the foot of a roaring man-made waterfall. Why barefoot? Because your feet are actually submerged in a shallow flowing water on the restaurant’s floor courtesy of Labasin Falls. Now that’s dining with a real twist!</span></p><span data-dcnode-id="4585" instrument_node="">
</span><p data-dcnode-id="4579"><span data-dcnode-id="4580" style="color: #ff6600;"><em data-dcnode-id="4581"><span data-dcnode-id="4584" instrument_node="">Also read:&nbsp;</span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stays.tripzilla.com/stories/unique-resorts-philippines/67252" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4583" instrument_node="">8 Resorts in the Philippines that Transport You Into a Totally Different World</span></a></em></span></p><span data-dcnode-id="4578" instrument_node="">
</span><p data-dcnode-id="4573"><em data-dcnode-id="4574"><strong data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4575" instrument_node=""> Take a bus from either Kamias terminal in Quezon City, Alimall (Araneta Center) terminal in Cubao, or Buendia terminal in Pasay going to Lucena, Quezon. Tell the driver or bus conductor that you are going to Villa Escudero so that they can drop you off at the Quezon Arch. The gate to Villa Escudero is right after the arch to the left.</span></em></p><span data-dcnode-id="4572" instrument_node="">
</span><p data-dcnode-id="4561"><em data-dcnode-id="4568"><strong data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4569" instrument_node=""> ₱950 (low season: Sept – Nov); ₱1,450 (peak season: Dec – Aug)</span></em><br data-dcnode-id="4567"><span data-dcnode-id="4566" instrument_node="">
</span><em data-dcnode-id="4562"><strong data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4563" instrument_node=""> ₱2,000 – ₱3,000 per person</span></em></p><span data-dcnode-id="4560" instrument_node="">
</span><h3 data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">8. Taal Volcano, Talisay, Batangas</span></h3><span data-dcnode-id="4557" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4551" style="width: 800px"><img alt="Taal Volcano" data-dcnode-id="4556" height="532" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/5/97557_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4552"><span data-dcnode-id="4555" instrument_node="">Image credit: </span><a data-dcnode-id="4553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/sherpas428/5755870395/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4554" instrument_node="">Sherpas 428</span></a></figcaption></figure><span data-dcnode-id="4550" instrument_node="">
</span><p data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">The grandeur of Taal Volcano never fails to amaze anyone. It is no wonder why many weary souls go here to unwind. Taal Lake or the crater lake fills the caldera that formed during its most violent eruptions between 500,000 and 100,000 years ago. Now, still considered as one of the most active volcanoes in the Pacific Ring of Fire, Taal Volcano is visited by thousands of visitors each year just to marvel at its splendour. Aside from trekking, the usual activities that you can enjoy in and around the crater lake are boat riding, horseback riding, camping, and of course, sight-seeing. Being surrounded by one of the most magnificent natural wonders of the world will surely relieve you from all the accumulated stress you get from everyday life.</span></p><span data-dcnode-id="4547" instrument_node="">
</span><p data-dcnode-id="4539"><em data-dcnode-id="4543"><strong data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4544" instrument_node=""> Ride a Batangas City via Tanauan-bound bus at Taft Avenue, Pasay City terminal and get off at Tanauan Public Market. Then ride a Talisay-bound jeepney. From there, proceed to the boat station and hire a motorized </span></em><span data-dcnode-id="4542" instrument_node="">banca</span><em data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node=""> to take you to Taal Volcano Island itself.</span></em></p><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4533"><em data-dcnode-id="4534"><strong data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4535" instrument_node=""> ₱2,000 – ₱3,000 per person</span></em></p><span data-dcnode-id="4532" instrument_node="">
</span><h3 data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">9. Lucban Church, Lucban, Quezon</span></h3><span data-dcnode-id="4529" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4523" style="width: 800px"><img alt="Lucban Church," data-dcnode-id="4528" height="640" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/6/97558_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4524"><span data-dcnode-id="4527" instrument_node="">Image credit: </span><a data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AChurch_of_Saint_Louis%2C_Bishop_of_Toulouse%2C_Lucban%2C_Quezon.jpg" rel="mfp" target="_blank"><span data-dcnode-id="4526" instrument_node="">Rodrigo C. Belleza Jr.</span></a></figcaption></figure><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">For many, visiting historical and religious places is a way to relax. And if you are one of them, Lucban Church, in Lucban, Quezon, is definitely a must-visit.</span></p><span data-dcnode-id="4519" instrument_node="">
</span><p data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">For history buffs, the church, which was originally built in 1595, has seen a lot of historical events that transpired during its lifetime. So, away from being a place of worship and meditation, Lucban Church is also a place where you can learn a lot of knowledge with great historical values, not to mention its significance as a starting point for the San Isidro Pahiyas Festival, an important celebration for those in the Catholic faith.</span></p><span data-dcnode-id="4516" instrument_node="">
</span><p data-dcnode-id="4511"><em data-dcnode-id="4512"><strong data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4513" instrument_node=""> From Metro Manila, board a Lucena-bound bus at EDSA-Kamuning. Alight at Lucena Grand Terminal. From there, proceed to Lucban by riding either a jeepney, van, or minibus.</span></em></p><span data-dcnode-id="4510" instrument_node="">
</span><p data-dcnode-id="4505"><em data-dcnode-id="4506"><strong data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4507" instrument_node=""> ₱700 – ₱800 per person (excluding food)</span></em></p><span data-dcnode-id="4504" instrument_node="">
</span><h3 data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">10. Museo sa Ilalim ng Lupa ng Nagcarlan</span></h3><span data-dcnode-id="4501" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4495" style="width: 800px"><img alt="Museo sa Ilalim ng Lupa ng Nagcarlan" data-dcnode-id="4500" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/7/97559_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4496"><span data-dcnode-id="4499" instrument_node="">Image credit: </span><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AUNDERGROUND_CEMETERY%2C%2C%2CLAGUNA.jpg" rel="mfp" target="_blank"><span data-dcnode-id="4498" instrument_node="">Obra19</span></a></figcaption></figure><span data-dcnode-id="4494" instrument_node="">
</span><p data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">The word “cemetery” denotes a spine-tingling feeling for most people. That is why the Museo sa Ilalim ng Lupa ng Nagcarlan or the Nagcarlan Underground Cemetery is in this list, not to sow fear or grief but awe. Yes, this underground cemetery-turned museum is a very restful place not to mention its grandeur.</span></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">This octagonal stone-and-brick structure, with its intricate ornamental traceries and magnificently made wrought iron grills is a sight to behold. Together with the wall frescoes, the patterned azulejos floor tiles, and its ideal location, this cemetery cum museum exudes peace and serenity, not just for the souls buried under its crypts but also for the living who visit here to find peace themselves.</span></p><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4483"><em data-dcnode-id="4484"><strong data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4485" instrument_node=""> From Cubao terminal, take a Sta. Cruz-bound bus and get off at Sta. Cruz Public Market. Proceed to ride a Nagcarlan-bound jeepney from there. Tell your driver to drop you off at Nagcarlan Underground Cemetery, which is in front of the gasoline station along the national highway.</span></em></p><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4471"><em data-dcnode-id="4478"><strong data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4479" instrument_node=""> No entrance fee but donations are accepted</span></em><br data-dcnode-id="4477"><span data-dcnode-id="4476" instrument_node="">
</span><em data-dcnode-id="4472"><strong data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4473" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="4470" instrument_node="">
</span><h3 data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">11. Mount Maculot, Cuenca, Batangas</span></h3><span data-dcnode-id="4467" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4461" style="width: 700px"><img alt="Mount Maculot" data-dcnode-id="4466" height="525" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/3/0/56624_700x.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="4462"><span data-dcnode-id="4465" instrument_node="">Image credit: </span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ideacrib.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4464" instrument_node="">Patricia Mirasol</span></a></figcaption></figure><span data-dcnode-id="4460" instrument_node="">
</span><p data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">If you are a climbing junkie, Mount Maculot, which is located in Cuenca, Batangas, is the perfect weekend getaway for you! The mountain is famous for three things: the Rockies, which offers an unprecedented view of Taal Lake and Taal volcano itself; the grotto; and the summit, a famous spot where you can take a lot of splendid photos worthy of boasting in your social media channels.</span></p><span data-dcnode-id="4457" instrument_node="">
</span><p data-dcnode-id="4452"><span data-dcnode-id="4456" instrument_node="">A lot of climbers like the novice-friendly trail up this majestic mountain, so mark this one on your bucket list. Check out this </span><a data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.ph/the-rockies-mount-maculot-batangas-day-trip/1198" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4455" instrument_node="">Mount Maculot day-trip itinerary</span></a><span data-dcnode-id="4453" instrument_node=""> for more information.</span></p><span data-dcnode-id="4451" instrument_node="">
</span><p data-dcnode-id="4446"><em data-dcnode-id="4447"><strong data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4448" instrument_node=""> Get on board a Lemery-bound bus from Buendia terminal and alight at Cuenca town proper in Batangas. Then you can either walk or ride a trike to the Rockies’ jump-off point, which also serves as the registration area.</span></em></p><span data-dcnode-id="4445" instrument_node="">
</span><p data-dcnode-id="4434"><em data-dcnode-id="4441"><strong data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">Registration fee:</span></strong><span data-dcnode-id="4442" instrument_node=""> ₱20 per person</span></em><br data-dcnode-id="4440"><span data-dcnode-id="4439" instrument_node="">
</span><em data-dcnode-id="4435"><strong data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4436" instrument_node=""> ₱500 – ₱800 per person</span></em></p><span data-dcnode-id="4433" instrument_node="">
</span><h3 data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">12. Puning Hot Springs, Porac, Pampanga</span></h3><span data-dcnode-id="4430" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4424" style="width: 800px"><img alt="Puning Hot Springs" data-dcnode-id="4429" height="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/8/97560_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4425"><span data-dcnode-id="4428" instrument_node="">Image credit: </span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pg/PuningHotSpringAndRestaurant/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4427" instrument_node="">Puning Hot Spring &amp; Restaurant</span></a></figcaption></figure><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">Puning Hot Spring is a fortress-like resort on a cliff at Sapang Bato, Porac, Pampanga. The once-verdant location, where the resort was snugly nestled, was laid waste by the destructive 1991 Mount Pinatubo eruption. On the lighter side, that eruption paved the way for not one but 11 hot springs of the resort.</span></p><span data-dcnode-id="4420" instrument_node="">
</span><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Aside from dipping in its steaming waters, you can also experience a one-of-a-kind spa treatments here: hot sand and mudpack!</span></p><span data-dcnode-id="4417" instrument_node="">
</span><p data-dcnode-id="4411"><span data-dcnode-id="4412" style="color: #ff6600;"><em data-dcnode-id="4413"><span data-dcnode-id="4416" instrument_node="">Also read:&nbsp;</span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.com/pampanga-weekend-outing-things-to-do35882/35882" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4415" instrument_node="">8 FUNtastic Things to Do in Pampanga for a Weekend Outing</span></a></em></span></p><span data-dcnode-id="4410" instrument_node="">
</span><p data-dcnode-id="4405"><em data-dcnode-id="4406"><strong data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4407" instrument_node=""> From Metro Manila, take a bus to Mabalacat bus terminal in Pampanga. Manila terminals are located in Caloocan, Cubao, Kamias, Pasay, and Manila. Next, ride either a jeepney or a trike to Clark’s main gate. Then take another jeepney ride going to Mini-Stop in Sutherland, Clark. From there, the resort’s 4×4 vehicles will pick you up and bring you to your destination.</span></em></p><span data-dcnode-id="4404" instrument_node="">
</span><p data-dcnode-id="4399"><em data-dcnode-id="4400"><strong data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4401" instrument_node=""> ₱3,000 – ₱3,500 per person inclusive of 4×4 ride, buffet meal &amp; entrance fees</span></em></p><span data-dcnode-id="4398" instrument_node="">
</span><h3 data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">13. Minalungao National Park, Nueva Ecija</span></h3><span data-dcnode-id="4395" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4389" style="width: 800px"><img alt="Minalungao National Park" data-dcnode-id="4394" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/9/97561_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4390"><span data-dcnode-id="4393" instrument_node="">Image credit: </span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMinalungao_National_Park.jpg" rel="mfp" target="_blank"><span data-dcnode-id="4392" instrument_node="">Drjoelgeorge</span></a></figcaption></figure><span data-dcnode-id="4388" instrument_node="">
</span><p data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Experience genuine relaxation and a breath of fresh air, literally at Nueva Ecija’s Minalungao National Park. The park is considered as one of the few untouched natural environments left in the Philippines. It boasts of a clean, green Peñaranda River where you can dive and swim all you want.</span></p><span data-dcnode-id="4385" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4379" style="width: 700px"><img alt="" data-dcnode-id="4384" height="466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/5/a/54106_700x.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="4380"><span data-dcnode-id="4383" instrument_node="">Image credit: </span><a data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMinalungao_nueva_ecija.jpg" rel="mfp" target="_blank"><span data-dcnode-id="4382" instrument_node="">JL 09</span></a></figcaption></figure><span data-dcnode-id="4378" instrument_node="">
</span><p data-dcnode-id="4373"><span data-dcnode-id="4377" instrument_node="">For those who want hardcore adventure, the towering rocky cliffs are perfect for climbing and cliff diving. Haven’t you tried bamboo rafting before? Well, you can try it here! If caving is your thing, you can also explore what’s inside the magnificent Minalungao Cave right at the foot of Minalungao Hill. Read this </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.ph/minalungao-national-park/1229" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4376" instrument_node="">Minalungao National Park guide</span></a><span data-dcnode-id="4374" instrument_node=""> for more details.</span></p><span data-dcnode-id="4372" instrument_node="">
</span><p data-dcnode-id="4364"><em data-dcnode-id="4368"><strong data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4369" instrument_node=""> From Cubao or Pasay in Metro Manila, ride a </span></em><span data-dcnode-id="4367" instrument_node="">Gapan</span><em data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">/Cabanatuan-bound bus. You then take a jeepney going to General Tinio. Proceed by riding a trike to Minalungao Park.</span></em></p><span data-dcnode-id="4363" instrument_node="">
</span><p data-dcnode-id="4352"><em data-dcnode-id="4359"><strong data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="4360" instrument_node=""> ₱40 per person</span></em><br data-dcnode-id="4358"><span data-dcnode-id="4357" instrument_node="">
</span><em data-dcnode-id="4353"><strong data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4354" instrument_node=""> ₱1,000 – ₱1,500 per person</span></em></p><span data-dcnode-id="4351" instrument_node="">
</span><h3 data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">14. Capones Island, San Antonio, Zambales</span></h3><span data-dcnode-id="4348" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4342" style="width: 800px"><img alt="Capones Island" data-dcnode-id="4347" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/a/97562_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4343"><span data-dcnode-id="4346" instrument_node="">Image credit: </span><a data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/fs_gimenez/15364009797/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4345" instrument_node="">Francis Gimenez</span></a></figcaption></figure><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Just four kilometres off Pundaquit, Zambales, is an island called Isla de Gran Capon or the Capones Island. The two-kilometre bone-shaped island is perfect for no other than self-reflection and total relaxation as it has no inhabitants to it, except for the birds that make the island their home. All around the island is pure rustic beauty perfect for any relaxing you have in mind.</span></p><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">Its shoreline is enveloped in pristine white sands on one side and rocky shores on the other. Underneath its turquoise water is a rich marine life irresistible to beach bummers, divers, and snorkellers.</span></p><span data-dcnode-id="4335" instrument_node="">
</span><p data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Aside from the Spanish lighthouse built in 1890 to warn ships of the rocky outcrops below the seemingly safe waters around the island, the only other structure in the island is an unfinished building. Ready your cameras for some Instagram-worthy shots!</span></p><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4331" instrument_node="">The view from the top of the hill, where the lighthouse is located, is nothing short of impressive. If you want to stay for the night, camping is allowed as long as you have your camping equipment with you. Of course, don’t forget to arrange a return trip from your boatman unless you deliberately want to stay there for good – which is definitely a no, no! While you’re there, you might want to explore the nearby Anawangin Cove in San Antonio. This group of friends visited both </span><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.ph/anawangin-capones-one-day-trip/46" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4330" instrument_node="">Anawangin and Capones on a day trip with only ₱1,256 all-in budget</span></a><span data-dcnode-id="4328" instrument_node="">.</span></p><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4318"><em data-dcnode-id="4322"><strong data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4323" instrument_node=""> From Sampaloc terminal in Manila, take a bus going to Iba, Zambales. Tell the cashier at the terminal that you are getting off at San Antonio to avoid being charged with the full fare to the bus’ destination. Also, tell the driver or the bus conductor to drop you off at San Antonio. From there, ride a trike to Barangay Pundaquit. Next, rent a boat (motorized </span></em><span data-dcnode-id="4321" instrument_node="">banca</span><em data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">) to Capones Island.</span></em></p><span data-dcnode-id="4317" instrument_node="">
</span><p data-dcnode-id="4312"><em data-dcnode-id="4313"><strong data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4314" instrument_node=""> ₱1,200 – ₱1,500 per person</span></em></p><span data-dcnode-id="4311" instrument_node="">
</span><h3 data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">15. Masinloc Eco-Tour, Masinloc, Zambales</span></h3><span data-dcnode-id="4308" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="4302" style="width: 800px"><img alt="Masinloc Eco-Tour" data-dcnode-id="4307" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tripzilla.com/thumb/1/b/97563_800x.jpg&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="4303"><span data-dcnode-id="4306" instrument_node="">Image credit: </span><a data-dcnode-id="4304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/donabelandewen/2176863357/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4305" instrument_node="">Ewen Roberts</span></a></figcaption></figure><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">Masinloc in Zambales is known for many things: Carabao mangoes aka Philippine mango, Binabayani Festival, natural wonders, but most of all, it is known for its Masinloc Eco-Tour Program which starts at San Salvador Island’s giant clam (taklobo) farm and Marine Protected Area. The tour’s next stop is the usual lunch-time place – Bacala House. The house is standing on the Bacala white sandbar in the middle of the clear, turquoise waters of the Masinloc Oyon Bay. The one-day run ends at the nine-hectare Yaha Mangrove Forest Adventure, a unique mangrove forest that stands in the middle of the bay as well.</span></p><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">Snorkelling and diving at the giant clam farm and the Marine Protected Area will give you the thrill of your life as exotic marine species abound in these areas. Aside from giving you the relief you oh so wanted, you will also feel proud of yourself because every tour participant is given the chance to help in the ecotourism project. You do it by leaving your conservation footprint through planting a mangrove seedling before leaving the place.</span></p><span data-dcnode-id="4295" instrument_node="">
</span><p data-dcnode-id="4290"><em data-dcnode-id="4291"><strong data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">How to get there:</span></strong><span data-dcnode-id="4292" instrument_node=""> From Cubao, take a bus going to Olongapo then ride a UV Express (van) bound for Sta. Cruz. Tell the driver to drop you off at Masinloc bayan. Next, jump onboard a passenger boat to San Salvador Island.</span></em></p><span data-dcnode-id="4289" instrument_node="">
</span><p data-dcnode-id="4284"><em data-dcnode-id="4285"><strong data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="4286" instrument_node=""> ₱2,500 per person (including food)</span></em></p><span data-dcnode-id="4283" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" style="color: #ff6600;"><em data-dcnode-id="4279"><span data-dcnode-id="4282" instrument_node="">Also read:&nbsp;</span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripzilla.ph/underrated-northern-luzon-destinations/1084" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4281" instrument_node="">Underrated Northern Luzon Destinations Worth the Road Trip</span></a></em></span></p><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">So, where are you heading to next this weekend? Have you decided which place to visit yet? Whether you want a grand adventure or just pure relaxation, these weekend getaways near Metro Manila will surely make your day!</span></p><span data-dcnode-id="4273" instrument_node="">
