</span><div class="post-content entry-content cf" data-dcnode-id="1550"><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Is stress wearing you down? Living in a highly-urbanised neighbourhood like Metro Manila can actually be very demanding. We all know that stress can cause us to be counter-productive in every way. So, why allow this kind of feeling to take its toll on us if we could just shake it in a day or two?</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">The good news is that Metro Manila is surrounded by stunning budget-friendly weekend getaways that will surely wash all your worries away. This list is a compilation of places where you can unwind, relax, and fine-tune yourself like a well-oiled machine again.</span></p><div class="code-block code-block-1 ai-viewport-1 ai-viewport-2" data-dcnode-id="2109" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2115" instrument_node="">
</span><div data-dcnode-id="2110" id="div-gpt-ad-1615255659873-0" style="width: 728px; height: 90px;margin: 0 auto;"><span data-dcnode-id="2114" instrument_node="">
</span><span data-dcnode-id="2111" instrument_node="">
</span></div></div><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">They are ranked according to proximity from the metro! Read on.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><h3 data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">1. Pinto Art Museum, Antipolo, Rizal</span></h3><span data-dcnode-id="2102" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2096" style="width: 800px"><img alt="Pinto Art Museum" data-dcnode-id="2101" height="529" src="https://static.tripzilla.com/thumb/0/f/97551_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="2097"><span data-dcnode-id="2100" instrument_node="">Image credit: </span><a data-dcnode-id="2098" href="https://www.flickr.com/photos/lalaselosa/24791066522/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2099" instrument_node="">Gheila Selosa</span></a></figcaption></figure><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">The Pinto Art Museum is a fitting name for a place which will awaken your appreciation of art and nature. This place is perfect for those who love art, lounging, and more art!</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">The museum, set in the heart of a garden that separates you from the noisy city life, has a minimalist, Mediterranean-inspired architecture to it. Did you just say Instagram pictures? You can’t go wrong here, because every corner of this place is, well, Instagram-worthy! The museum is a photographer’s mecca. It has been a venue of a countless number of amateur and professional photo shoots since the day it opened in 2010.</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The museum has a wide display of contemporary Filipino art, and entering its doors is like being transported into a different world.</span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2081"><em data-dcnode-id="2082"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">How to get there:</span></strong><span data-dcnode-id="2083" instrument_node=""> If you are from Cubao, you can ride either UV express van or jeepney to Antipolo in front of Farmers Market. There is also another terminal at Valero Street behind RCBC Plaza in Makati. Your nearest jump-off point to Pinto Museum is Ynares Center, but the easier route is from the Antipolo Church. Tell the driver to drop you off at either of these two places. From Antipolo Church, ride a trike to the Pinto Art Museum.</span></em></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2069"><em data-dcnode-id="2076"><strong data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="2077" instrument_node=""> ₱200 (regular); ₱180 (senior citizens, PWDs); ₱100 (children, students)</span></em><br data-dcnode-id="2075"/><span data-dcnode-id="2074" instrument_node="">
</span><em data-dcnode-id="2070"><strong data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="2071" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" style="color: #ff6600;"><em data-dcnode-id="2064"><span data-dcnode-id="2067" instrument_node="">Also read: </span><a data-dcnode-id="2065" href="https://www.tripzilla.ph/day-trip-antipolo-city-top-attractions-visit/711" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2066" instrument_node="">Day Trip to Antipolo City: Top Attractions to Visit</span></a></em></span></p><span data-dcnode-id="2061" instrument_node="">
</span><h3 data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">2. Angono Petroglyphs, Angono, Rizal</span></h3><span data-dcnode-id="2058" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2052" style="width: 800px"><img alt="Angono Petroglyphs" data-dcnode-id="2057" height="533" src="https://static.tripzilla.com/thumb/1/0/97552_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="2053"><span data-dcnode-id="2056" instrument_node="">Image credit: </span><a data-dcnode-id="2054" href="https://en.wikipedia.org/wiki/File:Angono_Petroglyphs.jpg" rel="mfp" target="_blank"><span data-dcnode-id="2055" instrument_node="">Raffy-ish</span></a></figcaption></figure><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Standing in front of petroglyphs or primitive rock carvings is not an everyday experience for everybody mainly because there is only a handful of these in the world. Fortunately, we have one here in Angono, Rizal. The Angono Petroglyphs that date back to the late Neolithic period can be found inside a cave discovered by National Artist Carlos “Botong” Francisco in 1965. Having such a rare archaeological gem is a priceless possession the world over, much more if it is just within reach! This rare archaeological treasure must be on your next budget-friendly weekend getaway list!</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2043"><em data-dcnode-id="2044"><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">How to get there:</span></strong><span data-dcnode-id="2045" instrument_node=""> There are two major terminals in Metro Manila where you can ride Public Utility Vehicles (PUVs) going to Angono, Rizal: across Cubao Farmers Market, and across Shang-ri La Plaza or EDSA Crossing at Shaw, Mandaluyong. From there, ride the Angono-bound jeepney at Angono town proper and hire a trike that would take you directly to the Petroglyphs, better known as “cave” to the locals.</span></em></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2031"><em data-dcnode-id="2038"><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="2039" instrument_node=""> ₱20 (adults); ₱10 (students)</span></em><br data-dcnode-id="2037"/><span data-dcnode-id="2036" instrument_node="">
</span><em data-dcnode-id="2032"><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="2033" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><div class="code-block code-block-4" data-dcnode-id="2024" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2030" instrument_node="">
</span><div data-dcnode-id="2025" id="div-gpt-ad-1615258778588-0" style="width: 300px; height: 250px; margin: 0 auto"><span data-dcnode-id="2029" instrument_node="">
</span><span data-dcnode-id="2026" instrument_node="">
</span></div></div><span data-dcnode-id="2023" instrument_node="">
</span><h3 data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">3. Mystical Cave, Antipolo, Rizal</span></h3><span data-dcnode-id="2020" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="2014" style="width: 700px"><img alt="Mystical Cave" data-dcnode-id="2019" height="467" src="https://static.tripzilla.com/thumb/3/8/46648_700x.jpg" width="700"/><figcaption class="wp-caption-text" data-dcnode-id="2015"><span data-dcnode-id="2018" instrument_node="">Image credit: </span><a data-dcnode-id="2016" href="https://travelswithpauandraya.wordpress.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2017" instrument_node="">The Wandering Roomies</span></a></figcaption></figure><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">As the name suggests, this cave in Puting Bato, Antipolo, is brimming with “mystical” stalactites and stalagmites adorning its insides. This place is deemed special by Catholic devotees because of its many natural rock formations that look like religious figures. Inside, you can see a section having a rock ceiling that resembles a typical cathedral. Because of this, the locals named it as such.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">The cave, according to estimate, is eight storeys deep, but only the top-most part is allowed for the general public. The deeper sections are reserved only for advanced cavers and mountaineers.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">The legend and overall beauty of the cave are mesmerising, enough to captivate the eyes of many filmmakers. More than five local teleseryes (TV series) have already been filmed here to date, including Encantadia, Dyesebel, and Marina. Come, meditate, and be renewed by the mystical aura of this place.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1999"><em data-dcnode-id="2000"><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">How to get there:</span></strong><span data-dcnode-id="2001" instrument_node=""> If you are from Cubao, you can ride either UV express van or jeepney to Antipolo in front of Farmers Market. There is also another terminal at Valero Street behind RCBC Plaza in Makati. If you are from Mandaluyong, get to the terminal across Shang-ri La Plaza and look for UV express van or jeepney bound for Antipolo. Get off at Antipolo Church. From there, ride another jeepney at the back of 7-Eleven bound for Antipolo Hills subdivision and get off at the terminal. Then you ride a trike going to Mystical cave.</span></em></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1987"><em data-dcnode-id="1994"><strong data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1995" instrument_node=""> ₱40 per head inclusive of guide</span></em><br data-dcnode-id="1993"/><span data-dcnode-id="1992" instrument_node="">
</span><em data-dcnode-id="1988"><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1989" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="1986" instrument_node="">
</span><h3 data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">4. Daranak Falls, Tanay, Rizal</span></h3><span data-dcnode-id="1983" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1977" style="width: 800px"><img alt="weekend getaways near manila" data-dcnode-id="1982" height="534" src="https://static.tripzilla.com/thumb/1/1/97553_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1978"><span data-dcnode-id="1981" instrument_node="">Image credit: </span><a data-dcnode-id="1979" href="https://www.flickr.com/photos/13763480@N03/1424165432/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1980" instrument_node="">Richard</span></a></figcaption></figure><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Serenely nestled at the foot of Tanay mountains, this humble gift of nature is starting to catch the attention of local and foreign thrill seekers and movie producers alike. Its surrounding tropical vegetation is still unspoiled. No wonder it is considered as one of Tanay, Rizal’s finest tourist destinations.</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Despite its growing popularity, Daranak Falls is still very clean as conservation efforts to preserve this amazing place is an ongoing task. Come and splash on its bright turquoise waters and wash all your worries away.</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">All around the falls’ vicinity are native picnic sheds and tables that you could rent and lounge for a day. If you want to bring fresh meat and fish for cooking on site, the place has a grilling area, too. If you don’t want to worry about cooking, however, a small canteen at the trail’s entrance leading to the falls can cook them for you.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Oh, did I mention that you can also indulge in a unique stress-relieving activity while in the area? Yes, you can try your hands at balancing rocks along the banks of the river feeding the falls.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1959"><em data-dcnode-id="1960"><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1961" instrument_node=""> There are many junctions (terminals) going to Tanay, Rizal. You can find these Tanay-bound terminals at these locations: in front of Starmall EDSA, near Mandaluyong Police Station and Unilever Philippines, and near LRT Santolan Station. From these terminals, ride a jeepney and get off at Tanay Market Transport Terminal. Proceed to PATODA Riders terminal also known as Daranak Falls Tricycle Terminal.</span></em></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1947"><em data-dcnode-id="1954"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1955" instrument_node=""> ₱50 (adults); free for children below 3ft</span></em><br data-dcnode-id="1953"/><span data-dcnode-id="1952" instrument_node="">
</span><em data-dcnode-id="1948"><strong data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1949" instrument_node=""> ₱800 – ₱1,000 per person</span></em></p><span data-dcnode-id="1946" instrument_node="">
</span><h3 data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">5. Corregidor Island, Cavite</span></h3><span data-dcnode-id="1943" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1937" style="width: 800px"><img alt="Corregidor Island" data-dcnode-id="1942" height="533" src="https://static.tripzilla.com/thumb/1/2/97554_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1938"><span data-dcnode-id="1941" instrument_node="">Image credit: </span><a data-dcnode-id="1939" href="https://www.flickr.com/photos/spyderdos/4325543427/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1940" instrument_node="">spyderdos</span></a></figcaption></figure><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Do you know that Corregidor is a tadpole-shaped rocky island at the entrance of Manila Bay? And how can a tadpole-shaped rocky fortress of an island become a stunning weekend getaway? Well, think about World War II and the island’s historically strategic location and you will know what I mean. The now silent war implements, stoic reminders of the island’s past still stand on the island today. Isn’t that inspiring enough to be in front of these war memorabilia that were once used to gain the freedom that we now enjoy?</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The island can only be reached via a guided tour trip which makes the island ideal for unwinding. There are many awe-inspiring attractions in the island like the Mile-Long Barracks, the Spanish Lighthouse, and the Eternal Flame of Freedom, where you can make reflections and unwind. The relaxed, if not poignant ambience will surely ease all your troubles away.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1925"><em data-dcnode-id="1926"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1927" instrument_node=""> The safest and most convenient way to Corregidor Island is via a guided tour by Sun Cruises International, which is operated by Magsaysay Shipping. Kindly visit their website for more information about bookings.</span></em></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1919"><em data-dcnode-id="1920"><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1921" instrument_node=""> ₱2,550 (weekdays); ₱2,749 (weekends) inclusive of roundtrip ferry transfers, entrance fee, guided island tour onboard a tram, &amp; buffet lunch</span></em></p><span data-dcnode-id="1918" instrument_node="">
</span><h3 data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">6. Sky Ranch Pampanga, San Fernando, Pampanga</span></h3><span data-dcnode-id="1915" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1909" style="width: 800px"><img alt="Sky Ranch Pampanga" data-dcnode-id="1914" height="450" src="https://static.tripzilla.com/thumb/1/3/97555_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1910"><span data-dcnode-id="1913" instrument_node="">Image credit: </span><a data-dcnode-id="1911" href="https://www.flickr.com/photos/milst1/16278663055/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1912" instrument_node="">Martin Lewison</span></a></figcaption></figure><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Do you love theme parks but bored of the usual theme park rides? Then you should visit Sky Ranch Pampanga. It is a family-friendly amusement centre with 22 different rides. Among its exciting and fun rides, “The Eye” is the grandest. Standing more than 200 feet, this giant Ferris wheel is currently the biggest…no, the tallest…in the country, and it offers the grandest view of the legendary Mount Arayat not far from your air-conditioned gondola. The Eye also offers a breathtaking view of the setting sun.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">If you are looking for a weekend stress reliever and an adrenaline-pumping adventure at the same time, Sky Ranch, Pampanga is open every day for a day of fun and bonding with family members and friends.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1897"><em data-dcnode-id="1898"><strong data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1899" instrument_node=""> From Manila, Sky Ranch Pampanga is conveniently accessible from Caloocan, Cubao, Pasay, Manila, and Kamias terminals. Drop off point is in SM City Pampanga. From the mall, just take the Annex 1 exit and you’re there.</span></em></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1885"><em data-dcnode-id="1892"><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1893" instrument_node=""> ₱80 (weekdays); ₱100 (weekends); free for children below 3ft</span></em><br data-dcnode-id="1891"/><span data-dcnode-id="1890" instrument_node="">
</span><em data-dcnode-id="1886"><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1887" instrument_node=""> ₱700 – ₱800 per person (excluding food)</span></em></p><span data-dcnode-id="1884" instrument_node="">
</span><h3 data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">7. Villa Escudero Plantations and Resort, Tiaong, Quezon</span></h3><span data-dcnode-id="1881" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1875" style="width: 800px"><img alt="Villa Escudero Plantations and Resort" data-dcnode-id="1880" height="551" src="https://static.tripzilla.com/thumb/c/e/97486_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1876"><span data-dcnode-id="1879" instrument_node="">Image credit: </span><a data-dcnode-id="1877" href="http://villaescudero.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1878" instrument_node="">Villa Escudero Plantations and Resort</span></a></figcaption></figure><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">If you are looking for a relaxation with a cultural twist, visit Villa Escudero Plantations and Resort. Tour the whole property in a day, learn Filipino cultures of the past, ride bamboo rafts, and dine with a twist! Waterfalls Restaurant, which is the heart of the whole villa, let’s you experience a one-of-a-kind dining – eating on native bamboo tables barefoot at the foot of a roaring man-made waterfall. Why barefoot? Because your feet are actually submerged in a shallow flowing water on the restaurant’s floor courtesy of Labasin Falls. Now that’s dining with a real twist!</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" style="color: #ff6600;"><em data-dcnode-id="1867"><span data-dcnode-id="1870" instrument_node="">Also read: </span><a data-dcnode-id="1868" href="https://stays.tripzilla.com/stories/unique-resorts-philippines/67252" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1869" instrument_node="">8 Resorts in the Philippines that Transport You Into a Totally Different World</span></a></em></span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1859"><em data-dcnode-id="1860"><strong data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1861" instrument_node=""> Take a bus from either Kamias terminal in Quezon City, Alimall (Araneta Center) terminal in Cubao, or Buendia terminal in Pasay going to Lucena, Quezon. Tell the driver or bus conductor that you are going to Villa Escudero so that they can drop you off at the Quezon Arch. The gate to Villa Escudero is right after the arch to the left.</span></em></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1847"><em data-dcnode-id="1854"><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1855" instrument_node=""> ₱950 (low season: Sept – Nov); ₱1,450 (peak season: Dec – Aug)</span></em><br data-dcnode-id="1853"/><span data-dcnode-id="1852" instrument_node="">
</span><em data-dcnode-id="1848"><strong data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1849" instrument_node=""> ₱2,000 – ₱3,000 per person</span></em></p><span data-dcnode-id="1846" instrument_node="">
</span><h3 data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">8. Taal Volcano, Talisay, Batangas</span></h3><span data-dcnode-id="1843" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1837" style="width: 800px"><img alt="Taal Volcano" data-dcnode-id="1842" height="532" src="https://static.tripzilla.com/thumb/1/5/97557_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1838"><span data-dcnode-id="1841" instrument_node="">Image credit: </span><a data-dcnode-id="1839" href="https://www.flickr.com/photos/sherpas428/5755870395/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1840" instrument_node="">Sherpas 428</span></a></figcaption></figure><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The grandeur of Taal Volcano never fails to amaze anyone. It is no wonder why many weary souls go here to unwind. Taal Lake or the crater lake fills the caldera that formed during its most violent eruptions between 500,000 and 100,000 years ago. Now, still considered as one of the most active volcanoes in the Pacific Ring of Fire, Taal Volcano is visited by thousands of visitors each year just to marvel at its splendour. Aside from trekking, the usual activities that you can enjoy in and around the crater lake are boat riding, horseback riding, camping, and of course, sight-seeing. Being surrounded by one of the most magnificent natural wonders of the world will surely relieve you from all the accumulated stress you get from everyday life.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1825"><em data-dcnode-id="1829"><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1830" instrument_node=""> Ride a Batangas City via Tanauan-bound bus at Taft Avenue, Pasay City terminal and get off at Tanauan Public Market. Then ride a Talisay-bound jeepney. From there, proceed to the boat station and hire a motorized </span></em><span data-dcnode-id="1828" instrument_node="">banca</span><em data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node=""> to take you to Taal Volcano Island itself.</span></em></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1819"><em data-dcnode-id="1820"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1821" instrument_node=""> ₱2,000 – ₱3,000 per person</span></em></p><span data-dcnode-id="1818" instrument_node="">
</span><h3 data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">9. Lucban Church, Lucban, Quezon</span></h3><span data-dcnode-id="1815" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1809" style="width: 800px"><img alt="Lucban Church," data-dcnode-id="1814" height="640" src="https://static.tripzilla.com/thumb/1/6/97558_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1810"><span data-dcnode-id="1813" instrument_node="">Image credit: </span><a data-dcnode-id="1811" href="https://commons.wikimedia.org/wiki/File:Church_of_Saint_Louis,_Bishop_of_Toulouse,_Lucban,_Quezon.jpg" rel="mfp" target="_blank"><span data-dcnode-id="1812" instrument_node="">Rodrigo C. Belleza Jr.</span></a></figcaption></figure><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">For many, visiting historical and religious places is a way to relax. And if you are one of them, Lucban Church, in Lucban, Quezon, is definitely a must-visit.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">For history buffs, the church, which was originally built in 1595, has seen a lot of historical events that transpired during its lifetime. So, away from being a place of worship and meditation, Lucban Church is also a place where you can learn a lot of knowledge with great historical values, not to mention its significance as a starting point for the San Isidro Pahiyas Festival, an important celebration for those in the Catholic faith.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1797"><em data-dcnode-id="1798"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1799" instrument_node=""> From Metro Manila, board a Lucena-bound bus at EDSA-Kamuning. Alight at Lucena Grand Terminal. From there, proceed to Lucban by riding either a jeepney, van, or minibus.</span></em></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1791"><em data-dcnode-id="1792"><strong data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1793" instrument_node=""> ₱700 – ₱800 per person (excluding food)</span></em></p><span data-dcnode-id="1790" instrument_node="">
</span><h3 data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">10. Museo sa Ilalim ng Lupa ng Nagcarlan</span></h3><span data-dcnode-id="1787" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1781" style="width: 800px"><img alt="Museo sa Ilalim ng Lupa ng Nagcarlan" data-dcnode-id="1786" height="533" src="https://static.tripzilla.com/thumb/1/7/97559_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1782"><span data-dcnode-id="1785" instrument_node="">Image credit: </span><a data-dcnode-id="1783" href="https://commons.wikimedia.org/wiki/File:UNDERGROUND_CEMETERY,,,LAGUNA.jpg" rel="mfp" target="_blank"><span data-dcnode-id="1784" instrument_node="">Obra19</span></a></figcaption></figure><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">The word “cemetery” denotes a spine-tingling feeling for most people. That is why the Museo sa Ilalim ng Lupa ng Nagcarlan or the Nagcarlan Underground Cemetery is in this list, not to sow fear or grief but awe. Yes, this underground cemetery-turned museum is a very restful place not to mention its grandeur.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">This octagonal stone-and-brick structure, with its intricate ornamental traceries and magnificently made wrought iron grills is a sight to behold. Together with the wall frescoes, the patterned azulejos floor tiles, and its ideal location, this cemetery cum museum exudes peace and serenity, not just for the souls buried under its crypts but also for the living who visit here to find peace themselves.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1769"><em data-dcnode-id="1770"><strong data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1771" instrument_node=""> From Cubao terminal, take a Sta. Cruz-bound bus and get off at Sta. Cruz Public Market. Proceed to ride a Nagcarlan-bound jeepney from there. Tell your driver to drop you off at Nagcarlan Underground Cemetery, which is in front of the gasoline station along the national highway.</span></em></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1757"><em data-dcnode-id="1764"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1765" instrument_node=""> No entrance fee but donations are accepted</span></em><br data-dcnode-id="1763"/><span data-dcnode-id="1762" instrument_node="">
</span><em data-dcnode-id="1758"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1759" instrument_node=""> ₱500 – ₱600 per person (excluding food)</span></em></p><span data-dcnode-id="1756" instrument_node="">
</span><h3 data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">11. Mount Maculot, Cuenca, Batangas</span></h3><span data-dcnode-id="1753" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1747" style="width: 700px"><img alt="Mount Maculot" data-dcnode-id="1752" height="525" src="https://static.tripzilla.com/thumb/3/0/56624_700x.jpg" width="700"/><figcaption class="wp-caption-text" data-dcnode-id="1748"><span data-dcnode-id="1751" instrument_node="">Image credit: </span><a data-dcnode-id="1749" href="http://ideacrib.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1750" instrument_node="">Patricia Mirasol</span></a></figcaption></figure><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">If you are a climbing junkie, Mount Maculot, which is located in Cuenca, Batangas, is the perfect weekend getaway for you! The mountain is famous for three things: the Rockies, which offers an unprecedented view of Taal Lake and Taal volcano itself; the grotto; and the summit, a famous spot where you can take a lot of splendid photos worthy of boasting in your social media channels.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1742" instrument_node="">A lot of climbers like the novice-friendly trail up this majestic mountain, so mark this one on your bucket list. Check out this </span><a data-dcnode-id="1740" href="https://www.tripzilla.ph/the-rockies-mount-maculot-batangas-day-trip/1198" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1741" instrument_node="">Mount Maculot day-trip itinerary</span></a><span data-dcnode-id="1739" instrument_node=""> for more information.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><em data-dcnode-id="1733"><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1734" instrument_node=""> Get on board a Lemery-bound bus from Buendia terminal and alight at Cuenca town proper in Batangas. Then you can either walk or ride a trike to the Rockies’ jump-off point, which also serves as the registration area.</span></em></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1720"><em data-dcnode-id="1727"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Registration fee:</span></strong><span data-dcnode-id="1728" instrument_node=""> ₱20 per person</span></em><br data-dcnode-id="1726"/><span data-dcnode-id="1725" instrument_node="">
</span><em data-dcnode-id="1721"><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1722" instrument_node=""> ₱500 – ₱800 per person</span></em></p><span data-dcnode-id="1719" instrument_node="">
</span><h3 data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">12. Puning Hot Springs, Porac, Pampanga</span></h3><span data-dcnode-id="1716" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1710" style="width: 800px"><img alt="Puning Hot Springs" data-dcnode-id="1715" height="535" src="https://static.tripzilla.com/thumb/1/8/97560_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1711"><span data-dcnode-id="1714" instrument_node="">Image credit: </span><a data-dcnode-id="1712" href="https://www.facebook.com/pg/PuningHotSpringAndRestaurant/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1713" instrument_node="">Puning Hot Spring &amp; Restaurant</span></a></figcaption></figure><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Puning Hot Spring is a fortress-like resort on a cliff at Sapang Bato, Porac, Pampanga. The once-verdant location, where the resort was snugly nestled, was laid waste by the destructive 1991 Mount Pinatubo eruption. On the lighter side, that eruption paved the way for not one but 11 hot springs of the resort.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Aside from dipping in its steaming waters, you can also experience a one-of-a-kind spa treatments here: hot sand and mudpack!</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" style="color: #ff6600;"><em data-dcnode-id="1699"><span data-dcnode-id="1702" instrument_node="">Also read: </span><a data-dcnode-id="1700" href="https://www.tripzilla.com/pampanga-weekend-outing-things-to-do35882/35882" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1701" instrument_node="">8 FUNtastic Things to Do in Pampanga for a Weekend Outing</span></a></em></span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1691"><em data-dcnode-id="1692"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1693" instrument_node=""> From Metro Manila, take a bus to Mabalacat bus terminal in Pampanga. Manila terminals are located in Caloocan, Cubao, Kamias, Pasay, and Manila. Next, ride either a jeepney or a trike to Clark’s main gate. Then take another jeepney ride going to Mini-Stop in Sutherland, Clark. From there, the resort’s 4×4 vehicles will pick you up and bring you to your destination.</span></em></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1685"><em data-dcnode-id="1686"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1687" instrument_node=""> ₱3,000 – ₱3,500 per person inclusive of 4×4 ride, buffet meal &amp; entrance fees</span></em></p><span data-dcnode-id="1684" instrument_node="">
</span><h3 data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">13. Minalungao National Park, Nueva Ecija</span></h3><span data-dcnode-id="1681" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1675" style="width: 800px"><img alt="Minalungao National Park" data-dcnode-id="1680" height="600" src="https://static.tripzilla.com/thumb/1/9/97561_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1676"><span data-dcnode-id="1679" instrument_node="">Image credit: </span><a data-dcnode-id="1677" href="https://commons.wikimedia.org/wiki/File:Minalungao_National_Park.jpg" rel="mfp" target="_blank"><span data-dcnode-id="1678" instrument_node="">Drjoelgeorge</span></a></figcaption></figure><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Experience genuine relaxation and a breath of fresh air, literally at Nueva Ecija’s Minalungao National Park. The park is considered as one of the few untouched natural environments left in the Philippines. It boasts of a clean, green Peñaranda River where you can dive and swim all you want.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1665" style="width: 700px"><img alt="" data-dcnode-id="1670" height="466" src="https://static.tripzilla.com/thumb/5/a/54106_700x.jpg" width="700"/><figcaption class="wp-caption-text" data-dcnode-id="1666"><span data-dcnode-id="1669" instrument_node="">Image credit: </span><a data-dcnode-id="1667" href="https://commons.wikimedia.org/wiki/File:Minalungao_nueva_ecija.jpg" rel="mfp" target="_blank"><span data-dcnode-id="1668" instrument_node="">JL 09</span></a></figcaption></figure><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1663" instrument_node="">For those who want hardcore adventure, the towering rocky cliffs are perfect for climbing and cliff diving. Haven’t you tried bamboo rafting before? Well, you can try it here! If caving is your thing, you can also explore what’s inside the magnificent Minalungao Cave right at the foot of Minalungao Hill. Read this </span><a data-dcnode-id="1661" href="https://www.tripzilla.ph/minalungao-national-park/1229" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1662" instrument_node="">Minalungao National Park guide</span></a><span data-dcnode-id="1660" instrument_node=""> for more details.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1650"><em data-dcnode-id="1654"><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1655" instrument_node=""> From Cubao or Pasay in Metro Manila, ride a </span></em><span data-dcnode-id="1653" instrument_node="">Gapan</span><em data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">/Cabanatuan-bound bus. You then take a jeepney going to General Tinio. Proceed by riding a trike to Minalungao Park.</span></em></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1638"><em data-dcnode-id="1645"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1646" instrument_node=""> ₱40 per person</span></em><br data-dcnode-id="1644"/><span data-dcnode-id="1643" instrument_node="">
</span><em data-dcnode-id="1639"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1640" instrument_node=""> ₱1,000 – ₱1,500 per person</span></em></p><span data-dcnode-id="1637" instrument_node="">
</span><h3 data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">14. Capones Island, San Antonio, Zambales</span></h3><span data-dcnode-id="1634" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1628" style="width: 800px"><img alt="Capones Island" data-dcnode-id="1633" height="533" src="https://static.tripzilla.com/thumb/1/a/97562_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1629"><span data-dcnode-id="1632" instrument_node="">Image credit: </span><a data-dcnode-id="1630" href="https://www.flickr.com/photos/fs_gimenez/15364009797/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1631" instrument_node="">Francis Gimenez</span></a></figcaption></figure><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Just four kilometres off Pundaquit, Zambales, is an island called Isla de Gran Capon or the Capones Island. The two-kilometre bone-shaped island is perfect for no other than self-reflection and total relaxation as it has no inhabitants to it, except for the birds that make the island their home. All around the island is pure rustic beauty perfect for any relaxing you have in mind.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Its shoreline is enveloped in pristine white sands on one side and rocky shores on the other. Underneath its turquoise water is a rich marine life irresistible to beach bummers, divers, and snorkellers.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Aside from the Spanish lighthouse built in 1890 to warn ships of the rocky outcrops below the seemingly safe waters around the island, the only other structure in the island is an unfinished building. Ready your cameras for some Instagram-worthy shots!</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">The view from the top of the hill, where the lighthouse is located, is nothing short of impressive. If you want to stay for the night, camping is allowed as long as you have your camping equipment with you. Of course, don’t forget to arrange a return trip from your boatman unless you deliberately want to stay there for good – which is definitely a no, no! While you’re there, you might want to explore the nearby Anawangin Cove in San Antonio. This group of friends visited both </span><a data-dcnode-id="1615" href="https://www.tripzilla.ph/anawangin-capones-one-day-trip/46" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1616" instrument_node="">Anawangin and Capones on a day trip with only ₱1,256 all-in budget</span></a><span data-dcnode-id="1614" instrument_node="">.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1604"><em data-dcnode-id="1608"><strong data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1609" instrument_node=""> From Sampaloc terminal in Manila, take a bus going to Iba, Zambales. Tell the cashier at the terminal that you are getting off at San Antonio to avoid being charged with the full fare to the bus’ destination. Also, tell the driver or the bus conductor to drop you off at San Antonio. From there, ride a trike to Barangay Pundaquit. Next, rent a boat (motorized </span></em><span data-dcnode-id="1607" instrument_node="">banca</span><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">) to Capones Island.</span></em></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1598"><em data-dcnode-id="1599"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1600" instrument_node=""> ₱1,200 – ₱1,500 per person</span></em></p><span data-dcnode-id="1597" instrument_node="">
</span><h3 data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">15. Masinloc Eco-Tour, Masinloc, Zambales</span></h3><span data-dcnode-id="1594" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="1588" style="width: 800px"><img alt="Masinloc Eco-Tour" data-dcnode-id="1593" height="533" src="https://static.tripzilla.com/thumb/1/b/97563_800x.jpg" width="800"/><figcaption class="wp-caption-text" data-dcnode-id="1589"><span data-dcnode-id="1592" instrument_node="">Image credit: </span><a data-dcnode-id="1590" href="https://www.flickr.com/photos/donabelandewen/2176863357/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1591" instrument_node="">Ewen Roberts</span></a></figcaption></figure><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Masinloc in Zambales is known for many things: Carabao mangoes aka Philippine mango, Binabayani Festival, natural wonders, but most of all, it is known for its Masinloc Eco-Tour Program which starts at San Salvador Island’s giant clam (taklobo) farm and Marine Protected Area. The tour’s next stop is the usual lunch-time place – Bacala House. The house is standing on the Bacala white sandbar in the middle of the clear, turquoise waters of the Masinloc Oyon Bay. The one-day run ends at the nine-hectare Yaha Mangrove Forest Adventure, a unique mangrove forest that stands in the middle of the bay as well.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Snorkelling and diving at the giant clam farm and the Marine Protected Area will give you the thrill of your life as exotic marine species abound in these areas. Aside from giving you the relief you oh so wanted, you will also feel proud of yourself because every tour participant is given the chance to help in the ecotourism project. You do it by leaving your conservation footprint through planting a mangrove seedling before leaving the place.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1576"><em data-dcnode-id="1577"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">How to get there:</span></strong><span data-dcnode-id="1578" instrument_node=""> From Cubao, take a bus going to Olongapo then ride a UV Express (van) bound for Sta. Cruz. Tell the driver to drop you off at Masinloc bayan. Next, jump onboard a passenger boat to San Salvador Island.</span></em></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1570"><em data-dcnode-id="1571"><strong data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Estimated cost:</span></strong><span data-dcnode-id="1572" instrument_node=""> ₱2,500 per person (including food)</span></em></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" style="color: #ff6600;"><em data-dcnode-id="1565"><span data-dcnode-id="1568" instrument_node="">Also read: </span><a data-dcnode-id="1566" href="https://www.tripzilla.ph/underrated-northern-luzon-destinations/1084" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1567" instrument_node="">Underrated Northern Luzon Destinations Worth the Road Trip</span></a></em></span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">So, where are you heading to next this weekend? Have you decided which place to visit yet? Whether you want a grand adventure or just pure relaxation, these weekend getaways near Metro Manila will surely make your day!</span></p><span data-dcnode-id="1559" instrument_node="">
