</span><div class="field-items" data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">
</span><div class="field-item odd" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">
                    Machine-learning technologies, like artificial intelligence (AI), are becoming the main tools for shaping and arbitrating information online. Content moderation and content curation are often an automated procedure, with algorithms and AI deciding on which content is taken down or to whom it is disseminated.

If implemented responsibly, AI can benefit societies in various positive ways. However, there is also a genuine risk that such technologies have a detrimental impact on fundamental freedoms. When driven by commercial, political or state interests, the use of AI could seriously jeopardize our human rights, in particular the freedom of expression and media pluralism.        </span></div><span data-dcnode-id="1255" instrument_node="">
</span></div><span data-dcnode-id="1253" instrument_node="">
</span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span><div class="panel-pane pane-node-body node-content html-formatted" data-dcnode-id="1207"><span data-dcnode-id="1246" instrument_node="">
</span><div class="pane-content" data-dcnode-id="1209"><span data-dcnode-id="1245" instrument_node="">
</span><div data-dcnode-id="1229" style="background:#eeeeee; border:1px solid #cccccc; padding:5px 10px"><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Project Contact Information</span></strong></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1239" instrument_node="">Deniz Yazici, Project Manager: </span><a data-dcnode-id="1237" href="mailto:Deniz.Yazici@osce.org"><span data-dcnode-id="1238" instrument_node="">Deniz.Yazici@osce.org</span></a></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1234" instrument_node="">Julia Haas, Assistant Project Officer: </span><a data-dcnode-id="1232" href="mailto:Julia.Haas@osce.org"><span data-dcnode-id="1233" instrument_node="">Julia.Haas@osce.org</span></a></p><span data-dcnode-id="1230" instrument_node="">
</span></div><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1225"><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">A new project on the profound impact of AI on freedom of expression</span></strong></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">What are the policies and practices in place concerning machine-learning technologies such as AI? How should we understand them when it comes to their profound impact on freedom of expression and internet freedom?</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The project’s objective is to promote a clearer understanding of government, regulators, and internet intermediaries’ policies and practices in their use of machine-learning technologies and the impact these have on how citizens access and share information.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">The Office of the Representative on Freedom of the Media will develop policy recommendations on the most effective ways to safeguard freedom of expression and media pluralism, when deploying advanced machine-learning technologies such as AI.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Special focus will be given to four areas of concern: security threats, hate speech, media pluralism and surveillance capitalism.</span></p><span data-dcnode-id="1212" instrument_node="">
