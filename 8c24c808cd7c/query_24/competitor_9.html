</span><div class="post-header" data-dcnode-id="804"><span data-dcnode-id="829" instrument_node="">
</span><span data-dcnode-id="827" instrument_node="">
</span><p class="post-date" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Posted on 08 Nov 2018</span></p><span data-dcnode-id="824" instrument_node="">
</span><div class="post-options" data-dcnode-id="806"><span data-dcnode-id="823" instrument_node="">

</span><div class="post-accessibility" data-dcnode-id="808"><span data-dcnode-id="815" instrument_node="">
</span><button class="btn-text-reduce" data-dcnode-id="814" data-tip="Decrease text size" onclick="changeTextsize(.9)"></button><span data-dcnode-id="813" instrument_node="">

</span><button class="btn-speech" data-dcnode-id="810" data-tip="Text to speech" onclick="readText()"></button><span data-dcnode-id="809" instrument_node="">

</span><div data-dcnode-id="704" id="translationsGroup"><span data-dcnode-id="800" instrument_node="">
</span><span data-dcnode-id="798" instrument_node="">
</span><div class="custom-content" data-dcnode-id="706" id="content-english"><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node="">Technologies that make use of forms of artificial intelligence (AI) are rapidly changing the face of law enforcement around the world. These technologies range from robotics and enhanced forms of data collection to so-called predictive policing, which uses data analysis tools to estimate the likelihood of criminal behaviour of individuals and anticipate high-crime levels. In terms of the policing of organized crime, tools that assist in the mapping of criminal networks and in predicting new patterns of behaviour aim to be transformative. </span></span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" style="font-weight: 400;"><span data-dcnode-id="792" instrument_node="">Yet concerns are widely being voiced about the ethical issues and risks associated with the use of such technologies. The use of technology such as facial recognition to increase exponentially the capacity of state surveillance by helping governments target specific groups or increase racial and ethnic profiling, and lower the threshold for police intervention and the use of force, has become a very real issue. The exploitation of these technologies by states with little concern for human rights is a new and sudden threat that the international community must confront. </span></span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" style="font-weight: 400;"><span data-dcnode-id="788" instrument_node="">The UN is incorporating the topic of AI and other emerging technologies into discussions across the board, including talks on policing. However, the fast-changing landscape of these technologies poses a challenge for a bureaucratic system that is not famed for its swiftness of response or adaptability. As a result, policymakers, particularly those mediating between states, are often placed in a reactive position. </span></span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="783" style="font-weight: 400;"><span data-dcnode-id="784" instrument_node="">In an attempt to engage states in debate on the norms of using AI in policing work, </span></span><span data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" instrument_node="">the UN Interregional Crime and Justice Research Institute (UNICRI) Centre for Artificial Intelligence and Robotics </span></span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unicri.it/news/article/Artificial_Intelligence_Robotics_INTERPOL"><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">held a meeting</span></span><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node=""> with INTERPOL</span></span><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node=""> in July 2018</span></span></a><span data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" instrument_node=""> to explore the opportunities and challenges of using AI and robotics in law enforcement, and showcase technologies ranging from autonomous patrol vehicles to behaviour-detection tools.</span></span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" style="font-weight: 400;"><span data-dcnode-id="769" instrument_node="">At the meeting, the Global Initiative spoke to Irakli Beridze, head of the Centre for Artificial Intelligence and Robotics and a leading UNICRI representative, about raising awareness on AI and the opportunities and risks posed by its use in law enforcement.</span></span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="763"><b data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">GI: The question of AI and robotics is a relatively new policy space, particularly for the UN. Within the UN system, have you found it a struggle to bring together stakeholders willing to take part in a dialogue in this area?</span></b></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" style="font-weight: 400;"><span data-dcnode-id="761" instrument_node="">IB: If anything, quite the opposite. As an emerging field, there seems to be a shared interest in widening the discussion and engaging stakeholders from various sectors. Most countries recognize that AI tools are in the early stage of development, and they want to learn from one another – and from the private sector. I’ve found that the private sector has also been keen to join in the dialogue and learn how the UN is addressing these issues. It would be difficult to have purposeful discussions without practitioners and private-sector participants who are tabling AI and robotics on their agendas. In my experience, private-sector and government representatives have been able to find a shared way to discuss the technology. </span></span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="755"><b data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">GI: Tell us about UNICRI’s activities in the area of AI.</span></b></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" style="font-weight: 400;"><span data-dcnode-id="753" instrument_node="">IB: The discussion around AI and criminal activity is still in its early stages, as the technologies are emerging as we speak. Since we opened the centre in 2017, UNICRI’s focus has been on criminal justice, crime prevention and security in general. Previously, the UN had not had much involvement in AI discussions, so we have begun raising a general awareness, beginning with an event at the UN General Assembly on AI in 2015, and again the following year. We also organized an event with the Organisation for the Prohibition of Chemical Weapons, to address how emerging AI technology will have an impact on the implementation of the international non-proliferation treaties. We’ve also held training sessions for the media and the security industries. </span></span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="747"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">GI: You recently co-hosted a meeting with INTERPOL’s Innovation Centre on the opportunities and risks posed by AI and robotics for law enforcement. What was the objective?</span></b></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" style="font-weight: 400;"><span data-dcnode-id="745" instrument_node="">IB: This was the first global meeting to discuss how AI and robotics can be used by law enforcement and to address the potential challenges in this area. Since these discussions are in the early stages, the conversations ranged from the technical to the ethical. </span></span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" style="font-weight: 400;"><span data-dcnode-id="741" instrument_node="">Countries were eager to learn from the private sector about their new technologies. Attendees learnt about applications such as virtual autopsy tools and visual-recognition applications that can be used to trace stolen vehicles. We also discussed how AI applications can be used by criminals and how to bring this information to law enforcement and criminal-justice practitioners. For instance, there are potential risks for prosecuting organized and non-organized criminal cases. One example is impersonation, where video footage can be faked and used for fraudulent purposes. In the future, it’s possible this could bring into question the admissibility of video footage as evidence in criminal cases. </span></span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" style="font-weight: 400;"><span data-dcnode-id="737" instrument_node="">Our attendees also wanted to know how the private sector was handling the ethical and legal considerations in their work in this field. In addition to examining the potential ways in which criminals can harness AI technology for their own ends, and how law enforcement can respond to this form of crime, one of the main aspects of the meeting was to look at how we might frame these kinds of challenges within ethical boundaries. </span></span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="728"><b data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">GI:</span></b><span data-dcnode-id="731" instrument_node=""> </span><b data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">And what are the main contours of ethics within the AI debate? </span></b></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">IB: Everything we do must fit within – or, at the very least, not breach – the international human-rights framework of international humanitarian law. There are a number of other issues too, such as security and right to privacy, where individual countries may have different understandings of these ethical notions. At the INTERPOL meeting, many of the law-enforcement officials were interested to learn about the debates around ethics and AI and how the issues arising from these debates might be applied. We will carry this discussion forward and host a meeting on ethics and AI for law enforcement </span></span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//undocs.org/en/A/73/150"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">in January 2019 in Singapore</span></span></a><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node="">. </span></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="712"><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">GI: What should the role of the UN</span></b><span data-dcnode-id="715" instrument_node=""> </span><b data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">be in terms of addressing AI-related issues?</span></b></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" style="font-weight: 400;"><span data-dcnode-id="710" instrument_node="">IB: As time progresses, AI is likely to play a major part in most spheres of our lives. The role of the UN should be threefold. First, it should raise awareness of AI. Discussions of AI are dispersed and not linked together. I’d like to see more AI debates brought to the developing world and countries in transition, including more discussion on the social and economic impacts of AI. Secondly, we should maximize the benefits of AI-driven technologies to contribute to the Sustainable Development Goals and other UN-led projects. For instance, the 2018 AI for Good Global Summit was attended by 32 UN agencies to discuss how applications of AI can contribute to the SDGs. Thirdly, the UN must identify the risks involved, whether minimal or substantial in nature, and start comprehensive discussions related to those risks. &nbsp;</span></span></p><span data-dcnode-id="707" instrument_node="">
</span></div><span data-dcnode-id="705" instrument_node="">
</span></div><span data-dcnode-id="703" instrument_node="">
</span></div><span data-dcnode-id="701" instrument_node="">
