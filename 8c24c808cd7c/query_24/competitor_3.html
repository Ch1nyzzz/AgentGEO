mmission’s High-Level Expert Group on AI, which is based on Human Rights; and the second document of the IEEE (currently under consultation) on Ethically Aligned Design: A Vision for Prioritizing Human Well-being- 23 - with Autonomous and Intelligent Systems, which is addressed to engineers and aimed to embed values into Autonomous Intelligent Systems. All these initiatives are positive as they initiate discussions on AI ethics at different levels. 101. Nevertheless, the Working Group concluded that there was a great heteronomy in the principles and in the implementation of the values promoted by one or the other. This heteronomy is both the consequence of the definition that has been chosen for AI, and of the objectives that are being sought - governance, education for engineers, public policy. The question is as follows: would a UNESCO Declaration on the Ethics of AI allow this heteronomy to be federated under a few guiding principles that would respond in a comprehensive manner to the ethical issues of AI, as well as to UNESCO's specific concerns in the fields of education, culture, science and communication? The Working Group believes that this could be possible, but with the risk that during the process leading to the Declaration, Member States would essentially agree on some general, abstract and non-binding principles, since it is a Declaration. In such a perspective, would a UNESCO Declaration on the Ethics of AI bring added value vis-a-vis other ongoing declarations and initiatives? It is questionable that such instrument will immediately establish itself as an international reference, in a context of competition between ethical frameworks, at a time when technologies are emerging and their uses not yet stabilized. 102. The Working Group therefore considered whether a Recommendation would then be a more appropriate tool in the current situation. At the international level, the European level and the national political context for several countries, there is a move towards similar forms of regulation with respect to the digital economy, but also taking into account the relations between the two major digital powers - USA and China. The increase of criticisms concerning the non-transparency, biases or ways of acting by big companies, or the rise of popular mistrust in the face of cyber-attacks are creating a new political climate that is having an impact on the development of AI. The digital regulation movement, initiated by the European Union on the protection of personal data, could therefore be extended to an international level in emerging fields such as AI. However, at this level, the tools are still in their early stages of development, although the OECD's strategy through its Artificial Intelligence Expert Group (AIGO) emphasizes responsibility, security, transparency, protection and accountability: The OECD supports governments through policy analysis, dialogue and engagement and identification of best practices. We are putting significant efforts into work on mapping the economic and social impacts of AI technologies and applications and their policy implications. This includes improving the measurement of AI and its impacts, as well as shedding light on important policy issues such as labour market developments and skills for the digital age, privacy, accountability of AI-powered decisions, and the responsibility, security and safety questions that AI generates. (OECD, 2019) 103. OECD public policy priorities are more a matter of AI governance and good practice. It seems here that UNESCO's approach could be complementary at the international level to the OECD’s, but with a focus on aspects that are generally neglected such as culture, education, science and communication. These dimensions directly affect people and populations in their daily lives and in their individual and collective aspirations. UNESCO's approach for a Recommendation on AI Ethics would be presented as a complementary alternative to a vision of economic governance. The Working Group therefore believes that by initiating a Recommendation, although it requires more time and energy than a Declaration, UNESCO would be able to distinguish itself not only in terms of ethical content but also through specific proposals to Member States. One of the aims- 24 - is to empower and strengthen the capacity of States to intervene in key areas that are impacted by the development of AI, such as culture, education, science and communication. 104. The Recommendation should contain two dimensions. The first is the affirmation of a number of basic principles for an Ethics of AI. The second is the outlining of specific proposals to help States monitor, and regulate the uses of AI in the areas under UNESCO’s mandate through the reporting mechanism of the Recommendation, as well as identify ethical assessment tools to review on a regular basis their policies for guiding the development of AI. In this regard, UNESCO would be uniquely positioned to provide a multidisciplinary perspective, as well as a universal platform for the development of a Recommendation on the Ethics of AI. Specifically, UNESCO would be able to bring together both developed and developing countries, different cultural and moral perspectives, as well as various stakeholders within the public and private spheres into a truly international process for elaborating a comprehensive set of principles and proposals for the Ethics of AI. 105. The next section identifies some of these proposals. III.2. Suggestions for a standard-setting instrument 106. On the basis of its analysis of the potential implications of Artificial Intelligence for society, the Working Group would like to suggest a number of elements that could be included in an eventual Recommendation on the Ethics of AI. These suggestions embody the global perspective of UNESCO, as well as UNESCO’s specific areas of competence. 107. First of all, the Working Group would like to suggest a number of generic principles for the development, implementation and use of AI. These principles are: a. Human rights: AI should be developed and implemented in accordance with international human rights standards. b. Inclusiveness: AI should be inclusive, aiming to avoid bias and allowing for diversity and avoiding a new digital divide. c. Flourishing: AI should be developed to enhance the quality of life. d. Autonomy: AI should respect human autonomy by requiring human control at all times. e. Explainability: AI should be explainable, able to provide insight into its functioning. f. Transparency: The data used to train AI systems should be transparent. g. Awareness and literacy: Algorithm awareness and a basic understanding of the workings of AI are needed to empower citizens. h. Responsibility: Developers and companies should take into consideration ethics when developing autonomous intelligent system. i. Accountability: Arrangements should be developed that will make possible to attribute accountability for AI-driven decisions and the behaviour of AI systems. j. Democracy: AI should be developed, implemented and used in line with democratic principles. k. Good governance: Governments should provide regular reports about their use of AI in policing, intelligence, and security.- 25 - l. Sustainability: For all AI applications, the potential benefits need to be balanced against the environmental impact of the entire AI and IT production cycle. 108. More specifically, the Working Group would like to point out some central ethical concerns regarding the specific focus of UNESCO: a. Education: AI requires that education fosters AI literacy, critical thinking, resilience on the labour market, and educating ethics to engineers. b. Science: AI requires a responsible introduction in scientific practice, and in decision-making based on AI systems, requiring human evaluation and control, and avoiding the exacerbation of structural inequalities. c. Culture: AI should foster cultural diversity, inclusiveness and the flourishing of human experience, avoiding a deepening of the digital divide. A multilingual approach should be promoted. d. Communication and information: AI should strengthen freedom of expression, universal access to information, the quality of journalism, and free, independent and pluralistic media, while avoiding the spreading of disinformation. A multi-stakeholder governance should be promoted. e. Peace: In order to contribute to peace, AI could be used to obtain insights in the drivers of conflict, and should never operate out of human control. f. Africa: AI should be integrated into national development policies and strategies by drawing on endogenous cultures, values and knowledge in order to develop African economies. g. Gender: Gender bias should be avoided in the development of algorithms, in the datasets used for their training, and in their use in decision-making. h. Environment: AI should be developed in a sustainable manner taking into account the entire AI and IT production cycle. AI can be used for environmental monitoring and risk management, and to prevent and mitigate environmental crises.- 26 - BIBLIOGRAPHY AI Now. 2016. The AI Now Report: The Social and Economic Implications of Artificial Intelligence Technologies in the Near-Term. New York, The White House and the New York University’s Information Law Institute. Available at: https://ainowinstitute.org/AI_Now_2016_Report.pdf Ajunwa, I., Crawford, K., and Schultz, J. 2017. Limitless Worker Surveillance. California Law Review. No. 735, pp. 101-142. Allen, G. and Chan, T. 2017. Artificial Intelligence and National Security. Harvard Kennedy School, Belfer Center for Science and International Affairs. Online. Available at: https://www.belfercenter.org/publication/artificial-intelligence-and-national-security Amnesty International and Access Now. 2018. The Toronto Declaration: Protecting the right to equality and non-discrimination in machine learning systems. Toronto, Rig
