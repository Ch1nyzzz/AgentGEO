</span><meta content="The automation brought about by big data analytics, machine learning and artificial intelligence systems challenges us to reconsider fundamental questions of criminal justice. The article outlines the automation which has taken place in the criminal justice domain and answers the question of what is being automated and who is being replaced thereby. It then analyses encounters between artificial intelligence systems and the law, by considering case law and by analysing some of the human rights affected. The article concludes by offering some thoughts on proposed solutions for remedying the risks posed by artificial intelligence systems in the criminal justice domain." data-dcnode-id="2754" property="og:description"><span data-dcnode-id="2753" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="607" data-track-component="article body"><span data-dcnode-id="2322" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2315" data-gtm-vis-first-on-screen-50443292_562="502" data-gtm-vis-first-on-screen-50443292_563="503" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="502" data-gtm-vis-recent-on-screen-50443292_563="503" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2316" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2320" id="Abs1"><span data-dcnode-id="2321" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2317" id="Abs1-content"><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">The automation brought about by big data analytics, machine learning and artificial intelligence systems challenges us to reconsider fundamental questions of criminal justice. The article outlines the automation which has taken place in the criminal justice domain and answers the question of what is being automated and who is being replaced thereby. It then analyses encounters between artificial intelligence systems and the law, by considering case law and by analysing some of the human rights affected. The article concludes by offering some thoughts on proposed solutions for remedying the risks posed by artificial intelligence systems in the criminal justice domain.</span></p></div></div></section><span data-dcnode-id="2314" instrument_node="">
</span><section data-dcnode-id="2259" data-gtm-vis-first-on-screen-50443292_562="503" data-gtm-vis-first-on-screen-50443292_563="503" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="503" data-gtm-vis-recent-on-screen-50443292_563="503" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2260" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2312" id="Sec1"><span data-dcnode-id="2313" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2261" id="Sec1-content"><p data-dcnode-id="2286"><span data-dcnode-id="2311" instrument_node="">With the advent of big data analytics, machine learning and artificial intelligence systems (henceforth ‘AI systems’),</span><sup data-dcnode-id="2306"><a data-dcnode-id="2307" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Footnote </span></span><span data-dcnode-id="2308" instrument_node="">1</span></a></sup><span data-dcnode-id="2305" instrument_node=""> both the assessment of the risk of crime and the operation of criminal justice systems are becoming increasingly technologically sophisticated. While authors disagree whether these technologies represent a panacea for criminal justice systems—for example by reducing case backlogs—or will further exacerbate social divisions and endanger fundamental liberties, the two camps nevertheless agree that such new technologies have important consequences for criminal justice systems. The automation brought about by AI systems challenges us to take a step back and reconsider fundamental questions of criminal justice: What does the </span><i data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">explanation</span></i><span data-dcnode-id="2302" instrument_node=""> of the grounds of a judgment mean? When is the process of adopting a judicial decision </span><i data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">transparent</span></i><span data-dcnode-id="2299" instrument_node="">? Who should be </span><i data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">accountable</span></i><span data-dcnode-id="2296" instrument_node=""> for (semi-) automated decisions and how should </span><i data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">responsibility</span></i><span data-dcnode-id="2293" instrument_node=""> be allocated within the chain of actors when the final decision is facilitated by the use of AI? What is a </span><i data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">fair trial</span></i><span data-dcnode-id="2290" instrument_node="">? And is the </span><i data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">due process of law</span></i><span data-dcnode-id="2287" instrument_node=""> denied to the accused when AI systems are used at some stage of the criminal procedure?</span></p><p data-dcnode-id="2278"><span data-dcnode-id="2285" instrument_node="">The technical sophistication of the new AI systems used in decision-making processes in criminal justice settings often leads to a ‘black box’ effect.</span><sup data-dcnode-id="2280"><a data-dcnode-id="2281" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Footnote </span></span><span data-dcnode-id="2282" instrument_node="">2</span></a></sup><span data-dcnode-id="2279" instrument_node=""> The intermediate phases in the process of reaching a decision are by definition hidden from human oversight due to the technical complexity involved. For instance, multiple areas of applied machine learning show how new methods of unsupervised learning or active learning operate in a way that avoids human intervention. In the active approaches of machine learning used for natural language processing, for instance, the learning algorithm accesses a large corpus of unlabelled samples and, in a series of iterations, the algorithm selects some unlabelled samples and asks the human annotator for appropriate labels. The approach is called active as the algorithm decides what samples should be annotated by the human based on its current hypothesis. The core idea of active machine learning is to eliminate humans from the equation. Moreover, artificial neural networks (hereafter ‘ANN’) learn to perform tasks by considering examples, generally without being programmed with task-specific rules. As such, artificial neural networks can be extremely useful in multiple areas, such as computer vision, natural language processing, in geoscience for ocean modelling, or in cybersecurity for identifying and discriminating between legitimate activities and malicious ones. They do not demand labelled samples, e.g., in order to recognise cats in images or pedestrians in traffic, but can generate knowledge about what a cat looks like on their own. The operations in machine learning approaches are not transparent even for the researchers that built the systems and while this may not be problematic in many areas of applied machine learning, as the examples below show, AI systems must be transparent when used in judicial settings, where the explainability of decisions and the transparency of the reasoning are of significant—even civilizational—value. A&nbsp;decision-making process that lacks transparency and comprehensibility is not considered legitimate and non-autocratic. Due to the inherently opaque nature of these AI systems, the new tools used in criminal justice settings may thus be at variance with fundamental liberties.</span></p><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Lawyers must be aware, moreover, of the supra-legal context and background rationale for implementing AI systems. While some reasons may be legitimate—e.g., when AI systems facilitate access to courts to individuals that might otherwise be left on the sidelines of justice—others may be disputable and require a wider social debate that can only be held outside the judicial system. Shrinking budgets, the decreased legitimacy of the judiciary, and an overload of cases may all lead to the implementation of new solutions that information technology companies are ready to offer to governments. However, proposals for outsourcing a public service to private sector providers will trigger (or should trigger) a major political discussion which must be held in more democratic fora.</span></p><p data-dcnode-id="2262"><span data-dcnode-id="2275" instrument_node="">Following on from this introductory contextualisation of the automation of criminal justice, this article proceeds to an outline of the automation of crime control and answers the questions of what is being automated and who is being replaced in crime control (</span><i data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Part 2</span></i><span data-dcnode-id="2272" instrument_node="">). It then analyses encounters between artificial intelligence systems and the law through case law (</span><i data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Part 3</span></i><span data-dcnode-id="2269" instrument_node="">) and through an analysis of some of the affected human rights (</span><i data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Part 4</span></i><span data-dcnode-id="2266" instrument_node="">). Thereafter, it answers the following question: what human rights may be affected by AI systems and how? The article concludes by offering some thoughts on the proposed solutions to remedy the risks of AI systems in the criminal justice domain (</span><i data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Part 5</span></i><span data-dcnode-id="2263" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="2063" data-gtm-vis-first-on-screen-50443292_562="503" data-gtm-vis-first-on-screen-50443292_563="503" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="503" data-gtm-vis-recent-on-screen-50443292_563="503" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="How does automation change crime control?"><div class="c-article-section" data-dcnode-id="2064" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2257" id="Sec2"><span data-dcnode-id="2258" instrument_node="">How does automation change crime control?</span></h2><div class="c-article-section__content" data-dcnode-id="2065" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="2255" id="Sec3"><span data-dcnode-id="2256" instrument_node="">The automation of policing</span></h3><p data-dcnode-id="2242"><span data-dcnode-id="2254" instrument_node="">By means of CompStat (COMPuter STATistics, or COMParative STATistics), geospatial modelling for predicting future crime concentrations, or ‘hot spots’,</span><sup data-dcnode-id="2249"><a data-dcnode-id="2250" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Footnote </span></span><span data-dcnode-id="2251" instrument_node="">3</span></a></sup><span data-dcnode-id="2248" instrument_node=""> has developed into a paradigm of managerial policing employing Geographic Information Systems (GIS) to map crime. This has been advocated as a multi-layered dynamic approach to crime reduction, quality of life improvement, personnel and resource management, and not merely a computer programme. The idea is not solely to ‘see crime’ visually presented on a map, but rather to develop a comprehensive managerial approach or a police management philosophy. As a ‘human resource management tool’, it involves ‘weekly meetings where officers review recent metrics (crime reports, citations, and other data) and talk about how to improve those numbers.’</span><sup data-dcnode-id="2243"><a data-dcnode-id="2244" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Footnote </span></span><span data-dcnode-id="2245" instrument_node="">4</span></a></sup></p><p data-dcnode-id="2228"><span data-dcnode-id="2241" instrument_node="">Compared to algorithmic prediction software, the CompStat system is calibrated less frequently. As a police officer from Santa Cruz (USA) reported: ‘I’m looking at a map from last week and the whole assumption is that next week is like last week […]’.</span><sup data-dcnode-id="2236"><a data-dcnode-id="2237" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Footnote </span></span><span data-dcnode-id="2238" instrument_node="">5</span></a></sup><span data-dcnode-id="2235" instrument_node=""> CompStat relies more on humans to recognise patterns. Nevertheless, it incorporated for the first time the idea of seeing how crime evolves and focusing on ‘the surface’ and not the causes of crime. In this context, Siegel argues with respect to predictive analytics: ‘We usually don’t know about causation, and we often don’t necessarily care […] the objective is more to predict than it is to understand the world […]. It just needs to work; prediction trumps explanation.’</span><sup data-dcnode-id="2230"><a data-dcnode-id="2231" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Footnote </span></span><span data-dcnode-id="2232" instrument_node="">6</span></a></sup><span data-dcnode-id="2229" instrument_node=""> In comparison to AI analytics, its limiting factor is the depth of the information and the related breadth of analysis. The amount of data is not the problem as agencies collect vast amounts of data every day; rather, the next challenge is the ability to pull operationally-relevant knowledge from the data collected.</span></p><p data-dcnode-id="2215"><span data-dcnode-id="2227" instrument_node="">Computational methods of ‘predictive crime mapping’ started to enter into crime control twelve years ago.</span><sup data-dcnode-id="2222"><a data-dcnode-id="2223" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Footnote </span></span><span data-dcnode-id="2224" instrument_node="">7</span></a></sup><span data-dcnode-id="2221" instrument_node=""> Predictive ‘big data’ policing instruments took another evolutionary step forward. First, advancements in AI promised to make sense of enormous amounts of data and to extract meaning from scattered data sets. Secondly, they represented a shift from being a decision support system to being a primary decision-maker. Thirdly, they are aimed at the regulation of society at large and not only the fight against crime. (For an example of ‘function-creep’, see Singapore’s ‘total information awareness system programme’.)</span><sup data-dcnode-id="2216"><a data-dcnode-id="2217" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Footnote </span></span><span data-dcnode-id="2218" instrument_node="">8</span></a></sup></p><p data-dcnode-id="2195"><span data-dcnode-id="2214" instrument_node="">Police are using AI tools to penetrate deeply into the preparatory phase of crime which is yet to be committed, as well as to scrutinise already-committed crimes. With regard to ex-ante preventive measures, automation tools are supposed to excavate plotters of crimes which are yet to be committed from large amounts of data. Hence, a distinction is made between tools focusing on ‘risky’ individuals (‘heat lists’—algorithm-generated lists identifying people most likely to commit a crime)</span><sup data-dcnode-id="2209"><a data-dcnode-id="2210" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Footnote </span></span><span data-dcnode-id="2211" instrument_node="">9</span></a></sup><span data-dcnode-id="2208" instrument_node=""> and tools focusing on risky places (‘hot spot policing’).</span><sup data-dcnode-id="2203"><a data-dcnode-id="2204" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Footnote </span></span><span data-dcnode-id="2205" instrument_node="">10</span></a></sup><span data-dcnode-id="2202" instrument_node=""> With regard to the second, ex-post-facto uses of automation tools, there have been many success stories in the fight against human trafficking. In Europe, Interpol manages the International Child Sexual Exploitation Image Database (ICSE DB) to fight child sexual abuse. The database can facilitate the identification of victims and perpetrators through an analysis of, for instance, furniture and other mundane items in the background of abusive images—e.g., it matches carpets, curtains, furniture, and room accessories—or identifiable background noise in the video. Chatbots acting as real people are another advancement in the fight against grooming and webcam ‘sex tourism’. In Europe, the Dutch children’s rights organisation Terre des Hommes was the first NGO to combat webcam child ‘sex tourism’ by using a virtual character called ‘Sweetie’.</span><sup data-dcnode-id="2197"><a data-dcnode-id="2198" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Footnote </span></span><span data-dcnode-id="2199" instrument_node="">11</span></a></sup><span data-dcnode-id="2196" instrument_node=""> The Sweetie avatar, posing as a ten-year-old Filipino girl, was used to identify offenders in chatrooms and online forums and operated by an agent of the organisation, whose goal was to gather information on individuals who contacted Sweetie and solicited webcam sex. Moreover, Terre des Hommes started engineering an AI system capable of depicting and acting as Sweetie without human intervention in order to not only identify persistent perpetrators but also to deter first-time offenders.</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2194" instrument_node="">Some other research on preventing crime with the help of computer vision and pattern recognition with supervised machine learning seems outright dangerous.</span><sup data-dcnode-id="2189"><a data-dcnode-id="2190" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Footnote </span></span><span data-dcnode-id="2191" instrument_node="">12</span></a></sup><span data-dcnode-id="2188" instrument_node=""> Research on automated inferring of criminality from facial images based on still facial images of 1,856 real persons (half convicted) yielded the result that there are merely three features for predicting criminality: lip curvature, eye inner corner distance, and nose-mouth angle. The implicit assumptions of the researchers were that, first, the appearance of a person’s face is a function of innate properties, i.e., the understanding that people have an immutable core. Secondly, that ‘criminality’ is an innate property of certain (groups of) people, which can be identified merely by analysing their faces. And thirdly, in the event of the first two assumptions being correct, that the criminal justice system is actually able to reliably determine such ‘criminality’, which implies that courts are (or perhaps should become) laboratories for the precise measurement of people’s faces. The software promising to infer criminality from facial images </span><sup data-dcnode-id="2183"><a data-dcnode-id="2184" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Footnote </span></span><span data-dcnode-id="2185" instrument_node="">13</span></a></sup><span data-dcnode-id="2182" instrument_node=""> in fact illuminated some of the deep-rooted misconceptions about what crime is, and how it is defined, prosecuted, and adjudicated. The once ridiculed phrenology from the nineteenth century hence entered the twenty-first century in new clothes as ‘algorithmic phrenology’, which can legitimise deep-rooted implicit biases about crime.</span><sup data-dcnode-id="2177"><a data-dcnode-id="2178" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Footnote </span></span><span data-dcnode-id="2179" instrument_node="">14</span></a></sup><span data-dcnode-id="2176" instrument_node=""> Two researchers, Wu and Zhang, later admitted that they ‘agree that the pungent word criminality should be put in quotation marks; a caveat about the possible biases in the input data should be issued. Taking a court conviction at its face value, i.e., as the ‘ground truth’ for machine learning, was indeed a serious oversight on our part.’</span><sup data-dcnode-id="2171"><a data-dcnode-id="2172" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Footnote </span></span><span data-dcnode-id="2173" instrument_node="">15</span></a></sup><span data-dcnode-id="2170" instrument_node=""> Nevertheless, their research revealed how, in the near future, further steps along the line of a corporal focus on crime control can reasonably be expected: from the analysis of walking patterns, posture, and facial recognition for identification purposes, to analysis of facial expressions and handwriting patterns for emotion recognition and insight into psychological states.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2167" id="Sec4"><span data-dcnode-id="2168" instrument_node="">Automation in criminal courts</span></h3><p data-dcnode-id="2148"><span data-dcnode-id="2166" instrument_node="">Courts use AI systems to assess the likelihood of recidivism and the likelihood of flight of those awaiting trial, or of offenders in bail and parole procedures. The most analysed and discussed examples come from the USA, which is also where most such software is currently being used.</span><sup data-dcnode-id="2161"><a data-dcnode-id="2162" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Footnote </span></span><span data-dcnode-id="2163" instrument_node="">16</span></a></sup><span data-dcnode-id="2160" instrument_node=""> The Arnold Foundation algorithm, which is being rolled out in 21 jurisdictions in the USA,</span><sup data-dcnode-id="2155"><a data-dcnode-id="2156" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Footnote </span></span><span data-dcnode-id="2157" instrument_node="">17</span></a></sup><span data-dcnode-id="2154" instrument_node=""> uses 1.5 million criminal cases to predict defendants’ behaviour in the pre-trial phase. Florida uses machine learning algorithms to set bail amounts.</span><sup data-dcnode-id="2149"><a data-dcnode-id="2150" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Footnote </span></span><span data-dcnode-id="2151" instrument_node="">18</span></a></sup></p><p data-dcnode-id="2131"><span data-dcnode-id="2147" instrument_node="">A study of 1.36 million pre-trial detention cases showed that a computer could predict whether a suspect would flee or re-offend even better than a human judge.</span><sup data-dcnode-id="2142"><a data-dcnode-id="2143" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Footnote </span></span><span data-dcnode-id="2144" instrument_node="">19</span></a></sup><span data-dcnode-id="2141" instrument_node=""> However, while this data seems persuasive, it is important to consider that the decisions may in fact be less just. There will always be additional facts in a particular case that may be unique and go beyond the forty or so parameters considered by the algorithm in this study which might crucially determine the outcome of the deliberation process. There is thus the inevitable need for </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">ad infinitum</span></i><span data-dcnode-id="2138" instrument_node=""> improvements. Moreover, the problem of selective labelling needs to be considered: we see results only regarding sub-groups that are analysed, only regarding people who have been released. The data that we see is data garnered based on our decisions as regards who to send to pre-trial detention. The researchers themselves pointed out that judges may have a broader set of preferences than the variables that the algorithm focuses on.</span><sup data-dcnode-id="2133"><a data-dcnode-id="2134" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Footnote </span></span><span data-dcnode-id="2135" instrument_node="">20</span></a></sup><span data-dcnode-id="2132" instrument_node=""> Finally, there is the question of what we want to achieve with AI systems, what we would like to ‘optimise’: decreasing crime is an important goal, but not the only goal in criminal justice. The fairness of the procedure is equally significant.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2130" instrument_node="">Several European countries are using automated decision-making systems for justice administration, especially for the allocation of cases to judges, e.g., in Georgia, Poland, Serbia, and Slovakia, and to other public officials, such as enforcement officers in Serbia.</span><sup data-dcnode-id="2125"><a data-dcnode-id="2126" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Footnote </span></span><span data-dcnode-id="2127" instrument_node="">21</span></a></sup><span data-dcnode-id="2124" instrument_node=""> However, while these cases are examples of indirect automated decision-making systems, they may still significantly affect the right to a fair trial. The study </span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">‘alGOVrithms—State of Play’</span></i><span data-dcnode-id="2121" instrument_node=""> showed that none of the four countries using automated decision-making systems for case-allocation allows access to the algorithm and/or the source code.</span><sup data-dcnode-id="2116"><a data-dcnode-id="2117" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Footnote </span></span><span data-dcnode-id="2118" instrument_node="">22</span></a></sup><span data-dcnode-id="2115" instrument_node=""> Independent monitoring and auditing of automated decision-making systems is not possible, as the systems lack basic transparency. The main concern touches on how random these systems actually are, and whether they allow tinkering and can therefore be ‘fooled’. What is even more worrying is that automated decision-making systems used for court management purposes are not transparent even for the judges themselves.</span><sup data-dcnode-id="2110"><a data-dcnode-id="2111" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Footnote </span></span><span data-dcnode-id="2112" instrument_node="">23</span></a></sup></p><p data-dcnode-id="2101"><span data-dcnode-id="2108" instrument_node="">There are several other ongoing developments touching upon courtroom decision-making. In Estonia, the Ministry of Justice is financing a team to design a robot judge which could adjudicate small claims disputes of less than €7,000.</span><sup data-dcnode-id="2103"><a data-dcnode-id="2104" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Footnote </span></span><span data-dcnode-id="2105" instrument_node="">24</span></a></sup><span data-dcnode-id="2102" instrument_node=""> In concept, the two parties will upload documents and other relevant information, and the AI will issue a decision against which an appeal with a human judge may be lodged.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2099" id="Sec5"><span data-dcnode-id="2100" instrument_node="">Automation in prisons</span></h3><p data-dcnode-id="2092"><span data-dcnode-id="2098" instrument_node="">New tools are used in various ways in the post-conviction stage. In prisons, AI is increasingly being used for the automation of security as well as for the rehabilitative aspect of prisonisation. A&nbsp;prison that houses some of China’s most high-profile criminals is reportedly installing an AI network that will be able to recognise and track every prisoner around the clock and alert guards if anything seems out of place.</span><sup data-dcnode-id="2093"><a data-dcnode-id="2094" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Footnote </span></span><span data-dcnode-id="2095" instrument_node="">25</span></a></sup></p><p data-dcnode-id="2066"><span data-dcnode-id="2091" instrument_node="">These systems are also used to ascertain the criminogenic needs of offenders that can be changed through treatment, and to monitor interventions in sentencing procedures.</span><sup data-dcnode-id="2086"><a data-dcnode-id="2087" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Footnote </span></span><span data-dcnode-id="2088" instrument_node="">26</span></a></sup><span data-dcnode-id="2085" instrument_node=""> In Finnish prisons the training of inmates encompasses AI training algorithms.</span><sup data-dcnode-id="2080"><a data-dcnode-id="2081" href="#Fn27"><span class="u-visually-hidden" data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Footnote </span></span><span data-dcnode-id="2082" instrument_node="">27</span></a></sup><span data-dcnode-id="2079" instrument_node=""> The inmates help to classify and answer simple questions in user studies, e.g., reviewing pieces of content collected from social media and from around the internet. The work is supposed to benefit Vainu, the company organising the prison work, while also providing prisoners with new job-related skills that could help them successfully re-enter society after they serve their sentences. Similarly, in England and Wales, the government has announced new funding for prisoners to be trained in coding as part of a £1.2m package to help under-represented groups get into such work.</span><sup data-dcnode-id="2074"><a data-dcnode-id="2075" href="#Fn28"><span class="u-visually-hidden" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Footnote </span></span><span data-dcnode-id="2076" instrument_node="">28</span></a></sup><span data-dcnode-id="2073" instrument_node=""> Some scholars are even discussing the possibility of using AI to address the solitary confinement crisis in the USA by employing smart assistants, similar to Amazon’s Alexa, as a form of ‘confinement companions’ for prisoners. While the ‘companions’ may alleviate some of the psychological stress for some prisoners, the focus on the ‘surface’ of the problem of solitary confinement conceals the debate about the aggravating harm of such confinement,</span><sup data-dcnode-id="2068"><a data-dcnode-id="2069" href="#Fn29"><span class="u-visually-hidden" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Footnote </span></span><span data-dcnode-id="2070" instrument_node="">29</span></a></sup><span data-dcnode-id="2067" instrument_node=""> and actually contributes to the legitimisation of solitary confinement penal policy. The shift from the real problem seems outrageous on its own.</span></p></div></div></section><section data-dcnode-id="1785" data-title="Encounters between AI systems and the law"><div class="c-article-section" data-dcnode-id="1786" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2061" id="Sec6"><span data-dcnode-id="2062" instrument_node="">Encounters between AI systems and the law</span></h2><div class="c-article-section__content" data-dcnode-id="1787" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="2059" id="Sec7"><span data-dcnode-id="2060" instrument_node="">Due process of law and AI systems in the USA</span></h3><p data-dcnode-id="2025"><span data-dcnode-id="2058" instrument_node="">In the American context, which is where most actual employment of AI systems in criminal justice has so far occurred, the decision on a risk assessment algorithm in the judgment in </span><i data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Loomis v. Wisconsin</span></i><span data-dcnode-id="2055" instrument_node=""> (2016), entitled Correctional Offender Management Profiling for Alternative Sanctions (COMPAS), was a sobering one.</span><sup data-dcnode-id="2050"><a data-dcnode-id="2051" href="#Fn30"><span class="u-visually-hidden" data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Footnote </span></span><span data-dcnode-id="2052" instrument_node="">30</span></a></sup><span data-dcnode-id="2049" instrument_node=""> The COMPAS algorithm identified Loomis as an individual who presented a high risk to society due to a high risk of re-offending and the first instance court decided to refuse his request to be released on parole. In the appeal, the Supreme Court of Wisconsin decided that the recommendation from the COMPAS algorithm was not the sole grounds for refusing his request to be released on parole and hence the decision of the court did </span><i data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">not</span></i><span data-dcnode-id="2046" instrument_node=""> violate Loomis’s due process right. By confirming the constitutionality of the recommendation risk assessment algorithm, the Supreme Court of Wisconsin neglected the strength of the ‘automation bias’.</span><sup data-dcnode-id="2041"><a data-dcnode-id="2042" href="#Fn31"><span class="u-visually-hidden" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Footnote </span></span><span data-dcnode-id="2043" instrument_node="">31</span></a></sup><span data-dcnode-id="2040" instrument_node=""> By claiming that the lower court had the possibility to depart from the proposed algorithmic risk assessment, the Court ignored the social psychology and human-computer interaction research on the biases involved in </span><i data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">all</span></i><span data-dcnode-id="2037" instrument_node=""> algorithmic decision-making systems, which show that once a high-tech tool offers a recommendation it becomes extremely burdensome for a human decision-maker to refute such a ‘recommendation’.</span><sup data-dcnode-id="2032"><a data-dcnode-id="2033" href="#Fn32"><span class="u-visually-hidden" data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Footnote </span></span><span data-dcnode-id="2034" instrument_node="">32</span></a></sup><span data-dcnode-id="2031" instrument_node=""> Decision-makers regularly rate automated recommendations more positively than neutral despite being aware that such recommendations may be inaccurate, incomplete, or even wrong.</span><sup data-dcnode-id="2026"><a data-dcnode-id="2027" href="#Fn33"><span class="u-visually-hidden" data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Footnote </span></span><span data-dcnode-id="2028" instrument_node="">33</span></a></sup></p><p data-dcnode-id="2002"><span data-dcnode-id="2024" instrument_node="">In the judgment in </span><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Kansas v. Walls</span></i><span data-dcnode-id="2021" instrument_node=""> (2017),</span><sup data-dcnode-id="2016"><a data-dcnode-id="2017" href="#Fn34"><span class="u-visually-hidden" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Footnote </span></span><span data-dcnode-id="2018" instrument_node="">34</span></a></sup><span data-dcnode-id="2015" instrument_node=""> the Court of Appeals of the State of Kansas reached the opposite finding to </span><i data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Loomis</span></i><span data-dcnode-id="2012" instrument_node=""> and decided that the defendant must be allowed access to the complete diagnostic Level of Service Inventory-Revised (LSI-R) assessment, which the court relied on in deciding what probation conditions to impose on him. The Court of Appeals decided that by refusing the defendant access to his LSI-R assessment the district court denied him the opportunity to challenge the accuracy of the information that the court was required to rely on in determining the conditions of his probation. By referring to the judgment in </span><i data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Kansas v. Easterling</span></i><span data-dcnode-id="2009" instrument_node="">,</span><sup data-dcnode-id="2004"><a data-dcnode-id="2005" href="#Fn35"><span class="u-visually-hidden" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Footnote </span></span><span data-dcnode-id="2006" instrument_node="">35</span></a></sup><span data-dcnode-id="2003" instrument_node=""> the Court of Appeals decided the district court’s failure to give the defendant a copy of the entire LSI-R deprived him of his constitutional right to procedural due process in the sentencing phase of his criminal proceedings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2000" id="Sec8"><span data-dcnode-id="2001" instrument_node="">Human rights compliance of AI systems in the EU</span></h3><p data-dcnode-id="1960"><span data-dcnode-id="1999" instrument_node="">AI systems have a significant impact on human rights ‘that engage state obligations vis-à-vis human rights.’</span><sup data-dcnode-id="1994"><a data-dcnode-id="1995" href="#Fn36"><span class="u-visually-hidden" data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Footnote </span></span><span data-dcnode-id="1996" instrument_node="">36</span></a></sup><span data-dcnode-id="1993" instrument_node=""> Since the data deluge has reached all social domains and algorithmic systems increasingly permeate various aspects of contemporary life,</span><sup data-dcnode-id="1988"><a data-dcnode-id="1989" href="#Fn37"><span class="u-visually-hidden" data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Footnote </span></span><span data-dcnode-id="1990" instrument_node="">37</span></a></sup><span data-dcnode-id="1987" instrument_node=""> human rights compliance can no longer be seen as the exclusive domain of privacy and personal data protection </span><sup data-dcnode-id="1982"><a data-dcnode-id="1983" href="#Fn38"><span class="u-visually-hidden" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Footnote </span></span><span data-dcnode-id="1984" instrument_node="">38</span></a></sup><span data-dcnode-id="1981" instrument_node=""> and non-discrimination and equality law.</span><sup data-dcnode-id="1976"><a data-dcnode-id="1977" href="#Fn39"><span class="u-visually-hidden" data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Footnote </span></span><span data-dcnode-id="1978" instrument_node="">39</span></a></sup><span data-dcnode-id="1975" instrument_node=""> Automated systems have been introduced to replace humans in the banking, insurance, education, and employment sectors, as well as in armed conflicts. They have influenced general elections and core democratic processes. Personal data protection regime is thus not sufficient to address all of the challenges as regards ensuring the compliance of AI systems with human rights. The human rights implications are then necessarily manifold, as the Committee of Experts on Internet Intermediaries (MSI-NET) at the Council of Europe</span><sup data-dcnode-id="1970"><a data-dcnode-id="1971" href="#Fn40"><span class="u-visually-hidden" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Footnote </span></span><span data-dcnode-id="1972" instrument_node="">40</span></a></sup><span data-dcnode-id="1969" instrument_node=""> rightly acknowledges. The human rights that may be impacted through the use of automated processing techniques and algorithms are: (1)&nbsp;the right to a fair trial and due process, (2) privacy and data protection, (3) freedom of expression, (4) freedom of assembly and association, (5) the right to an effective remedy, (6)&nbsp;the prohibition of discrimination, (7) social rights and access to public services, and (8) the right to free elections. Moreover, as fundamental freedoms are interdependent and interrelated, </span><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">all human rights</span></i><span data-dcnode-id="1966" instrument_node=""> are potentially impacted by the use of algorithmic technologies, e.g., in education, social welfare, democracy, and judicial systems. The developments with the AI used in social systems and domains may even ‘disrupt the very concept of human rights as protective shields against state interference.’</span><sup data-dcnode-id="1961"><a data-dcnode-id="1962" href="#Fn41"><span class="u-visually-hidden" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Footnote </span></span><span data-dcnode-id="1963" instrument_node="">41</span></a></sup></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1958" id="Sec9"><span data-dcnode-id="1959" instrument_node="">Equality and discrimination</span></h4><p data-dcnode-id="1935"><span data-dcnode-id="1957" instrument_node="">Over-policing, as the most visible example of discrimination stemming from predictive policing programmes, occurs when the police patrol areas with more crime, which in turn amplifies the need to police areas already policed. It is a prime example of the ‘vicious circle’ effect of the use of machine learning in the crime control domain.</span><sup data-dcnode-id="1952"><a data-dcnode-id="1953" href="#Fn42"><span class="u-visually-hidden" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Footnote </span></span><span data-dcnode-id="1954" instrument_node="">42</span></a></sup><span data-dcnode-id="1951" instrument_node=""> However, under-policing is even more critical, as the police do not scrutinise some areas as much as others, which leads to a disproportionate feeling and experience of justice. Some types of crime are then more likely to be prosecuted than others and the central principle of legality—the requirement that all crimes be prosecuted </span><i data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">ex officio</span></i><span data-dcnode-id="1948" instrument_node="">, as opposed to the principle of opportunity, by which prosecutors decide on prosecution at their own discretion, is thus not respected.</span><sup data-dcnode-id="1943"><a data-dcnode-id="1944" href="#Fn43"><span class="u-visually-hidden" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Footnote </span></span><span data-dcnode-id="1945" instrument_node="">43</span></a></sup><span data-dcnode-id="1942" instrument_node=""> The use of predictive software to ascertain the treatment of perpetrators of white-collar crimes may neglect the fact that the enculturation of such offenders did not fail in any meaningful way.</span><sup data-dcnode-id="1937"><a data-dcnode-id="1938" href="#Fn44"><span class="u-visually-hidden" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Footnote </span></span><span data-dcnode-id="1939" instrument_node="">44</span></a></sup><span data-dcnode-id="1936" instrument_node=""> On the contrary, such offenders are typically distinguished and respected citizens, e.g., CEOs, physicians, judges, or university professors. Critical criminologists have shown how the definition of crime itself—and even more so the prosecution of crime—is inherently political: law enforcement agencies are forced to make ‘political’ decisions about which crime to prosecute and investigate due to limited resources and personnel. They prioritise activities either explicitly or implicitly. Inequality in predictive policing then changes the perception of what counts as ‘serious crime’ in the first place. Hedge fund operations with sub-prime mortgages packaged in ‘derivatives’ are then reduced to unfortunate ‘bad luck’, despite impoverishing large parts of the population as their savings or equity evaporate. Predictive policing software has not been able to capture this important shift.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1933" id="Sec10"><span data-dcnode-id="1934" instrument_node="">Personal data protection</span></h4><p data-dcnode-id="1925"><span data-dcnode-id="1932" instrument_node="">With regard to the implications of the use of AI systems for personal data protection, the set of barriers to the adverse impacts of AI systems includes rights, such as the explicit consent of data subjects to the processing of their personal data, the data minimisation principle, the principle of purpose limitation, and the set of rights relating to when automated decision-making is allowed. The General Data Protection Directive (henceforth GDPR)</span><sup data-dcnode-id="1927"><a data-dcnode-id="1928" href="#Fn45"><span class="u-visually-hidden" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Footnote </span></span><span data-dcnode-id="1929" instrument_node="">45</span></a></sup><span data-dcnode-id="1926" instrument_node=""> offers some points of reference here. In cases of automated processing, the data controller must implement suitable measures to safeguard the data subject’s rights and freedoms and legitimate interests, for instance by ensuring him or her the right to obtain human intervention on the part of the controller, to express his or her point of view, and to contest the decision (Art.&nbsp;22, para.&nbsp;3 of the GDPR). The GDPR includes the right of the data subject to receive ‘meaningful information about the logic involved’ in automated processing. (See Arts. 13, 14, and 15.)</span></p><p data-dcnode-id="1917"><span data-dcnode-id="1924" instrument_node="">Automated decisions, which produce adverse legal effects concerning the data subject or significantly affect him or her, are prohibited pursuant to Article 11 of the Law Enforcement Directive</span><sup data-dcnode-id="1919"><a data-dcnode-id="1920" href="#Fn46"><span class="u-visually-hidden" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Footnote </span></span><span data-dcnode-id="1921" instrument_node="">46</span></a></sup><span data-dcnode-id="1918" instrument_node=""> (henceforth ‘Law Enforcement Directive’), unless they are authorised by Union or Member State law, which also has to ensure appropriate safeguards for the rights and freedoms of the data subject. In line with the provisions of the Law Enforcement Directive, judicial decisions made entirely by an algorithmic tool can never be legal.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1915" id="Sec11"><span data-dcnode-id="1916" instrument_node="">The right to a fair trial</span></h4><p data-dcnode-id="1895"><span data-dcnode-id="1914" instrument_node="">The use of algorithms in criminal justice systems raises serious concerns with regard to Article 6 (concerning the right to a fair trial) of the European Convention on Human Rights </span><sup data-dcnode-id="1909"><a data-dcnode-id="1910" href="#Fn47"><span class="u-visually-hidden" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Footnote </span></span><span data-dcnode-id="1911" instrument_node="">47</span></a></sup><span data-dcnode-id="1908" instrument_node=""> and Article 47 of the Charter,</span><sup data-dcnode-id="1903"><a data-dcnode-id="1904" href="#Fn48"><span class="u-visually-hidden" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Footnote </span></span><span data-dcnode-id="1905" instrument_node="">48</span></a></sup><span data-dcnode-id="1902" instrument_node=""> and the principle of the equality of arms and adversarial proceedings as established by the European Court of Human Rights.</span><sup data-dcnode-id="1897"><a data-dcnode-id="1898" href="#Fn49"><span class="u-visually-hidden" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Footnote </span></span><span data-dcnode-id="1899" instrument_node="">49</span></a></sup><span data-dcnode-id="1896" instrument_node=""> The fair trial standards contained in Article 6 of the ECHR guarantee the accused the right to participate effectively in the trial and include the presumption of innocence, the right to be informed promptly of the cause and nature of the accusation, the right to a fair hearing and the right to defend oneself in person.</span></p><p data-dcnode-id="1857"><span data-dcnode-id="1894" instrument_node="">The right to effective participation may be violated in a variety of different situations, ranging from poor acoustics in the courtroom </span><sup data-dcnode-id="1889"><a data-dcnode-id="1890" href="#Fn50"><span class="u-visually-hidden" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Footnote </span></span><span data-dcnode-id="1891" instrument_node="">50</span></a></sup><span data-dcnode-id="1888" instrument_node=""> to preventing the accused from being present at the trial or from examining a witness testifying against him or her.</span><sup data-dcnode-id="1883"><a data-dcnode-id="1884" href="#Fn51"><span class="u-visually-hidden" data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Footnote </span></span><span data-dcnode-id="1885" instrument_node="">51</span></a></sup><span data-dcnode-id="1882" instrument_node=""> The latter is also one of the minimal guarantees of a fair trial contained in Art.&nbsp;6, para.&nbsp;3 and normally requires that all evidence against the accused be produced in his or her presence at a public hearing, which gives the defendant an effective opportunity to challenge the evidence against him or her.</span><sup data-dcnode-id="1877"><a data-dcnode-id="1878" href="#Fn52"><span class="u-visually-hidden" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Footnote </span></span><span data-dcnode-id="1879" instrument_node="">52</span></a></sup><span data-dcnode-id="1876" instrument_node=""> The right to confrontation does not apply merely to witnesses, as the term is usually understood under national law, since it has an autonomous meaning in the Convention system that goes beyond its ordinary meaning and also includes experts, expert witnesses, and victims. In any case in which the deposition serves to a material degree as the basis for the conviction of the defendant, it constitutes evidence for the prosecution to which the Convention guarantees apply.</span><sup data-dcnode-id="1871"><a data-dcnode-id="1872" href="#Fn53"><span class="u-visually-hidden" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Footnote </span></span><span data-dcnode-id="1873" instrument_node="">53</span></a></sup><span data-dcnode-id="1870" instrument_node=""> The right enshrined in Article 6(3)(d) can even be applied to documentary evidence </span><sup data-dcnode-id="1865"><a data-dcnode-id="1866" href="#Fn54"><span class="u-visually-hidden" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Footnote </span></span><span data-dcnode-id="1867" instrument_node="">54</span></a></sup><span data-dcnode-id="1864" instrument_node=""> and computer files </span><sup data-dcnode-id="1859"><a data-dcnode-id="1860" href="#Fn55"><span class="u-visually-hidden" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Footnote </span></span><span data-dcnode-id="1861" instrument_node="">55</span></a></sup><span data-dcnode-id="1858" instrument_node=""> relevant to the criminal accusations against the defendant. Therefore, in order to ensure effective participation in a trial, the defendant must also be able to challenge the algorithmic score that is the basis of his or her conviction.</span></p><p data-dcnode-id="1841"><span data-dcnode-id="1856" instrument_node="">However, the right to confrontation is not absolute and may be restricted if certain conditions are met. The traditional approach of the European Court of Human Rights was that the right to a fair trial was violated if a conviction was based either solely or to a decisive degree on an uncontested statement (the ‘sole or decisive rule’).</span><sup data-dcnode-id="1851"><a data-dcnode-id="1852" href="#Fn56"><span class="u-visually-hidden" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Footnote </span></span><span data-dcnode-id="1853" instrument_node="">56</span></a></sup><span data-dcnode-id="1850" instrument_node=""> However, in </span><i data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Al Khawaja and Tahery</span></i><span data-dcnode-id="1847" instrument_node=""> the Court partially departed from its previous jurisprudence, stating that the admission of untested evidence will not automatically result in a breach of Article 6 (1): when assessing the overall fairness of a trial, the European Court of Human Rights has to consider whether it was necessary to admit such evidence and whether there were sufficient counterbalancing factors, including strong procedural safeguards.</span><sup data-dcnode-id="1842"><a data-dcnode-id="1843" href="#Fn57"><span class="u-visually-hidden" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Footnote </span></span><span data-dcnode-id="1844" instrument_node="">57</span></a></sup></p><p data-dcnode-id="1830"><span data-dcnode-id="1840" instrument_node="">The problems posed by AI systems are very similar to those presented by anonymous witnesses or undisclosed documentary evidence as AI systems are opaque (as discussed in the introduction). At least some degree of disclosure is necessary in order to ensure a defendant has the opportunity to challenge the evidence against him or her and to counterbalance the burden of anonymity. Absent or anonymous witnesses, although not </span><i data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">per se</span></i><span data-dcnode-id="1837" instrument_node=""> incompatible with the right to a fair trial, can only participate in a criminal procedure as a measure of last resort and under strict conditions ensuring that the defendant is not placed at a disadvantage. Such a rule should be applied to the use of AI systems used in criminal justice settings. A&nbsp;fair balance should be struck between the right to participate effectively in the trial, on the one hand, and the use of opaque AI systems designed to help judges arrive at more accurate assessments of the defendant’s future conduct, on the other.</span><sup data-dcnode-id="1832"><a data-dcnode-id="1833" href="#Fn58"><span class="u-visually-hidden" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Footnote </span></span><span data-dcnode-id="1834" instrument_node="">58</span></a></sup><span data-dcnode-id="1831" instrument_node=""> The right to cross-examine witnesses should be interpreted so as to also encompass the right to examine the data and the underlying rules of the risk-scoring methodology. In probation procedures, such a right should entail ensuring it is possible for a convicted person to question the model applied—from the data fed into the algorithm to the overall model design.</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">The use of algorithmic tools in criminal procedure could also violate some other aspects of the right to a fair trial, in particular the right to a randomly selected judge, the right to an independent and impartial tribunal, and the presumption of innocence.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1826" id="Sec12"><span data-dcnode-id="1827" instrument_node="">Presumption of innocence</span></h4><p data-dcnode-id="1819"><span data-dcnode-id="1825" instrument_node="">Besides affecting many dimensions of inequality, AI decision-making systems may collide with several other fundamental liberties. Similar to ‘redlining’, the ‘sleeping terrorist’ concept used in German anti-terrorist legislation infringed upon the presumption of innocence. The mere probability of a match between the attributes of known terrorists and a ‘sleeping’ one directs the watchful eye of the state to the individual. O’Neil offers the illustrative example of the case of Robert McDaniel, a twenty-two-year-old high school student who received increased police attention due to a predictive programme’s analysis of his social network and residence in a poor and dangerous neighbourhood: ‘… he was unlucky. He has been surrounded by crime, and many of his acquaintances have gotten caught up in it. And largely because of these circumstances—and not his own actions—he has been deemed dangerous. Now the police have their eye on him.’</span><sup data-dcnode-id="1820"><a data-dcnode-id="1821" href="#Fn59"><span class="u-visually-hidden" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Footnote </span></span><span data-dcnode-id="1822" instrument_node="">59</span></a></sup></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1817" id="Sec13"><span data-dcnode-id="1818" instrument_node="">Effective remedy</span></h4><p data-dcnode-id="1806"><span data-dcnode-id="1816" instrument_node="">Automated techniques and algorithms used for crime prevention purposes facilitate forms of secret surveillance and ‘data-veillance’ that are impossible for the affected individual to know about. The European Court of Human Rights has underlined that the absence of notification at any point undermines the effectiveness of remedies against such measures.</span><sup data-dcnode-id="1811"><a data-dcnode-id="1812" href="#Fn60"><span class="u-visually-hidden" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Footnote </span></span><span data-dcnode-id="1813" instrument_node="">60</span></a></sup><span data-dcnode-id="1810" instrument_node=""> The right to an effective remedy implies the right to a reasoned and individual decision. Article 13 of the European Convention on Human Rights stipulates that everyone whose rights have been violated shall have an effective remedy before a national authority. The available remedy should be effective in practice and in law. As noted in the </span><i data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Study on the Human Rights Dimensions of Automated Data Processing Techniques</span></i><span data-dcnode-id="1807" instrument_node="">: </span></p><blockquote class="c-blockquote" data-dcnode-id="1797"><div class="c-blockquote__body" data-dcnode-id="1798"><p data-dcnode-id="1799"><span data-dcnode-id="1805" instrument_node="">Automated decision-making processes lend themselves to particular challenges for individuals’ ability to obtain effective remedy. These include the opaqueness of the decision itself, its basis, and whether the individuals have consented to the use of their data in making this decision, or are even aware of the decision affecting them. The difficulty in assigning responsibility for the decision also complicates individuals’ understanding of whom to turn to [to] address the decision. The nature of decisions being made automatic, without or with little human input, and with a primacy placed on efficiency rather than human-contextual thinking, means that there is an even larger burden on the organisations employing such systems to provide affected individuals with a way to obtain [a] remedy.</span><sup data-dcnode-id="1800"><a data-dcnode-id="1801" href="#Fn61"><span class="u-visually-hidden" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Footnote </span></span><span data-dcnode-id="1802" instrument_node="">61</span></a></sup></p></div></blockquote><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1795" id="Sec14"><span data-dcnode-id="1796" instrument_node="">Other rights</span></h4><p data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">New notions in the pre-emptive crime paradigm, such as ‘sleeping terrorist’, are in collision with the principle of legality, i.e., </span><i data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">lex certa</span></i><span data-dcnode-id="1791" instrument_node="">, which requires the legislature to define a criminal offence in a substantially specific manner. Standards of proof are thresholds for state interventions into individual rights. However, the new language of mathematics, which helps define new categories, such as ‘person of interest’, re-directs law enforcement agency activities towards individuals not yet considered ‘suspects’. The new notions being invented contravene the established standards of proof in criminal procedure.</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">AI systems should respect a certain set of rights pertaining to tribunals, i.e., the right to a randomly selected judge, which requires that the criteria determining which court—and which specific judge thereof—is competent to hear the case, be clearly established in advance (the rule governing the allocation of cases to a particular judge within the competent court, thus preventing ‘forum shopping’), and the right to an independent and impartial tribunal (as discussed in the section on automation in criminal courts).</span></p></div></div></section><section data-dcnode-id="1704" data-title="Discussion: toward solutions"><div class="c-article-section" data-dcnode-id="1705" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1783" id="Sec15"><span data-dcnode-id="1784" instrument_node="">Discussion: toward solutions</span></h2><div class="c-article-section__content" data-dcnode-id="1706" id="Sec15-content"><p data-dcnode-id="1769"><span data-dcnode-id="1782" instrument_node="">How should we design human-rights-compliant AI systems that respect the rule of law standards of the ‘analogue world’? The trend to ‘algorithms’ everything has raised the interest of policymakers. They share concern over the impact of algorithms on fundamental liberties and how to make ‘algorithms accountable’. In the European context, the Council of Europe’s European Commission for the Efficiency of Justice (CEPEJ) adopted the ‘European Charter on the Use of AI in Judicial Systems’ at the end of 2018 to mitigate the above-mentioned risks specifically in the justice sector.</span><sup data-dcnode-id="1777"><a data-dcnode-id="1778" href="#Fn62"><span class="u-visually-hidden" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Footnote </span></span><span data-dcnode-id="1779" instrument_node="">62</span></a></sup><span data-dcnode-id="1776" instrument_node=""> Similar concerns can be noticed elsewhere in the world, most notably in the USA, where the New York City Council was the first to pass a law on algorithmic decision-making transparency.</span><sup data-dcnode-id="1771"><a data-dcnode-id="1772" href="#Fn63"><span class="u-visually-hidden" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Footnote </span></span><span data-dcnode-id="1773" instrument_node="">63</span></a></sup><span data-dcnode-id="1770" instrument_node=""> The law sets up a task force to monitor the fairness and validity of the algorithms used by municipal agencies.</span></p><p data-dcnode-id="1764"><span data-dcnode-id="1768" instrument_node="">The use of AI in criminal justice and policing potentially affects several criminal procedure rights: the presumption of innocence; the right to a fair trial (including the equality of arms in judicial proceedings, the right to cross-examine witnesses); the right to an independent and impartial tribunal (including the right to a randomly selected judge); the principle of non-discrimination and equality; and the principle of legality (i.e., </span><i data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">lex certa</span></i><span data-dcnode-id="1765" instrument_node="">), and blurs the existing standards of proof.</span></p><p data-dcnode-id="1759"><span data-dcnode-id="1763" instrument_node="">AI is becoming even more complex with the concept of deep learning with artificial neural networks. Further technological developments might improve this (e.g., the ongoing research on ‘explainable AI’ may remedy the opacity of current AI approaches), but for the time being </span><i data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">transparency</span></i><span data-dcnode-id="1760" instrument_node=""> is not much more than an illusion.</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">There is a sentiment that A.I. tools will vaporise the biases and mental shortcuts (heuristics) inherent to human judgment and reasoning. This is a powerful reason why AI technologies have too quickly been given too much power to tackle and solve essentially social (and not technological) problems. Social scientists, including lawyers, must engage more intensively with computer and data scientists in order to build a human-rights-compliant approach.</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1756" instrument_node="">Listing the relevant fundamental rights and analysing case studies may be of great benefit as regards the human rights compliance of the novel systems that may be used in the future. However, we may still find </span><i data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">any</span></i><span data-dcnode-id="1753" instrument_node=""> list inadequate. When a process of deciding by automated means involves the use of automated reasoning to aid or replace a decision-making process that would otherwise be performed by humans, </span><i data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">any human right</span></i><span data-dcnode-id="1750" instrument_node=""> may be affected depending on the social domain in which the systems are employed.</span></p><p data-dcnode-id="1742"><span data-dcnode-id="1748" instrument_node="">Listing possible actors in the chain of building and employing AI systems may also lead to all-encompassing lists of state and private sector actors. The deepening of the digital ecosystem has led to a situation where responsibilities are becoming increasingly spread to a number of dependant actors. We can map responsibility in several ways: from the obligations of states to the obligations of the private sector; from data preparation to writing algorithm code (how data is cleaned and prepared, which data is taken in and used, and which data is left out of the calculus, etc.); from algorithmic design and development to implementation processes, etc. With the deepening of the digital ecosystem it becomes much more burdensome to determine who is responsible for certain data intake and algorithmic output. The acts committed might not even reach the existing thresholds of accountability. It may even be unjust to hold an actor accountable for the consequences of activities that are generally of great benefit to a society. An actor may be generating a risk our societies are willing to accept as ‘socially permissible risk’.</span><sup data-dcnode-id="1743"><a data-dcnode-id="1744" href="#Fn64"><span class="u-visually-hidden" data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Footnote </span></span><span data-dcnode-id="1745" instrument_node="">64</span></a></sup></p><p data-dcnode-id="1728"><span data-dcnode-id="1741" instrument_node="">One way forward is to learn from experiments from domains other than that of justice. In her succinct analysis of automated welfare systems in the USA, Eubanks</span><sup data-dcnode-id="1736"><a data-dcnode-id="1737" href="#Fn65"><span class="u-visually-hidden" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Footnote </span></span><span data-dcnode-id="1738" instrument_node="">65</span></a></sup><span data-dcnode-id="1735" instrument_node=""> shows how removing human discretion from public assistance eligibility assessment seemed like a compelling solution to ending discrimination against African-Americans in the welfare system. If human decision-makers are biased, then moving towards eliminating humans from the decision-making loop seems logical. However, despite the fact that such a move towards automation and the elimination of the human from the decision-making process may intuitively feel like the right move to make, the experiences that Eubanks uncovered show that this may well be counterproductive. What advocates of automated decision-making systems neglect is the importance of the ability to bend the rules and re-interpret them according to social circumstances.</span><sup data-dcnode-id="1730"><a data-dcnode-id="1731" href="#Fn66"><span class="u-visually-hidden" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Footnote </span></span><span data-dcnode-id="1732" instrument_node="">66</span></a></sup><span data-dcnode-id="1729" instrument_node=""> Removing human discretion thus is a double-edged sword: it can reduce human bias, but it can also exacerbate past injustices or produce new ones.</span></p><p data-dcnode-id="1709"><span data-dcnode-id="1727" instrument_node="">Similarly, in Turkle’s analysis of the social acceptability of computerised decision-making systems, she claims that when a system is perceived as discriminatory and one that creates racially disparate outcomes in sentencing, disadvantaged African Americans would choose a computerised judge rather than a human judge.</span><sup data-dcnode-id="1722"><a data-dcnode-id="1723" href="#Fn67"><span class="u-visually-hidden" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Footnote </span></span><span data-dcnode-id="1724" instrument_node="">67</span></a></sup><span data-dcnode-id="1721" instrument_node=""> After all, human judges tend to be white middle-aged men. The ‘tough on crime’ laws that established mandatory minimum sentences for many categories of crime and removed part of judges’ discretion did make US criminal justice fairer—but all defendants were hit hard and prisons soon became overcrowded. Ironically, writes Eubanks,</span><sup data-dcnode-id="1716"><a data-dcnode-id="1717" href="#Fn68"><span class="u-visually-hidden" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Footnote </span></span><span data-dcnode-id="1718" instrument_node="">68</span></a></sup><span data-dcnode-id="1715" instrument_node=""> the adoption of ‘tough on crime’ laws were a result of organising by both conservative ‘law-and-order’ types and by some progressive civil rights activists who saw the bias in judicial discretion. However, the evidence of the past thirty years is different: racial disparity in the criminal justice system has worsened, and mandatory sentencing laws and guidelines have put sentencing on autopilot.</span><sup data-dcnode-id="1710"><a data-dcnode-id="1711" href="#Fn69"><span class="u-visually-hidden" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Footnote </span></span><span data-dcnode-id="1712" instrument_node="">69</span></a></sup></p><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Lastly, the impacts of AI systems extend beyond human rights. Their impacts may have distorting effects on the fundamental cornerstones and architecture of liberal democracies, i.e., regarding the principle of the separation of powers and the limitation of political power by the rule of law.</span></p></div></div></section><span data-dcnode-id="1703" instrument_node="">
</span><section data-dcnode-id="1063" data-title="Notes"><div class="c-article-section" data-dcnode-id="1064" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1701" id="notes"><span data-dcnode-id="1702" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1065" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1066"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1688" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1689"><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Among the several definitions of AI, the definition of the Commissioner for Human Rights is used herein: </span></p><blockquote class="c-blockquote" data-dcnode-id="1695"><div class="c-blockquote__body" data-dcnode-id="1696"><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">‘An AI system is a machine-based system that makes recommendations, predictions or decisions for a given set of objectives. It does so by: (i) utilising machine and/or human-based inputs to perceive real and/or virtual environments; (ii) abstracting such perceptions into models manually or automatically; and (iii) deriving outcomes from these models, whether by human or automated means, in the form of recommendations, predictions or decisions.’</span></p></div></blockquote><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node=""> The Council of Europe Commissioner for Human Rights [</span><a aria-label="Reference 35" data-dcnode-id="1692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d254052316e369" title="
