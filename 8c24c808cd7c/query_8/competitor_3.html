</span><h1 class="page-title" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Help Stop Human Trafficking</span></h1><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">For many convenience retailers, putting a stop to human trafficking is a serious responsibility. With close ties to the community, stores are positioned to share important messages that employees and customers can use to raise awareness against trafficking and help victims.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">“As a convenience store owner, I care about the community and our staff cares about the community. We can spot when something isn’t right, and sometimes that is human trafficking,” said Kent Couch, CEO of the Stop and Go convenience store in Bend, Oregon.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">Couch became involved with In Our Backyard, a national nonprofit known for its anti-trafficking work that operates the </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Operations/Security-Safety/Human-Trafficking/Recognize-and-Support-Victims-of-Human-Trafficking"><span data-dcnode-id="794" instrument_node="">Convenience Stores Against Trafficking</span></a><span data-dcnode-id="792" instrument_node=""> (CSAT) program. “We wanted to make a difference in our community and keep it safe,” he said.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The restroom is often the only safe place where a victim is alone and able to call or text for help. CSAT’s “Freedom Stickers” are designed to be posted in restroom stalls and contain the National Human Trafficking Hotline number, 888-373-7888, or text INFO or HELP to BeFree (233733).</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Human trafficking survivor Sara Perkins shares in a joint CSAT and Ready Training Online </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//inourbackyard.org/training/" target="_blank"><span data-dcnode-id="785" instrument_node="">training video</span></a><span data-dcnode-id="783" instrument_node=""> that she frequented convenience stores multiple times a day. “As a victim, I know that if I had gone into any bathroom and saw an In Our Backyard sticker it would’ve been an open door for me to get the help I needed,” she said.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">NACS members also access free resources from the U.S. Department of Homeland Security’s </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Community/Support-Victims-of-Human-Trafficking-with-In-Store"><span data-dcnode-id="779" instrument_node="">Blue Campaign</span></a><span data-dcnode-id="777" instrument_node="">, including the </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Community/Support-Victims-of-Human-Trafficking-with-In-Store/Human-Trafficking-Awareness-Guide"><span data-dcnode-id="776" instrument_node="">Human Trafficking Awareness Guide for Convenience Retail Employees</span></a><span data-dcnode-id="774" instrument_node="">.</span></p><span data-dcnode-id="772" instrument_node="">

</span><span class="ajax__tab ajax__tab_active" data-dcnode-id="579" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab1_tab"><span class="ajax__tab_outer" data-dcnode-id="580"><span class="ajax__tab_inner" data-dcnode-id="581"><a class="ajax__tab_tab" data-dcnode-id="582" href="#" id="__tab_p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab1" style="text-decoration:none;"><span data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Signs of Human Trafficking</span></span></a></span></span></span><span class="ajax__tab" data-dcnode-id="573" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab2_tab"><span class="ajax__tab_outer" data-dcnode-id="574"><span class="ajax__tab_inner" data-dcnode-id="575"><a class="ajax__tab_tab" data-dcnode-id="576" href="#" id="__tab_p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab2" style="text-decoration:none;"><span data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Youth in Peril </span></span></a></span></span></span><span class="ajax__tab" data-dcnode-id="567" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab3_tab"><span class="ajax__tab_outer" data-dcnode-id="568"><span class="ajax__tab_inner" data-dcnode-id="569"><a class="ajax__tab_tab" data-dcnode-id="570" href="#" id="__tab_p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab3" style="text-decoration:none;"><span data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Trafficking Education in Action </span></span></a></span></span></span><span class="ajax__tab" data-dcnode-id="561" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab4_tab"><span class="ajax__tab_outer" data-dcnode-id="562"><span class="ajax__tab_inner" data-dcnode-id="563"><a class="ajax__tab_tab" data-dcnode-id="564" href="#" id="__tab_p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab4" style="text-decoration:none;"><span data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Trafficking Statistics and Data</span></span></a></span></span></span><span data-dcnode-id="560" instrument_node="">
</span></div><div class="ajax__tab_body ajax__scroll_auto" data-dcnode-id="326" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_body" style="display:block;"><span data-dcnode-id="558" instrument_node="">
</span><h3 class="tab_drawer_heading PaneHeader" data-dcnode-id="555"><span data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Signs of Human Trafficking</span></span></h3><div class="ajax__tab_panel" data-dcnode-id="493" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab1" style="visibility: visible;"><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552" id="signs"><span data-dcnode-id="553" instrument_node="">Education on what human trafficking is and how to recognize it can help save a victim.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">There are two types of human trafficking:&nbsp;</span></p><span data-dcnode-id="548" instrument_node="">
</span><ul data-dcnode-id="540"><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Sex Trafficking: Commercial sex act induced by force, fraud or coercion, or in which person performing the act is under age 18</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Labor Trafficking: Using force, fraud or coercion to recruit, harbor, transport, obtain or employ a person for labor or services in involuntary servitude, peonage, debt bondage or slavery</span></li><span data-dcnode-id="541" instrument_node="">
</span></ul><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Education on what human trafficking is and how to recognize it can help save a victim. CSAT lists these red flags that people could be victims of trafficking:</span></p><span data-dcnode-id="536" instrument_node="">
</span><ul data-dcnode-id="522"><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Not free to leave or come and go</span></li><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Avoid eye contact and show signs of physical abuse or restraint, confinement or torture</span></li><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Are unable to clearly explain where they live</span></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Are fearful, anxious, depressed, submissive or paranoid</span></li><span data-dcnode-id="523" instrument_node="">
</span></ul><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">Anyone who suspects human trafficking should call local authorities or the toll-free 24-hour hotline for the National Human Trafficking Resource Center: 888-3737-888, or text BeFree (233733). They can also leave a tip on the </span><a data-dcnode-id="518" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/report-trafficking" target="_blank"><span data-dcnode-id="519" instrument_node="">Hotline's website</span></a><span data-dcnode-id="517" instrument_node="">.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Convenience retailers like Casey’s train their employees to recognize the signs of human trafficking and report to authorities. Matthew Stephenson, director of training and development, customized the training program for Casey’s employees so they can recognize the signs and report suspected trafficking to authorities.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">“We tell employees not to intervene, unless there is danger to life, limb or eyesight. In that case, call 911,” said </span><a data-dcnode-id="509" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nacsmagazine.com/issues/january-2020/your-backyard" target="_blank"><span data-dcnode-id="510" instrument_node="">Stephenson</span></a><span data-dcnode-id="508" instrument_node="">. “We want to be clear. We don’t want an employee running down somebody in the parking lot. The CSAT program isn’t designed for direct recovery; it’s to collect information to work with law enforcement.”</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="505" instrument_node="">Truck stops can also be prime targets for traffickers due to their remote locations and transient customer base. Dan Alsaker, CEO of West Coast-based Broadway Flying J Truck Stops, works with the FBI, state police and anti-trafficking groups like </span><a data-dcnode-id="503" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//truckersagainsttrafficking.org/" target="_blank"><span data-dcnode-id="504" instrument_node="">Truckers Against Trafficking</span></a><span data-dcnode-id="502" instrument_node=""> and </span><a data-dcnode-id="500" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jonahproject.org/" target="_blank"><span data-dcnode-id="501" instrument_node="">The Jonah Project</span></a><span data-dcnode-id="499" instrument_node="">.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Broadway Flying J’s 500-plus employees are trained to recognize common signs of human trafficking: no eye contact, groups of people who follow each other around, physical handling, the strength of someone’s arm or the hand around the wrist, someone standing by the women’s restroom, light clothing on a winter day, or spotting someone coming out the back of a trailer.</span></p><span data-dcnode-id="494" instrument_node="">
</span></div><h3 class="tab_drawer_heading PaneHeader" data-dcnode-id="490"><span data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Youth in Peril </span></span></h3><div class="ajax__tab_panel" data-dcnode-id="462" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab2" style="display:none;visibility:hidden;"><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="484" id="youth"><span data-dcnode-id="488" instrument_node="">The National Center for Missing and Exploited Children (</span><a data-dcnode-id="486" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.missingkids.org/theissues/trafficking" target="_blank"><span data-dcnode-id="487" instrument_node="">NCMEC</span></a><span data-dcnode-id="485" instrument_node="">) suggests that traffickers and buyers often target youth who lack strong support networks, have experienced violence in the past, are experiencing homelessness or are marginalized by society.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">In 2020 NCMEC received more than 17,000 reports&nbsp;of possible child sex trafficking. Although children who run away frequently or for long periods of time tend to be fleeing an unsafe situation, data suggests that 1 in 6 runaway children become victims of child sex trafficking.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">NCMEC, which serves as the national clearinghouse and resource center for information about missing and exploited children, backs the </span><a data-dcnode-id="477" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//codeadam.missingkids.org/" target="_blank"><span data-dcnode-id="478" instrument_node="">Code Adam</span></a><span data-dcnode-id="476" instrument_node=""> program, created in memory of 6-year-old Adam Walsh, who was abducted from a Florida department store and murdered.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Employee training and store signage is available to convenience retailers to help identify and save missing children. NACS partnered with organizations that provide education and resources so stores can serve as a safe place and store associates can recognize the signs of abuse, neglect or abduction.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="467"><a data-dcnode-id="469" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Operations/Security-Safety/Human-Trafficking/National-Safe-Place"><span data-dcnode-id="470" instrument_node="">National Safe Place</span></a><span data-dcnode-id="468" instrument_node="">, for example, provides access to immediate help and supportive resources for youth in need. The program designates schools, fire stations, libraries and other youth-friendly organizations including convenience stores as Safe Place locations.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">There are more than 20,000 Safe Place locations where youth can access immediate help and safety, including Tulsa, Oklahoma-based QuikTrip. The convenience retailer has been an active supporter of Safe Place since the 1990s and every store serves as a Safe Place location, noted by the Safe Place yellow and black sign. Safe Place provides staff training to help employees recognize the signs of children in immediate danger.</span></p><span data-dcnode-id="463" instrument_node="">
</span></div><h3 class="tab_drawer_heading PaneHeader" data-dcnode-id="459"><span data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Trafficking Education in Action </span></span></h3><div class="ajax__tab_panel" data-dcnode-id="389" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab3" style="display:none;visibility:hidden;"><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="451" id="action"><a data-dcnode-id="456" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nacsmagazine.com/issues/january-2020/your-backyard" target="_blank"><span data-dcnode-id="457" instrument_node="">Matthew Stephenson</span></a><span data-dcnode-id="455" instrument_node="">, director of training and development, at Ankeny, Iowa-based Casey’s, knows firsthand the dramatic impact of his company’s involvement in </span><a data-dcnode-id="453" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Operations/Security-Safety/Human-Trafficking/Recognize-and-Support-Victims-of-Human-Trafficking"><span data-dcnode-id="454" instrument_node="">CSAT</span></a><span data-dcnode-id="452" instrument_node="">. “We have seen the direct recoveries of victims. It gives me goosebumps,” he said.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">“Remember your purpose as you go through life is bigger than selling gas,” said Stephenson. “This is a cost-effective way to help take care of our communities.”</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Many state-based convenience store associations work with their retail members through Convenience Stores Against Trafficking (CSAT) to help store associates recognize the signs of trafficking.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The Georgia Association of Convenience Stores (GACS) partnered with In Our Backyard ahead of Super Bowl LLII in Atlanta.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">“Some operators said: ‘We don’t want people to think our store is dangerous.’ But half of people in the U.S. come into a convenience store every day. They need to know what it looks like…what to look for,” said </span><a data-dcnode-id="438" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nacsmagazine.com/issues/january-2020/your-backyard" target="_blank"><span data-dcnode-id="439" instrument_node="">Angela Holland</span></a><span data-dcnode-id="437" instrument_node="">, president of GACS.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">GACS signed up 17 companies and nearly 300 stores. The weekend before Super Bowl LLII, about 400 volunteers distributed books with photographs of missing children to convenience store and truck stop employees and placed Freedom Stickers in restrooms. By late May, 29 of the 34 children listed in the book had been recovered, and multiple trafficking victims received assistance.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">“My role now is to continue to promote this, to make sure people don’t forget. This is not just one time at the Super Bowl,” Holland said. “There needs to be a constant reminder that ‘hey, this matters. It changes lives.’”</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">In 2019 GACS earned an ASAE&nbsp;</span><a data-dcnode-id="426" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepowerofa.org/2019/07/georgia-association-of-convenience-stores-earns-a-2019-asae-power-of-a-summit-award-for-its-convenience-stores-against-trafficking-program/" target="_blank"><span data-dcnode-id="427" instrument_node="">Power of A Summit Award</span></a><span data-dcnode-id="425" instrument_node="">&nbsp;for its work with In Our Backyard.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">In April 2019, Midwest convenience retailers </span><a data-dcnode-id="420" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Media/Daily/2019/Apr/26/3-Caseys-and-Kum-Go-Fight-Trafficking_Community"><span data-dcnode-id="421" instrument_node="">Casey’s and Kum &amp; Go</span></a><span data-dcnode-id="419" instrument_node=""> came together to combat human trafficking by partnering with CSAT. Combined, the two convenience store chains have nearly 3,000 locations, a combined footprint that represents a multi-state effort to help trafficking victims.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Store associates participated in CSAT training and placed “Freedom Stickers” in restroom stalls so victims could call or text the National Human Trafficking Hotline.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">The Wisconsin Petroleum Marketers &amp; Convenience Store Association (</span><a data-dcnode-id="411" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Media/Daily/2020/Jan/24/2-WI-C-stores-Fight-Human-Trafficking_Community"><span data-dcnode-id="412" instrument_node="">WPMCA</span></a><span data-dcnode-id="410" instrument_node="">) is working with the state Department of Justice to help educate convenience retailers in the state about human trafficking.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">“Our industry employs over 50,000 people and operates nearly 3,000 convenience stores across the state, and we are constantly interacting with the motoring public,” said WPMCA Chairman Andrew Bowman, who is also the president of Stop-N-Go of Madison.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">The Wisconsin DOJ provided training and resources to La Crosse, Wisconsin-based Kwik Trip employees, including decals that were placed on the back of restroom stall doors with information regarding human trafficking. Kwik Trip also distributed a public service announcement that communicates what to do and what not do when a possible victim of human trafficking comes into a store. &nbsp;</span></p><span data-dcnode-id="402" instrument_node="">
</span><p class="ms-rteStyle-Subheader" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Employees, Customers Spot Trafficking</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">An employee of a Midwestern convenience store chain was able to help a victim of trafficking who fled to the restroom—a sign that something was not right. “It scares me to think what would have happened if she would not have gotten away,” the employee told a local newspaper.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">The quick action of a gas station clerk in Robertsdale, Alabama, helped save a victim of human trafficking who came inside the store distraught. “I could tell something was wrong, something happened. She was shaking and crying" the clerk told a local news station. The victim asked her to call the police and shortly after the trafficker was arrested.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Customers also help victims of trafficking, thanks to information widely available on how to spot the signs. When a truck driver noticed an RV parked at a local gas station with black drapes covering the windows and a young girl looking out, he felt that something wasn’t right. He called 911 and alerted authorities, which led to the arrest of two traffickers.</span></p><span data-dcnode-id="390" instrument_node="">
</span></div><h3 class="tab_drawer_heading last-accordion-section PaneHeader" data-dcnode-id="386"><span data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Trafficking Statistics and Data</span></span></h3><div class="ajax__tab_panel" data-dcnode-id="328" id="p_lt_ctl08_pageplaceholder_p_lt_ctl07_TabsLayout2_tabs_tab4" style="display:none;visibility:hidden;"><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383" id="stats"><span data-dcnode-id="384" instrument_node="">More than 150,000 U.S. convenience stores conduct 165 million transactions a day in every community, and most of these businesses are open 24/7. Longer hours of operation, public restrooms and ease of access increase the likelihood that convenience stores can help those in peril, such as victims of human trafficking or youth in need.&nbsp;</span></p><span data-dcnode-id="382" instrument_node="">
</span><p class="ms-rteStyle-Subheader" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Consumers Want Retailers to Combat Human Trafficking</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">NACS surveys found that customers will support convenience stores their community that address societal issues like stopping human trafficking and protecting children:&nbsp;</span></p><span data-dcnode-id="376" instrument_node="">
</span><ul data-dcnode-id="350"><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="368"><strong data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">92%</span></strong><span data-dcnode-id="372" instrument_node=""> of potential employees say they are more favorable (61% say they are “very favorable”) to the convenience store industry when they learn that convenience stores play a role in combatting human trafficking. This message was the top-rated of 20 positive industry messages shared with consumers. </span><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">(January 2019 NACS consumer survey)</span></em><span data-dcnode-id="369" instrument_node="">&nbsp;</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="360"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">70%</span></strong><span data-dcnode-id="364" instrument_node=""> of consumers say that they believe that convenience stores play a role in combatting human trafficking. </span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">(January 2019 NACS consumer survey)</span></em><span data-dcnode-id="361" instrument_node="">&nbsp;</span></li><span data-dcnode-id="359" instrument_node="">
</span><li data-dcnode-id="352"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">40%</span></strong><span data-dcnode-id="356" instrument_node=""> of consumers say that human trafficking is an issue they want their local convenience store to be engaged in addressing</span><em data-dcnode-id="354"><span data-dcnode-id="355" instrument_node=""> (September 2018 NACS consumer survey)</span></em><span data-dcnode-id="353" instrument_node="">&nbsp;</span></li><span data-dcnode-id="351" instrument_node="">
</span></ul><span data-dcnode-id="349" instrument_node="">
</span><p class="ms-rteStyle-Subheader" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">U.S. National Human Trafficking Hotline</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="342"><a data-dcnode-id="344" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//polarisproject.org/wp-content/uploads/2019/09/Polaris-2019-US-National-Human-Trafficking-Hotline-Data-Report.pdf" target="_blank"><span data-dcnode-id="345" instrument_node="">Polaris Project</span></a><span data-dcnode-id="343" instrument_node=""> data for 2019 found that text— “BEFREE” (233733)—is the fastest growing means for human trafficking victims to communicate with the Trafficking Hotline. The data shows the importance of SMS/text as a means of communication for those seeking support, suggesting that stickers and signage with the hotline number can help save lives.</span></p><span data-dcnode-id="341" instrument_node="">
</span><ul data-dcnode-id="330"><span data-dcnode-id="340" instrument_node="">
</span><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">17% of the trafficking-related contacts were made to the Trafficking Hotline, compared to 13% in 2018 and 7% in 2017&nbsp;</span></li><span data-dcnode-id="337" instrument_node="">
</span><li data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">The number of identified trafficking situations that originated from text grew by 33% in 2019 from the previous year&nbsp;</span></li><span data-dcnode-id="334" instrument_node="">
</span><li data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">In 2019, 42% of minor victims and survivors of trafficking contacted the hotline via text compared to 17% of adult victims and survivors</span></li><span data-dcnode-id="331" instrument_node="">
</span></ul><span data-dcnode-id="329" instrument_node="">
</span></div><span data-dcnode-id="327" instrument_node="">
</span></div><span data-dcnode-id="325" instrument_node="">
</span></div></div><span data-dcnode-id="322" instrument_node="">

</span><p data-dcnode-id="306"><span data-dcnode-id="310" instrument_node="">National Safe Place is a fee-based community outreach program. A certified “Safe Place” is identified by the bright yellow and black diamond-shaped signs or decals.&nbsp;Learn more about </span><a data-dcnode-id="308" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/Operations/Store-Security/Community-Safety/National-Safe-Place"><span data-dcnode-id="309" instrument_node="">joining National Safe Place Network</span></a><span data-dcnode-id="307" instrument_node="">.</span></p><span data-dcnode-id="305" instrument_node="">

</span><div class="link-item" data-dcnode-id="286"><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">In Our Backyard’s </span><a data-dcnode-id="290" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convenience.org/Topics/reFresh/Partnerships/Recognize-and-Support-Victims-of-Human-Trafficking"><span data-dcnode-id="291" instrument_node="">Convenience Stores Against Trafficking (CSAT) program</span></a><span data-dcnode-id="289" instrument_node=""> provides convenience industry-specific materials and education on how to recognize and report human trafficking. CSAT offers free Freedom Stickers, upon request, and in-person training courses.&nbsp;</span></p><span data-dcnode-id="287" instrument_node="">
