instrument_node="">“DigitalMint is excited to partner with the Anti-Human Trafficking Intelligence Initiative in its fight to combat human trafficking. DigitalMint for years has been trying to implement a monitoring scenario to detect HT/CSAM related transactions specifically but has been unable to do so due to the low dollar transactions involved with those typologies and the transactions often not involving high-risk wallets. However, by utilizing Hades and the data available through the platform, DigitalMint is able to effectively monitor for Human Trafficking and CSAM while not being inundated with false-positive transaction monitoring alerts. I'd recommend Hades to anyone in the BTM space who is looking for an effective enhancement to their AML program.”</span></h4><h4 data-dcnode-id="841"></h4><h4 data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">– Seth Sattler, BSA Officer at </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">DigitalMint</span></em></h4><p data-dcnode-id="825"></p><div class="wpa-ld alignnone wp-image-1089" data-dcnode-id="826"><img alt="Digital Mint" class="" data-dcnode-id="836" height="59" id="longdesc-return-1089" loading="lazy" longdesc="https://followmoneyfightslavery.org?longdesc=1089&amp;referrer=1935" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//followmoneyfightslavery.org/wp-content/uploads/2020/12/Digital_Mint_Logo-300x83.png&amp;raw" tabindex="-1" width="224"><div aria-live="assertive" class="longdesc" data-dcnode-id="830" style="display: none;"><div data-dcnode-id="831" id="desc_wp-image-1089"><span data-dcnode-id="835" instrument_node="">

</span></div></div><button data-dcnode-id="827"><span data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Long Description</span></span></button></div><p></p></div></div></div></div></div></div></div></div></div><div class="fl-row fl-row-fixed-width fl-row-bg-color fl-node-6127fcc149478" data-dcnode-id="798" data-node="6127fcc149478"><div class="fl-row-content-wrap" data-dcnode-id="799"><div class="fl-row-content fl-row-fixed-width fl-node-content" data-dcnode-id="800"><div class="fl-col-group fl-node-6127fcc1494e7" data-dcnode-id="801" data-node="6127fcc1494e7"><div class="fl-col fl-node-6127fcc1494e8" data-dcnode-id="802" data-node="6127fcc1494e8"><div class="fl-col-content fl-node-content" data-dcnode-id="803"><div class="fl-module fl-module-rich-text fl-node-6127fcc1494e9" data-dcnode-id="804" data-node="6127fcc1494e9"><div class="fl-module-content fl-node-content" data-dcnode-id="805"><div class="fl-rich-text" data-dcnode-id="806"><h4 data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">“We are incredibly proud to partner with and support the Anti-Human Trafficking Intelligence Initiative through their efforts in building tools and techniques for a cause which should be paramount to any organization in the cyber and crypto sphere. Their ability to timely extricate sensitive data from darknet markets such as IP addresses, usernames, e-mail addresses, and many other identifiers are oftentimes the crucial pieces of the puzzle critical to advancing investigations.&nbsp;There aren't many players in this space who have dedicated themselves to this very important mission and we are incredibly grateful of their team who have made anti-human trafficking their life's focus.”</span></h4><h4 data-dcnode-id="813"></h4><h4 data-dcnode-id="809"><span data-dcnode-id="812" instrument_node="">– Shaun MaGruder, Founder &amp; CEO at </span><em data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Blocktrace</span></em></h4><p data-dcnode-id="807"><img alt="" class="alignnone size-medium wp-image-2015" data-dcnode-id="808" height="42" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//followmoneyfightslavery.org/wp-content/uploads/2021/08/BlockTrace_dark_v2-300x42.png&amp;raw" srcset="https://followmoneyfightslavery.org/wp-content/uploads/2021/08/BlockTrace_dark_v2-300x42.png 300w, https://followmoneyfightslavery.org/wp-content/uploads/2021/08/BlockTrace_dark_v2-1024x145.png 1024w, https://followmoneyfightslavery.org/wp-content/uploads/2021/08/BlockTrace_dark_v2-768x109.png 768w, https://followmoneyfightslavery.org/wp-content/uploads/2021/08/BlockTrace_dark_v2.png 1250w" width="300"></p></div></div></div></div></div></div></div></div></div><div class="fl-row fl-row-fixed-width fl-row-bg-color fl-node-61118e8b1f9f9" data-dcnode-id="770" data-node="61118e8b1f9f9"><div class="fl-row-content-wrap" data-dcnode-id="771"><div class="fl-row-content fl-row-fixed-width fl-node-content" data-dcnode-id="772"><div class="fl-col-group fl-node-61118e8b1fa67" data-dcnode-id="773" data-node="61118e8b1fa67"><div class="fl-col fl-node-61118e8b1fa69" data-dcnode-id="774" data-node="61118e8b1fa69"><div class="fl-col-content fl-node-content" data-dcnode-id="775"><div class="fl-module fl-module-rich-text fl-node-61118e8b1fa6a" data-dcnode-id="776" data-node="61118e8b1fa6a"><div class="fl-module-content fl-node-content" data-dcnode-id="777"><div class="fl-rich-text" data-dcnode-id="778"><h4 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">"The Attribution and Investigations teams at CipherTrace appreciate Project Hades vast array of indexed data from onion sites. The scraped onion site data provides the title of the sites as well as categories and keyword analysis. Investigations uses Project Hades data to identify crypto addresses which may be re-used ie. multiple sites/scams using one BTC address. This provides CipherTrace with critical insights on relationships between entities and scam types, and any potential connections to CSAM/sexploitation."</span></h4><h4 data-dcnode-id="795"></h4><h4 data-dcnode-id="791"><span data-dcnode-id="794" instrument_node="">– Jonelle Still, Cryptocurrency Forensics Analyst at </span><em data-dcnode-id="792" style="font-family: system-ui, '---apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;"><span data-dcnode-id="793" instrument_node="">CipherTrace</span></em></h4><h4 data-dcnode-id="779"><div class="wpa-ld alignnone size-full wp-image-878" data-dcnode-id="780"><img alt="Cipher Trace" class="" data-dcnode-id="790" id="longdesc-return-878" loading="lazy" longdesc="https://followmoneyfightslavery.org?longdesc=878&amp;referrer=1935" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//followmoneyfightslavery.org/wp-content/uploads/2020/12/cipher-trace.svg&amp;raw" style="font-family: system-ui, '---apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;" tabindex="-1"><div aria-live="assertive" class="longdesc" data-dcnode-id="784" style="display: none;"><div data-dcnode-id="785" id="desc_wp-image-878"><span data-dcnode-id="789" instrument_node="">
