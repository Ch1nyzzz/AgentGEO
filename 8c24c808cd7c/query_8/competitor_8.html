maryButtonWrapper__1l3mr0l" data-dcnode-id="462"><a aria-controls="drawer" class="design__button__1539p3p" data-dcnode-id="463"><span class="design__glyphLeft__1539p3p" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">↖</span></span><span data-dcnode-id="465" instrument_node=""> </span><span data-dcnode-id="464" instrument_node="">Get Started</span></a></div><div class="design__secondaryButtonsWrapper__1l3mr0l" data-dcnode-id="451"><button aria-expanded="false" class="design__button__tgc049" data-dcnode-id="456" id="searchBtn" title="Show Search"><svg data-dcnode-id="457" fill="none" height="16" role="img" viewBox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="460">Show Search</title><circle cx="9.543" cy="6.589" data-dcnode-id="459" r="5.709" stroke="currentColor"></circle><path d="M6.051 10.524l-4.95 4.949" data-dcnode-id="458" stroke="currentColor"></path></svg></button><button aria-expanded="false" class="design__button__15fmeb6" data-dcnode-id="452" id="navBtn" title="Show Navigation"><div class="design__burger__15fmeb6 hamburger hamburger--emphatic" data-dcnode-id="453"><span class="hamburger-box" data-dcnode-id="454"><span class="hamburger-inner" data-dcnode-id="455"></span></span></div></button></div></div></div><main data-dcnode-id="377" role="main"><section class="design__section__14tqg9n design__sectionlight__14tqg9n" data-dcnode-id="442" id="section2XY2yTx0aKeRYvVYUxB5Cw"><div class="design__container__14tqg9n" data-dcnode-id="443"><div class="design__wrapper__dptm70 design__noSubheading__dptm70" data-dcnode-id="444"><div class="design__moduleWrapper__n105w4 design__header__1qhpnch design__header400__1qhpnch" data-dcnode-id="446"><h1 class="design__heading__1y2i4fm design__heading400__1y2i4fm" data-animation="header" data-dcnode-id="447" data-rendered-size="400" data-testid="heading" style="opacity: 1;"><span data-dcnode-id="448" instrument_node="">Modern Slavery and Human Trafficking Statement</span></h1></div><div class="design__content__dptm70" data-dcnode-id="445"></div></div></div></section><section class="design__section__14tqg9n design__sectionlight__14tqg9n" data-dcnode-id="380" id="section6Z1frdLmqmEbm6yaFK8cQl"><div class="design__container__14tqg9n" data-dcnode-id="381"><div class="design__moduleWrapper__n105w4" data-dcnode-id="382"><div class="design__animatedLine__1jjagvx design__line__n105w4 design__large__n105w4 design__animatedLineAltStyle__n105w4" data-dcnode-id="440"><div class="design__animatedLineRule__1jjagvx" data-dcnode-id="441" style="transform: translate(0px, 0px);"></div></div><div class="design__paragraph__kcjeem design__paragraph200__kcjeem" data-dcnode-id="383"><div class="design__column__kcjeem" data-dcnode-id="384"><div class="design__text__1h2addp design__text200__1h2addp" data-dcnode-id="385"><div data-dcnode-id="386"><h2 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Introduction from the CEO</span></h2><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Modern slavery is a crime and a violation of fundamental human rights. Modern slavery takes various forms, such as slavery, servitude, forced and compulsory labor and human
trafficking, all of which deprive victims of their liberty and exploit them for personal or commercial gain. Palantir Technologies does not tolerate modern slavery or human trafficking. This Modern Slavery and Human Trafficking statement reflects Palantir Technologies ongoing efforts and commitment to fully comply with all applicable laws and regulations to mitigate any risk of human trafficking in our business operations or those of our suppliers.</span></p><h2 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Organizational Structure</span></h2><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Palantir Technologies Inc. and its affiliates (together, “Palantir”) provide data management and analysis software to customers across the public and private sectors. We employ
more than 2000 people in over 10 countries, with headquarters in Denver, CO, USA. Our clients include financial services, law enforcement, military, intelligence, and manufacturing organizations across the globe. We also provide our software and services to non-profit organizations that combat modern slavery and human trafficking. </span></p><h2 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Our Supply Chains</span></h2><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Our supply chain consists primarily of professional and office services and office goods.
Professional service suppliers include consultants in various fields, travel agents, and outside legal counsel. Office services suppliers include, for example, delivery services, catering, maintenance, repair, and cleaning services. Office goods suppliers include, for example, computer hardware and software, copiers, telephone, office furniture and fixtures, office supplies, and related goods.</span></p><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Our Policies on Slavery and Human Trafficking </span></h2><p data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">We are committed to ensuring that there is no slavery or human trafficking in our supply chains or in any part of our business. At Palantir, personnel are required to comply with our </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s26.q4cdn.com/381064750/files/doc_downloads/governance/Code-of-Conduct.pdf"><span data-dcnode-id="424" instrument_node="">code of conduct</span></a><span data-dcnode-id="422" instrument_node=""> which sets out our commitment to ethical business practices and regulatory compliance. </span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">
We believe the risks of slavery and human trafficking practices directly within our business are very low. Our business is sophisticated software development that does not involve the type of labor often associated with such practices. Our office services suppliers are engaged in a range of activities, from higher skilled to lower skilled, but almost all are engaged in services conducted in close proximity to or in close cooperation with Palantir personnel. Consequently, these services are conducted in a professional environment where exploitive practices would be difficult, if not impossible, to hide. Our suppliers of office goods are reputable retailers and wholesalers. We do not contract with source suppliers based in industries or regions of the world where the risks of modern slavery and human trafficking are relatively high.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">
In light of the obligation to report on measures to ensure that all parts of our business and supply chain are slavery free we have reviewed our workplace policies and procedures to assess their effectiveness in identifying and tackling modern slavery issues. Our workplace policies and procedures demonstrate our commitment to act ethically and with integrity in all our business relationships and to implement and enforce effective systems and controls to ensure our supply chains are entirely free from slavery and human trafficking.</span></p><h2 data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Supplier Adherence to our Values</span></h2><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Within our workplace, we enforce policies and procedures to ensure that we act ethically and with integrity in all our business relationships. We also implement and enforce effective systems and controls to ensure our supply chains are entirely free from slavery and human trafficking, and we are adding the following supply chain-specific elements to our compliance program:</span></p><ul data-dcnode-id="403"><li data-dcnode-id="410"><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Internal Training for procurement and sales personnel</span></p></li><li data-dcnode-id="407"><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Dedicated Reporting Channels</span></p></li><li data-dcnode-id="404"><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Supplier Agreement Clauses to require Modern Slavery Act adherence and reporting</span></p></li></ul><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">We have a dedicated compliance team that assists procurement and sales teams on issues relating to slavery and human trafficking.</span></p><h2 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Reporting and Training</span></h2><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">All personnel have access to internal channels for reporting suspected incidents of modern slavery and human trafficking, including in-person access to Palantir’s compliance team and an anonymous reporting system.</span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">To ensure that Palantir personnel engaged in sales or procuring goods and services from third parties understand the risks of modern slavery and human trafficking in our supply chains and our business, we intend to provide training annually.</span></p><p data-dcnode-id="391"><b data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">This statement is made pursuant to section 54 of the Modern Slavery Act 2015 and constitutes Palantir’s slavery and human trafficking statement for the 2020 financial year (FY20). For the purposes of the UK Modern Slavery Act, the United Kingdom subsidiary covered by this statement includes Palantir Technologies UK, Ltd. </span></b><span data-dcnode-id="392" instrument_node="">
</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Dr. Alexander Karp, CEO
