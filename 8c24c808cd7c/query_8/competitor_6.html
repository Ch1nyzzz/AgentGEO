, especially immigrant and refugee children, are at risk of victimization and may experience considerable physical and mental health consequences. Adding these problems to pre-existing vulnerabilities and adversities makes human trafficking a complex health issue that needs to be addressed by a multidisciplinary team that includes health care providers. This article aims to provide an overview of human trafficking and the red flags that may alert the pediatrician to the possibility of exploitation, with a special focus on immigrant and refugee children. It describes a trauma-informed, rights-based approach and discusses ways in which pediatricians can contribute to a multidisciplinary response to human trafficking. </span><strong data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">[</span><i data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Pediatr Ann</span></i><span data-dcnode-id="1528" instrument_node="">. 2020;49(5):e209–e214.]</span></strong></p></div></div></div></section><div class="response" data-dcnode-id="1520"><div class="sub-article-title" data-dcnode-id="1521"></div></div></div><span data-dcnode-id="1518" instrument_node="">
