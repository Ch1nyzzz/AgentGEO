8" instrument_node="">G6, G8</span></b><span data-dcnode-id="2636" instrument_node="">) and in need of simple, low-cost solutions (</span><b data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">G2</span></b><span data-dcnode-id="2633" instrument_node="">); they can share the knowledge and experience needed to help establish trust and buy-in necessary for AI4SG collaborations (</span><b data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">G7</span></b><span data-dcnode-id="2630" instrument_node="">). For example, the hackathons that Deep Learning Indaba hosted on AI solutions for conservation and malaria efforts</span><sup data-dcnode-id="2624"><a aria-label="Reference 69" data-dcnode-id="2628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d243953728e1661" title="IBM Research - Africa. IBM Malaria Challenge. 
https://zindi.africa/competitions/ibm-malaria-challenge

 (2019)."><span data-dcnode-id="2629" instrument_node="">69</span></a><span data-dcnode-id="2627" instrument_node="">,</span><a aria-label="Reference 70" data-dcnode-id="2625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d243953728e1664" title="Packer, C. et al. Snapshot Serengeti. 
https://www.zooniverse.org/projects/zooniverse/snapshot-serengeti

 (2019)."><span data-dcnode-id="2626" instrument_node="">70</span></a></sup><span data-dcnode-id="2623" instrument_node=""> brought together experts from leading centres of research excellence and the local developers to work on finding solutions to important problems of interest to the local community. Industry partners provided high-quality data for these challenges (</span><b data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">G9</span></b><span data-dcnode-id="2620" instrument_node="">) for local developers to find simple prototype solutions (</span><b data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">G2</span></b><span data-dcnode-id="2617" instrument_node="">) in a hackathon format, aimed at reducing development costs (</span><b data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">G8</span></b><span data-dcnode-id="2614" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="2597" data-title="Call for action"><div class="c-article-section" data-dcnode-id="2598" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2608" id="Sec8"><span data-dcnode-id="2609" instrument_node="">Call for action</span></h2><div class="c-article-section__content" data-dcnode-id="2599" id="Sec8-content"><p data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">We encourage AI experts to actively seek out opportunities for delivering positive social impact. Ethics and inclusivity should be central to AI systems and application-domain experts should inform their design. Numerous recent advances suggest that there is a huge opportunity for adding value to the non-profit sector and partnerships with NGO experts can help ensure that theoretical advances in AI research translate into good for us all.</span></p><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">We equally encourage all organisations working on sustainable development to consider opportunities for utilising AI solutions as powerful tools that might enable them to deliver greater positive impact, while working around resource constraints by tapping into cost-efficient opportunities, such as skills-based volunteering or crowd-sourcing. To do this with the least amount of friction, we highlighted the need to engage with technical experts early, and to gain insights into prerequisites and feasibility given the level of data readiness. We see the need to create more spaces and opportunities to facilitate partnerships and make it easier to get access to AI expertise.</span></p><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Given that much of the AI talent is currently involved in industrial or academic research, we would encourage key stakeholders in leading research labs to further empower researchers in donating a percentage of their time to AI4SG initiatives, where appropriate and possible. The complexity of real-world challenges can in fact help to boost the understanding of existing methods and demonstrate impact where it matters the most.</span></p><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Finally, we invite everyone to join the discussion and help shape the strategy around how to tackle the world’s most pressing challenges with some of the most powerful technological solutions available. Only together can we build a better future.</span></p></div></div></section><section data-dcnode-id="2590" data-title="Disclaimer"><div class="c-article-section" data-dcnode-id="2591" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2595" id="Sec9"><span data-dcnode-id="2596" instrument_node="">Disclaimer</span></h2><div class="c-article-section__content" data-dcnode-id="2592" id="Sec9-content"><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">The opinions presented in this paper represent the personal views of the authors and do not necessarily reflect the official policies or positions of their organisations.</span></p></div></div></section><span data-dcnode-id="2589" instrument_node="">
