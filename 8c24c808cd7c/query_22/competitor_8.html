</span><meta content="Advances in machine learning (ML) and artificial intelligence (AI) present an opportunity to build better tools and solutions to help address some of the world’s most pressing challenges, and deliver positive social impact in accordance with the priorities outlined in the United Nations’ 17 Sustainable Development Goals (SDGs). The AI for Social Good (AI4SG) movement aims to establish interdisciplinary partnerships centred around AI applications towards SDGs. We provide a set of guidelines for establishing successful long-term collaborations between AI researchers and application-domain experts, relate them to existing AI4SG projects and identify key opportunities for future AI applications targeted towards social good. The AI for Social Good movement aims to apply AI/ML tools to help in delivering on the United Nations’ sustainable development goals (SDGs). Here, the authors identify the challenges and propose guidelines for designing and implementing successful partnerships between AI researchers and application - domain experts." data-dcnode-id="4560" name="dc.description"><span data-dcnode-id="4559" instrument_node="">

</span><div class="c-article-body" data-dcnode-id="1188"><span data-dcnode-id="3224" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3217" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3218" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3222" id="Abs1"><span data-dcnode-id="3223" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3219" id="Abs1-content"><p data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Advances in machine learning (ML) and artificial intelligence (AI) present an opportunity to build better tools and solutions to help address some of the world’s most pressing challenges, and deliver positive social impact in accordance with the priorities outlined in the United Nations’ 17 Sustainable Development Goals (SDGs). The AI for Social Good (AI4SG) movement aims to establish interdisciplinary partnerships centred around AI applications towards SDGs. We provide a set of guidelines for establishing successful long-term collaborations between AI researchers and application-domain experts, relate them to existing AI4SG projects and identify key opportunities for future AI applications targeted towards social good.</span></p></div></div></section><span data-dcnode-id="3216" instrument_node="">
</span><noscript data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">
</span></noscript><span data-dcnode-id="3213" instrument_node="">
</span><section data-dcnode-id="3034" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3035" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3211" id="Sec1"><span data-dcnode-id="3212" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3036" id="Sec1-content"><p data-dcnode-id="3205"><span data-dcnode-id="3210" instrument_node="">The challenges facing our world today have grown in complexity and increasingly require large, coordinated efforts: between countries; and across a broad spectrum of governmental and non-governmental organisations (NGOs) and the communities they serve. These coordinated efforts work towards supporting the Sustainable Development Goals (SDGs)</span><sup data-dcnode-id="3207"><a aria-label="Reference 1" data-dcnode-id="3208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d243953728e935" title="UN Sustainable Development Goals. 
https://sustainabledevelopment.un.org/

 (2015)."><span data-dcnode-id="3209" instrument_node="">1</span></a></sup><span data-dcnode-id="3206" instrument_node="">, and there continues to be an important role for technology to support the developmental organisations and efforts active in this field to deliver the highest impact.</span></p><p data-dcnode-id="3177"><span data-dcnode-id="3204" instrument_node="">Artificial intelligence (AI) and machine learning (ML) have attracted widespread interest in recent years due to a series of high-profile successes. AI has shown success in games and simulations</span><sup data-dcnode-id="3198"><a aria-label="Reference 2" data-dcnode-id="3202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d243953728e942" title="LeCun, Y., Bengio, Y. &amp; Hinton, G. Deep learning. Nature521, 436 (2015)."><span data-dcnode-id="3203" instrument_node="">2</span></a><span data-dcnode-id="3201" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="3199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d243953728e945" title="Silver, D. et al. A general reinforcement learning algorithm that masters chess, shogi, and go through self-play. Science362, 1140–1144 (2018)."><span data-dcnode-id="3200" instrument_node="">3</span></a></sup><span data-dcnode-id="3197" instrument_node="">, and is being increasingly applied to a wide range of practical problems, including speech recognition</span><sup data-dcnode-id="3194"><a aria-label="Reference 4" data-dcnode-id="3195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d243953728e949" title="Chiu, C. et al. State-of-the-art speech recognition with sequence-to-sequence models. In 2018 IEEE International Conference on Acoustics, Speech and Signal Processing (ICASSP).&nbsp;IEEE. 4774–4778 (2018)."><span data-dcnode-id="3196" instrument_node="">4</span></a></sup><span data-dcnode-id="3193" instrument_node=""> and self-driving cars</span><sup data-dcnode-id="3190"><a aria-label="Reference 5" data-dcnode-id="3191" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d243953728e953" title="Bojarski, M. et al. End to end learning for self-driving cars. Preprint at 
https://arxiv.org/abs/1604.07316

 (2016)."><span data-dcnode-id="3192" instrument_node="">5</span></a></sup><span data-dcnode-id="3189" instrument_node="">. These commercial applications often have indirect positive social impact by increasing the availability of information through better search and language-translation tools, providing improved communication services, enabling more efficient transportation, or supporting more personalised healthcare</span><sup data-dcnode-id="3186"><a aria-label="Reference 6" data-dcnode-id="3187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d243953728e957" title="Yu, K.-H., Beam, A. &amp; Kohane, I. S. Artificial intelligence in healthcare. Nat. Biomed. Eng.2, 719–731 (2018)."><span data-dcnode-id="3188" instrument_node="">6</span></a></sup><span data-dcnode-id="3185" instrument_node="">. With this interest come a lot of questions regarding social impact, malicious uses, risks, and governance of these innovations, which are of foremost importance</span><sup data-dcnode-id="3179"><a aria-label="Reference 7" data-dcnode-id="3183" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d243953728e961" title="AI Now 2019 Report. 
https://ainowinstitute.org/AI_Now_2019_Report.pdf

 (2019)."><span data-dcnode-id="3184" instrument_node="">7</span></a><span data-dcnode-id="3182" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="3180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d243953728e964" title="Brundage, M. et al. The malicious use of artificial intelligence: forecasting, prevention, and mitigation, Preprint at 
https://arxiv.org/ftp/arxiv/papers/1802/1802.07228.pdf

 (2018)."><span data-dcnode-id="3181" instrument_node="">8</span></a></sup><span data-dcnode-id="3178" instrument_node="">.</span></p><p data-dcnode-id="3136"><span data-dcnode-id="3176" instrument_node="">Targeted applications of AI to the domain of social good have recently come into focus. This field has attracted many actors, including charities like DataKind (established in 2012)</span><sup data-dcnode-id="3173"><a aria-label="Reference 9" data-dcnode-id="3174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d243953728e971" title="DataKind. 
https://www.datakind.org

 (2012)."><span data-dcnode-id="3175" instrument_node="">9</span></a></sup><span data-dcnode-id="3172" instrument_node="">, academic programmes such as the Data Science for Social Good (DSSG) programme at the University of Chicago (established in 2013)</span><sup data-dcnode-id="3169"><a aria-label="Reference 10" data-dcnode-id="3170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d243953728e975" title="Data science for social good. 
https://dssg.uchicago.edu/

 (2013)."><span data-dcnode-id="3171" instrument_node="">10</span></a></sup><span data-dcnode-id="3168" instrument_node="">, the UN Global Pulse Labs</span><sup data-dcnode-id="3165"><a aria-label="Reference 11" data-dcnode-id="3166" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d243953728e979" title="UN Global Pulse Labs. 
https://www.unglobalpulse.org/pulse-labs

 (2019)."><span data-dcnode-id="3167" instrument_node="">11</span></a></sup><span data-dcnode-id="3164" instrument_node="">, AI for Social Good workshops in conferences such as the 2018 and 2019 NeurIPS conference</span><sup data-dcnode-id="3158"><a aria-label="Reference 12" data-dcnode-id="3162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d243953728e983" title="Luck, M. et al. AI for Social Good NeurIPS 2018 Workshop. 
https://aiforsocialgood.github.io/2018/index.htm

 (2018)."><span data-dcnode-id="3163" instrument_node="">12</span></a><span data-dcnode-id="3161" instrument_node="">,</span><a aria-label="Reference 13" data-dcnode-id="3159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d243953728e986" title="Fang, F. et al. AI for Social Good NeurIPS 2019 Workshop. 
https://aiforsocialgood.github.io/neurips2019/

 (2019)."><span data-dcnode-id="3160" instrument_node="">13</span></a></sup><span data-dcnode-id="3157" instrument_node="">, the 2019 ICML conference</span><sup data-dcnode-id="3154"><a aria-label="Reference 14" data-dcnode-id="3155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d243953728e990" title="Luck, M. et al. AI for Social Good ICML 2019 Workshop. 
https://aiforsocialgood.github.io/icml2019/

 (2019)."><span data-dcnode-id="3156" instrument_node="">14</span></a></sup><span data-dcnode-id="3153" instrument_node=""> and the 2019 ICLR conference</span><sup data-dcnode-id="3150"><a aria-label="Reference 15" data-dcnode-id="3151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d243953728e995" title="Luck, M. et al.﻿ AI for Social Good ICLR 2019 Workshop. 
https://aiforsocialgood.github.io/iclr2019/

 (2019)."><span data-dcnode-id="3152" instrument_node="">15</span></a></sup><span data-dcnode-id="3149" instrument_node="">, along with corporate funding programmes such as Google AI for Good Grants</span><sup data-dcnode-id="3146"><a aria-label="Reference 16" data-dcnode-id="3147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d243953728e999" title="Google AI for social good. 
https://ai.google/social-good/

 (2019)."><span data-dcnode-id="3148" instrument_node="">16</span></a></sup><span data-dcnode-id="3145" instrument_node="">, Microsoft AI for Humanity</span><sup data-dcnode-id="3142"><a aria-label="Reference 17" data-dcnode-id="3143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d243953728e1003" title="Microsoft AI for humanity. 
https://www.microsoft.com/en-us/ai/ai-for-humanitarian-action

 (2019)."><span data-dcnode-id="3144" instrument_node="">17</span></a></sup><span data-dcnode-id="3141" instrument_node="">, Mastercard Center for Inclusive Growth and the Rockefeller Foundation’s Data Science for Social Impact</span><sup data-dcnode-id="3138"><a aria-label="Reference 18" data-dcnode-id="3139" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d243953728e1007" title="Data science for social impact. 
https://www.mastercardcenter.org/press-releases/center-for-inclusive-growth-rockefeller-foundation-announce-data-science-project

 (2019)."><span data-dcnode-id="3140" instrument_node="">18</span></a></sup><span data-dcnode-id="3137" instrument_node="">, amongst several others.</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3135" instrument_node="">Results from several recent studies hint at the potential benefits of using AI for social good. Amnesty International and ElementAI demonstrated how AI can be used to help trained human moderators with identifying and quantifying online abuse against women on Twitter</span><sup data-dcnode-id="3132"><a aria-label="Reference 19" data-dcnode-id="3133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d243953728e1014" title="Teams from Amnesty International and ElementAI. Using crowdsourcing, data science &amp; machine learning to measure violence and abuse against women on Twitter. 
https://decoders.amnesty.org/projects/troll-patrol/findings

 (2019)."><span data-dcnode-id="3134" instrument_node="">19</span></a></sup><span data-dcnode-id="3131" instrument_node="">. The Makerere University AI research group supported by the UN Pulse Lab Kampala developed automated monitoring of viral cassava disease</span><sup data-dcnode-id="3128"><a aria-label="Reference 20" data-dcnode-id="3129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d243953728e1018" title="Building fertile ground for data science in Uganda. 
https://www.unglobalpulse.org/news/building-fertile-ground-data-science-uganda

 (2016)."><span data-dcnode-id="3130" instrument_node="">20</span></a></sup><span data-dcnode-id="3127" instrument_node="">, and this same group collaborated with Microsoft Research and other academic institutions to set up an electronic agricultural marketplace in Uganda</span><sup data-dcnode-id="3124"><a aria-label="Reference 21" data-dcnode-id="3125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d243953728e1022" title="Newman, N. et al. Designing and evolving an electronic agricultural marketplace in Uganda. In (ed. Zegura, E.)&nbsp;Proc. 1st ACM SIGCAS Conference on Computing and Sustainable Societies, COMPASS 18, New York, NY, 14:1–14:11 (ACM, 2018)."><span data-dcnode-id="3126" instrument_node="">21</span></a></sup><span data-dcnode-id="3123" instrument_node="">. Satellite imagery was used to help predict poverty</span><sup data-dcnode-id="3120"><a aria-label="Reference 22" data-dcnode-id="3121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d243953728e1026" title="Jean, N. et al. Combining satellite imagery and machine learning to predict poverty. Science353, 790–794 (2016)."><span data-dcnode-id="3122" instrument_node="">22</span></a></sup><span data-dcnode-id="3119" instrument_node=""> and identify burned-down villages in conflict zones in Darfur</span><sup data-dcnode-id="3116"><a aria-label="Reference 23" data-dcnode-id="3117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d243953728e1030" title="Cornebise, J., Worrall, D., Farfour, M. &amp; Marin, M. Witnessing atrocities: quantifying villages destruction in Darfur with crowdsourcing and transfer learning. In Proc. AI for Social Good NeurIPS2018 Workshop, NeurIPS ’18,Montreal, Canada&nbsp;(2018)."><span data-dcnode-id="3118" instrument_node="">23</span></a></sup><span data-dcnode-id="3115" instrument_node="">, and collaborative efforts between climate and machine learning scientists initiated the field of climate informatics</span><sup data-dcnode-id="3109"><a aria-label="Reference 24" data-dcnode-id="3113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d243953728e1035" title="Monteleoni, C., Schmidt, G. A. &amp; McQuade, S. Climate informatics: accelerating discovering in climate science with machine learning. Comput. Sci. Eng.15, 32–40 (2013)."><span data-dcnode-id="3114" instrument_node="">24</span></a><span data-dcnode-id="3112" instrument_node="">,</span><a aria-label="Reference 25" data-dcnode-id="3110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d243953728e1038" title="Rolnick, D. et al. Tackling climate change with machine learning. Preprint at 
https://arxiv.org/abs/1906.05433

 (2019)."><span data-dcnode-id="3111" instrument_node="">25</span></a></sup><span data-dcnode-id="3108" instrument_node=""> that continues to advance predictive and interpretive tools for climate action. Future improvements in both data infrastructure and AI technology can be expected to lead to an even more diverse set of potential AI4SG applications.</span></p><p data-dcnode-id="3093"><span data-dcnode-id="3106" instrument_node="">This wealth of projects, sometimes isolated, has led to several meta-initiatives. For example, the Oxford Initiative on AIxSDGs</span><sup data-dcnode-id="3103"><a aria-label="Reference 26" data-dcnode-id="3104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d243953728e1046" title="Stephen, A. et al. Oxford initiative on AIxSDGs. 
https://www.sbs.ox.ac.uk/research/centres-and-initiatives/oxford-initiative-aisdgs

 (2019)."><span data-dcnode-id="3105" instrument_node="">26</span></a></sup><span data-dcnode-id="3102" instrument_node="">, launched in September 2019, is a curated database of AI projects addressing SDGs that indexes close to 100 projects. Once publicly accessible, it should support a formal study of such projects’ characteristics, success factors, geographical repartition, gaps, and collaborations. Attempts at similar repositories include the ITU AI Repository</span><sup data-dcnode-id="3099"><a aria-label="Reference 27" data-dcnode-id="3100" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d243953728e1050" title="ITU AI repository. 
https://www.itu.int/en/ITU-T/AI/Pages/ai-repository.aspx

 (2019)."><span data-dcnode-id="3101" instrument_node="">27</span></a></sup><span data-dcnode-id="3098" instrument_node="">. Another growing initiative, focused on networking AI4SG and making their blueprints easily accessible and reproducible by anyone, is the AI Commons knowledge hub</span><sup data-dcnode-id="3095"><a aria-label="Reference 28" data-dcnode-id="3096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d243953728e1054" title="AI Commons. 
https://ai-commons.org/

 (2019)."><span data-dcnode-id="3097" instrument_node="">28</span></a></sup><span data-dcnode-id="3094" instrument_node=""> backed by 21 supporting organisations and 71 members. These meta-initiatives can help aggregate the experience and transfer knowledge between AI4SG projects, as well as establish connections between teams and organisations with complementary aims.</span></p><p data-dcnode-id="3075"><span data-dcnode-id="3092" instrument_node="">Despite the optimism, technical and organisational challenges remain that make successful applications of AI/ML hard to deliver within the field and that make it difficult to achieve lasting impact. Some of the issues are deeply ingrained in the tech culture that involves moving fast and breaking things while iterating towards solutions, and a lack of familiarity with the non-technical aspects of the problems</span><sup data-dcnode-id="3089"><a aria-label="Reference 29" data-dcnode-id="3090" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d243953728e1061" title="Kleinman, M. Tech folk: ’Move fast and break things’ doesn’t work when lives are at stake. 
https://www.theguardian.com/global-development-professionals-network/2017/feb/02/technology-human-rights

 (2017)."><span data-dcnode-id="3091" instrument_node="">29</span></a></sup><span data-dcnode-id="3088" instrument_node="">. There is also a long history of tech for good, including 30 years of Information and Communication Technology for Development (ICT4D). Not all applications of technology aimed at delivering positive social impact manage to achieve their goals</span><sup data-dcnode-id="3085"><a aria-label="Reference 30" data-dcnode-id="3086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d243953728e1065" title="Toyama, K. Geek Heresy: Rescuing Social Change from the Cult of Technology (PublicAffairs, 2015)."><span data-dcnode-id="3087" instrument_node="">30</span></a></sup><span data-dcnode-id="3084" instrument_node="">, leaving us with important experiences from which we must learn. Importantly, technology should not be imagined as a solution on its own</span><sup data-dcnode-id="3081"><a aria-label="Reference 31" data-dcnode-id="3082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d243953728e1069" title="Selbst, A. D., Boyd, D., Friedler, S. A., Venkatasubramanian, S. &amp; Vertesi, J. Fairness and abstraction in sociotechnical systems. In&nbsp;(eds Chouldechova, A. &amp; Diaz, F.)&nbsp;Proc. Conference on Fairness, Accountability, and Transparency, FAT* ’19, New York, NY, USA, 59–68 (ACM, 2019)."><span data-dcnode-id="3083" instrument_node="">31</span></a></sup><span data-dcnode-id="3080" instrument_node="">, outside of the context of its application: it merely aligns with human intent and magnifies human capacity</span><sup data-dcnode-id="3077"><a aria-label="Reference 32" data-dcnode-id="3078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d243953728e1073" title="Toyama, K. Technology as amplifier in international development. In Proc. 2011 iConference, iConference ’11, New York, NY, USA, 75–82 (ACM, 2011)."><span data-dcnode-id="3079" instrument_node="">32</span></a></sup><span data-dcnode-id="3076" instrument_node="">. It is therefore critical to put it in service of application-domain experts early, through deep partnerships with technical experts.</span></p><p data-dcnode-id="3049"><span data-dcnode-id="3074" instrument_node="">To achieve positive impact, AI solutions need to adhere to ethical principles and both the European Commission</span><sup data-dcnode-id="3071"><a aria-label="Reference 33" data-dcnode-id="3072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d243953728e1080" title="High-Level Expert Group on Artificial Intelligence. Ethics guidelines for trustworthy AI. 
https://ec.europa.eu/newsroom/dae/document.cfm?doc_id=60419

 (2019)."><span data-dcnode-id="3073" instrument_node="">33</span></a></sup><span data-dcnode-id="3070" instrument_node=""> as well as OECD</span><sup data-dcnode-id="3067"><a aria-label="Reference 34" data-dcnode-id="3068" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d243953728e1084" title="OECD, Artificial intelligence in society. 
https://doi.org/10.1787/eedfee77-en

 (OECD Publishing, 2019)."><span data-dcnode-id="3069" instrument_node="">34</span></a></sup><span data-dcnode-id="3066" instrument_node=""> have put together guidelines for developing innovative and trustworthy AI. Related principles are encoded in the Montreal Declaration for Responsible AI</span><sup data-dcnode-id="3063"><a aria-label="Reference 35" data-dcnode-id="3064" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d243953728e1088" title="Abrassart, C. et al. Montreal Declaration for responsible AI. 
https://www.montrealdeclaration-responsibleai.com/

 (2018)."><span data-dcnode-id="3065" instrument_node="">35</span></a></sup><span data-dcnode-id="3062" instrument_node=""> and the Toronto Declaration</span><sup data-dcnode-id="3059"><a aria-label="Reference 36" data-dcnode-id="3060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d243953728e1092" title="Bacciarelli, A. et al. The Toronto Declaration: Protecting the rights to equality and non-discrimination in machine learning systems. 
https://www.accessnow.org/the-toronto-declaration-protecting-the-rights-to-equality-and-non-discrimination-in-machine-learning-systems/

 (2018)."><span data-dcnode-id="3061" instrument_node="">36</span></a></sup><span data-dcnode-id="3058" instrument_node="">. The European Commission states that AI needs to be lawful, ethical and robust, to avoid causing unintended harm. OECD Principles on AI state that AI should be driving inclusive growth and sustainable development; designed so as to respect the rule of law, human rights, democratic values and diversity; transparent, so that people can understand AI outcomes; robust, safe and secure; deployed with accountability, so that organisations can be held responsible for AI systems they develop and use. Proper ethical design and governance of AI systems is a broad research topic of fundamental importance, and has been the focus of institutions and initiatives like the AI Now Institute</span><sup data-dcnode-id="3055"><a aria-label="Reference 37" data-dcnode-id="3056" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d243953728e1096" title="AI Now Institute. 
https://ainowinstitute.org/

 (2017)."><span data-dcnode-id="3057" instrument_node="">37</span></a></sup><span data-dcnode-id="3054" instrument_node=""> and the ACM Conference on Fairness, Accountability and Transparency</span><sup data-dcnode-id="3051"><a aria-label="Reference 38" data-dcnode-id="3052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d243953728e1101" title="ACM Conference on Fairness, Accountability, and Transparency (ACM FAccT). 
https://facctconference.org/

 (2019)."><span data-dcnode-id="3053" instrument_node="">38</span></a></sup><span data-dcnode-id="3050" instrument_node="">.</span></p><p data-dcnode-id="3043"><span data-dcnode-id="3048" instrument_node="">Also, it is important to recognise the interconnectedness of the Sustainable Development Goals (SDGs) and of efforts to achieve them. The UN stresses that each goal needs to be achieved so that no one is left behind. Yet, an intervention with a positive impact on one SDG could be detrimental to another SDG and its targets. Awareness of this interconnectedness should also be a driving principle for fair and inclusive AI for social good: AI applications should aim to maximise a net positive effect on as many SDGs as possible, without causing avoidable harm to other SDGs. Therefore, while being careful to avoid the pitfalls of analysis paralysis</span><sup data-dcnode-id="3045"><a aria-label="Reference 39" data-dcnode-id="3046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d243953728e1108" title="Kleinman, M. Development is not a science and cannot be measured. That is not a bad thing. 
https://www.theguardian.com/global-development-professionals-network/2017/jun/01/development-is-not-a-science-and-cannot-be-measured-that-is-not-a-bad-thing

 (2017)."><span data-dcnode-id="3047" instrument_node="">39</span></a></sup><span data-dcnode-id="3044" instrument_node="">, both application-domain experts and AI researchers should aspire to measure the effects, both positive and negative, of their AI for social good applications across the five areas of people, planet, prosperity, peace and partnerships, which are the targets of the sustainable development agenda.</span></p><p data-dcnode-id="3037"><span data-dcnode-id="3042" instrument_node="">A recent UN report</span><sup data-dcnode-id="3039"><a aria-label="Reference 40" data-dcnode-id="3040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d243953728e1115" title="United Nations Activities on Artificial Intelligence (AI). 
https://www.itu.int/dms_pub/itu-s/opb/gen/S-GEN-UNACT-2019-1-PDF-E.pdf

 (International Communication Union, 2019)."><span data-dcnode-id="3041" instrument_node="">40</span></a></sup><span data-dcnode-id="3038" instrument_node=""> details how over 30 of its agencies and bodies are working towards integrating AI within their initiatives. According to the report, AI4SG projects need to be approached as a collaborative effort, bringing communities together to carefully assess the complexities of designing AI systems for SDGs. These initiatives should aim to involve NGOs, local authorities, businesses, the academic community, as well as the communities which these efforts support. The report highlights the vast potential of the technology across a wide spectrum of applications, while recognising the need for improving data literacy and a responsible approach to AI research and deployment. Our own efforts to put these considerations into practice have led us to put forward in the next section a set of guidelines with which to approach AI4SG, which we then exemplify with a set of case studies before concluding with a call to action for technical communities and their important role in supporting the success of our social and global goals.</span></p></div></div></section><section data-dcnode-id="2781" data-title="Guidelines for AI4SG collaborations"><div class="c-article-section" data-dcnode-id="2782" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3032" id="Sec2"><span data-dcnode-id="3033" instrument_node="">Guidelines for AI4SG collaborations</span></h2><div class="c-article-section__content" data-dcnode-id="2783" id="Sec2-content"><p data-dcnode-id="3026"><span data-dcnode-id="3031" instrument_node="">To address the challenges involved with setting up successful collaborations between AI researchers and application-domain experts working on SDGs, we facilitated a series of structured multidisciplinary discussions at a dedicated seminar</span><sup data-dcnode-id="3028"><a aria-label="Reference 41" data-dcnode-id="3029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d243953728e1127" title="Clopath, C., De Winne, R., Khan, M. E. &amp; Schaul, T. Dagstuhl AI for Social Good Seminar. 
https://www.dagstuhl.de/19082

 (2019)."><span data-dcnode-id="3030" instrument_node="">41</span></a></sup><span data-dcnode-id="3027" instrument_node=""> bringing together experts from both communities to identify key aspects of successful partnerships, and potential obstacles. This process involved setting up focused working groups around key topics and repeatedly coming together to disseminate the results, obtain feedback and discuss within the wider group. We present the conclusions in the form of guidelines to inform future AI4SG initiatives and ground our recommendations in practical examples of successful AI4SG collaborations.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><div class="c-article-table-container" data-dcnode-id="2940"><div class="c-article-table-border c-table-scroll-wrapper" data-dcnode-id="2941"><div class="c-table-scroll-wrapper__content c-table-scroll-wrapper__fade--transparent" data-component-scroll-wrapper="" data-dcnode-id="2942"><table class="data last-table" data-dcnode-id="2943"><tbody data-dcnode-id="2944"><tr data-dcnode-id="3017"><td class="u-text-left" data-dcnode-id="3020"><span data-dcnode-id="3024" instrument_node="">
</span><b data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">G1</span></b><span data-dcnode-id="3021" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">
                          Expectations of what is possible with AI need to be well-grounded.
                        </span></td></tr><tr data-dcnode-id="3009"><td class="u-text-left" data-dcnode-id="3012"><span data-dcnode-id="3016" instrument_node="">
</span><b data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">G2</span></b><span data-dcnode-id="3013" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">
                          There is value in simple solutions.
                        </span></td></tr><tr data-dcnode-id="3001"><td class="u-text-left" data-dcnode-id="3004"><span data-dcnode-id="3008" instrument_node="">
</span><b data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">G3</span></b><span data-dcnode-id="3005" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">
                          Applications of AI need to be inclusive and accessible, and reviewed at every stage for ethics and human rights compliance.
                        </span></td></tr><tr data-dcnode-id="2993"><td class="u-text-left" data-dcnode-id="2996"><span data-dcnode-id="3000" instrument_node="">
</span><b data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">G4</span></b><span data-dcnode-id="2997" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">
                          Goals and use cases should be clear and well-defined.
                        </span></td></tr><tr data-dcnode-id="2985"><td class="u-text-left" data-dcnode-id="2988"><span data-dcnode-id="2992" instrument_node="">
</span><b data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">G5</span></b><span data-dcnode-id="2989" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">
                          Deep, long-term partnerships are required to solve large problems successfully.
                        </span></td></tr><tr data-dcnode-id="2977"><td class="u-text-left" data-dcnode-id="2980"><span data-dcnode-id="2984" instrument_node="">
</span><b data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">G6</span></b><span data-dcnode-id="2981" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">
                          Planning needs to align incentives, and factor in the limitations of both communities.
                        </span></td></tr><tr data-dcnode-id="2969"><td class="u-text-left" data-dcnode-id="2972"><span data-dcnode-id="2976" instrument_node="">
</span><b data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">G7</span></b><span data-dcnode-id="2973" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">
                          Establishing and maintaining trust is key to overcoming organisational barriers.
                        </span></td></tr><tr data-dcnode-id="2961"><td class="u-text-left" data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">
</span><b data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">G8</span></b><span data-dcnode-id="2965" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">
                          Options for reducing the development cost of AI solutions should be explored.
                        </span></td></tr><tr data-dcnode-id="2953"><td class="u-text-left" data-dcnode-id="2956"><span data-dcnode-id="2960" instrument_node="">
</span><b data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">G9</span></b><span data-dcnode-id="2957" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">
                          Improving data readiness is key.
                        </span></td></tr><tr data-dcnode-id="2945"><td class="u-text-left" data-dcnode-id="2948"><span data-dcnode-id="2952" instrument_node="">
</span><b data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">G10</span></b><span data-dcnode-id="2949" instrument_node="">
</span></td><td class="u-text-left" data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">
                          Data must be processed securely, with utmost respect for human rights and privacy.
                        </span></td></tr></tbody></table></div></div></div><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2903"><span data-dcnode-id="2938" instrument_node="">These guidelines summarise what we see as key principles for successful AI4SG collaborations and should therefore be applicable across different types of organisations aiming to utilise AI for sustainable development. These guidelines pertain to the overall use of AI technology (</span><b data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">G1</span></b><span data-dcnode-id="2935" instrument_node="">, </span><b data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">G2</span></b><span data-dcnode-id="2932" instrument_node="">, </span><b data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">G3</span></b><span data-dcnode-id="2929" instrument_node="">), applications (</span><b data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">G4</span></b><span data-dcnode-id="2926" instrument_node="">, </span><b data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">G5</span></b><span data-dcnode-id="2923" instrument_node="">, </span><b data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">G6</span></b><span data-dcnode-id="2920" instrument_node="">, </span><b data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">G7</span></b><span data-dcnode-id="2917" instrument_node="">, </span><b data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">G8</span></b><span data-dcnode-id="2914" instrument_node="">) and data handling (</span><b data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">G9</span></b><span data-dcnode-id="2911" instrument_node="">, </span><b data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">G10</span></b><span data-dcnode-id="2908" instrument_node="">). The list is by no means exhaustive and we expect there to be notable differences in how each of the guidelines is implemented in practice, depending on the data readiness of each organisation and the theory of change underpinning the projects. The recent report from the Google AI Impact Challenge identifies NGOs in particular as having a low rate of utilising AI in their existing projects, which is why we feel they might be the ones to benefit the most from the guidelines provided here</span><sup data-dcnode-id="2905"><a aria-label="Reference 42" data-dcnode-id="2906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d243953728e1352" title="Google AI impact challenge. 
https://ai.google/social-good/impact-challenge/

 (2018)."><span data-dcnode-id="2907" instrument_node="">42</span></a></sup><span data-dcnode-id="2904" instrument_node="">.</span></p><p data-dcnode-id="2898"><span data-dcnode-id="2902" instrument_node="">The fast pace of AI research may sometimes make it difficult for organisations outside the field to correctly assess the applicability of the current state of the art. It is therefore important to set expectations early (</span><b data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">G1</span></b><span data-dcnode-id="2899" instrument_node="">), to distinguish between short-term and long-term opportunities and help select projects accordingly.</span></p><p data-dcnode-id="2885"><span data-dcnode-id="2897" instrument_node="">Despite the apparent appeal of using the latest ML methods, these may require large quantities of high-quality training data. AI4SG projects may sometimes benefit from simpler solutions</span><sup data-dcnode-id="2894"><a aria-label="Reference 43" data-dcnode-id="2895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d243953728e1366" title="Donner, J., Gandhi, R., Javid, P., Medhi, I. &amp; Ratan, A. et al. Stages of design in technology for global development. Computer41, 34–41 (2008)."><span data-dcnode-id="2896" instrument_node="">43</span></a></sup><span data-dcnode-id="2893" instrument_node="">, aiming to solve the problem at hand with minimum overall complexity (</span><b data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">G2</span></b><span data-dcnode-id="2890" instrument_node="">). Such solutions tend to be faster to implement, easier to maintain, interpret and justify—and are sometimes sufficient to solve valuable practical problems, as demonstrated by the winning solution in a recent food safety predictive challenge</span><sup data-dcnode-id="2887"><a aria-label="Reference 44" data-dcnode-id="2888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d243953728e1373" title="Chouldechova, A. Keeping it fresh: predict restaurant inspections. 
https://www.drivendata.org/competitions/5/keeping-it-fresh-predict-restaurant-inspections/

 (2015)."><span data-dcnode-id="2889" instrument_node="">44</span></a></sup><span data-dcnode-id="2886" instrument_node="">. Data analysis and visualisation can be a useful tool in informing practical decision-making and can potentially deliver value to organisations.</span></p><p data-dcnode-id="2870"><span data-dcnode-id="2884" instrument_node="">AI systems need to be fair, inclusive and accessible (</span><b data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">G3</span></b><span data-dcnode-id="2881" instrument_node="">). Fairness in particular should be explicitly accounted for, to avoid reinforcing existing societal biases reflected in the data used for model development</span><sup data-dcnode-id="2872"><a data-dcnode-id="2879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d243953728e1383" title="Chouldechova, A. &amp; Roth, A. The frontiers of fairness in machine learning, Preprint at 
https://arxiv.org/abs/1810.08810

 (2018)."><span data-dcnode-id="2880" instrument_node="">45</span></a><span data-dcnode-id="2878" instrument_node="">,</span><a data-dcnode-id="2876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d243953728e1383_1" title="Corbett-Davies, S. &amp; Goel, S. The measure and mismeasure of fairness: a critical review of fair machine learning. Preprint at 
https://arxiv.org/abs/1808.00023

 (2018)."><span data-dcnode-id="2877" instrument_node="">46</span></a><span data-dcnode-id="2875" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="2873" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d243953728e1386" title="Hutchinson, B. &amp; Mitchell, M. 50 years of test (un)fairness: lessons for machine learning. In&nbsp;Chouldechova, A. &amp; Diaz, F.&nbsp;(eds)&nbsp;Proceedings of the Conference on Fairness, Accountability, and Transparency, FAT* ’19, New York, NY, USA, 49−58 (Association for Computing Machinery, 2019)."><span data-dcnode-id="2874" instrument_node="">47</span></a></sup><span data-dcnode-id="2871" instrument_node="">. Unfairness may result in violations of the right to equality, manifesting as inequity in model performance and associated outcomes across race, ethnicity, age, gender, etc. Fairness of AI applications should be deeply anchored in existing international human rights standards, guiding all practical decisions. Ethics compliance should be appropriately formalised and involve setting up internal and external processes to review sensitive decisions and design choices.</span></p><p data-dcnode-id="2861"><span data-dcnode-id="2869" instrument_node="">To be actionable, practical problems need to be translated into concrete, well-defined goals (</span><b data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">G4</span></b><span data-dcnode-id="2866" instrument_node="">) that can be addressed by technical solutions. For example, water shortages in case of drought could be addressed by a use case of predicting water demand based on flow data</span><sup data-dcnode-id="2863"><a aria-label="Reference 48" data-dcnode-id="2864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d243953728e1396" title="Forecasting water demand in California when every drop counts. 
https://www.datakind.org/projects/forecasting-water-demand-in-california-when-every-drop-counts

 (2016)."><span data-dcnode-id="2865" instrument_node="">48</span></a></sup><span data-dcnode-id="2862" instrument_node="">. Alternatively, one could approach the problem by providing better weather predictions or tracking water supply and reservoir levels or helping individual consumers reduce their daily water usage. For each goal, it is crucial to provide the correct metric for measuring the desired effect, as well as define the minimum viable performance for a solution to be adding value to its stakeholders.</span></p><p data-dcnode-id="2852"><span data-dcnode-id="2860" instrument_node="">We recognise the critical role of focused short-term initiatives like workshops and hackathons in gathering momentum and bringing application-domain experts together with AI researchers to deepen their mutual understanding of opportunities for achieving SDGs. Yet, we believe that for achieving sustained impact, it is necessary to establish long-term collaborations (</span><b data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">G5</span></b><span data-dcnode-id="2857" instrument_node="">) between application-domain experts and AI researchers and form deep integrated partnerships that allow for enough time to reach good practical solutions</span><sup data-dcnode-id="2854"><a aria-label="Reference 49" data-dcnode-id="2855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d243953728e1406" title="SageWeber, J. &amp; Toyama, K. Remembering the past for meaningful ai-d. In Artificial Intelligence for Development, AAAI Spring Symposium Series. AAAI. 97–102 (2010)."><span data-dcnode-id="2856" instrument_node="">49</span></a></sup><span data-dcnode-id="2853" instrument_node="">.</span></p><p data-dcnode-id="2839"><span data-dcnode-id="2851" instrument_node="">In interdisciplinary collaborations with a large set of stakeholders, it is important to closely align organisational incentives towards the common goals (</span><b data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">G6</span></b><span data-dcnode-id="2848" instrument_node="">). Taking the involvement of academic researchers as an example, measures of academic success should explicitly take into account the wider societal impact of the work</span><sup data-dcnode-id="2845"><a aria-label="Reference 50" data-dcnode-id="2846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d243953728e1416" title="Ebrahim, A. &amp; Rangan, V.K. ‘The limits of nonprofit impact: a contingency framework for measuring social performance. Harvard Business School Working Papers 10-099 (Harvard Business School, 2010)."><span data-dcnode-id="2847" instrument_node="">50</span></a></sup><span data-dcnode-id="2844" instrument_node="">, as citations are known to be a poor proxy for measuring real-world impact</span><sup data-dcnode-id="2841"><a aria-label="Reference 51" data-dcnode-id="2842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d243953728e1420" title="Ravenscroft, J., Liakata, M., Clare, A. &amp; Duma, D. Measuring scientific impact beyond academia: an assessment of existing impact metrics and proposed improvements. PLoS ONE12, 1–21 (2017)."><span data-dcnode-id="2843" instrument_node="">51</span></a></sup><span data-dcnode-id="2840" instrument_node="">.</span></p><p data-dcnode-id="2830"><span data-dcnode-id="2838" instrument_node="">In some cases, AI4SG collaborations may need to overcome existing organisational barriers to adoption of technology and investment in high-tech solutions (</span><b data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">G7</span></b><span data-dcnode-id="2835" instrument_node="">). Scepticism towards AI is partially rooted in depictions of AI in mainstream media, as well as prior examples of technological solutions that failed to live up to the expectations</span><sup data-dcnode-id="2832"><a aria-label="Reference 52" data-dcnode-id="2833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d243953728e1430" title="Erikson, S. L. Building data responsibility into humanitarian action. Med. Anthropol. Q.32, 315–339 (2018)."><span data-dcnode-id="2834" instrument_node="">52</span></a></sup><span data-dcnode-id="2831" instrument_node="">. Failed attempts to utilise technology for social good come with an associated opportunity cost, given the limited resources available. For effective applications of AI, these barriers will need to be overcome through establishing trust and long-term equal partnerships dedicated to delivering lasting impact.</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2829" instrument_node="">AI4SG solutions should aim to be cost-effective (</span><b data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">G8</span></b><span data-dcnode-id="2826" instrument_node="">) and this needs to be taken into account early on in the solution design process. There are several ways in which the development cost of AI solutions can potentially be reduced. Skills-based volunteering is a framework through which businesses can enable researchers to offer pro-bono services to NGOs and volunteer for causes that they are passionate about. Hackathons and platforms for crowd-sourcing technical solutions are equally promising, as well as the use of AutoML tools</span><sup data-dcnode-id="2823"><a aria-label="Reference 53" data-dcnode-id="2824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d243953728e1441" title="Hutter, F., Kotthoff, L., &amp; Vanschoren, J. (eds) Automated Machine Learning: Methods, Systems, Challenges. Springer&nbsp;(2019)."><span data-dcnode-id="2825" instrument_node="">53</span></a></sup><span data-dcnode-id="2822" instrument_node=""> for automating low-level tasks. Some of AI4SG development costs can be covered by grants, for example those offered by the Google AI Impact Challenge</span><sup data-dcnode-id="2819"><a aria-label="Reference 42" data-dcnode-id="2820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d243953728e1445" title="Google AI impact challenge. 
https://ai.google/social-good/impact-challenge/

 (2018)."><span data-dcnode-id="2821" instrument_node="">42</span></a></sup><span data-dcnode-id="2818" instrument_node=""> or the 2030 Vision</span><sup data-dcnode-id="2815"><a aria-label="Reference 54" data-dcnode-id="2816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d243953728e1449" title="2030 Vision: technology partnership for global goals. 
https://www.2030vision.com/

 (2019)."><span data-dcnode-id="2817" instrument_node="">54</span></a></sup><span data-dcnode-id="2814" instrument_node=""> aiming to support projects aligned with SDGs.</span></p><p data-dcnode-id="2797"><span data-dcnode-id="2812" instrument_node="">It is important to be conscious of the different levels of data readiness</span><sup data-dcnode-id="2809"><a aria-label="Reference 55" data-dcnode-id="2810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d243953728e1456" title="Lawrence, N. D. Data readiness levels. Preprint at 
https://arxiv.org/abs/1705.02245

 (2017)."><span data-dcnode-id="2811" instrument_node="">55</span></a></sup><span data-dcnode-id="2808" instrument_node=""> across organisations (</span><b data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">G9</span></b><span data-dcnode-id="2805" instrument_node="">) and how they map onto potential ML solutions. Deep learning approaches tend to require large quantities of high-quality data, whereas smaller and noisier datasets may be amenable to exploratory data analysis. Transfer learning and zero-shot learning approaches should be considered in cases where existing trained models can be re-purposed for the relevant use case</span><sup data-dcnode-id="2799"><a aria-label="Reference 56" data-dcnode-id="2803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d243953728e1463" title="Raina, R., Battle, A., Lee, H., Packer, B. &amp; Ng, A. Y. Self-taught learning: Transfer learning from unlabeled data. In (ed Ghahramani, Z.)&nbsp;Proc. 24th International Conference on Machine Learning, ICML ’07, New York, NY, USA, 759–766 (ACM, 2007)."><span data-dcnode-id="2804" instrument_node="">56</span></a><span data-dcnode-id="2802" instrument_node="">,</span><a aria-label="Reference 57" data-dcnode-id="2800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d243953728e1466" title="Socher, R., Ganjoo, M., Manning, C. D., &amp; Ng, A. in Advances in Neural Information Processing Systems Vol. 26 (eds Burges, C. J. C.), 935–943 (Curran Associates, Inc., 2013)."><span data-dcnode-id="2801" instrument_node="">57</span></a></sup><span data-dcnode-id="2798" instrument_node="">. In the absence of bespoke high-quality data, model development process might benefit from utilising external open datasets like satellite imagery or the existing language corpora and concept ontologies.</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2796" instrument_node="">Secure data storage, data anonymisation and restricted data access are required to ensure that sensitive data are handled with utmost care (</span><b data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">G10</span></b><span data-dcnode-id="2793" instrument_node="">)</span><sup data-dcnode-id="2790"><a aria-label="Reference 58" data-dcnode-id="2791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d243953728e1476" title="Gilman, D. &amp; Baker, L. Humanitarianism in the Age of Cyberwarfare: Towards the Principled and Secure Use of Information in Humanitarian Emergencies (United Nations Office for the Coordination of Humanitarian Affairs, 2014)."><span data-dcnode-id="2792" instrument_node="">58</span></a></sup><span data-dcnode-id="2789" instrument_node="">. Research data should only include minimal information required to deliver the solution. Responsible information governance should be deeply rooted in respect for human rights, and combined with a high level of physical data security. Data should be encrypted both at rest and in transit. Collaborations should aim to implement existing data governance frameworks for humanitarian action</span><sup data-dcnode-id="2786"><a aria-label="Reference 59" data-dcnode-id="2787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d243953728e1480" title="Raymond, N. et al. Building Data Responsibility into Humanitarian Action.&nbsp;OCHA&nbsp;4, (2018)."><span data-dcnode-id="2788" instrument_node="">59</span></a></sup><span data-dcnode-id="2785" instrument_node=""> and consider established standards like the European Union’s General Data Protection Regulation (GDPR) and the United States’ Health Insurance Portability and Accountability Act of 1996 (HIPAA).</span></p></div></div></section><section data-dcnode-id="2610" data-title="Case studies"><div class="c-article-section" data-dcnode-id="2611" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2779" id="Sec4"><span data-dcnode-id="2780" instrument_node="">Case studies</span></h2><div class="c-article-section__content" data-dcnode-id="2612" id="Sec4-content"><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Here we highlight three case studies to reflect on how AI4SG collaboration guidelines can be incorporated in mature projects (Troll Patrol), new projects that are just being initiated (Shaqodoon), as well as community-wide initiatives within the AI community aiming to use AI for sustainable development (Deep Learning Indaba).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2775" id="Sec5"><span data-dcnode-id="2776" instrument_node="">Troll Patrol</span></h3><p data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Having women working in the heart of our democracy is an important step towards achieving gender equality (SDG 5) and strong institutions (SDG 16). This involves creating and protecting inclusive spaces for discussing important political issues. Social media have become an integral part of these conversations and represent an important way of sharing ideas and disseminating information. For women to be equally represented on these digital platforms, they need to be able to share their opinions without fear of abuse.</span></p><p data-dcnode-id="2760"><span data-dcnode-id="2772" instrument_node="">In Troll Patrol</span><sup data-dcnode-id="2766"><a aria-label="Reference 60" data-dcnode-id="2770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d243953728e1502" title="Troll Patrol. 
https://decoders.amnesty.org/projects/troll-patrol

 (2019)."><span data-dcnode-id="2771" instrument_node="">60</span></a><span data-dcnode-id="2769" instrument_node="">,</span><a aria-label="Reference 61" data-dcnode-id="2767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d243953728e1505" title="Delisle, L. et al. A large-scale crowdsourced analysis of abuse against women journalists and politicians on Twitter. Preprint at 
https://arxiv.org/abs/1902.03093

 (2019)."><span data-dcnode-id="2768" instrument_node="">61</span></a></sup><span data-dcnode-id="2765" instrument_node="">, Amnesty International partnered with Element AI’s former AI for Good team to utilise computational statistics and natural language processing methods for quantifying abuse against women on Twitter, based on crowd-sourcing that involved participation of over 6500 volunteers who sorted through 288,000 tweets sent to 778 women politicians and journalists in the UK and USA in 2017. The results of the study have revealed worrying patterns of online abuse, estimating 1.1 million toxic tweets being sent to women in the study across the year, black women being 84% more likely than white women to experience abuse on the platform. The core of the analysis was based on using machine learning approaches to pre-filter the data, followed by applying computational statistics methods. The team has additionally evaluated the feasibility of using a fine-tuned deep learning model for automatic detection of abusive tweets</span><sup data-dcnode-id="2762"><a aria-label="Reference 61" data-dcnode-id="2763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d243953728e1509" title="Delisle, L. et al. A large-scale crowdsourced analysis of abuse against women journalists and politicians on Twitter. Preprint at 
https://arxiv.org/abs/1902.03093

 (2019)."><span data-dcnode-id="2764" instrument_node="">61</span></a></sup><span data-dcnode-id="2761" instrument_node="">. The evaluation suggests that AI could potentially be used to enrich the work of trained human moderators and make abusive tweet detection easier, despite not being ready to be used without human supervision.</span></p><p data-dcnode-id="2731"><span data-dcnode-id="2759" instrument_node="">The project involved a deep partnership (</span><b data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">G5</span></b><span data-dcnode-id="2756" instrument_node="">) between an NGO and an AI team, using established methods (</span><b data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">G1, G2</span></b><span data-dcnode-id="2753" instrument_node="">) for a well-defined goal of identifying abusive tweets (</span><b data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">G4</span></b><span data-dcnode-id="2750" instrument_node="">) in order to make digital platforms more inclusive (</span><b data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">G3</span></b><span data-dcnode-id="2747" instrument_node="">). To perform the study, obtaining labelled data was key (</span><b data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">G9</span></b><span data-dcnode-id="2744" instrument_node="">). Given the sensitivity of the data and possibility of increasing exposure to abuse, all study participants were asked if they wanted to remain anonymous in the reports (</span><b data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">G10</span></b><span data-dcnode-id="2741" instrument_node="">). The AI technology developed in the project is not bespoke to tracking abuse against women, making it reusable and of long-lasting value for the team involved in the development (</span><b data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">G6</span></b><span data-dcnode-id="2738" instrument_node="">). Amnesty International having previously engaged with the team on other AI projects helped build trust to make the collaboration possible (</span><b data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">G7</span></b><span data-dcnode-id="2735" instrument_node="">), and brought their deep domain expertise that the quantitative study had complemented. In terms of technical project execution, using a pretrained model from a larger dataset helped reduce the minimum sample size needed for a performant AI abuse detection system, reducing overall costs (</span><b data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">G8</span></b><span data-dcnode-id="2732" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2729" id="Sec6"><span data-dcnode-id="2730" instrument_node="">Shaqodoon: AI for improving citizen feedback</span></h3><p data-dcnode-id="2716"><span data-dcnode-id="2728" instrument_node="">Citizens play a pivotal role both in helping deliver on SDGs as well as holding development actors accountable by keeping track of their progress. It is especially important to actively involve communities that may not have the means of making their voice heard. Shaqodoon</span><sup data-dcnode-id="2725"><a aria-label="Reference 62" data-dcnode-id="2726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d243953728e1552" title="Shaqodoon. 
http://shaqodoon.org/technology/

 (2019)."><span data-dcnode-id="2727" instrument_node="">62</span></a></sup><span data-dcnode-id="2724" instrument_node=""> is an NGO aiming to improve citizen feedback in Somalia by hosting an interactive voice response platform allowing the citizens to leave feedback on infrastructural projects that affect them. Given that an estimated 65% of the Somali population does not read or write</span><sup data-dcnode-id="2721"><a aria-label="Reference 63" data-dcnode-id="2722" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d243953728e1556" title="The World Factbook. 
http://web.archive.org/web/20130309173758/https://cia.gov/library/publications/the-world-factbook/fields/2103.html

 (2013)."><span data-dcnode-id="2723" instrument_node="">63</span></a></sup><span data-dcnode-id="2720" instrument_node="">, voice recordings provide an inclusive way of aiming to involve everyone in the conversation (</span><b data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">G3</span></b><span data-dcnode-id="2717" instrument_node="">).</span></p><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Manually extracting relevant feedback from voice recordings is a laborious process, and Shaqodoon has been looking at ways of using AI for automating the labelling of incoming responses in order to efficiently identify complaints.</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2713" instrument_node="">Early on in this process, Shaqodoon estimated that there might be up to 80,000 voice recordings available for model development, until a subsequent analysis revealed that only 72 voice recordings had high-quality labels available in an accessible format. This was insufficient for developing an AI solution, making it necessary to reset expectations (</span><b data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">G1</span></b><span data-dcnode-id="2710" instrument_node="">) and improve data readiness (</span><b data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">G9</span></b><span data-dcnode-id="2707" instrument_node="">) through better data collection practices, increasing the number of high-quality labels in a machine-readable format. Shaqodoon worked jointly with ML experts towards identifying the minimum viable AI solution for automated triaging of voice recordings (</span><b data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">G2</span></b><span data-dcnode-id="2704" instrument_node="">) under a formal specification of categories of interest (</span><b data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">G4</span></b><span data-dcnode-id="2701" instrument_node="">), while keeping in mind the privacy of the callers (</span><b data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">G10</span></b><span data-dcnode-id="2698" instrument_node="">). Through this collaboration, Shaqodoon managed to accelerate the project towards the stage where working on AI automation was feasible. The project was selected to be among the finalists of the MIT Solve Challenge</span><sup data-dcnode-id="2695"><a aria-label="Reference 64" data-dcnode-id="2696" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d243953728e1585" title="MIT Solve Challenge. 
https://solve.mit.edu/

 (2019)."><span data-dcnode-id="2697" instrument_node="">64</span></a></sup><span data-dcnode-id="2694" instrument_node="">, an opportunity for Shaqodoon to obtain resources for model development (</span><b data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">G6, G8</span></b><span data-dcnode-id="2691" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2688" id="Sec7"><span data-dcnode-id="2689" instrument_node="">Deep Learning Indaba</span></h3><p data-dcnode-id="2679"><span data-dcnode-id="2687" instrument_node="">Successful implementation of each of our ten guidelines (see </span><a data-dcnode-id="2685" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Taba"><span data-dcnode-id="2686" instrument_node="">Box</span></a><span data-dcnode-id="2684" instrument_node="">) relies on bridge-builders who bring disparate AI4SG stakeholders together. These bridge-builders are people who are embedded within local communities, understand development or humanitarian work, and/or have strong technical skills in data science and AI. Our third case study looks at the Deep Learning Indaba</span><sup data-dcnode-id="2681"><a aria-label="Reference 65" data-dcnode-id="2682" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d243953728e1603" title="Deep Learning Indaba. 
http://www.deeplearningindaba.com/

 (2017)."><span data-dcnode-id="2683" instrument_node="">65</span></a></sup><span data-dcnode-id="2680" instrument_node="">, a grassroots organisation that aims to build strong and locally led capacity in artificial intelligence and its applications across Africa. Such organisations can support the realisation of the Sustainable Development Goals by building strong partnerships (SDG 17) and by fostering innovation (SDG 9). Of particular relevance to supporting successful AI4SG outcomes is the ability of such organisations to support greater diversity and inclusion within the field of AI, and in technical communities more generally. Such inclusivity is the best guarantee that AI applications will effectively work towards social good.</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2678" instrument_node="">The Deep Learning Indaba was established with the mission to strengthen machine learning and AI in Africa, and towards greater self-ownership and self-confidence in AI by pan-African developers and communities. Over the last 3 years, with leadership driven by Africans within their countries and abroad, they contributed to a positive shift in the visibility and ability of Africans in AI. The Indaba, through the critical mass of African AI researchers and engineers it brings together, supports a growing number of AI4SG efforts, including helping to create new datasets like those of African masks</span><sup data-dcnode-id="2675"><a aria-label="Reference 66" data-dcnode-id="2676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d243953728e1610" title="Dibia, V. Art + AI: Generating African Masks. 
https://towardsdatascience.com/african-masks-gans-tpu-9a6b0cf3105c

 (2018)."><span data-dcnode-id="2677" instrument_node="">66</span></a></sup><span data-dcnode-id="2674" instrument_node="">, developing new research for language translation</span><sup data-dcnode-id="2671"><a aria-label="Reference 67" data-dcnode-id="2672" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d243953728e1614" title="Abbott, J. &amp; Martinus, L. Towards neural machine translation for african languages. Preprint at 
https://arxiv.org/abs/1811.05467

 (2018)."><span data-dcnode-id="2673" instrument_node="">67</span></a></sup><span data-dcnode-id="2670" instrument_node="">, creating new continent-wide distributed research groups to develop on natural language tools for African languages that are often considered ‘low-resourced’</span><sup data-dcnode-id="2667"><a aria-label="Reference 68" data-dcnode-id="2668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d243953728e1618" title="Orife, I. et al. Masakhane - Machine Translation For Africa, Preprint at&nbsp;https://arxiv.org/abs/1810.08810&nbsp;(2020)."><span data-dcnode-id="2669" instrument_node="">68</span></a></sup><span data-dcnode-id="2666" instrument_node="">, improving outcomes for malaria</span><sup data-dcnode-id="2663"><a aria-label="Reference 69" data-dcnode-id="2664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d243953728e1622" title="IBM Research - Africa. IBM Malaria Challenge. 
https://zindi.africa/competitions/ibm-malaria-challenge

 (2019)."><span data-dcnode-id="2665" instrument_node="">69</span></a></sup><span data-dcnode-id="2662" instrument_node=""> and in addressing conservation challenges</span><sup data-dcnode-id="2659"><a aria-label="Reference 70" data-dcnode-id="2660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d243953728e1626" title="Packer, C. et al. Snapshot Serengeti. 
https://www.zooniverse.org/projects/zooniverse/snapshot-serengeti

 (2019)."><span data-dcnode-id="2661" instrument_node="">70</span></a></sup><span data-dcnode-id="2658" instrument_node="">. The Snapshot Serengeti Challenge</span><sup data-dcnode-id="2655"><a aria-label="Reference 70" data-dcnode-id="2656" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d243953728e1631" title="Packer, C. et al. Snapshot Serengeti. 
https://www.zooniverse.org/projects/zooniverse/snapshot-serengeti

 (2019)."><span data-dcnode-id="2657" instrument_node="">70</span></a></sup><span data-dcnode-id="2654" instrument_node=""> was done in partnership with DeepMind and had involved using thousands of geo-located, time-stamped and labelled images from camera traps in the Serengeti, to develop AI solutions for tracking migration and activity patterns of potentially endangered animal species to help the conservation efforts (SDG 15). The IBM-Zindi Malaria Challenge</span><sup data-dcnode-id="2651"><a aria-label="Reference 69" data-dcnode-id="2652" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d243953728e1635" title="IBM Research - Africa. IBM Malaria Challenge. 
https://zindi.africa/competitions/ibm-malaria-challenge

 (2019)."><span data-dcnode-id="2653" instrument_node="">69</span></a></sup><span data-dcnode-id="2650" instrument_node=""> was done in partnership with IBM Research Africa and was looking at using reinforcement learning for combining interventions for reducing the likelihood of transmission and reducing prevalence of malaria infections (SDG 3). Groups like the Indaba also work in strong partnership with many other groups, such as Data Science Africa, Black-in-AI and Women in Machine Learning, emphasising the importance of sector-wide collaboration to improve representation. This also makes these organisations better positioned to do justice to the interconnectedness of SDGs. This grassroots approach to building stronger socio-technical communities has also been replicated in other regions, in eastern Europe, south-east Asia and South America, showing the growing ability of global communities in strengthening their own capacities and of their eventual contributions towards AI for Social Good.</span></p><p data-dcnode-id="2613"><span data-dcnode-id="2648" instrument_node="">Dialogue with technical grassroots organisations like the Deep Learning Indaba informs several of our guidelines: these organisations can ensure inclusive and accessible applications (</span><b data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">G3</span></b><span data-dcnode-id="2645" instrument_node="">); they can create the environment and provide the embedded capacity that supports long-term partnerships (</span><b data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">G5</span></b><span data-dcnode-id="2642" instrument_node="">); they can act as translators between different stakeholders (</span><b data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">G1</span></b><span data-dcnode-id="2639" instrument_node="">); they can help facilitate teams whose work is informed by resource constraints (</span><b data-dcnode-id="2637"><span data-dcnode-id="263
