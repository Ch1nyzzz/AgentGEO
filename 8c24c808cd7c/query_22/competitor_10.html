</span><div class="pum-content popmake-content" data-dcnode-id="45"><span data-dcnode-id="505" instrument_node="">
</span><ol data-dcnode-id="499"><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" style="font-weight: 400;"><span data-dcnode-id="503" instrument_node=""> Introduction</span></span></li><span data-dcnode-id="500" instrument_node="">
</span></ol><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" style="font-weight: 400;"><span data-dcnode-id="497" instrument_node="">The protection and security of personal data is of paramount importance to 3D Predict and its affiliates (“3D Predict”, “3D Smile USA”, “3D Smile”, “we”, “us”, and “our”). This Privacy Statement explains how we collect, protect, use and share your Personal Data (i.e., information about an identified or identifiable natural person). We collect and process personal data in compliance with the applicable data protection and privacy laws and regulations.</span></span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" style="font-weight: 400;"><span data-dcnode-id="493" instrument_node="">It is important for us that you are aware of which personal data are collected when you visit our website and when you make use of our services or offers. The following discloses how we collect, use and share the information we gather on our website(s) (collectively, the “Sites”).</span></span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" style="font-weight: 400;"><span data-dcnode-id="489" instrument_node="">We also want you to be aware of how we subsequently use this data. Our privacy notice provides information on this and about how we protect your personal data from manipulation, loss, destruction or improper use. In general, you can visit our Sites without telling us who you are or revealing any Personal Data about yourself. There are times, however, when we may seek information from you, about yourself or someone you know, such as name, email address and/or business or home address. It is our intent to let you know before we collect such Personal Data from you on the Internet and to get your consent to process such information where required.</span></span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" style="font-weight: 400;"><span data-dcnode-id="485" instrument_node="">By using our Sites, you consent to our collection, use, disclosure, transfer and processing of Personal Data in accordance with this Privacy Statement.</span></span></p><span data-dcnode-id="482" instrument_node="">
</span><ol data-dcnode-id="476" start="2"><span data-dcnode-id="481" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" style="font-weight: 400;"><span data-dcnode-id="480" instrument_node=""> What information do we collect from you?</span></span></li><span data-dcnode-id="477" instrument_node="">
</span></ol><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" style="font-weight: 400;"><span data-dcnode-id="474" instrument_node="">We collect Personal Data of customers, patients (former, potential and current), patients’ parents/guardians, physicians, and website visitors when you register to become a member of our Sites or via on-line forms or when you use the 3D Predict 3D Plan Viewer. Examples of when such data may be collected include when you sign up to receive news alerts from us or to undergo a smile assessment. Such information may include your name, address, telephone number, email address, date of birth or age, gender, income information, credit card and other financial information related to payments for services, dental records, physician information, photographs and other information you choose to provide. In addition, when visiting our Sites, we may collect sensitive data about you such as health information regarding your teeth, including images of your teeth. Users of the 3D Predict 3D Plan Viewer may also have information about their aligner wear, aligner stage, scheduled appointments, and treatment progress shared with their treating physician.</span></span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" style="font-weight: 400;"><span data-dcnode-id="470" instrument_node="">We will notify you of such purposes at the time that we request to collect Personal Data, including sensitive data, from you and will endeavor to only collect the information that is strictly necessary to fulfill those purposes.</span></span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" style="font-weight: 400;"><span data-dcnode-id="466" instrument_node="">Where we collect health data via our Sites, we will ask for your explicit consent to the collection of sensitive data and acceptance of the terms of this Privacy Statement.</span></span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" style="font-weight: 400;"><span data-dcnode-id="462" instrument_node="">We will also collect information about your use of our Sites as described in the section “Cookies and Web Tracking” at Paragraph 8, below.</span></span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" style="font-weight: 400;"><span data-dcnode-id="458" instrument_node="">On occasions you may choose to provide us with Personal Data about other people so that, for example, we can contact them with information about us. You must only share their Personal Data with us if you have obtained their consent and permission to do so.</span></span></p><span data-dcnode-id="455" instrument_node="">
</span><ol data-dcnode-id="449" start="3"><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" style="font-weight: 400;"><span data-dcnode-id="453" instrument_node=""> How safe is your data?</span></span></li><span data-dcnode-id="450" instrument_node="">
</span></ol><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node="">We take technical and organizational security measures to protect your personal data against accidental or intentional manipulation, loss, destruction or access by unauthorized persons. The measures are designed to ensure the confidentiality and integrity of your data and to ensure the continued availability and resilience of the systems and services processing them. Our security measures include encryption of your data, firewalls and password protection. Our data processing and security measures are improved constantly in line with technological developments. Unfortunately, no data transmission over the Internet or storage of information can be guaranteed to be 100% secure. As a result, while 3D Predict strives to protect your Personal Data, we cannot ensure or warrant the security of any information you transmit to 3D Predict, and you do so at your own risk. In the unlikely event of a breach, we will notify you promptly and outline our plans to correct it. Please note, however, that you are solely responsible for using adequately secured devices (e.g. antivirus software) when accessing our websites and services in order to avoid any unauthorized access by third parties.&nbsp;</span></span></p><span data-dcnode-id="444" instrument_node="">
</span><ol data-dcnode-id="438" start="4"><span data-dcnode-id="443" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="441" style="font-weight: 400;"><span data-dcnode-id="442" instrument_node=""> How do we use your Personal Data?</span></span></li><span data-dcnode-id="439" instrument_node="">
</span></ol><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" style="font-weight: 400;"><span data-dcnode-id="436" instrument_node="">‘Personal Data’ refers to any information that identifies, or can be used to identify, you personally; for example, your name, address, phone number, email address or invoicing details. We use your Personal Data for a variety of business purposes and collect and process Personal Data only as permitted by law and/or if you have given prior consent. We will process and store your information as long as we are required to do so by law or until the reasonable fulfillment of the purpose for which it was collected; for your revocation, withdrawal and deletion rights please see paragraphs 7 and 12, below.</span></span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" style="font-weight: 400;"><span data-dcnode-id="432" instrument_node="">Our processing of your Personal Data depends on your interaction with us and requires your consent or a legal basis. It includes the following:</span></span></p><span data-dcnode-id="429" instrument_node="">
</span><ol data-dcnode-id="423"><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="425"><span data-dcnode-id="426" style="font-weight: 400;"><span data-dcnode-id="427" instrument_node=""> Contact and information requests</span></span></li><span data-dcnode-id="424" instrument_node="">
</span></ol><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" style="font-weight: 400;"><span data-dcnode-id="421" instrument_node="">We use your Personal Data to process and respond to your contact and information requests, to process and ship your orders as well as for invoicing. We also use your Personal Data to provide details of dentists and their practices and to submit contact requests to them.&nbsp;</span></span></p><span data-dcnode-id="418" instrument_node="">
</span><ol data-dcnode-id="412"><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" style="font-weight: 400;"><span data-dcnode-id="416" instrument_node=""> Offline and online Marketing</span></span></li><span data-dcnode-id="413" instrument_node="">
</span></ol><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" style="font-weight: 400;"><span data-dcnode-id="410" instrument_node="">We may inform you about our products, services, training courses, events and customer surveys in the field of dentistry. We may also conduct customer analysis, which may include the combination of data we receive from you offline and online, in order to provide you with customized information or offers as well as courses, events and customer satisfaction surveys which may be of interest to you in the field of dentistry. We may also use the data to gather demographic information about user trends, such as age, gender, and general income levels, to analyze use of our services and products, develop new services and products, and customize our products, services and other information we make available, and/or to provide certified physicians with information on actual or prospective patients.</span></span></p><span data-dcnode-id="407" instrument_node="">
</span><ol data-dcnode-id="401"><span data-dcnode-id="406" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="404" style="font-weight: 400;"><span data-dcnode-id="405" instrument_node=""> Course and event registrations</span></span></li><span data-dcnode-id="402" instrument_node="">
</span></ol><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" style="font-weight: 400;"><span data-dcnode-id="399" instrument_node="">We use your Personal Data to carry out registration for courses and events, including invoicing, and provide you with information about the course or event. Where applicable and indicated, your details will also be processed by our cooperation partners for the execution and/organization of the courses and events.</span></span></p><span data-dcnode-id="396" instrument_node="">
</span><ol data-dcnode-id="390"><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" style="font-weight: 400;"><span data-dcnode-id="394" instrument_node=""> Online job applications</span></span></li><span data-dcnode-id="391" instrument_node="">
</span></ol><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" style="font-weight: 400;"><span data-dcnode-id="388" instrument_node="">When you apply for a job opening, training opportunity or internship with us, we use and process your address, telecommunication and application data for the purpose of processing and evaluating your application and contacting you.</span></span></p><span data-dcnode-id="385" instrument_node="">
</span><ol data-dcnode-id="379" start="5"><span data-dcnode-id="384" instrument_node="">
</span><li data-dcnode-id="381"><span data-dcnode-id="382" style="font-weight: 400;"><span data-dcnode-id="383" instrument_node=""> Required information</span></span></li><span data-dcnode-id="380" instrument_node="">
</span></ol><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" style="font-weight: 400;"><span data-dcnode-id="377" instrument_node="">If a data-collection form contains data fields that are marked as mandatory or with an asterisk (*), the provision of such information is either required by law or by contract, or may be needed for the conclusion of a contract, provision of services or the fulfillment of the stated purpose. If you do not provide the required information, this may result in us not being able to fulfill a contract or the requested service not being provided or the stated purpose not being achievable.</span></span></p><span data-dcnode-id="374" instrument_node="">
</span><ol data-dcnode-id="368" start="6"><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="370"><span data-dcnode-id="371" style="font-weight: 400;"><span data-dcnode-id="372" instrument_node=""> With whom do we share your data?</span></span></li><span data-dcnode-id="369" instrument_node="">
</span></ol><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" style="font-weight: 400;"><span data-dcnode-id="366" instrument_node="">We partner with other businesses to assist us in our marketing, communications, and sales efforts, and may share your Personal Data for these purposes where you have given us consent to do so or where permitted by law. These partners are not allowed to use your information for any purpose other than doing business with 3D Predict. Your Personal Data may be shared with third-party service providers, suppliers and other cooperation partners used by 3D Predict for processing your orders, requests and registrations for courses and events. Your Personal Data may also be shared with third-party service providers that provide support services to 3D Predict, including, for example, printers, call centers, advertising agencies, internet and IT service providers and data centers. In addition, we may share your information with other affiliates of 3D Predict, in particular for support, processing, supply or marketing purposes.</span></span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" style="font-weight: 400;"><span data-dcnode-id="362" instrument_node="">Our service providers, suppliers and other cooperation partners may only process your Personal Data for our purposes. Any sharing of Personal Data with third parties and affiliates is subject to their compliance with our privacy and confidentiality terms.</span></span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" style="font-weight: 400;"><span data-dcnode-id="358" instrument_node="">In addition, any information we collect, including Personal Data, may be disclosed as part of any potential or actual purchase, reorganization, merger, acquisition, debt financing, sale of company assets, or similar transaction, as well as in the event of insolvency, bankruptcy or receivership, in which case Personal Data could be transferred to third parties as one of our business assets.</span></span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" style="font-weight: 400;"><span data-dcnode-id="354" instrument_node="">We may also disclose your Personal Data if we believe that doing so is required by law, court order or legal process; under the discovery process in litigation; to enforce our legal rights, policies or contracts; to collect amounts owed to 3D Predict; when we believe disclosure is necessary or appropriate to prevent physical harm or financial loss or in connection with an investigation or prosecution of suspected or actual illegal activity; or if in good faith we believe that disclosure is otherwise necessary or advisable necessary.&nbsp;</span></span></p><span data-dcnode-id="351" instrument_node="">
</span><ol data-dcnode-id="345" start="7"><span data-dcnode-id="350" instrument_node="">
</span><li data-dcnode-id="347"><span data-dcnode-id="348" style="font-weight: 400;"><span data-dcnode-id="349" instrument_node=""> Your Right to Object to Processing</span></span></li><span data-dcnode-id="346" instrument_node="">
</span></ol><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" style="font-weight: 400;"><span data-dcnode-id="343" instrument_node="">You have the right to object to the processing of your Personal Data by us, on grounds relating to your particular situation, subject, however, to applicable legal requirements or rights.</span></span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" style="font-weight: 400;"><span data-dcnode-id="339" instrument_node="">If you object to the processing of your data or want to revoke a given consent, please send a short message to the email or postal address provided under Paragraph 18.</span></span></p><span data-dcnode-id="336" instrument_node="">
</span><ol data-dcnode-id="326" start="8"><span data-dcnode-id="335" instrument_node="">
</span><li data-dcnode-id="332"><span data-dcnode-id="333" style="font-weight: 400;"><span data-dcnode-id="334" instrument_node=""> Cookies and Web Tracking</span></span></li><span data-dcnode-id="331" instrument_node="">
</span><li data-dcnode-id="328"><span data-dcnode-id="329" style="font-weight: 400;"><span data-dcnode-id="330" instrument_node=""> Cookies</span></span></li><span data-dcnode-id="327" instrument_node="">
</span></ol><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" style="font-weight: 400;"><span data-dcnode-id="324" instrument_node="">Cookies are small files that are sent to your computer’s hard drive using your web browser or other programs. These are stored locally on your computer’s hard disk and kept ready for later retrieval.</span></span></p><span data-dcnode-id="321" instrument_node="">
</span><ol data-dcnode-id="315"><span data-dcnode-id="320" instrument_node="">
</span><li data-dcnode-id="317"><span data-dcnode-id="318" style="font-weight: 400;"><span data-dcnode-id="319" instrument_node=""> Use of Cookies</span></span></li><span data-dcnode-id="316" instrument_node="">
</span></ol><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" style="font-weight: 400;"><span data-dcnode-id="313" instrument_node="">Cookies are used on 3D Predict websites</span></span></p><span data-dcnode-id="310" instrument_node="">
</span><ul data-dcnode-id="296"><span data-dcnode-id="309" instrument_node="">
</span><li data-dcnode-id="306" style="font-weight: 400;"><span data-dcnode-id="307" style="font-weight: 400;"><span data-dcnode-id="308" instrument_node="">to facilitate and ensure required technical functions,</span></span></li><span data-dcnode-id="305" instrument_node="">
</span><li data-dcnode-id="302" style="font-weight: 400;"><span data-dcnode-id="303" style="font-weight: 400;"><span data-dcnode-id="304" instrument_node="">to make our website user-friendly,</span></span></li><span data-dcnode-id="301" instrument_node="">
</span><li data-dcnode-id="298" style="font-weight: 400;"><span data-dcnode-id="299" style="font-weight: 400;"><span data-dcnode-id="300" instrument_node="">to match your needs optimally or to evaluate visits to our website for marketing and optimization purposes.</span></span></li><span data-dcnode-id="297" instrument_node="">
</span></ul><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" style="font-weight: 400;"><span data-dcnode-id="294" instrument_node="">Under certain circumstances, third-party cookies are also used (for example, when re-targeting) to enable functions and techniques from third-party providers.</span></span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" style="font-weight: 400;"><span data-dcnode-id="290" instrument_node="">Session cookies are only used for the session. These cookies are deleted after the session has ended, i.e. after leaving our website or closing the browser window.</span></span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" style="font-weight: 400;"><span data-dcnode-id="286" instrument_node="">Other cookies remain on your device for a longer period of time and allow us to recognize your browser on your next visit.</span></span></p><span data-dcnode-id="283" instrument_node="">
</span><ol data-dcnode-id="277"><span data-dcnode-id="282" instrument_node="">
</span><li data-dcnode-id="279"><span data-dcnode-id="280" style="font-weight: 400;"><span data-dcnode-id="281" instrument_node=""> Approval or Rejection of Cookies</span></span></li><span data-dcnode-id="278" instrument_node="">
</span></ol><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" style="font-weight: 400;"><span data-dcnode-id="275" instrument_node="">You can approve or reject the use of cookies – also for web tracking – via your web browser settings. You can set your browser to notify you when cookies are being enabled or to reject cookies altogether. However, when you reject cookies, you will not be able to use all our website features. You can inquire about this facility for popular browsers at the following links:</span></span></p><span data-dcnode-id="272" instrument_node="">
</span><ul data-dcnode-id="227"><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="265" style="font-weight: 400;"><span data-dcnode-id="269" style="font-weight: 400;"><span data-dcnode-id="270" instrument_node="">Internet Explorer:</span></span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.microsoft.com/en-us/help/17442/windows-internet-explorer-delete-manage-cookies"><span data-dcnode-id="267" style="font-weight: 400;"><span data-dcnode-id="268" instrument_node=""> https://support.microsoft.com/en-us/help/17442/windows-internet-explorer-delete-manage-cookies</span></span></a></li><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="256" style="font-weight: 400;"><span data-dcnode-id="262" style="font-weight: 400;"><span data-dcnode-id="263" instrument_node="">Firefox:</span></span><a data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.mozilla.org/en-US/kb/cookies-information-websites-store-on-your-computer%3Fredirectlocale%3Den-US%26redirectslug%3DCookies"><span data-dcnode-id="260" style="font-weight: 400;"><span data-dcnode-id="261" instrument_node=""> https://support.mozilla.org/en-US/kb/cookies-information-websites-store-on-your-computer?redirectlocale=en-US&amp;redirectslug=Cookies</span></span></a><span data-dcnode-id="257" style="font-weight: 400;"><span data-dcnode-id="258" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="247" style="font-weight: 400;"><span data-dcnode-id="253" style="font-weight: 400;"><span data-dcnode-id="254" instrument_node="">Google Chrome: </span></span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.google.com/chrome/answer/95647%3Fhl%3Den"><span data-dcnode-id="251" style="font-weight: 400;"><span data-dcnode-id="252" instrument_node="">&nbsp;https://support.google.com/chrome/answer/95647?hl=en</span></span></a><span data-dcnode-id="248" style="font-weight: 400;"><span data-dcnode-id="249" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="246" instrument_node="">

</span><p data-dcnode-id="213"><span data-dcnode-id="217" style="font-weight: 400;"><span data-dcnode-id="218" instrument_node="">When you click or close our consent banner, our website will use Google Analytics, a web analytics service provided by Google Inc., 1600 Amphitheater Parkway, Mountain View, CA 94043, USA (“Google”). Google Analytics uses cookies stored on your computer to analyze your use of our website. The information generated by the cookies is usually transmitted to a Google server in the USA and stored there. Information regarding Google’s protection and their security of your Personal Data may be found here:</span></span><a data-dcnode-id="214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.google.com/analytics/answer/6004245%3Fhl%3Dde"><span data-dcnode-id="215" style="font-weight: 400;"><span data-dcnode-id="216" instrument_node=""> https://support.google.com/analytics/answer/6004245?hl=de</span></span></a></p><span data-dcnode-id="212" instrument_node="">
</span><ol data-dcnode-id="206" start="10"><span data-dcnode-id="211" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" style="font-weight: 400;"><span data-dcnode-id="210" instrument_node=""> Children’s Privacy</span></span></li><span data-dcnode-id="207" instrument_node="">
</span></ol><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="203" style="font-weight: 400;"><span data-dcnode-id="204" instrument_node="">3D Predict does not intend to collect any information from children under the age of thirteen (13), unless the information is collected from a parent or guardian. While we cannot stop a child from accessing the Sites, we do not collect any Personal Data without making it clear that the person providing the information must be at least 13 years old. If you are a parent or guardian and believe your child under 13 has provided us Personal Data which you would like to review or request be deleted, or you have questions about our Sites collecting information from children, please contact us at privacy@3DPredict.com.</span></span></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" style="font-weight: 400;"><span data-dcnode-id="200" instrument_node="">Please note that the age threshold mentioned above may vary depending on applicable legal requirements in your country. If this is the case, we will indicate it accordingly at the time of collection.</span></span></p><span data-dcnode-id="197" instrument_node="">
</span><ol data-dcnode-id="191" start="11"><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="193"><span data-dcnode-id="194" style="font-weight: 400;"><span data-dcnode-id="195" instrument_node=""> Links to other Sites</span></span></li><span data-dcnode-id="192" instrument_node="">
</span></ol><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" style="font-weight: 400;"><span data-dcnode-id="189" instrument_node="">Our Sites may contain links to other websites merely as a convenience. 3D Predict is not responsible for the privacy practices or the content of such other websites, and inclusion of links does not mean we endorse the information or company. This means that if you connect to another site through our Sites, we are not responsible for and we cannot control what they do with your information.</span></span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" style="font-weight: 400;"><span data-dcnode-id="185" instrument_node="">Also, you may have the opportunity to share your information with other websites, such as social media sites. We may provide a convenient link to let you do this easily, but we are not responsible for and we cannot control their website or your posts/sharing. You are encouraged to review the privacy policies and information collection practices of these other websites and social media sites.</span></span></p><span data-dcnode-id="182" instrument_node="">
</span><ol data-dcnode-id="176" start="12"><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="178"><span data-dcnode-id="179" style="font-weight: 400;"><span data-dcnode-id="180" instrument_node=""> Marketing and Do Not Contact</span></span></li><span data-dcnode-id="177" instrument_node="">
</span></ol><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="173" style="font-weight: 400;"><span data-dcnode-id="174" instrument_node="">We may send you information about us and our products from time to time if you have given us your consent (where required). Should you determine you no longer wish to receive our emails, you may use the convenient unsubscribe feature included with emails. Please allow us enough time to process your request.</span></span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" style="font-weight: 400;"><span data-dcnode-id="170" instrument_node="">Keep in mind, this withdrawal of consent does not apply to necessary communications, such as responding to an inquiry, and is revoked if you later request information from us, for example, if you sign up to receive news alerts from us.</span></span></p><span data-dcnode-id="167" instrument_node="">
</span><ol data-dcnode-id="161" start="13"><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="163"><span data-dcnode-id="164" style="font-weight: 400;"><span data-dcnode-id="165" instrument_node=""> Social Media</span></span></li><span data-dcnode-id="162" instrument_node="">
</span></ol><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" style="font-weight: 400;"><span data-dcnode-id="159" instrument_node="">If you are a user of Facebook, Twitter or other social media sites with public account settings and you hashtag using our product names, such as #3DPredict, we will be able to pull your reviews of our products from the social media sites and post them on our Sites. This is so that we can share your opinions about our products with the visitors of our Sites. Before being posted on our Sites, your comments will be reviewed by us. Please do not use these hashtags if you do not wish for your reviews to be made available on our Sites.</span></span></p><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" style="font-weight: 400;"><span data-dcnode-id="155" instrument_node="">By posting or otherwise making available any content about your 3D Predict experience on a public social media platform, and responding “yes” if we ask for your permission to re-post your content via social media, you represent and warrant that you are thirteen (13) years of age or older and that you agree to the terms and conditions listed on our page on those websites.</span></span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="149"><span data-dcnode-id="150" style="font-weight: 400;"><span data-dcnode-id="151" instrument_node="">If a parent, guardian, or anyone else becomes aware of user-generated content shared from an individual under the age of thirteen (13), please email us at privacy@3DPredict.com</span></span></p><span data-dcnode-id="148" instrument_node="">
</span><ol data-dcnode-id="142" start="14"><span data-dcnode-id="147" instrument_node="">
</span><li data-dcnode-id="144"><span data-dcnode-id="145" style="font-weight: 400;"><span data-dcnode-id="146" instrument_node=""> Server log files &amp; IP addresses</span></span></li><span data-dcnode-id="143" instrument_node="">
</span></ol><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="138"><span data-dcnode-id="139" style="font-weight: 400;"><span data-dcnode-id="140" instrument_node="">Every time a visitor accesses our website, data about this process is temporarily stored in a log file (Server Log Files) and processed. The log file stores the following information:</span></span></p><span data-dcnode-id="137" instrument_node="">
</span><ul data-dcnode-id="111"><span data-dcnode-id="136" instrument_node="">
</span><li data-dcnode-id="133" style="font-weight: 400;"><span data-dcnode-id="134" style="font-weight: 400;"><span data-dcnode-id="135" instrument_node="">a description of the type and version of the web browser used</span></span></li><span data-dcnode-id="132" instrument_node="">
</span><li data-dcnode-id="129" style="font-weight: 400;"><span data-dcnode-id="130" style="font-weight: 400;"><span data-dcnode-id="131" instrument_node="">the operating system used</span></span></li><span data-dcnode-id="128" instrument_node="">
</span><li data-dcnode-id="125" style="font-weight: 400;"><span data-dcnode-id="126" style="font-weight: 400;"><span data-dcnode-id="127" instrument_node="">the referrer URL category</span></span></li><span data-dcnode-id="124" instrument_node="">
</span><li data-dcnode-id="121" style="font-weight: 400;"><span data-dcnode-id="122" style="font-weight: 400;"><span data-dcnode-id="123" instrument_node="">the host name of the accessing terminal</span></span></li><span data-dcnode-id="120" instrument_node="">
</span><li data-dcnode-id="117" style="font-weight: 400;"><span data-dcnode-id="118" style="font-weight: 400;"><span data-dcnode-id="119" instrument_node="">the date and time of the server request</span></span></li><span data-dcnode-id="116" instrument_node="">
</span><li data-dcnode-id="113" style="font-weight: 400;"><span data-dcnode-id="114" style="font-weight: 400;"><span data-dcnode-id="115" instrument_node="">the IP address.</span></span></li><span data-dcnode-id="112" instrument_node="">
</span></ul><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="107"><span data-dcnode-id="108" style="font-weight: 400;"><span data-dcnode-id="109" instrument_node="">An IP address is a numerical address of your technical device (computer or mobile device) used for accessing the internet and our websites. The IP address enables communication between computers and servers. The processing of this so-called server log data by 3D Predict is required for technical reasons, website analysis and improvement as well as to ensure system security.</span></span></p><span data-dcnode-id="106" instrument_node="">
</span><ol data-dcnode-id="100" start="15"><span data-dcnode-id="105" instrument_node="">
</span><li data-dcnode-id="102"><span data-dcnode-id="103" style="font-weight: 400;"><span data-dcnode-id="104" instrument_node=""> International Data Transfers</span></span></li><span data-dcnode-id="101" instrument_node="">
</span></ol><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" style="font-weight: 400;"><span data-dcnode-id="98" instrument_node="">3D Predict operates globally and may therefore transfer your Personal Data to other countries in which 3D Predict operates, including countries other than your country of residence. Your Personal Data may also be stored on our servers, which may be located outside your country of residence. However, we will continue to protect your information in accordance with this Privacy Statement. By providing us your Personal Data, you agree to such transfers, processing and/or storage anywhere in the world, including outside the United States.</span></span></p><span data-dcnode-id="95" instrument_node="">
</span><ol data-dcnode-id="89" start="16"><span data-dcnode-id="94" instrument_node="">
</span><li data-dcnode-id="91"><span data-dcnode-id="92" style="font-weight: 400;"><span data-dcnode-id="93" instrument_node=""> Information and Exercise of Privacy Rights</span></span></li><span data-dcnode-id="90" instrument_node="">
</span></ol><span data-dcnode-id="88" instrument_node="">
</span><p data-dcnode-id="85"><span data-dcnode-id="86" style="font-weight: 400;"><span data-dcnode-id="87" instrument_node="">If you have any questions about our collection and use of your Personal Data, we will gladly provide it. Any such questions may be directed to privacy@3DPredict.com</span></span></p><span data-dcnode-id="84" instrument_node="">
</span><ol data-dcnode-id="78" start="17"><span data-dcnode-id="83" instrument_node="">

</span></ol><span data-dcnode-id="77" instrument_node="">
</span><p data-dcnode-id="74"><span data-dcnode-id="75" style="font-weight: 400;"><span data-dcnode-id="76" instrument_node="">We may update this Privacy Statement from time to time as we deem necessary in our sole discretion. When we do, we will revise the last updated date at the beginning of the Privacy Statement. Notice of such update and/or modification will be provided on our Sites or as otherwise required by applicable law. We encourage you to periodically review this statement to stay informed about how we collect, use and share Personal Data. Your continued relationship with 3D Predict after the posting or notice of any amended Privacy Statement shall constitute your agreement to be bound by any such changes. Any changes to this Privacy Statement take effect immediately after being posted or otherwise provided by 3D Predict.</span></span></p><span data-dcnode-id="73" instrument_node="">
