</span><section aria-labelledby="Abs1" data-dcnode-id="2150" data-gtm-vis-first-on-screen-50443292_562="711" data-gtm-vis-first-on-screen-50443292_563="711" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="711" data-gtm-vis-recent-on-screen-50443292_563="711" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2151" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2167" id="Abs1"><span data-dcnode-id="2168" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2152" id="Abs1-content"><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Business analytics use advanced techniques that can analyze and process large and diverse data sets in order to generate valuable insights and lead to better business decisions. Of the three types of business analytics – descriptive, predictive, and prescriptive – only the latter focus on decision making. This paper aims to address two limitations of existing approaches in prescriptive analytics: (i) the lack of a transparent integration between predictive and prescriptive analytics and (ii) the incorporation of human knowledge and experience within the decision-making process. In order to address these points, the paper develops a framework that integrates data-driven predictions and the decision-making process by taking account human experience. The framework adopts interactive reinforcement learning algorithms and provides a concrete approach for data-driven human-AI collaboration. The main challenges and limitations of the approach are also discussed.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="2153"><li class="c-article-subject-list__subject" data-dcnode-id="2160"><span data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Human-AI interaction</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2157"><span data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Data analytics</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2154"><span data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Reinforcement learning</span></span></li></ul></div></div></section><span data-dcnode-id="2149" instrument_node="">
</span><div data-dcnode-id="2135" data-test="chapter-cobranding-and-download"><span data-dcnode-id="2148" instrument_node="">

</span><section data-dcnode-id="2057" data-gtm-vis-first-on-screen-50443292_562="711" data-gtm-vis-first-on-screen-50443292_563="711" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="711" data-gtm-vis-recent-on-screen-50443292_563="711" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2058" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2132" id="Sec1"><span data-dcnode-id="2133" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2059" id="Sec1-content"><p data-dcnode-id="2121"><span data-dcnode-id="2131" instrument_node="">Decision making has been studied from normative and descriptive approaches [</span><a aria-label="Reference 1" data-dcnode-id="2129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d22793250e852" title="Johnson, J.G., Busemeyer, J.R.: Decision making under risk and uncertainty. Wiley Interdiscip. Rev. Cognit. Sci. 1(5), 736–749 (2010)"><span data-dcnode-id="2130" instrument_node="">1</span></a><span data-dcnode-id="2128" instrument_node="">]. Normative theories focus on how to make the best decisions by deriving algebraic representations of preferences from idealized behavioral axioms. For example, the principle of utility maximization in economics and the concept of equilibrium in game theory describe how self-interested rational agents should behave individually or in a group, respectively [</span><a aria-label="Reference 2" data-dcnode-id="2126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d22793250e855" title="Von Neumann, J., Morgenstern, O.: Theory of Games and Economic Behaviour Princeton Univ. Press, Princeton (1944)"><span data-dcnode-id="2127" instrument_node="">2</span></a><span data-dcnode-id="2125" instrument_node="">]. On the other hand, descriptive theories incorporate known limitations of human behavior in the decision-making process. For example, prospect theory can successfully account for the failures of expected utility theory in describing human decision making under uncertainty [</span><a aria-label="Reference 3" data-dcnode-id="2123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d22793250e858" title="Kahneman, D., Tversky, A.: Prospect theory: an analysis of decision under risk. Econometrica 47, 263–292 (1979)"><span data-dcnode-id="2124" instrument_node="">3</span></a><span data-dcnode-id="2122" instrument_node="">].</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2120" instrument_node="">Recently, these two traditional approaches of decision-making research have merged with additional disciplines [</span><a aria-label="Reference 4" data-dcnode-id="2118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d22793250e864" title="Lee, D.: Decision making: from neuroscience to psychiatry. Neuron 78(2), 233–248 (2013)"><span data-dcnode-id="2119" instrument_node="">4</span></a><span data-dcnode-id="2117" instrument_node="">]. It is now increasingly appreciated that learning plays an important role in decision making, although this has been ignored in most economic theories. In particular, Reinforcement Learning (RL) provides a valuable framework to model how decision-making strategies are tuned by experience [</span><a data-dcnode-id="2115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d22793250e867" title="Sutton, R.S., Barto, A.G.: Reinforcement Learning: An Introduction. MIT Press, Cambridge (2018)"><span data-dcnode-id="2116" instrument_node="">5</span></a><span data-dcnode-id="2114" instrument_node="">,</span><a data-dcnode-id="2112" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d22793250e867_1" title="Kaelbling, L.P., Littman, M.L., Moore, A.W.: Reinforcement learning: a survey. J. Artif. Intell. Res. 4, 237–285 (1996)"><span data-dcnode-id="2113" instrument_node="">6</span></a><span data-dcnode-id="2111" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="2109" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d22793250e870" title="Mnih, V., et al.: Human-level control through deep reinforcement learning. Nature 518(7540), 529–533 (2015)"><span data-dcnode-id="2110" instrument_node="">7</span></a><span data-dcnode-id="2108" instrument_node="">].</span></p><p data-dcnode-id="2096"><span data-dcnode-id="2106" instrument_node="">Turning from the human to the organizational level, a recent trend in organizational decision making is the exploitation of the staggering amounts of data that organizations have at their disposal [</span><a aria-label="Reference 8" data-dcnode-id="2104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d22793250e876" title="Davenport, T.H.: Competing on analytics. Harv. Bus. Rev. 84(1) (2006)"><span data-dcnode-id="2105" instrument_node="">8</span></a><span data-dcnode-id="2103" instrument_node="">]. These data, if analyzed and processed properly, can generate valuable insights and lead to better business decisions [</span><a aria-label="Reference 9" data-dcnode-id="2101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d22793250e879" title="LaValle, S., Lesser, E., Shockley, R., Hopkins, M.S., Kruschwitz, N.: Big data, analytics and the path from insights to value. MIT Sloan Manag. Rev. 52(2), 21–32 (2011)"><span data-dcnode-id="2102" instrument_node="">9</span></a><span data-dcnode-id="2100" instrument_node="">]. The use of advanced techniques that can analyze and process very large and diverse data sets that include structured, semi-structured and unstructured data, from different sources, and in different sizes from terabytes to zettabytes, has led to the field of business analytics [</span><a aria-label="Reference 10" data-dcnode-id="2098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d22793250e882" title="Chen, H., Chiang, R.H.L., Storey, V.C.: Business intelligence and analytics: from big data to big impact. MIS Q., 1165–1188 (2012)"><span data-dcnode-id="2099" instrument_node="">10</span></a><span data-dcnode-id="2097" instrument_node="">].</span></p><p data-dcnode-id="2079"><span data-dcnode-id="2095" instrument_node="">Business analytics focuses on data-driven decision-making and consists of three phases: descriptive, predictive, and prescriptive. While descriptive and predictive analytics allow us to analyze past and predict future events, respectively, these activities do not provide any direct support for decision-making [</span><a aria-label="Reference 11" data-dcnode-id="2093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d22793250e888" title="Lepenioti, K., Bousdekis, A., Apostolou, D., Mentzas, G.: Prescriptive analytics: literature review and research challenges. Int. J. Inf. Manage. 50, 57–70 (2020)"><span data-dcnode-id="2094" instrument_node="">11</span></a><span data-dcnode-id="2092" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="2090" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d22793250e891" title="Bertsimas, D., Kallus, N.: From predictive to prescriptive analytics. Manage. Sci. 66(3), 1025–1044 (2020)"><span data-dcnode-id="2091" instrument_node="">12</span></a><span data-dcnode-id="2089" instrument_node="">]. Contrary, prescriptive analytics is a new type of data analytics which enable data-driven optimization for decision support and planning [</span><a aria-label="Reference 13" data-dcnode-id="2087" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d22793250e894" title="Frazzetto, D., Nielsen, T.D., Pedersen, T.B., Šikšnys, L.: Prescriptive analytics: a survey of emerging trends and technologies. VLDB J. 28(4), 575–595 (2019)"><span data-dcnode-id="2088" instrument_node="">13</span></a><span data-dcnode-id="2086" instrument_node="">]. It has been recently argued that the full exploitation of prescriptive analytics for optimized business decision making requires the incorporation of human knowledge and experience in the decision-making process [</span><a aria-label="Reference 11" data-dcnode-id="2084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d22793250e897" title="Lepenioti, K., Bousdekis, A., Apostolou, D., Mentzas, G.: Prescriptive analytics: literature review and research challenges. Int. J. Inf. Manage. 50, 57–70 (2020)"><span data-dcnode-id="2085" instrument_node="">11</span></a><span data-dcnode-id="2083" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="2081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d22793250e900" title="Sappelli, M., de Boer, M.H.T., Smit, S.K., Bomhof, F.: A vision on prescriptive analytics. In: ALLDATA 2017, p. 54 (2017)"><span data-dcnode-id="2082" instrument_node="">14</span></a><span data-dcnode-id="2080" instrument_node="">].</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2078" instrument_node="">In the present paper we investigate how to explicitly incorporate human knowledge and experience in the data-driven decision-making process. In order to accomplish this, we incorporate interactive RL since it presents many opportunities for an osmosis of decision-making research in both human and artificial agents [</span><a data-dcnode-id="2076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d22793250e907" title="Neftci, E.O., Averbeck, B.B.: Reinforcement learning in artificial and biological systems. Nat. Mach. Intell. 1(3), 133–143 (2019)"><span data-dcnode-id="2077" instrument_node="">15</span></a><span data-dcnode-id="2075" instrument_node="">,</span><a data-dcnode-id="2073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d22793250e907_1" title="Collins, A.G.E.: Reinforcement learning: bringing together computation and cognition. Curr. Opin. Behav. Sci. 29, 63–68 (2019)"><span data-dcnode-id="2074" instrument_node="">16</span></a><span data-dcnode-id="2072" instrument_node="">,</span><a aria-label="Reference 17" data-dcnode-id="2070" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d22793250e910" title="Amershi, S., Cakmak, M., Knox, W.B., Kulesza, T.: Power to the people: the role of humans in interactive machine learning. AI Mag. 35(4), 105–120 (2014)"><span data-dcnode-id="2071" instrument_node="">17</span></a><span data-dcnode-id="2069" instrument_node="">]. In interactive RL, a human interacts with an RL agent in real-time [</span><a aria-label="Reference 18" data-dcnode-id="2067" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d22793250e913" title="Arzate Cruz, C., Igarashi, T.: A survey on interactive reinforcement learning: design principles and open challenges. In: Proceedings of the 2020 ACM Designing Interactive Systems Conference, pp. 1195–1209 (2020)
"><span data-dcnode-id="2068" instrument_node="">18</span></a><span data-dcnode-id="2066" instrument_node="">]. This approach has been shown to considerably improve the RL agent's learning speed and can allow RL to scale to larger or more complex problems [</span><a aria-label="Reference 19" data-dcnode-id="2064" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d22793250e916" title="Li, G., Gomez, R., Nakamura, K., He, B.: Human-centered reinforcement learning: a survey. IEEE Trans. Hum. Mach. Syst. 49(4), 337–349 (2019)"><span data-dcnode-id="2065" instrument_node="">19</span></a><span data-dcnode-id="2063" instrument_node="">].</span></p><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">The paper is structured as follows: first we introduce the theoretical background of prescriptive analytics. Then, we present the reinforcement learning mechanisms and focus on the way human-augmented approaches can be implemented with interactive RL. We define our proposed framework and describe how it favors data-driven human-AI collaboration. We discuss the main challenges of the approach and, finally, present our conclusions and describe future works.</span></p></div></div></section><section data-dcnode-id="1969" data-gtm-vis-first-on-screen-50443292_562="711" data-gtm-vis-first-on-screen-50443292_563="711" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="711" data-gtm-vis-recent-on-screen-50443292_563="711" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Data-Driven Decision Making: Prescriptive Analytics"><div class="c-article-section" data-dcnode-id="1970" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2055" id="Sec2"><span data-dcnode-id="2056" instrument_node="">Data-Driven Decision Making: Prescriptive Analytics</span></h2><div class="c-article-section__content" data-dcnode-id="1971" id="Sec2-content"><p data-dcnode-id="2050"><span data-dcnode-id="2054" instrument_node="">Business analytics refers to the extensive use of data, acquired by diverse sources, statistical and quantitative analysis, explanatory and predictive models, and fact-based management to drive decisions and actions to proper stakeholders [</span><a aria-label="Reference 20" data-dcnode-id="2052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d22793250e930" title="Holsapple, C., Lee-Post, A., Pakath, R.: A unified foundation for business analytics. Decis. Support Syst. 64, 130–141 (2014)"><span data-dcnode-id="2053" instrument_node="">20</span></a><span data-dcnode-id="2051" instrument_node="">].</span></p><p data-dcnode-id="2039"><span data-dcnode-id="2049" instrument_node="">Business analytics is categorized to three main stages characterized by different levels of difficulty, value, and intelligence [</span><a aria-label="Reference 11" data-dcnode-id="2047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d22793250e936" title="Lepenioti, K., Bousdekis, A., Apostolou, D., Mentzas, G.: Prescriptive analytics: literature review and research challenges. Int. J. Inf. Manage. 50, 57–70 (2020)"><span data-dcnode-id="2048" instrument_node="">11</span></a><span data-dcnode-id="2046" instrument_node="">, </span><a aria-label="Reference 21" data-dcnode-id="2044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d22793250e939" title="Delen, D.: Prescriptive Analytics: The Final Frontier for Evidence-Based Management and Optimal Decision Making. FT Press (2019)"><span data-dcnode-id="2045" instrument_node="">21</span></a><span data-dcnode-id="2043" instrument_node="">]: (i) descriptive analytics, answering the questions “What has happened?”, “Why did it happen?”, but also “What is happening now?” (mainly in a streaming context); (ii) predictive analytics, answering the questions “What will happen?” and “Why will it happen?” in the future; (iii) prescriptive analytics, answering the questions “What should I do?” and “Why should I do it?” (see Table </span><a data-dcnode-id="2041" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2042" instrument_node="">1</span></a><span data-dcnode-id="2040" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2015" data-test="inline-table" id="table-1"><figure data-dcnode-id="2016"><figcaption class="c-article-table__figcaption" data-dcnode-id="2027"><b data-dcnode-id="2028" data-test="table-caption" id="Tab1"><span data-dcnode-id="2038" instrument_node="">Table 1. Types of Business Analytics (adapted from [</span><a aria-label="Reference 11" data-dcnode-id="2036" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d22793250e955" title="Lepenioti, K., Bousdekis, A., Apostolou, D., Mentzas, G.: Prescriptive analytics: literature review and research challenges. Int. J. Inf. Manage. 50, 57–70 (2020)"><span data-dcnode-id="2037" instrument_node="">11</span></a><span data-dcnode-id="2035" instrument_node="">, </span><a aria-label="Reference 13" data-dcnode-id="2033" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d22793250e958" title="Frazzetto, D., Nielsen, T.D., Pedersen, T.B., Šikšnys, L.: Prescriptive analytics: a survey of emerging trends and technologies. VLDB J. 28(4), 575–595 (2019)"><span data-dcnode-id="2034" instrument_node="">13</span></a><span data-dcnode-id="2032" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="2030" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d22793250e961" title="Sappelli, M., de Boer, M.H.T., Smit, S.K., Bomhof, F.: A vision on prescriptive analytics. In: ALLDATA 2017, p. 54 (2017)"><span data-dcnode-id="2031" instrument_node="">14</span></a><span data-dcnode-id="2029" instrument_node="">])</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2017"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2018" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/tables/1" rel="nofollow"><span data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2019" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2020" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2021" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2024" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2023" fill-rule="evenodd"></path><span data-dcnode-id="2022" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2007"><span data-dcnode-id="2014" instrument_node="">Prescriptive analytics typically involves two aspects: (a) exploration of possible actions and (b) generation of the prescription. Typically, the decision space for prescriptive analytics tends to be large and there are multiple situations with many variables, options and constraints. Compared to descriptive and predictive, prescriptive analytics is still less mature. Recently, however, prescriptive analytics has been considered as the next step towards increasing data analytics maturity and leading to optimized decision making, ahead of time, for business performance improvement [</span><a aria-label="Reference 14" data-dcnode-id="2012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d22793250e1162" title="Sappelli, M., de Boer, M.H.T., Smit, S.K., Bomhof, F.: A vision on prescriptive analytics. In: ALLDATA 2017, p. 54 (2017)"><span data-dcnode-id="2013" instrument_node="">14</span></a><span data-dcnode-id="2011" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="2009" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d22793250e1165" title="Larson, D., Chang, V.: A review and future direction of agile, business intelligence, analytics and data science. Int. J. Inf. Manage. 36(5), 700–710 (2016)"><span data-dcnode-id="2010" instrument_node="">22</span></a><span data-dcnode-id="2008" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1983" data-gtm-vis-first-on-screen-50443292_561="711" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="711" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title=" 1" rel="nofollow"><span data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1987" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1988" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1989" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1992" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="1972"><span data-dcnode-id="1982" instrument_node="">Integrating predictions and prescriptions is key for the extensive adoption as well as the exploitation of the values of prescriptive analytics [</span><a aria-label="Reference 23" data-dcnode-id="1980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d22793250e1188" title="den Hertog, D., Postek, K.: Bridging the gap between predictive and prescriptive analytics-new optimization methodology needed. Tilburg Univ., Tilburg, The Netherlands (2016). 
                    http://www.optimization-online.org/DB_FILE/2016/12/5779.pdf
                    
                  . Accessed 28 Dec 2020"><span data-dcnode-id="1981" instrument_node="">23</span></a><span data-dcnode-id="1979" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="1977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d22793250e1191" title="Mundru, N.: Predictive and prescriptive methods in operations research and machine learning: an optimization approach. Ph.D. diss., Massachusetts Institute of Technology (2019). 
                    https://dspace.mit.edu/handle/1721.1/122099
                    
                  . Accessed 28 Dec 2020"><span data-dcnode-id="1978" instrument_node="">24</span></a><span data-dcnode-id="1976" instrument_node="">]. As for any method that relies on predictions, prescriptive analytics is stochastic by nature and may generate erroneous results. We argue that, similarly to control theory, an assessment of the validity of the prescriptions can be used as a feedback mechanism to generate a control action to improve the accuracy of the new predictions and the subsequent prescriptions (see Fig.&nbsp;</span><a data-dcnode-id="1974" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1975" instrument_node="">1</span></a><span data-dcnode-id="1973" instrument_node="">). In the following section, we describe how such a feedback mechanism can be implemented using RL.</span></p></div></div></section><section data-dcnode-id="1815" data-gtm-vis-first-on-screen-50443292_562="711" data-gtm-vis-first-on-screen-50443292_563="712" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="711" data-gtm-vis-recent-on-screen-50443292_563="712" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Reinforcement Learning for Decision Making"><div class="c-article-section" data-dcnode-id="1816" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1967" id="Sec3"><span data-dcnode-id="1968" instrument_node="">Reinforcement Learning for Decision Making</span></h2><div class="c-article-section__content" data-dcnode-id="1817" id="Sec3-content"><p data-dcnode-id="1956"><span data-dcnode-id="1966" instrument_node="">Reinforcement Learning (RL) is one of the three types of machine learning (the other two being supervised and unsupervised learning) [</span><a aria-label="Reference 25" data-dcnode-id="1964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d22793250e1205" title="Jordan, M.I., Mitchell, T.M.: Machine learning: trends, perspectives, and prospects. Science 349(6245), 255–260 (2015)"><span data-dcnode-id="1965" instrument_node="">25</span></a><span data-dcnode-id="1963" instrument_node="">]. In reinforcement learning the problem is represented by an environment consisting of states and actions and learning agents with a defined goal state. The agents aim to reach the goal state while maximizing the rewards by selecting actions and moving to different states [</span><a aria-label="Reference 5" data-dcnode-id="1961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d22793250e1208" title="Sutton, R.S., Barto, A.G.: Reinforcement Learning: An Introduction. MIT Press, Cambridge (2018)"><span data-dcnode-id="1962" instrument_node="">5</span></a><span data-dcnode-id="1960" instrument_node="">, </span><a aria-label="Reference 6" data-dcnode-id="1958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d22793250e1211" title="Kaelbling, L.P., Littman, M.L., Moore, A.W.: Reinforcement learning: a survey. J. Artif. Intell. Res. 4, 237–285 (1996)"><span data-dcnode-id="1959" instrument_node="">6</span></a><span data-dcnode-id="1957" instrument_node="">].</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1955" instrument_node="">In RL, an agent learns how to perform a sequential decision task, i.e., a policy that decides which action to take in a state of the environment the agent encounters. A sequential decision task is modelled as a Markov Decision Process (MDP), denoted as {S, A, T, R, γ}. In MDP, S represents a set of all possible states and A represents a set of all possible actions. Time is divided into discrete time steps. At each time step t, the agent receives a representation of the environmental state, s</span><sub data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">t</span></sub><span data-dcnode-id="1952" instrument_node=""> ∈ S, takes an action a</span><sub data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">t</span></sub><span data-dcnode-id="1949" instrument_node=""> ∈ A that results in next state of the environment s</span><sub data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">t+1</span></sub><span data-dcnode-id="1946" instrument_node="">. One time step later, as a consequence of the action at taken based on the current state s</span><sub data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">t</span></sub><span data-dcnode-id="1943" instrument_node="">, the agent will receive a numerical reward, R</span><sub data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">t+1</span></sub><span data-dcnode-id="1940" instrument_node=""> specified by a reward function which decides a numeric reward value at each time step based on the current state, action chosen, and the resultant next state. The probability of next state s</span><sub data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">t+1</span></sub><span data-dcnode-id="1937" instrument_node=""> that the agent will experience is decided by a transition function which describes the probability of transitioning from one state to another given a specific action (see Fig.&nbsp;</span><a data-dcnode-id="1935" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1936" instrument_node="">2</span></a><span data-dcnode-id="1934" instrument_node=""> for the typical RL approach).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1909" data-gtm-vis-first-on-screen-50443292_561="711" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="711" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig. 2." id="figure-2"><figure data-dcnode-id="1910"><figcaption data-dcnode-id="1930"><b class="c-article-section__figure-caption" data-dcnode-id="1931" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="1932" instrument_node="">Fig. 2.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1921"><div class="c-article-section__figure-item" data-dcnode-id="1925"><a class="c-article-section__figure-link" data-dcnode-id="1926" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/2" rel="nofollow"><picture data-dcnode-id="1927"><source data-dcnode-id="1929" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="1928" height="354" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1922" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">The typical reinforcement learning approach.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1911"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1912" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/2" rel="nofollow"><span data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1913" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1914" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1915" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1918" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1917" fill-rule="evenodd"></path><span data-dcnode-id="1916" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1895"><span data-dcnode-id="1908" instrument_node="">What makes RL different from other machine learning paradigms is that there is no supervisor, only a reward signal. Feedback is delayed, not instantaneous and time really matters. The agent’s actions affect the subsequent data it receives. An RL agent may include one or more of these components: (i) a </span><i data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">policy</span></i><span data-dcnode-id="1905" instrument_node="">: it is the agent’s behavior function, a map from states to actions – policies may be deterministic or stochastic; (ii) a </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">value function</span></i><span data-dcnode-id="1902" instrument_node="">, which models how good is each state, acts as a predictor of future reward and is therefore used to select between actions; and/or (iii) an action </span><i data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">model</span></i><span data-dcnode-id="1899" instrument_node="">, which is the agent’s representation of the environment and predicts what the environment will do next [</span><a aria-label="Reference 26" data-dcnode-id="1897" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d22793250e1262" title="Naeem, M., Rizvi, S.T.H., Coronato, A.: A gentle introduction to reinforcement learning and its application in different fields. IEEE Access (2020)"><span data-dcnode-id="1898" instrument_node="">26</span></a><span data-dcnode-id="1896" instrument_node="">].</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1894" instrument_node="">The combinations of these three components can be used to categorize RL agents into five types: (a) value based (there is no policy, or the policy is implicit and there is a value function); (b) policy-based (there is a policy and no value function); (c) actor critic (there is both a policy and a value function); (d) model-free (there may be a policy and or a value function but no model); and (e) model-based (there may be a policy and or a value function and there is a model - see Fig.&nbsp;</span><a data-dcnode-id="1892" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1893" instrument_node="">3</span></a><span data-dcnode-id="1891" instrument_node="">). As we will see later, our proposed framework adopts the actor-critic type of RL.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1861" data-test="figure" data-title="Fig. 3." id="figure-3"><figure data-dcnode-id="1862"><figcaption data-dcnode-id="1887"><b class="c-article-section__figure-caption" data-dcnode-id="1888" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1889" instrument_node="">Fig. 3.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1873"><div class="c-article-section__figure-item" data-dcnode-id="1877"><a class="c-article-section__figure-link" data-dcnode-id="1883" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/3" rel="nofollow"><picture data-dcnode-id="1884"><source data-dcnode-id="1886" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1885" height="647" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig3_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="1878" data-test="figure-credit"><span data-dcnode-id="1882" instrument_node="">(source [</span><a aria-label="Reference 27" data-dcnode-id="1880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d22793250e1285" title="Silver, D.: Lectures on Reinforcement Learning (2015). 
                    https://www.davidsilver.uk/teaching/
                    
                  . Accessed 28 Dec 2020"><span data-dcnode-id="1881" instrument_node="">27</span></a><span data-dcnode-id="1879" instrument_node="">])</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="1874" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Venn diagram of the space of agents in reinforcement learning</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1863"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1864" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/3" rel="nofollow"><span data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1865" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1866" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1867" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1870" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1869" fill-rule="evenodd"></path><span data-dcnode-id="1868" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1853"><span data-dcnode-id="1860" instrument_node="">In real-world applications humans may change the RL agents’ optimal behavior by teaching them interactively according to their likings. In this case, standard RL cannot be applied, since the optimal behavior is usually preprogrammed via a reward function and most human users are laymen in agent design and programming. Interactive RL has been developed and proven to be a powerful method for facilitating humans to teach agents in a natural way [</span><a aria-label="Reference 18" data-dcnode-id="1858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d22793250e1301" title="Arzate Cruz, C., Igarashi, T.: A survey on interactive reinforcement learning: design principles and open challenges. In: Proceedings of the 2020 ACM Designing Interactive Systems Conference, pp. 1195–1209 (2020)
"><span data-dcnode-id="1859" instrument_node="">18</span></a><span data-dcnode-id="1857" instrument_node="">, </span><a aria-label="Reference 28" data-dcnode-id="1855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d22793250e1304" title="Griffith, S., Subramanian, K., Scholz, J., Isbell, C.L., Thomaz, A.L.: Policy shaping: Integrating human feedback with reinforcement learning. Adv. Neural. Inf. Process. Syst. 26, 2625–2633 (2013)"><span data-dcnode-id="1856" instrument_node="">28</span></a><span data-dcnode-id="1854" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1829" data-test="figure" data-title="Fig. 4." id="figure-4"><figure data-dcnode-id="1830"><figcaption data-dcnode-id="1850"><b class="c-article-section__figure-caption" data-dcnode-id="1851" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="1852" instrument_node="">Fig. 4.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1841"><div class="c-article-section__figure-item" data-dcnode-id="1845"><a class="c-article-section__figure-link" data-dcnode-id="1846" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/4" rel="nofollow"><picture data-dcnode-id="1847"><source data-dcnode-id="1849" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="1848" height="345" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1842" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Interactive reinforcement learning framework.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1831"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="1832" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/4" rel="nofollow"><span data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1833" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1834" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1835" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1838" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1837" fill-rule="evenodd"></path><span data-dcnode-id="1836" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1818"><span data-dcnode-id="1828" instrument_node="">A human user might not be an expert in programming but has knowledge about how to perform the decision task, which will reduce the agent’s exploration time and speed up its learning. In interactive RL, every time the agent takes an action in a state, the observing human can provide feedback which tells the quality of the selected action based on the human’s knowledge, as shown in Fig.&nbsp;</span><a data-dcnode-id="1826" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1827" instrument_node="">4</span></a><span data-dcnode-id="1825" instrument_node="">. The agent then uses the feedback to update its policy. Therefore, the agent learns how to perform the decision task by interacting with a human, and it is the human feedback that decides the agent’s behaviour [</span><a aria-label="Reference 19" data-dcnode-id="1823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d22793250e1330" title="Li, G., Gomez, R., Nakamura, K., He, B.: Human-centered reinforcement learning: a survey. IEEE Trans. Hum. Mach. Syst. 49(4), 337–349 (2019)"><span data-dcnode-id="1824" instrument_node="">19</span></a><span data-dcnode-id="1822" instrument_node="">, </span><a aria-label="Reference 29" data-dcnode-id="1820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d22793250e1333" title="Lin, J., Ma, Z., Gomez, R., Nakamura, K., He, B., Li, G.: A review on interactive reinforcement learning from human social feedback. IEEE Access 8, 120757–120765 (2020)"><span data-dcnode-id="1821" instrument_node="">29</span></a><span data-dcnode-id="1819" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="1750" data-title="Framework for Collaborative Human-AI Decision Making"><div class="c-article-section" data-dcnode-id="1751" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1813" id="Sec4"><span data-dcnode-id="1814" instrument_node="">Framework for Collaborative Human-AI Decision Making</span></h2><div class="c-article-section__content" data-dcnode-id="1752" id="Sec4-content"><p data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">The proposed framework for collaborative human-AI decision uses the principles of interactive RL to implement the prescriptive model. Figure&nbsp;</span><a data-dcnode-id="1810" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="1811" instrument_node="">5</span></a><span data-dcnode-id="1809" instrument_node=""> shows how the integrated RL mechanism uses predictions generated by the prediction model as well as human feedback to guide the RL agent to provide actions for the environment. The RL agent is triggered by prediction events about future states of the environment which are generated by the prediction model. Subsequently, the agent prescribes the appropriate actions or set of actions among the alternatives so that an undesired future state is avoided, or a desired future state is sought after. Finally, the agent adjusts its policy based on both the rewards and the human feedback received.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1784" data-test="figure" data-title="Fig. 5." id="figure-5"><figure data-dcnode-id="1785"><figcaption data-dcnode-id="1805"><b class="c-article-section__figure-caption" data-dcnode-id="1806" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1807" instrument_node="">Fig. 5.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1796"><div class="c-article-section__figure-item" data-dcnode-id="1800"><a class="c-article-section__figure-link" data-dcnode-id="1801" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/5" rel="nofollow"><picture data-dcnode-id="1802"><source data-dcnode-id="1804" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="1803" height="447" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-85447-8_11/MediaObjects/512902_1_En_11_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1797" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Proposed framework for data analytics and interactive reinforcement learning.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1786"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="1787" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-85447-8_11/figures/5" rel="nofollow"><span data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1788" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1789" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1790" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1793" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1792" fill-rule="evenodd"></path><span data-dcnode-id="1791" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">To gain a better understanding of the proposed framework function, in the following we examine three critical design choices and their implications: (i) the choice of the predictive model to be used; (ii) the choice of the type of RL agent; and (iii) the type of human-AI interactions.</span></p><p data-dcnode-id="1771"><span data-dcnode-id="1781" instrument_node="">The first design choice refers to the type of predictive model to be used and the associated algorithms. Clearly the selection of the predictive model and algorithms depends largely on the problem at hand. Among prominent methods, Deep Learning (DL) is increasingly being used to make accurate predictions based on learned representations of data with multiple levels of abstraction [</span><a aria-label="Reference 31" data-dcnode-id="1779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d22793250e1370" title="Najafabadi, M.M., Villanustre, F., Khoshgoftaar, T.M., Seliya, N., Wald, R., Muharemagic, E.: Deep learning applications and challenges in big data analytics. J.Big Data 2(1), 1–21 (2015). 
                    https://doi.org/10.1186/s40537-014-0007-7
                    
                  "><span data-dcnode-id="1780" instrument_node="">31</span></a><span data-dcnode-id="1778" instrument_node="">]. An example of DL is Long Short-Term Memory (LSTM) networks. LSTM are a type of recurrent neural networks capable of learning order dependence in sequential prediction problems [</span><a aria-label="Reference 32" data-dcnode-id="1776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d22793250e1373" title="Hochreiter, S., Schmidhuber, J.: Long short-term memory. Neural Comput. 9(8), 1735–1780 (1997)"><span data-dcnode-id="1777" instrument_node="">32</span></a><span data-dcnode-id="1775" instrument_node="">]. LSTM can learn to bridge minimal time lags and, hence, have proven to be effective when the input events are real-time streaming data, a case which is relatively typical in data-driven problems [</span><a aria-label="Reference 33" data-dcnode-id="1773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d22793250e1376" title="Yu, Y., Si, X., Changhua, H., Zhang, J.: A review of recurrent neural networks: LSTM cells and network architectures. Neural Comput. 31(7), 1235–1270 (2019)"><span data-dcnode-id="1774" instrument_node="">33</span></a><span data-dcnode-id="1772" instrument_node="">].</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1770" instrument_node="">The second design choice refers to the type of the RL agent. In our framework we adopt actor-critic reinforcement learning [</span><a aria-label="Reference 34" data-dcnode-id="1768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d22793250e1382" title="Konda, V.R., Tsitsiklis, J.N.: Actor-critic algorithms. In: Advances in Neural Information Processing Systems, pp. 1008–1014 (2000)"><span data-dcnode-id="1769" instrument_node="">34</span></a><span data-dcnode-id="1767" instrument_node="">]. The idea of the critic-only approach is to learn a value function based on which the agent can compare (“criticize”) the expected outcomes of different actions. In the actor-only approach the agent senses the state of the environment and acts directly, i.e., without computing and comparing the expected outcomes of different actions, hence the agent learns a direct mapping (a policy) from states to actions. In contrast to these two approaches, the key idea of the actor-critic approach is to simultaneously use an actor, which determines the agent's action given the current state of the environment, and a critic, which judges the selected action. The actor learns a parameterized policy, and the critic learns a value function to evaluate state-action pairs [</span><a aria-label="Reference 34" data-dcnode-id="1765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d22793250e1385" title="Konda, V.R., Tsitsiklis, J.N.: Actor-critic algorithms. In: Advances in Neural Information Processing Systems, pp. 1008–1014 (2000)"><span data-dcnode-id="1766" instrument_node="">34</span></a><span data-dcnode-id="1764" instrument_node="">]. Although learning the policy depends on the quality of the value function estimate (which is learned simultaneously by the critic), our preference for the actor-critic algorithm is due to the fact that it provides the policy necessary for the policy shaping method that consists our choice in the third design issue.</span></p><p data-dcnode-id="1755"><span data-dcnode-id="1762" instrument_node="">The third design issue refers to the type if human-agent interaction. Human interaction in RL algorithms has been classified in five categories: (i) standard imitation learning, in which the human trainer observes the state information and demonstrates action to the agent; (ii) learning from evaluative feedback, where the human trainer watches the agent performing the task and provides instant feedback on each agent decision; (iii) imitation from observation, which is similar to standard imitation learning except that the agent does not have access to human demonstrated action; (iv) learning attention from human, which requires the trainer to provide attention map to the learning agent; and (v) learning from human preference, in which the human watches two behaviors generated by the learning agent simultaneously and decides which is more preferable [</span><a aria-label="Reference 35" data-dcnode-id="1760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d22793250e1392" title="Grondman, I., Busoniu, L., Lopes, G.A.D., Babuska, R.: A survey of actor-critic reinforcement learning: standard and natural policy gradients. IEEE Trans. Syst. Man Cybern. Part C 42(6), 1291–1307 (2012)"><span data-dcnode-id="1761" instrument_node="">35</span></a><span data-dcnode-id="1759" instrument_node="">, </span><a aria-label="Reference 36" data-dcnode-id="1757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d22793250e1395" title="Zhang, R., Torabi, F., Guan, L., Ballard, D.H., Stone, P.: Leveraging human guidance for deep reinforcement learning tasks. In: Proceedings of the Twenty-Eighth International Joint Conference on Artificial Intelligence, Survey Track, pp. 6339–6346 (2019)"><span data-dcnode-id="1758" instrument_node="">36</span></a><span data-dcnode-id="1756" instrument_node="">].</span></p><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Our framework adopts the learning from evaluative feedback approach. In this approach the agent adjusts its policy based on the feedback received. The simplest form of evaluative feedback is a scalar value indicating how desirable an observed action is. This approach does not require the human trainer to be an expert at performing the task - it only requires the trainer to accurately judge agent behaviors. One of the main challenges in this approach is to interpret human feedback correctly. Methods that assume different interpretations of human feedback include: (a) policy shaping. which interprets human feedback as direct policy labels; (b) reward shaping that interprets human feedback as the value function or a human-specified reward function; (c) human intervention, in which a human supervises the training process of an RL agent and blocks catastrophic actions; and (d) policy-dependent feedback, which posits that feedback should be interpreted as an advantage function that specifies how much better or worse when deviating from the agent’s current policy.</span></p></div></div></section><section data-dcnode-id="1684" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1685" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1748" id="Sec5"><span data-dcnode-id="1749" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1686" id="Sec5-content"><p data-dcnode-id="1737"><span data-dcnode-id="1747" instrument_node="">The recent increase of the use of AI technologies in our everyday lives has generated the need for AI systems to work synergistically with humans in an effective, transparent and ethical way [</span><a aria-label="Reference 37" data-dcnode-id="1745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d22793250e1409" title="Kambhampati, S.: Challenges of human-aware AI systems. AI Mag. 41(3) (2020)"><span data-dcnode-id="1746" instrument_node="">37</span></a><span data-dcnode-id="1744" instrument_node="">]. However, if we are to treat AI systems in such a manner as to allow them to augment our abilities and compensate for our weaknesses, we need a new understanding of AI that takes humans explicitly into account. We need to change our view from AI systems as “thinking machines” and treat them as “cognitive prostheses” that can help humans think and act better [</span><a aria-label="Reference 38" data-dcnode-id="1742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d22793250e1412" title="Akata, Z., et al.: A research agenda for hybrid intelligence: augmenting human intellect with collaborative, adaptive, responsible, and explainable artificial intelligence. Computer 53(8), 18–28 (2020)"><span data-dcnode-id="1743" instrument_node="">38</span></a><span data-dcnode-id="1741" instrument_node="">, </span><a aria-label="Reference 39" data-dcnode-id="1739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d22793250e1415" title="Trunk, A., Birkel, H., Hartmann, E.: On the current state of combining human and artificial intelligence for strategic organizational decision making. Bus. Res., 1–45 (2020)"><span data-dcnode-id="1740" instrument_node="">39</span></a><span data-dcnode-id="1738" instrument_node="">].</span></p><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">Our proposal of a framework for collaborative human-AI decision making is towards this direction. It aims to exploit the predictive power of data-driven predictive analytics techniques with the decision-making approach of reinforcement learning with human feedback. Our framework can be considered a specific instance of the hybrid structure of the human and AI-based decision making combinations described in [</span><a aria-label="Reference 40" data-dcnode-id="1734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d22793250e1421" title="Shrestha, Y.R., Ben-Menahem, S.M., Von Krogh, G.: Organizational decision-making structures in the age of artificial intelligence. Calif. Manage. Rev. 61(4), 66–83 (2019)"><span data-dcnode-id="1735" instrument_node="">40</span></a><span data-dcnode-id="1733" instrument_node="">]; actually it can be categorized in the “Hybrid 1: AI to human” category, in which the AI agent works in tandem with the human by providing algorithmic prediction results, which are then used as input to a collaborative human-AI decision-making process.</span></p><p data-dcnode-id="1718"><span data-dcnode-id="1731" instrument_node="">The proposed framework outlines an approach towards the combination of predictive and prescriptive analytics, which – according to analysts’ reports [</span><a aria-label="Reference 41" data-dcnode-id="1729" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d22793250e1427" title="Gartner Inc.: When and How to Combine Predictive and Prescriptive Techniques to Solve Business Problems, 25 October 2018. ID: G00368423 (2018)"><span data-dcnode-id="1730" instrument_node="">41</span></a><span data-dcnode-id="1728" instrument_node="">] – will allow organizations to reap significant business benefits. However, there are also critical costs to be considered, chief among them the cost of acquiring and annotating data. The appropriate datasets for predictive tasks have recently become key corporate assets. The issue of sample efficiency is especially important when reinforcement learning is used; if the data samples are limited in numbers the learning algorithm would have very low exploration of the environment from training data as the information and states are not fully covered. To handle this issue, the efficiency of data should be good enough or the RL approach should be sample efficient to learn the environment from limited amount of data [</span><a aria-label="Reference 26" data-dcnode-id="1726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d22793250e1430" title="Naeem, M., Rizvi, S.T.H., Coronato, A.: A gentle introduction to reinforcement learning and its application in different fields. IEEE Access (2020)"><span data-dcnode-id="1727" instrument_node="">26</span></a><span data-dcnode-id="1725" instrument_node="">]. An additional characteristic, that may increase the cost of datasets, is the need to guarantee and continuously assess data quality [</span><a aria-label="Reference 42" data-dcnode-id="1723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d22793250e1433" title="Wang, R.Y., Strong, D.M.: Beyond accuracy: what data quality means to data consumers. J. Manage. Inf. Syst. 12(4), 5–33 (1996)"><span data-dcnode-id="1724" instrument_node="">42</span></a><span data-dcnode-id="1722" instrument_node="">, </span><a aria-label="Reference 43" data-dcnode-id="1720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d22793250e1436" title="Cai, L., Zhu, Y.: The challenges of data quality and data quality assessment in the big data era. Data Sci. J. 14 (2015)"><span data-dcnode-id="1721" instrument_node="">43</span></a><span data-dcnode-id="1719" instrument_node="">].</span></p><p data-dcnode-id="1710"><span data-dcnode-id="1717" instrument_node="">The design and development of human-AI systems may demonstrate unpredictable behaviors that can be disruptive, confusing, offensive, and even dangerous. There is therefore a clear need to address the human computer interaction (HCI) issues of human-AI systems in a systematic manner. The recent advances generate a stream of challenges and opportunities for the HCI community. Although recent efforts have already developed reusable design guidelines [</span><a aria-label="Reference 44" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d22793250e1442" title="Amershi, S., et al.: Guidelines for human-AI interaction. In: Proceedings of the 2019 CHI Conference on Human Factors in Computing Systems, pp. 1–13 (2019)"><span data-dcnode-id="1716" instrument_node="">44</span></a><span data-dcnode-id="1714" instrument_node="">], many challenges still persist in designing and innovating valuable human-AI interactions. Topics such as the uncertainty surrounding AI's capabilities and the complexity of AI's output create yet unsolved design challenges [</span><a aria-label="Reference 45" data-dcnode-id="1712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d22793250e1445" title="Yang, Q., Steinfeld, A., Rosé, C., Zimmerman, J.: Re-examining whether, why, and how human-AI interaction is uniquely difficult to design. In: Proceedings of the 2020 CHI Conference on Human Factors in Computing Systems, 1–13 (2020)"><span data-dcnode-id="1713" instrument_node="">45</span></a><span data-dcnode-id="1711" instrument_node="">].</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node="">The way human users are involved in a direct collaboration with RL agents is an additional topic that needs special attention. Interactive RL approaches need to be designed in such a manner as to produce behaviors that align with the user’s intention and allow clear communication between the human and the RL algorithm. For example, in order to motivate users to give feedback several studies suggest the use of gamification strategies [</span><a aria-label="Reference 18" data-dcnode-id="1707" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d22793250e1452" title="Arzate Cruz, C., Igarashi, T.: A survey on interactive reinforcement learning: design principles and open challenges. In: Proceedings of the 2020 ACM Designing Interactive Systems Conference, pp. 1195–1209 (2020)
"><span data-dcnode-id="1708" instrument_node="">18</span></a><span data-dcnode-id="1706" instrument_node="">].</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1704" instrument_node="">Furthermore, the fatigue of users and its effects on the quantity and quality of feedback should be considered; for example, it has been observed that humans tend to reduce the quantity of feedback they give over time while the quality also diminishes. Developing appropriate design strategies to address the engagement of humans becomes paramount. Finally, the knowledge level of the human involved in the interaction is an important feature of the human-AI interactions. This level has an impact on the quality and quantity of feedback and could limit the use of some feedback types that require more precise information, such as demonstrations or action advice [</span><a aria-label="Reference 18" data-dcnode-id="1702" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d22793250e1458" title="Arzate Cruz, C., Igarashi, T.: A survey on interactive reinforcement learning: design principles and open challenges. In: Proceedings of the 2020 ACM Designing Interactive Systems Conference, pp. 1195–1209 (2020)
"><span data-dcnode-id="1703" instrument_node="">18</span></a><span data-dcnode-id="1701" instrument_node="">].</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1699" instrument_node="">The practical real-world challenges of implementing reinforcement learning algorithm constitute another area of concern. Topics such as the ones related to the exact definition of reward functions, the number of actions and state spaces, as well as the data sample efficiency (already mentioned above) have significant impact on the performance of RL algorithms in real-world applications [</span><a aria-label="Reference 46" data-dcnode-id="1697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d22793250e1464" title="Dulac-Arnold, G., Mankowitz, D., Hester, T.: Challenges of real-world reinforcement learning. In: ICML 2019 Workshop, Reinforcement Learning for Real Life, 14 June 2019, Long Beach, CA, USA (2019)"><span data-dcnode-id="1698" instrument_node="">46</span></a><span data-dcnode-id="1696" instrument_node="">]. In addition, the environment in real-world application domains may allow only partial observation. Conventional RL methods assume that environments are fully observable Markov environments. Partial observability requires the generalization of Markov decision processes to partially observable ones, which increases computational complexity.</span></p><p data-dcnode-id="1687"><span data-dcnode-id="1694" instrument_node="">Of course, the more general issues of human-AI interactions also apply in our case. Topics like the need for governance structures that address AI failures; the need for explaining AI recommendations; and the issues of trust, transparency and reliability are still open research questions in the organization science, information systems and artificial intelligence fields [</span><a aria-label="Reference 47" data-dcnode-id="1692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d22793250e1470" title="Glikson, E., Woolley, A.W.: Human trust in artificial intelligence: review of empirical research. Acad. Manage. Ann., ja (2020)"><span data-dcnode-id="1693" instrument_node="">47</span></a><span data-dcnode-id="1691" instrument_node="">, </span><a aria-label="Reference 48" data-dcnode-id="1689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d22793250e1473" title="Samek, W., Montavon, G., Vedaldi, A., Hansen, L.K., Müller, K.-R. (eds.): Explainable AI: interpreting, explaining and visualizing deep learning. LNCS (LNAI), vol. 11700. Springer, Cham (2019). 
                    https://doi.org/10.1007/978-3-030-28954-6
                    
                  "><span data-dcnode-id="1690" instrument_node="">48</span></a><span data-dcnode-id="1688" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="1669" data-title="Conclusions and Further Work"><div class="c-article-section" data-dcnode-id="1670" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1682" id="Sec6"><span data-dcnode-id="1683" instrument_node="">Conclusions and Further Work</span></h2><div class="c-article-section__content" data-dcnode-id="1671" id="Sec6-content"><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">In the present paper we developed a conceptual framework that integrates the data-driven predictions of predictive analytics with the decision-making process of prescriptive analytics. The framework explicitly takes into account human experience using the mechanisms of interactive reinforcement learning. Early implementations of the framework in application domains like financial management (stock trading) and industry 4.0 (predictive maintenance in steel industry) provide encouraging results.</span></p><p data-dcnode-id="1672"><span data-dcnode-id="1679" instrument_node="">In our further work we intend to address problems that need to solve several tasks with different rewards simultaneously. For such problems, we aim to experiment with multi-objective RL (MORL). MORL can be viewed as the combination of multi-objective optimization (MOO) and RL to solve decision-making problems with multiple conflicting objectives [</span><a aria-label="Reference 49" data-dcnode-id="1677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d22793250e1488" title="Liu, C., Xin, X., Dewen, H.: Multiobjective reinforcement learning: a comprehensive overview. IEEE Trans. Syst. Man Cybern. Syst. 45(3), 385–398 (2014)"><span data-dcnode-id="1678" instrument_node="">49</span></a><span data-dcnode-id="1676" instrument_node="">]. Moreover, in order to facilitate learning the reward function from demonstrations by human experts, we aim to experiment with inverse RL [</span><a aria-label="Reference 50" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d22793250e1491" title="Zhifei, S., Joo, E.M.: A review of inverse reinforcement learning theory and recent advances. In: 2012 IEEE Congress on Evolutionary Computation, pp. 1–8. IEEE (2012)"><span data-dcnode-id="1675" instrument_node="">50</span></a><span data-dcnode-id="1673" instrument_node="">], which attempts to extract the reward function from the observed behavior of an agent.</span></p></div></div></section><span data-dcnode-id="1668" instrument_node="">
