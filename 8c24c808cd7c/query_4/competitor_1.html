</span><h3 data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">What we aim to solve</span></h3><span data-dcnode-id="3226" instrument_node="">
</span><div class="source" data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">
SOURCE: Self-reported by organization
</span></div><span data-dcnode-id="3223" instrument_node="">
</span><p class="impact-text excerpt" data-dcnode-id="3214"><span data-dcnode-id="3222" instrument_node="">The mission of United Against Human Trafficking (UAHT) is to end human trafficking through preventing exploitation, educating the community, and empowering survivors. We fight so that all may live free.
Despite its</span><span class="more_ellipsis" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">...</span></span><span data-dcnode-id="3219" instrument_node=""> </span><span class="more_text hide" data-dcnode-id="3217" style="display: none;"><span data-dcnode-id="3218" instrument_node="">global reach, human trafficking takes place locally — in a favorite nail salon or restaurant; in a neighborhood home or popular hotel; on a city street or rural farm. An individual can be trafficked within any industry or type of work and need not be transported physically from one location to another to be trafficked. An individual is trafficked if force, fraud, or coercion is used to make the individual work, or if a minor is trafficked for sex by any means, regardless of a trafficker’s use of force, fraud, or coercion. The circumstances of victims can vary considerably. Sex trafficking victims may consent to romantic involvement with someone who then coerces them into prostitution. </span></span><a class="excerpt" data-dcnode-id="3215" data-original-title="" href="#" title=""><span data-dcnode-id="3216" instrument_node="">Read&nbsp;more</span></a></p><span data-dcnode-id="3213" instrument_node="">

We provide wrap-around case management for survivors of sex and/or labor trafficking as they journey to full, holistic recovery and economic empowerment. We reach out to vulnerable populations to identify overlooked trafficking victims. We facilitate trauma-healing support groups for victims and families affected by trafficking. Our program Family Huddle is the only support group in the area for child sex trafficking victims that incorporates the entire family into the healing process.
</span></p><span data-dcnode-id="3188" instrument_node="">

Prevention
</span></h4><span data-dcnode-id="3155" instrument_node="">
</span><div aria-labelledby="programHead1" class="profile-accordion-body collapse" data-dcnode-id="3126" data-parent="#progamsAccordion" id="programCollapse1"><span data-dcnode-id="3154" instrument_node="">
</span><div class="card-body" data-dcnode-id="3128"><span data-dcnode-id="3153" instrument_node="">
</span><p class="description" data-dcnode-id="3151" style=""><span data-dcnode-id="3152" instrument_node="">
We train community members and frontline professionals such as social service providers, educators, and hospitality workers how to recognize the signs of exploitation and respond safely. We teach students how to spot trafficker grooming tactics and equip at-risk children with the healthy life skills they need to avoid falling into exploitation. We disrupt demand for trafficking through peer support groups for men convicted of buying sex.
</span></p><span data-dcnode-id="3150" instrument_node="">

</span><div aria-labelledby="programHead2" class="profile-accordion-body collapse" data-dcnode-id="3088" data-parent="#progamsAccordion" id="programCollapse2"><span data-dcnode-id="3113" instrument_node="">

</span><p class="description" data-dcnode-id="3110" style=""><span data-dcnode-id="3111" instrument_node="">
Our 65+-member Houston Rescue and Restore Coalition (HRRC) collectively strategizes local efforts against exploitation. We share resources, provide mentorship, and uphold a united response to human trafficking. Our service referral network The Pathway allows victim assistance agencies and their clients to access diverse care across the Greater Houston Area from the convenience of a single platform.

</span><div class="card" data-dcnode-id="1438" style=""><span data-dcnode-id="1456" instrument_node="">
</span><div class="card-header" data-dcnode-id="1440" id="chartingImpact2"><span data-dcnode-id="1455" instrument_node="">
</span><h4 aria-controls="chartingImpactCollapse2" aria-expanded="true" class="profile-accordion-header collapsed" data-dcnode-id="1451" data-target="#chartingImpactCollapse2" data-toggle="collapse"><span data-dcnode-id="1454" instrument_node="">
</span><i class="material-icons float-right" data-dcnode-id="1453"></i><span data-dcnode-id="1452" instrument_node="">
What is the organization aiming to accomplish?
</span></h4><span data-dcnode-id="1450" instrument_node="">
</span><div aria-labelledby="chartingImpact2" class="profile-accordion-body collapse" data-dcnode-id="1442" data-parent="#chartingImpactAccordion" id="chartingImpactCollapse2"><span data-dcnode-id="1449" instrument_node="">
</span><div class="card-body" data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">
</span><p class="description" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Our goal at United Against Human Trafficking is to end trafficking by unifying the movement and strategically creating programs that fill in the gaps of services for victims and survivors.</span></p><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
</span></div><span data-dcnode-id="1437" instrument_node="">
</span><div class="card" data-dcnode-id="1409" style=""><span data-dcnode-id="1436" instrument_node="">
</span><div class="card-header" data-dcnode-id="1411" id="chartingImpact3"><span data-dcnode-id="1435" instrument_node="">
</span><h4 aria-controls="chartingImpactCollapse3" aria-expanded="true" class="profile-accordion-header collapsed" data-dcnode-id="1431" data-target="#chartingImpactCollapse3" data-toggle="collapse"><span data-dcnode-id="1434" instrument_node="">
</span><i class="material-icons float-right" data-dcnode-id="1433"></i><span data-dcnode-id="1432" instrument_node="">
What are the organization's key strategies for making this happen?
</span></h4><span data-dcnode-id="1430" instrument_node="">
</span><div aria-labelledby="chartingImpact3" class="profile-accordion-body collapse" data-dcnode-id="1413" data-parent="#chartingImpactAccordion" id="chartingImpactCollapse3"><span data-dcnode-id="1429" instrument_node="">
</span><div class="card-body" data-dcnode-id="1415"><span data-dcnode-id="1428" instrument_node="">
</span><p class="description" data-dcnode-id="1417"><span data-dcnode-id="1427" instrument_node="">We fight both sex and labor trafficking in three ways: prevention, client services, and collaboration.</span><br data-dcnode-id="1426"><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">Prevention: We train frontline professionals such as social service providers, educators, and hospitality workers how to recognize the signs of exploitation and respond safely. We teach students how to spot trafficker grooming tactics and equip at-risk children with the healthy life skills they need to avoid falling into exploitation. We reach out to vulnerable communities such as the homeless, immigrants, substance-dependent, and others to direct them to community resources and identify overlooked victims. We disrupt demand for trafficking through peer support groups for men convicted of buying sex. </span><br data-dcnode-id="1423"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">Client Services: We provide wrap-around case management for survivors of sex and/or labor trafficking as they journey to full, holistic recovery. We facilitate trauma-healing support and other alternative therapy groups for victims and families affected by trafficking. We assist clients with housing payments to ensure they remain safe and sheltered from traffickers.</span><br data-dcnode-id="1420"><br data-dcnode-id="1419"><span data-dcnode-id="1418" instrument_node="">Collaboration: Our 55+-member Houston Rescue and Restore Coalition (HRRC) collectively strategizes for local efforts against exploitation. We share resources, provide mentorship, and uphold a united response to human trafficking. Our service referral network The Pathway allows victim assistance agencies and their clients to access diverse care across the Greater Houston Area from a single platform.</span></p><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">
</span></div><span data-dcnode-id="1412" instrument_node="">
</span></div><span data-dcnode-id="1410" instrument_node="">
</span></div><span data-dcnode-id="1408" instrument_node="">
</span><div class="card" data-dcnode-id="1386" style=""><span data-dcnode-id="1407" instrument_node="">
</span><div class="card-header" data-dcnode-id="1388" id="chartingImpact4"><span data-dcnode-id="1406" instrument_node="">
</span><h4 aria-controls="chartingImpactCollapse4" aria-expanded="true" class="profile-accordion-header collapsed" data-dcnode-id="1402" data-target="#chartingImpactCollapse4" data-toggle="collapse"><span data-dcnode-id="1405" instrument_node="">
</span><i class="material-icons float-right" data-dcnode-id="1404"></i><span data-dcnode-id="1403" instrument_node="">
What are the organization's capabilities for doing this?
</span></h4><span data-dcnode-id="1401" instrument_node="">
</span><div aria-labelledby="chartingImpact4" class="profile-accordion-body collapse" data-dcnode-id="1390" data-parent="#chartingImpactAccordion" id="chartingImpactCollapse4"><span data-dcnode-id="1400" instrument_node="">
</span><div class="card-body" data-dcnode-id="1392"><span data-dcnode-id="1399" instrument_node="">
</span><p class="description" data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">UAHT is led by Timeka Walker, a Licensed Master Social Worker (LMSW) with over 17 years of experience in nonprofit management and operations. As the CEO, Ms. Walker ensures the overall operation of the organization in order to achieve its mission. Her leadership role in the Houston Rescue and Restore Coalition with 50+ other Executive Directors /CEOs allows her to be on the pulse of survivor needs in Houston. She leads a strong and experienced team of social workers, project managers, and development professionals. </span><br data-dcnode-id="1397"><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">UAHT is governed by an active Board of Directors that meets 12 times a year and holds special meetings as needed. The Board is made up of professional and entrepreneurial leaders in the community, all passionate about UAHT's mission. Board committees (Executive, Finance, Development, and Strategic Planning) review finances; review, initiate, and support fund development activities; initiate, implement, and review long-range planning goals; review and update/revise organizational policies; provide general oversight; address governance issues; plan special events; and other tasks as needed.</span></p><span data-dcnode-id="1393" instrument_node="">
</span></div><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span></div><span data-dcnode-id="1387" instrument_node="">
</span></div><span data-dcnode-id="1385" instrument_node="">
</span><div class="card" data-dcnode-id="1348" style=""><span data-dcnode-id="1384" instrument_node="">
</span><div class="card-header" data-dcnode-id="1350" id="chartingImpact6"><span data-dcnode-id="1383" instrument_node="">
</span><h4 aria-controls="chartingImpactCollapse6" aria-expanded="true" class="profile-accordion-header collapsed" data-dcnode-id="1379" data-target="#chartingImpactCollapse6" data-toggle="collapse"><span data-dcnode-id="1382" instrument_node="">
</span><i class="material-icons float-right" data-dcnode-id="1381"></i><span data-dcnode-id="1380" instrument_node="">
What have they accomplished so far and what's next?
</span></h4><span data-dcnode-id="1378" instrument_node="">
</span><div aria-labelledby="chartingImpact6" class="profile-accordion-body collapse" data-dcnode-id="1352" data-parent="#chartingImpactAccordion" id="chartingImpactCollapse6"><span data-dcnode-id="1377" instrument_node="">
</span><div class="card-body" data-dcnode-id="1354"><span data-dcnode-id="1376" instrument_node="">
</span><p class="description" data-dcnode-id="1356"><span data-dcnode-id="1375" instrument_node="">MAJOR ACCOMPLISHMENTS</span><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">1. Appointed by the Attorney General of Texas in 2010 to serve on the state-wide Human Trafficking Prevention Task Force.</span><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">2. Developed a comprehensive health care training program on human trafficking called Human Trafficking and the Health Care Professional: Look Beneath the Surface and H.E.A.R. Your Patient in 2010. This program educates health professionals on identifying victims in the clinic setting.</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">3. Launched the first prevention training program in Texas for at-risk youth in 2011. The program aims to prevent youth from falling victim to labor and sexual exploitation. It is the first program of its kind in Texas.</span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">4. Appointed by the Mayor of Houston in 2012 to serve on the Mayor’s Advisory Council on Immigration and Refugee Affairs and to Chair the Sub- Committee on Human Trafficking, which transitioned in 2015 to the Houston Area Council on Human Trafficking. UAHT chaired the Prevention Sub- Committee.</span><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">5. The Department of State designated UAHT as a key organization for international delegations to consult with while looking to improve anti-trafficking efforts. UAHT has met with 12 delegations from countries all over the globe. As a result of this work, the U.S. Embassy in Cyprus invited UAHT to work in collaboration with the government of Cyprus and provide additional training on human trafficking, building coalitions/partnerships, and technical training to government officials, law enforcement, and health care providers in 2013.</span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">6. Produces effective annual media campaigns since 2008, including multi-lingual billboards, taxi cab signs, airport shuttle signs, and mall signs.</span><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">7. Recipient of the 2014 FBI Director’s Community Leadership Award due to our many years of service to the community and, most notably, our 2014 Media Campaign entitled “Let Them Be Heard,” which spanned 17 cities across the state of Texas.</span><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node="">8. Became a member of the Texas Governor's Office of Continuum Care for Child Sex Trafficking Victims, allowing UAHT to advocate for children in the juvenile justice system.</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">9. Developed the country's first referral database specifically for survivors of human trafficking and their service providers.</span></p><span data-dcnode-id="1355" instrument_node="">
</span></div><span data-dcnode-id="1353" instrument_node="">
</span></div><span data-dcnode-id="1351" instrument_node="">
</span></div><span data-dcnode-id="1349" instrument_node="">
</span></div><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node="">
</span></section><span data-dcnode-id="1343" instrument_node="">
</span><section class="profile-section-container" data-dcnode-id="1245" id="howWeListen"><span data-dcnode-id="1342" instrument_node="">
</span><h2 data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">How we listen</span></h2><span data-dcnode-id="1339" instrument_node="">
</span><div class="source" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node=""> SOURCE: Self-reported by organization</span></div><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Seeking feedback from people served makes programs more responsive and effective. Here’s how this organization is listening.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><div data-dcnode-id="1247" id="feedbackResponses"><span data-dcnode-id="1332" instrument_node="">
</span><div class="pb-3 mb-3" data-dcnode-id="1324"><span data-dcnode-id="1331" instrument_node="">
</span><i class="material-icons" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">done</span></i><span data-dcnode-id="1328" instrument_node="">
</span><span class="pl-2" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">
We shared information about our current feedback practices.
</span></span><span data-dcnode-id="1325" instrument_node="">
</span></div><span data-dcnode-id="1323" instrument_node="">
</span><ul data-dcnode-id="1249" id="howWeListenResponses"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1314"><span data-dcnode-id="1321" instrument_node="">
</span><p class="question" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Who are the people you serve with your mission?</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Victims, survivors, and persons at risk of human trafficking (sex and/or labor) exploitation.</span></p><span data-dcnode-id="1315" instrument_node="">
</span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1305"><span data-dcnode-id="1312" instrument_node="">
</span><p class="question" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">How is your organization collecting feedback from the people you serve?</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node=""> Electronic surveys (by email, tablet, etc.), Paper surveys, Case management notes, Constituent (client or resident, etc.) advisory committees, Suggestion box/email, </span></p><span data-dcnode-id="1306" instrument_node="">
</span></li><span data-dcnode-id="1304" instrument_node="">
</span><li data-dcnode-id="1296"><span data-dcnode-id="1303" instrument_node="">
</span><p class="question" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">How is your organization using feedback from the people you serve?</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node=""> To identify and remedy poor client service experiences, To identify bright spots and enhance positive service experiences, To make fundamental changes to our programs and/or operations, To inform the development of new programs/projects, To identify where we are less inclusive or equitable across demographic groups, To strengthen relationships with the people we serve, To understand people's needs and how we can help them achieve their goals, </span></p><span data-dcnode-id="1297" instrument_node="">
</span></li><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1294" instrument_node="">
</span><p class="question" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">What significant change resulted from feedback?</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">UAHT has worked directly with trafficking survivors since 2017. In response to feedback and needs expressed by survivors, we began implementing case management services in 2020 and rental assistance in 2021.</span></p><span data-dcnode-id="1288" instrument_node="">
</span></li><span data-dcnode-id="1286" instrument_node="">
</span><li data-dcnode-id="1278"><span data-dcnode-id="1285" instrument_node="">
</span><p class="question" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">With whom is the organization sharing feedback?</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node=""> Our staff, Our board, </span></p><span data-dcnode-id="1279" instrument_node="">
</span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1276" instrument_node="">
</span><p class="question" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">How has asking for feedback from the people you serve changed your relationship?</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">UAHT seeks to disrupt the power imbalance and lack of autonomy experienced by trafficking survivors. Our programs are trauma-informed and survivor-centered to prevent the replication of these potentially retraumatizing dynamics. We actively seek feedback from clients and help them set their own goals for what recovery looks like.</span></p><span data-dcnode-id="1270" instrument_node="">
</span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1267" instrument_node="">
</span><p class="question" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Which of the following feedback practices does your organization routinely carry out?</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node=""> We collect feedback from the people we serve at least annually, We take steps to get feedback from marginalized or under-represented people, We aim to collect feedback from as many people we serve as possible, We take steps to ensure people feel comfortable being honest with us, We look for patterns in feedback based on people’s interactions with us (e.g., site, frequency of service, etc.), We engage the people who provide feedback in looking for ways we can improve in response, We act on the feedback we receive, </span></p><span data-dcnode-id="1261" instrument_node="">
</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1258" instrument_node="">
</span><p class="question" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">What challenges does the organization face when collecting feedback?</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node=""> It is difficult to get the people we serve to respond to requests for feedback, It is difficult to find the ongoing funding to support feedback collection, </span></p><span data-dcnode-id="1252" instrument_node="">
</span></li><span data-dcnode-id="1250" instrument_node="">
</span></ul><span data-dcnode-id="1248" instrument_node="">
</span></div><span data-dcnode-id="1246" instrument_node="">
</span></section><span data-dcnode-id="1244" instrument_node="">

</span><h4 class="report-section-header uppercase no-padding-no-margin" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">
Equity strategies
</span></h4><span data-dcnode-id="489" instrument_node="">
</span><span class="source" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Last updated: 02/14/2022 </span></span><span data-dcnode-id="486" instrument_node="">
</span><p class="report-section-text no-bottom-space" data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">
GuideStar partnered with Equity in the Center - an organization that works to shift mindsets,
practices, and systems to increase racial equity - to create this section.
</span><a data-dcnode-id="483" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.equityinthecenter.org/" target="_blank" title=""><span data-dcnode-id="484" instrument_node="">
Learn more
</span></a><span data-dcnode-id="482" instrument_node="">
</span></p><span data-dcnode-id="480" instrument_node="">
</span><div data-dcnode-id="457" id="equityStrategiesData"><span data-dcnode-id="479" instrument_node="">
</span><div class="report-section-header" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">
Data
</span></div><span data-dcnode-id="476" instrument_node="">
</span><ul data-dcnode-id="459" id="equity-strategies-data-list"><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">
We ask team members to identify racial disparities in their programs and / or portfolios.
</span></li><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">
We disaggregate data to adjust programming goals to keep pace with changing needs of the communities we support.
</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">
We employ non-traditional ways of gathering feedback on programs and trainings, which may include interviews, roundtables, and external reviews with/by community stakeholders.
</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">
We disaggregate data by demographics, including race, in every policy and program measured.
</span></li><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">
We have long-term strategic plans and measurable goals for creating a culture such that one’s race identity has no influence on how they fare within the organization.
</span></li><span data-dcnode-id="460" instrument_node="">
</span></ul><span data-dcnode-id="458" instrument_node="">
</span></div><span data-dcnode-id="456" instrument_node="">
</span><div data-dcnode-id="433" id="equityStrategiesPolicies"><span data-dcnode-id="455" instrument_node="">
</span><div class="report-section-header" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">
Policies and processes
</span></div><span data-dcnode-id="452" instrument_node="">
</span><ul data-dcnode-id="435" id="equity-strategies-policies-list"><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">
We use a vetting process to identify vendors and partners that share our commitment to race equity.
</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">
We seek individuals from various race backgrounds for board and executive director/CEO positions within our organization.
</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">
We have community representation at the board level, either on the board itself or through a community advisory board.
</span></li><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">
We help senior leadership understand how to be inclusive leaders with learning approaches that emphasize reflection, iteration, and adaptability.
</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">
We engage everyone, from the board to staff levels of the organization, in race equity work and ensure that individuals understand their roles in creating culture such that one’s race identity has no influence on how they fare within the organization.
</span></li><span data-dcnode-id="436" instrument_node="">
</span></ul><span data-dcnode-id="434" instrument_node="">
</span></div><span data-dcnode-id="432" instrument_node="">
