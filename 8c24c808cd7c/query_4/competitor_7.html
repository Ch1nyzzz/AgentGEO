</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="2884" id="firstHeading"><span data-dcnode-id="2885" instrument_node="">Human trafficking in Mexico</span></h1><span data-dcnode-id="2883" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="466" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="475"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="2865" style="display:none"><span data-dcnode-id="2866" instrument_node="">Overview of the situation of human trafficking in Mexico</span></div><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2841"><b data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Human trafficking</span></b><span data-dcnode-id="2861" instrument_node=""> is the </span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade" title="Trade"><span data-dcnode-id="2860" instrument_node="">trade</span></a><span data-dcnode-id="2858" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humans" title="Humans"><span data-dcnode-id="2857" instrument_node="">humans</span></a><span data-dcnode-id="2855" instrument_node="">, most commonly for the purpose of </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labour" title="Forced labour"><span data-dcnode-id="2854" instrument_node="">forced labour</span></a><span data-dcnode-id="2852" instrument_node="">, </span><a data-dcnode-id="2850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_slavery" title="Sexual slavery"><span data-dcnode-id="2851" instrument_node="">sexual slavery</span></a><span data-dcnode-id="2849" instrument_node="">, or </span><a class="mw-redirect" data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commercial_sexual_exploitation" title="Commercial sexual exploitation"><span data-dcnode-id="2848" instrument_node="">commercial sexual exploitation</span></a><span data-dcnode-id="2846" instrument_node=""> for the trafficker or others. Mexico is a large source, transit, and destination country for victims of human trafficking.</span><sup class="reference" data-dcnode-id="2843" id="cite_ref-:4_1-0"><a data-dcnode-id="2844" href="#cite_note-:4-1"><span data-dcnode-id="2845" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2842" instrument_node="">
</span></p><p data-dcnode-id="2795"><span data-dcnode-id="2840" instrument_node="">Government and NGO statistics indicate that the magnitude of forced labor surpasses that of forced prostitution in Mexico.</span><sup class="reference" data-dcnode-id="2837" id="cite_ref-dos_2-0"><a data-dcnode-id="2838" href="#cite_note-dos-2"><span data-dcnode-id="2839" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2836" instrument_node=""> Groups considered most vulnerable to </span><b data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">human trafficking in Mexico</span></b><span data-dcnode-id="2833" instrument_node=""> include women, children, indigenous persons, and undocumented migrants.</span><sup class="reference" data-dcnode-id="2830" id="cite_ref-:6_3-0"><a data-dcnode-id="2831" href="#cite_note-:6-3"><span data-dcnode-id="2832" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2827" id="cite_ref-:12_4-0"><a data-dcnode-id="2828" href="#cite_note-:12-4"><span data-dcnode-id="2829" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2824" id="cite_ref-:13_5-0"><a data-dcnode-id="2825" href="#cite_note-:13-5"><span data-dcnode-id="2826" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2823" instrument_node=""> Mexican women, girls, and boys are subjected to sexual servitude within the United States and Mexico, lured by false job offers from poor rural regions to urban, border, and tourist areas.</span><sup class="reference" data-dcnode-id="2820" id="cite_ref-:6_3-1"><a data-dcnode-id="2821" href="#cite_note-:6-3"><span data-dcnode-id="2822" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2817" id="cite_ref-:7_6-0"><a data-dcnode-id="2818" href="#cite_note-:7-6"><span data-dcnode-id="2819" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="2814" id="cite_ref-:14_7-0"><a data-dcnode-id="2815" href="#cite_note-:14-7"><span data-dcnode-id="2816" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2813" instrument_node=""> Mexican trafficking victims were also subjected to conditions of forced labor in domestic servitude, street begging, and construction in both the United States and Mexico.</span><sup class="reference" data-dcnode-id="2810" id="cite_ref-dos_2-1"><a data-dcnode-id="2811" href="#cite_note-dos-2"><span data-dcnode-id="2812" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2807" id="cite_ref-:0_8-0"><a data-dcnode-id="2808" href="#cite_note-:0-8"><span data-dcnode-id="2809" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2806" instrument_node=""> U.S. State Department's </span><a data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_to_Monitor_and_Combat_Trafficking_in_Persons" title="Office to Monitor and Combat Trafficking in Persons"><span data-dcnode-id="2805" instrument_node="">Office to Monitor and Combat Trafficking in Persons</span></a><span data-dcnode-id="2803" instrument_node=""> placed the country in </span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report%23Ranking_System" title="Trafficking in Persons Report"><span data-dcnode-id="2802" instrument_node="">"Tier 2"</span></a><span data-dcnode-id="2800" instrument_node="">  in 2017.</span><sup class="reference" data-dcnode-id="2797" id="cite_ref-9"><a data-dcnode-id="2798" href="#cite_note-9"><span data-dcnode-id="2799" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2796" instrument_node="">
</span></p><span data-dcnode-id="2794" instrument_node="">

</span><li class="toclevel-1 tocsection-10" data-dcnode-id="2699"><a data-dcnode-id="2700" href="#Trafficking_across_the_border_with_the_United_States"><span class="tocnumber" data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">5</span></span><span data-dcnode-id="2703" instrument_node=""> </span><span class="toctext" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Trafficking across the border with the United States</span></span></a></li><span data-dcnode-id="2698" instrument_node="">

</span><h2 data-dcnode-id="2668"><span class="mw-headline" data-dcnode-id="2676" id="Types"><span data-dcnode-id="2677" instrument_node="">Types</span></span><span class="mw-editsection" data-dcnode-id="2669"><span class="mw-editsection-bracket" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">[</span></span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D1" title="Edit section: Types"><span data-dcnode-id="2673" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2667" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2661" role="note"><span data-dcnode-id="2664" instrument_node="">See also: </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="2663" instrument_node="">Human trafficking</span></a></div><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2659" instrument_node="">Human trafficking in Mexico takes many forms, including sex trafficking and labor trafficking.</span><sup class="reference" data-dcnode-id="2656" id="cite_ref-:6_3-2"><a data-dcnode-id="2657" href="#cite_note-:6-3"><span data-dcnode-id="2658" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2655" instrument_node=""> Often, migrants being willingly smuggled are entrapped in one or more of these types of trafficking.</span><sup class="reference" data-dcnode-id="2652" id="cite_ref-:0_8-1"><a data-dcnode-id="2653" href="#cite_note-:0-8"><span data-dcnode-id="2654" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="2649" id="cite_ref-10"><a data-dcnode-id="2650" href="#cite_note-10"><span data-dcnode-id="2651" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2648" instrument_node="">
</span></p><span data-dcnode-id="2646" instrument_node="">
</span><h3 data-dcnode-id="2636"><span class="mw-headline" data-dcnode-id="2644" id="Sex_trafficking"><span data-dcnode-id="2645" instrument_node="">Sex trafficking</span></span><span class="mw-editsection" data-dcnode-id="2637"><span class="mw-editsection-bracket" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">[</span></span><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D2" title="Edit section: Sex trafficking"><span data-dcnode-id="2641" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2635" instrument_node="">
</span><link data-dcnode-id="2634" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2630" role="note"><span data-dcnode-id="2633" instrument_node="">Main article: </span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking_in_Mexico" title="Sex trafficking in Mexico"><span data-dcnode-id="2632" instrument_node="">Sex trafficking in Mexico</span></a></div><span data-dcnode-id="2629" instrument_node="">
</span><link data-dcnode-id="2628" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2621" role="note"><span data-dcnode-id="2627" instrument_node="">See also: </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostitution_in_Mexico" title="Prostitution in Mexico"><span data-dcnode-id="2626" instrument_node="">Prostitution in Mexico</span></a><span data-dcnode-id="2624" instrument_node=""> and </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_inequality_in_Mexico" title="Gender inequality in Mexico"><span data-dcnode-id="2623" instrument_node="">Gender inequality in Mexico</span></a></div><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2619" instrument_node="">While sex work is largely Illegal in Mexico, most cities do have </span><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red-light_district" title="Red-light district"><span data-dcnode-id="2618" instrument_node="">Zonas de Tolerancia</span></a><span data-dcnode-id="2616" instrument_node="">, areas where prostitution is allowed. This has made Mexico a destination for sex tourism and one of the world's largest hubs for sex trafficking; It is the largest destination for sex tourism from the United States.</span><sup class="reference" data-dcnode-id="2613" id="cite_ref-:14_7-1"><a data-dcnode-id="2614" href="#cite_note-:14-7"><span data-dcnode-id="2615" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="2610" id="cite_ref-:8_11-0"><a data-dcnode-id="2611" href="#cite_note-:8-11"><span data-dcnode-id="2612" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2609" instrument_node=""> Sex work's profitability in Mexico has driven the forced exploitation of many girls as sex workers.</span><sup class="reference" data-dcnode-id="2606" id="cite_ref-:6_3-3"><a data-dcnode-id="2607" href="#cite_note-:6-3"><span data-dcnode-id="2608" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2605" instrument_node=""> Mexico is on the Tier 2 Watch List of the U.S. State Department's 2017 </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report" title="Trafficking in Persons Report"><span data-dcnode-id="2604" instrument_node="">Trafficking in Persons Report</span></a><span data-dcnode-id="2602" instrument_node="">, a designation given to countries that do not meet the minimum standards of the Trafficking Victims Protection Reauthorization Act of 2003 (TVPRA), but which are still making efforts to comply with these guidelines, in large part because of its booming child sex trafficking industry; an estimated 16,000 to 20,000 Mexican and Central American children are thought to be victims of sex trafficking in the country</span><sup class="reference" data-dcnode-id="2599" id="cite_ref-:10_12-0"><a data-dcnode-id="2600" href="#cite_note-:10-12"><span data-dcnode-id="2601" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2598" instrument_node=""> Mexico is rated as the second worst country in terms of child prostitution globally as of 2010.</span><sup class="reference" data-dcnode-id="2595" id="cite_ref-:11_13-0"><a data-dcnode-id="2596" href="#cite_note-:11-13"><span data-dcnode-id="2597" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2594" instrument_node=""> Governmental ineffectiveness and rampant corruption have corroded trust in the Mexican government, which is evident in the declining rate of crime reporting in border regions of Mexico.</span><sup class="reference" data-dcnode-id="2591" id="cite_ref-:12_4-1"><a data-dcnode-id="2592" href="#cite_note-:12-4"><span data-dcnode-id="2593" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2588" id="cite_ref-:10_12-1"><a data-dcnode-id="2589" href="#cite_note-:10-12"><span data-dcnode-id="2590" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2587" instrument_node="">
</span></p><span data-dcnode-id="2585" instrument_node="">
</span><h3 data-dcnode-id="2575"><span class="mw-headline" data-dcnode-id="2583" id="Labor_trafficking"><span data-dcnode-id="2584" instrument_node="">Labor trafficking</span></span><span class="mw-editsection" data-dcnode-id="2576"><span class="mw-editsection-bracket" data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">[</span></span><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D3" title="Edit section: Labor trafficking"><span data-dcnode-id="2580" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2574" instrument_node="">
</span><link data-dcnode-id="2573" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2569" role="note"><span data-dcnode-id="2572" instrument_node="">See also: </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_the_United_States" title="Human trafficking in the United States"><span data-dcnode-id="2571" instrument_node="">Human trafficking in the United States</span></a></div><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2567" instrument_node="">Mexico is also host to large numbers of persons trafficked for labor purposes, though reliable statistics on their numbers do not exist.</span><sup class="reference" data-dcnode-id="2564" id="cite_ref-:10_12-2"><a data-dcnode-id="2565" href="#cite_note-:10-12"><span data-dcnode-id="2566" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2563" instrument_node=""> Victims are often migrants who engage smugglers voluntarily and are then forced into labor arrangements against their will.</span><sup class="reference" data-dcnode-id="2560" id="cite_ref-:0_8-2"><a data-dcnode-id="2561" href="#cite_note-:0-8"><span data-dcnode-id="2562" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2559" instrument_node=""> Additionally, many of these arrangements take place within the United States rather than within Mexico itself and are thus not necessarily included in Mexican trafficking statistics.</span><sup class="reference" data-dcnode-id="2556" id="cite_ref-:0_8-3"><a data-dcnode-id="2557" href="#cite_note-:0-8"><span data-dcnode-id="2558" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2555" instrument_node=""> Despite this, substantial amounts of trafficked labor, particularly in the form of domestic servitude, are known to be employed within Mexico itself.</span><sup class="reference" data-dcnode-id="2552" id="cite_ref-:10_12-3"><a data-dcnode-id="2553" href="#cite_note-:10-12"><span data-dcnode-id="2554" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2551" instrument_node="">
</span></p><span data-dcnode-id="2549" instrument_node="">
</span><h2 data-dcnode-id="2539"><span class="mw-headline" data-dcnode-id="2547" id="Prevalence"><span data-dcnode-id="2548" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="2540"><span class="mw-editsection-bracket" data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">[</span></span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D4" title="Edit section: Prevalence"><span data-dcnode-id="2544" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2537" instrument_node="">Mexico is one of the global centers of the child prostitution trade and a source and transit country for large numbers of migrants moving northward from Central America.</span><sup class="reference" data-dcnode-id="2534" id="cite_ref-dos_2-2"><a data-dcnode-id="2535" href="#cite_note-dos-2"><span data-dcnode-id="2536" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2531" id="cite_ref-:8_11-1"><a data-dcnode-id="2532" href="#cite_note-:8-11"><span data-dcnode-id="2533" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="2528" id="cite_ref-:10_12-4"><a data-dcnode-id="2529" href="#cite_note-:10-12"><span data-dcnode-id="2530" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="2525" id="cite_ref-:11_13-1"><a data-dcnode-id="2526" href="#cite_note-:11-13"><span data-dcnode-id="2527" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2524" instrument_node=""> There are an estimated 16,000 to 20,000 Mexican and Central American children who are trafficked for sex in Mexico.</span><sup class="reference" data-dcnode-id="2521" id="cite_ref-:10_12-5"><a data-dcnode-id="2522" href="#cite_note-:10-12"><span data-dcnode-id="2523" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2520" instrument_node=""> However, data on the number of victims of labor trafficking are not available.</span><sup class="reference" data-dcnode-id="2517" id="cite_ref-:0_8-4"><a data-dcnode-id="2518" href="#cite_note-:0-8"><span data-dcnode-id="2519" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2516" instrument_node=""> Additionally, the number of people trafficking into the United States from Mexico is known to vary widely, as do estimates of how many trafficking victims make such crossings.</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-:0_8-5"><a data-dcnode-id="2514" href="#cite_note-:0-8"><span data-dcnode-id="2515" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2512" instrument_node="">
</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2510" instrument_node="">The vast majority of foreign victims in forced labor and sexual servitude in Mexico are from </span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_America" title="Central America"><span data-dcnode-id="2509" instrument_node="">Central America</span></a><span data-dcnode-id="2507" instrument_node="">, particularly </span><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guatemala" title="Guatemala"><span data-dcnode-id="2506" instrument_node="">Guatemala</span></a><span data-dcnode-id="2504" instrument_node="">, </span><a data-dcnode-id="2502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honduras" title="Honduras"><span data-dcnode-id="2503" instrument_node="">Honduras</span></a><span data-dcnode-id="2501" instrument_node="">, and </span><a data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/El_Salvador" title="El Salvador"><span data-dcnode-id="2500" instrument_node="">El Salvador</span></a><span data-dcnode-id="2498" instrument_node="">; many transit Mexico en route to the United States and, to a lesser extent, Canada and </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="2497" instrument_node="">Western Europe</span></a><span data-dcnode-id="2495" instrument_node="">. However, trafficking victims from South America, the Caribbean, Eastern Europe, Asia, and Africa are also found in Mexico, and some transit the country en route to the United States. Unaccompanied Central American minors, traveling through Mexico to meet family members in the United States, fall victim to human traffickers, particularly near the Guatemalan border. Mexican men and boys from Southern Mexico are found in conditions of forced labor in </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Mexico" title="Northern Mexico"><span data-dcnode-id="2494" instrument_node="">Northern Mexico</span></a><span data-dcnode-id="2492" instrument_node="">, and Central Americans, especially Guatemalans, are subjected to forced labor in southern Mexico, particularly in agriculture. Child sex tourism continues to grow in Mexico, especially in tourist areas such as </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acapulco" title="Acapulco"><span data-dcnode-id="2491" instrument_node="">Acapulco</span></a><span data-dcnode-id="2489" instrument_node=""> and </span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canc%25C3%25BAn" title="Cancún"><span data-dcnode-id="2488" instrument_node="">Cancún</span></a><span data-dcnode-id="2486" instrument_node="">, and northern border cities like </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tijuana" title="Tijuana"><span data-dcnode-id="2485" instrument_node="">Tijuana</span></a><span data-dcnode-id="2483" instrument_node=""> and </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ciudad_Ju%25C3%25A1rez" title="Ciudad Juárez"><span data-dcnode-id="2482" instrument_node="">Ciudad Juárez</span></a><span data-dcnode-id="2480" instrument_node="">.
</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2478" instrument_node="">Between 2000 and 2002, approximately 135,000 children in Mexico were kidnapped, presumably for exploitation in prostitution, pornography, or illegal adoption trafficking.</span><sup class="reference" data-dcnode-id="2475" id="cite_ref-:5_14-0"><a data-dcnode-id="2476" href="#cite_note-:5-14"><span data-dcnode-id="2477" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2474" instrument_node=""> It is estimated that there are around 16,000 children engaged in prostitution in Mexico as of 2004.</span><sup class="reference" data-dcnode-id="2471" id="cite_ref-:5_14-1"><a data-dcnode-id="2472" href="#cite_note-:5-14"><span data-dcnode-id="2473" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2470" instrument_node="">
</span></p><span data-dcnode-id="2468" instrument_node="">
</span><h2 data-dcnode-id="2458"><span class="mw-headline" data-dcnode-id="2466" id="Structural_causes"><span data-dcnode-id="2467" instrument_node="">Structural causes</span></span><span class="mw-editsection" data-dcnode-id="2459"><span class="mw-editsection-bracket" data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">[</span></span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D5" title="Edit section: Structural causes"><span data-dcnode-id="2463" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2457" instrument_node="">
</span><h3 data-dcnode-id="2447"><span class="mw-headline" data-dcnode-id="2455" id="Poverty"><span data-dcnode-id="2456" instrument_node="">Poverty</span></span><span class="mw-editsection" data-dcnode-id="2448"><span class="mw-editsection-bracket" data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">[</span></span><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D6" title="Edit section: Poverty"><span data-dcnode-id="2452" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2446" instrument_node="">
</span><link data-dcnode-id="2445" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2441" role="note"><span data-dcnode-id="2444" instrument_node="">Main article: </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty_in_Mexico" title="Poverty in Mexico"><span data-dcnode-id="2443" instrument_node="">Poverty in Mexico</span></a></div><span data-dcnode-id="2440" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2431"><div class="thumbinner" data-dcnode-id="2432" style="width:403px;"><a class="image" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMexican_states_by_poverty_rate_2010.png"><img alt="" class="thumbimage" data-dcnode-id="2439" data-file-height="1251" data-file-width="1850" decoding="async" height="271" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mexican_states_by_poverty_rate_2010.png/401px-Mexican_states_by_poverty_rate_2010.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mexican_states_by_poverty_rate_2010.png/602px-Mexican_states_by_poverty_rate_2010.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mexican_states_by_poverty_rate_2010.png/802px-Mexican_states_by_poverty_rate_2010.png 2x" width="401"></a><span data-dcnode-id="2437" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2433"><div class="magnify" data-dcnode-id="2435"><a class="internal" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMexican_states_by_poverty_rate_2010.png" title="Enlarge"></a></div><span data-dcnode-id="2434" instrument_node="">Mexican States by Poverty Rate</span></div></div></div><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2429" instrument_node="">Mexico is characterized by persistent and extreme </span><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_inequality" title="Economic inequality"><span data-dcnode-id="2428" instrument_node="">income inequality</span></a><span data-dcnode-id="2426" instrument_node=""> and high rates of poverty.</span><sup class="reference" data-dcnode-id="2423" id="cite_ref-15"><a data-dcnode-id="2424" href="#cite_note-15"><span data-dcnode-id="2425" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2422" instrument_node=""> These inequalities, and poverty in particular, can increase trafficking in several ways. Poverty often drives families to make decisions out of desperation and lack of education.</span><sup class="reference" data-dcnode-id="2419" id="cite_ref-autogenerated22_16-0"><a data-dcnode-id="2420" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2421" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2418" instrument_node=""> For example, in the case of Mexico parents are especially likely to leave their families to go work in the United States and may become victims of traffickers.</span><sup class="reference" data-dcnode-id="2415" id="cite_ref-:5_14-2"><a data-dcnode-id="2416" href="#cite_note-:5-14"><span data-dcnode-id="2417" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="2412" id="cite_ref-17"><a data-dcnode-id="2413" href="#cite_note-17"><span data-dcnode-id="2414" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="2409" id="cite_ref-18"><a data-dcnode-id="2410" href="#cite_note-18"><span data-dcnode-id="2411" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2408" instrument_node=""> Furthermore, many victims of trafficking, especially in the case of sex trafficking, are not fluent in the language of their destination country and are limited in their ability to escape their situation.</span><sup class="reference" data-dcnode-id="2405" id="cite_ref-:7_6-1"><a data-dcnode-id="2406" href="#cite_note-:7-6"><span data-dcnode-id="2407" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2404" instrument_node=""> In addition, victims often accept their positions because they feel that this is the only way that they may send some remittances to their family and their enslaved situations may in some cases still be better than their original impoverished and desperate state.</span><sup class="reference" data-dcnode-id="2401" id="cite_ref-autogenerated22_16-1"><a data-dcnode-id="2402" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2403" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2400" instrument_node=""> In this manner, poverty can both drive trafficking and prevent its victims from escaping it once they have been trafficked.</span><sup class="reference" data-dcnode-id="2397" id="cite_ref-:7_6-2"><a data-dcnode-id="2398" href="#cite_note-:7-6"><span data-dcnode-id="2399" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="2394" id="cite_ref-autogenerated22_16-2"><a data-dcnode-id="2395" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2396" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2393" instrument_node="">
</span></p><span data-dcnode-id="2391" instrument_node="">
</span><h3 data-dcnode-id="2381"><span class="mw-headline" data-dcnode-id="2389" id="Globalization"><span data-dcnode-id="2390" instrument_node="">Globalization</span></span><span class="mw-editsection" data-dcnode-id="2382"><span class="mw-editsection-bracket" data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">[</span></span><a data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D7" title="Edit section: Globalization"><span data-dcnode-id="2386" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2380" instrument_node="">
</span><link data-dcnode-id="2379" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2375" role="note"><span data-dcnode-id="2378" instrument_node="">See also: </span><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="2377" instrument_node="">Globalization</span></a></div><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2373" instrument_node="">The rate of human trafficking has directly increased in correlation with </span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="2372" instrument_node="">globalization</span></a><span data-dcnode-id="2370" instrument_node="">.</span><sup class="reference" data-dcnode-id="2367" id="cite_ref-19"><a data-dcnode-id="2368" href="#cite_note-19"><span data-dcnode-id="2369" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="2364" id="cite_ref-20"><a data-dcnode-id="2365" href="#cite_note-20"><span data-dcnode-id="2366" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2363" instrument_node=""> Globalization has increased cross-border trade and the demand for cheap labor; however, migration policies of the U.S. and other countries have not changed with the level of demand for cheap labor, thus forcing people illegally to immigrate.</span><sup class="reference" data-dcnode-id="2360" id="cite_ref-autogenerated22_16-3"><a data-dcnode-id="2361" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2362" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2359" instrument_node=""> </span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_immigration_to_the_United_States" title="Illegal immigration to the United States"><span data-dcnode-id="2358" instrument_node="">Illegal immigration</span></a><span data-dcnode-id="2356" instrument_node=""> then creates ideal conditions for organized criminal operations to form trafficking circles.</span><sup class="reference" data-dcnode-id="2353" id="cite_ref-autogenerated22_16-4"><a data-dcnode-id="2354" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2355" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2352" instrument_node=""> With increased trade of foreign goods to rural areas, import competition in the rural markets has also forced people in poor areas to migrate to industrialized economies for better livelihoods. Their desperate positions often make them subject to exploitation and trafficking into different forms of forced labor to support that economy.</span><sup class="reference" data-dcnode-id="2349" id="cite_ref-autogenerated22_16-5"><a data-dcnode-id="2350" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2351" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2348" instrument_node=""> Lastly, the technological advances that go hand in hand with globalization have facilitated the ease with which organized crime circles may conduct trafficking operations.</span><sup class="reference" data-dcnode-id="2345" id="cite_ref-autogenerated22_16-6"><a data-dcnode-id="2346" href="#cite_note-autogenerated22-16"><span data-dcnode-id="2347" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2344" instrument_node="">
</span></p><span data-dcnode-id="2342" instrument_node="">
</span><h3 data-dcnode-id="2332"><span class="mw-headline" data-dcnode-id="2340" id="Sexual_assault"><span data-dcnode-id="2341" instrument_node="">Sexual assault</span></span><span class="mw-editsection" data-dcnode-id="2333"><span class="mw-editsection-bracket" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">[</span></span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D8" title="Edit section: Sexual assault"><span data-dcnode-id="2337" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2330" instrument_node="">During the Central American civil wars throughout the 1980s, widespread sexual assaults of indigenous women were carried out, contributing greatly to the creation of the Mexican sex trafficking industry.</span><sup class="reference" data-dcnode-id="2327" id="cite_ref-:5_14-3"><a data-dcnode-id="2328" href="#cite_note-:5-14"><span data-dcnode-id="2329" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2326" instrument_node=""> Both policy and army personnel raped and assaulted several thousand poor, generally rural women during the </span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salvadoran_Civil_War" title="Salvadoran Civil War"><span data-dcnode-id="2325" instrument_node="">El Salvadorean</span></a><span data-dcnode-id="2323" instrument_node=""> and </span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaraguan_Revolution" title="Nicaraguan Revolution"><span data-dcnode-id="2322" instrument_node="">Nicaraguan</span></a><span data-dcnode-id="2320" instrument_node=""> civil wars.</span><sup class="reference" data-dcnode-id="2317" id="cite_ref-:5_14-4"><a data-dcnode-id="2318" href="#cite_note-:5-14"><span data-dcnode-id="2319" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2316" instrument_node=""> Many of these women were shamed by their communities and families and chose to migrate to Mexico, leading to a boom in sex trafficking.</span><sup class="reference" data-dcnode-id="2313" id="cite_ref-:5_14-5"><a data-dcnode-id="2314" href="#cite_note-:5-14"><span data-dcnode-id="2315" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="2310" id="cite_ref-21"><a data-dcnode-id="2311" href="#cite_note-21"><span data-dcnode-id="2312" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2309" instrument_node=""> As of 2014, this pattern of marginalization through sexual assault was still widespread.</span><sup class="reference" data-dcnode-id="2306" id="cite_ref-22"><a data-dcnode-id="2307" href="#cite_note-22"><span data-dcnode-id="2308" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2305" instrument_node="">
</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2303" instrument_node="">The effect of conflict and ensuing assault on the development of the sex trade is domestic to Mexico as well as foreign. Internal conflict between organized crime and police forces and the military have historically lead to unusually high levels of instability in some areas of Mexico, most notably in the case of the </span><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiapas_conflict" title="Chiapas conflict"><span data-dcnode-id="2302" instrument_node="">Chiapas Conflict</span></a><span data-dcnode-id="2300" instrument_node="">.</span><sup class="reference" data-dcnode-id="2297" id="cite_ref-:15_23-0"><a data-dcnode-id="2298" href="#cite_note-:15-23"><span data-dcnode-id="2299" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2296" instrument_node=""> Similarly to the Central American civil wars, the sexual violence that accompanied this conflict drove many shunned women to turn to sex work and helped jump start the sex trade in those regions of Mexico.</span><sup class="reference" data-dcnode-id="2293" id="cite_ref-:15_23-1"><a data-dcnode-id="2294" href="#cite_note-:15-23"><span data-dcnode-id="2295" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2292" instrument_node="">
</span></p><span data-dcnode-id="2290" instrument_node="">
</span><h2 data-dcnode-id="2280"><span class="mw-headline" data-dcnode-id="2288" id="Anti-trafficking_laws_and_policies"><span data-dcnode-id="2289" instrument_node="">Anti-trafficking laws and policies</span></span><span class="mw-editsection" data-dcnode-id="2281"><span class="mw-editsection-bracket" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">[</span></span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D9" title="Edit section: Anti-trafficking laws and policies"><span data-dcnode-id="2285" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2278" instrument_node="">Mexico ratified the </span><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Convention_against_Transnational_Organized_Crime" title="United Nations Convention against Transnational Organized Crime"><span data-dcnode-id="2277" instrument_node="">United Nations Convention Against Transnational Organized Crime</span></a><span data-dcnode-id="2275" instrument_node=""> (or Palermo Convention) on April 11, 2003.</span><sup class="reference" data-dcnode-id="2272" id="cite_ref-24"><a data-dcnode-id="2273" href="#cite_note-24"><span data-dcnode-id="2274" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2271" instrument_node=""> The Convention includes a </span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_against_the_Smuggling_of_Migrants_by_Land%2C_Sea_and_Air" title="Protocol against the Smuggling of Migrants by Land, Sea and Air"><span data-dcnode-id="2270" instrument_node="">"Protocol Against the Smuggling of Migrants by Land, Sea, and Air</span></a><span data-dcnode-id="2268" instrument_node="">" and a "</span><a class="mw-redirect" data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_to_Prevent%2C_Suppress_and_Punish_Trafficking_in_Persons%2C_especially_Women_and_Children" title="Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children"><span data-dcnode-id="2267" instrument_node="">Protocol to Suppress, Prevent, and Punish Trafficking in Persons, Especially Women and Children</span></a><span data-dcnode-id="2265" instrument_node="">".</span><sup class="reference" data-dcnode-id="2262" id="cite_ref-25"><a data-dcnode-id="2263" href="#cite_note-25"><span data-dcnode-id="2264" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2261" instrument_node=""> The </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_of_the_Union" title="Congress of the Union"><span data-dcnode-id="2260" instrument_node="">Congress of Mexico</span></a><span data-dcnode-id="2258" instrument_node=""> passed a law on human trafficking in 2007 after which the Federal District and all of the states passed anti-trafficking measures themselves.</span><sup class="reference" data-dcnode-id="2255" id="cite_ref-:3_26-0"><a data-dcnode-id="2256" href="#cite_note-:3-26"><span data-dcnode-id="2257" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2254" instrument_node=""> In an attempt to harmonize the varied penal codes on the subject of human trafficking, the government passed a new anti-trafficking law in 2012 that criminalized all participants in the act of trafficking (including consumers) and unified local laws.</span><sup class="reference" data-dcnode-id="2251" id="cite_ref-:3_26-1"><a data-dcnode-id="2252" href="#cite_note-:3-26"><span data-dcnode-id="2253" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2250" instrument_node=""> The law was further reformed in 2014.</span><sup class="reference" data-dcnode-id="2247" id="cite_ref-:4_1-1"><a data-dcnode-id="2248" href="#cite_note-:4-1"><span data-dcnode-id="2249" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2246" instrument_node=""> In an effort to address the demand for forced labor, the </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretariat_of_Labor_and_Social_Welfare" title="Secretariat of Labor and Social Welfare"><span data-dcnode-id="2245" instrument_node="">Secretary of Labor and Social Welfare</span></a><span data-dcnode-id="2243" instrument_node=""> developed a series of workshops and trainings in 2010 to prevent child labor and trafficking for forced labor.</span><sup class="reference" data-dcnode-id="2240" id="cite_ref-dos_2-3"><a data-dcnode-id="2241" href="#cite_note-dos-2"><span data-dcnode-id="2242" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2239" instrument_node=""> It included media materials that explain how labor recruiting agents can deceive individuals in order to recruit them for forced labor.</span><sup class="reference" data-dcnode-id="2236" id="cite_ref-dos_2-4"><a data-dcnode-id="2237" href="#cite_note-dos-2"><span data-dcnode-id="2238" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2235" instrument_node=""> However, while Mexican officials recognize human trafficking as a serious problem, NGOs and government representatives report that some local officials tolerate and are sometimes complicit in trafficking, impeding implementation of anti-trafficking statutes.</span><sup class="reference" data-dcnode-id="2232" id="cite_ref-:4_1-2"><a data-dcnode-id="2233" href="#cite_note-:4-1"><span data-dcnode-id="2234" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="2229" id="cite_ref-dos_2-5"><a data-dcnode-id="2230" href="#cite_note-dos-2"><span data-dcnode-id="2231" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2228" instrument_node=""> Mexico has publicly endorsed the United Nations Office on Drugs and Crime’s Blue Heart Campaign against Human Trafficking, becoming the first country in Latin America to do so.</span><sup class="reference" data-dcnode-id="2225" id="cite_ref-27"><a data-dcnode-id="2226" href="#cite_note-27"><span data-dcnode-id="2227" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2224" instrument_node="">
</span></p><span data-dcnode-id="2222" instrument_node="">
</span><h2 data-dcnode-id="2212"><span class="mw-headline" data-dcnode-id="2220" id="Trafficking_across_the_border_with_the_United_States"><span data-dcnode-id="2221" instrument_node="">Trafficking across the border with the United States</span></span><span class="mw-editsection" data-dcnode-id="2213"><span class="mw-editsection-bracket" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">[</span></span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Mexico%26action%3Dedit%26section%3D10" title="Edit section: Trafficking across the border with the United States"><span data-dcnode-id="2217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2211" instrument_node="">
</span><link data-dcnode-id="2210" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2194" role="note"><span data-dcnode-id="2209" instrument_node="">See also: </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_the_United_States" title="Human trafficking in the United States"><span data-dcnode-id="2208" instrument_node="">Human trafficking in the United States</span></a><span data-dcnode-id="2206" instrument_node="">, </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_Texas" title="Human trafficking in Texas"><span data-dcnode-id="2205" instrument_node="">Human trafficking in Texas</span></a><span data-dcnode-id="2203" instrument_node="">, </span><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_California" title="Human trafficking in California"><span data-dcnode-id="2202" instrument_node="">Human trafficking in California</span></a><span data-dcnode-id="2200" instrument_node="">, </span><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_Arizona" title="Human trafficking in Arizona"><span data-dcnode-id="2199" instrument_node="">Human trafficking in Arizona</span></a><span data-dcnode-id="2197" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coyotaje" title="Coyotaje"><span data-dcnode-id="2196" instrument_node="">Coyotaje</span></a></div><span data-dcnode-id="2193" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2184"><div class="thumbinner" data-dcnode-id="2185" style="width:332px;"><a class="image" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABorder_Region.png"><img alt="" class="thumbimage" data-dcnode-id="2192" data-file-height="623" data-file-width="809" decoding="async" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Border_Region.png/330px-Border_Region.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Border_Region.png/495px-Border_Region.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Border_Region.png/660px-Border_Region.png 2x" width="330"></a><span data-dcnode-id="2190" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2186"><div class="magnify" data-dcnode-id="2188"><a class="internal" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABorder_Region.png" title="Enlarge"></a></div><span data-dcnode-id="2187" instrument_node="">The U.S.–Mexico border with the area up to 100 miles from the border demarcated.</span></div></div></div><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2182" instrument_node="">A third of the people annually trafficked into the United States are from </span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="2181" instrument_node="">Latin America</span></a><span data-dcnode-id="2179" instrument_node="">, and the vast majority of these people enter the US through the </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico%25E2%2580%2593United_States_border" title="Mexico–United States border"><span data-dcnode-id="2178" instrument_node="">Mexico–United States border</span></a><span data-dcnode-id="2176" instrument_node="">.</span><sup class="reference" data-dcnode-id="2173" id="cite_ref-:5_14-6"><a data-dcnode-id="2174" href="#cite_note-:5-14"><span data-dcnode-id="2175" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2172" instrument_node=""> This extremely porous border has historically been the site of one of the most protracted labor migrations in the world, and is North America's largest transit site for young children exploited in labor and sex trafficking as of 2011.</span><sup class="reference" data-dcnode-id="2169" id="cite_ref-:2_28-0"><a data-dcnode-id="2170" href="#cite_note-:2-28"><span data-dcnode-id="2171" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2168" instrument_node=""> Texas is a particularly important transit site for domestic trafficking; around twenty percent of domestic trafficking victims pass through the state at some point on their journeys.</span><sup class="reference" data-dcnode-id="2165" id="cite_ref-:5_14-7"><a data-dcnode-id="2166" href="#cite_note-:5-14"><span data-dcnode-id="2167" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="2162" id="cite_ref-:2_28-1"><a data-dcnode-id="2163" href="#cite_note-:2-28"><span data-dcnode-id="2164" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="2159" id="cite_ref-:1_29-0"><a data-dcnode-id="2160" href="#cite_note-:1-29"><span data-dcnode-id="2161" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2158" instrument_node="">
</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2156" instrument_node="">"</span><a class="mw-redirect" data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coyotaje" title="Coyotaje"><span data-dcnode-id="2155" instrument_node="">Coyote</span></a><span data-dcnode-id="2153" instrument_node="">" is the colloquial term used to refer to migrant smugglers along the Mexico- United States border.</span><sup class="reference" data-dcnode-id="2150" id="cite_ref-:9_30-0"><a data-dcnode-id="2151" href="#cite_note-:9-30"><span data-dcnode-id="2152" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2149" instrument_node=""> In the past, the coyote-migrant relationship ended once the smuggler delivered the migrant to the U.S.</span><sup class="reference" data-dcnode-id="2146" id="cite_ref-:0_8-6"><a data-dcnode-id="2147" href="#cite_note-:0-8"><span data-dcnode-id="2148" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2145" instrument_node=""> However, it has become increasingly commonplace for coyotes to coerce migrants into exploitative labor arrangements upon reaching their destination in the U.S (frequently a different one from that which they paid to be smuggled to).</span><sup class="reference" data-dcnode-id="2142" id="cite_ref-:0_8-7"><a data-dcnode-id="2143" href="#cite_note-:0-8"><span data-dcnode-id="2144" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2141" instrument_node=""> These labor agreements frequently involve forced agricultural labor and/or sex work, conditions that migrants would never have consented to had they been previously aware of them.</span><sup class="reference" data-dcnode-id="2138" id="cite_ref-:0_8-8"><a data-dcnode-id="2139" href="#cite_note-:0-8"><span data-dcnode-id="2140" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2137" instrument_node=""> Coyotes use unpaid debt as a threat in order to force migrants into such arrangements. The rising costs of smuggling, a result of increased border security and enforcement, has made it far more common for migrants to become heavily indebted to smugglers.</span><sup class="reference" data-dcnode-id="2134" id="cite_ref-:0_8-9"><a data-dcnode-id="2135" href="#cite_note-:0-8"><span data-dcnode-id="2136" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2133" instrument_node=""> Additionally, the expansion of the coyote's role to include transporting migrants to a final destination within the U.S., rather than simply transporting them across the border, incurs additional expenses that the migrant must pay, and so increases the likelihood of their being exploited and trafficked by the coyotes as forced laborers or sex workers.</span><sup class="reference" data-dcnode-id="2130" id="cite_ref-:0_8-10"><a data-dcnode-id="2131" href="#cite_note-:0-8"><span data-dcnode-id="2132" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2129" instrument_node="">
</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2127" instrument_node="">Smugglers sometimes pretend to offer reduced fees to women and child migrants and then sexually assault or rape them as a form of substitute "payment".</span><sup class="reference" data-dcnode-id="2124" id="cite_ref-:5_14-8"><a data-dcnode-id="2125" href="#cite_note-:5-14"><span data-dcnode-id="2126" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="2121" id="cite_ref-31"><a data-dcnode-id="2122" href="#cite_note-31"><span data-dcnode-id="2123" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2120" instrument_node=""> Human traffickers masquerading as coyotes often use false promises of guaranteed jobs to lure migrants, and will sometimes kidnap women and children along the journey, either for ransom from their families, or to be sold in the US into servitude or prostitution.</span><sup class="reference" data-dcnode-id="2117" id="cite_ref-:5_14-9"><a data-dcnode-id="2118" href="#cite_note-:5-14"><span data-dcnode-id="2119" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2116" instrument_node=""> Many unaccompanied children also make the crossing from Mexico to the U.S.</span><sup class="reference" data-dcnode-id="2113" id="cite_ref-32"><a data-dcnode-id="2114" href="#cite_note-32"><span data-dcnode-id="2115" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2112" instrument_node=""> Unaccompanied minors are sometimes sold into prostitution by the trafficker, and their families are falsely led to believe that they died during transit.</span><sup class="reference" data-dcnode-id="2109" id="cite_ref-:5_14-10"><a data-dcnode-id="2110" href="#cite_note-:5-14"><span data-dcnode-id="2111" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2108" instrument_node="">
</span></p><p data-dcnode-id="2098"><span data-dcnode-id="2106" instrument_node="">Within the United States, the </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victims_of_Trafficking_and_Violence_Protection_Act_of_2000" title="Victims of Trafficking and Violence Protection Act of 2000"><span data-dcnode-id="2105" instrument_node="">Victims of Trafficking and Violence Protection Act of 2000</span></a><span data-dcnode-id="2103" instrument_node=""> serves as legal framework within which many perpetrators of trafficking are tried, but victims of trafficking are generally punished on equal footing with perpetrators if intercepted during the process of entering the country.</span><sup class="reference" data-dcnode-id="2100" id="cite_ref-:13_5-1"><a data-dcnode-id="2101" href="#cite_note-:13-5"><span data-dcnode-id="2102" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2099" instrument_node="">
</span></p><span data-dcnode-id="2097" instrument_node="">
