</span><div class="wpbdp-field-display wpbdp-field wpbdp-field-value field-display field-value wpbdp-field-organization_name wpbdp-field-title wpbdp-field-type-textfield wpbdp-field-association-title" data-dcnode-id="7288"><span class="field-label" data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">Organization Name</span></span><span data-dcnode-id="7292" instrument_node=""> </span><div class="value" data-dcnode-id="7289"><a data-dcnode-id="7290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iowanaht.org/resources/iowa-network-against-human-trafficking/" rel="noopener" target="_blank"><span data-dcnode-id="7291" instrument_node="">Iowa Network Against Human Trafficking</span></a></div></div><span data-dcnode-id="7287" instrument_node=""> </span><div class="wpbdp-field-display wpbdp-field wpbdp-field-value field-display field-value wpbdp-field-organization_description wpbdp-field-content wpbdp-field-type-textarea wpbdp-field-association-content" data-dcnode-id="7254"><div class="value" data-dcnode-id="7255"><p data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">Headquartered in Ames, Iowa: The Iowa Network Against Human Trafficking &amp; Slavery (NAHT) is Iowa’s first and only statewide volunteer organization devoted exclusively to ending trafficking in all its forms. The Iowa NAHT is a non-profit 501(c)(3) organization that is overseen by a board of Directors (20 members) from across Iowa. There are no employees and the Iowa NAHT does not provide direct services to victims or survivors. The NAHT does not receive state funding and operates on private donations. The network’s website is the go-to place for Iowa human trafficking information, training, and volunteer opportunities. You can subscribe to receive a twice-monthly email blog post by going to the contact tab on the website.</span></p><span data-dcnode-id="7284" instrument_node="">
</span><p data-dcnode-id="7282"><span data-dcnode-id="7283" instrument_node="">Four statewide projects:</span></p><span data-dcnode-id="7281" instrument_node="">
</span><p data-dcnode-id="7273"><span data-dcnode-id="7280" instrument_node="">- Hotel/Motel Employee Training &amp; Awareness</span><br data-dcnode-id="7279"><span data-dcnode-id="7278" instrument_node="">
- Rescue Sticker Distribution and Awareness Project</span><br data-dcnode-id="7277"><span data-dcnode-id="7276" instrument_node="">
- Anti-Trafficking Massage Business Project</span><br data-dcnode-id="7275"><span data-dcnode-id="7274" instrument_node="">
- Demand An End Project</span></p><span data-dcnode-id="7272" instrument_node="">
</span><p data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">Network’s Mission: To coordinate Iowa’s solution to end human trafficking and slavery through coalition building, raising awareness, and promoting education and advocacy. To end human trafficking in all its forms through:</span></p><span data-dcnode-id="7269" instrument_node="">
</span><p data-dcnode-id="7257"><span data-dcnode-id="7268" instrument_node="">- Providing a platform for collaboration between state and local agencies</span><br data-dcnode-id="7267"><span data-dcnode-id="7266" instrument_node="">
- Advocating for effective investigation, rescue, and prosecution</span><br data-dcnode-id="7265"><span data-dcnode-id="7264" instrument_node="">
- Leading and coordinating public policy and legislative efforts</span><br data-dcnode-id="7263"><span data-dcnode-id="7262" instrument_node="">
- Strengthening collaboration between regional groups, nonprofits, law enforcement, faith communities, and community service providers</span><br data-dcnode-id="7261"><span data-dcnode-id="7260" instrument_node="">
- Raising awareness and promoting education and training</span><br data-dcnode-id="7259"><span data-dcnode-id="7258" instrument_node="">
- Advocating for expansion of survivor services and best practice</span></p><span data-dcnode-id="7256" instrument_node="">

</span><p data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">Survivor Advocacy: The organization offers a variety of support services, including short-term physical needs (housing, transportation, referrals, etc.), as well as a non-residential Restoration Program. The “Harbor House” is a “low supervision” Restoration Program for adult women. Please call our intake line for information on, or referral to our Restoration Program or Harbor House (319) 206-4417</span></p><span data-dcnode-id="6875" instrument_node="">
</span><p data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">Speaker’s Bureau: The organization provides trained speakers to present on various topics of human trafficking for your organization, business, church, group, school or private gathering. Specific projects include education for Schools, Hotels and Motels, Financial Institutions and Medical Personnel. Please see the “Request a Speaker” form on their website.</span></p><span data-dcnode-id="6872" instrument_node="">
</span><p data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">“UnChained Coalition:” A coalition that works to identify and address the gaps that exist in community services to people victimized by human trafficking.</span></p><span data-dcnode-id="6869" instrument_node="">
</span><p data-dcnode-id="6865"><span data-dcnode-id="6868" instrument_node="">“Stop the Demand Project”: Stopping the demand for trafficked persons is likely the most important way to stop Human Trafficking. Chains Interrupted partners with an organization that seeks to educate the public on the direct link between pornography and human trafficking, as well as provides services and support for those addicted.</span><br data-dcnode-id="6867"><span data-dcnode-id="6866" instrument_node="">
Missions: Chains Interrupted has local, national and international mission projects. Partnering with the IMPACTO Ministries and the Protect Me Project, the organization works in Guatemala in 1) Prevention education, 2) Restoration work, and 3) Providing respectable jobs for women.</span></p><span data-dcnode-id="6864" instrument_node="">
</span><p data-dcnode-id="6860"><span data-dcnode-id="6863" instrument_node="">Description of Grant Funded Services:</span><br data-dcnode-id="6862"><span data-dcnode-id="6861" instrument_node="">
Located in Cedar Rapids. Provides transitional housing for survivors of sex trafficking. Services for participants in the housing program include sliding scale rent; assistance with daily living expenses; and survivor advocacy, including referrals, assistance obtaining further education and employment, medical care, childcare, and legal services. Also provides survivor-led support group to survivors of sex or labor trafficking.</span></p><span data-dcnode-id="6859" instrument_node="">
</span><p data-dcnode-id="6855"><span data-dcnode-id="6858" instrument_node="">Service Area:</span><br data-dcnode-id="6857"><span data-dcnode-id="6856" instrument_node="">
Benton, Black Hawk, Buchanan, Cedar, Iowa, Johnson, Jones, Linn, and Washington Counties</span></p><span data-dcnode-id="6854" instrument_node="">

</span><p data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">DH Restoration – Long term residential housing for women (18+) who are willing to commit to sobriety and participate in the work toward healing. The residential program is designed to teach new ways of thinking and believing about life and the world around them to create better outcomes in the future.</span></p><span data-dcnode-id="6750" instrument_node="">
</span><p data-dcnode-id="6748"><span data-dcnode-id="6749" instrument_node="">DH Transitions – This program is designed for participants who have completed the residential program to gradually take on more personal responsibility as they continue to gain confidence and achieve goals. Each transition subsidy is geared to the specific needs of the participant and is designed to help them reach successful independence.</span></p><span data-dcnode-id="6747" instrument_node="">
</span><p data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">DH Front Porch – Designed to provide immediate safety and long-term housing solutions to all survivor profiles (boys/men 18+, gender non-binary, adults with custody of their minor children).</span></p><span data-dcnode-id="6744" instrument_node="">

</span><p data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">The agency also provides mobile advocacy and goes to where the victims are located – primarily serving victims in the following counties: Allamakee, Benton, Black Hawk, Bremer, Buchanan, Chickasaw, Clayton, Delaware, Dubuque, Fayette, Howard, Jones, Linn, and Winneshiek.</span></p><span data-dcnode-id="6613" instrument_node="">

</span><p data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">Survivor Advocacy: The organization offers a variety of support services, including short-term physical needs (housing, transportation, referrals, etc.), as well as a non-residential Restoration Program. The “Harbor House” is a “low supervision” Restoration Program for adult women. Please call our intake line for information on, or referral to our Restoration Program or Harbor House (319) 206-4417</span></p><span data-dcnode-id="5849" instrument_node="">
</span><p data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">Speaker’s Bureau: The organization provides trained speakers to present on various topics of human trafficking for your organization, business, church, group, school or private gathering. Specific projects include education for Schools, Hotels and Motels, Financial Institutions and Medical Personnel. Please see the “Request a Speaker” form on their website.</span></p><span data-dcnode-id="5846" instrument_node="">
</span><p data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">“UnChained Coalition:” A coalition that works to identify and address the gaps that exist in community services to people victimized by human trafficking.</span></p><span data-dcnode-id="5843" instrument_node="">
</span><p data-dcnode-id="5839"><span data-dcnode-id="5842" instrument_node="">“Stop the Demand Project”: Stopping the demand for trafficked persons is likely the most important way to stop Human Trafficking. Chains Interrupted partners with an organization that seeks to educate the public on the direct link between pornography and human trafficking, as well as provides services and support for those addicted.</span><br data-dcnode-id="5841"><span data-dcnode-id="5840" instrument_node="">
Missions: Chains Interrupted has local, national and international mission projects. Partnering with the IMPACTO Ministries and the Protect Me Project, the organization works in Guatemala in 1) Prevention education, 2) Restoration work, and 3) Providing respectable jobs for women.</span></p><span data-dcnode-id="5838" instrument_node="">
</span><p data-dcnode-id="5834"><span data-dcnode-id="5837" instrument_node="">Description of Grant Funded Services:</span><br data-dcnode-id="5836"><span data-dcnode-id="5835" instrument_node="">
Located in Cedar Rapids. Provides transitional housing for survivors of sex trafficking. Services for participants in the housing program include sliding scale rent; assistance with daily living expenses; and survivor advocacy, including referrals, assistance obtaining further education and employment, medical care, childcare, and legal services. Also provides survivor-led support group to survivors of sex or labor trafficking.</span></p><span data-dcnode-id="5833" instrument_node="">

</span><h3 data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node="">VII. Iowa Prevention and Education Human Trafficking Projects</span></h3><span data-dcnode-id="5034" instrument_node="">
</span><p data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">One of the best defenses against human trafficking and slavery is education. Many people who are enslaved are tricked into it. Violence comes only after trickery has given the traffickers or slaveholder control. This is an ancient method for enslaving people. Four hundred years ago, slavers on the West African coast offered free food and a free trip to a fabulous paradise to the local people. The reality, once on board the slave ship, was brutality and enslavement. Around the world today, “recruiters” hold out the chance of a good job to the economically desperate or designer clothes or commodities to impressionable youngsters – the hoax revealed once they have taken control of people’s lives. The con men of trafficking and slavery know exactly how to lure the vulnerable into slavery. But against this deception a little education goes a long way</span></p><span data-dcnode-id="5031" instrument_node="">
</span><p data-dcnode-id="5026"><em data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">All the direct service providers listed under Section III Iowa Survivor Restoration Services also provide education and awareness services. Contact the program closest to your community for speakers.</span></em><br data-dcnode-id="5028"><span data-dcnode-id="5027" instrument_node="">
</span></p><div class="listings wpbdp-listings-list list wpbdp-grid" data-dcnode-id="4453" id="wpbdp-listings-list"><span data-dcnode-id="5025" instrument_node="">
</span><div class="wpbdp-listing-4922 wpbdp-listing excerpt wpbdp-excerpt wpbdp-listing-excerpt wpbdp-listing-plan-id-3 wpbdp-listing-plan-show_first sticky wpbdp-listing-is-sticky wpbdp-has-ribbon wpbdp-listing-category-id-35 wpbdp-listing-category-id-44 odd wpbdp-listing-excerpt-large" data-breakpoints="{&quot;medium&quot;: [560,780], &quot;large&quot;: [780,999999]}" data-breakpoints-class-prefix="wpbdp-listing-excerpt" data-dcnode-id="4931" id="wpbdp-listing-4922"><span data-dcnode-id="5024" instrument_node="">
</span><div class="listing-title" data-dcnode-id="5020"><span data-dcnode-id="5023" instrument_node="">
</span><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iowanaht.org/resources/iowa-network-against-human-trafficking/" rel="noopener" target="_blank"><span data-dcnode-id="5022" instrument_node="">Iowa Network Against Human Trafficking</span></a></div><span data-dcnode-id="5019" instrument_node="">
</span><div class="excerpt-content wpbdp-hide-title" data-dcnode-id="4933"><span data-dcnode-id="5018" instrument_node="">

</span><div class="wpbdp-field-display wpbdp-field wpbdp-field-value field-display field-value wpbdp-field-organization_name wpbdp-field-title wpbdp-field-type-textfield wpbdp-field-association-title" data-dcnode-id="5010"><span class="field-label" data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Organization Name</span></span><span data-dcnode-id="5014" instrument_node=""> </span><div class="value" data-dcnode-id="5011"><a data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iowanaht.org/resources/iowa-network-against-human-trafficking/" rel="noopener" target="_blank"><span data-dcnode-id="5013" instrument_node="">Iowa Network Against Human Trafficking</span></a></div></div><span data-dcnode-id="5009" instrument_node=""> </span><div class="wpbdp-field-display wpbdp-field wpbdp-field-value field-display field-value wpbdp-field-organization_description wpbdp-field-content wpbdp-field-type-textarea wpbdp-field-association-content" data-dcnode-id="4976"><div class="value" data-dcnode-id="4977"><p data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">Headquartered in Ames, Iowa: The Iowa Network Against Human Trafficking &amp; Slavery (NAHT) is Iowa’s first and only statewide volunteer organization devoted exclusively to ending trafficking in all its forms. The Iowa NAHT is a non-profit 501(c)(3) organization that is overseen by a board of Directors (20 members) from across Iowa. There are no employees and the Iowa NAHT does not provide direct services to victims or survivors. The NAHT does not receive state funding and operates on private donations. The network’s website is the go-to place for Iowa human trafficking information, training, and volunteer opportunities. You can subscribe to receive a twice-monthly email blog post by going to the contact tab on the website.</span></p><span data-dcnode-id="5006" instrument_node="">
</span><p data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">Four statewide projects:</span></p><span data-dcnode-id="5003" instrument_node="">
</span><p data-dcnode-id="4995"><span data-dcnode-id="5002" instrument_node="">- Hotel/Motel Employee Training &amp; Awareness</span><br data-dcnode-id="5001"><span data-dcnode-id="5000" instrument_node="">
- Rescue Sticker Distribution and Awareness Project</span><br data-dcnode-id="4999"><span data-dcnode-id="4998" instrument_node="">
- Anti-Trafficking Massage Business Project</span><br data-dcnode-id="4997"><span data-dcnode-id="4996" instrument_node="">
- Demand An End Project</span></p><span data-dcnode-id="4994" instrument_node="">
</span><p data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">Network’s Mission: To coordinate Iowa’s solution to end human trafficking and slavery through coalition building, raising awareness, and promoting education and advocacy. To end human trafficking in all its forms through:</span></p><span data-dcnode-id="4991" instrument_node="">
</span><p data-dcnode-id="4979"><span data-dcnode-id="4990" instrument_node="">- Providing a platform for collaboration between state and local agencies</span><br data-dcnode-id="4989"><span data-dcnode-id="4988" instrument_node="">
- Advocating for effective investigation, rescue, and prosecution</span><br data-dcnode-id="4987"><span data-dcnode-id="4986" instrument_node="">
- Leading and coordinating public policy and legislative efforts</span><br data-dcnode-id="4985"><span data-dcnode-id="4984" instrument_node="">
- Strengthening collaboration between regional groups, nonprofits, law enforcement, faith communities, and community service providers</span><br data-dcnode-id="4983"><span data-dcnode-id="4982" instrument_node="">
- Raising awareness and promoting education and training</span><br data-dcnode-id="4981"><span data-dcnode-id="4980" instrument_node="">
- Advocating for expansion of survivor services and best practice</span></p><span data-dcnode-id="4978" instrument_node="">

</span><h3 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">XVI. School Curricula</span></h3><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="921" instrument_node="">Educators often have very specific expectations for their curriculum development, and it varies according to the age of the students and the type of educational institution involved. The curriculum goals may be focused on prevention, identification, intervention, or treatment. Generally, schools will want to be able to identify the reasons for the training, and then identify the curriculum goals and the content of the teaching. Several other states have developed robust curricula, either independently focused on schools or jointly developed with other organizations. If the teachers in Iowa don’t want to reinvent the wheel in developing their own curricula, here are some suggestions from other states.</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
