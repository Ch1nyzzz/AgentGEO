</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="458" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="467"><p data-dcnode-id="3090"><b data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Human trafficking in Europe</span></b><span data-dcnode-id="3107" instrument_node=""> is a regional phenomenon of the wider practice of trade in humans for the purposes of various forms of coercive exploitation. </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="3106" instrument_node="">Human trafficking</span></a><span data-dcnode-id="3104" instrument_node=""> has existed for centuries all over the world, and follows from the earlier practice of </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="3103" instrument_node="">slavery</span></a><span data-dcnode-id="3101" instrument_node="">,</span><sup class="reference" data-dcnode-id="3098" id="cite_ref-1"><a data-dcnode-id="3099" href="#cite_note-1"><span data-dcnode-id="3100" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3097" instrument_node=""> which differed from human trafficking in that it was legally recognized and accepted. It has become an increasing concern for countries in Europe since the </span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="3096" instrument_node="">Revolutions of 1989</span></a><span data-dcnode-id="3094" instrument_node="">. The transition to a market economy in some countries has led to both opportunity and a loss of security for citizens of these countries. Economic hardship and promises of prosperity have left many people vulnerable to trafficking within their countries and to destinations in other parts of Europe and the world. Unique to the </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balkans" title="Balkans"><span data-dcnode-id="3093" instrument_node="">Balkans</span></a><span data-dcnode-id="3091" instrument_node=""> are some of the situations that support trafficking, such as organized crime, and the recruitment strategies that perpetuate it. While some generalizations can be made, the countries within this region face different challenges and are at varying stages of compliance with the rules that govern trafficking in persons.
</span></p><span data-dcnode-id="3089" instrument_node="">

</span><p data-dcnode-id="1862"><span data-dcnode-id="1878" instrument_node="">The </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="1877" instrument_node="">Dissolution of the Soviet Union</span></a><span data-dcnode-id="1875" instrument_node=""> has been identified as one of the main contributing factors in explaining the recent increase in human trafficking in Europe. It provided both human capital and new regional opportunities to fuel the expansion.</span><sup class="reference" data-dcnode-id="1872" id="cite_ref-Klingman_2-0"><a data-dcnode-id="1873" href="#cite_note-Klingman-2"><span data-dcnode-id="1874" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1871" instrument_node="">  After this period, trafficking victims, primarily women, expanded to include more diverse forms, aided by the rise of organized crime, corruption, and the decline of borders.</span><sup class="reference" data-dcnode-id="1868" id="cite_ref-Shelly_3-0"><a data-dcnode-id="1869" href="#cite_note-Shelly-3"><span data-dcnode-id="1870" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1867" instrument_node=""> Porous borders and close proximity of wealthy countries have made it easier and cheaper to transport victims within the region and abroad.</span><sup class="reference" data-dcnode-id="1864" id="cite_ref-Klingman_2-1"><a data-dcnode-id="1865" href="#cite_note-Klingman-2"><span data-dcnode-id="1866" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1863" instrument_node="">
</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1861" instrument_node="">Another factor contributing to the rise in trafficking has been militarization and war in the </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balkans" title="Balkans"><span data-dcnode-id="1860" instrument_node="">Balkans</span></a><span data-dcnode-id="1858" instrument_node="">. The presence of a large number of foreign men in the Balkans after the war in Yugoslavia led to the trafficking of thousands of women for commercial sex exploitation.</span><sup class="reference" data-dcnode-id="1855" id="cite_ref-UNICEF_4-0"><a data-dcnode-id="1856" href="#cite_note-UNICEF-4"><span data-dcnode-id="1857" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1854" instrument_node="">  The connection between military bases and sex work is a well-known phenomenon and soldiers have helped drive the demand for brothels in this region.</span><sup class="reference" data-dcnode-id="1851" id="cite_ref-Klingman_2-2"><a data-dcnode-id="1852" href="#cite_note-Klingman-2"><span data-dcnode-id="1853" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1850" instrument_node="">
</span></p><p data-dcnode-id="1839"><span data-dcnode-id="1848" instrument_node="">Outside Balkan nations, the legalization of soliciting prostitution has also been linked</span><sup class="reference" data-dcnode-id="1845" id="cite_ref-5"><a data-dcnode-id="1846" href="#cite_note-5"><span data-dcnode-id="1847" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1844" instrument_node=""> to increased trafficking, with the Netherlands being identified as having a large percentage of trafficking victims transported there.</span><sup class="reference" data-dcnode-id="1841" id="cite_ref-EU_Statistics_6-0"><a data-dcnode-id="1842" href="#cite_note-EU_Statistics-6"><span data-dcnode-id="1843" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1840" instrument_node="">
</span></p><span data-dcnode-id="1838" instrument_node="">
</span><h2 data-dcnode-id="1828"><span class="mw-headline" data-dcnode-id="1836" id="Prevalence"><span data-dcnode-id="1837" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="1829"><span class="mw-editsection-bracket" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">[</span></span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D2" title="Edit section: Prevalence"><span data-dcnode-id="1833" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1826" instrument_node="">Although all forms of trafficking exist in Europe, </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking" title="Sex trafficking"><span data-dcnode-id="1825" instrument_node="">sex trafficking</span></a><span data-dcnode-id="1823" instrument_node=""> has received the most attention and exploitation of girls and women in this area has been widely publicized in the media.</span><sup class="reference" data-dcnode-id="1820" id="cite_ref-Shelly_3-1"><a data-dcnode-id="1821" href="#cite_note-Shelly-3"><span data-dcnode-id="1822" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1819" instrument_node=""> Between 2003-2004, 85% of the victims that were assisted were victims of sexual exploitation.</span><sup class="reference" data-dcnode-id="1816" id="cite_ref-7"><a data-dcnode-id="1817" href="#cite_note-7"><span data-dcnode-id="1818" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1815" instrument_node="">   "The distinctiveness of post-Soviet and Eastern European trafficking is the speed with which it grew and globalized. There was no long-existing trade in human beings or established networks to facilitate this business. Instead, the conditions of the transitional societies created the ideal conditions conducive to trade in human beings. Now, years after initial transition, all forms of human trafficking are endemic in the region, a result of poverty, ineffective counter-measures, the frequent collusion of government officials in this trade, and the rise of criminal entrepreneurship."</span><sup class="reference" data-dcnode-id="1812" id="cite_ref-Shelly_3-2"><a data-dcnode-id="1813" href="#cite_note-Shelly-3"><span data-dcnode-id="1814" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1811" instrument_node="">
</span></p><span data-dcnode-id="1809" instrument_node="">
</span><h3 data-dcnode-id="1799"><span class="mw-headline" data-dcnode-id="1807" id="Trafficking_typologies"><span data-dcnode-id="1808" instrument_node="">Trafficking typologies</span></span><span class="mw-editsection" data-dcnode-id="1800"><span class="mw-editsection-bracket" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">[</span></span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D3" title="Edit section: Trafficking typologies"><span data-dcnode-id="1804" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1797" instrument_node="">The following table details trafficking typologies unique to certain places in Europe.</span><sup class="reference" data-dcnode-id="1794" id="cite_ref-IOM_8-0"><a data-dcnode-id="1795" href="#cite_note-IOM-8"><span data-dcnode-id="1796" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1793" instrument_node=""> These three typologies, developed by the </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Office_on_Drugs_and_Crime" title="United Nations Office on Drugs and Crime"><span data-dcnode-id="1792" instrument_node="">United Nations Office on Drugs and Crime</span></a><span data-dcnode-id="1790" instrument_node=""> and Professor </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louise_Shelley" title="Louise Shelley"><span data-dcnode-id="1789" instrument_node="">Louise Shelley</span></a><span data-dcnode-id="1787" instrument_node=""> are useful in developing law enforcement strategies to combat trafficking. Since Europe encompasses many countries with diverse political histories, three typologies apply to this region. Similarities exist between these three categories and when compared with typologies of other regions and countries, it is evident that trafficking is more likely to involve women, violence, and be connected with other forms of organized crime.

</span><h2 data-dcnode-id="1693"><span class="mw-headline" data-dcnode-id="1701" id="Recruitment"><span data-dcnode-id="1702" instrument_node="">Recruitment</span></span><span class="mw-editsection" data-dcnode-id="1694"><span class="mw-editsection-bracket" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">[</span></span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D4" title="Edit section: Recruitment"><span data-dcnode-id="1698" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1691" instrument_node="">Crime groups in the Balkans and the former Soviet Union have achieved success by being flexible and altering their routes and methods to suit the rapidly changing global market.</span><sup class="reference" data-dcnode-id="1688" id="cite_ref-Shelly_3-3"><a data-dcnode-id="1689" href="#cite_note-Shelly-3"><span data-dcnode-id="1690" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1687" instrument_node="">  Previous work experience and high education levels have enabled traffickers to "produce fraudulent documents, utilize advanced communications technology, and operate successfully across borders."</span><sup class="reference" data-dcnode-id="1684" id="cite_ref-Shelly_3-4"><a data-dcnode-id="1685" href="#cite_note-Shelly-3"><span data-dcnode-id="1686" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1683" instrument_node=""> Their personal connections and ability to utilize advanced technology has posed a challenge for many governments and law enforcement agencies seeking to investigate and prosecute traffickers. Another unique trait is advanced education of many of the trafficked victims. Although well qualified for employment in their home countries, victims often seek better opportunities or pay abroad. Many ploys have been used to recruit more educated victims including marriage and employment agencies, fake modeling agencies, film production studios, and work and study abroad opportunities.</span><sup class="reference" data-dcnode-id="1680" id="cite_ref-Shelly_3-5"><a data-dcnode-id="1681" href="#cite_note-Shelly-3"><span data-dcnode-id="1682" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1679" instrument_node=""> Because legitimate opportunities exist in these areas, it is often difficult to separate the fraudulent advertisements from the credible opportunities. These printed advertisements are rarely vetted.
</span></p><span data-dcnode-id="1677" instrument_node="">
</span><h3 data-dcnode-id="1667"><span class="mw-headline" data-dcnode-id="1675" id="Child_trafficking"><span data-dcnode-id="1676" instrument_node="">Child trafficking</span></span><span class="mw-editsection" data-dcnode-id="1668"><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">[</span></span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D5" title="Edit section: Child trafficking"><span data-dcnode-id="1672" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1665" instrument_node="">Child trafficking in the Balkans is most likely to occur in children younger than twelve (for begging, theft, and other street crimes) and older than 15 (for commercial sexual exploitation).</span><sup class="reference" data-dcnode-id="1662" id="cite_ref-UNICEF_4-1"><a data-dcnode-id="1663" href="#cite_note-UNICEF-4"><span data-dcnode-id="1664" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1661" instrument_node="">  Cultural taboos generally prevent the trafficking of young boys for sexual exploitation, however, some cases have been noted among Romanian children trafficked abroad. Susceptible to trafficking are children with disabilities and children belonging to specific ethnic minorities, such as the Jevgjit in Albania and the </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romani_people" title="Romani people"><span data-dcnode-id="1660" instrument_node="">Romani people</span></a><span data-dcnode-id="1658" instrument_node=""> in other parts of the region. A UNICEF report conducted in 2006, noted that children meeting these criteria were not generally the victims of outside traffickers, but members of their own community, who sought to generate an income from their sale abroad.</span><sup class="reference" data-dcnode-id="1655" id="cite_ref-UNICEF_4-2"><a data-dcnode-id="1656" href="#cite_note-UNICEF-4"><span data-dcnode-id="1657" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1654" instrument_node="">  This report also highlighted five common characteristics of children at risk for trafficking in the Balkans. These included:</span><sup class="reference" data-dcnode-id="1651" id="cite_ref-UNICEF_4-3"><a data-dcnode-id="1652" href="#cite_note-UNICEF-4"><span data-dcnode-id="1653" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1650" instrument_node="">
</span></p><span data-dcnode-id="1648" instrument_node="">
</span><ul data-dcnode-id="1633"><li data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">children who suffer domestic violence</span></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">children who lack family support and protection (ex. children living in institutions)</span></li><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">children who have dropped out of school</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">children belonging to ethnic minorities (ex. Roma)</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">children who have been previously trafficked</span></li></ul><span data-dcnode-id="1632" instrument_node="">
</span><h2 data-dcnode-id="1622"><span class="mw-headline" data-dcnode-id="1630" id="Challenges"><span data-dcnode-id="1631" instrument_node="">Challenges</span></span><span class="mw-editsection" data-dcnode-id="1623"><span class="mw-editsection-bracket" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">[</span></span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D6" title="Edit section: Challenges"><span data-dcnode-id="1627" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1620" instrument_node="">Although anti-trafficking campaigns over the past few years have become more effective in countering some forms of trafficking, data collection and management has continued to be a problem for countries in the Balkans (southeastern Europe).</span><sup class="reference" data-dcnode-id="1617" id="cite_ref-ICMPD_9-0"><a data-dcnode-id="1618" href="#cite_note-ICMPD-9"><span data-dcnode-id="1619" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1616" instrument_node="">  Data collection is an important tool for monitoring country and regional trends and its analysis is often used to shape anti-trafficking policies.  It is important to collect data on both the victims and their traffickers and information on investigation and prosecution rates are often utilized when assessing a country's performance.
</span></p><p data-dcnode-id="1609"><span data-dcnode-id="1614" instrument_node="">Some of the data collection problems identified in this region are:</span><sup class="reference" data-dcnode-id="1611" id="cite_ref-ICMPD_9-1"><a data-dcnode-id="1612" href="#cite_note-ICMPD-9"><span data-dcnode-id="1613" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1610" instrument_node="">
</span></p><span data-dcnode-id="1608" instrument_node="">
</span><ul data-dcnode-id="1590"><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">the percentage of crimes committed versus those identified, investigated, and prosecuted is not well understood</span></li><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">cooperation is needed by a wide variety of actors and reported statistics need to be standardized across organizations and agencies</span></li><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">a lack of trust between NGOs and the government may prohibit the open sharing of information, especially if NGOs feel that sharing information about their clients will put either the victim or the organization at risk</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">there may be linguistic, cultural, and inter-personal barriers that lead victims to underreport occurrences</span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">some incidences of trafficking are investigated as smuggling, prostitution, etc., which keeps them from being captured in databases</span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">incidents investigated as trafficking may continue to remain classified as such, even if they are reclassified as a lesser charge</span></li></ul><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">To address these issues, the International Centre for Migration Policy Development, in cooperation with national governments and NGOs, has begun the process of forming a standardized approach to data collection and reporting all over Europe.
</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1576"><span class="mw-headline" data-dcnode-id="1584" id="The_Role_of_NGOs"><span data-dcnode-id="1585" instrument_node="">The Role of NGOs</span></span><span class="mw-editsection" data-dcnode-id="1577"><span class="mw-editsection-bracket" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">[</span></span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Europe%26action%3Dedit%26section%3D7" title="Edit section: The Role of NGOs"><span data-dcnode-id="1581" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1571"><i data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">See Further Reading: 'Second Annual Report on Victims of Trafficking in South-Eastern Europe' for a list of NGOs working to combat human trafficking</span></i><span data-dcnode-id="1572" instrument_node="">
</span></p><p data-dcnode-id="1553"><span data-dcnode-id="1570" instrument_node="">While there are a multitude of factors that limit the ability of NGOs to respond to trafficking, such as lack of funding, extensive mandates, and lack of government support, NGOs play a critical supporting role for victims.</span><sup class="reference" data-dcnode-id="1567" id="cite_ref-La_Strada_10-0"><a data-dcnode-id="1568" href="#cite_note-La_Strada-10"><span data-dcnode-id="1569" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1566" instrument_node="">  Most NGOs, which emerged during the 1990s, initially struggled to hold their ground against increasingly predatory traffickers.</span><sup class="reference" data-dcnode-id="1563" id="cite_ref-Tzvetkova_11-0"><a data-dcnode-id="1564" href="#cite_note-Tzvetkova-11"><span data-dcnode-id="1565" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1562" instrument_node="">   While their success varies from country to country, NGOs are often credited with stepping in and taking initiative where governments have failed. Victims are often more likely to trust NGOs because "many trafficked persons fear and distrust state-based organizations as they frequently enter destination countries illegally, or have had their documentation removed on arrival."</span><sup class="reference" data-dcnode-id="1559" id="cite_ref-Tzvetkova_11-1"><a data-dcnode-id="1560" href="#cite_note-Tzvetkova-11"><span data-dcnode-id="1561" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1558" instrument_node=""> Fear of deportation, being forced to testify, or retaliation by their traffickers also contribute to their reluctance to approach statutory agencies for support. NGOs have risen to fill this gap and provide services to victims. Services they offer include:</span><sup class="reference" data-dcnode-id="1555" id="cite_ref-La_Strada_10-1"><a data-dcnode-id="1556" href="#cite_note-La_Strada-10"><span data-dcnode-id="1557" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1554" instrument_node="">
</span></p><span data-dcnode-id="1552" instrument_node="">
</span><ul data-dcnode-id="1537"><li data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">legal, social, and psychological counseling and reintegration support</span></li><span data-dcnode-id="1549" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">education and awareness about the risks of trafficking</span></li><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">informational and statistical support and research</span></li><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node="">lobbying for victims rights</span><sup class="reference" data-dcnode-id="1539" id="cite_ref-Tzvetkova_11-2"><a data-dcnode-id="1540" href="#cite_note-Tzvetkova-11"><span data-dcnode-id="1541" instrument_node="">[11]</span></a></sup></li></ul><span data-dcnode-id="1536" instrument_node="">
