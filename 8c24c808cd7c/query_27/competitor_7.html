</span><p data-dcnode-id="339"><a data-dcnode-id="341" href="#_ftnref65" id="_ftn65" name="_ftn65" title=""><span data-dcnode-id="342" instrument_node="">65</span></a><span data-dcnode-id="340" instrument_node=""> See sec. 3.2.1, supra</span></p><span data-dcnode-id="338" instrument_node="">
</span></div><span data-dcnode-id="336" instrument_node="">
</span><div data-dcnode-id="329" id="ftn67"><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="331"><a data-dcnode-id="333" href="#_ftnref66" id="_ftn66" name="_ftn66" title=""><span data-dcnode-id="334" instrument_node="">66</span></a><span data-dcnode-id="332" instrument_node=""> This study is made possible by the generous support of the American people through the United States Agency for International Development (USAID). The contents are the responsibility of the author and do not necessarily reflect the views of USAID or the United States Government.</span></p><span data-dcnode-id="330" instrument_node="">
</span></div><span data-dcnode-id="328" instrument_node="">
</span><div data-dcnode-id="321" id="ftn68"><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="323"><a data-dcnode-id="325" href="#_ftnref67" id="_ftn67" name="_ftn67" title=""><span data-dcnode-id="326" instrument_node="">67</span></a><span data-dcnode-id="324" instrument_node=""> This article contains the National Policy for NGOs in Kenya.</span></p><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><div data-dcnode-id="313" id="ftn69"><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><a data-dcnode-id="317" href="#_ftnref68" id="_ftn68" name="_ftn68" title=""><span data-dcnode-id="318" instrument_node="">68</span></a><span data-dcnode-id="316" instrument_node=""> NGOs grew by over 400 percent in the period between 1997 and 2006 – from 836 entities in 1997 to a significant 1,234 organizations in 1999 and to about 4,500 in 2006. Today, there are more than 6,000 registered NGOs in Kenya.</span></p><span data-dcnode-id="314" instrument_node="">
</span></div><span data-dcnode-id="312" instrument_node="">
</span><div data-dcnode-id="305" id="ftn70"><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="307"><a data-dcnode-id="309" href="#_ftnref69" id="_ftn69" name="_ftn69" title=""><span data-dcnode-id="310" instrument_node="">69</span></a><span data-dcnode-id="308" instrument_node=""> The NGO Coordination Board is a Government Agency which exists to register, coordinate and facilitate the work of all national and international NGOs operating in Kenya.</span></p><span data-dcnode-id="306" instrument_node="">
</span></div><span data-dcnode-id="304" instrument_node="">
</span><div data-dcnode-id="297" id="ftn71"><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="299"><a data-dcnode-id="301" href="#_ftnref70" id="_ftn70" name="_ftn70" title=""><span data-dcnode-id="302" instrument_node="">70</span></a><span data-dcnode-id="300" instrument_node=""> The NGO Coordination Act of 1990 recognized the creation and role of a national umbrella body for NGOs in the country.</span></p><span data-dcnode-id="298" instrument_node="">
</span></div><span data-dcnode-id="296" instrument_node="">
</span><div data-dcnode-id="289" id="ftn72"><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="291"><a data-dcnode-id="293" href="#_ftnref71" id="_ftn71" name="_ftn71" title=""><span data-dcnode-id="294" instrument_node="">71</span></a><span data-dcnode-id="292" instrument_node=""> The Working Group on Government and Civil Society Organizations (CSO) collaboration was constituted in December 2008. The Group comprises eight Government Ministries that work in close collaboration with NGOs and twelve NGOs. The Group is facilitated by a coordinating committee made up of the NGO Council, the Ministry of State for National Heritage and Culture, and Pact Kenya, an NGO. Through a series of discussions, the Working Group has deliberated on the challenges to Government and CSO collaboration and developed principles for Government-Civil Society Organization Collaboration.</span></p><span data-dcnode-id="290" instrument_node="">
</span></div><span data-dcnode-id="288" instrument_node="">
</span><div data-dcnode-id="281" id="ftn73"><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="283"><a data-dcnode-id="285" href="#_ftnref72" id="_ftn72" name="_ftn72" title=""><span data-dcnode-id="286" instrument_node="">72</span></a><span data-dcnode-id="284" instrument_node=""> Pact Kenya and the Poverty Eradication Network are two of these.</span></p><span data-dcnode-id="282" instrument_node="">
</span></div><span data-dcnode-id="280" instrument_node="">
</span><div data-dcnode-id="273" id="ftn74"><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="275"><a data-dcnode-id="277" href="#_ftnref73" id="_ftn73" name="_ftn73" title=""><span data-dcnode-id="278" instrument_node="">73</span></a><span data-dcnode-id="276" instrument_node=""> Herbert states that only through participation is it possible to build and consolidate democracy.</span></p><span data-dcnode-id="274" instrument_node="">
</span></div><span data-dcnode-id="272" instrument_node="">
</span><div data-dcnode-id="265" id="ftn75"><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="267"><a data-dcnode-id="269" href="#_ftnref74" id="_ftn74" name="_ftn74" title=""><span data-dcnode-id="270" instrument_node="">74</span></a><span data-dcnode-id="268" instrument_node=""> A coalition organization for non-profit organizations in South Africa</span></p><span data-dcnode-id="266" instrument_node="">
</span></div><span data-dcnode-id="264" instrument_node="">
</span><div data-dcnode-id="257" id="ftn76"><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="259"><a data-dcnode-id="261" href="#_ftnref75" id="_ftn75" name="_ftn75" title=""><span data-dcnode-id="262" instrument_node="">75</span></a><span data-dcnode-id="260" instrument_node=""> See stage 2 for further information on this technical team.</span></p><span data-dcnode-id="258" instrument_node="">
