</span><article class="post-17451 ijnl type-ijnl status-publish format-standard hentry language-en country-kenya yearpub-529 region-sub-saharan-africa" data-dcnode-id="227" id="post-17451"><span data-dcnode-id="2488" instrument_node="">
</span><div class="libraryitem-entry-content entry-content" data-dcnode-id="230"><span data-dcnode-id="2487" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="2486" data-url="https://www.icnl.org/resources/research/ijnl/ngo-law-in-kenya"></div><div data-dcnode-id="240" id="wrap"><span data-dcnode-id="2485" instrument_node="">
</span><h1 align="right" data-dcnode-id="2480"><em data-dcnode-id="2481"><span data-dcnode-id="2484" instrument_node="">The International Journal</span><br data-dcnode-id="2483"><span data-dcnode-id="2482" instrument_node="">
of Not-for-Profit Law</span></em></h1><span data-dcnode-id="2479" instrument_node="">
</span><h4 align="right" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Volume 11, Issue 4, August 2009</span></h4><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">On a continent frequently shaken by political instability and repressive authorities, African non-governmental organizations (NGOs) often find themselves subject to laws that range from inconvenient to incapacitating. In Kenya, NGOs have complained about faults with their own laws. They have criticized the unaccountable authority vested in government officials and opined inadequate definitions for distinguishing different types of organizations from each other. Kenyan government officials, NGO leaders and many others have developed a consensus that Kenya’s 1990 NGOs Co-ordination Act is gravely flawed. However, precisely how to reform the law has inspired intense and prolonged debate. Finally, two decades of advocacy and exhortations to comprehensively reform the NGOs Coordination Act may be close to fruition.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2472" instrument_node="">Two experts from Kenya’s NGO sector and the regulatory body overseeing the sector visited ICNL’s headquarters in July 2009 to conduct research on the reforms and suggest the next steps the reform process should take. </span><em data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Faith Kisinga</span></em><span data-dcnode-id="2469" instrument_node="">, Consultant for the Government-CSO Collaboration Program—PACT International, argues that the process must be as inclusive as possible. There is a wide range of stakeholders in Kenya’s NGO sector, including NGOs, government agencies, parliament and the media. Broad participation, she argues, is crucial for a successful new law. She proposes specific strategies for cultivating the participation of the numerous stakeholders. </span><em data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Rahma Adan Jillo </span></em><span data-dcnode-id="2466" instrument_node="">is an attorney with the NGOs Coordination Board, the agency responsible for regulating the NGOs sector and enforcing the NGOs Coordination Act. Ms. Jillo examines the substance of the NGO law. She critiques the current NGOs Act, compares the virtues and faults of NGO laws elsewhere in Africa, and articulates features the new law ought to include to support a vibrant and accountable NGO sector. Their work presents a snapshot of a contentious and potentially productive reform process. As the process advances, it has become evident that the consequences of the Kenyan reform project may affect developments elsewhere in Africa for years to come.</span></p><span data-dcnode-id="2464" instrument_node="">

cnode-id="2315"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">US</span></strong></td><td data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">United States of America</span></td></tr><tr data-dcnode-id="2300"><td data-dcnode-id="2305"><strong data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">UK</span></strong></td><td data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">United Kingdom</span></td></tr><tr data-dcnode-id="2290"><td data-dcnode-id="2295"><strong data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">WMD</span></strong></td><td data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">World Movement for Democracy</span></td></tr></tbody></table><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2282"><strong data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">CHAPTER 1: INTRODUCTION</span></strong></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node="">This article is a product of a fellowship offered by the International Center for Not-For-Profit Law (ICNL)</span><a data-dcnode-id="2278" href="#_ftn2" id="_ftnref2" name="_ftnref2" title=""><span data-dcnode-id="2279" instrument_node="">2</span></a><span data-dcnode-id="2277" instrument_node=""> with the financial support of USAID. It considers the legal and regulatory concerns that underpin the review of NGO laws in Kenya. Because of the great significance of NGOs in any country, we argue in this paper that it is important to ensure that “best practices” guide such a reform. We intend to examine the gaps in the NGO laws in Kenya and determine how appropriate international best practices can fill such gaps.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">The NGOs Co-ordination Act was drafted without due consideration of best practices despite NGOs’ significance in Kenya’s growing economy.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2271" instrument_node="">We settled on a working definition of NGO and CSO since they are a largely elusive concept. Further, information on NGOs and CSOs in Kenya is scarce. There is no data on the output of the sector other than data found in publications by ICNL and The University of Nairobi’s Institute for Development Studies.</span><a data-dcnode-id="2269" href="#_ftn3" id="_ftnref3" name="_ftnref3" title=""><span data-dcnode-id="2270" instrument_node="">3</span></a></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">The research was primarily library-based. Primary sources included statutes, while secondary sources included textbooks, articles, journals, newspaper articles, and internet sources. Primary data was also obtained by face-to-face interviews based on open-ended questionnaires. A sample of respondents was interviewed based on their experience in the sector. This article has also incorporated two case studies. This article has found that it is paramount that international best standards are consulted when drafting NGOs laws for any country.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2261"><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">1.1 Background</span></em></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2259" instrument_node="">Kenya has a rich tradition of philanthropy and volunteerism with roots in the communal relationships of a rural African society. This tradition was augmented by a host of educational and social welfare institutions established by the 19th-century Christian missionaries, by the social clubs created to serve the British colonial settlers, by the social, political, and protest organizations that arose to combat British rule, and by the networks of self-help or </span><em data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">harambee</span></em><span data-dcnode-id="2256" instrument_node=""> (pooling together) groups promoted by the first post-independence government.</span><a data-dcnode-id="2254" href="#_ftn4" id="_ftnref4" name="_ftnref4" title=""><span data-dcnode-id="2255" instrument_node="">4</span></a><span data-dcnode-id="2253" instrument_node=""> Civil society in Kenya owes its origins to three major sources: African communal traditions and values, early Christian missionaries, and British colonialization during the 19th century.</span><a data-dcnode-id="2251" href="#_ftn5" id="_ftnref5" name="_ftnref5" title=""><span data-dcnode-id="2252" instrument_node="">5</span></a><span data-dcnode-id="2250" instrument_node=""> Civil society organizations in Kenya have operations that are broad and diverse ranging from relief and social services to human rights.</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2247" instrument_node="">In 1990 the government of Kenya enacted the NGOs Coordination Act</span><a data-dcnode-id="2245" href="#_ftn6" id="_ftnref6" name="_ftnref6" title=""><span data-dcnode-id="2246" instrument_node="">6</span></a><span data-dcnode-id="2244" instrument_node=""> (hereinafter referred to as the Act) to be a central reference point for registration of all NGOs (both local and international) operating in Kenya.</span><a data-dcnode-id="2242" href="#_ftn7" id="_ftnref7" name="_ftnref7" title=""><span data-dcnode-id="2243" instrument_node="">7</span></a><span data-dcnode-id="2241" instrument_node=""> Prior to this, NGOs in Kenya were registered in different legal regimes. These are operational agreements with the Kenyan Government through the Ministry of Culture and Social Services,</span><a data-dcnode-id="2239" href="#_ftn8" id="_ftnref8" name="_ftnref8" title=""><span data-dcnode-id="2240" instrument_node="">8</span></a><span data-dcnode-id="2238" instrument_node=""> Legislation,</span><a data-dcnode-id="2236" href="#_ftn9" id="_ftnref9" name="_ftnref9" title=""><span data-dcnode-id="2237" instrument_node="">9</span></a><span data-dcnode-id="2235" instrument_node=""> the Department of Social Services,</span><a data-dcnode-id="2233" href="#_ftn10" id="_ftnref10" name="_ftnref10" title=""><span data-dcnode-id="2234" instrument_node="">10</span></a><span data-dcnode-id="2232" instrument_node=""> and the Attorney General’s Office, seeking registration as Societies,</span><a data-dcnode-id="2230" href="#_ftn11" id="_ftnref11" name="_ftnref11" title=""><span data-dcnode-id="2231" instrument_node="">11</span></a><span data-dcnode-id="2229" instrument_node=""> Companies Limited by Guarantee,</span><a data-dcnode-id="2227" href="#_ftn12" id="_ftnref12" name="_ftnref12" title=""><span data-dcnode-id="2228" instrument_node="">12</span></a><span data-dcnode-id="2226" instrument_node=""> or Trusts.</span><a data-dcnode-id="2224" href="#_ftn13" id="_ftnref13" name="_ftnref13" title=""><span data-dcnode-id="2225" instrument_node="">13</span></a><span data-dcnode-id="2223" instrument_node=""> Due to the multiple registration frameworks available for registration, NGOs in Kenya operate in diverse forms and operational structures, making consistent regulation difficult.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">In its Sessional Paper of 2006, the Government of Kenya explicitly recognized that NGOs are potent forces for social and economic development, important partners in national development, and valuable agents in promoting the qualitative and quantitative development of the Gross Domestic Product (GDP). This Sessional Paper has come more than fifteen years after the enactment of the NGOs Coordination Act. The Act was enacted without a policy paper. It is, however, an important policy document that sets the legal basis for the needed review of the Act. The Sessional Paper provides an opportunity to expand the definition as provided in the Act and achieve the objective of bringing together all NGOs under a single definition and a consistent regulatory regime.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2215"><em data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">1.2 Definitions</span></em></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">For the purposes of this paper we will attempt to identify a definition of Nongovernmental Organizations (NGOs) and Civil Society Organizations (CSOs). There are as many definitions of NGOs and CSOs as there are numbers of people who attempt to define them. There is no single right definition. However, common themes run through most definitions, and we therefore adopt the following as working definitions:</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2204"><em data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node=""> Nongovernmental Organization </span></em><span data-dcnode-id="2208" instrument_node="">refers to an association, society, foundation, charitable trust, non-profit corporation, or other juridical person that is not regarded under the particular legal system as part of the governmental sector and that is not operated for profit – viz., if any profits are earned, they are not and cannot be distributed as such. It normally does not include trade unions, political parties, profit-distributing cooperatives, or churches,</span><a data-dcnode-id="2206" href="#_ftn14" id="_ftnref14" name="_ftnref14" title=""><span data-dcnode-id="2207" instrument_node="">14</span></a><span data-dcnode-id="2205" instrument_node=""> which are usually regulated under separate legislation.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2194"><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Civil Society</span></em><span data-dcnode-id="2200" instrument_node=""> is the sphere of institutions, organizations, and individuals located among the family, the state, and the market, in which people associate voluntarily to advance common interests.</span><a data-dcnode-id="2198" href="#_ftn15" id="_ftnref15" name="_ftnref15" title=""><span data-dcnode-id="2199" instrument_node="">15</span></a><span data-dcnode-id="2197" instrument_node=""> In this sense, it includes (but is not limited to) legal entities such as the various forms of NGOs (associations, societies, companies limited by guarantee, foundations, trusts, etc.) as well as trade unions, political parties, cooperatives, and churches.</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">
All voluntary associations are CSOs, while NGO specifically refers to the above definition.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2190"><em data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">1.3 Theoretical Framework</span></em></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2188"></p><center data-dcnode-id="2183"><em data-dcnode-id="2184"><span data-dcnode-id="2187" instrument_node="">Civil Society is a complex and multifaceted concept</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">
—Volkhart “Finn” Heinrich and Kumi Naidoo</span></em></center><span data-dcnode-id="2182" instrument_node="">Civil Society is probably one of the most elusive concepts used in the social sciences and in development discourse today. Since NGOs represent one form of CSO it is necessary to understand civil society conceptually.</span><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">
Civil society and legal traditions differ widely in different countries and cultures. This certainly is a consequence of the vast heterogeneity of civil society actors and the location of civil society in the midst of multiple spheres of influence of the state, market, and family.</span><a data-dcnode-id="2178" href="#_ftn16" id="_ftnref16" name="_ftnref16" title=""><span data-dcnode-id="2179" instrument_node="">16</span></a><span data-dcnode-id="2177" instrument_node=""> Or in Cohen’s words, “there is no sufficiently complex theory that is available today.”</span><a data-dcnode-id="2175" href="#_ftn17" id="_ftnref17" name="_ftnref17" title=""><span data-dcnode-id="2176" instrument_node="">17</span></a><span data-dcnode-id="2174" instrument_node=""> Anheir states that only a multidimensional approach is able to describe the various kinds of interplay between the dimensions as well as the specific strengths and weakness of civil society.</span><p data-dcnode-id="2173"></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2171" instrument_node="">Many theories have developed that are helpful for understanding civil society. Civil Society theories can be summarized as follows:</span><a data-dcnode-id="2169" href="#_ftn18" id="_ftnref18" name="_ftnref18" title=""><span data-dcnode-id="2170" instrument_node="">18</span></a></p><span data-dcnode-id="2167" instrument_node="">
</span><ol data-dcnode-id="2141"><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2161"><span data-dcnode-id="2165" instrument_node="">Civil society may be perceived as a </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">part </span></em><span data-dcnode-id="2162" instrument_node="">of society distinct from states and markets, formed for the purposes of advancing common interests and facilitating collective action. Often referred to as the “third sector,” civil society in this sense encompasses all associations and networks between the family and the state except firms. However, there is no assumption that these diverse forms of associational life share a normative consensus or a common political agenda.</span></li><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2159" instrument_node="">Civil society may be defined in </span><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">normative</span></em><span data-dcnode-id="2156" instrument_node=""> terms, as the realm of service rather than self-interest and a breeding ground for the “habits of the heart”: attitudes and values like cooperation, trust, tolerance, and non-violence. In this sense, civil society means a </span><em data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">type </span></em><span data-dcnode-id="2153" instrument_node="">of society that is motivated by a different way of being and living in the world or a different rationality, identified as “civil.” Although it is often conflated with the first set of theories in circular arguments about “forms and norms,” this model must be seen as separate for two interrelated reasons: first, associations have different normative agendas, and second, the same normative agendas are also shaped by differing sets of institutions—government and the market as well as voluntary associations.</span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2143"><span data-dcnode-id="2150" instrument_node="">Civil society may be defined as an </span><em data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">arena for public deliberation</span></em><span data-dcnode-id="2147" instrument_node="">, rational dialogue, and the exercise of “active citizenship” in pursuit of the common interest—in other words, as the “public sphere.” Though often ignored in the policy and practice of governments, international agencies, and even parts of academia, civil society cannot be completely understood without a full appreciation of the role played by the public sphere in democracy and development.These different schools of thought are not </span><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">per se </span></em><span data-dcnode-id="2144" instrument_node="">contradictory. On the contrary, they are complementary and differ only in emphasis or explanation as opposed to the underlying principle at work.&nbsp;</span></li><span data-dcnode-id="2142" instrument_node="">
</span></ol><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2137"><em data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">1.3.1 Role of CSOs</span></em></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">Civil society has recently emerged as a central topic of discussion among policy makers and practitioners. In the US, officials have launched civic renewal projects to counteract increased social isolation and distrust among citizens. The German parliament has implemented programs to revitalize volunteerism. The UK Cabinet Office has attempted to modernize the voluntary sector to the World Bank’s new approach to economic development. The European Union encourages a “citizens’ Europe.” And NATO operates a program to seek ways of constructing a civil society in countries torn by civil war. All of these are indications of heightened policy relevance.</span><a data-dcnode-id="2133" href="#_ftn19" id="_ftnref19" name="_ftnref19" title=""><span data-dcnode-id="2134" instrument_node="">19</span></a><span data-dcnode-id="2132" instrument_node=""> Civil society is the platform in which people associate voluntarily to advance their common interests. As these examples demonstrate, civil society plays different roles in different countries because individuals’ needs differ from country to country.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2129" instrument_node="">The important role played by NGOs must be emphasized. For instance, since the enactment of the Act, Kenya has experienced a general increase in the economic importance of NGOs as providers of health, educational, social, and environmental services. The NGO sector in Kenya employs almost half (43%) as many people as the entire public sector.</span><a data-dcnode-id="2127" href="#_ftn20" id="_ftnref20" name="_ftnref20" title=""><span data-dcnode-id="2128" instrument_node="">20</span></a><span data-dcnode-id="2126" instrument_node=""> Further, it accounted for $270 million in expenditures as of 2000.</span><a data-dcnode-id="2124" href="#_ftn21" id="_ftnref21" name="_ftnref21" title=""><span data-dcnode-id="2125" instrument_node="">21</span></a><span data-dcnode-id="2123" instrument_node=""> The workforce (paid and volunteer) represents over 290,000 full time employees. This constitutes 2.1 percent of Kenya’s economically active population.</span><a data-dcnode-id="2121" href="#_ftn22" id="_ftnref22" name="_ftnref22" title=""><span data-dcnode-id="2122" instrument_node="">22</span></a></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">A strong NGO sector provides many benefits for a country; a supportive legal and regulatory framework is one of the pillars sustaining the sector.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2107"><em data-dcnode-id="2112"><span data-dcnode-id="2115" instrument_node="">1.3.2 Legal Barriers to Civil Society Organizations</span><br data-dcnode-id="2114"><span data-dcnode-id="2113" instrument_node="">
</span></em><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">
Many jurisdictions around the world, including Kenya, have provisions in their laws that restrict the space in which CSOs thrive. These are designed to intimidate, suppress, and control CSOs and their activities. Civil society is facing serious threats today across the globe.</span><a data-dcnode-id="2108" href="#_ftn23" id="_ftnref23" name="_ftnref23" title=""><span data-dcnode-id="2109" instrument_node="">23</span></a></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2105" instrument_node="">These legal constraints fall broadly in five categories:</span><a data-dcnode-id="2103" href="#_ftn24" id="_ftnref24" name="_ftnref24" title=""><span data-dcnode-id="2104" instrument_node="">24</span></a></p><span data-dcnode-id="2101" instrument_node="">
</span><ol data-dcnode-id="2059" type="a"><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2093"><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Barriers to entry</span></em><br data-dcnode-id="2097"><span data-dcnode-id="2096" instrument_node="">
These are restrictive legal provisions that are used to discourage the formation and/or registration of CSOs. These barriers include limits to the right to associate, prohibitions against unregistered groups, restrictions on founders, burdensome registration procedures, vague grounds for denial, and barriers preventing international organizations from operating in the country.</span><a data-dcnode-id="2094" href="#_ftn25" id="_ftnref25" name="_ftnref25" title=""><span data-dcnode-id="2095" instrument_node="">25</span></a></li><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2085"><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Barriers to operational activity</span></em><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">
These are obstacles in the law that directly prohibit or otherwise constrain legitimate activities. These barriers are direct prohibitions against spheres of activity, invasive supervisory oversight, government harassment, criminal sanctions against individuals, failure to protect individuals and organizations from violence, termination and dissolution, and establishment of government-organized NGOs.</span><a data-dcnode-id="2086" href="#_ftn26" id="_ftnref26" name="_ftnref26" title=""><span data-dcnode-id="2087" instrument_node="">26</span></a></li><span data-dcnode-id="2084" instrument_node="">
</span><li data-dcnode-id="2077"><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Barriers to speech and advocacy</span></em><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">
These are legal restrictions against expression of speech mainly in advocacy and policy engagement. They include prior restraints and censorship, defamation laws, broad or vague restrictions against advocacy, criminalization of dissent, and restrictions on freedom of assembly.</span><a data-dcnode-id="2078" href="#_ftn27" id="_ftnref27" name="_ftnref27" title=""><span data-dcnode-id="2079" instrument_node="">27</span></a></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2069"><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Barriers to contact and communication </span></em><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">
These are legal restrictions hindering the free flow of information and communication. They include barriers to the creation of networks, to international collaboration, and to communication as well as criminal sanctions against individuals.</span><a data-dcnode-id="2070" href="#_ftn28" id="_ftnref28" name="_ftnref28" title=""><span data-dcnode-id="2071" instrument_node="">28</span></a></li><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2061"><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Barriers to resources</span></em><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">
These are legal provisions that hinder the ability of NGOs to secure resources to carry out their activities. These barriers include prohibitions against funding, requirements for advance government approval, and policies to route funding (especially from foreign sources) through the government.</span><a data-dcnode-id="2062" href="#_ftn29" id="_ftnref29" name="_ftnref29" title=""><span data-dcnode-id="2063" instrument_node="">29</span></a></li><span data-dcnode-id="2060" instrument_node="">
</span></ol><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2057" instrument_node="">State regimes around the world have tried to justify these legal restrictions under the pretext of promoting NGO accountability, protecting state sovereignty, or preserving national interest. These justifications are not only rigid but they also confer a variety of meanings. For instance, a concept like “national interest” is particularly prone to abuse. Further, governments often offer flimsy excuses as illustrations for such interferences. Prof. Mbote states, “The Board (NGOs) inextricably links national interest to public security with the appalling result that more than 100 NGOs have reportedly been denied registration on grounds of ‘national interest’ or ‘public security.’”</span><a data-dcnode-id="2055" href="#_ftn30" id="_ftnref30" name="_ftnref30" title=""><span data-dcnode-id="2056" instrument_node="">30</span></a></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2037"><em data-dcnode-id="2049"><span data-dcnode-id="2052" instrument_node="">1.3.3 International Principles Protecting Civil Society Organizations</span><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">
</span></em><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">
Rights of individuals to form, join and participate in CSOs are protected under international law. These rights are enshrined in the Universal Declaration of Human Rights,</span><a data-dcnode-id="2045" href="#_ftn31" id="_ftnref31" name="_ftnref31" title=""><span data-dcnode-id="2046" instrument_node="">31</span></a><span data-dcnode-id="2044" instrument_node=""> the International Covenant for Civil and Political Rights (ICCPR),</span><a data-dcnode-id="2042" href="#_ftn32" id="_ftnref32" name="_ftnref32" title=""><span data-dcnode-id="2043" instrument_node="">32</span></a><span data-dcnode-id="2041" instrument_node=""> the International Covenant on Economic Social and Cultural Rights (ICESCR),</span><a data-dcnode-id="2039" href="#_ftn33" id="_ftnref33" name="_ftnref33" title=""><span data-dcnode-id="2040" instrument_node="">33</span></a><span data-dcnode-id="2038" instrument_node=""> and other international agreements like the International Convention on the Elimination of All Forms of Racial Discrimination, the Convention on the Elimination of All Forms of Discrimination Against Women (CEDAW), the Convention on the Rights of the Child, the African Charter on Human and Peoples’ Rights, etc.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">First, in order to be exercised, freedom of association cannot be made dependent on registration or legal status. Under international law, individuals are free to associate without formal legal status, and the state should enable organizations to obtain legal status if they so desire.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2032" instrument_node="">Second, once formed, CSOs have a right to operate free from unwarranted state interference.</span><a data-dcnode-id="2030" href="#_ftn34" id="_ftnref34" name="_ftnref34" title=""><span data-dcnode-id="2031" instrument_node="">34</span></a><span data-dcnode-id="2029" instrument_node=""> However, there are permissible grounds for some restrictions on the grounds of national security, public order and morality, and the protection of the rights and freedoms of others. Such restrictions must be expressly provided for by law and they must be “necessary in a democratic society.”</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Third, as noted above, CSOs themselves, as legal persons, enjoy the right to freedom of association as articulated in international law.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Fourthly, CSOs have a right to communication and cooperation with their affiliates and through any medium.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Fifth, CSOs have a right to seek and secure funding from any legal resources.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Last, States have a duty to promote and respect human rights and protect the rights of CSOs.</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">All these principles are clearly articulated under international law. They are the foundation upon which states strive to protect and promote to effectively build an enabling legal environment for CSOs in their countries. There are a variety of reasons why countries like Kenya have to ensure the existence of strong, independent, and dynamic CSOs; the key is to protect the internationally recognized freedoms of association.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2003"><strong data-dcnode-id="2008"><span data-dcnode-id="2011" instrument_node="">CHAPTER 3: THE KENYAN REGULATORY FRAMEWORK OF NGOS</span><br data-dcnode-id="2010"><span data-dcnode-id="2009" instrument_node="">
</span></strong><br data-dcnode-id="2007"><span data-dcnode-id="2006" instrument_node="">
</span><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Background</span></em></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="2001" instrument_node="">Internationally, Kenya embraces the Universal Declaration of Human Rights of 1948 that enshrines the freedom of association. Kenya is also a party to the International Covenant on Economic, Social and Cultural Rights (ICESCR) since January 3, 1976</span><a data-dcnode-id="1999" href="#_ftn35" id="_ftnref35" name="_ftnref35" title=""><span data-dcnode-id="2000" instrument_node="">35</span></a><span data-dcnode-id="1998" instrument_node=""> and to the African Charter on Human and Peoples’ rights. Regionally, Kenya is also a party to the East African Community Treaty (EAC) which guarantees freedom of association.</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1995" instrument_node="">The Constitution of Kenya promotes and respects the freedom of association as provided for by these international and regional legal instruments.</span><a data-dcnode-id="1993" href="#_ftn36" id="_ftnref36" name="_ftnref36" title=""><span data-dcnode-id="1994" instrument_node="">36</span></a><span data-dcnode-id="1992" instrument_node=""> The Constitution guarantees the right to assemble freely and associate with other persons. However, there are exceptions to this right. The right to freedom of association can be restricted if necessary for public defense, public morality, public health, public order, public safety, rights and freedoms of other persons, or for the imposition of reasonable conditions relating to registration and martial law.</span><a data-dcnode-id="1990" href="#_ftn37" id="_ftnref37" name="_ftnref37" title=""><span data-dcnode-id="1991" instrument_node="">37</span></a></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1977"><span data-dcnode-id="1987" instrument_node="">The legal and regulatory framework in Kenya for NGOs is the NGOs Co-ordination Act of 1990 and its Regulations of 1992.</span><a data-dcnode-id="1985" href="#_ftn38" id="_ftnref38" name="_ftnref38" title=""><span data-dcnode-id="1986" instrument_node="">38</span></a><span data-dcnode-id="1984" instrument_node=""> The intention of this law was to act as a single authority for registration and regulation of all NGOs in Kenya.</span><a data-dcnode-id="1982" href="#_ftn39" id="_ftnref39" name="_ftnref39" title=""><span data-dcnode-id="1983" instrument_node="">39</span></a><span data-dcnode-id="1981" instrument_node=""> The Act commenced its operations on 15 June 1992. It provided for a six-month transition period</span><a data-dcnode-id="1979" href="#_ftn40" id="_ftnref40" name="_ftnref40" title=""><span data-dcnode-id="1980" instrument_node="">40</span></a><span data-dcnode-id="1978" instrument_node=""> and later extended this period by three months to 15 February 1993 during which all existing NGOs were required to register with the NGOs Coordination Board.</span></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1973"><em data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">3.2 The NGOs Co-ordination Act No. 19 of 1990 and Its Regulations of 1992: A Critique vis-a-vis Best Practices</span></em></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1971" instrument_node="">It should be noted at the outset that the Act provides for mandatory registration of NGOs. It outlaws any activity for unregistered NGOs—these requirements clearly constitute limitations on the freedom of association and appear to abridge rights guaranteed by the Constitution.</span><a data-dcnode-id="1969" href="#_ftn41" id="_ftnref41" name="_ftnref41" title=""><span data-dcnode-id="1970" instrument_node="">41</span></a></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">As discussed in Chapter 1, civil society organizations in Kenya were registered under different legal regimes before and after the enactment of the Act. They function and render their services according to their different policy and legal structures. Such a diverse process of registration leads to difficulties in establishing an equitable regulatory system. The Act argued for the case of unification of the legal regimes. This noble intention has not been realized until today.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">The main reason why the Act was not able to bring all these organizations under its umbrella is because of legal gaps that exist in the law. In this subheading we shall identify these key issues and how they are dealt with under the Act </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">vis-a-vis</span></em><span data-dcnode-id="1960" instrument_node=""> best practices.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1955"><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">3.2.1 Definition</span></em></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1953" instrument_node="">An NGO has been defined in the act to mean “a private voluntary grouping of individuals or associations not operated for profit or for other commercial purposes but which have organized themselves nationally or internationally for the benefit of the public at large and for the promotion of social welfare development, charity or research in the areas inclusive but not restricted to health relief, agricultural, education, industry and supply of amenities and services.”</span><a data-dcnode-id="1951" href="#_ftn42" id="_ftnref42" name="_ftnref42" title=""><span data-dcnode-id="1952" instrument_node="">42</span></a><span data-dcnode-id="1950" instrument_node=""> This is a weak operational definition of an NGO. This definition has failed to encompass all the other CSOs that are for public benefit. As a result, these other organizations have been forced to seek registration in the other legal regimes that fit their definition. Examples include trusts. In Kenya, trusts are for all intents and purposes public benefit organizations; however, not having members, they do not fit the definition provided by the Act. Therefore, they are registered under the Trustees Act. A definition that encompasses all public benefit organizations under one single regulator will simplify the regulatory regime.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1945"><em data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">3.2.2 Arbitrary powers</span></em></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1943" instrument_node="">Under the act, both the Board and the Bureau</span><a data-dcnode-id="1941" href="#_ftn43" id="_ftnref43" name="_ftnref43" title=""><span data-dcnode-id="1942" instrument_node="">43</span></a><span data-dcnode-id="1940" instrument_node=""> of the NGOs Coordination Board are permitted excessive discretion. For example, no guidelines have been provided for the formulation of the terms and conditions attached to a certificate of operation.</span><a data-dcnode-id="1938" href="#_ftn44" id="_ftnref44" name="_ftnref44" title=""><span data-dcnode-id="1939" instrument_node="">44</span></a><span data-dcnode-id="1937" instrument_node=""> This absence of guidelines may be subject to abuse. Further, the process of refusal of registration</span><a data-dcnode-id="1935" href="#_ftn45" id="_ftnref45" name="_ftnref45" title=""><span data-dcnode-id="1936" instrument_node="">45</span></a><span data-dcnode-id="1934" instrument_node=""> as provided in the Act may be abused by the Board. Permissible restrictions on associational rights as provided under the Kenyan Constitution must meet some certain and unambiguous requirements. First, the restriction must be accomplished under the authority of the law, and second, it must be reasonably justifiable in a democratic society. Unfortunately this “national interest” exception has been used to unjustifiably curtail the rights of NGOs in Kenya.</span><a data-dcnode-id="1932" href="#_ftn46" id="_ftnref46" name="_ftnref46" title=""><span data-dcnode-id="1933" instrument_node="">46</span></a></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1929" instrument_node="">Wide discretionary powers are given to the Board and the Minister in Sections 12, 14, 19, and 32,</span><a data-dcnode-id="1927" href="#_ftn47" id="_ftnref47" name="_ftnref47" title=""><span data-dcnode-id="1928" instrument_node="">47</span></a><span data-dcnode-id="1926" instrument_node=""> which subject the exercise of the associational rights granted under section 80 of the Constitution to unreasonable prior restraint for registration to obtain legal status. The law ought to provide explicit guidelines in these provisions. Sections 10, 11,</span><a data-dcnode-id="1924" href="#_ftn48" id="_ftnref48" name="_ftnref48" title=""><span data-dcnode-id="1925" instrument_node="">48</span></a><span data-dcnode-id="1923" instrument_node=""> and 12 require all organizations that fit the description of an NGO to apply for a certificate of registration. The law does not specify the length of time of an application may be considered by the Board. In practice this process can take as long as two years. This slow process represents another barrier to the operations of NGOs.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1911"><em data-dcnode-id="1917"><span data-dcnode-id="1920" instrument_node="">3.2.3 Non-Governmental Organizations Council</span><br data-dcnode-id="1919"><span data-dcnode-id="1918" instrument_node="">
</span></em><br data-dcnode-id="1916"><span data-dcnode-id="1915" instrument_node="">
The NGOs Council is established under section 23 of the Act. Its role</span><a data-dcnode-id="1913" href="#_ftn49" id="_ftnref49" name="_ftnref49" title=""><span data-dcnode-id="1914" instrument_node="">49</span></a><span data-dcnode-id="1912" instrument_node=""> is to advise the Board on the code of conduct of NGOs in Kenya. The Law states that once an NGO is registered it automatically becomes a member of the NGOs Council. This provision is contrary to section 80 of the Constitution which provides for the freedom of association. The Act compels NGOs to become members of the NGOs Council once they are registered. This provision raises serious constitutional issues. It is unlawful to compel someone to associate with those with whom they do not wish to. Instead such an “umbrella” organization should be voluntary for its members, for the promotion of good practices through, for example, the adoption and enforcement of principles of voluntary self regulation as may be enshrined in its code of conduct. It is in line with best practices to have umbrella organizations for NGOs; however, such organizations ought to be voluntary and draw legitimacy from membership and not the law, as is the situation in Kenya.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1907"><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">3.2.4 Taxation</span></em></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1905" instrument_node="">NGOs in Kenya contribute approximately 80B Kenya Shillings annually to the GDP.</span><a data-dcnode-id="1903" href="#_ftn50" id="_ftnref50" name="_ftnref50" title=""><span data-dcnode-id="1904" instrument_node="">50</span></a><span data-dcnode-id="1902" instrument_node=""> This is a tremendous contribution towards complementing government’s efforts in the delivery of services. Unfortunately, these organizations are not in practice exempt from taxation. The process of exemption from taxation in Kenya for NGOs is tedious and confusing. Prof. Kameri Mbote says “accessing this facility can be a cumbersome process and submission of a request does not necessarily mean that such a request will be granted.”</span><a data-dcnode-id="1900" href="#_ftn51" id="_ftnref51" name="_ftnref51" title=""><span data-dcnode-id="1901" instrument_node="">51</span></a><span data-dcnode-id="1899" instrument_node=""> To encourage philanthropy and charity, donors and NGOs should be entitled to a reasonably generous income or profit tax preference with respect to donations made, and PBOs should be exempt from payment of income or profits tax on their earnings. In addition, the law should provide for adequate exemptions and deductions from duties for NGOs.</span><a data-dcnode-id="1897" href="#_ftn52" id="_ftnref52" name="_ftnref52" title=""><span data-dcnode-id="1898" instrument_node="">52</span></a></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1888"><em data-dcnode-id="1891"><span data-dcnode-id="1894" instrument_node="">3.2.5 Regulation</span><br data-dcnode-id="1893"><span data-dcnode-id="1892" instrument_node="">
</span></em><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">
The functions of the Board are set out under section 7 of the Act. Among them is facilitating and coordinating the work of all NGOs operating in Kenya. In carrying out this function the Board is expected to coordinate with other government agencies. But this provision raises problems. First, the term “coordinate” is ambiguous and undefined under the Act. The term can be misused by a Board under the pretexts of ensuring national security and stability. Further, it may serve to restrict on NGO activities.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1886" instrument_node="">Second, for a number of reasons other than registration, not much regulation actually takes place at the Board. The physical capacity of the Board in terms of human resources and financial resources is limited. The Bureau’s office is currently situated in Nairobi and it is expected to serve all the NGOs in the country. It has a staff of 50 and a clientele of approximately 6,000. Its annual budget covers only operational costs.</span><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">
The Board also lacks technical capacity. The role of the Board in registration of NGOs is perfunctory. There is no clear understanding of the sector by either the government or other stakeholders. The law may not necessarily address this issue; however, it is critical that stakeholders are aware of the principles that underpin this sector, especially management and governance structures of NGOs.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Finally, due to the multiplicity of forms of registration available in Kenya, it is safe to state that there is unnecessary duplication across the multiple regulators. There is no collaboration between the different registration state agencies.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1876"><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">CHAPTER 4: COMPARATIVE ANALYSIS</span></strong></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1872"><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">4.1 Introduction</span></em></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">In addition to Kenya, several other countries have recently undertaken reform of their NGOs laws. This chapter provides a comparative case study of two nearby countries in the developing world where such reform has been undertaken: Rwanda and South Africa. It is important to note that there is no perfect model for NGOs laws in the world. However, there are positive attributes to these laws that have encompassed best practices. In this section we will highlight these principles when drawing the comparative lessons.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1859"><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">4.2 Rwanda</span></em><a data-dcnode-id="1862" href="#_ftn53" id="_ftnref53" name="_ftnref53" title=""><span data-dcnode-id="1865" instrument_node="">53</span><br data-dcnode-id="1864"><span data-dcnode-id="1863" instrument_node="">
</span></a><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">
CSOs are protected under the Rwandan Constitution. The law regulating them is Law No. 20/2000 of 26/07/2000 relating to Non Profit Making Organizations (NPOs).</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1857" instrument_node="">The law makes reference to Article 11</span><a data-dcnode-id="1855" href="#_ftn54" id="_ftnref54" name="_ftnref54" title=""><span data-dcnode-id="1856" instrument_node="">54</span></a><span data-dcnode-id="1854" instrument_node=""> of the Constitution. Article 33 of the Rwandan Constitution protects the freedom of thought, opinion, conscience, religion, worship, and public assembly. Article 25 further protects freedom of association which shall be exercised under conditions determined by law. What have not been made clear are these conditions.</span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Article 2 of Law No. 20/2000 recognizes the freedom of association as enshrined in the constitution. It states that “every person is free to form an association with others … but not founded for an illicit objective, contrary to laws, public order or morality.”</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1848" instrument_node="">An NPO in Rwanda is formed by at least three members presenting aims and plans of action to the local authority at the place it intends to work in order to get provisional agreement.</span><a data-dcnode-id="1846" href="#_ftn55" id="_ftnref55" name="_ftnref55" title=""><span data-dcnode-id="1847" instrument_node="">55</span></a><span data-dcnode-id="1845" instrument_node=""> Thereafter, an application requesting legal entity is addressed to the Minister of Justice six months following the date of a provisional permit. Legal entity is granted on the signing date of the ministerial decree six months from the date the request was made by the Minister of Justice. In case the legal entity is not granted the reasons must be communicated to the organization within six months of the application request. Further, every foreign organization has to be authorized to operate in Rwanda.</span><a data-dcnode-id="1843" href="#_ftn56" id="_ftnref56" name="_ftnref56" title=""><span data-dcnode-id="1844" instrument_node="">56</span></a><span data-dcnode-id="1842" instrument_node=""> The Ministry of Local Government regulates all local NPOs while the Ministry of Internal Affairs regulates all International NPOs. Every NPO submits a detailed report on its achievements, balance sheet and financial situation by April 30 of every year. Non-submission of annual reports may lead to a suspension of the organization’s activities. Further, any NPO may be dissolved on a decision taken by a two-thirds majority of the registered members of the judiciary.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">This law has positive aspects. Of importance, it expressly asserts the freedom of association, it anticipates organizations serving as vehicles for advocacy on matters of public interest, it provides for government support of service providers through the relevant ministries’ budgets, it provides for tax benefits to help sustain the organizations. Further, the rules for registration are adequate, providing for sensible time limits, a deadline for the registrars to act or the organization will be deemed registered, and it has a sound appeals process including in conflict situations the possible use of mediation.</span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1828"><em data-dcnode-id="1833"><span data-dcnode-id="1836" instrument_node="">4.3 South Africa</span><br data-dcnode-id="1835"><span data-dcnode-id="1834" instrument_node="">
</span></em><br data-dcnode-id="1832"><span data-dcnode-id="1831" instrument_node="">
There are a number of laws that govern CSOs in South Africa. These are:</span><a data-dcnode-id="1829" href="#_ftn57" id="_ftnref57" name="_ftnref57" title=""><span data-dcnode-id="1830" instrument_node="">57</span></a></p><span data-dcnode-id="1827" instrument_node="">
</span><ol data-dcnode-id="1808"><span data-dcnode-id="1826" instrument_node="">
</span><li data-dcnode-id="1821"><span data-dcnode-id="1825" instrument_node="">Common and statutory law that recognize voluntary associations, trusts and Sec 21 Companies</span><a data-dcnode-id="1823" href="#_ftn58" id="_ftnref58" name="_ftnref58" title=""><span data-dcnode-id="1824" instrument_node="">58</span></a><span data-dcnode-id="1822" instrument_node=""> as legal entities;</span></li><span data-dcnode-id="1820" instrument_node="">
</span><li data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">The NPOs Act;</span></li><span data-dcnode-id="1817" instrument_node="">
</span><li data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">The Income Tax Act; and</span></li><span data-dcnode-id="1814" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1813" instrument_node="">PBOs that apply for the right to receive tax deductible donations, called donor deductable status.</span><a data-dcnode-id="1811" href="#_ftn59" id="_ftnref59" name="_ftnref59" title=""><span data-dcnode-id="1812" instrument_node="">59</span></a></li><span data-dcnode-id="1809" instrument_node="">
</span></ol><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1806" instrument_node="">An advantage to this type of arrangement is the different levels of requirements to form these organizations. For instance, to form a voluntary association the only requirement is an agreement between three or more people to have a common objective other than making profits. This agreement may be written or oral.</span><a data-dcnode-id="1804" href="#_ftn60" id="_ftnref60" name="_ftnref60" title=""><span data-dcnode-id="1805" instrument_node="">60</span></a><span data-dcnode-id="1803" instrument_node=""> This voluntary association is a product of the common law and is not regulated by statue. It can be established within a period of one to two days since no registration with a government department is required. There is no better way of ensuring freedom of association than this way. The other forms, Trusts and Section 21 Companies, have more requirements. For instance, a company is an incorporated entity while a trust is not a separate entity; it lacks a legal personality as it only holds property in the name of the trustees. Incorporating a company requires a memorandum of association together with a number of prescribed forms which takes two weeks to register. A trust is incorporated by lodging the trust deed with the master of the high court which takes a week to lodge.</span><a data-dcnode-id="1801" href="#_ftn61" id="_ftnref61" name="_ftnref61" title=""><span data-dcnode-id="1802" instrument_node="">61</span></a></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1798" instrument_node="">To seek registration as an NPO is voluntary for these organizations. There are, however, conditions required. They must be established for a public purpose and they must be non-state actors. Section 30 of the Income Tax Act of South Africa creates the framework for NPOs to be approved as PBOs. They must set out in their founding documents the organizational structures and mechanisms for governance.</span><a data-dcnode-id="1796" href="#_ftn62" id="_ftnref62" name="_ftnref62" title=""><span data-dcnode-id="1797" instrument_node="">62</span></a><span data-dcnode-id="1795" instrument_node=""> In Section 6, the Directorate for NPOs prepares and issues codes of good practice for NPOs and those persons, bodies, and organizations making donations and grants to NPOs. Further, Section 30 of the Income Tax Act imposes other conditions on the governance and operations of PBOs. For instance, the organization’s constitution must provide that there are at least three unrelated persons with fiduciary responsibility for the organization and no single person directly or indirectly controls the decision making powers relating to the organization.</span><a data-dcnode-id="1793" href="#_ftn63" id="_ftnref63" name="_ftnref63" title=""><span data-dcnode-id="1794" instrument_node="">63</span></a></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">There are attempts underway to simplify this registration process. Nonetheless, the South African model enshrines the principle for the protection of fundamental freedom of association. Further, it asserts a sound governance structure which is core in constituting CSOs, especially those of public benefit.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1785"><strong data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">CHAPTER 5: CONCLUSIONS AND RECOMMENDATIONS</span></strong></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1781"><em data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">5.1 Conclusions</span></em></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Kenya is at an important phase of its history with the intended review of its NGOs law. It is very important that key principles are identified to guide this important review process. In this last chapter and in the next subheading, we identify key principles that must guide the review process to ensure that a fair and enabling legal and regulatory framework forms the foundation and function of NGOs to sustain the sector.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">The Act currently gives wide discretionary powers to the Board and the Minister. There are no guidelines provided under the Act on the terms and conditions attached to the certificate of registration. This subjects the freedom of association enshrined in the constitution to unreasonable prior restraint for registration and deregistration of NGOs. Informal groups with common interests should be allowed to engage in lawful activities without having to acquire a legal identity which is viewed as a barrier to entry.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1771"><em data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">5.2 Recommendations</span></em></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1769" instrument_node="">ICNL has developed a checklist of principles that should be included in legislation governing CSOs. This checklist is based on research collected over 150 countries and analyzed to ascertain to prevailing international practices.</span><a data-dcnode-id="1767" href="#_ftn64" id="_ftnref64" name="_ftnref64" title=""><span data-dcnode-id="1768" instrument_node="">64</span></a></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1762"><em data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">5.2.1 Protecting Fundamental Freedoms – Freedom of Association</span></em></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">International law protects and promotes the rights of individuals to form, join, and participate in CSOs. It is important to note that this freedom does not require one to become a legal entity in order to enjoy it. Once registered as an NGO as defined in the act,</span><a data-dcnode-id="1758" href="#_ftn65" id="_ftnref65" name="_ftnref65" title=""><span data-dcnode-id="1759" instrument_node="">65</span></a><span data-dcnode-id="1757" instrument_node=""> an organization should be permitted to engage in activities for the benefit of its members in line with public benefit or other charitable activities. Finally, the highest governing body of the CSO should be permitted to voluntarily terminate its activities.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1752"><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">5.2.2 Integrity and Good Governance</span></em></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Certain minimum provisions should be included in the governing documents of CSOs. These provisions are internal reporting and supervision, duties and liabilities of their members, prohibition on conflicts of interest, and prohibition on the distribution of profits and other private benefits. Methods of voluntary self regulation could be encouraged, through establishment of a listed code of standards, which an umbrella organization should enforce.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1745"><em data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">5.2.3 Financial Sustainability</span></em></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">CSOs have a right to seek resources from legal sources. Furthermore, they are permitted to engage in profit making activities to sustain themselves provided that their core business remains that of public benefit. These organizations should be exempt from taxation, and donations made by individuals or companies should be entitled to income tax benefits to encourage a Kenyan philanthropic environment.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1738"><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">5.2.4 Accountability and Transparency</span></em></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">CSOs should by law be required to file annual reports on their finances and operations to the relevant state law office. Large organizations should be required to provide independent audited financial reports. All such reporting is subject to auditing by the authority provided it is not used to badger these organizations. Information provided should be accessible to the public, especially from those organizations that receive substantial support from the public through direct contributions or through tax benefits or government grants.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1731"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">REFERENCES</span></strong></p><span data-dcnode-id="1730" instrument_node="">
