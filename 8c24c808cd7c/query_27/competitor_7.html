</span><h3 data-dcnode-id="1578"><span data-dcnode-id="1581" instrument_node="">The Process of Reviewing the NGO Coordination Act, 1990: A Step-by-Step Road Map</span><a data-dcnode-id="1579" href="#_ftn66" id="_ftnref66" name="_ftnref66" title=""><span data-dcnode-id="1580" instrument_node="">66</span></a></h3><span data-dcnode-id="1577" instrument_node="">
</span><h5 data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Faith Kisinga</span></h5><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1571"><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Introduction</span></strong></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">This article comes in the wake of increasing acknowledgment by Government of Kenya (GoK) and Non-Governmental Organization (NGO) actors of the need to revise the outdated NGO Coordination Act of 1990.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">An enabling environment cannot be created simply through legislation or policy statements. Of key import to legislative reforms is the need for improvement in the way government and other stakeholders relate to each other. This article seeks to answer the question: What is the best way to ensure that NGOs participate effectively in the review process? It also seeks to answer the question: Is the participation of NGOs useful for the development of a sustainable and effective legislative framework?</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">The following are the </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Key Objectives</span></strong><span data-dcnode-id="1560" instrument_node="">:</span></p><span data-dcnode-id="1558" instrument_node="">
</span><ul data-dcnode-id="1547"><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">To help NGO and Government stakeholders develop a mutual understanding of their roles in the reform process so as to contribute to a successful and sustainable outcome.</span></li><span data-dcnode-id="1554" instrument_node="">
</span><li data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">To guide NGO and Government stakeholders through the steps they need to follow for a successful review of the NGO Coordination Act.</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">To promote an appreciation for an inclusive, collaborative process for review of the NGO Act.</span></li><span data-dcnode-id="1548" instrument_node="">
</span></ul><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">The article makes the following </span><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">hypotheses</span></strong><span data-dcnode-id="1542" instrument_node="">:</span></p><span data-dcnode-id="1540" instrument_node="">
</span><ul data-dcnode-id="1520"><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">That NGO stakeholders are interested in participating in the NGO Coordination Act review process.</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">That NGO stakeholders have very little information about how they can participate, or what role they should play in the review process.</span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">That Government stakeholders are interested in moving ahead with the review process.</span></li><span data-dcnode-id="1530" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">That not all Government stakeholders have a comprehensive understanding of the significance of participation of NGOs in the review process and what this entails.</span></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">That Government and NGO stakeholders need to work together for the outcome of the review process to be sustainable.</span></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">That the review process will build the capacity of NGOs to effectively engage in legal reform in their various sectors. The process will therefore lay the basis for multi-sectoral reforms.</span></li><span data-dcnode-id="1521" instrument_node="">
</span></ul><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">The term Civil Society Organizations (CSOs) is used generally in Kenya to refer to the wide array of organizations that operate in the realm between the individual and the state and are formed to promote the interests of their members or the public good. NGO is used to specifically refer to entities that are registered by the NGO Coordination Bureau. Though NGOs are just a small part of the larger CSO sector, they are the most visible. Under the NGO Coordination Act of 1990, NGOs can be established for the benefit of the public at large and for the promotion of social welfare, development, charity or research in the areas inclusive of, but not restricted to, health, relief, agriculture, education, industry, and the supply of amenities and services.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1515" instrument_node="">This article will focus on the participation of NGOs in the review of the Non-Governmental Organizations Coordination Act of 1990. It is expected, and proposed by Sessional Paper No. 1 of 2006 on Non-Governmental Organizations,</span><a data-dcnode-id="1513" href="#_ftn67" id="_ftnref67" name="_ftnref67" title=""><span data-dcnode-id="1514" instrument_node="">67</span></a><span data-dcnode-id="1512" instrument_node=""> that the reforms to the NGO Coordination Act will result in a more inclusive definition and legal framework for civil society organizations (CSOs). The Sessional Paper broadly defines an NGO as “a voluntary organization or grouping of individuals or organizations which is autonomous and not-for-profit sharing; operating in the voluntary sector; organized locally at the grassroots level, nationally or internationally for the purpose of enhancing the legitimate economic, social and/or cultural development or lobbying or advocating on issues of public interest or interest of a group of individuals or organizations; but shall not include Trade Unions, social clubs and entertainment sports clubs, political parties, private companies or faith propagating organizations”.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1503"><strong data-dcnode-id="1506"><span data-dcnode-id="1509" instrument_node="">Outline of the Article</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">
</span></strong><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
The article has three main parts.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node="">In </span><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Part One</span></strong><span data-dcnode-id="1498" instrument_node="">, the article briefly outlines the history of the process that led to the current legislative framework for NGOs in Kenya and the role played by NGO and Government stakeholders in it. It also gives the prevailing context behind the review of the NGO Coordination Act. This section also uncovers the risks facing the review process and the legal and policy framework for participation of NGOs will be pointed out. In addition, this part discusses the rationale (legal, socio-political, or other) for a participatory legal reform process. It also makes the case for a participatory process. Reference will be made to participatory and representative democracy and an attempt will be made to offer sound reasons for a participatory process.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1495" instrument_node="">In </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Part Two</span></strong><span data-dcnode-id="1492" instrument_node="">, the article discusses the broad principles for effective legislative processes. The broad principles are reinforced by comparative practice.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1486"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Part Three </span></strong><span data-dcnode-id="1487" instrument_node="">sketches or proposes a road map for the legal review process based on the principles delineated in Part Two and grounded on the local context. It identifies the key stakeholders in the process and their roles as well as the methods that are required to bring them on board and enable them to participate effectively. Key activities of the process will also be outlined.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1478"><strong data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">Research Method</span><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node="">
</span></strong><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">
This research has been conducted through secondary research and consultation of NGO law experts at the International Center for Not-for-Profit-Law (ICNL) as well as NGO practitioners from a variety of NGOs in the USA. Secondary data was obtained through a desk study of publications at ICNL with a bearing on the agreed study issues. The study has also used secondary data to show examples of international best practice in NGO law development from around the world. This research report has been prepared with specific recommendations for the legislative process in Kenya. It will serve as a basis to make a case for a participatory and inclusive reform of the current NGO legislation.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1463"><strong data-dcnode-id="1473"><span data-dcnode-id="1476" instrument_node="">PART ONE</span><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">
</span></strong><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node="">
</span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Context and History</span></em><strong data-dcnode-id="1466"><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node="">
</span></strong><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">
The NGO Coordination Act of 1990 is the product of Government and NGO efforts to provide a legal framework for NGOs. The context in which the Act was promulgated was, however, not conducive for NGOs. Mistrust between the Government and NGOs was very high. The Government proposed and passed the NGO Coordination Act in an attempt to regulate the sector. Members of the NGO sector reacted strongly to the law, claiming that its provisions were not enabling but aimed at stifling and controlling the sector. A frenzied series of consultations in the sector resulted in proposed changes which were presented to the Government. The two sectors deliberated on the proposals and eventually reached a compromise. A draft bill was then developed. It formed the basis of the NGO Coordination Act of 1990.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1461" instrument_node="">Though NGOs participated in the development of the law, they did so belatedly and with strong suspicions about the Government’s intentions. The Act therefore reflected the desire by NGOs to self-regulate and limit the Government’s role to coordination of the sector. Hence, some of the problems being faced by the sector today are as a result of limitations within the self-regulation mechanism that was envisioned. Others are as a result of issues that were never anticipated, for instance, the contending factions within the sector, the sector’s deteriorating reputation, the exclusive nature of the definition of NGO, and the exponential growth of the sector.</span><a data-dcnode-id="1459" href="#_ftn68" id="_ftnref68" name="_ftnref68" title=""><span data-dcnode-id="1460" instrument_node="">68</span></a></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1456" instrument_node="">Many in the Government and NGO sector later questioned the efficacy of having a law on NGOs in the absence of a national policy on NGOs. Where the law was silent or gave rise to confusion, there was no general framework to which to refer. In 1996, the NGO Coordination Board decided that there was a need for a national policy on NGOs.</span><a data-dcnode-id="1454" href="#_ftn69" id="_ftnref69" name="_ftnref69" title=""><span data-dcnode-id="1455" instrument_node="">69</span></a><span data-dcnode-id="1453" instrument_node=""> The executive committee of the NGOs Council, the national umbrella body of NGOs,</span><a data-dcnode-id="1451" href="#_ftn70" id="_ftnref70" name="_ftnref70" title=""><span data-dcnode-id="1452" instrument_node="">70</span></a><span data-dcnode-id="1450" instrument_node=""> also reaffirmed its commitment to the development of the policy.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">During the second half of 2000, the NGO Council conducted a survey. The results showed that NGOs desired a policy to guide the sector’s operations. NGOs also called for a review of the NGO Coordination Act of 1990 once the policy was formulated. In May 2001, the Government’s interest in an NGO Policy was rekindled. It called for a brainstorming meeting, of Government and NGO representatives, which was followed by the preparation of a concept paper on the proposed strategy for developing the NGO Policy.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">The NGO Council led the process of drafting the paper. A steering committee was established, including members of the NGO Council and the NGO Coordination Board, the Vice President, and key government officials The process was to be participatory and inclusive of NGOs, Government, and the private sector. The paper observed that the NGO Act of 1990 came into force before a national policy was developed. The lack of an agreed-to policy framework inhibited the implementation of some provisions of the Act, leading to lack of coordination, facilitation, and harmonization in the NGO sector. There was general agreement that a comprehensive policy would facilitate the formulation of a sound legislation on the NGO sector. In September of 2001, the structures for facilitation of the process for development of the Policy were established. A technical committee was constituted.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">By 2002, the process of developing a national policy on NGOs was in full swing. It was led by the Government with input from NGOs through the NGO Council. This process continued for about a year. Input from the discussions was then consolidated in a report, which served as a basis for the preparation of a draft policy. A consultant was commissioned to develop the draft policy. He presented it to the NGO Coordination Board, which was tasked to ensure that the paper went through the government mechanisms and became policy.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">This process depended heavily on the Government’s leading. Though NGOs were eager to participate in the process, they were not able to effectively mobilize themselves to engage fully in the policy making process, right through to the end. It was not until January 2006 that Sessional Paper No. 1 of 2006 was released. The paper contains the National Policy on NGOs.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Today, the environment is more conducive for collaboration between the Government and NGOs. On one hand, there is generally willingness by the Government to engage with NGOs on broad issues ranging from service provision to constitutional and legal reforms. The Government views NGOs as vital partners in the realization of sustainable development and crucial watchdogs in fostering good governance. It is expected that government goodwill will continue, as well as its willingness to provide space for NGOs to engage and participate in activities that promote the public good. On the other hand, there is generally willingness by large NGO networks to mobilize support from their constituencies for the review process.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">It is therefore necessary to ensure that a more deliberate engagement and participatory process is undertaken. NGOs and Government need to participate from a mutually informed and empowered position. Only then will the results from the process be sustainable.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1423"><em data-dcnode-id="1426"><span data-dcnode-id="1429" instrument_node="">Legal and Policy Framework for Participation</span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">
</span></em><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">
National development policies have consistently affirmed and appreciated the role of the NGO sector in national development. Civil society organizations, the private sector, and other actors are increasingly expected to participate in the formulation, implementation, monitoring, and evaluation of development policies and plans.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Several policies provide the framework and space for participation of CSOs generally and NGOs in particular in the broad development agenda. Vision 2030, which is the country’s blueprint for development, envisions the participation of all stakeholders in the realization of its objectives. The participation of Kenyans from all sectors—government, private, and voluntary sectors—was vital in the formulation and completion of the framework. Consultation forums were held in nearly all parts of the country to collect the views of a diverse range of Kenyans. The team that coordinated the development of Vision 2030 was also representative of the broad sectors. Vision 2030 was launched at a national public meeting where the endorsement of Kenyans was sought. Efforts were then made to disseminate the Vision around the country.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1418" instrument_node="">Participation of stakeholders was not limited to the </span><em data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">formulation</span></em><span data-dcnode-id="1415" instrument_node=""> of Vision 2030 but was also emphasized in its </span><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">implementation</span></em><span data-dcnode-id="1412" instrument_node="">. For example, the business sector and the Government are partnering to implement various projects under Vision 2030, through public-private partnerships (PPPs). The regulatory and institutional frameworks for PPPs are currently being developed. Similarly, NGOs in the health sector worked closely with the Ministry of Health Services to develop the health sector’s strategic plan. The plan foresees increased engagement of civil society organizations in its realization.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The National Accord, which was the result of the National Dialogue and Reconciliation Process following the post-election violence in Kenya in 2008, has four main agendas. The agendas are significant for the creation of an enabling environment for a stable, democratic, and prosperous country. NGOs and civil society in general are expected to participate in initiatives aimed at realizing Agenda Four.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1406" instrument_node="">As outlined in Sessional Paper No.1 of 2006, the NGO Sector Policy anticipates review of the NGO Coordination Act and the participation of NGOs in the review process. Recently, a working group of Government and Civil Society Organization representatives developed principles for GOK-CSO Collaboration.</span><a data-dcnode-id="1404" href="#_ftn71" id="_ftnref71" name="_ftnref71" title=""><span data-dcnode-id="1405" instrument_node="">71</span></a><span data-dcnode-id="1403" instrument_node=""> The principles are expected to serve as guidelines that will empower GOK and CSO actors at all levels to pursue their collaborative initiatives. They form an important basis for the legislative process as they provide the main stakeholders – GoK and NGOs – with principles for engagement.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Further support for participation by NGOs in decision making processes is found in bilateral agreements and international resolutions. Article 2 of the Cotonou Agreement describes participation of Non State Actors (NSAs) as a “fundamental principle” of African, Caribbean, and Pacific (ACP) and European Union cooperation. Kenya is one of the ACP countries. The agreement aims to facilitate and promote a broad-based and wide-ranging people-centered partnership through empowering NSAs and creating conditions to enable them to play an active role in development and democracy building amongst other processes.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Kenya is a member of the United Nations. Hence, resolutions made by organs of the international body are applicable in the country. In February 2001, the General Assembly of the UN adopted a resolution which stated that:</span></p><span data-dcnode-id="1395" instrument_node="">
</span><blockquote data-dcnode-id="1392"><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">“There is no one universal mode of democracy … but democracy is based on the freely expressed will of the people to determine their own political, economic, social and cultural systems and their full participation in all aspects of their lives….”(GA Resolution to Promotion and Consolidation of Democracy of February 28, 2001)</span></p></blockquote><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Notwithstanding the space provided under these international, regional, and national legal and policy frameworks, effective participation by NGOs is fraught with challenges due to weak internal capacity and a deficient legal framework. If the NGO sector is to be fully strengthened to play an effective role in the legislative review process, it will need to have a clear understanding of its role in the process and how it should relate with other stakeholders. It will also need sufficient information to enable it to contribute substantively with regard to the specific reforms that are required.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1381"><em data-dcnode-id="1384"><span data-dcnode-id="1387" instrument_node="">Challenges and Risks</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
</span></em><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
The NGO Sector is faced with a number of challenges which have considerably reduced its capacity to effectively engage in legislative, policy, and other reform processes, including the following:</span></p><span data-dcnode-id="1380" instrument_node="">
</span><ul data-dcnode-id="1361"><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The long, drawn-out leadership wrangles and warring factions of the NGO Council have weakened the NGO sector. Further, the relationship between the NGO Council and the NGO Coordination Board is strained with suspicion, each viewing the other as invading its turf. These issues have translated to the NGO sector’s inability to find common ground and forge joint agendas on issues of mutual interest. They have also curtailed the political buy-in that is sorely needed for such a sector-wide initiative to succeed.</span></li><span data-dcnode-id="1376" instrument_node="">
</span><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">There have been declining standards and professionalism, largely due to the lack of an enabling regulatory and institutional framework for effective self-regulation. The NGO sector’s dented image and credibility have had a negative impact on the relationship between NGOs and other stakeholders and played a role in extending the historical mistrust between the Government and NGOs. However, an initiative aimed at strengthening competence and sustainability amongst CSOs in general is underway. The initiative has developed sector-wide standards and aims to build the capacity of CSOs to comply with the standards. It will therefore lay the foundation for improved relationships between CSOs and the government.</span></li><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">High dependence on one or a few sources of foreign funding and lack of creativity in local resource mobilization, as well as lack of awareness with regard to incentives for individual and corporate philanthropy, have reduced the sustainability of many NGO initiatives, especially reform processes which are usually long-term in nature.</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1366"><span data-dcnode-id="1369" instrument_node="">Many NGOs lack the know-how on legal and policy reform processes and few have the capacity to engage in them or willingness to engage. Nonetheless, there are NGOs that exist to help others build their technical capacity in coordinating and participating in legislative reform processes.</span><a data-dcnode-id="1367" href="#_ftn72" id="_ftnref72" name="_ftnref72" title=""><span data-dcnode-id="1368" instrument_node="">72</span></a></li><span data-dcnode-id="1365" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The Government is eager to move ahead with the NGO law review. Ultimately, it will decide whether and to what extent NGOs participate in the process. It is therefore essential to ensure that the Government agencies which will play a role in the review process are well informed about the importance of the participation of NGOs in the review.</span></li><span data-dcnode-id="1362" instrument_node="">
</span></ul><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1353"><em data-dcnode-id="1356"><span data-dcnode-id="1359" instrument_node=""> Theoretical Framework for Participation</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">
</span></em><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">
Participatory democracy is a process that emphasizes broad participation (decision making) of constituents in policy formulation and direction through the operation of political systems. It strives to create opportunities for all members of a political group to make meaningful contributions to decision-making, and seeks to broaden the range of people who have access to such opportunities (Johns, 2005).</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Participatory democracy assumes that all citizens are political actors and will spend considerable time in defense of their interests and ideas. Representative democracy, however, rests heavily on the idea that almost every citizen delegates participation to a public agent, a member of parliament, thereby increasing the obligation of the citizen to be vigilant and active in the selection of candidates for office and oversight of representatives once elected.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">Rosemann posits that democracy has shifted from a right to elect representatives to a right of participation within processes that have a direct or indirect impact on individuals’ lives (Rosemann, 1969). </span><a data-dcnode-id="1346" href="#_ftn73" id="_ftnref73" name="_ftnref73" title=""><span data-dcnode-id="1347" instrument_node="">73</span></a><span data-dcnode-id="1345" instrument_node=""> The desire by citizens to take a greater role in determining their future lies at the heart of the desire to “democratize” democracy as a means of restoring faith in the institutions of government. According to Ron Miller, the term “participatory democracy” has been used by people who seek to reclaim the essence of democratic idealism in a society that has grown over-organized, hierarchical, and authoritarian and represents a renewed faith in the intelligence and moral judgment of common citizens pursuing their daily lives and interests. (Miller, 2005). Hence, one of the stimulants to this interest in participatory democracy is the apparent “reduce(d) trust in public and private institutions, especially disillusionment with politicians, political parties, and political institutions” ( Pharr, Putnam and Dalton, 2000).</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">While public participation in democratic society is vital, it is also problematic. Sometimes governments seek extensive public input in numerous forms only to ignore the public’s comments later. Some public meetings are so dysfunctional that observers end up wishing someone in charge would bring an end to the chaos and misery (Co-intelligence, 2008). In the absence of a sure direction, the consensus method so typical of participation becomes less likely to produce good policy.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Accordingly, Johns proposes that the quality of the democracy will be measured by the ability to incorporate and resolve issues, not just voice them (Johns, 2005). In his view, the emphasis should be on ensuring transparent relations between organized voices and the government. These organized voices represent civil society.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">It has been argued that the involvement of civil society in democratization will give the people ownership over their institutions of governance in a way that was not possible without it (Roland, 2006). This view finds support in the GA Resolution on Promotion and Consolidation of Democracy of 2001, which states that democracy needs </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">guaranteed </span></em><span data-dcnode-id="1333" instrument_node="">mechanisms for consultations with and the contribution of civil society in processes of governance and encouraging cooperation between local authorities and nongovernmental organizations (GA Resolution to Promotion and Consolidation of Democracy of February 28, 2001).</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Several attempts have been made to give direction to participatory democracy. The following section outlines the principles for effective participation by CSOs in legislative processes.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1317"><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">PART TWO:</span></strong><span data-dcnode-id="1325" instrument_node=""> </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">BROAD PRINCIPLES FOR EFFECTIVE LEGISLATIVE REFORM PROCESSES</span></strong><em data-dcnode-id="1320"><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node="">
</span></em><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">
There will always be initiatives geared at revising or developing laws to govern a variety of aspects of life. Some may result in laws that are widely accepted and respected. Others may end in laws that are rejected by certain segments of society or even ignored.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Whether a legislative reform process is successful or not is dependent on a variety of factors, including the context in which the process is undertaken, the commitment and interest of the stakeholders, and the resources available. Over and above this, however, certain basic guidelines or principles must be observed to ensure that legislative reform processes are successful. They include the following:</span></p><span data-dcnode-id="1313" instrument_node="">
</span><ol data-dcnode-id="1264"><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1308"><strong data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node=""> The process must be indigenous. </span></strong><span data-dcnode-id="1309" instrument_node="">This principle is an answer to the question: For whom is the law being reviewed? To be successful, the process must be led and owned by those for whom the law is being created—local institutions and individuals. Only then will the law be applicable and reflect the social, economic, and political realities experienced by the people it affects. Local institutions and people are generally very good at working out solutions to their own problems if they are given the time and resources to do so.</span></li><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1303"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node=""> The process must be inclusive. </span></strong><span data-dcnode-id="1304" instrument_node="">The voices and views of the actors and sectors that will be affected by the law – the stakeholders – must be represented. Otherwise, the legitimacy of the process may be questioned or even threatened. It is therefore vital for organizers and participants to have a sound understanding of the prevailing social dynamics. Selection of representatives to the process must also be transparent.A process that is representative of the views of NGOs, government officials, parliamentarians and others can lead to good laws, a stronger likelihood of enactment, and a vested interest among participants in continuing the reform process. (Rutzen, ICNL 2008)</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1296"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The process must be participatory. </span></strong><span data-dcnode-id="1299" instrument_node="">A participatory process promotes sustainable decisions by recognizing and communicating the needs and interests of all participants, including decision makers. To the extent that people feel involved in creation or ratification of democratic decisions, they will support the implementation of those decisions.The process should therefore give stakeholders the chance to provide input through a variety of methods including consultation, dialogue, information, or partnership.An example of the effective use of various tools for participation is found in Hungary, where an NGO-Government drafting group published its draft law in a leading Hungarian newspaper. This encouraged input from both NGO representatives and the broader public. The drafters then organized town meetings around Hungary to promote further public participation. Comments were codified and reflected in the final version of the draft, which was enacted in 1997.
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">The parameters for participation must also be clear: for instance, participants must have knowledge and skill to carry out the tasks but also be sufficiently representative of the various constituencies to provide their perspectives.</span></p></li><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1291"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The process must be transparent. </span></strong><span data-dcnode-id="1292" instrument_node="">Participants need to be well informed in order to participate in a meaningful way in the discussions on reform. The process must therefore provide information to the broad constituencies of the stakeholders and be employed as a channel for disseminating information and opinions from those stakeholders. In addition, it should provide participants with information about how the input they provide will be used. Where transparency is a key element of the process, trust will readily be nurtured amongst the stakeholders.</span></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1283"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">The process must be accepted as valid across the country. </span></strong><span data-dcnode-id="1287" instrument_node="">The need for legal reform must be expressed widely in the sector if the law is to be broadly and readily accepted and applied. To foster widespread support, it will be crucial to begin the process by laying emphasis on the </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">common goal</span></em><span data-dcnode-id="1284" instrument_node="">. This will help to minimize conflict and reinforce the cultivation of respect among the stakeholders.</span></li><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1278"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node=""> The process must be empowering. </span></strong><span data-dcnode-id="1279" instrument_node="">The process will be most effective if associated with a broad capacity building effort that ensures that the constituency at large as well as those directly participating in the legislative process are reasonably knowledgeable of and proficient in articulating the concerns and wishes of the constituency. It must give those involved the chance to develop their capacities to organize and influence change in their respective fields, thus leading to reforms on a larger scale.</span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1271"><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">The process must be collaborative. </span></strong><span data-dcnode-id="1274" instrument_node="">The process must involve a reciprocal relationship among decision makers and stakeholders in which all parties listen as well as talk and contribute towards achieving a mutually agreed objective. Central to this principle is the need to ensure that stakeholders are deliberately and actively involved and share responsibilities for various elements of the review process.</span><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">
In Afghanistan, the legislation drafting process in 2005 was government-led and allowed for civil society input only reluctantly. Moreover, the process was quite hurried. Consequently, the law that was ultimately enacted, although a big step toward a more enabling environment, was not enabling as it would have been if the process had been collaborative.</span></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1266"><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">There must be wide consultation throughout the review process and fair utilization of all relevant input. </span></strong><span data-dcnode-id="1267" instrument_node="">This will ensure that decisions reached are sustainable and have legitimacy. The failure to invite sufficient input may cause the resulting law to lose the benefit of valuable perspectives and insights. In addition, some NGOs may perceive the reform initiative as the work of an elite group, thereby undermining the legitimacy of the reform effort. Hence, stakeholders should be convinced that their participation will achieve something worthwhile in order for them to buy into the process.</span></li><span data-dcnode-id="1265" instrument_node="">
</span></ol><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1262" instrument_node="">The following example highlights how wide consultation was undertaken during the tax reform process in South Africa. Between 1998 and 2000 the Non-Profit Partnership (NPP),</span><a data-dcnode-id="1260" href="#_ftn74" id="_ftnref74" name="_ftnref74" title=""><span data-dcnode-id="1261" instrument_node="">74</span></a><span data-dcnode-id="1259" instrument_node=""> together with the Legal Resources Center (LRC), the South African Grantmakers’ Association (SAGA), and other representatives of the nonprofit sector launched a tax campaign targeted at improving the tax legislation governing nonprofits as the nation’s tax laws came under review. The campaign involved liaising with dozens of nonprofit organizations, preparing discussion papers and reports, and drafting submissions for the Finance Portfolio Committee of Parliament to consider. By July 2002, the Revenue Act repealed large portions of the existing tax framework and created a more favorable tax environment for the sustainability of nonprofits.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Nonetheless, the legislation still did not address some of the concerns highlighted by the group in their position papers and draft submissions. Between 2001 and 2006 therefore, the NPP and its partners strengthened their campaign by initiating dialogue with the South African Revenue Service (SARS) and the Ministry of Finance to promote further cooperation and development of favorable tax laws for the nonprofit sector. Biannual meetings and, later, annual meetings were held between the actors. The NPP produced discussion papers to highlight the continuing objectives of the Tax Campaign. Ongoing consultations aim to bring gradual and holistic changes to the tax framework, which support the continued survival and development of the nonprofit sector.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">A similar example of wide consultation is found in Rwanda. In general, the NGO law reform process was open and participatory. The Ministry of Local Government, Community Affairs and Social Affairs (MINALOC) initiated work on four draft laws governing national NGOs, international NGOs, religious organizations, and political parties. The process was opened up to solicit input from CSOs, other stakeholders and the public through various channels including consultative meetings and public hearings in parliamentary committees. Changes to the draft were made on the basis of the participant recommendations.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">These consultative efforts in South Africa and Rwanda were crucial in securing the buy-in of stakeholders during the revision of the Tax and NGO laws.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1233"><strong data-dcnode-id="1244"><span data-dcnode-id="1247" instrument_node=""> PART THREE: THE ROAD MAP</span><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">
</span></strong><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">
</span><em data-dcnode-id="1238"><span data-dcnode-id="1241" instrument_node="">I. STAGE ONE</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">
</span></em><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">
</span><em data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Assessment of the legal framework</span></em></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Local and international practice has shown that many reform initiatives are informed by identified issues, which have been captured and condensed in the form of research reports, and used to mobilize support. The first stage of the review process will therefore consist of conducting research on constraints, gaps, and challenges of the legal framework for NGOs in Kenya in order to build a strong case for the creation of a more enabling environment for NGOs.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">The research will be conducted through a desk study. It will identify the key issues of concern and propose legislative solutions that will be linked to the sections of the law that require amendment. It will also compare the legal framework in Kenya with international good regulatory practice around the world and will utilize information from the globally acknowledged International Centre for Not-for-Profit Law (ICNL).</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Since research has already been undertaken, the task will be to package the findings into a report format that is useful for stakeholders. For example, policy briefs will be prepared for government officials. Other promotional information, education, and communication (IEC) and behavior change communication (BCC) materials will also be developed and targeted at NGO and GOK audiences.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1222" instrument_node="">This report will be used to inform stakeholders’ consultations. It will also be disseminated widely beyond those who will participate in stakeholder discussion forums, to affected members of the NGO community and government circles. The report will therefore play a crucial role in setting the reform agenda.</span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">
Dissemination of the research will be done through broadcast radio and TV, as well as through leading national newspapers, identified NGO network focal points, and a website dedicated to the law review initiative. The dedicated website will be created and monitored by a technical team.</span><a data-dcnode-id="1218" href="#_ftn75" id="_ftnref75" name="_ftnref75" title=""><span data-dcnode-id="1219" instrument_node="">75</span></a><span data-dcnode-id="1217" instrument_node=""> The site will have comprehensive access to additional relevant documents and will post announcements on activities related to the review process as well as other information updates. It will also have an email account that interested stakeholders can use to provide input. The input will be passed on to the Working Group for consideration.</span><a data-dcnode-id="1215" href="#_ftn76" id="_ftnref76" name="_ftnref76" title=""><span data-dcnode-id="1216" instrument_node="">76</span></a></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1203"><em data-dcnode-id="1209"><span data-dcnode-id="1212" instrument_node="">II. STAGE TWO</span><br data-dcnode-id="1211"><span data-dcnode-id="1210" instrument_node="">
</span></em><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">
During the second stage of the review process, comprehensive discussions within and between the NGO sector and Government on the changes needed for an enabling legal framework for NGOs will be facilitated and convened by </span><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">an NGO Law Working Group</span></strong><span data-dcnode-id="1204" instrument_node="">. The Working Group will be composed of representatives from the NGO sector, government, the NGO Coordination Board, the NGO Councils, the National Civil Society Congress, NGO sectoral or thematic networks, and other persons selected by dint of their professional/technical experience or on some other strategic basis.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">A </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">technical team </span></em><span data-dcnode-id="1198" instrument_node="">will be established to support the Working Group. It will be composed of persons with deep knowledge of the local environment and the requisite technical experience for managing policy and legal reform programs, together with skills in communicating with a wide spectrum of participants. The technical team will be hosted by the NGO Coordination Board and/or by an organization that commands respect widely across Government and the NGO sector. Financial support for the initiative will be mobilized by members of the NGO sector and the NGO Coordination Board prior to the start of the first phase of the review process.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Selection of the members of the Working Group will be by stakeholders, during the first joint consultation meeting. Participants at the first consultation meeting will also jointly develop a road map for the participatory review process and agree on the key objectives for the process. Additional stakeholders will also be identified at later meetings.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Further activities throughout this stage will include the following:</span></p><span data-dcnode-id="1190" instrument_node="">
</span><ol data-dcnode-id="1144" type="1"><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1185"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Consultative meetings with NGOs</span></strong><span data-dcnode-id="1186" instrument_node="">: The NGO Law Working Group will meet with representatives of the NGO Councils and key civil society networks such as the National Civil Society Congress (NCSC) and the Kenya Civil Society Alliance (KCSA) to seek comments, views, and feed-back from their constituencies, to develop sectoral consensus and to mobilize support for the review process.</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Intra-sectoral consultation workshops </span></strong><span data-dcnode-id="1181" instrument_node="">will be convened to facilitate comprehensive discussions by NGOs and consolidate the case for an enabling environment. In particular, the forums will raise awareness on NGO sector law and policy. They will aim to build consensus on the most effective model for self-regulation in the NGO sector, to complement the development of a truly enabling legislative framework. The Working Group will convene the workshops and will pay particular attention to ensure the participation of representatives from a spectrum of NGOs that will be affected by the reforms.</span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1151"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Engagement with government and parliamentary officials. </span></strong><span data-dcnode-id="1176" instrument_node="">The Working Group will engage with government and parliamentary officials to secure buy-in for a progressive NGO legal framework consistent with policies formulated and agreed to throughout the process. This activity will begin as early as possible and include the following steps:
</span><ul data-dcnode-id="1153"><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1171"><em data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node=""> Identification and engagement of relevant parliamentary committees. </span></em><span data-dcnode-id="1172" instrument_node="">The Working Group will establish relationships with members of relevant parliamentary committees such as the Departmental Parliamentary Committee on Health, Housing, and Labour &amp; Social Welfare as well as with members of parliament who are allies of the sector, in a bid to build support for reform.</span></li><span data-dcnode-id="1170" instrument_node="">
</span><li data-dcnode-id="1166"><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Strategic meetings to get buy-in from relevant parliamentary committees and Members of Parliament </span></em><span data-dcnode-id="1167" instrument_node="">allied to the sector. These meetings will be geared toward creating awareness amongst the Parliamentarians with regard to the value of the NGO sector and of an enabling environment for their activities.</span></li><span data-dcnode-id="1165" instrument_node="">
</span><li data-dcnode-id="1161"><em data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Strategic meetings with relevant government officials</span></em><span data-dcnode-id="1162" instrument_node="">: These will secure buy-in from relevant government agencies for the reforms.</span></li><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1155"><em data-dcnode-id="1157"><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Engagement of the President and the Office of the Prime Minister.</span></em></em><span data-dcnode-id="1156" instrument_node="">Early efforts will be made to contact these offices, especially the President, whose assent will be crucial in determining whether the draft law (bill) finally gets enacted.</span></li><span data-dcnode-id="1154" instrument_node="">
</span></ul><span data-dcnode-id="1152" instrument_node="">
</span></li><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1146"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">To build consensus between the NGO sector and Government </span></strong><span data-dcnode-id="1147" instrument_node="">on specific changes needed in the NGO Coordination Act, fifteen (15) cross-sectoral region-wide dialogue forums will be convened. From these joint dialogue forums, specific proposals will emerge.The fora will also help to improve the understanding of both sectors with regard to their reciprocal roles in the review process, their respective realities and their common objectives, thereby promoting mutual appreciation.</span></li><span data-dcnode-id="1145" instrument_node="">
</span></ol><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Recommendations from all these forums will be captured and consolidated to develop definitive proposals for reform. The forums will also serve as primary communication conduits between the initiative and stakeholders, allowing for the gradual and essential “buy-in” by all affected parties as the process proceeds. Additional information channels will be dedicated to providing free information on the process to the public. These will include identified NGO network focal points and a website dedicated to the law review initiative.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1133"><em data-dcnode-id="1136"><span data-dcnode-id="1139" instrument_node="">III. STAGE THREE</span><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">
</span></em><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">
During the third stage, the revisions to the NGO Coordination Act will be agreed to, drafted, and endorsed by stakeholders.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Due to the busy schedule of Parliamentarians and the technical nature of the proposals sought, it will be crucial to ensure that the proposal submitted before Parliamentarians is as clear and complete as possible. This will reduce the amount of time that will be required to have the law appropriately drafted, understood, debated, and enacted.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Recommendations from the consultation forums will be used to inform the development of the draft law. The draft law will then be disseminated to the wider NGO community through various channels, including email, broadcast, and print media, NGO network focal points, and the dedicated website. Since it is crucial to secure buy-in from stakeholders at every stage of the process, feedback will be consistently solicited and used to further refine the draft law.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">The activities in this stage will include the following:</span></p><span data-dcnode-id="1123" instrument_node="">
</span><ul data-dcnode-id="1076"><span data-dcnode-id="1122" instrument_node="">
</span><li data-dcnode-id="1118"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node=""> An NGO Working Group workshop to consolidate the proposals from the consultation forums: </span></strong><span data-dcnode-id="1119" instrument_node="">The Working Group members will convene a workshop, following all the consultative meetings and workshops, to consider and consolidate the proposals made at those forums and draw up specific recommendations for reform.</span></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1113"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Dissemination of the recommendations </span></strong><span data-dcnode-id="1114" instrument_node="">through broadcast radio and TV and leading national newspapers, NGO network focal points, and the dedicated website.</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1108"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node=""> A workshop to validate all the proposed recommendations. </span></strong><span data-dcnode-id="1109" instrument_node="">This workshop will ensure that the proposals developed are in line with the expectations of the stakeholders from the government and the NGO sector and receive their sanction. This workshop, which will be convened by the Working Group, will invite select representatives from the government and the NGO sector, who attended the consultative workshops.</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1103"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Technical Drafting of the NGO law: </span></strong><span data-dcnode-id="1104" instrument_node="">The Working Group will commission a qualified legislative draftsperson to assist them to develop a draft of the revised NGO Law. The draft of the law will be based on recommendations made by the Working Group, as proposed in light of the comments made at the consultation workshops. It is anticipated that the Working Group will be actively involved throughout the drafting process and together with the draftspersons will complete the draft law.</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1098"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Dissemination of the draft law and information about the drafting process to stakeholders: </span></strong><span data-dcnode-id="1099" instrument_node="">This will be conducted through broadcast radio and TV and leading national newspapers, NGO network focal points, and the dedicated website.</span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1093"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Consolidation of feedback </span></strong><span data-dcnode-id="1094" instrument_node="">reflecting the comments and views captured from the dissemination: This will be undertaken by the Working Group.</span></li><span data-dcnode-id="1092" instrument_node="">
</span><li data-dcnode-id="1088"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Development of a final version </span></strong><span data-dcnode-id="1089" instrument_node="">of the draft law. The drafters will receive the consolidated feedback to revise and finalize the draft law. Sufficient copies will be produced for dissemination to identified target audiences.</span></li><span data-dcnode-id="1087" instrument_node="">
</span><li data-dcnode-id="1083"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Dissemination of the draft law to a broad group of NGO stakeholders for endorsement: </span></strong><span data-dcnode-id="1084" instrument_node="">This will be conducted through broadcast radio and TV and leading national newspapers, NGO network focal points, and the dedicated website.</span></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1078"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Validation of the final draft: </span></strong><span data-dcnode-id="1079" instrument_node="">There will be a National Validation workshop to present and validate the final version of the draft NGO law. A broad group of NGO stakeholders will be invited to endorse the draft. The workshop will be convened and facilitated by members of the Working Group.</span></li><span data-dcnode-id="1077" instrument_node="">
</span></ul><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1068"><em data-dcnode-id="1071"><span data-dcnode-id="1074" instrument_node="">IV. STAGE FOUR</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
</span></em><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
The revised NGO Coordination Act will be passed during the final stage of the review process. The following activities will take place:</span></p><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1053"><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1060"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Submissions before Parliament on the draft NGO law:</span></strong><span data-dcnode-id="1063" instrument_node=""> The Working Group members will engage with and make submissions before the relevant parliamentary committee on the draft NGO law. The submissions will be accompanied by letters of endorsement from the NGO sector. The Working Group will also use the recently published case studies and principles for CSO-Government collaboration, along with material from the ongoing discussions on civil society standards for competence and sustainability, to conduct a high-impact campaign for law reform. This material will lay out a </span><em data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">clear basis for the relationship between NGOs and the Government and hence, facilitate ongoing dialogue and mutual understanding. </span></em></li><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1055"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Monitoring of the bill and lobbying for enactment: </span></strong><span data-dcnode-id="1056" instrument_node="">Together with the NGO Coordination Board, the Working Group will follow the decision-making process to make sure that it is democratic, transparent, and effective. It will also work closely with NGO networks to mobilize the sector in sustaining the demand for a new law, through campaigns and lobbying.The Working Group will take advantage of platforms provided by various NGO initiatives, e.g., the NGO Week, the discussion forums about enhancement of standards for the sector, the NGO of the Year Award (NGOYA), and the Civil Society of the Year Award (CSOYA) to advocate and inform NGOs about the progress being made in Parliament. Media releases, the dedicated website, and NGO websites will also be used in conducting the civic engagement campaign.Actions to sway more decision makers in favor of passing the law will include breakfast meetings between Working Group representatives and members of the parliamentary committee; contacts with the Office of the President; posting summarized copies of the draft law, leaflets, and position papers in all the pigeon-holes of the parliamentarians; and promoting public debate through radio, TV, and leading national newspapers.</span></li><span data-dcnode-id="1054" instrument_node="">
</span></ul><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1049"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">THE STAKEHOLDERS IN THE REVIEW PROCESS</span></strong></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The NGO Coordination Act review process will be inclusive and participatory. The following is a description of the main stakeholder organizations as well as their mandate and responsibilities in the review process.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1038"><em data-dcnode-id="1041"><span data-dcnode-id="1044" instrument_node="">The NGO Law Working Group</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
</span></em><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">
The NGO Law Working Group (comprising both government and nongovernmental stakeholders) will take the lead in the review process. It will play a key role in convening or facilitating the consultation forums as well as other activities. Representation on the group will be broad and include many categories of NGOs (thematic sector and regional network representatives), civil society networks, persons with technical expertise, the NGO Coordination Board, and the NGO Councils.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Selection of the Working Group members will be by stakeholders, during the first joint consultation meeting. The working group will, however, be open to invite additional members of key stakeholder constituencies who will be identified and proposed later in the process. The inclusive structure of the Working Group will reflect both the diversity of the NGO sector and the fact that no single NGO represents the whole sector. The Working Group will therefore have an advantage over other institutions in reinforcing trust amongst the stakeholders in such a process. Its composition will also help to secure the legitimacy and success of the initiative.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The Working Group’s brief will be to facilitate wide, inclusive consultations with a variety of stakeholders, including NGOs, relevant Government agencies, parliamentarians, and parliamentary committees. The consultations will be geared towards building multi-sectoral consensus on the changes needed for a conducive legal framework for NGOs. The Working Group will also consider the findings of the research report on the legal framework for the NGO sector. It will also consider and consolidate feedback from stakeholders, make recommendations, and seek endorsement of the recommendations from the stakeholders.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Through its secretariat or technical support team, the Working Group will ensure easy and open access to relevant, accurate and timely information on the process and content of the review. It will therefore play a pivotal role in catalyzing civic engagement for the review process.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">To augment the progress of the review process, the NGO Law Working Group will, after consultations and dialogue forums have taken place, work with a draftsperson to develop a draft of the NGO Coordination Act. The Working Group will submit the draft law before the relevant parliamentary committee(s) and follow-up on its progress in Parliament.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1018"><em data-dcnode-id="1021"><span data-dcnode-id="1024" instrument_node="">The NGOs Coordination Board</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">
</span></em><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">
The NGOs Coordination Board is a semi-government agency, established by the NGO Coordination Act, 1990. Its main mandate is to streamline the registration and coordination of NGOs. Among its many responsibilities is providing policy guidelines to NGOs for harmonizing their activities with the National Development Plan for the country so that NGOs avoid activities which contradict state programs.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The NGOs Coordination Board will be the link between the Working Group and government institutions in the course of the implementation of the review process. The Board will coordinate activities that relate to securing consensus among Government institutions and agencies on the need for a positive NGO legal framework. It will also play a key role in helping to move proposals through the necessary legal reform channels and in ensuring that the laws are subsequently implemented accordingly. In addition, the Board will participate as a member of the NGO Law Working Group. It will provide the Working Group with access to up-to-date accurate and timely information on the progress made by the bill during the legislative process.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Being a semi-autonomous government agency, the Board will need to rely on NGOs to undertake activities with regard to the mobilization of the sector. Hence, NGO networks will mobilize the NGO sector to engage in the review of the NGO Coordination Act.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1001"><em data-dcnode-id="1007"><span data-dcnode-id="1010" instrument_node="">Civil Society/NGO Networks</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
</span></em><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">
As already mentioned, it is imperative that the initiative get the buy-in of a diverse range of organizations in the NGO sector for it to be successful. The Working Group will therefore work with key Civil Society networks such as the National Civil Society Congress (NCSC), and the Kenya Civil Society Alliance (KCSA), and the two </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">de facto</span></em><span data-dcnode-id="1002" instrument_node=""> NGO Councils to develop sectoral consensus, mobilize support for an improved working environment for NGOs, and sustain demand for change. It will take advantage of platforms provided by the NGO networks’ ongoing initiatives, for instance the NGO Week, the NGO of the Year Award, and the Civil Society of the Year Award amongst others. The NGO networks will also use a variety of channels for mobilizing their members including forums, posters and leaflets, websites, and media releases. The Working Group, through infrastructural organizations, will provide the NGO networks with assistance in the form of training on how to build and effectively coordinate sustainable sector-wide reform campaigns.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="993"><em data-dcnode-id="996"><span data-dcnode-id="999" instrument_node="">Media</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">
</span></em><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">
The value added through the participation of the broadcast and print media is their powerful role in shaping public opinion and reaching a critical mass of supporters for the campaign. Media participation will help frame the case for the need of an enabling environment for NGOs and presenting it to the public.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Most of the opinions associated with the poor image of the NGO sector are mainly held by those in urban areas, usually as a result of media coverage.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">It will therefore be vital to establish a system for dissemination of information on the initiative to broadcast and print media. The Working Group and NGO network representatives will seek opportunities to convey the need for a more enabling legal framework through speaking on broadcast media. The broadcast media will also be requested to feature a forum through which public debate on the topic will be conducted. During this forum, an NGO and Government official will be invited to speak and a media survey will be conducted. The results from the survey will be deemed to reflect the views of a sample of the Kenyan population on the issues discussed. Information to be published in leading newspapers will include the draft law or a summary of proposals for reform of the NGO Coordination Act.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="979"><em data-dcnode-id="982"><span data-dcnode-id="985" instrument_node=""> Members of Parliament Who Are Allies of the NGO sector and Parliamentary Committees</span><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">
</span></em><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
The Working Group will establish relationships with members of relevant Parliamentary Committees, for instance the Departmental Parliamentary Committee on Health, Housing, Labour and Social Welfare, as well as with Members of Parliament who moved from the NGO sector in a bid to build support for reform.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The parliamentary select committees will need to have their knowledge about the sector and its contribution to society fostered. Former NGO members will be reminded of where their real mandate comes from. The Working Group, through consulting with these stakeholders, will therefore build their understanding of and appreciation for the need for reform of the legislative framework for NGOs. This will ensure that in future, the parliamentarians will have the capacity to effectively champion the cause of the sector.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Capacity building will be carried out through specific workshops, designed for the parliamentary committee members and through invitations to participate in NGO functions and meetings where the issue of an enabling legal environment is being discussed. The parliamentary committee members and identified members of Parliament will also provide the Working Group with access to information and updates on the progress being made in the decision-making process of the revised law.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="965"><em data-dcnode-id="968"><span data-dcnode-id="971" instrument_node="">Government Institutions and Agencies</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
</span></em><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
These include government actors with a bearing on NGO operations and those likely to have direct influence in the final decisions about legal reform, e.g., the Ministry of State for National Heritage and Culture, the State Law Office, the Office of the Prime Minister, and the Office of the President, as well as agencies currently regulating other forms of CSOs, e.g., trusts, societies, CBOs, etc. These agencies will play an important role in the consultations leading to the development of the draft law as well as in determining the speed with which the proposals move through the legislative process and their eventual success. They will also have an important role to play in the implementation of the amended laws after the reforms. Capacity building efforts will be vital to ensure that these stakeholders understand their role in the review process and in the implementation of the reformed law vis-à-vis other agencies and actors, so as to ensure harmonious participation and implementation.</span></p><span data-dcnode-id="964" instrument_node="">
