</span><figure aria-describedby="caption-attachment-29926" class="wp-caption aligncenter" data-dcnode-id="2184" id="attachment_29926" style="width: 1400px"><a data-dcnode-id="2191" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo.jpg" rel="follow" target="_blank"><img alt="data analysis ngo" class="wp-image-29926 size-full" data-dcnode-id="2192" height="818" sizes="(max-width: 1400px) 100vw, 1400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo.jpg&amp;raw" srcset="https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo.jpg 1400w , https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo-768x449.jpg 768w , https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo-1024x598.jpg 1024w , https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo-770x450.jpg 770w , https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo-385x225.jpg 385w , https://149695847.v2.pressablecdn.com/wp-content/uploads/2018/11/data-analysis-ngo-20x12.jpg 20w " width="1400"></a><figcaption class="wp-caption-text" data-dcnode-id="2185" id="caption-attachment-29926"><em data-dcnode-id="2186"><span data-dcnode-id="2190" instrument_node="">(Image credit: </span><a data-dcnode-id="2188" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mychoicesfoundation.org/redalert/wp-content/uploads/sites/3/2015/11/IMG_7997.jpg" rel="follow" target="_blank"><span data-dcnode-id="2189" instrument_node="">Operation Red Alert</span></a><span data-dcnode-id="2187" instrument_node="">)</span></em></figcaption></figure><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" style="font-weight: 400;"><span data-dcnode-id="2182" instrument_node="">Non-profit and non-government organisations strive to protect and create awareness about the rights of the distressed and deserted sections of the society. Their initiatives usually try to strengthen the minorities and enhance the responsiveness and accountability of the authorities. But unfortunately, many fall short of this altruistic yet ambitious goal owing to lack of funds or concrete solutions. </span></span></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" style="font-weight: 400;"><span data-dcnode-id="2178" instrument_node="">Today’s world creates and has access to an unthinkably large amount of data, which can be harnessed to gain new insights. This is the time where the usage of data analytics powered by </span><a data-dcnode-id="2176" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//analyticsindiamag.com/visualisation-recommendation-sees-whole-new-world-when-its-boosted-through-machine-learning/"><span data-dcnode-id="2177" instrument_node="">machine learning</span></a><span data-dcnode-id="2175" instrument_node=""> has gained traction on a large scale. The sudden surge in applied artificial intelligence presents the innovators with endless possibilities.</span></span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" style="font-weight: 400;"><span data-dcnode-id="2171" instrument_node="">Non-profit organisations have historically been suffering from the lack of tools to tackle this amount of data. But things are changing now, even in </span><a data-dcnode-id="2169" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//analyticsindiamag.com/niti-aayog-ai-collaborations-2018/"><span data-dcnode-id="2170" instrument_node="">India</span></a><span data-dcnode-id="2168" instrument_node="">.</span></span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" style="font-weight: 400;"><span data-dcnode-id="2164" instrument_node="">Here we will list a few Indian NPOs and NGOs who offer and deploy data-driven solutions:</span></span></p><span data-dcnode-id="2161" instrument_node="">
</span><ol data-dcnode-id="2072" start="4"><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2150"><b data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node=""> Akshaya Patra:</span></b><span data-dcnode-id="2156" style="font-weight: 400;"><span data-dcnode-id="2157" instrument_node=""> This is a Bengaluru-based NPO which strives to eliminate classroom hunger by organizing mid-day meal schemes in government schools. As of now, they serve about 2 million children from over 14,000 schools across 12 states. With growing numbers, the </span></span><a data-dcnode-id="2153" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.akshayapatra.org/news/increasing-efficiency-with-big-data-analytics" rel="follow" target="_blank"><span data-dcnode-id="2154" style="font-weight: 400;"><span data-dcnode-id="2155" instrument_node="">Akshaya Patra</span></span></a><span data-dcnode-id="2151" style="font-weight: 400;"><span data-dcnode-id="2152" instrument_node=""> is using data analytics efficiently to serve the children and make productive use of their funds. Data analytics is helping them in solving logistic problems like figuring out the optimum route to deliver food.</span></span></li><span data-dcnode-id="2149" instrument_node="">
</span><li data-dcnode-id="2134"><b data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node=""> Data Kind:</span></b><span data-dcnode-id="2145" style="font-weight: 400;"><span data-dcnode-id="2146" instrument_node=""> This is a one-of-a-kind NPO which focuses on data collection. UK-based </span></span><a data-dcnode-id="2142" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datakind.org/chapters/datakind-blr" rel="follow" target="_blank"><span data-dcnode-id="2143" style="font-weight: 400;"><span data-dcnode-id="2144" instrument_node="">Data Kind</span></span></a><span data-dcnode-id="2140" style="font-weight: 400;"><span data-dcnode-id="2141" instrument_node=""> conducts events which are volunteered by the data scientists who not only address the impending issues but also offer solutions. Their Bengaluru chapter had recently come up with ideas like using Anganwadi data along with </span></span><a data-dcnode-id="2137" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datakind.org/blog/exploring-open-data-to-support-primary-education-in-india" rel="follow" target="_blank"><span data-dcnode-id="2138" style="font-weight: 400;"><span data-dcnode-id="2139" instrument_node="">NASER</span></span></a><span data-dcnode-id="2135" style="font-weight: 400;"><span data-dcnode-id="2136" instrument_node=""> data to develop a thematic map for achievement across all the districts in Karnataka, and the correlation of availability of drinking water and toilets to the dropout rate among students.</span></span></li><span data-dcnode-id="2133" instrument_node="">
</span><li data-dcnode-id="2115"><b data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node=""> Operation Red Alert:</span></b><span data-dcnode-id="2129" style="font-weight: 400;"><span data-dcnode-id="2130" instrument_node=""> This Hyderabad-based NGO works around the clock to curb human trafficking. Operation Red Alert began their research back in 2014. After the initial data collection, they collaborated with Australian analytics firm </span></span><a data-dcnode-id="2126" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quantium.com/" rel="follow" target="_blank"><span data-dcnode-id="2127" style="font-weight: 400;"><span data-dcnode-id="2128" instrument_node="">Quantium</span></span></a><span data-dcnode-id="2123" style="font-weight: 400;"><span data-dcnode-id="2124" style="font-weight: 400;"><span data-dcnode-id="2125" instrument_node=""> to work along with data scientists to gain insights into human trafficking. This partnership alleviates the latencies on the tech side and offers in-time grievance reporting.</span></span></span><span data-dcnode-id="2122" instrument_node="">Quantium’s data scientists design complex queries that run against multi-terabyte data sets and get more accurate results with great agility and accuracy. Their custom-built service </span><a data-dcnode-id="2120" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapr.com/customers/quantium/" rel="follow" target="_blank"><span data-dcnode-id="2121" instrument_node="">MapR</span></a><span data-dcnode-id="2119" instrument_node=""> adds performance security and the ability to segregate multiple data sets from multiple data partners for </span><a data-dcnode-id="2117" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mychoicesfoundation.org/redalert/" rel="follow" target="_blank"><span data-dcnode-id="2118" instrument_node="">Operation Red Alert</span></a><span data-dcnode-id="2116" instrument_node="">. This allows the authorities to take a prompt action which is crucial in avoiding trafficking.</span></li><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2104"><b data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Save Life Foundation:</span></b><span data-dcnode-id="2110" style="font-weight: 400;"><span data-dcnode-id="2111" instrument_node=""> Road accidents led to the death of more than 10 lakh Indians in the last decade. Save Life Foundation, therefore, commissions nation-wide </span></span><a data-dcnode-id="2107" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//savelifefoundation.org/wp-content/uploads/2017/07/Road-Safety-in-India_Public-Perception-Survey_SLF.pdf" rel="follow" target="_blank"><span data-dcnode-id="2108" style="font-weight: 400;"><span data-dcnode-id="2109" instrument_node="">surveys</span></span></a><span data-dcnode-id="2105" style="font-weight: 400;"><span data-dcnode-id="2106" instrument_node=""> to gauge the public perception about road safety in India. These surveys serve as blueprints for initial diagnosis and the data collected will be used to analyse, predict and eradicate the risk-prone areas. SLF categorises the vulnerable category within the road accidents spectrum and addresses the need to change laws and in a way, demands accountability from the local players.</span></span></li><span data-dcnode-id="2103" instrument_node="">
</span><li data-dcnode-id="2085"><b data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Digitalgreen:</span></b><span data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node=""> This NGO is a global development organization which works on uplifting the livelihoods of small farmers. They began as a project at Microsoft Research and evolved into an independent NPO which partners with global tech leaders and uses data analytics to improve the condition of unskilled farmers below the poverty line. They use a customized data collecting service </span></span><a data-dcnode-id="2096" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitalgreen.org/coco/" rel="follow" target="_blank"><span data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">COCO</span></span></a><span data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node=""> (connect online and connect offline) method. This eliminates the hurdles which come with lack of connectivity in rural areas. The </span><a data-dcnode-id="2093" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//analyticsindiamag.com/india-ready-to-lead-the-world-in-ai-ml-cloud-computing-mukesh-ambani/"><span data-dcnode-id="2094" instrument_node="">data</span></a><span data-dcnode-id="2092" instrument_node=""> can be updated and used offline as well. They have built an </span></span><a data-dcnode-id="2088" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solutions.digitalgreen.org/coco/analytics/" rel="follow" target="_blank"><span data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">analytics dashboard</span></span></a><span data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node=""> on CoCo database. This is an open source platform and can be used by anyone interested in making an impact with tech. With a database of over 5000 videos, Digital Green plans on implementing recommendation engines based predictive analytics models.</span></span></li><span data-dcnode-id="2084" instrument_node="">
</span><li data-dcnode-id="2074"><b data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Video Volunteers:</span></b><span data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node=""> VV, reportedly India’s only NGO which exclusively works on providing broad coverage to the underprivileged, uses visual media extensively. This level of extensive coverage offers a database rich with opportunities for better governance and building problem-specific models. Their flagship initiative </span></span><a data-dcnode-id="2077" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.videovolunteers.org/adivasi-community-denied-forest-rights-in-the-name-of-tiger-conservation/" rel="follow" target="_blank"><span data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">India Unheard</span></span></a><span data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node=""> reaches the remote and the despondent sections of the society.</span></span></li><span data-dcnode-id="2073" instrument_node="">
</span></ol><span data-dcnode-id="2071" instrument_node="">
</span><h3 data-dcnode-id="2068"><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Conclusion</span></b></h3><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" style="font-weight: 400;"><span data-dcnode-id="2066" instrument_node="">For a developing nation like India, it is crucial to be innovative and consistently aim to customize solutions from successful global models. This is possible only when right people or organisations with proper resources are equipped with technologies on a large scale. Data analytics is one such tool which can be used for discovering, diagnosing and deploying models which can facilitate growth and nation-building.</span></span></p><span data-dcnode-id="2063" instrument_node="">
