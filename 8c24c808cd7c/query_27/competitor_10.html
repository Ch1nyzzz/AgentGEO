1"><span data-dcnode-id="1794" instrument_node="">Job details</span></h2></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="1787"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Job Type</span></div><div data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Full-time</span></div></div></div></div><div class="mosaic-zone" data-dcnode-id="1783" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst" data-dcnode-id="1784" id="mosaic-provider-company-info-salary"></div></div><h2 class="jobsearch-JobDescriptionSection-jobDescriptionTitle icl-u-xs-my--md" data-dcnode-id="1781" id="jobDescriptionTitle"><span data-dcnode-id="1782" instrument_node="">Full Job Description</span></h2><div class="jobsearch-jobDescriptionText" data-dcnode-id="1728" id="jobDescriptionText"><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1779" instrument_node="">Researchers gather information relevant to mission needs which also have a geospatial component; this may already be in the form of spatial data or may require additional geospatial analysis. Researchers will use sophisticated analytical judgement using search algorithms and best open source research and harvesting techniques/practices from crowd sourcing sites, foreign governments, company/industry-specific websites, scientific/academic journals, web aggregators, commercially-produced datasets, VGI, NGO-produced datasets and other “sites” to fulfill customer requirements for data.</span><br data-dcnode-id="1778"/><span data-dcnode-id="1777" instrument_node=""> Conduct open source research projects for internal and external customers utilizing best practice research strategies and harvesting techniques.  Utilize native, secondary and historic source materials for discovery, extraction and analysis of information relevant to the requested project.  Prepare comprehensive findings reports, which will include preparing textual and graphic reports on the sources, methodologies, obstacles, and conclusions  Possess demonstrated experience with geospatial tools (ArcGIS, Google Earth, etc.) and common office business software (e.g., word processing, spreadsheets, e-mail, and internet browsers)  Understand shapefile, geo-database, and feature creation and attribution, including metadata, and data retrieval/storage, in order to structure research deliverables for efficient geo-spatial production.  Use critical thinking to solve difficult challenges  Understand the human aspects of regional issues  Effectively communicate with analytic writing and oral presentations  Collaborate with analysts in the NGA, DoD, IC, NSG and /or ASG  Analyze /evaluate the HG data for quality in terms of coverage, accuracy, currency, completeness, and the applicability to the requirements.  Assist the Government by providing recommendations and support in the following areas: o Providing co-located research support to Analysis and Production and Source Management and Operations Directorates analysts at multiple locations. Developing collection plans. o Recommending material acquisition. o Provide proactive research updates to websites, e.g. Intellipedia pages and other sites used by Research Center customers.</span><br data-dcnode-id="1776"/><span data-dcnode-id="1775" instrument_node=""> </span><br data-dcnode-id="1774"/><span data-dcnode-id="1773" instrument_node=""> F9223-GEO-SPI!</span><br data-dcnode-id="1772"/><span data-dcnode-id="1771" instrument_node=""> </span><br data-dcnode-id="1770"/><span data-dcnode-id="1769" instrument_node=""> </span><b data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Required Education, Experience, &amp; Skills </span></b><br data-dcnode-id="1766"/><span data-dcnode-id="1765" instrument_node=""> Experience requried:</span><br data-dcnode-id="1764"/><span data-dcnode-id="1763" instrument_node=""> Conduct open source research projects for internal and external customers utilizing best practice research strategies and harvesting techniques.  Utilize native, secondary and historic source materials for discovery, extraction and analysis of information relevant to the requested project.  Prepare comprehensive findings reports, which will include preparing textual and graphic reports on the sources, methodologies, obstacles, and conclusions  Possess demonstrated experience with geospatial tools (ArcGIS, Google Earth, etc.) and common office business software (e.g., word processing, spreadsheets, e-mail, and internet browsers)  Understand shapefile, geo-database, and feature creation and attribution, including metadata, and data retrieval/storage, in order to structure research deliverables for efficient geo-spatial production.  Use critical thinking to solve difficult challenges  Understand the human aspects of regional issues  Effectively communicate with analytic writing and oral presentations  Collaborate with analysts in the NGA, DoD, IC, NSG and /or ASG  Analyze /evaluate the HG data for quality in terms of coverage, accuracy, currency, completeness, and the applicability to the requirements.  Assist the Government by providing recommendations and support in the following areas: o Providing co-located research support to Analysis and Production and Source Management and Operations Directorates analysts at multiple locations. Developing collection plans. o Recommending material acquisition. o Provide proactive research updates to websites, e.g. Intellipedia pages and other sites used by Research Center customers.</span><br data-dcnode-id="1762"/><span data-dcnode-id="1761" instrument_node=""> </span><br data-dcnode-id="1760"/><span data-dcnode-id="1759" instrument_node=""> F9223-GEO-SPI!</span><br data-dcnode-id="1758"/><span data-dcnode-id="1757" instrument_node=""> </span><br data-dcnode-id="1756"/><span data-dcnode-id="1755" instrument_node=""> </span><b data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Preferred Education, Experience, &amp; Skills </span></b><br data-dcnode-id="1752"/><span data-dcnode-id="1751" instrument_node=""> Experience establishing cross-organizational/external working groups.</span><br data-dcnode-id="1750"/><span data-dcnode-id="1749" instrument_node=""> </span><br data-dcnode-id="1748"/><span data-dcnode-id="1747" instrument_node=""> F9223-GEO-SPI!</span><br data-dcnode-id="1746"/><span data-dcnode-id="1745" instrument_node=""> </span><br data-dcnode-id="1744"/><span data-dcnode-id="1743" instrument_node=""> </span><b data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">About BAE Systems Intelligence &amp; Security </span></b><br data-dcnode-id="1740"/><span data-dcnode-id="1739" instrument_node=""> BAE Systems, Inc. is the U.S. subsidiary of BAE Systems plc, an international defense, aerospace and security
