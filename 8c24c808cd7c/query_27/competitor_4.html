</span><h2 data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">Job opportunities - Magic Bus NGO</span></h2><span data-dcnode-id="5150" instrument_node="">
</span><p data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">At Magic Bus, we enable children and young people to move out of poverty by ensuring they complete their secondary education, delay their age of marriage, and get jobs in the organised sector. We are looking for talented and driven individuals to help us deliver a long-term, sustainable and bold strategy aiming to reach a million children across India. If you want to be part of a concerted effort to change the future for children and young people and work towards making a significant difference to people living in poverty, then please look through our vacancies below.</span></p><span data-dcnode-id="5147" instrument_node="">
</span><p data-dcnode-id="5141"><span data-dcnode-id="5146" instrument_node="">If you think you might be suitable or know someone who is, please get in touch</span><br data-dcnode-id="5145"><span data-dcnode-id="5144" instrument_node="">
with us&nbsp;at </span><a data-dcnode-id="5142" href="mailto:careers@magicbusindia.org" target="_blank"><span data-dcnode-id="5143" instrument_node="">careers@magicbusindia.org</span></a></p><span data-dcnode-id="5140" instrument_node="">
</span></div><span data-dcnode-id="5138" instrument_node="">
</span><span data-dcnode-id="5136" instrument_node="">
</span><div class="mb-sub-heading text-center" data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">

</span><span data-dcnode-id="5131" instrument_node="">

</span><p data-dcnode-id="2811"><strong data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">About Magic Bus</span></strong></p><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Founded in 1999, Magic Bus works with children and young people living in poverty, in India, taking them from a childhood full of challenges to a life with meaningful livelihoods. We equip children and young people in the age group of 12 to 18, with the skills and knowledge they need to grow up and move out of poverty. Children on the Magic Bus programme successfully fend off destabilizers such as child marriage and child labour to complete school and become first-generation salary earners having secure careers in the organised sector.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Our youth-centered Livelihoods Programme connects the aspirations and potential of young people to available market opportunities. We build their employability skills and map job potential based on individual strengths and mobility. We work with support structures like parents, teachers, the community at large and local government institutions to ensure social, emotional and economic well-being for all young people living in that area. Our approach mobilises the entire ecosystem available to the child or young person to create transformational change in their lives.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2801"><strong data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Business Context</span></strong></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Magic Bus today impacts the lives of 4, 50,000 adolescents and more than 40,000 youths directly and thousands of families indirectly. Our Programmes have brought in a paradigm shift for the many families who earlier were constrained by financial compulsions, cultural norms and other adverse living conditions.</span></p><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">While our efforts could bring school drop-out rate to below 5%, child marriage is slowly edging for extinction in the communities where we work. We envision ourselves playing a significant role in touching lives of 1.6 million adolescents and 3, 00,000 youths directly via our Childhood to Livelihood programme by the end of 2023. Like us, many great organisations are today more than willing to invest their trust in our programmes and philosophy and partner with us in realising this dream of ours as well as more than 4,00,000 families.</span></p><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">We feel that being of service to needy is the biggest opportunity that an organization like us can even find and here, we have seized it. We wish to transcend nations and enable thousands of lives in Bangladesh, Myanmar and Nepal who are reeling under poverty escape its vicious cycle.</span></p><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">In light of this, Magic Bus seeks the expertise of Institutional Fundraiser, who will be responsible for supporting it to achieve the ambitious but achievable targets for grant income for SCALE program, Adolescent programme and programmes in partnership with Government education departments.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">This role will be accountable to lead a team of 1 or more Grant managers, prospect research to ensure a regular and reliable pipeline of new prospects, developing grant proposals, whilst also leveraging existing relationships. It will also be accountable for reporting on all grants including the management of data required for measurement and evaluation. While being responsible for a specific large grant and to coordinate and manage all aspects of the grant with inputs from relevant colleagues and senior members of the team, the potential candidate is also expected to ably contribute to the institutional fundraising team in achieving its targets and goals.</span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">We’re looking for someone who is committed to helping achieve the income requirements, who has a proven eye for detail, an analytical nature and a flair for raising managing large grants. This role requires the ability to react and respond creatively to the operational and financial needs of Magic Bus.</span></p><span data-dcnode-id="2782" instrument_node="">

</span><p data-dcnode-id="1453"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">About Magic Bus</span></strong></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Founded in 1999, Magic Bus works with children and young people living in poverty, in India, taking them from a childhood full of challenges to a life with meaningful livelihoods. We equip children and young people in the age group of 12 to 18, with the skills and knowledge they need to grow up and move out of poverty. Children on the Magic Bus programme successfully fend off destabilizers such as child marriage and child labour to complete school and become first-generation salary earners having secure careers in the organised sector.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1447" lang="en-US"><span data-dcnode-id="1448" instrument_node="">Our youth-centered Livelihoods Programme connects the aspirations and potential of young people to available market opportunities. We build their employability skills and map job potential based on individual strengths and mobility. </span></span><span data-dcnode-id="1446" instrument_node="">We work with support structures like parents, teachers, the community at large and local government institutions to ensure social, emotional and economic well-being for all young people living in that area. Our approach mobilises the entire ecosystem available to the child or young person to create transformational change in their lives.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1441"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Current Context</span></strong></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Magic Bus today impacts the lives of 4, 50,000 adolescents and more than 40,000 youths directly and thousands of families indirectly. Our Programmes have brought in a paradigm shift for the many families who earlier were constrained by financial compulsions, cultural norms and other adverse living conditions.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">While our efforts could bring school drop-out rate to below 5%, child marriage is slowly edging for extinction in the communities where we work. We envision ourselves playing a significant role in touching lives of 1.6 million adolescents and 3, 00,000 youths directly via our Childhood to Livelihood programme by the end of 2023. Like us, many great organisations are today more than willing to invest their trust in our programmes and philosophy and partner with us in realising this dream of ours as well as more than 4,00,000 families.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">We feel that being of service to needy is the biggest opportunity that an organization like us can even find and here, we have seized it. We wish to transcend nations and enable thousands of lives in Bangladesh, Myanmar and Nepal who are reeling under poverty escape its vicious cycle.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">As we grow, each individual assumes a higher level accountability. In this context, we seek to strengthen the evaluation process as well as knowledge management of the organization. The Director – Impact would Lead the research, monitoring and evaluation domain which form integral parts of the knowledge vertical (Program Development) at Magic Bus.</span></p><span data-dcnode-id="1428" instrument_node="">

</span><p data-dcnode-id="1085"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">About Magic Bus</span></strong><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node=""> </span></strong></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Founded in 1999, Magic Bus works with children and young people living in poverty, in India, taking them from a childhood full of challenges to a life with meaningful livelihoods. We equip children and young people in the age group of 12 to 18, with the skills and knowledge they need to grow up and move out of poverty. Children on the Magic Bus programme successfully fend off destabilizers such as child marriage and child labour to complete school and become first-generation salary earners having secure careers in the organised sector.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Our youth-centered Livelihoods Programme connects the aspirations and potential of young people to available market opportunities. We build their employability skills and map job potential based on individual strengths and mobility. We work with support structures like parents, teachers, the community at large and local government institutions to ensure social, emotional and economic well-being for all young people living in that area. Our approach mobilises the entire ecosystem available to the child or young person to create transformational change in their lives.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1075"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Current Context</span></strong></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Magic Bus today impacts the lives of 4, 50,000 adolescents and more than 40,000 youths directly and thousands of families indirectly. Our Programmes have brought in a paradigm shift for the many families who earlier were constrained by financial compulsions, cultural norms and other adverse living conditions.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">While our efforts could bring school drop-out rate to below 5%, child marriage is slowly edging for extinction in the communities where we work. We envision ourselves playing a significant role in touching lives of 1.6 million adolescents and 3, 00,000 youths directly via our Childhood to Livelihood programme by the end of 2023. Like us, many great organisations are today more than willing to invest their trust in our programmes and philosophy and partner with us in realising this dream of ours as well as more than 4,00,000 families.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1067" instrument_node="">We feel that being of service to needy is the biggest opportunity that an organization like us can even find and here, we have seized it. We wish to transcend nations and enable thousands of lives in Bangladesh, Myanmar and Nepal who are reeling under poverty escape its vicious cycle.</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
As we grow, each individual assumes a higher level accountability. In this context, we seek to strengthen the evaluation process as well as knowledge management of the organization. The Director - Impact would Lead the research, monitoring and evaluation domain which form integral parst of the knowledge vertical (Program Development) at Magic Bus.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Key responsibilities</span></strong></p><span data-dcnode-id="1059" instrument_node="">

</span></div><span data-dcnode-id="695" instrument_node="">
</span><div class="collapse" data-dcnode-id="597" data-parent="#jCriteria15" id="responsibility15"><span data-dcnode-id="694" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="599"><span data-dcnode-id="693" instrument_node="">
</span><div class="openings-list" data-dcnode-id="601"><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="689"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Specific Responsibilities:</span></strong></p><span data-dcnode-id="688" instrument_node="">
</span><ul data-dcnode-id="620"><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Undertake comprehensive needs assessments with Households which include job seeking Youth &amp; Adults to identify their strengths &amp; limitations, training and life skills needs and overall targets for the programme.</span></p><span data-dcnode-id="683" instrument_node="">
</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Work as career counsellor to the youth &amp; adults while conveying the findings of the tests they appeared for in technology platform to ensure they have the impartial Information, Advice and Guidance that empowers them to make positive choices about potential careers.</span></p><span data-dcnode-id="677" instrument_node="">
</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Act as the lead worker in the first phase of youth’s engagement with Magic Bus Livelihood programme and ensure all youth receive the full and proper offer during this time.</span></p><span data-dcnode-id="671" instrument_node="">
</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Engage and motivate youth &amp; adults positively at all times ensuring their positive engagement.</span></p><span data-dcnode-id="665" instrument_node="">
</span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Deliver a sharp focus on all-counselling contributing to successful youth registration, placement and job retention</span></p><span data-dcnode-id="659" instrument_node="">
</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Identify and respond to risks that could lead to youth &amp; adults dropping out of the programme.</span></p><span data-dcnode-id="653" instrument_node="">
</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Build strong and trusted relationships with youth &amp; adults from the start of their engagement with Magic Bus.</span></p><span data-dcnode-id="647" instrument_node="">
</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Work with CRPs in the communities to ensure the mobilisation of youth &amp; adults happens effectively and selection criteria are properly implemented.</span></p><span data-dcnode-id="641" instrument_node="">
</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Work with colleagues at district and regional level to continuously improve the quality of the programme.</span></p><span data-dcnode-id="635" instrument_node="">
</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Undertake data collection and reporting duties that demonstrate the effectiveness of the programme.</span></p><span data-dcnode-id="629" instrument_node="">
</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Act as a role model at all times demonstrating behaviour that displays the characteristics youth should develop to be successful in their chosen field.</span></p><span data-dcnode-id="623" instrument_node="">
</span></li><span data-dcnode-id="621" instrument_node="">
</span></ul><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="613"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Reporting to: </span></strong><span data-dcnode-id="614" instrument_node="">Programme Manager</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="608"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Staff Reporting:</span></strong><span data-dcnode-id="609" instrument_node=""> None.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Salary:</span></strong><span data-dcnode-id="604" instrument_node=""> It will be Rs 18,000/- pm gross</span></p><span data-dcnode-id="602" instrument_node="">

</span><li data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">
