</span><h2 class="grop-vertical_middle text-uppercase grop-page_title" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Trafficking in Tribal Nations: the impact of sex trafficking on Native Americans</span></h2><span data-dcnode-id="871" instrument_node="">

</span><span data-dcnode-id="867" instrument_node="">

</span></section><span data-dcnode-id="862" instrument_node="">
</span><div class="grop-fix container grop-page-with_sidbr_warp grop-right-sidebar" data-dcnode-id="179" style=""><span data-dcnode-id="861" instrument_node="">
</span><article class="grop-float_left grop-page-with_sidbr_entry_content" data-dcnode-id="291"><span data-dcnode-id="860" instrument_node="">
</span><div class="grop-single_post_warp post-5392 post type-post status-publish format-standard has-post-thumbnail hentry category-child-trafficking category-children category-government category-sex-trafficking" data-dcnode-id="293" id="post-5392"><span data-dcnode-id="859" instrument_node="">
</span><span data-dcnode-id="857" instrument_node="">
</span><header class="grop-post_header grop-sigl_header" data-dcnode-id="828"><span data-dcnode-id="856" instrument_node="">
</span><div class="grop-post_image" data-dcnode-id="850"><span data-dcnode-id="855" instrument_node="">
</span><img alt="Trafficking in Tribal Nations: the impact of sex trafficking on Native Americans" class="lazyloaded" data-dcnode-id="854" data-src="https://humantraffickingsearch.org/wp-content/uploads/2020/04/38383219526_346364207f_o-e1516637146842_fgwquv.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/wp-content/uploads/2020/04/38383219526_346364207f_o-e1516637146842_fgwquv.jpg&amp;raw"><noscript data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">&lt;img src="https://humantraffickingsearch.org/wp-content/uploads/2020/04/38383219526_346364207f_o-e1516637146842_fgwquv.jpg" alt="Trafficking in Tribal Nations: the impact of sex trafficking on Native Americans"&gt;</span></noscript><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">
</span><p class="grop-post_meta" data-dcnode-id="833"><span data-dcnode-id="848" instrument_node="">
</span><span class="grop-post_date" data-dcnode-id="845"><i class="fa fa-clock-o" data-dcnode-id="847"></i><span data-dcnode-id="846" instrument_node="">January 22, 2018</span></span><span data-dcnode-id="844" instrument_node="">
</span><span class="grop-post_by" data-dcnode-id="835"><span data-dcnode-id="843" instrument_node="">
</span><i class="fa fa-pencil" data-dcnode-id="842"></i><span data-dcnode-id="841" instrument_node="">By</span><span data-dcnode-id="837"><span data-dcnode-id="840" instrument_node=""> </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/author/admin-hts/" rel="author"><span data-dcnode-id="839" instrument_node="">Human Trafficking Search</span></a></span><span data-dcnode-id="836" instrument_node=""> </span></span><span data-dcnode-id="834" instrument_node="">
</span></p><span data-dcnode-id="832" instrument_node="">
</span><h2 class="grop-post_title" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Trafficking in Tribal Nations: the impact of sex trafficking on Native Americans</span></h2><span data-dcnode-id="829" instrument_node="">
</span></header><span data-dcnode-id="827" instrument_node="">
</span><div class="grop-sigl_content" data-dcnode-id="679"><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">January 22, 2018</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="820"><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">In the United States, January is National Slavery and Human Trafficking Prevention Month. In support of this occasion, the Human Trafficking Search weekly blog seeks to examine areas of the human trafficking crisis that do not typically make the headlines. This week, it focuses on the disproportionate impact of human trafficking on Native American communities. </span></em></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="818" instrument_node="">Native Americans are victimized by human trafficking at rates higher than that of the general population. Though statistics are few and far between, testimony from experts, activists, and tribal leaders – as well as independent investigations – have revealed a disproportionate impact. In a study conducted at four sites in the U.S. and Canada, “an average of </span><strong data-dcnode-id="815"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncai.org/policy-research-center/research-data/prc-publications/TraffickingBrief.pdf" rel="noopener" target="_blank"><span data-dcnode-id="817" instrument_node="">40 percent</span></a></strong><span data-dcnode-id="814" instrument_node=""> of women involved in sex trafficking identified as an AI/AN or First Nations,” yet Native women represent 10 percent or less of the general population in the studied communities. Lisa Brunner of the National Indigenous Women’s Resource Center, </span><strong data-dcnode-id="811"><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsgac.senate.gov/download/%3Fid%3Dd77a8cba-fc3c-440d-966e-30cb06b36ee6" rel="noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">summarized the problem</span></a></strong><span data-dcnode-id="810" instrument_node=""> to Congress in 2013 as such:</span></p><span data-dcnode-id="808" instrument_node="">
</span><blockquote data-dcnode-id="805"><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">“Native women experience violent victimization at a higher rate than any other U.S. population. Congressional findings are that Native American and Alaska Native women are raped 34.1%, more than 1 in 3, will be raped in their lifetime, 64%, more than 6 in 10, will be physically assaulted. Native women are stalked more than twice the rate of other women. Native women are murdered at more than ten times the national average. Non-Indians commit 88% of violent crimes against Native women. Given the above statistical data and the historical roots of violence against Native women, the level of human trafficking given the sparse data collected can only equate to the current epidemic levels we face within our tribal communities and Nations.”</span></p></blockquote><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="803" instrument_node="">Though sex trafficking is the primary concern of both Tribal Nations and the U.S. Government, it is believed that labor trafficking and exploitation occurs as well, with the victims primarily men. Additionally, there have been a number of </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">allegations of trafficking Native babies for adoption</span></strong><span data-dcnode-id="800" instrument_node="">, most notably a 2013 Supreme Court case </span><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Adoptive Couple vs. Baby Girl</span></em><span data-dcnode-id="797" instrument_node="">.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="791"><strong data-dcnode-id="792"><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Why is human trafficking more prevalent among Native populations?&nbsp; </span></em></strong></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="789" instrument_node="">Native Americans are considered a vulnerable population. Statistics from the 2010 U.S. Census, National Intimate Partner and Sexual Violence Survey, and GAO Foster Care report illustrate that Native Americans experience higher levels of poverty, rape, and entry into the foster system – all risk factors for trafficking. The proliferation of the fracking industry also contributed to a rise in sex trafficking of Native girls and women as “man camps” were established in remote areas of Minnesota, North Dakota, and South Dakota, creating a high-demand for sex in an environment rampant with drugs, alcohol, and limited supervision. While there was widespread media coverage of the rise of sex trafficking in the Bakken, discussion of its impact on Native girls and women was limited. </span><strong data-dcnode-id="786"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhonews.com/news/2017/oct/03/sex-trafficking-significant-problem-indian-country/" rel="noopener" target="_blank"><span data-dcnode-id="788" instrument_node="">Cindy McCain</span></a></strong><span data-dcnode-id="785" instrument_node="">, co-Chair of the Arizona Human Trafficking Council and wife of Senator John McCain, argues that “Native Americans are largely overlooked as victims,” further compounding the issue and reinforcing the belief among tribal communities that the U.S. government provides little protection and support. Additionally, some believe the presence of casinos on tribal lands contributes to the demand for sex trafficking; McCain has stated that she has “witnessed with my own eyes six little girls lined up against a wall in a casino outside of Phoenix on display for customers.”</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="782" instrument_node="">The prevalence of sex trafficking of Native Americans is not solely based on the multiple risk factors associated with the community; it is, in many ways, a </span><strong data-dcnode-id="779"><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.voanews.com/a/sex-traffickers-targeting-native-american-women/3063457.html" rel="noopener" target="_blank"><span data-dcnode-id="781" instrument_node="">continuation of the marginalization of Native populations</span></a></strong><span data-dcnode-id="778" instrument_node=""> in the United States. Native women have been fetishized, bought, sold, and traded since initial European colonization of the American continent. The trauma experienced by Tribal Nations at the hands of the U.S. government has contributed to high levels of poverty and substance abuse, as well as isolation and distrust of authority that can both increase the likelihood of trafficking and complicate the legal response.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="775" instrument_node="">There are a number of challenges to addressing human trafficking in tribal communities that are unique to the Native American experience. As with all human trafficking, the covert nature of the crime makes statistics difficult to ascertain. This is further complicated by the lack of disaggregated data, which limits agencies from identifying the magnitude of the issue, “of the </span><strong data-dcnode-id="772"><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhonews.com/news/2017/oct/03/sex-trafficking-significant-problem-indian-country/" rel="noopener" target="_blank"><span data-dcnode-id="774" instrument_node="">four federal agencies</span></a></strong><span data-dcnode-id="771" instrument_node=""> that handle human-trafficking cases, only one records the race or ethnicity of the victim.” There are also overlapping jurisdictional issues between tribal, state, and federal governments that allow perpetrators to slip through the cracks and creates gaps in communication between agencies. For instance, non-Native Americans cannot be arrested or prosecuted by tribes – instead they fall under federal jurisdiction – allowing non-Native traffickers to operate with little risk. A 2012 UN Report estimates that almost</span><strong data-dcnode-id="767"><span data-dcnode-id="770" instrument_node=""> </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/Documents/HRBodies/HRCouncil/RegularSession/Session21/A-HRC-21-47-Add1_en.pdf" rel="noopener" target="_blank"><span data-dcnode-id="769" instrument_node="">80 percent</span></a></strong><span data-dcnode-id="766" instrument_node=""> of rapes of Native women occur at the hands of non-Native men, highlighting this dangerous gap in enforcement. Support services for at-risk individuals and survivors are also limited for Native American girls and women due to a lack of resources. For example, a 2016 survey identified a large gap in access to services; over two-thirds of the 650 tribal lands reviewed experienced a significant dearth of access to sexual assault examiners and sexual assault response team programs, while 381 reported </span><strong data-dcnode-id="763"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncai.org/policy-research-center/research-data/prc-publications/TraffickingBrief.pdf" rel="noopener" target="_blank"><span data-dcnode-id="765" instrument_node="">no service coverage</span></a></strong><span data-dcnode-id="762" instrument_node=""> within an hour’s driving distance.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="756"><strong data-dcnode-id="757"><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Combatting Trafficking of Native Americans </span></em></strong></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="754" instrument_node="">In recent years, human trafficking of Native Americans has received increased attention by both federal and tribal governments. Tribal Nations – such the </span><strong data-dcnode-id="751"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhonews.com/news/2017/oct/10/navajo-nation-human-trafficking-law-commended-us-s/" rel="noopener" target="_blank"><span data-dcnode-id="753" instrument_node="">Navajo Nation</span></a></strong><span data-dcnode-id="750" instrument_node=""> – have begun implementing anti-trafficking laws, raising awareness in their communities, and training initiatives. The State Department’s 2017 </span><strong data-dcnode-id="747"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/docid/5959ec2fc.html" rel="noopener" target="_blank"><span data-dcnode-id="749" instrument_node="">Trafficking in Persons Report</span></a></strong><span data-dcnode-id="746" instrument_node=""> highlights a number of actions undertaken by the U.S. government to combat sex trafficking of Native Americans, among them increased funding, collaboration with Tribal Nations on training programs, increased efforts to identify victims, human trafficking training at all National Indian Gaming Commission regional conferences, and increased resources, training, and technical assistance from the Department of Health and Human Services. Additionally, the Department of Justice recently announced that it would expand the Tribal Access Program that provides tribes access to national crime information to help address sex trafficking, the opioid crisis, and other critical issues.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="741"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">For more information on the impact of human trafficking on Native American communities, read the following reports: </span></strong></p><span data-dcnode-id="740" instrument_node="">
</span><ul data-dcnode-id="722"><span data-dcnode-id="739" instrument_node="">

</span><li data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gao.gov/assets/690/683805.pdf" rel="noopener" target="_blank"><span data-dcnode-id="734" instrument_node="">Report to Congressional Requesters: Action Needed to Identify the Number of Native American Victims Receiving Federally-funded Services</span></a></li><span data-dcnode-id="731" instrument_node="">
