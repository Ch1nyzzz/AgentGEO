</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="663"><p data-dcnode-id="1718"><span data-dcnode-id="1728" instrument_node="">With plenty of post-recession anti-banking sentiment still lingering, it’s common to see </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/fintech" target="_blank"><span data-dcnode-id="1727" instrument_node="">fintech</span></a><span data-dcnode-id="1725" instrument_node=""> and traditional banks </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2018/09/14/a-new-generation-puts-its-trust-in-tech-over-traditional-banks.html" target="_blank"><span data-dcnode-id="1724" instrument_node="">framed in oppositional terms</span></a><span data-dcnode-id="1722" instrument_node="">. There’s some truth to that, especially with disruption-minded digital-only banks, but technological innovations have transformed banking of all stripes — and nowhere is that clearer than with </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/artificial-intelligence" target="_blank"><span data-dcnode-id="1721" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="1719" instrument_node="">.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><div class="snippet-box snippet-box-text" data-dcnode-id="1710"><div data-dcnode-id="1712"><h2 class="title" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Artificial Intelligence in Banking</span></h2><div class="description" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Artificial intelligence has transformed every aspect of the banking process. AI technologies are making banking processes faster, money transfers safer and back-end operations more efficient.</span></div></div><span data-dcnode-id="1711" instrument_node="">
</span></div><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">AI has impacted every banking “office" — front, middle and back. That means even if you know nothing about the way your financial institution uses, say, complex machine learning to fend off money launderers&nbsp;or sift through mountains of data for fraud-related anomalies, you’ve probably at least interacted with its customer service chatbot, which runs on AI.</span></p><span data-dcnode-id="1707" instrument_node="">

</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1668" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="1664" role="group"><img alt="front office ai in banking" class="b-lazy b-loaded" data-dcnode-id="1667" data-entity-type="file" data-entity-uuid="6024ca6c-03e0-4a96-abb7-6d493e7a40e5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/front-office-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Customer Support &amp; Front Office</span></figcaption></figure><h2 data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Customer Support &amp; Front Office</span></h2><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">Like fabric softener and football, banks — or at least banks as physical spaces — have been cited as yet another industry that's being killed by those murderous Millennials. Indeed, nearly 40 percent of that generation don’t use&nbsp;brick-and-mortar banks for anything, </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/millennials-are-killing-list-2017-8" target="_blank"><span data-dcnode-id="1659" instrument_node="">according to Business Insider</span></a><span data-dcnode-id="1657" instrument_node="">. But consumer-facing digital banking actually dates back decades, at least to the 1960s, with the arrival of ATMs.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">Since then, clients' customer support expectations haven't&nbsp;really changed in terms of </span><em data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">what</span></em><span data-dcnode-id="1651" instrument_node=""> they expect, but&nbsp;</span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">how</span></em><span data-dcnode-id="1648" instrument_node=""> they expect them is another story. Artificial intelligence has clearly impacted this landscape, with AI-enabled chatbots and voice assistants now the norm at major financial institutions. We’re also seeing AI impact biometric authorization and, for those who enjoy the occasional throwback visit to a physical bank, AI-enabled robotic help.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1643"><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Below are a few of the players having an impact on this field.</span></strong></p><span data-dcnode-id="1642" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="1638" role="group"><img alt="kasisto customer service ai in banking" class="b-lazy b-loaded" data-dcnode-id="1641" data-entity-type="file" data-entity-uuid="f6bbb459-bdda-4080-ab83-75eb58bfaa05" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/kasisto-customer-service-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Kasisto</span></figcaption></figure><h2 data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Kasisto</span></h2><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1631"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Industry:</span></strong><span data-dcnode-id="1632" instrument_node=""> Conversational AI</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1626"><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Location:</span></strong><span data-dcnode-id="1627" instrument_node=""> NYC</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1615"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="1622" instrument_node=""> Digital-first banks — sometimes dubbed “challenger banks” or “neo-banks” — have been making headlines and attracting major investors in certain parts of the globe, especially the U.K., over the last several years. They’ve </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/11/20/technology/finance-start-ups-neo-banks.html" target="_blank"><span data-dcnode-id="1621" instrument_node="">yet to flourish in the States like they have elsewhere</span></a><span data-dcnode-id="1619" instrument_node="">, but </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinnyc.com/company/kasisto" target="_blank"><span data-dcnode-id="1618" instrument_node="">Kasisto</span></a><span data-dcnode-id="1616" instrument_node="">&nbsp;is one of the companies that’s done the most to midwife the rise, and it's&nbsp;based here in the States.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1607"><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kasisto.com/" target="_blank"><span data-dcnode-id="1613" instrument_node="">Kasisto</span></a><span data-dcnode-id="1611" instrument_node="">’s major contribution is its conversational AI platform, KAI, which banks can use to build their own chatbots and virtual assistants. It’s rooted in&nbsp;AI reasoning and natural-language understanding and generation, which means it can handle sophisticated questions about finance management that other bank customer-service digital assistants — </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bankinnovation.net/2019/01/why-bank-of-americas-erica-cannot-help-with-complex-transactions/" target="_blank"><span data-dcnode-id="1610" instrument_node="">Bank of America’s Erica</span></a><span data-dcnode-id="1608" instrument_node="">, for example — can't.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Kasisto has so far backboned AI assistants for several prominent banking institutions (including the UAE-based digital bank Liv., DBS Bank, Standard Chartered Bank and TD). The bank’s KAI-based bot walks customers&nbsp;through how to make international transfers, block credit card charges and transfer you to human help when the bot hits a wall.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p class="bix-embed-related" data-dcnode-id="1599"><span data-dcnode-id="1600"><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinnyc.com/company/kasisto" target="_blank"><span data-dcnode-id="1602" instrument_node="">View Jobs + Learn More</span></a></span></p><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1596" instrument_node="">

</span><p data-dcnode-id="1052"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="1056" instrument_node=""> One of the world's most famous robots, Pepper is a chipper maître d'-style humanoid with a tablet strapped to its chest. Debuting in 2014, Pepper didn’t incorporate artificial intelligence until four years later, when MIT offshoot </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinboston.com/company/affectiva" target="_blank"><span data-dcnode-id="1055" instrument_node="">Affectiva</span></a><span data-dcnode-id="1053" instrument_node=""> injected it with sophisticated abilities to read emotion and cognitive states. Following that upgrade, HSBC introduced it on bank floors — including, last year, at HSBC’s flagship branch on Fifth Avenue in New York. It has since been rolled out at&nbsp;Miami and Beverly Hills locations as well.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Pepper primarily handles hosting duties for HSBC — benign greeter basics like teaching customers how to open accounts, cracking jokes, relaying credit card details and more.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Still, if an emotion-reading and -mimicking humanoid sounds like prelude to the robot apocalypse, skeptics can take heart in Pepper’s still very evident limitations. In a&nbsp;</span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DzJHyaD1psMc" target="_blank"><span data-dcnode-id="1046" instrument_node="">recent video</span></a><span data-dcnode-id="1044" instrument_node="">, above, Pepper repeats a truly bizarre response whenever it’s confused: It recommends a taco.&nbsp;</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p class="bix-embed-related" data-dcnode-id="1038"><span data-dcnode-id="1039"><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinboston.com/company/affectiva" target="_blank"><span data-dcnode-id="1041" instrument_node="">View Jobs + Learn More</span></a></span></p><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1035" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="1031" role="group"><img alt="hooyu biometrics ai in banking" class="b-lazy b-loaded" data-dcnode-id="1034" data-entity-type="file" data-entity-uuid="47c52d77-b389-4197-9c34-bd5011869270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/hooyu-biometrics-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">HooYu</span></figcaption></figure><h2 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">HooYu</span></h2><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1024"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Industry:</span></strong><span data-dcnode-id="1025" instrument_node=""> Software</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1019"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Location:</span></strong><span data-dcnode-id="1020" instrument_node=""> London</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1011"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">How it’s using AI:</span></strong><span data-dcnode-id="1015" instrument_node=""> Biometrics have long since graduated from the realm of sci-fi (think,&nbsp;</span><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Blade Runner</span></em><span data-dcnode-id="1012" instrument_node="">’s iris scanners) into real-life security protocol. Chances are, with smartphone fingerprint sensors, one form is sitting right in your pocket or purse. At the same time, biometrics like facial and voice recognition are getting increasingly smarter as they intersect with artificial intelligence, which draws upon huge amounts of data to fine-tune authentication.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">The security boons are self-evident, but these innovations have also helped banks with customer service. One notable recent example is NatWest, which in June became the first major U.K. bank to allow customers to open accounts remotely with a selfie. AI-powered biometrics — developed with software partner </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hooyu.com/" target="_blank"><span data-dcnode-id="1008" instrument_node="">HooYu</span></a><span data-dcnode-id="1006" instrument_node=""> — match in real time an applicant’s selfie to a passport, government-issued I.D. card&nbsp;or other official photo identification document.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">That's standard operating procedure for the digital, mobile-only upstart banks that have popped up in the last few years, but its arrival on high street proves that users’ desire to untether even the application process from brick-and-mortar branches is no niche request.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">&nbsp;</span></p><span data-dcnode-id="998" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="994" role="group"><img alt="simudyne simulation ai in banking" class="b-lazy b-loaded" data-dcnode-id="997" data-entity-type="file" data-entity-uuid="f4db1a05-88a7-426d-acbb-6f5881973986" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/simudyne-simulation-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Simudyne</span></figcaption></figure><h2 data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Simudyne</span></h2><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="987"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Industry:</span></strong><span data-dcnode-id="988" instrument_node=""> Investment Banking, Simulation</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="982"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Location:</span></strong><span data-dcnode-id="983" instrument_node=""> London</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">How it’s using AI:&nbsp;</span></strong><span data-dcnode-id="978" instrument_node="">Automation hit investment banking earlier than other bank sectors — and it hit hard. Probably the most famous example of that is this: In 2000, there were 600 traders at the Goldman Sachs&nbsp;U.S. cash equities trading desk. In 2017, only two remained. But the result wasn’t a gutting so much as a shift: The firm has </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2018/04/30/computer-engineers-now-make-up-a-quarter-of-goldman-sachs-workforce.html" target="_blank"><span data-dcnode-id="977" instrument_node="">added thousands of computer engineer jobs</span></a><span data-dcnode-id="975" instrument_node="">.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">That shift also hit another massive banking institution, Barclays, which has doubled down on advanced technology — specifically AI. The firm led a recent $6 million funding round for </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simudyne.com/" target="_blank"><span data-dcnode-id="971" instrument_node="">Simudyne</span></a><span data-dcnode-id="969" instrument_node="">, a tech provider that uses agent-based modeling and machine learning&nbsp;to run millions of market scenarios.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">Simudyne's platform allows financial institutions to run stress test analyses and test the waters for market contagion on large scales. The company's&nbsp;chief executive Justin Lyon </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/3ab7cbf4-8281-11e8-96dd-fa565ec55929" target="_blank"><span data-dcnode-id="965" instrument_node="">told the Financial Times</span></a><span data-dcnode-id="963" instrument_node=""> that the simulation helps investment bankers spot so-called tail risks — low-probability, high-impact events.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">&nbsp;</span></p><span data-dcnode-id="958" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="954" role="group"><img alt="fraud protection ai in banking" class="b-lazy b-loaded" data-dcnode-id="957" data-entity-type="file" data-entity-uuid="7b73f3c1-ecb1-47b0-afed-0694106f0c32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/fraud-protection-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Fraud Protection &amp; Middle Office</span></figcaption></figure><h2 data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Fraud Protection &amp; Middle Office</span></h2><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">While artificial intelligence hasn’t dramatically reshaped customer-facing functions in banking (at least relative to other service industries),&nbsp;it has truly revolutionized so-called middle office functions.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The middle office&nbsp;is where banks manage risk and protect themselves from bad actors. That includes fraud detection, anti-money laundering initiatives and know-your-customer identity verification. And sometimes that means incorporating AI into legacy, rules-based anti-fraud platforms.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">But some the most innovative and secure countermeasures are other, from-the-ground-up models, built by companies like the ones below.</span></strong></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">&nbsp;</span></p><span data-dcnode-id="938" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="934" role="group"><img alt="ayasdi anti money laundering ai in banking" class="b-lazy b-loaded" data-dcnode-id="937" data-entity-type="file" data-entity-uuid="5491faf8-6a69-4e0d-9d25-27e3e38b2508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/ayasdi-anti-money-laundering-ai-in-banking.jpg&amp;raw"><figcaption data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Ayasdi</span></figcaption></figure><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Ayasdi</span></h2><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="927"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Industry:</span></strong><span data-dcnode-id="928" instrument_node=""> Artificial Intelligence, Fintech</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Location:</span></strong><span data-dcnode-id="923" instrument_node=""> Palo Alto, Calif.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="914"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">How it’s using AI:</span></strong><span data-dcnode-id="918" instrument_node=""> Up to $2 trillion is laundered every year — or five percent of global GDP, according to UN estimates. The sheer number of investigations coupled with the complexity of data and reliance on human involvement makes anti-money laundering (AML) very difficult work. It’s also expensive. AML compliance costs </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bankingexchange.com/compliance/item/7710-u-s-regulators-open-the-door-to-sharing-resources-to-fight-money-laundering" target="_blank"><span data-dcnode-id="917" instrument_node="">shot up</span></a><span data-dcnode-id="915" instrument_node=""> more than 50 percent between 2015 and 2018.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="909"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ayasdi.com/" target="_blank"><span data-dcnode-id="912" instrument_node="">Ayasdi</span></a><span data-dcnode-id="910" instrument_node="">’s AI-powered AML incorporates three key advancements: intelligent segmentation, or optimizing the data-sifting process to produce the fewest number of false positives; an advanced alert system, which auto-categorizes alert priorities; and advanced transaction monitoring, which uses machine learning to spot suspicious anomalies.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Case in point: Ayasdi’s AML AI was able to process hundreds of data points (rather than just the usual 20 or 30 transaction categories)&nbsp;for Canada’s Scotiabank and for Italian banking group Intesa Sanpaolo, purportedly resulting in a massive drop in false-positive alerts.</span></p><span data-dcnode-id="905" instrument_node="">

</span><p data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Industry:</span></strong><span data-dcnode-id="857" instrument_node=""> Artificial Intelligence, Fintech</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Location:</span></strong><span data-dcnode-id="852" instrument_node=""> NYC</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="846"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="847" instrument_node=""> “Know your customer” is pretty sound business advice across the board. It’s also federal law. Introduced under the Patriot Act in 2001, so-called KYC checks comprise a host of identity-verification requirements intended to fend off everything from terrorism funding to drug trafficking. They’re also commonly done in tandem with anti-money laundering efforts.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinnyc.com/company/socure" target="_blank"><span data-dcnode-id="844" instrument_node="">Socure</span></a><span data-dcnode-id="842" instrument_node="">’s identity verification system, ID+ Platform, uses machine learning and artificial intelligence to analyze an applicant’s online, offline and social data to help clients meet strict KYC conditions. The system runs predictive data science on information such as email addresses, phone numbers, IP addresses and proxies&nbsp;to investigate&nbsp;whether an applicant’s information is being used legitimately.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p class="bix-embed-related" data-dcnode-id="836"><span data-dcnode-id="837"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinnyc.com/company/socure" target="_blank"><span data-dcnode-id="839" instrument_node="">View Jobs + Learn More</span></a></span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">&nbsp;</span></p><span data-dcnode-id="833" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="829" role="group"><img alt="datavisor fraud detection ai in banking" class="b-lazy" data-dcnode-id="832" data-entity-type="file" data-entity-uuid="7807903f-ccd3-458c-ab1d-b84fccb47aaa" data-src="https://builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/datavisor-fraud-detection-ai-in-banking.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><figcaption data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">DataVisor</span></figcaption></figure><h2 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">DataVisor</span></h2><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Industry:</span></strong><span data-dcnode-id="823" instrument_node=""> Big Data, Machine Learning, Fraud Detection</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Location: </span></strong><span data-dcnode-id="818" instrument_node="">Mountain View, Calif.&nbsp;</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="809"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="813" instrument_node=""> Even though most banks implement fraud detection protocols, identity theft and fraud still cost American consumers </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2017/02/01/consumers-lost-more-than-16b-to-fraud-and-identity-theft-last-year.html" target="_blank"><span data-dcnode-id="812" instrument_node="">billions</span></a><span data-dcnode-id="810" instrument_node=""> of dollars each year.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">As cyber-cheats become increasingly sophisticated (manipulating identity information through account takeovers, exploiting cloud server IP addresses), financial institutions look to AI for help. </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datavisor.com/" target="_blank"><span data-dcnode-id="806" instrument_node="">DataVisor</span></a><span data-dcnode-id="804" instrument_node="">’s machine learning uses big data and so-called clustering algorithms in real time to counteract application and transaction fraud. The company touts a 94 percent fraud detection rate and claims a top 15 U.S. bank among its clients.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">&nbsp;</span></p><span data-dcnode-id="799" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="795" role="group"><img alt="consumer lending ai in banking" class="b-lazy" data-dcnode-id="798" data-entity-type="file" data-entity-uuid="41ee5f87-0ba0-4cbe-961f-f2a3c3a7d66e" data-src="https://builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/consumer-lending-ai-in-banking.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><figcaption data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Lending &amp; Risk Management</span></figcaption></figure><h2 data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Lending and Risk Management</span></h2><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">A study published in May by U.C. Berkeley researchers titled “Consumer-Lending in the FinTech Era” came to a good-news-bad-news conclusion. The good news? Fintech lenders discriminate less than lenders overall by&nbsp;about one-third. The bad news? They still discriminate. So while things are far from perfect, AI holds real promise for more equitable credit underwriting — as&nbsp;long as practitioners remain diligent about fine-tuning the algorithms.&nbsp;</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Beyond credit scoring and lending, AI has also influenced the way banks assess and manage risk and how they build and interpret contracts.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">&nbsp;</span></p><span data-dcnode-id="783" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="779" role="group"><img alt="zestfinance credit underwriting ai in banking" class="b-lazy" data-dcnode-id="782" data-entity-type="file" data-entity-uuid="f27a17bf-51a1-43e1-b5d6-3d05121bd59a" data-src="https://builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/zestfinance-credit-underwriting-ai-in-banking.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><figcaption data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">ZestFinance</span></figcaption></figure><h2 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">ZestFinance</span></h2><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Industry:</span></strong><span data-dcnode-id="773" instrument_node=""> Artificial Intelligence, Big Data, Credit Underwriting</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="767"><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Location:</span></strong><span data-dcnode-id="768" instrument_node=""> Los Angeles</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="756"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="763" instrument_node=""> Redlining, the illegal denial of credit or home loans because of race, stands as one of America’s great post-war shames. But lending practices are often tainted by bias even when explicit discrimination isn’t so apparent, like when high-cost loans notoriously and disproportionately&nbsp;affected minorities during the&nbsp;subprime mortgage crisis. As </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinla.com/company/zestfinance" target="_blank"><span data-dcnode-id="762" instrument_node="">ZestFinance</span></a><span data-dcnode-id="760" instrument_node=""> founder and former Google CIO </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/donnafuscaldo/2019/03/19/zestfinance-using-ai-to-bring-fairness-to-mortgage-lending/%2323665deb7f2d" target="_blank"><span data-dcnode-id="759" instrument_node="">Douglas Merrill told Forbes</span></a><span data-dcnode-id="757" instrument_node="">, “[Credit] models are by nature very biased. The ability to make decisions that are biased is an epidemic.”</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">ZestFinance’s AI-based software purportedly generates fairer models, essentially by downgrading credit data that it has “learned” results in unfair decisions, thus lessening the weight of some traditional (but not entirely reliable) metrics&nbsp;like credit scores.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">Of course, artificial intelligence is also susceptible to prejudice, namely machine learning bias, if it goes unmonitored. </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zestfinance.com/blog/douglas-merrill-house-financial-services-atestimony-transcript" target="_blank"><span data-dcnode-id="750" instrument_node="">As Merrill&nbsp;recently said in testimony</span></a><span data-dcnode-id="748" instrument_node=""> to the House Financial Services Committee Task Force on Artificial Intelligence, “lenders put themselves, consumers and the safety and soundness of our financial system at risk if they do not appropriately validate and monitor ML models.”</span></p><span data-dcnode-id="746" instrument_node="">
</span><p class="bix-embed-related" data-dcnode-id="742"><span data-dcnode-id="743"><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.builtinla.com/company/zestfinance" target="_blank"><span data-dcnode-id="745" instrument_node="">View Jobs + Learn More</span></a></span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;</span></p><span data-dcnode-id="739" instrument_node="">
</span><figure class="caption caption-img" data-dcnode-id="735" role="group"><img alt="jpmorgan chase investment banking ai in banking" class="b-lazy" data-dcnode-id="738" data-entity-type="file" data-entity-uuid="b5a7d04f-c64a-4fad-b73a-4d492d60913e" data-src="https://builtin.com/sites/www.builtin.com/files/styles/ckeditor_optimize/public/inline-images/national/jpmorgan-chase-investment-banking-ai-in-banking.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><figcaption data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">JPMorgan Chase</span></figcaption></figure><h2 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">JPMorgan Chase</span></h2><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="728"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Industry:</span></strong><span data-dcnode-id="729" instrument_node=""> Investment Banking</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="723"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Location:</span></strong><span data-dcnode-id="724" instrument_node=""> NYC</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="715"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="719" instrument_node=""> If you’ve accepted a job offer, inked an apartment lease&nbsp;or signed any other kind of contract in the last few years, there’s a good chance you used an electronic signature platform that either incorporated AI or was on its way to doing so. (See </span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investor.docusign.com/investors/press-releases/press-release-details/2019/DocuSign-invests-15M-in-Seal-Software-to-accelerate-adoption-of-AI-in-analyzing-agreements/default.aspx" target="_blank"><span data-dcnode-id="718" instrument_node="">DocuSign</span></a><span data-dcnode-id="716" instrument_node="">, perhaps the most ubiquitous provider, which is boosting its AI integration to help parties find buried risks hiding within agreements.)</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">Banks have latched on, too. </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpmorgan.com/country/US/en/jpmorgan" target="_blank"><span data-dcnode-id="712" instrument_node="">JPMorgan Chase</span></a><span data-dcnode-id="710" instrument_node=""> in 2016 unleashed unsupervised machine learning on its internal legal documents to quickly collect important data and extract key clauses. “In an initial implementation of this technology, we can extract 150 relevant attributes from 12,000 annual commercial credit agreements in seconds compared with as many as 360,000 hours per year under manual review,” </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpmorganchase.com/corporate/investor-relations/document/2016-annualreport.pdf" target="_blank"><span data-dcnode-id="709" instrument_node="">the company wrote</span></a><span data-dcnode-id="707" instrument_node=""> in its 2016 annual report.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The next frontier? AI-powered smart contracts. They're still a relatively new development, but one that will evolve significantly as more&nbsp;institutions — like JPMorgan — dip their toes into cryptocurrency.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">&nbsp;</span></p><span data-dcnode-id="699" instrument_node="">

</span><p data-dcnode-id="688"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Industry:</span></strong><span data-dcnode-id="689" instrument_node=""> Artificial Intelligence, Risk Assessment, Risk Management</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Location:</span></strong><span data-dcnode-id="684" instrument_node=""> San Mateo, Calif.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="678"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">How it's using AI:</span></strong><span data-dcnode-id="679" instrument_node=""> In the age of instant payments, the idea of waiting for a purchase to “clear” will one day seem as antiquated as an abacus. Increasingly, consumers expect their accounts to immediately reflect when they've bought something. At the same time, there are cyber criminals working tirelessly&nbsp;to find the newest, most effective way of swiping someone’s identity and sensitive information.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="676" instrument_node="">In an attempt to combat this, more and more banks are using AI to improve both speed and </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//builtin.com/cybersecurity/cybersecurity-banking-financial-services" target="_blank"><span data-dcnode-id="675" instrument_node="">security</span></a><span data-dcnode-id="673" instrument_node="">. Take data science company </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//feedzai.com/" target="_blank"><span data-dcnode-id="672" instrument_node="">Feedzai</span></a><span data-dcnode-id="670" instrument_node="">, which uses machine learning to help banks manage risk by monitoring transactions and raising red flags when necessary. It partnered late last year with Citibank, introducing AI technology that watches for suspicious payment behavioral shifts among clients before payments are processed.</span></p><span data-dcnode-id="668" instrument_node="">
