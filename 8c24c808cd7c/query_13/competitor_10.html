</span><div data-dcnode-id="412"><a data-dcnode-id="413" href="#h10"><span data-dcnode-id="414" style="color: #1f99e8;"><span data-dcnode-id="415" instrument_node="">WHAT IS THE ROLE OF TRANSNATIONAL ORGANISED CRIME GROUPS IN HUMAN TRAFFICKING?</span></span></a></div><span data-dcnode-id="411" instrument_node="">
</span><div data-dcnode-id="407"><a data-dcnode-id="408" href="#h11"><span data-dcnode-id="409" style="color: #1f99e8;"><span data-dcnode-id="410" instrument_node="">DO MANY TRAFFICKERS GET CAUGHT AND CONVICTED?</span></span></a></div><span data-dcnode-id="406" instrument_node="">
</span><div data-dcnode-id="402"><a data-dcnode-id="403" href="#h12"><span data-dcnode-id="404" style="color: #1f99e8;"><span data-dcnode-id="405" instrument_node="">IS THERE A LEGAL INSTRUMENT TO COMBAT HUMAN TRAFFICKING?</span></span></a></div><span data-dcnode-id="401" instrument_node="">
</span><div data-dcnode-id="397"><a data-dcnode-id="398" href="#h13"><span data-dcnode-id="399" style="color: #1f99e8;"><span data-dcnode-id="400" instrument_node="">WHAT IS THE ROLE OF TECHNOLOGY IN HUMAN TRAFFICKING?</span></span></a></div><span data-dcnode-id="396" instrument_node="">
</span><div data-dcnode-id="392"><a data-dcnode-id="393" href="#h14"><span data-dcnode-id="394" style="color: #1f99e8;"><span data-dcnode-id="395" instrument_node="">WHAT DOES UNODC DO TO COMBAT HUMAN TRAFFICKING?</span></span></a></div><span data-dcnode-id="391" instrument_node="">
</span></div><span data-dcnode-id="389" instrument_node="">
</span></div><span data-dcnode-id="387" instrument_node="">
</span></div><span data-dcnode-id="385" instrument_node="">
</span></div><span data-dcnode-id="383" instrument_node="">
</span><div class="container-fluid p-0 m-0" data-dcnode-id="74"><span data-dcnode-id="382" instrument_node="">
</span><div class="row container mx-auto px-0" data-dcnode-id="76"><span data-dcnode-id="381" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="78"><div data-dcnode-id="366"><span data-dcnode-id="380" instrument_node="">
</span><h4 data-dcnode-id="377"><strong data-dcnode-id="378"><a data-dcnode-id="379" name="h1"></a></strong></h4><span data-dcnode-id="376" instrument_node="">
</span><h4 data-dcnode-id="372"><strong data-dcnode-id="373"><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">&nbsp;</span></strong></h4><span data-dcnode-id="371" instrument_node="">
</span><h4 data-dcnode-id="368" style="padding-left: 30px;"><strong data-dcnode-id="369" style="font-size: 1em;"><span data-dcnode-id="370" instrument_node="">WHAT IS HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span><div data-dcnode-id="355" style="padding-left: 30px;"><span data-dcnode-id="364" instrument_node="">Human trafficking is a global crime that trades in people and exploits them for profit. People
         of all genders, ages and backgrounds can become victims of this crime, which occurs in every region of the world. Traffickers
         use violence, fraudulent employment agencies, and fake promises of education and job opportunities to trick, coerce and deceive
         their victims. The organized networks or individuals behind this lucrative crime take advantage of people who are vulnerable,
         desperate or simply seeking a better life. Human trafficking is defined in the </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/protocol.html"><span data-dcnode-id="363" instrument_node="">UN
         Trafficking in Persons Protocol</span></a><span data-dcnode-id="361" instrument_node="">, which supplements the </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/treaties/UNTOC/Publications/TOC%2520Convention/TOCebook-e.pdf"><span data-dcnode-id="360" instrument_node="">United
         Nations Convention against Transnational Organized Crime</span></a><span data-dcnode-id="358" instrument_node="">, as "the recruitment, transport, transfer, harbouring or receipt
         of a person by such means as threat or use of force or other forms of coercion, abduction, fraud or deception for the purpose
         of exploitation".</span><br data-dcnode-id="357"><br data-dcnode-id="356"></div><span data-dcnode-id="354" instrument_node="">
</span><h5 data-dcnode-id="349" style="padding-left: 30px;"><strong data-dcnode-id="350"><span data-dcnode-id="353" instrument_node="">The definition of trafficking consists of three core elements:</span><br data-dcnode-id="352"><br data-dcnode-id="351"></strong></h5><span data-dcnode-id="348" instrument_node="">
</span><div data-dcnode-id="343" style="padding-left: 30px;"><span data-dcnode-id="347" instrument_node="">The</span><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node=""> act</span></strong><span data-dcnode-id="344" instrument_node=""> of trafficking, which means the recruitment, transportation, transfer,
         harbouring or receipt of persons.</span></div><span data-dcnode-id="342" instrument_node="">
</span><div data-dcnode-id="337" style="padding-left: 30px;"><span data-dcnode-id="341" instrument_node="">The </span><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">means</span></strong><span data-dcnode-id="338" instrument_node=""> of trafficking which includes threat of or use of force, deception,
         coercion, abuse of power or position of vulnerability.</span></div><span data-dcnode-id="336" instrument_node="">
</span><div data-dcnode-id="330" style="padding-left: 30px;"><a data-dcnode-id="335" name="h2"></a><span data-dcnode-id="334" instrument_node="">The</span><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node=""> purpose</span></strong><span data-dcnode-id="331" instrument_node=""> of trafficking which is always exploitation.</span></div><span data-dcnode-id="329" instrument_node="">
</span><div data-dcnode-id="321" style="padding-left: 30px;"><span data-dcnode-id="328" instrument_node="">Learn more about human trafficking </span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/crime.html"><span data-dcnode-id="327" instrument_node="">here</span></a><span data-dcnode-id="325" instrument_node="">.</span><br data-dcnode-id="324"><span data-dcnode-id="322" style="font-size: 1em;"><span data-dcnode-id="323" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="320" instrument_node="">
</span><div data-dcnode-id="313" style="padding-left: 30px;"><span data-dcnode-id="319" instrument_node="">
</span><h4 data-dcnode-id="315" style="padding-left: 0px;"><strong data-dcnode-id="316"><span data-dcnode-id="318" instrument_node="">HOW IS HUMAN TRAFFICKING DIFFERENT FROM MIGRANT SMUGGLING?</span><br data-dcnode-id="317"></strong></h4><span data-dcnode-id="314" instrument_node="">
</span></div><span data-dcnode-id="312" instrument_node="">
</span><div data-dcnode-id="308" style="padding-left: 30px;"><span data-dcnode-id="311" instrument_node="">These are two distinct but interconnected crimes. Both are illegal activities that treat
         people as commodities. While trafficking in persons is a crime that aims to exploit a person who may or may not be a migrant,
         smuggling of migrants does not, by definition, involve the exploitation of the migrant. Trafficking victims can be trafficked
         within their home country or internationally, whereas migrant smuggling always crosses national borders. Some trafficked people
         might start their journey by being smuggled into a country illegally, not knowing the intention of the trafficker to exploit
         them, or find themselves deceived, coerced or forced into an exploitative situation later in the process, for example being
         forced to work for no or very little money to pay for their transportation. Criminals may both traffic and smuggle people,
         employing the same routes and methods of transporting them.</span><br data-dcnode-id="310"><a data-dcnode-id="309" name="h3"></a></div><span data-dcnode-id="307" instrument_node="">
</span><div data-dcnode-id="302" style="padding-left: 30px;"><span data-dcnode-id="306" instrument_node="">Learn more about human trafficking </span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/human-trafficking.html"><span data-dcnode-id="305" instrument_node="">here</span></a><span data-dcnode-id="303" instrument_node="">.</span></div><span data-dcnode-id="301" instrument_node="">
</span><div data-dcnode-id="294" style="padding-left: 30px;"><span data-dcnode-id="300" instrument_node="">Learn more about migrant smuggling </span><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/migrant-smuggling/migrant-smuggling.html"><span data-dcnode-id="299" instrument_node="">here</span></a><span data-dcnode-id="297" instrument_node="">.</span><br data-dcnode-id="296"><br data-dcnode-id="295"></div><span data-dcnode-id="293" instrument_node="">
</span><div data-dcnode-id="287" style="padding-left: 30px;"><span data-dcnode-id="292" instrument_node="">
</span><h4 data-dcnode-id="289"><strong data-dcnode-id="290" style="font-size: 1em;"><span data-dcnode-id="291" instrument_node="">WHO ARE THE VICTIMS OF HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="288" instrument_node="">
</span></div><span data-dcnode-id="286" instrument_node="">
</span><div data-dcnode-id="274" style="padding-left: 30px;"><span data-dcnode-id="285" instrument_node="">Victims of trafficking can be any age, any gender and from anywhere in the world. According
         to UNODC’s </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/data-and-analysis/glotip.html"><span data-dcnode-id="284" instrument_node="">2020 Global Report on Trafficking in Persons</span></a><span data-dcnode-id="282" instrument_node="">
         which is compiled using official figures from over 148 countries, female victims continue to be the primary targets. The Report
         shows that in 2018 46 percent of detected victims were women and 19 percent girls. For male victims the Report shows that
         20 per cent of detected victims were men and 15 per cent were boys. The Report shows that the share of </span><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/data-and-analysis/tip/2021/GLOTiP_2020_Chapter3.pdf"><span data-dcnode-id="281" instrument_node="">children
         among detected trafficking victims</span></a><span data-dcnode-id="279" instrument_node=""> has tripled while the share of boys has increased five times over the </span><a data-dcnode-id="278" name="h4"></a><span data-dcnode-id="277" instrument_node="">past
         15 years. Globally, one in every three victims detected is a child. Girls are mainly trafficked for sexual exploitation, while
         boys are used for forced labour. The share of detected male victims has risen from around 10 per cent in 2003 to 20 per cent
         in 2018.</span><br data-dcnode-id="276"><br data-dcnode-id="275"></div><span data-dcnode-id="273" instrument_node="">
</span><div data-dcnode-id="267" style="padding-left: 30px;"><span data-dcnode-id="272" instrument_node="">
</span><h4 data-dcnode-id="269" style="padding-left: 0px;"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">WHY ARE PEOPLE TRAFFICKED?</span></strong></h4><span data-dcnode-id="268" instrument_node="">
</span></div><span data-dcnode-id="266" instrument_node="">
</span><div data-dcnode-id="260" style="padding-left: 30px;"><span data-dcnode-id="265" instrument_node="">Traffickers target&nbsp;people who are marginalized or in difficult circumstances. Undocumented
         migrants and people who are in desperate need of employment are vulnerable, particularly to trafficking for forced labour.
         Victims may be forced or tricked into an exploitative situation which constitutes trafficking after the traffickers uses violence,
         deception or blackmail. Criminals trafficking children target victims from&nbsp;</span><a data-dcnode-id="264" name="h5" style="background-color: #ffffff;"></a><span data-dcnode-id="263" instrument_node="">extremely
         poor households, dysfunctional families or those who are abandoned and have no parental care.</span><br data-dcnode-id="262"><br data-dcnode-id="261"></div><span data-dcnode-id="259" instrument_node="">
</span><div data-dcnode-id="253" style="padding-left: 30px;"><span data-dcnode-id="258" instrument_node="">
</span><h4 data-dcnode-id="255" style="padding-left: 0px;"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">WHAT IF A TRAFFICKED PERSON CONSENTS?</span></strong></h4><span data-dcnode-id="254" instrument_node="">
</span></div><span data-dcnode-id="252" instrument_node="">
</span><div data-dcnode-id="250" style="padding-left: 30px;"><span data-dcnode-id="251" instrument_node="">According to the UN Trafficking in Persons Protocol, the consent of the victim to the exploitation
         is irrelevant when the threat of or use of force, deception, coercion, abuse of power or position of vulnerability is used.
         In the case of children, consent is irrelevant regardless of whether any means were used or not.</span></div><span data-dcnode-id="249" instrument_node="">
</span><div data-dcnode-id="241" style="padding-left: 30px;"><a data-dcnode-id="248" name="h6"></a><span data-dcnode-id="247" instrument_node="">More information on this topic can be found here </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/human-trafficking/2014/UNODC_2014_Issue_Paper_Consent.pdf"><span data-dcnode-id="246" instrument_node="">The
         Role of 'Consent' in the Trafficking in Persons Protocol</span></a><span data-dcnode-id="244" instrument_node="">.</span><br data-dcnode-id="243"><br data-dcnode-id="242"></div><span data-dcnode-id="240" instrument_node="">
</span><div data-dcnode-id="234" style="padding-left: 30px;"><span data-dcnode-id="239" instrument_node="">
</span><h4 data-dcnode-id="236" style="padding-left: 0px;"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">WHO ARE THE TRAFFICKERS?</span></strong></h4><span data-dcnode-id="235" instrument_node="">
</span></div><span data-dcnode-id="233" instrument_node="">
</span><div data-dcnode-id="224" style="padding-left: 30px;"><span data-dcnode-id="232" instrument_node="">UNODC’s </span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/data-and-analysis/glotip.html"><span data-dcnode-id="231" instrument_node="">2020 Global
         Report on Trafficking in Persons</span></a><span data-dcnode-id="229" instrument_node=""> shows that almost two-thirds of people convicted of human trafficking offences in 2018
         were male, although participation of women is higher compared with other crimes. About two per cent of the total convictions
         involved traffickers who were under the age of 18. Eastern Europe and Central Asia continues to convict far more females than
         males, with 80 per cent of convictions involving women, while in Central America and in East Asia, males and females were
         convicted in near-equal shares in 2018. While many traffickers have criminal backgrounds and use trafficking as a direct source
         of income, there are also business owners, intimate partners and other family members involved in human </span><a data-dcnode-id="228" name="h7"></a><span data-dcnode-id="227" instrument_node="">trafficking.
         Court cases reveal instances of parents facilitating the sexual exploitation of their children or forcing them into street
         begging.</span><br data-dcnode-id="226"><br data-dcnode-id="225"></div><span data-dcnode-id="223" instrument_node="">
</span><div data-dcnode-id="217" style="padding-left: 30px;"><span data-dcnode-id="222" instrument_node="">
</span><h4 data-dcnode-id="219" style="padding-left: 0px;"><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">HOW WIDESPREAD IS HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="218" instrument_node="">
</span></div><span data-dcnode-id="216" instrument_node="">
</span><div data-dcnode-id="209" style="padding-left: 30px;"><span data-dcnode-id="215" instrument_node="">UNODC has been collecting international statistics on detected victims of human trafficking
         since 2003. These show that human trafficking occurs in every region of the world. States can be the origin, transit or destination
         country for victims, or even a combination of all. The collected data provide information on victims that were in contact
         with authorities and do not reflect the actual prevalence of the crime or the hidden number of victims. The data collected
         for the </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/data-and-analysis/glotip.html"><span data-dcnode-id="214" instrument_node="">2020 Global Report on Trafficking in Persons</span></a><span data-dcnode-id="212" instrument_node="">
         shows that in 2018 about 50,000 human trafficking victims were detected and reported by 148 countries. Europe, the Middle
         East, North America and some countries in East Asia and the Pacific are destinations for trafficking victims from a wide range
         of origins. For the period 2017-2018, countries in Western and Southern Europe detected victims of 125 different citizenships.
         During the same period, victims from East Asia and Sub-Saharan Africa were detected in a large number of countries in almost
         every region of the world. Central and South-Eastern European victims were detected in large </span><a data-dcnode-id="211" name="h8"></a><span data-dcnode-id="210" instrument_node="">numbers but
         mainly in European destinations.</span></div><span data-dcnode-id="208" instrument_node="">
</span><div data-dcnode-id="202" style="padding-left: 30px;"><span data-dcnode-id="207" instrument_node="">More information on regional trends in human trafficking can be found </span><a data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/data-and-analysis/tip/2021/GLOTiP_2020_Chapter6.pdf"><span data-dcnode-id="206" instrument_node="">here.</span><br data-dcnode-id="205"><br data-dcnode-id="204"></a></div><span data-dcnode-id="201" instrument_node="">
</span><h4 data-dcnode-id="197" style="padding-left: 30px;"><strong data-dcnode-id="198"><span data-dcnode-id="200" instrument_node="">WHAT ARE THE MOST COMMONLY IDENTIFIED FORMS OF HUMAN TRAFFICKING?</span><br data-dcnode-id="199"></strong></h4><span data-dcnode-id="196" instrument_node="">
</span><div data-dcnode-id="187" style="padding-left: 30px;"><span data-dcnode-id="195" instrument_node="">Human trafficking has many forms. These include exploitation in the sex, entertainment and
         hospitality industries, and as domestic workers or in forced marriages. Victims are forced to work in factories, on construction
         sites or in the agricultural sector without pay or with an inadequate salary, living in fear of violence and often in inhumane
         conditions. Some victims are tricked or coerced into having their organs removed. Children are forced to serve as soldiers
         or to commit crimes for the benefit of the criminals. The </span><a data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/data-and-analysis/glotip.html"><span data-dcnode-id="194" instrument_node="">2020
         Global Report on Trafficking in Persons</span></a><span data-dcnode-id="192" instrument_node=""> shows that 50 per cent of detected victims in 2018 were trafficked for sexual
         exploitation, 38 per cent were exploited for forced labour, six per cent were subjected to forced criminal activity, while
         one per cent were coerced into begging and smaller numbers into forced marriages, organ removal, and other purposes. The detected
         forms of exploitation vary widely across different </span><a data-dcnode-id="191" name="h9"></a><span data-dcnode-id="190" instrument_node="">subregions.The share of detected victims trafficked for
         forced labour has steadily increased for more than a decade.</span><br data-dcnode-id="189"><br data-dcnode-id="188"></div><span data-dcnode-id="186" instrument_node="">
</span><h4 data-dcnode-id="179" style="padding-left: 30px;"><strong data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">WHAT TYPES OF INDUSTRIES ARE </span></strong><strong data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">AFFECTED BY </span></strong><strong data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="178" instrument_node="">
</span><div data-dcnode-id="172" style="padding-left: 30px;"><span data-dcnode-id="177" instrument_node="">No industry or economic sector is immune to human trafficking. There are high-risk sectors,
         in which victims are most frequently found, such as </span><a data-dcnode-id="176" name="h10"></a><span data-dcnode-id="175" instrument_node="">agriculture or horticulture, construction, the garment
         and textile industries, catering and restaurants, domestic work, entertainment and the sex industry.</span><br data-dcnode-id="174"><br data-dcnode-id="173"></div><span data-dcnode-id="171" instrument_node="">
</span><div data-dcnode-id="165" style="padding-left: 30px;"><span data-dcnode-id="170" instrument_node="">
</span><h4 data-dcnode-id="167" style="padding-left: 0px;"><strong data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">WHAT IS THE ROLE OF TRANSNATIONAL ORGANISED CRIME GROUPS IN HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="166" instrument_node="">
</span></div><span data-dcnode-id="164" instrument_node="">
</span><div data-dcnode-id="160" style="padding-left: 30px;"><span data-dcnode-id="163" instrument_node="">The criminals who engage in trafficking range from organized criminal groups to individuals
         operating on their own or in small groups on an opportunistic basis. The more organized groups are commonly involved in other
         serious crimes, such as trafficking in drugs, arms and other illicit commodities, as well as corruption and the bribery of
         officials. When organized criminal groups are involved, many more victims are </span><a data-dcnode-id="162" name="h11"></a><span data-dcnode-id="161" instrument_node="">trafficked, often for longer
         periods, across wider distances and with more violence.</span></div><span data-dcnode-id="159" instrument_node="">
</span><div data-dcnode-id="157" style="padding-left: 30px;"><span data-dcnode-id="158" instrument_node="">&nbsp;</span></div><span data-dcnode-id="156" instrument_node="">
</span><div data-dcnode-id="150" style="padding-left: 30px;"><span data-dcnode-id="155" instrument_node="">
</span><h4 data-dcnode-id="152" style="padding-left: 0px;"><strong data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">DO MANY TRAFFICKERS GET CAUGHT AND CONVICTED?</span></strong></h4><span data-dcnode-id="151" instrument_node="">
</span></div><span data-dcnode-id="149" instrument_node="">
</span><div data-dcnode-id="143" style="padding-left: 30px;"><span data-dcnode-id="148" instrument_node="">While most countries have had comprehensive trafficking in persons legislation in place for
         some years, the number of convictions has only recently started to grow. The increased number of convictions broadly follows
         the increases in the number of detected and reported victims, which shows that the criminal justice response is reflecting
         the detection trend. However, several areas continue to have very low numbers of convictions for trafficking, and at the same
         time detect fewer victims. Limited numbers of detected victims and few convictions does not necessarily mean that traffickers
         are </span><a data-dcnode-id="147" name="h12"></a><span data-dcnode-id="146" instrument_node="">not&nbsp;active in these countries. Victims trafficked from regions with low detection and conviction rates
         are found in large numbers in other regions.</span><br data-dcnode-id="145"><br data-dcnode-id="144"></div><span data-dcnode-id="142" instrument_node="">
</span><div data-dcnode-id="136" style="padding-left: 30px;"><span data-dcnode-id="141" instrument_node="">
</span><h4 data-dcnode-id="138" style="padding-left: 0px;"><strong data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">IS THERE A LEGAL INSTRUMENT TO COMBAT HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="137" instrument_node="">
</span></div><span data-dcnode-id="135" instrument_node="">
</span><div data-dcnode-id="127" style="padding-left: 30px;"><span data-dcnode-id="134" instrument_node="">The main international legal instrument is the </span><a data-dcnode-id="132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/res/human-trafficking/2021the-protocol-tip_html/TIP.pdf"><span data-dcnode-id="133" instrument_node="">UN
         Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children,</span></a><span data-dcnode-id="131" instrument_node=""> that was adopted by the
         United Nations General Assembly in 2000. The Trafficking Protocol, which supplements the </span><a data-dcnode-id="129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/treaties/UNTOC/Publications/TOC%2520Convention/TOCebook-e.pdf"><span data-dcnode-id="130" instrument_node="">United
         Nations Convention against Transnational Organized Crime,</span></a><span data-dcnode-id="128" instrument_node=""> is the only international legal instrument addressing human
         trafficking as a crime. The purposes of the Protocol are to prevent and combat trafficking, protect and assist the victims,
         and promote cooperation among countries that have ratified the Protocol to meet these objectives. The Trafficking Protocol
         provides the world’s first definition of human trafficking, and it requires ratifying States to criminalize such practices.</span></div><span data-dcnode-id="126" instrument_node="">
</span><div data-dcnode-id="118" style="padding-left: 30px;"><a data-dcnode-id="125" name="h13"></a><span data-dcnode-id="124" instrument_node="">Learn more about the Trafficking Protocol </span><a data-dcnode-id="122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/protocol.html"><span data-dcnode-id="123" instrument_node="">here</span></a><span data-dcnode-id="121" instrument_node="">.</span><br data-dcnode-id="120"><br data-dcnode-id="119"></div><span data-dcnode-id="117" instrument_node="">
</span><div data-dcnode-id="111" style="padding-left: 30px;"><span data-dcnode-id="116" instrument_node="">
</span><h4 data-dcnode-id="113" style="padding-left: 0px;"><strong data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">WHAT IS THE ROLE OF TECHNOLOGY IN HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="112" instrument_node="">
</span></div><span data-dcnode-id="110" instrument_node="">
</span><div data-dcnode-id="106" style="padding-left: 30px;"><span data-dcnode-id="109" instrument_node="">Traffickers have integrated technology into their business model at every stage of the process,
         from recruiting to exploiting victims. Many children are approached by traffickers on social media. UNODC has identified two
         types of strategies, “hunting” involving a trafficker actively pursuing a victim, typically on social media and “fishing”,
         when perpetrators post job advertisements and wait for potential victims to respond. Technology can be misused by traffickers
         to launder or transfer illicit profits. It can also have a positive use in helping to combat trafficking, such as by aiding
         investigations, </span><a data-dcnode-id="108" name="h14"></a><span data-dcnode-id="107" instrument_node="">enhancing prosecutions, raising awareness, and providing services to victims.</span></div><span data-dcnode-id="105" instrument_node="">
</span><div data-dcnode-id="99" style="padding-left: 30px;"><span data-dcnode-id="104" instrument_node="">Learn more about how traffickers use the internet </span><a data-dcnode-id="100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/data-and-analysis/tip/2021/GLOTiP_2020_Chapter5.pdf"><span data-dcnode-id="103" instrument_node="">here.</span><br data-dcnode-id="102"><br data-dcnode-id="101"></a></div><span data-dcnode-id="98" instrument_node="">
</span><div data-dcnode-id="92" style="padding-left: 30px;"><span data-dcnode-id="97" instrument_node="">
</span><h4 data-dcnode-id="94" style="padding-left: 0px;"><strong data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">WHAT DOES UNODC DO TO COMBAT HUMAN TRAFFICKING?</span></strong></h4><span data-dcnode-id="93" instrument_node="">
</span></div><span data-dcnode-id="91" instrument_node="">
</span><div data-dcnode-id="89" style="padding-left: 30px;"><span data-dcnode-id="90" instrument_node="">UNODC is the leading entity within the United Nations system to address the criminal elements
         of human trafficking. It provides expertise and knowledge to UN Member States and assists them with the ratification and implementation
         of the UN Protocol on Trafficking. Its crime prevention and criminal justice experts support the development of national laws
         and policies on human trafficking, train and mentor a wide range of officials, including police officers, border control guards,
         labour inspectors and victim support specialists. With the guidance and mechanisms provided by UNODC, countries are better
         equipped to investigate and prosecute cases of human trafficking, dismantle the criminal networks behind this crime, trace
         the illegal proceeds and protect and assist victims.</span></div><span data-dcnode-id="88" instrument_node="">
</span><div data-dcnode-id="83" style="padding-left: 30px;"><span data-dcnode-id="87" instrument_node="">More information about UNODC's response to human trafficking </span><a data-dcnode-id="85" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/our-response.html"><span data-dcnode-id="86" instrument_node="">here</span></a><span data-dcnode-id="84" instrument_node="">.</span></div><span data-dcnode-id="82" instrument_node="">
