</span><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Signs of opioid or other addiction.</span></li><span data-dcnode-id="1881" instrument_node="">
</span></ul><p data-dcnode-id="1877"><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Signs of Physical or Psychological Torture</span></strong></p><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Signs of physical torture may present on a dermatological evaluation such as abrasions over bony prominences, scratches or linear abrasions from a wire, or "road rash" to extremities from being thrown from or drug by a vehicle. Ropes and cords can leave elongated, broad-type abrasions. Ropes may leave areas of bruising mixed with abrasions. Belts or cords may have loop marks, parallel lines of petechial with central sparing. Tramline bruising,&nbsp;two parallel lines of bruising, can result from being beaten with a heavy stick or baton. Cigarette burns tend to be circular with a 1 cm diameter and can fade in a few hours or a few days. Burns, in general, tend to take the shape of the object that inflicted the burn.</span></p><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Trafficking victims may be beaten or subjected to torture for a variety of reasons.&nbsp; By the guerilla pimp as a result of not meeting a quota or set of established rules, by a customer who is displeased or is just acting out a part of the sex act, or for no apparent reason other than to maintain control on the part of the trafficker. Bruises, lacerations, marks, or scars may be present on the lower back where they are hidden more easily and do not disfigure the product/victim and inadvertently make the person being trafficked less marketable.&nbsp;</span></p><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">It is important to note that some cultures practice cupping therapy and may have bruising and scars from this practice. Correlate this finding with a detailed history as well as the presence of other red flags.&nbsp;</span></p><p data-dcnode-id="1868"><strong data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Psychological and Mental Status Examination</span></strong></p><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Mental health indicators of trafficking in persons may be missed or explained away as a panic attack. Again, one must stop and take an in-depth look, considering the flags. Look for signs such as depression, suicidal ideations, self-mutilation injuries, anxiety, post-traumatic stress disorder (PTSD), and feelings of shame or guilt. Shame may keep a victim bound to a trafficking situation, often used as a control tool by a trafficker. Does the patient report nightmares, flashbacks, irrational fears, irritability, social isolation, suicidal ideations, or depression?&nbsp;</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">A trafficking victim may describe a situation as if they were an outsider looking in, a mind-body separation , creating a safe, alternate reality to cope with the atrocities they are facing and feelings of shame and guilt. They take a third-person, omniscient point of view in their storyline since this is the most trusted viewpoint. Sometimes patients exhibiting this behavior are categorized as impersonal or devoid of emotion, numb to their surroundings, or detached. This is their survival mechanism.</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Addiction issues may be present and result in withdrawal. The addiction may be fueled by the trafficker for control or by the victim to cope with the physical or emotional pain surrounding the trafficking situation.&nbsp;</span></p><p data-dcnode-id="1859"><strong data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Documentation of Assessment Findings</span></strong></p><p data-dcnode-id="1851"><span data-dcnode-id="1858" instrument_node="">Documentation of physical findings is important and may assist the victim in prosecuting their trafficker at a later date if health records get subpoenaed. Follow established documentation guidelines and reporting requirements based on state and local statute or federal law as addressed previously. Photo documentation may prove vital. Follow any protocols/policies specific to your institution regarding the taking of photos and their storage and obtain all required consent forms.</span><a data-dcnode-id="1856" href="#ref_30216256" id="link_30216256"><span data-dcnode-id="1857" instrument_node="">[3]</span></a><a data-dcnode-id="1854" href="#ref_30199350" id="link_30199350"><span data-dcnode-id="1855" instrument_node="">[32]</span></a><a data-dcnode-id="1852" href="#ref_29999277" id="link_29999277"><span data-dcnode-id="1853" instrument_node="">[33]</span></a></p><p data-dcnode-id="1850"></p><span data-dcnode-id="1849" instrument_node="">
</span></article><span data-dcnode-id="1847" instrument_node="">
</span><article class="single-article" data-dcnode-id="1722"><span data-dcnode-id="1846" instrument_node="">
</span><h3 data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Evaluation</span></h3><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1842"></p><p data-dcnode-id="1839"><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Recognition and Intervention</span></strong></p><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Once a practitioner identifies a potential trafficked person, it is imperative to establish a private, quiet, safe place to assess the patient further, much like in cases of child or elder abuse. Building rapport and providing an opportunity for the victim to feel empowered is of utmost importance and builds trust and the process of starting to build a trusted network of location people and institutions to assist the victim. Do not start a dialogue until you can establish a safe, private, and secure place.</span></p><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">In this&nbsp;era of mobile devices where a smartphone is always within easy grasp, ensure cell phones are off and not nearby. Cell phones can be another way the traffickers control the victim. The victim may have arrived alone but is always on her cell phone. The cell phone may be the trafficker's way of " keeping tabs" or listening to everything going on in the room.&nbsp;</span></p><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Maintain eye contact during conversation, speak slowly and quietly, and avoid looking down at the potential victim. Instead sit in a nearby chair where on-level eye contact, unless contrary to the patient's cultural norms, is possible. Ensure an environment where the victim can establish a sense of power and control. This empowering zone of safety may allow them to open up and admit they are victims, but more importantly, it may provide a venue for resources, opportunity, and the realization they are not alone and that help is available if they choose to accept it.&nbsp;</span></p><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Ask the patient if it is safe to talk now and if it is alright if you are the one in the room or whether they would prefer someone else. Never assume it is safe for the victim; they must confirm that it is safe.&nbsp;Safety is critical for the victim, staff, and nearby patients. Trafficking protocols will guide your care and determine a preset location that is readily available for an interview or a few minutes alone with the patient. A bereavement room set up for family notification in the event of trauma or sudden death may be one such place.</span></p><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Inform the potential victim of trafficking that you are mandated by law to report certain disclosures. Monitor their verbal and nonverbal cues. Be alert to your facial expressions, body language, and any nonverbal cues you are exhibiting. Avoid stereotyping and revictimizing the potential victim as they disclose information.&nbsp;</span></p><p data-dcnode-id="1826"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Communicating with Potential Victims</span></strong></p><p data-dcnode-id="1817"><span data-dcnode-id="1825" instrument_node="">Communicating with victims of human trafficking can be intimidating for health-care providers. The Department of&nbsp;HHS created a resource called </span><em data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Messages for Communicating with Victims of Human Trafficking</span></em><span data-dcnode-id="1822" instrument_node=""> as part of their Rescue and Restore Campaign in 2016. These messages assist healthcare providers in building a rapport with the victim and promoting a trusting environment.</span><a data-dcnode-id="1820" href="#ref_30245371" id="link_30245371"><span data-dcnode-id="1821" instrument_node="">[34]</span></a><a data-dcnode-id="1818" href="#ref_29712468" id="link_29712468"><span data-dcnode-id="1819" instrument_node="">[35]</span></a></p><p data-dcnode-id="1814"><strong data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Sample Messages to Ease Communication</span></strong></p><p data-dcnode-id="1808"><span data-dcnode-id="1813" instrument_node="">Sample messages for communicating with a victim of human trafficking according to the Department of&nbsp;HHS.</span><a data-dcnode-id="1811" href="#ref_30766444" id="link_30766444"><span data-dcnode-id="1812" instrument_node="">[36]</span></a><a data-dcnode-id="1809" href="#ref_30669999" id="link_30669999"><span data-dcnode-id="1810" instrument_node="">[37]</span></a></p><ol data-dcnode-id="1776"><span data-dcnode-id="1807" instrument_node="">
</span><li data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">We are here to help you, and our priority is your safety. We can keep you safe and protected.</span></li><span data-dcnode-id="1804" instrument_node="">
</span><li data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">We can provide you with the medical care you need as well as find you a place to stay.&nbsp;</span></li><span data-dcnode-id="1801" instrument_node="">
</span><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Everyone has the right to live without being abused or hurt, and that includes you.&nbsp;</span></li><span data-dcnode-id="1798" instrument_node="">
</span><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">You deserve a chance to live on your own and take care of yourself, be independent, and make your own choices. We can help you with that.&nbsp;</span></li><span data-dcnode-id="1795" instrument_node="">
</span><li data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">We can get you help to protect your family and your children.&nbsp;</span></li><span data-dcnode-id="1792" instrument_node="">
</span><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">You have rights and deserve to be treated according to those rights.</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">You can trust me. I will do everything within my power to help you. Assistance is available for you under the law, and there are special visas to allow you to live safely in this country.</span></li><span data-dcnode-id="1786" instrument_node="">
</span><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">No one should have to be afraid all the time. We can help.</span></li><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Help us, so this does not happen to anyone else.&nbsp;</span></li><span data-dcnode-id="1780" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">You can decide what is best for you, but let me provide you with a number to call for help 24-hours a day. You do not even have to tell them your name if you do not want to. They are there to help you anytime day or night. The National Human Trafficking Resource Center hotline number is 1.888.3737.888.&nbsp;</span></li><span data-dcnode-id="1777" instrument_node="">
</span></ol><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Do not make false promises. Only offer what you can access provide.&nbsp;</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Providers are not required to determine if a crime or a prosecutable offense has taken place. However, they can foster an empowering, caring environment to identify a victim for a potential rescue and provide invaluable resources to assist in restoring their lives and help them to begin healing emotionally and physically.&nbsp;</span></p><p data-dcnode-id="1769"><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Creating an Opportunity for Intervention</span></strong></p><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">The trafficker may be the accompanying family member that declines to leave the patient alone. Similar to intimate partner violence, the provider creates an opportunity to take the patient to the bathroom for a urine sample or to radiology for an x-ray or CAT scan, informing the family member that they cannot go with the patient. Another way to get the victim alone is to notify the alleged family or significant other that hospital policy requires you to interview and examine everyone alone.&nbsp;</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Before you separate the potential victim from the family member or controlling individual, make sure you or a dedicated, trained staff member has the time to conduct an interview/assessment at that moment.&nbsp;</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Traffickers can be parents, "boyfriends," husbands, women, men, friends, and those you would otherwise see as protectors. If privacy cannot be obtained to interview the suspected victim alone, do not confront the situation. The trafficker may cause the victim serious bodily injury after removing them from the facility if alerted to the fact that the healthcare provider is suspicious of the situation.</span></p><p data-dcnode-id="1760"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Safety</span></strong></p><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Assessment&nbsp;of the level of danger or threat to the patient and staff is imperative. Pay attention to your immediate area and follow preset protocols by your institution in notifying law enforcement and security personnel.&nbsp;</span></p><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">The NHTRC can assist you in threat level assessment, danger risk, and the contacting of law enforcement if the patient consents. Is the trafficker still nearby? How will the trafficker act if the victim does not return? Are there minors or other family members that are in danger? Is the patient a minor?&nbsp;</span></p><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">an interprofessional approach is best, if available, with a trained social worker nearby as predetermined in your trafficking protocol. Follow preset policies and procedures regarding abuse and neglect at your institution and according to local and state statute. The NHTRC hotline offers invaluable assistance with resources, assessment, and best courses of action.&nbsp;</span></p><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Much like intimate partner violence, ensure the patient has a safe place to go upon discharge.&nbsp;</span></p><p data-dcnode-id="1749"><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Reporting</span></strong></p><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">If a patient reveals they are a victim of human trafficking, ask the patient if it is alright to call the NHTRC hotline number. Encourage the patient to call and provide them with the phone number. It may be dangerous for them to keep the number on hand, so ask them if they can memorize it or give them a "shoe" or "key" card that can be hidden in their shoe or other discrete location.&nbsp;</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">The National Human Trafficking and Resource Center hotline number is available around the clock and is confidential to the extent of the law. The NHTRC is a tip hotline, a place to find out about services and to ask for help. The hotline can translate and communicate with individuals in more than 200 languages. A caller does not need to disclose any personal information to the hotline; it can be anonymous.</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">The NHTRC is available to help healthcare providers in the event of a potential trafficking case when no protocols are available. Healthcare providers can gain information in social referrals such as anti-trafficking organizations, shelters, local social services agencies, legal services, and law enforcement numbers. Tip reporting is available. The hotline provides training information and technical support on their website. The NHTRC can guide a provider in an assessment of a potential victim.&nbsp;</span></p><ul data-dcnode-id="1735"><span data-dcnode-id="1742" instrument_node="">
</span><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Report Online or Access Resources &amp; Referrals: www.traffickingresourcecenter.org</span></li><span data-dcnode-id="1739" instrument_node="">
</span><li data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Call: 1-888-373-7888 (24/7) Email: nhtrc@polarisproject.org</span></li><span data-dcnode-id="1736" instrument_node="">
</span></ul><p data-dcnode-id="1731"><em data-dcnode-id="1732"><strong data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Mandatory Reporting/HIPAA Considerations</span></strong></em></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Guidelines for the reporting of suspected cases of human trafficking for adults and children will vary depending on facility, location, state and federal laws. Adults may not want to report the incident; thus, a consideration made&nbsp;in the decision to alert law enforcement based on predetermined protocols and local or state laws coupled with patient wishes. Some states mandate reporting if serious bodily injury or a firearm is involved.&nbsp;</span></p><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">It is essential to consider Health Insurance Portability and Accountability Act (HIPAA) concerns. The practitioner must obtain permission from an adult victim of human trafficking to release any protected health information (PHI) or personally identifiable health information to the NHTRC. The NHTRC may be contacted and provided general information for a consult as long as no protected, identifiable health information is released. If the victim is under the age of 18 and involved in a commercial sex act, follow mandatory state reporting laws for child abuse and institutional child abuse policies.&nbsp;</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">HIPAA will permit the release of protected health information under certain circumstances such as suspected injury or abuse. For example, if the law mandates a disclosure as in the case of child abuse or neglect, elder abuse or neglect, and in cases reportable to the medical examiner. Reporting is permissible under HIPAA regulations if the disclosure involves a crime in an emergency, any disclosures necessary to prevent harm if the patient consents to the disclosure, and any situation where local, state, or federal law requires reporting. However, follow institutional guidelines and policies in place for HIPAA reporting requirements.</span></p><p data-dcnode-id="1724"></p><span data-dcnode-id="1723" instrument_node="">
</span></article><span data-dcnode-id="1721" instrument_node="">
</span><article class="single-article" data-dcnode-id="1654"><span data-dcnode-id="1720" instrument_node="">
</span><h3 data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Treatment / Management</span></h3><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1716"></p><p data-dcnode-id="1713"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Trafficking Health Implications</span></strong></p><p data-dcnode-id="1701"><span data-dcnode-id="1712" instrument_node="">Labor and sex trafficking carry inherent health risks and need exploration. Research studies&nbsp;in South Africa and West Bengal, India&nbsp;regarding the effects of sex trafficking and HIV risk determined that women and girls who experienced forced sexual encounters through being trafficked were 50% more likely to acquire HIV. One reason suggested that immature cervical epitheliums or cervical ectopy might lead to breaks in the vaginal mucosal and subsequent inflammation which increases the chance for HIV to spread during repeated sexual assaults in younger victims, but more research is&nbsp;</span><a data-dcnode-id="1710" href="#ref_31048837" id="link_31048837"><span data-dcnode-id="1711" instrument_node="">[38]</span></a><span data-dcnode-id="1709" instrument_node="">required </span><a data-dcnode-id="1707" href="#ref_31048837" id="link_31048837"><span data-dcnode-id="1708" instrument_node="">[38]</span></a><a data-dcnode-id="1705" href="#ref_31033666" id="link_31033666"><span data-dcnode-id="1706" instrument_node="">[21]</span></a><a data-dcnode-id="1703" href="#ref_31048837" id="link_31048837"><span data-dcnode-id="1704" instrument_node="">[38]</span></a><span data-dcnode-id="1702" instrument_node="">.&nbsp;&nbsp;</span></p><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Vulnerability and inexperience may lead to HIV and other sexually transmitted infections due to inadequate condom use and repeated exposure to older adult males throughout the trafficking lifespan.&nbsp;</span></p><p data-dcnode-id="1695"><em data-dcnode-id="1696"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Sex Trafficking Health Implications</span></strong></em></p><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">When treating these potential victims, screening for injury and sexually transmitted infections (STI) such as HIV/AIDS, herpes, syphilis, gonorrhea, chlamydia, trichomonas, hepatitis, and molluscum contagiosum needs consideration. If a recent forced sexual encounter, emergency contraception, and STI prophylaxis are considerations, following preset institutional guidelines.&nbsp;</span></p><p data-dcnode-id="1685"><span data-dcnode-id="1692" instrument_node="">Sexual assault kits may need to be obtained. Follow sexual assault collection of evidence protocols in your local area and per institutional policy. </span><em data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Project Help</span></em><span data-dcnode-id="1689" instrument_node="">, </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Rape Crisis</span></em><span data-dcnode-id="1686" instrument_node="">, and women's shelters may be a resource. Pain from daily forced sexual encounters and trauma may be an issue. Problems with urinary tract issues may warrant a urinalysis or culture. A urine sample that is not a clean catch, often referred to as "dirty urine," may be obtained to test for a sexually transmitted infection such as chlamydia. A pregnancy test may be useful.&nbsp;Toxicology studies may be needed, and alcohol levels and withdrawal issues addressed.&nbsp;</span></p><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Complications surrounding forced tampon use or "packing of the vagina" by traffickers to facilitate sexual encounters (unnoticeable to customers) while victims are menstruating may be of concern. Foreign debris may be present in the vagina on pelvic examination, and cervical cultures are a possibility if any discharge is present. That "lost tampon" patient may be a victim of trafficking and require a more in-depth assessment, asking open-ended, neutral questions to spot red flags.</span></p><p data-dcnode-id="1679"><em data-dcnode-id="1680"><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Labor Trafficking Health Implications</span></strong></em></p><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Labor trafficking victims may experience severe dehydration or malnutrition due to being forced to work long hours in construction, on farms, at factories, or in "sweatshops." Heat exhaustion or hypothermia may present in these trafficking victims.&nbsp;&nbsp;</span></p><p data-dcnode-id="1671"><span data-dcnode-id="1676" instrument_node="">According to the 2016 Global Report on Trafficking in Persons, Southeast Asia is emerging as a destination for short, medium, and long-distance trafficking. Increasing in frequency, these individuals are made to endure long ocean voyages as they are smuggled into the United States and other countries on cargo ships. These overcrowded, unsanitary conditions have infectious disease ramifications.</span><a data-dcnode-id="1674" href="#ref_30192272" id="link_30192272"><span data-dcnode-id="1675" instrument_node="">[39]</span></a><a data-dcnode-id="1672" href="#ref_29781972" id="link_29781972"><span data-dcnode-id="1673" instrument_node="">[40]</span></a></p><p data-dcnode-id="1667"><span data-dcnode-id="1670" instrument_node="">Communicable or infectious diseases such as silicosis, tuberculosis, HIV, and typhoid may be an issue. Scabies, lice, and bacterial and fungal skin infections may be a concern. Malaria, Chagas disease, cysticercosis, toxoplasmosis, toxocariasis, and trichomoniasis also may be risks. Asbestos concerns exist for miners who are victims of labor trafficking</span><a data-dcnode-id="1668" href="#ref_24397231" id="link_24397231"><span data-dcnode-id="1669" instrument_node="">[41]</span></a></p><p data-dcnode-id="1659"><span data-dcnode-id="1666" instrument_node="">Migrant workers who are being trafficked in the fishing and seafood industry may suffer from exposure to </span><em data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Vibrio </span></em><span data-dcnode-id="1663" instrument_node="">vulnificus&nbsp;and subsequent necrotizing fasciitis with septicemia if left untreated. </span><em data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Vibrio vulnificus</span></em><span data-dcnode-id="1660" instrument_node="">, found in warm climates with shallow, coastal waters, can infect a person through lacerations or breaks in their skin&nbsp;</span></p><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Labor trafficking victims may suffer from injuries related to poor ergonomics, such as back and neck injuries, vision problems, carpal tunnel syndrome, and headaches.&nbsp;</span></p><p data-dcnode-id="1656"></p><span data-dcnode-id="1655" instrument_node="">
</span></article><span data-dcnode-id="1653" instrument_node="">
</span><article class="single-article" data-dcnode-id="1583"><span data-dcnode-id="1652" instrument_node="">
</span><h3 data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Differential Diagnosis</span></h3><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1648"></p><p data-dcnode-id="1645"><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Intimate Partner Violence</span></strong></p><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Domestic violence or intimate partner violence (IPV) takes many forms and involves the maltreatment of another within a romantic union or partnership. Men, women, teenagers, heterosexuals, gay, lesbian, bisexual, and transgender may be affected. Domestic violence may include emotional, physical, sexual, economic, spiritual, or psychological insults. IPV involves one partner in the relationship subjecting the other to some form of abuse to exert power and control over them.&nbsp;</span></p><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Domestic violence, much like human trafficking, is a significant public health issue that plagues millions of people. Individuals subjected to IPV, especially as teenagers, are vulnerable to practicing risky behaviors such as drug use and sexual promiscuity. These vulnerabilities place them in high-risk situations to be victims of human trafficking. Traffickers feed off this opportunity to exert power and control over a victim. Power and control manifestation takes many forms of abuse on the part of the trafficker.</span></p><p data-dcnode-id="1638"><strong data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">The Human Trafficking Power and Control Wheel</span></strong></p><p data-dcnode-id="1630"><span data-dcnode-id="1637" instrument_node="">The Human Trafficking Power and Control Wheel finds its basis in the power and control wheel for domestic violence. The wheel for human trafficking depicts the different types of abuse inflicted on trafficking victims at the hands of traffickers. Power and control, the wheel center, represent the primary weapon a trafficker uses to the manipulate a victim and keep them bound to the trafficker.</span><a data-dcnode-id="1635" href="#ref_30810387" id="link_30810387"><span data-dcnode-id="1636" instrument_node="">[42]</span></a><a data-dcnode-id="1633" href="#ref_30775951" id="link_30775951"><span data-dcnode-id="1634" instrument_node="">[43]</span></a><a data-dcnode-id="1631" href="#ref_28934053" id="link_28934053"><span data-dcnode-id="1632" instrument_node="">[44]</span></a></p><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Other tools in the arsenal to demoralize and dehumanize a victim involve coercion and threats.&nbsp;</span></p><ol data-dcnode-id="1586"><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1623"><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Intimidation:</span></strong><span data-dcnode-id="1624" instrument_node=""> Intimidation is another tactic used by the trafficker and involves physical violence inflicted upon children, pets, or other victims. It may include threats with a weapon or actual weapon use, destruction of property, and misleading information regarding police.</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1618"><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Emotional Abuse:&nbsp;</span></strong><span data-dcnode-id="1619" instrument_node="">Emotional and psychological abuse can be particularly devastating to a victim. The trafficker humiliates the victim in front of others, calls them names, blames the victim for the situation, and convinces them that&nbsp;they would be all alone&nbsp;if the trafficker did not love and take care of them. The exploiter tells&nbsp;the&nbsp;person under their control repeatedly how worthless they are and that they are too weak to survive outside the existence the trafficker has created for them. The may threaten to expose or shame the victim by releasing sex tapes, nude photos, drug addiction, or participation in violence or sex acts against other victims.&nbsp;</span></li><span data-dcnode-id="1617" instrument_node="">
</span><li data-dcnode-id="1613"><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Isolation:</span></strong><span data-dcnode-id="1614" instrument_node=""> A trafficker may keep a victim isolated by confinement, frequently move so the victim cannot become familiar with their surroundings or keep them cut-off from others by a language barrier. A victim may be isolated from family and friends or be accompanied by the trafficker while in a public place. The trafficker may not allow the victim access to routine, preventative medical care. Thus, medical problems may be exacerbated and overall health compromised.</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1608"><strong data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Minimizing, Denying, and Blaming:&nbsp;</span></strong><span data-dcnode-id="1609" instrument_node="">A trafficker often blames the victim and denies there is anything wrong with the situation, minimizes their involvement in the abuse or exploitation, and lets the victim think the victim is the reason for their current circumstance: the victim is the one that ran away, reached out to them on social media, went to that party or hotel room.</span></li><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1603"><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Sexual Abuse:</span></strong><span data-dcnode-id="1604" instrument_node=""> Sexual assault may be useful to the trafficker as a means of power and control. The victim is treated as a sex object, only as good as the money he or she brings in. They may be forced to submit to sex with multiple partners daily or risk the wrath of the trafficker.&nbsp;Forced abortions, threats to end a pregnancy or violence during pregnancy are control tactics. Unwanted pregnancies, either through forced sexual assault or consensual sex, are a way to control a victim.</span></li><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1598"><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Using Citizenship or Residency Privilege:&nbsp;</span></strong><span data-dcnode-id="1599" instrument_node="">The trafficker may use privilege or superiority as a means of control. The trafficker may hide or threaten to destroy immigration papers such as work visas, passports, or other forms of identification. A victim might be used as a servant or as a pawn to entice others into trafficking.&nbsp;The trafficker or pimp may threaten the family, threaten to report to immigration.</span></li><span data-dcnode-id="1597" instrument_node="">
</span><li data-dcnode-id="1593"><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Economic abuse:</span></strong><span data-dcnode-id="1594" instrument_node="">&nbsp;Debt bondage is employed as a tool to manipulate and control. The victim may get charged enormous interest rates that they can never repay. They are restricted from leaving their situation because they have no access to money, are allowed only a small allowance, or have any earnings confiscated.</span></li><span data-dcnode-id="1592" instrument_node="">
</span><li data-dcnode-id="1588"><strong data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Coercion and Threats: </span></strong><span data-dcnode-id="1589" instrument_node="">Threats of or actual physical abuse is another manipulation tool used to exert power and control over the victim. It may involve shoving, punching, hitting, kicking, and strangulation injuries. Torture can take the form of cigarette burns or branding or withholding basic needs such as food, water, and clothing. Threats to harm a child bind the victim to the trafficker for fear of no food or shelter or the actual threat of physical harm to the child. They may threaten to contact the Department of Children and Families or law enforcement. Traffickers may use drugs as a form of control over the victim. Either, the introduction of drugs to the victim, or the threat to withhold drugs from a victim that is already struggling with addiction issues. These addiction issues may have led the person trafficked to the initial point of contact with the trafficker or be a result of trying to cope with the trafficking situation.</span></li><span data-dcnode-id="1587" instrument_node="">
</span></ol><p data-dcnode-id="1585"></p><span data-dcnode-id="1584" instrument_node="">
</span></article><span data-dcnode-id="1582" instrument_node="">
</span><article class="single-article" data-dcnode-id="1471"><span data-dcnode-id="1581" instrument_node="">
</span><h3 data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Prognosis</span></h3><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1577"></p><p data-dcnode-id="1574"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Victim-Centered Approach</span></strong></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">A victim-centered approach is paramount in the delivery of care to a victim of human trafficking. Defined as the precise focus of attention, catering to the needs of the victim to ensure delivery of care in a compassionate, culturally sensitive, linguistically appropriate, non-judgmental, and caring manner. A victim's wishes, safety, and well-being are considerations.&nbsp;</span></p><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The heart of a victim-centered approach ensures a victim does not suffer re-victimization or re-traumatization. Trauma, as it relates to an individual from an initial insult, is a series of events or stressors that the individual experiences as either emotionally or physically life-threatening and has lasting ramifications on social, physical, mental, and spiritual well-being.</span></p><p data-dcnode-id="1567"><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Trauma-Informed Approach</span></strong></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Human trafficking care must involve a trauma-informed approach where the healthcare provider recognizes the scope of the impact of the trauma on an individual victim’s lifespan and lessens any chance of inflicting more injury on this victim. Provider understanding of the signs of trauma, verbal and nonverbal cues, and their response by following predetermined protocols for identification, treatment, and appropriate referrals are essential elements of trauma-informed care.</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1564" instrument_node="">Trauma-informed care involves the entire healthcare team and the incorporation of shared decision-making practices using an interdisciplinary, collaborative approach. Safety, transparency, and collaboration with peers and agencies are vital. It is essential that the approach accounts for culture and gender equality, LGBTQ considerations and support, and most importantly, an empowering environment.</span><a data-dcnode-id="1562" href="#ref_30453846" id="link_30453846"><span data-dcnode-id="1563" instrument_node="">[45]</span></a></p><p data-dcnode-id="1558"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Empowerment</span></strong></p><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Empowerment allows the victim to seek out resources and take the first steps towards self-identifying. Empowerment of staff is important for them&nbsp;to&nbsp;recognize the red flags of human trafficking and feel comfortable in their training and knowledge to offer appropriate resources and follow up care to trafficking victims.&nbsp;</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The goal is for providers to enable others to champion change and advocate for protocol development, ensuring the incorporation of the Power and Control Wheel for Human Trafficking into the identification of the victim and subsequent polytrauma complex care that will be needed to empower the survivor to become a productive, functioning member of the community.&nbsp;</span></p><p data-dcnode-id="1551"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Human Trafficking Protocols</span></strong></p><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Providers must know the local resources available ahead of time and establish a human trafficking protocol much like the one for intimate partner violence or alleged sexual assaults.</span></p><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Local resources such as Project Help, rape&nbsp;crisis centers, women's shelters, homeless shelters, addiction centers, and churches can provide needed materials and support services for these victims and clarify any rules, such as pet policies.</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Know the resources available for potential victims of human trafficking through local law enforcement or task forces?</span></p><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Human trafficking protocols need to include specific vital elements such as indicators, red flags, ways to separate the potential victim from the trafficker, interview procedures, ways to maintain and ensure safety for the victim, staff, and potentially other victims and referral information.</span></p><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Mandatory reporting requirements that address local, state and federal laws need to be incorporated in a protocol. Referral information must be accurate and easily understood by the victim and translated appropriately based on language needs.&nbsp;</span></p><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Provide NHTRC Hotline information. Incorporate follow-up data into a protocol. Another part of a protocol might include a critique of staff performance and ways to improve. Mandatory staff education will play a vital role in protocol implementation.&nbsp;</span></p><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Recognize that everyone plays a role in stopping human trafficking and identifying those at risk: social workers, case managers, customer service representatives, nurses, physicians, physician assistants, nurse practitioners, nursing assistants, medical assistants, nursing students, medical students, educators, dental assistants, law enforcement, security guards, support staff, and the community.</span></p><p data-dcnode-id="1534"><strong data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Referral Considerations</span></strong></p><p data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">Long-term psychological impacts must be taken into consideration when referrals for treatment of these complex trauma patients get enacted into the treatment plan. Multifarious conditions exist emotionally and physically, rendering approaches to future care a challenge for healthcare providers </span><a data-dcnode-id="1531" href="#ref_20966379" id="link_20966379"><span data-dcnode-id="1532" instrument_node="">[46]</span></a><span data-dcnode-id="1530" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">According to the findings of a study of male and female survivors of trafficking in England conducted between 2013 to 2014, healthcare, including physical, mental, and sexual healthcare, must be a fundamental component of post-trafficking care. Follow-up care coordinated with multiple disciplines is essential. Basic needs of clothing, food, safe shelter, and transportation must be discussed. Ensure language barriers are addressed and provide resources on free classes to learn the local language. Discuss medical issues and refer to appropriate subspecialists.</span></p><p data-dcnode-id="1524"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Transitioning from Victim to Survivor&nbsp;- Potential Referrals</span></strong></p><ul data-dcnode-id="1489"><span data-dcnode-id="1523" instrument_node="">
</span><li data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Dietician consults in cases of severe malnutrition.</span></li><span data-dcnode-id="1520" instrument_node="">
</span><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Infectious disease consults for communicable diseases and sexually transmitted infections.</span></li><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Referral to obstetrics/gynecology for infertility concerns related to forced abortions, repeated trauma, or frequent miscarriages or medical problems such as prenatal concerns, addiction&nbsp;issues, torch infections,&nbsp;originating from lack of preventative care or poor access to care may need investigation. Hormone replacement therapy concerns must be met for lesbian, gay, bisexual, transgender and questioning (LGBTQ) victims.</span></li><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Surgical or dermatology referrals for removal of unwanted tattoos or brands or to treat burns and other injuries.</span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Consultations with gastroenterologists for stress-related issues.</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Children often suffer developmental delays and need assistance with transitioning into a healthy life.&nbsp;</span></li><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1504" instrument_node="">Social stigma implications of forced homosexuality can play a role in future psychological care. Crisis intervention teams and case managers will have a role in successful integration practices.</span><a data-dcnode-id="1502" href="#ref_30696049" id="link_30696049"><span data-dcnode-id="1503" instrument_node="">[47]</span></a><a data-dcnode-id="1500" href="#ref_28585156" id="link_28585156"><span data-dcnode-id="1501" instrument_node="">[48]</span></a><a data-dcnode-id="1498" href="#ref_28107164" id="link_28107164"><span data-dcnode-id="1499" instrument_node="">[49]</span></a></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Perpetrators often use substance abuse to control victims, or victims use it as a form of escape from the abusive environment. Addiction and sobriety considerations will need implementing into daily routines. Community-based organizations, support groups, and faith-based programs may ease this transition period and lessen the impact of psychological stressors.</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Legal services referrals made for child custody issues, immigration assistance, protective/restraining orders, assistance with any offenses, and with the successful prosecution of the trafficking entity.&nbsp;</span></li><span data-dcnode-id="1490" instrument_node="">
</span></ul><p data-dcnode-id="1486"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Survivor's Role</span></strong></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Cultural shock impacts and language barriers play a role in the recovery period and successful transition into society as a survivor and not a victim. Survivors of human trafficking can offer much-needed insight into the thoughts, feelings, and interactions with members of the healthcare team and guide care and training programs going forward with this vulnerable patient population .</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1483" instrument_node="">In 2015, a study conducted in New York City’s Rikers Island jail suggested that survivor-based input was essential in addressing healthcare concerns and improving care in this patient dynamic. Themes originated from these victims regarding healthcare providers such as victims feeling intimidated, judged, and stereotyped. They suggested providers and front-line personnel pay attention to their body language and nonverbal cues they are displaying as they walk into the treatment room, up to the front desk, or after disclosure. This interaction, if negative, can impact a victim feeling safe enough to open up and not be judged. These victims emphasized an approach that was not one of interrogation but asking straightforward, normalized, direct questions in a compassionate, nonjudgmental way that reinforced a feeling of safety and confidentiality.&nbsp;</span><a data-dcnode-id="1481" href="#ref_30924735" id="link_30924735"><span data-dcnode-id="1482" instrument_node="">[2]</span></a><a data-dcnode-id="1479" href="#ref_30775951" id="link_30775951"><span data-dcnode-id="1480" instrument_node="">[43]</span></a><a data-dcnode-id="1477" href="#ref_30541612" id="link_30541612"><span data-dcnode-id="1478" instrument_node="">[18]</span></a></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Further research is needed in this area for conclusive results as this crime comes "out of the shadows," and researchers look beneath the surface, but survivors should play a role in the education of healthcare providers&nbsp;</span></p><p data-dcnode-id="1473"></p><span data-dcnode-id="1472" instrument_node="">
</span></article><span data-dcnode-id="1470" instrument_node="">
</span><article class="single-article" data-dcnode-id="1400"><span data-dcnode-id="1469" instrument_node="">
</span><h3 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Pearls and Other Issues</span></h3><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1465"></p><p data-dcnode-id="1462"><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The Language of Trafficking</span></strong></p><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Languages are essential to the understanding of different cultures, environments, enterprises, and socioeconomic groups. Human trafficking and smuggling have a dialect, unique to traffickers and victims. Exploration of "trafficking vocabulary" will help practitioners relate to and understand patients who have been trafficked.&nbsp;</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">It is imperative in a victim-centered approach, much like a patient-centered approach, to communicate effectively with a potential victim or patient. The following are legal definitions and terms or "lingo" used by traffickers and victims or as they relate to human trafficking. This list continues to grow as we achieve a better understanding of human trafficking victims. Other terms may become recognizable as jargon unique to a trafficking situation.&nbsp;</span></p><p data-dcnode-id="1455"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Trafficking "Lingo"</span></strong></p><ul data-dcnode-id="1426"><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Daddy: The word a victim is required to call their pimp/trafficker.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Gorilla Pimp: A trafficker or pimp that resorts to violence to control a victim&nbsp;</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Romeo/Finesse Pimp: The trafficker that uses a false romance; a false promise of money, clothing or other gifts; or false hope of marriage to lure victims. Often referred to as "boyfriend."</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Branding: A carving, tattoo, or mark on a victim that implies ownership by a pimp/gang/trafficker. The tattoo may say, "Daddy," "Property of...," or "For sale."&nbsp;</span></li><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Quota: The amount of money expected from their trafficker/pimp each night. If quotas go unmet, the victim may be beaten, tortured, or made to work exorbitant hours until the expected amount has been delivered.</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Circuit: A series of places where prostitutes/victims get moved. Keeping them in unfamiliar surroundings increases their vulnerability and facilitates the trafficker's control over the individual.</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Date: The time and location where the sex act is to take place. The buyer or "john" meet them at this pre-determined site.</span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">The Life: Sex-trafficking victims refer to their situation as being in "the life."</span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Bottom: A victim who is chosen by the pimp or trafficker to "handle" the other victims. They may train the new victim, post ads/control social media posts, inflict punishment if rules get broken, and book the "date." This individual victim may feel tremendous shame and guilt&nbsp;because of her actions and treatment of other victims. The pimp may further control the "bottom" by threatening violence, increased quotas, or reporting her to the authorities. The "bottom" may be required to entice others into servitude by posing as a student, a concerned friend, a mother-figure.&nbsp;&nbsp;</span></li><span data-dcnode-id="1427" instrument_node="">
</span></ul><p data-dcnode-id="1423"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Trafficking Victims Protection Act Definitions</span></strong></p><ul data-dcnode-id="1403"><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Coercion: Threats of serious harm to or physical restraint against any person; any scheme, plan, or pattern intended to cause a person to believe that failure to perform an act would result in serious harm to or physical restraint against any person; or&nbsp;the abuse or threatened abuse of the legal process [22 U.S.C. 7102 (3)(a)(b)(c)].</span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Commercial Sex Act: Any sex act on account of which anything of value is given to or received by any person [22 U.S.C. 7102 (4)]&nbsp;</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Debt Bondage: The status or condition of a debtor arising from a pledge by the debtor of his or her personal services or of those of a person under his or her control as a security for debt, if the value of those services as reasonably assessed is not applied toward the liquidation of the debt or the length and nature of those services are not respectively limited and defined&nbsp;[22 U.S.C. 7102 (5)].</span></li><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Involuntary Servitude: Any scheme, plan, or pattern intended to cause a person to believe that, if the person did not enter into or continue in such condition, that person or another person would suffer serious harm or physical restraint [22 U.S.C. 7102 6 (a)].</span></li><span data-dcnode-id="1410" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Labor trafficking:&nbsp;The recruitment, harboring, transportation, provision, or obtaining of a person for labor or services, through the use of force, fraud, or coercion for the purposes of subjection to involuntary servitude, peonage, debt bondage, or slavery (22 USC § 7102).</span></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Sex trafficking:&nbsp; The recruitment, harboring, transportation, provision, obtaining, patronizing, or soliciting of a person for the purposes of a commercial sex act, in which the commercial sex act is induced by force, fraud, or coercion, or in which the person induced to perform such an act has not attained 18 years of age (22 USC § 7102).</span></li><span data-dcnode-id="1404" instrument_node="">
</span></ul><p data-dcnode-id="1402"></p><span data-dcnode-id="1401" instrument_node="">
</span></article><span data-dcnode-id="1399" instrument_node="">
</span><article class="single-article" data-dcnode-id="1383"><span data-dcnode-id="1398" instrument_node="">
</span><h3 data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Enhancing Healthcare Team Outcomes </span></h3><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1394"></p><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Human trafficking care must involve a trauma-informed approach where the healthcare provider recognizes the scope of the impact of the trauma on an individual victim’s lifespan and lessens any chance of inflicting more injury on this victim. Provider understanding of the signs of trauma, verbal and nonverbal cues, and their response by following predetermined protocols for identification, treatment, and appropriate referrals are essential elements of trauma-informed care.</span></p><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">For victims, they may suffer a diminished quality of life, and fear of autonomy and independence. The long-term mental and physical health consequences of being a victim of trafficking is immeasurable. Health professionals must work as a team to identify victims and assist their transition to a normal and productive life.</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1389" instrument_node="">Trauma-informed care involves the entire healthcare team and the incorporation of shared decision-making practices using an interprofessional, collaborative approach. Safety, transparency, and collaboration with peers and agencies are vital. </span><a data-dcnode-id="1387" href="#ref_30453846" id="link_30453846"><span data-dcnode-id="1388" instrument_node="">[45]</span></a></p><p data-dcnode-id="1385"></p><span data-dcnode-id="1384" instrument_node="">
</span></article><span data-dcnode-id="1382" instrument_node="">
