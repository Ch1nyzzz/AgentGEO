</span><section class="section section-article-post mt-4 pb-4" data-dcnode-id="1232"><span data-dcnode-id="2519" instrument_node="">
</span><div class="container" data-dcnode-id="1236"><span data-dcnode-id="2518" instrument_node="">
</span><div class="row" data-dcnode-id="1240"><span data-dcnode-id="2517" instrument_node="">
</span><div class="col-12 col-lg-9" data-dcnode-id="1344"><span data-dcnode-id="2516" instrument_node="">
</span><br data-dcnode-id="2515"><span data-dcnode-id="2514" instrument_node="">
</span><article class="single-article" data-dcnode-id="2484"><span data-dcnode-id="2513" instrument_node="">
</span><h3 data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Continuing Education Activity</span></h3><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Human trafficking is a pressing public health concern which transcends all races, social classes, demographics, and gender. No population is exempt from the ever-present threat of traffickers. Human traffickers are motivated by greed, driven by quota, devoid of respect for human rights, preying upon the vulnerable, and damaging the psychological and physical well-being of their victims. The extent of the economic and social impacts on society are unknown and require further research to define and guide community-based care, protocols, and formal curriculum changes. This activity highlights the problems of human trafficking and ways to detect and prevent it.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2506" instrument_node="">
</span><strong data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Objectives:</span></strong><span data-dcnode-id="2503" instrument_node="">
</span></p><ul data-dcnode-id="2488"><span data-dcnode-id="2501" instrument_node="">
</span><li data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Identify the problem of human trafficking globally.</span></li><span data-dcnode-id="2498" instrument_node="">
</span><li data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Review recent legislative actions to combat human trafficking.</span></li><span data-dcnode-id="2495" instrument_node="">
</span><li data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Outline the causes that lead to human trafficking.</span></li><span data-dcnode-id="2492" instrument_node="">
</span><li data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Describe interprofessional team strategies for improving care and early detection of human trafficking victims.</span></li><span data-dcnode-id="2489" instrument_node="">
</span></ul><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2486"></p><span data-dcnode-id="2485" instrument_node="">
</span></article><span data-dcnode-id="2483" instrument_node="">
</span><article class="single-article" data-dcnode-id="2383"><span data-dcnode-id="2482" instrument_node="">
</span><h3 data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Introduction</span></h3><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2478"></p><p data-dcnode-id="2472"><span data-dcnode-id="2477" instrument_node="">Human trafficking is a pressing public health concern which transcends all races, social classes, demographics, and gender. No population is exempt from the ever-present threat of traffickers. Human traffickers are motivated by greed, driven by quota, devoid of respect for human rights, preying upon the vulnerable, and damaging the psychological and physical well-being of their victims. The extent of the economic and social impacts on society are unknown and require further research to define and guide community-based care, protocols, and formal curriculum changes.&nbsp;</span><a data-dcnode-id="2475" href="#ref_28590857" id="link_28590857"><span data-dcnode-id="2476" instrument_node="">[1]</span></a><span data-dcnode-id="2474" instrument_node=""> </span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28590857"></a></p><p data-dcnode-id="2469"><strong data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Financial and Global Statistics</span></strong></p><p data-dcnode-id="2465"><span data-dcnode-id="2468" instrument_node="">Human trafficking is a $150 billion industry globally. In fact, the International Labour Organization's (ILO) 2016 estimate reveals that 40.3 million people were victimized worldwide through modern-day slavery, 5.4 victims per every thousand people in the world. Of these 40.3 million victims in 2016, 29 million were women and girls (72% of total amount).&nbsp; Almost 5 million in 2016 were victims of forced sexual exploitation globally, with children making up more than 20% of that number. According to new 2016&nbsp;global estimates, data collected by the ILO and the Walk Free Foundation (WFF) in partnership with the International Organization for Migration (IOM) as part of their contribution to the Sustainable Development Goals (SDG), puts the number close to 25 million persons who have been subjected to forced labor worldwide, and 15.4 million in forced marriages. The common thread that binds them together is the loss of freedom. Exact numbers of trafficking victims are difficult to quantitate due to the concealed nature of the rapidly progressing disease and public health emergency.&nbsp;</span><a data-dcnode-id="2466" href="#ref_30924735" id="link_30924735"><span data-dcnode-id="2467" instrument_node="">[2]</span></a></p><p data-dcnode-id="2462"><strong data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Trafficking Versus Smuggling</span></strong></p><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Distinguishing between human trafficking and human smuggling is essential. According to the Trafficking Victims Protection Act (TVPA), an anti-trafficking federal law established in 2000 under President Clinton's administration, "human trafficking" is defined as the exploitation of a person or persons for sex or labor using "force, fraud, or coercion."&nbsp;</span></p><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Smuggling differs from trafficking because it involves the illegal crossing of borders and is usually consensual. Typically, the relationship between the smuggler and the person being trafficked terminates upon arrival to the destination country. Smuggling indebtedness can lead to trafficking as a means to resolve a fee owed to the smuggling entity.&nbsp;</span></p><p data-dcnode-id="2454"><span data-dcnode-id="2457" instrument_node="">Trafficking in persons (TIP) also known as "modern-day slavery" is a crime in all 50 states under federal and international laws and does not require the physical transport of a person. It can and often does occur in local communities and schools and near popular sporting venues.</span><a data-dcnode-id="2455" href="#ref_30216256" id="link_30216256"><span data-dcnode-id="2456" instrument_node="">[3]</span></a></p><p data-dcnode-id="2451"><strong data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Essential Elements: A-M-P Model</span></strong></p><p data-dcnode-id="2445"><span data-dcnode-id="2450" instrument_node="">Human trafficking involves three essential elements: action, means, and purpose. According to the National Human Trafficking Resource Center (NHTRC) and the TVPA, the Action-Means-Purpose, or A-M-P Model helps determine whether force, fraud, or coercion was present, indicating the encounter was not consensual. A trafficker recruits, harbors, transports, provides, or obtains an individual. Force, fraud, or coercion is the means used to compel the victim to provide commercial sex acts, labor, or other services.&nbsp;</span><a data-dcnode-id="2448" href="#ref_28178913" id="link_28178913"><span data-dcnode-id="2449" instrument_node="">[4]</span></a><span data-dcnode-id="2447" instrument_node=""> </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/resources/actions-means-purpose-amp-model"></a></p><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Federal law defines "sex trafficking" as "the recruitment, harboring, transportation, provision, obtaining, patronizing, or soliciting of a person for the purposes of a commercial sex act, in which the commercial sex act is induced by force, fraud, or coercion, or in which the person induced to perform such an act has not attained 18 years of age."&nbsp;Force, fraud, or coercion do not need to be present for a minor under the age of 18 involved in any commercial sex act because minors can not consent to a sex act with an adult. Minors are&nbsp;easier to exploit and manipulate, thus vulnerable to trafficking.</span></p><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">The TVPA's definition of "labor trafficking" is "harboring, transportation, provision, or obtaining of a person for labor or services, through the use of force, fraud or coercion for the purpose of subjection to involuntary servitude, peonage, debt bondage or slavery.”</span></p><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">The United States Department of Health and Human Services's (HHS) "Look Beneath the Surface" campaign and SOAR training in 2017 provided much-needed insight into TIPs based on the latest amendments to the TVPA. For example, force may involve rape, torture, beatings, or imprisonment and can be psychological or physical.</span></p><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Physical confinement is rare; however, often "invisible chains" are used to maintain power and control, similar to intimate partner violence. Fraud may include false claims of a job, marriage, promises of a better life, or a family. Coercion also involves threats, debt, or bondage that help foster a climate of fear and intimidation and may consist of abuse of the legal process.</span></p><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">According to the TVPA, a “commercial sex act” is any sex act where anything of value is given to or received by any person, such as survival sex, drugs, transportation, food, or clothing.&nbsp;</span></p><p data-dcnode-id="2432"><strong data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Legislative Victories: The 3P's Approach</span></strong></p><p data-dcnode-id="2422"><span data-dcnode-id="2431" instrument_node="">Over the past 18 years, the US Congress has passed several comprehensive bills to bring this crime&nbsp;to light&nbsp;in domestic and international communities. This legislative process finds its basis in the 13th Amendment to the US Constitution which banned involuntary servitude and slavery in 1865. One such law, adopted in 2000, was the TVPA, which combats TIPs using the "3 Ps" approach: protection, prosecution, and prevention.&nbsp;</span><a data-dcnode-id="2429" href="#ref_30431301" id="link_30431301"><span data-dcnode-id="2430" instrument_node="">[5]</span></a><a data-dcnode-id="2427" href="#ref_30020869" id="link_30020869"><span data-dcnode-id="2428" instrument_node="">[6]</span></a><a data-dcnode-id="2425" href="#ref_29172580" id="link_29172580"><span data-dcnode-id="2426" instrument_node="">[7]</span></a><span data-dcnode-id="2424" instrument_node=""> </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/humantrafficking/key-legislation"></a></p><p data-dcnode-id="2418"><em data-dcnode-id="2419"><strong data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Protection</span></strong></em></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">The TVPA established several necessary protective measures for trafficking victims located in the United States. Regardless of immigration status, foreign persons who are trafficked are eligible for federally funded benefits such as healthcare and immigration assistance. The T visa is one such protective measure which prohibits deportation or removal of a victim of trafficking and sometimes offers an opportunity for a path to permanent residency. Human trafficking victims are especially vulnerable to re-trafficking within two years of first being trafficked and upon return to an originating country due to debt bondage or psychological, emotional, and economic conditions. Reintegration into society, coupled with functioning within societal pre-determined norms, can be traumatic for an already traumatized person who has been&nbsp;exploited by traffickers. Re-victimization must be avoided by enacting protective measures.&nbsp;</span></p><p data-dcnode-id="2412"><em data-dcnode-id="2413"><strong data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Prosecution</span></strong></em></p><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Under the TVPA act, federal prosecutors were armed with additional tools to bring traffickers to justice for their crimes against humanity. The TVPA explored the existing statutes and broadened their conservative approach. The new legislation mandated financial restitution to&nbsp;the persons they had exploited through trafficking and offered stronger penalties for those convicted of trafficking crimes. Revisions of the TVPA and subsequent enactments further defined human trafficking as “severe forms of trafficking in persons” including both sex trafficking and labor trafficking.</span></p><p data-dcnode-id="2406"><em data-dcnode-id="2407"><strong data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Prevention</span></strong></em></p><p data-dcnode-id="2396"><span data-dcnode-id="2405" instrument_node="">The third "P," prevention, is perhaps the most important of all. The TVPA strengthens prevention efforts on behalf of the US government. International incentives were enacted to improve economic conditions around the world to deter TIPs. The Office to Monitor and Combat Trafficking in Persons was created within the State Department as a result of the TVPA. Annual TIP reporting was mandated and rated countries on their efforts to reduce TIPs according to the US Department of State. </span><a data-dcnode-id="2403" href="#ref_28471337" id="link_28471337"><span data-dcnode-id="2404" instrument_node="">[8]</span></a><a data-dcnode-id="2401" href="#ref_28107159" id="link_28107159"><span data-dcnode-id="2402" instrument_node="">[9]</span></a><a data-dcnode-id="2399" href="#ref_27997232" id="link_27997232"><span data-dcnode-id="2400" instrument_node="">[10]</span></a><a data-dcnode-id="2397" href="#ref_27780111" id="link_27780111"><span data-dcnode-id="2398" instrument_node="">[11]</span></a></p><p data-dcnode-id="2390"><span data-dcnode-id="2395" instrument_node="">Furthermore, the TVPA required the creation of an Interagency Task Force to Monitor and Combat Trafficking and TVPA reauthorizations were enacted in 2003, 2005, 2008, and 2013. In 2015, adoption of the Justice for Victims of Trafficking Act allowed for additional tools to address this human rights issue and directed the Attorney General to create a National Strategy to Combat Human Trafficking and ensure its ongoing maintenance.&nbsp;</span><a data-dcnode-id="2393" href="#ref_27664496" id="link_27664496"><span data-dcnode-id="2394" instrument_node="">[12]</span></a><a data-dcnode-id="2391" href="#ref_27587443" id="link_27587443"><span data-dcnode-id="2392" instrument_node="">[13]</span></a></p><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">These legislative directives, ensured by the passage of the TVPA and the Trafficking Victims Protection Reauthorization Act (TVPRA), bring human trafficking to the forefront of conversation on an international level. Prevention through education is paramount going forward in efforts to curb the growth of this $150 billion industry, which is thought by some to surpass the drug trade in market value of criminal enterprises. Healthcare providers are on the frontline of these efforts as the first point of contact for most victims.&nbsp;</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">The US Department of State also assists in prosecuting human trafficking and smuggling cases. Diplomatic Security Service (DSS) agents and analysts often support foreign law enforcement agencies in an attempt to combat the global epidemic of TIP. On a domestic front, the US Department of State has a working relationship with federal, state, local, and tribal leaders to investigate potential cases of "modern-day slavery" for sex or labor exploitation.</span></p><p data-dcnode-id="2385"></p><span data-dcnode-id="2384" instrument_node="">
</span></article><span data-dcnode-id="2382" instrument_node="">
</span><article class="single-article" data-dcnode-id="2313"><span data-dcnode-id="2381" instrument_node="">
</span><h3 data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Etiology</span></h3><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2377"></p><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">The disease of human trafficking may find its etiology in a multitude of contributing factors that make a person susceptible to a trafficking situation.</span></p><p data-dcnode-id="2372"><strong data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Adverse Childhood Experiences</span></strong></p><p data-dcnode-id="2367"><span data-dcnode-id="2371" instrument_node="">Adverse Childhood Experiences (ACES) can increase the likelihood of risk-taking behavior that could predispose a person to a trafficking situation. A better understanding of how a high ACE score can potentiate a trafficker's hold on a victim is best explored through research. The CDC-Kaiser Permanente Adverse Childhood Experiences study was a massive study, which began in 1995 and concluded&nbsp;in 1997, that investigated the&nbsp;ramifications&nbsp;of child abuse and neglect on health and well-being later in life </span><a data-dcnode-id="2369" href="#ref_30624193" id="link_30624193"><span data-dcnode-id="2370" instrument_node="">[14]</span></a><span data-dcnode-id="2368" instrument_node="">. The CDC continues ongoing surveillance of study participants. Annually, local state-based Behavioral Risk Factor Surveillance System (BRFSS) data collection measuring the effects ACES on survivors, communities, and overall public health is reported. The ACE Pyramid conceptualizes the framework for the ACE study as it relates to individual health and well-being across the lifespan, from conception to death.</span></p><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">According to the ACE Pyramid, neurodevelopment is disrupted or stunted following an adverse childhood experience. Social, emotional, and cognitive impairments result, which progress to high-risk behaviors that negatively impact overall health. Disease, disability, and social problems ensue, cascading to an early death. Therefore, there is a correlation between a higher ACE score and an increased risk of poor physical and mental health due to poor choices, risky behaviors, and social issues.</span></p><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">An ACE questionnaire asks difficult, emotion-provoking questions related to growing up during the first 18 years of life. Questions are related to physical, emotional, and sexual abuse and the frequency of such insults. The suicide of a family member, drug addiction, and mental health issues play roles in the calculation of the score. ACE scores can range from zero to 10, with zero representing no exposure.&nbsp;</span></p><p data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">According to a Florida study, conducted between 2009 and 2015, trafficking abuse reports were highest among children with an ACE score of six or greater. Children with a sexual abuse history in connection with a higher ACE score had an increased chance of exploitation by traffickers. According to a 2017 study, sexual abuse was the most reliable predictor of a person's exploitation by traffickers </span><a data-dcnode-id="2360" href="#ref_30431301" id="link_30431301"><span data-dcnode-id="2361" instrument_node="">[5]</span></a><span data-dcnode-id="2359" instrument_node="">.</span></p><p data-dcnode-id="2355"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Lesbian, Gay, Bisexual, Transgender Questioning</span></strong></p><p data-dcnode-id="2350"><span data-dcnode-id="2354" instrument_node="">A critical distinction among the lesbian, gay, bisexual, transgender, and questioning (LGBTQ) population was revealed by the 2012 North Carolina, 2011 Washington, and 2011 and 2012 Wisconsin Behavioral Risk Factor Surveillance System (BRFSS) survey. Lesbian, gay and bisexual (LGB) individuals had higher ACE scores than their heterosexual counterparts. In this 2016 study, Austin, Herrick, and Proescholdbell concluded that the higher prevalence of ACES among LGB individuals might account for some of the increased risks for poor adult health outcomes, poor choices, and heightened risk of being trafficked.&nbsp;</span><a data-dcnode-id="2352" href="#ref_26691127" id="link_26691127"><span data-dcnode-id="2353" instrument_node="">[15]</span></a><span data-dcnode-id="2351" instrument_node="">.</span></p><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">The transgender community may seek out expensive hormone therapy and resort to "survival sex." This vulnerable position of needing money to buy this product from black market suppliers at an inflated price with exorbitant interest rates can increase the chances of being lured into trafficking. Transgender youths may have additional vulnerabilities that heighten their risk of being trafficked such as homelessness, addiction, depression, lack of financial or emotional support from family, being&nbsp;victims of intimate partner violence, and history of sexual abuse as a child. It was reported in 2013 that transgender individuals with HIV&nbsp;also&nbsp;are vulnerable to being trafficked as they struggle to have their basic needs of food and shelter met.</span></p><p data-dcnode-id="2344"><span data-dcnode-id="2347" instrument_node="">The National Center for Transgender Equality (NCTE) conducted a 2015 US Transgender Survey and found that 5% of all participants engaged in sex work for income in the past year. Fifty-five percent of those who had resorted to "survival sex" in the past year were transgender women. Approximately 19% had participated in some form&nbsp;of&nbsp;"survival sex" for money, food, sleeping quarters, or other goods or services. According to one study those who had engaged in sex for money were more likely to have experienced some form of intimate partner violence or sexual assault. Debt bondage places an "invisible chain" that binds a victim to a "Romeo" or "guerilla" pimp. The invisible chain tightens with unmet quotas and may become a physical one.</span><a data-dcnode-id="2345" href="#ref_25079777" id="link_25079777"><span data-dcnode-id="2346" instrument_node="">[16]</span></a></p><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Further resources provided by the Polaris Project address the risks of being trafficked within the LGBTQ community and are available on their website.</span></p><p data-dcnode-id="2339"><strong data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Trafficking Risk Factors and Vulnerability</span></strong></p><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Sexual abuse puts an individual at risk for substance abuse, mental health issues, and a lack of the concept of social norms, belonging, or sense of family. Vulnerability and feelings of distrust towards authority figures&nbsp;take the place of security. Often it is those who are supposed to protect them who are the initial perpetrators of the insult or crime. "Forgotten," "invisible," "different," "broken," and "discarded" are all words used to describe the feelings of individuals who are trafficked. A trafficker preys upon this vulnerability, uses it to their advantage, and strategically places themselves nearby. Often seen as a rescuer who offers a chance at a better life, security, or a remote possibility that better days are ahead, a trafficker is actually a profiler, trolling for victims to turn a profit.</span></p><p data-dcnode-id="2333"><span data-dcnode-id="2336" instrument_node="">Traffickers do not discriminate based on gender, race, social demographic, immigration status, or economic status. No exact mold fits a victim. Anyone is at risk, but certain populations have a higher vulnerability risk. The US Department of Health Office on Trafficking in Persons provided a fact sheet in 2017 to further highlight at-risk groups such as survivors of child abuse, sexual abuse, assault, interpersonal or intimate partner violence, gang members subjected to violence, or exposure to community violence.</span><a data-dcnode-id="2334" href="#ref_28590857" id="link_28590857"><span data-dcnode-id="2335" instrument_node="">[1]</span></a></p><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">The SOAR Campaign further delineates at-risk, vulnerable individuals as those lacking a stable support structure or home life such as a runaway, foster child, or child in the juvenile justice system, a homeless youth, unaccompanied minor, persons displaced due to a natural disaster, and individuals that possess a language or cultural barrier. Increased risk also involves those with substance abuse problems, undocumented or migrant workers, and the LGBTQ population. Minorities, those with disabilities, and those on Native American reservations can be at a higher risk of being trafficked.</span></p><p data-dcnode-id="2323"><span data-dcnode-id="2330" instrument_node="">The US Department of Education published a fact sheet for schools entitled "Human Trafficking of Children in the United States" which discusses the vulnerability of school-age children as it relates to human trafficking </span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.ed.gov/about/offices/list/oese/oshs/tipfactsheet91913.pdf"><span data-dcnode-id="2329" instrument_node="">(ed.gov/2013)</span></a><span data-dcnode-id="2327" instrument_node="">. Examples of identified child trafficking cases involved stripping, pornography, forced begging, commercial sex, magazine crews, drug sales, and the cultivation of the product.&nbsp;Children at greatest risk&nbsp;were identified as working in restaurants, hair and nail salons, as nannies or Au pairs, or in agricultural settings. The fact sheet goes on to describe at-risk children and those potentially immersed in the human trafficking world. Signs of child trafficking include unexplained absences, poor attendance, runaway behavior, boasting about frequent travel to other cities, and inappropriate dress for the current weather, being sleep-deprived or malnourished, or showing signs of impairment due to drugs or alcohol </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/resources/human-trafficking-awareness-educators"><span data-dcnode-id="2326" instrument_node="">[NHTRC, 2015]</span></a><span data-dcnode-id="2324" instrument_node="">.</span></p><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Lack of a stable support structure and the accessibility of social media outlets may put a child at risk of being targeted for sexual exploitation. Social media websites, classified advertisement sites, chat rooms, and after-school programs are potential venues for exploits youth.&nbsp; School hallways pose a risk, as a trafficker may, in fact, be another student. A promise of a "happening" party or a good time may be used to entrap an unsuspecting, troubled, or bored youth.&nbsp;</span></p><p data-dcnode-id="2316"><span data-dcnode-id="2320" instrument_node="">Educational campaigns, such as the "Blue Campaign" created by the US Department of Homeland Security, offer much-needed insight into the identification and treatment ramifications of victims of human trafficking. The Blue Campaign by the Department of Homeland Security offers sex trafficking awareness videos to educate our youth on the risks that traffickers pose in familiar places such as schools, coffee shops, malls, sporting venues and other hangouts </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/blue-campaign"><span data-dcnode-id="2319" instrument_node="">[DHS.gov]</span></a><span data-dcnode-id="2317" instrument_node="">.</span></p><p data-dcnode-id="2315"></p><span data-dcnode-id="2314" instrument_node="">
</span></article><span data-dcnode-id="2312" instrument_node="">
</span><article class="single-article" data-dcnode-id="2230"><span data-dcnode-id="2311" instrument_node="">
</span><h3 data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Epidemiology</span></h3><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2307"></p><p data-dcnode-id="2304"><strong data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">The National Human Trafficking Hotline: Reported Cases</span></strong></p><p data-dcnode-id="2296"><span data-dcnode-id="2303" instrument_node="">When exploring the epidemiology of human trafficking, one must first examine data collection, results, and the organizations that provide this service. The US Department of HHS funds the National Human Trafficking Hotline, operated by Polaris, a nongovernmental organization. The National Human Trafficking Hotline's data collection gathers invaluable information to assist training programs and victims domestically and abroad. For example, 2017 data collection indicates that California, Texas, and Florida rank the highest in reported cases and referrals.</span><a data-dcnode-id="2301" href="#ref_30585577" id="link_30585577"><span data-dcnode-id="2302" instrument_node="">[17]</span></a><a data-dcnode-id="2299" href="#ref_30541612" id="link_30541612"><span data-dcnode-id="2300" instrument_node="">[18]</span></a><a data-dcnode-id="2297" href="#ref_30020869" id="link_30020869"><span data-dcnode-id="2298" instrument_node="">[6]</span></a></p><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">To date, the hotline has answered more than 100,000 calls, 7,000 were from potential victims of human trafficking. In According to Polaris hotline statistics for the United States, more than 30,000 cases of trafficking in persons and more than 8,000 tips to law enforcement were&nbsp;identified since 2007. The National Human Trafficking Hotline is a 24-hour, confidential, multilingual hotline covering more than 200 languages for victims, survivors, and witnesses of human trafficking.</span></p><ul data-dcnode-id="2283"><span data-dcnode-id="2293" instrument_node="">
</span><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">The hotline number is 1-888-373-7888 provided by Polaris’s BeFree Textline.</span></li><span data-dcnode-id="2290" instrument_node="">
</span><li data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Text "HELP" to 233733 (BEFREE).</span></li><span data-dcnode-id="2287" instrument_node="">
</span><li data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Email help@humantraffickinghotline.org.</span></li><span data-dcnode-id="2284" instrument_node="">
</span></ul><p data-dcnode-id="2280"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Childhood Statistics/Cases</span></strong></p><p data-dcnode-id="2270"><span data-dcnode-id="2279" instrument_node="">Another resource for reporting cases and gaining information as it relates to the trafficking of minors is the National Center for Missing and Exploited Children (NCMEC). In 2016, The NCMEC estimated that one in six endangered runaways were likely victims of sex trafficking. Children as young as nine are thought to be targeted by sex traffickers, with the average age between 11 and 14. Labor trafficking ages vary. The Global Estimates of Modern Slavery by the ILO, WFF, and IOM reported in September 2017, that in 2016 of the 4.8 million sexually exploited, 20% were children.&nbsp;</span><a data-dcnode-id="2277" href="#ref_30924735" id="link_30924735"><span data-dcnode-id="2278" instrument_node="">[2]</span></a><a data-dcnode-id="2275" href="#ref_30695040" id="link_30695040"><span data-dcnode-id="2276" instrument_node="">[19]</span></a><a data-dcnode-id="2273" href="#ref_30682056" id="link_30682056"><span data-dcnode-id="2274" instrument_node="">[20]</span></a><span data-dcnode-id="2272" instrument_node="">.</span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliance87.org/global_estimates_of_modern_slavery-forced_labour_and_forced_marriage-faqs.pdf"></a></p><ul data-dcnode-id="2259"><span data-dcnode-id="2269" instrument_node="">
</span><li data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">To report sexually exploited or abused minors, call the National Center for Missing and Exploited Children’s (NCMEC) hotline at 1-800-THE-LOST, 1-800-843-5678.</span></li><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">In the case of an immediate emergency, call the local police department or emergency access number.</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Child protective surfaces and local law enforcement will assist healthcare providers in local reporting requirements for minors involved in a possible abuse situation. Ages of sexual consent may vary from state to state. Thus, the need to consult local agencies.&nbsp;</span></li><span data-dcnode-id="2260" instrument_node="">
</span></ul><p data-dcnode-id="2256"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Global Repository of Data</span></strong></p><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">The International Organization for Migration (IOM) in partnership with Polaris and the UN Migration Agency are launching a Counter-Trafficking Data Collaborative (CTDC) that will allow for a global repository of data on trafficking in persons. Ensuring victim identities are protected and information gathered will assist in bridging gaps in data that is publicly available. Data collection and access to this data are essential components in the CTDC's role in combatting the war on human trafficking. The first of its kind, this global repository of data will combine data from the IOM records on over 45,000 cases of human trafficking and the cases from Polaris, which are higher than 31,000. This collaborative data tracking system will foster a data-rich environment that will transcend borders and individual agency operational challenges. A comprehensive, international database will be a positive byproduct of this partnership. IOM's 2017 report increased awareness of the CTDC as an essential resource for the global reduction of human trafficking cases.&nbsp;</span></p><p data-dcnode-id="2251"><strong data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Global Report on Trafficking in Persons</span></strong></p><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Each year, thousands of individuals fall victim to national and international trafficking. Almost no country is exempt from human trafficking infractions in one capacity or another; originating country, transient country, or destination country. The United Nations Office on Drugs and Crime (UNODC) Global Report on Trafficking in Persons further explores the bond between trafficker and victim and the origin of the trafficking situation.</span></p><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">The 2016 Global Report on Trafficking in Persons shines some light on the profile of the trafficker in relationship to that of the person who is trafficked. Traffickers and their victims tend to originate from the same geographical area, speak the same language as the victim, and share the same ethnic background. These commonalities foster a level of trust between the trafficker and the victim. The trafficker exploits this relationship for financial benefit. Traffickers rarely travel abroad to recruit, instead focusing on domestic recruitment.&nbsp;</span></p><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Globally, local trafficking is on the rise.&nbsp; A trafficker will go to a destination country to exploit the victim. Countries most vulnerable to trafficking are those with high levels of organized crime and those ravaged by conflicts. From 2012 to 2014, more than 500 different trafficking flows were detected, and countries in Western and Southern Europe identified victims of 137 various citizenships. The 2016 UNODC Global Report on Trafficking in Persons&nbsp;reports&nbsp;79% of classified trafficked individuals globally are women and children. It also found a clear link between migration and human trafficking. Further reporting that the movement of migrants and refugees is the most substantial reported migration since World War II, with an estimated 244 million international migrants worldwide.&nbsp;</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Forced migration as a result of refugees fleeing war-torn areas makes the women, children, and boys especially vulnerable to exploitation by traffickers. The movement of Syrians escaping the war is one such example. Children face exploitation as "child soldiers." Armed guards abduct individuals on migratory routes and exploit them as slaves for forced labor or sexual exploitation. In September of 2015, world leaders adopted the 2030 Sustainable Development Agenda and embraced the war against trafficking in persons on a global front. This agenda called for all forms of violence against women and girls to cease.&nbsp;</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">According to the Global Trafficking in Persons Report of 2016, no country is immune from trafficking in persons, and over 500 migratory flows of trafficking were detectable. Sub-Saharan African and East Asian victims are trafficked to numerous global destinations. Affluent areas such as Western and Southern Europe, North America, and the Middle East have victims from all parts of the world. In Southeast Asia, forced marriages are on the rise. Central America, the Caribbean, and South America frequently report cases of girls becoming victims of sexual exploitation. Trafficking in fishing villages for forced labor is a problem in parts of the world such as Ghana and Taiwan. Organ retrieval as a form of trafficking is less frequent but exists in some parts of the world.&nbsp;</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">The UNODC 2016 study also reports a change in the victim profile over the past decade.&nbsp;The number of&nbsp;male victims is increasing. Overall, numbers of forced labor victims increased, with 63% being men between 2012 and 2014.&nbsp;Another alarming fact from this report is that female participation was on the rise.&nbsp;Of 6800 persons convicted of human trafficking during 2012-2014, 60% were male. Young girls were recruited and controlled by older women. More couples are actively involved in trafficking. Posing as "stable couples" allows traffickers to seem more genuine and trustworthy while they actively recruit and exploit victims as a team. Former victims became active participants in recruitment, some to reduce their debt bondage and end their sexual exploitation. Others, willingly participate in the abuse, using tactics of power and control. If persons being trafficked are engaged in criminal activity, they are less likely to cooperate with police, thus allowing the trafficker even more control.</span></p><p data-dcnode-id="2233"><span data-dcnode-id="2238" instrument_node="">The UNODC went on to discuss the conviction rates of traffickers. The average number of convictions was low, with five victims per convicted offender. North America had the highest number of convictions compared to the rest of the world. The United States reported 150 to 200 convictions per year, while Europe reported the highest number of trafficking victims.&nbsp;</span><a data-dcnode-id="2236" href="#ref_31033666" id="link_31033666"><span data-dcnode-id="2237" instrument_node="">[21]</span></a><span data-dcnode-id="2235" instrument_node="">.</span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/data-and-analysis/glotip/2016_Global_Report_on_Trafficking_in_Persons.pdf"></a></p><p data-dcnode-id="2232"></p><span data-dcnode-id="2231" instrument_node="">
</span></article><span data-dcnode-id="2229" instrument_node="">
</span><article class="single-article" data-dcnode-id="2143"><span data-dcnode-id="2228" instrument_node="">
</span><h3 data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Pathophysiology</span></h3><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2224"></p><p data-dcnode-id="2221"><strong data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Missed Opportunities and Myths</span></strong></p><p data-dcnode-id="2216"><span data-dcnode-id="2220" instrument_node="">A recent study revealed that 87.8% of human trafficking survivors had been in contact with a healthcare provider in some capacity during their victimization. Furthermore, it concluded that 68.3% had received an evaluation in the emergency department.&nbsp;</span><a data-dcnode-id="2218" href="#ref_29254652" id="link_29254652"><span data-dcnode-id="2219" instrument_node="">[22]</span></a><span data-dcnode-id="2217" instrument_node=""> Missed opportunities to identify, inform, and empower these victims allow for the spread of this physically and psychologically debilitating disease.</span></p><p data-dcnode-id="2211"><span data-dcnode-id="2215" instrument_node="">Recently, a smaller study of emergency department nurses in an urban setting concluded that emergency department nurses want better awareness regarding the specific resources available to victims of human trafficking. Ongoing research into the impact of institutional policy, the existence of human trafficking protocols, and continuing education regarding the recognition and treatment of trafficked individuals is required </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/29254652"><span data-dcnode-id="2214" instrument_node="">[22]</span></a><span data-dcnode-id="2212" instrument_node="">.</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">Myths or misperceptions often lead to missed opportunities to identify victims </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/j/tip/rls/tiprpt/2013/210542.htm"><span data-dcnode-id="2209" instrument_node="">[DOS, 2013]</span></a><span data-dcnode-id="2207" instrument_node="">. It is essential for healthcare providers and first point-of-contact personnel to be educated on these potential media-induced sensationalized myths.&nbsp;First, trafficking in persons is not just a crime that occurs in a faraway place or one that only involves migrants or foreign nationals. Individual exploitation happens in every part of the world - in the suburbs, big cities, and hometowns.</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">Victims can be coerced to take part in crimes, thus landing them in a detention center or jail. They may present to the emergency department for medical clearance. Screening of these individuals is vital in our attempts to identify victims and recognize the red flags of trafficking&nbsp;and take appropriate action.&nbsp; Thinking this person is "just a criminal or "just a prostitute" is a bias that inhibits practitioners from reading verbal and nonverbal cues&nbsp;and recognizing a victim. A victim may fall into a revictimization situation if returned to an exploitative environment. This is a chief concern for practitioners as the United Nations Convention against Corruption defines “revictimization” as "a situation in which the same person suffers from more than one criminal incident over a period of time." Perhaps more importantly when assessing and interviewing a potential victim of trafficking is the potential for "secondary victimization,” defined by the UNODC Model Law on Justice in Matters involving Child Victims and Witnesses of Crime as "victimization that occurs not as a direct result of the criminal act but through the response of institutions and individuals to the victim" </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/documents/justice-and-prison-reform/Justice_in_matters...pdf"><span data-dcnode-id="2204" instrument_node="">[22]</span></a><span data-dcnode-id="2202" instrument_node="">.</span></p><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">If an individual is free to come and go, then they may not be recognized as a person being trafficked. As discussed previously, bonds are often not physical chains or cuffs, but "invisible" or psychological ones. Fear paralyzes the victim, acting as a shackle that emotionally confines them to the trafficking situation. Mental weapons used by the trafficker to exercise power and control over a victim may include threats of harm to children, siblings, or other family members; deportation or return to a traumatizing situation; calls to social services; and physical violence or reminders of past violence for misguided offenses.&nbsp;</span></p><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Debt bondage, withholding of pay, and maintaining possession of all forms of identifying documents may further lead to an invisible bond or tie to the pimp/trafficker. Trafficked victims may use a school bus, a public bus, a train, or a taxi. Control over the person being trafficked lasts far beyond a physical wall, chain, or border. Much like intimate partner violence, victims usually do not self-identify, self-report, or recognize the fact that they are being manipulated, controlled, stigmatized, or dehumanized.</span></p><p data-dcnode-id="2194"><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Cultural Considerations</span></strong></p><p data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">Language barriers and cultural misconceptions may lead to a missed opportunity to identify a potential victim </span><a data-dcnode-id="2191" href="#ref_28107157" id="link_28107157"><span data-dcnode-id="2192" instrument_node="">[23]</span></a><span data-dcnode-id="2190" instrument_node="">. Inconsistencies in stories or history may become lost in translation, especially if a provider fails to obtain an interpreter that has no relationship to the person being exploited. A staff member versed in the same language or who shares the same culture as the victim may be able to spot these subtle clues and ease cultural shock and miscommunication, but it is not always feasible to provide in a busy healthcare setting. Behaviors passed off as cultural&nbsp;may be a form of demographic profiling that creates an environment to miss red flags.&nbsp;</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">It is imperative that if a suspected case of human trafficking or intimate partner violence arises that no family member or accompanying party be allowed to translate. Ensure a certified interpreter is nearby that is obtained from your institution.&nbsp;</span></p><p data-dcnode-id="2184"><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Reasons Victims/Traffickers Access Medical Care</span></strong></p><p data-dcnode-id="2179"><span data-dcnode-id="2183" instrument_node="">Traffickers may only seek out healthcare for their victims when they become seriously ill since it presents a risk of discovery.&nbsp;</span><a data-dcnode-id="2181" href="#ref_23099587" id="link_23099587"><span data-dcnode-id="2182" instrument_node="">[24]</span></a><span data-dcnode-id="2180" instrument_node="">. A multitude of factors should lead a practitioner to seek out medical services for a person who is a suspected victim of human trafficking.</span></p><ul data-dcnode-id="2150"><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Emergent medical conditions such as profuse bleeding or pain caused by a beating or forced abortion, injury on a job site, or complications during pregnancy such as an ectopic pregnancy</span></li><span data-dcnode-id="2175" instrument_node="">
</span><li data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Gynecological services for sexually transmitted infections caused by debris in the vagina from packing during menstruation or forced sex without condom use</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Follow up with an OB/GYN for a repeat beta HCG or ultrasound for a possible ectopic pregnancy identified in an emergency setting</span></li><span data-dcnode-id="2169" instrument_node="">
</span><li data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Addiction issues such as severe overdose or withdrawal signs and symptoms</span></li><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Dental emergencies or plastic surgery consultations or complications</span></li><span data-dcnode-id="2163" instrument_node="">
</span><li data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Prenatal care or lack thereof</span></li><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Health-related mental problems such as depression, suicide attempt, anxiety disorder</span></li><span data-dcnode-id="2157" instrument_node="">
</span><li data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">A patient on a psychiatric hold or court-mandated order</span></li><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Severe wound infections with signs of septicemia may force introduction into the healthcare system</span></li><span data-dcnode-id="2151" instrument_node="">
</span></ul><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Traffickers seek out the quickest means of care, and lengthy emergency department waits may lead to their decision to leave with the victim before receiving medical treatment. They may also "hospital shop" for quicker wait times from door to the provider. An accompanying "family member" that is impatient, "in your face," and upset over lengthy delays in overcrowded emergency rooms or clinics may, in fact, be a trafficker. Another indicator is the "spouse" or "boyfriend" that insists on a high-risk patient, such as one with a possible ectopic pregnancy or appendicitis, leaving without being seen, against medical advice, or eloping before care is completed.</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Remember, a victim comes from all walks of life and may be perceived as&nbsp;having a stable home in a suburban community. No victim will look the same or act the same; their individual, unique responses to their traumatic event will follow no specific protocol.&nbsp;As healthcare providers, we must be diligent in our efforts to identify these silent victims, forced into a situation of no fault of their own, made to carry out acts that reap emotional and social ramifications for years to come.</span></p><p data-dcnode-id="2145"></p><span data-dcnode-id="2144" instrument_node="">
</span></article><span data-dcnode-id="2142" instrument_node="">
</span><article class="single-article" data-dcnode-id="1848"><span data-dcnode-id="2141" instrument_node="">
</span><h3 data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">History and Physical</span></h3><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2137"></p><p data-dcnode-id="2134"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Exploitive Environments</span></strong></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">When healthcare workers encounter potential victims of trafficking, a detailed work history and social history will assist in identifying red flags. A better understanding of&nbsp;most common areas where persons are targeted for exploitation will help practitioners assess a potential victim.</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Victims of labor trafficking tend to be near farms, fisheries, factories, or businesses such as nail salons, massage parlors, restaurants, and areas with high immigrant populations. Traveling sales crews, begging rings, landscapers, construction workers, domestic workers, nannies, elder adult caregivers, and those in retail have a heightened risk of being labor trafficked.&nbsp;Immigrants may lack the power of communication due to language barriers which enable handlers from a similar background to approach them.&nbsp;</span></p><p data-dcnode-id="2122"><span data-dcnode-id="2129" instrument_node="">Sex trafficking can be hotel or motel based, street-based, or in residences functioning as brothels. Commercial-front brothels, escort services, truck stops, bars, and strip clubs can be places where sex trafficking occurs. Sex trafficking can happen at home with parents, intimate partners, or other family members as the perpetrators. Victims may not see themselves as victims, and may refer to the trafficker as their “daddy” or "boyfriend."&nbsp;</span><a data-dcnode-id="2127" href="#ref_30835966" id="link_30835966"><span data-dcnode-id="2128" instrument_node="">[25]</span></a><a data-dcnode-id="2125" href="#ref_31033666" id="link_31033666"><span data-dcnode-id="2126" instrument_node="">[21]</span></a><a data-dcnode-id="2123" href="#ref_30695040" id="link_30695040"><span data-dcnode-id="2124" instrument_node="">[19]</span></a></p><p data-dcnode-id="2119"><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Labor Trafficking Considerations</span></strong></p><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Common presenting complaints of victims of human trafficking are much like those of intimate partner violence but may vary depending on if a victim of labor versus sex trafficking. Labor traffickers prey on specific vulnerabilities to entice individuals to accept substandard working conditions. Workers in the agriculture industry, factories, and domestic servitude sectors are vulnerable to human trafficking due to their work visa and immigration status being controlled by one employer. This power over the individual and fear of deportation allows the trafficker to manipulate the worker, leading to victimization.&nbsp;</span></p><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Agricultural and industrial workers who are forced to work long hours with substandard wages may be isolated, confined by the use of dogs, armed guards, barbed wire or other fences, and locks. The seasonal nature of their work and movement from place to place heightens their vulnerability due to regularly being subjected to unfamiliar surroundings.&nbsp;</span></p><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Domestic workers are also isolated, forced to live on the premises, and may lack access to cell phones and other communication devices. Language barriers add to vulnerability, coupled with this inability to communicate. Traveling sales crews, begging rings, and peddlers are vulnerable due to homelessness and working in unfamiliar settings. If left behind in an unknown city, they may resort to "survival sex."&nbsp;</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Workers in strip clubs and bars may have fraudulent work visas and ties to organized crime, rendering them vulnerable to trafficking. Drug and alcohol are used as a manipulation tool. Labor laws may not apply to subcontractors or independent contractors, thus increasing vulnerability risk. A common theme originates between persons who are exploited and traffickers: Keep the victim isolated by proximity or language, vulnerable due to immigration status, without resources and owing debts, and&nbsp;without the protection of labor laws and increase the ability to control and manipulate.&nbsp;</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Trafficking in persons for labor exploitation may put a patient at risk for malnutrition, communicable diseases such as hepatitis and tuberculosis, pesticide and chemical burns, or exposure and work-related injuries due to lack of safety equipment such as safety belts, gloves, goggles, and masks.&nbsp;</span></p><p data-dcnode-id="2106"><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Labor Trafficking Red Flags</span></strong></p><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Stop, Observe, Ask, and Respond (SOAR) will guide practitioners in determining whether red flags indicate a potential case of human trafficking. Healthcare providers must determine if a crime occurred or if all three elements of trafficking in persons exist: force, fraud, and coercion. The provider's&nbsp;role is to recognize a potential case of human trafficking, empower the person being exploited, educate the victim on resources and established support structures, and provide a framework for a trauma-informed, victim-centered approach to healthcare.</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Observing for verbal and nonverbal clues as well as asking open-ended questions in a private, non-judgmental way will allow caregivers to determine a potential case of human trafficking. Questions to ask regarding labor trafficking suspicions may include and not be limited to the list below.</span></p><ol data-dcnode-id="2050"><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Are you being paid the wages that were part of the initial agreement?</span></li><span data-dcnode-id="2098" instrument_node="">
</span><li data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Can you change jobs if you want to?</span></li><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Would anything happen to you if you did quit your job?</span></li><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Can you come and go as you please, take bathroom breaks, eat when you want?</span></li><span data-dcnode-id="2089" instrument_node="">
</span><li data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Do you live with others? What are the home conditions and where do you sleep? Do you have a bed? Do you sleep on the floor? Is it too cold or too hot?</span></li><span data-dcnode-id="2086" instrument_node="">
</span><li data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Did you pay a fee to get your job? Do you owe a debt to your employer?</span></li><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Do you have access to your money, your identification?&nbsp;</span></li><span data-dcnode-id="2080" instrument_node="">
</span><li data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Has your employer ever threatened you?&nbsp;</span></li><span data-dcnode-id="2077" instrument_node="">
</span><li data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Did you have eye protection, a mask, a safety harness? Personal protective equipment such as gloves? Respirators?</span></li><span data-dcnode-id="2074" instrument_node="">
</span><li data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Does your employer provide your housing?&nbsp;</span></li><span data-dcnode-id="2071" instrument_node="">
</span><li data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Are you working in the job you were hired to do?&nbsp;</span></li><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Are you concerned about your safety? Your family or children's safety?</span></li><span data-dcnode-id="2065" instrument_node="">
</span><li data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">How many hours do you work a day? How many days per week?</span></li><span data-dcnode-id="2062" instrument_node="">
</span><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Have you moved around a lot? Do you know your address? Can you give me directions or a location of your house?</span></li><span data-dcnode-id="2059" instrument_node="">
</span><li data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Do you take care of others?</span></li><span data-dcnode-id="2056" instrument_node="">
</span><li data-dcnode-id="2052"><span data-dcnode-id="2055" instrument_node="">Are there locks on the doors or bars on the windows? Can you leave freely?</span><a data-dcnode-id="2053" href="#ref_21270581" id="link_21270581"><span data-dcnode-id="2054" instrument_node="">[26]</span></a></li><span data-dcnode-id="2051" instrument_node="">
</span></ol><p data-dcnode-id="2047"><strong data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Barriers to Identification of Victims</span></strong></p><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Healthcare providers, for a variety of reasons, may fail to stop, observe, and ask questions to identify a potential victim of human trafficking. The absence of protocols, myths, stereotypes, biases, fear of no available resources, lack of education regarding human trafficking red flags, time constraints, lack of privacy, or an inability to separate the person from the potential trafficker all may play a part in the inability to identify victims. The victim declining to give a history and self-identify is a factor&nbsp;</span><a data-dcnode-id="2044" href="#ref_28107157" id="link_28107157"><span data-dcnode-id="2045" instrument_node="">[23]</span></a><span data-dcnode-id="2043" instrument_node="">.</span></p><p data-dcnode-id="2038"><em data-dcnode-id="2039"><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Diagnostic Overshadowing</span></strong></em></p><p data-dcnode-id="2030"><span data-dcnode-id="2037" instrument_node="">A patient who presents with multiple visits for a pain complaint that has no organic cause, a frequent flyer as labeled by some, may be a victim of trafficking but stereotyped and overlooked. Those problematic patients that present with stress-related issues on multiple visits or those who return over and over with psychological holds for overdoses or suicidal ideations may be victims of trafficking. Each time, there is the risk that they will be released back into the trafficking situation and victimization. Providers must recognize the potential for "diagnostic overshadowing" and be attuned to their own emotions and potential for bias.</span><a data-dcnode-id="2035" href="#ref_28107153" id="link_28107153"><span data-dcnode-id="2036" instrument_node="">[27]</span></a><span data-dcnode-id="2034" instrument_node="">&nbsp; Traffickers can pose as parents, grandparents, or spouses. As providers, practitioners must stop, observe, ask and respond</span><a data-dcnode-id="2032" href="#ref_28178913" id="link_28178913"><span data-dcnode-id="2033" instrument_node="">[4]</span></a><span data-dcnode-id="2031" instrument_node="">.</span></p><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">As front-line participants in the battle to combat human trafficking, healthcare workers must be aware of these potentials barriers to victim identification. Often, rushing from patient to patient or exam room to exam room, being caught between documentation and hands-on assessment and care, and treating patients in hallways, lobbies, or corridors adds to the potential for a missed opportunity.&nbsp;</span></p><p data-dcnode-id="2024"><strong data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Sex Trafficking&nbsp;Red Flags</span></strong><span data-dcnode-id="2025" instrument_node="">&nbsp;</span></p><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">According to the National Human Trafficking Resource Center (NHTRC) and hotline, general indicators or red flags of trafficking in persons may include but not be limited to the following with some modifications:</span></p><ol data-dcnode-id="1960"><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Inconsistent history or a history that appears coaxed. May be difficult to determine if a language barrier is present.</span></li><span data-dcnode-id="2018" instrument_node="">
</span><li data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Resistant to answer questions about the injury or incident.</span></li><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Avoids eye contact, is nervous, fearful of touch.</span></li><span data-dcnode-id="2012" instrument_node="">
</span><li data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">No idea of address or general area where they live.</span></li><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">No control over their finances and lacks decision-making capacity.</span></li><span data-dcnode-id="2006" instrument_node="">
</span><li data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Accompanied by a controlling companion or family member that refuses to let the patient speak for themselves or be alone for care or insists on being the translator.</span></li><span data-dcnode-id="2003" instrument_node="">
</span><li data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Exhibits bizarre, hostile behavior. Resistant to care and assistance. May have initially consented but changes mind after asked to undress for an exam.</span></li><span data-dcnode-id="2000" instrument_node="">
</span><li data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">No identification or the companion has it in their possession.</span></li><span data-dcnode-id="1997" instrument_node="">
</span><li data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Under age 18 and involved in a commercial sex act.</span></li><span data-dcnode-id="1994" instrument_node="">
</span><li data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Tattoos or branding signs. Markings may say "daddy" "for sale," imply ownership, or read as an advertisement for a product.</span></li><span data-dcnode-id="1991" instrument_node="">
</span><li data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Multiple sex partners.</span></li><span data-dcnode-id="1988" instrument_node="">
</span><li data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Inappropriate attire for the environmental conditions of the area.</span></li><span data-dcnode-id="1985" instrument_node="">
</span><li data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Attempt to reason away bruises or ligature marks by claiming a bruising or rare blood disorder.</span></li><span data-dcnode-id="1982" instrument_node="">
</span><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Silent, afraid to speak, cringes at the sound of a loud voice.</span></li><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Uses trafficking "lingo" such as "the life" or other words common in the commercial sex industry.</span></li><span data-dcnode-id="1976" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Has addiction issues such as opioids.</span></li><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1965"><span data-dcnode-id="1972" instrument_node="">Admits to a forced sexual encounter or being forced into sex acts.</span><a data-dcnode-id="1970" href="#ref_31033666" id="link_31033666"><span data-dcnode-id="1971" instrument_node="">[21]</span></a><a data-dcnode-id="1968" href="#ref_30877159" id="link_30877159"><span data-dcnode-id="1969" instrument_node="">[28]</span></a><a data-dcnode-id="1966" href="#ref_30853510" id="link_30853510"><span data-dcnode-id="1967" instrument_node="">[29]</span></a></li><span data-dcnode-id="1964" instrument_node="">
</span><li data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Has a cover story to avert suspicion, but details may vary or be inconsistent with a query. Law enforcement may refer to this as a "legend."</span></li><span data-dcnode-id="1961" instrument_node="">
</span></ol><p data-dcnode-id="1957"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Head-to-Toe Assessment</span></strong></p><p data-dcnode-id="1954"><span data-dcnode-id="1956" instrument_node="">Conducting a head-to-toe, full assessment in this patient population is of vital importance. An examination may prove difficult due to the emotional and psychological state of the victim. These patients may appear as uncooperative or vague&nbsp;and give an inconsistent history. These reactions are manifestations of their trauma. Provider frustration or stereotyping may arise, leading to the desire to exit the room quickly, with a quick determination of probable diagnosis and treatment. As discussed above, the potential exists for "diagnostic overshadowing." As with any trauma patient, a high index of suspicion should be present for co-existing conditions and comorbidities.</span><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28107153"></a></p><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Conduct the assessment in private, not allowing anyone accompanying the patient to be present. A chaperone may be present and a certified interpreter, if required, to facilitate a feeling of trust, establishes rapport, and starts to build a trusted network of people and organizations willing to help. Provide a same-sex provider for the physical exam/assessment if at all possible with the staffing mix currently available. During the exam, the patient may seem emotionally absent, hyperventilate, and not verbalize feelings of discomfort. Be alert to nonverbal signs. Reassure frequently and promote a relaxed, non-rushed atmosphere. Avoid interrogating the victim, ask only direct, pertinent, open-ended, yet neutral questions. Maintain eye contact with the victim, barring cultural considerations, and avoid writing while the victim is speaking. Ensure the victim is completely undressed and in a gown so a complete trauma assessment can be initiated. Specifically, examine for the following:</span></p><ul data-dcnode-id="1880"><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1948"><span data-dcnode-id="1950" instrument_node="">Bruising; old, healing or new lacerations; hematomas; signs of acute or chronic head trauma or a headache; missing hair or bald spots.</span><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21270581"></a></li><span data-dcnode-id="1947" instrument_node="">
</span><li data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Trouble hearing; damage to the auditory canal or eardrum; signs of trauma to the oropharynx such as lacerations or burns, blood in the mouth, ulcerations, tooth decay, broken teeth, gingival irritation, tongue abnormalities; signs of anemia or dehydration in the oral mucosa.</span></li><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Visual defects, sudden or of gradual onset; tattoos or brands in the hairline or on the neck; signs of strangulation such as bruising.</span></li><span data-dcnode-id="1941" instrument_node="">
</span><li data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Signs of chest trauma, murmurs; cigarette burns; tattoos that imply ownership; bruising in various stages of healing; signs of stress-related cardiovascular issues such as arrhythmias or high blood pressure.</span></li><span data-dcnode-id="1938" instrument_node="">
</span><li data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Respiratory issues that would indicate inhalation injuries from chemical exposure, toxic fume exposure, asbestos exposure, or mold exposure.</span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Signs of tuberculosis such as night sweats, coughing up blood, fever, weight loss.</span></li><span data-dcnode-id="1932" instrument_node="">
</span><li data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Signs of stress-related respiratory or gastrointestinal problems.</span></li><span data-dcnode-id="1929" instrument_node="">
</span><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Damage to lung tissue due to prolonged exposure to chemicals or pesticides, aspiration pneumonia or other inhalation injuries; meth lab exposure can produce burning to the eyes, nose, and mouth, chest pain, cough, lack of coordination, nausea, and dizziness.</span></li><span data-dcnode-id="1926" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Hypothermia or hyperthermia from environmental exposure from working in damp, cool, poorly insulated factories or buildings; mold exposure signs/symptoms.</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Signs of gastrointestinal issues such as nausea, vomiting, diarrhea, constipation, or abdomen pain; rectal pain, itching, trauma or bleeding; parasites in the feces or signs of abdominal trauma.</span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Bruising to the back or scarring; tattoos that imply advertisement, ownership, or are sexually explicit in the pubic hair.</span></li><span data-dcnode-id="1917" instrument_node="">
</span><li data-dcnode-id="1909"><span data-dcnode-id="1916" instrument_node="">Obstetrical and gynecological complaints such as sexually transmitted infections or recurrent STI’s (An STI, especially if recurrent, in a minor may be the first and only sign of sexual abuse; repeated unwanted or unplanned pregnancies or forced abortions; anogenital trauma; evidence of retained foreign bodies such as in the vagina from packing during menstruation, vaginal bleeding, discharge, rashes, itching, signs of injury or forced sex.</span><a data-dcnode-id="1914" href="#ref_30529698" id="link_30529698"><span data-dcnode-id="1915" instrument_node="">[30]</span></a><a data-dcnode-id="1912" href="#ref_30529698" id="link_30529698"><span data-dcnode-id="1913" instrument_node="">[30]</span></a><a data-dcnode-id="1910" href="#ref_30293860" id="link_30293860"><span data-dcnode-id="1911" instrument_node="">[31]</span></a></li><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Number of sexual partners; condom use; genitourinary symptoms present such as burning, frequency, odor, dark urine or history of frequent urinary tract infections.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Signs of bruising or lower back scarring from repeated beatings; musculoskeletal issues such as signs of repetitive trauma; work-related injuries or injuries such as back problems from wearing heels for hours walking the streets or neck and jaw problems from frequent, forced oral ses.</span></li><span data-dcnode-id="1902" instrument_node="">
</span><li data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Fractures, old or new, any contractures. Cigarette or scald burns. Ligature marks/scars around ankles or wrists. Signs of scabies, infestations (scalp or body). Impetigo. Fungal infections.</span></li><span data-dcnode-id="1899" instrument_node="">
</span><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Signs of nutritional deficits such as Vitamin D deficiencies from lack of exposure to sunlight, anemia, mineral deficiencies, brittle or fine hair.</span></li><span data-dcnode-id="1896" instrument_node="">
</span><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Signs of anorexia, bulimia, loss of appetite, malnutrition, severe electrolyte abnormalities.</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Children may have growth and development abnormalities and dental cavities or misaligned poorly formed teeth.&nbsp;</span></li><span data-dcnode-id="1890" instrument_node="">
</span><li data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Neurological issues such as seizures, pseudo-seizures, numbness or tingling, migraines, inability to concentrate, vertigo, unexplained memory loss, seizures.</span></li><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Insomnia, nightmares, waking up frequently.</span></li><span data-dcnode-id="1884" instrument_node="">
