</span><div class="full-content field__summary" data-dcnode-id="2460"><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">The crime of human trafficking is complex and dynamic, taking place in a wide variety of contexts and difficult to detect. One of the greatest challenges in developing targeted counter-trafficking responses and measuring their impact is the lack of reliable, high-quality data related to the scale of human trafficking and the profile of victims.&nbsp;</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2469" instrument_node="">The need for improved international response to human trafficking and commitment to its eradication is illustrated by its prominent inclusion in the targets of the </span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationdataportal.org/sdg"><span data-dcnode-id="2468" instrument_node="">United Nations (UN) Sustainable Development Goals (SDGs)</span></a><span data-dcnode-id="2466" instrument_node=""> and the </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//migrationdataportal.org/global-compact-for-migration"><span data-dcnode-id="2465" instrument_node="">Global Compact for Safe, Orderly, and Regular Migration</span></a><span data-dcnode-id="2463" instrument_node=""> (GCM). Eradicating human trafficking is addressed specifically in goals 5.2, 8.7 and 16.2. The GCM’s 10th Objective also calls for specific measures to prevent and combat trafficking in persons in the context of international migration.&nbsp;</span></p><span data-dcnode-id="2461" instrument_node="">
</span></div><span data-dcnode-id="2459" instrument_node="">
</span><div class="full-content node-content wiki-content field__body" data-dcnode-id="1847"><span data-dcnode-id="2458" instrument_node="">

</span><p data-dcnode-id="2445"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;title&quot;:&quot;CTDC's human trafficking data, 2020&quot;,&quot;alt&quot;:&quot;CTDC's human trafficking data, 2020&quot;}" data-colorbox-gallery="" data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/CTDC%2520map%25202020%2520bis%2520%25282%2529.png" title="<a href=&quot;https://www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/CTDC%20map%202020%20bis%20%282%29.png&quot; download>Download</a>"><img alt="CTDC's human trafficking data, 2020" class="image-style-embedded-845" data-dcnode-id="2447" height="898" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/styles/embedded_845/public/2020-07/CTDC%2520map%25202020%2520bis%2520%25282%2529.png%3Fitok%3DD1RRuLDe&amp;raw" title="CTDC's human trafficking data, 2020" typeof="foaf:Image" width="826"></a></p><span data-dcnode-id="2444" instrument_node="">

</span><h2 data-dcnode-id="2425" id="definition"><span data-dcnode-id="2426" instrument_node="">Definition</span></h2><span data-dcnode-id="2424" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2419"><span data-dcnode-id="2423" instrument_node="">The </span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osce.org/odihr/19223%3Fdownload%3Dtrue" rel="noopener" target="_blank"><span data-dcnode-id="2422" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons </span></a><span data-dcnode-id="2420" instrument_node="">defines human trafficking or trafficking in persons:&nbsp;</span></p><span data-dcnode-id="2418" instrument_node="">
</span><dl data-dcnode-id="2407"><dd class="text-align-justify" data-dcnode-id="2409"><em data-dcnode-id="2410"><span data-dcnode-id="2417" instrument_node="">“Trafficking in Persons”… mean[s] the recruitment, transportation, transfer, harbouring or receipt of persons, </span><strong data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">by means of the threat or use of force or other forms of coercion</span></strong><span data-dcnode-id="2414" instrument_node="">, of abduction, of fraud, of deception, of the abuse of power or of a position of vulnerability </span><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">or of the giving or receiving of payments or benefits to achieve the consent of a person having control over another person, for the purpose of exploitation.</span></strong><span data-dcnode-id="2411" instrument_node=""> Exploitation shall include, at a minimum, the exploitation of the prostitution of others or other forms of sexual exploitation, forced labour or services, slavery or practices similar to slavery, servitude or the removal of organs. (Article 3, paragraph (a)).</span></em></dd><span data-dcnode-id="2408" instrument_node="">
</span></dl><p class="text-align-justify" data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">The Protocol further elaborates that the consent of a trafficked person may be rendered irrelevant when obtained through improper means:</span></p><span data-dcnode-id="2404" instrument_node="">
</span><dl data-dcnode-id="2399"><dd class="text-align-justify" data-dcnode-id="2401"><em data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">The consent of a victim of trafficking in persons to the intended exploitation set forth in subparagraph (a) of this article shall be irrelevant where any of the means set forth in subparagraph (a) have been used; (Article 3, paragraph (b)).</span></em></dd><span data-dcnode-id="2400" instrument_node="">
</span></dl><p class="text-align-justify" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">In the case of trafficked children, the Protocol elaborates that the vulnerable status of children makes it impossible for them to consent regardless of whether any improper means were used or not:&nbsp;</span></p><span data-dcnode-id="2396" instrument_node="">
</span><dl data-dcnode-id="2385"><dd class="text-align-justify" data-dcnode-id="2391"><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">The recruitment, transportation, transfer, harbouring or receipt of a child for the purpose of exploitation shall be considered "trafficking in persons" even if this does not involve any of the means set forth in subparagraph (a) of this article; (Article 3, paragraph (c)).</span></em><br data-dcnode-id="2393"><span data-dcnode-id="2392" instrument_node="">
	&nbsp;</span></dd><span data-dcnode-id="2390" instrument_node="">
</span><dd class="text-align-justify" data-dcnode-id="2387"><em data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">"Child" shall mean any person under eighteen. (Article 3, paragraph (d)).</span></em></dd><span data-dcnode-id="2386" instrument_node="">
</span></dl><div class="recent-trends" data-dcnode-id="2261"><span data-dcnode-id="2384" instrument_node="">
</span><div class="recent-trends__title" data-dcnode-id="2272"><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2380"><a data-dcnode-id="2381" id="recent-trends" name="recent-trends"><span data-dcnode-id="2382" instrument_node="">Recent trends</span></a></p><span data-dcnode-id="2379" instrument_node="">
</span><div class="embedded-entity" data-dcnode-id="2355" data-embed-button="content" data-entity-embed-display="view_mode:node.embedded" data-entity-embed-display-settings="[]" data-entity-type="node" data-entity-uuid="ba881ae1-737d-4f9a-b30e-7650d26cdf5c" data-langcode="en"><span data-dcnode-id="2378" instrument_node="">
</span><div class="ds-1col clearfix" data-dcnode-id="2357"><span data-dcnode-id="2377" instrument_node="">
</span><div class="content content-embedded infographic-embedded" data-dcnode-id="2359"><span data-dcnode-id="2376" instrument_node="">
</span><div class="embedded field__image" data-dcnode-id="2361"><span data-dcnode-id="2375" instrument_node="">

</span><div class="image-embedded-wo-body field__image" data-dcnode-id="2367"><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2369"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;title&quot;:&quot;Exploitation types among identified victims of trafficking, 2007-2017 (%)&quot;,&quot;alt&quot;:&quot;Exploitation types among identified victims of trafficking, 2007-2017 (%)&quot;}" data-colorbox-gallery="" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-exploitation-type%2520%25281%2529.png" title="<a href=&quot;https://www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-exploitation-type%20%281%29.png&quot; download>Download</a>"><img alt="Exploitation types among identified victims of trafficking, 2007-2017 (%)" class="image-style-embedded-845" data-dcnode-id="2371" height="677" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/styles/embedded_845/public/2020-07/ctdc-exploitation-type%2520%25281%2529.png%3Fitok%3DTKqhTvAq&amp;raw" title="Exploitation types among identified victims of trafficking, 2007-2017 (%)" typeof="foaf:Image" width="826"></a></p><span data-dcnode-id="2368" instrument_node="">
</span></div><span data-dcnode-id="2366" instrument_node="">
</span></div><span data-dcnode-id="2364" instrument_node="">
</span></div><span data-dcnode-id="2362" instrument_node="">
</span></div><span data-dcnode-id="2360" instrument_node="">
</span></div><span data-dcnode-id="2358" instrument_node="">
</span></div><span data-dcnode-id="2356" instrument_node="">
</span></div><span data-dcnode-id="2354" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2339"><span data-dcnode-id="2350" instrument_node="">Since the early 2000s, the proportion of identified cases of trafficking for sexual exploitation has in general&nbsp;</span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ctdatacollaborative.org/story/exploitation-victims-trends" rel="noopener" style="color:#276e93;font-size:15px;text-decoration:underline" target="_blank"><span data-dcnode-id="2349" instrument_node="">declined</span></a><span data-dcnode-id="2347" instrument_node="">, while the share of identified cases of trafficking for forced labour has generally increased, as identification of such cases has improved. However, there are regional differences in the rates of both trafficking for sexual exploitation and forced labour. For example, data from UNODC and CTDC show that trafficking for forced labour has a higher rate in Africa and the Middle East than trafficking for sexual exploitation, while the opposite is true for regions such as Europe and Northern America.</span><a data-dcnode-id="2343" href="#foot" id="header" name="header"><sup data-dcnode-id="2344"><span data-dcnode-id="2345" style="font-size:11.25px;color:#276e93;"><span data-dcnode-id="2346" instrument_node="">1</span></span></sup></a><span data-dcnode-id="2342" instrument_node="">&nbsp;This is partly reflected in the CTDC data above, where an increase of available case data from Northern America from 2015 onwards increased the proportion of victims trafficked for sexual exploitation in the dataset.&nbsp;</span><em data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node=""> &nbsp;</span></em></p><span data-dcnode-id="2338" instrument_node="">
</span><div class="embedded-entity" data-dcnode-id="2314" data-embed-button="content" data-entity-embed-display="view_mode:node.embedded" data-entity-embed-display-settings="[]" data-entity-type="node" data-entity-uuid="6845ea56-7487-4af7-90ad-b466f2408e22" data-langcode="en"><span data-dcnode-id="2337" instrument_node="">
</span><div class="ds-1col clearfix" data-dcnode-id="2316"><span data-dcnode-id="2336" instrument_node="">
</span><div class="content content-embedded infographic-embedded" data-dcnode-id="2318"><span data-dcnode-id="2335" instrument_node="">
</span><div class="embedded field__image" data-dcnode-id="2320"><span data-dcnode-id="2334" instrument_node="">
</span><div class="ds-1col clearfix" data-dcnode-id="2322"><span data-dcnode-id="2333" instrument_node="">
</span><div class="media media-embedded-wo-body image-embedded-wo-body" data-dcnode-id="2324"><span data-dcnode-id="2332" instrument_node="">
</span><div class="image-embedded-wo-body field__image" data-dcnode-id="2326"><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2328"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;title&quot;:&quot;Gender and age profile of detected human trafficking victims, 2007-2017 (%)&quot;,&quot;alt&quot;:&quot;Gender and age profile of detected human trafficking victims, 2007-2017 (%)&quot;}" data-colorbox-gallery="" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-gender-age%2520%25281%2529.png" title="<a href=&quot;https://www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-gender-age%20%281%29.png&quot; download>Download</a>"><img alt="Gender and age profile of detected human trafficking victims, 2007-2017 (%)" class="image-style-embedded-845" data-dcnode-id="2330" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/styles/embedded_845/public/2020-07/ctdc-gender-age%2520%25281%2529.png%3Fitok%3DZVEiBS08&amp;raw" title="Gender and age profile of detected human trafficking victims, 2007-2017 (%)" typeof="foaf:Image" width="826"></a></p><span data-dcnode-id="2327" instrument_node="">
</span></div><span data-dcnode-id="2325" instrument_node="">
</span></div><span data-dcnode-id="2323" instrument_node="">
</span></div><span data-dcnode-id="2321" instrument_node="">
</span></div><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">
</span></div><span data-dcnode-id="2315" instrument_node="">
</span></div><span data-dcnode-id="2313" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">A large proportion of victims identified are female, as human trafficking had previously tended to be seen as a crime which affects mostly females who are trafficked for sexual exploitation. Over time, a higher percentage of men have been identified as it has been acknowledged that men can also be vulnerable to many forms of human trafficking, including sexual exploitation, and the identification of such cases has improved. The proportion of children relative to adults for males and females is about the same.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">CTDC data also show&nbsp;differences in the routes undertaken by victims of trafficking. Nearly 80 per cent of international human trafficking journeys cross through official border control points, such as airports and land border control points. Victims of labour exploitation are more likely to be trafficked through official border control points, while victims of trafficking for sexual exploitation account for more cases crossing borders via locations that don’t have official border control points. This includes irregular routes, such as those across the sea or cross-country. Children are also more likely than adults to be trafficked via routes that don’t have official border control points.&nbsp;</span></p><span data-dcnode-id="2304" instrument_node="">
</span><div class="embedded-entity" data-dcnode-id="2280" data-embed-button="content" data-entity-embed-display="view_mode:node.embedded" data-entity-embed-display-settings="[]" data-entity-type="node" data-entity-uuid="c1b3ee2e-9746-4dbf-a3a4-b34a8fc04922" data-langcode="en"><span data-dcnode-id="2303" instrument_node="">
</span><div class="ds-1col clearfix" data-dcnode-id="2282"><span data-dcnode-id="2302" instrument_node="">
</span><div class="content content-embedded infographic-embedded" data-dcnode-id="2284"><span data-dcnode-id="2301" instrument_node="">
</span><div class="embedded field__image" data-dcnode-id="2286"><span data-dcnode-id="2300" instrument_node="">
</span><div class="ds-1col clearfix" data-dcnode-id="2288"><span data-dcnode-id="2299" instrument_node="">
</span><div class="media media-embedded-wo-body image-embedded-wo-body" data-dcnode-id="2290"><span data-dcnode-id="2298" instrument_node="">
</span><div class="image-embedded-wo-body field__image" data-dcnode-id="2292"><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2294"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;title&quot;:&quot;Age of detected victims of trafficking, 2007-2017 (%)&quot;,&quot;alt&quot;:&quot;Age of detected victims of trafficking, 2007-2017 (%)&quot;}" data-colorbox-gallery="" data-dcnode-id="2295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-age.png" title="<a href=&quot;https://www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2020-07/ctdc-age.png&quot; download>Download</a>"><img alt="Age of detected victims of trafficking, 2007-2017 (%)" class="image-style-embedded-845" data-dcnode-id="2296" height="677" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/styles/embedded_845/public/2020-07/ctdc-age.png%3Fitok%3Dp2RBovWx&amp;raw" title="Age of detected victims of trafficking, 2007-2017 (%)" typeof="foaf:Image" width="826"></a></p><span data-dcnode-id="2293" instrument_node="">
</span></div><span data-dcnode-id="2291" instrument_node="">
</span></div><span data-dcnode-id="2289" instrument_node="">
</span></div><span data-dcnode-id="2287" instrument_node="">
</span></div><span data-dcnode-id="2285" instrument_node="">
</span></div><span data-dcnode-id="2283" instrument_node="">
</span></div><span data-dcnode-id="2281" instrument_node="">
</span></div><span data-dcnode-id="2279" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Half of the victims identified by CTDC partners are under 26. Nearly a quarter of them are children. In fact, the largest age group in the whole distribution is 15 to 17 years old.</span></p><span data-dcnode-id="2273" instrument_node="">
</span></div><span data-dcnode-id="2271" instrument_node="">
</span><div class="recent-trends__body" data-dcnode-id="2263"><span data-dcnode-id="2270" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="2267" style="text-align:justify"><span data-dcnode-id="2268" lang="EN-US" style="font-size:10.0pt;line-height:107%;color:black;mso-themecolor:text1" xml:lang="EN-US"><span data-dcnode-id="2269" instrument_node="">
</span></span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2265"></p><span data-dcnode-id="2264" instrument_node="">
</span></div><span data-dcnode-id="2262" instrument_node="">
</span></div><span data-dcnode-id="2260" instrument_node="">
</span><a class="back-to-top" data-dcnode-id="2258" href="#top"><span data-dcnode-id="2259" instrument_node="">Back to top</span></a><span data-dcnode-id="2257" instrument_node="">
</span><h2 data-dcnode-id="2255" id="data-sources"><span data-dcnode-id="2256" instrument_node="">Data sources</span></h2><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The main sources of data on human trafficking globally are based on information provided by identified victims. These are usually collected by a range of different actors, including law enforcement, the judiciary, and non-governmental organizations providing protection and assistance to victims.&nbsp;</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2247"><span data-dcnode-id="2250" instrument_node="">Several UN agencies and international non-governmental organizations (NGOs) have collaborated to produce data sources on the profiles of victims of human trafficking, the prevalence of human trafficking, and on related phenomena such as forced labour and forced marriage.</span><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2243"><b data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Operational case data and victim profiles</span></b></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">In the course of protecting and providing services to victims, counter-trafficking actors frequently collect individual-level, operational case data. IOM has been providing direct assistance to victims of human trafficking since the mid-1990s and assists approximately 8,000 victims each year globally. Through its case management activities, the Organization has developed the largest database of victim of trafficking case data in the world, with information on over 55,000 individual cases.&nbsp;</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Operational data from counter-trafficking organizations are often highly sensitive and pertain to individuals, which raises a range of privacy and civil liberty concerns where the risk of identifying data subjects can be high and the consequences severe. While many organizations and governments around the world collect data on cases of human trafficking, disaggregated data has not been easily accessible to external stakeholders or has not been frequently shared between relevant actors in the past due to the sensitivity of its content, and data protection and confidentiality considerations.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">To overcome these challenges, in 2017, IOM made its own data publicly available online through the Counter Trafficking Data Collaborative (CTDC), along with combined data from other leading counter-trafficking organizations with significant case-level datasets.&nbsp;</span></p><span data-dcnode-id="2233" instrument_node="">
</span><div class="recent-trends" data-dcnode-id="2216"><span data-dcnode-id="2232" instrument_node="">
</span><div class="recent-trends__title" data-dcnode-id="2227"><span data-dcnode-id="2231" instrument_node="">
</span><h3 data-dcnode-id="2229" id="the-counter-trafficking-data-collaborative"><span data-dcnode-id="2230" instrument_node="">The Counter Trafficking Data Collaborative</span></h3><span data-dcnode-id="2228" instrument_node="">
</span></div><span data-dcnode-id="2226" instrument_node="">
</span><div class="recent-trends__body" data-dcnode-id="2218"><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">The Counter Trafficking Data Collaborative (CTDC) is the first global data hub on human trafficking, with data contributed by organizations from around the world. The resulting dataset is the largest of its kind globally, with information on over 108,000&nbsp;individual cases of human trafficking visualized throughout the site, including through an interactive global map. An anonymized version of this dataset is publicly available to download. By putting such data in the public domain, the goal of CTDC is to break down information-sharing barriers and equip the counter-trafficking community with up to date, reliable data on human trafficking. As new data from contributing partners are added, CTDC will continue to expand in scope, featuring new datasets from diverse counter-trafficking actors and disseminating standards on sharing trafficking-case data. &nbsp;</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">IOM’s Counter Trafficking Data Collaborative has made great progress in overcoming data obstacles, but more work is needed throughout the counter-trafficking community to agree on common standards and methods of data sharing and applicability. Disaggregated case-level data are the most detailed source of information on human trafficking and should thus play a vital part of any meaningful analysis on the phenomenon.&nbsp;</span></p><span data-dcnode-id="2219" instrument_node="">
</span></div><span data-dcnode-id="2217" instrument_node="">
</span></div><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2212"><b data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">National reporting mechanisms</span></b></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Another key source of trafficking information is official reports on administrative data compiled by governments (or other central reporting bodies) on human trafficking cases within their national jurisdictions.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node="">UNODC surveys governments on trafficking victims identified in their respective countries for the Global Report on Trafficking in Persons, using a common questionnaire with a standard set of indicators, and then aggregates the results.&nbsp; The </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/data-and-analysis/glotip.html" rel="noopener" target="_blank"><span data-dcnode-id="2206" instrument_node="">most recent global report</span></a><span data-dcnode-id="2204" instrument_node=""> was produced in 2018. In 2016, this exercise produced data on more than 24,000 identified victims of trafficking from 97 governments, a peak compared to the previous years. Data are largely published in the form of total numbers disaggregated by variables such as sex, age, and type of exploitation, wherever possible. In addition to government surveys, UNODC collects official information such as police reports that are available in the public domain, and some information from inter-governmental organisations and NGOs.&nbsp;</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2199"><b data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Estimating prevalence of human trafficking</span></b></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">There are currently no global or regional estimates of the prevalence of human trafficking.&nbsp;</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Some national estimates have been developed, including using human trafficking administrative data:</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2188"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Multiple Systems Estimation</span></strong><span data-dcnode-id="2189" instrument_node=""> is the methodology used to estimate the total (unidentified and identified) victims of trafficking at country level. This is based on the analysis of the overlap of multiple lists of human trafficking cases provided by different actors in the counter-trafficking field, such as NGOs, law enforcement, other authorities and international organizations. MSE depends upon the existence of various databases of identified victims of human trafficking in the country of implementation. A number of other technical assumptions should also be met. For example, it must be possible for more than one entity recording administrative data to be able to independently identify a victim of trafficking. Researchers developing the method have estimated that it could potentially be used in approximately 50 countries around the world. Initial estimates have already been conducted in several countries, including the UK and the Netherlands.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p class="text-align-justify" data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Relatively few examples of estimates of related forms of exploitation exist:</span></p><span data-dcnode-id="2184" instrument_node="">
</span><ul data-dcnode-id="2167"><li data-dcnode-id="2175"><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilo.org/wcmsp5/groups/public/%40dgreports/%40dcomm/documents/publication/wcms_575479.pdf" rel="noopener" target="_blank"><b data-dcnode-id="2181"><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">2017 Global Estimates of Modern Slavery</span></i></b></a><b data-dcnode-id="2177"><i data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node=""> </span></i></b><span data-dcnode-id="2176" instrument_node="">- This is a global estimate of the prevalence of the human-trafficking-related crimes of forced labour and forced marriage, produced by the International Labour Organisation (ILO) and the Walk Free Foundation (WFF), in collaboration with IOM. The 2017 report estimates that 40 million people were victims of modern slavery in any given day in 2016. Out of these, approximately 25 million people were in forced labour and another 15 million people were in a forced marriage. Data from IOM’s human trafficking database on sexual exploitation and child exploitation were used for the estimates.&nbsp;</span></li><span data-dcnode-id="2174" instrument_node="">
</span><li data-dcnode-id="2169"><b data-dcnode-id="2171"><i data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Estimating forced labour, forced recruitment and abductions in displacement contexts</span></i></b><span data-dcnode-id="2170" instrument_node="">. IOM is developing a series of comparable estimates on prevalence of forced labour, forced marriage, forced recruitment into armed groups and abductions among Internally Displaced People (IDPs) and their families, in partnership with ILO and WFF. This is a pilot research initiative in three countries with large numbers of IDPs and where IOM has substantial humanitarian operations and suitable sampling frames. The report with the findings, methodology and recommendations will be published in 2020.&nbsp;</span></li><span data-dcnode-id="2168" instrument_node="">
</span></ul><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2161"><b data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Trafficking in humanitarian settings and large-scale migration flows</span></b></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Humanitarian crises such as those associated with conflicts or natural disasters may exacerbate pre-existing trafficking trends and give rise to new ones. While some forms of trafficking could be a direct result of crises, such as exploitative sexual services demanded by armed groups or the forced recruitment of child soldiers, others are less evident, with traffickers thriving on the widespread human, material, social and economic losses caused by crises and the inability of families and communities to protect themselves and their children. &nbsp;</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">IOM works to combat trafficking and protect trafficked persons in humanitarian settings. To address the acute need for data for evidence-based programming in these location, IOM has been using its Displacement Tracking Matrix to regularly collect data on risks and issues relevant to human trafficking and exploitation in crises. In addition, IOM with partners is also working to produce prevalence estimates on issues related to human trafficking.&nbsp;</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Locations of recent regular data collection with human trafficking indicators include Cox’s Bazar in Bangladesh, North-East Nigeria, Ukraine, Central and South American countries. The data gathered during these operations can be used to better understand risks to trafficking, vulnerability to exploitation, gaps in assistance and to identify areas of further research.&nbsp;</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">IOM, through DTM, also produces primary data on the migrants’ vulnerability to human trafficking, abuse, exploitation and violence on different migration routes, for example on the main migration routes to Europe. Data with trafficking indicators are collected in countries like Italy, Libya, or Greece. Further similar data collection is planned in countries from Central and West Africa, and in Eastern Africa.&nbsp;</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2147" instrument_node="">IOM produced a </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iom.int/sites/default/files/press_release/file/Harrowing_Journeys_Children_and_youth_on_the_move_across_the_Mediterranean.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2146" instrument_node="">report with UNICEF</span></a><span data-dcnode-id="2144" instrument_node=""> on the specific experiences of children and youth migrating via the Mediterranean migration routes to Europe. In a separate report, IOM identified </span><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//migration.iom.int/docs/migrant_vulnerability_to_human_trafficking_and_exploitation_november_2017.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2143" instrument_node="">predictors of vulnerability to human trafficking and exploitation for migrants</span></a><span data-dcnode-id="2141" instrument_node=""> taking these routes. There is limited reliable data on human trafficking and exploitation in displacement contexts.&nbsp;</span></p><span data-dcnode-id="2139" instrument_node="">
</span><a class="back-to-top" data-dcnode-id="2137" href="#top"><span data-dcnode-id="2138" instrument_node="">Back to top</span></a><span data-dcnode-id="2136" instrument_node="">
</span><h2 data-dcnode-id="2134" id="data-strengths-amp-limitations"><span data-dcnode-id="2135" instrument_node="">Data strengths &amp; limitations</span></h2><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2130"><b data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Operational case data and victim profiles</span></b></p><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">The availability of data on identified victims of trafficking depends on a range of factors, for example on whether counter trafficking organizations are operational or able to consistently collect or share data in any given country/location. Therefore, data coverage is not always comprehensive. Presence of large quantities of human trafficking data may not necessarily indicate higher prevalence, and a paucity of data in certain contexts may be due a lack of effective counter-trafficking responses.&nbsp; Identified cases are better understood as a sample of the unidentified population of victims. This sample may be biased if some types of trafficking cases are more likely to be identified (or referred) than others. Even if this is the case, the extent of the bias is rarely known, since the unidentified population is, by definition, unknown. Nevertheless, where available, these data are indispensable, as they provide detailed insight into the profiles and experiences of the victims, the forms of human trafficking, and information on perpetrators.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2123"><b data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">National reporting mechanisms</span></b></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">While data from National Reporting Mechanisms are not detailed and generally only available as high-level aggregates, limiting their use, they have the widest geographical coverage and therefore provide useful baseline information on human trafficking at the global level. Furthermore, in the absence of publicly available disaggregated data, official reports may be the only source of data on identified victims available in a given country or region.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2116"><b data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Estimating prevalence of human trafficking</span></b></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">National estimates of trafficking prevalence have been produced in several countries. However, they are commonly based on modelling of existing administrative data from identified cases and should therefore only be considered as basic baseline estimates. Historically, producing estimates of the prevalence of trafficking based on the collection of new primary data, for example through surveys, has been difficult. This is due to trafficking’s complicated legal definition and the ethical challenges of addressing sensitive questions to household survey respondents. Not all countries can be sampled due to resource constraints, security reasons, or the presence of large-scale humanitarian emergencies. There are also ethical considerations and further challenges related to large-scale household surveys in terms of the sensitivity of certain questions (for example, questions related to sexual exploitation or violence) and the difficulty of collecting data about children. This makes the case data mentioned above all the more valuable, both to gain insights on these specific profiles and to support estimations.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2109"><b data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Trafficking in humanitarian settings and large-scale migration flows</span></b></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Finally, humanitarian settings are often highly pressurised and fast changing environments, where conducting rigorous and ethical data collection can be challenging. For example, access to affected populations for data collectors can rapidly change, and services relevant for assistance of victims of human trafficking might not initially exist in crisis-affected locations.&nbsp; Therefore, the methods of data collection need to avoid causing harm, and they need to be time-sensitive and adaptable. Sampling best practices can also be challenging to implement in some environments.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><div class="further-reading" data-dcnode-id="1868"><span data-dcnode-id="2104" instrument_node="">
