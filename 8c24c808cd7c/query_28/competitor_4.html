</span><p class="mt-0" data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">An estimated </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilo.org/wcmsp5/groups/public/%40dgreports/%40dcomm/documents/publication/wcms_575479.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1209" instrument_node="">40 million people</span></a><span data-dcnode-id="1207" instrument_node=""> are victims of modern day slavery and human trafficking. Though it might seem shocking that anyone in today’s world could still be forced into domestic servitude, child labor, sex trades, and other unthinkable situations, it’s something that happens in hundreds of countries – and it might even be happening in your own backyard. </span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Recognizing the signs of human trafficking is just the first step in stopping these heinous acts. By becoming better informed on the issue, raising awareness, speaking up and taking action, we can all do our part to help victims of trafficking. This guide will improve your knowledge and show how you can join the cause to give others a chance at a free life. Whether you want to become a volunteer, learn how to spot red flags of trafficking in your community, or make ending trafficking your life’s work in a dedicated career, you’ll be ready to make a real difference.</span></p><span data-dcnode-id="1202" instrument_node="">

</span></div><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span></div><span data-dcnode-id="1059" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1058" style="height:60px"></div><span data-dcnode-id="1057" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="1055" id="1" style="color:#1976d2"><span data-dcnode-id="1056" instrument_node="">What Is Human Trafficking, Who Does It Affect, and Where Does It Happen?</span></h2><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Many people have misconceptions about human trafficking, such as what it is and who it affects. The Trafficking Victims Protection Act of 2000 defines “severe forms of trafficking in persons” as:</span></p><span data-dcnode-id="1051" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1050" style="height:20px"></div><span data-dcnode-id="1049" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center lightBlueBlock" data-dcnode-id="1044" style="background-color:#f2faff;padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px"><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Sex trafficking in which a commercial sex act is induced by force, fraud, or coercion, or in which the person induced to perform such an act has not attained 18 years of age.</span></p><span data-dcnode-id="1045" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center or-blocks" data-dcnode-id="1038" style="background-color:#1976d2;border-style:solid;border-width:1px;border-color:#1976d2;border-radius:50px"><span data-dcnode-id="1042" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="1040" style="color:#ffffff;font-size:14px"><span data-dcnode-id="1041" instrument_node="">or</span></p><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center lightBlueBlock" data-dcnode-id="1032" style="background-color:#f2faff;padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px"><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">The recruitment, harboring, transportation, provision, or obtaining of a person for labor or services, through the use of force, fraud, or coercion for the purpose of subjection to involuntary servitude, peonage, debt bondage, or slavery. A victim need not be physically transported from one location to another for the crime to fall within this definition.</span></p><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">Source: </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/wp-content/uploads/2019/06/2019-Trafficking-in-Persons-Report.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1029" instrument_node="">U.S. Department of State Trafficking in Person’s Report</span></a><span data-dcnode-id="1027" instrument_node=""> </span></p><span data-dcnode-id="1025" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="1024" style="height:20px"></div><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The terms human trafficking and modern slavery are often used interchangeably. What’s the difference between the two, if any?</span></p><span data-dcnode-id="1020" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1019" style="height:30px"></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center two-col-blue-blocks" data-dcnode-id="987"><span data-dcnode-id="1017" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="989"><span data-dcnode-id="1016" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="1004"><span data-dcnode-id="1015" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="1006" style="background-color:#f2faff;padding-top:30px;padding-right:30px;padding-bottom:30px;padding-left:30px"><span data-dcnode-id="1014" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="1011" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Human Trafficking</span></strong></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Though the U.S. Department of State considers “human trafficking” to include both sex trafficking and forced labor, this term ais most often associated with sex trafficking.</span></p><span data-dcnode-id="1007" instrument_node="">
</span></div><span data-dcnode-id="1005" instrument_node="">
</span></div><span data-dcnode-id="1003" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="991"><span data-dcnode-id="1002" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="993" style="background-color:#f2faff;padding-top:30px;padding-right:30px;padding-bottom:30px;padding-left:30px"><span data-dcnode-id="1001" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="998" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Modern Slavery</span></strong></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">According to the U.S. Department of State, modern slavery is an umbrella term that also encompasses both sex trafficking and forced labor. However, most people think of modern slavery as forced labor, including domestic servitude or debt bondage.</span></p><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">
</span></div><span data-dcnode-id="990" instrument_node="">
</span></div><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="985" instrument_node="">While human trafficking is often associated with transporting individuals across borders, it doesn’t have to involve the movement of victims as noted by the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/what-is-modern-slavery/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">U.S. Department of State</span></a><span data-dcnode-id="982" instrument_node="">. It includes men, women, and children of all ages, races, nationalities, or genders. Human trafficking can be happening right now in your community. Many believe human trafficking is only a problem in certain countries, but the unfortunate truth is that </span><a aria-label=" (opens in a new tab)" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/en/human-trafficking/faqs.html%23Which_countries_are_affected_by_human_trafficking" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">human trafficking happens everywhere</span></a><span data-dcnode-id="979" instrument_node="">. Though most trafficking is national or regional, international trafficking is also a serious problem. Long-distance trafficking most commonly takes a victim from one lesser-developed country to a more developed country. Most victims come from Asia, though the Americas are quite common as both a destination and an origin point for trafficking. </span></p><span data-dcnode-id="977" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="976" style="height:60px"></div><span data-dcnode-id="975" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="973" style="color:#1976d2"><span data-dcnode-id="974" instrument_node="">Types of Human Trafficking</span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Though sex trafficking is what often makes the news, there are other forms of trafficking that can be just as devastating for victims. Here are some of the most common forms of trafficking happening on a daily basis around the world. </span></p><span data-dcnode-id="969" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="968" style="height:20px"></div><span data-dcnode-id="967" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="954"><div class="advgb-accordion-inner tab-open" data-dcnode-id="955"><div class="advgb-accordion-header" data-dcnode-id="964" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="965" style="color:#1976d2"><span data-dcnode-id="966" instrument_node="">Forced Labor</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="956" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">Forced labor involves using physical force, threats, coercion, deception, abuse of the legal system, or other forms of coercion to compel a victim to work for an employer. Victims might not receive any sort of paycheck or compensation, or might receive so little that it keeps them dependent on the employer. According to </span><a aria-label=" (opens in a new tab)" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicefusa.org/mission/protect/trafficking/end" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="961" instrument_node="">UNICEF global estimates</span></a><span data-dcnode-id="959" instrument_node="">, 25 million adults and children are victims of forced labor. This includes children working in global supply chains.</span></p><span data-dcnode-id="957" instrument_node="">
</span></div></div></div><span data-dcnode-id="953" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="952" style="height:20px"></div><span data-dcnode-id="951" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="941"><div class="advgb-accordion-inner tab-open" data-dcnode-id="942"><div class="advgb-accordion-header" data-dcnode-id="948" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="949" style="color:#1976d2"><span data-dcnode-id="950" instrument_node="">Bonded Labor</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="943" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Sometimes known as debt bondage or peonage, bonded labor deliberately puts victims into a deep debt. For example, a victim might inherit the debts of relatives, or might be charged recruitment fees, extreme interest rates, or expensive rates for room and board. Victims often feel as though they have no recourse, especially if their legal status in a particular country is tied to their employer. </span></p><span data-dcnode-id="944" instrument_node="">
</span></div></div></div><span data-dcnode-id="940" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="939" style="height:20px"></div><span data-dcnode-id="938" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="928"><div class="advgb-accordion-inner tab-open" data-dcnode-id="929"><div class="advgb-accordion-header" data-dcnode-id="935" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="936" style="color:#1976d2"><span data-dcnode-id="937" instrument_node="">Domestic Servitude</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="930" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">This type of trafficking happens in private homes, where the victim is abused and underpaid, assuming they receive any pay at all. Working in a private home can keep them isolated, and they might not get a day off or have to work very long hours. Since labor officials don’t often have the ability to inspect employment conditions in a private home, the abuse can continue for years. </span></p><span data-dcnode-id="931" instrument_node="">
</span></div></div></div><span data-dcnode-id="927" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="926" style="height:20px"></div><span data-dcnode-id="925" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="912"><div class="advgb-accordion-inner tab-open" data-dcnode-id="913"><div class="advgb-accordion-header" data-dcnode-id="922" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="923" style="color:#1976d2"><span data-dcnode-id="924" instrument_node="">Sex Trafficking</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="914" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">The </span><a aria-label=" (opens in a new tab)" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicefusa.org/mission/protect/trafficking/end" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="919" instrument_node="">United Nations Office on Drugs and Crime (UNODC)</span></a><span data-dcnode-id="917" instrument_node=""> found that 79% of human trafficking involves sexual exploitation. However, this might be because the exploitation of women is much more visible in modern society than other types of trafficking, such as domestic servitude. It is also much more frequently reported than other types of human trafficking. Though men can be trafficked into sex trades, women are much more likely to be victims.</span></p><span data-dcnode-id="915" instrument_node="">
</span></div></div></div><span data-dcnode-id="911" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="910" style="height:20px"></div><span data-dcnode-id="909" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="896"><div class="advgb-accordion-inner tab-open" data-dcnode-id="897"><div class="advgb-accordion-header" data-dcnode-id="906" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="907" style="color:#1976d2"><span data-dcnode-id="908" instrument_node="">Child Sex Trafficking</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="898" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">Occurs when anyone under the age of 18 is somehow brought into the sex trades, whether through recruitment, transport, solicitation, or any other form of coercion, force, or fraud. Proof of these methods is not necessary to prosecute child sex trafficking. According to the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/what-is-modern-slavery/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="903" instrument_node="">U.S. State Department</span></a><span data-dcnode-id="901" instrument_node="">, those under the age of 18 in the sex trades are always considered trafficked. This rule is the same in most countries around the world.</span></p><span data-dcnode-id="899" instrument_node="">
</span></div></div></div><span data-dcnode-id="895" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="894" style="height:60px"></div><span data-dcnode-id="893" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center blueBorderBlockMain" data-dcnode-id="843" style="background-color:#f2faff;padding-right:30px;padding-bottom:30px;padding-left:30px;border-style:solid;border-width:5px;border-color:#1976d2"><span data-dcnode-id="892" instrument_node="">
</span><div class="wp-block-image info-image" data-dcnode-id="887"><figure class="aligncenter size-large" data-dcnode-id="888"><img alt="blue info" class="wp-image-8692" data-dcnode-id="891" data-emsrcset="https://www.publicservicedegrees.org/wp-content/uploads/2020/03/blue-info.png" height="99" lazyload="true" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/wp-content/uploads/2020/03/blue-info.png&amp;raw" srcset="https://www.publicservicedegrees.org/wp-content/uploads/2020/03/blue-info.png" width="99"><noscript data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">&lt;img loading="lazy" width="99" height="99" src="//www.publicservicedegrees.org/wp-content/uploads/2020/03/blue-info.png" alt="blue info" class="wp-image-8692"/&gt;</span></noscript></figure></div><span data-dcnode-id="886" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="845" style="padding-right:20px;padding-left:20px"><span data-dcnode-id="885" instrument_node="">
</span><p class="has-text-align-center has-text-color has-large-font-size" data-dcnode-id="882" style="color:#1976d2"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Did You Know?</span></strong></p><span data-dcnode-id="881" instrument_node="">
</span><ul class="simple-list" data-dcnode-id="864"><li data-dcnode-id="877"><span data-dcnode-id="880" instrument_node="">In the United States, California has the most trafficking reported, followed by Texas, Florida, Ohio, and Georgia. </span><sup data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">1</span></sup></li><li data-dcnode-id="873"><span data-dcnode-id="876" instrument_node="">Every year, traffickers earn approximately $39 billion on exploitation of children alone. </span><sup data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">2</span></sup></li><li data-dcnode-id="869"><span data-dcnode-id="872" instrument_node="">As of 2017, it’s estimated that 40 million people are enslaved across the world. </span><sup data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">3</span></sup></li><li data-dcnode-id="865"><span data-dcnode-id="868" instrument_node="">71% of modern slavery victims are women and girls. </span><sup data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">3</span></sup></li></ul><span data-dcnode-id="863" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="861" style="color:#333333"><span data-dcnode-id="862" instrument_node="">Sources:</span></p><span data-dcnode-id="860" instrument_node="">
</span><ul class="list-horizontal" data-dcnode-id="847" start="1"><li data-dcnode-id="856"><span data-dcnode-id="859" instrument_node="">1. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/states" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="858" instrument_node="">HumanTraffickingHotline.org</span></a></li><li data-dcnode-id="852"><span data-dcnode-id="855" instrument_node="">2. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicefusa.org/mission/protect/trafficking/end" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">UNICEF USA</span></a></li><li data-dcnode-id="848"><span data-dcnode-id="851" instrument_node="">3. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilo.org/wcmsp5/groups/public/%40dgreports/%40dcomm/documents/publication/wcms_575479.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="850" instrument_node="">International Labor Office</span></a></li></ul><span data-dcnode-id="846" instrument_node="">
</span></div><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="841" style="height:60px"></div><span data-dcnode-id="840" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="838" id="2" style="color:#1976d2"><span data-dcnode-id="839" instrument_node="">Recognizing the Signs of Human Trafficking</span></h2><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Victims of human trafficking often cannot seek help on their own. That’s why it’s so critical for everyone to be aware of the signs. It’s especially important for those who work in public service or medical careers, as the nature of their work makes it more likely that they will come into contact with trafficking victims. Here are some of the red flags a person may be a trafficking victim:</span></p><span data-dcnode-id="834" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="816" style="padding-top:10px;padding-left:50px;margin-bottom:35px"><span data-dcnode-id="833" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons" data-dcnode-id="818"><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Has unusual restrictions at work, such as no breaks</span></li><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Works excessively long hours, or lives and works onsite</span></li><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Has a great deal of anxiety, worry, or depression</span></li><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Exhibits fear at the mention of law enforcement officials</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Offers a scripted story to explain signs of abuse </span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Is not allowed to speak for themselves</span></li><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Shows signs of poor hygiene, malnourishment, fatigue, or abuse</span></li></ul><span data-dcnode-id="817" instrument_node="">
</span></div><span data-dcnode-id="815" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-15" data-dcnode-id="771" style="background-color:#f2faff;padding-top:30px;padding-right:30px;padding-bottom:30px;padding-left:30px;margin-bottom:30px;border-top-style:solid;border-top-width:5px;border-top-color:#1976d2"><span data-dcnode-id="814" instrument_node="">
</span><h3 class="h3-heading has-text-color" data-dcnode-id="812" style="color:#1976d2"><span data-dcnode-id="813" instrument_node="">Signs to Look Out for in Your Profession</span></h3><span data-dcnode-id="811" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center simple-blue-block" data-dcnode-id="800" style="margin-bottom:30px"><span data-dcnode-id="810" instrument_node="">
</span><p class="blue-title-text has-text-color" data-dcnode-id="808" style="color:#1976d2;font-size:22px"><span data-dcnode-id="809" instrument_node="">Medical Professionals</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">Those in the medical profession are in a unique position to spot physical signs of abuse, overwork, neglect, or other concerns that could raise a red flag for trafficking. It’s important to remember that trafficked men, women, and children might exhibit signs of abuse, malnutrition, poor hygiene, severe fatigue, signs of physical restraint or confinement, as well as anxiety, depression, paranoia, and other mental health symptoms. Healthcare professionals can reference this </span><a aria-label=" (opens in a new tab)" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/resources/recognizing-and-responding-human-trafficking-healthcare-context" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">training material from Polaris</span></a><span data-dcnode-id="803" instrument_node=""> to learn more about how to recognize and respond to human trafficking.</span></p><span data-dcnode-id="801" instrument_node="">
</span></div><span data-dcnode-id="799" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center simple-blue-block" data-dcnode-id="791" style="margin-bottom:30px"><span data-dcnode-id="798" instrument_node="">
</span><p class="blue-title-text has-text-color" data-dcnode-id="796" style="color:#1976d2;font-size:22px"><span data-dcnode-id="797" instrument_node="">Social Workers &amp; Mental Health Professionals</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Victims of human trafficking might reach out for help in subtle ways, such as through pleading eye contact, cryptic statements, or body language that indicates they are fearful or anxious. Mental health issues are also common in victims of trafficking and can include depression, paranoia, a lost sense of time, scripted stories, submissive behavior, or signs of substance abuse or addiction. </span></p><span data-dcnode-id="792" instrument_node="">
</span></div><span data-dcnode-id="790" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center simple-blue-block" data-dcnode-id="782" style="margin-bottom:30px"><span data-dcnode-id="789" instrument_node="">
</span><p class="blue-title-text has-text-color" data-dcnode-id="787" style="color:#1976d2;font-size:22px"><span data-dcnode-id="788" instrument_node="">Criminal Justice &amp; Law Enforcement</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Victims of human trafficking often have a fear of law enforcement, as they are conditioned to protect their abusers. Given that, sometimes you must go looking for them – monitor dating or hookup sites, conduct surveillance of motels, strip clubs, and massage parlors, and after executing warrants, make a point of photographing everything to demonstrate the conditions the victims are forced to live in. </span></p><span data-dcnode-id="783" instrument_node="">
</span></div><span data-dcnode-id="781" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center simple-blue-block" data-dcnode-id="773" style="margin-bottom:30px"><span data-dcnode-id="780" instrument_node="">
</span><p class="blue-title-text has-text-color" data-dcnode-id="778" style="color:#1976d2;font-size:22px"><span data-dcnode-id="779" instrument_node="">Teachers &amp; Educators</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Teachers see the same students every day, and over time can begin to pinpoint strange behaviors. This insight into a student’s day-to-day wellbeing can help catch issues concerning human trafficking, such as being forced to work in child labor or being trafficked for sex. Teachers might also notice changes in the behavior or mental health of the parents, and that can raise red flags that lead to getting in touch with guidance counselors or social workers to further investigate the potential issues.</span></p><span data-dcnode-id="774" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-15" data-dcnode-id="762" style="background-color:#f2faff;padding-top:30px;padding-right:30px;padding-bottom:30px;padding-left:30px;margin-bottom:30px;border-top-style:solid;border-top-width:5px;border-top-color:#1976d2"><span data-dcnode-id="769" instrument_node="">
</span><h3 class="h3-heading has-text-color" data-dcnode-id="767" style="color:#1976d2"><span data-dcnode-id="768" instrument_node="">Signs to Look Out for as a Friend or Relative</span></h3><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Look for changes in the behavior, attitude, and mental and physical health of friends and family members. Are they suddenly secretive? Do they seem to have new friends who are very demanding? Are they spending more time isolated from everyone they used to enjoy being around? Are they suddenly working all the time, deep in debt, or hiding where they go and what they do – especially when they used to be quite open? These could all be signs that your friend or family members has been caught up in the web of human trafficking. </span></p><span data-dcnode-id="763" instrument_node="">
</span></div><span data-dcnode-id="761" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-15" data-dcnode-id="753" style="background-color:#f2faff;padding-top:30px;padding-right:30px;padding-bottom:30px;padding-left:30px;border-top-style:solid;border-top-width:5px;border-top-color:#1976d2"><span data-dcnode-id="760" instrument_node="">
</span><h3 class="h3-heading has-text-color" data-dcnode-id="758" style="color:#1976d2"><span data-dcnode-id="759" instrument_node="">Signs to Look Out for as a Concerned Citizen</span></h3><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Airport travelers often hear the words: “See something, say something.” The same holds true if you see anything that looks amiss and wonder if it might be worth investigating. Look for situations where someone is being coerced, seemingly held against their will, forced to do things they don’t want to do, say things that seem a little off, covered in bruises, being fearfully submissive, or appear to be afraid of something that you can’t really pinpoint. In short, if it looks suspicious, it probably is. Gather all the information you can, such as license plate numbers and descriptions, then contact the authorities.</span></p><span data-dcnode-id="754" instrument_node="">
</span></div><span data-dcnode-id="752" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="751" style="height:60px"></div><span data-dcnode-id="750" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="748" id="3" style="color:#1976d2"><span data-dcnode-id="749" instrument_node="">5 Ways You Help Stop Human Trafficking Right Now</span></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">In many cases, a victim has been saved from human trafficking simply because someone spoke up. They saw the signs and made some noise. Here are some simple ways you can get involved and make a real difference. </span></p><span data-dcnode-id="744" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="743" style="height:20px"></div><span data-dcnode-id="742" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="520"><span data-dcnode-id="741" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="703" style="background-color:#f2faff;padding-top:20px;padding-right:20px;padding-bottom:20px;padding-left:20px;margin-bottom:30px;border-left-style:solid;border-left-width:5px;border-left-color:#1976d2"><span data-dcnode-id="740" instrument_node="">
</span><div class="wp-block-columns mb-0" data-dcnode-id="705"><span data-dcnode-id="739" instrument_node="">
</span><div class="wp-block-column red-squre-block" data-dcnode-id="731" style="flex-basis:20%"><span data-dcnode-id="738" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="733" style="background-color:#f44336"><span data-dcnode-id="737" instrument_node="">
</span><p class="has-text-align-center has-text-color has-huge-font-size" data-dcnode-id="735" style="color:#ffffff"><span data-dcnode-id="736" instrument_node="">1</span></p><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="732" instrument_node="">
</span></div><span data-dcnode-id="730" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="707" style="flex-basis:80%"><span data-dcnode-id="729" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="726" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Raise awareness</span></strong></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The problem will not end unless everyone knows it’s there in the first place. Raising awareness of the issue on a local, regional, and national level is the first step toward ending the trafficking of men, women, and children. Here are some ways to get the word out there.</span></p><span data-dcnode-id="722" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="709" style="padding-left:30px"><span data-dcnode-id="721" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons" data-dcnode-id="711"><li data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">Share this </span><a aria-label=" (opens in a new tab)" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freetheslaves.net/wp-content/uploads/2018/04/Trafficking-ans-Slavery-Fact-Sheet-April-2018.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="719" instrument_node="">Slavery and Trafficking Fact Sheet</span></a><span data-dcnode-id="717" instrument_node=""> to help others see how prevalent the problem is.</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Host an educational event at a local community center that focuses on how to spot the signs of human trafficking.</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Share your concerns backed by solid information on social media.</span></li></ul><span data-dcnode-id="710" instrument_node="">
</span></div><span data-dcnode-id="708" instrument_node="">
</span></div><span data-dcnode-id="706" instrument_node="">
</span></div><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="653" style="background-color:#f2faff;padding-top:20px;padding-right:20px;padding-bottom:20px;padding-left:20px;margin-bottom:30px;border-left-style:solid;border-left-width:5px;border-left-color:#1976d2"><span data-dcnode-id="701" instrument_node="">
</span><div class="wp-block-columns mb-0" data-dcnode-id="655"><span data-dcnode-id="700" instrument_node="">
</span><div class="wp-block-column red-squre-block" data-dcnode-id="692" style="flex-basis:20%"><span data-dcnode-id="699" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="694" style="background-color:#f44336"><span data-dcnode-id="698" instrument_node="">
</span><p class="has-text-align-center has-text-color has-huge-font-size" data-dcnode-id="696" style="color:#ffffff"><span data-dcnode-id="697" instrument_node="">2</span></p><span data-dcnode-id="695" instrument_node="">
</span></div><span data-dcnode-id="693" instrument_node="">
</span></div><span data-dcnode-id="691" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="657" style="flex-basis:80%"><span data-dcnode-id="690" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="687" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Fundraise for anti-trafficking organizations</span></strong></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Many anti-trafficking organizations run on a shoestring budget. Raising money for them can help immensely in their quest to help others. Fundraising can include everything from running a funding drive online to meeting with members of your local community and offering information and asking for donations.</span></p><span data-dcnode-id="683" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons" data-dcnode-id="676"><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Hold fundraising drives at local shelters or shopping malls</span></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Set up crowdfunding and give details about the organization you’re supporting</span></li><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Hold a silent auction to help the community pitch in</span></li></ul><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Once you decide on how you’ll fundraise, choose an organization. Make sure your fundraising efforts and dollars are benefiting reputable anti-trafficking organizations that will actually make a difference, not just pad their executives’ paychecks. Here are a few organizations that rate charities and nonprofits, so you can feel confident you’re supporting a good cause.</span></p><span data-dcnode-id="672" instrument_node="">
</span><ul class="red-verticle-list" data-dcnode-id="659"><li data-dcnode-id="669"><a aria-label=" (opens in a new tab)" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charitynavigator.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="671" instrument_node="">CharityNavigator.org</span></a></li><li data-dcnode-id="666"><a aria-label=" (opens in a new tab)" data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charitywatch.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="668" instrument_node="">CharityWatch.org</span></a></li><li data-dcnode-id="663"><a aria-label=" (opens in a new tab)" data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalgiving.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="665" instrument_node="">GlobalGiving.org</span></a></li><li data-dcnode-id="660"><a aria-label=" (opens in a new tab)" data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guidestar.org/search" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="662" instrument_node="">GuideStar.org</span></a></li></ul><span data-dcnode-id="658" instrument_node="">
</span></div><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">

</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="617" style="background-color:#f2faff;padding-top:20px;padding-right:20px;padding-bottom:20px;padding-left:20px;margin-bottom:30px;border-left-style:solid;border-left-width:5px;border-left-color:#1976d2"><span data-dcnode-id="651" instrument_node="">

</span><p class="has-text-color" data-dcnode-id="637" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Volunteer for anti-trafficking organizations</span></strong></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">As mentioned earlier, many of the organizations fighting human trafficking just don’t have enough funds to go around. They rely heavily on volunteers to make the difference. Use the following resources to find volunteering opportunities near you.</span></p><span data-dcnode-id="633" instrument_node="">
</span><ul class="red-verticle-list full-with-list" data-dcnode-id="623"><li data-dcnode-id="630"><a aria-label=" (opens in a new tab)" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickinghotline.org/training-resources/referral-directory" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="632" instrument_node="">The National Human Trafficking Hotline Referral Directory</span></a></li><li data-dcnode-id="627"><a aria-label=" (opens in a new tab)" data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalmodernslavery.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="629" instrument_node="">Global Modern Slavery Directory</span></a></li><li data-dcnode-id="624"><a aria-label=" (opens in a new tab)" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.endslaverynow.org/act/volunteer" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="626" instrument_node="">EndSlaveryNow.org Volunteer Directory</span></a></li></ul><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span></div><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="582" style="background-color:#f2faff;padding-top:20px;padding-right:20px;padding-bottom:20px;padding-left:20px;margin-bottom:30px;border-left-style:solid;border-left-width:5px;border-left-color:#1976d2"><span data-dcnode-id="615" instrument_node="">
</span><div class="wp-block-columns mb-0" data-dcnode-id="584"><span data-dcnode-id="614" instrument_node="">
</span><div class="wp-block-column red-squre-block" data-dcnode-id="606" style="flex-basis:20%"><span data-dcnode-id="613" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="608" style="background-color:#f44336"><span data-dcnode-id="612" instrument_node="">
</span><p class="has-text-align-center has-text-color has-huge-font-size" data-dcnode-id="610" style="color:#ffffff"><span data-dcnode-id="611" instrument_node="">4</span></p><span data-dcnode-id="609" instrument_node="">
</span></div><span data-dcnode-id="607" instrument_node="">
</span></div><span data-dcnode-id="605" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="586" style="flex-basis:80%"><span data-dcnode-id="604" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="601" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Civic engagement: promote anti-trafficking legislation</span></strong></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">The stronger the legislation, the more difficult it is for traffickers to find loopholes and avoid punishment when they are caught. There are many things you can do to help the process along: </span></p><span data-dcnode-id="597" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons" data-dcnode-id="588"><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Write to your local, state, and federal representatives</span></li><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Sign petitions that aim to strengthen anti-trafficking laws</span></li><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Speak up at town halls and other political meetings about the problem</span></li><li data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Write a letter to the editor of a prominent news organization concerning the issue on a local level</span></li></ul><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="522" style="background-color:#f2faff;padding-top:20px;padding-right:20px;padding-bottom:20px;padding-left:20px;border-left-style:solid;border-left-width:5px;border-left-color:#1976d2"><span data-dcnode-id="580" instrument_node="">
</span><div class="wp-block-columns mb-0" data-dcnode-id="524"><span data-dcnode-id="579" instrument_node="">
</span><div class="wp-block-column red-squre-block" data-dcnode-id="571" style="flex-basis:20%"><span data-dcnode-id="578" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="573" style="background-color:#f44336"><span data-dcnode-id="577" instrument_node="">
</span><p class="has-text-align-center has-text-color has-huge-font-size" data-dcnode-id="575" style="color:#ffffff"><span data-dcnode-id="576" instrument_node="">5</span></p><span data-dcnode-id="574" instrument_node="">
</span></div><span data-dcnode-id="572" instrument_node="">
</span></div><span data-dcnode-id="570" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="526" style="flex-basis:80%"><span data-dcnode-id="569" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="566" style="color:#1976d2;font-size:24px"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Reporting human trafficking</span></strong></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Seeing someone in a human trafficking situation can immediately spark you to call for help; but what if that person is someone you know? Though reporting is still necessary, the emotions around it can be complicated. That’s one of the reasons organizations allow for anonymous reporting. Here are a few places to get help:</span></p><span data-dcnode-id="562" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="528" style="padding-left:40px"><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="557"><a aria-label=" (opens in a new tab)" data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humantraffickinghotline.org/chat" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="560" instrument_node="">National Human Trafficking Hotline</span></a><br data-dcnode-id="558"></strong><span data-dcnode-id="556" instrument_node="">1-888-373-7888</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="550"><a aria-label=" (opens in a new tab)" data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.missingkids.org/gethelpnow/cybertipline" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="553" instrument_node="">National Center for Missing or Exploited Children (NCMEC)</span></a><br data-dcnode-id="551"></strong><span data-dcnode-id="549" instrument_node="">1-800-THE-LOST</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="540"><strong data-dcnode-id="542"><a aria-label=" (opens in a new tab)" data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ice.gov/tips" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="546" instrument_node="">Immigration and Customs Enforcement (ICE) Tip Line</span></a><span data-dcnode-id="544" instrument_node=""> </span><br data-dcnode-id="543"></strong><span data-dcnode-id="541" instrument_node="">(1-866-347-2423)</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="535"><a aria-label=" (opens in a new tab)" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tips.fbi.gov/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Federal Bureau of Investigation (FBI) Tips</span></strong></a></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="530"><a aria-label=" (opens in a new tab)" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/contact-us/field-offices/field-offices" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">FBI Local Field Office Contact Information</span></strong></a></p><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="525" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span></div><span data-dcnode-id="521" instrument_node="">
</span></div><span data-dcnode-id="519" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="518" style="height:60px"></div><span data-dcnode-id="517" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="515" id="4" style="color:#1976d2"><span data-dcnode-id="516" instrument_node="">Anti-trafficking Degree &amp; Career Paths</span></h2><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Those who feel very strongly about human trafficking and want to make a difference every single day can look to careers that put them right in the center of the fight. The following careers can help you help those who need it most.</span></p><span data-dcnode-id="511" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-30" data-dcnode-id="510" style="height:20px"></div><span data-dcnode-id="509" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="487"><div class="advgb-accordion-inner tab-open" data-dcnode-id="488"><div class="advgb-accordion-header" data-dcnode-id="506" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="507" style="color:#1976d2"><span data-dcnode-id="508" instrument_node="">Criminal Justice</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="489" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">A </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/online-degrees/criminal-justice-programs/"><span data-dcnode-id="503" instrument_node="">degree in criminal justice</span></a><span data-dcnode-id="501" instrument_node=""> opens the door to work in a wide variety of fields, including law enforcement, corrections, homeland security, social justice services, and more. These professions bump up against human trafficking threats on a regular basis; some might even work in a task force that focuses on different types of trafficking. For example:</span></p><span data-dcnode-id="499" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="491" style="padding-left:50px"><span data-dcnode-id="498" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="493"><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Border patrol agents might be able to spot trafficking in humans across borders in vans, cars, trucks, boats, and other vehicles – often the victims are well-hidden.</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node=""> A detective or criminal investigator might work on the local or state level to pinpoint trafficking operations and gather information needed to indict the perpetrators. </span></li></ul><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span></div></div></div><span data-dcnode-id="486" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="485" style="height:20px"></div><span data-dcnode-id="484" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="463"><div class="advgb-accordion-inner tab-open" data-dcnode-id="464"><div class="advgb-accordion-header" data-dcnode-id="481" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="482" style="color:#1976d2"><span data-dcnode-id="483" instrument_node="">Public Health</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="465" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="476"><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/what-can-you-do/public-health-degree/"><span data-dcnode-id="479" instrument_node="">Public health</span></a><span data-dcnode-id="477" instrument_node=""> focuses on protecting and improving the health of communities around the world. Eradicating human trafficking can be a strong focus in many public health careers, including those in mental health, public health education, emergency services, and social and behavioral health services. Some of these allow individuals to work directly with the victims of human trafficking, while others are a more supportive role. Examples include: </span></p><span data-dcnode-id="475" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="467" style="padding-left:50px"><span data-dcnode-id="474" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="469"><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">A public information officer might be the point of contact with various organizations that need information on trafficking and how to stop it.</span></li><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">A social services manager might work with communities to spot and report human trafficking issues, or might work directly with victims through nonprofit or governmental organizations. </span></li></ul><span data-dcnode-id="468" instrument_node="">
</span></div><span data-dcnode-id="466" instrument_node="">
</span></div></div></div><span data-dcnode-id="462" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="461" style="height:20px"></div><span data-dcnode-id="460" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="439"><div class="advgb-accordion-inner tab-open" data-dcnode-id="440"><div class="advgb-accordion-header" data-dcnode-id="457" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="458" style="color:#1976d2"><span data-dcnode-id="459" instrument_node="">Social Work</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="441" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="452"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/what-can-you-do/social-work-degree/"><span data-dcnode-id="455" instrument_node="">Degrees in social work</span></a><span data-dcnode-id="453" instrument_node=""> form the foundation of many careers that naturally intertwine with the fight against human trafficking. Social work can include anything from working with those in the grip of addiction to looking out for child welfare to being an integral part of the criminal justice system. Here are a few examples of what those in social work can do to help fight against trafficking: </span></p><span data-dcnode-id="451" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="443" style="padding-left:50px"><span data-dcnode-id="450" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="445"><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Substance abuse counselors can often spot the signs of a person being coerced with the use of drugs, alcohol, or other substances, and reach out to the proper authorities for a thorough investigation.</span></li><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Those in public welfare, such as a manager or supervisor, can head up projects that focus on raising awareness of human trafficking in their communities. </span></li></ul><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span></div></div></div><span data-dcnode-id="438" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="437" style="height:20px"></div><span data-dcnode-id="436" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="414"><div class="advgb-accordion-inner tab-open" data-dcnode-id="415"><div class="advgb-accordion-header" data-dcnode-id="433" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="434" style="color:#1976d2"><span data-dcnode-id="435" instrument_node="">Psychology</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="416" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">Understanding human behavior is important in most areas of day-to-day life; that’s why those with a </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/what-can-you-do/psychology-degree/"><span data-dcnode-id="430" instrument_node="">psychology degree</span></a><span data-dcnode-id="428" instrument_node=""> or background are ideal candidates for jobs that seek to eliminate human trafficking. The in-depth understanding of psychology can assist in spotting the subtle signs of trafficking, from the way a person acts when approached by others to the things they say – or do not say – in the course of a conversation or even an investigation. For example: </span></p><span data-dcnode-id="426" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="418" style="padding-left:50px"><span data-dcnode-id="425" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="420"><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">A clinical psychologist can spot not only the emotional nuances that set off red flags, but can also see the physical signs, such as bruises from restraints.</span></li><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Psychology professionals who work in human services might speak with those who are being trafficked and can be alert for the signs, such as someone not allowed to speak for themselves, someone with no clear address, and more.</span></li></ul><span data-dcnode-id="419" instrument_node="">
</span></div><span data-dcnode-id="417" instrument_node="">
</span></div></div></div><span data-dcnode-id="413" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="412" style="height:20px"></div><span data-dcnode-id="411" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="390"><div class="advgb-accordion-inner tab-open" data-dcnode-id="391"><div class="advgb-accordion-header" data-dcnode-id="408" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="409" style="color:#1976d2"><span data-dcnode-id="410" instrument_node="">Homeland Security</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="392" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="403"><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/online-degrees/homeland-security-programs/"><span data-dcnode-id="406" instrument_node="">Homeland security</span></a><span data-dcnode-id="404" instrument_node=""> is often at the forefront of the fight against trafficking on a national scale, fighting to not only rescue victims crossing into the U.S. but to punish the perpetrators with the help of the justice departments around the country. Homeland security professionals might wind up in any number of career trajectories that put them in direct contact with those in desperate need of help. A few examples include:</span></p><span data-dcnode-id="402" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="394" style="padding-left:50px"><span data-dcnode-id="401" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="396"><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Homeland security criminal investigators can look into potential trafficking rings, the transportation used to move victims from one place to another, or where perpetrators get the money to fund their operations. </span></li><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">A mission support specialist might be on the front lines of the fight against trafficking by gathering information, interviewing victims, or even working in an undercover capacity. </span></li></ul><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
</span></div></div></div><span data-dcnode-id="389" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="388" style="height:20px"></div><span data-dcnode-id="387" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="365"><div class="advgb-accordion-inner tab-open" data-dcnode-id="366"><div class="advgb-accordion-header" data-dcnode-id="384" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="385" style="color:#1976d2"><span data-dcnode-id="386" instrument_node="">Cybersecurity</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="367" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="382" instrument_node="">Human traffickers are now using advancing technology to streamline their operations. </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicservicedegrees.org/online-degrees/cyber-security-programs/"><span data-dcnode-id="381" instrument_node="">Cybersecurity</span></a><span data-dcnode-id="379" instrument_node=""> professionals can be right there to follow along, finding the traffickers and dismantling their plans. Cybersecurity provides an opportunity for individuals to work in a variety of organizations and agencies that chase traffickers and use their internet footprint to bring them to justice. For instance: </span></p><span data-dcnode-id="377" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center mob-padd-0" data-dcnode-id="369" style="padding-left:50px"><span data-dcnode-id="376" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons black-list" data-dcnode-id="371"><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Cybersecurity professionals in the FBI might work in internet “sting” operations, where they pose as a minor and attract the attention of would-be traffickers. </span></li><li data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Cybersecurity experts at Homeland Security Investigations (HSI) might be tasked with tracking down human traffickers on the Dark Web, who mask their identity and discuss their plans and illegal business dealings with like-minded perpetrators.</span></li></ul><span data-dcnode-id="370" instrument_node="">
</span></div><span data-dcnode-id="368" instrument_node="">
</span></div></div></div><span data-dcnode-id="364" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="363" style="height:20px"></div><span data-dcnode-id="362" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="352"><div class="advgb-accordion-inner tab-open" data-dcnode-id="353"><div class="advgb-accordion-header" data-dcnode-id="359" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="360" style="color:#1976d2"><span data-dcnode-id="361" instrument_node="">Women’s and Gender Studies</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="354" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Those who dive into women’s and gender studies will learn a great deal about human trafficking, especially sex trafficking. They will gain a firm understanding of the history of trafficking and how it has evolved, the reasons it is so prevalent, and most importantly, the steps that can be done to stop it. Those who graduate with a women’s and gender studies degree can put their knowledge into action by working at anti-trafficking nonprofits or governmental agencies.</span></p><span data-dcnode-id="355" instrument_node="">
</span></div></div></div><span data-dcnode-id="351" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="350" style="height:20px"></div><span data-dcnode-id="349" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block simple-accordion" data-dcnode-id="339"><div class="advgb-accordion-inner tab-open" data-dcnode-id="340"><div class="advgb-accordion-header" data-dcnode-id="346" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="347" style="color:#1976d2"><span data-dcnode-id="348" instrument_node="">International Relations</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="341" style="background-color:#f9fafb;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Human trafficking is a global problem, and those with a strong background in international relations can see the bigger picture of the issue. A degree in this field opens up doors in many lines of work, so any organization that is working to eliminate trafficking could be a good option for using your skills. International relations can provide a firm understanding of how the trafficking channels between countries work, how cultural differences can lead to various types of forced labor or sex trafficking, and how to reach out to victims with those cultural sensitivities in mind. </span></p><span data-dcnode-id="342" instrument_node="">
</span></div></div></div><span data-dcnode-id="338" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-30" data-dcnode-id="337" style="height:60px"></div><span data-dcnode-id="336" instrument_node="">
</span><h2 class="h2-heading has-text-color" data-dcnode-id="334" id="5" style="color:#1976d2"><span data-dcnode-id="335" instrument_node="">Students: How to Take Action Against Human Trafficking</span></h2><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">It might be easy for students to think they can’t do much to fight human trafficking; after all, they’re so busy with school, work, and everything in between. But there are several ways students can speak out, shine attention on the problem, and make a difference. Here’s how.</span></p><span data-dcnode-id="330" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-10" data-dcnode-id="329" style="height:20px"></div><span data-dcnode-id="328" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center red-list-block" data-dcnode-id="304" style="background-color:#f9fafb;padding-top:25px;padding-right:30px;padding-bottom:25px;padding-left:60px"><span data-dcnode-id="327" instrument_node="">
</span><ul class="mdwes-list-design check-fill-icons red-icon-list" data-dcnode-id="306"><li data-dcnode-id="323"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Create a club.</span></strong><span data-dcnode-id="324" instrument_node="">Don’t go it alone! Start a club at your school that will focus on helping the victims of human trafficking. A club like this can also help others see the signs of traffickers, so they can possibly avoid falling victim themselves. </span></li><li data-dcnode-id="319"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Get educated.</span></strong><span data-dcnode-id="320" instrument_node="">Learn everything you can about human trafficking. When someone asks you about it, you’ll want to be able to make a clear impression about how serious the problem is. The more you know, the more confident you will seem, and the more someone else will listen to what you have to say. </span></li><li data-dcnode-id="315"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Host events to raise awareness.</span></strong><span data-dcnode-id="316" instrument_node="">Work with school clubs, Greek organizations, and social groups at the school to host events that raise awareness. Invite speakers close to the issue, hand out flyers and information packets, and educate others on how to spot the signs.</span></li><li data-dcnode-id="311"><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Petition to add human trafficking courses.</span></strong><span data-dcnode-id="312" instrument_node="">If your school doesn’t have human trafficking courses available, start a petition and ask them to add a few. Talk with the heads of departments that might be able to help, such as those in psychology or women’s studies, to get them on board with the possibility of teaching the courses. </span></li><li data-dcnode-id="307"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Volunteer with local organizations.</span></strong><span data-dcnode-id="308" instrument_node="">Volunteering with places near your college that take in victims of human trafficking, such as women’s shelters, children’s shelters, and social service agencies, can help you make a direct difference in the lives of those who have been rescued from trafficking. </span></li></ul><span data-dcnode-id="305" instrument_node="">
</span></div><span data-dcnode-id="303" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer spacer-30" data-dcnode-id="302" style="height:60px"></div><span data-dcnode-id="301" instrument_node="">
</span><h2 class="h2-heading" data-dcnode-id="299" id="6"><span data-dcnode-id="300" instrument_node="">Interview with the Expert</span></h2><span data-dcnode-id="298" instrument_node="">
</span><div class="wp-block-em-right-side-bar-rowlayout inner-sidebar-width" data-dcnode-id="275"><div class="container md-has-2-columns has-left-layout" data-dcnode-id="276"><span data-dcnode-id="297" instrument_node="">
