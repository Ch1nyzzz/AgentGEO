</span><div class="wp-block-em-right-side-bar-column col-ahs inner-column-2 col-ahs-3" data-dcnode-id="278"><span data-dcnode-id="287" instrument_node="">
</span><p class="has-text-color" data-dcnode-id="280" style="color:#333333"><a aria-label=" (opens in a new tab)" data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mphdegree.usc.edu/faculty/mellissa-withers-phd-mhs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="286" instrument_node="">Mellissa Withers</span></a><span data-dcnode-id="284" instrument_node="">, PhD, MHS, is an associate professor at the USC Institute on Inequalities in Global Health and </span><a aria-label=" (opens in a new tab)" data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mphdegree.usc.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="283" instrument_node="">USC’s MPH Online Program</span></a><span data-dcnode-id="281" instrument_node=""> at the University of Southern California Keck School of Medicine.</span></p><span data-dcnode-id="279" instrument_node="">
</span></div><span data-dcnode-id="277" instrument_node="">
</span></div></div><span data-dcnode-id="274" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="273" style="height:20px"></div><span data-dcnode-id="272" instrument_node="">
</span><div class="wp-block-em-multipurpose-block is-block-center" data-dcnode-id="205" style="background-color:#f2f9ff"><span data-dcnode-id="271" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block mdwes-accordion-design" data-dcnode-id="257"><div class="advgb-accordion-inner tab-open" data-dcnode-id="258"><div class="advgb-accordion-header" data-dcnode-id="268" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="269" style="color:#2a73cb"><span data-dcnode-id="270" instrument_node="">What can the everyday person do to reach out to victims of trafficking?</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="259" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="266" instrument_node="">There are lots of things that each of us can do to help prevent human trafficking. We can ensure that we are purchasing fair trade product and not supporting labor trafficking in the supply chain. It is also important to be informed about the red flags and how to report tips about possible victims to the national hotline. Everyone can support local, national, and international policies and programs to prevent trafficking and provide better services for victims. For example, we can support initiatives that require all school districts implement human trafficking education in schools, something that many counties have already done. </span><br data-dcnode-id="265"><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">We can also support legislation around human trafficking and join advocacy groups to lobby our legislators to do more. Something else that is not talked about enough is the fact that each of us can play an important role in helping to prevent young people from falling prey to traffickers through mentoring and supporting at-risk kids. Because it is the kids who have low self-esteem or problems at home that are the most vulnerable to traffickers. And we can all reject sexual stereotypes and positive portrayals of pimps. We can challenge gender socialization in which boys are encouraged to be sexually aggressive while girls are supposed to be submissive and weak. The sexual stereotypes that perpetuate these, are not harmless, and normalize sexual violence.</span><br data-dcnode-id="262"></p><span data-dcnode-id="260" instrument_node="">
</span></div></div></div><span data-dcnode-id="256" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block mdwes-accordion-design" data-dcnode-id="246"><div class="advgb-accordion-inner tab-open" data-dcnode-id="247"><div class="advgb-accordion-header" data-dcnode-id="253" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="254" style="color:#2a73cb"><span data-dcnode-id="255" instrument_node="">Tell me a bit about the trauma-informed approach to human trafficking, perhaps some tips to help others interact with victims in a sensitive manner.</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="248" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">A trauma-informed approach takes into consideration the role of the trauma that victims have experienced. Victims may not behave in a way that we think is rational or appropriate. They may have what we believe is poor judgement. But it is critical to understand that their behaviors have often resulted as biologically-driven survival strategies to cope with long-term exposures to abuse. Victims may have lived in “crisis mode” for so long that it can negatively impact their perceptions of reality and inhibit their ability to think ahead. Trauma is also associated with post-traumatic stress disorder, which can lead to difficulties controlling emotions, sudden outbursts of anger, difficulties concentrating, dissociation, and increased risk taking. Victims may have hypersensitivity to everyday situations, which they may perceive as dangerous, threatening or out of control. And they avoid seeking help or support from others because of mistrust. Those of us who haven’t experienced trauma may not anticipate or understand their reactions or behavior. The result is that people may lack not only lack empathy for victims, but it can result in judgmental attitudes and even re-victimization of those who have survived trauma. Victims can be judged as lying about their stories, difficult to deal with, or even to blame for their situations. So, we definitely need more awareness about how trauma impacts victims of trafficking and more training for law enforcement, those in the justice system, health professionals, and others who work directly with victims.</span></p><span data-dcnode-id="249" instrument_node="">
</span></div></div></div><span data-dcnode-id="245" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block mdwes-accordion-design" data-dcnode-id="218"><div class="advgb-accordion-inner tab-open" data-dcnode-id="219"><div class="advgb-accordion-header" data-dcnode-id="242" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="243" style="color:#2a73cb"><span data-dcnode-id="244" instrument_node="">Some of the signs of trafficking are obvious. What are some more subtle signs that might be missed by the average person?</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="220" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="241" instrument_node="">
</span><ul data-dcnode-id="222"><li data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Lack of knowledge about whereabouts or city he/she is in</span></li><li data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Inconsistent or conflicting stories about their personal lives</span></li><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Not allowed to speak for his/herself</span></li><li data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">No ID</span></li><li data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Tattoos or branding, especially on neck or those that say someone’s name</span></li><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Serious dental problems from lack of care</span></li><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Serial sexually-transmitted infections or abortions</span></li><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">For young people, luxury items without an explanation of how he/she paid for them, older boyfriends, sexually provocative clothing</span></li><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Frequent moves</span></li></ul><span data-dcnode-id="221" instrument_node="">
</span></div></div></div><span data-dcnode-id="217" instrument_node="">
</span><div class="wp-block-em-accordion advgb-accordion-block mdwes-accordion-design" data-dcnode-id="207"><div class="advgb-accordion-inner tab-open" data-dcnode-id="208"><div class="advgb-accordion-header" data-dcnode-id="214" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px"><h4 class="advgb-accordion-header-title" data-dcnode-id="215" style="color:#2a73cb"><span data-dcnode-id="216" instrument_node="">What are some of the biggest misconceptions about human trafficking?</span></h4></div><div class="advgb-accordion-body" data-dcnode-id="209" style="background-color:#f2f9ff;border-style:solid;border-width:0px;border-radius:2px;display:block"><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">People often have this Hollywood version of what a trafficking victim might look like. Most victims will not be kidnapped, drugged, and chained up. Many victims have cell phones. They are allowed days off to go shopping, church, or other places. And most people are really shocked to hear that many traffickers are women. So female traffickers often get by without anyone noticing. That’s why it is really critical for the public to be informed and to not make assumptions about what a victim or trafficker will look like.</span></p><span data-dcnode-id="210" instrument_node="">
</span></div></div></div><span data-dcnode-id="206" instrument_node="">
</span></div><span data-dcnode-id="204" instrument_node="">
