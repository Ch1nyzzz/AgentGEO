</span><div class="et_pb_text_inner" data-dcnode-id="2517"><h2 data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">HUMAN TRAFFICKING IS MODERN DAY SLAVERY</span></h2></div><span data-dcnode-id="2516" instrument_node="">
</span></div><span data-dcnode-id="2514" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="2496"><span data-dcnode-id="2512" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2498"><p data-dcnode-id="2508"><span data-dcnode-id="2511" instrument_node="">Human trafficking is modern-day slavery in which people profit from exploiting others through force, fraud, coercion or deception. </span><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">The U.S. government has identified human trafficking as the fastest growing criminal industry globally, tied with illegal arms trade at second, with the drug trade in first place.</span></strong></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Trafficking is a direct affront to the dignity of a human person created in the image and likeness of God. We support efforts to prevent trafficking, increase awareness, provide rescue and restoration to victims of trafficking, and punish those who cause the demand for sexual and labor exploitation—traffickers and those who purchase human beings as commodities</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">In 2000 the United States made human trafficking a federal crime with the passage of the Trafficking Victims Protection Act (TVPA). Nebraska also passed a law in 2006 that made human trafficking illegal, although there are many limitations in the law that make it hard to enforce and prosecute traffickers. This issue matters because of the injustice it causes to those who become victims of this monstrous crime.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">In 2016, Nebraska substantially increased penalties for trafficking in the state. By increasing penalties, lawmakers hope to accomplish two things: 1) Empower law enforcement to go after the issue of human trafficking by motivating them to spend resources and pursue criminals engaged in trafficking, and 2) deter traffickers from coming to Nebraska. NFA is proud to have collaborated with lawmakers on this anti-trafficking legislation.</span></p></div><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_0 et_pb_divider_position_ et_pb_space" data-dcnode-id="2492"><div class="et_pb_divider_internal" data-dcnode-id="2493"></div></div><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="2476"><span data-dcnode-id="2491" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2478"><h2 data-dcnode-id="2479"><span data-dcnode-id="2490" instrument_node="">If you think you have come in contact with a victim of human trafficking, call the </span><strong data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">National Human Trafficking Resource Center</span></strong><span data-dcnode-id="2487" instrument_node=""> at </span><a data-dcnode-id="2484" href="tel:+18883737888"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">1-888-3737-888</span></strong></a><span data-dcnode-id="2483" instrument_node=""> or visit </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polarisproject.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2482" instrument_node="">www.polarisproject.org</span></a><span data-dcnode-id="2480" instrument_node=""> for more information and resources.</span></h2></div><span data-dcnode-id="2477" instrument_node="">

</span><div class="et_pb_blurb_description" data-dcnode-id="2247"><p data-dcnode-id="2248"><span data-dcnode-id="2252" instrument_node="">
Jacqueline Stebbins, 33, and Kimberly Wheeler, 40, where charged with pandering after requesting that a 17-year-old and a 14-year-old girl send them nude photos, so these could be posted on a website in order to get men to pay them for sex. Posts on the website advertising the 17-year-old were traced back to the cellphone and email address of Stebbins, allowing authorities to apprehend her. The police are still investigating and suspect the operation involves more people. (</span><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journalstar.com/news/local/911/second-woman-accused-in-sex-trafficking-operation-arrested/article_050e5e48-c1ca-5a3e-9fdd-ee8ddde3a88c.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2251" instrument_node="">Lincoln Journal Star</span></a><span data-dcnode-id="2249" instrument_node="">)</span></p></div><span data-dcnode-id="2246" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="2027"><h2 data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">What is Sex Trafficking?</span></h2></div><span data-dcnode-id="2026" instrument_node="">
</span></div><span data-dcnode-id="2024" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1995"><span data-dcnode-id="2022" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1997"><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Sex trafficking is a category of human trafficking in which people are sexually exploited by means of force, fraud or coercion. By law, sex trafficking includes commercial sexual exploitation of children, meaning that anyone under the age of 18 who is working in the sex industry is a trafficking victim.</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Sex-trafficking can occur in: residential brothels, street prostitution, escort services (usually online), strip clubs, or brothels disguised as legitimate businesses (i.e. massage parlors, spas, etc.).</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Victims of sex-trafficking can include: U.S. citizens or foreign nationals, adults, minors, and men or women.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Domestic victims are usually recruited through false promises of love and support, and sometimes through kidnapping or abduction. Foreign nationals are often-times recruited through false promises of legitimate employment, marriage or other opportunities.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="2009" instrument_node="">If you think you have come in contact with a victim of human trafficking, call the </span><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">National Human Trafficking Resource Center</span></strong><span data-dcnode-id="2006" instrument_node=""> at </span><a data-dcnode-id="2003" href="tel:+18883737888"><strong data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">1-888-373-7888</span></strong></a><span data-dcnode-id="2002" instrument_node=""> or visit </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polarisproject.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2001" instrument_node="">www.polarisproject.org</span></a><span data-dcnode-id="1999" instrument_node=""> for more information and resources.</span></p></div><span data-dcnode-id="1996" instrument_node="">

</span><li data-dcnode-id="1920"><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">71%</span></strong><span data-dcnode-id="1924" instrument_node=""> of human trafficking victims are female. –</span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freetheslaves.net/our-model-for-freedom/slavery-today/"><em data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Free the Slaves</span></em></a></li><span data-dcnode-id="1919" instrument_node="">
</span><li data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">&nbsp;</span></li><span data-dcnode-id="1916" instrument_node="">
</span><li data-dcnode-id="1909"><strong data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">$150 billion</span></strong><span data-dcnode-id="1913" instrument_node="">&nbsp;is the estimated annual profits made from the exploitation of trafficked persons.&nbsp;–</span><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.castla.org/human-trafficking/"><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Coalition to Abolish Slavery &amp; Trafficking</span></em></a></li><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1901"><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">$90</span></strong><span data-dcnode-id="1905" instrument_node=""> is the average price of a slave today. By comparison, the average price of a slave in the American South in 1850 is $40,000 in today’s money. –</span><em data-dcnode-id="1902"><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freetheslaves.net/our-model-for-freedom/slavery-today/"><span data-dcnode-id="1904" instrument_node="">Free the Slaves&nbsp;</span></a></em></li><span data-dcnode-id="1900" instrument_node="">
</span></ul><span data-dcnode-id="1898" instrument_node="">
</span><h6 data-dcnode-id="1895"><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Convictions</span></strong></h6><span data-dcnode-id="1894" instrument_node="">
</span><ul data-dcnode-id="1874" style="list-style: none;"><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1885"><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">499</span></strong><span data-dcnode-id="1890" instrument_node="">&nbsp;convictions were secured against traffickers in the United States by the Department of Justice in FY 2017.&nbsp;</span><em data-dcnode-id="1886"><span data-dcnode-id="1889" instrument_node="">–</span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/documents/organization/282798.pdf"><span data-dcnode-id="1888" instrument_node="">Trafficking In Persons Report 2018</span></a></em></li><span data-dcnode-id="1884" instrument_node="">
</span><li data-dcnode-id="1876"><strong data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">7,045</span></strong><span data-dcnode-id="1881" instrument_node=""> convictions were secured worldwide in 2017.&nbsp;</span><em data-dcnode-id="1877"><span data-dcnode-id="1880" instrument_node="">–</span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/documents/organization/282798.pdf"><span data-dcnode-id="1879" instrument_node="">Trafficking in Persons Report 2018</span></a></em></li><span data-dcnode-id="1875" instrument_node="">
</span></ul></div><span data-dcnode-id="1872" instrument_node="">
</span></div><span data-dcnode-id="1870" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_4 et_pb_divider_position_ et_pb_space" data-dcnode-id="1867"><div class="et_pb_divider_internal" data-dcnode-id="1868"></div></div><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1861"><span data-dcnode-id="1866" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1863"><h2 data-dcnode-id="1864" style="color: #003366;"><span data-dcnode-id="1865" instrument_node="">Why Does Human Trafficking Exist?</span></h2></div><span data-dcnode-id="1862" instrument_node="">
</span></div><span data-dcnode-id="1860" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_10 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1819"><span data-dcnode-id="1858" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1821"><p data-dcnode-id="1847"><span data-dcnode-id="1857" instrument_node="">
Human trafficking is highly profitable business driven by the demand for </span><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">cheap/free labor</span></strong><span data-dcnode-id="1854" instrument_node=""> and the demand for </span><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">commercial sex</span></strong><span data-dcnode-id="1851" instrument_node="">. The International Labor Organization estimates the annual profit from the exploitation of all trafficked forced labor is at </span><strong data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">$31.6 billion</span></strong><span data-dcnode-id="1848" instrument_node="">.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">There are two main reasons why the market for human trafficking is expanding:</span></p><span data-dcnode-id="1843" instrument_node="">
</span><ul data-dcnode-id="1831" style="list-style: none;"><span data-dcnode-id="1842" instrument_node="">
</span><li data-dcnode-id="1838"><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Low criminal risk/deterrence</span></strong><span data-dcnode-id="1839" instrument_node=""> — traffickers perceive little risk to affect their criminal operations largely because of the lack of strong penalties for their crimes, low chance of arrest, limited training of government agencies, and the lack of public awareness.</span></li><span data-dcnode-id="1837" instrument_node="">
</span><li data-dcnode-id="1833"><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">High Profits</span></strong><span data-dcnode-id="1834" instrument_node=""> — humans can be sold multiple times a day, seven days a week for several years, while drugs and weapons can only be sold once.</span></li><span data-dcnode-id="1832" instrument_node="">
</span></ul><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1829" instrument_node="">Like any business, legal or illegal, the </span><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">demand drives the supply</span></strong><span data-dcnode-id="1826" instrument_node="">. Human traffickers victimize vulnerable people out of their desires to profit from the demand. The </span><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">number of vulnerable humans</span></strong><span data-dcnode-id="1823" instrument_node=""> around the world and in the U.S. also makes it easy for traffickers to keep a fresh supply of victims for both labor and sex trafficking.</span></p></div><span data-dcnode-id="1820" instrument_node="">
</span></div><span data-dcnode-id="1818" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_5 et_pb_divider_position_ et_pb_space" data-dcnode-id="1815"><div class="et_pb_divider_internal" data-dcnode-id="1816"></div></div><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1809"><span data-dcnode-id="1814" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1811"><h2 data-dcnode-id="1812" style="color: #003366;"><span data-dcnode-id="1813" instrument_node="">Human Trafficking Resources</span></h2></div><span data-dcnode-id="1810" instrument_node="">
</span></div><span data-dcnode-id="1808" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_12 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1768"><span data-dcnode-id="1806" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1770"><h4 data-dcnode-id="1803" style="padding-left: 30px;"><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.castla.org/"><span data-dcnode-id="1805" instrument_node="">Coalition to Abolish Slavery &amp; Trafficking</span></a></h4><span data-dcnode-id="1802" instrument_node="">
</span><h4 data-dcnode-id="1799" style="padding-left: 30px;"><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecpatusa.org/"><span data-dcnode-id="1801" instrument_node="">ECPAT-USA</span></a></h4><span data-dcnode-id="1798" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="85" tabindex="0"><span data-dcnode-id="265" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="264"></div><span data-dcnode-id="263" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="87" role="dialog"><span data-dcnode-id="262" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="258" role="button" tabindex="0"><span data-dcnode-id="261" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="260"></i><span data-dcnode-id="259" instrument_node=""> </span></span><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="89"><span data-dcnode-id="256" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="91"><strong class="acsb-title-main" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Compliance status</span></strong><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="236" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="230" instrument_node="">
</span><ol data-dcnode-id="204"><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="217"><strong class="acsb-title" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="226" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="222"><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="219"><br data-dcnode-id="218"></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="206"><strong class="acsb-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="213" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="209"><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="205" instrument_node="">
</span></ol><span data-dcnode-id="203" instrument_node="">
</span><strong data-dcnode-id="200" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="199" instrument_node="">
</span><ul data-dcnode-id="167"><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="194"><strong class="acsb-title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="195" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="189"><strong class="acsb-title" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="190" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="188" instrument_node="">
</span><li data-dcnode-id="184"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="185" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="179"><strong class="acsb-title" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="180" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="174"><strong class="acsb-title" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="175" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="169"><strong class="acsb-title" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="170" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="163"><span data-dcnode-id="164" lang="EN-US"><span data-dcnode-id="165" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="162" instrument_node="">
</span><ol data-dcnode-id="104"><span data-dcnode-id="161" instrument_node="">
</span><li data-dcnode-id="154"><strong class="acsb-title" data-dcnode-id="157"><span data-dcnode-id="159" lang="EN-US"><span data-dcnode-id="160" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="158" instrument_node="">–</span></strong><span data-dcnode-id="155" lang="EN-US"><span data-dcnode-id="156" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="153" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="149" lang="EN-US"><strong class="acsb-title" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="150" instrument_node="">&nbsp;</span></span><span data-dcnode-id="147" lang="EN-US"><span data-dcnode-id="148" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="139"><span data-dcnode-id="141" lang="EN-US"><strong class="acsb-title" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Animations –</span></strong><span data-dcnode-id="142" instrument_node="">&nbsp;</span></span><span data-dcnode-id="140" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="138" instrument_node="">
</span><li data-dcnode-id="131"><span data-dcnode-id="134" lang="EN-US"><strong class="acsb-title" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="135" instrument_node="">&nbsp;</span></span><span data-dcnode-id="132" lang="EN-US"><span data-dcnode-id="133" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="130" instrument_node="">
</span><li data-dcnode-id="123"><span data-dcnode-id="126" lang="EN-US"><strong class="acsb-title" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="127" instrument_node="">&nbsp;</span></span><span data-dcnode-id="124" lang="EN-US"><span data-dcnode-id="125" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="122" instrument_node="">
</span><li data-dcnode-id="115"><span data-dcnode-id="118" lang="EN-US"><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="119" instrument_node="">&nbsp;</span></span><span data-dcnode-id="116" lang="EN-US"><span data-dcnode-id="117" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="114" instrument_node="">
</span><li data-dcnode-id="106"><strong class="acsb-title" data-dcnode-id="111"><span data-dcnode-id="112" lang="EN-US"><span data-dcnode-id="113" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="107" lang="EN-US"><strong class="acsb-title" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">–</span></strong><span data-dcnode-id="108" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="105" instrument_node="">
</span></ol><span data-dcnode-id="103" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="97" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="90" instrument_node=""> </span></div><span data-dcnode-id="88" instrument_node=""> </span></div><span data-dcnode-id="86" instrument_node="">
