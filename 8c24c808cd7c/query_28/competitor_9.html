</span><div class="section post-body" data-dcnode-id="2062"><span data-dcnode-id="2149" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="2064" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="2144"><span data-dcnode-id="2148" instrument_node="">Child sexual exploitation and modern slavery are related aspects of </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/news/anti-human-trafficking-digital-forensics-tools" rel="noopener"><span data-dcnode-id="2147" instrument_node="">human trafficking</span></a><span data-dcnode-id="2145" instrument_node=""> which result in the commercial exploitation of children and often being victims of Child Sexual Abuse Material creation as well.&nbsp;&nbsp;</span></p><span data-dcnode-id="2143" instrument_node="">
</span><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2138"><img alt="Modern Slavery Human Trafficking Child Exploitation" data-dcnode-id="2140" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/hs-fs/hubfs/Modern%2520Slavery%2520Human%2520Trafficking%2520Child%2520Exploitation.png%3Fwidth%3D300%26name%3DModern%2520Slavery%2520Human%2520Trafficking%2520Child%2520Exploitation.png&amp;raw" srcset="https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=150&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 150w, https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=300&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 300w, https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=450&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 450w, https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=600&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 600w, https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=750&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 750w, https://www.adfsolutions.com/hs-fs/hubfs/Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png?width=900&amp;name=Modern%20Slavery%20Human%20Trafficking%20Child%20Exploitation.png 900w" style="width: 300px; float: right; margin: 0px 0px 10px 10px;" width="300"><span data-dcnode-id="2139" instrument_node="">Children who are victims of human trafficking and modern slavery are often subject to physical and emotional abuse and neglect. Traffickers exert control by inflicting emotional, physical and even sexual abuse of children that can be forced into illegal forms of labor and slavery-like conditions.&nbsp;&nbsp;</span></p><span data-dcnode-id="2137" instrument_node="">
</span><h2 data-dcnode-id="2133" style="font-size: 24px;"><span data-dcnode-id="2134" style="color: #038d9f;"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">How do children become victims of the modern slavery industry?&nbsp;</span></strong></span></h2><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">While there are many ways this happens, the UK’s </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nspcc.org.uk/what-is-child-abuse/types-of-abuse/child-trafficking/"><span data-dcnode-id="2130" instrument_node="">National Society for the Prevention of Cruelty to Children</span></a><span data-dcnode-id="2128" instrument_node=""> states, “Traffickers often groom children, families and communities to gain their trust. They may also threaten families with violence or threats. Traffickers often promise children and families that they'll have a better future elsewhere.”</span></p><span data-dcnode-id="2126" instrument_node="">
</span><h3 data-dcnode-id="2122" style="font-size: 20px;"><span data-dcnode-id="2123" style="color: #038d9f;"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Child trafficking is an economic crime</span></strong></span></h3><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Poverty plays a factor when a parent believes they can profit from their child. They may not realize that their child is being exploited for forced labor (agriculture, domestic work, drug trade, etc). Likewise, traffickers and organized crime syndicates can force or trick families into allowing their children to be exploited, sometimes to pay off a debt owed to the traffickers.&nbsp;&nbsp;</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Most parents don’t willingly give their kids away to be victims of trafficking or exploitation. Criminals make false claims to parents that this is all a means to an end and the child will be safe. The worst part about this is that in most situations, children look to their parents for advice and wisdom, and they expect them to protect them.&nbsp;</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2114" instrument_node="">According to the </span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safesupportivelearning.ed.gov/human-trafficking-americas-schools/child-labor-trafficking"><span data-dcnode-id="2113" instrument_node="">National Center on Safe Supportive Learning Environments</span></a><span data-dcnode-id="2111" instrument_node="">, child labor trafficking often “occurs in the context of domestic service, agricultural work, peddling, and hospitality industries (e.g., restaurants and hotels).” while Commercial Sexual Exploitation of Children (CSEC) refers to various activities and crimes “involving the sexual abuse or exploitation of a child for the financial benefit of any person” according to the </span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ojjdp.ojp.gov/programs/commercial-sexual-exploitation-children"><span data-dcnode-id="2110" instrument_node="">US Office of Juvenile Justice and Delinquency Prevention</span></a><span data-dcnode-id="2108" instrument_node="">.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="2106" instrument_node="">
</span><h3 data-dcnode-id="2102" style="font-size: 20px;"><span data-dcnode-id="2103" style="color: #038d9f;"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Both Justice and Social Issues</span></strong></span></h3><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">These issues are not just criminal justice issues, they are social issues that require the work of families, communities and law enforcement internationally. Many countries exchange information through joint law enforcement efforts or via Interpol which manages an International Child Sexual Exploitation (ICSE) database to help investigators make connections between victims, abusers and locations.&nbsp;</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2097" instrument_node="">In the United States, the Department of Justice funds more than </span><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/news/what-is-an-icac-task-force"><span data-dcnode-id="2096" instrument_node="">ICAC Task Forces</span></a><span data-dcnode-id="2094" instrument_node=""> that track down CyberTips from NCMEC and investigate child exploitation cases.&nbsp;</span></p><span data-dcnode-id="2092" instrument_node="">
</span><h3 data-dcnode-id="2088" style="font-size: 20px;"><span data-dcnode-id="2089" style="color: #038d9f;"><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Supporting Field Investigations</span></strong></span></h3><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Solving crimes against children is a daunting task, especially with the rise in cybercrime and the sophistication of criminals that continue to exploit children. Online enticement of children is a serious and growing issue with an increase in online enticement attempts up over 230% in a four year period. To help police and prosecutors, ADF has developed digital forensic image recognition and classification software for mobile and computer forensic investigations. Field forensic software such as Mobile Device Investigator empowers law enforcement to solve crimes against children fast starting on-scene.</span></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2083" instrument_node="">ADF is partnered with the </span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/partner/atii" rel="noopener"><span data-dcnode-id="2082" instrument_node="">Anti-Human Trafficking Intelligence Initiative</span></a><span data-dcnode-id="2080" instrument_node=""> to develop a series of Anti-Human Trafficking Search Profiles available to law enforcement within our digital forensic tools. </span><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/anti-human-trafficking-intelligence-initiative" rel="noopener"><span data-dcnode-id="2079" instrument_node="">Qualified law enforcement agencies can request access to these Search Profiles to help speed investigations</span></a><span data-dcnode-id="2077" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2065"><span class="hs-cta-wrapper" data-dcnode-id="2067" id="hs-cta-wrapper-6edf7e16-a428-47d6-8d23-1a9803debc04"><span class="hs-cta-node hs-cta-6edf7e16-a428-47d6-8d23-1a9803debc04" data-dcnode-id="2071" data-hs-drop="true" id="hs-cta-6edf7e16-a428-47d6-8d23-1a9803debc04" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://www.adfsolutions.com/anti-human-trafficking-intelligence-initiative" data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/cs/c/%3Fcta_guid%3D1a65876e-f571-40e8-81e6-3d92440dbff3%26signature%3DAAH58kEby1nTy2sFDNXFZDqGkhYcxng17g%26pageId%3D30054521744%26placement_guid%3D6edf7e16-a428-47d6-8d23-1a9803debc04%26canon%3Dhttps%253A%252F%252Fwww.adfsolutions.com%252Fnews%252Fcsam-modern-slavery-human-trafficking%26portal_id%3D4330725" id="cta_button_4330725_1a65876e-f571-40e8-81e6-3d92440dbff3" style="" title="Request the Human Trafficking Search Profiles"><span data-dcnode-id="2073" instrument_node="">Request the Human Trafficking Search Profiles</span></a></span></span></p></span><span data-dcnode-id="2063" instrument_node="">
</span></div><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2038" id="hubspot-topic_data"><span data-dcnode-id="2060" instrument_node=""> Topics:
</span><a class="topic-link" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/news/tag/crimes-against-children"><span data-dcnode-id="2059" instrument_node="">Crimes Against Children</span></a><span data-dcnode-id="2057" instrument_node="">,
</span><a class="topic-link" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/news/tag/icac-task-force"><span data-dcnode-id="2056" instrument_node="">ICAC Task Force</span></a><span data-dcnode-id="2054" instrument_node="">,
