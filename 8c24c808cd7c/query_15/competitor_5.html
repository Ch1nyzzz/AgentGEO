</span><p data-dcnode-id="2094"><em data-dcnode-id="2095"><span data-dcnode-id="2099" instrument_node="">Welcome to&nbsp;</span><a data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/tag/ai-book-reviews/"><span data-dcnode-id="2098" instrument_node="">AI book reviews</span></a><span data-dcnode-id="2096" instrument_node="">, a series of posts that explore the latest literature on artificial intelligence.</span></em></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2092" instrument_node="">When discussing the threats of artificial intelligence, the first thing that comes to mind are images of </span><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Skynet</span></em><span data-dcnode-id="2089" instrument_node="">, </span><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The Matrix</span></em><span data-dcnode-id="2086" instrument_node="">, and the </span><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2017/07/28/future-of-artificial-intelligence-ai-apocalypse/"><span data-dcnode-id="2085" instrument_node="">robot apocalypse</span></a><span data-dcnode-id="2083" instrument_node="">. The runner up is technological unemployment, the vision of a foreseeable future in which </span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2017/03/21/artificial-intelligence-and-the-disruption-of-employment/"><span data-dcnode-id="2082" instrument_node="">AI algorithms take over all jobs</span></a><span data-dcnode-id="2080" instrument_node=""> and push humans into a struggle for meaningless survival in a world where human labor is no longer needed.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2077" instrument_node="">Whether any or both of those threats are real is </span><a data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2020/03/16/stuart-russell-human-compatible-ai/"><span data-dcnode-id="2076" instrument_node="">hotly debated</span></a><span data-dcnode-id="2074" instrument_node=""> among scientists and thought leaders. But AI algorithms also pose more imminent threats that exist today, in ways that are less conspicuous and hardly understood.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2071" instrument_node="">In her book, </span><em data-dcnode-id="2067"><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Weapons-Math-Destruction-Increases-Inequality/dp/0553418815" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2070" instrument_node="">Weapons of Math Destruction</span></a><span data-dcnode-id="2068" instrument_node="">: How Big Data Increases Inequality and Threatens Democracy</span></em><span data-dcnode-id="2066" instrument_node="">, mathematician Cathy O’Neil explores how blindly trusting algorithms to make sensitive decisions can harm many people who are on the receiving end of those decisions.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2063" instrument_node="">The dangers of AI algorithms can manifest themselves in </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2018/03/26/racist-sexist-ai-deep-learning-algorithms/"><span data-dcnode-id="2062" instrument_node="">algorithmic bias</span></a><span data-dcnode-id="2060" instrument_node=""> and dangerous feedback loops, and they can expand to all sectors of daily life, from the economy to social interactions, to the criminal justice system.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2057" instrument_node="">While the use of mathematics and algorithms in decision-making is nothing new, recent advances in deep learning and the proliferation of black-box AI systems amplify their effects, both good and bad. And if we do not understand the present threats of AI, we will not be able to benefit from its advantages.</span><span data-dcnode-id="2056" id="more-7483"></span></p><span data-dcnode-id="2054" instrument_node="">
</span><h2 data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">The characteristics of dangerous AI algorithms</span></h2><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node="">We use algorithms to model to understand and process many things. “A model, after all, is nothing more than an abstract representation of some process, be it a baseball game, an oil company’s supply chain, a foreign government’s actions, or a movie theater’s attendance,” O’Neil writes in </span><em data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Weapons of Math Destruction</span></em><span data-dcnode-id="2047" instrument_node="">. “Whether it’s running in a computer program or in our head, the model takes what we know and uses it to predict responses in various situations.”</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2044" instrument_node="">But more and more of those models are being transferred from our heads to computers, thanks to advances in </span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/02/15/what-is-deep-learning-neural-networks/"><span data-dcnode-id="2043" instrument_node="">deep learning</span></a><span data-dcnode-id="2041" instrument_node=""> and the increased digitization of every aspect of our lives. Thanks to broadband internet, cloud computing, mobile devices, the </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2017/09/27/what-is-iot-internet-of-things/"><span data-dcnode-id="2040" instrument_node="">internet of things (IoT)</span></a><span data-dcnode-id="2038" instrument_node="">, wearables, and a slew of other emerging technologies, we can collect and process more and more data about anything and everything.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2035" instrument_node="">This increased access to data and computing power has helped create AI algorithms that can automate an increasing number of tasks. </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/08/05/what-is-artificial-neural-network-ann/"><span data-dcnode-id="2034" instrument_node="">Deep neural networks</span></a><span data-dcnode-id="2032" instrument_node="">, which had previously been limited to research laboratories, have found their way into many areas that were previously challenging for computers, such as </span><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/01/14/what-is-computer-vision/"><span data-dcnode-id="2031" instrument_node="">computer vision</span></a><span data-dcnode-id="2029" instrument_node="">, machine translation, speech and facial recognition.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">So far, so good. What can go wrong?</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2023" instrument_node="">In </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Weapons of Math Destruction</span></em><span data-dcnode-id="2020" instrument_node="">, O’Neil specifies three factors that make AI models dangerous: opacity, scale, and damage.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><h2 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Algorithmic vs corporate opacity</span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2011"><img alt="window rain transparency" class="alignnone size-full wp-image-3201 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="3201" data-comments-opened="1" data-dcnode-id="2014" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;4.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS 5D Mark III&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;70&quot;,&quot;iso&quot;:&quot;800&quot;,&quot;shutter_speed&quot;:&quot;0.0125&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="window rain transparency" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=696%2C464&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=1920%2C1280&amp;ssl=1" data-orig-size="1920,1280" data-permalink="https://bdtechtalks.com/2018/07/23/artificial-intelligence-wizard-of-oz/window-rain-transparency/" data-recalc-dims="1" height="464" loading="eager" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg%3Fresize%3D696%252C464%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?w=1920&amp;ssl=1 1920w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=696%2C464&amp;ssl=1 696w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=1068%2C712&amp;ssl=1 1068w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=630%2C420&amp;ssl=1 630w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?w=1392&amp;ssl=1 1392w" width="696"><noscript data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">&lt;img data-attachment-id="3201" data-permalink="https://bdtechtalks.com/2018/07/23/artificial-intelligence-wizard-of-oz/window-rain-transparency/" data-orig-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=1920%2C1280&amp;amp;ssl=1" data-orig-size="1920,1280" data-comments-opened="1" data-image-meta="{"aperture":"4.5","credit":"","camera":"Canon EOS 5D Mark III","caption":"","created_timestamp":"0","copyright":"","focal_length":"70","iso":"800","shutter_speed":"0.0125","title":"","orientation":"0"}" data-image-title="window rain transparency" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=300%2C200&amp;amp;ssl=1" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?fit=696%2C464&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-3201" src="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=696%2C464&amp;#038;ssl=1" alt="window rain transparency" width="696" height="464" srcset="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?w=1920&amp;amp;ssl=1 1920w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=768%2C512&amp;amp;ssl=1 768w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=1024%2C683&amp;amp;ssl=1 1024w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=696%2C464&amp;amp;ssl=1 696w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=1068%2C712&amp;amp;ssl=1 1068w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?resize=630%2C420&amp;amp;ssl=1 630w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2018/07/window-rain-transparency.jpg?w=1392&amp;amp;ssl=1 1392w" sizes="(max-width: 696px) 100vw, 696px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">There are two aspects to the opacity of AI systems: technical and corporate. The technical opacity, also referred to as </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2018/09/25/explainable-interpretable-ai/"><span data-dcnode-id="2008" instrument_node="">the black-box problem of artificial intelligence</span></a><span data-dcnode-id="2006" instrument_node="">, has received much attention in the past few years.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">In a nutshell, the question is, how do we know an AI algorithm is making the right decision? This question is becoming more critical as AI finds its way into loan application processing, credit scoring, teacher rating, recidivism prediction, and many other sensitive fields.</span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">Many media outlets have published articles that depict AI algorithms as mysterious machines whose behavior is unknown even to their developers. But contrary to what the media portrays, not </span><em data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">all </span></em><span data-dcnode-id="1997" instrument_node="">AI algorithms are opaque.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1994" instrument_node="">Traditional software, often referred to as </span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/11/18/what-is-symbolic-artificial-intelligence/"><span data-dcnode-id="1993" instrument_node="">symbolic artificial intelligence</span></a><span data-dcnode-id="1991" instrument_node=""> in AI jargon, are known for their interpretable and transparent nature. They are composed of hand-coded rules, meticulously put together by software developers and domain experts. They can be probed and audited, and an error can be traced to the line of code where it has occurred.</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node="">In contrast, </span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2017/08/28/artificial-intelligence-machine-learning-deep-learning/"><span data-dcnode-id="1987" instrument_node="">machine learning algorithms</span></a><span data-dcnode-id="1985" instrument_node="">, which have become increasingly popular in recent years, develop their behavior by analyzing many training examples and creating statistical inference models. This means that the developers don’t necessarily have the final say on how the AI algorithms behave.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">But again, not all machine learning models are opaque. For instance, decision trees and linear regression models, two popular machine learning algorithms, will give clear explanations of the factors that determine their decisions. If you train a decision tree algorithm to process loan applications, it can provide you with a tree-like breakdown (thus the name) of how it decides which loan applications to confirm and which to reject. This provides developers with a chance to discover potentially problematic factors and correct the model.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><figure aria-describedby="caption-attachment-7486" class="wp-caption alignnone" data-dcnode-id="1971" id="attachment_7486" style="width: 644px"><img alt="loan application decision tree" class="alignnone size-full wp-image-7486 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="7486" data-comments-opened="1" data-dcnode-id="1979" data-image-caption="<p>A decision tree provides a detailed breakdown of its decision process (Source: Medium)</p>

data-orig-size="644,322" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="loan application decision tree" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;A decision tree provides a detailed breakdown of its decision process (Source: Medium)&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2020/06/loan-application-decision-tree.jpeg?fit=300%2C150&amp;amp;ssl=1" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2020/06/loan-application-decision-tree.jpeg?fit=644%2C322&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-7486" src="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2020/06/loan-application-decision-tree.jpeg?resize=644%2C322&amp;#038;ssl=1" alt="loan application decision tree" width="644" height="322" srcset="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2020/06/loan-application-decision-tree.jpeg?w=644&amp;amp;ssl=1 644w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2020/06/loan-application-decision-tree.jpeg?resize=300%2C150&amp;amp;ssl=1 300w" sizes="(max-width: 644px) 100vw, 644px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1972" id="caption-attachment-7486"><span data-dcnode-id="1976" instrument_node="">A decision tree provides a detailed breakdown of its decision process (Source: </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/%40fenjiro/data-mining-for-banking-loan-approval-use-case-e7c2bc3ece3" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1975" instrument_node="">Medium</span></a><span data-dcnode-id="1973" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">But deep neural networks, which have become very popular in the past few years, are especially bad at revealing how they work. They are composed of layers upon layers of artificial neurons, small mathematical functions that tune their parameters to the thousands of examples they see during training. In many cases, it’s very hard to probe deep learning models and determine which factors contribute to their decision-making processes.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">A loan application processing deep learning algorithm is an end-to-end model where a loan application goes in and a final verdict comes out. There’s not a feature-by-feature breakdown on how the AI algorithm is making decisions. In most cases, a well-trained deep learning model will perform better than its less-sophisticated siblings (decision trees, support vector machines, linear regression, etc.), and it might even spot relevant patterns that will go unnoticed to human experts.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">However, even the most accurate deep learning systems make errors every once in a while, and when they do, it will be very hard to determine what went wrong. But a deep learning system doesn’t need to make errors before its opacity turns problematic. Suppose an angry customer wants to know why an AI application has turned down their loan application. When you have an interpretable AI system, you’ll be able to provide a clear explanation of the steps that went into the decision. When you have an opaque system, you can just shrug and say, “The computer said so.”</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">But while the technical opacity of artificial intelligence algorithms has received a lot of attention in tech media, what’s less discussed is the opaque ways companies use their algorithms, even when the algorithms themselves are trivial and interpretable.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1957" instrument_node="">“Even if the participant is aware of being modeled, or what the model is used for, is the model opaque, or even invisible?” O’Neil questions in </span><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Weapons of Math Destruction.</span></em></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Companies that view their AI algorithms as corporate secrets try their best to hide them behind walled gardens to keep the edge over their competitors. We don’t know much about the AI algorithm powering Google Search, the models that define our friend suggestions on Facebook, populate our feed on Twitter, among others.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Some of this secrecy is justified. For instance, if Google published the inner-workings of its search algorithm, then it would become vulnerable to gaming. In fact, even without Google revealing much detail about its search algorithm, there’s an entire industry poised to find shortcuts to Google Search top-ranking positions. Algorithms are, after all, mindless machines that play by their own rules. They don’t use common sense judgment to identify evil actors who twist the rules for devious intentions.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1946" instrument_node="">But staying on the same example, without transparency, how can we make sure that Google itself is not manipulating search results to serve its own political goals and economic interests? In 2018, U.S. President Donald Trump accused Google of </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/08/28/business/media/google-trump-news-results.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1945" instrument_node="">burying conservative news outlets</span></a><span data-dcnode-id="1943" instrument_node=""> in its search results and favoring liberal media. The claim put Google on the defensive, and the company’s spokespersons could only promise that they would do no such thing.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">This only shows the fine line that organizations walk on when they use AI algorithms. When AI systems are not transparent, they don’t even need to make errors to wreak havoc. Even the shadow of a doubt about the system’s performance can be enough to cause mistrust in the system. On the other hand, too much transparency can also backfire and lead to other disastrous results.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1937" instrument_node="">O’Neil wrote </span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Weapons of Math Destruction </span></em><span data-dcnode-id="1934" instrument_node="">in 2016, before rules like </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2018/05/21/gdpr-data-artificial-intelligence-regulation/"><span data-dcnode-id="1933" instrument_node="">GDPR</span></a><span data-dcnode-id="1931" instrument_node=""> and CCPA came into effect. Those regulations require companies to be transparent about the use of AI algorithms and allow users to investigate the decision process behind their automation systems. Other developments, such as the </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/04/15/trustworthy-ethical-artificial-intelligence/"><span data-dcnode-id="1930" instrument_node="">ethical AI rules of the European Commission</span></a><span data-dcnode-id="1928" instrument_node="">, also incentivize transparency.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Much progress has been made to address the technical, ethical, and legal issues surrounding AI transparency, a lot more still needs to be done. As regulators pass new laws to regulate corporate secrecy, corporations find new ways to circumvent those rules without finding themselves in hot water, such as very long Terms of Service dialogs that inconspicuously deprive you of your right to algorithmic transparency.</span></p><span data-dcnode-id="1923" instrument_node="">
</span><h2 data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Who bears the damage of AI algorithms?</span></h2><span data-dcnode-id="1920" instrument_node="">

" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?fit=300%2C200&amp;amp;ssl=1" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?fit=696%2C464&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-6081" src="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=696%2C464&amp;#038;ssl=1" alt="cogs automation" width="696" height="464" srcset="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?w=3888&amp;amp;ssl=1 3888w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=1024%2C683&amp;amp;ssl=1 1024w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=768%2C512&amp;amp;ssl=1 768w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=1536%2C1024&amp;amp;ssl=1 1536w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=2048%2C1365&amp;amp;ssl=1 2048w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=696%2C464&amp;amp;ssl=1 696w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=1068%2C712&amp;amp;ssl=1 1068w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=630%2C420&amp;amp;ssl=1 630w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?resize=1920%2C1280&amp;amp;ssl=1 1920w, https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2019/12/cogs-automation.jpg?w=1392&amp;amp;ssl=1 1392w" sizes="(max-width: 696px) 100vw, 696px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1914" instrument_node="">“Does the model work against the subject’s interest? In short, is it unfair? Does it damage or destroy lives?” O’Neil posits in </span><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Weapons of Math Destruction</span></em><span data-dcnode-id="1911" instrument_node="">.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">There are plenty of examples of AI algorithms making dumb shopping suggestions, misclassifying images, and doing other silly things. But as AI models become more and more ingrained in our lives, their errors are moving from benign to destructive.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">In her book, O’Neil explores many cases where algorithms causing damage to people’s lives. Examples include credit scoring systems that wrongfully penalize people, recidivism algorithms that give heavier sentences to defendants based on their race and ethnic backgrounds, teacher-scoring systems that end up firing well-performing teachers and rewarding cheaters, and trade algorithms that make billions of dollars at the expense of low-income classes.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">The impact of an algorithm, combined with its lack of transparency, lend to the creation of a dangerous AI system. For example, O’Neil says, “The new recidivism models are complicated and mathematical. But embedded within these models are a host of assumptions, some of them prejudicial,” and adds, “the workings of a recidivism model are tucked away in algorithms, intelligible only to a tiny elite.”</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">This basically means that an AI algorithm can decide to keep a person in jail based on their race, and the defendant has no way to find out why they were deemed as ineligible for pardon.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">There are two more factors that make the damage of dangerous AI algorithms even more harmful.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">First, the data. Machine learning algorithms rely on quality data for training and accuracy. If you want an image classifier to accurately detect pictures of cats, you must provide it with many labeled pictures of cats. Likewise, a loan-application algorithm would need lots of historical records of loan applications and their outcome (paid or defaulted).</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The problem is, those who are hurt by AI algorithms are often the people on whom there’s not enough quality data. This is why loan application processors provide better services to those who already have adequate access to banking and penalize the unbanked and underprivileged who have been largely deprived of the financial system.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">The second problem is the feedback loop. When an AI algorithm starts to make problematic decisions, its behavior generates more erroneous data, which is in turn used to further hone the algorithm, which causes even more prejudice, and the cycle continues endlessly.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">On the topic of policing, O’Neil argues that prejudiced crime prediction causes more police presence in impoverished neighborhoods. “This creates a pernicious feedback loop,” she writes. “The policing itself spawns new data, which justifies more policing. And our prisons fill up with hundreds of thousands of people found guilty of victimless crimes.”</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">When you create a bigger picture of how all these disparate-and-yet-interconnected AI systems feed into each other, you’ll see how the real harm happens. Here’s how O’Neil summarizes the situation: “Poor people are more likely to have bad credit and live in high-crime neighborhoods, surrounded by other poor people. Once the dark universe of WMDs digests that data, it showers them with predatory ads for subprime loans or for-profit schools. It sends more police to arrest them, and when they’re convicted it sentences them to longer terms. This data feeds into other WMDs, which score the same people as high risks or easy targets and proceed to block them from jobs, while jacking up their rates for mortgages, car loans, and every kind of insurance imaginable. This drives their credit rating down further, creating nothing less than a death spiral of modeling. Being poor in a world of WMDs is getting more and more dangerous and expensive.”</span></p><span data-dcnode-id="1879" instrument_node="">
</span><h2 data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">The explosive scale of algorithmic harm</span></h2><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1872"><img alt="Big Data" class="alignnone size-full wp-image-212 jetpack-lazy-image" data-attachment-id="212" data-comments-opened="1" data-dcnode-id="1875" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Big Data" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=640%2C480&amp;ssl=1" data-lazy-src="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?resize=640%2C480&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=640%2C480&amp;ssl=1" data-orig-size="640,480" data-permalink="https://bdtechtalks.com/2016/04/15/the-role-of-big-data-in-securing-online-identities/6914441342_775b4ab9a7_o/" data-recalc-dims="1" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg%3Fresize%3D640%252C480%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">&lt;img data-attachment-id="212" data-permalink="https://bdtechtalks.com/2016/04/15/the-role-of-big-data-in-securing-online-identities/6914441342_775b4ab9a7_o/" data-orig-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=640%2C480&amp;amp;ssl=1" data-orig-size="640,480" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Big Data" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=300%2C225&amp;amp;ssl=1" data-large-file="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?fit=640%2C480&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-212" src="https://i0.wp.com/bdtechtalks.com/wp-content/uploads/2016/04/6914441342_775b4ab9a7_o.jpg?resize=640%2C480&amp;#038;ssl=1" alt="Big Data" width="640" height="480" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">“The third question is whether a model has the capacity to grow exponentially. As a statistician would put it, can it scale?” O’Neil writes in </span><em data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Weapons of Math Destruction</span></em><span data-dcnode-id="1867" instrument_node="">.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Consider the Google Search example we discussed earlier. Billions of people use Google Search to find answers to important questions about health, politics, and social issues. A tiny mistake in Google’s AI algorithm can have a massive impact on public opinion.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1861" instrument_node="">Likewise, Facebook’s ranking algorithms decide the news that hundreds of millions of people see every day. If those algorithms are faulty, they can be gamed to spread fake, sensational news by malicious actors. Even when there’s not a direct malicious intent, they can still cause harm. For instance, news feed algorithms that favor engaging content can </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdtechtalks.com/2019/05/20/artificial-intelligence-filter-bubbles-news-bias/"><span data-dcnode-id="1860" instrument_node="">amplify biases and create filter bubbles</span></a><span data-dcnode-id="1858" instrument_node="">, making users less tolerant of alternative views.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">When opaque and faulty Al algorithms determine credit scores for hundreds of millions of people or decide the fate of the country’s education system, then you have all the elements of a weapon of math destruction.</span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">So, what should be done about this? We need to acknowledge the limits of the AI algorithms that we deploy. While having an automated system that relieves you of the duty of making tough decisions might seem tempting, you must understand when humans are on the receiving end of those decisions and how they are affected.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">“Big Data processes codify the past. They do not invent the future. Doing that requires moral imagination, and that’s something only humans can provide. We have to explicitly embed better values into our algorithms, creating Big Data models that follow our ethical lead. Sometimes that will mean putting fairness ahead of profit,” O’Neil writes.</span></p><span data-dcnode-id="1847" instrument_node="">
