the paralysis of privacy,</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">
punishment through propensity,</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">
the fetishization of and dictatorship through data&nbsp;</span></p><span data-dcnode-id="2665" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1833"><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2650" instrument_node="">There are three main risks of </span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2017/11/11/what-is-big-data/"><span data-dcnode-id="2649" instrument_node="">Big Data</span></a><span data-dcnode-id="2647" instrument_node="">:</span></p><span data-dcnode-id="2645" instrument_node="">
</span><ul data-dcnode-id="2634"><span data-dcnode-id="2644" instrument_node="">
</span><li data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">The paralysis of privacy</span></li><span data-dcnode-id="2641" instrument_node="">
</span><li data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Punishment through propensity</span></li><span data-dcnode-id="2638" instrument_node="">
</span><li data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Fetishization of and dictatorship through data</span></li><span data-dcnode-id="2635" instrument_node="">
</span></ul><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2629"><img alt="big data problems.png" class="alignnone size-full wp-image-20888 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="20888" data-comments-opened="1" data-dcnode-id="2632" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="big data problems" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=840%2C555&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=300%2C198&amp;ssl=1" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=980%2C648&amp;ssl=1" data-orig-size="980,648" data-permalink="https://revisesociology.com/2017/12/30/big-data-criticisms/big-data-problems/" data-recalc-dims="1" height="555" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png%3Fresize%3D840%252C555%26ssl%3D1&amp;raw" width="840"><noscript data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">&lt;img data-attachment-id="20888" data-permalink="https://revisesociology.com/2017/12/30/big-data-criticisms/big-data-problems/" data-orig-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=980%2C648&amp;amp;ssl=1" data-orig-size="980,648" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="big data problems" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=300%2C198&amp;amp;ssl=1" data-large-file="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?fit=840%2C555&amp;amp;ssl=1" loading="lazy" class="alignnone size-full wp-image-20888" src="https://i0.wp.com/revisesociology.com/wp-content/uploads/2017/12/big-data-problems.png?resize=840%2C555&amp;#038;ssl=1" alt="big data problems.png" width="840" height="555" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2627" instrument_node="">Here I continue my summary of&nbsp;Mayer-Schonberger and Cuker (2017) </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Big-Data-Essential-Learning-Insight-ebook/dp/B00BCK1A5Q" rel="noopener" target="_blank"><span data-dcnode-id="2626" instrument_node="">Big Data: The Essential Guide to Work, Life and Learning in the Age of Insight</span></a><span data-dcnode-id="2624" instrument_node="">’.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><h3 data-dcnode-id="2619"><strong data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Three Risks of Big Data&nbsp;</span></strong></h3><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" style="font-weight:400;"><strong data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Firstly</span></strong><span data-dcnode-id="2615" instrument_node="">, simply because so much data is collected on individuals – not only via state surveillance but also via Amazon, Google, Facebook and Twitter,it means that protecting privacy is more difficult -especially when so much of that data is sold on to be analysed for other purposes. </span></span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" style="font-weight:400;"><strong data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Secondly</span></strong><span data-dcnode-id="2609" instrument_node="">, there is the possibility of penalties based on propensities – the possibility of punishing people even before they have done anything wrong.. </span></span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" style="font-weight:400;"><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Finally</span></strong><span data-dcnode-id="2603" instrument_node="">, we have the possibility of a dictatorship of data – whereby information becomes an instrument of the powerful and a tool of repression. </span></span></p><span data-dcnode-id="2600" instrument_node="">
</span><h3 data-dcnode-id="2597"><strong data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Paralyzing Privacy </span></strong></h3><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" style="font-weight:400;"><span data-dcnode-id="2595" instrument_node="">The value of big data lies in its reuse, quite possibly in ways that are have not been imagined at the time of collecting it. In terms of personal information, if we are to re-purpose people’s personal data than they cannot give informed consent in any meaningful sense of the phrase – because in order to so you need to know what data a company is collecting and what use they are going to put it to. </span></span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" style="font-weight:400;"><span data-dcnode-id="2591" instrument_node="">The only way big data can work is for companies to ask customers to agree to have their data collected ‘for any purpose’, which undermines the concept of informed consent. </span></span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" style="font-weight:400;"><span data-dcnode-id="2587" instrument_node="">There are still possible ways to protect privacy – for example opting out and anonymisation.</span></span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" style="font-weight:400;"><span data-dcnode-id="2583" instrument_node="">Opting out is simply where some individuals choose not to have their data collected – however, opting out can itself identify certain things about the users – for example, when certain people opted out of Google’s street view and their houses were blurred – they were still noticeable as people who had ‘opted out’ (and thus maybe had more valuable stuff to steal!)/ </span></span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2578" style="font-weight:400;"><span data-dcnode-id="2579" instrument_node="">Anonymisation is where all personal identifiers are stripped from data – such as national insurance number, date of birth and so on, but here people can still be identified – when AOL released its data set of 20 million search queries from over 650K users in 2006, researchers were able to pick individual people out – simply by looking at the content of searches they could deduce that someone was single, female, lived in a certain areas, purchased certain things – then it’s just a matter of cross referencing to find the particular individual. </span></span></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" style="font-weight:400;"><span data-dcnode-id="2575" instrument_node="">In 2006 Netflix released over 100 million rental records of half a million users – again anonymised, and again researchers managed to identify one specific Lesbian living in a conversative area by comparing the dates of movies rented with her entries onto the &nbsp;IMD. </span></span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" style="font-weight:400;"><span data-dcnode-id="2571" instrument_node="">Big data, it appears, aids de-anonymisation because we collect more data and we combine more data. </span></span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" style="font-weight:400;"><span data-dcnode-id="2567" instrument_node="">Of course it’s not just private companies collecting data… it’s the government too, The U.S. collects an enormous amount of data – amounts that are unthinkably large – and today it is possible to tell a lot about people by looking at how they are connected to others. </span></span></p><span data-dcnode-id="2564" instrument_node="">
</span><h3 data-dcnode-id="2561"><b data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Probability and Punishment </span></b></h3><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2556"><b data-dcnode-id="2557"><i data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">This section starts with a summary of the introductory scene of minority report…</span></i></b></p><span data-dcnode-id="2555" instrument_node="">

L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2061" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2059" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2054"><use class="ytp-svg-shadow" data-dcnode-id="2056" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2057" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2055" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=BmSarhudhiY" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></div><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" style="font-weight:400;"><span data-dcnode-id="2033" instrument_node="">We already see the seeds of this type of pre-crime control through big data:</span></span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" style="font-weight:400;"><span data-dcnode-id="2029" instrument_node="">Parole boards in more than half the states of the US use big data predictions to inform their parole decisions. </span></span></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" style="font-weight:400;"><span data-dcnode-id="2025" instrument_node="">A growing number of precincts use ‘Predictive Policing’ – using big data analysis to select which streets to parole and which individuals to harass.. </span></span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" style="font-weight:400;"><span data-dcnode-id="2021" instrument_node="">A research project called FAST – Future Attribute Screening Technology – tries to identify potential terrorists by monitoring people’s vital signs.</span></span></p><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" style="font-weight:400;"><span data-dcnode-id="2017" instrument_node="">Cukier now outlines the argument for big-data profiling – mainly pointing out that we’ve taken steps to prevent future risks for years (e.g. seat-belts) and we’ve profiled for years with small data (insurance!) – the argument for big data profiling is that it allows us to be more granular than previously – we can make our profiling more individualised – thus there’s no reason to stop every Arab man under 30 with a one way ticket from boarding a plane, but if that man has done a-e also, then there is a reason. </span></span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" style="font-weight:400;"><span data-dcnode-id="2013" instrument_node="">However, there is a fundamental problem of punishing people based on big data – that is, it undermines the very foundations of justice – that of individual choice and responsibility – by disallowing people choice – big data predictions about parole re offending are accurate 75% of the time – which means that if we use the profiling 100% of the time we are wrongly punishing 1 in 4 people. </span></span></p><span data-dcnode-id="2010" instrument_node="">
</span><h3 data-dcnode-id="2007"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Dictatorship of Data </span></strong></h3><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" style="font-weight:400;"><span data-dcnode-id="2005" instrument_node="">The problem with relying on data to inform policy decisions is that the underlying quality of data can be poor – it can be biased, mis-analysed or used misleadingly. It can also fail to capture what is actually supposed to measure! </span></span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" style="font-weight:400;"><span data-dcnode-id="2001" instrument_node="">Education is a good example of a sector which is governed by endless testing – which only measure a slither of intelligence – the ability to demonstrate knowledge (predetermined by a curriculum) and show analytical and evaluative skills as an individual, in written form, all under timed conditions. </span></span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" style="font-weight:400;"><span data-dcnode-id="1997" instrument_node="">Google, believe it or not, is an example of a company that in the past has been paralysed by data – in 2009 its top designer, Douglas Bowman, resigned because he had to prove whether a border should be 3,4, or 5 pixels wide, using data to back up his view. He argued that such a dictatorship by data stifled any sense of creativity. </span></span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" style="font-weight:400;"><span data-dcnode-id="1993" instrument_node="">The problem with the above, in Steve Jobs’ words: it isn’t the consumers’ job to know what they want’. </span></span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" style="font-weight:400;"><span data-dcnode-id="1989" instrument_node="">In his book Seeing Like a State, the anthropologist James Scott documents the way in which governments make people’s lives a misery by fetishizing quantitative data:they use maps to reorganise communities rather than asking people on the ground for example. </span></span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" style="font-weight:400;"><span data-dcnode-id="1985" instrument_node="">The problem we face in the future is how to harness the utility of big data without becoming overly relying on its predictions. </span></span></p><span data-dcnode-id="1982" instrument_node="">
</span><div data-dcnode-id="1981" id="atatags-640381261-626d302fb5c26"></div><span data-dcnode-id="1980" instrument_node="">

</span><article class="post-3659 post type-post status-publish format-standard hentry category-crime-and-deviance category-social-policies tag-broken-windows tag-crime-control tag-crime-prevention tag-environmental tag-rational-choice-theory tag-situational" data-dcnode-id="1387" id="post-3659"><span data-dcnode-id="1783" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1777"><span data-dcnode-id="1782" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/2016/08/25/crime-prevention-and-control-strategies/" rel="bookmark"><span data-dcnode-id="1781" instrument_node="">Crime Prevention and Control Strategies</span></a></h2><span data-dcnode-id="1778" instrument_node=""> </span></header><span data-dcnode-id="1775" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1443"><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1772" style="font-family: 'DejaVu Sans', sans-serif;"><span data-dcnode-id="1773" instrument_node="">Definitions and examples of situational crime prevention, environmental crime prevention and social/ community crime prevention strategies</span></span><span data-dcnode-id="1771" instrument_node="">.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1768" instrument_node="">This post has been written primarily as revision notes for A-level sociology students revising the </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revisesociology.com/crime-deviance-sociology-revise/"><span data-dcnode-id="1767" instrument_node="">Crime and Deviance</span></a><span data-dcnode-id="1765" instrument_node=""> topic.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h2 data-dcnode-id="1758"><span data-dcnode-id="1759" style="color: #0000cc;"><span data-dcnode-id="1760" style="font-family: 'DejaVu Sans', sans-serif;"><b data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Situational Crime Prevention</span></b></span></span></h2><span data-dcnode-id="1757" instrument_node="">
</span><ul data-dcnode-id="1748"><li data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Includes strategies which focus on the specific point at which potential victims and criminals come together, making it harder for the criminal to commit crime.  </span></li><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node=""> Examples include ‘target hardening’ – shutters, window locks, anti-climb paint and also CCTV and security guards. Also ‘designing out’ features which encourage criminality – e.g. sloping seats at bus stops.  </span></li><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node=""> Based on rational choice theory and Cohen and Felson’s ‘Routine Activities’ theory which state that much crime is opportunistic, and if you reduce the opportunities to commit crime, you reduce the crime rate.  </span></li><li data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node=""> Appealed to policy makers because target hardening is cheap and simple. </span></li></ul><span data-dcnode-id="1747" instrument_node="">
</span><h2 data-dcnode-id="1741"><span data-dcnode-id="1742" style="color: #cc0000;"><span data-dcnode-id="1743" style="font-family: 'DejaVu Sans', sans-serif;"><i data-dcnode-id="1744"><b data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Evaluations of Situational Crime Prevention</span></b></i></span></span></h2><span data-dcnode-id="1740" instrument_node="">
</span><ul data-dcnode-id="1704"><li data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node=""> </span><i data-dcnode-id="1737" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(0, 153, 0); font-size: revert;"><span data-dcnode-id="1738" instrument_node="">The Port Authority Bus Terminal Building is an example where this worked.</span></i><span data-dcnode-id="1736" instrument_node=""> </span></li><li data-dcnode-id="1730"><span data-dcnode-id="1734" instrument_node=""> </span><i data-dcnode-id="1732" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(0, 153, 0); font-size: revert;"><span data-dcnode-id="1733" instrument_node="">Newburn (2013) points to an obvious link between improved car security measures and reduced car crime. </span></i><span data-dcnode-id="1731" instrument_node=""> </span></li><li data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node=""> </span><i data-dcnode-id="1727" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1728" instrument_node="">Ignores factors such as inequality and deprivation as causes of crime (Garland 2001).</span></i><span data-dcnode-id="1726" instrument_node=""> </span></li><li data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node=""> </span><i data-dcnode-id="1722" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1723" instrument_node="">Ignores the role of emotion and thrill as a cause of crime (Lyng 1990)</span></i><span data-dcnode-id="1721" instrument_node=""> </span></li><li data-dcnode-id="1715"><span data-dcnode-id="1719" instrument_node=""> </span><i data-dcnode-id="1717" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1718" instrument_node="">Only tackles opportunistic street crime – won’t work for DV, white collar crime, or state crime.</span></i><span data-dcnode-id="1716" instrument_node=""> </span></li><li data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node=""> </span><i data-dcnode-id="1712" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1713" instrument_node="">It creates divided ‘Fortress cities’ (Bauman).</span></i><span data-dcnode-id="1711" instrument_node=""> </span></li><li data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node=""> </span><i data-dcnode-id="1707" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1708" instrument_node="">It leads to crime displacement. </span></i><span data-dcnode-id="1706" instrument_node=""> </span></li></ul><span data-dcnode-id="1703" instrument_node="">
</span><h2 data-dcnode-id="1698"><span data-dcnode-id="1699" style="color: #0000cc;"><span data-dcnode-id="1700" style="font-family: 'DejaVu Sans', sans-serif;"><b data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Environmental Crime Prevention</span></b></span></span></h2><span data-dcnode-id="1697" instrument_node="">
</span><ul data-dcnode-id="1688"><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node=""> Includes formal and informal social control measures which try to clamp down on anti-social behaviour and prevent an area from deteriorating.  </span></li><li data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node=""> Emphasises the role of formal control measures (the police) much more than situational crime prevention theory.  </span></li><li data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node=""> Examples include Zero Tolerance Policing, ASBOs, curfews, street drinking bans, dispersal orders and the three strikes rule in America.  </span></li><li data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node=""> Based on Wilson and Kelling’s Broken Windows Theory – signs of physical disorder give off the message that there is low informal social control which attracts criminals and increases the crime rate.  </span></li></ul><span data-dcnode-id="1687" instrument_node="">
</span><h2 data-dcnode-id="1681"><span data-dcnode-id="1682" style="color: #cc0000;"><span data-dcnode-id="1683" style="font-family: 'DejaVu Sans', sans-serif;"><i data-dcnode-id="1684"><b data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Evaluations of Environmental Crime Prevention</span></b></i></span></span></h2><span data-dcnode-id="1680" instrument_node="">
</span><ul data-dcnode-id="1654"><li data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node=""> </span><i data-dcnode-id="1677" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(0, 153, 0); font-size: revert;"><span data-dcnode-id="1678" instrument_node="">The New York ‘Zero Tolerance’ study suggests that zero tolerance policies work to reduce crime. </span></i><span data-dcnode-id="1676" instrument_node=""> </span></li><li data-dcnode-id="1670"><span data-dcnode-id="1674" instrument_node=""> </span><i data-dcnode-id="1672" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1673" instrument_node="">HOWEVER, Levitt and Dubner in Freakonomics found that this correlation was coincidental – other factors were responsible for the decline in crime. </span></i><span data-dcnode-id="1671" instrument_node=""> </span></li><li data-dcnode-id="1665"><span data-dcnode-id="1669" instrument_node=""> </span><i data-dcnode-id="1667" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1668" instrument_node="">It is more expensive than situational crime prevention – it takes a lot of police to patrol an area and clamp down on anti-social behaviour. </span></i><span data-dcnode-id="1666" instrument_node=""> </span></li><li data-dcnode-id="1660"><span data-dcnode-id="1664" instrument_node=""> </span><i data-dcnode-id="1662" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1663" instrument_node="">Reiner (2015) argues that the police would be better deployed focusing on more serious crime hot spots rather than clamping down on minor forms of anti-social behaviour.</span></i><span data-dcnode-id="1661" instrument_node=""> </span></li><li data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node=""> </span><i data-dcnode-id="1657" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1658" instrument_node="">From an Interactionist perspective, giving more power to the police will just lead to more labelling and more criminal careers. </span></i><span data-dcnode-id="1656" instrument_node=""> </span></li></ul><span data-dcnode-id="1653" instrument_node="">
</span><h2 data-dcnode-id="1647"><span data-dcnode-id="1648" style="font-family: 'DejaVu Sans', sans-serif;"><b data-dcnode-id="1649"><span data-dcnode-id="1651" style="color: #0000cc;"><span data-dcnode-id="1652" instrument_node="">Social and Community Crime Prevention</span></span><span data-dcnode-id="1650" instrument_node=""> </span></b></span></h2><span data-dcnode-id="1646" instrument_node="">
</span><ul data-dcnode-id="1635"><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node=""> Focus on individual offenders and the social context which encourages them to commit crime. </span></li><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node=""> There are two broad approaches – Intervention, identifying groups and risk of committing crime and taking action to limit their offending, and Community – involving the local community in combating crime.  </span></li><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node=""> Farrington’s (1995) longitudinal research comparing offenders and non offenders found various ‘risk factors’ which correlated with crime – such as low education and parental conflict. </span></li><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node=""> Intervention programmes based on the above have included pre-school programmes to help with attainment and parenting classes.  </span></li><li data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node=""> Examples of this working include the Perry School Project (USA) and the Troubled Families Initiative (UK). </span></li></ul><span data-dcnode-id="1634" instrument_node="">
</span><h2 data-dcnode-id="1628"><span data-dcnode-id="1629" style="color: #cc0000;"><span data-dcnode-id="1630" style="font-family: 'DejaVu Sans', sans-serif;"><i data-dcnode-id="1631"><b data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Evaluations of social and community crime reduction</span></b></i></span></span></h2><span data-dcnode-id="1627" instrument_node="">
</span><ul data-dcnode-id="1601"><li data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node=""> </span><i data-dcnode-id="1624" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1625" instrument_node="">If done effectively, these are the most costly of all crime prevention measures. </span></i><span data-dcnode-id="1623" instrument_node=""> </span></li><li data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node=""> </span><i data-dcnode-id="1619" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(0, 153, 0); font-size: revert;"><span data-dcnode-id="1620" instrument_node="">HOWEVER, if done properly, community prevention measures can save hundreds of thousands of pounds, by ‘turning’ a potential criminal into an employed tax-payer.</span></i><span data-dcnode-id="1618" instrument_node=""> </span></li><li data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node=""> </span><i data-dcnode-id="1614" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1615" instrument_node="">Marxists argue that these policies may tackle deprivation but they do not tackle the underlying structural inequalities in the Capitalist system which are the root cause.</span></i><span data-dcnode-id="1613" instrument_node=""> </span></li><li data-dcnode-id="1602"><span data-dcnode-id="1611" instrument_node=""> </span><i data-dcnode-id="1609" style="font-family: &quot;DejaVu Sans&quot;, sans-serif; color: rgb(204, 0, 0); font-size: revert;"><span data-dcnode-id="1610" instrument_node="">Such approaches target working class, inner city communities and do not tackle elite crime.</span></i><span data-dcnode-id="1608" instrument_node=""> </span><p align="left" data-dcnode-id="1603"><span data-dcnode-id="1604" style="color: #cc0000;"><span data-dcnode-id="1605" style="font-family: 'DejaVu Sans', sans-serif;"><i data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Michel Foucalt and David Garland interpret the these strategies as being about surveillance and control rather than real social change which prevents crime. </span></i></span></span></p></li></ul><span data-dcnode-id="1600" instrument_node="">
</span><h2 data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Signposting </span></h2><span data-dcnode-id="1597" instrument_node="">
