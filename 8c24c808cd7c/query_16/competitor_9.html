</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The data analytics process has some components that can help a variety of initiatives. By combining these components, a successful data analytics initiative will provide a clear picture of where you are, where you have been and where you should go.</span></p><span data-dcnode-id="768" instrument_node="">

/span></span><div class="TextWrapper-sc-__sc-1f8vz90-0 eCGnwv" data-dcnode-id="661" data-qa="time-to-complete-labelled-icon"><span data-dcnode-id="662" instrument_node="">Takes 1 minute</span></div></div></div></div></div></div></div></div></div></div></section></div></div></div><div class="erd_scroll_detection_container erd_scroll_detection_container_animation_active" data-dcnode-id="641" style="visibility: hidden; display: inline; width: 0px; height: 0px; z-index: -1; overflow: hidden; margin: 0px; padding: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="642" dir="ltr" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; width: 100%; height: 100%; left: 0px; top: 0px;"><div class="erd_scroll_detection_container" data-dcnode-id="643" style="position: absolute; flex: 0 0 auto; overflow: hidden; z-index: -1; visibility: hidden; inset: -1px 0px 0px -1px;"><div data-dcnode-id="646" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="647" style="position: absolute; left: 0px; top: 0px; width: 933px; height: 611px;"></div></div><div data-dcnode-id="644" style="position: absolute; flex: 0 0 auto; overflow: scroll; z-index: -1; visibility: hidden; width: 100%; height: 100%;"><div data-dcnode-id="645" style="position: absolute; width: 200%; height: 200%;"></div></div></div></div></div></main></div></body></html></iframe></div></div></div><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="620"></p><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="602"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Generally, this process begins with </span><em data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">descriptive analytics</span></em><span data-dcnode-id="614" instrument_node="">. This is the process of describing historical trends in data. Descriptive analytics aims to answer the question “what happened?” This often involves measuring traditional indicators such as return on investment (ROI). The indicators used will be different for each industry. Descriptive analytics does not make predictions or directly inform decisions. It focuses on summarizing data in a meaningful and descriptive way.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">The next essential part of data analytics is </span><em data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">advanced analytics</span></em><span data-dcnode-id="608" instrument_node="">. This part of data science takes advantage of advanced tools to extract data, make predictions and discover trends. These tools include classical statistics as well as machine learning. Machine learning technologies such as neural networks, natural language processing, sentiment analysis and more enable advanced analytics. This information provides new insight from data. Advanced analytics addresses “what if?” questions.</span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The availability of machine learning techniques, massive data sets, and cheap computing power has enabled the use of these techniques in many industries. The collection of big data sets is instrumental in enabling these techniques. Big data analytics enables businesses to draw meaningful conclusions from complex and varied data sources, which has been made possible by advances in parallel processing and cheap computational power.</span></li><span data-dcnode-id="603" instrument_node="">
</span></ul><span data-dcnode-id="601" instrument_node="">
</span><h2 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Types of Data Analytics</span></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Data analytics is a broad field. There are four primary types of data analytics: descriptive, diagnostic, predictive and prescriptive analytics. Each type has a different goal and a different place in the data analysis process. These are also the primary data analytics applications in business.</span></p><span data-dcnode-id="595" instrument_node="">
</span><ul data-dcnode-id="569"><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Descriptive analytics helps answer questions about what happened. These techniques summarize large datasets to describe outcomes to stakeholders. By developing key performance indicators (KPIs,) these strategies can help track successes or failures. Metrics such as return on investment (ROI) are used in many industries. Specialized metrics are developed to track performance in specific industries. This process requires the collection of relevant data, processing of the data, data analysis and data visualization. This process provides essential insight into past performance.</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="590" instrument_node="">Diagnostic analytics helps answer questions about why things happened. These techniques supplement more basic descriptive analytics. They take the findings from descriptive analytics and dig deeper to find the cause. The performance indicators are further investigated to discover why they got better or worse. This generally occurs in three steps:
</span><ul data-dcnode-id="579"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Identify anomalies in the data. These may be unexpected changes in a metric or a particular market.</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Data that is related to these anomalies is collected.</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Statistical techniques are used to find relationships and trends that explain these anomalies.</span></li><span data-dcnode-id="580" instrument_node="">
</span></ul><span data-dcnode-id="578" instrument_node="">
</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Predictive analytics helps answer questions about what will happen in the future. These techniques use historical data to identify trends and determine if they are likely to recur. Predictive analytical tools provide valuable insight into what may happen in the future and its techniques include a variety of statistical and machine learning techniques, such as: neural networks, decision trees, and regression.</span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Prescriptive analytics helps answer questions about what should be done. By using insights from predictive analytics, data-driven decisions can be made. This allows businesses to make informed decisions in the face of uncertainty. Prescriptive analytics techniques rely on machine learning strategies that can find patterns in large datasets. By analyzing past decisions and events, the likelihood of different outcomes can be estimated.</span></li><span data-dcnode-id="570" instrument_node="">
</span></ul><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">These types of data analytics provide the insight that businesses need to make effective and efficient decisions. Used in combination they provide a well-rounded understanding of a company’s needs and opportunities.</span></p><span data-dcnode-id="565" instrument_node="">
</span><h2 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">What is the Role of Data Analytics?</span></h2><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="558"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//form.typeform.com/careers/data-analyst/"><span data-dcnode-id="561" instrument_node="">Data analysts</span></a><span data-dcnode-id="559" instrument_node=""> exist at the intersection of information technology, statistics and business. They combine these fields in order to help businesses and organizations succeed. The primary goal of a data analyst is to increase efficiency and improve performance by discovering patterns in data.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555" style="font-size: 23px;"><span data-dcnode-id="556" instrument_node="">Thinking about a graduate degree in data analytics? Start with a sponsored online analytics program:</span></p><span data-dcnode-id="554" instrument_node="">

</span><div class="col-md-4" data-dcnode-id="527" style="padding-top: 10px; padding-bottom: 5px;"><img alt="American University" class="aligncenter" data-dcnode-id="528" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/wp-content/uploads/AU-Logo-1.jpg&amp;raw"></div><span data-dcnode-id="526" instrument_node="">

</span><div class="row center-block" data-dcnode-id="515" style="margin-top: 10px;"><center data-dcnode-id="516"><a class="btn btn-info btn-default" data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//requestinfo.onlinebusiness.american.edu/analytics.html%3Fs%3Dmastersdatasciencesite%26l%3Dresources_dataanalytics_fpt" rel="noopener" role="button" style="padding: 10px 30px 10px 30px;" target="_blank"><span data-dcnode-id="518" style="color: black;"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Learn more from American University</span></strong></span></a></center></div><span data-dcnode-id="514" instrument_node="">

</span><p data-dcnode-id="509" style="text-align: right; margin: 0px; padding: 10px;"><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Sponsored</span></em></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The work of a data analyst involves working with data throughout the data analysis pipeline. This means working with data in various ways. The primary steps in the data analytics process are data mining, data management, statistical analysis, and data presentation. The importance and balance of these steps depend on the data being used and the goal of the analysis.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Data mining is an essential process for many data analytics tasks. This involves extracting data from unstructured data sources. These may include written text, large complex databases, or raw sensor data. The key steps in this process are to extract, transform, and load data (often called ETL.) These steps convert raw data into a useful and manageable format. This prepares data for storage and analysis. Data mining is generally the most time-intensive step in the data analysis pipeline.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="501" instrument_node="">Data management or data warehousing is another key aspect of a data analyst’s job. Data warehousing involves designing and implementing databases that allow easy access to the results of data mining. This step generally involves creating and managing SQL databases.</span><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.microsoft.com/en-us/azure/architecture/data-guide/big-data/non-relational-data" rel="noopener" target="_blank"><span data-dcnode-id="500" instrument_node=""> Non-relational and NoSQL databases</span></a><span data-dcnode-id="498" instrument_node=""> are becoming more common as well.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Statistical analysis allows analysts to create insights from data. Both statistics and machine learning techniques are used to analyze data. Big data is used to create statistical models that reveal trends in data. These models can then be applied to new data to make predictions and inform decision making. Statistical programming languages such as R or Python (with pandas) are essential to this process. In addition, open source libraries and packages such as TensorFlow enable advanced analysis.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The final step in most data analytics processes is data presentation. This step allows insights to be shared with stakeholders. Data visualization is often the most important tool in data presentation. Compelling visualizations can help tell the story in the data which may help executives and managers understand the importance of these insights.</span></p><span data-dcnode-id="490" instrument_node="">
</span><h2 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Why Data Analytics is Important?</span></h2><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The applications of data analytics are broad. Analyzing big data can optimize efficiency in many different industries. Improving performance enables businesses to succeed in an increasingly competitive world.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">One of the earliest adopters is the </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/industries/financial-services/our-insights/analytics-in-banking-time-to-realize-the-value" rel="noopener" target="_blank"><span data-dcnode-id="482" instrument_node="">financial sector</span></a><span data-dcnode-id="480" instrument_node="">. Data analytics has an important role in the banking and finance industries, used to predict market trends and assess risk. Credit scores are an example of data analytics that affects everyone. These scores use many data points to determine lending risk. Data analytics is also used to detect and prevent fraud to improve efficiency and reduce risk for financial institutions.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">The use of data analytics goes beyond maximizing profits and ROI, however. Data analytics can provide critical information for healthcare (health informatics), crime prevention, and environmental protection. These applications of data analytics use these techniques to improve our world.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">Though statistics and data analysis have always been used in scientific research, advanced analytic techniques and big data allow for many new insights. These techniques can find trends in complex systems. Researchers are currently </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earth.com/news/machine-learning-role-conservation/" rel="noopener" target="_blank"><span data-dcnode-id="473" instrument_node="">using machine learning to protect wildlife</span></a><span data-dcnode-id="471" instrument_node="">.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="468" instrument_node="">The use of </span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthinformatics.uic.edu/blog/how-health-care-analytics-improves-patient-care/" rel="noopener" target="_blank"><span data-dcnode-id="467" instrument_node="">data analytics in healthcare</span></a><span data-dcnode-id="465" instrument_node=""> is already widespread. Predicting patient outcomes, efficiently allocating funding and improving diagnostic techniques are just a few examples of how data analytics is revolutionizing healthcare. The pharmaceutical industry is also being revolutionized by machine learning. Drug discovery is a complex task with many variables. Machine learning can greatly </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bekryl.com/industry-trends/ai-artificial-intelligence-in-drug-discovery-market-size-analysis" rel="noopener" target="_blank"><span data-dcnode-id="464" instrument_node="">improve drug discovery</span></a><span data-dcnode-id="462" instrument_node="">. Pharmaceutical companies also use data analytics to understand the market for drugs and predict their sales.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">The internet of things (IoT) is a field that is used alongside machine learning. These devices provide a great opportunity for data analytics. IoT devices often contain many sensors that collect meaningful data points for their operation. Devices like the Nest thermostat track movement and temperature to regulate heating and cooling. Smart devices like this can use data to learn from and </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S235286481730247X" rel="noopener" target="_blank"><span data-dcnode-id="458" instrument_node="">predict your behavior</span></a><span data-dcnode-id="456" instrument_node="">. This will provide advance home automation that can adapt to the way you live.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">The applications of data analytics are seemingly endless. More and more data is being collected every day — this presents new opportunities to apply data analytics to more parts of business, science and everyday life.</span></p><span data-dcnode-id="451" instrument_node="">
</span><h2 data-dcnode-id="449" dir="ltr"><span data-dcnode-id="450" instrument_node="">Data Analytics FAQ</span></h2><span data-dcnode-id="448" instrument_node="">
</span><h3 data-dcnode-id="446" dir="ltr"><span data-dcnode-id="447" instrument_node="">What is the role of data analytics?</span></h3><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="440" dir="ltr"><span data-dcnode-id="444" instrument_node="">Data analytics helps individuals and organizations make sense of data. </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/careers/data-analyst/"><span data-dcnode-id="443" instrument_node="">Data analysts</span></a><span data-dcnode-id="441" instrument_node=""> typically analyze raw data for insights and trends. They use various tools and techniques to help organizations make decisions and succeed.</span></p><span data-dcnode-id="439" instrument_node="">
</span><h3 data-dcnode-id="437" dir="ltr"><span data-dcnode-id="438" instrument_node="">What are the types of data analytics?</span></h3><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434" dir="ltr"><span data-dcnode-id="435" instrument_node="">There are various types of data analysis including descriptive, diagnostic, prescriptive and predictive analytics. Each type is used for specific purposes depending on the question a data analyst is trying to answer. For example, a data analyst would use diagnostic analytics to figure out why something happened.</span></p><span data-dcnode-id="433" instrument_node="">
</span><h3 data-dcnode-id="431" dir="ltr"><span data-dcnode-id="432" instrument_node="">What are the analytical tools used in data analytics?</span></h3><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="419" dir="ltr"><span data-dcnode-id="429" instrument_node="">There are various tools used in data analysis. Some data analysts use business intelligence software, such as </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/data-scientist-skills/tableau/"><span data-dcnode-id="428" instrument_node="">Tableau</span></a><span data-dcnode-id="426" instrument_node="">. Others may use programming languages such as </span><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/data-scientist-skills/sql/"><span data-dcnode-id="425" instrument_node="">SQL</span></a><span data-dcnode-id="423" instrument_node=""> or </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/data-scientist-skills/python/"><span data-dcnode-id="422" instrument_node="">Python</span></a><span data-dcnode-id="420" instrument_node="">, which have various statistical and visualization libraries.</span></p><span data-dcnode-id="418" instrument_node="">
</span><h3 data-dcnode-id="416" dir="ltr"><span data-dcnode-id="417" instrument_node="">What is the career growth in data analytics?</span></h3><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="407" dir="ltr"><span data-dcnode-id="414" instrument_node="">According to O*NET, the </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onetonline.org/link/summary/15-2051.01" rel="noopener" target="_blank"><span data-dcnode-id="413" instrument_node="">projected growth for data analysts is 15%</span></a><span data-dcnode-id="411" instrument_node=""> between 2020-2030. On average, data analysts earned $98,230 in 2020. However, </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mastersindatascience.org/careers/data-analyst-salary/"><span data-dcnode-id="410" instrument_node="">salary compensation for data analysts</span></a><span data-dcnode-id="408" instrument_node=""> varies depending on where they work and what industry they work in.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404" dir="ltr"><span data-dcnode-id="405" instrument_node="">Last updated: April 2022</span></p><span data-dcnode-id="403" instrument_node="">
</span></div></article></main><aside aria-label="Primary Sidebar" class="sidebar sidebar-primary widget-area" data-dcnode-id="102" itemscope="" itemtype="https://schema.org/WPSideBar" role="complementary"><section class="widget_text widget widget_custom_html" data-dcnode-id="383" id="custom_html-4"><div class="widget_text widget-wrap" data-dcnode-id="384"><h2 class="widget-title widgettitle" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">SPONSORED DATA SCIENCE PROGRAMS</span></h2><span data-dcnode-id="397" instrument_node="">
