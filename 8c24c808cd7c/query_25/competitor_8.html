</span><div data-dcnode-id="2129"><span data-dcnode-id="2133" instrument_node=""> </span><h1 data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">The Importance of Community Policing in Canada</span></h1><span data-dcnode-id="2130" instrument_node=""> </span></div><span data-dcnode-id="2128" instrument_node=""> </span></div><span data-dcnode-id="2126" instrument_node="">

</span><div class="block block-system" data-dcnode-id="1864" id="block-system-main"><span data-dcnode-id="2117" instrument_node="">
</span><article about="/news/community-policing" class="node node-article node-display-full clearfix" data-dcnode-id="1866" id="node-2026" typeof="sioc:Item foaf:Document"><span data-dcnode-id="2116" instrument_node="">
</span><span data-dcnode-id="2114" instrument_node="">
</span><div class="content" data-dcnode-id="1870"><span data-dcnode-id="2113" instrument_node="">
</span><figure data-dcnode-id="2103"><span data-dcnode-id="2112" instrument_node="">
</span><div class="field field-name-field-image field-type-image field-label-hidden" data-dcnode-id="2108"><div class="field-items" data-dcnode-id="2109"><div class="field-item even" data-dcnode-id="2110" rel="og:image rdfs:seeAlso" resource="https://online.wlu.ca/sites/default/files/styles/blogfeature_large/public/field/image/community-policing-818-compressed.jpg?itok=VC_NIr_B"><img alt="Toronto community police on bicycles" data-dcnode-id="2111" height="615" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.wlu.ca/sites/default/files/styles/blogfeature_large/public/field/image/community-policing-818-compressed.jpg%3Fitok%3DVC_NIr_B&amp;raw" typeof="foaf:Image" width="1200"></div></div></div><span data-dcnode-id="2107" instrument_node=""> </span><figcaption data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Toronto community police on bicycles</span></figcaption><span data-dcnode-id="2104" instrument_node="">
</span></figure><span data-dcnode-id="2102" instrument_node="">
</span><div class="byline" data-dcnode-id="2095"><span data-dcnode-id="2101" instrument_node="">
</span><span data-dcnode-id="2099" instrument_node="">
</span><time data-dcnode-id="2097" datetime="May 7, 2021" pubdate="" title="Fri, 05/07/2021 - 18:30"><span data-dcnode-id="2098" instrument_node="">May 7, 2021</span></time><span data-dcnode-id="2096" instrument_node="">
</span></div><span data-dcnode-id="2094" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="1874"><div class="field-items" data-dcnode-id="1875"><div class="field-item even" data-dcnode-id="1876" property="content:encoded"><p data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">For over 50 years, Canada has celebrated National Police Week as a way for police to increase awareness and connect with the communities they serve. Starting May 9th, 2021, this year’s National Police Week theme is </span><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">working together to keep our communities safe</span></em><span data-dcnode-id="2090" instrument_node="">. Particularly during the last year, public safety has proven to be a collaborative effort within police agencies and between police services, first responders, as well as social and community organizations. We honour police officers across Canada and celebrate their continued contributions, which have often been the gateway to many community supports.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">As the law enforcement landscape evolves, community policing in Canada continues to be a vital philosophy now and in the future.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Wilfrid Laurier University’s online degree programs prepare current and future public safety leaders by developing expertise in critical thinking, problem-solving, and effective communication. Coursework taught by experienced professionals equips students to better understand the shifting dynamics of how to keep communities safe and strong through community policing.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><h2 data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">What Is Community Policing?</span></h2><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">The International Association of Chiefs of Police (IACP) presents a community policing </span><a aria-label="opens in a new window" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverpolicing.org/explore-the-field/what-is-community-policing/" target="_blank"><span data-dcnode-id="2077" instrument_node="">definition</span></a><span data-dcnode-id="2075" instrument_node=""> that integrates three essential parts:</span></p><span data-dcnode-id="2073" instrument_node="">
</span><ul data-dcnode-id="2062"><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Partnerships in the community</span></li><span data-dcnode-id="2069" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Problem-solving approaches</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Supportive organizational structure</span></li><span data-dcnode-id="2063" instrument_node="">
</span></ul><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Community policing is a shift from traditional policing and focuses on building trust and long-term relationships in the community with the goal of reducing crime. It moves from a punitive focus to one based on prevention through mutual respect.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node="">A dedicated community police organization fosters a sense of safety for residents and also supports the ultimate goals of policing. According to the Canadian Association of Chiefs of Police (CACP), the “</span><a aria-label="opens in a new window" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cacp.ca/npw2021-media-release-template.html%3Fmid%3D531%23569" target="_blank"><span data-dcnode-id="2056" instrument_node="">cornerstones</span></a><span data-dcnode-id="2054" instrument_node="">” of the profession are “trust, accountability, and support of the community.”</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2051" instrument_node="">Some </span><a aria-label="opens in a new window" data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gc.ca/eng/rp-pr/cj-jp/yj-jj/discre/org/supp-appu.html%23a1" target="_blank"><span data-dcnode-id="2050" instrument_node="">key aspects</span></a><span data-dcnode-id="2048" instrument_node=""> of community policing in Canada include:</span></p><span data-dcnode-id="2046" instrument_node="">
</span><ul data-dcnode-id="2029"><span data-dcnode-id="2045" instrument_node="">
</span><li data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Consultative approaches</span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Proactive strategies</span></li><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Alleviation of fears</span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Flattened administration</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Emphasis on responsibility</span></li><span data-dcnode-id="2030" instrument_node="">
</span></ul><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">More simply, community policing is about integrating police agencies more closely with the communities they serve. The design gives residents and neighbourhood groups a seat at the table and collaborates with partners such as nonprofits and community health centres.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Implementing principles of community policing also involves evolving changes in police agencies and practices.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2021" instrument_node="">For example, the Toronto Police Services Board recently adopted an extensive series of </span><a aria-label="opens in a new window" data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/canada/toronto/why-the-search-for-toronto-s-new-police-chief-will-be-longest-most-comprehensive-in-city-s-history-1.5809275" target="_blank"><span data-dcnode-id="2020" instrument_node="">initiatives</span></a><span data-dcnode-id="2018" instrument_node=""> to increase accountability and clear communication in the community. The plan includes components such as improving relationships with marginalized communities and developing new responses for interactions related to mental illness. Since leadership is crucial to the success of the new measures, the Board expressed a public commitment to transparency in the process of hiring a new police chief.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><h2 data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">How Has Community Policing Developed?</span></h2><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2012" instrument_node="">Modern community policing has its roots in a </span><a aria-label="opens in a new window" data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ottawapolice.ca/en/about-us/Peel-s-Principles-.aspx" target="_blank"><span data-dcnode-id="2011" instrument_node="">set of principles</span></a><span data-dcnode-id="2009" instrument_node=""> put forth by Sir Robert Peel, the UK Prime Minister who created London’s Metropolitan Police in 1822. These timeless ideals summarize the essential components for police success to prevent crime and maintain order. The practice of community policing has been incorporated into </span><a aria-label="opens in a new window" data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gc.ca/eng/rp-pr/cj-jp/yj-jj/discre/org/supp-appu.html%23a1" target="_blank"><span data-dcnode-id="2008" instrument_node="">Canadian law enforcement</span></a><span data-dcnode-id="2006" instrument_node=""> since the 1990s. Due to the intrinsic and evolving nature of community policing, exact practices may vary by agency in an effort to best serve and partner with each unique community.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><h2 data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">What Is the Impact of Community Policing?</span></h2><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">Approximately three-fourths of Canadians hold a positive view of the police, according to a recent </span><a aria-label="opens in a new window" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//angusreid.org/policing-perspectives-canada-rcmp/" target="_blank"><span data-dcnode-id="1999" instrument_node="">study</span></a><span data-dcnode-id="1997" instrument_node=""> reported by the Angus Reid Institute. The numbers vary, though, across geographic and demographic lines. For example, younger age groups tend to have a less positive opinion than older groups. Similarly, visible minorities or Indigenous respondents report feeling less secure than Caucasians around police officers.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Community-based policing enhances public trust by promoting a collaborative, community-centric approach to crime prevention and enables community participation in developing solutions to improve local issues that affect the quality of life within the community.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">For example, in community policing, individual officers are encouraged to engage in neighbourhood extracurriculars, particularly those involving at-risk youth. As residents and officers interact outside the context of distress or arrest, they establish a baseline of trust.</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">The implementation of community-based policing approaches continues to develop across Canada, leading to growing community partnerships and creative problem-solving solutions. Recent world-changing events give us context for application.</span></p><span data-dcnode-id="1986" instrument_node="">
</span><h3 data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Community Policing and Racial Equity</span></h3><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">Across the world, including Canada, the death of George Floyd in 2020 has raised awareness of racial inequities and has brought about passionate </span><a aria-label="opens in a new window" data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/player/play/1745217091694" target="_blank"><span data-dcnode-id="1981" instrument_node="">calls</span></a><span data-dcnode-id="1979" instrument_node=""> for new ways of policing. While police agencies grapple with policies related to arrest and use of force, the practice of community policing takes a proactive, rather than reactive, approach.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1976" instrument_node="">In a CBC </span><a aria-label="opens in a new window" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/player/play/1746778691876" target="_blank"><span data-dcnode-id="1975" instrument_node="">report</span></a><span data-dcnode-id="1973" instrument_node=""> in June 2020, police chiefs from Halifax, Ottawa, and Peel Region offered perspectives on needed change moving forward to assure racial equity. Discussion included treating community members with respect and building trust in communities—a foundational aspect of community policing.</span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">Ottawa Police Chief Peter Sloly’s comments in the </span><a aria-label="opens in a new window" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/player/play/1746778691876" target="_blank"><span data-dcnode-id="1969" instrument_node="">interview</span></a><span data-dcnode-id="1967" instrument_node=""> advocated for priority on service, where police agencies take a proactive approach in preventing crime, rather than a mindset of reactive suspicion. He said there are many models of “integrated service delivery” across Canada working in the “pre-criminal space,” including programs in some of the most difficult communities.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1964" instrument_node="">Peel Regional Police Chief Nishan Duraiappah has been recognized for his </span><a aria-label="opens in a new window" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peelpolice.ca/en/who-we-are/chief_s-management-group.aspx" target="_blank"><span data-dcnode-id="1963" instrument_node="">initiative</span></a><span data-dcnode-id="1961" instrument_node=""> to “modernize traditional community policing.” In the CBC </span><a aria-label="opens in a new window" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/player/play/1746778691876" target="_blank"><span data-dcnode-id="1960" instrument_node="">interview</span></a><span data-dcnode-id="1958" instrument_node="">, he explained that police officers today must often address social issues such as mental health and addictions. He said it is “paramount” to look for opportunities to orient and connect people to services and that coordination can “mitigate risk.”</span></p><span data-dcnode-id="1956" instrument_node="">
</span><h3 data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Community Policing Supports Canadian Communities in Navigating the Pandemic</span></h3><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Also in 2020, as the COVID-19 pandemic swept the globe, Canadian police leaders advocated for a refocus on community policing principles. Since community policing anticipates and adapts to the needs of communities, the practice is vital for emergency response.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node="">In response to the World Health Organization’s pandemic declaration in March 2020, Adam Palmer, President of the Canadian Association of Chiefs of Police (CACP) issued a </span><a aria-label="opens in a new window" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.constantcontact.com/cc6b04d9001/5d7e317e-4d72-4293-a022-33748bf88b4f.pdf" target="_blank"><span data-dcnode-id="1948" instrument_node="">statement</span></a><span data-dcnode-id="1946" instrument_node="">. In it, Palmer urged law enforcement leaders to proactively prepare for the crisis. “We can expect our communities to turn to us for guidance and support during this pandemic,” Palmer said.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Over the last year, police agencies have continued to develop innovative new responses amid the unfolding challenges. Officers, along with community members, volunteers, medical professionals, and frontline workers have pulled together to support communities during one of the most difficult periods in recent history.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1940" instrument_node="">For example, the Ontario Provincial Police (OPP) has recently expanded mental health </span><a aria-label="opens in a new window" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestar.com/politics/provincial/2021/03/24/mental-health-workers-to-join-opp-call-centres.html" target="_blank"><span data-dcnode-id="1939" instrument_node="">services</span></a><span data-dcnode-id="1937" instrument_node=""> for crisis situations. Dedicated mental health workers are assigned to call centres working in cooperation with police officers. Similarly, the Thunder Bay Police Service in Ontario has implemented more intentional </span><a aria-label="opens in a new window" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueline.ca/qa-inspector-derek-west/" target="_blank"><span data-dcnode-id="1936" instrument_node="">integration</span></a><span data-dcnode-id="1934" instrument_node=""> with mental health services such as social work agencies.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1931" instrument_node="">Calming fears has been another important aspect of community policing during this crisis. With emergency stay-at-home orders recently announced in Ontario, police have responded to say they will focus on community </span><a aria-label="opens in a new window" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueline.ca/ontario-police-forces-to-focus-on-education-rather-than-enforcement-of-new-powers/" target="_blank"><span data-dcnode-id="1930" instrument_node="">education</span></a><span data-dcnode-id="1928" instrument_node=""> related to their designated powers. Joe Couto, representing the Ontario Association of Chiefs of Police, explained that actions will distinguish this as a “health issue.”</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">As community police officers have served on the front lines of the pandemic, individuals and agencies continue to adapt to an ever-changing context with complex dimensions.</span></p><span data-dcnode-id="1923" instrument_node="">
</span><h2 data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">How Do Laurier Programs Equip Community Police?</span></h2><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Whether you’re a long-term law enforcement professional or just getting started on a policing career path, Laurier’s online degree programs prepare you for the evolving future of policing in Canada.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1916" instrument_node="">For current and retired police officers, the </span><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.wlu.ca/programs/ba-policing"><span data-dcnode-id="1915" instrument_node="">Honours BA in Policing</span></a><span data-dcnode-id="1913" instrument_node=""> equips you for leadership roles. Through coursework, you’ll be guided by experienced police officers in how to evaluate and apply different perspectives.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">If you’re eager to enter the field of policing for the first time, the </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.wlu.ca/ba-criminology-policing"><span data-dcnode-id="1909" instrument_node="">Combined Honours BA in Criminology and Policing</span></a><span data-dcnode-id="1907" instrument_node=""> requires no prior experience. As you learn from real-world professionals, you’ll build the skills and knowledge to be career-ready in today’s law enforcement field.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Laurier’s online programs are convenient, relevant, and focused. You can earn your credentials while working full-time, from anywhere in the country. In each program, you’ll find:</span></p><span data-dcnode-id="1902" instrument_node="">
</span><ul data-dcnode-id="1888"><span data-dcnode-id="1901" instrument_node="">
</span><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Courses designed by professionals and academic leaders with years of field experience</span></li><span data-dcnode-id="1898" instrument_node="">
</span><li data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">A flexible 100% online format</span></li><span data-dcnode-id="1895" instrument_node="">
</span><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Asynchronous courses that allow you to follow your own schedule</span></li><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Personalized support from success advisors</span></li><span data-dcnode-id="1889" instrument_node="">
</span></ul><span data-dcnode-id="1887" instrument_node="">
</span><h2 data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">What Is Your Future in Policing?</span></h2><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Wilfrid Laurier University joins the CACP in honouring the service of Canadian police officers and their dedication to supporting the communities they serve. Through our partnerships with law enforcement across Canada, we are pleased to be part of the continuing education of our nation’s community police.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1877"><a aria-label="opens in a new window" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.vcita.com/site/s253u5t5aijeq9ad/online-scheduling" target="_blank"><span data-dcnode-id="1880" instrument_node="">Connect with an advisor</span></a><span data-dcnode-id="1878" instrument_node=""> to take the next step of studying at Laurier.</span></p></div></div></div><div class="field-collection-container clearfix" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">
