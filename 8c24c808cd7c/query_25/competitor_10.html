</span><div class="entry-content" data-dcnode-id="362" itemprop="text"><span data-dcnode-id="525" instrument_node="">
</span><h1 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Individual Theories of Crime</span></h1><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The aim of theories is, to explain and understand the world around us. As far as, theories of criminology are concerned, they explain the working mechanism of criminal justice and the actors in the system. They tend to be realistic and show what the real situation is, not the ideal situation that ought to be. These theories not only explain crime at macro level but, also explain them at micro level. As the center of these theories is human behavior; they are not concrete and absolute. These theories are clear, logical, parsimonious, practical, testable, empirical and, valid and have wide scope. There are various theories, which explain the causes of individual crimes like: Social Bond Theory, Differential Association Theory, General Strain Theory, Low Self-control, etc. but, Social Bond Theory and&nbsp; General Strain Theory stood out among all of them (Lilly, Cullen &amp; Richard, 2014).</span></p><span data-dcnode-id="519" instrument_node="">
</span><h2 data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Social Bond Theory</span></h2><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Travis Hirschi (1969) created Social Bond Theory on the roots of General Theory of Crime; which later developed into Social Control Theory. This theory believes that socialization and formation of personal relationship significantly affects human development and restrains a person from committing any crime. For instance, when a person forms many relations throughout the course of his life like: friends and family; he indirectly shows his acceptance for the social norms and expectation, and would not do anything that would draw him away from those relations. The social bond theory explains this phenomenon as when the person has strong bonds in the society; he is prone to accept the social values and norms and thus, restrained from crimes. When the person has weak or no bonds in the society then, there are more frequent chances that he would become deviant. To explain this deviant behavior; Hirschi (1969) has identified four major elements. These elements tend to influence and sometimes overlap each other.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="509"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Attachment.</span></strong><span data-dcnode-id="510" instrument_node=""> This element refers to one’s sensitivity towards the approval or opinions of others. When a person feels attached, he would not do anything that is disappointing and would automatically be restrained from crime or deviant behavior.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="504"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Commitment.</span></strong><span data-dcnode-id="505" instrument_node=""> When a person feels attached; he commits all of his time and energy for his interpersonal relations. He also realizes that any unacceptable or deviant behavior can risk his relationship. That is why he does not indulge himself in any criminal activity.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="499"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Involvements.</span></strong><span data-dcnode-id="500" instrument_node=""> When a person is committed and attached, he does not have time for any delinquent behavior or crime. His all energies and resources are focused on his relations and the social norms and values.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Beliefs.</span></strong><span data-dcnode-id="495" instrument_node=""> When a person feels attaches, committed and involved then, he tends to accept and believe the social customs, norms or values. He is prone to abide them and decreases the chances of deviant behaviors (Hirschi, 1969).</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The social bonds reduce the chances of deviant or criminal behavior. If the youth is engaged in attachments, commitments, involvements and, belief system; then they tend to enjoy strong interpersonal relations and remain in struggle to ensure a respectable position in the society. This conventional activity restricts the youth from crime (Hirschi, 1969). Thus, it can be concluded that the social bonds as the independent variable effects the actions of the individuals and tends to suggest that strong social bonds can reduce the crime rate in the society.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="486"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Research on Social Bond Theory.</span></strong><span data-dcnode-id="487" instrument_node=""> One of the important points, that increase the accuracy of the social bond theory is, its practicality for every society and can its testability. The theory was tested on juvenile delinquency of the high school students of Ankara, Turkey (N= 1,710) through stratified-cluster two stages sampling. The delinquency and social bonding was measured through self-developed items which were later factor analyzed and proved to be appropriate tools for measurement. The findings validated the accuracy of the theory and showed that social bonding plays a vital role in all aspects of delinquency and can be applicable in Turkey as well (Özbay &amp; Özcan, 2006).</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Identification of Social Bond Theory.</span></strong><span data-dcnode-id="482" instrument_node=""> Now, I have come to realize that one of the famous movies from my childhood, “Falling Down” is based on social bond theory; in which the character of D-Fens was just an ordinary rule-obedient conventional man but when his social bonds like his wife and boss left him alone; he does not find anyone to attach or commit with; he turns into slaughter-trek. This movie proves that when D-Fens had nothing to involve with he had retaliate himself from the social norms and ended up as a criminal.</span></p><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">General Strain Theory</span></h2><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="473"><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong><span data-dcnode-id="474" instrument_node="">The failure of classic strain theory gave birth to general strain theory (Agnew, 1992). This classic theory proposed that, failure in the achievement of the desired goals would lead the adolescents towards crime and delinquent behaviors. Thus, in 1992, Agnew extended the classic strain theory and emphasized on the possible causes of the strains; while, strain was referred to the situation or conditions that are not desired by individual. He mentioned three major sources of strains: 1) the failure to attain positively valued goals, including the incoherence between expectations and actual outcomes 2) the removal (or threat of removal) of positively valued stimuli that the actor already possesses; and 3) presentation with noxious or negatively valued stimuli.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Agnew (1992) claimed that majority of the strain develops from negative relationships that a person has with others and the negative emotions like: frustration, resentment and anger that are aggravated from these relationships. These negative relationships and emotions leads towards crimes. Generally, one finds solutions to his problems in instrumental, retaliatory, or escapist behavior.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="465"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Dealing with Strains. </span></strong><span data-dcnode-id="466" instrument_node="">Agnew (1992) suggested that effective coping mechanism can restrain the strains. He also argued that one’s self-concept, social support, problem-solving skills; self-efficacy can play a moderating role in dealing with strain. Furthermore, he also highlighted the role of peers in handling strains; if the peers are prone towards deviant behavior then the chances of criminal activities increases.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">This theory can be concluded in a way that, personal or social strains play the role of independent variable and affect the criminal behaviors but with effective coping mechanism the affect can be controlled or reduced with the help of above mentioned moderators.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="457"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Research on General Strain Theory.</span></strong><span data-dcnode-id="458" instrument_node=""> This research investigated the role of general strain theory in the commencing of crimes among Latino and White delinquents. The secondary data from the National Survey of Adolescents was used. The finding supports the accuracy of the theory that, strains cause delinquent behaviors but, at the same time highlights the importance of coping mechanisms and shows that Latino adolescents faces more strains but their family support system restrains their behaviors while, White adolescents face less strain but have no support and ends into criminal activities (Rodriguez &amp; Belshaw, 2010).</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="452"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Identification of General Strain Theory. </span></strong><span data-dcnode-id="453" instrument_node="">One of the famous award winning Bollywood movie 3idiots highlighted the general strain theory in a very effective way; the character Joy Lobbo was the student of final year of engineering and was the first engineer from his village. He had many strains like completion of the project, idealistic goals and family pressures. When he came across a dilemma he committed suicide rather than finding any coping mechanism. At the same time the character of RajuRatugi commits suicide as he also could not bear the strain of family responsibilities, fare of failure and desire of accomplishments but his friends moderate between his strains and coping mechanism and drive him back to life.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">By summing up, the application of the above mentioned and other theories in the society can control crimes in the society. The judiciary system needs to make their rules and regulation for the society in the light of these theories.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="444"><strong data-dcnode-id="445"><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">
</span></strong></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="440"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="439" instrument_node="">
</span><h1 data-dcnode-id="436"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">References</span></strong></h1><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">Agnew, R. (1992). Foundation for a general strain theory of crime and delinquency. </span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Criminology, 30(1)</span></em><span data-dcnode-id="431" instrument_node="">, 47-88.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Hirschi, T. (1969).</span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Causes of Delinquency</span></em><span data-dcnode-id="425" instrument_node="">. Berkeley: University of California Press.</span></p><span data-dcnode-id="423" instrument_node="">
