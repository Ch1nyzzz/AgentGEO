</span><h1 class="lev2" data-dcnode-id="3431" id="620933"><span data-dcnode-id="3432" instrument_node="">Simple Additive Weighting</span></h1><div class="advconts advtop" data-dcnode-id="3425"><div data-dcnode-id="3426" id="div-336x280_top"><span data-dcnode-id="3430" instrument_node="">
</span><span data-dcnode-id="3427" instrument_node="">
</span></div></div><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3423" instrument_node="">Simple Additive Weighting (SAW) was developed in the 1950s by Churchman and Aclcoff [ChurchmanAckoffl954]; it is the simplest of the MADM methods, yet still one of the most widely used since it is easy to implement. SAW, also called the </span><i data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">weighted sum method</span></i><span data-dcnode-id="3420" instrument_node=""> [Fishburnl967], is a straightforward and easily executed process.</span></p><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3415"><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Methodology</span></strong></p><span data-dcnode-id="3414" instrument_node="">
</span><p data-dcnode-id="3400"><span data-dcnode-id="3413" instrument_node="">Given a set of n alternatives and a set of m criteria for choosing among the alternatives, SAW creates a function for each alternative rating its overall utility. Each alternative is assessed with regard to every criterion (attribute) giving the matrix </span><i data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">M =</span></i><span data-dcnode-id="3410" instrument_node=""> [m</span><sub data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">(?</span></sub><span data-dcnode-id="3407" instrument_node="">] where ггц,- is the assessment of alternative </span><i data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">i </span></i><span data-dcnode-id="3404" instrument_node="">with respect to criterion </span><i data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">j.</span></i><span data-dcnode-id="3401" instrument_node=""> Each criterion is given a weight u&gt;,; the sum of all weights must equal 1; i.e., = 1. If the criteria are equally weighted,</span></p><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3398" instrument_node="">then we merely need to sum the alternative values. The overall or composite performance score </span><i data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">P,</span></i><span data-dcnode-id="3395" instrument_node=""> of the it h alternative with respect to the </span><i data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">m</span></i><span data-dcnode-id="3392" instrument_node=""> criteria is given by
</span><img data-dcnode-id="3391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebrary.net/htm/img/33/1120/720.png&amp;raw"></p><span data-dcnode-id="3389" instrument_node="">
</span><div class="advconts adv1" data-dcnode-id="3383"><div data-dcnode-id="3384" id="div-336x280_1"><span data-dcnode-id="3388" instrument_node="">
</span><span data-dcnode-id="3385" instrument_node="">
</span></div></div><p data-dcnode-id="3371"><span data-dcnode-id="3382" instrument_node="">for </span><i data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">i</span></i><span data-dcnode-id="3379" instrument_node=""> = 1,..., </span><i data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">n.</span></i><span data-dcnode-id="3376" instrument_node=""> Write </span><i data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">P =</span></i><span data-dcnode-id="3373" instrument_node=""> [P,] using matrix/vector notation as
</span><img data-dcnode-id="3372" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebrary.net/htm/img/33/1120/721.png&amp;raw"></p><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3360"><span data-dcnode-id="3369" instrument_node="">where </span><i data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">w</span></i><span data-dcnode-id="3366" instrument_node=""> = [uij]. The alternative with the highest value of </span><i data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">P,</span></i><span data-dcnode-id="3363" instrument_node=""> is the best </span><i data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">relative to the chosen criteria weighting.</span></i></p><span data-dcnode-id="3359" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Originally, all the units of the criteria had to be identical, such as dollars, pounds, seconds, etc. A normalization process making the values unitless relaxes the requirement . We recommend always normalizing the data.</span></p><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3353"><strong data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Strengths and Limitations</span></strong></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">The main strengths are (1) ease of use, and (2) normalized data allows for comparisons across many differing criteria. Limitations include “larger is always better” or “smaller is always better.” The method lacks flexibility in stating which criterion should be larger or smaller to achieve better performance, thus making gathering useful data with the same relational schema (larger or smaller) essential.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3346"><strong data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Sensitivity Analysis</span></strong></p><span data-dcnode-id="3345" instrument_node="">
</span><div class="advconts adv2" data-dcnode-id="3339"><div data-dcnode-id="3340" id="div-336x280_2"><span data-dcnode-id="3344" instrument_node="">
</span><span data-dcnode-id="3341" instrument_node="">
</span></div></div><p data-dcnode-id="3334"><span data-dcnode-id="3338" instrument_node="">Sensitivity analysis should be used to determine how sensitive the model is to the chosen weights. A decision maker can choose arbitrary weights, or, choose weights using a method that performs pairwise comparisons (as done with the </span><i data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">analytic hierarchy process</span></i><span data-dcnode-id="3335" instrument_node=""> discussed later in this chapter). Whenever weights are chosen subjectively, sensitivity analysis should be carefully undertaken. Later sections investigate techniques for sensitivity analysis that can be used for individual criteria weights.</span></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3330"><strong data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Examples of SAW</span></strong></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3328" instrument_node="">A Maple procedure, </span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">SA W.</span></i><span data-dcnode-id="3325" instrument_node=""> to compute rankings using simple additive weighting is included in the book’s </span><i data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">PSMv2</span></i><span data-dcnode-id="3322" instrument_node=""> package. The parameters are the matrix of criteria data for each alternative and the weights, either as a vector or a </span><i data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">comparison matrix.</span></i></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3317" instrument_node="">
</span><img data-dcnode-id="3316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebrary.net/htm/img/33/1120/722.png&amp;raw"></p><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">To examine the program’s code, use </span><i data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">print {S A</span></i><span data-dcnode-id="3310" instrument_node=""> IT).</span></p><span data-dcnode-id="3308" instrument_node="">
</span><p data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Example 8.3. Selecting a Car.</span></p><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3304" instrument_node="">It’s time to purchase a new car. Six cars have made the final list: Ford Fusion, Toyota Prius, Toyota Camry, Nissan Leaf, Chevy Volt, and Hyundai Sonata. There are seven criteria for our decision: cost, mileage (city and highway), performance, style, safety, and reliability. The information in Table 8.7 has been collected online from the </span><i data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">Consumer’s Report</span></i><span data-dcnode-id="3301" instrument_node=""> and </span><i data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">US News and World Report</span></i><span data-dcnode-id="3298" instrument_node=""> websites.</span></p><span data-dcnode-id="3296" instrument_node="">

</span><p data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Initially, we assume all criteria are weighted equally to obtain a baseline ranking. Even though the different criteria values are relatively close, let’s normalize the data for illustration. There are three typical methods to use:</span></p><span data-dcnode-id="2918" instrument_node="">
</span><img data-dcnode-id="2917" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebrary.net/htm/img/33/1120/723.png&amp;raw"><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2915" instrument_node="">where </span><i data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">Mj</span></i><span data-dcnode-id="2912" instrument_node=""> and </span><i data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">nij</span></i><span data-dcnode-id="2909" instrument_node=""> are the maximum and minimum values in the jth column, and rankj is the rank order of the jth column. Our 571</span><i data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">W</span></i><span data-dcnode-id="2906" instrument_node=""> program from the </span><i data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">PSMv2</span></i><span data-dcnode-id="2903" instrument_node=""> package uses the first method.</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">We’ll exclude the cost data from our first baseline ranking since larger cost is worse, whereas all the other data has larger is better. SAW requires consistent criteria ranking.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><img data-dcnode-id="2897" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebrary.net/htm/img/33/1120/724.png&amp;raw"><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2888"><span data-dcnode-id="2895" instrument_node="">The 571</span><i data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">W</span></i><span data-dcnode-id="2892" instrument_node=""> function will return a matrix of rankings. The first row is a raw ranking, the second row is normalized so the largest ranking is 1. We’ll apply </span><i data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">jnormal</span></i><span data-dcnode-id="2889" instrument_node=""> to the rankings and add a legend to make it easier to read the results.</span></p><span data-dcnode-id="2887" instrument_node="">

</span><p data-dcnode-id="1158"><span data-dcnode-id="1185" instrument_node="">The results are easier to parse when we sort the array. The program </span><i data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">MatrixSort </span></i><span data-dcnode-id="1182" instrument_node="">is in the </span><i data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">PSMv2</span></i><span data-dcnode-id="1179" instrument_node=""> package with syntax </span><i data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">MatrixSort(Matrix</span></i><span data-dcnode-id="1176" instrument_node="">, (</span><i data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">row/col</span></i><span data-dcnode-id="1173" instrument_node="">), </span><i data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">(options)). </span></i><span data-dcnode-id="1170" instrument_node="">The options are </span><i data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">sortby=’row’/’column’</span></i><span data-dcnode-id="1167" instrument_node=""> and </span><i data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">order=’ascending’/’descending’ </span></i><span data-dcnode-id="1164" instrument_node="">with defaults </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">’row’</span></i><span data-dcnode-id="1161" instrument_node=""> and </span><i data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">’ascending’.</span></i></p><span data-dcnode-id="1157" instrument_node="">
