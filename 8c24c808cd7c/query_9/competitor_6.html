</span><h1 class="text-center element-top-20 element-bottom-20 text-light normal bold" data-dcnode-id="1894" data-os-animation="none" data-os-animation-delay="0s"><span data-dcnode-id="1895" instrument_node="">

</span></header><span data-dcnode-id="1891" instrument_node="">

</span><section class="section text-normal section-text-no-shadow section-inner-no-shadow section-normal section-opaque" data-dcnode-id="1851"><span data-dcnode-id="1883" instrument_node="">
</span><div class="background-overlay grid-overlay-0" data-dcnode-id="1882" style="background-color: rgba(0,0,0,0);"></div><span data-dcnode-id="1881" instrument_node="">
</span><div class="container container-vertical-default" data-dcnode-id="1853"><span data-dcnode-id="1880" instrument_node="">
</span><div class="row vertical-default" data-dcnode-id="1855"><span data-dcnode-id="1879" instrument_node="">
</span><div class="col-md-12 text-default small-screen-default" data-dcnode-id="1857"><div class="col-text-1 text-normal element-top-20 element-bottom-20" data-dcnode-id="1859" data-os-animation="none" data-os-animation-delay="0s"><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1877" instrument_node="">Human trafficking is a form of </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofmind.com/cult-mind-control/"><span data-dcnode-id="1876" instrument_node="">undue influence</span></a><span data-dcnode-id="1874" instrument_node=""> and a serious global issue. &nbsp;Pimps and&nbsp;traffickers control the environment, access to information, relationships –&nbsp;every aspect of a person’s life – using techniques that manipulate how a person thinks, feels and acts. &nbsp;Using the lens of undue influence, activists, social workers, law enforcement, and mental health professionals can better learn how pimps and traffickers recruit, how to spot current victims, how to ethically intervene in a trafficking case, and how to help trafficking survivors recover from their experience.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Sex trafficking refers to when a person is coerced, deceived, pressured, or forced into prostitution. &nbsp;Often those targeted are vulnerable and come from a history of abuse or are runaways. &nbsp;The pimp or trafficker wants someone who will align with their&nbsp;rules: someone that can be viewed as an asset, not a liability. &nbsp;They look for easy ways to break a person, seeking nothing less than to create a dependent, willing, and obedient slave. &nbsp;With their minds controlled in such a way, the victim may appear to be an active participant in their suffering&nbsp;for the profit of the pimp. &nbsp;However, mind control does not erase the person’s old identity; it&nbsp;creates a new obedient one to suppress the original self.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Labor trafficking is another form of trafficking, further split into bonded labor, forced labor, and child labor. &nbsp;Forced labor, or involuntary servitude, is work or services provided under the threat of violence or punishment. &nbsp;It is one of the most common types of labor and often associated with slavery. &nbsp;Bonded labor is when an individual is paying off a debt or a loan through their work. &nbsp;Child labor is using children as cheap&nbsp;or free labor in&nbsp;factories, workshops, and other places.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">For additional information, check out the FBI bulletin, </span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leb.fbi.gov/articles/featured-articles/a-victim-centered-approach-to-sex-trafficking-cases" rel="noopener" target="_blank"><span data-dcnode-id="1864" instrument_node="">A Victim-Centered Approach to Sex Trafficking Cases</span></a><span data-dcnode-id="1862" instrument_node=""> by Larry Alvarez, M.S., and Jocelyn Cañas-Moreira</span></p><span data-dcnode-id="1860" instrument_node="">
</span></div><span data-dcnode-id="1858" instrument_node="">
</span></div><span data-dcnode-id="1856" instrument_node=""> </span></div><span data-dcnode-id="1854" instrument_node="">
</span></div><span data-dcnode-id="1852" instrument_node="">
</span></section><span data-dcnode-id="1850" instrument_node="">
</span><section class="section text-normal section-text-no-shadow section-inner-no-shadow section-normal section-opaque" data-dcnode-id="1811"><span data-dcnode-id="1849" instrument_node="">
</span><div class="background-overlay grid-overlay-0" data-dcnode-id="1848" style="background-color: rgba(0,0,0,0);"></div><span data-dcnode-id="1847" instrument_node="">

</span><div class="col-md-4 text-default small-screen-default" data-dcnode-id="1842"><h2 class="text-left element-top-20 element-bottom-20 text-normal normal default" data-dcnode-id="1843" data-os-animation="none" data-os-animation-delay="0s"><span data-dcnode-id="1844" instrument_node="">
    BITE Model and Trafficking</span></h2></div><div class="col-md-8 text-default small-screen-default" data-dcnode-id="1817"><div class="col-text-1 text-normal element-top-20 element-bottom-20" data-dcnode-id="1819" data-os-animation="none" data-os-animation-delay="0s"><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1840" instrument_node="">Pimps and traffickers use tactics listed in the </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofmind.com/bite-model/"><span data-dcnode-id="1839" instrument_node="">BITE Model</span></a><span data-dcnode-id="1837" instrument_node=""> of </span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofmind.com/cult-mind-control/"><span data-dcnode-id="1836" instrument_node="">cult mind control</span></a><span data-dcnode-id="1834" instrument_node="">. &nbsp;They use gifts, flattery, the promise of love, violent rape, modeling jobs, other employment offers, threats to harm family, and threats to expose in order to recruit and maintain control over their victims. &nbsp;Often, pimps and traffickers are much older than their potential victims.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1831" instrument_node="">To learn more read </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Combating-Cult-Mind-Control-Best-selling/dp/0967068827"><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Combating Cult Mind Control</span></em></a><span data-dcnode-id="1827" instrument_node=""> which explores cult psychology, curing the mind control virus, how to protect people you care about and strategies for recovery.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1821"><a data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofmind.com/contact-us/"><span data-dcnode-id="1824" instrument_node="">Contact us</span></a><span data-dcnode-id="1822" instrument_node=""> to inquire about setting up a training workshop for your organization.</span></p><span data-dcnode-id="1820" instrument_node="">

    Ending the Game</span></h2></div><div class="col-md-8 text-default small-screen-default" data-dcnode-id="1765"><div class="col-text-1 text-normal element-top-20 element-bottom-20" data-dcnode-id="1767" data-os-animation="none" data-os-animation-delay="0s"><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1797"><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Ending The Game</span></em><span data-dcnode-id="1798" instrument_node=""> is a ground-breaking “coercion resiliency” curriculum that reduces feelings of attachment to traffickers and a lifestyle characterized by commercial sexual exploitation, thereby reducing the rate of recidivism among sex trafficking victims.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The curriculum is designed to educate and empower commercial sex trafficking victims by providing a framework to uncover harmful psychological coercion (aka “The Game”) that victims have been subjected to with&nbsp;their trafficking experience. &nbsp;By revealing a sequence of commonly-used, yet seldom-explained, mind control techniques used by traffickers, sexual abusers, media and other coercive agents, we aim to empower victims to acquire skills and end “The Game.”</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1792" instrument_node="">Bring </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Ending The Game</span></em><span data-dcnode-id="1789" instrument_node="">, the 1st National Sex Trafficking Intervention Curriculum to your organization! &nbsp;</span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sowerseducationgroup.com/license-ending-the-game-curriculum/"><span data-dcnode-id="1788" instrument_node="">Click here</span></a><span data-dcnode-id="1786" instrument_node=""> to find out how you can bring the curriculum to your organization as well as understand the different options available.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">ETG Curriculum Kits are now available: </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//endingthegame.com/shop/"><span data-dcnode-id="1782" instrument_node="">Click here</span></a><span data-dcnode-id="1780" instrument_node=""> to go to the ETG shop.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1777" instrument_node="">Download </span><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofmind.com/wp-content/uploads/2019/02/Ending-The-Game-1-page-Info-Sheet-ETG-Flyer-2018.pdf"><span data-dcnode-id="1776" instrument_node="">Ending the Game 1 Page Info Sheet</span></a></p><span data-dcnode-id="1773" instrument_node="">

</span><blockquote data-dcnode-id="937"><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">We at My Life My Choice have been grateful for the opportunity to learn from Steven Hassan about mind control and its relevance to the trafficking field. As we learn new techniques to combat the debilitating effects of pimp control, Steven’s wisdom as both a cult survivor and an expert in his field are invaluable.
My Life My Choice, a Program of JRI</span></p><span data-dcnode-id="941" instrument_node="">
</span><footer data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Lisa Goldblatt Grace, LICSW, MPH, Co-Founder &amp; Director    </span></footer><span data-dcnode-id="938" instrument_node="">
</span></blockquote><span data-dcnode-id="936" instrument_node="">
</span></li><span data-dcnode-id="934" instrument_node=""> </span><li class="" data-dcnode-id="923" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="933" instrument_node="">
</span><blockquote data-dcnode-id="925"><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">We were quite honored to have Steven Hassan as our keynote speaker at the 2014 National Human Trafficking Conference in Cleveland, OH. &nbsp;Mr. Hassan shared the BITE Model of Mind Control applied to Trafficking, which really gave all of the first responders and all of the conference attendees an understanding of how pimps and traffickers operate to take control of the victim’s behavior, intellect, thoughts and emotions which was invaluable information for those working to help restore the lives of victims of this heinous crime.
President &amp; CEO, Renee Jones Empowerment Center</span></p><span data-dcnode-id="929" instrument_node="">
</span><footer data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Renee Jones    </span></footer><span data-dcnode-id="926" instrument_node="">
</span></blockquote><span data-dcnode-id="924" instrument_node="">
</span></li><span data-dcnode-id="922" instrument_node=""> </span><li class="flex-active-slide" data-dcnode-id="911" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="921" instrument_node="">
</span><blockquote data-dcnode-id="913"><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">There is important and impactful work to be done at the intersection of Commercial Sexual Exploitation and Mind Control (Undue Influence). Steven Hassan is leading the way for people who work with exploited youth to apply the best of what he has pioneered in the study and application of Freedom of Mind. His dynamic nature and perspective as a cult survivor are priceless.
My Life My Choice, A Program of JRI</span></p><span data-dcnode-id="917" instrument_node="">
</span><footer data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Beth Niernberg, LMHC, Clinical Director    </span></footer><span data-dcnode-id="914" instrument_node="">

</span></li><span data-dcnode-id="910" instrument_node=""> </span><li data-dcnode-id="899" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="909" instrument_node="">
</span><blockquote data-dcnode-id="901"><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">I got my hands on this invaluable book, Combating Cult Mind Control, when I met Steven at a Human Trafficking conference for FBI and Homeland Security. He was presenting on mind control and I was sharing my story as a survivor of Sex Trafficking. Listening to Steven from the audience, I was floored that 90% of the mind control techniques he outlined were exactly what my pimp had done to me. Yes I was physically abused and fearful of escaping, but I was also under some intense mind control. Now, having read this book (and underlining almost every paragraph) I can finally put a name to the techniques my pimp systematically indoctrinated me with (e.g. emotion control, double-bind, thought suppression, etc.). It’s opened my eyes to a whole new way of understanding what was done to me and, more importantly, how to undo it! Knowledge truly is power. Thank you, Steve, for this power!
Sowers Education Group</span></p><span data-dcnode-id="905" instrument_node="">
</span><footer data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Rachel Thomas    </span></footer><span data-dcnode-id="902" instrument_node="">
</span></blockquote><span data-dcnode-id="900" instrument_node="">
</span></li><span data-dcnode-id="898" instrument_node=""> </span><li data-dcnode-id="887" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="897" instrument_node="">
</span><blockquote data-dcnode-id="889"><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Steven Hassan’s book Freedom of Mind is especially valuable to those of us working in fields that are not yet understood as cults. I work in the field of trafficking for prostitution, in which survivors describe the same psychologically destructive social influences that Steven Hassan details in the book. To give a few examples: an extremely controlling leader (pimp or trafficker) who postures as omnipotent, coerced adherence to a worldview and values that turn one’s previous values upside down, control and regulation of body functions, enforced dependence, degradation, coerced gratitude, sensory deprivation, capricious rules, traumatic bonding, and deliberate creation of dissociated parts of the self. Steven Hassan demystifies the complex manipulation and adverse influence of malignant groups in a way that clarifies and instills hope. The book is useful not only for advocates and survivors but for clinicians and attorneys who want to better understand and help their clients.
Prostitution Research &amp; Education</span></p><span data-dcnode-id="893" instrument_node="">
</span><footer data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Melissa Farley, Ph.D., Executive Director    </span></footer><span data-dcnode-id="890" instrument_node="">
</span></blockquote><span data-dcnode-id="888" instrument_node="">
</span></li><span data-dcnode-id="886" instrument_node=""> </span><li data-dcnode-id="875" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="885" instrument_node="">
</span><blockquote data-dcnode-id="877"><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Steven Hassan has nearly 40 years of experience and knowledge that will advance our efforts to develop methods for breaking bonds held by human traffickers. Steven is a leader in the field of social psychology and his one-on-one work to replace destructive bonds with healthy long-term relationships, has the potential to improve responses to human trafficking rapidly and effectively. Steven’s work goes far beyond physical removal of a victim from a perpetrator, empowering survivors to develop healthy memories and experiences in place of harmful and destructive thoughts and behaviors. We are proud to be in partnership with Steven and the team he has built at Freedom of Mind.
Runaway Girl, FPC</span></p><span data-dcnode-id="881" instrument_node="">
</span><footer data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Carissa Phelps, JD/MBA    </span></footer><span data-dcnode-id="878" instrument_node="">
</span></blockquote><span data-dcnode-id="876" instrument_node="">
</span></li><span data-dcnode-id="874" instrument_node=""> </span><li data-dcnode-id="863" data-thumb-alt="" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="873" instrument_node="">
</span><blockquote data-dcnode-id="865"><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">We at My Life My Choice have been grateful for the opportunity to learn from Steven Hassan about mind control and its relevance to the trafficking field. As we learn new techniques to combat the debilitating effects of pimp control, Steven’s wisdom as both a cult survivor and an expert in his field are invaluable.
My Life My Choice, a Program of JRI</span></p><span data-dcnode-id="869" instrument_node="">
</span><footer data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Lisa Goldblatt Grace, LICSW, MPH, Co-Founder &amp; Director    </span></footer><span data-dcnode-id="866" instrument_node="">
</span></blockquote><span data-dcnode-id="864" instrument_node="">
</span></li><span data-dcnode-id="862" instrument_node=""> </span><li aria-hidden="true" class="clone" data-dcnode-id="851" style="width: 940px; margin-right: 0px; float: left; display: block;"><span data-dcnode-id="861" instrument_node="">
</span><blockquote data-dcnode-id="853"><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">We were quite honored to have Steven Hassan as our keynote speaker at the 2014 National Human Trafficking Conference in Cleveland, OH. &nbsp;Mr. Hassan shared the BITE Model of Mind Control applied to Trafficking, which really gave all of the first responders and all of the conference attendees an understanding of how pimps and traffickers operate to take control of the victim’s behavior, intellect, thoughts and emotions which was invaluable information for those working to help restore the lives of victims of this heinous crime.
President &amp; CEO, Renee Jones Empowerment Center</span></p><span data-dcnode-id="857" instrument_node="">
</span><footer data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Renee Jones    </span></footer><span data-dcnode-id="854" instrument_node="">
</span></blockquote><span data-dcnode-id="852" instrument_node="">
</span></li></ul></div><ol class="flex-control-nav flex-control-paging" data-dcnode-id="830"><li data-dcnode-id="846"><a class="" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="848" instrument_node="">1</span></a></li><li data-dcnode-id="843"><a class="flex-active" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="845" instrument_node="">2</span></a></li><li data-dcnode-id="840"><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="842" instrument_node="">3</span></a></li><li data-dcnode-id="837"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="839" instrument_node="">4</span></a></li><li data-dcnode-id="834"><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="836" instrument_node="">5</span></a></li><li data-dcnode-id="831"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/woMLZveD6oA%3Ffeature%3Doembed%26wmode%3Dopaque"><span data-dcnode-id="833" instrument_node="">6</span></a></li></ol></div></div><span data-dcnode-id="827" instrument_node=""> </span></div><span data-dcnode-id="825" instrument_node="">
