</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">New ICD-10 codes allow for clinicians to document treatment of human
trafficking victims, but legal considerations should be taken before doing so.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">

</span><div data-dcnode-id="1506"><div data-dcnode-id="1507"><span data-dcnode-id="1527" instrument_node="">
</span><h3 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">New ICD-10 codes will help shift the paradigm from criminal justice to a public health perspective, but further research is needed on the costs of human trafficking.</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1521" instrument_node="">On Oct. 1, new ICD-10 codes will go into effect to document conditions that result from forced labor and sexual exploitation, otherwise known as “human trafficking." Adoption of these codes by the Centers for Disease Control and Prevention attests to the significance of trafficking as a public health issue and the need to gather data on its prevalence and cost. </span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node=""> </span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1516" instrument_node=""> </span><a data-dcnode-id="1514" href="#" title="/uploadedImages/Forums/Legal_and_Regulatory/Articles/Human Trafficking ICD-10-CM Code Categories.jpg"><span data-dcnode-id="1515" instrument_node=""> </span></a><span data-dcnode-id="1513" instrument_node=""> </span><b data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Human Trafficking ICD-10-CM Code Categories</span></b><span data-dcnode-id="1510" instrument_node=""> </span></p><span data-dcnode-id="1508" instrument_node=""> &nbsp;

</span><div data-dcnode-id="1020"><div data-dcnode-id="1021"><span data-dcnode-id="1374" instrument_node="">
</span><a data-dcnode-id="1373" href="#" title="/uploadedImages/Forums/Legal_and_Regulatory/Articles/Human Trafficking ICD-10-CM Code Categories(1).jpg"></a><span data-dcnode-id="1372" instrument_node="">
</span><a data-dcnode-id="1371" href="#" title="/uploadedImages/Forums/Legal_and_Regulatory/Articles/Human Trafficking ICD-10-CM Code Categories(1).jpg"></a><span data-dcnode-id="1370" instrument_node="">
</span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1367"></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Because most victims of human trafficking seek medical care at some point, healthcare professionals are in a key position to provide them not only with medical treatment but also with information and other forms of support. But if the victimization is overlooked while focusing on the medical condition, both the underlying problem and its costs remain hidden. </span></p><span data-dcnode-id="1363" instrument_node="">
</span><h2 data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">What is Human Trafficking?</span></h2><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1359"></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">According to the </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/otip/about/what-is-human-trafficking" target="_blank"><span data-dcnode-id="1356" instrument_node="">HHS Office on Trafficking in Persons</span></a><span data-dcnode-id="1354" instrument_node="">, “Human trafficking is a form of modern slavery. It occurs when a trafficker exploits an individual&nbsp;with force, fraud, or coercion to make them perform commercial sex or work.” Trafficking comes in two forms:&nbsp; </span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node=""> </span><b data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Labor trafficking</span></b><span data-dcnode-id="1348" instrument_node="">. Individuals are compelled to work or provide services by force, fraud, or coercion. </span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node=""> </span><b data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Sex trafficking</span></b><span data-dcnode-id="1342" instrument_node="">. Adults are compelled to engage in commercial sex by force, fraud, or coercion.&nbsp;Minors are compelled to perform a commercial sex act regardless of the presence of force, fraud, or coercion. </span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1339" instrument_node="">Either type of trafficking is a criminal law violation (22 U.S. Code §§ 7101-7114 </span><i data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node=""> </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/22/chapter-78" target="_blank"><span data-dcnode-id="1337" instrument_node="">Trafficking Victims Protection</span></a><span data-dcnode-id="1335" instrument_node=""> </span></i><span data-dcnode-id="1333" instrument_node=""> and various state laws), but more than that it is a public health issue that affects not only the victims but also their families and communities. One recent </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beckershospitalreview.com/finance/the-role-of-health-systems-in-combating-human-trafficking.html" target="_blank"><span data-dcnode-id="1332" instrument_node="">study</span></a><span data-dcnode-id="1330" instrument_node="">&nbsp;estimated that sex trafficking was an $810 million industry annually in San Diego County alone. Unfortunately, many clinicians and healthcare leaders are unaware of the problem, and the cost to the nation’s healthcare system because of repeated emergency department (ED) or clinic visits, sexually transmitted diseases, and mental health issues is incalculable.&nbsp; </span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">After pointing out that the United States is one of the world’s largest markets for human trafficking, The Joint Commission states, “If staff at your healthcare organization have not yet encountered a human trafficking victim, very likely they will.” In fact, public health experts assert, those staff almost certainly have already seen a patient who is a trafficking victim without realizing it. Thus, it is important for all healthcare professionals to know how to identify and support these patients.&nbsp; </span></p><span data-dcnode-id="1325" instrument_node="">
</span><h2 data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">How to Recognize Human Trafficking</span></h2><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1321"></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">One might suspect&nbsp;human trafficking when, for example, there are inconsistencies in the patient’s story; a controlling individual accompanies the patient; the patient fears being arrested; or there is concern about harm coming to the family if abuse is reported. Other indicators include malnutrition, abnormal behavior such as reluctance to cooperate with a physical exam, or tattoos or insignia indicative of ownership.&nbsp; </span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">The National Human Trafficking Hotline lists nearly two dozen potential indicators of trafficking. The presence of red flags should prompt the healthcare professional to consider further assessment and to embark on a multi-disciplinary, patient-centered response. </span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1313" instrument_node=""> </span><b data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">See related tool</span></b><span data-dcnode-id="1310" instrument_node="">: </span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hfma.org/content/dam/hfma/document/trends/Docs/61669.docx" title="Potential Red Flags Indicating Human Trafficking"><span data-dcnode-id="1309" instrument_node="">Potential Red Flags Indicating Human Trafficking</span></a><span data-dcnode-id="1307" instrument_node=""> </span></p><span data-dcnode-id="1305" instrument_node="">
</span><h2 data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">How to Respond to Human Trafficking</span></h2><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1301"></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Human trafficking&nbsp;situations are as diverse as human nature and the laws vary from state to state, so there is no one-size-fits-all approach. For example, adults cannot be forced to report the crime, and clinicians’ reflexive responses to contact law enforcement can be counterproductive if patients or families have been threatened. (In the case of minors, reporting is likely to be mandatory under state law, but even then, the report must be made with due regard for the possible negative consequences.)&nbsp; </span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">The best response reflects national and state legal requirements, respects patient autonomy, provides necessary health services, educates patients about their options, and empowers them to seek assistance.&nbsp; </span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1293" instrument_node="">Numerous organizations have resources to assist in developing such a response. One is </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healtrafficking.org/welcome/" target="_blank"><span data-dcnode-id="1292" instrument_node="">HEAL Trafficking</span></a><span data-dcnode-id="1290" instrument_node="">, a “group of multidisciplinary professionals dedicated to ending human trafficking and supporting its survivors from a public health perspective.” HEAL provides a detailed </span><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healtrafficking.org/2017/06/new-heal-trafficking-and-hope-for-justices-protocol-toolkit-for-developing-a-response-to-victims-of-human-trafficking-in-health-care-settings/" target="_blank"><span data-dcnode-id="1289" instrument_node="">Protocol Toolkit</span></a><span data-dcnode-id="1287" instrument_node=""> that describes how to develop organization-specific policies and procedures.&nbsp; </span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">According to HEAL’s executive director, Hanni Stoklosa, “Using the protocol will help emergency departments, hospitals, clinics, private offices, or school-based health centers respond appropriately to human traffickingsituations.” She stresses the need to shift from a criminal justice paradigm that is focused on prosecutions to a public-health approach that emphasizes care and prevention and involves a wide variety of professionals and local organizations.&nbsp; </span></p><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Caution About Documentation </span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1278"></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">A co-founder of HEAL Trafficking, Makini Chisolm-Straker emphasizes the need for caution in documentation. “While the ICD-10 codes and thorough documentation are useful from a public health and data gathering perspective, if the exploiter sees the details—on a bill or discharge paperwork, for example—it could put the patient in danger.” </span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">The Protocol Toolkit echoes Chisolm-Straker’s concerns: &nbsp;&nbsp; </span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269" style="padding-left: 20.0px;"><span data-dcnode-id="1270" instrument_node="">Because of the complexity of medical-legal issues around HT [human trafficking] cases, and great variation in state and local laws, guidelines for optimal documentation practices … should be developed in consultation with local prosecutors, defense attorneys, and advocates. Depending on the legal climate, entering more or less information in the patient’s chart can either be harmful or helpful. </span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">The toolkit cites a few examples:</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1264"></p><span data-dcnode-id="1263" instrument_node="">
</span><ul data-dcnode-id="1249"><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">In some states, a patient with HIV seropositivity could be prosecuted for transmitting the virus.</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">A patient coerced to sell sex may still be charged with prostitution in some states.</span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Sensitive information might not be redacted during legal proceedings depending on whether the state has a “rape shield” law and, if so, whether it applies to trafficked persons. (A rape shield law limits a defendant’s ability to introduce evidence about the complainant’s past sexual behavior.)</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Information gathered in the forensic examination, including photographs, may sometimes be shared with a defense attorney and even with the traffickers themselves, and the patient may be re-traumatized by a display of the photographs and other information.&nbsp; </span></li><span data-dcnode-id="1250" instrument_node="">
</span></ul><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">These and other considerations augur for a careful balance of the need for information with medical-legal discretion. Consultation with local attorneys familiar with privacy and rape shield laws is strongly advised. </span></p><span data-dcnode-id="1245" instrument_node="">
</span><h2 data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">A Sample Protocol </span></h2><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1241"></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">As an example of a hospital system’s protocol, Stoklosa cites Dignity Health, a Catholic health system that operates hospitals in three western states. Dignity Health’s Human Trafficking Response Program “ </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dignityhealth.org/-/media/cm/media/documents/Human-Trafficking/Dignity%2520Health_HTRP_SharedLearningsManual_170512.ashx%3Fla%3Den%26amp%3Bhash%3DC510A6D1D187D537147B3C0837F02920C7687896" target="_blank"><span data-dcnode-id="1238" instrument_node="">Share Learnings Manual</span></a><span data-dcnode-id="1236" instrument_node="">” was developed “to ensure that trafficked persons are identified in the healthcare setting and assisted with victim-centered, trauma-informed care and services.” The document contains background information on the issues (including a discussion of myths surrounding human trafficking), suggestions for educating staff and the community, procedures for acute-care facilities and clinics, sample forms, and other useful material. </span></p><span data-dcnode-id="1234" instrument_node="">
</span><h2 data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Direct Patient Services</span></h2><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1230"></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">An example of direct patient care services is the University of Miami Miller School of Medicine’s multidisciplinary medical clinic called THRIVE. In cooperation with Jackson Health System, the clinic is a medical home that specifically addresses the needs of human trafficking survivors. According to its website, the THRIVE clinic is unique in Florida and one of only a handful of such models in the country. They offer multidisciplinary, multicultural primary care, gynecological care, psychiatric and behavioral health services, and specialty care services, all in one location. (A few similar clinics are listed in the resources section, and there may be others.) </span></p><span data-dcnode-id="1226" instrument_node="">
</span><h2 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Recommended Actions</span></h2><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1222"></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">There are numerous action steps that healthcare organizations should undertake to address human trafficking. Some of the more salient ones are as follows: </span></p><span data-dcnode-id="1218" instrument_node="">
</span><ul data-dcnode-id="1192"><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Begin immediately to train coding professionals about the new ICD-10 codes (they take effect on Oct. 1). Use of the codes will enable collection of important data on the cost and prevalence of trafficking and will allow policy makers to devise solutions to improve community health.</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Do a literature search—beginning with the resources listed below—for information that will form the basis of a curriculum to educate all staff who interact with patients.</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Educate all clinical staff on red flags and actions to be taken.</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">After Oct. 1, ensure that when possible confirmed and suspected trafficking cases are documented using the new codes (while giving due regard to possible safety and medical-legal ramifications).</span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Identify interested community resources, both public and private, and solicit their cooperation and advice.</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Invest “community benefit” funds toward anti-human trafficking efforts.</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Create a task force or working group within your organization to develop protocols, policies, and procedures, including procedures for documentation, external reporting, forensic examinations, and dealing with minors.</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Determine whether there are relevant laws in your state (e.g., California requires EDs and urgent care centers to post a notice about human trafficking). </span></li><span data-dcnode-id="1193" instrument_node="">
</span></ul><span data-dcnode-id="1191" instrument_node="">
</span><h2 data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Human Trafficking Healthcare Delivery</span></h2><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Human trafficking is a global public health problem, and the United States is not immune from its effects. Because healthcare providers frequently encounter patients who are human trafficking victims, it is incumbent on them to be prepared to serve these patients and to document their treatment using the new ICD-10 codes when possible. Only through greater awareness and research will the extent of the hidden problem be revealed and its costs made known.&nbsp; </span></p><span data-dcnode-id="1185" instrument_node="">
</span><h2 data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Resources</span></h2><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1181"></p><span data-dcnode-id="1180" instrument_node="">

</span><p data-dcnode-id="1166"><span data-dcnode-id="1173" instrument_node="">Dignity Health, </span><i data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node=""> </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dignityhealth.org/-/media/cm/media/documents/Human-Trafficking/Dignity%2520Health_HTRP_SharedLearningsManual_170512.ashx%3Fla%3Den%26amp%3Bhash%3DC510A6D1D187D537147B3C0837F02920C7687896" target="_blank"><span data-dcnode-id="1171" instrument_node="">Human Trafficking Response Program Shared Learnings Manual</span></a><span data-dcnode-id="1169" instrument_node=""> </span></i><span data-dcnode-id="1167" instrument_node=""> </span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1164" instrument_node="">Isaac, R.; Solak, J.; and Giardino, A. P., " </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//digitalcommons.library.tmc.edu/childrenatrisk/vol2/iss1/8%3Futm_source%3Ddigitalcommons.library.tmc.edu%252Fchildrenatrisk%252Fvol2%252Fiss1%252F8%26amp%3Butm_medium%3DPDF%26amp%3Butm_campaign%3DPDFCoverPages" target="_blank"><span data-dcnode-id="1163" instrument_node="">Health Care Providers' Training Needs Related to Human Trafficking: Maximizing the Opportunity to Effectively Screen and Intervene</span></a><span data-dcnode-id="1161" instrument_node="">,"&nbsp;</span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Journal of Applied Research on Children: Informing Policy for Children at Risk</span></em><span data-dcnode-id="1158" instrument_node="">: Vol. 2: Iss. 1, Article 8, 2011 </span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node=""> </span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1153"></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1151" instrument_node="">Lee, C., and Stoklosa, H., “ </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beckershospitalreview.com/finance/the-role-of-health-systems-in-combating-human-trafficking.html" target="_blank"><span data-dcnode-id="1150" instrument_node="">The role of health systems in combating human trafficking</span></a><span data-dcnode-id="1148" instrument_node="">,” </span><i data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Hospital CFO Report</span></i><span data-dcnode-id="1145" instrument_node="">, Becker’s Hospital Review, June 29, 2018&nbsp;</span></p><span data-dcnode-id="1143" instrument_node="">
