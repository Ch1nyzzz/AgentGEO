</span><p data-dcnode-id="895"><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crimesolutions.ojp.gov/" title="CrimeSolutions"><span data-dcnode-id="899" instrument_node="">CrimeSolutions</span></a><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
CrimeSolutions&nbsp;is a searchable online database of evidence-based programs covering a range of justice-related topics. The site is a tool to understand, access, and integrate scientific evidence about programs into programmatic and policy decisions.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="889"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lsc.gov/"><span data-dcnode-id="893" instrument_node="">Legal Services Corporation</span></a><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
Legal Services Corporation (LSC) is a private, nonprofit corporation established by Congress in 1974. LSC makes grants to independent local programs across the country to provide civil legal services to Americans without considerable financial means. The Trafficking Victims Protection Act granted the LSC the responsibility to extend program services to those eligible for T and U Visas.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="880"><a data-dcnode-id="886" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="ab3b27de-3325-483e-aa03-2463dcf7442f" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ovc.ojp.gov/program/vtt" target="_blank" title="The Vicarious Trauma Toolkit"><span data-dcnode-id="887" instrument_node="">The Vicarious Trauma Toolkit</span></a><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
Research shows that vicarious trauma, when left unaddressed, can lead to staff burnout, turnover, stress, and a lesser quality of services for victims. This OVC toolkit offers guidance to help organizations strengthen their ability to address work-related exposure to trauma. The toolkit contains a state-of-the-art repository with nearly 500 resources for the fields of victim services, emergency medical services, fire services, law enforcement, and other allied professions. The toolkit includes a </span><a data-dcnode-id="882" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="3aaa2e6f-24a1-4d6c-80c0-27ba21c4283c" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ovc.ojp.gov/program/vtt/blueprint-for-a-vicarious-trauma-informed-organization" target="_blank" title="Blueprint for a Vicarious Trauma-Informed Organization"><span data-dcnode-id="883" instrument_node="">Blueprint for a Vicarious Trauma-Informed Organization</span></a><span data-dcnode-id="881" instrument_node=""> to help organizations begin the process of becoming more trauma-informed.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="863"><a class="ext" data-dcnode-id="866" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.victimlaw.org/"><span data-dcnode-id="878" instrument_node="">VictimLaw</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="867" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="872"><sfw data-dcnode-id="873" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="877" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="874"><targetsettings data-dcnode-id="875" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="876" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="870">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="869"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="868"></path></svg></a><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">
VictimLaw, a comprehensive online database of federal, state, and tribal victims’ rights law, is supported by OVC. It includes victims’ rights provisions that pertain specifically to victims of human trafficking in several categories of rights that are most commonly enacted from state to state.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="857"><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.grants.gov/" target="_blank"><span data-dcnode-id="861" instrument_node="">Grants.gov</span></a><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
This "one-stop storefront" provides a unified process for all customers of federal grants to find funding opportunities and apply for funding. Grants.gov provides access to all discretionary grants offered by 26 federal grant-making agencies, including the U.S. Departments of Justice, Health and Human Services, Homeland Security, and Labor.</span></p><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span><h2 class="usa-accordion__heading" data-dcnode-id="851"><button aria-controls="hhsn6" aria-expanded="false" class="usa-accordion__button" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Federal Government Resources</span></button></h2><span data-dcnode-id="850" instrument_node="">
</span><div class="usa-accordion__content usa-prose ui-widget-content" data-dcnode-id="581" hidden="" id="hhsn6"><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">In addition to OVC, many Federal Government agencies are working to combat human trafficking. While not a comprehensive list of all anti-trafficking efforts, the below list provides a summary of many of these initiatives.</span></p><span data-dcnode-id="846" instrument_node="">
</span><h3 data-dcnode-id="843" id="u-s-department-of-justice"><span data-dcnode-id="845" instrument_node="">U.S. Department of Justice</span><a aria-label="Copy link to section: U.S. Department of Justice" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="844" href="#u-s-department-of-justice" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Justice"></a></h3><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">The U.S. Department of Justice is committed to a collaborative approach to combating human trafficking and improving services for victims. Visit the </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/humantrafficking" target="_blank" title="U.S. Department of Justice's Human Trafficking"><span data-dcnode-id="840" instrument_node="">U.S. Department of Justice's Human Trafficking</span></a><span data-dcnode-id="838" instrument_node=""> website and view the information below to learn more.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="831"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/criminal/ceos/index.html"><span data-dcnode-id="835" instrument_node="">Child Exploitation and Obscenity Section (CEOS)</span></a><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">
CEOS works to combat incidences of child exploitation and sex trafficking of minors. Issues under the CEOS umbrella include child pornography, illegal interstate or international transportation of minors, international parental abduction, computer-related exploitation of children, and child victimization on federal and Indian lands.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/investigate/civil-rights/human-trafficking"><span data-dcnode-id="829" instrument_node="">Federal Bureau of Investigation (FBI)</span></a><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
The FBI is responsible for investigating human trafficking. The FBI also runs the Innocence Lost National Initiative, focusing on sex trafficking of children within the United States.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/about/crm/htpu.php"><span data-dcnode-id="823" instrument_node="">Human Trafficking Prosecution Unit</span></a><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
The U.S. Department of Justice’s Human Trafficking Prosecution Unit works closely with Assistant United States Attorneys and law enforcement agencies to streamline fast-moving trafficking investigations, ensure consistent application of trafficking statutes, and identify multijurisdictional trafficking networks.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nij.ojp.gov/topics/articles/overview-human-trafficking-and-nijs-role"><span data-dcnode-id="817" instrument_node="">National Institute of Justice</span></a><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">
The National Institute of Justice, Office of Justice Programs, funds research on—</span></p><span data-dcnode-id="812" instrument_node="">
</span><ul data-dcnode-id="799"><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">the nature and extent of human trafficking,</span></li><span data-dcnode-id="809" instrument_node="">
</span><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">detecting and investigating traffickers,</span></li><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">prosecuting traffickers, and</span></li><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">services for trafficking victims.</span></li><span data-dcnode-id="800" instrument_node="">
</span></ul><p data-dcnode-id="794"><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ojjdp.ojp.gov/programs/commercial-sexual-exploitation-children"><span data-dcnode-id="798" instrument_node="">Office of Juvenile Justice and Delinquency Prevention</span></a><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">
The Office of Juvenile Justice and Delinquency Prevention, Office of Justice Programs, implements training and capacity-building initiatives related to the commercial sexual exploitation of children. The office funds the National Center for Missing and&nbsp;Exploited Children, which helps prevent child abduction and sexual exploitation; find missing children; and operates a toll free missing children's hotline.&nbsp;The office also funds projects to investigate the Internet-related crimes of child pornography and enticement through the Internet Crimes Against Children Task Force program.</span></p><span data-dcnode-id="793" instrument_node="">
</span><h3 data-dcnode-id="790" id="u-s-agency-for-international-development"><span data-dcnode-id="792" instrument_node="">U.S. Agency for International Development</span><a aria-label="Copy link to section: U.S. Agency for International Development" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="791" href="#u-s-agency-for-international-development" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Agency for International Development"></a></h3><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">The </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/otip/resources/federal-efforts" target="_blank" title="U.S. Agency for International Development"><span data-dcnode-id="787" instrument_node="">U.S. Agency for International Development</span></a><span data-dcnode-id="785" instrument_node=""> supports international programs to prevent trafficking, protect and assist victims, and support prosecutions.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="780" id="u-s-department-of-health-and-human-services"><span data-dcnode-id="782" instrument_node="">U.S. Department of Health and Human Services</span><a aria-label="Copy link to section: U.S. Department of Health and Human Services" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="781" href="#u-s-department-of-health-and-human-services" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Health and Human Services"></a></h3><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="771"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/programs/endtrafficking"><span data-dcnode-id="778" instrument_node="">Administration for Children &amp; Families</span></a><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">
The Administration for Children &amp; Families is committed to ensuring that victims of all forms of human trafficking – adults and children; foreign nationals, U.S. citizens, and lawful permanent residents; survivors of labor and commercial sexual exploitation – have access to the support they need to foster health and well-being. The Administration for Children &amp; Families also manages the </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/otip/partnerships/look-beneath-surface" target="_blank" title="Look Beneath the Surface"><span data-dcnode-id="774" instrument_node="">Look Beneath the Surface</span></a><span data-dcnode-id="772" instrument_node=""> public awareness campaign to combat human trafficking.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="765"><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/fysb/family-violence-prevention-services"><span data-dcnode-id="769" instrument_node="">The Family Violence Prevention and Services Program</span></a><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
The Family Violence Prevention and Services Program of the Family and Youth Services Bureau, at the Administration of Children &amp; Families, administers the Family Violence Prevention and Services Act, the primary federal funding stream dedicated to the support of emergency shelter and related assistance for victims of domestic violence and their children.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/orr"><span data-dcnode-id="763" instrument_node="">Office of Refugee Resettlement</span></a><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
The Office of Refugee Resettlement, at the Administration of Children &amp; Families, helps refugees and other special populations, such as adult victims of severe forms of trafficking, obtain economic and social self-sufficiency in the United States.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="753"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/bureaus-offices/under-secretary-for-civilian-security-democracy-and-human-rights/office-to-monitor-and-combat-trafficking-in-persons/"><span data-dcnode-id="757" instrument_node="">Office on Trafficking in Persons</span></a><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
The Office on Trafficking in Persons, at the Administration of Children &amp; Families, seeks to create pathways to freedom for victims and those at risk of human trafficking by—</span></p><span data-dcnode-id="752" instrument_node="">
</span><ul data-dcnode-id="739"><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">developing anti-trafficking strategies, policies, and programs to prevent human trafficking,</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">empowering health and human services organizations to respond to human trafficking,</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">increasing victim identification and access to services, and</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">strengthening health and well-being outcomes of survivors.</span></li><span data-dcnode-id="740" instrument_node="">
</span></ul><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Visit the Office on Trafficking in Persons' </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/otip/map/domestic-victims-human-trafficking-program-grantees" target="_blank" title="Map Domestic Victims of Human Trafficking Program Grantees"><span data-dcnode-id="737" instrument_node="">Map Domestic Victims of Human Trafficking Program Grantees</span></a><span data-dcnode-id="735" instrument_node=""> to locate anti-trafficking service providers funded by this office.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/fysb/runaway-homeless-youth"><span data-dcnode-id="732" instrument_node="">Runaway and Homeless Youth Program</span></a><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">
Through the Runaway and Homeless Youth Program, the Family and Youth Services Bureau, Administration of Children &amp; Families, supports street outreach, emergency shelters, and longer-term transitional living and maternity group home programs to serve and protect these young people.</span></p><span data-dcnode-id="727" instrument_node="">
</span><h3 data-dcnode-id="724" id="u-s-department-of-state"><span data-dcnode-id="726" instrument_node="">U.S. Department of State</span><a aria-label="Copy link to section: U.S. Department of State" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="725" href="#u-s-department-of-state" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of State"></a></h3><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="718"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/bureaus-offices/under-secretary-for-civilian-security-democracy-and-human-rights/office-to-monitor-and-combat-trafficking-in-persons/"><span data-dcnode-id="722" instrument_node="">Office to Monitor and Combat Trafficking in Persons</span></a><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
Office to Monitor and Combat Trafficking in Persons conducts awareness-raising activities, diplomacy with other countries, and funding for international anti-trafficking initiatives.</span></p><span data-dcnode-id="717" instrument_node="">
</span><h3 data-dcnode-id="714" id="u-s-department-of-homeland-security"><span data-dcnode-id="716" instrument_node="">U.S. Department of Homeland Security</span><a aria-label="Copy link to section: U.S. Department of Homeland Security" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="715" href="#u-s-department-of-homeland-security" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Homeland Security"></a></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="708"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/blue-campaign"><span data-dcnode-id="712" instrument_node="">Blue Campaign</span></a><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">
The Blue Campaign provides information on training and outreach, how traffickers operate, and victim assistance to help keep the public informed.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702"><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/victims-human-trafficking-other-crimes"><span data-dcnode-id="706" instrument_node="">U.S. Citizenship and Immigration Services</span></a><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
U.S. Citizenship and Immigration Services adjudicates applications for T and U visas, which are available to foreign national victims of trafficking. Lawyers and advocates may check on the status of an already submitted case by calling the Violence Against Women Act Unit Helpline at 802–527–4888.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h3 data-dcnode-id="698" id="u-s-department-of-defense"><span data-dcnode-id="700" instrument_node="">U.S. Department of Defense</span><a aria-label="Copy link to section: U.S. Department of Defense" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="699" href="#u-s-department-of-defense" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Defense"></a></h3><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="692"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ctip.defense.gov/"><span data-dcnode-id="696" instrument_node="">Combating Trafficking in Persons</span></a><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">
The Combating Trafficking in Persons Program Office establishes policy and ensures that the services, combatant commands, and defense agencies have the necessary tools to prevent trafficking.</span></p><span data-dcnode-id="691" instrument_node="">
</span><h3 data-dcnode-id="688" id="u-s-department-of-education"><span data-dcnode-id="690" instrument_node="">U.S. Department of Education</span><a aria-label="Copy link to section: U.S. Department of Education" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="689" href="#u-s-department-of-education" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Education"></a></h3><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="679"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safesupportivelearning.ed.gov/human-trafficking-americas-schools" target="_blank" title="National Center on Safe Supportive Learning Environments"><span data-dcnode-id="686" instrument_node="">National Center on Safe Supportive Learning Environments</span></a><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">
This Center offers a </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safesupportivelearning.ed.gov/human-trafficking-americas-schools" target="_blank" title="Human Trafficking in America’s Schools"><span data-dcnode-id="682" instrument_node="">Human Trafficking in America’s Schools</span></a><span data-dcnode-id="680" instrument_node=""> guide to help school officials understand how human trafficking impacts schools; recognize the indicators of possible child trafficking; and develop policies, protocols, and partnerships to address and prevent the exploitation of children.</span></p><span data-dcnode-id="678" instrument_node="">
</span><h3 data-dcnode-id="675" id="u-s-department-of-housing-and-urban-development-hud"><span data-dcnode-id="677" instrument_node="">U.S. Department of Housing and Urban Development (HUD)</span><a aria-label="Copy link to section: U.S. Department of Housing and Urban Development (HUD)" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="676" href="#u-s-department-of-housing-and-urban-development-hud" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Housing and Urban Development (HUD)"></a></h3><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="673" instrument_node="">HUD's </span><a class="external ext" data-dcnode-id="660" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hudexchange.info/programs/coc/" target="_blank" title="Continuum of Care Program"><span data-dcnode-id="672" instrument_node="">Continuum of Care Program</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="661" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="666"><sfw data-dcnode-id="667" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="671" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="668"><targetsettings data-dcnode-id="669" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="670" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="664">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="663"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="662"></path></svg></a><span data-dcnode-id="659" instrument_node="">—</span></p><span data-dcnode-id="657" instrument_node="">
</span><ul data-dcnode-id="644"><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">promotes communitywide commitment to the goal of ending homelessness,</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">provides funding for efforts by nonprofit providers and state and local governments to quickly rehouse homeless individuals and families while minimizing the trauma,</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">promotes access to and effect use of mainstream programs by homeless individuals and families, and</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">optimizes self-sufficiency among individuals and families experiencing homelessness.</span></li><span data-dcnode-id="645" instrument_node="">
</span></ul><h3 data-dcnode-id="641" id="u-s-department-of-labor"><span data-dcnode-id="643" instrument_node="">U.S. Department of Labor</span><a aria-label="Copy link to section: U.S. Department of Labor" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="642" href="#u-s-department-of-labor" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Labor"></a></h3><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="635"><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/agencies/ilab/our-work/child-forced-labor-trafficking"><span data-dcnode-id="639" instrument_node="">Office of Child Labor, Forced Labor &amp; Human Trafficking</span></a><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
The Office of Child Labor, Forced Labor &amp; Human Trafficking publishes reports on international child labor, forced labor, and human trafficking. The Office also funds programs to combat international child labor.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dol.gov/whd/"><span data-dcnode-id="633" instrument_node="">Wage and Hour Division</span></a><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
The Wage and Hour Division enforces federal labor laws including the Fair Labor Standards Act and the Migrant and Seasonal Agricultural Workers Protection Act. The Division assists with human trafficking investigations involving the violation of these laws.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">The Division's </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/general/apps/timesheet" target="_blank" title="Timesheet App"><span data-dcnode-id="626" instrument_node="">Timesheet App</span></a><span data-dcnode-id="624" instrument_node=""> allows users to record the hours that they work and includes a function to calculate overtime pay. The app is available to download in both English and Spanish.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="603"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doleta.gov/" target="_blank" title="Employment &amp; Training Administration"><span data-dcnode-id="621" instrument_node="">Employment &amp; Training Administration</span></a><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
The Employment &amp; Training Administration sponsors </span><a class="external ext" data-dcnode-id="605" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careeronestop.org/site/american-job-center.aspx" target="_blank" title="CareerOneStop"><span data-dcnode-id="617" instrument_node="">CareerOneStop</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="606" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="611"><sfw data-dcnode-id="612" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="616" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="613"><targetsettings data-dcnode-id="614" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="615" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="609">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="608"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="607"></path></svg></a><span data-dcnode-id="604" instrument_node="">. This program offers services such as job-search, job-placement assistance, job-counseling services, and more to human trafficking survivors.</span></p><span data-dcnode-id="602" instrument_node="">
</span><h3 data-dcnode-id="599" id="u-s-department-of-transportation"><span data-dcnode-id="601" instrument_node="">U.S. Department of Transportation</span><a aria-label="Copy link to section: U.S. Department of Transportation" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="600" href="#u-s-department-of-transportation" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Department of Transportation"></a></h3><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">The </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transportation.gov/stophumantrafficking" target="_blank" title="Department of Transportation"><span data-dcnode-id="596" instrument_node="">Department of Transportation</span></a><span data-dcnode-id="594" instrument_node=""> trains transportation employees and the traveling public to recognize and report possible instances of human trafficking.</span></p><span data-dcnode-id="592" instrument_node="">
</span><h3 data-dcnode-id="589" id="u-s-equal-employment-opportunity-commission"><span data-dcnode-id="591" instrument_node="">U.S. Equal Employment Opportunity Commission</span><a aria-label="Copy link to section: U.S. Equal Employment Opportunity Commission" class="anchorjs-link" data-anchorjs-icon="" data-dcnode-id="590" href="#u-s-equal-employment-opportunity-commission" style="opacity: 1; font: 1em / 1 anchorjs-icons; padding-left: 0.375em;" title="Copy link to section: U.S. Equal Employment Opportunity Commission"></a></h3><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">Anti-discrimination laws enforced by the </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eeoc.gov/eeoc/interagency/trafficking.cfm" target="_blank" title="U.S. Equal Employment Opportunity Commission"><span data-dcnode-id="586" instrument_node="">U.S. Equal Employment Opportunity Commission</span></a><span data-dcnode-id="584" instrument_node="">, particularly those prohibiting discrimination on the basis of race, national origin, and sex, are an integral part of the fight against human trafficking.</span></p><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span><div aria-label="accordion-group" class="usa-accordion" data-dcnode-id="511"><span data-dcnode-id="577" instrument_node="">
</span><h2 class="usa-accordion__heading" data-dcnode-id="574"><button aria-controls="ex2w6n" aria-expanded="false" class="usa-accordion__button" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Human Trafficking Statistics</span></button></h2><span data-dcnode-id="573" instrument_node="">
</span><div class="usa-accordion__content usa-prose ui-widget-content" data-dcnode-id="513" hidden="" id="ex2w6n"><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">It is difficult to measure the magnitude of human trafficking in the United States. According to the </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucr.fbi.gov/crime-in-the-u.s/2019/crime-in-the-u.s.-2019/additional-data-collections/human-trafficking"><span data-dcnode-id="570" instrument_node="">Federal Bureau of Investigation</span></a><span data-dcnode-id="568" instrument_node="">, due to the nature of human trafficking, many of these crimes are never identified by local, state, tribal, and federal law enforcement agencies that investigate them.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">Although statistics are available, they provides an incomplete picture of this complex issue. A National Institute of Justice-funded </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nij.ojp.gov/topics/articles/gaps-reporting-human-trafficking-incidents-result-significant-undercounting"><span data-dcnode-id="564" instrument_node="">study</span></a><span data-dcnode-id="562" instrument_node=""> “found that inadequate victim identification was a problem not only for law enforcement but also for victim service providers.” Existing data on human trafficking focuses on identified victims. However in order for researchers to make accurate estimations on the prevalence of human trafficking, law enforcement, victim service providers, social services, and others need to be able to better identify victims.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">View </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ovc.ojp.gov/sites/g/files/xyckuh226/files/media/document/ovc-tims-report-508.pdf"><span data-dcnode-id="558" instrument_node="">OVC human trafficking grantee data</span></a><span data-dcnode-id="556" instrument_node=""> on services provided to trafficking victims. Data from OVC human trafficking grantees is available on total clients served, new clients served, services most frequently provided to clients, and more. Note that data in these reports only represent services provided by OVC-funded human trafficking grantees and does not represent services provided to all human trafficking victims in the United States, nor do all human trafficking victims seek or receive services.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">For further information, view the following resources.</span></p><span data-dcnode-id="551" instrument_node="">
