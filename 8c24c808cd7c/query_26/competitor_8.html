</span><h2 data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Trafficking Myths</span></h2><span data-dcnode-id="2527" instrument_node="">
</span><div data-dcnode-id="1917" id="home-myths-wrapper"><span data-dcnode-id="2526" instrument_node="">
</span><div class="swiper-container" data-dcnode-id="1932" id="home-myths"><span data-dcnode-id="2525" instrument_node="">
</span><div class="swiper-wrapper" data-dcnode-id="1934"><span data-dcnode-id="2524" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2494"><span data-dcnode-id="2523" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2510"><span data-dcnode-id="2522" instrument_node="">
</span><h5 data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Myth</span></h5><span data-dcnode-id="2519" instrument_node="">
</span><hr data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">
</span><h4 data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Victims will escape or ask for help if they need it.</span></h4><span data-dcnode-id="2514" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2512" href="#"><span data-dcnode-id="2513" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2511" instrument_node="">
</span></div><span data-dcnode-id="2509" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2496"><span data-dcnode-id="2508" instrument_node="">
</span><h5 data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Reality</span></h5><span data-dcnode-id="2505" instrument_node="">
</span><hr data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2502"></p><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Victims of trafficking are often psychologically and physically abused. Fear of retaliation, due to threats and physical violence, deter victims from seeking help. Additionally, some victims are ashamed of what they have experienced. They do not always self-identify and may not realize that they have rights.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2498"></p><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node="">
</span></div><span data-dcnode-id="2493" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2463"><span data-dcnode-id="2492" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2479"><span data-dcnode-id="2491" instrument_node="">
</span><h5 data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Myth</span></h5><span data-dcnode-id="2488" instrument_node="">
</span><hr data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">
</span><h4 data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Trafficking only occurs in foreign countries.</span></h4><span data-dcnode-id="2483" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2481" href="#"><span data-dcnode-id="2482" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2480" instrument_node="">
</span></div><span data-dcnode-id="2478" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2465"><span data-dcnode-id="2477" instrument_node="">
</span><h5 data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Reality</span></h5><span data-dcnode-id="2474" instrument_node="">
</span><hr data-dcnode-id="2473"><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2471"></p><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">A common misconception is that trafficking happens only in developing countries. The UN reports that “Every country in the world is affected by human trafficking, whether as a country of origin, transit or destination for victims.”</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2467"></p><span data-dcnode-id="2466" instrument_node="">
</span></div><span data-dcnode-id="2464" instrument_node="">
</span></div><span data-dcnode-id="2462" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2432"><span data-dcnode-id="2461" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2448"><span data-dcnode-id="2460" instrument_node="">
</span><h5 data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Myth</span></h5><span data-dcnode-id="2457" instrument_node="">
</span><hr data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">
</span><h4 data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Trafficking does not impact me.</span></h4><span data-dcnode-id="2452" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2450" href="#"><span data-dcnode-id="2451" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2449" instrument_node="">
</span></div><span data-dcnode-id="2447" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2434"><span data-dcnode-id="2446" instrument_node="">
</span><h5 data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Reality</span></h5><span data-dcnode-id="2443" instrument_node="">
</span><hr data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2440"></p><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Trafficking is one of the fastest growing criminal practices in the world. Many organizations across various industries make and distribute products produced by human trafficking victims. These products are sold worldwide, unbeknownst to consumers. Because trafficking is so widespread, it affects all communities around the world in some way.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2436"></p><span data-dcnode-id="2435" instrument_node="">
</span></div><span data-dcnode-id="2433" instrument_node="">
</span></div><span data-dcnode-id="2431" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2401"><span data-dcnode-id="2430" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2417"><span data-dcnode-id="2429" instrument_node="">
</span><h5 data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Myth</span></h5><span data-dcnode-id="2426" instrument_node="">
</span><hr data-dcnode-id="2425"><span data-dcnode-id="2424" instrument_node="">
</span><h4 data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Trafficking is prostitution.</span></h4><span data-dcnode-id="2421" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2419" href="#"><span data-dcnode-id="2420" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2418" instrument_node="">
</span></div><span data-dcnode-id="2416" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2403"><span data-dcnode-id="2415" instrument_node="">
</span><h5 data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Reality</span></h5><span data-dcnode-id="2412" instrument_node="">
</span><hr data-dcnode-id="2411"><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2409"></p><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Not every person who is exploited through forced labor has been trafficked, and not all people working in prostitution are forced or trafficked, however there is a strong link between the two.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2405"></p><span data-dcnode-id="2404" instrument_node="">
</span></div><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2370"><span data-dcnode-id="2399" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2386"><span data-dcnode-id="2398" instrument_node="">
</span><h5 data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Myth</span></h5><span data-dcnode-id="2395" instrument_node="">
</span><hr data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">
</span><h4 data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Only females can be victims and survivors of sex trafficking.</span></h4><span data-dcnode-id="2390" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2388" href="#"><span data-dcnode-id="2389" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2387" instrument_node="">
</span></div><span data-dcnode-id="2385" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2372"><span data-dcnode-id="2384" instrument_node="">
</span><h5 data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Reality</span></h5><span data-dcnode-id="2381" instrument_node="">
</span><hr data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2378"></p><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Anyone can experience sex trafficking, including men. Traffickers prey on the vulnerable, often with promises of a better life. The UNODC estimates that women and girls account for about 80% of the detected human trafficking victims, which means that around 20% of victims are males. LGBTQ boys and young men are seen as particularly vulnerable to trafficking.</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2374"></p><span data-dcnode-id="2373" instrument_node="">
</span></div><span data-dcnode-id="2371" instrument_node="">
</span></div><span data-dcnode-id="2369" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2339"><span data-dcnode-id="2368" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2355"><span data-dcnode-id="2367" instrument_node="">
</span><h5 data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Myth</span></h5><span data-dcnode-id="2364" instrument_node="">
</span><hr data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">
</span><h4 data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Victims must be held against their will using some form of physical restraint or bondage.</span></h4><span data-dcnode-id="2359" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2357" href="#"><span data-dcnode-id="2358" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2356" instrument_node="">
</span></div><span data-dcnode-id="2354" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2341"><span data-dcnode-id="2353" instrument_node="">
</span><h5 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Reality</span></h5><span data-dcnode-id="2350" instrument_node="">
</span><hr data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2347"></p><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">While some traffickers physically hold the people they exploit, it is more common for them to use psychological means of control. Fear, trauma, drug addiction, threats against families, and a lack of options due to poverty and homelessness can all prevent someone from leaving. Some individuals who experience trafficking may also be manipulated or believe they are in love with their trafficker, which can make them resistant to seeking help.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2343"></p><span data-dcnode-id="2342" instrument_node="">
</span></div><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2338" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2308"><span data-dcnode-id="2337" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2324"><span data-dcnode-id="2336" instrument_node="">
</span><h5 data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Myth</span></h5><span data-dcnode-id="2333" instrument_node="">
</span><hr data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">
</span><h4 data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Human trafficking is the same thing as sex trafficking.</span></h4><span data-dcnode-id="2328" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2326" href="#"><span data-dcnode-id="2327" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2325" instrument_node="">
</span></div><span data-dcnode-id="2323" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2310"><span data-dcnode-id="2322" instrument_node="">
</span><h5 data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Reality</span></h5><span data-dcnode-id="2319" instrument_node="">
</span><hr data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2316"></p><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Sex trafficking is a form of human trafficking. Human trafficking also includes labor trafficking, which involves children and adults compelled to perform labor or services by force, fraud, or coercion. Victims are found in legitimate and illegitimate labor industries, including sweatshops, massage parlors, agriculture, restaurants, hotels, and domestic service.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2312"></p><span data-dcnode-id="2311" instrument_node="">
</span></div><span data-dcnode-id="2309" instrument_node="">
</span></div><span data-dcnode-id="2307" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2277"><span data-dcnode-id="2306" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2293"><span data-dcnode-id="2305" instrument_node="">
</span><h5 data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Myth</span></h5><span data-dcnode-id="2302" instrument_node="">
</span><hr data-dcnode-id="2301"><span data-dcnode-id="2300" instrument_node="">
</span><h4 data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Traffickers target victims they don’t know.</span></h4><span data-dcnode-id="2297" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2295" href="#"><span data-dcnode-id="2296" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2294" instrument_node="">
</span></div><span data-dcnode-id="2292" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2279"><span data-dcnode-id="2291" instrument_node="">
</span><h5 data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Reality</span></h5><span data-dcnode-id="2288" instrument_node="">
</span><hr data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2285"></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Many survivors have been trafficked by romantic partners, including spouses, and by family members, including parents.</span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2281"></p><span data-dcnode-id="2280" instrument_node="">
</span></div><span data-dcnode-id="2278" instrument_node="">
</span></div><span data-dcnode-id="2276" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2246"><span data-dcnode-id="2275" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2262"><span data-dcnode-id="2274" instrument_node="">
</span><h5 data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Myth</span></h5><span data-dcnode-id="2271" instrument_node="">
</span><hr data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">
</span><h4 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">People being trafficked are physically unable to leave their situations/locked in/held against their will.</span></h4><span data-dcnode-id="2266" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2264" href="#"><span data-dcnode-id="2265" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2263" instrument_node="">
</span></div><span data-dcnode-id="2261" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2248"><span data-dcnode-id="2260" instrument_node="">
</span><h5 data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Reality</span></h5><span data-dcnode-id="2257" instrument_node="">
</span><hr data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2254"></p><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">That is sometimes the case. More often, however, people in trafficking situations stay for reasons that are more complicated. Some lack the basic necessities to physically get out – such as transportation or a safe place to live. Some are afraid for their safety. Some have been so effectively manipulated that they do not identify at that point as being under the control of another person.</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2250"></p><span data-dcnode-id="2249" instrument_node="">
</span></div><span data-dcnode-id="2247" instrument_node="">
</span></div><span data-dcnode-id="2245" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2215"><span data-dcnode-id="2244" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2231"><span data-dcnode-id="2243" instrument_node="">
</span><h5 data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Myth</span></h5><span data-dcnode-id="2240" instrument_node="">
</span><hr data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">
</span><h4 data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">All commercial sex is human trafficking.</span></h4><span data-dcnode-id="2235" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2233" href="#"><span data-dcnode-id="2234" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2232" instrument_node="">
</span></div><span data-dcnode-id="2230" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2217"><span data-dcnode-id="2229" instrument_node="">
</span><h5 data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Reality</span></h5><span data-dcnode-id="2226" instrument_node="">
</span><hr data-dcnode-id="2225"><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2223"></p><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">All commercial sex involving a minor is legally considered human trafficking. Commercial sex involving an adult is human trafficking if the person providing commercial sex is doing so against his or her will as a result of force, fraud or coercion.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2219"></p><span data-dcnode-id="2218" instrument_node="">
</span></div><span data-dcnode-id="2216" instrument_node="">
</span></div><span data-dcnode-id="2214" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2184"><span data-dcnode-id="2213" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2200"><span data-dcnode-id="2212" instrument_node="">
</span><h5 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Myth</span></h5><span data-dcnode-id="2209" instrument_node="">
</span><hr data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node="">
</span><h4 data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">People in active trafficking situations always want help getting out.</span></h4><span data-dcnode-id="2204" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2202" href="#"><span data-dcnode-id="2203" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2201" instrument_node="">
</span></div><span data-dcnode-id="2199" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2186"><span data-dcnode-id="2198" instrument_node="">
</span><h5 data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Reality</span></h5><span data-dcnode-id="2195" instrument_node="">
</span><hr data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2192"></p><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Every trafficking situation is unique and self-identification as a trafficking victim or survivor happens along a continuum. Victims may be afraid to come forward and get help. Fear of retribution from traffickers, isolation, threats of violence, danger to their families, guilt, shame, misplaced loyalty and expert manipulation are among the many factors that may keep a person from seeking help or identifying as a victim even if they are, in fact, being actively trafficked.</span></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2188"></p><span data-dcnode-id="2187" instrument_node="">
</span></div><span data-dcnode-id="2185" instrument_node="">
</span></div><span data-dcnode-id="2183" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2153"><span data-dcnode-id="2182" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2169"><span data-dcnode-id="2181" instrument_node="">
</span><h5 data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Myth</span></h5><span data-dcnode-id="2178" instrument_node="">
</span><hr data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">
</span><h4 data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Human trafficking does not occur in the United States. It only happens in other countries.</span></h4><span data-dcnode-id="2173" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2171" href="#"><span data-dcnode-id="2172" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2170" instrument_node="">
</span></div><span data-dcnode-id="2168" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2155"><span data-dcnode-id="2167" instrument_node="">
</span><h5 data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Reality</span></h5><span data-dcnode-id="2164" instrument_node="">
</span><hr data-dcnode-id="2163"><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2161"></p><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Human trafficking exists in every country, including the United States. It exists nationwide—in cities, suburbs, and rural towns—and possibly in your own community.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2157"></p><span data-dcnode-id="2156" instrument_node="">
</span></div><span data-dcnode-id="2154" instrument_node="">
</span></div><span data-dcnode-id="2152" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2122"><span data-dcnode-id="2151" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2138"><span data-dcnode-id="2150" instrument_node="">
</span><h5 data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Myth</span></h5><span data-dcnode-id="2147" instrument_node="">
</span><hr data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">
</span><h4 data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Individuals must be forced or coerced into commercial sex acts to be victims of human trafficking.</span></h4><span data-dcnode-id="2142" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2140" href="#"><span data-dcnode-id="2141" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2139" instrument_node="">
</span></div><span data-dcnode-id="2137" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2124"><span data-dcnode-id="2136" instrument_node="">
</span><h5 data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Reality</span></h5><span data-dcnode-id="2133" instrument_node="">
</span><hr data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2130"></p><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Under U.S. federal law, any minor under the age of 18 who is induced to perform commercial sex acts is a victim of human trafficking, regardless of whether he or she is forced or coerced.</span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2126"></p><span data-dcnode-id="2125" instrument_node="">
</span></div><span data-dcnode-id="2123" instrument_node="">
</span></div><span data-dcnode-id="2121" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2091"><span data-dcnode-id="2120" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2107"><span data-dcnode-id="2119" instrument_node="">
</span><h5 data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Myth</span></h5><span data-dcnode-id="2116" instrument_node="">
</span><hr data-dcnode-id="2115"><span data-dcnode-id="2114" instrument_node="">
</span><h4 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Traffickers kidnap their victims.</span></h4><span data-dcnode-id="2111" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2109" href="#"><span data-dcnode-id="2110" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2108" instrument_node="">
</span></div><span data-dcnode-id="2106" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2093"><span data-dcnode-id="2105" instrument_node="">
</span><h5 data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Reality</span></h5><span data-dcnode-id="2102" instrument_node="">
</span><hr data-dcnode-id="2101"><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2099"></p><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Most human traffickers play psychological games to trick, defraud, manipulate or threaten victims into providing exploitative labor or commercial sex. While physical coercion or kidnapping can play a role, most often victims are tricked through lies and promises of a better life.</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2095"></p><span data-dcnode-id="2094" instrument_node="">
</span></div><span data-dcnode-id="2092" instrument_node="">
</span></div><span data-dcnode-id="2090" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2060"><span data-dcnode-id="2089" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2076"><span data-dcnode-id="2088" instrument_node="">
</span><h5 data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Myth</span></h5><span data-dcnode-id="2085" instrument_node="">
</span><hr data-dcnode-id="2084"><span data-dcnode-id="2083" instrument_node="">
</span><h4 data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Children and teens sometimes choose to enter into commercial sex work.</span></h4><span data-dcnode-id="2080" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2078" href="#"><span data-dcnode-id="2079" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2077" instrument_node="">
</span></div><span data-dcnode-id="2075" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2062"><span data-dcnode-id="2074" instrument_node="">
</span><h5 data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Reality</span></h5><span data-dcnode-id="2071" instrument_node="">
</span><hr data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2068"></p><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Just as a minor is legally unable to enter into a contract to open a bank account or buy a car, a minor cannot consent to any form of participation in the commercial sex industry.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2064"></p><span data-dcnode-id="2063" instrument_node="">
</span></div><span data-dcnode-id="2061" instrument_node="">
</span></div><span data-dcnode-id="2059" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="2029"><span data-dcnode-id="2058" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2045"><span data-dcnode-id="2057" instrument_node="">
</span><h5 data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Myth</span></h5><span data-dcnode-id="2054" instrument_node="">
</span><hr data-dcnode-id="2053"><span data-dcnode-id="2052" instrument_node="">
</span><h4 data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">We should be most concerned about human trafficking during major sporting events.</span></h4><span data-dcnode-id="2049" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2047" href="#"><span data-dcnode-id="2048" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2046" instrument_node="">
</span></div><span data-dcnode-id="2044" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2031"><span data-dcnode-id="2043" instrument_node="">
</span><h5 data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Reality</span></h5><span data-dcnode-id="2040" instrument_node="">
</span><hr data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2037"></p><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">During major sporting events, like the Olympics and Super Bowl, there’s an uptick in law enforcement surveillance and mass social attention around human trafficking. Many argue hyper-masculine sporting environments breed more demand for sex-trafficked women and girls. But, most of the time, women and girls aren’t trafficked specifically for these events. Often, they’ve been in forced sex work long before massive crowds come to the area. Sex trafficking isn’t isolated to one time of year or one location.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2033"></p><span data-dcnode-id="2032" instrument_node="">
</span></div><span data-dcnode-id="2030" instrument_node="">
</span></div><span data-dcnode-id="2028" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="1998"><span data-dcnode-id="2027" instrument_node="">
</span><div class="static-slide" data-dcnode-id="2014"><span data-dcnode-id="2026" instrument_node="">
</span><h5 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Myth</span></h5><span data-dcnode-id="2023" instrument_node="">
</span><hr data-dcnode-id="2022"><span data-dcnode-id="2021" instrument_node="">
</span><h4 data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">All sex traffickers are gang or mafia member pimps.</span></h4><span data-dcnode-id="2018" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="2016" href="#"><span data-dcnode-id="2017" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="2015" instrument_node="">
</span></div><span data-dcnode-id="2013" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="2000"><span data-dcnode-id="2012" instrument_node="">
</span><h5 data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Reality</span></h5><span data-dcnode-id="2009" instrument_node="">
</span><hr data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2006"></p><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Pimping has become so normalized and even glamorized in the media that many young men and boys, especially gang members, want to become pimps. Pimps consider it easier to sell a person for sex than to sell drugs or guns. Drugs and guns can be sold only once. A person, however, can be sold for sex over and over. Anyone can be a trafficker, including family members, friends, and neighbors. This crime is not exclusive to known pimps and gang members.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2002"></p><span data-dcnode-id="2001" instrument_node="">
</span></div><span data-dcnode-id="1999" instrument_node="">
</span></div><span data-dcnode-id="1997" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="1967"><span data-dcnode-id="1996" instrument_node="">
</span><div class="static-slide" data-dcnode-id="1983"><span data-dcnode-id="1995" instrument_node="">
</span><h5 data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Myth</span></h5><span data-dcnode-id="1992" instrument_node="">
</span><hr data-dcnode-id="1991"><span data-dcnode-id="1990" instrument_node="">
</span><h4 data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Abuse is always face-to-face.</span></h4><span data-dcnode-id="1987" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="1985" href="#"><span data-dcnode-id="1986" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="1984" instrument_node="">
</span></div><span data-dcnode-id="1982" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="1969"><span data-dcnode-id="1981" instrument_node="">
</span><h5 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Reality</span></h5><span data-dcnode-id="1978" instrument_node="">
</span><hr data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1975"></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">A new and devastating form of trafficking is becoming increasingly dangerous: cybersex trafficking. Pedophiles and predators can sexually abuse boys and girls right from their computers. This dark crime sees Western abusers livestream the sexual abuse of children over the internet. Online predators pay to direct the abuse from faraway countries such as the US, UK, Netherlands, and Australia. Cybersex trafficking is easy to hide and shrouded in anonymity. Victims can be exploited in any location with the internet and a webcam, or even just a mobile phone.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1971"></p><span data-dcnode-id="1970" instrument_node="">
</span></div><span data-dcnode-id="1968" instrument_node="">
</span></div><span data-dcnode-id="1966" instrument_node="">
</span><div class="swiper-slide" data-dcnode-id="1936"><span data-dcnode-id="1965" instrument_node="">
</span><div class="static-slide" data-dcnode-id="1952"><span data-dcnode-id="1964" instrument_node="">
</span><h5 data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Myth</span></h5><span data-dcnode-id="1961" instrument_node="">
</span><hr data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">
</span><h4 data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Pimps are always men.</span></h4><span data-dcnode-id="1956" instrument_node="">
</span><a class="button red-border-alt toggle-myth-slide" data-dcnode-id="1954" href="#"><span data-dcnode-id="1955" instrument_node="">
												Learn the Truth
											</span></a><span data-dcnode-id="1953" instrument_node="">
</span></div><span data-dcnode-id="1951" instrument_node="">
</span><div class="hover-slide" data-dcnode-id="1938"><span data-dcnode-id="1950" instrument_node="">
</span><h5 data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Reality</span></h5><span data-dcnode-id="1947" instrument_node="">
</span><hr data-dcnode-id="1946"><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1944"></p><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">In fact, 37% of people convicted for trafficking crimes are women. Female pimps use violence and threats, as much as male pimps, to keep women trapped in some of the darkest corners of red light districts. In cybersex trafficking cases, it is often the mothers and fathers of children who are the ones abusing them on camera.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1940"></p><span data-dcnode-id="1939" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="84" tabindex="0"><span data-dcnode-id="264" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="263"></div><span data-dcnode-id="262" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="86" role="dialog"><span data-dcnode-id="261" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="257" role="button" tabindex="0"><span data-dcnode-id="260" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="259"></i><span data-dcnode-id="258" instrument_node=""> </span></span><span data-dcnode-id="256" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="88"><span data-dcnode-id="255" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="90"><strong class="acsb-title-main" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Compliance status</span></strong><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="235" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="229" instrument_node="">
</span><ol data-dcnode-id="203"><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="216"><strong class="acsb-title" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="225" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="224"><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="221"><br data-dcnode-id="220"><span data-dcnode-id="219" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="218"><br data-dcnode-id="217"></li><span data-dcnode-id="215" instrument_node="">
</span><li data-dcnode-id="205"><strong class="acsb-title" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="212" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="211"><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="208"><br data-dcnode-id="207"><span data-dcnode-id="206" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="204" instrument_node="">
</span></ol><span data-dcnode-id="202" instrument_node="">
</span><strong data-dcnode-id="199" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="200" lang="EN-US"><span data-dcnode-id="201" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="198" instrument_node="">
</span><ul data-dcnode-id="166"><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="193"><strong class="acsb-title" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="194" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="188"><strong class="acsb-title" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="189" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="187" instrument_node="">
</span><li data-dcnode-id="183"><strong class="acsb-title" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="184" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="182" instrument_node="">
</span><li data-dcnode-id="178"><strong class="acsb-title" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="179" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="177" instrument_node="">
</span><li data-dcnode-id="173"><strong class="acsb-title" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="174" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="168"><strong class="acsb-title" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="169" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="167" instrument_node="">
</span></ul><span data-dcnode-id="165" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="162"><span data-dcnode-id="163" lang="EN-US"><span data-dcnode-id="164" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="161" instrument_node="">
</span><ol data-dcnode-id="103"><span data-dcnode-id="160" instrument_node="">
</span><li data-dcnode-id="153"><strong class="acsb-title" data-dcnode-id="156"><span data-dcnode-id="158" lang="EN-US"><span data-dcnode-id="159" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="157" instrument_node="">–</span></strong><span data-dcnode-id="154" lang="EN-US"><span data-dcnode-id="155" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="152" instrument_node="">
</span><li data-dcnode-id="145"><span data-dcnode-id="148" lang="EN-US"><strong class="acsb-title" data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="149" instrument_node="">&nbsp;</span></span><span data-dcnode-id="146" lang="EN-US"><span data-dcnode-id="147" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="144" instrument_node="">
</span><li data-dcnode-id="138"><span data-dcnode-id="140" lang="EN-US"><strong class="acsb-title" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Animations –</span></strong><span data-dcnode-id="141" instrument_node="">&nbsp;</span></span><span data-dcnode-id="139" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="137" instrument_node="">
</span><li data-dcnode-id="130"><span data-dcnode-id="133" lang="EN-US"><strong class="acsb-title" data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="134" instrument_node="">&nbsp;</span></span><span data-dcnode-id="131" lang="EN-US"><span data-dcnode-id="132" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="129" instrument_node="">
</span><li data-dcnode-id="122"><span data-dcnode-id="125" lang="EN-US"><strong class="acsb-title" data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="126" instrument_node="">&nbsp;</span></span><span data-dcnode-id="123" lang="EN-US"><span data-dcnode-id="124" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="121" instrument_node="">
</span><li data-dcnode-id="114"><span data-dcnode-id="117" lang="EN-US"><strong class="acsb-title" data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="118" instrument_node="">&nbsp;</span></span><span data-dcnode-id="115" lang="EN-US"><span data-dcnode-id="116" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="113" instrument_node="">
</span><li data-dcnode-id="105"><strong class="acsb-title" data-dcnode-id="110"><span data-dcnode-id="111" lang="EN-US"><span data-dcnode-id="112" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="106" lang="EN-US"><strong class="acsb-title" data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">–</span></strong><span data-dcnode-id="107" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="104" instrument_node="">
</span></ol><span data-dcnode-id="102" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="96" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="89" instrument_node=""> </span></div><span data-dcnode-id="87" instrument_node=""> </span></div><span data-dcnode-id="85" instrument_node="">
