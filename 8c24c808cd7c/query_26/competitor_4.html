</span><p data-dcnode-id="5673"><span data-dcnode-id="5705" instrument_node="">According to UN.GIFT, child trafficking has the most significant impact on trafficked children and their families.</span><sup class="reference" data-dcnode-id="5702" id="cite_ref-TngManualFightTrafficking-Textbk1_8-29"><a data-dcnode-id="5703" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5704" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5699" id="cite_ref-UN.GIFT_114-0"><a data-dcnode-id="5700" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5701" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5698" instrument_node=""> First, trafficking can result in the death or permanent injury of the trafficked child.</span><sup class="reference" data-dcnode-id="5695" id="cite_ref-TngManualFightTrafficking-Textbk1_8-30"><a data-dcnode-id="5696" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5697" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5694" instrument_node=""> This can stem from a dangerous "movement" stage of trafficking or from specific aspects of the "exploitation" stage, such as hazardous working conditions. Moreover, trafficked children are often denied access to healthcare, effectively increasing their chances of serious injury and death.</span><sup class="reference" data-dcnode-id="5691" id="cite_ref-TngManualFightTrafficking-Textbk1_8-31"><a data-dcnode-id="5692" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5693" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5690" instrument_node=""> Trafficked children are also often subject to domestic violence; they may be beaten or starved in order to ensure obedience.</span><sup class="reference" data-dcnode-id="5687" id="cite_ref-TngManualFightTrafficking-Textbk1_8-32"><a data-dcnode-id="5688" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5689" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5686" instrument_node=""> In addition, these children frequently encounter substance abuse; they may be given drugs as "payment" or to ensure that they become addicted and thus dependent on their trafficker(s).</span><sup class="reference" data-dcnode-id="5683" id="cite_ref-TngManualFightTrafficking-Textbk1_8-33"><a data-dcnode-id="5684" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5685" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5682" instrument_node=""> As opposed to many other forms of crime, the trauma experienced by children who are trafficked is often prolonged and repeated, leading to severe psychological impacts.</span><sup class="reference" data-dcnode-id="5679" id="cite_ref-UN.GIFT_114-1"><a data-dcnode-id="5680" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5681" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5678" instrument_node=""> UN.GIFT reports that trafficked children often suffer from depression, anxiety, and post-traumatic stress disorder, among other conditions.</span><sup class="reference" data-dcnode-id="5675" id="cite_ref-UN.GIFT_114-2"><a data-dcnode-id="5676" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5677" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5674" instrument_node="">
</span></p><p data-dcnode-id="5659"><span data-dcnode-id="5672" instrument_node="">Effects on families are also severe. Some families believe that sending or allowing their children to relocate in order to find work will bring in additional income, while in reality many families will never see their trafficked children again.</span><sup class="reference" data-dcnode-id="5669" id="cite_ref-TngManualFightTrafficking-Textbk1_8-34"><a data-dcnode-id="5670" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5671" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5668" instrument_node=""> In addition, UN.GIFT has found that certain forms of trafficking, particularly sexual exploitation in girls, bring "shame" to families.</span><sup class="reference" data-dcnode-id="5665" id="cite_ref-UN.GIFT_114-3"><a data-dcnode-id="5666" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5667" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5664" instrument_node=""> Thus, in certain cases, children who are able to escape trafficking may return to their families only to find that they are rejected and ostracized.</span><sup class="reference" data-dcnode-id="5661" id="cite_ref-UN.GIFT_114-4"><a data-dcnode-id="5662" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5663" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5660" instrument_node="">
</span></p><span data-dcnode-id="5658" instrument_node="">
</span><h3 data-dcnode-id="5648"><span class="mw-headline" data-dcnode-id="5656" id="Communities"><span data-dcnode-id="5657" instrument_node="">Communities</span></span><span class="mw-editsection" data-dcnode-id="5649"><span class="mw-editsection-bracket" data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">[</span></span><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D43" title="Edit section: Communities"><span data-dcnode-id="5653" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5647" instrument_node="">
</span><p data-dcnode-id="5629"><span data-dcnode-id="5646" instrument_node="">Child trafficking has also been shown to have a major effect on communities. If multiple children in a community are trafficked, it can result in the entire community being corrupted, and thus devastated, by trafficking.</span><sup class="reference" data-dcnode-id="5643" id="cite_ref-TngManualFightTrafficking-Textbk1_8-35"><a data-dcnode-id="5644" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5645" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5642" instrument_node=""> Social development efforts are hindered, as trafficked children's educations are cut short.</span><sup class="reference" data-dcnode-id="5639" id="cite_ref-TngManualFightTrafficking-Textbk1_8-36"><a data-dcnode-id="5640" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5641" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5638" instrument_node=""> As a result of this lack of education, children who escape trafficking may be less able to secure employment later in life.</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-TngManualFightTrafficking-Textbk1_8-37"><a data-dcnode-id="5636" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5637" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5634" instrument_node=""> In addition, trafficked girls face special obstacles, in that their prospects for marriage might be diminished if the community becomes aware that they have been trafficked, particularly into sexual exploitation.</span><sup class="reference" data-dcnode-id="5631" id="cite_ref-TngManualFightTrafficking-Textbk1_8-38"><a data-dcnode-id="5632" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5633" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5630" instrument_node="">
</span></p><span data-dcnode-id="5628" instrument_node="">
</span><h3 data-dcnode-id="5618"><span class="mw-headline" data-dcnode-id="5626" id="Nations"><span data-dcnode-id="5627" instrument_node="">Nations</span></span><span class="mw-editsection" data-dcnode-id="5619"><span class="mw-editsection-bracket" data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">[</span></span><a data-dcnode-id="5622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D44" title="Edit section: Nations"><span data-dcnode-id="5623" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5617" instrument_node="">
</span><p data-dcnode-id="5592"><span data-dcnode-id="5616" instrument_node="">On a national level, economic development is severely hindered by the lack of education of trafficked children; this results in a major loss of potentially productive future workers.</span><sup class="reference" data-dcnode-id="5613" id="cite_ref-TngManualFightTrafficking-Textbk1_8-39"><a data-dcnode-id="5614" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5615" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5610" id="cite_ref-UN.GIFT_114-5"><a data-dcnode-id="5611" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5612" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5609" instrument_node=""> Children who are able to successfully return to their families often pose a significant financial burden, due to their lack of education, and the illnesses and injuries they may have incurred during trafficking work.</span><sup class="reference" data-dcnode-id="5606" id="cite_ref-TngManualFightTrafficking-Textbk1_8-40"><a data-dcnode-id="5607" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5608" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5605" instrument_node=""> There are major costs associated with the rehabilitation of these trafficked children, so that they are able to successfully participate in their communities.</span><sup class="reference" data-dcnode-id="5602" id="cite_ref-TngManualFightTrafficking-Textbk1_8-41"><a data-dcnode-id="5603" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5604" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5601" instrument_node=""> Furthermore, the persistence of child trafficking indicates the presence of sustained criminal activity and criminal networks, which, in most cases, are also associated with drugs and violence.</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-UN.GIFT_114-6"><a data-dcnode-id="5599" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5600" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5597" instrument_node=""> As a result, UN.GIFT has cited child trafficking as a significant indicator of national and global security threats.</span><sup class="reference" data-dcnode-id="5594" id="cite_ref-UN.GIFT_114-7"><a data-dcnode-id="5595" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5596" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5593" instrument_node="">
</span></p><span data-dcnode-id="5591" instrument_node="">
</span><h2 data-dcnode-id="5581"><span class="mw-headline" data-dcnode-id="5589" id="Proposed_solutions"><span data-dcnode-id="5590" instrument_node="">Proposed solutions</span></span><span class="mw-editsection" data-dcnode-id="5582"><span class="mw-editsection-bracket" data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">[</span></span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D45" title="Edit section: Proposed solutions"><span data-dcnode-id="5586" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5580" instrument_node="">
</span><p data-dcnode-id="5574"><span data-dcnode-id="5579" instrument_node="">Solutions to child trafficking, or "anti-trafficking actions", can be roughly classified into four categories:</span><sup class="reference" data-dcnode-id="5576" id="cite_ref-TngManualFightTrafficking-Textbk2_6-1"><a data-dcnode-id="5577" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5578" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5575" instrument_node="">
</span></p><span data-dcnode-id="5573" instrument_node="">
</span><ul data-dcnode-id="5558"><li data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">Broad protection: "To prevent children and former victims from being (re)trafficked"</span></li><span data-dcnode-id="5570" instrument_node="">
</span><li data-dcnode-id="5568"><span data-dcnode-id="5569" instrument_node="">Prevention: "Of the crime of child trafficking and the exploitation that is its end result"</span></li><span data-dcnode-id="5567" instrument_node="">
</span><li data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">Law enforcement: "In particular within a labour context and relating to labour laws and regulations"</span></li><span data-dcnode-id="5564" instrument_node="">
</span><li data-dcnode-id="5559"><span data-dcnode-id="5563" instrument_node="">Protection: "All steps towards the redress of their grievance, rehabilitation and helping to establish her/him."</span><sup class="reference" data-dcnode-id="5560" id="cite_ref-Bianca_Daw_7-1"><a data-dcnode-id="5561" href="#cite_note-Bianca_Daw-7"><span data-dcnode-id="5562" instrument_node="">[7]</span></a></sup></li></ul><span data-dcnode-id="5557" instrument_node="">
</span><p data-dcnode-id="5530"><span data-dcnode-id="5556" instrument_node="">Broad protection actions are geared towards children who could potentially be trafficked, and include raising awareness about child trafficking, particularly in vulnerable communities.</span><sup class="reference" data-dcnode-id="5553" id="cite_ref-TngManualFightTrafficking-Textbk2_6-2"><a data-dcnode-id="5554" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5555" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5552" instrument_node=""> This type of outreach also includes policies geared towards improving the economic statuses of vulnerable families, so that reasonable alternatives are available to them, other than sending their children to work.</span><sup class="reference" data-dcnode-id="5549" id="cite_ref-TngManualFightTrafficking-Textbk2_6-3"><a data-dcnode-id="5550" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5551" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5548" instrument_node=""> Examples of this include increasing employment opportunities for adults and </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conditional_cash_transfer" title="Conditional cash transfer"><span data-dcnode-id="5547" instrument_node="">conditional cash transfer</span></a><span data-dcnode-id="5545" instrument_node=""> programs. Another major broad protection program that has been readily endorsed by UN.GIFT, the ILO, and UNICEF involves facilitating gender equality, specifically by enhancing both boys' and girls' access to affordable, quality education.</span><sup class="reference" data-dcnode-id="5542" id="cite_ref-UN.GIFT_114-8"><a data-dcnode-id="5543" href="#cite_note-UN.GIFT-114"><span data-dcnode-id="5544" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="5539" id="cite_ref-TngManualFightTrafficking-Textbk2_6-4"><a data-dcnode-id="5540" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5541" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="5536" id="cite_ref-115"><a data-dcnode-id="5537" href="#cite_note-115"><span data-dcnode-id="5538" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5535" instrument_node=""> Other forms of protection and resources are conveniently located clinics, clean water, sustainable environments, and financial literacy.</span><sup class="reference" data-dcnode-id="5532" id="cite_ref-:0_116-0"><a data-dcnode-id="5533" href="#cite_note-:0-116"><span data-dcnode-id="5534" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5531" instrument_node="">
</span></p><p data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">Another way to raise awareness for child trafficking is by communities from all over the world dedicating a week to this situation. Observing the 2012 Human Trafficking Awareness Day in the US, and wider world. Community groups along with police enforcements are collaborating to organize events as well as in depth information sessions and support groups for the victims. The events held by communities could include films, guest speakers, booths, and many more things that can help people understand the seriousness of this issue. The ICE (Human Trafficking) has a help line for victims as well as conducts awareness in the U.S.A communities through the ICE In Plain Sight Campaign.
</span></p><p data-dcnode-id="5512"><span data-dcnode-id="5527" instrument_node="">Preventative actions are more focused on addressing the actual practice of child trafficking, specifically by implementing legal frameworks that are aimed to both deter and prosecute traffickers.</span><sup class="reference" data-dcnode-id="5524" id="cite_ref-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002_17-3"><a data-dcnode-id="5525" href="#cite_note-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002-17"><span data-dcnode-id="5526" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5521" id="cite_ref-TngManualFightTrafficking-Textbk2_6-5"><a data-dcnode-id="5522" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5523" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5520" instrument_node=""> This involves the adoption and implementation of the ILO's </span><a class="mw-redirect" data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_labour_standards" title="International labour standards"><span data-dcnode-id="5519" instrument_node="">international labour standards</span></a><span data-dcnode-id="5517" instrument_node="">, as well as the development of safe and legal migration practices.</span><sup class="reference" data-dcnode-id="5514" id="cite_ref-TngManualFightTrafficking-Textbk2_6-6"><a data-dcnode-id="5515" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5516" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5513" instrument_node="">
</span></p><p data-dcnode-id="5491"><span data-dcnode-id="5511" instrument_node="">Law enforcement refers to the actual prosecution of traffickers; UNICEF maintains that successful prosecution of child traffickers is the surest way to send a message that child trafficking will not be tolerated.</span><sup class="reference" data-dcnode-id="5508" id="cite_ref-TngManualFightTrafficking-Textbk2_6-7"><a data-dcnode-id="5509" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5510" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5507" instrument_node=""> Traffickers can be "caught" at any one of the three steps of trafficking: recruitment, movement, and/or exploitation; anti-trafficking laws as well as </span><a data-dcnode-id="5505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labour" title="Child labour"><span data-dcnode-id="5506" instrument_node="">child labour</span></a><span data-dcnode-id="5504" instrument_node=""> laws must then be appropriately enforced and having them properly implemented. The development of grassroots surveillance systems has also been suggested by UNICEF which would enable communities to immediately report signs of child trafficking to legal authorities.</span><sup class="reference" data-dcnode-id="5501" id="cite_ref-TngManualFightTrafficking-Textbk2_6-8"><a data-dcnode-id="5502" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5503" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5500" instrument_node=""> However, some anti-trafficking groups, such as the Young Women's Empowerment Project, are against working with law enforcement due to cases where law enforcement officials played roles in the exploitation of the victim.</span><sup class="reference" data-dcnode-id="5497" id="cite_ref-:6_117-0"><a data-dcnode-id="5498" href="#cite_note-:6-117"><span data-dcnode-id="5499" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5496" instrument_node=""> In June 2016, 14 Oakland Police officers were alleged to have been involved in a sex scandal involving a teenaged prostitute, including some while she was allegedly a minor.</span><sup class="reference" data-dcnode-id="5493" id="cite_ref-118"><a data-dcnode-id="5494" href="#cite_note-118"><span data-dcnode-id="5495" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5492" instrument_node="">
</span></p><p data-dcnode-id="5462"><span data-dcnode-id="5490" instrument_node="">Protection begins first with victim identification; child trafficking laws must specifically and appropriately define what constitutes a "trafficking victim".</span><sup class="reference" data-dcnode-id="5487" id="cite_ref-TngManualFightTrafficking-Textbk2_6-9"><a data-dcnode-id="5488" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5489" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5486" instrument_node=""> Legal processes must then be in place for removing children from trafficking situations, and returning them either to their families or other appropriate settings.</span><sup class="reference" data-dcnode-id="5483" id="cite_ref-TngManualFightTrafficking-Textbk2_6-10"><a data-dcnode-id="5484" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5485" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5482" instrument_node=""> Victims should also be provided with individualized and supportive physical and </span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_trauma" title="Psychological trauma"><span data-dcnode-id="5481" instrument_node="">psychological</span></a><span data-dcnode-id="5479" instrument_node=""> rehabilitation in order to establish him or her self. Trauma-informed programs, prevention education programs, survivor-led centers, and other recovery and community integration programs are options as well.</span><sup class="reference" data-dcnode-id="5476" id="cite_ref-:4_119-0"><a data-dcnode-id="5477" href="#cite_note-:4-119"><span data-dcnode-id="5478" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5475" instrument_node=""> Youth-specific vulnerabilities such as homelessness, lack of family, mistrust, lack of socialization, coercive relationships, substance abuse, and lack of education can cause challenges for in the process of rehabilitation for some children.</span><sup class="reference" data-dcnode-id="5472" id="cite_ref-:4_119-1"><a data-dcnode-id="5473" href="#cite_note-:4-119"><span data-dcnode-id="5474" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5471" instrument_node=""> Some scholars advocate for rights-based development, where the victims, survivors, and youth at-risk should be able to participate in the planning of projects and have continued involvement in order to build autonomy and leadership.</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-:0_116-1"><a data-dcnode-id="5469" href="#cite_note-:0-116"><span data-dcnode-id="5470" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5467" instrument_node=""> This recuperation can take quite a length of time but, with the individual having the correct support, they can work towards a functional life.</span><sup class="reference" data-dcnode-id="5464" id="cite_ref-TngManualFightTrafficking-Textbk2_6-11"><a data-dcnode-id="5465" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5466" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5463" instrument_node="">
</span></p><p data-dcnode-id="5448"><span data-dcnode-id="5461" instrument_node="">Finally, steps should be taken to avoid "double victimization"—in other words, to ensure that formerly trafficked children are treated as victims, and not as criminals.</span><sup class="reference" data-dcnode-id="5458" id="cite_ref-TngManualFightTrafficking-Textbk2_6-12"><a data-dcnode-id="5459" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="5460" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5457" instrument_node=""> An example of "double victimization" would be a child who was illegally trafficked into sexual exploitation in the United States, and then, once free from trafficking, is prosecuted for being an illegal migrant. The End Trafficking Project is the initiative to raise awareness about child trafficking and help people take action to protect children.</span><sup class="reference" data-dcnode-id="5454" id="cite_ref-Child_Trafficking_120-0"><a data-dcnode-id="5455" href="#cite_note-Child_Trafficking-120"><span data-dcnode-id="5456" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5453" instrument_node=""> The UNICEF has come up with ways to help children from child exploitation and the risk factors that need to be addressed.</span><sup class="reference" data-dcnode-id="5450" id="cite_ref-Child_Trafficking_120-1"><a data-dcnode-id="5451" href="#cite_note-Child_Trafficking-120"><span data-dcnode-id="5452" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5449" instrument_node=""> These include:
</span></p><span data-dcnode-id="5447" instrument_node="">
</span><ul data-dcnode-id="5435"><li data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Helping parents provide a living wage, so the children won't have to support the family</span></li><span data-dcnode-id="5444" instrument_node="">
</span><li data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">Lobbying governments and others to develop laws and strengthen child protection systems to prevent violence and abuse</span></li><span data-dcnode-id="5441" instrument_node="">
</span><li data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">Supporting the training of professionals working with children, and police and border officials to help stop trafficking.</span></li><span data-dcnode-id="5438" instrument_node="">
</span><li data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">Working with communities and organizations to change societal norms that make children more vulnerable to exploitation</span></li></ul><span data-dcnode-id="5434" instrument_node="">
</span><h3 data-dcnode-id="5424"><span class="mw-headline" data-dcnode-id="5432" id="Relevant_organizations"><span data-dcnode-id="5433" instrument_node="">Relevant organizations</span></span><span class="mw-editsection" data-dcnode-id="5425"><span class="mw-editsection-bracket" data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">[</span></span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D46" title="Edit section: Relevant organizations"><span data-dcnode-id="5429" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5423" instrument_node="">
