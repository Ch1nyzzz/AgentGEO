</span><p data-dcnode-id="8156"><b data-dcnode-id="8184"><span data-dcnode-id="8185" instrument_node="">Trafficking of children</span></b><span data-dcnode-id="8183" instrument_node=""> is a form of </span><a data-dcnode-id="8181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="8182" instrument_node="">human trafficking</span></a><span data-dcnode-id="8180" instrument_node=""> and is defined by the </span><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="8179" instrument_node="">United Nations</span></a><span data-dcnode-id="8177" instrument_node=""> as the "recruitment, transportation, transfer, harboring, and/or receipt" kidnapping of a child for the purpose of slavery, </span><a data-dcnode-id="8175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labour" title="Forced labour"><span data-dcnode-id="8176" instrument_node="">forced labour</span></a><span data-dcnode-id="8174" instrument_node=""> and exploitation.</span><sup class="reference" data-dcnode-id="8171" id="cite_ref-United_Nations_2000_1-0"><a data-dcnode-id="8172" href="#cite_note-United_Nations_2000-1"><span data-dcnode-id="8173" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8168"><span data-dcnode-id="8169" title="Page / location: Article 3(c)"><span data-dcnode-id="8170" instrument_node="">: Article 3(c) </span></span></sup><span data-dcnode-id="8167" instrument_node=""> This definition is substantially wider than the same document's definition of "trafficking in persons".</span><sup class="reference" data-dcnode-id="8164" id="cite_ref-United_Nations_2000_1-1"><a data-dcnode-id="8165" href="#cite_note-United_Nations_2000-1"><span data-dcnode-id="8166" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8161"><span data-dcnode-id="8162" title="Page / location: Article 3(a)"><span data-dcnode-id="8163" instrument_node="">: Article 3(a) </span></span></sup><span data-dcnode-id="8160" instrument_node=""> Children may also be trafficked for the purpose of </span><a data-dcnode-id="8158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adoption" title="Adoption"><span data-dcnode-id="8159" instrument_node="">adoption</span></a><span data-dcnode-id="8157" instrument_node="">.
</span></p><p data-dcnode-id="8119"><span data-dcnode-id="8155" instrument_node="">Though statistics regarding the magnitude of child trafficking are difficult to obtain, the </span><a data-dcnode-id="8153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Labour_Organization" title="International Labour Organization"><span data-dcnode-id="8154" instrument_node="">International Labour Organization</span></a><span data-dcnode-id="8152" instrument_node=""> (ILO) estimates that 10,000 children are trafficked each year.</span><sup class="reference" data-dcnode-id="8149" id="cite_ref-2"><a data-dcnode-id="8150" href="#cite_note-2"><span data-dcnode-id="8151" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8148" instrument_node=""> In 2012, the </span><a data-dcnode-id="8146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Office_on_Drugs_and_Crime" title="United Nations Office on Drugs and Crime"><span data-dcnode-id="8147" instrument_node="">United Nations Office on Drugs and Crime</span></a><span data-dcnode-id="8145" instrument_node=""> (UNODC) reported the percentage of child victims had risen in a 3-year span from 20 percent to 27 percent.</span><sup class="reference" data-dcnode-id="8142" id="cite_ref-3"><a data-dcnode-id="8143" href="#cite_note-3"><span data-dcnode-id="8144" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8141" instrument_node=""> Every year 300,000 children are taken from all around the world and sold by human traffickers as slaves. 28% of the 17,000 people brought to the United States are children—about 13 children per day.</span><sup class="reference" data-dcnode-id="8138" id="cite_ref-erasechildtrafficking.org_4-0"><a data-dcnode-id="8139" href="#cite_note-erasechildtrafficking.org-4"><span data-dcnode-id="8140" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8137" instrument_node=""> In 2014, research conducted by the anti-human trafficking organization </span><a data-dcnode-id="8135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thorn_%28organization%29" title="Thorn (organization)"><span data-dcnode-id="8136" instrument_node="">Thorn</span></a><span data-dcnode-id="8134" instrument_node=""> reported that internet sites like </span><a data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craigslist" title="Craigslist"><span data-dcnode-id="8133" instrument_node="">Craigslist</span></a><span data-dcnode-id="8131" instrument_node=""> are often used as tools for conducting business within the industry and that 70 percent of child sex trafficking survivors surveyed were at some point sold online.</span><sup class="reference" data-dcnode-id="8128" id="cite_ref-5"><a data-dcnode-id="8129" href="#cite_note-5"><span data-dcnode-id="8130" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8127" instrument_node=""> The trafficking of children has been internationally recognized as a serious crime that exists in every region of the world and which often has human rights implications. Yet, it is only within the past decade that the prevalence and ramifications of this practice have risen to international prominence, due to a dramatic increase in research and public action. Limited research has not yet identified all causes of child trafficking, however, it appears that poverty, humanitarian crisis, and lack of education contribute to high rates. A variety of potential solutions have accordingly been suggested and implemented, which can be categorized as four types of action: broad protection, prevention, law enforcement, and victim assistance.</span><sup class="reference" data-dcnode-id="8124" id="cite_ref-TngManualFightTrafficking-Textbk2_6-0"><a data-dcnode-id="8125" href="#cite_note-TngManualFightTrafficking-Textbk2-6"><span data-dcnode-id="8126" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="8121" id="cite_ref-Bianca_Daw_7-0"><a data-dcnode-id="8122" href="#cite_note-Bianca_Daw-7"><span data-dcnode-id="8123" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8120" instrument_node="">
</span></p><p data-dcnode-id="8108"><span data-dcnode-id="8118" instrument_node="">The main international documents dealing with the trafficking of children are the 1989 UN </span><a data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_the_Child" title="Convention on the Rights of the Child"><span data-dcnode-id="8117" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="8115" instrument_node="">, the 1999 ILO </span><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worst_Forms_of_Child_Labour_Convention" title="Worst Forms of Child Labour Convention"><span data-dcnode-id="8114" instrument_node="">Worst Forms of Child Labour Convention</span></a><span data-dcnode-id="8112" instrument_node="">, and the 2000 UN </span><a data-dcnode-id="8110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_to_Prevent%2C_Suppress_and_Punish_Trafficking_in_Persons%2C_Especially_Women_and_Children" title="Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children"><span data-dcnode-id="8111" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children</span></a><span data-dcnode-id="8109" instrument_node="">.
</span></p><span data-dcnode-id="8107" instrument_node="">

</span><h2 data-dcnode-id="7633"><span class="mw-headline" data-dcnode-id="7641" id="Definition"><span data-dcnode-id="7642" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="7634"><span class="mw-editsection-bracket" data-dcnode-id="7639"><span data-dcnode-id="7640" instrument_node="">[</span></span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="7638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7632" instrument_node="">
</span><p data-dcnode-id="7604"><span data-dcnode-id="7631" instrument_node="">The first major international instrument dealing with the trafficking of children is part of the 2000 UN </span><a data-dcnode-id="7629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palermo_protocols" title="Palermo protocols"><span data-dcnode-id="7630" instrument_node="">Palermo protocols</span></a><span data-dcnode-id="7628" instrument_node="">, titled the Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children. Article 3(a) of this document defines child trafficking as the "recruitment, transportation, transfer, harboring and/or receipt" of a child for the purpose of exploitation.</span><sup class="reference" data-dcnode-id="7625" id="cite_ref-United_Nations_2000_1-2"><a data-dcnode-id="7626" href="#cite_note-United_Nations_2000-1"><span data-dcnode-id="7627" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7624" instrument_node=""> The definition for child trafficking given here applies only to cases of trafficking that are transnational and/or involve organized criminal groups; in spite of this, child trafficking is now typically recognized well outside these parameters.</span><sup class="reference" data-dcnode-id="7621" id="cite_ref-TngManualFightTrafficking-Textbk1_8-0"><a data-dcnode-id="7622" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7623" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7620" instrument_node=""> The ILO expands upon this definition by asserting that movement and exploitation are key aspects of child trafficking.</span><sup class="reference" data-dcnode-id="7617" id="cite_ref-TngManualFightTrafficking-Textbk1_8-1"><a data-dcnode-id="7618" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7619" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7616" instrument_node=""> The definition of "child" used here is that listed in the 1989 UN Convention on the Rights of the Child which states, "a child means every human being below the age of 18 years, unless, under the law applicable to the child, majority is attained earlier."</span><sup class="reference" data-dcnode-id="7613" id="cite_ref-United_Nations_1989_9-0"><a data-dcnode-id="7614" href="#cite_note-United_Nations_1989-9"><span data-dcnode-id="7615" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7612" instrument_node=""> The distinction outlined in this definition is important, because some countries have chosen to set the "</span><a data-dcnode-id="7610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_majority" title="Age of majority"><span data-dcnode-id="7611" instrument_node="">age of majority</span></a><span data-dcnode-id="7609" instrument_node="">" lower than 18, thus influencing what exactly legally constitutes child trafficking.</span><sup class="reference" data-dcnode-id="7606" id="cite_ref-TngManualFightTrafficking-Textbk1_8-2"><a data-dcnode-id="7607" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7608" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7605" instrument_node="">
</span></p><span data-dcnode-id="7603" instrument_node="">
</span><h3 data-dcnode-id="7593"><span class="mw-headline" data-dcnode-id="7601" id="Related_legal_instruments"><span data-dcnode-id="7602" instrument_node="">Related legal instruments</span></span><span class="mw-editsection" data-dcnode-id="7594"><span class="mw-editsection-bracket" data-dcnode-id="7599"><span data-dcnode-id="7600" instrument_node="">[</span></span><a data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D2" title="Edit section: Related legal instruments"><span data-dcnode-id="7598" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7595"><span data-dcnode-id="7596" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7592" instrument_node="">
</span><p data-dcnode-id="7586"><span data-dcnode-id="7591" instrument_node="">Many international, regional, and national instruments deal with the trafficking of children. These instruments are used to define what legally constitutes trafficking of children, such that appropriate legal action can be taken against those who engage in and promote this practice. These legal instruments are called by a variety of terms, including conventions, protocols, memorandums, joint actions, recommendations, and declarations. The most significant instruments are listed below:</span><sup class="reference" data-dcnode-id="7588" id="cite_ref-TngManualFightTrafficking-Textbk1_8-3"><a data-dcnode-id="7589" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7590" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7587" instrument_node="">
</span></p><span data-dcnode-id="7585" instrument_node="">
</span><h4 data-dcnode-id="7575"><span class="mw-headline" data-dcnode-id="7583" id="International_human_rights_instruments"><span data-dcnode-id="7584" instrument_node="">International human rights instruments</span></span><span class="mw-editsection" data-dcnode-id="7576"><span class="mw-editsection-bracket" data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">[</span></span><a data-dcnode-id="7579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D3" title="Edit section: International human rights instruments"><span data-dcnode-id="7580" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7577"><span data-dcnode-id="7578" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7574" instrument_node="">
</span><p data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">These legal instruments were developed by the UN in an effort to protect international human rights and, more specifically, children's rights.
</span></p><span data-dcnode-id="7571" instrument_node="">
</span><ul data-dcnode-id="7555"><li data-dcnode-id="7564"><a data-dcnode-id="7569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="7570" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="7568" instrument_node="">, 1948</span><sup class="reference" data-dcnode-id="7565" id="cite_ref-10"><a data-dcnode-id="7566" href="#cite_note-10"><span data-dcnode-id="7567" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="7563" instrument_node="">
</span><li data-dcnode-id="7556"><a data-dcnode-id="7561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_the_Child" title="Convention on the Rights of the Child"><span data-dcnode-id="7562" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="7560" instrument_node="">, 1989</span><sup class="reference" data-dcnode-id="7557" id="cite_ref-United_Nations_1989_9-1"><a data-dcnode-id="7558" href="#cite_note-United_Nations_1989-9"><span data-dcnode-id="7559" instrument_node="">[9]</span></a></sup></li></ul><span data-dcnode-id="7554" instrument_node="">
</span><h4 data-dcnode-id="7544"><span class="mw-headline" data-dcnode-id="7552" id="Labour_and_migration_treaties"><span data-dcnode-id="7553" instrument_node="">Labour and migration treaties</span></span><span class="mw-editsection" data-dcnode-id="7545"><span class="mw-editsection-bracket" data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">[</span></span><a data-dcnode-id="7548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D4" title="Edit section: Labour and migration treaties"><span data-dcnode-id="7549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7543" instrument_node="">
</span><p data-dcnode-id="7541"><span data-dcnode-id="7542" instrument_node="">The trafficking of children often involves both labour and migration. As such, these international frameworks clarify instances in which these practices are illegal.
</span></p><span data-dcnode-id="7540" instrument_node="">
</span><ul data-dcnode-id="7491"><li data-dcnode-id="7533"><span data-dcnode-id="7539" instrument_node="">ILO </span><a data-dcnode-id="7537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimum_Age_Convention%2C_1973" title="Minimum Age Convention, 1973"><span data-dcnode-id="7538" instrument_node="">Minimum Age Convention, 1973</span></a><sup class="reference" data-dcnode-id="7534" id="cite_ref-min_age_conv_1973_11-0"><a data-dcnode-id="7535" href="#cite_note-min_age_conv_1973-11"><span data-dcnode-id="7536" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="7532" instrument_node="">
</span><li data-dcnode-id="7514"><span data-dcnode-id="7531" instrument_node="">ILO </span><a data-dcnode-id="7529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worst_Forms_of_Child_Labour_Convention" title="Worst Forms of Child Labour Convention"><span data-dcnode-id="7530" instrument_node="">Worst Forms of Child Labour Convention</span></a><span data-dcnode-id="7528" instrument_node="">, 1999</span><sup class="reference" data-dcnode-id="7525" id="cite_ref-12"><a data-dcnode-id="7526" href="#cite_note-12"><span data-dcnode-id="7527" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7524" instrument_node="">
</span><ul data-dcnode-id="7515"><li data-dcnode-id="7516"><span data-dcnode-id="7523" instrument_node="">ILO </span><a data-dcnode-id="7521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worst_Forms_of_Child_Labour_Recommendation" title="Worst Forms of Child Labour Recommendation"><span data-dcnode-id="7522" instrument_node="">Worst Forms of Child Labour Recommendation</span></a><span data-dcnode-id="7520" instrument_node=""> No. 190, 1999</span><sup class="reference" data-dcnode-id="7517" id="cite_ref-13"><a data-dcnode-id="7518" href="#cite_note-13"><span data-dcnode-id="7519" instrument_node="">[13]</span></a></sup></li></ul></li><span data-dcnode-id="7513" instrument_node="">

</span><p data-dcnode-id="7443"><span data-dcnode-id="7448" instrument_node="">A variety of regional instruments have also been developed to guide countries in decisions regarding child trafficking. Below are some of the major instruments, though many others exist:</span><sup class="reference" data-dcnode-id="7445" id="cite_ref-TngManualFightTrafficking-Textbk1_8-4"><a data-dcnode-id="7446" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7447" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7444" instrument_node="">
</span></p><span data-dcnode-id="7442" instrument_node="">
</span><ul data-dcnode-id="7425"><li data-dcnode-id="7435"><a data-dcnode-id="7440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Europe" title="Council of Europe"><span data-dcnode-id="7441" instrument_node="">Council of Europe</span></a><span data-dcnode-id="7439" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_Action_against_Trafficking_in_Human_Beings" title="Convention on Action against Trafficking in Human Beings"><span data-dcnode-id="7438" instrument_node="">Convention on Action against Trafficking in Human Beings</span></a><span data-dcnode-id="7436" instrument_node=""> (Treaty series No.197), 2005</span></li><span data-dcnode-id="7434" instrument_node="">
</span><li data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">Communication to the European Parliament and the Council, COM(2005) 514 Final</span></li><span data-dcnode-id="7431" instrument_node="">
</span><li data-dcnode-id="7429"><span data-dcnode-id="7430" instrument_node="">Multilateral cooperation agreement to combat trafficking in persons, especially women and children, in West and Central Africa, 2006</span></li><span data-dcnode-id="7428" instrument_node="">
</span><li data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">Mekong sub regional cooperation agreement to fight human trafficking (COMMIT), 2004</span></li></ul><span data-dcnode-id="7424" instrument_node="">
</span><h4 data-dcnode-id="7414"><span class="mw-headline" data-dcnode-id="7422" id="National_law"><span data-dcnode-id="7423" instrument_node="">National law</span></span><span class="mw-editsection" data-dcnode-id="7415"><span class="mw-editsection-bracket" data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">[</span></span><a data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D7" title="Edit section: National law"><span data-dcnode-id="7419" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7416"><span data-dcnode-id="7417" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7413" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7404" role="note"><span data-dcnode-id="7410" instrument_node="">See also: </span><a data-dcnode-id="7408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_the_United_States" title="Human trafficking in the United States"><span data-dcnode-id="7409" instrument_node="">Human trafficking in the United States</span></a><span data-dcnode-id="7407" instrument_node=""> and </span><a data-dcnode-id="7405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking_in_the_United_Kingdom" title="Human trafficking in the United Kingdom"><span data-dcnode-id="7406" instrument_node="">Human trafficking in the United Kingdom</span></a></div><span data-dcnode-id="7403" instrument_node="">
</span><p data-dcnode-id="7390"><span data-dcnode-id="7402" instrument_node="">National laws pertaining to child trafficking continue to develop worldwide, based on the international principles that have been established. Anti-trafficking legislation has been lauded as critical by the </span><a data-dcnode-id="7400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Global_Initiative_to_Fight_Human_Trafficking" title="United Nations Global Initiative to Fight Human Trafficking"><span data-dcnode-id="7401" instrument_node="">United Nations Global Initiative to Fight Human Trafficking</span></a><span data-dcnode-id="7399" instrument_node="">, because it ensures that traffickers and trafficking victims are treated accordingly: for example, "if migration laws are used to pursue traffickers, it is often the case that the victims too are prosecuted as illegal migrants, whereas if there is a specific category of 'trafficker' and 'trafficked person,' then it is more likely that the victim will be treated as such."</span><sup class="reference" data-dcnode-id="7396" id="cite_ref-TngManualFightTrafficking-Textbk1_8-5"><a data-dcnode-id="7397" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7398" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7395" instrument_node=""> The existence of national laws regarding child trafficking also enables trafficking victims and/or their families to take appropriate civil action.</span><sup class="reference" data-dcnode-id="7392" id="cite_ref-TngManualFightTrafficking-Textbk1_8-6"><a data-dcnode-id="7393" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7394" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7391" instrument_node="">
</span></p><span data-dcnode-id="7389" instrument_node="">
</span><h2 data-dcnode-id="7379"><span class="mw-headline" data-dcnode-id="7387" id="Types_of_child_trafficking"><span data-dcnode-id="7388" instrument_node="">Types of child trafficking</span></span><span class="mw-editsection" data-dcnode-id="7380"><span class="mw-editsection-bracket" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">[</span></span><a data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D8" title="Edit section: Types of child trafficking"><span data-dcnode-id="7384" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7378" instrument_node="">
</span><p data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">The intended or actual after-sale use of the child is not always known.
</span></p><span data-dcnode-id="7375" instrument_node="">
</span><h3 data-dcnode-id="7365"><span class="mw-headline" data-dcnode-id="7373" id="Forced_labour"><span data-dcnode-id="7374" instrument_node="">Forced labour</span></span><span class="mw-editsection" data-dcnode-id="7366"><span class="mw-editsection-bracket" data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">[</span></span><a data-dcnode-id="7369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D9" title="Edit section: Forced labour"><span data-dcnode-id="7370" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7367"><span data-dcnode-id="7368" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7364" instrument_node="">
</span><link data-dcnode-id="7363" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7359" role="note"><span data-dcnode-id="7362" instrument_node="">See also: </span><a data-dcnode-id="7360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labour" title="Child labour"><span data-dcnode-id="7361" instrument_node="">Child labour</span></a></div><span data-dcnode-id="7358" instrument_node="">
</span><p data-dcnode-id="7325"><span data-dcnode-id="7357" instrument_node="">The objective of child trafficking is often forced child labour.</span><sup class="reference" data-dcnode-id="7354" id="cite_ref-TngManualFightTrafficking-Textbk1_8-7"><a data-dcnode-id="7355" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7356" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7353" instrument_node=""> </span><a data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNICEF" title="UNICEF"><span data-dcnode-id="7352" instrument_node="">UNICEF</span></a><span data-dcnode-id="7350" instrument_node=""> estimates that, in 2011, 150 million children aged 5–14 in developing countries were involved in child labour.</span><sup class="reference" data-dcnode-id="7347" id="cite_ref-18"><a data-dcnode-id="7348" href="#cite_note-18"><span data-dcnode-id="7349" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7346" instrument_node=""> Additionally, UNICEF states that current rates indicate that at least 100 million children will still be forced to work by 2020.</span><sup class="reference" data-dcnode-id="7343" id="cite_ref-19"><a data-dcnode-id="7344" href="#cite_note-19"><span data-dcnode-id="7345" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7342" instrument_node=""> Within this number, the ILO reports that 60% of child workers work in agriculture.</span><sup class="reference" data-dcnode-id="7339" id="cite_ref-ILO_2010_20-0"><a data-dcnode-id="7340" href="#cite_note-ILO_2010-20"><span data-dcnode-id="7341" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7338" instrument_node=""> A comparative study between domestic child labour rates in urban and rural regions in sub-Saharan Africa reveals that 84.3% of child labourers are working in the rural sector. 99.8% of children age five to fourteen are engaged in child labour for some form of economic activity in these regions.</span><sup class="reference" data-dcnode-id="7335" id="cite_ref-:12_21-0"><a data-dcnode-id="7336" href="#cite_note-:12-21"><span data-dcnode-id="7337" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7334" instrument_node=""> The ILO also estimates that 115 million children are engaged in hazardous work, such as the sex or drug trade.</span><sup class="reference" data-dcnode-id="7331" id="cite_ref-ILO_2010_20-1"><a data-dcnode-id="7332" href="#cite_note-ILO_2010-20"><span data-dcnode-id="7333" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7330" instrument_node=""> Overall, child labour can take many forms, including domestic servitude, work in agriculture, service, and manufacturing industries. Also, according to several researchers, most children are forced into cheap and controllable labour, and work in homes, farms, factories, restaurants, and much more.</span><sup class="reference" data-dcnode-id="7327" id="cite_ref-FOOTNOTEBeyrer200416GozdziakMacDonnell2007171Vinkovic201088_22-0"><a data-dcnode-id="7328" href="#cite_note-FOOTNOTEBeyrer200416GozdziakMacDonnell2007171Vinkovic201088-22"><span data-dcnode-id="7329" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7326" instrument_node=""> Children are cheap labour and additionally are able to complete jobs that adults cannot due to their size. One example for this is within the fishing industry in Ghana. Children can release fish easier from nets due to their small hands. Thereby their services are highly demanded and child labour remains a present consequence of child trafficking.
</span></p><p data-dcnode-id="7296"><span data-dcnode-id="7324" instrument_node="">Trafficked children may be sexually exploited, used in the armed forces and drug trades, and in child begging.</span><sup class="reference" data-dcnode-id="7321" id="cite_ref-TngManualFightTrafficking-Textbk1_8-8"><a data-dcnode-id="7322" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="7323" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7320" instrument_node=""> In terms of global trends, the ILO estimates that in 2004–2008, there was a 3% reduction in the incidence of child labour; this stands in contrast to a previous ILO report which found that in 2000–2004, there was a 10% reduction in child labour.</span><sup class="reference" data-dcnode-id="7317" id="cite_ref-ILO_2010_20-2"><a data-dcnode-id="7318" href="#cite_note-ILO_2010-20"><span data-dcnode-id="7319" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7316" instrument_node=""> The ILO contends that, globally, child labour is slowly declining, except in sub-Saharan Africa, where the number of child workers has remained relatively constant: 1 in 4 children aged 5–17 work in this region.</span><sup class="reference" data-dcnode-id="7313" id="cite_ref-ILO_2010_20-3"><a data-dcnode-id="7314" href="#cite_note-ILO_2010-20"><span data-dcnode-id="7315" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7312" instrument_node=""> In 2018 UNICEF reported that 31% of total </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labour_in_Africa" title="Child labour in Africa"><span data-dcnode-id="7311" instrument_node="">child labour</span></a><span data-dcnode-id="7309" instrument_node=""> is located in West Africa. In this region, one in six children between the ages of six and fourteen is working. The report additionally finds that 43% of child labour in Sub-Saharan Africa is due to child migration and trafficking.</span><sup class="reference" data-dcnode-id="7306" id="cite_ref-23"><a data-dcnode-id="7307" href="#cite_note-23"><span data-dcnode-id="7308" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7305" instrument_node=""> Another major global trend concerns the number of child labourers in the 15–17 age group: in the past five years, a 20% increase in the number of these child workers has been reported.</span><sup class="reference" data-dcnode-id="7302" id="cite_ref-ILO_2010_20-4"><a data-dcnode-id="7303" href="#cite_note-ILO_2010-20"><span data-dcnode-id="7304" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7301" instrument_node=""> A surprising example occurred in the United States as McCabe indicates that in the 1990s, huge companies such as Gap and Nike were using industry "sweatshops" that used trafficked children to make their desired products.</span><sup class="reference" data-dcnode-id="7298" id="cite_ref-24"><a data-dcnode-id="7299" href="#cite_note-24"><span data-dcnode-id="7300" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7297" instrument_node=""> After further investigation of the child labour scandal the hazardous work conditions of the GAP company factories were exposed. Children were working in run-down and dangerous factories, were victims of abuse and got paid far below minimum wage. In the years that followed similar scandals were revealed in other parts of Asia and Africa.
</span></p><p data-dcnode-id="7290"><span data-dcnode-id="7295" instrument_node="">Responding to these cases members of the Secretary-General of the United Nations attempted to reduce the number of violations within corporate systems in 2011 by implementing the United Nations "Protect, Respect and Remedy" Framework, a report stating the guiding principles on transnational corporations and other business enterprises and human rights. Endorsed in Resolution 17/4 by the Human Rights Council on June 16, 2011, the report outlines three main principles. 1) The state's existing obligation to respect, protect and fulfill human rights and fundamental freedoms, 2) the role of business enterprises as specialized organs of society performing specialized functions, required to comply with all applicable laws and to respect human rights, and 3) the need for rights and obligations to be matched to appropriate and effective remedies when breached. The resolution attempted to establish a universal understanding of appropriate employment conditions and stated punishments for those firms who violate the guiding principles. In addition, research regarding the lasting consequences for labour whose rights were violated were revealed. Yet in 2018 it was found that still, 218million children are working full-time, many of which are employed by factory owners to lower production costs.</span><sup class="reference" data-dcnode-id="7292" id="cite_ref-25"><a data-dcnode-id="7293" href="#cite_note-25"><span data-dcnode-id="7294" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7291" instrument_node="">
</span></p><span data-dcnode-id="7289" instrument_node="">
</span><h3 data-dcnode-id="7279"><span class="mw-headline" data-dcnode-id="7287" id="Sexual_exploitation"><span data-dcnode-id="7288" instrument_node="">Sexual exploitation</span></span><span class="mw-editsection" data-dcnode-id="7280"><span class="mw-editsection-bracket" data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">[</span></span><a data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D10" title="Edit section: Sexual exploitation"><span data-dcnode-id="7284" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7281"><span data-dcnode-id="7282" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7278" instrument_node="">

</span><li data-dcnode-id="6978"><a class="image" data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJohnny-automatic-scales-of-justice.svg"><img alt="Johnny-automatic-scales-of-justice.svg" class="noviewer" data-dcnode-id="6983" data-file-height="442" data-file-width="512" decoding="async" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Johnny-automatic-scales-of-justice.svg/32px-Johnny-automatic-scales-of-justice.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Johnny-automatic-scales-of-justice.svg/48px-Johnny-automatic-scales-of-justice.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Johnny-automatic-scales-of-justice.svg/64px-Johnny-automatic-scales-of-justice.svg.png 2x" width="32"></a><span data-dcnode-id="6981" instrument_node="">&nbsp;</span><a data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3ALaw" title="Portal:Law"><span data-dcnode-id="6980" instrument_node="">Law portal</span></a></li></ul></td></tr><tr data-dcnode-id="6957"><td class="sidebar-navbar" data-dcnode-id="6958" style="border-top:1px solid #bbb;"><link data-dcnode-id="6973" href="mw-data:TemplateStyles:r1063604349" rel="mw-deduplicated-inline-style"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="6959"><ul data-dcnode-id="6960"><li class="nv-view" data-dcnode-id="6969"><a data-dcnode-id="6970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ASex_and_the_law" title="Template:Sex and the law"><abbr data-dcnode-id="6971" title="View this template"><span data-dcnode-id="6972" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="6965"><a data-dcnode-id="6966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3ASex_and_the_law" title="Template talk:Sex and the law"><abbr data-dcnode-id="6967" title="Discuss this template"><span data-dcnode-id="6968" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="6961"><a class="external text" data-dcnode-id="6962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ASex_and_the_law%26action%3Dedit"><abbr data-dcnode-id="6963" title="Edit this template"><span data-dcnode-id="6964" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="6954" instrument_node="">
</span><p data-dcnode-id="6934"><span data-dcnode-id="6953" instrument_node="">The </span><a data-dcnode-id="6951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optional_Protocol_on_the_Sale_of_Children%2C_Child_Prostitution_and_Child_Pornography" title="Optional Protocol on the Sale of Children, Child Prostitution and Child Pornography"><span data-dcnode-id="6952" instrument_node="">Optional Protocol on the Sale of Children, Child Prostitution and Child Pornography</span></a><span data-dcnode-id="6950" instrument_node=""> is a protocol of the Convention on the Rights of the Child, formally adopted by the UN in 2000.</span><sup class="reference" data-dcnode-id="6947" id="cite_ref-www2.ohchr.org_26-0"><a data-dcnode-id="6948" href="#cite_note-www2.ohchr.org-26"><span data-dcnode-id="6949" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6946" instrument_node=""> Essentially, this protocol formally requires states to prohibit the sale of children, </span><a data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_prostitution" title="Child prostitution"><span data-dcnode-id="6945" instrument_node="">child prostitution</span></a><span data-dcnode-id="6943" instrument_node="">, and child pornography.</span><sup class="reference" data-dcnode-id="6940" id="cite_ref-www2.ohchr.org_26-1"><a data-dcnode-id="6941" href="#cite_note-www2.ohchr.org-26"><span data-dcnode-id="6942" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6939" instrument_node=""> According to the ILO, sexual exploitation of children includes all of the following practices and activities:</span><sup class="reference" data-dcnode-id="6936" id="cite_ref-27"><a data-dcnode-id="6937" href="#cite_note-27"><span data-dcnode-id="6938" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6935" instrument_node="">
</span></p><span data-dcnode-id="6933" instrument_node="">
</span><ul data-dcnode-id="6918"><li data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">"The use of girls and boys in sexual activities remunerated in cash or in kind (commonly known as child prostitution) in the streets or indoors, in such places as brothels, discotheques, massage parlours, bars, hotels, restaurants, etc."</span></li><span data-dcnode-id="6930" instrument_node="">
</span><li data-dcnode-id="6928"><span data-dcnode-id="6929" instrument_node="">"The trafficking of girls and boys and adolescents for the sex trade"</span></li><span data-dcnode-id="6927" instrument_node="">
</span><li data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">"Child sex tourism"</span></li><span data-dcnode-id="6924" instrument_node="">
</span><li data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">"The production, promotion and distribution of pornography involving children"</span></li><span data-dcnode-id="6921" instrument_node="">
</span><li data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">"The use of children in sex shows (public or private)"</span></li></ul><span data-dcnode-id="6917" instrument_node="">
</span><p data-dcnode-id="6879"><span data-dcnode-id="6916" instrument_node="">Though measuring the extent of this practice is difficult due to its criminal and covert nature, the ILO estimates that there are as many as 1.8 million children sexually trafficked worldwide, while UNICEF's 2006 State of the World's Children Report reports this number to be 2 million.</span><sup class="reference" data-dcnode-id="6913" id="cite_ref-ILO_28-0"><a data-dcnode-id="6914" href="#cite_note-ILO-28"><span data-dcnode-id="6915" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="6910" id="cite_ref-29"><a data-dcnode-id="6911" href="#cite_note-29"><span data-dcnode-id="6912" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6909" instrument_node=""> The ILO has found that girls involved in other forms of child labour—such as domestic service or street vending—are at the highest risk of being pulled into commercial child sex trafficking.</span><sup class="reference" data-dcnode-id="6906" id="cite_ref-ILO_28-1"><a data-dcnode-id="6907" href="#cite_note-ILO-28"><span data-dcnode-id="6908" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6905" instrument_node=""> Likewise, Kendall and Funk justifies how "young girls age 12 and under are malleable and more easily trained into their prospective roles as prostitutes, and because virginity is highly prized by certain consumers willing to pay a premium".</span><sup class="reference" data-dcnode-id="6902" id="cite_ref-FOOTNOTEKendallFunk201231_30-0"><a data-dcnode-id="6903" href="#cite_note-FOOTNOTEKendallFunk201231-30"><span data-dcnode-id="6904" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6901" instrument_node=""> A variety of sources, including the ILO and scholars Erin Kunze and D.M. Hughes, also contend that the increased use and availability of the Internet has served as a major resource for traffickers, ultimately increasing the incidence of child sex trafficking.</span><sup class="reference" data-dcnode-id="6898" id="cite_ref-ILO_28-2"><a data-dcnode-id="6899" href="#cite_note-ILO-28"><span data-dcnode-id="6900" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="6895" id="cite_ref-31"><a data-dcnode-id="6896" href="#cite_note-31"><span data-dcnode-id="6897" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="6892" id="cite_ref-32"><a data-dcnode-id="6893" href="#cite_note-32"><span data-dcnode-id="6894" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6891" instrument_node=""> In fact, in 2009, Illinois Sheriff Thomas J. Dart sued the owners of Craigslist, a popular online classifieds website, for its "allowance" and "facilitation" of prostitution, particularly in children.</span><sup class="reference" data-dcnode-id="6888" id="cite_ref-33"><a data-dcnode-id="6889" href="#cite_note-33"><span data-dcnode-id="6890" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="6885" id="cite_ref-34"><a data-dcnode-id="6886" href="#cite_note-34"><span data-dcnode-id="6887" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6884" instrument_node=""> In response to public and legal pressure, Craigslist has since blocked all access to its "Adult Services" section.</span><sup class="reference" data-dcnode-id="6881" id="cite_ref-35"><a data-dcnode-id="6882" href="#cite_note-35"><span data-dcnode-id="6883" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6880" instrument_node="">
</span></p><span data-dcnode-id="6878" instrument_node="">
</span><h3 data-dcnode-id="6868"><span class="mw-headline" data-dcnode-id="6876" id="Children_in_armed_forces"><span data-dcnode-id="6877" instrument_node="">Children in armed forces</span></span><span class="mw-editsection" data-dcnode-id="6869"><span class="mw-editsection-bracket" data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">[</span></span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D11" title="Edit section: Children in armed forces"><span data-dcnode-id="6873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6867" instrument_node="">
</span><link data-dcnode-id="6866" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6862" role="note"><span data-dcnode-id="6865" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="6863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_use_of_children" title="Military use of children"><span data-dcnode-id="6864" instrument_node="">Military use of children</span></a></div><span data-dcnode-id="6861" instrument_node="">
</span><p data-dcnode-id="6837"><span data-dcnode-id="6860" instrument_node="">The </span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optional_Protocol_on_the_Involvement_of_Children_in_Armed_Conflict" title="Optional Protocol on the Involvement of Children in Armed Conflict"><span data-dcnode-id="6859" instrument_node="">Optional Protocol on the Involvement of Children in Armed Conflict</span></a><span data-dcnode-id="6857" instrument_node=""> is a protocol of the Convention on the Rights of the Child, formally adopted by the UN in 2000.</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-http_36-0"><a data-dcnode-id="6855" href="#cite_note-http-36"><span data-dcnode-id="6856" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> Essentially, the protocol states that while volunteers below the age of 18 can voluntarily join the armed forces, they cannot be conscripted. As the protocol reads, "State parties shall take all feasible measures to ensure that member of their armed forces who have not attained the age of 18 years do not take a direct part in hostilities."</span><sup class="reference" data-dcnode-id="6850" id="cite_ref-http_36-1"><a data-dcnode-id="6851" href="#cite_note-http-36"><span data-dcnode-id="6852" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6849" instrument_node=""> Despite this, the ILO estimates that "tens of thousands" of girls and boys are currently forcibly enlisted in the armed forces in at least 17 countries around the world.</span><sup class="reference" data-dcnode-id="6846" id="cite_ref-ilo.org_37-0"><a data-dcnode-id="6847" href="#cite_note-ilo.org-37"><span data-dcnode-id="6848" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6845" instrument_node=""> Children conscripted into the armed forces can then be used in three distinct ways:</span><sup class="reference" data-dcnode-id="6842" id="cite_ref-38"><a data-dcnode-id="6843" href="#cite_note-38"><span data-dcnode-id="6844" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="6839" id="cite_ref-Coalition_39-0"><a data-dcnode-id="6840" href="#cite_note-Coalition-39"><span data-dcnode-id="6841" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6838" instrument_node="">
</span></p><span data-dcnode-id="6836" instrument_node="">
</span><ul data-dcnode-id="6827"><li data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">Direct roles in hostilities (combat roles)</span></li><span data-dcnode-id="6833" instrument_node="">
</span><li data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">Supporting roles (such as messengers or spies)</span></li><span data-dcnode-id="6830" instrument_node="">
</span><li data-dcnode-id="6828"><span data-dcnode-id="6829" instrument_node="">For political advantage (such as for propaganda purposes)</span></li></ul><span data-dcnode-id="6826" instrument_node="">
</span><p data-dcnode-id="6804"><span data-dcnode-id="6825" instrument_node="">Recent research conducted by the </span><a class="mw-redirect" data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coalition_to_Stop_the_Use_of_Child_Soldiers" title="Coalition to Stop the Use of Child Soldiers"><span data-dcnode-id="6824" instrument_node="">Coalition to Stop the Use of Child Soldiers</span></a><span data-dcnode-id="6822" instrument_node=""> has also noted that girl soldiers must be uniquely recognized, in that they are especially vulnerable to acts of sexual violence.</span><sup class="reference" data-dcnode-id="6819" id="cite_ref-Coalition_39-1"><a data-dcnode-id="6820" href="#cite_note-Coalition-39"><span data-dcnode-id="6821" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6818" instrument_node=""> The incidence of </span><a class="mw-redirect" data-dcnode-id="6816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_use_of_children" title="Military use of children"><span data-dcnode-id="6817" instrument_node="">child soldiers</span></a><span data-dcnode-id="6815" instrument_node=""> was the focus of the </span><a data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kony_2012" title="Kony 2012"><span data-dcnode-id="6814" instrument_node="">Kony 2012</span></a><span data-dcnode-id="6812" instrument_node=""> movement, that aimed to arrest </span><a data-dcnode-id="6810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Kony" title="Joseph Kony"><span data-dcnode-id="6811" instrument_node="">Joseph Kony</span></a><span data-dcnode-id="6809" instrument_node="">, a Ugandan war criminal who is responsible for the trafficking of thousands of child soldiers and sex slaves.</span><sup class="reference" data-dcnode-id="6806" id="cite_ref-warrants_40-0"><a data-dcnode-id="6807" href="#cite_note-warrants-40"><span data-dcnode-id="6808" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6805" instrument_node="">
</span></p><span data-dcnode-id="6803" instrument_node="">
</span><h3 data-dcnode-id="6793"><span class="mw-headline" data-dcnode-id="6801" id="Children_in_drug_trades"><span data-dcnode-id="6802" instrument_node="">Children in drug trades</span></span><span class="mw-editsection" data-dcnode-id="6794"><span class="mw-editsection-bracket" data-dcnode-id="6799"><span data-dcnode-id="6800" instrument_node="">[</span></span><a data-dcnode-id="6797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D12" title="Edit section: Children in drug trades"><span data-dcnode-id="6798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6795"><span data-dcnode-id="6796" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6792" instrument_node="">
</span><p data-dcnode-id="6767"><span data-dcnode-id="6791" instrument_node="">Children are also used in drug trades in all regions of the world.</span><sup class="reference" data-dcnode-id="6788" id="cite_ref-TngManualFightTrafficking-Textbk1_8-9"><a data-dcnode-id="6789" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6790" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6787" instrument_node=""> Specifically, children are often trafficked into exploitation as either drug couriers or dealers, and then 'paid' in drugs, such that they become addicted and further entrapped.</span><sup class="reference" data-dcnode-id="6784" id="cite_ref-TngManualFightTrafficking-Textbk1_8-10"><a data-dcnode-id="6785" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6786" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6783" instrument_node=""> Due to the illicit nature of drug trafficking, children who are apprehended are often treated as criminals, when in reality they are often the ones in need of legal assistance.</span><sup class="reference" data-dcnode-id="6780" id="cite_ref-TngManualFightTrafficking-Textbk1_8-11"><a data-dcnode-id="6781" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6782" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6779" instrument_node=""> While comprehensive worldwide statistics regarding the prevalence of this practice are unknown, several useful regional studies have been conducted. For example, the ILO has investigated the use of Afghan children in the heroin trade and child involvement in the drug trades of Brazil.</span><sup class="reference" data-dcnode-id="6776" id="cite_ref-41"><a data-dcnode-id="6777" href="#cite_note-41"><span data-dcnode-id="6778" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="6773" id="cite_ref-42"><a data-dcnode-id="6774" href="#cite_note-42"><span data-dcnode-id="6775" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6772" instrument_node=""> Scholar Luke Dowdney specifically studied children in the drug trade in Rio de Janeiro, Brazil; he found that children involved in the drug trades are at significantly higher risk of engaging in violence, particularly murder.</span><sup class="reference" data-dcnode-id="6769" id="cite_ref-43"><a data-dcnode-id="6770" href="#cite_note-43"><span data-dcnode-id="6771" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6768" instrument_node="">
</span></p><span data-dcnode-id="6766" instrument_node="">
</span><h3 data-dcnode-id="6756"><span class="mw-headline" data-dcnode-id="6764" id="Adoption"><span data-dcnode-id="6765" instrument_node="">Adoption</span></span><span class="mw-editsection" data-dcnode-id="6757"><span class="mw-editsection-bracket" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">[</span></span><a data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D13" title="Edit section: Adoption"><span data-dcnode-id="6761" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6755" instrument_node="">
</span><p data-dcnode-id="6746"><span data-dcnode-id="6754" instrument_node="">Children may be trafficked for the purposes of adoption, particularly international adoption. Children are sourced from orphanages or kidnapped, or parents may be tricked, cajoled or coerced into relinquishing custody.</span><sup class="reference" data-dcnode-id="6751" id="cite_ref-44"><a data-dcnode-id="6752" href="#cite_note-44"><span data-dcnode-id="6753" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="6748" id="cite_ref-45"><a data-dcnode-id="6749" href="#cite_note-45"><span data-dcnode-id="6750" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6747" instrument_node="">
</span></p><p data-dcnode-id="6737"><span data-dcnode-id="6745" instrument_node="">Disreputable international adoption agencies then arrange international adoptions, charging high fees to prospective adoptive parents.</span><sup class="reference" data-dcnode-id="6742" id="cite_ref-46"><a data-dcnode-id="6743" href="#cite_note-46"><span data-dcnode-id="6744" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="6739" id="cite_ref-47"><a data-dcnode-id="6740" href="#cite_note-47"><span data-dcnode-id="6741" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6738" instrument_node=""> The Hague Convention on the Protection of Children and Cooperation in regard to Intercountry Adoption is an international agreement designed to protect children from such exploitation and to assist in preventing such illegal intercountry adoptions.
</span></p><span data-dcnode-id="6736" instrument_node="">
</span><h3 data-dcnode-id="6726"><span class="mw-headline" data-dcnode-id="6734" id="Child_begging"><span data-dcnode-id="6735" instrument_node="">Child begging</span></span><span class="mw-editsection" data-dcnode-id="6727"><span class="mw-editsection-bracket" data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">[</span></span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D14" title="Edit section: Child begging"><span data-dcnode-id="6731" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6725" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6714"><div class="thumbinner" data-dcnode-id="6715" style="width:322px;"><a class="image" data-dcnode-id="6723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChild-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg"><img alt="" class="thumbimage" data-dcnode-id="6724" data-file-height="3216" data-file-width="4288" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg/320px-Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg/480px-Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg/640px-Child-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg 2x" width="320"></a><span data-dcnode-id="6722" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6716"><div class="magnify" data-dcnode-id="6720"><a class="internal" data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChild-Beggers-Niger-Africa-Muntaka-Chasant-Wikipedia.jpg" title="Enlarge"></a></div><span data-dcnode-id="6719" instrument_node="">Forced child beggars in </span><a data-dcnode-id="6717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niger" title="Niger"><span data-dcnode-id="6718" instrument_node="">Niger</span></a></div></div></div><span data-dcnode-id="6713" instrument_node="">
</span><p data-dcnode-id="6676"><span data-dcnode-id="6712" instrument_node="">Forced child begging is a type of begging in which boys and girls under the age of eighteen are forced to beg through psychological and physical coercion.</span><sup class="reference" data-dcnode-id="6709" id="cite_ref-Delap,_Emily_2009_48-0"><a data-dcnode-id="6710" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6711" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6708" instrument_node=""> Begging is defined by the Buffalo Human Rights Law Review as "the activity of asking for money as charity on the street".</span><sup class="reference" data-dcnode-id="6705" id="cite_ref-Cherneva,_Iveta_2011_49-0"><a data-dcnode-id="6706" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6707" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6704" instrument_node=""> There is evidence to suggest that forced begging is one industry that children are trafficked into, with a recent UNICEF study reporting that 13% of trafficking victims in South Eastern Europe have been trafficked for the purpose of forced begging.</span><sup class="reference" data-dcnode-id="6701" id="cite_ref-Cherneva,_Iveta_2011_49-1"><a data-dcnode-id="6702" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6703" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6700" instrument_node=""> The UN protocol affirms that "the recruitment, transportation, transfer, harboring or receipt of a child for the purpose of exploitation shall be considered 'trafficking in persons' even if this does not involve any of the means set forth in subparagraph (a) of this article."</span><sup class="reference" data-dcnode-id="6697" id="cite_ref-Cherneva,_Iveta_2011_49-2"><a data-dcnode-id="6698" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6699" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6696" instrument_node=""> With this definition the transportation of a child to an urban center for the purposes of begging constitutes trafficking regardless of whether this process was enforced by a third party or family member.</span><sup class="reference" data-dcnode-id="6693" id="cite_ref-Delap,_Emily_2009_48-1"><a data-dcnode-id="6694" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6695" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6692" instrument_node=""> The severity of this form of trafficking is starting to gain global recognition, with the International Organization for Migration (IOM), the </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6691" instrument_node="">European Union</span></a><span data-dcnode-id="6689" instrument_node="">, the ILO, and the UN, among others, beginning to emphasize its pertinence.</span><sup class="reference" data-dcnode-id="6686" id="cite_ref-Cherneva,_Iveta_2011_49-3"><a data-dcnode-id="6687" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6688" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6685" instrument_node=""> The European Union's Brussels Declaration on Preventing and Combating Trafficking includes child begging as one form of trafficking, stating "trafficking in human beings is an abhorrent and worrying phenomenon involving coercive sexual exploitation, labour exploitation in conditions akin to slavery, exploitation in begging and juvenile delinquency as well as domestic servitude."</span><sup class="reference" data-dcnode-id="6682" id="cite_ref-50"><a data-dcnode-id="6683" href="#cite_note-50"><span data-dcnode-id="6684" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6681" instrument_node=""> This issue is especially difficult to regulate given that forced begging is often imposed by family members, with parental power leveraged over a child to ensure that begging is carried out.</span><sup class="reference" data-dcnode-id="6678" id="cite_ref-Cherneva,_Iveta_2011_49-4"><a data-dcnode-id="6679" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6680" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6677" instrument_node="">
</span></p><span data-dcnode-id="6675" instrument_node="">
</span><h4 data-dcnode-id="6665"><span class="mw-headline" data-dcnode-id="6673" id="Demographics"><span data-dcnode-id="6674" instrument_node="">Demographics</span></span><span class="mw-editsection" data-dcnode-id="6666"><span class="mw-editsection-bracket" data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">[</span></span><a data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D15" title="Edit section: Demographics"><span data-dcnode-id="6670" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6664" instrument_node="">
</span><p data-dcnode-id="6651"><span data-dcnode-id="6663" instrument_node="">By definition child begging occurs in persons younger than eighteen, though forced begging has been found by UNICEF to exist among children as young as the age of two.</span><sup class="reference" data-dcnode-id="6660" id="cite_ref-Delap,_Emily_2009_48-2"><a data-dcnode-id="6661" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6662" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6659" instrument_node=""> Incidences of this practice have been recorded by the </span><a data-dcnode-id="6657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="6658" instrument_node="">World Bank</span></a><span data-dcnode-id="6656" instrument_node=""> in South and Central Asia, Europe, Latin America, the Caribbean, the Middle East, and West Africa.</span><sup class="reference" data-dcnode-id="6653" id="cite_ref-siteresources.worldbank.org_51-0"><a data-dcnode-id="6654" href="#cite_note-siteresources.worldbank.org-51"><span data-dcnode-id="6655" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6652" instrument_node="">
</span></p><p data-dcnode-id="6641"><span data-dcnode-id="6650" instrument_node="">Most research, such as studies done by UNICEF, suggests that boys are much more likely than girls to be trafficked for the purposes of begging; experts presume this is because there is a greater female presence in trafficking for the purposes of sexual exploitation.</span><sup class="reference" data-dcnode-id="6647" id="cite_ref-UNICEF_2006_52-0"><a data-dcnode-id="6648" href="#cite_note-UNICEF_2006-52"><span data-dcnode-id="6649" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6646" instrument_node=""> In Albania, where forced begging is a common practice, seventy percent of victims are male.</span><sup class="reference" data-dcnode-id="6643" id="cite_ref-Cherneva,_Iveta_2011_49-5"><a data-dcnode-id="6644" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6645" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6642" instrument_node="">
</span></p><p data-dcnode-id="6620"><span data-dcnode-id="6640" instrument_node="">While concrete figures are difficult to determine, the ILO recently reported that there are at least 600,000 children involved in forced begging.</span><sup class="reference" data-dcnode-id="6637" id="cite_ref-FOOTNOTECraig201029_53-0"><a data-dcnode-id="6638" href="#cite_note-FOOTNOTECraig201029-53"><span data-dcnode-id="6639" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6636" instrument_node=""> The problem may be much more extensive, however, with China's Ministry of Civil Affairs reporting that as many as 1.5 million children are forced into begging.</span><sup class="reference" data-dcnode-id="6633" id="cite_ref-Pumin,_Yin_2011_54-0"><a data-dcnode-id="6634" href="#cite_note-Pumin,_Yin_2011-54"><span data-dcnode-id="6635" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6632" instrument_node=""> Additionally, a recent study done in Senegal by </span><a data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="6631" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="6629" instrument_node=""> projected that a minimum of 50,000 children within the country and neighboring nations have been trafficked for the purposes of begging.</span><sup class="reference" data-dcnode-id="6626" id="cite_ref-FOOTNOTEWells201010_55-0"><a data-dcnode-id="6627" href="#cite_note-FOOTNOTEWells201010-55"><span data-dcnode-id="6628" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6625" instrument_node=""> Begging is often the primary source of income for street children in a number of countries, with a current study conducted by UNICEF finding that 45.7% of children who work on the streets of Zimbabwe engaged in begging, though there is no way of knowing whether it was through forced means.</span><sup class="reference" data-dcnode-id="6622" id="cite_ref-unicef.org_56-0"><a data-dcnode-id="6623" href="#cite_note-unicef.org-56"><span data-dcnode-id="6624" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6621" instrument_node="">
</span></p><p data-dcnode-id="6614"><span data-dcnode-id="6619" instrument_node="">Gang networks involving forced begging have been found to occur in populations of 500 or greater.</span><sup class="reference" data-dcnode-id="6616" id="cite_ref-Burke,_Jason_2011_57-0"><a data-dcnode-id="6617" href="#cite_note-Burke,_Jason_2011-57"><span data-dcnode-id="6618" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6615" instrument_node="">
</span></p><span data-dcnode-id="6613" instrument_node="">
</span><h4 data-dcnode-id="6603"><span class="mw-headline" data-dcnode-id="6611" id="Motivations"><span data-dcnode-id="6612" instrument_node="">Motivations</span></span><span class="mw-editsection" data-dcnode-id="6604"><span class="mw-editsection-bracket" data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">[</span></span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D16" title="Edit section: Motivations"><span data-dcnode-id="6608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6602" instrument_node="">
</span><h5 data-dcnode-id="6592"><span class="mw-headline" data-dcnode-id="6600" id="Economic_factors"><span data-dcnode-id="6601" instrument_node="">Economic factors</span></span><span class="mw-editsection" data-dcnode-id="6593"><span class="mw-editsection-bracket" data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">[</span></span><a data-dcnode-id="6596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D17" title="Edit section: Economic factors"><span data-dcnode-id="6597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6591" instrument_node="">
</span><p data-dcnode-id="6566"><span data-dcnode-id="6590" instrument_node="">Forced begging is a profitable practice in which exploiters are motivated by economic incentives. The business structures of major rings of children trafficked for the purpose of begging have been examined as comparable to a medium-size business enterprise.</span><sup class="reference" data-dcnode-id="6587" id="cite_ref-Cherneva,_Iveta_2011_49-6"><a data-dcnode-id="6588" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6589" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6586" instrument_node=""> In the most severe cases networks of children forced to beg may generate $30–40,000 USD for the profiteer.</span><sup class="reference" data-dcnode-id="6583" id="cite_ref-FOOTNOTEDelap20096_58-0"><a data-dcnode-id="6584" href="#cite_note-FOOTNOTEDelap20096-58"><span data-dcnode-id="6585" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6582" instrument_node=""> Though family networks are not nearly as extensive, a study conducted in Albania showed that a family with multiple children begging can earn up to fifteen euros a day, an amount greater than the average national teacher salary.</span><sup class="reference" data-dcnode-id="6579" id="cite_ref-Cherneva,_Iveta_2011_49-7"><a data-dcnode-id="6580" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6581" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6578" instrument_node=""> Anti-Slavery International asserts that because this income is relatively high many families believe it is the best option available given the lack of existing </span><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capability_approach" title="Capability approach"><span data-dcnode-id="6577" instrument_node="">capabilities</span></a><span data-dcnode-id="6575" instrument_node="">. Capability deprivation, meaning the routine absence of adequate resources that serve in facilitating opportunities, may account for cross-generational begging practices within families.</span><sup class="reference" data-dcnode-id="6572" id="cite_ref-FOOTNOTEDelap200912_59-0"><a data-dcnode-id="6573" href="#cite_note-FOOTNOTEDelap200912-59"><span data-dcnode-id="6574" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6571" instrument_node=""> UNICEF studies have found that begging is especially prevalent among families in which parents are incapacitated in some way, leading children to be the sole providers.</span><sup class="reference" data-dcnode-id="6568" id="cite_ref-unicef.org_56-1"><a data-dcnode-id="6569" href="#cite_note-unicef.org-56"><span data-dcnode-id="6570" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6567" instrument_node="">
</span></p><span data-dcnode-id="6565" instrument_node="">
</span><h5 data-dcnode-id="6555"><span class="mw-headline" data-dcnode-id="6563" id="Political_factors"><span data-dcnode-id="6564" instrument_node="">Political factors</span></span><span class="mw-editsection" data-dcnode-id="6556"><span class="mw-editsection-bracket" data-dcnode-id="6561"><span data-dcnode-id="6562" instrument_node="">[</span></span><a data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D18" title="Edit section: Political factors"><span data-dcnode-id="6560" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6554" instrument_node="">
</span><p data-dcnode-id="6540"><span data-dcnode-id="6553" instrument_node="">According to the World Bank forced begging is most commonly found in the Middle East and countries of West Africa, where laws prohibiting begging are scarce and heavy regulation of trafficking absent.</span><sup class="reference" data-dcnode-id="6550" id="cite_ref-siteresources.worldbank.org_51-1"><a data-dcnode-id="6551" href="#cite_note-siteresources.worldbank.org-51"><span data-dcnode-id="6552" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6549" instrument_node=""> In Zimbabwe, where child begging is especially prominent, the United Nations has indicated many contradictions between the Labour Act of Zimbabwe and the United Nations Convention on the Rights of the Child.</span><sup class="reference" data-dcnode-id="6546" id="cite_ref-unicef.org_56-2"><a data-dcnode-id="6547" href="#cite_note-unicef.org-56"><span data-dcnode-id="6548" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> Many nations, such as Indonesia, have laws against begging on the books, but the repercussions for such entail temporary detainment and eventual release back onto the streets, which does little to combat the issue.</span><sup class="reference" data-dcnode-id="6542" id="cite_ref-60"><a data-dcnode-id="6543" href="#cite_note-60"><span data-dcnode-id="6544" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6541" instrument_node="">
</span></p><span data-dcnode-id="6539" instrument_node="">
