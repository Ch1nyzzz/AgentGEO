</span><h5 data-dcnode-id="6529"><span class="mw-headline" data-dcnode-id="6537" id="Cultural_factors"><span data-dcnode-id="6538" instrument_node="">Cultural factors</span></span><span class="mw-editsection" data-dcnode-id="6530"><span class="mw-editsection-bracket" data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">[</span></span><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D19" title="Edit section: Cultural factors"><span data-dcnode-id="6534" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6528" instrument_node="">
</span><p data-dcnode-id="6510"><span data-dcnode-id="6527" instrument_node="">There are several cultural factors that support begging. In Europe begging is found in a number of minority cultures, especially popular within Roma and nomadic communities.</span><sup class="reference" data-dcnode-id="6524" id="cite_ref-Cherneva,_Iveta_2011_49-8"><a data-dcnode-id="6525" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6526" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6523" instrument_node=""> In Turkey familial networks of beggars have been documented across three generations, making it deeply ingrained within their survival schemas.</span><sup class="reference" data-dcnode-id="6520" id="cite_ref-Craig,_Gary_2010_61-0"><a data-dcnode-id="6521" href="#cite_note-Craig,_Gary_2010-61"><span data-dcnode-id="6522" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6519" instrument_node=""> It is important to note that while these may be culturally rooted practices, juvenile begging by way of familial pressure still falls under the realm of forced begging.</span><sup class="reference" data-dcnode-id="6516" id="cite_ref-Cherneva,_Iveta_2011_49-9"><a data-dcnode-id="6517" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6518" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6515" instrument_node=""> The transport of children, even one's own, for the purposes of exploitation through begging is a form of trafficking outlined by the United Nations.</span><sup class="reference" data-dcnode-id="6512" id="cite_ref-Cherneva,_Iveta_2011_49-10"><a data-dcnode-id="6513" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6514" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6511" instrument_node="">
</span></p><p data-dcnode-id="6504"><span data-dcnode-id="6509" instrument_node="">Another cultural practice is the resolution of familial debts through the kidnapping and exploitation of one of their children.</span><sup class="reference" data-dcnode-id="6506" id="cite_ref-62"><a data-dcnode-id="6507" href="#cite_note-62"><span data-dcnode-id="6508" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6505" instrument_node="">
</span></p><span data-dcnode-id="6503" instrument_node="">
</span><h4 data-dcnode-id="6493"><span class="mw-headline" data-dcnode-id="6501" id="General_abuses"><span data-dcnode-id="6502" instrument_node="">General abuses</span></span><span class="mw-editsection" data-dcnode-id="6494"><span class="mw-editsection-bracket" data-dcnode-id="6499"><span data-dcnode-id="6500" instrument_node="">[</span></span><a data-dcnode-id="6497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D20" title="Edit section: General abuses"><span data-dcnode-id="6498" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6492" instrument_node="">
</span><p data-dcnode-id="6464"><span data-dcnode-id="6491" instrument_node="">UNICEF has found that children who are forced to beg by third parties are often removed from their families, surrender the majority of their income to their exploiter, endure unsafe work and living conditions, and are at times maimed to increase profits.</span><sup class="reference" data-dcnode-id="6488" id="cite_ref-Delap,_Emily_2009_48-3"><a data-dcnode-id="6489" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6490" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="6485" id="cite_ref-UNICEF_2006_52-1"><a data-dcnode-id="6486" href="#cite_note-UNICEF_2006-52"><span data-dcnode-id="6487" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6484" instrument_node=""> The process of </span><a data-dcnode-id="6482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutilation" title="Mutilation"><span data-dcnode-id="6483" instrument_node="">maiming</span></a><span data-dcnode-id="6481" instrument_node="">, popularized by the film </span><i data-dcnode-id="6478"><a data-dcnode-id="6479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slumdog_Millionaire" title="Slumdog Millionaire"><span data-dcnode-id="6480" instrument_node="">Slumdog Millionaire</span></a></i><span data-dcnode-id="6477" instrument_node="">, is common given that according to the Buffalo Human Rights Law Review children with apparent special needs often make upwards of three times as much as other children who beg.</span><sup class="reference" data-dcnode-id="6474" id="cite_ref-Cherneva,_Iveta_2011_49-11"><a data-dcnode-id="6475" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6476" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6473" instrument_node=""> In addition to inflictions such as blindness and loss of limbs, other physical abuses for the purposes of heightening profits include pouring chili pepper on a child's tongue to give the appearance of impeded speech, the use of opium to elicit cries, and administering forced injections of drugs that will increase a child's energy and alertness.</span><sup class="reference" data-dcnode-id="6470" id="cite_ref-Delap,_Emily_2009_48-4"><a data-dcnode-id="6471" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6472" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6469" instrument_node=""> Testimonies against trafficking ring gang leaders have discussed the detainment of individuals in small cells devoid of food, water, and light to make victims weak and feeble, and thus more likely to elicit donations.</span><sup class="reference" data-dcnode-id="6466" id="cite_ref-Burke,_Jason_2011_57-1"><a data-dcnode-id="6467" href="#cite_note-Burke,_Jason_2011-57"><span data-dcnode-id="6468" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6465" instrument_node="">
</span></p><p data-dcnode-id="6450"><span data-dcnode-id="6463" instrument_node="">The conditions in which begging takes place commonly expose children to further physical and verbal abuse, including sexual victimization and police brutality.</span><sup class="reference" data-dcnode-id="6460" id="cite_ref-Delap,_Emily_2009_48-5"><a data-dcnode-id="6461" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6462" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6459" instrument_node=""> Research completed by Human Rights Watch revealed that when begging hours are completed for the day children often do not have proper shelter, adequate food, or access to healthcare where they reside.</span><sup class="reference" data-dcnode-id="6456" id="cite_ref-Wells_2010_63-0"><a data-dcnode-id="6457" href="#cite_note-Wells_2010-63"><span data-dcnode-id="6458" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6455" instrument_node=""> Furthermore, many of the gangs which run networks of forced begging have heavy drug involvement, thus the children under their control are often turned into drug addicts in order for them to become further reliant on their exploiters.</span><sup class="reference" data-dcnode-id="6452" id="cite_ref-Delap,_Emily_2009_48-6"><a data-dcnode-id="6453" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6454" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6451" instrument_node="">
</span></p><span data-dcnode-id="6449" instrument_node="">
</span><h4 data-dcnode-id="6439"><span class="mw-headline" data-dcnode-id="6447" id="Long-term_implications"><span data-dcnode-id="6448" instrument_node="">Long-term implications</span></span><span class="mw-editsection" data-dcnode-id="6440"><span class="mw-editsection-bracket" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">[</span></span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D21" title="Edit section: Long-term implications"><span data-dcnode-id="6444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6438" instrument_node="">
</span><p data-dcnode-id="6416"><span data-dcnode-id="6437" instrument_node="">Studies have shown that children forced into begging primarily receive little to no education, with upwards of sixteen hours a day dedicated to time on the streets.</span><sup class="reference" data-dcnode-id="6434" id="cite_ref-Cherneva,_Iveta_2011_49-12"><a data-dcnode-id="6435" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6436" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6433" instrument_node=""> With education being a leading method in escaping poverty child beggars have been shown to engage in a cyclical process of continuing this practice cross-generationally.</span><sup class="reference" data-dcnode-id="6430" id="cite_ref-Delap,_Emily_2009_48-7"><a data-dcnode-id="6431" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6432" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6429" instrument_node=""> Interviews conducted by UNICEF show that children who beg have little hope for the future and do not believe their circumstances will improve.</span><sup class="reference" data-dcnode-id="6426" id="cite_ref-unicef.org_56-3"><a data-dcnode-id="6427" href="#cite_note-unicef.org-56"><span data-dcnode-id="6428" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6425" instrument_node=""> Children who work on the streets typically have little or no knowledge of their rights, leaving them especially susceptible to exploitation both as juveniles and later as adults.</span><sup class="reference" data-dcnode-id="6422" id="cite_ref-unicef.org_56-4"><a data-dcnode-id="6423" href="#cite_note-unicef.org-56"><span data-dcnode-id="6424" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6421" instrument_node=""> Children who beg have also been found by UNICEF to have much higher instances of HIV infection due to lack of awareness and supervision on the streets.</span><sup class="reference" data-dcnode-id="6418" id="cite_ref-unicef.org_56-5"><a data-dcnode-id="6419" href="#cite_note-unicef.org-56"><span data-dcnode-id="6420" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6417" instrument_node="">
</span></p><span data-dcnode-id="6415" instrument_node="">
</span><h4 data-dcnode-id="6405"><span class="mw-headline" data-dcnode-id="6413" id="Solutions"><span data-dcnode-id="6414" instrument_node="">Solutions</span></span><span class="mw-editsection" data-dcnode-id="6406"><span class="mw-editsection-bracket" data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">[</span></span><a data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D22" title="Edit section: Solutions"><span data-dcnode-id="6410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6404" instrument_node="">
</span><h5 data-dcnode-id="6394"><span class="mw-headline" data-dcnode-id="6402" id="International_action"><span data-dcnode-id="6403" instrument_node="">International action</span></span><span class="mw-editsection" data-dcnode-id="6395"><span class="mw-editsection-bracket" data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">[</span></span><a data-dcnode-id="6398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D23" title="Edit section: International action"><span data-dcnode-id="6399" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6393" instrument_node="">
</span><p data-dcnode-id="6380"><span data-dcnode-id="6392" instrument_node="">A victim-centered human rights approach to combating trafficking has been internationally renowned as the best possible strategy when addressing this issue, with recourse focusing on punishing the exploiter and rehabilitating the child.</span><sup class="reference" data-dcnode-id="6389" id="cite_ref-Cherneva,_Iveta_2011_49-13"><a data-dcnode-id="6390" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6391" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6388" instrument_node=""> Some countries who emphasize this method include the United States, with the </span><a data-dcnode-id="6386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victims_of_Trafficking_and_Violence_Protection_Act_of_2000" title="Victims of Trafficking and Violence Protection Act of 2000"><span data-dcnode-id="6387" instrument_node="">Victims of Trafficking and Violence Protection Act of 2000</span></a><span data-dcnode-id="6385" instrument_node=""> affirming "victims of severe forms of trafficking should not be inappropriately incarcerated, fined, or otherwise penalized solely for unlawful acts committed as a direct result of being trafficked."</span><sup class="reference" data-dcnode-id="6382" id="cite_ref-TVPA_2000_64-0"><a data-dcnode-id="6383" href="#cite_note-TVPA_2000-64"><span data-dcnode-id="6384" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6381" instrument_node="">
</span></p><p data-dcnode-id="6354"><span data-dcnode-id="6379" instrument_node="">Other supported methods, such as those outlined by the Buffalo Human Rights Center, include relying on three Ps: protection, prosecution, and prevention.</span><sup class="reference" data-dcnode-id="6376" id="cite_ref-Cherneva,_Iveta_2011_49-14"><a data-dcnode-id="6377" href="#cite_note-Cherneva,_Iveta_2011-49"><span data-dcnode-id="6378" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6375" instrument_node=""> Protection starts with enforcing strict measures on the matters of both trafficking and begging. For many nations the first step is the criminalization of begging and trafficking.</span><sup class="reference" data-dcnode-id="6372" id="cite_ref-Craig,_Gary_2010_61-1"><a data-dcnode-id="6373" href="#cite_note-Craig,_Gary_2010-61"><span data-dcnode-id="6374" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6371" instrument_node=""> Prosecution should be instituted in the form of greater legal ramifications for traffickers, with punishment focused on the exploiter rather than the exploited.</span><sup class="reference" data-dcnode-id="6368" id="cite_ref-TVPA_2000_64-1"><a data-dcnode-id="6369" href="#cite_note-TVPA_2000-64"><span data-dcnode-id="6370" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6367" instrument_node=""> This becomes difficult with respect to victims of familial trafficking, considering this would require changes in care placement and strict monitoring of each displaced child's welfare.</span><sup class="reference" data-dcnode-id="6364" id="cite_ref-Delap,_Emily_2009_48-8"><a data-dcnode-id="6365" href="#cite_note-Delap,_Emily_2009-48"><span data-dcnode-id="6366" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6363" instrument_node=""> Many organizations affirm that prevention begins with discouraging donations and improving services so that children, and families as a whole, have greater capabilities.</span><sup class="reference" data-dcnode-id="6360" id="cite_ref-Wells_2010_63-1"><a data-dcnode-id="6361" href="#cite_note-Wells_2010-63"><span data-dcnode-id="6362" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6359" instrument_node=""> Though well-intentioned, by giving child beggars money, individuals only make this practice more profitable, and soon these funds find their way into the hands of the child's abuser.</span><sup class="reference" data-dcnode-id="6356" id="cite_ref-Wells_2010_63-2"><a data-dcnode-id="6357" href="#cite_note-Wells_2010-63"><span data-dcnode-id="6358" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6355" instrument_node="">
</span></p><span data-dcnode-id="6353" instrument_node="">
</span><h5 data-dcnode-id="6343"><span class="mw-headline" data-dcnode-id="6351" id="Government_response"><span data-dcnode-id="6352" instrument_node="">Government response</span></span><span class="mw-editsection" data-dcnode-id="6344"><span class="mw-editsection-bracket" data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">[</span></span><a data-dcnode-id="6347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D24" title="Edit section: Government response"><span data-dcnode-id="6348" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6345"><span data-dcnode-id="6346" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6342" instrument_node="">
</span><p data-dcnode-id="6330"><span data-dcnode-id="6341" instrument_node="">In Senegal, where the abuses against </span><a class="mw-redirect" data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talibes" title="Talibes"><span data-dcnode-id="6340" instrument_node="">talibes</span></a><span data-dcnode-id="6338" instrument_node=""> are extensive, there have been several initiatives with the help of the World Bank to put an end this exploitation. First, there is intervention on a community level with education on the validity of some of these Quranic institutions provided to rural villages that typically send their children there. This is supplemented by improved regulation of schools within the nation to ensure that they remain places of education, followed by a greater enforcement of preexisting laws banning trafficking and exploitative begging. Finally, rehabilitation services have been provided with the help of </span><a class="mw-redirect" data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Society_Organization" title="Civil Society Organization"><span data-dcnode-id="6337" instrument_node="">CSOs</span></a><span data-dcnode-id="6335" instrument_node=""> to recovered children to provide them with the capabilities they have been denied.</span><sup class="reference" data-dcnode-id="6332" id="cite_ref-siteresources.worldbank.org_51-2"><a data-dcnode-id="6333" href="#cite_note-siteresources.worldbank.org-51"><span data-dcnode-id="6334" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6331" instrument_node="">
</span></p><p data-dcnode-id="6324"><span data-dcnode-id="6329" instrument_node="">In Zimbabwe policy has adapted to ensure the safety of all persons under the age of sixteen with the Children's Protection and Adoption Act, however, the government admits that a lack of resources and capital play a critical role in inadequate enforcement.</span><sup class="reference" data-dcnode-id="6326" id="cite_ref-unicef.org_56-6"><a data-dcnode-id="6327" href="#cite_note-unicef.org-56"><span data-dcnode-id="6328" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6325" instrument_node="">
</span></p><p data-dcnode-id="6318"><span data-dcnode-id="6323" instrument_node="">In Bangladesh, where there are an estimated 700,000 beggars, a law passed in 2009 banning the practice, though officials report some trouble with enforcement.</span><sup class="reference" data-dcnode-id="6320" id="cite_ref-Burke,_Jason_2011_57-2"><a data-dcnode-id="6321" href="#cite_note-Burke,_Jason_2011-57"><span data-dcnode-id="6322" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6319" instrument_node="">
</span></p><p data-dcnode-id="6312"><span data-dcnode-id="6317" instrument_node="">In China, the Ministry of Public Security has established a department that solely focuses on child trafficking. The department has a hotline where the public dials 110 to report suspected incidences of forced begging, which law enforcement officials are expected to investigate further. The police are trained to take the children into custody if a blood relationship with their guardian cannot be established, and educate parents on the illegality and dangers of begging if they are those responsible for the child's action. This policy instituted in April 2009 has since led to the recovery of 9,300 children.</span><sup class="reference" data-dcnode-id="6314" id="cite_ref-Pumin,_Yin_2011_54-1"><a data-dcnode-id="6315" href="#cite_note-Pumin,_Yin_2011-54"><span data-dcnode-id="6316" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6313" instrument_node="">
</span></p><span data-dcnode-id="6311" instrument_node="">
</span><h5 data-dcnode-id="6301"><span class="mw-headline" data-dcnode-id="6309" id="NGO_initiatives"><span data-dcnode-id="6310" instrument_node="">NGO initiatives</span></span><span class="mw-editsection" data-dcnode-id="6302"><span class="mw-editsection-bracket" data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">[</span></span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D25" title="Edit section: NGO initiatives"><span data-dcnode-id="6306" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6300" instrument_node="">
</span><p data-dcnode-id="6287"><span data-dcnode-id="6299" instrument_node="">Many NGOs have initiated movements focusing on informing the public on the dangers of donations. As UNICEF reported in 2006, "certain behaviors, such as giving money to child beggars can also indirectly motivate traffickers and controller to demand children."</span><sup class="reference" data-dcnode-id="6296" id="cite_ref-UNICEF_2006_52-2"><a data-dcnode-id="6297" href="#cite_note-UNICEF_2006-52"><span data-dcnode-id="6298" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6295" instrument_node=""> The Mirror Foundation's Stop Child Begging Project of Thailand is one such organization that emphasizes eliminating the demand. Their initiatives are focused on educating passersby on the forced begging of trafficked Cambodians within their country to decrease the likelihood of donations.</span><sup class="reference" data-dcnode-id="6292" id="cite_ref-65"><a data-dcnode-id="6293" href="#cite_note-65"><span data-dcnode-id="6294" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="6289" id="cite_ref-66"><a data-dcnode-id="6290" href="#cite_note-66"><span data-dcnode-id="6291" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6288" instrument_node="">
</span></p><span data-dcnode-id="6286" instrument_node="">
</span><h5 data-dcnode-id="6276"><span class="mw-headline" data-dcnode-id="6284" id="Other_methods"><span data-dcnode-id="6285" instrument_node="">Other methods</span></span><span class="mw-editsection" data-dcnode-id="6277"><span class="mw-editsection-bracket" data-dcnode-id="6282"><span data-dcnode-id="6283" instrument_node="">[</span></span><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D26" title="Edit section: Other methods"><span data-dcnode-id="6281" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6278"><span data-dcnode-id="6279" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6275" instrument_node="">
</span><p data-dcnode-id="6265"><span data-dcnode-id="6274" instrument_node="">In China, where the kidnapping and forced begging of children has been routinely documented, a multi-media movement has begun.</span><sup class="reference" data-dcnode-id="6271" id="cite_ref-Pumin,_Yin_2011_54-2"><a data-dcnode-id="6272" href="#cite_note-Pumin,_Yin_2011-54"><span data-dcnode-id="6273" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6270" instrument_node=""> Here, blogs are utilized to publicize over 3,000 photos of children whose families believe have been abducted for the purpose of begging, with hundreds of thousands of followers who remain on the look out for these children in major urban centers. This campaign has enabled at least six children to be recovered and reunited with their families.</span><sup class="reference" data-dcnode-id="6267" id="cite_ref-Pumin,_Yin_2011_54-3"><a data-dcnode-id="6268" href="#cite_note-Pumin,_Yin_2011-54"><span data-dcnode-id="6269" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6266" instrument_node="">
</span></p><p data-dcnode-id="6252"><span data-dcnode-id="6264" instrument_node="">In instances where begging is religiously sanctioned it has been suggested by the </span><a data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Agency_for_International_Development" title="United States Agency for International Development"><span data-dcnode-id="6263" instrument_node="">United States Agency for International Development</span></a><span data-dcnode-id="6261" instrument_node=""> (USAID) that religious leaders should outwardly condemn this practice. For talibes religious leaders have been asked to take a stance against begging using passages cited from the Quran, such as, "Except paradise, you should not beg anything for the sake of Allah" (8:23), which would help strip the practice of its religious foundation.</span><sup class="reference" data-dcnode-id="6258" id="cite_ref-67"><a data-dcnode-id="6259" href="#cite_note-67"><span data-dcnode-id="6260" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6257" instrument_node=""> In addition, former US President Clinton took the responsibility of providing protection against child abuse through Internet Service Providers (ISP) that can help law enforcement track any suspicious activities including child pornography.</span><sup class="reference" data-dcnode-id="6254" id="cite_ref-68"><a data-dcnode-id="6255" href="#cite_note-68"><span data-dcnode-id="6256" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6253" instrument_node="">
</span></p><span data-dcnode-id="6251" instrument_node="">
</span><h3 data-dcnode-id="6241"><span class="mw-headline" data-dcnode-id="6249" id="Sales_motivated_by_cash"><span data-dcnode-id="6250" instrument_node="">Sales motivated by cash</span></span><span class="mw-editsection" data-dcnode-id="6242"><span class="mw-editsection-bracket" data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">[</span></span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D27" title="Edit section: Sales motivated by cash"><span data-dcnode-id="6246" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6243"><span data-dcnode-id="6244" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6240" instrument_node="">
</span><p data-dcnode-id="6228"><span data-dcnode-id="6239" instrument_node="">In </span><a data-dcnode-id="6237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Rome" title="Ancient Rome"><span data-dcnode-id="6238" instrument_node="">ancient Rome</span></a><span data-dcnode-id="6236" instrument_node="">, according to Keith Bradley, </span><a data-dcnode-id="6234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine_of_Hippo" title="Augustine of Hippo"><span data-dcnode-id="6235" instrument_node="">Augustine</span></a><span data-dcnode-id="6233" instrument_node=""> wrote that "there were indigent parents selling their children because they needed the cash."</span><sup class="reference" data-dcnode-id="6230" id="cite_ref-FOOTNOTEBradley199437_69-0"><a data-dcnode-id="6231" href="#cite_note-FOOTNOTEBradley199437-69"><span data-dcnode-id="6232" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6229" instrument_node="">
</span></p><p data-dcnode-id="6216"><span data-dcnode-id="6227" instrument_node="">In contemporary Nepal, parents of poor families sell their children to </span><a class="mw-redirect" data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orphanages" title="Orphanages"><span data-dcnode-id="6226" instrument_node="">orphanages</span></a><span data-dcnode-id="6224" instrument_node=""> (or sometimes simply hand them over without any payment). The orphanage then misrepresent them as "orphans", ensuring an income for the orphanages.</span><sup class="reference" data-dcnode-id="6221" id="cite_ref-70"><a data-dcnode-id="6222" href="#cite_note-70"><span data-dcnode-id="6223" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="6218" id="cite_ref-71"><a data-dcnode-id="6219" href="#cite_note-71"><span data-dcnode-id="6220" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6217" instrument_node="">
</span></p><span data-dcnode-id="6215" instrument_node="">
</span><h2 data-dcnode-id="6205"><span class="mw-headline" data-dcnode-id="6213" id="Mechanisms"><span data-dcnode-id="6214" instrument_node="">Mechanisms</span></span><span class="mw-editsection" data-dcnode-id="6206"><span class="mw-editsection-bracket" data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">[</span></span><a data-dcnode-id="6209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D28" title="Edit section: Mechanisms"><span data-dcnode-id="6210" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6204" instrument_node="">
</span><p data-dcnode-id="6176"><span data-dcnode-id="6203" instrument_node="">In general, child trafficking takes place in three stages: recruitment, movement, and exploitation.</span><sup class="reference" data-dcnode-id="6200" id="cite_ref-TngManualFightTrafficking-Textbk1_8-12"><a data-dcnode-id="6201" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6202" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6197" id="cite_ref-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002_17-1"><a data-dcnode-id="6198" href="#cite_note-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002-17"><span data-dcnode-id="6199" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6196" instrument_node=""> Recruitment occurs when a child is approached by a recruiter, or in some cases, directly approaches a recruiter themselves.</span><sup class="reference" data-dcnode-id="6193" id="cite_ref-TngManualFightTrafficking-Textbk1_8-13"><a data-dcnode-id="6194" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6195" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6192" instrument_node=""> Recruitment is initiated in many different ways: adolescents may be under pressure to contribute to their families, children may be kidnapped or abducted into trafficking, or families may be trafficked together.</span><sup class="reference" data-dcnode-id="6189" id="cite_ref-TngManualFightTrafficking-Textbk1_8-14"><a data-dcnode-id="6190" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6191" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6188" instrument_node=""> Then, movement will occur—locally, regionally, and/or internationally—through a variety of transportation types, including by car, train, boat, or foot.</span><sup class="reference" data-dcnode-id="6185" id="cite_ref-TngManualFightTrafficking-Textbk1_8-15"><a data-dcnode-id="6186" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6187" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6184" instrument_node=""> Ultimately, the final goal of child trafficking is exploitation, whereby traffickers use the services of children to garner illegal profit.</span><sup class="reference" data-dcnode-id="6181" id="cite_ref-TngManualFightTrafficking-Textbk1_8-16"><a data-dcnode-id="6182" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6183" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6180" instrument_node=""> Exploitation can take place in a variety of forms, including </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labour" title="Forced labour"><span data-dcnode-id="6179" instrument_node="">forced labour</span></a><span data-dcnode-id="6177" instrument_node="">, sexual exploitation, and child begging, among other practices.
</span></p><span data-dcnode-id="6175" instrument_node="">
</span><h3 data-dcnode-id="6165"><span class="mw-headline" data-dcnode-id="6173" id="Supply_and_demand_framework"><span data-dcnode-id="6174" instrument_node="">Supply and demand framework</span></span><span class="mw-editsection" data-dcnode-id="6166"><span class="mw-editsection-bracket" data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">[</span></span><a data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D29" title="Edit section: Supply and demand framework"><span data-dcnode-id="6170" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6167"><span data-dcnode-id="6168" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6164" instrument_node="">
</span><p data-dcnode-id="6129"><span data-dcnode-id="6163" instrument_node="">Child trafficking is often conceptualized using the economic model of </span><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supply_and_demand" title="Supply and demand"><span data-dcnode-id="6162" instrument_node="">supply and demand</span></a><span data-dcnode-id="6160" instrument_node="">.</span><sup class="reference" data-dcnode-id="6157" id="cite_ref-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002_17-2"><a data-dcnode-id="6158" href="#cite_note-United_Nations,_Office_of_the_High_Commissioner_for_Human_Rights_2002-17"><span data-dcnode-id="6159" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="6154" id="cite_ref-72"><a data-dcnode-id="6155" href="#cite_note-72"><span data-dcnode-id="6156" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6153" instrument_node=""> Specifically, those who are trafficked constitute the "supply", while the traffickers, and all those who profit from the exploitation, provide the "demand".</span><sup class="reference" data-dcnode-id="6150" id="cite_ref-TngManualFightTrafficking-Textbk1_8-17"><a data-dcnode-id="6151" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6152" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6149" instrument_node=""> Two types of demand are defined: consumer demand and derived demand. Consumer demand is generated by people who actively or passively buy the products or services of trafficked labour.</span><sup class="reference" data-dcnode-id="6146" id="cite_ref-TngManualFightTrafficking-Textbk1_8-18"><a data-dcnode-id="6147" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6148" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6145" instrument_node=""> An example of this would be a tourist purchasing a T-shirt that has been made by a trafficked child. Derived demand, on the other hand, is generated by people who directly profit from the practice of trafficking, such as pimps or corrupt factory owners.</span><sup class="reference" data-dcnode-id="6142" id="cite_ref-TngManualFightTrafficking-Textbk1_8-19"><a data-dcnode-id="6143" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6144" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6141" instrument_node=""> Scholar Kevin Bales has extensively studied the application of this economic framework to instances of human trafficking; he contends that it is central to an accurate understanding of how trafficking is initiated and sustained.</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-Bales_73-0"><a data-dcnode-id="6139" href="#cite_note-Bales-73"><span data-dcnode-id="6140" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6137" instrument_node=""> Bales, along with scholars Elizabeth M. Wheaton, Edward J. Schauer, and Thomas V. Galli, have asserted that national governments should more actively implement policies that reduce both types of demand, thus working towards the elimination of trafficking.</span><sup class="reference" data-dcnode-id="6134" id="cite_ref-United_States_Department_of_State_2011_74-0"><a data-dcnode-id="6135" href="#cite_note-United_States_Department_of_State_2011-74"><span data-dcnode-id="6136" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="6131" id="cite_ref-75"><a data-dcnode-id="6132" href="#cite_note-75"><span data-dcnode-id="6133" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6130" instrument_node="">
</span></p><span data-dcnode-id="6128" instrument_node="">
</span><h3 data-dcnode-id="6118"><span class="mw-headline" data-dcnode-id="6126" id="Social_mechanisms"><span data-dcnode-id="6127" instrument_node="">Social mechanisms</span></span><span class="mw-editsection" data-dcnode-id="6119"><span class="mw-editsection-bracket" data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">[</span></span><a data-dcnode-id="6122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D30" title="Edit section: Social mechanisms"><span data-dcnode-id="6123" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6117" instrument_node="">
</span><p data-dcnode-id="6074"><span data-dcnode-id="6116" instrument_node="">Various international organizations, including the ILO and UN.GIFT, have linked child trafficking to poverty, reporting that living in poverty has been found to increase children's vulnerability to trafficking.</span><sup class="reference" data-dcnode-id="6113" id="cite_ref-TngManualFightTrafficking-Textbk1_8-20"><a data-dcnode-id="6114" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6115" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6110" id="cite_ref-76"><a data-dcnode-id="6111" href="#cite_note-76"><span data-dcnode-id="6112" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="6107" id="cite_ref-Gozdziak_2008_77-0"><a data-dcnode-id="6108" href="#cite_note-Gozdziak_2008-77"><span data-dcnode-id="6109" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6106" instrument_node=""> However, poverty is only one of many social "risk factors" that can lead to trafficking. As UNICEF and the World Bank note, "Often children experience several risk factors at the same time, and one of them may act as a trigger that sets the trafficking event in motion. This is sometimes called 'poverty plus,' a situation in which poverty does not by itself lead to a person being trafficked, but where a 'plus' factor such as illness combines with poverty to increase vulnerability."</span><sup class="reference" data-dcnode-id="6103" id="cite_ref-TngManualFightTrafficking-Textbk1_8-21"><a data-dcnode-id="6104" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6105" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6100" id="cite_ref-78"><a data-dcnode-id="6101" href="#cite_note-78"><span data-dcnode-id="6102" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6099" instrument_node=""> UNICEF, UN.GIFT, and several scholars, including Una Murray and Mike Dottridge, also contend that an accurate understanding of child trafficking must incorporate an analysis of gender inequality.</span><sup class="reference" data-dcnode-id="6096" id="cite_ref-TngManualFightTrafficking-Textbk1_8-22"><a data-dcnode-id="6097" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6098" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6093" id="cite_ref-Dott_79-0"><a data-dcnode-id="6094" href="#cite_note-Dott-79"><span data-dcnode-id="6095" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="6090" id="cite_ref-Murray_80-0"><a data-dcnode-id="6091" href="#cite_note-Murray-80"><span data-dcnode-id="6092" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6089" instrument_node=""> Specifically, in many countries, girls are at a higher risk of being trafficked, particularly into sexual exploitation.</span><sup class="reference" data-dcnode-id="6086" id="cite_ref-TngManualFightTrafficking-Textbk1_8-23"><a data-dcnode-id="6087" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="6088" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="6083" id="cite_ref-Dott_79-1"><a data-dcnode-id="6084" href="#cite_note-Dott-79"><span data-dcnode-id="6085" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6082" instrument_node=""> In addition, these international agencies and scholars contend that giving women and men an equal voice in anti-trafficking policy is critical to reducing the incidence of child trafficking.</span><sup class="reference" data-dcnode-id="6079" id="cite_ref-Dott_79-2"><a data-dcnode-id="6080" href="#cite_note-Dott-79"><span data-dcnode-id="6081" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="6076" id="cite_ref-Murray_80-1"><a data-dcnode-id="6077" href="#cite_note-Murray-80"><span data-dcnode-id="6078" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6075" instrument_node="">
</span></p><p data-dcnode-id="6059"><span data-dcnode-id="6073" instrument_node="">Studies throughout Europe have identified risks that make children vulnerable to exploitation that are also causes and contributing factors of child trafficking. These include social and economic marginalisation, dysfunctional family backgrounds, experiences of neglect, abuse or violence within the family or in institutions, exploitative relationships, gender-based violence and discrimination, experiences of living or working on the streets, precarious and irregular migration situations, aspirations to work and to earn money and limited opportunities to enter or remain in school, vocational training or regular employment. As the efforts of national governments to improve social safety nets can lessen many of these risks, child trafficking is considered not only a result of criminal activities but also as indicating weaknesses in the national government's ability to effectively safeguard children's rights to a safe and healthy development.</span><sup class="reference" data-dcnode-id="6070" id="cite_ref-81"><a data-dcnode-id="6071" href="#cite_note-81"><span data-dcnode-id="6072" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="6067" id="cite_ref-82"><a data-dcnode-id="6068" href="#cite_note-82"><span data-dcnode-id="6069" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="6064" id="cite_ref-83"><a data-dcnode-id="6065" href="#cite_note-83"><span data-dcnode-id="6066" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="6061" id="cite_ref-84"><a data-dcnode-id="6062" href="#cite_note-84"><span data-dcnode-id="6063" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6060" instrument_node="">
</span></p><span data-dcnode-id="6058" instrument_node="">
</span><h2 data-dcnode-id="6048"><span class="mw-headline" data-dcnode-id="6056" id="Identification"><span data-dcnode-id="6057" instrument_node="">Identification</span></span><span class="mw-editsection" data-dcnode-id="6049"><span class="mw-editsection-bracket" data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">[</span></span><a data-dcnode-id="6052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D31" title="Edit section: Identification"><span data-dcnode-id="6053" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6047" instrument_node="">
</span><p data-dcnode-id="6028"><span data-dcnode-id="6046" instrument_node="">The complex definition of child trafficking and the differences in national laws and interpretations makes the identification of child victims of trafficking challenging. For example, the European debate on child trafficking lacks consensus on how child trafficking is to be distinguished from other contexts of exploitation, from </span><a data-dcnode-id="6044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_dumping" title="Social dumping"><span data-dcnode-id="6045" instrument_node="">social dumping</span></a><span data-dcnode-id="6043" instrument_node=""> of migrants, the sale of children and the smuggling of migrants.</span><sup class="reference" data-dcnode-id="6040" id="cite_ref-FOOTNOTEKMOP201418_85-0"><a data-dcnode-id="6041" href="#cite_note-FOOTNOTEKMOP201418-85"><span data-dcnode-id="6042" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="6037" id="cite_ref-FOOTNOTEUNICEF-IRC201234–41_86-0"><a data-dcnode-id="6038" href="#cite_note-FOOTNOTEUNICEF-IRC201234%E2%80%9341-86"><span data-dcnode-id="6039" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6036" instrument_node=""> People smugglers are also known to exploit children to transport migrants across international borders.</span><sup class="reference" data-dcnode-id="6033" id="cite_ref-87"><a data-dcnode-id="6034" href="#cite_note-87"><span data-dcnode-id="6035" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="6030" id="cite_ref-88"><a data-dcnode-id="6031" href="#cite_note-88"><span data-dcnode-id="6032" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6029" instrument_node="">
</span></p><p data-dcnode-id="6013"><span data-dcnode-id="6027" instrument_node="">Once a potential victim has come into contact with state authorities, identifying the child as a victim of trafficking takes time. The process often benefits from a thorough understanding of the child's story. For a child who is in trouble with the law, hearing the child's full story helps caseworkers and officers determine if the child is actually a victim of a crime herself, such as exploitation, abuse, or trafficking. For a child in an administrative process, such as an asylum procedure, hearing the child's full story helps caseworkers to detect cases of trafficking. Children may be hesitant to share their complete stories with authorities and appointed child welfare professionals. Some service providers have found that establishing trust and a stable relationship with the child encourages increased disclosure of experiences of exploitation and trafficking that might otherwise not be detected. The trust building process can include granting assistance and support services to ensure safety, well-being and development.</span><sup class="reference" data-dcnode-id="6024" id="cite_ref-89"><a data-dcnode-id="6025" href="#cite_note-89"><span data-dcnode-id="6026" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="6021" id="cite_ref-90"><a data-dcnode-id="6022" href="#cite_note-90"><span data-dcnode-id="6023" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="6018" id="cite_ref-91"><a data-dcnode-id="6019" href="#cite_note-91"><span data-dcnode-id="6020" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="6015" id="cite_ref-92"><a data-dcnode-id="6016" href="#cite_note-92"><span data-dcnode-id="6017" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6014" instrument_node="">
</span></p><p data-dcnode-id="5995"><span data-dcnode-id="6012" instrument_node="">Identified victims of child trafficking are entitled to special safeguards that all child victims of crimes are entitled to under international law. These safeguards include the right to </span><a class="mw-redirect" data-dcnode-id="6010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guardianship" title="Guardianship"><span data-dcnode-id="6011" instrument_node="">guardianship</span></a><span data-dcnode-id="6009" instrument_node="">, legal assistance and representation, safety and protection, support for physical and psychological recovery and </span><a data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_integration" title="Social integration"><span data-dcnode-id="6008" instrument_node="">social reintegration</span></a><span data-dcnode-id="6006" instrument_node="">, regularisation of </span><a data-dcnode-id="6004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration" title="Immigration"><span data-dcnode-id="6005" instrument_node="">immigration status</span></a><span data-dcnode-id="6003" instrument_node="">, the right to compensation, and the right to act as a party, or plaintiff, in criminal proceedings. An important safeguard for trafficked children who have been exploited in illegal or criminal activities is the ‘non-punishment clause’. It means that child victims of criminal offences, including human trafficking, are to be protected from sanctions or prosecution for acts that they committed in relation to their situation as victims.</span><sup class="reference" data-dcnode-id="6000" id="cite_ref-93"><a data-dcnode-id="6001" href="#cite_note-93"><span data-dcnode-id="6002" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="5997" id="cite_ref-94"><a data-dcnode-id="5998" href="#cite_note-94"><span data-dcnode-id="5999" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5996" instrument_node="">
</span></p><p data-dcnode-id="5986"><span data-dcnode-id="5994" instrument_node="">Articles 19 and 32-36 of the UN Convention on the Rights of the Child prohibits the exploitation of children in any form and in any context. Any child who is exposed to violence, exploitation or abuse can be considered a victim of crime and enjoys the correlated rights and entitlements, including access to assistance, protection and support, services for recovery and rehabilitation, access to justice, with due procedural safeguards in any related legal or administrative proceedings. Children at risk of exploitation have to be identified and recognised as being at risk. This implies that they have a right to assistance and support in order to prevent their exploitation or any other harm resulting from the risks. Considering the difficulties of identifying children who have been trafficked and the broad protection against all forms and contexts of exploitation afforded under the Convention, a child rights-based approach prioritises the identification of child victims of exploitation or other crime and children at risk. Whether or not exploitation takes place in a context of trafficking is of subordinate relevance for the child rights and protection context. It may interest primarily the law enforcement investigations and the prosecution.</span><sup class="reference" data-dcnode-id="5991" id="cite_ref-FOOTNOTEKMOP201415–19_95-0"><a data-dcnode-id="5992" href="#cite_note-FOOTNOTEKMOP201415%E2%80%9319-95"><span data-dcnode-id="5993" instrument_node="">[95]</span></a></sup><sup class="reference" data-dcnode-id="5988" id="cite_ref-FOOTNOTEUNICEF-IRC201234–44_96-0"><a data-dcnode-id="5989" href="#cite_note-FOOTNOTEUNICEF-IRC201234%E2%80%9344-96"><span data-dcnode-id="5990" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5987" instrument_node="">
</span></p><span data-dcnode-id="5985" instrument_node="">
</span><h2 data-dcnode-id="5975"><span class="mw-headline" data-dcnode-id="5983" id="Prevalence"><span data-dcnode-id="5984" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="5976"><span class="mw-editsection-bracket" data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">[</span></span><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D32" title="Edit section: Prevalence"><span data-dcnode-id="5980" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5974" instrument_node="">
</span><p data-dcnode-id="5953"><span data-dcnode-id="5973" instrument_node="">It is difficult to obtain reliable estimates concerning the number of children trafficked each year, primarily due to the covert and criminal nature of this practice.</span><sup class="reference" data-dcnode-id="5970" id="cite_ref-TngManualFightTrafficking-Textbk1_8-24"><a data-dcnode-id="5971" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5972" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5967" id="cite_ref-Gozdziak_2008_77-1"><a data-dcnode-id="5968" href="#cite_note-Gozdziak_2008-77"><span data-dcnode-id="5969" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5966" instrument_node=""> It often takes years to gather and compile estimates regarding child trafficking and, as a result, data can seem both inadequate and outdated.</span><sup class="reference" data-dcnode-id="5963" id="cite_ref-TngManualFightTrafficking-Textbk1_8-25"><a data-dcnode-id="5964" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5965" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5962" instrument_node=""> This process of gathering data is only complicated by the fact that very few countries publish national estimates of child trafficking.</span><sup class="reference" data-dcnode-id="5959" id="cite_ref-TngManualFightTrafficking-Textbk1_8-26"><a data-dcnode-id="5960" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5961" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5958" instrument_node=""> As a result, the available statistics are widely thought to underestimate the actual scope of the problem.</span><sup class="reference" data-dcnode-id="5955" id="cite_ref-TngManualFightTrafficking-Textbk1_8-27"><a data-dcnode-id="5956" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5957" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5954" instrument_node="">
</span></p><span data-dcnode-id="5952" instrument_node="">
</span><h3 data-dcnode-id="5942"><span class="mw-headline" data-dcnode-id="5950" id="Worldwide"><span data-dcnode-id="5951" instrument_node="">Worldwide</span></span><span class="mw-editsection" data-dcnode-id="5943"><span class="mw-editsection-bracket" data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">[</span></span><a data-dcnode-id="5946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D33" title="Edit section: Worldwide"><span data-dcnode-id="5947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5941" instrument_node="">
</span><p data-dcnode-id="5928"><span data-dcnode-id="5940" instrument_node="">Trafficking of children has been documented in every region of the world.</span><sup class="reference" data-dcnode-id="5937" id="cite_ref-United_Nations_2000_1-4"><a data-dcnode-id="5938" href="#cite_note-United_Nations_2000-1"><span data-dcnode-id="5939" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5934" id="cite_ref-97"><a data-dcnode-id="5935" href="#cite_note-97"><span data-dcnode-id="5936" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5933" instrument_node=""> A widely used figure regarding the prevalence of this practice is provided by the ILO, which estimates that 1.2 million children are trafficked each year; this estimate includes cross-border and internal trafficking.</span><sup class="reference" data-dcnode-id="5930" id="cite_ref-ILO_2002_98-0"><a data-dcnode-id="5931" href="#cite_note-ILO_2002-98"><span data-dcnode-id="5932" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5929" instrument_node="">
</span></p><span data-dcnode-id="5927" instrument_node="">
</span><h3 data-dcnode-id="5917"><span class="mw-headline" data-dcnode-id="5925" id="Regional"><span data-dcnode-id="5926" instrument_node="">Regional</span></span><span class="mw-editsection" data-dcnode-id="5918"><span class="mw-editsection-bracket" data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">[</span></span><a data-dcnode-id="5921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D34" title="Edit section: Regional"><span data-dcnode-id="5922" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5916" instrument_node="">
</span><p data-dcnode-id="5910"><span data-dcnode-id="5915" instrument_node="">Regionally, the ILO has provided the following estimates for trafficking of children by region per year:</span><sup class="reference" data-dcnode-id="5912" id="cite_ref-ILO_2002_98-1"><a data-dcnode-id="5913" href="#cite_note-ILO_2002-98"><span data-dcnode-id="5914" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5911" instrument_node="">
</span></p><span data-dcnode-id="5909" instrument_node="">
</span><ul data-dcnode-id="5894"><li data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">Asia/Pacific: 250,000 children</span></li><span data-dcnode-id="5906" instrument_node="">
</span><li data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">Latin America &amp; the Caribbean: 550,000 children</span></li><span data-dcnode-id="5903" instrument_node="">
</span><li data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">Africa: 200,000 children</span></li><span data-dcnode-id="5900" instrument_node="">
</span><li data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">Transition economies: 200,000 children</span></li><span data-dcnode-id="5897" instrument_node="">
</span><li data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">Developed/industrialized economies: unknown</span></li></ul><span data-dcnode-id="5893" instrument_node="">
</span><p data-dcnode-id="5873"><span data-dcnode-id="5892" instrument_node="">As the numbers above indicate, child trafficking occurs the most frequently in Latin America and the Caribbean. Child trafficking is also the most prevalent in developing countries, though it does occur in developed and industrialized economies as well.</span><sup class="reference" data-dcnode-id="5889" id="cite_ref-TngManualFightTrafficking-Textbk1_8-28"><a data-dcnode-id="5890" href="#cite_note-TngManualFightTrafficking-Textbk1-8"><span data-dcnode-id="5891" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5886" id="cite_ref-United_States_Department_of_State_2011_74-1"><a data-dcnode-id="5887" href="#cite_note-United_States_Department_of_State_2011-74"><span data-dcnode-id="5888" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5885" instrument_node=""> Notably, the </span><a data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="5884" instrument_node="">US Department of State</span></a><span data-dcnode-id="5882" instrument_node=""> publishes an annual "Trafficking in Persons" report which provides ample data regarding the prevalence of human and child trafficking in the majority of countries.</span><sup class="reference" data-dcnode-id="5879" id="cite_ref-United_States_Department_of_State_2011_74-2"><a data-dcnode-id="5880" href="#cite_note-United_States_Department_of_State_2011-74"><span data-dcnode-id="5881" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5878" instrument_node=""> The University of Pennsylvania School of Social Work released a study that estimated as many as 300,000 American youth may be at risk of commercial sexual exploitation at any time.</span><sup class="reference" data-dcnode-id="5875" id="cite_ref-99"><a data-dcnode-id="5876" href="#cite_note-99"><span data-dcnode-id="5877" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5874" instrument_node="">
</span></p><span data-dcnode-id="5872" instrument_node="">
</span><h3 data-dcnode-id="5861"><span data-dcnode-id="5871" id="History_.28England.29"></span><span class="mw-headline" data-dcnode-id="5869" id="History_(England)"><span data-dcnode-id="5870" instrument_node="">History (England)</span></span><span class="mw-editsection" data-dcnode-id="5862"><span class="mw-editsection-bracket" data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">[</span></span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D35" title="Edit section: History (England)"><span data-dcnode-id="5866" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5860" instrument_node="">
</span><p data-dcnode-id="5835"><span data-dcnode-id="5859" instrument_node="">According to anthropologist Samuel Pyeatt Menefee, in late 17th and 18th century Britain, parents in poverty "sold their children (actually, their children's services, but to all intents and purposes their persons as well)".</span><sup class="reference" data-dcnode-id="5856" id="cite_ref-FOOTNOTEMenefee1981163–165_100-0"><a data-dcnode-id="5857" href="#cite_note-FOOTNOTEMenefee1981163%E2%80%93165-100"><span data-dcnode-id="5858" instrument_node="">[100]</span></a></sup><sup class="reference" data-dcnode-id="5853" id="cite_ref-101"><a data-dcnode-id="5854" href="#cite_note-101"><span data-dcnode-id="5855" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5852" instrument_node=""> Sale motivations were more economic than for wife sales</span><sup class="reference" data-dcnode-id="5849" id="cite_ref-FOOTNOTEMenefee1981165_102-0"><a data-dcnode-id="5850" href="#cite_note-FOOTNOTEMenefee1981165-102"><span data-dcnode-id="5851" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5848" instrument_node=""> and prices, drawing from limited data, "appear to have been fairly high".</span><sup class="reference" data-dcnode-id="5845" id="cite_ref-FOOTNOTEMenefee1981165_n._20_103-0"><a data-dcnode-id="5846" href="#cite_note-FOOTNOTEMenefee1981165_n._20-103"><span data-dcnode-id="5847" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5844" instrument_node=""> Many of the boys sold were climbing boys for chimney sweeps until they were no longer small enough.</span><sup class="reference" data-dcnode-id="5841" id="cite_ref-FOOTNOTEMenefee1981163_104-0"><a data-dcnode-id="5842" href="#cite_note-FOOTNOTEMenefee1981163-104"><span data-dcnode-id="5843" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5840" instrument_node=""> Prostitution was another reason for selling a child, usually a girl. One sale was of a niece; another was the sale by a man of the daughter of a woman domestic partner who also ran his business. Some children were stolen and then sold.</span><sup class="reference" data-dcnode-id="5837" id="cite_ref-FOOTNOTEMenefee1981164–165_nn._19,_21_105-0"><a data-dcnode-id="5838" href="#cite_note-FOOTNOTEMenefee1981164%E2%80%93165_nn._19,_21-105"><span data-dcnode-id="5839" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5836" instrument_node="">
</span></p><span data-dcnode-id="5834" instrument_node="">
</span><h2 data-dcnode-id="5824"><span class="mw-headline" data-dcnode-id="5832" id="Causes_of_Child_Trafficking"><span data-dcnode-id="5833" instrument_node="">Causes of Child Trafficking</span></span><span class="mw-editsection" data-dcnode-id="5825"><span class="mw-editsection-bracket" data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">[</span></span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D36" title="Edit section: Causes of Child Trafficking"><span data-dcnode-id="5829" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5823" instrument_node="">
</span><p data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">Scholarly research has indicated that there is no root cause for child trafficking. There are, however, multiple reasons which contribute to high numbers such as poverty, humanitarian crisis and lack of education. It is additionally important to note that migration can also be voluntary.
</span></p><span data-dcnode-id="5820" instrument_node="">
</span><h3 data-dcnode-id="5810"><span class="mw-headline" data-dcnode-id="5818" id="Poverty"><span data-dcnode-id="5819" instrument_node="">Poverty</span></span><span class="mw-editsection" data-dcnode-id="5811"><span class="mw-editsection-bracket" data-dcnode-id="5816"><span data-dcnode-id="5817" instrument_node="">[</span></span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D37" title="Edit section: Poverty"><span data-dcnode-id="5815" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5812"><span data-dcnode-id="5813" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5809" instrument_node="">
</span><p data-dcnode-id="5791"><span data-dcnode-id="5808" instrument_node="">Poverty is the leading cause for child trafficking worldwide.</span><sup class="reference" data-dcnode-id="5805" id="cite_ref-106"><a data-dcnode-id="5806" href="#cite_note-106"><span data-dcnode-id="5807" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5804" instrument_node=""> Often parents are not able to provide for their families and consequentially exploit their children for financial reasons. These influencers lead to children being more inclined to take riskier jobs in order to sustain life for themselves and their families.</span><sup class="reference" data-dcnode-id="5801" id="cite_ref-107"><a data-dcnode-id="5802" href="#cite_note-107"><span data-dcnode-id="5803" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5800" instrument_node=""> The decision for parents to expose their children for child trafficking, due to poverty, is not always for money incentives, but also because a lack of education causes them to believe that migration elsewhere will provide their children with more opportunities, which will help them escape chronic poverty.</span><sup class="reference" data-dcnode-id="5797" id="cite_ref-108"><a data-dcnode-id="5798" href="#cite_note-108"><span data-dcnode-id="5799" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5796" instrument_node=""> Sometimes children are orphaned as a result of poverty, leaving them in the hands of child traffickers. There are estimated to be around 120 million children living on the streets in the world (30 million in Africa, 30 million in Asia, and 60 million in South America),</span><sup class="reference" data-dcnode-id="5793" id="cite_ref-109"><a data-dcnode-id="5794" href="#cite_note-109"><span data-dcnode-id="5795" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5792" instrument_node=""> making children vulnerable and thus easy targets.
</span></p><span data-dcnode-id="5790" instrument_node="">
</span><h3 data-dcnode-id="5780"><span class="mw-headline" data-dcnode-id="5788" id="Humanitarian_Crisis"><span data-dcnode-id="5789" instrument_node="">Humanitarian Crisis</span></span><span class="mw-editsection" data-dcnode-id="5781"><span class="mw-editsection-bracket" data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">[</span></span><a data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D38" title="Edit section: Humanitarian Crisis"><span data-dcnode-id="5785" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5779" instrument_node="">
</span><p data-dcnode-id="5769"><span data-dcnode-id="5778" instrument_node="">Child trafficking is 20-30%</span><sup class="reference" data-dcnode-id="5775" id="cite_ref-:02_110-0"><a data-dcnode-id="5776" href="#cite_note-:02-110"><span data-dcnode-id="5777" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5774" instrument_node=""> higher after natural disasters. This was seen after the 2015 earthquake and 2010 earthquake in Haiti. The increase of sex trafficking after natural disasters results in the victimization of girls under the age of 18, specifically 33%.</span><sup class="reference" data-dcnode-id="5771" id="cite_ref-:02_110-1"><a data-dcnode-id="5772" href="#cite_note-:02-110"><span data-dcnode-id="5773" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5770" instrument_node=""> of girls under the age of 18 in such areas. The reason is increased vulnerability and financial instability which arises after natural disasters hit.
</span></p><span data-dcnode-id="5768" instrument_node="">
</span><h3 data-dcnode-id="5758"><span class="mw-headline" data-dcnode-id="5766" id="Lack_of_Education"><span data-dcnode-id="5767" instrument_node="">Lack of Education</span></span><span class="mw-editsection" data-dcnode-id="5759"><span class="mw-editsection-bracket" data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">[</span></span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D39" title="Edit section: Lack of Education"><span data-dcnode-id="5763" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5757" instrument_node="">
</span><p data-dcnode-id="5751"><span data-dcnode-id="5756" instrument_node="">A lack of education and literacy furthermore makes families more vulnerable to traffickers. Parents are often unaware of the negative consequences of child trafficking and voluntarily send their children away. Additionally, children are often not aware of their rights and lack understanding regarding which of their rights are violated. There is a need to educate children of their rights, because it will reduce the likelihood of manipulation and forced industry work. Informing children of their right to education will increase the net enrollment and grade completion rate.</span><sup class="reference" data-dcnode-id="5753" id="cite_ref-111"><a data-dcnode-id="5754" href="#cite_note-111"><span data-dcnode-id="5755" instrument_node="">[111]</span></a></sup><span data-dcnode-id="5752" instrument_node="">
</span></p><span data-dcnode-id="5750" instrument_node="">
</span><h3 data-dcnode-id="5740"><span class="mw-headline" data-dcnode-id="5748" id="Voluntary_Migration"><span data-dcnode-id="5749" instrument_node="">Voluntary Migration</span></span><span class="mw-editsection" data-dcnode-id="5741"><span class="mw-editsection-bracket" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">[</span></span><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D40" title="Edit section: Voluntary Migration"><span data-dcnode-id="5745" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5739" instrument_node="">
</span><p data-dcnode-id="5729"><span data-dcnode-id="5738" instrument_node="">In 2013 youth migrants, ages 15–24 made up 12% of total migration.</span><sup class="reference" data-dcnode-id="5735" id="cite_ref-112"><a data-dcnode-id="5736" href="#cite_note-112"><span data-dcnode-id="5737" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5734" instrument_node=""> The term "child trafficking" is often misused when migration is voluntary. "Youth migration" refers to youth choosing to leave homes to access opportunities elsewhere. Opportunities such as quality education, employment, and adventure are often scarce in rural areas, which is why migration often occurs from rural to urban areas. The ILO stated that 27 million young people leave their countries of birth to seek employment abroad as international migrants.</span><sup class="reference" data-dcnode-id="5731" id="cite_ref-113"><a data-dcnode-id="5732" href="#cite_note-113"><span data-dcnode-id="5733" instrument_node="">[113]</span></a></sup><span data-dcnode-id="5730" instrument_node=""> In order to make migration safer for youth the UN adopted "Addressing migration opportunities and challenges is central to achieving sustainable economic and social development" to their new development goals, which are to be released in 2030.
</span></p><span data-dcnode-id="5728" instrument_node="">
</span><h2 data-dcnode-id="5718"><span class="mw-headline" data-dcnode-id="5726" id="Impacts"><span data-dcnode-id="5727" instrument_node="">Impacts</span></span><span class="mw-editsection" data-dcnode-id="5719"><span class="mw-editsection-bracket" data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">[</span></span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D41" title="Edit section: Impacts"><span data-dcnode-id="5723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5717" instrument_node="">
</span><h3 data-dcnode-id="5707"><span class="mw-headline" data-dcnode-id="5715" id="Children_and_families"><span data-dcnode-id="5716" instrument_node="">Children and families</span></span><span class="mw-editsection" data-dcnode-id="5708"><span class="mw-editsection-bracket" data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">[</span></span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrafficking_of_children%26action%3Dedit%26section%3D42" title="Edit section: Children and families"><span data-dcnode-id="5712" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5706" instrument_node="">
