</span><p data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Our team has decades of experience fighting human trafficking domestically and abroad in local and federal law enforcement, as well as providing direct support to survivors. We work with and for the anti-trafficking field, collaborating directly with survivors of sex and labor trafficking, current and former law enforcement, social service agencies, and policymakers.</span></p><span data-dcnode-id="3713" instrument_node="">

</span><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">This training was one of the best I have attended. I was able to use what I learned in prosecuting a labor trafficking case soon after having attended the institute and we continue to put lessons learned to use in investigating and prosecuting illicit massage parlor trafficking cases. The lessons learned concerning cultural and trauma-informed breakthroughs were invaluable.</span></p><span data-dcnode-id="2771" instrument_node="">

</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Their model of training is inclusive of industry experts, and really helped give the people in attendance access to firsthand knowledge from survivors, service providers, law enforcement officers, and prosecutors. Their interactive exercises helped us apply the lessons to the reality of our jobs. And their style of facilitating conversation from people in attendance really helped us learn from each other.</span></p><span data-dcnode-id="2733" instrument_node="">

</span><p data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">There are a number of organizations which conduct training in the areas of human trafficking and I have both been invited to and attended a number of different classes. The difference with Collective Liberty is their training class is well organized, acutely focused on the specific issues and offers practical-realistic solutions on how to combat human trafficking issues throughout our cities. This is the best, most useful training I have attended in my career.</span></p><span data-dcnode-id="2695" instrument_node="">
