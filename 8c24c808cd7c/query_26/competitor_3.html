</span><h2 class="c-heading" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Synthetic Data Generator</span></h2><span data-dcnode-id="1650" instrument_node="">

</span><h3 class="c-heading" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">The need</span></h3><span data-dcnode-id="1612" instrument_node=""> </span><div class="c-paragraph" data-dcnode-id="1608"><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Sharing sensitive datasets poses both utility and privacy challenges.&nbsp;Anonymization methods may not capture accurate statistics or protect against all kinds of privacy leaks, while differential privacy doesn’t make datasets available for unrestricted analysis with group-level privacy protection.</span></p><span data-dcnode-id="1609" instrument_node="">
</span></div><span data-dcnode-id="1607" instrument_node="">
</span></div><span data-dcnode-id="1605" instrument_node="">
</span></div><span data-dcnode-id="1603" instrument_node="">
</span></div><span data-dcnode-id="1601" instrument_node="">
</span><div data-dcnode-id="1585" data-grid="col-4 pad-6x"><span data-dcnode-id="1600" instrument_node="">
</span><div data-dcnode-id="1587" data-grid="col-12"><span data-dcnode-id="1599" instrument_node="">
</span><div class="m-content-placement-item f-size-medium" data-dcnode-id="1589"><span data-dcnode-id="1598" instrument_node="">
</span><h3 class="c-heading" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">The idea</span></h3><span data-dcnode-id="1595" instrument_node=""> </span><div class="c-paragraph" data-dcnode-id="1591"><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">We believe that in many cases, the most practical method for sharing sensitive information isn’t sharing the actual datasets, but instead sharing interfaces that showcase derived datasets that are inherently anonymous.</span></p><span data-dcnode-id="1592" instrument_node="">
</span></div><span data-dcnode-id="1590" instrument_node="">
</span></div><span data-dcnode-id="1588" instrument_node="">
</span></div><span data-dcnode-id="1586" instrument_node="">
</span></div><span data-dcnode-id="1584" instrument_node="">
</span><div data-dcnode-id="1568" data-grid="col-4 pad-6x"><span data-dcnode-id="1583" instrument_node="">
</span><div data-dcnode-id="1570" data-grid="col-12"><span data-dcnode-id="1582" instrument_node="">
</span><div class="m-content-placement-item f-size-medium" data-dcnode-id="1572"><span data-dcnode-id="1581" instrument_node="">
</span><h3 class="c-heading" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">The solution</span></h3><span data-dcnode-id="1578" instrument_node=""> </span><div class="c-paragraph" data-dcnode-id="1574"><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">We developed and open-source Synthetic Data Showcase, an automated pipeline for generating both synthetic and aggregate datasets that conserve the utility of the original, along with dashboards for visualizing and exploring these derived datasets.</span></p><span data-dcnode-id="1575" instrument_node="">
</span></div><span data-dcnode-id="1573" instrument_node="">
</span></div><span data-dcnode-id="1571" instrument_node="">

</span><div data-dcnode-id="1528" data-m="{&quot;cN&quot;:&quot;R2Banner 1&quot;,&quot;cT&quot;:&quot;Module_coreui-banner&quot;,&quot;id&quot;:&quot;m1r2a2&quot;,&quot;sN&quot;:1,&quot;aN&quot;:&quot;r2a2&quot;}" data-module-id="Authoring.AllModules|primaryR2|coreui-region|coreui-banner-vmqpmth|coreui-banner" id="coreui-banner-vmqpmth"><span data-dcnode-id="1557" instrument_node="">
</span><div class="m-banner" data-dcnode-id="1530" data-grid="col-12"><span data-dcnode-id="1556" instrument_node="">
</span><h2 class="c-heading-3" data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Combatting trafficking with synthetic data</span></h2><span data-dcnode-id="1553" instrument_node=""> </span><p class="c-caption-2" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node=""> </span></p><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">This challenge arose through Microsoft’s participation in&nbsp;Tech Against Trafficking (TAT)&nbsp;– a coalition of technology companies working to combat trafficking with technology. We worked together to support the&nbsp;Counter Trafficking Data Collaborative (CTDC)&nbsp;– an initiative run by IOM to create the world’s largest database on identified victims of trafficking that would serve to inform evidence-based policy against human trafficking.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Explore how we worked to enable policy makers to view and explore this data in a way that preserves the privacy of groups of data subjects, preserves the utility of data sets; and is accessible to all data stakeholders.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1544"></p><span data-dcnode-id="1543" instrument_node="">

</span><h2 class="c-heading" data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Protecting vulnerable groups in datasets</span></h2><span data-dcnode-id="1295" instrument_node="">
</span><div class="c-paragraph" data-dcnode-id="1291"><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">While a dataset may be de-identified, the selection of specific attributes within that dataset could offer opportunities for traffickers to “drill down” to a single individual or small, identifiable group within the dataset. A trafficker’s knowledge of their victims could then allow them to infer who those de-identified individuals are based on their distinctive combination of attributes.</span></p><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">

</span><h3 class="c-heading" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Synthesizing data with full k-anonymity</span></h3><span data-dcnode-id="1078" instrument_node="">
</span><div class="c-paragraph" data-dcnode-id="1065"><p data-dcnode-id="1067"><span data-dcnode-id="1077" instrument_node="">Our approach addresses privacy risks by treating each column as potentially identifying, protecting all combinations of attributes. By using synthetic data, we provide a level of indirection – any combination of attributes, even if unique, corresponds to at least </span><i data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">k</span></i><span data-dcnode-id="1074" instrument_node=""> records in the sensitive dataset. Singling-out attacks are prevented because groups smaller than </span><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">k</span></i><span data-dcnode-id="1071" instrument_node=""> are masked, and groups larger than </span><i data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">k</span></i><span data-dcnode-id="1068" instrument_node=""> are protected by safety in numbers.</span></p><span data-dcnode-id="1066" instrument_node="">
</span></div><span data-dcnode-id="1064" instrument_node="">
</span><a aria-label="Learn about k -anonymity, opens in new tab" class="c-call-to-action c-glyph" data-dcnode-id="1059" data-m="{&quot;cN&quot;:&quot;Learn about k-anonymity&quot;,&quot;cT&quot;:&quot;0&quot;,&quot;id&quot;:&quot;n1c1m3r2a2&quot;,&quot;sN&quot;:1,&quot;aN&quot;:&quot;c1m3r2a2&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K-anonymity" target="_blank"><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Learn about k-anonymity</span></span><span data-dcnode-id="1060" instrument_node="">
</span></a><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">

</span><h3 class="c-heading" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Safeguarding privacy while preserving utility</span></h3><span data-dcnode-id="840" instrument_node="">
</span><div class="c-paragraph" data-dcnode-id="836"><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">We replace sensitive data with synthetic data that preserves privacy while still ensuring utility. Because common attribute combinations are unaffected, the resulting synthetic data accurately captures the counts of these combinations, which are often important for both sensemaking and decision making.</span></p><span data-dcnode-id="837" instrument_node="">
</span></div><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span></section><span data-dcnode-id="831" instrument_node="">
</span></div><span data-dcnode-id="829" instrument_node="">
</span><div data-dcnode-id="788" data-m="{&quot;cN&quot;:&quot;R2ContentRichBlock 1&quot;,&quot;cT&quot;:&quot;Module_coreui-contentrichblock&quot;,&quot;id&quot;:&quot;m5r2a2&quot;,&quot;sN&quot;:5,&quot;aN&quot;:&quot;r2a2&quot;}" data-module-id="Authoring.AllModules|primaryR2|coreui-region|coreui-contentrichblock-1efsl4d|coreui-contentrichblock" id="coreui-contentrichblock-1efsl4d"><span data-dcnode-id="828" instrument_node="">
</span><div class="m-rich-content-block context-ucx" data-dcnode-id="790" data-grid="col-12"><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Technical details for Synthetic Data Generator</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">Synthetic datasets are produced using our concept of, and algorithm for, </span><i data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">k&nbsp;</span></i><span data-dcnode-id="820" instrument_node="">-synthetic anonymity. The algorithm constructs synthetic records whose attribute combination values appear at least a pre-determined number of times, </span><i data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">k</span></i><span data-dcnode-id="817" instrument_node="">, in the original, sensitive dataset. Attribute combinations that do not meet this privacy resolution aren’t disclosed to prevent singling out individual data subjects or linking small groups of subjects to known individuals in the real world.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">The synthetic data is complemented with precomputed aggregate data for reportable, short attribute combinations that appear in the sensitive dataset. We enable the selection of a privacy resolution </span><i data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">k</span></i><span data-dcnode-id="811" instrument_node=""> that provides both a minimum reporting threshold and rounding precision to prevent disclosing small counts that can pose privacy risks.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">The synthetic and aggregate data are automatically loaded into a Power BI interface for interactive, privacy-preserving data exploration. Capable of being easily customized to meet specific visualization goals, these dashboards enable rich and code-free analysis independent of data science expertise.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">Synthetic Data Showcase started as a project within our </span><a aria-label="Tech Against Trafficking" class="c-hyperlink" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techagainsttrafficking.org/"><span data-dcnode-id="804" instrument_node="">Tech Against Trafficking</span></a><span data-dcnode-id="802" instrument_node=""> initiative, and we believe that its ability to improve the representation of at-risk groups can help us solve pressing societal problems and build a more resilient world.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="799" instrument_node="">We are pleased to announce that </span><a aria-label="Synthetic Data Showcase has been adopted" class="c-hyperlink" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aka.ms/AAdcshy"><span data-dcnode-id="798" instrument_node="">Synthetic Data Showcase has been adopted</span></a><span data-dcnode-id="796" instrument_node=""> by the UN International Organization for Migration (</span><a aria-label="IOM" class="c-hyperlink" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iom.int/"><span data-dcnode-id="795" instrument_node="">IOM</span></a><span data-dcnode-id="793" instrument_node="">).</span></p><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node="">
