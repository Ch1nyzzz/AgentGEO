</span><h2 class="t-border t-border--4 block-title field__label aos-init" data-aos="fade-up" data-aos-delay="0" data-dcnode-id="973" id="introduction"><span data-dcnode-id="974" instrument_node="">Introduction</span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Humanitarian needs are growing with the number of displaced, exploited, marginalised and vulnerable people being higher than it ever was before, and resulting in human rights abuses.</span></p><span data-dcnode-id="969" instrument_node="">
</span><ul data-dcnode-id="949"><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Approximately 79.5 million people were displaced in the world in 2019 – nearly 1% of humanity.&nbsp;</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Over a billion people are without legal identity.</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">It has been estimated that over 40 million people are in modern day slavery – a human rights abuse – at any given time.&nbsp;</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Nearly half of human trafficking victims are women, and 35% of women globally have experienced physical or sexual violence at some point in their lifetime.&nbsp;</span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Women and girls, rural dwellers, ethnic minorities, people with disabilities, migrants and refugees, and the LGBTQ community are systematically excluded and denied human rights, and deprived of opportunities and benefits of societies and economies.</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Individual, local, community and regional socio-economic or political instability, coupled with natural disasters and public health emergencies increases those already in precarious situations to further harm and marginalisation, and exposes a new vulnerable group to harm and marginalisation.</span></li><span data-dcnode-id="950" instrument_node="">
</span></ul><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Data and data science/AI methods have the potential to contribute to approaches and solutions, and to make critical step changes in the advancement needed to tackle societies greatest humanitarian challenges, thereby addressing the SDGs rooted in a human rights approach and serving in the administration of systems and the Rule of Law. To realise the utility and power of data and AI, responsible and inclusive practices must be developed and practiced.</span></p><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span><div class="clearfix field field--body field--text-with-summary field--label-hidden field__item" data-dcnode-id="738" property="schema:text"><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Our vision</span></h3><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">We envision a world that is more safe, fair, just and inclusive for all.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">We believe that new forms of data and data flows, new algorithms and multi-sector and multi-disciplinary collaborations are the key to this future.</span></p><span data-dcnode-id="934" instrument_node="">
</span><h3 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Theory of change</span></h3><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Through co-design and development of inclusive and responsible data and AI methods, tools, frameworks and practices, data and data flows can be unlocked and harnessed whilst preserving privacy, to inform new insights and opportunities for services and interventions for prevention, preparedness and protection against harm; accelerate prosperity and inclusivity for all; improve the resilience of institutions, systems and communities, and serve in broader human services, systems and the Rule of Law.</span></p><span data-dcnode-id="928" instrument_node="">
</span><h2 class="aos-init" data-aos="fade-up" data-aos-delay="0" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Our mission</span></h2><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">We will empower government (public) and non-profit sectors by co-designing, developing and deploying&nbsp;new inclusive responsible data and AI methods, tools, and frameworks</span><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="921" instrument_node="">working in partnership across sectors to build new pathways for innovation and change with an aim to safeguard human rights and address humanitarian challenges.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><img alt="Challenges" class="align-left" data-dcnode-id="918" data-entity-type="file" data-entity-uuid="f3d83cdd-5916-48fe-82c5-7417b5211e94" height="685" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turing.ac.uk/sites/default/files/inline-images/CHAL%2523_0.png&amp;raw" width="1217"></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">&nbsp;</span></p><span data-dcnode-id="913" instrument_node="">
</span><h2 class="aos-init" data-aos="fade-up" data-aos-delay="0" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Related projects</span></h2><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Below are the projects related to this theme, categorised by their individual goal.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Goal: Safeguard people and communities from harm</span></h3><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="897"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Identifying national drivers of a hidden phenomenon</span></strong><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
</span><em data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">How can data-driven approaches shed light on the complexities of national prevalence of modern slavery?</span></em></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">A number of the UN sustainable development goals (SDGs) attempt to measure and quantify subtle and intricate social issues, such as gender equality and exploitation. The adoption of SDGs has encouraged the quantification of complex social issues which are challenging to measure directly, particularly if the problem is largely hidden, as with modern-day slavery. Due to the unique hidden, noisy and disparate nature of modern-slavery data, this work generates hybrid models around a principal of combining theory from the field, informative prior statistical assumptions along with data-driven machine learning techniques. Data is scraped from multiple open sources including the World Bank, Varieties of Democracy Project, The Woman Stats Project, and the Global Slavery Index. This project aims to apply machine learning methods to better predict and explain complex factors that make a particular country or geographic region and its people vulnerable to modern slavery practices. It aims to do this in the context of small n and large p, and studies the causal non-linear structures, predictive thresholds, and dependencies between the variables predicting slavery.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">COVID-19 and its impact on the most exploited</span></strong><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
</span><em data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">How has COVID-19 impacted Modern Day Slavery (MDS) with respect to the scale and nature of exploitation?</span></em></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">COVID-19 has caused disruption to most facets of the economy, and it is expected that it is no different for forced and exploitative labour. Already a hidden population, both NGOs and government departments are trying to understand where these modern day slaves have gone, and what work/industries they may have been transitioned to. This work applies a mixed method approach to examining data capture at the population/aggregate level – open publicly available scraped data, and the small scale individual – interviews. The interviews inform and help to augment both population data capture sources and inferences.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="875"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Measuring and capturing hidden populations</span></strong><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
</span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">How can we measure and capture hidden populations?</span></em></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">From the typologies of modern slavery (including domestic servitude. labour exploitation at sea. sexual exploitation online) to domestic violence to terrorism, vulnerable and exploited people are often hidden in plain sight. This work explores (i) the utility of existing methods to capture hidden populations including multiple systems estimation and survey methods, and (ii) development of hybrid or hierarchical methods that makes (a) the use of unstructured data and proxies, and (b) the role of privacy enhancing technologies (PETs) to open data access to inform and improve data gaps.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="864"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Modelling pathways to exploitation</span></strong><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
</span><em data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">How can we harness individual narratives to inform interventions and policies?</span></em></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Individuals provide narratives of the accounts that led to exploitation or conviction, an adverse outcome. These narratives require natural language understanding to identify the key events that led to the adverse outcome and potential opportunities to intervene for other vulnerable people. This work</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">aims to couple the use of natural language processing with chain event graph (probabilistic graphical model) technologies to develop a new tool to create a new data source and approach to inform interventions and policy opportunities.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="850"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Mapping and estimating vulnerability to exploitation</span></strong><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
</span><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">How can we unstructured data augmented by individual household data inform interventions and policies to safeguard against vulnerabilities?</span></em></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Many people across the world are living in vulnerable circumstances because of high poverty, isolation, or weak infrastructure. Collecting data on these people to better understand their needs, and to help protect them from exploitation, is a challenge. This project combines survey responses with digital footprint data such as mobile phone and mobile money records to map and predict such vulnerability, allowing for (i) the identification of communities which are most at risk of being exploited in cities and hyper-local areas; (ii) a more connected landscape of vulnerabilities and where and when a particular intervention might be required, helping to ensure aid is getting to those most in need, (iii) the study of how these geographic risk factors interact with individual level data, and (iv) the investigation of the role of digital data sources as proxies for different types of vulnerability, consequently alleviating the resource expensive task of directly collecting data through surveys.</span></p><span data-dcnode-id="846" instrument_node="">
</span><h3 data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Goal: Build resilient institutions, systems &amp; communities</span></h3><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="836"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Leveraging data to enable investor action in relation to modern slavery risks</span></strong><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><em data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">What is the potential of data-driven approaches to provide investors with actionable information about modern slavery risks?</span></em></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">There is increasing recognition of the important role that investors can play in addressing modern slavery risks that exist within the private sector. Yet, investors are faced with the combined challenges of (i) scarce actionable information on investee companies’ exposure to modern slavery risks and (ii) information being presented in ways that are difficult to integrate with established and scalable risk management processes. This project addresses these challenges by delivering a landscape analysis that maps the role of data in enabling investors to integrate modern slavery risks into both selection decisions and active ownership strategies.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="825"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Participatory AI for tackling sexual exploitation online</span></strong><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
</span><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">How can we measure the scale, identify the nature, and disrupt risk of sexual exploitation online?</span></em></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Of the 24.9 million forced labour victims estimated in 2016, 4.8 million were estimated victims of forced sexual exploitation. Women and girls account for 99% of victims in the commercial sex industry. Rising smartphone ownership and cheap, fast internet use has taken slavery into the modern digital age where there are potentially more risks for exploitation, more victims, more perpetrators, and customers, and where traditional law enforcement and intelligence techniques and capabilities are not as strong as they are offline. With the internet promoting the availability of sex and sex work in the UK, there is up to 100 “adult services” websites carrying adverts. Whilst advertisements on ASWs may be legitimate sex workers operating legally, there is a risk that some ads may appear legitimate in nature but may be managed by another individual or organised crime groups who are exploiting victims of modern slavery through organised prostitution. This work aims to detect and distinguish between a signal of risk of coerced versus non-coerced activity through features in the language and images of advertisements to measure the scale and nature of exploitation. Lack of ground truth ads to the complexity of the challenge, and hence, we use proxies in the machine learning approach. This project aims to develop methods, tools and best practice principles in the co-design and development of data science and AI techniques to help policy makers and frontline non-profit and law enforcement agencies to tackle sexual exploitation online.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="814"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Data science/AI for tackling forced labour at sea</span></strong><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
</span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">How can we capture and identify risk of hidden and complex human rights abuses and human security challenges at sea?</span></em></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Capture fishing is a labour intensive global multi-billion US$ business in often remote, isolated and physically dangerous environments. Over the past decade NGOs, media and law enforcement agencies have uncovered the widespread existence of labour exploitation, forced labour, human trafficking and slavery in this industry. The identification and pursuit of these abuses is complicated by several factors including the remoteness of locations and ease at which offenders can hide or disguise their activities. However an increased understanding of the economic and environmental causes and drivers of vulnerability combined with increasing observational ability through remote sensing technology offers opportunities to use explainable Bayesian statistical techniques, informed with domain knowledge, qualitative and contextual information from cases and survivor narratives, and quantitative remote sensing data from a variety of sources on vessel movements and communications, to build predictive models on vessels and individual actors. This project aims to develop statistical models and AI technology to support policy makers and front-line agencies to identify and combat these human rights abuses and human security challenges.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="803"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Statistics and the law: probabilistic modelling of forensic evidence</span></strong><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">How probabilistic reasoning assist in serving in the administration of justice?</span></em></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Forensic science plays an increasingly important role in contributing to national security resilience and the successful administration of the justice system. Major ongoing technological innovation has propelled forensic science development and sourced new types of forensic evidence. Such technological and scientific advances must be matched by well-developed tools for the analysis, evaluation and interpretation of evidence in order to successfully exploit innovations in the administration of justice. This project draws upon real cases and engages with the forensic science, legal and policing community to develop a probabilistic framework for the evaluation of complex forensic evidence, that deals with the multiple statistical issues and complex data structures that can occur. There is particular interest in understanding activity level propositions – that is relating the evidence to the activity in question and not just source level attribution, using graphical models.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="796"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Enabling trust, security and privacy for policy innovation in tackling modern slavery</span></strong></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Modern slavery is a policy area which often gives rise to a needed cooperation amongst government agencies, non-profit and for-profit institutions to share data, tools and resources to effectively deliver services, inform and enact policies and practices, enable change to safeguard people and institutions, and responds to emerging issues. Despite gallant efforts to create platforms to facilitate data sharing and the increased appetite for data trusts, barriers to data sharing can be described by twinning concerns for (i) data underuse and (ii) data overuse or misuse, giving rise to personal rights, informed consent, and myriad of data privacy, security and trust issues. This project involves a multi-disciplinary team (consisting of members of members of The Alan Turing Institute, the Bonavero Institute, and the Open Data Institute) that will conduct structured and unstructured interviews and round table discussions with members of the UK anti-slavery stakeholder, data and algorithmic user, and data steward/provider community to (i) understand the barriers and gates to trust, security and privacy that would enable data and algorithmic policy innovation for modern slavery and (ii) the necessary first steps to (a) realise the value in data and algorithmic approaches when legal or cultural threshold bar progress, (b) identify personal rights and jurisdictional challenges, particularly in light of UK’s changing status in relation to the EU, and (c) develop and highlight new insights that can inform PET and law research that highlights data and algorithmic governance, and open opportunity for research, policy and international collaboration.</span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Goal: Accelerate opportunity to build inclusive societies &amp; economies</span></h3><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="781"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">AI, equality and human rights</span></strong><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
</span><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">How can AI better serve and benefit all members and all sectors of the world</span></em><span data-dcnode-id="782" instrument_node="">?</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">With a greater need for humanitarian response and the opportunity that data and AI presents in contributing to solutions that can improve responses, this work explores and identifies methods, opportunities and practices (through focused projects) to enable AI development for the benefit of all at an individual, sector, and global level. In light of accelerated AI responses to tackle COVID-19, this work considers data representativeness, opportunities for participation and consent, and access and availability for the social, health and public safety benefits of AI technologies.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Inclusive and responsible data and AI for justice and humanitarian innovation</span></strong><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">
</span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">How can inclusive principles drive responsible AI innovation?</span></em></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">With the excitement of data science/AI capability, this work develops a framework with a set of inclusive data and AI principles and practices from data representativeness to co-design to fairness and access as a way to drive responsible AI innovation (incl. explainability, robustness, etc.) from design to development to sustained deployment. It also considers the Rule of Law, principles of proportionality and necessity, and data readiness, consent and retention as a basis and bounds to consider in the design, development and deployment of AI to respond to both the status quo of services to safeguard vulnerable people and emergent crises local (39 Vietnamese migrants) or international (global migration) levels and public health emergencies (e.g. COVID-19). This project is developing an inclusive AI practice through the participator AI for tackling sexual exploitation online.</span></p><span data-dcnode-id="766" instrument_node="">
</span><h2 class="aos-init" data-aos="fade-up" data-aos-delay="0" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">People&nbsp;</span></h2><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Organisers:</span></strong><span data-dcnode-id="760" instrument_node=""> Anjali Mazumder, Florian Ostmann, Mark Briers</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="752"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Co-Is, Turing Fellows, Researchers and Collaborators</span></strong><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">:</span></strong><span data-dcnode-id="753" instrument_node=""> Jim Smith,&nbsp;Weisi Guo, Rosa Lavelle-Hill, Oliver Bunnin, Ruth King, Jat Singh, Eirini Malliaraki &amp; Ser-Huang Poon</span></p><span data-dcnode-id="751" instrument_node="">
</span><h2 class="aos-init" data-aos="fade-up" data-aos-delay="0" data-dcnode-id="748"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Partnerships</span></strong></h2><span data-dcnode-id="747" instrument_node="">

</span><p data-dcnode-id="740"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delta87.org/code87/"><span data-dcnode-id="742" instrument_node="">Code 8.7</span></a></p><span data-dcnode-id="739" instrument_node="">
