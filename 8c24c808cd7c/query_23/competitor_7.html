</span><meta content="Companies are using AI to prevent and detect everything from routine employee theft to insider trading — and even to predict and prevent crimes. But determining whether AI crime-fighting solutions are a good strategic fit for a company depends on whether the benefits outweigh the risks that accompany them. The increased use of AI tools for crime prevention could cause external risks to cascade in unexpected ways. A company could lose its credibility with the public, regulators, and other stakeholders in myriad ways — for example, if there are false alerts that mistakenly identify people as “suspicious” or “criminal” due to a racial bias unintentionally built into the system. Or, at the other end of the spectrum, if they miss criminal activities. But given the wealth of data available today, and the rising expectations of customers and public authorities when it comes to protecting and managing that data, many companies have decided that using AI is one of the only ways to keep up with increasingly sophisticated criminals." data-dcnode-id="2276" name="description"><span data-dcnode-id="2275" instrument_node="">

</span><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">Companies are using AI to prevent and detect everything from routine </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//losspreventionmedia.com/magazine-reviews/ai-retail-store-future/"><span data-dcnode-id="1086" instrument_node="">employee theft</span></a><span data-dcnode-id="1084" instrument_node=""> to insider trading. Many banks and large corporations employ artificial intelligence to detect and prevent fraud and money laundering. Social media companies use machine learning to block illicit content such as child pornography. Businesses are constantly experimenting with new ways to use artificial intelligence for better risk management and faster, more responsive fraud detection — and even to predict and prevent crimes.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">While today’s basic technology is not necessarily revolutionary, the algorithms it uses and the results they can produce are. For instance, banks have been using transaction monitoring systems for decades based on pre-defined binary rules that require the output to be manually checked. The success rate is generally low: On average, only 2% of the transactions flagged by the systems ultimately reflect a true crime or malicious intent. By contrast, today’s machine-learning solutions use predictive rules that automatically recognize anomalies in data sets. These advanced algorithms can significantly reduce the number of false alerts by filtering out cases that were flagged incorrectly, while uncovering others missed using conventional rules.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Given the wealth of data available today, and the rising expectations of customers and public authorities when it comes to protecting and managing that data, many companies have decided that this is one of the only ways to keep up with increasingly sophisticated criminals. Today, for example, social media companies are expected to uncover and remove terrorist recruitment videos and messages almost instantly. In time, AI-powered crime-fighting tools could become a requirement for large businesses, in part because there will be no other way to rapidly detect and interpret patterns across billions of pieces of data.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><article-promo class="article-promo promo--half" data-dcnode-id="1043"><span data-dcnode-id="1075" instrument_node="">
</span><h4 data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Insight Center</span></h4><span data-dcnode-id="1072" instrument_node="">
</span><div class="promo-contents" data-dcnode-id="1045"><span data-dcnode-id="1071" instrument_node="">
</span><ul data-dcnode-id="1047"><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1069" instrument_node="">
</span><figure class="mbm" data-dcnode-id="1068"></figure><span data-dcnode-id="1067" instrument_node=""> </span><h6 class="hed mbs" data-dcnode-id="1064"><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/insight-center/adopting-ai"><span data-dcnode-id="1066" instrument_node="">Adopting AI</span></a></h6><span data-dcnode-id="1063" instrument_node="">
</span><div class="stream-item-info" data-dcnode-id="1050"><span data-dcnode-id="1062" instrument_node="">
</span><span class="topic" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Sponsored by SAS</span></span><span data-dcnode-id="1059" instrument_node="">
</span><span data-dcnode-id="1057" instrument_node="">
</span><div class="mvm" data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node="">
</span><span class="dek" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">How companies are using artificial intelligence in their business operations.</span></span><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1051" instrument_node="">
</span></div></li><span data-dcnode-id="1048" instrument_node="">
</span></ul><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">
</span></article-promo><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1041" instrument_node="">But determining whether AI crime-fighting solutions are a good strategic fit for a company depends on whether the benefits outweigh the risks that accompany them. One such risk is that biased conclusions can be drawn from AI based on factors like ethnicity, gender, and age. Companies can also experience backlash from customers who worry that their data will be misused or exploited by even more data-intensive surveillance of their records, transactions, and communications&nbsp;— especially if those insights are shared with the government. Recently, for example, a European bank was forced to backtrack on its plan to ask customers for permission to monitor their social media accounts as part of its mortgage application process, after </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.ie/business/personal-finance/aib-backtracks-over-moves-to-spy-on-customer-social-media-accounts-36908120.html"><span data-dcnode-id="1040" instrument_node="">a public outcry over its “Big Brother” tactics.</span></a></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">So how are leading-edge companies evaluating the benefits and risks of rapidly evolving AI crime-fighting and risk management? Below, we explain some of the steps they’re taking:</span></p><span data-dcnode-id="1034" instrument_node="">
</span><h3 data-dcnode-id="1031"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Evaluating the strategic fit </span></strong></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1029" instrument_node="">Before embarking on an AI risk management initiative, managers must first understand where machine learning is already making a big difference. Banks, for example, are halting financial crimes much more quickly and cheaply than they used to by using AI for automating processes and conducting multilayered “deep learning” analyses. Even though banks now file </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oliverwyman.com/our-expertise/insights/2017/dec/risk-journal-vol-7/rethinking-tactics/cleaning-up-money-laundering.html"><span data-dcnode-id="1028" instrument_node="">20 times more</span></a><span data-dcnode-id="1026" instrument_node=""> suspicious activity reports linked to money laundering than they did in 2012, AI tools have permitted them to shrink the armies of people they employ to evaluate alerts for suspicious activities. That’s because </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oliverwyman.com/our-expertise/insights/2017/dec/risk-journal-vol-7/rethinking-tactics/cleaning-up-money-laundering.html"><span data-dcnode-id="1025" instrument_node="">their false alerts have fallen by as much as half</span></a><span data-dcnode-id="1023" instrument_node=""> thanks to AI, and because many banks are now able to automate routine human legwork in document evaluation. For example, using artificial intelligence, </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanbanker.com/news/how-paypal-is-taking-a-chance-on-ai-to-fight-fraud"><span data-dcnode-id="1022" instrument_node="">Paypal has also cut its false alerts in half</span></a><span data-dcnode-id="1020" instrument_node="">. And </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rbs.com/rbs/news/2018/04/natwest-teams-up-with-vocalink-analytics-to-help-protect-corpora.html"><span data-dcnode-id="1019" instrument_node="">Royal Bank of Scotland prevented losses of over $9 million</span></a><span data-dcnode-id="1017" instrument_node=""> to customers after conducting a year-long pilot with Vocalink Analytics, a payments business, to use AI to scan small business transactions for fake invoices.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">AI tools also allow companies to surface suspicious patterns or relationships invisible even to experts. For instance, artificial neural networks can enable employees to predict the next moves of even unidentified criminals who have figured out ways around alert triggers in binary rule-based security systems. These artificial neural networks link millions of data points from seemingly unrelated databases containing everything from social media posts to internet protocol addresses used on airport Wi-Fi networks to real estate holdings or tax returns, and identify patterns.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">The next step in assessing the wisdom of launching an AI risk management program is for companies to evaluate to what extent customers and government authorities will expect them to be ahead of the curve. Even if it does not become a regulatory or legal obligation, companies might find it advantageous to play a leading role in the use of advanced analytics so they can take part in setting industrywide standards. They can help ensure that industry participants, regulators, technology innovators, and customers are being kept safe, without trampling on people’s privacy and human rights.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h3 data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Assessing and mitigating internal risks</span></strong></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">As managers examine how AI can assist them in identifying criminal activities, they should also consider how it fits in with their broader AI strategy. AI risk management and crime detection should not be conducted in isolation. Back-testing against simpler models can help banks limit the impact of potentially inexplicable conclusions drawn by artificial intelligence, especially if there is an unknown event for which the model has not been trained. For example, banks use artificial intelligence to monitor transactions and reduce the number of false alerts they receive on potential rogue transactions, such as money that’s being laundered for criminal purposes. These are back-tested against simpler rules-based models to identify potential outliers. An AI model may, for example, mistakenly overlook a large money laundering transaction that would normally trigger an alert in a rule-based system if it determines, based on biased data, that large transactions made by customers who reside in wealthy neighborhoods do not merit as much attention. Using this approach enables companies to design more transparent machine learning models, even if that means they operate within more explicit bounds.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Most of all, managers should assess whether their company’s data analytics are sufficient to handle complex AI tools. If not, they need to develop data analytics capabilities in-house to reach a critical mass of automated processes and structured analytics.</span></p><span data-dcnode-id="999" instrument_node="">
</span><h3 data-dcnode-id="996"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Understanding and preparing for external risks</span></strong></h3><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Increased use of AI tools for crime prevention could also cause external risks to cascade in unexpected ways. A company could lose its credibility with the public, regulators, and other stakeholders in myriad ways&nbsp;— for example, if there are false alerts that mistakenly identify people as “suspicious” or “criminal” due to a racial bias unintentionally built into the system. Or, at the other end of the spectrum, if they miss criminal activities, like drug trafficking conducted by their clients or funds channeled from sanctioned countries such as Iran. Criminals could resort to more extreme, and potentially violent, measures to outmaneuver AI. Customers could flee to less closely monitored entities outside of regulated industries. A moral hazard could even develop if employees become too reliant on AI crime-fighting tools to catch criminals for them.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">To prevent this from happening, companies need to create and test a variety of scenarios of cascading events resulting from AI-driven tools used to track criminal activities. To outsmart money launderers, for example, banks should conduct “war games” with ex-prosecutors and investigators to discover how they would beat their system.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">With results produced through scenario analysis, managers can then help top executives and board members decide how comfortable they are with using AI crime-fighting. They can also develop crisis management playbooks containing internal and external communication strategies so they can react swiftly when things (inevitably) go wrong.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">By using AI, companies can identify areas of potential crimes such as fraud, money laundering, and terrorist financing — in addition to more mundane crimes such as employee theft, cyber fraud, and fake invoices — to help public agencies with prosecuting these offenses much more effectively and efficiently. But with these benefits come risks that should be openly, honestly, and transparently assessed to determine whether using AI in this way is a strategic fit. It will not be easy. But clear communication with regulators and customers will allow companies to rise to the challenge when things go wrong. AI will eventually have a hugely positive impact on reducing crime in the world — as long as it is managed well.</span></p><span data-dcnode-id="983" instrument_node="">
</span><span data-dcnode-id="981" instrument_node="">
