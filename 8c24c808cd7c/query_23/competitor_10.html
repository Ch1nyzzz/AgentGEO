"1716"><tr data-dcnode-id="1717"><td data-dcnode-id="1718" id="amazon-polly-audio-tab"><div data-dcnode-id="1727" id="amazon-ai-player-label"><span data-dcnode-id="1728" instrument_node="">Listen on the go!</span></div><div data-dcnode-id="1721" id="amazon-ai-player-container"><span data-dcnode-id="1726" instrument_node=""> </span><audio class="amazon-ai-player" controls="" controlslist="nodownload" data-dcnode-id="1722" id="amazon-ai-player" preload="none"><span data-dcnode-id="1725" instrument_node=""> </span><source data-dcnode-id="1724" src="https://cignitiblog-e5e3.kxcdn.com/wp-content/uploads/amazon_polly_15123.mp3?version=1636638300" type="audio/mpeg"><span data-dcnode-id="1723" instrument_node=""> </span></audio></div><div data-dcnode-id="1720" id="amazon-polly-subscribe-tab"></div><div data-dcnode-id="1719" id="amazon-polly-by-tab"></div></td></tr></tbody></table><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">It’s an understatement to say that we live in a very different world than a couple of years ago. The pandemic has brought about extraordinary changes in the way customers consume goods. From online shopping for essential goods and services, e-commerce businesses to doing financial transactions instantly, there has been a colossal shift towards a more digital and seamlessly connected world.</span></p><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">This has triggered the interest of fraudsters, money launderers and other cybercriminals looking to take advantage of the digital influx. Fraudsters are targeting gullible merchants that are unfamiliar with e-commerce and lack the resources to provide advanced security measures to their consumers. Consumer-focused online transactions rely on verified consumer identity, making identity data a key target for fraudsters. Fraudsters can use the stolen data (Social Security numbers, addresses, card details) to create a fake ID and steal funds from accounts; take out loans; or create new credit lines in the name of the customer.</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">During this pandemic, Internet traffic surged by about 60% and, as a result, the amount of money spent online on shopping nearly doubled. </span><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The average value of attempted fraudulent purchases increased 69% year-over-year, according to a report from the digital fraud prevention company, Sift. </span></em><span data-dcnode-id="1707" instrument_node="">Consumer information can be stolen through many channels, whether it’s redirecting a consumer to a malicious page for checkout or mirroring a shopper’s screen to grab information.</span></p><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">The overall weakening of the economy has also revived money laundering opportunities for criminals. Whether it is investing in failing businesses, buying cheap foreclosed homes with cash to conceal illegitimate profits, or moving funds through financial networks by restructuring their credit or previously held loans, money laundering has clearly seen an upsurge.</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">2020 saw a phenomenal increase in financial crime, hitting a record high of $42 billion. The rise in financial crime led not only to financial losses but also to losses in reputation and customers. What’s also concerning is that only 56% of companies investigated serious fraud incidents.</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">There is a multitude of factors that are contributing to the spurt of these financial crimes:</span></p><ul data-dcnode-id="1689"><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">The digital payments revolution and the rapid rise of online and mobile payments channels</span></li><li data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Security limitations of newer digital technologies such as cloud, mobility, social media, etc.</span></li><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Steady enhancement and development of digital transformation and new banking channels for fraudsters to infiltrate</span></li><li data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Rise in sophisticated crimes by fraudsters and fraud rings such as Carbanak attacks, identity theft, distributed denial-of-service (DoS) attacks, ransomware, infiltrated POS systems, and man-in-the-middle fraud.</span></li><li data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">New avenues for financial crime. Example – casinos, online gaming, cryptocurrencies, etc</span></li></ul><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">To understand this topic better, it’s essential to call out the subtle differences between fraud and financial crime. There is a general misconception about both being synonymous terms. They are, to a certain extent, however, with a subtle difference. All fraud is considered a financial crime, but not all financial crimes may be regarded as fraud. According to the Financial Conduct Authority (FCA), financial crime is any criminal conduct relating to money, financial services, or markets, including any offence involving the following:</span></p><ul data-dcnode-id="1678"><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Fraud or dishonesty</span></li><li data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Misconduct in, or misuse of information relating to, a financial market</span></li><li data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Handling the proceeds of crime</span></li><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">The financing of terrorism</span></li></ul><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">A KPMG Global Fraud Survey found 43% of respondents currently had no integration between fraud and financial crime compliance. It’s best practice to align such all-risk response solutions under one single enterprise platform, a mission control for risk, if you will. Beyond decreasing the risk of financial attacks and regulatory fines, integrating fraud and financial crime compliance can also increase operational efficiency.</span></p><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">From an operational efficiency perspective, fraud and compliance departments usually require much of the same information. When a financial crime occurs, organizations take the appropriate action. However, this becomes a challenge both from an investigation and a cost perspective without the complete picture of fraud. Furthermore, if multiple systems are maintained, it also means that various teams are kept, each with non-transferable skills.</span></p><p data-dcnode-id="1670"><em data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">EFCM, AFC solutions, FCRM, eGRC… a</span></em><span data-dcnode-id="1671" instrument_node=""> myriad of acronyms defines the enterprise-wide solutions being bought by organizations worldwide to tackle this ever-evolving financial crime and fraud landscape. These investments, coupled with the adoption of advanced technologies such as artificial intelligence and machine learning, enable enhanced transparency, improved decision-making, and reduced operational costs of managing financial crime and fraud.</span></p><p data-dcnode-id="1667"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Why is there a growing need for digital enterprise solutions to fight fraud and financial crime?</span></strong></p><ul data-dcnode-id="1648"><li data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Increasing regulatory compliance (FATF, GDPR, FATCA, 5AMLD, MiFID) mandates and potentially avoiding costly fees and penalties</span></li><li data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Evolving frauds worldwide and the need to uncover hidden patterns, trends, and schemes that traditional fraud detection methods may miss</span></li><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">A cloud-based model to help reduce total cost of ownership, avoid significant upfront investments, and reduce capital expenditure on IT infrastructure. Firms don’t need to engage in a prolonged IT development lifecycle. Instead, the cloud providers supervise software upgrades and security updates.</span></li><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Ever-increasing data load on the legacy Enterprise infrastructure</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Increased downstream security challenges</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Measuring and helping Improve performance by monitoring and identifying vulnerable areas of the organization.</span></li><li data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Producing cost savings by reducing waste and abuse</span></li><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Need for intelligent AI/ML-based intelligent real-time surveillance capabilities and monitoring solutions</span></li><li data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">A need to break away from siloed ways of tracking Fraud risk and Financial crime</span></li></ul><p data-dcnode-id="1638"><span data-dcnode-id="1647" instrument_node="">According to a </span><strong data-dcnode-id="1644"><em data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">MarketsandMarkets</span></em></strong><span data-dcnode-id="1643" instrument_node=""> report, “</span><strong data-dcnode-id="1640"><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">The global market in this space is estimated to reach US $60.8 billion by 2025, up from US $32.3 billion in 2020, growing at a CAGR of 13.4%</span></em></strong><span data-dcnode-id="1639" instrument_node="">”.</span></p><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Digital technologies bring multiple benefits to financial institutions. They help save costs, improve productivity, and increase efficiency while maintaining the trust quotient. Financial institutions have begun to adopt new-age anti-financial crime solutions that leverage AI capabilities, such as ML, RPA, and NLP, as they are aware that incumbent legacy fraud management solutions cannot meet their needs. Some leading solution vendors are also investing in advanced and predictive analytics, big data, cloud, artificial intelligence (AI), machine learning (ML), natural language processing (NLP), robotic process automation (RPA), blockchain, deep learning, and advanced Explainable AI (XAI) to allow a better understanding of the results from the decision engines.</span></p><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Another option available for banks and financial institutions is to use native solutions but building an anti-financial crime/fraud infrastructure in-house is expensive. The costs include server maintenance, licensing, security patching, software upgrades, and regular watchlist updates. Small and medium financial institutions find it uneconomical to build such robust solutions. Many large financial institutions also want to avoid the complexities involved in managing in-house anti-financial crime platforms. This is where several cloud-based models and an increasing number of partnerships between product companies and system integrators to provide software-as-a-service (SaaS) offerings make advanced enterprise financial crime and fraud solutions affordable at scale for financial institutions. These new-age cloud-based offerings help deliver scalable, reliable, and cost-effective solutions. Some of the key advantages are:</span></p><ul data-dcnode-id="1627"><li data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Better management of IT costs and lower total cost of ownership (change management, implementation, onboarding, maintenance, and support)</span></li><li data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Ease of deployment in the cloud</span></li><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">The SaaS model aligns well with a financial institution’s APIfication strategy to adopt open banking.</span></li></ul><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">A few examples of cloud-based managed services in the financial crime and Fraud management domain are KYC as a Service, AML as a Service and Fraud Prevention as a Service.</span></p><p data-dcnode-id="1622"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Conclusion </span></strong></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Cigniti is partnering with two exciting players in the financial crime, risk, and compliance space to implement AI/ML powered intelligent anti-money laundering, compliance, and fraud risk management solutions. These partnerships combine Cigniti’s domain expertise in the BFSI space, powered by industry-leading quality assurance and engineering knowhow, with some of the world’s leading holistic enterprise grade fraud, financial crime, and compliance solutions.</span></p><p data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">Schedule a discussion with our </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cigniti.com/industries/banking/"><span data-dcnode-id="1618" instrument_node="">BFSI Testing</span></a><span data-dcnode-id="1616" instrument_node=""> and Banking domain experts to find out more about managing financial crime in the post-pandemic world.</span></p><div class="pp-multiple-authors-wrapper multiple-authors-target-the-content pp-multiple-authors-layout-boxed" data-dcnode-id="1593"><h2 class="widget-title" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Author</span></h2><ul data-dcnode-id="1594"><li class="author_index_1 author_balaji-natrajan" data-dcnode-id="1595"><div data-dcnode-id="1610"><span data-dcnode-id="1612" instrument_node=""> </span><img alt="" class="multiple_authors_guest_author_avatar avatar" data-dcnode-id="1611" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cignitiblog-e5e3.kxcdn.com/wp-content/uploads/Balaji.jpg&amp;raw" srcset="https://cignitiblog-e5e3.kxcdn.com/wp-content/uploads/Balaji.jpg" width="80"></div><div data-dcnode-id="1596"><div class="multiple-authors-name" data-dcnode-id="1606"><span data-dcnode-id="1609" instrument_node=""> </span><a class="author url fn" data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cigniti.com/blog/author/balaji-natrajan/" rel="author"><span data-dcnode-id="1608" instrument_node="">Balaji Natrajan</span></a></div><p class="multiple-authors-description" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Balaji has 13+ years’ experience in the banking technology space across core banking implementations, digital transformation journeys, quality assurance deliveries and domain consulting. Within Cigniti, Balaji is part of a new age BFSI task force that is out to transform in-house domain competency and solution development propositions.</span></p><p class="multiple-authors-links" data-dcnode-id="1597"><span data-dcnode-id="1603" instrument_node=""> </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cigniti.com/blog/author/balaji-natrajan/"><span data-dcnode-id="1602" instrument_node="">
