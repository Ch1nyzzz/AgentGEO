ational choice and deterrence theories</span><br data-dcnode-id="6093"><span data-dcnode-id="6092" instrument_node="">
</span><br data-dcnode-id="6091"><span data-dcnode-id="6090" instrument_node="">
The rational choice theory of crime is intimately related to the concept of the deterrence theory of crime. ational choice models suggest that all human beings are inherently rational creatures, capable of making reasonable, utilitarian decisions based upon a weighing of pros and cons. A rational actor, in other words, will decide not to commit a crime if the potential costs outweigh the potential benefits. Swiftness and certainty of the punishment for the crime will deter persons from offending. The theory also presumes that "people will engage in criminal and deviant activities if they do not fear apprehension and punishment. Norms, laws, and enforcement are to be designed and implemented to produce and maintain the image that…</span></p><span data-dcnode-id="6088" instrument_node="">

</span><br data-dcnode-id="6012"><span data-dcnode-id="6011" instrument_node="">
What role does digital video gaming play in crime, delinquency or other forms of antisocial behavior?</span><br data-dcnode-id="6010"><span data-dcnode-id="6009" instrument_node="">
</span><br data-dcnode-id="6008"><span data-dcnode-id="6007" instrument_node="">
American Psychological Association (2011, August 29). Playing highly competitive video games may lead to aggressive behavior. ScienceDaily. Retrieved February 15, 2012, from http://www.sciencedaily.com- / releases/2011/08/110829114714.htm.</span><br data-dcnode-id="6006"><span data-dcnode-id="6005" instrument_node="">
</span><br data-dcnode-id="6004"><span data-dcnode-id="6003" instrument_node="">
In a unique twist of methodologies, the American Psychological Association added credibility to an interesting study done by several advanced degree students where were looking at the highly debated contemporary issue: is there a relationship between video games and violence? Past studies suggested that the issue of importance was not the violence but the level of competition. Through two versions of their approach, the researchers looked at how subjects reacted to highly or lesser competitive video games and their tendencies as a result to retaliate against another -- by fixing that person a more or less aggressively spiced taste of food in a flavor…</span></p><span data-dcnode-id="6001" instrument_node="">
</span><p data-dcnode-id="5988"><span data-dcnode-id="6000" instrument_node="">"Video gaming is so widespread among American teenagers that to paint a portrait of a typical teen gamer is to hold a mirror to the population of teens as whole. Nearly every teen plays games in some way, regardless of gender, age, or socioeconomic status." The Pew Internet &amp; American Life Project jumped into the gaming sector headfirst and gave many people a lot to consider. A massive collective of data, it took aim at assumptions about young people who play such games as being isolated or engaged in an environment that let violence go by unchallenged. This study should be reviewed by anyone and everyone who has an opinion on the subject of games and criminal, delinquency or anti-social behavior. It's a rich collection of game-changing knowledge.</span><br data-dcnode-id="5999"><span data-dcnode-id="5998" instrument_node="">
</span><br data-dcnode-id="5997"><span data-dcnode-id="5996" instrument_node="">
Inderscience Publishers (2008, May 14). Could Violent Video Games Reduce Rather Than Increase Violence?. ScienceDaily. Retrieved February 15, 2012, from &nbsp;</span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sciencedaily.com/" rel="NOFOLLOW" target="_blank"><span data-dcnode-id="5995" instrument_node="">http://www.sciencedaily.com</span></a><span data-dcnode-id="5993" instrument_node="">&nbsp;- / releases/2008/05/080514213432.htm.</span><br data-dcnode-id="5992"><span data-dcnode-id="5991" instrument_node="">
</span><br data-dcnode-id="5990"><span data-dcnode-id="5989" instrument_node="">
The International Journal of Liability and Scientific Enquiry recently featured this piece Patrick Kierkegaard of the University of Essex, England. Kieregaard takes an apparently emotional dive into the question of whether video games really do cause violence by systematically looking back at the full field of study and their biases. Noting that this subject has been of importance since the 1990s, the case can be made that we should currently be experiencing an epidemic of violence given the growth in video game playing. Yet that is not happening. Crime and delinquency among these young people has actually decreased. This review is highly critical of biases about games and aggressiveness, noting that no reliable conclusions of this affect that be found in studies on topics as diverse as fighting at school to criminal assaults. The commentary seems to present a good representation of some of the frustrations that happen when scientists confront public perceptions that may have little grounding in fact. The average reader would likely find this kind of articles easy to read and emotionally appealing if he or she were truly interested in gaming -- which, coincidently, he or she most likely is.</span></p><span data-dcnode-id="5987" instrument_node="">

</span><br data-dcnode-id="5931"><span data-dcnode-id="5930" instrument_node="">
Before committing a criminal act, offenders often make several decisions with regard to the effort expended and chances of being apprehended. Crime prevention through environmental design (CPTED) seeks to influence the decisions an offender makes, prior to committing a criminal act, via the alteration of the constructed environment. In addition to explaining the function of CPTED, this text will, amongst other things, also highlight how it is used and who exactly uses it.</span><br data-dcnode-id="5929"><span data-dcnode-id="5928" instrument_node="">
</span><br data-dcnode-id="5927"><span data-dcnode-id="5926" instrument_node="">
CPTED, in the words of Sennewald and Christman (2011, p. 69), "is based on the theory that the proper design and effective use of the built environment can lead to a reduction in the incidence and fear of crime, and to an improvement in the quality of life." As the authors further point out, CPTED is further reinforced by concepts derived from such diverse fields as criminology,…</span></p><span data-dcnode-id="5924" instrument_node="">

</span><p data-dcnode-id="5855"><span data-dcnode-id="5860" instrument_node="">How Community Policing Promotes Social Justice</span><br data-dcnode-id="5859"><span data-dcnode-id="5858" instrument_node="">
Introduction</span><br data-dcnode-id="5857"><span data-dcnode-id="5856" instrument_node="">
As Howell (2010) points out, youths “join gangs for protection, enjoyment, respect, money, or because a friend is in a gang” (p. 1). In the city of Cincinnati, gang activity among young people is on the rise, and City Council has expressed concerns over how to address this issue. The city of Mesa, Arizona, recently completed the Mesa Gang Intervention Program (MGIP), which focused on crime prevention among youths. This program primarily focused on the law enforcement aspect of the juvenile criminal justice system; however, it incorporated help from case workers, community leaders, probation officers, and youth workers. The program was a major success. As Mesa and Cincinnati are relatively similar in size, it is recommended that Cincinnati get serious about juvenile crime by implementing its own Gang Intervention Program modeled on MGIP. This paper will show why this program makes sense for…</span></p><span data-dcnode-id="5854" instrument_node="">

</span><p data-dcnode-id="5760"><span data-dcnode-id="5777" instrument_node="">gathering of information on crime prevention initiatives is critical in the quest for a better equipped and evidence-based crime prevention programs (UNODC,2010).In this paper, we present the outcome of an interview which was conducted with Mr. ichard Aborn, the president of the Citizens Crime Commission of New York City, an independent non-profit organization which is nonpartisan and is focused on criminal justice as well as public safety policy reform. A review of their view on the Juvenile justice system is presented below.</span><br data-dcnode-id="5776"><span data-dcnode-id="5775" instrument_node="">

</span><br data-dcnode-id="5770"><span data-dcnode-id="5769" instrument_node="">
We have started a program aimed at pressurizing the federal government to raise the age of legal responsibility from 16 to 18 years.</span><br data-dcnode-id="5768"><span data-dcnode-id="5767" instrument_node="">
</span><br data-dcnode-id="5766"><span data-dcnode-id="5765" instrument_node="">

</span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node="">

</span><p data-dcnode-id="5681"><span data-dcnode-id="5694" instrument_node="">Specifically, the criminal justice system is designed more to address crimes after they have already been committed than to prevent them beforehand.</span><br data-dcnode-id="5693"><span data-dcnode-id="5692" instrument_node="">
</span><br data-dcnode-id="5691"><span data-dcnode-id="5690" instrument_node="">
The criminal justice system is well designed to investigate, prosecute, and punish criminal conduct; it is far less well designed to prevent criminal activity ahead of time, particularly in comparison to other social factors.</span><br data-dcnode-id="5689"><span data-dcnode-id="5688" instrument_node="">
</span><br data-dcnode-id="5687"><span data-dcnode-id="5686" instrument_node="">
By the time criminal violations come under the purview of the criminal justice system, they likely represent only a small fraction of criminal activity in society; for every detected crime, hundreds of others go undetected. More importantly, to the extent societal efforts relate to genuine crime prevention rather than crime control after the fact, those efforts must address social values in the larger sense.</span><br data-dcnode-id="5685"><span data-dcnode-id="5684" instrument_node="">
</span><br data-dcnode-id="5683"><span data-dcnode-id="5682" instrument_node="">
Paternalistic legislation also undermines the societal goal of instilling fundamental respect for the formal rules of law, precisely because criminalizing purely personal conduct is so much harder to justify. On…</span></p><span data-dcnode-id="5680" instrument_node="">

</span><p data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">Applying equally strict enforcement to minor or merely "technical" violations of law that hardly affect others might reduce the quality of life in society instead of improving it. For example, in many jurisdictions motor vehicle codes are classified as penal (rather than civil) infractions that are arrestable offenses under strict application of the state police power through authorized law enforcement functions. However, it is doubtful that (1) taking enforcement action against every perceptible violation of law or (2) implementing physical arrest wherever authorized is in the interest of the driving public or society. On the other hand, certain types of crimes (including some that fall within the purview of vehicular laws) require a zero-tolerance approach by virtue of their capacity to harm other individuals and society as a whole. Furthermore, practical considerations such as the availability of personnel, physical resources, and budget require prioritization wholly apart from the question of…</span></p><span data-dcnode-id="5629" instrument_node="">

</span><p data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Community Crime PreventionIntroductionCommunity crime prevention is a goal of many communities and law enforcement agencies around the world today. The idea is based on sociological, psychological, and criminal justice principles and theories about the way people interact in society, how trust is developed, what conditions tend to lead to crime, and how culture plays a part in preventing crime. This paper discusses the etiological theories supporting community crime prevention, as well as the essential components of community crime prevention. It identifies and describes different models for community crime prevention, community crime prevention organizations, and obstacles and challenges to the aims of community crime prevention.Community as a Central Institution in Crime PreventionCommunity is a central institution in crime prevention because it is the life of the society, where individuals interact, get to know one another, develop social bonds, grow organizations, and establish roots. Without community life, the environment is prone to…</span></p><span data-dcnode-id="5341" instrument_node="">

City X is facing nightmares of daytime robberies that have crippled social, economic, and political stability in the city. The police officers have failed to obtain adequate information related to the causes and the perpetrators of the robberies. Therefore, coming up with a plan to investigate the cases and end the situation is important to reduce the vice. The following essay discusses some of the actions related to the case that I will undertake to end the robberies in City X. The essay will discuss investigative steps I will employ to solve the situation, technical assistance I will need to conduct the operation and measures I will employ to analyze the pattern of robbery in the city. In addition, it will discuss ways of synthesizing the information acquired, investigation units required to see the success of the process, equipment required and ways of procuring more…</span></p><span data-dcnode-id="5165" instrument_node="">

In the midst of a very instable economic environment around the nation, it is crucial for all cities to bump up their strategies at preventing crime in order to be able to avoid future costs associated with fighting crime and imprisoning criminals. Crime prevention is one of the most cost effective strategies in criminal justice, and it can help save property and lives. This is especially crucial for the city of Detroit, which faces its own set of unique challenges in a severely volatile economy that has the potential to lead to increase in a wide variety of crimes, making prevention methods and strategies a crucial tool for local law enforcement.</span><br data-dcnode-id="4856"><span data-dcnode-id="4855" instrument_node="">

As Schmalleger explains, the American juvenile-justice system was designed a century ago to reform kids found guilty of minor crimes, but more and more, the system has to cope with more violent crimes committed by younger people. The response on the part of lawmakers has been largely to siphon the worst of these young people out of the juvenile system by lowering the age at which juveniles charged with serious crimes can be tried in adult courts, a trend that seems to increase around election time. The underlying philosophy of early juvenile courts was parens patriae, which means that the courts took the role of parent and protected the rights of the child. Shifting the child to adult court reduces his or her rights rather than increasing them and also bring son harsher punishments. As Daniel P. Mears notes, the creators of the juvenile court system thought it would…</span></p><span data-dcnode-id="4786" instrument_node="">

Diverse sociocultural customs promote diverse forms of aggression; e.g., the conventional idea that males are authorized, by nature, to discipline or control females renders the latter susceptible to sexual abuse and spousal violence. Societal tolerance towards such hampers external intervention, preventing victims from protesting and seeking support. Sexual abuse reporting is also hampered by the stigma certain cultures attach to victims. Further, the powerful link between violence and drunkenness implies societies' and cultures' alcohol utilization trends and the related impacts also promote and warrant violence. Several nations report alcoholism accounting for sixteen percent of female and twenty-six percent of male DALYs (disability-adjusted life-years) loss due to murders. Initiatives challenging socio-cultural customs supporting aggression are normally combined with other strategies (WHO, 2009).</span><br data-dcnode-id="4720"><span data-dcnode-id="4719" instrument_node="">

</span><p data-dcnode-id="4476"><span data-dcnode-id="4481" instrument_node="">crime has been taking place. Although the forms of crime have evolved, so too has the strategies used to prevent crime. This essay will compare and contrast three of most common Crime Prevention strategies, which are, environmental design, social intervention and situational intervention. Crime prevention generally refers to preventing crime and anti-social behavior before it occurs. Crime Prevention Victoria, defines crime prevention as "any public or privately based initiative or policy aimed at reducing or eliminating criminal behavior, violence and fear of crime or violence in the community" (Armstrong, 2002). This essay aims to demonstrate not only the strengths and weaknesses of these three strategies but also to identify the individual crime causation theory that each strategy is based around. These being</span><br data-dcnode-id="4480"><span data-dcnode-id="4479" instrument_node="">
</span><br data-dcnode-id="4478"><span data-dcnode-id="4477" instrument_node="">
ne of the main crime prevention strategies used around the world is environmental design. This strategy is based on the relationship that is created between people and the…</span></p><span data-dcnode-id="4475" instrument_node="">
</span><p data-dcnode-id="4465"><span data-dcnode-id="4474" instrument_node="">One of the extreme levels of environmental design strategies being used today is through gated communities. Gated communities are small groups of residents who are enclosed and separated from the rest of society. A good example of gated communities can be seen in South Africa, which is known for its extremely high crime rates, it also has the highest amount of gated communities (Landman,2008). Gated communities in South Africa incorporate all physical elements by either high walls, gates, electric gates, alarm systems, boom gates, check ins and even access cards (Landman,2008). Gated communities are created with the basic principles of the environmental design strategy (Landman,2008). These communities are defensible spaces, target hardened and have advanced access control. Throughout the U.S., two and a half million citizens live in gated communities (Blakely &amp; Snyder 1998).</span><br data-dcnode-id="4473"><span data-dcnode-id="4472" instrument_node="">
</span><br data-dcnode-id="4471"><span data-dcnode-id="4470" instrument_node="">
Environmental design theory also has a strong connection to routine activity theory. Routine activity theory states that for a crime to be committed, three things need to be present, an offender, a target and no one watching the target (Chainey,2005). Environmental theory aims at removing two of these mentioned items, by closing off areas to the public possible offenders are removed and by using such things as natural vision or CCTV there is always the possibility of someone watching. According to routine activity theory without any one of these items the crime can not take place (Chainey,2005).</span><br data-dcnode-id="4469"><span data-dcnode-id="4468" instrument_node="">
</span><br data-dcnode-id="4467"><span data-dcnode-id="4466" instrument_node="">
However people argue that changes made to the built environment to reduce crime often simply cause offenders to move their criminal behaviors to other locations. For this reason design theory can be seen to do little against causes of crime (CSRI,2003). By increasing protection, people argue that they are just funneling criminals to more unprotected areas or forcing criminals to commit more dangerous crimes (CSIR,2003). Environmental design can therefore not always be totally preventive and needs to be constantly reviewed and adapted to fight against the ever learning criminal mind. It is also important for crime preventions strategies to be adapted to specific areas as what works in one situation might not be appropriate in another. Numerous factors influence crime and all of these will affect the way in which it needs to be</span></p><span data-dcnode-id="4464" instrument_node="">

</span><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">
Crime impacts children differently than it does adults. This paper examines the differences and the reasons children are affected uniquely by crime. It looks in particularly at the multiple theories that can be used to explain these impacts, such as Strain Theory and Social Control Theory. It also identifies the unique challenges that children and adults face as they struggle to cope both with the environments in which they live and the criminal justice systems that confront them. The paper concludes that children are uniquely impacted by crime because they are still in their developmental stage, wherein their psychology and physicality are still highly susceptible to external influences.</span><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">

</span><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">
The objective of this work in writing is to examine evidence-based policing and crime prevention practice in Canada and to report on the same. ccording to the Public Safety Canada document entitled "evidence-based Crime Prevention: Scientific Basis, Trends, Results and Implications" policy on crime prevention and practice "should be based on solid scientific knowledge and evidence. Even though support for and recognition of evidence-based crime prevention (EBCP) is growing, much work still remains to put this knowledge into practice. " (Welsh, 2007, p.1) The report states that the evidence-based approach is such that "…typically refers to programs and practices that are proven to be effective through sound research methodology and have produced consistently positive patterns of results." (Welsh, 2007, p.1) EBCP is reported to ensure that "the best available evidence is considered in the decision to develop and implement a program or…</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3418"><span data-dcnode-id="3427" instrument_node="">A program is stated to be "in contrast, focused on an effort to change, restrict or crate a routine practice in a crime prevention setting." (Sherman, Farrington, Welch and MacKenzie, 2002) Programs are stated to overtime change into practices with the original introduction of the program upon which these practices are based long forgotten. Stated to be that which makes the "clearest distinction between programs and practices" are those, which require governmental funding as new programs are required to undergo scientific evaluations in the form of those seeking evidence upon which to base crime prevention programs. There is a trend reported toward 'demanding accountability for public expenditures." (Sherman, Farrington, Welch and MacKenzie, 2002)</span><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">
</span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">
Summary and Conclusion</span><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">
</span><br data-dcnode-id="3420"><span data-dcnode-id="3419" instrument_node="">
No longer does the flavor of the month in crime prevention efforts and initiatives work to allay the fears of citizens and law enforcement professionals in addressing crime because crime is an ever growing and evolving phenomena in society. Law enforcement has matured in the United States and due to the heavy workload of law enforcement professionals the methods chosen for prevention of crime must necessarily be effective or 'evidence-based' methods. Canada has implemented evidence-based programs for crime prevention and policing control and it has been clearly demonstrated in this study that evidenced-base practices and programs are those based on scientific research study findings rather than pop theory. The evidence-based programs are those with efficacy in terms of success. The importance of evidence-based programs is within the effectiveness of the programs on the receiving end of government funding. The public and those in positions of accountability have demanded that evidence-based practices be used in today's law enforcement initiative because these programs are effective and cost-efficient through successful reduction of crime. This work has reviewed some of the programs and initiatives used that are evidence-based including school-based programs that are evidence-based as well as family- and community-based programs and place-focused programs.</span></p><span data-dcnode-id="3417" instrument_node="">

During the latter half of the twentieth century, evidence-based policing became more commonplace, partly as a means to reduce corruption, but also as a means to make crime fighting more effective. Instruments used to measure crime at the federal level include those that fall under the rubric of the Department of Justice, such as Uniform Crime eporting and National Crime Victimization Service. The FBI also operates legal attache offices, the Combined DNA Index System, and other tools used to measure and empirically track crime (Schmalleger, 2015, p. 147). Likewise, the Department of Justice maintains several major crime reporting programs including the National Incident-Based eporting System. These reporting programs serve several core functions. They boost the effectiveness of criminal justice policy, they ensure policing and other aspects of criminal justice are evidence-based, and they inform the judicious allocation of resources throughout the criminal justice system. As Schmalleger (2015) points…</span></p><span data-dcnode-id="3010" instrument_node="">

</span><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">
Some victimization theories include victim participation theory, victim lifestyle theory, deviant place theory, and routine activity theory. Each of these theories can be useful in helping communities, individuals, and law enforcement officials discover ways of promoting public safety and minimizing crime. For example, a victimization theory revealing that people in a certain neighborhood are more vulnerable can help raise awareness about crime in that community so that the local residents and law enforcement can collectively pool resources.</span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">

From the results, the reviewers were able to come to several different conclusions. First, they concluded that there is widespread interest in the use of scientific evidence in criminological policy-making. However, they also concluded that "the current development of scientific evidence is inadequate to the task of policymaking." (Sherman, 1998, p.86). They suggest the use of control groups to help increase external validity. They also suggest looking at the geography of crime. Finally, they believe that there is simply a need for a greater number of impact evaluations. All of these recommendations make sense and help explain how the scientific process can help policymakers identify appropriate crime-prevention strategies.</span><br data-dcnode-id="2341"><span data-dcnode-id="2340" instrument_node="">

</span><p data-dcnode-id="2214"><span data-dcnode-id="2219" instrument_node="">Vice refers specifically to crimes of a moral nature and usually refers specifically to prostitution, gambling, and also the dealing of drugs. Vice activities are defined differently by different communities and in general do not represent the laws of the nation or even of the state. Moreover, vice crimes are to be contrasted with crimes of a violent nature. Vice crime is community-defined; local laws generally reflect the social and political beliefs of its citizens as well as their expectations of the character of the jurisdiction. The town of Spurberry has a relatively low incidence of violent crime but vice crime is relatively common. Therefore, the Spurberry Police Department has had to beef up its vice squad in response to the growing needs of the community.</span><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">
</span><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="162" tabindex="0"><span data-dcnode-id="342" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="341"></div><span data-dcnode-id="340" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="164" role="dialog"><span data-dcnode-id="339" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="335" role="button" tabindex="0"><span data-dcnode-id="338" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="337"></i><span data-dcnode-id="336" instrument_node=""> </span></span><span data-dcnode-id="334" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="166"><span data-dcnode-id="333" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="168"><strong class="acsb-title-main" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Compliance status</span></strong><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="313" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="307" instrument_node="">
</span><ol data-dcnode-id="281"><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="294"><strong class="acsb-title" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="303" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="302"><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="299"><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="296"><br data-dcnode-id="295"></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="283"><strong class="acsb-title" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="290" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="289"><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="286"><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="282" instrument_node="">
</span></ol><span data-dcnode-id="280" instrument_node="">
</span><strong data-dcnode-id="277" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="278" lang="EN-US"><span data-dcnode-id="279" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="276" instrument_node="">
</span><ul data-dcnode-id="244"><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="271"><strong class="acsb-title" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="272" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="266"><strong class="acsb-title" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="267" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="265" instrument_node="">
</span><li data-dcnode-id="261"><strong class="acsb-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="262" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="260" instrument_node="">
</span><li data-dcnode-id="256"><strong class="acsb-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="257" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="251"><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="252" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="250" instrument_node="">
</span><li data-dcnode-id="246"><strong class="acsb-title" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="247" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="245" instrument_node="">
</span></ul><span data-dcnode-id="243" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="240"><span data-dcnode-id="241" lang="EN-US"><span data-dcnode-id="242" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="239" instrument_node="">
</span><ol data-dcnode-id="181"><span data-dcnode-id="238" instrument_node="">
</span><li data-dcnode-id="231"><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="236" lang="EN-US"><span data-dcnode-id="237" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="235" instrument_node="">–</span></strong><span data-dcnode-id="232" lang="EN-US"><span data-dcnode-id="233" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="226" lang="EN-US"><strong class="acsb-title" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="227" instrument_node="">&nbsp;</span></span><span data-dcnode-id="224" lang="EN-US"><span data-dcnode-id="225" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="216"><span data-dcnode-id="218" lang="EN-US"><strong class="acsb-title" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Animations –</span></strong><span data-dcnode-id="219" instrument_node="">&nbsp;</span></span><span data-dcnode-id="217" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="215" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="211" lang="EN-US"><strong class="acsb-title" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="212" instrument_node="">&nbsp;</span></span><span data-dcnode-id="209" lang="EN-US"><span data-dcnode-id="210" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="203" lang="EN-US"><strong class="acsb-title" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="204" instrument_node="">&nbsp;</span></span><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="195" lang="EN-US"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="196" instrument_node="">&nbsp;</span></span><span data-dcnode-id="193" lang="EN-US"><span data-dcnode-id="194" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="183"><strong class="acsb-title" data-dcnode-id="188"><span data-dcnode-id="189" lang="EN-US"><span data-dcnode-id="190" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="184" lang="EN-US"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">–</span></strong><span data-dcnode-id="185" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="182" instrument_node="">
</span></ol><span data-dcnode-id="180" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="174" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="167" instrument_node=""> </span></div><span data-dcnode-id="165" instrument_node=""> </span></div><span data-dcnode-id="163" instrument_node="">
