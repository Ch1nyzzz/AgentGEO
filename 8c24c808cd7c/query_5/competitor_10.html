</span><h2 data-dcnode-id="2876"><span class="mw-headline" data-dcnode-id="2884" id="Basic_elements_of_trafficking"><span data-dcnode-id="2885" instrument_node="">Basic elements of trafficking</span></span><span class="mw-editsection" data-dcnode-id="2877"><span class="mw-editsection-bracket" data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">[</span></span><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D1" title="Edit section: Basic elements of trafficking"><span data-dcnode-id="2881" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2875" instrument_node="">
</span><ol data-dcnode-id="2847"><li data-dcnode-id="2871"><i data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node=""> "Recruitment"</span></i><span data-dcnode-id="2872" instrument_node="">; this can be by deception or by force, and involves a recruiter.</span></li><span data-dcnode-id="2870" instrument_node="">
</span><li data-dcnode-id="2863"><i data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node=""> "Transport"</span></i><span data-dcnode-id="2867" instrument_node="">; from here to the site of exploitation, the victim is subjected to </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coercion" title="Coercion"><span data-dcnode-id="2866" instrument_node="">coercion</span></a><span data-dcnode-id="2864" instrument_node="">.  Transfer may be between regions or other countries. Colluding in this process are transporters, corrupt officials, and intermediaries to the trafficking.</span></li><span data-dcnode-id="2862" instrument_node="">
</span><li data-dcnode-id="2848"><span data-dcnode-id="2861" instrument_node="">The</span><i data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node=""> "operation"</span></i><span data-dcnode-id="2858" instrument_node="">; here the victim is subjected to exploitation by the </span><a class="mw-redirect" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pimp" title="Pimp"><span data-dcnode-id="2857" instrument_node="">pimp</span></a><span data-dcnode-id="2855" instrument_node=""> or the operator, who takes a totally illegal right of </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property" title="Property"><span data-dcnode-id="2854" instrument_node="">property</span></a><span data-dcnode-id="2852" instrument_node=""> over the victim.</span><sup class="reference" data-dcnode-id="2849" id="cite_ref-UNICEF_13-0"><a data-dcnode-id="2850" href="#cite_note-UNICEF-13"><span data-dcnode-id="2851" instrument_node="">[13]</span></a></sup></li></ol><span data-dcnode-id="2846" instrument_node="">
</span><h2 data-dcnode-id="2836"><span class="mw-headline" data-dcnode-id="2844" id="Federal_legislation"><span data-dcnode-id="2845" instrument_node="">Federal legislation</span></span><span class="mw-editsection" data-dcnode-id="2837"><span class="mw-editsection-bracket" data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">[</span></span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D2" title="Edit section: Federal legislation"><span data-dcnode-id="2841" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2834" instrument_node="">There are many laws that touch on the theme of trafficking; historically the Ley Palacios of 1913 was the first law in the protection to protect victims of sexual exploitation and slavery, as well as to punish those responsible. It was the first legislation in the entire American continent and signified a great advance in human rights in the country. The </span><a class="new" data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DInternational_Day_Against_Human_Trafficking%26action%3Dedit%26redlink%3D1" title="International Day Against Human Trafficking (page does not exist)"><span data-dcnode-id="2833" instrument_node="">International Day Against Human Trafficking</span></a><span data-dcnode-id="2831" instrument_node=""> commemorates the enactment of this law.</span><sup class="reference" data-dcnode-id="2828" id="cite_ref-14"><a data-dcnode-id="2829" href="#cite_note-14"><span data-dcnode-id="2830" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2827" instrument_node="">
</span></p><p data-dcnode-id="2817"><span data-dcnode-id="2825" instrument_node="">Argentina, as a signatory to the United Nations </span><a class="mw-redirect" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_to_Prevent%2C_Suppress_and_Punish_Trafficking_in_Persons%2C_especially_Women_and_Children" title="Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children"><span data-dcnode-id="2824" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children</span></a><span data-dcnode-id="2822" instrument_node="">, on April 29, 2008 passed Law 26.364 for the Prevention and Punishment of Trafficking in Persons and Assistance to its Victims. According to the dictates of international protocol and emphasizing care and rights of victims and differentiating between adults and minors. It is in accordance with the codes of international protocol and places emphasis on assistance and rights of victims and their differentiation between adults and minors.</span><sup class="reference" data-dcnode-id="2819" id="cite_ref-15"><a data-dcnode-id="2820" href="#cite_note-15"><span data-dcnode-id="2821" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2818" instrument_node="">
</span></p><span data-dcnode-id="2816" instrument_node="">
</span><ul data-dcnode-id="2810"><li data-dcnode-id="2811"><span data-dcnode-id="2815" instrument_node="">Law 26.364 defines trafficking as:</span><sup class="reference" data-dcnode-id="2812" id="cite_ref-OIM_16-0"><a data-dcnode-id="2813" href="#cite_note-OIM-16"><span data-dcnode-id="2814" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="2809" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2798"><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">La captación, el transporte y/o traslado — ya sea dentro del país, desde o hacia el exterior—, la acogida o la recepción de personas mayores de dieciocho (18) años de edad, con fines de explotación, cuando mediare engaño, fraude, violencia, amenaza o cualquier medio de intimidación 
o coerción, abuso de autoridad o de una situación de vulnerabilidad, concesión o recepción de pagos o beneficios para obtener el consentimiento de una persona que tenga autoridad sobre la víctima, aún cuando existiere asentimiento de ésta.</span></p><div class="templatequotecite" data-dcnode-id="2799"><span data-dcnode-id="2804" instrument_node="">— </span><cite data-dcnode-id="2800"><i data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Tratándose de adultos</span></i><span data-dcnode-id="2801" instrument_node="">.</span></cite></div></blockquote><span data-dcnode-id="2797" instrument_node="">
</span><link data-dcnode-id="2796" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2787"><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">[Translation: The recruitment, transportation and / or moving — whether it is within the country or to or from the exterior, harboring or receipt of persons over the age of eighteen (18) years of age, for the purpose of exploitation, when deception, fraud, violence, threat, or any form of intimidation or coercion, abuse of authority or of a position of vulnerability, giving or receiving of payments or benefits to achieve the consent of a person having control over the victim, even when there is consent of the victim.</span></p><div class="templatequotecite" data-dcnode-id="2788"><span data-dcnode-id="2793" instrument_node="">— </span><cite data-dcnode-id="2789"><i data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">In the case of adults</span></i><span data-dcnode-id="2790" instrument_node="">.]</span></cite></div></blockquote><span data-dcnode-id="2786" instrument_node="">
</span><link data-dcnode-id="2785" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2776"><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Se entiende por trata de menores el ofrecimiento, la captación, el transporte y/o traslado —ya sea dentro del país, desde o hacia el exterior—, la acogida o la recepción de personas menores de dieciocho (18) años de edad, con fines de explotación. Existe trata de menores aún cuando no mediare engaño, fraude, violencia, amenaza o cualquier medio de intimidación o coerción, abuso de autoridad o de una situación de vulnerabilidad, concesión o recepción de pagos o beneficios para obtener el consentimiento de una persona que tenga autoridad sobre la víctima. El asentimiento de la víctima de trata de personas menores de dieciocho (18) años no tendrá efecto alguno.</span></p><div class="templatequotecite" data-dcnode-id="2777"><span data-dcnode-id="2782" instrument_node="">— </span><cite data-dcnode-id="2778"><i data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">En caso de menores</span></i><span data-dcnode-id="2779" instrument_node="">.</span></cite></div></blockquote><span data-dcnode-id="2775" instrument_node="">
</span><link data-dcnode-id="2774" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2765"><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">[Translation: It is meant by trafficking in minors the recruitment, transportation and / or transfer, whether within the country or to and from abroad—, harboring or receipt of persons under eighteen (18) years of age, with the purpose of exploitation. Trafficking of minors exists even when there is no medium of deception, fraud, violence, threat, or any form of intimidation or coercion, abuse of authority or of a position of vulnerability, giving or receiving of payments or benefits to achieve the consent of a person having control on the victim. The consent of a victim of trafficking in persons under eighteen (18) years shall have no effect.</span></p><div class="templatequotecite" data-dcnode-id="2766"><span data-dcnode-id="2771" instrument_node="">— </span><cite data-dcnode-id="2767"><i data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">In the case of minors</span></i><span data-dcnode-id="2768" instrument_node="">.]</span></cite></div></blockquote><span data-dcnode-id="2764" instrument_node="">
</span><ul data-dcnode-id="2752"><li data-dcnode-id="2759"><span data-dcnode-id="2763" instrument_node="">Victims can not be punished for committing any offense that is a direct result of being trafficked. In the case of foreigners, no sanctions are applied nor can their contracts be voided because of infractions of immigration legislation if the violations are due trafficking.</span><sup class="reference" data-dcnode-id="2760" id="cite_ref-Ufase_17-0"><a data-dcnode-id="2761" href="#cite_note-Ufase-17"><span data-dcnode-id="2762" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="2758" instrument_node="">
</span><li data-dcnode-id="2753"><span data-dcnode-id="2757" instrument_node="">This law sets criminal and procedural rules, with penalties of 3–6 years in the case of trafficking of adults and 4 to 10 years if there are aggravating circumstances such as:</span><sup class="reference" data-dcnode-id="2754" id="cite_ref-ley_18-0"><a data-dcnode-id="2755" href="#cite_note-ley-18"><span data-dcnode-id="2756" instrument_node="">[18]</span></a></sup></li></ul><span data-dcnode-id="2751" instrument_node="">
</span><ol data-dcnode-id="2742"><li data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">The person who commits the crime is parent or grandparent, spouse, related in a direct line, brother, guardian, person living, tutor, in charge of education or a caretaker, minister of any religion recognized or not, or public official;</span></li><span data-dcnode-id="2748" instrument_node="">
</span><li data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">The act was committed by three or more people in an organized manner;</span></li><span data-dcnode-id="2745" instrument_node="">
</span><li data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">There were three or more victims.</span></li></ol><span data-dcnode-id="2741" instrument_node="">
</span><h2 data-dcnode-id="2731"><span class="mw-headline" data-dcnode-id="2739" id="Victims"><span data-dcnode-id="2740" instrument_node="">Victims</span></span><span class="mw-editsection" data-dcnode-id="2732"><span class="mw-editsection-bracket" data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">[</span></span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D3" title="Edit section: Victims"><span data-dcnode-id="2736" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2729" instrument_node="">Trafficking generates victims who in the majority of cases live under inhuman conditions; to be a victim of trafficking involves slavery, in which the trafficker gains a totally illegal right of property right over the victim or reduces her to the level of indentured servitude for the purpose of economic exploitation. In Argentina the most common victims of forced labor are in underground sweatshops are textile or as farm laborers and in other cases domestic workers. As for sexual exploitation that principally affects women, adolescents, and children, they are mostly found in the country's brothels.</span><sup class="reference" data-dcnode-id="2726" id="cite_ref-infopico_9-1"><a data-dcnode-id="2727" href="#cite_note-infopico-9"><span data-dcnode-id="2728" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2723" id="cite_ref-UNICEF_13-1"><a data-dcnode-id="2724" href="#cite_note-UNICEF-13"><span data-dcnode-id="2725" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2722" instrument_node="">
</span></p><span data-dcnode-id="2720" instrument_node="">
</span><h3 data-dcnode-id="2710"><span class="mw-headline" data-dcnode-id="2718" id="Forced_labor"><span data-dcnode-id="2719" instrument_node="">Forced labor</span></span><span class="mw-editsection" data-dcnode-id="2711"><span class="mw-editsection-bracket" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">[</span></span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D4" title="Edit section: Forced labor"><span data-dcnode-id="2715" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Forced labor includes a variety of trades, but the sectors most affected are rural and textile labor.
</span></p><span data-dcnode-id="2706" instrument_node="">
</span><h4 data-dcnode-id="2696"><span class="mw-headline" data-dcnode-id="2704" id="Textile_industry"><span data-dcnode-id="2705" instrument_node="">Textile industry</span></span><span class="mw-editsection" data-dcnode-id="2697"><span class="mw-editsection-bracket" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">[</span></span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D5" title="Edit section: Textile industry"><span data-dcnode-id="2701" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2694" instrument_node="">According to the </span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Institute_of_Statistics_and_Census_of_Argentina" title="National Institute of Statistics and Census of Argentina"><span data-dcnode-id="2693" instrument_node="">National Institute of Statistics and Censuses</span></a><span data-dcnode-id="2691" instrument_node=""> (INDEC – Instituto Nacional de Estadística y Censos), unregistered labor in apparel approaches 75%. The greater number of these workers are black, which promotes the spread of forced labor. According to Gustavo Vera, president of the cooperative La Alameda (which represents and defends textile workers), "We know that there are about 3,000 underground sweatshops in the Federal Capital" and he adds "There are also some 15,000 underground sweatshops in the first tier of the Buenos Aires suburbs and several thousand more in Greater Buenos Aires, Rosario, Mendoza and Cordoba. These workshops include a population of about 200,000 people who are reduced to forced labor or slave labor, which is the same as forced labor but worse, because the will of the workers is controlled 24 hours a day by the employer."</span><sup class="reference" data-dcnode-id="2688" id="cite_ref-19"><a data-dcnode-id="2689" href="#cite_note-19"><span data-dcnode-id="2690" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2687" instrument_node="">
</span></p><p data-dcnode-id="2661"><span data-dcnode-id="2685" instrument_node="">According to the </span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureau_of_International_Labor_Affairs" title="Bureau of International Labor Affairs"><span data-dcnode-id="2684" instrument_node="">Bureau of International Labor Affairs</span></a><span data-dcnode-id="2682" instrument_node="">, Argentina is classified among the 74 countries in which </span><a class="mw-redirect" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labor" title="Child labor"><span data-dcnode-id="2681" instrument_node="">child labor</span></a><span data-dcnode-id="2679" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labor" title="Forced labor"><span data-dcnode-id="2678" instrument_node="">forced labor</span></a><span data-dcnode-id="2676" instrument_node=""> is still practiced today. The Bureau's </span><i data-dcnode-id="2673"><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Goods_Produced_by_Child_Labor_or_Forced_Labor" title="List of Goods Produced by Child Labor or Forced Labor"><span data-dcnode-id="2675" instrument_node="">List of Goods Produced by Child Labor or Forced Labor</span></a></i><sup class="reference" data-dcnode-id="2670" id="cite_ref-20"><a data-dcnode-id="2671" href="#cite_note-20"><span data-dcnode-id="2672" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2669" instrument_node=""> mentions "garments" as one of 11 other products in Argentina. Furthermore, in one of its reports on the worst forms of child labor, The </span><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Labor" title="United States Department of Labor"><span data-dcnode-id="2668" instrument_node="">U.S. Department of Labor</span></a><span data-dcnode-id="2666" instrument_node=""> states that "Argentina has not adopted a list of hazardous occupations that are prohibited to children, and appears to lack programs that target working children in all relevant sectors."</span><sup class="reference" data-dcnode-id="2663" id="cite_ref-21"><a data-dcnode-id="2664" href="#cite_note-21"><span data-dcnode-id="2665" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2662" instrument_node="">
</span></p><span data-dcnode-id="2660" instrument_node="">
</span><h4 data-dcnode-id="2650"><span class="mw-headline" data-dcnode-id="2658" id="Rural"><span data-dcnode-id="2659" instrument_node="">Rural</span></span><span class="mw-editsection" data-dcnode-id="2651"><span class="mw-editsection-bracket" data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">[</span></span><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D6" title="Edit section: Rural"><span data-dcnode-id="2655" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2648" instrument_node="">In Argentina, one of the first protections of the farm laborer was born in 1940 with the enactment of the Estatuto del Peón [Statute of farm laborers] which gave wage laborers (jornaleros) all the rights of workers (trabajadores). Later, complementary laws were added. The government of Cristina Kirchner signed the conventions of the </span><a data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Labour_Organization" title="International Labour Organization"><span data-dcnode-id="2647" instrument_node="">International Labour Organization</span></a><span data-dcnode-id="2645" instrument_node=""> (ILO) prohibiting the forced recruitment of manual labor for the rural labor force. However, there still exist recruiting networks that through deception or physical coercion recruit people who are typically in a vulnerable situation. And they are recruited from marginal rural areas of Santiago del Estero, Chaco, Tucuman, Catamarca and Jujuy and from migrant workers from bordering countries such as Chile, Bolivia, and Paraguay. And then they are taken to areas where they do hard labor and live in subhuman conditions. These situations violate the </span><a data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Convention_on_Human_Rights" title="American Convention on Human Rights"><span data-dcnode-id="2644" instrument_node="">Protocol of San Salvador</span></a><span data-dcnode-id="2642" instrument_node=""> treaty and </span><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safety_and_Health_in_Agriculture_Convention%2C_2001" title="Safety and Health in Agriculture Convention, 2001"><span data-dcnode-id="2641" instrument_node="">International Labour Conference Convention 184</span></a><span data-dcnode-id="2639" instrument_node="">.</span><sup class="reference" data-dcnode-id="2636" id="cite_ref-22"><a data-dcnode-id="2637" href="#cite_note-22"><span data-dcnode-id="2638" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2635" instrument_node="">
</span></p><span data-dcnode-id="2633" instrument_node="">
</span><h3 data-dcnode-id="2623"><span class="mw-headline" data-dcnode-id="2631" id="Sexual_abuse"><span data-dcnode-id="2632" instrument_node="">Sexual abuse</span></span><span class="mw-editsection" data-dcnode-id="2624"><span class="mw-editsection-bracket" data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">[</span></span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D7" title="Edit section: Sexual abuse"><span data-dcnode-id="2628" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2622" instrument_node="">
</span><h4 data-dcnode-id="2612"><span class="mw-headline" data-dcnode-id="2620" id="History"><span data-dcnode-id="2621" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="2613"><span class="mw-editsection-bracket" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">[</span></span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D8" title="Edit section: History"><span data-dcnode-id="2617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2610" instrument_node="">Sexual exploitation was born in the </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viceroyalty_of_the_R%25C3%25ADo_de_la_Plata" title="Viceroyalty of the Río de la Plata"><span data-dcnode-id="2609" instrument_node="">Viceroyalty of the Río de la Plata</span></a><span data-dcnode-id="2607" instrument_node=""> before the country was even created.</span><sup class="reference" data-dcnode-id="2604" id="cite_ref-historia_23-0"><a data-dcnode-id="2605" href="#cite_note-historia-23"><span data-dcnode-id="2606" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2603" instrument_node=""> After independence in 1875, a law was made regulating prostitution, preventing prostitution of minors, but allowing it if the children were initiated early into this activity.</span><sup class="reference" data-dcnode-id="2600" id="cite_ref-24"><a data-dcnode-id="2601" href="#cite_note-24"><span data-dcnode-id="2602" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2599" instrument_node="">
</span></p><p data-dcnode-id="2578"><span data-dcnode-id="2597" instrument_node="">In the late nineteenth century "white slavery" rings were established that provided women from Central Europe and Russia, who were sold in a sham marriage to a ruffian. They sought to escape poverty and religious persecution that they suffered. And in this country they were forced into prostitution or sold to another pimp.</span><sup class="reference" data-dcnode-id="2594" id="cite_ref-historia_23-1"><a data-dcnode-id="2595" href="#cite_note-historia-23"><span data-dcnode-id="2596" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2593" instrument_node=""> In the early twentieth century, these trafficking organizations tightened their ties with power. This was in order to be protected by law or to avoid problems in case of breaking laws or deception. Because of their great accumulation of wealth through "kickbacks", they accomplished their mission.</span><sup class="reference" data-dcnode-id="2590" id="cite_ref-historia_23-2"><a data-dcnode-id="2591" href="#cite_note-historia-23"><span data-dcnode-id="2592" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="2587" id="cite_ref-25"><a data-dcnode-id="2588" href="#cite_note-25"><span data-dcnode-id="2589" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2586" instrument_node=""> Among the customers it is possible to highlight periods of intense European migration that brought primarily single men as main consumers of trafficking, although upper middle class Argentinians also had a high level use of prostitution. By the early twentieth century there were two major international trafficking rings.</span><sup class="reference" data-dcnode-id="2583" id="cite_ref-26"><a data-dcnode-id="2584" href="#cite_note-26"><span data-dcnode-id="2585" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="2580" id="cite_ref-27"><a data-dcnode-id="2581" href="#cite_note-27"><span data-dcnode-id="2582" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2579" instrument_node="">
</span></p><p data-dcnode-id="2560"><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milieu_%28organized_crime_in_France%29" title="Milieu (organized crime in France)"><span data-dcnode-id="2577" instrument_node="">MILIEU</span></a><span data-dcnode-id="2575" instrument_node="">, a trafficking organization of French origin, and La Migdal, or </span><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zwi_Migdal" title="Zwi Migdal"><span data-dcnode-id="2574" instrument_node="">Zwi Migdal</span></a><span data-dcnode-id="2572" instrument_node="">, of Jewish origin, formerly called the Varsovia (Warsaw) Jewish Mutual Aid Society – This last organization came to an end in 1929 when </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raquel_Liberman" title="Raquel Liberman"><span data-dcnode-id="2571" instrument_node="">Raquel Liberman</span></a><span data-dcnode-id="2569" instrument_node="">, one of thousands of Polish immigrants enslaved in brothels, reported Zwi Migdal to the authorities.</span><sup class="reference" data-dcnode-id="2566" id="cite_ref-clarin_28-0"><a data-dcnode-id="2567" href="#cite_note-clarin-28"><span data-dcnode-id="2568" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2565" instrument_node=""> The complaint was taken by a judge, Manuel Rodriguez Ocampo. Especially since another 150 previous complaints were not successful either because of violence against the accusers or police and judicial corruption. This trial against the organization made it possible to make public the treatment suffered by victims.</span><sup class="reference" data-dcnode-id="2562" id="cite_ref-historia_23-3"><a data-dcnode-id="2563" href="#cite_note-historia-23"><span data-dcnode-id="2564" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2561" instrument_node="">
</span></p><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">After several periods of closure and opening of brothels, from June 24, 1965, Law 16.666 was put into effect that the practice of prostitution is open and not subject to any form of regulation, this law is in effect to the present day.
</span></p><p data-dcnode-id="2550"><span data-dcnode-id="2557" instrument_node="">In practice, this criminal activity is organized on a grand scale and is frequently associated with the </span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_drug_trade" title="Illegal drug trade"><span data-dcnode-id="2556" instrument_node="">illegal drug trade</span></a><span data-dcnode-id="2554" instrument_node=""> and with </span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_trafficking" title="Arms trafficking"><span data-dcnode-id="2553" instrument_node="">arms trafficking</span></a><span data-dcnode-id="2551" instrument_node="">. Much of this crime is organized on a global level.
</span></p><span data-dcnode-id="2549" instrument_node="">
</span><h4 data-dcnode-id="2539"><span class="mw-headline" data-dcnode-id="2547" id="Current_status"><span data-dcnode-id="2548" instrument_node="">Current status</span></span><span class="mw-editsection" data-dcnode-id="2540"><span class="mw-editsection-bracket" data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">[</span></span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D9" title="Edit section: Current status"><span data-dcnode-id="2544" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2537" instrument_node="">At present, Argentina is a source, transit, and destination location for trafficking, which means that the victims can be Argentinian or from other countries, that they go through this country, and that some have this as the destination to be illegally exploited.</span><sup class="reference" data-dcnode-id="2534" id="cite_ref-infopico_9-2"><a data-dcnode-id="2535" href="#cite_note-infopico-9"><span data-dcnode-id="2536" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2533" instrument_node="">
</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2531" instrument_node="">"Reclutadores" (recruiters) capture the victims through deception or abduction, assisted by "marcadores" (markers) who pick the victims. Then the circle closes with the "proxenetas" (</span><a class="mw-redirect" data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pimp" title="Pimp"><span data-dcnode-id="2530" instrument_node="">pimps</span></a><span data-dcnode-id="2528" instrument_node="">) who get their profit from the sexual exploitation of victims. And finally the "regentes" (managers) or madames of brothels. There are also carriers and secondary dealers concerned with protecting this whole criminal system. In some cases there is some kind of collusion between members of the police, judges, and politicians.</span><sup class="reference" data-dcnode-id="2525" id="cite_ref-lanacion_4-1"><a data-dcnode-id="2526" href="#cite_note-lanacion-4"><span data-dcnode-id="2527" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2524" instrument_node="">
</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2522" instrument_node="">The province of the country in which the most women are recruited is Entre Rios, followed by Misiones, Corrientes, Chaco, Santa Fe and Tucuman; usually victims are rotated through brothels across the whole country. The list of destinations includes Buenos Aires and Cordoba, at the head of the list of destinations chosen by the rings, along with La Pampa, Chubut, Santa Cruz and Tierra del Fuego. There are also links to international rings, especially the route to Spain,</span><sup class="reference" data-dcnode-id="2519" id="cite_ref-santa_rosa_29-0"><a data-dcnode-id="2520" href="#cite_note-santa_rosa-29"><span data-dcnode-id="2521" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2518" instrument_node=""> where young Tucuman women were rescued.</span><sup class="reference" data-dcnode-id="2515" id="cite_ref-lanacion_4-2"><a data-dcnode-id="2516" href="#cite_note-lanacion-4"><span data-dcnode-id="2517" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2514" instrument_node="">
</span></p><span data-dcnode-id="2512" instrument_node="">
</span><h4 data-dcnode-id="2502"><span class="mw-headline" data-dcnode-id="2510" id="Recruitment"><span data-dcnode-id="2511" instrument_node="">Recruitment</span></span><span class="mw-editsection" data-dcnode-id="2503"><span class="mw-editsection-bracket" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">[</span></span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D10" title="Edit section: Recruitment"><span data-dcnode-id="2507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">There are many recruiting methods but all are either "soft", based on fraud and deception, or "hard", based directly on kidnapping the victims.
</span></p><span data-dcnode-id="2498" instrument_node="">
</span><ul data-dcnode-id="2486"><li data-dcnode-id="2493"><span data-dcnode-id="2497" instrument_node="">Kidnapping: in this crime women are identified and marked. Later they are kidnapped from off the street, they are drugged and transported to a place where they are repeatedly violated for the purpose of sexually exploiting them later. Those who offer resistance are threatened with harming or killing her family.</span><sup class="reference" data-dcnode-id="2494" id="cite_ref-santa_rosa_29-1"><a data-dcnode-id="2495" href="#cite_note-santa_rosa-29"><span data-dcnode-id="2496" instrument_node="">[29]</span></a></sup></li><span data-dcnode-id="2492" instrument_node="">
</span><li data-dcnode-id="2487"><span data-dcnode-id="2491" instrument_node="">Deception: in which recruiters take advantage of the poverty or defenselessness of the victim with false offers of employment, moving the victim to another province or country, after which she finds she is to be sexually exploited.</span><sup class="reference" data-dcnode-id="2488" id="cite_ref-santa_rosa_29-2"><a data-dcnode-id="2489" href="#cite_note-santa_rosa-29"><span data-dcnode-id="2490" instrument_node="">[29]</span></a></sup></li></ul><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2484" instrument_node="">There are also cases in which the victim has agreed to work in the sex trade, but then finds out the working and living conditions fall within the category of trafficking. Sometimes these victims only recognize the exploitation after intensive psychological assistance.</span><sup class="reference" data-dcnode-id="2481" id="cite_ref-infopico_9-3"><a data-dcnode-id="2482" href="#cite_note-infopico-9"><span data-dcnode-id="2483" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2478" id="cite_ref-notio_30-0"><a data-dcnode-id="2479" href="#cite_note-notio-30"><span data-dcnode-id="2480" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2477" instrument_node="">
</span></p><span data-dcnode-id="2475" instrument_node="">
</span><h4 data-dcnode-id="2465"><span class="mw-headline" data-dcnode-id="2473" id="Recent_studies"><span data-dcnode-id="2474" instrument_node="">Recent studies</span></span><span class="mw-editsection" data-dcnode-id="2466"><span class="mw-editsection-bracket" data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">[</span></span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D11" title="Edit section: Recent studies"><span data-dcnode-id="2470" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2463" instrument_node="">A recent study in 2012 of court cases of the Unidad Fiscal de Asistencia en Secuestros Extorsivos y Trata de Personas  [Fiscal Unit of Assistance in Kidnappings and Trafficking in Persons](UFASE) and the Instituto de Estudios Comparados en Ciencias Penales y Sociales [Institute for Comparative Studies in Criminal and Social Sciences] (INECIP) revealed that trafficking for sexual exploitation is mutating into new forms of subjugation of women, to make it more difficult to prove the existence of slavery in bordellos and thus evading the law. This is a result of the enactment of Law 26.364 in April 2008 that strongly penalizes this offense. The victims have their documents in their possession and in many cases are allowed to leave the sites of exploitation, but the subjugation continues to function in another way. Furthermore, the report shows collusion between state, local, police, and judicial entities that "legitimizes the activity and leads to its habituation." Some 72% of cases are enslaved in nightclubs like </span><i data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">whiskerías</span></i><span data-dcnode-id="2460" instrument_node=""> (undercover brothels), pubs, or pool halls, all enabled by the municipalities, and the other 22% in private apartments.</span><sup class="reference" data-dcnode-id="2457" id="cite_ref-pagina12_11-1"><a data-dcnode-id="2458" href="#cite_note-pagina12-11"><span data-dcnode-id="2459" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2456" instrument_node="">
</span></p><span data-dcnode-id="2454" instrument_node="">
</span><h3 data-dcnode-id="2444"><span class="mw-headline" data-dcnode-id="2452" id="Underage_victims"><span data-dcnode-id="2453" instrument_node="">Underage victims</span></span><span class="mw-editsection" data-dcnode-id="2445"><span class="mw-editsection-bracket" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">[</span></span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D12" title="Edit section: Underage victims"><span data-dcnode-id="2449" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2442" instrument_node="">Worldwide, close to 2.5 million people are victims of some form of trafficking.  Between 22% and 50% are girls and boys. The exact figure is unknown because trafficking in children is usually hidden; for this reason, reliable data cannot be obtained. Many of these situations occur within cities or urban areas. For example, trafficking for the purposes of </span><a class="mw-redirect" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_exploitation" title="Sexual exploitation"><span data-dcnode-id="2441" instrument_node="">sexual exploitation</span></a><span data-dcnode-id="2439" instrument_node=""> occurs with girls and boys working on city streets. Many rural children from rural areas are moved to the cities by the traffickers.</span><sup class="reference" data-dcnode-id="2436" id="cite_ref-Unicef-pdf_31-0"><a data-dcnode-id="2437" href="#cite_note-Unicef-pdf-31"><span data-dcnode-id="2438" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2435" instrument_node="">
</span></p><p data-dcnode-id="2422"><span data-dcnode-id="2433" instrument_node="">According to the Department of State of the United States, that which occurs in the world also occurs in Argentina.  Children come from northern provinces, or from bordering countries like Bolivia, Paraguay, and Brazil. Areas with a triple border are a major focus of child trafficking and </span><a class="mw-redirect" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labor" title="Child labor"><span data-dcnode-id="2432" instrument_node="">child labor</span></a><span data-dcnode-id="2430" instrument_node="">, especially of children living in border areas and bordering countries. These end up in urban centers of central and south of the country, where </span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_sex_tourism" title="Child sex tourism"><span data-dcnode-id="2429" instrument_node="">child sex tourism</span></a><span data-dcnode-id="2427" instrument_node=""> is promoted. Others are victims of forced labor in underground sweatshops and agricultural enterprises.</span><sup class="reference" data-dcnode-id="2424" id="cite_ref-clarin_informe_32-0"><a data-dcnode-id="2425" href="#cite_note-clarin_informe-32"><span data-dcnode-id="2426" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2423" instrument_node="">
</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Under the new Argentine law, child trafficking is punishable by the maximum penalty for this offense.  In addition, penalties can be increased if there are aggravating factors.
</span></p><span data-dcnode-id="2419" instrument_node="">
</span><h3 data-dcnode-id="2409"><span class="mw-headline" data-dcnode-id="2417" id="Interviews_about_trafficking"><span data-dcnode-id="2418" instrument_node="">Interviews about trafficking</span></span><span class="mw-editsection" data-dcnode-id="2410"><span class="mw-editsection-bracket" data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">[</span></span><a data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D13" title="Edit section: Interviews about trafficking"><span data-dcnode-id="2414" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2407" instrument_node="">Narrative on trafficking for sexual exploitation:</span><sup class="reference" data-dcnode-id="2404" id="cite_ref-OIM_16-1"><a data-dcnode-id="2405" href="#cite_note-OIM-16"><span data-dcnode-id="2406" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2403" instrument_node="">
</span></p><span data-dcnode-id="2401" instrument_node="">
</span><link data-dcnode-id="2400" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2397"><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">“Me ofrecieron empleo en un restaurante en la capital,a casi 400 km.de mi casa. Como en mi pueblo no había trabajo, acepté. Me adelantaron $200 y me dieron el pasaje en ómnibus. Cuando llegué a la dirección que me habían dado, me dijeron que el restaurante era a unas cuadras, y me llevaron en auto. Pero cuando llegamos, no era una parrilla: era una whiskería. Me encerraron, me pegaron, me violaron y me obligaron a prostituirme. Además, me dijeron que si le decía algo a alguien, esto mismo se lo harían a mis hijas, ya que sabían dónde vivían... Nunca pensé que me pudiera pasar una cosa así…”</span></p></blockquote><span data-dcnode-id="2396" instrument_node="">
</span><link data-dcnode-id="2395" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2385"><p data-dcnode-id="2390"><span data-dcnode-id="2394" instrument_node="">[Translation: "I was offered employment in a restaurant in the capital, nearly 400 km from my house. As in my village there was no work, I accepted. They gave me an advance of $200 and bus fare. When I arrived at the address they had given me, I was told that the restaurant was a few blocks away, and brought me there by car. But when we arrived, it was not a grill: it was a </span><i data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">whiskería</span></i><span data-dcnode-id="2391" instrument_node=""> (undercover brothel). They locked me up, beat me, raped me and forced me into prostitution. In addition, I was told that if I said anything to anyone, they would do the same thing to my daughters, since they knew where they lived ... I never would have thought that such a thing could happen to me ... "]
</span></p><div class="templatequotecite" data-dcnode-id="2386"><span data-dcnode-id="2389" instrument_node="">— </span><cite data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Source: Organización Internacional para las Migraciones [International Organization for Migration]</span></cite></div></blockquote><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2383" instrument_node="">Narrative of labor exploitation:</span><sup class="reference" data-dcnode-id="2380" id="cite_ref-OIM_16-2"><a data-dcnode-id="2381" href="#cite_note-OIM-16"><span data-dcnode-id="2382" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2379" instrument_node="">
</span></p><span data-dcnode-id="2377" instrument_node="">
</span><link data-dcnode-id="2376" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2373"><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">“Un día por la radio escuché que un fabricante pedía costureros para su taller en Buenos Aires. En Santa Cruz (Bolivia), me entrevisté con una señora que me dijo que pagaban un peso con cincuenta la prenda, con casa y comida. Ellos pagaban el traslado, y después me lo iban descontando. Mi pasaje salió 120 dólares. Viajamos mi mujer, yo, y unas seis personas más. De la terminal de micros de Retiro nos llevaron directo al taller, y el dueño se quedó con nuestros documentos. El taller tiene dos habitaciones bien grandes, con unas 15 máquinas. Allí trabajamos, comemos y vivimos todos, incluso hay gente con niños pequeños. Trabajamos de lunes a sábado al mediodía, desde las siete de la mañana hasta la una de la madrugada del día siguiente. Al que se cansa o quiere dormir, el dueño lo amenaza con no pagarle nada, con “cagarlo a palos por vago”, o con denunciarlo a la policía para que lo deporten. Las puertas del taller están cerradas con llave, y la puerta de calle también. Ayer cuando le pedí lo que me debía, porque quería mandar plata a mi familia, me dijo que no me debía nada, me gritó que si lo seguía jodiendo llamaba a los de migraciones y me agarró a las patadas; a mi señora también le pegó.”</span></p></blockquote><span data-dcnode-id="2372" instrument_node="">
</span><link data-dcnode-id="2371" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2364"><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">[Translation: "One day I heard on the radio that a manufacturer was asking for sewing workers for their workshop in Buenos Aires. In Santa Cruz (Bolivia), I interviewed with a woman who told me they were paying one peso per fifty garments, with room and board. They would pay for the transportation and later give me a discount. My passage turned out to be $120. We traveled together: my wife, myself, and some six people more. From Retiro, the main terminal for long-distance bus travel in Buenos Aires, they took us straight to the shop and the owner kept our documents. The workshop has two rather large rooms, with about 15 machines. That was where we all worked, ate, and lived, including even people with small children. We worked from Monday to Saturday at noon, from seven o'clock in the morning until one o'clock in the morning of the next day. If anyone gets tired or wants to sleep, the owner threatens to not pay us anything, to "beat the crap out of us for being lazy," or to denounce us to the police so they would deport us. The shop doors are locked and the door to the street as well. Yesterday when I asked what he owed me, because I wanted to send money to my family, he told me he didn't owe me anything, he shouted at me that if I kept screwing around he would call immigration and he grabbed me kicking, he also hit my wife."]</span></p><div class="templatequotecite" data-dcnode-id="2365"><span data-dcnode-id="2368" instrument_node="">— </span><cite data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Source: Organización Internacional para las Migraciones [International Organization for Migration]</span></cite></div></blockquote><span data-dcnode-id="2363" instrument_node="">
</span><h2 data-dcnode-id="2353"><span class="mw-headline" data-dcnode-id="2361" id="Court_cases"><span data-dcnode-id="2362" instrument_node="">Court cases</span></span><span class="mw-editsection" data-dcnode-id="2354"><span class="mw-editsection-bracket" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">[</span></span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D14" title="Edit section: Court cases"><span data-dcnode-id="2358" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2352" instrument_node="">
</span><h3 data-dcnode-id="2342"><span class="mw-headline" data-dcnode-id="2350" id="Case_of_Marita_Veron"><span data-dcnode-id="2351" instrument_node="">Case of Marita Veron</span></span><span class="mw-editsection" data-dcnode-id="2343"><span class="mw-editsection-bracket" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">[</span></span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D15" title="Edit section: Case of Marita Veron"><span data-dcnode-id="2347" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2341" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2335" role="note"><span data-dcnode-id="2338" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marita_Veron" title="Marita Veron"><span data-dcnode-id="2337" instrument_node="">Marita Veron</span></a></div><span data-dcnode-id="2334" instrument_node="">
</span><link data-dcnode-id="2333" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2329" role="note"><span data-dcnode-id="2332" instrument_node="">See also: </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susana_Trimarco" title="Susana Trimarco"><span data-dcnode-id="2331" instrument_node="">Susana Trimarco</span></a></div><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2327" instrument_node="">One of the more well known cases in Argentina is that of Marita Veron, which was brought to court in 2012 after an intensive search and collection of evidence, where part of the network of this country's web of trafficking for sexual exploitation was discovered.</span><sup class="reference" data-dcnode-id="2324" id="cite_ref-33"><a data-dcnode-id="2325" href="#cite_note-33"><span data-dcnode-id="2326" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="2321" id="cite_ref-34"><a data-dcnode-id="2322" href="#cite_note-34"><span data-dcnode-id="2323" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2320" instrument_node="">
</span></p><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">It is known that she left her home on April 3, 2002, and three days later, she was found by police while escaping from a sex party that seems to have been her first destination; she was put on a bus with a group traveling in the direction of Tucuman but never arrived. Later, a witness saw her in one of three Rioja brothels, which the Appeals Chamber of Tucumán described as "places intended for the practice of prostitution where there is a systematic recruitment of women including by means deprivation of liberty." Since then there has been no more information obtained on the whereabouts of Marita.
</span></p><p data-dcnode-id="2305"><span data-dcnode-id="2316" instrument_node="">Marita's mother </span><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susana_Trimarco" title="Susana Trimarco"><span data-dcnode-id="2315" instrument_node="">Susana Trimarco</span></a><span data-dcnode-id="2313" instrument_node="">, the principal impulse behind the investigation, has managed to rescue more than 20 women who were victims of trafficking. The Maria de los Angeles Foundation rescues and helps victims of trafficking.</span><sup class="reference" data-dcnode-id="2310" id="cite_ref-35"><a data-dcnode-id="2311" href="#cite_note-35"><span data-dcnode-id="2312" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="2307" id="cite_ref-36"><a data-dcnode-id="2308" href="#cite_note-36"><span data-dcnode-id="2309" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2306" instrument_node="">
</span></p><p data-dcnode-id="2295"><span data-dcnode-id="2304" instrument_node="">The trial over the disappearance of Marita began on February 8, 2012, and indicted 13 people, 7 men and 6 women, who are linked to the kidnapping and to the promotion of prostitution. It brought together more than 150 witnesses.</span><sup class="reference" data-dcnode-id="2301" id="cite_ref-37"><a data-dcnode-id="2302" href="#cite_note-37"><span data-dcnode-id="2303" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2300" instrument_node=""> The trial ended on December 11, 2012, and all indicted people were absolved, the mother of Marita Veron will impulse a political trial against the magistrate.</span><sup class="reference" data-dcnode-id="2297" id="cite_ref-38"><a data-dcnode-id="2298" href="#cite_note-38"><span data-dcnode-id="2299" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2296" instrument_node="">
</span></p><span data-dcnode-id="2294" instrument_node="">
</span><h3 data-dcnode-id="2283"><span data-dcnode-id="2293" id="UFASE.27s_statistics"></span><span class="mw-headline" data-dcnode-id="2291" id="UFASE's_statistics"><span data-dcnode-id="2292" instrument_node="">UFASE's statistics</span></span><span class="mw-editsection" data-dcnode-id="2284"><span class="mw-editsection-bracket" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">[</span></span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D16" title="Edit section: UFASE's statistics"><span data-dcnode-id="2288" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2281" instrument_node="">According to statistics taken from August 22, 2008, to March 7, 2012, by the Fiscal Assistance Unit of Kidnappings and Trafficking (UFASE – Unidad Fiscal de Asistencia en Secuestros Extorsivos y Trata de Personas) responsible for assisting the Argentine fiscal units in the processing of kidnappings and trafficking court cases. Some 64% of court cases were for trafficking for purposes of sexual exploitation, while the percentages for trafficking for labor exploitation were 5% rural, 1% textile, and 1% begging. As for sexual exploitation, 77% of the victims were female, 19% male, and 4% transgender. In 70% of cases, the method of recruitment was by "promises of employment", 8% by exploiting the victim's family problems and 8% inducement by romantic relationship, and 3% of cases by the delivery by a family member or acquaintance. Some 52% had no freedom of movement and 45% experienced violence. With regard to the nationality of the victims, 31% were Bolivian, 28% Argentinian, 21% Paraguayan, 10% Dominican, 5% Peruvian, 3% Colombian, and 2% Uruguayan. Source countries for recruitment were 83% in Argentina, 12% in Paraguay, and 1% in Bolivia, while the destination country was 94% for Argentina, 4% Paraguay, and 2% Chile.</span><sup class="reference" data-dcnode-id="2278" id="cite_ref-39"><a data-dcnode-id="2279" href="#cite_note-39"><span data-dcnode-id="2280" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="2275" id="cite_ref-40"><a data-dcnode-id="2276" href="#cite_note-40"><span data-dcnode-id="2277" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2274" instrument_node="">
</span></p><span data-dcnode-id="2272" instrument_node="">
</span><h2 data-dcnode-id="2262"><span class="mw-headline" data-dcnode-id="2270" id="Support_programs_for_victims_and_others"><span data-dcnode-id="2271" instrument_node="">Support programs for victims and others</span></span><span class="mw-editsection" data-dcnode-id="2263"><span class="mw-editsection-bracket" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">[</span></span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D17" title="Edit section: Support programs for victims and others"><span data-dcnode-id="2267" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2261" instrument_node="">
</span><h3 data-dcnode-id="2251"><span class="mw-headline" data-dcnode-id="2259" id="Office_for_Rescue_and_Caring_of_Victims_of_Trafficking"><span data-dcnode-id="2260" instrument_node="">Office for Rescue and Caring of Victims of Trafficking</span></span><span class="mw-editsection" data-dcnode-id="2252"><span class="mw-editsection-bracket" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">[</span></span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D18" title="Edit section: Office for Rescue and Caring of Victims of Trafficking"><span data-dcnode-id="2256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2249" instrument_node="">According to the new Law 26.364 that was created in August 2008, the "</span><a class="external text" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jus.gob.ar/areas-tematicas/trata-de-personas.aspx" rel="nofollow"><span data-dcnode-id="2248" instrument_node="">Oficina de Rescate y Acompañamiento a Personas Damnificadas por el Delito de Trata de Personas</span></a><span data-dcnode-id="2246" instrument_node=""> [Office of Rescue and Support for People Harmed by the Crime of Trafficking in Persons]", is under the Chief of Staff of the Ministry of Justice Office. The security forces, professionals in psychology, law, and social work have a similar form. They accompany the victim from the time of their rescue or escape from the place of exploitation and during the investigation of the trafficking crime, later providing support and legal assistance until the moment they give testimony. Victims receive psychological, medical, and legal assistance.  Later the victims "testify under conditions of special protection and care"; this can be via a </span><a class="new" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGesell_chamber%26action%3Dedit%26redlink%3D1" title="Gesell chamber (page does not exist)"><span data-dcnode-id="2245" instrument_node="">Gesell chamber</span></a><span data-dcnode-id="2243" instrument_node=""> or one-way mirror.</span><sup class="reference" data-dcnode-id="2240" id="cite_ref-MJD_41-0"><a data-dcnode-id="2241" href="#cite_note-MJD-41"><span data-dcnode-id="2242" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2239" instrument_node="">
</span></p><p data-dcnode-id="2232"><span data-dcnode-id="2237" instrument_node="">Victims are "not punishable for committing any offense that is a direct result of being trafficked." In the case of foreigners, no sanctions are applied either.</span><sup class="reference" data-dcnode-id="2234" id="cite_ref-Ufase_17-1"><a data-dcnode-id="2235" href="#cite_note-Ufase-17"><span data-dcnode-id="2236" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2233" instrument_node="">
</span></p><span data-dcnode-id="2231" instrument_node="">
</span><h3 data-dcnode-id="2221"><span class="mw-headline" data-dcnode-id="2229" id="Maria_de_los_Angeles_Foundation"><span data-dcnode-id="2230" instrument_node="">Maria de los Angeles Foundation</span></span><span class="mw-editsection" data-dcnode-id="2222"><span class="mw-editsection-bracket" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">[</span></span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D19" title="Edit section: Maria de los Angeles Foundation"><span data-dcnode-id="2226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2219" instrument_node="">Fundación María de los Ángeles</span><sup class="reference" data-dcnode-id="2216" id="cite_ref-42"><a data-dcnode-id="2217" href="#cite_note-42"><span data-dcnode-id="2218" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2215" instrument_node=""> [Foundation of Maria of the Angels] is a nonprofit organization that fights against the crime of human trafficking for the purposes of sexual exploitation. The foundation assists victims of sexual exploitation free of charge, and offers legal assistance to victims, counseling for victims and families, and social assistance. It also provides community talks and </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capacity_building" title="Capacity building"><span data-dcnode-id="2214" instrument_node="">capacity building</span></a><span data-dcnode-id="2212" instrument_node=""> for judges, prosecutors, and police.</span><sup class="reference" data-dcnode-id="2209" id="cite_ref-fundacion_43-0"><a data-dcnode-id="2210" href="#cite_note-fundacion-43"><span data-dcnode-id="2211" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2208" instrument_node="">
</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2206" instrument_node="">It seeks to prosecute applicable cases under Law 26.364 and to provide psychological support to victims so they can overcome the traumatic situations they have lived through.</span><sup class="reference" data-dcnode-id="2203" id="cite_ref-fundacion_43-1"><a data-dcnode-id="2204" href="#cite_note-fundacion-43"><span data-dcnode-id="2205" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2202" instrument_node="">
</span></p><p data-dcnode-id="2192"><span data-dcnode-id="2200" instrument_node="">The foundation was founded by </span><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susana_Trimarco" title="Susana Trimarco"><span data-dcnode-id="2199" instrument_node="">Susana Trimarco</span></a><span data-dcnode-id="2197" instrument_node=""> in 2007 with the help of the Human Rights Secretariat of Tucuman. Since then this group has achieved the filing of more than 800 court cases, and has found and rescued at least 400 women subjected to sex trafficking without their consent.</span><sup class="reference" data-dcnode-id="2194" id="cite_ref-44"><a data-dcnode-id="2195" href="#cite_note-44"><span data-dcnode-id="2196" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2193" instrument_node="">
</span></p><p data-dcnode-id="2183"><span data-dcnode-id="2191" instrument_node="">Susana Trimarco is still searching for her daughter </span><a class="mw-redirect" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marita_Veron" title="Marita Veron"><span data-dcnode-id="2190" instrument_node="">Marita</span></a><span data-dcnode-id="2188" instrument_node="">, who fell victim to sex trafficking on April 3, 2002.  After investigating the crime of trafficking and its networks, and rescuing many victims, including some under 12 years of age, she decided to create the foundation to help victims and to continue searching for her daughter. The vision of the foundation is to eradicate the trafficking of persons in Argentina.</span><sup class="reference" data-dcnode-id="2185" id="cite_ref-45"><a data-dcnode-id="2186" href="#cite_note-45"><span data-dcnode-id="2187" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2184" instrument_node="">
</span></p><p data-dcnode-id="2174"><span data-dcnode-id="2182" instrument_node="">The María de los Ángeles foundation has offices based in Tucuman and Buenos Aires </span><a class="external autonumber" data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20100328114517/http%3A//www.fundacionmariadelosangeles.org/esp/oficinas.htm" rel="nofollow"><span data-dcnode-id="2181" instrument_node="">[1]</span></a><span data-dcnode-id="2179" instrument_node="">. The foundation and Susana Trimarco can count a great many accomplishments and awards.</span><sup class="reference" data-dcnode-id="2176" id="cite_ref-46"><a data-dcnode-id="2177" href="#cite_note-46"><span data-dcnode-id="2178" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2175" instrument_node="">
</span></p><span data-dcnode-id="2173" instrument_node="">
</span><h2 data-dcnode-id="2163"><span class="mw-headline" data-dcnode-id="2171" id="References"><span data-dcnode-id="2172" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="2164"><span class="mw-editsection-bracket" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">[</span></span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Argentina%26action%3Dedit%26section%3D20" title="Edit section: References"><span data-dcnode-id="2168" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2162" instrument_node="">
