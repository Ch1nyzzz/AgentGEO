</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="3245" id="firstHeading"><span data-dcnode-id="3246" instrument_node="">Human trafficking in Argentina</span></h1><span data-dcnode-id="3244" instrument_node="">
</span><div class="vector-body" data-dcnode-id="438" id="bodyContent"><span data-dcnode-id="3243" instrument_node="">
</span><div class="noprint" data-dcnode-id="3241" id="siteSub"><span data-dcnode-id="3242" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="3240" instrument_node="">
</span><div data-dcnode-id="3239" id="contentSub"></div><span data-dcnode-id="3238" instrument_node="">

</span><a class="mw-jump-link" data-dcnode-id="3232" href="#mw-head"><span data-dcnode-id="3233" instrument_node="">Jump to navigation</span></a><span data-dcnode-id="3231" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="3229" href="#searchInput"><span data-dcnode-id="3230" instrument_node="">Jump to search</span></a><span data-dcnode-id="3228" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="474" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="483"><p data-dcnode-id="3212"><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="3227" instrument_node="">Human trafficking</span></a><span data-dcnode-id="3225" instrument_node=""> in </span><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentina" title="Argentina"><span data-dcnode-id="3224" instrument_node="">Argentina</span></a><span data-dcnode-id="3222" instrument_node=""> is the illegal trade in persons for purposes of reproductive slavery, </span><a class="mw-redirect" data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_exploitation" title="Sexual exploitation"><span data-dcnode-id="3221" instrument_node="">sexual exploitation</span></a><span data-dcnode-id="3219" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labor" title="Forced labor"><span data-dcnode-id="3218" instrument_node="">forced labor</span></a><span data-dcnode-id="3216" instrument_node="">, organ removal, or any form of modern </span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="3215" instrument_node="">slavery</span></a><span data-dcnode-id="3213" instrument_node="">.
</span></p><p data-dcnode-id="3186"><span data-dcnode-id="3211" instrument_node="">It is an international </span><a data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimes_against_humanity" title="Crimes against humanity"><span data-dcnode-id="3210" instrument_node="">crime against humanity</span></a><span data-dcnode-id="3208" instrument_node=""> and violates human rights. It is considered a modern form of </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="3207" instrument_node="">slavery</span></a><span data-dcnode-id="3205" instrument_node="">.</span><sup class="reference" data-dcnode-id="3202" id="cite_ref-1"><a data-dcnode-id="3203" href="#cite_note-1"><span data-dcnode-id="3204" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3199" id="cite_ref-2"><a data-dcnode-id="3200" href="#cite_note-2"><span data-dcnode-id="3201" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3196" id="cite_ref-esclavosenEuropa_3-0"><a data-dcnode-id="3197" href="#cite_note-esclavosenEuropa-3"><span data-dcnode-id="3198" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3195" instrument_node=""> Worldwide it is ranked third among felony crimes, behind arms and drugs trafficking. It accounts for the movement of more than $32 billion worldwide.</span><sup class="reference" data-dcnode-id="3192" id="cite_ref-lanacion_4-0"><a data-dcnode-id="3193" href="#cite_note-lanacion-4"><span data-dcnode-id="3194" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3191" instrument_node=""> A United Nations international protocol against human trafficking has been signed by 117 different countries, among them Argentina.</span><sup class="reference" data-dcnode-id="3188" id="cite_ref-5"><a data-dcnode-id="3189" href="#cite_note-5"><span data-dcnode-id="3190" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3187" instrument_node=""> This treaty obligates the countries that are party to it to prevent and combat human trafficking and to assist and protect the victims of it. It also encourages countries to cooperate among themselves to achieve these objectives.
</span></p><p data-dcnode-id="3172"><span data-dcnode-id="3185" instrument_node="">In Argentina this crime is punishable by law.  There are many laws that cover this problem, but the crime continues to occur. An important legal development in this area was the enactment of law number 26.364,</span><sup class="reference" data-dcnode-id="3182" id="cite_ref-6"><a data-dcnode-id="3183" href="#cite_note-6"><span data-dcnode-id="3184" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3181" instrument_node=""> which tries to achieve what this international protocol seeks</span><sup class="reference" data-dcnode-id="3178" id="cite_ref-Ley_7-0"><a data-dcnode-id="3179" href="#cite_note-Ley-7"><span data-dcnode-id="3180" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3177" instrument_node=""> and provides penalties of 3 to 15 years in prison.</span><sup class="reference" data-dcnode-id="3174" id="cite_ref-8"><a data-dcnode-id="3175" href="#cite_note-8"><span data-dcnode-id="3176" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3173" instrument_node="">
</span></p><p data-dcnode-id="3162"><span data-dcnode-id="3171" instrument_node="">Despite being a serious felony, in Argentina there are no official statistics on this crime, only for cases prosecuted. But it is known that the country is a source, transit and destination for trafficking.</span><sup class="reference" data-dcnode-id="3168" id="cite_ref-infopico_9-0"><a data-dcnode-id="3169" href="#cite_note-infopico-9"><span data-dcnode-id="3170" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3167" instrument_node=""> As a means of preventing trafficking, in July 2011 the government issued an order that banned the publication of explicit advertisements of sexual solicitation in the newspapers.</span><sup class="reference" data-dcnode-id="3164" id="cite_ref-10"><a data-dcnode-id="3165" href="#cite_note-10"><span data-dcnode-id="3166" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3163" instrument_node="">
</span></p><p data-dcnode-id="3156"><span data-dcnode-id="3161" instrument_node="">A study from 2012 showed that trafficking for sexual exploitation is changing to evade the law, by allowing exploited women to keep their identification documents or allowing them to leave the location of exploitation, to make the trafficking more difficult to prove.</span><sup class="reference" data-dcnode-id="3158" id="cite_ref-pagina12_11-0"><a data-dcnode-id="3159" href="#cite_note-pagina12-11"><span data-dcnode-id="3160" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3157" instrument_node="">
</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3155" instrument_node="">U.S. State Department's </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_to_Monitor_and_Combat_Trafficking_in_Persons" title="Office to Monitor and Combat Trafficking in Persons"><span data-dcnode-id="3154" instrument_node="">Office to Monitor and Combat Trafficking in Persons</span></a><span data-dcnode-id="3152" instrument_node=""> placed the country in "Tier 1" in 2018.</span><sup class="reference" data-dcnode-id="3149" id="cite_ref-12"><a data-dcnode-id="3150" href="#cite_note-12"><span data-dcnode-id="3151" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3148" instrument_node="">
</span></p><span data-dcnode-id="3146" instrument_node="">
