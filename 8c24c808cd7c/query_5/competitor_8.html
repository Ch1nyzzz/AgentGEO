</span><h2 data-dcnode-id="2598"><span class="mw-headline" data-dcnode-id="2606" id="Protection"><span data-dcnode-id="2607" instrument_node="">Protection</span></span><span class="mw-editsection" data-dcnode-id="2599"><span class="mw-editsection-bracket" data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">[</span></span><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D12" title="Edit section: Protection"><span data-dcnode-id="2603" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2596" instrument_node="">Protection is repairing and building up the broken legal system so that it can effectively protect the rights of human-trafficking victims.</span><sup class="reference" data-dcnode-id="2593" id="cite_ref-:62_41-2"><a data-dcnode-id="2594" href="#cite_note-:62-41"><span data-dcnode-id="2595" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2592" instrument_node="">
</span></p><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">The Thai government continued to provide impressive protection to foreign victims of sex trafficking in Thailand and Thai citizens who have returned after facing labour or sex trafficking conditions abroad. However, protections offered to foreign victims of forced labour in Thailand were considerably weaker, as male victims of trafficking were not yet included under victim protection provisions of Thai law.
</span></p><p data-dcnode-id="2583"><span data-dcnode-id="2588" instrument_node="">Thailand's Prime Minister, General Prayut Chan-o-cha, has reiterated his commitment in eradicating human trafficking. His determination has translated into a number of policy directives and measures addressing both the elimination of nurturing conditions and the immediate causes of trafficking of persons in Thailand. A case in point includes nationwide registration of illegal migrant workers, more stringent regulation of vessels and labour in the fisheries sector, amendments and improvements of relevant laws.</span><sup class="reference" data-dcnode-id="2585" id="cite_ref-53"><a data-dcnode-id="2586" href="#cite_note-53"><span data-dcnode-id="2587" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2584" instrument_node="">
</span></p><p data-dcnode-id="2573"><span data-dcnode-id="2582" instrument_node="">The new, comprehensive anti-trafficking legislation passed in November 2007 promises, when enacted and implemented in June 2008, to extend protections to male victims of trafficking and victims of labour trafficking. The government allows all female trafficking victims, Thai and foreign, to receive shelter and social services pending repatriation to their country of origin or hometown. It does not, however, offer legal alternatives to removal to countries where victims face hardship or retribution, such as the repressive conditions found in Burma.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2575" style="white-space:nowrap;"><span data-dcnode-id="2581" instrument_node="">[</span><i data-dcnode-id="2577"><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2579" title="This claim needs references to reliable sources. (October 2019)"><span data-dcnode-id="2580" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2576" instrument_node="">]</span></sup><span data-dcnode-id="2574" instrument_node="">
</span></p><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">The government encourages female victims' participation in the investigation and prosecution of sex trafficking crimes. In cases involving forced labour, the 1998 Labor Protection Act allows for compensatory damages from the employer, although the government offers no legal aid to encourage workers to avail themselves of this opportunity; in practice, few foreign labourers are able to pursue legal cases against their employers in Thai courts.
</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2570" instrument_node="">Formidable legal costs and language, bureaucratic and </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration" title="Immigration"><span data-dcnode-id="2569" instrument_node="">immigration</span></a><span data-dcnode-id="2567" instrument_node=""> obstacles effectively prevent most of them from participating in the Thai legal process. Female victims of sex trafficking are generally not </span><a class="mw-redirect" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jail" title="Jail"><span data-dcnode-id="2566" instrument_node="">jailed</span></a><span data-dcnode-id="2564" instrument_node=""> or deported; foreign victims of labour trafficking and men may be deported as illegal migrants. The Thai government refers victims of sex trafficking and child victims of labour trafficking to one of seven regional shelters run by the government, where they receive psychological counselling, food, board and medical care.
</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">In April 2008, the Ministry of Labour presented a series of operational guidelines for handling future labour trafficking cases. The guidelines include provisions that grant immunity to trafficking victims from prosecution arising from their possible involvement in immigration or prostitution crimes and provide migrant trafficking victims temporary residence in Thailand pending resolution of criminal or civil court cases. Thai embassies provide consular protection to Thai citizens who encounter difficulties overseas.
</span></p><p data-dcnode-id="2549"><span data-dcnode-id="2560" instrument_node="">The Department of Consular Affairs in the Ministry of Foreign Affairs (MFA) reported that 403 Thai nationals were classified as trafficking victims abroad and repatriated from a number of countries including Bahrain (368 victims), Singapore (14 victims) and Malaysia (12 victims). In 2007, the government's shelters provided protection and social services for 179 repatriated Thai victims and 363 foreigners trafficked to Thailand. In 2007, the Ministry of Foreign Affairs Department of Consular Affairs conducted training in Thailand and abroad for community leaders, victims, and labourers. The MFA sent psychologists to provide training to Thai volunteers in Taiwan helping Thai trafficking victims, organised a workshop amongst Thai translators under the "Help Thais" program in Singapore, and coordinated translators to assist 36 Thai trafficking victims arrested in </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durban" title="Durban"><span data-dcnode-id="2559" instrument_node="">Durban</span></a><span data-dcnode-id="2557" instrument_node="">, </span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa" title="South Africa"><span data-dcnode-id="2556" instrument_node="">South Africa</span></a><span data-dcnode-id="2554" instrument_node="">. A 2005 cabinet resolution established guidelines for the return of stateless residents abroad who have been determined to be trafficking victims and can prove prior residency in Thailand. These stateless residents can effectively be given residency status in Thailand on a case-by-case basis.</span><sup class="reference" data-dcnode-id="2551" id="cite_ref-TIP2014_9-3"><a data-dcnode-id="2552" href="#cite_note-TIP2014-9"><span data-dcnode-id="2553" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2550" instrument_node="">
</span></p><p data-dcnode-id="2543"><span data-dcnode-id="2548" instrument_node="">In 2017, the government provided more than 10.2 million baht (US$314,110) to victims and witnesses through various government funds, compared to 9.2 million baht (US$280,980) in 2016. MSDHS established a sub-unit under its anti-trafficking division to provide victims legal assistance and file compensation claims. The government provided legal alternatives to deportation to victims who faced retribution or hardship upon return to their home countries.</span><sup class="reference" data-dcnode-id="2545" id="cite_ref-:282764_44-1"><a data-dcnode-id="2546" href="#cite_note-:282764-44"><span data-dcnode-id="2547" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2544" instrument_node="">
</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2542" instrument_node="">Enforcement of penalties remains lax. Human traffickers in Thailand ignore court orders to compensate victims in more than 99% of cases in recent years. Thai courts have ordered traffickers to pay their victims more than 130 million baht (US$4.3 million) in 1,335 cases since 2014. Victims were compensated in only five cases, with plaintiffs receiving a total of 5.6 million baht. Thai law allows victims to claim compensation from convicted traffickers, but offenders have refused to pay, for which there is no legal punishment.</span><sup class="reference" data-dcnode-id="2539" id="cite_ref-54"><a data-dcnode-id="2540" href="#cite_note-54"><span data-dcnode-id="2541" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2538" instrument_node="">
</span></p><span data-dcnode-id="2536" instrument_node="">
</span><h2 data-dcnode-id="2526"><span class="mw-headline" data-dcnode-id="2534" id="References"><span data-dcnode-id="2535" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="2527"><span class="mw-editsection-bracket" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">[</span></span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D13" title="Edit section: References"><span data-dcnode-id="2531" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2525" instrument_node="">

</span><li data-dcnode-id="2436" id="cite_note-3"><span class="mw-cite-backlink" data-dcnode-id="2460"><b data-dcnode-id="2461"><a aria-label="Jump up" data-dcnode-id="2462" href="#cite_ref-3" title="Jump up"><span data-dcnode-id="2463" instrument_node="">^</span></a></b></span><span data-dcnode-id="2459" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2438"><link data-dcnode-id="2458" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="2440"><a class="external text" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20170628043920/https%3A//www.state.gov/j/tip/rls/tiprpt/2017/271117.htm" rel="nofollow"><span data-dcnode-id="2457" instrument_node="">"Trafficking in Persons Report 2019: Tier Placements"</span></a><span data-dcnode-id="2455" instrument_node="">. </span><i data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">www.state.gov</span></i><span data-dcnode-id="2452" instrument_node="">. Archived from </span><a class="external text" data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/wp-content/uploads/2019/06/2019-Trafficking-in-Persons-Report.pdf" rel="nofollow"><span data-dcnode-id="2451" instrument_node="">the original</span></a><span data-dcnode-id="2449" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">(PDF)</span></span><span data-dcnode-id="2446" instrument_node=""> on 2017-06-28</span><span class="reference-accessdate" data-dcnode-id="2442"><span data-dcnode-id="2445" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">2017-12-01</span></span></span><span data-dcnode-id="2441" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="2439" title="ctx_ver=Z39.8
