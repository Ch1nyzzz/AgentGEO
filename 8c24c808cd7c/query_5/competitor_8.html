</span><p data-dcnode-id="3550"><span data-dcnode-id="3564" instrument_node="">According to the </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="3563" instrument_node="">United States Department of State</span></a><span data-dcnode-id="3561" instrument_node="">, "Thailand is a source, destination, and transit country for men, women, and children subjected to forced labour and sex trafficking."</span><sup class="reference" data-dcnode-id="3558" id="cite_ref-TIP2015_1-0"><a data-dcnode-id="3559" href="#cite_note-TIP2015-1"><span data-dcnode-id="3560" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3555"><span data-dcnode-id="3556" title="Page / location: 330"><span data-dcnode-id="3557" instrument_node="">: 330 </span></span></sup><span data-dcnode-id="3554" instrument_node=""> </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thailand" title="Thailand"><span data-dcnode-id="3553" instrument_node="">Thailand</span></a><span data-dcnode-id="3551" instrument_node="">'s relative prosperity attracts migrants from neighboring countries who flee conditions of poverty and, in the case of Burma, military repression. Significant illegal migration to Thailand presents traffickers with opportunities to coerce or defraud undocumented migrants into involuntary servitude or sexual exploitation.
</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3549" instrument_node="">In 2021, "US Trafficking in Persons (</span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report" title="Trafficking in Persons Report"><span data-dcnode-id="3548" instrument_node="">TIP</span></a><span data-dcnode-id="3546" instrument_node="">) Report [... demoted] Thailand from Tier 2 to the Tier 2 Watchlist "; Thailand had been categorised as "Tier 2" since 2019.</span><sup class="reference" data-dcnode-id="3543" id="cite_ref-2"><a data-dcnode-id="3544" href="#cite_note-2"><span data-dcnode-id="3545" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3542" instrument_node="">

</span><p data-dcnode-id="3377"><span data-dcnode-id="3388" instrument_node="">U.S. State Department's </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_to_Monitor_and_Combat_Trafficking_in_Persons" title="Office to Monitor and Combat Trafficking in Persons"><span data-dcnode-id="3387" instrument_node="">Office to Monitor and Combat Trafficking in Persons</span></a><span data-dcnode-id="3385" instrument_node=""> placed the country in </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report%23Ranking_System" title="Trafficking in Persons Report"><span data-dcnode-id="3384" instrument_node="">"Tier 2"</span></a><span data-dcnode-id="3382" instrument_node=""> in 2019.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-3"><a data-dcnode-id="3380" href="#cite_note-3"><span data-dcnode-id="3381" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3378" instrument_node="">

</span><h2 data-dcnode-id="3366"><span class="mw-headline" data-dcnode-id="3374" id="Overview"><span data-dcnode-id="3375" instrument_node="">Overview</span></span><span class="mw-editsection" data-dcnode-id="3367"><span class="mw-editsection-bracket" data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">[</span></span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D2" title="Edit section: Overview"><span data-dcnode-id="3371" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3364" instrument_node="">According to the </span><a class="mw-redirect" data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_State_Department" title="US State Department"><span data-dcnode-id="3363" instrument_node="">US State Department</span></a><span data-dcnode-id="3361" instrument_node="">'s </span><i data-dcnode-id="3358"><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report" title="Trafficking in Persons Report"><span data-dcnode-id="3360" instrument_node="">Trafficking in Persons Report June 2016</span></a></i><span data-dcnode-id="3357" instrument_node=""> (TIP), persons are trafficked into Thailand for forced labor or sexual exploitation and Thai nationals are trafficked abroad for the same reasons.</span><sup class="reference" data-dcnode-id="3354" id="cite_ref-TIP2016_4-0"><a data-dcnode-id="3355" href="#cite_note-TIP2016-4"><span data-dcnode-id="3356" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3351"><span data-dcnode-id="3352" title="Page / location: 363"><span data-dcnode-id="3353" instrument_node="">: 363 </span></span></sup><span data-dcnode-id="3350" instrument_node=""> Some Thai men who migrate for low-skilled contract work to </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="3349" instrument_node="">Taiwan</span></a><span data-dcnode-id="3347" instrument_node="">, </span><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="3346" instrument_node="">South Korea</span></a><span data-dcnode-id="3344" instrument_node="">, </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="3343" instrument_node="">Israel</span></a><span data-dcnode-id="3341" instrument_node="">, the United States and Gulf states are subjected to conditions of forced labour and debt bondage after arrival.</span><sup class="reference" data-dcnode-id="3338" id="cite_ref-TIP2015_1-1"><a data-dcnode-id="3339" href="#cite_note-TIP2015-1"><span data-dcnode-id="3340" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3337" instrument_node="">
</span></p><p data-dcnode-id="3314"><span data-dcnode-id="3335" instrument_node="">Thailand is a destination country for many illegal immigrants from neighboring countries for better-paying jobs. Four key sectors of the Thai economy (fishing, construction, commercial agriculture, and domestic work) rely heavily on undocumented Burmese migrants and other ethnic minority groups from Myanmar, including children, as cheap labourers.</span><sup class="reference" data-dcnode-id="3332" id="cite_ref-TIP2008_5-0"><a data-dcnode-id="3333" href="#cite_note-TIP2008-5"><span data-dcnode-id="3334" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3331" instrument_node=""> Many of these immigrants are particularly vulnerable to labor exploitation from the lack of legal protection, and are subjected to conditions of forced labor in these sectors.</span><sup class="reference" data-dcnode-id="3328" id="cite_ref-TIP2016_4-1"><a data-dcnode-id="3329" href="#cite_note-TIP2016-4"><span data-dcnode-id="3330" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3327" instrument_node=""> Among these immigrants are females who have been brought to work in the commercial-sex businesses.</span><sup class="reference" data-dcnode-id="3324" id="cite_ref-:4_6-0"><a data-dcnode-id="3325" href="#cite_note-:4-6"><span data-dcnode-id="3326" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3323" instrument_node=""> Children from Burma, Laos, and Cambodia are trafficked into forced begging and exploitative labour in Thailand as well.</span><sup class="reference" data-dcnode-id="3320" id="cite_ref-TIP2016_4-2"><a data-dcnode-id="3321" href="#cite_note-TIP2016-4"><span data-dcnode-id="3322" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3319" instrument_node=""> In these fields, the migrants are easily subjected to abusive conditions.</span><sup class="reference" data-dcnode-id="3316" id="cite_ref-:0_7-0"><a data-dcnode-id="3317" href="#cite_note-:0-7"><span data-dcnode-id="3318" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3315" instrument_node="">
</span></p><p data-dcnode-id="3296"><span data-dcnode-id="3313" instrument_node="">Thailand is also a source country of laborers as many Thai workers seek to work abroad.</span><sup class="reference" data-dcnode-id="3310" id="cite_ref-:4_6-1"><a data-dcnode-id="3311" href="#cite_note-:4-6"><span data-dcnode-id="3312" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3309" instrument_node=""> Among them, Japan is considered the biggest market for the migrants.</span><sup class="reference" data-dcnode-id="3306" id="cite_ref-:72_8-0"><a data-dcnode-id="3307" href="#cite_note-:72-8"><span data-dcnode-id="3308" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3305" instrument_node=""> Many laborers—especially women—are trafficked overseas, and they often find themselves in a debt bondage because they are required to pay a hefty pre-departure recruitment fee which creates a debt that they have to pay back through involuntary labor.</span><sup class="reference" data-dcnode-id="3302" id="cite_ref-TIP2016_4-3"><a data-dcnode-id="3303" href="#cite_note-TIP2016-4"><span data-dcnode-id="3304" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3301" instrument_node=""> The Thai migrant workers are victims of labor abuses such as excessive work hours, low wages, and an unsafe working environment.</span><sup class="reference" data-dcnode-id="3298" id="cite_ref-:0_7-1"><a data-dcnode-id="3299" href="#cite_note-:0-7"><span data-dcnode-id="3300" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3297" instrument_node="">
</span></p><p data-dcnode-id="3286"><span data-dcnode-id="3295" instrument_node="">Thailand is also considered a transit country. Thailand is in the center of Southeast Asia, a convenient location for traffickers to transport victims to other countries. For this reason, Bangkok is the hub for many Chinese human traffickers who transport captives and illegal migrants from Thailand to destinations around the world.</span><sup class="reference" data-dcnode-id="3292" id="cite_ref-:4_6-2"><a data-dcnode-id="3293" href="#cite_note-:4-6"><span data-dcnode-id="3294" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3291" instrument_node=""> Sex trafficking victims from Bangladesh, Pakistan, Vietnam, and North Korea have been identified as having passed through Thailand en route to Western Europe, Singapore, Russia, and the US.</span><sup class="reference" data-dcnode-id="3288" id="cite_ref-:0_7-2"><a data-dcnode-id="3289" href="#cite_note-:0-7"><span data-dcnode-id="3290" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3287" instrument_node="">
</span></p><p data-dcnode-id="3280"><span data-dcnode-id="3285" instrument_node="">The Government of Thailand does not fully comply with the minimum standards for the elimination of trafficking; however, it claims to be making efforts to do so. In November 2007, the Thai National Legislative Assembly passed a new comprehensive anti-trafficking law which the Thai government reported would take effect in June 2008.</span><sup class="reference" data-dcnode-id="3282" id="cite_ref-TIP2008_5-1"><a data-dcnode-id="3283" href="#cite_note-TIP2008-5"><span data-dcnode-id="3284" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3281" instrument_node="">
</span></p><p data-dcnode-id="3254"><span data-dcnode-id="3279" instrument_node="">The US State Department's annual </span><i data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Trafficking in Persons Report</span></i><span data-dcnode-id="3276" instrument_node=""> for 2014 downgraded Thailand from Tier 2 to Tier 3 status. Tier 3 is reserved for those nations whose governments do not fully comply with minimum human trafficking abatement efforts and are not making significant efforts to comply with those standards.</span><sup class="reference" data-dcnode-id="3273" id="cite_ref-TIP2014_9-0"><a data-dcnode-id="3274" href="#cite_note-TIP2014-9"><span data-dcnode-id="3275" instrument_node="">[9]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3270"><span data-dcnode-id="3271" title="Page / location: 43"><span data-dcnode-id="3272" instrument_node="">: 43 </span></span></sup><span data-dcnode-id="3269" instrument_node=""> </span><i data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">TIP 2014</span></i><span data-dcnode-id="3266" instrument_node=""> provides examples of egregious human trafficking violations, but cites no sources beyond noting that the report was prepared "...using information from U.S. embassies, government officials, non-governmental and international organizations, published reports, news articles, academic studies, research trips..., and information submitted to tipreport@state.gov".</span><sup class="reference" data-dcnode-id="3263" id="cite_ref-TIP2015_1-2"><a data-dcnode-id="3264" href="#cite_note-TIP2015-1"><span data-dcnode-id="3265" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3260"><span data-dcnode-id="3261" title="Page / location: 37"><span data-dcnode-id="3262" instrument_node="">: 37 </span></span></sup><span data-dcnode-id="3259" instrument_node=""> Thailand's government objects to the downgrade in ranking.</span><sup class="reference" data-dcnode-id="3256" id="cite_ref-10"><a data-dcnode-id="3257" href="#cite_note-10"><span data-dcnode-id="3258" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3255" instrument_node="">
</span></p><p data-dcnode-id="3238"><span data-dcnode-id="3253" instrument_node="">The 2015 edition of the </span><i data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Trafficking in Persons Report</span></i><span data-dcnode-id="3250" instrument_node=""> retains the Tier 3 designation of Thailand first assigned in the 2014 report. The 2015 report states, "The Government of Thailand does not fully comply with the minimum standards for the elimination of trafficking, and is not making significant efforts to do so."</span><sup class="reference" data-dcnode-id="3247" id="cite_ref-TIP2015_1-3"><a data-dcnode-id="3248" href="#cite_note-TIP2015-1"><span data-dcnode-id="3249" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3244"><span data-dcnode-id="3245" title="Page / location: 331"><span data-dcnode-id="3246" instrument_node="">: 331 </span></span></sup><span data-dcnode-id="3243" instrument_node="">  This was despite behind the scenes efforts to improve the ranking by senior US diplomats.</span><sup class="reference" data-dcnode-id="3240" id="cite_ref-11"><a data-dcnode-id="3241" href="#cite_note-11"><span data-dcnode-id="3242" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3239" instrument_node="">
</span></p><span data-dcnode-id="3237" instrument_node="">
</span><h2 data-dcnode-id="3227"><span class="mw-headline" data-dcnode-id="3235" id="Types_of_human_trafficking"><span data-dcnode-id="3236" instrument_node="">Types of human trafficking</span></span><span class="mw-editsection" data-dcnode-id="3228"><span class="mw-editsection-bracket" data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">[</span></span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D3" title="Edit section: Types of human trafficking"><span data-dcnode-id="3232" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3226" instrument_node="">
</span><h3 data-dcnode-id="3216"><span class="mw-headline" data-dcnode-id="3224" id="Fishing_industry_trafficking"><span data-dcnode-id="3225" instrument_node="">Fishing industry trafficking</span></span><span class="mw-editsection" data-dcnode-id="3217"><span class="mw-editsection-bracket" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">[</span></span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D4" title="Edit section: Fishing industry trafficking"><span data-dcnode-id="3221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3209"><span data-dcnode-id="3214" instrument_node="">Thailand is the world's largest seafood exporter, its exports valued at about US$6.5 billion annually.</span><sup class="reference" data-dcnode-id="3211" id="cite_ref-Telegraph=20180123_12-0"><a data-dcnode-id="3212" href="#cite_note-Telegraph=20180123-12"><span data-dcnode-id="3213" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3210" instrument_node="">
</span></p><p data-dcnode-id="3203"><span data-dcnode-id="3208" instrument_node="">"Thailand's fishing industry is rife with trafficking and abuse".</span><sup class="reference" data-dcnode-id="3205" id="cite_ref-Economist-20150315_13-0"><a data-dcnode-id="3206" href="#cite_note-Economist-20150315-13"><span data-dcnode-id="3207" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3204" instrument_node="">
</span></p><p data-dcnode-id="3183"><span data-dcnode-id="3202" instrument_node="">Many reports since 2000 have documented the forced labour of trafficked workers in the Thai fishing industry.</span><sup class="reference" data-dcnode-id="3199" id="cite_ref-EJF-2013_14-0"><a data-dcnode-id="3200" href="#cite_note-EJF-2013-14"><span data-dcnode-id="3201" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3198" instrument_node=""> Thousands of migrants</span><sup class="reference" data-dcnode-id="3195" id="cite_ref-BBC-2014-01-23_15-0"><a data-dcnode-id="3196" href="#cite_note-BBC-2014-01-23-15"><span data-dcnode-id="3197" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3194" instrument_node=""> have been forced to work on fishing boats with no contract or stable wages.</span><sup class="reference" data-dcnode-id="3191" id="cite_ref-Guardian-2014-06-10_16-0"><a data-dcnode-id="3192" href="#cite_note-Guardian-2014-06-10-16"><span data-dcnode-id="3193" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="3188" id="cite_ref-Time-2014-03-05_17-0"><a data-dcnode-id="3189" href="#cite_note-Time-2014-03-05-17"><span data-dcnode-id="3190" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="3185" id="cite_ref-18"><a data-dcnode-id="3186" href="#cite_note-18"><span data-dcnode-id="3187" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3184" instrument_node="">
</span></p><p data-dcnode-id="3174"><span data-dcnode-id="3182" instrument_node="">A detailed study of the motives, practices, and context surrounding the use of forced labour on Thai boats was published by the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Organization_for_Migration" title="International Organization for Migration"><span data-dcnode-id="3181" instrument_node="">International Organization for Migration</span></a><span data-dcnode-id="3179" instrument_node=""> (IOM) in 2011.</span><sup class="reference" data-dcnode-id="3176" id="cite_ref-IOM-2011_19-0"><a data-dcnode-id="3177" href="#cite_note-IOM-2011-19"><span data-dcnode-id="3178" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3175" instrument_node="">
</span></p><p data-dcnode-id="3142"><span data-dcnode-id="3173" instrument_node="">In the US State Department's </span><i data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Trafficking in Persons Report, 2014</span></i><span data-dcnode-id="3170" instrument_node=""> (TIP), the US government lowered Thailand's human trafficking ranking to "Tier 3" , the lowest possible.</span><sup class="reference" data-dcnode-id="3167" id="cite_ref-TIP-2014_20-0"><a data-dcnode-id="3168" href="#cite_note-TIP-2014-20"><span data-dcnode-id="3169" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3164"><span data-dcnode-id="3165" title="Page / location: 372"><span data-dcnode-id="3166" instrument_node="">: 372 </span></span></sup><span data-dcnode-id="3163" instrument_node=""> Trafficking in the Thai fishing industry figured significantly in the downgrade. Tier 3 nations are defined as, "Countries whose governments do not fully comply with the </span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victims_of_Trafficking_and_Violence_Protection_Act_of_2000" title="Victims of Trafficking and Violence Protection Act of 2000"><span data-dcnode-id="3162" instrument_node="">TVPA's</span></a><span data-dcnode-id="3160" instrument_node=""> minimum standards and are not making significant efforts to do so."</span><sup class="reference" data-dcnode-id="3157" id="cite_ref-TIP-2014_20-1"><a data-dcnode-id="3158" href="#cite_note-TIP-2014-20"><span data-dcnode-id="3159" instrument_node="">[20]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3154"><span data-dcnode-id="3155" title="Page / location: 43"><span data-dcnode-id="3156" instrument_node="">: 43 </span></span></sup><span data-dcnode-id="3153" instrument_node=""> Thailand's downgrade has focused the attention of human trafficking and environmental organisations on tracking Thailand's progress on the issue. In the view of some, little progress has been made.</span><sup class="reference" data-dcnode-id="3150" id="cite_ref-EJF_21-0"><a data-dcnode-id="3151" href="#cite_note-EJF-21"><span data-dcnode-id="3152" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3147" id="cite_ref-EJF-Slaves-2015_22-0"><a data-dcnode-id="3148" href="#cite_note-EJF-Slaves-2015-22"><span data-dcnode-id="3149" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3144" id="cite_ref-23"><a data-dcnode-id="3145" href="#cite_note-23"><span data-dcnode-id="3146" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3143" instrument_node="">
</span></p><p data-dcnode-id="3129"><span data-dcnode-id="3141" instrument_node="">On the heels of critical reports of human trafficking and violence against fishermen in 2014 and 2015, the </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="3140" instrument_node="">European Union</span></a><span data-dcnode-id="3138" instrument_node=""> (EU) issued Thailand a "yellow card" warning over its illegal, unreported, and unregulated (IUU) fishing practices. This threatened an EU ban on Thailand's EU seafood exports if it failed to clean up its fishing industry.</span><sup class="reference" data-dcnode-id="3135" id="cite_ref-Telegraph=20180123_12-1"><a data-dcnode-id="3136" href="#cite_note-Telegraph=20180123-12"><span data-dcnode-id="3137" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3134" instrument_node=""> On-going flaws in Thailand's efforts to protect workers as well as insufficient sustainable fishing policies were cited by the EU as they kept Thailand on the yellow card watchlist after reexamining Thai fishing practices in the first half of 2018.</span><sup class="reference" data-dcnode-id="3131" id="cite_ref-24"><a data-dcnode-id="3132" href="#cite_note-24"><span data-dcnode-id="3133" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3130" instrument_node="">
</span></p><p data-dcnode-id="3116"><span data-dcnode-id="3128" instrument_node="">The Thai government opposed these actions,</span><sup class="reference" data-dcnode-id="3125" id="cite_ref-25"><a data-dcnode-id="3126" href="#cite_note-25"><span data-dcnode-id="3127" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3124" instrument_node=""> but it vowed to do better. In his Friday night "Returning Happiness to the Thai People" address of 27 March 2015 on national television, Prime Minister </span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prayut_Chan-o-cha" title="Prayut Chan-o-cha"><span data-dcnode-id="3123" instrument_node="">Prayut Chan-o-cha</span></a><span data-dcnode-id="3121" instrument_node=""> vowed to put an end to human trafficking in the Thai fishing industry "for once and for all". Prayut was quoted as saying, "If such abuses of fellow humans continue, I will instruct that they should not be allowed to do any business any longer in Thailand and they must be punished," Gen Prayut said. "Don't...blame me for being cruel. How can you take advantage of other people? You're incredibly rich and have dozens of boats. It is time to abide by the law."</span><sup class="reference" data-dcnode-id="3118" id="cite_ref-26"><a data-dcnode-id="3119" href="#cite_note-26"><span data-dcnode-id="3120" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3117" instrument_node="">
</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3115" instrument_node="">On the same day, Prayut ordered all fishing vessels to be equipped with GPS to prevent them from illegally operating in other countries' fishing zones. "Each vessel will have a GPS and be issued under one operator", he said.</span><sup class="reference" data-dcnode-id="3112" id="cite_ref-27"><a data-dcnode-id="3113" href="#cite_note-27"><span data-dcnode-id="3114" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3111" instrument_node=""> Prayut went on to say that if Thailand failed to prevent, deter and eliminate illegal, unreported, and </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal%2C_unreported_and_unregulated_fishing" title="Illegal, unreported and unregulated fishing"><span data-dcnode-id="3110" instrument_node="">unregulated fishing</span></a><span data-dcnode-id="3108" instrument_node="">, other countries would no longer buy Thai seafood and that that could cost the nation more than 200 billion baht a year.
</span></p><p data-dcnode-id="3088"><span data-dcnode-id="3106" instrument_node="">In December 2016, </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenpeace" title="Greenpeace"><span data-dcnode-id="3105" instrument_node="">Greenpeace</span></a><span data-dcnode-id="3103" instrument_node=""> Southeast Asia published a follow-up report, </span><i data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Turn The Tide</span></i><span data-dcnode-id="3100" instrument_node="">, on Thai fishing industry abuses.</span><sup class="reference" data-dcnode-id="3097" id="cite_ref-28"><a data-dcnode-id="3098" href="#cite_note-28"><span data-dcnode-id="3099" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3096" instrument_node=""> Among other crimes, the researchers found evidence of continued trafficking and virtual slavery of crewmen, mostly migrants, on Thai fishing boats.</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-GPSEA-2016_29-0"><a data-dcnode-id="3094" href="#cite_note-GPSEA-2016-29"><span data-dcnode-id="3095" instrument_node="">[29]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3090"><span data-dcnode-id="3091" title="Page / location: 19–24"><span data-dcnode-id="3092" instrument_node="">: 19–24 </span></span></sup><span data-dcnode-id="3089" instrument_node="">
</span></p><p data-dcnode-id="3062"><span data-dcnode-id="3087" instrument_node="">In a report issued on 23 January 2018, </span><i data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Hidden Chains: Forced Labour and Rights Abuses in Thailand's Fishing Industry</span></i><sup class="reference" data-dcnode-id="3082" id="cite_ref-HRW-201801_30-0"><a data-dcnode-id="3083" href="#cite_note-HRW-201801-30"><span data-dcnode-id="3084" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3081" instrument_node=""> </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="3080" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="3078" instrument_node=""> (HRW) charged that little has changed in the Thai fishing industry "...despite high-profile commitments by the Thai government to clean up the fishing industry,..."</span><sup class="reference" data-dcnode-id="3075" id="cite_ref-BP-20180124_31-0"><a data-dcnode-id="3076" href="#cite_note-BP-20180124-31"><span data-dcnode-id="3077" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3074" instrument_node=""> Reforms and inspections introduced by the government often are not enforced or rigorously conducted by local officials according to the Thai Labour Rights Promotion Network Foundation.</span><sup class="reference" data-dcnode-id="3071" id="cite_ref-BP-20180124_31-1"><a data-dcnode-id="3072" href="#cite_note-BP-20180124-31"><span data-dcnode-id="3073" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3070" instrument_node=""> In 2015, the Thai government reported, for example, that inspections of 474,334 fishery workers had failed to identify a single case of forced labor.</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-HRW-201801_30-1"><a data-dcnode-id="3068" href="#cite_note-HRW-201801-30"><span data-dcnode-id="3069" instrument_node="">[30]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3064"><span data-dcnode-id="3065" title="Page / location: 1"><span data-dcnode-id="3066" instrument_node="">: 1 </span></span></sup><span data-dcnode-id="3063" instrument_node="">
</span></p><p data-dcnode-id="3050"><span data-dcnode-id="3061" instrument_node="">On 22 January 2018, the day prior to the release of HRW's report, the president of the Thai Fisheries Association met with Deputy Prime Minister Gen </span><a class="new" data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChatchai_Sarikulya%26action%3Dedit%26redlink%3D1" title="Chatchai Sarikulya (page does not exist)"><span data-dcnode-id="3060" instrument_node="">Chatchai Sarikulya</span></a><span data-dcnode-id="3058" instrument_node=""> to discuss the problem of illegal, unreported, and unregulated (IUU) fishing. The deputy premier was informed of issues in the fishing sector such as a shortage of workers. The association president also pointed out that there are not enough </span><a class="mw-redirect" data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automated_teller_machines" title="Automated teller machines"><span data-dcnode-id="3057" instrument_node="">ATMs</span></a><span data-dcnode-id="3055" instrument_node=""> available to pay wages to fishing workers.</span><sup class="reference" data-dcnode-id="3052" id="cite_ref-32"><a data-dcnode-id="3053" href="#cite_note-32"><span data-dcnode-id="3054" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3051" instrument_node="">
</span></p><p data-dcnode-id="3044"><span data-dcnode-id="3049" instrument_node="">The government of Thailand responded immediately to the HRW report. The Thai ambassador to Belgium delivered a statement citing the kingdom's efforts to pass legislation on worker protection. According to him the report relies on information from 2016 and cited references as old as 2012 that no longer reflect the current situation.</span><sup class="reference" data-dcnode-id="3046" id="cite_ref-33"><a data-dcnode-id="3047" href="#cite_note-33"><span data-dcnode-id="3048" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3045" instrument_node="">
</span></p><p data-dcnode-id="3029"><span data-dcnode-id="3043" instrument_node="">A 2020 </span><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Documentary_film" title="Documentary film"><span data-dcnode-id="3042" instrument_node="">documentary film</span></a><span data-dcnode-id="3040" instrument_node=""> distributed by </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netflix" title="Netflix"><span data-dcnode-id="3039" instrument_node="">Netflix</span></a><span data-dcnode-id="3037" instrument_node="">, </span><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seaspiracy" title="Seaspiracy"><span data-dcnode-id="3036" instrument_node="">Seaspiracy</span></a><span data-dcnode-id="3034" instrument_node="">, also covers the industry's brutal system of slave labor.</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-34"><a data-dcnode-id="3032" href="#cite_note-34"><span data-dcnode-id="3033" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3030" instrument_node="">
</span></p><span data-dcnode-id="3028" instrument_node="">
</span><h3 data-dcnode-id="3018"><span class="mw-headline" data-dcnode-id="3026" id="Sex_industry_trafficking"><span data-dcnode-id="3027" instrument_node="">Sex industry trafficking</span></span><span class="mw-editsection" data-dcnode-id="3019"><span class="mw-editsection-bracket" data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">[</span></span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D5" title="Edit section: Sex industry trafficking"><span data-dcnode-id="3023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3017" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3011" role="note"><span data-dcnode-id="3014" instrument_node="">Main article: </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking_in_Thailand" title="Sex trafficking in Thailand"><span data-dcnode-id="3013" instrument_node="">Sex trafficking in Thailand</span></a></div><link data-dcnode-id="3010" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3006" role="note"><span data-dcnode-id="3009" instrument_node="">See also: </span><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_prostitution_in_Thailand" title="Child prostitution in Thailand"><span data-dcnode-id="3008" instrument_node="">Child prostitution in Thailand</span></a></div><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="3004" instrument_node="">Thailand's sex industry is a human trafficking destination.</span><sup class="reference" data-dcnode-id="3001" id="cite_ref-TIP2016_4-4"><a data-dcnode-id="3002" href="#cite_note-TIP2016-4"><span data-dcnode-id="3003" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="2998"><span data-dcnode-id="2999" title="Page / location: 363"><span data-dcnode-id="3000" instrument_node="">: 363 </span></span></sup><span data-dcnode-id="2997" instrument_node=""> Ethnic Thais are trafficked from poor areas of Chiang Rai, Nong Khai, and Phayao to the tourist areas.</span><sup class="reference" data-dcnode-id="2994" id="cite_ref-HT.org_35-0"><a data-dcnode-id="2995" href="#cite_note-HT.org-35"><span data-dcnode-id="2996" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2993" instrument_node="">
</span></p><p data-dcnode-id="2979"><span data-dcnode-id="2991" instrument_node="">The Thai government identified 720 trafficking victims of all types in 2015, up from 595 in 2014. At least 151 of the 720 were victims of sex trafficking.</span><sup class="reference" data-dcnode-id="2988" id="cite_ref-TIP2016_4-5"><a data-dcnode-id="2989" href="#cite_note-TIP2016-4"><span data-dcnode-id="2990" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="2985"><span data-dcnode-id="2986" title="Page / location: 366"><span data-dcnode-id="2987" instrument_node="">: 366 </span></span></sup><span data-dcnode-id="2984" instrument_node=""> According to the Royal Thai Police's Anti-Trafficking in Persons Division, 52 Lao women forced into the sex trade in Thailand were rescued in 2015, most of them under 18 years of age. Nineteen more were rescued in the first three months of 2016.</span><sup class="reference" data-dcnode-id="2981" id="cite_ref-36"><a data-dcnode-id="2982" href="#cite_note-36"><span data-dcnode-id="2983" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2980" instrument_node="">
</span></p><span data-dcnode-id="2978" instrument_node="">
</span><h3 data-dcnode-id="2968"><span class="mw-headline" data-dcnode-id="2976" id="Trafficking_to_other_countries"><span data-dcnode-id="2977" instrument_node="">Trafficking to other countries</span></span><span class="mw-editsection" data-dcnode-id="2969"><span class="mw-editsection-bracket" data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">[</span></span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D6" title="Edit section: Trafficking to other countries"><span data-dcnode-id="2973" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2966" instrument_node="">The </span><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Thailand" title="Bank of Thailand"><span data-dcnode-id="2965" instrument_node="">Bank of Thailand</span></a><span data-dcnode-id="2963" instrument_node=""> estimates that, as of 2016</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="2960" style="display:none;"><a class="external text" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit"><span data-dcnode-id="2962" instrument_node="">[update]</span></a></sup><span data-dcnode-id="2959" instrument_node="">, 1,120,837 Thais worked overseas, but the number of Thais officially registered as working overseas is only 117,291.</span><sup class="reference" data-dcnode-id="2956" id="cite_ref-Nation-20171223_37-0"><a data-dcnode-id="2957" href="#cite_note-Nation-20171223-37"><span data-dcnode-id="2958" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2955" instrument_node="">
</span></p><p data-dcnode-id="2944"><span data-dcnode-id="2953" instrument_node="">Working overseas is increasingly popular among Thais. Human traffickers take advantage of those working abroad. "The problems of deception, tricking people to work as forced labour or in the sex industry are more prominent," according to Kritaya Archavanitkul, a professor at Mahidol University's Institute for Population and Social Research. Many Thai people seek easy, but illegal, ways to work in other countries. That makes them easier targets for traffickers, and vulnerable to being taken advantage of by bad employers.</span><sup class="reference" data-dcnode-id="2950" id="cite_ref-Nation-20171223_37-1"><a data-dcnode-id="2951" href="#cite_note-Nation-20171223-37"><span data-dcnode-id="2952" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2949" instrument_node=""> In India, for example, massage parlors are a booming industry and many customers prefer fair-skinned women from countries like Thailand. Since 2015, Thailand has become a "source country" for coerced sex workers. Indian authorities said 40 Thai women were rescued from massage parlors acting as fronts for prostitution in Mumbai and Pune in the first half of 2017. Another 34 Thai women were rescued later in 2017 from massage parlors and spas in Hyderabad.</span><sup class="reference" data-dcnode-id="2946" id="cite_ref-38"><a data-dcnode-id="2947" href="#cite_note-38"><span data-dcnode-id="2948" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2945" instrument_node="">
</span></p><span data-dcnode-id="2943" instrument_node="">
</span><h2 data-dcnode-id="2933"><span class="mw-headline" data-dcnode-id="2941" id="Minorities_and_refugees"><span data-dcnode-id="2942" instrument_node="">Minorities and refugees</span></span><span class="mw-editsection" data-dcnode-id="2934"><span class="mw-editsection-bracket" data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">[</span></span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D7" title="Edit section: Minorities and refugees"><span data-dcnode-id="2938" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2931" instrument_node="">A </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuters" title="Reuters"><span data-dcnode-id="2930" instrument_node="">Reuters</span></a><span data-dcnode-id="2928" instrument_node=""> investigation that was published on 5 December 2013 brought the exploitation of </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rohingya_people" title="Rohingya people"><span data-dcnode-id="2927" instrument_node="">the Rohingyas</span></a><span data-dcnode-id="2925" instrument_node=""> to the world's attention. Many Rohingya refugees who escaped the </span><a class="mw-redirect" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rohingya_insurgency_in_Western_Myanmar" title="Rohingya insurgency in Western Myanmar"><span data-dcnode-id="2924" instrument_node="">political oppression in Myanmar</span></a><span data-dcnode-id="2922" instrument_node=""> were stuck at Thai immigration or were captured along the shore or had their boats pushed back to sea. </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption" title="Corruption"><span data-dcnode-id="2921" instrument_node="">Corrupt</span></a><span data-dcnode-id="2919" instrument_node=""> Thai immigration officials secretly supplied </span><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="2918" instrument_node="">refugees</span></a><span data-dcnode-id="2916" instrument_node=""> from </span><a class="mw-redirect" data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burma" title="Burma"><span data-dcnode-id="2915" instrument_node="">Burma</span></a><span data-dcnode-id="2913" instrument_node=""> to trafficking rings. Unwanted refugees were sold into slavery, held hostage for ransom, or brutally murdered along the Myanmar or Malaysian borders.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2906" style="white-space:nowrap;"><span data-dcnode-id="2912" instrument_node="">[</span><i data-dcnode-id="2908"><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2910" title="This claim needs references to reliable sources. (February 2015)"><span data-dcnode-id="2911" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2907" instrument_node="">]</span></sup><span data-dcnode-id="2905" instrument_node=""> "The Rohingya were then transported across southern Thailand and held hostage in a series of camps hidden near the border with Malaysia until relatives paid thousands of dollars to release them".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2898" style="white-space:nowrap;"><span data-dcnode-id="2904" instrument_node="">[</span><i data-dcnode-id="2900"><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2902" title="This claim needs references to reliable sources. (February 2015)"><span data-dcnode-id="2903" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2899" instrument_node="">]</span></sup><span data-dcnode-id="2897" instrument_node=""> Some refugees relate how they were made to phone and beg their relatives for money to set them free while being beaten by the traffickers. If their relatives did not have money, the refugees would be sent to shipping companies or farms for manual labour.</span><sup class="reference" data-dcnode-id="2894" id="cite_ref-39"><a data-dcnode-id="2895" href="#cite_note-39"><span data-dcnode-id="2896" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2893" instrument_node=""> In January 2014, based on information from the December 2013 Reuters report, 636 people were rescued by Thai police from human trafficking camps during two raids. In March 2014, 200 allegedly </span><a class="mw-redirect" data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uyghur_people" title="Uyghur people"><span data-dcnode-id="2892" instrument_node="">Uyghur people</span></a><span data-dcnode-id="2890" instrument_node=""> who had fled </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="2889" instrument_node="">China</span></a><span data-dcnode-id="2887" instrument_node=""> due to the ongoing </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xinjiang_conflict" title="Xinjiang conflict"><span data-dcnode-id="2886" instrument_node="">Xinjiang conflict</span></a><span data-dcnode-id="2884" instrument_node="">, were also freed by Thai police from a human trafficking camp.</span><sup class="reference" data-dcnode-id="2881" id="cite_ref-40"><a data-dcnode-id="2882" href="#cite_note-40"><span data-dcnode-id="2883" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2880" instrument_node="">
</span></p><span data-dcnode-id="2878" instrument_node="">
</span><h2 data-dcnode-id="2868"><span class="mw-headline" data-dcnode-id="2876" id="Prevention"><span data-dcnode-id="2877" instrument_node="">Prevention</span></span><span class="mw-editsection" data-dcnode-id="2869"><span class="mw-editsection-bracket" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">[</span></span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D8" title="Edit section: Prevention"><span data-dcnode-id="2873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2861"><span data-dcnode-id="2866" instrument_node="">Prevention is a strategy that seeks to reduce the risk of people getting trafficked. It is mainly used as a way to combat trafficking in countries that do not have an adequate criminal justice system.</span><sup class="reference" data-dcnode-id="2863" id="cite_ref-:62_41-0"><a data-dcnode-id="2864" href="#cite_note-:62-41"><span data-dcnode-id="2865" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2862" instrument_node="">
</span></p><span data-dcnode-id="2860" instrument_node="">
</span><h3 data-dcnode-id="2850"><span class="mw-headline" data-dcnode-id="2858" id="Government_in_Prevention"><span data-dcnode-id="2859" instrument_node="">Government in Prevention</span></span><span class="mw-editsection" data-dcnode-id="2851"><span class="mw-editsection-bracket" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">[</span></span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D9" title="Edit section: Government in Prevention"><span data-dcnode-id="2855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2848" instrument_node="">Thai government law enforcement efforts to reduce domestic demand for illegal commercial sex acts and child sex tourism have been limited to occasional police raids to shut down operating brothels.</span><sup class="reference" data-dcnode-id="2845" id="cite_ref-TIP2014_9-1"><a data-dcnode-id="2846" href="#cite_note-TIP2014-9"><span data-dcnode-id="2847" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2844" instrument_node=""> Thailand offers bounties for the arrest of foreign traffickers operating in its territory.</span><sup class="reference" data-dcnode-id="2841" id="cite_ref-42"><a data-dcnode-id="2842" href="#cite_note-42"><span data-dcnode-id="2843" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2840" instrument_node="">
</span></p><p data-dcnode-id="2817"><span data-dcnode-id="2838" instrument_node="">At the same time, awareness-raising campaigns targeting tourists were conducted by the government to reduce the prevalence of child sex tourism and prostituted children. The Thai government also cooperated with numerous foreign law enforcement agencies in arresting and deporting foreign nationals found to have been engaging in child sex tourism. In 2007, the Thai government disseminated brochures and posts in popular tourist areas such as </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Mai" title="Chiang Mai"><span data-dcnode-id="2837" instrument_node="">Chiang Mai</span></a><span data-dcnode-id="2835" instrument_node="">, </span><a data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ko_Samui" title="Ko Samui"><span data-dcnode-id="2834" instrument_node="">Ko Samui</span></a><span data-dcnode-id="2832" instrument_node="">, </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattaya" title="Pattaya"><span data-dcnode-id="2831" instrument_node="">Pattaya</span></a><span data-dcnode-id="2829" instrument_node="">, and </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phuket_%28city%29" title="Phuket (city)"><span data-dcnode-id="2828" instrument_node="">Phuket</span></a><span data-dcnode-id="2826" instrument_node=""> warning tourists of severe criminal charges for the procurement of minors for sex. Thailand has not ratified the 2000 UN TIP Protocol.</span><a data-dcnode-id="2823" href="#cite_note-TIP2014-5" title="Human trafficking in Thailand"><sup data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">[5]</span></sup></a><span data-dcnode-id="2822" instrument_node=""> At the local level, advocacy organizations must be included in the development of informational programs and awareness campaigns about the rights of trafficked persons, and how they can obtain help and services to meet their physical and mental health needs."</span><a data-dcnode-id="2819" href="#cite_note-Jones-34" title="Human trafficking in Thailand"><sup data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">[34]</span></sup></a><span data-dcnode-id="2818" instrument_node="">
</span></p><p data-dcnode-id="2811"><span data-dcnode-id="2816" instrument_node="">In April 2015, Thailand faced a threat of a trade ban from the European Commission for not taking sufficient measures to combat exploitation in the fishing industry. Specifically, the creation of the Command Centre for Combating Illegal Fishing in May 2015, which addressed illegal, and unregulated fishing, was able to arrest a handful of criminals and rescue about 130 trafficking victims.</span><sup class="reference" data-dcnode-id="2813" id="cite_ref-:03_43-0"><a data-dcnode-id="2814" href="#cite_note-:03-43"><span data-dcnode-id="2815" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2812" instrument_node="">
</span></p><p data-dcnode-id="2802"><span data-dcnode-id="2810" instrument_node="">In May 2015, the National Legislative Assembly of Thailand—in order to combat child sexual exploitation—amended the </span><i data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Criminal Code of Thailand</span></i><span data-dcnode-id="2807" instrument_node=""> to criminalize child pornography in May 2015. According to the Bill, those that possess child pornography can be held in prison for up to five years, those that distribute it can be held for seven years, and those that produce and trade it can be held up to ten years.</span><sup class="reference" data-dcnode-id="2804" id="cite_ref-:03_43-1"><a data-dcnode-id="2805" href="#cite_note-:03-43"><span data-dcnode-id="2806" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2803" instrument_node="">
</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2801" instrument_node="">In 2018, the </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Thai_Police" title="Royal Thai Police"><span data-dcnode-id="2800" instrument_node="">Royal Thai Police</span></a><span data-dcnode-id="2798" instrument_node=""> organized a task force (TATIP) to combat trafficking in persons in Thailand, consisting of law enforcement officers, social workers and members of non-governmental organizations. Their goal is to improve the situation in the law enforcement agencies in the field of the sex industry and labor activity.</span><sup class="reference" data-dcnode-id="2795" id="cite_ref-:282764_44-0"><a data-dcnode-id="2796" href="#cite_note-:282764-44"><span data-dcnode-id="2797" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2794" instrument_node="">
</span></p><span data-dcnode-id="2792" instrument_node="">
</span><h3 data-dcnode-id="2782"><span class="mw-headline" data-dcnode-id="2790" id="NGOs_in_Prevention"><span data-dcnode-id="2791" instrument_node="">NGOs in Prevention</span></span><span class="mw-editsection" data-dcnode-id="2783"><span class="mw-editsection-bracket" data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">[</span></span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D10" title="Edit section: NGOs in Prevention"><span data-dcnode-id="2787" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2780" instrument_node="">Many NGO's take a strategic and structural approach to address human trafficking. One of these approaches comes in the form of combating gender dynamics, which is the source of female vulnerability, a trait that makes women easy victims for trafficking. NGO's take on a role of advocating for women's rights through the improvement of women and girls' education. Educational empowerment can lead to increase in individual incomes, which prevents the women from being forced into trafficking. For example, Thai Women of Tomorrow (TWT) has created a team of volunteer teachers who teach about the dangers of commercial sex industry and trafficking to local villages.</span><sup class="reference" data-dcnode-id="2777" id="cite_ref-:72_8-1"><a data-dcnode-id="2778" href="#cite_note-:72-8"><span data-dcnode-id="2779" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2776" instrument_node="">
</span></p><span data-dcnode-id="2774" instrument_node="">
</span><h2 data-dcnode-id="2764"><span class="mw-headline" data-dcnode-id="2772" id="Prosecution"><span data-dcnode-id="2773" instrument_node="">Prosecution</span></span><span class="mw-editsection" data-dcnode-id="2765"><span class="mw-editsection-bracket" data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">[</span></span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_trafficking_in_Thailand%26action%3Dedit%26section%3D11" title="Edit section: Prosecution"><span data-dcnode-id="2769" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2762" instrument_node="">Prosecution is bringing the perpetrators and traffickers to trial so that the victims are ensured justice for their case.</span><sup class="reference" data-dcnode-id="2759" id="cite_ref-:62_41-1"><a data-dcnode-id="2760" href="#cite_note-:62-41"><span data-dcnode-id="2761" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2758" instrument_node="">
</span></p><p data-dcnode-id="2735"><span data-dcnode-id="2756" instrument_node="">The Thai government demonstrated some progress in its law enforcement efforts to combat trafficking in persons. Thailand passed new comprehensive anti-trafficking legislation in November 2007. The new law prohibits all forms of trafficking in persons—covering forced labour trafficking and the trafficking of males for the first time—and prescribes penalties that are commensurate with penalties prescribed for other grave crimes, such as </span><a data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rape" title="Rape"><span data-dcnode-id="2755" instrument_node="">rape</span></a><span data-dcnode-id="2753" instrument_node="">. An October 2015 amendment to the Anti-Money Laundering Act enables the </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Money_Laundering_Office_%28Thailand%29" title="Anti-Money Laundering Office (Thailand)"><span data-dcnode-id="2752" instrument_node="">Anti-Money Laundering Office</span></a><span data-dcnode-id="2750" instrument_node=""> (AMLO) to freeze assets with a court order during trafficking investigations and to allocate a portion of seized assets to victim compensation.</span><sup class="reference" data-dcnode-id="2747" id="cite_ref-TIP2016_4-6"><a data-dcnode-id="2748" href="#cite_note-TIP2016-4"><span data-dcnode-id="2749" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="2744"><span data-dcnode-id="2745" title="Page / location: 365"><span data-dcnode-id="2746" instrument_node="">: 365 </span></span></sup><span data-dcnode-id="2743" instrument_node=""> Thailand signed onto the ASEAN Convention against Trafficking in Persons, especially women and children (ACTIP) on 21 November 2015.</span><sup class="reference" data-dcnode-id="2740" id="cite_ref-TIP2016_4-7"><a data-dcnode-id="2741" href="#cite_note-TIP2016-4"><span data-dcnode-id="2742" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="2737"><span data-dcnode-id="2738" title="Page / location: 366"><span data-dcnode-id="2739" instrument_node="">: 366 </span></span></sup><span data-dcnode-id="2736" instrument_node="">
</span></p><p data-dcnode-id="2706"><span data-dcnode-id="2734" instrument_node="">Previous Thai anti-trafficking legislation that was used during the reporting period defined "trafficking" only in terms of sexual exploitation and allowed only females and children to be classified as victims eligible to receive shelter or social services from the government. The Royal Thai Police reported that 144 sex trafficking cases had been prosecuted in the two-year period ending in June 2007.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2727" style="white-space:nowrap;"><span data-dcnode-id="2733" instrument_node="">[</span><i data-dcnode-id="2729"><a data-dcnode-id="2730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2731" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2732" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2728" instrument_node="">]</span></sup><span data-dcnode-id="2726" instrument_node=""> In April 2007, a Thai employer was sentenced to more than 10 years imprisonment for forced child labour in the first-ever conviction under Thailand's 1951 anti-slavery law. The victim, a female domestic worker, worked for the employer for four years without pay and was physically abused.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2719" style="white-space:nowrap;"><span data-dcnode-id="2725" instrument_node="">[</span><i data-dcnode-id="2721"><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2723" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2724" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2720" instrument_node="">]</span></sup><span data-dcnode-id="2718" instrument_node=""> In December, a Thai Criminal Court sentenced two traffickers to seven years imprisonment for luring a 15-year-old girl to engage in </span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostitution" title="Prostitution"><span data-dcnode-id="2717" instrument_node="">prostitution</span></a><span data-dcnode-id="2715" instrument_node=""> in Singapore under false pretences.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2708" style="white-space:nowrap;"><span data-dcnode-id="2714" instrument_node="">[</span><i data-dcnode-id="2710"><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2712" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2713" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2709" instrument_node="">]</span></sup><span data-dcnode-id="2707" instrument_node="">
</span></p><p data-dcnode-id="2688"><span data-dcnode-id="2705" instrument_node="">In May 2007, the Thailand Attorney General's Office created a Centre Against International Human Trafficking (CAHT). The CAHT has eight full-time attorneys devoted to coordinating the prosecution of all trafficking cases in Thailand.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2698" style="white-space:nowrap;"><span data-dcnode-id="2704" instrument_node="">[</span><i data-dcnode-id="2700"><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2702" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2703" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2699" instrument_node="">]</span></sup><span data-dcnode-id="2697" instrument_node=""> Corruption is still sometimes a problem with local police or immigration officials protecting brothels, seafood, and sweatshop facilities from raids and occasionally facilitating the movement of women into or through Thailand.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2690" style="white-space:nowrap;"><span data-dcnode-id="2696" instrument_node="">[</span><i data-dcnode-id="2692"><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2694" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2695" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2691" instrument_node="">]</span></sup><span data-dcnode-id="2689" instrument_node="">
</span></p><p data-dcnode-id="2672"><span data-dcnode-id="2687" instrument_node="">Two police officials faced prosecution for trafficking in Burmese migrant workers in </span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tak_province" title="Tak province"><span data-dcnode-id="2686" instrument_node="">Tak province</span></a><span data-dcnode-id="2684" instrument_node=""> in April 2007. In March 2008, a team of labour ministry, immigration, police, and </span><a class="mw-redirect" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NGO" title="NGO"><span data-dcnode-id="2683" instrument_node="">NGO</span></a><span data-dcnode-id="2681" instrument_node=""> representatives raided a shrimp processing factory in Samut Sakhon and found 300 Burmese migrant workers confined to the premises and working in exploitative conditions. For the first time, the government included 20 males amongst the classified 74 trafficking victims and referred them to a government-run shelter. However, the government handcuffed and detained other illegal male Burmese migrant labourers at the factory and sent them to a holding cell to await deportation. These workers, who experienced the same exploitation as those deemed "victims" by the Thai government, were reportedly treated as criminals. They were not allowed to retrieve personal belongings or identity papers left at the factories and were remanded to a detention facility. Police filed criminal charges against the owners of the shrimp processing factory within 24 hours and investigated the labour brokers who supplied the Burmese workers.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2674" style="white-space:nowrap;"><span data-dcnode-id="2680" instrument_node="">[</span><i data-dcnode-id="2676"><a data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2678" title="This claim needs references to reliable sources. (February 2015)"><span data-dcnode-id="2679" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2675" instrument_node="">]</span></sup><span data-dcnode-id="2673" instrument_node="">
</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2671" instrument_node="">The Ministry of Labour in April 2008 released new guidelines on how it will apply stronger measures in dealing with identified labour trafficking cases in the future. A Thai labour court awarded the equivalent of US$106,000 in damages to 66 trafficking victims rescued in the September 2006 raid of a separate shrimp processing factory in Samut Sakhon. However, as of March 2008, the government has yet to initiate criminal prosecution of the factory's operators.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2664" style="white-space:nowrap;"><span data-dcnode-id="2670" instrument_node="">[</span><i data-dcnode-id="2666"><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2668" title="This claim needs references to reliable sources. (September 2015)"><span data-dcnode-id="2669" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2665" instrument_node="">]</span></sup><span data-dcnode-id="2663" instrument_node=""> In other cases involving possible trafficking for labour exploitation, law enforcement reported 41 cases of labour fraud and 16 cases of illegal labour recruitment. The Ministry of Labour's Department of Employment reported that 28 labour recruiting firms were prosecuted in administrative labour courts in 2007 for violating regulations on labour recruitment rendering workers vulnerable to trafficking. These prosecutions mostly resulted in monetary fines, with only one licence suspension. Department of Social Welfare officials and NGOs use the threat of punitive sanctions under the 1998 Labour Protection Act to negotiate settlements with abusive employers exploiting foreign trafficking victims in sweatshops and in domestic work. A total of 189 individual facilitators or brokers received fines and other administrative sanctions for violating labour recruiting regulations in 2007.</span><sup class="reference" data-dcnode-id="2660" id="cite_ref-TIP2014_9-2"><a data-dcnode-id="2661" href="#cite_note-TIP2014-9"><span data-dcnode-id="2662" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2659" instrument_node="">
</span></p><p data-dcnode-id="2652"><span data-dcnode-id="2657" instrument_node="">Critics charge that Thai governmental efforts to end trafficking are a charade that works like this: every March the Thai government talks tough and announces new plans and laws to end trafficking. This is timed to coincide with the writing of the US State Department's Trafficking in Persons Report (TIP), issued every June. In 2015, the Thai government once again passed a tougher new trafficking law. The new law authorises the death penalty and fines of up to 400,000 baht for human traffickers if their "customers" die. Some observers believe that the continued trafficking exists only because of official corruption, a state of affairs that tougher laws do nothing to remedy.</span><sup class="reference" data-dcnode-id="2654" id="cite_ref-Dawson-20150329_45-0"><a data-dcnode-id="2655" href="#cite_note-Dawson-20150329-45"><span data-dcnode-id="2656" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2653" instrument_node="">
</span></p><p data-dcnode-id="2646"><span data-dcnode-id="2651" instrument_node="">The discovery in early-May 2015 of two dozen bodies from shallow graves in the mountains of southern Thailand, a discovery that has exposed a network of jungle camps run by traffickers who allegedly held migrants captive while they extorted ransoms from their families, has seemingly galvanised Thailand into action. A total of 33 bodies, believed to be migrants from Myanmar and Bangladesh, have now been exhumed from various jungle camps. The discoveries have embarrassed Thailand, which is already under pressure from the United States and the European Union to crack down on human trafficking both on land and in its fishing fleets. Thai Police chief Gen. Somyot Poompanmoung has moved quickly, arresting the mayor of the district town and relieving 50 police officers of their duties. "If you are...neglecting, or involved with, or supporting or benefiting from human-trafficking networks — your heads will roll," Somyot said.</span><sup class="reference" data-dcnode-id="2648" id="cite_ref-46"><a data-dcnode-id="2649" href="#cite_note-46"><span data-dcnode-id="2650" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2647" instrument_node="">
</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2645" instrument_node="">Most recently, Prayut Chan-o-cha, Prime Minister in the current government, has pledged zero tolerance for trafficking and vowed to eradicate it from Thailand.  He has demanded greater cooperation and coordination from all government agencies and called on the private sector to do it part. Anyone failing to fight trafficking, or turning a blind eye to the problem, will face disciplinary and legal action, according to the Prime Minister.</span><sup class="reference" data-dcnode-id="2642" id="cite_ref-47"><a data-dcnode-id="2643" href="#cite_note-47"><span data-dcnode-id="2644" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2641" instrument_node="">
</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2639" instrument_node="">In September 2015 it was reported that, "A drive against human trafficking has brought severe retribution..." to 32 Thai police officers for their alleged roles in trafficking humans. All have been transferred from their posts. To date, as many as 150 arrest warrants have been issued for alleged accomplices. Of them, 89 have already been arrested. "Sixty-one others remain on the run," a source said, adding that about 20 had fled overseas.</span><sup class="reference" data-dcnode-id="2636" id="cite_ref-48"><a data-dcnode-id="2637" href="#cite_note-48"><span data-dcnode-id="2638" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2635" instrument_node="">
</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2633" instrument_node="">Corruption and complicity at the highest levels of the Thai government continue to impede investigatory and prosecutorial efforts as underscored by the flight in December 2015 of Thailand's most senior human trafficking investigator to Australia, where he will seek political asylum. Major General Paween Pongsirin says his investigations into human trafficking implicated senior figures in the Thai police and military and he now fears for his life. According to Paween, "Influential people [are] involved in human trafficking. There are some bad police and bad military who do these kind of things. Unfortunately, those bad police and bad military are the ones that have power."</span><sup class="reference" data-dcnode-id="2630" id="cite_ref-Guardian-20151210_49-0"><a data-dcnode-id="2631" href="#cite_note-Guardian-20151210-49"><span data-dcnode-id="2632" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="2627" id="cite_ref-50"><a data-dcnode-id="2628" href="#cite_note-50"><span data-dcnode-id="2629" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2626" instrument_node="">
</span></p><p data-dcnode-id="2609"><span data-dcnode-id="2624" instrument_node="">March 2016 marked the start of the largest human trafficking trial in Thai history. The trial, expected to be completed by the end of the year, resulted from a crack down on human trafficking by the military junta currently in power. Its motivation was worldwide outrage and the prospect of economic sanctions following the discovery of a mass grave of some 30 trafficking victims in southern Thailand in May 2015. The trial is seen as an opportunity for Thailand to end the abuses and the collusion of high-ranking government and military officials who turn a blind eye to trafficking in return for under-the-table payments. The 92 defendants in the trial include politicians, police officers, and Lt Gen </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manas_Kongpan" title="Manas Kongpan"><span data-dcnode-id="2623" instrument_node="">Manas Kongpan</span></a><span data-dcnode-id="2621" instrument_node="">, a senior army officer formerly based in southern Thailand.</span><sup class="reference" data-dcnode-id="2618" id="cite_ref-51"><a data-dcnode-id="2619" href="#cite_note-51"><span data-dcnode-id="2620" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2617" instrument_node=""> In 2017, the court sentenced General </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manas_Kongpan" title="Manas Kongpan"><span data-dcnode-id="2616" instrument_node="">Manas Kongpan</span></a><span data-dcnode-id="2614" instrument_node=""> to 27 years in prison.</span><sup class="reference" data-dcnode-id="2611" id="cite_ref-52"><a data-dcnode-id="2612" href="#cite_note-52"><span data-dcnode-id="2613" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2610" instrument_node="">
</span></p><span data-dcnode-id="2608" instrument_node="">
