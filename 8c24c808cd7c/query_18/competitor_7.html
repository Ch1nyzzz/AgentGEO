</span><li data-dcnode-id="6565"><a class="mw-redirect" data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_New_York" title="Bank of New York"><span data-dcnode-id="6577" instrument_node="">Bank of New York</span></a><span data-dcnode-id="6575" instrument_node="">: US$7&nbsp;</span><a class="mw-redirect" data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1000000000_%28number%29" title="1000000000 (number)"><span data-dcnode-id="6574" instrument_node="">billion</span></a><span data-dcnode-id="6572" instrument_node=""> of Russian </span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_flight" title="Capital flight"><span data-dcnode-id="6571" instrument_node="">capital flight</span></a><span data-dcnode-id="6569" instrument_node=""> laundered through accounts controlled by bank executives, late 1990s.</span><sup class="reference" data-dcnode-id="6566" id="cite_ref-154"><a data-dcnode-id="6567" href="#cite_note-154"><span data-dcnode-id="6568" instrument_node="">[154]</span></a></sup></li><span data-dcnode-id="6564" instrument_node="">
</span><li data-dcnode-id="6545"><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BNP_Paribas" title="BNP Paribas"><span data-dcnode-id="6563" instrument_node="">BNP Paribas</span></a><span data-dcnode-id="6561" instrument_node="">, in June 2014, pleaded guilty to falsifying </span><a class="mw-redirect" data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_records" title="Business records"><span data-dcnode-id="6560" instrument_node="">business records</span></a><span data-dcnode-id="6558" instrument_node=""> and </span><a data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conspiracy_%28civil%29" title="Conspiracy (civil)"><span data-dcnode-id="6557" instrument_node="">conspiracy</span></a><span data-dcnode-id="6555" instrument_node="">, having violated </span><a class="mw-redirect" data-dcnode-id="6553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._sanctions" title="U.S. sanctions"><span data-dcnode-id="6554" instrument_node="">U.S. sanctions</span></a><span data-dcnode-id="6552" instrument_node=""> against Cuba, Iran, and Sudan. It agreed to pay an $8.9 billion fine, the largest ever for violating U.S. sanctions.</span><sup class="reference" data-dcnode-id="6549" id="cite_ref-nytimes_bnp_admits_guilt_4-1"><a data-dcnode-id="6550" href="#cite_note-nytimes_bnp_admits_guilt-4"><span data-dcnode-id="6551" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="6546" id="cite_ref-155"><a data-dcnode-id="6547" href="#cite_note-155"><span data-dcnode-id="6548" instrument_node="">[155]</span></a></sup></li><span data-dcnode-id="6544" instrument_node="">
</span><li data-dcnode-id="6534"><a data-dcnode-id="6542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BSI_Ltd" title="BSI Ltd"><span data-dcnode-id="6543" instrument_node="">BSI Bank</span></a><span data-dcnode-id="6541" instrument_node="">, in May 2017, was shut down by the </span><a data-dcnode-id="6539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monetary_Authority_of_Singapore" title="Monetary Authority of Singapore"><span data-dcnode-id="6540" instrument_node="">Monetary Authority of Singapore</span></a><span data-dcnode-id="6538" instrument_node=""> for serious breaches of anti-money laundering requirements, poor management oversight of the bank's operations, and gross misconduct of some of the bank's staff.</span><sup class="reference" data-dcnode-id="6535" id="cite_ref-156"><a data-dcnode-id="6536" href="#cite_note-156"><span data-dcnode-id="6537" instrument_node="">[156]</span></a></sup></li><span data-dcnode-id="6533" instrument_node="">

</span><ul data-dcnode-id="6201"><li data-dcnode-id="6240"><span data-dcnode-id="6267" instrument_node="">Jose Franklin Jurado-Rodriguez, a </span><a data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvard_College" title="Harvard College"><span data-dcnode-id="6266" instrument_node="">Harvard College</span></a><span data-dcnode-id="6264" instrument_node=""> and </span><a data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_University" title="Columbia University"><span data-dcnode-id="6263" instrument_node="">Columbia University</span></a><span data-dcnode-id="6261" instrument_node=""> Graduate School of Arts and Sciences Economics Department alumnus, was convicted in Luxembourg in June 1990 "in what was one of the largest drug money laundering cases ever brought in Europe"</span><sup class="reference" data-dcnode-id="6258" id="cite_ref-189"><a data-dcnode-id="6259" href="#cite_note-189"><span data-dcnode-id="6260" instrument_node="">[189]</span></a></sup><span data-dcnode-id="6257" instrument_node=""> and the US in 1996 of money laundering for the </span><a data-dcnode-id="6255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cali_Cartel" title="Cali Cartel"><span data-dcnode-id="6256" instrument_node="">Cali Cartel</span></a><span data-dcnode-id="6254" instrument_node=""> kingpin </span><a class="mw-redirect" data-dcnode-id="6252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jose_Santacruz_Londono" title="Jose Santacruz Londono"><span data-dcnode-id="6253" instrument_node="">Jose Santacruz Londono</span></a><span data-dcnode-id="6251" instrument_node="">.</span><sup class="reference" data-dcnode-id="6248" id="cite_ref-190"><a data-dcnode-id="6249" href="#cite_note-190"><span data-dcnode-id="6250" instrument_node="">[190]</span></a></sup><span data-dcnode-id="6247" instrument_node=""> Jurado-Rodriguez specialized in "</span><a class="mw-redirect" data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smurfing_%28financial_crime%29" title="Smurfing (financial crime)"><span data-dcnode-id="6246" instrument_node="">smurfing</span></a><span data-dcnode-id="6244" instrument_node="">".</span><sup class="reference" data-dcnode-id="6241" id="cite_ref-191"><a data-dcnode-id="6242" href="#cite_note-191"><span data-dcnode-id="6243" instrument_node="">[191]</span></a></sup></li><span data-dcnode-id="6239" instrument_node="">
</span><li data-dcnode-id="6213"><a data-dcnode-id="6237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ng_Lap_Seng" title="Ng Lap Seng"><span data-dcnode-id="6238" instrument_node="">Ng Lap Seng</span></a><span data-dcnode-id="6236" instrument_node="">: The Chinese billionaire real estate developer from </span><a data-dcnode-id="6234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macau" title="Macau"><span data-dcnode-id="6235" instrument_node="">Macau</span></a><span data-dcnode-id="6233" instrument_node=""> was sentenced to four years in prison</span><sup class="reference" data-dcnode-id="6230" id="cite_ref-192"><a data-dcnode-id="6231" href="#cite_note-192"><span data-dcnode-id="6232" instrument_node="">[192]</span></a></sup><span data-dcnode-id="6229" instrument_node=""> in May 2018 for bribing two diplomats, including former president of the </span><a data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_General_Assembly" title="United Nations General Assembly"><span data-dcnode-id="6228" instrument_node="">United Nations General Assembly</span></a><span data-dcnode-id="6226" instrument_node="">, </span><a data-dcnode-id="6224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_William_Ashe" title="John William Ashe"><span data-dcnode-id="6225" instrument_node="">John William Ashe</span></a><span data-dcnode-id="6223" instrument_node="">, to help him build a conference center in Macau for the United Nations Office for South-South Cooperation (UNOSSC), headed by Director </span><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yiping_Zhou" title="Yiping Zhou"><span data-dcnode-id="6222" instrument_node="">Yiping Zhou</span></a><span data-dcnode-id="6220" instrument_node="">. The corruption case was the worst financial scandal for the United Nations since the abuse of the Iraqi </span><a data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil-for-Food_Programme" title="Oil-for-Food Programme"><span data-dcnode-id="6219" instrument_node="">oil-for-food program</span></a><span data-dcnode-id="6217" instrument_node=""> more than 20 years ago. Ng Lap Seng, 69, was convicted in Federal District Court in Manhattan on two counts of violating the </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Corrupt_Practices_Act" title="Foreign Corrupt Practices Act"><span data-dcnode-id="6216" instrument_node="">Foreign Corrupt Practices Act</span></a><span data-dcnode-id="6214" instrument_node="">, one count of paying bribes, one count of money laundering, and two counts of conspiracy.</span></li><span data-dcnode-id="6212" instrument_node="">
</span><li data-dcnode-id="6202"><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferdinand_Marcos" title="Ferdinand Marcos"><span data-dcnode-id="6211" instrument_node="">Ferdinand Marcos</span></a><span data-dcnode-id="6209" instrument_node="">: Unknown amount, estimated at US$10&nbsp;billion of government assets laundered through banks and financial institutions in the United States, Liechtenstein, Austria, Panama, Netherlands Antilles, Cayman Islands, Vanuatu, </span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong" title="Hong Kong"><span data-dcnode-id="6208" instrument_node="">Hong Kong</span></a><span data-dcnode-id="6206" instrument_node="">, Singapore, Monaco, the Bahamas, the Vatican and Switzerland.</span><sup class="reference" data-dcnode-id="6203" id="cite_ref-bernstein-realestate_193-0"><a data-dcnode-id="6204" href="#cite_note-bernstein-realestate-193"><span data-dcnode-id="6205" instrument_node="">[193]</span></a></sup></li></ul><span data-dcnode-id="6200" instrument_node="">
