</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="9248" id="firstHeading"><span data-dcnode-id="9249" instrument_node="">Money laundering</span></h1><span data-dcnode-id="9247" instrument_node="">
</span><div class="vector-body" data-dcnode-id="702" id="bodyContent"><span data-dcnode-id="9246" instrument_node="">
</span><div class="noprint" data-dcnode-id="9244" id="siteSub"><span data-dcnode-id="9245" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="9243" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="804" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="813"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="9229" style="display:none"><span data-dcnode-id="9230" instrument_node="">Process of transforming profits of crime and corruption into ostensibly legitimate assets</span></div><span data-dcnode-id="9228" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="9221" role="note"><span data-dcnode-id="9225" instrument_node="">"Dirty money" redirects here. For other uses, see </span><a class="mw-redirect mw-disambig" data-dcnode-id="9223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dirty_Money_%28disambiguation%29" title="Dirty Money (disambiguation)"><span data-dcnode-id="9224" instrument_node="">Dirty Money (disambiguation)</span></a><span data-dcnode-id="9222" instrument_node="">.</span></div><span data-dcnode-id="9220" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="9218"><span data-dcnode-id="9219" instrument_node="">
</span></p><span data-dcnode-id="9217" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9208"><div class="thumbinner" data-dcnode-id="9209" style="width:222px;"><a class="image" data-dcnode-id="9215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoney-laundering.svg"><img alt="" class="thumbimage" data-dcnode-id="9216" data-file-height="410" data-file-width="443" decoding="async" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/220px-Money-laundering.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/330px-Money-laundering.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/440px-Money-laundering.svg.png 2x" width="220"></a><span data-dcnode-id="9214" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9210"><div class="magnify" data-dcnode-id="9212"><a class="internal" data-dcnode-id="9213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoney-laundering.svg" title="Enlarge"></a></div><span data-dcnode-id="9211" instrument_node="">General process of money laundering</span></div></div></div><span data-dcnode-id="9207" instrument_node="">
</span><p data-dcnode-id="9185"><b data-dcnode-id="9205"><span data-dcnode-id="9206" instrument_node="">Money laundering</span></b><span data-dcnode-id="9204" instrument_node=""> is the process of concealing the origin of money, often obtained from illicit activities such as </span><a class="mw-redirect" data-dcnode-id="9202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_trafficking" title="Drug trafficking"><span data-dcnode-id="9203" instrument_node="">drug trafficking</span></a><span data-dcnode-id="9201" instrument_node="">, </span><a data-dcnode-id="9199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption" title="Corruption"><span data-dcnode-id="9200" instrument_node="">corruption</span></a><span data-dcnode-id="9198" instrument_node="">, </span><a data-dcnode-id="9196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embezzlement" title="Embezzlement"><span data-dcnode-id="9197" instrument_node="">embezzlement</span></a><span data-dcnode-id="9195" instrument_node=""> or </span><a data-dcnode-id="9193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gambling" title="Gambling"><span data-dcnode-id="9194" instrument_node="">gambling</span></a><span data-dcnode-id="9192" instrument_node="">, by converting it into a legitimate source. It is a crime in many </span><a class="mw-redirect" data-dcnode-id="9190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jurisdictions" title="Jurisdictions"><span data-dcnode-id="9191" instrument_node="">jurisdictions</span></a><span data-dcnode-id="9189" instrument_node=""> with varying definitions. It is usually a key operation of </span><a data-dcnode-id="9187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organized_crime" title="Organized crime"><span data-dcnode-id="9188" instrument_node="">organized crime</span></a><span data-dcnode-id="9186" instrument_node="">.
</span></p><p data-dcnode-id="9180"><span data-dcnode-id="9184" instrument_node="">In US law, money laundering is the practice of engaging in financial transactions to conceal the identity, source, or destination of illegally gained money. In UK law the </span><a data-dcnode-id="9182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_law" title="Common law"><span data-dcnode-id="9183" instrument_node="">common law</span></a><span data-dcnode-id="9181" instrument_node=""> definition is wider. The act is defined as "taking any action with property of any form which is either wholly or in part the proceeds of a crime that will disguise the fact that that property is the proceeds of a crime or obscure the beneficial ownership of said property".
</span></p><p data-dcnode-id="9160"><span data-dcnode-id="9179" instrument_node="">In the past, the term "money laundering" was applied only to financial transactions related to </span><a data-dcnode-id="9177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organized_crime" title="Organized crime"><span data-dcnode-id="9178" instrument_node="">organized crime</span></a><span data-dcnode-id="9176" instrument_node="">. Today its definition is often expanded by government and international regulators such as the US </span><a data-dcnode-id="9174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_the_Comptroller_of_the_Currency" title="Office of the Comptroller of the Currency"><span data-dcnode-id="9175" instrument_node="">Office of the Comptroller of the Currency</span></a><span data-dcnode-id="9173" instrument_node=""> to mean "any financial transaction which generates an asset or a value as the result of an illegal act", which may involve actions such as </span><a data-dcnode-id="9171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_evasion" title="Tax evasion"><span data-dcnode-id="9172" instrument_node="">tax evasion</span></a><span data-dcnode-id="9170" instrument_node=""> or </span><a data-dcnode-id="9168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/False_accounting" title="False accounting"><span data-dcnode-id="9169" instrument_node="">false accounting</span></a><span data-dcnode-id="9167" instrument_node="">. In the UK, it does not even need to involve money, but any </span><a class="mw-redirect" data-dcnode-id="9165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_good" title="Economic good"><span data-dcnode-id="9166" instrument_node="">economic good</span></a><span data-dcnode-id="9164" instrument_node="">. Courts involve money laundering committed by private individuals, drug dealers, businesses, corrupt officials, members of criminal organizations such as the </span><a data-dcnode-id="9162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mafia" title="Mafia"><span data-dcnode-id="9163" instrument_node="">Mafia</span></a><span data-dcnode-id="9161" instrument_node="">, and even states.
</span></p><p data-dcnode-id="9152"><span data-dcnode-id="9159" instrument_node="">As financial crime has become more complex, and "Financial Intelligence" (</span><a class="mw-redirect" data-dcnode-id="9157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FININT" title="FININT"><span data-dcnode-id="9158" instrument_node="">FININT</span></a><span data-dcnode-id="9156" instrument_node="">) has become more recognized in combating international crime and terrorism, money laundering has become more prominent in political, economic, and legal debate. Money laundering is </span><a data-dcnode-id="9154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ipso_facto" title="Ipso facto"><span data-dcnode-id="9155" instrument_node="">ipso facto</span></a><span data-dcnode-id="9153" instrument_node=""> illegal; the acts generating the money almost always are themselves criminal in some way (for if not, the money would not need to be laundered).
</span></p><span data-dcnode-id="9151" instrument_node="">

</span><p data-dcnode-id="8757"><span data-dcnode-id="8770" instrument_node="">Laws against money laundering were created to use against organized crime during the period of </span><a data-dcnode-id="8768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prohibition_in_the_United_States" title="Prohibition in the United States"><span data-dcnode-id="8769" instrument_node="">Prohibition in the United States</span></a><span data-dcnode-id="8767" instrument_node=""> during the 1930s. </span><a data-dcnode-id="8765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organized_crime" title="Organized crime"><span data-dcnode-id="8766" instrument_node="">Organized crime</span></a><span data-dcnode-id="8764" instrument_node=""> received a major boost from Prohibition and a large source of new funds that were obtained from illegal sales of alcohol. The successful prosecution of </span><a data-dcnode-id="8762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Capone" title="Al Capone"><span data-dcnode-id="8763" instrument_node="">Al Capone</span></a><span data-dcnode-id="8761" instrument_node=""> on </span><a data-dcnode-id="8759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_evasion" title="Tax evasion"><span data-dcnode-id="8760" instrument_node="">tax evasion</span></a><span data-dcnode-id="8758" instrument_node=""> brought in a new emphasis by the state and law enforcement agencies to track and confiscate money, but existing laws against tax evasion could not be used once gangsters started paying their taxes.
</span></p><p data-dcnode-id="8731"><span data-dcnode-id="8756" instrument_node="">In the 1980s, the </span><a data-dcnode-id="8754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_drugs" title="War on drugs"><span data-dcnode-id="8755" instrument_node="">war on drugs</span></a><span data-dcnode-id="8753" instrument_node=""> led governments again to turn to money laundering rules in an attempt to track and seize the proceeds of </span><a data-dcnode-id="8751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug-related_crime" title="Drug-related crime"><span data-dcnode-id="8752" instrument_node="">drug crimes</span></a><span data-dcnode-id="8750" instrument_node=""> in order to catch the organizers and individuals running drug empires. It also had the benefit, from a law enforcement point of view, of turning rules of evidence "upside down". Law enforcers normally have to prove an individual is guilty to seize their property, but with </span><a data-dcnode-id="8748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_forfeiture_in_the_United_States" title="Civil forfeiture in the United States"><span data-dcnode-id="8749" instrument_node="">money laundering laws</span></a><span data-dcnode-id="8747" instrument_node=""> money can be confiscated and it is up to the individual to prove that the source of funds is legitimate to get the money back.</span><sup class="reference" data-dcnode-id="8744" id="cite_ref-1"><a data-dcnode-id="8745" href="#cite_note-1"><span data-dcnode-id="8746" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8743" instrument_node=""> This makes it much easier for law enforcement agencies and provides for much lower </span><a data-dcnode-id="8741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burden_of_proof_%28law%29" title="Burden of proof (law)"><span data-dcnode-id="8742" instrument_node="">burdens of proof</span></a><span data-dcnode-id="8740" instrument_node="">. However, this process has been abused by some law enforcement agencies to take and keep money without strong evidence of related criminal activity, to be used to supplement their own budgets.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8733" style="white-space:nowrap;"><span data-dcnode-id="8739" instrument_node="">[</span><i data-dcnode-id="8735"><a data-dcnode-id="8736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8737" title="This claim needs references to reliable sources. (March 2020)"><span data-dcnode-id="8738" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8734" instrument_node="">]</span></sup><span data-dcnode-id="8732" instrument_node="">
</span></p><p data-dcnode-id="8686"><span data-dcnode-id="8730" instrument_node="">The </span><a data-dcnode-id="8728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="8729" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="8727" instrument_node=""> in 2001, which led to the </span><a data-dcnode-id="8725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriot_Act" title="Patriot Act"><span data-dcnode-id="8726" instrument_node="">Patriot Act</span></a><span data-dcnode-id="8724" instrument_node=""> in the U.S. and similar legislation worldwide, led to a new emphasis on money laundering laws to combat </span><a data-dcnode-id="8722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism_financing" title="Terrorism financing"><span data-dcnode-id="8723" instrument_node="">terrorism financing</span></a><span data-dcnode-id="8721" instrument_node="">.</span><sup class="reference" data-dcnode-id="8718" id="cite_ref-2"><a data-dcnode-id="8719" href="#cite_note-2"><span data-dcnode-id="8720" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8717" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="8715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Group_of_Seven_%28G7%29" title="Group of Seven (G7)"><span data-dcnode-id="8716" instrument_node="">Group of Seven (G7)</span></a><span data-dcnode-id="8714" instrument_node=""> nations used the </span><a class="mw-redirect" data-dcnode-id="8712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force_on_Money_Laundering" title="Financial Action Task Force on Money Laundering"><span data-dcnode-id="8713" instrument_node="">Financial Action Task Force on Money Laundering</span></a><span data-dcnode-id="8711" instrument_node=""> to put pressure on governments around the world to increase surveillance and monitoring of financial transactions and share this information between countries. Starting in 2002, governments around the world upgraded money laundering laws and surveillance and monitoring systems of financial transactions. Anti-money laundering regulations have become a much larger burden for </span><a data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_institution" title="Financial institution"><span data-dcnode-id="8710" instrument_node="">financial institutions</span></a><span data-dcnode-id="8708" instrument_node=""> and enforcement has stepped up significantly. During 2011–2015 a number of major banks faced ever-increasing fines for breaches of money laundering regulations. This included </span><a data-dcnode-id="8706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HSBC" title="HSBC"><span data-dcnode-id="8707" instrument_node="">HSBC</span></a><span data-dcnode-id="8705" instrument_node="">, which was fined $1.9 billion in December 2012,</span><sup class="reference" data-dcnode-id="8702" id="cite_ref-3"><a data-dcnode-id="8703" href="#cite_note-3"><span data-dcnode-id="8704" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8701" instrument_node=""> and </span><a data-dcnode-id="8699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BNP_Paribas" title="BNP Paribas"><span data-dcnode-id="8700" instrument_node="">BNP Paribas</span></a><span data-dcnode-id="8698" instrument_node="">, which was fined $8.9 billion in July 2014 by the U.S. government.</span><sup class="reference" data-dcnode-id="8695" id="cite_ref-nytimes_bnp_admits_guilt_4-0"><a data-dcnode-id="8696" href="#cite_note-nytimes_bnp_admits_guilt-4"><span data-dcnode-id="8697" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8694" instrument_node=""> Many countries introduced or strengthened border controls on the amount of cash that can be carried and introduced central transaction reporting systems where all financial institutions have to report all financial transactions electronically. For example, in 2006, Australia set up the </span><a data-dcnode-id="8692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Transaction_Reports_and_Analysis_Centre" title="Australian Transaction Reports and Analysis Centre"><span data-dcnode-id="8693" instrument_node="">AUSTRAC</span></a><span data-dcnode-id="8691" instrument_node=""> system and required the reporting of all financial transactions.</span><sup class="reference" data-dcnode-id="8688" id="cite_ref-5"><a data-dcnode-id="8689" href="#cite_note-5"><span data-dcnode-id="8690" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8687" instrument_node="">
</span></p><span data-dcnode-id="8685" instrument_node="">
</span><h2 data-dcnode-id="8675"><span class="mw-headline" data-dcnode-id="8683" id="Features"><span data-dcnode-id="8684" instrument_node="">Features</span></span><span class="mw-editsection" data-dcnode-id="8676"><span class="mw-editsection-bracket" data-dcnode-id="8681"><span data-dcnode-id="8682" instrument_node="">[</span></span><a data-dcnode-id="8679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D2" title="Edit section: Features"><span data-dcnode-id="8680" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8677"><span data-dcnode-id="8678" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8674" instrument_node="">
</span><h3 data-dcnode-id="8664"><span class="mw-headline" data-dcnode-id="8672" id="Definition"><span data-dcnode-id="8673" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="8665"><span class="mw-editsection-bracket" data-dcnode-id="8670"><span data-dcnode-id="8671" instrument_node="">[</span></span><a data-dcnode-id="8668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D3" title="Edit section: Definition"><span data-dcnode-id="8669" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8666"><span data-dcnode-id="8667" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8663" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8654"><div class="thumbinner" data-dcnode-id="8655" style="width:222px;"><a class="image" data-dcnode-id="8661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoney-laundering.svg"><img alt="" class="thumbimage" data-dcnode-id="8662" data-file-height="410" data-file-width="443" decoding="async" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/220px-Money-laundering.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/330px-Money-laundering.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Money-laundering.svg/440px-Money-laundering.svg.png 2x" width="220"></a><span data-dcnode-id="8660" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8656"><div class="magnify" data-dcnode-id="8658"><a class="internal" data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoney-laundering.svg" title="Enlarge"></a></div><span data-dcnode-id="8657" instrument_node="">Placing "dirty" money in a service company, where it is layered with legitimate income and then integrated into the flow of money, is a common form of money laundering.</span></div></div></div><p data-dcnode-id="8652"><span data-dcnode-id="8653" instrument_node=""> Money laundering is the conversion or transfer of property; the concealment or disguising of the nature of the proceeds; the acquisition, possession or use of property, knowing that these are derived from criminal acts; or participating in or assisting the movement of funds to make the proceeds appear legitimate.
</span></p><p data-dcnode-id="8638"><span data-dcnode-id="8651" instrument_node="">Money obtained from certain crimes, such as </span><a data-dcnode-id="8649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extortion" title="Extortion"><span data-dcnode-id="8650" instrument_node="">extortion</span></a><span data-dcnode-id="8648" instrument_node="">, </span><a data-dcnode-id="8646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insider_trading" title="Insider trading"><span data-dcnode-id="8647" instrument_node="">insider trading</span></a><span data-dcnode-id="8645" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_trafficking" title="Drug trafficking"><span data-dcnode-id="8644" instrument_node="">drug trafficking</span></a><span data-dcnode-id="8642" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_gambling" title="Illegal gambling"><span data-dcnode-id="8641" instrument_node="">illegal gambling</span></a><span data-dcnode-id="8639" instrument_node=""> is "dirty" and needs to be "cleaned" to appear to have been derived from legal activities, so that banks and other financial institutions will deal with it without suspicion. Money can be laundered by many methods that vary in complexity and sophistication.
</span></p><p data-dcnode-id="8632"><span data-dcnode-id="8637" instrument_node="">Money laundering typically involves three steps: The first involves introducing cash into the financial system by some means ("placement"); the second involves carrying out complex financial transactions to camouflage the illegal source of the cash ("layering"); and finally, acquiring wealth generated from the transactions of the illicit funds ("integration"). Some of these steps may be omitted, depending upon the circumstances. For example, non-cash proceeds that are already in the financial system would not need to be placed.</span><sup class="reference" data-dcnode-id="8634" id="cite_ref-chasing_dirty_money_6-0"><a data-dcnode-id="8635" href="#cite_note-chasing_dirty_money-6"><span data-dcnode-id="8636" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8633" instrument_node="">
</span></p><p data-dcnode-id="8627"><span data-dcnode-id="8631" instrument_node="">According to the </span><a class="mw-redirect" data-dcnode-id="8629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Treasury_Department" title="United States Treasury Department"><span data-dcnode-id="8630" instrument_node="">United States Treasury Department</span></a><span data-dcnode-id="8628" instrument_node="">:
</span></p><span data-dcnode-id="8626" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="8618"><p data-dcnode-id="8619"><span data-dcnode-id="8623" instrument_node="">Money laundering is the process of making illegally-gained proceeds (i.e., "dirty money") appear legal (i.e., "clean"). Typically, it involves three steps: placement, layering, and integration. First, the illegitimate funds are furtively introduced into the legitimate financial system. Then, the money is moved around to create confusion, sometimes by wiring or transferring through numerous accounts. Finally, it is integrated into the financial system through additional transactions until the "dirty money" appears "clean".</span><sup class="reference" data-dcnode-id="8620" id="cite_ref-7"><a data-dcnode-id="8621" href="#cite_note-7"><span data-dcnode-id="8622" instrument_node="">[7]</span></a></sup></p></blockquote><span data-dcnode-id="8617" instrument_node="">
</span><h3 data-dcnode-id="8607"><span class="mw-headline" data-dcnode-id="8615" id="Methods"><span data-dcnode-id="8616" instrument_node="">Methods</span></span><span class="mw-editsection" data-dcnode-id="8608"><span class="mw-editsection-bracket" data-dcnode-id="8613"><span data-dcnode-id="8614" instrument_node="">[</span></span><a data-dcnode-id="8611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D4" title="Edit section: Methods"><span data-dcnode-id="8612" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8609"><span data-dcnode-id="8610" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8606" instrument_node="">
</span><h4 data-dcnode-id="8596"><span class="mw-headline" data-dcnode-id="8604" id="List_of_methods"><span data-dcnode-id="8605" instrument_node="">List of methods</span></span><span class="mw-editsection" data-dcnode-id="8597"><span class="mw-editsection-bracket" data-dcnode-id="8602"><span data-dcnode-id="8603" instrument_node="">[</span></span><a data-dcnode-id="8600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D5" title="Edit section: List of methods"><span data-dcnode-id="8601" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8598"><span data-dcnode-id="8599" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8595" instrument_node="">
</span><p data-dcnode-id="8589"><span data-dcnode-id="8594" instrument_node="">Money laundering can take several forms, although most methodologies can be categorized into one of a few types. These include "bank methods, smurfing [also known as structuring], currency exchanges, and double-invoicing".</span><sup class="reference" data-dcnode-id="8591" id="cite_ref-encyclopedia_8-0"><a data-dcnode-id="8592" href="#cite_note-encyclopedia-8"><span data-dcnode-id="8593" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8590" instrument_node="">
</span></p><span data-dcnode-id="8588" instrument_node="">
</span><ul data-dcnode-id="8393"><li data-dcnode-id="8578"><a data-dcnode-id="8586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structuring" title="Structuring"><span data-dcnode-id="8587" instrument_node="">Structuring</span></a><span data-dcnode-id="8585" instrument_node="">: Often known as </span><i data-dcnode-id="8583"><span data-dcnode-id="8584" instrument_node="">smurfing</span></i><span data-dcnode-id="8582" instrument_node="">, is a method of placement whereby cash is broken into smaller deposits of money, used to defeat suspicion of money laundering and to avoid anti-money laundering reporting requirements. A sub-component of this is to use smaller amounts of cash to purchase bearer instruments, such as money orders, and then ultimately deposit those, again in small amounts.</span><sup class="reference" data-dcnode-id="8579" id="cite_ref-NDIC_9-0"><a data-dcnode-id="8580" href="#cite_note-NDIC-9"><span data-dcnode-id="8581" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="8577" instrument_node="">
</span><li data-dcnode-id="8566"><span data-dcnode-id="8576" instrument_node="">Bulk cash smuggling: This involves physically smuggling cash to another jurisdiction and depositing it in a financial institution, such as an </span><a data-dcnode-id="8574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Offshore_bank" title="Offshore bank"><span data-dcnode-id="8575" instrument_node="">offshore bank</span></a><span data-dcnode-id="8573" instrument_node="">, that offers greater </span><a data-dcnode-id="8571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_secrecy" title="Bank secrecy"><span data-dcnode-id="8572" instrument_node="">bank secrecy</span></a><span data-dcnode-id="8570" instrument_node=""> or less rigorous money laundering enforcement.</span><sup class="reference" data-dcnode-id="8567" id="cite_ref-National_Money_Laundering_Threat_Assessment_10-0"><a data-dcnode-id="8568" href="#cite_note-National_Money_Laundering_Threat_Assessment-10"><span data-dcnode-id="8569" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="8565" instrument_node="">
</span><li data-dcnode-id="8505"><span data-dcnode-id="8564" instrument_node="">Cash-intensive businesses: In this method, a business typically expected to receive a large proportion of its revenue as cash uses its accounts to deposit criminally derived cash. This method of money laundering often causes organized crime and </span><a data-dcnode-id="8562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_crime" title="Corporate crime"><span data-dcnode-id="8563" instrument_node="">corporate crime</span></a><span data-dcnode-id="8561" instrument_node=""> to overlap.</span><sup class="reference" data-dcnode-id="8558" id="cite_ref-11"><a data-dcnode-id="8559" href="#cite_note-11"><span data-dcnode-id="8560" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8557" instrument_node=""> Such enterprises often operate openly and in doing so generate cash revenue from incidental legitimate business in addition to the illicit cash. In such cases the business will usually claim all cash received as legitimate earnings. Service businesses are best suited to this method, as such enterprises have little or no </span><a data-dcnode-id="8555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variable_cost" title="Variable cost"><span data-dcnode-id="8556" instrument_node="">variable costs</span></a><span data-dcnode-id="8554" instrument_node=""> and/or a large ratio between revenue and variable costs, which makes it difficult to detect discrepancies between revenues and costs. Examples are </span><a class="mw-redirect" data-dcnode-id="8552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parking_structures" title="Parking structures"><span data-dcnode-id="8553" instrument_node="">parking structures</span></a><span data-dcnode-id="8551" instrument_node="">, </span><a data-dcnode-id="8549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strip_club" title="Strip club"><span data-dcnode-id="8550" instrument_node="">strip clubs</span></a><span data-dcnode-id="8548" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tanning_salon" title="Tanning salon"><span data-dcnode-id="8547" instrument_node="">tanning salons</span></a><span data-dcnode-id="8545" instrument_node="">, </span><a data-dcnode-id="8543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Car_wash" title="Car wash"><span data-dcnode-id="8544" instrument_node="">car washes</span></a><span data-dcnode-id="8542" instrument_node="">, </span><a data-dcnode-id="8540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amusement_arcade" title="Amusement arcade"><span data-dcnode-id="8541" instrument_node="">arcades</span></a><span data-dcnode-id="8539" instrument_node="">, </span><a data-dcnode-id="8537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bar_%28establishment%29" title="Bar (establishment)"><span data-dcnode-id="8538" instrument_node="">bars</span></a><span data-dcnode-id="8536" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Restaurants" title="Restaurants"><span data-dcnode-id="8535" instrument_node="">restaurants</span></a><span data-dcnode-id="8533" instrument_node="">, </span><a data-dcnode-id="8531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casino" title="Casino"><span data-dcnode-id="8532" instrument_node="">casinos</span></a><span data-dcnode-id="8530" instrument_node="">, </span><a data-dcnode-id="8528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barber" title="Barber"><span data-dcnode-id="8529" instrument_node="">barber shops</span></a><span data-dcnode-id="8527" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD_store" title="DVD store"><span data-dcnode-id="8526" instrument_node="">DVD stores</span></a><span data-dcnode-id="8524" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_shops" title="Sex shops"><span data-dcnode-id="8523" instrument_node="">sex shops</span></a><span data-dcnode-id="8521" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Movie_theaters" title="Movie theaters"><span data-dcnode-id="8520" instrument_node="">movie theaters</span></a><span data-dcnode-id="8518" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toy_stores" title="Toy stores"><span data-dcnode-id="8517" instrument_node="">toy stores</span></a><span data-dcnode-id="8515" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bicycle_shop" title="Bicycle shop"><span data-dcnode-id="8514" instrument_node="">bicycle shops</span></a><span data-dcnode-id="8512" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beach_resort" title="Beach resort"><span data-dcnode-id="8511" instrument_node="">beach resorts</span></a><span data-dcnode-id="8509" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dry_goods_store" title="Dry goods store"><span data-dcnode-id="8508" instrument_node="">dry goods stores</span></a><span data-dcnode-id="8506" instrument_node="">.</span></li><span data-dcnode-id="8504" instrument_node="">
</span><li data-dcnode-id="8488"><span data-dcnode-id="8503" instrument_node="">Trade-based laundering: This method is one of the newest and most complex forms of money laundering.</span><sup class="reference" data-dcnode-id="8500" id="cite_ref-12"><a data-dcnode-id="8501" href="#cite_note-12"><span data-dcnode-id="8502" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8499" instrument_node=""> This involves under- or over-valuing </span><a data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invoice" title="Invoice"><span data-dcnode-id="8498" instrument_node="">invoices</span></a><span data-dcnode-id="8496" instrument_node=""> to disguise the movement of money.</span><sup class="reference" data-dcnode-id="8493" id="cite_ref-Achilles_Heel_13-0"><a data-dcnode-id="8494" href="#cite_note-Achilles_Heel-13"><span data-dcnode-id="8495" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8492" instrument_node=""> For example, the art market has been accused of being an ideal vehicle for money laundering due to several unique aspects of art such as the subjective value of art works as well as the secrecy of auction houses about the identity of the buyer and seller.</span><sup class="reference" data-dcnode-id="8489" id="cite_ref-Has_the_Art_Market_Become_an_Unwitting_Partner_in_Crime?_14-0"><a data-dcnode-id="8490" href="#cite_note-Has_the_Art_Market_Become_an_Unwitting_Partner_in_Crime?-14"><span data-dcnode-id="8491" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="8487" instrument_node="">
</span><li data-dcnode-id="8474"><a data-dcnode-id="8485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shell_corporation" title="Shell corporation"><span data-dcnode-id="8486" instrument_node="">Shell companies</span></a><span data-dcnode-id="8484" instrument_node=""> and trusts: Trusts and shell companies disguise the true owners of money. Trusts and corporate vehicles, depending on the jurisdiction, need not disclose their true owner.  Sometimes referred to by the slang term </span><i data-dcnode-id="8482"><span data-dcnode-id="8483" instrument_node="">rathole</span></i><span data-dcnode-id="8481" instrument_node="">, though that term usually refers to a person acting as the fictitious owner rather than the business entity.</span><sup class="reference" data-dcnode-id="8478" id="cite_ref-FATF_threat_assessment_15-0"><a data-dcnode-id="8479" href="#cite_note-FATF_threat_assessment-15"><span data-dcnode-id="8480" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="8475" id="cite_ref-private-eye.co.uk_16-0"><a data-dcnode-id="8476" href="#cite_note-private-eye.co.uk-16"><span data-dcnode-id="8477" instrument_node="">[16]</span></a></sup></li><span data-dcnode-id="8473" instrument_node="">
</span><li data-dcnode-id="8457"><a data-dcnode-id="8471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Round-tripping_%28finance%29" title="Round-tripping (finance)"><span data-dcnode-id="8472" instrument_node="">Round-tripping</span></a><span data-dcnode-id="8470" instrument_node="">: Here, money is deposited in a </span><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Controlled_foreign_corporation" title="Controlled foreign corporation"><span data-dcnode-id="8469" instrument_node="">controlled foreign corporation</span></a><span data-dcnode-id="8467" instrument_node=""> offshore, preferably in a </span><a data-dcnode-id="8465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_haven" title="Tax haven"><span data-dcnode-id="8466" instrument_node="">tax haven</span></a><span data-dcnode-id="8464" instrument_node=""> where minimal records are kept, and then shipped back as a </span><a data-dcnode-id="8462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_direct_investment" title="Foreign direct investment"><span data-dcnode-id="8463" instrument_node="">foreign direct investment</span></a><span data-dcnode-id="8461" instrument_node="">, exempt from taxation. A variant on this is to transfer money to a law firm or similar organization as funds on account of fees, then to cancel the retainer and, when the money is remitted, represent the sums received from the lawyers as a legacy under a will or proceeds of litigation.</span><sup class="reference" data-dcnode-id="8458" id="cite_ref-private-eye.co.uk_16-1"><a data-dcnode-id="8459" href="#cite_note-private-eye.co.uk-16"><span data-dcnode-id="8460" instrument_node="">[16]</span></a></sup></li><span data-dcnode-id="8456" instrument_node="">
</span><li data-dcnode-id="8454"><span data-dcnode-id="8455" instrument_node="">Bank capture: In this case, money launderers or criminals buy a controlling interest in a bank, preferably in a jurisdiction with weak money laundering controls, and then move money through the bank without scrutiny.</span></li><span data-dcnode-id="8453" instrument_node="">
</span><li data-dcnode-id="8448"><span data-dcnode-id="8452" instrument_node="">Invoice Fraud: An example is when a criminal contacts a company saying that the supplier payment details have changed. They then provide alternative, fraudulent details in order for you to pay them money.</span><sup class="reference" data-dcnode-id="8449" id="cite_ref-17"><a data-dcnode-id="8450" href="#cite_note-17"><span data-dcnode-id="8451" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="8447" instrument_node="">
</span><li data-dcnode-id="8442"><span data-dcnode-id="8446" instrument_node="">Casinos: In this method, an individual walks into a casino and buys chips with illicit cash. The individual will then play for a relatively short time. When the person cashes in the chips, they will expect to take payment in a check, or at least get a receipt so they can claim the proceeds as gambling winnings.</span><sup class="reference" data-dcnode-id="8443" id="cite_ref-National_Money_Laundering_Threat_Assessment_10-1"><a data-dcnode-id="8444" href="#cite_note-National_Money_Laundering_Threat_Assessment-10"><span data-dcnode-id="8445" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="8441" instrument_node="">
</span><li data-dcnode-id="8436"><span data-dcnode-id="8440" instrument_node="">Other gambling: Money is spent on gambling, preferably on high odds games. One way to minimize risk with this method is to bet on every possible outcome of some event that has many possible outcomes, so no outcome(s) have short odds, and the bettor will lose only the </span><a data-dcnode-id="8438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vigorish" title="Vigorish"><span data-dcnode-id="8439" instrument_node="">vigorish</span></a><span data-dcnode-id="8437" instrument_node=""> and will have one or more winning bets that can be shown as the source of money. The losing bets will remain hidden.</span></li><span data-dcnode-id="8435" instrument_node="">
</span><li data-dcnode-id="8430"><span data-dcnode-id="8434" instrument_node="">Black salaries: A company may have unregistered employees without written contracts and pay them cash salaries. Dirty money might be used to pay them.</span><sup class="reference" data-dcnode-id="8431" id="cite_ref-Underground_Economy_Issues._Ontario_Construction_Secretariat_18-0"><a data-dcnode-id="8432" href="#cite_note-Underground_Economy_Issues._Ontario_Construction_Secretariat-18"><span data-dcnode-id="8433" instrument_node="">[18]</span></a></sup></li><span data-dcnode-id="8429" instrument_node="">
</span><li data-dcnode-id="8422"><a data-dcnode-id="8427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_amnesty" title="Tax amnesty"><span data-dcnode-id="8428" instrument_node="">Tax amnesties</span></a><span data-dcnode-id="8426" instrument_node="">: For example, those that legalize unreported assets and cash in tax havens.</span><sup class="reference" data-dcnode-id="8423" id="cite_ref-19"><a data-dcnode-id="8424" href="#cite_note-19"><span data-dcnode-id="8425" instrument_node="">[19]</span></a></sup></li><span data-dcnode-id="8421" instrument_node="">
</span><li data-dcnode-id="8394"><span data-dcnode-id="8420" instrument_node="">Transaction Laundering: When a merchant unknowingly processes illicit credit card transactions for another business.</span><sup class="reference" data-dcnode-id="8417" id="cite_ref-20"><a data-dcnode-id="8418" href="#cite_note-20"><span data-dcnode-id="8419" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8416" instrument_node=""> It is a growing problem</span><sup class="reference" data-dcnode-id="8413" id="cite_ref-21"><a data-dcnode-id="8414" href="#cite_note-21"><span data-dcnode-id="8415" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="8410" id="cite_ref-22"><a data-dcnode-id="8411" href="#cite_note-22"><span data-dcnode-id="8412" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8409" instrument_node=""> and recognised as distinct from traditional money laundering in using the payments ecosystem to hide that the transaction even occurred</span><sup class="reference" data-dcnode-id="8406" id="cite_ref-23"><a data-dcnode-id="8407" href="#cite_note-23"><span data-dcnode-id="8408" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8405" instrument_node=""> (e.g. the use of fake front websites</span><sup class="reference" data-dcnode-id="8402" id="cite_ref-24"><a data-dcnode-id="8403" href="#cite_note-24"><span data-dcnode-id="8404" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8401" instrument_node="">). Also known as "undisclosed aggregation" or "factoring".</span><sup class="reference" data-dcnode-id="8398" id="cite_ref-25"><a data-dcnode-id="8399" href="#cite_note-25"><span data-dcnode-id="8400" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8395" id="cite_ref-26"><a data-dcnode-id="8396" href="#cite_note-26"><span data-dcnode-id="8397" instrument_node="">[26]</span></a></sup></li></ul><span data-dcnode-id="8392" instrument_node="">
</span><h4 data-dcnode-id="8382"><span class="mw-headline" data-dcnode-id="8390" id="Digital_electronic_money"><span data-dcnode-id="8391" instrument_node="">Digital electronic money</span></span><span class="mw-editsection" data-dcnode-id="8383"><span class="mw-editsection-bracket" data-dcnode-id="8388"><span data-dcnode-id="8389" instrument_node="">[</span></span><a data-dcnode-id="8386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D6" title="Edit section: Digital electronic money"><span data-dcnode-id="8387" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8384"><span data-dcnode-id="8385" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8381" instrument_node="">
</span><link data-dcnode-id="8380" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8376" role="note"><span data-dcnode-id="8379" instrument_node="">See also: </span><a data-dcnode-id="8377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cryptocurrency_and_crime" title="Cryptocurrency and crime"><span data-dcnode-id="8378" instrument_node="">Cryptocurrency and crime</span></a></div><span data-dcnode-id="8375" instrument_node="">
</span><p data-dcnode-id="8358"><span data-dcnode-id="8374" instrument_node="">In theory, </span><a class="mw-redirect" data-dcnode-id="8372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_money" title="Electronic money"><span data-dcnode-id="8373" instrument_node="">electronic money</span></a><span data-dcnode-id="8371" instrument_node=""> should provide as easy a method of transferring value without revealing identity as untracked banknotes, especially wire transfers involving anonymity-protecting numbered bank accounts.  In practice, however, the record-keeping capabilities of Internet service providers and other network resource maintainers tend to frustrate that intention.  While some </span><a data-dcnode-id="8369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cryptocurrency" title="Cryptocurrency"><span data-dcnode-id="8370" instrument_node="">cryptocurrencies</span></a><span data-dcnode-id="8368" instrument_node=""> under recent development have aimed to provide for more possibilities of transaction anonymity for various reasons, the degree to which they succeed—and, in consequence, the degree to which they offer benefits for money laundering efforts—is controversial. Solutions such as </span><a data-dcnode-id="8366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zcash" title="Zcash"><span data-dcnode-id="8367" instrument_node="">ZCash</span></a><span data-dcnode-id="8365" instrument_node=""> and </span><a data-dcnode-id="8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monero" title="Monero"><span data-dcnode-id="8364" instrument_node="">Monero</span></a><span data-dcnode-id="8362" instrument_node=""> are examples of cryptocurrencies that provide unlinkable anonymity via proofs and/or obfuscation of information (</span><a data-dcnode-id="8360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ring_signature" title="Ring signature"><span data-dcnode-id="8361" instrument_node="">ring signatures</span></a><span data-dcnode-id="8359" instrument_node="">). Such currencies could find use in online illicit services.
</span></p><p data-dcnode-id="8336"><span data-dcnode-id="8357" instrument_node="">In 2013, Jean-Loup Richet, a research fellow at </span><a class="mw-redirect" data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ESSEC" title="ESSEC"><span data-dcnode-id="8356" instrument_node="">ESSEC</span></a><span data-dcnode-id="8354" instrument_node=""> ISIS, surveyed new techniques that cybercriminals were using in a report written for the </span><a data-dcnode-id="8352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Office_on_Drugs_and_Crime" title="United Nations Office on Drugs and Crime"><span data-dcnode-id="8353" instrument_node="">United Nations Office on Drugs and Crime</span></a><span data-dcnode-id="8351" instrument_node="">.</span><sup class="reference" data-dcnode-id="8348" id="cite_ref-Jean-Loup_Richet_27-0"><a data-dcnode-id="8349" href="#cite_note-Jean-Loup_Richet-27"><span data-dcnode-id="8350" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8347" instrument_node=""> A common approach was to use a </span><a class="mw-redirect" data-dcnode-id="8345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_currency_exchanger" title="Digital currency exchanger"><span data-dcnode-id="8346" instrument_node="">digital currency exchanger</span></a><span data-dcnode-id="8344" instrument_node=""> service which converted dollars into a digital currency called </span><a data-dcnode-id="8342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_Reserve" title="Liberty Reserve"><span data-dcnode-id="8343" instrument_node="">Liberty Reserve</span></a><span data-dcnode-id="8341" instrument_node="">, and could be sent and received anonymously. The receiver could convert the Liberty Reserve currency back into cash for a small fee. In May 2013, the US authorities shut down Liberty Reserve charging its founder and various others with money laundering.</span><sup class="reference" data-dcnode-id="8338" id="cite_ref-Wired_28-0"><a data-dcnode-id="8339" href="#cite_note-Wired-28"><span data-dcnode-id="8340" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8337" instrument_node="">
</span></p><p data-dcnode-id="8318"><span data-dcnode-id="8335" instrument_node="">Another increasingly common way of laundering money is to use online gaming. In a growing number of online games, such as </span><i data-dcnode-id="8332"><a data-dcnode-id="8333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Life" title="Second Life"><span data-dcnode-id="8334" instrument_node="">Second Life</span></a></i><span data-dcnode-id="8331" instrument_node=""> and </span><i data-dcnode-id="8327"><a data-dcnode-id="8329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_of_Warcraft" title="World of Warcraft"><span data-dcnode-id="8330" instrument_node="">World of Warcraft</span></a><span data-dcnode-id="8328" instrument_node="">,</span></i><span data-dcnode-id="8326" instrument_node=""> it is possible to </span><a data-dcnode-id="8324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_farming" title="Gold farming"><span data-dcnode-id="8325" instrument_node="">convert money into virtual goods, services, or virtual cash</span></a><span data-dcnode-id="8323" instrument_node=""> that can later be converted back into money.</span><sup class="reference" data-dcnode-id="8320" id="cite_ref-Wired.uk_29-0"><a data-dcnode-id="8321" href="#cite_note-Wired.uk-29"><span data-dcnode-id="8322" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8319" instrument_node="">
</span></p><p data-dcnode-id="8281"><span data-dcnode-id="8317" instrument_node="">To avoid the usage of decentralized digital money such as </span><a data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bitcoin" title="Bitcoin"><span data-dcnode-id="8316" instrument_node="">Bitcoin</span></a><span data-dcnode-id="8314" instrument_node=""> for the profit of crime and corruption, Australia is planning to strengthen the nation's anti-money laundering laws.</span><sup class="reference" data-dcnode-id="8311" id="cite_ref-ABC_30-0"><a data-dcnode-id="8312" href="#cite_note-ABC-30"><span data-dcnode-id="8313" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8310" instrument_node="">
The characteristics of Bitcoin—it is completely deterministic, protocol based and can be difficult to censor</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8303" style="white-space:nowrap;"><span data-dcnode-id="8309" instrument_node="">[</span><i data-dcnode-id="8305"><a data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8307" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="8308" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8304" instrument_node="">]</span></sup><span data-dcnode-id="8302" instrument_node="">—make it possible to circumvent national laws using services like </span><a data-dcnode-id="8300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tor_%28network%29" title="Tor (network)"><span data-dcnode-id="8301" instrument_node="">Tor</span></a><span data-dcnode-id="8299" instrument_node=""> to obfuscate transaction origins. Bitcoin relies completely on cryptography, not on a central entity running under a </span><a data-dcnode-id="8297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Know_your_customer" title="Know your customer"><span data-dcnode-id="8298" instrument_node="">KYC</span></a><span data-dcnode-id="8296" instrument_node=""> framework. There are several cases in which criminals have cashed out a significant amount of Bitcoin after ransomware attacks, drug dealings, cyber fraud and gunrunning.</span><sup class="reference" data-dcnode-id="8293" id="cite_ref-cnbc.com_31-0"><a data-dcnode-id="8294" href="#cite_note-cnbc.com-31"><span data-dcnode-id="8295" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="8290" id="cite_ref-express.co.uk_32-0"><a data-dcnode-id="8291" href="#cite_note-express.co.uk-32"><span data-dcnode-id="8292" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8289" instrument_node=""> However, many digital currency exchanges are now operating KYC programs under threat of regulation from the jurisdictions they operate in.</span><sup class="reference" data-dcnode-id="8286" id="cite_ref-33"><a data-dcnode-id="8287" href="#cite_note-33"><span data-dcnode-id="8288" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="8283" id="cite_ref-34"><a data-dcnode-id="8284" href="#cite_note-34"><span data-dcnode-id="8285" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8282" instrument_node="">
</span></p><span data-dcnode-id="8280" instrument_node="">
</span><h4 data-dcnode-id="8270"><span class="mw-headline" data-dcnode-id="8278" id="Reverse_money_laundering"><span data-dcnode-id="8279" instrument_node="">Reverse money laundering</span></span><span class="mw-editsection" data-dcnode-id="8271"><span class="mw-editsection-bracket" data-dcnode-id="8276"><span data-dcnode-id="8277" instrument_node="">[</span></span><a data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D7" title="Edit section: Reverse money laundering"><span data-dcnode-id="8275" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8272"><span data-dcnode-id="8273" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8269" instrument_node="">
</span><link data-dcnode-id="8268" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8264" role="note"><span data-dcnode-id="8267" instrument_node="">See also: </span><a data-dcnode-id="8265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawala_and_crime" title="Hawala and crime"><span data-dcnode-id="8266" instrument_node="">Hawala and crime</span></a></div><span data-dcnode-id="8263" instrument_node="">
</span><p data-dcnode-id="8246"><span data-dcnode-id="8262" instrument_node="">Reverse money laundering is a process that disguises a legitimate source of funds that are to be used for illegal purposes.</span><sup class="reference" data-dcnode-id="8259" id="cite_ref-REVERSE_LAUNDERING_35-0"><a data-dcnode-id="8260" href="#cite_note-REVERSE_LAUNDERING-35"><span data-dcnode-id="8261" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8258" instrument_node=""> It is usually perpetrated for the purpose of financing terrorism</span><sup class="reference" data-dcnode-id="8255" id="cite_ref-36"><a data-dcnode-id="8256" href="#cite_note-36"><span data-dcnode-id="8257" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8254" instrument_node=""> but can be also used by criminal organizations that have invested in legal businesses and would like to withdraw legitimate funds from official circulation. Unaccounted cash received via disguising financial transactions is not included in official financial reporting and could be used to evade taxes, hand in bribes and pay "under-the-table" salaries.</span><sup class="reference" data-dcnode-id="8251" id="cite_ref-37"><a data-dcnode-id="8252" href="#cite_note-37"><span data-dcnode-id="8253" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8250" instrument_node=""> For example, in an affidavit filed on 24 March 2014 in United States District Court, Northern California, San Francisco Division, FBI special agent Emmanuel V. Pascau alleged that several people associated with the Chee Kung Tong organization, and California State Senator </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leland_Yee" title="Leland Yee"><span data-dcnode-id="8249" instrument_node="">Leland Yee</span></a><span data-dcnode-id="8247" instrument_node="">, engaged in reverse money laundering activities.
</span></p><p data-dcnode-id="8234"><span data-dcnode-id="8245" instrument_node="">The problem of such fraudulent encashment practices (</span><i data-dcnode-id="8243"><span data-dcnode-id="8244" instrument_node="">obnalichka</span></i><span data-dcnode-id="8242" instrument_node=""> in Russian) has become acute in Russia and other countries of the former Soviet Union. The Eurasian Group on Combating Money Laundering and Financing of Terrorism (EAG) reported that the Russian Federation, Ukraine, Turkey, Serbia, Kyrgyzstan, Uzbekistan, Armenia and Kazakhstan have encountered a substantial shrinkage of tax base and shifting money supply balance in favor of cash. These processes have complicated planning and management of the economy and contributed to the growth of the </span><a class="mw-redirect" data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shadow_economy" title="Shadow economy"><span data-dcnode-id="8241" instrument_node="">shadow economy</span></a><span data-dcnode-id="8239" instrument_node="">.</span><sup class="reference" data-dcnode-id="8236" id="cite_ref-38"><a data-dcnode-id="8237" href="#cite_note-38"><span data-dcnode-id="8238" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8235" instrument_node="">
</span></p><span data-dcnode-id="8233" instrument_node="">
</span><h3 data-dcnode-id="8223"><span class="mw-headline" data-dcnode-id="8231" id="Magnitude"><span data-dcnode-id="8232" instrument_node="">Magnitude</span></span><span class="mw-editsection" data-dcnode-id="8224"><span class="mw-editsection-bracket" data-dcnode-id="8229"><span data-dcnode-id="8230" instrument_node="">[</span></span><a data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D8" title="Edit section: Magnitude"><span data-dcnode-id="8228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8225"><span data-dcnode-id="8226" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8222" instrument_node="">
</span><p data-dcnode-id="8205"><span data-dcnode-id="8221" instrument_node="">Many regulatory and governmental authorities issue estimates each year for the amount of money laundered, either worldwide or within their national economy. In 1996, a spokesperson for the IMF estimated that 2–5% of the worldwide global economy involved laundered money.</span><sup class="reference" data-dcnode-id="8218" id="cite_ref-39"><a data-dcnode-id="8219" href="#cite_note-39"><span data-dcnode-id="8220" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8217" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="8215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force_on_Money_Laundering" title="Financial Action Task Force on Money Laundering"><span data-dcnode-id="8216" instrument_node="">Financial Action Task Force on Money Laundering</span></a><span data-dcnode-id="8214" instrument_node=""> (FATF), an intergovernmental body set up to combat money laundering, stated, "Due to the illegal nature of the transactions, precise statistics are not available and it is therefore impossible to produce a definitive estimate of the amount of money that is globally laundered every year. The FATF therefore does not publish any figures in this regard."</span><sup class="reference" data-dcnode-id="8211" id="cite_ref-FATF_FAQ_40-0"><a data-dcnode-id="8212" href="#cite_note-FATF_FAQ-40"><span data-dcnode-id="8213" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8210" instrument_node=""> Academic commentators have likewise been unable to estimate the volume of money with any degree of assurance.</span><sup class="reference" data-dcnode-id="8207" id="cite_ref-chasing_dirty_money_6-1"><a data-dcnode-id="8208" href="#cite_note-chasing_dirty_money-6"><span data-dcnode-id="8209" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8206" instrument_node=""> Various estimates of the scale of global money laundering are sometimes repeated often enough to make some people regard them as factual—but no researcher has overcome the inherent difficulty of measuring an actively concealed practice.
</span></p><p data-dcnode-id="8177"><span data-dcnode-id="8204" instrument_node="">Regardless of the difficulty in measurement, the amount of money laundered each year is in the </span><a class="mw-redirect" data-dcnode-id="8202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1000000000_%28number%29" title="1000000000 (number)"><span data-dcnode-id="8203" instrument_node="">billions</span></a><span data-dcnode-id="8201" instrument_node=""> of US dollars and poses a significant policy concern for governments.</span><sup class="reference" data-dcnode-id="8198" id="cite_ref-chasing_dirty_money_6-2"><a data-dcnode-id="8199" href="#cite_note-chasing_dirty_money-6"><span data-dcnode-id="8200" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8197" instrument_node=""> As a result, governments and international bodies have undertaken efforts to deter, prevent, and apprehend money launderers. Financial institutions have likewise undertaken efforts to prevent and detect transactions involving dirty money, both as a result of government requirements and to avoid the reputational risk involved. Issues relating to money laundering have existed as long as there have been </span><a data-dcnode-id="8195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organized_crime" title="Organized crime"><span data-dcnode-id="8196" instrument_node="">large scale criminal enterprises</span></a><span data-dcnode-id="8194" instrument_node="">. Modern anti-money laundering laws have developed along with the modern </span><a class="mw-redirect" data-dcnode-id="8192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Drugs" title="War on Drugs"><span data-dcnode-id="8193" instrument_node="">War on Drugs</span></a><span data-dcnode-id="8191" instrument_node="">.</span><sup class="reference" data-dcnode-id="8188" id="cite_ref-41"><a data-dcnode-id="8189" href="#cite_note-41"><span data-dcnode-id="8190" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8187" instrument_node=""> In more recent times anti-money laundering legislation is seen as adjunct to the financial crime of </span><a class="mw-redirect" data-dcnode-id="8185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorist_financing" title="Terrorist financing"><span data-dcnode-id="8186" instrument_node="">terrorist financing</span></a><span data-dcnode-id="8184" instrument_node=""> in that both crimes usually involve the transmission of funds through the financial system (although money laundering relates to where the money has come </span><i data-dcnode-id="8182"><span data-dcnode-id="8183" instrument_node="">from</span></i><span data-dcnode-id="8181" instrument_node="">, and terrorist financing relating to where the money is going </span><i data-dcnode-id="8179"><span data-dcnode-id="8180" instrument_node="">to</span></i><span data-dcnode-id="8178" instrument_node="">).
</span></p><p data-dcnode-id="8167"><span data-dcnode-id="8176" instrument_node="">Transaction laundering is a massive and growing problem.</span><sup class="reference" data-dcnode-id="8173" id="cite_ref-42"><a data-dcnode-id="8174" href="#cite_note-42"><span data-dcnode-id="8175" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8172" instrument_node=""> Finextra estimated that transaction laundering accounted for over $200 billion in the US in 2017 alone, with over $6 billion of these sales involving illicit goods or services, sold by nearly 335,000 unregistered merchants.</span><sup class="reference" data-dcnode-id="8169" id="cite_ref-43"><a data-dcnode-id="8170" href="#cite_note-43"><span data-dcnode-id="8171" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8168" instrument_node="">
</span></p><span data-dcnode-id="8166" instrument_node="">
</span><h2 data-dcnode-id="8156"><span class="mw-headline" data-dcnode-id="8164" id="Combating"><span data-dcnode-id="8165" instrument_node="">Combating</span></span><span class="mw-editsection" data-dcnode-id="8157"><span class="mw-editsection-bracket" data-dcnode-id="8162"><span data-dcnode-id="8163" instrument_node="">[</span></span><a data-dcnode-id="8160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D9" title="Edit section: Combating"><span data-dcnode-id="8161" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8155" instrument_node="">
</span><p data-dcnode-id="8152"><span class="anchor" data-dcnode-id="8154" id="Anti-money_laundering"></span><span data-dcnode-id="8153" instrument_node="">
</span></p><p data-dcnode-id="8130"><span data-dcnode-id="8151" instrument_node="">Anti-money laundering (AML) is a term mainly used in the financial and legal industries to describe the legal controls that require </span><a data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_institution" title="Financial institution"><span data-dcnode-id="8150" instrument_node="">financial institutions</span></a><span data-dcnode-id="8148" instrument_node=""> and other regulated entities to prevent, detect, and report money laundering activities. Anti-money laundering guidelines came into prominence globally as a result of the formation of the </span><a data-dcnode-id="8146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force" title="Financial Action Task Force"><span data-dcnode-id="8147" instrument_node="">Financial Action Task Force</span></a><span data-dcnode-id="8145" instrument_node=""> (FATF) and the promulgation of an international framework of anti-money laundering standards.</span><sup class="reference" data-dcnode-id="8142" id="cite_ref-about_the_FATF_44-0"><a data-dcnode-id="8143" href="#cite_note-about_the_FATF-44"><span data-dcnode-id="8144" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8141" instrument_node=""> These standards began to have more relevance in 2000 and 2001, after FATF began a process to publicly identify countries that were deficient in their anti-money laundering laws and international cooperation, a process colloquially known as "</span><a data-dcnode-id="8139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Name_and_shame" title="Name and shame"><span data-dcnode-id="8140" instrument_node="">name and shame</span></a><span data-dcnode-id="8138" instrument_node="">".</span><sup class="reference" data-dcnode-id="8135" id="cite_ref-FATF_NCCT_initiative_45-0"><a data-dcnode-id="8136" href="#cite_note-FATF_NCCT_initiative-45"><span data-dcnode-id="8137" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="8132" id="cite_ref-46"><a data-dcnode-id="8133" href="#cite_note-46"><span data-dcnode-id="8134" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8131" instrument_node="">
</span></p><p data-dcnode-id="8124"><span data-dcnode-id="8129" instrument_node="">An effective AML program requires a jurisdiction to criminalise money laundering, giving the relevant regulators and police the powers and tools to investigate; be able to share information with other countries as appropriate; and require financial institutions to identify their customers, establish risk-based controls, keep records, and report suspicious activities.</span><sup class="reference" data-dcnode-id="8126" id="cite_ref-Money_Laundering_FAQ_47-0"><a data-dcnode-id="8127" href="#cite_note-Money_Laundering_FAQ-47"><span data-dcnode-id="8128" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8125" instrument_node="">
</span></p><p data-dcnode-id="8118"><span data-dcnode-id="8123" instrument_node="">Strict background checks are necessary to combat as many money launderers escape by investing through complex ownership and company structures. Banks can do that but proper surveillance is required but on the government side to reduce this.</span><sup class="reference" data-dcnode-id="8120" id="cite_ref-48"><a data-dcnode-id="8121" href="#cite_note-48"><span data-dcnode-id="8122" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8119" instrument_node="">
</span></p><p data-dcnode-id="8098"><span data-dcnode-id="8117" instrument_node="">Over recent years</span><sup class="noprint Inline-Template" data-dcnode-id="8110" style="white-space:nowrap;"><span data-dcnode-id="8116" instrument_node="">[</span><i data-dcnode-id="8112"><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="8114" title="The time period mentioned near this tag is ambiguous. (August 2020)"><span data-dcnode-id="8115" instrument_node="">when?</span></span></a></i><span data-dcnode-id="8111" instrument_node="">]</span></sup><span data-dcnode-id="8109" instrument_node="">, the rise in anti-money laundering mechanisms has been attributed to the use of </span><a data-dcnode-id="8107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_data" title="Big data"><span data-dcnode-id="8108" instrument_node="">big data</span></a><span data-dcnode-id="8106" instrument_node=""> and </span><a data-dcnode-id="8104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="8105" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="8103" instrument_node="">.</span><sup class="reference" data-dcnode-id="8100" id="cite_ref-49"><a data-dcnode-id="8101" href="#cite_note-49"><span data-dcnode-id="8102" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8099" instrument_node=""> Traditional anti-money laundering systems are falling behind against evolving threats and new technologies are helping AML compliance officers to deal with: poor implementation, expanding regulation, administrative complexity, false positives.
</span></p><span data-dcnode-id="8097" instrument_node="">
</span><h3 data-dcnode-id="8087"><span class="mw-headline" data-dcnode-id="8095" id="Criminalization"><span data-dcnode-id="8096" instrument_node="">Criminalization</span></span><span class="mw-editsection" data-dcnode-id="8088"><span class="mw-editsection-bracket" data-dcnode-id="8093"><span data-dcnode-id="8094" instrument_node="">[</span></span><a data-dcnode-id="8091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D10" title="Edit section: Criminalization"><span data-dcnode-id="8092" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8089"><span data-dcnode-id="8090" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8086" instrument_node="">
