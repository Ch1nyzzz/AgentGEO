</span></p><p data-dcnode-id="7319"><span data-dcnode-id="7324" instrument_node="">Money laundering is still a great concern for the financial services industry.  About 50% of the money laundering incidents in Latin America were reported by organizations in the financial sector. According to PwC's 2014 global economic crime survey, in Latin America only 2.8% of respondents in Latin America claimed suffering Antitrust/Competition Law incidents, compared to 5.2% of respondents globally.</span><sup class="reference" data-dcnode-id="7321" id="cite_ref-96"><a data-dcnode-id="7322" href="#cite_note-96"><span data-dcnode-id="7323" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7320" instrument_node="">
</span></p><p data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">It has been shown that money laundering has an impact on the financial behavior and macroeconomic performance of the industrialized countries. In these countries the macroeconomic consequences of money laundering are transmitted through several channels. Thus, money laundering complicates the formulation of economic policies. It is assumed that the proceeds of criminal activities are laundered by means of the notes and coins in circulation of the monetary substitutes.
</span></p><p data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">The laundering causes disproportionate changes in the relative prices of assets which implies that resources are allocated inefficiently; and, therefore may have negative implications for economic growth, apparently money laundering is associated with a lower economic growth.
</span></p><p data-dcnode-id="7306"><span data-dcnode-id="7314" instrument_node="">The </span><a data-dcnode-id="7312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_National_Drug_Control_Policy" title="Office of National Drug Control Policy"><span data-dcnode-id="7313" instrument_node="">Office of National Drug Control Policy</span></a><span data-dcnode-id="7311" instrument_node=""> of the United States estimates that only in that country, sales of narcotic drugs represent about 57,000 million dollars annually and most of these transactions are made in cash.</span><sup class="reference" data-dcnode-id="7308" id="cite_ref-97"><a data-dcnode-id="7309" href="#cite_note-97"><span data-dcnode-id="7310" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7307" instrument_node="">
</span></p><span data-dcnode-id="7305" instrument_node="">
</span><h4 data-dcnode-id="7295"><span class="mw-headline" data-dcnode-id="7303" id="Jurisprudence"><span data-dcnode-id="7304" instrument_node="">Jurisprudence</span></span><span class="mw-editsection" data-dcnode-id="7296"><span class="mw-editsection-bracket" data-dcnode-id="7301"><span data-dcnode-id="7302" instrument_node="">[</span></span><a data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D24" title="Edit section: Jurisprudence"><span data-dcnode-id="7300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7294" instrument_node="">
</span><p data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">Money laundering has been increasing. A key factor behind the growing money laundering is the ineffective local enforcement of money laundering laws. Perhaps because of the lack of importance that has been given to the subject, since the 21st century started, there was no jurisprudence regarding the laundering of money, assets, the conversion or transfer of goods. What is even worse, the laws of the Latin American countries have not dealt with their study profoundly. It is an issue that concerns the whole world and is the subject of seminars, conferences, and academic analysis in different regions of the planet. Now a new figure called the Economic Criminal Law is being implemented, which should be implemented in modern societies, which has been inflicted enormous damage to the point of affecting the general economy of the states. Even though developing countries have responded and continue to respond, through legislative measures, to the problem of money laundering, at the national level, however, money launderers have taken advantage of the lax regulatory environment, vulnerable financial systems along with the continued civil and political unrest of most developing countries.
</span></p><span data-dcnode-id="7291" instrument_node="">
</span><h3 data-dcnode-id="7281"><span class="mw-headline" data-dcnode-id="7289" id="Singapore"><span data-dcnode-id="7290" instrument_node="">Singapore</span></span><span class="mw-editsection" data-dcnode-id="7282"><span class="mw-editsection-bracket" data-dcnode-id="7287"><span data-dcnode-id="7288" instrument_node="">[</span></span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D25" title="Edit section: Singapore"><span data-dcnode-id="7286" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7280" instrument_node="">
</span><p data-dcnode-id="7272"><a data-dcnode-id="7278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore" title="Singapore"><span data-dcnode-id="7279" instrument_node="">Singapore</span></a><span data-dcnode-id="7277" instrument_node="">’s legal framework for combating money laundering is contained in a patchwork of legal instruments,</span><sup class="reference" data-dcnode-id="7274" id="cite_ref-98"><a data-dcnode-id="7275" href="#cite_note-98"><span data-dcnode-id="7276" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7273" instrument_node=""> the main elements of which are:
</span></p><span data-dcnode-id="7271" instrument_node="">
</span><ul data-dcnode-id="7247"><li data-dcnode-id="7265"><span data-dcnode-id="7270" instrument_node="">The Corruption, Drug Trafficking and Other Serious Crimes (Confiscation of Benefits) Act (CDSA).</span><sup class="reference" data-dcnode-id="7267" id="cite_ref-99"><a data-dcnode-id="7268" href="#cite_note-99"><span data-dcnode-id="7269" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7266" instrument_node=""> This statute criminalises money laundering and imposes the requirement for persons to file suspicious transaction reports (STRs) and make a disclosure whenever physical currency or goods exceeding S$20,000 are carried into or out of Singapore.</span></li><span data-dcnode-id="7264" instrument_node="">
</span><li data-dcnode-id="7258"><span data-dcnode-id="7263" instrument_node="">The Mutual Assistance in Criminal Matters Act (MACMA).</span><sup class="reference" data-dcnode-id="7260" id="cite_ref-100"><a data-dcnode-id="7261" href="#cite_note-100"><span data-dcnode-id="7262" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7259" instrument_node=""> This statute sets out the framework for mutual legal assistance in criminal matters.</span></li><span data-dcnode-id="7257" instrument_node="">
</span><li data-dcnode-id="7248"><span data-dcnode-id="7256" instrument_node="">Legal instruments issued by regulatory agencies (such as the </span><a data-dcnode-id="7254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monetary_Authority_of_Singapore" title="Monetary Authority of Singapore"><span data-dcnode-id="7255" instrument_node="">Monetary Authority of Singapore</span></a><span data-dcnode-id="7253" instrument_node=""> (MAS),</span><sup class="reference" data-dcnode-id="7250" id="cite_ref-101"><a data-dcnode-id="7251" href="#cite_note-101"><span data-dcnode-id="7252" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7249" instrument_node=""> in relation to financial institutions (FIs)) imposing requirements to conduct customer due diligence (CDD).</span></li></ul><span data-dcnode-id="7246" instrument_node="">
</span><p data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">The term ‘money laundering’ is not used as such within the CDSA. Part VI of the CDSA criminalises the laundering of proceeds generated by criminal conduct and drug tracking via the following offences:
</span></p><span data-dcnode-id="7243" instrument_node="">
</span><ul data-dcnode-id="7228"><li data-dcnode-id="7238"><span data-dcnode-id="7242" instrument_node="">The assistance of another person in retaining, controlling or using the benefits of </span><a class="mw-redirect" data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_dealing" title="Drug dealing"><span data-dcnode-id="7241" instrument_node="">drug dealing</span></a><span data-dcnode-id="7239" instrument_node=""> or criminal conduct under an arrangement (whether by concealment, removal from jurisdiction, transfer to nominees or otherwise) [section 43(1)/44(1)].</span></li><span data-dcnode-id="7237" instrument_node="">
</span><li data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">The concealment, conversion, transfer or removal from the jurisdiction, or the acquisition, possession or use of benefits of drug dealing or criminal conduct [section 46(1)/47(1)].</span></li><span data-dcnode-id="7234" instrument_node="">
</span><li data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">The concealment, conversion, transfer or removal from the jurisdiction of another person's benefits of drug dealing or criminal conduct [section 46(2)/47(2)].</span></li><span data-dcnode-id="7231" instrument_node="">
</span><li data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">The acquirement, possession or use of another person's benefits of drug dealing or criminal conduct [section 46(3)/47(3)].</span></li></ul><span data-dcnode-id="7227" instrument_node="">
</span><h3 data-dcnode-id="7217"><span class="mw-headline" data-dcnode-id="7225" id="Thailand"><span data-dcnode-id="7226" instrument_node="">Thailand</span></span><span class="mw-editsection" data-dcnode-id="7218"><span class="mw-editsection-bracket" data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">[</span></span><a data-dcnode-id="7221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D26" title="Edit section: Thailand"><span data-dcnode-id="7222" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7216" instrument_node="">
</span><link data-dcnode-id="7215" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7211" role="note"><span data-dcnode-id="7214" instrument_node="">Main article: </span><a data-dcnode-id="7212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Money_Laundering_Office_%28Thailand%29" title="Anti-Money Laundering Office (Thailand)"><span data-dcnode-id="7213" instrument_node="">Anti-Money Laundering Office (Thailand)</span></a></div><span data-dcnode-id="7210" instrument_node="">
</span><h3 data-dcnode-id="7200"><span class="mw-headline" data-dcnode-id="7208" id="United_Kingdom"><span data-dcnode-id="7209" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="7201"><span class="mw-editsection-bracket" data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">[</span></span><a data-dcnode-id="7204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D27" title="Edit section: United Kingdom"><span data-dcnode-id="7205" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7199" instrument_node="">
</span><p data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">Money laundering and terrorist funding legislation in the UK is governed by six Acts of primary legislation:-
</span></p><span data-dcnode-id="7196" instrument_node="">
</span><ul data-dcnode-id="7154"><li data-dcnode-id="7190"><a data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism_Act_2000" title="Terrorism Act 2000"><span data-dcnode-id="7195" instrument_node="">Terrorism Act 2000</span></a><sup class="reference" data-dcnode-id="7191" id="cite_ref-TERRA1_102-0"><a data-dcnode-id="7192" href="#cite_note-TERRA1-102"><span data-dcnode-id="7193" instrument_node="">[102]</span></a></sup></li><span data-dcnode-id="7189" instrument_node="">
</span><li data-dcnode-id="7183"><a data-dcnode-id="7187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-terrorism%2C_Crime_and_Security_Act_2001" title="Anti-terrorism, Crime and Security Act 2001"><span data-dcnode-id="7188" instrument_node="">Anti-terrorism, Crime and Security Act 2001</span></a><sup class="reference" data-dcnode-id="7184" id="cite_ref-ATCSA1_103-0"><a data-dcnode-id="7185" href="#cite_note-ATCSA1-103"><span data-dcnode-id="7186" instrument_node="">[103]</span></a></sup></li><span data-dcnode-id="7182" instrument_node="">
</span><li data-dcnode-id="7176"><a data-dcnode-id="7180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proceeds_of_Crime_Act_2002" title="Proceeds of Crime Act 2002"><span data-dcnode-id="7181" instrument_node="">Proceeds of Crime Act 2002</span></a><sup class="reference" data-dcnode-id="7177" id="cite_ref-POCA1_104-0"><a data-dcnode-id="7178" href="#cite_note-POCA1-104"><span data-dcnode-id="7179" instrument_node="">[104]</span></a></sup></li><span data-dcnode-id="7175" instrument_node="">
</span><li data-dcnode-id="7169"><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serious_Organised_Crime_and_Police_Act_2005" title="Serious Organised Crime and Police Act 2005"><span data-dcnode-id="7174" instrument_node="">Serious Organised Crime and Police Act 2005</span></a><sup class="reference" data-dcnode-id="7170" id="cite_ref-SOCPA1_105-0"><a data-dcnode-id="7171" href="#cite_note-SOCPA1-105"><span data-dcnode-id="7172" instrument_node="">[105]</span></a></sup></li><span data-dcnode-id="7168" instrument_node="">
</span><li data-dcnode-id="7162"><a data-dcnode-id="7166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_Finances_Act_2017" title="Criminal Finances Act 2017"><span data-dcnode-id="7167" instrument_node="">Criminal Finances Act 2017</span></a><sup class="reference" data-dcnode-id="7163" id="cite_ref-106"><a data-dcnode-id="7164" href="#cite_note-106"><span data-dcnode-id="7165" instrument_node="">[106]</span></a></sup></li><span data-dcnode-id="7161" instrument_node="">
</span><li data-dcnode-id="7155"><a data-dcnode-id="7159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctions_and_Anti-Money_Laundering_Act_2018" title="Sanctions and Anti-Money Laundering Act 2018"><span data-dcnode-id="7160" instrument_node="">Sanctions and Anti-Money Laundering Act 2018</span></a><sup class="reference" data-dcnode-id="7156" id="cite_ref-107"><a data-dcnode-id="7157" href="#cite_note-107"><span data-dcnode-id="7158" instrument_node="">[107]</span></a></sup></li></ul><span data-dcnode-id="7153" instrument_node="">
</span><p data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">Money Laundering Regulations are designed to protect the UK financial system, as well as preventing and detecting crime. If a business is covered by these regulations then controls are put in place to prevent it being used for money laundering.
</span></p><p data-dcnode-id="7138"><span data-dcnode-id="7150" instrument_node="">The </span><a data-dcnode-id="7148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proceeds_of_Crime_Act_2002" title="Proceeds of Crime Act 2002"><span data-dcnode-id="7149" instrument_node="">Proceeds of Crime Act 2002</span></a><span data-dcnode-id="7147" instrument_node=""> contains the primary UK anti-money laundering legislation,</span><sup class="reference" data-dcnode-id="7144" id="cite_ref-108"><a data-dcnode-id="7145" href="#cite_note-108"><span data-dcnode-id="7146" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7143" instrument_node=""> including provisions requiring businesses within the "regulated sector" (banking, investment, money transmission, certain professions, etc.) to report to the authorities suspicions of money laundering by customers or others.</span><sup class="reference" data-dcnode-id="7140" id="cite_ref-109"><a data-dcnode-id="7141" href="#cite_note-109"><span data-dcnode-id="7142" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7139" instrument_node="">
</span></p><p data-dcnode-id="7124"><span data-dcnode-id="7137" instrument_node="">Money laundering is broadly defined in the UK.</span><sup class="reference" data-dcnode-id="7134" id="cite_ref-ReferenceA_110-0"><a data-dcnode-id="7135" href="#cite_note-ReferenceA-110"><span data-dcnode-id="7136" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7133" instrument_node=""> In effect any handling or involvement with any proceeds of any crime (or monies or assets representing the proceeds of crime) can be a money laundering offence. An offender's possession of the proceeds of his own crime falls within the UK definition of money laundering.</span><sup class="reference" data-dcnode-id="7130" id="cite_ref-ReferenceB_111-0"><a data-dcnode-id="7131" href="#cite_note-ReferenceB-111"><span data-dcnode-id="7132" instrument_node="">[111]</span></a></sup><span data-dcnode-id="7129" instrument_node=""> The definition also covers activities within the traditional definition of money laundering, as a process that conceals or disguises the proceeds of crime to make them appear legitimate.</span><sup class="reference" data-dcnode-id="7126" id="cite_ref-112"><a data-dcnode-id="7127" href="#cite_note-112"><span data-dcnode-id="7128" instrument_node="">[112]</span></a></sup><span data-dcnode-id="7125" instrument_node="">
</span></p><p data-dcnode-id="7122"><span data-dcnode-id="7123" instrument_node="">Unlike certain other jurisdictions (notably the US and much of Europe), UK money laundering offences are not limited to the proceeds of serious crimes, nor are there any monetary limits. Financial transactions need no money laundering design or purpose for UK laws to consider them a money laundering offence. A money laundering offence under UK legislation need not even involve money, since the money laundering legislation covers assets of any description. In consequence, any person who commits an acquisitive crime (i.e., one that produces some benefit in the form of money or an asset of any description) in the UK inevitably also commits a money laundering offence under UK legislation.
</span></p><p data-dcnode-id="7116"><span data-dcnode-id="7121" instrument_node="">This applies also to a person who, by criminal conduct, evades a liability (such as a taxation liability)—which lawyers call "obtaining a pecuniary advantage"—as he is deemed thereby to obtain a sum of money equal in value to the liability evaded.</span><sup class="reference" data-dcnode-id="7118" id="cite_ref-ReferenceA_110-1"><a data-dcnode-id="7119" href="#cite_note-ReferenceA-110"><span data-dcnode-id="7120" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7117" instrument_node="">
</span></p><p data-dcnode-id="7110"><span data-dcnode-id="7115" instrument_node="">The principal money laundering offences carry a maximum penalty of 14 years' imprisonment.</span><sup class="reference" data-dcnode-id="7112" id="cite_ref-ReferenceC_113-0"><a data-dcnode-id="7113" href="#cite_note-ReferenceC-113"><span data-dcnode-id="7114" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7111" instrument_node="">
</span></p><p data-dcnode-id="7093"><span data-dcnode-id="7109" instrument_node="">Secondary regulation is provided by the Money Laundering Regulations 2003,</span><sup class="reference" data-dcnode-id="7106" id="cite_ref-MLR1_114-0"><a data-dcnode-id="7107" href="#cite_note-MLR1-114"><span data-dcnode-id="7108" instrument_node="">[114]</span></a></sup><span data-dcnode-id="7105" instrument_node=""> which were replaced by the Money Laundering Regulations 2007.</span><sup class="reference" data-dcnode-id="7102" id="cite_ref-MLR2_115-0"><a data-dcnode-id="7103" href="#cite_note-MLR2-115"><span data-dcnode-id="7104" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7101" instrument_node=""> They are </span><a data-dcnode-id="7099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transposition_%28law%29" title="Transposition (law)"><span data-dcnode-id="7100" instrument_node="">directly based on</span></a><span data-dcnode-id="7098" instrument_node=""> the EU Directives 91/308/EEC, 2001/97/EC and (through the 2007 regulations) 2005/60/EC. The regulations list a number of supervisory authorities who have a role in overseeing the financial activities of their members.</span><sup class="reference" data-dcnode-id="7095" id="cite_ref-MLR2_115-1"><a data-dcnode-id="7096" href="#cite_note-MLR2-115"><span data-dcnode-id="7097" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7094" instrument_node="">
</span></p><p data-dcnode-id="7084"><span data-dcnode-id="7092" instrument_node="">One consequence of the Act is that solicitors, accountants, tax advisers, and insolvency practitioners who suspect (as a consequence of information received in the course of their work) that their clients (or others) have engaged in tax evasion or other criminal conduct that produced a benefit, now must report their suspicions to the authorities (since these entail suspicions of money laundering). In most circumstances it would be an offence, "tipping-off", for the reporter to inform the subject of his report that a report has been made.</span><sup class="reference" data-dcnode-id="7089" id="cite_ref-116"><a data-dcnode-id="7090" href="#cite_note-116"><span data-dcnode-id="7091" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7088" instrument_node=""> These provisions do not however require disclosure to the authorities of information received by certain professionals in privileged circumstances or where the information is subject to </span><a data-dcnode-id="7086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_professional_privilege" title="Legal professional privilege"><span data-dcnode-id="7087" instrument_node="">legal professional privilege</span></a><span data-dcnode-id="7085" instrument_node="">. Others that are subject to these regulations include financial institutions, credit institutions, estate agents (which includes chartered surveyors), trust and company service providers, high value dealers (who accept cash equivalent to €15,000 or more for goods sold), and casinos.
</span></p><p data-dcnode-id="7074"><span data-dcnode-id="7083" instrument_node="">Professional guidance (which is submitted to and approved by the UK Treasury) is provided by industry groups including the Joint Money Laundering Steering Group,</span><sup class="reference" data-dcnode-id="7080" id="cite_ref-JMLSG1_117-0"><a data-dcnode-id="7081" href="#cite_note-JMLSG1-117"><span data-dcnode-id="7082" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7079" instrument_node=""> the Law Society.</span><sup class="reference" data-dcnode-id="7076" id="cite_ref-LS1_118-0"><a data-dcnode-id="7077" href="#cite_note-LS1-118"><span data-dcnode-id="7078" instrument_node="">[118]</span></a></sup><span data-dcnode-id="7075" instrument_node=""> and the Consultative Committee of Accountancy Bodies (CCAB).
However, there is no obligation on banking institutions to routinely report monetary deposits or transfers above a specified value. Instead reports must be made of all suspicious deposits or transfers, irrespective of their value.
</span></p><p data-dcnode-id="7061"><span data-dcnode-id="7073" instrument_node="">The reporting obligations include reporting suspicious gains from conduct in other countries that would be criminal if it took place in the UK.</span><sup class="reference" data-dcnode-id="7070" id="cite_ref-119"><a data-dcnode-id="7071" href="#cite_note-119"><span data-dcnode-id="7072" instrument_node="">[119]</span></a></sup><span data-dcnode-id="7069" instrument_node=""> Exceptions were later added for certain activities legal where they took place, such as </span><a data-dcnode-id="7067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullfighting" title="Bullfighting"><span data-dcnode-id="7068" instrument_node="">bullfighting</span></a><span data-dcnode-id="7066" instrument_node=""> in Spain.</span><sup class="reference" data-dcnode-id="7063" id="cite_ref-120"><a data-dcnode-id="7064" href="#cite_note-120"><span data-dcnode-id="7065" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7062" instrument_node="">
</span></p><p data-dcnode-id="7051"><span data-dcnode-id="7060" instrument_node="">More than 200,000 reports of suspected money laundering are submitted annually to authorities in the UK (there were 240,582 reports in the year ended 30 September 2010. This was an increase from the 228,834 reports submitted in the previous year).</span><sup class="reference" data-dcnode-id="7057" id="cite_ref-autogenerated1_121-0"><a data-dcnode-id="7058" href="#cite_note-autogenerated1-121"><span data-dcnode-id="7059" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7056" instrument_node=""> Most of these reports are submitted by banks and similar financial institutions (there were 186,897 reports from the banking sector in the year ended 30 September 2010).</span><sup class="reference" data-dcnode-id="7053" id="cite_ref-autogenerated1_121-1"><a data-dcnode-id="7054" href="#cite_note-autogenerated1-121"><span data-dcnode-id="7055" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7052" instrument_node="">
</span></p><p data-dcnode-id="7042"><span data-dcnode-id="7050" instrument_node="">Although 5,108 different organisations submitted </span><a class="mw-redirect" data-dcnode-id="7048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspicious_activity_report_%28banking%29" title="Suspicious activity report (banking)"><span data-dcnode-id="7049" instrument_node="">suspicious activity reports</span></a><span data-dcnode-id="7047" instrument_node=""> to the authorities in the year ended 30 September 2010, just four organisations submitted approximately half of all reports, and the top 20 reporting organisations accounted for three-quarters of all reports.</span><sup class="reference" data-dcnode-id="7044" id="cite_ref-autogenerated1_121-2"><a data-dcnode-id="7045" href="#cite_note-autogenerated1-121"><span data-dcnode-id="7046" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7043" instrument_node="">
</span></p><p data-dcnode-id="7036"><span data-dcnode-id="7041" instrument_node="">The offence of failing to report a suspicion of money laundering by another person carries a maximum penalty of five years' imprisonment.</span><sup class="reference" data-dcnode-id="7038" id="cite_ref-ReferenceC_113-1"><a data-dcnode-id="7039" href="#cite_note-ReferenceC-113"><span data-dcnode-id="7040" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7037" instrument_node="">
</span></p><p data-dcnode-id="7027"><span data-dcnode-id="7035" instrument_node="">The Criminal Finances Act 2017 introduced </span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unexplained_wealth_order" title="Unexplained wealth order"><span data-dcnode-id="7034" instrument_node="">unexplained wealth orders</span></a><span data-dcnode-id="7032" instrument_node="">, another tool to combat money laundering, whereby the owner of an asset greater than £50,000 may be required to show how the purchase was financed.</span><sup class="reference" data-dcnode-id="7029" id="cite_ref-122"><a data-dcnode-id="7030" href="#cite_note-122"><span data-dcnode-id="7031" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7028" instrument_node="">
</span></p><p data-dcnode-id="7006"><span data-dcnode-id="7026" instrument_node="">On 1 May 2018, the UK House of Commons, without opposition,</span><sup class="reference" data-dcnode-id="7023" id="cite_ref-aolmay1_123-0"><a data-dcnode-id="7024" href="#cite_note-aolmay1-123"><span data-dcnode-id="7025" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7022" instrument_node=""> passed the Sanctions and Anti-Money Laundering Bill, which will set out the UK government's intended approach to exceptions and licenses when the nation becomes responsible for implementing its own sanctions and will also require notorious overseas British territory tax havens such as the Cayman Islands and the British Virgin Islands to establish public registers of the beneficial ownership of firms in their jurisdictions by the end of 2020.</span><sup class="reference" data-dcnode-id="7019" id="cite_ref-aolmay1_123-1"><a data-dcnode-id="7020" href="#cite_note-aolmay1-123"><span data-dcnode-id="7021" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="7016" id="cite_ref-124"><a data-dcnode-id="7017" href="#cite_note-124"><span data-dcnode-id="7018" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7015" instrument_node="">  The legislation was passed by the House of Lords on 21 May and received Royal Asset on 23 May.</span><sup class="reference" data-dcnode-id="7012" id="cite_ref-125"><a data-dcnode-id="7013" href="#cite_note-125"><span data-dcnode-id="7014" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7011" instrument_node="">  However, the Act's public register provision is facing legal challenges from local governments in the Cayman Islands and British Virgin Islands, who argue that it violates their Constitutional sovereignty.</span><sup class="reference" data-dcnode-id="7008" id="cite_ref-126"><a data-dcnode-id="7009" href="#cite_note-126"><span data-dcnode-id="7010" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7007" instrument_node="">
</span></p><p data-dcnode-id="7000"><span data-dcnode-id="7005" instrument_node="">Under the Proceeds of Crime Act goods that criminals cannot legally account for are seized and sold at auction to raise funds. This is usually carried out by authorised auction houses and often within the geographical areas of the criminals.</span><sup class="reference" data-dcnode-id="7002" id="cite_ref-127"><a data-dcnode-id="7003" href="#cite_note-127"><span data-dcnode-id="7004" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7001" instrument_node="">
</span></p><span data-dcnode-id="6999" instrument_node="">
</span><h4 data-dcnode-id="6988"><span class="mw-headline" data-dcnode-id="6996" id="Bureaux_de_change"><i data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">Bureaux de change</span></i></span><span class="mw-editsection" data-dcnode-id="6989"><span class="mw-editsection-bracket" data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">[</span></span><a data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D28" title="Edit section: Bureaux de change"><span data-dcnode-id="6993" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6990"><span data-dcnode-id="6991" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6987" instrument_node="">
</span><p data-dcnode-id="6965"><span data-dcnode-id="6986" instrument_node="">All UK </span><i data-dcnode-id="6983"><a data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureau_de_change" title="Bureau de change"><span data-dcnode-id="6985" instrument_node="">Bureaux de change</span></a></i><span data-dcnode-id="6982" instrument_node=""> are registered with </span><a class="mw-redirect" data-dcnode-id="6980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Her_Majesty%2527s_Revenue_and_Customs" title="Her Majesty's Revenue and Customs"><span data-dcnode-id="6981" instrument_node="">Her Majesty's Revenue and Customs</span></a><span data-dcnode-id="6979" instrument_node="">, which issues a trading licence for each location. Bureaux de change and </span><a data-dcnode-id="6977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_transmitter" title="Money transmitter"><span data-dcnode-id="6978" instrument_node="">money transmitters</span></a><span data-dcnode-id="6976" instrument_node="">, such as </span><a data-dcnode-id="6974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Union" title="Western Union"><span data-dcnode-id="6975" instrument_node="">Western Union</span></a><span data-dcnode-id="6973" instrument_node=""> outlets, in the UK fall within the "regulated sector" and are required to comply with the Money Laundering Regulations 2007.</span><sup class="reference" data-dcnode-id="6970" id="cite_ref-MLR2_115-2"><a data-dcnode-id="6971" href="#cite_note-MLR2-115"><span data-dcnode-id="6972" instrument_node="">[115]</span></a></sup><span data-dcnode-id="6969" instrument_node=""> Checks can be carried out by HMRC on all </span><a class="mw-redirect" data-dcnode-id="6967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_Service_Business" title="Money Service Business"><span data-dcnode-id="6968" instrument_node="">Money Service Businesses</span></a><span data-dcnode-id="6966" instrument_node="">.
</span></p><span data-dcnode-id="6964" instrument_node="">
</span><h4 data-dcnode-id="6954"><span class="mw-headline" data-dcnode-id="6962" id="London_Bullion_Market_Association"><span data-dcnode-id="6963" instrument_node="">London Bullion Market Association</span></span><span class="mw-editsection" data-dcnode-id="6955"><span class="mw-editsection-bracket" data-dcnode-id="6960"><span data-dcnode-id="6961" instrument_node="">[</span></span><a data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D29" title="Edit section: London Bullion Market Association"><span data-dcnode-id="6959" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6953" instrument_node="">
</span><p data-dcnode-id="6935"><span data-dcnode-id="6952" instrument_node="">In November 2020, the </span><a data-dcnode-id="6950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_Bullion_Market_Association" title="London Bullion Market Association"><span data-dcnode-id="6951" instrument_node="">London Bullion Market Association</span></a><span data-dcnode-id="6949" instrument_node=""> wrote a letter to a number of countries with huge </span><a data-dcnode-id="6947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold" title="Gold"><span data-dcnode-id="6948" instrument_node="">gold</span></a><span data-dcnode-id="6946" instrument_node=""> markets, including </span><a data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubai" title="Dubai"><span data-dcnode-id="6945" instrument_node="">Dubai</span></a><span data-dcnode-id="6943" instrument_node=""> (United Arab Emirates), China, Singapore, South Africa, Russia, Japan, United States and others, laying out the standards regarding money laundering and other issues like where they sourced their gold. It also threatened that these countries could be blacklisted, if they failed to meet the regulatory standards. This was </span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_bullion_market" title="London bullion market"><span data-dcnode-id="6942" instrument_node="">LBMA</span></a><span data-dcnode-id="6940" instrument_node="">’s first move to challenge the illegal or unethical production and trading of gold.</span><sup class="reference" data-dcnode-id="6937" id="cite_ref-128"><a data-dcnode-id="6938" href="#cite_note-128"><span data-dcnode-id="6939" instrument_node="">[128]</span></a></sup><span data-dcnode-id="6936" instrument_node="">
</span></p><span data-dcnode-id="6934" instrument_node="">
</span><h4 data-dcnode-id="6923"><span data-dcnode-id="6933" id="Ernst_.26_Young_Global_Limited"></span><span class="mw-headline" data-dcnode-id="6931" id="Ernst_&amp;_Young_Global_Limited"><span data-dcnode-id="6932" instrument_node="">Ernst &amp; Young Global Limited</span></span><span class="mw-editsection" data-dcnode-id="6924"><span class="mw-editsection-bracket" data-dcnode-id="6929"><span data-dcnode-id="6930" instrument_node="">[</span></span><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D30" title="Edit section: Ernst &amp; Young Global Limited"><span data-dcnode-id="6928" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6922" instrument_node="">
</span><p data-dcnode-id="6903"><span data-dcnode-id="6921" instrument_node="">A former partner of the UK-based accounting firm </span><a data-dcnode-id="6919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernst_%2526_Young" title="Ernst &amp; Young"><span data-dcnode-id="6920" instrument_node="">Ernst &amp; Young</span></a><span data-dcnode-id="6918" instrument_node="">, Amjad Rihan was ousted after he attempted to report the money laundering and gold smuggling efforts of </span><a data-dcnode-id="6916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubai" title="Dubai"><span data-dcnode-id="6917" instrument_node="">Dubai</span></a><span data-dcnode-id="6915" instrument_node="">-based firm Kaloti Jewellery International. Rihan had claimed that “Kaloti was knowingly dealing in gold bullion smuggled out of Morocco”. However, after he reported the issue, the Dubai government body, </span><a data-dcnode-id="6913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubai_Multi_Commodities_Centre" title="Dubai Multi Commodities Centre"><span data-dcnode-id="6914" instrument_node="">DMCC</span></a><span data-dcnode-id="6912" instrument_node="">, attempted to put unnecessary pressure on him and his firm.</span><sup class="reference" data-dcnode-id="6909" id="cite_ref-129"><a data-dcnode-id="6910" href="#cite_note-129"><span data-dcnode-id="6911" instrument_node="">[129]</span></a></sup><span data-dcnode-id="6908" instrument_node=""> In 2021, Ernst &amp; Young withdrew an eight-year-long legal fight against Rihan asking a compensation of $10.8 million from him.</span><sup class="reference" data-dcnode-id="6905" id="cite_ref-130"><a data-dcnode-id="6906" href="#cite_note-130"><span data-dcnode-id="6907" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6904" instrument_node="">
</span></p><span data-dcnode-id="6902" instrument_node="">
</span><h3 data-dcnode-id="6892"><span class="mw-headline" data-dcnode-id="6900" id="South_Africa"><span data-dcnode-id="6901" instrument_node="">South Africa</span></span><span class="mw-editsection" data-dcnode-id="6893"><span class="mw-editsection-bracket" data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">[</span></span><a data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D31" title="Edit section: South Africa"><span data-dcnode-id="6897" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6891" instrument_node="">
</span><p data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">In South Africa, the Financial Intelligence Centre Act (2001) and subsequent amendments have added responsibilities to the Financial Intelligence Centre (FIC) to combat money laundering.
</span></p><span data-dcnode-id="6888" instrument_node="">
</span><h3 data-dcnode-id="6878"><span class="mw-headline" data-dcnode-id="6886" id="United_Arab_Emirates"><span data-dcnode-id="6887" instrument_node="">United Arab Emirates</span></span><span class="mw-editsection" data-dcnode-id="6879"><span class="mw-editsection-bracket" data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">[</span></span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D32" title="Edit section: United Arab Emirates"><span data-dcnode-id="6883" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6877" instrument_node="">
</span><p data-dcnode-id="6845"><span data-dcnode-id="6876" instrument_node="">The United Arab Emirates has long been known as a hub of illicit financial flows and corruption. A large number business, real estate and financial transactions of the country majorly involve some sort of illegal activity. Moreover, several corrupt and criminal actors from across the world operate through or from the Emirates, including European money launderers, Nigerian kleptocrats, East African gold smugglers, Afghan warlords and others.</span><sup class="reference" data-dcnode-id="6873" id="cite_ref-131"><a data-dcnode-id="6874" href="#cite_note-131"><span data-dcnode-id="6875" instrument_node="">[131]</span></a></sup><span data-dcnode-id="6872" instrument_node=""> Even the royal family members of the UAE are often known to be associated with certain cases of offshore holdings.</span><sup class="reference" data-dcnode-id="6869" id="cite_ref-132"><a data-dcnode-id="6870" href="#cite_note-132"><span data-dcnode-id="6871" instrument_node="">[132]</span></a></sup><span data-dcnode-id="6868" instrument_node=""> However, in 2022, the UAE fell into a risk of being named in the </span><a data-dcnode-id="6866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force" title="Financial Action Task Force"><span data-dcnode-id="6867" instrument_node="">Financial Action Task Force</span></a><span data-dcnode-id="6865" instrument_node=""> (FATF) “grey list”. The list defines nations determined to have “strategic deficiencies” in combating money laundering and terrorist financing.</span><sup class="reference" data-dcnode-id="6862" id="cite_ref-Bloomberg-04-01-2022_133-0"><a data-dcnode-id="6863" href="#cite_note-Bloomberg-04-01-2022-133"><span data-dcnode-id="6864" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6861" instrument_node=""> On 4 March 2022, FATF placed the UAE in its ‘grey’ list of countries that are subject to increased monitoring.</span><sup class="reference" data-dcnode-id="6858" id="cite_ref-134"><a data-dcnode-id="6859" href="#cite_note-134"><span data-dcnode-id="6860" instrument_node="">[134]</span></a></sup><sup class="reference" data-dcnode-id="6855" id="cite_ref-135"><a data-dcnode-id="6856" href="#cite_note-135"><span data-dcnode-id="6857" instrument_node="">[135]</span></a></sup><span data-dcnode-id="6854" instrument_node=""> In April 2020, the Emirates had been warned of its money laundering activities, where FATF called the UAE’s limited prosecutions on the issue a “concern”.</span><sup class="reference" data-dcnode-id="6851" id="cite_ref-136"><a data-dcnode-id="6852" href="#cite_note-136"><span data-dcnode-id="6853" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6850" instrument_node=""> In November 2021, the group received a report from the Emirates, which didn't reach much of the thresholds required for avoid the grey list.</span><sup class="reference" data-dcnode-id="6847" id="cite_ref-Bloomberg-04-01-2022_133-1"><a data-dcnode-id="6848" href="#cite_note-Bloomberg-04-01-2022-133"><span data-dcnode-id="6849" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6846" instrument_node="">
</span></p><p data-dcnode-id="6818"><span data-dcnode-id="6844" instrument_node="">The Irish Department of Housing urged minister </span><a class="mw-redirect" data-dcnode-id="6842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darragh_O%25E2%2580%2599Brien" title="Darragh O’Brien"><span data-dcnode-id="6843" instrument_node="">Darragh O’Brien</span></a><span data-dcnode-id="6841" instrument_node=""> to “ask in the strongest terms for the UAE to account for its relationship to </span><a data-dcnode-id="6839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Kinahan" title="Daniel Kinahan"><span data-dcnode-id="6840" instrument_node="">Daniel Kinahan</span></a><span data-dcnode-id="6838" instrument_node="">” a drug kingpin charged along with his brother, Christopher Kinahan in 2018 by the High Court of controlling and managing the daily drug operations in Ireland. The Kinahan brothers are sons of the Kinahan Cartel founder, </span><a data-dcnode-id="6836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christy_Kinahan" title="Christy Kinahan"><span data-dcnode-id="6837" instrument_node="">Christy Kinahan Senior</span></a><span data-dcnode-id="6835" instrument_node="">, who smuggled drugs and firearms into the </span><a class="mw-redirect" data-dcnode-id="6833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK" title="UK"><span data-dcnode-id="6834" instrument_node="">UK</span></a><span data-dcnode-id="6832" instrument_node="">, Ireland, and mainland Europe for long. For several years, the Kinahan leadership had been residing in Dubai, where Daniel denied his involvement in organized crime by defending himself as a ‘high-profile businessman in the professional boxing industry’. According to Panorama investigation, Daniel has operated in the boxing industry through MTK and simultaneously operated Europe’s biggest money laundering, </span><a class="mw-redirect" data-dcnode-id="6830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_trafficking" title="Drug trafficking"><span data-dcnode-id="6831" instrument_node="">drug trafficking</span></a><span data-dcnode-id="6829" instrument_node="">, and gangland executions networks from Dubai. A spokesperson for minister O’Brien said, “respect for human rights is a cornerstone of Ireland’s foreign policy,” when asked if the minister would raise the concerns regarding Daniel’s presence and operations in Dubai on his visit in March 2022 for </span><a class="mw-redirect" data-dcnode-id="6827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Patrick%25E2%2580%2599s_Day" title="St Patrick’s Day"><span data-dcnode-id="6828" instrument_node="">St Patrick’s Day</span></a><span data-dcnode-id="6826" instrument_node="">.</span><sup class="reference" data-dcnode-id="6823" id="cite_ref-137"><a data-dcnode-id="6824" href="#cite_note-137"><span data-dcnode-id="6825" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="6820" id="cite_ref-138"><a data-dcnode-id="6821" href="#cite_note-138"><span data-dcnode-id="6822" instrument_node="">[138]</span></a></sup><span data-dcnode-id="6819" instrument_node="">
</span></p><span data-dcnode-id="6817" instrument_node="">
</span><h3 data-dcnode-id="6807"><span class="mw-headline" data-dcnode-id="6815" id="United_States"><span data-dcnode-id="6816" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="6808"><span class="mw-editsection-bracket" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">[</span></span><a data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D33" title="Edit section: United States"><span data-dcnode-id="6812" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6806" instrument_node="">
</span><p data-dcnode-id="6797"><span data-dcnode-id="6805" instrument_node="">The approach in the United States to stopping money laundering is usually broken into two areas: preventive (regulatory) measures and criminal measures.</span><sup class="reference" data-dcnode-id="6802" id="cite_ref-139"><a data-dcnode-id="6803" href="#cite_note-139"><span data-dcnode-id="6804" instrument_node="">[139]</span></a></sup><sup class="reference" data-dcnode-id="6799" id="cite_ref-140"><a data-dcnode-id="6800" href="#cite_note-140"><span data-dcnode-id="6801" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6798" instrument_node="">
</span></p><span data-dcnode-id="6796" instrument_node="">
</span><h4 data-dcnode-id="6786"><span class="mw-headline" data-dcnode-id="6794" id="Preventive"><span data-dcnode-id="6795" instrument_node="">Preventive</span></span><span class="mw-editsection" data-dcnode-id="6787"><span class="mw-editsection-bracket" data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">[</span></span><a data-dcnode-id="6790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D34" title="Edit section: Preventive"><span data-dcnode-id="6791" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6788"><span data-dcnode-id="6789" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6785" instrument_node="">
</span><p data-dcnode-id="6754"><span data-dcnode-id="6784" instrument_node="">In an attempt to prevent dirty money from entering the U.S. financial system in the first place, the United States Congress passed a series of laws, starting in 1970, collectively known as the </span><a data-dcnode-id="6782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_Secrecy_Act" title="Bank Secrecy Act"><span data-dcnode-id="6783" instrument_node="">Bank Secrecy Act</span></a><span data-dcnode-id="6781" instrument_node=""> (BSA). These laws, contained in sections 5311 through 5332 of Title 31 of the United States Code, require </span><a data-dcnode-id="6779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_institution" title="Financial institution"><span data-dcnode-id="6780" instrument_node="">financial institutions</span></a><span data-dcnode-id="6778" instrument_node="">, which under the current definition include a broad array of entities, including banks, credit card companies, life insurers, </span><a class="mw-redirect" data-dcnode-id="6776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_service_businesses" title="Money service businesses"><span data-dcnode-id="6777" instrument_node="">money service businesses</span></a><span data-dcnode-id="6775" instrument_node=""> and broker-dealers in securities, to report certain transactions to the </span><a data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_the_Treasury" title="United States Department of the Treasury"><span data-dcnode-id="6774" instrument_node="">United States Department of the Treasury</span></a><span data-dcnode-id="6772" instrument_node="">. Cash transactions in excess of a certain amount must be reported on a </span><a data-dcnode-id="6770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Currency_transaction_report" title="Currency transaction report"><span data-dcnode-id="6771" instrument_node="">currency transaction report</span></a><span data-dcnode-id="6769" instrument_node=""> (CTR), identifying the individual making the transaction as well as the source of the cash. The law originally required all transactions of </span><a class="mw-redirect" data-dcnode-id="6767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USD" title="USD"><span data-dcnode-id="6768" instrument_node="">US$</span></a><span data-dcnode-id="6766" instrument_node="">5,000 or more to be reported, but due to excessively high levels of reporting the threshold was raised to US$10,000.  The U.S. is one of the few countries in the world to require reporting of all cash transactions over a certain limit, although certain businesses can be exempt from the requirement.</span><sup class="reference" data-dcnode-id="6763" id="cite_ref-141"><a data-dcnode-id="6764" href="#cite_note-141"><span data-dcnode-id="6765" instrument_node="">[141]</span></a></sup><span data-dcnode-id="6762" instrument_node=""> Additionally, financial institutions must report transaction on a </span><a class="mw-redirect" data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspicious_Activity_Report" title="Suspicious Activity Report"><span data-dcnode-id="6761" instrument_node="">Suspicious Activity Report</span></a><span data-dcnode-id="6759" instrument_node=""> (SAR) that they deem "suspicious", defined as a knowing or suspecting that the funds come from illegal activity or disguise funds from illegal activity, that it is structured to evade BSA requirements or appears to serve no known business or apparent lawful purpose; or that the institution is being used to facilitate criminal activity. Attempts by customers to circumvent the BSA, generally by structuring cash deposits to amounts lower than US$10,000 by breaking them up and depositing them on different days or at different locations also violates the law.</span><sup class="reference" data-dcnode-id="6756" id="cite_ref-fincen_142-0"><a data-dcnode-id="6757" href="#cite_note-fincen-142"><span data-dcnode-id="6758" instrument_node="">[142]</span></a></sup><span data-dcnode-id="6755" instrument_node="">
</span></p><p data-dcnode-id="6745"><span data-dcnode-id="6753" instrument_node="">The financial database created by these reports is administered by the U.S.'s Financial Intelligence Unit (FIU), called the </span><a data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Crimes_Enforcement_Network" title="Financial Crimes Enforcement Network"><span data-dcnode-id="6752" instrument_node="">Financial Crimes Enforcement Network</span></a><span data-dcnode-id="6750" instrument_node=""> (FinCEN), located in Vienna, Virginia. The reports are made available to U.S. criminal investigators, as well as other FIU's around the globe, and FinCEN conducts computer assisted analyses of these reports to determine trends and refer investigations.</span><sup class="reference" data-dcnode-id="6747" id="cite_ref-FinCEN_Mission_143-0"><a data-dcnode-id="6748" href="#cite_note-FinCEN_Mission-143"><span data-dcnode-id="6749" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6746" instrument_node="">
</span></p><p data-dcnode-id="6736"><span data-dcnode-id="6744" instrument_node="">The BSA requires financial institutions to engage in customer due diligence, or KYC, which is sometimes known in parlance as know your customer. It includes obtaining satisfactory identification to assure that the account is in the customer's actual name and understanding the expected nature and source of the money that flows through the customer's accounts. Other customers, such as those with private banking accounts and those of foreign government officials, are subjected to enhanced due diligence because the law deems that those accounts are at a higher risk for money laundering. All accounts are subject to ongoing monitoring, in which internal bank software scrutinizes transactions and flags for manual inspection those that fall outside specific parameters. If a manual inspection reveals that the transaction is suspicious, the institution should file a </span><a class="mw-redirect" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspicious_Activity_Report" title="Suspicious Activity Report"><span data-dcnode-id="6743" instrument_node="">Suspicious Activity Report</span></a><span data-dcnode-id="6741" instrument_node="">.</span><sup class="reference" data-dcnode-id="6738" id="cite_ref-roth_monograph_144-0"><a data-dcnode-id="6739" href="#cite_note-roth_monograph-144"><span data-dcnode-id="6740" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6737" instrument_node="">
</span></p><p data-dcnode-id="6721"><span data-dcnode-id="6735" instrument_node="">The regulators of the industries involved are responsible to ensure that the financial institutions comply with the BSA. For example, the </span><a data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Reserve" title="Federal Reserve"><span data-dcnode-id="6734" instrument_node="">Federal Reserve</span></a><span data-dcnode-id="6732" instrument_node=""> and the </span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_the_Comptroller_of_the_Currency" title="Office of the Comptroller of the Currency"><span data-dcnode-id="6731" instrument_node="">Office of the Comptroller of the Currency</span></a><span data-dcnode-id="6729" instrument_node=""> regularly inspect banks, and may impose civil fines or refer matters for criminal prosecution for non-compliance. A number of banks have been fined and prosecuted for failure to comply with the BSA. Most famously, </span><a data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Riggs_Bank" title="Riggs Bank"><span data-dcnode-id="6728" instrument_node="">Riggs Bank</span></a><span data-dcnode-id="6726" instrument_node="">, in Washington D.C., was prosecuted and functionally driven out of business as a result of its failure to apply proper money laundering controls, particularly as it related to foreign political figures.</span><sup class="reference" data-dcnode-id="6723" id="cite_ref-Joseph_USAB_145-0"><a data-dcnode-id="6724" href="#cite_note-Joseph_USAB-145"><span data-dcnode-id="6725" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6722" instrument_node="">
</span></p><p data-dcnode-id="6711"><span data-dcnode-id="6720" instrument_node="">In addition to the BSA, the U.S. imposes controls on the movement of currency across its borders, requiring individuals to report the transportation of cash in excess of US$10,000 on a form called Report of International Transportation of Currency or Monetary Instruments (known as a CMIR).</span><sup class="reference" data-dcnode-id="6717" id="cite_ref-CMIR_146-0"><a data-dcnode-id="6718" href="#cite_note-CMIR-146"><span data-dcnode-id="6719" instrument_node="">[146]</span></a></sup><span data-dcnode-id="6716" instrument_node=""> Likewise, businesses, such as automobile dealerships, that receive cash in excess of US$10,000 must file a Form 8300 with the Internal Revenue Service, identifying the source of the cash.</span><sup class="reference" data-dcnode-id="6713" id="cite_ref-147"><a data-dcnode-id="6714" href="#cite_note-147"><span data-dcnode-id="6715" instrument_node="">[147]</span></a></sup><span data-dcnode-id="6712" instrument_node="">
</span></p><p data-dcnode-id="6695"><span data-dcnode-id="6710" instrument_node="">On 1 September 2010, the </span><a data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Crimes_Enforcement_Network" title="Financial Crimes Enforcement Network"><span data-dcnode-id="6709" instrument_node="">Financial Crimes Enforcement Network</span></a><span data-dcnode-id="6707" instrument_node=""> issued an advisory on "</span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Informal_value_transfer_system" title="Informal value transfer system"><span data-dcnode-id="6706" instrument_node="">informal value transfer systems</span></a><span data-dcnode-id="6704" instrument_node="">" referencing </span><i data-dcnode-id="6701"><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_v._Banki" title="United States v. Banki"><span data-dcnode-id="6703" instrument_node="">United States v. Banki</span></a></i><span data-dcnode-id="6700" instrument_node="">.</span><sup class="reference" data-dcnode-id="6697" id="cite_ref-148"><a data-dcnode-id="6698" href="#cite_note-148"><span data-dcnode-id="6699" instrument_node="">[148]</span></a></sup><span data-dcnode-id="6696" instrument_node="">
</span></p><p data-dcnode-id="6681"><span data-dcnode-id="6694" instrument_node="">In the United States, there are perceived consequences of anti-money laundering (AML) regulations. These </span><a data-dcnode-id="6692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unintended_consequences" title="Unintended consequences"><span data-dcnode-id="6693" instrument_node="">unintended consequences</span></a><sup class="reference" data-dcnode-id="6689" id="cite_ref-149"><a data-dcnode-id="6690" href="#cite_note-149"><span data-dcnode-id="6691" instrument_node="">[149]</span></a></sup><span data-dcnode-id="6688" instrument_node=""> include FinCEN's publishing of a list of "risky businesses", which many believe unfairly targeted money service businesses. The publishing of this list and the subsequent fall-out, banks indiscriminately </span><a class="new" data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDe-risking%26action%3Dedit%26redlink%3D1" title="De-risking (page does not exist)"><span data-dcnode-id="6687" instrument_node="">de-risking</span></a><span data-dcnode-id="6685" instrument_node=""> MSBs, is referred to as </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Choke_Point" title="Operation Choke Point"><span data-dcnode-id="6684" instrument_node="">Operation Choke Point</span></a><span data-dcnode-id="6682" instrument_node="">. The Financial Crimes Enforcement Network issued a Geographic Targeting Order to combat against illegal money laundering in the United States. This means that title insurance companies in the U.S. are required to identify the natural persons behind companies that pay all cash in residential real estate purchases over a particular amount in certain U.S. cities.
</span></p><span data-dcnode-id="6680" instrument_node="">
</span><h4 data-dcnode-id="6670"><span class="mw-headline" data-dcnode-id="6678" id="Criminal_sanctions"><span data-dcnode-id="6679" instrument_node="">Criminal sanctions</span></span><span class="mw-editsection" data-dcnode-id="6671"><span class="mw-editsection-bracket" data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">[</span></span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D35" title="Edit section: Criminal sanctions"><span data-dcnode-id="6675" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6669" instrument_node="">
</span><p data-dcnode-id="6656"><span data-dcnode-id="6668" instrument_node="">Money laundering has been criminalized in the United States since the </span><a data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_Laundering_Control_Act" title="Money Laundering Control Act"><span data-dcnode-id="6667" instrument_node="">Money Laundering Control Act</span></a><span data-dcnode-id="6665" instrument_node=""> of 1986. The law, contained at section 1956 of Title 18 of the United States Code, prohibits individuals from engaging in a financial transaction with proceeds that were generated from certain specific crimes, known as "specified unlawful activities" (SUAs). The law requires that an individual specifically intend in making the transaction to conceal the source, ownership or control of the funds. There is no minimum threshold of money, and no requirement that the transaction succeeded in actually disguising the money. A "financial transaction" has been broadly defined, and need not involve a financial institution, or even a business. Merely passing money from one person to another, with the intent to disguise the source, ownership, location or control of the money, has been deemed a financial transaction under the law. The possession of money without either a financial transaction or an intent to conceal is not a crime in the United States.</span><sup class="reference" data-dcnode-id="6662" id="cite_ref-Cassella_USAB_150-0"><a data-dcnode-id="6663" href="#cite_note-Cassella_USAB-150"><span data-dcnode-id="6664" instrument_node="">[150]</span></a></sup><span data-dcnode-id="6661" instrument_node=""> Besides money laundering, the law contained in section 1957 of Title 18 of the United States Code, prohibits spending more than US$10,000 derived from an SUA, regardless of whether the individual wishes to disguise it. It carries a lesser penalty than money laundering, and unlike the money laundering statute, requires that the money pass through a financial institution.</span><sup class="reference" data-dcnode-id="6658" id="cite_ref-Cassella_USAB_150-1"><a data-dcnode-id="6659" href="#cite_note-Cassella_USAB-150"><span data-dcnode-id="6660" instrument_node="">[150]</span></a></sup><span data-dcnode-id="6657" instrument_node="">
</span></p><p data-dcnode-id="6622"><span data-dcnode-id="6655" instrument_node="">According to the records compiled by the United States Sentencing Commission, in 2009, the United States Department of Justice typically convicted a little over 81,000 people; of this, approximately 800 are convicted of money laundering as the primary or most serious charge.</span><sup class="reference" data-dcnode-id="6652" id="cite_ref-USSC_151-0"><a data-dcnode-id="6653" href="#cite_note-USSC-151"><span data-dcnode-id="6654" instrument_node="">[151]</span></a></sup><span data-dcnode-id="6651" instrument_node="">
The </span><a class="mw-redirect" data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Drug_Abuse_Act" title="Anti-Drug Abuse Act"><span data-dcnode-id="6650" instrument_node="">Anti-Drug Abuse Act</span></a><span data-dcnode-id="6648" instrument_node=""> of 1988 expanded the definition of financial institution to include businesses such as car dealers and real estate closing personnel and required them to file reports on large currency transaction. It required verification of identity of those who purchase monetary instruments over $3,000. The </span><a class="mw-redirect" data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annunzio-Wylie_Anti-Money_Laundering_Act" title="Annunzio-Wylie Anti-Money Laundering Act"><span data-dcnode-id="6647" instrument_node="">Annunzio-Wylie Anti-Money Laundering Act</span></a><span data-dcnode-id="6645" instrument_node=""> of 1992 strengthened sanctions for BSA violations, required so called "Suspicious Activity Reports" and eliminated previously used "</span><a class="new" data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriminal_Referral%26action%3Dedit%26redlink%3D1" title="Criminal Referral (page does not exist)"><span data-dcnode-id="6644" instrument_node="">Criminal Referral</span></a><span data-dcnode-id="6642" instrument_node=""> Forms", required verification and recordkeeping for wire transfers and established the </span><a class="new" data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBank_Secrecy_Act_Advisory_Group%26action%3Dedit%26redlink%3D1" title="Bank Secrecy Act Advisory Group (page does not exist)"><span data-dcnode-id="6641" instrument_node="">Bank Secrecy Act Advisory Group</span></a><span data-dcnode-id="6639" instrument_node=""> (BSAAG). The </span><a class="new" data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_Laundering_Suppression_Act%26action%3Dedit%26redlink%3D1" title="Money Laundering Suppression Act (page does not exist)"><span data-dcnode-id="6638" instrument_node="">Money Laundering Suppression Act</span></a><span data-dcnode-id="6636" instrument_node=""> from 1994 required banking agencies to review and enhance training, develop anti-money laundering examination procedures, review and enhance procedures for referring cases to law enforcement agencies, streamlined the </span><a data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Currency_transaction_report" title="Currency transaction report"><span data-dcnode-id="6635" instrument_node="">currency transaction report</span></a><span data-dcnode-id="6633" instrument_node=""> exemption process, required each </span><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_services_business" title="Money services business"><span data-dcnode-id="6632" instrument_node="">money services business</span></a><span data-dcnode-id="6630" instrument_node=""> (MSB) to be registered by an owner or controlling person, required every MSB to maintain a list of businesses authorized to act as agents in connection with the financial services offered by the MSB, made operating an unregistered MSB a federal crime, and recommended that states adopt uniform laws applicable to MSBs. The </span><a class="new" data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_Laundering_and_Financial_Crimes_Strategy_Act%26action%3Dedit%26redlink%3D1" title="Money Laundering and Financial Crimes Strategy Act (page does not exist)"><span data-dcnode-id="6629" instrument_node="">Money Laundering and Financial Crimes Strategy Act</span></a><span data-dcnode-id="6627" instrument_node=""> of 1998 required banking agencies to develop anti-money laundering training for examiners, required the Department of the Treasury and other agencies to develop a "National Money Laundering Strategy", created the "High Intensity Money Laundering and Related Financial Crime Area" (HIFCA) Task Forces to concentrate law enforcement efforts at the federal, state and local levels in zones where money laundering is prevalent. HIFCA zones may be defined geographically or can be created to address money laundering in an industry sector, a financial institution, or group of financial institutions.</span><sup class="reference" data-dcnode-id="6624" id="cite_ref-hicfa_152-0"><a data-dcnode-id="6625" href="#cite_note-hicfa-152"><span data-dcnode-id="6626" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6623" instrument_node="">
</span></p><p data-dcnode-id="6614"><span data-dcnode-id="6621" instrument_node="">The </span><a class="new" data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIntelligence_Reform_%2526_Terrorism_Prevention_Act%26action%3Dedit%26redlink%3D1" title="Intelligence Reform &amp; Terrorism Prevention Act (page does not exist)"><span data-dcnode-id="6620" instrument_node="">Intelligence Reform &amp; Terrorism Prevention Act</span></a><span data-dcnode-id="6618" instrument_node=""> of 2004 amended the Bank Secrecy Act to require the </span><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Secretary_of_the_Treasury" title="United States Secretary of the Treasury"><span data-dcnode-id="6617" instrument_node="">Secretary of the Treasury</span></a><span data-dcnode-id="6615" instrument_node=""> to prescribe regulations requiring certain financial institutions to report cross-border electronic transmittals of funds, if the Secretary determines that reporting is "reasonably necessary" in "anti-money laundering /combatting financing of terrorists (Anti-Money Laundering/Combating the Financing of Terrorism AML/CFT)."
</span></p><span data-dcnode-id="6613" instrument_node="">
</span><h2 data-dcnode-id="6603"><span class="mw-headline" data-dcnode-id="6611" id="Notable_cases"><span data-dcnode-id="6612" instrument_node="">Notable cases</span></span><span class="mw-editsection" data-dcnode-id="6604"><span class="mw-editsection-bracket" data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">[</span></span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D36" title="Edit section: Notable cases"><span data-dcnode-id="6608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6602" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6587"><div class="thumbinner" data-dcnode-id="6588" style="width:222px;"><a class="image" data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1998_Senate_Investigation_Contribution_Money_Laundering.pdf"><img alt="" class="thumbimage" data-dcnode-id="6601" data-file-height="1650" data-file-width="1275" decoding="async" height="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/1998_Senate_Investigation_Contribution_Money_Laundering.pdf/page1-220px-1998_Senate_Investigation_Contribution_Money_Laundering.pdf.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/1998_Senate_Investigation_Contribution_Money_Laundering.pdf/page1-330px-1998_Senate_Investigation_Contribution_Money_Laundering.pdf.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e6/1998_Senate_Investigation_Contribution_Money_Laundering.pdf/page1-440px-1998_Senate_Investigation_Contribution_Money_Laundering.pdf.jpg 2x" width="220"></a><span data-dcnode-id="6599" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6589"><div class="magnify" data-dcnode-id="6597"><a class="internal" data-dcnode-id="6598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1998_Senate_Investigation_Contribution_Money_Laundering.pdf" title="Enlarge"></a></div><span data-dcnode-id="6596" instrument_node="">1998 investigation, </span><a data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="6595" instrument_node="">United States Senate</span></a><span data-dcnode-id="6593" instrument_node="">, Contribution Laundering/Third-Party Transfers. Includes investigation of </span><a data-dcnode-id="6591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gandhi_Memorial_International_Foundation" title="Gandhi Memorial International Foundation"><span data-dcnode-id="6592" instrument_node="">Gandhi Memorial International Foundation</span></a><span data-dcnode-id="6590" instrument_node="">.</span></div></div></div><span data-dcnode-id="6586" instrument_node="">
</span><ul data-dcnode-id="6280"><li data-dcnode-id="6579"><a data-dcnode-id="6584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Credit_and_Commerce_International" title="Bank of Credit and Commerce International"><span data-dcnode-id="6585" instrument_node="">Bank of Credit and Commerce International</span></a><span data-dcnode-id="6583" instrument_node="">: Unknown amount, estimated in billions, of criminal proceeds, including drug trafficking money, laundered during the mid-1980s.</span><sup class="reference" data-dcnode-id="6580" id="cite_ref-BCCI_153-0"><a data-dcnode-id="6581" href="#cite_note-BCCI-153"><span data-dcnode-id="6582" instrument_node="">[153]</span></a></sup></li><span data-dcnode-id="6578" instrument_node="">
