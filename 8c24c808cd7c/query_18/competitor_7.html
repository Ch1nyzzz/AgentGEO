</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="8043" role="presentation"><tbody data-dcnode-id="8044"><tr data-dcnode-id="8045"><td class="mbox-image" data-dcnode-id="8082"><div data-dcnode-id="8083" style="width:52px"><a class="image" data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="8085" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="8046"><div class="mbox-text-span" data-dcnode-id="8047"><span data-dcnode-id="8081" instrument_node="">This section </span><b data-dcnode-id="8074"><span data-dcnode-id="8080" instrument_node="">does not </span><a data-dcnode-id="8078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="8079" instrument_node="">cite</span></a><span data-dcnode-id="8077" instrument_node=""> any </span><a data-dcnode-id="8075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="8076" instrument_node="">sources</span></a></b><span data-dcnode-id="8073" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="8062"><span data-dcnode-id="8072" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="8070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit"><span data-dcnode-id="8071" instrument_node="">improve this section</span></a><span data-dcnode-id="8069" instrument_node=""> by </span><a data-dcnode-id="8067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="8068" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="8066" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="8064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="8065" instrument_node="">removed</span></a><span data-dcnode-id="8063" instrument_node="">.</span></span><span data-dcnode-id="8061" instrument_node=""> </span><span class="date-container" data-dcnode-id="8055"><i data-dcnode-id="8056"><span data-dcnode-id="8060" instrument_node="">(</span><span class="date" data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">May 2018</span></span><span data-dcnode-id="8057" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="8048"><i data-dcnode-id="8049"><span data-dcnode-id="8054" instrument_node=""> (</span><small data-dcnode-id="8051"><a data-dcnode-id="8052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="8053" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="8050" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="8042" instrument_node="">
</span><p data-dcnode-id="8034"><span data-dcnode-id="8041" instrument_node="">The elements of the crime of money laundering are set forth in the </span><a data-dcnode-id="8039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Convention_Against_Illicit_Traffic_in_Narcotic_Drugs_and_Psychotropic_Substances" title="United Nations Convention Against Illicit Traffic in Narcotic Drugs and Psychotropic Substances"><span data-dcnode-id="8040" instrument_node="">United Nations Convention Against Illicit Traffic in Narcotic Drugs and Psychotropic Substances</span></a><span data-dcnode-id="8038" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_against_Transnational_Organized_Crime" title="Convention against Transnational Organized Crime"><span data-dcnode-id="8037" instrument_node="">Convention against Transnational Organized Crime</span></a><span data-dcnode-id="8035" instrument_node="">. It is defined as knowingly engaging in a financial transaction with the proceeds of a crime for the purpose of concealing or disguising the illicit origin of the property from governments.
</span></p><span data-dcnode-id="8033" instrument_node="">
</span><h3 data-dcnode-id="8023"><span class="mw-headline" data-dcnode-id="8031" id="Role_of_financial_institutions"><span data-dcnode-id="8032" instrument_node="">Role of financial institutions</span></span><span class="mw-editsection" data-dcnode-id="8024"><span class="mw-editsection-bracket" data-dcnode-id="8029"><span data-dcnode-id="8030" instrument_node="">[</span></span><a data-dcnode-id="8027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D11" title="Edit section: Role of financial institutions"><span data-dcnode-id="8028" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8025"><span data-dcnode-id="8026" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8022" instrument_node="">
</span><p data-dcnode-id="8006"><span data-dcnode-id="8021" instrument_node="">While banks operating in the same country generally have to follow the same anti-money laundering laws and regulations, financial institutions all structure their anti-money laundering efforts slightly differently.</span><sup class="reference" data-dcnode-id="8018" id="cite_ref-50"><a data-dcnode-id="8019" href="#cite_note-50"><span data-dcnode-id="8020" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8017" instrument_node=""> Today, most financial institutions globally, and many non-financial institutions, are required to identify and </span><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspicious_activity_report" title="Suspicious activity report"><span data-dcnode-id="8016" instrument_node="">report transactions of a suspicious nature</span></a><span data-dcnode-id="8014" instrument_node=""> to the financial intelligence unit in the respective country. For example, a bank must verify a customer's identity and, if necessary, monitor transactions for suspicious activity. This process comes under "</span><a data-dcnode-id="8012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Know_your_customer" title="Know your customer"><span data-dcnode-id="8013" instrument_node="">know your customer</span></a><span data-dcnode-id="8011" instrument_node="">" measures, which means knowing the identity of the customer and understanding the kinds of transactions in which the customer is likely to engage. By knowing one's customers, financial institutions can often identify unusual or suspicious behaviour, termed anomalies, which may be an indication of money laundering.</span><sup class="reference" data-dcnode-id="8008" id="cite_ref-51"><a data-dcnode-id="8009" href="#cite_note-51"><span data-dcnode-id="8010" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8007" instrument_node="">
</span></p><p data-dcnode-id="8001"><span data-dcnode-id="8005" instrument_node="">Bank employees, such as tellers and customer account representatives, are trained in anti-money laundering and are instructed to report activities that they deem suspicious. Additionally, </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-money_laundering_software" title="Anti-money laundering software"><span data-dcnode-id="8004" instrument_node="">anti-money laundering software</span></a><span data-dcnode-id="8002" instrument_node=""> filters customer data, classifies it according to level of suspicion, and inspects it for anomalies. Such anomalies include any sudden and substantial increase in funds, a large withdrawal, or moving money to a bank secrecy jurisdiction. Smaller transactions that meet certain criteria may also be flagged as suspicious. For example, structuring can lead to flagged transactions. The software also flags names on government "blacklists" and transactions that involve countries hostile to the host nation. Once the software has mined data and flagged suspect transactions, it alerts bank management, who must then determine whether to file a report with the government.
</span></p><span data-dcnode-id="8000" instrument_node="">
</span><h3 data-dcnode-id="7990"><span class="mw-headline" data-dcnode-id="7998" id="Enforcement_costs_and_associated_privacy_concerns"><span data-dcnode-id="7999" instrument_node="">Enforcement costs and associated privacy concerns</span></span><span class="mw-editsection" data-dcnode-id="7991"><span class="mw-editsection-bracket" data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">[</span></span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D12" title="Edit section: Enforcement costs and associated privacy concerns"><span data-dcnode-id="7995" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7989" instrument_node="">
</span><p data-dcnode-id="7968"><span data-dcnode-id="7988" instrument_node="">The financial services industry has become more vocal about the rising costs of anti-money laundering regulation and the limited benefits that they claim it brings.</span><sup class="reference" data-dcnode-id="7985" id="cite_ref-WSJ_52-0"><a data-dcnode-id="7986" href="#cite_note-WSJ-52"><span data-dcnode-id="7987" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7984" instrument_node=""> One commentator wrote that "[w]ithout facts, [anti-money laundering] legislation has been driven on rhetoric, driving by ill-guided activism responding to the need to be "seen to be doing something" rather than by an objective understanding of its effects on </span><a data-dcnode-id="7982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Predicate_crime" title="Predicate crime"><span data-dcnode-id="7983" instrument_node="">predicate crime</span></a><span data-dcnode-id="7981" instrument_node="">. The social panic approach is justified by the language used—we talk of the battle against terrorism or the war on drugs".</span><sup class="reference" data-dcnode-id="7978" id="cite_ref-53"><a data-dcnode-id="7979" href="#cite_note-53"><span data-dcnode-id="7980" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7977" instrument_node=""> </span><i data-dcnode-id="7974"><a data-dcnode-id="7975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Economist" title="The Economist"><span data-dcnode-id="7976" instrument_node="">The Economist</span></a></i><span data-dcnode-id="7973" instrument_node=""> magazine has become increasingly vocal in its criticism of such regulation, particularly with reference to countering terrorist financing, referring to it as a "costly failure", although it concedes that other efforts (like reducing identity and credit card fraud) may still be effective at combating money laundering.</span><sup class="reference" data-dcnode-id="7970" id="cite_ref-economist_54-0"><a data-dcnode-id="7971" href="#cite_note-economist-54"><span data-dcnode-id="7972" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7969" instrument_node="">
</span></p><p data-dcnode-id="7947"><span data-dcnode-id="7967" instrument_node="">There is no precise measurement of the costs of regulation balanced against the harms associated with money laundering,</span><sup class="reference" data-dcnode-id="7964" id="cite_ref-Levi_55-0"><a data-dcnode-id="7965" href="#cite_note-Levi-55"><span data-dcnode-id="7966" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7963" instrument_node=""> and given the evaluation problems involved in assessing such an issue, it is unlikely that the effectiveness of terror finance and money laundering laws could be determined with any degree of accuracy.</span><sup class="reference" data-dcnode-id="7960" id="cite_ref-Levi_terrorism_56-0"><a data-dcnode-id="7961" href="#cite_note-Levi_terrorism-56"><span data-dcnode-id="7962" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7959" instrument_node=""> </span><i data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">The Economist</span></i><span data-dcnode-id="7956" instrument_node=""> estimated the annual costs of anti-money laundering efforts in Europe and North America at US$5 billion in 2003, an increase from US$700 million in 2000.</span><sup class="reference" data-dcnode-id="7953" id="cite_ref-57"><a data-dcnode-id="7954" href="#cite_note-57"><span data-dcnode-id="7955" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7952" instrument_node=""> Government-linked economists have noted the significant negative effects of money laundering on economic development, including undermining domestic capital formation, depressing growth, and diverting capital away from development.</span><sup class="reference" data-dcnode-id="7949" id="cite_ref-Bartlett_58-0"><a data-dcnode-id="7950" href="#cite_note-Bartlett-58"><span data-dcnode-id="7951" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7948" instrument_node=""> Because of the intrinsic uncertainties of the amount of money laundered, changes in the amount of money laundered, and the cost of anti-money laundering systems, it is almost impossible to tell which anti-money laundering systems work and which are more or less cost effective.
</span></p><p data-dcnode-id="7927"><span data-dcnode-id="7946" instrument_node="">Besides economic costs to implement anti-money-laundering laws, improper attention to </span><a data-dcnode-id="7944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_privacy" title="Information privacy"><span data-dcnode-id="7945" instrument_node="">data protection</span></a><span data-dcnode-id="7943" instrument_node=""> practices may entail disproportionate costs to individual privacy rights. In June 2011, the data-protection advisory committee to the European Union issued a report on data protection issues related to the prevention of money laundering and terrorist financing, which identified numerous transgressions against the established legal framework on privacy and data protection.</span><sup class="reference" data-dcnode-id="7940" id="cite_ref-59"><a data-dcnode-id="7941" href="#cite_note-59"><span data-dcnode-id="7942" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7939" instrument_node=""> The report made recommendations on how to address money laundering and terrorist financing in ways that safeguard personal privacy rights and data protection laws.</span><sup class="reference" data-dcnode-id="7936" id="cite_ref-60"><a data-dcnode-id="7937" href="#cite_note-60"><span data-dcnode-id="7938" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7935" instrument_node=""> In the United States, groups such as the </span><a data-dcnode-id="7933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_Liberties_Union" title="American Civil Liberties Union"><span data-dcnode-id="7934" instrument_node="">American Civil Liberties Union</span></a><span data-dcnode-id="7932" instrument_node=""> have expressed concern that money laundering rules require banks to report on their own customers, essentially conscripting private businesses "into agents of the surveillance state".</span><sup class="reference" data-dcnode-id="7929" id="cite_ref-61"><a data-dcnode-id="7930" href="#cite_note-61"><span data-dcnode-id="7931" instrument_node="">[61]</span></a></sup><span data-dcnode-id="7928" instrument_node="">
</span></p><p data-dcnode-id="7909"><span data-dcnode-id="7926" instrument_node="">Many countries are obligated by various international instruments and standards, such as the 1988 </span><a data-dcnode-id="7924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Convention_Against_Illicit_Traffic_in_Narcotic_Drugs_and_Psychotropic_Substances" title="United Nations Convention Against Illicit Traffic in Narcotic Drugs and Psychotropic Substances"><span data-dcnode-id="7925" instrument_node="">United Nations Convention Against Illicit Traffic in Narcotic Drugs and Psychotropic Substances</span></a><span data-dcnode-id="7923" instrument_node="">, the 2000 </span><a class="mw-redirect" data-dcnode-id="7921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_against_Transnational_Organized_Crime" title="Convention against Transnational Organized Crime"><span data-dcnode-id="7922" instrument_node="">Convention against Transnational Organized Crime</span></a><span data-dcnode-id="7920" instrument_node="">, the 2003 </span><a class="mw-redirect" data-dcnode-id="7918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Convention_against_Corruption" title="United Nations Convention against Corruption"><span data-dcnode-id="7919" instrument_node="">United Nations Convention against Corruption</span></a><span data-dcnode-id="7917" instrument_node="">, and the recommendations of the 1989 </span><a class="mw-redirect" data-dcnode-id="7915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force_on_Money_Laundering" title="Financial Action Task Force on Money Laundering"><span data-dcnode-id="7916" instrument_node="">Financial Action Task Force on Money Laundering</span></a><span data-dcnode-id="7914" instrument_node=""> (FATF) to enact and enforce money laundering laws in an effort to stop narcotics trafficking, international organized crime, and corruption. Mexico, which has faced a significant increase in violent crime, established anti-money laundering controls in 2013 to curb the underlying crime issue.</span><sup class="reference" data-dcnode-id="7911" id="cite_ref-Mallen_62-0"><a data-dcnode-id="7912" href="#cite_note-Mallen-62"><span data-dcnode-id="7913" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7910" instrument_node="">
</span></p><span data-dcnode-id="7908" instrument_node="">
</span><h3 data-dcnode-id="7898"><span class="mw-headline" data-dcnode-id="7906" id="Global_organizations"><span data-dcnode-id="7907" instrument_node="">Global organizations</span></span><span class="mw-editsection" data-dcnode-id="7899"><span class="mw-editsection-bracket" data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">[</span></span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D13" title="Edit section: Global organizations"><span data-dcnode-id="7903" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7900"><span data-dcnode-id="7901" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7897" instrument_node="">
</span><p data-dcnode-id="7874"><span data-dcnode-id="7896" instrument_node="">Formed in 1989 by the </span><a class="mw-redirect" data-dcnode-id="7894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G7" title="G7"><span data-dcnode-id="7895" instrument_node="">G7</span></a><span data-dcnode-id="7893" instrument_node=""> countries, the </span><a class="mw-redirect" data-dcnode-id="7891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Action_Task_Force_on_Money_Laundering" title="Financial Action Task Force on Money Laundering"><span data-dcnode-id="7892" instrument_node="">Financial Action Task Force on Money Laundering</span></a><span data-dcnode-id="7890" instrument_node=""> (FATF) is an intergovernmental body whose purpose is to develop and promote an international response to combat money laundering. The FATF Secretariat is housed at the headquarters of the </span><a data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OECD" title="OECD"><span data-dcnode-id="7889" instrument_node="">OECD</span></a><span data-dcnode-id="7887" instrument_node=""> in Paris. In October 2001, FATF expanded its mission to include combating the financing of terrorism. FATF is a policy-making body that brings together legal, financial, and law enforcement experts to achieve national legislation and regulatory AML and CFT reforms. As of 2014</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="7884" style="display:none;"><a class="external text" data-dcnode-id="7885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit"><span data-dcnode-id="7886" instrument_node="">[update]</span></a></sup><span data-dcnode-id="7883" instrument_node=""> its membership consists of 36 countries and territories and two regional organizations.  FATF works in collaboration with a number of international bodies and organizations.</span><sup class="reference" data-dcnode-id="7880" id="cite_ref-63"><a data-dcnode-id="7881" href="#cite_note-63"><span data-dcnode-id="7882" instrument_node="">[63]</span></a></sup><span data-dcnode-id="7879" instrument_node=""> These entities have observer status with FATF, which does not entitle them to vote, but permits them full participation in plenary sessions and working groups.</span><sup class="reference" data-dcnode-id="7876" id="cite_ref-FATF_member_FAQ_64-0"><a data-dcnode-id="7877" href="#cite_note-FATF_member_FAQ-64"><span data-dcnode-id="7878" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7875" instrument_node="">
</span></p><p data-dcnode-id="7865"><span data-dcnode-id="7873" instrument_node="">FATF has developed 40 recommendations on money laundering and 9 special recommendations regarding terrorist financing. FATF assesses each member country against these recommendations in published reports. Countries seen as not being sufficiently compliant with such recommendations are subjected to financial sanctions.</span><sup class="reference" data-dcnode-id="7870" id="cite_ref-65"><a data-dcnode-id="7871" href="#cite_note-65"><span data-dcnode-id="7872" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="7867" id="cite_ref-66"><a data-dcnode-id="7868" href="#cite_note-66"><span data-dcnode-id="7869" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7866" instrument_node="">
</span></p><p data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">FATF's three primary functions with regard to money laundering are:
</span></p><span data-dcnode-id="7862" instrument_node="">
</span><ol data-dcnode-id="7853"><li data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">Monitoring members’ progress in implementing anti-money laundering measures,</span></li><span data-dcnode-id="7859" instrument_node="">
</span><li data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">Reviewing and reporting on laundering trends, techniques, and countermeasures, and</span></li><span data-dcnode-id="7856" instrument_node="">
</span><li data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">Promoting the adoption and implementation of FATF anti-money laundering standards globally.</span></li></ol><span data-dcnode-id="7852" instrument_node="">
</span><p data-dcnode-id="7850"><span data-dcnode-id="7851" instrument_node="">The FATF currently comprises 34 member jurisdictions and 2 regional organisations, representing most major financial centres in all parts of the globe.
</span></p><p data-dcnode-id="7827"><span data-dcnode-id="7849" instrument_node="">The </span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Office_on_Drugs_and_Crime" title="United Nations Office on Drugs and Crime"><span data-dcnode-id="7848" instrument_node="">United Nations Office on Drugs and Crime</span></a><span data-dcnode-id="7846" instrument_node=""> maintains the </span><i data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">International Money Laundering Information Network</span></i><span data-dcnode-id="7843" instrument_node="">, a website that provides information and software for anti-money laundering data collection and analysis.</span><sup class="reference" data-dcnode-id="7840" id="cite_ref-67"><a data-dcnode-id="7841" href="#cite_note-67"><span data-dcnode-id="7842" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7839" instrument_node=""> The </span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="7838" instrument_node="">World Bank</span></a><span data-dcnode-id="7836" instrument_node=""> has a website that provides policy advice and best practices to governments and the private sector on anti-money laundering issues.</span><sup class="reference" data-dcnode-id="7833" id="cite_ref-68"><a data-dcnode-id="7834" href="#cite_note-68"><span data-dcnode-id="7835" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7832" instrument_node=""> The Basel AML Index is an independent annual ranking that assesses the risk of money laundering and terrorist financing around the world.</span><sup class="reference" data-dcnode-id="7829" id="cite_ref-69"><a data-dcnode-id="7830" href="#cite_note-69"><span data-dcnode-id="7831" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7828" instrument_node="">
</span></p><span data-dcnode-id="7826" instrument_node="">
</span><h2 data-dcnode-id="7816"><span class="mw-headline" data-dcnode-id="7824" id="Anti-money_laundering_measures_by_region"><span data-dcnode-id="7825" instrument_node="">Anti-money laundering measures by region</span></span><span class="mw-editsection" data-dcnode-id="7817"><span class="mw-editsection-bracket" data-dcnode-id="7822"><span data-dcnode-id="7823" instrument_node="">[</span></span><a data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D14" title="Edit section: Anti-money laundering measures by region"><span data-dcnode-id="7821" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7815" instrument_node="">
</span><p data-dcnode-id="7813"><span data-dcnode-id="7814" instrument_node="">Many jurisdictions adopt a list of specific predicate crimes for money laundering prosecutions, while others criminalize the proceeds of any serious crimes.
</span></p><span data-dcnode-id="7812" instrument_node="">
</span><h3 data-dcnode-id="7802"><span class="mw-headline" data-dcnode-id="7810" id="Afghanistan"><span data-dcnode-id="7811" instrument_node="">Afghanistan</span></span><span class="mw-editsection" data-dcnode-id="7803"><span class="mw-editsection-bracket" data-dcnode-id="7808"><span data-dcnode-id="7809" instrument_node="">[</span></span><a data-dcnode-id="7806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D15" title="Edit section: Afghanistan"><span data-dcnode-id="7807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7801" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="7764" role="presentation"><tbody data-dcnode-id="7765"><tr data-dcnode-id="7766"><td class="mbox-image" data-dcnode-id="7797"><div data-dcnode-id="7798" style="width:52px"><a class="image" data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="7800" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="7767"><div class="mbox-text-span" data-dcnode-id="7768"><span data-dcnode-id="7796" instrument_node="">This section </span><b data-dcnode-id="7792"><span data-dcnode-id="7795" instrument_node="">needs additional citations for </span><a data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="7794" instrument_node="">verification</span></a></b><span data-dcnode-id="7791" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="7783"><span data-dcnode-id="7790" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="7788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit"><span data-dcnode-id="7789" instrument_node="">improve this article</span></a><span data-dcnode-id="7787" instrument_node=""> by </span><a data-dcnode-id="7785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="7786" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="7784" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="7782" instrument_node=""> </span><span class="date-container" data-dcnode-id="7776"><i data-dcnode-id="7777"><span data-dcnode-id="7781" instrument_node="">(</span><span class="date" data-dcnode-id="7779"><span data-dcnode-id="7780" instrument_node="">November 2011</span></span><span data-dcnode-id="7778" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="7769"><i data-dcnode-id="7770"><span data-dcnode-id="7775" instrument_node=""> (</span><small data-dcnode-id="7772"><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="7774" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="7771" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="7763" instrument_node="">
</span><p data-dcnode-id="7757"><span data-dcnode-id="7762" instrument_node="">The Financial Transactions and Reports Analysis Center of Afghanistan (FinTRACA) was established as a Financial Intelligence Unit (FIU) under the Anti Money Laundering and Proceeds of Crime Law passed by decree late in 2004. The main purpose of this law is to protect the integrity of the Afghan financial system and to gain compliance with international treaties and conventions. The Financial Intelligence Unit is a semi-independent body that is administratively housed within the Central Bank of Afghanistan (Da Afghanistan Bank). The main objective of FinTRACA is to deny the use of the Afghan financial system to those who obtained funds as the result of illegal activity, and to those who would use it to support terrorist activities.</span><sup class="reference" data-dcnode-id="7759" id="cite_ref-70"><a data-dcnode-id="7760" href="#cite_note-70"><span data-dcnode-id="7761" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7758" instrument_node="">
</span></p><p data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">To meet its objectives, the FinTRACA collects and analyzes information from a variety of sources. These sources include entities with legal obligations to submit reports to the FinTRACA when a suspicious activity is detected, as well as reports of cash transactions above a threshold amount specified by regulation. Also, FinTRACA has access to all related Afghan government information and databases. When the analysis of this information supports the supposition of illegal use of the financial system, the FinTRACA works closely with law enforcement to investigate and prosecute the illegal activity. FinTRACA also cooperates internationally in support of its own analyses and investigations and to support the analyses and investigations of foreign counterparts, to the extent allowed by law. Other functions include training of those entities with legal obligations to report information, development of laws and regulations to support national-level AML objectives, and international and regional cooperation in the development of AML typologies and countermeasures.
</span></p><span data-dcnode-id="7754" instrument_node="">
</span><h3 data-dcnode-id="7744"><span class="mw-headline" data-dcnode-id="7752" id="Australia"><span data-dcnode-id="7753" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="7745"><span class="mw-editsection-bracket" data-dcnode-id="7750"><span data-dcnode-id="7751" instrument_node="">[</span></span><a data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D16" title="Edit section: Australia"><span data-dcnode-id="7749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7746"><span data-dcnode-id="7747" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7743" instrument_node="">
</span><link data-dcnode-id="7742" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7738" role="note"><span data-dcnode-id="7741" instrument_node="">Further information: </span><a data-dcnode-id="7739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organised_crime_in_Australia" title="Organised crime in Australia"><span data-dcnode-id="7740" instrument_node="">Organised crime in Australia</span></a></div><span data-dcnode-id="7737" instrument_node="">
</span><p data-dcnode-id="7711"><span data-dcnode-id="7736" instrument_node="">Australia has adopted a number of strategies to combat money laundering, which mirror those of a majority of western countries. The </span><a data-dcnode-id="7734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Transaction_Reports_and_Analysis_Centre" title="Australian Transaction Reports and Analysis Centre"><span data-dcnode-id="7735" instrument_node="">Australian Transaction Reports and Analysis Centre</span></a><span data-dcnode-id="7733" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="7731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AUSTRAC" title="AUSTRAC"><span data-dcnode-id="7732" instrument_node="">AUSTRAC</span></a><span data-dcnode-id="7730" instrument_node="">) is Australia's financial intelligence unit to combat money laundering and terrorism financing, which requires every provider of designated services in Australia to report to it suspicious cash or other transactions and other specific information.</span><sup class="reference" data-dcnode-id="7727" id="cite_ref-71"><a data-dcnode-id="7728" href="#cite_note-71"><span data-dcnode-id="7729" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7726" instrument_node=""> The </span><a data-dcnode-id="7724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attorney-General%2527s_Department_%28Australia%29" title="Attorney-General's Department (Australia)"><span data-dcnode-id="7725" instrument_node="">Attorney-General's Department</span></a><span data-dcnode-id="7723" instrument_node=""> maintains a list of </span><a class="mw-redirect" data-dcnode-id="7721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outlawed_terror_organisations_in_Australia" title="Outlawed terror organisations in Australia"><span data-dcnode-id="7722" instrument_node="">outlawed terror organisations</span></a><span data-dcnode-id="7720" instrument_node="">. It is an offense to materially support or be supported by such organisations.</span><sup class="reference" data-dcnode-id="7717" id="cite_ref-72"><a data-dcnode-id="7718" href="#cite_note-72"><span data-dcnode-id="7719" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7716" instrument_node=""> It is an offence to open a bank account in Australia in a false name,</span><sup class="reference" data-dcnode-id="7713" id="cite_ref-73"><a data-dcnode-id="7714" href="#cite_note-73"><span data-dcnode-id="7715" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7712" instrument_node=""> and rigorous procedures must be followed when new bank accounts are opened.
</span></p><p data-dcnode-id="7702"><span data-dcnode-id="7710" instrument_node="">The </span><i data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">Anti-Money Laundering and Counter-Terrorism Financing Act 2006</span></i><span data-dcnode-id="7707" instrument_node=""> (Cth) (AML/CTF Act) is the principal legislative instrument, although there are also offence provisions contained in Division 400 of the </span><i data-dcnode-id="7704"><a class="mw-redirect" data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_Code_Act_1995" title="Criminal Code Act 1995"><span data-dcnode-id="7706" instrument_node="">Criminal Code Act 1995</span></a></i><span data-dcnode-id="7703" instrument_node=""> (Cth). Upon its introduction, it was intended that the AML/CTF Act would be further amended by a second tranche of reforms extending to designated non-financial businesses and professions (DNFBPs) including, inter alia, lawyers, accountants, jewellers and real estate agents; however, those further reforms have yet to be progressed.
</span></p><p data-dcnode-id="7692"><span data-dcnode-id="7701" instrument_node="">The </span><i data-dcnode-id="7698"><a class="mw-redirect" data-dcnode-id="7699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proceeds_of_Crime_Act_2002_%28Australia%29" title="Proceeds of Crime Act 2002 (Australia)"><span data-dcnode-id="7700" instrument_node="">Proceeds of Crime Act 2002</span></a></i><span data-dcnode-id="7697" instrument_node=""> (Cth) imposes criminal penalties on a person who engages in money laundering.</span><sup class="reference" data-dcnode-id="7694" id="cite_ref-74"><a data-dcnode-id="7695" href="#cite_note-74"><span data-dcnode-id="7696" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7693" instrument_node="">
</span></p><span data-dcnode-id="7691" instrument_node="">
</span><h3 data-dcnode-id="7681"><span class="mw-headline" data-dcnode-id="7689" id="Bangladesh"><span data-dcnode-id="7690" instrument_node="">Bangladesh</span></span><span class="mw-editsection" data-dcnode-id="7682"><span class="mw-editsection-bracket" data-dcnode-id="7687"><span data-dcnode-id="7688" instrument_node="">[</span></span><a data-dcnode-id="7685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D17" title="Edit section: Bangladesh"><span data-dcnode-id="7686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7683"><span data-dcnode-id="7684" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7680" instrument_node="">
</span><p data-dcnode-id="7660"><span data-dcnode-id="7679" instrument_node="">The first anti-money laundering legislation in Bangladesh was the </span><i data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">Money Laundering Prevention Act, 2002</span></i><span data-dcnode-id="7676" instrument_node="">. It was replaced by the </span><i data-dcnode-id="7674"><span data-dcnode-id="7675" instrument_node="">Money Laundering Prevention Ordinance 2008</span></i><span data-dcnode-id="7673" instrument_node="">. Subsequently, the ordinance was repealed by the </span><i data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">Money Laundering Prevention Act, 2009</span></i><span data-dcnode-id="7670" instrument_node="">. In 2012, government again replaced it with the </span><i data-dcnode-id="7668"><span data-dcnode-id="7669" instrument_node="">Money Laundering Prevention Act, 2012</span></i><sup class="reference" data-dcnode-id="7665" id="cite_ref-75"><a data-dcnode-id="7666" href="#cite_note-75"><span data-dcnode-id="7667" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="7662" id="cite_ref-76"><a data-dcnode-id="7663" href="#cite_note-76"><span data-dcnode-id="7664" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7661" instrument_node="">
</span></p><p data-dcnode-id="7651"><span data-dcnode-id="7659" instrument_node="">In terms of section 2, "Money Laundering means – (i)  knowingly moving, converting, or transferring proceeds of crime or property involved in an offence for the following purposes:- (1) concealing or disguising the illicit nature, source, location, ownership or control of the proceeds of crime; or (2) assisting any person involved in the commission of the predicate offence to evade the legal consequences of such offence;  (ii) smuggling money or property earned through legal or illegal means to a foreign country; (iii)  knowingly transferring or remitting the proceeds of crime to a foreign country or remitting or bringing them into Bangladesh from a foreign country with the intention of hiding or disguising its illegal source; or (iv) concluding or attempting to conclude financial transactions in such a manner so as to reporting requirement under this Act may be avoided;(v) converting or moving or transferring property with the intention to instigate or assist for committing a predicate offence; (vi) acquiring, possessing or using any property, knowing that such property is the proceeds of a predicate offence; (vii) performing such activities so as to the illegal source of the proceeds of crime may be concealed or disguised; (viii) participating in, associating with, conspiring, attempting, abetting, instigate or counsel to commit any offences mentioned above."</span><sup class="reference" data-dcnode-id="7656" id="cite_ref-77"><a data-dcnode-id="7657" href="#cite_note-77"><span data-dcnode-id="7658" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="7653" id="cite_ref-78"><a data-dcnode-id="7654" href="#cite_note-78"><span data-dcnode-id="7655" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7652" instrument_node="">
</span></p><p data-dcnode-id="7649"><span data-dcnode-id="7650" instrument_node="">To prevent these Illegal uses of money, the Bangladesh government has introduced the Money Laundering Prevention Act. The Act was last amended in the year 2009 and all the financial institutes are following this act. Till today there are 26 circulars issued by Bangladesh Bank under this act. To prevent money laundering, a banker must do the following:
</span></p><span data-dcnode-id="7648" instrument_node="">
</span><ul data-dcnode-id="7618"><li data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">While opening a new account, the account opening form should be duly filled up by all the information of the customer.</span></li><span data-dcnode-id="7645" instrument_node="">
</span><li data-dcnode-id="7640"><span data-dcnode-id="7644" instrument_node="">The </span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Know_your_customer" title="Know your customer"><span data-dcnode-id="7643" instrument_node="">KYC</span></a><span data-dcnode-id="7641" instrument_node=""> must be properly filled.</span></li><span data-dcnode-id="7639" instrument_node="">
</span><li data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">The Transaction Profile (TP) is mandatory for a client to understand his/her transactions. If needed, the TP must be updated at the client's consent.</span></li><span data-dcnode-id="7636" instrument_node="">
</span><li data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">All other necessary papers should be properly collected along with the National ID card.</span></li><span data-dcnode-id="7633" instrument_node="">
</span><li data-dcnode-id="7631"><span data-dcnode-id="7632" instrument_node="">If any suspicious transaction is noticed, the Branch Anti Money Laundering Compliance Officer (BAMLCO) must be notified and accordingly the Suspicious Transaction Report (STR) must be filled out.</span></li><span data-dcnode-id="7630" instrument_node="">
</span><li data-dcnode-id="7628"><span data-dcnode-id="7629" instrument_node="">The cash department should be aware of the transactions. It must be noted if suddenly a big amount of money is deposited in any account. Proper documents are required if any client does this type of transaction.</span></li><span data-dcnode-id="7627" instrument_node="">
</span><li data-dcnode-id="7625"><span data-dcnode-id="7626" instrument_node="">Structuring, over/ under invoicing is another way to do money laundering. The foreign exchange department should look into this matter cautiously.</span></li><span data-dcnode-id="7624" instrument_node="">
</span><li data-dcnode-id="7622"><span data-dcnode-id="7623" instrument_node="">If any account has a transaction over 1 million taka in a single day, it must be reported in a cash transaction report (CTR).</span></li><span data-dcnode-id="7621" instrument_node="">
</span><li data-dcnode-id="7619"><span data-dcnode-id="7620" instrument_node="">All bank officials must go through all the 26 circulars and use them.</span></li></ul><span data-dcnode-id="7617" instrument_node="">
</span><h3 data-dcnode-id="7607"><span class="mw-headline" data-dcnode-id="7615" id="Canada"><span data-dcnode-id="7616" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="7608"><span class="mw-editsection-bracket" data-dcnode-id="7613"><span data-dcnode-id="7614" instrument_node="">[</span></span><a data-dcnode-id="7611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D18" title="Edit section: Canada"><span data-dcnode-id="7612" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7606" instrument_node="">
</span><link data-dcnode-id="7605" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7601" role="note"><span data-dcnode-id="7604" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="7602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_laundering_in_Canada" title="Money laundering in Canada"><span data-dcnode-id="7603" instrument_node="">Money laundering in Canada</span></a></div><span data-dcnode-id="7600" instrument_node="">
</span><p data-dcnode-id="7589"><span data-dcnode-id="7599" instrument_node="">In 1991, the Proceeds of Crime (Money Laundering) Act was brought into force in Canada to give legal effect to the former </span><a class="mw-redirect" data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FATF" title="FATF"><span data-dcnode-id="7598" instrument_node="">FATF</span></a><span data-dcnode-id="7596" instrument_node=""> Forty Recommendations by establishing record keeping and client identification requirements in the financial sector to facilitate the investigation and prosecution of money laundering offences under the </span><a data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_Code_%28Canada%29" title="Criminal Code (Canada)"><span data-dcnode-id="7595" instrument_node="">Criminal Code</span></a><span data-dcnode-id="7593" instrument_node=""> and the </span><a data-dcnode-id="7591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Controlled_Drugs_and_Substances_Act" title="Controlled Drugs and Substances Act"><span data-dcnode-id="7592" instrument_node="">Controlled Drugs and Substances Act</span></a><span data-dcnode-id="7590" instrument_node="">.
</span></p><p data-dcnode-id="7584"><span data-dcnode-id="7588" instrument_node="">In 2000, the Proceeds of Crime (Money Laundering) Act was amended to expand the scope of its application and to establish a financial intelligence unit with national control over money laundering, namely </span><a class="mw-redirect" data-dcnode-id="7586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FINTRAC" title="FINTRAC"><span data-dcnode-id="7587" instrument_node="">FINTRAC</span></a><span data-dcnode-id="7585" instrument_node="">.
</span></p><p data-dcnode-id="7579"><span data-dcnode-id="7583" instrument_node="">In December 2001, the scope of the Proceeds of Crime (Money Laundering) Act was again expanded by amendments enacted under the Anti-Terrorism Act with the objective of deterring terrorist activity by cutting off sources and channels of funding used by terrorists in response to </span><a class="mw-redirect" data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/9/11" title="9/11"><span data-dcnode-id="7582" instrument_node="">9/11</span></a><span data-dcnode-id="7580" instrument_node="">.  The Proceeds of Crime (Money Laundering) Act was renamed the Proceeds of Crime (Money Laundering) and Terrorist Financing Act.
</span></p><p data-dcnode-id="7577"><span data-dcnode-id="7578" instrument_node="">In December 2006, the Proceeds of Crime (Money Laundering) and Terrorist Financing Act was further amended, in part, in response to pressure from the FATF for Canada to tighten its money laundering and financing of terrorism legislation.  The amendments expanded the client identification, record-keeping and reporting requirements for certain organizations and included new obligations to report attempted suspicious transactions and outgoing and incoming international electronic fund transfers, undertake risk assessments and implement written compliance procedures in respect of those risks.
</span></p><p data-dcnode-id="7575"><span data-dcnode-id="7576" instrument_node="">The amendments also enabled greater money laundering and terrorist financing intelligence-sharing among enforcement agencies.
</span></p><p data-dcnode-id="7566"><span data-dcnode-id="7574" instrument_node="">In Canada, casinos, money service businesses, notaries, accountants, banks, securities brokers, life insurance agencies, real estate salespeople and dealers in precious metals and stones are subject to the reporting and record keeping obligations under the Proceeds of Crime (Money Laundering) and Terrorist Financing Act. However, in recent years, casinos and realtors have been embroiled in scandal for aiding and abetting money launderers, especially in Vancouver, which has come to be known as the "</span><a class="mw-redirect" data-dcnode-id="7572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vancouver_Model" title="Vancouver Model"><span data-dcnode-id="7573" instrument_node="">Vancouver Model</span></a><span data-dcnode-id="7571" instrument_node="">". Some have speculated that approximately $1 Billion is laundered in Vancouver per year.</span><sup class="reference" data-dcnode-id="7568" id="cite_ref-79"><a data-dcnode-id="7569" href="#cite_note-79"><span data-dcnode-id="7570" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7567" instrument_node="">
</span></p><span data-dcnode-id="7565" instrument_node="">
</span><h3 data-dcnode-id="7555"><span class="mw-headline" data-dcnode-id="7563" id="European_Union"><span data-dcnode-id="7564" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="7556"><span class="mw-editsection-bracket" data-dcnode-id="7561"><span data-dcnode-id="7562" instrument_node="">[</span></span><a data-dcnode-id="7559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D19" title="Edit section: European Union"><span data-dcnode-id="7560" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7554" instrument_node="">
</span><p data-dcnode-id="7533"><span data-dcnode-id="7553" instrument_node="">The fourth iteration of the EU's anti-money laundering directive (AMLD IV) was published on 5 June 2015, after clearing its last legislative stop at the European Parliament.</span><sup class="reference" data-dcnode-id="7550" id="cite_ref-eulaundry_80-0"><a data-dcnode-id="7551" href="#cite_note-eulaundry-80"><span data-dcnode-id="7552" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7549" instrument_node=""> This directive brought the EU's money laundering laws more in line with the US's, which is advantageous for financial institutions operating in both jurisdictions.</span><sup class="reference" data-dcnode-id="7546" id="cite_ref-pwc.com_81-0"><a data-dcnode-id="7547" href="#cite_note-pwc.com-81"><span data-dcnode-id="7548" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7545" instrument_node=""> The Fifth Money Laundering Directive (5MLD) comes into force on 10 January 2020, addressing a number of weaknesses in the European Union's AML/CFT regime that came to light after the enactment of the Fourth Money Laundering Directive AMLD IV).</span><sup class="reference" data-dcnode-id="7542" id="cite_ref-eulaundry_80-1"><a data-dcnode-id="7543" href="#cite_note-eulaundry-80"><span data-dcnode-id="7544" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="7539" id="cite_ref-82"><a data-dcnode-id="7540" href="#cite_note-82"><span data-dcnode-id="7541" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7538" instrument_node=""> The AMLD5 increased the scope of the EU's AML regulations. It decreased the threshold of customer identity verification for the prepaid card industry from EUR 250 to EUR 150. The customers who deposit or transfer funds more than EUR150 will be identified by the prepaid card issuing company.
Lack of harmonization in AML requirements between the US and EU has complicated the compliance efforts of global institutions that are looking to standardize the Know Your Customer (KYC) component of their AML programs across key jurisdictions. AMLD IV promises to better align the AML regimes by adopting a more risk-based approach compared to its predecessor, AMLD III.</span><sup class="reference" data-dcnode-id="7535" id="cite_ref-pwc.com_81-1"><a data-dcnode-id="7536" href="#cite_note-pwc.com-81"><span data-dcnode-id="7537" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7534" instrument_node="">
</span></p><p data-dcnode-id="7527"><span data-dcnode-id="7532" instrument_node="">Certain components of the directive, however, go beyond current requirements in both the EU and US, imposing new implementation challenges on banks. For instance, more public officials are brought within the scope of the directive, and EU member states are required to establish new registries of "beneficial owners" (i.e., those who ultimately own or control each company) which will impact banks. AMLD IV became effective 25 June 2015.</span><sup class="reference" data-dcnode-id="7529" id="cite_ref-83"><a data-dcnode-id="7530" href="#cite_note-83"><span data-dcnode-id="7531" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7528" instrument_node="">
</span></p><p data-dcnode-id="7518"><span data-dcnode-id="7526" instrument_node="">On 24 January 2019, the </span><a data-dcnode-id="7524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="7525" instrument_node="">European Commission</span></a><span data-dcnode-id="7523" instrument_node=""> sent official warnings to ten member states as part of a crackdown on lax application of money laundering regulations. The Commission sent Germany a letter of formal notice, the first step of the EU legal procedure against states. Belgium, Finland, France, Lithuania, and Portugal were sent reasoned opinions, the second step of the procedure which could lead to fines. A second round of reasoned opinions was sent to Bulgaria, Cyprus, Poland, and Slovakia. The ten countries have two months to respond or face court action. The commission had set a 26 June 2017 deadline for EU countries to apply new rules against money laundering and terrorist financing.</span><sup class="reference" data-dcnode-id="7520" id="cite_ref-84"><a data-dcnode-id="7521" href="#cite_note-84"><span data-dcnode-id="7522" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7519" instrument_node="">
</span></p><p data-dcnode-id="7512"><span data-dcnode-id="7517" instrument_node="">On 13 February 2019, the Commission added Saudi Arabia, Panama, Nigeria and other jurisdictions to a blacklist of nations that pose a threat because of lax controls on terrorism financing and money laundering.</span><sup class="reference" data-dcnode-id="7514" id="cite_ref-85"><a data-dcnode-id="7515" href="#cite_note-85"><span data-dcnode-id="7516" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7513" instrument_node=""> This is a more expansive list than that of FATF.
</span></p><p data-dcnode-id="7506"><span data-dcnode-id="7511" instrument_node="">In addition, the European Commission has created a list of high-risk countries on money laundering and terrorism financing, including: Afghanistan, Iran, Iraq, North Korea, Syria, Uganda, Vanuatu and Yemen (since 20 September 2016), Trinidad and Tobago (since 14 February 2018), Pakistan (since 2 October 2018), The Bahamas, Barbados, Botswana, Cambodia, Ghana, Jamaica, Mauritius, Mongolia, Myanmar, Nicaragua, Panama and Zimbabwe (since 1 October 2020).</span><sup class="reference" data-dcnode-id="7508" id="cite_ref-86"><a data-dcnode-id="7509" href="#cite_note-86"><span data-dcnode-id="7510" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7507" instrument_node="">
</span></p><span data-dcnode-id="7505" instrument_node="">
</span><h4 data-dcnode-id="7495"><span class="mw-headline" data-dcnode-id="7503" id="Spain"><span data-dcnode-id="7504" instrument_node="">Spain</span></span><span class="mw-editsection" data-dcnode-id="7496"><span class="mw-editsection-bracket" data-dcnode-id="7501"><span data-dcnode-id="7502" instrument_node="">[</span></span><a data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D20" title="Edit section: Spain"><span data-dcnode-id="7500" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7497"><span data-dcnode-id="7498" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7494" instrument_node="">
</span><p data-dcnode-id="7470"><span data-dcnode-id="7493" instrument_node="">Former King of Spain, </span><a class="mw-redirect" data-dcnode-id="7491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juan_Carlos" title="Juan Carlos"><span data-dcnode-id="7492" instrument_node="">Juan Carlos</span></a><span data-dcnode-id="7490" instrument_node=""> came under investigation by Supreme Court in November 2020, which was linked to money laundering. He was supposed to face prosecution for the offense of money laundering, if he was proven guilty for using the funds withdrawn from tax authorities. During that time, Carlos was in exile in </span><a data-dcnode-id="7488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abu_Dhabi" title="Abu Dhabi"><span data-dcnode-id="7489" instrument_node="">Abu Dhabi</span></a><span data-dcnode-id="7487" instrument_node="">, as he was under another investigation concerning </span><a data-dcnode-id="7485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption" title="Corruption"><span data-dcnode-id="7486" instrument_node="">corruption</span></a><span data-dcnode-id="7484" instrument_node="">. The monarch allegedly received $100 million donation from </span><a data-dcnode-id="7482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saudi_Arabia" title="Saudi Arabia"><span data-dcnode-id="7483" instrument_node="">Saudi Arabia</span></a><span data-dcnode-id="7481" instrument_node="">, apart from $6 billion kick-backs for </span><a data-dcnode-id="7479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haramain_high-speed_railway" title="Haramain high-speed railway"><span data-dcnode-id="7480" instrument_node="">Haramain high-speed railway</span></a><span data-dcnode-id="7478" instrument_node=""> in the Arab nation.</span><sup class="reference" data-dcnode-id="7475" id="cite_ref-87"><a data-dcnode-id="7476" href="#cite_note-87"><span data-dcnode-id="7477" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="7472" id="cite_ref-88"><a data-dcnode-id="7473" href="#cite_note-88"><span data-dcnode-id="7474" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7471" instrument_node="">
</span></p><span data-dcnode-id="7469" instrument_node="">
</span><h3 data-dcnode-id="7459"><span class="mw-headline" data-dcnode-id="7467" id="India"><span data-dcnode-id="7468" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="7460"><span class="mw-editsection-bracket" data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">[</span></span><a data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D21" title="Edit section: India"><span data-dcnode-id="7464" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7461"><span data-dcnode-id="7462" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7458" instrument_node="">
</span><link data-dcnode-id="7457" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7450" role="note"><span data-dcnode-id="7456" instrument_node="">Main articles: </span><a data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prevention_of_Money_Laundering_Act%2C_2002" title="Prevention of Money Laundering Act, 2002"><span data-dcnode-id="7455" instrument_node="">Prevention of Money Laundering Act, 2002</span></a><span data-dcnode-id="7453" instrument_node=""> and </span><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism_financing%23India" title="Terrorism financing"><span data-dcnode-id="7452" instrument_node="">Anti-terror financing actions by India</span></a></div><span data-dcnode-id="7449" instrument_node="">
</span><link data-dcnode-id="7448" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7444" role="note"><span data-dcnode-id="7447" instrument_node="">See also: </span><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enforcement_Directorate" title="Enforcement Directorate"><span data-dcnode-id="7446" instrument_node="">Enforcement Directorate</span></a></div><span data-dcnode-id="7443" instrument_node="">
</span><p data-dcnode-id="7428"><span data-dcnode-id="7442" instrument_node="">In 2002, the </span><a data-dcnode-id="7440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_India" title="Parliament of India"><span data-dcnode-id="7441" instrument_node="">Parliament of India</span></a><span data-dcnode-id="7439" instrument_node=""> passed an </span><a data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_of_Parliament" title="Act of Parliament"><span data-dcnode-id="7438" instrument_node="">act</span></a><span data-dcnode-id="7436" instrument_node=""> called the </span><a data-dcnode-id="7434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prevention_of_Money_Laundering_Act%2C_2002" title="Prevention of Money Laundering Act, 2002"><span data-dcnode-id="7435" instrument_node="">Prevention of Money Laundering Act, 2002</span></a><span data-dcnode-id="7433" instrument_node="">. The main objectives of this act are to prevent money-laundering as well as to provide for confiscation of property either derived from or involved in, money-laundering.</span><sup class="reference" data-dcnode-id="7430" id="cite_ref-Prevention_of_Money_Laundering_Act,_2002_89-0"><a data-dcnode-id="7431" href="#cite_note-Prevention_of_Money_Laundering_Act,_2002-89"><span data-dcnode-id="7432" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7429" instrument_node="">
</span></p><p data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">Section 12 (1) describes the obligations that banks, other financial institutions, and intermediaries have to 
</span></p><span data-dcnode-id="7425" instrument_node="">
</span><dl data-dcnode-id="7419"><dd data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">(a) Maintain records that detail the nature and value of transactions, whether such transactions comprise a single transaction or a series of connected transactions, and where these transactions take place within a month.</span></dd><span data-dcnode-id="7422" instrument_node="">
</span><dd data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">(b) Furnish information on transactions referred to in clause (a) to the Director within the time prescribed, including records of the identity of all its clients.</span></dd></dl><span data-dcnode-id="7418" instrument_node="">
</span><p data-dcnode-id="7416"><span data-dcnode-id="7417" instrument_node="">Section 12 (2) prescribes that the records referred to in sub-section (1) as mentioned above, must be maintained for ten years after the transactions finished. It is handled by the Indian Income Tax Department.
</span></p><p data-dcnode-id="7407"><span data-dcnode-id="7415" instrument_node="">The provisions of the Act are frequently reviewed and various amendments have been passed from time to time.</span><sup class="reference" data-dcnode-id="7412" id="cite_ref-90"><a data-dcnode-id="7413" href="#cite_note-90"><span data-dcnode-id="7414" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="7409" id="cite_ref-91"><a data-dcnode-id="7410" href="#cite_note-91"><span data-dcnode-id="7411" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7408" instrument_node="">
</span></p><p data-dcnode-id="7377"><span data-dcnode-id="7406" instrument_node="">Most money laundering activities in India are through political parties, corporate companies</span><sup class="reference" data-dcnode-id="7403" id="cite_ref-92"><a data-dcnode-id="7404" href="#cite_note-92"><span data-dcnode-id="7405" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7402" instrument_node=""> and the share market. These are investigated by the </span><a data-dcnode-id="7400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enforcement_Directorate" title="Enforcement Directorate"><span data-dcnode-id="7401" instrument_node="">Enforcement Directorate</span></a><span data-dcnode-id="7399" instrument_node=""> and Indian Income Tax Department.</span><sup class="reference" data-dcnode-id="7396" id="cite_ref-ED_-_functions_93-0"><a data-dcnode-id="7397" href="#cite_note-ED_-_functions-93"><span data-dcnode-id="7398" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7395" instrument_node=""> According to </span><a data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_India" title="Government of India"><span data-dcnode-id="7394" instrument_node="">Government of India</span></a><span data-dcnode-id="7392" instrument_node="">, out of the total tax arrears of </span><span class="nowrap" data-dcnode-id="7388"><span data-dcnode-id="7390" style="white-space: nowrap"><span data-dcnode-id="7391" instrument_node="">₹</span></span><span data-dcnode-id="7389" instrument_node="">2,480 billion</span></span><span data-dcnode-id="7387" instrument_node=""> (US$33&nbsp;billion) about </span><span class="nowrap" data-dcnode-id="7383"><span data-dcnode-id="7385" style="white-space: nowrap"><span data-dcnode-id="7386" instrument_node="">₹</span></span><span data-dcnode-id="7384" instrument_node="">1,300 billion</span></span><span data-dcnode-id="7382" instrument_node=""> (US$17&nbsp;billion) pertain to money laundering and securities scam cases.</span><sup class="reference" data-dcnode-id="7379" id="cite_ref-tax_recovery_-_india_94-0"><a data-dcnode-id="7380" href="#cite_note-tax_recovery_-_india-94"><span data-dcnode-id="7381" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7378" instrument_node="">
</span></p><p data-dcnode-id="7371"><span data-dcnode-id="7376" instrument_node="">Bank accountants must record all transactions over Rs. 1&nbsp;million and maintain such records for 10 years. Banks must also make cash transaction reports (CTRs) and suspicious transaction reports over Rs. 1&nbsp;million within 7 days of initial suspicion. They must submit their reports to the Enforcement Directorate and Income Tax Department.</span><sup class="reference" data-dcnode-id="7373" id="cite_ref-95"><a data-dcnode-id="7374" href="#cite_note-95"><span data-dcnode-id="7375" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7372" instrument_node="">
</span></p><span data-dcnode-id="7370" instrument_node="">
</span><h3 data-dcnode-id="7360"><span class="mw-headline" data-dcnode-id="7368" id="Latin_America"><span data-dcnode-id="7369" instrument_node="">Latin America</span></span><span class="mw-editsection" data-dcnode-id="7361"><span class="mw-editsection-bracket" data-dcnode-id="7366"><span data-dcnode-id="7367" instrument_node="">[</span></span><a data-dcnode-id="7364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D22" title="Edit section: Latin America"><span data-dcnode-id="7365" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7362"><span data-dcnode-id="7363" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7359" instrument_node="">
</span><p data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">In Latin America, money laundering is mainly linked to drug trafficking activities and to having connections with criminal activity, such as crimes that have to do with arms trafficking, human trafficking, extortion, blackmail, smuggling, and acts of corruption of people linked to governments, such as bribery, which are more common in Latin American countries. There is a relationship between corruption and money laundering in developing countries. The economic power of Latin America increases rapidly and without support, these fortunes being of illicit origin having the appearance of legally acquired profits. With regard to money laundering, the ultimate goal of the process is to integrate illicit capital into the general economy and transform it into licit goods and services.
</span></p><p data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">The money laundering practice uses various channels to legalize everything achieved through illegal practices. As such, it has different techniques depending on the country where this illegal operation is going to be carried out:
</span></p><span data-dcnode-id="7354" instrument_node="">
</span><ul data-dcnode-id="7342"><li data-dcnode-id="7352"><span data-dcnode-id="7353" instrument_node="">In Colombia, the laundering of billions of dollars, which come from drug trafficking, is carried out through imports of contraband from the parallel exchange market.</span></li><span data-dcnode-id="7351" instrument_node="">
</span><li data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">In Central American countries such as Guatemala and Honduras, money laundering continues to increase in the absence of adequate legislation and regulations in these countries. Money laundering activities in Costa Rica have experienced substantial growth, especially using large-scale currency smuggling and investments of drug cartels in real estate, within the tourism sector. Furthermore, the Colon Free Zone in Panama, continues to be the area of operations for money laundering where cash is exchanged for products of different nature that are then put up for sale at prices below those of production for a return fast of the capital.</span></li><span data-dcnode-id="7348" instrument_node="">
</span><li data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">In Mexico, the preferred techniques continue to be the smuggling of currency abroad, in addition to electronic transfers, bank drafts with Mexican banks and operations in the parallel exchange market.</span></li><span data-dcnode-id="7345" instrument_node="">
</span><li data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">Money Laundering in the Caribbean countries continues to be a serious problem that seems to be very dangerous. Specifically, in Antigua, the Dominican Republic, Jamaica, Saint Vincent and the Grenadines. Citizens of the Dominican Republic who have been involved in money laundering in the United States, use companies that are dedicated to transferring funds sent to the Dominican Republic in amounts of less than $10,000 under the use of false names. Moreover, in Jamaica, multimillion-dollar asset laundering cases were discovered through telephone betting operations abroad. Thousands of suspicious transactions have been detected in French overseas territories. Free trade zones such as Aruba, meanwhile, remain the preferred areas for money laundering. The offshore banking centers, the secret bank accounts and the tourist complexes are the channels through which the launderers whiten the proceeds of the illicit money.</span></li></ul><span data-dcnode-id="7341" instrument_node="">
</span><p data-dcnode-id="7339"><span data-dcnode-id="7340" instrument_node="">Casinos continue to attract organizations that deal with money laundering. Aruba and the Netherlands Antilles, the Cayman Islands, Colombia, Mexico, Panama and Venezuela are considered high priority countries in the region, due to the strategies used by the washers.
</span></p><span data-dcnode-id="7338" instrument_node="">
</span><h4 data-dcnode-id="7328"><span class="mw-headline" data-dcnode-id="7336" id="Economic_impact_in_the_region"><span data-dcnode-id="7337" instrument_node="">Economic impact in the region</span></span><span class="mw-editsection" data-dcnode-id="7329"><span class="mw-editsection-bracket" data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">[</span></span><a data-dcnode-id="7332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMoney_laundering%26action%3Dedit%26section%3D23" title="Edit section: Economic impact in the region"><span data-dcnode-id="7333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7327" instrument_node="">
</span><p data-dcnode-id="7325"><span data-dcnode-id="7326" instrument_node="">The practice of money laundering, among other economic and financial crimes seeps into the economic and political structures of most developing countries therefore resulting to political instability and economic digression.
