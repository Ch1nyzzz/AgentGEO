</span><p data-dcnode-id="1849"><span data-dcnode-id="1864" instrument_node="">It is imperative that a specific single-supervisor is introduced by the UK government to combine and unite the AML efforts of the supervisors to avoid inconsistencies; making sure that all the standards of the FATF are met.</span><a data-dcnode-id="1862" href="#_ftn92"><span data-dcnode-id="1863" instrument_node="">[92]</span></a><span data-dcnode-id="1861" instrument_node=""> The supervisors must also be equipped with the right tools to instigate deterrence such as liability and penal sanctions, where there is failure on the part of professional enablers.</span><a data-dcnode-id="1859" href="#_ftn93"><span data-dcnode-id="1860" instrument_node="">[93]</span></a><span data-dcnode-id="1858" instrument_node=""> It is essential that sanctions are established and imposed upon professional enablers, revoking licenses of those involved in ML schemes.</span><a data-dcnode-id="1856" href="#_ftn94"><span data-dcnode-id="1857" instrument_node="">[94]</span></a><span data-dcnode-id="1855" instrument_node=""> There is also a need for adequate legislation which would bound offshore companies to disclose the identity of beneficial owners.</span><a data-dcnode-id="1853" href="#_ftn95"><span data-dcnode-id="1854" instrument_node="">[95]</span></a><span data-dcnode-id="1852" instrument_node=""> Availability of public registers regarding the details of companies’ beneficial owners would pave the way to undertake thorough investigations.</span><a data-dcnode-id="1850" href="#_ftn96"><span data-dcnode-id="1851" instrument_node="">[96]</span></a></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Effective legislation is required with the authority of dispensing “Unexplained Wealth Orders” for the recovery of ill-gotten assets which would serve as an effective mechanism to freeze stolen assets, as this would by-pass the reliance on cross-border jurisdictions’ predicate offences or support of the countries which are uncooperative. Furthermore, it is imperative that Tier 1 visa system is made subject to utmost transparency by the Home Office, ensuring disclosures, in relation to the identity of the investors, the amount of funds invested, the business where investment is made and the intentions/interests of such investors.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Strict transparency is needed when it comes to the public officials and PEPs, irrespective of the fact if they are holding office at the time or not. Most importantly, assessment needs to be undertaken of the Tier 1 visas granted prior to 2015 rules changes, and published to catch the culprits which would trigger deterrence for the future criminals.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">It raises a big question on the reliability of detection and enforcement mechanisms when criminals go unpenalized for their criminal activities. An illustration is the case of Daxford Ltd, which exemplifies the deficiency and difficulty in impleading powerful and dominant people.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Michael Daxford would perpetrate tax evasion and then hide the money by making fake trade accounts. These bogus trade accounts were made under the names of Arab sheikhs who in reality did not even exist. It was a stratagem and an arrangement of such nature that it would seem, that large sums of money were deposited by the non-existent sheiks.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Daxford would then close down the respective accounts after he had surreptitiously generated profits. The arrangement was disguised by a legitimate cover, in order to make sure that everything appeared authentic and legal, accounts were opened for UK citizens, whereby it would show that a lawful business is being carried out.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">By managing another clever scheme, he would then succeed to send the money to a bank account in Switzerland. Astonishingly, even though two crimes viz. evasion of tax and ML were committed by Daxford, still he did not face any criminal prosecution. A detective who was posted to Fraud Squad to work on the case, mentions in his blog:</span></p><span data-dcnode-id="1830" instrument_node="">
</span><blockquote data-dcnode-id="1823"><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1828" instrument_node="">“[….] it was clear that the Establishment did not want to drag these eminent and socially-elevated people through the Courts. So, the whole thing was dropped and covered up.”</span><a data-dcnode-id="1826" href="#_ftn97"><span data-dcnode-id="1827" instrument_node="">[97]</span></a></p><span data-dcnode-id="1824" instrument_node="">
</span></blockquote><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Where a background check is necessary to be carried out, it is also important that financial institutions try their best to avoid the action of enforcement by extenuating the probable risks that may lead to ML.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">In 2012, a fine of 525,000 pounds was imposed on Habib Bank AG Zurich due to its deficiencies and shortcomings in relation to the implementation of AML controls. Among other failures, one was that the training for employees was not up to par or rather lacked. This shows as to how vital the role of employees is in detecting and monitoring ML activities. Additionally, an important and a major failure on their behalf was their deficiency in making sure that each client’s account is categorized with the level of risk which is suitable and relevant; and in line with the degree of risk which is expected of the higher risk states in relation to ML.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">This is a very important measure, as states who have weak AML implementations and managements pose a risk and thus, it is upon financial institutions who deal with such states’ clients to make sure that they are assessed in the most appropriate manner to alleviate any probable threats. Furthermore, it is therefore paramount that the internal regulations of the financial institutions are strong and in line with the AML laws of the State.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">For further exemplification, the case of Coutts and Company also serves as a good example in relation to risk management and its importance. A fine of 8,750,000 pounds was imposed on Coutts and Company in 2012 for their failure to adequately protect against the risks of ML activities. What’s more important is that they also botched in their duty to properly recognize and classify the PEPs. This therefore, brought upon a great ML risk to the institution.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">As far as high-risk clients are concerned, flaws were discovered in about 71% files reviewed by the FCA in relation to due diligence. Such conduct enhances complications and complexities; when financial institutions are not compliant and sufficiently diligent. It is thus, vital that financial institutions thoroughly comply with the standards set and are fully alert, for these institutions can be an open entrance for cunning international clients with their illicit proceeds.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">The hefty fines clearly indicate how grave and serious such flaws can be, and how serious of an impact they can have on the economy. There is a bigger responsibility on such eminent financial institutions to be more steadfast and to serve as an example for other institutions. They potentially have an indirect duty towards the state in preserving the reputation of the country and its financial market.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Where there is a compromise on the standards of AML regulations, it can have disastrous effects on the reputation and economic stability of a state. There has been negligence also on part of other financial institutions in implementing the AML rules, and sufficiently adhering to the set guidelines and standards. For a failure to establish satisfactory AML controls, the EFG Private Bank was charged a fine of 4.2 million pounds. Among other clients, they had clients who were previously convicted of ML; this was a risk which was not properly assessed. The fact that they served numerous clients who were PEPs, they did not recognize and direct their attention to gauging the risks concerning ML.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Surprisingly, accounts which were risk oriented and posed a threat were about 400 in number. This as reported went on for 3 years. Where clients of such description are entertained by financial institutions without proper assessment and controls, it is understandable why there would be a risk of ML and other potential crime.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">It is therefore vital that there is assiduousness, and adoption of careful assessment procedures and controls. As Tracey McDermott who was the director of Enforcement and Financial crime (FCA) said:</span></p><span data-dcnode-id="1795" instrument_node="">
</span><blockquote data-dcnode-id="1788"><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1793" instrument_node="">“Banks are in the front line in the fight against money laundering. If they accept business from high-risk customers they must have effective systems, controls and practices in place”.</span><a data-dcnode-id="1791" href="#_ftn98"><span data-dcnode-id="1792" instrument_node="">[98]</span></a></p><span data-dcnode-id="1789" instrument_node="">
</span></blockquote><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Despite the fact, that there have been so many fines imposed on different financial institutions, the controls in relation to ML are still not satisfactory. Arguably, this might mean that fines may not be an effective or a suitable course of action in enforcing the rules and regulations.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">It is only about four years ago, that Standard Bank was charged a fine of more than 7.6 million pounds because they infringed rules that serve to safeguard and protect against ML.</span><a data-dcnode-id="1781" href="#_ftn99"><span data-dcnode-id="1782" instrument_node="">[99]</span></a><span data-dcnode-id="1780" instrument_node="">The fines imposed indicate and reflect the failures of the banks in complying and recognizing the significance of prevention and detection of ML activities. It is often found that banks are not sufficiently active and equipped according to the set standards in identifying PEPs. It is imperative that they should be highly alert when it comes to clients of such description. In the case of Standard Bank, it failed to comply with the measures of ‘customer due diligence’ as laid out in the Money Laundering Regulations 2007, and the same is neglected also by other banks who have or have not necessarily been fined, as one is not guilty until proven to be so.</span></p><span data-dcnode-id="1778" instrument_node="">
