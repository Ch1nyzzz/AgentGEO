</span><p data-dcnode-id="2541"><strong data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">The fight against money laundering (ML) and the complications with practical Implementation/enforcement from an International Perspective</span></strong></p><span data-dcnode-id="2540" instrument_node="">
</span><h2 data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">ABSTRACT</span></h2><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">This dissertation aims to investigate the fundamental issues and complexities in controlling money laundering (ML) globally by analyzing international anti-money laundering laws (AML) and getting to the root of the problem by highlighting the loopholes and exploring the status of the crime internationally.</span></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Significant international cases are examined to compare and recognize the existent corrupt practices not only within financial institutions but also of the ruling class. The weak regulations coupled with problems of inconsistencies and lack of uniformity are analysed. Enforcement which is a vital mechanism in serving as an implementing tool is probed to identify the existent difficulties. The repercussions/implications of ML will be underlined to recognize the intensity of the crime and why there is a need to tackle the crime with a stronger force both domestically and most importantly internationally.</span></p><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">This dissertation raises questions in relation to the efficacy and strength of the existent AML enforcements. Considering the fundamentals of international laws, it recommends methods of achieving uniformity. A comparative method is adopted to illustrate the scope of the crime, deficiencies in the regulatory regimes of corporate establishments and the responsive action of the states.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">The comparative analysis further identifies the respective issues of the individual states which instigate the crime. In international law it can be beneficial to deem ML as a specific crime. Ratification of the Vienna Convention has the ability to enable uniformity of AML laws. Uniformity amid different nations can have the tendency to deter perpetrators from laundering illicit funds.</span></p><span data-dcnode-id="2525" instrument_node="">
</span><h2 data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Contents</span></h2><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Chapter 1 - Introduction</span></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Chapter 2 - Enforcement/implementation of International Law and the obstacles</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Chapter 3 - The Role of Banks</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Chapter 4 - A Comparative Analysis – Cases and Jurisdictions</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Chapter 5 - International Anti-money laundering laws – Testing the waters</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Final Chapter - Conclusion</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Bibliography</span></p><span data-dcnode-id="2501" instrument_node="">
</span><h2 data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Chapter 1: Introduction</span></h2><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2497" instrument_node="">The fight against money laundering (ML) strengthened intensively since the 1980s. The international collaboration and cooperation in eradicating ML, was almost absent until 1986 and was not treated in its own right a criminal offence.</span><a data-dcnode-id="2495" href="#_ftn1"><span data-dcnode-id="2496" instrument_node="">[1]</span></a><span data-dcnode-id="2494" instrument_node=""> It was after the formation of Financial Action Task Force (FATF) by the Group of 7 (G7)</span><a data-dcnode-id="2492" href="#_ftn2"><span data-dcnode-id="2493" instrument_node="">[2]</span></a><span data-dcnode-id="2491" instrument_node=""> in 1989 that the regulation of anti-money laundering (AML) became widely recognized on an international level, and rightly so because of its intensity and the nature of the crime.</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2488" instrument_node="">So far, there is only one state which has shown non-cooperation to implement the Recommendations of the FATF which is North Korea.</span><a data-dcnode-id="2486" href="#_ftn3"><span data-dcnode-id="2487" instrument_node="">[3]</span></a><span data-dcnode-id="2485" instrument_node=""> However, discussions were said to have initiated by North Korea in October 2012 with the FATF in relation to the subject. AML regulation thus is the most broadly implemented regulatory regime throughout the world. Given the nature of ML and its implications, measures to counter money laundering are at the center of international effort.</span><a data-dcnode-id="2483" href="#_ftn4"><span data-dcnode-id="2484" instrument_node="">[4]</span></a><span data-dcnode-id="2482" instrument_node=""> The US along with other nations have embraced several AML controls to measure the scope of the crime and to stop laundering of criminal proceeds, along with attempting to catch the one who commits such a crime.</span><a data-dcnode-id="2480" href="#_ftn5"><span data-dcnode-id="2481" instrument_node="">[5]</span></a></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2477" instrument_node="">The question however is the extent and the effectiveness of such efforts. It is not what such respective states claim to ensure but rather whether there is sufficient practical implementation by them to tackle ML. The challenge posed is due to the fact there are no orderly estimations of the scale of ML.</span><a data-dcnode-id="2475" href="#_ftn6"><span data-dcnode-id="2476" instrument_node="">[6]</span></a><span data-dcnode-id="2474" instrument_node=""> Illegal origins such as smuggling, drug trafficking, prostitution and activities of organized crime can generate large profits; creating incentive to legitimize the gains through laundering.</span><a data-dcnode-id="2472" href="#_ftn7"><span data-dcnode-id="2473" instrument_node="">[7]</span></a><span data-dcnode-id="2471" instrument_node=""> Individuals or groups involved in criminal action then look for ways to control such ill gains without attracting attention to the main action.&nbsp;ML is a process where the assets attained by criminal means are processed to abstruse the connection between the illegal activity and the funds.</span><a data-dcnode-id="2469" href="#_ftn8"><span data-dcnode-id="2470" instrument_node="">[8]</span></a><span data-dcnode-id="2468" instrument_node=""> It creates a cover of legal legitimacy to furtively conceal the original nature of the illegal money.</span><a data-dcnode-id="2466" href="#_ftn9"><span data-dcnode-id="2467" instrument_node="">[9]</span></a></p><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2463" instrument_node="">This organized crime is typically transnational, involving several legal standards and different jurisdictions.</span><a data-dcnode-id="2461" href="#_ftn10"><span data-dcnode-id="2462" instrument_node="">[10]</span></a><span data-dcnode-id="2460" instrument_node=""> The nature of the crime is transnational due to the fact that it originates in one jurisdiction and the illegal earnings are then filtered through to another jurisdiction to hide the trace of its original source.</span><a data-dcnode-id="2458" href="#_ftn11"><span data-dcnode-id="2459" instrument_node="">[11]</span></a><span data-dcnode-id="2457" instrument_node=""> In order to successfully and effectively eliminate and lessen ML, the law must address every stage of the process, namely: </span><em data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">“identification, pursuit, seizure, and confiscation or forfeiture”</span></em><span data-dcnode-id="2454" instrument_node="">.</span><a data-dcnode-id="2452" href="#_ftn12"><span data-dcnode-id="2453" instrument_node="">[12]</span></a></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2449" instrument_node="">The offence of concealment as specified by the Proceeds of Crime Act 2002 (POCA), broadens the ML offence in an effective manner. The conversion, disguising and removing or transferring the property of a criminal nature from the UK is described as concealment.</span><a data-dcnode-id="2447" href="#_ftn13"><span data-dcnode-id="2448" instrument_node="">[13]</span></a><span data-dcnode-id="2446" instrument_node=""> What makes ML more serious is the failure to report the launderer of the money or the activity in cases where it is suspected. There is therefore, by virtue of this provision, a duty imposed to report any suspicion in relation to ML and thus creates an accountability for both the financial and legal division.</span><a data-dcnode-id="2444" href="#_ftn14"><span data-dcnode-id="2445" instrument_node="">[14]</span></a></p><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2441" instrument_node="">Even though it may seem that ML does not apparently have any recognizable victims which are affected directly, but, the repercussions of the crime are not any less than the crimes of the street.</span><a data-dcnode-id="2439" href="#_ftn15"><span data-dcnode-id="2440" instrument_node="">[15]</span></a><span data-dcnode-id="2438" instrument_node=""> ML in its nature is disastrous, not only does it negatively affect the economy because of unequal wealth distribution but also renders substantial adversarial effects on the citizens’ welfare.</span><a data-dcnode-id="2436" href="#_ftn16"><span data-dcnode-id="2437" instrument_node="">[16]</span></a><span data-dcnode-id="2435" instrument_node=""> It has a detrimental impact on the well-being of the people and also damages the reputation of a state internationally, and is therefore categorized as corrupt and disreputable.</span><a data-dcnode-id="2433" href="#_ftn17"><span data-dcnode-id="2434" instrument_node="">[17]</span></a><span data-dcnode-id="2432" instrument_node=""> The effects on such an economy are thus quite harmful, where foreign investors hold back from investing in states of such character.</span><a data-dcnode-id="2430" href="#_ftn18"><span data-dcnode-id="2431" instrument_node="">[18]</span></a><span data-dcnode-id="2429" instrument_node=""> Investors typically target states where there is financial transparency and economic stability, whereas countries who are subject to corruption and vices such as ML, lose the opportunity to grow and prosper.</span><a data-dcnode-id="2427" href="#_ftn19"><span data-dcnode-id="2428" instrument_node="">[19]</span></a><span data-dcnode-id="2426" instrument_node=""> Such states lose on the much-needed foreign investment, which is a necessary requisite for a country’s economy to flourish.</span><a data-dcnode-id="2424" href="#_ftn20"><span data-dcnode-id="2425" instrument_node="">[20]</span></a></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2421" instrument_node="">It is important to understand the process of how money is laundered in order to recognize its implications.</span><a data-dcnode-id="2419" href="#_ftn21"><span data-dcnode-id="2420" instrument_node="">[21]</span></a><span data-dcnode-id="2418" instrument_node=""> It is a process which generally comprises of 3 rudimentary stages namely; placement, layering and integration.</span><a data-dcnode-id="2416" href="#_ftn22"><span data-dcnode-id="2417" instrument_node="">[22]</span></a></p><span data-dcnode-id="2414" instrument_node="">
</span><h3 data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Process</span></h3><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2410" instrument_node="">Placement is the initial and a key step in unravelling the illegal money derived from criminal activities, from the criminals.</span><a data-dcnode-id="2408" href="#_ftn23"><span data-dcnode-id="2409" instrument_node="">[23]</span></a><span data-dcnode-id="2407" instrument_node=""> Funds are deposited in financial institutions or either expended through acquisition of assets. The financial system and banks are thus used to place the illegal proceeds which paves the way for the second stage of the laundering process.</span><a data-dcnode-id="2405" href="#_ftn24"><span data-dcnode-id="2406" instrument_node="">[24]</span></a></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2402" instrument_node="">Layering is the method used by launderers to further abstruse the trail of the criminality in the effort to detach the money from the original source.</span><a data-dcnode-id="2400" href="#_ftn25"><span data-dcnode-id="2401" instrument_node="">[25]</span></a><span data-dcnode-id="2399" instrument_node=""> This can be undertaken through several methods such as passing money through shell companies, numerous accounts or trusts, especially in areas which offers anonymity.</span><a data-dcnode-id="2397" href="#_ftn26"><span data-dcnode-id="2398" instrument_node="">[26]</span></a><span data-dcnode-id="2396" instrument_node=""> In order to undertake detachment, schemes of complex and synthetic nature are adopted to disassociate the funds; smurfing or physically scattering the money in different financial institutions worldwide.</span><a data-dcnode-id="2394" href="#_ftn27"><span data-dcnode-id="2395" instrument_node="">[27]</span></a></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2391" instrument_node="">The concluding stage of the process is integration, where the laundered money is given a legitimate status and assimilated into the financial and economic system.</span><a data-dcnode-id="2389" href="#_ftn28"><span data-dcnode-id="2390" instrument_node="">[28]</span></a><span data-dcnode-id="2388" instrument_node=""> The criminal is thus reconciled with the funds which he can further invest, draw and use for personal gains or finance further criminal plans such as terrorism or other serious crimes.</span><a data-dcnode-id="2386" href="#_ftn29"><span data-dcnode-id="2387" instrument_node="">[29]</span></a></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2383" instrument_node="">ML is one of the most attractive options for criminals to deal with their illegal proceeds and acquisitions.</span><a data-dcnode-id="2381" href="#_ftn30"><span data-dcnode-id="2382" instrument_node="">[30]</span></a><span data-dcnode-id="2380" instrument_node=""> This is due to the fact that there are slimmer chances of detection in ML because of the inconsistencies in law, compared to when money is invested in the black economy.</span><a data-dcnode-id="2378" href="#_ftn31"><span data-dcnode-id="2379" instrument_node="">[31]</span></a></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">The primary focus of this dissertation entails the uniformity of AML laws and how uniformity can be achieved by recommending relevant solutions. The chapters aim to conceive the measures used by states to tackle the fight against ML, the core problems which exist pertaining to ML controls and the need for uniformity. It will discuss the complexities of enforcement/implementation of international laws in relation to ML and also determine as to whether these complexities can or cannot be reduced or eradicated in practice.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">The structure of the chapters will be in the following order:</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">The Introductory Chapter has discussed ML and its process, to set the background for further analysis.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Chapter 2 will discuss enforcement of International ML laws and the obstacles faced when attempting to implement them.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Analysis in Chapter 3 will evolve around the role of the banks combined with the function of the Financial Conduct Authority, the Wolfsberg group, and FATF to highlight their efforts to alleviate money laundering; alongside emphasizing Transparency International’s recommendations.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Further discussion in Chapter 4 will delve into a comparative analysis of significant cases in key jurisdictions, namely; United Kingdom, United States of America and Africa; signifying the threats posed by ML and the complexities that exist in implementing AML laws. The loopholes are identified and examined by investigating the international efforts of the states by adopting a comparative approach.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Chapter 5 will map out the complications of embracing International AML laws, its counter arguments and why there is an urgent need to attack ML.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">The final chapter gives a conclusive evaluation and recommendations of how ML can be tackled internationally with uniformity.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><h2 data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Chapter 2: Enforcement/implementation of International Law and the obstacles</span></h2><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2348" instrument_node="">In order to understand why it may be challenging to ensure the enforcement of AML laws internationally, it is important to examine the issues which exist in relation to the enforcement of international law. There are several hindrances when it comes to implementation and enforcement.</span><a data-dcnode-id="2346" href="#_ftn32"><span data-dcnode-id="2347" instrument_node="">[32]</span></a><span data-dcnode-id="2345" instrument_node=""> Making a certain set of perfect laws does not guarantee the goal it aims to achieve, as International law is not binding on states, and more so, there is no guarantee of implementation.</span><a data-dcnode-id="2343" href="#_ftn33"><span data-dcnode-id="2344" instrument_node="">[33]</span></a><span data-dcnode-id="2342" instrument_node=""> Most importantly the task of bringing uniformity in laws internationally is also not an easy one.</span><a data-dcnode-id="2340" href="#_ftn34"><span data-dcnode-id="2341" instrument_node="">[34]</span></a><span data-dcnode-id="2339" instrument_node=""> It is therefore argued that domestic laws may serve as a better option in tackling ML.</span><a data-dcnode-id="2337" href="#_ftn35"><span data-dcnode-id="2338" instrument_node="">[35]</span></a><span data-dcnode-id="2336" instrument_node=""> On the contrary, it is important to note that ML is a transnational crime and international law can have a better impact in controlling its practice in different jurisdictions rather than relying on the national laws.</span><a data-dcnode-id="2334" href="#_ftn36"><span data-dcnode-id="2335" instrument_node="">[36]</span></a><span data-dcnode-id="2333" instrument_node=""> The fortification of international law is therefore, critical to tackle and deal with a crime such as ML which is cross-border.</span><a data-dcnode-id="2331" href="#_ftn37"><span data-dcnode-id="2332" instrument_node="">[37]</span></a><span data-dcnode-id="2330" instrument_node=""> </span><strong data-dcnode-id="2327"><em data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">&nbsp;</span></em></strong></p><span data-dcnode-id="2325" instrument_node="">
</span><h3 data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">2.1 Standardization, consistency and uniformity</span></h3><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">One of the most recognized hinderance in enforcing and implementing international law is the lack of uniformity between states. United Nations (UN) has for instance,193 member-states; the fact that the Holy See and Palestine are not members does not truly in its literal sense reflect an international scope.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Different states apply and interpret international laws differently, this indicates that the international legal documents are not per say as tidy as they ought to be. It is important to note that there are often disagreements and reservations made on different aspects of law. This is a major hinderance in achieving uniformity. The efforts towards uniformity therefore are not as fruitful as they are expected or aspired to be. There are substantial discrepancies in relation to the extent of how much the laws are supposed to be binding. It is inevitable that soft laws may only generate what is called soft harmonisation. An example of this is the third recommendation of the FATF which is the criminalization of the criminal proceeds which are laundered. However, the adversarial effects of absence of uniformity are more than the mere disappointment of harmonization in international laws.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">It is argued, and is fairly true that money launderers have successfully exploited these loopholes and the inconsistencies among the legal systems of different states to take advantage of the existent deficiencies. It therefore wouldn’t be wrong to argue that there is a need for widespread uniformity and harmonisation in the fight to deter and reduce the crime of ML.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Arguably, the construction of uniformed law is something which only the European Court of Justice can achieve. Against this argument it is submitted that there is an absence of an efficient international law instrument which is directly effective on a macro level. However, at the same time, laws which are applicable directly are criticised for having the potential to hinder a state’s liberty to change and improve their law.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">In order to embolden harmonisation and uniformity of the international laws, the UN Office on Drugs and Crime (UNODC) for this purpose strives to aid countries in ratifying multilateral treaties. It helps countries in targeting ML and terrorism by developing its policies and municipal legislation. International law is typically based on treaties and these treaties are not easy to be enforced to ensure a successful operation. Even though there is a need for strong multi-lateral treaties, they are criticised by many scholars for not being effectively successful in bringing unification of the law.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">For this purpose, it is ideal or rather recommended that Vienna Convention be ratified, as it has the potential to reinforce homogeneity in regulatory regimes domestically. Moreover, there is a crucial need for focused detection at an international level to control cybercrime which is another serious problem facilitating the crime of ML.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Cyber laundering is a mechanism used to launder illegal money through the use of internet throughout the world. There are numerous techniques used by criminals to change dirty money into clean money internationally by methods such as online banking, online auctioning and other digital oriented techniques. ML as discussed is a global issue and because of its transnational nature, there are sets of several measures which are concurrently in force to tackle the problem. This means that there is an overlap of numerous rules and distinctive animating principles. As a result, when international AML laws are ratified, it leads to an uneven and irregular mechanism across the states.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">There is a lack of global uniformity among different countries which are simultaneously adhering to different rules and procedures. In order to tackle this issue, there is a need to enhance comparative law and its study, which may help to improve the uniformity of transnational rules and its content.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">The International Money Laundering Information Network can further enrich the advancement in this regard. Another underlying problem is that though standards are established by the international laws, it is eventually every state’s discretion of how such standards are implemented by individual states.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2294" instrument_node="">The susceptibility of the states to ML across borders is thus influenced by the application and implementation of these standards set in place. It is therefore, argued that the national laws can have a legal impact transnationally which will be further discussed. Where the soft laws are formed by the FATF, the “</span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Eurasian group on combating money laundering and the financing of terrorism</span></em><span data-dcnode-id="2291" instrument_node="">”, which is one of the FATF-Style Regional Bodies (FSRBs), for instance strives to make sure that there is synchronization and that international standards are met in the regions represented by them.</span><a data-dcnode-id="2289" href="#_ftn38"><span data-dcnode-id="2290" instrument_node="">[38]</span></a></p><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2286" instrument_node="">There are altogether 9 bodies in conjunction with the FATF, forming a network globally.</span><a data-dcnode-id="2284" href="#_ftn39"><span data-dcnode-id="2285" instrument_node="">[39]</span></a><span data-dcnode-id="2283" instrument_node=""> The FATF-Style Regional Bodies can thus, with their planned targets, assist in bringing uniformity in international AML laws. However, to what extent such targets are met is debatable.</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Additionally, in order to ensure steady relationships between the FATF-Style Regional Bodies, the Eurasian group on combating money laundering and financing of terrorism (EAG) strives to play an extensive role in strengthening their connection and association. These attempts can urge and support the consistency and standardization of the international AML laws; making sure that the future targets by the FSRBs are put into effect in an instantaneous manner to fight the battle against ML.</span></p><span data-dcnode-id="2278" instrument_node="">
</span><h3 data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">2.2 International law - The element of coercion and absence of sanctions</span></h3><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">The nature of international laws is such that they are not in the legal capacity mandatory to be ratified or as such do not impart a compulsion upon the states to adopt. It is entirely the discretion of each state to choose to ratify and to accept or implement the recommendations put forward in a particular instrument. These methods therefore are such which imply a risk-based approach rather than an imposition of comprehensive penalties to block ML.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2271" instrument_node="">According to John Austin: </span><em data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">“Law is a command backed by sanctions”.</span></em><a data-dcnode-id="2267" href="#_ftn40"><span data-dcnode-id="2268" instrument_node="">[40]</span></a><span data-dcnode-id="2266" instrument_node=""> Arguably, under such consideration, international law does not per say entirely fall under the classification of positive law, as it only imposes moral sanctions for the obligations set out in the international instruments. There is thus, a deficiency of coercive influence in the enforcement of the laws. However, against this argument, the International Criminal Police Organisation (INTERPOL) does enforce a coercive element by emboldening cooperation, information exchange and training of the police to enhance their AML laws.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">However, one can question the effectiveness of such measures to fight ML on an international scale, this will be analysed further below. Coercive measures are considered fairly essential and carry an evident significance in the enforcement of legal duties. However, it is argued, that even though in international law there is a deficiency of an adequate inherent coercive force; it is balanced by efforts of widespread global collaboration which is achieved by the use of several means integrated into the system.</span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">To further support this argument, it is stated that national legislation such as the UK’s Proceeds of Crime Act 2002, can successfully achieve cooperation internationally, which is set to tackle confiscation and asset recovery. Arguably, international cooperation can further be achieved by engaging with other states through informal collaboration and requests for assistance.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">To this extent, the Harare Scheme is submitted to be a helpful basis/footing for Commonwealth countries for interchanging intelligence in fighting ML. Another suggestion in this regard is the recommendation to build up teams of joint investigation advised by the European Union Legislation to its member states. Debatably, this would make the process of tackling ML more effective as it promotes a sense of joint cooperation and collaboration.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">The same is also promoted by the Egmont Group requiring its members to make Financial Intelligence Units (FIUs), and interchange important information concerning ML. There are several secured modes of communication set in place for the states to interconnect, and for the furtherance of the same, training is also provided by the FIUs. It is quite essential to have cooperation and exchange of information between states to tackle something like ML on an international level. Acknowledging the significance of such elements, the FIUs and the FSRBs encourage and provide enhancement in collaboration and the exchange of information among states to monitor ML more efficiently and effectively.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2251" instrument_node="">Irrespective of the fact that the measures in place are innately non-binding, the states, nevertheless are under a sense of a certain pressure to comply with the given rules. However, this does not prevent the states from professing their individual state supremacy. Like for instance, the US constitution under Article 6, regardless of the international laws underpins the federal law’s supremacy. Whereas, on the other hand the constitution of France under Article 55 instates preeminence or more so rather gives preference to the international laws.</span><a data-dcnode-id="2249" href="#_ftn41"><span data-dcnode-id="2250" instrument_node="">[41]</span></a></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">The agreements and treaties ratified thus have a superior authority over the national laws under the French constitution.</span><a data-dcnode-id="2244" href="#_ftn42"><span data-dcnode-id="2245" instrument_node="">[42]</span></a><span data-dcnode-id="2243" instrument_node=""> One can argue that this particular stance adopted by the Constitution of France is likely to enhance consistency and standardization of the international laws, but it is improbable to be on the cards for other countries to adopt the same approach; and give up on their national supremacy.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">The French law presents a good example and it can be argued that if other states adhere to the same approach, it is likely to eradicate most of the problems and procure better results in fighting international crimes. This can eliminate the underlying inconsistencies and the problems that surface due to the lack of uniformity. Thus, strengthening the fight against ML and the process to tackle the problem in a standardized manner.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Nonetheless, considering the circumstances, attaining uniformity in practice does not seem to be an easy one, bearing in mind that there is no obligation on states to ratify international laws. The flip side to giving authority to international laws, where rules are made obligatory on states, is argued and said to hinder the advancement of the domestic laws. The middle ground therefore can be to enforce measures nationally which is relatively appropriate at the time to tackle ML because of the financial institutions’ regulations.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2234" instrument_node="">Arguably, it is favorable for countries to analyze the advancement of the national legal enforcement of the states globally and use that insight in making their domestic AML laws better and of preferable standards. </span><strong data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="2230" instrument_node="">
</span><h3 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">2.3 International law and money laundering</span></h3><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">ML is categorized as an international crime by various international laws. It is explicated by the ‘UN Convention against Transnational Organized Crime 2004’, that international ML is to be criminalized by states through means of effective legislation.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2223" instrument_node="">Similarly, where the gains of a serious crime are being laundered, it is specified as an offence by the Palermo Convention, especially when the action is planned and cross-bordered. It is encouraged that countries offer legal backing to each other in dealing with international systematized crime, and assist in the process of tackling the wrong. ML in international law is a crime which stands alone. However, it is typically charged as an offence of an ancillary nature. In this context, the main or ground offence is the production of illegal funds, and ML is the component of such a crime, led from the predicate offence.</span><a data-dcnode-id="2221" href="#_ftn43"><span data-dcnode-id="2222" instrument_node="">[43]</span></a></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Given that the nature of such a crime is derived from a serious offence i.e. illegal proceeds, it makes ML quite serious of an offence, categorized as an ancillary offence. It is necessary for a predicate offence (acquisition of illegal proceeds), to have taken place which would then result in the subsequent route of laundering the money. ML however, is both reliant and un-reliant on the predicate offence.</span></p><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">For instance, in order to launder money, a predicate offence is required to exist. However, un-reliant because criminals may be indicted for the crime of ML, despite not being charged for the predicate offence.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">The dependence therefore varies and ML thus can classify as a specific offence. Interestingly so, judges in German courts are permitted not to impeach criminals for ML, in cases where they are charged for the predicate offence. Given the intensity of the crime, it is very critical that countries protect their financial institutions and its integrity by adopting the existent international anti-ML instruments.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">As Tom Sherman (President of the FATF 1992) puts it:</span></p><span data-dcnode-id="2207" instrument_node="">
</span><blockquote data-dcnode-id="2200"><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2205" instrument_node="">“Combating money laundering is not just a matter of fighting crime but of preserving the integrity of financial institutions and ultimately the financial system as a whole.”</span><a data-dcnode-id="2203" href="#_ftn44"><span data-dcnode-id="2204" instrument_node="">[44]</span></a></p><span data-dcnode-id="2201" instrument_node="">
</span></blockquote><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">It is directed by the ‘UN Convention against Corruption 2004’ that countries preclude ML by requiring them to set up FIUs and specifying sufficient supervisory and regulatory regimes for their financial institutions.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The International Convention for the Suppression of the Financing of Terrorism 1999 also under Article 2 (1) sets out the measures to confirm that illegal laundered proceeds are not used to fund terrorism. Therefore, it wouldn’t be wrong to argue that it is vital to criminalize ML to stop rather more serious crimes that are a threat to the people and the nation, by blocking the source of funding streamed through laundering.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">It is worth acknowledging, that ‘the European Convention on Mutual Assistance in Criminal Matters 1959’ helps to enable shared support, where amongst other means of useful facilitations, requests can be made for certain cases which are needed to acquire necessary evidence. It is also noteworthy that EU law has shown commitment in eradicating ML by bringing into effect for instance, the ‘Convention on Laundering, Search, Seizure and Confiscation of Proceeds of Crime 1990’.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">This convention criminalizes and forbids the usage of illegal proceeds, including its concealment and conversion. There is also a requirement that the offence has to be undertaken deliberately and purposely, which is also stated in the Palermo Convention; ensuring that innocent parties do not in the process become subject to unfair punishment. However, complications still exist and despite the fact that there are numerous instruments, there is still a lack of practice and issues prevail with regards to enforcement and implementation.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Under the ‘Model Provisions on Money Laundering, Terrorist Financing, Preventive measures and Proceeds of Crime 2009’, it is the preference of each State to criminalize the laundering of the serious crime proceeds. It is up to individual states to decide as to what the predicate offences to ML ought to cover. However, it is understandable that each state adopts what they choose is right for them and that there is an element of discretion they can practice but at the same time, it can cause inconsistencies and irregularities.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Where such rules are said to be adopted by states, the question remains as to whether how much and to what extent is the essence of such guidelines brought into practice. The ground reality and actions are always different than what is portrayed to be executed. This will be discussed in the latter part of the discussion.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">It is important to note that cases in relation to ML are not presently heard by the ‘International Criminal Court’ (ICC). It is therefore, recommended that there should be a court established specifically for AML matters from around the globe.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Suggestively, in order to authorize the ICC to hear matters in relation to ML, the International Law Commission could amend the Rome Statute 1998 to incorporate ML as a crime. This would allow the ICC to acquire jurisdiction in dealing with the ML matters. Arguably, this would be rather economical and efficient in terms of cost; more so practical as several offences presented before the ICC might not have come about, if the launderers were penalized in the first place.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">An international platform where ML matters could be dealt with, would additionally encourage the unification of international AML laws in different states. International ML laws may not straightforwardly be binding in the legal sense, they however may or can be deemed as obligatory, because of the fact that their compliance would perpetuate a healthy association and connection between countries.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2171" instrument_node="">It is recommended that states should comply with the ‘</span><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">pacta sunt servanda’ </span></em><span data-dcnode-id="2168" instrument_node="">principle, as it is the key to a good standing point to fight crime. The phrase generally means that treaties must be abided by.</span><a data-dcnode-id="2166" href="#_ftn45"><span data-dcnode-id="2167" instrument_node="">[45]</span></a><span data-dcnode-id="2165" instrument_node=""> The expression signifies a message of good faith and a notion which is quite significant in international law.</span><a data-dcnode-id="2163" href="#_ftn46"><span data-dcnode-id="2164" instrument_node="">[46]</span></a><span data-dcnode-id="2162" instrument_node=""> Furthermore, if countries enduringly consent to the treaties and conventions in place, this can bring about a sense of value and garnish effective standardized rules to fight not only ML but also other crimes as one unified community. International law is a valuable tool where states can fill the gaps in their national laws, and save themselves from falling prey to serious vices such as ML.</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">As Wang Zahowen (Bank of China Spokesperson) pointed out:</span></p><span data-dcnode-id="2157" instrument_node="">
</span><blockquote data-dcnode-id="2150"><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2155" instrument_node="">“The clampdown on money laundering and corruption is common responsibility of all the countries and regions in the world.”</span><a data-dcnode-id="2153" href="#_ftn47"><span data-dcnode-id="2154" instrument_node="">[47]</span></a></p><span data-dcnode-id="2151" instrument_node="">
</span></blockquote><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Irrespective of the fact that ML in international law is an offence which is somewhat varying in definition; there is no doubt that it is an international wrong. However, it may not invariably be interpreted as a specific crime.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">It is sometimes argued that only when law originates from a sovereign, it is only then considered law. However, in international law classing ML a crime discards this particular interpretation.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">The present international law regime effectively categorizes ML as an undoubted crime. It is therefore, recommended that nations unanimously consent to the several set international ML laws in place, to become fully equipped to fight and control the ML crime.</span></p><span data-dcnode-id="2140" instrument_node="">
</span><h2 data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Chapter 3: The Role of Banks</span></h2><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">The goal of money launderers as discussed is to legalize the illegitimate proceeds and cover the trace of how the money has been sourced. A very common and yet effectual method to make the dirty money clean is to use a bank to launder the illegal proceeds, which effectively serves as a clear foundation in disconnecting the launderer from the original source.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Banks can become a subject of compromise where deposits of illicit funds are made in a systematic manner. This is also known as structuring, where the illegal funds can go unnoticed; and thus, systematically and calculatedly scooch from raising and triggering red flags.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Institutions such as banks are the central foundation for money launderers, and are at the core of engaging ML criminals in effectively sanitizing and cleansing their illegal proceeds. As Robert Mazur, a former federal agent who served as an undercover money launderer, states:</span></p><span data-dcnode-id="2128" instrument_node="">
</span><blockquote data-dcnode-id="2121"><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2126" instrument_node="">“The only way to stop the flow of this dirty money is to get tough on the bankers who help mask and transfer it around the world.&nbsp; Banks themselves don’t launder money, after all: people do.”</span><a data-dcnode-id="2124" href="#_ftn48"><span data-dcnode-id="2125" instrument_node="">[48]</span></a></p><span data-dcnode-id="2122" instrument_node="">
</span></blockquote><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">ML as discussed is a crime which is characteristically or generally transnational in nature. Due to this particular reason ML cannot be entirely handled at a national level, more so because of the implementation and enforcement frailties that exist in certain countries. Consequently, in order to supervise and manage the regulation of the banks at an international level, the Basel Committee on Banking Supervision was established.</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">It wouldn’t be wrong to argue that financial institutions who are the central foundation for facilitating money launders, are very tricky and rather hard to detect. Where there are consistent and persistent practices of corrupt nature, it can lead to a culture of serious corruption. In such circumstances, the concept of attaining success in an industry changes and can mean pursuance of any illegal activity which may benefit the business.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Permitting the flow of illegal resources and money into a business to attain higher gains can thus inevitably disturb competition. Therefore, when an institution launders money untraced, it encourages the competitors to adopt the same route and gain the same financial remunerations. This hence can spread like an epidemic and turn into a vicious circle, leaving an intensely adverse effect on the entire economy.</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">As aforementioned in relation to tackling ML on a national level; arguably, as banks are the central medium in the facilitation of laundering funds, effective detection ought to be and can be carried out on a national level. Even though an international effort is necessary to entirely eradicate the crime of ML; efforts at a local level are also similarly crucial. Launderers commonly seek for banks who would be prepared to accept their funds and then consequently set up companies as a cover to conceal their identity. Arguably, it is therefore, highly imperative to observe and expose ML by a focused and careful monitorization domestically, given that launderers generally hide behind others to conceal the true control and ownership of their businesses.</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Financial institutions thus should and can inspect activities by adhering strictly to the guidelines in place, and strive to record, monitor and report doubtful or devious activities. It is vital for a country’s economic development to have a steady and well-established finance industry, which realizes the importance of upholding international reputation and strives towards maintaining it. Confidence and trust are the key factors which attract investors. Therefore, it is recommended that countries engage in healthy competition internationally by verifying that banks function with integrity and upright standards to attract foreign investors.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">There is a need for strong and effective mechanisms to be embraced by all banks to control ML in the first encounter. Banks must strictly adhere to the principles of accountability, transparency and integrity, to steer clear of corruption and raise concerns in events of suspicious activity. Where there is a failure to comply with the aforementioned principles of governance, it means that there is risk of significant reputational loss for the bank. In such circumstances, the bank can also become subject to legal sanctions for not having sufficient or satisfactory measures to control ML and adhere to the set guidelines.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><h3 data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">3.1 Financial Conduct Authority</span></h3><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2098" instrument_node="">As far as the integrity of the finance industry in the UK is concerned, the Financial Conduct Authority (FCA) which is a non-UK governmental body helps the finance industry by promoting competition, protecting the integrity of financial markets and protecting consumers.</span><a data-dcnode-id="2096" href="#_ftn49"><span data-dcnode-id="2097" instrument_node="">[49]</span></a><span data-dcnode-id="2095" instrument_node=""> The regulatory body receives its fees from the financial services institutions and has an accountability to the Treasury.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2092" instrument_node="">It is imperative that Financial institutions keep themselves up to date and comply with the standards laid out in the handbook of FCA, especially the set-out Principles for Businesses.</span><a data-dcnode-id="2090" href="#_ftn50"><span data-dcnode-id="2091" instrument_node="">[50]</span></a></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2087" instrument_node="">In order to fight ML, it is essential that financial institutions adhere to Principle 3 of the FCA handbook which mentions that firms ought to undertake reasonable care in controlling and organizing its affairs in a responsible and effective manner, with sufficient management systems in place to tackle risk.</span><a data-dcnode-id="2085" href="#_ftn51"><span data-dcnode-id="2086" instrument_node="">[51]</span></a></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2082" instrument_node="">Given that ML is typically categorized as a white-collar crime and is conspired/correlated in a wise and organized manner; it is for this reason stressed upon to have an effective ‘risk management system’ in place, to effectually alleviate the probable risks. Additionally, it is highly recommended to ensure that financial institutions function with “due diligence, care and skill”, which are crucial requisites for dealing with ML.</span><a data-dcnode-id="2080" href="#_ftn52"><span data-dcnode-id="2081" instrument_node="">[52]</span></a></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Arguably, this can also be called an alternative recipe/formula for risk-based approach concerning compliance. Essentially, it should be made sure that there is utmost transparency, so that the financial institutions are shielded from risks of organized corruption and exploitation.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><h3 data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">3.2 Money Laundering Regulations 2017</span></h3><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2071" instrument_node="">Moving on, ‘Money Laundering Regulations 2007’ now the ‘Money Laundering Regulations 2017’ is also worth discussing here, especially Regulation 27 (former Regulation 20) in relation to the due diligence of the customers. This regulation is of quite an essence and vital to fight ML at national level. The new ‘Money laundering Regulations 2017’ which came into force on 26</span><sup data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">th</span></sup><span data-dcnode-id="2068" instrument_node=""> June 2017 under the implementation of the EU’s Money laundering 4</span><sup data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">th</span></sup><span data-dcnode-id="2065" instrument_node=""> Directive replaced the old Regulations with some changes.</span><a data-dcnode-id="2063" href="#_ftn53"><span data-dcnode-id="2064" instrument_node="">[53]</span></a></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">There has been changes in relation to the level of due diligence, where the geographical risk factors and customers both are considered in deciding whether a simplified due diligence is suitable, instead of the former automatic simplified due diligence. This is a good step towards strengthening the measures in tracking money launderers. Further changes are improvement in the transparency of the owners who benefit from trusts and companies.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Again, a suitable development to track down the true owners who hide behind puppet owners and enjoy the benefits. Moreover, there is an advancement and improvement in the enforcement of the sanctions. Only time will tell as to how efficient and effective the new changes might prove in tackling ML. However, arguably, it is a step in the right direction.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><h3 data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">3.3 The Wolfsberg Group</span></h3><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2051" instrument_node="">At the time when there were rising concerns in relation to the financial crime, it led to the formation of the Wolfsberg Group</span><a data-dcnode-id="2049" href="#_ftn54"><span data-dcnode-id="2050" instrument_node="">[54]</span></a><span data-dcnode-id="2048" instrument_node="">, which was created in the year 2000, with the intention to offer direction to those associated with the banking division.</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2045" instrument_node="">The Wolfsberg group is a non-governmental association which carries out almost similar functions to that of the FATF which is however, an inter-governmental body. A consortium of 13 international banks, the Wolfsberg Group strives to provide guidance pertaining to dealing with ML and other crimes concerning finance. The group initially came together in the presence of the members from Transparency International to make a draft on the recommendations and standards for AML, concerning private banking.</span><a data-dcnode-id="2043" href="#_ftn55"><span data-dcnode-id="2044" instrument_node="">[55]</span></a><span data-dcnode-id="2042" instrument_node=""> Their directions in relation to ML recapitulates the significance of customer due diligence and the need for maintaining the same under unremitting appraisal. Moreover, it directs to be additionally careful when tackling with jurisdictions which have poor AML controls, and also conduct suitable monitorizations when it comes to the Politically Exposed Persons (PEPs). Most importantly, one can argue that the publications by the Wolfsberg Group and its principles provide to bring uniformity and standardization in rules concerning regulation and extenuation of risk approaches.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node="">On 6 January in 2011 the Wolfsberg Group also sent a comment letter to the President of FATF in relation to its Anti-money laundering and Counter terrorist financing standards.</span><a data-dcnode-id="2037" href="#_ftn56"><span data-dcnode-id="2038" instrument_node="">[56]</span></a><span data-dcnode-id="2036" instrument_node=""> Among other comments, they cautioned FATF about their take on the PEPs. In a sense they advised FATF to not issue directions or recommendations which are rather prescriptive, for instance, referring to the suggestion, that the PEPs set forth a high risk.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">They argued that such approach doesn’t seem necessary and is essentially counterproductive. The two co-chairmen among other things also commented on FATF’s emphasis on “mind and management” in relation to Beneficial ownership, arguing that the notion of “mind and management” denotes different meanings in different circumstances which may lead to confusion.</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2030" instrument_node="">While supporting and acknowledging FATF’s efforts, they made comments on other aspects where the Wolfsberg Group did not share the same view. However, on the contrary, Robert Mazur pointing towards the Wolfsberg Group, asserts that this is not ideally desirable and is rather superficial, by arguing that “the wolves are guarding the sheep”. </span><a data-dcnode-id="2028" href="#_ftn57"><span data-dcnode-id="2029" instrument_node="">[57]</span></a></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">He pointed out, and arguably rightly so, that 5 of the banks from the given self-made association have confessed to management of illegitimate funds or either have been or were subject to investigation in relation to such crimes. He maintains that Barclays and Credit Suisse accepted to the channeling dollars in millions to declared adversary states. Similarly, HSBC also underwent investigation for promoting the reception of US currency in dollars of billions belonging to account owners from Mexico.</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Additionally, Americans in thousands were assisted via network of fake companies and pretentious loans in eluding income taxes by means of undisclosed accounts. It was affirmed by the bank compliance sector and law enforcement representatives that bulk of US currency was conveyed for criminals from Mexico to America by the HSBC officers. Furthermore, Goldman Sachs which is also one of the association members was too under monitorization in relation to extensive unlawful handling.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">Considering the aforementioned discussion, one can argue that in such circumstances matters are left in the hands of the banks to introduce and propose changes to the rules which seem fitting and suitable to them at the time.</span><a data-dcnode-id="2017" href="#_ftn58"><span data-dcnode-id="2018" instrument_node="">[58]</span></a><span data-dcnode-id="2016" instrument_node=""> This therefore, results as an inside matter for banks as opposed to a matter of policy for regulators. Nevertheless, arguably, this can be considered as a progressive sign for the banks involved, if not anything, to have more visibility in relation to how matters are conducted.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><h2 data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Chapter 4: A Comparative Analysis – Cases and Jurisdictions</span></h2><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2010" instrument_node="">The Juarez Cartel, a drug dealing gang,</span><a data-dcnode-id="2008" href="#_ftn59"><span data-dcnode-id="2009" instrument_node="">[59]</span></a><span data-dcnode-id="2007" instrument_node=""> is an example to understand and grasp the extensity level of which the ML activities can extend to. Enormous amounts of money made from drug trafficking in Mexico, estimating above 14 million Dollars were incrusted in the financial institutions of Uruguay and Argentina.</span><a data-dcnode-id="2005" href="#_ftn60"><span data-dcnode-id="2006" instrument_node="">[60]</span></a></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="2002" instrument_node="">The funds were subsequently used to buy shares, and expended on extravagant items in an endeavor to hide and legalize the money. Banks globally have been subject to a lot of scrutiny and consequently punishments for the scheming of money launderers.</span><a data-dcnode-id="2000" href="#_ftn61"><span data-dcnode-id="2001" instrument_node="">[61]</span></a><span data-dcnode-id="1999" instrument_node=""> The launderers plan and target nations with weak/inadequate laws which favor their endeavors.</span><a data-dcnode-id="1997" href="#_ftn62"><span data-dcnode-id="1998" instrument_node="">[62]</span></a><span data-dcnode-id="1996" instrument_node=""> Most of these nations are not hard to spot as they are famous and known for their prevalent corruption and bribery.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><h3 data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">4.1 United Kingdom</span></h3><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1990" instrument_node="">UK is one of the central locations for money laundering where perpetrators seek to launder/invest their illegal funds; given it is one of the biggest financial markets.</span><a data-dcnode-id="1988" href="#_ftn63"><span data-dcnode-id="1989" instrument_node="">[63]</span></a><span data-dcnode-id="1987" instrument_node=""> Each year, extortionate amounts of money flows through the UK’s financial channels, with numerous transactions involving illicit funds.</span><a data-dcnode-id="1985" href="#_ftn64"><span data-dcnode-id="1986" instrument_node="">[64]</span></a><span data-dcnode-id="1984" instrument_node=""> Once the money passes through the UK and its affiliated regions, it is approved by the economy.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1981" instrument_node="">Being a global hub for many talents and political influence, the UK is an appealing location for corrupt individuals.</span><a data-dcnode-id="1979" href="#_ftn65"><span data-dcnode-id="1980" instrument_node="">[65]</span></a><span data-dcnode-id="1978" instrument_node=""> UK has incomparable links with offshore jurisdictions and thus, the confidentiality allows the funds to be easily concealed.</span><a data-dcnode-id="1976" href="#_ftn66"><span data-dcnode-id="1977" instrument_node="">[66]</span></a><span data-dcnode-id="1975" instrument_node=""> It offers security and stability as a safe haven, where the prospects for investments are vast.</span><a data-dcnode-id="1973" href="#_ftn67"><span data-dcnode-id="1974" instrument_node="">[67]</span></a><span data-dcnode-id="1972" instrument_node=""> Thereby, offering launderers secure estate rights and a stable environment.</span><a data-dcnode-id="1970" href="#_ftn68"><span data-dcnode-id="1971" instrument_node="">[68]</span></a></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1967" instrument_node="">The fore coming relevant ML cases discussed in this dissertation illustrate and highlight the involvement of the UK in the ML endeavors. One can question the UK’s effort to fight ML. Despite the fact that there is an apparent cloth of effort displayed, the effort is not as forceful as it needs to be. Arguably, the UK is at critical position in the fight against money laundering and corruption.</span><a data-dcnode-id="1965" href="#_ftn69"><span data-dcnode-id="1966" instrument_node="">[69]</span></a><span data-dcnode-id="1964" instrument_node="">&nbsp;As David Cameron labelled it:</span></p><span data-dcnode-id="1962" instrument_node="">
</span><blockquote data-dcnode-id="1955"><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1960" instrument_node="">“the cancer at the heart of so many of the world’s problems.”</span><a data-dcnode-id="1958" href="#_ftn70"><span data-dcnode-id="1959" instrument_node="">[70]</span></a></p><span data-dcnode-id="1956" instrument_node="">
</span></blockquote><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1953" instrument_node="">Generally, money laundering procedures are reliant upon professional enablers; accountants, agents of company-formation and lawyers, some who cooperatively facilitate the process.</span><a data-dcnode-id="1951" href="#_ftn71"><span data-dcnode-id="1952" instrument_node="">[71]</span></a><span data-dcnode-id="1950" instrument_node=""> It is argued that ML poses a risk which outreaches the regulated divisions.</span><a data-dcnode-id="1948" href="#_ftn72"><span data-dcnode-id="1949" instrument_node="">[72]</span></a><span data-dcnode-id="1947" instrument_node=""> ML outside such regulated divisions weakens the domestic guards against corruption.</span><a data-dcnode-id="1945" href="#_ftn73"><span data-dcnode-id="1946" instrument_node="">[73]</span></a><span data-dcnode-id="1944" instrument_node=""> Quantifying the degree of illegal funds flowing into the UK is arguably a tremendously difficult task.</span><a data-dcnode-id="1942" href="#_ftn74"><span data-dcnode-id="1943" instrument_node="">[74]</span></a><span data-dcnode-id="1941" instrument_node=""> The flow of cross-border illegal wealth is concealed and virtually undetectable.</span><a data-dcnode-id="1939" href="#_ftn75"><span data-dcnode-id="1940" instrument_node="">[75]</span></a><span data-dcnode-id="1938" instrument_node=""> Although numerous methods are utilized in attempt to determine the scale of laundered funds into the UK, the estimations remain diverse.</span><a data-dcnode-id="1936" href="#_ftn76"><span data-dcnode-id="1937" instrument_node="">[76]</span></a><span data-dcnode-id="1935" instrument_node=""> However, according to the NCA, the money laundered into the UK per year is equivalent to billions.</span><a data-dcnode-id="1933" href="#_ftn77"><span data-dcnode-id="1934" instrument_node="">[77]</span></a></p><span data-dcnode-id="1931" instrument_node="">
</span><h4 data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">4.1.1 Deficiencies in the UK’s AML system</span></h4><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1927" instrument_node="">It is submitted that there are apparent weaknesses in the AML system of the UK which makes it susceptible to the flow of illegal funds entering its economy.</span><a data-dcnode-id="1925" href="#_ftn78"><span data-dcnode-id="1926" instrument_node="">[78]</span></a><span data-dcnode-id="1924" instrument_node=""> Central to the problem is the UK’s twenty-seven supervisory figures, that are mostly private bodies which oversee the AML compliance in the property and banking divisions. Arguably, this system is erratic and presents inconsistencies, all which result in an impractical environment for those seeking to follow the rules.</span><a data-dcnode-id="1922" href="#_ftn79"><span data-dcnode-id="1923" instrument_node="">[79]</span></a></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1919" instrument_node="">Furthermore, conflicts of interest amongst the supervisors is a major problem as it can deter them from effectively doing their job.</span><a data-dcnode-id="1917" href="#_ftn80"><span data-dcnode-id="1918" instrument_node="">[80]</span></a><span data-dcnode-id="1916" instrument_node=""> Although intermediaries such as accountants and lawyers are at the forefront of detection for both private sector institutions and banks, their reporting is not always as effective.</span><a data-dcnode-id="1914" href="#_ftn81"><span data-dcnode-id="1915" instrument_node="">[81]</span></a><span data-dcnode-id="1913" instrument_node=""> Therefore, the professional intermediaries’ process of detection and reporting of money laundering needs to be severely improved.</span><a data-dcnode-id="1911" href="#_ftn82"><span data-dcnode-id="1912" instrument_node="">[82]</span></a></p><span data-dcnode-id="1909" instrument_node="">
</span><h4 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">4.1.2 Shell Companies and Entrance</span></h4><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1905" instrument_node="">As perpetrators can easily conceal their identity, it makes it a difficult task for law implementing agencies to identify the source of their illegal funds.</span><a data-dcnode-id="1903" href="#_ftn83"><span data-dcnode-id="1904" instrument_node="">[83]</span></a><span data-dcnode-id="1902" instrument_node=""> Corrupt individuals often utilize a complex corporate structure to launder their funds into the UK.</span><a data-dcnode-id="1900" href="#_ftn84"><span data-dcnode-id="1901" instrument_node="">[84]</span></a></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1897" instrument_node="">There is a correlation amongst cases involving corruption and the usage of private corporate vehicles, for example property being one of the main vehicles used to launder money into the UK.</span><a data-dcnode-id="1895" href="#_ftn85"><span data-dcnode-id="1896" instrument_node="">[85]</span></a></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1892" instrument_node="">Over seventy percent of two hundred cases according to a 2011 World Bank report highlighted the usage of secret shell companies to launder money into the UK and hide the identity of politicians involved in corruption.</span><a data-dcnode-id="1890" href="#_ftn86"><span data-dcnode-id="1891" instrument_node="">[86]</span></a></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1884"><span data-dcnode-id="1887" instrument_node="">The UK’s Metropolitan Police’s Proceeds of Corruption Unit (POCU) investigated more than seventy eight percent of property related corruption cases which convoluted the registration of anonymous companies in Crown Dependencies and Overseas Territories.</span><a data-dcnode-id="1885" href="#_ftn87"><span data-dcnode-id="1886" instrument_node="">[87]</span></a></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1882" instrument_node="">Research revealed that an excess of thirty-six thousand London properties were registered in offshore jurisdictions, with ten percent of properties owned by secret companies.</span><a data-dcnode-id="1880" href="#_ftn88"><span data-dcnode-id="1881" instrument_node="">[88]</span></a><span data-dcnode-id="1879" instrument_node=""> Therefore, it is imperative for the UK to focus on the transparency of the beneficial owners of such companies in order to tackle the problems surrounding the laundering of illicit funds.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1876" instrument_node="">The Tier 1 visa system for investors can also be used to secure UK residency and utilize the same to flow illegal funds into the UK.</span><a data-dcnode-id="1874" href="#_ftn89"><span data-dcnode-id="1875" instrument_node="">[89]</span></a><span data-dcnode-id="1873" instrument_node=""> Migrants can invest two million pounds into the economy and thus apply for a permanent UK residency after a passage of five years. Due to discrepancies in the system, it opens it to exploitation by corrupt individuals as there is no devoted system to conduct background checks.</span><a data-dcnode-id="1871" href="#_ftn90"><span data-dcnode-id="1872" instrument_node="">[90]</span></a><span data-dcnode-id="1870" instrument_node=""> The reliance is wholly placed upon asset management firms and banks to identify grounds for suspicious activities. Where an individual’s account is accepted by the bank, it is assumed by the home office that the requisite AML checks have been undertaken.</span><a data-dcnode-id="1868" href="#_ftn91"><span data-dcnode-id="1869" instrument_node="">[91]</span></a><span data-dcnode-id="1867" instrument_node=""> This loophole opens a path for corruption without conducting necessary checks. There is arguably no clarity as to how much money is invested into the UK and where it is invested. Thus, it is paramount that necessary checks are conducted alongside total transparency.</span></p><span data-dcnode-id="1865" instrument_node="">
