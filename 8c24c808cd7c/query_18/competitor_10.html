ti-money-laundering/"><i class="icon-envelope-icon" data-dcnode-id="712"></i><span data-dcnode-id="711" instrument_node="">Email</span></a></div></div></header><div class="entry-content" data-dcnode-id="412"><img alt="Artificial Intelligence for Anti-Money Laundering - An Analysis of Solutions" class="wp-post-image thumbnail_big lazy-loaded" data-dcnode-id="706" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e.jpg" data-srcset="" height="450" loading="lazy" sizes="(max-width: 540px) 100vw, (max-width: 768px) 70.3vw, (max-width: 992px) 700px, (max-width: 1220px) 700px, (max-width: 1562px) 835px, 1045px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e.jpg&amp;raw" srcset="https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e.jpg 950w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-150x150.jpg 150w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-50x50.jpg 50w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-100x100.jpg 100w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-200x200.jpg 200w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-400x400.jpg 400w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-320x270.jpg 320w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-640x450.jpg 640w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-335x280.jpg 335w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-670x450.jpg 670w, https://emerj.com/wp-content/uploads/2019/10/judges-gavel-and-handcuffs-on-american-dollars-636192812-5b0bac1b7f8f4bcfbe25126a0b79bb4e-690x327.jpg 690w" width="950"><p data-dcnode-id="700"><span data-dcnode-id="701" style="font-weight: 400;"><span data-dcnode-id="705" instrument_node="">Money laundering is a </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-fraud-banking/"><span data-dcnode-id="704" instrument_node="">financial fraud method</span></a><span data-dcnode-id="702" instrument_node=""> unique to what AI vendors and other solutions providers refer to in their “fraud detection” offerings. This is because the technique centers on making fraudulent money transfers that appear to be validated by two willing parties. </span></span></p><p data-dcnode-id="694"><span data-dcnode-id="695" style="font-weight: 400;"><span data-dcnode-id="699" instrument_node="">Instead, fraudsters can attempt to take over the </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/ai-in-banking-analysis/"><span data-dcnode-id="698" instrument_node="">bank</span></a><span data-dcnode-id="696" instrument_node=""> accounts of unsuspecting customers or clients and transfer money directly to them. However, AI and other technologies continue to develop and improve at the same time as fraudsters try to find new ways to commit crime.</span></span></p><p data-dcnode-id="691"><span data-dcnode-id="692" style="font-weight: 400;"><span data-dcnode-id="693" instrument_node="">In this article, we offer two examples of AI-enabled anti-money laundering solutions. Each of the companies claim their software can purportedly deliver a lower rate of false positives to their clients. The anti-money laundering software solutions we explain include:</span></span></p><ul data-dcnode-id="678"><li data-dcnode-id="686"><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Ayasdi AML: </span></b><span data-dcnode-id="687" style="font-weight: 400;"><span data-dcnode-id="688" instrument_node="">Ayasdi’s anomaly detection-based solution that could identify changes in customer behavior and analyze them for patterns related to fraudulent money transfers.</span></span></li><li data-dcnode-id="679"><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">SAS Anti-Money Laundering:</span></b><span data-dcnode-id="682" style="font-weight: 400;"><span data-dcnode-id="683" instrument_node=""> SAS’ solution which could be built upon their data warehouse platform to facilitate data transfer from multiple sources.</span></span><span data-dcnode-id="680" style="font-weight: 400;"><br data-dcnode-id="681"></span></li></ul><p data-dcnode-id="675"><span data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" instrument_node="">We begin our explanation of these anti-money laundering solutions with Ayasdi’s current offering.</span></span></p><h2 data-dcnode-id="672"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Ayasdi’s Anti Money-laundering Solution</span></strong></h2><p data-dcnode-id="660"><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ayasdi.com/"><span data-dcnode-id="670" style="font-weight: 400;"><span data-dcnode-id="671" instrument_node="">Ayasdi</span></span></a><span data-dcnode-id="661" style="font-weight: 400;"><span data-dcnode-id="668" instrument_node=""> is one vendor that offers an anti-money laundering solution to banks, </span><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-in-finance-a-comprehensive-overview/"><span data-dcnode-id="667" instrument_node="">financial institutions</span></a><span data-dcnode-id="665" instrument_node="">, and </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-in-healthcare-a-comprehensive-overview/"><span data-dcnode-id="664" instrument_node="">healthcare</span></a><span data-dcnode-id="662" instrument_node=""> companies. The software is an AI anomaly detection application that could detect deviations in customer behavior. </span></span></p><p data-dcnode-id="657"><span data-dcnode-id="658" style="font-weight: 400;"><span data-dcnode-id="659" instrument_node="">It purportedly analyzes each entity involved in a transaction to ensure a customer is willingly making a payment to a legitimate company or individual while reducing false positives that might be detected with traditional fraud detection methods.</span></span></p><p data-dcnode-id="643"><span data-dcnode-id="655" style="font-weight: 400;"><span data-dcnode-id="656" instrument_node="">False positives could result in more work for the rest of the team fighting money laundering alerts. Individual banks may not require a perfect false positive rate. However, it is in the best interest of vendors to offer a service that could discern between fraudulent payments that appear legitimate, and legitimate payments that appear fraudulent.</span></span><span data-dcnode-id="653" style="font-weight: 400;"><br data-dcnode-id="654"></span><span data-dcnode-id="651" style="font-weight: 400;"><br data-dcnode-id="652"></span><span data-dcnode-id="649" style="font-weight: 400;"><span data-dcnode-id="650" instrument_node="">Ayasdi claims their solution could do this by recognizing potentially fraudulent patterns in customer behavior as they develop over time. </span></span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/cdn.ayasdi.com/wp-content/uploads/2018/12/23111903/Ayasdi-AML-Deep-Dive.pdf"><span data-dcnode-id="647" style="font-weight: 400;"><span data-dcnode-id="648" instrument_node="">Ayasdi AML</span></span></a><span data-dcnode-id="644" style="font-weight: 400;"><span data-dcnode-id="645" instrument_node=""> contains five core capabilities:</span></span></p><ul data-dcnode-id="612"><li data-dcnode-id="637"><b data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Auto Feature Engineering:</span></b><span data-dcnode-id="640" instrument_node=""> </span><span data-dcnode-id="638" style="font-weight: 400;"><span data-dcnode-id="639" instrument_node="">Detecting data points within transactions and customer behavior with a high potential fraud likelihood.</span></span></li><li data-dcnode-id="631"><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Intelligent Segmentation:</span></b><span data-dcnode-id="634" instrument_node=""> </span><span data-dcnode-id="632" style="font-weight: 400;"><span data-dcnode-id="633" instrument_node="">Benchmarking certain behavioral patterns based on the transaction history and real time behavior of the client’s customer base.</span></span></li><li data-dcnode-id="625"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Behavioral Insights:</span></strong><span data-dcnode-id="628" instrument_node=""> </span><span data-dcnode-id="626" style="font-weight: 400;"><span data-dcnode-id="627" instrument_node="">Tracking daily changes in customer behavior as well as which customers have deviated the most.</span></span></li><li data-dcnode-id="619"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Intelligent Event Triage:</span></strong><span data-dcnode-id="622" instrument_node=""> </span><span data-dcnode-id="620" style="font-weight: 400;"><span data-dcnode-id="621" instrument_node="">Determining whether a given deviation in customer behavior is acceptable or if it needs to be investigated further.</span></span></li><li data-dcnode-id="613"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Contextual Alert Information:</span></strong><span data-dcnode-id="616" instrument_node=""> </span><span data-dcnode-id="614" style="font-weight: 400;"><span data-dcnode-id="615" instrument_node="">Automatically providing the correct information to allow human employees to escalate an alert to investigators.&nbsp;</span></span></li></ul><p data-dcnode-id="609"><span data-dcnode-id="610" style="font-weight: 400;"><span data-dcnode-id="611" instrument_node="">The graphic below from Ayasdi depicts the flow of data through each of these capabilities in order to provide clients with accurate results. Our readers may find it helpful to refer back to this graphic while reading about each capability in order to get a better sense of how they link together:</span></span></p><figure aria-describedby="caption-attachment-26051" class="wp-caption aligncenter" data-dcnode-id="605" id="attachment_26051"><img alt="" class="wp-image-26051 lazy-loaded" data-dcnode-id="608" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering.png" data-srcset="" height="356" sizes="(max-width: 671px) 100vw, 671px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering.png&amp;raw" srcset="https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering.png 858w, https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering-320x170.png 320w, https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering-640x339.png 640w, https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering-335x178.png 335w, https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering-670x355.png 670w, https://emerj.com/wp-content/uploads/2019/10/Auto-Feature-Engineering-690x366.png 690w" width="671"><figcaption class="wp-caption-text" data-dcnode-id="606" id="caption-attachment-26051"><span data-dcnode-id="607" instrument_node="">Ayasdi’s AML product visualization – representing the steps required to use their solution. Source: Ayasdi.</span></figcaption></figure><p data-dcnode-id="602"><span data-dcnode-id="603" style="font-weight: 400;"><span data-dcnode-id="604" instrument_node="">The first of Ayasdi AML’s core capabilities is auto feature engineering which is a core function of finding potential money laundering attempts.</span></span></p><h3 data-dcnode-id="599"><b data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Auto Feature Engineering</span></b></h3><p data-dcnode-id="596"><span data-dcnode-id="597" style="font-weight: 400;"><span data-dcnode-id="598" instrument_node="">Ayasdi’s Auto Feature Engineering tool enables the AML solution to recognize aspects of transactional data that might be considered anomalies related to fraud, but on a more granular scale. This is done so the software could exclusively recognize patterns that are potentially harmful and not acceptable deviations in transaction data. These types of patterns could serve as early indicators of money laundering, and some clients may find it important to keep track of them as they emerge.</span></span></p><h3 data-dcnode-id="591"><b data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Intelligent Segmentation</span></b><span data-dcnode-id="592" style="font-weight: 400;"><br data-dcnode-id="593"></span></h3><p data-dcnode-id="588"><span data-dcnode-id="589" style="font-weight: 400;"><span data-dcnode-id="590" instrument_node="">Intelligent segmentation is another way of exploring how to divide up a customer base so that the machine learning model could analyze a sizeable amount of data at a time. This is done by creating thresholds of customer behavior based on the rate of deviation from each customer’s typical behavior.&nbsp;</span></span></p><p data-dcnode-id="577"><span data-dcnode-id="586" style="font-weight: 400;"><span data-dcnode-id="587" instrument_node="">Each threshold carries a different level of priority, which allows client companies to focus on accounts that have seen the most deviation first. Ayasdi claims this could also help their clients reduce false positives because more specific customer segments could lead to a more thorough analysis.</span></span><span data-dcnode-id="584" style="font-weight: 400;"><br data-dcnode-id="585"></span><span data-dcnode-id="582" style="font-weight: 400;"><br data-dcnode-id="583"></span><span data-dcnode-id="580" style="font-weight: 400;"><span data-dcnode-id="581" instrument_node="">Below is another graphic from Ayasdi which shows how more typical customer segmentation tools could produce uneven groups of individuals. This means each threshold must be set lower than the client knows is necessary, which leads to less accurate results and more false positives:</span></span><span data-dcnode-id="578" style="font-weight: 400;"><br data-dcnode-id="579"></span></p><figure aria-describedby="caption-attachment-26052" class="wp-caption aligncenter" data-dcnode-id="573" id="attachment_26052"><img alt="How Ayasdi's AML Intelligence Segmentation Works" class="wp-image-26052 lazy-loaded" data-dcnode-id="576" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation.png" data-srcset="" height="286" loading="lazy" sizes="(max-width: 643px) 100vw, 643px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation.png&amp;raw" srcset="https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation.png 861w, https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation-320x142.png 320w, https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation-640x285.png 640w, https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation-335x149.png 335w, https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation-670x298.png 670w, https://emerj.com/wp-content/uploads/2019/10/Intelligent_Segementation-690x307.png 690w" width="643"><figcaption class="wp-caption-text" data-dcnode-id="574" id="caption-attachment-26052"><span data-dcnode-id="575" instrument_node="">Ayasdi’s visualization of their AML Intelligence Segmentation process. Source: Ayasdi.</span></figcaption></figure><h3 data-dcnode-id="568"><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Behavioral Insights</span></b><span data-dcnode-id="569" style="font-weight: 400;"><br data-dcnode-id="570"></span></h3><p data-dcnode-id="565"><span data-dcnode-id="566" style="font-weight: 400;"><span data-dcnode-id="567" instrument_node="">Behavioral Insights is an analysis portion of the Ayasdi AML dashboard which produces daily lists of any changes in customer behavior across all of their transactional data. </span></span></p><p data-dcnode-id="562"><span data-dcnode-id="563" style="font-weight: 400;"><span data-dcnode-id="564" instrument_node="">Behavior metrics could include how far each customer deviates from their normal behavior over time, or how that rate compares to other customers. This comparison could be scaled to only cover customers in the same segment or could be brought out to the entire customer base.</span></span></p><p data-dcnode-id="559"><span data-dcnode-id="560" style="font-weight: 400;"><span data-dcnode-id="561" instrument_node="">Using the behavioral insights interface, analysts could organize transactions showing behavioral deviations based on how much their patterns have changed. They could also organize them according to how much each transaction is worth and compare that to the rate of deviation. </span></span></p><p data-dcnode-id="556"><span data-dcnode-id="557" style="font-weight: 400;"><span data-dcnode-id="558" instrument_node="">This likely helps users close in on individual money laundering attempts as one could track the dollar amounts as they rise along with a rise in transactions with new or suspicious entities.</span></span></p><h3 data-dcnode-id="551"><b data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Intelligent Event Triage</span></b><span data-dcnode-id="552" style="font-weight: 400;"><br data-dcnode-id="553"></span></h3><p data-dcnode-id="546"><span data-dcnode-id="549" style="font-weight: 400;"><span data-dcnode-id="550" instrument_node="">Ayasdi AML comes with an event triage tool that allows for identification of the most important information for investigators to use or analyze in the future. This purportedly results in a smaller amount of events extracted from transactional data than other solutions. That said, these results are purported to have a higher chance of being used to discover money laundering or indicative behavior.</span></span><span data-dcnode-id="547" style="font-weight: 400;"><br data-dcnode-id="548"></span></p><h3 data-dcnode-id="541"><b data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Contextual Alert Information</span></b><span data-dcnode-id="542" style="font-weight: 400;"><br data-dcnode-id="543"></span></h3><p data-dcnode-id="538"><span data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" instrument_node="">Money laundering investigators need sufficient context on an alert in order to be able to track down threats. If there is no data that can serve as evidence of an attempt at a fraudulent transaction, an investigator would not be able to find a relevant starting place to do their job. This information might include the ID numbers and account history of the affected accounts, and the exact time the alert occurred.&nbsp;</span></span></p><p data-dcnode-id="535"><span data-dcnode-id="536" style="font-weight: 400;"><span data-dcnode-id="537" instrument_node="">Ayasdi claims their solution provides this context which also allows them to make faster decisions. Each alert purportedly comes with a visual representation of the behavioral pattern that the solution marked as suspicious. The company also claims the software supplies relevant data regarding this suspicious behavior so that investigators have an audit trail to work from.</span></span></p><h3 data-dcnode-id="530"><b data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Evidence of Success with Ayasdi AML</span></b><span data-dcnode-id="531" style="font-weight: 400;"><br data-dcnode-id="532"></span></h3><h4 data-dcnode-id="527"><b data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Correspondent Banking</span></b></h4><p data-dcnode-id="519"><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">According to a </span></span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/cdn.ayasdi.com/wp-content/uploads/2019/09/23124409/Correspondent-Banking-Case-Study-AML.pdf"><span data-dcnode-id="523" style="font-weight: 400;"><span data-dcnode-id="524" instrument_node="">case study</span></span></a><span data-dcnode-id="520" style="font-weight: 400;"><span data-dcnode-id="521" instrument_node=""> from Ayasdi’s website, the company helped a correspondent bank adopt their anti money-laundering solution. The bank’s initial goal was to improve efficiency in stopping money laundering by&nbsp; 3-5%. That said, they also needed to adapt an AI solution which was a more complex user experience as opposed to their previous manual operations.</span></span></p><p data-dcnode-id="516"><span data-dcnode-id="517" style="font-weight: 400;"><span data-dcnode-id="518" instrument_node="">Ayasdi worked with their client to analyze the financial messages sent through banking code, or Swift messages, that were related to their customers’ transactions. The company claims this extra source of data helped the bank find new transaction criteria to analyze such as specific attributes of transactional data, geographical data, and chronological data. All of this also made it easier to customize customer segments.</span></span></p><p data-dcnode-id="513"><span data-dcnode-id="514" style="font-weight: 400;"><span data-dcnode-id="515" instrument_node="">The case study states the correspondent bank reduced their required amount of human investigators for money laundering by 20%. The initial partnership was an eight week process requiring two data scientists working with an Ayasdi project manager. </span></span></p><p data-dcnode-id="509"><span data-dcnode-id="511" style="font-weight: 400;"><span data-dcnode-id="512" instrument_node="">Two domain experts from the bank were present, which most likely means they advised the Ayasdi staff on individual banking issues. The client bank purportedly moved forward with Ayasdi’s solution and employed it across their entire enterprise.</span></span><b data-dcnode-id="510"></b></p><h3 data-dcnode-id="504"><b data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">HSBC Case Study</span></b><b data-dcnode-id="505"><br data-dcnode-id="506"></b></h3><p data-dcnode-id="493"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-case-studies/bank-reduces-money-laundering-investigation-effort-with-ai/"><span data-dcnode-id="502" style="font-weight: 400;"><span data-dcnode-id="503" instrument_node="">HSBC Bank</span></span></a><span data-dcnode-id="499" style="font-weight: 400;"><span data-dcnode-id="500" instrument_node=""> worked with Ayasdi to adopt the company’s AML solution, and we have </span></span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-case-studies/bank-reduces-money-laundering-investigation-effort-with-ai/"><span data-dcnode-id="497" style="font-weight: 400;"><span data-dcnode-id="498" instrument_node="">conducted a case study</span></span></a><span data-dcnode-id="494" style="font-weight: 400;"><span data-dcnode-id="495" instrument_node=""> which describes this process in detail. According to our findings, Ayasdi’s solution reduced the bank’s rate of false positives by 20%. Additionally, the bank said that the new technology helped them identify several cases of money laundering as well as behavioral patterns that had direct links to laundering attempts.</span></span></p><p data-dcnode-id="488"><span data-dcnode-id="491" style="font-weight: 400;"><span data-dcnode-id="492" instrument_node="">HSBC’s IT team worked closely with Ayasdi so that the vendor could access their prior AML data. The bank’s internal modeling review team helped create models for customer behavior that could be easily read by both HSBC’s data scientists and bankers.</span></span><span data-dcnode-id="489" style="font-weight: 400;"><br data-dcnode-id="490"></span></p><h2 data-dcnode-id="485"><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">SAS Anti-Money Laundering</span></b></h2><p data-dcnode-id="474"><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sas.com/en_us/software/anti-money-laundering.html"><span data-dcnode-id="483" style="font-weight: 400;"><span data-dcnode-id="484" instrument_node="">SAS</span></span></a><span data-dcnode-id="480" style="font-weight: 400;"><span data-dcnode-id="481" instrument_node=""> offers an </span></span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sas.com/en_us/software/anti-money-laundering/features-list.html"><span data-dcnode-id="478" style="font-weight: 400;"><span data-dcnode-id="479" instrument_node="">anti-money laundering</span></span></a><span data-dcnode-id="475" style="font-weight: 400;"><span data-dcnode-id="476" instrument_node=""> solution which they claim can use data sources to find trends pointing to financial crime. A client insurer can use the software to analyze transactions based on data and trends from their existing systems such as CRM, another customer record system, or those that drive customer-facing web applications.&nbsp;</span></span></p><p data-dcnode-id="471"><span data-dcnode-id="472" style="font-weight: 400;"><span data-dcnode-id="473" instrument_node="">The solution consists of anomaly detection software accompanied by a dashboard with multiple visualization capabilities. </span></span></p><p data-dcnode-id="466"><span data-dcnode-id="469" style="font-weight: 400;"><span data-dcnode-id="470" instrument_node="">In addition to alerts and event reporting, the software can visualize threats and any associated transactions or customer behavioral trends that may add context. Analysts can use this dashboard to detect possible financial crime before they receive an alert from the software.</span></span><span data-dcnode-id="467" style="font-weight: 400;"><br data-dcnode-id="468"></span></p><p data-dcnode-id="463"><span data-dcnode-id="464" style="font-weight: 400;"><span data-dcnode-id="465" instrument_node="">Below is a graphic from SAS that explains how users can track which accounts are transferring money and where that money goes.</span></span></p><p data-dcnode-id="458"><span data-dcnode-id="461" style="font-weight: 400;"><span data-dcnode-id="462" instrument_node=""> The “Sankey diagram” purportedly provides records of credits and debits associated with each account in the timeline along with the variation in volume of funds within each entity:</span></span><span data-dcnode-id="459" style="font-weight: 400;"><br data-dcnode-id="460"></span></p><figure aria-describedby="caption-attachment-26053" class="wp-caption aligncenter" data-dcnode-id="454" id="attachment_26053"><img alt="How SAS' AML Solution Tracks Where Money is Flowing" class="wp-image-26053 lazy-loaded" data-dcnode-id="457" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2019/10/SASAML.png" data-srcset="" height="269" loading="lazy" sizes="(max-width: 693px) 100vw, 693px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/wp-content/uploads/2019/10/SASAML.png&amp;raw" srcset="https://emerj.com/wp-content/uploads/2019/10/SASAML.png 1116w, https://emerj.com/wp-content/uploads/2019/10/SASAML-320x124.png 320w, https://emerj.com/wp-content/uploads/2019/10/SASAML-640x248.png 640w, https://emerj.com/wp-content/uploads/2019/10/SASAML-335x130.png 335w, https://emerj.com/wp-content/uploads/2019/10/SASAML-670x260.png 670w, https://emerj.com/wp-content/uploads/2019/10/SASAML-690x268.png 690w, https://emerj.com/wp-content/uploads/2019/10/SASAML-1045x405.png 1045w" width="693"><figcaption class="wp-caption-text" data-dcnode-id="455" id="caption-attachment-26053"><span data-dcnode-id="456" instrument_node="">Source: SAS.</span></figcaption></figure><p data-dcnode-id="436"><span data-dcnode-id="452" style="font-weight: 400;"><span data-dcnode-id="453" instrument_node="">SAS’s website lists a </span></span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sas.com/en_us/customers/ayalon-insurance.html"><span data-dcnode-id="450" style="font-weight: 400;"><span data-dcnode-id="451" instrument_node="">case study</span></span></a><span data-dcnode-id="447" style="font-weight: 400;"><span data-dcnode-id="448" instrument_node=""> in which they claim to have helped </span></span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ayalon-ins.co.il/about-us/investor-relations-english/about-ayalon-insurance-company/"><span data-dcnode-id="445" style="font-weight: 400;"><span data-dcnode-id="446" instrument_node="">Ayalon Insurance</span></span></a><span data-dcnode-id="442" style="font-weight: 400;"><span data-dcnode-id="443" instrument_node=""> in Israel, which is a member of the country’s Financial Action Task Force (</span></span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fatf-gafi.org/about/"><span data-dcnode-id="440" style="font-weight: 400;"><span data-dcnode-id="441" instrument_node="">FATF</span></span></a><span data-dcnode-id="437" style="font-weight: 400;"><span data-dcnode-id="438" instrument_node="">). </span></span></p><p data-dcnode-id="430"><span data-dcnode-id="431" style="font-weight: 400;"><span data-dcnode-id="435" instrument_node="">In order to </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-compliance-banking/"><span data-dcnode-id="434" instrument_node="">remain compliant</span></a><span data-dcnode-id="432" instrument_node=""> with these new regulations, Ayalon chose SAS as a platform on which to anchor new anti-money laundering and fraud initiatives.&nbsp;</span></span></p><p data-dcnode-id="427"><span data-dcnode-id="428" style="font-weight: 400;"><span data-dcnode-id="429" instrument_node="">This project was likely facilitated by Ayalon’s previous work with SAS in which they developed a new data warehouse made to organize data more efficiently. </span></span></p><p data-dcnode-id="424"><span data-dcnode-id="425" style="font-weight: 400;"><span data-dcnode-id="426" instrument_node="">According to the case study, thousands of Ayalon’s employees were already using SAS’ data warehouse daily prior to the adoption of the anti-money laundering solution.&nbsp;</span></span></p><p data-dcnode-id="421"><span data-dcnode-id="422" style="font-weight: 400;"><span data-dcnode-id="423" instrument_node="">Ayalon states they chosen SAS’ new solution because it can handle highly complex transactions with multiple criteria to check for validation. They also claimed SAS was able to help them finish the project within a short deadline that did not allow for experiments. </span></span></p><p data-dcnode-id="418"><span data-dcnode-id="419" style="font-weight: 400;"><span data-dcnode-id="420" instrument_node="">That said, AI-powered anti-money laundering solutions would usually require some time for the machine learning model to adjust to the idiosyncrasies of each client data stack. Because of this, Ayalon likely means that the software did not take long to adjust to their current workflows.</span></span></p><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">&nbsp;</span></p><p data-dcnode-id="413"><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Header Image Credit: Investopedia</span></em></p></div><div class="share-bar footer-share-bar" data-dcnode-id="393"><div class="share-to" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Share to:</span></div><div class="socials" data-dcnode-id="394"><a class="ln" data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/sharing/share-offsite/%3Furl%3Dhttps%253A%252F%252Femerj.com%252Fai-sector-overviews%252Fai-anti-money-laundering%252F" target="_blank"><i class="icon-linked-in-footer" data-dcnode-id="409"></i><span data-dcnode-id="408" instrument_node="">LinkedIn</span></a><span data-dcnode-id="406" instrument_node=""> </span><a class="tw" data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DArtificial%2BIntelligence%2Bfor%2BAnti-Money%2BLaundering%2B%25E2%2580%2593%2BAn%2BAnalysis%2Bof%2BSolutions%250D%250Dhttps%3A%252F%252Femerj.com%252Fai-sector-overviews%252Fai-anti-money-laundering%252F" target="_blank"><i class="icon-twitter-footer" data-dcnode-id="405"></i><span data-dcnode-id="404" inst _node=""> </span><div class="related-posts-wrap" data-dcnode-id="221"><div class="related-posts-header" data-dcnode-id="365"><h5 data-dcnode-id="366"><i class="icon-related-posts-icon" data-dcnode-id="370"></i><span data-dcnode-id="369" instrument_node=""> Related posts </span><span data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">(5)</span></span></h5></div><div class="row item-container article-item" data-dcnode-id="337"><div class="col-4 image-container" data-dcnode-id="358"><div class="image-wrap" data-dcnode-id="359"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-dementia-diagnosis-genetic-analysis-speech-analysis/"><img alt="Artificial Intelligence for Dementia Diagnosis - Genetic Analysis, Speech Analysis, and More" class="lazy-hidden wp-post-image" data-dcnode-id="364" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-320x270.png" data-srcset="https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more.png 1508w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-150x150.png 150w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-50x50.png 50w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-100x100.png 100w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-200x200.png 200w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-400x400.png 400w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-320x270.png 320w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-640x540.png 640w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-335x280.png 335w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-670x560.png 670w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-690x292.png 690w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-1380x584.png 1380w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-1045x442.png 1045w, https://emerj.com/wp-content/uploads/2018/04/artificial-intelligence-for-dementia-diagnosis-genetic-analysis-speech-analysis-and-more-1045x442.png 1045w" height="270" loading="lazy" sizes="(max-width: 540px) 100vw, (max-width: 768px) 70.3vw, (max-width: 992px) 206px, (max-width: 1220px) 206px, (max-width: 1562px) 250px, 320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="320"></a><span data-dcnode-id="362" instrument_node=""> </span><time class="time time-since l-rubik" data-dcnode-id="360" datetime="May 20, 2019"><span data-dcnode-id="361" instrument_node=""> May 20, 2019 </span></time></div></div><div class="col-8 post-intro" data-dcnode-id="338"><div class="item-category-container" data-dcnode-id="351"><div class="item" data-dcnode-id="355"><a class="line-1-row" data-dcnode-id=
