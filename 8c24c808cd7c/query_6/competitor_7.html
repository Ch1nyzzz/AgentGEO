</span><div class="grop-single_post_warp post-20577 resource type-resource status-publish has-post-thumbnail hentry category-child-trafficking category-data category-domestic-workers category-forced-labor category-labor-exploitation category-labor-trafficking category-migration category-sex-trafficking" data-dcnode-id="291" id="post-20577"><span data-dcnode-id="680" instrument_node="">

</span><img alt="Human trafficking" class="lazyloaded" data-dcnode-id="677" data-src="https://humantraffickingsearch.org/wp-content/uploads/2021/12/earth-2254769__340-1.webp" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/wp-content/uploads/2021/12/earth-2254769__340-1.webp&amp;raw"><noscript data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">&lt;img src="https://humantraffickingsearch.org/wp-content/uploads/2021/12/earth-2254769__340-1.webp" alt="Human trafficking"&gt;</span></noscript><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><h2 class="grop-post_title grop-post_title_resource" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Human trafficking</span></h2><span data-dcnode-id="669" instrument_node="">
</span><p class="grop-post_meta grop-post_meta_resource" data-dcnode-id="666"><i class="fa fa-pencil" data-dcnode-id="668"></i><span data-dcnode-id="667" instrument_node="">&nbsp;Author: Migration Data Portal </span></p><span data-dcnode-id="665" instrument_node="">
</span><p class="grop-post_meta grop-post_meta_resource" data-dcnode-id="661"><span data-dcnode-id="664" instrument_node=""> </span><i class="fa fa-clock-o" data-dcnode-id="663"></i><span data-dcnode-id="662" instrument_node="">&nbsp;Year Published:  2021</span></p><span data-dcnode-id="660" instrument_node="">
</span><p class="grop-post_meta grop-post_meta_resource" data-dcnode-id="653"><span data-dcnode-id="659" instrument_node=""> </span><i class="fa fa-link" data-dcnode-id="658"></i><span data-dcnode-id="657" instrument_node="">&nbsp;Link to Resource: 		</span><a class="text" data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/themes/human-trafficking"><span data-dcnode-id="656" instrument_node="">Read More</span></a><span data-dcnode-id="654" instrument_node="">
</span></p><span data-dcnode-id="652" instrument_node="">
</span></header><span data-dcnode-id="650" instrument_node="">
</span><div class="grop-sigl_content" data-dcnode-id="374"><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The crime of human trafficking is complex and dynamic, taking place in a wide variety of contexts and difficult to detect. One of the greatest challenges in developing targeted counter-trafficking responses and measuring their impact is the lack of reliable, high-quality data related to the scale of human trafficking and the profile of victims.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="645" instrument_node="">The need for improved international response to human trafficking and commitment to its eradication is illustrated by its prominent inclusion in the targets of the&nbsp;</span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationdataportal.org/sdg"><span data-dcnode-id="644" instrument_node="">United Nations (UN) Sustainable Development Goals (SDGs)</span></a><span data-dcnode-id="642" instrument_node="">&nbsp;and the&nbsp;</span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//migrationdataportal.org/global-compact-for-migration"><span data-dcnode-id="641" instrument_node="">Global Compact for Safe, Orderly, and Regular Migration</span></a><span data-dcnode-id="639" instrument_node="">&nbsp;(GCM). Eradicating human trafficking is addressed specifically in goals 5.2, 8.7 and 16.2. The GCM’s 10th Objective also calls for specific measures to prevent and combat trafficking in persons in the context of international migration.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="633"><img alt="" class="alignnone size-medium wp-image-20578 lazyloaded" data-dcnode-id="636" data-sizes="(max-width: 276px) 100vw, 276px" data-src="https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png" data-srcset="https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png 276w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-941x1024.png 941w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-768x835.png 768w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2.png 1060w" height="300" sizes="(max-width: 276px) 100vw, 276px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png&amp;raw" srcset="https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png 276w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-941x1024.png 941w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-768x835.png 768w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2.png 1060w" width="276"><noscript data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">&lt;img class="alignnone size-medium wp-image-20578" src="https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png" alt="" width="276" height="300" srcset="https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-276x300.png 276w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-941x1024.png 941w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2-768x835.png 768w, https://humantraffickingsearch.org/wp-content/uploads/2021/12/CTDC-map-2020-bis-2.png 1060w" sizes="(max-width: 276px) 100vw, 276px" /&gt;</span></noscript></p><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="630" style="font-weight: 600;"><span data-dcnode-id="631" instrument_node="">Definition</span></h2><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">The&nbsp;</span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osce.org/odihr/19223%3Fdownload%3Dtrue"><span data-dcnode-id="627" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons&nbsp;</span></a><span data-dcnode-id="625" instrument_node="">defines human trafficking or trafficking in persons:</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="614"><em data-dcnode-id="615"><span data-dcnode-id="622" instrument_node="">“Trafficking in Persons”… mean[s] the recruitment, transportation, transfer, harbouring or receipt of persons,&nbsp;</span><strong data-dcnode-id="620" style="font-weight: 600;"><span data-dcnode-id="621" instrument_node="">by means of the threat or use of force or other forms of coercion</span></strong><span data-dcnode-id="619" instrument_node="">, of abduction, of fraud, of deception, of the abuse of power or of a position of vulnerability&nbsp;</span><strong data-dcnode-id="617" style="font-weight: 600;"><span data-dcnode-id="618" instrument_node="">or of the giving or receiving of payments or benefits to achieve the consent of a person having control over another person, for the purpose of exploitation.</span></strong><span data-dcnode-id="616" instrument_node="">&nbsp;Exploitation shall include, at a minimum, the exploitation of the prostitution of others or other forms of sexual exploitation, forced labour or services, slavery or practices similar to slavery, servitude or the removal of organs. (Article 3, paragraph (a)).</span></em></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">The Protocol further elaborates that the consent of a trafficked person may be rendered irrelevant when obtained through improper means:</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607"><em data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">The consent of a victim of trafficking in persons to the intended exploitation set forth in subparagraph (a) of this article shall be irrelevant where any of the means set forth in subparagraph (a) have been used; (Article 3, paragraph (b)).</span></em></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">In the case of trafficked children, the Protocol elaborates that the vulnerable status of children makes it impossible for them to consent regardless of whether any improper means were used or not:</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="596"><em data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The recruitment, transportation, transfer, harbouring or receipt of a child for the purpose of exploitation shall be considered “trafficking in persons” even if this does not involve any of the means set forth in subparagraph (a) of this article; (Article 3, paragraph (c)).</span></em><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
</span><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">“Child” shall mean any person under eighteen. (Article 3, paragraph (d)).</span></em></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Recent trends</span></h2><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="591" instrument_node="">Since the early 2000s, the proportion of identified cases of trafficking for sexual exploitation has in general&nbsp;</span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ctdatacollaborative.org/story/exploitation-victims-trends" style="font-weight: 600;"><span data-dcnode-id="590" instrument_node="">declined</span></a><span data-dcnode-id="588" instrument_node="">, while the share of identified cases of trafficking for forced labour has generally increased, as identification of such cases has improved. However, there are regional differences in the rates of both trafficking for sexual exploitation and forced labour. For example, data from UNODC and CTDC show that trafficking for forced labour has a higher rate in Africa and the Middle East than trafficking for sexual exploitation, while the opposite is true for regions such as Europe and Northern America.</span><sup data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">1</span></sup><span data-dcnode-id="585" instrument_node="">&nbsp;This is partly reflected in the CTDC data above, where an increase of available case data from Northern America from 2015 onwards increased the proportion of victims trafficked for sexual exploitation in the dataset.&nbsp;</span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">&nbsp;&nbsp;</span></em></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&nbsp;</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">A large proportion of victims identified are female, as human trafficking had previously tended to be seen as a crime which affects mostly females who are trafficked for sexual exploitation. Over time, a higher percentage of men have been identified as it has been acknowledged that men can also be vulnerable to many forms of human trafficking, including sexual exploitation, and the identification of such cases has improved. The proportion of children relative to adults for males and females is about the same.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">CTDC data also show&nbsp;differences in the routes undertaken by victims of trafficking. Nearly 80 per cent of international human trafficking journeys cross through official border control points, such as airports and land border control points. Victims of labour exploitation are more likely to be trafficked through official border control points, while victims of trafficking for sexual exploitation account for more cases crossing borders via locations that don’t have official border control points. This includes irregular routes, such as those across the sea or cross-country. Children are also more likely than adults to be trafficked via routes that don’t have official border control points.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">&nbsp;</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Half of the victims identified by CTDC partners are under 26. Nearly a quarter of them are children. In fact, the largest age group in the whole distribution is 15 to 17 years old.</span></p><span data-dcnode-id="566" instrument_node="">
</span><h2 data-dcnode-id="564" style="font-weight: 600;"><span data-dcnode-id="565" instrument_node="">Data sources</span></h2><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The main sources of data on human trafficking globally are based on information provided by identified victims. These are usually collected by a range of different actors, including law enforcement, the judiciary, and non-governmental organizations providing protection and assistance to victims.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="559" instrument_node="">Several UN agencies and international non-governmental organizations (NGOs) have collaborated to produce data sources on the profiles of victims of human trafficking, the prevalence of human trafficking, and on related phenomena such as forced labour and forced marriage.</span><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">
</span><b data-dcnode-id="554"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Operational case data and victim profiles</span></strong></b></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">In the course of protecting and providing services to victims, counter-trafficking actors frequently collect individual-level, operational case data. IOM has been providing direct assistance to victims of human trafficking since the mid-1990s and assists approximately 8,000 victims each year globally. Through its case management activities, the Organization has developed the largest database of victim of trafficking case data in the world, with information on over 55,000 individual cases.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Operational data from counter-trafficking organizations are often highly sensitive and pertain to individuals, which raises a range of privacy and civil liberty concerns where the risk of identifying data subjects can be high and the consequences severe. While many organizations and governments around the world collect data on cases of human trafficking, disaggregated data has not been easily accessible to external stakeholders or has not been frequently shared between relevant actors in the past due to the sensitivity of its content, and data protection and confidentiality considerations.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">To overcome these challenges, in 2017, IOM made its own data publicly available online through the Counter Trafficking Data Collaborative (CTDC), along with combined data from other leading counter-trafficking organizations with significant case-level datasets.</span></p><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="541" style="font-weight: 600;"><span data-dcnode-id="542" instrument_node="">The Counter Trafficking Data Collaborative</span></h3><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">The Counter Trafficking Data Collaborative (CTDC) is the first global data hub on human trafficking, with data contributed by organizations from around the world. The resulting dataset is the largest of its kind globally, with information on over 108,000&nbsp;individual cases of human trafficking visualized throughout the site, including through an interactive global map. An anonymized version of this dataset is publicly available to download. By putting such data in the public domain, the goal of CTDC is to break down information-sharing barriers and equip the counter-trafficking community with up to date, reliable data on human trafficking. As new data from contributing partners are added, CTDC will continue to expand in scope, featuring new datasets from diverse counter-trafficking actors and disseminating standards on sharing trafficking-case data.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">IOM’s Counter Trafficking Data Collaborative has made great progress in overcoming data obstacles, but more work is needed throughout the counter-trafficking community to agree on common standards and methods of data sharing and applicability. Disaggregated case-level data are the most detailed source of information on human trafficking and should thus play a vital part of any meaningful analysis on the phenomenon.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="530"><b data-dcnode-id="531"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">National reporting mechanisms</span></strong></b></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Another key source of trafficking information is official reports on administrative data compiled by governments (or other central reporting bodies) on human trafficking cases within their national jurisdictions.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">UNODC surveys governments on trafficking victims identified in their respective countries for the Global Report on Trafficking in Persons, using a common questionnaire with a standard set of indicators, and then aggregates the results.&nbsp; The&nbsp;</span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unodc.org/unodc/data-and-analysis/glotip.html"><span data-dcnode-id="524" instrument_node="">most recent global report</span></a><span data-dcnode-id="522" instrument_node="">&nbsp;was produced in 2018. In 2016, this exercise produced data on more than 24,000 identified victims of trafficking from 97 governments, a peak compared to the previous years. Data are largely published in the form of total numbers disaggregated by variables such as sex, age, and type of exploitation, wherever possible. In addition to government surveys, UNODC collects official information such as police reports that are available in the public domain, and some information from inter-governmental organisations and NGOs.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="516"><b data-dcnode-id="517"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Estimating prevalence of human trafficking</span></strong></b></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">There are currently no global or regional estimates of the prevalence of human trafficking.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Some national estimates have been developed, including using human trafficking administrative data:</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="505"><strong data-dcnode-id="507" style="font-weight: 600;"><span data-dcnode-id="508" instrument_node="">Multiple Systems Estimation</span></strong><span data-dcnode-id="506" instrument_node="">&nbsp;is the methodology used to estimate the total (unidentified and identified) victims of trafficking at country level. This is based on the analysis of the overlap of multiple lists of human trafficking cases provided by different actors in the counter-trafficking field, such as NGOs, law enforcement, other authorities and international organizations. MSE depends upon the existence of various databases of identified victims of human trafficking in the country of implementation. A number of other technical assumptions should also be met. For example, it must be possible for more than one entity recording administrative data to be able to independently identify a victim of trafficking. Researchers developing the method have estimated that it could potentially be used in approximately 50 countries around the world. Initial estimates have already been conducted in several countries, including the UK and the Netherlands.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Relatively few examples of estimates of related forms of exploitation exist:</span></p><span data-dcnode-id="501" instrument_node="">
</span><ul data-dcnode-id="480"><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="489"><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilo.org/wcmsp5/groups/public/%40dgreports/%40dcomm/documents/publication/wcms_575479.pdf"><b data-dcnode-id="496"><strong data-dcnode-id="497"><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">2017 Global Estimates of Modern Slavery</span></em></strong></b></a><b data-dcnode-id="491"><strong data-dcnode-id="492"><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">&nbsp;</span></em></strong></b><span data-dcnode-id="490" instrument_node="">– This is a global estimate of the prevalence of the human-trafficking-related crimes of forced labour and forced marriage, produced by the International Labour Organisation (ILO) and the Walk Free Foundation (WFF), in collaboration with IOM. The 2017 report estimates that 40 million people were victims of modern slavery in any given day in 2016. Out of these, approximately 25 million people were in forced labour and another 15 million people were in a forced marriage. Data from IOM’s human trafficking database on sexual exploitation and child exploitation were used for the estimates.</span></li><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="482"><b data-dcnode-id="484"><strong data-dcnode-id="485"><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Estimating forced labour, forced recruitment and abductions in displacement contexts</span></em></strong></b><span data-dcnode-id="483" instrument_node="">. IOM is developing a series of comparable estimates on prevalence of forced labour, forced marriage, forced recruitment into armed groups and abductions among Internally Displaced People (IDPs) and their families, in partnership with ILO and WFF. This is a pilot research initiative in three countries with large numbers of IDPs and where IOM has substantial humanitarian operations and suitable sampling frames. The report with the findings, methodology and recommendations will be published in 2020.</span></li><span data-dcnode-id="481" instrument_node="">
</span></ul><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">&nbsp;</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="472"><b data-dcnode-id="473"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Trafficking in humanitarian settings and large-scale migration flows</span></strong></b></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Humanitarian crises such as those associated with conflicts or natural disasters may exacerbate pre-existing trafficking trends and give rise to new ones. While some forms of trafficking could be a direct result of crises, such as exploitative sexual services demanded by armed groups or the forced recruitment of child soldiers, others are less evident, with traffickers thriving on the widespread human, material, social and economic losses caused by crises and the inability of families and communities to protect themselves and their children.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">IOM works to combat trafficking and protect trafficked persons in humanitarian settings. To address the acute need for data for evidence-based programming in these location, IOM has been using its Displacement Tracking Matrix to regularly collect data on risks and issues relevant to human trafficking and exploitation in crises. In addition, IOM with partners is also working to produce prevalence estimates on issues related to human trafficking.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Locations of recent regular data collection with human trafficking indicators include Cox’s Bazar in Bangladesh, North-East Nigeria, Ukraine, Central and South American countries. The data gathered during these operations can be used to better understand risks to trafficking, vulnerability to exploitation, gaps in assistance and to identify areas of further research.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">IOM, through DTM, also produces primary data on the migrants’ vulnerability to human trafficking, abuse, exploitation and violence on different migration routes, for example on the main migration routes to Europe. Data with trafficking indicators are collected in countries like Italy, Libya, or Greece. Further similar data collection is planned in countries from Central and West Africa, and in Eastern Africa.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="458" instrument_node="">IOM produced a&nbsp;</span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iom.int/sites/default/files/press_release/file/Harrowing_Journeys_Children_and_youth_on_the_move_across_the_Mediterranean.pdf"><span data-dcnode-id="457" instrument_node="">report with UNICEF</span></a><span data-dcnode-id="455" instrument_node="">&nbsp;on the specific experiences of children and youth migrating via the Mediterranean migration routes to Europe. In a separate report, IOM identified&nbsp;</span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//migration.iom.int/docs/migrant_vulnerability_to_human_trafficking_and_exploitation_november_2017.pdf"><span data-dcnode-id="454" instrument_node="">predictors of vulnerability to human trafficking and exploitation for migrants</span></a><span data-dcnode-id="452" instrument_node="">&nbsp;taking these routes. There is limited reliable data on human trafficking and exploitation in displacement contexts.</span></p><span data-dcnode-id="450" instrument_node="">
</span><h2 data-dcnode-id="448" style="font-weight: 600;"><span data-dcnode-id="449" instrument_node="">Data strengths &amp; limitations</span></h2><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="443"><b data-dcnode-id="444"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Operational case data and victim profiles</span></strong></b></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">The availability of data on identified victims of trafficking depends on a range of factors, for example on whether counter trafficking organizations are operational or able to consistently collect or share data in any given country/location. Therefore, data coverage is not always comprehensive. Presence of large quantities of human trafficking data may not necessarily indicate higher prevalence, and a paucity of data in certain contexts may be due a lack of effective counter-trafficking responses.&nbsp; Identified cases are better understood as a sample of the unidentified population of victims. This sample may be biased if some types of trafficking cases are more likely to be identified (or referred) than others. Even if this is the case, the extent of the bias is rarely known, since the unidentified population is, by definition, unknown. Nevertheless, where available, these data are indispensable, as they provide detailed insight into the profiles and experiences of the victims, the forms of human trafficking, and information on perpetrators.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="435"><b data-dcnode-id="436"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">National reporting mechanisms</span></strong></b></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">While data from National Reporting Mechanisms are not detailed and generally only available as high-level aggregates, limiting their use, they have the widest geographical coverage and therefore provide useful baseline information on human trafficking at the global level. Furthermore, in the absence of publicly available disaggregated data, official reports may be the only source of data on identified victims available in a given country or region.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="427"><b data-dcnode-id="428"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Estimating prevalence of human trafficking</span></strong></b></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">National estimates of trafficking prevalence have been produced in several countries. However, they are commonly based on modelling of existing administrative data from identified cases and should therefore only be considered as basic baseline estimates. Historically, producing estimates of the prevalence of trafficking based on the collection of new primary data, for example through surveys, has been difficult. This is due to trafficking’s complicated legal definition and the ethical challenges of addressing sensitive questions to household survey respondents. Not all countries can be sampled due to resource constraints, security reasons, or the presence of large-scale humanitarian emergencies. There are also ethical considerations and further challenges related to large-scale household surveys in terms of the sensitivity of certain questions (for example, questions related to sexual exploitation or violence) and the difficulty of collecting data about children. This makes the case data mentioned above all the more valuable, both to gain insights on these specific profiles and to support estimations.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="419"><b data-dcnode-id="420"><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Trafficking in humanitarian settings and large-scale migration flows</span></strong></b></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Finally, humanitarian settings are often highly pressurised and fast changing environments, where conducting rigorous and ethical data collection can be challenging. For example, access to affected populations for data collectors can rapidly change, and services relevant for assistance of victims of human trafficking might not initially exist in crisis-affected locations.&nbsp; Therefore, the methods of data collection need to avoid causing harm, and they need to be time-sensitive and adaptable. Sampling best practices can also be challenging to implement in some environments.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">Read more </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/themes/human-trafficking"><span data-dcnode-id="413" instrument_node="">here</span></a><span data-dcnode-id="411" instrument_node="">.</span></p><span data-dcnode-id="409" instrument_node="">
</span><div class="relpost-thumb-wrapper" data-dcnode-id="376"><div class="relpost-thumb-container" data-dcnode-id="378"><h3 data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Related Articles:</span></h3><div data-dcnode-id="404" style="clear: both"></div><div data-dcnode-id="403" style="clear: both"></div><div class="relpost-block-container" data-dcnode-id="381"><a class="relpost-block-single" data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/resource/accountability-for-forced-labor-in-a-globalized-economy/"><div class="relpost-custom-block-single" data-dcnode-id="398" style="width: 150px; height: 270px;"><div alt="Accountability for forced labor in a globalized economy" class="relpost-block-single-image" data-dcnode-id="401" style="background: transparent url(https://humantraffickingsearch.org/wp-content/uploads/2021/07/Screen-Shot-2021-07-30-at-5.06.18-PM-150x150.png) no-repeat scroll 0% 0%; width: 150px; height: 150px;"></div><div class="relpost-block-single-text" data-dcnode-id="399" style="font-family: 'Dosis', Arial, sans-serif;  font-size: 20px;  color: #333333;"><span data-dcnode-id="400" instrument_node="">Accountability for forced labor in a globalized economy</span></div></div></a><a class="relpost-block-single" data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humantraffickingsearch.org/resource/milk-with-dignity/"><div class="relpost-custom-block-single" data-dcnode-id="393" style="width: 150px; height: 270px;"><div alt="Milk with Dignity" class="relpost-block-single-image" data-dcnode-id="396" style="background: transparent url(https://humantraffickingsearch.org/wp-content/uploads/2020/10/Screen-Shot-2020-10-15-at-2.03.22-PM-150x150-1.jpg) no-repeat scroll 0% 0%; width: 150px; height: 150px;"></div><div class="relpost-block-single-text" data-dcnode-id="394" style="font-family: 'Dosis', Arial, sans-serif;  font-size:
