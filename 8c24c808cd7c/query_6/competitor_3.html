</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="2748"><p data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node="">Trafficking of youth is a form of modern slavery within the United States. It is a crime involving the exploitation of U.S. citizen/resident or noncitizen youth for the purpose of compelled labor or a commercial sex act through the use of force, fraud, or coercion, regardless of whether the trafficker or the victim crossed state or international borders. If a person younger than 18 is induced to perform a commercial sex act, it is a crime regardless of whether there is force, fraud, or coercion.</span><sup data-dcnode-id="2786"><a data-dcnode-id="2787" href="#_ftn1" id="_ftnref1" name="_ftnref1"><span data-dcnode-id="2788" instrument_node="">1</span></a></sup></p><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2783" instrument_node="">Members of the youth-serving community are in a unique position to&nbsp;</span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youth.gov/youth-topics/trafficking-of-youth/identifying-victims"><span data-dcnode-id="2782" instrument_node="">recognize</span></a><span data-dcnode-id="2780" instrument_node="">&nbsp;children who may be on the path to becoming victimized and to&nbsp;</span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youth.gov/youth-topics/trafficking-of-youth/reporting-suspected-incidences"><span data-dcnode-id="2779" instrument_node="">report</span></a><span data-dcnode-id="2777" instrument_node="">&nbsp;suspicions to the appropriate authorities. Once victims are identified, housing, medical and mental health, immigration, food, income, employment authorization, and legal services may be available to assist them.&nbsp;</span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youth.gov/youth-topics/trafficking-of-youth/federal-efforts"><span data-dcnode-id="2776" instrument_node="">Federal agencies and departments</span></a><span data-dcnode-id="2774" instrument_node="">&nbsp;are&nbsp;</span><a class="ext" data-dcnode-id="2761" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.state.gov/j/tip/rls/tiprpt/2013/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2773" instrument_node="">working collaboratively</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2762" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2767"><sfw data-dcnode-id="2768" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2772" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2769"><targetsettings data-dcnode-id="2770" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2771" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2765">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2764"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2763"></path></svg></a><span data-dcnode-id="2760" instrument_node="">&nbsp;to raise awareness about human trafficking and the impact on victims, reduce the prevalence of human trafficking, support victims, prosecute offenders, and provide communities with the capacity to respond to the problem.</span></p><span data-dcnode-id="2758" instrument_node="">

</span><h2 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Youth Briefs</span></h2><span data-dcnode-id="889" instrument_node="">
</span><div data-dcnode-id="754"><div class="view view-topics-youth-briefs view-id-topics_youth_briefs view-display-id-block_1 js-view-dom-id-80a4144f971d0b68a7017825cb7518e447e47275a9774cf8446ec0cb4dc32f8d" data-dcnode-id="755"><span data-dcnode-id="888" instrument_node="">
</span><div class="margin-bottom-3 views-row" data-dcnode-id="867"><div class="views-field views-field-body" data-dcnode-id="868"><div class="field-content" data-dcnode-id="869"><div class="grid-row grid-gap" data-dcnode-id="870"><span data-dcnode-id="887" instrument_node="">
</span><div class="grid-col-4 yb-image" data-dcnode-id="881"><span data-dcnode-id="886" instrument_node="">
</span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/how-individualized-education-program-iep-transition-planning-makes-difference-youth" hreflang="en"><img alt="Disabled Girl With Her Teacher" class="image-style-yt-cp-thumbnail" data-dcnode-id="885" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/sites/default/files/styles/yt_cp_thumbnail/public/2021-08/youthBriefs_disability.jpg%3Fh%3D57ef3b21%26itok%3D6PMfvxKY&amp;raw" title="How Individualized Education Program (IEP) Transition Planning Makes a Difference for Youth with Disabilities" typeof="Image" width="215"><span data-dcnode-id="884" instrument_node="">
</span></a><span data-dcnode-id="882" instrument_node="">
</span></div><span data-dcnode-id="880" instrument_node="">
</span><div class="grid-col-8 yb-content" data-dcnode-id="872"><span data-dcnode-id="879" instrument_node="">
</span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/how-individualized-education-program-iep-transition-planning-makes-difference-youth" hreflang="en"><span data-dcnode-id="878" instrument_node="">How Individualized Education Program (IEP) Transition Planning Makes a Difference for Youth with Disabilities</span></a><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Youth who receive special education services under the Individuals with Disabilities Education Act (IDEA 2004) and especially young adults of transition age, should be involved in planning for life after high school as early as possible and no later than age 16. Transition services should stem from the individual youth’s needs and strengths, ensuring that planning takes into account his or her interests, preferences, and desires for the future.</span></p><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="871" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="866" instrument_node="">
</span><div class="margin-bottom-3 views-row" data-dcnode-id="845"><div class="views-field views-field-body" data-dcnode-id="846"><div class="field-content" data-dcnode-id="847"><div class="grid-row grid-gap" data-dcnode-id="848"><span data-dcnode-id="865" instrument_node="">
</span><div class="grid-col-4 yb-image" data-dcnode-id="859"><span data-dcnode-id="864" instrument_node="">
</span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/youth-transitioning-adulthood-how-holding-early-leadership-positions-can-make" hreflang="en"><img alt="Youth Transitioning to Adulthood: How Holding Early Leadership Positions Can Mak" class="image-style-yt-cp-thumbnail" data-dcnode-id="863" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/sites/default/files/styles/yt_cp_thumbnail/public/2021-08/youthBriefs_leadership.jpg%3Fh%3D57ef3b21%26itok%3D3O7Di90y&amp;raw" title="Youth Transitioning to Adulthood: How Holding Early Leadership Positions Can Mak" typeof="Image" width="215"><span data-dcnode-id="862" instrument_node="">
</span></a><span data-dcnode-id="860" instrument_node="">
</span></div><span data-dcnode-id="858" instrument_node="">
</span><div class="grid-col-8 yb-content" data-dcnode-id="850"><span data-dcnode-id="857" instrument_node="">
</span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/youth-transitioning-adulthood-how-holding-early-leadership-positions-can-make" hreflang="en"><span data-dcnode-id="856" instrument_node="">Youth Transitioning to Adulthood: How Holding Early Leadership Positions Can Make a Difference</span></a><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Research links early leadership with increased self-efficacy and suggests that leadership can help youth to develop decision making and interpersonal skills that support successes in the workforce and adulthood. In addition, young leaders tend to be more involved in their communities, and have lower dropout rates than their peers. Youth leaders also show considerable benefits for their communities, providing valuable insight into the needs and interests of young people</span></p><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="844" instrument_node="">
</span><div class="margin-bottom-3 views-row" data-dcnode-id="823"><div class="views-field views-field-body" data-dcnode-id="824"><div class="field-content" data-dcnode-id="825"><div class="grid-row grid-gap" data-dcnode-id="826"><span data-dcnode-id="843" instrument_node="">
</span><div class="grid-col-4 yb-image" data-dcnode-id="837"><span data-dcnode-id="842" instrument_node="">
</span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/how-trained-service-professionals-and-self-advocacy-makes-difference-youth-mental" hreflang="en"><img alt="Trained Professional and youth" class="image-style-yt-cp-thumbnail" data-dcnode-id="841" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/sites/default/files/styles/yt_cp_thumbnail/public/2021-08/youthBriefs_youthMentalHealth.jpg%3Fh%3D57ef3b21%26itok%3D5MsTcVet&amp;raw" title="How Trained Service Professionals and Self-Advocacy Makes a Difference for Youth with Mental Health, Substance Abuse, or Co-occurring Issues" typeof="Image" width="215"><span data-dcnode-id="840" instrument_node="">
</span></a><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><div class="grid-col-8 yb-content" data-dcnode-id="828"><span data-dcnode-id="835" instrument_node="">
</span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth.gov/youth-briefs/how-trained-service-professionals-and-self-advocacy-makes-difference-youth-mental" hreflang="en"><span data-dcnode-id="834" instrument_node="">How Trained Service Professionals and Self-Advocacy Makes a Difference for Youth with Mental Health, Substance Abuse, or Co-occurring Issues </span></a><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Statistics reflecting the number of youth suffering from mental health, substance abuse, and co-occurring disorders highlight the necessity for schools, families, support staff, and communities to work together to develop targeted, coordinated, and comprehensive transition plans for young people with a history of mental health needs and/or substance abuse.</span></p><span data-dcnode-id="829" instrument_node="">
