Trafficking has emerged as one of the worst and most pervasive form of human rights violation
of women and children. Trafficking in women and children is today a major social and political
concern globally as well as nationally. It has also become the fastest growing criminal enterprise
in the world. An estimated 1-2 million women and children are trafficked annually around the
world, generally for the purpose of forced labor, commercial sexual exploitation or domestic
servitude. A United Nations (UN) estimates conducted in 1999 indicate that the fastest growing
international business is trafficking in women and children (UNIFEM). According to an estimate
by International Organization for Migration (IOM), the global trafficking industry generates up
to 8 billion US dollars(Star, February 1, 2001).The issue of human trafficking is integrally linked
to insecurity of livelihood as well as to continuing disparities and discrimination against
marginalized communities generally, and against women in particular. Many trafficked persons
are lured and deceived by false promises of good jobs or marriage while others are bought,
abducted, kidnapped, coerced, threatened or used as debt bondage. Some of these women and
children are trafficked with the tacit consent of their impoverished families.


Trafficking is a phenomenon continuing from the earliest period of civilization. The earliest form
of trafficking was slave auctions of men and women. Trafficking and related problems have not only
continued but also increased to such a degree of magnitude that become a global crisis. Trafficking in
women and children is a lucrative activity for transnational crime syndicates in South and Southeast
Asian countries. Bangladesh is considered as one of the highly child trafficking prone zones because
4798 km. land is share border with India and Myanmar where control of government is very least.
Twenty-eight districts of Bangladesh share borders with India and two districts share borders with
Mayanmar. So uneducated and vulnerable women and children are deprived of financial, social
and legal support and opportunities easily become victims of internal and cross border trafficking.
The organized gang of traffickers are targeting the poorest of the poor and disadvantaged children
and women and trafficking them from Bangladesh to India, Pakistan and Middle East countries.


The victims are either abducted or allured with promises of better life by providing lucrative job or
marriage offers and false proposals to visit holy places. But practically they become victims of
trafficking and sexual exploitation and eventually embrace the lives of agony and torture. Most of
the Bangladeshi women and children victims of cross border trafficking are sold in the brothels or
forcibly engaged in prostitution in cage brothels in the receiving countries like India, Pakistan and
different Middle countries.


There are two common types of trafficking one is internal and the other is cross border trafficking.
It has been found that women and children are found that women and children are often taken

                                                  1
faway from their homes through abduction, or false promise of better life with good employment,
by traffickers who in turn sell them in brothels in Bangladesh in the case of internal trafficking. On
the other hand they are smuggled by gang of traffickers across the border to further destinations
such as India, Pakistan and different Middle east countries where their ultimate fate is a life of
sexual exploitation and abuse and others forms of bonded labor. Tiny boys who are trafficked to
Middle east become camel jockey a very risky and hazardous job.Although few studies on
trafficking and working conditions of repatriated trafficking victims have been done in
Bangladesh. The present study intends to explore the socio-demographic characteristic of the
victims and causation of trafficking and consequence of trafficking victims in the respondent of
BNWLA shelter home.

The Constitution of Bangladesh mandates the establishment of a society based on the rule of law,
justice, and of respect for human dignity and worth of all persons. The Constitution bans forced
and bonded labour (article 34) and imposes a duty on the state to prevent and suppress
prostitution of human beings, and guarantees of fundamental human rights. The Constitution
provides for an obligation for the state to prevent violation of human rights in any form,
including human trafficking. There are also a number of statutes and policies which provide for
the legal regime against human trafficking. Currently, the Ministry of Home Affairs has been in
the lead role of coordinating counter trafficking activities. Other relevant ministries are also
actively engaged in counter trafficking activities and are extending their cooperation to the
Ministry of Home Affairs. Moreover, there are various committees and sub-committees working
under the Ministry of Home Affairs for policy making. These include inter-ministerial
representatives, NGOs and INGOs working on combating human trafficking. They have been
working in a concerted way.



1.2. Objective of the study:

Human trafficking is increasing day by day in Bangladesh. It is the alarming matter in our daily life.
Because of women and children are the future generation for every country. The main objectives of the
study lies ;



       To identify the impact of human trafficking in bangladesh
       To identify the causes of trafficking.
       To find out the way of combating of trafficking.

f2. Review of Literature:

A.K.M. Masud Ali et al ( 2002)

The magnitude of trafficking in Bangladesh has increased over the years, but neither the extent nor the
real expansion can be verified. The illegal structure of trafficking, community vested interests,
and a lack of information networking (i.e. information is localised) are the major constraints
preventing verification. Internal trafficking in children is a much larger problem than external
trafficking in children. Trafficked children of both sexes engage in prostitution at brothels and on the
streets. In Shibganj girls have been found employed in Indian bidi factories and boys trafficked to
Dubai as camel jockeys. Girls from each of the four study areas (Patgram, Shibganj, Teknaf, and
Dhaka) have been trafficked to brothels in India (Bombay, Delhi, Kolkata, and other areas).
Trafficked girls engage in street prostitution in Dhaka. The origins of rescued girls at NGO shelters
(BNWLA and ACD) reflect that internal trafficking of children occurs within almost all districts of
the country. About 13 percent of the marginal households in the three household survey areas reported
cases of missing children. Only half of these missing children have been recovered. The experience of
the trafficked children engaged in prostitution reveals that missing children are at high risk of being
victimised by the trafficking network. .

Trafficking routes vary depending on changes in the legal environment, geography, destination,
means of transportation, and area of recruitment. Specific routes may be identified for some
specialized destinations such as brothels. Cross-border trafficking uses existing migration routes,
both legal and illegal. The trafficking routes, therefore, appear as an integral part of the map of
human mobility, both legal and illgal, within a given time frame and geography.

A.K.M.Masud Ali et al ( 2002 )

The push and pull factors operating for child migration and child labour are equally responsible for
Trafficking in Children. Community awareness of the hazards of child early marriage, and child
employment, their links to trafficking, is not completely absent. Economic pressure, the legal
framework, and social perceptions prevent communities from acting on this knowledge. Socially an
individual is considered a child up to the age of 10 years, at most. This 'early adulthood concept is a
strong impediment to eliminating child labour, early marriage, and child trafficking.


In border communities, confidence in the safety of movement across the border and local involvement
in cross border trade leads to the moral and circumstantial context of child trafficking. A large number
of very young children are reported to be involved in cross-border smuggling of goods. These children
are highly vulnerable to abuse, exploitation, and trafficking—once they cross the border these
children lose control over their environment, fall out of the human safety net, and step into a grey
space of extreme vulnerability. Grassroots communities have limited sources of information and no
institutional means of raising awareness of trafficking. Community knowledge comes primarily from
direct experience, stories, and myths. Although interventions by NGOs, government agencies, and
media occur, the major source of information is informal human communication. NGOs play a
limited role.

Discrimination against girls in all spheres of society contributes to their increasing vulnerability
to trafficking. Early marriage and dowry pressures make the girl child highly vulnerable to
trafficking. The participation of girls in formal schooling has increased due to the Bangladeshi
government's stipend program, but education does not necessarily reduce the risk of trafficking.
A section of key informants explained that the higher mobility of the school going girls could
very well increase their vulnerability to trafficking. The study, however cautions against drawing
conclusions about the relationship between education and a higher risk of trafficking.

4. Findings

Bangladesh is source and transit country for men, women, and children subjected to trafficking
in persons, specifically forced labor and forced prostitution. A significant share of Bangladesh‘s
trafficking victims are men recruited for work overseas with fraudulent employment offers who
are subsequently exploited under conditions of forced labor or debt bondage. Children – both
boys and girls – are trafficked within Bangladesh for commercial sexual exploitation, bonded
labor, and forced labor. Some children are sold into bondage by their parents, while others are
induced into labor or commercial sexual exploitation through fraud and physical coercion.
Women and children from Bangladesh are also trafficked to India for commercial sexual
exploitation.

Definition and Concepts

International organizations use various definitions for describing trafficking. The definitions tend
to focus on gender, age, reason for trafficking, and the issues of coercion and violence which are
often associated with trafficking.

In the case of children, in 1998, a research report by Archavanitkul (3) titled ―Trafficking in
Children for Labor Exploitation including Child Prostitution in the Mekong Sub-region‖,
compared definitions used by the UN General Assembly, Global Alliance Against Trafficking in
Women (GAATW), International Organization for Migrations (IOM), and the International
Labor Organization (ILO). After considering these definitions, the authors concluded that
important dimensions of child trafficking include the performance of a profitable act by
person(s) other than the children themselves who transport a child within or across the national
borders usually using false or deceptive information for the purpose of work or services in
destructive and exploitative work conditions by means of violence, abuse, or other forms of

                                                 8
fcoercion. For their study, a trafficked child refers to ―A child who is recruited and transported
from one place to another across a national border, legally or illegally, with or without the child‘s
consent, usually but not always organized by an intermediary: parents, family member, teacher,
procurer, or local authority. At the destination, the child is coerced or semi-forced (by deceptive
information) to engage in activities under exploitative and abusive conditions‖.

In the case of women, the same dimensions seem to be important. For instance, the US
President‘s Interagency Council on Women, defines trafficking as: ―All acts involved in the
recruitment, transport, harboring or sale of persons within national or across international borders
through deception or fraud, coercion or force, or debt bondage for purposes of placing persons in
situations of forced labor or services, such as forced prostitution or sexual services, domestic
servitude, or other forms of slavery-like practices‖. Similarly, the Global Alliance against
Trafficking in Women considers that trafficking of women refers to ―all acts involved in the
recruitment and/or transportation of a woman within and across national borders for work or
services by means of violence or threat of violence, abuse of authority or dominant position,
debt-bondage, deception or other forms of coercion‖.

The countries of SAARC have a definition in their Convention for Preventing and Combating
Trafficking in Women and Children. Nevertheless, a consultation workshop organized by the
Resistance Network in Bangladesh in August 1999 made suggestions for changes to the
convention.

The workshop proposed the following definitions:
―Trafficking in women consists of all acts involved in the procurement, transportation, forced
movement, and/or selling and buying of women within and/or across border by fraudulent
means, deception, coercion, direct and/or indirect threats, abuse of authority, for the purpose of
placing a woman against her will without her consent in exploitative and abusive situations such
as forced prostitution, forced marriage, bonded and forced labour, begging, organ trade, etc.‖

―Trafficking in children consists of all acts involved in the procurement, transportation, forced
movement, and/or selling and buying of children within and/or across border by fraudulent
means, deception, coercion, direct and/or indirect threats, abuse of authority, for the purpose of

Scenery of trafficking
This section briefly describes the context of trafficking from the global, regional and Bangladesh
perspective.


                                                 9
fGlobal Context
Trafficking of persons into bonded sweatshop labor, forced marriage, forced prostitutions,
domestic servitude, and other kinds of work is a global phenomenon that takes place within
countries and regions and on a transcontinental scale. Trafficking in women is one of the fastest
growing criminal activities in the world with an estimated one to two million young women
being trafficked annually for the purpose of forced labor, domestic servitude, or sexual
exploitation. The International Organization for Migration (IOM) estimates that, in 1995, about
500,000 women were trafficked to the countries of the European Union from poorer regions of
the world. So, it is not a problem of developing countries alone. Although the concept of
trafficking is often used for describing kidnapping and enslavement of women for the
commercial sex industry, different government and international agencies have adopted much
broader definitions of the term to include other forms of trafficking and affected groups, such as
children trafficked for child labour and organ donation.

The problem is usually under-reported because of the difficulties involved in tracking such
clandestine activities. In recent years, the issues relating to trafficking have become more
prominent and are being discussed more openly. There are more efforts also to understand the
underlying dynamics of trafficking of women and children. This may be related to increase
awareness and concerns about human rights, violence against women, and about the role of
commercial sex in human immunodeficiency virus (HIV)-related epidemics. The question of
trafficking has figured prominently in the agenda of recent international meetings, such as
International Conference on Population and Development in 1994, World Summit for Social
Development in 1995, and Fourth World Conference on Women at Beijing in 1995.
Accordingly, there is also a growing interest among the policy-makers and program managers to
identify effective options for preventing such exploitation of women and children and in
designing appropriate interventions for them.

Regional Trends of human trafficking in South Asia :
In South Asia, the U.S. Department of State estimates that some 150,000 victims are trafficked
annually. The low status of women in some societies as well as the growth of sex tourism
contribute significantly to trafficking in this region. Sri Lanka and India are the favored
destinations of sex tourists from other parts of the world.

Bangladesh and Nepal, the poorest countries in the region, are the main source countries. India
and Pakistan are the key destination countries. Estimates of the number of Nepalese girls and
young women lured or abducted to India for sexual exploitation each year ranges from 5,000 to
10,000. The total number of Nepalese working as prostitutes in India range from 40,000 to
200,000, according to women‘s rights organization and NGOs. The total Indian prostitute
population is estimated to be over 2 million.

according to Amnesty International, Afghan women have been sold into prostitution in Pakistan.
Some 7,000 Nepalese women and children are trafficked for prostitution to the Asia Pacific area,

Bangladesh Context
Causes and consequences of trafficking in Bangladesh cannot be understood in isolation from its
historical, cultural, geographical and socioeconomic perspectives and the present condition of
women.
    A. Historical and geographical contexts
After independence from British colonization in 1947, the Indian sub-continent was divided into
two countries: India and Pakistan. Pakistan had two distinct geographic regions, East Pakistan
and West Pakistan, separated by 1,200 miles. Thus, many cross-border families were formed.
During separation, many Muslim families from India migrated to Pakistan, particularly to East
Pakistan. Again, many Hindus living in East Pakistan moved to India.

In 1971, East Pakistan became independent from West Pakistan and a new nation, Bangladesh,
was born. During this time, many non-Bengali Pakistanis (who were originally from India)
wanted to go back to West Pakistan and are still awaiting repatriation to Pakistan. They live in 66
camps scattered in 14 districts of Bangladesh. As repatriation of these people has been delayed,
many cross land-borders illegally. Often with these groups, other women and children are
trafficked.On both sides of the newly-drawn border between India and Pakistan and India and
Bangladesh, there are many ‗enclaves‘ which are pockets of land belonging to a nation other than
that which surrounds them. There are 111 Indian enclaves in Bangladesh and 51 enclaves of
Bangladesh in India. Usually, these areas are not patrolled or controlled by any law-enforcing
agencies. Research by the BNWLA has shown that these enclaves have been used as recruitment
and collection sites by traffickers.

    B. Socioeconomic contexts
Bangladesh, one of the most densely-populated countries in the world, has 147,570 sq km of land
and a population density of 755 per sq km. The present estimated population of the country is
about 129 million.
Despite the achievements of some poverty-alleviation programmes through micro-credit and
other development initiatives, the vast majority of the population in Bangladesh still live in
poverty. Illiteracy and unemployment are quite high.

Recurrent natural disasters make the situation more critical for the entire population. During
distress situation, lack of shelter for girls is a great problem. All these factors make women and
children vulnerable, and make them easy targets of traffickers.



                                                12
f    C. Cultural and political contexts
If socioeconomic conditions present a context of persisting poverty and if underdevelopment
affects large numbers of the population, this situation is most acutely felt by women, because
they additionally face strong religious, historic and cultural forces that tend to shape every aspect
of their lives. Legally, both women and men have the same rights and are entitled to equal
treatment under the law. Nevertheless, cultural norms often act as barriers to the implementation
of egalitarian legislation. For example, due to male preference, females suffer not only
nutritional neglect, but also receive less attention during sickness than males. Arranged
marriages are the norm, and young women are still married relatively early in life (23). The most
recent Bangladesh Demographic and Health Survey (BDHS) reported that about 60% of women
aged 10-49 years were married by the time they were aged 15 years. Legal provisions to protect
women and children from exploitation are also not enforced due to organizational inefficiency
and the inadequate capacity of law-enforcing agencies. As a result, some social practices, which
are detrimental to a woman‘s status in society, still continue many decades after their legal
abolition. A case in point is the practice of dowry, which continues despite national legislation
against this, which was signed in 1980. The inability to fulfill commitments of dowry affects a
young bride‘s treatment by her husband‘s relatives and increases her vulnerability of being
abandoned and trafficked for immoral purposes or bonded labor.

Types of human trafficking:
In terms of modus operandi, there are two types of trafficking in persons that occur in
Bangladesh: internal trafficking and international trafficking.

 Internal Trafficking:
Bangladeshi children and adults are trafficked internally for commercial sexual exploitation,
domestic servitude, and forced and bonded labour, including forced begging. In some instances,
children are sold into bondage by their parents, while others are induced into labour or
commercial sexual exploitation through fraud and physical coercion. Girls and boys as young as
eight years old are subjected to forced prostitution within the country, living in slave-like
conditions in secluded environments. Trafficking occurs throughout the country, and the
vulnerable poor are trafficked from poorer rural regions to cities.

B. International Trafficking:
Internationally, women and children from Bangladesh are trafficked to India and Pakistan for
commercialsexual exploitation or forced labour. Some Rohingyan refugees from Burma have
been subjected to human trafficking in Bangladesh. Many brothel owners and pimps coerce
Bangladeshi girls to take steroids to make them more attractive to clients, with devastating side
effects; the drug is reported to be used by 90 percent of girls and women between the ages of 15
and 35 in Bangladeshi brothels. In 2012, nine South African labour-trafficking victims were
found in Bangladesh.


                                                 13
fCommon forms of human trafficking or involvement of trafficking

Bonded labour, also referred to as debt bondage, occurs when a person has to work to pay back
an inherited debt, or when a debt is incurred as part of the terms of employment. Debts often
occur when an individual or family have to borrow from moneylenders and employers. This may
be to pay for culturally important events such as a funeral, wedding or dowry, or simply for basic
living costs. The worker‘s labour becomes repayment for an initial loan. The circumstances of
the bonded labour may become additionally exploitative when the value of the work is greater
than the loan.

Forced Labour is when a person is forced or threatened into providing labour or services and is
not free to stop. It often occurs when employers take advantage of vulnerable people, such as
those affected by poverty, high rates of unemployment, discrimination, corruption, political
conflict, or lack of education or knowledge of their rights. Irregular migrants are particularly
vulnerable, but individuals also may be forced into labour in their own countries.

Hazardous or exploitative child labour is work that deprives children of their childhood, their
potential and their dignity; work that exceeds a minimum number of hours; work that is
mentally, physically, socially or morally dangerous and harmful to children; and work that
interferes with their schooling.

Sex trafficking occurs when an adult is forced into (or maintained in) a situation of sexual
exploitation. Any person involved in their recruitment, transportation, harbouring or receipt has
committed a trafficking crime. Sex trafficking also can occur within debt bondage, if women and
girls are forced to continue in prostitution to pay off an unlawful ‗debt‘.

Child Sex Trafficking occurs when children are exploited in the commercial sex trade,
regardless of how they were ‗recruited‘ into the industry. International agreements and protocols
require criminalization of the commercial sexual exploitation of children.

Forced Marriage is used to describe a marriage in which one or both of the parties is married
without his or her consent or against his or her will. Within forced marriage there may also be
incidences of sexual exploitation and servitude.

Involuntary domestic servitude occurs when a domestic worker becomes ensnared in an
exploitative situation from which they are unable to escape. The exploitation can include
inadequate wages and working conditions; however, it is also the real or perceived restriction of
freedom, trapping the individual in servitude through violence, coercion, physical, sexual and
emotional abuse and physical barriers. Domestic servitude is largely hidden and hard to uncover
because it generally occurs in private homes. This kind of work is largely unregulated by public


                                               14
fauthorities. Victims of domestic servitude, in particular children and women, are also vulnerable
to sexual exploitation.

Child Soldiers are children that are unlawfully recruited – through force, fraud, or coercion – as
combatants or for labour or sexual exploitation by armed forces. Perpetrators may be government
forces, paramilitary organizations, or rebel groups. Many children are forcibly abducted. Others
are unlawfully made to work as porters, cooks, guards, servants, messengers or spies.

Impact of Human Trafficking on society
The negative impact of human trafficking goes beyond the individual level and generates its
negative effect on the whole society. As trafficking is either a process that happens in one
country or in more than in one country, it has its effect on each part of it. Its negative impact
affects the donor country or community (places where victims are recruited), transit countries, or
communities places where victims are transported towards the final destination and finally it
affects the destination country (where victims eventually arrive and are exploited). As Kenya is a
source, transit and destination country for victims of human trafficking, all the effects have a
heavy impact on the society.

Loss of human capital in society

Human capital is a necessary component for development and as we examine successful cases of
development (for example the East Asian Miracle), investing in human capital (i.e. health,
education etc.) was a main component of successful development policies (Stiglitz). Human
trafficking causes lost opportunities domestically including an irretrievable loss of human
resources and future productivity. (US Department of State 2011).


Interestingly, some activists like Rebecca Clay (Clay, 2011), an American psychologist engaged
in ending human trafficking, nickname human trafficking as a silent epidemic, while describing
the social cost of this phenomenon. Using such a phrase, often unintentionally, describes human
trafficking as a form of an epidemic with all its negative social effects. As Epidemiology has a
concept of the "Burden of Disease" which looks at the financial and social cost of the disease.
While taking into consideration the difficult task of calculating the cost of human trafficking,
calculating a Social Burden of Human Trafficking should be a future field of professional
studies.

Loss of human capital is also followed by the loss in remittance as the victims generate the profit
that is either transferred abroad, or used by traffickers to fuel their criminal activities. In cases of
child labour, the loss of human capital is more severe as children's health, psychology and
overall capacity is not ready to handle the heavy labour.


                                                  15
fPeople who are lured into trafficking could be the possible future of the country. Their work,
knowledge, and experience could have been a contribution to a common good. Instead, after
being trafficked, they live in a situation of exploitation enriching traffickers and other exploiters.
Many of them after the return to the place of origin become frustrated as they try to account for
the time and capital lost. It is also very plausible that due to the physical and psychological
damage mentioned above, they are likely to rely on the social assistance. It might be hard to say
but often they may depend on their families thus being a burden to the family, friends and local
community.

Human Security in society

The loss of human capital is not the only negative effect of human trafficking on society. Its
effects are felt in other sectors like public health, gender balance, rule of law, and social
development. We can sum up those components using the concept of human security. Since there
are many approaches on the definition of human security we can use the most common definition
presented in the UNDP report of 1994 which states that:

Human security can be said to have two main aspects. It means, first, safety from such chronic
threats as hunger, disease and repression. And second, it means protection from sudden and
hurtful disruptions in the patterns of daily life-whether in homes, in jobs or in communities.
The Human Security Paradigm contains different elements such as health security, the rule of
law, food security used by policy makers and analysts on different occasions. Once all those
elements are summed up in two common strains that are the subject of human security and the
content, the impact of human trafficking will become more visible.

The impact of human trafficking on the subject of human security in society

Human security designates the individual(s) rather than the state as a ―referent object‖ of security
although this does not abrogate the security of a state. The relationship between state security
and that of individuals is complimentary, dependent and mutually reinforcing. Without human
security, state security cannot be attained and vice versa. (King &amp; Murray, 2001; Paris, 2001;
Tadjbakhsh, 2005). Since human trafficking targets the wellbeing of individuals, it affects the
state security as well through the mental, physical and emotional impact of this crime on the
referent of human security – the population from where victims are recruited.

The impact of human trafficking on the content of human security in society

Because human security concentrates on the well-being and dignity of individuals, the human
security approach recognizes the menaces beyond violence such as insufficient income, chronic
unemployment, dismal, access to adequate health care and quality education, etc., as well as


                                                 16
fsubjective perceptions, such the inability to control one‘s destiny, indignity, fear of crime and
violent conflict, etc. (Tadjbakhsh, 2005). Human trafficking has deleterious effects on the health
of societies in which trafficking flourishes, and to the authority of the state itself. It undermines
the border integrity as millions of people are transported annually across national boundaries
under false pretences where officials are corrupted and the state sovereignty is affected. As
Simmons and Lloyd (2010) point out, human trafficking involves the same criminal networks as
weapon smuggling, drugs trafficking, money laundering or other contraband. In some cases,
terrorist groups are interlinked with drugs and human trafficking as it is an additional income
stream for terrorist groups in Latin America or East Europe (Jonsson, 2009). As such groups are
also present in the Horn of Africa (i.e. Al-Shabab) there is evidence to suggest Kenyans have
been trafficked through Somalia (HAART reports).

Viewing human trafficking as a transnational crime provides an insight that gives the right
perspective on the damage done. We can quote the observation of Simmons and Lloyd:
The transnational crime frame posits human trafficking as a violent and socially corrosive
activity, typically connected with broader networks and almost inevitably conducive to
corruption of public officials. While it may line the pockets of some corrupt officials, it is
generally viewed as detrimental to public health, political stability, and the domestic rule of law
in both sending and receiving countries (Jonsson 2009). For these reasons, "It would seem to be
in the interest of most states to co-operate with other states in the fight against human trafficking.
The only exception would be if the state itself somehow makes a profit on the trafficking of
persons directly or indirectly which may very well be the case (Österdahl 2009). (Simmons and
Lloyd, 2010, p. 16).

Impact on person health in Family
Trafficking is also affecting human health when victims are exposed to dangerous activities, kept
in unhealthy conditions or forced into commercial sex. The negative impact of human trafficking
on the social level is threefold. Firstly, as it was described in the case of Florence, it destroys the
health and human potential of its victims. With the number of victims increasing, it has an effect
on the social dimension, as the victims in one way or the other need assistance from the health
sector.

Another dimension is the impact of human trafficking in the spread of HIV/AIDS and other
STDs across the borders and the regions. As victims of trafficking for sexual purpose often are
forced into sexual activities without protection, they are at high risk of contracting the HIV virus.
Taking into account the mobile nature of human trafficking, the HIV virus is spread to different
regions, or countries. This is causing new and virulent strains of the virus to spread. Dr. Chris
Beyrer, a leading epidemiologist at Johns Hopkins has linked sex trafficking to the AIDS virus
stating that the new strains of HIV are proving resistance to treatment, therefore "the trafficking
part of the sex industry is contributing to the global dispersion of HIV subtypes. (Source: Aids).


                                                  17
fThirdly, human trafficking is a mediating variable between sex and poverty. As the author
established in his research in South Africa (one of the destination countries for victims of human
trafficking from the East Africa) trafficking of persons contributes to commercial sex by virtue
of the fact that it mediates the relationship between poverty and commercial sex.

While asked a question: ―What does sex involve‖ and cross tabulating it with the question:
―What forces people into commercial sex‖, the sex workers - victims of human trafficking and
sex workers who were not victims of human trafficking presented different answers. Commercial
sex workers- who were not victims of human trafficking attributed 53.3% of what sex involves to
fulfilling client‘s erotic desire, and 40% to getting money, whereas commercial sex workers –
who were victims of human trafficking, attributed only 20% of what sex involves to fulfilling
client‘s erotic desire, while 50% to getting money. This evidently confirms that commercial sex
workers and victims of human trafficking perceive commercial sex from different perspectives:
the former perceive it through Eros, the latter through socioeconomic reasons. Trafficking of
persons contributes to commercial sex by virtue of the fact that it mediates the relationship
between poverty and commercial sex.

The impact of trafficking on persons or individual

    A. The physical impact of trafficking
All forms of trafficking, because of the abusive and exploitative nature of the crime, produce
harmful effects on trafficked individuals. For example, the National Human Rights Commission
of Thailand reported in 2003 the impact of trafficking on a group of approximately 100 male
fishermen. After three years of exploitation, 39 had died, while those who returned home were
seriously ill emaciated, emotionally disturbed and unable to see, hear or walk properly.

B.HIV/AIDS

Increased likelihood of HIV infection is often cited as a risk among women trafficked for sexual
exploitation owing notably to a lack of bargaining power concerning condom use and other
potentially dangerous sexual practices. Trafficked women are also less likely to be beneficiaries
of medical or educational services made available to non-trafficked women working in
prostitution.9 Lack of information about HIV/AIDS, as well as prevalent popular
misconceptions, including that sexual intercourse with a virgin will cure the disease and that
younger girls are disease-free, has increased the demand for younger victims and increased the
vulnerability of children to infection.




                                               18
fC. Mental health impact
Relentless anxiety, insecurity, fear and physical pain and injury will have significant effects on
the mental health and well-being of trafficked victims. Symptoms of psychological trauma
reported by trafficked persons include post-traumatic stress disorder, anxiety, depression,
alienation and disorientation. These individuals report feelings of extreme sadness and
hopelessness about the future. They may be suicidal, have cognitive impairment and memory
loss, and may be withdrawn. They may also have difficulty concentrating and show aggression
and anger. Studies indicate that trauma worsens throughout the duration of the trafficking
process. Initial trauma commonly experienced either before they were trafficked or when they
first discovered that they were trafficked, will be continually increased by the process of the
trafficking. The longer victims remain under the control of their traffickers, the more severe and
long-lasting are the effects of their trauma. The symptoms may persist for a long time after the
trafficking experience unless support and appropriate counselling is provided.

D.Child victims
Child victims of trafficking are subject to the same harmful treatment as adults. Their age makes
them even more vulnerable to the harmful consequences of abusive practices. Prolonged abuse in
children, including physical and sexual abuse, hunger and malnutrition, may lead to permanent
stunting of growth. Trafficked children may suffer, for example, from poorly formed or rotting
teeth and may experience reproductive problems at a later date. The International Labour
Organization (ILO) has documented that children in some tropical regions are at high risk of
sunstroke, increased heart rhythm, poisoning due to chemicals in insecticides, dust inhalation in
sawmills and mines, machinery accidents, burns, road accidents, stagnation of growth and
general fatigue that makes them less resistant to malaria and other diseases because of their
exposure to harsh working conditions.

Trafficked children are less likely than adults to have accurate information about the
transmission and prevention of sexually transmitted infections and have fewer negotiating skills.
Girls are especially vulnerable, as sexually transmitted infections are likely to have long term
physical consequences. The emotional well-being, self-esteem and ability to set personal goals
and form healthy relationships of these younger victims of trafficking will be significantly
damaged.

E.Substance abuse
Trafficked victims may be subjected to substance abuse by their traffickers. Some trafficked
women have described how they were forced to use drugs or alcohol to ensure their compliance
and to enable them to take on more clients, work longer hours or perform objectionable or risky
acts.17 Trafficked persons may also turn to substance abuse to alleviate the pain of their
situation, often resulting in addiction, organ damage, malnutrition, needle-induced infections,
overdose and death.


                                               19
fF.Impact on behavior

Prolonged physical and mental abuse affects victims‘ behaviour in negative ways, having an
impact on both physical and emotional responses. Because trafficked persons often experience
extreme forms of trauma over long periods of time, their capacities both to understand what has
happened to them and to describe their experiences are directly impaired as a result of such
abuse. Victims can find that it is difficult to make personal sense of the abuse they have
experienced, much less try to explain it to the authorities. They are even less able to identify
what help they might need as a result of the abuse. This lack of clarity may have negative
consequences when a victim is being interviewed by relevant authorities. Trafficked persons may
be unsure of how they are supposed to answer questions.
They may be reluctant to disclose information, or may give false information, be irritable or
hostile and aggressive towards others, even support persons. They may seem complaining,
uncooperative or ungrateful. As a result, they may not be identified as victims of crime, further
compounding the injustice they have experienced. In many instances, failure to identify a person
as a trafficking victim commonly results in deportation from the country of transit or destination
without access to legal, medical or social services. Such behaviour, however, may manifest in
individuals for many years.

G. Stigma
The response of family members and the community will have an impact upon the recovery
process of trafficked persons. Although more is known about the stigma facing victims of
trafficking for sexual exploitation, all trafficked persons may face social disapproval if they
return without promised wealth, regardless of the harm they suffered. In many countries, the
impact of the trauma is influenced significantly by how victims imagine their culture will view
their experiences. Many victims know that cultural attitudes to prostitution could prevent them
from being accepted by their families and communities. In some cultures the entire family could
be ostracized as a result of the victim‘s past.


In a recent national study, surveyed communities exhibited some understanding of the role of
social and economic hardships in vulnerability to trafficking, but overwhelmingly blamed the
immoral character of the trafficked girl herself, who was seen to bring disgrace and shame to her
family and community. Returned victims were considered likely to continue as prostitutes or try
to recruit other young girls as prostitutes all trafficking was associated with sex work, and those
who were trafficked were assumed to be infected with HIV/AIDS and to be a source of infection
in the communities.




                                                20
fH. Recovery

Return and reintegration for a trafficked person is a long-term and complex process with no
guarantee of recovery. Even where physical problems can be addressed and stigma overcome,
trauma and psychological damage make recovery a difficult task rendered even more so by the
problems in accessing necessary resources and in communicating with support persons and
family. Some trafficked victims may not adjust to a lifestyle that they previously considered
―normal‖. If employment can be found, a trafficked person‘s behaviour, as a result of the
experiences of severe trauma, may make it difficult to remain employed.

Impact of human trafficking for the purpose of forced labour

The picture of the negative impact of human trafficking on the society would be incomplete
without a brief insight into trafficking for the purpose of forced labour. Trafficking for the
purpose of forced labour is often overshadowed by trafficking for the purpose of sexual
exploitation. However, as the number of victims trafficked to work in mines, farms, sweatshops,
households or other places of exploitation is at least equal to those caught in sexual exploitation,
the impact of trafficking for the purpose of forced labour cannot be neglected. This type of
trafficking shares some commonalities with the issues discussed earlier. As the victims are
exposed to long working hours, abusive environments and no or little remuneration, their health
is going to be severely affected. Often victims of forced labour are at the same time a subject to
sexual exploitation, and/or witnesses of other forms of violation of human rights like physical
abuse or murder.

Forced Labour has its own unique effect on society. It is first a source of wealth for traffickers –
whether organized in crime syndicates or simply by individuals. Much of this money is used to
sponsor other criminal activities like drug trafficking or illegal arms trade. While victims of
trafficking for forced labour generate a substantial amount of wealth, they are neither paid for the
work done nor have any money set aside for their future retirement. Therefore this means that
after they are released they will have to rely on the society or the imminent family for their
upkeep. There is no contribution to income tax or any contribution to social security and health
security funds. As we are not able to identify the accurate figure of how much society is losing
from forced labour, we can quote the statistics from ILO that estimates the total cost of forced
labour (after excluding the commercial sex trade) in Sub-Saharan Africa at 1,511,000,000 USD,
while the global cost of forced labour is estimated at 21 Billion USD (ILO: The Cost of
Coercion, 2009).




                                                21
fSimilarly, forced labour has a significant effect on victims who are below the age of 18. It
damages a child‘s physical, social, mental, psychological and spiritual development, deprives
children of their childhood and their dignity. As children who do not complete their basic
education, they are likely to remain illiterate and never acquire the skills needed to get a job and
contribute to the development of a modern national economy. (ILO: Cost of coercion). Often,
they may be engaged in criminal activities instead. Consequently, child labour results in under-
skilled, unqualified workers who may jeopardise future improvements of skills in the workforce
in Bangladesh.

The political purpose of trafficking on persons in society

In addition to the tragic impact on individuals, human trafficking has now reached such a scale
that it has begun to influence the domestic and foreign policies of many of the countries where
the problem has become particularly noted. Because trafficking involves the movement of people
across international borders, one of the most important areas of debate is migration policy.
However, because trafficking in persons is also a deeply human issue, it has become a major
issue of discussion and concern in human rights circles. The following discussion will outline
what are some of the major concerns and challenges in each of these two areas.

    A. Shaping migration policies
Unprecedented numbers of people leave their homes and families every year in search of
economic opportunities that are not available to them at home. Many of these individuals migrate
legally. The numbers are so great, however, and the restrictions on regular or legal migration
usually so stringent, that many migrants become absorbed into the illicit world of people
smuggling. In too many cases, smuggling leads to conditions of ongoing exploitation and human
misery. Commonly, many States equate ―trafficking‖ with ―illegal migration‖ or ―smuggling of
aliens‖ or movement of asylum-seekers, even though these are different albeit often overlapping
phenomena. It is within this overall concept and not as a separate issue that trafficking in persons
has helped to shape migration policies, in countries both of origin and destination.

    B. Border control
Just as a common response to irregular migration has been to tighten borders, so too have
countries responded to the increase in human trafficking by strengthening border control. Stricter
border controls and increased law enforcement are common methods. Expenditure on border
control is increasing rapidly throughout Australia, the United States, Western Europe and other
perceived destination areas. At the global and regional levels, international cooperation in
addressing trafficking is largely within the context of action to deter and prevent irregular
movements and the promotion of national legislation to assist in this. The Bali Process on People
Smuggling, Trafficking in Persons and Related Transnational Crime, set up in South-East Asia,
has a strong crime control emphasis and focuses on capacity-building of operational-level law


                                                22
fenforcement, immigration and other key personnel involved in combating migrant smuggling,
trafficking in persons and related forms of transnational crime.In Western and Central Europe,
the European Union has focused extensively on issues of smuggling and trafficking within the
context of controlling immigration from outside. Following the 1999 Tampere European
Council, which guaranteed access to European territory to asylumseekers, draft council
directives were formulated on penal frameworks for those who facilitate unauthorized entry and
residence.

    C. Human rights
When trafficking is defined within the context of irregular migration, the crime control focus
becomes the illegal entry or stay in a country, that is, infraction of state laws by the migrant him-
or herself. This focus raises the danger that the human rights abuses and exploitation that are the
characteristics of trafficking may not be addressed. Even when government measures primarily
target the recruiters and exploiters, trafficked persons are at risk of being considered
collaborators in illegal migration rather than as victims of crime.
The unintended consequence of this approach can be severe. To cross closed borders, irregular
migrants are more likely to use professional smugglers or traffickers. The involvement of
criminal groups in migration means that smuggling may lead to exploitation and potential
instances of trafficking, victimization and the violation of human rights. With trafficking being
potentially more profitable than smuggling, owing to the ongoing exploitation of the victim,
States of destination may be inadvertently creating a lucrative market for the traffickers. The
more strictly the laws of immigration against the illegal entrants are enforced, the more
sophisticated forms of criminality are used in human trafficking to overcome the barriers that are
needed to making a profit. This may increase the violence and abuse associated with the practice.

Destination countries in human trafficking

As a result of the increase of illegal migration, many countries of destination have tightened their
immigration requirements. While the demand for unskilled domestic and care workers, women in
particular, has increased, countries of destination have restricted the flow of regular or legal
migration by imposing educational, language and other requirements. Short-term contracts with
dependence upon specific employers, lengthy contract approval processes, certification of skills,
recruitment fees, bonds, police and health checks and travel costs may further impede legitimate
migration. These practices may not be designed specifically to address trafficking, but are rather
aimed at regulating and controlling legal immigration. The possible discrimination against
unskilled migrants (in the face of the growing demand) can have the unintended impact of
further increasing the vulnerability of migrants to being trafficked. Where a legal opportunity
cannot be found, potential migrants may turn to traffickers for assistance. Restrictive migration
policies that limit opportunities to migrate safely and legally will fuel demand for the services of
traffickers.


                                                 23
fCONCLUSION AND RECOMMENDATIONS

Trafficking has emerged as one of the worst and most pervasive forms of human rights violation
of women and children. Trafficking is today a major social and political concern both globally as
well as nationally. It has also become the fastest growing criminal enterprise in the world. The
problem of trafficking has generated lot of concerns and apprehensions among the international
and national policy makers and governments and the civil society at large. Bangladesh has made
significant improvements in dealing with trafficking in persons on society. This paper
recommends that Human trafficking on society :

• increase efforts to prosecute trafficking cases and convict trafficking offenders, and use the new
trafficking law to prosecute fraudulent labour recruiters in society.

• take steps to address the allegations concerning the complicity of public officials in trafficking,
particularly through criminal prosecution and punishment of those involved in or abetting human
trafficking.

• improve oversight of Bangladesh‘s international recruiting agencies to ensure they are not
promoting practices that contribute to labour trafficking.

• reduce exorbitant legal recruitment fees, per the Vigilance Task Force‘s mandate.

• expand the roles and responsibilities of existing labour attachés in destination countries to
include anti-trafficking monitoring, reporting, and engagement with destination countries.

• provide support services for adult male trafficking victims and victims of forced labour and

• work with civil society to improve anti-trafficking messaging through awareness campaigns.
