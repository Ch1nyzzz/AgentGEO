</span><h1 class="entry-title" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">January is Human Trafficking Prevention Month</span></h1><span data-dcnode-id="932" instrument_node="">
</span></div><span data-dcnode-id="930" instrument_node=""> </span><span data-dcnode-id="928" instrument_node="">
</span><div class="entry-content" data-dcnode-id="771"><span data-dcnode-id="927" instrument_node="">
</span><div class="et-l et-l--post" data-dcnode-id="775"><span data-dcnode-id="926" instrument_node="">
</span><div class="et_builder_inner_content et_pb_gutters3" data-dcnode-id="777"><div class="et_pb_section et_pb_section_0 et_section_regular" data-dcnode-id="779"><span data-dcnode-id="925" instrument_node="">
</span><div class="et_pb_row et_pb_row_0 et_pb_row_fullwidth" data-dcnode-id="781"><span data-dcnode-id="924" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_0 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="783"><span data-dcnode-id="923" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="910"><span data-dcnode-id="922" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="912"><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">On December 31, 2021, the White House issued a </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/presidential-actions/2021/12/30/a-proclamation-on-national-human-trafficking-prevention-month-2022/"><span data-dcnode-id="920" instrument_node="">proclamation</span></a><span data-dcnode-id="918" instrument_node="">&nbsp;declaring January 2022 as National Human Trafficking Prevention Month. The proclamation highlights the importance of the federal government approach in the fight against human trafficking, and refers to the recently released National Plan to Combat Human Trafficking. The proclamation acknowledges how human trafficking disproportionately impacts communities that have been historically underserved and excluded, including 2SLGBTQIA+ individuals, communities of color, women and girls, and individuals migrating to the United States. The Administration also states that anti-trafficking efforts must always be connected to our broader efforts to advance equity and justice across our society. Here is the link to the proclamation.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/presidential-actions/2021/12/30/a-proclamation-on-national-human-trafficking-prevention-month-2022/"><span data-dcnode-id="915" instrument_node="">&nbsp;Read full proclamation</span></a></p></div><span data-dcnode-id="911" instrument_node="">
