A//emerj.com/ai-sector-overviews/ai-crime-prevention-5-current-applications/"><span data-dcnode-id="1392" instrument_node="">prevent crime</span></a><span data-dcnode-id="1390" instrument_node=""> and&nbsp;</span></span><span data-dcnode-id="1387" style="font-weight: 400;"><span data-dcnode-id="1388" instrument_node="">defend their buildings, homes, and personal belongings.</span></span></p><p data-dcnode-id="1377"><span data-dcnode-id="1384" style="font-weight: 400;"><span data-dcnode-id="1385" instrument_node="">We researched the space to better understand where AI comes into play in the </span></span><span data-dcnode-id="1382" style="font-weight: 400;"><span data-dcnode-id="1383" instrument_node="">physical security </span></span><span data-dcnode-id="1380" style="font-weight: 400;"><span data-dcnode-id="1381" instrument_node="">indus</span></span><span data-dcnode-id="1378" style="font-weight: 400;"><span data-dcnode-id="1379" instrument_node="">try and to answer the following questions:</span></span></p><ul data-dcnode-id="1359"><li data-dcnode-id="1370" style="font-weight: 400;"><span data-dcnode-id="1375" style="font-weight: 400;"><span data-dcnode-id="1376" instrument_node="">What types of AI applications are currently in use in </span></span><span data-dcnode-id="1373" style="font-weight: 400;"><span data-dcnode-id="1374" instrument_node="">physical security</span></span><span data-dcnode-id="1371" style="font-weight: 400;"><span data-dcnode-id="1372" instrument_node="">?</span></span></li><li data-dcnode-id="1367" style="font-weight: 400;"><span data-dcnode-id="1368" style="font-weight: 400;"><span data-dcnode-id="1369" instrument_node="">What tangible results has AI driven in physical security?</span></span></li><li data-dcnode-id="1360" style="font-weight: 400;"><span data-dcnode-id="1365" style="font-weight: 400;"><span data-dcnode-id="1366" instrument_node="">Are there any common trends among these innovation efforts? How could these trends affect the future of </span></span><span data-dcnode-id="1363" style="font-weight: 400;"><span data-dcnode-id="1364" instrument_node="">physical security</span></span><span data-dcnode-id="1361" style="font-weight: 400;"><span data-dcnode-id="1362" instrument_node="">?</span></span></li></ul><p data-dcnode-id="1349"><span data-dcnode-id="1357" style="font-weight: 400;"><span data-dcnode-id="1358" instrument_node="">This report covers vendors offering software&nbsp;</span></span><span data-dcnode-id="1355" style="font-weight: 400;"><span data-dcnode-id="1356" instrument_node="">with</span></span><span data-dcnode-id="1354" instrument_node=""> </span><span data-dcnode-id="1352" style="font-weight: 400;"><span data-dcnode-id="1353" instrument_node="">4 applications</span></span><span data-dcnode-id="1350" style="font-weight: 400;"><span data-dcnode-id="1351" instrument_node="">:</span></span></p><ul data-dcnode-id="1336"><li data-dcnode-id="1346" style="font-weight: 400;"><span data-dcnode-id="1347" style="font-weight: 400;"><span data-dcnode-id="1348" instrument_node="">Access control for Large Events and Crowds</span></span></li><li data-dcnode-id="1343" style="font-weight: 400;"><span data-dcnode-id="1344" style="font-weight: 400;"><span data-dcnode-id="1345" instrument_node="">Military defense</span></span></li><li data-dcnode-id="1340" style="font-weight: 400;"><span data-dcnode-id="1341" style="font-weight: 400;"><span data-dcnode-id="1342" instrument_node="">Home surveillance</span></span></li><li data-dcnode-id="1337" style="font-weight: 400;"><span data-dcnode-id="1338" style="font-weight: 400;"><span data-dcnode-id="1339" instrument_node="">Surveillance of wide-area facilities</span></span></li></ul><p data-dcnode-id="1320"><span data-dcnode-id="1334" style="font-weight: 400;"><span data-dcnode-id="1335" instrument_node="">This article intends to provide business leaders in the </span></span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/artificial-intelligence-and-security-applications/"><span data-dcnode-id="1332" style="font-weight: 400;"><span data-dcnode-id="1333" instrument_node="">security</span></span></a><span data-dcnode-id="1329" style="font-weight: 400;"><span data-dcnode-id="1330" instrument_node=""> space with an idea of what they can currently expect from Ai in their industry. We hope that this article allows business leaders in&nbsp;</span></span><span data-dcnode-id="1327" style="font-weight: 400;"><span data-dcnode-id="1328" instrument_node="">security</span></span><span data-dcnode-id="1325" style="font-weight: 400;"><span data-dcnode-id="1326" instrument_node=""> to garner insights they can confidently relay to their executive teams so they can make informed decisions when thinking about AI adoption. At the very least, this article intends to act as a method of reducing the time business leaders in </span></span><span data-dcnode-id="1323" style="font-weight: 400;"><span data-dcnode-id="1324" instrument_node="">physical security </span></span><span data-dcnode-id="1321" style="font-weight: 400;"><span data-dcnode-id="1322" instrument_node="">spend researching AI companies with whom they may (or may not) be interested in working.</span></span></p><h2 data-dcnode-id="1317"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Access Control for Large Events and Crowds</span></strong></h2><h3 data-dcnode-id="1314"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Evolv Technology</span></strong></h3><p data-dcnode-id="1297"><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evolvtechnology.com/"><span data-dcnode-id="1312" style="font-weight: 400;"><span data-dcnode-id="1313" instrument_node="">Evolv Technology</span></span></a><span data-dcnode-id="1309" style="font-weight: 400;"><span data-dcnode-id="1310" instrument_node=""> claims to offer a physical security system that consists of the </span></span><span data-dcnode-id="1307" style="font-weight: 400;"><span data-dcnode-id="1308" instrument_node="">Evolve Edge</span></span><span data-dcnode-id="1305" style="font-weight: 400;"><span data-dcnode-id="1306" instrument_node=""> personnel threat screening machine that works with the </span></span><span data-dcnode-id="1303" style="font-weight: 400;"><span data-dcnode-id="1304" instrument_node="">Evolv Pinpoint</span></span><span data-dcnode-id="1298" style="font-weight: 400;"><span data-dcnode-id="1302" instrument_node=""> automated </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/facial-recognition-in-law-enforcement/"><span data-dcnode-id="1301" instrument_node="">facial recognition application</span></a><span data-dcnode-id="1299" instrument_node="">. </span></span></p><p data-dcnode-id="1294"><span data-dcnode-id="1295" style="font-weight: 400;"><span data-dcnode-id="1296" instrument_node="">The company says its screening machine’s physical design allows 600 to 900 people to walk through per hour, or at least one person per second. The company claims to eliminate bottlenecks and long lines without the need for customers to stop and pose or empty pockets.</span></span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" style="font-weight: 400;"><span data-dcnode-id="1293" instrument_node="">The company explains that the database can contain&nbsp;approved profiles of persons such as VIPs, regular company employees, season ticket holders for events, repeat patrons, and other persons who should be allowed entry to a venue.</span></span></p><p data-dcnode-id="1288"><span data-dcnode-id="1289" style="font-weight: 400;"><span data-dcnode-id="1290" instrument_node="">Evolv Technology claims their machines could be used at airports, major events, schools, commercial and business buildings, government offices, and other public places. The wheels at the bottom of the machine allow security users to easily move it in order to create checkpoints. </span></span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" style="font-weight: 400;"><span data-dcnode-id="1287" instrument_node="">To use the machine, users set it up at the entrance of a venue and allow visitors to walk through it normally.</span></span></p><p data-dcnode-id="1277"><span data-dcnode-id="1283" style="font-weight: 400;"><span data-dcnode-id="1284" instrument_node="">The built-in facial recognition camera captures video footage as the visitors approach, while&nbsp;</span></span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evolvtechnology.com/mass-casualty-screening/%23evolv-edge"><span data-dcnode-id="1281" style="font-weight: 400;"><span data-dcnode-id="1282" instrument_node="">Evolv Pinpoint</span></span></a><span data-dcnode-id="1278" style="font-weight: 400;"><span data-dcnode-id="1279" instrument_node="">’s algorithms match visitors’ faces with those on the watchlist uploaded into the system’s database. </span></span></p><p data-dcnode-id="1274"><span data-dcnode-id="1275" style="font-weight: 400;"><span data-dcnode-id="1276" instrument_node="">If the visitor is discovered to be a person of interest, their image and profile is displayed on a tablet and highlighted by a red light, as seen in the 4-minute video below:</span></span></p><div data-dcnode-id="755" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" class="lazy-loaded" data-dcnode-id="756" data-lazy-type="iframe" data-src="//www.youtube.com/embed/e-Fh40WiDH0" frameborder="0" height="393.75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/e-Fh40WiDH0&amp;raw" width="700"><html data-cast-api-enabled="true" data-dcnode-id="758" dir="ltr" lang="en"><head data-dcnode-id="1248"><meta charset="utf-8"><meta content="width=de ,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="791" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="771" title="Full screen (f)"><svg data-dcnode-id="772" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="785"><use class="ytp-svg-shadow" data-dcnode-id="787" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="788" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="786" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="781"><use class="ytp-svg-shadow" data-dcnode-id="783" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="784" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="782" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="777"><use class="ytp-svg-shadow" data-dcnode-id="779" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="780" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="778" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="773"><use class="ytp-svg-shadow" data-dcnode-id="775" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="776" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="774" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=e-Fh40WiDH0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p data-dcnode-id="752"><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">If the visitor sets off a red light, the person is blocked from entering and apprehended.</span></span></p><p data-dcnode-id="749"><span data-dcnode-id="750" style="font-weight: 400;"><span data-dcnode-id="751" instrument_node="">If the visitor profile triggers a yellow light around his profile, which means an unverified threat, the security officers can send the profile to a human expert in central monitoring for real-time review and verification. This company claims this process takes a few seconds more. If the identification is negative, the video of the visitor is discarded and the visitor is allowed to walk through.</span></span></p><p data-dcnode-id="746"><span data-dcnode-id="747" style="font-weight: 400;"><span data-dcnode-id="748" instrument_node="">Evolv’s Edge also offers a separate screening device that claims to detect metallic and non-metallic explosives, firearms, and other weapons concealed on an individual. If the machine detects concealed weapons, the display on the tablet will overlay a green box on the part of the visitor’s body where the weapon is concealed.</span></span></p><p data-dcnode-id="738"><span data-dcnode-id="744" style="font-weight: 400;"><span data-dcnode-id="745" instrument_node="">Oakland International Airport</span></span><span data-dcnode-id="739" style="font-weight: 400;"><span data-dcnode-id="743" instrument_node=""> estimated 13.2 million passengers traveling through the airport last year. Evolv says the airport hired additional employees to keep the airport safe but also needed a solution for employee and equipment inspection methods. The </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evolvtechnology.com/customers/oakland-international-airport/"><span data-dcnode-id="742" instrument_node="">case study</span></a><span data-dcnode-id="740" instrument_node=""> further notes that the airport needed a system capable of detecting a wider range of potential weapons while improving operational efficiency as headcount increased. </span></span></p><p data-dcnode-id="735"><span data-dcnode-id="736" style="font-weight: 400;"><span data-dcnode-id="737" instrument_node="">After learning about Evolv Edge at the ACI-NA Public Safety and Security Conference in October 2017, Evolv notes that airport management tested the scanning machine and facial recognition system over the next four months at Terminal 2 with its employees.</span></span></p><p data-dcnode-id="732"><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">No specific numbers were revealed in the case study, but it quotes aviation security manager Doug Mansel as saying “We like that our employees are embracing the Evolv Edge process, and that the system can detect all of the threats we worry about. Evolv Edge is the only personnel inspection system that looks for both metallic and non-metallic threats, is mobile and has a high throughput rate for employees that do not have to divest.”</span></span></p><p data-dcnode-id="725"><span data-dcnode-id="730" style="font-weight: 400;"><span data-dcnode-id="731" instrument_node="">Evolv also lists Gillette Stadium as its client. The company did not reveal other clients, but has garnered nearly </span></span><span data-dcnode-id="728" style="font-weight: 400;"><span data-dcnode-id="729" instrument_node="">$30 million</span></span><span data-dcnode-id="726" style="font-weight: 400;"><span data-dcnode-id="727" instrument_node=""> in venture-capital funding.</span></span></p><p data-dcnode-id="720"><span data-dcnode-id="721" style="font-weight: 400;"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/lorena-kreda-20ba625/"><span data-dcnode-id="724" instrument_node="">Lorena Kreda</span></a><span data-dcnode-id="722" instrument_node=""> is Director of Machine Vision at Evolv Technology. Prior to Evolv, she was a principal partner at Machine Vision Analysts. She was also Director of Machine Vision for eight years at Reveal Imaging Technologies, the precursor of Evolv before to its acquisition by Science Applications International. She received her Master’s in electrical engineering from the Worcester Polytechnic Institute.</span></span></p><h2 data-dcnode-id="717"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Military and Defense</span></strong></h2><h3 data-dcnode-id="714"><b data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Shield AI</span></b></h3><p data-dcnode-id="704"><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shield.ai/"><span data-dcnode-id="712" style="font-weight: 400;"><span data-dcnode-id="713" instrument_node="">Shield AI</span></span></a><span data-dcnode-id="709" style="font-weight: 400;"><span data-dcnode-id="710" instrument_node=""> offers&nbsp;</span></span><span data-dcnode-id="707" style="font-weight: 400;"><span data-dcnode-id="708" instrument_node="">Hivemind Nova</span></span><span data-dcnode-id="705" style="font-weight: 400;"><span data-dcnode-id="706" instrument_node="">, a quadcopter-type drone that they say helps military or security personnel in surveillance, reconnaissance or clearing operations. The drone is driven by Hivemind, a machine learning application which the company claims enables robots or machines—including unmanned ground, aerial, and underwater vehicles —to see and learn about the world.</span></span></p><p data-dcnode-id="701"><span data-dcnode-id="702" style="font-weight: 400;"><span data-dcnode-id="703" instrument_node="">The combined system enables defense and security personnel to access and explore building interiors, urban areas, caves, tunnels, other high threat environments, and GPS-absent areas to collect information about potential threats.</span></span></p><p data-dcnode-id="698"><span data-dcnode-id="699" style="font-weight: 400;"><span data-dcnode-id="700" instrument_node="">To use the system, the company claims that users can command the drone from the Hivemind-equipped mobile unit, saying that no pilot is necessary and minimal training is required.</span></span></p><p data-dcnode-id="695"><span data-dcnode-id="696" style="font-weight: 400;"><span data-dcnode-id="697" instrument_node="">Once the mobile unit is on, the drone can start exploring target environments. The machine learning technology assists the drone during the flight in collecting data. In the absence of light, the intelligent infrared is automatically activated, says Shield. </span></span></p><p data-dcnode-id="692"><span data-dcnode-id="693" style="font-weight: 400;"><span data-dcnode-id="694" instrument_node="">The software then streams live video to the mobile unit as it maps the environment, as demonstrated in the short video below:</span></span></p><p data-dcnode-id="689"><span data-dcnode-id="690" style="font-weight: 400;"><span data-dcnode-id="691" instrument_node="">The company claims that machine learning technology allows the robot system to learn from battlefield experiences with minimal human participation, reducing risk&nbsp;to personnel. The machine learning also enables the system to teach and work with other robots to complete missions faster and cover a wider area, according to the company.</span></span></p><p data-dcnode-id="672"><span data-dcnode-id="685" style="font-weight: 400;"><span data-dcnode-id="688" instrument_node="">According to Shield AI, </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.army.mil/article/196515/army_scouts_latest_drone_technology_at_socom_thunderdrone_event"><span data-dcnode-id="687" instrument_node="">the system was </span></a></span><span data-dcnode-id="683" style="font-weight: 400;"><span data-dcnode-id="684" instrument_node="">tested</span></span><span data-dcnode-id="681" style="font-weight: 400;"><span data-dcnode-id="682" instrument_node=""> by the Department of Defense (DoD) prior to the product’s market launch, but no other details were provided. Aside from the DoD, the company, which has generated&nbsp;</span></span><span data-dcnode-id="679" style="font-weight: 400;"><span data-dcnode-id="680" instrument_node="">$13.1 million </span></span><span data-dcnode-id="677" style="font-weight: 400;"><span data-dcnode-id="678" instrument_node="">in capital funding, lists </span></span><span data-dcnode-id="675" style="font-weight: 400;"><span data-dcnode-id="676" instrument_node="">clients</span></span><span data-dcnode-id="673" style="font-weight: 400;"><span data-dcnode-id="674" instrument_node=""> including the Department of Homeland Security, as well as other federal, state, and local departments. The company has not made any case studies available.</span></span></p><p data-dcnode-id="666"><span data-dcnode-id="667" style="font-weight: 400;"><span data-dcnode-id="671" instrument_node="">Shield’s Chief Scientific Officer </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/nathan-michael-83b790156/"><span data-dcnode-id="670" instrument_node="">Nathan Michael</span></a><span data-dcnode-id="668" instrument_node=""> is also an Associate Research Professor at the Robotics Institute of Carnegie Mellon University, where he is the director of the Robust Adaptive Systems Lab. He obtained his PhDn in mechanical engineering from the University of Pennsylvania.</span></span></p><h2 data-dcnode-id="663"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Home Surveillance</span></strong></h2><h3 data-dcnode-id="660"><b data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Deep Sentinel&nbsp;</span></b></h3><p data-dcnode-id="654"><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.deepsentinel.com/"><span data-dcnode-id="658" style="font-weight: 400;"><span data-dcnode-id="659" instrument_node="">Deep Sentinel</span></span></a><span data-dcnode-id="655" style="font-weight: 400;"><span data-dcnode-id="656" instrument_node=""> offers a namesake home security system that integrates wireless cameras, predictive AI, and human intervention. The company claims the system uses a combination of motion detection, human-body detection, and facial recognition technologies in its image and video object detection and recognition functions. </span></span></p><p data-dcnode-id="651"><span data-dcnode-id="652" style="font-weight: 400;"><span data-dcnode-id="653" instrument_node="">The wireless cameras run on a homeowner’s internet connection, allowing for live audio and video streaming and monitoring from a human surveillance team, according to the company. The system starts continuous recording when it determines crime suspicion. </span></span></p><p data-dcnode-id="640"><span data-dcnode-id="649" style="font-weight: 400;"><span data-dcnode-id="650" instrument_node="">The </span></span><span data-dcnode-id="647" style="font-weight: 400;"><span data-dcnode-id="648" instrument_node="">system is alerted</span></span><span data-dcnode-id="645" style="font-weight: 400;"><span data-dcnode-id="646" instrument_node=""> when the motion detector senses a moving presence in the area covered by the camera. According to the company, the system wakes up with a 10-second lag before beginning to capture and record images. The </span></span><span data-dcnode-id="643" style="font-weight: 400;"><span data-dcnode-id="644" instrument_node="">deep learning</span></span><span data-dcnode-id="641" style="font-weight: 400;"><span data-dcnode-id="642" instrument_node=""> algorithms determine if the presence is that of a human, animal or another moving object.</span></span></p><p data-dcnode-id="637"><span data-dcnode-id="638" style="font-weight: 400;"><span data-dcnode-id="639" instrument_node="">If it determines that the movement is from a person, the facial recognition algorithms identify and determine if the human is the homeowner or family member. The predictive AI technology then identifies patterns in the behavior of the person based on data collected by the camera, determines if the person’s actions suspicious.</span></span></p><p data-dcnode-id="630"><span data-dcnode-id="635" style="font-weight: 400;"><span data-dcnode-id="636" instrument_node="">If the system does not recognize the facial features and determines continuous suspicious behavior, Deep Sentinel’s&nbsp;</span></span><span data-dcnode-id="633" style="font-weight: 400;"><span data-dcnode-id="634" instrument_node="">human surveillance team</span></span><span data-dcnode-id="631" style="font-weight: 400;"><span data-dcnode-id="632" instrument_node=""> identifies a threat in less than 10 seconds, and calls the police within 20 seconds, according to the website. Other offerings in the company’s product line feature a camera that sets off a siren to deter the intruders from entering the home’s premises.</span></span></p><p data-dcnode-id="627"><span data-dcnode-id="628" style="font-weight: 400;"><span data-dcnode-id="629" instrument_node="">The application could detect a person lingering by a homeowner’s premises. Depending on the plan or offering that the customer purchases, the homeowner is alerted directly on his or her phone and has the opportunity to launch the drone.</span></span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">We could not find any videos demonstrating how the software works.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" style="font-weight: 400;"><span data-dcnode-id="624" instrument_node="">The company claims that the AI records only the crime in progress to eliminate useless footage and save battery power. The system works with Arlo Q, Q Plus, Arlo Baby, and Arlo Pro 2, Amazon Cloud Cam, all Ring security cameras, and Nest Cam Indoor and Outdoor cameras, among others.</span></span></p><p data-dcnode-id="615"><span data-dcnode-id="620" style="font-weight: 400;"><span data-dcnode-id="621" instrument_node="">The company has raised </span></span><span data-dcnode-id="618" style="font-weight: 400;"><span data-dcnode-id="619" instrument_node="">$7.4 million</span></span><span data-dcnode-id="616" style="font-weight: 400;"><span data-dcnode-id="617" instrument_node=""> in venture funding. No case studies are available from its homeowner clients, the single market that it serves. The company does not serve other sectors.</span></span></p><p data-dcnode-id="610"><span data-dcnode-id="611" style="font-weight: 400;"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/ching-wa-yip-023504132/%3Flipi%3Durn%253Ali%253Apage%253Ad_flagship3_search_srp_people%253ByKbi1qImTzGKSgWPcSYvZw%253D%253D%26licu%3Durn%253Ali%253Acontrol%253Ad_flagship3_search_srp_people-search_srp_result%26lici%3DaHK0PJ6hTii34%252BU2dZxEaA%253D%253D"><span data-dcnode-id="614" instrument_node="">Ching-Wa Yip</span></a><span data-dcnode-id="612" instrument_node=""> is Data Science and Machine Learning Lead at Deep Sentinal. She holds a PhD in Physics and Astronomy from the University of Pittsburgh.</span></span></p><h2 data-dcnode-id="607"><b data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Surveillance of Wide-Area Facilities </span></b></h2><h3 data-dcnode-id="604"><b data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Digital Barriers </span></b></h3><p data-dcnode-id="594"><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitalbarriers.com/"><span data-dcnode-id="602" style="font-weight: 400;"><span data-dcnode-id="603" instrument_node="">Digital Barriers</span></span></a><span data-dcnode-id="599" style="font-weight: 400;"><span data-dcnode-id="600" instrument_node=""> offers AI-driven physical security systems for </span></span><span data-dcnode-id="597" style="font-weight: 400;"><span data-dcnode-id="598" instrument_node="">energy and utilities</span></span><span data-dcnode-id="595" style="font-weight: 400;"><span data-dcnode-id="596" instrument_node=""> clients, such as oil and gas, solar farms, electrical substations and pylons, water utility sites, and nuclear power facilities.</span></span></p><p data-dcnode-id="587"><span data-dcnode-id="592" style="font-weight: 400;"><span data-dcnode-id="593" instrument_node="">The company’s&nbsp;</span></span><span data-dcnode-id="590" style="font-weight: 400;"><span data-dcnode-id="591" instrument_node="">EdgeVis Shield</span></span><span data-dcnode-id="588" style="font-weight: 400;"><span data-dcnode-id="589" instrument_node=""> is a solution that Digital Barriers claims to integrate multiple sensors, such as seismic ground sensors, wireless optical and thermal cameras, and video analytics to give users a single view of the area surveyed.</span></span></p><p data-dcnode-id="584"><span data-dcnode-id="585" style="font-weight: 400;"><span data-dcnode-id="586" instrument_node="">The system is triggered when it detects intrusion patterns. The intrusion is captured on live video over a wireless network to alert the security personnel at the facility. These patterns include noting when an individual or vehicle enters a prohibited area or the wrong sequence and then remains in a prohibited area longer than authorized. </span></span></p><p data-dcnode-id="581"><span data-dcnode-id="582" style="font-weight: 400;"><span data-dcnode-id="583" instrument_node="">Below is a 3-minute demonstration of the product and how its sensors are triggered:</span></span></p><div data-dcnode-id="579" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="580" data-lazy-type="iframe" data-src="//www.youtube.com/embed/LPYTJ09lrVU" frameborder="0" height="393.75" loading="lazy" width="700"></iframe></div><p data-dcnode-id="568"><span data-dcnode-id="577" style="font-weight: 400;"><span data-dcnode-id="578" instrument_node="">The system is trained to ignore environmental effects like poor weather, camera shake, moving foliage and shadows, the company reports. Its </span></span><span data-dcnode-id="575" style="font-weight: 400;"><span data-dcnode-id="576" instrument_node="">seismic ground sensors</span></span><span data-dcnode-id="573" style="font-weight: 400;"><span data-dcnode-id="574" instrument_node="">&nbsp;detect and distinguish between people and vehicles, while it applies </span></span><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">facial recognition</span></span><span data-dcnode-id="569" style="font-weight: 400;"><span data-dcnode-id="570" instrument_node=""> to identify the intruder.</span></span></p><p data-dcnode-id="561"><span data-dcnode-id="566" style="font-weight: 400;"><span data-dcnode-id="567" instrument_node="">The </span></span><span data-dcnode-id="564" style="font-weight: 400;"><span data-dcnode-id="565" instrument_node="">transport video interface</span></span><span data-dcnode-id="562" style="font-weight: 400;"><span data-dcnode-id="563" instrument_node="">&nbsp;allows multiple users to scale the surveillance operation and simultaneously view videos through wireless communications networks such as cellular, military mesh, radio or Satcom, according to the company.</span></span></p><p data-dcnode-id="554"><span data-dcnode-id="559" style="font-weight: 400;"><span data-dcnode-id="560" instrument_node="">The software is compatible with AXIS cameras and </span></span><span data-dcnode-id="557" style="font-weight: 400;"><span data-dcnode-id="558" instrument_node="">encoders</span></span><span data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" instrument_node="">. The company says it can be used to secure remote borders and protect remote assets, such as transportation depots.</span></span></p><p data-dcnode-id="547"><span data-dcnode-id="552" style="font-weight: 400;"><span data-dcnode-id="553" instrument_node="">The company lists defense, security, and law enforcement agencies in more than fifty countries as clients. However, they do not make available any case studies. In August 2017, the company announced the awarding of a contract with a major </span></span><span data-dcnode-id="550" style="font-weight: 400;"><span data-dcnode-id="551" instrument_node="">US federal law enforcement agency</span></span><span data-dcnode-id="548" style="font-weight: 400;"><span data-dcnode-id="549" instrument_node=""> valued at $11.9 million. The contract called for Digital Barriers to provide surveillance equipment through one of its partners. No other details of the contract were revealed.</span></span></p><p data-dcnode-id="524"><span data-dcnode-id="545" style="font-weight: 400;"><span data-dcnode-id="546" instrument_node="">Digital Barriers sells directly or through technology partners such as </span></span><span data-dcnode-id="543" style="font-weight: 400;"><span data-dcnode-id="544" instrument_node="">NVidia</span></span><span data-dcnode-id="541" style="font-weight: 400;"><span data-dcnode-id="542" instrument_node="">, Axis Communications, </span></span><span data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" instrument_node="">Next Future Transportation</span></span><span data-dcnode-id="537" style="font-weight: 400;"><span data-dcnode-id="538" instrument_node="">, </span></span><span data-dcnode-id="535" style="font-weight: 400;"><span data-dcnode-id="536" instrument_node="">Coban</span></span><span data-dcnode-id="533" style="font-weight: 400;"><span data-dcnode-id="534" instrument_node="">, and </span></span><span data-dcnode-id="531" style="font-weight: 400;"><span data-dcnode-id="532" instrument_node="">Morphean</span></span><span data-dcnode-id="529" style="font-weight: 400;"><span data-dcnode-id="530" instrument_node="">, among others. Digital Barriers was </span></span><span data-dcnode-id="527" style="font-weight: 400;"><span data-dcnode-id="528" instrument_node="">acquired</span></span><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">&nbsp;by Volpi Capital for an undisclosed amount.</span></span></p><p data-dcnode-id="516"><span data-dcnode-id="522" style="font-weight: 400;"><span data-dcnode-id="523" instrument_node="">There does not seem to be any C-level executives on the team with an AI background. </span></span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-executive-guides/how-to-cut-through-the-artificial-intelligence-hype/"><span data-dcnode-id="520" style="font-weight: 400;"><span data-dcnode-id="521" instrument_node="">We caution readers to be wary of companies that claim to do AI</span></span></a><span data-dcnode-id="517" style="font-weight: 400;"><span data-dcnode-id="518" instrument_node=""> without any C-level AI experts on their team.</span></span></p><h3 data-dcnode-id="513"><b data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Agent Video Intelligence</span></b></h3><p data-dcnode-id="503"><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agentvi.com/products/"><span data-dcnode-id="511" style="font-weight: 400;"><span data-dcnode-id="512" instrument_node="">Agent Video Intelligence</span></span></a><span data-dcnode-id="508" style="font-weight: 400;"><span data-dcnode-id="509" instrument_node=""> offers </span></span><span data-dcnode-id="506" style="font-weight: 400;"><span data-dcnode-id="507" instrument_node="">InnoVi, a&nbsp;</span></span><span data-dcnode-id="504" style="font-weight: 400;"><span data-dcnode-id="505" instrument_node="">cloud-based software that the company claims uses video analytics driven by deep learning algorithms. The company reports that InnoVi is suited to central monitoring systems and surveillance of smart cities.</span></span></p><p data-dcnode-id="500"><span data-dcnode-id="501" style="font-weight: 400;"><span data-dcnode-id="502" instrument_node="">Agent Video Intelligence claims that, using video footage captured by the smart cameras, the algorithms have the capability to separate and classify people, animals, vehicles, and static objects to ensure accurate detection and low false alarm rates.</span></span></p><p data-dcnode-id="493"><span data-dcnode-id="498" style="font-weight: 400;"><span data-dcnode-id="499" instrument_node="">According to the company, InnoVi’s </span></span><span data-dcnode-id="496" style="font-weight: 400;"><span data-dcnode-id="497" instrument_node="">deep learning</span></span><span data-dcnode-id="494" style="font-weight: 400;"><span data-dcnode-id="495" instrument_node=""> capabilities enable the application to differentiate objects in a&nbsp; video stream.</span></span></p><p data-dcnode-id="490"><span data-dcnode-id="491" style="font-weight: 400;"><span data-dcnode-id="492" instrument_node="">The company explains that the data is constructed into patterns of normal behavior. This serves as the model against which the system will compare suspicious behavior. Machine learning also enables the application to be applied to any number of cameras as required by wide area facilities and smart cities.</span></span></p><p data-dcnode-id="482"><span data-dcnode-id="488" style="font-weight: 400;"><span data-dcnode-id="489" instrument_node="">For central monitoring, the company reports that the software detects intrusion and facial recognition to enable security personnel and police to respond while the event is in progress. In December 2017, InnoVi was </span></span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agentvi.com/2017/12/20/agent-vi-collaborates-with-aws-to-enable-any-surveillance-camera-to-become-a-smart-camera/"><span data-dcnode-id="486" style="font-weight: 400;"><span data-dcnode-id="487" instrument_node="">integrated with Amazon Kinesis Video Streams</span></span></a><span data-dcnode-id="483" style="font-weight: 400;"><span data-dcnode-id="484" instrument_node=""> by Amazon Web Service to capture, process, and store footage. </span></span></p><p data-dcnode-id="479"><span data-dcnode-id="480" style="font-weight: 400;"><span data-dcnode-id="481" instrument_node="">The 3-minute video below demonstrates how Innovi analyzes and determines possible security incidents, faces, and objects. Once the intrusion is verified, human security personnel can then alert police:</span></span></p><div data-dcnode-id="477" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="478" data-lazy-type="iframe" data-src="//www.youtube.com/embed/bSlDiqMWkD8" frameborder="0" height="393.75" loading="lazy" width="700"></iframe></div><p data-dcnode-id="469"><span data-dcnode-id="475" style="font-weight: 400;"><span data-dcnode-id="476" instrument_node="">Wirsol Solar UK</span></span><span data-dcnode-id="470" style="font-weight: 400;"><span data-dcnode-id="474" instrument_node=""> needed a surveillance solution for four 5-megawatt solar farms, each measuring some 200,000 square meters. The </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agentvi.com/portfolio-items/wirsol-solar-farms/%3FportfolioCats%3D15"><span data-dcnode-id="473" instrument_node="">case study</span></a><span data-dcnode-id="471" instrument_node=""> notes that the client faced challenging conditions at the remote, rural sites which were unmanned and poorly lit. Wirsol Solar wanted a system that could prevent intruders from entering and stealing the solar panels.</span></span></p><p data-dcnode-id="466"><span data-dcnode-id="467" style="font-weight: 400;"><span data-dcnode-id="468" instrument_node="">Agent Vi claims its video analytics solution was integrated with thermal network cameras and installed around the perimeter fence to detect intruders day and night. </span></span></p><p data-dcnode-id="463"><span data-dcnode-id="464" style="font-weight: 400;"><span data-dcnode-id="465" instrument_node="">According to the case study, the system was able to detect a number of intrusions which triggered the system’s alarm that is monitored by security personnel at a remote station. The guard was able to warn the intruder through the speakers at the site, the study relates.</span></span></p><p data-dcnode-id="455"><span data-dcnode-id="461" style="font-weight: 400;"><span data-dcnode-id="462" instrument_node="">No specific figures were provided on the case study but </span></span><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agentvi.com/wp-content/uploads/2016/06/Agent_Vi_Case_Study_-_Wirsol_Solar.pdf"><span data-dcnode-id="459" style="font-weight: 400;"><span data-dcnode-id="460" instrument_node="">Stan Dominey</span></span></a><span data-dcnode-id="456" style="font-weight: 400;"><span data-dcnode-id="457" instrument_node="">, Project Manager at Wirsol Solar UK, says “the use of thermal cameras with Agent Vi’s real-time analytics software is especially appropriate, as our large sites do not have lighting and are difficult to guard. We have peace of mind with this sophisticated solution that protects our investment.”</span></span></p><p data-dcnode-id="448"><span data-dcnode-id="453" style="font-weight: 400;"><span data-dcnode-id="454" instrument_node="">Other Agent VI </span></span><span data-dcnode-id="451" style="font-weight: 400;"><span data-dcnode-id="452" instrument_node="">clients</span></span><span data-dcnode-id="449" style="font-weight: 400;"><span data-dcnode-id="450" instrument_node=""> include Palais des Congres de Montreal, Securitas Alert Services, Tulsa University, the City of Zagreb in Croatia, and Green Bay Airport.</span></span></p><p data-dcnode-id="445"><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node="">Zvika Ashani is the CTO of Agent VI. Prior to this, he was co-founder of Aspectus Video Intelligence and held technical management roles in Tidex and IES industries. Ashani also served at the Israeli Airforce as technical officer. He holds a Master’s degree in Electrical Engineering from the Technion Israel Institute of Technology.</span></span></p><h2 data-dcnode-id="442"><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Takeaways for Business Leaders</span></strong></h2><p data-dcnode-id="439"><span data-dcnode-id="440" style="font-weight: 400;"><span data-dcnode-id="441" instrument_node="">All physical security companies covered in this report claim to offer a mix of video surveillance solutions, access control, and intrusion alerts.</span></span></p><p data-dcnode-id="436"><span data-dcnode-id="437" style="font-weight: 400;"><span data-dcnode-id="438" instrument_node="">The systems are usually driven by a combination of deep learning, machine learning, and facial recognition technologies. Deep learning technology enables the software to differentiate between humans, animals, objects, time of day, and weather conditions.</span></span></p><p data-dcnode-id="433"><span data-dcnode-id="434" style="font-weight: 400;"><span data-dcnode-id="435" instrument_node="">These companies say machine learning determines normal behavior versus suspicious behavior and enables the application to be deployed in any number of cameras to cover large areas.</span></span></p><p data-dcnode-id="430"><span data-dcnode-id="431" style="font-weight: 400;"><span data-dcnode-id="432" instrument_node="">The companies claim to use facial recognition to identify the facial features of a person, to recognize if they are members of the family, employees of the organization, valid guests, participants, or visitors of a facility.</span></span></p><p data-dcnode-id="427"><span data-dcnode-id="428" style="font-weight: 400;"><span data-dcnode-id="429" instrument_node="">These offerings are integrated solutions, meaning they offer both hardware and software that is used onsite. The offerings claim to come with support from a security team seated in a central monitoring area on the provider side. This team is responsible for alerting law enforcement if needed.</span></span></p><p data-dcnode-id="424"><span data-dcnode-id="425" style="font-weight: 400;"><span data-dcnode-id="426" instrument_node="">Another similarity among the providers discussed in this report are the industries they serve such as secure borders, energy and utilities, facilities and sites, law enforcement, cities and public safety, and transportation. In the spirit of inclusion, we also noted a company that offered home security solutions.</span></span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">&nbsp;</span></p><p data-dcnode-id="419"><em data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Header image credit: Security Magazine</span></em></p></div><div class="share-bar footer-share-bar" data-dcnode-id="399"><div class="share-to" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Share to:</ rviews/ai-building-automation-current-applications/"><span data-dcnode-id="328" instrument_node="">AI in Building Automation – Current Applications</span></a></h3></div><div class="post-excerpt line-4-rows" data-dcnode-id="321"><a class="excerpt-permalink" data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/ai-building-automation-current-applications/"><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">In our previous report, we covered the current use cases for AI in construction and building. As of now, numerous companies claim to assist building maintenance managers&nbsp;in aspects of their roles from optimizing energy usage in building to improving the comfort of building occupants.</span></p></a></div><span data-dcnode-id="320" instrument_node=""> </span><a class="permalink" data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/ai-building-automation-current-applications/"><span data-dcnode-id="319" instrument_node="">Read more </span><i class="icon-next-page-icon" data-dcnode-id="318"></i></a></div></div><div class="row item-container article-item" data-dcnode-id="284"><div class="col-4 image-container" data-dcnode-id="308"><div class="image-wrap" data-dcnode-id="309"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emerj.com/ai-sector-overviews/ai-for-banking-in-europe-3-current-applications/"><img alt="AI for Banking in Europe - 3 Current Applications" class="lazy-hidden wp-post-image" data-dcnode-id="314" data-lazy-type="image" data-src="https://emerj.com/wp-content/uploads/2018/10/ai-for-banking-in-europe-3-current-applications-320x270.jpg" data-srcset="https://emerj.com/wp-content/uploads/2018/10/ai-for-banking-in-europe-3-current-applications.jpg 890w, https://emerj.com/wp-content/uploads/2018/10/ai-for-banking-in-europe-3-current-applicati
