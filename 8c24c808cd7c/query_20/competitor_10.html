</span><h2 data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">What EY can do for you</span></h2><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">The trade finance industry is highly complex and distributed, encompassing manufacturers, importers, shipping entities, financial institutions and government agencies.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">An estimated US$1 trillion of financial crime proceeds flows through the US$9.1 trillion industry’s trade channels annually. Financial crime at this scale threatens to disrupt the global economy and cause monetary and reputational damage to financial institutions.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">With regulatory scrutiny on the rise, banks must address key challenges:</span></p><span data-dcnode-id="1916" instrument_node="">
</span><ul data-dcnode-id="1908" style="list-style-position: inside;"><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Managing a high volume of paper documents and manual processes across the trade transaction life cycle</span></li><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Detecting patterns of illicit trade finance activity as bad actors employ increasingly sophisticated techniques to launder money, illegally transport goods, and avoid sanctions and boycott</span></li><span data-dcnode-id="1909" instrument_node="">
</span></ul><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1906" instrument_node="">To help your company meet these challenges, we teamed with SAS to develop TRACK (Trade Risk Analytics Compliance Kit), an innovative platform that addresses the unique, complex risks in international trade.</span><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node=""> </span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">TRACK goes beyond traditional transaction-monitoring tools, which struggle to address unstructured data, extensive party networks and complex transaction life cycles.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">TRACK delivers next-generation transaction monitoring with:</span></p><span data-dcnode-id="1896" instrument_node="">
</span><ul data-dcnode-id="1885" style="list-style-position: inside;"><span data-dcnode-id="1895" instrument_node="">
</span><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Machine learning, artificial intelligence, robotic process automation (RPA) and optical character recognition (OCR) to automate and improve risk controls</span></li><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">A software as a service (SaaS) model to simplify deployment and operations</span></li><span data-dcnode-id="1889" instrument_node="">
</span><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Our deep business knowledge and experience with regulatory guidance and model governance</span></li><span data-dcnode-id="1886" instrument_node="">
</span></ul><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">TRACK can help move your business from inefficient, manual and paper-based processes to increased automation and digital innovation. That helps address the rising cost of compliance amid growing regulatory requirements.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1880" instrument_node="">TRACK can benefit any complex industry, including trade finance, capital markets, asset management, insurance and wholesale payments.</span><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node=""> </span></p><span data-dcnode-id="1876" instrument_node="">

</span><a class="hyperlink-text-link" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/how-corporate-banks-can-ride-the-disruptive-wave-of-global-trade"><h4 class="article-title is-clipped" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">How corporate banks can ride the disruptive wave of global trade</span></h4></a><span data-dcnode-id="1734" instrument_node="">
</span><p class="article-subheading is-clipped" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">The evolution of global trade threatens a steady income source for banks, unless they can understand and adapt to change. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><div class="article-details" data-dcnode-id="1720"><span data-dcnode-id="1730" instrument_node="">
</span><span class="multiple-line article-date" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">19 Sep 2019</span></span><span data-dcnode-id="1727" instrument_node="">
</span><span data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node=""> </span><a class="article-author hyperlink-text-link" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/people/dai-bedford"><span data-dcnode-id="1725" instrument_node="">Dai Bedford</span></a><span data-dcnode-id="1723" instrument_node=""> </span></span><span data-dcnode-id="1721" instrument_node="">
</span></div><span data-dcnode-id="1719" instrument_node="">
</span></div><span data-dcnode-id="1717" instrument_node="">
</span></div><span data-dcnode-id="1715" instrument_node="">
</span></div></div><span data-dcnode-id="1712" instrument_node="">
</span></div><span data-dcnode-id="1710" instrument_node="">
</span></div><span data-dcnode-id="1708" instrument_node="">
</span></div><span data-dcnode-id="1706" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1664"><span data-dcnode-id="1705" instrument_node="">
</span><p aria-hidden="true" class="parent-of-selection-dropcap" data-dcnode-id="1701"><span class="selection-dropcap" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">B</span></span><span data-dcnode-id="1702" instrument_node="">anks play a vital role facilitating international trade by providing their clients with a wide array of offerings. Supply chain finance includes distributing short-term credit to provide better working capital for the buyer and seller. Trade finance involves lending money to support the trading of commodities or working with export credit agencies to offer financing that may otherwise be risky. In both cases, there are numerous compliance checks associated with these offerings.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1696"><span data-dcnode-id="1699" instrument_node="">As a result, a myriad of importers and exporters rely on these financial intermediaries to reduce their risk exposure.</span><br data-dcnode-id="1698"><span data-dcnode-id="1697" instrument_node=""> </span></p><span data-dcnode-id="1695" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">However, with trading relationships in a state of increased uncertainty over the last couple of years owing to rising tariffs and geopolitical and market volatility, managing trade finance has become significantly more challenging.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Moreover, the rising costs of providing trade finance, coupled with greater regulatory scrutiny, are weighing on banks’ trade finance growth prospects.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h4 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Seeking efficiency</span></h4><span data-dcnode-id="1686" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">A typical trade transaction goes through numerous compliance checks during its life cycle, with each review racking up costs along the way. On average, a large trade finance bank can spend anywhere from US$25m to US$42m annually on risk, compliance, sanctions and anti-money laundering (AML) tasks – all without growing its business.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Underpinning these tasks is the continued use of paper to document millions of transactions. Although most banks acknowledge that using paper is costly and time consuming, the shift to automation has been slow, with few viable solutions implemented effectively across the industry.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">In addition, the especially complex and distributed nature of trade finance means that it is highly exposed to financial crime. An estimated US$1t of financial crime proceeds flow through the US$9.1t industry’s trade channels each year. This not only threatens the global economy, but also causes monetary and reputational damage to financial institutions.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">To address these key challenges, trade finance banks must change how they manage their manual compliance processes and existing detection measures to tackle illicit trade finance activity. Here, technology has a vital role to play.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Increased automation, along with artificial intelligence (AI) and machine learning (ML), can help trade finance reduce overall operational costs and improve customer experience. &nbsp;</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">One global trade finance bank recognized that, to make these necessary changes, it had a better chance of success by collaborating with external partners to find an innovative, digital solution that could benefit the trade finance sector as a whole.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">The bank’s previous experience of working with EY teams, and its confidence in EY technology collaborator, SAS, led it to believe that by working together, the three firms could find technological alternatives to its paper-based, manual processes, helping the bank to play a greater role in facilitating and financing international trade in the future.</span></p><span data-dcnode-id="1665" instrument_node="">

</span><h3 class="caseStudy-title" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Going digital means better trade risk management </span></h3><span data-dcnode-id="1584" instrument_node="">
</span><h4 class="caseStudy-subtitle" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">TRACK gives trade finance teams the opportunity to improve their compliance processes in a digital-first, fully automated way. </span></h4><span data-dcnode-id="1581" instrument_node="">
</span><div class="caseStudy-full" data-dcnode-id="1429"><span data-dcnode-id="1580" instrument_node="">

</span><h2 class="col-xs-12 linkArea-pre-title" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">How EY can help</span></h2><span data-dcnode-id="1569" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="1548"><span data-dcnode-id="1568" instrument_node="">
</span><div class="linkAreaLink component section default-style col-xs-12 initialized" data-dcnode-id="1550"><span data-dcnode-id="1567" instrument_node="">
</span><div class="link-area-link regular industry-related" data-dcnode-id="1552"><span data-dcnode-id="1566" instrument_node="">
</span><h5 class="link-area-title" data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/corporate-commercial-and-sme-banking-services"><span data-dcnode-id="1565" instrument_node="">Corporate, Commercial and SME Banking services </span></a></h5><span data-dcnode-id="1562" instrument_node="">
</span><p class="service-name" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">In Banking and capital markets</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p class="link-area-subtitle" data-dcnode-id="1557" style="overflow: hidden; text-overflow: ellipsis; -webkit-box-orient: vertical; display: -webkit-box; -webkit-line-clamp: 2;"><span data-dcnode-id="1558" instrument_node="">Rapid technology advances are reshaping the entire banking ecosystem, and Corporate, Commercial and SME (CCSB) banking sectors are not immune. EY is helping banks shift their focus back to growth, placing an increased emphasis on client experience, new technology and operational efficiency.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><a class="read-more" data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/corporate-commercial-and-sme-banking-services"><span data-dcnode-id="1555" instrument_node="">Read more</span></a><span data-dcnode-id="1553" instrument_node="">
</span></div><span data-dcnode-id="1551" instrument_node="">
</span></div><span data-dcnode-id="1549" instrument_node="">
</span></div><span data-dcnode-id="1547" instrument_node="">
</span></div><span data-dcnode-id="1545" instrument_node="">
</span></div><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">
</span></div><span data-dcnode-id="1539" instrument_node="">
</span></div><span data-dcnode-id="1537" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1515"><span data-dcnode-id="1536" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">To gain a thorough understanding of the bank’s trade finance operations, the EY team first visited its operational facilities to see how its vast number of trade transactions were processed on any given day. At the time, the bank had a few thousand people, based around the world, who were manually processing approximately nine million trade transactions each year.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">This on-the-ground analysis helped ensure a deeper understanding of the challenge facing the bank and its staff. During this phase, it also became apparent that advances in technological processes could provide the trade finance function with an opportunity to be more effective at collecting, digitizing and analyzing the data required to monitor financial crime.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">This in-person research gave the EY team an opportunity to develop and consolidate their strategic vision on how to effectively apply automation and advanced analytics to the bank’s trade finance operations, while ensuring the necessary compliance procedures would be more than met.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h4 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">The next generation of trade finance</span></h4><span data-dcnode-id="1524" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">EY’s experience in compliance, risk and technology consulting in financial services, together with SAS’ analytics platform, combined to help enable the creation of a new framework and toolkit for addressing this core challenge: the Trade Risk Analytics Compliance Kit (TRACK).</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1517"><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/financial-crime-track"><span data-dcnode-id="1520" instrument_node="">TRACK</span></a><span data-dcnode-id="1518" instrument_node="">&nbsp;harnesses the power of advanced analytics and robotic process automation to transform the way that trade finance teams identify and control risk. Its risk analytics scoring engine can analyze large volumes of trade transactions using natural language processing, text analytics and third-party data.</span></p><span data-dcnode-id="1516" instrument_node="">
</span></div><span data-dcnode-id="1514" instrument_node="">
</span><span data-dcnode-id="1513" instrument_node="">

</span><h2 class="col-xs-12 linkArea-pre-title" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">How EY can help</span></h2><span data-dcnode-id="1499" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="1478"><span data-dcnode-id="1498" instrument_node="">
</span><div class="linkAreaLink component section default-style col-xs-12 initialized" data-dcnode-id="1480"><span data-dcnode-id="1497" instrument_node="">
</span><div class="link-area-link regular industry-related" data-dcnode-id="1482"><span data-dcnode-id="1496" instrument_node="">
</span><h5 class="link-area-title" data-dcnode-id="1493"><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/financial-crime-track" tabindex="-1"><span data-dcnode-id="1495" instrument_node="">TRACK</span></a></h5><span data-dcnode-id="1492" instrument_node="">
</span><p class="service-name" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">In Banking and capital markets</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p class="link-area-subtitle" data-dcnode-id="1487" style="overflow: hidden; text-overflow: ellipsis; -webkit-box-orient: vertical; display: -webkit-box; -webkit-line-clamp: 2;"><span data-dcnode-id="1488" instrument_node="">Our Trade Risk Analytics Compliance Kit (TRACK) offers next-generation transaction monitoring to address the unique, complex risks in international trade finance.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><a class="read-more" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/banking-capital-markets/financial-crime-track" tabindex="-1"><span data-dcnode-id="1485" instrument_node="">Read more</span></a><span data-dcnode-id="1483" instrument_node="">
</span></div><span data-dcnode-id="1481" instrument_node="">
</span></div><span data-dcnode-id="1479" instrument_node="">
</span></div><span data-dcnode-id="1477" instrument_node="">
</span></div><span data-dcnode-id="1475" instrument_node="">
</span></div><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1436"><span data-dcnode-id="1466" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1462"><span data-dcnode-id="1465" instrument_node="">It powers the automated review of millions of transactions via ML models, while simultaneously addressing complex risks in international trade, resulting in a unified view of the risk. This includes detecting patterns of illicit trade finance activity as bad actors employ increasingly sophisticated techniques to launder money, illegally transport goods, and avoid sanctions and boycott.</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node=""> </span></p><span data-dcnode-id="1461" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">By applying analytics to automate these compliance reviews, TRACK provides a broad database of use cases that drives the analytics solution, covering regional and country-specific compliance requirements.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">These include:</span></p><span data-dcnode-id="1455" instrument_node="">
</span><ul data-dcnode-id="1441"><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">AML and fraud: Anti-money laundering rules derived from regulatory guidance, coupled with fraud-specific flags.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Sanctions and export controls: Enhancing existing screening with additional transactional data and monitoring the export of commodities and technology.</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Anti-boycott measures: Detection of words or phrases that violate US anti-boycott rules.</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Military/dual-use detection: Identification of goods that could be used for military or proliferation application.</span></li><span data-dcnode-id="1442" instrument_node="">
</span></ul><span data-dcnode-id="1440" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">“The combination of EY regulatory expertise and our collaborations with various regulatory bodies was essential in helping us to effectively develop and implement a solution like TRACK,” explains Sandeep Pakki, EY US Financial Services Regulatory &amp; Compliance Advisory Manager. “In helping the bank on this journey, it was crucial to bear in mind that regulation is just as important as technology when deploying a solution like TRACK in such a high regulatory environment.”</span></p><span data-dcnode-id="1437" instrument_node="">

</span><p class="article-subheading is-clipped" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Staff shortages, restrictions in delivery routes, changes in buying patterns - how do you plan for sudden disruption?</span></p><span data-dcnode-id="1306" instrument_node="">
</span><div class="article-details" data-dcnode-id="1295"><span data-dcnode-id="1305" instrument_node="">
</span><span class="multiple-line article-date" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">18 Mar 2020</span></span><span data-dcnode-id="1302" instrument_node="">
</span><span data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node=""> </span><a class="article-author hyperlink-text-link" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_us/people/ey"><span data-dcnode-id="1300" instrument_node="">EY Americas</span></a><span data-dcnode-id="1298" instrument_node=""> </span></span><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span></div><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div></div><span data-dcnode-id="1287" instrument_node="">
</span></div><span data-dcnode-id="1285" instrument_node="">
</span></div><span data-dcnode-id="1283" instrument_node="">
</span></div><span data-dcnode-id="1281" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1246"><span data-dcnode-id="1280" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Typically, a bank’s trade finance analysts could spend up to 25% to 30% of transaction processing time performing regulatory compliance checks. And, on top of this, the bank’s initial screening processes can often lead to a high rate of “false positives” which are eventually proven otherwise.&nbsp;</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">With the new system, transactions can now be rapidly escalated through different workflows depending on the severity and type of risk, with advanced anomaly detection distinguishing between normal and abnormal behavior. This helps enable banks’ trade finance analysts to prioritize the most urgent transactions. For example, TRACK will identify red flags and create a risk score which can help determine next steps in the transaction process:</span></p><span data-dcnode-id="1274" instrument_node="">
</span><ul data-dcnode-id="1263"><span data-dcnode-id="1273" instrument_node="">
</span><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">No risks identified – straight through processing</span></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Low risk flags – auto-clearance</span></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Red flags present – operator review required or auto-escalation</span></li><span data-dcnode-id="1264" instrument_node="">
</span></ul><span data-dcnode-id="1262" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Once the level of risk is identified,&nbsp;escalated transactions are enriched with analytic findings and supporting evidence, facilitating a targeted investigation.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Functionality like this means TRACK can help enable banks to reduce their percentage of false positives, while increasing the number of genuine red flag alerts.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The platform also proves that, when working within the trade finance industry at scale, providing broad coverage across various compliance checks will not only drive operational efficiencies, but will enrich banks’ trade finance insights, helping to grow this function at scale.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Trade finance exists to ensure fairness, transparency and compliance in international trade. Without keeping pace with digital transformation, global trade – already feeling the pressure of trade wars, shifting geopolitics and disruption from new threats such as COVID-19 –&nbsp;is threatened by non-compliant parties and nefarious actors.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p aria-hidden="true" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Trade finance functions that adopt appropriately targeted automation and advanced analytics as integral parts of their compliance operations will be more important than ever in this uncertain international environment. With such high volumes of transactions and increasing complexity, efficient trade financing is key to ensuring that warehouses, harbors and supply chains are running smoothly – thus keeping the age-old business of international trade firmly afloat.</span></p><span data-dcnode-id="1247" instrument_node="">
</span></div><span data-dcnode-id="1245" instrument_node="">
</span><span data-dcnode-id="1244" instrument_node="">
</span></div><span data-dcnode-id="1242" instrument_node="">
</span></div><div aria-hidden="true" class="inlineQuote component section default-style col-xs-12 col-lg-8 col-lg-offset-2" data-dcnode-id="1221"><span data-dcnode-id="1240" instrument_node="">
</span><div class="inline-quote" data-dcnode-id="1223"><span data-dcnode-id="1239" instrument_node="">
</span><div class="quote-box" data-dcnode-id="1225"><span data-dcnode-id="1238" instrument_node="">
</span><blockquote class="content-box" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">
