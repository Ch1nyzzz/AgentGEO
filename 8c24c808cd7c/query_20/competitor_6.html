</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id10&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id11&quot;><p id=&quot;sp0025&quot;>A fraudulent financial statement involves the intentional furnishing and/or publishing of false information in it and this has become a severe economic and social problem. We consider Data Mining (DM) based financial fraud detection techniques (such as regression, decision tree, neural networks and Bayesian networks) that help identify fraud. The effectiveness of these DM methods (and their limitations) is examined, especially when new schemes of financial statement fraud adapt to the detection techniques. We then explore a self-adaptive framework (based on a response surface model) with domain knowledge to detect financial statement fraud. We conclude by suggesting that, in an era with evolutionary financial frauds, computer assisted automated fraud detection mechanisms will be more effective and efficient with specialized domain knowledge.</p></div></div></div>" data-dcnode-id="3099" lang="en" name="citation_abstract"><span data-dcnode-id="3098" instrument_node="">

sider </span><a class="topic-link" data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about Data Mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2653" instrument_node="">Data Mining</span></a><span data-dcnode-id="2643"><span data-dcnode-id="2647"><span data-dcnode-id="2651" instrument_node=""> (DM) based financial fraud detection techniques (such as regression, decision tree, </span><a class="topic-link" data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/neural-networks" title="Learn more about neural networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2650" instrument_node="">neural networks</span></a><span data-dcnode-id="2648" instrument_node=""> and Bayesian networks) that help identify fraud. The effectiveness of these </span></span><a class="topic-link" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining-techniques" title="Learn more about DM methods from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2646" instrument_node="">DM methods</span></a><span data-dcnode-id="2644" instrument_node=""> (and their limitations) is examined, especially when new schemes of financial statement fraud adapt to the detection techniques. We then explore a self-adaptive framework (based on a response surface model) with domain knowledge to detect financial statement fraud. We conclude by suggesting that, in an era with evolutionary financial frauds, computer assisted automated fraud detection mechanisms will be more effective and efficient with specialized domain knowledge.</span></span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="2616" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="2628"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167923610001302"><svg class="icon icon-navigate-left" data-dcnode-id="2637" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="2638"></path></svg><span class="button-alternative-text" data-dcnode-id="2630"><strong data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="2617"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167923610001351"><span class="button-alternative-text" data-dcnode-id="2621"><strong data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="2619" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="2620"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="2603"><div class="keywords-section" data-dcnode-id="2604" id="aep-keywords-id12"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="2611"><span data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Financial statement fraud</span></span></div><div class="keyword" data-dcnode-id="2608"><span data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Data mining technique</span></span></div><div class="keyword" data-dcnode-id="2605"><span data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Neural networks</span></span></div></div></div><span data-dcnode-id="2602" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1591" id="body"><div data-dcnode-id="1592"><section data-dcnode-id="2528" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2598"><span data-dcnode-id="2601" instrument_node="">1</span><span data-dcnode-id="2600" instrument_node="">. </span><span data-dcnode-id="2599" instrument_node="">Introduction</span></h2><p data-dcnode-id="2581" id="p0005"><span data-dcnode-id="2585"><span data-dcnode-id="2593"><span data-dcnode-id="2597" instrument_node="">Since the booming of the Internet and the invention of other modern technologies, there has been a dramatic increase in fraudulent schemes associated with all facets in the business world. Some of these commonly observed schemes include credit card fraud, financial statement fraud, e-commerce transaction fraud, insurance fraud, money laundering, </span><a class="topic-link" data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/computer-intrusion" title="Learn more about computer intrusion from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2596" instrument_node="">computer intrusion</span></a><span data-dcnode-id="2594" instrument_node=""> fraud, telecommunications fraud, and subscription fraud. Statistic and </span></span><a class="topic-link" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/machine-learning" title="Learn more about machine learning from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2592" instrument_node="">machine learning</span></a><span data-dcnode-id="2586"><span data-dcnode-id="2590" instrument_node=""> based technologies have been shown to be an effective way to deter and detect fraud, but fraudsters are adaptive and are usually able to find ways to circumvent them. Existing fraud detection techniques for most of the situations involving fraud usually share very similar </span><a class="topic-link" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about data mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2589" instrument_node="">data mining</span></a><span data-dcnode-id="2587" instrument_node=""> principles, but they can differ in many aspects with specialized domain knowledge </span></span></span><a class="workspace-trigger" data-dcnode-id="2583" href="#bb0025" name="bbb0025"><span data-dcnode-id="2584" instrument_node="">[5]</span></a><span data-dcnode-id="2582" instrument_node="">.</span></p><p data-dcnode-id="2572" id="p0010"><span data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">Financial statement fraud in particular has cast rapidly increasing adverse impact not only on individual investors but the overall stability of global economies. Although there are minor variations in its definition, a financial statement fraud is defined by the Association of </span><a class="topic-link" data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/certified-fraud-examiner" title="Learn more about Certified Fraud Examiners from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2579" instrument_node="">Certified Fraud Examiners</span></a><span data-dcnode-id="2577" instrument_node=""> as “The intentional, deliberate, misstatement or omission of material facts, or accounting data which is misleading and, when considered with all the information made available, would cause the reader to change or alter his or her judgment or decision.” In practice, financial statement fraud might involve: (1) manipulation of financial records, (2) intentional omission of events, transactions, accounts, or other significant information from which financial statements are prepared, or (3) misapplication of accounting principles, policies, and procedures used to measure, recognize, report, and disclose business transactions </span></span><a class="workspace-trigger" data-dcnode-id="2574" href="#bb0100" name="bbb0100"><span data-dcnode-id="2575" instrument_node="">[20]</span></a><span data-dcnode-id="2573" instrument_node="">.</span></p><p data-dcnode-id="2556" id="p0015"><span data-dcnode-id="2563"><span data-dcnode-id="2571" instrument_node="">Many techniques based on data mining have been investigated and implemented to detect financial statement fraud, including regression, decision trees, </span><a class="topic-link" data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/neural-networks" title="Learn more about neural networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2570" instrument_node="">neural networks</span></a><span data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/bayesian-belief-network" title="Learn more about Bayesian belief networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2567" instrument_node="">Bayesian belief networks</span></a><span data-dcnode-id="2565" instrument_node=""> </span></span></span><a class="workspace-trigger" data-dcnode-id="2561" href="#bb0060" name="bbb0060"><span data-dcnode-id="2562" instrument_node="">[12]</span></a><span data-dcnode-id="2560" instrument_node="">. These techniques have been shown to be successful in their early stages. However, there is no agreement on which data features and techniques are best for detection. Also, while supervised learning techniques have been among the dominant methods used for detecting financial statement fraud, a majority of related implementations do not keep track of new variations in the methods designed for committing fraud. Moreover, financial fraud is becoming more and more difficult to detect using the current detection techniques. A CEO who is truly knowledgeable and wants to really commit a crime has the necessary resources to easily outwit the system and is able to fool any detection mechanism </span><a class="workspace-trigger" data-dcnode-id="2558" href="#bb0035" name="bbb0035"><span data-dcnode-id="2559" instrument_node="">[7]</span></a><span data-dcnode-id="2557" instrument_node="">.</span></p><p data-dcnode-id="2543" id="p0020"><span data-dcnode-id="2555" instrument_node="">Despite the increased of time and effort that has been spent to detect the same, the number of detected frauds</span><a class="workspace-trigger" data-dcnode-id="2552" href="#fn0005" name="bfn0005"><sup data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">1</span></sup></a><span data-dcnode-id="2551" instrument_node=""> and the detection rate</span><a class="workspace-trigger" data-dcnode-id="2548" href="#fn0010" name="bfn0010"><sup data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">2</span></sup></a><span data-dcnode-id="2547" instrument_node=""> have largely decreased </span><a class="workspace-trigger" data-dcnode-id="2545" href="#bb0035" name="bbb0035"><span data-dcnode-id="2546" instrument_node="">[7]</span></a><span data-dcnode-id="2544" instrument_node="">. When the executives who are involved in financial fraud are well aware of the fraud detection techniques and software, which are usually public information and are easy to obtain, they are likely to adapt the methods in which they commit fraud and make it difficult to detect the same, especially by existing techniques. There exists an urgent need for new methods that is not only efficient but effective to catch up with these probable newly emerged or adaptive financial shenanigans. We (1) consider existing detection techniques based on data mining, (2) provide an overview of existing financial shenanigans and their trend, and (3) suggest a new framework to detect evolutionary financial statement fraud.</span></p><p data-dcnode-id="2529" id="p0025"><span data-dcnode-id="2542" instrument_node="">The remainder of this paper is organized as follows. We review the application of regression, decision trees, neural networks and Bayesian belief networks in financial statement fraud detection in the next section. We survey the history and trend of contemporary financial fraud in </span><a class="workspace-trigger" data-dcnode-id="2540" href="#s0015" name="bs0015"><span data-dcnode-id="2541" instrument_node="">Section&nbsp;3</span></a><span data-dcnode-id="2539" instrument_node="">. We analyze the effectiveness and limitation of existing fraud detection technologies in </span><a class="workspace-trigger" data-dcnode-id="2537" href="#s0020" name="bs0020"><span data-dcnode-id="2538" instrument_node="">4 Limitations of current detection techniques</span></a><span data-dcnode-id="2536" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2534" href="#s0025" name="bs0025"><span data-dcnode-id="2535" instrument_node="">5 Adaptive FSF detection framework and methodologies</span></a><span data-dcnode-id="2533" instrument_node=""> and then suggest a framework that addresses the problem when emerging financial fraud is evolutionary. </span><a class="workspace-trigger" data-dcnode-id="2531" href="#s0040" name="bs0040"><span data-dcnode-id="2532" instrument_node="">Section&nbsp;6</span></a><span data-dcnode-id="2530" instrument_node=""> concludes the paper with a brief discussion on the insights garnered and possible future research.</span></p></section><section data-dcnode-id="2385" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2524"><span data-dcnode-id="2527" instrument_node="">2</span><span data-dcnode-id="2526" instrument_node="">. </span><span data-dcnode-id="2525" instrument_node="">Review on detection techniques</span></h2><p data-dcnode-id="2470" id="p0030"><span data-dcnode-id="2520"><a class="topic-link" data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/classification" title="Learn more about Classification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2523" instrument_node="">Classification</span></a><span data-dcnode-id="2521" instrument_node=""> has been the most popular and the only way used so far to identify fraudulent financial statements </span></span><a class="workspace-trigger" data-dcnode-id="2518" href="#bb0040" name="bbb0040"><span data-dcnode-id="2519" instrument_node="">[8]</span></a><span data-dcnode-id="2513"><span data-dcnode-id="2517" instrument_node="">. Most financial statement fraud (FSF) auto-detection programs use supervised </span><a class="topic-link" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/machine-learning" title="Learn more about machine learning from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2516" instrument_node="">machine learning</span></a><span data-dcnode-id="2514" instrument_node=""> methodologies </span></span><a class="workspace-trigger" data-dcnode-id="2511" href="#bb0005" name="bbb0005"><span data-dcnode-id="2512" instrument_node="">[1]</span></a><span data-dcnode-id="2510" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2508" href="#bb0015" name="bbb0015"><span data-dcnode-id="2509" instrument_node="">[3]</span></a><span data-dcnode-id="2507" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2505" href="#bb0020" name="bbb0020"><span data-dcnode-id="2506" instrument_node="">[4]</span></a><span data-dcnode-id="2504" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2502" href="#bb0045" name="bbb0045"><span data-dcnode-id="2503" instrument_node="">[9]</span></a><span data-dcnode-id="2501" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2499" href="#bb0050" name="bbb0050"><span data-dcnode-id="2500" instrument_node="">[10]</span></a><span data-dcnode-id="2498" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2496" href="#bb0055" name="bbb0055"><span data-dcnode-id="2497" instrument_node="">[11]</span></a><span data-dcnode-id="2495" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2493" href="#bb0070" name="bbb0070"><span data-dcnode-id="2494" instrument_node="">[14]</span></a><span data-dcnode-id="2492" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2490" href="#bb0090" name="bbb0090"><span data-dcnode-id="2491" instrument_node="">[18]</span></a><span data-dcnode-id="2489" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2487" href="#bb0105" name="bbb0105"><span data-dcnode-id="2488" instrument_node="">[21]</span></a><span data-dcnode-id="2486" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2484" href="#bb0110" name="bbb0110"><span data-dcnode-id="2485" instrument_node="">[22]</span></a><span data-dcnode-id="2471"><span data-dcnode-id="2479"><span data-dcnode-id="2483" instrument_node=""> that usually have a two-stage procedure, where in the first stage a model is trained by using a training sample. The training sample is organized in tuples and attributes, with the class label attribute containing values indicating the pre-defined class to which each tuple belongs. In the second stage, objects are classified through the model obtained from the first stage. After reviewing relevant research in data mining-based financial statement fraud detection literature, we observe that the following five methods have been used so far in this general area. These methods include regression, decision trees, </span><a class="topic-link" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/neural-networks" title="Learn more about neural networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2482" instrument_node="">neural networks</span></a><span data-dcnode-id="2480" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/bayesian-networks" title="Learn more about Bayesian networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2478" instrument_node="">Bayesian networks</span></a><span data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/support-vector-machine" title="Learn more about support vector machines from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2475" instrument_node="">support vector machines</span></a><span data-dcnode-id="2473" instrument_node="">.</span></span></span></p><p data-dcnode-id="2440" id="p0035"><span data-dcnode-id="2469" instrument_node="">Regression is the most widely used method to detect financial statement fraud </span><a class="workspace-trigger" data-dcnode-id="2467" href="#bb0005" name="bbb0005"><span data-dcnode-id="2468" instrument_node="">[1]</span></a><span data-dcnode-id="2466" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2464" href="#bb0015" name="bbb0015"><span data-dcnode-id="2465" instrument_node="">[3]</span></a><span data-dcnode-id="2463" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2461" href="#bb0020" name="bbb0020"><span data-dcnode-id="2462" instrument_node="">[4]</span></a><span data-dcnode-id="2460" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2458" href="#bb0055" name="bbb0055"><span data-dcnode-id="2459" instrument_node="">[11]</span></a><span data-dcnode-id="2457" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2455" href="#bb0090" name="bbb0090"><span data-dcnode-id="2456" instrument_node="">[18]</span></a><span data-dcnode-id="2454" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2452" href="#bb0105" name="bbb0105"><span data-dcnode-id="2453" instrument_node="">[21]</span></a><span data-dcnode-id="2451" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2449" href="#bb0110" name="bbb0110"><span data-dcnode-id="2450" instrument_node="">[22]</span></a><span data-dcnode-id="2448" instrument_node="">. Transformations of variables in regression models have also been studied in the context of fraud detection, including logit, stepwise-logistic, multi-criteria decision aid method and exponential generalized beta two. For example, Spathis </span><a class="workspace-trigger" data-dcnode-id="2446" href="#bb0105" name="bbb0105"><span data-dcnode-id="2447" instrument_node="">[21]</span></a><span data-dcnode-id="2441"><span data-dcnode-id="2445" instrument_node=""> used a collection of data from 76 firms that include 38 fraudsters and 38 non-fraudulent firms in Greece. They use ten financial variables and logistic multivariate regression to identify the relationship among factors associated with financial statement fraud. A total of ten </span><a class="topic-link" data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/financial-ratio" title="Learn more about financial ratios from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2444" instrument_node="">financial ratios</span></a><span data-dcnode-id="2442" instrument_node=""> such as the net profit to total assets ratio, the ratio of total debt to total assets, financial distress, the inventories to sales ratio, and the working capital to total assets ratio are selected for examination as potential predictors of FSF. The results indicate that companies with high inventories with respect to sales, high debt to total assets, low net profit to total assets, low working capital to total assets and high financial stress are more likely to manipulate financial statements.</span></span></p><p data-dcnode-id="2393" id="p0040"><span data-dcnode-id="2435"><span data-dcnode-id="2439" instrument_node="">A neural network is another popular </span><a class="topic-link" data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about data mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2438" instrument_node="">data mining</span></a><span data-dcnode-id="2436" instrument_node=""> technique that has been successfully used to detect financial statement fraud </span></span><a class="workspace-trigger" data-dcnode-id="2433" href="#bb0030" name="bbb0030"><span data-dcnode-id="2434" instrument_node="">[6]</span></a><span data-dcnode-id="2432" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2430" href="#bb0045" name="bbb0045"><span data-dcnode-id="2431" instrument_node="">[9]</span></a><span data-dcnode-id="2429" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2427" href="#bb0070" name="bbb0070"><span data-dcnode-id="2428" instrument_node="">[14]</span></a><span data-dcnode-id="2426" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2424" href="#bb0080" name="bbb0080"><span data-dcnode-id="2425" instrument_node="">[16]</span></a><span data-dcnode-id="2423" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2421" href="#bb0120" name="bbb0120"><span data-dcnode-id="2422" instrument_node="">[24]</span></a><span data-dcnode-id="2420" instrument_node="">. Neural network doesn't assume an attribute's independence and is capable of mining inter-correlated data and is a suitable alternative for problems where some of the assumptions associated with regression are not valid. White </span><a class="workspace-trigger" data-dcnode-id="2418" href="#bb0120" name="bbb0120"><span data-dcnode-id="2419" instrument_node="">[24]</span></a><span data-dcnode-id="2397"><span data-dcnode-id="2413"><span data-dcnode-id="2417" instrument_node="">, nonetheless, has shown that feed-forward neural networks, which require no pre-specified functional form, perform the same </span><a class="topic-link" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/stochastic-approximation" title="Learn more about stochastic approximation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2416" instrument_node="">stochastic approximation</span></a><span data-dcnode-id="2414" instrument_node=""> as </span></span><a class="topic-link" data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/nonlinear-regression" title="Learn more about nonlinear regression from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2412" instrument_node="">nonlinear regression</span></a><span data-dcnode-id="2398"><span data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node="">. </span><a class="topic-link" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/backpropagation" title="Learn more about Back propagation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2409" instrument_node="">Back propagation</span></a><span data-dcnode-id="2407" instrument_node=""> neural network allows the network to adapt and has become one of the most popular techniques for prediction and classification problems. The back propagation learning process works in small iterative steps that continuously make small changes to the weights in each </span></span><a class="topic-link" data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/layer-neural-network" title="Learn more about neural network layer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2405" instrument_node="">neural network layer</span></a><span data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">, which are calculated to reduce the </span><a class="topic-link" data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/systematic-error" title="Learn more about systematic error from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2402" instrument_node="">systematic error</span></a><span data-dcnode-id="2400" instrument_node="">. The iteration is repeated until the overall error value drops below some pre-determined threshold </span></span></span></span><a class="workspace-trigger" data-dcnode-id="2395" href="#bb0065" name="bbb0065"><span data-dcnode-id="2396" instrument_node="">[13]</span></a><span data-dcnode-id="2394" instrument_node="">. Drawbacks of implementing neural networks to discover FSF is that neural network is not accurate if the data is volatile or if the causal functionality evolves in a direction that is not pre-defined.</span></p><p data-dcnode-id="2388" id="p0045"><span data-dcnode-id="2392" instrument_node="">The objective of decision trees is classification by dividing observations into mutually exclusive and exhaustive subgroups by properly selecting attributes that best separate the sample. Koh and Low </span><a class="workspace-trigger" data-dcnode-id="2390" href="#bb0065" name="bbb0065"><span data-dcnode-id="2391" instrument_node="">[13]</span></a><span data-dcnode-id="2389" instrument_node=""> construct a decision tree to predict the hidden problems in financial statements by examining the following six variables: quick assets to current liabilities, market value of equity to total assets, total liabilities to total assets, interest payments to earnings before interest and tax, net income to total assets, and retained earnings to total assets.</span></p><p data-dcnode-id="2386" id="p0050"><span data-dcnode-id="2387" instrument_node="">The above mentioned data mining techniques have generally been shown to be effective in detecting financial statement fraud. However, they are not without limitations. For example, while these techniques are well developed for predictive modeling, they are not as well developed for effect assessment. In particular, test statistics for assessing the effects of independent variables on dependent variables have not yet been constructed for some data mining techniques. Incidentally, this shortcoming also demands with the challenge to develop more effective mechanisms especially in an adaptive economic environment where financial fraudsters learn to circumvent existing automated detection systems.</span></p></section><section data-dcnode-id="2222" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2381"><span data-dcnode-id="2384" instrument_node="">3</span><span data-dcnode-id="2383" instrument_node="">. </span><span data-dcnode-id="2382" instrument_node="">Detection with domain knowledge on FSF</span></h2><p data-dcnode-id="2275" id="p0055"><span data-dcnode-id="2380" instrument_node="">Financial statement fraud, including motivations, opportunities, and rationalizations for management to commit such fraud, has been extensively studied by researchers in finance. Loebbecke et al. </span><a class="workspace-trigger" data-dcnode-id="2378" href="#bb0075" name="bbb0075"><span data-dcnode-id="2379" instrument_node="">[15]</span></a><span data-dcnode-id="2377" instrument_node=""> suggest a model consisting of three variables that may explain financial statement fraud: (C) the degree to which conditions are such that a financial fraud could be committed, (M) the degree to which the management has a reason or motivation to commit financial fraud, and (A) the degree to which the management has an attitude or set of ethical values such that they would allow themselves to commit management fraud. These three variables together form the assessment model such that the possibility of having financial statement fraud (FSF) can be described as a function.</span><span class="display" data-dcnode-id="2285"><span class="formula" data-dcnode-id="2286" id="fo0005"><span class="label" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="2287"><span class="MathJax_Preview" data-dcnode-id="2374" style=""></span><span class="MathJax_SVG" data-dcnode-id="2290" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mstyle mathvariant=&quot;monospace&quot; is=&quot;true&quot;><mi is=&quot;true&quot;>P</mi><mo stretchy=&quot;true&quot; is=&quot;true&quot;>(</mo><mi is=&quot;true&quot;>F</mi><mi is=&quot;true&quot;>S</mi><mi is=&quot;true&quot;>F</mi><mo stretchy=&quot;true&quot; is=&quot;true&quot;>)</mo></mstyle><mo is=&quot;true&quot;>=</mo><mi is=&quot;true&quot;>f</mi><mstyle mathvariant=&quot;monospace&quot; is=&quot;true&quot;><mo stretchy=&quot;true&quot; is=&quot;true&quot;>(</mo><mi is=&quot;true&quot;>C</mi><mo is=&quot;true&quot;>,</mo><mi is=&quot;true&quot;>M</mi><mo is=&quot;true&quot;>,</mo><mi is=&quot;true&quot;>A</mi><mo stretchy=&quot;true&quot; is=&quot;true&quot;>)</mo></mstyle></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="2326" focusable="false" height="2.709ex" role="img" style="vertical-align: -0.741ex;" viewBox="0 -847.3 8777.4 1166.2" width="20.386ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="2327" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="2328" is="true"><g data-dcnode-id="2355" is="true"><g data-dcnode-id="2371" is="true"><use data-dcnode-id="2372" href="#MJTT-50"><path d="M41 1Q19 9 19 32V38Q19 63 36 73Q42 76 65 76H89V535H65H55Q38 535 29 543T19 576Q19 603 41 610H49Q57 610 70 610T100 610T136 611T175 611Q190 611 216 611T255 612Q321 612 363 598T441 537Q480 486 480 427V421Q480 354 447 311T378 251Q339 230 275 230H239H173V76H197Q220 76 227 73Q244 62 244 38Q244 10 222 1H41ZM396 421Q396 461 369 491T300 533Q294 534 233 535H173V306H233Q294 307 300 308Q345 319 370 352T396 421Z" data-dcnode-id="2373" id="MJTT-50" stroke-width="1"></path></use></g><g data-dcnode-id="2368" is="true" transform="translate(525,0)"><use data-dcnode-id="2369" href="#MJTT-28"><path d="M437 -53Q437 -82 399 -82H394Q377 -82 342 -55Q259 7 213 102T166 306Q166 412 211 507T342 667Q377 694 393 694H399Q437 694 ta-dcnode-id="2351" id="MJMATHI-66" stroke-width="1"></path></use></g><g data-dcnode-id="2329" is="true" transform="translate(5037,0)"><use data-dcnode-id="2347" href="#MJMAIN-28" is="true"><path d="M94 250Q94 319 104 381T127 488T164 576T202 643T244 695T277 729T302 750H315H319Q333 750 333 741Q333 738 316 720T275 667T226 581T184 443T167 250T184 58T225 -81T274 -167T316 -220T333 -241Q333 -250 318 -250H315H302L274 -226Q180 -141 137 -14T94 250Z" data-dcnode-id="2348" id="MJMAIN-28" stroke-width="1"></path></use><g data-dcnode-id="2344" is="true" transform="translate(389,0)"><use data-dcnode-id="2345" href="#MJTT-43"><path d="M40 305Q40 437 110 529T281 622Q315 622 343 611T387 589T404 578Q409 585 415 596T425 611T435 618T452 622Q472 622 478 609T485 566Q485 559 485 540T484 508V460Q484 413 478 403T442 393Q417 393 409 402Q400 409 400 420Q400 428 395 445T380 487T347 528T295 546Q235 546 180 483T124 306Q124 245 141 197T186 121T241 80T296 66Q346 66 373 103T400 178Q400 209 435 209H442H450Q484 209 484 172Q480 96 421 43T281 -11Q177 -11 109 84T40 305Z" data-dcnode-id="2346" id="MJTT-43" stroke-width="1"></path></use></g><g data-dcnode-id="2341" is="true" transform="translate(915,0)"><use data-dcnode-id="2342" href="#MJTT-2C"><path d="M193 37T193 70T213 121T260 140Q302 140 327 108T353 36Q353 -7 336 -43T294 -98T249 -128T215 -139Q204 -139 189 -125Q177 -111 174 -101Q172 -84 183 -77T217 -61T253 -33Q261 -24 272 1L265 0Q234 0 214 18Z" data-dcnode-id="2343" id="MJTT-2C" stroke-width="1"></path></use></g><g data-dcnode-id="2338" is="true" transform="translate(1607,0)"><use data-dcnode-id="2339" href="#MJTT-4D"><path d="M50 535Q37 536 31 537T18 547T12 573Q12 598 22 604T62 611H91H121Q147 611 158 607T178 587Q183 579 222 446T261 293Q261 289 262 288Q263 288 263 292Q263 311 298 434T346 588Q353 603 365 607T402 611H435H450Q488 611 500 605T512 573Q512 556 506 547T493 537T474 535H459V76H474Q487 75 493 74T505 64T512 38Q512 11 494 3Q490 1 424 1H386Q355 1 345 7T335 38Q335 55 341 64T354 74T373 76H388V302Q388 512 387 519Q382 482 346 359T304 228Q292 204 262 204T220 228Q215 237 179 359T137 519Q136 512 136 302V76H151Q164 75 170 74T182 64T189 38Q189 11 171 3Q167 1 101 1H63Q32 1 22 7T12 38Q12 55 18 64T31 74T50 76H65V535H50Z" data-dcnode-id="2340" id="MJTT-4D" stroke-width="1"></path></use></g><g data-dcnode-id="2335" is="true" transform="translate(2132,0)"><use data-dcnode-id="2336" href="#MJTT-2C"><path d="M193 37T193 70T213 121T260 140Q302 140 327 108T353 36Q353 -7 336 -43T294 -98T249 -128T215 -139Q204 -139 189 -125Q177 -111 174 -101Q172 -84 183 -77T217 -61T253 -33Q261 -24 272 1L265 0Q234 0 214 18Z" data-dcnode-id="2337" id="MJTT-2C" stroke-width="1"></path></use></g><g data-dcnode-id="2332" is="true" transform="translate(2824,0)"><use data-dcnode-id="2333" href="#MJTT-41"><path d="M191 76Q212 75 220 68T229 38Q229 10 208 1H129H80Q48 1 38 7T28 38Q28 51 29 57T40 69T70 76Q89 76 89 78Q90 79 117 205T173 461T205 599Q212 623 250 623H262H273Q312 623 319 599Q322 591 350 461T406 205T435 78Q435 76 454 76H458Q484 76 493 59Q496 53 496 38Q496 11 478 3Q474 1 395 1H317Q295 8 295 38Q295 65 311 73Q316 75 333 76L348 77V78Q348 80 341 112L334 143H190L183 112Q176 80 176 78Q175 76 178 76Q180 76 191 76ZM318 221Q313 238 288 366T263 519Q263 526 262 527Q261 527 261 520Q261 493 236 365T206 221Q206 219 262 219T318 221Z" data-dcnode-id="2334" id="MJTT-41" stroke-width="1"></path></use></g><use data-dcnode-id="2330" href="#MJMAIN-29" is="true" x="3350" y="0"><path d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z" data-dcnode-id="2331" id="MJMAIN-29" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="2291" role="presentation"><math data-dcnode-id="2292" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="2293" is="true"><mstyle data-dcnode-id="2313" is="true" mathvariant="monospace"><mi data-dcnode-id="2324" is="true"><span data-dcnode-id="2325" instrument_node="">P</span></mi><mo data-dcnode-id="2322" is="true" stretchy="true"><span data-dcnode-id="2323" instrument_node="">(</span></mo><mi data-dcnode-id="2320" is="true"><span data-dcnode-id="2321" instrument_node="">F</span></mi><mi data-dcnode-id="2318" is="true"><span data-dcnode-id="2319" instrument_node="">S</span></mi><mi data-dcnode-id="2316" is="true"><span data-dcnode-id="2317" instrument_node="">F</span></mi><mo data-dcnode-id="2314" is="true" stretchy="true"><span data-dcnode-id="2315" instrument_node="">)</span></mo></mstyle><mo data-dcnode-id="2311" is="true"><span data-dcnode-id="2312" instrument_node="">=</span></mo><mi data-dcnode-id="2309" is="true"><span data-dcnode-id="2310" instrument_node="">f</span></mi><mstyle data-dcnode-id="2294" is="true" mathvariant="monospace"><mo data-dcnode-id="2307" is="true" stretchy="true"><span data-dcnode-id="2308" instrument_node="">(</span></mo><mi data-dcnode-id="2305" is="true"><span data-dcnode-id="2306" instrument_node="">C</span></mi><mo data-dcnode-id="2303" is="true"><span data-dcnode-id="2304" instrument_node="">,</span></mo><mi data-dcnode-id="2301" is="true"><span data-dcnode-id="2302" instrument_node="">M</span></mi><mo data-dcnode-id="2299" is="true"><span data-dcnode-id="2300" instrument_node="">,</span></mo><mi data-dcnode-id="2297" is="true"><span data-dcnode-id="2298" instrument_node="">A</span></mi><mo data-dcnode-id="2295" is="true" stretchy="true"><span data-dcnode-id="2296" instrument_node="">)</span></mo></mstyle></mrow></math></span></span></span></span></span><span data-dcnode-id="2284" instrument_node="">where if C or M or A</span><span data-dcnode-id="2283" instrument_node="">&nbsp;</span><span data-dcnode-id="2282" instrument_node="">=</span><span data-dcnode-id="2281" instrument_node="">&nbsp;</span><span data-dcnode-id="2280" instrument_node="">0, then P(FSF)</span><span data-dcnode-id="2279" instrument_node="">&nbsp;</span><span data-dcnode-id="2278" instrument_node="">=</span><span data-dcnode-id="2277" instrument_node="">&nbsp;</span><span data-dcnode-id="2276" instrument_node="">0.</span></p><p data-dcnode-id="2270" id="p0060"><span data-dcnode-id="2274" instrument_node="">According to Rezaee </span><a class="workspace-trigger" data-dcnode-id="2272" href="#bb0095" name="bbb0095"><span data-dcnode-id="2273" instrument_node="">[19]</span></a><span data-dcnode-id="2271" instrument_node="">, fraud accomplishment can be explained by three variables: (1) conditions, (2) corporate structure and (3) choice. The sufficient incentives and opportunities for a company to commit financial statement fraud can be interpreted by the pattern exhibited by these three variables. We, however, believe that certain combination of the variables mentioned in this model also leads to certain suitable fraud strategies and, by measuring the pattern among the variables and integrating the findings in auto-detection heuristics, we should be able to pinpoint the unique shenanigans and their underlying dynamic to commit fraud.</span></p><div data-dcnode-id="2243"><p data-dcnode-id="2262" id="p0065"><span data-dcnode-id="2269" instrument_node="">We first review possible variables that can be utilized in an auto-detection system. In Rezaee's</span><a class="workspace-trigger" data-dcnode-id="2267" href="#bb0095" name="bbb0095"><span data-dcnode-id="2268" instrument_node="">[19]</span></a><span data-dcnode-id="2266" instrument_node=""> 3C's model as shown in </span><a class="workspace-trigger" data-dcnode-id="2264" href="#f0005" name="bf0005"><span data-dcnode-id="2265" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="2263" instrument_node="">, “conditions” refers to the economic and financial pressures that a corporation faces. Financial pressures, such as pressure to meet analysts' earning estimates, can be a key factor stimulating earnings management and resulting in financial statement fraud. The principle underlying this variable is that financial statement fraud will most probably occur if the benefits for fraudulent management outweigh the associated costs. Management compares the benefit, in terms of possible increase in the company's stock price or the possible savings related to preventing share price from decreasing, with the possible cost of committing fraud in terms of probability and consequences of detection. Financial pressures, such as the inability to meet analysts' earning estimates or decline in quality and quantity of earnings, are often motivations for management commitment in financial frauds.</span></p><figure class="figure text-xs" data-dcnode-id="2244" id="f0005"><span data-dcnode-id="2252"><img alt="" data-dcnode-id="2261" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr1.jpg&amp;raw"><span data-dcnode-id="2260" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2253"><li data-dcnode-id="2254"><a class="anchor download-link u-font-sans" data-dcnode-id="2255" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2256"><span data-dcnode-id="2259" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2245"><span data-dcnode-id="2246"><p data-dcnode-id="2247" id="sp0005"><span class="label" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="2249" instrument_node="">. </span><span data-dcnode-id="2248" instrument_node="">Rezaee's 3C financial statement fraud model.</span></p></span></span></figure></div><p data-dcnode-id="2241" id="p0070"><span data-dcnode-id="2242" instrument_node="">“Capital structure” refers to the existence of an effective corporate governance mechanism (such as internal control structure and audit committees) that could discourage management from committing fraud. The role of corporate governance devices can also be discussed in relation to other social and economic characteristics of different countries where fraud can be committed. It is also important to explain to what extent an effective corporate governance system can help to prevent and detect fraud.</span></p><p data-dcnode-id="2239" id="p0075"><span data-dcnode-id="2240" instrument_node="">“Choices” refer to the management's option, which could either be ethical strategies of continuous improvements of earnings or illegal earning manipulations, to deal with various financial situations. Financial statement fraud is simply one of the choices. Regardless of the corporate structure or environmental pressure, management could use financial statement fraud simply as a strategic tool according to its own characteristics in terms of aggressiveness or lack of moral principles.</span></p><p data-dcnode-id="2231" id="p0080"><span data-dcnode-id="2238" instrument_node="">Both the CMA model </span><a class="workspace-trigger" data-dcnode-id="2236" href="#bb0075" name="bbb0075"><span data-dcnode-id="2237" instrument_node="">[15]</span></a><span data-dcnode-id="2235" instrument_node=""> and the 3Cs model </span><a class="workspace-trigger" data-dcnode-id="2233" href="#bb0095" name="bbb0095"><span data-dcnode-id="2234" instrument_node="">[19]</span></a><span data-dcnode-id="2232" instrument_node=""> mentioned above explain the financial statement fraud by examining selected parameters, such as the motivations, conditions of pressure, corporate structure, management's attitude and the choices. These variables may each function separately, and careful selection and combination of variables, however, are more likely to help explain the degree and pattern of financial statement fraud, thus providing insightful and immediate reference for an FSF auto-detection system.</span></p><p data-dcnode-id="2223" id="p0085"><span data-dcnode-id="2230" instrument_node="">The strategy that the management utilizes to commit financial statement fraud is influenced by the economic circumstances as well as many other variables that have been taken into consideration by the fraudster. Schilit </span><a class="workspace-trigger" data-dcnode-id="2228" href="#bb0100" name="bbb0100"><span data-dcnode-id="2229" instrument_node="">[20]</span></a><span data-dcnode-id="2227" instrument_node=""> provides an extensive examination of the financial statement fraud techniques and categorizes them into seven groups: recording revenue too soon or of questionable quality, recording bogus revenue, boosting income with one-time gains, shifting current expenses to a later or earlier period, failing to record or improperly reducing liabilities, shifting current revenue to a later period, and shifting future expenses to the current period as a special charge. The COSO report </span><a class="workspace-trigger" data-dcnode-id="2225" href="#bb0010" name="bbb0010"><span data-dcnode-id="2226" instrument_node="">[2]</span></a><span data-dcnode-id="2224" instrument_node="">, by analyzing 204 cases of fraud presented in the SEC's Accounting Auditing Enforcement Releases (AAERs) from 1987 to 1997, lists common financial statement fraud techniques in the following categories: improper revenue recognition, overstatement of assets other than accounts receivable, understatement of expenses/liabilities, misappropriation of assets, inappropriate disclosure and other miscellaneous techniques.</span></p></section><section data-dcnode-id="2187" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2218"><span data-dcnode-id="2221" instrument_node="">4</span><span data-dcnode-id="2220" instrument_node="">. </span><span data-dcnode-id="2219" instrument_node="">Limitations of current detection techniques</span></h2><p data-dcnode-id="2210" id="p0090"><span data-dcnode-id="2217" instrument_node="">Despite increasingly stringent legislation such as the Foreign Corrupt Practices Act and the Sarbanes–Oxley Act aimed at combating fraud – and despite increasingly growing number of fraud auto-detection systems – financial statement fraud is becoming a more and more severe public concern. Doloitte </span><a class="workspace-trigger" data-dcnode-id="2215" href="#bb0035" name="bbb0035"><span data-dcnode-id="2216" instrument_node="">[7]</span></a><span data-dcnode-id="2214" instrument_node=""> reviews around 1300 Accounting and Auditing Enforcement Releases (AAER) that the SEC released from January 2000 to December 2006 and sorts each company into one of the following nine industries: aviation and transport services manufacturing; consumer business; public sector; energy and resources; real estate; financial services; technology, media, and telecommunications; life sciences; and health care. Doloitte </span><a class="workspace-trigger" data-dcnode-id="2212" href="#bb0035" name="bbb0035"><span data-dcnode-id="2213" instrument_node="">[7]</span></a><span data-dcnode-id="2211" instrument_node=""> reports that the number of financial statement frauds that the SEC issued has decreased from 77 in 2003 to 44 in 2006. Although the number of reported frauds has decreased dramatically after the Sarbanes–Oxley Act was introduced in 2002, it is arguable whether the real number has decreased by that much. In reality, we have seen more fraudulent behaviors since 2008 when the economy has been going towards the lowest point since the great depression in 1929.</span></p><p data-dcnode-id="2208" id="p0095"><span data-dcnode-id="2209" instrument_node="">It leads us to believe that fraud types and industry patterns changed over time. It is important to understand how fraud schemes have evolved and it is more important to predict by any means possible, the direction of the change and keep the automatic fraud detection techniques up-to-date. The findings may have significance to develop more robust business processes as well as adaptive fraud detection mechanism for managing/deterring/detecting the risk of fraud. The efficacy of such processes will depend on knowing the fraud schemes typically committed and industry-by-industry differences in those schemes.</span></p><p data-dcnode-id="2195" id="p0100"><span data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node="">A majority of data mining-based financial statement fraud detection techniques are primarily based on </span><a class="topic-link" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/classification" title="Learn more about classification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2206" instrument_node="">classification</span></a><span data-dcnode-id="2204" instrument_node="">, which is the process of explaining and differentiating data classes in order to predict the class of objects whose class label is unknown. As compared to </span></span><a class="topic-link" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/association-rules" title="Learn more about association rule mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2202" instrument_node="">association rule mining</span></a><span data-dcnode-id="2196"><span data-dcnode-id="2200" instrument_node=""> that deals with existing data items, the classification rule mining deals with attributes and its values, clusters the attributes, and uses time-series mining or </span><a class="topic-link" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/outlier-detection" title="Learn more about outlier detection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2199" instrument_node="">outlier detection</span></a><span data-dcnode-id="2197" instrument_node=""> to recognize the new mode for financial statement fraud detection.</span></span></p><p data-dcnode-id="2193" id="p0105"><span data-dcnode-id="2194" instrument_node="">Despite the early success of these pioneering FSF auto-detection systems and algorithms, the rate of successful detection has continuously decreasing over the past several years. Although it is certainly possible that ethical standards have greatly improved since 2000, given the fact that the severity and quantity of law suits for financial statement frauds have increased recently, we are more inclined to believe that managements have adapted certain ways to avoid being identified by automated detection systems.</span></p><p data-dcnode-id="2188" id="p0110"><span data-dcnode-id="2192" instrument_node="">Although according to the No-Free-Lunch theorem, existing </span><a class="topic-link" data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about data mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2191" instrument_node="">data mining</span></a><span data-dcnode-id="2189" instrument_node=""> search techniques, including random search, should perform equally well on average, some techniques would have more accurate estimation than others when appropriate domain knowledge can be identified and integrated. In the next section, we propose a framework that utilizes domain knowledge to facilitate the detection of financial statement fraud in a constantly evolving economic environment.</span></p></section><section data-dcnode-id="1618" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2183"><span data-dcnode-id="2186" instrument_node="">5</span><span data-dcnode-id="2185" instrument_node="">. </span><span data-dcnode-id="2184" instrument_node="">Adaptive FSF detection framework and methodologies</span></h2><section data-dcnode-id="2113" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2179"><span data-dcnode-id="2182" instrument_node="">5.1</span><span data-dcnode-id="2181" instrument_node="">. </span><span data-dcnode-id="2180" instrument_node="">Framework to detect adaptive financial fraud</span></h3><div data-dcnode-id="2147"><p data-dcnode-id="2166" id="p0115"><span data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">Similar to traditional </span><a class="topic-link" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/classification" title="Learn more about classification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2177" instrument_node="">classification</span></a><span data-dcnode-id="2175" instrument_node=""> procedure, in general we consider two stages in our framework (</span></span><a class="workspace-trigger" data-dcnode-id="2172" href="#f0010" name="bf0010"><span data-dcnode-id="2173" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="2167"><span data-dcnode-id="2171" instrument_node="">). In the first stage, relevant external and internal variables that differentiate the industries, economic conditions, management's choice, timing considerations and any other factors that have the potential to form domain knowledge are selected and experimented. In the second stage, the financial data of the firm in question is analyzed based on this domain knowledge learned from the previous step. Certain detection strategy is formed accordingly and the data is further analyzed using </span><a class="topic-link" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about data mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2170" instrument_node="">data mining</span></a><span data-dcnode-id="2168" instrument_node=""> techniques.</span></span></p><figure class="figure text-xs" data-dcnode-id="2148" id="f0010"><span data-dcnode-id="2156"><img alt="" data-dcnode-id="2165" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr2.jpg&amp;raw"><span data-dcnode-id="2164" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2157"><li data-dcnode-id="2158"><a class="anchor download-link u-font-sans" data-dcnode-id="2159" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2160"><span data-dcnode-id="2163" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2149"><span data-dcnode-id="2150"><p data-dcnode-id="2151" id="sp0010"><span class="label" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="2153" instrument_node="">. </span><span data-dcnode-id="2152" instrument_node="">Proposed two-stage framework.</span></p></span></span></figure></div><div data-dcnode-id="2123"><p data-dcnode-id="2142" id="p0120"><span data-dcnode-id="2146" instrument_node="">To realize the general model described above and to catch the real world dynamics and possible new methods to commit financial statement fraud, we propose an adaptive learning framework (</span><a class="workspace-trigger" data-dcnode-id="2144" href="#f0015" name="bf0015"><span data-dcnode-id="2145" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="2143" instrument_node="">). We consider, but are not limited to, exogenous parameters described in existing literature, such as capital structure, conditions, choices, management attitudes, etc. The mechanism works as follows: based on external and internal economical circumstances, management chooses their action on whether or not to commit financial statement fraud at the year end. Financial data and statements of concern are audited and examined by a fraud detection unit. Resulting audit reports are further evaluated and learned by a self-adaptive module to collect relevant patterns and trends of each company in different industries. In the meanwhile, an adaptive fraud discovery module keeps evolving with exogenous parameters to discover unknown but possible pattern of financial statement fraud. New discoveries were also evaluated and learned to prepare the knowledge base for future fraud detection.</span></p><figure class="figure text-xs" data-dcnode-id="2124" id="f0015"><span data-dcnode-id="2132"><img alt="" data-dcnode-id="2141" height="271" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr3.jpg&amp;raw"><span data-dcnode-id="2140" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2133"><li data-dcnode-id="2134"><a class="anchor download-link u-font-sans" data-dcnode-id="2135" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2136"><span data-dcnode-id="2139" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2125"><span data-dcnode-id="2126"><p data-dcnode-id="2127" id="sp0015"><span class="label" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="2129" instrument_node="">. </span><span data-dcnode-id="2128" instrument_node="">FSF detection strategy selection to detect adaptive financial.</span></p></span></span></figure></div><p data-dcnode-id="2114" id="p0125"><span data-dcnode-id="2122" instrument_node="">To increase detection relevancy and to reduce computational complexity, we also propose adaptive feature selection that fits specific domain to choose the proper parameters for companies with similar internal and external financial environment </span><a class="workspace-trigger" data-dcnode-id="2120" href="#bb0065" name="bbb0065"><span data-dcnode-id="2121" instrument_node="">[13]</span></a><span data-dcnode-id="2115"><span data-dcnode-id="2119" instrument_node="">. Once relevant parameters are selected, we opt to proper methodology and data mining technique to detect financial fraud that evolves. As discussed in the previous section, no single data mining-based FSF detection technique is perfect and each of them is subject to its own handicaps. We propose </span><a class="topic-link" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/response-surface-methodology" title="Learn more about response surface methodology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2118" instrument_node="">response surface methodology</span></a><span data-dcnode-id="2116" instrument_node=""> to construct the foundation in order to find the right data mining-based detection technique.</span></span></p></section><section data-dcnode-id="1619" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2109"><span data-dcnode-id="2112" instrument_node="">5.2</span><span data-dcnode-id="2111" instrument_node="">. </span><span data-dcnode-id="2110" instrument_node="">Adaptive financial fraud detection with RSM</span></h3><p data-dcnode-id="2100" id="p0130"><span data-dcnode-id="2108" instrument_node="">Response Surface Methodology (RSM), a method for constructing global approximations to system behavior based on results calculated at various points in the design space </span><a class="workspace-trigger" data-dcnode-id="2106" href="#bb0115" name="bbb0115"><span data-dcnode-id="2107" instrument_node="">[23]</span></a><span data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">, is a natural fit to estimate the relationships between the variables and the financial statement fraud techniques. RSM provides statistically validated </span><a class="topic-link" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/predictive-model" title="Learn more about predictive models from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2104" instrument_node="">predictive models</span></a><span data-dcnode-id="2102" instrument_node=""> that can be manipulated for finding the probability of different forms of possible financial statement frauds.</span></span></p><p data-dcnode-id="2098" id="p0135"><span data-dcnode-id="2099" instrument_node="">RSM is extensively applied in various situations where output performance or service quality, which is called response, is influenced by a list of several input variables, which may or may not be complete and are called independent variables. Independent variables are subject to the control of the experiment designer. Approximation of the relationship between the response and independent variables can be visualized by RSM, which consists of three factors: (1) the experimental strategy for exploring the space of independent variables, (2) empirical statistical modeling to develop an appropriate approximating relationship between the response and the independent variables, and (3) optimization methods for finding the values of the process variables that produce desirable values of response.</span></p><p data-dcnode-id="2019" id="p0140"><span data-dcnode-id="2097" instrument_node="">Theoretically, the appropriate approximating model between the response </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">y</span></em><span data-dcnode-id="2094" instrument_node=""> and independent variables </span><em data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">x</span></em><sub data-dcnode-id="2089"><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">1</span></em></sub><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">, x</span></em><sub data-dcnode-id="2084"><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">2</span></em></sub><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">,…x</span></em><sub data-dcnode-id="2079"><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">n</span></em></sub><span data-dcnode-id="2078" instrument_node=""> can be constructed as </span><em data-dcnode-id="2072"><span data-dcnode-id="2077" instrument_node="">y</span><span data-dcnode-id="2076" instrument_node="">&nbsp;</span><span data-dcnode-id="2075" instrument_node="">=</span><span data-dcnode-id="2074" instrument_node="">&nbsp;</span><span data-dcnode-id="2073" instrument_node="">f(x</span></em><sub data-dcnode-id="2069"><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">1</span></em></sub><em data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">, x</span></em><sub data-dcnode-id="2064"><em data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">2</span></em></sub><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">,…x</span></em><sub data-dcnode-id="2059"><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">n</span></em></sub><em data-dcnode-id="2053"><span data-dcnode-id="2058" instrument_node="">)</span><span data-dcnode-id="2057" instrument_node="">&nbsp;</span><span data-dcnode-id="2056" instrument_node="">+</span><span data-dcnode-id="2055" instrument_node="">&nbsp;</span><span data-dcnode-id="2054" instrument_node="">ε,</span></em><span data-dcnode-id="2052" instrument_node=""> where the form of the true real-time response function f is unknown and may be complex. </span><em data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">ε</span></em><span data-dcnode-id="2049" instrument_node="">, which usually includes measurement error on response and other unpredictable noise, is a random term that represents the variability not caught by the response function. If we assume that it has a normal distribution with zero mean, </span><em data-dcnode-id="2039"><span data-dcnode-id="2048" instrument_node="">Y</span><span data-dcnode-id="2047" instrument_node="">&nbsp;</span><span data-dcnode-id="2046" instrument_node="">=</span><span data-dcnode-id="2045" instrument_node="">&nbsp;</span><span data-dcnode-id="2044" instrument_node="">E(y)</span><span data-dcnode-id="2043" instrument_node="">&nbsp;</span><span data-dcnode-id="2042" instrument_node="">=</span><span data-dcnode-id="2041" instrument_node="">&nbsp;</span><span data-dcnode-id="2040" instrument_node="">f(x</span></em><sub data-dcnode-id="2036"><em data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">1</span></em></sub><em data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">, x</span></em><sub data-dcnode-id="2031"><em data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">2</span></em></sub><em data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">,…x</span></em><sub data-dcnode-id="2026"><em data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">n</span></em></sub><em data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">).</span></em><span data-dcnode-id="2023" instrument_node=""> With the form of the true response function </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">f</span></em><span data-dcnode-id="2020" instrument_node=""> kept unknown, the designer has to approximate it and further utilize it to locate the possible response with discovered independent variables.</span></p><p data-dcnode-id="2014" id="p0145"><span data-dcnode-id="2018" instrument_node="">Feature selection can be implemented to identify a relevant list of variables that the designer may further utilize to construct the response surface. Once we have a firm in question, we are able to find the possibility of certain financial statement frauds based on the response surface estimation. Then, we select </span><a class="topic-link" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining-techniques" title="Learn more about data mining techniques from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2017" instrument_node="">data mining techniques</span></a><span data-dcnode-id="2015" instrument_node=""> that suit the profile that we have learned from the previous step.</span></p><p data-dcnode-id="2009" id="p0150"><span data-dcnode-id="2013" instrument_node="">RSM provides statistical tools for analysis of historical data and selection of variables aimed at better prediction. The objectives for using RSM in the context of financial statement fraud detection are to find the optimum response and to understand how the response changes in a given direction by adjusting the design variables </span><a class="workspace-trigger" data-dcnode-id="2011" href="#bb0085" name="bbb0085"><span data-dcnode-id="2012" instrument_node="">[17]</span></a><span data-dcnode-id="2010" instrument_node="">. When there are constraints on the design data, then the variable selection and experimental design has to meet requirements of the constraints. In general, the response surface can be visualized graphically and the graph, if in fewer than three dimensions, is helpful to navigate over the response surface to reach the desired outcome.</span></p><div data-dcnode-id="1620"><p data-dcnode-id="1642" id="p0155"><span data-dcnode-id="2008" instrument_node="">In a simple form, a function </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">f</span></em><span data-dcnode-id="2005" instrument_node=""> (</span><em data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">x</span></em><sub data-dcnode-id="2000"><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">1</span></em></sub><em data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">, x</span></em><sub data-dcnode-id="1995"><em data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">2</span></em></sub><span data-dcnode-id="1994" instrument_node="">) can be plotted versus the levels of </span><em data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">x</span></em><sub data-dcnode-id="1989"><em data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">1</span></em></sub><span data-dcnode-id="1988" instrument_node=""> and </span><em data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">x</span></em><sub data-dcnode-id="1983"><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">2</span></em></sub><span data-dcnode-id="1982" instrument_node="">, and this three-dimensional graph forms a response surface plot (</span><a class="workspace-trigger" data-dcnode-id="1980" href="#f0015" name="bf0015"><span data-dcnode-id="1981" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="1979" instrument_node="">). This figure shows an adaptive learning framework to detect evolutionary financial statement frauds using a response surface method (</span><a class="workspace-trigger" data-dcnode-id="1977" href="#f0020" name="bf0020"><span data-dcnode-id="1978" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="1976" instrument_node="">). We proceed by first selecting relevant variables that could either be the three parameters in the CMA model </span><a class="workspace-trigger" data-dcnode-id="1974" href="#bb0075" name="bbb0075"><span data-dcnode-id="1975" instrument_node="">[15]</span></a><span data-dcnode-id="1973" instrument_node="">, the parameters in a 3C's model </span><a class="workspace-trigger" data-dcnode-id="1971" href="#bb0095" name="bbb0095"><span data-dcnode-id="1972" instrument_node="">[19]</span></a><span data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">, a mixture from both models, or any other parameters that have some </span><a class="topic-link" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/causal-relationship" title="Learn more about causal relationship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1969" instrument_node="">causal relationship</span></a><span data-dcnode-id="1967" instrument_node=""> to financial statement frauds. The selected variables are denoted as</span></span><span class="display" data-dcnode-id="1896"><span class="formula" data-dcnode-id="1897" id="fo0010"><span class="label" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">(2)</span></span><span class="math" data-dcnode-id="1898"><span class="MathJax_Preview" data-dcnode-id="1963" style=""></span><span class="MathJax_SVG" data-dcnode-id="1901" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;
