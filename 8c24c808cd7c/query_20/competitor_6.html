ta-dcnode-id="1665" instrument_node="">F</span></mi></mstyle><mi data-dcnode-id="1661" is="true"><span data-dcnode-id="1662" instrument_node="">k</span></mi></msub><mo data-dcnode-id="1658" is="true" stretchy="true"><span data-dcnode-id="1659" instrument_node="">)</span></mo></mrow></mrow><mo data-dcnode-id="1654" is="true"><span data-dcnode-id="1655" instrument_node="">&lt;</span></mo><mn data-dcnode-id="1652" is="true"><span data-dcnode-id="1653" instrument_node="">1.</span></mn></mrow></math></span></span></span></span></span></p><figure class="figure text-xs" data-dcnode-id="1621" id="f0020"><span data-dcnode-id="1632"><img alt="" data-dcnode-id="1641" height="509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr4.jpg&amp;raw"><span data-dcnode-id="1640" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="1633"><li data-dcnode-id="1634"><a class="anchor download-link u-font-sans" data-dcnode-id="1635" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923610001314-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="1636"><span data-dcnode-id="1639" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="1622"><span data-dcnode-id="1623"><p data-dcnode-id="1624" id="sp0020"><span class="label" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="1629" instrument_node="">. </span><span data-dcnode-id="1628" instrument_node="">Adaptive learning and detecting financial statement fraud using a </span><a class="topic-link" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/response-surface-methodology" title="Learn more about response surface method from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1627" instrument_node="">response surface method</span></a><span data-dcnode-id="1625" instrument_node="">.</span></p></span></span></figure></div></section></section><section data-dcnode-id="1593" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1614"><span data-dcnode-id="1617" instrument_node="">6</span><span data-dcnode-id="1616" instrument_node="">. </span><span data-dcnode-id="1615" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1601" id="p0160"><span data-dcnode-id="1613" instrument_node="">In recent years, </span><a class="topic-link" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining" title="Learn more about data mining from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1612" instrument_node="">data mining</span></a><span data-dcnode-id="1602"><span data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node=""> has gained widespread attention and increasing popularity in the financial world. Successful </span><a class="topic-link" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining-application" title="Learn more about data mining applications from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1609" instrument_node="">data mining applications</span></a><span data-dcnode-id="1607" instrument_node=""> have been reported and recent surveys have found that data mining has grown in usage and effectiveness. Professional accounting bodies have also identified data mining as an important technology for the new century. Implementing straightforward </span></span><a class="topic-link" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/data-mining-techniques" title="Learn more about data mining techniques from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1605" instrument_node="">data mining techniques</span></a><span data-dcnode-id="1603" instrument_node=""> to discover financial statement fraud, however, has many disadvantages and limits of usage. After exhaustive literature review, we find that a majority of existing data mining techniques to detect financial fraud have their domain of usage and limitations.</span></span></p><p data-dcnode-id="1596" id="p0165"><span data-dcnode-id="1600" instrument_node="">Furthermore, when financial statement fraudsters have found ways to circumvent the automatic detection programs, there is an urgent need for a mechanism that is able to learn and use the industrial domain knowledge to facilitate the data mining techniques. We propose such a framework that is based on the </span><a class="topic-link" data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/response-surface-methodology" title="Learn more about response surface method from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1599" instrument_node="">response surface method</span></a><span data-dcnode-id="1597" instrument_node=""> to automatically pivot the program in accordance with the unique circumstances of the firm in question. Unlike traditional financial fraud detection techniques that are based on historical financial data, we further propose an innovative way, the active discovery module that evolves ahead of possible fraudsters. Preparing the intelligent detection system in anticipation before any unknown or future fraud happens enables us to effectively detect financial statement frauds that adapt.</span></p><p data-dcnode-id="1594" id="p0170"><span data-dcnode-id="1595" instrument_node="">Future research is needed to design the active discovery module that is both effective and efficient. Furthermore, although we have suggested the response surface method to extract the domain knowledge and to adaptively learn the changes from fraudsters, there may exist alternatives that have equal or better performance than the RSM. Research is also needed to examine the circumstances under which our suggested framework performs better than other techniques.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="1584"><button class="button button-anchor" data-dcnode-id="1588" type="button"><span class="button-text" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="1585" type="button"><span class="button-text" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="1583"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="401" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="402" id="bs0005"><dl class="references" data-dcnode-id="403" id="reference-links-bs0005"><dt class="label" data-dcnode-id="1578"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="1579" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="1580" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="1538"><div class="contribution" data-dcnode-id="1569"><span data-dcnode-id="1577" instrument_node="">M.S.</span><span data-dcnode-id="1575" instrument_node=""> </span><span data-dcnode-id="1573" ins , Journal of Behavioral and Experimental Finance</span></div></div><div class="buttons" data-dcnode-id="385"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="386" type="button"><span class="button-link-text" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="387" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="388"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="380"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="381" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="382"><p data-dcnode-id="383" id="d1e5525"><span data-dcnode-id="384" instrument_node="">Artificial intelligence (AI) and machine learning (ML) are two related technologies that are emergent in financial scholarship. However, no review, to date, has offered a wholistic retrospection of this research. To address this gap, we provide an overview of AI and ML research in finance. Using both co-citation and bibliometric-coupling analyses, we infer the&nbsp;thematic structure of AI and ML research in finance for 1986–April 2021. By uncovering nine (co-citation) and eight (bibliometric coupling) specific clusters of finance that apply AI and ML, we further identify three overarching groups of finance scholarship that are roughly equivalent for both forms of analysis: (1) portfolio construction, valuation, and investor behavior; (2) financial fraud and distress; and (3) sentiment inference, forecasting, and planning. Additionally, using co-occurrence and confluence analyses, we highlight trends and research directions regarding AI and ML in finance research. Our results provide assessment of&nbsp;&nbsp;AI and ML in finance research.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="368"><div class="sub-heading" data-dcnode-id="373"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/ARJ-04-2020-0079" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="377" id="citing-articles-article1-title"><span data-dcnode-id="378" instrument_node="">Fraudulent financial reporting and data analytics: an explanatory study from Ireland</span></h3></a><div class="article-source ellipsis" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2022, Accounting Research Journal</span></div></div><div class="buttons" data-dcnode-id="372"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="369"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="370" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="371"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="357"><div class="sub-heading" data-dcnode-id="362"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1109/ICCRD54409.2022.9730314" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="366" id="citing-articles-article2-title"><span data-dcnode-id="367" instrument_node="">Deep Learning Techniques for Financial Fraud Detection</span></h3></a><div class="article-source ellipsis" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">2022, 2022 IEEE 14th International Conference on Computer Research and Development, ICCRD 2022</span></div></div><div class="buttons" data-dcnode-id="361"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="358"><div class="abstract u-margin-m-ver u-margin-xs-r
