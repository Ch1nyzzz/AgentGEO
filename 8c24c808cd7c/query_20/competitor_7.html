</span><meta content="Financial statement fraud is an area of significant consternation for potential investors, auditing companies, and state regulators. The paper propose…" data-dcnode-id="8955" property="og:description"><span data-dcnode-id="8954" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0045&quot;>Financial statement fraud is an area of significant consternation for potential investors, auditing companies, and state regulators. The paper proposes an approach for detecting statement fraud through the combination of information from financial ratios and managerial comments within corporate annual reports. We employ a hierarchical attention network (HAN) to extract text features from the Management Discussion and Analysis (MD&amp;amp;A) section of annual reports. The model is designed to offer two distinct features. First, it reflects the structured hierarchy of documents, which previous approaches were unable to capture. Second, the model embodies two different attention mechanisms at the word and sentence level, which allows content to be differentiated in terms of its importance in the process of constructing the document representation. As a result of its architecture, the model captures both content and context of managerial comments, which serve as supplementary predictors to financial ratios in the detection of fraudulent reporting. Additionally, the model provides interpretable indicators denoted as “red-flag” sentences, which assist stakeholders in their process of determining whether further investigation of a specific annual report is required. Empirical results demonstrate that textual features of MD&amp;amp;A sections extracted by HAN yield promising classification results and substantially reinforce financial ratios.</p></div></div></div>" data-dcnode-id="8953" lang="en" name="citation_abstract"><span data-dcnode-id="8952" instrument_node="">

" aria-haspopup="true" class="button button-anchor" data-dcnode-id="8324" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="8327" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="8328" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="8325"><span data-dcnode-id="8326" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="8314" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="8317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.dss.2020.113421" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8318" instrument_node="">https://doi.org/10.1016/j.dss.2020.113421</span></a><a class="rights-and-content" data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0167923620301767%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8316" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="8313"></section><section class="ReferencedArticles" data-dcnode-id="8312"></section><div class="PageDivider" data-dcnode-id="8311"></div><div class="Abstracts u-font-serif" data-dcnode-id="8273" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="8280" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8309"><span data-dcnode-id="8310" instrument_node="">Highlights</span></h2><div data-dcnode-id="8281" id="as0010"><p data-dcnode-id="8282" id="sp0050"></p><dl class="list" data-dcnode-id="8283"><dt class="list-label" data-dcnode-id="8307"><span data-dcnode-id="8308" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8304"><p data-dcnode-id="8305" id="p0005"><span data-dcnode-id="8306" instrument_node="">Combining financial and text data enhances fraudulent financial statements detection.</span></p></dd><dt class="list-label" data-dcnode-id="8302"><span data-dcnode-id="8303" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8299"><p data-dcnode-id="8300" id="p0010"><span data-dcnode-id="8301" instrument_node="">HAN, GPT-2, ANN and XGB detect financial misstatements based on textual cues.</span></p></dd><dt class="list-label" data-dcnode-id="8297"><span data-dcnode-id="8298" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8294"><p data-dcnode-id="8295" id="p0015"><span data-dcnode-id="8296" instrument_node="">Novel NLP techniques allow to capture content and context of MD&amp;As.</span></p></dd><dt class="list-label" data-dcnode-id="8292"><span data-dcnode-id="8293" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8289"><p data-dcnode-id="8290" id="p0020"><span data-dcnode-id="8291" instrument_node="">Interpretability offered with “red-flag” sentences in the MD&amp;As of annual reports.</span></p></dd><dt class="list-label" data-dcnode-id="8287"><span data-dcnode-id="8288" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8284"><p data-dcnode-id="8285" id="p0025"><span data-dcnode-id="8286" instrument_node="">The proposed models provide decision support for stakeholders.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8274" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8278"><span data-dcnode-id="8279" instrument_node="">Abstract</span></h2><div data-dcnode-id="8275" id="as0005"><p data-dcnode-id="8276" id="sp0045"><span data-dcnode-id="8277" instrument_node="">Financial statement fraud is an area of significant consternation for potential investors, auditing companies, and state regulators. The paper proposes an approach for detecting statement fraud through the combination of information from financial ratios and managerial comments within corporate annual reports. We employ a hierarchical attention network (HAN) to extract text features from the Management Discussion and Analysis (MD&amp;A) section of annual reports. The model is designed to offer two distinct features. First, it reflects the structured hierarchy of documents, which previous approaches were unable to capture. Second, the model embodies two different attention mechanisms at the word and sentence level, which allows content to be differentiated in terms of its importance in the process of constructing the document representation. As a result of its architecture, the model captures both content and context of managerial comments, which serve as supplementary predictors to financial ratios in the detection of fraudulent reporting. Additionally, the model provides interpretable indicators denoted as “red-flag” sentences, which assist stakeholders in their process of determining whether further investigation of a specific annual report is required. Empirical results demonstrate that textual features of MD&amp;A sections extracted by HAN yield promising classification results and substantially reinforce financial ratios.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8250" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8262"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167923620301755"><svg class="icon icon-navigate-left" data-dcnode-id="8271" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8272"></path></svg><span class="button-alternative-text" data-dcnode-id="8264"><strong data-dcnode-id="8269"><span data-dcnode-id="8270" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8267"><span data-dcnode-id="8268" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8265"><span data-dcnode-id="8266" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8251"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167923620301780"><span class="button-alternative-text" data-dcnode-id="8255"><strong data-dcnode-id="8260"><span data-dcnode-id="8261" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8258"><span data-dcnode-id="8259" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8256"><span data-dcnode-id="8257" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8253" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8254"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8234"><div class="keywords-section" data-dcnode-id="8235" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8248"><span data-dcnode-id="8249" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8245" id="kw0005"><span data-dcnode-id="8246" id="tx0010"><span data-dcnode-id="8247" instrument_node="">Fraud detection</span></span></div><div class="keyword" data-dcnode-id="8242" id="kw0010"><span data-dcnode-id="8243" id="tx0015"><span data-dcnode-id="8244" instrument_node="">Financial statements</span></span></div><div class="keyword" data-dcnode-id="8239" id="kw0015"><span data-dcnode-id="8240" id="tx0020"><span data-dcnode-id="8241" instrument_node="">Deep learning</span></span></div><div class="keyword" data-dcnode-id="8236" id="kw0020"><span data-dcnode-id="8237" id="tx0025"><span data-dcnode-id="8238" instrument_node="">Text analytics</span></span></div></div></div><span data-dcnode-id="8233" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4831" id="body"><div data-dcnode-id="4869"><section data-dcnode-id="8172" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8227" id="st0020"><span data-dcnode-id="8232" instrument_node="">1</span><span data-dcnode-id="8230" instrument_node="">. </span><span data-dcnode-id="8228" instrument_node="">Introduction</span></h2><p data-dcnode-id="8219" id="p0030"><span data-dcnode-id="8226" instrument_node="">Fraud is a global problem that affects a variety of different businesses with a severe negative impact on firms and relevant stakeholders. The financial implications of fraudulent activities occurring globally in the past two decades are estimated to amount up to $5.127 trillion, with associated losses increasing by 56% in the past ten years [</span><a class="workspace-trigger" data-dcnode-id="8224" href="#bb0105" name="bbb0105"><span data-dcnode-id="8225" instrument_node="">21</span></a><span data-dcnode-id="8223" instrument_node="">]. The actual costs of fraud are potentially greater, particularly if one also considers the indirect costs including harm the to credibility of investors, creditors and, employees and the reduction in business caused by the resultant scandal. Eventually, fraudulent activities may also lead to bankruptcy. All types of businesses and industries are affected by fraud. However, smaller organizations (less than 100 employees) as well as nonprofit organizations that have weaker internal control systems and fewer resources to recover from fraud losses can be more susceptible to fraud [</span><a class="workspace-trigger" data-dcnode-id="8221" href="#bb0010" name="bbb0010"><span data-dcnode-id="8222" instrument_node="">2</span></a><span data-dcnode-id="8220" instrument_node="">].</span></p><p data-dcnode-id="8211" id="p0035"><span data-dcnode-id="8218" instrument_node="">The Association of Certified Fraud Examiners (ACFE), the world's largest AE organization, recognizes three main classes of fraud: corruption, asset misappropriation, and fraudulent statements [</span><a class="workspace-trigger" data-dcnode-id="8216" href="#bb0330" name="bbb0330"><span data-dcnode-id="8217" instrument_node="">66</span></a><span data-dcnode-id="8215" instrument_node="">]. All three have specific properties and successful fraud detection requires comprehensive knowledge of their particular characteristics. This study concentrates on financial statement fraud and adheres to the definition of fraud proposed by Nguyen [</span><a class="workspace-trigger" data-dcnode-id="8213" href="#bb0250" name="bbb0250"><span data-dcnode-id="8214" instrument_node="">50</span></a><span data-dcnode-id="8212" instrument_node="">], who stated that it is “the material omissions or misrepresentations resulting from an intentional failure to report financial information in accordance with generally accepted accounting principles“. For this study, the terminology “financial statement fraud“, “fraudulent financial reporting“, and “financial misstatements “are used interchangeably and are distinguished from different factors that cause misrepresentations within financial statements, such as unintended mistakes.</span></p><p data-dcnode-id="8206" id="p0040"><span data-dcnode-id="8210" instrument_node="">According to the “2020 Report to the Nations” published by the ACFE, the median cost per instance of occupational fraud around the world amounted to $125,000 and the median period was 14&nbsp;months. Although the frequency at which asset misappropriation and corruption occur tends to be greater than for financial statement fraud, the impact of the latter crime is significantly more severe, accounting for a median loss of $954,000 and a median duration of 24&nbsp;months [</span><a class="workspace-trigger" data-dcnode-id="8208" href="#bb0010" name="bbb0010"><span data-dcnode-id="8209" instrument_node="">2</span></a><span data-dcnode-id="8207" instrument_node="">].</span></p><p data-dcnode-id="8198" id="p0045"><span data-dcnode-id="8205" instrument_node="">The Center for Audit Quality indicted that managers commit financial statement fraud for a variety of reasons, such as personal benefit, the necessity to satisfy short-term financial goals, and the intention to hide bad news. Fraudulent financial statements can be manipulated so that they bear a convincing resemblance to non-fraudulent reports, and they can emerge in various distinct types [</span><a class="workspace-trigger" data-dcnode-id="8203" href="#bb0140" name="bbb0140"><span data-dcnode-id="8204" instrument_node="">28</span></a><span data-dcnode-id="8202" instrument_node="">]. Examples of frequently used methods are net income over- or understatements, falsified or understated revenues, hidden or overstated liabilities and expenses, inappropriate valuations of assets, and false disclosures [</span><a class="workspace-trigger" data-dcnode-id="8200" href="#bb0330" name="bbb0330"><span data-dcnode-id="8201" instrument_node="">66</span></a><span data-dcnode-id="8199" instrument_node="">]. Authorities directly reacted to the increased prevalence of corporate fraud by adopting new standards for accounting and auditing. Nevertheless, financial statement irregularities are frequently observed and complicate the detection of fraudulent instances.</span></p><p data-dcnode-id="8175" id="p0050"><span data-dcnode-id="8197" instrument_node="">Detecting financial statement abnormalities is regarded as the duty of the auditor [</span><a class="workspace-trigger" data-dcnode-id="8195" href="#bb0090" name="bbb0090"><span data-dcnode-id="8196" instrument_node="">18</span></a><span data-dcnode-id="8194" instrument_node="">]. Despite the existing guidelines, the detection of indicators of fraud can be challenging. A 2020 report revealed that only a limited number of cases of fraud were identified by internal and external auditors, with rates of 15% and 4%, respectively [</span><a class="workspace-trigger" data-dcnode-id="8192" href="#bb0010" name="bbb0010"><span data-dcnode-id="8193" instrument_node="">2</span></a><span data-dcnode-id="8191" instrument_node="">]. Hence, there has been an increased focus on automated systems for the detection of financial statement fraud [</span><a class="workspace-trigger" data-dcnode-id="8189" href="#bb0350" name="bbb0350"><span data-dcnode-id="8190" instrument_node="">70</span></a><span data-dcnode-id="8188" instrument_node="">]. Such systems have specific importance for all groups of stakeholders: for investors - to facilitate qualified decisions, for auditing companies - to speed up and improve the accuracy of the audit, and for state regulators - to concentrate their investigations more effectively [</span><a class="workspace-trigger" data-dcnode-id="8186" href="#bb0005" name="bbb0005"><span data-dcnode-id="8187" instrument_node="">1</span></a><span data-dcnode-id="8185" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8183" href="#bb0015" name="bbb0015"><span data-dcnode-id="8184" instrument_node="">3</span></a><span data-dcnode-id="8182" instrument_node="">]. Therefore, efforts have been made to develop smart systems designed to detect financial statement fraud. Previous studies have examined various quantitative financial and linguistic factors as indicators of financial irregularities [</span><a class="workspace-trigger" data-dcnode-id="8180" href="#bb0025" name="bbb0025"><span data-dcnode-id="8181" instrument_node="">5</span></a><span data-dcnode-id="8179" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8177" href="#bb0075" name="bbb0075"><span data-dcnode-id="8178" instrument_node="">15</span></a><span data-dcnode-id="8176" instrument_node="">]. In the context of annual reporting, quantitative financial information is supported by textual information, such as the MD&amp;A section, which aims at providing investors with an insight into the management's opinions regarding the organisation's future prospects. The language used in the MD&amp;A section could reveal managers' cognitive processes and indicate fraudulent behaviour. Even though studies have emphasized the increasing significance of textual analysis of financial documentation, no research has focused on the application of state-of-the-art deep learning (DL) models for textual feature extraction. Furthermore, minimal research focused on the combination of financial and linguistic information for the intelligent prediction of financial statement fraud as well as on the interpretability of predictions, which is a crucial aspect to support auditors.</span></p><p data-dcnode-id="8173" id="p0055"><span data-dcnode-id="8174" instrument_node="">We aim to bridge this gap and contribute to the development of decision support systems for fraud detection by offering a state-of-the-art DL model for screening submitted reports based on a combination of financial and textual data. The proposed method exhibits superior predictive performance and allows the identification of early warning indicators (red-flags) on both the word- and sentence-level for the facilitation of the audit process. Additionally, we showcase the results of comparative modeling on different data types associated with financial reports and offer the alternative performance metrics that are centered around the cost imbalance of miss-classification errors.</span></p></section><section data-dcnode-id="8135" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8166" id="st0025"><span data-dcnode-id="8171" instrument_node="">2</span><span data-dcnode-id="8169" instrument_node="">. </span><span data-dcnode-id="8167" instrument_node="">Research design and contributions</span></h2><p data-dcnode-id="8142" id="p0060"><span data-dcnode-id="8165" instrument_node="">In line with the above goals, we pose three research questions (RQ) that frame our research:</span></p><dl class="list" data-dcnode-id="8143"><dt class="list-label" data-dcnode-id="8163"><span data-dcnode-id="8164" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8158"><p data-dcnode-id="8159" id="p0065"><strong data-dcnode-id="8161"><span data-dcnode-id="8162" instrument_node="">RQ 1</span></strong><span data-dcnode-id="8160" instrument_node="">: Does the novel combination of financial and text data (FIN+TXT) represent a more informative data type for fraud detection as compared to using FIN or TXT in isolation?</span></p></dd><dt class="list-label" data-dcnode-id="8156"><span data-dcnode-id="8157" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8151"><p data-dcnode-id="8152" id="p0070"><strong data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">RQ 2</span></strong><span data-dcnode-id="8153" instrument_node="">: Can a state-of-the-art DL model outperform the bag-of-words (BOW) approach for textual feature extraction in combination with quantitative financial features?</span></p></dd><dt class="list-label" data-dcnode-id="8149"><span data-dcnode-id="8150" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8144"><p data-dcnode-id="8145" id="p0075"><strong data-dcnode-id="8147"><span data-dcnode-id="8148" instrument_node="">RQ 3</span></strong><span data-dcnode-id="8146" instrument_node="">: Can the proposed DL model assist in interpreting textual features signaling fraud and provide “red-flag” indicators to support the decision-making of auditors?</span></p></dd></dl><p></p><p data-dcnode-id="8140"><span data-dcnode-id="8141" instrument_node="">To answer these research questions, we select an array of classification models for detecting fraud based on different combinations of data. We consider techniques well established in the fraud detection literature including logistic regression (LR), support vector machines (SVM) and random forest (RF). Extreme gradient Boosting (XGB) and artificial neural networks (ANN), which have not been tested for statement fraud detection, are also part of the study. The main focus of the paper is textual data processing. We introduce a novel DL method called hierarchical attention network (HAN) to the community and demonstrate its distinctive features of providing accurate and interpretable fraud predictions. In line with previous research, the paper concentrates on the MD&amp;A sections of annual reports filed by firms within the US with the Securities and Exchange Commission (SEC), which are referenced as annual reports on form 10-K. The SEC is the preeminent financial supervisory organisation that is responsible for monitoring financial reports of firms listed on the US stock exchange.</span></p><p data-dcnode-id="8138" id="p0080"><span data-dcnode-id="8139" instrument_node="">All selected models are trained on five different combinations of data contained in the statements submitted for audit: financial indicators (FIN), linguistic features (LING) of an MD&amp;A text, financial and linguistic features (FIN + LING), the full text of an MD&amp;A (TXT), full text and the financial indicators (FIN + TXT). We compare the predictive performance of the models with regard to their ability to distinguish fraud cases, for which we use traditional metrics like Accuracy and area under the Receiver Operating Curve (AUC) and metrics that reflect the imbalance in classification error, namely Sensitivity, F1-score, and F2-scores. The comparative study contributes to the empirical literature on fraud detection through i) expanding the set of considered classifiers, ii) offering previously unexplored data combinations, and iii) introducing new DL methods that provide accurate fraud forecasts and interpretative features.</span></p><p data-dcnode-id="8136" id="p0085"><span data-dcnode-id="8137" instrument_node="">Following RQ 3, we offer a novel fraud detection method that provides signaling tools for scholars and practitioners. We examine words considered “red-flags” by the RF feature importance method and the HAN attention layer output. Given that the use of words for signaling fraud may be the subject of manipulation, we offer sentence-level importance indicators as a remedy and demonstrate how the latter can guide the audit process.</span></p></section><section data-dcnode-id="7694" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8129" id="st0030"><span data-dcnode-id="8134" instrument_node="">3</span><span data-dcnode-id="8132" instrument_node="">. </span><span data-dcnode-id="8130" instrument_node="">Decision support for fraud detection</span></h2><div data-dcnode-id="7841"><p data-dcnode-id="8106" id="p0095"><span data-dcnode-id="8128" instrument_node="">Previous studies proposed fraud detection systems and offered systematic literature reviews on fraud detection approaches [</span><a class="workspace-trigger" data-dcnode-id="8126" href="#bb0280" name="bbb0280"><span data-dcnode-id="8127" instrument_node="">56</span></a><span data-dcnode-id="8125" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8123" href="#bb0355" name="bbb0355"><span data-dcnode-id="8124" instrument_node="">71</span></a><span data-dcnode-id="8122" instrument_node="">]. </span><a class="workspace-trigger" data-dcnode-id="8120" href="#t0005" name="bt0005"><span data-dcnode-id="8121" instrument_node="">Table 1</span></a><span data-dcnode-id="8119" instrument_node=""> depicts the status-quo in the field of financial fraud detection along four dimensions: the technique utilized, the type of data, the country of study, and the predictive performance in terms of classification accuracy and other metrics. Prior research focused on financial variables and applied a range of modeling techniques, from LR to DL. Several authors experimented with linguistic variables. These variables were based on pre-determined lists of words associated with fraud or readability measures such as the average length of words and sentences, lexical diversity, and sentence complexity [</span><a class="workspace-trigger" data-dcnode-id="8117" href="#bb0145" name="bbb0145"><span data-dcnode-id="8118" instrument_node="">29</span></a><span data-dcnode-id="8116" instrument_node="">]. Few studies applied natural language processing (NLP) techniques representing the whole textual content of 10-K reports and, to the best of our knowledge, no previous study considered DL models for text analysis in financial statements. Furthermore, most studies examined the relation between linguistic aspects and fraudulent actions. Only Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="8114" href="#bb0130" name="bbb0130"><span data-dcnode-id="8115" instrument_node="">26</span></a><span data-dcnode-id="8113" instrument_node="">] combined them with financial data and showed that although financial variables are essential for the detection of fraud, it is possible to enhance the performance through the inclusion of linguistic data. However, their study was not targeted at evaluating the textual content of corporate annual reports and it did not include sophisticated techniques for mining text such as BOW and DL. The majority of existing research measured performance in terms of accuracy. Some studies also considered precision and recall. Additionally, most previous studies neglected model interpretability, which is crucial to support auditors during client selection or audit planning. Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="8111" href="#bb0130" name="bbb0130"><span data-dcnode-id="8112" instrument_node="">26</span></a><span data-dcnode-id="8110" instrument_node="">] pointed out the importance of transparent fraud detection models and derived interpretable “green-flag” values (for which fraud is likely absent). However, because the detection of fraudulent firms requires more complex non-interpretable models, no “red-flag” values (for which fraud is likely present) could be derived. We bridge this gap by suggesting the use of textual elements as “red-flags” for auditors. Given that the cost of failing to detect statement fraud is higher than that of incorrectly flagging a legitimate statement as fraudulent [</span><a class="workspace-trigger" data-dcnode-id="8108" href="#bb0130" name="bbb0130"><span data-dcnode-id="8109" instrument_node="">26</span></a><span data-dcnode-id="8107" instrument_node="">], focusing on early warning signs of fraud is necessary and can enhance the efficiency of auditing processes. In conclusion, this paper adds to the literature by offering an integrated approach for processing both textual and financial data using interpretable state-of-the-art DL methods. Furthermore, we provide a comprehensive evaluation of different modeling techniques using cost-sensitive metrics to account for the different severities of false alarms versus missed fraud cases.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7842" id="t0005"><span class="captions" data-dcnode-id="8098"><span data-dcnode-id="8099" id="ca0030"><p data-dcnode-id="8100" id="sp0030"><span class="label" data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">Table 1</span></span><span data-dcnode-id="8103" instrument_node="">. </span><span data-dcnode-id="8101" instrument_node="">Analysis of classifier comparisons in financial statement fraud detection.</span></p></span></span><div class="groups" data-dcnode-id="7846"><table data-dcnode-id="7847"><thead data-dcnode-id="8084"><tr class="rowsep-1 valign-top" data-dcnode-id="8085"><th data-dcnode-id="8096" scope="col"><span data-dcnode-id="8097" instrument_node="">Study</span></th><th data-dcnode-id="8094" scope="col"><span data-dcnode-id="8095" instrument_node="">Data (fraud / no fraud)</span></th><th data-dcnode-id="8092" scope="col"><span data-dcnode-id="8093" instrument_node="">Country</span></th><th data-dcnode-id="8090" scope="col"><span data-dcnode-id="8091" instrument_node="">Features</span></th><th data-dcnode-id="8088" scope="col"><span data-dcnode-id="8089" instrument_node="">Classifiers</span></th><th data-dcnode-id="8086" scope="col"><span data-dcnode-id="8087" instrument_node="">Used metrics</span></th></tr></thead><tbody data-dcnode-id="7848"><tr data-dcnode-id="8068"><td data-dcnode-id="8079"><span data-dcnode-id="8083" instrument_node="">Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="8081" href="#bb0130" name="bbb0130"><span data-dcnode-id="8082" instrument_node="">26</span></a><span data-dcnode-id="8080" instrument_node="">]</span></td><td data-dcnode-id="8077"><span data-dcnode-id="8078" instrument_node="">311/311</span></td><td data-dcnode-id="8075"><span data-dcnode-id="8076" instrument_node="">US</span></td><td data-dcnode-id="8073"><span data-dcnode-id="8074" instrument_node="">FIN+ LING</span></td><td data-dcnode-id="8071"><span data-dcnode-id="8072" instrument_node="">BBN(90.3), DTNB(89.5), RF(87.5),Bag(87.1), JRIP(87.0), CART(86.2),C4.5(86.1), LMT(85.4), SVM(78.0),MLP(77.9), AB(77.3), LR(74.5), NB(57.8)</span></td><td data-dcnode-id="8069"><span data-dcnode-id="8070" instrument_node="">Acc, TPR, TNR, MC, F-score, AUC</span></td></tr><tr data-dcnode-id="8052"><td data-dcnode-id="8063"><span data-dcnode-id="8067" instrument_node="">Kim et al. [</span><a class=
