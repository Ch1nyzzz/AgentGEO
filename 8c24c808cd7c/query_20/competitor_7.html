s" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">2022, Information and Management</span></div></div><div class="buttons" data-dcnode-id="385"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="386" type="button"><span class="button-link-text" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="387" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="388"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="380"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="381" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="382"><p data-dcnode-id="383" id="spara013"><span data-dcnode-id="384" instrument_node="">This study examines the impact of readability and understandability of the narratives on the signal receiver's acceptance of the signal which, in turn, affects a potential funder's decision, and hence the funding outcomes. Lexicon-related indicators and grammar-related indicators are applied to analyze 267,688 crowdfunding projects from the crowdfunding platform Indiegogo. Entrepreneurs must apply the right mix of lexicon- and grammar-related indicators to improve the online narrative's readability and understandability so as to send the right signals to attract project funders. Our results suggest that most of the indicators promote successful funding. Some indicators show a curvilinear, U-shape or inverted U-shape influence. The lexicon-related indicators rank higher in importance than the grammar-related indicators, and the number of difficult words ranks first among the indicators. This study links signal observability, linguistic cues, and funding success, and provides theoretical and practical implications on the understanding of signaling theory and narratives.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="361"><div class="sub-heading" data-dcnode-id="373"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214635021001210" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="377" id="citing-articles-article1-title"><span data-dcnode-id="378" instrument_node="">Artificial intelligence and machine learning in finance: Identifying foundations, themes, and research clusters from bibliometric analysis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2021, Journal of Behavioral and Experimental Finance</span></div></div><div class="buttons" data-dcnode-id="367"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="368" type="button"><span class="button-link-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="369" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="370"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="362"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="363" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="364"><p data-dcnode-id="365" id="d1e5525"><span data-dcnode-id="366" instrument_node="">Artificial intelligence (AI) and machine learning (ML) are two related technologies that are emergent in financial scholarship. However, no review, to date, has offered a wholistic retrospection of this research. To address this gap, we provide an overview of AI and ML research in finance. Using both co-citation and bibliometric-coupling analyses, we infer the&nbsp;thematic structure of AI and ML research in finance for 1986–April 2021. By uncovering nine (co-citation) and eight (bibliometric coupling) specific clusters of finance that apply AI and ML, we further identify three overarching groups of finance scholarship that are roughly equivalent for both forms of analysis: (1) portfolio construction, valuation, and investor behavior; (2) financial fraud and distress; and (3) sentiment inference, forecasting, and planning. Additionally, using co-occurrence and confluence analyses, we highlight trends and research directions regarding AI and ML in finance research. Our results provide assessment of&nbsp;&nbsp;AI and ML in finance research.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="343"><div class="sub-heading" data-dcnode-id="355"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S156742232100079X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="359" id="citing-articles-article2-title"><span data-dcnode-id="360" instrument_node="">Which goods are most likely to be subject to click farming? An evidence from the Taobao platform</span></h3></a><div class="article-source ellipsis" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">2021, Electronic Commerce Research and Applications</span></div></div><div class="buttons" data-dcnode-id="349"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="350" type="button"><span class="button-link-text" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="351" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="352"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="344"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="345" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="346"><p data-dcnode-id="347" id="sp0010"><span data-dcnode-id="348" instrument_node="">Click farming is common in online shopping. It is thus important to identify click farming and compare its performance across different categories of online goods. To this end, we conduct an empirical analysis of click farming on the Taobao platform in China. First, we extract several new features from three sources, namely main goods, online shop itself, and online reviews, based on the formation mechanism of click farming. Second, we investigate their usefulness in identifying click farming among different online goods, including importance analysis and partial dependence analysis. Third, we further investigate the contribution of constructed features to predicting click farming. Our findings confirm the effectiveness of our created features and the heterogeneity of click farming among different online goods. Specifically, click farming is most likely to happen in clothing-related goods, then followed by electronic goods and service-related goods. Our results are significant for consumers to understand online information and for online business platforms to reduce the occurrence of click farming.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="325"><div class="sub-heading" data-dcnode-id="337"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2667325821001722" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="341" id="citing-articles-article3-title"><span data-dcnode-id="342" instrument_node="">Combating emerging financial risks in the big data era: A perspective review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">2021, Fundamental Research</span></div></div><div class="buttons" data-dcnode-id="331"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="332" type="button"><span class="button-link-text" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="333" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="334"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="326"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="327" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="328"><p data-dcnode-id="329" id="sp0004"><span data-dcnode-id="330" instrument_node="">Big data technology has had a significant impact on new business and financial services: for example, GPS and Bluetooth inspire location-based services, and search and web technologies motivate online shopping, reviews, and payments. These business services have become more connected than ever, and as a result, financial frauds have become a significant challenge. Therefore, combating financial risks in the big data era requires breaking the borders of traditional data, algorithms, and systems. An increasing number of studies have addressed these challenges and proposed new methods for risk detection, assessment, and forecasting. As a key contribution, we categorize these works in a rational framework: first, we identify the data that can be used to identify risks. We then discuss how big data can be combined with the emerging tools to effectively learn or analyze financial risk. Finally, we highlight the effectiveness of these methods in real-world applications. Furthermore, we stress on the importance of utilizing multi-channel information, graphs, and networks of long-range dependence for the effective identification of financial risks. We conclude our survey with a discussion on the new challenges faced by the financial sector, namely, deep fake technology, adversaries, causal and interpretable inference, privacy protection, and microsimulations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="307"><div class="sub-heading" data-dcnode-id="319"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1568494621004105" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="323" id="citing-articles-article4-title"><span data-dcnode-id="324" instrument_node="">A financial statement fraud model based on synthesized attribute selection and a dataset with missing values and imbalanced classes</span></h3></a><div class="article-source ellipsis" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">2021, Applied Soft Computing</span></div></div><div class="buttons" data-dcnode-id="313"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="314" type="button"><span class="button-link-text" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="315" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="316"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="308"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="309" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="310"><p data-dcnode-id="311" id="d1e4500"><span data-dcnode-id="312" instrument_node="">Many financial fraud events have occurred over the past few decades. These events have led to massive losses for investors. Hence, government officials have begun to focus on the problem and have issued several decrees (acts) on financial fraud. Many scholars have explored the factors of financial fraud, and although their results performed well, most studies have not generated a set of useful rules to support auditors. Furthermore, data on financial statement fraud usually constitute an imbalanced class problem, and previous work minimally addresses this problem. Therefore, this study, based on the handling of missing values and imbalanced classes, builds a detecting model of financial statement fraud. First, it utilizes listwise and pairwise deletion to remove missing values. Second, it proposes three merged attribute selection methods and applies a nonlinear distance correlation to select important attributes. Third, it applies undersampling and oversampling to address the imbalanced classes. Finally, it uses rule-based classifiers to generate a set of useful rules. In practice, this study employs a list of fraudulent companies to collect data on financial statement fraud. We summarize the results as follows: (1) the pairwise deletion removes fewer records than does listwise removal in handling missing values; (2) the merged attribute selection (Com_I4) has the best performance on the four evaluation criteria; (3) the oversampling can enhance accuracy, and has the lowest type 1 and type 2 errors; (4) the random forest of Com_I4 can build the optimal model of financial statement fraud in the pairwise deletion and random oversampling; and (5) the results show that the ensemble learning (random forest) is a robust model in this study. Finally, these results in this study can be provided to practitioners, investors, and auditing personnel as references.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="296"><div class="sub-heading" data-dcnode-id="301"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/asi4040082" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="305" id="citing-articles-article5-title"><span data-dcnode-id="306" instrument_node="">Deepfmd: Computational analysis for malaria detection in blood-smear images using deep-learning features</span></h3></a><div class="article-source ellipsis" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">2021, Applied System Innovation</span></div></div><div class="buttons" data-dcnode-id="300"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="297"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="298" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="299"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85094606315%26md5%3D62be19a9e72815223e7c9205c6331e2" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="293" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="294"></path></svg><span class="button-alternative-text" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="281" id="bg0005"><p data-dcnode-id="282" id="sp0060"><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Patricia Craja</span></strong><span data-dcnode-id="283" instrument_node=""> received her B.Sc. degree in Mathematics and M.Sc. degree in Statistics, from the Technical University of Berlin and the Humboldt University of Berlin, Germany, respectively. Since 2017, she is freelancing as a Data Engineer and has worked on a wide range of Data Science projects for startups and tech companies including Google. Her current research interests are in the fields of natural language processing and decision making.</span></p></div><div class="article-biography" data-dcnode-id="276" id="bg0010"><p data-dcnode-id="277" id="sp0065"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Alisa Kim</span></strong><span data-dcnode-id="278" instrument_node=""> is a researcher at Humboldt University, focusing on the application of deep learning and natural language processing in financial and regulatory sectors. She got her Master's degree in Management from St. Andrews University and worked in investment banking and consulting before joining the Business Informatics Chair of HU as a full-time researcher and educator.</span></p></div><div class="article-biography" data-dcnode-id="271" id="bg0015"><p data-dcnode-id="272" id="sp0070"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Stefan Lessmann</span></strong><span data-dcnode-id="273" instrument_node=""> received a diploma in business administration and a PhD from the University of Hamburg in 2002 and 2007, respectively. Stefan worked as a lecturer and senior lecture in business informatics at the Institute of Information Systems of the University of Hamburg. Since 2008, Stefan is a guest lecturer at the School of Management of University of Southampton, where he teaches under- and postgraduate courses on quantitative methods, electronic business, and web application development. Stefan completed his habilitation in the area of predictive analytics in 2012. In 2014, Stefan joined the Humboldt-University of Berlin, where he heads the Chair of Information Systems at the School of Business and Economics. Stefan published several papers in leading international journals and conferences, including the European Journal of Operational Research, the IEEE Transactions of Software Engineering, and the International Conference on Information Systems. He actively participates in knowledge transfer and consulting projects with industry partners; from small start-up companies to global players.</span></p></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="262"><dt class="footnote-label" data-dcnode-id="267"><sup data-dcnode-id="268"><a data-dcnode-id="269" href="#bfn0005"><span data-dcnode-id="270" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="263"><p data-dcnode-id="264" id="np0005"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/edgar.shtml" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="266" instrument_node="">www.sec.gov/edgar.shtml</span></a></p></dd></dl><dl class="footnote" data-dcnode-id="253"><dt class="footnote-label" data-dcnode-id="258"><sup data-dcnode-id="259"><a data-dcnode-id="260" href="#bfn0010"><span data-dcno
