_node="">US</span></td><td data-dcnode-id="8025"><span data-dcnode-id="8026" instrument_node="">TXT (BOW), top 200 RF words</span></td><td data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">SVM (AUC 89.0)</span></td><td data-dcnode-id="8021"><span data-dcnode-id="8022" instrument_node="">AUC, Fraud Probability</span></td></tr><tr data-dcnode-id="8004"><td data-dcnode-id="8015"><span data-dcnode-id="8019" instrument_node="">Throckmorton et al. [</span><a class="workspace-trigger" data-dcnode-id="8017" href="#bb0340" name="bbb0340"><span data-dcnode-id="8018" instrument_node="">68</span></a><span data-dcnode-id="8016" instrument_node="">]</span></td><td data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">41/1531</span></td><td data-dcnode-id="8011"><span data-dcnode-id="8012" instrument_node="">US</span></td><td data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">FIN+ LING from Conference Calls</span></td><td data-dcnode-id="8007"><span data-dcnode-id="8008" instrument_node="">GLRT (AUC 81.0)</span></td><td data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">AUC</span></td></tr><tr data-dcnode-id="7980"><td data-dcnode-id="7999"><span data-dcnode-id="8003" instrument_node="">Goel and Gangolly [</span><a class="workspace-trigger" data-dcnode-id="8001" href="#bb0115" name="bbb0115"><span data-dcnode-id="8002" instrument_node="">23</span></a><span data-dcnode-id="8000" instrument_node="">]</span></td><td data-dcnode-id="7997"><span data-dcnode-id="7998" instrument_node="">405/622</span></td><td data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">US</span></td><td data-dcnode-id="7993"><span data-dcnode-id="7994" instrument_node="">LING</span></td><td data-dcnode-id="7987"><em data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">χ</span></em><sup data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">2</span></sup><span data-dcnode-id="7988" instrument_node=""> statistics</span></td><td data-dcnode-id="7981"><em data-dcnode-id="7985"><span data-dcnode-id="7986" instrument_node="">χ</span></em><sup data-dcnode-id="7983"><span data-dcnode-id="7984" instrument_node="">2</span></sup><span data-dcnode-id="7982" instrument_node=""> statistics</span></td></tr><tr data-dcnode-id="7964"><td data-dcnode-id="7975"><span data-dcnode-id="7979" instrument_node="">Dechow et al. [</span><a class="workspace-trigger" data-dcnode-id="7977" href="#bb0075" name="bbb0075"><span data-dcnode-id="7978" instrument_node="">15</span></a><span data-dcnode-id="7976" instrument_node="">]</span></td><td data-dcnode-id="7973"><span data-dcnode-id="7974" instrument_node="">293/79358</span></td><td data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">US</span></td><td data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">FIN</span></td><td data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">LR(63.7)</span></td><td data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">Acc, TPR, FPR, FNR, min F-Score</span></td></tr><tr data-dcnode-id="7948"><td data-dcnode-id="7959"><span data-dcnode-id="7963" instrument_node="">Humpherys et al. [</span><a class="workspace-trigger" data-dcnode-id="7961" href="#bb0145" name="bbb0145"><span data-dcnode-id="7962" instrument_node="">29</span></a><span data-dcnode-id="7960" instrument_node="">]</span></td><td data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">101/101</span></td><td data-dcnode-id="7955"><span data-dcnode-id="7956" instrument_node="">US</span></td><td data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">LING</span></td><td data-dcnode-id="7951"><span data-dcnode-id="7952" instrument_node="">C4.5 (67.3), NB (67.3), SVM (65.8)</span></td><td data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">Acc, Precision, Recall, F-score</span></td></tr><tr data-dcnode-id="7929"><td data-dcnode-id="7943"><span data-dcnode-id="7947" instrument_node="">Glancy and Yadav [</span><a class="workspace-trigger" data-dcnode-id="7945" href="#bb0110" name="bbb0110"><span data-dcnode-id="7946" instrument_node="">22</span></a><span data-dcnode-id="7944" instrument_node="">]</span></td><td data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">11/20</span></td><td data-dcnode-id="7939"><span data-dcnode-id="7940" instrument_node="">US</span></td><td data-dcnode-id="7937"><span data-dcnode-id="7938" instrument_node="">TXT (BOW)</span></td><td data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">hierarchical clustering (83.9)</span></td><td data-dcnode-id="7930"><span data-dcnode-id="7934" instrument_node="">TP, TN, FP, FN, </span><em data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">p</span></em><span data-dcnode-id="7931" instrument_node="">-value</span></td></tr><tr data-dcnode-id="7913"><td data-dcnode-id="7924"><span data-dcnode-id="7928" instrument_node="">Perols [</span><a class="workspace-trigger" data-dcnode-id="7926" href="#bb0270" name="bbb0270"><span data-dcnode-id="7927" instrument_node="">54</span></a><span data-dcnode-id="7925" instrument_node="">]</span></td><td data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">51/15934</span></td><td data-dcnode-id="7920"><span data-dcnode-id="7921" instrument_node="">US</span></td><td data-dcnode-id="7918"><span data-dcnode-id="7919" instrument_node="">FIN</span></td><td data-dcnode-id="7916"><span data-dcnode-id="7917" instrument_node="">SVM(MC 0.0025), LR(0.0026), C4.5 (0.0028),bagging(0.0028), DNN(0.0030)</span></td><td data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">Fraud Probability and MC</span></td></tr><tr data-dcnode-id="7897"><td data-dcnode-id="7908"><span data-dcnode-id="7912" instrument_node="">Cecchini et al. [</span><a class="workspace-trigger" data-dcnode-id="7910" href="#bb0060" name="bbb0060"><span data-dcnode-id="7911" instrument_node="">12</span></a><span data-dcnode-id="7909" instrument_node="">]</span></td><td data-dcnode-id="7906"><span data-dcnode-id="7907" instrument_node="">61/61</span></td><td data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">US</span></td><td data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">LING</span></td><td data-dcnode-id="7900"><span data-dcnode-id="7901" instrument_node="">SVM (82.0)</span></td><td data-dcnode-id="7898"><span data-dcnode-id="7899" instrument_node="">AUC, TPR, FPR, FNR</span></td></tr><tr data-dcnode-id="7881"><td data-dcnode-id="7892"><span data-dcnode-id="7896" instrument_node="">Goel et al. [</span><a class="workspace-trigger" data-dcnode-id="7894" href="#bb0120" name="bbb0120"><span data-dcnode-id="7895" instrument_node="">24</span></a><span data-dcnode-id="7893" instrument_node="">]</span></td><td data-dcnode-id="7890"><span data-dcnode-id="7891" instrument_node="">126/622</span></td><td data-dcnode-id="7888"><span data-dcnode-id="7889" instrument_node="">US</span></td><td data-dcnode-id="7886"><span data-dcnode-id="7887" instrument_node="">LING+TXT (BOW)</span></td><td data-dcnode-id="7884"><span data-dcnode-id="7885" instrument_node="">SVM(89.5), NB(55.28%)</span></td><td data-dcnode-id="7882"><span data-dcnode-id="7883" instrument_node="">Acc, TPR, FPR, Precision, F-score</span></td></tr><tr data-dcnode-id="7865"><td data-dcnode-id="7876"><span data-dcnode-id="7880" instrument_node="">Lin et al. [</span><a class="workspace-trigger" data-dcnode-id="7878" href="#bb0210" name="bbb0210"><span data-dcnode-id="7879" instrument_node="">42</span></a><span data-dcnode-id="7877" instrument_node="">]</span></td><td data-dcnode-id="7874"><span data-dcnode-id="7875" instrument_node="">127/447</span></td><td data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">Taiwan</span></td><td data-dcnode-id="7870"><span data-dcnode-id="7871" instrument_node="">FIN</span></td><td data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">DNN (92.8), CART (90.3), LR (88.5)</span></td><td data-dcnode-id="7866"><span data-dcnode-id="7867" instrument_node="">Acc, FPR, FNR, MC</span></td></tr><tr data-dcnode-id="7849"><td data-dcnode-id="7860"><span data-dcnode-id="7864" instrument_node="">Ravisankar et al. [</span><a class="workspace-trigger" data-dcnode-id="7862" href="#bb0305" name="bbb0305"><span data-dcnode-id="7863" instrument_node="">61</span></a><span data-dcnode-id="7861" instrument_node="">]</span></td><td data-dcnode-id="7858"><span data-dcnode-id="7859" instrument_node="">101/101</span></td><td data-dcnode-id="7856"><span data-dcnode-id="7857" instrument_node="">China</span></td><td data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">FIN</span></td><td data-dcnode-id="7852"><span data-dcnode-id="7853" instrument_node="">PNN (98.1), GP (94.1), GMDH (93.0),DNN (78.8), SVM (73.4)</span></td><td data-dcnode-id="7850"><span data-dcnode-id="7851" instrument_node="">Acc, TPR, TNR, AUC</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="7843"></p><p data-dcnode-id="7844" id="sp0035"><span data-dcnode-id="7845" instrument_node="">FIN – financial data, LING – linguistic data (word category frequency counts, readability and complexity scores, etc.), TXT - text data, BOW–bag-of-words, POS – part of speech tags (nouns, verbs, adjectives), BBN – Bayesian belief network, NB-Naive Bayes, DTNB - NB with the induction of decision tables, CART–classification and regression tree, LMT - logistic model trees, MLP - multi-layer network, Bag-Bagging, AB - AdaboostM1, GMDH – group method data handling, GP–genetic programming, GLRT - generalized likelihood ratio test, LR–logistic regression, DNN – deep neural network, PNN – probabilistic neural network, RF – random forest, SVM – support vector machine, Acc - Accuracy, AUC – area under the ROC curve, MC - misclassification cost, TPR - true positive rate, TNR - true negative rate, FPR - false-positive rate, FNR - false-negative rate.</span></p><p></p></div></div><section data-dcnode-id="7725" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7835" id="st0035"><span data-dcnode-id="7840" instrument_node="">3.1</span><span data-dcnode-id="7838" instrument_node="">. </span><span data-dcnode-id="7836" instrument_node="">Text-based indicators</span></h3><p data-dcnode-id="7809" id="p0100"><span data-dcnode-id="7834" instrument_node="">Textual analysis is frequently employed for the examination of corporate disclosures. Linguistic features have been utilized in the analysis of corporate conference calls [</span><a class="workspace-trigger" data-dcnode-id="7832" href="#bb0190" name="bbb0190"><span data-dcnode-id="7833" instrument_node="">38</span></a><span data-dcnode-id="7831" instrument_node="">], earnings announcements [</span><a class="workspace-trigger" data-dcnode-id="7829" href="#bb0070" name="bbb0070"><span data-dcnode-id="7830" instrument_node="">14</span></a><span data-dcnode-id="7828" instrument_node="">], media reports [</span><a class="workspace-trigger" data-dcnode-id="7826" href="#bb0335" name="bbb0335"><span data-dcnode-id="7827" instrument_node="">67</span></a><span data-dcnode-id="7825" instrument_node="">] and annual reports [</span><a class="workspace-trigger" data-dcnode-id="7823" href="#bb0055" name="bbb0055"><span data-dcnode-id="7824" instrument_node="">11</span></a><span data-dcnode-id="7822" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7820" href="#bb0220" name="bbb0220"><span data-dcnode-id="7821" instrument_node="">44</span></a><span data-dcnode-id="7819" instrument_node="">]. Several studies have concentrated on the MD&amp;A section to examine the language used in annual reports [</span><a class="workspace-trigger" data-dcnode-id="7817" href="#bb0060" name="bbb0060"><span data-dcnode-id="7818" instrument_node="">12</span></a><span data-dcnode-id="7816" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7814" href="#bb0095" name="bbb0095"><span data-dcnode-id="7815" instrument_node="">19</span></a><span data-dcnode-id="7813" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7811" href="#bb0145" name="bbb0145"><span data-dcnode-id="7812" instrument_node="">29</span></a><span data-dcnode-id="7810" instrument_node="">]. The MD&amp;A is especially relevant as it offers investors the possibility of reviewing the performance of the company as well as its future potential from the perspective of management. This part also provides scope for the management's opinions on the primary threats to the business and necessary actions.</span></p><p data-dcnode-id="7795" id="p0105"><span data-dcnode-id="7808" instrument_node="">A positive factor that renders the textual information contained within annual reports conducive to the detection of fraud is that it is not subject to the same degree of regulation as financial information, thus providing the AE organization's management more opportunities when divulging textual data [</span><a class="workspace-trigger" data-dcnode-id="7806" href="#bb0145" name="bbb0145"><span data-dcnode-id="7807" instrument_node="">29</span></a><span data-dcnode-id="7805" instrument_node="">]. Given that MD&amp;A involves predictions, presumptions, and decisions, management might be tempted to manipulate the information in order to present the organization in a more favorable light [</span><a class="workspace-trigger" data-dcnode-id="7803" href="#bb5000" name="bbb5000"><span data-dcnode-id="7804" instrument_node="">79</span></a><span data-dcnode-id="7802" instrument_node="">]. In addition to manipulating data, management could purposely exclude important information thus leading to the same outcome. Examples for risk factors associated with financial statement fraud can be a poor financial performance, a pressure for management to meet the requirements or expectations of third parties such as investors, or a need to obtain financing or to minimize reported earnings for tax-motivated reasons. Breiman et al. [</span><a class="workspace-trigger" data-dcnode-id="7800" href="#bb0045" name="bbb0045"><span data-dcnode-id="7801" instrument_node="">9</span></a><span data-dcnode-id="7799" instrument_node="">] conducted analysis on infamous examples such as WorldCom and Enron, and determined that senior managers participated in, encouraged, approved, and had knowledge of the fraudulent activities in most cases. Social psychology research suggests that the emotions and cognitive processes of managers who intend to conceal the real situation could indicate specific linguistic cues that facilitate the identification of fraud [</span><a class="workspace-trigger" data-dcnode-id="7797" href="#bb0080" name="bbb0080"><span data-dcnode-id="7798" instrument_node="">16</span></a><span data-dcnode-id="7796" instrument_node="">]. Therefore, prior work has emphasized the increasing significance of textual analysis of financial documentation.</span></p><p data-dcnode-id="7769" id="p0110"><span data-dcnode-id="7794" instrument_node="">Studies that analyze the use of language within annual reports usually adopt one of two strategies [</span><a class="workspace-trigger" data-dcnode-id="7792" href="#bb0200" name="bbb0200"><span data-dcnode-id="7793" instrument_node="">40</span></a><span data-dcnode-id="7791" instrument_node="">]. The first strategy draws on research in linguistics and psychology and is dependent on pre-determined lists of words that have an association with a specific sentiment, like negativity, optimism, deceptiveness, or ambiguity. Loughran and Mcdonald [</span><a class="workspace-trigger" data-dcnode-id="7789" href="#bb0220" name="bbb0220"><span data-dcnode-id="7790" instrument_node="">44</span></a><span data-dcnode-id="7788" instrument_node="">] (L&amp;M) demonstrated that if these lists are adapted to the financial domain, it is possible to determine relationships among financial-negative, financial-uncertain, and financial-litigious word lists and 10-k filing returns, trading volume, return volatility, fraud, material weakness, and unexpected earnings. As it was developed for analyzing 10-K text, the L&amp;M sentiment word lists have been broadly employed in fraud-detection research [</span><a class="workspace-trigger" data-dcnode-id="7786" href="#bb0130" name="bbb0130"><span data-dcnode-id="7787" instrument_node="">26</span></a><span data-dcnode-id="7785" instrument_node="">]. Accordingly, the L&amp;M word lists enters this study as a benchmark to DL approaches for extracting features from the MD&amp;A section of 10-Ks. Other researchers based their approaches for detecting fraud on word lists that indicate positive, negative or neutral emotions [</span><a class="workspace-trigger" data-dcnode-id="7783" href="#bb0115" name="bbb0115"><span data-dcnode-id="7784" instrument_node="">23</span></a><span data-dcnode-id="7782" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7780" href="#bb0145" name="bbb0145"><span data-dcnode-id="7781" instrument_node="">29</span></a><span data-dcnode-id="7779" instrument_node="">] or more specifically anger, anxiety, and negativity according to the definitions supplied by the Linguistic Inquiry and Word Count dictionary [</span><a class="workspace-trigger" data-dcnode-id="7777" href="#bb0145" name="bbb0145"><span data-dcnode-id="7778" instrument_node="">29</span></a><span data-dcnode-id="7776" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7774" href="#bb0190" name="bbb0190"><span data-dcnode-id="7775" instrument_node="">38</span></a><span data-dcnode-id="7773" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7771" href="#bb0260" name="bbb0260"><span data-dcnode-id="7772" instrument_node="">52</span></a><span data-dcnode-id="7770" instrument_node="">].</span></p><p data-dcnode-id="7737" id="p0115"><span data-dcnode-id="7768" instrument_node="">The second strategy relies on ML to extract informative features for automatic differentiation between fraudulent and non-fraudulent texts. Li [</span><a class="workspace-trigger" data-dcnode-id="7766" href="#bb0200" name="bbb0200"><span data-dcnode-id="7767" instrument_node="">40</span></a><span data-dcnode-id="7765" instrument_node="">] contended that this method has various benefits compared with predetermined lists of words and cues, including the fact that no adaptation to the business context is required. ML algorithms have been used in the detection of financial statement fraud by several researchers, such as Cecchini et al. [</span><a class="workspace-trigger" data-dcnode-id="7763" href="#bb0060" name="bbb0060"><span data-dcnode-id="7764" instrument_node="">12</span></a><span data-dcnode-id="7762" instrument_node="">], Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="7760" href="#bb0130" name="bbb0130"><span data-dcnode-id="7761" instrument_node="">26</span></a><span data-dcnode-id="7759" instrument_node="">], Humpherys et al. [</span><a class="workspace-trigger" data-dcnode-id="7757" href="#bb0145" name="bbb0145"><span data-dcnode-id="7758" instrument_node="">29</span></a><span data-dcnode-id="7756" instrument_node="">], Goel and Uzuner [</span><a class="workspace-trigger" data-dcnode-id="7754" href="#bb0125" name="bbb0125"><span data-dcnode-id="7755" instrument_node="">25</span></a><span data-dcnode-id="7753" instrument_node="">], Goel et al. [</span><a class="workspace-trigger" data-dcnode-id="7751" href="#bb0120" name="bbb0120"><span data-dcnode-id="7752" instrument_node="">24</span></a><span data-dcnode-id="7750" instrument_node="">], Glancy and Yadav [</span><a class="workspace-trigger" data-dcnode-id="7748" href="#bb0110" name="bbb0110"><span data-dcnode-id="7749" instrument_node="">22</span></a><span data-dcnode-id="7747" instrument_node="">], and Purda and Skillicorn [</span><a class="workspace-trigger" data-dcnode-id="7745" href="#bb0290" name="bbb0290"><span data-dcnode-id="7746" instrument_node="">58</span></a><span data-dcnode-id="7744" instrument_node="">]. Some attempts to integrate different types of data have also been made. Purda and Skillicorn [</span><a class="workspace-trigger" data-dcnode-id="7742" href="#bb0290" name="bbb0290"><span data-dcnode-id="7743" instrument_node="">58</span></a><span data-dcnode-id="7741" instrument_node="">] compared a language-based method to detect fraud based on SVM to the financial measures proposed by Dechow et al. [</span><a class="workspace-trigger" data-dcnode-id="7739" href="#bb0075" name="bbb0075"><span data-dcnode-id="7740" instrument_node="">15</span></a><span data-dcnode-id="7738" instrument_node="">], and concluded that these approaches are complementary. The methods displayed low forecast correlation and identified specific types of fraud that the other could not detect. This finding motivates us to combine financial variables and linguistic variables to complement each other in the detection of statement fraud.</span></p><p data-dcnode-id="7726" id="p0120"><span data-dcnode-id="7736" instrument_node="">The study of Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="7734" href="#bb0130" name="bbb0130"><span data-dcnode-id="7735" instrument_node="">26</span></a><span data-dcnode-id="7733" instrument_node="">] is closest to this work as they combined financial ratios with linguistic variables from annual reports of US firms and employed a variety of classification models, as shown in </span><a class="workspace-trigger" data-dcnode-id="7731" href="#t0005" name="bt0005"><span data-dcnode-id="7732" instrument_node="">Table 1</span></a><span data-dcnode-id="7730" instrument_node="">. Despite these similarities, the study by Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="7728" href="#bb0130" name="bbb0130"><span data-dcnode-id="7729" instrument_node="">26</span></a><span data-dcnode-id="7727" instrument_node="">] was not targeted at evaluating the textual content of corporate annual reports. Hence, it did not include modern NLP approaches such as deep learning-based feature extraction.</span></p></section><section data-dcnode-id="7695" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7719" id="st0040"><span data-dcnode-id="7724" instrument_node="">3.2</span><span data-dcnode-id="7722" instrument_node="">. </span><span data-dcnode-id="7720" instrument_node="">Methods and evaluation metrics</span></h3><p data-dcnode-id="7696" id="p0125"><span data-dcnode-id="7718" instrument_node="">Prior work has tested a variety of statistical fraud detection models including ANNs, Decision Trees (DT), SVM, evolutionary algorithms, and text analysis [</span><a class="workspace-trigger" data-dcnode-id="7716" href="#bb0130" name="bbb0130"><span data-dcnode-id="7717" instrument_node="">26</span></a><span data-dcnode-id="7715" instrument_node="">]. The BOW technique was frequently adopted for the extraction of the linguistic properties of financial documentation. The BOW approach represents a document by a vector of word counts that appear in it. Consequently, the word frequency is used as the input for the ML algorithms. This method does not consider the grammar, context, and structure of sentences and could be overly simple in terms of uncovering the real sense of the text [</span><a class="workspace-trigger" data-dcnode-id="7713" href="#bb0190" name="bbb0190"><span data-dcnode-id="7714" instrument_node="">38</span></a><span data-dcnode-id="7712" instrument_node="">]. A different technique for analyzing text is DL. Deep ANN are able to extract high-level features from unstructured data automatically. Textual analysis models based on DL can “learn” the specific patterns that underpin the text, “understand” its meaning and subsequently output abstract aspects gleaned from the text. Hence, they resolve some of the problems associated with the BOW technique, including the extraction of contextual information from documents. Due to their capacity to deal with sequences with distinct lengths, ANN have shown excellent results in recent studies on text processing [</span><a class="workspace-trigger" data-dcnode-id="7710" href="#bb0380" name="bbb0380"><span data-dcnode-id="7711" instrument_node="">76</span></a><span data-dcnode-id="7709" instrument_node="">]. Despite their achievements in NLP, there has been limited focus on the application of state-of-the-art DL methods to the analysis of a financial text, with the notable exception of [</span><a class="workspace-trigger" data-dcnode-id="7707" href="#bb0180" name="bbb0180"><span data-dcnode-id="7708" instrument_node="">36</span></a><span data-dcnode-id="7706" instrument_node="">]. For an adoption in practice, DK models should not only be precise, but also interpretable [</span><a class="workspace-trigger" data-dcnode-id="7704" href="#bb0140" name="bbb0140"><span data-dcnode-id="7705" instrument_node="">28</span></a><span data-dcnode-id="7703" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7701" href="#bb0185" name="bbb0185"><span data-dcnode-id="7702" instrument_node="">37</span></a><span data-dcnode-id="7700" instrument_node="">]. However, the majority of systems designed to detect fraud reported by researchers aim to maximise the prediction accuracy, while disregarding how transparent they are [</span><a class="workspace-trigger" data-dcnode-id="7698" href="#bb0130" name="bbb0130"><span data-dcnode-id="7699" instrument_node="">26</span></a><span data-dcnode-id="7697" instrument_node="">]. This factor has particular significance as the development of interpretable models is critical for supporting the investigation procedure in auditing.</span></p></section></section><section data-dcnode-id="6064" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7688" id="st0045"><span data-dcnode-id="7693" instrument_node="">4</span><span data-dcnode-id="7691" instrument_node="">. </span><span data-dcnode-id="7689" instrument_node="">Methodology</span></h2><p data-dcnode-id="7683" id="p0130"><span data-dcnode-id="7687" instrument_node="">The objective of this study is to devise a fraud detection system that classifies annual reports. While financial and linguistic variables represent structured tabular data and require no extensive preprocessing, the unstructured text data has to be transformed into a numeric format, which preserves its informative content and facilitates algorithmic processing. To achieve the latter, words are embedded as numeric vectors. The field of NLP has proposed various ways to construct such vectors. We consider two methods for text representation: frequency-based BOW embeddings and prediction-based neural embeddings (word2vec). An advantage of the BOW approach, which has been used in prior work on financial statement fraud (see </span><a class="workspace-trigger" data-dcnode-id="7685" href="#t0005" name="bt0005"><span data-dcnode-id="7686" instrument_node="">Table 1</span></a><span data-dcnode-id="7684" instrument_node="">), is its simplicity. However, BOW represents a set of words without grammar and disrupts word order. Unlike BOW, the application of DL is still relatively new to the area of regtech (management of regulatory processes within the financial industry through technology). Therefore, the following subsections clarify neural word embeddings and address the DL components of the proposed HAN model.</span></p><section data-dcnode-id="7651" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7677" id="st0050"><span data-dcnode-id="7682" instrument_node="">4.1</span><span data-dcnode-id="7680" instrument_node="">. </span><span data-dcnode-id="7678" instrument_node="">Neural embeddings</span></h3><p data-dcnode-id="7666" id="p0135"><span data-dcnode-id="7676" instrument_node="">The BOW model represents every word as a feature. The amount of features denotes the dimension of the document vector [</span><a class="workspace-trigger" data-dcnode-id="7674" href="#bb0230" name="bbb0230"><span data-dcnode-id="7675" instrument_node="">46</span></a><span data-dcnode-id="7673" instrument_node="">]. Since the amount of unique words within a document typically only represents a small proportion of the overall amount of unique words within the whole corpus, BOW document vectors are very sparse. A more advanced model for creating lower dimensional, dense embeddings of words is word2vec. As opposed to BOW, word2vec embeddings enable words that have similar meanings to be given similar vector representations and capture the syntactic and semantic similarities. Word2vec [</span><a class="workspace-trigger" data-dcnode-id="7671" href="#bb5010" name="bbb5010"><span data-dcnode-id="7672" instrument_node="">80</span></a><span data-dcnode-id="7670" instrument_node="">] is an example of a NN model that is capable of learning word representations from a large corpus. Every word within the corpus is mapped to a vector of 50 to 300 dimensions. Mikolov et al. [</span><a class="workspace-trigger" data-dcnode-id="7668" href="#bb5010" name="bbb5010"><span data-dcnode-id="7669" instrument_node="">80</span></a><span data-dcnode-id="7667" instrument_node="">] demonstrated that such vectors offer advanced capabilities to measure the semantic and syntactic similarities between words. The generated word embeddings are a suitable input for text mining algorithms based on DL, as will be observed in the next part. They constitute the first layer of the model and allow further processing of text input within the DL architecture.</span></p><p data-dcnode-id="7652" id="p0140"><span data-dcnode-id="7665" instrument_node="">The initial word2vec algorithm is followed by GloVe [</span><a class="workspace-trigger" data-dcnode-id="7663" href="#bb0265" name="bbb0265"><span data-dcnode-id="7664" instrument_node="">53</span></a><span data-dcnode-id="7662" instrument_node="">], FastText [</span><a class="workspace-trigger" data-dcnode-id="7660" href="#bb5030" name="bbb5030"><span data-dcnode-id="7661" instrument_node="">82</span></a><span data-dcnode-id="7659" instrument_node="">], and GPT-2 [</span><a class="workspace-trigger" data-dcnode-id="7657" href="#bb0295" name="bbb0295"><span data-dcnode-id="7658" instrument_node="">59</span></a><span data-dcnode-id="7656" instrument_node="">], as well as the appearance of publicly available sets of pre-trained embeddings that are acquired by applying the above-mentioned algorithms on large text corpora. Pre-trained word embeddings accelerate training DL models and were successfully used in numerous NLP tasks. We apply several types of pre-trained embeddings for HAN model and a neural network with a bidirectional Gated Recurrent Unit (GRU) layer that serves as a benchmark from the field of DL. As a result of a performance-based selection, the HAN model is built with word2vec embeddings with 300 neurons, trained on the Google News corpus, with a vocabulary size of 3 million words. The DL benchmark is used with the GPT-2 pre-trained embeddings from the WebText, offered by Radford et al. [</span><a class="workspace-trigger" data-dcnode-id="7654" href="#bb0295" name="bbb0295"><span data-dcnode-id="7655" instrument_node="">59</span></a><span data-dcnode-id="7653" instrument_node="">], as they arguable constitute the current state-of-the-art language model. The DL benchmark model is thus referred to as GPT-2 and is used together with the attention mechanism, discussed further.</span></p></section><section data-dcnode-id="7616" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7645" id="st0055"><span data-dcnode-id="7650" instrument_node="">4.2</span><span data-dcnode-id="7648" instrument_node="">. </span><span data-dcnode-id="7646" instrument_node="">Deep learning</span></h3><p data-dcnode-id="7640" id="p0145"><span data-dcnode-id="7644" instrument_node="">After representing unstructured textual data in a numerical format, it can be used for predictive modeling. Conventional methods for classifying text involve the representation of sparse lexical features, like TF-IDF, and subsequently utilize a linear model or kernel techniques upon this representation [</span><a class="workspace-trigger" data-dcnode-id="7642" href="#bb0150" name="bbb0150"><span data-dcnode-id="7643" instrument_node="">30</span></a><span data-dcnode-id="7641" instrument_node="">].</span></p><p data-dcnode-id="7617" id="p0150"><span data-dcnode-id="7639" instrument_node="">Recently, DL has incorporated new techniques, including Convolutional Neural Networks (CNN) [</span><a class="workspace-trigger" data-dcnode-id="7637" href="#bb0160" name="bbb0160"><span data-dcnode-id="7638" instrument_node="">32</span></a><span data-dcnode-id="7636" instrument_node="">] and Recurrent Neural Networks (RNN) [</span><a class="workspace-trigger" data-dcnode-id="7634" href="#bb0135" name="bbb0135"><span data-dcnode-id="7635" instrument_node="">27</span></a><span data-dcnode-id="7633" instrument_node="">] for learning textual representations [</span><a class="workspace-trigger" data-dcnode-id="7631" href="#bb0365" name="bbb0365"><span data-dcnode-id="7632" instrument_node="">73</span></a><span data-dcnode-id="7630" instrument_node="">]. The RNN architecture allows retaining the input sequence, which made it widely used for natural language understanding, language generation, and video processing [</span><a class="workspace-trigger" data-dcnode-id="7628" href="#bb0155" name="bbb0155"><span data-dcnode-id="7629" instrument_node="">31</span></a><span data-dcnode-id="7627" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7625" href="#bb0235" name="bbb0235"><span data-dcnode-id="7626" instrument_node="">47</span></a><span data-dcnode-id="7624" instrument_node="">]. An LSTM is a special type of RNN, comprised of various gates determining whether the information is kept, forgotten or updated and enabling long-term dependencies to be learned by the model [</span><a class="workspace-trigger" data-dcnode-id="7622" href="#bb0135" name="bbb0135"><span data-dcnode-id="7623" instrument_node="">27</span></a><span data-dcnode-id="7621" instrument_node="">]. An LSTM retains or modifies previous information on a selective basis and stores important information in a separate cell, which acts as a memory [</span><a class="workspace-trigger" data-dcnode-id="7619" href="#bb5015" name="bbb5015"><span data-dcnode-id="7620" instrument_node="">81</span></a><span data-dcnode-id="7618" instrument_node="">]. Consequently, overwriting of important information by the new inputs does not occur, it can persist for extended periods.</span></p></section><section data-dcnode-id="6318" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7610" id="st0060"><span data-dcnode-id="7615" instrument_node="">4.3</span><span data-dcnode-id="7613" instrument_node="">. </span><span data-dcnode-id="7611" instrument_node="">Hierarchical attention network</span></h3><div data-dcnode-id="7567"><p data-dcnode-id="7596" id="p0155"><span data-dcnode-id="7609" instrument_node="">More advanced DL approaches also address hierarchical patterns of language such as the hierarchy between words, sentences, and documents. Some methods have covered the hierarchical construction of documents [</span><a class="workspace-trigger" data-dcnode-id="7607" href="#bb0300" name="bbb0300"><span data-dcnode-id="7608" instrument_node="">60</span></a><span data-dcnode-id="7606" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7604" href="#bb0370" name="bbb0370"><span data-dcnode-id="7605" instrument_node="">74</span></a><span data-dcnode-id="7603" instrument_node="">]. The specific contexts of words and sentences, whereby the meaning of a word or sentence could change depending on the document, is a comparatively new concept for the process of text classification, and the HAN was developed to address this issue [</span><a class="workspace-trigger" data-dcnode-id="7601" href="#bb0360" name="bbb0360"><span data-dcnode-id="7602" instrument_node="">72</span></a><span data-dcnode-id="7600" instrument_node="">]. When computing the document encoding, HAN firstly detects the words that have importance within a sentence, and subsequently, those sentences that have importance within a document while considering the context (see </span><a class="workspace-trigger" data-dcnode-id="7598" href="#f0005" name="bf0005"><span data-dcnode-id="7599" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7597" instrument_node="">). The model recognizes the fact that an occurrence of a word may be significant when found in a particular sentence, whereas another occurrence of that word may not be important in another sentence (context).</span></p><figure class="figure text-xs" data-dcnode-id="7568" id="f0005"><span data-dcnode-id="7580"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="7595" height="437" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr1.jpg&amp;raw"><span data-dcnode-id="7594" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7581"><li data-dcnode-id="7588"><a class="anchor download-link u-font-sans" data-dcnode-id="7589" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr1_lrg.jpg" target="_blank" title="Download high-res image (126KB)"><span class="anchor-text" data-dcnode-id="7590"><span data-dcnode-id="7593" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">Download high-res image (126KB)</span></span></span></a></li><li data-dcnode-id="7582"><a class="anchor download-link u-font-sans" data-dcnode-id="7583" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7584"><span data-dcnode-id="7587" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7585"><span data-dcnode-id="7586" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7569"><span data-dcnode-id="7570" id="ca0005"><p data-dcnode-id="7571" id="sp0005"><span class="label" data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">Fig. 1</span></span><span data-dcnode-id="7577" instrument_node="">. </span><span data-dcnode-id="7575" instrument_node="">HAN Architecture. Image based on Yang et al. [</span><a class="workspace-trigger" data-dcnode-id="7573" href="#bb0360" name="bbb0360"><span data-dcnode-id="7574" instrument_node="">72</span></a><span data-dcnode-id="7572" instrument_node="">].</span></p></span></span></figure></div><p data-dcnode-id="7565" id="p0160"><span data-dcnode-id="7566" instrument_node="">The HAN builds a document representation via the initial construction of sentence vectors based on words followed by the aggregation of these sentence vectors into a document representation through the application of the attention mechanism. The model consists of an encoder that generates relevant contexts and an attention mechanism, which calculates importance weights. The same algorithms are consecutively implemented at the word level and then at the sentence level.</span></p><section data-dcnode-id="7510" id="s0050"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7559" id="st0065"><span data-dcnode-id="7564" instrument_node="">4.3.1</span><span data-dcnode-id="7562" instrument_node="">. </span><span data-dcnode-id="7560" instrument_node="">Word level</span></h4><p data-dcnode-id="7511" id="p0165"><span data-dcnode-id="7558" instrument_node="">The input is transformed into structured tokens </span><em data-dcnode-id="7556"><span data-dcnode-id="7557" instrument_node="">w</span></em><sub data-dcnode-id="7553"><em data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">it</span></em></sub><span data-dcnode-id="7552" instrument_node=""> that denote word </span><em data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">i</span></em><span data-dcnode-id="7549" instrument_node=""> in sentence </span><em data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">t</span></em><span data-dcnode-id="7546" instrument_node="">&nbsp;∈&nbsp;[1,</span><span data-dcnode-id="7544" instrument_node="">&nbsp;</span><em data-dcnode-id="7542"><span data-dcnode-id="7543" instrument_node="">T</span></em><span data-dcnode-id="7541" instrument_node="">]. Tokens are further passed through a pre-trained embedding matrix </span><em data-dcnode-id="7539"><span data-dcnode-id="7540" instrument_node="">W</span></em><sub data-dcnode-id="7536"><em data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">e</span></em></sub><span data-dcnode-id="7535" instrument_node=""> that allocates multidimensional vectors </span><em data-dcnode-id="7533"><span data-dcnode-id="7534" instrument_node="">x</span></em><sub data-dcnode-id="7530"><em data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">it</span></em></sub><span data-dcnode-id="7529" instrument_node="">&nbsp;=&nbsp;</span><em data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">W</span></em><sub data-dcnode-id="7524"><em data-dcnode-id="7525"><span data-dcnode-id="7526" instrument_node="">e</span></em></sub><em data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">w</span></em><sub data-dcnode-id="7519"><em data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">it</span></em></sub><span data-dcnode-id="7518" instrument_node=""> to every token. As a result, words are denoted in numerical format by </span><em data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">x</span></em><sub data-dcnode-id="7513"><em data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">it</span></em></sub><span data-dcnode-id="7512" instrument_node=""> as a projection of the word in a continuous vector space.</span></p></section><section data-dcnode-id="7486" id="s0055"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7504" id="st0070"><span data-dcnode-id="7509" instrument_node="">4.3.2</span><span data-dcnode-id="7507" instrument_node="">. </span><span data-dcnode-id="7505" instrument_node="">Word encoder</span></h4><p data-dcnode-id="7487" id="p0170"><span data-dcnode-id="7503" instrument_node="">The vectorized tokens represent the inputs for the following layer. While Yang et al. [</span><a class="workspace-trigger" data-dcnode-id="7501" href="#bb0360" name="bbb0360"><span data-dcnode-id="7502" instrument_node="">72</span></a><span data-dcnode-id="7500" instrument_node="">] employed GRU for encoding, we use LSTM as it showed better performance on the large text sequences at hand [</span><a class="workspace-trigger" data-dcnode-id="7498" href="#bb0065" name="bbb0065"><span data-dcnode-id="7499" instrument_node="">13</span></a><span data-dcnode-id="7497" instrument_node="">]. In the context of the current model, a bidirectional LSTM is implemented to obtain the annotations of words. The model consists of two uni-directional LSTMs, whose parameters are different apart from the word embedding matrix. Processing of the sentences in the initial forward LSTM occurs in a left to the right manner, whereas in the backward LSTM, sentences are processed from right to left. The pair of sentence embeddings are concatenated at every time step </span><em data-dcnode-id="7495"><span data-dcnode-id="7496" instrument_node="">t</span></em><span data-dcnode-id="7494" instrument_node=""> to acquire the internal representation of the bi-directional LSTM </span><em data-dcnode-id="7492"><span data-dcnode-id="7493" instrument_node="">h</span></em><sub data-dcnode-id="7489"><em data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">it</span></em></sub><span data-dcnode-id="7488" instrument_node="">.</span></p></section><section data-dcnode-id="7126" id="s0060"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7480" id="st0075"><span data-dcnode-id="7485" instrument_node="">4.3.3</span><span data-dcnode-id="7483" instrument_node="">. </span><span data-dcnode-id="7481" instrument_node="">Word attention</span></h4><p data-dcnode-id="7127" id="p0175"><span data-dcnode-id="7479" instrument_node="">The annotations </span><em data-dcnode-id="7477"><span data-dcnode-id="7478" instrument_node="">h</span></em><sub data-dcnode-id="7474"><em data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">it</span></em></sub><span data-dcnode-id="7473" instrument_node=""> construct the input for the attention mechanism that learns enhanced annotations denoted by </span><em data-dcnode-id="7471"><span data-dcnode-id="7472" instrument_node="">u</span></em><sub data-dcnode-id="7468"><em data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">it</span></em></sub><span data-dcnode-id="7467" instrument_node="">. Additionally, the </span><em data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">tanh</span></em><span data-dcnode-id="7464" instrument_node=""> function adjusts the input values so that they fall in the range of −1 to 1 and maps zero to near-zero. The newly generated annotations are then multiplied again with a trainable context vector </span><em data-dcnode-id="7462"><span data-dcnode-id="7463" instrument_node="">u</span></em><sub data-dcnode-id="7459"><em data-dcnode-id="7460"><span data-dcnode-id="7461" instrument_node="">w</span></em></sub><span data-dcnode-id="7458" instrument_node=""> and subsequently normalized to an importance weight per word </span><em data-dcnode-id="7456"><span data-dcnode-id="7457" instrument_node="">α</span></em><sub data-dcnode-id="7453"><em data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">it</span></em></sub><span data-dcnode-id="7452" instrument_node=""> via a softmax function. As part of the training procedure, the word context vector </span><em data-dcnode-id="7450"><span data-dcnode-id="7451" instrument_node="">u</span></em><sub data-dcnode-id="7447"><em data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">w</span></em></sub><span data-dcnode-id="7446" instrument_node=""> is initialized randomly and concurrently learned. The total of these importance weights concatenated with the already computed context annotations is defined as the sentence vector </span><em data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">s</span></em><sub data-dcnode-id="7441"><em data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">i</span></em></sub><span data-dcnode-id="7440" instrument_node="">:</span><span class="display" data-dcnode-id="7346"><span class="formula" data-dcnode-id="7347" id="fo0005"><span class="label" data-dcnode-id="7438"><span data-dcnode-id="7439" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="7348"><span class="MathJax_Preview" data-dcnode-id="7437" style=""></span><span class="MathJax_SVG" data-dcnode-id="7351" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>u</mi><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>it</mi></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>=</mo><mo mathvariant=&quot;italic&quot; is=&quot;true&quot;>tanh</mo><mfenced close=&quot;)&quot; open=&quot;(&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>W</mi><mi is=&quot;true&quot ><g data-dcnode-id="6388" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6389" is="true"><g data-dcnode-id="6392" is="true" transform="translate(1,0)"><use data-dcnode-id="6393" href="#MJMATHI-79"><path d="M21 287Q21 301 36 335T84 406T158 442Q199 442 224 419T250 355Q248 336 247 334Q247 331 231 288T198 191T182 105Q182 62 196 45T238 27Q261 27 281 38T312 61T339 94Q339 95 344 114T358 173T377 247Q415 397 419 404Q432 431 462 431Q475 431 483 424T494 412T496 403Q496 390 447 193T391 -23Q363 -106 294 -155T156 -205Q111 -205 77 -183T43 -117Q43 -95 50 -80T69 -58T89 -48T106 -45Q150 -45 150 -87Q150 -107 138 -122T115 -142T102 -147L99 -148Q101 -153 118 -160T152 -167H160Q177 -167 186 -165Q219 -156 247 -127T290 -65T313 -9T321 21L315 17Q309 13 296 6T270 -6Q250 -11 231 -11Q185 -11 150 11T104 82Q103 89 103 113Q103 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Z" data-dcnode-id="6394" id="MJMATHI-79" stroke-width="1"></path></use></g><use data-dcnode-id="6390" href="#MJMAIN-2C6" is="true" x="60" y="-7"><path d="M112 560L249 694L257 686Q387 562 387 560L361 531Q359 532 303 581L250 627L195 580Q182 569 169 557T148 538L140 532Q138 530 125 546L112 560Z" data-dcnode-id="6391" id="MJMAIN-2C6" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="6380" role="presentation"><math data-dcnode-id="6381" xmlns="http://www.w3.org/1998/Math/MathML"><mover accent="true" data-dcnode-id="6382" is="true"><mi data-dcnode-id="6385" is="true"><span data-dcnode-id="6386" instrument_node="">y</span></mi><mo data-dcnode-id="6383" is="true" stretchy="true"><span data-dcnode-id="6384" instrument_node="">̂</span></mo></mover></math></span></span></span><span data-dcnode-id="6375" instrument_node=""> denotes a </span><em data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">K</span></em><span data-dcnode-id="6372" instrument_node=""> dimensional vector and the components </span><em data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">y</span></em><sub data-dcnode-id="6367"><em data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">k</span></em></sub><span data-dcnode-id="6366" instrument_node=""> model the probability that document </span><em data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">d</span></em><span data-dcnode-id="6363" instrument_node=""> is a member of class </span><em data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">k</span></em><span data-dcnode-id="6360" instrument_node=""> in the set 1, …, </span><em data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">K</span></em><span data-dcnode-id="6357" instrument_node="">.</span></p><div data-dcnode-id="6322"><p data-dcnode-id="6348" id="p0190"><span data-dcnode-id="6355" instrument_node="">The application of the HAN follows the application of Kränkel and Lee [</span><a class="workspace-trigger" data-dcnode-id="6353" href="#bb0175" name="bbb0175"><span data-dcnode-id="6354" instrument_node="">35</span></a><span data-dcnode-id="6352" instrument_node="">]. Training of the DL model is performed on the training data set using both textual and quantitative features. Hence, the textual data acquired in the previous section is concatenated with the financial ratios. The model is employed to predict fraud probabilities of annual statements in the corresponding validation and test partitions, which were constructed with random sampling with stratification. </span><a class="workspace-trigger" data-dcnode-id="6350" href="#f0010" name="bf0010"><span data-dcnode-id="6351" instrument_node="">Fig. 2</span></a><span data-dcnode-id="6349" instrument_node=""> shows the architecture of the HAN based fraud detection model and the output dimensions of each layer.</span></p><figure class="figure text-xs" data-dcnode-id="6323" id="f0010"><span data-dcnode-id="6332"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="6347" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr2.jpg&amp;raw"><span data-dcnode-id="6346" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6333"><li data-dcnode-id="6340"><a class="anchor download-link u-font-sans" data-dcnode-id="6341" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr2_lrg.jpg" target="_blank" title="Download high-res image (88KB)"><span class="anchor-text" data-dcnode-id="6342"><span data-dcnode-id="6345" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">Download high-res image (88KB)</span></span></span></a></li><li data-dcnode-id="6334"><a class="anchor download-link u-font-sans" data-dcnode-id="6335" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6336"><span data-dcnode-id="6339" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6324"><span data-dcnode-id="6325" id="ca0010"><p data-dcnode-id="6326" id="sp0010"><span class="label" data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">Fig. 2</span></span><span data-dcnode-id="6329" instrument_node="">. </span><span data-dcnode-id="6327" instrument_node="">Architecture of the HAN based Fraud Detection Model.</span></p></span></span></figure></div><p data-dcnode-id="6320" id="p0195"><span data-dcnode-id="6321" instrument_node="">The LSTM layer consists of 150 neurons, a HAN dense dimension of 200, and a last dense layer dimension of 6. In this case, a combination of forward and backward LSTMs gives 300 dimensions for word and sentence annotation. The last layer of the HAN involves the application of dropout regularization to prevent over-fitting. In a final step, the resulting document-representation of dimension 200 is concatenated with 47 financial ratios and inputted to a dense layer before running through a softmax function that outputs the fraud probabilities. For training, a batch size of 32 and 17 epochs was used after hyperparameter tuning on the train validation set.</span></p></section></section><section data-dcnode-id="6065" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6312" id="st0090"><span data-dcnode-id="6317" instrument_node="">4.4</span><span data-dcnode-id="6315" instrument_node="">. </span><span data-dcnode-id="6313" instrument_node="">Evaluation metrics</span></h3><p data-dcnode-id="6310" id="p0200"><span data-dcnode-id="6311" instrument_node="">Financial statement fraud detection is approached as a binary classification problem with four possible outcomes: True positive (TP) denotes the correct classification of a fraud case, false negative (FN) denotes the incorrect classification of a fraud case as non-fraud, true negative (TN) denotes the correct classification of a non-fraud case, and false positive (FP) denotes the incorrect classification of a non-fraud case as fraud.</span></p><p data-dcnode-id="6305" id="p0205"><span data-dcnode-id="6309" instrument_node="">To estimate predictive performance, many previous studies considered a combination of measures such as accuracy, sensitivity (also called TP rate or recall), specificity (also called TN rate), precision, and F1-score [</span><a class="workspace-trigger" data-dcnode-id="6307" href="#bb0355" name="bbb0355"><span data-dcnode-id="6308" instrument_node="">71</span></a><span data-dcnode-id="6306" instrument_node="">]. In this study, model performance is evaluated by the AUC, sensitivity, specificity, F1-score, F2-score, and accuracy.</span></p><p data-dcnode-id="6085" id="p0210"><span data-dcnode-id="6304" instrument_node="">The F-score is a combination of precision (correct classification of fraud cases as a percentage of all instances classified as fraudulent) and sensitivity (indicates how many fraudulent instances the classifier misses). It measures how precise and how robust the models classify fraudulent cases:</span><span class="display" data-dcnode-id="6086"><span class="formula" data-dcnode-id="6087" id="fo0055"><span class="label" data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">(11)</span></span><span class="math" data-dcnode-id="6088"><span class="MathJax_Preview" data-dcnode-id="6301" style=""></span><span class="MathJax_SVG" data-dcnode-id="6091" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>F</mi><mi is=&quot;true&quot;>&amp;#x3B2;</mi></msub><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>&amp;#x2212;</mo><mtext is=&quot;true&quot;>score</mtext><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>=</mo><mfenced close=&quot;)&quot; open=&quot;(&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>1</mn><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>+</mo><msup is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>2</mn></msup></mrow></mfenced><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>&amp;#xD7;</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>precision</mtext><mo is=&quot;true&quot;>&amp;#xD7;</mo><mtext is=&quot;true&quot;>sensitivity</mtext></mrow><mrow is=&quot;true&quot;><mfenced close=&quot;)&quot; open=&quot;(&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><msup is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>2</mn></msup><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>&amp;#xD7;</mo><mtext is=&quot;true&quot;>precision</mtext></mrow></mfenced><mo is=&quot;true&quot;>+</mo><mtext is=&quot;true&quot;>sensitivity</mtext></mrow></mfrac></math>" id="MathJax-Element-13-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6142" focusable="false" height="4.672ex" role="img" style="vertical-align: -2.091ex;" viewBox="0 -1111.4 18765.3 2011.5" width="43.584ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6143" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6294" is="true"><g data-dcnode-id="6298" is="true"><use data-dcnode-id="6299" href="#MJMATHI-46"><path d="M48 1Q31 1 31 11Q31 13 34 25Q38 41 42 43T65 46Q92 46 125 49Q139 52 144 61Q146 66 215 342T285 622Q285 629 281 629Q273 632 228 634H197Q191 640 191 642T193 659Q197 676 203 680H742Q749 676 749 669Q749 664 736 557T722 447Q720 440 702 440H690Q683 445 683 453Q683 454 686 477T689 530Q689 560 682 579T663 610T626 626T575 633T503 634H480Q398 633 393 631Q388 629 386 623Q385 622 352 492L320 363H375Q378 363 398 363T426 364T448 367T472 374T489 386Q502 398 511 419T524 457T529 475Q532 480 548 480H560Q567 475 567 470Q567 467 536 339T502 207Q500 200 482 200H470Q463 206 463 212Q463 215 468 234T473 274Q473 303 453 310T364 317H309L277 190Q245 66 245 60Q245 46 334 46H359Q365 40 365 39T363 19Q359 6 353 0H336Q295 2 185 2Q120 2 86 2T48 1Z" data-dcnode-id="6300" id="MJMATHI-46" stroke-width="1"></path></use></g><g data-dcnode-id="6295" is="true" transform="translate(643,-155)"><use data-dcnode-id="6296" href="#MJMATHI-3B2" transform="scale(0.707)"><path d="M29 -194Q23 -188 23 -186Q23 -183 102 134T186 465Q208 533 243 584T309 658Q365 705 429 705H431Q493 705 533 667T573 570Q573 465 469 396L482 383Q533 332 533 252Q533 139 448 65
