rue" linebreak="goodbreak"><span data-dcnode-id="6132" instrument_node="">=</span></mo><mfenced close=")" data-dcnode-id="6120" is="true" open="("><mrow data-dcnode-id="6121" is="true"><mn data-dcnode-id="6129" is="true"><span data-dcnode-id="6130" instrument_node="">1</span></mn><mo data-dcnode-id="6127" is="true" linebreak="badbreak"><span data-dcnode-id="6128" instrument_node="">+</span></mo><msup data-dcnode-id="6122" is="true"><mi data-dcnode-id="6125" is="true"><span data-dcnode-id="6126" instrument_node="">β</span></mi><mn data-dcnode-id="6123" is="true"><span data-dcnode-id="6124" instrument_node="">2</span></mn></msup></mrow></mfenced><mo data-dcnode-id="6118" is="true" linebreak="badbreak"><span data-dcnode-id="6119" instrument_node="">×</span></mo><mfrac data-dcnode-id="6094" is="true"><mrow data-dcnode-id="6111" is="true"><mtext data-dcnode-id="6116" is="true"><span data-dcnode-id="6117" instrument_node="">precision</span></mtext><mo data-dcnode-id="6114" is="true"><span data-dcnode-id="6115" instrument_node="">×</span></mo><mtext data-dcnode-id="6112" is="true"><span data-dcnode-id="6113" instrument_node="">sensitivity</span></mtext></mrow><mrow data-dcnode-id="6095" is="true"><mfenced close=")" data-dcnode-id="6100" is="true" open="("><mrow data-dcnode-id="6101" is="true"><msup data-dcnode-id="6106" is="true"><mi data-dcnode-id="6109" is="true"><span data-dcnode-id="6110" instrument_node="">β</span></mi><mn data-dcnode-id="6107" is="true"><span data-dcnode-id="6108" instrument_node="">2</span></mn></msup><mo data-dcnode-id="6104" is="true" linebreak="badbreak"><span data-dcnode-id="6105" instrument_node="">×</span></mo><mtext data-dcnode-id="6102" is="true"><span data-dcnode-id="6103" instrument_node="">precision</span></mtext></mrow></mfenced><mo data-dcnode-id="6098" is="true"><span data-dcnode-id="6099" instrument_node="">+</span></mo><mtext data-dcnode-id="6096" is="true"><span data-dcnode-id="6097" instrument_node="">sensitivity</span></mtext></mrow></mfrac></math></span></span></span></span></span></p><p data-dcnode-id="6068" id="p0215"><span data-dcnode-id="6084" instrument_node="">Prior research emphasized that a higher sensitivity is preferred to higher specificity in financial statement fraud detection. Nevertheless, the majority of models have exhibited higher performance in detecting truthful transactions in comparison to those that are fraudulent [</span><a class="workspace-trigger" data-dcnode-id="6082" href="#bb0305" name="bbb0305"><span data-dcnode-id="6083" instrument_node="">61</span></a><span data-dcnode-id="6081" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6079" href="#bb0355" name="bbb0355"><span data-dcnode-id="6080" instrument_node="">71</span></a><span data-dcnode-id="6078" instrument_node="">]. An explanation for this preference is that FN rate (type II error) and FP rate (type I error) result in different misclassification costs (MC). Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="6076" href="#bb0130" name="bbb0130"><span data-dcnode-id="6077" instrument_node="">26</span></a><span data-dcnode-id="6075" instrument_node="">] estimated the cost of failing to detect fraudulent statements (type II error) to be twice as high as the cost of incorrectly classifying fraudulent statements (type I error). Hence, effective models should concentrate on high sensitivity and classify correctly as many positive samples as possible, rather than maximizing the number of correct classifications. To that end, this study employs the F2-score in addition to the F1-score (harmonic mean of precision and sensitivity), as it weights sensitivity higher than precision and is, therefore, more suitable for fraud detection. The AUC captures the ability of a model to rank fraud and non-fraud cases in the right order. The higher the AUC, the better the model can distinguish between fraud and non-fraud cases. Being robust toward imbalanced class distributions, the AUC is preferred to accuracy in fraud detection [</span><a class="workspace-trigger" data-dcnode-id="6073" href="#bb0290" name="bbb0290"><span data-dcnode-id="6074" instrument_node="">58</span></a><span data-dcnode-id="6072" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6070" href="#bb0340" name="bbb0340"><span data-dcnode-id="6071" instrument_node="">68</span></a><span data-dcnode-id="6069" instrument_node="">] and also used in this study.</span></p><p data-dcnode-id="6066" id="p0220"><span data-dcnode-id="6067" instrument_node="">Calculating F1- and F2-scores requires a cutoff to threshold model-based fraud probabilities. We select the threshold that maximizes the difference between sensitivity and FP rate and use it to evaluate the classification results. For the HAN model, the optimal threshold is set at 0.03, implying that a statement is classified as fraudulent if its fraud probability is higher than 3%.</span></p></section></section><section data-dcnode-id="5879" id="s0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6058" id="st0095"><span data-dcnode-id="6063" instrument_node="">5</span><span data-dcnode-id="6061" instrument_node="">. </span><span data-dcnode-id="6059" instrument_node="">Data</span></h2><p data-dcnode-id="6040" id="p0225"><span data-dcnode-id="6057" instrument_node="">Fraud detection is a challenging task because of the low number of known fraud cases. A severe imbalance between the positive and the negative class impedes classification. For example, the proportion of statements that were fraudulent and non-fraudulent in the annual reports submitted to the SEC for the period from 1999 to 2019 was 1:250. In past research, the number of firms that committed fraud contained in the data varied between 12 and 788 [</span><a class="workspace-trigger" data-dcnode-id="6055" href="#bb0170" name="bbb0170"><span data-dcnode-id="6056" instrument_node="">34</span></a><span data-dcnode-id="6054" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6052" href="#bb0340" name="bbb0340"><span data-dcnode-id="6053" instrument_node="">68</span></a><span data-dcnode-id="6051" instrument_node="">]. The data used here consists of 208 fraudulent and 7341 non-fraud cases, making it the largest data set with a textual component so far (c.f., </span><a class="workspace-trigger" data-dcnode-id="6049" href="#t0005" name="bt0005"><span data-dcnode-id="6050" instrument_node="">Table 1</span></a><span data-dcnode-id="6048" instrument_node="">). The data set consists of US companies' annual financial reports (10-K filings) that are publicly available through the EDGAR database of the SEC's website</span><a class="workspace-trigger" data-dcnode-id="6045" href="#fn0005" name="bfn0005"><sup data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">1</span></sup></a><span data-dcnode-id="6044" instrument_node=""> and quantitative financial data, sourced from the Compustat database.</span><a class="workspace-trigger" data-dcnode-id="6041" href="#fn0010" name="bfn0010"><sup data-dcnode-id="6042"><span data-dcnode-id="6043" instrument_node="">2</span></sup></a></p><section data-dcnode-id="5994" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6034" id="st0100"><span data-dcnode-id="6039" instrument_node="">5.1</span><span data-dcnode-id="6037" instrument_node="">. </span><span data-dcnode-id="6035" instrument_node="">Labeling</span></h3><p data-dcnode-id="5995" id="p0230"><span data-dcnode-id="6033" instrument_node="">Companies submit yearly reports that undergo an audit. Labeling these reports requires several filtering decisions: when can a report be considered fraudulent and what type of fraud should we consider? To address the first question, we follow [</span><a class="workspace-trigger" data-dcnode-id="6031" href="#bb0130" name="bbb0130"><span data-dcnode-id="6032" instrument_node="">26</span></a><span data-dcnode-id="6030" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6028" href="#bb0145" name="bbb0145"><span data-dcnode-id="6029" instrument_node="">29</span></a><span data-dcnode-id="6027" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6025" href="#bb0290" name="bbb0290"><span data-dcnode-id="6026" instrument_node="">58</span></a><span data-dcnode-id="6024" instrument_node="">] and consider a report as “fraudulent” if the company that filed it was convicted. The SEC publishes statements called “Accounting and Auditing Enforcement Releases” (AAER) that describe financial reporting related enforcement actions taken against companies that violated the reporting rules.</span><a class="workspace-trigger" data-dcnode-id="6021" href="#fn0015" name="bfn0015"><sup data-dcnode-id="6022"><span data-dcnode-id="6023" instrument_node="">3</span></sup></a><span data-dcnode-id="6020" instrument_node=""> SEC concentrates on cases with high importance and applies enforcement actions where the evidence of manipulation is sufficiently robust [</span><a class="workspace-trigger" data-dcnode-id="6018" href="#bb0130" name="bbb0130"><span data-dcnode-id="6019" instrument_node="">26</span></a><span data-dcnode-id="6017" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6015" href="#bb0165" name="bbb0165"><span data-dcnode-id="6016" instrument_node="">33</span></a><span data-dcnode-id="6014" instrument_node="">]. This provides a high degree of trust to this source. Labeling reports based on the AAER offers simplicity and consistency with easy replication and avoids possible bias from a subjective categorization. Following [</span><a class="workspace-trigger" data-dcnode-id="6012" href="#bb0290" name="bbb0290"><span data-dcnode-id="6013" instrument_node="">58</span></a><span data-dcnode-id="6011" instrument_node="">], we select the AAERs concerning litigations issued during the period from 1999 to 2019 with identified manipulation instances between the year 1995 and 2016 that discuss the words “fraud”, “fraudulent”, “anti-fraud” and “defraud” as well as “annual reports” or “10-K". Addressing the second question, we follow [</span><a class="workspace-trigger" data-dcnode-id="6009" href="#bb0060" name="bbb0060"><span data-dcnode-id="6010" instrument_node="">12</span></a><span data-dcnode-id="6008" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6006" href="#bb0120" name="bbb0120"><span data-dcnode-id="6007" instrument_node="">24</span></a><span data-dcnode-id="6005" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6003" href="#bb0130" name="bbb0130"><span data-dcnode-id="6004" instrument_node="">26</span></a><span data-dcnode-id="6002" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="6000" href="#bb0145" name="bbb0145"><span data-dcnode-id="6001" instrument_node="">29</span></a><span data-dcnode-id="5999" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5997" href="#bb0290" name="bbb0290"><span data-dcnode-id="5998" instrument_node="">58</span></a><span data-dcnode-id="5996" instrument_node="">] and focus on binary fraud classification. This implies that we do not distinguish between truthful and unintentionally misstated annual reports. The resulting data set contains 187,869 annual reports filed between 1993 and 2019, with 774 firm-years subject to enforcement actions. However, due to missing entries and mismatches in existing CIK indexation, the final data set is reduced to 7757 firm-year observations with 208 fraud and 7549 non-fraud filings. Further, we perform the extraction of text and financial data.</span></p></section><section data-dcnode-id="5958" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5988" id="st0105"><span data-dcnode-id="5993" instrument_node="">5.2</span><span data-dcnode-id="5991" instrument_node="">. </span><span data-dcnode-id="5989" instrument_node="">Text data</span></h3><p data-dcnode-id="5959" id="p0235"><span data-dcnode-id="5987" instrument_node="">The MD&amp;A section constitutes the primary source of raw text data in this study. In addition, nine linguistic features are utilized as predictors (described in the online appendix). The selection of these features is influenced by past studies that demonstrated several patterns of fraudulent agents, like an increased likelihood of using words that indicate negativity [</span><a class="workspace-trigger" data-dcnode-id="5985" href="#bb0340" name="bbb0340"><span data-dcnode-id="5986" instrument_node="">[68]</span></a><span data-dcnode-id="5984" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5982" href="#bb5005" name="bbb5005"><span data-dcnode-id="5983" instrument_node="">[78]</span></a><span data-dcnode-id="5981" instrument_node="">], absence of process ownership implying lack of assurance and resulting in statements containing less certainty [</span><a class="workspace-trigger" data-dcnode-id="5979" href="#bb0190" name="bbb0190"><span data-dcnode-id="5980" instrument_node="">38</span></a><span data-dcnode-id="5978" instrument_node="">] or an average of three times more positive sentiment and four times more negative sentiment in comparison to honest reports Goel and Uzuner [</span><a class="workspace-trigger" data-dcnode-id="5976" href="#bb0125" name="bbb0125"><span data-dcnode-id="5977" instrument_node="">25</span></a><span data-dcnode-id="5975" instrument_node="">]. Additionally, the general tone (sentiment) and the proportion of constraining words, were included by Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="5973" href="#bb0130" name="bbb0130"><span data-dcnode-id="5974" instrument_node="">26</span></a><span data-dcnode-id="5972" instrument_node="">], Loughran and Mcdonald [</span><a class="workspace-trigger" data-dcnode-id="5970" href="#bb0220" name="bbb0220"><span data-dcnode-id="5971" instrument_node="">44</span></a><span data-dcnode-id="5969" instrument_node="">], and Bodnaruk et al. [</span><a class="workspace-trigger" data-dcnode-id="5967" href="#bb0035" name="bbb0035"><span data-dcnode-id="5968" instrument_node="">7</span></a><span data-dcnode-id="5966" instrument_node="">]. Lastly, the average length of sentence, the proportion of compound words, and the fog index are incorporated as measures of complexity and legibility because prior work suggests that reports produced by misstating firms had reduced readability [</span><a class="workspace-trigger" data-dcnode-id="5964" href="#bb0145" name="bbb0145"><span data-dcnode-id="5965" instrument_node="">29</span></a><span data-dcnode-id="5963" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5961" href="#bb0195" name="bbb0195"><span data-dcnode-id="5962" instrument_node="">39</span></a><span data-dcnode-id="5960" instrument_node="">].</span></p></section><section data-dcnode-id="5910" id="s0095"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5952" id="st0110"><span data-dcnode-id="5957" instrument_node="">5.3</span><span data-dcnode-id="5955" instrument_node="">. </span><span data-dcnode-id="5953" instrument_node="">Quantitative data</span></h3><p data-dcnode-id="5911" id="p0240"><span data-dcnode-id="5951" instrument_node="">Along with text features, we used 47 quantitative financial predictors (described in the online appendix), which are capable of capturing financial distress as well as managerial motivations to misrepresent the performance of the firm. Past studies have presented robust theoretical evidence supporting the utilization of financial variables [</span><a class="workspace-trigger" data-dcnode-id="5949" href="#bb0005" name="bbb0005"><span data-dcnode-id="5950" instrument_node="">1</span></a><span data-dcnode-id="5948" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5946" href="#bb0100" name="bbb0100"><span data-dcnode-id="5947" instrument_node="">20</span></a><span data-dcnode-id="5945" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5943" href="#bb0130" name="bbb0130"><span data-dcnode-id="5944" instrument_node="">26</span></a><span data-dcnode-id="5942" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5940" href="#bb0320" name="bbb0320"><span data-dcnode-id="5941" instrument_node="">64</span></a><span data-dcnode-id="5939" instrument_node="">]. Following the guidelines of existing research, the financial ratios and balance sheet variables presented in the online appendix are extracted from Compustat, based on formulas presented by Dechow et al. [</span><a class="workspace-trigger" data-dcnode-id="5937" href="#bb0075" name="bbb0075"><span data-dcnode-id="5938" instrument_node="">15</span></a><span data-dcnode-id="5936" instrument_node="">] and Beneish [</span><a class="workspace-trigger" data-dcnode-id="5934" href="#bb0030" name="bbb0030"><span data-dcnode-id="5935" instrument_node="">6</span></a><span data-dcnode-id="5933" instrument_node="">]. Financial variables include indicators like total assets (adopted as a proxy for company size [</span><a class="workspace-trigger" data-dcnode-id="5931" href="#bb0020" name="bbb0020"><span data-dcnode-id="5932" instrument_node="">4</span></a><span data-dcnode-id="5930" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5928" href="#bb0340" name="bbb0340"><span data-dcnode-id="5929" instrument_node="">68</span></a><span data-dcnode-id="5927" instrument_node="">]), profitability ratios [</span><a class="workspace-trigger" data-dcnode-id="5925" href="#bb0130" name="bbb0130"><span data-dcnode-id="5926" instrument_node="">26</span></a><span data-dcnode-id="5924" instrument_node="">], accounts receivable and inventories as non-cash working capital drivers [</span><a class="workspace-trigger" data-dcnode-id="5922" href="#bb0005" name="bbb0005"><span data-dcnode-id="5923" instrument_node="">1</span></a><span data-dcnode-id="5921" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5919" href="#bb0060" name="bbb0060"><span data-dcnode-id="5920" instrument_node="">12</span></a><span data-dcnode-id="5918" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5916" href="#bb0275" name="bbb0275"><span data-dcnode-id="5917" instrument_node="">55</span></a><span data-dcnode-id="5915" instrument_node="">]. Additionally, a reduced ratio of sales general and administrative expenses (SGA) to revenues (SGAI) is found to signalize fraud [</span><a class="workspace-trigger" data-dcnode-id="5913" href="#bb0005" name="bbb0005"><span data-dcnode-id="5914" instrument_node="">1</span></a><span data-dcnode-id="5912" instrument_node="">]. Missing values are imputed using the RF algorithm. However, observations with more than 50% of the variables missing are excluded.</span></p></section><section data-dcnode-id="5880" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5904" id="st0115"><span data-dcnode-id="5909" instrument_node="">5.4</span><span data-dcnode-id="5907" instrument_node="">. </span><span data-dcnode-id="5905" instrument_node="">Imbalance treatment</span></h3><p data-dcnode-id="5881" id="p0245"><span data-dcnode-id="5903" instrument_node="">The majority of previous research has balanced the fraud and non-fraud cases in a data set using undersampling [</span><a class="workspace-trigger" data-dcnode-id="5901" href="#bb0130" name="bbb0130"><span data-dcnode-id="5902" instrument_node="">26</span></a><span data-dcnode-id="5900" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5898" href="#bb0145" name="bbb0145"><span data-dcnode-id="5899" instrument_node="">29</span></a><span data-dcnode-id="5897" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5895" href="#bb0305" name="bbb0305"><span data-dcnode-id="5896" instrument_node="">61</span></a><span data-dcnode-id="5894" instrument_node="">]. We follow this approach and consider a fraud-to-non-fraud-ratio of 1:4, which reflects the fact that the majority of firms have no involvement in fraudulent behaviour. Both year and sector are utilized for balancing, in order to take into account different economic conditions, change in regulation, as well as to eradicate any differences across distinct sectors [</span><a class="workspace-trigger" data-dcnode-id="5892" href="#bb0145" name="bbb0145"><span data-dcnode-id="5893" instrument_node="">29</span></a><span data-dcnode-id="5891" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5889" href="#bb0170" name="bbb0170"><span data-dcnode-id="5890" instrument_node="">34</span></a><span data-dcnode-id="5888" instrument_node="">]. The latter is extracted with the SIC code [</span><a class="workspace-trigger" data-dcnode-id="5886" href="#bb0325" name="bbb0325"><span data-dcnode-id="5887" instrument_node="">65</span></a><span data-dcnode-id="5885" instrument_node="">] and is of particular importance for text mining, as the utilization of words within financial documentation could differ according to the sector. The resulting balanced data set consists of 1163 reports, out of which 201 are fraudulent, and 962 are non-fraudulent annual reports. In the years 2002 to 2004 more financial misstatements than in other years can be observed. This could be attributed to the tightened regulations after the big fraud scandals in 2001 and the resulting implementation of the Sarbanes-Oxley Act (SOX) in 2002. Also, fewer misstatements are noted in recent years since the average period between the end of the fraud and the publication of an AAER is three years [</span><a class="workspace-trigger" data-dcnode-id="5883" href="#bb0285" name="bbb0285"><span data-dcnode-id="5884" instrument_node="">57</span></a><span data-dcnode-id="5882" instrument_node="">].</span></p></section></section><section data-dcnode-id="5076" id="s0105"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5873" id="st0120"><span data-dcnode-id="5878" instrument_node="">6</span><span data-dcnode-id="5876" instrument_node="">. </span><span data-dcnode-id="5874" instrument_node="">Classification results</span></h2><div data-dcnode-id="5176"><p data-dcnode-id="5868" id="p0250"><span data-dcnode-id="5872" instrument_node="">We answer RQ 1 and 2 by means of empirical analysis and compare a set of classification models in terms of their fraud detection performance. The models generate fraud classifications based on financial indicators, linguistic features of reports, the reports' text, and combinations of these groups of features. </span><a class="workspace-trigger" data-dcnode-id="5870" href="#t0010" name="bt0010"><span data-dcnode-id="5871" instrument_node="">Table 2</span></a><span data-dcnode-id="5869" instrument_node=""> reports corresponding results from the out-of-sample test set. The baseline accuracy of classifying all cases of the test set as non-fraudulent (majority class) is 82.81%.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="5177" id="t0010"><span class="captions" data-dcnode-id="5860"><span data-dcnode-id="5861" id="ca0035"><p data-dcnode-id="5862" id="sp0040"><span class="label" data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">Table 2</span></span><span data-dcnode-id="5865" instrument_node="">. </span><span data-dcnode-id="5863" instrument_node="">Comparative performance of selected binary classifiers on the different types of test data. The baseline accuracy is 0.8281.</span></p></span></span><div class="groups" data-dcnode-id="5178"><table data-dcnode-id="5744"><thead data-dcnode-id="5840"><tr class="valign-top" data-dcnode-id="5857"><th class="rowsep-1" colspan="9" data-dcnode-id="5858" scope="col"><span data-dcnode-id="5859" instrument_node="">Finance data (FIN)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="5841"><th data-dcnode-id=" de="">0.9083</span></strong></td><td data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">0.0332</span></td><td data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">−0.1661</span></td></tr><tr data-dcnode-id="5217"><td data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">ANN</span></td><td data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">0.8911</span></td><td data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">0.7460</span></td><td data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">0.9405</span></td><td data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">0.7401</span></td><td data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">0.9055</span></td><td data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">0.9054</span></td><td data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">0.1178</span></td><td data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">−0.2838</span></td></tr><tr data-dcnode-id="5198"><td data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">HAN</span></td><td data-dcnode-id="5212"><strong data-dcnode-id="5213"><span data-dcnode-id="5214" instrument_node="">0.9264</span></strong></td><td data-dcnode-id="5209"><strong data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">0.9000</span></strong></td><td data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">0.8206</span></td><td data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">0.6506</span></td><td data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">0.8361</span></td><td data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">0.8457</span></td><td data-dcnode-id="5200"></td><td data-dcnode-id="5199"></td></tr><tr data-dcnode-id="5181"><td data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">GPT-2&nbsp;+&nbsp;Attn</span></td><td data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">0.7776</span></td><td data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">0.7678</span></td><td data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">0.6791</span></td><td data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">0.4455</span></td><td data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">0.6991</span></td><td data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">0.6934</span></td><td data-dcnode-id="5183"></td><td data-dcnode-id="5182"></td></tr></tbody></table></div></div></div><section data-dcnode-id="5137" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5170" id="st0125"><span data-dcnode-id="5175" instrument_node="">6.1</span><span data-dcnode-id="5173" instrument_node="">. </span><span data-dcnode-id="5171" instrument_node="">Modeling of financial data</span></h3><p data-dcnode-id="5138" id="p0255"><span data-dcnode-id="5169" instrument_node="">Modeling using financial data (FIN) has been the most popular approach (</span><a class="workspace-trigger" data-dcnode-id="5167" href="#t0005" name="bt0005"><span data-dcnode-id="5168" instrument_node="">Table 1</span></a><span data-dcnode-id="5166" instrument_node="">). The approach serves this study as a benchmark, to which we compare modeling on linguistic features (LING) and the combination of both (FIN + LING). The last two columns of </span><a class="workspace-trigger" data-dcnode-id="5164" href="#t0010" name="bt0010"><span data-dcnode-id="5165" instrument_node="">Table 2</span></a><span data-dcnode-id="5163" instrument_node=""> show the results of the comparison. In terms of AUC and accuracy, the tree-based models RF [</span><a class="workspace-trigger" data-dcnode-id="5161" href="#bb0050" name="bbb0050"><span data-dcnode-id="5162" instrument_node="">10</span></a><span data-dcnode-id="5160" instrument_node="">] and XGB appear to excel at predicting fraud on FIN, indicating a non-linear dependency between financial indicators and the fraud status of a report. This result is in line with Liu et al. [</span><a class="workspace-trigger" data-dcnode-id="5158" href="#bb0215" name="bbb0215"><span data-dcnode-id="5159" instrument_node="">43</span></a><span data-dcnode-id="5157" instrument_node="">] who showed that RF performed especially well in case of high-dimensional financial fraud data. Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="5155" href="#bb0130" name="bbb0130"><span data-dcnode-id="5156" instrument_node="">26</span></a><span data-dcnode-id="5154" instrument_node="">] also reported an accuracy of 88.1% on FIN data and concluded that the ensemble of tree-based algorithms is superior to SVM, LR and ANN due to a relatively low dimensionality achieved during feature selection. The predictive performance aligns with the results of Kim et al. [</span><a class="workspace-trigger" data-dcnode-id="5152" href="#bb0170" name="bbb0170"><span data-dcnode-id="5153" instrument_node="">34</span></a><span data-dcnode-id="5151" instrument_node="">], offering the LR and SVM models as the most accurate. Lin et al. [</span><a class="workspace-trigger" data-dcnode-id="5149" href="#bb0210" name="bbb0210"><span data-dcnode-id="5150" instrument_node="">42</span></a><span data-dcnode-id="5148" instrument_node="">] and Ravisankar et al. [</span><a class="workspace-trigger" data-dcnode-id="5146" href="#bb0305" name="bbb0305"><span data-dcnode-id="5147" instrument_node="">61</span></a><span data-dcnode-id="5145" instrument_node="">] showcased that the DNN models (ANN with more than one hidden layer) outperform LR and SVM, offering an accuracy higher by around 4.5%. The SVM is a widely recognized model and was applied both for fraud detection [</span><a class="workspace-trigger" data-dcnode-id="5143" href="#bb0270" name="bbb0270"><span data-dcnode-id="5144" instrument_node="">54</span></a><span data-dcnode-id="5142" instrument_node="">] and in other fields [</span><a class="workspace-trigger" data-dcnode-id="5140" href="#bb0085" name="bbb0085"><span data-dcnode-id="5141" instrument_node="">17</span></a><span data-dcnode-id="5139" instrument_node="">]. However, the results show that inherent configuration complexities make SVM a secondary choice for practitioners. ANN show less impressive predictive performance but proved to be the most efficient in terms of sensitivity. However, for model evaluation, a balanced indicator like F1- and F2-scores provide a better perspective. These metrics suggest XGB to outperform other models. XGB represents an advancement in the in the field of ML, its high performance is noteworthy since it was not considered in prior work on fraud detection. Given the much higher cost of missing actual fraud cases compared to false alarms, we argue that the F2-score is the most suitable threshold-based indicator of model performance. Therefore, we emphasize the F2-score together with the AUC, which allows the tuning of the threshold.</span></p></section><section data-dcnode-id="5116" id="s0115"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5131" id="st0130"><span data-dcnode-id="5136" instrument_node="">6.2</span><span data-dcnode-id="5134" instrument_node="">. </span><span data-dcnode-id="5132" instrument_node="">Modeling of linguistic data</span></h3><p data-dcnode-id="5117" id="p0260"><span data-dcnode-id="5130" instrument_node="">The modeling on linguistic data (LING) was the first step toward including text in fraud detection. The earlier experiments by Cecchini et al. [</span><a class="workspace-trigger" data-dcnode-id="5128" href="#bb0060" name="bbb0060"><span data-dcnode-id="5129" instrument_node="">12</span></a><span data-dcnode-id="5127" instrument_node="">], Humpherys et al. [</span><a class="workspace-trigger" data-dcnode-id="5125" href="#bb0145" name="bbb0145"><span data-dcnode-id="5126" instrument_node="">29</span></a><span data-dcnode-id="5124" instrument_node="">] and Goel et al. [</span><a class="workspace-trigger" data-dcnode-id="5122" href="#bb0120" name="bbb0120"><span data-dcnode-id="5123" instrument_node="">24</span></a><span data-dcnode-id="5121" instrument_node="">] employed SVM and achieved accuracy of 82%, 65.8%, and 89.5% respectively. The latter additionally included the BOW method that we will discuss further. Our modeling falls in line with the previous work and exhibits SVM as the second strongest predictor, yielding an AUC of 74% and accuracy of 82%. RF remained the most reliable predictor with the highest AUC, accuracy, and F2-score. Modeling done solely on LING will allow us to assess the degree to which both sources of data contribute to accurate classification. In line with Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="5119" href="#bb0130" name="bbb0130"><span data-dcnode-id="5120" instrument_node="">26</span></a><span data-dcnode-id="5118" instrument_node="">], all models exhibit higher performance on FIN data than on LING data solely, leading to the conclusion that financial covariates have more predictive power than linguistic variables. However, the performance differences are not substantial and suggest a strong relationship between linguistic features and fraudulent behavior, which agrees with previous studies. Following the ideas of Hajek2017MiningMethods, we combine FIN and LING data to evaluate if the classifier can make use of both data sources. Our results differ in terms of the leading models, with RF and XGB offering the highest AUCs of 86%. XGB is showing an improvement, performing well on FIN data, falling back a little in the LING set up but making better use of the combined input. Once again we observe the superior performance of XGB in terms of F2-score with 76.87% followed closely by 76.10% of RF and 74.48% of SVM, which once again advocates for the usefulness of advanced ML methods for practical tasks. Interestingly, for the rest of classifiers, the accuracy dropped a little in comparison to FIN, but the AUCs improved (with a minor exception for RF). This serves as an indication that LING and FIN data combined may provide conflicting signals to the classifier. However, the data mix is a definite improvement as it provides a stronger signal to the classifier and enhances predictive performance.</span></p></section><section data-dcnode-id="5077" id="s0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5110" id="st0135"><span data-dcnode-id="5115" instrument_node="">6.3</span><span data-dcnode-id="5113" instrument_node="">. </span><span data-dcnode-id="5111" instrument_node="">Modeling of text data</span></h3><p data-dcnode-id="5096" id="p0265"><span data-dcnode-id="5109" instrument_node="">Researchers have been taking a step forward from aggregated linguistic features in an attempt to derive more predictive power from the vast amounts of text contained in annual reports. We offer the advanced methods of NLP, previously unexplored for fraud detection, and compare them to the performance of more traditional models. Goel et al. [</span><a class="workspace-trigger" data-dcnode-id="5107" href="#bb0120" name="bbb0120"><span data-dcnode-id="5108" instrument_node="">24</span></a><span data-dcnode-id="5106" instrument_node="">], Glancy and Yadav [</span><a class="workspace-trigger" data-dcnode-id="5104" href="#bb0110" name="bbb0110"><span data-dcnode-id="5105" instrument_node="">22</span></a><span data-dcnode-id="5103" instrument_node="">] and Purda and Skillicorn [</span><a class="workspace-trigger" data-dcnode-id="5101" href="#bb0290" name="bbb0290"><span data-dcnode-id="5102" instrument_node="">58</span></a><span data-dcnode-id="5100" instrument_node="">] applied the BOW model to perform modeling on text data, while Goel and Uzuner [</span><a class="workspace-trigger" data-dcnode-id="5098" href="#bb0125" name="bbb0125"><span data-dcnode-id="5099" instrument_node="">25</span></a><span data-dcnode-id="5097" instrument_node="">] made use of part-of-speech tagging. They utilized SVM and hierarchical clustering as classifiers and achieved accuracies of 89.5%, 83.4%, 89%, and 81.8%, respectively.</span></p><p data-dcnode-id="5089" id="p0270"><a class="workspace-trigger" data-dcnode-id="5094" href="#t0010" name="bt0010"><span data-dcnode-id="5095" instrument_node="">Table 2</span></a><span data-dcnode-id="5093" instrument_node=""> offers an overview of the modeling results, starting with purely textual input (TXT) and continuing with text enhanced by financial data (FIN+TXT). Two new DL methods are included in TXT modeling, namely HAN and GPT-2. While traditional benchmarks take the TF-IDF transformations of word input, the DL models make use of pre-trained embeddings. We can observe that modeling on TXT improves all models in comparison to LING, with the largest AUC delta of 0.2 in the case of ANN. This increase can be attributed to the richer input of the actual MD&amp;A content. While the more basic feature input of the LING models solely incorporated linguistic information (e.g., frequency counts of word categories based on LM word lists, readability and complexity ratios, etc.) the textual input (TXT) is based on advanced text mining techniques and vector space representations containing the information of the whole MD&amp;A content (TF-IDF based embedding), as well as grammar, context, and structure of sentences (DL based embeddings). ANN demonstrates the highest accuracy, 89%, and the best F1- and F2-scores, which constitutes a strong signal that the neural network architecture is a favorable candidate for the task, regardless of the BOW input. Given the complexity of text processing, ANN proves its capacity to pick up on complex relationships between the target and explanatory variables. The improvement is also visible for the F2-score of 89.93% that closely follows that of RF (89.98%). It is interesting to compare the BOW-based ANN with GPT-2 and HAN, all of which represent a NN architecture. GPT-2 performs better on TXT than any other model on LING. Though it fails to show superior accuracy, its sensitivity is one of the highest, leading to the conclusion that with some threshold adjustment, it could provide better predictive performance than other models like LR or tree-based models. This example underlines the potential gains of implementing the new DL methods that allow superior insights into unstructured data. Unlike BOW-based benchmarks, embeddings-based HAN and GPT-2 retained the structure and context of the input. HAN showed superior results in terms of AUC 91.08% but fell short in terms of accuracy. However, its sensitivity is exceeding those of all other benchmarks except SVM, making it a promising model for fraud detection. The appealing performance of HAN can be explained by its intrinsic capacity to extract significant contextual similarities within documents and that pertinent cues, which allow truthful text to be distinguished from deceitful ones, are dependent on the context rather than the content [</span><a class="workspace-trigger" data-dcnode-id="5091" href="#bb0375" name="bbb0375"><span data-dcnode-id="5092" instrument_node="">75</span></a><span data-dcnode-id="5090" instrument_node="">]. All in all, the results suggest that textual data can offer much more insight than LING across all classifiers.</span></p><p data-dcnode-id="5087" id="p0275"><span data-dcnode-id="5088" instrument_node="">We conclude the analysis by examining the feature combination FIN+TXT, which is at the core of our study. The input setup is done in two ways: a combination of word vectors with financial indicators into one data set and a 2-step modeling approach. The latter comprises building a TXT model and using its probability prediction as an input to another DL model that will concoct it with FIN and output the final binary prediction. The first approach is applied in the case of benchmark models, including ANN. The second one is implemented for HAN and GPT-2.</span></p><p data-dcnode-id="5082" id="p0280"><span data-dcnode-id="5086" instrument_node="">Based on a comparison of models using only TXT or FIN data, Purda and Skillicorn [</span><a class="workspace-trigger" data-dcnode-id="5084" href="#bb0290" name="bbb0290"><span data-dcnode-id="5085" instrument_node="">58</span></a><span data-dcnode-id="5083" instrument_node="">] concluded that these data sources are complementary with each source identifying specific types of fraud that the other cannot detect. In our case, all benchmarks exhibit improved performance in comparison to the FIN + LING setup, especially LR and SVM. However, the same unanimity is observed in decreased F1-score. We observe the superiority of predictive powers of full-textual input over the linguistic metrics. If we compare the additional value of FIN for the performance, we can see only a minor increase in almost all metrics, once again underlying the complexity and potential misalignment of FIN and TXT data. However, it is essential to note that unlike F1-score, F2-score increases across the ML benchmarks, which brings us to the initial assumption behind the preference toward the F2-score as key to model evaluation for practical use. We conclude that with the increased complexity of input, one should opt for advanced ML techniques for the extraction of extra insight.</span></p><p data-dcnode-id="5080" id="p0285"><span data-dcnode-id="5081" instrument_node="">The best performance is again yielded by HAN with AUC 92.64%, followed by XGB and ANN with AUCs of 89%. HAN is also offering the highest sensitivity of 90% across all datasets and models, making it the recommended solution for statement fraud detection. Going back to the triad comparison between ANN, HAN, and GPT-2, we can see that the latter does not show much improvement with added FIN data. This signals the potentially poor choice of pre-trained embeddings, highlighting the importance of this decision in the design of a DL classifier and reminding that state-of-the-art solutions do not guarantee superior results. ANN does not catch up with HAN AUC-wise. However, it showcases the higher F2-score of 90.55%, surpassed only by XGB, which proved to be a promising alternative to the DL methods. The results of modeling on HAN showed its capacity to incorporate and extract additional values from the diversified input, which contributes to the existing field of research and opens new opportunities to the further exploration of data enrichment for fraud detection.</span></p><p data-dcnode-id="5078" id="p0290"><span data-dcnode-id="5079" instrument_node="">The results of HAN address the RQ 1 and 2, allowing us to conclude that the proposed DL architecture offers a substantial improvement for fraud detection facilitation. Additionally, its properties allow us to offer a look into the “black box” of the DL models and provide the rationale behind the classification decision. This interpretability capacity might be particularly important for practitioners, given the need to substantiate the audit judgment, and will be further explored in the next Section.</span></p></section></section><section data-dcnode-id="4922" id="s0125"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5070" id="st0140"><span data-dcnode-id="5075" instrument_node="">7</span><span data-dcnode-id="5073" instrument_node="">. </span><span data-dcnode-id="5071" instrument_node="">Interpretation and decision support application</span></h2><p data-dcnode-id="5053" id="p0295"><span data-dcnode-id="5069" instrument_node="">SEC developed software specifically focused on the MD&amp;A section [</span><a class="workspace-trigger" data-dcnode-id="5067" href="#bb0290" name="bbb0290"><span data-dcnode-id="5068" instrument_node="">58</span></a><span data-dcnode-id="5066" instrument_node="">] to examine the use of language for indications of fraud. The importance of the MD&amp;A section can be observed in reforms introduced by SOX in 2002, which demanded that the relevant section should present and offer full disclosure on critical accounting estimates and policies [</span><a class="workspace-trigger" data-dcnode-id="5064" href="#bb0310" name="bbb0310"><span data-dcnode-id="5065" instrument_node="">62</span></a><span data-dcnode-id="5063" instrument_node="">]. The length of MD&amp;A sections increased after SOX became effective; nevertheless, Li [</span><a class="workspace-trigger" data-dcnode-id="5061" href="#bb0205" name="bbb0205"><span data-dcnode-id="5062" instrument_node="">41</span></a><span data-dcnode-id="5060" instrument_node="">] concluded that no changes were made to the information contained within MD&amp;A sections or the style of language adopted. Taking further the fraud detection efforts, we developed a method to facilitate the audit of the MD&amp;A section. We employ state-of-the-art textual analysis to shed light on managers' cognitive processes, which could be revealed by the language used in the MD&amp;A section. Zhou et al. [</span><a class="workspace-trigger" data-dcnode-id="5058" href="#bb0375" name="bbb0375"><span data-dcnode-id="5059" instrument_node="">75</span></a><span data-dcnode-id="5057" instrument_node="">] demonstrated that it is plausible to detect lies based on textual cues. Nonetheless, the pertinent cues that allow truthful texts to be distinguished from deceitful ones are dependent on the context. One way to support auditors would be the “red-flag” indication in the body of the MD&amp;A section. Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="5055" href="#bb0130" name="bbb0130"><span data-dcnode-id="5056" instrument_node="">26</span></a><span data-dcnode-id="5054" instrument_node="">] explored the use of “green-flag” and “red-flag” values of financial indicators and concluded that the identification of non-fraudulent firms is less complex and can be accompanied by interpretable “green-flag” values, however because the detection of fraudulent firms requires more complex non interpretable ML models, no “red-flag” values could be derived. We will take it further and provide the suggestion for the use of textual elements as “red-flags” for auditors. This can be done on the word level or the sentence-level and is to our best knowledge, new to the field. The HAN model allows a holistic analysis of the text structure and the underlying semantics. In contrast to BOW that ignores specific contextual meanings of words, the HAN model considers the grammar, structure, and context of words within a sentence and of sentences within a document, which is essential for the identification of fraudulent behaviour. The attention mechanisms of the HAN retain the logical dependencies of the content and enable the identification of the words and sentences that contribute the most in attributing the fraudulent behaviour by extracting the word and sentence attention weights defined in Eq. 2 and 8. These valuable insights into the internal document structure together with strong predictive performance, make HAN notably advantageous in comparison to BOW-based traditional benchmarks.</span></p><p data-dcnode-id="5051" id="p0300"><span data-dcnode-id="5052" instrument_node="">Based on the assumption that fraudulent actors are capable of manipulating their writings so that they have convincing similarities to those that are non-fraudulent, only concentrating on words that focus on the content of the text while disregarding the context could be overly simplistic for differentiating truthful from misleading statements. We assume that due to their inherently higher complexity, sentence-level indicators are less prone to manipulation and provide robust insight for auditing.</span></p><section data-dcnode-id="4965" id="s0130"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5045" id="st0145"><span data-dcnode-id="5050" instrument_node="">7.1</span><span data-dcnode-id="5048" instrument_node="">. </span><span data-dcnode-id="5046" instrument_node="">Word-level</span></h3><div data-dcnode-id="5002"><p data-dcnode-id="5028" id="p0305"><span data-dcnode-id="5044" instrument_node="">We provide a comparative analysis of words considered to be “red-flags” by the more traditional RF model and those offered by HAN. The RF model proved to be a potent and consistent classifier throughout the comparative analysis. We apply the </span><em data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">lime</span></em><span data-dcnode-id="5041" instrument_node=""> methodology of Ribeiro et al. [</span><a class="workspace-trigger" data-dcnode-id="5039" href="#bb0315" name="bbb0315"><span data-dcnode-id="5040" instrument_node="">63</span></a><span data-dcnode-id="5038" instrument_node="">] to gain insight into the role of different words in the model's classification decision. </span><em data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Lime</span></em><span data-dcnode-id="5035" instrument_node=""> stands for Local Interpretable Model-Agnostic Explanations and is based on explaining the model functioning in the locality of the chosen observation. Ribeiro et al. [</span><a class="workspace-trigger" data-dcnode-id="5033" href="#bb0315" name="bbb0315"><span data-dcnode-id="5034" instrument_node="">63</span></a><span data-dcnode-id="5032" instrument_node="">] explains every input separately; the example of its application to one of the fraud texts can be found in </span><a class="workspace-trigger" data-dcnode-id="5030" href="#f0015" name="bf0015"><span data-dcnode-id="5031" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5029" instrument_node="">:</span></p><figure class="figure text-xs" data-dcnode-id="5003" id="f0015"><span data-dcnode-id="5012"><img alt="Fig. 3" aria-describedby="ca0015" data-dcnode-id="5027" height="191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr3.jpg&amp;raw"><span data-dcnode-id="5026" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5013"><li data-dcnode-id="5020"><a class="anchor download-link u-font-sans" data-dcnode-id="5021" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr3_lrg.jpg" target="_blank" title="Download high-res image (63KB)"><span class="anchor-text" data-dcnode-id="5022"><span data-dcnode-id="5025" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">Download high-res image (63KB)</span></span></span></a></li><li data-dcnode-id="5014"><a class="anchor download-link u-font-sans" data-dcnode-id="5015" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5016"><span data-dcnode-id="5019" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5004"><span data-dcnode-id="5005" id="ca0015"><p data-dcnode-id="5006" id="sp0015"><span class="label" data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Fig. 3</span></span><span data-dcnode-id="5009" instrument_node="">. </span><span data-dcnode-id="5007" instrument_node="">Words with top weights indicating fraud from a sample MD&amp;A.</span></p></span></span></figure></div><div data-dcnode-id="4968"><p data-dcnode-id="4994" id="p0310"><span data-dcnode-id="5001" instrument_node="">We supply all fraud cases through the </span><em data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">lime</span></em><span data-dcnode-id="4998" instrument_node=""> package and extract the top ten words, that have the strongest effect on the model in terms of fraud indication. We further aggregate these words and gain a “red-flag” vocabulary. Additionally, we perform the same analysis with the DNN model and extract the weights assigned by the HAN attention layer. The results are summarized in </span><a class="workspace-trigger" data-dcnode-id="4996" href="#f0020" name="bf0020"><span data-dcnode-id="4997" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4995" instrument_node="">:</span></p><figure class="figure text-xs" data-dcnode-id="4969" id="f0020"><span data-dcnode-id="4978"><img alt="Fig. 4" aria-describedby="ca0020" data-dcnode-id="4993" height="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr4.jpg&amp;raw"><span data-dcnode-id="4992" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4979"><li data-dcnode-id="4986"><a class="anchor download-link u-font-sans" data-dcnode-id="4987" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr4_lrg.jpg" target="_blank" title="Download high-res image (350KB)"><span class="anchor-text" data-dcnode-id="4988"><span data-dcnode-id="4991" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">Download high-res image (350KB)</span></span></span></a></li><li data-dcnode-id="4980"><a class="anchor download-link u-font-sans" data-dcnode-id="4981" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4982"><span data-dcnode-id="4985" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4970"><span data-dcnode-id="4971" id="ca0020"><p data-dcnode-id="4972" id="sp0020"><span class="label" data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4975" instrument_node="">. </span><span data-dcnode-id="4973" instrument_node="">“Red-flag” words identified by RF and HAN, the bottom section contains the words matching both sets.</span></p></span></span></figure></div><p data-dcnode-id="4966" id="p0315"><span data-dcnode-id="4967" instrument_node="">Fifteen words are found to be important for an indication of fraudulent activity by both algorithms, including “government”, “certain”, “gross”, potentially indicating adverse involvement of the state institutions. It would seem that RF derives judgment from the industry: “aerospace”, medical terms, “pilotless”, “armourgroup”. HAN picks up on financial and legal terms like “cost”, “acquisition”, “property”. Both classifiers also include time- and calendar-related words like names of the month. It is not obvious how much the context affects this selection. Additionally, derivation of a word-based rule might potentially lead to a quick adaptation of the reporting entities for audit circumvention. Ambiguous interpretation and manipulation risks motivate the creation of the sentence-level decision support system.</span></p></section><section data-dcnode-id="4923" id="s0135"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4959" id="st0150"><span data-dcnode-id="4964" instrument_node="">7.2</span><span data-dcnode-id="4962" instrument_node="">. </span><span data-dcnode-id="4960" instrument_node="">Sentence-level</span></h3><p data-dcnode-id="4957" id="p0320"><span data-dcnode-id="4958" instrument_node="">The added contextual information extracted by the HAN shows improved performance on the test set in comparison to linguistic features and other DNN models. It can be partially explained by the hierarchical structure of language, which entails the unequal roles of words in the overall structure. Following RQ 3, we want to benefit from the structural and context insight retained in sentence-level analysis, provided uniquely by the HAN model.</span></p><div data-dcnode-id="4926"><p data-dcnode-id="4952" id="p0325"><span data-dcnode-id="4956" instrument_node="">We extract the sentence-level attention weights for 200 fraudulent reports gained as a result of prediction by HAN and filter the top ten most important sentences per report. The mean weight of a sentence that can be considered a “red-flag” is 0.05, with a maximum at 0.61. We devise a rule, dictating that sentences with weights higher than 0.067 (top 25% quantile) will be referred to as “extra important”, sentences between 0.04 and 0.67 (top half) are “important” and those between 0.022 and 0.04 are “noteworthy”. These three groups of words get respective coloring and are highlighted in the considered MD&amp;A, as depicted in </span><a class="workspace-trigger" data-dcnode-id="4954" href="#f0025" name="bf0025"><span data-dcnode-id="4955" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4953" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="4927" id="f0025"><span data-dcnode-id="4936"><img alt="Fig. 5" aria-describedby="ca0025" data-dcnode-id="4951" height="472" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr5.jpg&amp;raw"><span data-dcnode-id="4950" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4937"><li data-dcnode-id="4944"><a class="anchor download-link u-font-sans" data-dcnode-id="4945" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr5_lrg.jpg" target="_blank" title="Download high-res image (950KB)"><span class="anchor-text" data-dcnode-id="4946"><span data-dcnode-id="4949" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Download high-res image (950KB)</span></span></span></a></li><li data-dcnode-id="4938"><a class="anchor download-link u-font-sans" data-dcnode-id="4939" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0167923620301767-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4940"><span data-dcnode-id="4943" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4928"><span data-dcnode-id="4929" id="ca0025"><p data-dcnode-id="4930" id="sp0025"><span class="label" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">Fig. 5</span></span><span data-dcnode-id="4933" instrument_node="">. </span><span data-dcnode-id="4931" instrument_node="">A page from MD&amp;A (on the left) and its extract with “red-flag” phrases for the attention of the auditor (on the right). Sentences that contributed the most to the decision toward “fraud” are labeled by HAN as extra important and important. Additional examples are provided in the Online Appendix. (For interpretation of the references to colour in this figure legend, the reader is referred to the web version of this article.)</span></p></span></span></figure></div><p data-dcnode-id="4924" id="p0330"><span data-dcnode-id="4925" instrument_node="">We propose to use the probability prediction of the HAN model and assign sentence weights as a two-step decision support system for auditors. Given its strong predictive performance, HAN can provide an initial signal about the risks of fraud. Based on a selected sensitivity threshold, auditors may select to evaluate a potentially fraudulent report with extra caution and use the highlighted sentences as additional guidance. Given the lengthiness of an average MD&amp;A and limited physical concentration capacities associated with the manual audit, this sort of visual guidance can offer higher accuracy of fraud detection.</span></p></section></section><section data-dcnode-id="4881" id="s0140"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4916" id="st0155"><span data-dcnode-id="4921" instrument_node="">8</span><span data-dcnode-id="4919" instrument_node="">. </span><span data-dcnode-id="4917" instrument_node="">Discussion</span></h2><p data-dcnode-id="4899" id="p0335"><span data-dcnode-id="4915" instrument_node="">As reported in the literature review, Hajek and Henriques [</span><a class="workspace-trigger" data-dcnode-id="4913" href="#bb0130" name="bbb0130"><span data-dcnode-id="4914" instrument_node="">26</span></a><span data-dcnode-id="4912" instrument_node="">] and Throckmorton et al. [</span><a class="workspace-trigger" data-dcnode-id="4910" href="#bb0340" name="bbb0340"><span data-dcnode-id="4911" instrument_node="">68</span></a><span data-dcnode-id="4909" instrument_node="">] have tackled the task of combined mining financial and linguistic data for financial statement fraud prediction, and no study was found on the combination of financial and textual data. Given the managerial efforts to conceal bad news by using particular wording [</span><a class="workspace-trigger" data-dcnode-id="4907" href="#bb0145" name="bbb0145"><span data-dcnode-id="4908" instrument_node="">29</span></a><span data-dcnode-id="4906" instrument_node="">] and by generating less understandable reports [</span><a class="workspace-trigger" data-dcnode-id="4904" href="#bb0195" name="bbb0195"><span data-dcnode-id="4905" instrument_node="">39</span></a><span data-dcnode-id="4903" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4901" href="#bb0225" name="bbb0225"><span data-dcnode-id="4902" instrument_node="">45</span></a><span data-dcnode-id="4900" instrument_node="">], it is pivotal to adopt more advanced text processing techniques.</span></p><p data-dcnode-id="4888" id="p0340"><span data-dcnode-id="4898" instrument_node="">SVM showed good performance across most experimental setups. Due to its ability to deal with high dimensional, sparse feature spaces, SVM has achieved the best performances in previous studies that incorporated the BOW approach [</span><a class="workspace-trigger" data-dcnode-id="4896" href="#bb0115" name="bbb0115"><span data-dcnode-id="4897" instrument_node="">23</span></a><span data-dcnode-id="4895" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4893" href="#bb0290" name="bbb0290"><span data-dcnode-id="4894" instrument_node="">58</span></a><span data-dcnode-id="4892" instrument_node="">]. In this study, RF showed the best predictive performance, managing to extract knowledge from both financial and BOW-based textual sources. DL models also proved capable of distinguishing fraudulent cases. However, only the HAN architecture showcased exceptional capacity to extract signals from the FIN + TXT setting, which is in the center of the current research. The HAN detects a high number of fraudulent cases compared to remaining models, strengthening the statement by Zhou et al. [</span><a class="workspace-trigger" data-dcnode-id="4890" href="#bb0375" name="bbb0375"><span data-dcnode-id="4891" instrument_node="">75</span></a><span data-dcnode-id="4889" instrument_node="">] that the detection of deception based on text necessitates contextual information.</span></p><p data-dcnode-id="4886" id="p0345"><span data-dcnode-id="4887" instrument_node="">The results of the AUC measures indicate that the linguistic variables extracted with HAN and TF-IDF add significant value to fraud detection models in combination with financial ratios. The heterogeneity in performance shifts among different data types for models, showing that different models pick up on different signals, and a combination of these models might be more appropriate to support the decision-making processes of stakeholders in the determination of fraud than the choice of a single model. The use of additional performance metrics like F2-score addressed the practical applicability of the classification models, given the imbalance of error costs. The superior predictive capacity should be considered in combination with the model's sensitivity in order to account for the implications of non-detecting the fraudulent case.</span></p><p data-dcnode-id="4884" id="p0350"><span data-dcnode-id="4885" instrument_node="">We have explored the interpretation capacities of RF and HAN models on the word and sentence levels. Both models agreed on a specific “red-flag” vocabulary; however, mostly, they picked up on different terms. Also, out of context, these words might be misleading. The indication of “red-flags” words is becoming increasingly unreliable with the adaptive response of the alleged offending parties. The offered sentence-level markup showed a more robust approach to the provision of decision support for the auditors.</span></p><p data-dcnode-id="4882" id="p0355"><span data-dcnode-id="4883" instrument_node="">Auditors must devote effort and time to risk assessment of financial misstatements, which is tedious and complex. The utilization of interpretable state-of-the-art technology is essential to facilitate the detection of fraud by auditors and will significantly enhance effectiveness and efficiency of audit work. Moreover, the presence of enhanced anti-fraud controls will prevent individuals from committing fraudulent acts and therefore reduces fraud risks.</span></p></section><section data-dcnode-id="4870" id="s0145"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4875" id="st0160"><span data-dcnode-id="4880" instrument_node="">9</span><span data-dcnode-id="4878" instrument_node="">. </span><span data-dcnode-id="4876" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4873" id="p0360"><span data-dcnode-id="4874" instrument_node="">The detection of financial fraud is a challenging endeavor. The continually adapting and complex nature of fraudulent activities necessitates the application of the latest technologies to confront fraud. The paper examined the potential of a state-of-the-art DL model to add to the development of advanced financial fraud detection methods. Minimal research has been conducted on the subject of methods that combine the analysis of financial and linguistic information, and no studies were discovered on the application of text representation based on DL to detect financial statement fraud. In addition to quantitative data, we investigated the potential of the accompanying text data in annual reports, and have emphasized the increasing significance of textual analysis for the detection of signals of fraud within financial documentation. The proposed HAN method concentrates on the content as well as the context of textual information. Unlike the BOW method, which disregards word order and additional grammatical information, DL is capable of capturing semantic associations and discerning the meanings of different word and phrase combinations.</span></p><p data-dcnode-id="4871" id="p0365"><span data-dcnode-id="4872" instrument_node="">The results have shown that the DL model achieved considerable improvement in AUC compared to the benchmark models. The findings indicate that the DL model is well suited to identify the fraudulent cases correctly, whereas most ML models fail to detect fraudulent cases while performing better at correctly identifying the truthful statements. The detection of fraudulent firms is of great importance due to the significantly higher MC associated with fraud. Thus, specifically in the highly unbalanced case of fraud detection, it is advisable to use multiple models designed to capture different aspects. Based on these findings, we conclude that the textual information of the MD&amp;A section extracted through HAN has the potential to enhance the predictive accuracy of financial statement fraud models, particularly in the generation of warning signals for the fraudulent behavior that can serve to support the decision making-process of stakeholders. The distorted word order handicaps the ability of the BOW-based ML benchmarks to offer a concise indication of the “red-flags”. We offered the decision support solution to the auditors that allows a sentence-level indication of text fragments that trigger the classifier to treat the submitted case as fraudulent. The user can select the degree of impact of indicated sentences and improve the timing and accuracy of the audit process.</span></p></section></div><section data-dcnode-id="4864" id="coi0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4867" id="st0165"><span data-dcnode-id="4868" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="4865" id="p0370"><span data-dcnode-id="4866" instrument_node="">None.</span></p></section><section data-dcnode-id="4856" id="s0150"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4862" id="st0170"><span data-dcnode-id="4863" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="4857" id="p0375"><span data-dcnode-id="4861" instrument_node="">Funding: This work was supported by </span><span data-dcnode-id="4859" id="gts0005"><span data-dcnode-id="4860" instrument_node="">Deutsche Forschungsgemeinschaft</span></span><span data-dcnode-id="4858" instrument_node=""> in the scope of the International Research Training Group (IRTG) 1792.</span></p></section><div class="Appendices"
