=""> </span></div><span data-dcnode-id="484" instrument_node="">
</span><div class="entry rte" data-dcnode-id="379"><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Your physician collects personal information about you on a regular basis, from the time you make your first appointment (and fill out all those forms) to each visit you have in their office. Collecting data as a healthcare company is easy, because people know the answers to those questions are crucial to delivering quality care. In many cases, they may already assume their healthcare provider is collecting data responsibly.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="476"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Collecting data as a retailer is a bit trickier.</span></strong><span data-dcnode-id="477" instrument_node=""> Consumers expect personalized service but are weary about giving away information. Why? Well, for starters, giving away a lot of personal data gives a lot of power to the company collecting it. Consumers may ask themselves, “How are you going to use my personal data against me? Will you sell it and then I have to deal with being on a hundred email lists? Will you keep my personal information safe and secure?” Consumers want to feel like they control who has their data. For these reasons, collecting data involves a lot of responsibility.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">It’s also something that most consumers don’t agree with. In fact, according to a University of Pennsylvania study, The Tradeoff Fallacy, consumers are “</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asc.upenn.edu/sites/default/files/TradeoffFallacy_1.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="473" instrument_node="">resigned to give away their information</span></a><span data-dcnode-id="471" instrument_node="">” because they feel powerless to stop the collection of it. The study revealed that consumers are not all right with losing control over their information, and large percentages of them disagree with trading information or shopping habits for discounts or other incentives. This suggests that consumer trust is important when it comes to collecting data about consumers.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">But how do you gain that trust, collect the data you need, and do it responsibly? These </span><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">8 best practices for collecting data responsibly</span></strong><span data-dcnode-id="465" instrument_node=""> will guide you in how to handle their data – and hopefully gain consumers’ trust at the same time.</span></p><span data-dcnode-id="463" instrument_node="">
</span><h2 class="title" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Be transparent</span></h2><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">People want to know how and why you are collecting their data. So tell them. Allow users to opt in or out of data collection, and tell them exactly how the information will be used. Being transparent builds trust. Hiding the data you’re collecting can lead to a public relations nightmare when people are outraged that they were tricked into giving up private information (like search history, online habits, etc.).</span></p><span data-dcnode-id="457" instrument_node="">
</span><h2 class="title" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Speak in plain language</span></h2><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">“Legalese,” highly technical language, and small print make people feel uncomfortable and intimidated by what you’re doing. Speaking in plain language, however, makes your data policies easy to understand, which in turn makes data collection easier. Customers and users then become more comfortable with your brand.</span></p><span data-dcnode-id="451" instrument_node="">
</span><h2 class="title" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Make the data exchange mutually beneficial</span></h2><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">The use of your customer’s information or shopping habits is a huge benefit to your company. But responsible data collection means making use of that data mutually beneficial. According to the University of Pennsylvania study, “91% disagree (77% of them strongly) that “</span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asc.upenn.edu/sites/default/files/TradeoffFallacy_1.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="446" instrument_node="">If companies give me a discount, it is a fair exchange for them to collect information about me without my knowing.</span></a><span data-dcnode-id="444" instrument_node="">”</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Don’t just throw discounts at people and call it a day. Create real value and spell out the benefits. Why do you want them to share their location? Is it to offer up more personalized services? Spell it out.</span></p><span data-dcnode-id="439" instrument_node="">
</span><h2 class="title" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Safeguard your data</span></h2><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Data breaches have serious negative effects on your business, your image, and the safety of your consumers. Data breaches lead to people’s identities being stolen, credits cards being opened in their name without them knowing it, and even fraudulent tax returns being filed. If you’re going to collect all this personal data, it’s your responsibility to safeguard the data you collect.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Safeguarding your data means:</span></p><span data-dcnode-id="430" instrument_node="">
</span><ul data-dcnode-id="416"><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Back up your data in case your systems crash</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Ensure there is no personally identifiable information within your database (make sure it’s all encrypted or use a system so that the information is represented by a number or code instead of the actual personal info)</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Have malware, antivirus software, and firewalls that protect from data breaches (and make sure it’s all up to date)</span></li><span data-dcnode-id="420" instrument_node="">
</span><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Have an emergency plan in the event of a data breach</span></li><span data-dcnode-id="417" instrument_node="">
</span></ul><span data-dcnode-id="415" instrument_node="">
</span><h2 class="title" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Know the regulations</span></h2><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Know the rules and regulations surrounding data collection. This includes regulations enacted by U.S. federal, state, and local governments, as well as international regulatory bodies.</span></p><span data-dcnode-id="409" instrument_node="">
</span><h2 class="title" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Know your boundaries</span></h2><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Be cognizant of how frequently you market to consumers. Just because you have their email or phone number does not mean you are free to spam away. Make your marketing personalized, relevant, and valuable. You should also ensure that you are not crossing boundaries in how you use customer data. Use the data you collect only as promised and retain it only as long as needed.</span></p><span data-dcnode-id="403" instrument_node="">
</span><h2 class="title" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Set data governance policies and guidelines</span></h2><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Data governance refers to policies and guidelines that define acceptable uses of data, authorized access to data, and management of the data. These are internal policies that help govern the entire data management lifecycle. Make sure yours are up to date and make sense for your company and what you use your data for.</span></p><span data-dcnode-id="397" instrument_node="">
</span><h2 class="title" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Ensure data quality</span></h2><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Your data sets need to be checked and cross referenced for data quality. Are the Twitter handles, IP addresses, and mobile numbers of each customer matched up correctly? Have metadata definitions been applied to the proper data sets? Appoint a data steward to be in charge of data quality to ensure the accuracy of your data.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsibledata.io/resources/handbook/assets/slides/introduction-00-slides.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="390" instrument_node="">According to the Responsible Data Forum</span></a><span data-dcnode-id="388" instrument_node="">, collecting data responsibly is “The duty to ensure people’s rights to consent, privacy, security and ownership around the information processes of collection, analysis, storage, presentation and reuse of data, while respecting the values of transparency and openness.” Use these 8 best practices for collecting data responsibly to make sure your data collection practices are on point.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">For more on how you can collect and use data responsibly, or if you have specific questions about whether or not your current data collection practices are up to snuff, </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtslabs.com/contact/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="384" instrument_node="">reach out to us at RTS Labs</span></a><span data-dcnode-id="382" instrument_node="">. It never hurts just to have the conversation.</span></p><span data-dcnode-id="380" instrument_node="">
