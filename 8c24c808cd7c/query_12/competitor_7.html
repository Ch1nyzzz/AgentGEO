</span><div class="fl-module-content fl-node-content" data-dcnode-id="2062"><span data-dcnode-id="2069" instrument_node="">
</span><h1 class="fl-heading" data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Best Practices For Chemical Management</span></span><span data-dcnode-id="2065" instrument_node="">
</span></h1><span data-dcnode-id="2063" instrument_node="">
</span></div><span data-dcnode-id="2061" instrument_node="">
</span></div><span data-dcnode-id="2059" instrument_node="">
</span><div class="fl-module fl-module-fl-post-info fl-node-5cfefd0cb93eb" data-dcnode-id="2041" data-node="5cfefd0cb93eb"><span data-dcnode-id="2058" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="2043"><span data-dcnode-id="2057" instrument_node="">
</span><span class="fl-post-info-date" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">June 27, 2014</span></span><span class="fl-post-info-sep" data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">/</span></span><span class="fl-post-info-author" data-dcnode-id="2050"><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/author/tdiamantidis/"><span data-dcnode-id="2052" instrument_node="">Tony Diamantidis</span></a></span><span class="fl-post-info-sep" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">/</span></span><span class="fl-post-info-comments" data-dcnode-id="2045"><a aria-hidden="true" data-dcnode-id="2046" href="#respond" tabindex="-1"><span data-dcnode-id="2047" instrument_node="">No Comments</span></a></span><span data-dcnode-id="2044" instrument_node=""> </span></div><span data-dcnode-id="2042" instrument_node="">
</span></div><span data-dcnode-id="2040" instrument_node="">
</span><div class="fl-module fl-module-fl-post-content fl-node-5cfefd0cb93e8" data-dcnode-id="1820" data-node="5cfefd0cb93e8"><span data-dcnode-id="2039" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1822"><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2037"></p><h2 data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">For cost savings, regulatory compliance and environmental responsibility</span></h2><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node="">If you ask industrial and laboratory operations managers about their biggest challenges, the answers you’ll hear most often relate to </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/environmental-compliance-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2032" instrument_node="">environmental regulations</span></a><span data-dcnode-id="2030" instrument_node=""> and the </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/chemical-inventory-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2029" instrument_node="">management of chemicals</span></a><span data-dcnode-id="2027" instrument_node="">. And the concern permeates the whole organization as well — according to Accenture and the Conference Board, over one third of 500 top US CEOs named chemical-related Environmental Health and Safety issues among the biggest concerns in their businesses and industries, placing it in the top five on the list of responses. Cost, process, regulatory and safety issues converge around chemical management, making it a critical, complex and cumbersome activity.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">The true cost of a chemical as it completes its lifecycle is much more than the purchase price alone. Additional costs include compliance, inventory management, safety, facilities, and disposal. Management costs can range from $1.00 to $10.00 for every dollar of chemicals purchased. Best practices that address the various aspects of chemical management can significantly reduce the extra costs in a chemical’s lifecycle.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2021" instrument_node="">The chart below represents an average Chemical Lifecycle cost for </span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/ehs-software-industry-solutions/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2020" instrument_node="">corporate and industrial operations</span></a><span data-dcnode-id="2018" instrument_node="">.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><img alt="Chemical Lifecycle Chart" data-dcnode-id="2015" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/wp-content/uploads/2018/05/chemical-lifcycle-labor-and-cost.jpg&amp;raw"></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2012" instrument_node="">Environmental Health and Safety is sometimes viewed as ‘outside’ the business process, and given less attention than other practices. For example, companies often treat procurement of chemicals or hazardous materials the same as they handle any other purchases, without planning for the unique storage, </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/cers-reporting-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2011" instrument_node="">reporting</span></a><span data-dcnode-id="2009" instrument_node="">, and eventual disposal requirements. Although financial data is specifically and meticulously analyzed, the impact of chemical management choices is often neglected. These choices have far reaching effects and can sometimes be catastrophic for an organization. Viewing EH&amp;S as a critical part of the business process and integrating it with other activities can raise efficiency of chemical management and provide a significant advantage in terms of cost savings, safety, risk management and competition.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2003"><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/environmental-heath-and-safety-software-features/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2006" instrument_node="">Implementing Best Practices</span></a><span data-dcnode-id="2004" instrument_node=""> helps this integration of EH&amp;S with the organization’s processes, and supports the strategic or business goals of saving money and growing the business. On the day-to-day level, these operations affect the tactical or management goals of increased safety and decreased legal and regulatory risk. Reviewing the impact, cost savings and benefits become clear.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><h2 data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">fBest Practices for Chemical Management</span></h2><span data-dcnode-id="1999" instrument_node="">
</span><ul data-dcnode-id="1961"><span data-dcnode-id="1998" instrument_node="">
</span><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Purchase only the chemicals and amounts required</span></li><span data-dcnode-id="1995" instrument_node="">
</span><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Reduce inventories and store only what is almost immediately needed</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Improve inter-facility and intra-facility delivery of chemicals</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Reduce infrastructure costs</span></li><span data-dcnode-id="1986" instrument_node="">
</span><li data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Increase environmental regulatory compliance and decrease legal liability</span></li><span data-dcnode-id="1983" instrument_node="">
</span><li data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Facilitate data interchange to and from EHS systems and ERP/MRP systems</span></li><span data-dcnode-id="1980" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Increase operational safety for workers and the community</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Streamline environmental compliance and reporting</span></li><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Enhance a corporate image of responsibility and safety</span></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Minimize hazardous waste disposal</span></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Automate repetitive and low-value tasks</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Conserve human resources for more value-added tasks</span></li><span data-dcnode-id="1962" instrument_node="">
</span></ul><span data-dcnode-id="1960" instrument_node="">
</span><h2 data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">More Best Practices…</span></h2><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1952"><em data-dcnode-id="1954"><strong data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Capture data available at critical junctures of the supply chain</span></strong></em><span data-dcnode-id="1953" instrument_node="">. Companies must integrate Environmental Health and Safety into their process. Data is collected, generated, and modified in purchasing/ERP systems or vendor systems. This data can and should be automatically captured and transferred to an EMIS (Environmental Management Information System). There may be some effort needed to collect and manage the appropriate data, but the payoff by far outweighs this effort.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1950" instrument_node="">When </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1949" instrument_node="">EH&amp;S information is managed by integrated systems</span></a><span data-dcnode-id="1947" instrument_node="">, underlying other departments’ data and programs, it supports best practices in other processes – purchasing, delivery, receipt, inventory management. Improved data will increase compliance efficiency for audits, inspections, permits and reporting.</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Having data readily available makes inspections and audits less intrusive, less threatening and less likely to result in a negative outcome. Using an EMIS to manage critical chemical information and Right-to-Know data ensures that information is available and accurate, and it complies with OSHA and ISO 14000 mandates.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">With improved computer technology, data transfer and compatibility between systems is readily available. </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/employee-workplace-safety-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1940" instrument_node="">Chemical managers</span></a><span data-dcnode-id="1938" instrument_node=""> can select from a full range of user interfaces, from a simple web browser on the production floor, to sophisticated inter-system reporting tools, all accessing the same data. Although organizational needs vary, with some research and analysis, chemical managers can now find viable solutions within their budget to meet EH&amp;S information management needs.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Beware, however: ERP/MRP systems such as those offered by SAP, Oracle, J.D. Edwards and Baan, among others, remain deficient in their environmental management offerings. This is primarily due to the complex, diverse and evolving nature of environmental regulations and the reporting requirements of local, state, federal and international jurisdictions. Organizations that have opted for environmental solutions that have been rolled into ERP/MRP implementations have regularly reported disappointing results. Dedicated environmental management information systems should be used in conjunction with ERP systems. Further, be sure to carefully evaluate the buy-vs-build question. A comprehensive system is complex to develop and difficult to maintain. Studies have shown that a company will break even within one year when using an off-the-shelf, automated solution versus a manual homegrown system.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1928"><em data-dcnode-id="1930"><strong data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Develop preferred vendor relationships.</span></strong></em><span data-dcnode-id="1929" instrument_node=""> This is the surest way to standardize product, ensure delivery and negotiate best prices. Vendors will ensure product flow and preferred price in exchange for the increased efficiency of a “committed” business relationship. Advantages of preferred vendor relationships reach beyond cost savings, as finding and evaluating materials is simplified, electronic payments decrease administrative overhead and vendors become better resources for information. Significantly to chemical management, preferred vendors are often more willing accommodate information exchange in each direction in order to maintain good relationships with dedicated customers. Organizations that have created exclusive or preferred vendor relationships have often negotiated very favorable agreements with chemical suppliers.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1919"><em data-dcnode-id="1924"><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Use online purchasing systems, exchanges, or vendor sites.</span></strong></em><span data-dcnode-id="1923" instrument_node=""> On-line procurement decreases the time and cost of purchasing paperwork. </span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/pricing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1922" instrument_node="">On-line purchasing</span></a><span data-dcnode-id="1920" instrument_node=""> and management allows approval and monitoring of purchases by line managers, and provides purchasing guideline compliance and information interchange. More steps of the purchasing process can be automated, significantly reducing effort. A fortuitous by-product of automated purchasing is the availability of data. All on-line purchasing systems produce data that, sometimes with considerable effort can be downloaded, transferred, and used by a chemical inventory system or EMIS.</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1910"><em data-dcnode-id="1915"><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Track chemicals efficiently.</span></strong></em><span data-dcnode-id="1914" instrument_node=""> Many plants find that using a supply chain management system to closely track incoming material shipments allows them to time and plan delivery more accurately, reducing inventory levels, ensuring smooth operations and supporting environmental compliance goals. Supply chain management can also help optimize shipment methods, routes and vendors for overall cost and time efficiencies. Centralized receiving supports </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/chemical-inventory-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1913" instrument_node="">tracking and management of chemicals</span></a><span data-dcnode-id="1911" instrument_node=""> within the facility, keeping information on inventory levels accurate and up to date. It also simplifies the use of inhouse barcoding of materials for tracking within the facility. Barcode labels are one of the best support tools for inventory control, waste minimization and environmental compliance and reporting. This data shared by an EMIS creates a powerful and efficient tool for EH&amp;S operations.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1901"><em data-dcnode-id="1906"><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Manage inventory well.</span></strong></em><span data-dcnode-id="1905" instrument_node=""> The best way to accurately and efficiently maintain chemical inventory information is to use focused inventory management software or an online application. The best of these systems will interface with purchasing systems, vendors or online suppliers to </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/chemical-inventory-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1904" instrument_node="">maintain dynamic inventory data</span></a><span data-dcnode-id="1902" instrument_node="">. Because chemical inventories have special requirements for information and availability, it is best to gather this information electronically from the originating source as often as possible. This requires the cooperation of several distinct groups: the vendor, the purchasing department, the IT system provider, the IT department and the EH&amp;S department.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">Good inventory management lowers inventory, which requires less space for storage, lower carrying costs and less capital tied up in stored materials. Understanding when, where and how materials are used gives an organization the tools to determine where in the process usage can be reduced, when alternative materials can be introduced and/or which processes/units are good candidates for sharing chemicals. </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/chemical-inventory-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1898" instrument_node="">An effective inventory management system</span></a><span data-dcnode-id="1896" instrument_node=""> can improve the sharing or redistribution of chemicals. Often, line managers purchase a chemical because they simply had no way of knowing someone else in the facility had excess product available. This decreases inventory, storage, and potential for waste disposal because of “expired shelf life”.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1882"><em data-dcnode-id="1890"><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Manage and reduce hazardous waste.</span></strong><span data-dcnode-id="1891" instrument_node=""> </span></em><span data-dcnode-id="1889" instrument_node="">The obvious first step to cost-savings in waste disposal is to minimize the waste. </span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/hazardous-waste-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1888" instrument_node="">Chemical waste disposal</span></a><span data-dcnode-id="1886" instrument_node=""> is the most expensive cost associated with a chemical, and sometimes it is greater than the cost to purchase that chemical! Process evaluation with an understanding of the costs associated with disposal of hazardous waste or regulated materials will uncover savings opportunities in this area. Efficient inventory of hazardous materials necessarily decreases the amount of waste disposed. When </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/hazardous-waste-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1885" instrument_node="">hazardous waste must be disposed</span></a><span data-dcnode-id="1883" instrument_node="">, there are still ways to save money. Electronic transfer of data and documents streamlines the process and supports the verification process, ensuring all aspects of generating, storing, shipping and destroying hazardous waste receive proper attention and the company’s responsibilities are covered in the event of inspection, audit or emergency.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">A good relationship with a TSDF or waste disposal company can improve operations as well. Many waste disposal companies now offer online approval of waste streams, automated scheduling for pick-up, and regulatory data transfer. There are not many players in this industry, and some are much better at this than others, so careful selection of a vendor is very important. Recycling, whenever possible, is another great way of saving money, limiting waste and contributing in a positive way to the environment and the community.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1873"><em data-dcnode-id="1875"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Calculate and re-engineer operations.</span></strong></em><span data-dcnode-id="1874" instrument_node=""> Process engineering supported by ongoing information streams can further enhance efficiency of chemical use. Calculating the total costs associated with chemical management and evaluating the products themselves in lean-engineering or waste-minimization terms may suggest better processes or less hazardous substitutes. This can affect the efficiency of many areas of chemical management and environmental compliance by dealing with associated costs and issues before they arise.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">An evolving market in chemical management is the outsourcing of this operation to Chemical Management Services’ (CMS’s). Chemical suppliers’ roles expand from simple sale and delivery of chemicals to full evaluation and management of their customers’ on-site products. Chemicals are stored in quantity at the vendor until the customer needs a chemical for a specific task. CMS’s completely take over responsibility for their clients’ chemical inventories, MSDS’s, safety, and hazardous waste, and generate required regulatory and management reports. These providers recognize the absolute necessity of a comprehensive information infrastructure supporting their materials management operations.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1860"><em data-dcnode-id="1865"><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Invest in information management systems.</span></strong><span data-dcnode-id="1866" instrument_node=""> </span></em><span data-dcnode-id="1864" instrument_node="">Companies’ chemical managers and the EH&amp;S community recognize that the most important investment in the next decade will be technology for information management. The good news for chemical managers is that technology innovation is offering data interfaces and </span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/environmental-compliance-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1863" instrument_node="">reporting capabilities</span></a><span data-dcnode-id="1861" instrument_node=""> previously impossible. It has never been easier or efficient to exchange data with external sources such as vendors or with internal sources, such as ERP/MRP or purchasing systems. User-friendly reporting tools can access data from a number of sources and fulfill regulatory reporting and support business analysis. Web interfaces for line personnel offer easy access to critical real-time and accurate information.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">One important consideration as you embark, or re-embark into information management solutions is determining who will be responsible for the integration and support of the information that needs to be managed. In-house IT departments traditionally frowned upon outside vendors taking away responsibility from them; with the opportunities and pressures of new technologies, however, and especially with the emergence of the web, outsourcing EH&amp;S implementation projects has become a preferred option. Select an EH&amp;S vendor who has “domain experience”, or, in simpler terms, a clear understanding of the environmental needs and benefits that organizations have and who will be willing to partner with you as your requirements and expectations change.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><h2 data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The Bottom Line</span></h2><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">The costs of managing chemicals are far more than just the product price, but the life-cycle management of chemicals can be optimized to cut these peripheral costs. By adopting best practices, the chemical management process is more integrated into the business process, becoming a strategic advantage to the organization, raising efficiency on a number of fronts, decreasing legal liability and risk and improving plant/laboratory safety, as well as offering bottom line cost savings. Improved information management systems are becoming more functional and less costly, making these process improvements possible. Such systems are still an investment, and costs of re-engineering operations and changing current processes must be considered, but the savings of a concerted, focused effort to improve chemical management are significant, and the ROI quickly justifies the costs.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">The chart below offers a snapshot of efficiencies and cost-benefits that can be achieved through the implementation of an integrated, fully-functional Environmental Management System.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><img alt="EMS Efficiencies Chart" data-dcnode-id="1846" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/wp-content/uploads/2018/05/Value-of-EMS-Efficiencies.jpg&amp;raw"></p><span data-dcnode-id="1844" instrument_node="">

</span><h2 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Scope</span></h2><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The company under the name "SFS Chemical Safety Inc. based at 5940 S Rainbow Blvd., Las Vegas, NV 89118, USA, guarantees that your privacy is respected when you navigate to its website.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">This Cookie Policy explains what cookies are and how they are used on the website </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/"><span data-dcnode-id="554" instrument_node="">https://chemicalsafety.com/</span></a><span data-dcnode-id="552" instrument_node="">, which belongs to the Company and which is related to its activity (hereinafter referred to as the 'Website'). This Policy provides information about the types of cookies and other digital tracking technologies we use, the information we collect through them, and how they are used by the Company when you visit its Website.</span></p><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">What are Cookies?</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Cookies are small data files, that a website you visit, like ours, can install and store on your computer, or your mobile terminal device (tablet, smartphone, laptop). Because of cookies, the website remembers your actions while navigating. The use of cookies as trackers is supported by various browsers such as Google Chrome, Internet Explorer, Mozilla Firefox, Safari, Opera, etc. Nevertheless, you can disable them, if you want, or delete them afterwards.</span></p><span data-dcnode-id="544" instrument_node="">
</span><h2 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Functions of Cookies</span></h2><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">In regard to their type, cookies perform functions of measuring website traffic, recording number of visitors, language, time of entry, geographical origin, device identifiers (e.g. operating system, screen resolution, etc.), keywords you used, attempts to enter, etc. Other cookies are personal data and others are not. Some cookies are technically necessary, while others serve commercial and advertising purposes.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h2 data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Types of Cookies</span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">There are various types of cookies, such as functional, technical, user identification, advertising, etc.</span></p><span data-dcnode-id="532" instrument_node="">
</span><ul data-dcnode-id="521"><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">First party cookies are installed by the website you visit and are readable only by it.</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Persistent cookies are those stored on your computer and are not automatically deleted once you close your browser.</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Session cookies are deleted when you close your browser. Every time you visit our Website, you will be asked to accept or reject the cookies we use. If you consciously choose to accept them, our Website will memorize your preferences (such as username, language) for a specific period of time. Thus, you will not have to insert the same information when you navigate to our Website during the same visit / session.</span></li><span data-dcnode-id="522" instrument_node="">
</span></ul><span data-dcnode-id="520" instrument_node="">
</span><h2 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Legal Status of Use and Storage of Cookies</span></h2><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">In addition to the strictly necessary cookies, each website may install all other categories of cookies only if you, as a user, provide your express consent by opting-in (in compliance with the&nbsp; provisions set out by the EU General Data Protection Regulation 2016/679 - GDPR) and after clear and comprehensive information about this installation, its usefulness, the consequences regarding to user's experience in case of declining cookies, the purpose of processing, the exercise of the right of access and any recipients of the data according to the Supervisory Authority’s guidelines and recommendations,. This consent may be given via the browser cookie settings or by another application’s preferences. For this purpose, we provide you with the following detailed information about the cookies used on our Corporate Website. Please keep in mind that you can change your preference settings at any time here.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">How We Use Cookies and Similar Tracking Technologies</span></h2><span data-dcnode-id="511" instrument_node="">

</span><h2 data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Log Files</span></h2><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Due to the nature and mode of operation of the Internet, as soon as you visit our website, our server records in special files (log files) your IP address (Internet protocol), which is personal data. In addition, log files also help us to record the type of browser and operating system you are using and other information about your on-line visit, such as the URL from which you arrived at our website, the date and time of your visit. These data are stored exclusively for the absolutely necessary period in order to ensure the security of networks, information and services from accidental events or illegal or malicious actions that endanger the availability, authenticity, integrity and confidentiality of the data stored or transmitted.</span></p><span data-dcnode-id="167" instrument_node="">
</span><h2 data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Social Media</span></h2><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Our Website uses hyperlinks from Facebook, LinkedIn, Twitter and YouTube social networks. Users can identify these hyperlinks by the respective logo or wording of the social network. When users visit our Website, the administrators of the social media plug-in on our Website may place cookies on your computer that allow them to identify you as a user on websites owned by them, their affiliates and partners after you visit our Website, or that allow them to add the information collected from your visit to our Website with your previous activity on those websites. The social media plug-ins may collect information about you, as a user, regardless of whether you interact specifically with the plug-in or not and may allow social media companies to share information about your web browsing information with some of their other users.</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">It is beyond our control what information is collected by the social media administrator or the privacy practices adopted by these social media companies when you are directed to their websites. You can find information about the purpose and the extent of obtained information, as well as how the information is further processed and used by social networks, along with your rights and optional settings, in the privacy notices of the respective social networks.</span></p><span data-dcnode-id="158" instrument_node="">
</span><h2 data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Third Party Providers</span></h2><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Our website displays content from external providers such as Facebook, Twitter, LinkedIn and YouTube. To display third-party content, you must first accept the terms and conditions set by the external partners themselves, including the third-party cookies policy, which is beyond our control. Without such display, third-party cookies will not be installed on your device.</span></p><span data-dcnode-id="152" instrument_node="">
</span><h2 data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Visitor/ User Consent</span></h2><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Mandatory acceptance of cookies is not a condition of entry to our Website.&nbsp; You may, in any case, navigate freely by controlling and accepting, or not, all, or part of our cookies, or those of third parties, whose cookies policy is determined exclusively by them, without our involvement and legal responsibility.</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">The Cookies Banner provides easy access to the accept button of each cookie with detailed information about it, as well as a link to this Cookie Policy of our website, where each user can read all the necessary information that will facilitate the decision on whether or not to give consent by accepting the installation of each cookie. Disabling trackers is as easy as accepting them at any time, with the same number of clicks and the same font via the Cookies Banner.</span></p><span data-dcnode-id="143" instrument_node="">

</span><p data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">Additionally, we do not share personal data that we may collect through cookies with any third party. Access to personal data may be given to trusted external service providers engaged by Chemical Safety, such as companies providing IT services and website hosting, only to the extent necessary for the provision of their services to us. These service providers act as data processors in relation to personal data collected through cookies and are bound to process this personal data exclusively on behalf and under our instructions and to implement strict security measures for protecting such personal data.</span></p><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="68"><span data-dcnode-id="72" instrument_node="">For more information about the processing of your personal data and your rights, please visit our </span><a data-dcnode-id="70" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemicalsafety.com/privacy/" rel="noopener" target="new"><span data-dcnode-id="71" instrument_node="">Privacy Policy</span></a><span data-dcnode-id="69" instrument_node=""> .</span></p><span data-dcnode-id="67" instrument_node="">
