i><li data-dcnode-id="2084"><a data-dcnode-id="2098" href="#section-56"><span data-dcnode-id="2099" instrument_node="">During Harvest</span></a><ol data-dcnode-id="2085"><li data-dcnode-id="2095"><a data-dcnode-id="2096" href="#section-57"><span data-dcnode-id="2097" instrument_node="">Best Practices for Harvesting</span></a></li><li data-dcnode-id="2092"><a data-dcnode-id="2093" href="#section-58"><span data-dcnode-id="2094" instrument_node="">Reduce Risks in All Packing Areas</span></a></li><li data-dcnode-id="2089"><a data-dcnode-id="2090" href="#section-59"><span data-dcnode-id="2091" instrument_node="">Packing Sheds</span></a></li><li data-dcnode-id="2086"><a data-dcnode-id="2087" href="#section-60"><span data-dcnode-id="2088" instrument_node="">Pest Management</span></a></li></ol></li><li data-dcnode-id="2068"><a data-dcnode-id="2082" href="#section-61"><span data-dcnode-id="2083" instrument_node="">After Harvest</span></a><ol data-dcnode-id="2069"><li data-dcnode-id="2079"><a data-dcnode-id="2080" href="#section-62"><span data-dcnode-id="2081" instrument_node="">Best Practices for Postharvest</span></a></li><li data-dcnode-id="2076"><a data-dcnode-id="2077" href="#section-63"><span data-dcnode-id="2078" instrument_node="">Water and Ice</span></a></li><li data-dcnode-id="2073"><a data-dcnode-id="2074" href="#section-64"><span data-dcnode-id="2075" instrument_node="">Transportation</span></a></li><li data-dcnode-id="2070"><a data-dcnode-id="2071" href="#section-65"><span data-dcnode-id="2072" instrument_node="">Corrective Actions</span></a></li></ol></li><li data-dcnode-id="2065"><a data-dcnode-id="2066" href="#section-66"><span data-dcnode-id="2067" instrument_node="">Summary</span></a></li><li data-dcnode-id="2062"><a data-dcnode-id="2063" href="#section-67"><span data-dcnode-id="2064" instrument_node="">References</span></a></li><li data-dcnode-id="2059"><a data-dcnode-id="2060" href="#section-68"><span data-dcnode-id="2061" instrument_node="">Resources</span></a></li></ol></li></ol></div><div data-dcnode-id="814" itemprop="articleBody"><a data-dcnode-id="2054" name="section-0"></a><h2 data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Good Agricultural Practices, Worker Hygiene, and Sources of Contamination</span></h2><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">The 2011 Food Safety Modernization Act (FSMA) mandates science-based approaches to evaluating food safety risks on produce farms and in food processing facilities. The suite of new regulations issued under the law includes "Standards for the Growing, Harvesting, Packing, and Holding of Produce for Human Consumption," commonly referred to as the Produce Safety Rule. The FSMA Produce Safety Rule grants new authority to the U.S. Food and Drug Administration (FDA) to develop and enforce farm food safety standards, known as Good Agricultural Practices (GAPs), for commercial growers, harvesters, and packers of fruits, vegetables, and mushrooms intended or likely to be eaten raw. Unlike current commercial third-party GAPs audit program, a written food safety plan is not required under the Produce Safety Rule. However, microbial metrics are mandated for reducing food safety risks related to crop contact with agricultural water, raw and composted animal manure, and domestic and wild animals; worker health and hygiene practices; and harvest and postharvest sanitation.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2049" instrument_node="">The Produce Safety Rule applies only to those farms that are not exempt (for reasons of scale and marketing channels) and that do grow produce covered under the rule. For those farms, the Produce Safety Rule specifically mandates farm food safety training that is conducted in a manner that is easily understood by those workers being trained. Training is required at two levels. At least one supervisor or responsible party on the farm must have successfully completed food safety training at least equivalent to that received under standardized curriculum recognized as adequate by the FDA. The </span><a class="external-link" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producesafetyalliance.cornell.edu/" tabindex="488" title=""><span data-dcnode-id="2048" instrument_node="">Produce Safety Alliance</span></a><span data-dcnode-id="2046" instrument_node=""> (PSA) was charged by FDA to develop a standardized GAPs curriculum against which all others are benchmarked.</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">The regulation further states that for these farms, all personnel who handle covered produce or food-contact surfaces must receive farm food safety and hygiene training upon hiring and at least once annually. FDA has stated that traditional training activities may not work for all groups, and there are certain instances in which alternative curricula and training deliveries may be appropriate.</span></p><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">The purpose of this training booklet is to help food safety managers who attended the Food Safety Modernization Act's Produce Safety Rule training to communicate the knowledge to others on the farm. This booklet includes sections on the topics most commonly needed for worker training:</span></p><ul data-dcnode-id="2034"><li data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Introduction to Good Agricultural Practices (GAPs)</span></li><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Worker Health and Hygiene</span></li><li data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Preventing Contamination Before, During, and After Harvest</span></li></ul><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">These sections can be used individually or as a series as a basis for training workers. For this reason, some information is covered in more than one section.</span></p><a data-dcnode-id="2031" name="section-1"></a><h2 data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Introduction To Good Agricultural Practices (GAPs)</span></h2><a data-dcnode-id="2028" name="section-2"></a><h3 data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Why Are GAPs Important?</span></h3><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Keeping produce safe is important because it affects everyone in the food system:</span></p><ul data-dcnode-id="2011"><li data-dcnode-id="2020"><strong data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Consumers</span></strong><span data-dcnode-id="2021" instrument_node="">. We don't want people to get sick or die because of food they eat.</span></li><li data-dcnode-id="2016"><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Businesses that buy and sell fresh produce</span></strong><span data-dcnode-id="2017" instrument_node="">. We don't want these businesses to have to throw away a lot food that might be contaminated.</span></li><li data-dcnode-id="2012"><strong data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Farmers</span></strong><span data-dcnode-id="2013" instrument_node="">. We don't want farmers to be stuck with unsold crops because consumers are afraid to buy them.</span></li></ul><a data-dcnode-id="2010" name="section-3"></a><h3 data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Foodborne Illness in the United States</span></h3><ul data-dcnode-id="1999"><li data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">One in six people in the United States get sick from eating contaminated food each year.</span></li><li data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">48 million cases of foodborne illness are reported each year.</span></li><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">128,000 hospitalizations occur from contaminated food.</span></li><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">3,000 deaths result from foodborne illness each year.</span></li></ul><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">It's difficult to determine exactly how many people become ill each year from eating food. Most cases are considered just minor bouts of the "stomach flu" or indigestion. However, some cases are serious enough to require hospitalization or even cause death.</span></p><a data-dcnode-id="1996" name="section-4"></a><h3 data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Microorganisms of Concern in Fresh Produce</span></h3><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Foodborne illnesses are caused by microorganisms that get into our digestive systems when we eat contaminated food. Since these microorganisms are too small to see with the naked eye, you need a microscope to see them.</span></p><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Three types of microorganisms cause foodborne illnesses: bacteria, viruses, and parasites. Some examples are:</span></p><ul data-dcnode-id="1962"><li data-dcnode-id="1977"><span data-dcnode-id="1989" instrument_node="">Bacteria: pathogenic </span><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">E. coli</span></em><span data-dcnode-id="1986" instrument_node="">, </span><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Salmonella</span></em><span data-dcnode-id="1983" instrument_node="">, </span><em data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Shigella</span></em><span data-dcnode-id="1980" instrument_node="">, </span><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Listeria</span></em></li><li data-dcnode-id="1973"><span data-dcnode-id="1976" instrument_node="">Viruses: Hepatitis A, </span><em data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Norovirus</span></em></li><li data-dcnode-id="1963"><span data-dcnode-id="1972" instrument_node="">Parasites: </span><em data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Giardia</span></em><span data-dcnode-id="1969" instrument_node="">, </span><em data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Cryptosporidium</span></em><span data-dcnode-id="1966" instrument_node="">, </span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Cyclospora</span></em></li></ul><p data-dcnode-id="1954"><span data-dcnode-id="1961" instrument_node="">Note that not all strains of </span><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">E. coli</span></em><span data-dcnode-id="1958" instrument_node=""> make us sick. Beneficial strains of </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">E. coli</span></em><span data-dcnode-id="1955" instrument_node=""> in our intestinal tracts are very good for us. It is important to understand that:</span></p><ul data-dcnode-id="1947"><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">These microorganisms are very small.</span></li><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">They can hide on the surface of fruits and vegetables.</span></li><li data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">If we eat fresh or raw fruits or vegetables that are contaminated with these microbial pathogens, we can get sick—sometimes very sick.</span></li></ul><a data-dcnode-id="1946" name="section-5"></a><h3 data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Fresh Produce Outbreaks and Recalls</span></h3><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">We see foodborne illness outbreaks with many kinds of foods, including dairy, meats, and prepared foods. This publication will focus on fruits and vegetables, specifically the ones we eat without cooking.</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The chart below shows the number of foodborne illness outbreaks associated with fresh produce from 1996 to 2014.</span></p><p class="discreet" data-dcnode-id="1931"><span data-dcnode-id="1939" instrument_node=""> </span><a class="light-box image-inline" data-dcnode-id="1935" data-lightbox="show" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/FDAOutbreakspiechart61bea4b01067f.jpg" tabindex="489" title=""><span data-dcnode-id="1938" instrument_node=""> </span><img class="image-inline" data-dcnode-id="1937" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/FDAOutbreakspiechart61bea4b01067f.jpg&amp;raw"><span data-dcnode-id="1936" instrument_node=""> </span></a><span data-dcnode-id="1934" instrument_node=""> </span><br data-dcnode-id="1933"><span data-dcnode-id="1932" instrument_node="">Credit: Produce Safety Alliance</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">According to a recent report from the U.S. Congressional Research Office, the number of single- and multistate outbreaks of foodborne illness associated with fresh produce between 1998 and 2016 ranged from 30 to 60 per year and sickened from 900 to nearly 3,000 per year. While most of the outbreaks were caused by contaminated leafy greens (lettuce, spinach, other salad greens) and sprouts (alfalfa or bean), a lot of other fruits and vegetables have also caused outbreaks, such as tomatoes, berries, herbs, cucumbers, green onions, and mangoes, among others.</span></p><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Let's look at some of the most significant foodborne illness outbreaks associated with fresh produce from 2011 through 2014.</span></p><a data-dcnode-id="1926" name="section-6"></a><h4 data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">2011</span></h4><ul data-dcnode-id="1896"><li data-dcnode-id="1915"><strong data-dcnode-id="1920"><em data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">E. coli</span></em><span data-dcnode-id="1921" instrument_node=""> O157:H7 on strawberries in Northwest Oregon</span></strong><span data-dcnode-id="1919" instrument_node="">. The strawberries were resold to many different farm stands, so they became very difficult to track even after the strawberries were known to be the source of the </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">E. coli</span></em><span data-dcnode-id="1916" instrument_node=""> contamination. Fifteen people became ill and one death occurred as a result of this outbreak.</span></li><li data-dcnode-id="1906"><strong data-dcnode-id="1911"><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">E. coli</span></em><span data-dcnode-id="1912" instrument_node=""> O14:H4 on fenugreek sprouts in Europe</span></strong><span data-dcnode-id="1910" instrument_node="">. We saw a huge outbreak from a pathogenic strain of </span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">E. coli</span></em><span data-dcnode-id="1907" instrument_node=""> that resulted in 810 people becoming ill and 39 deaths. It took investigators a long time to track the source, which ended up being seeds of the herb fenugreek that were used to grow sprouts. Because people did not know the source of the contamination for quite some time, a lot of farmers lost crops of lettuce, tomatoes, and cucumbers because people were afraid to buy them</span></li><li data-dcnode-id="1897"><strong data-dcnode-id="1902"><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Listeria monocytogenes</span></em><span data-dcnode-id="1903" instrument_node=""> on cantaloupes in Colorado</span></strong><span data-dcnode-id="1901" instrument_node="">. This big outbreak was caused by the bacterium </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Listeria</span></em><span data-dcnode-id="1898" instrument_node=""> and caused more than 130 illnesses and 28 deaths.</span></li></ul><a data-dcnode-id="1895" name="section-7"></a><h4 data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">2012</span></h4><ul data-dcnode-id="1868"><li data-dcnode-id="1887"><strong data-dcnode-id="1889"><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">E. coli</span></em><span data-dcnode-id="1890" instrument_node=""> O26 on raw clover sprouts grown in the United States</span></strong><span data-dcnode-id="1888" instrument_node="">. This outbreak resulted in 29 people becoming sick.</span></li><li data-dcnode-id="1881"><strong data-dcnode-id="1883"><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">E. coli</span></em><span data-dcnode-id="1884" instrument_node=""> O104:H4 on mangoes grown in Mexico</span></strong><span data-dcnode-id="1882" instrument_node="">. While no deaths occurred, 127 people became ill and 33 were hospitalized.</span></li><li data-dcnode-id="1875"><strong data-dcnode-id="1877"><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">E. coli</span></em><span data-dcnode-id="1878" instrument_node=""> O157:H7 on spinach and spring mix grown in Massachusetts</span></strong><span data-dcnode-id="1876" instrument_node="">. This outbreak caused 28 people to become ill.</span></li><li data-dcnode-id="1869"><strong data-dcnode-id="1871"><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Salmonella</span></em><span data-dcnode-id="1872" instrument_node=""> on cantaloupe in Indiana</span></strong><span data-dcnode-id="1870" instrument_node="">. As a result of this outbreak, 261 people became ill, 94 people were hospitalized, and three people died. In fact, this farm went bankrupt and its farmers served time in jail for negligence.</span></li></ul><a data-dcnode-id="1867" name="section-8"></a><h4 data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">2013</span></h4><ul data-dcnode-id="1842"><li data-dcnode-id="1859"><strong data-dcnode-id="1861"><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Salmonella</span></em><span data-dcnode-id="1862" instrument_node=""> spp. on cucumbers grown in Mexico</span></strong><span data-dcnode-id="1860" instrument_node="">. Seventeen people were hospitalized.</span></li><li data-dcnode-id="1855"><strong data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Hepatitis A on pomegranate seeds grown in Turkey</span></strong><span data-dcnode-id="1856" instrument_node="">. This outbreak lead to 162 people becoming sick and 71 people being hospitalized.</span></li><li data-dcnode-id="1849"><strong data-dcnode-id="1851"><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">E. coli</span></em><span data-dcnode-id="1852" instrument_node=""> O157:H7 on prepackaged salad mix</span></strong><span data-dcnode-id="1850" instrument_node="">. While the source of this outbreak is unknown, it resulted in 33 illnesses.</span></li><li data-dcnode-id="1843"><strong data-dcnode-id="1845"><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Cyclospora</span></em><span data-dcnode-id="1846" instrument_node=""> on cilantro grown in Mexico</span></strong><span data-dcnode-id="1844" instrument_node="">. This outbreak resulted in 631 people becoming sick.</span></li></ul><a data-dcnode-id="1841" name="section-9"></a><h4 data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">2014</span></h4><ul data-dcnode-id="1827"><li data-dcnode-id="1832"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Mung bean sprouts grown in Illinois and Michigan</span></strong><span data-dcnode-id="1836" instrument_node="">. This outbreak caused five cases of listeriosis that required hospitalization and two deaths. FDA inspection and testing of the facility where the sprouts were grown yielded </span><em data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">L. monocytogenes</span></em><span data-dcnode-id="1833" instrument_node="">–positive isolates from the sprouts, the irrigation water used from sprout production, and the growing environment.</span></li><li data-dcnode-id="1828"><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Multistate outbreak of listeriosis</span></strong><span data-dcnode-id="1829" instrument_node="">. Thirty-four hospitalizations and seven deaths were attributed to consumption of prepackaged caramel apples that had been packed under unsanitary conditions in California.</span></li></ul><a data-dcnode-id="1826" name="section-10"></a><h3 data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Example of the Cost of Food Safety Problems</span></h3><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Foodborne illness outbreaks can be very costly to the growers involved and often to growers who had nothing to do with the contamination. Take a look at these examples:</span></p><ul data-dcnode-id="1793"><li data-dcnode-id="1815"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">$5 million</span></strong><span data-dcnode-id="1819" instrument_node=""> from </span><em data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">E. coli</span></em><span data-dcnode-id="1816" instrument_node=""> on lettuce from the Salinas Valley, California, in 2003. In an out-of-court settlement, the company involved was ordered to pay out $5 million to people who had eaten the lettuce.</span></li><li data-dcnode-id="1808"><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">$100 million in sales</span></strong><span data-dcnode-id="1812" instrument_node=""> from </span><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Salmonella</span></em><span data-dcnode-id="1809" instrument_node=""> on tomatoes in 2008. Tomato growers lost an estimated $100 million in sales, but then it was discovered that the source of the outbreak was actually jalapeno peppers in salsa.</span></li><li data-dcnode-id="1801"><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">$100 million in sales</span></strong><span data-dcnode-id="1805" instrument_node=""> from </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">E. coli</span></em><span data-dcnode-id="1802" instrument_node=""> on spinach from California in 2006. This severe outbreak essentially stopped all sales of spinach, even sales to processors. Total losses were estimated at $100 million across the whole spinach industry.</span></li><li data-dcnode-id="1794"><strong data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Cancellation of all exports</span></strong><span data-dcnode-id="1798" instrument_node=""> due to </span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Cyclospora</span></em><span data-dcnode-id="1795" instrument_node=""> on raspberries imported from Guatemala in 1996 and 1997. For some time, Guatemala could not export raspberries to the United States.</span></li></ul><a data-dcnode-id="1792" name="section-11"></a><h3 data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">What Have We Learned from Outbreaks?</span></h3><ul data-dcnode-id="1777"><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Many people can get sick.</span></li><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Too many people die.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Contaminated produce can come from the United States or other countries.</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Finding the source can be challenging.</span></li><li data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Blame can fall on uncontaminated fruits or vegetables.</span></li><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Outbreaks are expensive.</span></li></ul><a data-dcnode-id="1776" name="section-12"></a><h3 data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Produce Safety Challenges</span></h3><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Many fruits and vegetables are consumed raw, with no cooking or "kill step" to destroy pathogens that may be on the produce.</span></p><ul data-dcnode-id="1765"><li data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">It is difficult to know contamination has occurred because events are sporadic and affect only small portions of the crop.</span></li><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Microorganisms are not easily seen, so contamination is difficult to detect visually.</span></li><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Many fruits and vegetables have rough surfaces, folded areas, and stem scars that provide places for pathogens to hide.</span></li></ul><p data-dcnode-id="1759"><span data-dcnode-id="1764" instrument_node=""> </span><a class="light-box image-inline" data-dcnode-id="1760" data-lightbox="show" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/Saltgraphic61bea4b012553.jpg" tabindex="490" title=""><span data-dcnode-id="1763" instrument_node=""> </span><img class="image-inline" data-dcnode-id="1762" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/Saltgraphic61bea4b012553.jpg&amp;raw"><span data-dcnode-id="1761" instrument_node=""> </span></a></p><a data-dcnode-id="1758" name="section-13"></a><h3 data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Size of Microorganisms</span></h3><p data-dcnode-id="1751"><span data-dcnode-id="1755" instrument_node="">Just how small are microorganisms? To give you some context, we can compare microorganisms to a grain of salt. The diagram below is drawn to scale. The large red circle represents the size of a grain of salt. The three smaller circles represent the relative size of various types of microorganism. After the grain of salt, the next largest is the yeast cell, which is very small (about 5 microns). Mold spores are tinier. The tiniest red dot represents a cell of </span><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Listeria monocytogenes</span></em><span data-dcnode-id="1752" instrument_node="">, a human pathogen.</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Compared to the salt grain, we can see just how tiny these microorganisms are. This shows how easily they may hide in crevices on the surface of fruits and vegetables and on farm and packing house equipment.</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">So, microorganisms are always present on produce, but difficult to remove from their cracks and crevices and other hiding places.</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Consider a spinach leaf, which is about 50,000 microns (or 2 inches) long and has many breathing holes, or stomata, which allow carbon dioxide to enter and oxygen to exit the interior of the leaf. These holes are anywhere from 5 to 25 microns long. That's only a fraction of the width of a human hair. Very tiny bacteria (the gray rod shapes in the image below) can even hide inside leaf stomata, which help plants breathe.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1744" instrument_node=""> </span><a class="light-box image-inline" data-dcnode-id="1740" data-lightbox="show" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/Micro_organisms61bea4b013e04.jpg" tabindex="491" title=""><span data-dcnode-id="1743" instrument_node=""> </span><img class="image-inline" data-dcnode-id="1742" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/media/wysiwyg/extensions/catalog_product/f/3/7058c299b249f88cc71b82a26d8865/Micro_organisms61bea4b013e04.jpg&amp;raw"><span data-dcnode-id="1741" instrument_node=""> </span></a></p><a data-dcnode-id="1738" name="section-14"></a><h4 data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Prevention Is the Key!</span></h4><ul data-dcnode-id="1731"><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">The focus of produce safety is on preventing contamination from occurring.</span></li><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Once present, microbial contaminants are very difficult to remove.</span></li></ul><a data-dcnode-id="1730" name="section-15"></a><h3 data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">What Can Be Done on the Farm? Use Good Agricultural Practices!</span></h3><a data-dcnode-id="1727" name="section-16"></a><h4 data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">What Are Good Agricultural Practices?</span></h4><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Steps to prevent on-farm contamination of fruits and vegetables are known as Good Agricultural Practices (GAPs). These are ways to prevent contamination of fresh produce from harmful microorganisms, such as:</span></p><ul data-dcnode-id="1712"><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Salmonella</span></li><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Pathogenic E. coli</span></li><li data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Listeria</span></li><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Viruses</span></li><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Parasites</span></li></ul><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">GAPs are just commonsense recommendations that protect the people who eat your food, and protect your farm business from the economic consequences of food contamination. Most likely you are already practicing recommended GAPs on your farm.</span></p><a data-dcnode-id="1709" name="section-17"></a><h4 data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">GAPs and Food Safety</span></h4><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Produce safety affects and is critical to every fruit and vegetable grower because food that consumers will eat is produced on their farms.</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Growers are the key to produce safety on a farm. They are the major decision-makers for their farms because only they know their day-to-day activities—from production practices, to who works on the farm, and all of the other details involved in running a successful business. For this reason, growers need to be involved in assessing food safety risks and developing the farm's food safety plan. Making the decision to do something on the farm is up to the growers because they know their farms best.</span></p><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Actions to reduce food safety risks impact not only the financial viability of farms but also the health and safety of those who consume the produce grown. All farms, regardless of size, location, or commodities grown, can reduce food safety risks.</span></p><a data-dcnode-id="1700" name="section-18"></a><h4 data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Contamination Sources</span></h4><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">First, we must understand the potential sources of the microbes on the farm. The four main contamination sources are humans, animals, water, and soil amendments.</span></p><ul data-dcnode-id="1679"><li data-dcnode-id="1692"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Humans</span></strong><span data-dcnode-id="1693" instrument_node=""> can carry pathogens and spread them to produce, food-contact surfaces, or other people while they work on the farm. If they work when they're sick, lack training in proper handwashing techniques, and do not have access to adequate toilet facilities, workers can spread pathogens to produce when they handle fruits and vegetables. Contamination may also occur from an illness or injury that results in blood on produce.</span></li><li data-dcnode-id="1688"><strong data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Animals</span></strong><span data-dcnode-id="1689" instrument_node="">, both domesticated (e.g., cattle, chickens, pigs, family pets) and wild (e.g., deer, geese, wild pigs), can carry and transmit human pathogens to produce in their feces, and spread contamination by tracking feces through the field as they move. Produce can also be contaminated directly or indirectly by feces through contamination of water or cross-contamination from movement of wildlife.</span></li><li data-dcnode-id="1684"><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Water</span></strong><span data-dcnode-id="1685" instrument_node=""> is an excellent carrier of pathogens and can contaminate entire fields or large amounts of produce. Surface waters, such as rivers, ponds, and lakes, have a higher risk of carrying pathogens. Runoff and flooding may contaminate entire fields. Water must be of appropriate quality (microbial load) for its intended use. For example, water used for spraying a crop close to harvest will need to have a lower concentration of microbes than water used to irrigate a crop that has just been planted.</span></li><li data-dcnode-id="1680"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Soil amendments</span></strong><span data-dcnode-id="1681" instrument_node="">, especially raw manure or other biological components of animal origin that have not been treated or have been improperly treated to reduce microbial risks, are very high produce/food safety risks. We will cover this very important topic in more detail in another section.</span></li></ul><a data-dcnode-id="1678" name="section-19"></a><h4 data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">GAPs Recommendations</span></h4><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Since soil, water, hands, and surfaces are the primary sources of contamination, recommended Good Agricultural Practices can be boiled down to four basic points: clean soil, clean water, clean hands, and clean surfaces.</span></p><ul data-dcnode-id="1657"><li data-dcnode-id="1670"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Clean soil</span></strong><span data-dcnode-id="1671" instrument_node="">: take steps to reduce the possibility of transferring microbial contaminants from the soil to the crop.</span></li><li data-dcnode-id="1666"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Clean water</span></strong><span data-dcnode-id="1667" instrument_node="">: make sure water used in different steps of crop production, harvest, and packing is not a source of contamination.</span></li><li data-dcnode-id="1662"><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Clean hands</span></strong><span data-dcnode-id="1663" instrument_node="">: applies to workers and their use of good personal hygiene in the field and packing house; be sure to provide clean facilities for workers and visitors.</span></li><li data-dcnode-id="1658"><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Clean surfaces</span></strong><span data-dcnode-id="1659" instrument_node="">: make sure that all packing lugs, bins, work surfaces, storage areas, equipment, and transportation vehicles are properly washed and sanitized on a regular basis.</span></li></ul><a data-dcnode-id="1656" name="section-20"></a><h4 data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">What Can You Do to Prevent Contamination of Fresh Produce?</span></h4><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">We know that contamination can occur at many different steps. Right now we will look at what is happening on the farm by going through the entire crop cycle. We'll start before planting begins, move through the growing season to harvesting, and finally end with postharvest handling.</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Contamination can occur at every step of the production cycle; thus, it is important to look for food safety risks in every production step in a farm operation, and mitigate and prevent them before they can occur. We'll start before planting begins, move through the growing season to harvesting, and finally end with postharvest handling.</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Contamination can occur:</span></p><ul data-dcnode-id="1635"><li data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node=""> In the field</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">During harvest and/or transportation</span></li><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">During processing and packing</span></li><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">During shipment and marketing</span></li><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">In stores, restaurants, and supermarkets</span></li><li data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">At home</span></li></ul><a data-dcnode-id="1634" name="section-21"></a><h4 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Before Planting</span></h4><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">We need to think about how to minimize the potential risks and contamination sources even before planting a crop. Find out if the field in which you are going to plant poses any risk by asking the following questions:</span></p><ul data-dcnode-id="1615"><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">How was the field used in the past?</span></li><li data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Were animals allowed to graze there?</span></li><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Was fresh manure applied to the field?</span></li><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Does the field flood frequently?</span></li><li data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Are there domestic animals near the field?</span></li><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Do wild animals travel through the field regularly?</span></li><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Is manure stored nearby?</span></li></ul><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Avoid planting on sites that regularly flood. When streams overflow onto fields, microbial and chemical pollutants in the water can make the crop unsafe to eat. If a fresh produce crop contacts floodwater, there is no way to completely wash away dangerous microorganisms or toxic chemicals. The produce must be destroyed so no one can eat it.</span></p><a data-dcnode-id="1612" name="section-22"></a><h4 data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">During Crop Production</span></h4><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Crop production is an important time to monitor for situations that might contribute to contamination.</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The water used for irrigation and spraying pesticides needs to be "clean." As much as possible, we need to keep domestic animals (including pets) and even wild animals out of the field because their feces can contaminate the crop.</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Any soil amendments we use should not be a source of microbial contaminants—for example, in order to maintain "clean soil," we should not apply raw manure to a vegetable or fruit crop during the growing season.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">In addition, we can use growing practices that protect the edible portion of the plant from coming into direct contact with the soil.</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Examples include staking tomatoes or using plastic mulch or straw mulch.</span></p><a data-dcnode-id="1599" name="section-23"></a><h4 data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">During Harvesting</span></h4><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Harvesting is an important time to use Good Agricultural Practices because our fruits and vegetables are getting closer to the customer's plate. "Clean hands" and "clean surfaces" become important here.</span></p><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">A lot of hand contact with the crop occurs during harvesting. Workers who are handling the fresh produce must be healthy and follow good hygienic practices. We will talk in more detail about this later, but this means that workers need access to clean, working toilets and handwashing facilities, and that they use both correctly! It also means that the tools used to harvest, and the bins used to hold the harvested produce, need to be clean.</span></p><a data-dcnode-id="1592" name="section-24"></a><h4 data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Postharvest: Handling Produce</span></h4><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Postharvest practices involve tranporting, sorting, washing, and storing the crop. This is an extremely important time to use Good Agricultural Practices because our fruits and vegetables are very close to the customer's plate!</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">"Clean hands," "clean water," and "clean surfaces" are critical here. As with harvesting, we want to make sure that workers are healthy and trained to use proper hygiene.</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">We also want to make sure that any surface—for example, boxes, grading tables, knives, vehicles, and, of course, hands—that comes into contact with fresh produce is clean, we are only using clean (potable) water for washing and cooling, and we are making sure that there aren't any pests like rodents or birds around.</span></p><a data-dcnode-id="1583" name="section-25"></a><h3 data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">GAPs: Part of the Solution</span></h3><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Good Agricultural Practices do not exist by themselves; they are part of a larger picture of efforts to ensure that our food is safe to eat, and to verify that farms are implementing GAPs appropriately. Three forces are at play currently in the area of farm food safety: buyer requirements, regulatory requirements, and moral/ethical standards (i.e., doing the right thing for people eating the food you grow).</span></p><a data-dcnode-id="1578" name="section-26"></a><h4 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Buyer Requirements</span></h4><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">With the increased focus on Good Agricultural Practices to verify that farms are producing fruits and vegetables in the safest way possible, the retail and food service industries are using third-party GAP audits to verify that their suppliers are complying with specific agricultural practices. GAP audits based on globally accepted farm food safety principles and practices are available through the USDA and private audit programs.</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Wholesale and retail buyers of fresh produce want to limit their businesses' risk of being part of a foodborne illness outbreak. They want to protect their name or brand, and they don't want to lose money because of an outbreak. So, it has become very common for wholesale buyers to require the farms they buy from to follow GAPs.</span></p><a data-dcnode-id="1571" name="section-27"></a><h3 data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Regulatory Requirements</span></h3><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">The Food Safety Modernization Act (FSMA) was signed into law on January 4, 2011, and is the most sweeping reform of the food safety laws in United States in over 70 years. One of the regulations under FSMA, the Produce Safety Rule, contains standards for growing, harvesting, packing, and holding fresh produce that is intended or likely to be eaten uncooked. Good Agricultural Practices are woven tightly into the Produce Safety Rule. So, there is a tight link between GAPs and FSMA's Produce Safety Rule.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Farms with less than $25,000 in produce sales (2011 dollars) are not covered under the rule. Other small farms, though covered under the rule, are exempted from complying with the whole of the Produce Safety Rule depending on gross sales and where and to whom their fresh produce is sold. Farms required to comply with the Produce Safety Rule, in full or in part, are subject to regulatory inspections to verify their compliance.</span></p><a data-dcnode-id="1564" name="section-28"></a><h3 data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Resources</span></h3><p data-dcnode-id="1555"><span data-dcnode-id="1561" instrument_node="">For GAPS-related information from Penn State Extension, such as upcoming workshops, training, and publications, go </span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node="">to the </span><a class="external-link" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/food-safety-and-quality/farm-food-safety" tabindex="492" title=""><span data-dcnode-id="1558" instrument_node="">Farm Food Safety page</span></a><span data-dcnode-id="1556" instrument_node=""> on the extension website.</span></p><a data-dcnode-id="1554" name="section-29"></a><h2 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Worker Health and Hygiene</span></h2><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Worker health and hygiene is the most important part of a food safety program, but it is often the most difficult to implement, which is why it is so important to train workers in farm food safety practices. Food safety practices are learned, so regular training is the key to its successful implementation. Workers are a critical part of any farm food safety plan because they are responsible for using food safety practices every day while they work.</span></p><a data-dcnode-id="1549" name="section-30"></a><h3 data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Pathogens of Concern</span></h3><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Workers can carry human pathogens (microscopic organisms that can cause illness) such as:</span></p><ul data-dcnode-id="1519"><li data-dcnode-id="1540"><em data-dcnode-id="1542"><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Shigella</span></strong></em><span data-dcnode-id="1541" instrument_node="">. This bacteria causes dysentery (persistent diarrhea and loss of body fluids). In some cases, acute kidney failure and death occur. It is contracted orally by direct contact of feces with food. Transmission may occur by hands that became contaminated by feces, in particular after using the bathroom without being properly washed.</span></li><li data-dcnode-id="1535"><em data-dcnode-id="1537"><strong data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Salmonella</span></strong></em><span data-dcnode-id="1536" instrument_node="">. This type of bacteria is found in feces and soil and survives for up to nine months in water. It is transmitted by eating fruits, vegetables, or water contaminated with feces from an infected animal or person.</span></li><li data-dcnode-id="1531"><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Hepatitis A</span></strong><span data-dcnode-id="1532" instrument_node="">. This very contagious virus causes liver inflammation, diarrhea with stomach pains, jaundice (sudden yellowing of skin and eyes), dark urine, fever with headache, and nausea. People infected with Hepatitis A suffer one or more recurrences from nine to 12 months after contracting the disease. It lasts approximately three weeks in each recurrence. Infected people contract secondary infections more readily, and these last longer than usual.</span></li><li data-dcnode-id="1520"><em data-dcnode-id="1528"><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Norovirus</span></strong></em><span data-dcnode-id="1527" instrument_node="">. </span><em data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Norovirus</span></em><span data-dcnode-id="1524" instrument_node=""> is often associated with cruise ships where crowded conditions cause the virus to spread rapidly. People become infected by eating food or drinking liquids contaminated with </span><em data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Norovirus</span></em><span data-dcnode-id="1521" instrument_node="">, touching contaminated surfaces or objects and then touching their mouths, or from direct contact with an infected person. This is called the fecal–oral contamination route and causes sudden onset of diarrhea, vomiting, nausea, and abdominal cramps.</span></li></ul><a data-dcnode-id="1518" name="section-31"></a><h3 data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Sources of Contamination</span></h3><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Feces can contaminate produce directly if workers defecate in the field or if there is a leak in the sewage system.</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Workers' hands can also be a source of contamination if they do not wash them properly with soap and water after going to the bathroom or returning from a break (e.g., after eating/snacking or smoking) and then handling produce. The fecal–oral route is the most common way for produce to become contaminated.</span></p><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Cross-contamination occurs when bacteria or pathogens are carried from one object to another. It can happen in many different ways, including from:</span></p><ul data-dcnode-id="1469"><li data-dcnode-id="1506"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Clothing</span></strong><span data-dcnode-id="1507" instrument_node="">. Dirty clothing can carry pathogens from one place to another (e.g., from dirty clothes to vegetables or fruit when picking).</span></li><li data-dcnode-id="1502"><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Footwear</span></strong><span data-dcnode-id="1503" instrument_node="">. Indirect contamination can occur when footwear contacts human or animal feces and then transfers to produce or food-contact surfaces. When working with animals or handling manure, workers need to use proper footwear and protective outer garments (e.g., aprons or coveralls) to protect their shoes and clothing from contamination.</span></li><li data-dcnode-id="1498"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Tools/equipment</span></strong><span data-dcnode-id="1499" instrument_node="">. If proper hygiene practices are not followed, workers can contaminate tools/equipment. In turn, contaminated tools/equipment may transfer pathogens to produce. Lack of or inadequate handwashing, and unwashed or unsanitized tools/equipment may result in cross-contamination of fresh produce.</span></li><li data-dcnode-id="1494"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Cuts, open sores, and boils</span></strong><span data-dcnode-id="1495" instrument_node="">. These can result in blood or other bodily fluids contaminating produce, which is one reason why stressing worker safety on the farm is so important. Workers should immediately report any cuts they have to a supervisor to prevent blood contamination of produce. Workers with open sores and boils should be prevented from working directly with produce.</span></li><li data-dcnode-id="1470"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Contact with saliva and mucus</span></strong><span data-dcnode-id="1491" instrument_node="">. Pathogens can be spread through saliva and mucus, and contact with other contaminated surfaces. For example, hands may become contaminated while eating, smoking, coughing, or sneezing.</span><br data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">–</span><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node=""> Coughing</span></strong><span data-dcnode-id="1486" instrument_node=""> scatters saliva particles travel up to 11 feet.</span><br data-dcnode-id="1485"><span data-dcnode-id="1484" instrument_node="">–</span><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node=""> Sneezing</span></strong><span data-dcnode-id="1481" instrument_node=""> scatters 5,000 droplets across a room.</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">–</span><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node=""> Spitting</span></strong><span data-dcnode-id="1476" instrument_node=""> forcibly ejects saliva or other substances from the mouth.</span><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">–</span><strong data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node=""> Touching the mouth</span></strong><span data-dcnode-id="1471" instrument_node=""> brings saliva to the hands and everywhere hands touch.</span></li></ul><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Coughs and sneezes stay airborne for long distances and float farther than one may think! One sneeze can scatter invisible droplets as far as 17 feet. Sneezing onto hands, handkerchiefs, or tissues only partially contains the droplets but results in contaminated hands. The best way to sneeze is into your elbow. The impact is more localized and droplets are not projected as far. Spitting also spreads particles because saliva travels through the air, contaminating everything on its path to the floor.</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Training employees about when and how to properly wash their hands is of utmost importance. Workers must wash their hands when they are contaminated by any of the abovementioned actions. Worker training should include how to wash hands properly, and provide the chance to practice this skill during the session.</span></p><a data-dcnode-id="1464" name="section-32"></a><h3 data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Prevention and Best Practices</span></h3><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">For growers, farm workers, packers, and shippers, prevention is the key to controlling potential microbial hazards and sources of contamination. Preventing problems before they become critical contamination hazards is of utmost importance in any fresh fruit or produce operation. Studies have shown that once contamination occurs, it is very difficult to remove all pathogens.</span></p><a data-dcnode-id="1459" name="section-33"></a><h4 data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Worker Training</span></h4><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Grower commitment is the key to training success!</span></p><ul data-dcnode-id="1442"><li data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Train all newly hired workers to follow good hygienic practices.</span></li><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">All workers and employees should have a good working knowledge of basic sanitation and hygiene principles.</span></li><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Each producer should develop a sanitation training program for their workers and employees.</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Depending on the workers' job requirements, periodic refresher or follow-up training sessions may be needed.</span></li><li data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">For part-time and seasonal field workers, the grower or the supervisor should verbally instruct and demonstrate proper health and hygiene practices.</span></li><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Document the training in the training log.</span></li></ul><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Make sure all newly hired workers are trained and have a good working knowledge of basic sanitation and hygiene principles. Depending on the situation, formal presentations, one-on-one instruction, or demonstrations (e.g., on the proper use of hair nets and face masks when packing and sorting) may be selected. In the field, training on the proper use of toilet facilities may be appropriate.</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">When formalized training programs are not practical, informal trainings and demonstrations should always be done for these personnel.</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The grower or supervisor should verbally instruct and demonstrate proper health and hygiene practices, such as proper handwashing techniques or using a toilet facility properly. Always document (keep a record of) all trainings and steps taken to enforce compliance with local, state, and federal hygiene standards.</span></p><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Training should include:</span></p><ul data-dcnode-id="1419"><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Maintenance of personal cleanliness</span></li><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Avoiding contact with animals (other than working animals)</span></li><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Removing or covering rings that cannot be cleaned</span></li><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">No eating, chewing gum, or using tobacco in an area used for packing produce or while working in the fields</span></li><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Recognizing signs of illness and notifying the supervisor when ill</span></li><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">How and when to wash hands properly</span></li><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Maintaining gloves in sanitary condition</span></li></ul><a data-dcnode-id="1418" name="section-34"></a><h4 data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Visitors</span></h4><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Visitors include people (other than hired workers) who enter the farm with permission (e.g., "pick-your-own" customers, agricultural tour groups, and school groups). Visitors should be trained in or at least informed of the basic sanitation and hygienic principles of the farm. They must be made aware of food safety policies set by the farm and have access to toilet and handwashing facilities. Policies can be reviewed with visitors through posters, handouts, short policy summaries, or verbally when they enter the farm. Key items to review with volunteers and visitors include:</span></p><ul data-dcnode-id="1405"><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Parts of the farm and packing areas they can enter</span></li><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Not visiting the farm if they are sick or have symptoms of illness</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Why, when, where, and how to wash their hands</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Not bringing pets to the farm</span></li></ul><a data-dcnode-id="1404" name="section-35"></a><h4 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Overall Cleanliness</span></h4><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Good personal hygiene begins at home. Being clean and in good health when at work shows that workers care about the health of others. Workers should follow these habits at home, before going to work:</span></p><ul data-dcnode-id="1393"><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Bathe or shower every day</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Keep hair clean and trimmed</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Keep nails short</span></li></ul><a data-dcnode-id="1392" name="section-36"></a><h4 data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Healthy Conditions</span></h4><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Employees who have illnesses that can spread through food should not work directly with fresh produce. Workers should not handle food products if they have:</span></p><ul data-dcnode-id="1377"><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Diarrhea</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Fever</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Vomiting</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Jaundice (yellowing of eyes or skin)</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Sore throat accompanied by fever</span></li></ul><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Open wounds, sores, and infections are potential sources of dangerous bacteria that cause disease, such as Staphylococcus. These bacteria can be transferred to food and cause serious illness. All cuts and swelling in workers' hands should be treated as if they were infected, by covering them with a bandage and then wearing disposable gloves.</span></p><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Keeping food safe requires good communication between workers and their supervisor. It is critical that workers report symptoms and conditions of illness to their supervisor as soon as they become aware of them. Workers who could be sick may be asked to do work that is unrelated to food handling.</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Sometimes people who handle food carry a disease-causing pathogen but still appear healthy. In these cases, these microorganisms may be present in the feces and saliva of the person long before symptoms are seen. For this reason, it is important that workers let their supervisor know if they have been exposed to people with infectious diseases, even if they are not sick.</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1370" instrument_node="">Adequate first-aid materials must always be available at farm headquarters and on buses or vehicles used for transporting workers. Keep in mind the number of workers/employees you have, and keep ample materials to meet their needs </span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">(bandages, band-aids, alcohol, etc.).</span></p><a data-dcnode-id="1366" name="section-37"></a><h4 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Clothing, Jewelry, and Personal Items</span></h4><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Don't let clothing or other personal items become a source of contamination. Worker clothing and equipment are important because dirty clothes, shoes, and gloves can lead to cross-contamination of produce. If working in packing houses, workers should bathe daily and go to work in clean clothes. Depending on the policies of the farm operation, workers having direct contact with produce may need to wear protective clothing such as disposable gloves, masks, aprons, or uniforms.</span></p><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Gowns and aprons that have fallen on the floor should be considered contaminated. They need to be cleaned and disinfected before being reused. Torn work clothes need to be replaced immediately. When leaving a work area for a break or to use the restroom, workers should hang their protective clothing in the area assigned to them. At the end of the shift, workers should leave their work clothes in the area designated by their supervisor. If protective clothing is taken home for cleaning, wash them separately with water that is as hot as possible and then dry them outdoors.</span></p><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Jewelry worn by workers may fall into produce, which presents a physical food safety hazard. Jewelry may also become stuck in processing equipment or farm tools, making them a serious safety risk to workers. Each day before beginning work, remove jewelry and other objects from the hands and face, and store them in the area assigned for storage. Jewelry that cannot be removed should be covered by gloves to prevent contamination.</span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Don't bring personal items into the work area that can fall into exposed food or onto work areas. Coins, paper clips, rubber bands, cigarettes, and even buttons on clothes can fall into food and perhaps cause someone to choke or cause injury. Items such as pens, pencils, and thermometers may be needed for work. Bring these items to the work area only if approved by a supervisor and adequately protected.</span></p><a data-dcnode-id="1355" name="section-38"></a><h4 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Eating, Drinking, and Tobacco Use</span></h4><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Don't eat, drink, spit, chew gum, or using tobacco in work areas. Eating, drinking, chewing gum, and using tobacco can transfer saliva to hands which can, in turn, contaminate food. Use dining rooms, rest areas, and designated smoking areas for these activities. Always wash hands afterward.</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Employees and visitors should never eat or taste food products directly from the packing line or storage areas. Be aware of these behaviors and how they can affect food safety.</span></p><a data-dcnode-id="1348" name="section-39"></a><h4 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Toilets</span></h4><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Inadequate toilet use is a major food safety risk that happens more often than you think. Certain practices may create greater contamination risks, such as toilet paper being placed in a garbage can or on the floor next to the toilet.</span></p><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Toilet availability is very important, as workers without these facilities will eventually defecate or urinate directly in or at the edge of fields, where runoff can be a source of contamination.</span></p><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Occupational Safety and Health Administration (OSHA) regulations require that one handwashing station per 20 workers be available. They must be located within ¼ mile or a five-minute walk or drive from the field or workplace. Handwashing stations need to be kept clean and sanitary. They must have clean, running water; hand soap; and single-use, disposable hand towels. Shared towels of any kind are unacceptable—they become an easy path to spread contamination. A trash container for soiled hand towels should be placed nearby. Even if there is just one worker, toilets and handwashing stations must always be available. Some farms using portable toilets prefer to rent or buy portable facilities where the sink is located right outside the structure. This facilitates easier monitoring of handwashing after toilet use.</span></p><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Proper handwashing lowers the risk of feces contaminating produce and other people. It is imperative to let all workers know that they must wash their hands with soap and water after going to the bathroom. Additional training may be necessary so workers understand that toilet paper should be thrown into the toilet, not dropped on the floor or placed in a garbage can. Also, urinating (peeing) and defecating (pooping) should be done in the toilet, never in the field.</span></p><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">How to use toilets correctly:</span></p><ul data-dcnode-id="1323"><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Train workers, especially temps, on how to use toilets properly.</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Do not throw toilet paper on the floor.</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Do not throw toilet paper in the trash.</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Place used toilet paper in the toilet</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Wash your hands after using the toilet.</span></li><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Do not dry your hands on your clothing. Use a disposable towel.</span></li></ul><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">All toilets and handwashing stations should be cleaned on a regular and scheduled basis. Toilets should be monitored daily to ensure they are cleaned according to a regular schedule, remain well stocked, and are always in working condition. Workers should be instructed to tell their supervisors if there is a problem so that it can be fixed. Posters in a language that all workers can read and understand should be placed in visible areas to indicate where toilets and sinks are located.</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">If your facility is small and a bathroom inside the home is used by workers, these same toilet and handwashing requirements apply. Document your policy on maintenance of handwashing facilities, including sanitation procedures for rinsing and cleaning wash-water tanks, frequency of water level checks, and availability of potable water, soap, and single-use towels.</span></p><a data-dcnode-id="1318" name="section-40"></a><h4 data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Handwashing and Handwashing Stations</span></h4><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Past outbreaks of foodborne illnesses have usually been associated with produce becoming contaminated with fecal material due to improperly washed hands. Washing hands after using the toilet is most important; however, it is not the only time hands must be washed. Hands should be washed as frequently as possible when hand-picking, sorting, or packing produce.</span></p><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Handwashing should be done after taking breaks, eating or snacking, and smoking. This information should be part of worker training.</span></p><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Hands must be washed:</span></p><ul data-dcnode-id="1295"><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Before starting and returning to work</span></li><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">After using the toilet</span></li><li data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">After working with pesticides</span></li><li data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Before and after eating or smoking</span></li><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">After touching or working with animals or animal waste</span></li><li data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Before putting gloves on</span></li><li data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Anytime hands can become contaminated, such as when you touch your face, hair, etc.</span></li></ul><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Workers must wash their hands thoroughly by scrubbing with soap (or other surfactants) and running water that meets water quality requirements. Hands must be dried thoroughly using disposable paper or sanitary towels, electric hand dryers, or other adequate hand-drying devices. Never allow shared use of towels.</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The key to good handwashing is both friction and the duration of that friction.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">"Clean" implies there is a physical removal of visible filth with soap and water of adequate sanitary quality. When washing hands, scrub between the fingers and under fingernails.</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Also scrub the wrists. Proper handwashing takes 20 seconds of scrubbing with soap. Water temperature is not as critical as the use of soap and vigorously rubbing hands. Warm water is more comfortable for workers, but it is not essential; cold water works just as well.</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Teach workers to wash their hands for at least 20 seconds. This can be measured by singing "Happy Birthday" or the "Alphabet" song twice in English, or another song that lasts approximately the same length. Ideally, someone on the farm should watch workers wash their hands with soap and water every time they use the toilet. Sometimes, a large number of individuals who use the toilet do not even rinse their hands and continue handling produce for the rest of the day. This creates a potential source of contamination that growers need to watch for to at least minimize the risk of fruit contamination.</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Six Steps for Handwashing</span></p><ol data-dcnode-id="1270"><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Wet hands with clean, potable water.</span></li><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Apply soap and lather.</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Scrub hands between fingers and under fingernails for at least 20 seconds. Using a nail brush is even better.</span></li><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Rinse soap off thoroughly.</span></li><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Dry hands with single-use paper towels.</span></li><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Discard used towel in a covered trash can.</span></li></ol><p data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node="">Note: Antibacterial hand sanitizers </span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">cannot</span></strong><span data-dcnode-id="1266" instrument_node=""> replace soap and water for handwashing.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Hand sanitizers can be used in addition to handwashing, but never as a replacement for soap and water. Sanitizers do not work effectively if hands have dirt or are very soiled, which is common on farms.</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Remind workers daily of the importance of handwashing. Place signs in a language that all workers can read and understand in visible, appropriate places to remind them of proper handwashing techniques and that water is for "handwashing use only."</span></p><a data-dcnode-id="1260" name="section-41"></a><h4 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Gloves</span></h4><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Transitory microbes are on the skin surface and are easy to wash off, while resident microbes get deeper in the skin and are harder to wash off. Single-use, disposable gloves provide an additional level of protection against resident microbes and the transfer of microorganisms from hands to food. If used properly, gloves provide a sterile food-contact surface. However, there are some potential problems when using gloves. Knowing when to use gloves is important to prevent contamination of food.</span></p><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Wear gloves when:</span></p><ul data-dcnode-id="1247"><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Handling cooked or ready-to-eat products</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Using a bandage to cover a minor wound or sore on hands</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Wearing hand jewelry that cannot be removed</span></li></ul><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Gloves are only effective if used correctly. Improperly worn gloves can jeopardize food safety! To be effective, gloves should:</span></p><ul data-dcnode-id="1238"><li data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Fit properly so they are less likely to become damaged while working</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Only be worn after hands are properly washed and sa
