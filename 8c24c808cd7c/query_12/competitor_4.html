nitized</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Not be used to handle raw materials or contaminated surfaces</span></li></ul><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Change gloves as often as necessary to keep food safe! Gloves should be changed whenever they may become a source of contamination. Workers should put on a new pair of gloves:</span></p><ul data-dcnode-id="1229"><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">At least every four hours when in continuous use, and more frequently when handling ready-to-eat foods</span></li><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Anytime they are torn or punctured</span></li><li data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Anytime that workers would otherwise need to wash their hands, such as when returning to a workstation or after touching an unclean surface</span></li></ul><a data-dcnode-id="1228" name="section-42"></a><h4 data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Foot Traffic</span></h4><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Foot traffic is another potential produce safety hazard. Shoes carry pathogens that can be transmitted to produce. Train workers to understand that they should not walk into contaminated areas (unless authorized), and to follow policies on changing shoes when needed. Designate boots for activities that involve animals, such as mucking stalls or feeding animals. Do not wear dirty boots, especially those covered with manure or other contaminants, in produce fields or packing areas. If workers have been in animal manure storage areas or places where pesticides are prepared or sprayed, make sure they have been trained to wash their hands and change their outer clothes and shoes before handling fresh produce.</span></p><a data-dcnode-id="1223" name="section-43"></a><h4 data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Drinking Water</span></h4><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Workers must always have access to drinking water when working in the field. Provide drinking water dispensed in single-use cups or by fountains in a nearby break area for workers in the field. Do not use regular drinking cups or dippers.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">To avoid person-to-person contamination, drinking cups should not be shared. Sharing or using personal cups is not permitted in the packing area for the same reason. It is better to have single-use cups rather than personal cups or glasses.</span></p><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">If workers are allowed to bring their own water containers, make sure the containers are unbreakable plastic or metal, and that workers know where to refill them. Glass cups or bottles may break and create a physical hazard, so they should not be used, although glass-lined metal thermos containers are permissible. Bottled water in the field is acceptable if bottles are plastic and can be capped to prevent spills. Empty plastic bottles must be thrown into the garbage, not dropped in the field or in irrigation ditches.</span></p><a data-dcnode-id="1214" name="section-44"></a><h4 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Personal Hygiene in the Field and in the Packing House</span></h4><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Hands should be washed as frequently as possible when hand-picking, sorting, or packing produce or fruit. Handwashing should be done after taking breaks, eating or snacking, and smoking. This information should be part of worker training.</span></p><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The FSMA Produce Safety Rule requires farms to have a designated area near or at the edge of the fields where workers can go to drink water, have lunch, or take breaks. A suggestion is to have a tent or a shaded place with picnic tables and waste containers with lids where workers can meet one another to eat. There should be no eating, chewing gum, or using tobacco products while working in the field.</span></p><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">If working in packing houses, workers should bathe daily and come to work in clean clothes. Personnel who have direct contact with produce may need to wear disposable gloves and other protective clothing. The designated eating area should be clean and separate from packing areas. Provide covered trash cans in designated break areas. Untrained workers may throw food or wrappers on the floor, and these can become a source of contamination. Waste bins should be emptied regularly.</span></p><a data-dcnode-id="1205" name="section-45"></a><h4 data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Recordkeeping and Monitoring</span></h4><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Recordkeeping is critical to monitoring because it allows actions to be documented to ensure they are done properly and on time. Do not make recordkeeping more difficult than it needs to be. Keep recordkeeping logs with pens attached in an easy-to-reach place, near where activities being monitored occur. Records or logs should be created at the time an activity is performed or observed.</span></p><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Developing a monitoring program may include assigning individuals to do specific tasks on the farm, such as checking to make sure the bathrooms are clean and well stocked, observing employee behavior for signs of sickness, monitoring handwashing after bathroom use, and checking for proper protective clothing.</span></p><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Most growers rent portable toilets from business firms that also clean both the toilets and the handwashing facilities on a schedule. However, for safety reasons, a person on the farm should be appointed to make sure those facilities are truly clean, well stocked, and in working condition.</span></p><a data-dcnode-id="1196" name="section-46"></a><h4 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Corrective Actions</span></h4><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Workers need to be aware that not following food safety practices is unacceptable. The farm food safety plan can designate actions to address workers not following company policies, such as being sent home for failure to wash their hands.</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Farm food safety plans should include a written emergency plan (corrective steps) for spills in portable toilets. The proactive plan should have names of who to call and what to do in case of an emergency. Training workers helps them learn what to do in emergency cases. In cases where corrective actions are needed, workers should be retrained to improve the monitoring process.</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Corrective actions should be considered if monitoring identifies a problem, such as:</span></p><ul data-dcnode-id="1179"><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Workers not following food safety policies</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">An evident food safety risk</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Facilities that are not clean, restocked, or in working order</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Facilities that leak in the field or packing house</span></li></ul><a data-dcnode-id="1178" name="section-47"></a><h2 data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Preventing Contamination Before, During, And After Harvest</span></h2><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Prevent contamination before, during, and after harvest to:</span></p><ul data-dcnode-id="1167"><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Protect yourself and your customers from injury and illness</span></li><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Assess risks before produce leaves the farm</span></li><li data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Protect the financial viability of your farm</span></li></ul><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Workers are critically important in preventing contamination in the field, during harvest, and in the packing shed. Workers are on the "front lines" as the ones most closely and most frequently involved in viewing, selecting, harvesting, and handling produce. It is very important that workers be trained and empowered to recognize, respond, and confidently report to their supervisors any conditions in the field and in the packing house that may potentially contaminate produce. And of course, workers should not be a source of contamination themselves.</span></p><a data-dcnode-id="1164" name="section-48"></a><h3 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Types of Risks</span></h3><a data-dcnode-id="1161" name="section-49"></a><h4 data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Microbial Risks</span></h4><p data-dcnode-id="1145"><span data-dcnode-id="1158" instrument_node="">Pathogenic organisms such as </span><em data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">E. coli</span></em><span data-dcnode-id="1155" instrument_node="">, </span><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Salmonella</span></em><span data-dcnode-id="1152" instrument_node="">, </span><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Hepatitis A</span></em><span data-dcnode-id="1149" instrument_node="">, and </span><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Norovirus</span></em><span data-dcnode-id="1146" instrument_node=""> can be spread to fresh produce through animal waste (feces), human waste, infected workers, and contaminated water or food-contact surfaces.</span></p><p data-dcnode-id="1141"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Sources of microbial contaminants are numerous.</span></strong><span data-dcnode-id="1142" instrument_node=""> Feces (poop) can contaminate produce directly if workers defecate (poop) in the field or there is a leak in the sewage system. Animal waste left in fields is another potential source of contamination. Hands can cross-contaminate produce if workers do not wash their hands properly with soap and water after going to the bathroom or returning from a break.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Workers who are infected with some pathogens can contaminate fresh produce by sneezing, coughing, or touching their nose or mouth. Cuts, open sores, and boils can result in blood or other bodily fluids contaminating produce. Cross-contamination can occur when fresh produce comes in contact with contaminated water, food-contact surfaces, tools, hands, clothing, or other sources.</span></p><a data-dcnode-id="1138" name="section-50"></a><h4 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Nonmicrobial Risks</span></h4><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">The Produce Safety Rule focuses primarily on reducing microbial food safety risks; however, two other types of food safety risks exist: chemical food safety risks and physical food safety risks.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Chemical hazards include pesticides, detergents, sanitizers, and other chemicals used on the farm. Chemical food safety risks can come from the improper application of pesticides or other chemicals, such as detergents and sanitizers, that are used on or near produce. Be sure to keep chemicals and cleaning supplies in a locked storage cabinet or separate shed away from fresh produce handling areas.</span></p><p data-dcnode-id="1128"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Physical hazards</span></strong><span data-dcnode-id="1129" instrument_node=""> include wood, metal, glass, plastic, or other foreign objects that can end up in the produce. Physical food safety risks can be present if any foreign material comes in contact with produce or produce-handling equipment. For example, broken glass from light fixtures is a physical hazard, especially in the packing and storage areas.</span></p><a data-dcnode-id="1127" name="section-51"></a><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Before Harvest</span></h3><a data-dcnode-id="1124" name="section-52"></a><h4 data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Preharvest Best Practices</span></h4><ul data-dcnode-id="1105"><li data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Worker training and hygiene</span></li><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Clean and sanitized food-contact surfaces, containers, and transportation</span></li><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Proper use of toilets and handwashing stations</span></li><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Designated break areas in fields and packing sheds</span></li><li data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Water is of appropriate quality (microbial load) for its intended purpose (drinking, cleaning, irrigation, applying pesticides, frost protection)</span></li><li data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Adequately maintained tools and machinery</span></li><li data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Proper management of manures and compost</span></li><li data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Proper storage of chemicals (sealed and labeled containers in a locked cabinet)</span></li></ul><a data-dcnode-id="1104" name="section-53"></a><h4 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Worker Training and Hygiene</span></h4><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Workers are key to ensuring harvest and postharvest activities are done properly, thus the importance of training. Workers are a critical part of any farm food safety plan because they are responsible for using food safety practices every day while they work. Worker health and hygiene is the most important part of a food safety program but often the most difficult to implement—thus the importance of worker training in produce/food safety practices. Food safety practices are learned, so training is the key to its successful implementation.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Worker training should include:</span></p><ul data-dcnode-id="1083"><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Maintenance of personal cleanliness</span></li><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Avoiding contact with animals (other than working animals)</span></li><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Removing or covering hand jewelry that cannot be cleaned</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Not eating, chewing gum, or using tobacco in packing areas or while working in the fields</span></li><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Recognizing signs of illness and notifying their supervisor if they are ill</span></li><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">How and when to wash their hands properly</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Maintaining gloves in sanitary condition, if used</span></li></ul><a data-dcnode-id="1082" name="section-54"></a><h4 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Washing and Sanitizing</span></h4><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Washing removes visible dirt, soil, dust, and contamination from a surface, while sanitizing reduces, but does not kill, the number of harmful bacteria, viruses, and fungi (i.e., it makes a surface free of visible dirt contaminants that could affect your health).</span></p><p data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Remember: You cannot sanitize without first washing a surface.</span></strong><span data-dcnode-id="1075" instrument_node=""> This is because too much organic matter decreases the effectiveness of a sanitizer.</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Steps for properly cleaning and sanitizing food-contact surfaces, equipment, and utensils:</span></p><ol data-dcnode-id="1063"><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Rinse the surface to remove any obvious dirt and debris.</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Apply an appropriate detergent and scrub the surface.</span></li><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Rinse the surface with water that is the microbial equivalent of drinking water (potable).</span></li><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Apply an appropriate sanitizer (if the sanitizer requires a final rinse, this will require an extra step) and let the surface air-dry without wiping.</span></li></ol><a data-dcnode-id="1062" name="section-55"></a><h4 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Preharvest Assessment</span></h4><ul data-dcnode-id="1039"><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Wash, scrub, rinse, and sanitize all containers prior to use and discard damaged containers.</span></li><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Separate tools used for handling manure and tools for harvest.</span></li><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Tools should be cleaned on a scheduled basis.</span></li><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Store and cover packing materials in a covered location.</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Do not stand or sit in harvest bins or containers.</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Remove dirt and debris from containers before stacking.</span></li><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Do not stand or sit in harvest bins or containers.</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Do not stack directly on soil or floor.</span></li><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Monitor fields to be harvested for signs of animal intrusion.</span></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Check equipment and machinery for maintenance needs. Make sure equipment does not pose a risk from leaking hoses, breaking glass, or broken parts.</span></li></ul><a data-dcnode-id="1038" name="section-56"></a><h3 data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">During Harvest</span></h3><a data-dcnode-id="1035" name="section-57"></a><h4 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Best Practices for Harvesting</span></h4><ul data-dcnode-id="1012"><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Practice worker hygiene in the field: clean clothes; covered shoes; no eating, drinking, or smoking while working; and wash hands.</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Pick fruits and vegetables when they are dry to minimize the amount of soil adhering to the harvested produce, especially in the case of field-packed produce.</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Never harvest produce that is damaged or rotten.</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Never harvest produce that falls to the ground.</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Remove harvested produce from field as soon as possible (do not leave fresh produce in the sun or under a tree).</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Exclude domestic animals and wildlife from fields.</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Minimize habitat, nesting, and hiding places for rodents and other vermin in and around the fields.</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Keep "boneyards" and debris piles away from fields.</span></li><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Inspect unused buildings for pest and wildlife nesting.</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Workers must be trained to never harvest produce that has come in contact with animal droppings.</span></li></ul><a data-dcnode-id="1011" name="section-58"></a><h4 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Reduce Risks in All Packing Areas</span></h4><ul data-dcnode-id="990"><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Keep it clean. Sweep, pick up trash, remove cull piles—good housekeeping goes a long way!</span></li><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Separate produce handling areas from other farm activities such as vehicle repair, spray mixing, and storage.</span></li><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Provide proper hygiene facilities for workers. Toilets, handwashing facilities, and separate eating and break areas are key for making sure workers do not contaminate fresh produce.</span></li><li data-dcnode-id="995"><span data-dcnode-id="1002" instrument_node="">Avoid standing water and condensate. Whether in a closed operation or an open packing area, try to reduce standing water in equipment and on the floor (or ground). Standing water can support the growth and persistence of pathogens such as </span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Listeria</span></em><span data-dcnode-id="999" instrument_node=""> </span><em data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">monocytogenes</span></em><span data-dcnode-id="996" instrument_node=""> and splash onto fruits, vegetables, and equipment, in turn spreading contaminants throughout the packing area.</span></li><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">All packing areas should have a pest management program. Closed operations have more ability to exclude rodents and other pests, but pests can still be managed in open operations.</span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Keep it organized. Having a cleaning process and place for tools and equipment can help ensure they are in good working condition and clean for the next use. Having a system minimizes confusion, increases efficiency, and helps reduce risks by making sure important cleaning and sanitation steps are done properly each day.</span></li></ul><a data-dcnode-id="989" name="section-59"></a><h4 data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Packing Sheds</span></h4><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Not all packing sheds have four walls; many are open on at least one side. Although an enclosed packing area is preferred, open walls are acceptable if measures are taken to keep pests out and the area is kept clean and uncluttered.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Sheds where produce will be taken or stored should be cleaned, and floors washed and sanitized when possible, before taking produce inside. If a shed has glass fixtures, they should be shatterproof or covered. Check inside and outside the building; repair holes, leaks, and cracked walls and floors; and remove standing water. Weed and mow grass outside the perimeter of the building to avoid nesting sites for rodents, moles, and other vermin.</span></p><a data-dcnode-id="982" name="section-60"></a><h4 data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Pest Management</span></h4><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">It may be difficult to keep packing shed buildings extremely tight, but consider this: mice need only a quarter-inch hole to get into a building, and rats only need a half inch. As much as is practically possible, refit doors or use rubber stripping to seal up cracks and holes. The fewer ways that pests can gain entry, the better.</span></p><ul data-dcnode-id="965"><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Inspect storage and packing facilities weekly for rodents, birds, and insects.</span></li><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Use pest control procedures (traps, screening, and doors).</span></li><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Only spring-loaded or sticky traps to be used inside packing shed.</span></li><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Bait traps may be used outside.</span></li><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Apply chicken wire or netting on air intake and exhaust to prevent birds.</span></li><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Document the pest management plan and service reports.</span></li></ul><a data-dcnode-id="964" name="section-61"></a><h3 data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">After Harvest</span></h3><a data-dcnode-id="961" name="section-62"></a><h4 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Best Practices for Postharvest</span></h4><ul data-dcnode-id="945"><li data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">Use only water of sufficient quality (no detectable </span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">E. coli</span></em><span data-dcnode-id="955" instrument_node="">) for cooling, washing, or transporting produce.</span></li><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Make sure nothing can fall onto or into food.</span></li><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Keep food-contact surfaces clean, including harvest and storage bins, workers' hands, conveyors, belts, brushes, rollers, sorting tables, racks, and utensils.</span></li><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Sanitize food-contact surfaces on a scheduled basis.</span></li><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Make sure cold rooms are functioning properly, as temperature fluctuations can result in bacterial growth and food spoilage.</span></li></ul><a data-dcnode-id="944" name="section-63"></a><h4 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Water and Ice</span></h4><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">Water is good at spreading pathogens, and too much water encourages spoilage and mold growth. Water for rinsing, washing, cooling, waxing, icing, or moving produce should meet the water quality standard of no detectable </span><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">E. coli</span></em><span data-dcnode-id="938" instrument_node=""> (per 100 mL).</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Transport and store ice in covered plastic or plastic-lined bins. Use a dedicated shovel made of noncorrosive material, and clean and sanitize the shovel and bins on a scheduled basis.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">To ensure the safety of postharvest water:</span></p><ol data-dcnode-id="917"><li data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">Always use water that meets the water quality standard of no detectable </span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">E. coli</span></em><span data-dcnode-id="929" instrument_node=""> (per 100 mL).</span></li><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Use sanitizers as needed with postharvest water.</span></li><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Change bulk/batch tank water when dirty.</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Make sure water is at the appropriate temperature to avoid infiltration.</span></li><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Clean and sanitize tanks/bins daily, making sure to reduce or eliminate pooled water.</span></li><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Document all postharvest activities.</span></li></ol><a data-dcnode-id="916" name="section-64"></a><h4 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Transportation</span></h4><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Some farms may use vehicles for many farming purposes and personal use. Such vehicles must be cleaned before hauling produce. As mitigation, a clean liner may be used as a barrier if adequate to prevent contamination.</span></p><ul data-dcnode-id="899"><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The vehicle that transports produce should only be used to transport produce.</span></li><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">If the vehicle is used for transporting anything other than produce (e.g., live animals or compost), it should be cleaned and sanitized before being used to haul produce.</span></li><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Vehicles should be inspected before loading to make sure they are clean and free from debris and bad odors.</span></li><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">If hiring transportation, make sure cleaning, sanitizing, and documentation are included in your contract requirements.</span></li><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Stipulate in the contract the recordkeeping logs they need to fill out and maintain.</span></li><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">If refrigeration is required, make sure the cooling unit is functioning properly before loading and that all door seals, air chutes, and side walls are in good condition.</span></li></ul><a data-dcnode-id="898" name="section-65"></a><h4 data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Corrective Actions</span></h4><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">If a food safety risk is identified in the produce packing, storage, or transportation vehicles:</span></p><p data-dcnode-id="890"><span data-dcnode-id="893" instrument_node="">Immediately assess the situation.</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">Has produce been affected?</span></p><ul data-dcnode-id="881"><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Can it still be sold, or does it need to be thrown away?</span></li><li data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Determine the cause of the problem.</span></li><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">What needs to be done to correct it?</span></li><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Put corrective actions in place, keep records, and monitor to make sure the corrective actions have fixed the problem.</span></li></ul><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Corrective action should be taken and documented if food safety risks are identified in the packing, washing, storage, or transportation of produce. Think about both short-term and long-term solutions. How can the situation be fixed immediately? How can the event be prevented from occurring again in the future? Corrective actions can help fix a problem, determine its cause, and modify practices to make sure it does not happen in the future.</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Corrective actions are needed when:</span></p><ul data-dcnode-id="868"><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Pest infestation occurs</span></li><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The packing line is contaminated by blood (cut finger on a sharp metal edge, etc.)</span></li><li data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">A drain backs up into the produce handling area</span></li><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Other situations posing immediate risk of produce becoming contaminated occur</span></li></ul><a data-dcnode-id="867" name="section-66"></a><h3 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Summary</span></h3><ul data-dcnode-id="854"><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Prevent contamination to protect yourself and your customers from injury and illnesses.</span></li><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Risks can be microbial, chemical, and physical.</span></li><li data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">All workers should be trained on health and hygiene to minimize potential food contamination.</span></li><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Cleaning and sanitizing are not the same thing. You cannot sanitize a dirty surface!</span></li><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Food safety practices (cleaning, general maintenance and housekeeping, and pest control) need to be in place to reduce risks.</span></li></ul><a data-dcnode-id="853" name="section-67"></a><h3 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">References</span></h3><p data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">DuPont, S. T., and L. LaBorde. " </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/reducing-food-safety-risks-during-harvest" tabindex="493" target="_blank"><span data-dcnode-id="849" instrument_node="">Reducing Food Safety Risks during Harvest</span></a><span data-dcnode-id="847" instrument_node="">&nbsp;." University Park: Penn State Extension, 2015.</span></p><p data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">DuPont, S. T., and L. LaBorde. " </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/reducing-food-safety-risks-in-the-packhouse" tabindex="494" target="_blank"><span data-dcnode-id="844" instrument_node="">Reducing Food Safety Risks in the Packhouse</span></a><span data-dcnode-id="842" instrument_node="">&nbsp;." University Park: Penn State Extension, 2015.</span></p><p data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">Produce Safety Alliance, Cornell University. "</span><a class="external-link" data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producesafetyalliance.cornell.edu/curriculum/" tabindex="495" title=""><span data-dcnode-id="839" instrument_node="">Produce Safety Alliance Grower Training Course</span></a><span data-dcnode-id="837" instrument_node="">."</span></p><a data-dcnode-id="835" name="section-68"></a><h3 data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Resources</span></h3><p data-dcnode-id="829"><span data-dcnode-id="832" instrument_node="">Penn State Extension </span><a class="external-link" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.psu.edu/food-safety-and-quality" tabindex="496" title=""><span data-dcnode-id="831" instrument_node="">Food Safety and Quality webpage</span></a></p><p data-dcnode-id="825"><span data-dcnode-id="828" instrument_node="">Cornell </span><a class="external-link" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producesafetyalliance.cornell.edu/" tabindex="497" title=""><span data-dcnode-id="827" instrument_node="">Produce Safety Alliance</span></a></p><p data-dcnode-id="821"><span data-dcnode-id="824" instrument_node="">Centers for Disease Control </span><a class="external-link" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/foodsafety/" tabindex="498" title=""><span data-dcnode-id="823" instrument_node="">Food Safety webpage</span></a></p><p data-dcnode-id="817"><span data-dcnode-id="820" instrument_node="">Version 1.1 Authorship </span><br data-dcnode-id="819"><span data-dcnode-id="818" ins
