machines that mimic "cognitive" functions that
humans associate with other human minds, such as
"learning" and "problem solving".

Role of Artificial Intelligence in Health
Technology applications and apps encourage healthier
behaviour in individuals and help with the proactive
management of a healthy lifestyle.
Additionally, AI increases the ability for healthcare
professionals to better understand the day-to-day patterns and
needs of the people they care, for better feedback, guidance and
support.

Healthy Behaviors:

Garmin and others – monitors heart rate and activity levels.

share this information to doctors. 15

Treatment Design
Artificial intelligence systems have been created to analyze data –
notes and reports from a patient’s file, external research, and
clinical expertise – to help select the correct, individually
customized treatment path.
Precision Medicine
Instead of developing treatments for populations and making the
same medical decisions based on a few similar physical
characteristics among patients, medicine has shifted toward
prevention, personalization, and precision.
Genetics and genomics look for mutations and links to disease
from the information in DNA. With the help of AI, body scans can
spot cancer and vascular diseases early and predict the health
issues people might face based on their genetics.

    Kathmandu, Feb 8: Wiseyak is a health care IT company that uses artificial
intelligence and machine learning to provide services to hospitals, patients and
doctors. The company is trying to build clinical decision support system which
would make it easier for the doctors to reach to the proper diagnosis.
“The software will take the report of the patients, lab results and come to the
conclusion. It will not replace the doctor but will assist the doctor while doing
diagnosis of the patient, so whatever the doctors need is right in front of them. If a
patient comes in to see the doctor with a headache, then the algorithm will ask the
patient about other reoccurring symptoms, making it easier to identify the disease
which will reduce the chances of misdiagnosis providing transparency to the
doctors and patients, also saving the time of both patient and doctor from
unnecessary tests, “said Ravi Bajaracharya, chief technical officer and co-
founder of the company.
A majority of hospitals in Nepal use paper documents instead of electronic record
data and doctors in Nepal are outnumbered by the number of patients, making it
difficult to give time to each patient.
“This innovation will improve the accuracy of the doctor and digitize patient’s
medical records. Another benefit of this technology is that it will make diagnosis
in rural areas easier where doctors are not easily available,” said Dr Hemanta
Shrestha COO and co-founder of the company.
A team of three members came up with an idea of this unique innovation. The
prototype of this technology will be ready in a month and the final product will be
launched within six months in South Asia. This innovation will surely give health
care a new direction in Nepal.

human thoughts, human power, human resources effectively and efficiently.

</span><li class="slide-note" data-dcnode-id="909"><span data-dcnode-id="980" instrument_node="">International Strategies regarding AI: </span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node=""> European Union: There is a European AI Alliance that has established an overarching approach to AI and an agreement to cooperate among European countries. </span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node=""> Nordic-Baltic Region:&nbsp;Ministers from the&nbsp;Nordic-Baltic region&nbsp;issued a declaration of collaboration on AI. </span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node=""> United Nations: The UN has numerous ongoing initiatives related to AI including providing guidance on data privacy and on autonomous weapons. </span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node=""> AI Agreement Between UAE and India: The UAE Minister for AI and Invest India signed a Memorandum of Understanding to establish a partnership. </span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node=""> International Study Group of Artificial Intelligence: France and Canada are developing a task force to make recommendations on the scope and implementation of the international study group. </span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node=""> Charlevoix Common Vision for the Future of Artificial Intelligence:&nbsp;Leaders of the G7 agreed to a shared set of commitments for AI in Charlevoix, Canada. </span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node=""> </span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node=""> National Strategies </span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node=""> Australia:&nbsp;Australia has dedicated $29.9 million in the country’s annual budget to promote and guide the development of AI. </span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node=""> Austria:&nbsp;Austria has an advisory Robot Council that is developing a national AI strategy. </span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node=""> Canada:&nbsp;Canada has a national AI strategy called the Pan-Canadian Artificial Intelligence Strategy. </span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node=""> China:&nbsp;China has a national AI strategy, defined under the “New Generation Artificial Intelligence Development Plan.” </span><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node=""> Denmark:&nbsp;Denmark has a digital strategy that includes a focus on AI along with other technologies. </span><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node=""> Estonia:&nbsp;Estonia is developing a legal framework for the use of AI in its country, including a bill on AI liability. </span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node=""> Finland:&nbsp;Finland has an Artificial Intelligence Programme guided by a steering group under the Ministry of Economic Affairs and Employment. </span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node=""> France:&nbsp;France has a national strategy for AI called “AI for Humanity,” which is outlined in the “Villani Report”. </span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node=""> Germany: The German Government adopted its Artificial Intelligence Strategy in November 2018. </span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node=""> India:&nbsp;India defined a national policy on AI in a working paper titled, “National Strategy for Artificial Intelligence #AIforAll.” </span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node=""> Ireland:&nbsp;The Irish government has hosted AI workshops and launched a national AI Masters program. </span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node=""> Italy:&nbsp;Italy has an interdisciplinary AI Task Force launched by the Agency for Digital Italy. </span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node=""> Japan:&nbsp;Japan has an “Artificial Intelligence Technology Strategy” and has also included AI in its “integrated innovation strategy.” </span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node=""> Kenya:&nbsp;The Kenyan government created a Blockchain &amp; Artificial Intelligence task force. </span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node=""> Malaysia:&nbsp;The Malaysian government is developing a National Artificial Intelligence Framework, and establishing Digital Transformation Labs. </span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node=""> Mexico:&nbsp;The Mexican government supported the creation of the white paper, “Towards an AI Strategy in Mexico: Harnessing the AI Revolution.” </span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node=""> New Zealand:&nbsp;New Zealand has an AI Forum to connect and advance the country’s AI ecosystem. </span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node=""> Russia: The Russian government is currently developing an AI R&amp;D national strategy. </span><br data-dcnode-id="927"><span data-dcnode-id="926" instrument_node=""> Singapore:&nbsp;Singapore has a national AI program called AI Singapore and is establishing an AI ethics advisory council. </span><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node=""> Saudi Arabia:&nbsp;Saudi Arabia was the first country to grant citizenship to a robot. </span><br data-dcnode-id="923"><span data-dcnode-id="922" instrument_node=""> South Korea:&nbsp;South Korea has an Artificial Intelligence Information Industry Development Strategy. </span><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node=""> Sweden:&nbsp;The Swedish government has released a “National Approach for Artificial Intelligence.” </span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node=""> Tunisia:&nbsp;Tunisia has created an AI Task Force and Steering Committee to develop a national AI strategy. </span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node=""> United Arab Emirates:&nbsp;The UAE has a national strategy for AI and was the first country to name an AI Minister. </span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node=""> United States of America: The US launched the American AI Initiative February 2019. </span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node=""> United Kingdom:&nbsp;The UK government launched a Sector Deal for AI to advance the UK’s ambitions in AI consistent with its Industrial Strategy, and taking into account the advice of the Parliament’s Select Committee on AI. </span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node=""> </span></li><span data-dcnode-id="908" instrument_node="">
</span><li class="slide-note" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">PricewaterhouseCoopers&nbsp;(doing business as&nbsp;PwC) is a&nbsp;multinational&nbsp;professiona services network with headquarters in London, United Kingdom. PwC ranks as the second largest professional services firm in the world</span></li><span data-dcnode-id="905" instrument_node="">
</span><li class="slide-note" data-dcnode-id="897"><span data-dcnode-id="904" instrument_node="">PwC projected that AI could potentially be worth $15.7 trillion to the global economy by 2030. </span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node=""> The latest report from IDC projects that spending on AI across Europe will hit $5.2 billion. Just 0.2% of European GDP. Okay, you would expect spending on AI to be less than its contribution to GDP, but that is ridiculous. </span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node=""> Estimates suggest that China’s total investment in AI enterprises reached $2.6 billion in 2016 . China’s State Council has aimed to become a global innovation centre in the field by 2030, by projected investment $147 billion. </span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node=""> </span></li><span data-dcnode-id="896" instrument_node="">
</span><li class="slide-note" data-dcnode-id="880"><span data-dcnode-id="895" instrument_node="">Some of the AI services from Paaila Technology include: </span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node=""> Query Answering System </span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node=""> Nepali Tecct to speech </span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node=""> Recommendation System </span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node=""> Few of the world-class Robots by Paaila Technology includes: </span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node=""> Pari (Humanoid Robot) </span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node=""> Room Service Robot </span><br data-dcnode-id="882"><span data-dcnode-id="881" instrument_node=""> Waiter Robot</span></li><span data-dcnode-id="879" instrument_node="">
</span><li class="slide-note" data-dcnode-id="875"><span data-dcnode-id="878" instrument_node="">The Deep Learning Model analyse the four images of a house provided by the house owner via an app on his/her smartphone, after successfully classifying the image, the model will give response whether or not the house can be retrofitted, saving time and money of structural engineer to visit the house and analyse by hand. Currently it only supports remote houses of Nepal. </span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node=""> </span></li><span data-dcnode-id="874" instrument_node="">
</span><li class="slide-note" data-dcnode-id="862"><span data-dcnode-id="873" instrument_node="">Nepal e-health policy strategy 2017 </span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node=""> Policies in Nepal: </span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node=""> </span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node=""> </span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node=""> This is guided by NHSP, periodic Development Plans, Health Sector Information System-National Strategy(HSIS-NS) and information, Communication and Technology Policy of the Government of Nepal. </span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node=""> </span></li><span data-dcnode-id="861" instrument_node="">
</span><li class="slide-note" data-dcnode-id="857"><span data-dcnode-id="860" instrument_node="">The Kathmandu valley has one&nbsp;doctor&nbsp;for 850 people but in rural areas the number is one&nbsp;doctor&nbsp;for every 150000 people, so the need of AI is high in Nepal. </span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node=""> </span></li><span data-dcnode-id="856" instrument_node="">
</span><li class="slide-note" data-dcnode-id="848"><span data-dcnode-id="855" instrument_node="">Canadian-Based Northern Health Adopts Nuance AI-powered Dragon Medical One to Revolutionize Care Delivery Across British Columbia </span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node=""> Nuance’s speech recognition platform promotes care team collaboration, improves clinical documentation efficiency and physician mobility at Northern Health </span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node=""> </span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node=""> “Because speech recognition is integrated directly into the electronic health record, it’s easier for physicians to provide richer documentation in a timely way,” said William Clifford, MD, Chief Medical Information Officer at Northern Health.&nbsp;“There’s no question, better, faster documentation supports better, safer care.”</span></li><span data-dcnode-id="847" instrument_node="">
