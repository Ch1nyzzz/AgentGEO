</span><div class="main-body theme-template" data-dcnode-id="448"><span data-dcnode-id="872" instrument_node="">
</span><div class="container" data-dcnode-id="557"><span data-dcnode-id="871" instrument_node="">
</span><div class="grid-15 grid-desktop-10" data-dcnode-id="700"><span data-dcnode-id="870" instrument_node="">
</span><div class="main-content" data-dcnode-id="702"><span data-dcnode-id="869" instrument_node="">
</span><p class="intro" data-dcnode-id="860"><span data-dcnode-id="868" instrument_node="">
            Artificial intelligence and data science are required as cross-cutting capabilities across a range of industrial and commercial sectors, reflective 
of the applied nature of the majority of our research and our strong industrial links.
                </span><a class="showmore" data-dcnode-id="862" href="#"><span class="more" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Read more</span></span><span data-dcnode-id="865" instrument_node=""> </span><span class="less" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Read less</span></span></a><span data-dcnode-id="861" instrument_node="">
</span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="moretext sc-richtext-container" data-dcnode-id="768"><span data-dcnode-id="858" instrument_node="">
</span><h2 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Our expertise and application</span></h2><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Cranfield academics have developed skills and expertise is a range of discipline specific methods, tools and techniques, such as;</span></p><span data-dcnode-id="852" instrument_node="">
</span><ul data-dcnode-id="807"><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Probabilistic methods for uncertain reasoning including Bayesian network, Hidden Markov
    model, Particle filter, Decision theory, and Utility theory</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Logic programming and Automated reasoning</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Classifiers and statistical learning methods, including Machine learning and non-supervised
    learning (e.g. surveillance video data, crowdsourcing product design)</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Data orientated approaches such as neural networks and fuzzy logic including extreme
    learning, reinforced learning and deep learning (e.g. for air traffic management, classification
    of damage)</span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="838" instrument_node="">Search and optimization including search algorithm, combinatorial optimization, and</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
    evolutionary computation </span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Extracting, Transforming and Loading processes for effectively transforming raw data for
    database population e.g. Dimensionality Reduction using PCA</span></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="830" instrument_node="">System identification methodologies for linear and non-linear systems (Stochastic Subspace</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
    Identification and non-linear Bayesian methods).</span></li><span data-dcnode-id="826" instrument_node="">
</span><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Global optimisation algorithms (e.g. evolutionary, nature-inspired, swarm intelligence) </span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Development of human-like inference techniques and learning schemes</span></li><span data-dcnode-id="820" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Natural language processing</span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Comparison to physical models which capture known design and performance
    characteristics of machines and processes</span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Rule based systems which capture knowledge and standards (popular with customers who
    don’t like neural networks)</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Data mining, fusion and visualisation.</span></li><span data-dcnode-id="808" instrument_node="">
</span></ul><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">We currently offer the following relevant taught courses, although we have a large number of PhD
studentships centred in AI and Data Science (most with industrial sponsors) as well as short
courses:</span></p><span data-dcnode-id="803" instrument_node="">
</span><ul data-dcnode-id="773"><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="798"><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/applied-artificial-intelligence"><span data-dcnode-id="801" instrument_node="">Applied Artificial Intelligence MSc</span></a><span data-dcnode-id="799" instrument_node="">&nbsp; &nbsp; &nbsp;&nbsp;</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="794"><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/cyberspace-operations"><span data-dcnode-id="796" instrument_node="">Cyberspace Operations MSc</span></a></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Cyber-Secure Manufacturing MSc</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="787"><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/cyber-defence-and-information-assurance"><span data-dcnode-id="789" instrument_node="">Cyber Defence and Information Assurance MSc</span></a></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="783"><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/information-capability-management"><span data-dcnode-id="785" instrument_node="">Information Capability Management MSc</span></a></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="779"><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/computational-and-software-techniques-in-engineering"><span data-dcnode-id="781" instrument_node="">Computational and Software Techniques in Engineering MSc</span></a></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="775"><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cranfield.ac.uk/courses/taught/geographical-information-management"><span data-dcnode-id="777" instrument_node="">Geographical Information Management MSc</span></a></li><span data-dcnode-id="774" instrument_node="">
</span></ul><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">In addition, we lead a NERC CDT ‘Data, Risk &amp; Environmental Analytical Methods for Doctoral Training’ aiming to skill and secure the next generation of data scientists and informaticians working in environmental sciences. 30 postdoctoral students are / will benefit from training that combines
excellence in risk mitigation science with cutting-edge big data interpretation and allows the students to apply practical big data analytics to challenges faced by industry, academia, NGOs and government. We are also currently exploring the market for a course in financial technology, situated within our School of Management, covering block chain technology, cryptocurrencies, smart contracts, cyber security and utilising big data to profile customers using all available information (including social media).</span></p><span data-dcnode-id="769" instrument_node="">
</span></div><span data-dcnode-id="767" instrument_node="">
</span><div class="accordion sc-richtext-container" data-dcnode-id="728"><span data-dcnode-id="766" instrument_node="">
</span><h3 class="accordion-toggle" data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">Our facilities </span><span class="icon" data-dcnode-id="762"><svg data-dcnode-id="763" viewBox="0 0 33 16.5" xmlns="http://www.w3.org/2000/svg"><path d="M2.4 1l14.1 14.1L30.6 1z" data-dcnode-id="764" stroke-miterlimit="10" stroke-width="2"></path></svg></span></h3><span data-dcnode-id="760" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="730" style="display: none;"><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">
</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Cranfield has recently co-funded the £35 million Aircraft Integrated Research Centre (AIRC) along
with the Higher Education Funding Council for Education (HEFCE), Airbus and Rolls-Royce,
providing dedicated space and specialist equipment to address future grand challenges in the
aerospace sector. It is supported by Cranfield expert academics working in IoT/cyber security,
robotics &amp; automation systems, AI for data analytics including single and fleethead management of
aircraft and rotorcraft, and system engineering, and led by the Manufacturing Informatics Centre. It
has also recently been confirmed that a new £65 million Digital Aviation Research and Technology
Centre (DARTeC) will be built at Cranfield University to spearhead the UK’s research into digital
aviation technology. The Centre will address such research challenges facing the aviation industry
as:</span></p><span data-dcnode-id="754" instrument_node="">
</span><ul data-dcnode-id="740"><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">the integration of drones into civilian airspace</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">increasing the efficiency of airports through technological advances</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">creating safe, secure shared airspace through secure data communication infrastructures</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">increasing the reliability and availability of aircraft through self-sensing, self-aware technologies</span></li><span data-dcnode-id="741" instrument_node="">
</span></ul><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Game-changing technologies such as a virtual air traffic control tower and next-generation radar
technologies on the University’s licensed airport will also provide a Civil Aviation Authority-approval
route that promises increased efficiency, flexibility and capacity. As a consequence, work on using
data analytics and visualisation from the multiple sensor data streams will be required as well as
using AI to support the operator in understanding situations in real time.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">In addition to this, a £9m open research facility (Multi-User Environment for Autonomous Vehicle
Innovation) facility, intended to support the development of autonomous transport vehicles and
related systems has been built at Cranfield, completed 2017. MUEAVI is a purpose-built,
instrumented roadway created as a ‘living laboratory’ for research into connected and autonomous
vehicles. MUEAVI enables autonomous vehicles to be researched and tested in diverse real-world
situations and environments. This capability is essential to develop and gain confidence in exciting
technological developments of autonomous vehicles. It will be underpinned by our ability to process
and interpret big data as it is being generated by the inbuilt sensor array in real time. For our first
project, Cranfield University has been awarded £1.2 million for its role in testing and validating a
new autonomous vehicle, which is being designed and built as part of the HumanDrive Connected
and Autonomous Vehicle (CAV) project. The vehicle will be fully autonomous and capable of
completing a lengthy end-to-end journey in a variety of settings, including country roads, A-roads
and motorways, and will use AI for digital validation.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="732"></p><span data-dcnode-id="731" instrument_node="">
</span></div><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span><div class="module" data-dcnode-id="704"><span data-dcnode-id="726" instrument_node="">
</span><div class="tc sc-richtext-container" data-dcnode-id="706"><span data-dcnode-id="725" instrument_node="">
</span><h3 data-dcnode-id="724"></h3><span data-dcnode-id="723" instrument_node="">
</span><h4 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Our AI, data science and robotics capabilities</span></h4><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Our AI, data science and robotics capabilities are grounded in finding solutions to practical challenges. As such, Cranfield research and teaching is applied to a variety of aerospace, transport, water, energy, defence and security, and manufacturing problems for diagnostic, prognostic, and knowledge management perspectives. For example, our activities use AI to underpin aircraft design, optimisation and trajectory resolutions, supporting safe AI in terms of network computing, developing autonomous systems for drones and self-driving cars, and assuring flow monitoring and control in oil and gas pipelines. There is also a current research cell exploring the broader issues of AI.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">
Examples of Cranfield data science interests include transforming raw data and data analytics for airline maintenance operations, radar and imaging signals, machine learning for signals and damage classification, identifying materials in waste management, transitioning towards a re-distributed manufacturing model for consumer goods, and structuring knowledge in high value manufacturing and maintenance service provision, managing staff turnover and supporting high reliability equipment.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">
Our robotics interests lie in engineering and automation although the ethical design and application of robotics, the impact of and skills required for AI, and the experience of the end user of AI-based systems are also a focus. For example, driver behaviour and psychology, human computer interactions in unmanned vehicles and human factors considerations on cognitive psychology. One of our academics, Dr Sarah Fletcher, was also involved in development and release of the first ever standard to guide the ethical design and application of robotics (BS 8611).</span></p><span data-dcnode-id="711" instrument_node="">
</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">
