</span><h2 data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">An entrance award for top students pursuing AI master’s degrees in Ontario</span></h2><span data-dcnode-id="5961" instrument_node="">

</span><div class="vector-scholarship-in-artificial-intelligence-subcontent-header" data-dcnode-id="5939"><span data-dcnode-id="5946" instrument_node="">The Vector Scholarship in Artificial Intelligence supports the recruitment of top students to AI-related master’s programs in Ontario. Valued at $17,500 for one year of full-time study at an Ontario university, these merit-based entrance awards recognize exceptional candidates pursuing a master’s </span><strong data-dcnode-id="5943"><a data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vectorinstitute.ai/aimasters/%23vector-recognized-ai-masters-programs" style="color: #d1007a !important;"><span data-dcnode-id="5945" instrument_node="">program recognized by the Vector Institute</span></a></strong><span data-dcnode-id="5942" instrument_node=""> or who are following an individualized study path that is demonstrably AI-focused. Students in both core technical programs and complementary fields such as business and health </span><span data-dcnode-id="5940" style="font-weight: 400;"><span data-dcnode-id="5941" instrument_node="">are encouraged to seek nomination. Scholarship recipients will also have priority access to exclusive career exploration and professional development opportunities, and research talks, to support and nurture their excellence in AI.</span></span></div><span data-dcnode-id="5938" instrument_node="">
</span><div class="clearboth" data-dcnode-id="5937"></div><span data-dcnode-id="5936" instrument_node="">

</span><p data-dcnode-id="5882"><b data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">The nomination period for the 2022-23 cycle closed on March 23, 2022. All nominees and their programs will be informed of the outcomes by the end of April 2022.</span></b></p><span data-dcnode-id="5881" instrument_node="">
</span><p data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">To stay tuned on future cycles of the scholarship, please subscribe to our mailing list below.</span></p><span data-dcnode-id="5878" instrument_node="">
</span><p data-dcnode-id="5874"><span data-dcnode-id="5877" instrument_node="">Each year, hundreds of nominees are evaluated and up to 100 merit based scholarships are awarded to promising AI master’s candidates. </span><a data-dcnode-id="5875" href="#text-block-17"><span data-dcnode-id="5876" instrument_node="">Read more about previous scholarship recipients and the AI projects and research they are exploring.</span></a></p><span data-dcnode-id="5873" instrument_node="">

</span><p data-dcnode-id="5344"><strong data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">What are you working on now? </span></strong><span data-dcnode-id="5345" instrument_node="">I’m currently working on a project to analyze histopathology images by applying U-Net, a convolutional neural network for biomedical applications, to segment tissue and remove background information. We will also compare this tool against other image processing tools as well to find out which method is more accurate or faster. So far, no one has used U-net for segmenting tissue. This application will have implications for cancer detection in the future, which is so inspirational and I am excited about.</span></p><span data-dcnode-id="5343" instrument_node="">

</span><p data-dcnode-id="5306"><strong data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">What’s next?</span></strong><span data-dcnode-id="5307" instrument_node=""> As a physician, I’m lucky to work with colleagues and patients who continue to strive for better outcomes. We are working on NLP and Image Detection solutions currently to solve health system demand problems on a global scale. In the future, I hope to continue to combine my experience in healthcare and AI to work with like-minded people to solve problems and develop great solutions.</span></p><span data-dcnode-id="5305" instrument_node="">

</span><p data-dcnode-id="5263"><strong data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">What am I passionate about? </span></strong><span data-dcnode-id="5264" instrument_node=""> As a clinician from the MHI program, I am uniquely positioned to identify the gaps in the healthcare system faced in my everyday work, and help implement AI technologies to bridge these gaps with other clinicians and technical teams. Prior to the MHI, some processes may have frustrated me, but now I view these as opportunities for improvement to use technology to make things easier for patients and healthcare providers. I look forward to these new advancements in healthcare, while ensuring we consider issues such as privacy and governance.</span></p><span data-dcnode-id="5262" instrument_node="">

</span><p data-dcnode-id="5212"><strong data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">What do I bring to the AI industry?&nbsp;</span></strong><span data-dcnode-id="5215" style="font-weight: 400;"><span data-dcnode-id="5216" instrument_node="">I have pretty unique experience as a mechanical engineer, working in both construction and for one of the biggest oil companies in Brazil, managing teams of more than 200 people. I also had the opportunity to work with Renault on quality control and AI systems, presenting to the headquarters, who eventually decided to implement my inspection system for all the teams in France and a number of other factories. With both my management and product development program, I hope to transition to consulting, where I will help analyze and implement AI solutions quickly</span></span><span data-dcnode-id="5213" style="font-weight: 400;"><span data-dcnode-id="5214" instrument_node="">.</span></span></p><span data-dcnode-id="5211" instrument_node="">

</span><p data-dcnode-id="5172"><strong data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">Interesting AI projects I am a part of: </span></strong><span data-dcnode-id="5173" instrument_node="">I am exploring different interdisciplinary collaborations, including one with the Centre for Biodiversity Genomics which involves error correction in DNA barcoding and classification of sequences using AI. Our work will use a predictive modelling approach to shed light on species interactions when novel stimuli are introduced into an environment. Additionally, I am working on a project that focuses on information flow in social networks. I am also collaborating with the Public Health Agency of Canada to predict the severity of COVID-19 cases by investigating associations with clinical symptoms and comorbidities.</span></p><span data-dcnode-id="5171" instrument_node="">

</span><p data-dcnode-id="5132"><strong data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Opportunities for entrepreneurship in AI:</span></strong><span data-dcnode-id="5133" instrument_node="">With my degree in chemistry and my past research experience working in drug development in healthcare, I have been working with a start-up called neuroLytixs, which uses machine learning to aid biomarker discovery for the diagnosis of concussions. The company has just raised seed funding through angel investors, partnered with the Ontario Centres of Excellence, and is part of Techstars AI 2020 in Montreal. During my MMA program at Rotman, I want to learn more about shaping decision-making and strategy at the intersection of healthcare and AI, exploring pathways where I can have a positive impact on patients.</span></p><span data-dcnode-id="5131" instrument_node="">

</span><p data-dcnode-id="5083"><strong data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">What are your interests in AI? </span></strong><span data-dcnode-id="5088" instrument_node="">Since </span><span data-dcnode-id="5086" style="font-weight: 400;"><span data-dcnode-id="5087" instrument_node="">childhood, I have always been interested in computers. I came across AI during my undergraduate degree and realized its importance in its ability to interpret and handle the huge amount of data we generate in our everyday lives. Recently, I started working on a cybersecurity project aimed at detecting phishing applications in website domain names. </span></span><span data-dcnode-id="5084" style="font-weight: 400;"><span data-dcnode-id="5085" instrument_node="">During the COVID-19 pandemic, there have been a lot of new domains being created every day including malicious and phishing ones. Therefore, I am helping develop a classifier that shows whether a given domain name is either legitimate or malicious.</span></span></p><span data-dcnode-id="5082" instrument_node="">

</span></em><span data-dcnode-id="5053" instrument_node="">Queen’s University, MSc in Computer Science (AI)</span><br data-dcnode-id="5052"><span data-dcnode-id="5051" instrument_node="">
Previous Degrees: </span><span data-dcnode-id="5049" style="font-weight: 400;"><span data-dcnode-id="5050" instrument_node="">Bachelor of Computer Science in Biomedical Computing, Queen’s University</span></span></p><span data-dcnode-id="5047" instrument_node="">
</span><p data-dcnode-id="5038"><b data-dcnode-id="5043"><strong data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">What are you most excited about working on?</span></strong><span data-dcnode-id="5044" instrument_node=""> </span></b><span data-dcnode-id="5039" style="font-weight: 400;"><span data-dcnode-id="5042" instrument_node="">I first started on mass spectrometry analysis for detecting breast cancer while working on my undergraduate thesis- I fell in love with this project and it got me excited about pursuing a master’s degree. My current research applies machine learning to high dimensional data, and has the potential to answer important questions such as “what is the metabolic profile of cancer?” By looking at hundreds of pixels, it can lead to medical breakthroughs. I am so excited to be at the leading edge of this research, where I get to intersect with all types of experts, including chemists, pathologists, surgeons and computer scientists. Learn more about me </span><a data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vectorinstitute.ai/2020/12/11/vector-scholarship-in-ai-winner-recognized-for-bringing-ai-to-cancer-analysis/"><span data-dcnode-id="5041" instrument_node="">here.</span></a></span></p><span data-dcnode-id="5037" instrument_node="">

</span><p data-dcnode-id="4997"><strong data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">What are you working on now: </span></strong><span data-dcnode-id="4998" style="font-weight: 400;"><span data-dcnode-id="4999" instrument_node="">I am working in the interdisciplinary Computational Social Science Lab to understand the impact of machine learning systems of online platforms on user behaviour. If the impacts of these algorithms are negative, how can we build better ones that have high accuracy but also positively impact wellbeing? I hope to be part of the movement towards creating more user-centric systems that account for human trust and wellbeing, while avoiding bias. </span></span></p><span data-dcnode-id="4996" instrument_node="">

</span></em><span data-dcnode-id="4964" style="font-weight: 400;"><span data-dcnode-id="4965" instrument_node="">Current: Senior Applied Research, PointClickCare</span></span><br data-dcnode-id="4963"><span data-dcnode-id="4962" instrument_node="">
</span><span data-dcnode-id="4960" style="font-weight: 400;"><span data-dcnode-id="4961" instrument_node="">Alumni of York University, MSc in Computer Science (AI)</span></span></p><span data-dcnode-id="4958" instrument_node="">
</span><p data-dcnode-id="4953"><span data-dcnode-id="4954" style="font-weight: 400;"><strong data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">What are you working on now:</span></strong><span data-dcnode-id="4955" instrument_node=""> In my role, we use a lot of data from nursing homes and long-term care facilities and apply machine learning to deploy models to enable healthcare professionals to make better decisions. We’re focused on explainability because our customers want to know the “why” of certain decisions; we work closely with them to provide these insights. </span></span></p><span data-dcnode-id="4952" instrument_node="">

</span></strong><em data-dcnode-id="4923"><span data-dcnode-id="4926" instrument_node="">2021-22 Vector Scholarship in AI Recipient</span><br data-dcnode-id="4925"><span data-dcnode-id="4924" instrument_node="">
</span></em><span data-dcnode-id="4921" style="font-weight: 400;"><span data-dcnode-id="4922" instrument_node="">Current: MSc in Computer Science, University of Toronto</span></span></p><span data-dcnode-id="4919" instrument_node="">
</span><p data-dcnode-id="4912"><strong data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">What are your interests in AI research? </span></strong><span data-dcnode-id="4915" style="font-weight: 400;"><span data-dcnode-id="4916" instrument_node="">My AI research interests are in probabilistic motion prediction and planning to improve the safety and efficiency of self-driving vehicles. This means we’re trying to allow our self-driving vehicles to make more diverse predictions and also in more risky and rare road scenarios. I will work on using better representations and self-supervised learning in order to better model how the world is evolving, how to interact and navigate a space with multiple agents – especially where there is less data and when you don’t have complete information</span></span><span data-dcnode-id="4913" style="font-weight: 400;"><span data-dcnode-id="4914" instrument_node="">.</span></span></p><span data-dcnode-id="4911" instrument_node="">

</span></em><span data-dcnode-id="4880" style="font-weight: 400;"><span data-dcnode-id="4881" instrument_node="">Current: </span></span><span data-dcnode-id="4875" style="font-weight: 400;"><span data-dcnode-id="4879" instrument_node="">MSc in Computer Science, Brock University</span><em data-dcnode-id="4876"><br data-dcnode-id="4878"><span data-dcnode-id="4877" instrument_node="">
</span></em></span><span data-dcnode-id="4873" style="font-weight: 400;"><span data-dcnode-id="4874" instrument_node="">Former: BSc in Computer Science, Minor in Philosophy, Brock University</span></span></p><span data-dcnode-id="4871" instrument_node="">
</span><p data-dcnode-id="4866"><span data-dcnode-id="4867" style="font-weight: 400;"><strong data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">What’s next for you?</span></strong><span data-dcnode-id="4868" instrument_node=""> I’m currently collaborating with the National Research Council (NRC) on AI for drug and material design. The lab focuses on many areas, from developing new medications to new materials for airplanes. I’ve contributed to work with NRC on computing energy levels for molecules and using variational quantum Eigensolvers, and am working on some papers on AI for drug design.</span></span></p><span data-dcnode-id="4865" instrument_node="">

</span></em><span data-dcnode-id="4830" style="font-weight: 400;"><span data-dcnode-id="4831" instrument_node="">Current: MASc in Aerospace Studies, University of Toronto</span></span><br data-dcnode-id="4829"><span data-dcnode-id="4828" instrument_node="">
</span><span data-dcnode-id="4826" style="font-weight: 400;"><span data-dcnode-id="4827" instrument_node="">Undergraduate: University of Alberta, BSc in Electrical Engineering ‘21</span></span></p><span data-dcnode-id="4824" instrument_node="">
</span><p data-dcnode-id="4819"><span data-dcnode-id="4820" style="font-weight: 400;"><strong data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">What are your plans for your master’s degree?</span></strong><span data-dcnode-id="4821" instrument_node="">&nbsp;My main research is going to be on unmanned aerial vehicles at the center of sensor fusion, deep learning, and computer vision. In GPS-denied environments, visual navigation is important but there are a lot of challenges such as lighting, time of day, and poor weather. I plan on exploring how we can use thermal images with visual-spectrum algorithms using deep learning to navigate under any lighting conditions.</span></span></p><span data-dcnode-id="4818" instrument_node="">
