</span><meta content="Truly understanding what others need and want, how they see the world, and how they feel are core prerequisites for successful conflict resolution and…" data-dcnode-id="1002" property="og:description"><span data-dcnode-id="1001" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0005&quot;><p id=&quot;spar0005&quot;>Truly understanding what others need and want, how they see the world, and how they feel are core prerequisites for successful conflict resolution and humanitarian response. Today, however, human cognitive limitations, insufficient expertise in the right hands, and difficulty in managing complex social, conflict, and real-world knowledge conspire to prevent us from reaching our ultimate potential. This paper introduces <em>cogSolv</em>, a highly novel Artificial Intelligence system capable of understanding how people from other groups view the world, simulating their reactions, and combining this with knowledge of the real world in order to persuade, find negotiation win-wins and enhance outcomes, avoid offense, provide peacekeeping decision tools, and protect emergency responders’ health. Ready to go today, portable, and requiring virtually no specialist expertise, cogSolv allows governments and local NGOs to use expert culture and conflict resolution knowledge to accurately perform a wide range of humanitarian simulations. cogSolv assists responders with training, managing complexity, centralizing and sharing knowledge, and, ultimately, maximizing the potential for equitable conflict resolution and maximally effective humanitarian response.</p></div></div></div>" data-dcnode-id="1000" lang="en" name="citation_abstract"><span data-dcnode-id="999" instrument_node="">

="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS187770581501036X%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="685" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="674"><div class="License" data-dcnode-id="678"><span data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="680" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="675"><span class="access-indicator" data-dcnode-id="677"></span><span data-dcnode-id="676" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="673"></section><section class="ReferencedArticles" data-dcnode-id="672"></section><div class="PageDivider" data-dcnode-id="671"></div><div class="Abstracts u-font-serif" data-dcnode-id="661" id="abstracts"><div class="abstract author" data-dcnode-id="662" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Abstract</span></h2><div data-dcnode-id="663" id="abst0005"><p data-dcnode-id="664" id="spar0005"><span data-dcnode-id="668" instrument_node="">Truly understanding what others need and want, how they see the world, and how they feel are core prerequisites for successful conflict resolution and humanitarian response. Today, however, human cognitive limitations, insufficient expertise in the right hands, and difficulty in managing complex social, conflict, and real-world knowledge conspire to prevent us from reaching our ultimate potential. This paper introduces </span><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">cogSolv</span></em><span data-dcnode-id="665" instrument_node="">, a highly novel Artificial Intelligence system capable of understanding how people from other groups view the world, simulating their reactions, and combining this with knowledge of the real world in order to persuade, find negotiation win-wins and enhance outcomes, avoid offense, provide peacekeeping decision tools, and protect emergency responders’ health. Ready to go today, portable, and requiring virtually no specialist expertise, cogSolv allows governments and local NGOs to use expert culture and conflict resolution knowledge to accurately perform a wide range of humanitarian simulations. cogSolv assists responders with training, managing complexity, centralizing and sharing knowledge, and, ultimately, maximizing the potential for equitable conflict resolution and maximally effective humanitarian response.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="638" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="650"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1877705815010358"><svg class="icon icon-navigate-left" data-dcnode-id="659" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="660"></path></svg><span class="button-alternative-text" data-dcnode-id="652"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="639"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1877705815010371"><span class="button-alternative-text" data-dcnode-id="643"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="641" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="642"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="616"><div class="keywords-section" data-dcnode-id="617" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="633" id="kw0005"><span data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Conflict Resolution</span></span></div><div class="keyword" data-dcnode-id="630" id="kw0010"><span data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Humanitarian Response</span></span></div><div class="keyword" data-dcnode-id="627" id="kw0015"><span data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Peacekeeping</span></span></div><div class="keyword" data-dcnode-id="624" id="kw0020"><span data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Culture</span></span></div><div class="keyword" data-dcnode-id="621" id="kw0025"><span data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Knowledge</span></span></div><div class="keyword" data-dcnode-id="618" id="kw0030"><span data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Artificial Intelligence</span></span></div></div></div><div class="RawText" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node=""> Procedia Engineering  107 ( 2015 )  282 â€“ 292  1877-7058 Â© 2015 The Authors. Published by Elsevier Ltd. This is an open access article under the CC BY-NC-ND license  (http://creativecommons.org/licenses/by-nc-nd/4.0/). Peer-review under responsibility of the Organizing Committee of HumTech2015 doi: 10.1016/j.proeng.2015.06.083  ScienceDirect Available online at www.sciencedirect.com Humanitarian Technology: Science, Systems and Global Impact 2015, HumTech2015 New Artiï¬�cial Intelligence Tools For Deep Conï¬‚ict Resolution and Humanitarian Response Daniel J. Olshera aIntegral Mind Technologies, Washington DC, United States dan@intmind.com Abstract Truly understanding what others need and want, how they see the world, and how they feel are core prerequisites for successful conï¬‚ict resolution and humanitarian response. Today, however, human cognitive limitations, insuï¬ƒcient expertise in the right hands, and diï¬ƒculty in managing complex social, conï¬‚ict, and real-world knowledge conspire to prevent us from reaching our ultimate potential. This paper introduces cogSolv, a highly novel Artiï¬�cial Intelligence system capable of understanding how people from other groups view the world, simulating their reactions, and combining this with knowledge of the real world in order to persuade, ï¬�nd negotiation win-wins and enhance outcomes, avoid oï¬€ense, provide peacekeeping decision tools, and protect emergency respondersâ€™ health. Ready to go today, portable, and requiring virtually no specialist expertise, cogSolv allows governments and local NGOs to use expert culture and conï¬‚ict resolution knowledge to accurately perform a wide range of humanitarian simulations. cogSolv assists responders with training, managing complexity, centralizing and sharing knowledge, and, ultimately, maximizing the potential for equitable conï¬‚ict resolution and maximally eï¬€ective humanitarian response. Â© 2015 Daniel Olsher. Published by Elsevier Ltd. Peer-review under responsibility of the Organizing Committee of HumTech2015. Keywords: Conï¬‚ict Resolution; Humanitarian Response; Peacekeeping; Culture; Knowledge; Artiï¬�cial Intelligence 1. Introduction and Theoretical Motivation Humans have proven themselves to be remarkable conï¬‚ict resolvers, persuaders, and responders to hu- manitarian disasters of all kinds. Practically speaking, however, responders ï¬�nd themselves confronted by a myriad of cognitive and organizational limitations. Humanitarian contexts are characterized by complex, diï¬ƒcult-to-predict social systems grounded in psychology, culture, and deep knowledge bases. The infor- mation needed for response is often distributed across multiple experts, and is diï¬ƒcult to synthesize in ways suï¬ƒcient to guide response. Countless fragments of information interact in unpredictable ways, making it exceedingly diï¬ƒcult to obtain the â€˜big pictureâ€™ and truly understand what is going on. Moreover, NGOs, local groups, and government agencies alike often lack meaningful access to conï¬‚ict resolution, cultural, and other key knowledge. Therefore, successful conï¬‚ict resolution and humanitarian response often tend to require a certain amount of luck - having the right people come together with the right information. One reason for this is that, often, critical knowledge is unconscious and not easily accessed or standard- ized, including cultural and other social knowledge as well as expert knowledge. Nowhere is this more true than when responders must work with those holding worldviews diï¬€erent than their own; the tendency to fall into ethnocentric traps and ignore key aspects of the other sideâ€™s worldview is very diï¬ƒcult to avoid.  2015 The Authors. Published by Elsevier Ltd. This is an open access article under the CC BY-NC-ND license  (http://creativecommons.org/licenses/by-nc-nd/4.0/). Peer-review under responsibility of the Organizing Committee of HumTech2015 283 Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  Yet, when seeking to work with and/or convince others who think diï¬€erently from us, we will only achieve success if we design appeals with respect to the other sideâ€™s true (and often unexpressed) point of view. Furthermore, it is easy to overlook conï¬‚ict solutions that appear to be equitable but in fact ignore key needs and values for the other side. In disaster response, perceived cultural insensitivity may cause sur- vivors to ignore oï¬ƒcial communications such as evacuation orders [1], and the inability to manage complex chemical, equipment-related, and other practical knowledge often gives rise to critical health risks. In the past, factors such as these have lead to missed opportunities, renewed conï¬‚icts, sub-optimal outcomes, structural violence, and, ultimately, the loss of life. In the case of peacekeeping missions, charac- terized by the sending of signals that must be correctly understood by those with diverse worldviews, failure may mean the breaking of a ceaseï¬�re, rioting, or the resumption of war. Many knowledgeable commenta- tors (see [2], for example) suggest that the failure of UNOSOM II (the mission upon which the movie Black Hawk Down was based) was due precisely to factors such as these. When peacekeeping leaders â€˜get the callâ€™, there often isnâ€™t suï¬ƒcient time to undertake deep study of the cultures they will be working within. (personal communication, ex-SRSG) As demonstrated by UNITAR training scenarios, it can be diï¬ƒcult indeed for peacekeeping battalion commanders to determine how to proceed in culturally-appropriate ways. Given the demonstrated need to devolve ever-increasing amounts of decision-making power to the ï¬�eld (cf. [3]), future commanders are likely to ï¬�nd themselves more and more dependent on incomplete information. As an example, one such UNITAR training scenario, set in Africa, imagines an ex-soldier who has climbed a fence and broken into a UN MOVCON warehouse. Breaking his Rules Of Engagement (ROE), the ï¬�ctitious peacekeeper shoots the ex-soldier. A crowd begins to gather outside the base, demanding the ex-soldierâ€™s body, and the commander must decide what to do. Using models developed in conjunction with a Ugandan informant, simulations have shown that, in such a situation, it would be essential for the UN to engage to some extent with local conï¬‚ict resolution processes if further bloodshed were to be avoided. It is most probable, however, that under such a scenario the necessary knowledge would not be available to local decision-makers and they would not be aware of this. Generally speaking, computers hold immense potential for helping humans overcome diï¬ƒculties such as these. Unfortunately, however, in the past they have been unable to do so, as mainstream Artiï¬�cial Intelligence (AI) has not had the ability to store and handle nuanced social data in a way that would allow it to in some sense â€˜understandâ€™ and productively model these types of complex systems. With the recent advent of the Atomic approach to AI, however, this has now become possible. This school of thought represents a fundamentally new perspective on the discipline. Two core Atomic formalisms, INTELNET and COGVIEW [4], provide the foundation for cogSolv, the suite of technologies discussed in this paper. INTELNET allows highly nuanced knowledge about the world to be stored and conclusions drawn from it in exceedingly ï¬‚exible, powerful ways. COGVIEW enables computers to conduct simulations grounded in complex psychological and cultural worldviews. Critically, COGVIEW models (known as Deep MindMaps) are human-readable and machine-processable at the same time, meaning that they can be created with only minimal training and used by personnel without signiï¬�cant specialist expertise. The exact same data that is entered into the computer can be easily used for teaching and discussion purposes. As Spriet and Vansteenkiste (1982 in [5]) suggest, â€œSocial systems are sometimes labeled in the literature as soft systems or ill-deï¬�ned systems where the usefulness of traditional mathematical representations is questioned.â€� COGVIEW models allow us to understand complex human situations while retaining their nuance, using ï¬‚exible, brain-inspired algorithms to eï¬€ect processing. Ultimately, this enables us to generate remarkably human-like predictions across complex social systems. cogSolv and Atomic AI are optimized for the type of data found in humanitarian environments; in such contexts, the â€˜softerâ€™ aspects make all the diï¬€erence.[4] COGVIEW is able to integrate disparate forms of information (such as emotional and practical/commonsense knowledge) quickly and eï¬€ectively. 1.1. What Can cogSolv Do? In conï¬‚ict resolution, negotiation, advocacy, persuasion, peacekeeping, disaster response, and other key humanitarian processes, cogSolv simulations provide precise guidance as to how to respond, pointing out actions that should be undertaken or strenuously avoided. cogResolv, the conï¬‚ict-focused component of cogSolv, can store and simulate expert conï¬‚ict resolution techniques, automatically integrating these with situational/cultural models developed by ï¬�eld and HQ experts. cogResolv acts as a trusted advisor and ally before, during, and after the mission, centralizing cultural and practical data. In protracted conï¬‚ict or when stalemates arise, the computer helps ï¬�nd ways around blockages. cogResolv simulates the eï¬€ects of actions and the perceptions that they will create for other parties, identiï¬�es hidden win-wins and potential problems, circumvents biases, and helps discover actions that can reinforce the resulting peace. It helps meet needs in creative ways, maximizing â€˜deepâ€™ (integrative) justice. 284   Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  In line with GRIT (Gradual Reduction In Tensions) theory [6], cogResolv can suggest potential conces- sions that may reduce tensions while maximizing value for all sides. It makes the hidden explicit, models critical psychological factors such as pain and determination, helps increase decision quality, and models the ripple eï¬€ects of small decisions across large, complex social systems. cogResolv helps conï¬‚ictants separate issues during negotiations, making all parties aware of the totality of the world in which they operate. Its Integrative Justice Scores provide a quick, concise metric of the extent to which the deep needs of all parties are being taken into account and hidden biases addressed. Facilitating situational awareness, cogResolv allows practitioners to work together to manipulate a shared vision of a current situation and to visually indicate points of reference or areas of concern. cogSolv and cogResolv also support training and situational awareness; oï¬ƒcials sent to conï¬‚ict sites on a momentâ€™s notice, peacekeepers, and students can all beneï¬�t from cogSolvâ€™s ability to quickly and easily facilitate understanding. cogSolv enables team members to quickly appreciate the existence, importance, and consequences of critical knowledge, helping to get everyone on the same page. In summary, cogSolvâ€™s Artiï¬�cial Intelligence capabilities provide decision-makers with critical tools for making socially-nuanced life-or-death decisions. 2. Core Humanitarian Focus Areas Current cogSolv/cogResolv focus areas include: â€¢ Conï¬‚ict modeling/prediction, including protracted conï¬‚ict, â€¢ Persuasion (especially emotionally/subconsciously-driven: beliefs, values, religion), â€¢ Social media analysis, including sentiment/topic detection and modeling, â€¢ Knowledge/culture-based deep analysis of extremist messages, â€¢ Nuanced conï¬‚ict understanding and training, â€¢ Peacekeeping, â€¢ Disaster response, and â€¢ Conï¬‚ict early warning (grounded in analysis of prevailing social scenarios and social media inputs). 3. Potential Users cogSolv and cogResolv ï¬�nd applicability to a wide range of humanitarian and conï¬‚ict-sensitive domains, including the following: Â· Peacekeeping: Interactions with local populations, calming tensions, mission design, gender sensitivity. Who: Field battalion leaders, UN Department for Peacekeeping Operations (DPKO) personnel / HQ. Â· Development: Locally-sensitive intervention design, anti-discrimination advocacy, empowerment of sex workers, gender sensitivity, calming of tensions. Who: Field personnel, planners. Â· Early Warning/Data Mining/Machine Learning: cogSolv capabilities for natural language and so- cial media processing point the way to a capacity for early warning of conï¬‚ict hotspots or likely social ruptures. cogSolv and the associated COGBASE[7] commonsense knowledge base support data mining, machine learning and deep learning, as well as other processes for discovering patterns in input data. Â· Diplomacy: International negotiations, cooperation in international organizations (ASEAN, UNSC), human rights (especially elements oriented towards values, religions, cultures and other intangible vari- ables). Notably included are resource-oriented conï¬‚icts, especially when multiple issues may be traded against one another. Who: Those accredited to international fora, human rights personnel, cultural attachÃ©s. Â· DOS/DOD/Foreign Ministries/States: Public information, de-escalation, cultural exchange, locally- sensitive project design, anti-extremism. Who: Public Information Oï¬ƒcers (PIO), liaison personnel. Â· NGOs, USAID: Advocacy, anti-discrimination, gender/culture/religion-responsive planning, predic- tion of local areas of discontent with particular policies. Who: Local ï¬�eld personnel, HQ planning personnel, USAID Innovation Lab. Â· FEMA, Emergency Responders: Culture- and task-aware disaster response, bringing AI and deep knowledge management to local organizations. Who: Any organization where having access to the right knowledge (lessons learned, chemical response models, etc.) at the right time can make a signiï¬�cant diï¬€erence. Â· Oil companies: Avoiding local conï¬‚ict, planning project development in locally-sensitive ways. Who: Those who negotiate with local communities, those at HQ responsible for overall peace and pro- duction continuation, project planners. 285 Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  4. Current Status All of the software described in this paper is currently functional and usable for real-world eï¬€orts. The underlying technology has been proven in various contexts ([7â€“10], and others). A signiï¬�cant military cus- tomer has expressed interest in using Atomic AI as its standard for commonsense knowledge, and Atomic principles are currently being employed in a US Government application which has received highly favor- able feedback from evaluators. Currently available Deep MindMaps include aspects of US, Chinese, and Iranian cultures, African con- ï¬‚ict and peacekeeping models, Corporate Social Responsibility, HIV prevention, and more. 5. Packaging Mindful of the real-world needs of ï¬�eld users, the entire cogSolv system can be run on a single lap- top with no Internet connection, across the Web with minimal Internet speed requirements, or on a cell- phone/smartphone with or without Internet connection. The system is easy-to-use and requires no technical background, making it useful to a wide range of responders, decisionmakers, planners, and conï¬‚ict resolvers. 6. COGVIEW Deep MindMaps: Mapping Beliefs, Religions, Psychology cogSolv relies on COGVIEW Deep MindMaps to understand people and the world in which they live. Deep MindMap diagrams describe important aspects of how others think and view the world. Simple to create and to understand, Deep MindMaps allow cogSolv to simulate the needs and selected aspects of the thought patterns of others. This in turn allows the computer to create counteroï¬€ers and persuasion strategies tailor-made for them, predict in useful part their likely reaction to certain actions, and assist users in â€˜getting into the mindsâ€™ of others. Deep MindMaps are able to represent nuanced information about local cultural and conï¬‚ict resolution practices, including religious practices and viewpoints. Fig. 1. Sample Deep MindMap MindMaps provide a critical knowledge multiplier in that the information they con- tain is no longer locked inside the heads of experts - rather, it may be disseminated across the enterprise where it is able to inï¬‚u- ence the decision making processes of great numbers of personnel. There are three general types ofMindMaps: â€¢ Cultural (Deep Worldview Models) â€¢ Psychological (included with cogSolv) â€¢ Conï¬‚ict (deep goals and concerns) Cultural/worldview models tell the com- puter how a speciï¬�c group of people (as de- ï¬�ned by the user) tends to see the world. Built by or in conjunction with informants, they help remove a signiï¬�cant source of in- accurate decision-making: ethnocentrism. Psychological models provide cross-cultural insight into the human psyche, drawing on cognitive and social psychology. Users need not create such models, however, as a very complete set is provided as an integral part of the cogSolv suite. In conï¬‚ict contexts, conï¬‚ict models provide a simple means of informing the system about the speciï¬�c content of the conï¬‚ict at hand. 6.1. How are MindMaps built? Deep MindMaps are easy to create, and can be built in the ï¬�eld by those who have the best knowledge, written at HQ by experts, or created via some combination of the two. Once created, MindMaps are reusable and can be stored in common libraries. Only minimal training is required in order to create MindMaps via a straightforward two-step process. In the ï¬�rst step, important concepts are identiï¬�ed in the domain of interest. In the second, those concepts are linked together in pairs. The structure of MindMaps makes it easy to test for correctness. Because humans can read and understand the exact same models that are presented to the computer, there is no need to engage in time-consuming model translation between development and deployment stages. 286   Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  6.2. How many MindMaps do I need? For persuasion, cogSolv performs best with one Deep MindMap for each involved culture or subcul- ture. For conï¬‚ict resolution, one overall Conï¬‚ict MindMap and at least one Cultural MindMap for each participant would be ideal. The system can work with less information, at the cost of reduced nuance. MindMaps are meant to be reused across missions; it is envisioned that, for ï¬�eld use, prebuilt libraries of Deep MindMaps would be created at HQ in conjunction with informants and then made available for reuse in the ï¬�eld. 7. cogSolv/cogResolv: What Can They Understand? cogSolv makes social factors such as religion, culture, values, and history much easier for outsiders to understand and take into account. cogSolvâ€™s combined visualization, collaboration, and modeling capabilities allow interested parties to spatially comprehend the identities, psychological dynamics, and structural factors undergirding the com- plex relationships between disputants, stakeholders, and community and interest groupings, including: â€¢ the in-depth nature of the relationships between parties, speciï¬�cally focusing on psychological dimen- sions such as emotional connections, past history, past grievances, ethnic and clan concerns, â€¢ social, economic, political, and power-related structure issues, including resource contestation, polit- ical access, and intergroup rivalries and power imbalances, â€¢ general psychological principles, such as trauma that needs to be resolved, and community integration that may be required, â€¢ the dynamical nature and potential relevance of community-based reconciliation methods (such as mato-oput), and â€¢ general related historical circumstances and events. Through clarity and nuanced simulation, cogSolv seeks to make the hidden explicit, increase decision quality, and model psychological factors such as pain and determination. cogSolv can model the unobvious eï¬€ects on complex systems of single changes, including the dynamic eï¬€ects of changes and perturbations over time. Essentially, cogSolv â€˜gets into the headâ€™ of participants, modeling subjective experience at a a deep level. cogResolv allows negotiators to discover which parts of the conï¬‚ict â€˜spaceâ€™ are more ï¬�xed and thus less amenable to negotiation and areas where there may be more room from the other partiesâ€™ perspectives. 7.1. Peacekeeping As alluded to above, in many ways peacekeeping is inherently constituted by signaling, especially so because peacekeepers often cannot resort to force to achieve their goals. This means that most actions troops take are calculated to send certain messages, using indirect methods calculated to have certain psychological eï¬€ects. The system can model these. Speciï¬�cally, for local perspectives the system assists users in answering questions like those below: 1. â€˜Minimal understandingsâ€™: Can we establish a minimal set of knowledge we must gain about local perspectives in order to properly design a peacekeeping mission? How should local culture modulate our peacekeeping actions? 2. Modulating emotions/fear/mistrust: how can we calibrate our messages to improve these factors? 3. How can we use local conditions to adjust the messages we send? 4. How can we maximize the legitimacy/correctness/appropriateness of our actions relative to cultural and local standards? 5. How do the â€˜peacekeptâ€™ diï¬€erentially perceive message form and content in diï¬€erent cultural/conï¬‚ictual contexts? 6. What sorts of messages are sent through what actions? For more detailed analysis on the use of Atomic AI in peacekeeping missions, see [11, 12]. 8. Training and Situational Awareness cogSolv and COGVIEW signiï¬�cantly enhance training and situational awareness capabilities. Trainers can use cogSolv to quickly brief parties who have just entered the ï¬�eld of inï¬‚uence (consultants, military personnel, media, academics, and so on). Multiple-party access to a common picture enables new forms of teamwork and shared access to knowledge. cogSolv allows trainers to include a greater totality of information not easily provided via other modal- ities, including relational and psychosocial factors, systems, structure, relationships and psychology. Deep MindMaps allow interested parties to visually arrange, drill-down and spatially understand the true nature of the situation at hand. Grievance details and possible â€˜anglesâ€™ of resolution can be understood and simulated using spatial intelligences in addition to purely rationalistic or sequential methods. 287 Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  8.1. Situational Awareness via Story Building Varied research (cf. [13]) suggests that storytelling is an important part of how humans make sense of their world. Figure 2 demonstrates cogSolvâ€™s ability to automatically convert COGVIEW-based analysis into story form. We are unhappy that you are engaging in Outsider Interference (-100), which is against our Religion ... One must not cause Fear (-100) One must not interfere with Honor (-100) Supporting Others supports Masculinity (1000), which is an important part of Tradition Fig. 2. Output: Story Building This functionality is useful when the story-based perspective is of interest and you wish to understand the other side via that lens, or when one wishes to understand the impact of particular goals on the other side from that sideâ€™s perspective. 9. cogSolv Genies and Their Inputs: Easy To Create and Use cogSolv is structured as a set of Genies, each of which solves a speciï¬�c problem. Some Genies operate solely on COGVIEW Deep MindMaps, while others also accept simple inputs (of the form described in Section 10.1) describing a speciï¬�c scenario for which they will be asked to perform a simulation. For a current list of available Genies, please see http://intmind.com/cogSolvGenies. 10. Sample Humanitarian Applications and Genie Outputs 10.1. Brief Technical Introduction In order to best understand the following demonstrations, it is important to understand two key cogSolv concepts: energy/concept pairs and acceptance scores. Energy/concept pairs assign energy values to concepts (such as happiness or computer). Energy values are numbers and can be positive or negative. Positive energy values attached to a concept indicate that the attached concept is desirable, is present in some context, or is a goal that should be pursued. A negative energy value indicates concepts that are undesirable, not present, or should be avoided. As an example, the energy/concept pair -150/Fear could indicate that fear has been or should be less- ened, or that fear creation should be avoided. Concepts are understood from the â€˜receiving perspectiveâ€™ - thus, the pair 100/Dominance indicates that 100 units of dominance are being applied from the outside to the party whose perspective is being described. When interpreting energy values, 100 is a â€˜typical amountâ€™, so -150/Fear suggests that Fear has been or should be reduced 1.5 times â€˜a reasonably typical amountâ€™ that one might encounter in practical everyday life. The second concept, acceptance scores, indicate how likely someone would be to accept or reject a particular proposition. Normally, scores range from -1 (absolute rejection) to 1 (absolute acceptance), but they can be much larger or smaller depending on simulation outcomes. As an example, one might assign the score +1 to the proposition Obtain food and shelter and -1 to the proposition Experience starvation. Understanding the examples In some of the examples given below, â€˜word cloudsâ€™ are shown with concepts in red and green text. Red-colored text indicates concepts that have negative energy, and green- colored text the reverse. Words are sized in proportion to the energy they have received. Depending on the Genie being used, green concepts often represent those that the user should attempt to augment. In the dissonance-induction context (Figure 3(b)), green concepts are those creating dissonances that are foreseeable but whose impact is likely to be misunderstood due to cultural factors. In this context, the color red denotes critical concepts that are currently being ignored but should be more carefully considered in order to create positive change. 10.2. Advocacy and Persuasion cogSolv oï¬€ers signiï¬�cant functionality for advocacy and persuasion. Related Genies help users employ deep knowledge about beliefs, cultures, and cognition during the persuasion process. cogSolv indicates exactly what to emphasize and how (and what to avoid) in order to maximize persuasive eï¬€ectiveness from the other sideâ€™s point of view. In line with Social Justice Theory[14], the system can also discover the speciï¬�c â€˜anchorâ€™ concepts (see Figure 3(a) below) across which opinions are formed on speciï¬�c issues. cogSolv facilitates the use of Festingerâ€™s theory of Cognitive Dissonance to achieve belief change (see Directed Dissonance Reduction in [10]). As shown in Figure 10.2, cogResolv can calculate how and why dissonance is being created, supporting understanding, persuasion, and other related processes. 288   Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  The running example below (starting with Figure 3) describes howWestern governments could go about handling the recent wave of anti-LGBT sentiment in Africa. They could usefully include or exclude elements in their persuasive communications as suggested by the ï¬�gures below GBT Perception=-3300, Communitarianism=3300, Ego=3300, Tradition=3000, Morality=2600, Face=2500, Masculinity=2000, ... Honor=1000, Conï¬‚ict=800, Oï¬€ended=800/T-1000, Local Dignity=700, Equality=-700, Christianity=-500, Religion=500, Christian Values=-500, anger=400, trauma=400... 10.3. Truly Just, Needs-Focused Conï¬‚ict Resolution As mentioned above, cogResolv focuses on resolving conï¬‚ict in ways that are truly just in the sense that deep emotional and practical needs are met. cogResolvâ€™s access to the core needs of each party allows it to determine to what extent any particular resolution is actually just. 289 Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  For conï¬‚ict-driven contexts, cogResolv includes the following selected features: 10.3.1. Justice Score In COGVIEW terms, a conï¬‚ict may be considered to be justly resolved when 1) target scores (deï¬�ned next) are maximized and 2) no signiï¬�cant clashes (see Figure 5) result. Target scores, deï¬�ned as values attached to speciï¬�c COGVIEW concepts (such as family, safety, and belonging) indicate the core impor- tance of certain concepts to a partyâ€™s fundamental well-being. Clashes, in turn, indicate when a particular phenomenon violates fundamental, deeply-held values. The location of the clash within the Deep MindMap indicates the cause and nature of the incompatibility. cogSolvâ€™s Integrative Option Generator (Section 10.3.2 below) inherently generates options leading to truly just results. Normal Justice Score values range from -1 to 1; values outside this range indicate particularly just or unjust resolutions. 10.3.2. Integrative Option Generator When it is unclear how a conï¬‚ict may be resolved in an integrative (highly equitable) manner, previous resolution attempts may have failed, and new ideas are required, this Genie is able to ï¬�nd new ways of meeting old needs. The system helps separate issues and reframe conï¬‚icts. Each option in Figure 4 below can be interpreted as follows: a concept is given together with an asso- ciated energy. If the energy is positive, policy choices/actions that facilitate that concept should be chosen, and the reverse for negative. As suggested above, 100 units of energy is the â€˜normalâ€™ amount. As an example, equality/700 suggests that strategists would do well to focus judiciously on that con- cept. linking of development assistance/-3000 suggests that strategies should not signiï¬�cantly invoke this concept, and may do well to explicitly disclaim it. Options: Ameliorating 500 units/Colonialism (via relevant African perspective) Western-Country could undertake: Equality/700, Sociality/4300, Local Cultures/700, Linking of Development Assistance/-3000, Strength/1000, pleasure/1000, mad/-1000, anger/-1000, mean/-1000, trauma/-1000, hate/-1000, despise/-3400, scorn/-1000, embarrassment/-1000, Support Others/1000, empathy/1000, enjoy/1000, angry/-1000, Local Dignity/1000, unhappiness/-1000, joy/1000, like/1000, guilt/-400, regret/-400, remorse/-400, Outsider Interference/-3000, Religion/1000, Colonialism/-6000, happy/1000, Social Discomfort/-1000, Human Rights Discourse/-3000, care/1000, Love/1000, Dominance/-1000, Aggression/-1400, heartache/-1000, Support Others/1000, Psychological Drives/1000, Strength/1000, Religion/1000, Local Dignity/1000 Fig. 4. Deep Win-Win (Integrative) Option Generator 10.4. Discover Concepts in Conï¬‚ict (Find Conï¬‚ict â€˜Essenceâ€™) This functionality, demonstrated in Figure 6, helps one understand the â€˜essenceâ€™ of a particular conï¬‚ict, explain the core of the conï¬‚ict to others, and gain new perspectives on existing conï¬‚icts. The Genie presents a list of core concepts that are most responsible for driving the conï¬‚ict at hand. Red concepts are particularly problematic concepts (concepts that are not being properly addressed by the conï¬‚ictants), and green concepts represent those that, if taken properly into account, could help push the conï¬‚ict in the right direction. 10.4.1. Protracted Conï¬‚ict Untangling the complex issues leading to protracted conï¬‚ict represents a very diï¬ƒcult task for humans. cogResolv can provide major support in that it is able to simultaneously â€˜compute all the anglesâ€™ and point users towards the best solutions. cogResolvâ€™s Integrative Option Generator (Section 10.3.2) and Automated Negotiator Agent (next section) automatically generate non-obvious ways forward that simultaneously ad- dress all practical and psychological aspects of conï¬‚ict and equitably maximize beneï¬�ts for all sides. 10.5. Automated Negotiation The ability to understand counterpartsâ€™ worldviews, goals, needs, and so on, leads to the ability to automate and predict potential ï¬‚ows for entire negotiation processes. cogResolvâ€™s Automated Negotiator Agent helps discover options that optimally maximize both sidesâ€™ perceived value. The agent is able to automatically simulate opinions, needs, and goals on both sides of a conï¬‚ict. 290   Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  Sample Clashes: Christian Values vs. Christianity, via: Human Rights Discourse [-100], Outsider Interference [-300], Equality [700.0] Communitarianism vs. Ideologies, via: Colonialism [-100], Equality [700.0], Christian Values [500.0], Christianity [500.0], Religion [1500.0], Local Cultures [700.0] Empathy vs. Morality, via: Colonialism [-100] Face vs. Core Needs, via: Equality [700.0], Christian Values [500.0], Christianity [500.0], Religion [1500.0], Local Cultures [700.0], Respect [700.0] Fig. 5. Sample Clashes Fig. 6. Concepts In Conï¬‚ict (Conï¬‚ict Essence) At each round, the agent chooses options that have been determined to best meet the needs of the other side while avoiding overly negative costs for oneâ€™s own side. Potential oï¬€ers that would be insulting to or overly damaging to either side are automatically suppressed. From Iranâ€™s perspective: Proposal Iranian NuclearWeapons/-300 receives desirability score -4.5658 (i.e. quite low) Reasons: -3600/Security, -2700/Values, -2700/Power, -1880.0/Safety, 1600.0/Dominance, -1600/Country, -900/Control, -675/Equality, -600/Freedom, -600/Honor, -600/Respect ... Agent chooses proposal Trade/132.3725, Diplomacy/65.0, Sanctions/100, score 1.3915. Example â€˜Odious Proposalâ€™: 3000/Attack (i.e. allow other side to attack - even though this may oï¬€set other factors, US canâ€™t oï¬€er this as it too negatively aï¬€ects its interests) Fig. 7. Automated Negotiation Agent (Iranian Nuclear Weapons) The systemâ€™s ability to calculate the value of various oï¬€ers allows it to oï¬€er progressively more value as negotiations continue. As conï¬�rmed via human evaluation, the systemâ€™s oï¬€ers are remarkably human-like. In the case of cogResolvâ€™s simulation of the Iran/US conï¬‚ict over nuclear weapons, cogResolvâ€™s recommendation was in fact nearly identical to a settlement which took place in 2013 (that is, some months after the initial simulation was run - see for example [15]). 11. Culture- and Knowledge-Aware Disaster Response Experiences from the ï¬�eld clearly demonstrate the importance of cultural sensitivity to eï¬€ective disaster response. [1, 16, 17] It is critical to perform modeling in both directions - how responders should act in order to be viewed positively as well as the process by which viewpoints are generated on the survivor side. Bottom line: if responders fail to cater to cultural needs, survivors wonâ€™t trust you and may not evacuate or follow other directions. The beneï¬�ts of Atomic AI for human decision making apply here as well; cogSolvâ€™s cogResponder component can manage detailed task and threat information and help responders triage and avoid emerging threats. cogResponder simulates cultural perception both with respect to 1) responder actions and 2) Tweets and other social media data discussing the actions that responders take. Sentiment and task models are used to extract opinions being expressed. The latter capability allows cogResponder to automatically discover that messages about explosions aï¬€ect human safety (including possibly eyes and hearing). cogResponderâ€™s deep culture and domain knowledge base allows it to provide scores for response activ- ities across various cultural and practical dimensions, including Capability, Responsiveness, Correctness, Values Alignment, Solidarity, and Legitimacy. Lastly, cogResponder enables responders tomaster counterintuitive aspects of response, including the 291 Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  need to take speciï¬�c actions for particular ethnic groups, which could include, for example, providing infor- mation through messages from friends and family instead of formal sources for Vietnamese communities. During response, intelligent actions build solidarity. 11.1. Tweet/Social Media Processing for Disaster Response cogResponder includes a powerful opinion mining engine capable of using deep semantics, Atomic AI, COGVIEW, and COGBASE [7], to determine the real-world eï¬€ects of events using commonsense knowl- edge and, in turn, the pleasantness and emotional eï¬€ects (including cultural and other perceptions) of raw social media textual content. As an example, if an incoming tweet suggests that an explosion has taken place, the system understands that this is likely to cause pain and unhappiness, which will be viewed negatively and will also reï¬‚ect poorly on responders as they did not prevent this from occurring. In the sentence â€˜I have no shoesâ€™, the systemâ€™s knowledge enables it to understand that a shoe is an article of clothing, the lack of which aï¬€ects the health of the individual, which in turn aï¬€ects perception of response. The system contains signiï¬�cant knowledge about what health is and what aï¬€ects it. This knowledge also allows the system to determine that bomb has semantics related to those of explo- sion, so social media users can employ a wide range of vocabulary to describe the things they see. cogResponder can bring particular Tweets to respondersâ€™ attention based on the semantics described therein - â€˜trappedâ€™, family members in distress, and so on. The cogSolv sentiment engine is the ï¬�rst to use deep semantics to this extent. Outputs include 1) trending topic and valence detection (i.e. â€˜I love FEMAâ€™ â†’ positive sentiment to- wards FEMA; â€˜Thankfully there was no explosionâ€™â†’ negative energy into explosion, which provides pos- itive sentiment for responders as well as the Tweet itself), and 2) semantic concept histories (bomb and explosion would trigger the same trending topics). Finally, cogResponder can also discover trending locations so that hotspots may be quickly identiï¬�ed and resources diverted. Input Sentence: â€˜I got chemicals on me.â€™ Key Concept: Chemical Computed Semantic Consequences and Dimensions Aï¬€ected: Explosion/600, High Temperature Explosion/400, Pain/200, Explosive Decomposition/200, Heat/200, Burn(Medical)/200, ... Fire/200, Oil/100, Combustibles/100, Eyes &amp; Skin/-200.0 Cultural Dimensions: Physical Eï¬€ectiveness/-600, Personnel/-600, Physical Security/-600, Core Needs/-600, Responsiveness/-1200, Infrastructure/-1200, Health/-1700, Legitimacy/-1700, Correctness/-1800, Capability/-3500.0 Fig. 8. Deep-Knowledge Sentiment and Eï¬€ect Mining 11.2. Task Models In line with the AI functionalities put forth above, cogResolv is able to automatically comprehend response-related tasks, understand their implications, and prioritize subtasks. Commonsense knowledge acts here as a storehouse of lessons learned, providing detailed information about how to handle dangerous situations. As an example, in a response where the chemical chloropicrin is involved, the system can use its knowl- edge of the proï¬�le and properties of this substance to indicate what tasks, in the current response context, workers should take in order to protect themselves. cogResponder can identify Personal Protective Equip- ment (PPE) that should be used, materials to be avoided, possible symptoms, and so on. The goal is to use unobvious information and/or information that is likely to be overlooked in order to keep responders out of harmâ€™s way, such as the fact that methyl bromide is often present where chloropicrin is and that sea ports often have both chemicals present, in order to help facilitate an ideal response. The system provides real-time task prioritization based on the computed consequences of each choice and can adjust priorities automatically. 12. Conclusion It is all too easy to take the state of todayâ€™s world for granted - to assume that the limitations we have today as human beings can never be transcended and that we must therefore accept things as they are. If, on the other hand, we could use the power of accurate, truly culturally-aware Artiï¬�cial Intelligence to understand, reason about, and deeply dive into human data, it seems possible we could understand others more profoundly and in so doing ï¬�nd new solutions to problems that have eluded us in the past. 292   Daniel J. Olsher /  Procedia Engineering  107 ( 2015 )  282 â€“ 292  (a) General Task Modeling Task Reasoning Concept Criticality Import. Search and Rescue 380 14.44 Hospital Transport 300 9 Deploy Food Aid 200 2 Housing 100 1 Health 100 1 Trash -100(no trash) 1 Manage Donations 100 0 Damage Assessment 100 0 (b) Consequence-based Reasoning Fig. 9. Sample Disaster Response Output Bringing the wisdom of experts to those who would normally not have access to it, avoiding humanitar- ian mission failure, improving disaster response, and reducing violent, intractable, and latent conï¬‚ict alike - this is cogSolvâ€™s vision. Future work will involve enhanced ï¬�eld outreach and further development of Genies for speciï¬�c usersâ€™ needs and particular conï¬‚ict theories. As adoption grows, it is hoped that cogSolvâ€™s impact will as well. Acknowledgements The author grate e="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="350" id="abspara0010"><span data-dcnode-id="351" instrument_node="">Some studies have discussed the potential and challenges related to the use of artificial intelligence (AI) in government. However, there are few empirical studies that have examined factors that influence the use of AI in government. By collecting policy documents and empirical data from the government, IT enterprises, and the public in China, we identified the influencing factors in the three stages of government adoption, implementation, and decision-making. The research results show that the influencing factors of government application of AI are different at different stages and with different stakeholders’ backgrounds.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="328"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0740624X18303113" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article1-title"><span data-dcnode-id="345" instrument_node="">How and where is artificial intelligence in the public sector going? A literature review and research agenda</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2019, Government Information Quarterly</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="329"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="330" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="331"><p data-dcnode-id="332" id="sp0050"><span data-dcnode-id="333" instrument_node="">To obtain benefits in the provision of public services, managers of public organizations have considerably increased the adoption of artificial intelligence (AI) systems. However, research on AI is still scarce, and the advance of this technology in the public sector, as well as the applications and results of this strategy, need to be systematized. With this goal in mind, this paper examines research related to AI as applied to the public sector. A review of the literature covering articles available in five research databases was completed using the PRISMA protocol for literature reviews. The search process yielded 59 articles within the scope of the study out of a total of 1682 studies. Results show a growing trend of interest in AI in the public sector, with India and the US as the most active countries. General public service, economic affairs, and environmental protection are the functions of government with the most studies related to AI. The Artificial Neural Networks (ANN) technique is the most recurrent in the investigated studies and was pointed out as a technique that provides positive results in several areas of its application. A research framework for AI solutions for the public sector is presented, where it is demonstrated that policies and ethical implications of the use of AI permeate all layers of application of this technology and the solutions can generate value for functions of government. However, for this, a prior debate with society about the use of AI in the public sector is recommended.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="317"><div class="sub-heading" data-dcnode-id="322"><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1142/9789811241437_0005" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="326" id="citing-articles-article2-title"><span data-dcnode-id="327" instrument_node="">The Functions of Artificial Intelligence in Mediation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">2021, Contemporary Issues In Mediation - Volume 6</span></div></div><div class="buttons" data-dcnode-id="321"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="318"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="319" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="320"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="306"><div class="sub-heading" data-dcnode-id="311"><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.9770/jesi.2020.8.2%2829%29" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="315" id="citing-articles-article3-title"><span data-dcnode-id="316" instrument_no
