ol fl-node-61222ba83d9d0 fl-col-small" data-dcnode-id="872" data-node="61222ba83d9d0"><div class="fl-col-content fl-node-content" data-dcnode-id="873"><div class="fl-module fl-module-photo fl-node-61222ba83d9d3" data-dcnode-id="874" data-node="61222ba83d9d3"><div class="fl-module-content fl-node-content" data-dcnode-id="875"><div class="fl-photo fl-photo-align-center" data-dcnode-id="876" itemscope="" itemtype="https://schema.org/ImageObject"><div class="fl-photo-content fl-photo-img-png" data-dcnode-id="877"><span data-dcnode-id="879" instrument_node=""> </span><img alt="ATII Project Hades logo" class="fl-photo-img wp-image-2004 size-full" data-dcnode-id="878" height="1024" itemprop="image" loading="lazy" sizes="(max-width: 906px) 100vw, 906px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//followmoneyfightslavery.org/wp-content/uploads/2021/08/3-headed-dog-in-shield.png&amp;raw" srcset="https://followmoneyfightslavery.org/wp-content/uploads/2021/08/3-headed-dog-in-shield.png 906w, https://followmoneyfightslavery.org/wp-content/uploads/2021/08/3-headed-dog-in-shield-265x300.png 265w, https://followmoneyfightslavery.org/wp-content/uploads/2021/08/3-headed-dog-in-shield-768x868.png 768w" title="ATII Project Hades logo" width="906"></div></div></div></div></div></div></div></div></div></div><div class="fl-row fl-row-full-width fl-row-bg-none fl-node-61222c051138c" data-dcnode-id="282" data-node="61222c051138c"><div class="fl-row-content-wrap" data-dcnode-id="283"><div class="fl-row-content fl-row-fixed-width fl-node-content" data-dcnode-id="284"><div class="fl-col-group fl-node-61222c05147ad" data-dcnode-id="536" data-node="61222c05147ad"><div class="fl-col fl-node-61222c051489b" data-dcnode-id="537" data-node="61222c051489b"><div class="fl-col-content fl-node-content" data-dcnode-id="538"><div class="fl-module fl-module-heading fl-node-61222c0510eb2" data-dcnode-id="862" data-node="61222c0510eb2"><div class="fl-module-content fl-node-content" data-dcnode-id="863"><h1 class="fl-heading" data-dcnode-id="864"><span data-dcnode-id="867" instrument_node=""> </span><span class="fl-heading-text" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Darkwebathon Sprint </span></span></h1></div></div><div class="fl-module fl-module-rich-text fl-node-61222cb02b199" data-dcnode-id="849" data-node="61222cb02b199"><div class="fl-module-content fl-node-content" data-dcnode-id="850"><div class="fl-rich-text" data-dcnode-id="851"><h3 class="p1" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Hosted by Anti-Human Trafficking Intelligence Initiative, we lend our unique darkweb platform, Hades, to join hands with socially responsible individuals with the goal of following the money to fight slavery. Using Hades, participants will identify and profile potential traffickers, crawling for data. Thousands of email, hash, and crypto leads were generated by a variety of automated methods to enable participants to further collect actionable intelligence.</span></h3><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">&nbsp;</span></p><h1 class="p2" data-dcnode-id="855" style="text-align: center;"><b data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">6 Hour Challenge</span></b></h1><h2 class="p2" data-dcnode-id="852" style="text-align: center;"><b data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">• Hash Challenge • Email Challenge • Cryptocurrency Challenge •</span></b></h2></div></div></div><div class="fl-module fl-module-rich-text fl-node-udik7f3m6bnh" data-dcnode-id="836" data-node="udik7f3m6bnh"><div class="fl-module-content fl-node-content" data-dcnode-id="837"><div class="fl-rich-text" data-dcnode-id="838"><h2 class="p2" data-dcnode-id="845" style="text-align: center;"><b data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">May 21</span></b><span data-dcnode-id="846" instrument_node=""> from 12pm - 6pm EST - Introduction and Investigations</span></h2><h2 class="p2" data-dcnode-id="841" style="text-align: center;"><b data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">May 22</span></b><span data-dcnode-id="842" instrument_node=""> from 12pm - 1pm EST - Awards</span></h2><h3 data-dcnode-id="839" style="text-align: center;"><span data-dcnode-id="840" instrument_node="">*Participants are required to review the training videos prior to May 21*</span></h3></div></div></div><div class="fl-module fl-module-button fl-node-jlsw9g42knz8" data-dcnode-id="827" data-node="jlsw9g42knz8"><div class="fl-module-content fl-node-content" data-dcnode-id="828"><div class="fl-button-wrap fl-button-width-custom fl-button-center" data-dcnode-id="829"><span data-dcnode-id="835" instrument_node=""> </span><a class="fl-button" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.office.com/r/AaPN5zQy1V" rel="noreferrer noopener" role="button" target="_blank"><span data-dcnode-id="834" instrument_node=""> </span><span class="fl-button-text" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Register for the 6-Hour Sprint Here</span></span><span data-dcnode-id="831" instrument_node=""> </span></a></div></div></div><div class="fl-module fl-module-rich-text fl-node-616587b3633e1" data-dcnode-id="817" data-node="616587b3633e1"><div class="fl-module-content fl-node-content" data-dcnode-id="818"><div class="fl-rich-text" data-dcnode-id="819"><h3 data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">With your generous </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.office.com/pages/responsepage.aspx%3Fid%3Dxx-dzLbReEecEbRg2UEY9vvezdZwovNBrgk27eHrIhNUQUxGUENCRjFXUzhWN1VVWk5CSEhWRU5OUSQlQCN0PWcu"><span data-dcnode-id="825" instrument_node="">sponsorship,</span></a><span data-dcnode-id="823" instrument_node=""> ATII can work together with industry data experts to equip law enforcement and federal officials with tools and evidence-based actionable intelligence to address the highly challenging and dynamic nature of cybercrimes on the darkweb, particularly CSAM.</span></h3><h3 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Sponsors will achieve awareness among our participants/industry experts - and have the ability to give participants access to their software to aid in the darkwebathon investigations and uncover actionable intelligence.</span></h3></div></div></div><div class="fl-module fl-module-photo fl-node-0b48iy2al6qd" data-dcnode-id="808" data-node="0b48iy2al6qd"><div class="fl-module-content fl-node-content" data-dcnode-id="809"><div class="fl-photo fl-photo-align-center" data-dcnode-id="810" itemscope="" itemtype="https://schema.org/ImageObject"><div class="fl-photo-content fl-photo-img-png" data-dcnode-id="811"><span data-dcnode-id="816" instrument_node=""> </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/1E5Xy_tFTzm3k1VIadfVgdbdmRL8ZrGiH/view%3Fusp%3Dsharing" itemprop="url" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node=""> </span><img alt="Darkwebathon Sprint 2022" class="fl-photo-img wp-image-2568 size-full" data-dcnode-id="814" height="876" itemprop="image" loading="lazy" sizes="(max-width: 671px) 100vw, 671px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//followmoneyfightslavery.org/wp-content/uploads/2022/01/Screen-Shot-2022-01-30-at-9.40.21-AM.png&amp;raw" srcset="https://followmoneyfightslavery.org/wp-content/uploads/2022/01/Screen-Shot-2022-01-30-at-9.40.21-AM.png 671w, https://followmoneyfightslavery.org/wp-content/uploads/2022/01/Screen-Shot-2022-01-30-at-9.40.21-AM-230x300.png 230w" title="Screen Shot 2022-01-30 at 9.40.21 AM" width="671"><span data-dcnode-id="813" instrument_node=""> </span></a></div></div></div></div><div class="fl-module fl-module-rich-text fl-node-5j381hmyn2ds" data-dcnode-id="797" data-node="5j381hmyn2ds"><div class="fl-module-content fl-node-content" data-dcnode-id="798"><div class="fl-rich-text" data-dcnode-id="799"><h3 data-dcnode-id="805"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">INDIVIDUAL INVESTIGATIONS</span></strong></h3><h3 data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">This open-source-based challenge will consist of highly motivated personnel working with a common goal to combat human trafficking. </span><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Darkwebathon </span></em><span data-dcnode-id="801" instrument_node="">brings together talents who are well-rounded professionals able to create actionable intelligence with innovative technology that helps to detect more cybercrime threats and protect society and organizations more effectively.</span></h3></div></div></div><div class="fl-module fl-module-rich-text fl-node-614daffc98d9e" data-dcnode-id="789" data-node="614daffc98d9e"><div class="fl-module-content fl-node-content" data-dcnode-id="790"><div class="fl-rich-text" data-dcnode-id="791"><h3 data-dcnode-id="794"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">WHAT YOU'LL NEED</span></strong></h3><h3 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Participants are encouraged to use their own laptops for the event. For those who need help — we can only supply limited assistance with software installation, so please make sure that you have installed any tools that you may need to plan, develop, and demonstrate your live cases during the lightning talk.</span></h3></div></div></div><div class="fl-module fl-module-rich-text fl-node-61222e6ea5555" data-dcnode-id="766" data-node="61222e6ea5555"><div class="fl-module-content fl-node-content" data-dcnode-id="767"><div class="fl-rich-text" data-dcnode-id="768"><h3 data-dcnode-id="786"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">WHAT YOU'LL GET</span></strong></h3><h3 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The goal is to create digital evidence for qualified leads that law enforcement can use for actionable intelligence.</span></h3><h3 data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Various winners of the challenges will receive:</span></h3><ul data-dcnode-id="769"><li data-dcnode-id="779"><h4 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Hades platform license</span></h4></li><li data-dcnode-id="776"><h4 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Badges</span></h4></li><li data-dcnode-id="773"><h4 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Certificates</span></h4></li><li data-dcnode-id="770"><h4 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Limited Sponsor Technology</span></h4></li></ul></div></div></div><div class="fl-module fl-module-rich-text fl-node-61222fde45425" data-dcnode-id="758" data-node="61222fde45425"><div class="fl-module-content fl-node-content" data-dcnode-id="759"><div class="fl-rich-text" data-dcnode-id="760"><h3 data-dcnode-id="763"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">INTELLECTUAL PROPERTY</span></strong></h3><h3 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">All applicants must sign the ATII Non-Use and Non-Disclosure Agreement upon registration.</span></h3></div></div></div><div class="fl-module fl-module-rich-text fl-node-6122300f53f50" data-dcnode-id="737" data-node="6122300f53f50"><div class="fl-module-content fl-node-content" data-dcnode-id="738"><div class="fl-rich-text" data-dcnode-id="739"><h3 data-dcnode-id="755"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">RULES</span></strong></h3><h3 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">All participants must abide by the following rules:</span></h3><ul data-dcnode-id="740"><li data-dcnode-id="750"><h4 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Competitors may not be organizers, volunteers, judges, sponsors, or occupy any other position of special privilege at the event</span></h4></li><li data-dcnode-id="747"><h4 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Participants may use both open &amp; closed source libraries and frameworks in their projects, but all original work on a project should be done during the competition time</span></h4></li><li data-dcnode-id="744"><h4 data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Participants may not continue working on their projects (code) after the 6-hour time limit is up</span></h4></li><li data-dcnode-id="741"><h4 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Participants may be disqualified from the competition at the organizers' discretion. Reasons might include but are not limited to breaking the Rules, breaking the Code of Conduct, or other unsporting behavior.</span></h4></li></ul></div></div></div><div class="fl-module fl-module-separator fl-node-0pgfvz86u79c" data-dcnode-id="734" data-node="0pgfvz86u79c"><div class="fl-module-content fl-node-content" data-dcnode-id="735"><div class="fl-separator" data-dcnode-id="736"></div></div></div><div class="fl-module fl-module-heading fl-node-pbak57rm8wco" data-dcnode-id="728" data-node="pbak57rm8wco"><div class="fl-module-content fl-node-content" data-dcnode-id="729"><h1 class="fl-heading" data-dcnode-id="730"><span data-dcnode-id="733" instrument_node=""> </span><span class="fl-heading-text" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Congratulations to the 2021 Darkwebathon Winners!</span></span></h1></div></div><div class="fl-module fl-module-rich-text fl-node-jgu9qfc5stbv" data-dcnode-id="650" data-node="jgu9qfc5stbv"><div class="fl-module-content fl-node-content" data-dcnode-id="651"><div class="fl-rich-text" data-dcnode-id="652"><h3 data-dcnode-id="705"><span data-dcnode-id="727" instrument_node="">While Team 26 took first place for number of points earned based on their intelligence report and placement in the hash &amp; cryptocurrency challenges, Brian H. took the coveted MVP of the event award. Many other teams and individuals shared over $100,000 in prizes that were generously donated by </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.manchestercf.com/"><span data-dcnode-id="726" instrument_node="">ManchesterCF</span></a><span data-dcnode-id="724" instrument_node="">, </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osintcombine.com/"><span data-dcnode-id="723" instrument_node="">OSINT Combine</span></a><span data-dcnode-id="721" instrument_node="">, </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adfsolutions.com/"><span data-dcnode-id="720" instrument_node="">ADF Solutions,</span></a><span data-dcnode-id="718" instrument_node=""> </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maltego.com/"><span data-dcnode-id="717" instrument_node="">Maltego</span></a><span data-dcnode-id="715" instrument_node="">, </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tcae.ca/"><span data-dcnode-id="714" instrument_node="">TCAE</span></a><span data-dcnode-id="712" instrument_node="">, </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hunch.ly/"><span data-dcnode-id="711" instrument_node="">Hunchly</span></a><span data-dcnode-id="709" instrument_node="">, and </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twelveprogram.com/"><span data-dcnode-id="708" instrument_node="">TWELVE Program</span></a><span data-dcnode-id="706" instrument_node="">.</span></h3><ul data-dcnode-id="653"><li data-dcnode-id="699"><h3 data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">2</span><sup data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">nd</span></sup><span data-dcnode-id="701" instrument_node=""> Place Overall: Team 16</span></h3></li><li data-dcnode-id="693"><h3 data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">3</span><sup data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">rd</span></sup><span data-dcnode-id="695" instrument_node=""> Place Overall: Team 6</span></h3></li><li data-dcnode-id="687"><h3 data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">4</span><sup data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">th</span></sup><span data-dcnode-id="689" instrument_node=""> Place Overall: Team 5</span></h3></li><li data-dcnode-id="684"><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">MVP Hash: Team 6 (@The_BayouBeast8)</span></h3></li><li data-dcnode-id="681"><h3 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">MVP Hash: Team 6 (@Sophia.Petrillo)</span></h3></li><li data-dcnode-id="678"><h3 data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">MVP Hash: Team 6 (@jodie russell)</span></h3></li><li data-dcnode-id="675"><h3 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">MVP Crypto: Team 3 (@Noel Varghese)</span></h3></li><li data-dcnode-id="672"><h3 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">MVP Onion: Team 55 (@Samantha (ILF))</span></h3></li><li data-dcnode-id="669"><h3 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">MVP Report: Team 6 (@Gabe Longboy)</span></h3></li><li data-dcnode-id="666"><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">MVP Maltego: Team 5&nbsp;(@aleksander)</span></h3></li><li data-dcnode-id="663"><h3 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">MVP Maltego: (@The_BayouBeast8)</span></h3></li><li data-dcnode-id="660"><h3 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">MVP Maltego: (@s0merset7)</span></h3></li><li data-dcnode-id="657"><h3 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">MVP Event:&nbsp;(@Brian Hempstead)</span></h3></li><li data-dcnode-id="654"><h3 data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">MVP Judge:&nbsp;(@David Layman)</span></h3></li></ul></div></div></div><div class="fl-module fl-module-separator fl-node-b37p8yc4dahf" data-dcnode-id="647" data-node="b37p8yc4dahf"><div class="fl-module-content fl-node-content" data-dcnode-id="648"><div class="fl-separator" data-dcnode-id="649"></div></div></div><div class="fl-module fl-module-separator fl-node-2ib9dvxyn6tr" data-dcnode-id="644" data-node="2ib9dvxyn6tr"><div class="fl-module-content fl-node-content" data-dcnode-id="645"><div class="fl-separator" data-dcnode-id="646"></div></div></div><div class="fl-module fl-module-rich-text fl-node-6150d3fc6a41e" data-dcnode-id="542" data-node="6150d3fc6a41e"><div class="fl-module-content fl-node-content" data-dcnode-id="543"><div class="fl-rich-text" data-dcnode-id="544"><h3 data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">TESTIMONIALS</span></strong></h3><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">&nbsp;</span></p><blockquote data-dcnode-id="626"><h5 data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">I am Detective (Warrant Officer) Renato Trabucco from Arma dei Carabinieri – ROS Sez.&nbsp;A/C Brescia, currently working as Digital Forensics Examiner and OSINT Intelligence Analyst.</span></h5><h5 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">I would like to express my best endorsement to the Darkwebathon experience: it was such an incredible event rich in a lot of training, international sponsorship participation and I have gained a lot of valuable insights on how to perform investigation included but not limited to the Darkweb.</span></h5><h5 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">I have had also the possibility to participate in Darkweb CTF for which I set up an incredible team, meeting incredible people and colleagues also involved in my field.</span></h5><h5 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">I was honoured to help the community investigating with all the leads provided during the CTF, in particular crypto address, IP, and email revealing a collection of heinous crimes such as CSAM contents about which the competent LE will investigate further.</span></h5><h5 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">I cannot express my gratitude further and I look forward to the next Darkwebathon and I will share my experience with the community to get many other people involved.</span></h5><h5 data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">-Renato T.</span></h5></blockquote><h3 data-dcnode-id="625"></h3><blockquote class="wp-block-quote" data-dcnode-id="618"><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">&nbsp;</span></p><p data-dcnode-id="619"><span data-dcnode-id="622" instrument_node="">"The Darkwebathon was a great event! Unlike most CTFs, we worked with real human trafficking-related data collected from the dark web. Thanks to the generous sponsors, we worked with some of the best tools in the industry. ATII and their Hades software have made it possible for civilians to be able to take up the fight against human trafficking without exposure to the child and sexual exploitation often associated with this crime, and the trauma it frequently leaves on those dealing with these crimes. While the event was gamified, we all understood that our efforts were making a direct contribution to this international battle. We validated image hashes associated with known dark web child exploitation sites and possibly identified new victims in the process. We dove into the Bitcoin blockchain to identify criminal transactions that could be subject to legal processes by law enforcement. We also helped to improve the Hades software by identifying unknown Onion sites, tagging Bitcoin addresses associated with Dark Markets, and investigating and providing intelligence reports on criminal activity we found. In the end, we gained a great appreciation of the amount of work that still needs to be done.”</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node=""> - Brian H.</span></p></blockquote><h3 data-dcnode-id="617"></h3><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="614"></h3><hr class="wp-block-separator has-text-color has-background has-white-background-color has-white-color" data-dcnode-id="613"><h3 data-dcnode-id="612"></h3><blockquote class="wp-block-quote" data-dcnode-id="601"><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">I had the honor to participate in the first week-long darkwebathon organized via the Anti-Human Trafficking Intelligence Initiative, which brought together talented professionals and volunteers for actionable intelligence to combat human trafficking.</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Provided with leads such as IP address, image hashes and blockchain transactions, our team was able to stand out by producing several reports that helped identifying people related to child-sexual abuse and illicit negotiations.</span></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Albeit without being personally exposed to sensitive materials, it’s been a complex and heartfelt challenge, where I developed insightful skills and empowered my awareness about that piece of web which nobody would like to come across, but everybody can help fight.</span></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Thanks to all the highly motivated personnel I’ve encountered for contributing by sharing their massive knowledge, and to the ATII Team with sponsors, for the inspiring support and unique tools (like Project Hades) they provided throughout the event, aimed at protecting society and the most vulnerable.</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Alessandro O.</span></p></blockquote><h3 data-dcnode-id="600"></h3><hr class="wp-block-separator has-text-color has-background has-white-background-color has-white-color" data-dcnode-id="599"><h3 data-dcnode-id="598"></h3><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="595"></h3><blockquote class="wp-block-quote" data-dcnode-id="584"><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">"This year ATII (Anti-Human Trafficking Intelligence Initiative) started amazing darkwebathon competition worldwide: 400+ Participants participated to fight against various criminal entities (CSAM, Drugs, Weapons etc) together with the help of various tools &amp; services.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">ATII launched&nbsp; their own "Project Hades" Dark Web Monitoring tool during competition. It helped everyone to find out the connections &amp; linked the entities to track these criminals. I have used various dark web tools in the past but "Project Hades" is unique among them. This tool has an amazing large dataset with various selectors, crypto addresses, graphs, screenshots, Image hashes data set etc, which helped our team in CSAM investigation.</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Our team started investigation with single email id and image hash data set, it was 2 days challenge with Intelligence Report and our team (#Team16) has done amazing job by finding various connections between threat actors by using "Project Hades" Dataset along with sponsored tools: #Maltego &amp; #CipherTrace that gave additional information to us about threat actors. By combination of this toolset, we completed our Intelligence Report. We learned so many things during this event by learning and doing hands-on practice on sponsored tools. Thanks to all sponsored partners.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">It was my honor to be part of this amazing event, Our team placed at 2nd position in this dark webathon. Thank you ATII, Judges, Sponsors &amp; their team for sponsoring such an amazing event."</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">-Bheshaj</span></p></blockquote><h3 data-dcnode-id="583"></h3><hr class="wp-block-separator has-text-color has-background has-white-background-color has-white-color" data-dcnode-id="582"><h3 data-dcnode-id="581"></h3><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="578"></h3><blockquote class="wp-block-quote" data-dcnode-id="569"><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">"I had always been passionate about Investigations and the Darkwebathon hosted by ATII gave me an opportunity to do just that. It enabled me to learn and apply new skills, pushing me to go out of my comfort zone.</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The Darkwebathon event spanned across 5 days and we were given access to specialized training and software for the event. We were also provided with multiple data sets at the end of the training, such as&nbsp; IP Addresses, Bitcoin Addresses, SSH Keys, Emails, E-tags, FavIcon, Image Hashes, and conducted an investigation that spanned 2 days. Our team split up and worked on distinct data sets so that we could cover more, working with BTC addresses, Image Hashes and Email addresses led to 3 distinct intelligence reports that covered BTC scams, Individuals affiliated with criminal connections and individuals involved with CSAM.</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Many thanks to my teammates: Jess Ben, Allison Owen, Kimberly Newhard for being communicative and supportive over the event."</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">- Swapnil H.</span></p></blockquote><h3 data-dcnode-id="568"></h3><hr class="wp-block-separator has-text-color has-background has-white-background-color has-white-color" data-dcnode-id="567"><h3 data-dcnode-id="566"></h3><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="563"></h3><blockquote class="wp-block-quote" data-dcnode-id="545"><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">“Our team was provided thousands of selectors including Bitcoin addresses, emails, and IP addresses and conducted an investigation across five days that led to 4 detailed intelligence reports including potential human trafficking, CSAM, and Terrorism leads.</span></p><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Starting out with only IP Addresses and e-mails, we conducted a 2-day investigation that led to 5 intelligence reports that helped identify people who were related to CSAM consumption or other illegal things.</span></p><p data-dcnode-id="548"><span data-dcnode-id="558" instrument_node="">Although the topic was complicated and devastating, I had the opportunity to get outside of my comfort zone and to learn so many things during the event. My team, SabadOSINT, got the honor of being shortlisted. Thanks&nbsp;</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/ACoAAABBQgQB8vL2ahXd2RFyMaCy9igfT4UzKsA"><span data-dcnode-id="557" instrument_node="">Tiby K.</span></a><span data-dcnode-id="555" instrument_node="">,&nbsp;</span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/ACoAABDTsZIB9Peci6taPBwGcYr_Q60i_Tmi9rQ"><span data-dcnode-id="554" instrument_node="">Karthika G.</span></a><span data-dcnode-id="552" instrument_node="">, and&nbsp;</span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/ACoAAATFhx4BNFgJhidO7MU0hjIU_IVJF7RzS-c"><span data-dcnode-id="551" instrument_node="">Robert C.</span></a><span data-dcnode-id="549" instrument_node="">&nbsp;for letting me be a part of it; it is during this kind of event where you learn about the importance of having a strong support system.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">- Valeria S.</span></p></blockquote></div></div></div><div class="fl-module fl-module-separator fl-node-5ngdoyfzw62s" data-dcnode-id="539" data-node="5ngdoyfzw62s"><div class="fl-module-content fl-node-content" data-dcnode-id="540"><div class="fl-separator" data-dcnode-id="541"></div></div></div></div></div></div><div class="fl-col-group fl-node-6177365e1dc00" data-dcnode-id="489" data-node="6177365e1dc00"><div class="fl-col fl-node-6177365e1dcca fl-col-has-cols" data-dcnode-id="490" data-node="6177365e1dcca"><div class="fl-col-content fl-node-content" data-dcnode-id="491"><div class="fl-module fl-module-rich-text fl-node-6192eae93d26b" data-dcnode-id="528" data-node="6192eae93d26b"><div class="fl-module-content fl-node-content" data-dcnode-id="529"><div class="fl-rich-text" data-dcnode-id="530"><h2 data-dcnode-id="533"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">THANK YOU TO OUR 2021 DARKWEBATHON SPONSORS</span></strong></h2><h3 data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">AMBASSADOR LEVEL</span></h3></div></div></div><div class="fl-col-group fl-node-6
