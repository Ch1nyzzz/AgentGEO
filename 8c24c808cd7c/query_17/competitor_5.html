</span><p data-dcnode-id="7738"><span data-dcnode-id="7766" instrument_node="">The term "End Demand" refers to anti-sex trafficking strategies that focus on the "Johns", the sex buyers. A common strategy is to make it a crime to buy sex, whether consensual or not. End Demand is very popular in some countries, including the United States and Canada.</span><sup class="reference" data-dcnode-id="7763" id="cite_ref-berger_187-0"><a data-dcnode-id="7764" href="#cite_note-berger-187"><span data-dcnode-id="7765" instrument_node="">[187]</span></a></sup><span data-dcnode-id="7762" instrument_node=""> In the 1990s, for example, specific media attention was paid to sex trafficking of women outside the United States. The feminist reaction to this at the time was to not just call for social services for trafficked people but also for harsher punishments for Johns. Proponents of the End Demand strategy support initiatives such as "</span><a class="mw-redirect" data-dcnode-id="7760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John%2527s_school" title="John's school"><span data-dcnode-id="7761" instrument_node="">John's schools</span></a><span data-dcnode-id="7759" instrument_node="">" to "rehabilitate" the Johns, increased arrests of johns, and </span><a data-dcnode-id="7757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_humiliation" title="Public humiliation"><span data-dcnode-id="7758" instrument_node="">public shaming</span></a><span data-dcnode-id="7756" instrument_node=""> (e.g. billboards and websites that publicly name johns who were caught).</span><sup class="reference" data-dcnode-id="7753" id="cite_ref-berger_187-1"><a data-dcnode-id="7754" href="#cite_note-berger-187"><span data-dcnode-id="7755" instrument_node="">[187]</span></a></sup><sup class="reference" data-dcnode-id="7750" id="cite_ref-desiree_188-0"><a data-dcnode-id="7751" href="#cite_note-desiree-188"><span data-dcnode-id="7752" instrument_node="">[188]</span></a></sup><sup class="reference" data-dcnode-id="7747" id="cite_ref-189"><a data-dcnode-id="7748" href="#cite_note-189"><span data-dcnode-id="7749" instrument_node="">[189]</span></a></sup><span data-dcnode-id="7746" instrument_node=""> John's Schools were pioneered in San Francisco in 1995 and now used in many cities across the U.S. as well as other countries such as the UK and Canada. Some compare John's Schools programs to driver's safety courses, because first offenders can pay a fee to attend class(es) on the harms of prostitution, and upon completion, the charges against the john will be dropped. Another initiative in line with the End Demand strategy is the cross-country tour "Ignite the Road to Justice," launched by the 2011 Miss Canada, </span><a data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tara_Teng" title="Tara Teng"><span data-dcnode-id="7745" instrument_node="">Tara Teng</span></a><span data-dcnode-id="7743" instrument_node="">. Teng's initiative circulates a petition to end the demand for commercial sex that drives prostitution and sex trafficking. End Demand efforts also include large-scale public awareness campaigns. Campaigns were started in Sweden, Massachusetts, Rhode Island, and Atlanta, Georgia. Massachusetts and Rhode Island also had legislative efforts that criminalized prostitution and increased end demand efforts by targeting Johns.</span><sup class="reference" data-dcnode-id="7740" id="cite_ref-berger_187-2"><a data-dcnode-id="7741" href="#cite_note-berger-187"><span data-dcnode-id="7742" instrument_node="">[187]</span></a></sup><span data-dcnode-id="7739" instrument_node="">
</span></p><p data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">The Atlanta campaign ran from 2006 to 2008 and was titled "Dear John". It ran ads in local media reaching out to potential Johns to discourage them from buying sex. The ads mimicked a break-up letter to John.
</span></p><p data-dcnode-id="7726"><span data-dcnode-id="7735" instrument_node="">Critics of the Dear John campaign focus on the ‘male demand’ aspect of the campaign and find that this style of campaign reinforces gendered, racialized and sexualized assumptions about Johns and trafficked women. The historical discourse in the U.S. concerning Johns is racially charged. An example of this racialized nature is associated with the temptations of Thai massage parlors. Despite these objections, lawmakers have found this messaging morally compelling. The campaign was run by locals of Atlanta. Advocates for the campaign informed citizens through media that young women were the ones being arrested while the Johns were not.</span><sup class="reference" data-dcnode-id="7732" id="cite_ref-:6_176-1"><a data-dcnode-id="7733" href="#cite_note-:6-176"><span data-dcnode-id="7734" instrument_node="">[176]</span></a></sup><span data-dcnode-id="7731" instrument_node=""> Contextual analysis research has shown the essentialized nature of the campaign. The Dear John campaign posters define women in terms of their relationship to sex. They also only depict white girls in the images inferring that the only victims worth caring about are young white and innocent.</span><sup class="reference" data-dcnode-id="7728" id="cite_ref-:6_176-2"><a data-dcnode-id="7729" href="#cite_note-:6-176"><span data-dcnode-id="7730" instrument_node="">[176]</span></a></sup><span data-dcnode-id="7727" instrument_node="">
</span></p><p data-dcnode-id="7720"><span data-dcnode-id="7725" instrument_node="">It is interesting to note that there are no images of Johns in the campaign posters. A plausible explanation for this would be an effort by the campaign to widen the scope of the messaging and to avoid racial stereotypes. Conversely, the racial stereotypes of trafficked girls is made clear. This excludes a majority of victims who do not identify with the image that the poster conveys. Lawmakers in Atlanta were fully behind the campaign as a statement to the public that they will not tolerate the purchasing of sex. These public statements are in stark contrast to the actual amount of funding that the city gave to organizations who provide housing and services for victims. The city did no research into the effectiveness of the campaign and therefore there is no data on its actual impact on the city. It is also important to note that the campaign ads were only in English and many people are not familiar with the Dear John reference. Lawmakers believe that the campaign was effective in bringing awareness to the issue and therefore shaped public opinion and policy.</span><sup class="reference" data-dcnode-id="7722" id="cite_ref-:6_176-3"><a data-dcnode-id="7723" href="#cite_note-:6-176"><span data-dcnode-id="7724" instrument_node="">[176]</span></a></sup><span data-dcnode-id="7721" instrument_node="">
</span></p><p data-dcnode-id="7718"><span data-dcnode-id="7719" instrument_node="">'Romeo Pimps' or 'loverboys' are individuals who actively seek for younger individuals male or female with intent to make them fall in love. By doing so the 'loverboy' can gain leverage or control and use the individual for exploitment in the sex industry. Although this method takes time therefore, is less commonly used does not mean it is gone. 'Loverboys' methods are evolving due to social media. These 'loverboys' have access to young individuals online profiles like anyone else; which allows them to gain lots of personal information and build a case and/or connection with their chosen target. 
</span></p><p data-dcnode-id="7716"><span data-dcnode-id="7717" instrument_node="">The 'loverboy' has now made a connection with the younger individual and agrees to go on excursions and romantic getaways. Which is where the 'loverboy' makes his or her move on the victim. If they traveled the 'loverboy' takes his change and confiscates the individuals passport and/or form of identification. Which then makes the individual trapped and typically passes him or her off to the next trafficker.     
</span></p><span data-dcnode-id="7715" instrument_node="">
</span><h3 data-dcnode-id="7705"><span class="mw-headline" data-dcnode-id="7713" id="Recognition_of_males_in_the_global_fight_against_trafficking"><span data-dcnode-id="7714" instrument_node="">Recognition of males in the global fight against trafficking</span></span><span class="mw-editsection" data-dcnode-id="7706"><span class="mw-editsection-bracket" data-dcnode-id="7711"><span data-dcnode-id="7712" instrument_node="">[</span></span><a data-dcnode-id="7709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D36" title="Edit section: Recognition of males in the global fight against trafficking"><span data-dcnode-id="7710" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7707"><span data-dcnode-id="7708" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7704" instrument_node="">
</span><p data-dcnode-id="7690"><span data-dcnode-id="7703" instrument_node="">The lack of conversation, advocacy, legal/social support services, and academic work around the sexual exploitation of men and boys can be traced to larger social discourses surrounding male sexuality, dominance, and behavior. Media representations of masculinity and sexual dominance contribute to the idea that men cannot be victims, especially in regards to sex-related crimes. The lack of public knowledge and attention to male victimhood and vulnerability is strongly reflected in the quality of services and strength of legal frameworks available to male victims of sex trafficking .</span><sup class="reference" data-dcnode-id="7700" id="cite_ref-:4_190-0"><a data-dcnode-id="7701" href="#cite_note-:4-190"><span data-dcnode-id="7702" instrument_node="">[190]</span></a></sup><span data-dcnode-id="7699" instrument_node=""> Experts describe the "perceived agency and resilience in young males" to be a strong force in deterring male victims from seeking the support they need, and discouraging male-inclusive anti-trafficking service and support networks from forming in the first place.</span><sup class="reference" data-dcnode-id="7696" id="cite_ref-:02_191-0"><a data-dcnode-id="7697" href="#cite_note-:02-191"><span data-dcnode-id="7698" instrument_node="">[191]</span></a></sup><span data-dcnode-id="7695" instrument_node=""> Within the spare support frameworks for male victims that do exist, the specific vulnerabilities of different populations in different areas around the world—regarding nationality and migration status, sexual orientation, drug use, socio-economic status, health status, family structure, and more—are often unaddressed, leaving crucial groups' needs unmet. The double stigma that surrounds male victims of sex trafficking, involving homosexuality and sex work more broadly—makes it incredibly difficult for male victims to come forward and seek help, or even to self-organize. Some scholars report that male victims have also faced higher rates of police violence and brutality than female victims in regards to contact with law enforcement.</span><sup class="reference" data-dcnode-id="7692" id="cite_ref-:12_192-0"><a data-dcnode-id="7693" href="#cite_note-:12-192"><span data-dcnode-id="7694" instrument_node="">[192]</span></a></sup><span data-dcnode-id="7691" instrument_node="">
</span></p><span data-dcnode-id="7689" instrument_node="">
</span><h3 data-dcnode-id="7679"><span class="mw-headline" data-dcnode-id="7687" id="Criminalizing_and_legalizing_prostitution"><span data-dcnode-id="7688" instrument_node="">Criminalizing and legalizing prostitution</span></span><span class="mw-editsection" data-dcnode-id="7680"><span class="mw-editsection-bracket" data-dcnode-id="7685"><span data-dcnode-id="7686" instrument_node="">[</span></span><a data-dcnode-id="7683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D37" title="Edit section: Criminalizing and legalizing prostitution"><span data-dcnode-id="7684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7681"><span data-dcnode-id="7682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7678" instrument_node="">
</span><p data-dcnode-id="7672"><span data-dcnode-id="7677" instrument_node="">Laws regarding the purchase and sale of voluntary and involuntary sex vary greatly across the developed world. Their effects on sex trafficking are difficult to discern. Proponents of various forms of criminalization, legalization, or regulation of prostitution, may all argue their model decreases sex trafficking.</span><sup class="reference" data-dcnode-id="7674" id="cite_ref-lsr.nellco.org_193-0"><a data-dcnode-id="7675" href="#cite_note-lsr.nellco.org-193"><span data-dcnode-id="7676" instrument_node="">[193]</span></a></sup><span data-dcnode-id="7673" instrument_node="">
</span></p><p data-dcnode-id="7660"><span data-dcnode-id="7671" instrument_node="">The </span><a data-dcnode-id="7669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostitution_in_the_Netherlands" title="Prostitution in the Netherlands"><span data-dcnode-id="7670" instrument_node="">Dutch model</span></a><span data-dcnode-id="7668" instrument_node=""> of legalization and regulation and the </span><a data-dcnode-id="7666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostitution_in_Sweden" title="Prostitution in Sweden"><span data-dcnode-id="7667" instrument_node="">Swedish model</span></a><span data-dcnode-id="7665" instrument_node=""> of criminalizing purchasers and pimps but not prostitutes are often discussed. The difference of these models casts the prevention of trafficking against the rights of voluntary sex workers and purchasers. It is argued that a hybrid model of licensing sex workers and criminalizing the purchase of unlicensed sex would reduce trafficking without crushing civil rights.</span><sup class="reference" data-dcnode-id="7662" id="cite_ref-lsr.nellco.org_193-1"><a data-dcnode-id="7663" href="#cite_note-lsr.nellco.org-193"><span data-dcnode-id="7664" instrument_node="">[193]</span></a></sup><span data-dcnode-id="7661" instrument_node="">
</span></p><span data-dcnode-id="7659" instrument_node="">
</span><h3 data-dcnode-id="7649"><span class="mw-headline" data-dcnode-id="7657" id="2017_Giving_Day"><span data-dcnode-id="7658" instrument_node="">2017 Giving Day</span></span><span class="mw-editsection" data-dcnode-id="7650"><span class="mw-editsection-bracket" data-dcnode-id="7655"><span data-dcnode-id="7656" instrument_node="">[</span></span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D38" title="Edit section: 2017 Giving Day"><span data-dcnode-id="7654" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7651"><span data-dcnode-id="7652" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7648" instrument_node="">
</span><p data-dcnode-id="7642"><span data-dcnode-id="7647" instrument_node="">Numerous international organizations have partnered to create an anti-human trafficking Giving Day to raise awareness and funds on July, 30th 2017. This is the day designated by the United Nations as the World Day against Trafficking in Persons. The Giving Day is being hosted by Charidy.com, a crowdfunding platform for non-profits.</span><sup class="reference" data-dcnode-id="7644" id="cite_ref-194"><a data-dcnode-id="7645" href="#cite_note-194"><span data-dcnode-id="7646" instrument_node="">[194]</span></a></sup><span data-dcnode-id="7643" instrument_node="">
</span></p><p data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">The General Assembly in 2010, adopted the Global Plan of Action to Combat Trafficking in Persons, encouraging Governments around the world to undergo drastic measures in order defeat human trafficking. The goal was to put the fight against human trafficking into the United Nation's programmes to strengthen positive development and security around the world. A main section of the plan is to place a United Nations Trust Fund for the women and children who fell victim of trafficking. The Trust Fund in the plan ensures to assist and protect the victims of trafficking through grants to certified NGOs. In the future, the goal is to make the victims a priority who are come were victims and had issues with migration. It also places a focus on the aid to victims who were trafficked by their perpetrator for the goal of sexual relations, organ removal, forced begging, forced criminality, and emerging exploitative reasons.
</span></p><p data-dcnode-id="7634"><span data-dcnode-id="7639" instrument_node="">The General Assembly in the year 2013, gathered a meeting to go over the world's plan of action. Numerous states also declared 30 July as the World Day against Trafficking in Persons. They came to the conclusion that day of remembrance and awareness was crucial to remember the victims, the right's they possess and their protection.</span><sup class="reference" data-dcnode-id="7636" id="cite_ref-195"><a data-dcnode-id="7637" href="#cite_note-195"><span data-dcnode-id="7638" instrument_node="">[195]</span></a></sup><span data-dcnode-id="7635" instrument_node="">
</span></p><span data-dcnode-id="7633" instrument_node="">
</span><h3 data-dcnode-id="7623"><span class="mw-headline" data-dcnode-id="7631" id="Buying_Sex_Is_A_Crime"><span data-dcnode-id="7632" instrument_node="">Buying Sex Is A Crime</span></span><span class="mw-editsection" data-dcnode-id="7624"><span class="mw-editsection-bracket" data-dcnode-id="7629"><span data-dcnode-id="7630" instrument_node="">[</span></span><a data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D39" title="Edit section: Buying Sex Is A Crime"><span data-dcnode-id="7628" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7625"><span data-dcnode-id="7626" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7622" instrument_node="">
</span><p data-dcnode-id="7602"><span data-dcnode-id="7621" instrument_node="">"Buying Sex Is A Crime" is a slogan used by anti </span><a data-dcnode-id="7619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="7620" instrument_node="">human trafficking</span></a><span data-dcnode-id="7618" instrument_node=""> and abolitionist groups. The first known public use of the slogan was by thetraffickedhuman.org.</span><sup class="reference" data-dcnode-id="7615" id="cite_ref-196"><a data-dcnode-id="7616" href="#cite_note-196"><span data-dcnode-id="7617" instrument_node="">[196]</span></a></sup><span data-dcnode-id="7614" instrument_node=""> in 2016 on a billboard campaign in metro </span><a class="mw-redirect" data-dcnode-id="7612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vancouver%2C_British_Columbia" title="Vancouver, British Columbia"><span data-dcnode-id="7613" instrument_node="">Vancouver, British Columbia</span></a><span data-dcnode-id="7611" instrument_node="">.</span><sup class="reference" data-dcnode-id="7608" id="cite_ref-FootnoteA_197-0"><a data-dcnode-id="7609" href="#cite_note-FootnoteA-197"><span data-dcnode-id="7610" instrument_node="">[197]</span></a></sup><span data-dcnode-id="7607" instrument_node=""> thetraffickedhuman.org is a coalition that works to end the exploitation of women, youth, and girls.</span><sup class="reference" data-dcnode-id="7604" id="cite_ref-198"><a data-dcnode-id="7605" href="#cite_note-198"><span data-dcnode-id="7606" instrument_node="">[198]</span></a></sup><span data-dcnode-id="7603" instrument_node="">
</span></p><p data-dcnode-id="7579"><span data-dcnode-id="7601" instrument_node="">The slogan with the same billboard artwork was also used by buyingsexisacrime.ca in 2017 throughout Canada including </span><a class="mw-redirect" data-dcnode-id="7599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmonton%2C_Alberta" title="Edmonton, Alberta"><span data-dcnode-id="7600" instrument_node="">Edmonton, Alberta</span></a><span data-dcnode-id="7598" instrument_node="">.</span><sup class="reference" data-dcnode-id="7595" id="cite_ref-FootnoteB_199-0"><a data-dcnode-id="7596" href="#cite_note-FootnoteB-199"><span data-dcnode-id="7597" instrument_node="">[199]</span></a></sup><span data-dcnode-id="7594" instrument_node=""> The slogan was also picked up by the </span><a class="mw-redirect" data-dcnode-id="7592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmonton_Police" title="Edmonton Police"><span data-dcnode-id="7593" instrument_node="">Edmonton Police</span></a><span data-dcnode-id="7591" instrument_node="">'s own awareness initiative.</span><sup class="reference" data-dcnode-id="7588" id="cite_ref-FootnoteB_199-1"><a data-dcnode-id="7589" href="#cite_note-FootnoteB-199"><span data-dcnode-id="7590" instrument_node="">[199]</span></a></sup><span data-dcnode-id="7587" instrument_node=""> In 2018, a new campaign was launched at buyingsexisacrime.org sponsored by the Vancouver Collective Against Sexual Exploitation. The collective is a </span><a class="mw-redirect" data-dcnode-id="7585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vancouver%2C_British_Columbia" title="Vancouver, British Columbia"><span data-dcnode-id="7586" instrument_node="">Vancouver, British Columbia</span></a><span data-dcnode-id="7584" instrument_node="">, based abolitionist group of lawyers, judges, social workers, professionals, teachers, activists and advocates working to end sexual exploitation.</span><sup class="reference" data-dcnode-id="7581" id="cite_ref-200"><a data-dcnode-id="7582" href="#cite_note-200"><span data-dcnode-id="7583" instrument_node="">[200]</span></a></sup><span data-dcnode-id="7580" instrument_node="">
