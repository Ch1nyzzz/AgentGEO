" instrument_node="">care work</span></a><span data-dcnode-id="9284" instrument_node="">, leading to an overall lower income.</span><sup class="reference" data-dcnode-id="9281" id="cite_ref-:23_71-11"><a data-dcnode-id="9282" href="#cite_note-:23-71"><span data-dcnode-id="9283" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9280" instrument_node=""> Duong further argues that women are placed at a greater disadvantage due to their lack of access to land and other resources.</span><sup class="reference" data-dcnode-id="9277" id="cite_ref-:23_71-12"><a data-dcnode-id="9278" href="#cite_note-:23-71"><span data-dcnode-id="9279" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9276" instrument_node=""> Matusek also argues that the unequal distribution of resources and power lead to both push and pull factors of migration.</span><sup class="reference" data-dcnode-id="9273" id="cite_ref-:04_69-7"><a data-dcnode-id="9274" href="#cite_note-:04-69"><span data-dcnode-id="9275" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9272" instrument_node=""> According to Matusek, women are pushed to migrate on account of a lack of education and employment opportunities.</span><sup class="reference" data-dcnode-id="9269" id="cite_ref-:04_69-8"><a data-dcnode-id="9270" href="#cite_note-:04-69"><span data-dcnode-id="9271" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9268" instrument_node="">
</span></p><p data-dcnode-id="9246"><span data-dcnode-id="9266" instrument_node="">Other scholars focus on the demand for sex itself as a cause of sex trafficking. The pull factor comes from globalization creating a market around sex.</span><sup class="reference" data-dcnode-id="9263" id="cite_ref-:04_69-9"><a data-dcnode-id="9264" href="#cite_note-:04-69"><span data-dcnode-id="9265" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9262" instrument_node=""> Matusek cites the </span><a data-dcnode-id="9260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commodification" title="Commodification"><span data-dcnode-id="9261" instrument_node="">commodification</span></a><span data-dcnode-id="9259" instrument_node=""> aspect of capitalism as the cause for the industrialization of sex.</span><sup class="reference" data-dcnode-id="9256" id="cite_ref-:04_69-10"><a data-dcnode-id="9257" href="#cite_note-:04-69"><span data-dcnode-id="9258" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9255" instrument_node=""> The pull factor comes from globalization creating a market around sex.</span><sup class="reference" data-dcnode-id="9252" id="cite_ref-:04_69-11"><a data-dcnode-id="9253" href="#cite_note-:04-69"><span data-dcnode-id="9254" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9251" instrument_node=""> Seol also cites the globalization of the commodification aspect of capitalism as a cause of sex trafficking.</span><sup class="reference" data-dcnode-id="9248" id="cite_ref-:43_74-2"><a data-dcnode-id="9249" href="#cite_note-:43-74"><span data-dcnode-id="9250" instrument_node="">[74]</span></a></sup><span data-dcnode-id="9247" instrument_node="">
</span></p><span data-dcnode-id="9245" instrument_node="">
</span><h2 data-dcnode-id="9235"><span class="mw-headline" data-dcnode-id="9243" id="Prevention"><span data-dcnode-id="9244" instrument_node="">Prevention</span></span><span class="mw-editsection" data-dcnode-id="9236"><span class="mw-editsection-bracket" data-dcnode-id="9241"><span data-dcnode-id="9242" instrument_node="">[</span></span><a data-dcnode-id="9239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D12" title="Edit section: Prevention"><span data-dcnode-id="9240" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9237"><span data-dcnode-id="9238" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9234" instrument_node="">
</span><p data-dcnode-id="9225"><span data-dcnode-id="9233" instrument_node="">In the United States anyone is permitted to contact the </span><a data-dcnode-id="9231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polaris_Project" title="Polaris Project"><span data-dcnode-id="9232" instrument_node="">Polaris Project</span></a><span data-dcnode-id="9230" instrument_node=""> at 1(888)-373-7888. The hotline is beneficial since providers are available 24 hours a day, 7 days a week to assist victims and provide information for those who are at risk. There are a variety of ways to help prevent trafficking. One must be aware of the indicators to identify victims: abnormal behavior, poor physical health, lack of control, and work and living conditions.</span><sup class="reference" data-dcnode-id="9227" id="cite_ref-75"><a data-dcnode-id="9228" href="#cite_note-75"><span data-dcnode-id="9229" instrument_node="">[75]</span></a></sup><span data-dcnode-id="9226" instrument_node=""> However, these signs may only be shown through a number of people – there may be more severe, serious indicators of sex trafficking.
</span></p><span data-dcnode-id="9224" instrument_node="">
</span><h2 data-dcnode-id="9214"><span class="mw-headline" data-dcnode-id="9222" id="Profile_of_victims"><span data-dcnode-id="9223" instrument_node="">Profile of victims</span></span><span class="mw-editsection" data-dcnode-id="9215"><span class="mw-editsection-bracket" data-dcnode-id="9220"><span data-dcnode-id="9221" instrument_node="">[</span></span><a data-dcnode-id="9218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D13" title="Edit section: Profile of victims"><span data-dcnode-id="9219" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9216"><span data-dcnode-id="9217" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9213" instrument_node="">
</span><p data-dcnode-id="9196"><span data-dcnode-id="9212" instrument_node="">There is no single profile for victims of human trafficking. Most are women, though it is not uncommon for males to be trafficked as well. Victims are captured then exploited all around the world, representing a diverse range of ages and backgrounds, including ethnic and socioeconomic. However, there is a set group of traits associated with a higher risk of becoming trafficked for sexual exploitation. Persons at risk include homeless and runaway youth, foreign nationals (especially those of lower socioeconomic status), and those who have experienced physical, emotional, or sexual abuse, violent trauma, neglect, poor academic success, and inadequate social skills.</span><sup class="reference" data-dcnode-id="9209" id="cite_ref-Global_Social_Welfare_3-2"><a data-dcnode-id="9210" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9211" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9206" id="cite_ref-76"><a data-dcnode-id="9207" href="#cite_note-76"><span data-dcnode-id="9208" instrument_node="">[76]</span></a></sup><span data-dcnode-id="9205" instrument_node=""> Also, a study of a group of female sex workers in Canada found that 64 percent of them had been in the child welfare system as children (this includes foster and group homes).</span><sup class="reference" data-dcnode-id="9202" id="cite_ref-Global_Social_Welfare_3-3"><a data-dcnode-id="9203" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9204" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9201" instrument_node=""> This research conducted by Kendra Nixon illustrates how children in or leaving foster care are at a higher risk of becoming a sex worker.</span><sup class="reference" data-dcnode-id="9198" id="cite_ref-Global_Social_Welfare_3-4"><a data-dcnode-id="9199" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9200" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9197" instrument_node="">
</span></p><p data-dcnode-id="9178"><span data-dcnode-id="9195" instrument_node="">In the United States, research has illustrated how these qualities hold true for victims, even though none can be labeled as a direct cause.</span><sup class="reference" data-dcnode-id="9192" id="cite_ref-Arizona_14-5"><a data-dcnode-id="9193" href="#cite_note-Arizona-14"><span data-dcnode-id="9194" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9191" instrument_node=""> For example, more than 50 percent of domestic minor sex trafficking victims have a history of homelessness.</span><sup class="reference" data-dcnode-id="9188" id="cite_ref-Arizona_14-6"><a data-dcnode-id="9189" href="#cite_note-Arizona-14"><span data-dcnode-id="9190" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9187" instrument_node=""> Familial disruptions such as divorce or the death of a parent place minors at a higher risk of entering the industry, but home life in general influences children's risk. In a study of trafficked youth in Arizona, 20 to 40 percent of female victims identified with experiencing abuse of some form (sexual or physical) at home before entering into the industry as a sex slave.</span><sup class="reference" data-dcnode-id="9184" id="cite_ref-Arizona_14-7"><a data-dcnode-id="9185" href="#cite_note-Arizona-14"><span data-dcnode-id="9186" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9183" instrument_node=""> Of the males interviewed, a smaller proportion, 0 to 30 percent, reported former abuse in the home.</span><sup class="reference" data-dcnode-id="9180" id="cite_ref-Arizona_14-8"><a data-dcnode-id="9181" href="#cite_note-Arizona-14"><span data-dcnode-id="9182" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9179" instrument_node="">
</span></p><p data-dcnode-id="9172"><span data-dcnode-id="9177" instrument_node="">The main motive of a woman (in some cases, an underage girl) to accept an offer from a trafficker is better financial opportunities for herself or her family. A study on the origin countries of trafficking confirms that most trafficking victims are not the poorest in their countries of origin, and sex trafficking victims are likely to be women from countries with some freedom to travel alone and some economic freedom.</span><sup class="reference" data-dcnode-id="9174" id="cite_ref-rao_77-0"><a data-dcnode-id="9175" href="#cite_note-rao-77"><span data-dcnode-id="9176" instrument_node="">[77]</span></a></sup><span data-dcnode-id="9173" instrument_node="">
</span></p><p data-dcnode-id="9166"><span data-dcnode-id="9171" instrument_node="">There are numerous fake businesses that sound realistic that convince people to apply for the job. Some places have a reputation for holding an illegal business to attract their victims.</span><sup class="reference" data-dcnode-id="9168" id="cite_ref-78"><a data-dcnode-id="9169" href="#cite_note-78"><span data-dcnode-id="9170" instrument_node="">[78]</span></a></sup><span data-dcnode-id="9167" instrument_node="">
</span></p><p data-dcnode-id="9152"><span data-dcnode-id="9165" instrument_node="">Children are at risk because of their vulnerable characteristics; naïve outlook, size, and tendency to be easily intimidated".</span><sup class="reference" data-dcnode-id="9162" id="cite_ref-Global_Social_Welfare_3-5"><a data-dcnode-id="9163" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9164" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9161" instrument_node=""> The International Labor Organization estimates that of the 20.9&nbsp;million people who are trafficked in the world (for all types of work) 5.5&nbsp;million are children.</span><sup class="reference" data-dcnode-id="9158" id="cite_ref-79"><a data-dcnode-id="9159" href="#cite_note-79"><span data-dcnode-id="9160" instrument_node="">[79]</span></a></sup><span data-dcnode-id="9157" instrument_node=""> In 2016, it was estimated that approximately one million children worldwide were victims of sex trafficking. Both boys and girls may be trafficked, though girls are more frequently victims; 23% of human trafficking victims identified by a United Nations Report were girls, compared to 7% for boys. Female child trafficking victims are more likely to experience sexual exploitation: 72% and 27% incidence rates for girls and boy, respectively.</span><sup class="reference" data-dcnode-id="9154" id="cite_ref-80"><a data-dcnode-id="9155" href="#cite_note-80"><span data-dcnode-id="9156" instrument_node="">[80]</span></a></sup><span data-dcnode-id="9153" instrument_node="">
</span></p><p data-dcnode-id="9143"><span data-dcnode-id="9151" instrument_node="">In the US, children do not need to be forced into sexual exploitation according to the </span><a data-dcnode-id="9149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victims_of_Trafficking_and_Violence_Protection_Act_of_2000" title="Victims of Trafficking and Violence Protection Act of 2000"><span data-dcnode-id="9150" instrument_node="">Victims of Trafficking and Violence Protection Act of 2000</span></a><span data-dcnode-id="9148" instrument_node=""> to be considered victims of sex trafficking. Under this act, a child is defined as anyone under the age of 18, however the exploitation of children under the age of 14 carries a harsher punishment, though this is rarely enforced. The Bureau of Justice Statistics states that there are 100,000 child victims of sex trafficking, but only 150 child trafficking cases were brought to court in 2011. Of these, only 81 convictions were made. Many children who are trafficked are also at higher risk of turning to prostitution, a crime that many of them face criminal charges for, even under the age of 18.</span><sup class="reference" data-dcnode-id="9145" id="cite_ref-81"><a data-dcnode-id="9146" href="#cite_note-81"><span data-dcnode-id="9147" instrument_node="">[81]</span></a></sup><span data-dcnode-id="9144" instrument_node="">
</span></p><span data-dcnode-id="9142" instrument_node="">
</span><h2 data-dcnode-id="9132"><span class="mw-headline" data-dcnode-id="9140" id="Consequences_to_victims"><span data-dcnode-id="9141" instrument_node="">Consequences to victims</span></span><span class="mw-editsection" data-dcnode-id="9133"><span class="mw-editsection-bracket" data-dcnode-id="9138"><span data-dcnode-id="9139" instrument_node="">[</span></span><a data-dcnode-id="9136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D14" title="Edit section: Consequences to victims"><span data-dcnode-id="9137" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9131" instrument_node="">
</span><p data-dcnode-id="9087"><span data-dcnode-id="9130" instrument_node="">Sex trafficked people face similar health consequences to women exploited for labor purposes, people who have experienced domestic violence, and migrant women.</span><sup class="reference" data-dcnode-id="9127" id="cite_ref-Zimmerman_82-0"><a data-dcnode-id="9128" href="#cite_note-Zimmerman-82"><span data-dcnode-id="9129" instrument_node="">[82]</span></a></sup><span data-dcnode-id="9126" instrument_node=""> Many of the sex workers contract sexually transmitted infections (STIs).</span><sup class="reference" data-dcnode-id="9123" id="cite_ref-Arizona_14-9"><a data-dcnode-id="9124" href="#cite_note-Arizona-14"><span data-dcnode-id="9125" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9122" instrument_node=""> In a study conducted by the London School of Hygiene &amp; Tropical Medicine, "only one of 23 trafficked women interviewed felt well-informed about sexually transmitted infections or HIV before leaving home."</span><sup class="reference" data-dcnode-id="9119" id="cite_ref-Zimmerman_82-1"><a data-dcnode-id="9120" href="#cite_note-Zimmerman-82"><span data-dcnode-id="9121" instrument_node="">[82]</span></a></sup><span data-dcnode-id="9118" instrument_node=""> Without knowledge about this aspect of their health, trafficked women may not take the necessary preventive steps and contract these infections and have poor health seeking behavior in the future.</span><sup class="reference" data-dcnode-id="9115" id="cite_ref-Zimmerman_82-2"><a data-dcnode-id="9116" href="#cite_note-Zimmerman-82"><span data-dcnode-id="9117" instrument_node="">[82]</span></a></sup><span data-dcnode-id="9114" instrument_node=""> The mental health implications range from depression to anxiety to </span><a data-dcnode-id="9112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-traumatic_stress_disorder" title="Post-traumatic stress disorder"><span data-dcnode-id="9113" instrument_node="">post-traumatic stress disorder</span></a><span data-dcnode-id="9111" instrument_node=""> (PTSD) due to the abuse and violence victims face from their pimps or "Johns".</span><sup class="reference" data-dcnode-id="9108" id="cite_ref-Arizona_14-10"><a data-dcnode-id="9109" href="#cite_note-Arizona-14"><span data-dcnode-id="9110" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9107" instrument_node=""> With such a mindset, many individuals develop alcohol or drug addictions and abusive habits.</span><sup class="reference" data-dcnode-id="9104" id="cite_ref-Arizona_14-11"><a data-dcnode-id="9105" href="#cite_note-Arizona-14"><span data-dcnode-id="9106" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9103" instrument_node=""> Also, traffickers commonly coerce or force their sex workers to use alcohol or drugs when they are in childhood or adolescence.</span><sup class="reference" data-dcnode-id="9100" id="cite_ref-Global_Social_Welfare_3-6"><a data-dcnode-id="9101" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9102" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9099" instrument_node=""> Many victims use these substances as a coping mechanism or escape which further promotes the rate of addiction in this population.</span><sup class="reference" data-dcnode-id="9096" id="cite_ref-Global_Social_Welfare_3-7"><a data-dcnode-id="9097" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="9098" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9095" instrument_node=""> In a 30-year longitudinal study conducted by J. Potterat </span><i data-dcnode-id="9093"><span data-dcnode-id="9094" instrument_node="">et al.</span></i><span data-dcnode-id="9092" instrument_node="">, it was determined that the average lifespan for women engaged in prostitution in Colorado Springs was 34 years.</span><sup class="reference" data-dcnode-id="9089" id="cite_ref-Arizona_14-12"><a data-dcnode-id="9090" href="#cite_note-Arizona-14"><span data-dcnode-id="9091" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9088" instrument_node="">
</span></p><span data-dcnode-id="9086" instrument_node="">
</span><h2 data-dcnode-id="9076"><span class="mw-headline" data-dcnode-id="9084" id="Around_the_world"><span data-dcnode-id="9085" instrument_node="">Around the world</span></span><span class="mw-editsection" data-dcnode-id="9077"><span class="mw-editsection-bracket" data-dcnode-id="9082"><span data-dcnode-id="9083" instrument_node="">[</span></span><a data-dcnode-id="9080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D15" title="Edit section: Around the world"><span data-dcnode-id="9081" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9078"><span data-dcnode-id="9079" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9075" instrument_node="">
</span><h3 data-dcnode-id="9065"><span class="mw-headline" data-dcnode-id="9073" id="Africa"><span data-dcnode-id="9074" instrument_node="">Africa</span></span><span class="mw-editsection" data-dcnode-id="9066"><span class="mw-editsection-bracket" data-dcnode-id="9071"><span data-dcnode-id="9072" instrument_node="">[</span></span><a data-dcnode-id="9069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D16" title="Edit section: Africa"><span data-dcnode-id="9070" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9067"><span data-dcnode-id="9068" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9064" instrument_node="">
</span><p data-dcnode-id="9039"><span data-dcnode-id="9063" instrument_node="">Sex trafficking of women and children is the second most common type of trafficking for export in Africa.</span><sup class="reference" data-dcnode-id="9060" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-0"><a data-dcnode-id="9061" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="9062" instrument_node="">[83]</span></a></sup><span data-dcnode-id="9059" instrument_node=""> In Ghana, "connection men" or traffickers are witnessed regularly at border crossings and transport individuals via fake visas. Women are most commonly trafficked to Belgium, Italy, Lebanon, Libya, the Netherlands, Nigeria, and the United States.</span><sup class="reference" data-dcnode-id="9056" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-1"><a data-dcnode-id="9057" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="9058" instrument_node="">[83]</span></a></sup><span data-dcnode-id="9055" instrument_node=""> Belgium, the Netherlands, Spain, and the United States are also common destination countries for trafficked Nigerian women.</span><sup class="reference" data-dcnode-id="9052" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-2"><a data-dcnode-id="9053" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="9054" instrument_node="">[83]</span></a></sup><span data-dcnode-id="9051" instrument_node=""> In Uganda, the </span><a data-dcnode-id="9049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lord%2527s_Resistance_Army" title="Lord's Resistance Army"><span data-dcnode-id="9050" instrument_node="">Lord's Resistance Army</span></a><span data-dcnode-id="9048" instrument_node=""> traffics individuals to Sudan to sell them as sex slaves.</span><sup class="reference" data-dcnode-id="9045" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-3"><a data-dcnode-id="9046" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="9047" instrument_node="">[83]</span></a></sup><span data-dcnode-id="9044" instrument_node=""> The Nigerian syndicates dominate sex trades in multiple territories. The syndicates recruit women from South Africa and send them to Europe and Asia, where they are forced into prostitution, drug smuggling, or domestic violence. Law enforcement reported that sex traffickers force drug use to persuade these unwilling women.</span><sup class="reference" data-dcnode-id="9041" id="cite_ref-84"><a data-dcnode-id="9042" href="#cite_note-84"><span data-dcnode-id="9043" instrument_node="">[84]</span></a></sup><span data-dcnode-id="9040" instrument_node="">
</span></p><span data-dcnode-id="9038" instrument_node="">
</span><h3 data-dcnode-id="9028"><span class="mw-headline" data-dcnode-id="9036" id="Americas"><span data-dcnode-id="9037" instrument_node="">Americas</span></span><span class="mw-editsection" data-dcnode-id="9029"><span class="mw-editsection-bracket" data-dcnode-id="9034"><span data-dcnode-id="9035" instrument_node="">[</span></span><a data-dcnode-id="9032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D17" title="Edit section: Americas"><span data-dcnode-id="9033" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9030"><span data-dcnode-id="9031" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9027" instrument_node="">
</span><p data-dcnode-id="8999"><span data-dcnode-id="9026" instrument_node="">Sex trafficking is a problem in North America, Central America, and South America</span><sup class="reference" data-dcnode-id="9023" id="cite_ref-85"><a data-dcnode-id="9024" href="#cite_note-85"><span data-dcnode-id="9025" instrument_node="">[85]</span></a></sup><span data-dcnode-id="9022" instrument_node=""> People have been </span><a data-dcnode-id="9020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking_in_Mexico" title="Sex trafficking in Mexico"><span data-dcnode-id="9021" instrument_node="">sex trafficked to and through Mexico</span></a><span data-dcnode-id="9019" instrument_node="">.</span><sup class="reference" data-dcnode-id="9016" id="cite_ref-86"><a data-dcnode-id="9017" href="#cite_note-86"><span data-dcnode-id="9018" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="9013" id="cite_ref-87"><a data-dcnode-id="9014" href="#cite_note-87"><span data-dcnode-id="9015" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="9010" id="cite_ref-88"><a data-dcnode-id="9011" href="#cite_note-88"><span data-dcnode-id="9012" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="9007" id="cite_ref-89"><a data-dcnode-id="9008" href="#cite_note-89"><span data-dcnode-id="9009" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="9004" id="cite_ref-90"><a data-dcnode-id="9005" href="#cite_note-90"><span data-dcnode-id="9006" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="9001" id="cite_ref-91"><a data-dcnode-id="9002" href="#cite_note-91"><span data-dcnode-id="9003" instrument_node="">[91]</span></a></sup><span data-dcnode-id="9000" instrument_node="">
</span></p><span data-dcnode-id="8998" instrument_node="">
</span><h3 data-dcnode-id="8988"><span class="mw-headline" data-dcnode-id="8996" id="Asia"><span data-dcnode-id="8997" instrument_node="">Asia</span></span><span class="mw-editsection" data-dcnode-id="8989"><span class="mw-editsection-bracket" data-dcnode-id="8994"><span data-dcnode-id="8995" instrument_node="">[</span></span><a data-dcnode-id="8992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D18" title="Edit section: Asia"><span data-dcnode-id="8993" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8990"><span data-dcnode-id="8991" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8987" instrument_node="">
</span><p data-dcnode-id="8953"><span data-dcnode-id="8986" instrument_node="">The key hubs for both source transportation and destination of the sub-region of Asia include India, Japan, South Korea and Thailand.</span><sup class="reference" data-dcnode-id="8983" id="cite_ref-92"><a data-dcnode-id="8984" href="#cite_note-92"><span data-dcnode-id="8985" instrument_node="">[92]</span></a></sup><span data-dcnode-id="8982" instrument_node=""> India is a major hub for trafficked Bangladeshi and Nepali women.</span><sup class="reference" data-dcnode-id="8979" id="cite_ref-93"><a data-dcnode-id="8980" href="#cite_note-93"><span data-dcnode-id="8981" instrument_node="">[93]</span></a></sup><span data-dcnode-id="8978" instrument_node=""> In India itself, there are an estimated 3 million sex workers, 40% of whom are trafficked children, mostly girls from ethnic minorities and lower castes. In Thailand, 800,000 children under the age of 16 were involved in prostitution in 2004.</span><sup class="reference" data-dcnode-id="8975" id="cite_ref-International_Business_Times_94-0"><a data-dcnode-id="8976" href="#cite_note-International_Business_Times-94"><span data-dcnode-id="8977" instrument_node="">[94]</span></a></sup><span data-dcnode-id="8974" instrument_node=""> Also, according to UNICEF and the International Labour Organization there are 40,000 child prostitutes in Sri Lanka.</span><sup class="reference" data-dcnode-id="8971" id="cite_ref-International_Business_Times_94-1"><a data-dcnode-id="8972" href="#cite_note-International_Business_Times-94"><span data-dcnode-id="8973" instrument_node="">[94]</span></a></sup><span data-dcnode-id="8970" instrument_node=""> Thailand and India are in the top five countries with the highest rates of child prostitution.</span><sup class="reference" data-dcnode-id="8967" id="cite_ref-International_Business_Times_94-2"><a data-dcnode-id="8968" href="#cite_note-International_Business_Times-94"><span data-dcnode-id="8969" instrument_node="">[94]</span></a></sup><span data-dcnode-id="8966" instrument_node=""> The 2014 Global Slavery Index (GSI) says that there are about 36&nbsp;million victims of trafficking in the world, and nearly two-thirds of the people are from Asia. Pakistan, Thailand, China, India, and Bangladesh are in the top 10 for countries with the largest number of trafficking victims around the world. India is at the top of the list with 14&nbsp;million victims, China comes in second with 3.2&nbsp;million victims, and Pakistan comes in at third with 2.1&nbsp;million victims.</span><sup class="reference" data-dcnode-id="8963" id="cite_ref-95"><a data-dcnode-id="8964" href="#cite_note-95"><span data-dcnode-id="8965" instrument_node="">[95]</span></a></sup><span data-dcnode-id="8962" instrument_node=""> Cambodia is also a transit, source, and a destination country for trafficking.</span><sup class="reference" data-dcnode-id="8959" id="cite_ref-96"><a data-dcnode-id="8960" href="#cite_note-96"><span data-dcnode-id="8961" instrument_node="">[96]</span></a></sup><span data-dcnode-id="8958" instrument_node=""> 36% of trafficked victims in Asia are children, while 64% are adults.</span><sup class="reference" data-dcnode-id="8955" id="cite_ref-97"><a data-dcnode-id="8956" href="#cite_note-97"><span data-dcnode-id="8957" instrument_node="">[97]</span></a></sup><span data-dcnode-id="8954" instrument_node="">
</span></p><span data-dcnode-id="8952" instrument_node="">
</span><h3 data-dcnode-id="8942"><span class="mw-headline" data-dcnode-id="8950" id="Canada"><span data-dcnode-id="8951" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="8943"><span class="mw-editsection-bracket" data-dcnode-id="8948"><span data-dcnode-id="8949" instrument_node="">[</span></span><a data-dcnode-id="8946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D19" title="Edit section: Canada"><span data-dcnode-id="8947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8944"><span data-dcnode-id="8945" instrument_node="">]</span></span></span></h3><p data-dcnode-id="8843"><span data-dcnode-id="8941" instrument_node="">
According to </span><a data-dcnode-id="8939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statistics_Canada" title="Statistics Canada"><span data-dcnode-id="8940" instrument_node="">Statistics Canada</span></a><span data-dcnode-id="8938" instrument_node="">, in instances of </span><a data-dcnode-id="8936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="8937" instrument_node="">human trafficking</span></a><span data-dcnode-id="8935" instrument_node="">, 44% are sexually-related, which predominantly include offering sexually related services, </span><a data-dcnode-id="8933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_assault" title="Sexual assault"><span data-dcnode-id="8934" instrument_node="">sexual assault</span></a><span data-dcnode-id="8932" instrument_node="">, offences, and </span><a class="mw-redirect" data-dcnode-id="8930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_exploitation" title="Sexual exploitation"><span data-dcnode-id="8931" instrument_node="">exploitation</span></a><span data-dcnode-id="8929" instrument_node="">.</span><sup class="reference" data-dcnode-id="8926" id="cite_ref-:21_98-0"><a data-dcnode-id="8927" href="#cite_note-:21-98"><span data-dcnode-id="8928" instrument_node="">[98]</span></a></sup><span data-dcnode-id="8925" instrument_node=""> Sex trafficking is one of Canada's largest and fastest-growing </span><a class="mw-redirect" data-dcnode-id="8923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_activities" title="Criminal activities"><span data-dcnode-id="8924" instrument_node="">criminal activities</span></a><span data-dcnode-id="8922" instrument_node="">.</span><sup class="reference" data-dcnode-id="8919" id="cite_ref-:24_99-0"><a data-dcnode-id="8920" href="#cite_note-:24-99"><span data-dcnode-id="8921" instrument_node="">[99]</span></a></sup><span data-dcnode-id="8918" instrument_node=""> It is also one of the world's largest criminal enterprises that generates $99&nbsp;billion (</span><a data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_dollar" title="United States dollar"><span data-dcnode-id="8917" instrument_node="">USD</span></a><span data-dcnode-id="8915" instrument_node="">) in profit.</span><sup class="reference" data-dcnode-id="8912" id="cite_ref-:24_99-1"><a data-dcnode-id="8913" href="#cite_note-:24-99"><span data-dcnode-id="8914" instrument_node="">[99]</span></a></sup><span data-dcnode-id="8911" instrument_node=""> According to recent statistics from the </span><a data-dcnode-id="8909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Canadian_Mounted_Police" title="Royal Canadian Mounted Police"><span data-dcnode-id="8910" instrument_node="">Royal Canadian Mounted Police</span></a><span data-dcnode-id="8908" instrument_node="">, one victim could generate between $168,000 and $336,000 a year for one '</span><a class="mw-redirect" data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pimp" title="Pimp"><span data-dcnode-id="8907" instrument_node="">pimp</span></a><span data-dcnode-id="8905" instrument_node="">'.</span><sup class="reference" data-dcnode-id="8902" id="cite_ref-:24_99-2"><a data-dcnode-id="8903" href="#cite_note-:24-99"><span data-dcnode-id="8904" instrument_node="">[99]</span></a></sup><span data-dcnode-id="8901" instrument_node=""> While </span><a class="mw-redirect" data-dcnode-id="8899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_exploitation" title="Labour exploitation"><span data-dcnode-id="8900" instrument_node="">labour exploitation</span></a><span data-dcnode-id="8898" instrument_node=""> in Canada is extremely rare, human trafficking involving sexual exploitation is far more common, especially in densely populated urban areas but this may be because sexual exploitation is easier to detect in urban areas under current Canadian detection resources.</span><sup class="reference" data-dcnode-id="8895" id="cite_ref-:21_98-1"><a data-dcnode-id="8896" href="#cite_note-:21-98"><span data-dcnode-id="8897" instrument_node="">[98]</span></a></sup><span data-dcnode-id="8894" instrument_node=""> Migrant workers are most commonly affected by labour exploitation.</span><sup class="reference" data-dcnode-id="8891" id="cite_ref-100"><a data-dcnode-id="8892" href="#cite_note-100"><span data-dcnode-id="8893" instrument_node="">[100]</span></a></sup><span data-dcnode-id="8890" instrument_node=""> The Global Slavery Index noted in 2016 that roughly 17,000 people were experiencing modern-day slavery in Canada.</span><sup class="reference" data-dcnode-id="8887" id="cite_ref-101"><a data-dcnode-id="8888" href="#cite_note-101"><span data-dcnode-id="8889" instrument_node="">[101]</span></a></sup><span data-dcnode-id="8886" instrument_node=""> Instances of human trafficking occur, 90% of the time, in </span><a data-dcnode-id="8884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metropolitan_area" title="Metropolitan area"><span data-dcnode-id="8885" instrument_node="">metropolitan areas</span></a><span data-dcnode-id="8883" instrument_node="">, with 97% of victims being </span><a data-dcnode-id="8881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woman" title="Woman"><span data-dcnode-id="8882" instrument_node="">female</span></a><span data-dcnode-id="8880" instrument_node="">.</span><sup class="reference" data-dcnode-id="8877" id="cite_ref-:25_102-0"><a data-dcnode-id="8878" href="#cite_note-:25-102"><span data-dcnode-id="8879" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8876" instrument_node=""> The Criminal Code of Canada&nbsp;and the Immigration and Refugee Protection Act state that human trafficking is an offence, but do not make a distinction specifically between sex trafficking or exploitation, and other forms of human trafficking.</span><sup class="reference" data-dcnode-id="8873" id="cite_ref-:21_98-2"><a data-dcnode-id="8874" href="#cite_note-:21-98"><span data-dcnode-id="8875" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="8870" id="cite_ref-:25_102-1"><a data-dcnode-id="8871" href="#cite_note-:25-102"><span data-dcnode-id="8872" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8869" instrument_node=""> According to </span><a data-dcnode-id="8867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Safety_Canada" title="Public Safety Canada"><span data-dcnode-id="8868" instrument_node="">Public Safety Canada</span></a><span data-dcnode-id="8866" instrument_node="">, at-risk groups of human trafficking include migrants and new </span><a data-dcnode-id="8864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_to_Canada" title="Immigration to Canada"><span data-dcnode-id="8865" instrument_node="">immigrants</span></a><span data-dcnode-id="8863" instrument_node="">, </span><a data-dcnode-id="8861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT" title="LGBT"><span data-dcnode-id="8862" instrument_node="">LGBT</span></a><span data-dcnode-id="8860" instrument_node="">Q persons, </span><a class="mw-redirect" data-dcnode-id="8858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People_with_disabilities" title="People with disabilities"><span data-dcnode-id="8859" instrument_node="">people with disabilities</span></a><span data-dcnode-id="8857" instrument_node="">, children in Welfare systems and </span><a class="mw-redirect" data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/At-Risk_Youth" title="At-Risk Youth"><span data-dcnode-id="8856" instrument_node="">At-Risk Youth</span></a><span data-dcnode-id="8854" instrument_node="">.</span><sup class="reference" data-dcnode-id="8851" id="cite_ref-:25_102-2"><a data-dcnode-id="8852" href="#cite_note-:25-102"><span data-dcnode-id="8853" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8850" instrument_node=""> </span><a data-dcnode-id="8848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigenous_peoples_in_Canada" title="Indigenous peoples in Canada"><span data-dcnode-id="8849" instrument_node="">Indigenous</span></a><span data-dcnode-id="8847" instrument_node=""> women and girls are disproportionately more affected by sex trafficking in Canada, however, the discourse surrounding exploited Indigenous women and girls is more frequently labelled as sex work as opposed to sex trafficking, which has left many trafficked victims unaccounted for.</span><sup class="reference" data-dcnode-id="8844" id="cite_ref-103"><a data-dcnode-id="8845" href="#cite_note-103"><span data-dcnode-id="8846" instrument_node="">[103]</span></a></sup></p><div class="thumb tright" data-dcnode-id="8834"><div class="thumbinner" data-dcnode-id="8835" style="width:422px;"><a class="image" data-dcnode-id="8841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOffences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png"><img alt="" class="thumbimage" data-dcnode-id="8842" data-file-height="952" data-file-width="1474" decoding="async" height="271" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png/420px-Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png/630px-Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png/840px-Offences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png 2x" width="420"></a><span data-dcnode-id="8840" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8836"><div class="magnify" data-dcnode-id="8838"><a class="internal" data-dcnode-id="8839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOffences_in_Relation_to_Sexual_Services_Compared_to_Other_Types_of_Human_Trafficking_in_Canada.png" title="Enlarge"></a></div><span data-dcnode-id="8837" instrument_node="">Offences related to sex trafficking in Canada</span></div></div></div><p data-dcnode-id="8798"><span data-dcnode-id="8833" instrument_node="">Within recent years, the Canadian federal government has shifted its approach to sex trafficking away from an international perspective towards a domestic emphasis.</span><sup class="reference" data-dcnode-id="8830" id="cite_ref-:30_104-0"><a data-dcnode-id="8831" href="#cite_note-:30-104"><span data-dcnode-id="8832" instrument_node="">[104]</span></a></sup><span data-dcnode-id="8829" instrument_node=""> This also includes the government's voicing of victims and witnesses along with a greater degree of attention to sex trafficking involving minors.</span><sup class="reference" data-dcnode-id="8826" id="cite_ref-:30_104-1"><a data-dcnode-id="8827" href="#cite_note-:30-104"><span data-dcnode-id="8828" instrument_node="">[104]</span></a></sup><span data-dcnode-id="8825" instrument_node=""> On 29 July 2020, the </span><a data-dcnode-id="8823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Canada" title="Government of Canada"><span data-dcnode-id="8824" instrument_node="">Government of Canada</span></a><span data-dcnode-id="8822" instrument_node=""> invested $19&nbsp;million to combat human and sex trafficking in Canada.</span><sup class="reference" data-dcnode-id="8819" id="cite_ref-:26_105-0"><a data-dcnode-id="8820" href="#cite_note-:26-105"><span data-dcnode-id="8821" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8818" instrument_node=""> This fund will be administered by two federal departments responsible for the implementation of the Government's five-year National Strategy to Combat Human Trafficking.</span><sup class="reference" data-dcnode-id="8815" id="cite_ref-:26_105-1"><a data-dcnode-id="8816" href="#cite_note-:26-105"><span data-dcnode-id="8817" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8814" instrument_node=""> This federally collaborative approach to eradicate human trafficking will support those who are impacted.</span><sup class="reference" data-dcnode-id="8811" id="cite_ref-:26_105-2"><a data-dcnode-id="8812" href="#cite_note-:26-105"><span data-dcnode-id="8813" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8810" instrument_node=""> Women and Gender Equality Canada plan to distribute $14&nbsp;million to this effort, and $5&nbsp;million will be funded through Public Safety Canada.</span><sup class="reference" data-dcnode-id="8807" id="cite_ref-:26_105-3"><a data-dcnode-id="8808" href="#cite_note-:26-105"><span data-dcnode-id="8809" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8806" instrument_node=""> These efforts are designed to empower survivors, deter trafficking altogether, protect vulnerable populations, and prosecute perpetrators&nbsp;in collaboration with both </span><a data-dcnode-id="8804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provinces_and_territories_of_Canada" title="Provinces and territories of Canada"><span data-dcnode-id="8805" instrument_node="">territories and provinces</span></a><span data-dcnode-id="8803" instrument_node="">.</span><sup class="reference" data-dcnode-id="8800" id="cite_ref-:25_102-3"><a data-dcnode-id="8801" href="#cite_note-:25-102"><span data-dcnode-id="8802" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8799" instrument_node="">
</span></p><p data-dcnode-id="8748"><span data-dcnode-id="8797" instrument_node="">While there are no organizations in Canada focused exclusively on ending sex trafficking in Canada, The Canadian Centre to End Human Trafficking (CCEHT) is the only nationally coordinated effort focused on ending human trafficking more broadly in a Canadian context.</span><sup class="reference" data-dcnode-id="8794" id="cite_ref-:27_106-0"><a data-dcnode-id="8795" href="#cite_note-:27-106"><span data-dcnode-id="8796" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8793" instrument_node=""> The CCEHT aims to organize </span><a data-dcnode-id="8791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_action" title="Collective action"><span data-dcnode-id="8792" instrument_node="">collective action</span></a><span data-dcnode-id="8790" instrument_node=""> and systemic change in Canada.</span><sup class="reference" data-dcnode-id="8787" id="cite_ref-:27_106-1"><a data-dcnode-id="8788" href="#cite_note-:27-106"><span data-dcnode-id="8789" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8786" instrument_node=""> The organization works with other </span><a data-dcnode-id="8784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonprofit_organization" title="Nonprofit organization"><span data-dcnode-id="8785" instrument_node="">nonprofits</span></a><span data-dcnode-id="8783" instrument_node="">, businesses, and </span><a data-dcnode-id="8781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_stakeholder" title="Project stakeholder"><span data-dcnode-id="8782" instrument_node="">stakeholders</span></a><span data-dcnode-id="8780" instrument_node=""> to establish what the best practices are, and ensure that no duplicate efforts are happening due to miscommunications between various actors.</span><sup class="reference" data-dcnode-id="8777" id="cite_ref-:27_106-2"><a data-dcnode-id="8778" href="#cite_note-:27-106"><span data-dcnode-id="8779" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8776" instrument_node=""> The CCEHT also provides services for survivors of sex trafficking in helping them return to society.</span><sup class="reference" data-dcnode-id="8773" id="cite_ref-:27_106-3"><a data-dcnode-id="8774" href="#cite_note-:27-106"><span data-dcnode-id="8775" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8772" instrument_node=""> Many other organizations in Canada aim to reduce sex trafficking as one of several objectives.</span><sup class="reference" data-dcnode-id="8769" id="cite_ref-:28_107-0"><a data-dcnode-id="8770" href="#cite_note-:28-107"><span data-dcnode-id="8771" instrument_node="">[107]</span></a></sup><span data-dcnode-id="8768" instrument_node=""> Initiatives exist at federal, provincial and municipal levels.</span><sup class="reference" data-dcnode-id="8765" id="cite_ref-:28_107-1"><a data-dcnode-id="8766" href="#cite_note-:28-107"><span data-dcnode-id="8767" instrument_node="">[107]</span></a></sup><span data-dcnode-id="8764" instrument_node=""> </span><a data-dcnode-id="8762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_House_Toronto" title="Covenant House Toronto"><span data-dcnode-id="8763" instrument_node="">Covenant House Toronto</span></a><span data-dcnode-id="8761" instrument_node=""> leads a national campaign called Traffick Stop.</span><sup class="reference" data-dcnode-id="8758" id="cite_ref-:29_108-0"><a data-dcnode-id="8759" href="#cite_note-:29-108"><span data-dcnode-id="8760" instrument_node="">[108]</span></a></sup><span data-dcnode-id="8757" instrument_node=""> Traffick Stop helps people develop skills to recognize the indicators of sex trafficking.</span><sup class="reference" data-dcnode-id="8754" id="cite_ref-:29_108-1"><a data-dcnode-id="8755" href="#cite_note-:29-108"><span data-dcnode-id="8756" instrument_node="">[108]</span></a></sup><span data-dcnode-id="8753" instrument_node=""> This campaign aims to inform Canadians about the existence of sex trafficking in Canada and its prevalence.</span><sup class="reference" data-dcnode-id="8750" id="cite_ref-:29_108-2"><a data-dcnode-id="8751" href="#cite_note-:29-108"><span data-dcnode-id="8752" instrument_node="">[108]</span></a></sup><span data-dcnode-id="8749" instrument_node="">
</span></p><span data-dcnode-id="8747" instrument_node="">
</span><h3 data-dcnode-id="8737"><span class="mw-headline" data-dcnode-id="8745" id="Europe"><span data-dcnode-id="8746" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="8738"><span class="mw-editsection-bracket" data-dcnode-id="8743"><span data-dcnode-id="8744" instrument_node="">[</span></span><a data-dcnode-id="8741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D20" title="Edit section: Europe"><span data-dcnode-id="8742" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8739"><span data-dcnode-id="8740" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8736" instrument_node="">
</span><link data-dcnode-id="8735" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8731" role="note"><span data-dcnode-id="8734" instrument_node="">Main article: </span><a data-dcnode-id="8732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking_in_Europe" title="Sex trafficking in Europe"><span data-dcnode-id="8733" instrument_node="">Sex trafficking in Europe</span></a></div><span data-dcnode-id="8730" instrument_node="">
</span><p data-dcnode-id="8677"><span data-dcnode-id="8729" instrument_node="">In general, countries who are members of the </span><a data-dcnode-id="8727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8728" instrument_node="">European Union</span></a><span data-dcnode-id="8726" instrument_node=""> are destinations for individuals to be sex trafficked whereas the Balkans and Eastern Europe are source and transit countries.</span><sup class="reference" data-dcnode-id="8723" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-4"><a data-dcnode-id="8724" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="8725" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8722" instrument_node=""> Transit countries are picked for their geographical location. This is because the locations the traffickers pick usually have a weak border control, the distance from the destination countries, corrupt official, or the organized crime groups are in on the sex trafficking.</span><sup class="reference" data-dcnode-id="8719" id="cite_ref-109"><a data-dcnode-id="8720" href="#cite_note-109"><span data-dcnode-id="8721" instrument_node="">[109]</span></a></sup><span data-dcnode-id="8718" instrument_node=""> In 1997 alone as many as 175,000 young women from Russia, the former Soviet Union and Eastern and Central Europe were sold as commodities in the sex markets of the developed countries in Europe and the Americas.</span><sup class="reference" data-dcnode-id="8715" id="cite_ref-110"><a data-dcnode-id="8716" href="#cite_note-110"><span data-dcnode-id="8717" instrument_node="">[110]</span></a></sup><span data-dcnode-id="8714" instrument_node=""> The European Union reported that from 2010 to 2013 30,146 individuals were identified and registered as human trafficking victims.</span><sup class="reference" data-dcnode-id="8711" id="cite_ref-BBC_111-0"><a data-dcnode-id="8712" href="#cite_note-BBC-111"><span data-dcnode-id="8713" instrument_node="">[111]</span></a></sup><span data-dcnode-id="8710" instrument_node=""> Of those registered, 69 percent of the victims were sexually exploited and more than 1,000 were children.</span><sup class="reference" data-dcnode-id="8707" id="cite_ref-BBC_111-1"><a data-dcnode-id="8708" href="#cite_note-BBC-111"><span data-dcnode-id="8709" instrument_node="">[111]</span></a></sup><span data-dcnode-id="8706" instrument_node=""> Although many sex trafficked individuals are from outside of Europe, two-thirds of the 30,146 victims were EU citizens.</span><sup class="reference" data-dcnode-id="8703" id="cite_ref-BBC_111-2"><a data-dcnode-id="8704" href="#cite_note-BBC-111"><span data-dcnode-id="8705" instrument_node="">[111]</span></a></sup><span data-dcnode-id="8702" instrument_node=""> Despite this high proportion of domestic sex slaves, the most common ethnicities of women who are trafficked to the United Kingdom are Chinese, Brazilian, and Thai.</span><sup class="reference" data-dcnode-id="8699" id="cite_ref-Gender_and_Human_Rights_in_the_Commonwealth_83-5"><a data-dcnode-id="8700" href="#cite_note-Gender_and_Human_Rights_in_the_Commonwealth-83"><span data-dcnode-id="8701" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8698" instrument_node=""> Moldova is a known country in Europe for women, children and men to be subjected to sex trafficking.</span><sup class="reference" data-dcnode-id="8695" id="cite_ref-112"><a data-dcnode-id="8696" href="#cite_note-112"><span data-dcnode-id="8697" instrument_node="">[112]</span></a></sup><span data-dcnode-id="8694" instrument_node=""> Girls from Moldova become sex slaves starting at the age of 14. On average, they have sex with 12 to 15 men per day.</span><sup class="reference" data-dcnode-id="8691" id="cite_ref-113"><a data-dcnode-id="8692" href="#cite_note-113"><span data-dcnode-id="8693" instrument_node="">[113]</span></a></sup><span data-dcnode-id="8690" instrument_node=""> The national Bureau of Statistics in Moldova says that in 2008 there were almost 25,000 victims of trafficking. When the women from Moldova are being trafficked for sex, they are most likely to be sent to countries such as Russia, Cyprus, Turkey, and other Middle Western and Eastern European countries.</span><sup class="reference" data-dcnode-id="8687" id="cite_ref-gvnet.com_114-0"><a data-dcnode-id="8688" href="#cite_note-gvnet.com-114"><span data-dcnode-id="8689" instrument_node="">[114]</span></a></sup><span data-dcnode-id="8686" instrument_node=""> 85 percent of the victims leave their country to find a better job to support their family, but they are tricked into becoming a sex slave and are forced to become a prostitute.</span><sup class="reference" data-dcnode-id="8683" id="cite_ref-gvnet.com_114-1"><a data-dcnode-id="8684" href="#cite_note-gvnet.com-114"><span data-dcnode-id="8685" instrument_node="">[114]</span></a></sup><span data-dcnode-id="8682" instrument_node=""> The International Organization for Migration (IOM) asked victims what country they came from and 61 percent of the victims came from Moldova, 19 percent came from Romania, and the rest came from Albania, Bulgaria, Russia, and Ukraine. More than 60 percent of the victims had a secondary school education or better, and their average age was 21.</span><sup class="reference" data-dcnode-id="8679" id="cite_ref-gvnet.com_114-2"><a data-dcnode-id="8680" href="#cite_note-gvnet.com-114"><span data-dcnode-id="8681" instrument_node="">[114]</span></a></sup><span data-dcnode-id="8678" instrument_node="">
</span></p><span data-dcnode-id="8676" instrument_node="">
</span><h3 data-dcnode-id="8666"><span class="mw-headline" data-dcnode-id="8674" id="Iran"><span data-dcnode-id="8675" instrument_node="">Iran</span></span><span class="mw-editsection" data-dcnode-id="8667"><span class="mw-editsection-bracket" data-dcnode-id="8672"><span data-dcnode-id="8673" instrument_node="">[</span></span><a data-dcnode-id="8670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D21" title="Edit section: Iran"><span data-dcnode-id="8671" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8668"><span data-dcnode-id="8669" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8665" instrument_node="">
</span><p data-dcnode-id="8643"><span data-dcnode-id="8664" instrument_node="">Iran is a source, transit, and destination country for men, women, and children subjected to sex trafficking and forced labor. Iranian girls between the ages of 13 and 17 are targeted by traffickers for sale abroad; younger girls may be forced into domestic service until their traffickers consider them old enough to be subjected to child sex trafficking. An increase in the transport of girls from and through Iran en route to other Gulf States for sexual exploitation has been reported from 2009 to 2015; during the reporting period, Iranian trafficking networks subjected Iranian girls to sex trafficking in brothels in the Iraqi Kurdistan Region. Organized criminal groups kidnap or purchase and force Iranian and immigrant children to work as beggars and street vendors in cities, including Tehran. These children, who may be as young as 3, are coerced through physical and sexual abuse and drug addiction; reportedly many are purchased for as little as $150.</span><sup class="reference" data-dcnode-id="8661" id="cite_ref-115"><a data-dcnode-id="8662" href="#cite_note-115"><span data-dcnode-id="8663" instrument_node="">[115]</span></a></sup><span data-dcnode-id="8660" instrument_node=""> Dozens of girls from Iran are brought to Pakistan to be sold as sex slaves every day.</span><sup class="reference" data-dcnode-id="8657" id="cite_ref-ReferenceA_116-0"><a data-dcnode-id="8658" href="#cite_note-ReferenceA-116"><span data-dcnode-id="8659" instrument_node="">[116]</span></a></sup><span data-dcnode-id="8656" instrument_node=""> Most of these women have already been raped within the first 24 hours of their departure.</span><sup class="reference" data-dcnode-id="8653" id="cite_ref-Uncensored_117-0"><a data-dcnode-id="8654" href="#cite_note-Uncensored-117"><span data-dcnode-id="8655" instrument_node="">[117]</span></a></sup><span data-dcnode-id="8652" instrument_node=""> It was also said in the Tehran newspapers that senior figures from the government have been involved in buying, selling, and abusing young women and children. Runaway girls in Iran are sought out for by the traffickers because it is incredibly easy to put them in the sex trafficking market since they have no home.</span><sup class="reference" data-dcnode-id="8649" id="cite_ref-ReferenceA_116-1"><a data-dcnode-id="8650" href="#cite_note-ReferenceA-116"><span data-dcnode-id="8651" instrument_node="">[116]</span></a></sup><span data-dcnode-id="8648" instrument_node=""> There are about 84,000 women and girls in prostitution in Tehran. Most of them are on the streets, while others are in the 250 brothels.</span><sup class="reference" data-dcnode-id="8645" id="cite_ref-Uncensored_117-1"><a data-dcnode-id="8646" href="#cite_note-Uncensored-117"><span data-dcnode-id="8647" instrument_node="">[117]</span></a></sup><span data-dcnode-id="8644" instrument_node="">
</span></p><span data-dcnode-id="8642" instrument_node="">
</span><h3 data-dcnode-id="8632"><span class="mw-headline" data-dcnode-id="8640" id="Israel"><span data-dcnode-id="8641" instrument_node="">Israel</span></span><span class="mw-editsection" data-dcnode-id="8633"><span class="mw-editsection-bracket" data-dcnode-id="8638"><span data-dcnode-id="8639" instrument_node="">[</span></span><a data-dcnode-id="8636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D22" title="Edit section: Israel"><span data-dcnode-id="8637" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8634"><span data-dcnode-id="8635" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8631" instrument_node="">
</span><p data-dcnode-id="8625"><span data-dcnode-id="8630" instrument_node="">The trafficking of women into prostitution in Israel increased in the early 1990s.</span><sup class="reference" data-dcnode-id="8627" id="cite_ref-118"><a data-dcnode-id="8628" href="#cite_note-118"><span data-dcnode-id="8629" instrument_node="">[118]</span></a></sup><span data-dcnode-id="8626" instrument_node=""> An estimate of three thousand women were being trafficked in the 1990s and early 2000s. Many of the women came from "post-Soviet states particularly Russia, Ukraine, Moldova and many more." The women ended up in brothels where they worked seven days a week and served up to 30 clients a day. The traffickers used physical violence and threats to dissuade the women from leaving, they also confined women behind locked doors and barred windows. Throughout the 1990s the Israeli authorities failed to view sex trafficking as a problem, they simply viewed it as prostitution. They failed to interfere with brothel operations. If a case was filed the trafficker would have had a plea bargain with light punishment. The women who were being trafficked on the other hand were classified as illegal alien or criminals since they entered Israel illegally, so authorities concentrated on catching the women rather than the traffickers. Usually the victims of trafficking are vulnerable because they live in poverty, or they are not educated. Trafficking affects the mental health of the victim as well as physical health. Israel has become a country of destination for women who had been trafficked from surrounding countries.
</span></p><p data-dcnode-id="8610"><span data-dcnode-id="8624" instrument_node="">In 2000, the Knesset amended the Penal Law to prohibit sex trafficking. In 2006, an Anti-Trafficking Law was enacted. In 2001, Israel was placed in U.S. State Department </span><a data-dcnode-id="8622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafficking_in_Persons_Report" title="Trafficking in Persons Report"><span data-dcnode-id="8623" instrument_node="">Trafficking in Persons Report</span></a><span data-dcnode-id="8621" instrument_node=""> Tier 3. Between 2002 and 2011 Israel was placed in Tier 2. Since 2012 through the recent 2019 report Israel has been ranked Tier 1 (full compliance with the TVPA's minimum standards).</span><sup class="reference" data-dcnode-id="8618" id="cite_ref-119"><a data-dcnode-id="8619" href="#cite_note-119"><span data-dcnode-id="8620" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="8615" id="cite_ref-120"><a data-dcnode-id="8616" href="#cite_note-120"><span data-dcnode-id="8617" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="8612" id="cite_ref-121"><a data-dcnode-id="8613" href="#cite_note-121"><span data-dcnode-id="8614" instrument_node="">[121]</span></a></sup><span data-dcnode-id="8611" instrument_node="">
</span></p><span data-dcnode-id="8609" instrument_node="">
</span><h2 data-dcnode-id="8599"><span class="mw-headline" data-dcnode-id="8607" id="Public_health_response"><span data-dcnode-id="8608" instrument_node="">Public health response</span></span><span class="mw-editsection" data-dcnode-id="8600"><span class="mw-editsection-bracket" data-dcnode-id="8605"><span data-dcnode-id="8606" instrument_node="">[</span></span><a data-dcnode-id="8603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D23" title="Edit section: Public health response"><span data-dcnode-id="8604" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8601"><span data-dcnode-id="8602" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8598" instrument_node="">
</span><h3 data-dcnode-id="8588"><span class="mw-headline" data-dcnode-id="8596" id="Healthcare_interventions"><span data-dcnode-id="8597" instrument_node="">Healthcare interventions</span></span><span class="mw-editsection" data-dcnode-id="8589"><span class="mw-editsection-bracket" data-dcnode-id="8594"><span data-dcnode-id="8595" instrument_node="">[</span></span><a data-dcnode-id="8592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D24" title="Edit section: Healthcare interventions"><span data-dcnode-id="8593" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8590"><span data-dcnode-id="8591" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8587" instrument_node="">
</span><p data-dcnode-id="8556"><span data-dcnode-id="8586" instrument_node="">There are many </span><a data-dcnode-id="8584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_health" title="Public health"><span data-dcnode-id="8585" instrument_node="">public health</span></a><span data-dcnode-id="8583" instrument_node=""> initiatives that are being implemented to identify victims of sex trafficking. There are few professionals that are likely to encounter victims of sex trafficking, but healthcare providers are a unique group because they are more likely to come into contact with individuals that are still in captivity.</span><sup class="reference" data-dcnode-id="8580" id="cite_ref-122"><a data-dcnode-id="8581" href="#cite_note-122"><span data-dcnode-id="8582" instrument_node="">[122]</span></a></sup><span data-dcnode-id="8579" instrument_node=""> The National Human Trafficking Resource Center provides guidelines to aid healthcare providers in identifying victims of sex trafficking. They provide general guidelines to indicate human trafficking (i.e. inconsistent/scripted history, unwillingness to answer questions about illness or injury, etc.), but also includes indicators to home in on sex trafficking.</span><sup class="reference" data-dcnode-id="8576" id="cite_ref-123"><a data-dcnode-id="8577" href="#cite_note-123"><span data-dcnode-id="8578" instrument_node="">[123]</span></a></sup><span data-dcnode-id="8575" instrument_node=""> In addition, this network has created a framework for sex trafficking protocols in healthcare settings once a victim is suspected or identified. The goal of the protocol is to provide those interacting with the patient step-by-step instructions on how to proceed once a potential trafficking victim has been identified.</span><sup class="reference" data-dcnode-id="8572" id="cite_ref-124"><a data-dcnode-id="8573" href="#cite_note-124"><span data-dcnode-id="8574" instrument_node="">[124]</span></a></sup><span data-dcnode-id="8571" instrument_node=""> Additionally, an initiative known as the HEAL Trafficking and Hope for Justice Protocol Toolkit is being made accessible to healthcare providers.</span><sup class="reference" data-dcnode-id="8568" id="cite_ref-125"><a data-dcnode-id="8569" href="#cite_note-125"><span data-dcnode-id="8570" instrument_node="">[125]</span></a></sup><span data-dcnode-id="8567" instrument_node=""> The goal of the toolkit is to provide a uniform medical response to trafficking. The toolkit combines known policies and procedures with tenets of trauma informed care. The toolkit is intended for the use of different healthcare providers such as community health workers, social workers, mental health counselors, nurses, and many others.
A second initiative was taken on by the </span><a class="mw-redirect" data-dcnode-id="8565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centers_for_Disease_Control" title="Centers for Disease Control"><span data-dcnode-id="8566" instrument_node="">Centers for Disease Control</span></a><span data-dcnode-id="8564" instrument_node="">. They have started to implement new fields of data collection through </span><a data-dcnode-id="8562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Classification_of_Diseases" title="International Classification of Diseases"><span data-dcnode-id="8563" instrument_node="">International Classification of Diseases</span></a><span data-dcnode-id="8561" instrument_node=""> (ICD) to better identify and categorize cases of sex trafficking. The new fields are ICD-10-CM codes. These are further categorized into T codes and Z codes. The T codes are further subcategorized into specific diagnoses that are used to indicate suspected and confirmed cases of trafficking. In addition, Z codes are also further categorized, but will be used for examination or observation of trafficking victims for other reasons.</span><sup class="reference" data-dcnode-id="8558" id="cite_ref-126"><a data-dcnode-id="8559" href="#cite_note-126"><span data-dcnode-id="8560" instrument_node="">[126]</span></a></sup><span data-dcnode-id="8557" instrument_node="">
</span></p><p data-dcnode-id="8550"><span data-dcnode-id="8555" instrument_node="">Approximately 87.8% of trafficking victims have come in contact with a healthcare professional either during or after their time of exploitation and labor. On 26 February 2018, the Office on Trafficking in Persons (OTIP) under the U.S. Department of Health &amp; Human Services passed the SOAR to Health and Wellness Act of 2018.</span><sup class="reference" data-dcnode-id="8552" id="cite_ref-127"><a data-dcnode-id="8553" href="#cite_note-127"><span data-dcnode-id="8554" instrument_node="">[127]</span></a></sup><span data-dcnode-id="8551" instrument_node=""> SOAR which is an acronym which stands for Stop, Observe, Ask, and Respond is a training program which aims to properly equip professionals with the necessary resources and methods to identify victims of human trafficking. The training aids to help others recognize key indicators and characteristics of human trafficking as well as aid in key communication techniques that are effective for everyone involved. Response tactics can be key to identifying victims without causing harm and putting them in increased danger. The trainings also provide key communities with the support and resources they may need to bring attention to a crime which may be heavily impacting that area.  The training can either be taken online or in person and can be personalized based the role of the professional. SOAR is available to anyone who may be interested in learning how to identify victims or situations of human trafficking in a healthcare setting. Trainings are available for social workers, medical and public health professionals, and even educators.
</span></p><p data-dcnode-id="8529"><span data-dcnode-id="8549" instrument_node="">Physicians against the trafficking of humans (PATH</span><sup class="reference" data-dcnode-id="8546" id="cite_ref-128"><a data-dcnode-id="8547" href="#cite_note-128"><span data-dcnode-id="8548" instrument_node="">[128]</span></a></sup><span data-dcnode-id="8545" instrument_node="">) is a program of the </span><a data-dcnode-id="8543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Medical_Women%2527s_Association" title="American Medical Women's Association"><span data-dcnode-id="8544" instrument_node="">American Medical Women's Association</span></a><span data-dcnode-id="8542" instrument_node=""> (AMWA) that was started in 2014 with efforts to encourage medical professionals including physicians, residents, and medical students to become more aware of human trafficking.</span><sup class="reference" data-dcnode-id="8539" id="cite_ref-129"><a data-dcnode-id="8540" href="#cite_note-129"><span data-dcnode-id="8541" instrument_node="">[129]</span></a></sup><span data-dcnode-id="8538" instrument_node=""> The initiative was initially brought into discussion by Dr. Gayatri Devi in 2012, the president of AMWA at the time. She identified human sex trafficking as a key issue to be addressed. This discussion then progressed into forming a Human Trafficking Committee to handle the issue. PATH has since been creating content for hospitals and other medical facilities to use to educate professionals and students on the identification and advocacy for human trafficking. PATH has also been featured in many media outlets such as Politico</span><sup class="reference" data-dcnode-id="8535" id="cite_ref-130"><a data-dcnode-id="8536" href="#cite_note-130"><span data-dcnode-id="8537" instrument_node="">[130]</span></a></sup><span data-dcnode-id="8534" instrument_node=""> and TEDx.</span><sup class="reference" data-dcnode-id="8531" id="cite_ref-131"><a data-dcnode-id="8532" href="#cite_note-131"><span data-dcnode-id="8533" instrument_node="">[131]</span></a></sup><span data-dcnode-id="8530" instrument_node="">
</span></p><p data-dcnode-id="8519"><span data-dcnode-id="8528" instrument_node="">There are three main tactics social workers use to aid in the recovery of sex trafficking survivors: ecological, strengths-based, and victim-centered.</span><sup class="reference" data-dcnode-id="8525" id="cite_ref-:2_132-0"><a data-dcnode-id="8526" href="#cite_note-:2-132"><span data-dcnode-id="8527" instrument_node="">[132]</span></a></sup><span data-dcnode-id="8524" instrument_node=""> Using the ecological approach, the social worker evaluates their client's current environment and goals for reintegration into the community. By examining how justice systems, legal, and medical services impact their client, they can help them look into areas of future employment, gaining legal status, and reuniting with family. The strengths-based approach aims to create a bond of trust between the social worker and their client to build confidence as well as autonomy and leadership skills. Lastly, when using the victim-centered approach, social workers develop services and plans for the future specifically catered to their client's individual needs. These services are developed through a survivor's lens, which allows social workers to easily meet the needs of their clients. All three methods have proven to be effective in the recovery of sex trafficking survivors.</span><sup class="reference" data-dcnode-id="8521" id="cite_ref-:2_132-1"><a data-dcnode-id="8522" href="#cite_note-:2-132"><span data-dcnode-id="8523" instrument_node="">[132]</span></a></sup><span data-dcnode-id="8520" instrument_node="">
</span></p><span data-dcnode-id="8518" instrument_node="">
</span><h3 data-dcnode-id="8508"><span class="mw-headline" data-dcnode-id="8516" id="Control_tactics_to_facilitate_intervention"><span data-dcnode-id="8517" instrument_node="">Control tactics to facilitate intervention</span></span><span class="mw-editsection" data-dcnode-id="8509"><span class="mw-editsection-bracket" data-dcnode-id="8514"><span data-dcnode-id="8515" instrument_node="">[</span></span><a data-dcnode-id="8512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D25" title="Edit section: Control tactics to facilitate intervention"><span data-dcnode-id="8513" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8510"><span data-dcnode-id="8511" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8507" instrument_node="">
</span><p data-dcnode-id="8497"><span data-dcnode-id="8506" instrument_node="">There are many control tactics used by sex traffickers to control their victims, such as threats, physical and sexual assault, confiscating legitimate travel and immigration documents, and threats against the victim's family.</span><sup class="reference" data-dcnode-id="8503" id="cite_ref-133"><a data-dcnode-id="8504" href="#cite_note-133"><span data-dcnode-id="8505" instrument_node="">[133]</span></a></sup><span data-dcnode-id="8502" instrument_node=""> The University of Minnesota Duluth published the Power and Control Wheel to help target domestic abuse intervention.</span><sup class="reference" data-dcnode-id="8499" id="cite_ref-134"><a data-dcnode-id="8500" href="#cite_note-134"><span data-dcnode-id="8501" instrument_node="">[134]</span></a></sup><span data-dcnode-id="8498" instrument_node=""> The wheel identifies eight different mechanisms of power and control used on victims including: intimidation, emotional abuse, isolation, denying, blaming, and minimizing, sexual abuse, physical abuse, using privilege, economic abuse, coercion and threats. The wheel was developed to be used in counseling and education groups for victims of sex trafficking. It breaks down the tactics used against victims so the cycle of violence may become visible and stopped. 
</span></p><span data-dcnode-id="8496" instrument_node="">
