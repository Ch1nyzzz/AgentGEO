</span><p data-dcnode-id="10449"><b data-dcnode-id="10483"><span data-dcnode-id="10484" instrument_node="">Sex trafficking</span></b><span data-dcnode-id="10482" instrument_node=""> is </span><a data-dcnode-id="10480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="10481" instrument_node="">human trafficking</span></a><span data-dcnode-id="10479" instrument_node=""> for the purpose of sexual exploitation. It has been called a form of </span><a data-dcnode-id="10477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery_in_the_21st_century" title="Slavery in the 21st century"><span data-dcnode-id="10478" instrument_node="">modern slavery</span></a><span data-dcnode-id="10476" instrument_node=""> because of the way victims are forced into sexual acts, usually non-consensually, in a form of </span><a data-dcnode-id="10474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_slavery" title="Sexual slavery"><span data-dcnode-id="10475" instrument_node="">sexual slavery</span></a><span data-dcnode-id="10473" instrument_node="">.</span><sup class="reference" data-dcnode-id="10470" id="cite_ref-Inside_the_Business_of_Modern_Slavery_1-0"><a data-dcnode-id="10471" href="#cite_note-Inside_the_Business_of_Modern_Slavery-1"><span data-dcnode-id="10472" instrument_node="">[1]</span></a></sup><span data-dcnode-id="10469" instrument_node=""> Perpetrators of the crime are called sex traffickers or pimps—people who manipulate victims to engage in various forms of commercial sex with paying customers. Sex traffickers use force, fraud, and coercion as they recruit, transport, and provide their victims as prostitutes.</span><sup class="reference" data-dcnode-id="10466" id="cite_ref-2"><a data-dcnode-id="10467" href="#cite_note-2"><span data-dcnode-id="10468" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10465" instrument_node=""> Sometimes victims are brought into a situation of dependency on their trafficker(s), financially or emotionally.</span><sup class="reference" data-dcnode-id="10462" id="cite_ref-Global_Social_Welfare_3-0"><a data-dcnode-id="10463" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="10464" instrument_node="">[3]</span></a></sup><span data-dcnode-id="10461" instrument_node=""> Every aspect of sex trafficking is considered a crime, from acquisition to transportation and exploitation of victims.</span><sup class="reference" data-dcnode-id="10458" id="cite_ref-Inside_the_Business_of_Modern_Slavery_1-1"><a data-dcnode-id="10459" href="#cite_note-Inside_the_Business_of_Modern_Slavery-1"><span data-dcnode-id="10460" instrument_node="">[1]</span></a></sup><span data-dcnode-id="10457" instrument_node=""> This includes any sexual exploitation of adults or minors, including </span><a data-dcnode-id="10455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_sex_tourism" title="Child sex tourism"><span data-dcnode-id="10456" instrument_node="">child sex tourism</span></a><span data-dcnode-id="10454" instrument_node=""> (CST) and domestic minor sex trafficking (DMST).</span><sup class="reference" data-dcnode-id="10451" id="cite_ref-Global_Social_Welfare_3-1"><a data-dcnode-id="10452" href="#cite_note-Global_Social_Welfare-3"><span data-dcnode-id="10453" instrument_node="">[3]</span></a></sup><span data-dcnode-id="10450" instrument_node="">
</span></p><p data-dcnode-id="10421"><span data-dcnode-id="10448" instrument_node="">In 2012, the International Labour Organization (ILO) reported 20.9&nbsp;million people were subjected to forced labor, and 22% (4.5&nbsp;million) were victims of forced sexual exploitation.</span><sup class="reference" data-dcnode-id="10445" id="cite_ref-OIT_4-0"><a data-dcnode-id="10446" href="#cite_note-OIT-4"><span data-dcnode-id="10447" instrument_node="">[4]</span></a></sup><span data-dcnode-id="10444" instrument_node=""> The ILO reported in 2016 that of the estimated 25 million persons in forced labor, 5&nbsp;million were victims of sexual exploitation.</span><sup class="reference" data-dcnode-id="10441" id="cite_ref-5"><a data-dcnode-id="10442" href="#cite_note-5"><span data-dcnode-id="10443" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="10438" id="cite_ref-6"><a data-dcnode-id="10439" href="#cite_note-6"><span data-dcnode-id="10440" instrument_node="">[6]</span></a></sup><span data-dcnode-id="10437" instrument_node=""> However, due to the covertness of sex trafficking, obtaining accurate, reliable statistics is difficult for researchers.</span><sup class="reference" data-dcnode-id="10434" id="cite_ref-Tiefenbrun_7-0"><a data-dcnode-id="10435" href="#cite_note-Tiefenbrun-7"><span data-dcnode-id="10436" instrument_node="">[7]</span></a></sup><span data-dcnode-id="10433" instrument_node=""> The global commercial profits for sexual slavery are estimated to be $99 billion, according to ILO.</span><sup class="reference" data-dcnode-id="10430" id="cite_ref-8"><a data-dcnode-id="10431" href="#cite_note-8"><span data-dcnode-id="10432" instrument_node="">[8]</span></a></sup><span data-dcnode-id="10429" instrument_node=""> In 2005, the figure was given as $9 billion for the total human trafficking.</span><sup class="reference" data-dcnode-id="10426" id="cite_ref-9"><a data-dcnode-id="10427" href="#cite_note-9"><span data-dcnode-id="10428" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="10423" id="cite_ref-10"><a data-dcnode-id="10424" href="#cite_note-10"><span data-dcnode-id="10425" instrument_node="">[10]</span></a></sup><span data-dcnode-id="10422" instrument_node="">
</span></p><p data-dcnode-id="10411"><span data-dcnode-id="10420" instrument_node="">Most victims find themselves in coercive or abusive situations from which escape is both difficult and dangerous. Locations where this practice occurs span the globe and reflect an intricate web between nations, making it very difficult to construct viable solutions to this human rights problem.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="10413" style="white-space:nowrap;"><span data-dcnode-id="10419" instrument_node="">[</span><i data-dcnode-id="10415"><a data-dcnode-id="10416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="10417" title="This claim needs references to reliable sources. (August 2020)"><span data-dcnode-id="10418" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="10414" instrument_node="">]</span></sup><span data-dcnode-id="10412" instrument_node="">
</span></p><span data-dcnode-id="10410" instrument_node="">

</span><h2 data-dcnode-id="10028"><span class="mw-headline" data-dcnode-id="10036" id="Defining_the_issue"><span data-dcnode-id="10037" instrument_node="">Defining the issue</span></span><span class="mw-editsection" data-dcnode-id="10029"><span class="mw-editsection-bracket" data-dcnode-id="10034"><span data-dcnode-id="10035" instrument_node="">[</span></span><a data-dcnode-id="10032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D1" title="Edit section: Defining the issue"><span data-dcnode-id="10033" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10030"><span data-dcnode-id="10031" instrument_node="">]</span></span></span></h2><span data-dcnode-id="10027" instrument_node="">
</span><h3 data-dcnode-id="10017"><span class="mw-headline" data-dcnode-id="10025" id="Global"><span data-dcnode-id="10026" instrument_node="">Global</span></span><span class="mw-editsection" data-dcnode-id="10018"><span class="mw-editsection-bracket" data-dcnode-id="10023"><span data-dcnode-id="10024" instrument_node="">[</span></span><a data-dcnode-id="10021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D2" title="Edit section: Global"><span data-dcnode-id="10022" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10019"><span data-dcnode-id="10020" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10016" instrument_node="">
</span><p data-dcnode-id="9988"><span data-dcnode-id="10015" instrument_node="">In 2000, countries adopted a definition set forth by the </span><a data-dcnode-id="10013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Publishing_houses_in_the_Soviet_Union" title="Publishing houses in the Soviet Union"><span data-dcnode-id="10014" instrument_node="">United Moms</span></a><span data-dcnode-id="10012" instrument_node="">.</span><sup class="reference" data-dcnode-id="10009" id="cite_ref-Villanova_11-0"><a data-dcnode-id="10010" href="#cite_note-Villanova-11"><span data-dcnode-id="10011" instrument_node="">[11]</span></a></sup><span data-dcnode-id="10008" instrument_node=""> The United Nations Convention Against Transnational Organized Crime, </span><a data-dcnode-id="10006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_to_Prevent%2C_Suppress_and_Punish_Trafficking_in_Persons%2C_Especially_Women_and_Children" title="Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children"><span data-dcnode-id="10007" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons, Especially Women and Children</span></a><span data-dcnode-id="10005" instrument_node="">, is also referred to as the Palermo Protocol. The Palermo Protocol created this definition.</span><sup class="reference" data-dcnode-id="10002" id="cite_ref-Villanova_11-1"><a data-dcnode-id="10003" href="#cite_note-Villanova-11"><span data-dcnode-id="10004" instrument_node="">[11]</span></a></sup><span data-dcnode-id="10001" instrument_node=""> 147 of the 192 member states of the UN ratified the Palermo Protocol when it was published in 2000;</span><sup class="reference" data-dcnode-id="9998" id="cite_ref-Villanova_11-2"><a data-dcnode-id="9999" href="#cite_note-Villanova-11"><span data-dcnode-id="10000" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9997" instrument_node=""> as of September 2017, 171 states are parties.</span><sup class="reference" data-dcnode-id="9994" id="cite_ref-12"><a data-dcnode-id="9995" href="#cite_note-12"><span data-dcnode-id="9996" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9993" instrument_node=""> Article 3 of the Palermo Protocol states the definition as:</span><sup class="reference" data-dcnode-id="9990" id="cite_ref-Palermo_Protocol_Doc_13-0"><a data-dcnode-id="9991" href="#cite_note-Palermo_Protocol_Doc-13"><span data-dcnode-id="9992" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9989" instrument_node="">
</span></p><span data-dcnode-id="9987" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="9974"><p data-dcnode-id="9983"><span data-dcnode-id="9984" instrument_node="">(a) "Trafficking in persons" shall mean the recruitment, transportation, transfer, harbouring or receipt of persons, by means of the threat or use of force or other forms of coercion, of abduction, of fraud, of deception, of the abuse of power or of a position of vulnerability or of the giving or receiving of payments or benefits to achieve the consent of a person having control over another person, for the purpose of exploitation.
</span></p><p data-dcnode-id="9981"><span data-dcnode-id="9982" instrument_node="">Exploitation shall include, at a minimum, the exploitation of the prostitution of others or other forms of sexual exploitation, forced labour or services, slavery or practices similar to slavery, servitude or the removal of organs;
</span></p><p data-dcnode-id="9979"><span data-dcnode-id="9980" instrument_node="">(b) The consent of a victim of trafficking in persons to the intended exploitation set forth in subparagraph (a) of this article shall be irrelevant where any of the means set forth in subparagraph (a) have been used;
</span></p><p data-dcnode-id="9977"><span data-dcnode-id="9978" instrument_node="">(c) The recruitment, transportation, transfer, harbouring or receipt of a child for the purpose of exploitation shall be considered "trafficking in persons" even if this does not involve any of the means set forth in subparagraph (a) of this article;
</span></p><p data-dcnode-id="9975"><span data-dcnode-id="9976" instrument_node="">
(d) "Child" shall mean any person under eighteen years of age.</span></p></blockquote><span data-dcnode-id="9973" instrument_node="">
</span><p data-dcnode-id="9963"><span data-dcnode-id="9972" instrument_node="">Article 5 of the Palermo Protocol then requires the member states to criminalize trafficking based on the definition outlined in Article 3; however, many member states' domestic laws reflect a narrower definition than Article 3.</span><sup class="reference" data-dcnode-id="9969" id="cite_ref-Villanova_11-3"><a data-dcnode-id="9970" href="#cite_note-Villanova-11"><span data-dcnode-id="9971" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9968" instrument_node=""> Although these nations claim to be obliging Article 5, the narrow laws lead to a smaller portion of people being prosecuted for sex trafficking.</span><sup class="reference" data-dcnode-id="9965" id="cite_ref-Villanova_11-4"><a data-dcnode-id="9966" href="#cite_note-Villanova-11"><span data-dcnode-id="9967" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9964" instrument_node="">
</span></p><p data-dcnode-id="9958"><span data-dcnode-id="9962" instrument_node="">The UN established various anti-trafficking tools, including a Global Report on Trafficking in Persons and an Inter-Agency Coordination Group Against Trafficking in Persons. The Global Report on Trafficking in Person provides new information based on data gathered from 155 countries. It offers first global assessment of the scope of </span><a data-dcnode-id="9960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="9961" instrument_node="">human trafficking</span></a><span data-dcnode-id="9959" instrument_node=""> and what is being done to fight it. The UN General Assembly passed several resolutions on measuring to eliminate human trafficking. In 2010 the UN Global Plan of Action to Combat Trafficking in Persons was adopted. Various other organizations have engaged in global efforts against sex trafficking. "The UN Protocol's is the bedrock of the international initiatives against human sex trafficking." This protocol defines certain elements of sex trafficking: "action", which describes  the recruitment and transportation of victims, "means", which includes coercion, fraud, or abuse of power, and "purpose", which includes exploitation such as  prostitution, forced labor or slavery, and the removal of organs. The UN requires member states to establish the trafficking of humans as a criminal offense.
</span></p><span data-dcnode-id="9957" instrument_node="">
</span><h3 data-dcnode-id="9947"><span class="mw-headline" data-dcnode-id="9955" id="United_States"><span data-dcnode-id="9956" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="9948"><span class="mw-editsection-bracket" data-dcnode-id="9953"><span data-dcnode-id="9954" instrument_node="">[</span></span><a data-dcnode-id="9951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D3" title="Edit section: United States"><span data-dcnode-id="9952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9949"><span data-dcnode-id="9950" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9946" instrument_node="">
</span><p data-dcnode-id="9913"><span data-dcnode-id="9945" instrument_node="">After members of Prostitutes Anonymous who were survivors of modern domestic sex trafficking spent 13 years doing TV, radio, public appearances, news interviews, etc. and calling out that this country needed to "'do something' about it"&nbsp;–  an internationally recognized definition for sex trafficking was finally established with the Trafficking Act of 2000.  It was during the same year the Palermo Protocol was enacted, the United States passed the Victims of Trafficking and Violence Protection Act of 2000 (TVPA) to clarify the previous confusion and discrepancies in regards to the criminalizing guidelines of human trafficking.</span><sup class="reference" data-dcnode-id="9942" id="cite_ref-Arizona_14-0"><a data-dcnode-id="9943" href="#cite_note-Arizona-14"><span data-dcnode-id="9944" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9941" instrument_node=""> Through this act, sex trafficking crimes were defined as a situation where in which a "commercial sex act is induced by force, fraud, or coercion, or in which the person induced to perform such act has not attained 18 years of age."</span><sup class="reference" data-dcnode-id="9938" id="cite_ref-TVPA_Doc_15-0"><a data-dcnode-id="9939" href="#cite_note-TVPA_Doc-15"><span data-dcnode-id="9940" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="9935" id="cite_ref-:20_16-0"><a data-dcnode-id="9936" href="#cite_note-:20-16"><span data-dcnode-id="9937" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9934" instrument_node=""> If the victim is a child under the age of 18 no force, fraud, or coercion needs to be proven based on this legislation.</span><sup class="reference" data-dcnode-id="9931" id="cite_ref-Arizona_14-1"><a data-dcnode-id="9932" href="#cite_note-Arizona-14"><span data-dcnode-id="9933" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9930" instrument_node=""> Susan Tiefenbrun, a professor at the Thomas Jefferson School of Law who has written extensively on human trafficking, conducted research on the victims addressed in this act and discovered that each year more than two million women throughout the world are bought and sold for sexual exploitation.</span><sup class="reference" data-dcnode-id="9927" id="cite_ref-Tiefenbrun_7-1"><a data-dcnode-id="9928" href="#cite_note-Tiefenbrun-7"><span data-dcnode-id="9929" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9926" instrument_node=""> To clarify previous legal inconsistencies in regards to youth and trafficking, the United States took legal measures to define more varieties of exploitive situations in relation to children.</span><sup class="reference" data-dcnode-id="9923" id="cite_ref-Arizona_14-2"><a data-dcnode-id="9924" href="#cite_note-Arizona-14"><span data-dcnode-id="9925" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9922" instrument_node=""> The two terms they defined and focused on were "commercial sexual exploitation of children" and "domestic minor sex trafficking."  Commercial sexual exploitation of children (CSEC) is defined as "encompassing several forms of exploitation, including pornography, prostitution, child sex tourism, and child marriage."</span><sup class="reference" data-dcnode-id="9919" id="cite_ref-Arizona_14-3"><a data-dcnode-id="9920" href="#cite_note-Arizona-14"><span data-dcnode-id="9921" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9918" instrument_node=""> Domestic minor sex trafficking (DMST) is a term that represents a subset of CSEC situations that have "the exchange of sex with a child under the age of 18, who is a United States (US) citizen or permanent resident, for a gain of cash, goods, or anything of value."</span><sup class="reference" data-dcnode-id="9915" id="cite_ref-Arizona_14-4"><a data-dcnode-id="9916" href="#cite_note-Arizona-14"><span data-dcnode-id="9917" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9914" instrument_node="">
</span></p><p data-dcnode-id="9872"><span data-dcnode-id="9912" instrument_node="">According to ECPAT USA, the average age of entry into street prostitution is between 12 and 14 years old. The demographic of street prostitutes range from poor women, kids, ethnic minorities, and immigrants.</span><sup class="reference" data-dcnode-id="9909" id="cite_ref-:15_17-0"><a data-dcnode-id="9910" href="#cite_note-:15-17"><span data-dcnode-id="9911" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9908" instrument_node=""> In the United States, sex traffickers and pimps often find their victims in malls or on the streets. Sometimes vulnerable looking girls will be abducted while walking to their cars. Other times the pimps will go up to a victim and convince them to leave with them, often offering a job of some kind and money. Vulnerability increases when girls are young or homeless.</span><sup class="reference" data-dcnode-id="9905" id="cite_ref-:10_18-0"><a data-dcnode-id="9906" href="#cite_note-:10-18"><span data-dcnode-id="9907" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="9902" id="cite_ref-:15_17-1"><a data-dcnode-id="9903" href="#cite_note-:15-17"><span data-dcnode-id="9904" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="9899" id="cite_ref-:18_19-0"><a data-dcnode-id="9900" href="#cite_note-:18-19"><span data-dcnode-id="9901" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="9896" id="cite_ref-:19_20-0"><a data-dcnode-id="9897" href="#cite_note-:19-20"><span data-dcnode-id="9898" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9895" instrument_node=""> Emotional and physical coercion is used for the victim to trust the pimp and build a relationship.</span><sup class="reference" data-dcnode-id="9892" id="cite_ref-:10_18-1"><a data-dcnode-id="9893" href="#cite_note-:10-18"><span data-dcnode-id="9894" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="9889" id="cite_ref-:11_21-0"><a data-dcnode-id="9890" href="#cite_note-:11-21"><span data-dcnode-id="9891" instrument_node="">[21]</span></a></sup><span data-dcnode-id="9888" instrument_node=""> This coercion often makes the relationships between trafficker and trafficked and pimp and prostitute difficult to identify.</span><sup class="reference" data-dcnode-id="9885" id="cite_ref-:8_22-0"><a data-dcnode-id="9886" href="#cite_note-:8-22"><span data-dcnode-id="9887" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="9882" id="cite_ref-:10_18-2"><a data-dcnode-id="9883" href="#cite_note-:10-18"><span data-dcnode-id="9884" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9881" instrument_node=""> Often, the victims are tricked into thinking they will have freedom in the work they are promised along with a large sum of money but instead, they become a sex slave. After the victim has agreed to the pimp's offer, they are forcibly dissuaded from leaving by forcing addictive drugs, withholding money and physical/sexual abuse. Girls are often motivated by finances and basic survival.</span><sup class="reference" data-dcnode-id="9878" id="cite_ref-:15_17-2"><a data-dcnode-id="9879" href="#cite_note-:15-17"><span data-dcnode-id="9880" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9877" instrument_node=""> It is very common in the United States for pimps to own a business or store, especially nail salons and massage parlors. It is also very common for sex slavery businesses to be conducted near U.S. military bases, because of the business soldiers bring.</span><sup class="reference" data-dcnode-id="9874" id="cite_ref-23"><a data-dcnode-id="9875" href="#cite_note-23"><span data-dcnode-id="9876" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9873" instrument_node="">
</span></p><span data-dcnode-id="9871" instrument_node="">
</span><h2 data-dcnode-id="9861"><span class="mw-headline" data-dcnode-id="9869" id="Profile_and_modus_operandi_of_traffickers"><span data-dcnode-id="9870" instrument_node="">Profile and modus operandi of traffickers</span></span><span class="mw-editsection" data-dcnode-id="9862"><span class="mw-editsection-bracket" data-dcnode-id="9867"><span data-dcnode-id="9868" instrument_node="">[</span></span><a data-dcnode-id="9865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D4" title="Edit section: Profile and modus operandi of traffickers"><span data-dcnode-id="9866" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9863"><span data-dcnode-id="9864" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9860" instrument_node="">
</span><h3 data-dcnode-id="9850"><span class="mw-headline" data-dcnode-id="9858" id="Profile_of_Traffickers"><span data-dcnode-id="9859" instrument_node="">Profile of Traffickers</span></span><span class="mw-editsection" data-dcnode-id="9851"><span class="mw-editsection-bracket" data-dcnode-id="9856"><span data-dcnode-id="9857" instrument_node="">[</span></span><a data-dcnode-id="9854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D5" title="Edit section: Profile of Traffickers"><span data-dcnode-id="9855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9852"><span data-dcnode-id="9853" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9849" instrument_node="">
</span><p data-dcnode-id="9843"><span data-dcnode-id="9848" instrument_node="">A 2017 analysis of 1,416 child sex traffickers arrested in the United States in the last decade found that 75.4% of traffickers were male and 24.4% were female. The average age of male traffickers was 29.2 years and the average age of female traffickers was 26.3. Of those whose race was identified, 71.7% were African American, 20.5% were Caucasian, 3.7% were Hispanic, and the remaining classified as Pacific Islander/Asian and other.</span><sup class="reference" data-dcnode-id="9845" id="cite_ref-24"><a data-dcnode-id="9846" href="#cite_note-24"><span data-dcnode-id="9847" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9844" instrument_node="">
</span></p><span data-dcnode-id="9842" instrument_node="">
</span><h3 data-dcnode-id="9832"><span class="mw-headline" data-dcnode-id="9840" id="Pimp-controlled_trafficking"><span data-dcnode-id="9841" instrument_node="">Pimp-controlled trafficking</span></span><span class="mw-editsection" data-dcnode-id="9833"><span class="mw-editsection-bracket" data-dcnode-id="9838"><span data-dcnode-id="9839" instrument_node="">[</span></span><a data-dcnode-id="9836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D6" title="Edit section: Pimp-controlled trafficking"><span data-dcnode-id="9837" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9834"><span data-dcnode-id="9835" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9831" instrument_node="">
</span><p data-dcnode-id="9822"><span data-dcnode-id="9830" instrument_node="">In pimp-controlled trafficking, the victim is controlled by a single trafficker, sometimes called a </span><a class="mw-redirect" data-dcnode-id="9828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pimp" title="Pimp"><span data-dcnode-id="9829" instrument_node="">pimp</span></a><span data-dcnode-id="9827" instrument_node="">.  The victim can be controlled by the trafficker physically, psychologically, and/or emotionally.  To obtain control over their victims, traffickers will use force, drugs, emotional tactics as well as financial means. In certain circumstances, they will even resort to various forms of violence, such as gang rape and mental and physical abuse.  Traffickers sometimes use offers of marriage or modeling careers to obtain victims.</span><sup class="reference" data-dcnode-id="9824" id="cite_ref-25"><a data-dcnode-id="9825" href="#cite_note-25"><span data-dcnode-id="9826" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9823" instrument_node=""> Other times they use threats, intimidation, brainwashing and kidnapping.
</span></p><p data-dcnode-id="9797"><span data-dcnode-id="9821" instrument_node="">A common process is for the trafficker to first gain the trust of the victim, called the grooming stage.  They seek to make the victim dependent on them.</span><sup class="reference" data-dcnode-id="9818" id="cite_ref-rapidassessment_26-0"><a data-dcnode-id="9819" href="#cite_note-rapidassessment-26"><span data-dcnode-id="9820" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9817" instrument_node=""> The trafficker may express love and admiration, make lofty promises such as making the victim a star, offer them a job or an education or buy them a ticket to a new location.</span><sup class="reference" data-dcnode-id="9814" id="cite_ref-trafficking_and_internet_27-0"><a data-dcnode-id="9815" href="#cite_note-trafficking_and_internet-27"><span data-dcnode-id="9816" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9813" instrument_node=""> The main types of work offered are in the catering and hotel industry, in bars and clubs, modeling contracts, or </span><a data-dcnode-id="9811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Au_pair" title="Au pair"><span data-dcnode-id="9812" instrument_node="">au pair</span></a><span data-dcnode-id="9810" instrument_node=""> work. Once the victim is comfortable, the pimp moves to the seasoning stage, where they will ask the victim to perform sexual acts for the pimp, which the victim may do because they believe it is the only way to keep the trafficker's affection. The requests progress from there and it can be difficult for the victim to escape.</span><sup class="reference" data-dcnode-id="9807" id="cite_ref-rapidassessment_26-1"><a data-dcnode-id="9808" href="#cite_note-rapidassessment-26"><span data-dcnode-id="9809" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9806" instrument_node=""> Although uncommon, there have been reports of victims being kidnapped.</span><sup class="reference" data-dcnode-id="9803" id="cite_ref-truckers_28-0"><a data-dcnode-id="9804" href="#cite_note-truckers-28"><span data-dcnode-id="9805" instrument_node="">[28]</span></a></sup><span data-dcnode-id="9802" instrument_node=""> Social media has been used to groom and advertise victims.</span><sup class="reference" data-dcnode-id="9799" id="cite_ref-29"><a data-dcnode-id="9800" href="#cite_note-29"><span data-dcnode-id="9801" instrument_node="">[29]</span></a></sup><span data-dcnode-id="9798" instrument_node="">
</span></p><p data-dcnode-id="9784"><span data-dcnode-id="9796" instrument_node="">After the victim has joined the offender, various techniques are used to restrict the victim's access to communication with home, such as imposing physical punishment unless the victim complies with the trafficker's demands and making threats of harm and even death to the victim and their family.</span><sup class="reference" data-dcnode-id="9793" id="cite_ref-trafficking_and_internet_27-1"><a data-dcnode-id="9794" href="#cite_note-trafficking_and_internet-27"><span data-dcnode-id="9795" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9792" instrument_node=""> Sometimes, the victims will succumb to </span><a data-dcnode-id="9790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stockholm_syndrome" title="Stockholm syndrome"><span data-dcnode-id="9791" instrument_node="">Stockholm syndrome</span></a><span data-dcnode-id="9789" instrument_node=""> because their captors will profess to "love" and "need" them, even going so far as promise marriage and future stability. This is particularly effective with younger victims, because they are more inexperienced and therefore easily manipulated.</span><sup class="reference" data-dcnode-id="9786" id="cite_ref-30"><a data-dcnode-id="9787" href="#cite_note-30"><span data-dcnode-id="9788" instrument_node="">[30]</span></a></sup><span data-dcnode-id="9785" instrument_node="">
</span></p><p data-dcnode-id="9768"><span data-dcnode-id="9783" instrument_node="">In India, those who traffic young girls into prostitution are often women who have been trafficked themselves. As adults they use personal relationships and trust in their villages of origin to recruit additional girls.</span><sup class="reference" data-dcnode-id="9780" id="cite_ref-Maplecroft811_31-0"><a data-dcnode-id="9781" href="#cite_note-Maplecroft811-31"><span data-dcnode-id="9782" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9779" instrument_node=""> Also, some </span><a data-dcnode-id="9777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Migrant_sex_work" title="Migrant sex work"><span data-dcnode-id="9778" instrument_node="">migrating prostitutes</span></a><span data-dcnode-id="9776" instrument_node=""> can become victims of human trafficking because the women know they will be working as prostitutes; however, they are given an inaccurate description by their "boss" of the circumstances. Therefore, they consequently get exploited due to their misconception of what conditions to expect of their sex work in the new destination country.</span><sup class="reference" data-dcnode-id="9773" id="cite_ref-32"><a data-dcnode-id="9774" href="#cite_note-32"><span data-dcnode-id="9775" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="9770" id="cite_ref-33"><a data-dcnode-id="9771" href="#cite_note-33"><span data-dcnode-id="9772" instrument_node="">[33]</span></a></sup><span data-dcnode-id="9769" instrument_node="">
</span></p><span data-dcnode-id="9767" instrument_node="">
</span><h3 data-dcnode-id="9757"><span class="mw-headline" data-dcnode-id="9765" id="Gang-controlled_trafficking"><span data-dcnode-id="9766" instrument_node="">Gang-controlled trafficking</span></span><span class="mw-editsection" data-dcnode-id="9758"><span class="mw-editsection-bracket" data-dcnode-id="9763"><span data-dcnode-id="9764" instrument_node="">[</span></span><a data-dcnode-id="9761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D7" title="Edit section: Gang-controlled trafficking"><span data-dcnode-id="9762" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9759"><span data-dcnode-id="9760" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9756" instrument_node="">
</span><p data-dcnode-id="9739"><span data-dcnode-id="9755" instrument_node="">Gang-controlled sex trafficking and Pimp-controlled sex trafficking run their operations in very similar ways. The largest difference between the two is that gang-controlled trafficking is run by a large group of people whereas pimp-controlled trafficking is run by only one person.</span><sup class="reference" data-dcnode-id="9752" id="cite_ref-34"><a data-dcnode-id="9753" href="#cite_note-34"><span data-dcnode-id="9754" instrument_node="">[34]</span></a></sup><span data-dcnode-id="9751" instrument_node=""> In general, </span><a data-dcnode-id="9749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gang" title="Gang"><span data-dcnode-id="9750" instrument_node="">Gang</span></a><span data-dcnode-id="9748" instrument_node=""> members are expected or forced to participate in tasks that involve illegal and violent activity. Some of these criminal behaviors may include: distributing drugs, robbery, trafficking drugs, extortion, and murder.</span><sup class="reference" data-dcnode-id="9745" id="cite_ref-auto_35-0"><a data-dcnode-id="9746" href="#cite_note-auto-35"><span data-dcnode-id="9747" instrument_node="">[35]</span></a></sup><span data-dcnode-id="9744" instrument_node=""> One money making source that many people do not necessarily associate with gangs is human sex trafficking. Gangs are now turning to sex trafficking as it is seen as safer and more lucrative than drug trafficking.</span><sup class="reference" data-dcnode-id="9741" id="cite_ref-36"><a data-dcnode-id="9742" href="#cite_note-36"><span data-dcnode-id="9743" instrument_node="">[36]</span></a></sup><span data-dcnode-id="9740" instrument_node="">
</span></p><p data-dcnode-id="9718"><span data-dcnode-id="9738" instrument_node="">The gangs can make larger amounts of money quicker by selling other people's bodies, and are less likely to get caught.</span><sup class="reference" data-dcnode-id="9735" id="cite_ref-37"><a data-dcnode-id="9736" href="#cite_note-37"><span data-dcnode-id="9737" instrument_node="">[37]</span></a></sup><span data-dcnode-id="9734" instrument_node=""> In certain circumstances, gangs may team up with other gangs in the area, and work together as a sex ring. There are a number of different reasons that gangs make this decision. One reason is that it enables them to increase profits by trading different girls, women, boys or men. This gives their client, also known as a john, a greater variety of options to choose from. Clients are often willing to pay a larger price for a sexual experience with someone new. Another reason that gangs will share females is because this makes it more difficult for law enforcement to keep track of the victims, ultimately preventing them from making a positive identification.</span><sup class="reference" data-dcnode-id="9731" id="cite_ref-auto_35-1"><a data-dcnode-id="9732" href="#cite_note-auto-35"><span data-dcnode-id="9733" instrument_node="">[35]</span></a></sup><span data-dcnode-id="9730" instrument_node="">Like with other modus operandi, gang traffickers typically select and groom their victims by establishing trust. This can happen through giving gifts, praise and attention to create a psychological and emotional connection between the victim and trafficker. It's sometimes referred to as the Romeo Method.</span><sup class="reference" data-dcnode-id="9727" id="cite_ref-38"><a data-dcnode-id="9728" href="#cite_note-38"><span data-dcnode-id="9729" instrument_node="">[38]</span></a></sup><span data-dcnode-id="9726" instrument_node=""> It consists of different </span><a class="mw-redirect" data-dcnode-id="9724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_manipulation" title="Psychological manipulation"><span data-dcnode-id="9725" instrument_node="">manipulation</span></a><span data-dcnode-id="9723" instrument_node=""> techniques. A member will take her to a fancy restaurant, flounder her with lavish gifts, and take her to parties where they are provided with endless supplies of drugs and alcohol. They also learn their weaknesses at the same time, find his or her vulnerabilities and once they find that soft spot they can use it against them.</span><sup class="reference" data-dcnode-id="9720" id="cite_ref-39"><a data-dcnode-id="9721" href="#cite_note-39"><span data-dcnode-id="9722" instrument_node="">[39]</span></a></sup><span data-dcnode-id="9719" instrument_node="">
</span></p><p data-dcnode-id="9701"><span data-dcnode-id="9717" instrument_node="">Gang members often wear certain types of clothing or colors to prove their commitment or loyalty to the gang. It is also very common to represent your gang by branding your body with tattoos.</span><sup class="reference" data-dcnode-id="9714" id="cite_ref-Gang_-_Involved_Sex_Trafficking_40-0"><a data-dcnode-id="9715" href="#cite_note-Gang_-_Involved_Sex_Trafficking-40"><span data-dcnode-id="9716" instrument_node="">[40]</span></a></sup><span data-dcnode-id="9713" instrument_node=""> Unfortunately, many victims of sex trafficking are being branded as well. By forcing a tattoo onto their victims they are essentially marking their territory and officially displaying ownership of that person.</span><sup class="reference" data-dcnode-id="9710" id="cite_ref-41"><a data-dcnode-id="9711" href="#cite_note-41"><span data-dcnode-id="9712" instrument_node="">[41]</span></a></sup><span data-dcnode-id="9709" instrument_node=""> In the short film, Unbranded: Sex Trafficking Tattoo Removal, Vice Media dives deep into the recovery stages of a young girl who was trafficked for three years. During her time of being exploited, she was forced to receive a tattoo by her trafficker.</span><sup class="reference" data-dcnode-id="9706" id="cite_ref-42"><a data-dcnode-id="9707" href="#cite_note-42"><span data-dcnode-id="9708" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="9703" id="cite_ref-43"><a data-dcnode-id="9704" href="#cite_note-43"><span data-dcnode-id="9705" instrument_node="">[43]</span></a></sup><span data-dcnode-id="9702" instrument_node="">
</span></p><span data-dcnode-id="9700" instrument_node="">
</span><h3 data-dcnode-id="9690"><span class="mw-headline" data-dcnode-id="9698" id="Familial_trafficking"><span data-dcnode-id="9699" instrument_node="">Familial trafficking</span></span><span class="mw-editsection" data-dcnode-id="9691"><span class="mw-editsection-bracket" data-dcnode-id="9696"><span data-dcnode-id="9697" instrument_node="">[</span></span><a data-dcnode-id="9694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D8" title="Edit section: Familial trafficking"><span data-dcnode-id="9695" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9692"><span data-dcnode-id="9693" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9689" instrument_node="">
</span><p data-dcnode-id="9672"><span data-dcnode-id="9688" instrument_node="">In familial trafficking, the victim is controlled by family members who allow them to be sexually exploited in exchange for something of value, such as drugs or money.  This is most common in trafficking of minors (e.g. a mother may allow a boyfriend to abuse a child in exchange for housing). One study found that 60% of all child victims are related to their sex trafficker. </span><sup class="reference" data-dcnode-id="9685" id="cite_ref-44"><a data-dcnode-id="9686" href="#cite_note-44"><span data-dcnode-id="9687" instrument_node="">[44]</span></a></sup><span data-dcnode-id="9684" instrument_node=""> Another study reveals that familial trafficking is most commonly headed by the mother: she was the primary trafficker in 64.5% of the cases. The father was the trafficker in 32.3% of the cases, and another family member in the remaining 3.2%.</span><sup class="reference" data-dcnode-id="9681" id="cite_ref-45"><a data-dcnode-id="9682" href="#cite_note-45"><span data-dcnode-id="9683" instrument_node="">[45]</span></a></sup><span data-dcnode-id="9680" instrument_node=""> Familial trafficking may be difficult to detect because these children often have a larger degree of freedom and may still attend school and after-school functions.  These children may not understand that they are being trafficked or may not have a way out. Familial trafficking is considered by some to be the most prevalent form of human sex trafficking within the United States.</span><sup class="reference" data-dcnode-id="9677" id="cite_ref-rapidassessment_26-2"><a data-dcnode-id="9678" href="#cite_note-rapidassessment-26"><span data-dcnode-id="9679" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="9674" id="cite_ref-auto1_46-0"><a data-dcnode-id="9675" href="#cite_note-auto1-46"><span data-dcnode-id="9676" instrument_node="">[46]</span></a></sup><span data-dcnode-id="9673" instrument_node="">
</span></p><p data-dcnode-id="9660"><span data-dcnode-id="9671" instrument_node="">This form of trafficking is also extremely common outside of the United States. Many families from impoverished areas (India, Thailand, Philippines, etc.) find themselves in situations where debt or tradition calls for the selling of a loved one, most commonly female. In Thailand there is a tradition known as </span><i data-dcnode-id="9669"><span data-dcnode-id="9670" instrument_node="">bhun kun,</span></i><span data-dcnode-id="9668" instrument_node=""> which establishes the youngest daughter as financially responsible for her parents as they grow old. Author Kara Siddharth interviewed a Thai victim who stated that, though she hated the men she was with, "she was proud to fulfill her duty to her parents in the form of tiny payments that the brothel owner sent to her father after her trafficking debts were repaid". This is just one of the many countries whose lower class turn to this form of income. Many children are sold to repay debts, or merely to put food on the table for their family for a month.</span><sup class="reference" data-dcnode-id="9665" id="cite_ref-47"><a data-dcnode-id="9666" href="#cite_note-47"><span data-dcnode-id="9667" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="9662" id="cite_ref-48"><a data-dcnode-id="9663" href="#cite_note-48"><span data-dcnode-id="9664" instrument_node="">[48]</span></a></sup><span data-dcnode-id="9661" instrument_node="">
</span></p><span data-dcnode-id="9659" instrument_node="">
</span><h3 data-dcnode-id="9649"><span class="mw-headline" data-dcnode-id="9657" id="Cybersex_trafficking"><span data-dcnode-id="9658" instrument_node="">Cybersex trafficking</span></span><span class="mw-editsection" data-dcnode-id="9650"><span class="mw-editsection-bracket" data-dcnode-id="9655"><span data-dcnode-id="9656" instrument_node="">[</span></span><a data-dcnode-id="9653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D9" title="Edit section: Cybersex trafficking"><span data-dcnode-id="9654" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9651"><span data-dcnode-id="9652" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9648" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="9642" role="note"><span data-dcnode-id="9645" instrument_node="">Main article: </span><a data-dcnode-id="9643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cybersex_trafficking" title="Cybersex trafficking"><span data-dcnode-id="9644" instrument_node="">Cybersex trafficking</span></a></div><span data-dcnode-id="9641" instrument_node="">
</span><p data-dcnode-id="9596"><a data-dcnode-id="9639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cybersex_trafficking" title="Cybersex trafficking"><span data-dcnode-id="9640" instrument_node="">Cybersex trafficking</span></a><span data-dcnode-id="9638" instrument_node=""> involves trafficking and the </span><a class="mw-redirect" data-dcnode-id="9636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Live_streaming" title="Live streaming"><span data-dcnode-id="9637" instrument_node="">live streaming</span></a><span data-dcnode-id="9635" instrument_node=""> of coerced sexual acts and/or rape on webcam.</span><sup class="reference" data-dcnode-id="9632" id="cite_ref-autogenerated3_49-0"><a data-dcnode-id="9633" href="#cite_note-autogenerated3-49"><span data-dcnode-id="9634" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="9629" id="cite_ref-autogenerated2_50-0"><a data-dcnode-id="9630" href="#cite_note-autogenerated2-50"><span data-dcnode-id="9631" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="9626" id="cite_ref-51"><a data-dcnode-id="9627" href="#cite_note-51"><span data-dcnode-id="9628" instrument_node="">[51]</span></a></sup><span data-dcnode-id="9625" instrument_node=""> Victims are abducted, threatened, or deceived and transferred to 'cybersex dens.'</span><sup class="reference" data-dcnode-id="9622" id="cite_ref-52"><a data-dcnode-id="9623" href="#cite_note-52"><span data-dcnode-id="9624" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="9619" id="cite_ref-53"><a data-dcnode-id="9620" href="#cite_note-53"><span data-dcnode-id="9621" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="9616" id="cite_ref-54"><a data-dcnode-id="9617" href="#cite_note-54"><span data-dcnode-id="9618" instrument_node="">[54]</span></a></sup><span data-dcnode-id="9615" instrument_node=""> The dens can be in any location where the cybersex traffickers have a computer, tablet, or phone with internet connection.</span><sup class="reference" data-dcnode-id="9612" id="cite_ref-autogenerated2_50-1"><a data-dcnode-id="9613" href="#cite_note-autogenerated2-50"><span data-dcnode-id="9614" instrument_node="">[50]</span></a></sup><span data-dcnode-id="9611" instrument_node=""> Perpetrators use social media networks, </span><a class="mw-redirect" data-dcnode-id="9609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Videoconferences" title="Videoconferences"><span data-dcnode-id="9610" instrument_node="">videoconferences</span></a><span data-dcnode-id="9608" instrument_node="">, pornographic video sharing websites, dating pages, online chat rooms, apps, </span><a data-dcnode-id="9606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_web" title="Dark web"><span data-dcnode-id="9607" instrument_node="">dark web</span></a><span data-dcnode-id="9605" instrument_node=""> sites,</span><sup class="reference" data-dcnode-id="9602" id="cite_ref-autogenerated1_55-0"><a data-dcnode-id="9603" href="#cite_note-autogenerated1-55"><span data-dcnode-id="9604" instrument_node="">[55]</span></a></sup><span data-dcnode-id="9601" instrument_node=""> and other platforms.</span><sup class="reference" data-dcnode-id="9598" id="cite_ref-56"><a data-dcnode-id="9599" href="#cite_note-56"><span data-dcnode-id="9600" instrument_node="">[56]</span></a></sup><span data-dcnode-id="9597" instrument_node="">
</span></p><p data-dcnode-id="9557"><span data-dcnode-id="9595" instrument_node="">This type of sex trafficking has surged since the advent of the </span><a class="mw-redirect" data-dcnode-id="9593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_Age" title="Digital Age"><span data-dcnode-id="9594" instrument_node="">Digital Age</span></a><sup class="reference" data-dcnode-id="9590" id="cite_ref-autogenerated3_49-1"><a data-dcnode-id="9591" href="#cite_note-autogenerated3-49"><span data-dcnode-id="9592" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="9587" id="cite_ref-autogenerated2_50-2"><a data-dcnode-id="9588" href="#cite_note-autogenerated2-50"><span data-dcnode-id="9589" instrument_node="">[50]</span></a></sup><span data-dcnode-id="9586" instrument_node=""> and the development of </span><a class="mw-redirect" data-dcnode-id="9584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_payment" title="Online payment"><span data-dcnode-id="9585" instrument_node="">online payment</span></a><span data-dcnode-id="9583" instrument_node=""> systems</span><sup class="reference" data-dcnode-id="9580" id="cite_ref-autogenerated1_55-1"><a data-dcnode-id="9581" href="#cite_note-autogenerated1-55"><span data-dcnode-id="9582" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="9577" id="cite_ref-57"><a data-dcnode-id="9578" href="#cite_note-57"><span data-dcnode-id="9579" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="9574" id="cite_ref-58"><a data-dcnode-id="9575" href="#cite_note-58"><span data-dcnode-id="9576" instrument_node="">[58]</span></a></sup><span data-dcnode-id="9573" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cryptocurrencies" title="Cryptocurrencies"><span data-dcnode-id="9572" instrument_node="">cryptocurrencies</span></a><span data-dcnode-id="9570" instrument_node=""> that hide the transactors' identities.</span><sup class="reference" data-dcnode-id="9567" id="cite_ref-59"><a data-dcnode-id="9568" href="#cite_note-59"><span data-dcnode-id="9569" instrument_node="">[59]</span></a></sup><span data-dcnode-id="9566" instrument_node=""> Millions of reports of its occurrence are sent to authorities annually.</span><sup class="reference" data-dcnode-id="9563" id="cite_ref-60"><a data-dcnode-id="9564" href="#cite_note-60"><span data-dcnode-id="9565" instrument_node="">[60]</span></a></sup><span data-dcnode-id="9562" instrument_node=""> New laws and police procedures combating cybersex trafficking are needed in the twenty-first century.</span><sup class="reference" data-dcnode-id="9559" id="cite_ref-61"><a data-dcnode-id="9560" href="#cite_note-61"><span data-dcnode-id="9561" instrument_node="">[61]</span></a></sup><span data-dcnode-id="9558" instrument_node="">
</span></p><span data-dcnode-id="9556" instrument_node="">
</span><h3 data-dcnode-id="9546"><span class="mw-headline" data-dcnode-id="9554" id="Forced_marriage"><span data-dcnode-id="9555" instrument_node="">Forced marriage</span></span><span class="mw-editsection" data-dcnode-id="9547"><span class="mw-editsection-bracket" data-dcnode-id="9552"><span data-dcnode-id="9553" instrument_node="">[</span></span><a data-dcnode-id="9550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D10" title="Edit section: Forced marriage"><span data-dcnode-id="9551" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9548"><span data-dcnode-id="9549" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9545" instrument_node="">
</span><link data-dcnode-id="9544" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9540" role="note"><span data-dcnode-id="9543" instrument_node="">Main article: </span><a data-dcnode-id="9541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_marriage" title="Forced marriage"><span data-dcnode-id="9542" instrument_node="">Forced marriage</span></a></div><span data-dcnode-id="9539" instrument_node="">
</span><p data-dcnode-id="9516"><span data-dcnode-id="9538" instrument_node="">A forced marriage is a marriage where one or both participants are married without their freely given </span><a data-dcnode-id="9536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consent" title="Consent"><span data-dcnode-id="9537" instrument_node="">consent</span></a><span data-dcnode-id="9535" instrument_node="">.</span><sup class="reference" data-dcnode-id="9532" id="cite_ref-62"><a data-dcnode-id="9533" href="#cite_note-62"><span data-dcnode-id="9534" instrument_node="">[62]</span></a></sup><span data-dcnode-id="9531" instrument_node="">
</span><i data-dcnode-id="9529"><span data-dcnode-id="9530" instrument_node="">Servile marriage</span></i><span data-dcnode-id="9528" instrument_node=""> is defined as a marriage involving a person being sold, transferred or inherited into that marriage.</span><sup class="reference" data-dcnode-id="9525" id="cite_ref-63"><a data-dcnode-id="9526" href="#cite_note-63"><span data-dcnode-id="9527" instrument_node="">[63]</span></a></sup><span data-dcnode-id="9524" instrument_node=""> According to </span><a class="mw-redirect" data-dcnode-id="9522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ECPAT" title="ECPAT"><span data-dcnode-id="9523" instrument_node="">ECPAT</span></a><span data-dcnode-id="9521" instrument_node="">, "Child trafficking for forced marriage is simply another manifestation of trafficking and is not restricted to particular nationalities or countries".</span><sup class="reference" data-dcnode-id="9518" id="cite_ref-ecpat.org.uk_64-0"><a data-dcnode-id="9519" href="#cite_note-ecpat.org.uk-64"><span data-dcnode-id="9520" instrument_node="">[64]</span></a></sup><span data-dcnode-id="9517" instrument_node="">
</span></p><p data-dcnode-id="9504"><span data-dcnode-id="9515" instrument_node="">A forced marriage qualifies as a form of human trafficking in certain situations. If a woman is sent abroad, forced into the marriage and then repeatedly compelled to engage in sexual conduct with her new husband, then her experience is that of </span><i data-dcnode-id="9513"><span data-dcnode-id="9514" instrument_node="">sex trafficking</span></i><span data-dcnode-id="9512" instrument_node="">. If the bride is treated as a domestic servant by her new husband and/or his family, then this is a form of </span><i data-dcnode-id="9510"><span data-dcnode-id="9511" instrument_node="">labor trafficking</span></i><span data-dcnode-id="9509" instrument_node="">.</span><sup class="reference" data-dcnode-id="9506" id="cite_ref-65"><a data-dcnode-id="9507" href="#cite_note-65"><span data-dcnode-id="9508" instrument_node="">[65]</span></a></sup><span data-dcnode-id="9505" instrument_node="">
</span></p><p data-dcnode-id="9494"><span data-dcnode-id="9503" instrument_node="">Approximately 140 million girls under the age of 18, which is about 39,000 a day, will be forced into early marriages between 2011 and 2020.</span><sup class="reference" data-dcnode-id="9500" id="cite_ref-66"><a data-dcnode-id="9501" href="#cite_note-66"><span data-dcnode-id="9502" instrument_node="">[66]</span></a></sup><span data-dcnode-id="9499" instrument_node=""> Forced marriage, which is identified by the United Nations as a "contemporary form of slavery," occurs without full consent of the man or woman, and is associated with threats by family members or the bride/groom. Forced marriage occurs not only in foreign countries but in the US as well. The service providers in the United States cannot successfully respond to forced marriage cases because they lack clarity and a true definition of what a forced marriage is.</span><sup class="reference" data-dcnode-id="9496" id="cite_ref-auto1_46-1"><a data-dcnode-id="9497" href="#cite_note-auto1-46"><span data-dcnode-id="9498" instrument_node="">[46]</span></a></sup><span data-dcnode-id="9495" instrument_node="">
</span></p><span data-dcnode-id="9493" instrument_node="">
</span><h2 data-dcnode-id="9483"><span class="mw-headline" data-dcnode-id="9491" id="Causes"><span data-dcnode-id="9492" instrument_node="">Causes</span></span><span class="mw-editsection" data-dcnode-id="9484"><span class="mw-editsection-bracket" data-dcnode-id="9489"><span data-dcnode-id="9490" instrument_node="">[</span></span><a data-dcnode-id="9487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D11" title="Edit section: Causes"><span data-dcnode-id="9488" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9485"><span data-dcnode-id="9486" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9482" instrument_node="">
</span><p data-dcnode-id="9473"><span data-dcnode-id="9481" instrument_node="">There is not one simple factor that perpetuates sex trafficking, rather a complex, interconnected web of political, </span><a data-dcnode-id="9479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socioeconomics" title="Socioeconomics"><span data-dcnode-id="9480" instrument_node="">socioeconomic</span></a><span data-dcnode-id="9478" instrument_node="">, governmental, and societal factors.</span><sup class="reference" data-dcnode-id="9475" id="cite_ref-67"><a data-dcnode-id="9476" href="#cite_note-67"><span data-dcnode-id="9477" instrument_node="">[67]</span></a></sup><span data-dcnode-id="9474" instrument_node=""> The causes of sex trafficking which have been identified lie at the intersections of these factors. There are three types of causes which have been identified: gender hierarchies, migration for work (pull factors), and neoliberal globalization (push factors).
</span></p><p data-dcnode-id="9432"><span data-dcnode-id="9472" instrument_node="">Many scholars critique the power hierarchies based on gender, race, and class which underlie economic systems as perpetuators of women's vulnerability to sex trafficking. Copley argues that women in underdeveloped countries are powerless due to these hierarchies of power.</span><sup class="reference" data-dcnode-id="9469" id="cite_ref-68"><a data-dcnode-id="9470" href="#cite_note-68"><span data-dcnode-id="9471" instrument_node="">[68]</span></a></sup><span data-dcnode-id="9468" instrument_node=""> Matusek also argues this point, noting that </span><a data-dcnode-id="9466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="9467" instrument_node="">globalization</span></a><span data-dcnode-id="9465" instrument_node=""> spreads power hierarchies while spreading economic policy.</span><sup class="reference" data-dcnode-id="9462" id="cite_ref-:04_69-0"><a data-dcnode-id="9463" href="#cite_note-:04-69"><span data-dcnode-id="9464" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9461" instrument_node=""> Ideas of gender are thus perpetuated through globalization, leaving women vulnerable.</span><sup class="reference" data-dcnode-id="9458" id="cite_ref-:04_69-1"><a data-dcnode-id="9459" href="#cite_note-:04-69"><span data-dcnode-id="9460" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9457" instrument_node=""> Matusek cites masculinity as privileged with power and control in these hierarchies.</span><sup class="reference" data-dcnode-id="9454" id="cite_ref-:04_69-2"><a data-dcnode-id="9455" href="#cite_note-:04-69"><span data-dcnode-id="9456" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9453" instrument_node=""> Femininity, she notes, is associated with submissive and passive qualities.</span><sup class="reference" data-dcnode-id="9450" id="cite_ref-:04_69-3"><a data-dcnode-id="9451" href="#cite_note-:04-69"><span data-dcnode-id="9452" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9449" instrument_node=""> Femininity's lack of power leaves women to be used by men and consequently be seen as disposable.</span><sup class="reference" data-dcnode-id="9446" id="cite_ref-:04_69-4"><a data-dcnode-id="9447" href="#cite_note-:04-69"><span data-dcnode-id="9448" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9445" instrument_node=""> This view of women is perpetuated through the globalization of power hierarchies, which Matusek argues justifies and normalizes violence and power against women.</span><sup class="reference" data-dcnode-id="9442" id="cite_ref-:04_69-5"><a data-dcnode-id="9443" href="#cite_note-:04-69"><span data-dcnode-id="9444" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9441" instrument_node=""> This normalization of violence and power is a key player in the existence and continuation of sex trafficking.</span><sup class="reference" data-dcnode-id="9438" id="cite_ref-:04_69-6"><a data-dcnode-id="9439" href="#cite_note-:04-69"><span data-dcnode-id="9440" instrument_node="">[69]</span></a></sup><span data-dcnode-id="9437" instrument_node=""> Vesna Nikovic-Ristanovic also cites this normalization of violence and power as a cause of sex trafficking.</span><sup class="reference" data-dcnode-id="9434" id="cite_ref-:14_70-0"><a data-dcnode-id="9435" href="#cite_note-:14-70"><span data-dcnode-id="9436" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9433" instrument_node="">
</span></p><p data-dcnode-id="9399"><span data-dcnode-id="9431" instrument_node="">Nikovic-Ristanovic analyzes the role of perceived femininity in women's vulnerability to sex trafficking, by specifically looking at the links between militarism and female sexuality.</span><sup class="reference" data-dcnode-id="9428" id="cite_ref-:14_70-1"><a data-dcnode-id="9429" href="#cite_note-:14-70"><span data-dcnode-id="9430" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9427" instrument_node=""> Nikovic-Ristanovic cites a connection between war rapes and forced prostitution and sex trafficking.</span><sup class="reference" data-dcnode-id="9424" id="cite_ref-:14_70-2"><a data-dcnode-id="9425" href="#cite_note-:14-70"><span data-dcnode-id="9426" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9423" instrument_node=""> The way women's bodies are used in war relate to the normalization of violence and power against women.</span><sup class="reference" data-dcnode-id="9420" id="cite_ref-:14_70-3"><a data-dcnode-id="9421" href="#cite_note-:14-70"><span data-dcnode-id="9422" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9419" instrument_node=""> Nikovic-Ristanovic argues that military presence, even in times of peace, promote ideas of gender which render women vulnerable.</span><sup class="reference" data-dcnode-id="9416" id="cite_ref-:14_70-4"><a data-dcnode-id="9417" href="#cite_note-:14-70"><span data-dcnode-id="9418" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9415" instrument_node=""> These ideas concern </span><a data-dcnode-id="9413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegemonic_masculinity" title="Hegemonic masculinity"><span data-dcnode-id="9414" instrument_node="">hegemonic masculinity</span></a><span data-dcnode-id="9412" instrument_node="">, which Nikovic-Ristanovic defines as the hyper sexuality of men and the submissiveness or passivity of women and girls.</span><sup class="reference" data-dcnode-id="9409" id="cite_ref-:14_70-5"><a data-dcnode-id="9410" href="#cite_note-:14-70"><span data-dcnode-id="9411" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9408" instrument_node=""> Nikovic-Ristanovic notes that the global acceptance of this definition justifies exploitation and violence against women since women are viewed as sex objects for the fulfillment of male's sexual desire.</span><sup class="reference" data-dcnode-id="9405" id="cite_ref-:14_70-6"><a data-dcnode-id="9406" href="#cite_note-:14-70"><span data-dcnode-id="9407" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9404" instrument_node=""> This Western ideal of heteronormative sexuality, Nikovic-Ristanovic argues, is also perpetuated through media and advertisements, in which women are encouraged to appear sexually attractive for men.</span><sup class="reference" data-dcnode-id="9401" id="cite_ref-:14_70-7"><a data-dcnode-id="9402" href="#cite_note-:14-70"><span data-dcnode-id="9403" instrument_node="">[70]</span></a></sup><span data-dcnode-id="9400" instrument_node="">
</span></p><p data-dcnode-id="9381"><span data-dcnode-id="9398" instrument_node="">Kim Anh Duong argues that social narratives about women which arise from power hierarchies, coupled with women's economic realities, render women vulnerable to exploitation and sex trafficking.</span><sup class="reference" data-dcnode-id="9395" id="cite_ref-:23_71-0"><a data-dcnode-id="9396" href="#cite_note-:23-71"><span data-dcnode-id="9397" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9394" instrument_node=""> Duong identifies the prevailing narrative of women as the disadvantaged victim.</span><sup class="reference" data-dcnode-id="9391" id="cite_ref-:23_71-1"><a data-dcnode-id="9392" href="#cite_note-:23-71"><span data-dcnode-id="9393" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9390" instrument_node=""> She cites powerlessness as the result of this narrative, which is further perpetuated by social and economic realities which result from development process which leave women dependent on men.</span><sup class="reference" data-dcnode-id="9387" id="cite_ref-:23_71-2"><a data-dcnode-id="9388" href="#cite_note-:23-71"><span data-dcnode-id="9389" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9386" instrument_node=""> This overall powerlessness, according to Duong, makes women easy targets of exploitation and violence.</span><sup class="reference" data-dcnode-id="9383" id="cite_ref-:23_71-3"><a data-dcnode-id="9384" href="#cite_note-:23-71"><span data-dcnode-id="9385" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9382" instrument_node="">
</span></p><p data-dcnode-id="9359"><span data-dcnode-id="9380" instrument_node="">Susan Tiefenbrun, like Duong, notes women's lower status of power and consequential dependence on men.</span><sup class="reference" data-dcnode-id="9377" id="cite_ref-:7_72-0"><a data-dcnode-id="9378" href="#cite_note-:7-72"><span data-dcnode-id="9379" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9376" instrument_node=""> Tiefenbrun, unlike Duong, cites cultural norms as the cause of this vulnerability.</span><sup class="reference" data-dcnode-id="9373" id="cite_ref-:7_72-1"><a data-dcnode-id="9374" href="#cite_note-:7-72"><span data-dcnode-id="9375" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9372" instrument_node=""> She argues that cultural norms deprive women of access to and time for receiving an education or learning skills to improve employment opportunities.</span><sup class="reference" data-dcnode-id="9369" id="cite_ref-:7_72-2"><a data-dcnode-id="9370" href="#cite_note-:7-72"><span data-dcnode-id="9371" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9368" instrument_node=""> This lack of education and access to employment results in women's dependence on men.</span><sup class="reference" data-dcnode-id="9365" id="cite_ref-:7_72-3"><a data-dcnode-id="9366" href="#cite_note-:7-72"><span data-dcnode-id="9367" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9364" instrument_node=""> Tiefenbrun argues that women's dependence renders them more vulnerable to traffickers.</span><sup class="reference" data-dcnode-id="9361" id="cite_ref-:7_72-4"><a data-dcnode-id="9362" href="#cite_note-:7-72"><span data-dcnode-id="9363" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9360" instrument_node="">
</span></p><p data-dcnode-id="9326"><span data-dcnode-id="9358" instrument_node="">Another school of thought attributes women's migration for work in a context of strict immigration controls as the primary factor in women's vulnerability in becoming trafficked for sex. There has been an increase in women migrating within and across borders. Duong cites a demand for women migrant workers which encourages migration.</span><sup class="reference" data-dcnode-id="9355" id="cite_ref-:23_71-4"><a data-dcnode-id="9356" href="#cite_note-:23-71"><span data-dcnode-id="9357" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9354" instrument_node=""> The globalization of neoliberalism has shifted the global economy's focus to export production. Duong notes that there is a demand for women in export production because employers are able to pay them the lowest wages.</span><sup class="reference" data-dcnode-id="9351" id="cite_ref-:23_71-5"><a data-dcnode-id="9352" href="#cite_note-:23-71"><span data-dcnode-id="9353" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9350" instrument_node=""> Another reason for the demand of women workers is that there is a demand for care work.</span><sup class="reference" data-dcnode-id="9347" id="cite_ref-:23_71-6"><a data-dcnode-id="9348" href="#cite_note-:23-71"><span data-dcnode-id="9349" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9346" instrument_node=""> Since care work is gendered as women's work, Duong argues that women are encouraged to migrate to fill this demand.</span><sup class="reference" data-dcnode-id="9343" id="cite_ref-:23_71-7"><a data-dcnode-id="9344" href="#cite_note-:23-71"><span data-dcnode-id="9345" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9342" instrument_node=""> Janie Chuang is one scholar who notes the strict border controls which leave women who migrate for work in informal labor sectors, such as for care work, with little opportunity for legal migration.</span><sup class="reference" data-dcnode-id="9339" id="cite_ref-:32_73-0"><a data-dcnode-id="9340" href="#cite_note-:32-73"><span data-dcnode-id="9341" instrument_node="">[73]</span></a></sup><span data-dcnode-id="9338" instrument_node=""> Chuang notes that women are thus more vulnerable to being taken advantage of by sex traffickers who provide opportunities for illegal migration.</span><sup class="reference" data-dcnode-id="9335" id="cite_ref-:32_73-1"><a data-dcnode-id="9336" href="#cite_note-:32-73"><span data-dcnode-id="9337" instrument_node="">[73]</span></a></sup><span data-dcnode-id="9334" instrument_node=""> Strict immigration laws are also cited by Tiefenbrun as a key factor in individuals entering sex trafficking because women will agree to </span><a data-dcnode-id="9332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Debt_bondage" title="Debt bondage"><span data-dcnode-id="9333" instrument_node="">debt bondages</span></a><span data-dcnode-id="9331" instrument_node=""> and sex traffickers’ incentives to flee their social and economic realities.</span><sup class="reference" data-dcnode-id="9328" id="cite_ref-:7_72-5"><a data-dcnode-id="9329" href="#cite_note-:7-72"><span data-dcnode-id="9330" instrument_node="">[72]</span></a></sup><span data-dcnode-id="9327" instrument_node="">
</span></p><p data-dcnode-id="9306"><span data-dcnode-id="9325" instrument_node="">One cause for women's migration that is widely agreed upon by scholars is the economic pressure upon women due to </span><a data-dcnode-id="9323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="9324" instrument_node="">neoliberal</span></a><span data-dcnode-id="9322" instrument_node=""> globalization. Siddharth Kara argues that globalization and the spread of </span><a data-dcnode-id="9320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="9321" instrument_node="">Western Capitalism</span></a><span data-dcnode-id="9319" instrument_node=""> drive inequality and rural poverty, which are the material causes for sex trafficking.</span><sup class="reference" data-dcnode-id="9316" id="cite_ref-Inside_the_Business_of_Modern_Slavery_1-2"><a data-dcnode-id="9317" href="#cite_note-Inside_the_Business_of_Modern_Slavery-1"><span data-dcnode-id="9318" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9315" instrument_node=""> Dong-Hoon Seol points out unequal development between countries as an effect of the globalization of neoliberalism.</span><sup class="reference" data-dcnode-id="9312" id="cite_ref-:43_74-0"><a data-dcnode-id="9313" href="#cite_note-:43-74"><span data-dcnode-id="9314" instrument_node="">[74]</span></a></sup><span data-dcnode-id="9311" instrument_node=""> He argues that the growing disparity of wealth between developed and underdeveloped countries leads to migration of women from underdeveloped countries.</span><sup class="reference" data-dcnode-id="9308" id="cite_ref-:43_74-1"><a data-dcnode-id="9309" href="#cite_note-:43-74"><span data-dcnode-id="9310" instrument_node="">[74]</span></a></sup><span data-dcnode-id="9307" instrument_node="">
</span></p><p data-dcnode-id="9267"><span data-dcnode-id="9305" instrument_node="">Duong cites </span><a data-dcnode-id="9303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structural_adjustment" title="Structural adjustment"><span data-dcnode-id="9304" instrument_node="">Structural adjustment</span></a><span data-dcnode-id="9302" instrument_node=""> programs (SAPs), an aspect of development policies in the globalization of neoliberalism, as a cause for women's poverty, unemployment, and low wages which promote migration.</span><sup class="reference" data-dcnode-id="9299" id="cite_ref-:23_71-8"><a data-dcnode-id="9300" href="#cite_note-:23-71"><span data-dcnode-id="9301" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9298" instrument_node=""> SAPs affect men and women differently, she argues, because men and women experience poverty differently.</span><sup class="reference" data-dcnode-id="9295" id="cite_ref-:23_71-9"><a data-dcnode-id="9296" href="#cite_note-:23-71"><span data-dcnode-id="9297" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9294" instrument_node=""> This is known as the </span><a data-dcnode-id="9292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feminization_of_poverty" title="Feminization of poverty"><span data-dcnode-id="9293" instrument_node="">feminization of poverty</span></a><span data-dcnode-id="9291" instrument_node="">.</span><sup class="reference" data-dcnode-id="9288" id="cite_ref-:23_71-10"><a data-dcnode-id="9289" href="#cite_note-:23-71"><span data-dcnode-id="9290" instrument_node="">[71]</span></a></sup><span data-dcnode-id="9287" instrument_node=""> Much of women's time is spent doing unpaid labor such as housework and </span><a data-dcnode-id="9285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Care_work" title="Care work"><span data-dcnode-id="9286
