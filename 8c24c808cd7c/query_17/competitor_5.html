</span><div class="thumb tright" data-dcnode-id="8487"><div class="thumbinner" data-dcnode-id="8488" style="width:222px;"><a class="image" data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APower_and_control_wheel.jpg"><img alt="" class="thumbimage" data-dcnode-id="8495" data-file-height="465" data-file-width="480" decoding="async" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Power_and_control_wheel.jpg/220px-Power_and_control_wheel.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Power_and_control_wheel.jpg/330px-Power_and_control_wheel.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Power_and_control_wheel.jpg/440px-Power_and_control_wheel.jpg 2x" width="220"></a><span data-dcnode-id="8493" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8489"><div class="magnify" data-dcnode-id="8491"><a class="internal" data-dcnode-id="8492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APower_and_control_wheel.jpg" title="Enlarge"></a></div><span data-dcnode-id="8490" instrument_node="">Abbreviated version of the Power and Control Wheel</span></div></div></div><span data-dcnode-id="8486" instrument_node="">
</span><p data-dcnode-id="8477"><span data-dcnode-id="8485" instrument_node="">Another mechanism used to understand control is the BITE Model created by </span><a data-dcnode-id="8483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steven_Hassan" title="Steven Hassan"><span data-dcnode-id="8484" instrument_node="">Steven Hassan</span></a><span data-dcnode-id="8482" instrument_node="">. The BITE Model describes four categories of coercion used on sex trafficking victims: behavior control, information control, thought control, and emotional control.</span><sup class="reference" data-dcnode-id="8479" id="cite_ref-135"><a data-dcnode-id="8480" href="#cite_note-135"><span data-dcnode-id="8481" instrument_node="">[135]</span></a></sup><span data-dcnode-id="8478" instrument_node=""> He says that it is essential to understand the loss of identity victims experience to help them get out or recover from sex trafficking.
</span></p><span data-dcnode-id="8476" instrument_node="">
</span><h2 data-dcnode-id="8466"><span class="mw-headline" data-dcnode-id="8474" id="Anti-sex_trafficking_efforts"><span data-dcnode-id="8475" instrument_node="">Anti-sex trafficking efforts</span></span><span class="mw-editsection" data-dcnode-id="8467"><span class="mw-editsection-bracket" data-dcnode-id="8472"><span data-dcnode-id="8473" instrument_node="">[</span></span><a data-dcnode-id="8470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D26" title="Edit section: Anti-sex trafficking efforts"><span data-dcnode-id="8471" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8468"><span data-dcnode-id="8469" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8465" instrument_node="">
</span><h3 data-dcnode-id="8455"><span class="mw-headline" data-dcnode-id="8463" id="History_of_international_legislation"><span data-dcnode-id="8464" instrument_node="">History of international legislation</span></span><span class="mw-editsection" data-dcnode-id="8456"><span class="mw-editsection-bracket" data-dcnode-id="8461"><span data-dcnode-id="8462" instrument_node="">[</span></span><a data-dcnode-id="8459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D27" title="Edit section: History of international legislation"><span data-dcnode-id="8460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8454" instrument_node="">
</span><p data-dcnode-id="8409"><span data-dcnode-id="8453" instrument_node="">International pressure to address trafficking in women and children became a growing part of the social </span><a data-dcnode-id="8451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_movement" title="Reform movement"><span data-dcnode-id="8452" instrument_node="">Reform movement</span></a><span data-dcnode-id="8450" instrument_node=""> in the United States and Europe during the late nineteenth century. International legislation against the trafficking of women and children began with the conclusion of an international convention in 1901</span><sup class="noprint Inline-Template" data-dcnode-id="8443" style="white-space:nowrap;"><span data-dcnode-id="8449" instrument_node="">[</span><i data-dcnode-id="8445"><a class="mw-redirect" data-dcnode-id="8446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="8447" title="The material near this tag possibly uses too vague attribution or weasel words. (February 2022)"><span data-dcnode-id="8448" instrument_node="">which?</span></span></a></i><span data-dcnode-id="8444" instrument_node="">]</span></sup><span data-dcnode-id="8442" instrument_node="">, and the </span><a data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Agreement_for_the_suppression_of_the_White_Slave_Traffic" title="International Agreement for the suppression of the White Slave Traffic"><span data-dcnode-id="8441" instrument_node="">International Agreement for the suppression of the White Slave Traffic</span></a><span data-dcnode-id="8439" instrument_node=""> in 1904. (The latter was revised in 1910.) The first formal international research into the issue was funded by American philanthropist </span><a data-dcnode-id="8437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_D._Rockefeller" title="John D. Rockefeller"><span data-dcnode-id="8438" instrument_node="">John D. Rockefeller</span></a><span data-dcnode-id="8436" instrument_node="">, through the American Bureau of Social Hygiene. The </span><a data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="8435" instrument_node="">League of Nations</span></a><span data-dcnode-id="8433" instrument_node="">, formed in 1919, took over as the international coordinator of legislation intended to end the trafficking of women and children. An international Conference on White Slave Traffic was held in 1921, attended by the 34 countries that ratified the 1901 and 1904 conventions.</span><sup class="reference" data-dcnode-id="8430" id="cite_ref-Berkovitch_136-0"><a data-dcnode-id="8431" href="#cite_note-Berkovitch-136"><span data-dcnode-id="8432" instrument_node="">[136]</span></a></sup><span data-dcnode-id="8429" instrument_node=""> Another convention against trafficking</span><sup class="noprint Inline-Template" data-dcnode-id="8422" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="8428" instrument_node="">[</span><i data-dcnode-id="8424"><a data-dcnode-id="8425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="8426" title="The text near this tag may need clarification or removal of jargon. (February 2022)"><span data-dcnode-id="8427" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="8423" instrument_node="">]</span></sup><span data-dcnode-id="8421" instrument_node=""> was ratified by League members in 1922, and like the 1904 international convention, this one required ratifying countries to submit annual reports on their progress in tackling the problem. Compliance with this requirement was not complete, although it gradually improved: in 1924, approximately 34 percent of the member countries submitted reports as required: this rose to 46 percent in 1929, 52 percent in 1933, and 61 percent in 1934.</span><sup class="reference" data-dcnode-id="8418" id="cite_ref-137"><a data-dcnode-id="8419" href="#cite_note-137"><span data-dcnode-id="8420" instrument_node="">[137]</span></a></sup><span data-dcnode-id="8417" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="8415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1921_International_Convention_for_the_Suppression_of_the_Traffic_in_Women_and_Children" title="1921 International Convention for the Suppression of the Traffic in Women and Children"><span data-dcnode-id="8416" instrument_node="">1921 International Convention for the Suppression of the Traffic in Women and Children</span></a><span data-dcnode-id="8414" instrument_node=""> was sponsored by the League of Nations. In 1923, a committee from the bureau was tasked with investigating trafficking in 28 countries, interviewing approximately 5,000 informants and analyzing information over two years before issuing its final report. This was the first formal report on trafficking in women and children to be issued by an official body.</span><sup class="reference" data-dcnode-id="8411" id="cite_ref-Berkovitch_136-1"><a data-dcnode-id="8412" href="#cite_note-Berkovitch-136"><span data-dcnode-id="8413" instrument_node="">[136]</span></a></sup><span data-dcnode-id="8410" instrument_node="">
</span></p><p data-dcnode-id="8403"><span data-dcnode-id="8408" instrument_node="">Efforts to combat sex trafficking are often linked to efforts against prostitution; however, this is often problematic in regards to legal recourse of sex trafficking victims. While prostitutes are nominally working by choice, sex trafficking victims do so under duress. Recognizing this, many states have passed legislation that allows sex trafficking victims amnesty under prostitution laws, however many fail to do so due to legal illiteracy and institutional prejudices.</span><sup class="reference" data-dcnode-id="8405" id="cite_ref-138"><a data-dcnode-id="8406" href="#cite_note-138"><span data-dcnode-id="8407" instrument_node="">[138]</span></a></sup><span data-dcnode-id="8404" instrument_node=""> As such, sex trafficking victims often risk legal persecution when alerting authorities to their situation.
</span></p><p data-dcnode-id="8392"><a data-dcnode-id="8401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane_Addams" title="Jane Addams"><span data-dcnode-id="8402" instrument_node="">Jane Addams</span></a><span data-dcnode-id="8400" instrument_node=""> was one of the most notable reformers during the Progressive Era, and refined the still early concepts of white slavery and sex work in her book </span><i data-dcnode-id="8398"><span data-dcnode-id="8399" instrument_node="">A New Conscience and an Ancient Evil</span></i><span data-dcnode-id="8397" instrument_node="">. She, among others, fought to classify all people coerced into prostitution as victims of sexual slavery, and believed that all sex work was sexual exploitation of women by more powerful men. Addams also believed that abolishing white slavery would bring more women into the suffrage movement. Alex Smolak, a physician, has studied many of the health risks faced by women in white slavery during the Progressive era. She says in her article titled "White Slavery, Whorehouse Riots, Venereal Disease, and Saving Women..."</span><sup class="reference" data-dcnode-id="8394" id="cite_ref-139"><a data-dcnode-id="8395" href="#cite_note-139"><span data-dcnode-id="8396" instrument_node="">[139]</span></a></sup><span data-dcnode-id="8393" instrument_node=""> that "The Progressive Era was a time when society was rapidly changing, with influences stemming from urbanization, industrialization, commercialization, immigration, and civilizing morality, all interacting with one another to fuel both prostitution and the anti-prostitution movement." Along with "The U.S. White Slave act of 1910", the "International Agreement for the Suppression of the White Slave Trade" was ratified by 13 nations, including the United States in 1904. Throughout the next 45 years the International Convention for the Suppression of the Traffic in Women and Children was adopted by the League of Nations and the term white slavery was replaced by trafficking, the word used commonly today.
</span></p><span data-dcnode-id="8391" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8382"><div class="thumbinner" data-dcnode-id="8383" style="width:172px;"><a class="image" data-dcnode-id="8389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A60000girls.png"><img alt="" class="thumbimage" data-dcnode-id="8390" data-file-height="500" data-file-width="347" decoding="async" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/60000girls.png/170px-60000girls.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/60000girls.png/255px-60000girls.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8f/60000girls.png/340px-60000girls.png 2x" width="170"></a><span data-dcnode-id="8388" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8384"><div class="magnify" data-dcnode-id="8386"><a class="internal" data-dcnode-id="8387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A60000girls.png" title="Enlarge"></a></div><span data-dcnode-id="8385" instrument_node="">Wanted 60,000 girls to take the place of 60,000 white slaves who will die this year</span></div></div></div><span data-dcnode-id="8381" instrument_node="">
</span><h3 data-dcnode-id="8371"><span class="mw-headline" data-dcnode-id="8379" id="United_Nations"><span data-dcnode-id="8380" instrument_node="">United Nations</span></span><span class="mw-editsection" data-dcnode-id="8372"><span class="mw-editsection-bracket" data-dcnode-id="8377"><span data-dcnode-id="8378" instrument_node="">[</span></span><a data-dcnode-id="8375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D28" title="Edit section: United Nations"><span data-dcnode-id="8376" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8373"><span data-dcnode-id="8374" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8370" instrument_node="">
</span><link data-dcnode-id="8369" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8365" role="note"><span data-dcnode-id="8368" instrument_node="">Main article: </span><a data-dcnode-id="8366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Global_Initiative_to_Fight_Human_Trafficking" title="United Nations Global Initiative to Fight Human Trafficking"><span data-dcnode-id="8367" instrument_node="">United Nations Global Initiative to Fight Human Trafficking</span></a></div><span data-dcnode-id="8364" instrument_node="">
</span><p data-dcnode-id="8352"><span data-dcnode-id="8363" instrument_node="">The first international protocol dealing with sex slavery was the 1949 UN </span><a data-dcnode-id="8361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_for_the_Suppression_of_the_Traffic_in_Persons_and_of_the_Exploitation_of_the_Prostitution_of_Others" title="Convention for the Suppression of the Traffic in Persons and of the Exploitation of the Prostitution of Others"><span data-dcnode-id="8362" instrument_node="">Convention for the Suppression of the Traffic in Persons and Exploitation of Prostitution of Others</span></a><span data-dcnode-id="8360" instrument_node="">.</span><sup class="reference" data-dcnode-id="8357" id="cite_ref-140"><a data-dcnode-id="8358" href="#cite_note-140"><span data-dcnode-id="8359" instrument_node="">[140]</span></a></sup><span data-dcnode-id="8356" instrument_node=""> This convention followed the abolitionist idea of sex trafficking as incompatible with the dignity and worth of the human person. Serving as a model for future legislation, the 1949 UN Convention was not ratified by every country, but came into force in 1951.  These early efforts led to the 2000 Convention against Transnational Organized Crime, mentioned </span><a data-dcnode-id="8354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking%23Overview_and_differentiation" title="Human trafficking"><span data-dcnode-id="8355" instrument_node="">above</span></a><span data-dcnode-id="8353" instrument_node="">. These instruments contain the elements of the current international law on trafficking in humans.
</span></p><p data-dcnode-id="8346"><span data-dcnode-id="8351" instrument_node="">In 2011, the United Nations reported that girl victims made up two-thirds of all trafficked children.  Girls constituted 15 to 20 percent of the total number of all detected victims, whereas boys comprised about 10 percent. The UN report was based on official data supplied by 132 countries.</span><sup class="reference" data-dcnode-id="8348" id="cite_ref-141"><a data-dcnode-id="8349" href="#cite_note-141"><span data-dcnode-id="8350" instrument_node="">[141]</span></a></sup><span data-dcnode-id="8347" instrument_node="">
</span></p><p data-dcnode-id="8336"><span data-dcnode-id="8345" instrument_node="">In 2013, a resolution to create the World Day Against Trafficking in Persons was adopted by the United Nations.</span><sup class="reference" data-dcnode-id="8342" id="cite_ref-autogenerated4_142-0"><a data-dcnode-id="8343" href="#cite_note-autogenerated4-142"><span data-dcnode-id="8344" instrument_node="">[142]</span></a></sup><span data-dcnode-id="8341" instrument_node=""> The first World Day against Trafficking in Persons took place 30 July 2014, and the day is now observed every 30 July.</span><sup class="reference" data-dcnode-id="8338" id="cite_ref-autogenerated4_142-1"><a data-dcnode-id="8339" href="#cite_note-autogenerated4-142"><span data-dcnode-id="8340" instrument_node="">[142]</span></a></sup><span data-dcnode-id="8337" instrument_node="">
</span></p><p data-dcnode-id="8331"><span data-dcnode-id="8335" instrument_node="">Current international treaties include the </span><a class="mw-redirect" data-dcnode-id="8333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_Consent_to_Marriage%2C_Minimum_Age_for_Marriage%2C_and_Registration_of_Marriages" title="Convention on Consent to Marriage, Minimum Age for Marriage, and Registration of Marriages"><span data-dcnode-id="8334" instrument_node="">Convention on Consent to Marriage, Minimum Age for Marriage, and Registration of Marriages</span></a><span data-dcnode-id="8332" instrument_node="">, entered into force in 1964.
</span></p><span data-dcnode-id="8330" instrument_node="">
</span><h3 data-dcnode-id="8320"><span class="mw-headline" data-dcnode-id="8328" id="In_the_United_States"><span data-dcnode-id="8329" instrument_node="">In the United States</span></span><span class="mw-editsection" data-dcnode-id="8321"><span class="mw-editsection-bracket" data-dcnode-id="8326"><span data-dcnode-id="8327" instrument_node="">[</span></span><a data-dcnode-id="8324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D29" title="Edit section: In the United States"><span data-dcnode-id="8325" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8322"><span data-dcnode-id="8323" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8319" instrument_node="">
</span><link data-dcnode-id="8318" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8311" role="note"><span data-dcnode-id="8317" instrument_node="">See also: </span><a data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_trafficking_in_the_United_States" title="Sex trafficking in the United States"><span data-dcnode-id="8316" instrument_node="">Sex trafficking in the United States</span></a><span data-dcnode-id="8314" instrument_node=""> and </span><a data-dcnode-id="8312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commercial_sexual_exploitation_of_children%23United_States" title="Commercial sexual exploitation of children"><span data-dcnode-id="8313" instrument_node="">Commercial sexual exploitation of children §&nbsp;United States</span></a></div><span data-dcnode-id="8310" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8301"><div class="thumbinner" data-dcnode-id="8302" style="width:222px;"><a class="image" data-dcnode-id="8308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8309" data-file-height="614" data-file-width="1280" decoding="async" height="106" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Stopping_Sex_Trafficking_in_the_United_States_%252810445204615%2529.jpg/220px-Stopping_Sex_Trafficking_in_the_United_States_%252810445204615%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Stopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg/330px-Stopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Stopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg/440px-Stopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg 2x" width="220"></a><span data-dcnode-id="8307" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8303"><div class="magnify" data-dcnode-id="8305"><a class="internal" data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStopping_Sex_Trafficking_in_the_United_States_%2810445204615%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="8304" instrument_node="">Louise Slaughter testified at a Ways &amp; Means Human Resources Subcommittee hearing on 23 October 2013. She testified in strong support of a bill she co-sponsored with Rep. Erik Paulsen (R-MN) that addressed the high rate of children in foster care being recruited into sex trafficking within the United States.</span></div></div></div><span data-dcnode-id="8300" instrument_node="">
</span><p data-dcnode-id="8258"><span data-dcnode-id="8299" instrument_node="">In 1910, the U.S. Congress passed the </span><a data-dcnode-id="8297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mann_Act" title="Mann Act"><span data-dcnode-id="8298" instrument_node="">White Slave Traffic Act of 1910</span></a><span data-dcnode-id="8296" instrument_node=""> (better known as the Mann Act), which made it a </span><a data-dcnode-id="8294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony" title="Felony"><span data-dcnode-id="8295" instrument_node="">felony</span></a><span data-dcnode-id="8293" instrument_node=""> to transport women across state borders for the purpose of "prostitution or debauchery, or for any other immoral purpose". Its primary stated intent was to address prostitution, immorality, and human trafficking particularly where it was trafficking for the purposes of prostitution, but the ambiguity of "immorality" effectively criminalized </span><a data-dcnode-id="8291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interracial_marriage" title="Interracial marriage"><span data-dcnode-id="8292" instrument_node="">interracial marriage</span></a><span data-dcnode-id="8290" instrument_node=""> and banned single women from crossing state borders for morally wrong acts. In 1914, of the women arrested for crossing state borders under this act, 70 percent were charged with voluntary prostitution. Once the idea of a sex slave shifted from a white woman to an enslaved woman from countries in poverty, the US began passing immigration acts to curtail aliens from entering the country to address this issue. (The government had other unrelated motives for the new immigration policies.) Several acts such as the </span><a data-dcnode-id="8288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_Quota_Act" title="Emergency Quota Act"><span data-dcnode-id="8289" instrument_node="">Emergency Quota Act</span></a><span data-dcnode-id="8287" instrument_node=""> of 1921 and </span><a data-dcnode-id="8285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_Act_of_1924" title="Immigration Act of 1924"><span data-dcnode-id="8286" instrument_node="">Immigration Act of 1924</span></a><span data-dcnode-id="8284" instrument_node=""> reduced the number of emigrants from Europe and Asia from entering the United States. Following the increased restrictions of the 1920s (which were significantly relaxed by the </span><a data-dcnode-id="8282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_and_Nationality_Act_of_1952" title="Immigration and Nationality Act of 1952"><span data-dcnode-id="8283" instrument_node="">Immigration and Nationality Act of 1952</span></a><span data-dcnode-id="8281" instrument_node=""> and </span><a data-dcnode-id="8279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_and_Nationality_Act_of_1965" title="Immigration and Nationality Act of 1965"><span data-dcnode-id="8280" instrument_node="">Immigration and Nationality Act of 1965</span></a><span data-dcnode-id="8278" instrument_node="">), human trafficking was not considered a major issue until the 1990s.</span><sup class="reference" data-dcnode-id="8275" id="cite_ref-candidate_143-0"><a data-dcnode-id="8276" href="#cite_note-candidate-143"><span data-dcnode-id="8277" instrument_node="">[143]</span></a></sup><sup class="reference" data-dcnode-id="8272" id="cite_ref-donovan_144-0"><a data-dcnode-id="8273" href="#cite_note-donovan-144"><span data-dcnode-id="8274" instrument_node="">[144]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="8260" style="white-space:nowrap;"><span data-dcnode-id="8271" instrument_node="">[</span><i data-dcnode-id="8262"><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAccuracy_dispute%23Disputed_statement" title="Wikipedia:Accuracy dispute"><span data-dcnode-id="8269" title="The material near this tag is possibly inaccurate or nonfactual. (January 2018)"><span data-dcnode-id="8270" instrument_node="">dubious</span></span></a><span data-dcnode-id="8267" instrument_node=""> </span><span class="metadata" data-dcnode-id="8263"><span data-dcnode-id="8266" instrument_node=""> – </span><a data-dcnode-id="8264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3ASex_trafficking%23Dubious" title="Talk:Sex trafficking"><span data-dcnode-id="8265" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="8261" instrument_node="">]</span></sup><span data-dcnode-id="8259" instrument_node="">
</span></p><p data-dcnode-id="8238"><span data-dcnode-id="8257" instrument_node="">The Commercial Sex Act</span><sup class="reference" data-dcnode-id="8254" id="cite_ref-145"><a data-dcnode-id="8255" href="#cite_note-145"><span data-dcnode-id="8256" instrument_node="">[145]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="8247" style="white-space:nowrap;"><span data-dcnode-id="8253" instrument_node="">[</span><i data-dcnode-id="8249"><a data-dcnode-id="8250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="8251" title="The time period mentioned near this tag is ambiguous. (February 2022)"><span data-dcnode-id="8252" instrument_node="">when?</span></span></a></i><span data-dcnode-id="8248" instrument_node="">]</span></sup><span data-dcnode-id="8246" instrument_node=""> makes it illegal to recruit, entice, obtain, provide, move or harbor a person or to benefit from such activities knowing that the person will be caused to engage in commercial sex acts where the person is under 18 or where force, fraud or coercion exists.</span><sup class="reference" data-dcnode-id="8243" id="cite_ref-146"><a data-dcnode-id="8244" href="#cite_note-146"><span data-dcnode-id="8245" instrument_node="">[146]</span></a></sup><sup class="reference" data-dcnode-id="8240" id="cite_ref-147"><a data-dcnode-id="8241" href="#cite_note-147"><span data-dcnode-id="8242" instrument_node="">[147]</span></a></sup><span data-dcnode-id="8239" instrument_node="">
</span></p><p data-dcnode-id="8147"><span data-dcnode-id="8237" instrument_node="">Towards the end of President Clinton's administration,Congress passed the </span><a data-dcnode-id="8235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victims_of_Trafficking_and_Violence_Protection_Act_of_2000" title="Victims of Trafficking and Violence Protection Act of 2000"><span data-dcnode-id="8236" instrument_node="">Victims of Trafficking and Violence Protection Act of 2000</span></a><span data-dcnode-id="8234" instrument_node=""> (TVPA), intended to fight human trafficking globally.</span><sup class="reference" data-dcnode-id="8231" id="cite_ref-:20_16-1"><a data-dcnode-id="8232" href="#cite_note-:20-16"><span data-dcnode-id="8233" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8230" instrument_node=""> Under the </span><a data-dcnode-id="8228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="8229" instrument_node="">George W. Bush</span></a><span data-dcnode-id="8227" instrument_node=""> Administration, fighting sex trafficking within the scope of TVPA became a priority, framing human trafficking and sex trafficking as modern-day slavery.</span><sup class="reference" data-dcnode-id="8224" id="cite_ref-:20_16-2"><a data-dcnode-id="8225" href="#cite_note-:20-16"><span data-dcnode-id="8226" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8223" instrument_node=""> The TVPA intends to strengthen services to victims of human trafficking and sex trafficking, increase law enforcement's ability to prosecute traffickers by incentivizing survivors to cooperate in the prosecution, increase education about human trafficking, and train law enforcement to identify human trafficking.</span><sup class="reference" data-dcnode-id="8220" id="cite_ref-Tiefenbrun_7-2"><a data-dcnode-id="8221" href="#cite_note-Tiefenbrun-7"><span data-dcnode-id="8222" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="8217" id="cite_ref-:10_18-3"><a data-dcnode-id="8218" href="#cite_note-:10-18"><span data-dcnode-id="8219" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8214" id="cite_ref-:11_21-1"><a data-dcnode-id="8215" href="#cite_note-:11-21"><span data-dcnode-id="8216" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8213" instrument_node=""> TVPA also has a mandate to collect funds for the treatment of sex trafficking victims that provided them with shelter, food, education, and financial grants. Internationally, the TVPA set standards for other countries to follow to receive aid from the U.S. to fight human trafficking.</span><sup class="reference" data-dcnode-id="8210" id="cite_ref-:20_16-3"><a data-dcnode-id="8211" href="#cite_note-:20-16"><span data-dcnode-id="8212" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8209" instrument_node=""> TVPA also establishes two stipulations an applicant can meet to receive the benefits of a </span><a data-dcnode-id="8207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T_visa" title="T visa"><span data-dcnode-id="8208" instrument_node="">T-Visa</span></a><span data-dcnode-id="8206" instrument_node="">. First, a trafficked victim must prove to being trafficked and second must submit to prosecution of his or her trafficker. While providing incentives for survivors of trafficking to assist in the prosecution process,</span><sup class="reference" data-dcnode-id="8203" id="cite_ref-:20_16-4"><a data-dcnode-id="8204" href="#cite_note-:20-16"><span data-dcnode-id="8205" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8202" instrument_node=""> some scholars see these incentives as invalidating as they force the burden of proof to fall on the victim.</span><sup class="reference" data-dcnode-id="8199" id="cite_ref-:11_21-2"><a data-dcnode-id="8200" href="#cite_note-:11-21"><span data-dcnode-id="8201" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8198" instrument_node=""> An example of an alternative can be found in Connecticut, where there are safe harbor laws for minor victims of sex trafficking. These laws provide immunity to the survivors and shifts the burden of proof away from the individual.</span><sup class="reference" data-dcnode-id="8195" id="cite_ref-:11_21-3"><a data-dcnode-id="8196" href="#cite_note-:11-21"><span data-dcnode-id="8197" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8194" instrument_node=""> In general, incentivizing survivor cooperation in the prosecution process can be helpful considering the emotional manipulation and perceived romantic attachment that often stop survivors from accusing their traffickers or seeking help.</span><sup class="reference" data-dcnode-id="8191" id="cite_ref-:10_18-4"><a data-dcnode-id="8192" href="#cite_note-:10-18"><span data-dcnode-id="8193" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8188" id="cite_ref-:11_21-4"><a data-dcnode-id="8189" href="#cite_note-:11-21"><span data-dcnode-id="8190" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="8185" id="cite_ref-:18_19-1"><a data-dcnode-id="8186" href="#cite_note-:18-19"><span data-dcnode-id="8187" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8184" instrument_node=""> After TPVA's initial implementation, several agencies and task forces were created. The Act has also undergone multiple revisions and authorizations. In February 2000, the Department of Justice established a Trafficking in Persons and Worker Exploitation Task Force hotline that increased the number of trafficking cases that were opened and investigated.</span><sup class="reference" data-dcnode-id="8181" id="cite_ref-:20_16-5"><a data-dcnode-id="8182" href="#cite_note-:20-16"><span data-dcnode-id="8183" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8180" instrument_node=""> In 2001, the Office to Monitor and Combat Trafficking in Persons was established.</span><sup class="reference" data-dcnode-id="8177" id="cite_ref-:20_16-6"><a data-dcnode-id="8178" href="#cite_note-:20-16"><span data-dcnode-id="8179" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8176" instrument_node=""> In both 2001 and 2003, new criminal statues were added to TVPA to make it easier to prosecute traffickers.</span><sup class="reference" data-dcnode-id="8173" id="cite_ref-:20_16-7"><a data-dcnode-id="8174" href="#cite_note-:20-16"><span data-dcnode-id="8175" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8172" instrument_node=""> In 2003, TPVA was amended to provide access to civil remedies to trafficking cases to reduce a survivor's reliance on the criminal justice system.</span><sup class="reference" data-dcnode-id="8169" id="cite_ref-:20_16-8"><a data-dcnode-id="8170" href="#cite_note-:20-16"><span data-dcnode-id="8171" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8168" instrument_node=""> The Act was reauthorized in 2003, 2005, 2008, and 2013.</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-:10_18-5"><a data-dcnode-id="8166" href="#cite_note-:10-18"><span data-dcnode-id="8167" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8162" id="cite_ref-:20_16-9"><a data-dcnode-id="8163" href="#cite_note-:20-16"><span data-dcnode-id="8164" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8161" instrument_node=""> The State Department publishes an annual Trafficking in Persons Report (TIP Reports), which examines the progress that the U.S. and other countries have made in destroying human trafficking businesses, arresting the traffickers, and supporting the victims.</span><sup class="reference" data-dcnode-id="8158" id="cite_ref-:20_16-10"><a data-dcnode-id="8159" href="#cite_note-:20-16"><span data-dcnode-id="8160" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="8155" id="cite_ref-148"><a data-dcnode-id="8156" href="#cite_note-148"><span data-dcnode-id="8157" instrument_node="">[148]</span></a></sup><sup class="reference" data-dcnode-id="8152" id="cite_ref-149"><a data-dcnode-id="8153" href="#cite_note-149"><span data-dcnode-id="8154" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="8149" id="cite_ref-Horning,_A._2014_150-0"><a data-dcnode-id="8150" href="#cite_note-Horning,_A._2014-150"><span data-dcnode-id="8151" instrument_node="">[150]</span></a></sup><span data-dcnode-id="8148" instrument_node="">
</span></p><p data-dcnode-id="8121"><span data-dcnode-id="8146" instrument_node="">On the state level, sex trafficking legislation varies in terms of definitions and approaches.</span><sup class="reference" data-dcnode-id="8143" id="cite_ref-:11_21-5"><a data-dcnode-id="8144" href="#cite_note-:11-21"><span data-dcnode-id="8145" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8142" instrument_node=""> California sex trafficking legislation offers legal protection for women so they can make choices outside the criminal justice system and pursue civil remedies.</span><sup class="reference" data-dcnode-id="8139" id="cite_ref-:8_22-1"><a data-dcnode-id="8140" href="#cite_note-:8-22"><span data-dcnode-id="8141" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8138" instrument_node=""> California legislation also offers case worker privileges in sex trafficking cases.</span><sup class="reference" data-dcnode-id="8135" id="cite_ref-:8_22-2"><a data-dcnode-id="8136" href="#cite_note-:8-22"><span data-dcnode-id="8137" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8134" instrument_node=""> In Connecticut, in addition to safe harbor laws for minor victims of sex trafficking, there is also an emphasis on educating employees in the hotel industry to identify sex trafficking.</span><sup class="reference" data-dcnode-id="8131" id="cite_ref-:11_21-6"><a data-dcnode-id="8132" href="#cite_note-:11-21"><span data-dcnode-id="8133" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8130" instrument_node=""> The logic is that since trafficking activities often happen in hotels, employees need to be able to identify and report these occurrences. There are also arguments that the hotel industry needs to be offered incentives to report sex trafficking since they benefit financially from having guests in their hotels.</span><sup class="reference" data-dcnode-id="8127" id="cite_ref-:11_21-7"><a data-dcnode-id="8128" href="#cite_note-:11-21"><span data-dcnode-id="8129" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8126" instrument_node=""> Another provision in Connecticut's sex trafficking legislation is increased punishment for purchasers of sex.</span><sup class="reference" data-dcnode-id="8123" id="cite_ref-:11_21-8"><a data-dcnode-id="8124" href="#cite_note-:11-21"><span data-dcnode-id="8125" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8122" instrument_node="">
</span></p><p data-dcnode-id="8112"><span data-dcnode-id="8120" instrument_node="">In July 2019, the </span><a data-dcnode-id="8118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Bureau_of_Investigation" title="Federal Bureau of Investigation"><span data-dcnode-id="8119" instrument_node="">Federal Bureau of Investigation</span></a><span data-dcnode-id="8117" instrument_node=""> (FBI) conducted a month-long operation to detect and detain sex traffickers and recover child victims. More than 100 sex trafficking victims were successfully rescued across the United States, under the initiative called "Operation Independence Day". Besides, a total of 67 suspected traffickers were arrested.</span><sup class="reference" data-dcnode-id="8114" id="cite_ref-151"><a data-dcnode-id="8115" href="#cite_note-151"><span data-dcnode-id="8116" instrument_node="">[151]</span></a></sup><span data-dcnode-id="8113" instrument_node="">
</span></p><span data-dcnode-id="8111" instrument_node="">
</span><h3 data-dcnode-id="8101"><span class="mw-headline" data-dcnode-id="8109" id="Council_of_Europe"><span data-dcnode-id="8110" instrument_node="">Council of Europe</span></span><span class="mw-editsection" data-dcnode-id="8102"><span class="mw-editsection-bracket" data-dcnode-id="8107"><span data-dcnode-id="8108" instrument_node="">[</span></span><a data-dcnode-id="8105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D30" title="Edit section: Council of Europe"><span data-dcnode-id="8106" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8103"><span data-dcnode-id="8104" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8100" instrument_node="">
</span><p data-dcnode-id="8069"><span data-dcnode-id="8099" instrument_node="">Complementary protection is ensured through the </span><a data-dcnode-id="8097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Europe" title="Council of Europe"><span data-dcnode-id="8098" instrument_node="">Council of Europe</span></a><span data-dcnode-id="8096" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Protection_of_Children_against_Sexual_Exploitation_and_Sexual_Abuse" title="Convention on the Protection of Children against Sexual Exploitation and Sexual Abuse"><span data-dcnode-id="8095" instrument_node="">Convention on the Protection of Children against Sexual Exploitation and Sexual Abuse</span></a><span data-dcnode-id="8093" instrument_node=""> (signed in </span><a data-dcnode-id="8091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lanzarote" title="Lanzarote"><span data-dcnode-id="8092" instrument_node="">Lanzarote</span></a><span data-dcnode-id="8090" instrument_node="">, 25 October 2007). The Convention entered into force on 1 July 2010.</span><sup class="reference" data-dcnode-id="8087" id="cite_ref-152"><a data-dcnode-id="8088" href="#cite_note-152"><span data-dcnode-id="8089" instrument_node="">[152]</span></a></sup><span data-dcnode-id="8086" instrument_node=""> As of November 2020, the Convention has been ratified by 47 states, with Ireland having signed but not yet ratified.</span><sup class="reference" data-dcnode-id="8083" id="cite_ref-153"><a data-dcnode-id="8084" href="#cite_note-153"><span data-dcnode-id="8085" instrument_node="">[153]</span></a></sup><span data-dcnode-id="8082" instrument_node=""> The goal of the Convention is to provide the framework for an independent and effective monitoring system that holds the member states accountable for addressing human trafficking and providing protecting to victims.</span><sup class="reference" data-dcnode-id="8079" id="cite_ref-CoE_Convention_154-0"><a data-dcnode-id="8080" href="#cite_note-CoE_Convention-154"><span data-dcnode-id="8081" instrument_node="">[154]</span></a></sup><span data-dcnode-id="8078" instrument_node=""> To monitor the implementation of this act, the Council of Europe established the Group of Experts on Action against Trafficking in Human Beings (GRETA).</span><sup class="reference" data-dcnode-id="8075" id="cite_ref-Council_of_Europe_155-0"><a data-dcnode-id="8076" href="#cite_note-Council_of_Europe-155"><span data-dcnode-id="8077" instrument_node="">[155]</span></a></sup><span data-dcnode-id="8074" instrument_node=""> The Convention address the structure and purpose of GRETA and holds the group accountable to publish reports evaluating the measures taken by the states who have signed the Convention.</span><sup class="reference" data-dcnode-id="8071" id="cite_ref-Council_of_Europe_155-1"><a data-dcnode-id="8072" href="#cite_note-Council_of_Europe-155"><span data-dcnode-id="8073" instrument_node="">[155]</span></a></sup><span data-dcnode-id="8070" instrument_node="">
</span></p><span data-dcnode-id="8068" instrument_node="">
</span><h3 data-dcnode-id="8058"><span class="mw-headline" data-dcnode-id="8066" id="Other_government_actions"><span data-dcnode-id="8067" instrument_node="">Other government actions</span></span><span class="mw-editsection" data-dcnode-id="8059"><span class="mw-editsection-bracket" data-dcnode-id="8064"><span data-dcnode-id="8065" instrument_node="">[</span></span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D31" title="Edit section: Other government actions"><span data-dcnode-id="8063" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8060"><span data-dcnode-id="8061" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8057" instrument_node="">
</span><p data-dcnode-id="8051"><span data-dcnode-id="8056" instrument_node="">Actions taken to combat human trafficking vary from government to government.</span><sup class="reference" data-dcnode-id="8053" id="cite_ref-156"><a data-dcnode-id="8054" href="#cite_note-156"><span data-dcnode-id="8055" instrument_node="">[156]</span></a></sup><span data-dcnode-id="8052" instrument_node=""> Some government actions include:
</span></p><span data-dcnode-id="8050" instrument_node="">
</span><ul data-dcnode-id="8038"><li data-dcnode-id="8048"><span data-dcnode-id="8049" instrument_node="">introducing legislation specifically aimed at criminalizing human trafficking;</span></li><span data-dcnode-id="8047" instrument_node="">
</span><li data-dcnode-id="8042"><span data-dcnode-id="8046" instrument_node="">developing co-operation between law enforcement agencies and </span><a data-dcnode-id="8044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-governmental_organization" title="Non-governmental organization"><span data-dcnode-id="8045" instrument_node="">non-government organizations</span></a><span data-dcnode-id="8043" instrument_node=""> (NGOs) of numerous nations; and</span></li><span data-dcnode-id="8041" instrument_node="">
</span><li data-dcnode-id="8039"><span data-dcnode-id="8040" instrument_node="">raising awareness of the issue.</span></li></ul><span data-dcnode-id="8037" instrument_node="">
</span><p data-dcnode-id="8031"><span data-dcnode-id="8036" instrument_node="">Raising awareness can take three forms. First, governments can raise awareness among potential victims, particularly in countries where human traffickers are active. Second, they can raise awareness amongst the police, social welfare workers and immigration officers to equip them to deal appropriately with the problem. And finally, in countries where prostitution is legal or semi-legal, they can raise awareness amongst the clients of prostitution so that they can watch for signs of human trafficking victims. Methods to raise general awareness often include television programs, documentary films, internet communications, and posters.</span><sup class="reference" data-dcnode-id="8033" id="cite_ref-157"><a data-dcnode-id="8034" href="#cite_note-157"><span data-dcnode-id="8035" instrument_node="">[157]</span></a></sup><span data-dcnode-id="8032" instrument_node="">
</span></p><span data-dcnode-id="8030" instrument_node="">
</span><h3 data-dcnode-id="8020"><span class="mw-headline" data-dcnode-id="8028" id="Criticism_of_Prevention_and_Intervention_Efforts"><span data-dcnode-id="8029" instrument_node="">Criticism of Prevention and Intervention Efforts</span></span><span class="mw-editsection" data-dcnode-id="8021"><span class="mw-editsection-bracket" data-dcnode-id="8026"><span data-dcnode-id="8027" instrument_node="">[</span></span><a data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D32" title="Edit section: Criticism of Prevention and Intervention Efforts"><span data-dcnode-id="8025" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8022"><span data-dcnode-id="8023" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8019" instrument_node="">
</span><link data-dcnode-id="8018" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8014" role="note"><span data-dcnode-id="8017" instrument_node="">Main article: </span><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking%23Criticism" title="Human trafficking"><span data-dcnode-id="8016" instrument_node="">human trafficking §&nbsp;Criticism</span></a></div><span data-dcnode-id="8013" instrument_node="">
</span><p data-dcnode-id="7991"><span data-dcnode-id="8012" instrument_node="">Many countries have come under criticism for inaction, or ineffective action. Criticisms include the failure of governments to properly identify and protect trafficking victims, enactment of immigration policies which potentially </span><a class="mw-redirect" data-dcnode-id="8010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Re-victimize" title="Re-victimize"><span data-dcnode-id="8011" instrument_node="">re-victimize</span></a><span data-dcnode-id="8009" instrument_node=""> trafficking victims, including by deporting them, and insufficient action in helping prevent vulnerable populations from becoming trafficking victims.</span><sup class="reference" data-dcnode-id="8006" id="cite_ref-158"><a data-dcnode-id="8007" href="#cite_note-158"><span data-dcnode-id="8008" instrument_node="">[158]</span></a></sup><sup class="reference" data-dcnode-id="8003" id="cite_ref-159"><a data-dcnode-id="8004" href="#cite_note-159"><span data-dcnode-id="8005" instrument_node="">[159]</span></a></sup><span data-dcnode-id="8002" instrument_node=""> A particular criticism has been the reluctance of some countries to tackle trafficking for purposes other than sex.</span><sup class="reference" data-dcnode-id="7999" id="cite_ref-ReferenceB_160-0"><a data-dcnode-id="8000" href="#cite_note-ReferenceB-160"><span data-dcnode-id="8001" instrument_node="">[160]</span></a></sup><sup class="reference" data-dcnode-id="7996" id="cite_ref-161"><a data-dcnode-id="7997" href="#cite_note-161"><span data-dcnode-id="7998" instrument_node="">[161]</span></a></sup><sup class="reference" data-dcnode-id="7993" id="cite_ref-162"><a data-dcnode-id="7994" href="#cite_note-162"><span data-dcnode-id="7995" instrument_node="">[162]</span></a></sup><span data-dcnode-id="7992" instrument_node="">
</span></p><p data-dcnode-id="7970"><span data-dcnode-id="7990" instrument_node="">Studies of sex work and anti-sex trafficking efforts, intended to combat sex trafficking or provide support to victims, have raised concerns over the unintended effects of certain national and international policies, law enforcement strategies, and activist efforts on both sex-trafficked individuals and non-trafficked sex workers. For example, The United States' Tier 2 assessment of Japan on its 2004 TIP Report</span><sup class="reference" data-dcnode-id="7987" id="cite_ref-163"><a data-dcnode-id="7988" href="#cite_note-163"><span data-dcnode-id="7989" instrument_node="">[163]</span></a></sup><span data-dcnode-id="7986" instrument_node=""> encouraged the Japanese government to add additional constraints to its procedures and policies for obtaining an entertainer visa, sometimes used by migrant workers seeking employment at businesses within the sex industry.</span><sup class="reference" data-dcnode-id="7983" id="cite_ref-Salazar._2011_164-0"><a data-dcnode-id="7984" href="#cite_note-Salazar._2011-164"><span data-dcnode-id="7985" instrument_node="">[164]</span></a></sup><span data-dcnode-id="7982" instrument_node=""> However, these regulations provided opportunities for some third-party facilitators of these visas to exploit migrants while also limiting migrants' ability to leave employers with poor working conditions or overly restrictive practices, such as holding their passports or limiting their ability to leave the premises of the business.</span><sup class="reference" data-dcnode-id="7979" id="cite_ref-:42_165-0"><a data-dcnode-id="7980" href="#cite_note-:42-165"><span data-dcnode-id="7981" instrument_node="">[165]</span></a></sup><sup class="reference" data-dcnode-id="7976" id="cite_ref-Salazar._2011_164-1"><a data-dcnode-id="7977" href="#cite_note-Salazar._2011-164"><span data-dcnode-id="7978" instrument_node="">[164]</span></a></sup><span data-dcnode-id="7975" instrument_node=""> Practices of law enforcement officers in some countries have also been criticized for incentivizing non-trafficked sex workers to declare themselves to be trafficking victims and enter aid and rehabilitation programs to avoid prison sentences for prostitution charges.</span><sup class="reference" data-dcnode-id="7972" id="cite_ref-:3_166-0"><a data-dcnode-id="7973" href="#cite_note-:3-166"><span data-dcnode-id="7974" instrument_node="">[166]</span></a></sup><span data-dcnode-id="7971" instrument_node="">
</span></p><span data-dcnode-id="7969" instrument_node="">
</span><h3 data-dcnode-id="7958"><span data-dcnode-id="7968" id="Non-governmental_organizations_.28NGOs.29"></span><span class="mw-headline" data-dcnode-id="7966" id="Non-governmental_organizations_(NGOs)"><span data-dcnode-id="7967" instrument_node="">Non-governmental organizations (NGOs)</span></span><span class="mw-editsection" data-dcnode-id="7959"><span class="mw-editsection-bracket" data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node="">[</span></span><a data-dcnode-id="7962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D33" title="Edit section: Non-governmental organizations (NGOs)"><span data-dcnode-id="7963" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7957" instrument_node="">
</span><p data-dcnode-id="7941"><span data-dcnode-id="7956" instrument_node="">Many </span><a data-dcnode-id="7954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-governmental_organization" title="Non-governmental organization"><span data-dcnode-id="7955" instrument_node="">NGOs</span></a><span data-dcnode-id="7953" instrument_node=""> work on the issue of sex trafficking. One major NGO is the </span><a data-dcnode-id="7951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Justice_Mission" title="International Justice Mission"><span data-dcnode-id="7952" instrument_node="">International Justice Mission</span></a><span data-dcnode-id="7950" instrument_node=""> (IJM). IJM is a U.S.-based non-profit human rights organization that combats human trafficking in developing countries in Latin America, Asia, and Africa. IJM states that it is a "human rights agency that brings rescue to victims of slavery, sexual exploitation, and other forms of violent oppression." It is a faith-based organization since its purported goal is to "restore to victims of oppression the things that God intends for them: their lives, their liberty, their dignity, the fruits of their labor."</span><sup class="reference" data-dcnode-id="7947" id="cite_ref-ahmed_167-0"><a data-dcnode-id="7948" href="#cite_note-ahmed-167"><span data-dcnode-id="7949" instrument_node="">[167]</span></a></sup><span data-dcnode-id="7946" instrument_node=""> The IJM receives over $900,000 from the US government.</span><sup class="reference" data-dcnode-id="7943" id="cite_ref-168"><a data-dcnode-id="7944" href="#cite_note-168"><span data-dcnode-id="7945" instrument_node="">[168]</span></a></sup><span data-dcnode-id="7942" instrument_node=""> The organization has two methods for rescuing victims: brothel raids in cooperation with local police, and "buy bust" operations in which undercover agencies pretend to purchase sex services from an underage girl. After the raid and rescue, the women are sent to rehabilitation programs run by NGOs (such as churches) or the government.
</span></p><p data-dcnode-id="7936"><span data-dcnode-id="7940" instrument_node="">There are also survivor-led organizations that provide services to victims of exploitation and trafficking including Treasures, founded by </span><a data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harmony_Dust" title="Harmony Dust"><span data-dcnode-id="7939" instrument_node="">Harmony (Dust) Grillo</span></a><span data-dcnode-id="7937" instrument_node=""> in 2003 and GEMS founded by Rachel Lloyd in 1998.
</span></p><p data-dcnode-id="7920"><span data-dcnode-id="7935" instrument_node="">There are also national </span><a class="mw-redirect" data-dcnode-id="7933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-governmental_organizations" title="Non-governmental organizations"><span data-dcnode-id="7934" instrument_node="">non-governmental organizations</span></a><span data-dcnode-id="7932" instrument_node=""> working on the issue of human trafficking, including sex trafficking. In Kenya, for example, </span><a data-dcnode-id="7930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Awareness_Against_Human_Trafficking_%28HAART%29" title="Awareness Against Human Trafficking (HAART)"><span data-dcnode-id="7931" instrument_node="">Awareness Against Human Trafficking (HAART)</span></a><span data-dcnode-id="7929" instrument_node=""> works on ending all human trafficking in the country.</span><sup class="reference" data-dcnode-id="7926" id="cite_ref-169"><a data-dcnode-id="7927" href="#cite_note-169"><span data-dcnode-id="7928" instrument_node="">[169]</span></a></sup><span data-dcnode-id="7925" instrument_node=""> HAART has also participated in the UNANIMA International Stop the Demand campaign.</span><sup class="reference" data-dcnode-id="7922" id="cite_ref-170"><a data-dcnode-id="7923" href="#cite_note-170"><span data-dcnode-id="7924" instrument_node="">[170]</span></a></sup><span data-dcnode-id="7921" instrument_node="">
</span></p><p data-dcnode-id="7914"><span data-dcnode-id="7919" instrument_node="">In India, J. Walter Thompson Amsterdam has opened a school called School for Justice. Here, survivors of sex trafficking are educated to become lawyers. The entire program is expected to take five to six years for each girl to complete. The women will graduate with law degrees, with a special focus on commercial sexual exploitation cases. JWT hopes that one day they may become prosecutors, or even judges, empowered to combat the criminals who once exploited and abused them.</span><sup class="reference" data-dcnode-id="7916" id="cite_ref-171"><a data-dcnode-id="7917" href="#cite_note-171"><span data-dcnode-id="7918" instrument_node="">[171]</span></a></sup><span data-dcnode-id="7915" instrument_node="">
</span></p><p data-dcnode-id="7902"><span data-dcnode-id="7913" instrument_node="">NGOs often have the best of intentions when combating sex-trafficking. NGOs are often funded by the West and are implemented in countries that have a very different culture. Research shows that employees of the Western NGOs are slow to adapt to the culture of the community they are providing services to. This often leads to a disconnect between the NGO and the community. Employees of NGOs hold the responsibility of relaying the narrative of sex-trafficked people. This can create a hierarchical structure that makes the voice of Western NGOs as more legitimate than the voice of the people they are serving. Thus, reinforcing the essentialized notion of third-world women as backwards and other.</span><sup class="reference" data-dcnode-id="7910" id="cite_ref-ReferenceB_160-1"><a data-dcnode-id="7911" href="#cite_note-ReferenceB-160"><span data-dcnode-id="7912" instrument_node="">[160]</span></a></sup><sup class="reference" data-dcnode-id="7907" id="cite_ref-:5_172-0"><a data-dcnode-id="7908" href="#cite_note-:5-172"><span data-dcnode-id="7909" instrument_node="">[172]</span></a></sup><sup class="reference" data-dcnode-id="7904" id="cite_ref-173"><a data-dcnode-id="7905" href="#cite_note-173"><span data-dcnode-id="7906" instrument_node="">[173]</span></a></sup><span data-dcnode-id="7903" instrument_node="">
</span></p><p data-dcnode-id="7896"><span data-dcnode-id="7901" instrument_node="">Japan is a popular place for sex-trafficking. Japan has a long history with the trade of women for sex. For a good part of the countries history, sex work was legal in Japan. This makes it difficult for the government to decipher between legal sex work and illegal prostitution. This is where NGOs step in to assist the government. NGOs provide services in countries where the government policies are failing to combat a specific issue. However, in Japan it is difficult for NGOs focused on issues with women to receive local funding. This weak political support makes the work for NGOs in Japan much more difficult. Japan's lack of support for women's rights shows why the role of NGOs is so important in that country.</span><sup class="reference" data-dcnode-id="7898" id="cite_ref-174"><a data-dcnode-id="7899" href="#cite_note-174"><span data-dcnode-id="7900" instrument_node="">[174]</span></a></sup><span data-dcnode-id="7897" instrument_node="">
</span></p><span data-dcnode-id="7895" instrument_node="">
</span><h3 data-dcnode-id="7885"><span class="mw-headline" data-dcnode-id="7893" id="Campaigns_and_initiatives"><span data-dcnode-id="7894" instrument_node="">Campaigns and initiatives</span></span><span class="mw-editsection" data-dcnode-id="7886"><span class="mw-editsection-bracket" data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">[</span></span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D34" title="Edit section: Campaigns and initiatives"><span data-dcnode-id="7890" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7884" instrument_node="">
</span><p data-dcnode-id="7875"><span data-dcnode-id="7883" instrument_node="">Public information campaigns are defined as a&nbsp;"government-directed and sponsored effort to communicate to the public or a segment of the public in order to achieve a policy result".</span><sup class="reference" data-dcnode-id="7880" id="cite_ref-:5_172-1"><a data-dcnode-id="7881" href="#cite_note-:5-172"><span data-dcnode-id="7882" instrument_node="">[172]</span></a></sup><sup class="reference" data-dcnode-id="7877" id="cite_ref-175"><a data-dcnode-id="7878" href="#cite_note-175"><span data-dcnode-id="7879" instrument_node="">[175]</span></a></sup><span data-dcnode-id="7876" instrument_node="">
</span></p><p data-dcnode-id="7869"><span data-dcnode-id="7874" instrument_node="">In the past ten years, Spain has seen a surge of sex trafficking. In light of this crisis, social movements, organizations and government institutions have enacted policies like the Second National Plan against Sex Trafficking and Anti-Trafficking laws. Campaigns to fight against sex trafficking in Spain between 2008 and 2017 have been examined by researchers. Their research showed that many campaigns focus on the narrative of the victim as vulnerable and weak, rather than focusing on the actual crime of sex trafficking and the economic system that allows it to flourish. According to the research these narratives disempower sex trafficked people through repeated language of vulnerability and innocence. The researchers explain that the lack of information provided in these campaigns hinders their success. Campaigns will throw out huge numbers of women exploited into sex work but gives no context to the system that allows sex trafficking to flourish.</span><sup class="reference" data-dcnode-id="7871" id="cite_ref-:6_176-0"><a data-dcnode-id="7872" href="#cite_note-:6-176"><span data-dcnode-id="7873" instrument_node="">[176]</span></a></sup><span data-dcnode-id="7870" instrument_node="">
</span></p><p data-dcnode-id="7832"><span data-dcnode-id="7868" instrument_node="">In 1994, </span><a data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Alliance_Against_Traffic_in_Women" title="Global Alliance Against Traffic in Women"><span data-dcnode-id="7867" instrument_node="">Global Alliance Against Traffic in Women</span></a><span data-dcnode-id="7865" instrument_node=""> was established to combat trafficking in women on any grounds. It is an alliance of more than 100 non-governmental organizations from Africa, Asia, Europe, Latin America, the Caribbean and North America.</span><sup class="reference" data-dcnode-id="7862" id="cite_ref-177"><a data-dcnode-id="7863" href="#cite_note-177"><span data-dcnode-id="7864" instrument_node="">[177]</span></a></sup><span data-dcnode-id="7861" instrument_node=""> </span><a data-dcnode-id="7859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thorn_%28organization%29" title="Thorn (organization)"><span data-dcnode-id="7860" instrument_node="">The Demi and Ashton (DNA) Foundation</span></a><span data-dcnode-id="7858" instrument_node=""> was created by celebrity </span><a class="mw-redirect" data-dcnode-id="7856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humanitarians" title="Humanitarians"><span data-dcnode-id="7857" instrument_node="">humanitarians</span></a><span data-dcnode-id="7855" instrument_node=""> </span><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demi_Moore" title="Demi Moore"><span data-dcnode-id="7854" instrument_node="">Demi Moore</span></a><span data-dcnode-id="7852" instrument_node=""> and </span><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ashton_Kutcher" title="Ashton Kutcher"><span data-dcnode-id="7851" instrument_node="">Ashton Kutcher</span></a><span data-dcnode-id="7849" instrument_node=""> in 2009 in their efforts to fight human trafficking (specifically focusing on sex trafficking of children) in the U.S. In September 2010, the pair announced the launch of their "Real Men Don't Buy Girls" campaign to combat child sex trafficking alongside other Hollywood stars and technology companies such as </span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft" title="Microsoft"><span data-dcnode-id="7848" instrument_node="">Microsoft</span></a><span data-dcnode-id="7846" instrument_node="">, Twitter, and Facebook. "Real Men Don't Buy Girls" is based on the idea that high-profile men speaking out against child sex trafficking can help reduce the demand for young girls in the commercial sex trade. The popular TV channel </span><a data-dcnode-id="7844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MTV" title="MTV"><span data-dcnode-id="7845" instrument_node="">MTV</span></a><span data-dcnode-id="7843" instrument_node=""> started a campaign to combat sex trafficking. The initiative called </span><a data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MTV_EXIT" title="MTV EXIT"><span data-dcnode-id="7842" instrument_node="">MTV EXIT</span></a><span data-dcnode-id="7840" instrument_node=""> (End Exploitation and Trafficking) is a multimedia initiative produced by MTV EXIT Foundation (formerly known as the MTV Europe Foundation) to raise awareness and increase prevention of human trafficking.</span><sup class="reference" data-dcnode-id="7837" id="cite_ref-178"><a data-dcnode-id="7838" href="#cite_note-178"><span data-dcnode-id="7839" instrument_node="">[178]</span></a></sup><sup class="reference" data-dcnode-id="7834" id="cite_ref-179"><a data-dcnode-id="7835" href="#cite_note-179"><span data-dcnode-id="7836" instrument_node="">[179]</span></a></sup><span data-dcnode-id="7833" instrument_node="">
</span></p><p data-dcnode-id="7800"><span data-dcnode-id="7831" instrument_node="">Another campaign is the </span><a class="mw-redirect" data-dcnode-id="7829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A21_Campaign" title="A21 Campaign"><span data-dcnode-id="7830" instrument_node="">A21 Campaign</span></a><span data-dcnode-id="7828" instrument_node="">, Abolishing Injustice in the 21st Century, which focuses on addressing human trafficking through a holistic approach.</span><sup class="reference" data-dcnode-id="7825" id="cite_ref-:0_180-0"><a data-dcnode-id="7826" href="#cite_note-:0-180"><span data-dcnode-id="7827" instrument_node="">[180]</span></a></sup><span data-dcnode-id="7824" instrument_node=""> They provide potential victims with the education and valuable information on how to best reduce their likelihood of being trafficked through strategies that reduce their vulnerability. The organization also provides safe environments for victims and runs restoration programs in their aftercare facilities.</span><sup class="reference" data-dcnode-id="7821" id="cite_ref-:0_180-1"><a data-dcnode-id="7822" href="#cite_note-:0-180"><span data-dcnode-id="7823" instrument_node="">[180]</span></a></sup><span data-dcnode-id="7820" instrument_node=""> In addition, they provide legal council and representation to victims so they can prosecute their traffickers. Another key component of the campaign is to help influence legislation to enact more comprehensive laws that place more traffickers in prison.</span><sup class="reference" data-dcnode-id="7817" id="cite_ref-:0_180-2"><a data-dcnode-id="7818" href="#cite_note-:0-180"><span data-dcnode-id="7819" instrument_node="">[180]</span></a></sup><span data-dcnode-id="7816" instrument_node=""> 
The </span><a class="new" data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNot_for_Sale_%28organization%29%26action%3Dedit%26redlink%3D1" title="Not for Sale (organization) (page does not exist)"><span data-dcnode-id="7815" instrument_node="">Not for Sale (organization)</span></a><span data-dcnode-id="7813" instrument_node=""> Campaign works in the United States, Peru, the Netherlands, Romania, Thailand, South Africa, and India to help victims of human trafficking. In 2013 alone, they provided 4,500 services to 2,062 individuals.</span><sup class="reference" data-dcnode-id="7810" id="cite_ref-:1_181-0"><a data-dcnode-id="7811" href="#cite_note-:1-181"><span data-dcnode-id="7812" instrument_node="">[181]</span></a></sup><span data-dcnode-id="7809" instrument_node=""> The vast majority of victims who received assistance were from the Netherlands and the number of victims served increased by 42 percent from 2012. The campaign allocates the majority of their funds to providing victims health and nutritional care and education. Not for Sale provides a safe shelter for victims and empowers them with life skills and job training.</span><sup class="reference" data-dcnode-id="7806" id="cite_ref-:1_181-1"><a data-dcnode-id="7807" href="#cite_note-:1-181"><span data-dcnode-id="7808" instrument_node="">[181]</span></a></sup><span data-dcnode-id="7805" instrument_node=""> This helps trafficked individuals re-enter into the workforce through a dignified form of work. In the organization's 2013 Annual Impact Report, it was determined that 75 percent of the victims had been sexually exploited.</span><sup class="reference" data-dcnode-id="7802" id="cite_ref-182"><a data-dcnode-id="7803" href="#cite_note-182"><span data-dcnode-id="7804" instrument_node="">[182]</span></a></sup><span data-dcnode-id="7801" instrument_node="">
</span></p><p data-dcnode-id="7780"><span data-dcnode-id="7799" instrument_node="">While globalization fostered new technologies that may exacerbate sex trafficking, technology can also be used to assist law enforcement and anti-trafficking efforts. A study was done on online classified ads surrounding the </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Super_Bowl" title="Super Bowl"><span data-dcnode-id="7798" instrument_node="">Super Bowl</span></a><span data-dcnode-id="7796" instrument_node="">. A number of reports have noticed increase in sex trafficking during previous years of the Super Bowl.</span><sup class="reference" data-dcnode-id="7793" id="cite_ref-newsweek.com_183-0"><a data-dcnode-id="7794" href="#cite_note-newsweek.com-183"><span data-dcnode-id="7795" instrument_node="">[183]</span></a></sup><span data-dcnode-id="7792" instrument_node=""> For the 2011 Super Bowl held in Dallas, Texas, the Backpage website for the Dallas area experienced a 136 percent increase on the number of posts in the Adult section that Sunday. Typically, Sundays were known to be the day of the week with the lowest number of posts in the Adult section. Researchers analyzed the most salient terms in these online ads and found that most commonly used words suggested that many escorts were traveling across state lines to Dallas specifically for the Super Bowl. Also, the self-reported ages were higher than usual which conveys that an older population of sex workers were drawn to the event, but since these are self-reported the data is not reliable. Despite a lot of media hype about a supposed spike in sex trafficking surrounding the Super Bowl, academics and anti-trafficking campaigners have said this is largely a myth. They say that while the commercial sex market does grow modestly during large events, sex trafficking is a year-round problem.</span><sup class="reference" data-dcnode-id="7789" id="cite_ref-184"><a data-dcnode-id="7790" href="#cite_note-184"><span data-dcnode-id="7791" instrument_node="">[184]</span></a></sup><sup class="reference" data-dcnode-id="7786" id="cite_ref-185"><a data-dcnode-id="7787" href="#cite_note-185"><span data-dcnode-id="7788" instrument_node="">[185]</span></a></sup><span data-dcnode-id="7785" instrument_node=""> Twitter was another social networking platform studied for detecting sex trafficking. Digital tools can be used to narrow the pool of sex trafficking cases, albeit imperfectly and with uncertainty.</span><sup class="reference" data-dcnode-id="7782" id="cite_ref-mark_186-0"><a data-dcnode-id="7783" href="#cite_note-mark-186"><span data-dcnode-id="7784" instrument_node="">[186]</span></a></sup><span data-dcnode-id="7781" instrument_node="">
</span></p><span data-dcnode-id="7779" instrument_node="">
</span><h4 data-dcnode-id="7768"><span data-dcnode-id="7778" id=".27End_Demand.27"></span><span class="mw-headline" data-dcnode-id="7776" id="'End_Demand'"><span data-dcnode-id="7777" instrument_node="">'End Demand'</span></span><span class="mw-editsection" data-dcnode-id="7769"><span class="mw-editsection-bracket" data-dcnode-id="7774"><span data-dcnode-id="7775" instrument_node="">[</span></span><a data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSex_trafficking%26action%3Dedit%26section%3D35" title="Edit section: 'End Demand'"><span data-dcnode-id="7773" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7770"><span data-dcnode-id="7771" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7767" instrument_node="">
