 to our data before presenting the results, First, the NRM captures only a proportion (of unknown size) of all trafficking in the UK [</span><a aria-label="Reference 43" data-dcnode-id="3021" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d96153238e1104" title="Home Office. (2014a). Interim review of the National Referral Mechanism for victims of human trafficking. London: Home Office."><span data-dcnode-id="3022" instrument_node="">43</span></a><span data-dcnode-id="3020" instrument_node="">, </span><a aria-label="Reference 64" data-dcnode-id="3018" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d96153238e1107" title="Silverman, B. (2014). Modern slavery: An application of multiple systems estimation. London: Home Office."><span data-dcnode-id="3019" instrument_node="">64</span></a><span data-dcnode-id="3017" instrument_node="">]. The number of potential victims referred into the system is likely affected by factors such as: awareness and understanding of both trafficking and the NRM; funding and prioritisation; and potential victims’ willingness to engage [</span><a aria-label="Reference 19" data-dcnode-id="3015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e1110" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="3016" instrument_node="">19</span></a><span data-dcnode-id="3014" instrument_node="">]. Second, without knowing whether and how cases referred into the NRM differ from those that go undetected/unreported, the representativeness of the data is unclear [</span><a aria-label="Reference 19" data-dcnode-id="3012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e1113" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="3013" instrument_node="">19</span></a><span data-dcnode-id="3011" instrument_node="">]. Victims who do not conform to stereotypes of trafficking victims (e.g. male victims of sex trafficking) may be less likely to be identified as such. Also, adults, unlike children, must consent to referral so there may be some self-selection bias. Third, the UKVI has been said to be less willing than the NCA to deem people trafficking victims [</span><a aria-label="Reference 51" data-dcnode-id="3009" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d96153238e1116" title="Maroukis, T. (2017). Keeping up appearances: The British public policy response to the trafficking of domestic workers in a changing regime of social protection. Journal of Immigrant &amp; Refugee Studies, 15(2), 155–170."><span data-dcnode-id="3010" instrument_node="">51</span></a><span data-dcnode-id="3008" instrument_node="">, </span><a aria-label="Reference 68" data-dcnode-id="3006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d96153238e1120" title="The Anti-Trafficking Monitoring Group. (2010). Wrong kind of victim? One year on: An analysis of UK measures to protect trafficked persons. London: Anti-Slavery International."><span data-dcnode-id="3007" instrument_node="">68</span></a><span data-dcnode-id="3005" instrument_node="">], which could have introduced systematic bias based on nationality. Fourth, the dataset involves unique cases but not unique individuals: in those (relatively rare</span><sup data-dcnode-id="3000"><a data-dcnode-id="3001" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Footnote </span></span><span data-dcnode-id="3002" instrument_node="">7</span></a></sup><span data-dcnode-id="2999" instrument_node="">) instances where individuals are referred into the NRM more than once, they appear as a new entry. Working with anonymised data meant we could not filter out any such duplicates. Fifth, victims may be connected to one another, which violates the assumption of independence. Since links between cases were not systematically flagged in the data structure, we could not establish the extent of clustering and introduce statistical controls for its possible effects. Given the large dataset, unless any such clustering was very prevalent it is unlikely to have affected the validity of the findings. Finally, as is common when working with secondary data collected for non-research purposes (see, e.g.</span><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">,</span></i><span data-dcnode-id="2996" instrument_node=""> [</span><a aria-label="Reference 14" data-dcnode-id="2994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d96153238e1132" title="Cockbain, E., Ashby, M., &amp; Brayley, H. (2015). Immaterial boys? A large-scale exploration of gender-based differences in child sexual exploitation service users. Sexual abuse: a journal of research and treatment, 29(7), 658–684."><span data-dcnode-id="2995" instrument_node="">14</span></a><span data-dcnode-id="2993" instrument_node="">, </span><a aria-label="Reference 15" data-dcnode-id="2991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d96153238e1135" title="Cockbain, E., Ashby, M., &amp; Brayley-Morris, H. (2016). Children, gender and sexual exploitation: A quantitative analysis of adminstrative data. SAGE Research Methods Cases, 2, 1–17. 
                    https://doi.org/10.4135/9781473993341
                    
                  ."><span data-dcnode-id="2992" instrument_node="">15</span></a><span data-dcnode-id="2990" instrument_node="">]), we were naturally constrained by the contents, categories and completeness of the original data and any other biases (</span><i data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">e.g</span></i><span data-dcnode-id="2987" instrument_node=""> self report bias) they may have contained. We cannot rule out the existence of confounding variables not captured in our dataset. While it is important to be aware of these limitations and accordingly exercise caution in interpreting our results, the data nevertheless offer many strengths over other sources and meaningful analysis is possible.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2984" id="Sec7"><span data-dcnode-id="2985" instrument_node="">Ethics</span></h3><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">This study was approved by the UCL Research Ethics Committee (reference: 5160/001).</span></p></div></div></section><section data-dcnode-id="2548" data-title="Results"><div class="c-article-section" data-dcnode-id="2549" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2977" id="Sec8"><span data-dcnode-id="2978" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2550" id="Sec8-content"><p data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">In this section, we present in turn the results of the exploratory data analysis and the logistic regression analysis.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2973" id="Sec9"><span data-dcnode-id="2974" instrument_node="">Initial comparison of trafficking types</span></h3><p data-dcnode-id="2956"><span data-dcnode-id="2972" instrument_node="">Here, we explore how the different trafficking types compared across the key variables in Table </span><a data-dcnode-id="2970" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2971" instrument_node="">1</span></a><span data-dcnode-id="2969" instrument_node=""> for the overall study sample (</span><i data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">n</span></i><span data-dcnode-id="2966" instrument_node=""> = 2630). The largest category was labour trafficking (45.2%, </span><i data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">n</span></i><span data-dcnode-id="2963" instrument_node=""> = 1188), followed shortly by sex trafficking (42.1%, </span><i data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">n</span></i><span data-dcnode-id="2960" instrument_node=""> = 1106). Substantially fewer victims were trafficked for domestic servitude (12.8%, </span><i data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">n</span></i><span data-dcnode-id="2957" instrument_node=""> = 336). Given these size differences, we tend to present results in percentage terms to facilitate comparison.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2954" id="Sec10"><span data-dcnode-id="2955" instrument_node="">Victims’ age</span></h4><p data-dcnode-id="2943"><span data-dcnode-id="2953" instrument_node="">Victims’ age distribution varied markedly between trafficking types. While the overall median age was 25.2&nbsp;years, victims of sex trafficking were on average younger (median 22.8&nbsp;years, range 10.4–54.8&nbsp;years) than victims of domestic servitude (median 25.2&nbsp;years, range 6.2–66.9&nbsp;years) and, especially, of labour trafficking (median 29.2&nbsp;years, range 0.3–84.5&nbsp;years). Note that all labour trafficking victims aged seven or under were linked to benefit fraud, explaining the presence of infants and young children in this category. Figure </span><a data-dcnode-id="2951" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2952" instrument_node="">1</span></a><span data-dcnode-id="2950" instrument_node=""> shows a much flatter age distribution for labour trafficking, whereas sex trafficking had obvious clustering in the late teens and early twenties and swift decline thereafter. A Kruskal-Wallis test demonstrated that the age differences between types were significant (χ</span><sup data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">2</span></sup><span data-dcnode-id="2947" instrument_node=""> = 166.85, df = 2, </span><i data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">p</span></i><span data-dcnode-id="2944" instrument_node=""> &lt; 0.001), although the epsilon squared value of 0.06 suggested a weak relationship.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2919" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2920"><figcaption data-dcnode-id="2940"><b class="c-article-section__figure-caption" data-dcnode-id="2941" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2942" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2931"><div class="c-article-section__figure-item" data-dcnode-id="2935"><a class="c-article-section__figure-link" data-dcnode-id="2936" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/1" rel="nofollow"><picture data-dcnode-id="2937"><source data-dcnode-id="2939" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2938" height="442" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2932" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Age distribution of victims split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2921"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2922" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/1" rel="nofollow"><span data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2923" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2924" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2925" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2928" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2927" fill-rule="evenodd"></path><span data-dcnode-id="2926" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2917" id="Sec11"><span data-dcnode-id="2918" instrument_node="">Gender</span></h4><p data-dcnode-id="2900"><span data-dcnode-id="2916" instrument_node="">Although the NRM data also contained categories such as transgender, all victims in our study sample fell within the male/female binary. While 62.2% (</span><i data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">n</span></i><span data-dcnode-id="2913" instrument_node=""> = 1625) of the overall sample was female, disaggregating the data revealed pronounced distinctions between trafficking types: female victims made up the overwhelming majority of victims for both sex trafficking (97.3%, </span><i data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">n</span></i><span data-dcnode-id="2910" instrument_node=""> = 1076) and domestic servitude (86.6%, </span><i data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">n</span></i><span data-dcnode-id="2907" instrument_node=""> = 291) but under a quarter (22.6%, </span><i data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">n</span></i><span data-dcnode-id="2904" instrument_node=""> = 268) for labour trafficking. A chi-square test showed that gender differences between trafficking types were significant (χ2 = 1457.79, df = 2, </span><i data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">p</span></i><span data-dcnode-id="2901" instrument_node=""> &lt; 0.001) and the Cramer’s V value of 0.75 indicated an extremely strong relationship.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2898" id="Sec12"><span data-dcnode-id="2899" instrument_node="">Nationality and region of origin</span></h4><p data-dcnode-id="2860"><span data-dcnode-id="2897" instrument_node="">The overall sample of trafficking victims contained 84 different nationalities of which the top ten were: Nigerian (</span><i data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">n</span></i><span data-dcnode-id="2894" instrument_node=""> = 263), Slovakian (</span><i data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">n</span></i><span data-dcnode-id="2891" instrument_node=""> = 259), British (</span><i data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">n</span></i><span data-dcnode-id="2888" instrument_node=""> = 253), Romanian (</span><i data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">n</span></i><span data-dcnode-id="2885" instrument_node=""> = 249), Albanian (</span><i data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">n</span></i><span data-dcnode-id="2882" instrument_node=""> = 187), Polish (</span><i data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">n</span></i><span data-dcnode-id="2879" instrument_node=""> = 172), Vietnamese (</span><i data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">n</span></i><span data-dcnode-id="2876" instrument_node=""> = 162), Lithuanian (</span><i data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">n</span></i><span data-dcnode-id="2873" instrument_node=""> = 156), Hungarian (</span><i data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">n</span></i><span data-dcnode-id="2870" instrument_node=""> = 124), Czech (</span><i data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">n</span></i><span data-dcnode-id="2867" instrument_node=""> = 121). These ten nationalities dominated, together accounting for 74.0% of the overall sample. In contrast, the remainder of the sample was diverse and fragmented, with 22 nationalities featuring just once and 54 ten times or fewer. In light of this fragmentation, it was not possible to examine differences at country-level and we looked instead at broader regions of origin: Africa; Americas (North, Central/Caribbean and South); countries in the European Economic Area (EEA); and other European countries outside the EEA (hereafter non-EEA Europe).</span><sup data-dcnode-id="2862"><a data-dcnode-id="2863" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Footnote </span></span><span data-dcnode-id="2864" instrument_node="">8</span></a></sup><span data-dcnode-id="2861" instrument_node=""> There were no victims from Oceania in the sample. Our rationale for dividing Europe into EEA/non-EEA was that EEA nationals’ treaty rights allow them to travel and work freely in the UK.</span></p><p data-dcnode-id="2843"><span data-dcnode-id="2859" instrument_node="">Of the total victims, just over half came from within the EEA (53.7%, </span><i data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">n</span></i><span data-dcnode-id="2856" instrument_node=""> = 1413). As shown in Fig.&nbsp;</span><a data-dcnode-id="2854" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2855" instrument_node="">2</span></a><span data-dcnode-id="2853" instrument_node="">, disaggregating the data revealed distinct patterns by trafficking type. For example, four in five labour trafficking victims came from within the EEA (79.9%), compared with just 8.3% of those trafficked for domestic servitude. A chi-square test with Monte Carlo </span><i data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">p</span></i><span data-dcnode-id="2850" instrument_node="">-values showed that the differences in region of origin between trafficking types were significant (χ</span><sup data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">2</span></sup><span data-dcnode-id="2847" instrument_node=""> = 1058.31, df = 8, </span><i data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">p</span></i><span data-dcnode-id="2844" instrument_node=""> &lt; 0.001) and the Cramer’s V value of 0.45 suggested a very strong relationship.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2819" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2820"><figcaption data-dcnode-id="2840"><b class="c-article-section__figure-caption" data-dcnode-id="2841" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2842" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2831"><div class="c-article-section__figure-item" data-dcnode-id="2835"><a class="c-article-section__figure-link" data-dcnode-id="2836" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/2" rel="nofollow"><picture data-dcnode-id="2837"><source data-dcnode-id="2839" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2838" height="557" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2832" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Victims’ region of origin split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2821"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2822" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/2" rel="nofollow"><span data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2823" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2824" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2825" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2828" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2827" fill-rule="evenodd"></path><span data-dcnode-id="2826" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2817" id="Sec13"><span data-dcnode-id="2818" instrument_node="">Police region where victims presented</span></h4><p data-dcnode-id="2809"><span data-dcnode-id="2816" instrument_node="">Victims in the sample presented to the authorities in eleven different police regions: Wales, Northern Ireland, Scotland and all eight English police regions. Once again, disaggregating the data by trafficking type revealed important distinctions (see Fig.&nbsp;</span><a data-dcnode-id="2814" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2815" instrument_node="">3</span></a><span data-dcnode-id="2813" instrument_node="">). London was the most common region overall (25.8% of cases, </span><i data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">n</span></i><span data-dcnode-id="2810" instrument_node=""> = 608) and also the most common for both domestic servitude (55.5%) and sex trafficking (36.3%)– yet it ranked just sixth for labour trafficking (9.1%).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2785" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="2786"><figcaption data-dcnode-id="2806"><b class="c-article-section__figure-caption" data-dcnode-id="2807" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2808" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2797"><div class="c-article-section__figure-item" data-dcnode-id="2801"><a class="c-article-section__figure-link" data-dcnode-id="2802" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/3" rel="nofollow"><picture data-dcnode-id="2803"><source data-dcnode-id="2805" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2804" height="550" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2798" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Police region where victims presented split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2787"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2788" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/3" rel="nofollow"><span data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2789" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2790" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2791" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2794" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2793" fill-rule="evenodd"></path><span data-dcnode-id="2792" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2774"><span data-dcnode-id="2784" instrument_node="">A chi-square test with Monte Carlo </span><i data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">p</span></i><span data-dcnode-id="2781" instrument_node="">-values showed that differences between trafficking types in police region of presentation were significant (χ</span><sup data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">2</span></sup><span data-dcnode-id="2778" instrument_node=""> = 450.47, df = 20, </span><i data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">p</span></i><span data-dcnode-id="2775" instrument_node=""> &lt; 0.001) and the Cramer’s V value of 0.31 indicated that the relationship was (moderately) strong.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2772" id="Sec14"><span data-dcnode-id="2773" instrument_node="">Year of referral</span></h4><p data-dcnode-id="2767"><span data-dcnode-id="2771" instrument_node="">Here, we focus on cases referred into the NRM the years 2009 to 2013 inclusive. We excluded 2014 from this analysis alone as we only had partial information for that year (the source data went up to 7/10/14 only and comparatively few of the 2014 referrals had resulted in final decision by then). Figure </span><a data-dcnode-id="2769" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2770" instrument_node="">4</span></a><span data-dcnode-id="2768" instrument_node=""> shows the year in which victims were referred into the NRM. It clearly shows how the number of victims identified as trafficked for domestic servitude remained relatively steady year-on-year over the study period. In contrast, a more obvious and sustained increase over time was evident for both sex trafficking and labour trafficking, with particularly sharp increases from 2010 to 2011 and again from 2012 to 2013.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2743" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2744"><figcaption data-dcnode-id="2764"><b class="c-article-section__figure-caption" data-dcnode-id="2765" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2766" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2755"><div class="c-article-section__figure-item" data-dcnode-id="2759"><a class="c-article-section__figure-link" data-dcnode-id="2760" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/4" rel="nofollow"><picture data-dcnode-id="2761"><source data-dcnode-id="2763" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2762" height="553" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2756" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Year of referral split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2745"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2746" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/4" rel="nofollow"><span data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2747" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2748" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2749" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2752" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2751" fill-rule="evenodd"></path><span data-dcnode-id="2750" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2732"><span data-dcnode-id="2742" instrument_node="">A chi-square test showed that differences in year of referral between trafficking types were significant (χ</span><sup data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">2</span></sup><span data-dcnode-id="2739" instrument_node=""> = 43.03, df = 8, </span><i data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">p</span></i><span data-dcnode-id="2736" instrument_node=""> &lt; 0.001), although the Kendall’s tau-b value of 0.09 indicated that the relationship was (very) weak. As a check, we re-ran these statistical tests including 2014 cases and the results were very similar (χ</span><sup data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">2</span></sup><span data-dcnode-id="2733" instrument_node=""> = 78.21, df = 10, p &lt; 0.001, Kendall’s tau-b = 0.12).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2730" id="Sec15"><span data-dcnode-id="2731" instrument_node="">Month of referral</span></h4><p data-dcnode-id="2719"><span data-dcnode-id="2729" instrument_node="">As shown in Fig.&nbsp;</span><a data-dcnode-id="2727" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2728" instrument_node="">5</span></a><span data-dcnode-id="2726" instrument_node="">, there were some differences between trafficking types in terms of the months when victims were referred. Most notably, fewer labour trafficking victims were referred in the Spring and Summer months (March–August inclusive) than at other times of year. Although less pronounced than many of the other differences, the differences in month of referral between types were still significant (χ</span><sup data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">2</span></sup><span data-dcnode-id="2723" instrument_node=""> = 65.16, df = 22, </span><i data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">p</span></i><span data-dcnode-id="2720" instrument_node=""> &lt; 0.001), although a Cramer’s V value of 0.11 indicated a very weak relationship.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2695" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="2696"><figcaption data-dcnode-id="2716"><b class="c-article-section__figure-caption" data-dcnode-id="2717" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="2718" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2707"><div class="c-article-section__figure-item" data-dcnode-id="2711"><a class="c-article-section__figure-link" data-dcnode-id="2712" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/5" rel="nofollow"><picture data-dcnode-id="2713"><source data-dcnode-id="2715" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="2714" height="552" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2708" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Month of referral split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2697"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="2698" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/5" rel="nofollow"><span data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2699" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2700" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2701" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2704" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2703" fill-rule="evenodd"></path><span data-dcnode-id="2702" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2694" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2692" id="FPar1"><span data-dcnode-id="2693" instrument_node="">Source of referral</span></h3><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2668"><span data-dcnode-id="2690" instrument_node="">There were four main sources of referrals: police (plus gangmasters licensing authorities</span><sup data-dcnode-id="2685"><a data-dcnode-id="2686" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Footnote </span></span><span data-dcnode-id="2687" instrument_node="">9</span></a></sup><span data-dcnode-id="2684" instrument_node="">); the immigration authorities; non-governmental organisations; and local authorities, including social and children’s services.</span><sup data-dcnode-id="2679"><a data-dcnode-id="2680" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Footnote </span></span><span data-dcnode-id="2681" instrument_node="">10</span></a></sup><span data-dcnode-id="2678" instrument_node=""> Disaggregating the data revealed clear differences between trafficking types, shown in Fig.&nbsp;</span><a data-dcnode-id="2676" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="2677" instrument_node="">6</span></a><span data-dcnode-id="2675" instrument_node="">. For example, the proportion of referrals from the police was markedly higher for labour trafficking than the other types. Meanwhile, a particularly large proportion of domestic servitude victims was referred by non-governmental organisations. The proportion of referrals from the immigration authorities was markedly higher for sex trafficking and domestic servitude than for labour trafficking, quite possibly linked to the higher proportion of non-EEA victims. A chi-square test showed the differences in sources of referral were significant across trafficking types (χ</span><sup data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">2</span></sup><span data-dcnode-id="2672" instrument_node=""> = 403.82, df = 8, </span><i data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">p</span></i><span data-dcnode-id="2669" instrument_node=""> &lt; 0.001) and the Cramer’s V value of 0.27 showed a moderately strong association.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2644" data-test="figure" data-title="Fig. 6" id="figure-6"><figure data-dcnode-id="2645"><figcaption data-dcnode-id="2665"><b class="c-article-section__figure-caption" data-dcnode-id="2666" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="2667" instrument_node="">Fig. 6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2656"><div class="c-article-section__figure-item" data-dcnode-id="2660"><a class="c-article-section__figure-link" data-dcnode-id="2661" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/6" rel="nofollow"><picture data-dcnode-id="2662"><source data-dcnode-id="2664" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig6_HTML.png?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="2663" height="553" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig6_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2657" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Source of referral split by trafficking type</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2646"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="2647" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/6" rel="nofollow"><span data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2648" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2649" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2650" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2653" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2652" fill-rule="evenodd"></path><span data-dcnode-id="2651" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2643" instrument_node="">
</span><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2641" id="Sec16"><span data-dcnode-id="2642" instrument_node="">Time to decision</span></h4><p data-dcnode-id="2627"><span data-dcnode-id="2640" instrument_node="">Overall, the final decision that these individuals should officially be considered trafficking victims was reached after a median of 61&nbsp;days (range 0 to 1779&nbsp;days</span><sup data-dcnode-id="2635"><a data-dcnode-id="2636" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Footnote </span></span><span data-dcnode-id="2637" instrument_node="">11</span></a></sup><span data-dcnode-id="2634" instrument_node="">). Once again, the aggregate data masked substantial differences between trafficking types: decisions were reached most quickly for labour trafficking (median 52&nbsp;days), followed by sex trafficking (median 85&nbsp;days). Decisions on domestic servitude took far longer (median 175&nbsp;days). A Kruskal-Wallis test demonstrated that the differences in time to decision between trafficking types were significant (χ</span><sup data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">2</span></sup><span data-dcnode-id="2631" instrument_node=""> = 440.69, df = 2, </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">p</span></i><span data-dcnode-id="2628" instrument_node=""> &lt; 0.001), although the epsilon squared value of 0.17 indicated a fairly weak relationship. Differences between trafficking types in time to decision might be at least partially related to differences in NCA and UKVI procedures (the NCA deal with EEA cases only, which a higher proportion of labour trafficking cases were).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2625" id="Sec17"><span data-dcnode-id="2626" instrument_node="">Identification of predictors of trafficking type</span></h3><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">The exploratory data analysis gave a useful overview of our full dataset, helping tease out and patterns and possible relationships. Next, we used multinomial logistic regression to build a model to control for possible relationships between variables and investigate the relative power of the different variables in distinguishing between different trafficking types. As explained previously, the regression analysis was necessarily limited to victims from Africa, Asia or the EEA.</span></p><p data-dcnode-id="2615"><span data-dcnode-id="2622" instrument_node="">We built the model iteratively, using a main effects modelling strategy. Following the principle of parsimony, we culled our model only to include significant predictors (at the traditional </span><i data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">p</span></i><span data-dcnode-id="2619" instrument_node=""> &lt; 0.05 criterion of statistical significance). All variables described in the exploratory data analysis were included, except for ‘year of referral’ (did not meet </span><i data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">p</span></i><span data-dcnode-id="2616" instrument_node=""> threshold) and ‘nationality’ (due to data constraints, the aggregated ‘region of origin’ was used instead). All variables used in the model contributed significantly to model fit, tested using Likelihood Ratio Tests. We ruled out multicollinearity between variables using collinearity diagnostics (results available on request).</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2614" instrument_node="">Our final model contained 2121 cases: 1061 victims of labour trafficking, 788 of sex trafficking victims and 272 of trafficking for domestic servitude. Descriptive statistics are available in Appendix 1. Addition of the predictors to a model that contained only the intercept significantly improved the fit (−2 Log Likelihood = 2190.995, χ</span><sup data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">2</span></sup><span data-dcnode-id="2611" instrument_node=""> = 1956.621, df = 58, </span><i data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">p</span></i><span data-dcnode-id="2608" instrument_node=""> &lt; 0.001, Nagelkerke R</span><sup data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">2</span></sup><span data-dcnode-id="2605" instrument_node=""> = 0.702). The model correctly predicted exploitation type for 78.5% of victims, although it was markedly more accurate at predicting labour trafficking (84.4% correct) and sex trafficking (86.8% correct) than domestic servitude (30.9% correct). Collectively, the likelihood-ratio test, pseudo R</span><sup data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">2</span></sup><span data-dcnode-id="2602" instrument_node=""> and percentage of cases correctly classified suggested the model had a good ability to discriminate between trafficking types.</span></p><p data-dcnode-id="2593"><span data-dcnode-id="2600" instrument_node="">To understand the extent and direction of changes that each independent variable (or category thereof) predicts in the dependent variable (trafficking type), we examine the exponent of the B co-efficient (Exp(B)). Figure </span><a data-dcnode-id="2598" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="2599" instrument_node="">7</span></a><span data-dcnode-id="2597" instrument_node=""> provides a forest plot (on a log-2 scale) showing all statistically significant results for the Exp(B) values, otherwise known as relative risk ratios, and associated 95% confidence intervals (CIs). It covers the three type-wise comparisons in the model: domestic servitude versus labour trafficking; sex trafficking versus labour trafficking; and domestic servitude versus sex trafficking. Simply put, the values to the left of the dashed line (representing the null hypothesis of no effect given by Exp(0) = 1.00) mean a case with the given characteristic is </span><i data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">less</span></i><span data-dcnode-id="2594" instrument_node=""> likely to be the specified trafficking type than the comparison type, whereas the reverse is true of values to the right. In the appendices, we provide full parameter estimates for the multinomial logistic regression (Appendix 2) and a full forest plot of Exp(B) values that also includes non-significant results (Appendix 3).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2569" data-test="figure" data-title="Fig. 7" id="figure-7"><figure data-dcnode-id="2570"><figcaption data-dcnode-id="2590"><b class="c-article-section__figure-caption" data-dcnode-id="2591" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="2592" instrument_node="">Fig. 7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2581"><div class="c-article-section__figure-item" data-dcnode-id="2585"><a class="c-article-section__figure-link" data-dcnode-id="2586" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/7" rel="nofollow"><picture data-dcnode-id="2587"><source data-dcnode-id="2589" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10611-019-09836-7/MediaObjects/10611_2019_9836_Fig7_HTML.png?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="2588" height="496" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10611-019-09836-7/MediaObjects/10611_2019_9836_Fig7_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2582" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Forest plot of relative risk ratios and associated 95% confidence intervals (statistically significant results only), done to a log 2 scale</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2571"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="2572" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/figures/7" rel="nofollow"><span data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2573" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2574" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2575" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2578" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2577" fill-rule="evenodd"></path><span data-dcnode-id="2576" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Generally speaking the results reflect similar trends to those outlined in the bivariate analysis, but several interesting findings merit closer examination. While all the variables have predictive utility at the overall model-level, the significance, direction and strength of effect often varied considerably at the level of pair-wise comparisons between trafficking types.</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">The most pronounced results were around gender. All other variables held constant (we will not keep repeating this caveat but it is important to bear in mind throughout the results), being female means someone is 75 times more likely to have been trafficked for sex than labour. The same trend is evident, although somewhat less pronounced, when comparing domestic servitude and labour: being female means someone is 14 times more likely to have been trafficked for domestic servitude than for labour. The influence of gender is far less keenly felt when comparing domestic servitude and sex: being female means someone is 0.19 times as likely (i.e. somewhat less likely) to have been trafficked for domestic servitude than sex.</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Region of origin had clear predictive utility too. Most notably, coming from Africa as compared to the EEA meant someone was 65.9 times more likely to have been trafficked for domestic servitude than labour, 9.5 more likely to have been trafficked for sex than labour and 6.9 times more likely to have been trafficked for domestic servitude than sex. Meanwhile, coming from Asia as compared to the EEA meant someone was 15.7 times more likely to have been trafficked for domestic servitude than labour and 11.7 times more likely to have been trafficked for domestic servitude than sex.</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Some variables only predict trafficking type in certain pair-wise comparisons. A good example is age, which was not significant when comparing domestic servitude and labour. For the other two comparisons, the predictive power accumulates as wider age gaps are considered. For example, for a one-year increase in age, the relative risk of someone having been trafficked for sex rather than labour decreases by 3.7%. For a five-year increase in age, however, the relative risk decreases by 17.3%. Similarly, for a one-year increase in age, the relative risk of someone having been trafficked for domestic servitude rather than sex increases by 2.6%, whereas for a five-year increase in age, the increase in relative risk is 13.3%.</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">There were numerous police regions of presentation in which a victim was comparatively less likely than one in London to have been trafficked for domestic servitude than labour, sex than labour and/or for domestic servitude than sex. The South East and Scotland had significant results for all three pair-wise comparisons, indicating that the relative composition of the trafficking identified in these regions particularly diverged from that in London. Overall, the regional patterning varied in significance and strength many of the differences were fairly subtle: relative risk ratios ranged from 0.06 to 0.51 (i.e. around half as likely).</span></p><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Seasonal patterning was also complex and typically subtle. There were eight months in which, compared to December, a victim referred into the system was more or less likely to have been trafficked for one form of exploitation than another. While many of the differences were fairly subtle, some seasonal results were comparatively more pronounced: people referred into the system in May and August (compared to December) were respectively 2.4 and 2.2 times more likely to have been trafficked for labour than for sex.</span></p><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">The time to reach a decision on a victim’s trafficking status was only significant in comparing domestic servitude and sex (but this result in itself shows type-specific differences independent of decision-making authority). As with age differences, the effects were most pronounced when considering longer intervals: the relative risk of having been trafficked for domestic servitude rather than sex increases by 0.1% for a one-day increase in time, 20.0% for a six-month increase and 43.9% for a one-year increase. In other words, considerably longer times to decision are more strongly predictive of someone having been trafficked for domestic servitude than sex.</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Finally, source of referral was only significant for one category and one pair-wise comparison of trafficking types: referral from an NGO as compared to the police increases the relative risk of having been trafficked for domestic servitude rather than labour by 88.4%.</span></p><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">A key strength of the multinomial logistic regression is that it demonstrates that the individual independent variables have predictive power over and above the other variables in the model. Hence, for example, someone who is older, male, comes from the EEA and identified in various police regions outside of London is even more likely to have been trafficked for labour rather than sex than someone with just one of these characteristics.</span></p></div></div></section><section data-dcnode-id="2442" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2443" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2546" id="Sec18"><span data-dcnode-id="2547" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2444" id="Sec18-content"><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">As highlighted in the introduction, human trafficking is a broad conceptual umbrella that encompasses various different forms of exploitation. While there are empirical and theoretical grounds to expect differences between key trafficking types, there is very little robust quantitative research on this topic. Using nationwide data from the UK’s National Referral Mechanism, we addressed this knowledge gap by examining at scale similarities and differences between those trafficked for sexual exploitation, domestic servitude and labour exploitation.</span></p><p data-dcnode-id="2536"><span data-dcnode-id="2543" instrument_node="">We hypothesised that differences would exist between the trafficking types in terms of victims’ socio-demographic characteristics, trafficking experiences and official responses to them. Our results clearly support this hypothesis, with significant differences identified through both bivariate and multivariate analyses. These distinctions were not only statistically significant but also often substantial in magnitude. The most obvious example was gender: boys and men were substantially more likely to have been trafficked for labour than for sex or domestic servitude. This result echo gendered patterns in trafficking frequently reported by various national agencies and transnational bodies (e.g. [</span><a aria-label="Reference 53" data-dcnode-id="2541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d96153238e1597" title="National Crime Agency. (2018). Modern slavery and human trafficking: National Referral Mechanism Statistics Annual Report 2017. London: National Crime Agency."><span data-dcnode-id="2542" instrument_node="">53</span></a><span data-dcnode-id="2540" instrument_node="">, </span><a aria-label="Reference 78" data-dcnode-id="2538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e1600" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="2539" instrument_node="">78</span></a><span data-dcnode-id="2537" instrument_node="">]). Using inferential statistics and controlling for the effects of other variables increases confidence in the validity of our findings, providing a clear advantage over purely descriptive comparison of trafficking types. Other differences were more complex and there was much subtle variation in pair-wise comparisons in terms of significance, direction and size of effect for different variables and their sub-categories. All three pair-wise comparisons yielded significant results, indicating that genuine differences exist between the trafficking types. Overall, our study demonstrates the value of using individual-level data and a quantitative approach in disentangling some of the complex relationships around human trafficking and its various forms. While we identified significant differences at group-level, considerable within-group variation serves as an important reminder that the different trafficking types are not homogeneous. Moreover, victims who diverge from norms and stereotypes (e.g. men trafficked for sex) may be less likely to be identified and risk being overlooked in policy and practice.</span></p><p data-dcnode-id="2510"><span data-dcnode-id="2535" instrument_node="">Our study also has some important limitations. As explained previously, our data may well be subject to various biases in the identification of victims, collection of data and processing of cases. Additionally, both trafficking and counter-trafficking are dynamic phenomena and the landscape has likely shifted since our study period. Certainly, the number of referrals into the NRM has increased steeply year-on-year [</span><a aria-label="Reference 18" data-dcnode-id="2533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d96153238e1606" title="Cockbain, E., &amp; Olver, K. (2019). Child trafficking: characteristics, complexities and challenges. In I. Bryce, W. Petherick, &amp; Y. Robinson (Eds.), Child Abuse and Neglect: Forensic Issues in Evidence, Impact and Management (pp. 95–116). New York: Elsevier"><span data-dcnode-id="2534" instrument_node="">18</span></a><span data-dcnode-id="2532" instrument_node="">, </span><a aria-label="Reference 53" data-dcnode-id="2530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d96153238e1609" title="National Crime Agency. (2018). Modern slavery and human trafficking: National Referral Mechanism Statistics Annual Report 2017. London: National Crime Agency."><span data-dcnode-id="2531" instrument_node="">53</span></a><span data-dcnode-id="2529" instrument_node="">]. There is also greater recognition that UK nationals can be trafficked domestically, be it for child sexual exploitation (e.g. [</span><a aria-label="Reference 8" data-dcnode-id="2527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d96153238e1612" title="Brayley, H., &amp; Cockbain, E. (2014). British children can be trafficked too: Towards an inclusive definition of internal child sex trafficking. Child Abuse Review, 23(3), 171–184. 
                    https://doi.org/10.1002/car.2307
                    
                  ."><span data-dcnode-id="2528" instrument_node="">8</span></a><span data-dcnode-id="2526" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="2524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d96153238e1615" title="Cockbain, E. (2018). Offender and Victim Networks in Human Trafficking. Abingdon. Routledge."><span data-dcnode-id="2525" instrument_node="">11</span></a><span data-dcnode-id="2523" instrument_node="">]), ‘county lines’ related criminal exploitation (drug distribution and sales) (e.g. [</span><a aria-label="Reference 18" data-dcnode-id="2521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d96153238e1618" title="Cockbain, E., &amp; Olver, K. (2019). Child trafficking: characteristics, complexities and challenges. In I. Bryce, W. Petherick, &amp; Y. Robinson (Eds.), Child Abuse and Neglect: Forensic Issues in Evidence, Impact and Management (pp. 95–116). New York: Elsevier"><span data-dcnode-id="2522" instrument_node="">18</span></a><span data-dcnode-id="2520" instrument_node="">, </span><a aria-label="Reference 57" data-dcnode-id="2518" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d96153238e1622" title="Olver, K. (2018). 'County lines' criminal exploitation in the West Midlands, UK: professionals' perspectives on the Modern Slavery Act in practice, organisational challenges, and strengthening the collective response. MSc Dissertation, University College London, London."><span data-dcnode-id="2519" instrument_node="">57</span></a><span data-dcnode-id="2517" instrument_node="">]) or other forms of labour trafficking (e.g. [</span><a aria-label="Reference 13" data-dcnode-id="2515" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d96153238e1625" title="Cockbain, E., &amp; Brayley-Morris, H. (2017). Human trafficking and labour exploitation in the casual construction industry: An analysis of three major investigations in the United Kingdom involving Irish Traveller offending groups. Policing: A Journal Of Policy And Practice."><span data-dcnode-id="2516" instrument_node="">13</span></a><span data-dcnode-id="2514" instrument_node="">]). Political prioritisation of ‘modern slavery’ and multi-million pound investment in improving law enforcement responses - after a damning independent review [</span><a aria-label="Reference 41" data-dcnode-id="2512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d96153238e1628" title="HMICFRS. (2017). Stolen freedom: The policing response to modern slavery and human trafficking. London: Her Majesty's Inspectorate of Constabulary and Fire &amp; Rescue Services."><span data-dcnode-id="2513" instrument_node="">41</span></a><span data-dcnode-id="2511" instrument_node="">]- have likely affected local awareness, understanding and enforcement activity.</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2509" instrument_node="">Given the constraints of the original data source, we explored the discriminatory power of a relatively small number of variables. All variables that predicted trafficking type are routinely collected and many have obvious potential for targeted policy and practice. Of course, there are almost certainly numerous other factors distinguishing between trafficking types. Many variables of potential research interest did not feature in the original data, or were captured but not useable due to missing data. In building a more evidence-informed approach, it would be useful to establish how victims of different trafficking types compare in terms of duration of exploitation (which are anecdotally said to differ, [</span><a aria-label="Reference 62" data-dcnode-id="2507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d96153238e1634" title="Reed, S., Roe, S., Grimshaw, J., &amp; Oliver, R. (2018). The economic and social costs of modern slavery. London: Home Office."><span data-dcnode-id="2508" instrument_node="">62</span></a><span data-dcnode-id="2506" instrument_node="">]), means of transportation, control mechanisms experienced, pathways in and out of trafficking and health impacts and post-trafficking support needs (building on [</span><a aria-label="Reference 58" data-dcnode-id="2504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d96153238e1637" title="Oram, S., Ostrovschi, N. V., Gorceag, V. I., Hotineanu, M. A., Gorceag, L., Trigub, C., et al. (2012). Physical health symptoms reported by trafficked women receiving post-trafficking support in Moldova: Prevalence. severity and associated factors. BMC Women's Health, 12(1), 1–9."><span data-dcnode-id="2505" instrument_node="">58</span></a><span data-dcnode-id="2503" instrument_node="">, </span><a aria-label="Reference 59" data-dcnode-id="2501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d96153238e1640" title="Oram, S., Abas, M., Bick, D., Boyle, A., French, R., Jakobowitz, S., et al. (2016). Human trafficking and health: A survey of male and female survivors in England. American Journal of Public Health, 106(6), 1073–1078."><span data-dcnode-id="2502" instrument_node="">59</span></a><span data-dcnode-id="2500" instrument_node="">]).</span></p><p data-dcnode-id="2491"><span data-dcnode-id="2498" instrument_node="">Using large samples better to understand different trafficking types has considerable potential for informing the design, delivery and prioritisation of interventions. Primary research, which is often under-funded, has much to offer here (see [</span><a aria-label="Reference 82" data-dcnode-id="2496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d96153238e1647" title="Vincent, K., Zhang, S., &amp; Dank, M. (this issue). Searching for sex trafficking victims: Using a novel link-tracing method among commercial sex Workers in Muzzafarpur, India. Crime, Law and Social Change."><span data-dcnode-id="2497" instrument_node="">82</span></a><span data-dcnode-id="2495" instrument_node="">]). Yet, there is also considerable scope to optimise data already collected by official agencies, NGOs and others [</span><a aria-label="Reference 19" data-dcnode-id="2493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e1650" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="2494" instrument_node="">19</span></a><span data-dcnode-id="2492" instrument_node="">]. More expansive scientific analysis and robust data-driven policy require data collection to become more detailed and systematic. We appreciate, of course, that some information will invariably be missing at times and the competing demands of what is maximally informative, viable and proportionate must be balanced. In the UK, the on-going NRM reforms offer a valuable opportunity to enhance the collection of nuanced information about victims and their experiences, vulnerabilities and points of resilience pre-, during- and post-trafficking.</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2490" instrument_node="">Explanations of the drivers of trafficking (e.g. push and pull factors) are often global (both in geographic and thematic terms) and far less attention is paid to local environment and the contingencies of specific trafficking types [</span><a aria-label="Reference 49" data-dcnode-id="2488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d96153238e1656" title="Kragten-Heerdink, S. L., Dettmeijer-Vermeulen, C. E., &amp; Korf, D. J. (2017). More Than Just “Pushing and Pulling”: Conceptualizing Identified Human Trafficking in the Netherlands. Crime &amp; Delinquency, 0011128717728503."><span data-dcnode-id="2489" instrument_node="">49</span></a><span data-dcnode-id="2487" instrument_node="">]. Yet, research into numerous other crimes emphasises that context is vital [</span><a aria-label="Reference 34" data-dcnode-id="2485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d96153238e1659" title="Felson, M., &amp; Eckert, M. (2015). Crime and everyday life (Fifth ed.). London: Sage."><span data-dcnode-id="2486" instrument_node="">34</span></a><span data-dcnode-id="2484" instrument_node="">]. Since human trafficking is typically a for-profit activity, there are likely dependencies on the structure and regulation of relevant markets and activities, including migration and low-paid work more generally. Our results provide some indication that opportunity theories of crime apply to human trafficking too, meaning that traffickers operate pragmatically and rationally (not to be confused with legally or morally) (see also [</span><a aria-label="Reference 16" data-dcnode-id="2482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d96153238e1662" title="Cockbain, E., &amp; Wortley, R. (2015). Everyday atrocities: Does internal (domestic) sex trafficking of British children satisfy the expectations of opportunity theories of crime? Crime Science, 4(1), 1–12."><span data-dcnode-id="2483" instrument_node="">16</span></a><span data-dcnode-id="2481" instrument_node="">]). Indeed, many of our findings could be explained in terms of minimising effort and risk, maximising profit and responding to market demands and operating conditions and constraints. For example, the most common demographic for sex trafficking (young women) would seem to mirror consumer preference in the wider sex industry. The comparatively flatter age distribution for domestic servitude and labour trafficking would seem to reflect a lower premium on youth (with some exceptions, e.g. children are a useful asset for benefit fraud and certain other criminal exploitation). The clear predominance of EEA nationals among labour trafficking victims likely reflects the relative ease with which they can be inserted into the licit labour market. In contrast, migration status and right to work may be less relevant when dealing with the more hidden and informalised industries of sex and domestic work.</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2479" instrument_node="">We also found spatial patterning in terms of police regions where victims presented and thus were likely, although not necessarily, exploited. To a lesser extent, there was also temporal patterning. Spatial differences may reflect differences in the type of work available locally, the concentration of diaspora communities and/or awareness and enforcement activity, among other factors. Temporal differences might reflect factors such as seasonal patterns in various industries (e.g. agriculture/food processing, [</span><a aria-label="Reference 23" data-dcnode-id="2477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d96153238e1668" title="Davies, J. (2018). From severe to routine labour exploitation: The case of migrant workers in the UK food industry. Criminology &amp; Criminal Justice, 1748895818762264."><span data-dcnode-id="2478" instrument_node="">23</span></a><span data-dcnode-id="2476" instrument_node="">]), the relative visibility of different victim groups at different times of year and/or enforcement activity. Although our results cannot offer definitive answers, they raise important questions about the opportunity structures of trafficking activity and highlight the need for further enquiry into the temporal and spatial distribution of trafficking, an under-researched topic [</span><a aria-label="Reference 19" data-dcnode-id="2474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e1671" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="2475" instrument_node="">19</span></a><span data-dcnode-id="2473" instrument_node="">, </span><a aria-label="Reference 46" data-dcnode-id="2471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d96153238e1674" title="Kangaspunta, K. (2003). Mapping the Inhuman Trade: Preliminary findings of the human trafficking database: UN."><span data-dcnode-id="2472" instrument_node="">46</span></a><span data-dcnode-id="2470" instrument_node="">]. There is obvious potential to extend environmental criminology’s ideas and techniques to human trafficking, whereby results could inform more finely-targeted interventions aimed at high-risk times and places.</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Other differences identified here could also usefully be explored further in future research. For example, differences in referrals from NGOs relative to police for labour trafficking and domestic servitude victims might reflect variation in their visibility, their willingness to engage with certain agencies and/or organisational priorities. Similarly, the comparatively long times to decision in domestic servitude cases may reflect particular complexities of this trafficking type and/or responses to it.</span></p><p data-dcnode-id="2450"><span data-dcnode-id="2466" instrument_node="">Unlike the UK, various other countries combine data on trafficking for domestic servitude and other labour [</span><a aria-label="Reference 12" data-dcnode-id="2464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e1683" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360. 
                    https://doi.org/10.1007/s11292-017-9321-3
