</span><meta content="Combatting trafficking in human beings is a well-established social policy and crime prevention priority for the twenty-first Century. Human trafficking, as defined in international law, can occur for diverse exploitative purposes. Yet, different forms of trafficking are routinely conflated in research, policy and interventions. Most of the attention to date has been on sex trafficking of women and girls, leaving male victims and other trafficking types comparatively overlooked. In this study, we disentangle differences between key trafficking types using rare individual-level data from the United Kingdom’s central system for identifying trafficking victims. For a sample of 2630 confirmed victims, we compare those trafficked for sex, domestic servitude and other labour across variables relating to victim demographics, the trafficking process and official responses. Having established significant and substantial differences at bivariate level, we use multinomial logistic regression to identify predictors of trafficking type. Overall, our results underline the complexity and diversity of human trafficking and warn against conflating different types. Within a holistic counter-trafficking framework, a more disaggregated and nuanced approach to analysis and intervention is vital in ensuring more finely-targeted responses. This original study has clear lessons for research, policy and practice." data-dcnode-id="4239" name="dc.description"><span data-dcnode-id="4238" instrument_node="">

</span><meta content="Human trafficking for sex, labour and domestic servitude: how do key trafficking types compare and what are their predictors? - Crime, Law and Social Change" data-dcnode-id="3967" property="og:title"><span data-dcnode-id="3966" instrument_node="">
</span><meta content="Combatting trafficking in human beings is a well-established social policy and crime prevention priority for the twenty-first Century. Human trafficking, as defined in international law, can occur for diverse exploitative purposes. Yet, different forms of trafficking are routinely conflated in research, policy and interventions. Most of the attention to date has been on sex trafficking of women and girls, leaving male victims and other trafficking types comparatively overlooked. In this study, we disentangle differences between key trafficking types using rare individual-level data from the United Kingdom’s central system for identifying trafficking victims. For a sample of 2630 confirmed victims, we compare those trafficked for sex, domestic servitude and other labour across variables relating to victim demographics, the trafficking process and official responses. Having established significant and substantial differences at bivariate level, we use multinomial logistic regression to identify predictors of trafficking type. Overall, our results underline the complexity and diversity of human trafficking and warn against conflating different types. Within a holistic counter-trafficking framework, a more disaggregated and nuanced approach to analysis and intervention is vital in ensuring more finely-targeted responses. This original study has clear lessons for research, policy and practice." data-dcnode-id="3965" property="og:description"><span data-dcnode-id="3964" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1305" data-track-component="article body"><span data-dcnode-id="3523" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3516" data-gtm-vis-first-on-screen-50443292_562="928" data-gtm-vis-first-on-screen-50443292_563="927" data-gtm-vis-polling-id-50443292_562="104" data-gtm-vis-polling-id-50443292_563="102" data-gtm-vis-recent-on-screen-50443292_562="928" data-gtm-vis-recent-on-screen-50443292_563="927" data-gtm-vis-total-visible-time-50443292_562="9500" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3517" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3521" id="Abs1"><span data-dcnode-id="3522" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3518" id="Abs1-content"><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Combatting trafficking in human beings is a well-established social policy and crime prevention priority for the twenty-first Century. Human trafficking, as defined in international law, can occur for diverse exploitative purposes. Yet, different forms of trafficking are routinely conflated in research, policy and interventions. Most of the attention to date has been on sex trafficking of women and girls, leaving male victims and other trafficking types comparatively overlooked. In this study, we disentangle differences between key trafficking types using rare individual-level data from the United Kingdom’s central system for identifying trafficking victims. For a sample of 2630 confirmed victims, we compare those trafficked for sex, domestic servitude and other labour across variables relating to victim demographics, the trafficking process and official responses. Having established significant and substantial differences at bivariate level, we use multinomial logistic regression to identify predictors of trafficking type. Overall, our results underline the complexity and diversity of human trafficking and warn against conflating different types. Within a holistic counter-trafficking framework, a more disaggregated and nuanced approach to analysis and intervention is vital in ensuring more finely-targeted responses. This original study has clear lessons for research, policy and practice.</span></p></div></div></section><span data-dcnode-id="3515" instrument_node="">
</span><section data-dcnode-id="3116" data-gtm-vis-first-on-screen-50443292_562="928" data-gtm-vis-first-on-screen-50443292_563="928" data-gtm-vis-polling-id-50443292_562="105" data-gtm-vis-polling-id-50443292_563="103" data-gtm-vis-recent-on-screen-50443292_562="928" data-gtm-vis-recent-on-screen-50443292_563="928" data-gtm-vis-total-visible-time-50443292_562="9500" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Introduction: A skewed focus, conflated problems and pronounced knowledge gaps"><div class="c-article-section" data-dcnode-id="3117" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3513" id="Sec1"><span data-dcnode-id="3514" instrument_node="">Introduction: A skewed focus, conflated problems and pronounced knowledge gaps</span></h2><div class="c-article-section__content" data-dcnode-id="3118" id="Sec1-content"><p data-dcnode-id="3472"><span data-dcnode-id="3512" instrument_node="">Human trafficking can take many forms: diverse people may be moved within or between countries by various means for different purposes, including sexual exploitation, organ harvesting, domestic servitude (work in private households) and exploitation in numerous other licit and illicit labour markets. Despite this inherent diversity, the focus of the trafficking field has long been skewed towards sexual exploitation – and specifically that of women and girls. Indeed, when the international community came together in the late 1990s to agree a definition of human trafficking that would inform national legislation, harmonise responses and improve international coordination, the result was the ‘Protocol to Prevent, Suppress and Punish Trafficking in Persons, </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">especially Women and Children’</span></i><span data-dcnode-id="3509" instrument_node=""> [Italics added for emphasis] [</span><a aria-label="Reference 75" data-dcnode-id="3507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d96153238e335" title="United Nations (2000). Protocol to prevent, suppress and punish trafficking in persons especially women and children. In U. Nations (Ed.). Vienna: United Nations,."><span data-dcnode-id="3508" instrument_node="">75</span></a><span data-dcnode-id="3506" instrument_node="">]. This definition</span><sup data-dcnode-id="3501"><a data-dcnode-id="3502" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Footnote </span></span><span data-dcnode-id="3503" instrument_node="">1</span></a></sup><span data-dcnode-id="3500" instrument_node=""> (the ‘Palermo Protocol’) has shaped most national legislation [</span><a aria-label="Reference 80" data-dcnode-id="3498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d96153238e353" title="UNODC (2016). Global report on trafficking in persons."><span data-dcnode-id="3499" instrument_node="">80</span></a><span data-dcnode-id="3497" instrument_node="">] and is widely used in research, including this study and its underlying data. In the years following Palermo, the international community continued to focus primarily on sex trafficking [</span><a aria-label="Reference 35" data-dcnode-id="3495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d96153238e356" title="Goodey, J. (2008). Human trafficking sketchy data and policy responses. Criminology and Criminal Justice, 8(4), 421–442."><span data-dcnode-id="3496" instrument_node="">35</span></a><span data-dcnode-id="3494" instrument_node="">]. Similar was (and to a large extent still is) true at national level; for example, several countries’ annual human trafficking reports and statistics initially dealt only with sex trafficking [</span><a aria-label="Reference 12" data-dcnode-id="3492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e360" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360. 
                    https://doi.org/10.1007/s11292-017-9321-3
                    
                  ."><span data-dcnode-id="3493" instrument_node="">12</span></a><span data-dcnode-id="3491" instrument_node="">]. In the United States (US) (e.g. [</span><a aria-label="Reference 4" data-dcnode-id="3489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d96153238e363" title="Barrick, K., Lattimore, P. K., Pitts, W. J., &amp; Zhang, S. X. (2014). When farmworkers and advocates see trafficking but law enforcement does not: Challenges in identifying labor trafficking in North Carolina. Crime, Law and Social Change, 61(2), 205–214."><span data-dcnode-id="3490" instrument_node="">4</span></a><span data-dcnode-id="3488" instrument_node="">, </span><a aria-label="Reference 32" data-dcnode-id="3486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d96153238e366" title="Farrell, A., Owens, C., &amp; McDevitt, J. (2014). New laws but few cases: Understanding the challenges to the investigation and prosecution of human trafficking cases. Crime, Law and Social Change, 61(2), 139–168."><span data-dcnode-id="3487" instrument_node="">32</span></a><span data-dcnode-id="3485" instrument_node="">]), numerous European countries (e.g. [</span><a aria-label="Reference 2" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d96153238e369" title="Antal, I., &amp; Laszlo, E. (2015) The Situation of Human Trafficking for Labour Exploitation in Romania. In 2nd International Multidisciplinary Scientific Conference on Social Sciences and Arts, Albena,: SGEM."><span data-dcnode-id="3484" instrument_node="">2</span></a><span data-dcnode-id="3482" instrument_node="">, </span><a aria-label="Reference 45" data-dcnode-id="3480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d96153238e372" title="Jokinen, A., Ollus, N., &amp; Aromaa, K. (2011). Trafficking for forced labour and labour exploitation in Finland, Poland and Estonia. Helsinki: HEUNI."><span data-dcnode-id="3481" instrument_node="">45</span></a><span data-dcnode-id="3479" instrument_node="">, </span><a aria-label="Reference 58" data-dcnode-id="3477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d96153238e375" title="Oram, S., Ostrovschi, N. V., Gorceag, V. I., Hotineanu, M. A., Gorceag, L., Trigub, C., et al. (2012). Physical health symptoms reported by trafficked women receiving post-trafficking support in Moldova: Prevalence. severity and associated factors. BMC Women's Health, 12(1), 1–9."><span data-dcnode-id="3478" instrument_node="">58</span></a><span data-dcnode-id="3476" instrument_node="">, </span><a aria-label="Reference 63" data-dcnode-id="3474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d96153238e379" title="Rijken, C. (2011). Combatting trafficking in human beings for labour exploitation. Nijmegen: Wolf Legal Publishers."><span data-dcnode-id="3475" instrument_node="">63</span></a><span data-dcnode-id="3473" instrument_node="">]) and elsewhere, responses to trafficking&nbsp;for purposes other&nbsp;than sex remain comparatively underdeveloped.</span></p><p data-dcnode-id="3440"><span data-dcnode-id="3471" instrument_node="">Some researchers attribute the dominant focus on sexual exploitation and associated gendering of the trafficking discourse to its roots in widespread (and since debunked) panic about the ‘white slave trade’ in the early twentieth Century [</span><a aria-label="Reference 24" data-dcnode-id="3469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d96153238e385" title="Doezema, J. (1999). Loose women or lost women? The re-emergence of the myth of white slavery in contemporary discourses of trafficking in women. [journal article]. Gender Issues, 18(1), 23–50. 
                    https://doi.org/10.1007/s12147-999-0021-9.
                    
                  
                        "><span data-dcnode-id="3470" instrument_node="">24</span></a><span data-dcnode-id="3468" instrument_node="">, </span><a aria-label="Reference 25" data-dcnode-id="3466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d96153238e388" title="Doezema, J. (2013). Sex slaves and discourse masters: The construction of trafficking. London: Zed Books Ltd.."><span data-dcnode-id="3467" instrument_node="">25</span></a><span data-dcnode-id="3465" instrument_node="">, </span><a aria-label="Reference 48" data-dcnode-id="3463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d96153238e391" title="Knepper, P. (2012). Measuring the threat of global crime: Insights from research by the league of nations into the traffic in women. Criminology, 50(3), 777–809."><span data-dcnode-id="3464" instrument_node="">48</span></a><span data-dcnode-id="3462" instrument_node="">]. In New York, for example, concerns about the alleged large-scale abduction and sale of (white) women and girls by ‘foreigners’ for prostitution</span><sup data-dcnode-id="3457"><a data-dcnode-id="3458" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Footnote </span></span><span data-dcnode-id="3459" instrument_node="">2</span></a></sup><span data-dcnode-id="3456" instrument_node=""> proved the defining issue of the 1909 elections [</span><a aria-label="Reference 48" data-dcnode-id="3454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d96153238e400" title="Knepper, P. (2012). Measuring the threat of global crime: Insights from research by the league of nations into the traffic in women. Criminology, 50(3), 777–809."><span data-dcnode-id="3455" instrument_node="">48</span></a><span data-dcnode-id="3453" instrument_node="">]. Early attempts to investigate the ‘white slave trade’ came amid a broader campaign for ‘social hygiene’, entwined with an abolitionist stance on prostitution, a moralising agenda, xenophobia and fears of racial contamination [</span><a aria-label="Reference 48" data-dcnode-id="3451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d96153238e404" title="Knepper, P. (2012). Measuring the threat of global crime: Insights from research by the league of nations into the traffic in women. Criminology, 50(3), 777–809."><span data-dcnode-id="3452" instrument_node="">48</span></a><span data-dcnode-id="3450" instrument_node="">]. As concerns escalated internationally over the first part of the twentieth Century, various international conventions were adopted that focused on protecting women and children (more accurately, girls) from prostitution</span><sup data-dcnode-id="3445"><a data-dcnode-id="3446" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Footnote </span></span><span data-dcnode-id="3447" instrument_node="">3</span></a></sup><span data-dcnode-id="3444" instrument_node=""> [</span><a aria-label="Reference 35" data-dcnode-id="3442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d96153238e413" title="Goodey, J. (2008). Human trafficking sketchy data and policy responses. Criminology and Criminal Justice, 8(4), 421–442."><span data-dcnode-id="3443" instrument_node="">35</span></a><span data-dcnode-id="3441" instrument_node="">].</span></p><p data-dcnode-id="3384"><span data-dcnode-id="3439" instrument_node="">The historic tendency to conflate human trafficking with sex trafficking and that in turn with all sex work/prostitution persists today. This conflation is most obvious among the religious right and ‘abolitionist feminist’</span><sup data-dcnode-id="3434"><a data-dcnode-id="3435" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Footnote </span></span><span data-dcnode-id="3436" instrument_node="">4</span></a></sup><span data-dcnode-id="3433" instrument_node=""> lobby in the US, whom Weitzer [</span><a aria-label="Reference 83" data-dcnode-id="3431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d96153238e428" title="Weitzer, R. (2007). The social construction of sex trafficking: Ideology and institutionalization of a moral crusade. Politics and Society, 35(3), 447–475."><span data-dcnode-id="3432" instrument_node="">83</span></a><span data-dcnode-id="3430" instrument_node="">] describes as co-opting human trafficking in a ‘moral crusade’ against prostitution. A notable recent development was the enactment of FOSTA-SESTA legislation in 2018: although the law purportedly tackles internet-enabled sex trafficking (the acronyms stand respectively for ‘Allow Victims to </span><b data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">F</span></b><span data-dcnode-id="3427" instrument_node="">ight </span><b data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">O</span></b><span data-dcnode-id="3424" instrument_node="">nline </span><b data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">S</span></b><span data-dcnode-id="3421" instrument_node="">ex </span><b data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">T</span></b><span data-dcnode-id="3418" instrument_node="">rafficking </span><b data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">A</span></b><span data-dcnode-id="3415" instrument_node="">ct’ and ‘</span><b data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">S</span></b><span data-dcnode-id="3412" instrument_node="">top </span><b data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">E</span></b><span data-dcnode-id="3409" instrument_node="">nabling </span><b data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">S</span></b><span data-dcnode-id="3406" instrument_node="">ex </span><b data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">T</span></b><span data-dcnode-id="3403" instrument_node="">raffickers </span><b data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">A</span></b><span data-dcnode-id="3400" instrument_node="">ct’), critics argue that its effectiveness has been overstated and it has pushed sex trafficking further underground and harmed consenting sex workers (see, e.g. [</span><a aria-label="Reference 9" data-dcnode-id="3398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d96153238e463" title="Brooks-Gordon, B., &amp; Sanders, T. (2018). Banning sex work advertising online will put sex workers in danger. The Independent. Retrieved from

."><span data-dcnode-id="3374" instrument_node="">37</span></a><i data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">,</span></i><a aria-label="Reference 42" data-dcnode-id="3369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d96153238e493" title="Hoff, S. (2014). Where is the funding for anti-trafficking work? A look at donor funds, policies and practices in Europe. Anti-Trafficking Review(3)."><span data-dcnode-id="3370" instrument_node="">42</span></a><i data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">,</span></i><a aria-label="Reference 62" data-dcnode-id="3365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d96153238e497" title="Reed, S., Roe, S., Grimshaw, J., &amp; Oliver, R. (2018). The economic and social costs of modern slavery. London: Home Office."><span data-dcnode-id="3366" instrument_node="">62</span></a><i data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">,</span></i><a aria-label="Reference 84" data-dcnode-id="3361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d96153238e502" title="Weitzer, R. (2015). Human trafficking and contemporary slavery. Annual Review of Sociology, 41, 223–242."><span data-dcnode-id="3362" instrument_node="">84</span></a><i data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">]</span></i><span data-dcnode-id="3358" instrument_node="">). Yet, for all this activity there has been remarkably little robust data-driven research on human trafficking and how best to tackle it [</span><a aria-label="Reference 12" data-dcnode-id="3356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-                   ."><span data-dcnode-id="3357" instrument_node="">12</span></a><span data-dcnode-id="3355" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="3353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d96153238e510" title="Laczko, F., &amp; Gozdziak, E. (2005). Data and Research on Human Trafficking. In Data and research on human trafficking: A global survey. Geneva: International Organization for Migration."><span data-dcnode-id="3354" instrument_node="">50</span></a><span data-dcnode-id="3352" instrument_node="">, </span><a aria-label="Reference 71" data-dcnode-id="3350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d96153238e513" title="Tyldum, G. (2010). Limitations in research on human trafficking. International Migration, 48(5), 1–13."><span data-dcnode-id="3351" instrument_node="">71</span></a><span data-dcnode-id="3349" instrument_node="">, </span><a aria-label="Reference 81" data-dcnode-id="3347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d96153238e516" title="Van Der Laan, P., Smit, M., Busschers, I., &amp; Aarten, P. (2011). Cross-border trafficking in human beings: Prevention and intervention strategies for reducing sexual exploitation: A systematic review. Campbell Systematic Reviews, 7(9)."><span data-dcnode-id="3348" instrument_node="">81</span></a><span data-dcnode-id="3346" instrument_node="">, </span><a aria-label="Reference 85" data-dcnode-id="3344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d96153238e520" title="Zhang, S. X. (2009). Beyond the ‘Natasha’story–a review and critique of current research on sex trafficking. Global Crime, 10(3), 178–195."><span data-dcnode-id="3345" instrument_node="">85</span></a><span data-dcnode-id="3343" instrument_node="">]. Other longstanding criticisms of the trafficking literature include its limited scope, spurious statistics, methodological opacity and weaknesses, dubious assumptions and exaggerated and ill-substantiated claims [</span><a aria-label="Reference 12" data-dcnode-id="3341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e523" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360.

                  ."><span data-dcnode-id="3342" instrument_node="">12</span></a><span data-dcnode-id="3340" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="3338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d96153238e526" title="Goodey, J. (2008). Human trafficking sketchy data and policy responses. Criminology and Criminal Justice, 8(4), 421–442."><span data-dcnode-id="3339" instrument_node="">35</span></a><span data-dcnode-id="3337" instrument_node="">, </span><a aria-label="Reference 37" data-dcnode-id="3335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d96153238e529" title="Gozdziak, E., &amp; Bump, M. (2008). Data and research on human trafficking: Bibliography of research-based literature. Washington, D.C.: Georgetown University."><span data-dcnode-id="3336" instrument_node="">37</span></a><span data-dcnode-id="3334" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="3332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d96153238e532" title="Laczko, F., &amp; Gozdziak, E. (2005). Data and Research on Human Trafficking. In Data and research on human trafficking: A global survey. Geneva: International Organization for Migration."><span data-dcnode-id="3333" instrument_node="">50</span></a><span data-dcnode-id="3331" instrument_node="">, </span><a aria-label="Reference 71" data-dcnode-id="3329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d96153238e535" title="Tyldum, G. (2010). Limitations in research on human trafficking. International Migration, 48(5), 1–13."><span data-dcnode-id="3330" instrument_node="">71</span></a><span data-dcnode-id="3328" instrument_node="">, </span><a aria-label="Reference 85" data-dcnode-id="3326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d96153238e539" title="Zhang, S. X. (2009). Beyond the ‘Natasha’story–a review and critique of current research on sex trafficking. Global Crime, 10(3), 178–195."><span data-dcnode-id="3327" instrument_node="">85</span></a><span data-dcnode-id="3325" instrument_node="">]. One of the most enduring, pronounced and widely recognised skews in the literature is its overwhelming focus on sex trafficking at the expense of other types, such as trafficking for domestic servitude and other forms of labour exploitation [</span><a aria-label="Reference 1" data-dcnode-id="3323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d96153238e542" title="Andrees, B., &amp; van der Linden, M. N. J. (2005). Designing trafficking research from a labour market perspective: The ILO Experience1. International Migration, 43(1–2), 55–73."><span data-dcnode-id="3324" instrument_node="">1</span></a><span data-dcnode-id="3322" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="3320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e545" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360. 
                    https://doi.org/10.1007/s11292-017-9321-3
                    
                  ."><span data-dcnode-id="3321" instrument_node="">12</span></a><span data-dcnode-id="3319" instrument_node="">, </span><a aria-label="Reference 37" data-dcnode-id="3317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d96153238e548" title="Gozdziak, E., &amp; Bump, M. (2008). Data and research on human trafficking: Bibliography of research-based literature. Washington, D.C.: Georgetown University."><span data-dcnode-id="3318" instrument_node="">37</span></a><span data-dcnode-id="3316" instrument_node="">, </span><a aria-label="Reference 47" data-dcnode-id="3314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d96153238e551" title="Kelly, L. (2005). “You can find anything you want”: A critical reflection on research on trafficking in persons within and into Europe. International Migration, 43(1–2), 235–265."><span data-dcnode-id="3315" instrument_node="">47</span></a><span data-dcnode-id="3313" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="3311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d96153238e554" title="Laczko, F., &amp; Gozdziak, E. (2005). Data and Research on Human Trafficking. In Data and research on human trafficking: A global survey. Geneva: International Organization for Migration."><span data-dcnode-id="3312" instrument_node="">50</span></a><span data-dcnode-id="3310" instrument_node="">, </span><a aria-label="Reference 67" data-dcnode-id="3308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d96153238e558" title="Surtees, R. (2008). Trafficking of men–a trend less considered: The case of Ukraine and Belarus. International Organization for Migration, Migration Research Series, 36."><span data-dcnode-id="3309" instrument_node="">67</span></a><span data-dcnode-id="3307" instrument_node="">].</span></p><p data-dcnode-id="3283"><span data-dcnode-id="3305" instrument_node="">While the vast majority of trafficking cases identified globally in the early twenty-first Century involved sexual exploitation, the past decade has seen a marked shift [</span><a aria-label="Reference 78" data-dcnode-id="3303" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e565" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="3304" instrument_node="">78</span></a><span data-dcnode-id="3302" instrument_node="">]. Indeed, some experts argue that that labour trafficking may actually be more prevalent than sex trafficking but has likely been comparatively under-detected so far– and thus is underrepresented in official statistics (e.g., [</span><a aria-label="Reference 77" data-dcnode-id="3300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d96153238e568" title="United Nations Office on Drugs and Crime. (2009). Trafficking in persons: A global report. Vienna: United Nations Office on Drugs and Crime."><span data-dcnode-id="3301" instrument_node="">77</span></a><span data-dcnode-id="3299" instrument_node="">, </span><a aria-label="Reference 85" data-dcnode-id="3297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d96153238e571" title="Zhang, S. X. (2009). Beyond the ‘Natasha’story–a review and critique of current research on sex trafficking. Global Crime, 10(3), 178–195."><span data-dcnode-id="3298" instrument_node="">85</span></a><span data-dcnode-id="3296" instrument_node="">]). Using data from a combination of sources, the most recent United Nations Global Report on Trafficking in Persons reported a total of 19,929 identified victims in 2014 across 81 countries and all trafficking types [</span><a aria-label="Reference 78" data-dcnode-id="3294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e574" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="3295" instrument_node="">78</span></a><span data-dcnode-id="3293" instrument_node="">]. Such identified cases undoubtedly represent just a fraction of the true trafficking problem (see, e.g., [</span><a aria-label="Reference 19" data-dcnode-id="3291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e577" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="3292" instrument_node="">19</span></a><span data-dcnode-id="3290" instrument_node="">]). Notably, the report highlighted the changing composition of cases identified between 2004 and 2014. For example, the proportion of male victims and child victims both increased over this period (respectively from 13% to 21% and 13% to 28%) and the share of sex trafficking victims fell (from 59% to 54%). These and other such changes are thought to reflect an evolution in how human trafficking is understood and a move away from the dominant focus on ‘women trafficked from afar into an affluent country for sexual exploitation’ ([</span><a aria-label="Reference 78" data-dcnode-id="3288" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e581" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="3289" instrument_node="">78</span></a><span data-dcnode-id="3287" instrument_node="">], p.6). The report also found clear variations between regions in the types of trafficking identified, demonstrating that ‘[g]lobal averages mask marked regional differences’ and highlighting the need for geographically-specific enquiries ([</span><a aria-label="Reference 78" data-dcnode-id="3285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e584" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="3286" instrument_node="">78</span></a><span data-dcnode-id="3284" instrument_node="">], p.24).</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3282" instrument_node="">The current study focuses on the UK, which is an affluent country and well-recognised destination for international trafficking. It is also comparatively advanced in terms of its counter-trafficking responses - although tensions exist between aspirations towards global anti-slavery leadership and the realities of austerity, harsh immigration policies, rising xenophobia </span><i data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">etc</span></i><span data-dcnode-id="3279" instrument_node=""> [</span><a aria-label="Reference 52" data-dcnode-id="3277" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d96153238e593" title="McQuade, A. (2019, 10/01/19). A poisoned chalice? Challenges for the UK's next anti-slavery commissioner. Thomson Reuters Foundation. Retrieved from 
                    http://news.trust.org/item/20190110113524-3ype1/
                    
                  . Accessed 5/3/19"><span data-dcnode-id="3278" instrument_node="">52</span></a><span data-dcnode-id="3276" instrument_node="">]. The UK government last estimated that there were 10,000–13,000 victims of trafficking in the UK [</span><a aria-label="Reference 64" data-dcnode-id="3274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d96153238e596" title="Silverman, B. (2014). Modern slavery: An application of multiple systems estimation. London: Home Office."><span data-dcnode-id="3275" instrument_node="">64</span></a><span data-dcnode-id="3273" instrument_node="">], although these figures are now dated and likely underestimate the true prevalence. Over the past decade, the UK has seen both a steady increase in the volume of suspected trafficking identified and diversification in the forms of exploitation involved [</span><a aria-label="Reference 18" data-dcnode-id="3271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d96153238e599" title="Cockbain, E., &amp; Olver, K. (2019). Child trafficking: characteristics, complexities and challenges. In I. Bryce, W. Petherick, &amp; Y. Robinson (Eds.), Child Abuse and Neglect: Forensic Issues in Evidence, Impact and Management (pp. 95–116). New York: Elsevier"><span data-dcnode-id="3272" instrument_node="">18</span></a><span data-dcnode-id="3270" instrument_node="">]. In 2006/2007, all identified victims of trafficking in the UK were subject to sexual exploitation [</span><a aria-label="Reference 77" data-dcnode-id="3268" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d96153238e602" title="United Nations Office on Drugs and Crime. (2009). Trafficking in persons: A global report. Vienna: United Nations Office on Drugs and Crime."><span data-dcnode-id="3269" instrument_node="">77</span></a><span data-dcnode-id="3267" instrument_node="">]. In 2017, 34% of of suspected victims of modern slavery</span><sup data-dcnode-id="3262"><a data-dcnode-id="3263" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Footnote </span></span><span data-dcnode-id="3264" instrument_node="">5</span></a></sup><span data-dcnode-id="3261" instrument_node=""> referred to the National Crime Agency were linked to sexual exploitation, 46% to labour exploitation and 9% to domestic servitude [</span><a aria-label="Reference 53" data-dcnode-id="3259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d96153238e615" title="National Crime Agency. (2018). Modern slavery and human trafficking: National Referral Mechanism Statistics Annual Report 2017. London: National Crime Agency."><span data-dcnode-id="3260" instrument_node="">53</span></a><span data-dcnode-id="3258" instrument_node="">]. The total number of referrals received annually virtually tripled between 2013 (</span><i data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">n</span></i><span data-dcnode-id="3255" instrument_node=""> = 1745) and 2017 (</span><i data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">n</span></i><span data-dcnode-id="3252" instrument_node=""> = 5145). Meanwhile, police in England and Wales recorded 3337 modern slavery offences in the year to end March 2018, up 49% on the previous year [</span><a aria-label="Reference 56" data-dcnode-id="3250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d96153238e624" title="Office for National Statistics. (2018). Crime in England and Wales: Year ending march 2018. Newport: Office for National Statistics."><span data-dcnode-id="3251" instrument_node="">56</span></a><span data-dcnode-id="3249" instrument_node="">] (police in Scotland and Northern Ireland recorded another 60 and 31 respectively, see [</span><a aria-label="Reference 39" data-dcnode-id="3247" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d96153238e627" title="HM Government, Department of Justice Northern Ireland, The Scottish Government, &amp; Government, W. (2018). 2018 UK annual report on modern slavery. London: HM Government."><span data-dcnode-id="3248" instrument_node="">39</span></a><span data-dcnode-id="3246" instrument_node="">]). Since the police recorded crime data are published in the aggregate it is unclear how these offences were distributed across different forms of trafficking and exploitation.</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3244" instrument_node="">Both nationally and transnationally, impetus is growing to improve understanding and responses to all forms of human trafficking, not just sex trafficking (e.g.</span><i data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">,</span></i><span data-dcnode-id="3241" instrument_node=""> [</span><a aria-label="Reference 27" data-dcnode-id="3239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d96153238e636" title="European Commission (2012). The EU Strategy towards the Eradication of Trafficking in Human Beings 2012–2016. Brussels: European Commission."><span data-dcnode-id="3240" instrument_node="">27</span></a><span data-dcnode-id="3238" instrument_node="">, </span><a aria-label="Reference 36" data-dcnode-id="3236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d96153238e639" title="Government of the Netherlands (2016). Team work! Manual for experts on multidisciplinary cooperation against trafficking in human beings for labour exploitation. The Hague: Government of the Netherlands."><span data-dcnode-id="3237" instrument_node="">36</span></a><span data-dcnode-id="3235" instrument_node="">, </span><a aria-label="Reference 44" data-dcnode-id="3233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d96153238e642" title="Home Office. (2014b). Modern Slavery Strategy. London: Her Majesty's Stationery Office."><span data-dcnode-id="3234" instrument_node="">44</span></a><span data-dcnode-id="3232" instrument_node="">, </span><a aria-label="Reference 72" data-dcnode-id="3230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d96153238e645" title="U.S. Department of State. (2014). Trafficking in persons report June 2014. Washington, D.C.: U.S. Department of State."><span data-dcnode-id="3231" instrument_node="">72</span></a><span data-dcnode-id="3229" instrument_node="">]). Indicative of a shift towards treating human trafficking as a broader labour market issue, the United Nations [</span><a aria-label="Reference 76" data-dcnode-id="3227" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d96153238e649" title="United Nations. (2015). Sustainable development goals: 17 goals to transform our world. New York: United Nations."><span data-dcnode-id="3228" instrument_node="">76</span></a><span data-dcnode-id="3226" instrument_node="">] positioned its target of taking ‘immediate and effective measures to.. end modern slavery and human trafficking’ under its Sustainable Development Goal of ‘decent work and economic growth’.</span></p><p data-dcnode-id="3184"><span data-dcnode-id="3224" instrument_node="">It is increasingly clear that human trafficking belongs on a broader spectrum of exploitation, coercion and consent, rather being than a neatly delineated phenomenon that exists in absolute terms [</span><a aria-label="Reference 50" data-dcnode-id="3222" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d96153238e655" title="Laczko, F., &amp; Gozdziak, E. (2005). Data and Research on Human Trafficking. In Data and research on human trafficking: A global survey. Geneva: International Organization for Migration."><span data-dcnode-id="3223" instrument_node="">50</span></a><span data-dcnode-id="3221" instrument_node="">, </span><a aria-label="Reference 55" data-dcnode-id="3219" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d96153238e658" title="O'Connell Davidson, J. (2015). Modern slavery: The margins of freedom. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="3220" instrument_node="">55</span></a><span data-dcnode-id="3218" instrument_node="">, </span><a aria-label="Reference 61" data-dcnode-id="3216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d96153238e661" title="Quirk, J. (2011). The anti-slavery project: From the slave trade to human trafficking. Philadelphia: University of Pennsylvania Press."><span data-dcnode-id="3217" instrument_node="">61</span></a><span data-dcnode-id="3215" instrument_node="">, </span><a aria-label="Reference 65" data-dcnode-id="3213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d96153238e664" title="Skeldon, R. (2000). Trafficking: A perspective from Asia. International Migration, 38(3), 7–30."><span data-dcnode-id="3214" instrument_node="">65</span></a><span data-dcnode-id="3212" instrument_node="">, </span><a aria-label="Reference 66" data-dcnode-id="3210" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d96153238e667" title="Spencer, J., &amp; Broad, R. (2012). The ‘groundhog day’of the human trafficking for sexual exploitation debate: New directions in criminological understanding. European journal on criminal policy and research, 18(3), 269–281."><span data-dcnode-id="3211" instrument_node="">66</span></a><span data-dcnode-id="3209" instrument_node="">, </span><a aria-label="Reference 84" data-dcnode-id="3207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d96153238e671" title="Weitzer, R. (2015). Human trafficking and contemporary slavery. Annual Review of Sociology, 41, 223–242."><span data-dcnode-id="3208" instrument_node="">84</span></a><span data-dcnode-id="3206" instrument_node="">]. The breadth and inclusivity of trafficking definitions leave obvious scope for inconsistency in their interpretation and operationalisation, whereby factors including individuals’ and agencies’ experiences, priorities and awareness can affect what is identified and recorded as trafficking [</span><a aria-label="Reference 8" data-dcnode-id="3204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d96153238e674" title="Brayley, H., &amp; Cockbain, E. (2014). British children can be trafficked too: Towards an inclusive definition of internal child sex trafficking. Child Abuse Review, 23(3), 171–184. 
                    https://doi.org/10.1002/car.2307
                    
                  ."><span data-dcnode-id="3205" instrument_node="">8</span></a><span data-dcnode-id="3203" instrument_node="">, </span><a aria-label="Reference 10" data-dcnode-id="3201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d96153238e677" title="Brunovskis, A., &amp; Surtees, R. (this issue). Identifying trafficked migrants and refugees along the Balkan route. Exploring boundaries of exploitation, vulnerability and risk. Crime, Law and Social Change."><span data-dcnode-id="3202" instrument_node="">10</span></a><span data-dcnode-id="3200" instrument_node="">, </span><a aria-label="Reference 19" data-dcnode-id="3198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e680" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="3199" instrument_node="">19</span></a><span data-dcnode-id="3197" instrument_node="">, </span><a aria-label="Reference 31" data-dcnode-id="3195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d96153238e683" title="Farrell, A. (2014). Environmental and institutional influences on police agency responses to human trafficking. Police Quarterly, 17(1), 3–29."><span data-dcnode-id="3196" instrument_node="">31</span></a><span data-dcnode-id="3194" instrument_node="">, </span><a aria-label="Reference 32" data-dcnode-id="3192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d96153238e686" title="Farrell, A., Owens, C., &amp; McDevitt, J. (2014). New laws but few cases: Understanding the challenges to the investigation and prosecution of human trafficking cases. Crime, Law and Social Change, 61(2), 139–168."><span data-dcnode-id="3193" instrument_node="">32</span></a><span data-dcnode-id="3191" instrument_node="">, </span><a aria-label="Reference 60" data-dcnode-id="3189" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d96153238e690" title="Pearce, J. (2011). Working with trafficked children and young people: Complexities in practice. British Journal of Social Work, 41(8), 1424–1441. 
                    https://doi.org/10.1093/bjsw/bcr029
                    
                  ."><span data-dcnode-id="3190" instrument_node="">60</span></a><span data-dcnode-id="3188" instrument_node="">]. Such considerations notwithstanding, much can be learnt by examining instances identified as human trafficking to advance understanding of this complex phenomenon and support more nuanced and evidence-informed policy and practice (see also [</span><a aria-label="Reference 10" data-dcnode-id="3186" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d96153238e693" title="Brunovskis, A., &amp; Surtees, R. (this issue). Identifying trafficked migrants and refugees along the Balkan route. Exploring boundaries of exploitation, vulnerability and risk. Crime, Law and Social Change."><span data-dcnode-id="3187" instrument_node="">10</span></a><span data-dcnode-id="3185" instrument_node="">]).</span></p><p data-dcnode-id="3158"><span data-dcnode-id="3183" instrument_node="">There are solid theoretical and empirical reasons to hypothesise that differences exist between victims of different types of trafficking, for example in terms of their socio-demographic characteristics, trafficking experiences and official responses. From a theoretical perspective, opportunity theories of crime help explain why crimes are not uniformly distributed but rather concentrate in certain places, times, people and targets (see, e.g. [</span><a aria-label="Reference 6" data-dcnode-id="3181" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d96153238e699" title="Brantingham, P. J., &amp; Brantingham, P. L. (1984). Patterns in crime. New York: Macmillan."><span data-dcnode-id="3182" instrument_node="">6</span></a><span data-dcnode-id="3180" instrument_node="">, </span><a aria-label="Reference 7" data-dcnode-id="3178" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d96153238e702" title="Brantingham, P. J., &amp; Brantingham, P. L. (1993). Environment, routine and situation: Toward a pattern theory of crime. Advances in Criminological Theory, 5, 259–294."><span data-dcnode-id="3179" instrument_node="">7</span></a><span data-dcnode-id="3177" instrument_node="">, </span><a aria-label="Reference 20" data-dcnode-id="3175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d96153238e705" title="Cohen, L. E., &amp; Felson, M. (1979). Social change and crime rate trends: A routine activity approach. American Sociological Review, 44, 588–608."><span data-dcnode-id="3176" instrument_node="">20</span></a><span data-dcnode-id="3174" instrument_node="">, </span><a aria-label="Reference 30" data-dcnode-id="3172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d96153238e708" title="Everson, S. (2003). Repeat victimisation and prolific offending: Chance or choice? International Journal of Police Science &amp; Management, 5(3), 180–194."><span data-dcnode-id="3173" instrument_node="">30</span></a><span data-dcnode-id="3171" instrument_node="">, </span><a aria-label="Reference 33" data-dcnode-id="3169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d96153238e711" title="Farrell, G., &amp; Pease, K. (2001). Why repeat victimization matters. In G. Farrell, &amp; K. Pease (Eds.), Repeat Victimization (12 ed., pp. 1–4, Crime Prevention Studies). Monsey: Criminal Justice Press."><span data-dcnode-id="3170" instrument_node="">33</span></a><span data-dcnode-id="3168" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="3166" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d96153238e715" title="Felson, M., &amp; Eckert, M. (2015). Crime and everyday life (Fifth ed.). London: Sage."><span data-dcnode-id="3167" instrument_node="">34</span></a><span data-dcnode-id="3165" instrument_node="">]). Understanding the distribution of </span><i data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">specific</span></i><span data-dcnode-id="3162" instrument_node=""> crime types (often within a general category, such as distinguishing between residential and commercial burglary) can help provide insights into their drivers and enablers and inform targeted interventions. The rational choice perspective positions offenders as quasi-rational decision makers who act to maximise rewards, while minimising risks [</span><a aria-label="Reference 21" data-dcnode-id="3160" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d96153238e721" title="Cornish, D. B., &amp; Clarke, R. V. (1986). The reasoning criminal: Rational choice perspectives on offending. New York: Springer."><span data-dcnode-id="3161" instrument_node="">21</span></a><span data-dcnode-id="3159" instrument_node="">]. In this respect, one would expect the different market realities (gaps, demands etc.) of the sex industry, domestic servitude and other labour markets to influence who traffickers recruit and where and how they exploit them.</span></p><p data-dcnode-id="3135"><span data-dcnode-id="3157" instrument_node="">National and international statistical data highlight important empirical distinctions between the different trafficking types. A classic example is gender: in the UK and internationally, the proportion of men is typically far higher among those identified as trafficked or potentially trafficked for labour than for sex (e.g. [</span><a aria-label="Reference 29" data-dcnode-id="3155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d96153238e727" title="Eurostat (2015). Trafficking in human beings. 2015 edition. Luxembourg: Publications Office of the European Union."><span data-dcnode-id="3156" instrument_node="">29</span></a><span data-dcnode-id="3154" instrument_node="">, </span><a aria-label="Reference 53" data-dcnode-id="3152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d96153238e730" title="National Crime Agency. (2018). Modern slavery and human trafficking: National Referral Mechanism Statistics Annual Report 2017. London: National Crime Agency."><span data-dcnode-id="3153" instrument_node="">53</span></a><span data-dcnode-id="3151" instrument_node="">, </span><a aria-label="Reference 78" data-dcnode-id="3149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e733" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="3150" instrument_node="">78</span></a><span data-dcnode-id="3148" instrument_node="">]). Yet, published comparisons of trafficking types tend to be purely descriptive and made only at a bivariate level; inferential statistics are rarely used to test the relationships observed. These limitations are reflective of wider shortcomings in the trafficking literature, namely the scarcity of robust quantitative research [</span><a aria-label="Reference 12" data-dcnode-id="3146" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e736" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360. 
                    https://doi.org/10.1007/s11292-017-9321-3
                    
                  ."><span data-dcnode-id="3147" instrument_node="">12</span></a><span data-dcnode-id="3145" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="3143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d96153238e739" title="Laczko, F., &amp; Gozdziak, E. (2005). Data and Research on Human Trafficking. In Data and research on human trafficking: A global survey. Geneva: International Organization for Migration."><span data-dcnode-id="3144" instrument_node="">50</span></a><span data-dcnode-id="3142" instrument_node="">]. One of the biggest barriers academics face in conducting quantitative research into the differences between trafficking types is securing access to large-scale, individual-level datasets. Taking a qualitative approach, Efrat [</span><a aria-label="Reference 26" data-dcnode-id="3140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d96153238e743" title="Efrat, A. (2016). Global efforts against human trafficking: The misguided conflation of sex, labor. and organ trafficking. International Studies Perspectives, 17(1), 34–54."><span data-dcnode-id="3141" instrument_node="">26</span></a><span data-dcnode-id="3139" instrument_node="">] examined policy responses to the main forms of human trafficking encountered in Israel (sex, labour and organ trafficking) and concluded that ‘[b]y disregarding the differences between these phenomena and bundling them into a single concept, we compromise the analysis and design of counter-trafficking efforts’ [</span><a aria-label="Reference 26" data-dcnode-id="3137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d96153238e746" title="Efrat, A. (2016). Global efforts against human trafficking: The misguided conflation of sex, labor. and organ trafficking. International Studies Perspectives, 17(1), 34–54."><span data-dcnode-id="3138" instrument_node="">26</span></a><span data-dcnode-id="3136" instrument_node="">].</span></p><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">We designed the current study to investigate empirically and at scale whether significant differences exist between the three main categories of human trafficking encountered in the UK: trafficking for sexual exploitation, domestic servitude and other labour exploitation (hereafter simply ‘labour trafficking’). We address in turn two broad-based and interlinked research questions:</span></p><ul class="u-list-style-bullet" data-dcnode-id="3119"><span data-dcnode-id="3132" instrument_node="">
</span><li data-dcnode-id="3127"><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">What (if any) are the differences between these three trafficking types, in terms of individual victims’ demographics, the trafficking process and official responses?</span></p><span data-dcnode-id="3128" instrument_node="">
</span></li><span data-dcnode-id="3126" instrument_node="">
</span><li data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Which (if any) of these variables predict trafficking type?</span></p><span data-dcnode-id="3122" instrument_node="">
</span></li><span data-dcnode-id="3120" instrument_node="">
</span></ul></div></div></section><section data-dcnode-id="2979" data-title="Methods"><div class="c-article-section" data-dcnode-id="2980" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3114" id="Sec2"><span data-dcnode-id="3115" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="2981" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3112" id="Sec3"><span data-dcnode-id="3113" instrument_node="">Data</span></h3><p data-dcnode-id="3101"><span data-dcnode-id="3111" instrument_node="">Our data came from the UK’s central system for managing suspected cases of human trafficking: the National Referral Mechanism (NRM). Introduced to fulfil the UK’s obligations under the Council of Europe’s [</span><a aria-label="Reference 22" data-dcnode-id="3109" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d96153238e779" title="Council of Europe (2005). Council of Europe Convention on Action against Trafficking in Human Beings and its Explanatory Report. In C. o. Europe (Ed.), Treaty Series No. 197. Strasbourg: Council of Europe."><span data-dcnode-id="3110" instrument_node="">22</span></a><span data-dcnode-id="3108" instrument_node="">] Convention on Action against Trafficking in Human Beings, the NRM is a framework to standardise the identification of victims and provision of support services [</span><a aria-label="Reference 54" data-dcnode-id="3106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d96153238e782" title="National Crime Agency (in press). National Referral Mechanism. 
                    http://www.nationalcrimeagency.gov.uk/about-us/what-we-do/specialist-capabilities/uk-human-trafficking-centre/national-referral-mechanism
                    
                  . Accessed 24/4/18."><span data-dcnode-id="3107" instrument_node="">54</span></a><span data-dcnode-id="3105" instrument_node="">]. At the time, the NRM dealt only with human trafficking, although it has since been expanded to include other forms of modern slavery [</span><a aria-label="Reference 40" data-dcnode-id="3103" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d96153238e785" title="HM Government. (2014). Modern Slavery Strategy. London: Her Majesty's Stationery Office."><span data-dcnode-id="3104" instrument_node="">40</span></a><span data-dcnode-id="3102" instrument_node="">]. For context, we briefly explain how the NRM currently works. Referrals are made in a standard proforma by authorised ‘first responders’, such as law enforcement, social services and certain non-governmental organisations (NGOs). First responders may have identified potential victims themselves or been notified by third-parties (e.g. embassy staff). The National Crime Agency (NCA) initially assesses all referrals: depending on suspected victims’ immigration status, their cases are then processed by the NCA or transferred to UK Visas and Immigration (UKVI). The decision-making follows two stages; only those with a positive final (‘conclusive grounds’) decision are officially considered trafficking victims.</span></p><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Our data came from the central repository (spreadsheet) managed by the NCA, which routinely informs official reports but had not previously been made available to academics. It contains detailed individual-level data on everyone referred into the NRM. The NCA provided us anonymised data covering 6858 suspected victims of trafficking: the total population of referrals into the NRM from its inception on 1st April 2009 to the date of extraction on 7th October 2014.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3097" id="Sec4"><span data-dcnode-id="3098" instrument_node="">Final study sample</span></h4><p data-dcnode-id="3065"><span data-dcnode-id="3096" instrument_node="">We narrowed down the initial set of 6858 suspected victims to our final study sample. Since our focus was on those officially identified as victims, we began by excluding people assessed </span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">not</span></i><span data-dcnode-id="3093" instrument_node=""> to have been trafficked, for whom a decision was still pending, or whose referral had been withdrawn or suspended (</span><i data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">n =</span></i><span data-dcnode-id="3090" instrument_node="">&nbsp;4131). Notably, very similar proportions had been assessed to have been trafficked as not (39.8% versus 40.6%).</span><sup data-dcnode-id="3085"><a data-dcnode-id="3086" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Footnote </span></span><span data-dcnode-id="3087" instrument_node="">6</span></a></sup><span data-dcnode-id="3084" instrument_node=""> Next, we excluded those listed as trafficked for an ‘unknown’ purpose (</span><i data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">n</span></i><span data-dcnode-id="3081" instrument_node=""> = 95) (not relevant) or for organ harvesting (</span><i data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">n</span></i><span data-dcnode-id="3078" instrument_node=""> = 2) (too few for analysis). Our final study sample comprised 2630 confirmed cases of trafficking for sexual exploitation, domestic servitude and other labour exploitation over the 5.5&nbsp;year period. Note that the UK treats domestic servitude as a separate category rather than subsuming it under labour trafficking as some other countries do (see [</span><a aria-label="Reference 12" data-dcnode-id="3076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96153238e823" title="Cockbain, E., Bowers, K., &amp; Dimitrova, G. (2018). Human trafficking for labour exploitation: The results of a two-phase systematic review mapping the European evidence base and synthesising key scientific research evidence. Journal of Experimental Criminology, 14(3), 319–360. 
                    https://doi.org/10.1007/s11292-017-9321-3
                    
                  ."><span data-dcnode-id="3077" instrument_node="">12</span></a><span data-dcnode-id="3075" instrument_node="">]). The UK does so, to our knowledge, because of domestic servitude’s particular characteristics and challenges: for example, it is especially hidden (out of sight in private households), poorly-understood, less obviously and immediately associated with ‘organised crime’ and poses additional barriers to intervention [</span><a aria-label="Reference 5" data-dcnode-id="3073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d96153238e826" title="Bokhari, F. (2008). Falling through the gaps: Safeguarding children trafficked into the UK. Children &amp; Society, 22(3), 201–211."><span data-dcnode-id="3074" instrument_node="">5</span></a><span data-dcnode-id="3072" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="3070" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d96153238e829" title="Cockbain, E., &amp; Olver, K. (2019). Child trafficking: characteristics, complexities and challenges. In I. Bryce, W. Petherick, &amp; Y. Robinson (Eds.), Child Abuse and Neglect: Forensic Issues in Evidence, Impact and Management (pp. 95–116). New York: Elsevier"><span data-dcnode-id="3071" instrument_node="">18</span></a><span data-dcnode-id="3069" instrument_node="">, </span><a aria-label="Reference 60" data-dcnode-id="3067" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d96153238e832" title="Pearce, J. (2011). Working with trafficked children and young people: Complexities in practice. British Journal of Social Work, 41(8), 1424–1441. 
                    https://doi.org/10.1093/bjsw/bcr029
                    
                  ."><span data-dcnode-id="3068" instrument_node="">60</span></a><span data-dcnode-id="3066" instrument_node="">]. The ‘labour trafficking’ category as used in the UK is still broad, however, and covers exploitation across diverse licit and illicit industries (e.g. agriculture, factory work, construction, hospitality, benefit fraud, forced or sham marriages, organised shoplifting, cannabis cultivation etc.)</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3063" id="Sec5"><span data-dcnode-id="3064" instrument_node="">Analysis</span></h3><p data-dcnode-id="3055"><span data-dcnode-id="3062" instrument_node="">We cleaned and recoded the raw data, excluding some variables because of high rates of missing data, overlaps with other variables or limited relevance. Due to missing data, we had to drop several variables of clear research interest, such as mode of transport and port of entry. Table </span><a data-dcnode-id="3060" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3061" instrument_node="">1</span></a><span data-dcnode-id="3059" instrument_node=""> shows the final variables used in our analyses, grouped by category. For all of these variables bar one, complete information was available for ≥99% of cases. The variable ‘exploitation type’ captured the </span><i data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">main purpose</span></i><span data-dcnode-id="3056" instrument_node=""> for which had been trafficked and formed the basis for comparing the three trafficking types.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3040" data-test="inline-table" id="table-1"><figure data-dcnode-id="3041"><figcaption class="c-article-table__figcaption" data-dcnode-id="3052"><b data-dcnode-id="3053" data-test="table-caption" id="Tab1"><span data-dcnode-id="3054" instrument_node="">Table 1 Variables used in the analysis</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3042"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3043" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10611-019-09836-7/tables/1" rel="nofollow"><span data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3044" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3045" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3046" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3049" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3048" fill-rule="evenodd"></path><span data-dcnode-id="3047" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3026"><span data-dcnode-id="3039" instrument_node="">We began with an exploratory data analysis [</span><a aria-label="Reference 70" data-dcnode-id="3037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d96153238e1084" title="Tukey, J. W. (1977). Exploratory Data Analysis (Vol. 2). Reading, mass. Pearson."><span data-dcnode-id="3038" instrument_node="">70</span></a><span data-dcnode-id="3036" instrument_node="">], examining patterns descriptively and testing whether any differences between trafficking types were significant at the bivariate level. We then ran a multinomial logistic regression analysis to establish which variables were significant predictors of trafficking type (the outcome variable). We had to exclude from the regression analysis cases from the two least common regions (non-EEA Europe: </span><i data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">n</span></i><span data-dcnode-id="3033" instrument_node=""> = 202; and the Americas: </span><i data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">n</span></i><span data-dcnode-id="3030" instrument_node=""> = 10) since quasi/complete separation was present. Further cases (</span><i data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">n</span></i><span data-dcnode-id="3027" instrument_node=""> = 296) were automatically excluded because of missing information on one or more variables in the model.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3024" id="Sec6"><span data-dcnode-id="3025" instrument_node="">Risk of bias</span></h3><p data-dcnode-id="2986"><span data-dcnode-id="3023" instrument_node="">We consider the study’s general limitations in the discussion but – due to the complexities of the NRM data and their collection process - it is appropriate to flag several sources of potential bias specific
