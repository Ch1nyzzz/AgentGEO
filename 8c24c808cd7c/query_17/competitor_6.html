                  ."><span data-dcnode-id="2465" instrument_node="">12</span></a><span data-dcnode-id="2463" instrument_node="">] so the two are often aggregated in international research and reporting (e.g. [</span><a aria-label="Reference 29" data-dcnode-id="2461" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d96153238e1686" title="Eurostat (2015). Trafficking in human beings. 2015 edition. Luxembourg: Publications Office of the European Union."><span data-dcnode-id="2462" instrument_node="">29</span></a><span data-dcnode-id="2460" instrument_node="">, </span><a aria-label="Reference 78" data-dcnode-id="2458" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d96153238e1689" title="United Nations Office on Drugs and Crime. (2016). Global report on trafficking in persons (p. 2016). Vienna: United Nations Office on Drugs and Crime (UNODC)."><span data-dcnode-id="2459" instrument_node="">78</span></a><span data-dcnode-id="2457" instrument_node="">]). The significant differences identified here provide a clear argument for separating out domestic servitude in analysis and intervention. Despite the breadth of the labour trafficking category, we found clear distinctions between it and the other types. In future, it would be useful to delve further into intra-type variation, looking for example at how different forms of labour trafficking compare (although we are mindful of our on-going research showing many labour trafficking victims are exploited across various different industries, [</span><a aria-label="Reference 17" data-dcnode-id="2455" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d96153238e1692" title="Cockbain, E., &amp; Bowers, K. (2018). Applying data science techniques to human trafficking research. Paper presented at the United Nations on Drugs and Crime (UNODC) 4th International Conference on Governance, Crime and Justice Statistics, Lima, Peru."><span data-dcnode-id="2456" instrument_node="">17</span></a><span data-dcnode-id="2454" instrument_node="">, </span><a aria-label="Reference 19" data-dcnode-id="2452" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96153238e1695" title="Cockbain, E., Bowers, K., &amp; Vernon, L. (2019). Using law enforcement data in trafficking research. In J. Winterdyk &amp; J. Jones (Eds.), The Palgrave International Handbook of Human Trafficking. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="2453" instrument_node="">19</span></a><span data-dcnode-id="2451" instrument_node="">]).</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2449" instrument_node="">We have presented an initial study of differences between trafficking types based on the UK context alone. In future, it would be useful to replicate the study in other countries. There may well be interactions with other factors that vary by country, such as geographical positioning, migration policies and flows, legislative landscapes, labour market demands, social norms and counter-trafficking enforcement activity. An exciting development worth mentioning here is the Counter-Trafficking Data Collaborative (CTDC) (</span><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ctdatacollaborative.org/"><span data-dcnode-id="2448" instrument_node="">www.ctdatacollaborative.org</span></a><span data-dcnode-id="2446" instrument_node="">), an open-access hub with thousands of individual-level, anonymised entries for victims of human trafficking identified worldwide. This initiative and other on-going attempts to create accessible and comparable individual-level datasets on trafficking victims or incidents (we are not aware of any that focus on offenders, although they would be helpful too) could help break down data access-related barriers to quantitative research on human trafficking and facilitate a more vibrant research field.</span></p></div></div></section><section data-dcnode-id="2435" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="2436" id="Sec19-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2440" id="Sec19"><span data-dcnode-id="2441" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="2437" id="Sec19-content"><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Interest and investment in tackling human trafficking have grown dramatically over the past decades yet the bulk of attention has focused on sex trafficking. Drawing on an empirically-rich, individual-level dataset of thousands of trafficking victims identified in the UK, we found important and often nuanced distinctions between those trafficked for sex, labour and domestic servitude. While the results are by no means definitive, the study underscores the value of a detailed and disaggregated approach to monitoring, analysis, research and intervention. Replicating the research elsewhere would help understand whether and how differences in trafficking types vary according to local context. With better data, there would also be scope to examine how trafficking types compare on other dimensions. A much more nuanced understanding of human trafficking would yield important insights for explanation and intervention. Overall, the work shows that human trafficking is a diverse and complex phenomenon, improved data are sorely needed and a one-size-fits-all approach developed primarily to combat the trafficking of women and girls for sexual exploitation is insufficient.</span></p></div></div></section><span data-dcnode-id="2434" instrument_node="">
</span><section data-dcnode-id="2357" data-title="Notes"><div class="c-article-section" data-dcnode-id="2358" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2432" id="notes"><span data-dcnode-id="2433" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2359" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2360"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2419" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2420"><p data-dcnode-id="2421"><span data-dcnode-id="2431" instrument_node="">“Trafficking in persons’ shall mean the recruitment, transportation, transfer, harboring, or receipt of persons, by means of the threat or use of force or other forms of coercion, of abduction, of fraud, of deception, of the abuse of power, or of a position of vulnerability or of the giving or receiving of payments or benefits to achieve the consent of a person having control over another person, for the purpose of exploitation. Exploitation shall include, at a minimum, the exploitation of the prostitution of others or other forms of sexual exploitation, forced labour or services, slavery or practices similar to slavery, servitude or the removal of organs’ [</span><a aria-label="Reference 73" data-dcnode-id="2429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d96153238e342" title="UN (2000). United Nations convention against transnational organized crime. In UNGA (Ed.), (Vol. A/RES/55/25)."><span data-dcnode-id="2430" instrument_node="">73</span></a><span data-dcnode-id="2428" instrument_node="">]. Note that children (under 18&nbsp;year-olds) are a special case since they are deemed incapable of giving informed consent so can be classed as trafficked even where no ‘means’ is present [</span><a aria-label="Reference 28" data-dcnode-id="2426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d96153238e345" title="European Parliament (2011). Directive 2011/36/EU of the European Parliament and of the Council on preventing and combatting trafficking in human beings and protecting its victims. Strasbourg: European Parliament."><span data-dcnode-id="2427" instrument_node="">28</span></a><span data-dcnode-id="2425" instrument_node="">, </span><a aria-label="Reference 74" data-dcnode-id="2423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d96153238e348" title="UNICEF. (2003). End child exploitation: Stop the traffic! London: UNICEF UK."><span data-dcnode-id="2424" instrument_node="">74</span></a><span data-dcnode-id="2422" instrument_node="">].</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="2415" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="2416"><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Language around the sale of sex is divisive and highly charged. The term ‘prostitution’ still underpins much national law and policy but has been criticised for implying a fundamental lack of agency and bodily autonomy. We have tried to choose our language carefully and precisely, referring variously to ‘sex work’, ‘prostitution’ and ‘sexual exploitation’ depending on the specific context.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="2411" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="2412"><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">For example, the League of Nations’ 1921 ‘International Convention for the Suppression of the Traffic in Women and Children’ and the United Nations’ 1949 ‘Convention on the Suppression of Trafficking in Women and the Exploitation of Prostitution of Others’</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="2404" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="2405"><p data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node="">‘Abolitionist feminist’ refers to those taking the essentialist position that prostitution is inherently exploitative and an instrument of male domination and must therefore be eradicated (see [</span><a aria-label="Reference 83" data-dcnode-id="2408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d96153238e423" title="Weitzer, R. (2007). The social construction of sex trafficking: Ideology and institutionalization of a moral crusade. Politics and Society, 35(3), 447–475."><span data-dcnode-id="2409" instrument_node="">83</span></a><span data-dcnode-id="2407" instrument_node="">]).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="2397" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="2398"><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Particularly in affluent Anglophone countries – like the UK, United States and Australia – there has been a shift towards repackaging trafficking as ‘modern slavery’: an even broader umbrella construct that encompasses other forms of exploitation too [</span><a aria-label="Reference 55" data-dcnode-id="2401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d96153238e610" title="O'Connell Davidson, J. (2015). Modern slavery: The margins of freedom. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="2402" instrument_node="">55</span></a><span data-dcnode-id="2400" instrument_node="">]. We focus here on human trafficking as our data predate legislative change in the UK (Modern Slavery Act 2015 and similar laws in the devolved nations).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="2387" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="2388"><p data-dcnode-id="2389"><span data-dcnode-id="2396" instrument_node="">The rest had decisions pending (13.0%, </span><i data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">n</span></i><span data-dcnode-id="2393" instrument_node=""> = 893) or had been withdrawn, suspended or otherwise stalled (6.6%, </span><i data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">n</span></i><span data-dcnode-id="2390" instrument_node=""> = 454).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="2383" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="2384"><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">It is unknown how often repeat referrals occur across the NRM. In an on-going study, however, we found . &gt; 1% of 453 victims of labour trafficking were repeat referrals.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="2376" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="2377"><p data-dcnode-id="2378"><span data-dcnode-id="2382" instrument_node="">In grouping countries into regions, we followed the categorisation used by the United Nations Statistics Division [</span><a aria-label="Reference 79" data-dcnode-id="2380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d96153238e1278" title="United Nations Statistics Division (no date). Methodology: Standard country or area codes for statistical use (M49). 
                    https://unstats.un.org/unsd/methodology/m49/
                    
                  . Accessed 5/3/19."><span data-dcnode-id="2381" instrument_node="">79</span></a><span data-dcnode-id="2379" instrument_node="">], with additional division of European countries based on European Economic Area (EEA) membership. Our sample contained 36 African countries, six American, 16 EEA and 6 non-EEA Europe.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="2369" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="2370"><p data-dcnode-id="2371"><span data-dcnode-id="2375" instrument_node="">Police category includes 43 referrals from Gangmasters Licensing Authority (now Gangmasters and Labour Abuse Authority). All their referrals involved labour trafficking so we grouped them to avoid complete separation in the data. Differences between types cannot be explained by inclusion of GLA-referrals (</span><i data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">n</span></i><span data-dcnode-id="2372" instrument_node=""> = 43) under category policing (742 referrals in total for labour trafficking).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="2365" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="2366"><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Category also included one youth offending referral and one from a prison.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="2361" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="2362"><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Very lengthy times were in some instances because initial decision was appealed and overturned.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1541" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1542" data-title="References"><di
