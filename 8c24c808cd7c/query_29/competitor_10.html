VIXN is a comprehensive investigative case management platform that:
• Maps all case data to display nexus and knowledge gaps
• Sources case data and structures information for analysis
• Filters, indexes, and visualizes data to expose insights
• Organizes casework and enables investigation collaboration
• Generates actionable entity profiles and automated client reports
The VIXN engine is an identity resolution platform that automatically
aggregates data on entities-of-interest involved in an investigation and
crunches high volumes of information for vital clues. Powered by open source
and proprietary data streams, the VIXN engine is delivered in UI and API formats.

</span><div class="description" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">
Our solutions offer an application for every step of the audiovisual information sharing cycle: recording, saving, sharing, replaying. Everything you need in one place. MaestroVision is a leading supplier of audio &amp; video management solutions. It designs and develops software applications, meant to be used with the best hardware available in the market. Partnering with well-known hardware suppliers, our team of engineers have previously tried and tested and carefully selected a range of hardware products. All you need to get started is right here. MaestroVision’s Keyserv Video is a recording and replaying application suitable for: police Interview recording, courtroom recording, classroom recording, conference room recording, simulation room recording and more. Our team of engineers have developed this incredible user-friendly solution that allows simultaneously recording of up to 4 independent audio &amp; video sources in high-definition.
