</span><h3 data-dcnode-id="637" id="transportation"><span data-dcnode-id="638" instrument_node="">Transportation</span></h3><span data-dcnode-id="636" instrument_node="">
Rising urban populations and new technologies such as automated vehicles are pushing cities to rethink their transportation systems and regulations to ensure driver and pedestrian safety. New mobile applications, technologies, and modes of transit are revolutionizing how residents traverse their home cities, and it is increasingly apparent that existing city resources and regulations are insufficient to deal with these new practices. Outdated public transit and transportation infrastructure is a common issue in cities across the U.S., and while a cross-cutting strategy with immense funding support is required to address this issue, data analytics can offer a cost-effective way forward for cities. Transportation and data analytics go hand and hand, and the wealth of data available in transportation is a critical and in many cases low-cost resource that can help city officials assess and improve transportation systems. Cities need to be equipped with the right personnel and tools to use analytics to understand and help regulate existing and new transportation modes and patterns.</span><br data-dcnode-id="635"><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
In parallel to city efforts to understand the implications of new technologies and services in transportation, a global movement called Vision Zero is focused on eliminating traffic fatalities. As part of this movement, which originated in Sweden in 1997, cities across the Civic Analytics Network, from Boston to Los Angeles, are developing analytics models and visualization platforms to make progress toward this goal. How cities will grapple with the implications and challenges of automated vehicles along with the complexity of multi-modal, shared roads remains to be seen, but municipal analytics models that are being developed can help prepare cities for the changes brought by these and other new technologies.</span><br data-dcnode-id="632"><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
</span><h4 data-dcnode-id="628" id="10-traffic-collisions-vision-zero"><span data-dcnode-id="629" instrument_node="">10) Traffic Collisions: Vision Zero</span></h4><span data-dcnode-id="627" instrument_node="">
</span><b data-dcnode-id="624"><i data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">New York City’s Analytics Team Aims for Zero Traffic Fatalities with Exposure Map</span></i></b><br data-dcnode-id="623"><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
As part of the Vision Zero movement, New York City began developing an analytics model in 2015 with DataKind to enable city officials to assess whether a new transportation project is high risk (i.e., likely to result in injury or unsafe traffic circumstances) and to estimate the likelihood of various outcomes. For example, if the Department of Transportation (DOT) is developing a new intersection or traffic lane design, the analytics model assesses the risk of injury in that intersection or lane design, allowing project managers to adjust the design and recalculate to get the safest results while still accounting for need to improve traffic patterns and minimize delays.</span><br data-dcnode-id="620"><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
While limited data rendered this initial project design unsuccessful, the model’s ability to calculate the number of cars on a road produced a </span><a class="Link" data-cms-ai="0" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/news/article/can-better-data-make-zero-traffic-deaths-a-reality-1138" target="_blank"><span data-dcnode-id="617" instrument_node="">useful exposure model</span></a><span data-dcnode-id="615" instrument_node=""> that is being used by the city’s DOT to more accurately determine the effectiveness of different street designs. The exposure map allows the DOT to forecast the number of cars on the road to help better manage traffic patterns and improve road safety for pedestrians and drivers alike.</span><br data-dcnode-id="614"><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
</span><ul data-dcnode-id="604"><span data-dcnode-id="611" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">See “Can Better Data Make Zero Traffic Deaths a Reality?” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/can-better-data-make-zero-traffic-deaths-a-reality-1138" target="_blank"><span data-dcnode-id="609" instrument_node="">https://datasmart.ash.harvard.edu/news/article/can-better-data-make-zero-traffic-deaths-a-reality-1138</span></a><span data-dcnode-id="607" instrument_node="">.</span></li><span data-dcnode-id="605" instrument_node="">
</span></ul><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="601" id="policy-recommendations-for-implementing-analytics"><span data-dcnode-id="602" instrument_node="">Policy Recommendations for Implementing Analytics</span></h3><span data-dcnode-id="600" instrument_node="">
From improving public health outcomes to supporting safer transportation systems, analytics can offer new insights and improvements to city governance across core issue areas. While the structure, application, and processes used to develop, iterate, and implement the ten examples of Civic Analytics Network projects detailed in this report vary significantly, there are common policies adopted and operating within each that other cities can replicate. There is a need for more research and literature on city-level analytics to help practitioners and theorists alike understand how data-driven decision-making practices are operating within municipal governments. This report concludes with six policy recommendations derived from the Civic Analytics Network’s work in public health, transportation, housing, and public safety to help spur and guide the effective development of analytics projects in other cities across the U.S.</span><br data-dcnode-id="599"><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">
</span><h4 data-dcnode-id="595" id="1-produce-an-open-data-policy-roadmap"><span data-dcnode-id="596" instrument_node="">1) Produce an Open Data Policy Roadmap</span></h4><span data-dcnode-id="594" instrument_node="">
Adopting an open data policy can be a boon to rapidly, transparently, and collaboratively developing comprehensive analytics projects. Open data policies and portals enable city governments to operate with greater transparency to the public and to connect them directly to external researchers, algorithms, and/or datasets that can support more effective analytics project development. If advanced data use is a few steps down the road for a city, crafting an open data roadmap can help city government become more data-savvy to build towards future open data policy conversations. In early 2017, the Civic Analytics Network published </span><a class="Link" data-cms-ai="0" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/an-open-letter-to-the-open-data-community-988" target="_blank"><span data-dcnode-id="593" instrument_node="">an open letter to the open data community</span></a><span data-dcnode-id="591" instrument_node=""> offering guidelines to help advance government capabilities for data portal development and to help deliver on the promise of transparent governance.</span><a class="Link" data-cms-ai="0" data-dcnode-id="587" href="#_ftn1" target="_blank"><sup data-dcnode-id="588"><sup data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">[3]</span></sup></sup></a><span data-dcnode-id="586" instrument_node=""> In June 2018, Civic Analytics Network members reaffirmed their commitment to those </span><a class="Link" data-cms-ai="0" data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/eight-guidelines-open-data" target="_blank"><span data-dcnode-id="585" instrument_node="">eight guidelines</span></a><span data-dcnode-id="583" instrument_node="">, publishing a </span><a class="Link" data-cms-ai="0" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/letter-open-data-community-one-year-later" target="_blank"><span data-dcnode-id="582" instrument_node="">one-year later letter</span></a><span data-dcnode-id="580" instrument_node=""> to the open data community.</span><br data-dcnode-id="579"><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">
</span><h4 data-dcnode-id="575" id="2-create-programs-and-job-descriptions-that-promote-broad-data-literacy"><span data-dcnode-id="576" instrument_node="">2) Create Programs and Job Descriptions that Promote Broad Data Literacy</span></h4><span data-dcnode-id="574" instrument_node="">
By creating job descriptions and new frameworks for programs to appeal to data scientists considering positions outside of government, cities can attract dynamic, data-literate personnel to embed and distribute data skills at various levels within city government. Whether it is creating a CDO position, establishing an analytics team, or simply embedding a data scientist within a department, establishing a role for data expertise with the support of senior leadership can enable city officials to develop the analytics projects that they need most. In addition to bringing in data champions and expertise, cities can also improve internal capacities by designing training programs to provide critical professional development opportunities to city hall personnel. San Francisco’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtech.com/data/blank" target="_blank"><span data-dcnode-id="573" instrument_node="">SF Data Academy</span></a><span data-dcnode-id="571" instrument_node="">, which provides a pathway for city employees to receive continuous professional development focused on data skills and analytics from within government, is a leading example in city-level analytics training programs.</span><a class="Link" data-cms-ai="0" data-dcnode-id="567" href="#_ftn1" target="_blank"><sup data-dcnode-id="568"><sup data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">[4]</span></sup></sup></a><br data-dcnode-id="566"><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
</span><h4 data-dcnode-id="562" id="3-incentivize-and-enable-cross-departmental-collaboration-to-connect-personnel-and-data-resources-from-across-city-government"><span data-dcnode-id="563" instrument_node="">3) Incentivize and Enable Cross-Departmental Collaboration to Connect Personnel and Data Resources from across City Government</span></h4><span data-dcnode-id="561" instrument_node="">
Developing an analytics project places data scientists in an internal consultant role, as they are typically situated outside of the department where that project will be implemented. It is important to establish pathways for data scientists to collaborate and receive input from the relevant department or agency, and, simultaneously, pathways to incentivize city personnel to engage with those new data science experts need to be established by supervisors or even from the bully pulpit. Government personnel operate in a bureaucracy and it is important for their supervisors to establish space in their day-to-day responsibilities to help them ‘make the time’ to engage on data-focused projects. By incentivizing department or agency personnel to connect with data scientists within city hall, supervisors or even the bully pulpit can open up space within city staff’s day-to-day schedule and performance requirements to enable them to pursue analytics solutions to core issues. Beyond connecting departmental personnel to data scientists via substantive pathways for collaboration, cross-departmental engagement is also key. While many city departments maintain useful data repositories, that data is often siloed or incompatibly structured, rendering analyses with data maintained by various departments infeasible. Establishing resources, tools, or policies to help streamline data standardization and warehousing can enable cross-departmental data sharing and is a critical facet of becoming a data-smart city. In Los Angeles, </span><a class="Link" data-cms-ai="0" data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geohub.lacity.org/" target="_blank"><span data-dcnode-id="560" instrument_node="">GeoHub</span></a><span data-dcnode-id="558" instrument_node="">, the city’s open data platform, offers unprecedented access to the city’s highly integrated data resources. GeoHub is a publicly available platform designed to allow the public to explore, visualize, and download location-based open data. It also allows departments across the city to share, access, and collaboratively utilize other departments’ data.</span><a class="Link" data-cms-ai="0" data-dcnode-id="554" href="#_ftn1" target="_blank"><sup data-dcnode-id="555"><sup data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">[5]</span></sup></sup></a><span data-dcnode-id="553" instrument_node=""> Other Civic Analytics Network members are working to replicate this platform in their cities.</span><br data-dcnode-id="552"><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
</span><h4 data-dcnode-id="548" id="4-adopt-enterprise-wide-procedures-that-facilitate-data-driven-insights"><span data-dcnode-id="549" instrument_node="">4) Adopt Enterprise-Wide Procedures that Facilitate Data-Driven Insights</span></h4><span data-dcnode-id="547" instrument_node="">
Whatever methods a city uses to encourage data analytics, adopting an effective project management process means establishing a policy framework that enables data science experts to design analytics projects with the support of the city’s legal, administrative, and oversight capacities. “Human-centered design” is a </span><a class="Link" data-cms-ai="0" data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/putting-users-first-human-centered-approaches-in-the-data-smart-city-1176" target="_blank"><span data-dcnode-id="546" instrument_node="">commonly used method</span></a><span data-dcnode-id="544" instrument_node=""> among Civic Analytics Network cities and offers methods that help craft analytics projects that are responsive, equitable, transparent, and designed with community members in mind. To develop useful analytics projects, cities need enterprise-wide procedures, such as data usage practices, security protocols, or standardized legal and data sharing agreements. For example, in New York City, the Mayor’s Office of Data Analytics (MODA) created the </span><a class="Link" data-cms-ai="0" data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www1.nyc.gov/assets/analytics/downloads/pdf/MODA-project-process.pdf" target="_blank"><span data-dcnode-id="543" instrument_node="">MODA Process Map</span></a><span data-dcnode-id="541" instrument_node=""> to help departments develop data use practices and internal awareness.</span><a class="Link" data-cms-ai="0" data-dcnode-id="537" href="#_ftn1" target="_blank"><sup data-dcnode-id="538"><sup data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">[6]</span></sup></sup></a><span data-dcnode-id="536" instrument_node=""> While these procedures can help streamline, stabilize, and embed data use practices across government, project managers must be mindful of potential blind spots, such as algorithmic biases, that may be unwittingly built into their models. Allegheny County, Pennsylvania, a county-level member of the Civic Analytics Network and home to the City of Pittsburgh, a network member, </span><a class="Link" data-cms-ai="0" data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/allegheny-county-pennsylvania-department-of-human-services-data-warehouse-4" target="_blank"><span data-dcnode-id="535" instrument_node="">has developed a Data Warehouse</span></a><span data-dcnode-id="533" instrument_node=""> to create a more efficient and data-driven environment for the delivery of human services. The Data Warehouse has enabled county administrators to learn more about individual clients and address gaps in coverage.</span><a class="Link" data-cms-ai="0" data-dcnode-id="529" href="#_ftn2" target="_blank"><sup data-dcnode-id="530"><sup data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">[7]</span></sup></sup></a><span data-dcnode-id="528" instrument_node=""> Many Civic Analytics Network cities are now pursuing their first data warehouses, and this network-wide trend represents an important shift in practice from project-based data-use efforts to organization-wide strategic data practices and policies.</span><br data-dcnode-id="527"><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><h4 data-dcnode-id="523" id="5-link-civic-engagement-with-city-analytics"><span data-dcnode-id="524" instrument_node="">5) Link Civic Engagement with City Analytics</span></h4><span data-dcnode-id="522" instrument_node="">
Chief data officers may work within the walls of city hall, but they are members of a broader community and data ecosystem. The best analytics insights come when city government data use and civic engagement converge—after all, the public is the constituency for city analytics. Whether an organization is analyzing datasets available on an open data portal, developing a data visualization, or scoping a predictive analytics project, the results any of these efforts yield are better crafted when co-created with the public. By producing analytics models informed by direct input from city residents or developed in partnership with a civic tech group, cities will garner better service improvements and data-driven insights.</span><a class="Link" data-cms-ai="0" data-dcnode-id="518" href="#_ftn1" target="_blank"><sup data-dcnode-id="519"><sup data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">[8]</span></sup></sup></a><span data-dcnode-id="517" instrument_node=""> Kansas City, MO, for example, uses a quarterly feedback mechanism called the </span><a class="Link" data-cms-ai="0" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/how-citizens-see-it-677" target="_blank"><span data-dcnode-id="516" instrument_node="">Citizen Survey</span></a><span data-dcnode-id="514" instrument_node=""> through which residents can both respond to prompt questions provided by the city and communicate their top priorities for the city.</span><a class="Link" data-cms-ai="0" data-dcnode-id="510" href="#_ftn2" target="_blank"><sup data-dcnode-id="511"><sup data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">[9]</span></sup></sup></a><span data-dcnode-id="509" instrument_node=""> Citizen Survey is a leading example of a municipal citizen survey tool and has established a continuous feedback loop to link citizen perspectives to Kansas City’s performance and services.</span><br data-dcnode-id="508"><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
</span><h4 data-dcnode-id="504" id="6-produce-guardrails-to-protect-equity-and-fairness-issues"><span data-dcnode-id="505" instrument_node="">6) Produce Guardrails to Protect Equity and Fairness Issues</span></h4><span data-dcnode-id="503" instrument_node="">
Analytics is a practical tool for overcoming resource shortages and for distilling vast and disparate data, but it can also lead to the reproduction of biases and inequities under the banner of data science. Establishing standards of practice and mechanisms that ensure clear and continuous engagement with the public are critical components for cities to maintain transparent, equitable governance, and for incorporating inclusive analytics practices into city government. Under the leadership of San Francisco’s chief data officer and the new chair of the Civic Analytics Network, Joy Bonaguro, the network is developing a toolkit to help cities assess the risks and biases of algorithms. This toolkit focuses on algorithms developed both within city hall and by third-party vendors, and aims to help safeguard city analytics so that future data-driven efforts are able to produce fair and equitable solutions for the benefit of all community members.</span><sup data-dcnode-id="500"><a class="Link" data-cms-ai="0" data-dcnode-id="501" href="#_ftn1" target="_blank"><span data-dcnode-id="502" instrument_node="">[10]</span></a></sup><br data-dcnode-id="499"><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
</span><br data-dcnode-id="494"><span data-dcnode-id="493" instrument_node="">
