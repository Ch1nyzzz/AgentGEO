</span><i data-dcnode-id="1471"><span data-dcnode-id="1475" instrument_node="">This paper is part of the </span><a class="Link" data-cms-ai="0" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/civic-analytics-network" target="_blank"><span data-dcnode-id="1474" instrument_node="">Civic Analytics Network</span></a><span data-dcnode-id="1472" instrument_node=""> initiative at Harvard's Ash Center.&nbsp;</span></i><i data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">It was originally published by </span></i><a class="Link" data-cms-ai="0" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/analytics-city-government" target="_blank"><i data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Data-Smart City Solutions</span></i></a><i data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">.</span></i><br data-dcnode-id="1463"><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">
</span><h3 data-dcnode-id="1459" id="introduction"><span data-dcnode-id="1460" instrument_node="">Introduction</span></h3><span data-dcnode-id="1458" instrument_node="">
</span><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">

From remediating blight to optimizing restaurant inspections and pest control, cities across the country are using analytics to help improve municipal policy and performance. The continued adoption of analytics in city governments shows no sign of slowing, and as even more sophisticated tools such as machine learning and artificial intelligence are deployed, there is a critical need for research on how these practices are reshaping urban policy. By examining and capturing lessons learned from city-level analytics projects, practitioners and theorists alike can better understand how data- and tech-enabled innovations are affecting municipal governance. This report seeks to contribute to that developing field.</span><br data-dcnode-id="1455"><br data-dcnode-id="1454"><div class="Enhancement" data-align-center="" data-dcnode-id="1446"><span data-dcnode-id="1453" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">
</span><div class="GoogleDfpAd" data-dcnode-id="1450" data-slot-adsizemap="[[[800, 0], [640, 480]], [[300, 0], [300, 250]]]" data-slot-name="/70114778/GT_In_Article_1_640x480_300x250" data-slot-sizes="[[640, 480], [300, 250]]" data-targeting-data="{&quot;id&quot;:&quot;488295611&quot;,&quot;tags&quot;:[],&quot;path&quot;:&quot;data&quot;,&quot;slot&quot;:&quot;GT_In_Article_1_640x480_300x250&quot;,&quot;site&quot;:&quot;www.govtech.com&quot;,&quot;URLName&quot;:&quot;how, to, do, data, analytics, government&quot;}" id="googleAd1d20c279-cf2a-4769-b5da-3a70fe954efc"><span data-dcnode-id="1451" instrument_node="">
</span></div><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-bsp-pv="4f8e492c-6f2f-390e-bc61-f176d3a37ab9" data-dcnode-id="1445"></span><span data-bsp-pv="00000179-20dc-d1ab-a9fd-a1ff63650000" data-dcnode-id="1444"></span><span data-dcnode-id="1442" instrument_node="">
Members of the Civic Analytics Network, a peer group of leading urban chief data officers convened by the Harvard Ash Center, are using data-smart policymaking practices to develop, iterate, and replicate municipal analytics projects. The Civic Analytics Network was established as a community of practice in 2016 to support the growth and replication of analytics capacities in cities across the United States. Civic Analytics Network members represent many early leaders in urban analytics, and their cities’ analytics projects, policies, and approaches are at the forefront of this space. To help other cities learn how to use analytics to better serve their communities, this report profiles a selection of Civic Analytics Network city initiatives in areas ranging from municipal public safety and public health to housing and transportation.</span><br data-dcnode-id="1441"><br data-dcnode-id="1440"><span data-dcnode-id="1439" instrument_node="">
A key component in creating, launching, and implementing an analytics project is adopting a systemic approach to project development. Whether a city has an established chief data officer position, an analytics team, or is a newcomer to public-sector data analytics altogether, there are various approaches and processes that can help initiate, scope, and implement a successful analytics project.</span><br data-dcnode-id="1438"><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">
While many urban analytics projects have been largely successful in fulfilling their initial objectives and supporting better governance, most underwent multiple iterations. Furthermore, the continued expansion of data use in city government raises complex ethical questions that go to the core of American democracy. While more and more sophisticated technologies are being deployed to help improve government’s ability to serve the public, those new tools may be operating on assumptions or biases that will exacerbate, not ameliorate the challenges facing our most vulnerable populations. To successfully navigate this dynamic and rapidly evolving intersection of public policy and technology, government, at all levels, desperately needs better information on the state and implications of these new practices to help practitioners and academics alike find sustainable, equitable solutions.</span><br data-dcnode-id="1435"><br data-dcnode-id="1434"><div class="Enhancement" data-align-center="" data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">
</span><div class="GoogleDfpAd" data-dcnode-id="1430" data-slot-adsizemap="[[[800, 0], [640, 480]], [[300, 0], [300, 250]]]" data-slot-name="/70114778/GT_In_Article_2_640x480_300x250" data-slot-sizes="[[640, 480], [300, 250]]" data-targeting-data="{&quot;id&quot;:&quot;488295611&quot;,&quot;tags&quot;:[],&quot;path&quot;:&quot;data&quot;,&quot;slot&quot;:&quot;GT_In_Article_2_640x480_300x250&quot;,&quot;site&quot;:&quot;www.govtech.com&quot;,&quot;URLName&quot;:&quot;how, to, do, data, analytics, government&quot;}" id="googleAd05033d60-c8f4-4eb1-9260-3af23369ff10"><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span></div><span data-dcnode-id="1427" instrument_node="">
</span></div><span data-dcnode-id="1425" instrument_node="">
To help capture lessons learned from both the technical and human side of city analytics, this report proceeds by: (1) introducing a five-step approach for developing an analytics project; (2) cataloging ten examples of Civic Analytics Network city analytics projects in the domains of public safety, housing, public health, and transportation; and (3) concluding with six policy recommendations for how other cities can implement analytics.</span><br data-dcnode-id="1424"><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node="">
</span><div class="Enhancement" data-align-center="" data-dcnode-id="1411"><span data-dcnode-id="1421" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1413"><span data-dcnode-id="1420" instrument_node="">
</span><div class="Quote" data-dcnode-id="1415"><span data-dcnode-id="1419" instrument_node="">
</span><blockquote data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">an·a·lyt·ics / anəˈlidiks/ noun - models of data analysis that provide predictive or forecasted insights via statistical analysis.</span></blockquote><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">

</span><h3 data-dcnode-id="1407" id="b-how-to-approach-analytics-project-development-b"><b data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">How to Approach Analytics Project Development</span></b></h3><span data-dcnode-id="1406" instrument_node="">
If a department, agency, or city is considering using analytics, there are a few ways to get started. While some organizations follow general standards of practice to provide a step-by-step guide on the key phases of project development, others follow a technical framework to identify the degree to which organizational and/or data resources will support a given project. Drawing on the various approaches, process guides, and methodologies developed by Civic Analytics Network cities and partners, this report highlights five key steps that cities can replicate to develop their own analytics projects: (1) identify the problem; (2) assess data readiness; (3) scope the project; (4) pilot the project; and (5) implement and scale the model.</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">
The first step the Civic Analytics Network recommends—before considering what data an organization has available—is establishing a clear understanding of the problem to be addressed by a given analytics project. Determining data readiness or maturity is critical, but before an analytics project can even be scoped, it is important to ensure that the project’s objective is core to the performance or needs of the implementing organization; data-driven policymaking is not data use for the sake of data use. After working with departments to identify a mission-critical problem, analytics experts or data scientists can proceed with identifying data readiness, scoping and piloting the project, and so on.</span><br data-dcnode-id="1402"><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">
From forecasting future needs to overcoming staffing or resource shortages, to condensing vast and disparate information into actionable insights, analytics can be a powerful tool in improving city governance, but it is most effective when used to enhance and support the efforts and priorities of city personnel. There is no better way to ensure that than by positioning data scientists within government to work with departments on tackling key issues collaboratively. It is important to note that many analytics teams are small, nascent offices with restrictive funding resources for data experts to introduce the value of data analytics to their cities’ bureaucracy; many new analytics teams or hires are established thanks to the support of the bully pulpit, and the mayor can play an important role in prioritizing data use to address policy needs in local communities.</span><br data-dcnode-id="1399"><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">
</span><h4 data-dcnode-id="1395" id="1-identify-the-problem"><span data-dcnode-id="1396" instrument_node="">1) Identify the Problem</span></h4><span data-dcnode-id="1394" instrument_node="">
Identifying a critical problem that can be supported or alleviated by analytics is challenging, but it is an important first step in structuring a successful analytics project. While data may abound, matching an area of need with the right data resources within an organization is vital. Developing an analytics project typically places data scientists in an internal consultant role; by working with a department or agency to identify their key issues or problems, data scientists can support mission-critical needs. For example, the City of Chicago’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/webinar-recording-predictive-analytics-a-ten-step-guide-1220" target="_blank"><span data-dcnode-id="1393" instrument_node="">Applied Analytics Guide</span></a><span data-dcnode-id="1391" instrument_node=""> prioritizes working in partnership with departments and agencies across government as part of its ten-step process to develop advanced predictive analytics projects. Chicago was an early leader in city-level data-driven policy as one of the first cities to create a chief data officer (CDO) position, which is housed within the city’s Department of Innovation and Technology (DoIT).</span><br data-dcnode-id="1390"><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
In Chicago, direct engagement with departments across city government helped DoIT build relationships that created an environment in which department leaders see the DoIT team as a resource to help them explore new solutions to key problems. DoIT does not prescribe data solutions, but rather supports the priorities of department leaders to optimize performance and/or service delivery in areas that the leaders identify as areas of need. Sometimes, however, public exposure of an underperforming service area can spur an analytics “intervention.” For example, following media coverage on restaurant inspections, DoIT helped craft an analytics model to help optimize restaurant inspections (see “Public Health” below).</span><br data-dcnode-id="1387"><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
Other cities similarly prioritize this problem identification phase as a way of developing meaningful partnerships with government agencies. Many Civic Analytics Network analytics teams are situated in their respective city governments as discrete groups tasked with supporting and collaborating with other departments or agencies by bringing data-driven insights and expertise to bear on key issues or areas of need.</span><br data-dcnode-id="1384"><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
</span><ul data-dcnode-id="1356"><span data-dcnode-id="1381" instrument_node="">

</span></ul><span data-dcnode-id="1355" instrument_node="">
</span><h4 data-dcnode-id="1353" id="2-assess-data-readiness"><span data-dcnode-id="1354" instrument_node="">2) Assess Data Readiness</span></h4><span data-dcnode-id="1352" instrument_node="">
Determining data readiness is a key facet of Civic Analytics Network cities’ approaches to analytics and a critical precondition to scoping any project. The success of an analytics project depends not only upon whether there is a need for data analytics, but also, and more importantly, on having the right personnel, data collection and storage practices, and stakeholder buy-in within and outside of the department or agency.</span><br data-dcnode-id="1351"><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node="">
The University of Chicago’s Center for Data Science and Public Policy (DSaPP), a Civic Analytics Network partner, created a “Data Maturity Framework” to help prepare prospective project leaders for the development process. The framework provides an effective structure to help determine data readiness for an organization considering a new analytics project. Drawing on its team’s experience sourcing project proposals, DSaPP observed a trend: most prospective project managers referred to a desire to make use of tons of unused data. While having ready-made or already assembled data is a good start for any analytics project, DSaPP needed to help project managers understand that successful analytics projects begin with the identification not of unused data, but of critical issues in need of data-driven solutions. Once that issue area or policy need was identified, then data scientists could help project managers assess data readiness and begin structuring and scoping an analytics model.</span><br data-dcnode-id="1348"><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">
DSaPP’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dsapp.uchicago.edu/resources/datamaturity/" target="_blank"><span data-dcnode-id="1345" instrument_node="">Data Maturity Framework</span></a><span data-dcnode-id="1343" instrument_node=""> consists of a questionnaire and scorecards to identify the technology, data, and organizational readiness within a department. The framework consists of a questionnaire and survey to assess readiness and three scorecard matrices on: (1) problem definition, (2) data and technology readiness, and (3) organizational readiness. </span><a class="Link" data-cms-ai="0" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dsapp.uchicago.edu/wp-content/uploads/2016/04/Data_Maturity_Framework_4.28.16.pdf" target="_blank"><span data-dcnode-id="1342" instrument_node="">Each scorecard</span></a><span data-dcnode-id="1340" instrument_node=""> helps organizations identify where they fall on a spectrum of four categories ranging from leading to lagging in terms of data readiness. Scorecard categories include: how data is stored; what is collected; privacy and documentation practices; personnel; data use policy; and buy-in from staff, data collectors, leadership,</span><i data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node=""> </span></i><span data-dcnode-id="1337" instrument_node="">intervener, and funder. (See Appendix A, “The University of Chicago’s Data Maturity Framework”)</span><br data-dcnode-id="1336"><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">

Assessing data maturity can also be approached from the macro level—for a mayor or chief data officer to assess the enterprise-wide maturity of municipal data, it is important to consider broad-scale questions such as how a government consumes data and how leadership uses data to make policy decisions. Determining the </span><a class="Link" data-cms-ai="0" data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/news/article/analytics-excellence-roadmap-866" target="_blank"><span data-dcnode-id="1311" instrument_node="">data maturity of city-wide practices</span></a><span data-dcnode-id="1309" instrument_node=""> is challenging, but cities across the Civic Analytics Network are leading by example through data-driven governance.</span><br data-dcnode-id="1308"><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">

</span><h4 data-dcnode-id="1271" id="3-scope-the-project"><span data-dcnode-id="1272" instrument_node="">3) Scope the Project</span></h4><span data-dcnode-id="1270" instrument_node="">
Once a department’s data readiness is assessed, it is time to scope the project. There is no one “right” approach to project scoping: in New Orleans, the city’s performance and data expertise team developed a project criteria framework to help scope projects; in the City of Chicago DoIT prioritizes prospective projects by using a framework of research question evaluation criteria. DSaPP’s Data Science Project Scoping Guide has been a particularly successful model for approaching project development and was featured as a pre-conference workshop at the Ash Center’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/news/article/harvard-summit-on-data-smart-government-11181-1187" target="_blank"><span data-dcnode-id="1269" instrument_node="">Inaugural Summit on Data-Smart Government</span></a><span data-dcnode-id="1267" instrument_node=""> in November, 2017.</span><br data-dcnode-id="1266"><br data-dcnode-id="1265"><span data-dcnode-id="1264" instrument_node="">
DSaPP’s Data Science Project Scoping Guide was developed for prospective </span><a class="Link" data-cms-ai="0" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dssg.uchicago.edu/project/building-a-deeper-police-early-intervention-system/" target="_blank"><span data-dcnode-id="1263" instrument_node="">“Data for Social Good” fellowship</span></a><span data-dcnode-id="1261" instrument_node=""> projects (a program that supports aspiring data scientists by connecting them with real-world problems) in order to facilitate a continuous pool of well-developed projects that could be successfully deployed within DSaPP’s program cycle. Because each project needs to be scoped thoroughly enough for a data-use agreement, the project scoping steps help expedite project development by providing a concise framework for prospective projects. This project scoping approach helps managers focus on understanding what data is available, who the key stakeholders are for providing and using that data, and how that data is being considered to provide insights into a city governance problem. DSaPP’s four steps for project scoping are:</span><br data-dcnode-id="1260"><br data-dcnode-id="1259"><span data-dcnode-id="1258" instrument_node="">
</span><ol data-dcnode-id="1236"><span data-dcnode-id="1257" instrument_node="">
</span><li class="Normal1" data-dcnode-id="1253"><b data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Goals</span></b><span data-dcnode-id="1254" instrument_node=""> – Define the goal(s) of the project.</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li class="Normal1" data-dcnode-id="1248"><b data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Actions</span></b><span data-dcnode-id="1249" instrument_node=""> – What actions/interventions do you have that this project will inform?</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li class="Normal1" data-dcnode-id="1243"><b data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Data</span></b><span data-dcnode-id="1244" instrument_node=""> – What data do you have access to internally? What data do you need? What can you augment from external and/or public sources?</span></li><span data-dcnode-id="1242" instrument_node="">
</span><li class="Normal1" data-dcnode-id="1238"><b data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Analysis</span></b><span data-dcnode-id="1239" instrument_node=""> – What analysis needs to be done? Does it involve description, detection, prediction, or behavior change? How will the analysis be validated?</span></li><span data-dcnode-id="1237" instrument_node="">
</span></ol><span data-dcnode-id="1235" instrument_node="">
(See Appendix B, “The University of Chicago’s Data Science Project Scoping Worksheet”)</span><br data-dcnode-id="1234"><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">
Chicago uses the Research Question Evaluation Criteria for scoping its predictive analytics projects and determining which projects are best suited for development. Similar to DSaPP’s project scoping steps, Chicago’s evaluation criteria guides project managers through key issues to better situate a prospective analytics project for success. (See Appendix C, “City of Chicago’s Research Question Evaluation Criteria”)</span><br data-dcnode-id="1231"><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">

</span><h4 data-dcnode-id="1205" id="4-pilot-the-project"><span data-dcnode-id="1206" instrument_node="">4) Pilot the Project</span></h4><span data-dcnode-id="1204" instrument_node="">
Piloting an analytics project is “the stuff of innovation.” This is where the trial and error of testing a new project happens. No matter how well prepared an analytics team is, sometimes—whether the problem lies in a key variable, an assumption built into the algorithm, or the project’s general approach—the pilot just does not perform as expected. While information on how best to pilot a municipal analytics project is limited, the frameworks, criteria, and guidelines developed by Civic Analytics Network cities and partners can serve as helpful resources and provide useful examples of how to approach and, ultimately, scale an analytics project.</span><br data-dcnode-id="1203"><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">
Piloting an analytics project, like any effort to innovate in the public sector, is somewhat at odds with the bureaucratic preference for consistency and risk avoidance, but it is a critical phase that can yield important insights for improving performance when it is time for implementation on a larger scale. Moreover, starting with small-scale pilots can help limit risk and demonstrate clear results.</span><br data-dcnode-id="1200"><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
In an </span><a class="Link" data-cms-ai="0" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/498256/Trying_it_out_the_role_of_pilots_in_policy.pdf." target="_blank"><span data-dcnode-id="1197" instrument_node="">assessment of its pilot practices</span></a><span data-dcnode-id="1195" instrument_node="">, the UK Government notes that “Once embarked upon, a pilot must be allowed to run its course. Notwithstanding the familiar pressures of government timetables, the full benefits of a policy pilot will not be realized if the policy is rolled out before the results of the pilot have been absorbed and acted upon.” The report goes on to argue that “pilots should be regarded less as ad hoc evaluations than as early stages in a continuing process of accumulating policy-relevant evidence.”</span><a class="Link" data-cms-ai="0" data-dcnode-id="1193" href="#_ftn1" target="_blank"><span data-dcnode-id="1194" instrument_node="">[1]</span></a><br data-dcnode-id="1192"><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">
Piloting also allows for much needed course corrections to help better transition efforts in project-scoping to implementation; adjusting project parameters during the pilot phase can increase the likelihood of success at implementation and beyond.</span><br data-dcnode-id="1189"><br data-dcnode-id="1188"><span data-dcnode-id="1187" instrument_node="">

</span><li class="Normal1CxSpMiddle" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">See “From Algorithm to Action: How Chicago Operationalized its Predictive Analytics for Food Inspections” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/from-algorithm-to-action-759" target="_blank"><span data-dcnode-id="1184" instrument_node="">https://datasmart.ash.harvard.edu/news/article/from-algorithm-to-action-759</span></a><span data-dcnode-id="1182" instrument_node="">.</span></li><span data-dcnode-id="1180" instrument_node="">

</span></ul><span data-dcnode-id="1154" instrument_node="">
</span><h4 data-dcnode-id="1152" id="5-implement-and-scale-the-model"><span data-dcnode-id="1153" instrument_node="">5) Implement and Scale the Model</span></h4><span data-dcnode-id="1151" instrument_node="">
Research and literature on implementing and scaling analytics projects remain limited, and given the variability of structures, budgets, and objectives for analytics projects, identifying generalizable practices for scaling these projects is challenging. The Ash Center’s Data-Smart City Solutions and the Civic Analytics Network have begun to capture early lessons from city-level analytics projects, and as more data-driven decision-making projects mature and are replicated, insights into how to improve and scale these leading projects will grow.</span><br data-dcnode-id="1150"><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
Currently, Civic Analytics Network cities are working to replicate models implemented by other member cities, and while some of those leading examples are highlighted in this report, further research and use cases on those replicated projects are forthcoming.</span><br data-dcnode-id="1147"><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">
</span><ul data-dcnode-id="1137"><span data-dcnode-id="1144" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">See “A Catalog of Civic Data Use Cases: How Can Data and Analytics Be Used to Enhance City Operations?” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/how-can-data-and-analytics-be-used-to-enhance-city-operations-723" target="_blank"><span data-dcnode-id="1142" instrument_node="">https://datasmart.ash.harvard.edu/news/article/how-can-data-and-analytics-be-used-to-enhance-city-operations-723</span></a><span data-dcnode-id="1140" instrument_node="">.</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ul><span data-dcnode-id="1136" instrument_node="">
</span><h3 data-dcnode-id="1131" id="b-analytics-project-examples-b-b-public-safety-housing-public-health-and-transportation-b"><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Analytics Project Examples: </span></b><b data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Public Safety, Housing, Public Health, and Transportation</span></b></h3><span data-dcnode-id="1130" instrument_node="">
</span><h3 data-dcnode-id="1128" id="public-safety"><span data-dcnode-id="1129" instrument_node="">Public Safety</span></h3><span data-dcnode-id="1127" instrument_node="">
A city’s public safety capabilities encompass a wide variety of departments and agencies working to maintain the security and welfare of residents. Public safety means more than just having a police department; it is a cross-cutting issue in government, comprising a wide range of services that help prevent and manage crime, coordinate emergency preparedness, secure public transportation systems, and beyond. While the typical resident will likely only engage with their city’s public safety resources, such as the police or fire department, during an emergency, preventative practices, improved internal management, and tech-enabled policies implemented within and by the many departments that comprise a city’s public safety capacities can make the difference between life and death during those times of crisis. In the two examples below, data-driven efforts to strategically distribute smoke detectors and bolster early intervention systems that help supervisors in police departments identify officers in need of training or other mediation offer insights into how Civic Analytics Network cities and partners use analytics to support and improve the efforts of first responders across the country.</span><br data-dcnode-id="1126"><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
</span><h4 data-dcnode-id="1122" id="1-smoke-detectors-and-fire-risk"><span data-dcnode-id="1123" instrument_node="">1) Smoke Detectors and Fire Risk</span></h4><span data-dcnode-id="1121" instrument_node="">
</span><b data-dcnode-id="1118"><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">New Orleans’ Analytics Model Supports Smoke Detector Distribution and National Replication</span></i></b><br data-dcnode-id="1117"><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
According to </span><a class="Link" data-cms-ai="0" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usfa.fema.gov/prevention/outreach/smoke_alarms.html" target="_blank"><span data-dcnode-id="1114" instrument_node="">the U.S. Fire Administration</span></a><span data-dcnode-id="1112" instrument_node="">, three out of five home fire deaths happen in homes without smoke alarms, and the risk of death from fire in a home is cut in half when a home has smoke alarms. The New Orleans Fire Department (NOFD) provides citizens with </span><a class="Link" data-cms-ai="0" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nola.gov/nofd/citizen-services/free-smoke-detector-installation/" target="_blank"><span data-dcnode-id="1111" instrument_node="">free smoke alarms</span></a><span data-dcnode-id="1109" instrument_node=""> to help bring these life-saving devices to homes in need across the city, but NOFD Superintendent Tim McConnell wanted his department to be more proactive in </span><a class="Link" data-cms-ai="0" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/news/article/predicting-fire-risk-from-new-orleans-to-a-nationwide-tool-846" target="_blank"><span data-dcnode-id="1108" instrument_node="">improving the safety of New Orleans</span></a><span data-dcnode-id="1106" instrument_node="">. —</span><br data-dcnode-id="1105"><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
NOFD partnered with the Office of Performance and Accountability (OPA), the city’s data team, to use a predictive analytics model to determine which houses in the city are least likely to have a smoke alarm and at the highest risk of fire fatalities. New Orleans did not have historical data on smoke alarm locations, and culling permitting records yielded limited results. The project had a breakthrough when an OPA team member turned to the U.S. Census Bureau’s American Housing Survey, which includes a question about smoke alarms. When OPA coupled this data with American Community Survey data, the team was able to identify key variables to help predict if a home is missing a smoke alarm and is at high risk for a fire-related fatality. The analytics model developed by OPA has helped NOFD identify on a block-by-block level where to target free smoke detector outreach and distribution efforts. From the project’s start in 2014 to 2016, NOFD was able to distribute and install 8,000 smoke detectors.</span><br data-dcnode-id="1102"><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
New Orleans worked with Enigma, a data analytics startup, to develop the methodology. Since the New Orleans model is based primarily on federal data, Enigma was able to partner with the American Red Cross and DataKind to replicate it across the nation.</span><br data-dcnode-id="1099"><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
</span><ul data-dcnode-id="1083"><span data-dcnode-id="1096" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">See “Predicting Fire Risk: From New Orleans to a Nationwide Tool” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/predicting-fire-risk-from-new-orleans-to-a-nationwide-tool-846" target="_blank"><span data-dcnode-id="1094" instrument_node="">https://datasmart.ash.harvard.edu/news/article/predicting-fire-risk-from-new-orleans-to-a-nationwide-tool-846</span></a><span data-dcnode-id="1092" instrument_node="">.</span></li><span data-dcnode-id="1090" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">See “New Orleans Profile” in “Lessons from Leading CDOs” (Ash Center), 32-33 </span><a class="Link" data-cms-ai="0" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf" target="_blank"><span data-dcnode-id="1088" instrument_node="">https://datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf</span></a><span data-dcnode-id="1086" instrument_node="">.</span></li><span data-dcnode-id="1084" instrument_node="">
</span></ul><span data-dcnode-id="1082" instrument_node="">
</span><h4 data-dcnode-id="1080" id="2-police-early-intervention-system"><span data-dcnode-id="1081" instrument_node="">2) Police Early Intervention System</span></h4><span data-dcnode-id="1079" instrument_node="">
</span><b data-dcnode-id="1076"><i data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">New Early Intervention Systems Help Police Departments Better Manage Officer Performance </span></i></b><br data-dcnode-id="1075"><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
The University of Chicago’s Center for Data Science and Public Policy (DSaPP) has partnered with Civic Analytics Network cities and others to build and deploy the first data-driven early intervention systems (EISs) for police officers. EISs enable departments to provide training, counseling, and other interventions for officers who are identified as likely to have an adverse incident. Adverse incidents include complaints from a citizen or colleague, use of force or other tactics, or accident or injury. Early EISs only tracked a handful of simple indicators, such as the number of times an officer used force, and omitted context. For instance, the officer’s assigned beat was typically not logged in the system, meaning there was no way to see in the EIS if an adverse incident such as use of force occurred within or beyond the officer’s beat.</span><br data-dcnode-id="1072"><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
DSaPP’s system uses analytics to find predictors of adverse incidents in the department’s data by, for example, tracking which officers respond to the highest number of suicide calls. This allows administrators to assess whether additional training or counselling is needed. DSaPP’s EIS model adapts over time and automatically learns from how supervisors interact with, use, or deprioritize the system’s findings. DSaPP has deployed the system in </span><a class="Link" data-cms-ai="0" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dssg.uchicago.edu/project/building-a-deeper-police-early-intervention-system/" target="_blank"><span data-dcnode-id="1069" instrument_node="">Charlotte-Mecklenburg</span></a><span data-dcnode-id="1067" instrument_node=""> and Metropolitan Nashville and, as of spring 2018, is working with two Civic Analytics Network cities to build prototypes.</span><br data-dcnode-id="1066"><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
During the development of the Nashville model, the University of Chicago’s DSaPP team determined that of the </span><a class="Link" data-cms-ai="0" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dssg.uchicago.edu/project/expanding-our-early-intervention-system-for-adverse-police-interactions/" target="_blank"><span data-dcnode-id="1063" instrument_node="">approximately 1,000 officers</span></a><span data-dcnode-id="1061" instrument_node=""> in the city’s department, around five percent have an adverse incident each year. Typical or traditional EISs use a threshold-based model to identify officers in need of intervention, and while that system captures 80 percent of the officers who will have an adverse incident, it does so by flagging almost two thirds of police. A system that recommends that a department retrain two thirds of the police force is simply not a useful administrative tool, and while it can reasonably be argued that the more training a department receives the better, given the already limited resources of many police departments offering universal, continuous training is infeasible. So, given those limitations, the University of Chicago worked to create a more sophisticated system that includes more data, context, and other factors to streamline the EIS results helping department administrators be better equipped to manage their personnel.</span><br data-dcnode-id="1060"><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
The new EIS designed by the DSaPP team still flagged 80 percent of the officers who will have an adverse incident, but targeted only 30 percent of the department for intervention. Additionally, the new EIS assigns a risk score based on past performance, providing an additional level of detail to help supervisors gauge whether an officer needs an intervention. The risk score and EIS are decision-support tools; neither tool replaces the supervisor’s role in forming judgments about officer training needs and performance. Data collection on how this new system has helped reduce adverse incidences is ongoing.</span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">
</span><figure class="caption caption-article embedded-entity align-center" data-dcnode-id="1032" role="group"><article data-dcnode-id="1037"><div class="Enhancement" data-align-center="" data-dcnode-id="1038"><span data-dcnode-id="1054" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1040"><span data-dcnode-id="1053" instrument_node="">

</span><h3 data-dcnode-id="987" id="housing"><span data-dcnode-id="988" instrument_node="">Housing</span></h3><span data-dcnode-id="986" instrument_node="">

Cities face an increasing need for housing as more and more of the U.S. population moves into urban areas. Providing safe, secure, affordable, and equitably available housing is key to the future stability and success of cities. To this end, Civic Analytics Network cities are using data-driven insights to improve housing conditions in their communities with projects focused on improving housing inspection performance, minimizing overlooked health and safety risks, and remediating blight outbreaks.</span><br data-dcnode-id="985"><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">
</span><h4 data-dcnode-id="981" id="4-housing-inspections"><span data-dcnode-id="982" instrument_node="">4) Housing Inspections</span></h4><span data-dcnode-id="980" instrument_node="">
</span><b data-dcnode-id="977"><i data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">San José Uses Analytics to Help Housing Inspectors Keep Residents Safe</span></i></b><br data-dcnode-id="976"><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">
San José’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sanjoseca.gov/index.aspx%3FNID%3D445" target="_blank"><span data-dcnode-id="973" instrument_node="">Multiple Housing team</span></a><span data-dcnode-id="971" instrument_node=""> in the city’s Code Enforcement Office is tasked with monitoring all properties with three or more units, which totals more than 4,500 properties in the city. It is impossible for the Multiple Housing team to inspect every property each year, so the city partnered with the </span><a class="Link" data-cms-ai="0" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dssg.uchicago.edu/2017/07/14/data-driven-inspections-for-safer-housing-in-san-jose-california/" target="_blank"><span data-dcnode-id="970" instrument_node=""> DSaPP</span></a><span data-dcnode-id="968" instrument_node=""> through the Civic Analytics Network to help the inspectors identify properties that are at the highest risk for violations. DSaPP developed a predictive model to provide a view of property violations over time, drawing upon construction permit records and other indicators to develop a model that identifies possible higher-risk properties in the community. The model was developed in close collaboration with the inspectors in San José; DSaPP worked with inspectors, interviewed them, and joined them on inspections to observe how they prioritize and gather information during a site visit. The analytics model DSaPP developed prioritizes violations that pose greater health and safety risks, such as exposed wiring or fire hazards. DSaPP identified four factors that were particularly predictive of higher-risk conditions: (1) amount of time since last inspection; (2) previous health and safety violations; (3) lack of recent building permits; and (4) violation rates of nearby properties. Field tests for this model concluded in late 2017.</span><br data-dcnode-id="967"><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
</span><ul data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">See “Data-Driven Inspections for Safer Housing in San José, California” (Data Science for Social Good) </span><a class="Link" data-cms-ai="0" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dssg.uchicago.edu/2017/07/14/data-driven-inspections-for-safer-housing-in-san-jose-california/" target="_blank"><span data-dcnode-id="962" instrument_node="">https://dssg.uchicago.edu/2017/07/14/data-driven-inspections-for-safer-housing-in-san-jose-california/</span></a><span data-dcnode-id="960" instrument_node="">.</span></li><span data-dcnode-id="958" instrument_node="">
</span></ul><span data-dcnode-id="956" instrument_node="">
</span><h4 data-dcnode-id="954" id="4-landlord-discrimination"><span data-dcnode-id="955" instrument_node="">4) Landlord Discrimination</span></h4><span data-dcnode-id="953" instrument_node="">
</span><b data-dcnode-id="950"><i data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Analytics Model Focuses on Eliminating Income Discrimination for Prospective Tenants in New York City</span></i></b><br data-dcnode-id="949"><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
In New York City, Title 8 of the Administrative Code of the City of New York prohibits discrimination based on a number of factors, including race, gender, and religion. The law also includes provisions to protect individuals who receive public assistance from being discriminated against based on their source of income. Despite this, however, income-based discrimination is among the top housing-related complaints in the city.</span><br data-dcnode-id="946"><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
To curb discrimination against prospective tenants, including tenant harassment, source-of-income discrimination, and illegal conversions of apartments, the Commission on Human Rights partnered with the New York City Mayor’s Office of Data Analytics (MODA) to build a model to help prioritize investigative resources. MODA wanted to identify areas in which landlords were most likely to turn away prospective tenants with housing vouchers—not only to prosecute proven violators, but also to send a clear message that violations of this nature would not go unnoticed and to discourage landlords across the city from discriminating in the first place.</span><br data-dcnode-id="943"><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
With this in mind, MODA set out to identify the landlords engaging in discriminatory behavior focusing particularly on identifying and punishing larger property management firms. By focusing on identifying the largest landlords making these violations, the city hoped that as a consequence smaller potential offenders would remediate their behavior. </span><a class="Link" data-cms-ai="0" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moda-nyc.github.io/Project-Library/projects/source-of-income-discrimination/" target="_blank"><span data-dcnode-id="940" instrument_node="">MODA’s model</span></a><span data-dcnode-id="938" instrument_node=""> has helped the city better identify illegal housing practices, and while the </span><a class="Link" data-cms-ai="0" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civichall.org/civicist/how-the-nyc-commission-on-human-rights-uses-open-data-against-discriminatory-landlords/" target="_blank"><span data-dcnode-id="937" instrument_node="">Commission investigates all allegations</span></a><span data-dcnode-id="935" instrument_node=""> of income discrimination, MODA’s efforts have helped the Commission better manage their inquiries and, ultimately, improved the city’s ability to curb future incidents of discrimination.</span><br data-dcnode-id="934"><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="912"><span data-dcnode-id="931" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">See “New York City Profile” in “Lessons from Leading CDOs” (Ash Center) Pgs. 34-35 </span><a class="Link" data-cms-ai="0" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf" target="_blank"><span data-dcnode-id="929" instrument_node="">https://datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf</span></a><span data-dcnode-id="927" instrument_node="">.</span></li><span data-dcnode-id="925" instrument_node="">

</span><li class="Normal1CxSpLast" data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">See “How New York is Protecting Affordable Apartments with Analytics” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/how-new-york-protecting-affordable-apartments-analytics" target="_blank"><span data-dcnode-id="917" instrument_node="">https://datasmart.ash.harvard.edu/news/article/how-new-york-protecting-affordable-apartments-analytics</span></a><span data-dcnode-id="915" instrument_node="">.</span></li><span data-dcnode-id="913" instrument_node="">
</span></ul><span data-dcnode-id="911" instrument_node="">
</span><h4 data-dcnode-id="909" id="5-blight-remediation"><span data-dcnode-id="910" instrument_node="">5) Blight Remediation</span></h4><span data-dcnode-id="908" instrument_node="">
</span><b data-dcnode-id="905"><i data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">New Orleans Uses Data-Driven Insights to Reduce Blight</span></i></b><br data-dcnode-id="904"><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
After Hurricane Katrina in 2005, rebuilding New Orleans was a daunting, arduous endeavor, and many areas that were damaged by the wind and flooding were left untouched in that state for years. As a result, rampant blight took hold in and around those damaged properties across the city. When Mayor Mitch Landrieu took office in 2010, blight remediation was a top priority, and the Office of Performance and Accountability (OPA), the analytics hub of New Orleans’ city government, was tasked with developing analytics and performance management tools to help tackle this dangerous housing issue.</span><br data-dcnode-id="901"><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">
OPA developed </span><a class="Link" data-cms-ai="0" data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nola.gov/code-enforcement/blightstat/" target="_blank"><span data-dcnode-id="898" instrument_node="">BlightSTAT</span></a><span data-dcnode-id="896" instrument_node=""> as a performance management tool to improve services and results through the use of data. OPA also created a Blight Scorecard to address a backlog of more than 1,500 properties awaiting a decision by the Department of Code Enforcement. The Blight Scorecard allows mid-level supervisors to score a property on several dimensions and then receive a weighted recommendation between 0 and 100, 0 meaning the property should be demolished and 100 meaning it should be sold. Those mid-level supervisors and their superiors can use the tool to evaluate properties, vastly increasing the speed and consistency of the process at various levels in the department. Like Chicago Police’s EIS, the scorecard is a decision-support tool and does not replace human judgment—it provides a recommendation, and the director reviews the available information and decides whether to approve each demolition.</span><br data-dcnode-id="895"><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
This new tool has improved the workflow of the city’s Code Enforcement Department by directing negative judgments to supervisors for review prior to escalating them to the attention of the director. Moreover, the new process adds efficiency by removing all paper components. Use of this tool effectively eliminated the backlog of blighted properties in the city. Other cities are also tackling blight remediation with analytics; for example, Cincinnati partnered with the University of Chicago’s DSaPP via the Civic Analytics Network to develop an early detection model.</span><br data-dcnode-id="892"><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
</span><ul data-dcnode-id="858"><span data-dcnode-id="889" instrument_node="">

</span></ul><span data-dcnode-id="857" instrument_node="">
</span><h3 data-dcnode-id="855" id="public-health"><span data-dcnode-id="856" instrument_node="">Public Health</span></h3><span data-dcnode-id="854" instrument_node="">
From the risk of foodborne illness to viral outbreaks, mitigating public health concerns is a matter of good, forward-looking governance. The global health risk posed by mosquito-borne viruses like Zika and West Nile is immense, and as the impact of climate change becomes more overt the risk of such viral outbreaks will only grow. Forecasted population and environmental changes pose unprecedented challenges for local governments, but analytics can provide critical insights to help cities prepare for and curb the impact of future outbreaks.</span><br data-dcnode-id="853"><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
Monitoring food quality and safety in a city are similarly challenging tasks, due to the complexity of regulations for food preparation, storage, service, and so on. Cities across the Civic Analytics Network have developed analytics models to help city officials deploy their limited resources more effectively to monitor and manage restaurant inspections and pest control. By forecasting areas at risk for mosquito-borne disease, rodent infestation, and poor food quality, cities are able to better manage their limited resources and provide their communities with a safer, healthier quality of life.</span><br data-dcnode-id="850"><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
</span><h4 data-dcnode-id="846" id="6-west-nile-virus"><span data-dcnode-id="847" instrument_node="">6) West Nile VIrus</span></h4><span data-dcnode-id="845" instrument_node="">
</span><b data-dcnode-id="842"><i data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Chicago Uses Analytics to Prepare for Forecasted Spike in West Nile Virus</span></i></b><br data-dcnode-id="841"><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
By the end of this century, Chicago’s climate is </span><a class="Link" data-cms-ai="0" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2011/05/23/science/earth/23adaptation.html" target="_blank"><span data-dcnode-id="838" instrument_node="">projected to become so warm</span></a><span data-dcnode-id="836" instrument_node=""> that it will mirror the conditions seen in </span><a class="Link" data-cms-ai="0" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//naldc.nal.usda.gov/download/49775/PDF" target="_blank"><span data-dcnode-id="835" instrument_node="">present-day Alabama</span></a><span data-dcnode-id="833" instrument_node="">. As warmer climates shift northward and expand mosquito-friendly environmental conditions, the risk of mosquito-borne viruses will increase considerably. The forecasted spike in mosquito population in the Chicago area helped prompt Chicago’s Department of Innovation and Technology (DoIT) to partner with the Chicago Department of Public Health (CDPH) to use data to find new solutions for this projected public health issue. The city built a predictive model to determine one week in advance whether or not a particular area will have West Nile virus-carrying mosquitoes. With such a model, Chicago can direct mosquito-spraying efforts towards areas that pose the greatest risk, mitigating the potential of a viral outbreak.</span><br data-dcnode-id="832"><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">
The concept for Chicago’s West Nile virus analytics project came via </span><a class="Link" data-cms-ai="0" data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaggle.com/host" target="_blank"><span data-dcnode-id="829" instrument_node="">Kaggle</span></a><span data-dcnode-id="827" instrument_node="">, an online platform for analytics and predictive modeling competitions. In early 2015, CDPH, in partnership with DoIT, launched a </span><a class="Link" data-cms-ai="0" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaggle.com/c/predict-west-nile-virus%23description" target="_blank"><span data-dcnode-id="826" instrument_node="">Kaggle competition of its own</span></a><span data-dcnode-id="824" instrument_node=""> by posting some West Nile virus visualizations and starter </span><a class="Link" data-cms-ai="0" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.r-project.org/about.html" target="_blank"><span data-dcnode-id="823" instrument_node="">code in R</span></a><span data-dcnode-id="821" instrument_node=""> (a program language and software for running statistical analyses) and </span><a class="Link" data-cms-ai="0" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.python.org/about/" target="_blank"><span data-dcnode-id="820" instrument_node="">Python</span></a><span data-dcnode-id="818" instrument_node=""> (a high-level programming language for general computer program and analyses) on </span><a class="Link" data-cms-ai="0" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaggle.com/c/introducing-kaggle-scripts" target="_blank"><span data-dcnode-id="817" instrument_node="">Kaggle Scripts</span></a><span data-dcnode-id="815" instrument_node="">. In 2017, following a successful pilot program, Chicago operationalized its West Nile virus analytics model. Chicago’s efforts to combat West Nile virus can potentially be replicated to help cities manage public health risks associated with other mosquito-borne illnesses, including the Zika virus. Chicago’s model along with instructions for running it are available on the city’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/Chicago/west-nile-virus-predictions" target="_blank"><span data-dcnode-id="814" instrument_node="">GitHub page</span></a><span data-dcnode-id="812" instrument_node="">.</span><br data-dcnode-id="811"><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><ul data-dcnode-id="801"><span data-dcnode-id="808" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">See “Predictive Analytics Guides West Nile Virus Control Efforts in Chicago” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/predictive-analytics-guides-west-nile-virus-control-efforts-in-chicago-1152" target="_blank"><span data-dcnode-id="806" instrument_node="">https://datasmart.ash.harvard.edu/news/article/predictive-analytics-guides-west-nile-virus-control-efforts-in-chicago-1152</span></a><span data-dcnode-id="804" instrument_node="">.</span></li><span data-dcnode-id="802" instrument_node="">
</span></ul><span data-dcnode-id="800" instrument_node="">
</span><h4 data-dcnode-id="798" id="7-zika-virus"><span data-dcnode-id="799" instrument_node="">7) Zika VIrus</span></h4><span data-dcnode-id="797" instrument_node="">
</span><b data-dcnode-id="794"><i data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Zika Outbreak Triggers Coordinated Analytics Response from Cities across the U.S.</span></i></b><br data-dcnode-id="793"><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
The Zika virus burst onto the international stage in 2016 as a global health emergency. While </span><a class="Link" data-cms-ai="0" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.who.int/mediacentre/factsheets/zika/en/" target="_blank"><span data-dcnode-id="790" instrument_node="">Zika is not a new virus</span></a><span data-dcnode-id="788" instrument_node="">, the unprecedented outbreak in 2016 brought this disease to the fore of public health debates around the globe. While travel-related Zika cases in the United States remain limited, local health officials and urban policymakers alike must grapple with the risk that Zika-infected mosquitoes pose to their communities. Zika is transmitted by the </span><i data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Aedes aegypti </span></i><span data-dcnode-id="785" instrument_node="">mosquito, which thrives in warm, wet climates. So, like West Nile virus, the risk of Zika in cities across the country will likely only grow in the years to come as climates become warmer around the globe.</span><br data-dcnode-id="784"><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
Unlike Chicago’s forecasted West Nile virus risk, New Orleans is already home to abundant </span><i data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Aedes aegypti</span></i><span data-dcnode-id="779" instrument_node=""> populations. New Orleans, like most cities, has well-established mosquito monitoring systems in place, but following the 2016 Zika outbreak additional methodologies and resources for controlling, monitoring, and predicting population spikes were needed. For example, New Orleans is using </span><a class="Link" data-cms-ai="0" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esri.com/en-us/arcgis/products/arcgis-online/overview" target="_blank"><span data-dcnode-id="778" instrument_node="">ArcGIS</span></a><span data-dcnode-id="776" instrument_node=""> (a geographic information system, GIS, software system) to create risk maps based on analytics to help identify baseline larval habitats and to streamline sampling after the city intervenes with a population.</span><br data-dcnode-id="775"><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">
National analytics strategies for addressing the risk of the Zika virus are still being structured, but a key first step for successfully deploying analytics in this area is to identify risk factors that could potentially exacerbate climate-based and warm season outbreaks. For example, in his Data-Smart City Solutions article, Jonathan Jay argues that analytics that correlate mosquito populations with vacant property areas can help cities pinpoint areas at high risk for an outbreak. Integrating or replicating existing analytics models is a likely next step. For instance, New Orleans is already using analytics to tackle blight, and linking this housing-specific effort to public health data could provide invaluable insights into mosquito-borne disease outbreaks and how to curb them.</span><br data-dcnode-id="772"><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
</span><ul data-dcnode-id="757"><span data-dcnode-id="769" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="765"><span data-dcnode-id="768" instrument_node="">See “How U.S. Cities Can Target Zika Risk” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//datasmart.ash.harvard.edu/news/article/how-u.s.-cities-can-target-zika-risk-960" target="_blank"><span data-dcnode-id="767" instrument_node="">http://datasmart.ash.harvard.edu/news/article/how-u.s.-cities-can-target-zika-risk-960.</span></a></li><span data-dcnode-id="764" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">See “Condensed Zika Virus Plan” (City of New Orleans) </span><a class="Link" data-cms-ai="0" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nola.gov/getattachment/Health/Emergency-Preparedness/Zika/Condensed-Zika-Plan-8-3-16.pdf/" target="_blank"><span data-dcnode-id="762" instrument_node="">https://www.nola.gov/getattachment/Health/Emergency-Preparedness/Zika/Condensed-Zika-Plan-8-3-16.pdf/</span></a><span data-dcnode-id="760" instrument_node="">.</span></li><span data-dcnode-id="758" instrument_node="">
</span></ul><span data-dcnode-id="756" instrument_node="">
</span><h4 data-dcnode-id="754" id="8-restaurant-inspections"><span data-dcnode-id="755" instrument_node="">8) Restaurant Inspections</span></h4><span data-dcnode-id="753" instrument_node="">
</span><b data-dcnode-id="750"><i data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Chicago Optimizes Restaurant Inspections with Analytics</span></i></b><br data-dcnode-id="749"><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node="">
Chicago has more than </span><a class="Link" data-cms-ai="0" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cityofchicago.org/city/en/about/facts.html" target="_blank"><span data-dcnode-id="746" instrument_node="">7,300 restaurants</span></a><span data-dcnode-id="744" instrument_node=""> within city limits, plus thousands of grocery stores and other food vendors. Despite the fact that the number of food establishments in Chicago totals </span><a class="Link" data-cms-ai="0" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chicago.github.io/food-inspections-evaluation/" target="_blank"><span data-dcnode-id="743" instrument_node="">more than 15,000</span></a><span data-dcnode-id="741" instrument_node="">, however, the city only employs three dozen inspectors. With no additional resources available for restaurant inspectors, the city needed to work smarter to improve its inspection performance. Following </span><a class="Link" data-cms-ai="0" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/webinar-recording-predictive-analytics-a-ten-step-guide-1220" target="_blank"><span data-dcnode-id="740" instrument_node="">media reports</span></a><span data-dcnode-id="738" instrument_node=""> highlighting poor food quality and inspection performance in restaurants, city officials focused on finding new solutions to help improve inspection processes. Chicago’s Department of Innovation and Technology (DoIT) worked with the Chicago Department of Public Health (CDPH) to develop an analytics model that would help forecast restaurants’ risk of failing inspection. The model, developed in partnership with AllState’s pro bono team, enabled the city to identify critical violations an average of seven days earlier than the previous process for ordering the inspections. In addition, Chicago’s Data Portal (the city’s open data hub) houses a </span><a class="Link" data-cms-ai="0" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.cityofchicago.org/Health-Human-Services/Food-Inspections/4ijn-s7e5/data" target="_blank"><span data-dcnode-id="737" instrument_node="">Food Inspections tracker</span></a><span data-dcnode-id="735" instrument_node=""> to provide the community with transparent, real-time information on the food inspection results for city restaurants.</span><br data-dcnode-id="734"><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">
</span><ul data-dcnode-id="712"><span data-dcnode-id="731" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">See “Delivering Faster Results with Food Inspection Forecasting” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/delivering-faster-results-with-food-inspection-forecasting-631" target="_blank"><span data-dcnode-id="729" instrument_node="">https://datasmart.ash.harvard.edu/news/article/delivering-faster-results-with-food-inspection-forecasting-631</span></a><span data-dcnode-id="727" instrument_node="">.</span></li><span data-dcnode-id="725" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">See “Food Inspections” (Chicago Data Portal) </span><a class="Link" data-cms-ai="0" data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.cityofchicago.org/Health-Human-Services/Food-Inspections/4ijn-s7e5/data" target="_blank"><span data-dcnode-id="723" instrument_node="">https://data.cityofchicago.org/Health-Human-Services/Food-Inspections/4ijn-s7e5/data</span></a><span data-dcnode-id="721" instrument_node="">.</span></li><span data-dcnode-id="719" instrument_node="">
</span><li class="Normal1CxSpLast" data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">See “Lessons from Leading CDOs” (Ash Center) Pg. 29, </span><a class="Link" data-cms-ai="0" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf" target="_blank"><span data-dcnode-id="717" instrument_node="">https://datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf</span></a><span data-dcnode-id="715" instrument_node="">.</span></li><span data-dcnode-id="713" instrument_node="">

</span><h4 data-dcnode-id="709" id="9-pest-control"><span data-dcnode-id="710" instrument_node="">9) Pest Control</span></h4><span data-dcnode-id="708" instrument_node="">
</span><b data-dcnode-id="705"><i data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Chicago’s DoIT Team Fills Information Gap with 311 Data to Curb Rodent Infestations </span></i></b><br data-dcnode-id="704"><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">
The City of Chicago’s Department of Innovation and Technology (DoIT), in partnership with Carnegie Mellon University’s Event and Pattern Detection Laboratory, developed predictive analytics tools to support efforts to combat rodent infestations in Chicago and to help the city develop more effective rodent baiting programs. Because the city had limited formal information documenting rodent populations, geography, and other factors critical to helping city officials tackle infestations, DoIT utilized 311 data in its analytics model to fill the information gap.</span><br data-dcnode-id="701"><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
311 call data is the foundation of the city’s rodent infestation analytics model and helps the city determine where rodent infestations could exist and predict where those populations could spike. Geospatial representations of this information support the Department of Streets and Sanitation’s rodent baiting program. Sean Thornton, a program advisor for the Civic Analytics Network based in Chicago, notes, “In July 2013, Mayor Rahm Emanuel announced that as a result of the City’s </span><a class="Link" data-cms-ai="0" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cityofchicago.org/city/en/depts/mayor/press_room/press_releases/2013/july_2013/chicago_departmentofstreetsandsanitationcrewsincreasepreventiver.html" target="_blank"><span data-dcnode-id="698" instrument_node="">increase in preventive rodent baiting efforts in 2012</span></a><span data-dcnode-id="696" instrument_node="">, resident requests for rodent control services have dropped 15% in 2013.”</span><a class="Link" data-cms-ai="0" data-dcnode-id="692" href="#_ftn1" target="_blank"><sup data-dcnode-id="693"><sup data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">[2]</span></sup></sup></a><br data-dcnode-id="691"><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
</span><ul data-dcnode-id="675"><span data-dcnode-id="688" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">See “Using Predictive Analytics to Combat Rodents in Chicago” (Ash Center) </span><a class="Link" data-cms-ai="0" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/news/article/using-predictive-analytics-to-combat-rodents-in-chicago-271" target="_blank"><span data-dcnode-id="686" instrument_node="">https://datasmart.ash.harvard.edu/news/article/using-predictive-analytics-to-combat-rodents-in-chicago-271</span></a><span data-dcnode-id="684" instrument_node="">.</span></li><span data-dcnode-id="682" instrument_node="">
</span><li class="Normal1CxSpMiddle" data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">See “Chicago Profile” in “Lessons from Leading CDOs” (Ash Center) Pgs. 29-30, </span><a class="Link" data-cms-ai="0" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf" target="_blank"><span data-dcnode-id="680" instrument_node="">https://datasmart.ash.harvard.edu/sites/default/files/2018-01/leasons_from_leading_cdos.pdf</span></a><span data-dcnode-id="678" instrument_node="">.</span></li><span data-dcnode-id="676" instrument_node="">
</span></ul><span data-dcnode-id="674" instrument_node="">
</span><b data-dcnode-id="671"><i data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Washington, D.C., Uses 311 Data and Analytics to Support Rat Abatement</span></i></b><br data-dcnode-id="670"><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
Following </span><a class="Link" data-cms-ai="0" data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//statescoop.com/to-squelch-rat-outbreak-d-c-turns-to-technology" target="_blank"><span data-dcnode-id="667" instrument_node="">a surge in 311 calls</span></a><span data-dcnode-id="665" instrument_node=""> related to rodent sightings in 2016, the District of Columbia’s city government decided to use analytics to help combat the city’s rat problem. The Lab @ DC, situated in the Office of the City Administrator, and the Office of the Chief Technology Officer (OCTO) work together on various city priorities and projects to develop data-driven solutions to help city government better serve the District. As part of this broader effort, the Lab @ DC and OCTO data scientists partnered with the rodent control team at </span><a class="Link" data-cms-ai="0" data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gcn.com/Articles/2017/08/01/Lab-DC-Leonard.aspx" target="_blank"><span data-dcnode-id="664" instrument_node="">the Department of Public Health</span></a><span data-dcnode-id="662" instrument_node=""> to develop an analytics model to identify environmental variables that help predict where a rat infestation is likely to develop. To build an analytics model, the city is using 311 data, and, similar to rodent infestation management efforts in Chicago, D.C. is working to identify leading indicators within 311 data to support that model. The city’s efforts to develop an analytics model to support rat abatement are ongoing.</span><br data-dcnode-id="661"><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
