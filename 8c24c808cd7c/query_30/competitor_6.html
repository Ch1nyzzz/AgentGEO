</span><div class="headerReadability" data-dcnode-id="1656"><h1 data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">8 Examples of Analytics</span></h1></div><span data-dcnode-id="1655" instrument_node="">

</span><picture class="headerImg" data-dcnode-id="1638"><source data-dcnode-id="1643" height="194" media="(max-width: 400px)" srcset="https://green.simplicable.com/images/291p/data-visualization-6080-150.jpg" width="291"><source data-dcnode-id="1642" height="233" media="(max-width: 600px)" srcset="https://green.simplicable.com/images/midthumb/data-visualization-6080-150.jpg" width="350"><source data-dcnode-id="1641" height="434" media="(max-width: 800px)" srcset="https://green.simplicable.com/images/thumbnails/data-visualization-6080-150.jpg" width="650"><source data-dcnode-id="1640" height="527" media="(min-width: 800px)" srcset="https://midori.simplicable.com/images/header/data-visualization-6080-150.jpg" width="790"><img class="headerImg" data-dcnode-id="1639" height="527" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//midori.simplicable.com/images/header/data-visualization-6080-150.jpg&amp;raw" width="790"></picture><div class="d001" data-dcnode-id="1637"></div><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Analytics</span></strong><span data-dcnode-id="1634" instrument_node=""> is a category tool for visualizing and navigating </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/data"><span data-dcnode-id="1633" instrument_node="">data</span></a><span data-dcnode-id="1631" instrument_node=""> and </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/statistics"><span data-dcnode-id="1630" instrument_node="">statistics</span></a><span data-dcnode-id="1628" instrument_node="">. Most analytics tools resemble a series of reports that can be customized and explored in a fluid user interface. The following are illustrative examples of analytics.</span><div class="d001" data-dcnode-id="1627"></div><span data-dcnode-id="1625" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="3688079285" data-dcnode-id="1624" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1623" instrument_node="">
</span><span data-dcnode-id="1620" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1619"></div><h2 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Web Analytics</span></h2><span data-dcnode-id="1616" instrument_node="">Tools that report web traffic with the ability to explore data by factors such as cohort, demographics, client technology, geography, traffic source, page, campaign and conversions.</span><div class="d001" data-dcnode-id="1615"></div><h2 data-dcnode-id="1612"><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/predictive-analytics"><span data-dcnode-id="1614" instrument_node="">Predictive Analytics</span></a></h2><span data-dcnode-id="1611" instrument_node="">Tools that make predictions about the future from patterns in past data. Although no one can predict the future with certainty, such tools are useful when assumptions need to be made. For example, an airline that is considering investing in a new route may attempt to predict future travel demand for a destination.</span><div class="d001" data-dcnode-id="1610"></div><span data-dcnode-id="1608" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7961849294" data-dcnode-id="1607" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1606" instrument_node="">
</span><span data-dcnode-id="1603" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1602"></div><h2 data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Retail Analytics</span></h2><span data-dcnode-id="1599" instrument_node="">Analytics for </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/retail"><span data-dcnode-id="1598" instrument_node="">retail</span></a><span data-dcnode-id="1596" instrument_node=""> forecasts and operations. For example, a retailer may attempt to predict demand for a trendy new style of shoe by color and sales region.</span><div class="d001" data-dcnode-id="1595"></div><h2 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Marketing Analytics</span></h2><span data-dcnode-id="1592" instrument_node="">Analytics to look at the results of </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/product-strategy"><span data-dcnode-id="1591" instrument_node="">product</span></a><span data-dcnode-id="1589" instrument_node="">, </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/pricing"><span data-dcnode-id="1588" instrument_node="">pricing</span></a><span data-dcnode-id="1586" instrument_node="">, </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/promotion"><span data-dcnode-id="1585" instrument_node="">promotion</span></a><span data-dcnode-id="1583" instrument_node="">, </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/advertising"><span data-dcnode-id="1582" instrument_node="">advertising </span></a><span data-dcnode-id="1580" instrument_node=""> and </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/distribution"><span data-dcnode-id="1579" instrument_node="">distribution</span></a><span data-dcnode-id="1577" instrument_node=""> strategies. For example, analytics might show that female customers in their 20s are 70% more likely to purchase a particular item at price A as compared to price B.</span><div class="d001" data-dcnode-id="1576"></div><span data-dcnode-id="1574" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="9871698235" data-dcnode-id="1573" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1572" instrument_node="">
</span><span data-dcnode-id="1569" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1568"></div><h2 data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Customer Analytics</span></h2><span data-dcnode-id="1565" instrument_node="">Analytics are often used to model customer behavior. For example, modeling the events that lead to a customer becoming </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/brand-loyalty"><span data-dcnode-id="1564" instrument_node="">brand loyal</span></a><span data-dcnode-id="1562" instrument_node="">.</span><div class="d001" data-dcnode-id="1561"></div><h2 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Business Analytics</span></h2><span data-dcnode-id="1558" instrument_node="">Analytics can be applied to any area of a business including strategy, operations and sales. For example, operations analytics might look at product cost, </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/quality-control"><span data-dcnode-id="1557" instrument_node="">quality control</span></a><span data-dcnode-id="1555" instrument_node=""> and the throughput of resources such as </span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/production-line"><span data-dcnode-id="1554" instrument_node="">production lines</span></a><span data-dcnode-id="1552" instrument_node="">.</span><div class="d001" data-dcnode-id="1551"></div><span data-dcnode-id="1549" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7544607396" data-dcnode-id="1548" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1547" instrument_node="">
</span><span data-dcnode-id="1544" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1543"></div><h2 data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Risk Analytics</span></h2><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/predictive-analytics"><span data-dcnode-id="1540" instrument_node="">Predictive analytics</span></a><span data-dcnode-id="1538" instrument_node=""> is often used to model </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-risk"><span data-dcnode-id="1537" instrument_node="">business risks</span></a><span data-dcnode-id="1535" instrument_node=""> such as the credit risk associated with a particular customer.</span><div class="d001" data-dcnode-id="1534"></div><h2 data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Real-time Analytics</span></h2><span data-dcnode-id="1531" instrument_node="">Tools that look at current as opposed to historical data. For example, a bank might monitor credit card transactions in real time using an analytics tool.</span><div class="d001" data-dcnode-id="1530"></div><table cellpadding="0" cellspacing="0" data-dcnode-id="1476" style="border: 1px solid gray; margin:0; padding:0;"><tbody data-dcnode-id="1477"><tr data-dcnode-id="1526" style="background-color: #292421; margin:0; padding:0;"><td class="tdTableHeaderCell" colspan="3" data-dcnode-id="1527"><span class="blogy" data-dcnode-id="1528" style="color: #FFFFFF;"><span data-dcnode-id="1529" instrument_node="">Overview: Analytics </span></span></td></tr><tr data-dcnode-id="1518" style="background-color: #FFFFFF; margin:0; padding:0;"><td class="td1of2" data-dcnode-id="1523"><span class="blogy" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Type</span></span></td><td class="td2of2" data-dcnode-id="1519"><span class="blogy" data-dcnode-id="1520"><a data-dcnode-id="1521" href="https://chatnoir
