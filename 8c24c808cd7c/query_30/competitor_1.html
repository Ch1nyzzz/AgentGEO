ument_node="">EPUB</span></button></div></div></div><a aria-label="Information about the toolbar" class="btn pull-left js-toolbar-action" data-dcnode-id="432" href="#" title="Information about the toolbar"><i class="fa fa-info" data-dcnode-id="433"></i></a><h1 data-dcnode-id="426"><span data-dcnode-id="431" instrument_node="">
</span><i class="fa fa-circle-o-notch fa-spin" data-dcnode-id="430"></i><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urbanspatial.github.io/PublicPolicyAnalytics/"><span data-dcnode-id="429" instrument_node="">Public Policy Analytics: Code &amp; Context for Data Science in Government</span></a><span data-dcnode-id="427" instrument_node="">
</span></h1><span data-dcnode-id="425" instrument_node="">
</span></div><span data-dcnode-id="423" instrument_node="">
</span><div class="page-wrapper" data-dcnode-id="42" role="main" tabindex="-1"><span data-dcnode-id="422" instrument_node="">
</span><div class="page-inner" data-dcnode-id="44"><span data-dcnode-id="421" instrument_node="">
</span><section class="normal" data-dcnode-id="46" id="section-"><span data-dcnode-id="420" instrument_node="">
</span><div class="section level1 unnumbered" data-dcnode-id="90" id="introduction"><span data-dcnode-id="419" instrument_node="">
</span><h1 class="hasAnchor" data-dcnode-id="416"><span data-dcnode-id="418" instrument_node="">Introduction</span><a class="anchor-section" data-dcnode-id="417" href="#introduction"></a></h1><span data-dcnode-id="415" instrument_node="">
</span><div class="section level2 unnumbered" data-dcnode-id="331" id="how-governments-make-decisions"><span data-dcnode-id="414" instrument_node="">
</span><h2 class="hasAnchor" data-dcnode-id="411"><span data-dcnode-id="413" instrument_node="">How governments make decisions</span><a class="anchor-section" data-dcnode-id="412" href="#how-governments-make-decisions"></a></h2><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Although many readers chose this book for an introduction to R, geospatial data science, and machine learning, my goal was to write a book about public-sector decision-making.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">The typical methods-driven public policy book is about generating evidence that legislators can use to set budgets. This ‘budgetary’ decision-making receives the bulk of attention from academics, journalists, and policymakers - and for good reason. However, simply signing a promising bill into a law, does not guarantee success.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Once millions of dollars are budgeted for a program, a government agency decides how to allocate that money, to whom, how often, and for how long. Despite receiving far less attention than budgetary decision-making, this ‘operational’ decision-making is equally important. A good policy manifested as a poorly designed program can be just as ineffective as a bad policy.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">A program should maximize benefits and minimize costs. This is much more difficult in the public sector, than in the private sector. There are no shortage of CEOs and management professionals who bloviate ad nauseam on the need for government to embody private sector ideals and leadership practices.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Optimizing the cost/benefit ratio is easier in business because the only relevant bottom line is profit. It matters little whether profit maximization has a negative effect on competitors, consumers, the environment, or other stakeholders. Optimizing the cost/benefit ratio in government is far more difficult because the bottom lines are many, and at times, ambiguous. Yes, there are economic bottom lines, but a ‘good’ decision in government must simultaneously optimize for economics, political cohesion, equity, and bureaucracy, to name a few.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Because the bottom lines in government are so nuanced, it is often very difficult to understand how decisions are made. In my experience, there are four typical approaches:</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="391" instrument_node="">Ad hoc: </span><em data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">‘Why do we do it this way?’</span></em></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="384"><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">‘I don’t know.’</span></em></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Decision-making without precedent is rare but not unheard of. Ad hoc decision-making is most common when decisions are made by individuals who are free to act autonomously in the absence of a top-down, centralized decision-making apparatus. An example might be an inspector, guided by a loose set of top-down directives on what to inspect and when. While an experienced inspector may make more good decisions than bad ones, the decisions of an inexperienced inspector may have significant economic and social costs.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="379" instrument_node="">Political: </span><em data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">‘Why do we do it this way?’</span></em></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="372"><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">‘Because I can’t afford to upset the elected official who sets my agency’s budget every year.’</span></em></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Government is political by nature, and thus decisions may serve certain groups over others. If say, property developers capture a disproportional amount of political capital, then there is a higher likelihood that government decisions will go in their favor. The result is decision-making incentives that may not optimize for critical bottom lines, like equity.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="367" instrument_node="">Institutional knowledge: </span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">‘Why do we do it this way?’</span></em></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="360"><em data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">‘Well, because we have always done it that way.’</span></em></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">As government progressed from Tammany-style, political machine governance to a system of checks and balances in the mid-19th century, a set of incentives emerged designed to maximize efficiency, promote rational decision-making, and prevent corruption. The ‘bureaucracy’ that resulted is characterized by top-down organization, a clear division of labor, practical expertise, and a rigid set of rules. While the bureaucracy can be helpful, it may also disincentivize innovation.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">For example, government data scientists often report difficulty in downloading open-source technology because IT managers argue it preempts their ability to prevent computer security mishaps. Thus, older, clunky, and expensive to maintain ‘legacy computer systems’ are often hard to pivot away from.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Similar dynamics may exist when individuals attempt to innovate from midway in the chain of command. Innovation is newness and nothing in government is newer than an incoming administration - with new ideas, new processes, and new politics. Members of the old administration who are unable to work within the new paradigm are often dismissed. Given the potential for shifting political winds every four years, self-preservation may lead the career bureaucrat to avoid risk-taking. When all stakeholders (particularly senior leadership) stay in their own lane, organizational processes become entrenched and innovation stifled. Not only then does, ‘Because we have always done it that way’, become a slogan, but it becomes a firewall.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="349" instrument_node="">Evidenced-based: </span><em data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">‘Why do it we do it this way?’</span></em></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="342"><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">‘Because the data suggests this is the best approach.’</span></em></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Evidenced-based public policy is a major theme of this book. One of the key indicators of an evidenced-based approach is whether operational decisions are made reactively or proactively. Cash-strapped agencies may not have the resources to be proactive, instead they work to put out fires in real time. The proactive decision-maker generalizes their knowledge and experience from the past to preempt fires before they start.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Civil servants are the best among us - vastly underpaid, they work hard to solve society’s most complex problems. While most government agencies use data and evidence in one form or another, the analytics discussed in this book are expressly designed to enable proactive decision-making, and hopefully, more effective government programs.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">When I discuss this work with policymakers, the initial focus is almost never on data science or technology. Instead, I try to learn how they currently make decisions. What are the inputs, outputs and consequences of those decisions? A more evidenced-based approach is only possible with answers to these questions. Thus, the foundation for successful public-sector data science is not statistics or computer science, but domain expertise.</span></p><span data-dcnode-id="332" instrument_node="">
</span></div><span data-dcnode-id="330" instrument_node="">
</span><div class="section level2 unnumbered" data-dcnode-id="273" id="context-as-the-foundation"><span data-dcnode-id="329" instrument_node="">
</span><h2 class="hasAnchor" data-dcnode-id="326"><span data-dcnode-id="328" instrument_node="">Context as the foundation</span><a class="anchor-section" data-dcnode-id="327" href="#context-as-the-foundation"></a></h2><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Each chapter of this book focuses on a ‘use case’. For our purpose, a use case is a specific set of circumstances that drive the development of a technology solution. For example, the use case of the Uber app is to match a rider with a driver and get them both from point A to B. The use case of Zillow’s Zestimate algorithm is to provide a home buyer with an estimate of home value even if that house has not sold recently.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The term ‘use case’ is more prevalent in technology than in social science. An anti-eviction effort for instance, is far more comprehensive than Uber’s singular use case: A housing stability initiative seeks to decrease evictions by providing tenants with legal protections; enacting more onerous landlord regulations; strengthening code enforcement; promoting affordable housing in neighborhoods of opportunity; bettering schools; creating safer streets; more intergenerational mobility and so on and so forth.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">A comprehensive effort like this, can however, be deconstructed into a series of individual programs and further still, into a set of discrete use cases around service delivery and operational decision-making. Perhaps one use case uses housing and court data to predict landlords who are renting without a license. Another might be to develop a website that allows at-risk families to be linked with community legal services.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">How can complex policy initiatives boil down to discrete technology use cases? Start with the context. Here is my framework for doing so:</span></p><span data-dcnode-id="313" instrument_node="">
</span><ol data-dcnode-id="287" style="list-style-type: decimal"><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="307"><p data-dcnode-id="308"><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">What is the policy?</span></em><span data-dcnode-id="309" instrument_node=""> In a nutshell, the policy is a set of guiding principles used to achieve a set of goals or outcomes. If the data scientist does not know the policy, then it will be difficult to design solutions to achieve policy goals. Interestingly, sometimes different policies can support the same policy goal, and often policies change dramatically with successive administrations, across geographic locales, and over time.</span></p></li><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="301"><p data-dcnode-id="302"><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">What are the programs in place to achieve the policy goals?</span></em><span data-dcnode-id="303" instrument_node=""> Programs and policies are often confused as being the same. The program is the tool used to implement the policy to achieve the policy goals. Designing strong programs is incredibly difficult and failed programs may result from ill-conceived policies or from bad program design. Perhaps the designer did not consider unintended consequences or misunderstood the role of incentives. In my experience, good programs have strong cost/benefit ratios, meaning a marginal government investment generates a significant economic, social, public health, etc. return for citizens.</span></p></li><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="295"><p data-dcnode-id="296"><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Does a program work?</span></em><span data-dcnode-id="297" instrument_node=""> Some government programs are truly transformational and others, not so much. Program evaluation is the art and science of estimating the efficacy of a program for the purposes of budgetary decision-making. It is typically the domain of trained social scientists who understand programs so well that they can estimate the causal impact of the program on an outcome of interest.</span></p></li><span data-dcnode-id="294" instrument_node="">
</span><li data-dcnode-id="289"><p data-dcnode-id="290"><em data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">How is the program delivered?</span></em><span data-dcnode-id="291" instrument_node=""> This is operational decision-making, and the area where data scientists can have the greatest impact. The goal is to deliver resources when, where, and to whom they are most needed. Who is eligible for a program? Must participants actively sign up for the program or can they be targeted based on certain criteria? Can we learn from the experience of past program participants to intervene more effectively with future participants? Do citizens interact with the program by mail, by showing up in person, or through a web portal? How can data and technology help an agency improve the program at the margins? These are just a few of many important questions.</span></p></li><span data-dcnode-id="288" instrument_node="">
</span></ol><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">This context is required for data scientists to have impact in government. While it is possible to procure data science from private vendors, the need to scale across many customers means one solution often lacks local domain experience. These products have also been known to ‘over promise and under-deliver’ - especially when their sales pitches include terms like “Smart Cities” and “AI”.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">Developing data science in house is much harder but ensures that solutions are based on local knowledge. The best mechanism for growing this human capital is free and open source technology. Open source software and open data has been a great catalyst for public-sector innovation, but the next horizon is ‘open analytics’. As governments collect similar data and have similar use cases, shared analytical tools will help data science </span><em data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">learning</span></em><span data-dcnode-id="279" instrument_node=""> scale more easily.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">I hope this book helps jump start the open analytics movement and helps position data science as a tool for operational decision-making. While many see data science as this shiny new object - I contend that it is really just a new take on Planning - something government does by default. Data science as a Planning tool is where its real potential lies.</span></p><span data-dcnode-id="274" instrument_node="">
</span></div><span data-dcnode-id="272" instrument_node="">
</span><div class="section level2 unnumbered" data-dcnode-id="227" id="data-science-as-a-planning-tool"><span data-dcnode-id="271" instrument_node="">
</span><h2 class="hasAnchor" data-dcnode-id="268"><span data-dcnode-id="270" instrument_node="">Data science as a planning tool</span><a class="anchor-section" data-dcnode-id="269" href="#data-science-as-a-planning-tool"></a></h2><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="266" instrument_node="">I relate data science to Planning in the context of strategic planning rather than traditional, ‘comprehensive’ plan-making. Both Planning and data science are interested in the effective allocation of limited resources. Both ask what resources are at hand? Which are lacking? And where can these resources go to mitigate risk and promote opportunity?</span><a class="footnote-ref" data-dcnode-id="263" href="#fn1" id="fnref1"><sup data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">1</span></sup></a></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">As I mentioned, a good government program means a greater return on a marginal investment. Data science as a Planning tool, is an example of a marginal government investment, particularly as government already collects data and already has a mandate to plan, mitigate risk, etc.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Many chapters in this book are focused on predictive modeling via a set of methods referred to as machine learning. The goal of machine learning as I see it, is to ‘borrow the experience’ of people or places from the recent past and test the extent to which that experience generalizes into the near future.</span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="254" instrument_node="">In this context, prediction is a powerful Planning tool that can borrow from the overdose experience on these vacant lots to predict overdose </span><em data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">risk</span></em><span data-dcnode-id="251" instrument_node=""> on those vacant lots; and can borrow the homelessness experience from these residents to predict homelessness risk for others.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">When these risks are known, planners can more effectively target their limited resources, like overdose prevention and housing programs.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">It is hard to predict things, particularly in complex urban systems. As we will learn in Chapter 3, the goal is not to model all the complexity, but slice off use cases in more bounded systems with more simplistic interactions.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">The algorithms in this book are judged by their ‘usefulness’ as Planning and decision-making tools. A useful tool has a greater cost/benefit than the ‘business-as-usual’ approach. While economic costs and benefits are important, social costs are far more critical. Much time is spent in the second half of the book ‘opening the black box’ of our algorithms to mitigate decisions that further disenfranchise or discriminate.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">By the Conclusion, we will learn how these insights inform a new ‘Algorithmic Governance’ approach, built on the belief that algorithmic decision-making is just a new take on the traditional approach to program design and Planning.</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Many Planning questions are placed-based, and start with the word “where”. This book focuses heavily on ‘Geospatial data science’ - which is a new label for a discipline, quantitative geography, that goes back at least as far as the 1950s. Quantitative geography has a rich history, much of which relates directly to Planning.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Geospatial data science repurposes the tools of quantitative geography to support Planning that increasingly relies on large, real-time geospatial databases, predictive modeling, data visualization, analytical dashboards and other emerging technologies.</span></p><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Answering “where” questions can inform placed-based decision-making - but doing so requires an understanding of how spatial data is different from non-spatial data, and how modeling spatial systems requires a unique understanding of why things locate where they do.</span></p><span data-dcnode-id="228" instrument_node="">
</span></div><span data-dcnode-id="226" instrument_node="">
</span><div class="section level2 unnumbered" data-dcnode-id="154" id="the-importance-of-spatial-thinking"><span data-dcnode-id="225" instrument_node="">
</span><h2 class="hasAnchor" data-dcnode-id="222"><span data-dcnode-id="224" instrument_node="">The importance of spatial thinking</span><a class="anchor-section" data-dcnode-id="223" href="#the-importance-of-spatial-thinking"></a></h2><span data-dcnode-id="221" instrument_node="">
</span><center data-dcnode-id="217"><span data-dcnode-id="220" instrument_node="">
</span><img data-dcnode-id="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urbanspatial.github.io/PublicPolicyAnalytics/data/images/students_at_recess.png&amp;raw"><span data-dcnode-id="218" instrument_node="">
</span></center><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Very infrequently are social science phenomena randomly distributed in space, like the above visualization of students roaming the recess blacktop.</span></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Developers do not locate their next suburban shopping mall by throwing a dart at the map. Police do not randomly allocate patrols to neighborhoods. Civil engineers do not connect any two places with a highway. Social scientists have spent decades understanding why people, businesses, and other entities locate where they do. Understanding why firms cluster can help cities grow the next Silicon Valley. Understanding why gentrifiers buy into certain neighborhoods can help cities plan affordable housing.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The best way to start understanding these dynamics is to simply map the ‘spatial process’ or spatial pattern in the outcome of interest. Let us look at some real and metaphorical examples of spatial processes below. Figure 1.2 illustrates the spatial configuration of students in a lecture hall. Why are the students located at a uniform distance from one another?</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">This spatial process is called ‘dispersion’. A decision was made by the room’s designer that no more than 60 students can be in the room and all chairs will be located at a fixed distance. As illustrated below, the location of fire stations provides a real-world example of dispersion. Fire stations are distributed to efficiently minimize response times and to ensure that fire service areas do not overlap.</span></p><span data-dcnode-id="204" instrument_node="">
</span><center data-dcnode-id="200"><span data-dcnode-id="203" instrument_node="">
</span><img data-dcnode-id="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urbanspatial.github.io/PublicPolicyAnalytics/data/images/dispersed.png&amp;raw"><span data-dcnode-id="201" instrument_node="">
</span></center><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="198" instrument_node="">A third spatial process is clustering. The students below have chosen to sit with their friends at long tables in a lunchroom. This configuration is the result of students self-selecting into lunchtime cliques. </span><em data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Reported</span></em><span data-dcnode-id="195" instrument_node=""> burglaries are a real world example of clustering - a spatial process discussed at length in Chapter 5.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Most spatial processes of interest to policymakers exhibit clustering. Tech companies cluster to take advantage of labor market efficiencies. Gentrifiers cluster to capitalize on emerging amenities. Disease clusters because vulnerable populations live among one another.</span></p><span data-dcnode-id="190" instrument_node="">
</span><center data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">
</span><img data-dcnode-id="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urbanspatial.github.io/PublicPolicyAnalytics/data/images/clustered.png&amp;raw"><span data-dcnode-id="187" instrument_node="">
</span></center><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">The lecture hall designer chose to disperse students, while in the lunchroom, students self-selected into clusters. One way to think about these spatial processes is that the former is driven by an external decision imposed on the system, while the latter involves decisions imposed on the system from within.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">The most difficult spatial phenomena typically feature both forms of decision-making. Take segregation for example. Segregation results from the external decisions of institutions to force certain people to live in certain places. It may also occur because members of one race self-select into neighborhoods with others of their same race. A thorough understanding of both spatial dynamics is required to fully understand segregation.</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">The below classroom is an example of multiple spatial processes. At a more global scale, an external decision was made to disperse the tables and thus the students at equal intervals. The students then can self-select into table clusters of their choosing.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Many spatial phenomena involve multiple scales of spatial interaction. The Boston home price map illustrates how home prices cluster across neighborhoods but also vary within neighborhoods. Chapters 3 and 4 explore the spatial process in home prices to help predict prices across space.</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="172" instrument_node="">In a word, it is </span><em data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">scale</span></em><span data-dcnode-id="169" instrument_node=""> that makes the understanding of spatial process so difficult, and scale is the most difficult challenge to overcome in spatial analysis. Scale problems persist in how arbitrary units like Census Tracts are used to summarize an underlying population; in how one measures exposure from a community to nearby risk factors; and most importantly, in how a certain dynamic in one community generalizes to community contexts elsewhere.</span></p><span data-dcnode-id="167" instrument_node="">
</span><center data-dcnode-id="163"><span data-dcnode-id="166" instrument_node="">
</span><img data-dcnode-id="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urbanspatial.github.io/PublicPolicyAnalytics/data/images/multiple_scales.png&amp;raw"><span data-dcnode-id="164" instrument_node="">
</span></center><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="161" instrument_node="">These different spatial processes of clustering, randomness, and dispersion are well known to geographers. The famous First Law of Geography states that, although all things are related, nearer things are more related than farther things.</span><a class="footnote-ref" data-dcnode-id="158" href="#fn2" id="fnref2"><sup data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">2</span></sup></a><span data-dcnode-id="157" instrument_node=""> More of a statistical inevitability than a law, this ‘spatial autocorrelation’ suggests, for instance, that the elevation five feet from you is more like the elevation under your feet, than the elevation 5 miles away. The same can be said for crime, home prices, and the income of your neighbors. The more the analyst understands the scale in which nearer things are related, the more useful their analytics are for decision-making.</span></p><span data-dcnode-id="155" instrument_node="">
</span></div><span data-dcnode-id="153" instrument_node="">
</span><div class="section level2 unnumbered" data-dcnode-id="92" id="learning-objectives"><span data-dcnode-id="152" instrument_node="">
</span><h2 class="hasAnchor" data-dcnode-id="149"><span data-dcnode-id="151" instrument_node="">Learning objectives</span><a class="anchor-section" data-dcnode-id="150" href="#learning-objectives"></a></h2><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">This book is as concerned with data science context as it is with data science code. I hope it appeals both to budding public sector data scientists as well as policymakers looking to learn more about this technology. If you are reading the print version of this book and would like to run the code, the online ‘Bookdown’ makes it easy to copy and paste code from your browser into R.</span></p><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Material for this book was originally written for graduate students in the Master of Urban Spatial Analytics program at the University of Pennsylvania - a program I direct. Most of my students come in with at least some technical experience - mostly in spatial analysis, but many have no experience writing R code. My goal is not to teach them coding per se, but how to take the code I give them (and have given you) and hack it together to create something new. I have found this format works well for teaching data science to social science students, so long as readers are interested in solving the underlying problems that motivate each chapter.</span></p><span data-dcnode-id="142" instrument_node="">
</span><p data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">This book is written in R which is a free and open source programming language with millions of users worldwide. R has fostered a huge community of impassioned individuals who are equally as interested in developing code for their own uses as they are in sharing it with others. As a result, a free and open source R package exists for almost any analytical pursuit. The reason to code data science rather than mouse click it, is reproducibility - to write the code once such that it can be replicated in the future with ease.</span></p><span data-dcnode-id="139" instrument_node="">
</span><p data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Because R is open source and community-driven, it is constantly being updated and improved. Inevitably, the code in this book will become dated (likely as soon as it is published), and while I will try to update the text over time, you may have to rely on the internet for quick fixes.</span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="135" instrument_node="">There are many books and resources that you can use to supplement your learning. Google is smart enough to understand R-related error questions and will likely pass you along to websites like Stackoverflow. There are two supplemental books that I can recommend as well. The first is R for Data Science by Hadley Wickham and Garrett Grolemund which provides a thorough introduction to the </span><code data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">tidyverse</span></code><span data-dcnode-id="132" instrument_node=""> approach to R programming.</span><a class="footnote-ref" data-dcnode-id="129" href="#fn3" id="fnref3"><sup data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">3</span></sup></a><span data-dcnode-id="128" instrument_node=""> The second is Geocomputation with R by Lovelace, Nowosad &amp; Muenchow.</span><a class="footnote-ref" data-dcnode-id="125" href="#fn4" id="fnref4"><sup data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">4</span></sup></a></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Chapters 1 and 2 of this book focus on descriptive data science. Chapter 1 introduces R in the context of exploratory spatial analysis, developing a series of transit indicators to communicate complex metrics to non-technical decision-makers. Chapter 2 continues introducing the R workflow as well as geoprocessing to help planners in Lancaster County, Pennsylvania choose a town suitable for new development rights.</span></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Chapters 3-8 convey predictive data science. Chapters 3 and 4 introduce geospatial machine learning, providing a framework for assessing the accuracy and generalizability of models across different spatial contexts. The goal is to forecast home prices, an algorithm many counties now use to assess property taxes. Home prices exhibit a very nuanced spatial process which makes it a fascinating first use case of geospatial machine learning.</span></p><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Chapter 5 introduces geospatial risk prediction, demonstrating the perils of Predictive Policing. Data from Chicago is used to train a predictive model that predicts burglary risk for every location citywide. Predictions are evaluated for fairness and we begin to discuss how selection bias is converted to algorithmic bias.</span></p><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Chapter 6 introduces person-based predictive models focusing on ‘churn’, the probability that a client will re-subscribe to a subsidy or service. This use case is incredibly important for agencies that allocate resources to individuals, households or families.</span></p><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Chapter 7 builds on chapters 5 and 6 by providing a framework for assessing algorithmic fairness in person-level predictions. Using a classic example from the criminal justice field, the goal is to understand the extent to which a decision-making tool may have a disparate impact on a protected class, like race.</span></p><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Chapter 8 aggregates much of what we have learned about geospatial machine learning to help forecast space/time rideshare demand in Chicago. This use case brings us right to the cusp of integrating ‘Big Data’ in forecasting models, which is the reasonable next step for the would-be public-sector data scientist.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Finally, the Conclusion connects the algorithmic themes of the book with traditional Planning practice, introducing the ‘Algorithmic Governance’ framework for integrating data science into government programs.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="101" instrument_node="">All of the data in the book are open data, much of which can be accessed directly from the web. In each chapter, code is provided for downloading these datasets from the web. Should the form or path of these datasets change, the code will no longer be useful, and readers should read in data from the book’s Github repository.</span><a class="footnote-ref" data-dcnode-id="98" href="#fn5" id="fnref5"><sup data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">5</span></sup></a></p><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">Assignments are associated with each chapter. The goal is to have readers replicate what they have learned on a new dataset and to communicate important themes and findings to non-technical decision-makers. If you are working on these assignments independently, I urge you to focus on data visualization and short, concise written narrative.</span></p><span data-dcnode-id="93" instrument_node="">
</span></div><span data-dcnode-id="91" instrument_node="">
</span></div><span data-dcnode-id="89" instrument_node="">
</span><div class="footnotes" data-dcnode-id="48"><span data-dcnode-id="88" instrument_node="">
