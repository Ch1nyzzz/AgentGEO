</span><h4 class="panel-title" data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">
</span><a data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">
                                Methodology
                            </span></a><span data-dcnode-id="1691" instrument_node="">
</span></h4><span data-dcnode-id="1689" instrument_node="">
</span></div><span data-dcnode-id="1687" instrument_node="">
</span><div class="panel-collapse collapse in" data-dcnode-id="1616" id="collapse-bp-2"><span data-dcnode-id="1686" instrument_node="">
</span><div class="panel-body" data-dcnode-id="1618"><span data-dcnode-id="1685" instrument_node="">
</span><h2 data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Construction</span></h2><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Construction enterprises data are collected in accordance with the Reporting Form System of Construction Statistics stipulated by the National Bureau of Statistics. The annual reporting forms on construction statistics are designed in accordance with local situations for comprehensive collection by statistical bureaus of each province, autonomous region and municipality and conveyance level by level upwards. Data on prospecting and designing institutions and their personnel are provided by the Ministry of Housing and Urban-Rural Development, based on the requirements on the annual reporting specified in the Statistical Reporting Form System of Prospecting and Designing stipulated by the Ministry of Housing and Urban-Rural Development</span></p><span data-dcnode-id="1679" instrument_node="">
</span><h2 data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Population</span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">The national population census is conducted in the year ending with 0; the national 1 percent population sample survey is conducted in the year ending with 5; sample surveys on population changes are conducted in the rest of the years which cover about 1 per thousand of the total population of the country. The sample survey on population change takes the whole nation as the population and each province, autonomous region or municipality as sub-populations, and the stratified multi-stage systematic PPS cluster sampling scheme is used.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><h2 data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Real estate</span></h2><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">It includes information on investments completed during the period on a consolidated basis, in residential &amp; office buildings and others as well as floor space of buildings under construction, completed and others. The data are provided in millions of CNY while the floor space is provided in m².&nbsp;Data on trans-provincial projects are provided by various departments under the State Council. Data on investments in fixed assets by individuals in rural areas are provided by the Department of Rural Social and Economic Survey of the NBS through its rural social and economic survey. Other data on investments in fixed assets are from surveys conducted by the Department of Investment and Construction Statistics of the NBS.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">All data on investments in fixed assets are collected by the system of reporting form with complete enumeration, except data on individual investments in fixed assets in rural areas, which are collected through sample surveys.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><h2 data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Employment</span></h2><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">The annual employment data for China is published by the National Bureau of Statistics in its annual statistical year book. This publication covers&nbsp; the basic conditions of China’s labour economy, including main labour statistics on the whole country and 31 provinces, autonomous regions and municipalities directly under the Central Government, such as the economically active population, number of employed persons, staff and workers, number of registered unemployed persons in urban areas, total wage bills and average wages of staff and workers and the changes in index.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">The method of survey is a complete reporting form system from lower-level statistical bureaus to higher level statistical bureaus is used in the labour statistics. The Sampling Survey on Labour Force are conducted using sampling methods. Statistics on training, employment, private enterprises and self-employed individuals are collected and compiled on basis of administrative registering records.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><h2 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Employment by sector</span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">The employment by sector (1978 to 2002) data are wage workers and staff and do not include private institution and self employed workers.&nbsp;</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The active employment by sector (2003 to present) are number of employed persons in urban units.&nbsp;</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">The two sets of employment by sector data are not directly comparable due to the difference in methodology standards as we ll as industry classification.&nbsp;</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">The national figures are revised annually and adjustments are made based on the lower level data (such as provincial levels), whilst the provincial level data are published one period each year and no revisions are captured. As a result, there are minor differences observed when comparing the national and provincial level data.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Final consumption expenditure</span></h2><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">This &nbsp;refers to the total expenditure of resident units for purchases of goods and services from both the domestic economic territory and abroad to meet the needs of material, cultural and spiritual life. It does not include the expenditure of non-resident units on consumption in the economic territory of the country. The final consumption expenditure is broken down into household consumption expenditure and government consumption expenditure.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><ul data-dcnode-id="1626"><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Household Consumption Expenditure&nbsp;- refers to the total expenditure of resident households on the final consumption of goods and services. In addition to the consumption of goods and services bought by the households directly with money, the household consumption expenditure also includes expenditure on goods and services obtained by the households in other ways, i.e. the so-called imputed consumption expenditure, which includes the following: (a) the goods and services provided to households by employers in the form of payment in kind and transfer in kind; (b) goods and services produced and consumed by the households themselves, in which the services refer to the owner-occupied housing and services offered by paid family employees; (c) financial intermediate services provided by financial institution.</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Government Consumption Expenditure -&nbsp;refers to the consumption expenditure spent for the provision of public services provided by the government to the whole country and the net expenditure on the goods and services provided by the government to households free of charge or at reduced prices. The former equals to the output value of the government services minus the value of operating income obtained by the government departments. The latter equals to the market value of the goods and services provided by the government free of charge or at reduced prices to the households minus the value received by the government from the households.</span></li><span data-dcnode-id="1627" instrument_node="">
</span></ul><span data-dcnode-id="1625" instrument_node="">
</span><h2 data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Moody's Analytics supplements</span></h2><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">We compute government balance.</span></p><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">

</span><a data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">
                                Revisions
                            </span></a><span data-dcnode-id="1607" instrument_node="">
</span></h4><span data-dcnode-id="1605" instrument_node="">
</span></div><span data-dcnode-id="1603" instrument_node="">
</span><div class="panel-collapse collapse in" data-dcnode-id="1580" id="collapse-bp-3"><span data-dcnode-id="1602" instrument_node="">
</span><div class="panel-body" data-dcnode-id="1582"><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">The China statistical yearbook is release annually, and data revision of the previous years would be covered in the latest publication.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1597" instrument_node="">The preliminary release is announced in early February through a press release on the NBS website. For example, the 2011 annual numbers (main top line only) were published on the 22 of February 2012 (</span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stats.gov.cn/tjgb/ndtjgb/qgndtjgb/t20120222_402786440.htm" target="3dpty"><span data-dcnode-id="1596" instrument_node="">citation</span></a><span data-dcnode-id="1594" instrument_node="">) Data dissemination are brief and provide no history, it includes: GDP, CPI, Industrial Product, Industrial Profit, Fixed Asset Investment, Real Estate data, Domestic Trade, Foreign Trade, Foreign Direct Investment, Transport and Tourism, Monetary, Population.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">First revision in May: Between May to July, there is a revision that gets published only in a hardcopy. This is not the yearbook.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Final revision in September: The hardcopy of China Yearbook is available.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Between December and January: The online version of China Yearbook is made available for public.</span></p><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">

</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Regional data in this Yearbook are prepared by the statistical bureaus of the provinces, autonomous regions and municipalities. The sum of the regional data is not equal to the national data due to the decentralized accounting approach.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><h2 data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Population</span></h2><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">In the year of the census, i.e 1990, 2000, 2010 there will be missing data for the sample population by region.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><h2 data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Data breaks</span></h2><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">For employment, there is a break in method from 2019 due to the benchmarking to the 4th Economic Census, so active series contain a "[Break in method from 2019]" notation.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">For retail sales, there is a break in method from 2017 due to the benchmarking to the 4th Economic Census, so active series contain a "[Break in method from 2017]" notation. For the national series, the break started from as early as 1992 because total retail sales of consumer goods before 1992 referred to total retail sales of social commodities.</span></p><span data-dcnode-id="1547" instrument_node="">
