</span><h2 data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Introduction to&nbsp;Big Data Analytics</span></h2><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">Big Data stands for data sets which is usually much larger and complex than the common know data sets which usually handles by RDBMS. Well, know traditional data management applications like RDBMS are not able to manage those data sets. Big Data can be applied to Un-structured, Structured and Semi-structured data sets based on requirements and needs. Whereas Big Data is mostly applied to Un-structured data sets. Many of the well-known simultaneous Computing tools, </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/what-is-business-analytics/"><span data-dcnode-id="1605" instrument_node="">Business Analytics Software</span></a><span data-dcnode-id="1603" instrument_node=""> require Big Data for handling their large data sets. Nowadays Big Data Analytics has been used in various Sectors like Media, Education, Healthcare, Manufacturing, various Government and non-government sectors and so on.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><h3 data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">The Concept of Big Data and Big Data Analytics</span></h3><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Big Data comes to play for a large and complex data sets which can be considered from multiples of terabytes to exabytes. This huge and complex data sets cannot be manipulated by common traditional data management applications like RDBMS. Here big data has been used to manage those large data sets. Big Data can be applied to Un-structured, Structured and Semi-structured data sets based on requirements and needs. Whereas Big Data is mainly focused on Un-structured data sets. Nowadays Big Data Analytics has been applied on various Sectors like Media, Education, Healthcare, Manufacturing, various Government and non-government sectors and also it has been used in complex analytics, real-time fraud management, traffic management, customer-centric analytics and many more.</span></p><div class="code-block code-block-19" data-dcnode-id="1578" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1595" instrument_node="">
</span><span data-dcnode-id="1593" instrument_node="">

</span><p data-dcnode-id="1582" style="margin-bottom:0;"><small data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Hadoop, Data Science, Statistics &amp; others</span></small></p><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span></div><span data-dcnode-id="1577" instrument_node="">
</span><h3 data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Key Characteristics of Big Data Analytics</span></h3><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Below are the different Key Characteristics of Big Data Analytics:</span></p><span data-dcnode-id="1571" instrument_node="">
</span><ul data-dcnode-id="1549"><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1566"><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Volume:</span></strong><span data-dcnode-id="1567" instrument_node=""> Volume stands for the size of Data that actually stored and generated. Depends on the size of data it has been determined the data set is big data or not.</span></li><span data-dcnode-id="1565" instrument_node="">
</span><li data-dcnode-id="1561"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Variety: </span></strong><span data-dcnode-id="1562" instrument_node="">Variety stands for nature, structure, and type of data which is being used.</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1556"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Velocity: </span></strong><span data-dcnode-id="1557" instrument_node="">Velocity stands for the speed of data that has been stored and generated in a particular development process flow.</span></li><span data-dcnode-id="1555" instrument_node="">
</span><li data-dcnode-id="1551"><strong data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Veracity: </span></strong><span data-dcnode-id="1552" instrument_node="">Veracity signifies the quality of data that has been captured and also helps data analysis to reach the intended target.</span></li><span data-dcnode-id="1550" instrument_node="">
</span></ul><span data-dcnode-id="1548" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Types of Big Data Analytics</span></h3><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">There are four types of Big Data Analytics which are as follows:</span></p><span data-dcnode-id="1542" instrument_node="">
</span><h4 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">1. Predictive Analytics</span></h4><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">This analytics is basically a prediction based analytics. Predictive Analytics works on a data set and determines what can be happened. It basically analyses past data sets or records to provide a future prediction.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><h4 data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">2. Prescriptive Analytics</span></h4><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Prescriptive Analytics works on a data set and determines what actions needs to be taken. This is a valuable analysis but not used widely. Many of the health care sectors used this analysis on the top of various activities to manage their business activities.</span></p><div class="code-block code-block-17" data-dcnode-id="1468" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1530" instrument_node="">

</span><h4 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">3. Descriptive Analytics</span></h4><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Descriptive Analytics actually analyze the past and determines what actually happens and why. It also helps to visualize this analysis in the dashboard may be in the form of graphical representation or in some other format.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><h4 data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">4. Diagnostic Analytics</span></h4><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Diagnostic Analytics executes on current data sets. It is used to do analysis based on incoming real-time data sets. Many of the systems like business intelligence tools use this analysis to create real-time dashboards and reports.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><h3 data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Big Data Analytics Examples</span></h3><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">The Big Data Analytics Examples are of many types. Several Organizations use this</span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/big-data-analytics/"><span data-dcnode-id="1450" instrument_node=""> Big Data Analytics</span></a><span data-dcnode-id="1448" instrument_node=""> Examples to generate various reports and dashboards based on their huge current and past data sets. There are different types of analysis of Big Data such as Predictive Analysis, Prescriptive Analysis, Descriptive Analysis, and Diagnostic Analysis. Those analyses are used by Big Data analytics to generate various graphical reports and dashboards based on their current and past records which may be in the form of Structured, Semi-structured or Unstructured.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Big Data Analytics Examples is used to generate various reports among those some examples are given below:</span></p><span data-dcnode-id="1443" instrument_node="">
</span><ol data-dcnode-id="1409"><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Fraud Management Report which is generally used in Banking Sectors to find the fraud transactions, hacking, unauthorized access to the account and so on.</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Live Tracking Report which is generally used by Transport Sectors such as Meru, Ola, Uber, and Mega to track the vehicles, customer’s requests, payment management, emergency alert and to find the daily needs and revenues and so on.</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Sales Report and Future target and goal analysis which is mostly used by all sectors to analyze their sales, revenues, and needs of customers and also used to determine the future target and so on.</span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Many reports based on live data mostly used to manage live data in many entertainment sites, share market, real-time Sensex data etc.</span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Generate different types of alarms based on different activities like alarm generated by data Centre, various notifications Big Data Analytics Examples has been used here.</span></li><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Google Analytics report where we can get how many user’s visit counts, from which location the user is from, from which device the site is accessing and so on.</span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Many Health care Organization nowadays rapidly introduced Big Data predictive analytics to improve our daily life. It has been used to update many protocols of Healthcare Sectors and also used to improve the outcomes against entire populations.</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Big Data Analytics Examples also played a vital role in many disaster situations. In the year April 2015 earthquake killed and also injured many peoples in Nepal. In this situation, North Carolina-based SAS has been developed by Analytics which has been played a massive role in rescue and relief operation.</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1414"><span data-dcnode-id="1417" instrument_node="">Big Data Analytics examples has been used in Child Welfare also. In a neighborhood in London, an English Physician has been collected and used the huge data to originate the solutions against massive Cholera attack in 19</span><sup data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">th</span></sup></li><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Big Data Analytics has been used in Online and Physical Security to identify the unauthorized activities, take various steps to prevent those attacks, introduced real-time monitoring to reduce fraud activities and also activating alarms against suspicious actions.</span></li><span data-dcnode-id="1410" instrument_node="">
</span></ol><span data-dcnode-id="1408" instrument_node="">
</span><h3 data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Conclusion</span></h3><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Finally, we can say using Big Data Analytics Examples we can add a big value to various sectors and business, where we can easily find out the result of any complex query simply from a massive data set, also can predict the future analysis which will help to take more accurate business decisions.</span></p><span data-dcnode-id="1402" instrument_node="">
