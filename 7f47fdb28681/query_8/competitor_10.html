a-dcnode-id="1128"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1134"><span class="ssrcss-1hq4gmv-Placeholder e16icw910" data-dcnode-id="1135"><span data-dcnode-id="1136"><img alt="Chvrches" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1139" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/D571/production/_101814645_chvrches.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/D571/production/_101814645_chvrches.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/D571/production/_101814645_chvrches.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/D571/production/_101814645_chvrches.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/D571/production/_101814645_chvrches.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/D571/production/_101814645_chvrches.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/D571/production/_101814645_chvrches.jpg 976w" width="976"><noscript data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">&lt;img alt="Chvrches" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/D571/production/_101814645_chvrches.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/D571/production/_101814645_chvrches.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/D571/production/_101814645_chvrches.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/D571/production/_101814645_chvrches.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/D571/production/_101814645_chvrches.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/D571/production/_101814645_chvrches.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/D571/production/_101814645_chvrches.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="1129"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="1130" spacing="6"><span data-dcnode-id="1131" instrument_node="">Scottish pop group Chvrches will play at Spain's Primavera Sound festival this weekend</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1122"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1123"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1124"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">From Adele to James Bond, from David Hockney to Harry Potter, the UK's creative talent is admired around the globe. </span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1115"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1116"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">And the creative industries are one of the UK's fastest growing sectors, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/news/creative-industries-record-contribution-to-uk-economy"><span data-dcnode-id="1120" instrument_node="">growing at twice the rate of the overall economy</span></a><span data-dcnode-id="1118" instrument_node="">.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1111"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1112"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Those in the creative industries are far more anti-Brexit than the rest of the country - a poll by the Creative Industries Federation (CIF) found 96% of its members voted Remain in the 2016 referendum.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1107"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1108"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Personal politics aside, there are practical reasons why people in the arts are worried that Brexit will be bad news - including their concerns about free movement of talent, funding and Britain's reputation around the world.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1103"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1104"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">But others are seeing silver linings.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1099"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1100"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Here are some of the ways Brexit could affect the UK's creative industries and talent. </span></p></div></div><div data-dcnode-id="1098" id="piano-inline1"></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="1094"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="1095" id="Performers-face-tour-burden" tabindex="-1"><span data-dcnode-id="1096" role="text"><span data-dcnode-id="1097" instrument_node="">Performers face tour burden</span></span></h2></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1082"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1083"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1084"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="1089"><span data-dcnode-id="1090"><img alt="Idles" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1093" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 976w" width="976"><noscript data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">&lt;img alt="Idles" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/3931/production/_101814641_gettyimages-810333406.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="1085" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Image source, </span></span><span data-dcnode-id="1086" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1078"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1079"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Arctic Monkeys, Idles (pictured), Chvrches and Jorja Smith are just some of the 40 UK acts travelling to play at this weekend's Primavera Sound festival in Barcelona.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1074"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1075"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">As well as worries about the end of free movement having an impact on people wanting to live and work in another country, there are also concerns that it will make it more difficult for musicians and other performers to go on tour.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1070"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1071"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">They may need visas for themselves and their crew, and could need carnets - documents allowing the temporary movement of goods - for their instruments and equipment.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1066"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1067"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">There might also be complex tax procedures and lengthy customs checks. All that could be expensive and time-consuming to organise.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1062"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1063"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Big-name acts will probably feel the effects less, but there are fears that it will be prohibitive for up-and-coming artists and larger ensembles.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1058"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1059"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">The same applies to European performers wanting to travel to the UK.</span></p></div></div><div data-dcnode-id="1057" id="piano-inline2"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1050"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1051"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node="">Former Labour MP Michael Dugher, chief executive of trade body UK Music, has called on the government </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.co.uk/michael-dugher/brexit-uk-economy_b_17998126.html"><span data-dcnode-id="1055" instrument_node="">to bring in a "touring passport"</span></a><span data-dcnode-id="1053" instrument_node=""> to get around any extra red tape and cost.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="1040"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1041"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="1042"><ul data-dcnode-id="1043" role="list"><li data-dcnode-id="1047"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/newsbeat-43867724"><span data-dcnode-id="1049" instrument_node="">BBC Newsbeat: How Brexit could change the gigs you go to</span></a></li><li data-dcnode-id="1044"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/entertainment-arts-37787098"><span data-dcnode-id="1046" instrument_node="">Brexit warning for concerts and plays</span></a></li></ul></div></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="1036"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="1037" id="Han-Solo-is-still-free-to-travel" tabindex="-1"><span data-dcnode-id="1038" role="text"><span data-dcnode-id="1039" instrument_node="">Han Solo is still free to travel</span></span></h2></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1024"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1025"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1026"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="1031"><span data-dcnode-id="1032"><img alt="Solo: A Star Wars Story" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1035" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 976w" width="976"><noscript data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&lt;img alt="Solo: A Star Wars Story" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/11FA9/production/_101814637_hs-551136_r.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="1027" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Image source, </span></span><span data-dcnode-id="1028" instrument_node="">Lucasfilm</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1020"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1021"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Britain's film and TV industries have been booming of late, thanks largely to Hollywood studios choosing the UK to film blockbusters like Solo: A Star Wars Story, Mission: Impossible - Fallout and Jurassic World: Fallen Kingdom.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1016"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1017"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Foreign studios spent £1.7bn in the UK in 2017 - almost double the amount spent four years previously. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1012"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1013"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Most of that money came from America, encouraged by the fall in the value of the pound after the UK voted to leave the EU, which makes it more attractive for US studios to film in the UK. If, as Brexiteers hope, a wide-ranging free trade deal is struck with the US, the trend could well continue.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1008"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1009"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Some film-makers are worried about being able to recruit crew members from Europe to work in the UK, though, and have voiced concerns about European co-productions, funding and distribution schemes.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1004"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1005"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">However, Lord Puttnam, who produced Chariots of Fire and is president of the Film Distributors' Association, has said more investment in home-grown films "with a distinctive British voice could help to deliver a form of national re-branding".</span></p></div></div><div data-dcnode-id="1003" id="piano-inline3"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="993"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="994"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="995"><ul data-dcnode-id="996" role="list"><li data-dcnode-id="1000"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/entertainment-arts-40505218"><span data-dcnode-id="1002" instrument_node="">Loach says Brexit is bad for GB films</span></a></li><li data-dcnode-id="997"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/entertainment-arts-40025143"><span data-dcnode-id="999" instrument_node="">Toby Jones warns of Brexit impact on films </span></a></li></ul></div></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="989"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="990" id="The-Gruffalo-and-free-movement" tabindex="-1"><span data-dcnode-id="991" role="text"><span data-dcnode-id="992" instrument_node="">The Gruffalo and free movement</span></span></h2></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="976"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="977"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="983"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="984"><span data-dcnode-id="985"><img alt="Axel Scheffler" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="988" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 976w" width="976"><noscript data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">&lt;img alt="Axel Scheffler" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/1697D/production/_101814529_axel_bbc.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="978"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="979" spacing="6"><span data-dcnode-id="980" instrument_node="">Axel Scheffler says The Gruffalo would not have existed if the UK wasn't in the EU</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="969"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="970"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">If the UK had never been in the EU, children's favourite The Gruffalo - one of every child's favourite books - wouldn't have existed, its German-born illustrator </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/entertainment-arts-44106334"><span data-dcnode-id="974" instrument_node="">Axel Scheffler recently said</span></a><span data-dcnode-id="972" instrument_node="">.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="965"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="966"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">He brought the character - and many others - to life, working with writer Julia Donaldson in what must be one of the most successful UK-EU creative partnerships.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="961"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="962"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">He moved to the UK 36 years ago and said that without free movement, he wouldn't have been able to make his home in Britain and team up with Donaldson.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="957"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="958"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Scheffler is one of thousands of Europeans in creative jobs in the UK - the CIF estimated there were at least 130,000 EU nationals working in the sector in 2016.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="953"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="954"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Some areas rely on European talent more than others. An estimated 30% of people working in visual effects for film and TV were from the EU, with the figure at 20-30% for video games and 25% for architecture.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="949"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="950"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">One of the biggest concerns about Brexit is that some of those people will want to - or be forced to - go home. It's also feared that others will be put off coming to the UK or be unable to do so, meaning artistic collaborations may not happen and some companies may struggle to attract the necessary talent.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="942"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="943"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">In December, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/joint_report.pdf"><span data-dcnode-id="947" instrument_node="">a joint document</span></a><span data-dcnode-id="945" instrument_node=""> issued by the UK government and the EU said both EU citizens and UK nationals will be able "to live, work or study as they currently do under the same conditions as under Union law" after Brexit.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="935"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="936"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">The late Martin Roth, the German museum director who took London's V&amp;A to new heights, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/entertainment-arts-37274864"><span data-dcnode-id="940" instrument_node="">said upon his departure in September 2016</span></a><span data-dcnode-id="938" instrument_node=""> that he might not have taken the post if it had come up after the EU referendum.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="931"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="932"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">"I'd probably still be offered a job, but the question is rather, would that job still be as attractive in such a context?" he said.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="924"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="925"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="926"><ul data-dcnode-id="927" role="list"><li data-dcnode-id="928"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/business-41674906"><span data-dcnode-id="930" instrument_node="">Creative sector warns of Brexit threat</span></a></li></ul></div></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="920"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="921" id="Will-TV-broadcasters-relocate" tabindex="-1"><span data-dcnode-id="922" role="text"><span data-dcnode-id="923" instrument_node="">Will TV broadcasters relocate?</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="916"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="917"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">UK media watchdog Ofcom currently regulates around 1,200 TV services. But almost a third of those do not broadcast to UK viewers.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="912"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="913"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">They are based in the UK - but the current "country of origin" rule says media outlets can serve the whole of the EU as long as they abide by the rules of their host country. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="905"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="906"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">Some of these companies are considering relocating if they can no longer reach the whole of the EU from the UK, while others have put plans for new investment in the UK on hold, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ofcom.org.uk/about-ofcom/latest/media/speeches/2017/what-does-brexit-mean-for-communications-customers"><span data-dcnode-id="910" instrument_node="">Ofcom said last year</span></a><span data-dcnode-id="908" instrument_node="">.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="899"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="900"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="901"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/media/2018/may/28/tv-giant-discovery-to-shut-european-hub-as-it-mulls-post-brexit-plan"><span data-dcnode-id="904" instrument_node="">The Guardian has reported</span></a><span data-dcnode-id="902" instrument_node=""> that Discovery is planning to move its European playout hub from London.</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="895"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="896" id="No-more-EU-funding" tabindex="-1"><span data-dcnode-id="897" role="text"><span data-dcnode-id="898" instrument_node="">No more EU funding</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="891"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="892"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">English arts organisations received £345m from the EU between 2007 and 2016, according to Arts Council England (ACE).</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="887"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="888"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">However, an ACE report said only 14% of its organisations have direct EU funding, with 30% of the organisations saying they have benefitted indirectly from EU funding.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="883"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="884"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Those getting funding include the Hall for Cornwall in Truro, which has £2.1m European Regional Development Funding to help pay for a new creative industries workspace unit.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="876"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="877"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">In August 2016, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-37060430"><span data-dcnode-id="881" instrument_node="">the government said</span></a><span data-dcnode-id="879" instrument_node=""> it would guarantee to support some EU-funded projects after the UK leaves the EU.</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="872"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="873" id="And-no-more-European-Capitals-of-Culture" tabindex="-1"><span data-dcnode-id="874" role="text"><span data-dcnode-id="875" instrument_node="">And no more European Capitals of Culture</span></span></h2></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="860"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="861"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="862"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="867"><span data-dcnode-id="868"><img alt="Dundee 2023 bid launch" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="871" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 976w" width="976"><noscript data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">&lt;img alt="Dundee 2023 bid launch" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/3365/production/_98875131_1_dundee_2023_ar.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="863" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Image source, </span></span><span data-dcnode-id="864" instrument_node="">Alan Richardson</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="856"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="857"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Amid all the speculation about what might happen after Brexit, there is one concrete consequence we do know about.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="852"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="853"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">In November, the European Commission cancelled the UK's turn to host the European Capital of Culture in 2023 - because the UK will have left the EU by then.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="848"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="849"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Dundee, Nottingham, Leeds, Milton Keynes and Belfast/Derry had their eyes on the boost to their economies and images that the title would have brought.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="844"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="845"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">When Liverpool was the UK's last Capital of Culture in 2008, it saw an extra 9.7 million visits and a £750m injection into the local economy.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="unordered-list-block" data-dcnode-id="837"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="838"><div class="ssrcss-1o5f7ft-BulletListContainer e5tfeyi0" data-dcnode-id="839"><ul data-dcnode-id="840" role="list"><li data-dcnode-id="841"><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/entertainment-arts-42097692"><span data-dcnode-id="843" instrument_node="">Brexit torpedoes UK 2023 culture plans</span></a></li></ul></div></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="833"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="834" id="Open-for-business" tabindex="-1"><span data-dcnode-id="835" role="text"><span data-dcnode-id="836" instrument_node="">Open for business?</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="826"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="827"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">When ACE published </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artscouncil.org.uk/sites/default/files/download-file/Impact_of_Brexit_Research_2017.pdf"><span data-dcnode-id="831" instrument_node="">a survey of its members' views on Brexit</span></a><span data-dcnode-id="829" instrument_node=""> in February, one of the key concerns was that the vote would harm the UK's global standing.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="822"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="823"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">"There are significant concerns about the potential negative impact of Brexit on the UK's international reputation for arts and culture," its report said.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="818"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="819"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">One of the organisations quoted, Newcastle-based Isis Arts, works with many European partners.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="814"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="815"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">"People are not looking to us in quite the same way that they might have done before," they said. "Our position over there in these other countries is slipping away from us. It's such a shame because we were held in very high regard."</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="810"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="811" id="The-world-beyond-the-EU" tabindex="-1"><span data-dcnode-id="812" role="text"><span data-dcnode-id="813" instrument_node="">The world beyond the EU</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="806"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="807"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">But the CIF points out that there are opportunities for British firms and talent beyond the EU.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="802"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="803"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">It talks about catering for "the expanding middle class in nations from Chile to China", especially through new digital technologies.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="798"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="799"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Architects' body RIBA says the UK can fill a skills shortage in the US, while institutions like the V&amp;A and the British Museum have been making inroads in Asia and the Middle East.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="794"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="795"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">The CIF quotes Diane Banks of Diane Banks Associates Literary &amp; Talent Agency as saying: "Investors are much more interested in our access to North American and Asian markets than the EU as these markets offer the highest growth potential, particularly when dealing with an English-language product.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="790"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="791"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">"Leaving the EU will also present exciting opportunities to innovate and be more competitive."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="786"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="787"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Michael Lightfoot, who started the group Artists For Brexit, says: "We are very keen on trying to promote the notion of global Britain. You're shifting your emphasis to being interested in and having equitable exchange with the world, which has got to be brilliant for the arts."</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="782"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="783" id="Other-factors" tabindex="-1"><span data-dcnode-id="784" role="text"><span data-dcnode-id="785" instrument_node="">Other factors</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="769"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="770"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="771"><span data-dcnode-id="781" instrument_node="">There are other big issues for people across the British creative sector - who say </span><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">copyright </span></b><span data-dcnode-id="778" instrument_node="">protection should be maintained, </span><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">data </span></b><span data-dcnode-id="775" instrument_node="">should still be able to flow freely between the UK and EU, and </span><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">tariffs </span></b><span data-dcnode-id="772" instrument_node="">shouldn't raise costs for businesses and prices for consumers on exporting things like books, video games and art.</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="765"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="766" id="Artists-get-to-grips-with-dramatic-times" tabindex="-1"><span data-dcnode-id="767" role="text"><span data-dcnode-id="768" instrument_node="">Artists get to grips with dramatic times</span></span></h2></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="753"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="754"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="755"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="760"><span data-dcnode-id="761"><img alt="Kwame Kwei-Armah" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="764" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 976w" width="976"><noscript data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">&lt;img alt="Kwame Kwei-Armah" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/3995/production/_101814741_gettyimages-497433790.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="756" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Image source, </span></span><span data-dcnode-id="757" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="749"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="750"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Aside from the economic implications, we're seeing a new breed of artists and writers who have been stirred to give their creative responses to Brexit and the wider political climate.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="742"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="743"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">The Young Vic's incoming artistic director </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestage.co.uk/news/2018/kwame-kwei-armah-brexit-metoo-awoken-new-generation-playwrights/"><span data-dcnode-id="747" instrument_node="">Kwame Kwei-Armah (pictured) recently told The Stage</span></a><span data-dcnode-id="745" instrument_node="">: "We can't rest on our laurels, but we're in great shape as a country [for political writing] because Brexit, wherever you sit on it, has awoken a generation [of playwrights]."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="735"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="736"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">At the very least, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/entertainment-arts-44141300"><span data-dcnode-id="740" instrument_node="">Brexit has given Benedict Cumberbatch another job</span></a><span data-dcnode-id="738" instrument_node="">.</span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="731"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="732" id="Will-the-UK-exit-Eurovision" tabindex="-1"><span data-dcnode-id="733" role="text"><span data-dcnode-id="734" instrument_node="">Will the UK exit Eurovision?</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="727"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="728"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Thankfully - or not, depending on your view - the Eurovision Song Contest has nothing to do with the European Union.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="723"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="724"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Israel, Azerbaijan and Australia are among the non-EU countries who take part in the annual song extravaganza. So the UK can continue to compete.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="719"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="720"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Unfortunately, Eurovision is the one part of the creative sector where the UK is a consistent failure.</span></p></div></div><div class="ssrcss-5i1hhv-LinksComponentWrapper e1xue1i83" data-component="links-block" data-dcnode-id="557"><section class="ssrcss-msolhr-LinksWrapper e3eyuya4" data-dcnode-id="558"><div class="ssrcss-1lqqmgw-LinksHeadingWrapper e3eyuya3" data-dcnode-id="716"><h2 class="ssrcss-axlwsg-StyledHeading e1fj1fc10" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">More on this story</span></h2></div><ul class="ssrcss-10bv2vf-EndOfContentLinksGrid e3eyuya1" data-dcnode-id="559" role="list"><li class="ssrcss-547yr3-PromoItem e3eyuya0" data-dcnode-id="690"><div class="ssrcss-ezh9qc-Promo ett16tt0" data-dcnode-id="691"><div class="ssrcss-a0724v-PromoSwitchLayoutAtBreakpoints e3z3r3u0" data-dcnode-id="692"><div class="ssrcss-xekq2n-PromoContent e1f5wbog7" data-dcnode-id="701"><div class="ssrcss-1f3bvyz-Stack e1y4nx260" data-dcnode-id="710" spacing="2"><a class="ssrcss-14n3cy5-PromoLink e1f5wbog0" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/entertainment-arts-44106334"><span data-dcnode-id="712" role="text"><p class="ssrcss-17zglt8-PromoHeadline e1f5wbog4" data-dcnode-id="713"><span aria-hidden="false" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Gruffalo illustrator hits out at Brexit</span></span></p></span></a></div><div class="ssrcss-1f3bvyz-Stack e1y4nx260" data-dcnode-id="702" spacing="2"><div data-dcnode-id="703"><dl class="ssrcss-kitko5-MetadataStrip e1ojgjhb2" data-dcnode-id="704"><div class="ssrcss-1uefua3-MetadataStripItem e1ojgjhb1" data-dcnode-id="705"><dt class="visually-hidden ssrcss-1f39n02-Visuall
