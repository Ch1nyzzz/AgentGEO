        Impact of Brexit by industry sector - all reports
    </span></h1><span data-dcnode-id="989" instrument_node="">

</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">
                    This page contains a list of externally produced resources which consider the impact of the decision to leave the EU on individual industry sectors. The selection includes reports on potential issues/opportunities, forecasts and studies on related issues.

</span><h1 data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">
</span><a class="" data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/the-benefits-of-brexit" title="The benefits of Brexit: How the UK is taking advantage of leaving the EU"><span data-dcnode-id="967" instrument_node="">The benefits of Brexit: How the UK is taking advantage of leaving the EU</span></a><span data-dcnode-id="965" instrument_node="">

</span><div class="listing-detail" data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">

</span><span class="citation" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">31 January 2022</span></span><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Policy paper setting out the Government's vision for number of sectors post-Brexit and how it plans to achieve these. Includes: Financial services; Professional business services; Legal services; Automotive; Aerospace; Retail and consumer goods; Hospitality; Food and drink; Culture; Aviation; Space; Rail; Roads; Maritime; Nuclear; Construction; Farming; Fisheries.

</span><span class="citation" data-dcnode-id="937"></span><span data-dcnode-id="936" instrument_node="">
</span></div><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Simple guide from HM Government which takes you through the stages involved in moving goods, covering: pre-journey documentation; documentation required when picking up goods; formalities at the EU and UK borders; and requirements after leaving the port. Also provides information on upcoming changes to international haulage in 2022 with links to further guidance.</span></p><span data-dcnode-id="931" instrument_node="">

</span><span class="citation" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">21 December 2021</span></span><span data-dcnode-id="915" instrument_node="">

</span><a class="" data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.co.uk/the-eu-referendum/customs-service/food-for-thought-how-will-the-introduction-of-customs-controls-on-imports-impact-the-food-industry.html" title=" Food for thought: How will the food industry cope with the start of ‘real time’ customs controls on imports to the UK from 1 January 2022?"><span data-dcnode-id="884" instrument_node=""> Food for thought: How will the food industry cope with the start of ‘real time’ customs controls on imports to the UK from 1 January 2022?</span></a><span data-dcnode-id="882" instrument_node="">
