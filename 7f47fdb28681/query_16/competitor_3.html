</span><h2 class="blog-single-title" data-dcnode-id="650" itemprop="headline"><span data-dcnode-id="651" instrument_node="">How to Work in the UK After Brexit: A Guide for EU Contractors</span></h2><span data-dcnode-id="649" instrument_node="">

</span></time><span data-dcnode-id="636" instrument_node="">
</span><div class="mk-post-cat" data-dcnode-id="632"><span data-dcnode-id="635" instrument_node="">&nbsp;In </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/category/contractors/" rel="category tag"><span data-dcnode-id="634" instrument_node="">Contractors</span></a></div><span data-dcnode-id="631" instrument_node="">
</span><div class="mk-post-meta-structured-data" data-dcnode-id="611" style="display:none;visibility:hidden;"><span data-dcnode-id="629" itemprop="headline"><span data-dcnode-id="630" instrument_node="">How to Work in the UK After Brexit: A Guide for EU Contractors</span></span><span data-dcnode-id="627" itemprop="datePublished"><span data-dcnode-id="628" instrument_node="">2021-03-16</span></span><span data-dcnode-id="625" itemprop="dateModified"><span data-dcnode-id="626" instrument_node="">2022-04-25</span></span><span data-dcnode-id="619" itemprop="publisher" itemscope="" itemtype="https://schema.org/Organization"><span data-dcnode-id="622" itemprop="logo" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="623" itemprop="url"><span data-dcnode-id="624" instrument_node="">https://contractortaxation.com/wp-content/uploads/2019/01/logo.png</span></span></span><span data-dcnode-id="620" itemprop="name"><span data-dcnode-id="621" instrument_node="">Contractor Taxation</span></span></span><span data-dcnode-id="612" itemprop="image" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="617" itemprop="contentUrl url"><span data-dcnode-id="618" instrument_node="">https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article.png</span></span><span data-dcnode-id="615" itemprop="width"><span data-dcnode-id="616" instrument_node="">200px</span></span><span data-dcnode-id="613" itemprop="height"><span data-dcnode-id="614" instrument_node="">200px</span></span></span></div></div><span data-dcnode-id="609" instrument_node="">

</span><div class="mk-single-content clearfix" data-dcnode-id="499" itemprop="mainEntityOfPage"><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="594"><img alt="Working in the UK after Brexit - a simple but detailed guide for EU contractors" class="aligncenter wp-image-4257 entered lazyloaded" data-dcnode-id="597" data-lazy-sizes="(max-width: 770px) 100vw, 770px" data-lazy-src="https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png" data-lazy-srcset="https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png 1024w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-300x200.png 300w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-768x513.png 768w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1536x1025.png 1536w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-2048x1367.png 2048w" data-ll-status="loaded" height="514" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png&amp;raw" srcset="https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png 1024w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-300x200.png 300w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-768x513.png 768w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1536x1025.png 1536w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-2048x1367.png 2048w" width="770"><noscript data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&lt;img class="aligncenter wp-image-4257" src="https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png" alt="Working in the UK after Brexit - a simple but detailed guide for EU contractors" width="770" height="514" srcset="https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1024x684.png 1024w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-300x200.png 300w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-768x513.png 768w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-1536x1025.png 1536w, https://contractortaxation.com/wp-content/uploads/2021/03/brexit-article-2048x1367.png 2048w" sizes="(max-width: 770px) 100vw, 770px" /&gt;</span></noscript></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">With the conclusion of Brexit and the related trade agreements, many EU contractors are unsure of how they can continue working for UK clients.&nbsp; The trade agreements between the EU and the UK focused on ‘goods’ and did not offer a lot of clarity about how cross-border services could be maintained.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Although the situation is less than ideal for EU contractors wishing to work in the UK, there are a few new guidelines and options depending on your history of working in the country.&nbsp; This guide will explore some of the new rules, primarily regarding immigration requirements and some exceptions to the need for a work visa.</span></p><span data-dcnode-id="587" instrument_node="">
</span><h2 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">How does Brexit affect EU contractors working in the UK?</span></h2><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The primary thing to know is that as of the beginning of 2021, EU contractors are on an equal footing with other non-UK citizens when it comes to having a right to work.&nbsp; This means that unless you meet one of the exceptions, you will need to obtain a work visa to serve UK clients inside the country.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h3 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Rules for EU citizens working in the UK before January 1, 2021</span></h3><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">There is an exception to the work visa rules in the UK.&nbsp; Contractors that were living and working in the UK prior to January 1, 2021, can apply for settled or pre-settled status under the new ‘</span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families" rel="noopener" target="_blank"><span data-dcnode-id="576" instrument_node="">EU Settlement Scheme</span></a><span data-dcnode-id="574" instrument_node="">’ (although you will actually be settling in the UK).&nbsp; The deadline for applying is June 30, 2021.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">A pre-settled status simply requires that you were working or residing in the UK for any period of time prior to the cut-off date, and you will need proof of residency.&nbsp; Settled status is granted if you have lived in the UK for 6 months in any 12-month period for five years in a row.&nbsp; You can apply to upgrade from pre-settled status to settled, once you qualify.</span></p><span data-dcnode-id="569" instrument_node="">
</span><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Rules for EU citizens working in the UK after January 1, 2021</span></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">If you were not working in the UK before the cut-off date, then you will have to apply for a skilled worker visa under the points-based immigration scheme, and you must have a job offer from a valid sponsor in the UK.&nbsp; Typically, a job offer must come from an employer with a sponsor license, which may undermine your ability to work as an independent contractor.</span></p><span data-dcnode-id="563" instrument_node="">
</span><h2 data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">How to get a sponsored work visa to work in the UK</span></h2><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">If you do find a client who wants to contract with you, then they would be the one to sponsor your work visa.&nbsp; However, they may have to apply to hire you as an employee rather than a contractor.&nbsp; This is because of the strict immigration rules on skilled workers, and the IR35 law which classifies workers as employees or contractors based on criteria of control, direction, and management.</span></p><span data-dcnode-id="557" instrument_node="">
</span><h2 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Misclassification risk and the IR35 law</span></h2><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">The IR35 law places an additional burden on companies that want to hire contractors instead of employees, given the lower cost and tax levy.&nbsp; Even if you have a ‘right to work’ visa-free in the UK, your contracting relationship could be under scrutiny as potential ‘disguised employment.&nbsp; For example, if the UK company has an employee that fills a role similar to the contractor’s, that would be a red flag for misclassification.</span></p><span data-dcnode-id="551" instrument_node="">
</span><h2 data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Can I use an umbrella company in the UK?</span></h2><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">If you are working under the settlement scheme as a contractor, you can always use an </span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/the-ultimate-guide-to-umbrella-companies/"><span data-dcnode-id="546" instrument_node="">umbrella company</span></a><span data-dcnode-id="544" instrument_node=""> as an intermediary between you and your client.&nbsp; This simplifies the contracting and payment process, as well as taxes and social contributions.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">However, if you are an EU contractor that needs a work visa, it is unlikely the </span><a class="wpil_keyword_link" data-dcnode-id="539" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/umbrella-company/" title="umbrella company"><span data-dcnode-id="540" instrument_node="">umbrella company</span></a><span data-dcnode-id="538" instrument_node=""> could obtain a sponsor license under the UK’s strict approach to ‘secondment’ hiring arrangements.</span></p><span data-dcnode-id="536" instrument_node="">
</span><h2 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Are there changes to taxes and social security?</span></h2><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Valid contractors in the UK will still pay normal UK tax rates on earnings, and could potentially become tax residents if they stay long enough.&nbsp; Social security may be affected, but there are still cross-border agreements under Brexit allowing EU citizens to retain some of their home country benefits if they wish.</span></p><span data-dcnode-id="530" instrument_node="">
</span><h2 data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">A new option: Work remotely from your home country</span></h2><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Depending on the nature of your work and skills, there is growing acceptance of hiring international remote workers for either short projects or long-term roles.&nbsp; In other words, there is no need to immigrate to the UK or obtain a work visa if your role can be performed remotely.&nbsp; With many companies choosing to go partially or fully remote, this is a practical solution emerging from the global pandemic.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="523" instrument_node="">In that case, </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/how-to-work-remotely-as-an-independent-contractor/"><span data-dcnode-id="522" instrument_node="">the UK company can hire and pay you directly</span></a><span data-dcnode-id="520" instrument_node=""> as a foreign freelancer or through your own limited company, with no other compliance or immigration concerns.&nbsp; You can also work through </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/the-ultimate-guide-to-umbrella-companies/"><span data-dcnode-id="519" instrument_node="">an umbrella company</span></a><span data-dcnode-id="517" instrument_node=""> in your own country to facilitate the contract and payments from your client.</span></p><span data-dcnode-id="515" instrument_node="">
</span><h2 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">How to stay compliant as an EU citizen working in the UK</span></h2><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">The most obvious new compliance concern for EU contractors is the need for a work visa, and it may be tempting for some to enter the country on a temporary tourist or business visa to avoid the new rules.&nbsp; You are not permitted to work directly for a UK company with those visas, and if caught you could face penalties or become blacklisted from returning in the future.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The other compliance issues are payment of taxes and making social contributions on your UK earnings, and if that is a complicated task for you it might be useful to use an umbrella company to assist.&nbsp; The umbrella company is accustomed to making the calculations and withholding on your behalf, as well as advising on any developments on working in the UK after Brexit.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">Contractor Taxation has verified umbrella companies in the UK (and throughout the EU for remote workers), who are ready to assist EU contractors with navigating all UK labour and tax laws, including avoiding misclassification issues.&nbsp; Please </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contractortaxation.com/contact/" rel="noopener" target="_blank"><span data-dcnode-id="504" instrument_node="">contact</span></a><span data-dcnode-id="502" instrument_node=""> us with your questions about post-Brexit contracting for UK companies.</span></p><span data-dcnode-id="500" instrument_node="">
</span></div><span data-dcnode-id="498" instrument_node="">
</span><div class="mk-post-meta-structured-data" data-dcnode-id="497" style="display:none;visibility:hidden;"></div><span data-dcnode-id="496" instrument_node="">
