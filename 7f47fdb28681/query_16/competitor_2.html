</span><div class="span8 widget-span widget-type-cell" data-dcnode-id="893" data-w="8" data-widget-type="cell" data-x="0" style=""><span data-dcnode-id="1338" instrument_node="">

</span><div class="span12 widget-span widget-type-custom_widget c-modules" data-dcnode-id="923" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="1335" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-blog_content" data-dcnode-id="925" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_1523032069834331" style=""><span data-dcnode-id="1334" instrument_node="">
</span><div class="c-post__featured-image" data-dcnode-id="1332"><img alt="after_january_2021" class="lazyloaded" data-dcnode-id="1333" data-src="https://f.hubspotusercontent30.net/hubfs/3277184/2021_800x400-1.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent30.net/hubfs/3277184/2021_800x400-1.png&amp;raw"></div><span data-dcnode-id="1331" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="944" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1328"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/close-businessman-looking-ahead-future-confidence-1768201418%3Firclickid%3DTki2E9xTmxyLRUfwUx0Mo3IWUkEU5gRfZRMTz40%26irgwc%3D1%26utm_medium%3DAffiliate%26utm_campaign%3DTinEye%26utm_source%3D77643%26utm_term%3D%26c3ch%3DAffiliate%26c3nid%3DIR-77643" rel="noopener" target="_blank"><span data-dcnode-id="1330" instrument_node="">Source: Clare Louise Jackson/Shutterstock</span></a></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The UK formally left the EU on Friday&nbsp;31 January 2020 and is undergoing a transition period before it is finalized.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">If you are working in Europe at present and want to know if UK citizens can still work in the EU after 1st January 2021, we have a brief overview of key things you need to know.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">If you are unsure about what to do next, it is highly recommended that you visit the gov.uk website for advice. </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/transition" rel="noopener"><span data-dcnode-id="1317" instrument_node="">They have a transition checker to help you assess your priorities</span></a><span data-dcnode-id="1315" instrument_node="">.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><hr data-dcnode-id="1312"><img alt="ICON-MISC-CalendarJan1-GRADIENT" data-dcnode-id="1311" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-CalendarJan1-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=70&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=140&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=210&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=280&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=350&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CalendarJan1-GRADIENT.png?width=420&amp;name=ICON-MISC-CalendarJan1-GRADIENT.png 420w" style="width: 140px; margin: 0px 0px 10px 20px; float: right;" width="140"><span data-dcnode-id="1310" instrument_node="">
</span><h2 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">What is the essential Brexit information I need to know?</span></h2><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">New rules for businesses and citizens </span><a data-dcnode-id="1304" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/visit-europe-1-january-2021" rel="noopener"><span data-dcnode-id="1305" instrument_node="">will be imposed on 1st January 2021</span></a><span data-dcnode-id="1303" instrument_node=""> when the transition period ends.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1300" instrument_node="">&nbsp;If you are a EU citizen working in the UK or UK citizen working in the EU currently (i.e. before the 31st Dec 2020), you need to have applied for residency or settled status before 30th June 2021 to avoid any immigration concerns beyond June 2021.</span><strong data-dcnode-id="1298"><br data-dcnode-id="1299"></strong></p><span data-dcnode-id="1296" instrument_node="">
</span><hr data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Key Brexit terms</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><h3 data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The Withdrawal Agreement</span></h3><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">On 17 October 2019, a revised </span><a data-dcnode-id="1285" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/new-withdrawal-agreement-and-political-declaration" rel="noopener"><span data-dcnode-id="1286" instrument_node="">Withdrawal Agreement and Political Declaration</span></a><span data-dcnode-id="1284" instrument_node=""> was agreed at European Council. The agreement establishes the terms for the UK withdrawal from the EU and provides information on citizens’ rights.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">You will be covered by the Withdrawal Agreement if you are a UK national lawfully residing in another EU country by the end of the transition period, on 31 December 2020.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The Withdrawal Agreement secures your rights and allows you to stay in the EU country where you live after 31 January 2020. You will continue to have broadly the same entitlements to work, study and access public services and benefits as before the UK left the EU.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">The transition period</span></h3><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The Withdrawal Agreement outlines a time-limited transition period before the changes relating to Brexit formally take place. This period ends on 1st January 2021.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">During the transition period, you can move to a different EU country as you could before 30 June 2021.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><hr data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">
</span><h2 data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">What should UK citizens know about travelling and working in the EU from January 2021?</span><br data-dcnode-id="1263"><br data-dcnode-id="1262"><img alt="worker_1_edit-2" data-dcnode-id="1261" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg%3Fwidth%3D800%26name%3Dworker_1_edit-2.jpg&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=400&amp;name=worker_1_edit-2.jpg 400w, https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=800&amp;name=worker_1_edit-2.jpg 800w, https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=1200&amp;name=worker_1_edit-2.jpg 1200w, https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=1600&amp;name=worker_1_edit-2.jpg 1600w, https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=2000&amp;name=worker_1_edit-2.jpg 2000w, https://www.airswift.com/hs-fs/hubfs/worker_1_edit-2.jpg?width=2400&amp;name=worker_1_edit-2.jpg 2400w" style="width: 800px;" width="800"></h2><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1253"><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/pretty-technician-worker-engineer-woman-gray-1701397288" rel="noopener" target="_blank"><span data-dcnode-id="1258" instrument_node="">Source: </span><span data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node=""> </span></span><span data-dcnode-id="1255" instrument_node="">SritanaN/Shutterstock</span></a></p><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1248"><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">1. Residency documentation and status</span><img alt="ICON-MISC-DocHouseCheck-GRADIENT" data-dcnode-id="1249" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-DocHouseCheck-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=70&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=140&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=210&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=280&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=350&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-DocHouseCheck-GRADIENT.png?width=420&amp;name=ICON-MISC-DocHouseCheck-GRADIENT.png 420w" style="width: 140px; margin: 0px 0px 10px 10px; float: right;" width="140"></h3><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1246" instrument_node="">If you were living in an EU country before 31st December 2020, </span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">you may need to apply for residence status. You have until 30 June 2021 to submit your application.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">The </span><a data-dcnode-id="1239" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/uk-nationals-living-eu" rel="noopener"><span data-dcnode-id="1240" instrument_node="">UK government country guides</span></a><span data-dcnode-id="1238" instrument_node=""> can provide more details about the specific application process you will need to follow.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><img alt="ICON-MISC-HouseCheck-GRADIENT" data-dcnode-id="1235" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-HouseCheck-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=70&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=140&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=210&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=280&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=350&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseCheck-GRADIENT.png?width=420&amp;name=ICON-MISC-HouseCheck-GRADIENT.png 420w" style="width: 140px; margin: 0px 0px 10px 20px; float: right;" width="140"><span data-dcnode-id="1234" instrument_node="">
</span><h3 data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">2. Permanent residency documents</span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">If you have the permanent right to live in a country, you will be able to exchange your residency documents for a new one, at no cost, before 30 June 2021. You may need to provide proof of identity and undertake security and criminality checks.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1227" instrument_node="">3. Can family members join?</span><img alt="ICON-MISC-HouseFamily3ppl-GRADIENT" data-dcnode-id="1226" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-HouseFamily3ppl-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=70&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=140&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=210&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=280&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=350&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HouseFamily3ppl-GRADIENT.png?width=420&amp;name=ICON-MISC-HouseFamily3ppl-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">The withdrawal agreement allows for close family members to join you after the transition period ends. Close family members are outlined as</span></p><span data-dcnode-id="1221" instrument_node="">
</span><ul data-dcnode-id="1210"><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Spouses or registered partners</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Dependent children or grandchildren</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Dependent parents or grandparents</span></li><span data-dcnode-id="1211" instrument_node="">
</span></ul><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">If you are covered by the Withdrawal Agreement, your children are also protected by the agreement, if you have custody of the children. This includes adopted children.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><h3 data-dcnode-id="1203"><span data-dcnode-id="1205" instrument_node="">4. Pensions and benefits&nbsp;</span><img alt="ICON-MISC-HandCoinDollarBox-GRADIENT" data-dcnode-id="1204" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-HandCoinDollarBox-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=70&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=140&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=210&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=280&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=350&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HandCoinDollarBox-GRADIENT.png?width=420&amp;name=ICON-MISC-HandCoinDollarBox-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">If you are already living in the EU, EEA, or Switzerland by 31st December 2020 you will continue to receive a UK State Pension with full annual increases.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Your UK State Pension will be uprated every year for as long as you continue to live there.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">The state pension and associated uprating is also available for those who qualify to start claiming after 1st January 2021.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">If you are working in an EEA state, or Switzerland, by 31st December 2020 you will be able to count future social security contributions towards the qualifying conditions for your UK State Pension.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">If you are living in the EU, EEA or Switzerland by 31 December 2020, you will continue to receive any UK benefits you already receive. This will continue for as long as you live there and meet all other eligibility requirements.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">If you are paid a pension or benefit by Switzerland or an EEA state, you will need to check what you need to do to continue receiving these after 31st December 2020. The </span><a data-dcnode-id="1184" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/collections/overseas-living-in-guides%23eu-and-other-countries-affected-by-brexit" rel="noopener"><span data-dcnode-id="1185" instrument_node="">UK government country guides</span></a><span data-dcnode-id="1183" instrument_node=""> can help you find this information.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><img alt="Passport_map" data-dcnode-id="1180" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/Passport_map.jpg%3Fwidth%3D800%26name%3DPassport_map.jpg&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=400&amp;name=Passport_map.jpg 400w, https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=800&amp;name=Passport_map.jpg 800w, https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=1200&amp;name=Passport_map.jpg 1200w, https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=1600&amp;name=Passport_map.jpg 1600w, https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=2000&amp;name=Passport_map.jpg 2000w, https://www.airswift.com/hs-fs/hubfs/Passport_map.jpg?width=2400&amp;name=Passport_map.jpg 2400w" style="width: 800px;" width="800"></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1171"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/british-passport-map-europe-81666355" rel="noopener" target="_blank"><span data-dcnode-id="1177" instrument_node="">Source: Brian A Jackson/Shutterstock</span></a><br data-dcnode-id="1175"><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">5. Moving to another EU country&nbsp;</span><img alt="ICON-MISC-TravelPlaneEUstars-GRADIENT" data-dcnode-id="1172" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-TravelPlaneEUstars-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=70&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=140&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=210&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=280&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=350&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPlaneEUstars-GRADIENT.png?width=420&amp;name=ICON-MISC-TravelPlaneEUstars-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">You can still move to a new country within the EU up until 31st December 2020. After that date, you will have until 30th June 2021 to apply for residence status if you wish to stay.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><h3 data-dcnode-id="1164"><span data-dcnode-id="1166" instrument_node="">6. Travelling to the UK</span><img alt="ICON-MISC-TravelUK-GRADIENT" data-dcnode-id="1165" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-TravelUK-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=70&amp;name=ICON-MISC-TravelUK-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=140&amp;name=ICON-MISC-TravelUK-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=210&amp;name=ICON-MISC-TravelUK-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=280&amp;name=ICON-MISC-TravelUK-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=350&amp;name=ICON-MISC-TravelUK-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelUK-GRADIENT.png?width=420&amp;name=ICON-MISC-TravelUK-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Travel to the UK will not change after 31st December 2020 and you can travel to the Untied Kingdom at any time.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><h3 data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">7. Returning from the EU to live and work&nbsp;</span><img alt="ICON-MISC-TravelLuggage-GRADIENT" data-dcnode-id="1158" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-TravelLuggage-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=70&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=140&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=210&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=280&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=350&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelLuggage-GRADIENT.png?width=420&amp;name=ICON-MISC-TravelLuggage-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">in the UK</span></h3><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">There are no changes that prohibit you from returning to the UK to live, work and access benefits and services. Your children’s rights to British citizenship also remain unchanged.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">Family members will be able to join you in the UK and can apply for the </span><a data-dcnode-id="1148" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families" rel="noopener"><span data-dcnode-id="1149" instrument_node="">EU Settlement Scheme</span></a><span data-dcnode-id="1147" instrument_node=""> before 29th March 2022.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Family members moving to the UK from the EU before 29th March 2022 will be able to do so without a visa.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">If you plan to return to study courses and apprenticeships in the UK you will still be eligible for financial support until 31st December 2027.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><h3 data-dcnode-id="1136"><span data-dcnode-id="1138" instrument_node="">8. You may need to renew your passport&nbsp;</span><img alt="ICON-MISC-TravelPassport-GRADIENT" data-dcnode-id="1137" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-TravelPassport-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=70&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=140&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=210&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=280&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=350&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-TravelPassport-GRADIENT.png?width=420&amp;name=ICON-MISC-TravelPassport-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Your passport will need to be 6 months from expiring and less than 10 years old.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">If you do not renew your passport, you may not be able to travel to most EU countries and Iceland, Liechtenstein, Norway and Switzerland after 1st January.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><img alt="ICON-MISC-HealthMedicalKit-GRADIENT" data-dcnode-id="1128" height="140" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png%3Fwidth%3D140%26height%3D140%26name%3DICON-MISC-HealthMedicalKit-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=70&amp;height=70&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=140&amp;height=140&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=210&amp;height=210&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=280&amp;height=280&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=350&amp;height=350&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-HealthMedicalKit-GRADIENT.png?width=420&amp;height=420&amp;name=ICON-MISC-HealthMedicalKit-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"><span data-dcnode-id="1127" instrument_node="">
</span><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">9. Check your healthcare cover</span></h3><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Residents will retain the same current rights to healthcare in the country in which they reside. As long as they remain covered by the Withdrawal Agreement.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Your UK-issued European Health Insurance Card (EHIC) will be valid up to 31 December 2020.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">You will need to ensure you have </span><a data-dcnode-id="1115" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/foreign-travel-insurance" rel="noopener"><span data-dcnode-id="1116" instrument_node="">appropriate travel insurance</span></a><span data-dcnode-id="1114" instrument_node=""> with health cover when going abroad. If you have a pre-existing medical condition you should check it will be covered by your policy.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><h3 data-dcnode-id="1109"><span data-dcnode-id="1111" instrument_node="">10. Border control</span><img alt="ICON-MISC-TravelSecurity-GRADIENT" data-dcnode-id="1110" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-TravelSecurity-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=70&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=140&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=210&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=280&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=350&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICON-MISC-TravelSecurity-GRADIENT.png?width=420&amp;name=ICON-MISC-TravelSecurity-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">At border control, you may need to:</span></p><span data-dcnode-id="1105" instrument_node="">
</span><ul data-dcnode-id="1094"><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">show a return or onward ticket.</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">show you have enough money for your stay.</span></li><span data-dcnode-id="1098" instrument_node="">
</span><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">use separate lanes from&nbsp;EU,&nbsp;EEA&nbsp;and Swiss citizens when queueing.</span></li><span data-dcnode-id="1095" instrument_node="">
</span></ul><span data-dcnode-id="1093" instrument_node="">
</span><h3 data-dcnode-id="1090"><span data-dcnode-id="1092" instrument_node="">11. Banking and financial services</span><img alt="ICON-MISC-FinanceBank-GRADIENT" data-dcnode-id="1091" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-FinanceBank-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=70&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=140&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=210&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=280&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=350&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-FinanceBank-GRADIENT.png?width=420&amp;name=ICON-MISC-FinanceBank-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">You will need to check with your UK bank if they are able to serve you as a customer living in an EEA country.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1080"><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">12. Entry requirements for business travel </span><img alt="ICON-MISC-IDentificationCard-GRADIENT" data-dcnode-id="1083" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-IDentificationCard-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=70&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=140&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=210&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=280&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=350&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-IDentificationCard-GRADIENT.png?width=420&amp;name=ICON-MISC-IDentificationCard-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"><br data-dcnode-id="1082"><span data-dcnode-id="1081" instrument_node="">in the EU&nbsp;</span></h3><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">Each country may have its own entry requirements or documentation. The gov.uk website contains an updated list of </span><a data-dcnode-id="1076" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/collections/providing-services-to-eea-and-efta-countries-after-eu-exit" rel="noopener"><span data-dcnode-id="1077" instrument_node="">entry requirements for each country</span></a><span data-dcnode-id="1075" instrument_node="">.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">If you plan to stay for more than 90 days of 180 day period to work, study or </span><a data-dcnode-id="1070" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/visit-europe-1-january-2021/business-travel-extra-requirements" rel="noopener"><span data-dcnode-id="1071" instrument_node="">do business</span></a><span data-dcnode-id="1069" instrument_node="">, you may need a visa or permit to stay.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">13. Professional qualifications</span></h3><span data-dcnode-id="1064" instrument_node="">
</span><img alt="ICON-MISC-CertificateRibon-GRADIENT" data-dcnode-id="1063" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-CertificateRibon-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=70&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=140&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=210&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=280&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=350&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CertificateRibon-GRADIENT.png?width=420&amp;name=ICON-MISC-CertificateRibon-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1061" instrument_node="">If your profession is </span><a data-dcnode-id="1059" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/tools-databases/regprof/index.cfm" rel="noopener"><span data-dcnode-id="1060" instrument_node="">regulated by the EU single market</span></a><span data-dcnode-id="1058" instrument_node="">, you will need to check your qualifications will be recognised after 1st January 2020. You will need to contact the </span><a data-dcnode-id="1056" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/single-market/services/services-directive/in-practice/contact_en" rel="noopener"><span data-dcnode-id="1057" instrument_node="">single point of contact</span></a><span data-dcnode-id="1055" instrument_node=""> for the country you plan to work in.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">If you are already working in an EEA country or Switzerland, you do not need to do anything if your qualification has already been officially recognised in the country you work in.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><h4 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Here is a small sample of the professions that may be regulated in EU countries:</span></h4><span data-dcnode-id="1047" instrument_node="">
</span><ul data-dcnode-id="1009"><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Chemical engineer</span></li><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Civil engineer</span></li><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Electrical engineer</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Environmental consultant</span></li><span data-dcnode-id="1034" instrument_node="">
</span><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Land surveyor</span></li><span data-dcnode-id="1031" instrument_node="">
</span><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Machinery operator</span></li><span data-dcnode-id="1028" instrument_node="">
</span><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Mechanical engineer</span></li><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Medical, nursing and health professionals</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Mining manager</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Nuclear technician</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Railway brakers, signallers and shunters</span></li><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Safety advisor</span></li><span data-dcnode-id="1010" instrument_node="">
</span></ul><span data-dcnode-id="1008" instrument_node="">
</span><h3 data-dcnode-id="1005"><span data-dcnode-id="1007" instrument_node="">14. Driving</span><img alt="ICON-MISC-CarDriving-GRADIENT" data-dcnode-id="1006" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-CarDriving-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=70&amp;name=ICON-MISC-CarDriving-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=140&amp;name=ICON-MISC-CarDriving-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=210&amp;name=ICON-MISC-CarDriving-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=280&amp;name=ICON-MISC-CarDriving-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=350&amp;name=ICON-MISC-CarDriving-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-CarDriving-GRADIENT.png?width=420&amp;name=ICON-MISC-CarDriving-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">You may need extra documents, such as an international driving permit (IDP) to drive in some countries after 1 January 2021.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h3 data-dcnode-id="998"><span data-dcnode-id="1000" instrument_node="">15. Pet travel</span><img alt="ICON-MISC-PetTravelDocument-GRADIENT" data-dcnode-id="999" sizes="(max-width: 140px) 100vw, 140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png%3Fwidth%3D140%26name%3DICON-MISC-PetTravelDocument-GRADIENT.png&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=70&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 70w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=140&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 140w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=210&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 210w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=280&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 280w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=350&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 350w, https://www.airswift.com/hs-fs/hubfs/ICONS/ICON-MISC-PetTravelDocument-GRADIENT.png?width=420&amp;name=ICON-MISC-PetTravelDocument-GRADIENT.png 420w" style="margin: 0px 0px 10px 10px; width: 140px; float: right;" width="140"></h3><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">You will not be able to use the existing pet passport scheme after 1st January 2021. </span><a data-dcnode-id="994" data-hs-link-id="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/pet-travel-to-europe-from-1-january-2021" rel="noopener"><span data-dcnode-id="995" instrument_node="">A new three tier system</span></a><span data-dcnode-id="993" instrument_node=""> will need to be followed and could take up to 4 months to process.</span></p><span data-dcnode-id="991" instrument_node="">
</span><hr data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">
</span><h2 data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">What areas will remain unchanged when the Brexit transition period ends?</span></h2><span data-dcnode-id="986" instrument_node="">
</span><h2 data-dcnode-id="984"><img alt="unchanged" data-dcnode-id="985" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/unchanged.jpg%3Fwidth%3D800%26name%3Dunchanged.jpg&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=400&amp;name=unchanged.jpg 400w, https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=800&amp;name=unchanged.jpg 800w, https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=1200&amp;name=unchanged.jpg 1200w, https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=1600&amp;name=unchanged.jpg 1600w, https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=2000&amp;name=unchanged.jpg 2000w, https://www.airswift.com/hs-fs/hubfs/unchanged.jpg?width=2400&amp;name=unchanged.jpg 2400w" style="width: 800px;" width="800"></h2><span data-dcnode-id="983" instrument_node="">
</span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/dice-form-word-unchanged-while-two-1301215171" rel="noopener" target="_blank"><span data-dcnode-id="982" instrument_node="">Source: FrankHH/Shutterstock</span></a><br data-dcnode-id="980"><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
</span><ul data-dcnode-id="964"><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Rules about property ownership, rent, taxation and shared ownership are unchanged. However, if you are buying a property some EU countries have differing property acquisition laws so it is recommended you check with local authorities.</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Wills made under UK law remain valid, including wills that apply to property in the EU.</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">UK inheritance tax rules have not changed.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Existing double taxation agreements that the UK has with all UK countries is unchanged.</span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><span data-dcnode-id="963" instrument_node="">
</span><hr data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">
</span><h2 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Unsure what to do next?</span></h2><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="957" instrument_node="">It is highly recommended that you seek the latest government advice by visiting the </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/transition" rel="noopener"><span data-dcnode-id="956" instrument_node="">UK government website</span></a></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="952" instrument_node="">If you are you an Airswift contractor or client and have specific questions about your situation, you can contact your relevant service consultant.</span><br data-dcnode-id="951"><br data-dcnode-id="950"></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><a data-dcnode-id="946" href="#Top" rel="noopener"><span data-dcnode-id="947" instrument_node="">Back to the top</span></a></p></span><span data-dcnode-id="943" instrument_node="">
