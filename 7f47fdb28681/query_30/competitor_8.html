</span><div class="quoteDetails" data-dcnode-id="2414"><span data-dcnode-id="2460" instrument_node="">
</span><a class="leftAlignedImage" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/68992.Ali_Smith"><span data-dcnode-id="2459" instrument_node="">
</span><img alt="Ali Smith" data-dcnode-id="2458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1620558954p2/68992.jpg&amp;raw"><span data-dcnode-id="2457" instrument_node="">
</span></a><span data-dcnode-id="2455" instrument_node="">
</span><div class="quoteText" data-dcnode-id="2440"><span data-dcnode-id="2454" instrument_node="">
      “All across the country, people felt it was the wrong thing. All across the country, people felt it was the right thing. All across the country, people felt they'd really lost. All across the country, people felt they'd really won. All across the country, people felt they'd done the right thing and other people had done the wrong thing. All across the country, people looked up Google: what is EU? All across the country, people looked up Google: move to Scotland. All across the country, people looked up Google: Irish Passport Applications. All across the country, people called each other cunts. All across the country, people felt unsafe. All across the country, people were laughing their heads off. All across the country, people felt legitimised. All across the country, people felt bereaved and shocked. All across the country, people felt righteous. All across the country, people felt sick. All across the country, people felt history at their shoulder. All across the country, people felt history meant nothing. All across the country, people felt like they counted for nothing. All across the country, people had pinned their hopes on it. All across the country, people waved flags in the rain. All across the country, people drew swastika graffiti. All across the country, people threatened other people. All across the country, people told people to leave. All across the country, the media was insane. All across the country, politicians lied. All across the country, politicians fell apart. All across the country, politicians vanished...”
  </span><br data-dcnode-id="2453"><span data-dcnode-id="2452" instrument_node="">  ―

      “Why should you care so much for Christminster?" she said pensively. "Christminster cares nothing for you, poor dear!"</span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">"Well, I do, I can't help it. I love the place — although I know how it hates all men like me — the so-called self-taught — how it scorns our laboured acquisitions, when it should be the first to respect them; how it sneers at our false quantities and mispronunciations, when it should say, I see you want help, my poor friend! ... Nevertheless, it is the centre of the universe to me, because of my early dream: and nothing can alter it. Perhaps it will soon wake up, and be generous. I pray so! ... I should like to go back to live there — perhaps to die there! In two or three weeks I might, I think. It will then be June, and I should like to be there by a particular day.”

</span><img alt="Neel Burton" data-dcnode-id="2049" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1589498317p2/489063.jpg&amp;raw"><span data-dcnode-id="2048" instrument_node="">
</span></a><span data-dcnode-id="2046" instrument_node="">
</span><div class="quoteText" data-dcnode-id="2032"><span data-dcnode-id="2045" instrument_node="">
      “Both the European Union and the United States are in some sense the heirs of Rome. Like Rome, the United States is founded on a republican myth of liberation from a tyrannical oppressor. Just as the Rape of Lucretia led to the overthrow of the last Etruscan king, so the Boston Tea Party led to the overthrow of the British crown. The Founding Fathers of the United States sought quite literally to create a New Rome, with, for instance, a clear separation of powers between the legislative and executive branches of government—with the legislative branch called, as in Rome, the Senate. They even debated whether the executive branch would not be better represented, as in Rome, by two consuls rather than the president that they eventually settled for. The extended period of relative peace and prosperity since the end of the Second World War has been dubbed the Pax Americana [‘American Peace’], after the Pax Romana which perdured from the accession of Augustus in 27 BCE to the death of the last of the Five Good Emperors, Marcus Aurelius, in 180 CE. The United Kingdom’s departure from the European Union can be accounted for, in part, by the ghost of the nineteenth century Pax Britannica, when the British Empire was not merely a province of Rome but a Rome unto herself.”
  </span><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">  ―

      “NoMarch felt the forces of fate closing about him and pushing him to a decision. He feebly fought them off till he could have another look at the flat. Then, baked and subdued still more by the unexpected presence of Mrs. Grosvenor Green herself, who was occupying it so as to be able to show it effectively, he took it. He was aware more than ever of its absurdities; he knew that his wife would never cease to hate it; but he had suffered one of those eclipses of the imagination to which men of his temperament are subject, and into which he could see no future for his desires. He felt a comfort in irretrievably committing himself, and exchanging the burden of indecision for the burden of responsibility.”

</span><img alt="William Dean Howells" data-dcnode-id="1726" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1192892047p2/90553.jpg&amp;raw"><span data-dcnode-id="1725" instrument_node="">
</span></a><span data-dcnode-id="1723" instrument_node="">
</span><div class="quoteText" data-dcnode-id="1709"><span data-dcnode-id="1722" instrument_node="">
      “He parted from him on the usual terms outwardly, but he felt obscurely abused by Fulkerson in regard to the Dryfooses, father and son. He did not know but Fulkerson had taken an advantage of him in allowing him to commit himself to their enterprise with out fully and frankly telling him who and what his backer was; he perceived that with young Dryfoos as the publisher and Fulkerson as the general director of the paper there might be very little play for his own ideas of its conduct. Perhaps it was the hurt to his vanity involved by the recognition of this fact that made him forget how little choice he really had in the matter, and how, since he had not accepted the offer to edit the insurance paper, nothing remained for him but to close with Fulkerson. In this moment of suspicion and resentment he accused Fulkerson of hastening his decision in regard to the Grosvenor Green apartment; he now refused to consider it a decision, and said to himself that if he felt disposed to do so he would send Mrs. Green a note reversing it in the morning. But he put it all off till morning with his clothes, when he went to bed, he put off even thinking what his wife would say; he cast Fulkerson and his constructive treachery out of his mind, too, and invited into it some pensive reveries of the past, when he still stood at the parting of the ways, and could take this path or that. In his middle life this was not possible; he must follow the path chosen long, ago, wherever, it led. He was not master of himself, as he once seemed, but the servant of those he loved; if he could do what he liked, perhaps he might renounce this whole New York enterprise, and go off somewhere out of the reach of care; but he could not do what he liked, that was very clear. In the pathos of this conviction he dwelt compassionately upon the thought of poor old Lindau; he resolved to make him accept a handsome sum of money—more than he could spare, something that he would feel the loss of—in payment of the lessons in German and fencing given so long ago. At the usual rate for such lessons, his debt, with interest for twenty-odd years, would run very far into the hundreds. Too far, he perceived, for his wife's joyous approval; he determined not to add the interest; or he believed that Lindau would refuse the interest; he put a fine speech in his mouth, making him do so; and after that he got Lindau employment on 'Every Other Week,' and took care of him till he died.”
  </span><br data-dcnode-id="1721"><span data-dcnode-id="1720" instrument_node="">  ―

</span><div class="quoteText" data-dcnode-id="1480"><span data-dcnode-id="1493" instrument_node="">
      “In all her intercourse with society, however, there was nothing that made her feel as if she belonged to it. Every gesture, every word, and even the silence of those with whom she came in contact, implied, and often expressed, that she was banished, and as much alone as if she inhabited another sphere, or communicated with the common nature by other organs and senses than the rest of human kind. She stood apart from moral interests, yet close beside them, like a ghost that revisits the familiar fireside, and can no longer make itself seen or felt; no more smile with the household joy, nor mourn with the kindred sorrow; or, should it succeed in manifesting its forbidden sympathy, awakening only terror and horrible repugnance. These emotions, in fact, and its bitterest scorn besides, seemed to be the sole portion that she retained in the universal heart. It was not an age of delicacy; and her position, although she understood it well, and was in little danger of forgetting it, was often brought before her vivid self-perception, like a new anguish, by the rudest touch upon the tenderest spot. The poor, as we have already said, whom she sought out to be the objects of her bounty, often reviled the hand that was stretched forth to succor them. Dames of elevated rank, likewise, whose doors she entered in the way of her occupation, were accustomed to distil drops of bitterness into her heart; sometimes through that alchemy of quiet malice, by which women can concoct a subtle poison from ordinary trifles; and sometimes, also, by a coarser expression, that fell upon the sufferer's defenceless breast like a rough blow upon an ulcerated wound.”
  </span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">  ―

</span><a class="leftAlignedImage" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/2929.Nick_Hornby"><span data-dcnode-id="1327" instrument_node="">
</span><img alt="Nick Hornby" data-dcnode-id="1326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1422915487p2/2929.jpg&amp;raw"><span data-dcnode-id="1325" instrument_node="">
</span></a><span data-dcnode-id="1323" instrument_node="">
</span><div class="quoteText" data-dcnode-id="1257"><span data-dcnode-id="1322" instrument_node="">
      “«E quanto alla Brexit… Alcuni sono convinti che i cambiamenti radicali offrano anche grandi opportunità.»</span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">«Quindi, secondo te, noi due staremmo meglio se ci separassimo?»</span><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">«Oddio, no. Stavo parlando del Paese.»</span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">Attraversano la strada.</span><br data-dcnode-id="1315"><span data-dcnode-id="1314" instrument_node="">«Allora quali sarebbero le opportunità offerte dai cambiamenti radicali di cui parli?» chiede Louise.</span><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">«Be’, non saremo più impantanati in tutta quella burocrazia. Potremo fare affari per conto nostro.»</span><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">«Okay, adesso mi sono completamente persa. Non mi va di continuare a parlare del Paese. Sto cercando di capire perché, secondo te, una Brexit coniugale dovrebbe costituire una grande opportunità.»</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">Tom alza le spalle. Ha lo sguardo sfuggente.</span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">«Con chi dovresti fare affari, tu? Per quanto ne so, non stai frequentando donne italiane o tedesche. E non credo che potresti avere più fortuna con delle cinesi o delle americane. Mi pare tutta una stupidaggine.»</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">Sono arrivati alla porta di Canyon.</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">«Voglio dire che non deve per forza essere la catastrofe di cui parla il Guardian.»</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">Louise si ferma e lo guarda. Lui evita il suo sguardo, poi alza la mano per suonare il campanello.</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">«Tu hai votato a favore della stramaledetta Brexit! Non toccare quel campanello! Ecco perché ti sei registrato per il referendum. Nonostante tutte le discussioni che abbiamo avuto sull’argomento.»</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">«E ci sono volute due palle così, credimi. Perché tutti quelli che conosco continuavano a insistere che sarebbe stato un disastro.»</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">«Ed è per questo che l’hai fatto? Perché tutti quelli che conosci la pensavano in maniera diversa?»</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">«Era parte dell’attrattiva, sì. Però anche per alcuni complicati, ma molto difendibili, punti di vista socio-economici.»</span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">«Prova a difenderli.»</span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">«Non ho intenzione di difenderli fuori della porta di ‘Canyon’ un attimo prima della seduta.»</span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">Louise alza gli occhi al cielo, sentendogli sottolineare «Canyon».</span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">«Difendine almeno uno. Uno piccolo.»</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">«Be’, nessuno è piccolo. Credimi, vorrei che lo fossero. Ma sono grandi. Grandi punti di vista. Grandi idee. Ma soprattutto volevo fare incazzare i tuoi amici.»</span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">«Ah, ci sei riuscito. Non ti rivolgeranno mai più la parola» dice Louise.</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">«Non è un argomento di conversazione con gli amici. Come ti ho detto, si tratta di una faccenda privata.»</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">«Come fai a fare incazzare i miei amici, se io non glielo dico?»</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">«Li ho fatti incazzare in quel momento. Mentre votavo. Non voglio sbatterglielo in faccia. La nazione deve andare avanti. Guarire.»</span><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">«Okay, ci vai tu a lavorare in un ospizio, con il minimo salariale, per rimpiazzare tutti quelli dell’Europa dell’Est che abbiamo perso.»</span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">«Sono pronto a fare la mia parte. Anche se non sono di grande utilità, quando c’è di mezzo la morte. O le malattie. O qualunque altra cosa abbia a che fare con un gabinetto.»”
  </span><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">
    Nick Hornby,

</span><a class="leftAlignedImage" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/97223.Fintan_O_Toole"><span data-dcnode-id="1150" instrument_node="">
</span><img alt="Fintan O'Toole" data-dcnode-id="1149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1564035604p2/97223.jpg&amp;raw"><span data-dcnode-id="1148" instrument_node="">
</span></a><span data-dcnode-id="1146" instrument_node="">
</span><div class="quoteText" data-dcnode-id="1129"><span data-dcnode-id="1145" instrument_node="">
      “It may seem strange to call this slow collapse invisible since so much of it is obvious: the deep uncertainties about the union after the Good Friday Agreement of 1998 and the establishment of the Scottish Parliament the following year; the consequent rise of English nationalism; the profound regional inequalities within England itself; the generational divergence of values and aspirations; the undermining of the welfare state and its promise of shared citizenship; the contempt for the poor and vulnerable expressed through austerity; the rise of a sensationally self-indulgent and clownish ruling class. But the collective effects of these inter-related developments seem to have been barely visible within the political mainstream until David Cameron accidentally took the lid off by calling the EU referendum and asked people to endorse the status quo.</span><br data-dcnode-id="1144"><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">What we see with the mask pulled back and the fog of fantasies at last beginning to dissipate is the revelation that Brexit is much less about Britain's relationship with the EU than it is about Britain's relationship with itself. It is the projection outwards of an inner turmoil. An archaic political system carried on even while its foundations in a collective sense of belonging were crumbling. Brexit in one way alone has done a real service: it has forced the old system to play out its death throes in public. The spectacle is ugly, but at least it shows that a fissiparous four-nation state cannot be governed without radical social and cconstitutional change.”
  </span><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">

</span><img alt="Jonathan Coe" data-dcnode-id="1021" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1366901937p2/19916.jpg&amp;raw"><span data-dcnode-id="1020" instrument_node="">

</span><div class="quoteText" data-dcnode-id="968"><span data-dcnode-id="1017" instrument_node="">
      “Com’è il morale? In generale”.</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">“Il morale è... eccellente,” disse Nigel, deglutendo con forza. “È un periodo interessantissimo, naturalmente. La Gran Bretagna è a un punto di svolta e noi siamo proprio nell’epicentro... nell’epicentro del turbine che sta... trasfigurando la realtà politica, indirizzandola verso uno sviluppo... decisamente sismico in cui... le placche tettoniche della nostra storia nazionale si stanno spostando, con il risultato di provocare una trasformazione... e io, in qualità di testimone...”</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">All’improvviso si interruppe. Il suo sguardo si perse nel vuoto. Le spalle si afflosciarono. Per un minuto o due rimase a fissare la superficie schiumosa del suo caffè. Alla fine tornò ad alzare gli occhi e le sue successive parole furono le più sincere che Douglas avesse mai sentito uscire dalle sue labbra.</span><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">“Siamo fottuti.”</span><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">“Prego?”</span><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">“Siamo completamente e irrimediabilmente fottuti. È un caos. Corriamo di qua e di là come polli decapitati. Nessuno ha la più pallida idea di quello che sta facendo. Siamo... siamo fottuti.”</span><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">Rapidamente Doug tirò fuori il cellulare e cominciò a registrare.</span><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">“È ufficiale?” chiese.</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">“Che importa? Siamo fottuti, perciò che senso ha sapere se è ufficiale?”</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">“Che tipo di caos? Chi corre di qua e di là come un pollo decapitato?”</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">“Tutti. Nessuno escluso. Chi si aspettava un esito simile? Nessuno era pronto. Nessuno sa cosa sia la Brexit. Nessuno sa come attuarla. Un anno e mezzo fa tutti la chiamavano Brixit. Nessuno sa cosa voglia dire Brexit.”</span><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">“Pensavo che Brexit significasse Brexit.”</span><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">“Divertente. E come dovrebbe essere questa Brexit?”</span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">“Una Brexit rossa, bianca e blu, come dice la May,” citò Doug e di nuovo si dispiacque per Nigel, così infelice. “Ma di sicuro ci saranno frotte di consiglieri... esperti?...”</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">“Esperti?” disse Nigel con amarezza. “Non crediamo più negli esperti. La catena di comando è semplicissima. Ciascuno riceve le sue direttive da Theresa, e Theresa le riceve dal ‘Daily Mail’. E anche da un paio di think tank così fanatici del libero scambio che non li lasceresti...”</span><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">“Questi think tank...” disse Doug incuriosito. “Non mi dirai che una di loro è l’Imperium Foundation, vero?”</span><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">“Mio Dio,” disse Nigel, la testa tra le mani. “Sono dappertutto... dappertutto. Sempre pronti a indire riunioni. A bombardarci di tabelle. Dimenticati della volontà del popolo. Sono questi i pazzi che hanno preso il potere.”</span><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">“Cameron avrebbe saputo fronteggiarli meglio, secondo te?”</span><br data-dcnode-id="982"><span data-dcnode-id="981" instrument_node="">“Cameron?” disse Nigel con una smorfia. “Un fesso di prima categoria! Un moccioso! Un coglione fatto e finito. Se ne sta nel suo capanno del cazzo a scrivere le sue memorie. Guarda che disastro si è lasciato alle spalle. Tutti pronti a pugnalarsi alle spalle. Gli stranieri vengono insultati per la strada. Aggrediti sull’autobus. Invitati a tornarsene da dove sono venuti. Se uno non riga dritto, ecco che subito diventa un traditore e un nemico del popolo. Cameron ha demolito questo paese, Doug. L’ha demolito ed è scappato.”
  </span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">
    Jonathan Coe,

</span><a class="leftAlignedImage" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/19916.Jonathan_Coe"><span data-dcnode-id="922" instrument_node="">
</span><img alt="Jonathan Coe" data-dcnode-id="921" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/authors/1366901937p2/19916.jpg&amp;raw"><span data-dcnode-id="920" instrument_node="">

</span><div class="quoteText" data-dcnode-id="804"><span data-dcnode-id="917" instrument_node="">
      “Frustrato, Doug tentò un’altra strada. “Ascolta, supponiamo che la maggioranza voti per la Brexit e noi...”</span><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">“Scusami se ti interrompo,” disse Nigel. “Supponiamo che la maggioranza voti per cosa?”</span><br data-dcnode-id="914"><span data-dcnode-id="913" instrument_node="">“Brexit.”</span><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">Nigel lo guardò sbalordito. “Come mai salti fuori con questa parola?”</span><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">“Non è così che la chiamano tutti?”</span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">“Credevo che si dicesse Brixit.”</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">“Cosa? Brixit?”</span><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">“Noi diciamo così.”</span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">“Noi... chi?”</span><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">“Dave e tutto il gruppo.”</span><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">“Tutti dicono Brexit. Da dove viene Brixit?”</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">“Non lo so. Pensavo che si dicesse così.” Di nuovo prese un appunto sul taccuino. “Brexit? Sei sicuro?”</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">“Sicurissimo. È una parola composta. British exit.”</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">“British exit... Allora dovrebbe essere Brixit?”</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">“Be’, i greci l’hanno chiamata Grexit.”</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">“I greci? Non sono usciti dall’Unione europea.”</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">“No, ma hanno valutato la possibilità di farlo.”</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">“Noi non siamo i greci. Dovremmo avere una parola che sia unicamente nostra?”</span><br data-dcnode-id="882"><span data-dcnode-id="881" instrument_node="">“Ce l’abbiamo. Brexit.”</span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">“Ma noi continuiamo a dire Brixit.” Scuotendo la testa, Nigel continuò a scrivere. “Sarà una notizia bomba nel prossimo consiglio dei ministri. Spero che non tocchi a me comunicarlo.”</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">“A che ti serve avere una definizione se sei sicuro che la cosa non succederà?” gli domandò Doug.</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">Nigel sorrise felice. “Naturale... hai ragione da vendere. Non succederà e quindi non ci serve definirla.”</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">“Ecco, vedi.”</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">“Dopotutto, tra un anno, nessuno si ricorderà più di questa stupida faccenda.”</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">“Esattamente.”</span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">“Nessuno si ricorderà che qualcuno voleva la Brixit.”</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">“Proprio così. Però, sai, alcuni di loro...” Si chiese come dovesse metterla. “Sono personaggi da prendere sul serio, no? Boris Johnson, per esempio. Un vero peso massimo.”</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">“Non infierire sul suo aspetto fisico,” disse Nigel. “Anche se Dave è molto arrabbiato con lui.”</span><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">“Non si aspettava che si pronunciasse a favore dell’uscita?”</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">“No, non se l’aspettava.”</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">“Gira voce che la sera prima che il ‘Telegraph’ andasse in stampa, Boris avesse preparato due articoli – uno in cui sosteneva l’uscita e l’altro in cui si dichiarava favorevole a restare nell’Unione europea.”</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">“Non ci credo per niente,” disse Nigel. “Boris avrebbe preparato tre articoli: uno per uscire, l’altro per restare e il terzo perché non riusciva a decidere. Gli piace essere sempre pronto.”“E poi c’è Michael Gove. Un altro attaccante che si è pronunciato a favore dell’uscita.”</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">“Lo so. Dave è arrabbiatissimo con Michael. Per fortuna rimangono molti conservatori leali e di buon senso che apprezzano i benefici di restare membri della UE. Credo che tu vada a letto con una di loro. Ma prova a immaginare cosa pensa Dave di Michael e di alcuni altri. Insomma, è andato a Bruxelles, è tornato con un accordo assai vantaggioso, e questi non sono ancora contenti.”</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">“Semplice: a molti non va giù la UE,” disse Doug. “Pensano che non sia democratica.”</span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">“Sì, ma uscirne sarebbe un male per l’economia.”</span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">“Pensano che la Germania comandi a bacchetta su tutti.”</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">“Sì, ma uscirne sarebbe un male per l’economia.”</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">“Pensano che dalla Polonia e dalla Romania siano arrivati troppi immigrati che spingono i salari al ribasso.”</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">“Sì, ma uscirne sarebbe un male per l’economia.”</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">“D’accordo,” disse Doug. “Credo di avere appena capito quali saranno i tre punti strategici della campagna di Dave.” Adesso era il suo turno di prendere appunti. “E come la mettiamo con Jeremy Corbyn?”</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">Nigel inspirò con un lungo sibilo e sobbalzò visibilmente. “Jeremy Corbyn?”</span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">“Se il quadro è questo, lui dove si colloca?”</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">“Preferisco non parlarne.”</span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">“Perché no?”</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">“Perché no? Perché è un marxista. Marxista, leninista, trotzkista, comunista. Maoista, bolscevico, anarchico, di sinistra. Un socialista fondamentalista, anticapitalista, antimonarchico, pro-terrorismo.”</span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">“Ma è anche uno che vuole rimanere nella UE.”</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">“Davvero?”</span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">“Così dice.”</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">“Allora, naturalmente, saremo felici di averlo a bordo. Ma non credo che Dave sarebbe pronto a condividere alcunché sul piano politico.”</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">“Non sarà necessario. È Jeremy il primo a respingere un accordo di questo tipo.”</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">“Bene.”
  </span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">
    Jonathan Coe,

      “Serve Britannia (The Sonnet)</span><br data-dcnode-id="649"><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">Let us build a new Britain,</span><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">A Britain with actual heart's beauty,</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">Where we shall right our wrongs,</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">Instead of boasting our atrocities.</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">Let us build a new Britain,</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">Where commoners are king and queen,</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">Where unlike our tribal ancestors,</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">Our habit is not occupation but caring.</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">Let us herald a new Britain,</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">Where there is no exit only inclusion,</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">Where no one bows to no one for honor,</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">And each lives with self-determination.</span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">Serve Britannia! Britannia, serve as aid.</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">Britain never again shall make others slave.”
  </span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">
    Abhijit Naskar,

</span><div class="quoteText" data-dcnode-id="485"><span data-dcnode-id="498" instrument_node="">
      “Theresa May took this aversion to thinking to its apotheosis when she declared that ‘Brexit means Brexit’ shortly after becoming prime minister in July 2016. Even by the standards of modern British politics, this is a slogan of such sweeping vacuity that it beggars belief that she could utter the words with a straight face. Ask yourself now what it actually means. Consider the events of the following months and years and ask yourself whether she could have been doing anything other than using it to discourage thinking, to avoid facts and to postpone reality. You don’t need to be William of Ockham to conclude that this is the only – never mind the simplest – explanation for her choice of words. The truly nasty element of the whole enterprise is the way it treats the Brexit-supporting British public as idiots. Throw them a fatuous soundbite, the thinking goes, and they’ll be so busy chomping away on it that they won’t notice we haven’t got the first idea what Brexit is going to mean.”
