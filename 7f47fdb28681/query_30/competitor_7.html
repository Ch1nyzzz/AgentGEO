</span><h3 data-dcnode-id="5435"><span data-dcnode-id="5445" id="The_March_for_Europe.2C_July_2016"></span><span class="mw-headline" data-dcnode-id="5443" id="The_March_for_Europe,_July_2016"><span data-dcnode-id="5444" instrument_node="">The March for Europe, July 2016</span></span><span class="mw-editsection" data-dcnode-id="5436"><span class="mw-editsection-bracket" data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">[</span></span><a data-dcnode-id="5439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D2" title="Edit section: The March for Europe, July 2016"><span data-dcnode-id="5440" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5434" instrument_node="">
</span><p data-dcnode-id="5425"><span data-dcnode-id="5433" instrument_node="">The first March for Europe took place in London on 2 July 2016, shortly after the Brexit referendum on 23 June 2016, and was attended by thousands of people.</span><sup class="reference" data-dcnode-id="5430" id="cite_ref-1"><a data-dcnode-id="5431" href="#cite_note-1"><span data-dcnode-id="5432" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5427" id="cite_ref-2"><a data-dcnode-id="5428" href="#cite_note-2"><span data-dcnode-id="5429" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5426" instrument_node="">
</span></p><span data-dcnode-id="5424" instrument_node="">
</span><h3 data-dcnode-id="5413"><span data-dcnode-id="5423" id="The_March_for_Europe.2C_September_2016"></span><span class="mw-headline" data-dcnode-id="5421" id="The_March_for_Europe,_September_2016"><span data-dcnode-id="5422" instrument_node="">The March for Europe, September 2016</span></span><span class="mw-editsection" data-dcnode-id="5414"><span class="mw-editsection-bracket" data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">[</span></span><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D3" title="Edit section: The March for Europe, September 2016"><span data-dcnode-id="5418" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5415"><span data-dcnode-id="5416" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5412" instrument_node="">
</span><p data-dcnode-id="5402"><span data-dcnode-id="5411" instrument_node="">The second March for Europe took place in London on 3 September 2016 and was attended by thousands of people.</span><sup class="reference" data-dcnode-id="5408" id="cite_ref-3"><a data-dcnode-id="5409" href="#cite_note-3"><span data-dcnode-id="5410" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5407" instrument_node=""> It was one of a number of events to take place on the day, including rallies in Edinburgh and Birmingham. Pro-Brexit demonstrators staged a counter-protest at one location along the marching route.</span><sup class="reference" data-dcnode-id="5404" id="cite_ref-4"><a data-dcnode-id="5405" href="#cite_note-4"><span data-dcnode-id="5406" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5403" instrument_node="">
</span></p><span data-dcnode-id="5401" instrument_node="">
</span><h3 data-dcnode-id="5390"><span data-dcnode-id="5400" id="Unite_for_Europe.2C_March_2017"></span><span class="mw-headline" data-dcnode-id="5398" id="Unite_for_Europe,_March_2017"><span data-dcnode-id="5399" instrument_node="">Unite for Europe, March 2017</span></span><span class="mw-editsection" data-dcnode-id="5391"><span class="mw-editsection-bracket" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">[</span></span><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D4" title="Edit section: Unite for Europe, March 2017"><span data-dcnode-id="5395" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5389" instrument_node="">
</span><p data-dcnode-id="5377"><span data-dcnode-id="5388" instrument_node="">The Unite for Europe march, which coincided with the 60th anniversary of the signing of the </span><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Rome" title="Treaty of Rome"><span data-dcnode-id="5387" instrument_node="">Treaty of Rome</span></a><span data-dcnode-id="5385" instrument_node="">, was held in London on 25 March 2017, and the </span><i data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">Independent</span></i><span data-dcnode-id="5382" instrument_node=""> reported that police estimated 100,000 people attended.</span><sup class="reference" data-dcnode-id="5379" id="cite_ref-5"><a data-dcnode-id="5380" href="#cite_note-5"><span data-dcnode-id="5381" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5378" instrument_node="">
</span></p><span data-dcnode-id="5376" instrument_node="">
</span><h3 data-dcnode-id="5365"><span data-dcnode-id="5375" id="People.27s_March_for_Europe.2C_September_2017"></span><span class="mw-headline" data-dcnode-id="5373" id="People's_March_for_Europe,_September_2017"><span data-dcnode-id="5374" instrument_node="">People's March for Europe, September 2017</span></span><span class="mw-editsection" data-dcnode-id="5366"><span class="mw-editsection-bracket" data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">[</span></span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D5" title="Edit section: People's March for Europe, September 2017"><span data-dcnode-id="5370" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5364" instrument_node="">
</span><p data-dcnode-id="5327"><span data-dcnode-id="5363" instrument_node="">The People's March Ltd came into being in July 2017,</span><sup class="reference" data-dcnode-id="5360" id="cite_ref-6"><a data-dcnode-id="5361" href="#cite_note-6"><span data-dcnode-id="5362" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5359" instrument_node=""> to help ensure that a march planned for 9 September 2017 in London went ahead.</span><sup class="reference" data-dcnode-id="5356" id="cite_ref-7"><a data-dcnode-id="5357" href="#cite_note-7"><span data-dcnode-id="5358" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5355" instrument_node=""> The event began with a march from Hyde Park and was followed by speeches in Parliament Square,</span><sup class="reference" data-dcnode-id="5352" id="cite_ref-8"><a data-dcnode-id="5353" href="#cite_note-8"><span data-dcnode-id="5354" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5351" instrument_node=""> emceed by British adventurer </span><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Graham_Hughes" title="Graham Hughes"><span data-dcnode-id="5350" instrument_node="">Graham Hughes</span></a><span data-dcnode-id="5348" instrument_node="">.</span><sup class="reference" data-dcnode-id="5345" id="cite_ref-9"><a data-dcnode-id="5346" href="#cite_note-9"><span data-dcnode-id="5347" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5344" instrument_node=""> The event was attended by thousands of people and was part of a series of protests dubbed "the Autumn of discontent".</span><sup class="reference" data-dcnode-id="5341" id="cite_ref-10"><a data-dcnode-id="5342" href="#cite_note-10"><span data-dcnode-id="5343" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5340" instrument_node=""> Over 50,000 people took to the streets under the banner "Unite, Rethink, Reject Brexit" marching from Hyde Park to Parliament Square</span><sup class="reference" data-dcnode-id="5337" id="cite_ref-11"><a data-dcnode-id="5338" href="#cite_note-11"><span data-dcnode-id="5339" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5336" instrument_node=""> followed by a rally with speakers from the remain movement and from across the political spectrum and received broad media coverage.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5329" style="white-space:nowrap;"><span data-dcnode-id="5335" instrument_node="">[</span><i data-dcnode-id="5331"><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5333" title="This claim needs references to reliable sources. (August 2018)"><span data-dcnode-id="5334" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5330" instrument_node="">]</span></sup><span data-dcnode-id="5328" instrument_node="">
</span></p><span data-dcnode-id="5326" instrument_node="">
</span><h3 data-dcnode-id="5315"><span data-dcnode-id="5325" id="StopBrexit_Manchester.2C_October_2017"></span><span class="mw-headline" data-dcnode-id="5323" id="StopBrexit_Manchester,_October_2017"><span data-dcnode-id="5324" instrument_node="">StopBrexit Manchester, October 2017</span></span><span class="mw-editsection" data-dcnode-id="5316"><span class="mw-editsection-bracket" data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">[</span></span><a data-dcnode-id="5319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D6" title="Edit section: StopBrexit Manchester, October 2017"><span data-dcnode-id="5320" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5314" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5302"><div class="thumbinner" data-dcnode-id="5303" style="width:222px;"><a class="image" data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg"><img alt="" class="thumbimage" data-dcnode-id="5313" data-file-height="2030" data-file-width="3045" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%252C_October_1%252C_2017.jpg/220px-IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%252C_October_1%252C_2017.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg/330px-IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a1/IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg/440px-IMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg 2x" width="220"></a><span data-dcnode-id="5311" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5304"><div class="magnify" data-dcnode-id="5309"><a class="internal" data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIMG_2810_Manchester_anti-Brexit_protest_for_Conservative_conference%2C_October_1%2C_2017.jpg" title="Enlarge"></a></div><span data-dcnode-id="5308" instrument_node="">StopBrexit </span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchester" title="Manchester"><span data-dcnode-id="5307" instrument_node="">Manchester</span></a><span data-dcnode-id="5305" instrument_node=""> march in October 2017</span></div></div></div><span data-dcnode-id="5301" instrument_node="">
</span><p data-dcnode-id="5288"><span data-dcnode-id="5300" instrument_node="">The StopBrexit Manchester march was held in All Saints Park, Manchester, on 1 October 2017, to coincide with the Conservative Party conference. The event consisted of a rally followed by a march through central Manchester, and finishing with a street party organised by local pro-EU groups.</span><sup class="reference" data-dcnode-id="5297" id="cite_ref-12"><a data-dcnode-id="5298" href="#cite_note-12"><span data-dcnode-id="5299" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5296" instrument_node=""> An estimated 30,000 people took part in this event.</span><sup class="reference" data-dcnode-id="5293" id="cite_ref-13"><a data-dcnode-id="5294" href="#cite_note-13"><span data-dcnode-id="5295" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="5290" id="cite_ref-14"><a data-dcnode-id="5291" href="#cite_note-14"><span data-dcnode-id="5292" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5289" instrument_node="">
</span></p><span data-dcnode-id="5287" instrument_node="">
</span><h3 data-dcnode-id="5276"><span data-dcnode-id="5286" id="StopBrexit_Leeds.2C_March_2018"></span><span class="mw-headline" data-dcnode-id="5284" id="StopBrexit_Leeds,_March_2018"><span data-dcnode-id="5285" instrument_node="">StopBrexit Leeds, March 2018</span></span><span class="mw-editsection" data-dcnode-id="5277"><span class="mw-editsection-bracket" data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">[</span></span><a data-dcnode-id="5280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D7" title="Edit section: StopBrexit Leeds, March 2018"><span data-dcnode-id="5281" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5275" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5263"><div class="thumbinner" data-dcnode-id="5264" style="width:222px;"><a class="image" data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAt_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5274" data-file-height="640" data-file-width="640" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%252827116785348%2529.jpg/220px-At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%252827116785348%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/48/At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg/330px-At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/48/At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg/440px-At_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg 2x" width="220"></a><span data-dcnode-id="5272" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5265"><div class="magnify" data-dcnode-id="5270"><a class="internal" data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAt_the_pro-EU_anti-Brexit_march_in_Edinburgh_%2827116785348%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5269" instrument_node="">A pro-EU demonstration in </span><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edinburgh" title="Edinburgh"><span data-dcnode-id="5268" instrument_node="">Edinburgh</span></a><span data-dcnode-id="5266" instrument_node="">, March 2018</span></div></div></div><span data-dcnode-id="5262" instrument_node="">
</span><p data-dcnode-id="5235"><span data-dcnode-id="5261" instrument_node="">The StopBrexit Leeds march was held on 24 March 2018 in Leeds. The march assembled at The Headrow in central Leeds and ended with a rally at The Headrow,</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-Leeds1_15-0"><a data-dcnode-id="5259" href="#cite_note-Leeds1-15"><span data-dcnode-id="5260" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5255" id="cite_ref-Leeds2_16-0"><a data-dcnode-id="5256" href="#cite_note-Leeds2-16"><span data-dcnode-id="5257" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5254" instrument_node=""> with thousands of people reported to have attended.</span><sup class="reference" data-dcnode-id="5251" id="cite_ref-17"><a data-dcnode-id="5252" href="#cite_note-17"><span data-dcnode-id="5253" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5248" id="cite_ref-18"><a data-dcnode-id="5249" href="#cite_note-18"><span data-dcnode-id="5250" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5247" instrument_node=""> Leeds for Europe organised the march.</span><sup class="reference" data-dcnode-id="5244" id="cite_ref-Leeds1_15-1"><a data-dcnode-id="5245" href="#cite_note-Leeds1-15"><span data-dcnode-id="5246" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5241" id="cite_ref-Leeds2_16-1"><a data-dcnode-id="5242" href="#cite_note-Leeds2-16"><span data-dcnode-id="5243" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5240" instrument_node=""> There were also anti-brexit protests on the same day in various other cities across the country, including Edinburgh, Ipswich, Exeter and Newcastle.</span><sup class="reference" data-dcnode-id="5237" id="cite_ref-19"><a data-dcnode-id="5238" href="#cite_note-19"><span data-dcnode-id="5239" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5236" instrument_node="">
</span></p><span data-dcnode-id="5234" instrument_node="">
</span><h3 data-dcnode-id="5223"><span data-dcnode-id="5233" id="People.27s_Vote_march.2C_June_2018"></span><span class="mw-headline" data-dcnode-id="5231" id="People's_Vote_march,_June_2018"><span data-dcnode-id="5232" instrument_node="">People's Vote march, June 2018</span></span><span class="mw-editsection" data-dcnode-id="5224"><span class="mw-editsection-bracket" data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node="">[</span></span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D8" title="Edit section: People's Vote march, June 2018"><span data-dcnode-id="5228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5222" instrument_node="">
</span><p data-dcnode-id="5186"><span data-dcnode-id="5221" instrument_node="">On 23 June 2018, the second anniversary of the EU referendum, </span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Vote" title="People's Vote"><span data-dcnode-id="5220" instrument_node="">People's Vote</span></a><span data-dcnode-id="5218" instrument_node=""> organised a march and protest from </span><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trafalgar_Square" title="Trafalgar Square"><span data-dcnode-id="5217" instrument_node="">Trafalgar Square</span></a><span data-dcnode-id="5215" instrument_node=""> to </span><a data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_Square" title="Parliament Square"><span data-dcnode-id="5214" instrument_node="">Parliament Square</span></a><span data-dcnode-id="5212" instrument_node=""> in Central London. Speakers included </span><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29" title="Liberal Democrats (UK)"><span data-dcnode-id="5211" instrument_node="">Liberal Democrat</span></a><span data-dcnode-id="5209" instrument_node=""> leader </span><a data-dcnode-id="5207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vince_Cable" title="Vince Cable"><span data-dcnode-id="5208" instrument_node="">Vince Cable</span></a><span data-dcnode-id="5206" instrument_node="">, </span><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_England_and_Wales" title="Green Party of England and Wales"><span data-dcnode-id="5205" instrument_node="">Green Party</span></a><span data-dcnode-id="5203" instrument_node=""> co-leader </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caroline_Lucas" title="Caroline Lucas"><span data-dcnode-id="5202" instrument_node="">Caroline Lucas</span></a><span data-dcnode-id="5200" instrument_node="">, Labour's </span><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Lammy" title="David Lammy"><span data-dcnode-id="5199" instrument_node="">David Lammy</span></a><span data-dcnode-id="5197" instrument_node=""> and the Conservatives' </span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anna_Soubry" title="Anna Soubry"><span data-dcnode-id="5196" instrument_node="">Anna Soubry</span></a><span data-dcnode-id="5194" instrument_node="">. The organisers said that at least 100,000 people attended the march. A smaller pro-Brexit march was held in London on the same date.</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-20"><a data-dcnode-id="5192" href="#cite_note-20"><span data-dcnode-id="5193" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="5188" id="cite_ref-21"><a data-dcnode-id="5189" href="#cite_note-21"><span data-dcnode-id="5190" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5187" instrument_node="">
</span></p><p data-dcnode-id="5159"><span data-dcnode-id="5185" instrument_node="">The People's Vote march was not designed to reverse the result of the referendum, but to hold a </span><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proposed_referendum_on_the_Brexit_withdrawal_agreement" title="Proposed referendum on the Brexit withdrawal agreement"><span data-dcnode-id="5184" instrument_node="">public vote on the final terms of the UK's EU exit deal</span></a><span data-dcnode-id="5182" instrument_node="">.</span><sup class="reference" data-dcnode-id="5179" id="cite_ref-22"><a data-dcnode-id="5180" href="#cite_note-22"><span data-dcnode-id="5181" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5178" instrument_node=""> The organisers said Brexit was "not a done deal" and Cable said "Brexit is not inevitable. Brexit can be stopped."</span><sup class="reference" data-dcnode-id="5175" id="cite_ref-23"><a data-dcnode-id="5176" href="#cite_note-23"><span data-dcnode-id="5177" instrument_node="">[23]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="5168" style="white-space:nowrap;"><span data-dcnode-id="5174" instrument_node="">[</span><i data-dcnode-id="5170"><a data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AArticles_contradicting_other_articles" title="Category:Articles contradicting other articles"><span data-dcnode-id="5172" title="directly contradicts 'was not designed to reverse the result of the referendum' in preceding sentence (August 2018)"><span data-dcnode-id="5173" instrument_node="">contradictory</span></span></a></i><span data-dcnode-id="5169" instrument_node="">]</span></sup><span data-dcnode-id="5167" instrument_node=""> The Labour leader </span><a data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremy_Corbyn" title="Jeremy Corbyn"><span data-dcnode-id="5166" instrument_node="">Jeremy Corbyn</span></a><span data-dcnode-id="5164" instrument_node=""> was criticised for not attending the march.</span><sup class="reference" data-dcnode-id="5161" id="cite_ref-24"><a data-dcnode-id="5162" href="#cite_note-24"><span data-dcnode-id="5163" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5160" instrument_node="">
</span></p><span data-dcnode-id="5158" instrument_node="">
</span><h3 data-dcnode-id="5147"><span data-dcnode-id="5157" id=".22People.27s_Vote.22_march.2C_September_2018"></span><span class="mw-headline" data-dcnode-id="5155" id="&quot;People's_Vote&quot;_march,_September_2018"><span data-dcnode-id="5156" instrument_node="">"People's Vote" march, September 2018</span></span><span class="mw-editsection" data-dcnode-id="5148"><span class="mw-editsection-bracket" data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">[</span></span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D9" title="Edit section: &quot;People's Vote&quot; march, September 2018"><span data-dcnode-id="5152" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5146" instrument_node="">
</span><p data-dcnode-id="5140"><span data-dcnode-id="5145" instrument_node="">Thousands marched through Liverpool on 23 September 2018 during the annual Labour Party conference in protest against leaving the EU.</span><sup class="reference" data-dcnode-id="5142" id="cite_ref-25"><a data-dcnode-id="5143" href="#cite_note-25"><span data-dcnode-id="5144" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5141" instrument_node="">
</span></p><span data-dcnode-id="5139" instrument_node="">
</span><h3 data-dcnode-id="5128"><span data-dcnode-id="5138" id="Bin_Brexit_in_Brum.2C_September_2018"></span><span class="mw-headline" data-dcnode-id="5136" id="Bin_Brexit_in_Brum,_September_2018"><span data-dcnode-id="5137" instrument_node="">Bin Brexit in Brum, September 2018</span></span><span class="mw-editsection" data-dcnode-id="5129"><span class="mw-editsection-bracket" data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">[</span></span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D10" title="Edit section: Bin Brexit in Brum, September 2018"><span data-dcnode-id="5133" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5121"><span data-dcnode-id="5126" instrument_node="">Another march against brexit took place in Birmingham on 30 September 2018 during the annual Conservative Party conference.</span><sup class="reference" data-dcnode-id="5123" id="cite_ref-26"><a data-dcnode-id="5124" href="#cite_note-26"><span data-dcnode-id="5125" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5122" instrument_node="">
</span></p><span data-dcnode-id="5120" instrument_node="">
</span><h3 data-dcnode-id="5109"><span data-dcnode-id="5119" id="People.27s_Vote_March_for_the_Future.2C_October_2018"></span><span class="mw-headline" data-dcnode-id="5117" id="People's_Vote_March_for_the_Future,_October_2018"><span data-dcnode-id="5118" instrument_node="">People's Vote March for the Future, October 2018</span></span><span class="mw-editsection" data-dcnode-id="5110"><span class="mw-editsection-bracket" data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">[</span></span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D11" title="Edit section: People's Vote March for the Future, October 2018"><span data-dcnode-id="5114" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5108" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5107" instrument_node="">On 20 October 2018, People's Vote organised the second march called </span><i data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">The People's Vote March for the Future</span></i><span data-dcnode-id="5104" instrument_node="">. Organisers claimed that 700,000 people attended the march jointly organised by People's Vote and the UK newspaper </span><i data-dcnode-id="5101"><a data-dcnode-id="5102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Independent" title="The Independent"><span data-dcnode-id="5103" instrument_node="">The Independent</span></a></i><span data-dcnode-id="5100" instrument_node="">, although police were unable to verify the number.</span><sup class="reference" data-dcnode-id="5097" id="cite_ref-27"><a data-dcnode-id="5098" href="#cite_note-27"><span data-dcnode-id="5099" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="5094" id="cite_ref-28"><a data-dcnode-id="5095" href="#cite_note-28"><span data-dcnode-id="5096" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5093" instrument_node=""> A later estimate, presented by the </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_London_Authority" title="Greater London Authority"><span data-dcnode-id="5092" instrument_node="">Greater London Authority</span></a><span data-dcnode-id="5090" instrument_node=""> and published in </span><i data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">The Daily Telegraph</span></i><span data-dcnode-id="5087" instrument_node="">, reported the number to be 250,000.</span><sup class="reference" data-dcnode-id="5084" id="cite_ref-29"><a data-dcnode-id="5085" href="#cite_note-29"><span data-dcnode-id="5086" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5083" instrument_node=""> The aim of the march was to secure a vote on the final Brexit deal. The march organisers stated: "Whether you voted leave or remain, nobody voted to make this country worse off, to harm jobs, to damage the NHS, to affect the future of millions of young people, or to make this country more divided. The more the shape of the final Brexit deal becomes clear, the more it is clear that it will do nothing to improve social justice, reduce inequality, increase our standard of living, or create a better future for future generations."</span><sup class="reference" data-dcnode-id="5080" id="cite_ref-30"><a data-dcnode-id="5081" href="#cite_note-30"><span data-dcnode-id="5082" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5079" instrument_node="">
</span></p><p data-dcnode-id="5050"><span data-dcnode-id="5077" instrument_node="">A number of celebrities, including </span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delia_Smith" title="Delia Smith"><span data-dcnode-id="5076" instrument_node="">Delia Smith</span></a><span data-dcnode-id="5074" instrument_node="">, </span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ian_McEwan" title="Ian McEwan"><span data-dcnode-id="5073" instrument_node="">Ian McEwan</span></a><span data-dcnode-id="5071" instrument_node="">, Sir </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patrick_Stewart" title="Patrick Stewart"><span data-dcnode-id="5070" instrument_node="">Patrick Stewart</span></a><span data-dcnode-id="5068" instrument_node=""> and </span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlie_Mullins" title="Charlie Mullins"><span data-dcnode-id="5067" instrument_node="">Charlie Mullins</span></a><span data-dcnode-id="5065" instrument_node="">, stated that they would fund coach travel to London, to enable those wishing to attend the march to do so.</span><sup class="reference" data-dcnode-id="5062" id="cite_ref-31"><a data-dcnode-id="5063" href="#cite_note-31"><span data-dcnode-id="5064" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="5059" id="cite_ref-32"><a data-dcnode-id="5060" href="#cite_note-32"><span data-dcnode-id="5061" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5058" instrument_node=""> If the organisers' stated estimate of the attendance was correct, then the event was the second-largest protest of the 21st century in the UK, after the </span><a data-dcnode-id="5056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/15_February_2003_anti-war_protests" title="15 February 2003 anti-war protests"><span data-dcnode-id="5057" instrument_node="">"Stop the War" anti-Iraq War march in 2003</span></a><span data-dcnode-id="5055" instrument_node="">.</span><sup class="reference" data-dcnode-id="5052" id="cite_ref-33"><a data-dcnode-id="5053" href="#cite_note-33"><span data-dcnode-id="5054" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5051" instrument_node="">
</span></p><span data-dcnode-id="5049" instrument_node="">
</span><h3 data-dcnode-id="5038"><span data-dcnode-id="5048" id="Put_It_to_the_People.2C_March_2019"></span><span class="mw-headline" data-dcnode-id="5046" id="Put_It_to_the_People,_March_2019"><span data-dcnode-id="5047" instrument_node="">Put It to the People, March 2019</span></span><span class="mw-editsection" data-dcnode-id="5039"><span class="mw-editsection-bracket" data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">[</span></span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D12" title="Edit section: Put It to the People, March 2019"><span data-dcnode-id="5043" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5037" instrument_node="">
</span><p data-dcnode-id="5012"><span data-dcnode-id="5036" instrument_node="">The third People's Vote march, also known as the </span><i data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">Put It to the People</span></i><span data-dcnode-id="5033" instrument_node=""> march, took place in London on 23 March 2019.</span><sup class="reference" data-dcnode-id="5030" id="cite_ref-34"><a data-dcnode-id="5031" href="#cite_note-34"><span data-dcnode-id="5032" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="5027" id="cite_ref-35"><a data-dcnode-id="5028" href="#cite_note-35"><span data-dcnode-id="5029" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5026" instrument_node=""> The main purpose of the march was to call for a </span><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proposed_referendum_on_the_Brexit_withdrawal_agreement" title="Proposed referendum on the Brexit withdrawal agreement"><span data-dcnode-id="5025" instrument_node="">second referendum</span></a><span data-dcnode-id="5023" instrument_node="">. The organisers suggested that a million people took part; independent verification by experts in </span><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crowd_counting" title="Crowd counting"><span data-dcnode-id="5022" instrument_node="">crowd estimation</span></a><span data-dcnode-id="5020" instrument_node=""> put the figure at between 312,000 and 400,000.</span><sup class="reference" data-dcnode-id="5017" id="cite_ref-36"><a data-dcnode-id="5018" href="#cite_note-36"><span data-dcnode-id="5019" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="5014" id="cite_ref-37"><a data-dcnode-id="5015" href="#cite_note-37"><span data-dcnode-id="5016" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5013" instrument_node="">
</span></p><span data-dcnode-id="5011" instrument_node="">
</span><h3 data-dcnode-id="5000"><span data-dcnode-id="5010" id="March_for_Change.2C_July_2019"></span><span class="mw-headline" data-dcnode-id="5008" id="March_for_Change,_July_2019"><span data-dcnode-id="5009" instrument_node="">March for Change, July 2019</span></span><span class="mw-editsection" data-dcnode-id="5001"><span class="mw-editsection-bracket" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">[</span></span><a data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D13" title="Edit section: March for Change, July 2019"><span data-dcnode-id="5005" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4999" instrument_node="">
</span><p data-dcnode-id="4990"><span data-dcnode-id="4998" instrument_node="">Another anti-brexit march took place in London on 20 July 2019, with the message “No to Boris, yes to Europe”.</span><sup class="reference" data-dcnode-id="4995" id="cite_ref-38"><a data-dcnode-id="4996" href="#cite_note-38"><span data-dcnode-id="4997" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="4992" id="cite_ref-39"><a data-dcnode-id="4993" href="#cite_note-39"><span data-dcnode-id="4994" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4991" instrument_node="">
</span></p><span data-dcnode-id="4989" instrument_node="">
</span><h3 data-dcnode-id="4978"><span data-dcnode-id="4988" id="Let_Us_Be_Heard.2C_October_2019"></span><span class="mw-headline" data-dcnode-id="4986" id="Let_Us_Be_Heard,_October_2019"><span data-dcnode-id="4987" instrument_node="">Let Us Be Heard, October 2019</span></span><span class="mw-editsection" data-dcnode-id="4979"><span class="mw-editsection-bracket" data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">[</span></span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D14" title="Edit section: Let Us Be Heard, October 2019"><span data-dcnode-id="4983" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4958"><span data-dcnode-id="4976" instrument_node="">The fourth People's Vote march, again in London and this time known as the </span><i data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">Let Us Be Heard</span></i><span data-dcnode-id="4973" instrument_node=""> march, took place on 19 October 2019, thereby coinciding with the </span><a data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_votes_on_Brexit%23Second_Letwin_amendment_%2819_October_2019%29" title="Parliamentary votes on Brexit"><span data-dcnode-id="4972" instrument_node="">planned vote in the House of Commons</span></a><span data-dcnode-id="4970" instrument_node=""> on </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="4969" instrument_node="">Boris Johnson's</span></a><span data-dcnode-id="4967" instrument_node=""> revised withdrawal agreement. Organisers estimated a million people attended the march,</span><sup class="reference" data-dcnode-id="4964" id="cite_ref-40"><a data-dcnode-id="4965" href="#cite_note-40"><span data-dcnode-id="4966" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4963" instrument_node=""> whose purpose was to demand a confirmatory referendum on the terms of withdrawal.</span><sup class="reference" data-dcnode-id="4960" id="cite_ref-41"><a data-dcnode-id="4961" href="#cite_note-41"><span data-dcnode-id="4962" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4959" instrument_node="">
</span></p><span data-dcnode-id="4957" instrument_node="">
</span><h2 data-dcnode-id="4947"><span class="mw-headline" data-dcnode-id="4955" id="Joint_campaigning"><span data-dcnode-id="4956" instrument_node="">Joint campaigning</span></span><span class="mw-editsection" data-dcnode-id="4948"><span class="mw-editsection-bracket" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">[</span></span><a data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D15" title="Edit section: Joint campaigning"><span data-dcnode-id="4952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4946" instrument_node="">
</span><p data-dcnode-id="4934"><span data-dcnode-id="4945" instrument_node="">Members of national groups, including Britain for Europe, European Movement UK, </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Britain" title="Open Britain"><span data-dcnode-id="4944" instrument_node="">Open Britain</span></a><span data-dcnode-id="4942" instrument_node="">, conduct joint campaigns in various towns and cities of the UK.</span><sup class="reference" data-dcnode-id="4939" id="cite_ref-42"><a data-dcnode-id="4940" href="#cite_note-42"><span data-dcnode-id="4941" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="4936" id="cite_ref-43"><a data-dcnode-id="4937" href="#cite_note-43"><span data-dcnode-id="4938" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4935" instrument_node="">
</span></p><p data-dcnode-id="4922"><span data-dcnode-id="4933" instrument_node="">In March 2018 six national groups moved into a shared Remain office in </span><a data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millbank_Tower" title="Millbank Tower"><span data-dcnode-id="4932" instrument_node="">Millbank Tower</span></a><span data-dcnode-id="4930" instrument_node="">, London, in order to pool their resources for campaigning.</span><sup class="reference" data-dcnode-id="4927" id="cite_ref-44"><a data-dcnode-id="4928" href="#cite_note-44"><span data-dcnode-id="4929" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="4924" id="cite_ref-Mason_45-0"><a data-dcnode-id="4925" href="#cite_note-Mason-45"><span data-dcnode-id="4926" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4923" instrument_node="">
</span></p><span data-dcnode-id="4921" instrument_node="">
</span><h3 data-dcnode-id="4910"><span data-dcnode-id="4920" id="People.27s_Vote"></span><span class="mw-headline" data-dcnode-id="4918" id="People's_Vote"><span data-dcnode-id="4919" instrument_node="">People's Vote</span></span><span class="mw-editsection" data-dcnode-id="4911"><span class="mw-editsection-bracket" data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">[</span></span><a data-dcnode-id="4914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D16" title="Edit section: People's Vote"><span data-dcnode-id="4915" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4909" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4903" role="note"><span data-dcnode-id="4906" instrument_node="">Main article: </span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Vote" title="People's Vote"><span data-dcnode-id="4905" instrument_node="">People's Vote</span></a></div><span data-dcnode-id="4902" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4893"><div class="thumbinner" data-dcnode-id="4894" style="width:222px;"><a class="image" data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABrexit_Demonstrators_%2839999193783%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4901" data-file-height="2592" data-file-width="3872" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Brexit_Demonstrators_%252839999193783%2529.jpg/220px-Brexit_Demonstrators_%252839999193783%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Brexit_Demonstrators_%2839999193783%29.jpg/330px-Brexit_Demonstrators_%2839999193783%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Brexit_Demonstrators_%2839999193783%29.jpg/440px-Brexit_Demonstrators_%2839999193783%29.jpg 2x" width="220"></a><span data-dcnode-id="4899" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4895"><div class="magnify" data-dcnode-id="4897"><a class="internal" data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABrexit_Demonstrators_%2839999193783%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4896" instrument_node="">Protesters holding the logo of People's Vote in a demonstration</span></div></div></div><span data-dcnode-id="4892" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4880"><div class="thumbinner" data-dcnode-id="4881" style="width:222px;"><a class="image" data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlags_and_placards_at_the_People%2527s_Vote_march%2C_London%2C_23_March_2019.jpg"><img alt="" class="thumbimage" data-dcnode-id="4891" data-file-height="3249" data-file-width="4872" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Flags_and_placards_at_the_People%2527s_Vote_march%252C_London%252C_23_March_2019.jpg/220px-Flags_and_placards_at_the_People%2527s_Vote_march%252C_London%252C_23_March_2019.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Flags_and_placards_at_the_People%27s_Vote_march%2C_London%2C_23_March_2019.jpg/330px-Flags_and_placards_at_the_People%27s_Vote_march%2C_London%2C_23_March_2019.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Flags_and_placards_at_the_People%27s_Vote_march%2C_London%2C_23_March_2019.jpg/440px-Flags_and_placards_at_the_People%27s_Vote_march%2C_London%2C_23_March_2019.jpg 2x" width="220"></a><span data-dcnode-id="4889" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4882"><div class="magnify" data-dcnode-id="4887"><a class="internal" data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlags_and_placards_at_the_People%2527s_Vote_march%2C_London%2C_23_March_2019.jpg" title="Enlarge"></a></div><span data-dcnode-id="4886" instrument_node="">Crowds at the People's Vote March in </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London" title="London"><span data-dcnode-id="4885" instrument_node="">London</span></a><span data-dcnode-id="4883" instrument_node="">, March 2019</span></div></div></div><span data-dcnode-id="4879" instrument_node="">
</span><p data-dcnode-id="4860"><span data-dcnode-id="4878" instrument_node="">Launched in April 2018, People's Vote is a UK campaign group calling for a </span><a class="mw-redirect" data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum_on_the_Brexit_withdrawal_agreement" title="Referendum on the Brexit withdrawal agreement"><span data-dcnode-id="4877" instrument_node="">public vote on the final Brexit deal</span></a><span data-dcnode-id="4875" instrument_node="">. The campaign comprises nine anti-Brexit groups,</span><sup class="reference" data-dcnode-id="4872" id="cite_ref-46"><a data-dcnode-id="4873" href="#cite_note-46"><span data-dcnode-id="4874" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4871" instrument_node=""> including eight operating from Millbank Tower. The groups include the seven listed below, plus </span><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/For_our_Future%2527s_Sake" title="For our Future's Sake"><span data-dcnode-id="4870" instrument_node="">For our Future's Sake</span></a><span data-dcnode-id="4868" instrument_node=""> (FFS), InFacts, and Open Britain.</span><sup class="reference" data-dcnode-id="4865" id="cite_ref-47"><a data-dcnode-id="4866" href="#cite_note-47"><span data-dcnode-id="4867" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="4862" id="cite_ref-48"><a data-dcnode-id="4863" href="#cite_note-48"><span data-dcnode-id="4864" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4861" instrument_node="">
</span></p><span data-dcnode-id="4859" instrument_node="">
</span><h4 data-dcnode-id="4849"><span class="mw-headline" data-dcnode-id="4857" id="Britain_for_Europe"><span data-dcnode-id="4858" instrument_node="">Britain for Europe</span></span><span class="mw-editsection" data-dcnode-id="4850"><span class="mw-editsection-bracket" data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">[</span></span><a data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D17" title="Edit section: Britain for Europe"><span data-dcnode-id="4854" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4848" instrument_node="">
</span><p data-dcnode-id="4825"><span data-dcnode-id="4847" instrument_node="">Britain for Europe was established shortly after the EU referendum. It is an independent </span><a class="mw-redirect" data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pressure_group" title="Pressure group"><span data-dcnode-id="4846" instrument_node="">pressure group</span></a><span data-dcnode-id="4844" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Umbrella_organisation" title="Umbrella organisation"><span data-dcnode-id="4843" instrument_node="">umbrella organisation</span></a><span data-dcnode-id="4841" instrument_node=""> for grassroot activists from around the UK.</span><sup class="reference" data-dcnode-id="4838" id="cite_ref-bristol_49-0"><a data-dcnode-id="4839" href="#cite_note-bristol-49"><span data-dcnode-id="4840" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4837" instrument_node=""> It lobbies in favour of the UK remaining in the EU.</span><sup class="reference" data-dcnode-id="4834" id="cite_ref-50"><a data-dcnode-id="4835" href="#cite_note-50"><span data-dcnode-id="4836" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="4831" id="cite_ref-guardian_51-0"><a data-dcnode-id="4832" href="#cite_note-guardian-51"><span data-dcnode-id="4833" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4830" instrument_node=""> The group organises marches, conferences, meetings, and national campaigns. It is a founding member of People's Vote.</span><sup class="reference" data-dcnode-id="4827" id="cite_ref-Skeet_52-0"><a data-dcnode-id="4828" href="#cite_note-Skeet-52"><span data-dcnode-id="4829" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4826" instrument_node="">
</span></p><p data-dcnode-id="4812"><span data-dcnode-id="4824" instrument_node="">The Chair of Britain for Europe is Tom Brufatto.</span><sup class="reference" data-dcnode-id="4821" id="cite_ref-53"><a data-dcnode-id="4822" href="#cite_note-53"><span data-dcnode-id="4823" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4820" instrument_node=""> Britain for Europe is organised from the </span><a data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grassroots" title="Grassroots"><span data-dcnode-id="4819" instrument_node="">grassroots</span></a><span data-dcnode-id="4817" instrument_node=""> membership.</span><sup class="reference" data-dcnode-id="4814" id="cite_ref-Skeet_52-1"><a data-dcnode-id="4815" href="#cite_note-Skeet-52"><span data-dcnode-id="4816" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4813" instrument_node="">
</span></p><p data-dcnode-id="4806"><span data-dcnode-id="4811" instrument_node="">The organisation has about sixty member affiliated groups including:</span><sup class="reference" data-dcnode-id="4808" id="cite_ref-bfegroups_54-0"><a data-dcnode-id="4809" href="#cite_note-bfegroups-54"><span data-dcnode-id="4810" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4807" instrument_node="">
</span></p><span data-dcnode-id="4805" instrument_node="">
</span><div class="div-col" data-dcnode-id="4746" style="column-width: 16em;"><span data-dcnode-id="4802" instrument_node="">
</span><ul data-dcnode-id="4748"><li data-dcnode-id="4797"><span data-dcnode-id="4801" instrument_node="">Camden for Europe</span><sup class="reference" data-dcnode-id="4798" id="cite_ref-bus_55-0"><a data-dcnode-id="4799" href="#cite_note-bus-55"><span data-dcnode-id="4800" instrument_node="">[55]</span></a></sup></li><span data-dcnode-id="4796" instrument_node="">
</span><li data-dcnode-id="4791"><span data-dcnode-id="4795" instrument_node="">Devon for Europe</span><sup class="reference" data-dcnode-id="4792" id="cite_ref-devon_56-0"><a data-dcnode-id="4793" href="#cite_note-devon-56"><span data-dcnode-id="4794" instrument_node="">[56]</span></a></sup></li><span data-dcnode-id="4790" instrument_node="">
</span><li data-dcnode-id="4785"><span data-dcnode-id="4789" instrument_node="">Bath for Europe</span><sup class="reference" data-dcnode-id="4786" id="cite_ref-bath_57-0"><a data-dcnode-id="4787" href="#cite_note-bath-57"><span data-dcnode-id="4788" instrument_node="">[57]</span></a></sup></li><span data-dcnode-id="4784" instrument_node="">
</span><li data-dcnode-id="4776"><span data-dcnode-id="4783" instrument_node="">Berkshire for Europe</span><sup class="reference" data-dcnode-id="4780" id="cite_ref-bfegroups_54-1"><a data-dcnode-id="4781" href="#cite_note-bfegroups-54"><span data-dcnode-id="4782" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="4777" id="cite_ref-berkshire_58-0"><a data-dcnode-id="4778" href="#cite_note-berkshire-58"><span data-dcnode-id="4779" instrument_node="">[58]</span></a></sup></li><span data-dcnode-id="4775" instrument_node="">
</span><li data-dcnode-id="4767"><span data-dcnode-id="4774" instrument_node="">Bristol for Europe</span><sup class="reference" data-dcnode-id="4771" id="cite_ref-bfegroups_54-2"><a data-dcnode-id="4772" href="#cite_note-bfegroups-54"><span data-dcnode-id="4773" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="4768" id="cite_ref-bristol_49-1"><a data-dcnode-id="4769" href="#cite_note-bristol-49"><span data-dcnode-id="4770" instrument_node="">[49]</span></a></sup></li><span data-dcnode-id="4766" instrument_node="">
</span><li data-dcnode-id="4761"><span data-dcnode-id="4765" instrument_node="">EU in Brum</span><sup class="reference" data-dcnode-id="4762" id="cite_ref-guardian_51-1"><a data-dcnode-id="4763" href="#cite_note-guardian-51"><span data-dcnode-id="4764" instrument_node="">[51]</span></a></sup></li><span data-dcnode-id="4760" instrument_node="">
</span><li data-dcnode-id="4755"><span data-dcnode-id="4759" instrument_node="">Leeds for Europe</span><sup class="reference" data-dcnode-id="4756" id="cite_ref-59"><a data-dcnode-id="4757" href="#cite_note-59"><span data-dcnode-id="4758" instrument_node="">[59]</span></a></sup></li><span data-dcnode-id="4754" instrument_node="">
</span><li data-dcnode-id="4749"><span data-dcnode-id="4753" instrument_node="">Perth for Europe</span><sup class="reference" data-dcnode-id="4750" id="cite_ref-bfegroups_54-3"><a data-dcnode-id="4751" href="#cite_note-bfegroups-54"><span data-dcnode-id="4752" instrument_node="">[54]</span></a></sup></li></ul><span data-dcnode-id="4747" instrument_node="">
</span></div><span data-dcnode-id="4745" instrument_node="">
</span><p data-dcnode-id="4730"><span data-dcnode-id="4744" instrument_node="">In January 2017, the affiliate group Leeds for Europe formed. It campaigns against Brexit in the city of </span><a data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leeds" title="Leeds"><span data-dcnode-id="4743" instrument_node="">Leeds</span></a><span data-dcnode-id="4741" instrument_node=""> and elsewhere in </span><a data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Yorkshire" title="West Yorkshire"><span data-dcnode-id="4740" instrument_node="">West Yorkshire</span></a><span data-dcnode-id="4738" instrument_node="">.</span><sup class="reference" data-dcnode-id="4735" id="cite_ref-YP_Leeds_60-0"><a data-dcnode-id="4736" href="#cite_note-YP_Leeds-60"><span data-dcnode-id="4737" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4734" instrument_node="">  Leeds for Europe is also affiliated to the </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Movement_UK" title="European Movement UK"><span data-dcnode-id="4733" instrument_node="">European Movement UK</span></a><span data-dcnode-id="4731" instrument_node="">.
</span></p><span data-dcnode-id="4729" instrument_node="">
</span><h4 data-dcnode-id="4719"><span class="mw-headline" data-dcnode-id="4727" id="European_Movement_UK"><span data-dcnode-id="4728" instrument_node="">European Movement UK</span></span><span class="mw-editsection" data-dcnode-id="4720"><span class="mw-editsection-bracket" data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">[</span></span><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D18" title="Edit section: European Movement UK"><span data-dcnode-id="4724" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4704"><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Movement_UK" title="European Movement UK"><span data-dcnode-id="4717" instrument_node="">European Movement UK</span></a><span data-dcnode-id="4715" instrument_node=""> is an organisation which campaigns in support of greater </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_integration" title="European integration"><span data-dcnode-id="4714" instrument_node="">European integration</span></a><span data-dcnode-id="4712" instrument_node=""> and for reform of the EU. It is part of the </span><a data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Movement_International" title="European Movement International"><span data-dcnode-id="4711" instrument_node="">European Movement International</span></a><span data-dcnode-id="4709" instrument_node="">, which pushes for a "democratic, federal, enlarged European Union".</span><sup class="reference" data-dcnode-id="4706" id="cite_ref-EM_61-0"><a data-dcnode-id="4707" href="#cite_note-EM-61"><span data-dcnode-id="4708" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4705" instrument_node="">
</span></p><p data-dcnode-id="4698"><span data-dcnode-id="4703" instrument_node="">Formed in 1949, it campaigned for Britain to remain in the EU in the 2016 referendum and continues to oppose Brexit in collaboration with other major pro-European campaign groups such as Open Britain and Britain for Europe.</span><sup class="reference" data-dcnode-id="4700" id="cite_ref-EM_61-1"><a data-dcnode-id="4701" href="#cite_note-EM-61"><span data-dcnode-id="4702" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4699" instrument_node="">
</span></p><span data-dcnode-id="4697" instrument_node="">
</span><h4 data-dcnode-id="4687"><span class="mw-headline" data-dcnode-id="4695" id="Healthier_IN_the_EU"><span data-dcnode-id="4696" instrument_node="">Healthier IN the EU</span></span><span class="mw-editsection" data-dcnode-id="4688"><span class="mw-editsection-bracket" data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">[</span></span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D19" title="Edit section: Healthier IN the EU"><span data-dcnode-id="4692" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4686" instrument_node="">
</span><p data-dcnode-id="4647"><a class="mw-redirect" data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Healthier_IN_the_EU" title="Healthier IN the EU"><span data-dcnode-id="4685" instrument_node="">Healthier IN the EU</span></a><span data-dcnode-id="4683" instrument_node=""> was co-founded in 2016 by </span><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Galsworthy" title="Mike Galsworthy"><span data-dcnode-id="4682" instrument_node="">Mike Galsworthy</span></a><span data-dcnode-id="4680" instrument_node="">, Rob Davidson,</span><sup class="reference" data-dcnode-id="4677" id="cite_ref-Guardian_280418_62-0"><a data-dcnode-id="4678" href="#cite_note-Guardian_280418-62"><span data-dcnode-id="4679" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4676" instrument_node=""> and </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_McKee" title="Martin McKee"><span data-dcnode-id="4675" instrument_node="">Martin McKee</span></a><span data-dcnode-id="4673" instrument_node="">. Its advisory board included former Chief Executive of the NHS in England </span><a class="mw-redirect" data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigel_Crisp" title="Nigel Crisp"><span data-dcnode-id="4672" instrument_node="">Nigel Crisp</span></a><span data-dcnode-id="4670" instrument_node="">, former Minister for Health </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Bowis" title="John Bowis"><span data-dcnode-id="4669" instrument_node="">John Bowis</span></a><span data-dcnode-id="4667" instrument_node="">, former Chief Medical Officer for Scotland </span><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Burns_%28doctor%29" title="Harry Burns (doctor)"><span data-dcnode-id="4666" instrument_node="">Harry Burns</span></a><span data-dcnode-id="4664" instrument_node="">, former President of the Royal College of Physicians </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ian_Gilmore" title="Ian Gilmore"><span data-dcnode-id="4663" instrument_node="">Ian Gilmore</span></a><span data-dcnode-id="4661" instrument_node="">, President of Royal College of Psychiatrists </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simon_Wessely" title="Simon Wessely"><span data-dcnode-id="4660" instrument_node="">Simon Wessely</span></a><span data-dcnode-id="4658" instrument_node="">, and the editor of The Lancet, </span><a data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Horton_%28editor%29" title="Richard Horton (editor)"><span data-dcnode-id="4657" instrument_node="">Richard Horton</span></a><span data-dcnode-id="4655" instrument_node="">. Healthier in the EU is a grassroots organization making the health case for continued EU membership.</span><sup class="reference" data-dcnode-id="4652" id="cite_ref-63"><a data-dcnode-id="4653" href="#cite_note-63"><span data-dcnode-id="4654" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="4649" id="cite_ref-Marsh_64-0"><a data-dcnode-id="4650" href="#cite_note-Marsh-64"><span data-dcnode-id="4651" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4648" instrument_node="">
</span></p><p data-dcnode-id="4622"><span data-dcnode-id="4646" instrument_node="">Shortly before the </span><a data-dcnode-id="4644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_United_Kingdom_general_election" title="2017 United Kingdom general election"><span data-dcnode-id="4645" instrument_node="">2017 general election</span></a><span data-dcnode-id="4643" instrument_node="">, Healthier IN the EU and </span><a class="new" data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVote_Leave_Watch%26action%3Dedit%26redlink%3D1" title="Vote Leave Watch (page does not exist)"><span data-dcnode-id="4642" instrument_node="">Vote Leave Watch</span></a><span data-dcnode-id="4640" instrument_node=""> organised an open letter calling on the </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="4639" instrument_node="">Conservative Party</span></a><span data-dcnode-id="4637" instrument_node=""> to commit to spending an extra £350m per week on the NHS after Brexit. The letter was signed by some of the UK's leading medical professionals.</span><sup class="reference" data-dcnode-id="4634" id="cite_ref-Indy20170517_65-0"><a data-dcnode-id="4635" href="#cite_note-Indy20170517-65"><span data-dcnode-id="4636" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4633" instrument_node=""> The amount of £350m per week corresponded to the savings attributable to Brexit claimed by the </span><a data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_Leave" title="Vote Leave"><span data-dcnode-id="4632" instrument_node="">Vote Leave</span></a><span data-dcnode-id="4630" instrument_node=""> campaign. Following the publication of the letter, foreign secretary </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="4629" instrument_node="">Boris Johnson</span></a><span data-dcnode-id="4627" instrument_node=""> received negative press coverage for falsely claiming that the pledge was already in the Conservative Party election manifesto.</span><sup class="reference" data-dcnode-id="4624" id="cite_ref-66"><a data-dcnode-id="4625" href="#cite_note-66"><span data-dcnode-id="4626" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4623" instrument_node="">
</span></p><p data-dcnode-id="4613"><span data-dcnode-id="4621" instrument_node="">Healthier IN the EU is a founding member of People's Vote.</span><sup class="reference" data-dcnode-id="4618" id="cite_ref-Mason_45-1"><a data-dcnode-id="4619" href="#cite_note-Mason-45"><span data-dcnode-id="4620" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4615" id="cite_ref-NS_300518_67-0"><a data-dcnode-id="4616" href="#cite_note-NS_300518-67"><span data-dcnode-id="4617" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4614" instrument_node="">
</span></p><span data-dcnode-id="4612" instrument_node="">
</span><h4 data-dcnode-id="4602"><span class="mw-headline" data-dcnode-id="4610" id="Wales_for_Europe"><span data-dcnode-id="4611" instrument_node="">Wales for Europe</span></span><span class="mw-editsection" data-dcnode-id="4603"><span class="mw-editsection-bracket" data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">[</span></span><a data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D20" title="Edit section: Wales for Europe"><span data-dcnode-id="4607" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4601" instrument_node="">
</span><p data-dcnode-id="4592"><span data-dcnode-id="4600" instrument_node="">Despite the name, Wales for Europe is a separate entity from Britain for Europe, and currently operates as a partner organisation to Open Britain. The chair is </span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geraint_Talfan_Davies" title="Geraint Talfan Davies"><span data-dcnode-id="4599" instrument_node="">Geraint Talfan Davies</span></a><span data-dcnode-id="4597" instrument_node="">. It currently employs a full-time director and part-time organiser based in Cardiff, and has 17 branches across Wales.</span><sup class="reference" data-dcnode-id="4594" id="cite_ref-68"><a data-dcnode-id="4595" href="#cite_note-68"><span data-dcnode-id="4596" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4593" instrument_node="">
</span></p><p data-dcnode-id="4583"><span data-dcnode-id="4591" instrument_node="">Wales for Europe is a founding member of People's Vote.</span><sup class="reference" data-dcnode-id="4588" id="cite_ref-Mason_45-2"><a data-dcnode-id="4589" href="#cite_note-Mason-45"><span data-dcnode-id="4590" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4585" id="cite_ref-NS_300518_67-1"><a data-dcnode-id="4586" href="#cite_note-NS_300518-67"><span data-dcnode-id="4587" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4584" instrument_node="">
</span></p><span data-dcnode-id="4582" instrument_node="">
</span><h4 data-dcnode-id="4572"><span class="mw-headline" data-dcnode-id="4580" id="Our_Future_Our_Choice"><span data-dcnode-id="4581" instrument_node="">Our Future Our Choice</span></span><span class="mw-editsection" data-dcnode-id="4573"><span class="mw-editsection-bracket" data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">[</span></span><a data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D21" title="Edit section: Our Future Our Choice"><span data-dcnode-id="4577" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4571" instrument_node="">
</span><p data-dcnode-id="4549"><a data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Our_Future_Our_Choice" title="Our Future Our Choice"><span data-dcnode-id="4570" instrument_node="">Our Future Our Choice</span></a><span data-dcnode-id="4568" instrument_node=""> (OFOC) was incorporated as a company on 19 February 2018</span><sup class="reference" data-dcnode-id="4565" id="cite_ref-C_Check_69-0"><a data-dcnode-id="4566" href="#cite_note-C_Check-69"><span data-dcnode-id="4567" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4564" instrument_node=""> and is aimed towards young adults.</span><sup class="reference" data-dcnode-id="4561" id="cite_ref-Ind_140218_70-0"><a data-dcnode-id="4562" href="#cite_note-Ind_140218-70"><span data-dcnode-id="4563" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="4558" id="cite_ref-Metro_160218_71-0"><a data-dcnode-id="4559" href="#cite_note-Metro_160218-71"><span data-dcnode-id="4560" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4557" instrument_node=""> Its four founding members are </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Femi_Oluwole" title="Femi Oluwole"><span data-dcnode-id="4556" instrument_node="">Femi Oluwole</span></a><span data-dcnode-id="4554" instrument_node=""> (spokesman), Calum Millbank-Murphy (spokesman), Lara Spirit (co-president) and Will Dry (co-president).</span><sup class="reference" data-dcnode-id="4551" id="cite_ref-About_72-0"><a data-dcnode-id="4552" href="#cite_note-About-72"><span data-dcnode-id="4553" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4550" instrument_node="">
</span></p><p data-dcnode-id="4543"><span data-dcnode-id="4548" instrument_node="">Our Future Our Choice is a founding member of People's Vote.</span><sup class="reference" data-dcnode-id="4545" id="cite_ref-NS_300518_67-2"><a data-dcnode-id="4546" href="#cite_note-NS_300518-67"><span data-dcnode-id="4547" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4544" instrument_node="">
</span></p><span data-dcnode-id="4542" instrument_node="">
</span><h4 data-dcnode-id="4532"><span class="mw-headline" data-dcnode-id="4540" id="Scientists_for_EU"><span data-dcnode-id="4541" instrument_node="">Scientists for EU</span></span><span class="mw-editsection" data-dcnode-id="4533"><span class="mw-editsection-bracket" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">[</span></span><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D22" title="Edit section: Scientists for EU"><span data-dcnode-id="4537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4503"><a class="mw-redirect" data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientists_for_EU" title="Scientists for EU"><span data-dcnode-id="4530" instrument_node="">Scientists for EU</span></a><span data-dcnode-id="4528" instrument_node=""> is a pro-EU research advocacy group. It was co-founded by scientists </span><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Galsworthy" title="Mike Galsworthy"><span data-dcnode-id="4527" instrument_node="">Mike Galsworthy</span></a><span data-dcnode-id="4525" instrument_node=""> and Rob Davison on 8 May 2015, the day after the </span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_United_Kingdom_general_election" title="2015 United Kingdom general election"><span data-dcnode-id="4524" instrument_node="">UK general election 2015</span></a><span data-dcnode-id="4522" instrument_node="">.</span><sup class="reference" data-dcnode-id="4519" id="cite_ref-73"><a data-dcnode-id="4520" href="#cite_note-73"><span data-dcnode-id="4521" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4516" id="cite_ref-CW_74-0"><a data-dcnode-id="4517" href="#cite_note-CW-74"><span data-dcnode-id="4518" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4515" instrument_node=""> Its advisory board included high-profile UK scientists, including former EU chief scientific advisor </span><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anne_Glover_%28biologist%29" title="Anne Glover (biologist)"><span data-dcnode-id="4514" instrument_node="">Anne Glover</span></a><span data-dcnode-id="4512" instrument_node="">, and MPs from different political parties.</span><sup class="reference" data-dcn
