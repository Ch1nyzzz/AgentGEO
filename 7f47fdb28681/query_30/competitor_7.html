ode-id="4509" id="cite_ref-CW_74-1"><a data-dcnode-id="4510" href="#cite_note-CW-74"><span data-dcnode-id="4511" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4508" instrument_node=""> Galsworthy articulated two concerns that Scientists for EU aimed to address: "first, a lack of clarity and cohesion within the community on EU benefits and Brexit risks; and, secondly, a lack of public understanding on the UK/EU relationship in science."</span><sup class="reference" data-dcnode-id="4505" id="cite_ref-Hansard_010316_75-0"><a data-dcnode-id="4506" href="#cite_note-Hansard_010316-75"><span data-dcnode-id="4507" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4504" instrument_node="">
</span></p><p data-dcnode-id="4490"><span data-dcnode-id="4502" instrument_node="">Following the referendum, hundreds of scientists contacted Scientists for EU voicing concerns about the future of scientific research in the UK after Brexit, many saying they planned to leave the UK; for some, xenophobia was a significant concern.</span><sup class="reference" data-dcnode-id="4499" id="cite_ref-FT20160809_76-0"><a data-dcnode-id="4500" href="#cite_note-FT20160809-76"><span data-dcnode-id="4501" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="4496" id="cite_ref-77"><a data-dcnode-id="4497" href="#cite_note-77"><span data-dcnode-id="4498" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4495" instrument_node=""> Programme Director Galsworthy concluded, "It is clear that the UK has overnight become less attractive as a place to do science."</span><sup class="reference" data-dcnode-id="4492" id="cite_ref-FT20160809_76-1"><a data-dcnode-id="4493" href="#cite_note-FT20160809-76"><span data-dcnode-id="4494" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4491" instrument_node="">
</span></p><p data-dcnode-id="4481"><span data-dcnode-id="4489" instrument_node="">Scientists for EU has continued to publicize the benefits of EU membership for Britain and the negative consequences of </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brexit" title="Brexit"><span data-dcnode-id="4488" instrument_node="">Brexit</span></a><span data-dcnode-id="4486" instrument_node=""> for science and healthcare, including uncertainty over immigration and funding, and the loss of influence over EU regulations and policy.</span><sup class="reference" data-dcnode-id="4483" id="cite_ref-78"><a data-dcnode-id="4484" href="#cite_note-78"><span data-dcnode-id="4485" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4482" instrument_node="">
</span></p><p data-dcnode-id="4466"><span data-dcnode-id="4480" instrument_node="">In February 2018 </span><a data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Soros" title="George Soros"><span data-dcnode-id="4479" instrument_node="">George Soros</span></a><span data-dcnode-id="4477" instrument_node="">'s </span><a data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Society_Foundations" title="Open Society Foundations"><span data-dcnode-id="4476" instrument_node="">Open Society Foundations</span></a><span data-dcnode-id="4474" instrument_node=""> donated £500,000 to a number of groups opposing Brexit including £35,000 to Scientists for EU.</span><sup class="reference" data-dcnode-id="4471" id="cite_ref-ft.com_79-0"><a data-dcnode-id="4472" href="#cite_note-ft.com-79"><span data-dcnode-id="4473" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="4468" id="cite_ref-80"><a data-dcnode-id="4469" href="#cite_note-80"><span data-dcnode-id="4470" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4467" instrument_node="">
</span></p><p data-dcnode-id="4460"><span data-dcnode-id="4465" instrument_node="">Scientists for EU is a founding member of People's Vote.</span><sup class="reference" data-dcnode-id="4462" id="cite_ref-NS_300518_67-3"><a data-dcnode-id="4463" href="#cite_note-NS_300518-67"><span data-dcnode-id="4464" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4461" instrument_node="">
</span></p><span data-dcnode-id="4459" instrument_node="">
</span><h2 data-dcnode-id="4449"><span class="mw-headline" data-dcnode-id="4457" id="Other_groups"><span data-dcnode-id="4458" instrument_node="">Other groups</span></span><span class="mw-editsection" data-dcnode-id="4450"><span class="mw-editsection-bracket" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">[</span></span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D23" title="Edit section: Other groups"><span data-dcnode-id="4454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4448" instrument_node="">
</span><h3 data-dcnode-id="4438"><span class="mw-headline" data-dcnode-id="4446" id="Right_to_Vote"><span data-dcnode-id="4447" instrument_node="">Right to Vote</span></span><span class="mw-editsection" data-dcnode-id="4439"><span class="mw-editsection-bracket" data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">[</span></span><a data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D24" title="Edit section: Right to Vote"><span data-dcnode-id="4443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4437" instrument_node="">
</span><p data-dcnode-id="4411"><a data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_Vote" title="Right to Vote"><span data-dcnode-id="4436" instrument_node="">Right to Vote</span></a><span data-dcnode-id="4434" instrument_node=""> is a group of </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="4433" instrument_node="">Conservative</span></a><span data-dcnode-id="4431" instrument_node="">, </span><a data-dcnode-id="4429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Change_UK" title="Change UK"><span data-dcnode-id="4430" instrument_node="">Change UK</span></a><span data-dcnode-id="4428" instrument_node=""> and </span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independent_politician" title="Independent politician"><span data-dcnode-id="4427" instrument_node="">Independent</span></a><span data-dcnode-id="4425" instrument_node=""> MPs and Peers who advocate holding a referendum on the Brexit withdrawal agreement. It was founded after the UK government lost the </span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_votes_on_Brexit%23First_%2522meaningful_vote%2522_%2815_January_2019%29" title="Parliamentary votes on Brexit"><span data-dcnode-id="4424" instrument_node="">first parliamentary vote</span></a><span data-dcnode-id="4422" instrument_node=""> on the UK's </span><a class="mw-redirect" data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withdrawal_agreement" title="Withdrawal agreement"><span data-dcnode-id="4421" instrument_node="">withdrawal agreement</span></a><span data-dcnode-id="4419" instrument_node=""> with the EU.</span><sup class="reference" data-dcnode-id="4416" id="cite_ref-81"><a data-dcnode-id="4417" href="#cite_note-81"><span data-dcnode-id="4418" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="4413" id="cite_ref-82"><a data-dcnode-id="4414" href="#cite_note-82"><span data-dcnode-id="4415" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4412" instrument_node="">
</span></p><span data-dcnode-id="4410" instrument_node="">
</span><h3 data-dcnode-id="4400"><span class="mw-headline" data-dcnode-id="4408" id="Wooferendum"><span data-dcnode-id="4409" instrument_node="">Wooferendum</span></span><span class="mw-editsection" data-dcnode-id="4401"><span class="mw-editsection-bracket" data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">[</span></span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D25" title="Edit section: Wooferendum"><span data-dcnode-id="4405" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4383"><b data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">Wooferendum</span></b><span data-dcnode-id="4396" instrument_node=""> was founded in August 2018 by Daniel Elkan.</span><sup class="reference" data-dcnode-id="4393" id="cite_ref-83"><a data-dcnode-id="4394" href="#cite_note-83"><span data-dcnode-id="4395" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4392" instrument_node=""> The group is concerned with the welfare of pets when the UK leaves the European Union.</span><sup class="reference" data-dcnode-id="4389" id="cite_ref-84"><a data-dcnode-id="4390" href="#cite_note-84"><span data-dcnode-id="4391" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4388" instrument_node=""> The protesters and their pets of Wooferendum also joined the People's Vote march.</span><sup class="reference" data-dcnode-id="4385" id="cite_ref-85"><a data-dcnode-id="4386" href="#cite_note-85"><span data-dcnode-id="4387" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4384" instrument_node="">
</span></p><span data-dcnode-id="4382" instrument_node="">
</span><h2 data-dcnode-id="4372"><span class="mw-headline" data-dcnode-id="4380" id="Other_events"><span data-dcnode-id="4381" instrument_node="">Other events</span></span><span class="mw-editsection" data-dcnode-id="4373"><span class="mw-editsection-bracket" data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">[</span></span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D26" title="Edit section: Other events"><span data-dcnode-id="4377" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4371" instrument_node="">
</span><h3 data-dcnode-id="4361"><span class="mw-headline" data-dcnode-id="4369" id="Viral_petition_to_revoke_Article_50"><span data-dcnode-id="4370" instrument_node="">Viral petition to revoke Article 50</span></span><span class="mw-editsection" data-dcnode-id="4362"><span class="mw-editsection-bracket" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">[</span></span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D27" title="Edit section: Viral petition to revoke Article 50"><span data-dcnode-id="4366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4314"><span data-dcnode-id="4359" instrument_node="">In March 2019, </span><a data-dcnode-id="4357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revoke_Article_50_and_remain_in_the_EU_petition" title="Revoke Article 50 and remain in the EU petition"><span data-dcnode-id="4358" instrument_node="">an e-petition</span></a><span data-dcnode-id="4356" instrument_node=""> launched on the </span><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Parliament_petitions_website" title="UK Parliament petitions website"><span data-dcnode-id="4355" instrument_node="">UK Parliament petitions website</span></a><span data-dcnode-id="4353" instrument_node=""> reached over 6 million signatures within a week, becoming the largest petition in UK history, and the fastest-growing.</span><sup class="reference" data-dcnode-id="4350" id="cite_ref-86"><a data-dcnode-id="4351" href="#cite_note-86"><span data-dcnode-id="4352" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="4347" id="cite_ref-87"><a data-dcnode-id="4348" href="#cite_note-87"><span data-dcnode-id="4349" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4346" instrument_node=""> This surge in signatures has been attributed to a speech given by </span><a data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theresa_May" title="Theresa May"><span data-dcnode-id="4345" instrument_node="">Theresa May</span></a><span data-dcnode-id="4343" instrument_node=""> which was perceived to accuse </span><a class="mw-redirect" data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Members_of_Parliament" title="Members of Parliament"><span data-dcnode-id="4342" instrument_node="">MPs</span></a><span data-dcnode-id="4340" instrument_node=""> of 'frustrating' Brexit.</span><sup class="reference" data-dcnode-id="4337" id="cite_ref-88"><a data-dcnode-id="4338" href="#cite_note-88"><span data-dcnode-id="4339" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4336" instrument_node=""> The petition was later referenced by </span><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Tusk" title="Donald Tusk"><span data-dcnode-id="4335" instrument_node="">Donald Tusk</span></a><span data-dcnode-id="4333" instrument_node="">, the </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_European_Council" title="President of the European Council"><span data-dcnode-id="4332" instrument_node="">President of the European Council</span></a><span data-dcnode-id="4330" instrument_node="">, who warned that the </span><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_May_ministry" title="Second May ministry"><span data-dcnode-id="4329" instrument_node="">UK Government</span></a><span data-dcnode-id="4327" instrument_node=""> "cannot betray the six million people".</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-89"><a data-dcnode-id="4325" href="#cite_note-89"><span data-dcnode-id="4326" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4323" instrument_node="">  The petition was debated in Parliament on 1 April 2019.</span><sup class="reference" data-dcnode-id="4320" id="cite_ref-90"><a data-dcnode-id="4321" href="#cite_note-90"><span data-dcnode-id="4322" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4319" instrument_node="">  The petition signatures reached 6,103,056 by 20 August, the closure date.</span><sup class="reference" data-dcnode-id="4316" id="cite_ref-91"><a data-dcnode-id="4317" href="#cite_note-91"><span data-dcnode-id="4318" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4315" instrument_node="">
</span></p><span data-dcnode-id="4313" instrument_node="">
</span><h3 data-dcnode-id="4302"><span data-dcnode-id="4312" id="Postcards_from_the_48.25"></span><span class="mw-headline" data-dcnode-id="4310" id="Postcards_from_the_48%"><span data-dcnode-id="4311" instrument_node="">Postcards from the 48%</span></span><span class="mw-editsection" data-dcnode-id="4303"><span class="mw-editsection-bracket" data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">[</span></span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOpposition_to_Brexit%26action%3Dedit%26section%3D28" title="Edit section: Postcards from the 48%"><span data-dcnode-id="4307" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4300" instrument_node="">David Wilkinson's full-length film </span><i data-dcnode-id="4297"><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postcards_from_the_48%2525" title="Postcards from the 48%"><span data-dcnode-id="4299" instrument_node="">Postcards from the 48%</span></a></i><span data-dcnode-id="4296" instrument_node=""> opened on 23 June 2018 at the </span><a data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edinburgh_International_Film_Festival" title="Edinburgh International Film Festival"><span data-dcnode-id="4295" instrument_node="">Edinburgh International Film Festival</span></a><span data-dcnode-id="4293" instrument_node=""> and went on general release on 6 July 2018.</span><sup class="reference" data-dcnode-id="4290" id="cite_ref-Postcards_92-0"><a data-dcnode-id="4291" href="#cite_note-Postcards-92"><span data-dcnode-id="4292" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="4287" id="cite_ref-93"><a data-dcnode-id="4288" href="#cite_note-93"><span data-dcnode-id="4289" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4286" instrument_node=""> The documentary was made by, and featured, members of the 48% of voters who chose Remain in the referendum.</span><sup class="reference" data-dcnode-id="4283" id="cite_ref-94"><a data-dcnode-id="4284" href="#cite_note-94"><span data-dcnode-id="4285" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4282" instrument_node=""> A reviewer for </span><i data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">The Times</span></i><span data-dcnode-id="4279" instrument_node=""> wrote that it "gives voice to the fears and the hopes of the nation's discontented remainers".</span><sup class="reference" data-dcnode-id="4276" id="cite_ref-95"><a data-dcnode-id="4277" href="#cite_note-95"><span data-dcnode-id="4278" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4275" instrument_node="">
