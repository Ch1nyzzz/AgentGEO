cbzB7nwCpOFS582wFfq2Pdt4vx-i03TOXKBokM2mmFIB~267EPyIEmRa2XarL4UH2TbhKbYokXf4zCeaze-nx65lI0JsNEueAd7Rl9FrHrbKUkmRCMcns~WHZ8eS-VBarJEfZHbo9fAOtJK0ISD92DBn1taZnftpWnaHmNjGw7QKkMSgCvnWIqm-6g__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655112%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9273" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9267"><p class="chapter-para" data-dcnode-id="9268"><span data-dcnode-id="9269" instrument_node="">Perceived risks of leaving the EU.</span></p></div></div><div class="fig fig-modal reveal-modal" content-id="gsx005-F5" data-dcnode-id="9253" style="display: block;"><div class="label fig-label" data-dcnode-id="9264"><span data-dcnode-id="9265" instrument_node="">Figure 5</span></div><div class="graphic-wrap" data-dcnode-id="9257"><img alt="Perceived risks of leaving the EU." class="content-image" data-dcnode-id="9263" data-path-from-xml="gsx005f5.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f5.jpeg%3FExpires%3D1654213257%26Signature%3DYwQbo33GYZra88ouuars-UNxbnlGtyqiWfgz687wvdwZiPkTKGgBES19aXzcEpvE1g5woMp3vqyuhk-wXcuihmvNWrSrFMtQggQ3MdCwn-LFcsQrBpWRb2g-La977pCnEuje~N6rxlDFRcr5Yu0lRlAiAfGIgHMWRmrNYWY1AqXZPsWF~m47ceQkQ99qLd1lThhRTeb3AWw3i1zOl9EMAA5SzD4fUcUWYvTOpG9c9KRLfgueaQVB5YXxx8~PAyhLd~0U9BcyGynQwDTczufQhzVNRizuVusX52wNSuBpcNrQlBcN6a3lbJDyWL7aBo3ONzGWV1Hx7jjXl2yPGZ3jPg__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="9258"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="9261" data-google-interstitial="false" data-path-from-xml="gsx005f5.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655112/gsx005f5.tif" target="_blank"><span data-dcnode-id="9262" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9259" data-google-interstitial="false" data-path-from-xml="gsx005f5.tif" data-section="89655112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f5.jpeg%3FExpires%3D1654213257%26Signature%3DL8g~bfn1s4RKQnAwD8fBL38IIkYV-PCmY~EjoFEjfClEaBueKHS1F5nMUF1XgTQmw5c7Jy3f3WQLWKHU4T5kM-qbECUvXjCFdKWzcT5CX4rEZo6UpwHeJSa0VbfBI33s-4h3KGA39H3XCCNBVky1iZa57ugIcbzB7nwCpOFS582wFfq2Pdt4vx-i03TOXKBokM2mmFIB~267EPyIEmRa2XarL4UH2TbhKbYokXf4zCeaze-nx65lI0JsNEueAd7Rl9FrHrbKUkmRCMcns~WHZ8eS-VBarJEfZHbo9fAOtJK0ISD92DBn1taZnftpWnaHmNjGw7QKkMSgCvnWIqm-6g__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655112%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9260" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9254"><p class="chapter-para" data-dcnode-id="9255"><span data-dcnode-id="9256" instrument_node="">Perceived risks of leaving the EU.</span></p></div></div><p class="chapter-para" data-dcnode-id="9248"><span data-dcnode-id="9252" instrument_node="">The community aspect of attitudes to membership was measured by a question which asked respondents if they felt ‘British’, ‘English’, ‘Scottish’, ‘Welsh’, ‘European’, or some other nationality. Forty-eight per cent described themselves as ‘British’ with 33 per cent describing themselves as ‘English’, 6 per cent as Scottish and 3 per cent as ‘Welsh’. Only 3.5 per cent described themselves as ‘European’ with a further 6 per cent choosing another national identity or saying they ‘didn’t know’. The expectation is that national identities will influence the vote. Compared with those identifying themselves as British, we expect those thinking of themselves as English or Welsh will be less favourable towards EU membership whereas those identifying themselves as European of Scottish will be more favourable. This is because the former identities (English, Welsh) are narrower than a more inclusive identity of being ‘British’ or, </span><em data-dcnode-id="9250"><span data-dcnode-id="9251" instrument_node="">a fortiori</span></em><span data-dcnode-id="9249" instrument_node="">, ‘European’. However, in the case of Scotland, the recent upsurge of nationalism suggests that many of those espousing a Scottish identity see EU membership as an attractive alternative to staying in the UK.</span></p><p class="chapter-para" data-dcnode-id="9236"><span data-dcnode-id="9247" instrument_node="">The impact of cues on referendum voting was investigated by asking respondents to rate several prominent politicians using 11-point (0–10) ‘likeability’ scales, where zero means ‘strongly dislike’ and ten means ‘strongly like’. These scales have proved very useful in summarizing important leader image traits, such as competence, honesty, responsiveness and trustworthiness (</span><span class="xrefLink" data-dcnode-id="9246" id="jumplink-gsx005-B9"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9241" data-google-interstitial="false" data-open="gsx005-B9" href="javascript:;" reveal-id="gsx005-B9"><span data-dcnode-id="9245" instrument_node="">Clarke </span><em data-dcnode-id="9243"><span data-dcnode-id="9244" instrument_node="">et al</span></em><span data-dcnode-id="9242" instrument_node="">. 2009</span></a><span data-dcnode-id="9240" instrument_node="">; Whiteley </span><em data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">et al</span></em><span data-dcnode-id="9237" instrument_node="">., 2013). The hypothesis is that respondents will be more responsive to cues provided by leaders they like rather than those they dislike. Given the positions taken by key leaders in the referendum we would expect that positive feelings about David Cameron or Jeremy Corbyn would encourage individuals to vote to remain, whereas positive impressions of Boris Johnson or Nigel Farage would encourage them to vote to leave.</span></p><p class="chapter-para" data-dcnode-id="9234"><span data-dcnode-id="9235" instrument_node="">Other possible cues came from the political parties and also from the Remain and Leave campaigns. The divisions in the Labour and Conservative parties suggest that cues from them might be largely ineffective in influencing the vote because they were sending mixed messages in the Conservative case and weak messages in the Labour case. In contrast, cues from the SNP, Liberal Democrats and UKIP were quite clear and so attachments to these parties might well have influenced the vote. These possibilities are tested by including measures of voters’ partisan attachments in the analyses. In addition, three other predictor variables were specified. Two of these variables measure contact with the Leave and Remain campaigns. The expectation is that people exposed to a campaign would be more likely to vote for that option. A third predictor measures the perceived importance of ‘Europe’ as an issue. Over the years ‘Europe’ has become a codeword for Euroscepticism and, accordingly, designating Europe as an important issue can be taken as a useful proxy of the salience of Eurosceptic sentiments that could prompt Leave voting.</span></p><p class="chapter-para" data-dcnode-id="9228"><span data-dcnode-id="9233" instrument_node="">Finally, we consider the possible effects of four socio-demographic variables. During the campaign numerous polls showed large differences in support for/opposition to EU membership across age groups, with older people indicating that they were more likely to endorse Brexit than were younger people. Similarly, echoing previous research on attitudes towards the EU (</span><span class="xrefLink" data-dcnode-id="9232" id="jumplink-gsx005-B13"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9230" data-google-interstitial="false" data-open="gsx005-B13" href="javascript:;" reveal-id="gsx005-B13"><span data-dcnode-id="9231" instrument_node="">Ford and Goodwin, 2014</span></a><span data-dcnode-id="9229" instrument_node="">), many polls revealed that less well-educated people and those in lower social classes were more likely to be Leave supporters. In contrast, relatively little was said about gender differences in attitudes toward the EU. The effects of these four variables (age, education, gender and social class) are assessed by including them in the multivariate analyses.</span></p><div class="block-child-p" data-dcnode-id="7437"><span data-dcnode-id="9227" instrument_node="">We begin by estimating the direct effects on referendum voting of the several predictor variables discussed above. Since the dependent variable is a dichotomy (vote Leave = 1, vote Remain =0), model parameters are estimated using binomial logit procedures (</span><span class="xrefLink" data-dcnode-id="9226" id="jumplink-gsx005-B36"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9224" data-google-interstitial="false" data-open="gsx005-B36" href="javascript:;" reveal-id="gsx005-B36"><span data-dcnode-id="9225" instrument_node="">Long and Freese, 2014</span></a><span data-dcnode-id="9223" instrument_node="">). In equation form, the model is: </span><div class="formula-wrap" data-dcnode-id="8661"><div class="disp-formula" content-id="E1" data-dcnode-id="8664" id="E1"><span class="mathFormula" data-dcnode-id="9222"></span><div class="math" data-dcnode-id="8665"><span class="MathJax_Preview" data-dcnode-id="9221" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="8668" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mtable xmlns=&quot;&quot;><mtr><mtd><mtable><mtr columnalign=&quot;left&quot;><mtd columnalign=&quot;left&quot;><mrow><mtext>logit</mtext><mrow><mo stretchy=&quot;false&quot;>(</mo><mrow><mi mathvariant=&quot;normal&quot;>E</mi><mrow><mo stretchy=&quot;false&quot;>[</mo><mrow><mtext>Vote</mtext></mrow><mo stretchy=&quot;false&quot;>]</mo></mrow></mrow><mo stretchy=&quot;false&quot;>)</mo></mrow><mo>=</mo></mrow></mtd><mtd columnalign=&quot;left&quot;><mrow><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>0</mn></msub><mo>+</mo><msub><mrow><mi mathvariant=&quot;normal&quot;>B</mi></mrow><mn>1</mn></msub><mo>*</mo><mtext>Fecinf</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>2</mn></msub><mo>*</mo><mtext>Fimter</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>3</mn></msub><mo>*</mo><mtext>Emreac</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>4</mn></msub><mo>*</mo><mtext>Euiss</mtext><mo>&amp;#x2009;+</mo></mrow></mtd></mtr><mtr columnalign=&quot;left&quot;><mtd columnalign=&quot;left&quot; /><mtd columnalign=&quot;left&quot;><mrow><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>5</mn></msub><mo>&amp;#x2013;</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>8</mn></msub><mo>*</mo><mtext>Leader</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mn>9</mn></msub><mo>&amp;#x2013;</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>14</mn></mrow></msub><mo>*</mo><mtext>Partyid</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>15</mn></mrow></msub><mo>&amp;#x2013;</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>19</mn></mrow></msub><mo>*</mo><mtext>Natid</mtext><mo>&amp;#x2009;&amp;#x2009;+</mo></mrow></mtd></mtr><mtr columnalign=&quot;left&quot;><mtd columnalign=&quot;left&quot; /><mtd columnalign=&quot;left&quot;><mrow><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>2</mn><mn>0</mn></mrow></msub><mo>&amp;#x2013;</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>21</mn></mrow></msub><mo>*</mo><mtext>Ccamp</mtext><mo>+</mo><msub><mi mathvariant=&quot;normal&quot;>B</mi><mrow><mn>22</mn></m 504" instrument_node="">R</span></em><sup data-dcnode-id="7501"><span data-dcnode-id="7502" instrument_node="">2</span></sup><span data-dcnode-id="7500" instrument_node=""> =0 .90</span></p></span></div><span data-dcnode-id="7496" id="fn-tblfn2"></span><div class="footnote" content-id="tblfn2" data-dcnode-id="7492"><span class="fn" data-dcnode-id="7493"><p class="chapter-para" data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node=""> Percentage voters correctly classified = 93.2</span></p></span></div><span data-dcnode-id="7491" id="fn-tblfn3"></span><div class="footnote" content-id="tblfn3" data-dcnode-id="7487"><span class="fn" data-dcnode-id="7488"><p class="chapter-para" data-dcnode-id="7489"><span data-dcnode-id="7490" instrument_node=""> Percentage reduction in classification error (Lambda) = 86.2% </span></p></span></div><span data-dcnode-id="7486" id="fn-tblfn4"></span><div class="footnote" content-id="tblfn4" data-dcnode-id="7482"><span class="fn" data-dcnode-id="7483"><p class="chapter-para" data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">N = 1736</span></p></span></div><span data-dcnode-id="7481" id="fn-tblfn5"></span><div class="footnote" content-id="tblfn5" data-dcnode-id="7474"><span class="fn" data-dcnode-id="7475"><span class="label fn-label" data-dcnode-id="7478"><span class="end-note-link" data-dcnode-id="7479" data-fn-id="tblfn5" rel="nofollow"><span data-dcnode-id="7480" instrument_node="">***</span></span></span><p class="chapter-para" data-dcnode-id="7476"><span data-dcnode-id="7477" instrument_node="">p ≤ 0.001;</span></p></span></div><span data-dcnode-id="7473" id="fn-tblfn6"></span><div class="footnote" content-id="tblfn6" data-dcnode-id="7466"><span class="fn" data-dcnode-id="7467"><span class="label fn-label" data-dcnode-id="7470"><span class="end-note-link" data-dcnode-id="7471" data-fn-id="tblfn6" rel="nofollow"><span data-dcnode-id="7472" instrument_node="">**</span></span></span><p class="chapter-para" data-dcnode-id="7468"><span data-dcnode-id="7469" instrument_node="">p ≤ 0.01;</span></p></span></div><span data-dcnode-id="7465" id="fn-tblfn7"></span><div class="footnote" content-id="tblfn7" data-dcnode-id="7458"><span class="fn" data-dcnode-id="7459"><span class="label fn-label" data-dcnode-id="7462"><span class="end-note-link" data-dcnode-id="7463" data-fn-id="tblfn7" rel="nofollow"><span data-dcnode-id="7464" instrument_node="">*</span></span></span><p class="chapter-para" data-dcnode-id="7460"><span data-dcnode-id="7461" instrument_node="">p ≤ 0.05,</span></p></span></div><span data-dcnode-id="7457" id="fn-tblfn8"></span><div class="footnote" content-id="tblfn8" data-dcnode-id="7450"><span class="fn" data-dcnode-id="7451"><span class="label fn-label" data-dcnode-id="7454"><span class="end-note-link" data-dcnode-id="7455" data-fn-id="tblfn8" rel="nofollow"><span data-dcnode-id="7456" instrument_node="">†</span></span></span><p class="chapter-para" data-dcnode-id="7452"><span data-dcnode-id="7453" instrument_node="">p ≤ 0.10, one-tailed test.</span></p></span></div><span data-dcnode-id="7449" id="fn-tblfn9"></span><div class="footnote" content-id="tblfn9" data-dcnode-id="7443"><span class="fn" data-dcnode-id="7444"><p class="chapter-para" data-dcnode-id="7445"><em data-dcnode-id="7447"><span data-dcnode-id="7448" instrument_node="">Note</span></em><span data-dcnode-id="7446" instrument_node="">: Dependent variable is scored: vote Leave = 1, vote Remain = 0.</span></p></span></div></div><div class="graphic-wrap hide" data-dcnode-id="7439"><a class="fig-view-orig openInAnotherWindow btn js-view-large" data-dcnode-id="7440" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/" target="_blank"><span data-dcnode-id="7441" instrument_node="">
          Open in new tab
        </span></a></div></div></div><p class="chapter-para" data-dcnode-id="7430"><span data-dcnode-id="7436" instrument_node="">Overall, the model fits the data very well, with a McKelvey </span><em data-dcnode-id="7434"><span data-dcnode-id="7435" instrument_node="">R</span></em><sup data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">2</span></sup><span data-dcnode-id="7431" instrument_node=""> of 0.90. Over 93 per cent of voters are correctly classified by the analysis—this represents an 86.2 per cent reduction in prediction error. These summary statistics testify that the model provides a strong statistical explanation of the referendum decisions our survey respondents made.</span></p><p class="chapter-para" data-dcnode-id="7424"><span data-dcnode-id="7429" instrument_node="">Both the economic-influence and immigration-terrorism benefit-cost factors played very significant roles in explaining the vote to leave. </span><span class="xrefLink" data-dcnode-id="7428" id="jumplink-gsx005-T1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7426" data-google-interstitial="false" data-open="gsx005-T1" href="javascript:;" reveal-id="gsx005-T1"><span data-dcnode-id="7427" instrument_node="">Table 1</span></a><span data-dcnode-id="7425" instrument_node=""> shows that respondents who were optimistic about the economy and Britain’s role in the world if the country were to exit the EU were much more likely to vote Leave (p &lt; 0.001). Similarly, those who believed that that Britain would be better able to control immigration and counter terrorist threats if it were not part of the EU were more likely to vote Leave (p &lt; 0.01). As also expected, perceptions of risks associated with leaving the EU have a highly significant impact (p &lt; 0.001) on referendum voting—respondents who thought that Brexit was risky were much less likely to opt to leave than those who minimized the risks. Emotional reactions to the EU were significant (p &lt; 0.001) as well; as expected, positive reactions to the EU stimulated a vote to remain, whereas negative emotions promoted a leave vote. In addition, and again as expected, those who designated the EU as an important issue were more likely to vote to leave (p &lt; 0.05).</span></p><p class="chapter-para" data-dcnode-id="7418"><span data-dcnode-id="7423" instrument_node="">The national identity measures are not statistically significant with the sole exception of Scottish identification; those who identified themselves as Scottish were less likely to vote to leave than were those who identified themselves as British (</span><span class="xrefLink" data-dcnode-id="7422" id="jumplink-gsx005-T1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7420" data-google-interstitial="false" data-open="gsx005-T1" href="javascript:;" reveal-id="gsx005-T1"><span data-dcnode-id="7421" instrument_node="">Table 1</span></a><span data-dcnode-id="7419" instrument_node="">). Equally, socio-demographic characteristics had no direct effects apart from a very modest tendency (p &lt; 0.10) for individuals in higher socio-economic grades to vote for remain. The cues variables indicated that party cues were largely irrelevant with the exception of a negative effect associated with Conservative partisanship, indicating that Conservative identifiers were more likely to vote to remain, other things being equal. Leader images were another story. Although feelings about the David Cameron and Jeremy Corbyn were not influential, feelings about Boris Johnson and Nigel Farage had highly significant effects (p &lt; 0.001). Controlling for the influence of all other predictors, positive images of the leaders of the Leave campaign significantly enhanced the likelihood of voting to exit the EU.</span></p><p class="chapter-para" data-dcnode-id="7412"><span data-dcnode-id="7417" instrument_node="">Next, we assess the explanatory power of various statistically significant (p ≤ 0.05) predictors. Since the binomial logit model of referendum voting has a nonlinear functional form, interpretation of the strength of predictor variables is not straightforward (</span><span class="xrefLink" data-dcnode-id="7416" id="jumplink-gsx005-B36"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7414" data-google-interstitial="false" data-open="gsx005-B36" href="javascript:;" reveal-id="gsx005-B36"><span data-dcnode-id="7415" instrument_node="">Long and Freese, 2014</span></a><span data-dcnode-id="7413" instrument_node="">). To provide intuition, we assess the impact of a continuous predictor variable by computing the probability of voting Leave for a respondent whose score on a given predictor places that person at the top 10 per cent of the distribution on that variable, while holding all other predictors constant at their mean values. Next, we compute the probability for a voter whose score on the variable places that individual at the bottom 10 per cent. We then take the difference. For the two significant dichotomous predictors (Conservative party identification, Scottish identity), we compute the difference in the probability of voting Leave for respondents with scores of 0 and 1 on these variables. Other categories of party identification and national identity are set at 0 for these computations and continuous predictors are again set at their mean values.</span></p><p class="chapter-para" data-dcnode-id="7407"><span class="xrefLink" data-dcnode-id="7411" id="jumplink-gsx005-F6"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7409" data-google-interstitial="false" data-open="gsx005-F6" href="javascript:;" reveal-id="gsx005-F6"><span data-dcnode-id="7410" instrument_node="">Figure 6</span></a><span data-dcnode-id="7408" instrument_node=""> documents that the economics-international influence predictor had a very strong effect on referendum voting. As scores on this variable moved from the bottom 10 per cent (high costs, low benefits of leaving) to the top 10 per cent (low costs, high benefits of leaving), the probability of voting to leave increased by fully 0.78 points (on a 0–1 scale). Cost-benefit calculations regarding the impact of Brexit on immigration and terrorism also were very powerful—as these calculations moved from the lowest 10 per cent (negative) to the highest 90 per cent (positive), the likelihood of casting a Leave ballot increased by 0.62 points.</span></p><span data-dcnode-id="7406" instrument_node=""> </span><a data-dcnode-id="7405" data-google-interstitial="false" id="89655123" scrollto-destination="89655123"></a><span data-dcnode-id="7404" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="7391" data-id="gsx005-F6"><div class="label fig-label" data-dcnode-id="7402"><span data-dcnode-id="7403" instrument_node="">Figure 6</span></div><div class="graphic-wrap" data-dcnode-id="7395"><img alt="Impact of significant predictors in referendum voting model on the probability of voting to leave the EU." class="content-image" data-dcnode-id="7401" data-path-from-xml="gsx005f6.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f6.jpeg%3FExpires%3D1654213257%26Signature%3DomzEMs6rqFRaqiRRzwItkbyf69gTO7-kEzo5ohcDbhagFwE4eiS6~-7NA~Bx3gt2SxFxzLzciHSWyxtBatjeLL8rZbG3zPiKkhJ9bmtusHEvBGfyO1h1ZdxgUjxO9E4pJMKSpezKmQZ2fwblasoKTe-hS-EMIAK0mPu74ovcBwWRITcv8Hv2g5AD22QXboZ~1s~MAalGTYGJcqNh9xReOJ7~1cJXve6Hcvj16rAZhambVcjBbhvI6cG8ggM123-EWsTn51wlIePL5ggX3U-yBtd0ScbHxfB8igUm1uo0c2jNtr30rAOlXIURsUBiz5tp~MzuyEi0GGrQbRj0EdWjJQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="7396"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="7399" data-google-interstitial="false" data-path-from-xml="gsx005f6.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655123/gsx005f6.tif" target="_blank"><span data-dcnode-id="7400" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="7397" data-google-interstitial="false" data-path-from-xml="gsx005f6.tif" data-section="89655123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f6.jpeg%3FExpires%3D1654213257%26Signature%3DQuGQEezdDBcu-abC6ObMojEPRoGO3UxRf7NKyyaXlumcmsooVF61lgClyN5OjH-iOTqASgPl480Rnba9x0U8rSWaUoGWSf1MtVmx6gEluDi~xS30i1x6r7~olI56ddUBkhjopKQNXfhUoo8tyPqKiT1ypA2FTxxl1tM8DQVm-04C0FCEvTb4fRXSHbdRsNDyXiBSl-M1cBcvl5WHj0dqbfLvfqjwUnUukDDXOI2rf7FOzpflgYfXwKLNWblviK2kpFJpLpg6ybum-rjugv9JOFujtYQOcNmC19FMxdV3NqsuIY87OuzKYX9r8S4J3RLm~RI~ZKmPhI9o8n~x-e8KAQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655123%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="7398" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="7392"><p class="chapter-para" data-dcnode-id="7393"><span data-dcnode-id="7394" instrument_node="">Impact of significant predictors in referendum voting model on the probability of voting to leave the EU.</span></p></div></div><div class="fig fig-modal reveal-modal" content-id="gsx005-F6" data-dcnode-id="7378" style="display: block;"><div class="label fig-label" data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">Figure 6</span></div><div class="graphic-wrap" data-dcnode-id="7382"><img alt="Impact of significant predictors in referendum voting model on the probability of voting to leave the EU." class="content-image" data-dcnode-id="7388" data-path-from-xml="gsx005f6.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f6.jpeg%3FExpires%3D1654213257%26Signature%3DomzEMs6rqFRaqiRRzwItkbyf69gTO7-kEzo5ohcDbhagFwE4eiS6~-7NA~Bx3gt2SxFxzLzciHSWyxtBatjeLL8rZbG3zPiKkhJ9bmtusHEvBGfyO1h1ZdxgUjxO9E4pJMKSpezKmQZ2fwblasoKTe-hS-EMIAK0mPu74ovcBwWRITcv8Hv2g5AD22QXboZ~1s~MAalGTYGJcqNh9xReOJ7~1cJXve6Hcvj16rAZhambVcjBbhvI6cG8ggM123-EWsTn51wlIePL5ggX3U-yBtd0ScbHxfB8igUm1uo0c2jNtr30rAOlXIURsUBiz5tp~MzuyEi0GGrQbRj0EdWjJQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="7383"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="7386" data-google-interstitial="false" data-path-from-xml="gsx005f6.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655123/gsx005f6.tif" target="_blank"><span data-dcnode-id="7387" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="7384" data-google-interstitial="false" data-path-from-xml="gsx005f6.tif" data-section="89655123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f6.jpeg%3FExpires%3D1654213257%26Signature%3DQuGQEezdDBcu-abC6ObMojEPRoGO3UxRf7NKyyaXlumcmsooVF61lgClyN5OjH-iOTqASgPl480Rnba9x0U8rSWaUoGWSf1MtVmx6gEluDi~xS30i1x6r7~olI56ddUBkhjopKQNXfhUoo8tyPqKiT1ypA2FTxxl1tM8DQVm-04C0FCEvTb4fRXSHbdRsNDyXiBSl-M1cBcvl5WHj0dqbfLvfqjwUnUukDDXOI2rf7FOzpflgYfXwKLNWblviK2kpFJpLpg6ybum-rjugv9JOFujtYQOcNmC19FMxdV3NqsuIY87OuzKYX9r8S4J3RLm~RI~ZKmPhI9o8n~x-e8KAQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655123%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="7385" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="7379"><p class="chapter-para" data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">Impact of significant predictors in referendum voting model on the probability of voting to leave the EU.</span></p></div></div><p class="chapter-para" data-dcnode-id="7372"><span data-dcnode-id="7377" instrument_node="">Predictably, risk perceptions had the opposite impact of benefit-cost calculations. These effects were sizable—as perceptions of the risks associated with leaving the EU moved from the lowest 10 per cent to the top 10 per cent the probability of voting for Brexit fell by fully 0.71 points (</span><span class="xrefLink" data-dcnode-id="7376" id="jumplink-gsx005-F6"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7374" data-google-interstitial="false" data-open="gsx005-F6" href="javascript:;" reveal-id="gsx005-F6"><span data-dcnode-id="7375" instrument_node="">Figure 6</span></a><span data-dcnode-id="7373" instrument_node="">). This indicates that risk orientations had a strong impact on referendum voting, although, contradicting ‘LeDuc’s law’, their effects were not sufficient to yield a Remain victory. Emotional reactions to membership also exerted substantial effects, with a shift from the 10 per cent (negative) to the 90 per cent (positive) rank on the EU emotions scale reducing the probability of a Brexit ballot by 0.48 points.</span></p><p class="chapter-para" data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">Leader image cues provided by Farage and Johnson were influential too. In Farage’s case, as ‘feeling thermometer’ scores about him moved from the bottom 10 per cent to the top 10 per cent along the 0–10 ‘likeability’ scale, the probability of voting Leave increased by 0.36 points. The comparable probability change as feelings about Johnson became increasingly positive was somewhat larger, 0.42 points. Other effects were less powerful; for a respondent with average scores on other predictor variables, Scottish identity reduced the likelihood of voting to leave by 0.32 points, and Conservative partisanship reduced it by .14 points.</span></p><p class="chapter-para" data-dcnode-id="7312"><span data-dcnode-id="7369" instrument_node="">Additional insight regarding the ability of various classes of predictor variables to account for voting in the referendum is provided by the statistics summarized in </span><span class="xrefLink" data-dcnode-id="7368" id="jumplink-gsx005-F7"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7366" data-google-interstitial="false" data-open="gsx005-F7" href="javascript:;" reveal-id="gsx005-F7"><span data-dcnode-id="7367" instrument_node="">Figure 7</span></a><span data-dcnode-id="7365" instrument_node="">. The figure displays McKelvey </span><em data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">R</span></em><sup data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">2</span></sup><span data-dcnode-id="7360" instrument_node=""> and AIC values for several logit models of the vote that use different specifications of predictors.</span><span class="xrefLink" data-dcnode-id="7359" id="jumplink-gsx005-FN9"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="7356" data-google-interstitial="false" data-open="gsx005-FN9" href="javascript:;" reveal-id="gsx005-FN9"><sup data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">9</span></sup></a><span data-dcnode-id="7355" instrument_node=""> As shown, the benefit-costs model dominates its competitors, with the largest </span><em data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">R</span></em><sup data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">2</span></sup><span data-dcnode-id="7350" instrument_node=""> (0.85) and the smallest AIC (748.35).</span><span class="xrefLink" data-dcnode-id="7349" id="jumplink-gsx005-FN10"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="7346" data-google-interstitial="false" data-open="gsx005-FN10" href="javascript:;" reveal-id="gsx005-FN10"><sup data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">10</span></sup></a><span data-dcnode-id="7345" instrument_node=""> Other relatively powerful models include the risk assessment model (R</span><sup data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">2</span></sup><span data-dcnode-id="7342" instrument_node=""> = 0.73), the emotional reactions to the EU model (</span><em data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">R</span></em><sup data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">2</span></sup><span data-dcnode-id="7337" instrument_node=""> = 0.71) and the leader cues model (</span><em data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">R</span></em><sup data-dcnode-id="7333"><span data-dcnode-id="7334" instrument_node="">2</span></sup><span data-dcnode-id="7332" instrument_node=""> = 0.71). The remaining models have much smaller </span><em data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">R</span></em><sup data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">2’</span></sup><span data-dcnode-id="7327" instrument_node="">s and considerably larger AICs. Thus, the </span><em data-dcnode-id="7325"><span data-dcnode-id="7326" instrument_node="">R</span></em><sup data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">2</span></sup><span data-dcnode-id="7322" instrument_node=""> values for the partisan cues, national identities and socio-demographics models are only 0.26, 0.15 and 0.16, respectively. Note also that the composite model that specifies all of the predictor variables (</span><span class="xrefLink" data-dcnode-id="7321" id="jumplink-gsx005-T1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="7319" data-google-interstitial="false" data-open="gsx005-T1" href="javascript:;" reveal-id="gsx005-T1"><span data-dcnode-id="7320" instrument_node="">Table 1</span></a><span data-dcnode-id="7318" instrument_node=""> above) has better fit statistics (</span><em data-dcnode-id="7316"><span data-dcnode-id="7317" instrument_node="">R</span></em><sup data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">2</span></sup><span data-dcnode-id="7313" instrument_node=""> = 0.90, AIC = 658.02) than any of its sub-models. Taken together, these statistics document important effects of benefit-cost perceptions, risk assessments and leader images on voting in the EU referendum. However, they also testify that the strongest explanation is provided by the composite model that incorporates all of the predictor variables.</span></p><span data-dcnode-id="7311" instrument_node=""> </span><a data-dcnode-id="7310" data-google-interstitial="false" id="89655127" scrollto-destination="89655127"></a><span data-dcnode-id="7309" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="7296" data-id="gsx005-F7"><div class="label fig-label" data-dcnode-id="7307"><span data-dcnode-id="7308" instrument_node="">Figure 7</span></div><div class="graphic-wrap" data-dcnode-id="7300"><img alt="Explanatory power of variables affecting voting in EU referendum." class="content-image" data-dcnode-id="7306" data-path-from-xml="gsx005f7.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f7.jpeg%3FExpires%3D1654213257%26Signature%3D2gT6IjtoLvPcmJdRBM~JwGCZ4Xc~6hit-3rtc~E-wUc5hEOHnRFepzIHnIZi6kPCv6o8HIt5cLI2NikTyjM0EspGmDuGf0eAXWE8k4xgJ3bdZnkzyZd1JJXIeFEcSMSPicvMuGdW4EhGAias~nmQs9AxSPat7I19az0X7KQl1mkuscuPpFss2WRmFGWaZLAMTYRLTowJAotoKuAAxuBip3w6~Wpn36vcPhGWuquEJ0PS7Z6SJATBrSj~5id~9G58OyOqnv~S7KpgVtLqqg5wnXUTncUZnS7OVTNFTC64rDYZfzFV7HCmwXjKXQIoDUwfhcHd7I6vair3jaRYHrF1Ag__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="7301"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="7304" data-google-interstitial="false" data-path-from-xml="gsx005f7.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655127/gsx005f7.tif" target="_blank"><span data-dcnode-id="7305" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="7302" data-google-interstitial="false" data-path-from-xml="gsx005f7.tif" data-section="89655127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f7.jpeg%3FExpires%3D1654213257%26Signature%3Dd0o1KXxvP4bn7UP1AeSPLDSntzfPHr-6jF5xGpaOBn~bn-eRbdDa2YC7tcH60J~eHn0Vhhyd418p2PNghBO4bqiwvHAV0EtnxqkpLM2Y0Lzid5ET1sSbRZsSWQte~ ontent-id="tblfn11" data-dcnode-id="5326"><span class="fn" data-dcnode-id="5327"><p class="chapter-para" data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">N = 1736</span></p></span></div><span data-dcnode-id="5325" id="fn-tblfn12"></span><div class="footnote" content-id="tblfn12" data-dcnode-id="5318"><span class="fn" data-dcnode-id="5319"><span class="label fn-label" data-dcnode-id="5322"><span class="end-note-link" data-dcnode-id="5323" data-fn-id="tblfn12" rel="nofollow"><span data-dcnode-id="5324" instrument_node="">***</span></span></span><p class="chapter-para" data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">p ≤ 0.001;</span></p></span></div><span data-dcnode-id="5317" id="fn-tblfn13"></span><div class="footnote" content-id="tblfn13" data-dcnode-id="5310"><span class="fn" data-dcnode-id="5311"><span class="label fn-label" data-dcnode-id="5314"><span class="end-note-link" data-dcnode-id="5315" data-fn-id="tblfn13" rel="nofollow"><span data-dcnode-id="5316" instrument_node="">**</span></span></span><p class="chapter-para" data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">p ≤ 0.01;</span></p></span></div><span data-dcnode-id="5309" id="fn-tblfn14"></span><div class="footnote" content-id="tblfn14" data-dcnode-id="5302"><span class="fn" data-dcnode-id="5303"><span class="label fn-label" data-dcnode-id="5306"><span class="end-note-link" data-dcnode-id="5307" data-fn-id="tblfn14" rel="nofollow"><span data-dcnode-id="5308" instrument_node="">*</span></span></span><p class="chapter-para" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">p ≤ 0.05,</span></p></span></div><span data-dcnode-id="5301" id="fn-tblfn15"></span><div class="footnote" content-id="tblfn15" data-dcnode-id="5294"><span class="fn" data-dcnode-id="5295"><span class="label fn-label" data-dcnode-id="5298"><span class="end-note-link" data-dcnode-id="5299" data-fn-id="tblfn15" rel="nofollow"><span data-dcnode-id="5300" instrument_node="">†</span></span></span><p class="chapter-para" data-dcnode-id="5296"><span data-dcnode-id="5297" instrument_node="">p ≤ 0.10, one-tailed test.</span></p></span></div><span data-dcnode-id="5293" id="fn-tblfn16"></span><div class="footnote" content-id="tblfn16" data-dcnode-id="5287"><span class="fn" data-dcnode-id="5288"><p class="chapter-para" data-dcnode-id="5289"><em data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">Note</span></em><span data-dcnode-id="5290" instrument_node="">: High scores on benefit-cost factors indicate pro-Leave perceptions.</span></p></span></div></div><div class="graphic-wrap hide" data-dcnode-id="5283"><a class="fig-view-orig openInAnotherWindow btn js-view-large" data-dcnode-id="5284" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/" target="_blank"><span data-dcnode-id="5285" instrument_node="">
          Open in new tab
        </span></a></div></div><p data-dcnode-id="5281"></p><p class="chapter-para" data-dcnode-id="5270"><span data-dcnode-id="5280" instrument_node="">Both models in </span><span class="xrefLink" data-dcnode-id="5279" id="jumplink-gsx005-T2"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5277" data-google-interstitial="false" data-open="gsx005-T2" href="javascript:;" reveal-id="gsx005-T2"><span data-dcnode-id="5278" instrument_node="">Table 2</span></a><span data-dcnode-id="5276" instrument_node=""> have quite strong explanatory power, with </span><em data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">R</span></em><sup data-dcnode-id="5272"><span data-dcnode-id="5273" instrument_node="">2</span></sup><span data-dcnode-id="5271" instrument_node=""> values of 0.69 and 0.75, respectively. Parameter estimates reveal that although voters’ impressions of Jeremy Corbyn and David Cameron did not directly influence the vote, the images of these two leaders exerted indirect effects (p &lt; 0.001) by working to shape voters’ benefit-cost evaluations of a Brexit decision. Positive evaluations of Cameron and Corbyn nudged respondents towards perceiving fewer benefits and more costs of leaving the EU, with the effects being significantly stronger for the prime minister than for the Labour leader in the case of economic-international influence calculations. Predictably, positive images of Leave leaders, Boris Johnson and Nigel Farage, had the opposite effects—working to move both types of benefit-costs evaluations in a pro-Brexit direction.</span></p><p class="chapter-para" data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">The partisanship measures show that Labour, Conservative and Liberal Democrat party identifications cued voters in expected ways, increasing perceptions of the benefits and reducing perceptions of the costs of remaining in the EU. Interestingly, the Conservative partisanship effects were weak, unlike those of Labour and the Liberal Democrats. This was probably because the Tories were so divided on the issue, and this served to weaken the ability of Tory partisanship to cue voters about costs and benefits of EU membership. Finally, there is weak evidence that the Remain campaign had an impact on perceptions of benefits and costs, whereas the Leave campaign appeared to have none.</span></p><p class="chapter-para" data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">Although, with the exception of viewing oneself as Scottish, national identities did not have directly influence referendum voting, these identities did have a variety of modest but significant effects on benefit-cost evaluations. English identifiers were significantly more likely than those who viewed themselves as ‘British’ to emphasize the benefits rather than the costs of exiting the EU. The opposite was true for Scottish and European identifiers. Welsh identifiers were an intermediate case; they were no different from British identifiers regarding economic-influence benefit-cost evaluations, but were significantly more likely to have immigration-terrorism evaluations that would help to prompt a Leave vote.</span></p><p class="chapter-para" data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">Negative attitudes towards immigration had highly significant effects (p &lt; 0.001) on both types of benefit-cost assessments. As anticipated, voters with highly negative attitudes about immigration were more likely than other people to extol the benefits of Brexit and to minimize the costs of doing so. This effect obtained not only for the immigration-terrorism benefit-cost factor but also for the economy-international influence factor. Perceptions that Britain’s economic sovereignty had been lost to the EU mattered as well. Again, the effects are predictable; those who believed the EU had seized control of the British economy were more likely than other voters to see the benefits and minimize the costs of Brexit.</span></p><p class="chapter-para" data-dcnode-id="5257"><span data-dcnode-id="5263" instrument_node="">Finally, the performance of the socio-demographic characteristics is noteworthy. As </span><span class="xrefLink" data-dcnode-id="5262" id="jumplink-gsx005-T3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5260" data-google-interstitial="false" data-open="gsx005-T3" href="javascript:;" reveal-id="gsx005-T3"><span data-dcnode-id="5261" instrument_node="">Table 3</span></a><span data-dcnode-id="5259" instrument_node=""> documents, university educated people and those in higher social grades were significantly less likely to see the benefits of leaving in the EU than were other people. In contrast, older voters were more likely to judge that Brexit would have benefits by helping to control immigration and reducing the threat of terrorism. Gender differences in benefit-cost assessments were small and insignificant. </span><span data-dcnode-id="5258" id="gsx005-T3"></span></p><div class="table-modal" content-id="gsx005-T3" data-dcnode-id="4679" style="display: block;"><div class="table-wrap table-wide" data-dcnode-id="4680"><div class="table-wrap-title" data-dcnode-id="5250" data-id="gsx005-T3" id="gsx005-T3"><span class="label" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">Table 3</span></span><div class="caption" data-dcnode-id="5252"><p class="chapter-para" data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">OLS regression analysis of predictors of perceived risks of leaving the EU</span></p></div><span data-dcnode-id="5251" instrument_node=""> </span></div><div class="table-overflow" data-dcnode-id="4994"><table data-dcnode-id="4995"><thead data-dcnode-id="5236"><tr data-dcnode-id="5237"><th data-dcnode-id="5246"><span data-dcnode-id="5249" instrument_node="">Predictor</span><span aria-hidden="true" data-dcnode-id="5247" style="display: none;"><span data-dcnode-id ></p></span></div><span data-dcnode-id="4150" id="fn-tblfn18"></span><div class="footnote" content-id="tblfn18" data-dcnode-id="4146"><span class="fn" data-dcnode-id="4147"><p class="chapter-para" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">N = 1736</span></p></span></div><span data-dcnode-id="4145" id="fn-tblfn19"></span><div class="footnote" content-id="tblfn19" data-dcnode-id="4138"><span class="fn" data-dcnode-id="4139"><span class="label fn-label" data-dcnode-id="4142"><span class="end-note-link" data-dcnode-id="4143" data-fn-id="tblfn19" rel="nofollow"><span data-dcnode-id="4144" instrument_node="">***</span></span></span><p class="chapter-para" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">p ≤ 0.001;</span></p></span></div><span data-dcnode-id="4137" id="fn-tblfn20"></span><div class="footnote" content-id="tblfn20" data-dcnode-id="4130"><span class="fn" data-dcnode-id="4131"><span class="label fn-label" data-dcnode-id="4134"><span class="end-note-link" data-dcnode-id="4135" data-fn-id="tblfn20" rel="nofollow"><span data-dcnode-id="4136" instrument_node="">**</span></span></span><p class="chapter-para" data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">p ≤ 0.01;</span></p></span></div><span data-dcnode-id="4129" id="fn-tblfn21"></span><div class="footnote" content-id="tblfn21" data-dcnode-id="4122"><span class="fn" data-dcnode-id="4123"><span class="label fn-label" data-dcnode-id="4126"><span class="end-note-link" data-dcnode-id="4127" data-fn-id="tblfn21" rel="nofollow"><span data-dcnode-id="4128" instrument_node="">*</span></span></span><p class="chapter-para" data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">p ≤ 0.05,</span></p></span></div><span data-dcnode-id="4121" id="fn-tblfn22"></span><div class="footnote" content-id="tblfn22" data-dcnode-id="4114"><span class="fn" data-dcnode-id="4115"><span class="label fn-label" data-dcnode-id="4118"><span class="end-note-link" data-dcnode-id="4119" data-fn-id="tblfn22" rel="nofollow"><span data-dcnode-id="4120" instrument_node="">†</span></span></span><p class="chapter-para" data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">p ≤ 0.10, one-tailed test.</span></p></span></div><span data-dcnode-id="4113" id="fn-tblfn23"></span><div class="footnote" content-id="tblfn23" data-dcnode-id="4107"><span class="fn" data-dcnode-id="4108"><p class="chapter-para" data-dcnode-id="4109"><em data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">Note</span></em><span data-dcnode-id="4110" instrument_node="">: Risk assessment scores vary from 0 to 10 with higher scores indicating greater perceived risks of leaving the EU.</span></p></span></div></div><div class="graphic-wrap hide" data-dcnode-id="4103"><a class="fig-view-orig openInAnotherWindow btn js-view-large" data-dcnode-id="4104" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/" target="_blank"><span data-dcnode-id="4105" instrument_node="">
          Open in new tab
        </span></a></div></div><p data-dcnode-id="4101"></p><p class="chapter-para" data-dcnode-id="4090"><span data-dcnode-id="4100" instrument_node="">Next, we model the effects of various predictors on perceptions of risk, the third most important predictor of voting in the referendum. Using OLS regression for this purpose, we see that the model fits the data very well, with the </span><em data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">R</span></em><sup data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">2</span></sup><span data-dcnode-id="4095" instrument_node=""> indicating that 69 per cent of the variance in risk assessments is explained (</span><span class="xrefLink" data-dcnode-id="4094" id="jumplink-gsx005-T3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="4092" data-google-interstitial="false" data-open="gsx005-T3" href="javascript:;" reveal-id="gsx005-T3"><span data-dcnode-id="4093" instrument_node="">Table 3</span></a><span data-dcnode-id="4091" instrument_node="">). Two highly significant predictors (p &lt; 0.001) in this model are negative attitudes towards immigration and perceptions that Britain no longer controls its own economy. Parameter estimates show that negative attitudes towards immigration tended to dampen perceptions that leaving the EU would be risky. This was also true of perceptions that Britain has lost control of its economy to the EU.</span></p><p class="chapter-para" data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Leader images were highly significant (p &lt; 0.001) predictors of risk orientations as well. As one would anticipate, positive feelings about Cameron and Corbyn were associated with greater perceived risks of leaving the EU, whereas the positive feelings about Farage and Johnson were associated with lower perceived risks. Partisan identifications were significant too (p &lt; 0.001) with Conservative, Labour and Liberal Democrat identifiers thinking that the risks of leaving the EU were higher than did other party identifiers or non-identifiers.</span></p><p class="chapter-para" data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Of the other predictors, the only significant national identity variable was ‘European’ (p &lt; 0.05). As expected, people viewing themselves as European rather than British were more likely to believe that exiting the EU would entail substantial risks. Among socio-demographics, age has a highly significant (p &lt; 0.001) impact, with younger people being more likely to emphasize risks attendant upon Brexit. Education, gender and social class are not statistically significant, thereby indicating that these socio-demographic characteristics did not exert direct effects on the perceived risks of Brexit.</span></p><span data-dcnode-id="4085" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="4083" id="89655137" scrollto-destination="89655137"><span data-dcnode-id="4084" instrument_node="">Conclusion: Brexit Voting Reconsidered</span></h2><span data-dcnode-id="4082" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">This article has investigated the factors that shaped the decisions voters made in the historic 2016 referendum on the UK’s continued membership in the European Union. Drawing on previous research on referendum voting and the studies of factors shaping public attitudes to the EU, we specified multivariate statistical models to assess the strength of various forces affecting the vote. The models were analysed using data gathered in a national panel survey of the British electorate conducted just before and shortly after the referendum.</span></p><p class="chapter-para" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">Results of these analyses emphasize the importance of benefit-cost calculations, risk assessments and emotional reactions to EU membership as proximate predictors of referendum voting. Cues—what psychologists call heuristics—were important as well. Particularly noteworthy were the sizable direct and/or indirect effects associated with the images of various leaders of the Remain and Leave campaigns, including UKIP Leader Nigel Farage, former London mayor, Boris Johnson, Prime Minister David Cameron and Labour Leader Jeremy Corbyn. Partisan cues were significant too, but their effects were weaker and largely worked indirectly via shaping benefit-cost evaluations and risk assessments.</span></p><p class="chapter-para" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">Other forces also were working further back in the causal chain. Models for cost-benefit calculations and risk assessments documented the strong influence of negative attitudes towards immigration, as well as effects of the perceived loss of economic sovereignty and national identities. Controlling for these several factors, age mattered as well, with younger people being significantly more likely to emphasize the risks of Brexit.</span></p><p class="chapter-para" data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">During the referendum campaign, the Remain side deployed a expansive ‘Davos A List’ of world leaders, senior civil servants, business moguls and celebrities to try and convince voters of the negative economic consequences that would ensue if the UK were to leave the EU. ‘Project Fear’, as it was called by Leave advocates and unsympathetic media commentators, portrayed Brexit as a very risky, economically self-destructive and ill-advised course of action. The Leave forces countered with dire warnings about how EU membership fuelled uncontrolled immigration, increasing terrorist threats, the loss of sovereignty and an accompanying erosion of democratic accountability. Although the dire scenarios depicted by Prime Minister Cameron and his allies were insufficient to secure a Remain majority, this does not mean that their arguments were ineffective as forces affecting individual-level voting. Rather, and as the analyses presented above show, both economic- and immigration-focused benefit-cost calculations had strong effects on the referendum choice. Combining with risk assessments, emotional reactions to the EU and leader image cues, these calculations were key immediate forces driving voting in the EU referendum. The narrow Brexit decision voters made on June 23rd thus reflected a diverse mix of calculations, emotions and cues. Given the strength of these forces demonstrated in the analyses presented above and the narrow division of the vote, it is plausible that a substantial change in any of them could have changed the referendum outcome. That said, we leave conjectures about how the EU might have gone to the realm of ‘common room counterfactuals’—at least for now. </span></p><span data-dcnode-id="4073" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="4071" id="89655142" scrollto-destination="89655142"><span data-dcnode-id="4072" instrument_nod </span><div class="footnote" content-id="gsx005-FN1" data-dcnode-id="4038"><span class="fn" data-dcnode-id="4039"><span class="label fn-label" data-dcnode-id="4054"><span class="end-note-link" data-dcnode-id="4055" data-fn-id="gsx005-FN1" rel="nofollow"><span data-dcnode-id="4056" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="4040"><p class="footnote-compatibility" data-dcnode-id="4041"><span data-dcnode-id="4053" instrument_node="">Results of the referendum are available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="4051" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electoralcommission.org.uk/" target="_blank"><span data-dcnode-id="4052" instrument_node="">www.electoralcommission.org.uk</span></a><span data-dcnode-id="4050" instrument_node="">. For an account of the referendum campaign, see </span><span class="xrefLink" data-dcnode-id="4049" id="jumplink-gsx005-B43"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="4047" data-google-interstitial="false" data-open="gsx005-B43" href="javascript:;" reveal-id="gsx005-B43"><span data-dcnode-id="4048" instrument_node="">Shipman (2016)</span></a><span data-dcnode-id="4046" instrument_node="">. For an analysis of correlates of the aggregate (local authority)-level results, see </span><span class="xrefLink" data-dcnode-id="4045" id="jumplink-gsx005-B22"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="4043" data-google-interstitial="false" data-open="gsx005-B22" href="javascript:;" reveal-id="gsx005-B22"><span data-dcnode-id="4044" instrument_node="">Goodwin and Heath (2016)</span></a><span data-dcnode-id="4042" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN2" data-dcnode-id="4027"><span class="fn" data-dcnode-id="4028"><span class="label fn-label" data-dcnode-id="4035"><span class="end-note-link" data-dcnode-id="4036" data-fn-id="gsx005-FN2" rel="nofollow"><span data-dcnode-id="4037" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="4029"><p class="footnote-compatibility" data-dcnode-id="4030"><span data-dcnode-id="4034" instrument_node="">‘The campaign to stay in the EU is “Project Fear” says Boris Johnson’. </span><em data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">The Independent</span></em><span data-dcnode-id="4031" instrument_node="">, 29 February 2016.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN3" data-dcnode-id="4014"><span class="fn" data-dcnode-id="4015"><span class="label fn-label" data-dcnode-id="4024"><span class="end-note-link" data-dcnode-id="4025" data-fn-id="gsx005-FN3" rel="nofollow"><span data-dcnode-id="4026" instrument_node="">3</span></span></span><div class="footnote-content" data-dcnode-id="4016"><p class="footnote-compatibility" data-dcnode-id="4017"><span data-dcnode-id="4023" instrument_node="">For information about question wording and variable construction see the Measurement Appendix in </span><span class="link link-data-supplement" data-dcnode-id="4022" data-supplement-target="sup1"></span><span class="content-section supplementary-material" data-dcnode-id="4019"><a data-dcnode-id="4020" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005_Supp.doc%3FExpires%3D1654213257%26Signature%3DxL~wC7nqcA8lpyibQNhJ2K1X~WEHR1g73LLDNw7eMcKvmCoRw8Mh4CJhCQLSjeCJ64YWId~K~w4gpjZETRjrwg2lDjOxUvQeU8M0Wmvl4ts8~bI-6vKuUg~IzPb4Ec8ZODJGJKmuAqAmq-jhLxclAdZ4TUaywJ~onj~FAA4Zwt9mnNcmrbzN3Kbcn4~lreqgGDBYPcJwdZ9n1xvV2-Osx-CXLT~NMG9ihZzu2qKMx6FO5XUnjXNvrftu5~jE8FuWMXgIy11hw2aOgRLbzf7BJElrOgpO-rTHltT1u5Zl99c9bpsuHo1FIBgDMf2mzjfQN0BerjbcHibMi1kCbiUFdA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA" path-from-xml="sup1"><span data-dcnode-id="4021" instrument_node="">Supplementary Material</span></a></span><span data-dcnode-id="4018" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN4" data-dcnode-id="4006"><span class="fn" data-dcnode-id="4007"><span class="label fn-label" data-dcnode-id="4011"><span class="end-note-link" data-dcnode-id="4012" data-fn-id="gsx005-FN4" rel="nofollow"><span data-dcnode-id="4013" instrument_node="">4</span></span></span><div class="footnote-content" data-dcnode-id="4008"><p class="footnote-compatibility" data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">Data from the 1970–2002 Eurobarometer Trend File show that in 1993, 60 per cent claimed to have exclusive national identities and nearly 10 years later in 2002, the figure was very similar, 62 per cent. In contrast, in 1993, 45 per cent believed that EU membership was a good thing but in 2002 only 32 per cent did so.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN5" data-dcnode-id="3983"><span class="fn" data-dcnode-id="3984"><span class="label fn-label" data-dcnode-id="4003"><span class="end-note-link" data-dcnode-id="4004" data-fn-id="gsx005-FN5" rel="nofollow"><span data-dcnode-id="4005" instrument_node="">5</span></span></span><div class="footnote-content" data-dcnode-id="3985"><p class="footnote-compatibility" data-dcnode-id="3986"><span data-dcnode-id="4002" instrument_node="">In addition to the referendum voting literature, there is abundant experimental evidence indicating the importance of cues (heuristics) for decision-making in various contexts. See, e.g., </span><span class="xrefLink" data-dcnode-id="4001" id="jumplink-gsx005-B20"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3999" data-google-interstitial="false" data-open="gsx005-B20" href="javascript:;" reveal-id="gsx005-B20"><span data-dcnode-id="4000" instrument_node="">Gigerenzer (2008)</span></a><span data-dcnode-id="3998" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="3997" id="jumplink-gsx005-B21"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3992" data-google-interstitial="false" data-open="gsx005-B21" href="javascript:;" reveal-id="gsx005-B21"><span data-dcnode-id="3996" instrument_node="">Gigerenzer </span><em data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">et al.</span></em><span data-dcnode-id="3993" instrument_node=""> (2011)</span></a><span data-dcnode-id="3991" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="3990" id="jumplink-gsx005-B33"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3988" data-google-interstitial="false" data-open="gsx005-B33" href="javascript:;" reveal-id="gsx005-B33"><span data-dcnode-id="3989" instrument_node="">Kahneman (2011)</span></a><span data-dcnode-id="3987" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN6" data-dcnode-id="3972"><span class="fn" data-dcnode-id="3973"><span class="label fn-label" data-dcnode-id="3980"><span class="end-note-link" data-dcnode-id="3981" data-fn-id="gsx005-FN6" rel="nofollow"><span data-dcnode-id="3982" instrument_node="">6</span></span></span><div class="footnote-content" data-dcnode-id="3974"><p class="footnote-compatibility" data-dcnode-id="3975"><span class="xrefLink" data-dcnode-id="3979" id="jumplink-gsx005-B17"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3977" data-google-interstitial="false" data-open="gsx005-B17" href="javascript:;" reveal-id="gsx005-B17"><span data-dcnode-id="3978" instrument_node="">Gabel and Scheve (2007)</span></a><span data-dcnode-id="3976" instrument_node=""> suggest that parties typically send out multiple cues rather than a single cue in referendum campaigns because they are not unitary actors and internal party dissent ensures that voters hear alternative messages. In the 2016, EU referendum the Conservatives were very much a case in point.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN7" data-dcnode-id="3964"><span class="fn" data-dcnode-id="3965"><span class="label fn-label" data-dcnode-id="3969"><span class="end-note-link" data-dcnode-id="3970" data-fn-id="gsx005-FN7" rel="nofollow"><span data-dcnode-id="3971" instrument_node="">7</span></span></span><div class="footnote-content" data-dcnode-id="3966"><p class="footnote-compatibility" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">The survey was conducted via internet by YouGov, plc., with funding provided by the ESRC’s ‘The UK in a Changing Europe’ programme.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN8" data-dcnode-id="3956"><span class="fn" data-dcnode-id="3957"><span class="label fn-label" data-dcnode-id="3961"><span class="end-note-link" data-dcnode-id="3962" data-fn-id="gsx005-FN8" rel="nofollow"><span data-dcnode-id="3963" instrument_node="">8</span></span></span><div class="footnote-content" data-dcnode-id="3958"><p class="footnote-compatibility" data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">A 95% confidence interval (standard error = 1.2 per cent) for the vote shares reported in the survey easily covers the actual vote percentages for Remain and Leave.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN9" data-dcnode-id="3939"><span class="fn" data-dcnode-id="3940"><span class="label fn-label" data-dcnode-id="3953"><span class="end-note-link" data-dcnode-id="3954" data-fn-id="gsx005-FN9" rel="nofollow"><span data-dcnode-id="3955" instrument_node="">9</span></span></span><div class="footnote-content" data-dcnode-id="3941"><p class="footnote-compatibility" data-dcnode-id="3942"><span data-dcnode-id="3952" instrument_node="">When examining these numbers note that larger </span><em data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">R</span></em><sup data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">2</span></sup><span data-dcnode-id="3947" instrument_node=""> and smaller AIC values indicate that a model has greater explanatory power compared to its rivals. See, e.g., </span><span class="xrefLink" data-dcnode-id="3946" id="jumplink-gsx005-B5"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3944" data-google-interstitial="false" data-open="gsx005-B5" href="javascript:;" reveal-id="gsx005-B5"><span data-dcnode-id="3945" instrument_node="">Burnham and Anderson (2011)</span></a><span data-dcnode-id="3943" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="gsx005-FN10" data-dcnode-id="3927"><span class="fn" data-dcnode-id="3928"><span class="label fn-label" data-dcnode-id="3936"><span class="end-note-link" data-dcnode-id="3937" data-fn-id="gsx005-FN10" rel="nofollow"><span data-dcnode-id="3938" instrument_node="">10</span></span></span><div class="footnote-content" data-dcnode-id="3929"><p class="footnote-compatibility" data-dcnode-id="3930"><span data-dcnode-id="3935" instrument_node="">Analyses of data gathered in a pre-referendum survey conducted in conjunction with the 2015 British Election Study also documents the importance of cost-benefit assessments. See </span><span class="xrefLink" data-dcnode-id="3934" id="jumplink-gsx005-B26"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="3932" data-google-interstitial="false" data-open="gsx005-B26" href="javascript:;" reveal-id="gsx005-B26"><span data-dcnode-id="3933" instrument_node="">Hobolt (2016)</span></a><span data-dcnode-id="3931" instrument_node="">.</span></p></div></span></div><span data-dcnode-id="3926" instrument_node=""> </span><h2 class="backacknowledgements-title js-splitscreen-backacknowledgements-title" data-dcnode-id="3924" id="89655155" scrollto-destination="89655155"><span data-dcnode-id="3925" instrument_node="">Acknowledgements</span></h2><span data-dcnode-id="3923" instrument_node="">
