</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="9809" id="89655075" scrollto-destination="89655075"><span data-dcnode-id="9810" instrument_node="">Abstract</span></h2><span data-dcnode-id="9808" instrument_node="">
</span><section class="abstract" data-dcnode-id="9805"><p class="chapter-para" data-dcnode-id="9806"><span data-dcnode-id="9807" instrument_node="">This article investigates forces that shaped the decisions voters made in the 23 June 2016 referendum on the UK’s continued membership in the European Union. A multivariate model informed by previous research on voting in major ‘‘polity-shaping’ referendums is employed assess factors affecting how voters cast their ballots in the EU referendum. Employing data gathered in a national panel survey conducted before and after the referendum, analyses document that economic- and immigration-focused benefit-cost evaluations strongly influenced voters’ decisions. Risk assessments, emotional reactions to EU membership and leader image heuristics were other major proximate forces driving the choices voters made. National identities were influential as well, but operated further back in the set of forces affecting attitudes towards the EU. The June 23rd Brexit decision thus reflected a diverse mix of calculations, emotions and cues. Given the close division of the vote, it is plausible that a substantial change in any of these factors could have changed the referendum outcome.</span></p></section><span data-dcnode-id="9804" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="9795"><div class="article-metadata-tocSections" data-dcnode-id="9796"><span data-dcnode-id="9803" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="9801"><span data-dcnode-id="9802" instrument_node="">Issue Section:</span></div><span data-dcnode-id="9800" instrument_node="">
</span><a data-dcnode-id="9798" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/pa/search-results%3Ff_TocHeadingTitle%3DArticles"><span data-dcnode-id="9799" instrument_node="">Articles</span></a><span data-dcnode-id="9797" instrument_node="">
</span></div></div><span data-dcnode-id="9794" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9792"><span data-dcnode-id="9793" instrument_node="">On 23 June 2016, the British electorate made a historic decision to leave the European Union. This article employs data gathered in a national panel survey conducted just before and immediately after the June 23rd referendum to investigate the forces that shaped the choices voters made in the referendum. Analyses of the survey data enable us to address several important questions. Was the vote to leave the EU motivated primarily by instrumental considerations regarding the perceived costs and benefits of EU membership and risks that would be encountered should the UK decide to leave? Or were decisions driven more strongly by feelings of national identity and anxiety over perceived threats to the native in-group, from immigration and the free movement of EU nationals? How influential were cues from prominent politicians, such as David Cameron, Boris Johnson and Nigel Farage, in motivating people to vote, either for remain or leave? After providing a brief overview of major issues in the referendum campaign, we answer these questions using existing research on public attitudes towards the European Union to guide the specification of a model of factors affecting voting in the EU referendum. Next, we report the results of empirical analyses of this referendum voting model and associated models of key predictor variables. In the conclusion, we summarize major findings and discuss their implications for understanding why a majority of voters opted for Brexit.</span></p><span data-dcnode-id="9791" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="9789" id="89655078" scrollto-destination="89655078"><span data-dcnode-id="9790" instrument_node="">Key Issues in the Referendum Campaign</span></h2><span data-dcnode-id="9788" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9781"><span data-dcnode-id="9787" instrument_node="">When all the referendum votes were counted 51.9 per cent of those voting had opted to leave providing a lead over the Remain vote that extended to almost 7 percentage points in England.</span><span class="xrefLink" data-dcnode-id="9786" id="jumplink-gsx005-FN1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9783" data-google-interstitial="false" data-open="gsx005-FN1" href="javascript:;" reveal-id="gsx005-FN1"><sup data-dcnode-id="9784"><span data-dcnode-id="9785" instrument_node="">1</span></sup></a><span data-dcnode-id="9782" instrument_node=""> The vote for Brexit followed a campaign by several Eurosceptic groups—notably Vote Leave, Leave. EU and Grassroots Out—that had focused heavily on mobilizing public anxiety over immigration, the free movement of EU nationals and the further enlargement of the EU to encompass Albania, Montenegro, Serbia and possibly Turkey. The pro-Leave campaign also had focused heavily on the issues of sovereignty and the economic costs of EU membership, variously claiming that voters could ‘take back control’ from unaccountable ‘Brussels bureaucrats’ by voting to leave the EU and that the country would save £350 million each week that could be redirected into the National Health Service (NHS).</span></p><p class="chapter-para" data-dcnode-id="9774"><span data-dcnode-id="9780" instrument_node="">In contrast, the campaign to remain in the EU repeatedly emphasized that heavy financial costs and major economic risks would accompany a Brexit decision. The official campaign for Remain, Britain Stronger In Europe, joined Prime Minister David Cameron, Governor of the Bank of England Mark Carney, leaders of large trade unions and major business corporations, prominent media commentators and miscellaneous celebrities to warn voters that exiting the EU would have dire consequences—households would £4,300 worse off each year, workers would lose £38 a week in wages and house prices might fall by as much as 18 per cent. Only days before the vote pro-Remain Chancellor George Osborne claimed that Brexit would produce a £30 billion ‘black hole’ in the budget that would necessitate harsh public spending cuts and tax increases. Christine Lagarde, Director of the International Monetary Fund (IMF), cautioned that a vote to leave the EU would entail ‘severe global damage.’ Shortly before polling day the IMF predicted that the effects of a vote to leave would be ‘negative and substantial’ and that Britain’s gross domestic product could lose 5.6 percentage points by 2019. In perhaps the most high-profile intervention, U.S. President Obama travelled to London to warn voters that after Brexit the UK would be at ‘the back of the queue’ in future trade talks with the United States. Just over a week before the vote, Chancellor George Osborne weighed in by raising the spectre of tax increases and benefit cuts should the electorate be so foolish as to opt for Brexit. Given the Remain campaign’s highly negative tone, Boris Johnson and other leading Leave advocates accused Remainers of blatant scaremongering and relabelled the campaign to stay as ‘Project Fear’.</span><span class="xrefLink" data-dcnode-id="9779" id="jumplink-gsx005-FN2"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9776" data-google-interstitial="false" data-open="gsx005-FN2" href="javascript:;" reveal-id="gsx005-FN2"><sup data-dcnode-id="9777"><span data-dcnode-id="9778" instrument_node="">2</span></sup></a><span data-dcnode-id="9775" instrument_node=""> The label was uncomfortably close to the mark.</span></p><p class="chapter-para" data-dcnode-id="9763"><span data-dcnode-id="9773" instrument_node="">Taken together, the issues stressed by the Leave and Remain campaigns point to the importance of cost-benefit </span><em data-dcnode-id="9771"><span data-dcnode-id="9772" instrument_node="">calculations</span></em><span data-dcnode-id="9770" instrument_node=""> and attendant risk assessments, feelings of attachment to a wider c</span><em data-dcnode-id="9768"><span data-dcnode-id="9769" instrument_node="">ommunity</span></em><span data-dcnode-id="9767" instrument_node=""> and </span><em data-dcnode-id="9765"><span data-dcnode-id="9766" instrument_node="">cues</span></em><span data-dcnode-id="9764" instrument_node=""> from political elites in shaping the outcome of the 2016 referendum—three types of explanation that have received significant attention in studies of the drivers of public attitudes to the EU. In the next section, we briefly review major theoretical themes and empirical findings in this research. </span></p><span data-dcnode-id="9762" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="9760" id="89655082" scrollto-destination="89655082"><span data-dcnode-id="9761" instrument_node="">What Drives Public Attitudes toward the EU?</span></h2><span data-dcnode-id="9759" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9696"><span data-dcnode-id="9758" instrument_node="">The 2016 referendum was the second such event to ask UK citizens about their preferred relationship with Europe. The first, which asked voters whether they wanted to stay in the Common Market, as it was then called, was held in June 1975 and saw the country endorse continued membership by a strong two to one margin (</span><span class="xrefLink" data-dcnode-id="9757" id="jumplink-gsx005-B6"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9755" data-google-interstitial="false" data-open="gsx005-B6" href="javascript:;" reveal-id="gsx005-B6"><span data-dcnode-id="9756" instrument_node="">Butler and Kitzinger, 1976</span></a><span data-dcnode-id="9754" instrument_node="">). The forty-one years between the two referendums witnessed the development of a sizable literature on factors that shape public attitudes toward the EU (e.g., </span><span class="xrefLink" data-dcnode-id="9753" id="jumplink-gsx005-B12"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9751" data-google-interstitial="false" data-open="gsx005-B12" href="javascript:;" reveal-id="gsx005-B12"><span data-dcnode-id="9752" instrument_node="">Eichenberg and Dalton, 1993</span></a><span data-dcnode-id="9750" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9749" id="jumplink-gsx005-B14"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9744" data-google-interstitial="false" data-open="gsx005-B14" href="javascript:;" reveal-id="gsx005-B14"><span data-dcnode-id="9748" instrument_node="">Franklin </span><em data-dcnode-id="9746"><span data-dcnode-id="9747" instrument_node="">et al.</span></em><span data-dcnode-id="9745" instrument_node="">, 1994</span></a><span data-dcnode-id="9743" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9742" id="jumplink-gsx005-B16"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9740" data-google-interstitial="false" data-open="gsx005-B16" href="javascript:;" reveal-id="gsx005-B16"><span data-dcnode-id="9741" instrument_node="">Gabel and Palmer, 1995</span></a><span data-dcnode-id="9739" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9738" id="jumplink-gsx005-B18"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9736" data-google-interstitial="false" data-open="gsx005-B18" href="javascript:;" reveal-id="gsx005-B18"><span data-dcnode-id="9737" instrument_node="">Gabel and Whitten, 1997</span></a><span data-dcnode-id="9735" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9734" id="jumplink-gsx005-B15"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9732" data-google-interstitial="false" data-open="gsx005-B15" href="javascript:;" reveal-id="gsx005-B15"><span data-dcnode-id="9733" instrument_node="">Gabel, 1998</span></a><span data-dcnode-id="9731" instrument_node="">; Hooghe and Marks, 2005, </span><span class="xrefLink" data-dcnode-id="9730" id="jumplink-gsx005-B37"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9728" data-google-interstitial="false" data-open="gsx005-B37" href="javascript:;" reveal-id="gsx005-B37"><span data-dcnode-id="9729" instrument_node="">Maier and Rittberger, 2008</span></a><span data-dcnode-id="9727" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9726" id="jumplink-gsx005-B3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9724" data-google-interstitial="false" data-open="gsx005-B3" href="javascript:;" reveal-id="gsx005-B3"><span data-dcnode-id="9725" instrument_node="">Armingeon and Ceka, 2014)</span></a><span data-dcnode-id="9723" instrument_node="">. These studies explore a range of factors, including the influence of parties and elites on public opinion (e.g. </span><span class="xrefLink" data-dcnode-id="9722" id="jumplink-gsx005-B44"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9717" data-google-interstitial="false" data-open="gsx005-B44" href="javascript:;" reveal-id="gsx005-B44"><span data-dcnode-id="9721" instrument_node="">Steenbergen </span><em data-dcnode-id="9719"><span data-dcnode-id="9720" instrument_node="">et al.</span></em><span data-dcnode-id="9718" instrument_node="">, 2007</span></a><span data-dcnode-id="9716" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9715" id="jumplink-gsx005-B42"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9713" data-google-interstitial="false" data-open="gsx005-B42" href="javascript:;" reveal-id="gsx005-B42"><span data-dcnode-id="9714" instrument_node="">Ray, 2003</span></a><span data-dcnode-id="9712" instrument_node="">), the effects of media coverage of the EU on support for integration (</span><span class="xrefLink" data-dcnode-id="9711" id="jumplink-gsx005-B45"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9706" data-google-interstitial="false" data-open="gsx005-B45" href="javascript:;" reveal-id="gsx005-B45"><span data-dcnode-id="9710" instrument_node="">Vliegenthart </span><em data-dcnode-id="9708"><span data-dcnode-id="9709" instrument_node="">et al.</span></em><span data-dcnode-id="9707" instrument_node="">, 2008</span></a><span data-dcnode-id="9705" instrument_node="">), the influence of national identities in shaping public attitudes (</span><span class="xrefLink" data-dcnode-id="9704" id="jumplink-gsx005-B7"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9702" data-google-interstitial="false" data-open="gsx005-B7" href="javascript:;" reveal-id="gsx005-B7"><span data-dcnode-id="9703" instrument_node="">Carey, 2002</span></a><span data-dcnode-id="9701" instrument_node="">), and the role of the economy in influencing support for further integration (</span><span class="xrefLink" data-dcnode-id="9700" id="jumplink-gsx005-B18"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9698" data-google-interstitial="false" data-open="gsx005-B18" href="javascript:;" reveal-id="gsx005-B18"><span data-dcnode-id="9699" instrument_node="">Gabel and Whitten, 1997</span></a><span data-dcnode-id="9697" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="9691"><span data-dcnode-id="9695" instrument_node="">Hooghe and Marks (2005) provide a succinct summary of findings on what drives public attitudes towards European integration in their paper: </span><em data-dcnode-id="9693"><span data-dcnode-id="9694" instrument_node="">‘Calculation, Community and Cues’.</span></em><span data-dcnode-id="9692" instrument_node=""> They conclude that attitudes are driven by three broad factors. First are calculations about perceived costs and benefits of integration, which vary according to who are seen to be the ‘winners or losers’ in this process. Second are community considerations that relate principally to social identities, with people who subscribe to a more exclusive national identity being significantly more Eurosceptic than those who acknowledge multiple identities, such as feeling ‘British’ and ‘European’. Third are cues or heuristics that voters use when forming opinions about the EU. These cues include images of party leaders and other prominent politicians as well as partisan attachments and ideological predispositions. Hooghe and Marks summarize their argument as follows:</span></p><blockquote data-dcnode-id="9688"><p class="chapter-para" data-dcnode-id="9689"><span data-dcnode-id="9690" instrument_node="">Citizens take the economic consequences of market integration into account, both for themselves and their countries. They evaluate European integration in terms of their communal identities and their views towards foreigners and foreign cultures. Further, their attitudes are cued by their ideological placement and by elites and political parties’(2005: 436–37).</span></p></blockquote><p data-dcnode-id="9687"></p><p class="chapter-para" data-dcnode-id="9650"><span data-dcnode-id="9686" instrument_node="">Cost-benefit calculations about European integration take different forms. Some of the earliest research stressed the importance of the objective social characteristics of individuals, such as their occupational status and educational backgrounds (</span><span class="xrefLink" data-dcnode-id="9685" id="jumplink-gsx005-B16"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9683" data-google-interstitial="false" data-open="gsx005-B16" href="javascript:;" reveal-id="gsx005-B16"><span data-dcnode-id="9684" instrument_node="">Gabel and Palmer, 1995</span></a><span data-dcnode-id="9682" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9681" id="jumplink-gsx005-B2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9679" data-google-interstitial="false" data-open="gsx005-B2" href="javascript:;" reveal-id="gsx005-B2"><span data-dcnode-id="9680" instrument_node="">Anderson and Reichert, 1996</span></a><span data-dcnode-id="9678" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9677" id="jumplink-gsx005-B15"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9675" data-google-interstitial="false" data-open="gsx005-B15" href="javascript:;" reveal-id="gsx005-B15"><span data-dcnode-id="9676" instrument_node="">Gabel 1998</span></a><span data-dcnode-id="9674" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9673" id="jumplink-gsx005-B31"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9671" data-google-interstitial="false" data-open="gsx005-B31" href="javascript:;" reveal-id="gsx005-B31"><span data-dcnode-id="9672" instrument_node="">Inglehart, 1970</span></a><span data-dcnode-id="9670" instrument_node="">). People with high status occupations who possess significant human capital tend to benefit from lower trade barriers and the increased geographical mobility of labour brought about by enhanced European integration. In contrast, individuals with low status, poorly paid occupations and few educational qualifications find themselves in competition with similarly low-skilled labour from EU member states. This limits job opportunities and drives down wages. As a result, high status individuals are likely to support EU integration, whereas lower status people are likely to oppose it (</span><span class="xrefLink" data-dcnode-id="9669" id="jumplink-gsx005-B16"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9667" data-google-interstitial="false" data-open="gsx005-B16" href="javascript:;" reveal-id="gsx005-B16"><span data-dcnode-id="9668" instrument_node="">Gabel and Palmer, 1995</span></a><span data-dcnode-id="9666" instrument_node="">). Recent research also suggests that high levels of education have become a more influential driver of support for the EU over time, with the less well-educated becoming less supportive (</span><span class="xrefLink" data-dcnode-id="9665" id="jumplink-gsx005-B25"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9660" data-google-interstitial="false" data-open="gsx005-B25" href="javascript:;" reveal-id="gsx005-B25"><span data-dcnode-id="9664" instrument_node="">Hakhverdian </span><em data-dcnode-id="9662"><span data-dcnode-id="9663" instrument_node="">et al</span></em><span data-dcnode-id="9661" instrument_node="">., 2013</span></a><span data-dcnode-id="9659" instrument_node="">). Other studies also have produced evidence which suggests that individual economic cost-benefit analyses have become increasingly important for explaining public reactions to the EU since the 2008 financial meltdown and ensuing Eurozone crisis (</span><span class="xrefLink" data-dcnode-id="9658" id="jumplink-gsx005-B28"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9656" data-google-interstitial="false" data-open="gsx005-B28" href="javascript:;" reveal-id="gsx005-B28"><span data-dcnode-id="9657" instrument_node="">Hobolt and Wratil 2015</span></a><span data-dcnode-id="9655" instrument_node="">; see also </span><span class="xrefLink" data-dcnode-id="9654" id="jumplink-gsx005-B27"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9652" data-google-interstitial="false" data-open="gsx005-B27" href="javascript:;" reveal-id="gsx005-B27"><span data-dcnode-id="9653" instrument_node="">Hobolt and deVries, 2016</span></a><span data-dcnode-id="9651" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="9633"><span data-dcnode-id="9649" instrument_node="">In their multi-country time-series analysis of attitudes towards EU integration, </span><span class="xrefLink" data-dcnode-id="9648" id="jumplink-gsx005-B18"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9646" data-google-interstitial="false" data-open="gsx005-B18" href="javascript:;" reveal-id="gsx005-B18"><span data-dcnode-id="9647" instrument_node="">Gabel and Whitten (1997)</span></a><span data-dcnode-id="9645" instrument_node=""> found that national inflation rates negatively affected support for EU integration over a five-year period in the 1980s. They also found that measures such as trade relationships between countries within the EU encouraged positive support for integration. However, their analysis indicated that subjective judgments about economic conditions were significantly more important than the objective performance of economies, a finding that echoes results from the economic voting literature (</span><span class="xrefLink" data-dcnode-id="9644" id="jumplink-gsx005-B35"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9642" data-google-interstitial="false" data-open="gsx005-B35" href="javascript:;" reveal-id="gsx005-B35"><span data-dcnode-id="9643" instrument_node="">Lewis-Beck, 1988</span></a><span data-dcnode-id="9641" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9640" id="jumplink-gsx005-B9"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9635" data-google-interstitial="false" data-open="gsx005-B9" href="javascript:;" reveal-id="gsx005-B9"><span data-dcnode-id="9639" instrument_node="">Clarke </span><em data-dcnode-id="9637"><span data-dcnode-id="9638" instrument_node="">et al</span></em><span data-dcnode-id="9636" instrument_node="">., 2009</span></a><span data-dcnode-id="9634" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="9593"><span data-dcnode-id="9632" instrument_node="">Regarding feelings of community, a number of studies demonstrate how attitudes toward EU membership and integration are influenced by attachments to one’s culture and society, as well as by a ‘fear of others’ which plays a significant role in defining identities (</span><span class="xrefLink" data-dcnode-id="9631" id="jumplink-gsx005-B7"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9629" data-google-interstitial="false" data-open="gsx005-B7" href="javascript:;" reveal-id="gsx005-B7"><span data-dcnode-id="9630" instrument_node="">Carey 2002</span></a><span data-dcnode-id="9628" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9627" id="jumplink-gsx005-B40"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9625" data-google-interstitial="false" data-open="gsx005-B40" href="javascript:;" reveal-id="gsx005-B40"><span data-dcnode-id="9626" instrument_node="">McLaren 2002</span></a><span data-dcnode-id="9624" instrument_node="">). For example, research on support for the UK Independence Party (UKIP) has documented the impact of anxiety over the perceived negative effects of immigration (</span><span class="xrefLink" data-dcnode-id="9623" id="jumplink-gsx005-B23"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9621" data-google-interstitial="false" data-open="gsx005-B23" href="javascript:;" reveal-id="gsx005-B23"><span data-dcnode-id="9622" instrument_node="">Goodwin and Milazzo, 2015</span></a><span data-dcnode-id="9620" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9619" id="jumplink-gsx005-B10"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9614" data-google-interstitial="false" data-open="gsx005-B10" href="javascript:;" reveal-id="gsx005-B10"><span data-dcnode-id="9618" instrument_node="">Clarke </span><em data-dcnode-id="9616"><span data-dcnode-id="9617" instrument_node="">et al</span></em><span data-dcnode-id="9615" instrument_node="">., 2016</span></a><span data-dcnode-id="9613" instrument_node="">). Hooghe and Marks (2004) suggest that national identity is more important than economic calculations for shaping attitudes about EU integration, a finding supported in later studies (e.g. </span><span class="xrefLink" data-dcnode-id="9612" id="jumplink-gsx005-B4"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9607" data-google-interstitial="false" data-open="gsx005-B4" href="javascript:;" reveal-id="gsx005-B4"><span data-dcnode-id="9611" instrument_node="">Boomgaarden </span><em data-dcnode-id="9609"><span data-dcnode-id="9610" instrument_node="">et al</span></em><span data-dcnode-id="9608" instrument_node="">., 2011</span></a><span data-dcnode-id="9606" instrument_node="">). However, evidence on the effects of identity is mixed, with positive relationships existing between Scottish and Welsh identities and support for European integration (</span><span class="xrefLink" data-dcnode-id="9605" id="jumplink-gsx005-B24"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9603" data-google-interstitial="false" data-open="gsx005-B24" href="javascript:;" reveal-id="gsx005-B24"><span data-dcnode-id="9604" instrument_node="">Haesly, 2001</span></a><span data-dcnode-id="9602" instrument_node="">). Similar findings have been obtained in studies of other European countries, particularly in Eastern Europe (</span><span class="xrefLink" data-dcnode-id="9601" id="jumplink-gsx005-B37"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9599" data-google-interstitial="false" data-open="gsx005-B37" href="javascript:;" reveal-id="gsx005-B37"><span data-dcnode-id="9600" instrument_node="">Maier and Rittberger, 2008</span></a><span data-dcnode-id="9598" instrument_node="">). Equally, in a laboratory experiment </span><span class="xrefLink" data-dcnode-id="9597" id="jumplink-gsx005-B46"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9595" data-google-interstitial="false" data-open="gsx005-B46" href="javascript:;" reveal-id="gsx005-B46"><span data-dcnode-id="9596" instrument_node="">Vossing (2015)</span></a><span data-dcnode-id="9594" instrument_node=""> found that individuals with exclusive national identities were more likely to be influenced by elites in forming their attitudes to European integration than individuals with mixed identities, suggesting that opinions can be quite volatile.</span></p><p class="chapter-para" data-dcnode-id="9572"><span data-dcnode-id="9592" instrument_node="">In Britain, one of the striking features of public attitudes towards membership of the EU is how volatile these attitudes can be (Whiteley </span><em data-dcnode-id="9590"><span data-dcnode-id="9591" instrument_node="">et al</span></em><span data-dcnode-id="9589" instrument_node="">., 2013; </span><span class="xrefLink" data-dcnode-id="9588" id="jumplink-gsx005-B10"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9583" data-google-interstitial="false" data-open="gsx005-B10" href="javascript:;" reveal-id="gsx005-B10"><span data-dcnode-id="9587" instrument_node="">Clarke </span><em data-dcnode-id="9585"><span data-dcnode-id="9586" instrument_node="">et al</span></em><span data-dcnode-id="9584" instrument_node="">., 2016</span></a><span data-dcnode-id="9582" instrument_node="">). </span><span class="xrefLink" data-dcnode-id="9581" id="jumplink-gsx005-F1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9579" data-google-interstitial="false" data-open="gsx005-F1" href="javascript:;" reveal-id="gsx005-F1"><span data-dcnode-id="9580" instrument_node="">Figure 1</span></a><span data-dcnode-id="9578" instrument_node=""> illustrates this point by showing trends in attitudes about EU membership in monthly Essex Continuing Monitoring surveys conducted between April 2004 and December 2015.</span><span class="xrefLink" data-dcnode-id="9577" id="jumplink-gsx005-FN3"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9574" data-google-interstitial="false" data-open="gsx005-FN3" href="javascript:;" reveal-id="gsx005-FN3"><sup data-dcnode-id="9575"><span data-dcnode-id="9576" instrument_node="">3</span></sup></a><span data-dcnode-id="9573" instrument_node=""> Since the 2010 general election, approval for EU membership varied by nearly 17 points, ranging from a low of 33.0 per cent in June 2011 to a high of 49.8 per cent in July 2015, before receding sharply to 39.2 per cent in November of that year. Disapproval of EU membership also fluctuated sharply and irregularly, reaching a high of 54.2 per cent in April 2012 before falling to a low of 36.5% in May 2015. In December 2015, shortly before the referendum campaign, 42.6 per cent approved of EU membership while 39.2 per cent disapproved.</span></p><span data-dcnode-id="9571" instrument_node=""> </span><a data-dcnode-id="9570" data-google-interstitial="false" id="89655089" scrollto-destination="89655089"></a><span data-dcnode-id="9569" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="9556" data-id="gsx005-F1"><div class="label fig-label" data-dcnode-id="9567"><span data-dcnode-id="9568" instrument_node="">Figure 1</span></div><div class="graphic-wrap" data-dcnode-id="9560"><img alt="Trends in attitudes towards UK membership in the EU, April 2004–December 2015." class="content-image" data-dcnode-id="9566" data-path-from-xml="gsx005f1.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f1.jpeg%3FExpires%3D1654213257%26Signature%3D4U1-445Ci0E81Zm5Ec0DYKoVTZDo3PsoFXudZBPuNUKEml2QPw9lDdljeNgr-fGlLiLLSxvWiFB3xJfsm3jxDdp2S5j3GBlXp7y6uB~AevZQ2BGT3CjO3urVohupJNfJz0iHRMCElLaEuLZygKK1SQAp~K~zXPJ9JNhHhtzCfOlNcBaq33EkKkxgHc6CxbAyjZMbEjpkilSHMmTszmiqIJs4JB~dY2TnRKVajU2ZKyUIrlxnjkJZoLIakw9YNa7PL-3O7ovJYxtquOkxheWwarj1E9DXkVuLGl0pqilUwKxf44PqkCxhd7N94XsAqAwsQdQ5DgkD1GmFgqwYgVFgSA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="9561"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="9564" data-google-interstitial="false" data-path-from-xml="gsx005f1.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655089/gsx005f1.tif" target="_blank"><span data-dcnode-id="9565" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9562" data-google-interstitial="false" data-path-from-xml="gsx005f1.tif" data-section="89655089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f1.jpeg%3FExpires%3D1654213257%26Signature%3DN5aDDkHwX3uzYZLz2gqu1mc3-RG1UDqxrw2IIS5CGTzOLErgtows9WlcnSbScjRpHGozBa9anGZ8BGmS6xYoekbiaSUIPwZg3Dvgkhcd-fLuyyceHqD1aasLTuFLYaWMvsxLua8D0fZRhLZR044-Uq7uGmTTTUlYNWnc08oDpZnJME2AaMNx~CHsbBPgbpWCSn2K-op8HZFeoOjzw9nZ~Axl0E61UcJf5FrK2KAaM92yjlTZNsNOritLbVt51QB5yERoOIGq9UxjjZJitp7jUQ06u1bI~Q59-DyS3SN192lYbstfxYAZ6uFPzUkNt1S-m-aYSiXR5sFPsgwE75k3Ag__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655089%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9563" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9557"><p class="chapter-para" data-dcnode-id="9558"><span data-dcnode-id="9559" instrument_node="">Trends in attitudes towards UK membership in the EU, April 2004–December 2015.</span></p></div></div><div class="fig fig-modal reveal-modal" content-id="gsx005-F1" data-dcnode-id="9543" style="display: block;"><div class="label fig-label" data-dcnode-id="9554"><span data-dcnode-id="9555" instrument_node="">Figure 1</span></div><div class="graphic-wrap" data-dcnode-id="9547"><img alt="Trends in attitudes towards UK membership in the EU, April 2004–December 2015." class="content-image" data-dcnode-id="9553" data-path-from-xml="gsx005f1.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f1.jpeg%3FExpires%3D1654213257%26Signature%3D4U1-445Ci0E81Zm5Ec0DYKoVTZDo3PsoFXudZBPuNUKEml2QPw9lDdljeNgr-fGlLiLLSxvWiFB3xJfsm3jxDdp2S5j3GBlXp7y6uB~AevZQ2BGT3CjO3urVohupJNfJz0iHRMCElLaEuLZygKK1SQAp~K~zXPJ9JNhHhtzCfOlNcBaq33EkKkxgHc6CxbAyjZMbEjpkilSHMmTszmiqIJs4JB~dY2TnRKVajU2ZKyUIrlxnjkJZoLIakw9YNa7PL-3O7ovJYxtquOkxheWwarj1E9DXkVuLGl0pqilUwKxf44PqkCxhd7N94XsAqAwsQdQ5DgkD1GmFgqwYgVFgSA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="9548"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="9551" data-google-interstitial="false" data-path-from-xml="gsx005f1.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655089/gsx005f1.tif" target="_blank"><span data-dcnode-id="9552" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9549" data-google-interstitial="false" data-path-from-xml="gsx005f1.tif" data-section="89655089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f1.jpeg%3FExpires%3D1654213257%26Signature%3DN5aDDkHwX3uzYZLz2gqu1mc3-RG1UDqxrw2IIS5CGTzOLErgtows9WlcnSbScjRpHGozBa9anGZ8BGmS6xYoekbiaSUIPwZg3Dvgkhcd-fLuyyceHqD1aasLTuFLYaWMvsxLua8D0fZRhLZR044-Uq7uGmTTTUlYNWnc08oDpZnJME2AaMNx~CHsbBPgbpWCSn2K-op8HZFeoOjzw9nZ~Axl0E61UcJf5FrK2KAaM92yjlTZNsNOritLbVt51QB5yERoOIGq9UxjjZJitp7jUQ06u1bI~Q59-DyS3SN192lYbstfxYAZ6uFPzUkNt1S-m-aYSiXR5sFPsgwE75k3Ag__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655089%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9550" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9544"><p class="chapter-para" data-dcnode-id="9545"><span data-dcnode-id="9546" instrument_node="">Trends in attitudes towards UK membership in the EU, April 2004–December 2015.</span></p></div></div><p class="chapter-para" data-dcnode-id="9536"><span data-dcnode-id="9542" instrument_node="">This pattern of ongoing large-scale volatility clearly presents a problem in explaining attitudes to the EU with a highly inertial variable like national identity. Identity is driven by deep-rooted cultural and historical forces and survey evidence indicates impressive levels of aggregate stability.</span><span class="xrefLink" data-dcnode-id="9541" id="jumplink-gsx005-FN4"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9538" data-google-interstitial="false" data-open="gsx005-FN4" href="javascript:;" reveal-id="gsx005-FN4"><sup data-dcnode-id="9539"><span data-dcnode-id="9540" instrument_node="">4</span></sup></a><span data-dcnode-id="9537" instrument_node=""> Yet the ‘fear of the other’ component of identity can change quickly, particularly if it is linked to a sudden crisis, for example over refugees in Europe or increases in levels of net migration due to the free movement of EU nationals. Equally, perceptions of the economic consequences of EU membership as well as cues provided by politicians whose popularity is volatile are also potential candidates for influencing attitudes towards EU membership. This implies that the balance of EU attitudes, especially in a highly charged referendum context, likely will be more dependent on immediate political issues, policy concerns and elite cues than on deeply rooted historical identities.</span></p><p class="chapter-para" data-dcnode-id="9527"><span data-dcnode-id="9535" instrument_node="">In this respect, the findings of earlier research are noteworthy. In their analysis of referendums on European integration </span><span class="xrefLink" data-dcnode-id="9534" id="jumplink-gsx005-B14"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9529" data-google-interstitial="false" data-open="gsx005-B14" href="javascript:;" reveal-id="gsx005-B14"><span data-dcnode-id="9533" instrument_node="">Franklin </span><em data-dcnode-id="9531"><span data-dcnode-id="9532" instrument_node="">et al</span></em><span data-dcnode-id="9530" instrument_node="">. (1994)</span></a><span data-dcnode-id="9528" instrument_node=""> showed that the votes held to ratify the 1992 Maastricht Treaty on the Single Market were best interpreted as public reactions to short-term, national and domestic issues rather than longer-term considerations about the overall future of the EU. Thus, the unpopularity of the governments in Denmark and France helped to ensure a rejection of the treaty in the former country and near rejection in the latter. Franklin and his colleagues contrast this with Ireland which had a more popular government at the time and where the referendum passed easily.</span></p><p class="chapter-para" data-dcnode-id="9506"><span data-dcnode-id="9526" instrument_node="">Subsequent studies have confirmed that attitudes towards the EU are closely tied to domestic political issues and policy-making (</span><span class="xrefLink" data-dcnode-id="9525" id="jumplink-gsx005-B3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9523" data-google-interstitial="false" data-open="gsx005-B3" href="javascript:;" reveal-id="gsx005-B3"><span data-dcnode-id="9524" instrument_node="">Armingeon and Ceka, 2014</span></a><span data-dcnode-id="9522" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9521" id="jumplink-gsx005-B39"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9519" data-google-interstitial="false" data-open="gsx005-B39" href="javascript:;" reveal-id="gsx005-B39"><span data-dcnode-id="9520" instrument_node="">Marsh 2015</span></a><span data-dcnode-id="9518" instrument_node="">). For example, </span><span class="xrefLink" data-dcnode-id="9517" id="jumplink-gsx005-B44"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9512" data-google-interstitial="false" data-open="gsx005-B44" href="javascript:;" reveal-id="gsx005-B44"><span data-dcnode-id="9516" instrument_node="">Steenbergen </span><em data-dcnode-id="9514"><span data-dcnode-id="9515" instrument_node="">et al</span></em><span data-dcnode-id="9513" instrument_node="">. (2007)</span></a><span data-dcnode-id="9511" instrument_node=""> argue that elite and mass opinions interact to influence public attitudes to integration. Similarly, </span><span class="xrefLink" data-dcnode-id="9510" id="jumplink-gsx005-B42"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9508" data-google-interstitial="false" data-open="gsx005-B42" href="javascript:;" reveal-id="gsx005-B42"><span data-dcnode-id="9509" instrument_node="">Ray (2003)</span></a><span data-dcnode-id="9507" instrument_node=""> shows that parties influence voters in relation to EU integration, but the effect depends on levels of elite agreement over integration and the strength of attachment that individuals have to various parties. This suggests that, in general, elite opinion will have a bigger influence on public attitudes when it is united than when it is divided.</span></p><span data-dcnode-id="9505" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="9503" id="89655093" scrollto-destination="89655093"><span data-dcnode-id="9504" instrument_node="">Theoretical Perspectives on Brexit Voting</span></h2><span data-dcnode-id="9502" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9500"><span data-dcnode-id="9501" instrument_node="">Based on the ‘Calculations, Communities and Cues’ framework outlined above, we would expect that voting in the 2016 referendum on EU membership is influenced by each of these three factors, but with some amendments to the analysis. Considering calculations first, this is commonly viewed as a ‘soft’ rational choice exercise in which voters evaluate the benefits of EU membership, often focusing on the economy and their own personal circumstances. They then weigh perceived benefits against perceived costs when making their voting decision. The present analysis takes this perspective into account using a battery of indicators designed to capture how benefit-cost calculations affected decision-making in the EU referendum.</span></p><p class="chapter-para" data-dcnode-id="9484"><span data-dcnode-id="9499" instrument_node="">As the referendum campaign and its aftermath revealed, public attitudes towards EU membership also have a strong emotional component. Although some people have a strong affinity with the concept of being a member of a wider community, others strongly resist this idea. Recent research on affective reasoning suggests that emotional aspects of decision-making have substantial effects on the political choices that people make (</span><span class="xrefLink" data-dcnode-id="9498" id="jumplink-gsx005-B38"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9493" data-google-interstitial="false" data-open="gsx005-B38" href="javascript:;" reveal-id="gsx005-B38"><span data-dcnode-id="9497" instrument_node="">Marcus </span><em data-dcnode-id="9495"><span data-dcnode-id="9496" instrument_node="">et al</span></em><span data-dcnode-id="9494" instrument_node="">., 2000</span></a><span data-dcnode-id="9492" instrument_node="">; Neuman </span><em data-dcnode-id="9490"><span data-dcnode-id="9491" instrument_node="">et al</span></em><span data-dcnode-id="9489" instrument_node="">.; </span><span class="xrefLink" data-dcnode-id="9488" id="jumplink-gsx005-B19"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9486" data-google-interstitial="false" data-open="gsx005-B19" href="javascript:;" reveal-id="gsx005-B19"><span data-dcnode-id="9487" instrument_node="">Garry, 2013</span></a><span data-dcnode-id="9485" instrument_node="">). For this reason, our survey included a question designed to capture the emotions people experience when they think about the EU. The expectation is quite simple—positive emotional reactions will promote voting for Remain and negative emotions will prompt voting for Leave.</span></p><p class="chapter-para" data-dcnode-id="9470"><span data-dcnode-id="9483" instrument_node="">Another important consideration relates to how risk perceptions affect referendum voting. In his review of research on referendums, </span><span class="xrefLink" data-dcnode-id="9482" id="jumplink-gsx005-B34"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9480" data-google-interstitial="false" data-open="gsx005-B34" href="javascript:;" reveal-id="gsx005-B34"><span data-dcnode-id="9481" instrument_node="">LeDuc (2003)</span></a><span data-dcnode-id="9479" instrument_node=""> identified a ‘status quo bias’ in voters’ decision making. When faced with a complex and difficult issue of the type posed by major ‘polity-shaping’ events like the referendums on Scottish independence or EU membership, risk-averse voters typically opt for the ‘the devil they know’. Prior to the beginning of a referendum campaign sizable numbers of people tell pollsters that they support the change being proposed. But, as the campaign progresses and decision day nears, some have misgivings, reconsider and, after a period of indecision, end up voting to keep things as they are. This pattern (‘LeDuc’s law’) is consistent with research in experimental economics and cognitive psychology that emphasizes the importance of risk orientations when individuals are making choices in contexts of high stakes and abundant uncertainty (</span><span class="xrefLink" data-dcnode-id="9478" id="jumplink-gsx005-B20"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9476" data-google-interstitial="false" data-open="gsx005-B20" href="javascript:;" reveal-id="gsx005-B20"><span data-dcnode-id="9477" instrument_node="">Gigerenzer, 2008</span></a><span data-dcnode-id="9475" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="9474" id="jumplink-gsx005-B33"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9472" data-google-interstitial="false" data-open="gsx005-B33" href="javascript:;" reveal-id="gsx005-B33"><span data-dcnode-id="9473" instrument_node="">Kahneman, 2011</span></a><span data-dcnode-id="9471" instrument_node="">). Accordingly, we incorporate a measure of perceptions of the risks of leaving the EU in our analyses.</span></p><p class="chapter-para" data-dcnode-id="9461"><span data-dcnode-id="9469" instrument_node="">We analyse community influences on attitudes towards the EU using data on perceptions of voters’ identifications as British, English, Scottish, Welsh, European or something else. As observed above, Hooghe and Marks make the case for the effects of such identities on attitudes towards the EU. However, our expectations about the impact of identities on voting in the 2016 referendum are tempered by recent research on voting in the 2014 Scottish Independence referendum and voting for the Scottish National Party (SNP) in elections to the Holyrood Parliament which tends to discount the importance of identity (</span><span class="xrefLink" data-dcnode-id="9468" id="jumplink-gsx005-B32"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9463" data-google-interstitial="false" data-open="gsx005-B32" href="javascript:;" reveal-id="gsx005-B32"><span data-dcnode-id="9467" instrument_node="">Johns </span><em data-dcnode-id="9465"><span data-dcnode-id="9466" instrument_node="">et al</span></em><span data-dcnode-id="9464" instrument_node="">., 2013</span></a><span data-dcnode-id="9462" instrument_node="">). Also, as noted above, evidence indicates that identities tend to be quite stable over extended time periods. Accordingly, if identities are influential, their effects likely will be antecedents in the causal chain of forces affecting referendum voting, rather than having an immediate effect on the voting decision</span></p><p class="chapter-para" data-dcnode-id="9449"><span data-dcnode-id="9460" instrument_node="">Research on how cues affect public attitudes towards the EU emphasizes the roles of political parties and party leaders.</span><span class="xrefLink" data-dcnode-id="9459" id="jumplink-gsx005-FN5"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9456" data-google-interstitial="false" data-open="gsx005-FN5" href="javascript:;" reveal-id="gsx005-FN5"><sup data-dcnode-id="9457"><span data-dcnode-id="9458" instrument_node="">5</span></sup></a><span data-dcnode-id="9455" instrument_node=""> In the case of the EU referendum the minor parties and their leaders such as UKIP and Nigel Farage, the SNP and Nicola Sturgeon and the Liberal Democrats and Tim Farron adopted clear and well publicised positions. In contrast, both Labour and the Conservatives were divided on the referendum question—the latter much more so than the former. Prime Minister David Cameron campaigned vigorously for Remain while former London mayor Boris Johnson—also a very prominent Conservative politician—campaigned to leave alongside less well-known Eurosceptic cabinet ministers, such as Michael Gove, Chris Grayling and Priti Patel. Johnson was widely seen as an unofficial leader of the Leave campaign. As extremely high profile figures on opposite sides of the referendum question, Cameron and Johnson were heavily covered by media throughout the campaign.</span><span class="xrefLink" data-dcnode-id="9454" id="jumplink-gsx005-FN6"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9451" data-google-interstitial="false" data-open="gsx005-FN6" href="javascript:;" reveal-id="gsx005-FN6"><sup data-dcnode-id="9452"><span data-dcnode-id="9453" instrument_node="">6</span></sup></a><span data-dcnode-id="9450" instrument_node=""> This gave them ample opportunity to cue the public about how to vote on June 23rd. In contrast, since the Conservative Party as a whole was deeply divided and had been sending contradictory messages about ‘Europe’ to the electorate for many years before the campaign began, this very likely muted the impact of a more general Conservative partisan heuristic.</span></p><p class="chapter-para" data-dcnode-id="9447"><span data-dcnode-id="9448" instrument_node="">Labour was more united on the issue of UK membership with only a handful of MPs such as Gisela Stuart and Frank Field supporting Brexit. However, Labour’s internal discord over the leadership of Jeremy Corbyn, who was seen as providing a lukewarm endorsement of continued EU membership, meant that Labour was sending mixed messages to the voters. Corbyn’s unwillingness to campaign enthusiastically for Remain was traced by many journalists to his well-documented Eurosceptic sentiments in earlier years. Corbyn’s desultory campaign efforts, together with the much publicised Conservative divisions over the EU, eroded the strength of cueing effects of the Labour Party and its leader.</span></p><span data-dcnode-id="9446" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="9444" id="89655100" scrollto-destination="89655100"><span data-dcnode-id="9445" instrument_node="">Data and Methods</span></h2><span data-dcnode-id="9443" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9423"><span data-dcnode-id="9442" instrument_node="">The data employed to study voting in the EU referendum were generated by a national panel survey</span><span class="xrefLink" data-dcnode-id="9441" id="jumplink-gsx005-FN7"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9438" data-google-interstitial="false" data-open="gsx005-FN7" href="javascript:;" reveal-id="gsx005-FN7"><sup data-dcnode-id="9439"><span data-dcnode-id="9440" instrument_node="">7</span></sup></a><span data-dcnode-id="9437" instrument_node=""> conducted as part of the Essex Continuous Monitoring Survey. The first wave of the survey was in the field from the 18th to 20th of June and the second wave was conducted shortly after the referendum on June 27th to June 29th. The sample sizes for the pre- and post-referendum waves were </span><em data-dcnode-id="9435"><span data-dcnode-id="9436" instrument_node="">N</span></em><span data-dcnode-id="9434" instrument_node=""> = 2218 and </span><em data-dcnode-id="9432"><span data-dcnode-id="9433" instrument_node="">N</span></em><span data-dcnode-id="9431" instrument_node=""> = 1993, respectively. The panel design is well-suited for studying how various factors affected voting in the referendum. Voting was measured in the post-referendum wave and, with the exception of campaign contacts, all predictor variables were measured in the pre-referendum wave. Measuring predictor variables in the pre-referendum wave of the survey helps alleviate threats to inference which can bedevil analyses that rely on cross-sectional data (see, e.g., </span><span class="xrefLink" data-dcnode-id="9430" id="jumplink-gsx005-B47"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9425" data-google-interstitial="false" data-open="gsx005-B47" href="javascript:;" reveal-id="gsx005-B47"><span data-dcnode-id="9429" instrument_node="">Whiteley </span><em data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">et al</span></em><span data-dcnode-id="9426" instrument_node="">., 2016</span></a><span data-dcnode-id="9424" instrument_node="">).</span></p><span data-dcnode-id="9422" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="9420" id="89655102" scrollto-destination="89655102"><span data-dcnode-id="9421" instrument_node="">Results</span></h2><span data-dcnode-id="9419" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="9413"><span data-dcnode-id="9418" instrument_node="">In the pre-referendum wave of the Essex CMS referendum panel survey, 46.4 per cent of respondents intending to vote reported that they would vote Remain and 47.9 per cent indicated they would vote Leave, with the remaining 5.8 per cent saying they ‘didn’t know’. If, as discussed earlier, many in the latter group ultimately would decide to stick with the status quo, these numbers suggest that Remain might have been able to secure a narrow victory by attracting most of those who had not made up their minds. Of course, that did not happen—on June 23rd, 51.9 per cent voted Leave and 48.1per cent voted Remain. Vote totals in the post-referendum wave of our survey closely mirrored the result, with 50.7 per cent stating they had voted Leave and 49.3 per cent saying that they had voted Remain.</span><span class="xrefLink" data-dcnode-id="9417" id="jumplink-gsx005-FN8"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="9414" data-google-interstitial="false" data-open="gsx005-FN8" href="javascript:;" reveal-id="gsx005-FN8"><sup data-dcnode-id="9415"><span data-dcnode-id="9416" instrument_node="">8</span></sup></a></p><p class="chapter-para" data-dcnode-id="9395"><span data-dcnode-id="9412" instrument_node="">In the earlier discussion, we argued that benefit-cost considerations were likely to be very important for explaining the vote. </span><span class="xrefLink" data-dcnode-id="9411" id="jumplink-gsx005-F2"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9409" data-google-interstitial="false" data-open="gsx005-F2" href="javascript:;" reveal-id="gsx005-F2"><span data-dcnode-id="9410" instrument_node="">Figures 2</span></a><span data-dcnode-id="9408" instrument_node=""> and </span><span class="xrefLink" data-dcnode-id="9407" id="jumplink-gsx005-F3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9405" data-google-interstitial="false" data-open="gsx005-F3" href="javascript:;" reveal-id="gsx005-F3"><span data-dcnode-id="9406" instrument_node="">3</span></a><span data-dcnode-id="9404" instrument_node=""> display responses to survey questions about the perceived costs and benefits of leaving or remaining in the EU. The questions address several topics, including the economy, personal finances, immigration, terrorism, foreign affairs, and sovereignty. As </span><span class="xrefLink" data-dcnode-id="9403" id="jumplink-gsx005-F2"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9401" data-google-interstitial="false" data-open="gsx005-F2" href="javascript:;" reveal-id="gsx005-F2"><span data-dcnode-id="9402" instrument_node="">Figure 2</span></a><span data-dcnode-id="9400" instrument_node=""> illustrates, respondents were inclined to think that if Britain left the EU then it would be worse off regarding the economy (39 per cent v. 24 per cent) and their own financial circumstances (30 per cent v. 12 per cent), but they felt very differently about immigration—fully 51 per cent thought that there would be less immigration if the UK left the EU and only 3 per cent thought that there would be more. At the same time, </span><span class="xrefLink" data-dcnode-id="9399" id="jumplink-gsx005-F3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9397" data-google-interstitial="false" data-open="gsx005-F3" href="javascript:;" reveal-id="gsx005-F3"><span data-dcnode-id="9398" instrument_node="">Figure 3</span></a><span data-dcnode-id="9396" instrument_node=""> shows that a plurality (41 per cent) agreed with the proposition that EU membership helped to provide workers for jobs that Britons are unwilling to do.</span></p><span data-dcnode-id="9394" instrument_node=""> </span><a data-dcnode-id="9393" data-google-interstitial="false" id="89655105" scrollto-destination="89655105"></a><span data-dcnode-id="9392" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="9379" data-id="gsx005-F2"><div class="label fig-label" data-dcnode-id="9390"><span data-dcnode-id="9391" instrument_node="">Figure 2</span></div><div class="graphic-wrap" data-dcnode-id="9383"><img alt="Perceived benefits and costs of leaving EU." class="content-image" data-dcnode-id="9389" data-path-from-xml="gsx005f2.tif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/m_gsx005f2.jpeg%3FExpires%3D1654213257%26Signature%3DGGUYae41JgAaqcGaSQzOlIhuu~JYtUERGKXj~wqPWSCepH-3lN-mG39iqck047wuJg4dErwGe~yn3VGWY5J6o0N7GPnasooXK-4C2~jSoMrJVzutyC6KAgN-bwQ1kktWQF2rQZ7jJvIE4hM3CyB-hBl7pVJezcXw4yOxubzP9vGwTeg7O8~Ab8bfGai8HBQZI5XNaTDPgFgywc-gspUCMup1t~bkIaO1CGpapEGhXdvvQBUXcBrK0My6Nj7NkdCa4ZPWSdguPne5eAcv~7OqD~pNyhBIOGtSgGOFUOfuRDA~nfjaQv9yCtQmZ1Jlz4lJyrJjCJQ4Ou6u9Lqlew02vA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="9384"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="9387" data-google-interstitial="false" data-path-from-xml="gsx005f2.tif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/89655105/gsx005f2.tif" target="_blank"><span data-dcnode-id="9388" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9385" data-google-interstitial="false" data-path-from-xml="gsx005f2.tif" data-section="89655105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f2.jpeg%3FExpires%3D1654213257%26Signature%3DXuU919FfbRnS0UN4oHCjrf7qIo5NZvoKIEDPvucxHPt7yj9Z454slaBbAFlmDqU1Xh1ZD2wvvvB1LcRK84OTrv4iSsjrCX~RA3XR2twJHDPk0SBAH4rDMb2KAPBxrtxEHZ8~RkhsfLoiRQlup9G lank"><span data-dcnode-id="9346" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9343" data-google-interstitial="false" data-path-from-xml="gsx005f3.tif" data-section="89655106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f3.jpeg%3FExpires%3D1654213257%26Signature%3DVVd50R~M9yZ-NW91pDhYiHGJWm6diSZ3Wbat8Xv4ZcbOAQ2UXhEbiFCqDzLyPWffjSQhjkl~StIjq~MWA8OHxnG20EVH4z-5nDvP~XqPu70pgafFd32VMpA6q2riU5v7-SKi3eZd7q8azYmO03dQ1tDjpdrgWfRCPmyaK~w0~en0J-thc3XbrP-9kj7VEL3IqErJ76u4aAois6Fx267dikrywqjzhTbKDl4trR7IbLY8vb7veWbVpQpDcpZZgXSrCsVUAvuyG2Hg5TqgprUki7qtTaqg4HEGNeQ6XwzOgkduX3ma4NMigMIzxCWMZ8Z3T2G7T-waOBIkmTayGh0IYA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655106%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9344" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9338"><p class="chapter-para" data-dcnode-id="9339"><span data-dcnode-id="9340" instrument_node="">Perceived benefits and costs of staying in EU.</span></p></div></div><p class="chapter-para" data-dcnode-id="9331"><span data-dcnode-id="9336" instrument_node="">During the referendum campaign the Remain side championed the EU as a force for peace as well as prosperity. A plurality of our survey respondents agreed—37 per cent believed that EU membership helped to keep the peace in Europe while 29 per cent thought the opposite. With regard to international affairs 21 per cent believed the UK would have less influence in world affairs if it left the EU while 15 per cent thought it would have more influence. However, a clear majority of 51 per cent indicated that they thought EU membership eroded British sovereignty. Finally, there was a tendency to think that continued EU membership enhanced the risk of terrorism. Specifically, 21 per cent stated that the risk would be greater if the UK stayed in the EU and 16 per cent said the risk would be smaller if it left. When asked a second question on the topic, the difference was larger—47 per cent agreed that there would be more terrorism if the country remained in the EU and 28 per cent disagreed (see </span><span class="xrefLink" data-dcnode-id="9335" id="jumplink-gsx005-F3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9333" data-google-interstitial="false" data-open="gsx005-F3" href="javascript:;" reveal-id="gsx005-F3"><span data-dcnode-id="9334" instrument_node="">Figure 3</span></a><span data-dcnode-id="9332" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="9325"><span data-dcnode-id="9330" instrument_node="">Confirmatory factor analysis (CFA) (</span><span class="xrefLink" data-dcnode-id="9329" id="jumplink-gsx005-B1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9327" data-google-interstitial="false" data-open="gsx005-B1" href="javascript:;" reveal-id="gsx005-B1"><span data-dcnode-id="9328" instrument_node="">Acock, 2013</span></a><span data-dcnode-id="9326" instrument_node="">) is used to summarize these several perceived benefits and costs of leaving the EU. This analysis suggested that two factors could provide a useful representation of the data. Items focusing on the economy and Britain’s influence in the world load heavily on factor one, whereas items focusing on immigration and security issues load heavily on factor two. Factor scores derived from the CFA analysis are employed in the multivariate modelling presented below.</span></p><p class="chapter-para" data-dcnode-id="9316"><span class="xrefLink" data-dcnode-id="9324" id="jumplink-gsx005-F4"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9322" data-google-interstitial="false" data-open="gsx005-F4" href="javascript:;" reveal-id="gsx005-F4"><span data-dcnode-id="9323" instrument_node="">Figure 4</span></a><span data-dcnode-id="9321" instrument_node=""> contains frequency distributions for variables measuring emotional reactions to EU membership. These items are derived from a question asking respondents to describe their feelings about the country’s EU membership by selecting up to four words from a list of eight descriptors. Four of the words described positive emotional reactions and four described negative reactions. The figure illustrates that feelings of unease dominated with 44 per cent selecting this word. Although 26 per cent of the respondents described their feelings as ‘hopeful’ and this was the second most popular choice in the list no other positive word was selected by more than 14 per cent. Overall, as the two bars on the far right of </span><span class="xrefLink" data-dcnode-id="9320" id="jumplink-gsx005-F3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9318" data-google-interstitial="false" data-open="gsx005-F3" href="javascript:;" reveal-id="gsx005-F3"><span data-dcnode-id="9319" instrument_node="">Figure 3</span></a><span data-dcnode-id="9317" instrument_node=""> indicate, 32 per cent chose one or more positive words, while 50 per cent chose one or more negative words. On the eve of the referendum negative emotions clearly outweighed positive ones when people thought about UK membership in the EU.</span></p><span data-dcnode-id="9315" instrument_node=""> </span><a data-dcnode-id="9314" data-google-interstitial="false" id="89655110" scrollto-destination="89655110"></a><span data-dcnode-id="9313" instrument_node="">

"9296" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="9293" data-google-interstitial="false" data-path-from-xml="gsx005f4.tif" data-section="89655110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/pa/70/3/10.1093_pa_gsx005/2/gsx005f4.jpeg%3FExpires%3D1654213257%26Signature%3DzB6Ja3-1ac9H6MQ5qXPs0q3KoJs5jmpqDVynMTEWL6MlflqCa1OKnTFp3yGEgB44smwdWAUcFZXesN8Zw~~rCRsUAqMxc02yoY8i~NOep6v1sABF4ycNMXiercLSVHj3Y4DGl5rjweyGGT5hnkb-tn8i0CmCEuEznzkw9RRtKsU94tiNURiZoXBzeqWjrBgW7~8Vkk7eShJzrd93FbHjzGpKM1jPa8rrsUjDUItNzx913qo1E-ojXyGfVHUksdsPNUOn-G7sACCXhZHL1G6IsyIUr25E9sg-FQ4aMi5NdcMol5el-iYcSV7G5RSC9lPQWUokSonVQmrZ9Ozwy9yLAw__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D89655110%26ar%3D3109029%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5496"><span data-dcnode-id="9294" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="9288"><p class="chapter-para" data-dcnode-id="9289"><span data-dcnode-id="9290" instrument_node="">Emotional reactions to EU membership.</span></p></div></div><p class="chapter-para" data-dcnode-id="9282"><span class="xrefLink" data-dcnode-id="9286" id="jumplink-gsx005-F5"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="9284" data-google-interstitial="false" data-open="gsx005-F5" href="javascript:;" reveal-id="gsx005-F5"><span data-dcnode-id="9285" instrument_node="">Figure 5</span></a><span data-dcnode-id="9283" instrument_node=""> displays responses to a question which asked people to use an 11-point scale to indicate how risky leaving the European Union would be. On the scale, 0 indicates ‘no risk’ and 10 ‘very risky’. As the figure illustrates, risk perceptions were widely dispersed. Although the mean score (5.6) was very close to the scale’s mid-point (5), opinion was tilted towards the ‘risky’ end, with a majority (54 per cent) assigning scores of six of greater. In contrast, only one-third (33 per cent) gave scores below the mid-point, thereby indicating that they did not think the risks would be severe. If risk assessments influenced referendum voting, the expectation is that the more risk people perceived the less likely they would be to prefer Brexit.</span></p><span data-dcnode-id="9281" instrument_node=""> </span><a data-dcnode-id="9280" data-google-interstitial="false" id="89655112" scrollto-destination="89655112"></a><span data-dcnode-id="9279" instrument_node="">
