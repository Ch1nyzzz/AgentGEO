</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">It’s so important that we have a body that represents all musicians. We need a voice and people to negotiate on our behalf, especially now.</span></p><span data-dcnode-id="465" instrument_node="">

</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">For me it’s all about strength in numbers. I love being a musician and I love this industry, and it’s easier to represent collective interests than it is to represent individual interests.</span></p><span data-dcnode-id="449" instrument_node="">

</span><cite data-dcnode-id="421"><span data-dcnode-id="424" instrument_node="">Maxine Kwok-Adams</span><span data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">First violin with the LSO</span></span></cite><span data-dcnode-id="420" instrument_node="">
