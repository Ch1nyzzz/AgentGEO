</span><div class="h1-banner-title" data-dcnode-id="2253"><h1 data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">BREXIT - An Overview</span></h1></div><span data-dcnode-id="2252" instrument_node="">
</span><article class="post-993904 post type-post status-publish format-standard hentry category-issues-in-news" data-dcnode-id="1580" id="post-993904"><span data-dcnode-id="2251" instrument_node="">
</span><link data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><link data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><p data-dcnode-id="2244"><span data-dcnode-id="2248" instrument_node="">BREXIT in simple terms refers to Britain holding a referendum to decide whether it wants to continue membership under the EU or not. The referendum was held on 23</span><sup data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">rd</span></sup><span data-dcnode-id="2245" instrument_node=""> June 2016 and 52% voted for BREXIT whereas 48% voted for remaining within the EU. Although the referendum is not binding on Britain’s parliament, the PM has announced that he has to respect the will of the people.</span></p><span data-dcnode-id="2243" instrument_node="">

</span><p data-dcnode-id="2157"><strong data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">“We are in the midst of an age of competitive devaluation and beggar-thy-neighbor policy. When elephants fight, the grass suffers.”-Mr. Raghuram Rajan</span></strong></p><span data-dcnode-id="2156" instrument_node="">
</span><h2 data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Background</span></h2><span data-dcnode-id="2153" instrument_node="">
</span><ol data-dcnode-id="2106"><span data-dcnode-id="2152" instrument_node="">
</span><li data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Post the Second World War, two countries Germany and France came together and decided that they wanted to establish trade relations as it would prevent their countries waging war against each other in the future.</span></li><span data-dcnode-id="2149" instrument_node="">
</span><li data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">The result was the 6 members (France, Germany, Italy, Belgium, Luxemburg, and the Netherlands) signed a deal covering resources like coal and steel.</span></li><span data-dcnode-id="2146" instrument_node="">
</span><li data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">In 1957 a treaty was signed in Rome (Europe)-European Economic Community (EEC) or Common Market</span></li><span data-dcnode-id="2143" instrument_node="">
</span><li data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">This has expanded and now has 28 member states.</span></li><span data-dcnode-id="2140" instrument_node="">
</span><li data-dcnode-id="2108"><span data-dcnode-id="2139" instrument_node="">There are four key institutions in the EU
</span><ol data-dcnode-id="2110"><span data-dcnode-id="2138" instrument_node="">
</span><li data-dcnode-id="2134"><strong data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">European Commission-</span></strong><span data-dcnode-id="2135" instrument_node=""> based at Brussels (Belgium), it consists of 28 commissioners (1 each from the member states, it administers the money spent and also formulates new laws</span></li><span data-dcnode-id="2133" instrument_node="">
</span><li data-dcnode-id="2127"><strong data-dcnode-id="2129"><span data-dcnode-id="2132" instrument_node="">European Parliament</span><u data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">–</span></u></strong><span data-dcnode-id="2128" instrument_node=""> based at Brussels (Belgium), there are 751 members in the parliament, their function is to discuss and vote all the laws that have been proposed by EC</span></li><span data-dcnode-id="2126" instrument_node="">
</span><li data-dcnode-id="2117"><strong data-dcnode-id="2122"><span data-dcnode-id="2125" instrument_node="">Council of European Union</span><u data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">–</span></u></strong><span data-dcnode-id="2121" instrument_node=""> based at Brussels (Belgium), It is where the government of each member country will have their say and hold discussions as to in what political direction should the </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/european-union-eu/"><span data-dcnode-id="2120" instrument_node="">European Union</span></a><span data-dcnode-id="2118" instrument_node=""> be moving. Usually, the deals are signed at the end of the discussions</span></li><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2112"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">European Court of Justice-</span></strong><span data-dcnode-id="2113" instrument_node=""> based at Luxembourg. The function is to make sure that all the member states abide by the rules and regulations; will also come into picture if there are any frictions between the above three institutions.</span></li><span data-dcnode-id="2111" instrument_node="">
</span></ol><span data-dcnode-id="2109" instrument_node="">
</span></li><span data-dcnode-id="2107" instrument_node="">
</span></ol><span data-dcnode-id="2105" instrument_node="">
</span><h3 data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Great Britain</span></h3><span data-dcnode-id="2102" instrument_node="">
</span><ul data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">It became a member country in 1973 and held the first referendum in regards to the EU in 1975 (when they voted to stay in the EU)</span></li><span data-dcnode-id="2098" instrument_node="">
</span></ul><span data-dcnode-id="2096" instrument_node="">
</span><div class="highlightbox" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">A referendum is a vote in which everyone of voting age takes part specifying –yes or no- answer to a question. Whichever side gets the majority of votes (of the total votes cast) is considered to be a winner.</span></div><span data-dcnode-id="2093" instrument_node="">
</span><ul data-dcnode-id="2062"><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Today the arguments in favor of BREXIT have increased because the representatives of BRITAIN are of the opinion that the EU over the decades has undergone a lot of transformation and has taken away the powers of Britain to decide on various matters</span></li><span data-dcnode-id="2089" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2088" instrument_node="">Some of the reasons for Britain to seek BREXIT are
</span><ol data-dcnode-id="2066"><span data-dcnode-id="2087" instrument_node="">
</span><li data-dcnode-id="2083"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Sovereignty-</span></strong><span data-dcnode-id="2084" instrument_node=""> Although the British Government influences some form in selecting the members to the European Commission, the members are neither under the influence nor accountable to the British Parliament and some of the policy decisions such as competition policy, agriculture, copyright, and patent law go against the interests of Britain (these laws override the domestic laws)</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2078"><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Regulations are becoming a Burden- </span></strong><span data-dcnode-id="2079" instrument_node="">Some of the regulations such as –limits on the power of vacuum cleaners, non-recycling of tea bags, etc have often been seen as a burden on some of the conservatives in Britain. As per Michel Gove, these regulations have cost Britain to the tune of £3 billion per year.</span></li><span data-dcnode-id="2077" instrument_node="">
</span><li data-dcnode-id="2073"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Euro the Disaster –</span></strong><span data-dcnode-id="2074" instrument_node=""> although the Euro is the common currency for the EU, Britain still uses the pound as its currency. Now if the euro had to be successful then it would have required greater fiscal and monetary integration and this cannot be achieved unless all the member states have the same currency. The problem with the euro as a common currency has also been exposed wherein on one side countries such as Greece and Spain are suffering from high debt, high unemployment, whereas other countries such as Germany are enjoying higher growth. Now in this situation, the ECB (European Central Bank) is in a dilemma whether to go for fiscal stimulus or prudence.</span></li><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2068"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Immigration-</span></strong><span data-dcnode-id="2069" instrument_node=""> Britain is not a signatory of the Schengen Border free zone (allows easy travel across Europe), over the last ten years there has been a quite an opposition towards migration into the country from within the EU and its effects on wages and public services especially post 2008 recession wherein the workers from Lithuania, Poland, Italy, Romania, etc have moved to Britain</span></li><span data-dcnode-id="2067" instrument_node="">
</span></ol><span data-dcnode-id="2065" instrument_node="">
</span></li><span data-dcnode-id="2063" instrument_node="">
</span></ul><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">The “leave” proponents show the example of Canada and Australia which follow a point-based immigration system and say Britain could adopt such measure rather than being forced to follow the laws laid down by the EU</span></p><span data-dcnode-id="2058" instrument_node="">
</span><div class="highlightbox" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Point-based immigration system-under this the potential migrants are awarded points based on factors such as language, job skills, education, and age. In simple words, those who can contribute to the economy once they allowed to immigrate will be rated higher</span></div><span data-dcnode-id="2055" instrument_node="">
</span><ol data-dcnode-id="2043"><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2050"><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Finance-</span></strong><span data-dcnode-id="2051" instrument_node=""> although the EU doesn’t have the powers to collect the taxes from the people directly, it mandates member countries to make payments. In the case of Britain, it comes around $19 bn per year or $300/person. Although the funds are again used on Britain, the BREXIT supporters say, the money could be used more efficiently if Britain is out of the EU</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2045"><strong data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">EU Pro or Anti Corporate?-</span></strong><span data-dcnode-id="2046" instrument_node=""> there has been a mixed response to this question. The far left in Britain argues that the EU is too pro-corporate and the far-right argues the vice versa</span></li><span data-dcnode-id="2044" instrument_node="">
</span></ol><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2038"><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Any Measures Taken to Prevent Call for BREXIT-</span></strong><span data-dcnode-id="2039" instrument_node=""> At the beginning of 2016, David Cameroon (Britain’s former PM) sought an agreement to change the terms of Britain’s membership, the deal was conditioned on BREXIT outcome to remain within EU.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><h3 data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Some of the Points Under the Agreement are</span></h3><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032" style="padding-left: 30px;"><span data-dcnode-id="2033" instrument_node="">a) Migrant workers will still be able to send child benefit payments back to their home country ( Mr. Cameron had wanted this abolished), but the payments will be set at a level reflecting the cost of living in their home country rather than the full UK rate</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2029" style="padding-left: 30px;"><span data-dcnode-id="2030" instrument_node="">b) New migrant arrivals will not be able to claim tax credits and other welfare payments straight away – but will gradually gain the right to more benefits. (he had promised a blanket ban)</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026" style="padding-left: 30px;"><span data-dcnode-id="2027" instrument_node="">c) Britain will retain the pound also an assurance from the EU that it will not be discriminated against as it has a different currency and any money of Britain used to bail out the nations in crisis (in Euro Zone) will be reimbursed.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023" style="padding-left: 30px;"><span data-dcnode-id="2024" instrument_node="">d) Britain’s large financial service industry will be protected from the imposition of eurozone regulations</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020" style="padding-left: 30px;"><span data-dcnode-id="2021" instrument_node="">e) It will be incorporated in an EU treaty change that Britain will not be a part of “ever closer union” (one of the core principles of EU).</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2014" style="padding-left: 30px;"><span data-dcnode-id="2018" instrument_node="">f) </span><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Red Card System-</span></strong><span data-dcnode-id="2015" instrument_node=""> If 55% of national EU parliaments object to a piece of legislation then the legislation has to be rethought (the critics say it is not clear if this would ever be used in practice).</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The critics pointed out that what was proposed under the agreements made no change and fell short of what he had promised when he had announced his plan for a referendum.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><h3 data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Why Scotland Voted in Favor of Staying</span></h3><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">As per the numbers, it was found that 62% of the voters in Scotland chose to remain within the EU. The reasons for their decision are given below.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002" style="padding-left: 30px;"><span data-dcnode-id="2003" instrument_node="">a) EU is a common market which not only allows the movement of four freedoms (finance, goods, services, and labour) but also provides a huge market for Scotland to export</span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999" style="padding-left: 30px;"><span data-dcnode-id="2000" instrument_node="">b) With Scotland being a part of the EU, the trade barriers will be eliminated to a great extent (both for exports from and imports into Scotland)</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996" style="padding-left: 30px;"><span data-dcnode-id="1997" instrument_node="">c) Scotland has been attracting foreign investments as a result of which there has been employment creation, contribution to growth, etc (in 2013, 40% of the companies in Scotland were foreign-owned which employed more than 3 lakh workers)</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993" style="padding-left: 30px;"><span data-dcnode-id="1994" instrument_node="">d) When the EU negotiates a deal with other countries (has trade deals with more than 50 countries), it is automatically applicable to Scotland but with BREXIT, Scotland may be forced to sign all the deals again with the trade partners (the advantages may be lost)</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990" style="padding-left: 30px;"><span data-dcnode-id="1991" instrument_node="">e) As a member of the EU, it will get access to various development funds (Regional Social Funding, Rural Development Programme, etc)</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987" style="padding-left: 30px;"><span data-dcnode-id="1988" instrument_node="">f) With BREXIT, the citizens of Scotland may lose the freedom of movement i.e. to move freely in Europe</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984" style="padding-left: 30px;"><span data-dcnode-id="1985" instrument_node="">g) In a nutshell, Scotland is much safer than remaining within rather than moving out of the EU. (on moving out it will face security/terrorist threats, climate change, trade barriers, etc all alone)</span></p><span data-dcnode-id="1983" instrument_node="">
</span><h3 data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The exit of the United Kingdom From the European Union</span></h3><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1979" instrument_node="">The United Kingdom finally left the European Union (EU)&nbsp;on 31</span><sup data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">st</span></sup><span data-dcnode-id="1976" instrument_node="">&nbsp;January 2020. It was a long-awaited historical move that must bring an important change in the policies and politics of the remaining 27&nbsp;European Union&nbsp;members states and the U.K. mainly.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1971"><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Withdrawal Agreement Between European Union and the United Kingdom</span></strong></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Despite being a huge move, the final exiting process did not create turmoil because of the Withdrawal Agreement that was negotiated in 2019 between the European Union and the United Kingdom.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><ul data-dcnode-id="1953"><span data-dcnode-id="1966" instrument_node="">
</span><li data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Under this, a&nbsp;transition period of 11 months&nbsp;was finalized&nbsp;until December 2020. However, it might get delayed until 2022 or 2023.</span></li><span data-dcnode-id="1963" instrument_node="">
</span><li data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">The transition period makes sure that there is not a sudden shock but a degree of continuity and allows both parties to secure an orderly Brexit, minimizing disruption for the citizens, businesses, public administrations, as well as for international partners.</span></li><span data-dcnode-id="1960" instrument_node="">
</span><li data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">During the transition period, the&nbsp;U.K. will continue to participate&nbsp;in the EU’s&nbsp;Customs Union&nbsp;and in the&nbsp;Single Market.</span></li><span data-dcnode-id="1957" instrument_node="">
</span><li data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">The United Kingdom will&nbsp;apply European Union law&nbsp;even if it is no longer a Member State and will also&nbsp;continue to abide by the international agreements&nbsp;of the EU.</span></li><span data-dcnode-id="1954" instrument_node="">
</span></ul><span data-dcnode-id="1952" instrument_node="">
</span><h4 data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">BREXIT Impact on EU and the UK</span></h4><span data-dcnode-id="1949" instrument_node="">
</span><ol data-dcnode-id="1932"><span data-dcnode-id="1948" instrument_node="">
</span><li data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Both UK and the EU will have tariff-free and quota-free access to each other’s market, however, the UK nationals will no longer have unrestricted freedom to work, study, start a business or live in the EU and vice versa.</span></li><span data-dcnode-id="1945" instrument_node="">
</span><li data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">The&nbsp;Eoropean Unions seeks to link goods trade to maintaining the status quo on access to British waters&nbsp;which is considered to be a matter of concern for the U.K., so it might give rise to clashes.</span></li><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The U.K.&nbsp;on leaving the EU, automatically, mechanically, legally,&nbsp;leaves hundreds of&nbsp;international agreements concluded by or on behalf of the EU. This is advantageous for&nbsp;its Member States, on topics as different as trade, aviation, fisheries or civil nuclear cooperation.</span></li><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Even the&nbsp;non-trade subjects will be full of political troubles&nbsp;because the EU Member States will have to change their policies according to the new deals and the regulations.</span></li><span data-dcnode-id="1936" instrument_node="">
</span><li data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">The European Union’s refusal&nbsp;to bring services into the trade deal might instigate clashes.</span></li><span data-dcnode-id="1933" instrument_node="">
</span></ol><span data-dcnode-id="1931" instrument_node="">
</span><h3 data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Global Impact of BREXIT</span></h3><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926" style="padding-left: 30px;"><span data-dcnode-id="1927" instrument_node="">a) Globalization has increased the correlation between countries. If there is a disturbance in one country then there will be an impact on other countries</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923" style="padding-left: 30px;"><span data-dcnode-id="1924" instrument_node="">b) The BREXIT would affect the global growth</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920" style="padding-left: 30px;"><span data-dcnode-id="1921" instrument_node="">c) It is a big blow when more countries are moving towards multilateral trade arrangements</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917" style="padding-left: 30px;"><span data-dcnode-id="1918" instrument_node="">d) It will further alienate the investors and the capital will move from risky markets to safer havens</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914" style="padding-left: 30px;"><span data-dcnode-id="1915" instrument_node="">e) The major exporting countries such as China and India would get affected as the EU is one of the major export markets</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911" style="padding-left: 30px;"><span data-dcnode-id="1912" instrument_node="">f) As per one of the estimates, BREXIT would lead to a 25% reduction in imports by Britain</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908" style="padding-left: 30px;"><span data-dcnode-id="1909" instrument_node="">g) BREXIT was a referendum which rode on much components-anti immigration, increasing protectionism, etc. with this these sentiments are going to increase in other parts as well</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905" style="padding-left: 30px;"><span data-dcnode-id="1906" instrument_node="">h) Britain was one of the major financial and military contributors to the EU but with BREXIT, the financial of the EU will suffer.</span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902" style="padding-left: 30px;"><span data-dcnode-id="1903" instrument_node="">i) With BREXIT there are calls for NEXIT(Netherlands exit), Italeave (Italy leaving) and FREXIT (France Exit), etc</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899" style="padding-left: 30px;"><span data-dcnode-id="1900" instrument_node="">j) With BREXIT there have been demands for Scotland exiting from the UK.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><h3 data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Impact of BREXIT on India</span></h3><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893" style="padding-left: 30px;"><span data-dcnode-id="1894" instrument_node="">a) India is the third-largest source of FDI for the UK. There are more than 800 Indian companies in Britain. With BREXIT, the business of these companies will be affected. With the fluctuation in exchange rates, the bottom line of these companies will suffer.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890" style="padding-left: 30px;"><span data-dcnode-id="1891" instrument_node="">b) Although the pro exit supporters have claimed that Britain can sign bilateral agreements free of restrictions any restrictions imposed by the EU now, but the experience has shown that it takes a long period to negotiate and sign a new trade agreement (eg- India and Japan took around 5 years to discuss and conclude CEPA)</span></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887" style="padding-left: 30px;"><span data-dcnode-id="1888" instrument_node="">c) India considers Britain as a gateway to the EU, now with Britain opting out, India loses the advantage. Hence there is a need to get border-free access</span></p><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1884" style="padding-left: 30px;"><span data-dcnode-id="1885" instrument_node="">d) The FTA that India was negotiating with the EU will not have the same impact (negotiations are going on since 2007). Now since Britain is out, India needs to work on an agreement separately with Britain.</span></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1881" style="padding-left: 30px;"><span data-dcnode-id="1882" instrument_node="">e) UK accounts for 17% of India’s IT exports. With BREXIT the overhead costs are going to increase. Nasscom in a report has said that the Indian IT industry is going to experience a negative influence in the short term. The depreciation of the pound also will have an effect on the returns of these companies. Hence,&nbsp;Sectors such as IT, R&amp;D, architecture and financial services are likely to shine for India.</span></p><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878" style="padding-left: 30px;"><span data-dcnode-id="1879" instrument_node="">f) One argument is that BREXIT could lead to the movement of skilled labour from India to Britain but this might be a misplaced argument as immigration into Britain from other EU countries was one of the reasons for BREXIT.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875" style="padding-left: 30px;"><span data-dcnode-id="1876" instrument_node="">g) UK and EU both account for 23.7% of the rupee’s effective exchange rate. BREXIT would lead to the outflow of foreign portfolio investments and this may further weaken the rupee. (on the positive side, the central bank will try to maintain the liquidity in the market so the fear of fed hike of interest rate could be brought down)</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872" style="padding-left: 30px;"><span data-dcnode-id="1873" instrument_node="">h) Brexit is a blow to commodity prices. As such because of lower global demand, the slowdown in China and many European countries had led to a drop in the prices of commodities and this will be further accentuated because of BREXIT.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869" style="padding-left: 30px;"><span data-dcnode-id="1870" instrument_node="">i) The sectors that would get affected are-auto and auto components; metals, oil, aviation, pharmaceuticals, etc</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866" style="padding-left: 30px;"><span data-dcnode-id="1867" instrument_node="">j) The central bank has to recalibrate the monetary policy to reduce the market volatility</span></p><span data-dcnode-id="1865" instrument_node="">

</span><h3 data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">&nbsp;What Could be Done in India</span></h3><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766" style="padding-left: 30px;"><span data-dcnode-id="1767" instrument_node="">a) The central bank has to recalibrate its monetary policy to account for the volatility that will be created in the market</span></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763" style="padding-left: 30px;"><span data-dcnode-id="1764" instrument_node="">b) SEBI and the stock markets will have to be very watchful in not allowing any manipulators from taking undue advantage. Brokers, portfolio managers, and other market intermediaries have to be prevented from any attempts to lure small retail investors into promises of hefty gains from the futures and options trading, especially in banking stocks and indices, the official added.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760" style="padding-left: 30px;"><span data-dcnode-id="1761" instrument_node="">c) Since Brexit makes the revival of global growth more difficult, there is a need for India to focus more on the domestic demand so that the impact is minimized</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757" style="padding-left: 30px;"><span data-dcnode-id="1758" instrument_node="">d) The strong forex reserves position has to be maintained so that any fluctuations in the exchange rate of the rupee can be limited</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754" style="padding-left: 30px;"><span data-dcnode-id="1755" instrument_node="">e) The companies that have a business in Europe (especially in the UK and it pertains more to the IT industry) have to rework their strategy.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">What most of the experts agree upon is the effect of BREXIT on the global economy coupled with weakening/depreciating currencies of various countries will make it harder for recovery and in the case of India, thanks to the stability in the fundamentals of domestic economy and huge forex reserves position, the effect of BREXIT can be minimized, but the effect is going to be felt in short term. Approach to UPSC GS 3- International economics, trade relations Questions</span></p><span data-dcnode-id="1750" instrument_node="">
</span><ol data-dcnode-id="1739"><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">The BREXIT makes the global economic recovery more difficult-Discuss.</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">In the light of recent BREXIT what will be the impact on the Indian economy</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">When elephants fight, grass suffers-discuss the statement in the light of BREXIT</span></li><span data-dcnode-id="1740" instrument_node="">
</span></ol><span data-dcnode-id="1738" instrument_node="">
</span><h3 data-dcnode-id="1735"><span data-dcnode-id="1736" style="font-weight: 400;"><span data-dcnode-id="1737" instrument_node="">Multiple Choice Question (MCQ)</span></span></h3><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1731"><b data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Consider the Following Statements</span></b></p><span data-dcnode-id="1730" instrument_node="">
</span><ol data-dcnode-id="1712"><span data-dcnode-id="1729" instrument_node="">
</span><li data-dcnode-id="1726" style="font-weight: 400;"><span data-dcnode-id="1727" style="font-weight: 400;"><span data-dcnode-id="1728" instrument_node="">Britain is a signatory of the Schengen Border free zone (allows easy travel across Europe), over the last few years there has been quite an opposition towards migration into the country from within the EU and its effects on wages and public services especially post 2008 recession.</span></span></li><span data-dcnode-id="1725" instrument_node="">
</span><li data-dcnode-id="1722" style="font-weight: 400;"><span data-dcnode-id="1723" style="font-weight: 400;"><span data-dcnode-id="1724" instrument_node="">Scotland has been able to attract foreign investments as a result of which there has been employment creation, contribution to growth, etc (in 2013, 40% of the companies in Scotland were foreign-owned which employed more than 3 lakh workers)</span></span></li><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1718" style="font-weight: 400;"><span data-dcnode-id="1719" style="font-weight: 400;"><span data-dcnode-id="1720" instrument_node="">European Parliament is based in Brussels (Belgium), there are 751 members in the parliament, their function is to discuss and vote on all the laws that have been proposed by EC.</span></span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1714" style="font-weight: 400;"><span data-dcnode-id="1715" style="font-weight: 400;"><span data-dcnode-id="1716" instrument_node="">The problem with the Euro as a common currency has also been exposed wherein on one side countries such as Greece and Spain are suffering from high debt, high unemployment, whereas other countries such as Germany are enjoying higher growth.</span></span></li><span data-dcnode-id="1713" instrument_node="">
</span></ol><span data-dcnode-id="1711" instrument_node="">

</span><p data-dcnode-id="1679"></p><div class="faq-section mb30" data-dcnode-id="1648" id="Frequently-Asked-Questions-on-BREXIT"><h2 data-dcnode-id="1676"><span data-dcnode-id="1677" style="color: #800080;"><span data-dcnode-id="1678" instrument_node="">Frequently Asked Questions on BREXIT</span></span></h2><div class="faq-schema" data-dcnode-id="1649"><div data-dcnode-id="1650" itemscope="" itemtype="https://schema.org/FAQPage"><section data-dcnode-id="1670" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1674" itemprop="name text"><span data-dcnode-id="1675" instrument_node="">Q 1. What is BREXIT?</span></h3><div data-dcnode-id="1671" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1672" itemprop="text"><span data-dcnode-id="1673" instrument_node="">Ans. The term refers to Britain holding a referendum on its decision on whether it wants to continue membership under the European Union or not. On 23 June 2016, the UK held a referendum on its membership under which 52% voted for BREXIT and the remaining 48% to stay within its membership.</span></div></div></section><section data-dcnode-id="1651" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1668" itemprop="name text"><span data-dcnode-id="1669" instrument_node="">Q 2. What is the present EU-UK relationship?</span></h3><div data-dcnode-id="1652" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1653" itemprop="text"><span data-dcnode-id="1667" instrument_node="">
