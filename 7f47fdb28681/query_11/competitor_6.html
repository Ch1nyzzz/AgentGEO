</span></div><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">The UK left the European Union on New Year’s eve, after the end of the transition period that maintained the status quo for 11 months after Britain formally left the EU on January 31, 2020. While it would mean that the UK’s reclaiming of national independence from the EU and its rules, several challenges remain for the future to be addressed. The post-Brexit trade deal has brought in new restrictions and left several key issues unresolved, leaving the possibility of tense ties between the UK and the EU.</span></p><span data-dcnode-id="2751" instrument_node="">

</span><li data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Economically, the EU is the single market allowing the free movement of goods and people. EU has its own currency, the Euro, which is being used by 28 member countries.</span></li><span data-dcnode-id="2732" instrument_node="">

</span><p data-dcnode-id="2572" style="text-align: center; margin-top: 10px;"><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/plans/"><button data-dcnode-id="2574" style="text-align: center; color: #fff; background-color: #dd5f5f;"><span data-dcnode-id="2575" instrument_node="">ENROLL NOW</span></button></a></p><span data-dcnode-id="2571" instrument_node="">

</span></div><span data-dcnode-id="2567" instrument_node="">
</span></div><h2 data-dcnode-id="2562" style="text-align: left;"><strong data-dcnode-id="2563"><span data-dcnode-id="2564" style="font-size: 18pt;"><span data-dcnode-id="2565" instrument_node="">What is Brexit?</span></span></strong></h2><span data-dcnode-id="2561" instrument_node="">
</span><ul data-dcnode-id="2550" style="text-align: justify;"><span data-dcnode-id="2560" instrument_node="">
</span><li data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Brexit is the short form of Britain Exiting the European Union (EU).</span></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">In 2016, Brexit was announced in Britain after the referendum for leaving the European Union. (Referendum – A popular vote by the electorate on a political question).</span></li><span data-dcnode-id="2554" instrument_node="">
</span><li data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">After the referendum, the UK and EU provisionally agreed to settle financial, strategic and political issues over a transition period of 21 months.</span></li><span data-dcnode-id="2551" instrument_node="">
</span></ul><span data-dcnode-id="2549" instrument_node="">
</span><h2 data-dcnode-id="2545" style="text-align: left;"><strong data-dcnode-id="2546"><span data-dcnode-id="2547" style="font-size: 18pt;"><span data-dcnode-id="2548" instrument_node="">Why Britain has not been exited till now?</span></span></strong></h2><span data-dcnode-id="2544" instrument_node="">
</span><ul data-dcnode-id="2531" style="text-align: justify;"><span data-dcnode-id="2543" instrument_node="">
</span><li data-dcnode-id="2539"><span data-dcnode-id="2542" instrument_node="">The UK has to invoke an agreement named </span><em data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Article 50 of the Lisbon Treaty.</span></em></li><span data-dcnode-id="2538" instrument_node="">
</span><li data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">The treaty provides 2 years time for the EU and UK to agree to the terms of the split.</span></li><span data-dcnode-id="2535" instrument_node="">
</span><li data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">The UK invoked the article in March 2017 and hence it is expected to leave EU in the mid of 2019.</span></li><span data-dcnode-id="2532" instrument_node="">
</span></ul><span data-dcnode-id="2530" instrument_node="">
</span><h2 data-dcnode-id="2526" style="text-align: left;"><strong data-dcnode-id="2527"><span data-dcnode-id="2528" style="font-size: 18pt;"><span data-dcnode-id="2529" instrument_node="">What are the arguments in favour of Britain leaving the EU?</span></span></strong></h2><span data-dcnode-id="2525" instrument_node="">
</span><h3 data-dcnode-id="2520" style="text-align: justify;"><span data-dcnode-id="2521" style="font-size: 14pt;"><em data-dcnode-id="2522"><strong data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Migration</span></strong></em></span></h3><span data-dcnode-id="2519" instrument_node="">
</span><ul data-dcnode-id="2511" style="text-align: justify;"><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Migration of people from both within and outside EU, especially from the West Asia (Syria and ISIS Issue) and East European nations = Fear of losing jobs, social welfare benefits among the Britons.</span></li><span data-dcnode-id="2515" instrument_node="">
</span><li data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Repeated requests of Germany to share the migrants across Europe and asking the UK to accept a number of them have been disliked by the Britons.</span></li><span data-dcnode-id="2512" instrument_node="">
</span></ul><span data-dcnode-id="2510" instrument_node="">
</span><h3 data-dcnode-id="2505" style="text-align: left;"><span data-dcnode-id="2506" style="font-size: 14pt;"><em data-dcnode-id="2507"><strong data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Contributions to EU Budget</span></strong></em></span></h3><span data-dcnode-id="2504" instrument_node="">
</span><ul data-dcnode-id="2496" style="text-align: justify;"><span data-dcnode-id="2503" instrument_node="">
</span><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">UK is one of the ten countries which contribute more to the EU Budget.</span></li><span data-dcnode-id="2500" instrument_node="">
</span><li data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">According to some studies, the UK’s contribution is not proportionate to the benefits it gets back.</span></li><span data-dcnode-id="2497" instrument_node="">
</span></ul><span data-dcnode-id="2495" instrument_node="">
</span><h3 data-dcnode-id="2490" style="text-align: left;"><span data-dcnode-id="2491" style="font-size: 14pt;"><em data-dcnode-id="2492"><strong data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Failure of EU</span></strong></em></span></h3><span data-dcnode-id="2489" instrument_node="">
</span><ul data-dcnode-id="2474" style="text-align: justify;"><span data-dcnode-id="2488" instrument_node="">
</span><li data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">The European Economic Community (EEC) had 6 members, 4 languages and 177 million population when it was founded. But now the EU has 28 members, 24 languages and 505 million population.</span></li><span data-dcnode-id="2485" instrument_node="">
</span><li data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Thus the EU failed on several fronts in creating one community and one identity while solving the differences among its members, including Britain.</span></li><span data-dcnode-id="2482" instrument_node="">
</span><li data-dcnode-id="2476"><span data-dcnode-id="2481" instrument_node="">People feel that jobs, living standards were better offered during the early days of nation-states than now. (Click </span><strong data-dcnode-id="2478"><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/mindmap-world-history/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2480" instrument_node="">here</span></a></strong><span data-dcnode-id="2477" instrument_node=""> to learn about the European states system through mind map).</span></li><span data-dcnode-id="2475" instrument_node="">
</span></ul><span data-dcnode-id="2473" instrument_node="">
</span><h3 data-dcnode-id="2468" style="text-align: justify;"><span data-dcnode-id="2469" style="font-size: 14pt;"><em data-dcnode-id="2470"><strong data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Sovereignty issue</span></strong></em></span></h3><span data-dcnode-id="2467" instrument_node="">
</span><ul data-dcnode-id="2459" style="text-align: justify;"><span data-dcnode-id="2466" instrument_node="">
</span><li data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Some of the Britons feel that they are being controlled by the diktats of Brussels bureaucracy rather than making their own decisions.</span></li><span data-dcnode-id="2463" instrument_node="">
</span><li data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">They view the institutions of EU as undemocratic and do not want bureaucrats in Brussels to decide what laws the UK should follow.</span></li><span data-dcnode-id="2460" instrument_node="">
</span></ul><span data-dcnode-id="2458" instrument_node="">
</span><h3 data-dcnode-id="2453" style="text-align: justify;"><span data-dcnode-id="2454" style="font-size: 14pt;"><em data-dcnode-id="2455"><strong data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Germany’s domination</span></strong></em></span></h3><span data-dcnode-id="2452" instrument_node="">
</span><ul data-dcnode-id="2441" style="text-align: justify;"><span data-dcnode-id="2451" instrument_node="">
</span><li data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">With the coming of Angela Merkel, Germany has started playing an influential and leading role in both global and regional affairs.</span></li><span data-dcnode-id="2448" instrument_node="">
</span><li data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">It has indirectly made Britain feel marginalized both within the EU and the region.</span></li><span data-dcnode-id="2445" instrument_node="">
</span><li data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Considering their imperial past, Britons are in no way ready to tolerate an EU dominated by a German leadership.</span></li><span data-dcnode-id="2442" instrument_node="">
</span></ul><span data-dcnode-id="2440" instrument_node="">
</span><h3 data-dcnode-id="2435" style="text-align: justify;"><span data-dcnode-id="2436" style="font-size: 14pt;"><em data-dcnode-id="2437"><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Economic model</span></strong></em></span></h3><span data-dcnode-id="2434" instrument_node="">
</span><ul data-dcnode-id="2413" style="text-align: justify;"><span data-dcnode-id="2433" instrument_node="">
</span><li data-dcnode-id="2427"><span data-dcnode-id="2432" instrument_node="">Some Britons are not happy with the way EU central bank responded to the 2008 financial crisis which resulted in an </span><strong data-dcnode-id="2429"><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/mindmap-indian-economy-upsc-ias/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2431" instrument_node="">economic recession</span></a></strong><span data-dcnode-id="2428" instrument_node="">. (Note: Recession means a widespread decline in the GDP, employment and trade lasting from six months to a year).</span></li><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">They were not satisfied with the economic model that is in place for three decades and its failure to serve the interests of various sections of the Britons.</span></li><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Particularly, the youth are concerned about career opportunities and the affordable homes that were never built by the State.</span></li><span data-dcnode-id="2420" instrument_node="">
</span><li data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">It is estimated that unemployment across Eurozone is more than 10 percent.</span></li><span data-dcnode-id="2417" instrument_node="">
</span><li data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">According to some studies, the UK’s economy is losing 600 million euros every week because of the burdensome regulations of the EU.</span></li><span data-dcnode-id="2414" instrument_node="">
</span></ul><span data-dcnode-id="2412" instrument_node="">
</span><h2 data-dcnode-id="2408" style="text-align: left;"><strong data-dcnode-id="2409"><span data-dcnode-id="2410" style="font-size: 18pt;"><span data-dcnode-id="2411" instrument_node="">What are the arguments against Britain leaving the EU?</span></span></strong></h2><span data-dcnode-id="2407" instrument_node="">
</span><h3 data-dcnode-id="2402" style="text-align: justify;"><span data-dcnode-id="2403" style="font-size: 14pt;"><em data-dcnode-id="2404"><strong data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Image of UK</span></strong></em></span></h3><span data-dcnode-id="2401" instrument_node="">
</span><ul data-dcnode-id="2393" style="text-align: justify;"><span data-dcnode-id="2400" instrument_node="">
</span><li data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">For the critics of Brexit including former PM David Cameron, the referendum was an utter insult to the entire country as it has reflected the great divide between Britain and EU.</span></li><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">They also claim that the UK’s image would get damaged by leaving the EU.</span></li><span data-dcnode-id="2394" instrument_node="">
</span></ul><span data-dcnode-id="2392" instrument_node="">
</span><h3 data-dcnode-id="2387" style="text-align: justify;"><span data-dcnode-id="2388" style="font-size: 14pt;"><em data-dcnode-id="2389"><strong data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Immigrants</span></strong></em></span></h3><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384" style="text-align: justify;"><span data-dcnode-id="2385" instrument_node="">Majority of the immigrants are young and hence would boost economic growth and will help pay for the public services.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><h3 data-dcnode-id="2378" style="text-align: justify;"><span data-dcnode-id="2379" style="font-size: 14pt;"><em data-dcnode-id="2380"><strong data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Trade</span></strong></em></span></h3><span data-dcnode-id="2377" instrument_node="">
</span><ul data-dcnode-id="2369" style="text-align: justify;"><span data-dcnode-id="2376" instrument_node="">
</span><li data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Trade gets a major boost for Britain if it stays with the EU. It is because selling products to other EU nations becomes easier with EU membership.</span></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Foreign companies may not be willing to invest in the UK if it is not part of the EU. Moreover, they may also move their bases out of the UK as it will not be a part of the single market since it would face problems with different EU regulations.</span></li><span data-dcnode-id="2370" instrument_node="">
</span></ul><span data-dcnode-id="2368" instrument_node="">
</span><h3 data-dcnode-id="2363" style="text-align: justify;"><span data-dcnode-id="2364" style="font-size: 14pt;"><em data-dcnode-id="2365"><strong data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Security</span></strong></em></span></h3><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360" style="text-align: justify;"><span data-dcnode-id="2361" instrument_node="">According to Brexit critics, leaving the EU may affect the ability to fight cross-border crime and terrorism. They believe that Britain would be more secure as part of the EU.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><h2 data-dcnode-id="2355" style="text-align: left;"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" style="font-size: 18pt;"><span data-dcnode-id="2358" instrument_node="">What are the implications of Brexit?</span></span></strong></h2><span data-dcnode-id="2354" instrument_node="">
</span><h3 data-dcnode-id="2349" style="text-align: justify;"><span data-dcnode-id="2350" style="font-size: 14pt;"><em data-dcnode-id="2351"><strong data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">For the UK</span></strong></em></span></h3><span data-dcnode-id="2348" instrument_node="">
</span><ul data-dcnode-id="2311" style="text-align: justify;"><span data-dcnode-id="2347" instrument_node="">
</span><li data-dcnode-id="2343"><span data-dcnode-id="2345" style="text-decoration: underline;"><span data-dcnode-id="2346" instrument_node="">The weakening of pound:</span></span><span data-dcnode-id="2344" instrument_node=""> The value of pound weakened to a 30 year low after the Brexit referendum. It will negatively impact the country’s imports and exports.</span></li><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2338"><span data-dcnode-id="2340" style="text-decoration: underline;"><span data-dcnode-id="2341" instrument_node="">Trade agreements:</span></span><span data-dcnode-id="2339" instrument_node=""> the UK has to separately enter into trade agreements with the rest of the world.</span></li><span data-dcnode-id="2337" instrument_node="">
</span><li data-dcnode-id="2333"><span data-dcnode-id="2335" style="text-decoration: underline;"><span data-dcnode-id="2336" instrument_node="">The breakup of the United Kingdom:</span></span><span data-dcnode-id="2334" instrument_node=""> Scotland (part of UK) had voted in favour of EU during the referendum campaign. Thus Brexit would boost the demand for independence of Scotland from the United Kingdom.</span></li><span data-dcnode-id="2332" instrument_node="">
</span><li data-dcnode-id="2313"><span data-dcnode-id="2330" style="text-decoration: underline;"><span data-dcnode-id="2331" instrument_node="">The Irish question:</span></span><span data-dcnode-id="2329" instrument_node="">
</span><ul data-dcnode-id="2315"><span data-dcnode-id="2328" instrument_node="">
</span><li data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Ireland is an island to the west of Britain and has 2 major regions – North and South, with different demographic features.</span></li><span data-dcnode-id="2325" instrument_node="">
</span><li data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">“Protestant majority Northern Ireland” (a UK territory) and “Catholic majority Irish Republic” (an independent country in the south), have had serious ethnic tensions within and between them.</span></li><span data-dcnode-id="2322" instrument_node="">
</span><li data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Numerous agreements and EU’s integrated markets system have thus far been a considerable influence in resolving these tense and violent trends.</span></li><span data-dcnode-id="2319" instrument_node="">
</span><li data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Since UK plans to leave EU, the Irish question has come to haunt all concerned governments since there is a fear that a new era of violence might start.</span></li><span data-dcnode-id="2316" instrument_node="">
</span></ul><span data-dcnode-id="2314" instrument_node="">
</span></li><span data-dcnode-id="2312" instrument_node="">
</span></ul><span data-dcnode-id="2310" instrument_node="">
</span><h3 data-dcnode-id="2305" style="text-align: justify;"><span data-dcnode-id="2306" style="font-size: 14pt;"><em data-dcnode-id="2307"><strong data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">For EU</span></strong></em></span></h3><span data-dcnode-id="2304" instrument_node="">
</span><ul data-dcnode-id="2291" style="text-align: justify;"><span data-dcnode-id="2303" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Britain is an important country in the EU. Without Britain, the EU may lose much of its influence as a global power bloc.</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2293"><span data-dcnode-id="2299" instrument_node="">It may result in a resurgence of the nation-states that once ruled Europe. Because, with Brexit, right-wing political groups in Italy, France, Sweden, Belgium, Poland, Germany, Spain, and Hungary have started demanding the exit of their own nations from the EU. (click </span><strong data-dcnode-id="2295"><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/mindmap-world-history/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2298" instrument_node="">here</span></a><span data-dcnode-id="2296" instrument_node=""> </span></strong><span data-dcnode-id="2294" instrument_node="">to learn about the European states system through mind map)</span></li><span data-dcnode-id="2292" instrument_node="">
</span></ul><span data-dcnode-id="2290" instrument_node="">
</span><h3 data-dcnode-id="2285" style="text-align: justify;"><span data-dcnode-id="2286" style="font-size: 14pt;"><em data-dcnode-id="2287"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">For India</span></strong></em></span></h3><span data-dcnode-id="2284" instrument_node="">
</span><ul data-dcnode-id="2252" style="text-align: justify;"><span data-dcnode-id="2283" instrument_node="">
</span><li data-dcnode-id="2279"><span data-dcnode-id="2281" style="text-decoration: underline;"><span data-dcnode-id="2282" instrument_node="">Trade:</span></span><span data-dcnode-id="2280" instrument_node=""> India-UK trade will get a boost. The stringent regulations of the EU which were the biggest obstacle can be done away with. For example, the EU had banned Alphonso mangoes from India after it reportedly found fruit flies in the consignments. The weakening of pounds will also be advantageous for Indian imports. It will also benefit tourists and Indian students studying in the UK.</span></li><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2274"><span data-dcnode-id="2276" style="text-decoration: underline;"><span data-dcnode-id="2277" instrument_node="">Indian Businesses in the UK:</span></span><span data-dcnode-id="2275" instrument_node=""> may find it hard to access the single market of EU since their products may become uncompetitive if they are asked to pay import duties upon entering the EU. Thus Indian businesses will not be able to utilize the UK as the gateway to the European Union. Indian IT firms which have considerable exposure to the European markets, particularly the UK, will be affected since there is a risk of a decrease in growth levels in the EU and UK.</span></li><span data-dcnode-id="2273" instrument_node="">
</span><li data-dcnode-id="2269"><span data-dcnode-id="2271" style="text-decoration: underline;"><span data-dcnode-id="2272" instrument_node="">Tourism:</span></span><span data-dcnode-id="2270" instrument_node=""> Due to the weakening of pound, there will be a decrease in tourists flow into India from Britain.</span></li><span data-dcnode-id="2268" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2266" style="text-decoration: underline;"><span data-dcnode-id="2267" instrument_node="">Immigration:</span></span><span data-dcnode-id="2265" instrument_node=""> After Brexit, it is expected that there will be more restrictions on immigration in the United Kingdom thus affecting Indian immigrants.</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2259"><span data-dcnode-id="2261" style="text-decoration: underline;"><span data-dcnode-id="2262" instrument_node="">FDI:</span></span><span data-dcnode-id="2260" instrument_node=""> Brexit will affect the flow of Foreign Direct Investment (FDI) in India. It will result in financial instability and a legal regime overhaul in the long-term.</span></li><span data-dcnode-id="2258" instrument_node="">
</span><li data-dcnode-id="2254"><span data-dcnode-id="2256" style="text-decoration: underline;"><span data-dcnode-id="2257" instrument_node="">Indian students in the UK:</span></span><span data-dcnode-id="2255" instrument_node=""> will get benefitted since the number of applicants from EU nations to the universities in the UK is likely to decrease after Brexit. Also, the weakening of pound may lower down the total cost of education for Indian students. Furthermore, there may be a decrease in international student fee since the low fee structure for EU students may be withdrawn. It has to be noted that, the EU students were availing fee concessions which are being cross-subsidized by a higher international student fee.</span></li><span data-dcnode-id="2253" instrument_node="">
</span></ul><span data-dcnode-id="2251" instrument_node="">
</span><h3 data-dcnode-id="2246" style="text-align: justify;"><span data-dcnode-id="2247" style="font-size: 14pt;"><em data-dcnode-id="2248"><strong data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">For world</span></strong></em></span></h3><span data-dcnode-id="2245" instrument_node="">
</span><ul data-dcnode-id="2237" style="text-align: justify;"><span data-dcnode-id="2244" instrument_node="">
</span><li data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Brexit will create Macroeconomic and financial market impacts in the UK and EU and may spread across the globe.</span></li><span data-dcnode-id="2241" instrument_node="">
</span><li data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">The impacts of Brexit will result in financial and political uncertainty = Decline in business and consumer confidence = Lower growth scenario across the world.</span></li><span data-dcnode-id="2238" instrument_node="">
</span></ul><span data-dcnode-id="2236" instrument_node="">
</span><h2 data-dcnode-id="2232" style="text-align: left;"><strong data-dcnode-id="2233"><span data-dcnode-id="2234" style="font-size: 18pt;"><span data-dcnode-id="2235" instrument_node="">What does the draft deal (November 2018) propose?</span></span></strong></h2><span data-dcnode-id="2231" instrument_node="">
</span><h3 data-dcnode-id="2226" style="text-align: justify;"><span data-dcnode-id="2227" style="font-size: 14pt;"><em data-dcnode-id="2228"><strong data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Transition Period</span></strong></em></span></h3><span data-dcnode-id="2225" instrument_node="">
</span><ul data-dcnode-id="2217" style="text-align: justify;"><span data-dcnode-id="2224" instrument_node="">
</span><li data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Britain will formally exit the EU on March 29, 2019, = UK will cease to be involved at any level in EU decision-making.</span></li><span data-dcnode-id="2221" instrument_node="">
</span><li data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">However, the UK will remain inside the EU’s single market and subject to EU laws and regulations until the end of December 2020. Meanwhile, the two sides may attempt to sort out a new trade relationship between them.</span></li><span data-dcnode-id="2218" instrument_node="">
</span></ul><span data-dcnode-id="2216" instrument_node="">
</span><h3 data-dcnode-id="2211" style="text-align: justify;"><span data-dcnode-id="2212" style="font-size: 14pt;"><em data-dcnode-id="2213"><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Irish border</span></strong></em></span></h3><span data-dcnode-id="2210" instrument_node="">
</span><ul data-dcnode-id="2202" style="text-align: justify;"><span data-dcnode-id="2209" instrument_node="">
</span><li data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Since the Irish Republic (separate country) is an EU member, a porous border with it by the UK would mean a porous border with EU, which is not a desirable outcome for the pro-exit group in the UK.</span></li><span data-dcnode-id="2206" instrument_node="">
</span><li data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Thus it is agreed that there will be no hard border between Northern Ireland and the Irish Republic, at least in the short term.</span></li><span data-dcnode-id="2203" instrument_node="">
</span></ul><span data-dcnode-id="2201" instrument_node="">
</span><h3 data-dcnode-id="2196" style="text-align: justify;"><span data-dcnode-id="2197" style="font-size: 14pt;"><em data-dcnode-id="2198"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Customs Union</span></strong></em></span></h3><span data-dcnode-id="2195" instrument_node="">
</span><ul data-dcnode-id="2181" style="text-align: justify;"><span data-dcnode-id="2194" instrument_node="">
</span><li data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">If the transition period extends beyond 2020, the draft deal commits both parties to a single customs territory between the EU and the United Kingdom.</span></li><span data-dcnode-id="2191" instrument_node="">
</span><li data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">The customs union would eliminate all tariffs, checks on roles of origin and quotas and would cover all goods except fishery products.</span></li><span data-dcnode-id="2188" instrument_node="">
</span><li data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">While part of the customs union, the UK will be bound by all international trade agreements = countries outside the EU like the US and China would have access to the UK market under terms provided under the EU’s trade agreements.</span></li><span data-dcnode-id="2185" instrument_node="">
</span><li data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">This provision can be removed only via the agreement of both parties = preventing the UK from effectively leaving the customs union without the approval of the EU.</span></li><span data-dcnode-id="2182" instrument_node="">
</span></ul><span data-dcnode-id="2180" instrument_node="">
</span><h3 data-dcnode-id="2175" style="text-align: justify;"><span data-dcnode-id="2176" style="font-size: 14pt;"><em data-dcnode-id="2177"><strong data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Financial markets</span></strong></em></span></h3><span data-dcnode-id="2174" instrument_node="">
</span><ul data-dcnode-id="2169" style="text-align: justify;"><span data-dcnode-id="2173" instrument_node="">
</span><li data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Under the draft deal, entities created in the UK shall be treated as entities located outside the Union by the EU after the deal = London’s vast financial centre can only have a basic level of access to the bloc’s markets after Brexit.</span></li><span data-dcnode-id="2170" instrument_node="">
</span></ul><span data-dcnode-id="2168" instrument_node="">
</span><h3 data-dcnode-id="2163" style="text-align: justify;"><span data-dcnode-id="2164" style="font-size: 14pt;"><em data-dcnode-id="2165"><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Freedom of Movement</span></strong></em></span></h3><span data-dcnode-id="2162" instrument_node="">
</span><ul data-dcnode-id="2154" style="text-align: justify;"><span data-dcnode-id="2161" instrument_node="">
</span><li data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">The draft agreement gives protections to EU citizens in the UK and similarly UK nationals in EU countries to continue to live, work or study as they currently do.</span></li><span data-dcnode-id="2158" instrument_node="">
</span><li data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Exit visa, entry visa or equivalent formality shall not be required for holders of a valid document issued for EU and UK nationals when crossing national borders within the bloc.</span></li><span data-dcnode-id="2155" instrument_node="">
</span></ul><span data-dcnode-id="2153" instrument_node="">
</span><h3 data-dcnode-id="2148" style="text-align: justify;"><span data-dcnode-id="2149" style="font-size: 14pt;"><em data-dcnode-id="2150"><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Commitments to EU programs</span></strong></em></span></h3><span data-dcnode-id="2147" instrument_node="">
</span><ul data-dcnode-id="2139"><span data-dcnode-id="2146" instrument_node="">
</span><li data-dcnode-id="2144" style="text-align: justify;"><span data-dcnode-id="2145" instrument_node="">The UK will honor all current joint commitments to EU programs as outlined in the EU budget until 2020.</span></li><span data-dcnode-id="2143" instrument_node="">
</span><li data-dcnode-id="2141" style="text-align: justify;"><span data-dcnode-id="2142" instrument_node="">Under this, Britain agrees to cover contributions to staff pensions and commitments to EU programs the UK made while being a member for the funding period until 2020.</span></li><span data-dcnode-id="2140" instrument_node="">
</span></ul><span data-dcnode-id="2138" instrument_node="">
</span><h2 data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Updates:</span></h2><span data-dcnode-id="2135" instrument_node="">
</span><h3 data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">The genesis of UK-EU trade deal:</span></h3><span data-dcnode-id="2132" instrument_node="">
</span><ul data-dcnode-id="2115"><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Brexit was meant to happen on March 29, 2019, two years after Article 50 of the Lisbon treaty, to officially signify the UK’s exit from the EU.</span></li><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">The two year-period was given to the UK government to come up with a deal to leave the EU.</span></li><span data-dcnode-id="2125" instrument_node="">
</span><li data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">The March 29 deadline was delayed twice after the UK-EU deal by the Theresa May government was rejected by the UK Parliament.</span></li><span data-dcnode-id="2122" instrument_node="">
</span><li data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">After the MPs rejected the deal for the third time, May resigned and was succeeded by Boris Johnson.</span></li><span data-dcnode-id="2119" instrument_node="">
</span><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">The Johnson government, after months of negotiations, had successfully negotiated a trade deal to define the future relationships between the UK and the EU.</span></li><span data-dcnode-id="2116" instrument_node="">
</span></ul><span data-dcnode-id="2114" instrument_node="">
</span><h3 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">What are the key highlights of UK-EU trade agreement?</span></h3><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2108"><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Trade:</span></strong></p><span data-dcnode-id="2107" instrument_node="">
</span><ul data-dcnode-id="2087"><span data-dcnode-id="2106" instrument_node="">
</span><li data-dcnode-id="2098"><span data-dcnode-id="2105" instrument_node="">As per the free trade deal, there will be </span><u data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">no tariffs on goods</span></u><span data-dcnode-id="2102" instrument_node=""> or </span><u data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">limits on the amount that can be traded</span></u><span data-dcnode-id="2099" instrument_node=""> between the UK and EU from January 1, 2021.</span></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2092"><span data-dcnode-id="2096" instrument_node="">This is the </span><u data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">first time that the EU</span></u><span data-dcnode-id="2093" instrument_node=""> has agreed to zero quotas and zero tariffs with a trading partner.</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Implications of these are:</span></li><span data-dcnode-id="2088" instrument_node="">
</span></ul><span data-dcnode-id="2086" instrument_node="">
</span><ol data-dcnode-id="2078"><span data-dcnode-id="2085" instrument_node="">
</span><li data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Elimination of the fear of increased expenses of goods</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Businesses need to prepare for new procedures, failing which could lead to trade disruption.</span></li><span data-dcnode-id="2079" instrument_node="">
</span></ol><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2074"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Services and qualifications:</span></strong></p><span data-dcnode-id="2073" instrument_node="">
</span><ul data-dcnode-id="2059"><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">The UK’s services like banking, architecture and accounting </span><u data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">lost their automatic right to access EU markets</span></u><span data-dcnode-id="2068" instrument_node=""> and will face some restrictions.</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">UK professionals will not be automatically recognised within the EU through their qualifications.</span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">This means that:</span></li><span data-dcnode-id="2060" instrument_node="">
</span></ul><span data-dcnode-id="2058" instrument_node="">
</span><ol data-dcnode-id="2050"><span data-dcnode-id="2057" instrument_node="">
</span><li data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Instead of following uniform rules for the whole of the EU, the UK businesses will need to comply with regulations in each individual country.</span></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Service providers, who gained qualifications in the UK, will need to check each country’s rules to make sure their qualifications are still recognised.</span></li><span data-dcnode-id="2051" instrument_node="">
</span></ol><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2046"><strong data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Travel:</span></strong></p><span data-dcnode-id="2045" instrument_node="">
</span><ul data-dcnode-id="2019"><span data-dcnode-id="2044" instrument_node="">
</span><li data-dcnode-id="2039"><span data-dcnode-id="2043" instrument_node="">Visa is required for the UK nationals staying </span><u data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">more than 90 days in the EU</span></u><span data-dcnode-id="2040" instrument_node="">.</span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node="">European Health Insurance Cards (EHIC) will be replaced with the new </span><u data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">UK Global Health Insurance Card</span></u><span data-dcnode-id="2034" instrument_node="">. However, EHIC will remain valid until they expire.</span></li><span data-dcnode-id="2032" instrument_node="">
</span><li data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">The UK is no longer subject to the ban on additional roaming charges, though both sides will encourage operators to have “transparent and reasonable rates” for roaming.</span></li><span data-dcnode-id="2029" instrument_node="">
</span><li data-dcnode-id="2024"><span data-dcnode-id="2028" instrument_node="">Tax-free airport sales of electronics and clothing will stop and </span><u data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">pet passports</span></u><span data-dcnode-id="2025" instrument_node=""> issued by the UK will be invalid in the EU.</span></li><span data-dcnode-id="2023" instrument_node="">
</span><li data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Travellers from the UK will be subject to travel restrictions imposed on passengers coming from non-EU countries.</span></li><span data-dcnode-id="2020" instrument_node="">
</span></ul><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2015"><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Fishing:</span></strong></p><span data-dcnode-id="2014" instrument_node="">
</span><ul data-dcnode-id="1985"><span data-dcnode-id="2013" instrument_node="">
</span><li data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Fishing was the most contentious issue during the negotiations.</span></li><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">While fishing contributes to only a small portion of economic growth for both the UK and the EU, the issue is extremely emotive and the political consequences outweigh the economic impact for both sides.</span></li><span data-dcnode-id="2007" instrument_node="">
</span><li data-dcnode-id="2002"><span data-dcnode-id="2006" instrument_node="">The deal allows the UK to </span><u data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">have sovereignty over its fishing waters</span></u><span data-dcnode-id="2003" instrument_node=""> after it left the EU’s Common Fisheries Policy on December 31.</span></li><span data-dcnode-id="2001" instrument_node="">
</span><li data-dcnode-id="1993"><span data-dcnode-id="2000" instrument_node="">According to this deal, the UK will be allowed to </span><u data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">ban the EU fishing boats</span></u><span data-dcnode-id="1997" instrument_node=""> </span><u data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">from 2026</span></u><span data-dcnode-id="1994" instrument_node="">.</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1991" instrument_node="">In response, the EU would be allowed to </span><u data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">introduce taxes on British fish</span></u><span data-dcnode-id="1988" instrument_node="">.</span></li><span data-dcnode-id="1986" instrument_node="">
</span></ul><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1981"><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Dispute redressal:</span></strong></p><span data-dcnode-id="1980" instrument_node="">
</span><ul data-dcnode-id="1960"><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1978" instrument_node="">As per the deal, the UK will no longer play a role in the </span><u data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">European Court of Justice</span></u><span data-dcnode-id="1975" instrument_node=""> (ECJ), the highest court in the EU.</span></li><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">Disputes that cannot be resolved between the EU and the UK will be referred to an </span><u data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">independent tribunal</span></u><span data-dcnode-id="1969" instrument_node="">.</span></li><span data-dcnode-id="1967" instrument_node="">
</span><li data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">This means that the UK will be able to “take back control” of its laws.</span></li><span data-dcnode-id="1964" instrument_node="">
</span><li data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">The ECJ will have a role in Northern Ireland because it continues to follow some EU trade rules.</span></li><span data-dcnode-id="1961" instrument_node="">
</span></ul><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1956"><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Security and data:</span></strong></p><span data-dcnode-id="1955" instrument_node="">
</span><ul data-dcnode-id="1935"><span data-dcnode-id="1954" instrument_node="">
</span><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">The UK will no longer have automatic access to key security databases.</span></li><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">It will access them only after requests.</span></li><span data-dcnode-id="1948" instrument_node="">
</span><li data-dcnode-id="1943"><span data-dcnode-id="1947" instrument_node="">The UK will not be a member of </span><u data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Europol</span></u><span data-dcnode-id="1944" instrument_node="">, the law enforcement agency of the EU.</span></li><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The UK need to comply with the EU standards of data protection.</span></li><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">However, the data exchange will remain unchanged for at least four months as long as the UK does not change its data protection rules.</span></li><span data-dcnode-id="1936" instrument_node="">
</span></ul><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1931"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Education:</span></strong></p><span data-dcnode-id="1930" instrument_node="">
</span><ul data-dcnode-id="1916"><span data-dcnode-id="1929" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">The UK will no longer participate in the </span><u data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Erasmus Exchange Programme</span></u><span data-dcnode-id="1925" instrument_node="">, an EU scheme that helps students to study in other countries.</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Rather, it will launch a similar scheme that will apply to countries across the world.</span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">However, students at the universities in Northern Ireland will continue to participate in Erasmus, as part of the Northern Ireland Protocol.</span></li><span data-dcnode-id="1917" instrument_node="">
</span></ul><span data-dcnode-id="1915" instrument_node="">
</span><h3 data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">What happens to Northern Ireland?</span></h3><span data-dcnode-id="1912" instrument_node="">
</span><ul data-dcnode-id="1820"><span data-dcnode-id="1911" instrument_node="">
</span><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Brexit would involve North Ireland’s departure from the EU as it is part of the UK.</span></li><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">In the absence of another arrangement, checks would be required along the 499-km Irish Border as different trade rules would apply to north and south of Ireland after Brexit.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">This creates a security risk because a physical border infrastructure would be considered as a potential target for militants.</span></li><span data-dcnode-id="1902" instrument_node="">
</span><li data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">To avoid this, an effective insurance policy called the </span><u data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Backstop</span></u><span data-dcnode-id="1898" instrument_node=""> was originally agreed by the UK and the EU in the withdrawal agreement.</span></li><span data-dcnode-id="1896" instrument_node="">
</span><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">However, this was opposed by Northern Ireland’s lawmakers as it risked breaking up of the UK.</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">Ultimately, the Backstop was replaced by </span><u data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Northern Ireland Protocol</span></u><span data-dcnode-id="1889" instrument_node=""> in order to avoid trade border emerging on the island of Ireland.</span></li><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1882"><span data-dcnode-id="1886" instrument_node="">The protocol was formed as </span><u data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">part of last year’s withdrawal agreement</span></u><span data-dcnode-id="1883" instrument_node="">.</span></li><span data-dcnode-id="1881" instrument_node="">
</span><li data-dcnode-id="1873"><span data-dcnode-id="1880" instrument_node="">It prevents hardening of borders between </span><u data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Northern Ireland</span></u><span data-dcnode-id="1877" instrument_node=""> and the </span><u data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Republic of Ireland</span></u><span data-dcnode-id="1874" instrument_node="">.</span></li><span data-dcnode-id="1872" instrument_node="">
</span><li data-dcnode-id="1867"><span data-dcnode-id="1871" instrument_node="">According to this protocol, Northern Ireland (NI) will </span><u data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">remain in the EU single market </span></u><span data-dcnode-id="1868" instrument_node="">for goods.</span></li><span data-dcnode-id="1866" instrument_node="">
</span><li data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">Northern Ireland will also apply </span><u data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">EU customs rules</span></u><span data-dcnode-id="1862" instrument_node=""> at its ports, even though the region is still part of the UK customs territory.</span></li><span data-dcnode-id="1860" instrument_node="">
</span><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">The protocol will also see Northern Ireland follow certain EU rules on state aid and VAT on goods.</span></li><span data-dcnode-id="1857" instrument_node="">
</span><li data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">It also mandates checking and controlling of goods </span><u data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">arriving from Great Britain </span></u><span data-dcnode-id="1853" instrument_node="">from January 1.</span></li><span data-dcnode-id="1851" instrument_node="">
</span><li data-dcnode-id="1843"><span data-dcnode-id="1850" instrument_node="">However, goods going into the </span><u data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Republic of Ireland and the wider EU</span></u><span data-dcnode-id="1847" instrument_node=""> will face </span><u data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">no new checks or controls</span></u><span data-dcnode-id="1844" instrument_node="">.</span></li><span data-dcnode-id="1842" instrument_node="">
</span><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">This arrangement would still have applied even if the wider trade deal failed to be implemented.</span></li><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">There were concerns regarding Northern Ireland becoming a tariff-dodgers’ backdoor into the EU’s customs union.</span></li><span data-dcnode-id="1836" instrument_node="">
</span><li data-dcnode-id="1828"><span data-dcnode-id="1835" instrument_node="">It was addressed by allowing deeming of several goods as </span><u data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">“at risk”</span></u><span data-dcnode-id="1832" instrument_node=""> and hitting them with </span><u data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">EU tariffs</span></u><span data-dcnode-id="1829" instrument_node=""> as they entered from Great Britain to Northern Ireland.</span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">The tariff could be rebated if these goods were shown to be consumed in Northern Ireland.</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The overall UK-EU trade deal eliminates tariffs on all goods traded, minimising the number of transactions being deemed as at risk.</span></li><span data-dcnode-id="1821" instrument_node="">
</span></ul><span data-dcnode-id="1819" instrument_node="">
</span><h3 data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">What are the concerns of this deal?</span></h3><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1813"><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Security:</span></strong></p><span data-dcnode-id="1812" instrument_node="">
</span><ul data-dcnode-id="1786"><span data-dcnode-id="1811" instrument_node="">
</span><li data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The UK-EU trade deal leaves Britain less secure.</span></li><span data-dcnode-id="1808" instrument_node="">
</span><li data-dcnode-id="1803"><span data-dcnode-id="1807" instrument_node="">The UK police had forfeited several key security tools like the </span><u data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Schengen Information System (SIS) </span></u><span data-dcnode-id="1804" instrument_node="">– a vast database providing real-time alerts on locations of terrorists and serious criminals.</span></li><span data-dcnode-id="1802" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">On average, British police access the SIS </span><u data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">more than 1.65 million times</span></u><span data-dcnode-id="1798" instrument_node="">.</span></li><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The country currently lacks a substitute system, leading to an intelligence void especially times when Europe is becoming a victim to frequent extremist attacks.</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Similarly, the UK losing the seat in the Europol creates difficulties in cross-border criminal and terrorism investigations.</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">New agreements are required with each EU member states to restore the previous relationships in this regard.</span></li><span data-dcnode-id="1787" instrument_node="">
</span></ul><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1782"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Data sharing:</span></strong></p><span data-dcnode-id="1781" instrument_node="">
</span><ul data-dcnode-id="1767"><span data-dcnode-id="1780" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Restrictions on data flow may create a barrier on trade, putting the UK businesses at a competitive disadvantage.</span></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">While the agreement ensures commitments from both sides on data protection, it fails to provide </span><u data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">data adequacy status</span></u><span data-dcnode-id="1773" instrument_node=""> to the UK.</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">The data adequacy is a status granted by the European Commission to countries outside the European Economic Area to enable seamless passage of data without the need for safeguards.</span></li><span data-dcnode-id="1768" instrument_node="">
</span></ul><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1763"><strong data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Service sector:</span></strong></p><span data-dcnode-id="1762" instrument_node="">
</span><ul data-dcnode-id="1748"><span data-dcnode-id="1761" instrument_node="">
</span><li data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">The service sector accounts for </span><u data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">80% of the UK economy</span></u><span data-dcnode-id="1757" instrument_node=""> and is largely left out of the Brexit deal, which focuses on removing tariffs and quotas on goods trade.</span></li><span data-dcnode-id="1755" instrument_node="">
</span><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">While the UK had an overall trade deficit of 79 billion euros with the EU in 2019, it had a surplus of 18 billion euros from trading services.</span></li><span data-dcnode-id="1752" instrument_node="">
</span><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">The EU is waiting to see if the UK complies with existing EU regulations before striking further deals.</span></li><span data-dcnode-id="1749" instrument_node="">
</span></ul><span data-dcnode-id="1747" instrument_node="">
</span><h3 data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Conclusion:</span></h3><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">While the UK has successfully exited from the EU, negotiators failed in addressing several key concerns like immigration, the status of the service sector, fishing, data accessibility, defence cooperation etc. This could pave way for more negotiations and disputes, which could ultimately lead to tariff impositions and diplomatic tensions between the UK and the EU.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><h3 data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Practice question for mains:</span></h3><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">The UK-EU free trade deal does not address the long-term concerns of future bilateral ties. Elucidate. (250 words)</span></p><span data-dcnode-id="1735" instrument_node="">

</span></header><span data-dcnode-id="1175" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1167"><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">The 15</span><sup data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">th</span></sup><span data-dcnode-id="1170" instrument_node=""> India-EU Summit, which was held virtually, saw very little progress in the boosting of the bilateral relationship. Previous summits, since 2000, have failed to address the differences between India and the European Union because, though they have had vast areas of discussions, they lacked political commitment from both sides. Notwithstanding numerous differences, the shared principles and economic potential can not only bringing change to the bilateral relationship but also the international order that is dominated by US-China tussle.</span></p><span data-dcnode-id="1168" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="1109"><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/india-unsc-reforms-upsc/" rel="bookmark" tabindex="-1"><span data-dcnode-id="1111" instrument_node="">India &amp; UN Security Council (UNSC) Reforms – Explained</span></a></h2><span data-dcnode-id="1108" instrument_node="">
</span></header><span data-dcnode-id="1105" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1094"><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">United Nations Security Council is argued to be not in par with the current geopolitical scenario. Since its establishment in 1945, there has been little to no change in its structure.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Many countries including India are bidding for permanent membership in this organisation. This allows them to carry out their national interests, boost their political power in the global arena and create a balance of power in the multipolar world.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">However, there has been little progress in this regard due to the rigid stance taken by the 5 permanent members who are unwilling to reduce their power status and also power rivalry amongst nations.</span></p><span data-dcnode-id="1095" instrument_node="">
