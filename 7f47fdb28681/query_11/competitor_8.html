                  ."><span data-dcnode-id="1209" instrument_node="">2014</span></a><span data-dcnode-id="1207" instrument_node="">) based on a synthetic counterfactual for the EU countries which joined in 1973 or later. They suggest an average gain of 12% of GDP (except for Greece) with more for the UK. Because the WTO has become more comprehensive in scope and also a little deeper, in the meantime, the implied costs of exiting might be today a little less high.</span></p><p data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">Another variant of the counterfactual approach is Breuss (</span><a aria-label="Reference 2006" data-dcnode-id="1203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d250908263e1522" title="Breuss, F. (2006). Austria and Switzerland – Experiences with and without EU membership. Austrian Economic Quarterly, 1, 13–39."><span data-dcnode-id="1204" instrument_node="">2006</span></a><span data-dcnode-id="1202" instrument_node="">) who compares Switzerland and Austria, given their respective choices for market integration in Europe, also finds large benefits for Austria. A related way to estimate the cost of Brexit is to consider the benefits expected from existing or planned free trade agreements of the EU with other nations around the globe. The exits costs can be derived from so-called impact assessment studies on the free trade agreements EU-Canada, EU-India, EU-Japan, EU-Mercosur, EU-Mexico and EU-South Korea.</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Table </span><a data-dcnode-id="1198" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1199" instrument_node="">5</span></a><span data-dcnode-id="1197" instrument_node=""> below summarises the expected benefits from these free trade agreements or plans. They involve different degrees of trade liberalisation and different levels of development. However, a general trend is clear. In all these cases, the EU would enjoy only a disproportionally small share of the total benefit, not just because it is economically larger than its counterparts but also for fundamental reasons, such as the greater market power of its enterprises. With a changed sign, this implies that exiting these free trade agreements would impose the majority of the costs on the exiting country.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1181" data-test="inline-table" id="table-5"><figure data-dcnode-id="1182"><figcaption class="c-article-table__figcaption" data-dcnode-id="1193"><b data-dcnode-id="1194" data-test="table-caption" id="Tab5"><span data-dcnode-id="1195" instrument_node="">Table 5 Model simulations of economic impact of free trade agreements on the EU and the partner economy</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1183"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="1184" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/tables/5" rel="nofollow"><span data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1185" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1186" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1187" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1190" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1189" fill-rule="evenodd"></path><span data-dcnode-id="1188" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">In any event, the large negative effects in the models used on Brexit are a priori consistent with this new literature on the EU benefits for countries concluding a free trade agreement. The EU benefit is quite large and should not be dismissed too swiftly.</span></p></div></div></section><section data-dcnode-id="1166" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="1167" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1173" id="Sec12"><span data-dcnode-id="1174" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1168" id="Sec12-content"><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">This paper has focussed on the economic impact of Brexit on the EU-27. Our main conclusions are the following. Trade between the UK and the EU-27 is of a similar order of magnitude as transatlantic trade (between the EU and the U.S.). Investment links between the UK and EU-27 appear to be stronger, but the picture is heavily influenced by financial transactions whose main purpose might be tax optimisation. For the EU, Brexit might be of comparable importance (with the opposite sign) as TTIP.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">All available studies concur that Brexit will lead to a significant disruption of trade links and will impose economic costs on both sides. However, the EU-27 would bear only a disproportionally small share of the total cost. A similar picture emerges from the literature studying the potential benefits from free trade agreements the EU has, or is, negotiating with other countries (e.g. Japan, Korea, etc.). The relationship between economic size and bargaining power has two implications. First of all, the EU should have the stronger bargaining position in the negotiations on the future economic arrangements between the UK and the EU-27. The cost of the disruption resulting from not reaching an agreement would fall primarily on the UK. Second, Britain might have difficulties negotiating favourable trade arrangements with other large countries, such as the U.S., Japan or China. The most recent results from the general election of 2017 in the UK, and the uncertainty generated by it will of course tend to increase the economic costs of Brexit for the country even further via their negative impact on investment-type decisions.</span></p></div></div></section><span data-dcnode-id="1165" instrument_node="">
</span><section data-dcnode-id="1139" data-title="Notes"><div class="c-article-section" data-dcnode-id="1140" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1163" id="notes"><span data-dcnode-id="1164" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1141" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1142"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1156" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1157"><p data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">In terms of data preparation and exposition, this paper heavily relies on Emerson et al. (</span><a aria-label="Reference 2017" data-dcnode-id="1160" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e345" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1161" instrument_node="">2017</span></a><span data-dcnode-id="1159" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1143" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1144"><p data-dcnode-id="1145"><span data-dcnode-id="1155" instrument_node="">It is notable that two of the studies, by the OECD (</span><a aria-label="Reference 2016a" data-dcnode-id="1153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e1451" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1154" instrument_node="">2016a</span></a><span data-dcnode-id="1152" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="1150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d250908263e1454" title="OECD (2016b). OECD Stat. Available at: 
                    http://stats.oecd.org/
                    
                  ."><span data-dcnode-id="1151" instrument_node="">b</span></a><span data-dcnode-id="1149" instrument_node="">) and HM Treasury ( </span><a aria-label="Reference 2016" data-dcnode-id="1147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d250908263e1457" title="Her Majesty’s (HM) Treasury (2016). HM Treasury analysis: the long-term economic impact of EU membership and the alternatives. Presented to Parliament by the Chancellor of the Exchequer by command of Her Majesty, Cm 925, April. Available at: 
                    https://www.gov.uk/government/publications/hm-treasury-analysis-the-long-term-economic-impact-of-eu-membership-and-the-alternatives
                    
                  ."><span data-dcnode-id="1148" instrument_node="">2016</span></a><span data-dcnode-id="1146" instrument_node="">), suggest significantly higher losses for the UK, which may be explained by the more extensive range of economic impacts that are accounted for, notably negative impacts on FDI. In the pessimistic scenarios, the losses for the UK, according to these two studies, mount up to around 7.5% of GDP which would be highly significant from a macroeconomic point of view, meaning a reduction of GDP growth over a decade of around 0.75% annually.</span></p></div></li></ol></div></div></section><div data-dcnode-id="838" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="839" data-title="References"><div class="c-article-section" data-dcnode-id="840" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1137" id="Bib1"><span data-dcnode-id="1138" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="841" id="Bib1-content"><div data-container-section="references" data-dcnode-id="842"><ul class="c-article-references" data-dcnode-id="852"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="1124"><p class="c-article-references__text" data-dcnode-id="1129" id="ref-CR1"><span data-dcnode-id="1136" instrument_node="">Aichele, R., &amp; Felbermayr, G. (2015). </span><i data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Costs and benefits of a United Kingdom exit from the European Union</span></i><span data-dcnode-id="1133" instrument_node="">. Guetersloh: Bertelsmann Stiftung Available at: </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bertelsmann-stiftung.de/fileadmin/files/BSt/Publikationen/GrauePublikationen/NW_BREXIT_EN.pdf"><span data-dcnode-id="1132" instrument_node="">https://www.ber
