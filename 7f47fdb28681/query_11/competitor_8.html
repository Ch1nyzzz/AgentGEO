</span><meta content="This paper assesses the economic implications of the United Kingdom (UK) leaving the European Union (EU). The basic data on trade in goods and services and investment between the two parties suggest that the cost of “Brexit” could be substantial. Trade between the UK and the EU-27 is large and of a similar order of magnitude as transatlantic trade (between the EU and the U.S.). The precise nature of the (hopefully free) trade agreement UK-EU-27 is still being negotiated. All available studies concur that a significant disruption of trade links will impose economic costs on both sides. However, the EU-27 would bear only a disproportionally small share of the total cost, not just because it is about five times larger than the UK in economic terms, but also for fundamental reasons such as greater market power of its enterprises. Other studies on different free trade arrangements confirm the general proposition that the smaller party has more to gain from eliminating trade barriers (and more to lose from imposing them). This implies that the EU will have a stronger negotiating position." data-dcnode-id="2209" name="dc.description"><span data-dcnode-id="2208" instrument_node="">

</span><meta content="The Economic Impact of Brexit: Evidence from Modelling Free Trade Agreements - Atlantic Economic Journal" data-dcnode-id="2039" property="og:title"><span data-dcnode-id="2038" instrument_node="">
</span><meta content="This paper assesses the economic implications of the United Kingdom (UK) leaving the European Union (EU). The basic data on trade in goods and services and investment between the two parties suggest that the cost of “Brexit” could be substantial. Trade between the UK and the EU-27 is large and of a similar order of magnitude as transatlantic trade (between the EU and the U.S.). The precise nature of the (hopefully free) trade agreement UK-EU-27 is still being negotiated. All available studies concur that a significant disruption of trade links will impose economic costs on both sides. However, the EU-27 would bear only a disproportionally small share of the total cost, not just because it is about five times larger than the UK in economic terms, but also for fundamental reasons such as greater market power of its enterprises. Other studies on different free trade arrangements confirm the general proposition that the smaller party has more to gain from eliminating trade barriers (and more to lose from imposing them). This implies that the EU will have a stronger negotiating position." data-dcnode-id="2037" property="og:description"><span data-dcnode-id="2036" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1593" data-gtm-vis-first-on-screen-50443292_562="732" data-gtm-vis-first-on-screen-50443292_563="733" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="732" data-gtm-vis-recent-on-screen-50443292_563="733" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1594" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1598" id="Abs1"><span data-dcnode-id="1599" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1595" id="Abs1-content"><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">This paper assesses the economic implications of the United Kingdom (UK) leaving the European Union (EU). The basic data on trade in goods and services and investment between the two parties suggest that the cost of “Brexit” could be substantial. Trade between the UK and the EU-27 is large and of a similar order of magnitude as transatlantic trade (between the EU and the U.S.). The precise nature of the (hopefully free) trade agreement UK-EU-27 is still being negotiated. All available studies concur that a significant disruption of trade links will impose economic costs on both sides. However, the EU-27 would bear only a disproportionally small share of the total cost, not just because it is about five times larger than the UK in economic terms, but also for fundamental reasons such as greater market power of its enterprises. Other studies on different free trade arrangements confirm the general proposition that the smaller party has more to gain from eliminating trade barriers (and more to lose from imposing them). This implies that the EU will have a stronger negotiating position.</span></p></div></div></section><span data-dcnode-id="1592" instrument_node="">
</span><section data-dcnode-id="1498" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="733" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="733" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1499" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1590" id="Sec1"><span data-dcnode-id="1591" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1500" id="Sec1-content"><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">On June 23, 2016, the UK voted narrowly (52:48) to leave the European Union (EU). The UK government then officially notified the EU on March 29, 2017, of its intention to leave, thus triggering Article 50 of the EU Treaty, which specifies that within two years the UK will cease to be a member. The date for Brexit is thus clear, but the nature of the economic relationship between the UK and the remaining EU-27 is still to be defined.</span></p><p data-dcnode-id="1580"><span data-dcnode-id="1587" instrument_node="">Principles of economics suggest that Brexit will have an economic cost for both sides as trade in both goods and services between the UK and EU-27 will no longer be (nearly) frictionless, as it is at present. The size of these economic costs is uncertain, but they are likely to be substantial since, at present, trade across the Channel is very large: €306 billion of exports of goods by the EU-27 to the UK, versus €184 billion of imports. In terms of percent shares of gross domestic product (GDP), the EU-27’s exports to the UK amount to 2.5% of GDP, whereas the UK’s exports to the EU-27 amount to 7.5% of its GDP. For comparison, transatlantic trade of goods is only about 20% larger than trade across the channel.</span><sup data-dcnode-id="1582"><a data-dcnode-id="1583" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Footnote </span></span><span data-dcnode-id="1584" instrument_node="">1</span></a></sup><span data-dcnode-id="1581" instrument_node="">
</span></p><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">For services, the amounts are also large: €94 billion of exports by the EU-27 to the UK, versus €122 billion of imports, and thus a surplus in this case for the UK (although here the statistics are not so reliable, with big differences seen in the mirror data for the same items as measured by the EU-27).</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Foreign direct investments (FDI) flows and stocks are also very large on both sides. The EU-27’s stock of FDI in the UK is estimated at €985 billion, or 8.3% of its GDP, while the UK’s investment in the EU-27 totals a little less in value at €683 billion, but this is much bigger in relation to its GDP (26.6%). However, there are indications that a significant proportion, maybe more than one half, of this FDI represents financial operations whose purpose is to optimise tax liabilities of multinational corporations.</span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Leaving the EU will not only affect trade, but also the legal status of the large number of EU-27 citizens living in the UK (estimated at 3.35 million as of end 2016). The largest number are workers (2,002,000), compared to pensioners (223,000) and the unemployed (102,000). The number of UK citizens living in EU-27 countries is substantially less: 1,217,000, of which 400,000 are pensioners, with the remainder being workers and their dependent families, and students.</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Another economic impact of Brexit is that the UK will no longer contribute to the EU budget, which would thus no longer count towards the €9 billion annual net contribution of the UK. This might be offset to some extent by a continuing contribution by the UK, if it were agreed upon by all parties, in order to secure a high degree of market access, or from tariff revenues if the relationship would be based just on World Trade Organization (WTO) membership terms. There is a question also of other legacy costs, which as of now, however, are neither defined nor quantified beyond speculative remarks in the range of approximately €20–40 billion.</span></p><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The focus of this contribution will be on trade relations and how the expected costs of leaving the EU’s internal market would be distributed across the two parties, which, in turn, should affect their negotiating positions. In principle there are two alternative extreme scenarios: (1) the UK would accede to the European Economic Area (EEA) as a non-member state like Norway, or (2) the UK would have no preferential trade relationship with the EU, which would imply that cross Channel trade would take place only under general WTO rules.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">In between these two extremes there are quite a number of possibilities for free trade arrangements of varying depth, which are described below. However, the UK Prime Minister, Theresa May, in her speech on 17 January 2017 (The Telegraph </span><a aria-label="Reference 2017" data-dcnode-id="1567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d250908263e369" title="The Telegraph (2017). Theresa May’s Brexit speech in full. Available at: 
                    http://www.telegraph.co.uk/news/2017/01/17/theresa-mays-brexit-speech-full/
                    
                  ."><span data-dcnode-id="1568" instrument_node="">2017</span></a><span data-dcnode-id="1566" instrument_node="">), narrowed the focus considerably, favouring a Comprehensive Free Trade Agreement (CFTA).</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">It is clear that the default scenario, in the event that the negotiations fail to reach agreement within two years after the triggering of Article 50, is the WTO scenario. This means that the most plausible range of possible outcomes now consists of some kind of CFTA as the most optimistic, and the WTO as the most pessimistic.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1561" id="Sec2"><span data-dcnode-id="1562" instrument_node="">Economic Impacts in Short</span></h3><p data-dcnode-id="1544"><span data-dcnode-id="1560" instrument_node="">There has been a considerable amount of quantitative modelling work done on various Brexit scenarios by both official institutions (UK Treasury [Her Majesty’s (HM) Treasury </span><a aria-label="Reference 2016" data-dcnode-id="1558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d250908263e382" title="Her Majesty’s (HM) Treasury (2016). HM Treasury analysis: the long-term economic impact of EU membership and the alternatives. Presented to Parliament by the Chancellor of the Exchequer by command of Her Majesty, Cm 925, April. Available at: 
                    https://www.gov.uk/government/publications/hm-treasury-analysis-the-long-term-economic-impact-of-eu-membership-and-the-alternatives
                    
                  ."><span data-dcnode-id="1559" instrument_node="">2016</span></a><span data-dcnode-id="1557" instrument_node="">]; Organization for Economic Cooperation and Development [OECD </span><a aria-label="Reference 2016a" data-dcnode-id="1555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e385" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1556" instrument_node="">2016a</span></a><span data-dcnode-id="1554" instrument_node="">]) and independent economists (Ottaviano et al. </span><a aria-label="Reference 2016" data-dcnode-id="1552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d250908263e388" title="Ottaviano, G., Dhingra, S., Huang, H., Pessoa, J. P., Sampson, T., &amp; van Reenen, J. (2016). The costs and benefits of leaving the EU: Trade effects. Centre for Economic Performance Technical Report. London School of Economics, London: Centre for Economic Performance Available at: 
                    http://cep.lse.ac.uk/pubs/download/brexit02_technical_paper.pdf
                    
                  ."><span data-dcnode-id="1553" instrument_node="">2016</span></a><span data-dcnode-id="1551" instrument_node="">; Aichele and Felbermayr </span><a aria-label="Reference 2015" data-dcnode-id="1549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d250908263e391" title="Aichele, R., &amp; Felbermayr, G. (2015). Costs and benefits of a United Kingdom exit from the European Union. Guetersloh: Bertelsmann Stiftung Available at: 
                    https://www.bertelsmann-stiftung.de/fileadmin/files/BSt/Publikationen/GrauePublikationen/NW_BREXIT_EN.pdf
                    
                  ."><span data-dcnode-id="1550" instrument_node="">2015</span></a><span data-dcnode-id="1548" instrument_node="">; Booth et al. </span><a aria-label="Reference 2015" data-dcnode-id="1546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d250908263e394" title="Booth, S., Howarth, C., &amp; Persson, M. (2015). What if…? The consequences, challenges and opportunities facing Britain outside EU. Open Europe Report, 3, 15."><span data-dcnode-id="1547" instrument_node="">2015</span></a><span data-dcnode-id="1545" instrument_node="">). These all cover ranges of scenarios in the optimistic-pessimistic spectrum, including the spread between the European Economic Area (EEA) and WTO scenarios highlighted above. However, as we have just noted, the plausible range of scenarios has been narrowed, excluding the EEA.</span></p><p data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node="">Nonetheless, the modelling work has produced a cluster of relatively consistent results. The main story is one of economic losses by both parties, but disproportionately between them in money amounts in a ratio of around 1:2 or 1:3 for the UK and the EU-27 respectively. In terms of percentages of GDP, the losses for the EU-27 would be about 10 to 15 times lower given the 1:5 ratio in the GDP of the UK relative to that of the EU-27 (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e400" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1542" instrument_node="">2017</span></a><span data-dcnode-id="1540" instrument_node="">).</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">For the EU-27, the losses are virtually insignificant, averaging between 0.08% and 0.44% of GDP for the optimistic versus pessimistic scenarios respectively. These amounts are modelled as the totals cumulating up to 2030, so the annual average losses would be of the order of 0.008% to 0.044% of GDP (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e406" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1537" instrument_node="">2017</span></a><span data-dcnode-id="1535" instrument_node="">).</span></p><p data-dcnode-id="1508"><span data-dcnode-id="1533" instrument_node="">For the UK, the losses average between 1.31% and 4.21% of GDP for the optimistic and pessimistic scenarios respectively, or 0.13% to 0.41% of GDP annually (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e412" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1532" instrument_node="">2017</span></a><span data-dcnode-id="1530" instrument_node="">). Among the different models it is also notable that the losses for the UK are higher than average in the case of two models (OECD </span><a aria-label="Reference 2016a" data-dcnode-id="1528" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e415" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1529" instrument_node="">2016a</span></a><span data-dcnode-id="1527" instrument_node="">; HM Treasury </span><a aria-label="Reference 2016" data-dcnode-id="1525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d250908263e418" title="Her Majesty’s (HM) Treasury (2016). HM Treasury analysis: the long-term economic impact of EU membership and the alternatives. Presented to Parliament by the Chancellor of the Exchequer by command of Her Majesty, Cm 925, April. Available at: 
                    https://www.gov.uk/government/publications/hm-treasury-analysis-the-long-term-economic-impact-of-eu-membership-and-the-alternatives
                    
                  ."><span data-dcnode-id="1526" instrument_node="">2016</span></a><span data-dcnode-id="1524" instrument_node="">]) that capture negative impacts on FDI, which is redirected in some degree away from the UK into the EU-27. In their pessimistic scenarios (Aichele and Felbermayr </span><a aria-label="Reference 2015" data-dcnode-id="1522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d250908263e421" title="Aichele, R., &amp; Felbermayr, G. (2015). Costs and benefits of a United Kingdom exit from the European Union. Guetersloh: Bertelsmann Stiftung Available at: 
                    https://www.bertelsmann-stiftung.de/fileadmin/files/BSt/Publikationen/GrauePublikationen/NW_BREXIT_EN.pdf
                    
                  ."><span data-dcnode-id="1523" instrument_node="">2015</span></a><span data-dcnode-id="1521" instrument_node="">; OECD </span><a aria-label="Reference 2016a" data-dcnode-id="1519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e424" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1520" instrument_node="">2016a</span></a><span data-dcnode-id="1518" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="1516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d250908263e428" title="OECD (2016b). OECD Stat. Available at: 
                    http://stats.oecd.org/
                    
                  ."><span data-dcnode-id="1517" instrument_node="">b</span></a><span data-dcnode-id="1515" instrument_node="">; Rojas-Romagosa </span><a aria-label="Reference 2016" data-dcnode-id="1513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d250908263e431" title="Rojas-Romagosa, Hugo (2016). Trade effects of Brexit for the Netherlands. CPB Background Document, CPB Netherlands Bureau for Economic Policy Analysis, Rotterdam, June. Available at: 
                    http://www.cpb.nl/en/publication/trade-effects-of-brexit-for-the-netherlands
                    
                  ."><span data-dcnode-id="1514" instrument_node="">2016</span></a><span data-dcnode-id="1512" instrument_node="">; Ottaviano et al. </span><a aria-label="Reference 2016" data-dcnode-id="1510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d250908263e434" title="Ottaviano, G., Dhingra, S., Huang, H., Pessoa, J. P., Sampson, T., &amp; van Reenen, J. (2016). The costs and benefits of leaving the EU: Trade effects. Centre for Economic Performance Technical Report. London School of Economics, London: Centre for Economic Performance Available at: 
                    http://cep.lse.ac.uk/pubs/download/brexit02_technical_paper.pdf
                    
                  ."><span data-dcnode-id="1511" instrument_node="">2016</span></a><span data-dcnode-id="1509" instrument_node="">) the losses cumulate to about 7.5% of GDP, or 0.75% annually, which are highly significant amounts in macroeconomic terms. This FDI effect is not, however, reflected in models estimated for the EU-27, and so implies that there might need to be some adjustment to the results reported above for the EU-27.</span></p><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">In the following, we provide a study on several aspects of the possible economic impacts of Brexit on the EU-27, covering (1) the current level of trade in goods and services between the UK and EU-27 as a share of GDP and labour flows, distinguishing between member state and sectors, (2) an indication of the possible economic impact of at least two alternative scenarios, EEA or WTO, and 3 an indication of the key characteristics of a wider range of different types of bilateral agreements that exist between the EU and third world countries, including customs unions, free trade agreements, association agreements, stabilisation and association agreements, and partnership and cooperation agreements.</span></p><p data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">We do not go into the details in which the middle scenarios differ. These points mentioned in the previous paragraph are addressed in a somewhat different order. Particular attention is given to the idea of a CFTA, since this is what Prime Minister Theresa May announced as the UK’s objective in her speech on 17 January 2017 (The Telegraph </span><a aria-label="Reference 2017" data-dcnode-id="1503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d250908263e444" title="The Telegraph (2017). Theresa May’s Brexit speech in full. Available at: 
                    http://www.telegraph.co.uk/news/2017/01/17/theresa-mays-brexit-speech-full/
                    
                  ."><span data-dcnode-id="1504" instrument_node="">2017</span></a><span data-dcnode-id="1502" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="1359" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="736" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="733" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Basic Facts: Trade and Investment"><div class="c-article-section" data-dcnode-id="1360" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1496" id="Sec3"><span data-dcnode-id="1497" instrument_node="">Basic Facts: Trade and Investment</span></h2><div class="c-article-section__content" data-dcnode-id="1361" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="1494" id="Sec4"><span data-dcnode-id="1495" instrument_node="">Trade in Goods</span></h3><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The volume of trade between the UK and EU-27 is substantial, with EU-27 enjoying a large surplus. The EU-27’s exports to the UK totalled €306 billion, whereas imports amounted to only a little more than half as much at €184 billion (all data in this section relate to 2015 unless otherwise stated).</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">For comparison, we note that trade between the EU(28) and the U.S. is of a similar order of magnitude. In 2015 the EU exported goods worth €371 billion to the U.S. and imported about €250 billion, both values are 21 to 36% larger than the corresponding values for trade across the Channel reported in Table </span><a data-dcnode-id="1489" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1490" instrument_node="">1</span></a><span data-dcnode-id="1488" instrument_node="">. From this point of view, the impact of Brexit should be of a similar order of magnitude as the Transatlantic Trade and Investment Partnership (TTIP) might have been (with the opposite sign, of course).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1472" data-test="inline-table" id="table-1"><figure data-dcnode-id="1473"><figcaption class="c-article-table__figcaption" data-dcnode-id="1484"><b data-dcnode-id="1485" data-test="table-caption" id="Tab1"><span data-dcnode-id="1486" instrument_node="">Table 1 Total trade in goods between the UK and the EU-27, 2015</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1474"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1475" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/tables/1" rel="nofollow"><span data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1476" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1477" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1478" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1481" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1480" fill-rule="evenodd"></path><span data-dcnode-id="1479" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">In terms of percent shares of GDP, the EU-27’s exports to the UK amount to 2.5% of GDP, whereas the UK’s exports to the EU-27 amount to 7.1% of GDP. Looked at from the import side, the proportions are even wider, reflecting the UK’s large trade deficit with the EU. The UK’s imports from the EU amount to 11.9% of GDP, whereas the EU-27’s imports from the UK amount to only 1.5% of their GDP.</span></p><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">In regard to the sectoral breakdown of the trade flows, one finds that it is highly diversified, with the following leading sectors for exports from the EU-27 to the UK: machinery and transport equipment (€127 billion) road vehicles (€59 billion), followed by other manufactured goods (€70 billion), chemicals (€51 billion), food products (€32 billion), and mineral fuels (€11 billion). The UK has a deficit in most sectors, especially automotive and surplus, but mainly in mineral fuels and aircraft (and associated equipment).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1465" id="Sec5"><span data-dcnode-id="1466" instrument_node="">Trade in Services</span></h3><p data-dcnode-id="1460"><span data-dcnode-id="1464" instrument_node="">Trade in services is also very substantial in volume, with €94 billion of exports from EU-27 to the UK, and €122 in imports (Table </span><a data-dcnode-id="1462" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1463" instrument_node="">2</span></a><span data-dcnode-id="1461" instrument_node="">). When imports and exports of services are taken together their total of €216 billion is not all that much less than for the €490 billion total for goods. However, the big difference here is that the UK has a significant surplus with EU-27 on account of services (€28 billion), compared to its huge deficit on account of goods (€122 billion).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1445" data-test="inline-table" id="table-2"><figure data-dcnode-id="1446"><figcaption class="c-article-table__figcaption" data-dcnode-id="1457"><b data-dcnode-id="1458" data-test="table-caption" id="Tab2"><span data-dcnode-id="1459" instrument_node="">Table 2 Total trade in services between the UK and EU-27, 2015</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1447"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1448" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/tables/2" rel="nofollow"><span data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1449" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1450" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1451" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1454" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1453" fill-rule="evenodd"></path><span data-dcnode-id="1452" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Services is one area where transatlantic trade is much more important than trade between the EU-27 and the UK. In 2015 EU exports of services to the U.S. were worth about €190 billion, and imports were worth almost €200 billion. The Transatlantic turnover in services trade was thus about two times larger than that across the Channel.</span></p><p data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node="">A big word of caution, however, is called for with respect to the services data. Difficulties in the statistical recording of trade in services are known to be substantial. In particular mirror statistics show big divergences. Mirror statistics occur when each side of a bilateral trade relationship is, in principle, measuring the same thing (e.g. UK exports to Belgium should equal Belgian imports from the UK). The actual mirror statistics for UK-EU-27 trade in services show large differences (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e809" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1440" instrument_node="">2017</span></a><span data-dcnode-id="1438" instrument_node="">, Annex 5). For example, the Belgian services deficit with the UK is recorded to be €1.8 billion according to UK data, whereas the Belgian data suggest the deficit to be only €0.1 billion. The biggest divergence is in the case of Ireland. According to UK data, the UK has a large surplus of €6.1 billion, but according to Irish data it is Ireland that enjoys the surplus in the amount of €11.5 billion. Unfortunately, the official statisticians, whether from Eurostat or national agencies, are unable to cast much light on these differences, no doubt because various service flows are so difficult to record.</span></p><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">Sectoral data also exist in the aggregate for UK services trade with the EU-27 but not the full matrix by country and sector. We do not provide this detail as the data would be highly unreliable for the reasons given above (Belke et al. </span><a aria-label="Reference 2017" data-dcnode-id="1434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d250908263e815" title="Belke, A., Dubova, I., &amp; Osowski, T. (2017). Policy uncertainty and international financial markets: The case of Brexit. Applied Economics, 49(45), 4521–4529."><span data-dcnode-id="1435" instrument_node="">2017</span></a><span data-dcnode-id="1433" instrument_node="">).</span></p><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">In terms of the balance of trade in services, the main items are the UK’s surplus on account of financial services (€20 billion) and its deficit on account of travel and transport (largely tourism, €11 billion). The substantial trade in business services is more nearly balanced.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1428" id="Sec6"><span data-dcnode-id="1429" instrument_node="">Foreign Direct Investment</span></h3><p data-dcnode-id="1414"><span data-dcnode-id="1427" instrument_node="">Data are available on both stocks and flows of foreign direct investment (FDI) for the UK and the EU-27. These data are relatively complete for the worldwide flows and stocks of FDI (Table </span><a data-dcnode-id="1425" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="1426" instrument_node="">3</span></a><span data-dcnode-id="1424" instrument_node="">) (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e833" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1423" instrument_node="">2017</span></a><span data-dcnode-id="1421" instrument_node="">, Annex 6). However, the UK and individual member states’ bilateral data have some gaps and contain some apparent distortions (Table </span><a data-dcnode-id="1419" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="1420" instrument_node="">4</span></a><span data-dcnode-id="1418" instrument_node="">) (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e839" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1417" instrument_node="">2017</span></a><span data-dcnode-id="1415" instrument_node="">, Annex 7).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1399" data-test="inline-table" id="table-3"><figure data-dcnode-id="1400"><figcaption class="c-article-table__figcaption" data-dcnode-id="1411"><b data-dcnode-id="1412" data-test="table-caption" id="Tab3"><span data-dcnode-id="1413" instrument_node="">Table 3 Foreign direct investment of UK and EU-27 worldwide, total flows and stocks, 2015</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1401"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="1402" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/tables/3" rel="nofollow"><span data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1403" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1404" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1405" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1408" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1407" fill-rule="evenodd"></path><span data-dcnode-id="1406" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1398" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="1383" data-test="inline-table" id="table-4"><figure data-dcnode-id="1384"><figcaption class="c-article-table__figcaption" data-dcnode-id="1395"><b data-dcnode-id="1396" data-test="table-caption" id="Tab4"><span data-dcnode-id="1397" instrument_node="">Table 4 Foreign direct investment: bilateral between the UK and EU-27, total flows and stocks, 2015</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1385"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="1386" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/tables/4" rel="nofollow"><span data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1387" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1388" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1389" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1392" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1391" fill-rule="evenodd"></path><span data-dcnode-id="1390" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The worldwide stocks of FDI are massive in both directions, with the EU-27 having a stock of €7033 billion of outward investments, while receiving €5692 billion of inward investments. The UK has a stock of €1386 outward investments and about the same amount of inward investments, at €1314 billion.</span></p><p data-dcnode-id="1375"><span data-dcnode-id="1379" instrument_node="">UK investments in the EU-27 of €683 billion look reasonably proportioned in relation to the worldwide total of €5692 billion investments in the EU-27. However, the data for EU-27 investment in the UK seems implausible, with €985 billion of inward investments from the EU-27 accounting for a very large share (75%) of the total worldwide investment in the UK of €1314 billion. The source of this implausibility seems to be the huge reported amount of Dutch investments in the UK of €454 billion, in comparison to the UK’s nominal investments in the Netherlands (Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e1309" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1378" instrument_node="">2017</span></a><span data-dcnode-id="1376" instrument_node="">, Annex 7). In reality, these are only intermediate investments in transit from other sources.</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node="">Statistics on FDI stocks and flows have to be analysed with caution since they contain many inaccuracies and internal contradictions. The first limitation is showcased by the mismatch of bilateral and multilateral FDI data with the corresponding “mirror statistics”. The figures for FDI stocks differ substantially depending on whether one uses the recipient’s or the investor’s data. For example, from the Irish (data) perspective, the UK is a large net (FDI) investor in Ireland whereas the UK (data) view suggests it is only a small net investor (one-tenth of the Irish statistics). For Italy, the net position </span><i data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">vis-à-vis</span></i><span data-dcnode-id="1371" instrument_node=""> the UK switches from a substantial net recipient position to a net investor position, depending on which country’s statistics one uses. For the services data, official statistics offices have not been able to clear up these apparent contradictions.</span></p><p data-dcnode-id="1362"><span data-dcnode-id="1369" instrument_node="">The second limitation stems from hollow FDI via special purpose entities or vehicles (SPEs), for example for taxation or other regulatory reasons. The share of SPE-driven FDI is particularly large in Luxembourg and the Netherlands. These two countries also account for around 60% of the overall total inward and outward stocks of the EU-27 (Eurostat </span><a aria-label="Reference 2017" data-dcnode-id="1367" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d250908263e1322" title="Eurostat (2017). Your key to European statistics. 
                    http://ec.europa.eu/eurostat/data/database?p_p_id=NavTreeportletprod_WAR_NavTreeportletprod_INSTANCE_nPqeVbPXRmWQ&amp;p_p_lifecycle=0&amp;p_p_state=normal&amp;p_p_mode=view&amp;p_p_col_id=column-2&amp;p_p_col_count=1
                    
                  ."><span data-dcnode-id="1368" instrument_node="">2017</span></a><span data-dcnode-id="1366" instrument_node="">). According to the OECD (</span><a aria-label="Reference 2016a" data-dcnode-id="1364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e1325" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1365" instrument_node="">2016a</span></a><span data-dcnode-id="1363" instrument_node="">), on average for 2011–2015, 70% and 95% of all FDI inflows to the Netherlands and Luxembourg, respectively, were via SPEs. This type of financial FDI is less likely to take the form of productive investment. A reduction financial FDI may have different implications for economic growth, particularly sustainable growth. A detailed breakdown for the UK into traditional and financial FDI is not available, but it can be assumed that the UK is also heavily engaged in financial FDI given the role of the city of London as a financial hub. FDI stocks from and to the EU-27, excluding the Netherlands and Luxembourg, might thus be a more reliable indication of the real links from direct investment than the overall figures for the UK that include these two countries. The limited bilateral data available (which excludes Luxembourg) suggests that financial FDI accounts for about one half of UK investment in the EU-27 and at least about one third of EU-27 FDI in the UK.</span></p></div></div></section><section data-dcnode-id="1175" data-title="Economic Impacts: Quantitative Estimates"><div class="c-article-section" data-dcnode-id="1176" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1357" id="Sec7"><span data-dcnode-id="1358" instrument_node="">Economic Impacts: Quantitative Estimates</span></h2><div class="c-article-section__content" data-dcnode-id="1177" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="1355" id="Sec8"><span data-dcnode-id="1356" instrument_node="">Model-Based Simulations</span></h3><p data-dcnode-id="1332"><span data-dcnode-id="1354" instrument_node="">There have been a number of model-based attempts to simulate the impact of Brexit, of which several estimate the impacts on both the UK and the EU-27. Of these, three are from official sources (OECD </span><a aria-label="Reference 2016a" data-dcnode-id="1352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e1341" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1353" instrument_node="">2016a</span></a><span data-dcnode-id="1351" instrument_node="">; the UK Treasury [HM Treasury </span><a aria-label="Reference 2016" data-dcnode-id="1349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d250908263e1344" title="Her Majesty’s (HM) Treasury (2016). HM Treasury analysis: the long-term economic impact of EU membership and the alternatives. Presented to Parliament by the Chancellor of the Exchequer by command of Her Majesty, Cm 925, April. Available at: 
                    https://www.gov.uk/government/publications/hm-treasury-analysis-the-long-term-economic-impact-of-eu-membership-and-the-alternatives
                    
                  ."><span data-dcnode-id="1350" instrument_node="">2016</span></a><span data-dcnode-id="1348" instrument_node="">] and the Netherlands Central Planning Bureau (CPB) [Rojas-Romagosa </span><a aria-label="Reference 2016" data-dcnode-id="1346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d250908263e1347" title="Rojas-Romagosa, Hugo (2016). Trade effects of Brexit for the Netherlands. CPB Background Document, CPB Netherlands Bureau for Economic Policy Analysis, Rotterdam, June. Available at: 
                    http://www.cpb.nl/en/publication/trade-effects-of-brexit-for-the-netherlands
                    
                  ."><span data-dcnode-id="1347" instrument_node="">2016</span></a><span data-dcnode-id="1345" instrument_node="">]), and three from independent academic institutions or think tanks (London School of Economics [Ottaviano et al. </span><a aria-label="Reference 2016" data-dcnode-id="1343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d250908263e1350" title="Ottaviano, G., Dhingra, S., Huang, H., Pessoa, J. P., Sampson, T., &amp; van Reenen, J. (2016). The costs and benefits of leaving the EU: Trade effects. Centre for Economic Performance Technical Report. London School of Economics, London: Centre for Economic Performance Available at: 
                    http://cep.lse.ac.uk/pubs/download/brexit02_technical_paper.pdf
                    
                  ."><span data-dcnode-id="1344" instrument_node="">2016</span></a><span data-dcnode-id="1342" instrument_node="">]; IFO in Munich [Aichele and Felbermayr </span><a aria-label="Reference 2015" data-dcnode-id="1340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d250908263e1353" title="Aichele, R., &amp; Felbermayr, G. (2015). Costs and benefits of a United Kingdom exit from the European Union. Guetersloh: Bertelsmann Stiftung Available at: 
                    https://www.bertelsmann-stiftung.de/fileadmin/files/BSt/Publikationen/GrauePublikationen/NW_BREXIT_EN.pdf
                    
                  ."><span data-dcnode-id="1341" instrument_node="">2015</span></a><span data-dcnode-id="1339" instrument_node="">], Open Europe in London [Booth et al. </span><a aria-label="Reference 2015" data-dcnode-id="1337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d250908263e1357" title="Booth, S., Howarth, C., &amp; Persson, M. (2015). What if…? The consequences, challenges and opportunities facing Britain outside EU. Open Europe Report, 3, 15."><span data-dcnode-id="1338" instrument_node="">2015</span></a><span data-dcnode-id="1336" instrument_node="">]). Broadly speaking, this cluster of studies represents the state-of-the-art in trade policy modelling, with both new and traditional methodologies (for full details, Emerson et al. </span><a aria-label="Reference 2017" data-dcnode-id="1334" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d250908263e1360" title="Emerson, M., Busse, M., Di Salvo, M., Gros, D., &amp; Pelkmans, J. (2017). An assessment of the economic impact of Brexit on the EU27. Briefing Paper for the internal market and Consumer Protection Committee of the European Parliament, Brussels, January. Available at: 
                    http://www.europarl.europa.eu/thinktank/en/document.html?reference=IPOL_STU%282017%29595374
                    
                  ."><span data-dcnode-id="1335" instrument_node="">2017</span></a><span data-dcnode-id="1333" instrument_node="">).</span></p><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">While these model simulations cannot capture all the likely economic effects of Brexit, they do provide a cluster of findings that are close to a consensus view on the relative size of the impacts. Given that the UK trade with the EU-27 is a much bigger fraction of the UK’s GDP than that of the EU-27, it is hardly surprising that the economic impacts are much higher for the UK.</span></p><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The hypotheses for these studies are quite similar, in that they all simulate a range of scenarios that we call either optimistic, meaning a small increase in trade barriers between the two parties, or pessimistic, meaning a much larger increase in trade barriers. Some also have a central scenario between the two polar cases. The optimistic scenario in several cases assumes that the UK would enjoy a situation close to that as a member of the European Economic Area like Norway. The pessimistic scenario usually assumes that the trading relationship between the UK and the EU-27 is reduced to the terms of their WTO membership, with tariffs introduced at most favoured nations (MFN) rates. This is widely called the “hard Brexit”.</span></p><p data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">In most of this section we will concentrate on the impact of Brexit on GDP, which is also the focus of most models. Some of the models also report the impact on trade flows. For instance, Lawless and Morgenroth (</span><a aria-label="Reference 2016" data-dcnode-id="1325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d250908263e1372" title="Lawless, Martina, and Edgar Morgenroth (2016). The product and sector level impact of a hard Brexit across the EU. ESRI Working Paper no. 550, Economic and Social Research Institute, Dublin. Available at: 
                    http://www.esri.ie/pubs/WP550.pdf
                    
                  ."><span data-dcnode-id="1326" instrument_node="">2016</span></a><span data-dcnode-id="1324" instrument_node="">) estimate a fall in the EU-27’s exports to the UK of 30% and in the UK’s exports to the EU-27 of 22%, taking into account only the introduction of WTO MFN tariffs. However, given the differences in the size of trade flows, this translates into a decline of only 2% of total (worldwide) EU-27 exports. The impact of Brexit on some individual member states, like Ireland and Belgium, is of course estimated to be much larger with these two countries facing a reduction in total exports equal to 4% and 3.1%. For the UK, the impact of Brexit on total exports is considerably larger, 9.8%. Rojas-Romagosa (</span><a aria-label="Reference 2016" data-dcnode-id="1322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d250908263e1375" title="Rojas-Romagosa, Hugo (2016). Trade effects of Brexit for the Netherlands. CPB Background Document, CPB Netherlands Bureau for Economic Policy Analysis, Rotterdam, June. Available at: 
                    http://www.cpb.nl/en/publication/trade-effects-of-brexit-for-the-netherlands
                    
                  ."><span data-dcnode-id="1323" instrument_node="">2016</span></a><span data-dcnode-id="1321" instrument_node="">) arrive at broadly similar results. They predict that the fall in EU-27 exports to the UK would amount to 3% in the WTO scenario and 1.7% in the FTA scenario. For the UK, total exports would decrease by 21.8% and 12.5% in the WTO and FTA scenarios, respectively.</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">For the EU-27, on average, there are losses of 0.08 to 0.44% of GDP for the optimistic and pessimistic scenarios respectively. These results cumulate over the whole decade until 2030, which means that if the impacts were spread evenly over these years, the annual average impact would be of the order of 0.01 to 0.04% of GDP (i.e., the impacts would be insignificant and hardly noticeable at the macroeconomic level for the whole EU-27 economy). This does not exclude that individual sectors, or some small member states, would be more significantly affected, on which we comment on below.</span></p><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The results for the UK are much larger, where the losses average 1.31 to 4.21% of GDP for the optimistic and pessimist scenarios, respectively. Since the ratio of the UK economy to the EU-27 is about 1:5, a disproportionate result in terms of a percent of GDP was to be expected. If the absolute loss were of the same size for both sides, one would have expected that the loss as a percent of GDP should be only five times higher for the UK. As a percent of GDP, the average loss for the UK is about ten times higher or more.</span></p><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Since the ratio of the UK economy to the EU-27 is about 1:5, a disproportionate result in terms of a percent of GDP was to be expected. If the absolute loss were of the same size for both sides, one would have expected that the loss as a percent of GDP should be only five times higher for the UK. As a percent of GDP, the average loss for the UK is at least ten times higher.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">The model results in terms of the impacts on GDP are summarized in Fig. </span><a data-dcnode-id="1311" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1312" instrument_node="">1</span></a><span data-dcnode-id="1310" instrument_node=""> below in billions of euros. The loss for the EU-27 is on the horizontal axis and for the UK on the vertical axis. This figure also contains a 45 degree line. All points are above this line, which indicates that the absolute loss is in all cases estimated to be higher for the UK than for the EU. Moreover, most of the studies (essentially all except CPB) align on a line with slope of two, implying that most studies find that the losses from Brexit would be twice as high for the UK as for the EU-27.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1267" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="1268"><figcaption data-dcnode-id="1306"><b class="c-article-section__figure-caption" data-dcnode-id="1307" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1308" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1279"><div class="c-article-section__figure-item" data-dcnode-id="1301"><a class="c-article-section__figure-link" data-dcnode-id="1302" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/figures/1" rel="nofollow"><picture data-dcnode-id="1303"><source data-dcnode-id="1305" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11293-017-9553-7/MediaObjects/11293_2017_9553_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1304" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11293-017-9553-7/MediaObjects/11293_2017_9553_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1280" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1281"><span data-dcnode-id="1300" instrument_node="">Absolute losses for the UK and EU-27 GDP (in € Billion). Source: Author’s own computations using data on GDP from OECD statistics (OECD </span><a aria-label="Reference 2016b" data-dcnode-id="1298" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d250908263e1404" title="OECD (2016b). OECD Stat. Available at: 
                    http://stats.oecd.org/
                    
                  ."><span data-dcnode-id="1299" instrument_node="">2016b</span></a><span data-dcnode-id="1297" instrument_node="">). For the UK, the amount is converted from pounds to euros using the annual average exchange rate for 2015. The diamonds represent the different model-based estimates, labelled by author. Pes. = pessimistic scenario; Opt. = optimistic scenario; Booth&nbsp;=&nbsp;Booth et al. (</span><a aria-label="Reference 2015" data-dcnode-id="1295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d250908263e1407" title="Booth, S., Howarth, C., &amp; Persson, M. (2015). What if…? The consequences, challenges and opportunities facing Britain outside EU. Open Europe Report, 3, 15."><span data-dcnode-id="1296" instrument_node="">2015</span></a><span data-dcnode-id="1294" instrument_node="">); CPB&nbsp;=&nbsp;Rojas-Romagosa (</span><a aria-label="Reference 2016" data-dcnode-id="1292" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d250908263e1410" title="Rojas-Romagosa, Hugo (2016). Trade effects of Brexit for the Netherlands. CPB Background Document, CPB Netherlands Bureau for Economic Policy Analysis, Rotterdam, June. Available at: 
                    http://www.cpb.nl/en/publication/trade-effects-of-brexit-for-the-netherlands
                    
                  ."><span data-dcnode-id="1293" instrument_node="">2016</span></a><span data-dcnode-id="1291" instrument_node="">); Aich. = Aichele and Felbermayr (</span><a aria-label="Reference 2015" data-dcnode-id="1289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d250908263e1413" title="Aichele, R., &amp; Felbermayr, G. (2015). Costs and benefits of a United Kingdom exit from the European Union. Guetersloh: Bertelsmann Stiftung Available at: 
                    https://www.bertelsmann-stiftung.de/fileadmin/files/BSt/Publikationen/GrauePublikationen/NW_BREXIT_EN.pdf
                    
                  ."><span data-dcnode-id="1290" instrument_node="">2015</span></a><span data-dcnode-id="1288" instrument_node="">); OECD&nbsp;=&nbsp;OECD (</span><a aria-label="Reference 2016a" data-dcnode-id="1286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e1416" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1287" instrument_node="">2016a</span></a><span data-dcnode-id="1285" instrument_node="">); Ott. = Ottaviano et al. (</span><a aria-label="Reference 2016" data-dcnode-id="1283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d250908263e1420" title="Ottaviano, G., Dhingra, S., Huang, H., Pessoa, J. P., Sampson, T., &amp; van Reenen, J. (2016). The costs and benefits of leaving the EU: Trade effects. Centre for Economic Performance Technical Report. London School of Economics, London: Centre for Economic Performance Available at: 
                    http://cep.lse.ac.uk/pubs/download/brexit02_technical_paper.pdf
                    
                  ."><span data-dcnode-id="1284" instrument_node="">2016</span></a><span data-dcnode-id="1282" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1269"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1270" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11293-017-9553-7/figures/1" rel="nofollow"><span data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1271" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1272" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1273" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1276" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1275" fill-rule="evenodd"></path><span data-dcnode-id="1274" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Why is the loss (from leaving the EU’s internal market) distributed so asymmetrically? Economic theory predicts that both sides will lose from creating new trade barriers. However, general economic principles also suggest that larger economies lose less from the imposition of a tariff because of the greater market power of its enterprises. Suppose that two trading partners both impose a tariff of 5% on each other’s exports. Firms from the larger economy will be more likely to face an inelastic demand curve, allowing them to adjust their selling price for the tariff. By contrast, firms from the smaller economy are more likely to be price takers. They might thus have to cut the export price to keep market shares, and so bear the cost themselves. There is a fundamental reason why trade agreements between large and small countries tend to be asymmetric, and why the losses from Brexit are likely to be borne primarily by the UK (despite the fact that the UK is a net importer of goods from the EU)</span><i data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">.</span></i><span data-dcnode-id="1262" instrument_node="">
</span></p><p data-dcnode-id="1247"><span data-dcnode-id="1260" instrument_node="">The OECD and UK Treasury models represent a deeper set of impacts from FDI, which go beyond investment and trade volumes (OECD </span><a aria-label="Reference 2016a" data-dcnode-id="1258" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d250908263e1441" title="OECD (2016a). The economic consequences of Brexit – A taxing decision. OECD Policy Paper no. 16, organisation for economic co-operation and development, Paris, April. Available at: 
                    http://www.oecd.org/eco/The-Economic-consequences-of-Brexit-27-april-2016.pdf
                    
                  ."><span data-dcnode-id="1259" instrument_node="">2016a</span></a><span data-dcnode-id="1257" instrument_node="">; HM Treasury </span><a aria-label="Reference 2016" data-dcnode-id="1255" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d250908263e1444" title="Her Majesty’s (HM) Treasury (2016). HM Treasury analysis: the long-term economic impact of EU membership and the alternatives. Presented to Parliament by the Chancellor of the Exchequer by command of Her Majesty, Cm 925, April. Available at: 
                    https://www.gov.uk/government/publications/hm-treasury-analysis-the-long-term-economic-impact-of-eu-membership-and-the-alternatives
                    
                  ."><span data-dcnode-id="1256" instrument_node="">2016</span></a><span data-dcnode-id="1254" instrument_node="">). In various empirical studies taken into account in the two models, FDI is found to have a favourable impact on research and development (R&amp;D) expenditures and thence on innovation, competitiveness, and general management quality.</span><sup data-dcnode-id="1249"><a data-dcnode-id="1250" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Footnote </span></span><span data-dcnode-id="1251" instrument_node="">2</span></a></sup><span data-dcnode-id="1248" instrument_node="">
</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">One outlier among the model results is that of Open Europe (Booth et al. </span><a aria-label="Reference 2015" data-dcnode-id="1244" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d250908263e1466" title="Booth, S., Howarth, C., &amp; Persson, M. (2015). What if…? The consequences, challenges and opportunities facing Britain outside EU. Open Europe Report, 3, 15."><span data-dcnode-id="1245" instrument_node="">2015</span></a><span data-dcnode-id="1243" instrument_node="">), which, however, adopts a radically different optimistic scenario, namely the ultra-liberal formula whereby the UK would adopt free trade unilaterally, both with the EU and the rest of the world, without negotiating counterpart concessions from anyone (Booth et al. </span><a aria-label="Reference 2015" data-dcnode-id="1241" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d250908263e1469" title="Booth, S., Howarth, C., &amp; Persson, M. (2015). What if…? The consequences, challenges and opportunities facing Britain outside EU. Open Europe Report, 3, 15."><span data-dcnode-id="1242" instrument_node="">2015</span></a><span data-dcnode-id="1240" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1237" id="Sec9"><span data-dcnode-id="1238" instrument_node="">Going beyond the Models: Lessons from Other Approaches</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1235" id="Sec10"><span data-dcnode-id="1236" instrument_node="">Transatlantic Trade and Investment Partnership</span></h4><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Another way to estimate the costs of Brexit for the EU-27 is to use the studies done in preparation of TTIP, which would have involved the opposite of Brexit, namely an elimination of WTO MFN tariffs and a reduction of non-tariff barriers (NTBs).</span></p><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The comparison between Brexit and TTIP is more interesting than appears at first sight. The U.S. economy is of course several times larger than that of the UK, but Transatlantic trade is of a similar order of magnitude to trans-Channel trade. Transatlantic goods trade in 2015 was only about 20% larger than the trade in goods between the UK and the EU-27. The impact of Brexit might thus be comparable to that of TTIP with the sign reversed. Trade in services is, however, is twice as large across the Atlantic than across the Channel.</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1230" instrument_node="">Studies of scenarios for the TTIP came to the conclusion that the elimination of tariffs alone would not lead to large gains. The Commission’s own website puts it succinctly: “Given the low average tariffs (under 3%), the key to unlocking this potential lies in the tackling of non-tariff barriers. These consist mainly of customs procedures and behind the border regulatory restrictions.” (European Commission </span><a aria-label="Reference 2013" data-dcnode-id="1228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d250908263e1490" title="European Commission (2013). Transatlantic trade and investment partnership: The economic analysis explained. Available at: 
                    http://trade.ec.europa.eu/doclib/docs/2013/september/tradoc_151787.pdf
                    
                  ."><span data-dcnode-id="1229" instrument_node="">2013</span></a><span data-dcnode-id="1227" instrument_node="">; European Commission </span><a aria-label="Reference 2017" data-dcnode-id="1225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d250908263e1493" title="European Commission (2017) Trade, countries and regions: United States. Available at: 
                    http://ec.europa.eu/trade/policy/countries-and-regions/countries/united-states/
                    
                  ."><span data-dcnode-id="1226" instrument_node="">2017</span></a><span data-dcnode-id="1224" instrument_node="">)</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The widely accepted result from the economic impact studies, which used a similar approach (and models) to those surveyed here for Brexit, was that TTIP would increase EU GDP by about 0.5% of GDP, with 0.1% of GDP due to the elimination of tariffs between the EU and the U.S., and 0.4% of GDP due to the lowering (typically halving) of NTBs.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1219" id="Sec11"><span data-dcnode-id="1220" instrument_node="">Lessons from the Literature on the Benefits of EU Membership</span></h4><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Another way to estimate the cost of Brexit is to consider that the cost of Brexit should mirror the benefit of EU membership. There is substantial literature showing significant gains from EU and single market membership. If one were to accept the conclusions of this literature, one would conclude models surveyed here might understate the cost of Brexit.</span></p><p data-dcnode-id="1206"><span data-dcnode-id="1216" instrument_node="">One of the first studies to incorporate the many effects of a single market, was done by the CPB (Straathof et al. </span><a aria-label="Reference 2008" data-dcnode-id="1214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d250908263e1510" title="Straathof, B., Linders, G.-J., Lejour, A., &amp; Moehlmann, J. (2008). The internal market and the Dutch economy: Implications for trade and economic growth, CPB Document No. 168. Rotterdam: CPB Netherlands Bureau for Economic Policy Analysis Available at: 
                    http://www.cpb.nl/sites/default/files/publicaties/download/internal-market-and-dutch-economy-implications-trade-and-economic-growth.pdf
                    
                  ."><span data-dcnode-id="1215" instrument_node="">2008</span></a><span data-dcnode-id="1213" instrument_node="">), which used a blended computable general equilibrium (CGE) macroeconometric model (Worldscan [CPB </span><a aria-label="Reference 2006" data-dcnode-id="1211" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d250908263e1513" title="CBP Netherlands Bureau for Economic Policy Analysis (2006). Worldscan: a model for international economic policy analysis. Available at: 
                    http://www.cpb.nl/en/publication/worldscan-model-international-economic-policy-analysis
                    
                  ."><span data-dcnode-id="1212" instrument_node="">2006</span></a><span data-dcnode-id="1210" instrument_node="">]) to calculate that the benefits of EU membership are 10% of GDP or more. A novel attempt was undertaken by Campos et al. (</span><a aria-label="Reference 2014" data-dcnode-id="1208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d250908263e1516" title="Campos, N. F., Coricelli, F., &amp; Moretti, L. (2014). Economic growth and political integration: Estimating the benefits from membership in the European Union using the synthetic counterfactuals method. IZA Discussion Paper no. 8162, Institute for the Study of labor, Bonn. Available at: 
                    http://ftp.iza.org/dp8162.pdf
