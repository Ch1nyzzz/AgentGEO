</span><header class="entry-header" data-dcnode-id="1193"><span data-dcnode-id="1214" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1211"><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-case-of-writers-lock" rel="bookmark"><span data-dcnode-id="1213" instrument_node="">A case of writers’ lock</span></a></h2><span data-dcnode-id="1210" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1196"><span data-dcnode-id="1209" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1203"><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-case-of-writers-lock" rel="bookmark"><time class="entry-date published" data-dcnode-id="1207" datetime="2020-03-19T16:14:11+00:00"><span data-dcnode-id="1208" instrument_node="">March 19, 2020</span></time><time class="updated" data-dcnode-id="1205" datetime="2020-03-20T09:08:05+00:00"><span data-dcnode-id="1206" instrument_node="">March 20, 2020</span></time></a></span><span class="byline" data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1199"><a class="url fn n" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1201" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1197" instrument_node=""> </span></div><span data-dcnode-id="1194" instrument_node="">
</span></header><span data-dcnode-id="1191" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1169"><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">We do not use social media, so in modern terms we are fairly ‘silent’. A few kindly people have sent us emails enquiring how we are getting along in these unusual times and circumstances.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><figure aria-describedby="caption-attachment-3484" class="wp-caption alignright" data-dcnode-id="1183" id="attachment_3484" style="width: 308px"><img alt="" class="wp-image-3484" data-dcnode-id="1186" height="206" loading="lazy" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/03/self-isolation.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/03/self-isolation.jpg 576w, https://christopher-priest.co.uk/wp-content/uploads/2020/03/self-isolation-300x200.jpg 300w" width="308"><figcaption class="wp-caption-text" data-dcnode-id="1184" id="caption-attachment-3484"><span data-dcnode-id="1185" instrument_node="">The reality of self isolation</span></figcaption></figure><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The answer is that Nina and I are both working on new novels, sitting alone in our respective studies, a state of affairs completely normal for us but which conveniently looks like self-isolation and in general accord with the government’s recommendations about social distancing. It’s a fast-changing situation, as everyone knows. There is as yet no trace of the coronavirus on the island, nor indeed anywhere in the rest of Argyll &amp; Bute, a huge if not massively populated county. Because of the way these things work I assume the arrival of the dreaded thing is only a matter of when, not if.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">We have decided, with immense regret, not to attend the Eastercon this year.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Looking at the rest of this blog I notice that the last time I wrote an entry here was in November last year. How time flies. That appreciative review of Amy Binns’ biography of John Wyndham produced only one response, and that was a howl of protest from someone else who had been working on the same subject but had failed either to finish it or find a publisher for it. I was held somehow responsible for their failure, and a stream of vindictive emails followed. I had never before invoked the power to redirect unwanted emails from an annoying correspondent into the spam folder, but once I did a blessed silence fell. It took until mid-February for the phrase ‘self-isolation’ to emerge, when I realized what I had done had a name.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">All is therefore well here (for now), and although we are absorbed in what we are doing we are anxious to keep hearing from our friends about their own experiences in this alarming time.</span></p><span data-dcnode-id="1170" instrument_node="">
</span></div><span data-dcnode-id="1167" instrument_node="">
</span></article><span data-dcnode-id="1164" instrument_node="">
</span><article class="post-3475 post type-post status-publish format-standard sticky hentry category-journal category-news category-reviews" data-dcnode-id="1034" id="post-3475"><span data-dcnode-id="1163" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1143"><span data-dcnode-id="1162" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1159"><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-life-awakes" rel="bookmark"><span data-dcnode-id="1161" instrument_node="">The Life Awakes</span></a></h2><span data-dcnode-id="1158" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1146"><span data-dcnode-id="1157" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1153"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-life-awakes" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1155" datetime="2019-11-28T21:32:39+00:00"><span data-dcnode-id="1156" instrument_node="">November 28, 2019</span></time></a></span><span class="byline" data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1149"><a class="url fn n" data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1151" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1147" instrument_node=""> </span></div><span data-dcnode-id="1144" instrument_node="">
</span></header><span data-dcnode-id="1141" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1037"><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1137"><img alt="" class="alignleft wp-image-3476" data-dcnode-id="1139" height="321" loading="lazy" sizes="(max-width: 210px) 100vw, 210px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-scaled.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-scaled.jpg 1676w, https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-196x300.jpg 196w, https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-670x1024.jpg 670w, https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-768x1173.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-1006x1536.jpg 1006w, https://christopher-priest.co.uk/wp-content/uploads/2019/11/Hidden-Wyndham-1341x2048.jpg 1341w" width="210"><span data-dcnode-id="1138" instrument_node="">At last we have in Amy Binns’s new biography of John Wyndham a well-written and objectively researched book, half a century after his death in 1969. Wyndham was the first successful modern science fiction writer to emerge in Britain since H G Wells. His work, mostly written in the late 1940s or early 1950s, has acquired period charm, and some of the dialogue is middle class in tone and dated in style, but there is a hardness of vision, a satirical edge, a sense of the author’s regrets and sometimes amusement about the follies of the world at large.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">His books and short stories are remarkable for their constant depiction of strong, decisive or capable women. His speculative ideas, although sometimes reworked from his own early stories or from the generality of the genre, were presented plausibly and with a nice sense of menace. For example, his second novel, </span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">The Kraken Wakes</span></em><span data-dcnode-id="1132" instrument_node="">, created a genuine and growing feeling of mystery and unease while an invasion force went about a deliberate and unexplained process of destroying our planet.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node="">Amy Binns’s excellent book, </span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Hidden Wyndham</span></em><span data-dcnode-id="1126" instrument_node="">, depicts the author as a shy, withdrawn and deeply private man. There are no shocking details to be excavated from the past, there is no scandal, no secret life, although a tinge of sadness hung around him. At first he had to deal with the effects of being born into a dysfunctional middle-class family, his mother a distant if loving presence, his father a ne’er-do-well lawyer who sponged constantly off his wife’s wealthy parents. As a young man Wyndham began a tentative writing career in the American pulp magazines, which was interrupted when the second world war began. After war service he returned to his writing and became unexpectedly a major publishing phenomenon.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">When his first books were successful he became known to other science fiction writers in London, including Arthur C Clarke (then much less celebrated), William F Temple and John Christopher. Wyndham regularly attended their monthly meetings at the White Hart and Globe pubs, but they seem to have learned little or nothing about his life. Later he collaborated with them to launch the magazine </span><em data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">New Worlds SF</span></em><span data-dcnode-id="1120" instrument_node=""> as a commercial venture, but he retained his privacy. He lived somewhere in London, but they had no idea where. When he signed the official papers as Chairman of the new company, his address was revealed to be at a members’ club they had never heard of. ‘Wyndham’ was a kind of pseudonym – his real name turned out to be John Wyndham Parkes Lucas Beynon Harris.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">When in 1963 he announced that he had married a friend called Grace Wilson, with whom he had been close for more than two decades, the other writers were astonished: he had always seemed isolated, self-sufficient, closed off, a classic bachelor of choice. In fact, as we discover from the archive of his hundreds of letters written to Grace (many of them sent while he was serving in the Army after D-Day), theirs was a loving, intimate and trusting relationship. For most of that time they chose to present as just friends: they rented adjacent rooms in London’s Penn Club, a strictly run private club established by Quakers which would not condone extra-marital relationships. Because marriage, or even more the admission of an affair, would in those days have had a drastic impact on Grace’s professional career (she was a senior teacher at a girls’ school, and for years the main breadwinner of the two of them), they decided to stay unwed. John Wyndham himself was content not to formalize their relationship until late in life. Once married, he and Grace stayed happily together until Wyndham died. He was at ease for the rest of his life, and the books brought him substantial financial security.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1114" instrument_node="">The quality of his work takes the general form of a bell curve. His early contributions to American science fiction magazines were typical of the period and have become badly dated – many of them were reprinted in modern editions after his success, and are mainly of curiosity interest now. The war arrived and Wyndham had to stop writing. He became one of the generation of British writers whose careers were put on hold for several years: others include Elizabeth Bowen, William Sansom, Rex Warner, H E Bates, Graham Greene. The involuntary pause had a different impact on the work of each individual, but in Wyndham’s case it seems to have been the making of him. </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">The Day of the Triffids</span></em><span data-dcnode-id="1111" instrument_node=""> (1951), the first book published as by John Wyndham, is skilfully told in a mature and readable style. His other three great novels followed: </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">The Kraken Wakes</span></em><span data-dcnode-id="1108" instrument_node=""> (1953), </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">The Chrysalids</span></em><span data-dcnode-id="1105" instrument_node=""> (1955) and </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">The Midwich Cuckoos</span></em><span data-dcnode-id="1102" instrument_node=""> (1957).</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1099" instrument_node="">But these four represent the peak, the upper limit of the bell curve. Four more novels followed, none of them at the same standard as his best. </span><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Trouble with Lichen</span></em><span data-dcnode-id="1096" instrument_node=""> (1960) was a social satire, a distinct lowering of temperature from the others. </span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The Outward Urge</span></em><span data-dcnode-id="1093" instrument_node=""> (1959, published in collaboration with ‘Lucas Parkes’ as nonexistent science adviser) was another disappointment. The last novel to be published in his lifetime was </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Chocky</span></em><span data-dcnode-id="1090" instrument_node=""> (1968), which was an adult novel with a child as a main character. After his death, a novel he had been struggling with for several years was finally published.&nbsp;</span><em data-dcnode-id="1087"><span data-dcnode-id="1088" style="font-size: 1rem;"><span data-dcnode-id="1089" instrument_node="">Web</span></span></em><span data-dcnode-id="1085" style="font-size: 1rem;"><span data-dcnode-id="1086" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1083" style="font-size: 1rem;"><span data-dcnode-id="1084" instrument_node="">(1979) was a long way below par, something of which John Wyndham himself was almost certainly aware.</span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1080" instrument_node="">Forty years after Wyndham’s death, an unpublished novel called </span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Plan for Chaos</span></em><span data-dcnode-id="1077" instrument_node=""> was found in his papers at University of Liverpool. After a university press hardcover appeared in 2009, Penguin later published it in paperback. (I was commissioned to write an Introduction to their edition.) For imagined commercial reasons </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Plan for Chaos</span></em><span data-dcnode-id="1074" instrument_node=""> had been aimed at the American market, but the attempts at American dialogue and slang were crude and unsuccessful through most of the opening chapters. The second half of the novel is much better, and the story of the Nazi scientists who escaped to South America, and aimed to take over the world in their flying saucers, at least has the familiar Wyndham ironic humour.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1071" instrument_node="">Interestingly, </span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Plan for Chaos</span></em><span data-dcnode-id="1068" instrument_node=""> was written after </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The Day of the Triffids</span></em><span data-dcnode-id="1065" instrument_node="">, but it is significantly less accomplished. In correspondence with Frederik Pohl, his American literary agent, Wyndham said he thought the Englishness of </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Triffids</span></em><span data-dcnode-id="1062" instrument_node=""> would make it difficult to sell in the States. He put the better novel aside while he wrote the much weaker book intended to replace it.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1059" instrument_node="">There is some evidence (noted by Dr Binns in her book) that Ira Levin and John Wyndham had corresponded, and that Levin was likely to have read </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Plan for Chaos</span></em><span data-dcnode-id="1056" instrument_node=""> in manuscript. His own novel, </span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The Boys from Brazil</span></em><span data-dcnode-id="1053" instrument_node=""> (1976), has a remarkably similar plot in outline. One of his other novels, </span><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">This Perfect Day</span></em><span data-dcnode-id="1050" instrument_node=""> (1970), contains a coded acknowledgement to Wyndham.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The mysteries of John Wyndham’s private life turn out to be trivial, and no one’s business but his own. To read his love letters to Grace feels intrusive, but they give a context to the body of his best work. He seemed diffident and aloof to some who met him, but Amy Binns reveals him as a decent and faithful man, a lover of the countryside and a gifted storyteller. His books have been continuously in print for nearly seventy years, an extraordinary achievement.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1039"><em data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Hidden Wyndham — Life, Love, Letters</span></em><span data-dcnode-id="1042" instrument_node=""> by Amy Binns, Grace Judson Press, pp 288, £10.95. ISBN: </span><em data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">978-0-9927567-1-0</span></em></p><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1035" instrument_node="">
</span></article><span data-dcnode-id="1032" instrument_node="">
</span><article class="post-3462 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="478" id="post-3462"><span data-dcnode-id="1031" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1009"><span data-dcnode-id="1030" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1027"><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-hundred-books" rel="bookmark"><span data-dcnode-id="1029" instrument_node="">A Hundred Books</span></a></h2><span data-dcnode-id="1026" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1012"><span data-dcnode-id="1025" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1019"><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-hundred-books" rel="bookmark"><time class="entry-date published" data-dcnode-id="1023" datetime="2019-11-27T14:45:51+00:00"><span data-dcnode-id="1024" instrument_node="">November 27, 2019</span></time><time class="updated" data-dcnode-id="1021" datetime="2019-11-27T22:11:57+00:00"><span data-dcnode-id="1022" instrument_node="">November 27, 2019</span></time></a></span><span class="byline" data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1015"><a class="url fn n" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1017" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1013" instrument_node=""> </span></div><span data-dcnode-id="1010" instrument_node="">
</span></header><span data-dcnode-id="1007" instrument_node="">
</span><div class="entry-content" data-dcnode-id="481"><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Here are the one hundred books I consider to be my ‘key’ titles. They are not intended as recommendations as such, although in many cases I would in fact recommend them. I imagine many of the works here will be already familiar to most people reading this. The uniqueness lies only in the totality, the existence of one title thought of as special in the context of all the others of similar specialness, memorable in a life full of fairly disorganized and impulsive reading.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">I have read them all, and they remain permanently on my shelves, but I have not read all of them all the way through. (I have read closely only a handful of Shakespeare’s Sonnets, for one example.) In most cases the book as a whole has had an impact on me, but in at least two instances what I remember most profoundly is an image from a single sentence, and in one other case it was a painted illustration that moved me — I only identified the work the painting was based on many years later. But of course several are here because I have read and re-read them many times (</span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Alice in Wonderland</span></em><span data-dcnode-id="999" instrument_node=""> was a constant favourite throughout my early childhood).</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">Speaking of Shakespeare, I have seen </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Hamlet</span></em><span data-dcnode-id="993" instrument_node=""> performed four or maybe five times, but I have never read the play as a text. I can recall few lines from it, and accurately quote none of it, but when I hear the words spoken I am filled with a happy recognition.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The books are in alphabetical order by author — this is a way of slightly covering my tracks. Putting them in chronological order would be difficult and only approximate anyway, and even then would be far too revealing of how easy it is to be sucked into a series of like books, one after the other. The most recently discovered author on this list is the Chilean writer Roberto Bolaño.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">But alphabetization of the authors produces its own oddness. There is Enid Blyton cheek by jowl with J G Ballard. And George Orwell and Beatrix Potter lie next to each other, even though three decades separate them. (I’m not saying which one came first.)</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="984" instrument_node="">This particular listomania was brought on by Nina Allan, who has published </span><span data-dcnode-id="981" style="color: #0000ff;"><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ninaallan.co.uk/%3Fp%3D3831" style="color: #0000ff;"><span data-dcnode-id="983" instrument_node="">her own list</span></a></span><span data-dcnode-id="980" instrument_node=""> and talked me into doing mine. The whole thing was ultimately provoked by the current BBC-TV series, </span><span data-dcnode-id="976" style="color: #0000ff;"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/mediacentre/latestnews/2019/100-novels" style="color: #0000ff;"><em data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">100 Novels that Shaped our World</span></em></a></span><span data-dcnode-id="975" instrument_node="">. I do not claim world-shaping impact on me from these titles, nor are all of them novels, but they form part of the silent context from which one views the world and reacts to it.</span></p><span data-dcnode-id="973" instrument_node="">
</span><ol data-dcnode-id="483"><span data-dcnode-id="972" instrument_node="">
</span><li data-dcnode-id="968"><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Penguin SF</span></em><span data-dcnode-id="969" instrument_node=""> Ed. Brian Aldiss</span></li><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="963"><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Non-Stop</span></em><span data-dcnode-id="964" instrument_node=""> Brian Aldiss</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="958"><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">New Maps of Hell</span></em><span data-dcnode-id="959" instrument_node=""> Kingsley Amis</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="953"><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">The Green Man</span></em><span data-dcnode-id="954" instrument_node=""> Kingsley Amis</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="948"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The Four-Dimensional Nightmare</span></em><span data-dcnode-id="949" instrument_node=""> J G Ballard</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="943"><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Vermilion Sands</span></em><span data-dcnode-id="944" instrument_node=""> J G Ballard</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="938"><em data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The Twins at St Clare’s</span></em><span data-dcnode-id="939" instrument_node=""> Enid Blyton</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="933"><em data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">The Castle of Adventure</span></em><span data-dcnode-id="934" instrument_node=""> Enid Blyton</span></li><span data-dcnode-id="932" instrument_node="">

</span><span class="posted-on" data-dcnode-id="463"><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/yea-or-nay" rel="bookmark"><time class="entry-date published" data-dcnode-id="467" datetime="2019-10-31T16:25:25+00:00"><span data-dcnode-id="468" instrument_node="">October 31, 2019</span></time><time class="updated" data-dcnode-id="465" datetime="2019-10-31T17:20:44+00:00"><span data-dcnode-id="466" instrument_node="">October 31, 2019</span></time></a></span><span class="byline" data-dcnode-id="458"><span data-dcnode-id="462" instrument_node=""> </span><span class="author vcard" data-dcnode-id="459"><a class="url fn n" data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="461" instrument_node="">chris</span></a></span></span><span data-dcnode-id="457" instrument_node=""> </span></div><span data-dcnode-id="454" instrument_node="">
</span></header><span data-dcnode-id="451" instrument_node="">
</span><div class="entry-content" data-dcnode-id="383"><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="447"><img alt="" class="alignleft wp-image-3455" data-dcnode-id="449" height="110" loading="lazy" sizes="(max-width: 70px) 100vw, 70px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2019/10/Referenda-in-the-UK.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2019/10/Referenda-in-the-UK.jpg 384w, https://christopher-priest.co.uk/wp-content/uploads/2019/10/Referenda-in-the-UK-190x300.jpg 190w" width="70"><span data-dcnode-id="448" instrument_node="">Three years ago, along with a lot of other people in Britain, I placed my vote in the European referendum. The next morning I woke up to discover that overnight I had been labelled a “Remainer”, and was informed that my vote was on the losing side and that I therefore no longer had a voice in what would happen as a result of the referendum. All that has continued to be true ever since.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">I voted to Remain for what I felt were uncontroversial reasons.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Firstly, in the last forty years or so I have travelled in more than half the European countries who make up the EU. Although none of the countries represents a perfect world, an ideal place, I grew to like the way European countries ran things. Social problems are everywhere but they appear to be dealt with more effectively, more humanely than here in the UK. From my personal perspective there was effective environmental legislation in place, the rights of workers seemed protected, and the arts were better supported. Going to a book fair in Spain, or a literary festival in France or Germany, is an eye-opening experience from a British point of view, and wipes away forever the conceit that the UK is one of the most literate, book-loving countries in the world.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="439" instrument_node="">Secondly, having worked in the UK court service for nearly two decades I have become thoroughly versed in the importance, subtlety and civilizing quality of the </span><span data-dcnode-id="436" style="color: #0000ff;"><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Convention_on_Human_Rights" style="color: #0000ff;"><span data-dcnode-id="438" instrument_node="">European Convention on Human Rights</span></a></span><span data-dcnode-id="435" instrument_node="">. Incorporated into UK law in 1998 it has had what I see as a profound and desirable effect, if largely unrecognized and sometimes misunderstood, on many aspects of daily life in this country.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428" style="text-align: left;"><span data-dcnode-id="432" instrument_node="">Thirdly, I lived in the south coast town of Hastings for nearly a quarter of a century. When I moved in it was a seaside dump, with many closed businesses, deteriorating housing stock, a horrendous drug problem and a pretty view of the English Channel. The view never changed, but our partner countries on the other side of the Channel were feeding millions of euros in subsidies and grants into many derelict British towns, including Hastings. All through the time I lived there the town was being cleaned up, repaired, invested in. By the time I left in 2014 it had been transformed. Hastings has become an attractive, prosperous and interesting place, with many cultural and artistic activities. (Now that I am living in Scotland I am starting to find out what similar EU investment in the past has done to improve lives and the environment here. Scotland is already a mini-European country in outlook and effectiveness. </span><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">NB to people in England:</span></em><span data-dcnode-id="429" instrument_node=""> after a few years of moratorium Scotland has just placed a permanent ban on fracking.)</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">So in a mild way, I felt the EU to be in general a good thing. It never occurred to me that many other people would have the strongly antagonistic feelings about it appallingly revealed in the months that have followed the referendum.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">The “Leave” campaign in 2016 was largely run by three secondrate Tory politicians (Boris Johnson, Michael Gove and Iain Duncan Smith). They were a front for a sinister cabal of secretive businessmen and political opportunists. Laws were broken, and lies were told. Lies were told every day, in fact, some of them so blatantly untrue that they have become a sort of stock-in-trade for comedians. (Mentioning £350 millions a week for the NHS still gets a cheap laugh every time.) The campaign they ran was emotive, it fudged detail, it avoided real issues, it appealed to people’s baser instincts about foreigners and immigrants and hospital waiting lists. Again, these tactics were so conspicuously dishonest that I assumed most people would have the sense to realize what was being said.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Interestingly, as the weak Tory government has tried in recent months to negotiate what they always call a “deal” (a horrible word made popular by Trump’s dishonest practices), it has become blazingly obvious that none of the real issues of leaving the EU, none of the serious problems, were ever mentioned by anyone in the Leave campaign. Does anyone remember the Leave campaign explaining how the problem of the Irish border would be solved?</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">So it is apparent that many people who voted to Leave were either gulled by the lies (or chose to ignore them after they were exposed), or they were not informed of the reality of what they were voting for. They followed their instincts instead.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">The referendum was an opportunity to succumb to the temptation to push a sharp stick into the eyes of the Tory nobs who ran the country. (Not such a bad idea, in socialistic fact: David Cameron’s cabinet contained a majority of public school boys, and at least eleven millionaires.) It was a protest about foreign workers taking up jobs that should have been given to British people. It was a fear of being swamped by immigration. It was a complaint that operations for varicose veins, cataract implants, replacement hips (and treatment for more serious emergencies, like cancer, stroke, etc) were the subject of long delays. It was anger that the schools were crowded and underfunded, that doctors’ surgeries were crammed with freeloading foreigners, that jobs were hard to come by …</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">All these are genuine concerns, and many people feel disadvantaged by them. But the root cause is not the arrival of refugees from dysfunctional regimes abroad, or Polish workmen, or Bulgarian fruit-pickers, or the policy of freedom of movement, or the unpoliced borders that inadequately protect our island. The truth is that we have been suffering from weak governments dominated by businessmen and hedgefund operatives, short-sighted policies, endless restrictions in the name of “austerity”, and above all a thoroughgoing lack of awareness about what many ordinary people care about on a daily basis, and the problems they have.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">In case this seems to be a one-sided tirade against the Tories, let me add that I consider the principal scoundrel responsible for the Brexit mess to be the leader of the Labour Party, Jeremy Corbyn. Where was the opposition during the referendum campaign? Who challenged the glib lies? Who raised the problem of the Irish border? Not Jeremy Corbyn, who apart from one self-evidently insincere little speech about supporting the Remain side, was all but invisible. His absence created the unfailing impression that the referendum was really just a squabble between two factions in the Conservative Party. Since the referendum, Corbyn’s endless vacillation and unconvincing announcements have only added to the ineffectiveness of this man. He is more responsible than Cameron, May or even Johnson for the mess we are in. There is a place reserved in Brexit hell for Jeremy Corbyn – I’d like to think of him spending eternity in a cell with Michael Gove and Iain Duncan Smith.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="405" instrument_node="">Today was planned to be the last day of our membership of the EU. Thankfully postponed yet again, it has become instead the first day of the General Election campaign. I have never voted Tory in my life, and in the past I worked as a campaign volunteer for the Labour Party. But should you sense even the whisper of a bat’s wing of temptation to vote for Corbyn’s party, I recommend you first to read </span><span data-dcnode-id="402" style="color: #0000ff;"><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Dangerous-Hero-Unmissable-investigative-biographer/dp/0008299579/ref%3Dsr_1_1%3Fkeywords%3DTom%2BBowyer%26qid%3D1572536909%26s%3Dbooks%26sr%3D1-1" style="color: #0000ff;"><span data-dcnode-id="404" instrument_node="">Tom Bowyer’s biography of Corbyn</span></a></span><span data-dcnode-id="401" instrument_node="">, just so you know what you would be voting for.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="398" instrument_node="">There is only one solution to this mess. The best “deal” is the one we have. Referenda have no constitutional position in the UK. </span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">They are advisory only.</span></em><span data-dcnode-id="395" instrument_node=""> The next government should swiftly consult the advice of the 2016 referendum, disagree with it, politely reject it, then revoke Article 50 and mend fences with our European friends and say sorry for all the botheration. Corbyn’s head on a stick might be enough to soothe their justifiable irritation with our otherwise green and pleasant land.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="392" instrument_node="">Further reading, if you can find a copy – Amazon.co.uk have a few copies at 50p each: </span><span data-dcnode-id="387" style="color: #0000ff;"><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Yea-Nay-Referenda-United-Kingdom/dp/0304296309/ref%3Dsr_1_4%3Fkeywords%3DYea%2Bor%2BNay%253F%26qid%3D1572535813%26s%3Dbooks%26sr%3D1-4" style="color: #0000ff;"><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Yea or Nay? – Referenda in the United Kingdom</span></em><span data-dcnode-id="389" instrument_node="">, by Stanley Alderson</span></a></span><span data-dcnode-id="386" instrument_node="">.</span></p><span data-dcnode-id="384" instrument_node="">
</span></div><span data-dcnode-id="381" instrument_node="">
</span></article><span data-dcnode-id="378" instrument_node="">
</span><article class="post-3445 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="309" id="post-3445"><span data-dcnode-id="377" instrument_node="">
</span><header class="entry-header" data-dcnode-id="355"><span data-dcnode-id="376" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="373"><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/anna-k-again" rel="bookmark"><span data-dcnode-id="375" instrument_node="">Anna K. again</span></a></h2><span data-dcnode-id="372" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="358"><span data-dcnode-id="371" instrument_node="">
</span><span class="posted-on" data-dcnode-id="365"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/anna-k-again" rel="bookmark"><time class="entry-date published" data-dcnode-id="369" datetime="2019-10-22T20:40:35+00:00"><span data-dcnode-id="370" instrument_node="">October 22, 2019</span></time><time class="updated" data-dcnode-id="367" datetime="2019-10-22T20:48:04+00:00"><span data-dcnode-id="368" instrument_node="">October 22, 2019</span></time></a></span><span class="byline" data-dcnode-id="360"><span data-dcnode-id="364" instrument_node=""> </span><span class="author vcard" data-dcnode-id="361"><a class="url fn n" data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="363" instrument_node="">chris</span></a></span></span><span data-dcnode-id="359" instrument_node=""> </span></div><span data-dcnode-id="356" instrument_node="">
</span></header><span data-dcnode-id="353" instrument_node="">
</span><div class="entry-content" data-dcnode-id="312"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">I see my last entry here was more than two months ago. There has been a period of delay, not at all my doing. Meanwhile, I have news of two or three public events in which I shall soon be taking part:</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="348" instrument_node="">I shall be at </span><span data-dcnode-id="345" style="color: #0000ff;"><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.novacon.org.uk/n49/" style="color: #0000ff;"><span data-dcnode-id="347" instrument_node="">Novacon 49</span></a></span><span data-dcnode-id="344" instrument_node="">, at the </span><span data-dcnode-id="341" style="color: #0000ff;"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accorhotels.com/gb/hotel-B540-mercure-nottingham-sherwood-hotel/index.shtml%3FdateIn%3D%26nights%3D1%26compositions%3D1%26stayplus%3Dfalse%23origin%3Dmercure" style="color: #0000ff;"><span data-dcnode-id="343" instrument_node="">Nottingham Sherwood Hotel</span></a></span><span data-dcnode-id="340" instrument_node="">, from 8 – 10 November. I shall be accompanying my daughter Elizabeth Priest, currently famous all over America since the </span><span data-dcnode-id="337" style="color: #0000ff;"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/tired-of-waiting-for-brexit-britons-munch-through-nutella-stockpiles-11565103703" style="color: #0000ff;"><span data-dcnode-id="339" instrument_node="">Wall Street Journal unironically reported</span></a></span><span data-dcnode-id="336" instrument_node=""> that she had not only ironically stockpiled Nutella, mozzarella and lactose-free milk in case of Brexit, but had eaten her way through the lot as one Brexit postponement followed another. More interestingly, Lizzy has just signed up with Luna Press for three more novels in her </span><span data-dcnode-id="333" style="color: #0000ff;"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Concrete-Faery-Book-I-Troutespond-ebook/dp/B07FN91DB2/ref%3Dsr_1_2%3Fkeywords%3DElizabeth%2BPriest%26qid%3D1571773918%26s%3Dbooks%26sr%3D1-2" style="color: #0000ff;"><span data-dcnode-id="335" instrument_node="">Troutespond series</span></a></span><span data-dcnode-id="332" instrument_node="">.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="329" instrument_node="">On 14th November I will be at </span><span data-dcnode-id="326" style="color: #0000ff;"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/anna-kavan-life-and-writing-an-evening-with-christopher-priest-tickets-77808275647" style="color: #0000ff;"><span data-dcnode-id="328" instrument_node="">Waterstones in Notting Hill, London W11</span></a></span><span data-dcnode-id="325" instrument_node="">, where we will be discussing the life and works of Anna Kavan, the fascinating author of the novel </span><em data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Ice</span></em><span data-dcnode-id="322" instrument_node="">, as well as several more novels and collections. She is still, in spite of the best efforts of the likes of me, Brian Aldiss, Doris Lessing and her publishers Peter Owen, woefully underrated. From 7:00pm to 8:30pm — tickets £3.00 from the website linked here.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="319" instrument_node="">A week later, on 21st November, I shall be at Cardonald Library, taking part in </span><span data-dcnode-id="316" style="color: #0000ff;"><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glasgowlife.org.uk/event/1/author-event-christopher-priest" style="color: #0000ff;"><span data-dcnode-id="318" instrument_node="">Book Week Scotland</span></a></span><span data-dcnode-id="315" instrument_node="">. Admission: free. 6:30pm to 7:30pm. Cardonald Library is on the main road between Paisley and the centre of Glasgow, halfway along. There is a map on the website.</span></p><span data-dcnode-id="313" instrument_node="">
</span></div><span data-dcnode-id="310" instrument_node="">
</span></article><span data-dcnode-id="307" instrument_node="">
</span><article class="post-3428 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="262" id="post-3428"><span data-dcnode-id="306" instrument_node="">
</span><header class="entry-header" data-dcnode-id="284"><span data-dcnode-id="305" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="302"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/epi-cycle" rel="bookmark"><span data-dcnode-id="304" instrument_node="">Epi-cycle</span></a></h2><span data-dcnode-id="301" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="287"><span data-dcnode-id="300" instrument_node="">
</span><span class="posted-on" data-dcnode-id="294"><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/epi-cycle" rel="bookmark"><time class="entry-date published" data-dcnode-id="298" datetime="2019-08-15T09:17:29+00:00"><span data-dcnode-id="299" instrument_node="">August 15, 2019</span></time><time class="updated" data-dcnode-id="296" datetime="2019-08-15T09:19:48+00:00"><span data-dcnode-id="297" instrument_node="">August 15, 2019</span></time></a></span><span class="byline" data-dcnode-id="289"><span data-dcnode-id="293" instrument_node=""> </span><span class="author vcard" data-dcnode-id="290"><a class="url fn n" data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="292" instrument_node="">chris</span></a></span></span><span data-dcnode-id="288" instrument_node=""> </span></div><span data-dcnode-id="285" instrument_node="">
</span></header><span data-dcnode-id="282" instrument_node="">
</span><div class="entry-content" data-dcnode-id="265"><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">The composer John Hodgson has, with astonishing speed and dedication, written a suite of music based on my collection of stories, </span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Episodes</span></em><span data-dcnode-id="277" instrument_node="">. It illustrates, or complements, the book.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">Each of the eleven stories has its own composition – I have played the whole suite only once, so I am still absorbing. The entire album can be listened to on the SoundCloud website, </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/user-803769891/sets/original-score-for-christopher/s-Mm4oX"><span data-dcnode-id="273" instrument_node="">here</span></a><span data-dcnode-id="271" instrument_node="">.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Hodgson has also written musical complements to books by Mark Morris and Jeff Noon. They can be heard on the same website.</span></p><span data-dcnode-id="266" instrument_node="">
</span></div><span data-dcnode-id="263" instrument_node="">
</span></article><span data-dcnode-id="260" instrument_node="">
</span><article class="post-3418 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="211" id="post-3418"><span data-dcnode-id="259" instrument_node="">
</span><header class="entry-header" data-dcnode-id="237"><span data-dcnode-id="258" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="255"><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/more-stooge" rel="bookmark"><span data-dcnode-id="257" instrument_node="">More Stooge</span></a></h2><span data-dcnode-id="254" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="240"><span data-dcnode-id="253" instrument_node="">
</span><span class="posted-on" data-dcnode-id="247"><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/more-stooge" rel="bookmark"><time class="entry-date published" data-dcnode-id="251" datetime="2019-07-07T10:36:29+00:00"><span data-dcnode-id="252" instrument_node="">July 7, 2019</span></time><time class="updated" data-dcnode-id="249" datetime="2019-07-07T10:56:06+00:00"><span data-dcnode-id="250" instrument_node="">July 7, 2019</span></time></a></span><span class="byline" data-dcnode-id="242"><span data-dcnode-id="246" instrument_node=""> </span><span class="author vcard" data-dcnode-id="243"><a class="url fn n" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="245" instrument_node="">chris</span></a></span></span><span data-dcnode-id="241" instrument_node=""> </span></div><span data-dcnode-id="238" instrument_node="">
</span></header><span data-dcnode-id="235" instrument_node="">
</span><div class="entry-content" data-dcnode-id="214"><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="233" instrument_node="">Rogelio Fojo’s remarkable film of my short story ‘The Stooge’ has gained another festival screening, this one the </span><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.burbankfilmfest.org/"><span data-dcnode-id="232" instrument_node="">Burbank International Film Festival</span></a><span data-dcnode-id="230" instrument_node="">, 4-8 September 2019. The story itself (the film tie-in, if you like, although it came first) appears in my new collection </span><em data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Episodes</span></em><span data-dcnode-id="227" instrument_node=""> – see below. This will be on sale later this week.</span></p><span data-dcnode-id="225" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="222"><figure class="aligncenter is-resized" data-dcnode-id="223"><img alt="" class="wp-image-3421" data-dcnode-id="224" height="179" loading="lazy" sizes="(max-width: 269px) 100vw, 269px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2019/07/BurbankFilmFestivalLaurels_BANNER-2-1024x680.jpeg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2019/07/BurbankFilmFestivalLaurels_BANNER-2-1024x680.jpeg 1024w, https://christopher-priest.co.uk/wp-content/uploads/2019/07/BurbankFilmFestivalLaurels_BANNER-2-300x199.jpeg 300w, https://christopher-priest.co.uk/wp-content/uploads/2019/07/BurbankFilmFestivalLaurels_BANNER-2-768x510.jpeg 768w, https://christopher-priest.co.uk/wp-content/uploads/2019/07/BurbankFilmFestivalLaurels_BANNER-2.jpeg 1600w" width="269"></figure></div><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Here is another still from the film:</span></p><span data-dcnode-id="218" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="216"><img alt="" class="wp-image-3419" data-dcnode-id="217" height="249" loading="lazy" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2019/07/image.png&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2019/07/image.png 765w, https://christopher-priest.co.uk/wp-content/uploads/2019/07/image-300x98.png 300w" width="765"></figure><span data-dcnode-id="215" instrument_node="">

</span><article class="post-3400 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="142" id="post-3400"><span data-dcnode-id="208" instrument_node="">
</span><header class="entry-header" data-dcnode-id="186"><span data-dcnode-id="207" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="204"><a data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/episodes" rel="bookmark"><span data-dcnode-id="206" instrument_node="">Episodes</span></a></h2><span data-dcnode-id="203" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="189"><span data-dcnode-id="202" instrument_node="">
</span><span class="posted-on" data-dcnode-id="196"><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/episodes" rel="bookmark"><time class="entry-date published" data-dcnode-id="200" datetime="2019-06-21T11:10:22+00:00"><span data-dcnode-id="201" instrument_node="">June 21, 2019</span></time><time class="updated" data-dcnode-id="198" datetime="2019-06-22T15:40:58+00:00"><span data-dcnode-id="199" instrument_node="">June 22, 2019</span></time></a></span><span class="byline" data-dcnode-id="191"><span data-dcnode-id="195" instrument_node=""> </span><span class="author vcard" data-dcnode-id="192"><a class="url fn n" data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="194" instrument_node="">chris</span></a></span></span><span data-dcnode-id="190" instrument_node=""> </span></div><span data-dcnode-id="187" instrument_node="">
</span></header><span data-dcnode-id="184" instrument_node="">
</span><div class="entry-content" data-dcnode-id="145"><span data-dcnode-id="183" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="180"><figure class="alignleft is-resized" data-dcnode-id="181"><img alt="" data-dcnode-id="182" height="426" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/I/51DohypCcGL._SX329_BO1%2C204%2C203%2C200_.jpg&amp;raw" width="283"></figure></div><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="178" instrument_node="">This is my new hardcover from Gollancz, to my mind a well designed and handsome edition. It will be published on 11 July, available in bookstores … and of course may be ordered through </span><a data-dcnode-id="176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Episodes-Christopher-Priest/dp/1473226007/ref%3Dsr_1_1%3Fcrid%3DK8PVSQRA6JRU%26keywords%3Depisodes%2Bchristopher%2Bpriest%26qid%3D1561114940%26s%3Dgateway%26sprefix%3DEpisodes%2BC%252Caps%252C141%26sr%3D8-1"><span data-dcnode-id="177" instrument_node="">Amazon</span></a><span data-dcnode-id="175" instrument_node=""> and other online retailers.</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="169"><em data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Episodes</span></em><span data-dcnode-id="170" instrument_node=""> is a collection of short stories with something extra. Each story has a Before and After, two short essays describing how the story came to be written, and what happened to it after that. The idea was to show how tangled the background  to the appearance of a short story can sometimes be. For instance, ‘An Infinite Summer’ is a harmless story about innocent love, but it had a pretty aggravating time in the hands of a particular American editor. The full account of what happened to that story is here, and I believe that this is the first time the professional activities, or more accurately the unprofessional non-activities, of that egregious timewaster have been reported accurately in the world of general publishing.</span></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">Other stories have their own backgrounds of personal provenance. The elderly woman who arranged for branches of trees to be slung at my car. The bank which thought literature could be made into a staff training device. The weird coincidence of two tragic deaths in train stations: one in the story, the other for real. The previously undescribed horror of an alphabetized book collection.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="160"></p><span data-dcnode-id="159" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="156"><figure class="alignright is-resized" data-dcnode-id="157"><img alt="" data-dcnode-id="158" height="218" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/I/51q6q6DrZlL._SX325_BO1%2C204%2C203%2C200_.jpg&amp;raw" width="143"></figure></div><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="154" instrument_node="">Also published on 11 July is the paperback edition of my most recently published novel </span><em data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">An American Story</span></em><span data-dcnode-id="151" instrument_node="">. For readers in the USA the only way to obtain copies is through internet retailers. Here is a link to </span><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/American-Story-Christopher-Priest/dp/1473200598/ref%3Dsr_1_1%3Fcrid%3D2NWDQAV33KZWB%26keywords%3Dan%2Bamerican%2Bstory%2Bby%2Bchristopher%2Bpriest%26qid%3D1561112780%26s%3Dgateway%26sprefix%3DAn%2BAmerican%2BStory%252Caps%252C140%26sr%3D8-1"><span data-dcnode-id="150" instrument_node="">amazon.co.uk</span></a><span data-dcnode-id="148" instrument_node="">, although I suspect amazon.com will also make it available. It is still the case that this story of a broken love affair, and the untrue story that obfuscates it, is deemed unsuitable for American readers. (However the novel has done OK in Russia, France, the UK, etc.) Distribution in the US of the British edition is likely to follow in due course, but I know not when.</span></p><span data-dcnode-id="146" instrument_node="">
</span></div><span data-dcnode-id="143" instrument_node="">
</span></article><span data-dcnode-id="140" instrument_node="">
</span><article class="post-3395 post type-post status-publish format-standard sticky hentry category-journal category-news tag-the-accidental-detective" data-dcnode-id="63" id="post-3395"><span data-dcnode-id="139" instrument_node="">
</span><header class="entry-header" data-dcnode-id="117"><span data-dcnode-id="138" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="135"><a data-dcnode-id="136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/it-is-done" rel="bookmark"><span data-dcnode-id="137" instrument_node="">It is Done</span></a></h2><span data-dcnode-id="134" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="120"><span data-dcnode-id="133" instrument_node="">
</span><span class="posted-on" data-dcnode-id="127"><a data-dcnode-id="128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/it-is-done" rel="bookmark"><time class="entry-date published" data-dcnode-id="131" datetime="2019-06-04T10:52:05+00:00"><span data-dcnode-id="132" instrument_node="">June 4, 2019</span></time><time class="updated" data-dcnode-id="129" datetime="2019-08-08T21:12:42+00:00"><span data-dcnode-id="130" instrument_node="">August 8, 2019</span></time></a></span><span class="byline" data-dcnode-id="122"><span data-dcnode-id="126" instrument_node=""> </span><span class="author vcard" data-dcnode-id="123"><a class="url fn n" data-dcnode-id="124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="125" instrument_node="">chris</span></a></span></span><span data-dcnode-id="121" instrument_node=""> </span></div><span data-dcnode-id="118" instrument_node="">
</span></header><span data-dcnode-id="115" instrument_node="">
</span><div class="entry-content" data-dcnode-id="66"><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">I have not written much here in recent weeks. I have been working on a new novel, and today I sent it in to Robert Kirby, my agent. Uniquely, in my experience, I had a period of more or less six months without interruptions, and I made the most of it.</span></p><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="110" instrument_node="">I was at </span><strong data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Utopiales</span></strong><span data-dcnode-id="107" instrument_node="">, in Nantes, at the beginning of November, but returned feeling worn out and over-extended. Too much travel, and a heavy cold contracted because of Easyjet’s tight-fisted habit of overcrowding their unforgivably minimalist cabins, laid me flat during much of the rest of the month. I rose from the bed at the beginning of December, and almost immediately began work on the novel. I was refreshed, renewed, and had at last stopped coughing.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="100"><span data-dcnode-id="104" instrument_node="">Amazingly, to me if not to anyone else, I had completed the first draft before the end of February. I began the second draft the next day, and that was completed mid-May. (The sole interruption during that period was Easter weekend, when I was at </span><strong data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Ytterbium</span></strong><span data-dcnode-id="101" instrument_node=""> in London.) For the last couple of weeks I have been doing last minute corrections and amendments, but today it is all done. Overall, writing the novel was a happy experience. This morning the sun is shining, the Firth is mirror-calm, the ferries are sailing to and fro. I am free.</span></p><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="98" instrument_node="">The new novel is unlike any of my previous novels, and stands as a sort of antidote to what happened to the first edition of </span><em data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">An American Story</span></em><span data-dcnode-id="95" instrument_node="">. (We suspend judgement on what the trade will do with the paperback of that, due next month, along with a new hardcover collection of stories, </span><em data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Episodes</span></em><span data-dcnode-id="92" instrument_node="">.) No publishing arrangement has yet been made for the new book.</span></p><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="79"><span data-dcnode-id="89" instrument_node="">I shall be at </span><strong data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">Cymera</span></strong><span data-dcnode-id="86" instrument_node="">, a book festival in Edinburgh, this coming weekend. Details: Sunday 9th June, 4.45 p.m, in Upper Hall, The Pleasance, 60 Pleasance, Edinburgh. EH8 9TJ. Details of my gig are </span><a data-dcnode-id="84" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cymerafestival.co.uk/sunday-9th-june-2019/2019/6/9/christopher-priest-an-american-story"><span data-dcnode-id="85" instrument_node="">here</span></a><span data-dcnode-id="83" instrument_node="">. Details of the Cymera festival are </span><a data-dcnode-id="81" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cymerafestival.co.uk/"><span data-dcnode-id="82" instrument_node="">here</span></a><span data-dcnode-id="80" instrument_node="">.</span></p><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="70"><span data-dcnode-id="77" instrument_node="">On Friday 12th July, Nina Allan and I will be at </span><strong data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">BSFG (Brumgroup)</span></strong><span data-dcnode-id="74" instrument_node="">: 7:30 p.m. for 8:00 p.m., First Floor, The Briar Rose Hotel, Bennetts Hill, Birmingham. More details of BSFG </span><a data-dcnode-id="72" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.birminghamsfgroup.org.uk/"><span data-dcnode-id="73" instrument_node="">here</span></a><span data-dcnode-id="71" instrument_node="">.</span></p><span data-dcnode-id="69" instrument_node="">
</span><p data-dcnode-id="68"></p><span data-dcnode-id="67" instrument_node="">
</span></div><span data-dcnode-id="64" instrument_node="">
