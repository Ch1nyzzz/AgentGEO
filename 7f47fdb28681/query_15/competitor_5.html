</span><article class="post-3626 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1980" id="post-3626"><span data-dcnode-id="2038" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2016"><span data-dcnode-id="2037" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2034"><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/downsizing" rel="bookmark"><span data-dcnode-id="2036" instrument_node="">Downsizing!</span></a></h2><span data-dcnode-id="2033" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2019"><span data-dcnode-id="2032" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2026"><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/downsizing" rel="bookmark"><time class="entry-date published" data-dcnode-id="2030" datetime="2022-03-13T17:23:28+00:00"><span data-dcnode-id="2031" instrument_node="">March 13, 2022</span></time><time class="updated" data-dcnode-id="2028" datetime="2022-03-14T09:06:18+00:00"><span data-dcnode-id="2029" instrument_node="">March 14, 2022</span></time></a></span><span class="byline" data-dcnode-id="2021"><span data-dcnode-id="2025" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2022"><a class="url fn n" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="2024" instrument_node="">chris</span></a></span></span><span data-dcnode-id="2020" instrument_node=""> </span></div><span data-dcnode-id="2017" instrument_node="">
</span></header><span data-dcnode-id="2014" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1983"><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">We are soon to move away from our present house, while remaining on our unique island. The new place is somewhat smaller than the old, and the dreaded need to shed a huge number of books has finally come to pass.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="1998"><img alt="" class="alignleft size-medium wp-image-3627" data-dcnode-id="2009" height="200" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2022/03/Wemyss-Bay-Station-300x200.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2022/03/Wemyss-Bay-Station-300x200.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2022/03/Wemyss-Bay-Station-768x512.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2022/03/Wemyss-Bay-Station.jpg 800w" width="300"><span data-dcnode-id="2008" instrument_node="">We hav</span><span data-dcnode-id="2006" style="font-size: 1rem;"><span data-dcnode-id="2007" instrument_node="">e already donated about a third of our collection of books to the </span></span><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//friendsofwemyssbaystation.co.uk/bookshop-test/" style="background-color: #ffffff; font-size: 1rem;"><span data-dcnode-id="2005" instrument_node="">amazing shop in Wemyss</span></a><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//friendsofwemyssbaystation.co.uk/bookshop-test/" style="background-color: #ffffff; font-size: 1rem;"><span data-dcnode-id="2003" instrument_node="">&nbsp;Bay Station</span></a><span data-dcnode-id="2000" style="font-size: 1rem;"><span data-dcnode-id="2001" instrument_node="">, and I imagine should you venture there in the next few months our cast-of</span></span><span data-dcnode-id="1999" instrument_node="">fs will be bulking the shelves. The shop is anyway always worth a visit, with a wide-ranging stock of secondhand books on sale at reasonable prices. Wemyss Bay is admittedly not the easiest place to get to, although there is a car park adjacent to the shop and an hourly train service from Glasgow Central. The shop is in the station concourse, itself a listed building of astonishing architectural beauty.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1991"><img alt="" class="alignleft size-medium wp-image-3629" data-dcnode-id="1996" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2022/03/Thistle-Books-300x225.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2022/03/Thistle-Books-300x225.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2022/03/Thistle-Books.jpg 567w" width="300"><span data-dcnode-id="1995" instrument_node="">But more than this. Like many writers we have built up a huge number of spare copies of our own books. The other day we delivered six heavy boxes of these copies to Thistle Books in Glasgow. The copies are both hardcover and paperback, all of them are new and unread, most are first editions or first printings, and we signed every copy. Included are several copies of the now rare first edition of </span><em data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">The Glamour</span></em><span data-dcnode-id="1992" instrument_node="">, as well as more recent titles. (We threw in a handful of surprise inclusions in some of the copies.) Nina also donated most of her own titles.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">We were extremely grateful to Robert Dibble, proprietor of Thistle Books, who has helped us solve a problem of space in our new home. He seems confident he will sell all or most of the copies. Do support him. </span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thistlebooks.co.uk/"><span data-dcnode-id="1988" instrument_node="">The bookshop is here</span></a><span data-dcnode-id="1986" instrument_node="">, with contact details.</span></p><span data-dcnode-id="1984" instrument_node="">
</span></div><span data-dcnode-id="1981" instrument_node="">
</span></article><span data-dcnode-id="1978" instrument_node="">
</span><article class="post-3616 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1931" id="post-3616"><span data-dcnode-id="1977" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1957"><span data-dcnode-id="1976" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1973"><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/rendez-vous-demain" rel="bookmark"><span data-dcnode-id="1975" instrument_node="">Rendez-vous demain</span></a></h2><span data-dcnode-id="1972" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1960"><span data-dcnode-id="1971" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1967"><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/rendez-vous-demain" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1969" datetime="2021-12-06T16:27:20+00:00"><span data-dcnode-id="1970" instrument_node="">December 6, 2021</span></time></a></span><span class="byline" data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1963"><a class="url fn n" data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1965" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1961" instrument_node=""> </span></div><span data-dcnode-id="1958" instrument_node="">
</span></header><span data-dcnode-id="1955" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1934"><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1948"><img alt="" class="alignleft wp-image-3617" data-dcnode-id="1953" height="325" loading="lazy" sizes="(max-width: 222px) 100vw, 222px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2021/12/RendezVous-Denoel.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2021/12/RendezVous-Denoel.jpg 384w, https://christopher-priest.co.uk/wp-content/uploads/2021/12/RendezVous-Denoel-205x300.jpg 205w" width="222"><span data-dcnode-id="1952" instrument_node="">Here is the cover for my next novel, to be published by Denoël in Paris, in April 2022. The title in English is </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Expect Me Tomorrow</span></em><span data-dcnode-id="1949" instrument_node="">.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1946" instrument_node="">The artist is the French engraver and designer </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anouckfaure.com/"><span data-dcnode-id="1945" instrument_node="">Anouk Faure</span></a><span data-dcnode-id="1943" instrument_node="">.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Although much of the novel is set in the 19th century, the events then have a long-term impact on our own lives two centuries later. The title is taken from a remark made in several letters by a petty criminal who called himself John Smith, and is a promise and a threat contained in three words.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Smith (whose real name was never known for sure) was a despicable nonentity, soon apprehended and punished. But there were certain anomalies that surrounded his crimes, and these led, indirectly, to a new way of understanding our world and its future.</span></p><span data-dcnode-id="1935" instrument_node="">
</span></div><span data-dcnode-id="1932" instrument_node="">
</span></article><span data-dcnode-id="1929" instrument_node="">
</span><article class="post-3605 post type-post status-publish format-standard sticky hentry category-journal category-news category-uncategorized" data-dcnode-id="1874" id="post-3605"><span data-dcnode-id="1928" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1906"><span data-dcnode-id="1927" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1924"><a data-dcnode-id="1925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-stooge-arrives" rel="bookmark"><span data-dcnode-id="1926" instrument_node="">The Stooge arrives!</span></a></h2><span data-dcnode-id="1923" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1909"><span data-dcnode-id="1922" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1916"><a data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-stooge-arrives" rel="bookmark"><time class="entry-date published" data-dcnode-id="1920" datetime="2021-09-02T16:48:27+00:00"><span data-dcnode-id="1921" instrument_node="">September 2, 2021</span></time><time class="updated" data-dcnode-id="1918" datetime="2021-09-02T16:51:50+00:00"><span data-dcnode-id="1919" instrument_node="">September 2, 2021</span></time></a></span><span class="byline" data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1912"><a class="url fn n" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1914" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1910" instrument_node=""> </span></div><span data-dcnode-id="1907" instrument_node="">
</span></header><span data-dcnode-id="1904" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1877"><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">At last, </span><em data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">The Stooge</span></em><span data-dcnode-id="1899" instrument_node=""> will be getting a screening in the UK.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">This has been showing at film festivals around the world for the last year or so, bravely masking up and mixing freely. It has gained a huge amount of attention in those socially distanced circles, but I can say it has been picking up awards and commendations everywhere it goes. Looking at the array of award bouquets, below, I am amazed, impressed and very pleased by the persistence of the producers. The festival circuit can be a hard road to travel, but they have done well in these socially constricted times.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1893" instrument_node="">The film runs for a mere twenty minutes, but it packs a lot into that brief time. It is an essay on stage magic and was for me when I wrote the original short story a kind of ironic commentary on and footnote to </span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">The Prestige</span></em><span data-dcnode-id="1890" instrument_node="">. The story can be found in my recent collection </span><em data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Episodes</span></em><span data-dcnode-id="1887" instrument_node="">, but that really does not give even a hint of the way it has been widened and enriched by director Rogelio Fojo. He has come up with real mystery, good surprises, excellent music and several moments of beauty. In the opening credits there is a classic sleight of hand, filmed in close-up from below: you see every move the illusionist makes, yet will still be baffled by it. Full credit goes to Fojo and his team.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1879"><img alt="" class="aligncenter size-large wp-image-3607" data-dcnode-id="1884" height="464" loading="lazy" sizes="(max-width: 739px) 100vw, 739px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2021/09/Stooge-awards-1024x643.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2021/09/Stooge-awards-1024x643.jpg 1024w, https://christopher-priest.co.uk/wp-content/uploads/2021/09/Stooge-awards-300x188.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2021/09/Stooge-awards-768x482.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2021/09/Stooge-awards.jpg 1200w" width="739"><span data-dcnode-id="1883" instrument_node="">I am arranging for a copy to be made available for showing at Novacon. This takes place between 12th and 14th November this year, at the Palace Hotel, in Buxton. I shall be there. Here is </span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//novacon.org.uk/n50/"><span data-dcnode-id="1882" instrument_node="">the website for the convention</span></a><span data-dcnode-id="1880" instrument_node="">.</span></p><span data-dcnode-id="1878" instrument_node="">
</span></div><span data-dcnode-id="1875" instrument_node="">
</span></article><span data-dcnode-id="1872" instrument_node="">
</span><article class="post-3597 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1827" id="post-3597"><span data-dcnode-id="1871" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1849"><span data-dcnode-id="1870" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1867"><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/still-expecting" rel="bookmark"><span data-dcnode-id="1869" instrument_node="">Still Expecting</span></a></h2><span data-dcnode-id="1866" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1852"><span data-dcnode-id="1865" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1859"><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/still-expecting" rel="bookmark"><time class="entry-date published" data-dcnode-id="1863" datetime="2021-06-24T21:10:08+00:00"><span data-dcnode-id="1864" instrument_node="">June 24, 2021</span></time><time class="updated" data-dcnode-id="1861" datetime="2021-06-25T07:29:07+00:00"><span data-dcnode-id="1862" instrument_node="">June 25, 2021</span></time></a></span><span class="byline" data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1855"><a class="url fn n" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1857" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1853" instrument_node=""> </span></div><span data-dcnode-id="1850" instrument_node="">
</span></header><span data-dcnode-id="1847" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1830"><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1845" instrument_node="">For those who have long memories, and in a metaphorical sense grey beards, it might be recalled that in an entry on this blog dated 29th October 2020 I reported that I had just finished and sent in a new novel. It is called </span><em data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Expect Me Tomorrow</span></em><span data-dcnode-id="1842" instrument_node="">.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">The novel is still called that, in spite of the temptation to change the title to </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Expect Me Next Decade</span></em><span data-dcnode-id="1836" instrument_node="">. This week I finally received and signed a contract for its publication, almost exactly eight months later. What you might ask has gone on in the meantime? Good question. Not, I can assure you, anything close to indecent haste from those at the other end. At least it now has a certainty, and is likely to appear in September next year, another fifteen months away.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Advice to aspiring novelists: live long.</span></p><span data-dcnode-id="1831" instrument_node="">
</span></div><span data-dcnode-id="1828" instrument_node="">
</span></article><span data-dcnode-id="1825" instrument_node="">
</span><article class="post-3584 post type-post status-publish format-standard sticky hentry category-journal category-news category-reviews" data-dcnode-id="1711" id="post-3584"><span data-dcnode-id="1824" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1802"><span data-dcnode-id="1823" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1820"><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-coot" rel="bookmark"><span data-dcnode-id="1822" instrument_node="">A Coot</span></a></h2><span data-dcnode-id="1819" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1805"><span data-dcnode-id="1818" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1812"><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/a-coot" rel="bookmark"><time class="entry-date published" data-dcnode-id="1816" datetime="2021-04-07T16:57:32+00:00"><span data-dcnode-id="1817" instrument_node="">April 7, 2021</span></time><time class="updated" data-dcnode-id="1814" datetime="2021-04-22T16:00:16+00:00"><span data-dcnode-id="1815" instrument_node="">April 22, 2021</span></time></a></span><span class="byline" data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1808"><a class="url fn n" data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1810" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1806" instrument_node=""> </span></div><span data-dcnode-id="1803" instrument_node="">
</span></header><span data-dcnode-id="1800" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1714"><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1798" instrument_node="">‘Cooting’ is a slang word describing a transgressive sexual act. I had never come across it before, either the word or the act, but I discovered the meaning (as no doubt you will too, after you read this) in the online </span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urbandictionary.com/define.php%3Fterm%3Dcooting"><span data-dcnode-id="1797" instrument_node="">Urban Dictionary</span></a><span data-dcnode-id="1795" instrument_node="">. I don’t want to repeat the definition here. It is beyond question thoroughly disgusting.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1792" instrument_node="">You might well wonder why I was even looking it up. I came across the word in Kazuo Ishiguro’s new novel, </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Klara and the Sun</span></em><span data-dcnode-id="1789" instrument_node="">.</span><img alt="" class="alignleft size-medium wp-image-3587" data-dcnode-id="1788" height="300" loading="lazy" sizes="(max-width: 197px) 100vw, 197px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun-197x300.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun-197x300.jpg 197w, https://christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun-673x1024.jpg 673w, https://christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun-768x1169.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun-1009x1536.jpg 1009w, https://christopher-priest.co.uk/wp-content/uploads/2021/04/Klara-and-the-Sun.jpg 1200w" width="197"></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">The book includes a description of a large and noisy machine that does road work. It is coloured a dirty pale yellow and through its three funnels it emits an acrid black smoke cloud, so dense and polluting that it obscures the light from the sun. The narrator (of whom more in a moment, but for now it’s enough to say the narrator is a solar-powered AI hominoid) sees this as a symbolically destructive machine and becomes determined to destroy it. The word </span><em data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Cootings</span></em><span data-dcnode-id="1782" instrument_node=""> is painted on its side.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1779" instrument_node="">Later in the book, the hominoid learns of a way to damage what is now called the Cootings Machine: if a certain fluid, referred to in Ishiguro’s mumbo-jumbo as a </span><em data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">P-E-G Nine solution</span></em><span data-dcnode-id="1776" instrument_node="">, is introduced into the workings the machinery would be made useless. As it happens, P-E-G Nine solution is present inside the hominoid, in ‘a small cavity … at the back of the head, where it meets the neck’. With the help of a human friend, the AI hominoid suffers a minor incision with a handy screwdriver, and the P-E-G Nine solution is introduced into the workings. The Cootings Machine is duly disabled.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">This combination of a criminal act with body horror and body fluids made me wonder what on earth the author was getting at. It seemed dark and mysterious symbolism might be going on.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1770" instrument_node="">And why is it called Cootings? </span><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Cootings</span></em><span data-dcnode-id="1767" instrument_node=""> is apparently the name of the machine’s manufacturer. As the book is set in a slightly futuristic version of our own world, wouldn’t heavy industrial machinery of this sort be more realistically likely to have </span><em data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">JCB</span></em><span data-dcnode-id="1764" instrument_node=""> or </span><em data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Kobelco</span></em><span data-dcnode-id="1761" instrument_node=""> or </span><em data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Massey-Ferguson</span></em><span data-dcnode-id="1758" instrument_node=""> painted on its side? Why make up a new name? Kazuo Ishiguro is self-consciously a serious writer at the top of the literary ladder: he is the author many novels, the winner of multiple book prizes, and is now a Nobel Laureate. The choice of this name must have been an informed, deliberate one, and this is why I went in search of the meaning of the word. When I learnt the definition given by the Urban Dictionary, I thought for a fleeting moment that I had stumbled on and opened up a whole new and stunningly original depth of dark symbolism. While the fleeting moment persisted I was shocked and daunted by the writer’s audacity.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Well, not really. The Cootings Machine turns out to be a minor sub-plot, the threat it presents is exaggerated by the narrator’s unworldly inexperience, and the attack on it with P-E-G Nine solution is carried out off-stage. And because it turns out there is more than one Cootings Machine in existence, to damage one of them is ultimately pointless. It is barely referred to again.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">This is a risk of seeming to labour a point, but in fact it is one small but clear example of the many superficial and inconsequential images that litter this novel. Ishiguro clearly had no more idea than me or anyone else reading this what ‘cooting’ meant. Presumably he thought he was making it up. Presumably he didn’t think to spend ten seconds Googling the word (as I did earlier today) just in case it was slang for a disgusting and transgressive sexual act, just in case he wanted to think again and perhaps call it JCB Machine instead.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">The book is narrated by Klara, an ‘Artificial Friend’ designed to help girl teenagers through their difficult years. Klara is referred to as a robot at one point, presumably because she has been fashioned in a human-like, i.e. hominoid, shape, with legs, a torso, a face and hair. She wears clothes, and goes to her own room at night. She is female in some undescribed fashion, so presumably male hominoids are made male in some other fashion. (If so, with what dark and mysterious reason?)</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1746" instrument_node="">One groans at the familiarity, as one did in McEwan’s not dissimilar novel in 2019, </span><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Machines Like Me</span></em><span data-dcnode-id="1743" instrument_node="">, but also at the impracticality and the sheer old-fashionedness of the idea. Walking and talking humanoids, from Robbie the Robot to Marvin the Paranoid Android, have used up the notion: they now amply fulfil the condition of intellectual decadence, as set out by Joanna Russ in her magisterial essay in 1971, ‘The Wearing Out of Genre Materials’. Modern AI is genuinely a much more subtle thing, from the supermarket till that offers you money off next time you buy the chocolate biscuits you enjoy so much, to the intrusive data harvesting of social media engines, and to the hostile regimes who try to influence the results of elections. A walking, wondering, blank-eyed doll who calls a smartphone an ‘oblong’ and who thinks houses are painted in different colours so the residents will not enter the wrong one by mistake, is nowhere close to that league. Not AI at all, then. Better as AS?</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Klara is our narrator for the full length of the 80,000-odd words, so we are forced to see the world through her restricted and estranged perception. Some critics call this the use of an unreliable narrator, but that is a much more sensitive and sophisticated literary device. Klara is not unreliable: she simply doesn’t get it. The matters she doesn’t get are left to us to try to understand, as it were, on her behalf. It is dull and sometimes maddening having to go through page after page, mentally interpreting for a clod. It distances the reader not only from the action and the world in which it takes place, but more importantly from the characters. They are third-person ciphers, respectively referred to as ‘Manager’ (of the obsolete type of department store where Klara sits in a sales window), or ‘the Mother’ (of Josie, the teenage girl who is being artificially befriended), or ‘Mr Paul’ (father of same). In dialogue, Klara habitually addresses them by these second-person labels.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1737" instrument_node="">All this is bad enough, but Ishiguro adapts his style to the purpose. His English is bland, careful, circumlocutory, slightly grandiloquent, always shrinking from commitment to his characters or his subject. One is often reminded of Stevens, the clod of a butler in </span><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">The Remains of the Day</span></em><span data-dcnode-id="1734" instrument_node="">, 1989, who behaved like a stooge servant in a TV costume drama, following the pedantic script and missing all the hints of a real world around him. Much of the dialogue in </span><em data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Klara and the Sun</span></em><span data-dcnode-id="1731" instrument_node=""> is repeated, the characters treating each other as people who haven’t listened or understood, or who defer to each other.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">As for the lack of commitment, Ishiguro is depicting a future world in which the geneticists and eugenicists have perfected the art of super-selection, in which the bright kids are ‘lifted’, given good health and schooling and higher education, plus an easy passage into the chattering classes, while the dullards are fascistically consigned to pauperdom or death. Does Ishiguro give any hint of the moral horror of such a world? No – he shrinks from that, just as he and Stevens shrank from the appeasement of the Nazi sympathizers in the big country house of </span><em data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Remains of the Day</span></em><span data-dcnode-id="1725" instrument_node="">.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">A novelist should approach a fantastic or speculative element with a full-on open mind, aware of the consequences of technological inventions, of the implicit warnings contained in social extrapolation, of the good or bad example a postulated future might set, of the impact on the people who are involved. It is not enough to watch a few sci-fi films on Netflix, or pick up futuristic-seeming slang from comics. The fantastic is a powerful and important literary strand, largely ignored or patronized or misunderstood by the literary world at large, but the best examples of fantastic literature treat their material with seriousness, responsibility and imagination. A secondrate imagining of these things leads to secondrate literature. Klara doesn’t get it, but neither does Kazuo Ishiguro.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1716"><em data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Klara and the Sun</span></em><span data-dcnode-id="1717" instrument_node=""> by Kazuo Ishiguro. Published by Faber &amp; Faber, £20.00, ISBN: 978-0-571-36487-9</span></p><span data-dcnode-id="1715" instrument_node="">
</span></div><span data-dcnode-id="1712" instrument_node="">
</span></article><span data-dcnode-id="1709" instrument_node="">
</span><article class="post-3574 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1646" id="post-3574"><span data-dcnode-id="1708" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1686"><span data-dcnode-id="1707" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1704"><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-magic-now-in-ebook" rel="bookmark"><span data-dcnode-id="1706" instrument_node="">The Magic — now in ebook</span></a></h2><span data-dcnode-id="1703" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1689"><span data-dcnode-id="1702" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1696"><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-magic-now-in-ebook" rel="bookmark"><time class="entry-date published" data-dcnode-id="1700" datetime="2021-01-22T12:39:06+00:00"><span data-dcnode-id="1701" instrument_node="">January 22, 2021</span></time><time class="updated" data-dcnode-id="1698" datetime="2021-01-22T12:42:20+00:00"><span data-dcnode-id="1699" instrument_node="">January 22, 2021</span></time></a></span><span class="byline" data-dcnode-id="1691"><span data-dcnode-id="1695" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1692"><a class="url fn n" data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1694" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1690" instrument_node=""> </span></div><span data-dcnode-id="1687" instrument_node="">
</span></header><span data-dcnode-id="1684" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1649"><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1682" instrument_node="">Nearly a decade and a half ago I wrote and published a book about the making of the film </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">The Prestige</span></em><span data-dcnode-id="1679" instrument_node="">. It’s called </span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The Magic – the Story of a Film</span></em><span data-dcnode-id="1676" instrument_node="">. Over the years many readers have purchased copies, which is still available in its first edition hardcover, as well as paperback. Courtesy of David Langford at </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ae.ansible.uk/"><span data-dcnode-id="1675" instrument_node="">Ansible Editions</span></a><span data-dcnode-id="1673" instrument_node=""> I now have an ebook version of </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">The Magic</span></em><span data-dcnode-id="1670" instrument_node=""> available, and details of it may be </span><span data-dcnode-id="1667" style="color: #0000ff;"><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/grimgrin-studio/the-magic-the-story-of-a-film" style="color: #0000ff;"><span data-dcnode-id="1669" instrument_node="">read here</span></a></span><span data-dcnode-id="1666" instrument_node="">.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661"><img alt="" class="aligncenter wp-image-3575" data-dcnode-id="1663" height="300" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard-300x200.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard-300x200.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard-1024x683.jpg 1024w, https://christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard-768x512.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard-1536x1024.jpg 1536w, https://christopher-priest.co.uk/wp-content/uploads/2021/01/Prestige-to-Magic-postcard.jpg 1800w" width="450"><span data-dcnode-id="1662" instrument_node="">The film was of course based on my own novel. It was&nbsp;directed by Christopher Nolan – at that time he was not the major Hollywood director he is now perceived to be. I took a special interest in the process of transition from book to film for reasons which should be obvious. I had little to do with the actual mechanics of the production, but being a witness to a lot of bemusing activity happening over there in far California was intriguing enough. The process of adaptation appealed to me as a craft matter: I knew better than anyone what a complex and cerebral book it was, and when I heard that a film was in preparation I started wondering how on Earth anyone could make anything coherent from it. When I was able to see the finished product the answer was a welcome and rather satisfying surprise.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1659" instrument_node="">Years later the film of </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">The Prestige</span></em><span data-dcnode-id="1656" instrument_node=""> looks better and better. It is routinely under-rated by Nolan’s fans, who prefer the three films he made about The Batman, and the special effects extravaganzas that followed those. Not being that sort of fan I disagree. </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/grimgrin-studio/the-magic-the-story-of-a-film"><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">The Magic</span></em></a><span data-dcnode-id="1652" instrument_node=""> is therefore a book writer’s analysis, and celebration, of what is probably Nolan’s most interesting film to date.</span></p><span data-dcnode-id="1650" instrument_node="">
</span></div><span data-dcnode-id="1647" instrument_node="">
</span></article><span data-dcnode-id="1644" instrument_node="">
</span><article class="post-3559 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1562" id="post-3559"><span data-dcnode-id="1643" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1621"><span data-dcnode-id="1642" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1639"><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/what-to-expect" rel="bookmark"><span data-dcnode-id="1641" instrument_node="">What to Expect</span></a></h2><span data-dcnode-id="1638" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1624"><span data-dcnode-id="1637" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1631"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/what-to-expect" rel="bookmark"><time class="entry-date published" data-dcnode-id="1635" datetime="2020-10-29T09:59:58+00:00"><span data-dcnode-id="1636" instrument_node="">October 29, 2020</span></time><time class="updated" data-dcnode-id="1633" datetime="2020-10-29T12:07:49+00:00"><span data-dcnode-id="1634" instrument_node="">October 29, 2020</span></time></a></span><span class="byline" data-dcnode-id="1626"><span data-dcnode-id="1630" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1627"><a class="url fn n" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1629" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1625" instrument_node=""> </span></div><span data-dcnode-id="1622" instrument_node="">
</span></header><span data-dcnode-id="1619" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1565"><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">It probably seems like a school essay: “What I did in lockdown”, but I have to say that living on a Scottish island and having a lot of writing to do is the best possible way of getting through this uninteresting, worrying and as yet unfinished period. Here, in reverse order, is the product of my last seven months in enforced seclusion:</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1614" instrument_node="">I have written an introduction to a new book with what might seem an unpromising title: </span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">My Father’s Things</span></em><span data-dcnode-id="1611" instrument_node="">. When you discover that the “My” is the photographer Wendy Aldiss, the “Father” is the author Brian Aldiss and the </span><span data-dcnode-id="1609" style="font-size: 1rem;"><span data-dcnode-id="1610" instrument_node="">“Things” are all the possessions he had after a lifetime of writing, travel, family and collecting, then maybe it’ll seem a lot more interesting. I found it fascinating, both for the nosey satisfaction of seeing behind the scenes of a long, productive and successful life, and for the quality of the beautiful images. Wendy took more than 9,000 photos as she went sadly through his house, and the book is a selection of the best.</span></span></p><span data-dcnode-id="1607" instrument_node="">
</span><figure aria-describedby="caption-attachment-3561" class="wp-caption alignright" data-dcnode-id="1603" id="attachment_3561" style="width: 185px"><img alt="" class="wp-image-3561" data-dcnode-id="1606" height="123" loading="lazy" sizes="(max-width: 185px) 100vw, 185px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/10/Brian-Aldiss-ties-300x200.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/10/Brian-Aldiss-ties-300x200.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2020/10/Brian-Aldiss-ties.jpg 680w" width="185"><figcaption class="wp-caption-text" data-dcnode-id="1604" id="caption-attachment-3561"><span data-dcnode-id="1605" instrument_node="">Brian Aldiss’s ties</span></figcaption></figure><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1601" instrument_node="">Wendy is seeking crowdfunding for the project, and is already well on the way to achieving her target. Do check out </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickstarter.com/projects/wendyaldiss/my-fathers-things-a-beautifully-designed-photobook%3Fref%3D2frye4"><span data-dcnode-id="1600" instrument_node="">the Kickstarter page</span></a><span data-dcnode-id="1598" instrument_node="">, and become a supporter.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1595" instrument_node="">During the short recess in the lockdown, at the end of summer, we briefly breathed the heady air of freedom and went to see the new Christopher Nolan film, </span><em data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Tenet</span></em><span data-dcnode-id="1592" instrument_node="">. This coincided with reading for review a new book by Tom Shone, </span><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">The Nolan Variations</span></em><span data-dcnode-id="1589" instrument_node="">. The book consists of transcriptions of many long interviews with the great man, film by film. I take a special interest in Nolan’s films, and </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spectator.co.uk/article/too-much-sound-and-fury-in-christopher-nolan-s-movies%3Futm_medium%3Demail%26utm_source%3DCampaignMonitor_Editorial%26utm_campaign%3DWEEK%2520%252020201031%2520%2520FISHER%2520%2520AL%2BCID_036158a45142bdd9e2e3f757486ef48b"><span data-dcnode-id="1588" instrument_node="">the review is published today</span></a><span data-dcnode-id="1586" instrument_node="">.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1583" instrument_node="">My book, </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The Magic</span></em><span data-dcnode-id="1580" instrument_node="">, which is about the making of Nolan’s film version of </span><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">The Prestige,</span></em><span data-dcnode-id="1577" instrument_node="">&nbsp;is still available in hardcover and paperback. </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/grimgrin-studio/the-magic-the-story-of-a-film"><span data-dcnode-id="1576" instrument_node="">Details here</span></a><span data-dcnode-id="1574" instrument_node="">.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">Most of the last seven months, though, has been fully occupied by a new novel, which I completed and sent to the agent this week. The title is </span><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Expect Me Tomorrow</span></em><span data-dcnode-id="1568" instrument_node="">, probably the most complex book I have written to date. I’m reluctant to say anything about it at the moment. I’m still too close to it for that, but it’s a weird feeling, sending something out into the world that has been a private obsession for all these months.</span></p><span data-dcnode-id="1566" instrument_node="">
</span></div><span data-dcnode-id="1563" instrument_node="">
</span></article><span data-dcnode-id="1560" instrument_node="">
</span><article class="post-3548 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1517" id="post-3548"><span data-dcnode-id="1559" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1539"><span data-dcnode-id="1558" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1555"><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/new-book-old-normal" rel="bookmark"><span data-dcnode-id="1557" instrument_node="">New Book (old normal)</span></a></h2><span data-dcnode-id="1554" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1542"><span data-dcnode-id="1553" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1549"><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/new-book-old-normal" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1551" datetime="2020-10-08T11:17:42+00:00"><span data-dcnode-id="1552" instrument_node="">October 8, 2020</span></time></a></span><span class="byline" data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1545"><a class="url fn n" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1547" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1543" instrument_node=""> </span></div><span data-dcnode-id="1540" instrument_node="">
</span></header><span data-dcnode-id="1537" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1520"><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1530"><img alt="" class="alignright wp-image-3549" data-dcnode-id="1535" height="438" loading="lazy" sizes="(max-width: 292px) 100vw, 292px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/10/The-Evidence-Oct-20-200x300.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/10/The-Evidence-Oct-20-200x300.jpg 200w, https://christopher-priest.co.uk/wp-content/uploads/2020/10/The-Evidence-Oct-20.jpg 576w" width="292"><span data-dcnode-id="1534" instrument_node="">First copies of </span><em data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The Evidence</span></em><span data-dcnode-id="1531" instrument_node=""> arrived this morning, looking good. I was very pleased to see this in print at last, after what turned out to be a fairly normal process, attended distractingly and worryingly by the social upheaval and feelings of uncertainty&nbsp; known to everyone. Books endure, books are a constant.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1528" instrument_node="">According to Amazon, the book will not be published until October 15, but our local independent bookshop has already ordered, </span><img alt="" class="alignleft wp-image-3551" data-dcnode-id="1527" height="104" loading="lazy" sizes="(max-width: 157px) 100vw, 157px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/10/Cats-with-Evidence-300x200.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/10/Cats-with-Evidence-300x200.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2020/10/Cats-with-Evidence.jpg 576w" width="157"><span data-dcnode-id="1526" instrument_node="">and says Gardners are supplying from stock. They will have copies tomorrow. Independent bookshops remain the best place to buy new books.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">ISBN: 978 1 473 23137 5. Gollancz 2020, 312 pp, £20.00</span></p><span data-dcnode-id="1521" instrument_node="">
</span></div><span data-dcnode-id="1518" instrument_node="">
</span></article><span data-dcnode-id="1515" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1492"><span data-dcnode-id="1513" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1510"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/choose-which-side-youre-on" rel="bookmark"><span data-dcnode-id="1512" instrument_node="">Choose Which Side You’re On?</span></a></h2><span data-dcnode-id="1509" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1495"><span data-dcnode-id="1508" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1502"><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/choose-which-side-youre-on" rel="bookmark"><time class="entry-date published" data-dcnode-id="1506" datetime="2020-10-05T16:24:49+00:00"><span data-dcnode-id="1507" instrument_node="">October 5, 2020</span></time><time class="updated" data-dcnode-id="1504" datetime="2020-10-09T20:46:06+00:00"><span data-dcnode-id="1505" instrument_node="">October 9, 2020</span></time></a></span><span class="byline" data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1498"><a class="url fn n" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1500" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1496" instrument_node=""> </span></div><span data-dcnode-id="1493" instrument_node="">
</span></header><span data-dcnode-id="1490" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1481"><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1483"><img alt="" class="alignleft size-medium wp-image-3546" data-dcnode-id="1488" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/10/Brexit-Biscuit-300x225.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/10/Brexit-Biscuit-300x225.jpg 300w, https://christopher-priest.co.uk/wp-content/uploads/2020/10/Brexit-Biscuit.jpg 576w" width="300"><span data-dcnode-id="1487" instrument_node="">This is the Brexit Biscuit, a shortbread snack of two halves. It may be eaten whole, or one half at a time, or simply broken apart in a symbolic way: one side kept forever, the other discarded. It comes in a pack of twelve, wrapped in a free but tear-up-able copy of Article 50, and packed in a beautiful old-fashioned tin box, good for keeping things in. Obtainable </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebrexitbiscuit.co.uk/"><span data-dcnode-id="1486" instrument_node="">here</span></a><span data-dcnode-id="1484" instrument_node="">.</span></p><span data-dcnode-id="1482" instrument_node="">
</span></div><span data-dcnode-id="1479" instrument_node="">

</span><article class="post-3538 post type-post status-publish format-standard sticky hentry category-uncategorized" data-dcnode-id="1396" id="post-3538"><span data-dcnode-id="1475" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1453"><span data-dcnode-id="1474" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1471"><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-prestige-and-the-magic" rel="bookmark"><span data-dcnode-id="1473" instrument_node="">The Prestige and The Magic</span></a></h2><span data-dcnode-id="1470" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1456"><span data-dcnode-id="1469" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1463"><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-prestige-and-the-magic" rel="bookmark"><time class="entry-date published" data-dcnode-id="1467" datetime="2020-08-30T07:40:43+00:00"><span data-dcnode-id="1468" instrument_node="">August 30, 2020</span></time><time class="updated" data-dcnode-id="1465" datetime="2020-08-30T07:46:14+00:00"><span data-dcnode-id="1466" instrument_node="">August 30, 2020</span></time></a></span><span class="byline" data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1459"><a class="url fn n" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1461" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1457" instrument_node=""> </span></div><span data-dcnode-id="1454" instrument_node="">
</span></header><span data-dcnode-id="1451" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1399"><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1449" instrument_node="">The </span><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Sunday Telegraph</span></em><span data-dcnode-id="1446" instrument_node="">, today, carries </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/films/0/selfish-pompous-disappointing-meet-writer-sees-christopher-nolan/"><span data-dcnode-id="1445" instrument_node="">an interview with me by Sam Leith</span></a><span data-dcnode-id="1443" instrument_node="">. (The Telegraph website has a paywall.) The matter under discussion: the films of Christopher Nolan, a topical subject as his new blockbuster </span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Tenet</span></em><span data-dcnode-id="1440" instrument_node=""> is currently busy saving the film industry. Mr Leith had read my book on the subject, </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">The Magic</span></em><span data-dcnode-id="1437" instrument_node="">, so we tended to follow the arguments expressed there.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1428"><img alt="The Prestige (Gollancz)" class="alignleft wp-image-3523" data-dcnode-id="1434" height="184" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/08/The-Prestige-VG.jpg&amp;raw" width="118"><span data-dcnode-id="1433" instrument_node="">My novel </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Prestige-S-F-MASTERWORKS-Christopher-Priest-ebook/dp/B0056A4YZ6/ref%3Dsr_1_1%3Fcrid%3D2OVMLQEBA2UCN%26dchild%3D1%26keywords%3Dthe%2Bprestige%2Bchristopher%2Bpriest%26qid%3D1598773098%26sprefix%3DThe%2BPrestige%252Caps%252C156%26sr%3D8-1"><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">The Prestige</span></em></a><span data-dcnode-id="1429" instrument_node="">, was filmed by Christopher Nolan in 2006 and rated by many critics to be his best film (a view I share). The book is still in print and available in paperback from all bookstores.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">A few years after the film appeared I wrote and published </span><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The Magic</span></em><span data-dcnode-id="1423" instrument_node="">, in effect a response to the many friendly enquiries I received on an almost daily basis from readers and filmgoers: what did I really think of the film?, what went on behind the scenes?, how does the film compare with the novel?, and so on.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1418"><img alt="The Magic" class="alignright wp-image-3527" data-dcnode-id="1420" height="225" loading="lazy" sizes="(max-width: 143px) 100vw, 143px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic-191x300.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic-191x300.jpg 191w, https://christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic-652x1024.jpg 652w, https://christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic-768x1205.jpg 768w, https://christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic-979x1536.jpg 979w, https://christopher-priest.co.uk/wp-content/uploads/2020/08/The-Magic.jpg 1199w" width="143"><span data-dcnode-id="1419" instrument_node="">Although characterized in some quarters as me ‘slamming’ Mr Nolan (which no doubt will be said again after the interview has been read), the book is in fact an appreciative and nuanced study of how a serious and complex feature film is conceived and made by a young film maker at his peak.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">I had absolutely nothing to do with the development and production of the film, but for obvious reasons every moment of the finished product was of interest and fascination to me. Naturally, I spelled out a few small reservations about the film (nothing’s perfect), and made a few disappointed comments about the way Mr Nolan’s talent appeared to be in the process of being squandered on lesser projects – an obsession with simplistic comic superheroes, for instance.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node="">This is where the ‘slamming’ comes in, I suppose. But in reality I have always supported and endorsed the film, making personal introductions at festival screenings, for example. Christopher Nolan is clearly a talented and skilful film-maker, which is not in question, but he has not followed through with the uniquely imaginative approach shown in his early work. Many films start looking a bit dated quite soon after release, but Nolan’s film of </span><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The Prestige</span></em><span data-dcnode-id="1410" instrument_node=""> has a timeless quality, and is already showing encouraging signs of becoming a genuine classic of cinema.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1401"><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">The Magic</span></em><span data-dcnode-id="1405" instrument_node=""> is still in print and available directly from me, in both the first edition hardcover (£16.99) and a paperback (£10.99). More details about how to order can be found on </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/grimgrin-studio/the-magic-the-story-of-a-film"><span data-dcnode-id="1404" instrument_node="">this page</span></a><span data-dcnode-id="1402" instrument_node="">.</span></p><span data-dcnode-id="1400" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
</span></article><span data-dcnode-id="1394" instrument_node="">
</span><article class="post-3517 post type-post status-publish format-standard sticky hentry category-uncategorized" data-dcnode-id="1350" id="post-3517"><span data-dcnode-id="1393" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1371"><span data-dcnode-id="1392" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1389"><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-evidence" rel="bookmark"><span data-dcnode-id="1391" instrument_node="">The Evidence</span></a></h2><span data-dcnode-id="1388" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1374"><span data-dcnode-id="1387" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1381"><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/the-evidence" rel="bookmark"><time class="entry-date published" data-dcnode-id="1385" datetime="2020-06-02T12:47:54+00:00"><span data-dcnode-id="1386" instrument_node="">June 2, 2020</span></time><time class="updated" data-dcnode-id="1383" datetime="2020-06-02T12:49:00+00:00"><span data-dcnode-id="1384" instrument_node="">June 2, 2020</span></time></a></span><span class="byline" data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1377"><a class="url fn n" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1379" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1375" instrument_node=""> </span></div><span data-dcnode-id="1372" instrument_node="">
</span></header><span data-dcnode-id="1369" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1353"><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1367" instrument_node="">Here is the cover art for my new novel, </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">The Evidence</span></em><span data-dcnode-id="1364" instrument_node="">. It will be published by Gollancz in October, and it can be </span><span data-dcnode-id="1361" style="color: #0000ff;"><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Evidence-Christopher-Priest/dp/147323137X/ref%3Dsr_1_1%3Fcrid%3D3DCGAIZVXXGUL%26dchild%3D1%26keywords%3Dthe%2Bevidence%2Bchristopher%2Bpriest%26qid%3D1591097472%26sprefix%3DThe%2BEvidence%252Caps%252C153%26sr%3D8-1" style="color: #0000ff;"><span data-dcnode-id="1363" instrument_node="">pre-ordered from Amazon</span></a></span><span data-dcnode-id="1360" instrument_node=""> in hardcover or Kindle.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1355"><img alt="The Evidence" class="alignleft wp-image-3509" data-dcnode-id="1357" height="264" loading="lazy" sizes="(max-width: 172px) 100vw, 172px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/06/The-Evidence-VG.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/06/The-Evidence-VG.jpg 384w, https://christopher-priest.co.uk/wp-content/uploads/2020/06/The-Evidence-VG-195x300.jpg 195w" width="172"><span data-dcnode-id="1356" instrument_node="">There is no mention in it anywhere of lockdown, virus or pandemic. There are no jokes about eyesight tests, no plague ships polluting the oceans, no face masks. It describes a place where crime no longer exists, and in which three murders have to be investigated.</span></p><span data-dcnode-id="1354" instrument_node="">
</span></div><span data-dcnode-id="1351" instrument_node="">
</span></article><span data-dcnode-id="1348" instrument_node="">
</span><article class="post-3503 post type-post status-publish format-standard sticky hentry category-journal category-news" data-dcnode-id="1297" id="post-3503"><span data-dcnode-id="1347" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1327"><span data-dcnode-id="1346" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1343"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/plague-ships" rel="bookmark"><span data-dcnode-id="1345" instrument_node="">Plague Ships!</span></a></h2><span data-dcnode-id="1342" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1330"><span data-dcnode-id="1341" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1337"><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/plague-ships" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1339" datetime="2020-04-10T11:35:40+00:00"><span data-dcnode-id="1340" instrument_node="">April 10, 2020</span></time></a></span><span class="byline" data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1333"><a class="url fn n" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/author/chris"><span data-dcnode-id="1335" instrument_node="">chris</span></a></span></span><span data-dcnode-id="1331" instrument_node=""> </span></div><span data-dcnode-id="1328" instrument_node="">
</span></header><span data-dcnode-id="1325" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1300"><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">An interesting and potentially deadly subtext to the coronavirus crisis is the fate of several luxury cruise liners. Refused entry by many ports, a few of these monster vessels with their passengers and crews isolated inside their cabins and breathing recycled air, and suffering all the horrors of COVID19, had to roam the seas while searching for a safe landing. While the coronavirus epidemic was confined to the Far East a few of these ships were named and located. They were allowed to berth for quarantine, but many more are still at sea and in all parts of the world. They are now operating with increasing secrecy and many cannot be identified or tracked by software.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1318"><img alt="A very big ship" class="wp-image-3504 alignright" data-dcnode-id="1320" height="187" loading="lazy" sizes="(max-width: 282px) 100vw, 282px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christopher-priest.co.uk/wp-content/uploads/2020/04/RCI.jpg&amp;raw" srcset="https://christopher-priest.co.uk/wp-content/uploads/2020/04/RCI.jpg 600w, https://christopher-priest.co.uk/wp-content/uploads/2020/04/RCI-300x199.jpg 300w" width="282"><span data-dcnode-id="1319" instrument_node="">There are approximately sixty luxury cruise liners in current operation with a deadweight greater than 120,000 tonnes. Another forty-two such ships are currently on order, or under construction.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">In environmental terms, each of these ships is an abomination: they produce exhaust fumes as prolifically as 700 large trucks. They leave a vast trail of human waste in their wake. Like all ships, they secretly clean out and dump the waste from their fuel tanks at sea. They severely damage both the infrastructure of the ports they call at, and the social dynamics of the towns they visit – Venice is the most famous example of this, but it is true of many other places, including the Scottish islands.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">Today, our local paper </span><em data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Isle of Bute News</span></em><span data-dcnode-id="1310" instrument_node=""> reports that this part of Scotland, with its multiple sea lochs and inlets, has recently been attracting many such luxury yachts and cruise liners. Several of these ships have been refused entry to French and Italian ports. They have all switched off their identifying transmitters, and so become invisible to tracking software. A few berthed briefly in Greenock, then moved on. They cannot land crew or passengers without health clearance, so many of them are anchored at sea, or more often in convenient inlets between the hills.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1307" instrument_node="">Practical information about these Flying Dutchmen, modern plague ships secretly wandering the seas, can be found </span><span data-dcnode-id="1304" style="color: #0000ff;"><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_largest_cruise_ships" style="color: #0000ff;"><span data-dcnode-id="1306" instrument_node="">here</span></a></span><span data-dcnode-id="1303" instrument_node="">.</span></p><span data-dcnode-id="1301" instrument_node="">
</span></div><span data-dcnode-id="1298" instrument_node="">
</span></article><span data-dcnode-id="1295" instrument_node="">
