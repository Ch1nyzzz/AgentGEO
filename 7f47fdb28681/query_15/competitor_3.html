        </span></p><span data-dcnode-id="392" instrument_node="">
</span><hr data-dcnode-id="391" noshade="NOSHADE" width="100%"><span data-dcnode-id="390" instrument_node="">
</span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">In countries where detailed research studies have been conducted, the pattern of standard amenities (of the types listed above) tends to vary by resident income and age. Higher income households have, inevitably, more amenities whilst the poor reside in low amenity housing. Forty years of housing policies may have weakened the low-income/low-amenity relationship but they have not removed it within or across countries. For given income levels, the elderly often have poorer amenity provision.</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The provision of standard amenities also vary across housing tenures</span></p><span data-dcnode-id="380" instrument_node="">
</span><ul data-dcnode-id="369"><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">in northern and western Europe upgrading and demolition programmes (often targeted on houses without standard amenities) have resulted in private rental homes having similar amenities to other sectors though there is an unimproved 'pocket of around five per cent of homes in most countries;</span></li><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">in the Mediterranean countries amenities in renting are markedly poorer than in owned homes;</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">in all countries older units have poorer amenities than new; countries or sectors with soft/supportive regimes for private rental provision have higher amenity levels; for instance in the Netherlands, 44 per cent of older private rental homes had central heating but the equivalent percentage for the newer commercial sector was 81 per cent (about the same as home-ownership).</span></li><span data-dcnode-id="370" instrument_node="">
</span></ul><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="367" instrument_node="">The presence or absence of standard amenities is not, however, a very precise guide to housing quality. Over the last fifteen years or so national governments in the Union have collected more detailed statistics on house condition and categorised units into 'good, 'unfit, etc.,  </span><a data-dcnode-id="365" href="#table7"><span data-dcnode-id="366" instrument_node="">see Table 7</span></a><span data-dcnode-id="364" instrument_node="">, though definitions differ across countries. More systematic work is required in this area, but a number of illustrations make the point
        </span></p><span data-dcnode-id="362" instrument_node="">
</span><ul data-dcnode-id="348"><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">in France, at the end of the 1980s, the amenity (and condition) level of rent controlled stock was significantly poorer  </span><em data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">vis-à-vis</span></em><span data-dcnode-id="357" instrument_node=""> than new rental homes and home-owning;
            </span></li><span data-dcnode-id="355" instrument_node="">
</span><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">in Spain, whilst 8.3 per cent of owner occupied units were classed as 'poor, 20.2 per cent of rental homes were 'poor (in 1991);</span></li><span data-dcnode-id="352" instrument_node="">
</span><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">house condition surveys in the Netherlands and Britain (around 1990) indicate the disproportionately heavy incidence of required repair expenditures in older rented housing, the Dutch figures (similar in magnitude to England) indicated that older rental units required around 7,000 ECU per unit, owner occupation 3,300 ECU and commercial renting 2,000 ECU.</span></li><span data-dcnode-id="349" instrument_node="">
</span></ul><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">The major exceptions (to the pattern of poor quality private renting  </span><em data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">vis-à-vis</span></em><span data-dcnode-id="343" instrument_node=""> other tenures) appear to be Greece and Germany. Of course, high quality rental segments exist in most countries. Equally, poor quality is also evident in segments of both social renting and home-ownership.
        </span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">These housing quality issues and measures are important, not just because they are concentrated in particular locations but they are closely associated with lower income groups. But, for modern 'integrated housing policies they understate the potential problem. National housing censuses, and even special house condition surveys, do not usually record the extent to which dwellings are adapted for the elderly or the disabled. Nor do they record the neighbourhood conditions of poor housing (often in social housing which meets amenity norms), such as the incidence of vandalism, abandoned properties, fear of crime, and so on, which influence resident perceptions of housing quality. European housing statistics are locked into a 1950s perception of housing quality and problems. With an emerging emphasis on the 'integrability of housing policies new statistical information is required to shape national housing policies in all but a few of the Member States.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">New perceptions may be required which match emerging concerns with social exclusion. At the same time, however, with policy support levels stagnating, it is all too apparent that millions of Europeans live in homes which fail to meet widely accepted norms of 'decent housing and the problems are most acute in Europes poorer countries, cities and neighbourhoods. Even worse, as the paragraphs below reveal, there are significant numbers of Europeans who have no access even to poor homes of their own and countless more who wait long periods to secure decent homes.</span></p><span data-dcnode-id="335" instrument_node="">
</span><h4 data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">2.3 Access to housing</span></h4><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Homelessness is the key accessibility issue in European housing systems but it is by no means the only one. In a more general sense, accessibility is an issue where households are either denied a 'right or 'expectation or where households are denied or excluded from housing which they could afford to pay for.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">At the less acute end of the spectrum of accessibility questions, there has been growing accessibility to home-ownership across Union countries in the 1980s as incomes have grown and policies supported the tenure. Two particular policy changes have facilitated access to home-ownership, though with lesser impacts in Italy, Greece and Portugal. First, financial deregulation has reduced mortgage rationing, most obviously in Britain, Finland and Spain. Secondly, inner-city rehabilitation programmes have significantly increased home-ownership in central cities, especially in the UK. As noted above, reductions in tax subsidies may reduce accessibility to the sector in the coming years but few of those excluded are likely to be denied adequate rental housing.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Accessibility to private rental housing, with the exception of Germany, Belgium, Luxembourg and Sweden, has been a longstanding difficulty of Europe as policies have precluded the 'fast-access characteristics of rental housing. In controlled, declining sectors unfurnished rental homes have often been unavailable, thus forcing more affluent households into owning and poorer households into social renting or, in its absence, unsatisfactory sharing. For younger households, long searches and sharing outcomes have been commonplace in much of Europe. However, 1980s deregulation of new tenancies and 1990s moves to support private landlords via tax breaks, have apparently eased access in such sectors though immigrants, ethnic minorities and benefit dependent households (especially single parents) still face, reportedly, access problems.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Social rental housing, in northern and western Europe, copes (more or less adequately) with the bulk of flows of low-income households seeking housing. Once again there is no systematic, comparable data on households seeking to enter or move within European social housing. In the country overviews, in the next chapter, some specific experiences are reported. There is evidence to suggest that as household formation rates and unemployment rates rose in the 1980s, entry queues for social housing lengthened in Britain, Ireland, France, Germany and Austria (in the latter cases particularly because of high and sudden immigration from the east). Queuing times of 2-4 years, in poor housing or difficult household circumstances, for general applicants were not uncommon. Waiting times vary by geographic area, often being most acute in growing metropolitan areas, but not exclusively so as rural areas also encounter difficulties. In northern Britain, for example, where growth is slow and council housing vacancies are high, waiting times seldom exceed one year. In growth areas, in the south-east of England, waiting periods of seven years have been reported. Of course, waiting times also vary within cities; applicants willing to live on the worst estates in Britain can have, often, near immediate access. But then one form of social exclusion is often merely swapped for another, say domestic violence for a poor quality, inaccessible neighbourhood.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">In some countries 1980s actions to meet the requirements of 'special needs groups have reduced specific queues. For instance in Sweden, the UK, Denmark and the Netherlands new programmes for the elderly and disabled have, reportedly, reduced waiting times for specialised housing. There are also some signs that in western and northern Europe that the passing of peak waves of household formation, by the early 1990s, has now reduced entry pressures. Massive investment in German rental housing, since 1989, is now alleviating access problems also.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">In most countries with large social sectors or investment programmes, the rapid growth in homelessness in the 1990s also led to a higher prioritisation to such groups,  </span><em data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">vis-à-vis</span></em><span data-dcnode-id="313" instrument_node=""> 'housed applicants. Wider evidence is not available on the impacts of this shift but the UK experience may be illustrative. As the proportion of council housing lets rose, in the late 1980s, to over 50 per cent, 'normal applicants and tenants seeking transfers faced longer waits (though this problem was avoided in countries such as Denmark where transfer applicants are allocated homes ahead of other priority groups). The UK governments response to charges of homeless people 'queue jumping has been to increase temporary housing and propose temporary tenancies thus eroding the rights of the statutorily homeless to be housed in the local authority sector. Arguably these measures merely redistribute limited housing opportunities between 'needy and 'very needy households. This brings us to the difficult issue of homelessness in Europe.
        </span></p><span data-dcnode-id="311" instrument_node="">
</span><h4 data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">2.4 Homelessness</span></h4><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Homelessness represents perhaps the most acute manifestation of social exclusion in Europe, Fitzpatrick (1996). However, although the European Federation of National Organisations Working with the Homeless has done much to clarify the meaning and extent of homelessness, there is still much debate on how 'homelessness should be defined and the problem(s) measured. Lack of an agreed definition and firm measures cannot, however, disguise the fact that homelessness grew worryingly in Europe from the mid-1980s onwards and in all countries. Nor can there be any dispute about the wretched conditions in which different groups now exist.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">A variety of dystopian existences face those widely regarded as homeless. Rooflessness, usually single males but with a growing share of women, exists not just in large north European cities but in smaller towns and some rural areas. In southern Europe homeless families and 'street children are increasingly evident difficulties in Portugal and Greece. Illegal shanty towns built from impermanent materials such as cardboard and corrugated iron now house 60,000 people in Portugal and in Spain they have reappeared to house gypsies and immigrants. All told there may be 150-200,000 shanty town residents in southern Europe. and a further 200,000 homeless immigrants, spread more widely. FEANTSA also estimate, throughout the Union, a further 200,000 people living in caravans and tents. Homelessness also absorbs those leaving institutions such as psychiatric homes and prisons, with no place to go. Homelessness totals also include those living in insecure housing and in overcrowded homes with friends and relatives (referred to as the hidden homelessness) as well as those in hostels and bed and breakfast accommodation.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">FEANTSA estimated, in 1993, that there was a minimum of 2.5 million homeless households in Europe and at least 3.5 million if shanty/illegal, tent/caravan and homeless immigrants were included. But with measures largely based on counts of those receiving or seeking support this figure probably remains an under-estimate. Similar factors also influence the observed cross-country patterns,  </span><a data-dcnode-id="299" href="#table8"><span data-dcnode-id="300" instrument_node="">see Table 8</span></a><span data-dcnode-id="298" instrument_node="">, which suggest the highest incidence rates at 10 per thousand people in France, Germany and the UK and the lowest rates, at less than 2 per thousand in Portugal, Spain, Greece and Ireland. As the country sketches (in the next chapter) indicate, policy action and reducing demographic pressures (in some countries) are now leading to reductions in homelessness in the UK, Ireland and Denmark. Overall totals remain worryingly high but it should be stressed that the quality of the data reported in the last two paragraphs is poor.
        </span></p><span data-dcnode-id="296" instrument_node="">

e="">0.3</span></td><td align="CENTER" data-dcnode-id="159" valign="TOP"><span data-dcnode-id="160" instrument_node="">608</span></td><td align="CENTER" data-dcnode-id="157" valign="TOP"><span data-dcnode-id="158" instrument_node="">2.0</span></td></tr><tr data-dcnode-id="142"><td data-dcnode-id="152" valign="TOP"><span data-dcnode-id="153" instrument_node="">Netherlands</span></td><td align="CENTER" data-dcnode-id="150" valign="TOP"><span data-dcnode-id="151" instrument_node="">1990</span></td><td align="CENTER" data-dcnode-id="148" valign="TOP"><span data-dcnode-id="149" instrument_node="">15.2</span></td><td align="CENTER" data-dcnode-id="146" valign="TOP"><span data-dcnode-id="147" instrument_node="">30000</span></td><td align="CENTER" data-dcnode-id="144" valign="TOP"><span data-dcnode-id="145" instrument_node="">2.0</span></td></tr><tr data-dcnode-id="129"><td data-dcnode-id="139" valign="TOP"><span data-dcnode-id="140" instrument_node="">Portugal</span></td><td align="CENTER" data-dcnode-id="137" valign="TOP"><span data-dcnode-id="138" instrument_node="">1993</span></td><td align="CENTER" data-dcnode-id="135" valign="TOP"><span data-dcnode-id="136" instrument_node="">12.8</span></td><td align="CENTER" data-dcnode-id="133" valign="TOP"><span data-dcnode-id="134" instrument_node="">2870</span></td><td align="CENTER" data-dcnode-id="131" valign="TOP"><span data-dcnode-id="132" instrument_node="">0.2</span></td></tr><tr data-dcnode-id="116"><td data-dcnode-id="126" valign="TOP"><span data-dcnode-id="127" instrument_node="">UK</span></td><td align="CENTER" data-dcnode-id="124" valign="TOP"><span data-dcnode-id="125" instrument_node="">1992</span></td><td align="CENTER" data-dcnode-id="122" valign="TOP"><span data-dcnode-id="123" instrument_node="">57.9</span></td><td align="CENTER" data-dcnode-id="120" valign="TOP"><span data-dcnode-id="121" instrument_node="">642980</span></td><td align="CENTER" data-dcnode-id="118" valign="TOP"><span data-dcnode-id="119" instrum </span><p data-dcnode-id="107"><em data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Source:</span></em><span data-dcnode-id="108" instrument_node=""> Second and third reports of the European Observatory on Homelessness
        </span></p><span data-dcnode-id="106" instrument_node="">
</span><hr data-dcnode-id="105" noshade="NOSHADE" width="100%"><span data-dcnode-id="104" instrument_node="">
</span><br data-dcnode-id="103"><span data-dcnode-id="102" instrument_node="">
</span><br data-dcnode-id="101"><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Homelessness, and the implied failure of housing policies to meet housing needs, has grown because of rising pressures on the supply of adequate, affordable housing. Different factors, varying across and within countries, have contributed to these emerging imbalances. These include</span></p><span data-dcnode-id="97" instrument_node="">
</span><ul data-dcnode-id="80"><span data-dcnode-id="96" instrument_node="">
</span><li data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">high rates of household formation in most countries and in Germany, Italy and Greece rising immigration from the east and north Africa;</span></li><span data-dcnode-id="93" instrument_node="">
</span><li data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">a growing incidence of family breakdown, more recently emerging in Mediterranean countries;</span></li><span data-dcnode-id="90" instrument_node="">
</span><li data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">rising levels of European unemployment, especially for young people;</span></li><span data-dcnode-id="87" instrument_node="">
</span><li data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">poorly developed social security systems in southern Europe and reductions in welfare state assistance in the north;</span></li><span data-dcnode-id="84" instrument_node="">
</span><li data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">growing policies of deinstitutionalising psychiatric patients without adequate provision for community based care.</span></li><span data-dcnode-id="81" instrument_node="">
</span></ul><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">The elements of this list of structural and personal factors often interact. Many of the homeless experience a devastating amalgam of several of these factors and homelessness is not a problem simply requiring housing investment solutions. Policy 'integrability is again critical in dealing with the issues. This is well illustrated by listing the general characteristics of Europes homeless</span></p><span data-dcnode-id="76" instrument_node="">
</span><ul data-dcnode-id="56"><span data-dcnode-id="75" instrument_node="">
</span><li data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">the majority are men and the most common age group is 30-39 though the average age is falling with growing teenage homelessness;</span></li><span data-dcnode-id="72" instrument_node="">
</span><li data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">most are unemployed, with typically 5 to 15 per cent in employment; even worse a significant proportion receive no benefits, for example 20 per cent of hostel dwellers in Belgium and 71 per cent in Italy;</span></li><span data-dcnode-id="69" instrument_node="">
</span><li data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">health is poor, with 30-40 per cent typically with a health problem; in Germany the average life expectancy of the homeless is a decade less than the average and in London the street homeless die 30 years earlier than average;</span></li><span data-dcnode-id="66" instrument_node="">
</span><li data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">substance abuse rates are high, involving more than half of Denmarks homeless;</span></li><span data-dcnode-id="63" instrument_node="">
</span><li data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">spells in institutions, either as children or adults, form a common background, involving 75 per cent of cases in Ireland, 60 per cent in Belgium and 42 per cent in Italy;</span></li><span data-dcnode-id="60" instrument_node="">
</span><li data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">commonly immigrants are over-represented, forming 10-20 per cent of the homeless population.</span></li><span data-dcnode-id="57" instrument_node="">
</span></ul><span data-dcnode-id="55" instrument_node="">
</span><p data-dcnode-id="53"><span data-dcnode-id="54" instrument_node="">And these homeless people only have direct rights to housing in France and the UK, though in the latter case they are now weakening. Policy responses in the 1990s have been relatively swift and, in some countries, extensive and innovative. But they are still inadequate. The previous section indicated how, in countries with large social housing systems, higher proportions of lets were directed at the homeless. Social housing investment programmes targeted at the homeless have been boosted in range of countries including France, Ireland and Denmark. New emphasis has been given to the provision of reception centres and complementary social support, including facilitating the difficult transition to permanent living. Private and charitable agencies have made important contributions in this reception, integration process and in southern Europe it has reflected a near absence of government action.</span></p><span data-dcnode-id="52" instrument_node="">
</span><h4 data-dcnode-id="50"><span data-dcnode-id="51" instrument_node="">2.5 What to do now?</span></h4><span data-dcnode-id="49" instrument_node="">
</span><p data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">Homelessness is the most obvious consequence of how European housing policies are failing to cope with social and economic changes. The increasing concentration of poor households in poor neighbourhoods, in both social and private rental sectors, is another failure which is likely to threaten both social cohesion and economic competitiveness. These acute issues are by no means the complete set of European housing difficulties. Gaps in 'affordability measures, show progress in meeting special housing needs in some places, inequitably distributed subsidies and other issues are still of significance.</span></p><span data-dcnode-id="46" instrument_node="">
</span><p data-dcnode-id="44"><span data-dcnode-id="45" instrument_node="">Not all of these difficulties are resource problems, better planning and management have a role to play in improving outcomes, but many are. Yet the general, but not ubiquitous, trend is for reducing support for housing. The case for housing has to be remade but this case is no longer simply about shelter and affordability but about recognising the benefits from linking housing more effectively to other financing, management and investment measures.</span></p><span data-dcnode-id="43" instrument_node="">
</span><p data-dcnode-id="41"><span data-dcnode-id="42" instrument_node="">But what should countries do, and how can Europe help without transgressing agreed lines of subsidiarity? In the next chapter, brief reviews (developed by a number of national experts) of pressures, policies and innovations are presented for selected Member States. Countries, even those with fewer resources, are doing a lot and new styles of housing policy are emerging in the 1990s. In the final chapter the potential roles of the European Union in facilitating such change are examined.</span></p><span data-dcnode-id="40" instrument_node="">
</span><hr data-dcnode-id="39" width="100%"><span data-dcnode-id="38" instrument_node="">
