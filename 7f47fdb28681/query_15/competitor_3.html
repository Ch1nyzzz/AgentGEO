</span><br data-dcnode-id="2965"><span data-dcnode-id="2964" instrument_node="">
</span><h3 class="c1" data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">HOUSING POLICY IN THE EU MEMBER STATES</span></h3><span data-dcnode-id="2961" instrument_node="">
</span><h4 class="c2" data-dcnode-id="2953"><span data-dcnode-id="2960" instrument_node="">Directorate General for Research 
                                </span><br data-dcnode-id="2959"><span data-dcnode-id="2958" instrument_node="">
Working Document 
                                </span><br data-dcnode-id="2957"><span data-dcnode-id="2956" instrument_node="">

                                </span><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">
- W 14 -

</span></div><span data-dcnode-id="2943" instrument_node="">
</span><hr data-dcnode-id="2942" noshade="NOSHADE" width="100%"><span data-dcnode-id="2941" instrument_node="">
</span><h3 data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">INTRODUCTION, HOUSING: A QUESTION FOR EUROPE?</span></h3><span data-dcnode-id="2938" instrument_node="">
</span><h4 data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Mixed progress</span></h4><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">The recent UN Habitat II meeting in, by drawing attention to the appalling housing conditions facing billions of households in the poorer half of the globe, served to emphasise the relatively high average quality of housing within the European Union. At the same time there is a widespread view that housing and neighbourhood conditions for the poorest third of Europeans are neither as intolerable nor as socially divisive as for Americans, especially in the inner cities. In the Union as a whole, but with considerably more emphasis in northern and western Europe, governments have long promoted active housing policies, frequently absorbing from one to four per cent of GDP. And in every Union country, with two exceptions, there is an over-riding policy objective that adequate, affordable housing should be available to all, Maclennan and Williams (1990), McCrone and Stephens (1995).</span></p><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">The reality is, however, that almost every European government fails to achieve their laudable objective. This may reflect resource constraints for public spending, changing socio-economic patterns to which policy only responds slowly, demographic pressures and shocks (such as the vast, post-1989 influx of refugees into a ring of countries from Greece to Germany) or the inherent failure of, sometimes, expensive policy solutions. At the level of the individual the 1990s growth in homelessness and the apparent backlog of provision for the elderly, the disabled and a range of special needs are cause for concern. At neighbourhood and city level the recorded expansion, in many countries, of the economically and socially disadvantaged in both older, over-crowded and low amenity central city areas and in post war social housing estates is heightening concerns about the causes and consequences of social exclusion. At the national level housing market instability has, in the 1980s and 1990s, created particular difficulties for less wealthy home-owners in Britain, Sweden, Finland, Spain and regions of other countries. And in some countries the priority given to curtailing public spending has prompted reductions in capital spending and led to major re-orientations of housing policy; for example, in Sweden, the Netherlands, the UK and most recently France. The same policy imperatives are now questioning support systems for rental payments. Much of Europe is uneasy with its housing policies and outcomes, Dieleman (1996).</span></p><span data-dcnode-id="2929" instrument_node="">
</span><h4 data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Changing responsibilities</span></h4><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Responsibility for housing policies lies at the national level and the Union has no direct competence in the field of housing policy, at least as it is conventionally defined, Priemus et. al (1993). Indeed, within countries there has been a shift throughout the 1980s to expand sub-national and municipal competences in housing (though not always available resources) both in countries with historically strong housing policies, such as Denmark and France, and those developing a new emphasis in housing policy, such as Spain and Ireland. In many countries, following the recognition that the methods used to plan housing investment or control social rental management may contribute to active citizenship and community participation, there have been significant attempts to devolve decision taking powers to neighbourhood communities.</span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">However, the adequacy and efficiency of national and local housing systems must also be a concern, indeed policy question, for the European Union. The over-riding objectives of the Treaty of Maastricht include encouraging further European economic integration and promoting social cohesion. Economic questions are not the focus of this report but it is clear that different housing market instabilities, which housing policies can shape if not cause, hamper convergence and that stressed, fragmented rental systems and differentially taxed home-ownership are not conducive to cross-national labour mobility. Housing systems will influence both the overall levels and patterns of the costs and benefits of monetary union. At the same time it is well recognised that housing markets and social housing systems are key integrative systems within any city or nation. Social and economic disadvantage will be reflected in housing patterns and increasingly there is a view to that emergent pattern of social segregation, based on ethnic as well as age and income groupings, may erode the cohesion and the competitiveness of neighbourhoods, cities and ultimately nations. Housing systems and their outcomes really matter in relation to the Maastricht objectives, see Maclennan and Stephens (1996).</span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">This disparity between concerns and competences may raise some dilemmas for the Union. But even with present patterns of subsidiarity there are two, at least, areas of competence in which actions at Strasbourg and Brussels could be expanded. First, as the subsequent sections of this report demonstrate all too evidently, there is a lack of coherent, centralised, current information on housing needs and policies within the Union. Researching housing issues for EU countries requires more the skill of patient detective work rather than analytical rigour. Secondly, and more positively, housing policy is changing significantly in many countries. It is no longer exclusively about adequate shelter and its affordability. It has become, increasingly, integrated with social security systems, holistic environmental and regeneration policies and the mobilisation of communities. In consequence, housing policies are increasingly inter-facing with policy areas in which the Union has competence and programmes. And this means that well designed social, urban and environmental interventions will have to take cognisance of local housing systems and, of course, that European spending may have significant leverage within such approaches.</span></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Housing policies and their outcomes are, arguably, valid areas of concern for European level politicians and policy-makers. This report provides an introductory, Europe-wide analysis of three related questions. First, what do housing policies contribute to the well-being of poorer Europeans? Secondly, are new innovations improving policy and practice? Finally, what has been the European Union influence on housing outcomes?</span></p><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">The report contains four main sections. Chapter 2 briefly outlines housing contexts and policies for low income households and summarises changing approaches. Chapter 3 assesses European housing outcomes in the 1990s. Chapter 4 provides brief sketches of specific country experience and is largely based on contribution by country consultants. Policy structures and organisation, emphasis, current challenges and innovative responses are summarised. Chapter 5 concludes with an overview of the European Union Funds and Initiatives which interface with housing-related activity and outlines ways in which the Union could further assist integrated policy developments involving housing providers.</span></p><span data-dcnode-id="2911" instrument_node="">
</span><hr data-dcnode-id="2910" noshade="NOSHADE" width="100%"><span data-dcnode-id="2909" instrument_node="">
</span><a data-dcnode-id="2908" name="1"></a><span data-dcnode-id="2907" instrument_node="">
</span><h3 data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">1. EUROPEAN HOUSING: AN OVERVIEW OF POLICIES</span></h3><span data-dcnode-id="2904" instrument_node="">
</span><h4 data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">1.1 Housing concerns</span></h4><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The home impacts on the social and economic well-being of households in a multiplicity of ways. It is, most basically, shelter from the elements; it is security and privacy from the outside world; it is space in which to relax, learn and live; it is access to more or less comfort. But the home also places the household in a specific neighbourhood context which may influence accessibility to relatives, friends, shopping, leisure, public services and employment. And, where households purchase their homes, housing debt and wealth are also critical concerns for the household.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Since the home touches upon the quality and feasibility of so many household activities then it is unsurprising that housing is relatively expensive, absorbing 15-20 per cent of average European incomes and, in the absence of subsidies, double that proportion for the lowest income households. It is also unsurprising, given the importance of housing, that most European countries have had some form of housing policy for the last hundred years. In broad terms housing policies have been traditionally concerned with</span></p><span data-dcnode-id="2895" instrument_node="">
</span><ul data-dcnode-id="2884"><span data-dcnode-id="2894" instrument_node="">
</span><li data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">accessibility, that is access to adequate housing, and management and maintenance services, for lower income households</span></li><span data-dcnode-id="2891" instrument_node="">
</span><li data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">affordability, involving restricting the burden of housing payments for lower income households</span></li><span data-dcnode-id="2888" instrument_node="">
</span><li data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">quality, including raising the standards of new construction or promoting maintenance and rehabilitation to ensure adequate homes for poorer households.</span></li><span data-dcnode-id="2885" instrument_node="">
</span></ul><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">A number of recent comparative reviews, McCrone and Stephens (1995), Balchin (ed), (1996) and Priemus (1997, forthcoming) emphasise that accessibility, affordability and quality have been at the core of European housing policies and they remain important concerns. Sometimes, as indicated below, they may be mutually exclusive objectives with particular policy choices. In the 1990s, arguably, the growing recognition of the multi-faceted role that housing plays in social and economic cohesion is adding a new, important concern, namely the 'integrability of policy measures. For example, it is increasingly important to understand how housing design and management interact with health care and social service provision in providing for the disabled and the elderly. In addressing Europes homelessness 'housing only solutions are now de-emphasised and social and employment links are stressed. Housing programmes which were, 20 years, ago, initially conceived of as a means to install toilets and baths in poor houses have evolved into large-scale, integrated policies to revitalise neighbourhoods, even whole cities. In all of these important areas of policy, housing actions may be necessary to secure progress but it will seldom be sufficient by itself, Maclennan and Bannister (1996). Contemporary policy concerns usually require a co-ordinated multi-sectoral approach. 'Integrability, as public budgets tighten and, (hopefully), crude housing shortages continue to lessen, will become a dominant concern in future European housing policies.</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Before examining the future, it is important to summarise how European Union countries address the policy concerns of affordability, accessibility and quality of housing for citizens. This is a rather complex task. Countries weight or select these objectives differently. Further, they have chosen different means to achieve similar ends and both objectives and means have changed markedly over time. Since both housing and policy influences endure over time then it is impossible to understand present patterns without reference to the past. In the remainder of this section the main methods for delivering housing support are described in principle and then brief overviews are provided of major housing policy patterns across groups of Union countries and of recent, major trends.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><h4 data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">1.2 A spectrum of intervention</span></h4><span data-dcnode-id="2874" instrument_node="">
</span><p data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">The history of European housing policies illustrates the full range of housing policy instruments. Direct control of housing quality, by the state, is one means. By the end of the nineteenth century, West European governments had already undertaken demolition programmes and introduced building standards legislation to address the adverse public health effects of slum housing. However, demolition and higher standards do little to improve access and affordability for low income households. Rent controls, essentially suspending the market mechanism, introduced in some countries during World War I, were extended more widely in the 1930s and became near ubiquitous throughout Europe after 1945. They were 'softened in north and western Europe from the 1960s onwards, but not in the Mediterranean states, and largely removed in the second half of the 1980s, at least for newly let tenancies. Rent controls, may have ensured affordability objectives but at the same time, by reducing landlord investment often led to lower housing quality and diminished accessibility (though impacts have varied from country to country), Maclennan (1997).</span></p><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The suspension of rental market mechanisms, for low income housing provision, led, in many countries, to the displacement of market provision by non-market housing (referred to below as the social housing sector). Social housing provision in Europe commenced in Sweden, Denmark, Austria, Germany, France, the Netherlands and Britain at the beginning of this century. In some countries, such as Denmark, Germany and France provision was always dominated by a diverse set of not-for-profit providers. In the UK and the Netherlands, municipalities were then given the key roles in social housing provision. The sector grew steadily, except in the Mediterranean area and Belgium, through the first half of the century and then expanded markedly, with reconstruction and welfare state provision from 1950-1980. The social sector mechanism in Europe, until then, relied on deep dwelling tied subsidies (commonly 30-50 per cent of capital costs) for new dwellings, which were then let at below market rents. Unit quality was ensured by building standards (though 'neighbourhood quality was often disastrously, de-emphasised) and accessibility for low income households was ensured by below market rents and housing allocation according to social priorities, Priemus (1997).</span></p><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Social housing provision, and the displacement of the market, is not the only means by which to ensure low-income accessibility, quality and affordability. Nor indeed are deep capital, or dwelling-led, subsidies the only means by which to support the social housing sector. Some countries, most notably, in the Mediterranean area have sought to pursue social objectives in housing through market enhancing, or enabling, measures. For instance, there is no social housing in Greece but rather state support, via subsidised loans and tax-breaks, to low income home-owners. Some countries, such as Germany, whilst developing social housing also adopted a more tenure-neutral view of how to pursue social objectives in housing and also supported low-income home-owners from the 1950s onwards, as did Finland and Belgium, Maclennan and Stephens (1996). Since the start of the 1980s programmes to support low income home-owners, not least in housing rehabilitation and area regeneration, have become more widespread, partly in response to dissatisfaction with the long term outcomes of social housing solutions. Market provision of lower income (subsidised) housing has become more important in Europe in the last decade.</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Social housing, like market provision, can be made more affordable to residents either by providing capital subsidies, to enhance supply and restricting rents, or by subsidising the incomes of residents (usually in relation to their rent payments). Again, since the mid-1970s, north and west European countries with large social housing systems have typically switched the pattern of support from 'buildings to 'households (with the objective of targeting scarce resources to poorer households within the social sector, see further below).</span></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Demolition, specification of standards, rent controls, social housing provision, enabling and subsidising home-owners and income related housing supports have been the main means for promoting better, affordable housing for low income Europeans. The previous paragraphs have hinted at how policy approaches have varied across countries and evolved over time.</span></p><span data-dcnode-id="2859" instrument_node="">
</span><h4 data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">1.3 Diverse approaches, common strands</span></h4><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Housing policy approaches, in broad terms, are reflected in housing tenure structures (e.g. strict controls reduce private renting and suspension or displacement of the market is associated with large scale social sectors) and in public expenditure shares devoted to housing policies. On the basis of tenure patterns and public expenditure ratios a broad classification of policy systems for meeting social policy objectives in housing can be made. It should be stressed that this classification is only one of several possibilities, it is simplistic and it is based on data relating to the very start of the 1990s. It is not intended to imply good or bad approaches but to illustrate broad differences. The estimated tenure balances of countries and public spending commitments to housing are approximated in Table 1.</span></p><span data-dcnode-id="2853" instrument_node="">

22</span></td><td align="CENTER" data-dcnode-id="2598" valign="TOP"><span data-dcnode-id="2599" instrument_node="">18</span></td><td align="CENTER" data-dcnode-id="2596" valign="TOP"><span data-dcnode-id="2597" instrument_node="">16*</span></td><td align="CENTER" data-dcnode-id="2594" valign="TOP"><span data-dcnode-id="2595" instrument_node="">4.10 (1992)</span></td></tr><tr data-dcnode-id="2577"><td data-dcnode-id="2589" valign="TOP"><span data-dcnode-id="2590" instrument_node="">EU</span></td><td align="CENTER" data-dcnode-id="2587" valign="TOP"><span data-dcnode-id="2588" instrument_node="">56</span></td><td align="CENTER" data-dcnode-id="2585" valign="TOP"><span data-dcnode-id="2586" instrument_node="">18</span></td><td align="CENTER" data-dcnode-id="2583" valign="TOP"><span data-dcnode-id="2584" instrument_node="">21</span></td><td align="CENTER" data-dcnode-id="2581" valign="TOP"><span data-dcnode-id="2582" instrument_node="">&nbsp;</span></td><td align="CENTER" data-dcnode-id="2579" valign="TOP"><span data-dcnode-id="2580" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2572" instrument_node="">

</span><hr data-dcnode-id="2563" noshade="NOSHADE" width="100%"><span data-dcnode-id="2562" instrument_node="">
</span><br data-dcnode-id="2561"><span data-dcnode-id="2560" instrument_node="">
</span><br data-dcnode-id="2559"><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Three EU countries, the Netherlands, Sweden and the United Kingdom stand out by virtue of having large social or not-for-profit sectors shares and policy costs exceeding 3 per cent of GDP per annum. They are also the countries in which the traditional roles of and approaches to housing policy have most changed since the 1980s, in the sense that traditional welfare state roles have been challenged. They also display important differences. Whilst both the UK and the Netherlands, as the result of past rent controls and extensive slum clearance policies, have extremely small private rental markets The UK, especially since 1980, has vigorously promoted home-ownership. Sweden has had a more tenure neutral approach.</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Austria, Denmark, France and Germany (prior to 1989) have had, arguably, less market displacement. Private rental sector policies, whilst retaining controls in some form, have permitted a significant private landlord sector to remain and, particularly in France and Germany, facilitated upgrading of the sector. They have also built social sectors on a significant scale and with reunification Germany now has a social sector share second only to the Netherlands within the EU. But to a greater extent than the first group, prior to the 1990s, these countries met more low income housing needs in privately provided rental homes (and, in the case of Germany, also in home-ownership). Annual policy costs appear to lie in the range of 1-2 per cent of GDP per annum.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Ireland, Italy, Belgium, Finland and Luxembourg form a rather disparate group of countries characterised by high shares of home-ownership and small social housing sectors, and policy costs of around 1 per cent per annum. Finland and Ireland (when account is taken of the fact that Irish municipalities have built, and then largely sold at a discount, a third of the nations housing stock) have some similarities to the UK. Belgium and Luxembourg are the two western European countries in which the state has de-emphasised the pursuit of social policy objectives via social housing and emphasised solutions within home-ownership. Italys overall pattern reflects a decentralised housing policy in which sharp regional differences in wealth (which exist also in other countries, e.g. between the old and new Lander in Germany and North and South in Britain) have produced social housing in more affluent northern cities, e.g. Milan, and seen more private rental reliance in the South, e.g. Naples.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Portugal, Spain and Greece have particularly high home-ownership rates, traditions of support for owners, minimal social housing provision and large, but declining and low-quality private rental sectors. Policy costs in these countries usually fall below 1 per cent of GDP per annum.</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Looking across Europe this diversity of approaches means two important things for low income households seeking adequate, affordable housing. First, within the policy intensive countries routes to good housing differ sharply across national systems. Dutch citizens, for example, face very different opportunities from their Belgian and German neighbours. Secondly, the levels of support, and varieties of support, differ markedly from Sweden in the north to Greece in the south. In relation to European integration issues, housing systems and support levels differ much more across countries than do policies across States and regions in the USA.</span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Measures to help households with housing costs, and improve housing conditions, are generally organised and differentiated by housing tenure. The following three sections present a brief overview of the main kinds of assistance according to tenure sector.</span></p><span data-dcnode-id="2540" instrument_node="">
</span><h4 data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">1.4 Helping home-owners</span></h4><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Home-ownership, at the start of the 1990s, was the largest tenure sector in 14 of the 15 Union states and was the most rapidly growing in all. In Europe as a whole, some 56 per cent of the housing stock is in owner-occupation.</span></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">The broad pattern of support for home-owners in Europe is indicated in Table 2. The mainstream form of support arises because tax relief is available on mortgage interest payments and because tax is either not levied on assessed rental income or levied at a low rate on outdated valuations. In the majority of countries the non-taxation of selling gains reinforces this fiscal advantage. In addition to general tax support there are also specific measures targeted to achieve particular social objectives. For instance, in Spain and Finland young buyers receive extra support and the UK and Ireland pursue a variety of measures to boost low-cost home ownership (in addition to active policies to sell municipal units). Home improvement grants, often targeted at the elderly or disability conversions, is promoted in a range of countries. Further, housing allowances are available to poorer home-owners in Denmark (pensioners only), Finland, Sweden, Germany and the UK (where their generosity has been greatly reduced since 1995). With the exception of the UK, Ireland, Denmark and Germany, high turnover taxes act as a deterrent on home-owner mobility.</span></p><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2530" instrument_node="">Until recent years home-ownership would have been de-emphasised in any overview of the 'social policy effects of housing policies. However, such an omission would have been inappropriate in the past and is seriously misplaced now. Although home-owner sectors are, in general, characterised by more affluent, two-adult families living in larger, high amenity homes ( </span><em data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">vis-à-vis</span></em><span data-dcnode-id="2527" instrument_node=""> the rental sector) national averages conceal more specific difficulties. These difficulties, which have become more apparent as sectors have expanded and matured, plus the reliance of the Mediterranean countries, Finland, Ireland, Belgium and the UK on large home-owner sectors, need to be addressed by housing policies. They include
        </span></p><span data-dcnode-id="2525" instrument_node="">
</span><ul data-dcnode-id="2511"><span data-dcnode-id="2524" instrument_node="">
</span><li data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">the increasing proportion of the elderly living in home-owner units which are poorly adapted to their needs;</span></li><span data-dcnode-id="2521" instrument_node="">
</span><li data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">deteriorating housing conditions, due to low maintenance as elderly owners on low incomes confront other spending priorities;</span></li><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">a rising proportion of home-owners, most notably and recently in Britain and Finland, who face sudden loss of employment and are confronted with rising arrears and repossessions; mortgage arrears have been at record levels in much of north and western Europe in the 1990s;</span></li><span data-dcnode-id="2515" instrument_node="">
</span><li data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">a rising number of home-owners families being split through separation and divorce, often generating urgent demands for, at least, short-term rental housing.</span></li><span data-dcnode-id="2512" instrument_node="">
</span></ul><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Responses to these problems in particular countries, are discussed in the next chapter. There is also a more general concern that past tax policies to promote home-ownership have been socially divisive. In general, support has been regressive; it has been most valuable to the more affluent. At the same time, inflation and taxation (prior to the 1990s) have encouraged the more affluent to become home-owners and, often, to suburbanise well away from lower-income, rental areas. Home improvement and area regeneration policies have, since the mid-1980s, begun to counter the geographic separation trend, particularly for younger households, for instance in Britain and Denmark. Of even greater importance, however, is the emerging trend in the 1990s to follow Denmarks lead of a decade earlier and to reduce tax-subsidies for home-owners, Maclennan and Meen (1993).</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">This marked shift in policy (in Sweden, the UK, the Netherlands, France, Finland, Italy and, to a lesser extent, Ireland) is an important new development in the 1990s. It has been largely prompted by desires to reduce government deficits. On the positive side, it does offer more scope for rental housing initiatives. On the negative side, it also reflects a reduction in support for housing which is also apparent in other tenures. Detailed statistical evidence is not yet available but it is likely that housing in Europe, because of reductions in the north and west and static positions in the south, is becoming less subsidised than at the end of the 1980s. With housing costs rising as fast as inflation, and often ahead of incomes, this implies a likely increase in European housing affordability -problems.</span></p><span data-dcnode-id="2504" instrument_node="">

</span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">
</span><h4 data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">1.5 Assisting private renting</span></h4><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Private landlords provide 21 per cent of European Union citizens with homes. Within the Union, only in Germany (prior to 1989) has it been the largest sector in modern European housing systems. The relative significance of the sector was declining (from 1980-1990) in all countries except Greece, France and Sweden. However, there are two important caveats to this depiction of decline. First, in most countries private rental housing has remained disproportionately more significant in larger urban areas (often twice the national rate) and capitals (at treble national rates). Secondly, as discussed below, after half a century of sustained decline in share there are mid-1990s signs of rental sector revival in more than half of EU countries.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Private rental housing decline, to a significant extent, reflects past emphases in policy. Decline in provision has been most marked (in the UK and the Netherlands, for example) where rent controls were strict, slum clearance extensive and subsidies directed at other sectors. In Germany, by way of contrast, fiscal support to landlords maintained a large, adequate quality sector whilst in Portugal deep rent controls (until the late 1980s) and no slum clearance/social rehousing left a large-scale and poor quality sector. There is now extensive empirical evidence that Europes long run attempts to solve affordability problems through controlled rents have resulted in deteriorated housing quality and entry/access difficulties for the low income households that such policies were intended to benefit.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Research across a range of countries suggests that the average incomes of private sector tenants fall below those of home-owners but exceed social renters. Resident ages, for adults, are similar across tenures. However, these averages conceal the fact that private rental sectors are usually comprised of at least four segments, the first three of which still raise acute social concerns. These are:</span></p><span data-dcnode-id="2072" instrument_node="">
</span><ul data-dcnode-id="2058"><span data-dcnode-id="2071" instrument_node="">
</span><li data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">now elderly households who entered the sector in the 1950s and 1960s who face low incomes and exceptionally poor dwelling conditions;</span></li><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">younger households, again often single persons, who live in low quality, multiple person accommodation and who have low incomes or are unemployed or have had to leave violent or 'dissolving parental homes;</span></li><span data-dcnode-id="2065" instrument_node="">
</span><li data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">poorer households, often with families, who are unable to afford owner-occupation and who have, as yet, been unable to gain access to social housing; asylum seekers, recent migrants and ethnic minorities are usually disproportionately housed in private lets;</span></li><span data-dcnode-id="2062" instrument_node="">
</span><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">younger households, often single persons, who have jobs and incomes, who live in better quality rental housing and who, in due course, are likely to become home-owners.</span></li><span data-dcnode-id="2059" instrument_node="">
</span></ul><span data-dcnode-id="2057" instrument_node="">
</span><br data-dcnode-id="2056"><span data-dcnode-id="2055" instrument_node="">
</span><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Policies for private rental housing have often, in Europe, been predicated upon the imperfections of the housing market dominated by private landlords. But this view is misplaced and mythological; the inadequate housing now prevalent in parts of every European private rental sector is now primarily a reflection of policy failure, either by suppressing landlord investment or by failing to target subsidies to acutely needy households. Even worse, if cutbacks in policy provision are indeed occurring then they will inevitably produce their social consequences in residual private rental sectors.</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">However, there are some signs that Union countries have begun to have some positive policy impacts in private renting. As private lets are low quality and concentrated in central city areas (in the main) they have been positively impacted by housing rehabilitation policies. In some countries, such as Denmark, the Netherlands and the UK, area regeneration often involves not-for-profits purchasing and improving (and adapting for special, elderly and disabled needs) poor quality private lets. In other countries, for instance France and Germany, grants and tax aid (respectively) have improved living conditions for millions of private tenants. There are more isolated examples of such progress in southern Europe, for instance in Lisbon and Oporto, but resources for older rental renovation have been on a very limited scale and it is precisely in countries such as Spain, Portugal and Italy where such programmes are badly needed to improve homes and neighbourhoods. In northern and western Europe, there are typically no more than 5 per cent of households living in unimproved private lets. In the south this proportion is typically closer to 15 per cent and this is a major European inequality.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Countries, both north and south, have recently been relaxing controls on new investment or tenancies. And in seven northern countries new fiscal support measures for private landlord investment have been developed in the 1990s. These measures are a recognition that changing demography, lower inflation, increased need for young person mobility, expansion of higher education and post boom-bust changes in attitudes to early housing career ownership are all raising demands for renting. Young person demands for independent living are also rising in Greece and Italy but there has been little policy response to the shift. In consequence, if rental housing supply does not expand, poorer renters will be displaced into poorer properties or, even worse, homelessness.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">As rent controls have been removed and 'softened, private sector rents in Europe have risen at above inflation rates since the late 1980s, though in southern Europe rent increases to 1993 fell below general inflation. Even with 'soft controls, governments have had to pursue policies to mitigate the rent burdens.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">The general pattern of assistance, around 1990, is indicated in Table 3. After support related to incomes, the average European tenant pays in private renting around a fifth of their incomes in rent. This proportion is lower in the poorer countries, where 'controls are still important and housing quality is often poor. In other countries different burdens reflect different sector composition and the different benefit systems. The proportion of tenants receiving support varies from around 25, 21 and 20 per cent, respectively, in Britain, France and Denmark through 13 per cent in the Netherlands to 10 per cent in Sweden and Germany. These average figures do not suggest any crisis in paying for rental housing (they are not unduly high by OECD standards) but they may mask real difficulties encountered by the 'socially excluded. Undoubtedly the rental sector, even as it re-expands, will be the locus of some of the most acute housing difficulties concerning costs and conditions within the European Union.</span></p><span data-dcnode-id="2038" instrument_node="">

</span><hr data-dcnode-id="1885" noshade="NOSHADE" width="100%"><span data-dcnode-id="1884" instrument_node="">

</span><br data-dcnode-id="1881"><span data-dcnode-id="1880" instrument_node="">
</span><h4 data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">1.6 Supporting social renting</span></h4><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">Just under a fifth of Europeans live in social rental housing (and here the term 'social is applied to provision by public bodies and not-for-profits with no implication that all residents are poor). As noted above, in some countries the sector was developed on an extensive scale, for instance in the Netherlands, Sweden and the UK, to meet social objectives and housing needs. In other nations, for example Greece and Belgium, this approach attracted no or little support,  </span><a data-dcnode-id="1874" href="#table3"><span data-dcnode-id="1875" instrument_node="">see Table 3</span></a><span data-dcnode-id="1873" instrument_node="">.
        </span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1868"><em data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Habitations à loyer moyenne</span></em></strong><span data-dcnode-id="1867" instrument_node="">
</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Social housing covers a wide range of providers and roles. The European norm is for not-for-profits, such as housing associations, co-operatives and the Habitations à Loyer Moyenne (HLM) in France, to be the main providers. Direct provision by municipalities has been historically important in the Netherlands, the UK, Ireland and Austria (with smaller roles in Portugal and Italy). However, these countries have increasingly switched (in 1963 in the Netherlands, in 1980 in the UK and 1991 in Ireland) to shift investment and stock into the not-for-profit sector. This change partly reflects fiscal pressures to move spending out of public sector budgets; but it is also a recognition that not-for-profits have been able to display diverse innovative capacities, deliver more effective, decentralised management and maintenance and, in some countries, to involve citizens and communities in the design and management of their homes. Tenant involvement has varied in significance, for instance associations are resident-controlled in Denmark and Scotland but much less so in the French HLM and there are concerns that recent financial reforms have reduced tenant roles in the Netherlands and England.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Typically, in Europe, not-for-profits rely upon private sector loans with interest subsidies provided by central government with the UK a major exception by relying on capital grants. Supplementary funds (often small grants) from regional or local authorities are also common. Not-for-profits, except in the UK, are supervised by local authorities. There has, since 1980 been a marked increase in the share of loan finance drawn from private sector lenders and (in contrast to home-ownership) there is a European market in funds for social housing emerging.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Until the late 1970s, in those countries which had adopted the model as the solution to 'social problems in housing, social housing was expanded as extensively as public funds would allow. And in many countries there was no explicit income level limiting eligibility for social housing - for instance in the UK, Sweden, and the Netherlands (and in France it was set two-thirds of the way up the income distribution). Indeed, in all of these countries social landlords still house significant, if declining, minorities of households in the upper half of the income distribution. The intent, although not always the reality as social separation occurred in many local public housing systems, was that social housing should support socially and economically diverse populations. Other countries, often but not always with smaller sectors, had explicit income rules limiting entry, for example Germany and Ireland.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1855" instrument_node="">These patterns began to change in the 1980s,  </span><a data-dcnode-id="1853" href="#table4"><span data-dcnode-id="1854" instrument_node="">see Table 4</span></a><span data-dcnode-id="1852" instrument_node="">, when Belgium, Ireland, West Germany (prior to unification) and, especially, the UK began to curtail investment in new social housing. With subsidised sales policies in both countries the shape of the sector then contracted rapidly in Britain and Ireland. Through the 1980s some countries continued a strong commitment to social housing investment, including the Netherlands and Sweden, and in France, Austria and Germany (facing a sudden, massive increase in needs) the investment share of the sector increased. In the early 1990s relative decline of the sector became apparent in Sweden and the Netherlands and, more recently budgets have declined in Denmark and France. Only Ireland and Germany have given a new priority to social housing in the 1990s.
        </span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Some of this retrenchment may be temporary, reflecting recessionary public budget pressures as countries seek to meet the Maastricht convergence criteria. There are signs, however, that in Britain, the Netherlands and Sweden that there has been a more fundamental shift against reliance upon social housing investment on a large scale. This may mirror shifting ideologies, but it also reflects a growing unease with the outcomes of past policies in relation to subsidy-targeting, social segregation and dwelling quality. In some countries large scale social housing is now seen as being as much a problem as a solution.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Whilst many areas of social housing have remained well organised and liveable, there are significant shares of social housing that have come to constitute (sometimes within 10 years of their construction) areas of poor housing, poor people and poor living conditions. In north and western Europe, social exclusion is often now just as apparent in municipal and not-for-profit housing as it is in older, central city homes provided by private landlords. This observation is self-evident in Dublin or Paris or London or Copenhagen or Berlin and in a host of other cities. The key issue is whether this is a set of problems inherent to or manifested within social housing systems.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">The answer to this question, in most places, is both. When social housing was constructed and let the priority applicants were generally poorer but employed families, usually with two adults and children. Over the last two or three decades the employment prospects of these households have fallen rapidly, they are precisely the most affected groups in economic restructuring. At the same time, residents have aged in situ. Hence the resident composition of these areas became older and poorer. Arguably these effects would have occurred regardless of tenure or location.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">The quality of homes and estates also deteriorated, and in this the nature of social housing policy did have a negative role. In France and Britain, for example, homes were under-maintained. There, and elsewhere, high-rise and other modern dwelling forms were unpopular with residents and eroded commitment to neighbourhoods. And this commitment waned even faster where tenants, such as in British council housing and numerous French HLM, had little direct influence on estate management.</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">As these estates became less popular they generated higher turnover rates, destabilising communities, and increasing vacancy rates. The nature of local housing allocation schemes then meant that the new poor of the 1980s, for instance single parents and the young homeless people, then filled the vacancies. Residents with jobs and rising incomes left, often to subsidised home ownership. These processes have been well established for social housing estates in Dublin, Glasgow, Lyon and Amsterdam. Clearly, adverse economic and social trends occurring outside the housing sector changed the client flow for social housing but arrangements within the sector sometimes reinforced social separation and exclusion consequences.</span></p><span data-dcnode-id="1835" instrument_node="">

</span><p data-dcnode-id="1510"><span data-dcnode-id="1514" instrument_node=""> </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Sources:</span></em><span data-dcnode-id="1511" instrument_node=""> Hedman (1993) and Country Reports
        </span></p><span data-dcnode-id="1509" instrument_node="">
</span><hr data-dcnode-id="1508" noshade="NOSHADE" width="100%"><span data-dcnode-id="1507" instrument_node="">
</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">
</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">These difficulties were, in turn, exacerbated by changes in rent policies. Towards the end of the 1970s, with still modest unemployment rates in social housing, a majority of countries de-emphasised dwelling subsidies in favour of housing allowances. It was argued that this would target assistance more effectively to needier households and, sometimes, in a tenure neutral fashion. In consequence,  </span><a data-dcnode-id="1500" href="#table4"><span data-dcnode-id="1501" instrument_node="">see Table 4</span></a><span data-dcnode-id="1499" instrument_node="">, rents then rose ahead of inflation in countries with housing allowance systems and this pattern has continued into the 1990s. The Mediterranean countries, with no housing allowance systems, have, in contrast, had rent increases below inflation rates.
        </span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node="">This near-universal shift in approach, albeit with markedly different increases in real rents (highest in the UK and least in Germany) has had mixed effects. Poorer tenants have received more assistance and net (after benefit) rent to income ratios lie in the range of 12-15 per cent in most countries. But more affluent tenants have been encouraged to leave the sector and in higher rent countries or cities it is often only benefit dependent households who can afford to enter higher rent, new and rehabilitated houses. The characteristics of allowance schemes differs across countries,  </span><a data-dcnode-id="1494" href="#table6"><span data-dcnode-id="1495" instrument_node="">see Table 6</span></a><span data-dcnode-id="1493" instrument_node="">, but often where benefit replacement rates are high (that is rent allowance, and other benefits, fall as employment income increases) a deep poverty trap is formed. This problem is most acute in the UK, with a relatively low level of basic social security and high withdrawal rates; recent research suggests that in the UK an unemployed adult with two children would have to secure a wage above the average manual workers salary before escaping the poverty trap. The interaction of housing and social security policies is reinforcing social exclusion in such circumstances. It is also likely that low net rents contribute to the under-utilisation of larger social housing units, thus leading to stock misuse.
        </span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The rise in European rents, rising unemployment and pensioner status of social sector tenants and recession have contributed to a growing sense of alarm at housing allowance bills within the Union. In Britain, France and the Netherlands housing allowance bills roughly doubled over the five year period 1988-93. There, and in other countries, there are continuing policy reviews to contain the growth in spending. But the problem is sufficiently intractable that no obvious solutions have yet emerged which reach to the heart of the problem. In the meantime rent rises are being moderated but, as noted above, investment budgets are being reduced.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The larger social rental sectors in Europe have, over the last decade, come to house a larger proportion of the poor, including the unemployed, single parent families, ethnic minorities and migrants. In some senses this is a positive achievement but, at the same time, also negative as they have increasingly come to dominate the sector. Tenure is a major contour of social exclusion. Within the tenure, social segregation appears to have increased. But social housing has also been characterised by positive achievements in many countries</span></p><span data-dcnode-id="1485" instrument_node="">
</span><ul data-dcnode-id="1465"><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">resident participation has been encouraged;</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">it has played an increased role in housing the homeless;</span></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">new priorities, and resources, have been committed to housing the elderly, the disabled and other groups with specific needs;</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">management systems and staff quality have been improved;</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">fairer and less social divisive allocation systems have been developed;</span></li><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">attempts are being made to mix housing tenures and income groups on smaller, more-balanced estates.</span></li><span data-dcnode-id="1466" instrument_node="">
</span></ul><span data-dcnode-id="1464" instrument_node="">

        </span></p><span data-dcnode-id="923" instrument_node="">
</span><hr data-dcnode-id="922" noshade="NOSHADE" width="100%"><span data-dcnode-id="921" instrument_node="">
</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">The major, positive breakthrough has, however, been the development of large scale programmes to rehabilitate rundown social housing estates,  </span><a data-dcnode-id="914" href="#table4"><span data-dcnode-id="915" instrument_node="">see Table 4</span></a><span data-dcnode-id="913" instrument_node="">. Extensive programmes already exist in Britain, France, the Netherlands and Sweden and have developed in the 1990s in Ireland and Denmark. Where they do take place they have a fundamental effect on the lives of the European poor. Such initiatives are increasingly partnerships between the public sector, the community and the private sector. Housing investment and management changes are integrated with social, health and environmental actions and much emphasis is placed on raising resident employability through a series of measures ranging from increased child-care to training. Recent successes in cities such as Dundee, Rotterdam and Lyons illustrate that real progress can be made in tackling the causes as well as the symptoms of social exclusion. But for further progress resources will be required plus a new emphasis on 'integrability in housing policy thinking and funding.
        </span></p><span data-dcnode-id="911" instrument_node="">
</span><h4 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">1.7 Major trends reviewed</span></h4><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">It was noted above that housing policy approaches differ across countries and that policy objectives and means may change over time. In the previous sections discussion of cross-country contrasts has inevitably meant mention of changes. It is, however, pertinent in this section to briefly summarise the recent major trends in European housing policies.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">There are seven noteworthy areas of generalisations</span></p><span data-dcnode-id="902" instrument_node="">
</span><ul data-dcnode-id="837"><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">There is a longstanding recognition that good, affordable housing is central to achieving social cohesion in European countries; policy objectives and approaches have evolved over time and differ over countries; in the Mediterranean countries policies directly impact 15 per cent of households and 50-60 per cent of households in more affluent northern countries.</span></li><span data-dcnode-id="898" instrument_node="">
</span><li class="c4" data-dcnode-id="892"><span data-dcnode-id="897" instrument_node="">
</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">
</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
</span></li><span data-dcnode-id="891" instrument_node="">
</span><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Affordability in private rental housing has, until recently, been achieved by rent controls which have reduced investment and quality; reduced inflation and emerging labour market flexibilities are boosting demands from more affluent young households and fiscal incentives and deregulation are facilitating a re-expansion in the sector; however, acute difficulties remain for elderly households in depreciated homes and poorer, often young households excluded from other tenures; the greatest difficulties exist in the Mediterranean states.</span></li><span data-dcnode-id="888" instrument_node="">
</span><li class="c4" data-dcnode-id="882"><span data-dcnode-id="887" instrument_node="">
</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">
</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">In recent decades, owner-occupation has been the fastest growing tenure and this has been aided by tax subsidies, inflation and rent increases in other sectors; the sector contains problematic as well as prosperous residents and the 1990s has witnessed a growth in low income elderly in under-maintained homes as well as high levels of mortgage arrears and repossessions in northern countries; many countries are now reducing general tax concessions for owners but there is, in a minority of countries, growing use of special measures to assist poorer and elderly owners.</span></li><span data-dcnode-id="878" instrument_node="">
</span><li class="c4" data-dcnode-id="872"><span data-dcnode-id="877" instrument_node="">
</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">After four decades as the 'engine of low income housing policies in north and western Europe, the share of social housing investment is reducing in most countries although needs are not obviously falling; since the start of the 1980s the sector has largely absorbed the unemployed and 'new poor of northern Europe and has become a critical locus of social separation and exclusion; internal problems of poor design and management, which became apparent in the 1980s are being addressed with efforts to raise tenant involvement; letting policies and priorities have become more sensitive to specific requirements for the disabled and elderly as well as ethnic minorities, special needs groups and the homeless.</span></li><span data-dcnode-id="868" instrument_node="">
</span><li class="c4" data-dcnode-id="862"><span data-dcnode-id="867" instrument_node="">
</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">
</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">
</span></li><span data-dcnode-id="861" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Increased incidence of renter poverty and rising rents, at least in northern Europe, in all rental tenures are increasingly being met by housing allowances and other income-related rent measures; however, although affordability issues are generally being met, allowances create poverty traps and may lead to inefficient stock use; burgeoning benefit bills are now being scrutinised by governments with a view to reduction.</span></li><span data-dcnode-id="858" instrument_node="">
</span><li class="c4" data-dcnode-id="852"><span data-dcnode-id="857" instrument_node="">
</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">There is a growing recognition of the need for 'integrability in housing policies; as more specific housing needs are met then housing becomes only one element in packages of, for instance, health, security and social support measures to assist the frail elderly and the handicapped; in the regeneration of older central-city and social housing neighbourhoods, housing is a necessary but not sufficient policy channel to achieve change and linkages to social, economic and environmental measures are required.</span></li><span data-dcnode-id="848" instrument_node="">
</span><li class="c4" data-dcnode-id="842"><span data-dcnode-id="847" instrument_node="">
</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span></li><span data-dcnode-id="841" instrument_node="">
</span><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">In north and western Europe, with the exceptions of Germany and Ireland, fiscal support for housing policies appears to be falling; tax subsidies are falling; social sector investment is reducing and only benefits are growing; in southern Europe the fiscal efforts is stable but proportionately smaller; efficiency in policy delivery could increase but the likelihood is that housing policy efforts will fail; poor conditions on rundown housing estates will be perpetuated, inner city rehabilitation is likely to slow and the private rental sector face new low income pressures whilst 'sharing and homelessness will, at best, not fall.</span></li><span data-dcnode-id="838" instrument_node="">
</span></ul><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Before turning, in Chapter 3, to consider recent experience in individual Member States it is relevant to ask what past policies have achieved and what challenges remain.</span></p><span data-dcnode-id="833" instrument_node="">
</span><a data-dcnode-id="832" name="2"></a><span data-dcnode-id="831" instrument_node="">
</span><h3 data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">2. POLICY OUTCOMES AND CHALLENGES</span></h3><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Housing policies, as noted above, have to be concerned with 'affordability, 'accessibility, 'quality and 'integrability. 'Integrability is a new theme in housing actions and there is little systematic knowledge on progress to date. This section, therefore, concentrates on 'affordability, 'quality and 'accessibility. It should be stressed, however, that there is limited cross-national, comparable information on these topics. Housing policies, say in contrast to health and education, have been rather sloppily monitored by many national governments.</span></p><span data-dcnode-id="825" instrument_node="">
</span><h4 data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">2.1 Affordability</span></h4><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Affordability is a broad measure of the burden of housing costs in relation to incomes. The discussion above on rental housing systems and housing allowances suggests that, in most countries, households who have access to rental housing and some form of tenant support generally face 'affordable rents in Europe. The discussion is not repeated here.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">However, there are particular categories of Europeans, both in renting and owning, who have to make housing payments without ready recourse to allowances. They include</span></p><span data-dcnode-id="816" instrument_node="">
</span><ul data-dcnode-id="791"><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">younger households who have chosen or been forced into independent living and have no access to social housing (e.g. Dutch youth under 25, or all Greek youth) or income related allowances (students and under-18s in Britain, or illegal immigrants in the Mediterranean area);</span></li><span data-dcnode-id="812" instrument_node="">
</span><li class="c4" data-dcnode-id="806"><span data-dcnode-id="811" instrument_node="">
</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">households, with modest incomes, who lie just above housing allowance limits but who rely on rental housing subject to policy-induced rent increases; such households have been adversely affected by recent changes in the UK and the Netherlands;</span></li><span data-dcnode-id="802" instrument_node="">
</span><li class="c4" data-dcnode-id="796"><span data-dcnode-id="801" instrument_node="">
</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
</span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">younger, and sometimes poorer, home-owners with variable interest mortgages and limited income support upon job loss, for example in Britain and Ireland.</span></li><span data-dcnode-id="792" instrument_node="">
</span></ul><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The first of these difficulties is most acute in southern Europe, and will become more acute as younger persons seek earlier independent living, related to career mobility and higher education as well as family tensions. The other two issues are most acute in northern Europe. Unfortunately no precise, comparable figures are available on the extent of these specific problems or the distribution of housing costs in relation to household types.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h4 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">2.2 Improving conditions</span></h4><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">National statistics on the quality of housing tend to be restricted to relatively simple measures of size, number of rooms and the presence or absence of 'standard amenities such as baths, showers, inside toilets and central heating. Statistics for the 15 Member States indicate that housing quality (so measured) has been improving steadily since at least the 1960s. However, they also indicate marked disparities in amenity across the Member States.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Cross-country differences in amenity are indicated for the Member States in Table 7. The figures presented are deviations from the EU country average for each indicator. For the indicators on persons per room, space per person, single family dwellings, proportion of good units and central heating positive scores record higher amenity. However, for the indicators of proportion of homes pre-1918 and per cent of units without bath or shower above average scores imply higher disamenity. An overall quality index, based on these indicators was then calculated.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">A number of conclusions can be drawn from the figures</span></p><span data-dcnode-id="775" instrument_node="">
</span><ul data-dcnode-id="761"><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">individual housing space and privacy is lower in the Cohesion States (Ireland, Portugal, Spain and Greece), Italy and Austria and most generously provided in Luxembourg, the Netherlands, Sweden and the UK;</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">single family dwellings are most prevalent in the Benelux area, Ireland and the UK and least extensive in Greece, Germany and Italy;</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">the countries with the largest proportions of pre-1919 dwellings are Finland, Sweden, Spain, Italy and the Netherlands;</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">in relation to amenities such as baths, showers and central heating, the Scandinavian countries, the UK, the Netherlands and Germany have high amenity levels; Greece stands out from the other cohesion states as also having adequate amenities.</span></li><span data-dcnode-id="762" instrument_node="">
</span></ul><span data-dcnode-id="760" instrument_node="">
</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
</span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">The overall composite indicator emphasises the high amenity/quality levels of housing stock in the Netherlands, Sweden, Denmark and the UK and the poorer quality of housing in the Cohesion States. Historic patterns of urbanisation, wartime damage and income levels all help to explain the patterns of amenity indicated in Table 7. But it is also no accident that the high performers have been those with the most active policies for housing and those with the lowest (with the recent exception of Ireland) the least.</span></p><span data-dcnode-id="753" instrument_node="">
