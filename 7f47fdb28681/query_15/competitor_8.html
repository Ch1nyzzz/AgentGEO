</span><button aria-controls="content4" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4589" data-target="#content4" data-toggle="collapse" type="button"><span data-dcnode-id="4598" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4595"><span data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4594" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4591"><span data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">More detail</span></span></span><span data-dcnode-id="4590" instrument_node=""> </span></button><span data-dcnode-id="4588" instrument_node="">
</span></div><span data-dcnode-id="4586" instrument_node="">
</span></div><span data-dcnode-id="4584" instrument_node="">
</span><div class="clearfix" data-dcnode-id="4583"></div><span data-dcnode-id="4582" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="4185" id="content4"><span data-dcnode-id="4581" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4578"><span data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">Celebrating 25&nbsp;years of the European Economic Area</span></span></h2><span data-dcnode-id="4577" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="4564"><span data-dcnode-id="4576" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="4572"><span data-dcnode-id="4575" instrument_node="">
</span><img alt="An official document with a red seal on it" data-dcnode-id="4574" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_PH20.jpg&amp;raw"><span data-dcnode-id="4573" instrument_node="">
</span></div><span data-dcnode-id="4571" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="4568"><p class="caption" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">Initialling the agreement on the European Economic Area between the European Economic Community and the European Free Trade Association, Brussels, Belgium, 14&nbsp;April 1992.</span></p></div><span data-dcnode-id="4567" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="4566"></span><span data-dcnode-id="4565" instrument_node="">
</span></div><span data-dcnode-id="4563" instrument_node="">
</span><p data-dcnode-id="4557"><span data-dcnode-id="4562" instrument_node="">After celebrating the 25th anniversary of the EU’s Single Market in 2018, the following year marked another important milestone: </span><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/60111/european-economic-area-25-years-world%25E2%2580%2599s-biggest-single-market_nl" target="_blank"><span class="hyperlink_text" data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">25 years since the creation of the European Economic Area</span></span></a><span data-dcnode-id="4558" instrument_node="">. The EEA Agreement, which was signed in 1992 and entered into force in 1994, extends the four freedoms of the Single Market and related policies to Iceland, Liechtenstein and Norway. People, goods, services and capital can now move around the EEA’s 31 countries almost as freely as within a single country. EEA citizens can study, live, shop, work and retire in any of its countries. Hundreds of technical, legal and bureaucratic barriers to free trade and free movement between these countries have been removed. This has allowed companies to expand their operations and competition has brought prices down and given consumers more choice.</span></p><span data-dcnode-id="4556" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4546"><span data-dcnode-id="4555" instrument_node="">
</span><div class="img-large" data-dcnode-id="4548"><span data-dcnode-id="4554" instrument_node="">
</span><img alt="Some of the benefits of the European Economic Area" aria-describedby="GR29" data-dcnode-id="4553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR29-EN.jpg&amp;raw"><span data-dcnode-id="4552" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4550" id="GR29"><span data-dcnode-id="4551" instrument_node="">European Union and European Economic Area citizens all benefit from participating in the Erasmus+ programme. The European Health Insurance Card gives people access to medically necessary, state-provided healthcare during a temporary stay in any European Economic Area country. In addition, with no roaming charges, they can call, text and use data in any European Economic Area country just like at home, and airline customers can claim compensation if they arrive at their destination with a delay of over 3 hours.</span></p><span data-dcnode-id="4549" instrument_node="">
</span></div><span data-dcnode-id="4547" instrument_node="">
</span></div><span data-dcnode-id="4545" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4542"><span data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Making the Single Market work better for people and businesses </span></span></h2><span data-dcnode-id="4541" instrument_node="">
</span><p data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">The EU is continuously working on strengthening and deepening the Single Market to ensure it can respond to new challenges and deliver benefits for our citizens and businesses. </span></p><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4537" instrument_node="">As part of these efforts, in June the EU agreed on </span><a data-dcnode-id="4534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/14/eu-adopts-regulation-to-keep-unsafe-products-off-the-market/" target="_blank"><span class="hyperlink_text" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">new rules</span></span></a><span data-dcnode-id="4533" instrument_node=""> to ensure better compliance with Single Market legislation on non-food products. Applicable from 2021, these rules will strengthen checks by national authorities and customs officers and improve checks on products on the EU market. They will also intensify cooperation between authorities and facilitate rapid action against illegal products.</span></p><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4525"><span data-dcnode-id="4530" instrument_node="">The EU also adopted a </span><a data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/committees/en/imco/subject-files.html%3Fid%3D20190430CDT02782" target="_blank"><span class="hyperlink_text" data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">new regulation</span></span></a><span data-dcnode-id="4526" instrument_node=""> strengthening the application of the mutual recognition principle for products not covered by EU-wide legislation. This will open up more opportunities for companies to expand across EU borders. From April 2020, companies will be able to quickly find improved information on applicable national technical rules in another Member State and use simplified procedures to demonstrate that their product meets relevant national requirements. </span></p><span data-dcnode-id="4524" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4523" instrument_node="">In addition, the </span><a data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/content/einvoicing-new-electronic-invoicing-standard-facilitates-public-procurement-contracts-europe_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">new standard</span></span></a><span data-dcnode-id="4519" instrument_node=""> on electronic invoicing, which came into force in April, will help public authorities to process all companies’ payments automatically and promptly. </span></p><span data-dcnode-id="4517" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4514"><span data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">A strong and innovative industrial base</span></span></h3><span data-dcnode-id="4513" instrument_node="">
</span><p data-dcnode-id="4503"><span data-dcnode-id="4512" instrument_node="">European industries are global leaders in many areas but they need to adapt to new challenges such as fast-developing technologies, climate change and a changing global geopolitical context. To provide a new vision for European industry, the Commission set up the </span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/industry/policy/industry-2030_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Industry 2030 High-Level Industrial Roundtable</span></span></a><span data-dcnode-id="4508" instrument_node=""> and published its </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/docsroom/documents/36468" target="_blank"><span class="hyperlink_text" data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">recommendations</span></span></a><span data-dcnode-id="4504" instrument_node=""> in June. These focus on how European industry should build its competitive advantage through cutting-edge and breakthrough technologies, respect for the environment and biodiversity, investment in people, and smart European and global alliances.</span></p><span data-dcnode-id="4502" instrument_node="">
</span><p data-dcnode-id="4492"><span data-dcnode-id="4501" instrument_node="">Europe therefore needs to build on its strengths and assets to develop its industrial base. Artificial intelligence, batteries and cybersecurity are some of the many strategic and future-oriented areas where boosting Europe’s competitive advantage can generate growth. To identify areas of strategic importance, the Commission set up the </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_6204" target="_blank"><span class="hyperlink_text" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Strategic Forum</span></span></a><span data-dcnode-id="4497" instrument_node=""> of Member States and industry representatives which, in its </span><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_6204" target="_blank"><span class="hyperlink_text" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">report</span></span></a><span data-dcnode-id="4493" instrument_node=""> published in November, identified six priority areas, provided recommendations for future policy action and coordinated transnational investments.  </span></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4485"><span data-dcnode-id="4490" instrument_node="">Strong industries also need to constantly adapt and innovate. The 2019 </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/industry/innovation/facts-figures/scoreboards_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">European Innovation Scoreboard</span></span></a><span data-dcnode-id="4486" instrument_node=""> report found that the EU continues to improve, with innovation performance up in 24 Member States. The EU’s leader in innovation was Sweden, followed by Finland, Denmark and the Netherlands. The fastest-growing innovators were Lithuania, Greece, Latvia, Malta, the United Kingdom, Estonia and the Netherlands. Importantly, the EU’s innovation performance surpassed that of the United States for the first time and has a considerable lead over Brazil, India, Russia and South Africa. </span></p><span data-dcnode-id="4484" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4474"><span data-dcnode-id="4483" instrument_node="">
</span><div class="img-large" data-dcnode-id="4476"><span data-dcnode-id="4482" instrument_node="">
</span><img alt="Six strategic areas for European industry" aria-describedby="GR30" data-dcnode-id="4481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR30-EN.jpg&amp;raw"><span data-dcnode-id="4480" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4478" id="GR30"><span data-dcnode-id="4479" instrument_node="">The six strategic areas for European industry are clean, connected and autonomous vehicles; smart health; a low carbon dioxide emissions industry; hydrogen technologies and systems; an industrial Internet of Things; and cybersecurity.</span></p><span data-dcnode-id="4477" instrument_node="">
</span></div><span data-dcnode-id="4475" instrument_node="">
</span></div><span data-dcnode-id="4473" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4463"><span data-dcnode-id="4472" instrument_node="">
</span><div class="img-large" data-dcnode-id="4465"><span data-dcnode-id="4471" instrument_node="">
</span><img alt="Map ranking European Union Member States by their innovation performance in 2019" aria-describedby="GR31" data-dcnode-id="4470" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR31-EN.jpg&amp;raw"><span data-dcnode-id="4469" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4467" id="GR31"><span data-dcnode-id="4468" instrument_node="">The European Innovation Scoreboard for 2019 shows Denmark, the Netherlands, Finland and Sweden as innovation leaders in Europe, while Belgium, Germany, Ireland, France, Luxembourg, Austria, Slovenia and the United Kingdom are ranked as strong innovators.

										Czechia, Estonia, Greece, Croatia, Italy, Cyprus, Latvia, Lithuania, Hungary, Malta, Poland, Portugal and Slovakia are moderate innovators, and Bulgaria and Romania classify as modest innovators.

										Source:. European Commission</span></p><span data-dcnode-id="4466" instrument_node="">
</span></div><span data-dcnode-id="4464" instrument_node="">
</span></div><span data-dcnode-id="4462" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4459"><span data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Ensuring a level playing field in the Single Market</span></span></h2><span data-dcnode-id="4458" instrument_node="">
</span><p data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">EU competition policy aims to support growth, investment and job creation by protecting consumers and law-abiding companies from anti-competitive and illegal business behaviour. As companies vie with each other to offer lower prices and a wider choice of innovative products, consumers are better off and Europe’s economy grows stronger, more competitive and more attractive to investors.</span></p><span data-dcnode-id="4455" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">In 2019, the Commission took 362 merger decisions, 10 antitrust decisions, five cartel decisions and 248 State aid decisions. In total, it imposed fines of over €4&nbsp;billion on companies found to be in breach of EU competition rules and ordered Member States to recover at least €65&nbsp;million in unlawful and incompatible aid from beneficiaries. </span></p><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4430"><span data-dcnode-id="4451" instrument_node="">The Commission uses merger control to ensure the Single Market delivers its potential by preventing risks to competition. The majority of mergers submitted to the Commission are cleared. So far, only 10 have been prohibited, three of which in 2019. These include </span><a data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_881" target="_blank"><span class="hyperlink_text" data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Siemens’ acquisition of Alstom</span></span></a><span data-dcnode-id="4447" instrument_node=""> in the rail industry and </span><a data-dcnode-id="4444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_883" target="_blank"><span class="hyperlink_text" data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Wieland’s acquisition of Aurubis Rolled Products and Schwermetall</span></span></a><span data-dcnode-id="4443" instrument_node="">, both in February, and the joint venture between steel giants </span><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2948" target="_blank"><span class="hyperlink_text" data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">Tata Steel and ThyssenKrupp</span></span></a><span data-dcnode-id="4439" instrument_node=""> in June. In these cases, the companies failed to propose remedies to protect consumers and companies from possible risks. In other high-profile cases, such as </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_18_5083" target="_blank"><span class="hyperlink_text" data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">Praxair/Linde</span></span></a><span data-dcnode-id="4435" instrument_node=""> and </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4030" target="_blank"><span class="hyperlink_text" data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">GSK/Pfizer</span></span></a><span data-dcnode-id="4431" instrument_node="">, the merging parties offered suitable remedies and the Commission was then able to clear the transactions.</span></p><span data-dcnode-id="4429" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4419"><span data-dcnode-id="4428" instrument_node="">
</span><div class="img-large" data-dcnode-id="4421"><span data-dcnode-id="4427" instrument_node="">
</span><img alt="Graphic explaining the Commission decision on the Siemens‒Alstom merger" aria-describedby="GR32" data-dcnode-id="4426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR32-EN.jpg&amp;raw"><span data-dcnode-id="4425" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4423" id="GR32"><span data-dcnode-id="4424" instrument_node="">The Commission has prohibited the Siemens‒Alstom merger to protect rail operators and passengers. Rail-signalling systems are essential to prevent collisions and keep train and metro passengers safe, and high-speed trains are important for the transition to environmentally sustainable transport. If combined, Siemens and Alstom would no longer compete, resulting in higher prices, less choice and less innovation for rail operators.</span></p><span data-dcnode-id="4422" instrument_node="">
</span></div><span data-dcnode-id="4420" instrument_node="">
</span></div><span data-dcnode-id="4418" instrument_node="">
</span><p data-dcnode-id="4396"><span data-dcnode-id="4417" instrument_node="">The Commission also acts against companies that attempt to gain an unfair competitive edge. In January, </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_582" target="_blank"><span class="hyperlink_text" data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">Mastercard</span></span></a><span data-dcnode-id="4413" instrument_node=""> was fined €570&nbsp;million for imposing cross-border restrictions in the use of payment cards. In May, </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2488" target="_blank"><span class="hyperlink_text" data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">AB InBev</span></span></a><span data-dcnode-id="4409" instrument_node="">, the world’s largest beer brewer, was fined €200&nbsp;million for abusing its dominant position on the Belgian beer market. Other companies that the Commission fined were restricting cross-border sales of the </span><a data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1828" target="_blank"><span class="hyperlink_text" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">merchandising products</span></span></a><span data-dcnode-id="4405" instrument_node=""> of some of Europe’s best-known football clubs and of </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-19-3950_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">products featuring Hello Kitty owned by Sanrio</span></span></a><span data-dcnode-id="4401" instrument_node="">. In cases involving several major </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_11_257" target="_blank"><span class="hyperlink_text" data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">Hollywood film studios</span></span></a><span data-dcnode-id="4397" instrument_node="">, these pledged to remove restrictions that prevented cross-border competition between pay-TV broadcasters and offered commitments that the Commission made legally binding in March.</span></p><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4394" instrument_node="">The Commission continued to break up cartels and impose heavy fines on the companies involved. In March, it </span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-19-1512_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">sanctioned three companies</span></span></a><span data-dcnode-id="4390" instrument_node=""> supplying seatbelts and other safety equipment to Europe’s car manufacturers by imposing fines of €368&nbsp;million and, 2&nbsp;months later, five major banks – Barclays, RBS, Citigroup, JPMorgan and MUFG – </span><a data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2568" target="_blank"><span class="hyperlink_text" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">settled for over €1&nbsp;billion</span></span></a><span data-dcnode-id="4386" instrument_node=""> for participating in a foreign-exchange spot-trading cartel. </span></p><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4378"><span data-dcnode-id="4383" instrument_node="">In addition, the Commission makes sure Member States’ support to companies does not unfairly favour some companies over others. In April, the Commission took a </span><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1948" target="_blank"><span class="hyperlink_text" data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">State aid decision</span></span></a><span data-dcnode-id="4379" instrument_node=""> ordering the United Kingdom to recover the selective tax advantages that authorities granted to multinational companies resulting from waivers to provisions designed to fight corporate tax avoidance.</span></p><span data-dcnode-id="4377" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4367"><span data-dcnode-id="4376" instrument_node="">
</span><div class="img-large" data-dcnode-id="4369"><span data-dcnode-id="4375" instrument_node="">
</span><img alt="Graphic explaining the Commission findings on part of the United Kingdom’s tax scheme" aria-describedby="GR34" data-dcnode-id="4374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR34-EN.jpg&amp;raw"><span data-dcnode-id="4373" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4371" id="GR34"><span data-dcnode-id="4372" instrument_node="">A multinational ‘X’ based in the United Kingdom transferred capital to one of its offshore subsidiaries, which in turn made a loan to a foreign group company of the same multinational ‘X’. The interest generated by the loan in favour of the offshore subsidiary was not taxable by the United Kingdom tax administration by virtue of the group financing exemption, thus creating an illegal tax advantage.</span></p><span data-dcnode-id="4370" instrument_node="">
</span></div><span data-dcnode-id="4368" instrument_node="">
</span></div><span data-dcnode-id="4366" instrument_node="">
</span><p data-dcnode-id="4356"><span data-dcnode-id="4365" instrument_node="">Competition policy can also help the EU pursue a modern industrial policy, as shown by the €3.2&nbsp;billion in public support offered by seven Member States and approved by the Commission for an Important Project of Common European Interest (IPCEI) for </span><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/ip_19_6705" target="_blank"><span class="hyperlink_text" data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">research and innovation in battery production</span></span></a><span data-dcnode-id="4361" instrument_node="">. This is the second major IPCEI investment approved after the €1.7&nbsp;billion </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_18_6862" target="_blank"><span class="hyperlink_text" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">microelectronics one</span></span></a><span data-dcnode-id="4357" instrument_node=""> involving Germany, France, Italy and the United Kingdom and cleared in December 2018.</span></p><span data-dcnode-id="4355" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4352"><span data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">Removing barriers to the free movement of goods and services </span></span></h2><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">The EU worked on strengthening rules in specific sectors to make it easier for businesses to sell their goods and services across borders and improve the safety of products on the EU market. </span></p><span data-dcnode-id="4348" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4345"><span data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Improving rules in the chemicals and pharmaceutical sectors</span></span></h3><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4334"><span data-dcnode-id="4343" instrument_node="">In June, the Commission also published a </span><a data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/environment/efe/news/fit-purpose-eu-chemical-legislation-framework-2019-08-29_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">review</span></span></a><span data-dcnode-id="4339" instrument_node=""> of the EU chemicals legislation. It found that harmonisation and common standards have made the single market for chemicals stronger and more efficient, while offering the world’s highest levels of protection for human health and the environment. The EU also took a series of measures to protect workers and consumers from harmful chemicals, including 29 REACH authorisation decisions setting conditions for the use of certain chemicals, one refusal of authorisation and one restriction on thulium-doped fibre amplifier, a substance causing respiratory problems when used in sprays. In addition, the carcinogens and mutagens directive was updated with the </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/STATEMENT_19_683" target="_blank"><span class="hyperlink_text" data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">addition of five substances</span></span></a><span data-dcnode-id="4335" instrument_node=""> to the list of recognised cancer-causing chemicals in the workplace. This means that 27 such chemicals are now covered by the directive. </span></p><span data-dcnode-id="4333" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4332" instrument_node="">The EU also adopted </span><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/content/pharmaceuticals-eu-refines-intellectual-property-rules_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">new rules</span></span></a><span data-dcnode-id="4328" instrument_node=""> to improve the level playing field in the pharmaceutical sector. These will make it easier for EU companies to export generic and biosimilar medicines to non-EU countries where intellectual property protection has expired or never existed, while preserving the strong existing rights within the EU to encourage innovation and research. </span></p><span data-dcnode-id="4326" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4323"><span data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">A Single Market for public procurement</span></span></h3><span data-dcnode-id="4322" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4321" instrument_node="">The EU has an open procurement market, which is the biggest in the world at an estimated €2&nbsp;trillion per year. Given the increasingly global nature of public procurement, the EU is taking a strategic approach to ensure all bidders, domestic and foreign, comply with EU rules. To this end, in July the Commission published </span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/content/new-guidance-participation-third-country-bidders-eu-procurement-market_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">guidance</span></span></a><span data-dcnode-id="4317" instrument_node=""> on the participation of foreign bidders in the EU market.  </span></p><span data-dcnode-id="4315" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4312"><span data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Better financial services</span></span></h3><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4305"><span data-dcnode-id="4310" instrument_node="">As part of the efforts to create a deeper and more integrated Capital Markets Union in Europe, the EU </span><a data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_MEMO-19-1170_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">adopted a revised regulation on cross-border payments</span></span></a><span data-dcnode-id="4306" instrument_node="">, ensuring that charges for cross-border payments in euro within the Union are aligned with charges for corresponding national payments made in the currency of the Member State in which the payment service provider of the payment service user is located. This allows consumers and businesses in non-euro countries to benefit from low-cost euro transactions across borders, just like in the euro area. As a result, for example, the price of an intra-EU transaction in euro from Bulgaria to Finland is expected to decrease, from between €15 and €24 to about €1. The regulation will ensure that currency-conversion charges are transparent and comparable at an ATM or point of sale, allowing consumers to save money on conversion costs when they travel or shop abroad. In addition, the EU stepped up its efforts to support the development and availability of cross-border instant payments. </span></p><span data-dcnode-id="4304" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4294"><span data-dcnode-id="4303" instrument_node="">
</span><div class="img-large" data-dcnode-id="4296"><span data-dcnode-id="4302" instrument_node="">
</span><img alt="Graphic showing the changed situation for the cost of euro transfers within and between the euro and non-euro areas" aria-describedby="GR35" data-dcnode-id="4301" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR35-EN.jpg&amp;raw"><span data-dcnode-id="4300" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4298" id="GR35"><span data-dcnode-id="4299" instrument_node="">Before 15 December 2019, sending money from a euro-area country to a non-euro-area country incurred zero or low fees for the sender and high fees for the receiver. Sending money from a non-euro-area country to either a non-euro-area country or a euro-area country also incurred high fees. Only transfers within the euro area incurred low or zero fees for both sides. Since 15 December 2019, all transfers in euro, either within or between the euro and the non-euro areas, incur zero or low fees.</span></p><span data-dcnode-id="4297" instrument_node="">
</span></div><span data-dcnode-id="4295" instrument_node="">
</span></div><span data-dcnode-id="4293" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4290"><span data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Ensuring a fair tax system</span></span></h3><span data-dcnode-id="4289" instrument_node="">
</span><p data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">EU tax policy aims to support the competitiveness of the EU and stimulate investment, growth and entrepreneurship in its Single Market. By making tax systems simpler, it should be easier for businesses to operate and citizens to work across borders. Moreover, the EU aims at taxes that are fair and socially just, notably by fighting tax abuse at EU and international levels and by curtailing unfair tax competition in the Single Market and beyond. </span></p><span data-dcnode-id="4286" instrument_node="">
</span><p data-dcnode-id="4276"><span data-dcnode-id="4285" instrument_node="">In order to fight tax fraud and facilitate administrative cooperation for EU and national revenue collection, in May the Commission launched the </span><a data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2468" target="_blank"><span class="hyperlink_text" data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Transaction Network Analysis tool</span></span></a><span data-dcnode-id="4281" instrument_node="">, which provides the EU’s network of anti-fraud experts with fast and easy access to information on cross-border transactions, leading to quick and coordinated action when potential VAT fraud is flagged. In September, the first meeting took place of the </span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/taxation_customs/news/tadeus-%25E2%2580%2593-tax-administration-eu-summit_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Tax Administration EU Summit</span></span></a><span data-dcnode-id="4277" instrument_node="">, which is a cooperation network for the Member States’ heads of tax administrations and the Commission. </span></p><span data-dcnode-id="4275" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4274" instrument_node="">To tackle VAT fraud related to new and second-hand cars, in July the Commission adopted implementing measures supporting the automated exchange of customs and vehicle-registration information between national authorities. The EU list of non-cooperative jurisdictions for tax purposes, a common tool for Member States to tackle external risks of tax abuse and unfair tax competition, was adopted in March. In September, the Commission published evaluations of two directives: on </span><a data-dcnode-id="4271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/taxation_customs/business/tax-cooperation-control/administrative-cooperation/enhanced-administrative-cooperation-field-direct-taxation_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">administrative cooperation in the field of taxation</span></span></a><span data-dcnode-id="4270" instrument_node=""> and on </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/taxation_customs/news/commission-report-evaluation-energy-taxation-directive%25C2%25A0_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">energy taxation</span></span></a><span data-dcnode-id="4266" instrument_node="">.</span></p><span data-dcnode-id="4264" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4261"><span data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">Towards fair labour mobility </span></span></h2><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4254"><span data-dcnode-id="4259" instrument_node="">The EU is working to strengthen labour mobility by establishing clear and fair rules, facilitating cooperation between Member States and fighting causes of abuse. As part of this, the </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_MEMO-19-852_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">European Labour Authority</span></span></a><span data-dcnode-id="4255" instrument_node=""> was set up in July, with its first activities kicking off in October. Its role is to help enforce labour-mobility rules across Member States. It will do this by facilitating the provision of information to citizens and businesses about their rights and obligations regarding opportunities to live, work or operate in another country, strengthening cooperation between Member State authorities and mediating solutions in cross-border disputes. The authority will be based in Bratislava, Slovakia, and is expected to reach full operational capacity by 2024. </span></p><span data-dcnode-id="4253" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4243"><span data-dcnode-id="4252" instrument_node="">
</span><div class="img-large" data-dcnode-id="4245"><span data-dcnode-id="4251" instrument_node="">
</span><img alt="A summary of the European Labour Authority’s role" aria-describedby="GR36" data-dcnode-id="4250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR36-EN.jpg&amp;raw"><span data-dcnode-id="4249" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4247" id="GR36"><span data-dcnode-id="4248" instrument_node="">The European Labour Authority will enforce European Union labour mobility rules in a fair, simple and effective way. 

										It aims to overcome barriers to labour mobility such as poor support for individuals and businesses, diﬃculties for national authorities in coordinating across borders, lack of regular joint cross-border enforcement activities, and lack of mediation between Member States in cross-border disputes.

										It will also boost labour mobility by providing easier access to information on rights and obligations in the area of cross-border mobility, by strengthening the coordination between Member States in cross-border enforcement of European Union law, by enriching cooperation between Member States in dealing with undeclared work, and by assisting Member State authorities in resolving cross-border disputes.

										Source: Council of the European Union.

										Copyright: European Union</span></p><span data-dcnode-id="4246" instrument_node="">
</span></div><span data-dcnode-id="4244" instrument_node="">
</span></div><span data-dcnode-id="4242" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4239"><span data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Making progress on safe, clean and connected mobility</span></span></h2><span data-dcnode-id="4238" instrument_node="">
</span><p data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Mobility plays a big role in connecting and integrating the Single Market. The EU is working to modernise Europe’s transport systems, which will allow people to benefit from safer traffic, cleaner vehicles and better technological solutions and will support the transport industry’s competitiveness. </span></p><span data-dcnode-id="4235" instrument_node="">
</span><p data-dcnode-id="4229"><span data-dcnode-id="4234" instrument_node="">In March, the Parliament and the Council reached an </span><a data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1793" target="_blank"><span class="hyperlink_text" data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">agreement</span></span></a><span data-dcnode-id="4230" instrument_node=""> on the revised general safety regulation, which aims to introduce new mandatory safety technologies in all vehicles sold, registered or put into service from 2022. This will improve the protection of EU citizens, help reduce the number of accidents on roads and improve the legal framework for approving automated and connected vehicles. In February, the Commission also prepared guidelines for the approval of automated vehicles and, in June, launched an EU platform to coordinate experiments involving automated and connected vehicles.</span></p><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Earlier in the year, the EU also delivered measures to ensure assessments of infrastructure safety for primary roads, help better target investments and pave the way for autonomous driving across the EU. The Commission also adopted new harmonised rules on drone traffic to cope with the increasing numbers across Europe.</span></p><span data-dcnode-id="4225" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4215"><span data-dcnode-id="4224" instrument_node="">
</span><div class="img-large" data-dcnode-id="4217"><span data-dcnode-id="4223" instrument_node="">
</span><img alt="Graphic showing how e-documentation for transport will save time" aria-describedby="GR37" data-dcnode-id="4222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH04_GR37-EN.jpg&amp;raw"><span data-dcnode-id="4221" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4219" id="GR37"><span data-dcnode-id="4220" instrument_node="">Using the new e-documentation for the handling of goods in Europe will help save a lot of time for all the actors involved.

										Currently, about 390 million working hours per year are spent on processing freight transport information. In the future, the digital exchange of this information will save the business sector between 75 million hours and 102 million hours of work.

										Source: European Commission</span></p><span data-dcnode-id="4218" instrument_node="">
</span></div><span data-dcnode-id="4216" instrument_node="">
</span></div><span data-dcnode-id="4214" instrument_node="">
</span><p data-dcnode-id="4208"><span data-dcnode-id="4213" instrument_node="">Several measures were also adopted to ease the administrative burden across the transport sector. In June, the </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.era.europa.eu/" target="_blank"><span class="hyperlink_text" data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">European Union Agency for Railways</span></span></a><span data-dcnode-id="4209" instrument_node=""> delivered the first European vehicle authorisation, valid in multiple countries across the continent. An agreement was also reached on a proposal for electronic freight transport information, which will help save the millions of hours previously spent on managing paper documents.</span></p><span data-dcnode-id="4207" instrument_node="">
</span><p data-dcnode-id="4201"><span data-dcnode-id="4206" instrument_node="">To improve the interoperability of transport systems, in May the Commission adopted a </span><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/transport/modes/rail/news/2019-05-16-single-european-railway-area_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">set of measures</span></span></a><span data-dcnode-id="4202" instrument_node=""> addressing rail interoperability, train accessibility and rail noise. The electronic tolling systems directive entered into force and will enhance interoperability of electronic tolls, simplify administrative procedures and reduce fraud.</span></p><span data-dcnode-id="4200" instrument_node="">
</span><div data-dcnode-id="4187"><span data-dcnode-id="4199" instrument_node="">
</span><button aria-controls="content4" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4189" data-target="#content4" data-toggle="collapse" type="button"><span data-dcnode-id="4198" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4195"><span data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4194" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4191"><span data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">More detail</span></span></span><span data-dcnode-id="4190" instrument_node=""> </span></button><span data-dcnode-id="4188" instrument_node="">
</span></div><span data-dcnode-id="4186" instrument_node="">
</span></div><span data-dcnode-id="4184" instrument_node="">
</span><span data-dcnode-id="4182" instrument_node="">
</span><div class="general-report" data-dcnode-id="4133" id="chapter5"><span data-dcnode-id="4181" instrument_node="">
</span><p class="chap_number" data-dcnode-id="4178"><span data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">Chapter 5</span></span></p><span data-dcnode-id="4177" instrument_node="">
</span><h1 data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">A deeper and fairer Economic and Monetary Union</span></h1><span data-dcnode-id="4174" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="4167"><span data-dcnode-id="4173" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="4169"><span data-dcnode-id="4172" instrument_node="">
</span><img alt="Image: Close-up of the new €100 and €200 banknotes featuring additional security features that complete the second series of euro banknotes – the Europa series. (© European Union)" class="height_width_100pct" data-dcnode-id="4171" id="PC05-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH05.jpg&amp;raw"><span data-dcnode-id="4170" instrument_node="">
</span></div><span data-dcnode-id="4168" instrument_node="">
</span></div><span data-dcnode-id="4166" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">The EU sees a deeper Economic and Monetary Union (EMU) as being a priority because it is a powerful tool to achieve more jobs, stronger growth, higher investment and greater social fairness, as well as enhanced macroeconomic stability and resilience. </span></p><span data-dcnode-id="4163" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">In June, Member States reached a broad agreement on a number of important steps, including the creation of a budgetary instrument for convergence and competitiveness for the euro area. </span></p><span data-dcnode-id="4160" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">A proposed revision of the European Stability Mechanism treaty would allow the rescue fund to provide a financial backstop to the Single Resolution Fund, which deals with failing banks. </span></p><span data-dcnode-id="4157" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">New legislation in April to reduce risks in the banking sector will help strengthen the Banking Union. Plans to create a common deposit insurance scheme for euro-area banks also continued and the Commission acted to ensure fair competition in the sector.  </span></p><span data-dcnode-id="4154" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">The European Pillar of Social Rights helped put an emphasis on fairness in the EMU, with legislation to improve working conditions adopted in June and a new law to promote work–life balance and gender-balanced parental leave coming into force in August. </span></p><span data-dcnode-id="4151" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">The EU also took action to increase access to social protection systems and encourage entrepreneurship.</span></p><span data-dcnode-id="4148" instrument_node="">
</span><div data-dcnode-id="4135"><span data-dcnode-id="4147" instrument_node="">
</span><button aria-controls="content5" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4137" data-target="#content5" data-toggle="collapse" type="button"><span data-dcnode-id="4146" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4143"><span data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4142" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4139"><span data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">More detail</span></span></span><span data-dcnode-id="4138" instrument_node=""> </span></button><span data-dcnode-id="4136" instrument_node="">
</span></div><span data-dcnode-id="4134" instrument_node="">
</span></div><span data-dcnode-id="4132" instrument_node="">
</span><div class="clearfix" data-dcnode-id="4131"></div><span data-dcnode-id="4130" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="3883" id="content5"><span data-dcnode-id="4129" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4126"><span data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Deepening the Economic and Monetary Union</span></span></h2><span data-dcnode-id="4125" instrument_node="">
</span><p data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">A deeper Economic and Monetary Union (EMU) is a priority for the EU because it would strengthen its economic stability, resilience and potential for growth.</span></p><span data-dcnode-id="4122" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4121" instrument_node="">In June, euro-area Member States took another step towards achieving this goal by agreeing on the main features of a budgetary instrument for the area. Known as the </span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4372" target="_blank"><span class="hyperlink_text" data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Budgetary Instrument for Convergence and Competitiveness</span></span></a><span data-dcnode-id="4117" instrument_node="">, it is intended to support structural reforms and investment with the aim of boosting growth and enhancing the economic resilience of euro-area economies as well as their ability to rebound from shocks. In October, further decisions were taken on details of how the instrument will work. An agreement on its size will be made in the context of discussions over the EU’s next long-term budget.</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Euro-area Member States also agreed to allow the European Stability Mechanism to provide a financial backstop that would only be activated as last-resort insurance in the event of a bank resolution. It would take the form of a credit line or guarantees to the Single Resolution Fund so that taxpayers would not be forced to pay for the resolution of failing banks. Use of the backstop would ultimately be repaid through contributions from the European banking sector. </span></p><span data-dcnode-id="4112" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4102"><span data-dcnode-id="4111" instrument_node="">
</span><div class="img-large" data-dcnode-id="4104"><span data-dcnode-id="4110" instrument_node="">
</span><img alt="A summary of initiatives aiming to strengthen the international role of the euro" aria-describedby="GR38" data-dcnode-id="4109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_GR38-EN.jpg&amp;raw"><span data-dcnode-id="4108" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4106" id="GR38"><span data-dcnode-id="4107" instrument_node="">The initiatives to strengthen the international role of the euro can be divided into four different areas.

										The first is the completion of the Economic and Monetary Union, the Banking Union and the Capital Markets Union.

										The second area comprises measures to foster a deep European ﬁnancial sector, such as strengthening the liquidity and resilience of European market infrastructure; ensuring a reliable framework for a trustworthy interest rate benchmark; supporting a fully integrated instant-payment system in the European Union; and launching a consultation about euro liquidity in foreign-exchange markets.

										The third area covers initiatives linked to the international ﬁnancial sector, such as supporting central banks’ collaboration to safeguard global ﬁnancial stability; increasing the share of euro-denominated debt by European bodies; fostering economic diplomacy to promote the use of the euro in payments and as a reserve currency; and providing technical support to improve the access of developing countries to the euro payment system.

										The fourth promotes the use of the euro in key strategic sectors such as energy, with recommendations to promote a wider use of the euro in international energy agreements and transactions, and consultations on expanding the use of euro-denominated transactions in oil, reﬁned products and gas. It also includes consultations on increasing the use of the euro in raw materials and food commodity trading and on expanding the use of the euro by transport-sector manufacturers (aircraft, maritime and railways).

										Source: European Commission

										Copyright: European Union</span></p><span data-dcnode-id="4105" instrument_node="">
</span></div><span data-dcnode-id="4103" instrument_node="">
</span></div><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4087"><span data-dcnode-id="4100" instrument_node="">The European Union has made great progress in deepening the EMU since the 2008 financial crisis. A </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2934" target="_blank"><span class="hyperlink_text" data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">communication</span></span></a><span data-dcnode-id="4096" instrument_node=""> from the Commission in June took stock of how far the EU has come since first setting out its vision for a deeper EMU in the 2015 </span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/five-presidents-report-completing-europes-economic-and-monetary-union_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">five presidents’ report</span></span></a><span data-dcnode-id="4092" instrument_node="">. According to the communication, particular progress has been made in the economic governance framework and in the application of fiscal rules, which have been improved, with a greater emphasis on social priorities such as more opportunities for social partners at all levels to discuss them. In addition, the </span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/economic-and-fiscal-policy-coordination/european-fiscal-board-efb_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">European Fiscal Board</span></span></a><span data-dcnode-id="4088" instrument_node=""> (established in 2015) has become an integral part of the EU fiscal framework, providing independent assessments and advice to the Commission. </span></p><span data-dcnode-id="4086" instrument_node="">
</span><p data-dcnode-id="4068"><span data-dcnode-id="4085" instrument_node="">The key elements of a </span><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/files/190612-banking-union-factsheet_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Banking Union</span></span></a><span data-dcnode-id="4081" instrument_node=""> and a </span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/files/190612-cmu-factsheet_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">Capital Markets Union</span></span></a><span data-dcnode-id="4077" instrument_node=""> (CMU), such as the </span><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/14/banking-union-council-adopts-measures-to-reduce-risk-in-the-banking-system/" target="_blank"><span class="hyperlink_text" data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">banking package</span></span></a><span data-dcnode-id="4073" instrument_node=""> to strengthen the resilience and resolvability of EU banks and a proposal for a </span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/banking-and-finance/banking-union/european-deposit-insurance-scheme_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">European Deposit Insurance Scheme</span></span></a><span data-dcnode-id="4069" instrument_node="">, have also been firmly established. The Commission has tabled all the legislative proposals set out in the CMU Action Plan and mid-term review to put in place the key building blocks of the CMU. The Commission has proposed six legislative measures to introduce new EU-wide rules for products, labels and passports, and five legislative measures to provide simpler, clearer and more proportionate rules for entrepreneurs, businesses and financial institutions (see Chapter&nbsp;1). </span></p><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">It has also proposed two legislative measures to ensure a more integrated and more efficient supervision of capital markets, which is central to the CMU and necessary for more financial integration and more private risk sharing. The Commission has also adopted three legislative proposals to enable the financial sector to lead the way towards a climate-neutral, more resource-efficient and more resilient circular economy.</span></p><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">The European Parliament and the Council have reached political agreement on almost all of these proposals; still, more needs to be done. The Commission’s June report called for further improvements to the transparency and effectiveness of the EU’s policy coordination framework and its social dimension. Institutional changes could also be made to strengthen democratic accountability in the EU and economic decision-making in the euro area, and to bring the European Stability Mechanism into the EU legal framework. Mechanisms to stabilise the euro area in the event of shocks would also be beneficial and could include an Investment Stabilisation Function and a common unemployment reinsurance scheme. </span></p><span data-dcnode-id="4061" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4058"><span data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Completing the Banking Union</span></span></h2><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">The EU’s banking and capital markets are vital elements of its EMU. Together, they promote a more integrated and stable EU financial system. They increase the resilience of the EMU against adverse shocks by facilitating private risk sharing across borders at the same time as reducing the need for public risk sharing. Work on both projects continued throughout the year. </span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">In particular, significant progress was made in lowering risks in the Banking Union. The adoption of the banking package in April was an important milestone in strengthening the EU’s banking sector. The package sets out a comprehensive set of reforms that will further strengthen the resilience and the resolvability of banks, in addition to the proposal for a European Deposit Insurance Scheme. It also puts in place a series of important international standards and aims to contribute to the completion of the post-crisis regulatory agenda.  </span></p><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">The Commission has been working together with Member States concerned to address the high level of non-performing loans (NPLs), including through the European Semester, and to come up with comprehensive solutions to deal with bad loans, in line with State-aid rules. Member States’ supervisors and banks have also made considerable progress in bringing down their debt levels, improving the quality of their loan portfolios and increasing liquidity since the crisis.</span></p><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4047" instrument_node="">The Commission’s </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/190612-non-performing-loans-progress-report_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">latest progress report</span></span></a><span data-dcnode-id="4043" instrument_node=""> showed that the ratio of NPLs for all EU banks continued to decline towards pre-crisis levels and was down to 3.3&nbsp;% in the third quarter of 2018. In 2019, the European Parliament and the Council agreed on new rules to apply capital requirements to banks with NPLs on their balance sheets. The aim of the reform is to ensure that banks set aside sufficient own resources when new loans become non-performing and to create appropriate incentives to avoid the accumulation of NPLs.</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">An important next step in the Banking Union and in deepening the EMU will be to make progress on a common deposit insurance scheme for the euro area. </span></p><span data-dcnode-id="4038" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4035"><span data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">The international role of the euro</span></span></h3><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">The EU’s efforts to promote the use of the euro internationally are closely linked to the deepening of the EMU. A deeper, stronger financial sector and EMU would make the euro a more attractive international currency, and a more globally important euro would strengthen Europe’s financial system. The euro area is also growing within the EU as Croatia and Bulgaria decided to start preparations to enter the European Exchange Rate Mechanism ERM II, as a first step to membership of the euro area.</span></p><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Greater international use of the euro would also have many benefits for European businesses, consumers and governments, such as lower trading costs, lower interest rates, better access to financing, greater legal autonomy and a more resilient financial system that would be less vulnerable to exchange-rate shocks.</span></p><span data-dcnode-id="4028" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="4015"><span data-dcnode-id="4027" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="4023"><span data-dcnode-id="4026" instrument_node="">
</span><img alt="Balloons with European Union flags and the euro sign being released in celebration" data-dcnode-id="4025" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_PH22.jpg&amp;raw"><span data-dcnode-id="4024" instrument_node="">
</span></div><span data-dcnode-id="4022" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="4019"><p class="caption" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">The European Union celebrates #EUROat20 in 2019. Here, balloons are released in front of the European Council following a ceremony to mark the original setting of exchange rates between the euro and the currencies of euro-area Member States, Brussels, Belgium, 31&nbsp;December 1998.</span></p></div><span data-dcnode-id="4018" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="4017"></span><span data-dcnode-id="4016" instrument_node="">
</span></div><span data-dcnode-id="4014" instrument_node="">
</span><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">In 2019, the European Commission consulted extensively with representatives of foreign exchange markets and the energy, raw materials, agriculture and transport sectors. These consultations confirmed that there is broad support for using the euro more internationally and that it is the only viable alternative international currency to the US dollar. Those consulted also agreed that there was potential to denominate more transactions in euro, particularly in energy commodity and natural gas markets, and the Commission agreed to work on any impediments that were identified. </span></p><span data-dcnode-id="4011" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4001"><span data-dcnode-id="4010" instrument_node="">
</span><div class="img-large" data-dcnode-id="4003"><span data-dcnode-id="4009" instrument_node="">
</span><img alt="Graphic showing the use of the euro globally" aria-describedby="GR39" data-dcnode-id="4008" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_GR39-EN.jpg&amp;raw"><span data-dcnode-id="4007" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4005" id="GR39"><span data-dcnode-id="4006" instrument_node="">The euro offers many benefits to the economy, bringing a strong track record of price stability and a predictable business environment. It is also the second-most-used currency in the world, with 60 countries and territories outside the EU (totalling 175 million people) whose currency is directly or indirectly pegged to the euro.

								Source: European Commission</span></p><span data-dcnode-id="4004" instrument_node="">
</span></div><span data-dcnode-id="4002" instrument_node="">
</span></div><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">The EU also made progress on measures to support the euro’s use, including regulatory amendments to increase the resilience and liquidity of financial market infrastructures, improve the reliability of interest-rate benchmarks and promote the use of instant payments. </span></p><span data-dcnode-id="3997" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3994"><span data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Fair opportunities and fair competition</span></span></h2><span data-dcnode-id="3993" instrument_node="">
</span><p data-dcnode-id="3987"><span data-dcnode-id="3992" instrument_node="">A deep and fair EMU rests on fair opportunities and fair competition. In order to improve the former, the </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/06/giving-entrepreneurs-a-second-chance-new-rules-on-business-insolvency-adopted/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">restructuring and second chance directive</span></span></a><span data-dcnode-id="3988" instrument_node=""> was adopted by the EU in June to allow viable businesses in distress to be rescued and honest but bankrupt individuals to be given a second chance.</span></p><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">The new directive will help viable companies with financial difficulties to access preventive restructuring frameworks at an early stage so that they can avoid insolvency, continue their activity and preserve jobs. </span></p><span data-dcnode-id="3983" instrument_node="">
</span><p data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">Under the new rules, the EU is giving reputable bankrupt entrepreneurs a second chance, fully discharging them of their debt after a maximum period of 3&nbsp;years, with justified exemptions in order to prevent abuse. </span></p><span data-dcnode-id="3980" instrument_node="">
</span><p data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">The rules will also increase the efficiency of insolvency, restructuring and discharge procedures, reducing excessive procedural length and costs in many Member States. </span></p><span data-dcnode-id="3977" instrument_node="">
</span><p data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">These rules will contribute to removing important barriers to the development of capital markets by providing more legal certainty to cross-border investors and companies operating across the EU. </span></p><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">The EU is always vigilant in ensuring the fairness of competition in the banking sector and 2019 was no exception. Although the sector has largely recovered since the crisis, pockets of vulnerability remain, with banks in some Member States still burdened by a high proportion of NPLs. The Commission continued its role in helping them to restructure and deal with temporary liquidity constraints or structural problems without unduly distorting competition. For example, Slovenia’s banks completed the restructuring process that they had begun in 2012/2013. Slovenia privatised 75&nbsp;% of NLB and 100&nbsp;% of Abanka – two former lenders in difficulty. Italian banks took further steps to reduce the amount of NPLs. The implementation of a guarantee mechanism was instrumental in this regard in allowing banks to off-load NPLs on market terms. Also in Italy, the Commission approved support to deal with the temporary liquidity needs of up to €3&nbsp;billion for Carige, a medium-sized regional bank in the north-west of the country. </span></p><span data-dcnode-id="3971" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3961"><span data-dcnode-id="3970" instrument_node="">
</span><div class="img-large" data-dcnode-id="3963"><span data-dcnode-id="3969" instrument_node="">
</span><img alt="An explanation of non-performing loans and their negative impact" aria-describedby="GR40" data-dcnode-id="3968" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_GR40-EN.jpg&amp;raw"><span data-dcnode-id="3967" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3965" id="GR40"><span data-dcnode-id="3966" instrument_node="">What are they? A loan is classified as non-performing when a borrower has not made scheduled payments on interest or capital reimbursements for 90 days or more past the due date, or is still repaying the loan but with a low likelihood of success. Why do we need to tackle them? To reduce risks to banks’ stability and the financial system as a whole, to enable banks to lend more to households and businesses, and to encourage economic growth by making funding available to viable companies.</span></p><span data-dcnode-id="3964" instrument_node="">
</span></div><span data-dcnode-id="3962" instrument_node="">
</span></div><span data-dcnode-id="3960" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3957"><span data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">Greater social fairness in the Economic and Monetary Union </span></span></h2><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">The European Pillar of Social Rights has become an integral part of the European Semester, the EU’s annual cycle of economic and social policy coordination. Numerous social-policy measures on work–life balance, transparent and predictable working conditions and fair cross-border mobility have been promoted with the help of the pillar. It enshrines a set of 20 future-oriented social-policy principles that Member States have agreed.</span></p><span data-dcnode-id="3953" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="3950"><span data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">A new start to support work–life balance for parents and carers</span></span></h3><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3948" instrument_node="">The </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/13/better-work-life-balance-for-parents-and-carers-in-the-eu-council-adopts-new-rules/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">directive on work–life balance</span></span></a><span data-dcnode-id="3944" instrument_node=""> was adopted in June and encourages more equal sharing of caring responsibilities between women and men. It sets minimum requirements for Member States and gives each parent the right to at least 4&nbsp;months of parental leave, of which 2&nbsp;months cannot be transferred from one parent to another and should be compensated at an adequate level set by Member States. The directive also introduces a right to paternity leave of at least 10&nbsp;days after the birth of a child, compensated at least at the same level as sick pay. The new legislation also gives working carers the right to take 5&nbsp;days per year to care for family members. In addition, all working parents of children aged up to at least 8&nbsp;years have the right to request flexible working arrangements (reduced working hours, flexible working hours and flexibility at place of work). These new rules are aimed at increasing women’s participation in the labour market and at improving equality between men and women. </span></p><span data-dcnode-id="3942" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3932"><span data-dcnode-id="3941" instrument_node="">
</span><div class="img-large" data-dcnode-id="3934"><span data-dcnode-id="3940" instrument_node="">
</span><img alt="A summary of positive work‒life balance changes for parents and carers" aria-describedby="GR41" data-dcnode-id="3939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_GR41-EN.jpg&amp;raw"><span data-dcnode-id="3938" instrument_node="">
