</span><p class="longdesc" data-dcnode-id="3936" id="GR41"><span data-dcnode-id="3937" instrument_node="">The new directive on work‒life balance will give all working fathers at least 10 days of paternity leave around the time of the birth of their child, and at least 4 months of parental leave for each parent, of which two are non-transferable. Parents will also have more flexibility with their parental leave. Finally, every worker has the right to at least 5 days of carer’s leave per year.

								 Source:  European Commission</span></p><span data-dcnode-id="3935" instrument_node="">
</span></div><span data-dcnode-id="3933" instrument_node="">
</span></div><span data-dcnode-id="3931" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="3928"><span data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">New rights for more workers</span></span></h3><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3921"><span data-dcnode-id="3926" instrument_node="">The </span><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/13/better-working-conditions-in-the-eu-council-adopts-a-directive-on-more-transparency-and-predictability-at-work/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">directive on transparent and predictable working conditions</span></span></a><span data-dcnode-id="3922" instrument_node=""> was also adopted in June. Its aim is to broaden and modernise existing obligations to inform each worker, including those in non-standard forms of employment, of their working conditions. The directive also introduces a number of new minimum rights, for instance a limit to the length of probationary periods at the beginning of a job. Member States have until mid 2022 to transpose the new rules into their national legislation.</span></p><span data-dcnode-id="3920" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="3917"><span data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Better access to social protection for all workers </span></span></h3><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3910"><span data-dcnode-id="3915" instrument_node="">Member States have committed to ensure that all working people have effective access to social protection regardless of their employment status. The Council adopted a </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/social/main.jsp%3FlangId%3Den%26catId%3D1312%26furtherNews%3Dyes%26newsId%3D9478" target="_blank"><span class="hyperlink_text" data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">recommendation</span></span></a><span data-dcnode-id="3911" instrument_node=""> in November to help them close the gaps affecting atypical workers and the self-employed and to address the challenges stemming from the fast-paced digitalised world of work.</span></p><span data-dcnode-id="3909" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3899"><span data-dcnode-id="3908" instrument_node="">
</span><div class="img-large" data-dcnode-id="3901"><span data-dcnode-id="3907" instrument_node="">
</span><img alt="Graphic showing improved access to social protection for all workers and the self-employed" aria-describedby="GR42" data-dcnode-id="3906" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH05_GR42-EN.jpg&amp;raw"><span data-dcnode-id="3905" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3903" id="GR42"><span data-dcnode-id="3904" instrument_node="">The world of work is changing. 40 % of employed people are either non-standard workers (not working under a full-time, open-ended contract) or self-employed. The average European worker will have 10 different jobs throughout their career, and new forms of work are growing. Social security systems need to adapt; they are often not tailored to self-employed and non-standard workers, leaving them without sufficient protection. For instance, not all workers have the right to contribute and participate in all social protection schemes. Some of the barriers to accessing beneﬁts include no access to pension schemes for some non-standard workers in 13 Member States, no coverage in case of accidents at work for the self-employed in 10 Member States, and a minimum working period for the self-employed in nine Member States. New European Union guidelines seek to improve the situation by extending coverage of unemployment beneﬁts, sickness and healthcare beneﬁts, maternity and paternity beneﬁts, invalidity beneﬁts, old-age beneﬁts, and beneﬁts in case of accidents at work or work-related diseases to all people in employment and self-employment. The guidelines will remove barriers to accessing benefits by helping to preserve, accumulate and/or transfer entitlements, providing an adequate level of protection, and giving transparent information on individual entitlements and obligations. Some Member States are already taking steps to extend coverage. In Slovenia all forms of work are now included in the social security systems, and in Denmark non-standard workers and the self-employed are integrated into the general unemployment insurance scheme.</span></p><span data-dcnode-id="3902" instrument_node="">
</span></div><span data-dcnode-id="3900" instrument_node="">
</span></div><span data-dcnode-id="3898" instrument_node="">
</span><div data-dcnode-id="3885"><span data-dcnode-id="3897" instrument_node="">

</span><h2 class="gris4" data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">The year in pictures</span></h2><span data-dcnode-id="3878" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="3865"><span data-dcnode-id="3877" instrument_node="">
</span><div class="col-sm-8" data-dcnode-id="3875"><img alt="Jacinda Ardern and Jean-Claude Juncker in front of podiums during a press conference" class="height_width_100pct" data-dcnode-id="3876" id="PY01" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PY_PH01.jpg&amp;raw"></div><span data-dcnode-id="3874" instrument_node="">
</span><div class="col-sm-4" data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node="">
</span><p class="caption" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Jacinda Ardern, Prime Minister of New Zealand, meets with Jean-Claude Juncker, President of the European Commission, Brussels, Belgium, 25&nbsp;January 2019. </span></p><span data-dcnode-id="3870" instrument_node="">
</span></div><span data-dcnode-id="3868" instrument_node="">
</span><div class="clearfix" data-dcnode-id="3867"></div><span data-dcnode-id="3866" instrument_node="">
</span></div><span data-dcnode-id="3864" instrument_node="">

</span><h1 data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">A balanced and progressive trade policy to harness globalisation</span></h1><span data-dcnode-id="3593" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="3583"><span data-dcnode-id="3592" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="3585"><span data-dcnode-id="3591" instrument_node="">
</span><img alt="Image: View of a fully loaded cargo ship on the horizon with other ships in the background. © Fotolia" class="height_width_100pct" data-dcnode-id="3590" id="PC06-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH06.jpg&amp;raw"><span data-dcnode-id="3589" instrument_node="">
</span><p class="caption" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">© Fotolia</span></p><span data-dcnode-id="3586" instrument_node="">
</span></div><span data-dcnode-id="3584" instrument_node="">
</span></div><span data-dcnode-id="3582" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">In 2019, the EU reaffirmed its position as a leading trade power, remaining one of the world’s most open economies and pursuing an ambitious trade-negotiations agenda that aims to open markets and create a level playing field for EU firms around the globe. The European economy depends on trade: every €1&nbsp;billion in exports supports 14&nbsp;000 jobs in Europe. Openness combined with high standards remains the best way to make globalisation work for everyone in Europe.</span></p><span data-dcnode-id="3579" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">The EU is committed to a rules-based multilateral trading system as the basis for prosperity. It continued to play a leading role in – and defending – the World Trade Organization (WTO) and proposed ideas to reform it. When others break international trade rules or engage in unfair trading practices the EU defends its businesses, workers and citizens.</span></p><span data-dcnode-id="3576" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">The EU protected its interests in the face of protectionist tendencies and growing barriers to trade. Stronger and more effective trade defence rules came into force. The EU also set up a new framework for screening strategic investments from outside the EU.</span></p><span data-dcnode-id="3573" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">The EU has concluded trade agreements with 72 countries around the world, accounting for 40&nbsp;% of the world’s gross domestic product. In 2019, it reached a new agreement with the South American trading bloc Mercosur, signed a deal with Vietnam and saw its trade deal with Japan enter into force. An agreement was concluded with China on the protection of geographical indications. The EU also made good progress on trade negotiations, including with Australia, Chile and New Zealand.</span></p><span data-dcnode-id="3570" instrument_node="">
</span><div data-dcnode-id="3557"><span data-dcnode-id="3569" instrument_node="">
</span><button aria-controls="content6" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="3559" data-target="#content6" data-toggle="collapse" type="button"><span data-dcnode-id="3568" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="3565"><span data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">Less detail</span></span></span><span data-dcnode-id="3564" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="3561"><span data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">More detail</span></span></span><span data-dcnode-id="3560" instrument_node=""> </span></button><span data-dcnode-id="3558" instrument_node="">
</span></div><span data-dcnode-id="3556" instrument_node="">
</span></div><span data-dcnode-id="3554" instrument_node="">
</span><div class="clearfix" data-dcnode-id="3553"></div><span data-dcnode-id="3552" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="3000" id="content6"><span data-dcnode-id="3551" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3548"><span data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Upholding multilateral rules </span></span></h2><span data-dcnode-id="3547" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3546" instrument_node="">Trade policy must be effective, transparent and based on values. The fundamentals of the </span><a data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/trade/policy/in-focus/new-trade-strategy/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">2015 Trade for All strategy</span></span></a><span data-dcnode-id="3542" instrument_node=""> continued to guide the approach taken in 2019: openness combined with high standards remains the most appropriate way to make globalisation work. </span></p><span data-dcnode-id="3540" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3530"><span data-dcnode-id="3539" instrument_node="">
</span><div class="img-large" data-dcnode-id="3532"><span data-dcnode-id="3538" instrument_node="">
</span><img alt="A summary of European Union trade policy and its impact on jobs and the economy" aria-describedby="GR43" data-dcnode-id="3537" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR43-EN.jpg&amp;raw"><span data-dcnode-id="3536" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3534" id="GR43"><span data-dcnode-id="3535" instrument_node="">European Union trade policy is composed of a network of 41 trade agreements with 72 countries, 15 of which have trade deals with the European Union that have entered into force since 2014. These trade deals have seen a 15 % increase in European Union exports between 2014 and 2018. Trade with non-EU countries supports 36 million European Union jobs, 5 million more than in 2014. It has opened up 6.1 billion euro in additional export opportunities through the removal of trade barriers. In 2018, the first full year of application of the European Union-Canada Agreement, the European Union saw a 10 % increase in European Union goods transported to Canada.

								Source: Eurostat.</span></p><span data-dcnode-id="3533" instrument_node="">
</span></div><span data-dcnode-id="3531" instrument_node="">
</span></div><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Challenges to the rules-based multilateral trading system, underpinned by the WTO, continued to mount in 2019. The rise of nationalism and protectionism brought an increase in unilateral measures as well as the threat of a global trading system based on strength, not fairness. Building on its initiatives of 2018, the EU made proposals to the WTO to improve transparency and to solve Member States’ concerns about specific trading practices in a more efficient manner. </span></p><span data-dcnode-id="3526" instrument_node="">
</span><p data-dcnode-id="3516"><span data-dcnode-id="3525" instrument_node="">The EU worked with major trading partners to strengthen rules on subsidies and forced technology transfers. To uphold the WTO’s system for resolving disputes, it made proposals to unblock pending appointments to the Appellate Body. The body </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2089%26title%3DStatement-by-Commissioner-for-Trade-Phil-Hogan-on-the-suspension-of-the-functioning-of-the-WTOs-Appellate-Body" target="_blank"><span class="hyperlink_text" data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">no longer has a quorum</span></span></a><span data-dcnode-id="3521" instrument_node="">, since the terms of two of the last three members expired in December, rendering it powerless to hear appeals in disputes. The European Commission reacted by proposing to </span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2091%26title%3DCommission-reinforces-tools-to-ensure-Europes-interests-in-international-trade" target="_blank"><span class="hyperlink_text" data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">amend the EU’s enforcement regulation</span></span></a><span data-dcnode-id="3517" instrument_node=""> so that if trade partners hinder effective dispute settlement resolution, the EU will be able to act resolutely to protect its interests. Based on existing WTO rules, the EU also agreed an interim appeal arbitration arrangement with Canada and Norway to preserve a binding dispute settlement system and the right to an appeal in disputes between them as and when the Appellate Body ceased to function.</span></p><span data-dcnode-id="3515" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3512"><span data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">A Europe that protects</span></span></h2><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3510" instrument_node="">When diplomatic interventions fail, the EU does not hesitate to use the WTO’s dispute settlement mechanism to enforce its rights and get the full benefits of membership for its businesses, workers and farmers. In 2019, the EU launched procedures against Turkey relating to </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2055%26title%3DEU-requests-WTO-dispute-settlement-panel-over-Turkeys-measures-on-pharmaceuticals" target="_blank"><span class="hyperlink_text" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">pharmaceutical products</span></span></a><span data-dcnode-id="3506" instrument_node="">, against India on its </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2001%26title%3DEuropean-Union-launches-WTO-cases-on-ICT-and-pharmaceuticals" target="_blank"><span class="hyperlink_text" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">treatment of information and communication technology products</span></span></a><span data-dcnode-id="3502" instrument_node="">, against the United States on its countervailing duties and anti-dumping measures on Spanish olives and against Colombia on its anti-dumping measures on </span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2083%26title%3DEuropean-Union-launches-WTO-trade-dispute-against-Colombias-unfair-duties-on-frozen-fries" target="_blank"><span class="hyperlink_text" data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">frozen fries</span></span></a><span data-dcnode-id="3498" instrument_node=""> from Belgium, Germany and the Netherlands. </span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3482"><span data-dcnode-id="3495" instrument_node="">The EU also used its bilateral agreements for dispute settlements, starting proceedings against South Korea to </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2095%26title%3DEU-Korea-dispute-settlement-over-workers-rights-in-Korea-enters-next-stage" target="_blank"><span class="hyperlink_text" data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">defend core labour standards</span></span></a><span data-dcnode-id="3491" instrument_node="">, against Ukraine over a </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2034%26title%3DEU-asks-for-a-panel-with-Ukraine-on-wood-export-ban" target="_blank"><span class="hyperlink_text" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">wood export ban</span></span></a><span data-dcnode-id="3487" instrument_node=""> and against the Southern African Customs Union’s restrictions on </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2031%26title%3DEU-asks-for-formal-consultations-with-Southern-African-Customs-Union-on-trade-in-poultry" target="_blank"><span class="hyperlink_text" data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">poultry imports</span></span></a><span data-dcnode-id="3483" instrument_node="">.</span></p><span data-dcnode-id="3481" instrument_node="">
</span><p data-dcnode-id="3467"><span data-dcnode-id="3480" instrument_node="">In line with WTO rules and EU legislation, the EU opened 15 new investigations into, and imposed seven new trade defence measures against, dumped and subsidised imports. These included </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/tdi/case_history.cfm%3Fid%3D2292%26init%3D2292" target="_blank"><span class="hyperlink_text" data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">electric bicycles from China</span></span></a><span data-dcnode-id="3476" instrument_node=""> and </span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1979%26title%3DCommission-puts-in-place-duties-on-subsidised-biodiesel-from-Argentina" target="_blank"><span class="hyperlink_text" data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">biodiesel from Argentina</span></span></a><span data-dcnode-id="3472" instrument_node=""> and </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2057%26title%3DCommission-imposes-countervailing-duties-on-Indonesian-biodiesel" target="_blank"><span class="hyperlink_text" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Indonesia</span></span></a><span data-dcnode-id="3468" instrument_node="">. The EU also opened six new review investigations and renewed 16 existing measures for another 5&nbsp;years. </span></p><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3460"><span data-dcnode-id="3465" instrument_node="">In 2019, the EU imposed definitive safeguard measures on imports of 26 categories of </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1977%26title%3DCommission-imposes-definitive-safeguard-measures-on-imports-of-steel-products" target="_blank"><span class="hyperlink_text" data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">steel products</span></span></a><span data-dcnode-id="3461" instrument_node=""> to address the potential trade diversion of steel to the EU from other countries caused by additional tariffs in the United States. It reviewed them towards the end of the summer to adapt them to the most recent situation.</span></p><span data-dcnode-id="3459" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3458" instrument_node="">The EU also defended its industries when non-EU countries opened trade defence investigations against its exports. Examples include Turkey’s safeguard investigation regarding imports of tyres, India’s anti-dumping investigation regarding imports of coated paper and Colombia’s measures on imports of </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2083%26title%3DEuropean-Union-launches-WTO-trade-dispute-against-Colombias-unfair-duties-on-frozen-fries" target="_blank"><span class="hyperlink_text" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">frozen fries</span></span></a><span data-dcnode-id="3454" instrument_node="">. </span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">In March, the WTO confirmed that in 2020 the EU would be granted retaliation rights in the trade dispute with the United States over subsidies to the aircraft manufacturer Boeing. The United States had not complied with earlier rulings on its illegal subsidies to the company, causing significant harm to its European competitor Airbus. In October, in a parallel trade dispute, the WTO granted the United States retaliation rights in the Airbus case. The United States introduced additional tariffs on a range of products from Member States. The EU remains committed to reaching a balanced negotiated settlement with the United States on the disputes.</span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3448" instrument_node="">The Commission finished adapting its trade defence procedures to the modernised anti-dumping and anti-subsidy legislation that came into force in 2018 and 2017. Similarly, it closed a loophole so that from autumn 2019 it could apply trade defence measures to goods (for example, undersea pipelines) imported into the continental shelf/exclusive economic zone of Member States. The Commission stepped up its fight against the circumvention of trade defence measures and launched related investigations into Chinese exports of </span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/tdi/case_details.cfm%3Fid%3D2409" target="_blank"><span class="hyperlink_text" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">corrosion-resistant steel</span></span></a><span data-dcnode-id="3444" instrument_node="">, </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/tdi/case_details.cfm%3Fid%3D2375" target="_blank"><span class="hyperlink_text" data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">persulphates</span></span></a><span data-dcnode-id="3440" instrument_node=""> and </span><a data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2092%26title%3DCommission-sanctions-Chinese-tableware-exporters-evading-EU-anti-dumping-duties" target="_blank"><span class="hyperlink_text" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">ceramic tableware</span></span></a><span data-dcnode-id="3436" instrument_node="">, imposing measures on the latter. </span></p><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3433" instrument_node="">In April, a new regulation for the first EU-wide framework for </span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2008%26title%3DEU-foreign-investment-screening-regulation-enters-into-force" target="_blank"><span class="hyperlink_text" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">screening foreign direct investment</span></span></a><span data-dcnode-id="3429" instrument_node=""> came into force. From October 2020, it will enable Member States and the Commission to identify and address security concerns related to specific investments from outside the EU.</span></p><span data-dcnode-id="3427" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3420"><span data-dcnode-id="3426" instrument_node="">
</span><div class="img-large" data-dcnode-id="3422"><span data-dcnode-id="3425" instrument_node="">
</span><img alt="" data-dcnode-id="3424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR44-EN.jpg&amp;raw"><span data-dcnode-id="3423" instrument_node="">
</span></div><span data-dcnode-id="3421" instrument_node="">
</span></div><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3413"><span data-dcnode-id="3418" instrument_node="">Intellectual property rights are important for economic growth and crucial for the EU’s ability to stimulate innovation and stay competitive globally. The EU increased its efforts to protect and enforce such rights internationally, including by implementing cooperation programmes with China, south-east Asia and Latin America and launching a new assistance project for Africa. It also held dialogues with priority countries such as China, Thailand, Turkey and Ukraine. As part of its work on the </span><a data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/accessing-markets/intellectual-property/enforcement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Counterfeit and Piracy Watch List</span></span></a><span data-dcnode-id="3414" instrument_node="">, the Commission strengthened its cooperation with the European Union Intellectual Property Office, the European Union Agency for Law Enforcement Cooperation (Europol) and the European Union Agency for Criminal Justice Cooperation and held regular dialogues with EU businesses. </span></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3406"><span data-dcnode-id="3411" instrument_node="">Growing protectionism meant these businesses faced an increasing number of barriers to international trade. The </span><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/docs/2019/june/tradoc_157929.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Annual Report on Trade and Investment Barriers</span></span></a><span data-dcnode-id="3407" instrument_node=""> showed that the EU’s market access strategy was effective in tackling them.</span></p><span data-dcnode-id="3405" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3395"><span data-dcnode-id="3404" instrument_node="">
</span><div class="img-large" data-dcnode-id="3397"><span data-dcnode-id="3403" instrument_node="">
</span><img alt="A summary of trade and investment barriers facing European Union exporters" aria-describedby="GR45" data-dcnode-id="3402" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR45-EN.jpg&amp;raw"><span data-dcnode-id="3401" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3399" id="GR45"><span data-dcnode-id="3400" instrument_node="">European Union exporters face 425 trade barriers in 59 countries, with 45 new ones faced in 2018. In the same year, 35 obstacles were removed, and a total of 123 obstacles were removed during the course of the Juncker Commission. The removal of barriers between 2014 and 2017 have contributed an additional 6 billion euro in exports for European Union companies in 2018.

								Source: European Commission, ‘Report from the Commission to the European Parliament and the Council on trade and investment barriers – 1 January 2018-31 December 2018’, June 2019.</span></p><span data-dcnode-id="3398" instrument_node="">
</span></div><span data-dcnode-id="3396" instrument_node="">
</span></div><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3393" instrument_node="">Throughout the year, the EU continued </span><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2020%26title%3DEU-Japan-and-US-met-in-Paris" target="_blank"><span class="hyperlink_text" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">trilateral talks with Japan and the United States</span></span></a><span data-dcnode-id="3389" instrument_node=""> on key global trade issues, including how to level the playing field for traders by developing new multilateral rules on industrial subsidies and forced technology transfer.</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3377"><span data-dcnode-id="3386" instrument_node="">As a founding member of the </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.torturefreetrade.org/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Alliance for Torture-Free Trade</span></span></a><span data-dcnode-id="3382" instrument_node="">, set up in 2017, the EU continued to take a clear stand on goods used for capital punishment and torture. Further to the alliance’s 2018 commitment to push for a United Nations resolution on the issue, in June the UN General Assembly passed one aimed at </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2037%26title%3DEuropean-Commission-welcomes-UN-resolution-on-trade-in-torture-tools" target="_blank"><span class="hyperlink_text" data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">abolishing trade in equipment used for torture</span></span></a><span data-dcnode-id="3378" instrument_node="">.</span></p><span data-dcnode-id="3376" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3373"><span data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">A forward-looking trade policy</span></span></h2><span data-dcnode-id="3372" instrument_node="">
</span><p data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">The EU’s trade agreements aim not only to open new markets but also to ensure that trade works for everyone. The agreements uphold EU standards for the environment, food safety, and workers’ and consumer rights and help partner countries fulfil their international obligations. For example, the EU launched capacity-building and outreach programmes worth €9&nbsp;million to help developing countries address labour and environmental challenges throughout responsible supply chains in both Asia and Latin America.</span></p><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3363"><span data-dcnode-id="3368" instrument_node="">The EU played a leading role in United Nations discussions on reforming how investors can settle disputes with countries. In January, it submitted a proposal to the United Nations Commission on International Trade Law to establish a </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1608%26title%3DThe-Multilateral-Investment-Court-project" target="_blank"><span class="hyperlink_text" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">multilateral court</span></span></a><span data-dcnode-id="3364" instrument_node=""> for settling such disputes, which represents a major innovation in global governance.</span></p><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3361" instrument_node="">In September, the European Commission hosted a high-level conference in Brussels on </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2067%26title%3DCommissioner-Malmstr%25C3%25B6m-hosts-conference-on-Empowering-Women-through-Trade" target="_blank"><span class="hyperlink_text" data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">empowering women through trade</span></span></a><span data-dcnode-id="3357" instrument_node="">.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3352"><span data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">A transparent and inclusive negotiating process </span></span></h2><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Transparency and engagement with the public remain essential ingredients of the EU’s trade policy to ensure a democratic process, public trust and accountability. This must exist before, during and after negotiations, as well as when agreements are implemented.</span></p><span data-dcnode-id="3348" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3338"><span data-dcnode-id="3347" instrument_node="">
</span><div class="img-large" data-dcnode-id="3340"><span data-dcnode-id="3346" instrument_node="">
</span><img alt="Graphic showing improved transparency in European Union trade negotiations since 2016" aria-describedby="GR49" data-dcnode-id="3345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR49-EN.jpg&amp;raw"><span data-dcnode-id="3344" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3342" id="GR49"><span data-dcnode-id="3343" instrument_node="">In 2019, 24 meetings were held with civil society (charities, citizens’ organisations, business groups, etc.) and 14 official meetings were held with the European Parliament’s International Trade Committee for an open dialogue on trade. The number of negotiation text proposals increased from 11 in 2016 to 48 in 2017, to a peak of 177 in 2018 and back down to 42 in 2019. The number of negotiation round reports produced increased steadily from 11 in 2016 to 16 in 2017, to 18 in 2018 and to 19 in 2019. The number of factsheets produced rose sharply, from six in 2016 to 93 in 2017, to a peak of 103 in 2018 and down to 17 in 2019.</span></p><span data-dcnode-id="3341" instrument_node="">
</span></div><span data-dcnode-id="3339" instrument_node="">
</span></div><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3336" instrument_node="">The Commission continued to publish </span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1395" target="_blank"><span class="hyperlink_text" data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">reports</span></span></a><span data-dcnode-id="3332" instrument_node=""> of negotiating rounds, position papers and proposals for texts in trade agreements under negotiation. It also published its third comprehensive </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A52019DC0455%26qid%3D1571406458279%26from%3DEN" target="_blank"><span class="hyperlink_text" data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Annual Report</span></span></a><span data-dcnode-id="3328" instrument_node=""> assessing the implementation of the EU’s trade agreements. This enabled stakeholders, civil society and other EU institutions to scrutinise how the EU is implementing its agreements and provided lessons for ongoing and future trade negotiations.</span></p><span data-dcnode-id="3326" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3316"><span data-dcnode-id="3325" instrument_node="">
</span><div class="img-large" data-dcnode-id="3318"><span data-dcnode-id="3324" instrument_node="">
</span><img alt="Graphic showing the extent of European Union trade policy dialogues with civil society" aria-describedby="GR50" data-dcnode-id="3323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR50-EN.jpg&amp;raw"><span data-dcnode-id="3322" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3320" id="GR50"><span data-dcnode-id="3321" instrument_node="">The Commission engages with 529 registered civil-society organisations through a dedicated permanent framework of Civil Society Dialogue. In 2019, over 1 000 citizens participated in 24 Civil Society Dialogue meetings, and Cecilia Malmström, the European Union Commissioner for Trade, held two Citizens’ Dialogues in Member States.</span></p><span data-dcnode-id="3319" instrument_node="">
</span></div><span data-dcnode-id="3317" instrument_node="">
</span></div><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3309"><span data-dcnode-id="3314" instrument_node="">The </span><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1776" target="_blank"><span class="hyperlink_text" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Expert Group on Trade Agreements</span></span></a><span data-dcnode-id="3310" instrument_node=""> met six times in 2019 to discuss issues such as electronic commerce, reform of the WTO and implementation of trade agreements. Made up of 28 organisations representing businesses, trade unions, consumers and environmental bodies, the group aims to foster dialogue and gather views from a wide range of stakeholders.</span></p><span data-dcnode-id="3308" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3305"><span data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">The EU–Mercosur Trade Agreement</span></span></h2><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3303" instrument_node="">In June, the EU reached a </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2039%26title%3DEU-and-Mercosur-reach-agreement-on-trade" target="_blank"><span class="hyperlink_text" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">political agreement</span></span></a><span data-dcnode-id="3299" instrument_node=""> on a </span><a data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-mercosur-association-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">comprehensive trade agreement</span></span></a><span data-dcnode-id="3295" instrument_node=""> with Mercosur comprising Argentina, Brazil, Paraguay and Uruguay.</span></p><span data-dcnode-id="3293" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3283"><span data-dcnode-id="3292" instrument_node="">
</span><div class="img-large" data-dcnode-id="3285"><span data-dcnode-id="3291" instrument_node="">
</span><img alt="A summary of the European Union‒Mercosur Trade Agreement" aria-describedby="GR46" data-dcnode-id="3290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR46-EN.jpg&amp;raw"><span data-dcnode-id="3289" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3287" id="GR46"><span data-dcnode-id="3288" instrument_node="">The European Union‒Mercosur trade agreement is important as both sides express a clear commitment to open and rules-based international trade.

										The agreement will remove over 4 billion euro of Mercosur import duties, and Mercosur countries will gain better access to the European Union market. It will also anchor and support internal economic reforms in Mercosur countries while upholding the highest standards of food safety and consumer protection. It underscores the right to base environmental rules on the precautionary principle, and contains legally binding commitments on labour rights and environmental protection, including on the effective implementation of the Paris Agreement on climate change.

										The European Union‒Mercosur Trade Agreement will protect over 350 traditional European delicacies from imitation. It will also ensure the removal of tariffs on imports of EU products, such as cars (current tariff 35 %), pharmaceuticals (tariffs up to 14 %), clothing (35 %), leather shoes (35 %), wine (27 %) and chocolates (20 %).

										Source: European Commission</span></p><span data-dcnode-id="3286" instrument_node="">
</span></div><span data-dcnode-id="3284" instrument_node="">
</span></div><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">As part of the wider Association Agreement between the two blocs, the new agreement will cement the close political and economic relations between them and create a market of 780&nbsp;million people. The EU is Mercosur’s largest trade and investment partner and the first to strike a comprehensive trade deal with it.</span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3273"><span data-dcnode-id="3278" instrument_node="">Once in force, the agreement will cut tariffs, increase business opportunities, widen consumer choice, cut red tape, boost growth and competitiveness, promote shared values like sustainable development and create jobs. It will also promote high labour and environmental standards. In addition, the EU and Mercosur have committed themselves to effectively implement the </span><a data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/international/negotiations/paris_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Paris Agreement</span></span></a><span data-dcnode-id="3274" instrument_node=""> on climate change. </span></p><span data-dcnode-id="3272" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3269"><span data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">The Economic Partnership Agreement with Japan</span></span></h2><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3267" instrument_node="">On 1&nbsp;February 2019, the </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-japan-economic-partnership-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">EU–Japan Economic Partnership Agreement</span></span></a><span data-dcnode-id="3263" instrument_node=""> signed in July 2018 entered into force, creating an open trading zone covering more than 570&nbsp;million people. It removes nearly all of the €1&nbsp;billion in Japanese import duties paid every year by EU companies exporting to Japan as well as a number of long-standing regulatory barriers. </span></p><span data-dcnode-id="3261" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="3248"><span data-dcnode-id="3260" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="3256"><span data-dcnode-id="3259" instrument_node="">
</span><img alt="Shinzō Abe, Prime Minister of Japan, and Jean-Claude Juncker, President of the European Commission, at the EU–Asia Connectivity Forum, Brussels, Belgium, 27&nbsp;September&nbsp;2019. (© European Union, 2019)" data-dcnode-id="3258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_PH23.jpg&amp;raw"><span data-dcnode-id="3257" instrument_node="">
</span></div><span data-dcnode-id="3255" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="3252"><p class="caption" data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Shinzō Abe, Prime Minister of Japan, and Jean-Claude Juncker, President of the European Commission, at the EU–Asia Connectivity Forum, Brussels, Belgium, 27&nbsp;September&nbsp;2019.</span></p></div><span data-dcnode-id="3251" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="3250"></span><span data-dcnode-id="3249" instrument_node="">
</span></div><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3246" instrument_node="">The agreement increases EU exports, creates </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trade.ec.europa.eu/doclib/docs/2017/july/tradoc_155694.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">new opportunities for European companies</span></span></a><span data-dcnode-id="3242" instrument_node="">, such as making it easier for them to access Japanese public procurement markets, brings more choice for consumers and contributes to their joint efforts to shape global trade rules. It is the first EU trade agreement to include a specific commitment to comply with the Paris Agreement. Throughout the year, the EU continued negotiations with Japan on investment protection standards and dispute resolution.</span></p><span data-dcnode-id="3240" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3237"><span data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Asia and Australasia</span></span></h2><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3235" instrument_node="">On 30&nbsp;June, the EU and Vietnam signed </span><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-vietnam-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">agreements on free trade and investment protection</span></span></a><span data-dcnode-id="3231" instrument_node="">, marking a milestone in their partnership. The agreements are the most ambitious ever to be negotiated between the EU and an emerging economy. Pending ratification, the free trade agreement could enter into force in mid 2020, while the </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-singapore-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">EU–Singapore</span></span></a><span data-dcnode-id="3227" instrument_node=""> Free Trade Agreement </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2078%26title%3DTrade-EU-Singapore-agreement-to-enter-into-force-on-21-November-2019" target="_blank"><span class="hyperlink_text" data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">entered into force on 21&nbsp;November</span></span></a><span data-dcnode-id="3223" instrument_node="">.</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3220" instrument_node="">The agreements with these two countries further reinforce the EU’s engagement with the region. It also held three rounds of negotiations for a trade agreement with Indonesia. Three rounds of talks were held in the negotiations for trade agreements with </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-australia-trade-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Australia</span></span></a><span data-dcnode-id="3216" instrument_node=""> and four with </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-new-zealand-trade-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">New Zealand</span></span></a><span data-dcnode-id="3212" instrument_node="">.    </span></p><span data-dcnode-id="3210" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3200"><span data-dcnode-id="3209" instrument_node="">
</span><div class="img-large" data-dcnode-id="3202"><span data-dcnode-id="3208" instrument_node="">
</span><img alt="A summary of the European Union‒Vietnam trade agreement" aria-describedby="GR48" data-dcnode-id="3207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR48-EN.jpg&amp;raw"><span data-dcnode-id="3206" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3204" id="GR48"><span data-dcnode-id="3205" instrument_node="">The European Union and Vietnam signed a free trade agreement and an investment protection agreement on 30 June 2019. It is the most ambitious free trade agreement ever concluded with a developing country. It will bring the removal of 99 % of customs duties between the European Union and Vietnam. In 2018, trade in goods between the EU and Vietnam amounted to 49 billion euro.

										The European Union will export high-tech and electrical goods, machinery and aircraft, and will import telephone sets, footwear, rice and textiles.

										The deal also considers a sustainable development, as Vietnam has made commitments to implement core international labour standards, fight climate change and protect biodiversity.

										Source: Council of the European Union.</span></p><span data-dcnode-id="3203" instrument_node="">
</span></div><span data-dcnode-id="3201" instrument_node="">
</span></div><span data-dcnode-id="3199" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3189"><span data-dcnode-id="3198" instrument_node="">
</span><div class="img-large" data-dcnode-id="3191"><span data-dcnode-id="3197" instrument_node="">
</span><img alt="A summary of the European Union‒Singapore free trade agreement" aria-describedby="GR47" data-dcnode-id="3196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR47-EN.jpg&amp;raw"><span data-dcnode-id="3195" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3193" id="GR47"><span data-dcnode-id="3194" instrument_node="">Singapore is the European Union’s first commercial partner in south-east Asia. The trade and investment agreements concluded will set the benchmark for European Union cooperation with the other countries in the region.

								The main areas covered by these deals are labelling and safety testing, intellectual property, renewable energy, smaller companies, public procurement, environment and labour. They will generate a total value of bilateral trade of 58.1 billion euro, and 21.1 billion euro in European exports. The European Union will export cars and machinery and import chemicals and pharmaceuticals.

								Concerning trade in services, the total value of bilateral trade will be 44.4 billion euro. Around 10 000 European Union companies already use Singapore as a regional hub. The value of European Union bilateral investments came to 255.5 billion euro in 2016, with a 25 % increase in total bilateral investments between 2014 and 2015.

								Other benefits of the new European Union‒Singapore deal are the elimination of all Singaporean tariffs on European Union exports and most European Union tariffs for Singaporean products, as well as the removal of non-tariff barriers in areas such as electronics, where Singapore will recognise European Union standards. The deal will also help to protect people’s rights at work and introduce an EU-wide investment protection agreement.

								Source: Council of the European Union.</span></p><span data-dcnode-id="3192" instrument_node="">
</span></div><span data-dcnode-id="3190" instrument_node="">
</span></div><span data-dcnode-id="3188" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3185"><span data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">United States</span></span></h2><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3183" instrument_node="">The focus with the United States continued to be on developing a positive trade agenda, addressing issues of common interest and avoiding trade disputes. This was based on the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/STATEMENT_18_4687" target="_blank"><span class="hyperlink_text" data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">joint statement</span></span></a><span data-dcnode-id="3179" instrument_node=""> issued by the Commission President Jean-Claude Juncker and the US President Donald Trump in 2018, which established an Executive Working Group to facilitate trade and develop a positive transatlantic trade agenda.</span></p><span data-dcnode-id="3177" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3167"><span data-dcnode-id="3176" instrument_node="">
</span><div class="img-large" data-dcnode-id="3169"><span data-dcnode-id="3175" instrument_node="">
</span><img alt="A short summary of European Union‒United States trade" aria-describedby="GR51" data-dcnode-id="3174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR51-EN.jpg&amp;raw"><span data-dcnode-id="3173" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3171" id="GR51"><span data-dcnode-id="3172" instrument_node="">The United States is the European Union’s largest export market for goods. In 2018, it accounted for 407 billion euro and 21 % of total European Union goods exports.

								Source: Eurostat.</span></p><span data-dcnode-id="3170" instrument_node="">
</span></div><span data-dcnode-id="3168" instrument_node="">
</span></div><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3165" instrument_node="">In 2019, the group focused on </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/docs/2019/july/tradoc_158269.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">regulatory issues</span></span></a><span data-dcnode-id="3161" instrument_node="">. In April, the Council mandated the Commission to negotiate with the United States on industrial tariffs and conformity assessment. </span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3158" instrument_node="">In July, the Commission published a </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/docs/2019/july/tradoc_158272.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">progress report</span></span></a><span data-dcnode-id="3154" instrument_node=""> on the joint statement’s implementation, showing positive results, particularly in sectors such as energy, </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/docs/2019/july/tradoc_158270.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">soybeans</span></span></a><span data-dcnode-id="3150" instrument_node="">, pharmaceuticals, cybersecurity and medical devices. In 2019, EU imports of </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/docs/2019/july/tradoc_158271.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">liquefied natural gas</span></span></a><span data-dcnode-id="3146" instrument_node=""> from the United States reached the highest volume ever, making its energy supply more diverse and secure. Further work focused on conformity assessment, standards for new and emerging technologies and continuing progress in specific sectors. While this work continues, both sides agreed not to introduce new tariffs on their trade.</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3143" instrument_node="">In July, the EU agreed to increase the United States’ share of its import quota for hormone-free beef. In return, the United States accepted not to reinstate action against the EU in the Section&nbsp;301 investigation of EU measures concerning meat and meat products. The </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ema.europa.eu/en/human-regulatory/research-development/compliance/good-manufacturing-practice/mutual-recognition-agreements-mra" target="_blank"><span class="hyperlink_text" data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">agreement for mutual recognition of inspections of manufacturing sites for human medicines</span></span></a><span data-dcnode-id="3139" instrument_node=""> also came into force.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3134"><span data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">China</span></span></h2><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">The EU–China summit in April resulted in several joint commitments. China agreed to dismantle various trade barriers and undertook to conclude an agreement to protect geographical indications (the names of traditional European food and drink products) and to complete comprehensive negotiations on investment by 2020. </span></p><span data-dcnode-id="3130" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3120"><span data-dcnode-id="3129" instrument_node="">
</span><div class="img-large" data-dcnode-id="3122"><span data-dcnode-id="3128" instrument_node="">
</span><img alt="A summary of the European Union‒China geographical indications agreement" aria-describedby="GR52" data-dcnode-id="3127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR52-EN.jpg&amp;raw"><span data-dcnode-id="3126" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3124" id="GR52"><span data-dcnode-id="3125" instrument_node="">The European Union‒China Geographical Indications Agreement is a landmark treaty between the European Union and China. It is a concrete example of cooperation between two parties and reﬂects openness and adherence to international rules as a basis for trade relations. 100 European Union geographical indications are protected in China and 100 Chinese geographical indications are protected in the European Union. 

										The European Union list of geographical indications to be protected in China includes products such as Mozzarella di Bufala Campana, Languedoc, Elia Kalamatas and Münchener Bier. Among the Chinese products, the list includes Wuyuan Lü Cha (Wuyuan green tea), Chaidamu Gou Qi (Chaidamu goji berry), Panjin Da Mi (Panjin rice) and Wuchuan Yue Bing (Wuchuan mooncake).

										China has a market of 1.4 billion consumers and is the second-largest destination for exports of European Union agri-food products, reaching 13.5 billion euro in trade between November 2018 and October 2019. This represented an increase of 27.2 % in 1 year. The Chinese market is a high-growth potential market for European food and drinks, with a growing middle class with a taste for iconic European products. It also has a well-established geographical indication system of its own, waiting to be further discovered by European Union consumers thanks to this agreement.

										Following the conclusion of negotiations, the agreement will now go through legal scrutiny. On the European Union side, the European Parliament and the Council will be asked to give their approval. The agreement is expected to enter into force before the end of 2020.

										Four years after its entry into force, the scope of the agreement will expand to cover an additional 175 geographical indications names from both sides. These names will have to follow the same registration procedure as the 100 names already covered by the agreement.

										Source: Eurostat.</span></p><span data-dcnode-id="3123" instrument_node="">
</span></div><span data-dcnode-id="3121" instrument_node="">
</span></div><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3113"><span data-dcnode-id="3118" instrument_node="">In November, negotiations on the protection of these indications concluded after 9&nbsp;years. This </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_6200" target="_blank"><span class="hyperlink_text" data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">agreement</span></span></a><span data-dcnode-id="3114" instrument_node=""> should provide a high level of protection for 200 names when it enters into force, and for a further 175 names within 4&nbsp;years from then. China is the EU’s second-largest market for agri-food products and a growing market for products with a specific geographical indication.</span></p><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3111" instrument_node="">The EU and China held six rounds of talks for an </span><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2096%26title%3DEU-to-evaluate-the-Chinese-offer-for-European-investors" target="_blank"><span class="hyperlink_text" data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">investment agreement</span></span></a><span data-dcnode-id="3107" instrument_node=""> and continued to work on WTO reform.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="3095"><span data-dcnode-id="3104" instrument_node="">
</span><div class="img-large" data-dcnode-id="3097"><span data-dcnode-id="3103" instrument_node="">
</span><img alt="A summary of European Union‒China trade" aria-describedby="GR54" data-dcnode-id="3102" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_GR54-EN.jpg&amp;raw"><span data-dcnode-id="3101" instrument_node="">
</span><p class="longdesc" data-dcnode-id="3099" id="GR54"><span data-dcnode-id="3100" instrument_node="">The European Union is China’s biggest trading partner, while China is the European Union’s second-largest trading partner. Trade in goods between the European Union and China was worth 1.7 billion euro per day in 2018.

										In 2018, the European Union exported 211 billion euro worth of goods to China and imported 395 billion euro worth of goods. The European Union exported 51 billion euro worth of services to China, while China exported 30 billion euro worth of services to the European Union.

										The European Union is currently negotiating with China a comprehensive agreement on investment. This agreement should create a more level playing field for business and new market opportunities for both sides. It should also encourage China to advance its economic reforms and give the market a more decisive role. This will pave the way for broader trade ambitions when the conditions are right.

										Source: Eurostat.</span></p><span data-dcnode-id="3098" instrument_node="">
</span></div><span data-dcnode-id="3096" instrument_node="">
</span></div><span data-dcnode-id="3094" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3091"><span data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Southern and eastern neighbourhoods</span></span></h2><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3089" instrument_node="">The </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/chafea/agri/en/content/eu-morocco-association-agreement" target="_blank"><span class="hyperlink_text" data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">EU–Morocco Association Agreement</span></span></a><span data-dcnode-id="3085" instrument_node=""> was amended to include the people of Western Sahara, paving the way for restarting talks on deepening the EU–Morocco trade agreement. In May, negotiations for a Deep and Comprehensive Free Trade Area with Tunisia were suspended due to the country’s political situation. </span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">The EU held bilateral discussions on trade and investment with some of the Gulf Cooperation Council countries. Improvements negotiated with Jordan in the Rules of Origin scheme to support employment of Syrian refugees came into effect in early 2019.</span></p><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3079" instrument_node="">With its Deep and Comprehensive Free Trade Areas with </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1996%26title%3DCommissioner-for-Trade-Cecilia-Malmstr%25C3%25B6ms-second-visit-to-Georgia-highlights-strong-EU-Georgia-ties" target="_blank"><span class="hyperlink_text" data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">Georgia</span></span></a><span data-dcnode-id="3075" instrument_node="">, Moldova and Ukraine, the EU’s focus was on implementation. It also reached an </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20191121IPR67127/parliament-closes-legal-loophole-to-stop-excessive-ukrainian-chicken-imports" target="_blank"><span class="hyperlink_text" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">agreement</span></span></a><span data-dcnode-id="3071" instrument_node=""> with Ukraine to limit its poultry exports to the EU. On 6&nbsp;July, the EU initialled an </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D2046%26title%3DEU-and-Kyrgyz-Republic-initial-Enhanced-Partnership-and-Cooperation-Agreement" target="_blank"><span class="hyperlink_text" data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Enhanced Partnership and Cooperation Agreement with Kyrgyzstan</span></span></a><span data-dcnode-id="3067" instrument_node="">, which includes important trade chapters.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3062"><span data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Latin America</span></span></h2><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3060" instrument_node="">In 2019, work continued with Mexico towards signature and conclusion of the </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-mexico-trade-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Modernised Global Agreement</span></span></a><span data-dcnode-id="3056" instrument_node="">. The EU and Chile held three rounds of negotiations to update their </span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/countries-and-regions/countries/chile/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">2002 trade agreement</span></span></a><span data-dcnode-id="3052" instrument_node="">. The aim is to agree an ambitious, balanced and progressive agreement that will further liberalise trade and investment, promote EU values and take up issues like trade and gender. Provisions for the latter will strengthen the understanding of the constraints and opportunities faced by women in international trade and share best practices aimed at making it easier for them to participate.</span></p><span data-dcnode-id="3050" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="3037"><span data-dcnode-id="3049" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="3045"><span data-dcnode-id="3048" instrument_node="">
</span><img alt="A shelf with bottles of wine in a supermarket" data-dcnode-id="3047" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH06_PH24.jpg&amp;raw"><span data-dcnode-id="3046" instrument_node="">
</span></div><span data-dcnode-id="3044" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="3041"><p class="caption" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">French wine in a Mexico City supermarket selling European products. The modernised EU–Mexico Global Agreement will liberalise 99&nbsp;% of trade between the two parties. </span></p></div><span data-dcnode-id="3040" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="3039"></span><span data-dcnode-id="3038" instrument_node="">
</span></div><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">In June, as part of the implementation of trade agreements, the EU–Central America Association Committee held its fifth meeting and, in October, the trade committee grouping the EU and Colombia, Ecuador and Peru met.</span></p><span data-dcnode-id="3033" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="3030"><span data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">African, Caribbean and Pacific countries</span></span></h2><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3016"><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/countries-and-regions/development/economic-partnerships/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Economic Partnership Agreements</span></span></a><span data-dcnode-id="3025" instrument_node=""> are trade and development agreements between the EU and African, Caribbean and Pacific countries and regions. They are currently provisionally in force with 31 of them. The agreements can be seen as building blocks towards a future continent-to-continent free-trade area, one of the long-term aims of the new Africa–Europe Alliance for Sustainable Investment and Jobs, which supports African efforts towards a continental free-trade area. In February, </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1978%26title%3DComoros-and-Samoa-join-trade-and-development-agreements-with-the-European-Union" target="_blank"><span class="hyperlink_text" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Comoros</span></span></a><span data-dcnode-id="3021" instrument_node=""> joined the Eastern and Southern Africa agreement and, in October, the EU launched talks with the five countries that are implementing the current agreement to broaden it beyond tariff cuts in order to tackle other trade and investment barriers and create opportunities. The EU also discussed trade and investment as part of ongoing negotiations for a framework agreement to replace the </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/policies/cotonou-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Cotonou Agreement</span></span></a><span data-dcnode-id="3017" instrument_node="">.</span></p><span data-dcnode-id="3015" instrument_node="">
</span><div data-dcnode-id="3002"><span data-dcnode-id="3014" instrument_node="">
</span><button aria-controls="content6" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="3004" data-target="#content6" data-toggle="collapse" type="button"><span data-dcnode-id="3013" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="3010"><span data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Less detail</span></span></span><span data-dcnode-id="3009" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="3006"><span data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">More detail</span></span></span><span data-dcnode-id="3005" instrument_node=""> </span></button><span data-dcnode-id="3003" instrument_node="">
