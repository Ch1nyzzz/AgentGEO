</span></div><span data-dcnode-id="6524" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6521"><span data-dcnode-id="6522"><span data-dcnode-id="6523" instrument_node="">First European Chief Prosecutor</span></span></h3><span data-dcnode-id="6520" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">In September, the European Parliament and the Council of the European Union appointed Laura Codruţa Kövesi as the first European Chief Prosecutor. She heads the independent European Public Prosecutor’s Office, protecting taxpayers’ money by investigating fraud and other criminal offences against the EU budget. </span></p><span data-dcnode-id="6517" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6504"><span data-dcnode-id="6516" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="6512"><span data-dcnode-id="6515" instrument_node="">
</span><img alt="A portrait of Laura Codruța Kövesi" data-dcnode-id="6514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH06.jpg&amp;raw"><span data-dcnode-id="6513" instrument_node="">
</span></div><span data-dcnode-id="6511" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6508"><p class="caption" data-dcnode-id="6509"><span data-dcnode-id="6510" instrument_node="">Laura Codruţa Kövesi, the first European Chief Prosecutor.</span></p></div><span data-dcnode-id="6507" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6506"></span><span data-dcnode-id="6505" instrument_node="">
</span></div><span data-dcnode-id="6503" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6500"><span data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">How the new European Commission will work</span></span></h3><span data-dcnode-id="6499" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6489"><span data-dcnode-id="6498" instrument_node="">The </span><a data-dcnode-id="6495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/commissioners/2019-2024_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">new European Commission</span></span></a><span data-dcnode-id="6494" instrument_node=""> has set </span><a data-dcnode-id="6491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/strategy/priorities-2019-2024" target="_blank"><span class="hyperlink_text" data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">six priorities for 2019 to 2024</span></span></a><span data-dcnode-id="6490" instrument_node="">: </span></p><span data-dcnode-id="6488" instrument_node="">
</span><ul class="myjustify" data-dcnode-id="6450"><span data-dcnode-id="6487" instrument_node="">
</span><li data-dcnode-id="6482"><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/priorities/european-green-deal_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">a European Green Deal</span></span></a><span data-dcnode-id="6483" instrument_node="">;</span></li><span data-dcnode-id="6481" instrument_node="">
</span><li data-dcnode-id="6476"><a data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/strategy/priorities-2019-2024/economy-works-people_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">an economy that works for people</span></span></a><span data-dcnode-id="6477" instrument_node="">;</span></li><span data-dcnode-id="6475" instrument_node="">
</span><li data-dcnode-id="6470"><a data-dcnode-id="6472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/priorities/europe-fit-digital-age_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">a Europe fit for the digital age</span></span></a><span data-dcnode-id="6471" instrument_node="">;</span></li><span data-dcnode-id="6469" instrument_node="">
</span><li data-dcnode-id="6464"><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/strategy/priorities-2019-2024/promoting-our-european-way-life_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">promoting our European way of life</span></span></a><span data-dcnode-id="6465" instrument_node="">;</span></li><span data-dcnode-id="6463" instrument_node="">
</span><li data-dcnode-id="6458"><a data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/priorities/stronger-europe-world_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">a stronger Europe in the world</span></span></a><span data-dcnode-id="6459" instrument_node="">;</span></li><span data-dcnode-id="6457" instrument_node="">
</span><li data-dcnode-id="6452"><a data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/strategy/priorities-2019-2024/new-push-european-democracy_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">a new push for European democracy</span></span></a><span data-dcnode-id="6453" instrument_node="">.</span></li><span data-dcnode-id="6451" instrument_node="">
</span></ul><span data-dcnode-id="6449" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">President von der Leyen appointed eight vice-presidents to the College, including the High Representative of the Union for Foreign Affairs and Security Policy, Josep Borrell Fontelles. Three of these will also serve as executive vice-presidents, each in charge of one of the top three political guidelines in the president’s agenda, alongside their own portfolio. </span></p><span data-dcnode-id="6446" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">Executive Vice-President Frans Timmermans is coordinating the European Commission’s work on the European Green Deal, with Climate Action as his portfolio. Alongside her work as Commissioner for Competition, Executive Vice-President Margrethe Vestager is in charge of the priority ‘A Europe fit for the digital age’. Executive Vice-President Valdis Dombrovskis has become Commissioner for Financial Services and is in charge of delivering on the priority ‘An economy that works for people’.</span></p><span data-dcnode-id="6443" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">Aside from working on the six priorities, President von der Leyen has stated that she will preside over a College that is committed, that understands Europe and that listens to what Europeans want. A major goal of the new Commission is to make life easier for people and for businesses. When the Commission creates new laws and regulations, it will operate the ‘one in, one out’ policy to cut bureaucracy for citizens.</span></p><span data-dcnode-id="6440" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6437"><span data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">European Green Deal</span></span></h3><span data-dcnode-id="6436" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6418"><span data-dcnode-id="6435" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="6431"><span data-dcnode-id="6434" instrument_node="">
</span><img alt="Ursula von der Leyen in front of a United Nations Climate Change Conference COP25 wall branding" data-dcnode-id="6433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH07.jpg&amp;raw"><span data-dcnode-id="6432" instrument_node="">
</span></div><span data-dcnode-id="6430" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6422"><span data-dcnode-id="6429" instrument_node="">
</span><p class="caption" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">Our goal is to reconcile the economy with our planet, to reconcile the way we produce and the way we consume with our planet and to make it work for our people. Ursula von der Leyen, President of the European Commission, Brussels, Belgium, 11&nbsp;December 2019.</span></p><span data-dcnode-id="6426" instrument_node="">
</span><p class="caption" data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">  Ursula von der Leyen, President of the European Commission, Brussels, Belgium, 11&nbsp;December&nbsp;2019. </span></p><span data-dcnode-id="6423" instrument_node="">
</span></div><span data-dcnode-id="6421" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6420"></span><span data-dcnode-id="6419" instrument_node="">
</span></div><span data-dcnode-id="6417" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6415"><span data-dcnode-id="6416" instrument_node="">The first and most important of the six priorities, the European Green Deal, was presented by President von der Leyen on 11&nbsp;December 2019, less than 2&nbsp;weeks after the Commission took office. This flagship policy, which seeks to make Europe the world’s first climate-neutral continent by 2050, comprises an extremely ambitious set of measures that should enable European citizens and businesses to benefit from the sustainable green transition. </span></p><span data-dcnode-id="6414" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">The European Green Deal is a comprehensive response to the immediate climate emergency threatening the planet. It is also a unique opportunity for the EU to become the front-runner in the global green transition. However, going green does not mean sacrificing growth. The Green Deal future-proofs the EU economy from resource depletion and sets out how the EU can achieve its climate-neutrality goal – while creating jobs, improving people’s health and quality of life, caring for nature and leaving no one behind.</span></p><span data-dcnode-id="6411" instrument_node="">
</span><p class="h2gris" data-dcnode-id="6408"><span data-dcnode-id="6409"><span data-dcnode-id="6410" instrument_node="">Committing to change</span></span></p><span data-dcnode-id="6407" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6405"><span data-dcnode-id="6406" instrument_node="">The first-ever European climate law will make this transition irreversible. This will anchor in legislation Europe’s political ambition of becoming the first climate-neutral continent. The Green Deal will underpin all future EU policy and ensure the EU remains at the forefront of European and global action on sustainability.   </span></p><span data-dcnode-id="6404" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6392"><span data-dcnode-id="6403" instrument_node="">
</span><div class="img-large" data-dcnode-id="6396"><span data-dcnode-id="6402" instrument_node="">
</span><img alt="Graph showing an inverse relationship between decreasing emissions and economic growth in the European Union." aria-describedby="GR04" data-dcnode-id="6401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR04-EN.jpg&amp;raw"><span data-dcnode-id="6400" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6398" id="GR04"><span data-dcnode-id="6399" instrument_node="">Between 1990 and 2018, greenhouse gas emissions decreased by 23 %, while the economy grew by 61 %.</span></p><span data-dcnode-id="6397" instrument_node="">
</span></div><span data-dcnode-id="6395" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6394"></span><span data-dcnode-id="6393" instrument_node="">
</span></div><span data-dcnode-id="6391" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6379"><span data-dcnode-id="6390" instrument_node="">
</span><div class="img-large" data-dcnode-id="6383"><span data-dcnode-id="6389" instrument_node="">
</span><img alt="Graphic describing the European Union’s commitment to climate action." aria-describedby="GR05" data-dcnode-id="6388" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR05-EN.jpg&amp;raw"><span data-dcnode-id="6387" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6385" id="GR05"><span data-dcnode-id="6386" instrument_node="">The European Union has committed to becoming climate neutral by 2050, protecting human life, animals and plants by cutting pollution, and helping companies become world leaders in clean products and technologies, all of this while ensuring a just and inclusive transition.

										Ursula von der Leyen, President of the European Commission, said, The European Green Deal is our new growth strategy. It will help us cut emissions while creating jobs.

										Frans Timmermans, Executive Vice-President of the European Commission, echoed, We propose a green and inclusive transition to help improve people’s well-being and secure a healthy planet for generations to come.

										This commitment is also rooted in the conviction of most Europeans; 93 % of Europeans see climate change as a serious problem and claim to have taken at least one action to tackle climate change. 79 % agree that taking action on climate change will lead to innovation.

										Source: European Commission</span></p><span data-dcnode-id="6384" instrument_node="">
</span></div><span data-dcnode-id="6382" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6381"></span><span data-dcnode-id="6380" instrument_node="">
</span></div><span data-dcnode-id="6378" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">The deal will have an impact on all areas of the EU economy, including heavy emitters like the transport sector, construction, energy and agriculture and industries such as steel, cement, information technology, textiles and chemicals.</span></p><span data-dcnode-id="6375" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">Its comprehensive nature means the focus is on prevention and not just cure. Existing policies, like mitigating the impact of industry through recycling, will be bolstered by policies to reduce the waste or harm created in the first instance, starting with the manufacturing process.</span></p><span data-dcnode-id="6372" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">As well as cutting emissions, the Green Deal will form Europe’s new growth strategy, creating jobs thanks to a new EU industrial strategy that will enable Europe’s businesses to innovate and develop new technologies. </span></p><span data-dcnode-id="6369" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6357"><span data-dcnode-id="6368" instrument_node="">
</span><div class="img-large" data-dcnode-id="6361"><span data-dcnode-id="6367" instrument_node="">
</span><img alt="Graphic summarising the European Union’s plan towards climate neutrality." aria-describedby="GR06" data-dcnode-id="6366" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR06-EN.jpg&amp;raw"><span data-dcnode-id="6365" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6363" id="GR06"><span data-dcnode-id="6364" instrument_node="">The European Union will be climate neutral in 2050. The Commission will propose a European climate law turning the political commitment into a legal obligation and a trigger for investment.

								Reaching this target will require action by all sectors of our economy. The energy sector will be decarbonised as it currently accounts for more than 75 % of the EU’s greenhouse gas emissions. Buildings will be renovated to help people cut their energy bills and energy use, as 40 % of our energy is consumed by buildings. European industry, which currently uses only 12 % of recycled material, will be encouraged to innovate and become a global leader in the green economy. And in the transport sector, which represents 25 % of our emissions, cleaner, cheaper and healthier forms of private and public transport will be rolled out.

								Source: European Commission</span></p><span data-dcnode-id="6362" instrument_node="">
</span></div><span data-dcnode-id="6360" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6359"></span><span data-dcnode-id="6358" instrument_node="">
</span></div><span data-dcnode-id="6356" instrument_node="">
</span><p class="h2gris" data-dcnode-id="6353"><span data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Investing in the green transition</span></span></p><span data-dcnode-id="6352" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">Meeting the objectives of the European Green Deal will require significant investment. Financing will need to come from both the private and the public sectors – the European Commission will lead the way with a Sustainable Europe Investment Plan to help meet investment needs. At least 25&nbsp;% of the EU’s long-term budget should be dedicated to climate action, and the European Investment Bank will provide further support.&nbsp;</span></p><span data-dcnode-id="6349" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">While fighting climate change is a common endeavour, not all regions and Member States start from the same point. A Just Transition Mechanism will support regions that rely heavily on activities that are very carbon intensive and will support citizens most vulnerable during the transition by, for example, providing access to reskilling programmes and employment opportunities in new economic sectors.  </span></p><span data-dcnode-id="6346" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6334"><span data-dcnode-id="6345" instrument_node="">
</span><div class="img-large" data-dcnode-id="6338"><span data-dcnode-id="6344" instrument_node="">
</span><img alt="Summary of the European Green Deal." aria-describedby="GR07" data-dcnode-id="6343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR07-EN.jpg&amp;raw"><span data-dcnode-id="6342" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6340" id="GR07"><span data-dcnode-id="6341" instrument_node="">The European Green Deal aims to transform the European Union’s economy for a sustainable future.

										It will finance this transition by increasing the European Union’s climate ambition for 2030 and 2050, supplying clean, affordable and secure energy, mobilising industry for a clean and circular economy, and building and renovating in an energy- and resource-efficient way.

										It will ensure that the transition is just and that no one is left behind by mobilising research and fostering innovation. This will mean a zero-pollution ambition for a toxic-free environment, preserving and restoring ecosystems and biodiversity, and a new ‘from farm to fork’ approach for a fair, healthy and environmentally friendly food system. In addition, it will accelerate the shift to sustainable and smart mobility.

										Finally, the European Union will act as a global leader in climate-related issues and will work towards a real European Climate Pact.

										Source:  European Commission

										Copyright: European Union</span></p><span data-dcnode-id="6339" instrument_node="">
</span></div><span data-dcnode-id="6337" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6336"></span><span data-dcnode-id="6335" instrument_node="">
</span></div><span data-dcnode-id="6333" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6321"><span data-dcnode-id="6332" instrument_node="">
</span><div class="img-large" data-dcnode-id="6325"><span data-dcnode-id="6331" instrument_node="">
</span><img alt="Some of the immediate steps to take to achieve the European Green Deal." aria-describedby="GR08" data-dcnode-id="6330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR08-EN.jpg&amp;raw"><span data-dcnode-id="6329" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6327" id="GR08"><span data-dcnode-id="6328" instrument_node="">To achieve European Green Deal diplomacy and global leadership on climate issues, the next steps to take will be the proposal of a European climate law and the introduction of industrial and circular economy strategies in March 2020, and the increase of existing European Union 2030 climate targets to at least 50 % in summer 2020.

								Source:  European Commission</span></p><span data-dcnode-id="6326" instrument_node="">
</span></div><span data-dcnode-id="6324" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6323"></span><span data-dcnode-id="6322" instrument_node="">
</span></div><span data-dcnode-id="6320" instrument_node="">
</span><div data-dcnode-id="6307" style="margin-right:10px;"><span data-dcnode-id="6319" instrument_node="">
</span><button aria-controls="content_gris1" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="6309" data-target="#content_gris1" data-toggle="collapse" type="button"><span data-dcnode-id="6318" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="6315"><span data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">Less detail</span></span></span><span data-dcnode-id="6314" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="6311"><span data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">More detail</span></span></span><span data-dcnode-id="6310" instrument_node=""> </span></button><span data-dcnode-id="6308" instrument_node="">
</span></div><span data-dcnode-id="6306" instrument_node="">
</span></div><span data-dcnode-id="6304" instrument_node="">
</span></div><span data-dcnode-id="6302" instrument_node="">
</span><div class="general-report eu-2017" data-dcnode-id="6255" id="gris2"><span data-dcnode-id="6301" instrument_node="">
</span><h2 data-dcnode-id="6299"><span data-dcnode-id="6300" instrument_node="">The future of Europe</span></h2><span data-dcnode-id="6298" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6292"><span data-dcnode-id="6297" instrument_node="">In Sibiu, Romania, on 9&nbsp;May, the EU-27 leaders (from all Members States except for the United Kingdom) reflected on the next Strategic Agenda, which sets priorities and guides the work of the European Union for 2019-2024. Leaders also adopted the </span><a data-dcnode-id="6294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/09/the-sibiu-declaration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">Sibiu Declaration</span></span></a><span data-dcnode-id="6293" instrument_node="">, highlighting the unity between Member States shortly before the European Parliament elections. The Sibiu meeting marked the culmination of the process of reflection on the future of Europe with a renewed commitment to an EU that delivers on the issues that really matter to its citizens.</span></p><span data-dcnode-id="6291" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6281"><span data-dcnode-id="6290" instrument_node="">The first steps on ‘the road to Sibiu’ were taken in September 2016, when President Juncker announced a positive agenda for Europe, starting the reflection process on the future of Europe at 27. Following this, EU leaders adopted two important declarations on the path ahead: in </span><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2016/09/16/bratislava-declaration-and-roadmap/" target="_blank"><span class="hyperlink_text" data-dcnode-id="6288"><span data-dcnode-id="6289" instrument_node="">Bratislava</span></span></a><span data-dcnode-id="6286" instrument_node="">, Slovakia, in September 2016 and in </span><a data-dcnode-id="6283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2017/03/25/rome-declaration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">Rome</span></span></a><span data-dcnode-id="6282" instrument_node="">, Italy, in March 2017. </span></p><span data-dcnode-id="6280" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6274"><span data-dcnode-id="6279" instrument_node="">In March 2017, ahead of the 60th anniversary of the Treaty of Rome, the Commission published the </span><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/white_paper_on_the_future_of_europe_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">White Paper on the Future of Europe</span></span></a><span data-dcnode-id="6275" instrument_node="">. It outlined five possible scenarios for the EU’s future at 27. This was the starting point for a wide-ranging debate on the future of Europe, which inspired the main policy priorities of the Strategic Agenda. The Commission strongly promoted grassroots participation, developed new formats of citizens’ dialogues and consultations, made the debate more flexible and interactive, brought it online and reached out to a wider and more diverse audience. Hundreds of thousands of people of different nationalities, ages and religions and from across the political spectrum took part in close to 1&nbsp;800 town-hall-style debates in city halls, universities and other places all across our Union. More than 80&nbsp;000 people responded to the online questionnaire on the future of Europe, drafted by a panel of 96 European citizens. </span></p><span data-dcnode-id="6273" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6263"><span data-dcnode-id="6272" instrument_node="">In addition, the Commission published several reflection papers that looked in depth at specific issues to further feed the debate. The last of these reflection papers, on </span><a data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/reflection-paper-towards-sustainable-europe-2030_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">sustainable development</span></span></a><span data-dcnode-id="6268" instrument_node="">, was published on 30&nbsp;January 2019. In preparation for Sibiu, the Commission also published its own </span><a data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/euco_sibiu_communication_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">policy recommendations</span></span></a><span data-dcnode-id="6264" instrument_node=""> for the EU’s Strategic Agenda, centred on five themes: protective Europe, competitive Europe, fair Europe, sustainable Europe and influential Europe. Throughout the reflection process, EU leaders regularly met to discuss the burning issues of the day, issues that are of interest to Europeans. </span></p><span data-dcnode-id="6262" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">Having listened to citizens’ views and concerns, the EU’s Strategic Agenda builds on the progress our Union has made in recent years. Formally adopted by leaders at the June 2019 European Council, it focuses on four main priorities: protecting citizens and freedoms; developing a strong and vibrant economic base; building a climate-neutral, green, fair and social Europe; and promoting European interests and values on the global stage. The agenda is the EU’s response to citizens on how to address the challenges we face and harness the opportunities before us as we look to the future. </span></p><span data-dcnode-id="6259" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">Commission President Ursula von der Leyen has announced a Conference on the Future of Europe to give Europeans their say on how their Union should be run and what it should deliver on. It will start in 2020 and will run for 2&nbsp;years, bringing together people of all ages from across the EU as well as representatives of civil society, Member States and European institutions. </span></p><span data-dcnode-id="6256" instrument_node="">
</span></div><span data-dcnode-id="6254" instrument_node="">
</span><span data-dcnode-id="6252" instrument_node="">
</span><div class="clearfix" data-dcnode-id="6251"></div><span data-dcnode-id="6250" instrument_node="">
</span><div class="general-report" data-dcnode-id="6204" id="chapter1"><span data-dcnode-id="6249" instrument_node="">
</span><p class="chap_number" data-dcnode-id="6246"><span data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">Chapter 1</span></span></p><span data-dcnode-id="6245" instrument_node="">
</span><h1 data-dcnode-id="6243"><span data-dcnode-id="6244" instrument_node="">A new boost for jobs, growth and investment</span></h1><span data-dcnode-id="6242" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="6232"><span data-dcnode-id="6241" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="6234"><span data-dcnode-id="6240" instrument_node="">
</span><img alt="Image: Two industrial engineers working with tools in a factory. (© Fotolia)" class="height_width_100pct" data-dcnode-id="6239" id="PC01-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH01.jpg&amp;raw"><span data-dcnode-id="6238" instrument_node="">
</span><p class="caption" data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">© Fotolia</span></p><span data-dcnode-id="6235" instrument_node="">
</span></div><span data-dcnode-id="6233" instrument_node="">
</span></div><span data-dcnode-id="6231" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">In 2019, the European economy enjoyed its seventh consecutive year of growth and looked set to continue expanding in 2020 and 2021. Labour markets remained strong, with employment reaching a record high and unemployment falling to 6.3&nbsp;%, its lowest level since the start of the century. Public debt levels fell for the fifth year in a row, as governments benefited from low interest rates, and appeared on track to diminish even further. </span></p><span data-dcnode-id="6228" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">The global economy, however, took a turn for the worse and a high degree of uncertainty about policies in many Member States hurt the manufacturing sector. As a result, the prospects for economic growth in Europe weakened and the economy looked to be facing a prolonged period of more subdued growth and inflation.</span></p><span data-dcnode-id="6225" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="6223"><span data-dcnode-id="6224" instrument_node="">The EU’s focus on economic growth, job creation and investment was evident throughout the year and across its full range of activities, especially in the European Semester, its annual cycle of economic policy coordination, and its monitoring of public finances.</span></p><span data-dcnode-id="6222" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">The EU maximised the use of its budget to stimulate investment through innovative programmes such as the Investment Plan for Europe. By October, the number of small and medium-sized enterprises (SMEs) that had benefited from the plan since its launch reached almost 1&nbsp;million, and the total amount of investment mobilised surpassed €439.4&nbsp;billion.</span></p><span data-dcnode-id="6219" instrument_node="">
</span><div data-dcnode-id="6206"><span data-dcnode-id="6218" instrument_node="">
</span><button aria-controls="content1" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="6208" data-target="#content1" data-toggle="collapse" type="button"><span data-dcnode-id="6217" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="6214"><span data-dcnode-id="6215"><span data-dcnode-id="6216" instrument_node="">Less detail</span></span></span><span data-dcnode-id="6213" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="6210"><span data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">More detail</span></span></span><span data-dcnode-id="6209" instrument_node=""> </span></button><span data-dcnode-id="6207" instrument_node="">
</span></div><span data-dcnode-id="6205" instrument_node="">
</span></div><span data-dcnode-id="6203" instrument_node="">
</span><div class="clearfix" data-dcnode-id="6202"></div><span data-dcnode-id="6201" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="5620" id="content1"><span data-dcnode-id="6200" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="6197"><span data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">Investment for jobs and growth</span></span></h2><span data-dcnode-id="6196" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="6193"><span data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">The Investment Plan for Europe</span></span></h3><span data-dcnode-id="6192" instrument_node="">
</span><p data-dcnode-id="6186"><span data-dcnode-id="6191" instrument_node="">The </span><a data-dcnode-id="6188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/priorities/jobs-growth-and-investment/investment-plan-europe-juncker-plan_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">Investment Plan</span></span></a><span data-dcnode-id="6187" instrument_node=""> aims to remove obstacles to investment, provide visibility and technical assistance to investment projects and make smarter use of financial resources. A look at the 2019 results shows that it has had a meaningful macroeconomic impact and has brought tangible benefits to people and businesses.</span></p><span data-dcnode-id="6185" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="6175"><span data-dcnode-id="6184" instrument_node="">
</span><div class="img-large" data-dcnode-id="6177"><span data-dcnode-id="6183" instrument_node="">
</span><img alt="Graphic showing the macroeconomic impact of the Juncker Plan." aria-describedby="GR09" data-dcnode-id="6182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR09-EN.jpg&amp;raw"><span data-dcnode-id="6181" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6179" id="GR09"><span data-dcnode-id="6180" instrument_node="">The macroeconomic impact of the Juncker Plan has been one of the significant achievements of the period between 2014 and 2019. By 2019, investments under the Juncker Plan had increased gross domestic product by 0.9 % and created 1.1 million jobs. By 2022, investments under the Juncker Plan will increase gross domestic product by 1.8 % and will create 1.7 million jobs. 

										Investment in the European Union has returned to pre-crisis levels and is steadily increasing. The Juncker Plan has also played a key role in boosting jobs and growth in the European Union, and more than 1 million start-ups and small businesses are now expected to benefit from improved access to finance. As of October 2019, the Juncker Plan is set to trigger 439.4 billion euro in additional investment across the European Union.

										Source: European Commission</span></p><span data-dcnode-id="6178" instrument_node="">
</span></div><span data-dcnode-id="6176" instrument_node="">
</span></div><span data-dcnode-id="6174" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="6164"><span data-dcnode-id="6173" instrument_node="">
</span><div class="img-large" data-dcnode-id="6166"><span data-dcnode-id="6172" instrument_node="">
</span><img alt="Graphic showing the Juncker Plan’s impact on our daily lives" aria-describedby="GR10" data-dcnode-id="6171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR10-EN.jpg&amp;raw"><span data-dcnode-id="6170" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6168" id="GR10"><span data-dcnode-id="6169" instrument_node="">The Juncker Plan has resulted in: 531 000 affordable flats built or renovated; 1 039 000 start-ups and small businesses with access to fresh financing; 28.3 million smart energy meters installed; 8 million very-high-speed broadband lines activated; better waste treatment for 33.3 million people; and renewable energy now available for 10.4 million households.

										Source: European Commission</span></p><span data-dcnode-id="6167" instrument_node="">
</span></div><span data-dcnode-id="6165" instrument_node="">
</span></div><span data-dcnode-id="6163" instrument_node="">
</span><p data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Since the start of its mandate, the Juncker Commission (November 2014-November 2019) placed social priorities at the core of its action and at the heart of the debate on the future of Europe. There has been significant progress: with more than 241&nbsp;million people currently working, around 14&nbsp;million more compared to 2014, the employment rate has never been higher (73.9&nbsp;%) and the unemployment rate is its lowest since 2000. Although it is also too high, youth unemployment has fallen significantly, from a peak of 24.1&nbsp;% in 2013 to 14.3&nbsp;% in November 2019.      </span></p><span data-dcnode-id="6160" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="6150"><span data-dcnode-id="6159" instrument_node="">
</span><div class="img-large" data-dcnode-id="6152"><span data-dcnode-id="6158" instrument_node="">
</span><img alt="Graphic showing how strategic sectors have benefitted from the Juncker Plan in every Member State" aria-describedby="GR11" data-dcnode-id="6157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR11-EN.jpg&amp;raw"><span data-dcnode-id="6156" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6154" id="GR11"><span data-dcnode-id="6155" instrument_node="">The biggest share of investment funds (30 %) was directed to smaller companies, followed by 26 % to research, development and innovation, 18 % to the energy sector, 11 % to the digital sector, 7 % to transport, 4 % to social infrastructure, and another 4 % to the environment and to resource efficiency.

										Total investment related to European Fund for Strategic Investments approvals amounted to 439.4 billion euro. Included within that is 81 billion euro of approved European Fund for Strategic Investments financing (made up of 58.8 billion euro approved by the European Investment Bank and 22.2 billion euro approved by the European Investment Fund), of which 62.6 billion euro has already been signed. The total target for 2020 amounts to 500 billion euro.

										As regards European Fund for Strategic Investments investment relative to gross domestic product, Bulgaria, Estonia, Greece, Spain, Lithuania, Poland and Portugal have had high levels of investment. Ireland, France, Italy, Latvia, Hungary, Finland and Sweden  were in the second band, Following with fewer investments are Belgium, Czechia, Denmark, Croatia, the Netherlands, Romania and Slovenia. Finally, the last band is made up of Germany, Cyprus, Luxembourg, Malta, Austria, Slovakia and the United Kingdom.

										All figures are based on approved operations as of 15 October 2019.

										Thanks to these investments, 531 000 aﬀordable ﬂats have been built or renovated, waste treatment has improved for 33.3 million people and renewable energy has reached 10.4 million households.

										Source: European Investment Bank, European Investment Fund, European Commission</span></p><span data-dcnode-id="6153" instrument_node="">
</span></div><span data-dcnode-id="6151" instrument_node="">
</span></div><span data-dcnode-id="6149" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="6139"><span data-dcnode-id="6148" instrument_node="">
</span><div class="img-large" data-dcnode-id="6141"><span data-dcnode-id="6147" instrument_node="">
</span><img alt="Graphic describing the overall state of the economy in the European Union and euro area" aria-describedby="GR12" data-dcnode-id="6146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR12-EN.jpg&amp;raw"><span data-dcnode-id="6145" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6143" id="GR12"><span data-dcnode-id="6144" instrument_node="">In recent years, growth has been around 2 % in the European Union and the euro area, and they have both now grown for 25 consecutive quarters. 

										49 % of Europeans have a positive opinion of the current situation of the European economy. Public deficit in the European Union has decreased from 6.6 % in 2009 to 0.7 % in 2018, and the ratio of government debt in the European Union has fallen from 88.3 % in 2014 to 81.9 % in 2018.

										Source: European Commission</span></p><span data-dcnode-id="6142" instrument_node="">
</span></div><span data-dcnode-id="6140" instrument_node="">
</span></div><span data-dcnode-id="6138" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="6128"><span data-dcnode-id="6137" instrument_node="">
</span><div class="img-large" data-dcnode-id="6130"><span data-dcnode-id="6136" instrument_node="">
</span><img alt="Graphs showing the employment and unemployment rates in the European Union between 2014 and 2019" aria-describedby="GR13" data-dcnode-id="6135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR13-EN.jpg&amp;raw"><span data-dcnode-id="6134" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6132" id="GR13"><span data-dcnode-id="6133" instrument_node="">The employment rate since 2014 in the European Union has risen consistently, with 226.8 million people employed in 2014, 229.3 million employed in 2015, 232.2 million employed in 2016, 235.9 million employed in 2017, 239.9 million employed in 2018, and 241.3 million employed by the second quarter of 2019. Since 2014, 14 million jobs have been added to the economy.

										Source: Eurostat, national accounts, Directorate-General for Economic and Financial Affairs.

										At the same time, the level of unemployment declined just as steadily from slightly above 10 % in 2014 to slightly above 6 % by September 2019.

										Source: Eurostat Labour Force Survey.</span></p><span data-dcnode-id="6131" instrument_node="">
</span></div><span data-dcnode-id="6129" instrument_node="">
</span></div><span data-dcnode-id="6127" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="6124"><span data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">Economic and fiscal policy</span></span></h2><span data-dcnode-id="6123" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="6120"><span data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">The European Semester</span></span></h3><span data-dcnode-id="6119" instrument_node="">
</span><p data-dcnode-id="6113"><span data-dcnode-id="6118" instrument_node="">The </span><a data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/economic-and-fiscal-policy-coordination/eu-economic-governance-monitoring-prevention-correction/european-semester_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">European Semester</span></span></a><span data-dcnode-id="6114" instrument_node=""> is the annual cycle of economic and social policy coordination between the Member States to boost economic growth and job creation. As part of this process, each year the European Commission proposes to the Council a set of recommendations to Member States. For the first time, and following Greece’s exit from its economic adjustment programme in August 2018, the recommendations were addressed to all 28 Member States. </span></p><span data-dcnode-id="6112" instrument_node="">
</span><p data-dcnode-id="6106"><span data-dcnode-id="6111" instrument_node="">The overall objective of the Commission’s proposals this year was to encourage Member States to increase their growth potential by modernising their economies and strengthening their resilience. Given the current favourable economic conditions and global uncertainties, all Member States were urged to prioritise reforms that promote sustainable growth that works for everyone, together with well-targeted investment strategies and responsible fiscal policies. The recommendations were </span><a data-dcnode-id="6108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/%3Furi%3DOJ%253AC%253A2019%253A301%253ATOC" target="_blank"><span class="hyperlink_text" data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">adopted by the Council in July</span></span></a><span data-dcnode-id="6107" instrument_node="">. </span></p><span data-dcnode-id="6105" instrument_node="">
</span><p data-dcnode-id="6095"><span data-dcnode-id="6104" instrument_node="">The content of these recommendations reflects the overall priorities set out in the </span><a data-dcnode-id="6101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/2019-european-semester-annual-growth-survey_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">Annual Growth Survey</span></span></a><span data-dcnode-id="6100" instrument_node=""> and the recommendation on the economic policy for the euro area. They draw on the detailed analysis of the country reports published in February 2019 and on the assessment of the national programmes presented in April. The </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/economic-and-fiscal-policy-coordination/eu-economic-governance-monitoring-prevention-correction/macroeconomic-imbalance-procedure/alert-mechanism-report_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">Alert Mechanism Report</span></span></a><span data-dcnode-id="6096" instrument_node=""> identified 13 Member States for an in-depth review to assess whether they were affected, or at risk of being affected, by imbalances. The reviews found that 10 Member States were experiencing imbalances and three were experiencing excessive imbalances.</span></p><span data-dcnode-id="6094" instrument_node="">
</span><p data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">The country-specific recommendations include a stronger focus on identifying and prioritising investment needs at national level and on paying special attention to regional and territorial disparities. This is in line with the thorough analysis of investment needs and bottlenecks identified for each Member State in the reports and should serve to prioritise the use of EU funds in the next long-term EU budget (2021-2027).</span></p><span data-dcnode-id="6091" instrument_node="">
</span><p data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">The recommendations recognise that to meet current and future challenges, our increasingly digitalised and globalised economies require smarter investments in infrastructure, innovation, education and skills, as well as extra measures to provide sustainable and inclusive social welfare systems for our ageing populations. </span></p><span data-dcnode-id="6088" instrument_node="">
</span><p data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">The Semester also reflected principles enshrined in the European Pillar of Social Rights: equal opportunities and access to the labour market; fair working conditions; and social protection and inclusion. All Member States received a recommendation on skills, and many received recommendations to implement labour market reforms. Further recommendations focused, for example, on the need for policies to empower disadvantaged groups such as low-skilled workers, younger people, older people, persons with disabilities and people with a migrant background. Although social protection systems are improving, there are still some gaps in coverage and obstacles to access. </span></p><span data-dcnode-id="6085" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="6082"><span data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">Public finances</span></span></h3><span data-dcnode-id="6081" instrument_node="">
</span><p data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">Healthy public finances are an essential basis for economic stability and sustainable growth. Lowering debt and deficits is important to ensure governments have a fiscal buffer to use to cushion the effects of a downturn. While public debt continues to decline in the EU, progress has been uneven and levels remain too high in several Member States. </span></p><span data-dcnode-id="6078" instrument_node="">
</span><p data-dcnode-id="6072"><span data-dcnode-id="6077" instrument_node="">Macroeconomic stability is a prerequisite for growth, so the EU has rules and procedures to detect debt and deficits and prevent them from threatening growth in the Member States. Imbalances in the euro area continued to attenuate in 2019, and further policy action is needed. In February, the </span><a data-dcnode-id="6074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1389" target="_blank"><span class="hyperlink_text" data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">Commission’s analysis</span></span></a><span data-dcnode-id="6073" instrument_node=""> showed that 10 Member States were experiencing imbalances, while those in Greece, Italy and Cyprus were deemed excessive.</span></p><span data-dcnode-id="6071" instrument_node="">
</span><p data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">In its proposals for country-specific recommendations to each Member State, the Commission sets targets to help them reach their medium-term budgetary objectives. Member States that can afford to do so should use fiscal and structural policies to increase quality public investment, particularly in areas that improve economic growth potential such as education and skills, infrastructure and innovation.</span></p><span data-dcnode-id="6068" instrument_node="">
</span><p data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">In June, the Commission recommended to the Council an end to Spain’s Excessive Deficit Procedure, meaning that the country’s deficit had been brought to below 3&nbsp;% of its gross domestic product (GDP) in a durable manner. As a result, there were no Member States left in the corrective arm of the EU’s deficit rules, compared to the 24 in 2011. </span></p><span data-dcnode-id="6065" instrument_node="">
</span><p data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">At the same time, the Commission looked at several Member States’ compliance with the EU’s public debt and deficit rules to assess whether the opening of an Excessive Deficit Procedure was warranted. The Commission concluded that Belgium, France and Cyprus were in compliance but that an Excessive Deficit Procedure was warranted in the case of Italy. However, with the additional fiscal effort announced by the Italian authorities in July, the Commission concluded that it was no longer necessary to propose the opening of such a procedure.</span></p><span data-dcnode-id="6062" instrument_node="">
</span><p data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">The Commission also addressed a warning to Hungary and Romania for veering too far from their medium-term budgetary targets and recommended that they take action to meet them. Greece, meanwhile, was considered to have made a reasonable start on its post-programme reforms, although the implementation of some seemed to have slowed and there was a risk that certain commitments might not be met.</span></p><span data-dcnode-id="6059" instrument_node="">
</span><p data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">Tax avoidance reduces national revenues, disrupts fair competition and negatively impacts growth. As the European Semester is about coordinating national policies to ensure convergence and a strong, competitive and social Europe, fighting aggressive tax planning and working towards tax coordination is essential to protect Europe’s citizens and its competitiveness. As a result, the Commission issued country-specific recommendations to several Member States and to the euro area as a whole to address the issue of aggressive tax planning.  </span></p><span data-dcnode-id="6056" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="6053"><span data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">The Capital Markets Union</span></span></h3><span data-dcnode-id="6052" instrument_node="">
</span><p data-dcnode-id="6046"><span data-dcnode-id="6051" instrument_node="">Stable and efficient capital markets are essential for growth, jobs and investment. The </span><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/policies/capital-markets-union/" target="_blank"><span class="hyperlink_text" data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">Capital Markets Union</span></span></a><span data-dcnode-id="6047" instrument_node=""> (CMU), which comprises a mix of regulatory and non-regulatory reforms to better connect savings to investment, is an integral part of the EU’s strategy for promoting these areas. </span></p><span data-dcnode-id="6045" instrument_node="">
</span><p data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">The CMU aims to strengthen Europe’s financial system by providing alternative sources of financing and more opportunities for retail and institutional investors. This means more funding opportunities for companies, especially SMEs and start-ups such as venture capital and capital markets. A strong CMU is also necessary to complement the Banking Union in order to strengthen the Economic and Monetary Union and the international role of the euro. </span></p><span data-dcnode-id="6042" instrument_node="">
</span><p data-dcnode-id="6040"><span data-dcnode-id="6041" instrument_node="">There is a strong focus on sustainable finance, as the financial sector begins to help sustainability-conscious investors to choose suitable projects and companies. The CMU helps to channel investment in this direction, thereby contributing to the EU’s energy, climate and environment agenda.</span></p><span data-dcnode-id="6039" instrument_node="">
</span><p data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">With 11 out of 13 proposals now agreed, the CMU is set to become a true driver of investment, providing additional sources of financing to EU companies and opportunities for citizens to save for their future. Six proposals are to make the most of the Single Market through new European products, labels and passports; five are to simplify the rules for companies and investors and make them more proportionate; and two are to enhance the supervision of capital markets.</span></p><span data-dcnode-id="6036" instrument_node="">
</span><p data-dcnode-id="6026"><span data-dcnode-id="6035" instrument_node="">In April, the Parliament and the Council agreed on targeted amendments to two key pieces of financial services legislation: the </span><a data-dcnode-id="6032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/banking-and-finance/financial-markets/securities-markets/ensuring-integrity-securities-markets_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">market abuse regulation</span></span></a><span data-dcnode-id="6031" instrument_node=""> and the </span><a data-dcnode-id="6028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/banking-and-finance/financial-markets/securities-markets/securities-prospectus_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">prospectus regulation</span></span></a><span data-dcnode-id="6027" instrument_node="">. The amendments to the rules on market abuse strike a better balance between cutting red tape for small businesses and safeguarding market integrity and investor protection. </span></p><span data-dcnode-id="6025" instrument_node="">
</span><p data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">The proposed changes to the prospectus regulation will give issuers in SMEs access to growth markets to produce a lighter prospectus when transferring to a regulated market (i.e. a main stock exchange), which can lead to significant cost saving for growing businesses of this nature.</span></p><span data-dcnode-id="6022" instrument_node="">
</span><p data-dcnode-id="6016"><span data-dcnode-id="6021" instrument_node="">Another milestone towards achieving the CMU was the introduction of the </span><a data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/MEMO_19_1993" target="_blank"><span class="hyperlink_text" data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">Pan-European Personal Pension Product</span></span></a><span data-dcnode-id="6017" instrument_node=""> (PEPP), a voluntary scheme for saving for retirement to be offered by a broad range of financial providers across the EU. It will complement existing public and occupational pension systems alongside existing national private pension schemes. The regulation was adopted on 14&nbsp;June and will become applicable in 2&nbsp;years, when the first such products should come on the market.</span></p><span data-dcnode-id="6015" instrument_node="">
</span><p data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">The PEPP will offer consumers more choice, the benefit of greater competition, enhanced transparency and flexibility in product options. Mobile citizens will be able to continue contributing to the same product regardless of where they reside in the European Union. </span></p><span data-dcnode-id="6012" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">As of 31&nbsp;July, new rules entered into force to foster a cross-border distribution of investment funds. The updated framework makes this distribution simpler, quicker and cheaper and will ultimately increase competition between investment funds. Investors will enjoy more choice and better value, as well as a higher level of protection.</span></p><span data-dcnode-id="6009" instrument_node="">
</span><p data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">An agreement was also reached on a directive that will help viable companies in financial difficulties to be restructured efficiently and will allow honest entrepreneurs to benefit from a second chance after overcoming bankruptcy.</span></p><span data-dcnode-id="6006" instrument_node="">
</span><p data-dcnode-id="6000"><span data-dcnode-id="6005" instrument_node="">In March, the European Parliament and the European Council also agreed on </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1568" target="_blank"><span class="hyperlink_text" data-dcnode-id="6003"><span data-dcnode-id="6004" instrument_node="">new rules</span></span></a><span data-dcnode-id="6001" instrument_node=""> that will make it easier to finance small businesses through capital markets. The rules will cut red tape for businesses trying to access ‘SME growth markets’, a new category of trading venue dedicated to small issuers, by introducing a more proportionate approach to support their listing. </span></p><span data-dcnode-id="5999" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5996"><span data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">Boosting research, innovation and technology</span></span></h2><span data-dcnode-id="5995" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5992"><span data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">Scientific excellence and breakthrough innovation </span></span></h3><span data-dcnode-id="5991" instrument_node="">
</span><p data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">In 2019, the EU’s Horizon 2020 programme launched €11&nbsp;billion worth of funding to support research and innovation. </span></p><span data-dcnode-id="5988" instrument_node="">
</span><p data-dcnode-id="5982"><span data-dcnode-id="5987" instrument_node="">Given the growing economic importance of breakthrough and disruptive innovation, and based on the early success of the pilot phase of the </span><a data-dcnode-id="5984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/research/eic/index.cfm" target="_blank"><span class="hyperlink_text" data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">European Innovation Council</span></span></a><span data-dcnode-id="5983" instrument_node="">, the remaining 2&nbsp;years of this pilot phase will see significant expansion. Over €2&nbsp;billion of funding was approved for 2019-2020, covering the whole innovation chain: from ‘pathfinder’ projects to support advanced technologies from the non-conventional research base, to ‘accelerator’ funding to help start-ups and SMEs develop and scale up innovations to the stage where they can attract private investment.    </span></p><span data-dcnode-id="5981" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5971"><span data-dcnode-id="5980" instrument_node="">
</span><div class="img-large" data-dcnode-id="5973"><span data-dcnode-id="5979" instrument_node="">
</span><img alt="A budget breakdown of the European Union’s Horizon 2020 programme that invests in research and innovation" aria-describedby="GR15" data-dcnode-id="5978" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR15-EN.jpg&amp;raw"><span data-dcnode-id="5977" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5975" id="GR15"><span data-dcnode-id="5976" instrument_node="">The total budget for Horizon 2020 from 2014 to 2020 is 77 billion euro, of which 11 billion euro worth of calls were launched in 2019. 

										Some examples of European Union funding under this programme include: 206 million euro to transform energy-intensive sectors into competitive, low-carbon and circular industries, lowering their environmental footprint; 132 million euro to promote Europe’s lead in the next generation of batteries, supporting a low-carbon and resilient future; 135 million euro for actions contributing in diﬀerent ways to the European Union’s plastics strategy; 396 million euro to promote artiﬁcial intelligence, which is at the core of today’s most promising breakthroughs; and 116 million euro to develop new capabilities for ﬁghting and preventing cybercrime.</span></p><span data-dcnode-id="5974" instrument_node="">
</span></div><span data-dcnode-id="5972" instrument_node="">
</span></div><span data-dcnode-id="5970" instrument_node="">
