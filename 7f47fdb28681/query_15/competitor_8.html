</span><p class="gr_pubDetail" data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">Find out everything you need to know about the European Union’s achievements in 2019.</span></p><span data-dcnode-id="7020" instrument_node="">
</span><p class="gr_pubDetail" data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">The General Report on the Activities of the European Union brings you up to date on how the EU delivered on the 10 priorities set by the Juncker Commission.</span></p><span data-dcnode-id="7017" instrument_node="">
</span><p class="gr_pubDetail" data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node="">As well as the results of the European elections, find out about the changes at the top of the EU institutions, including the first actions of the new European Commission, which took office in December. </span></p><span data-dcnode-id="7014" instrument_node="">
</span><p class="gr_pubDetail" data-dcnode-id="7012"><span data-dcnode-id="7013" instrument_node="">You can find information on these and many more issues in The EU in 2019.</span></p><span data-dcnode-id="7011" instrument_node="">

</span><p class="chap_number" data-dcnode-id="6825"><span data-dcnode-id="6826"><span data-dcnode-id="6827" instrument_node="">Foreword</span></span></p><span data-dcnode-id="6824" instrument_node="">
</span><div data-dcnode-id="6805"><span data-dcnode-id="6823" instrument_node="">
</span><div class="general-report-foreword no-padding" data-dcnode-id="6807"><span data-dcnode-id="6822" instrument_node="">
</span><div class="col-xs-12 col-sm-4 col-sm-push-8 no-padding" data-dcnode-id="6818"><span data-dcnode-id="6821" instrument_node=""> </span><img alt="Ursula von der Leyen speaking at a podium" class="pull-right" data-dcnode-id="6820" id="CH00-PH00" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH00.jpg&amp;raw"><span data-dcnode-id="6819" instrument_node=""> </span></div><span data-dcnode-id="6817" instrument_node="">
</span><div class="general-report-foreword-label col-xs-12 col-sm-8 col-sm-pull-4" data-dcnode-id="6812"><span data-dcnode-id="6816" instrument_node="">
</span><p data-dcnode-id="6814"><span data-dcnode-id="6815" instrument_node="">Ursula von der Leyen, President of the European Commission.</span></p><span data-dcnode-id="6813" instrument_node="">
</span></div><span data-dcnode-id="6811" instrument_node="">
</span><span class="left-triangle" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6808" instrument_node="">
</span></div><span data-dcnode-id="6806" instrument_node="">
</span></div><span data-dcnode-id="6804" instrument_node="">
</span><div class="clearfix" data-dcnode-id="6803"></div><span data-dcnode-id="6802" instrument_node="">
</span><p class="foreword-basic" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">I am delighted to present this report on the activities of the European Union in 2019. I took office as President of the European Commission on 1&nbsp;December 2019, so I would like to pay tribute to my predecessor, Jean-Claude Juncker, under whose watch most of the achievements highlighted in this report took place. </span></p><span data-dcnode-id="6799" instrument_node="">
</span><p class="foreword-basic" data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">At the European elections last May, Europeans showed us clearly that they want the Union to lead the way and to take real action. This is why, even before the end of the year, I proposed the European Green Deal as the first initiative of the new Commission. It is our commitment to making Europe the world’s first climate-neutral continent by 2050. It is good for people, for the planet and for the economy.</span></p><span data-dcnode-id="6796" instrument_node="">
</span><p class="foreword-basic" data-dcnode-id="6794"><span data-dcnode-id="6795" instrument_node="">I hope that, like me, you find much to inspire in this report. The vast range of actions and initiatives that it describes demonstrates, once again, how much we can achieve together. </span></p><span data-dcnode-id="6793" instrument_node="">
</span><p class="foreword-basic" data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">Long live Europe. </span></p><span data-dcnode-id="6790" instrument_node="">
</span><div class="foreword-sign" data-dcnode-id="6783"><span data-dcnode-id="6789" instrument_node="">
</span><img alt="" class="foreword-sign" data-dcnode-id="6788" id="CH00-SIG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_SIG-BM.jpg&amp;raw"><span data-dcnode-id="6787" instrument_node="">
</span><p class="foreword-sign" data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node=""> Ursula von der Leyen</span></p><span data-dcnode-id="6784" instrument_node="">
</span></div><span data-dcnode-id="6782" instrument_node="">

</span><h2 data-dcnode-id="6769"><span data-dcnode-id="6772" instrument_node="">The EU in 2019: </span><br data-dcnode-id="6771"><span data-dcnode-id="6770" instrument_node="">a year of change</span></h2><span data-dcnode-id="6768" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6755"><span data-dcnode-id="6767" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="6763"><span data-dcnode-id="6766" instrument_node="">
</span><img alt="Christine Lagarde, David Sassoli, Ursula von der Leyen and Charles Michel standing at the bottom of some stairs" data-dcnode-id="6765" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH01.jpg&amp;raw"><span data-dcnode-id="6764" instrument_node="">
</span></div><span data-dcnode-id="6762" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6759"><p class="caption" data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">The new EU leaders. Christine Lagarde, President of the European Central Bank, David Sassoli, President of the European Parliament, Ursula von der Leyen, President of the European Commission, and Charles Michel, President of the European Council, attend the ceremony to mark the start of the new European Commission and the 10th anniversary of the Treaty of Lisbon at the House of European History, Brussels, Belgium, 1&nbsp;December 2019.</span></p></div><span data-dcnode-id="6758" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6757"></span><span data-dcnode-id="6756" instrument_node="">
</span></div><span data-dcnode-id="6754" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6748"><span data-dcnode-id="6753" instrument_node="">2019 brought the Juncker Commission to a close, ending a 5-year cycle that saw significant improvement in the European economy, steps taken to fulfil the EU’s commitments under the Paris Agreement on climate change, a focus on improving democracy and transparency, and the challenge of the United Kingdom’s withdrawal from the EU. European elections were held in May and </span><a data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20191029IPR65301/final-turnout-data-for-2019-european-elections-announced" target="_blank"><span class="hyperlink_text" data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">the highest voter turnout in 25&nbsp;years</span></span></a><span data-dcnode-id="6749" instrument_node=""> saw over 200&nbsp;million people cast their votes in the largest transnational democratic exercise in the world. </span></p><span data-dcnode-id="6747" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">David Sassoli became President of the European Parliament on 3&nbsp;July 2019, Charles Michel took over from Donald Tusk as President of the European Council on 1&nbsp;December and Ursula von der Leyen became President of the European Commission on the same date. </span></p><span data-dcnode-id="6744" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6731"><span data-dcnode-id="6743" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="6739"><span data-dcnode-id="6742" instrument_node="">
</span><img alt="Ursula von der Leyen and Jean-Claude Juncker smiling while unveiling his portrait together" data-dcnode-id="6741" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH02.jpg&amp;raw"><span data-dcnode-id="6740" instrument_node="">
</span></div><span data-dcnode-id="6738" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6735"><p class="caption" data-dcnode-id="6736"><span data-dcnode-id="6737" instrument_node="">Ursula von der Leyen, President of the European Commission, and Jean-Claude Juncker, former President of the European Commission, unveil his portrait in the Presidents Gallery of the European Commission Berlaymont headquarters, Brussels, Belgium, 3&nbsp;December 2019.</span></p></div><span data-dcnode-id="6734" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6733"></span><span data-dcnode-id="6732" instrument_node="">
</span></div><span data-dcnode-id="6730" instrument_node="">
</span><div data-dcnode-id="6717" style="margin-right:10px;"><span data-dcnode-id="6729" instrument_node="">
</span><button aria-controls="content_gris1" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="6719" data-target="#content_gris1" data-toggle="collapse" type="button"><span data-dcnode-id="6728" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="6725"><span data-dcnode-id="6726"><span data-dcnode-id="6727" instrument_node="">Less detail</span></span></span><span data-dcnode-id="6724" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="6721"><span data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">More detail</span></span></span><span data-dcnode-id="6720" instrument_node=""> </span></button><span data-dcnode-id="6718" instrument_node="">
</span></div><span data-dcnode-id="6716" instrument_node="">

</span><div class="general-report collapse" data-dcnode-id="6305" id="content_gris1"><span data-dcnode-id="6713" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6710"><span data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">European Parliament elections</span></span></h3><span data-dcnode-id="6709" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">From 23 to 26&nbsp;May 2019, elections were held across the 28 Member States of the EU to choose the people’s representatives to the European Parliament. A total of 751 Members of the European Parliament (MEPs) were elected, and shifts in voter preferences changed the political distribution of seats. </span></p><span data-dcnode-id="6706" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">For the first time in decades, a majority of eligible voters across the EU cast a vote. This was also the first time since 1979 (the first direct elections to the European Parliament) that the overall voter turnout increased, from 42.6&nbsp;% in 2014 to 50.7&nbsp;%. There was also a high level of mobilisation among younger voters, with a 14&nbsp;% increase in voters aged 16 or 18 to 24 and a 12&nbsp;% increase in voters aged 25 to 39. </span></p><span data-dcnode-id="6703" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6697"><span data-dcnode-id="6702" instrument_node="">The </span><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/at-your-service/files/be-heard/eurobarometer/2019/election2019/EB915_SP_EUROBAROMETER_POSTEE19_FIRSTRESULTS_EN.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">Eurobarometer survey</span></span></a><span data-dcnode-id="6698" instrument_node=""> following the elections showed that people were motivated to vote primarily because of concerns about the economy and climate change. </span></p><span data-dcnode-id="6696" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">The European Parliament and the European Commission worked closely together ahead of the elections, both at EU level and on the ground in Member States, to mobilise citizens and empower them to take informed decisions on Europe’s future. Building on this experience, on 5&nbsp;December both institutions signed an agreement on joint communication at the service of citizens and democracy in order to deepen their cooperation beyond the elections.  </span></p><span data-dcnode-id="6693" instrument_node="">
</span><div class="newvideo2" data-dcnode-id="6677"><span data-dcnode-id="6692" instrument_node="">
</span><div class="newvideo_videobox col-sm-12 col-xs-12 col-md-8 col-8" data-dcnode-id="6687"><span data-dcnode-id="6691" instrument_node="">
</span><img alt="A video on the European Parliament’s voting campaign" class="GR_2015-video-poster" data-dcnode-id="6690" data-source="//europa.eu/webtools/crs/iframe/?oriurl=//multimedia.europarl.europa.eu/x_N01-PUB-190526-BEST_ev?p_p_state=pop_up&amp;lang=en&amp;autoplay=off" data-target="CH00_VD01" data-videotype="ec" id="VD01_CH00" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/VD01_CH00.jpg&amp;raw" style="cursor: pointer;"><iframe allowfullscreen="true" data-dcnode-id="6689" frameborder="0" height="214" id="CH00_VD01" mozallowfullscreen="true" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/en&amp;raw" style="display: none;" webkitallowfullscreen="true" width="380"></iframe><span data-dcnode-id="6688" instrument_node="">
</span></div><span data-dcnode-id="6686" instrument_node="">
</span><div class="newvideo_textbox col-sm-12 col-xs-12 col-md-4 col-4" data-dcnode-id="6681"><span data-dcnode-id="6685" instrument_node="">
</span><p class="video-caption" data-dcnode-id="6683"><span data-dcnode-id="6684" instrument_node="">‘This time I’m voting’, a campaign launched by the European Parliament in collaboration with other EU institutions, encourages the public to take the future of the European project into their own hands.© European Parliament, 2019</span></p><span data-dcnode-id="6682" instrument_node="">
</span></div><span data-dcnode-id="6680" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6679"></span><span data-dcnode-id="6678" instrument_node="">
</span></div><span data-dcnode-id="6676" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6664"><span data-dcnode-id="6675" instrument_node="">
</span><div class="img-large" data-dcnode-id="6668"><span data-dcnode-id="6674" instrument_node="">
</span><img alt="Graphic showing voter turnout in the European elections by year since 2004." aria-describedby="GR01" data-dcnode-id="6673" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR01-EN.jpg&amp;raw"><span data-dcnode-id="6672" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6670" id="GR01"><span data-dcnode-id="6671" instrument_node="">Voter turnout in the last four European Parliament elections was 45.5 % in 2004, 43 % in 2009, 42.6 % in 2014 and 50.7 % in 2019.
				
										Source: European Parliament in collaboration with Kantar.</span></p><span data-dcnode-id="6669" instrument_node="">
</span></div><span data-dcnode-id="6667" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6666"></span><span data-dcnode-id="6665" instrument_node="">
</span></div><span data-dcnode-id="6663" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6660"><span data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">European Parliament 2019-2024</span></span></h3><span data-dcnode-id="6659" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">The European People’s Party remained the biggest group in Parliament, winning 182 seats out of 751, closely followed by the Progressive Alliance of Socialists and Democrats, with 154 seats. Despite holding on to their top spots, both groups lost voters to the right and the left sides of the spectrum. Renew Europe, The Greens/European Free Alliance and Identity and Democracy all made significant gains compared to the previous parliamentary elections. The total number of female MEPs reached 40.4&nbsp;%, the highest level since European elections began in 1979. </span></p><span data-dcnode-id="6656" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">On 1&nbsp;July, the outgoing European Parliament held the last session of its eighth term, and the new Parliament met for its constituent session in Strasbourg the following day. </span></p><span data-dcnode-id="6653" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">During the first plenary session of the new Parliament, MEPs elected their new president and vice-presidents. On 3&nbsp;July, the long-serving Italian MEP David Sassoli was elected president.        The 14 vice-presidents were elected on the same day and hail from six political groups and 10 Member States. </span></p><span data-dcnode-id="6650" instrument_node="">
</span><div class="c1-chart img_caption_photo3" data-dcnode-id="6638"><span data-dcnode-id="6649" instrument_node="">
</span><div class="img-large" data-dcnode-id="6642"><span data-dcnode-id="6648" instrument_node="">
</span><img alt="Graphic showing the distribution of seats among political groups in the European Parliament after the 2019 elections." aria-describedby="GR02" data-dcnode-id="6647" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR02-EN.jpg&amp;raw"><span data-dcnode-id="6646" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6644" id="GR02"><span data-dcnode-id="6645" instrument_node="">In 2019, the European Parliament was composed of 751 Members of the European Parliament divided into seven political groups. These were, from left to right politically: the European United Left ‒ Nordic Green Left, with 41 seats; the Progressive Alliance of Socialists and Democrats, with 154 seats; the Greens/European Free Alliance, with 74 seats; Renew Europe, with 108 seats; the European People’s Party, with 182 seats; the European Conservatives and Reformists, with 62 seats; and Identity and Democracy, with 73 seats. In addition, non-attached members held 57 seats.

										Source: European Parliament

										Copyright: European Union</span></p><span data-dcnode-id="6643" instrument_node="">
</span></div><span data-dcnode-id="6641" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6640"></span><span data-dcnode-id="6639" instrument_node="">
</span></div><span data-dcnode-id="6637" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6624"><span data-dcnode-id="6636" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="6628"><span data-dcnode-id="6635" instrument_node="">
</span><p class="caption grey-fg" data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">Citizens voted in these European elections based on a very strong support for the EU and with a much stronger belief that their voice counts in the EU</span></p><span data-dcnode-id="6632" instrument_node="">
</span><p class="caption" data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">David Sassoli, President of the European Parliament</span></p><span data-dcnode-id="6629" instrument_node="">
</span></div><span data-dcnode-id="6627" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6626"></span><span data-dcnode-id="6625" instrument_node="">
</span></div><span data-dcnode-id="6623" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6620"><span data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">European Council</span></span></h3><span data-dcnode-id="6619" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">First elected on 1&nbsp;December 2014, Donald Tusk ended his second term as President of the European Council 5&nbsp;years later. On 2&nbsp;July 2019, EU leaders elected Charles Michel to replace him. He took up his post on 1&nbsp;December. </span></p><span data-dcnode-id="6616" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6603"><span data-dcnode-id="6615" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="6611"><span data-dcnode-id="6614" instrument_node="">
</span><img alt="A portrait of Charles Michel" data-dcnode-id="6613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH03.jpg&amp;raw"><span data-dcnode-id="6612" instrument_node="">
</span></div><span data-dcnode-id="6610" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6607"><p class="caption" data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Charles Michel, President of the European Council.</span></p></div><span data-dcnode-id="6606" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="6605"></span><span data-dcnode-id="6604" instrument_node="">
</span></div><span data-dcnode-id="6602" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6599"><span data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">European Commission</span></span></h3><span data-dcnode-id="6598" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6592"><span data-dcnode-id="6597" instrument_node="">In June, EU leaders proposed Ursula von der Leyen as their candidate for President of the Commission. The following month, she presented her </span><a data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/political-guidelines-next-commission_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">political priorities</span></span></a><span data-dcnode-id="6593" instrument_node=""> to guide the Commission’s work over the next 5&nbsp;years.  </span></p><span data-dcnode-id="6591" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="6571"><span data-dcnode-id="6590" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="6573"><span data-dcnode-id="6589" instrument_node="">
</span><div class="orla" data-dcnode-id="6587"><span data-dcnode-id="6588" instrument_node="">COLLEGE OF COMMISSIONERS 2019-2024</span></div><span data-dcnode-id="6586" instrument_node="">
</span><span data-dcnode-id="6584" instrument_node="">
</span><img alt="Portraits and portfolios of the individual members of the College of Commissioners between 2019 and 2024." aria-describedby="GR03-1" data-dcnode-id="6583" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR03-1-EN.jpg&amp;raw"><span data-dcnode-id="6582" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6580" id="GR03-1"><span data-dcnode-id="6581" instrument_node="">The College of Commissioners for the term 2019 to 2024 is composed as follows.

										Ursula von der Leyen, President of the European Commission; Frans Timmermans, Executive Vice-President for the European Green Deal; Margrethe Vestager, Executive Vice-President for A Europe Fit for the Digital Age; Valdis Dombrovskis, Executive Vice-President for An Economy that Works for People; Josep Borrell Fontelles, High Representative/Vice-President for A Stronger Europe in the World; Maroš Šefčovič, Vice-President for Interinstitutional Relations and Foresight; Věra Jourová, Vice-President for Values and Transparency; Dubravka Šuica, Vice-President for Democracy and Demography; Margaritis Schinas, Vice-President for Promoting our European Way of Life; Johannes Hahn, Commissioner for Budget and Administration; Phil Hogan, Commissioner for Trade; Mariya Gabriel, Commissioner for Innovation, Research, Culture, Education and Youth; Nicolas Schmit, Commissioner for Jobs and Social Rights; Paolo Gentiloni, Commissioner for Economy; Janusz Wojciechowski, Commissioner for Agriculture; Thierry Breton, Commissioner for Internal Market; Elisa Ferreira, Commissioner for Cohesion and Reforms; Stella Kyriakides, Commissioner for Health and Food Safety; Didier Reynders, Commissioner for Justice; Helena Dalli, Commissioner for Equality; Ylva Johansson, Commissioner for Home Affairs; Janez Lenarčič, Commissioner for Crisis Management; Adina Vălean, Commissioner for Transport; Olivér Várhelyi, Commissioner for Neighbourhood and Enlargement; Jutta Urpilainen, Commissioner for International Partnerships; Kadri Simson, Commissioner for Energy; Virginijus Sinkevičius, Commissioner for Environment, Oceans and Fisheries.

										Source:  European Commission

										Copyright: European Union</span></p><span data-dcnode-id="6579" instrument_node="">
</span><img alt="Portraits and portfolios of the individual members of the College of Commissioners between 2019 and 2024." aria-describedby="GR03-2" data-dcnode-id="6578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_GR03-2-EN.jpg&amp;raw"><span data-dcnode-id="6577" instrument_node="">
</span><p class="longdesc" data-dcnode-id="6575" id="GR03-2"><span data-dcnode-id="6576" instrument_node="">The College of Commissioners for the term 2019 to 2024 is composed as follows.

										Ursula von der Leyen, President of the European Commission; Frans Timmermans, Executive Vice-President for the European Green Deal; Margrethe Vestager, Executive Vice-President for A Europe Fit for the Digital Age; Valdis Dombrovskis, Executive Vice-President for An Economy that Works for People; Josep Borrell Fontelles, High Representative/Vice-President for A Stronger Europe in the World; Maroš Šefčovič, Vice-President for Interinstitutional Relations and Foresight; Věra Jourová, Vice-President for Values and Transparency; Dubravka Šuica, Vice-President for Democracy and Demography; Margaritis Schinas, Vice-President for Promoting our European Way of Life; Johannes Hahn, Commissioner for Budget and Administration; Phil Hogan, Commissioner for Trade; Mariya Gabriel, Commissioner for Innovation, Research, Culture, Education and Youth; Nicolas Schmit, Commissioner for Jobs and Social Rights; Paolo Gentiloni, Commissioner for Economy; Janusz Wojciechowski, Commissioner for Agriculture; Thierry Breton, Commissioner for Internal Market; Elisa Ferreira, Commissioner for Cohesion and Reforms; Stella Kyriakides, Commissioner for Health and Food Safety; Didier Reynders, Commissioner for Justice; Helena Dalli, Commissioner for Equality; Ylva Johansson, Commissioner for Home Affairs; Janez Lenarčič, Commissioner for Crisis Management; Adina Vălean, Commissioner for Transport; Olivér Várhelyi, Commissioner for Neighbourhood and Enlargement; Jutta Urpilainen, Commissioner for International Partnerships; Kadri Simson, Commissioner for Energy; Virginijus Sinkevičius, Commissioner for Environment, Oceans and Fisheries.

										Source:  European Commission

										Copyright: European Union</span></p><span data-dcnode-id="6574" instrument_node="">
</span></div><span data-dcnode-id="6572" instrument_node="">
</span></div><span data-dcnode-id="6570" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">On 16&nbsp;July, the European Parliament elected Ursula von der Leyen as the next President of the European Commission, the first time a woman has been chosen for this post. In consultation with national leaders, she put together a College of Commissioners, nominated by 26 Member States, with a strong emphasis on creating a gender-balanced team that includes 12 women, including von der Leyen. </span></p><span data-dcnode-id="6567" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">Following the hearings for each Commissioner-designate and a parliamentary debate, the Parliament approved von der Leyen’s College of Commissioners in a plenary vote on 27&nbsp;November. The new Commission took office on 1&nbsp;December. </span></p><span data-dcnode-id="6564" instrument_node="">

</span><img alt="David Sassoli and Ursula von der Leyen posing together with an official document" data-dcnode-id="6561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH00_PH04.jpg&amp;raw"><span data-dcnode-id="6560" instrument_node="">
</span></div><span data-dcnode-id="6558" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="6555"><p class="caption" data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">David Sassoli, President of the European Parliament, and Ursula von der Leyen, President-elect of the European Commission, at a plenary session of the European Parliament, Strasbourg, France, 16&nbsp;July 2019.</span></p></div><span data-dcnode-id="6554" instrument_node="">

</span></div><span data-dcnode-id="6550" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="6547"><span data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">European Central Bank</span></span></h3><span data-dcnode-id="6546" instrument_node="">
</span><p class="myjustify" data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">The outgoing President of the European Central Bank, Mario Draghi, completed his 8-year term on 31&nbsp;October 2019. The former Director of the International Monetary Fund, Christine Lagarde, took over on 1&nbsp;November. She is the first woman to head the bank.</span></p><span data-dcnode-id="6543" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="6525"><span data-dcnode-id="6542" instrument_node="">
