</span><div class="general-report" data-dcnode-id="5269" id="chapter3"><span data-dcnode-id="5320" instrument_node="">
</span><p class="chap_number" data-dcnode-id="5317"><span data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Chapter 3</span></span></p><span data-dcnode-id="5316" instrument_node="">
</span><h1 data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">A resilient Energy Union with a forward-looking climate change policy</span></h1><span data-dcnode-id="5313" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="5303"><span data-dcnode-id="5312" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="5305"><span data-dcnode-id="5311" instrument_node="">
</span><img alt="An engineer with a hard hat and high-visibility overalls stands in the foreground of a wind turbine farm. (© Fotolia)" class="height_width_100pct" data-dcnode-id="5310" id="PC03-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH03.jpg&amp;raw"><span data-dcnode-id="5309" instrument_node="">
</span><p class="caption" data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">© Fotolia</span></p><span data-dcnode-id="5306" instrument_node="">
</span></div><span data-dcnode-id="5304" instrument_node="">
</span></div><span data-dcnode-id="5302" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">The climate crisis remained at the top of the political agenda in 2019 amid growing calls for more ambitious global action as the impacts of climate change continued to be felt across Europe and the world.</span></p><span data-dcnode-id="5299" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">The EU has proven to be a climate leader on the world stage by putting in place legislation to deliver and go beyond its commitments to the Paris Agreement and adopting a long-term strategy to make Europe the world’s first climate-neutral continent by 2050. In December, this ambition took a massive leap forward with the unveiling of the European Green Deal, the flagship policy of the von der Leyen Commission. The deal will help us to produce, move, consume and live in a more environmentally responsible way while leaving no individual or region behind.</span></p><span data-dcnode-id="5296" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5294"><span data-dcnode-id="5295" instrument_node="">The completion of the Energy Union solidified Europe’s position as a global leader in energy efficiency and renewable-energy technologies and will underpin the clean-energy transition in all sectors of the economy. Member States submitted the first draft of their energy and climate plans for assessment to the Commission under new governance rules. </span></p><span data-dcnode-id="5293" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">The EU is accelerating its transition towards a circular economy, with all 54 actions under the Circular Economy Action Plan now delivered. New EU rules to ban certain single-use plastics entered into force in July and should now be transposed into national legislation by Member States.</span></p><span data-dcnode-id="5290" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5285"><span data-dcnode-id="5289" instrument_node="">The EU continued its efforts to strengthen finance to bring innovative low-carbon technologies to market, and good progress was made in decarbonising the transport sector with the adoption of important measures to reduce CO</span><span class="basic-subscript" data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">2</span></span><span data-dcnode-id="5286" instrument_node=""> emissions from road vehicles and shipping.</span></p><span data-dcnode-id="5284" instrument_node="">
</span><div data-dcnode-id="5271"><span data-dcnode-id="5283" instrument_node="">
</span><button aria-controls="content3" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="5273" data-target="#content3" data-toggle="collapse" type="button"><span data-dcnode-id="5282" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="5279"><span data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Less detail</span></span></span><span data-dcnode-id="5278" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="5275"><span data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">More detail</span></span></span><span data-dcnode-id="5274" instrument_node=""> </span></button><span data-dcnode-id="5272" instrument_node="">
</span></div><span data-dcnode-id="5270" instrument_node="">
</span></div><span data-dcnode-id="5268" instrument_node="">
</span><div class="clearfix" data-dcnode-id="5267"></div><span data-dcnode-id="5266" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="4740" id="content3"><span data-dcnode-id="5265" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5262"><span data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">A climate-neutral Europe by 2050 </span></span></h2><span data-dcnode-id="5261" instrument_node="">
</span><p data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">Climate change and environmental degradation present an existential threat to Europe and the world. To overcome this challenge, Europe needs a new growth model that transforms the European Union into a modern, resource-efficient and competitive economy where there are no net emissions of greenhouse gases by 2050, where economic growth is decoupled from resource use and where no one and no region is left behind.</span></p><span data-dcnode-id="5258" instrument_node="">
</span><p data-dcnode-id="5248"><span data-dcnode-id="5257" instrument_node="">In 2018, the Commission presented its </span><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/strategies/2050_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">vision</span></span></a><span data-dcnode-id="5253" instrument_node=""> for a climate-neutral EU by 2050 based on seven building blocks: increased energy efficiency; increased use of renewables; a clean and connected mobility system; a competitive circular economy industry; connected high-standard infrastructures; a boost in the bio-economy and natural carbon sinks; and the use of carbon capture and storage. Following an extensive stakeholder debate, and in the light of the Green Deal Communication presented by President von der Leyen, this objective was endorsed by the  </span><a data-dcnode-id="5250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/env/2019/12/19/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">European Council in December 2019</span></span></a><span data-dcnode-id="5249" instrument_node="">.</span></p><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5237"><span data-dcnode-id="5246" instrument_node="">The EU already has a strong track record in reducing greenhouse gas emissions while maintaining economic growth: in 2018, emissions were 23&nbsp;% lower than in 1990, while the economy grew by 61&nbsp;% </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eea.europa.eu/publications/trends-and-projections-in-europe-1" target="_blank"><span class="hyperlink_text" data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">over the same period</span></span></a><span data-dcnode-id="5242" instrument_node="">. However, more needs to be done. Given its extensive experience, the EU is leading the way in creating a green and inclusive economy with the </span><a data-dcnode-id="5239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/priorities/european-green-deal_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">European Green Deal</span></span></a><span data-dcnode-id="5238" instrument_node="">, the flagship policy of the von der Leyen Commission, presented in December. At the heart of the Green Deal is a commitment to make Europe the first climate-neutral continent by 2050.</span></p><span data-dcnode-id="5236" instrument_node="">
</span><p data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">The deal makes a quantum leap forward in making it a reality on the ground. It resets the Commission’s commitment to tackling climate- and environment-related challenges and sets the path for action in the months and years ahead. For more information, see the section ‘The EU in 2019: a year of change’.  </span></p><span data-dcnode-id="5233" instrument_node="">
</span><p data-dcnode-id="5230"><span data-dcnode-id="5232" instrument_node="">To underline the EU’s commitment, the first European climate law will enshrine the 2050 neutrality objective in legislation. Most importantly, the Green Deal sets a path for a transition that is just and socially fair. It is designed in such a way as to leave no individual or region behind in the great transformation ahead.</span><a data-dcnode-id="5231" id="_idTextAnchor000"></a></p><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5223"><span data-dcnode-id="5228" instrument_node="">The European Union is the </span><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_5534" target="_blank"><span class="hyperlink_text" data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">first major economy to turn its Paris Agreement commitments into binding laws</span></span></a><span data-dcnode-id="5224" instrument_node=""> and has already exceeded its target to reduce emissions by 20&nbsp;% by 2020. If all measures agreed are fully implemented, it would surpass its target to reduce them by 40&nbsp;% by 2030. However, even more ambitious targets are needed, and the Green Deal will raise this target to at least 50&nbsp;% (and towards 55&nbsp;%) compared with 1990 levels.</span></p><span data-dcnode-id="5222" instrument_node="">
</span><p data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">The EU has already started to modernise and transform the economy. In 2019, climate action continued on all fronts: from making our vehicles and air cleaner and investing in technological solutions to taking action to protect our forests and empowering people to play their individual part.</span></p><span data-dcnode-id="5219" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5206"><span data-dcnode-id="5218" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5214"><span data-dcnode-id="5217" instrument_node="">
</span><img alt="A United Nations Climate Change Conference COP25 participant walks towards the European Union-branded area of the conference" data-dcnode-id="5216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_PH15.jpg&amp;raw"><span data-dcnode-id="5215" instrument_node="">
</span></div><span data-dcnode-id="5213" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5210"><p class="caption" data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">The EU pavilion at the UN Climate Change Conference COP25, Madrid, Spain, 3&nbsp;December 2019.</span></p></div><span data-dcnode-id="5209" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5208"></span><span data-dcnode-id="5207" instrument_node="">
</span></div><span data-dcnode-id="5205" instrument_node="">
</span><p data-dcnode-id="5199"><span data-dcnode-id="5204" instrument_node="">In line with new rules on the governance of the Energy Union, for the first time Member States developed draft integrated national energy and climate plans. A </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/ip_19_2993" target="_blank"><span class="hyperlink_text" data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Commission assessment</span></span></a><span data-dcnode-id="5200" instrument_node=""> of the draft plans, published in June, showed that greater ambition was needed in the final plans that Member States were to submit by the end of the year in order to achieve the EU’s climate goals.  </span></p><span data-dcnode-id="5198" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5188"><span data-dcnode-id="5197" instrument_node="">
</span><div class="img-large" data-dcnode-id="5190"><span data-dcnode-id="5196" instrument_node="">
</span><img alt="Graph showing the reduction of greenhouse gasses since 1990 and emissions targets up to 2030" aria-describedby="GR21" data-dcnode-id="5195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR21-EN.jpg&amp;raw"><span data-dcnode-id="5194" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5192" id="GR21"><span data-dcnode-id="5193" instrument_node="">The course is set for the 2030 target of reducing greenhouse gas emissions by at least 40 %. Between 1990 and 2018, the European Union already reduced greenhouse gas emissions by 23 %, exceeding the 20 % target set for 2020. Further estimates predict an overall reduction of 45 % by 2030, 5 percentage points more than the original target for that year (40 %).

								Source: Council of the European Union</span></p><span data-dcnode-id="5191" instrument_node="">
</span></div><span data-dcnode-id="5189" instrument_node="">
</span></div><span data-dcnode-id="5187" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5184"><span data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">Working internationally to fight climate change</span></span></h3><span data-dcnode-id="5183" instrument_node="">
</span><p data-dcnode-id="5173"><span data-dcnode-id="5182" instrument_node="">With EU emissions making up only around 9&nbsp;% of the global total, it is clear that Europe cannot tackle climate change alone and that all countries have to work together to find a solution. The </span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/09/23/speech-by-president-donald-tusk-at-the-un-climate-action-summit/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">UN Climate Action Summit</span></span></a><span data-dcnode-id="5178" instrument_node=""> held in New York in September provided the EU with an opportunity to discuss with its partners how to be more ambitious and accelerate action to implement the Paris Agreement. The Commission prepared for the UN Summit by </span><a data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_5534" target="_blank"><span class="hyperlink_text" data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">adopting a Communication</span></span></a><span data-dcnode-id="5174" instrument_node=""> that reaffirmed the EU’s commitment to accelerated climate ambition. </span></p><span data-dcnode-id="5172" instrument_node="">
</span><p data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">In December, EU negotiators attended the UN Climate Change Conference COP25 in Madrid. Successful agreements on the second review of the Warsaw International Mechanism and the creation of a Gender Action Plan provided some encouraging news.</span></p><span data-dcnode-id="5169" instrument_node="">
</span><p data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Despite the efforts of the EU delegation to achieve consensus on the issue of international carbon markets, COP25 has not delivered the ambitious outcome that the world needs and that many wished for. But that reinforces the need for Europe to take leadership with the Green Deal and to engage with international partners. 2020 will see increased global climate ambitions: by COP26 in Glasgow in November, parties need to update their Nationally Determined Contributions and submit long-term strategies in line with the Paris Agreement objectives. The EU is ready for this. </span></p><span data-dcnode-id="5166" instrument_node="">
</span><p data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">The global phase-down of hydrofluorocarbons, harmful climate-warming gases commonly used in heating and cooling equipment, began on 1&nbsp;January 2019. The action, spearheaded by the EU, is expected to make a significant contribution to the Paris Agreement objective of keeping global temperature rise well below 2&nbsp;°C.</span></p><span data-dcnode-id="5163" instrument_node="">
</span><p data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">Throughout the year, the EU continued its international outreach and cooperation on climate issues. In June, the Commission, Canada and China co-hosted a major international climate meeting in Brussels; the third Ministerial on Climate Action brought together high-level representatives from over 30 countries, including ministers from the G20. </span></p><span data-dcnode-id="5160" instrument_node="">
</span><p data-dcnode-id="5154"><span data-dcnode-id="5159" instrument_node="">The EU remains strongly committed to supporting climate action in developing countries. Along with its Member States, it </span><a data-dcnode-id="5156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/11/08/climate-finance-eu-and-member-states-contributions-up-to-21-7-billion-in-2018/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">remains</span></span></a><span data-dcnode-id="5155" instrument_node=""> the largest provider of public climate finance, contributing €21.7&nbsp;billion to developing countries in 2018, up from €20.4&nbsp;billion in 2017.</span></p><span data-dcnode-id="5153" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5140"><span data-dcnode-id="5152" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5148"><span data-dcnode-id="5151" instrument_node="">
</span><img alt="A group of people holding up a ‘European Union Beach Clean-up’ banner on the beach" data-dcnode-id="5150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_PH16.jpg&amp;raw"><span data-dcnode-id="5149" instrument_node="">
</span></div><span data-dcnode-id="5147" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5144"><p class="caption" data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">EU staff work with local communities to clean up marine litter as part of the global #EUBeachCleanUp campaign, Koh Sak, Thailand, 13&nbsp;September 2019.</span></p></div><span data-dcnode-id="5143" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5142"></span><span data-dcnode-id="5141" instrument_node="">
</span></div><span data-dcnode-id="5139" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5136"><span data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">Completing a modern and ambitious Energy Union</span></span></h2><span data-dcnode-id="5135" instrument_node="">
</span><p data-dcnode-id="5117"><span data-dcnode-id="5134" instrument_node="">Launched in 2015, the </span><a data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/energy/en/topics/energy-strategy/energy-union" target="_blank"><span class="hyperlink_text" data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">Energy Union</span></span></a><span data-dcnode-id="5130" instrument_node=""> strategy set out to give European households and businesses secure, sustainable, competitive and affordable energy. The </span><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/4th-state-energy-union_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">Fourth report on the state of the Energy Union</span></span></a><span data-dcnode-id="5126" instrument_node=""> showed that the Commission has </span><a data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/news/energy-union-vision-reality-2019-apr-09-0_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">fully delivered</span></span></a><span data-dcnode-id="5122" instrument_node=""> on its vision for the strategy. Among the main achievements was the </span><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/clean-energy-all-europeans-package-completed-good-consumers-good-growth-and-jobs-and-good-planet-2019-may-22_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">completion in May</span></span></a><span data-dcnode-id="5118" instrument_node=""> of the ‘Clean Energy for All Europeans’ legislative package, made up of eight pieces of legislation. This will radically transform Europe’s energy system, making it climate-friendly and putting it at the service of consumers and Europe’s economy and competitiveness.</span></p><span data-dcnode-id="5116" instrument_node="">
</span><p data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">The package includes new and ambitious targets for 2030: an increase of at least 32.5&nbsp;% in energy efficiency and a share of at least 32&nbsp;% from renewables in energy use. It comprehensively reforms electricity markets to help integrate renewables into the grid and ensures everyone can participate in the energy transition by empowering consumers and communities to generate their own electricity. Crucially, the new rules will end subsidies to the most polluting plants.</span></p><span data-dcnode-id="5113" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5103"><span data-dcnode-id="5112" instrument_node="">
</span><div class="img-large" data-dcnode-id="5105"><span data-dcnode-id="5111" instrument_node="">
</span><img alt="A summary of energy-efficiency action in the European Union" aria-describedby="GR22" data-dcnode-id="5110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR22-EN.jpg&amp;raw"><span data-dcnode-id="5109" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5107" id="GR22"><span data-dcnode-id="5108" instrument_node="">The European Union has set a new energy-efficiency target of at least 32.5 % by 2030. In addition, clearer and simpler energy-efficiency labelling rules help households save almost 150 euro per year, and 18 billion euro from the European Structural and Investment Funds has been allocated to energy efficiency between 2014 and 2020. 900 000 people are currently employed in the energy-efficiency sector in Europe. 

										Source:  European Commission</span></p><span data-dcnode-id="5106" instrument_node="">
</span></div><span data-dcnode-id="5104" instrument_node="">
</span></div><span data-dcnode-id="5102" instrument_node="">
</span><p data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">The EU also adopted a new set of clearer and simpler energy labels that will help consumers save energy (the equivalent to Denmark’s annual energy consumption) and money (on average €150 per year per household) by 2030. In addition, in October, the Commission adopted new measures to make household appliances such as refrigerators, washing machines, dishwashers and televisions more sustainable. For the first time this includes requirements for repairability and recyclability, contributing to a circular economy.</span></p><span data-dcnode-id="5099" instrument_node="">
</span><p data-dcnode-id="5089"><span data-dcnode-id="5098" instrument_node="">In November, the Commission </span><a data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/regional_policy/en/newsroom/news/2019/05/05-08-2019-commission-presents-results-of-initiative-supporting-regions-in-industrial-transition" target="_blank"><span class="hyperlink_text" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">presented</span></span></a><span data-dcnode-id="5094" instrument_node=""> the first results of an initiative launched in 2018 to help 10 EU regions and two Member States in industrial transition build resilient and low-carbon economies. This saw the launch of 12 pilot schemes to overcome specific obstacles, with each scheme receiving an EU grant worth €300&nbsp;000. The Commission also continued its efforts to support </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/energy/en/topics/oil-gas-and-coal/EU-coal-regions/coal-regions-transition" target="_blank"><span class="hyperlink_text" data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">coal regions in transition</span></span></a><span data-dcnode-id="5090" instrument_node=""> to foster a ‘just transition’ where no region is left behind.</span></p><span data-dcnode-id="5088" instrument_node="">
</span><p data-dcnode-id="5082"><span data-dcnode-id="5087" instrument_node="">In February, </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/26-european-islands-launch-clean-energy-transition-2019-feb-18_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">26 European islands</span></span></a><span data-dcnode-id="5083" instrument_node=""> launched their clean-energy transition. They will publish their agendas by mid 2020.&nbsp;</span></p><span data-dcnode-id="5081" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5078"><span data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">Energy security and solidarity</span></span></h2><span data-dcnode-id="5077" instrument_node="">
</span><p data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">The security of energy supply for EU consumers is an essential element of the Energy Union. As part of this effort, an agreement was reached to ensure that all gas pipelines to and from non-EU countries comply with EU energy legislation.</span></p><span data-dcnode-id="5074" instrument_node="">
</span><p data-dcnode-id="5068"><span data-dcnode-id="5073" instrument_node="">To strengthen the security of supply in the Baltic states, the Commission and Estonia, Latvia, Lithuania and Poland </span><a data-dcnode-id="5070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_3337" target="_blank"><span class="hyperlink_text" data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">signed</span></span></a><span data-dcnode-id="5069" instrument_node=""> a political roadmap setting electricity markets on their way to being synchronised with the continental European network via Poland. The EU awarded a grant worth €323&nbsp;million in support of the project.</span></p><span data-dcnode-id="5067" instrument_node="">
</span><p data-dcnode-id="5061"><span data-dcnode-id="5066" instrument_node="">The EU continued investing in safe and sustainable energy infrastructure through the Connecting Europe Facility, including €800&nbsp;million for priority energy infrastructure and €750&nbsp;million for projects with major cross-border benefits. Another €214.9&nbsp;million was granted to the Baltic Pipe gas infrastructure project </span><a data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/energy-union-commission-endorse-baltic-pipe-project-pipeline-unites-creating-new-gas-supply-corridor-european-market-2019-apr-15_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">connecting Poland and Denmark with Norway</span></span></a><span data-dcnode-id="5062" instrument_node="">.</span></p><span data-dcnode-id="5060" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5050"><span data-dcnode-id="5059" instrument_node="">
</span><div class="img-large" data-dcnode-id="5052"><span data-dcnode-id="5058" instrument_node="">
</span><img alt="A summary of energy security action in the European Union" aria-describedby="GR23" data-dcnode-id="5057" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR23-EN.jpg&amp;raw"><span data-dcnode-id="5056" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5054" id="GR23"><span data-dcnode-id="5055" instrument_node="">Over 30 projects of common interest have been implemented in the field of energy security and 75 others will be implemented by 2022. The Connecting Europe Facility has received 3.4 billion euro in energy funding since 2014 and an additional 1.3 billion euro from the European Fund for Strategic Investments has been allocated to energy security. In total, European Union public funding in energy infrastructure has leveraged total investments of around 50 billion euro.</span></p><span data-dcnode-id="5053" instrument_node="">
</span></div><span data-dcnode-id="5051" instrument_node="">
</span></div><span data-dcnode-id="5049" instrument_node="">
</span><p data-dcnode-id="5043"><span data-dcnode-id="5048" instrument_node="">Tackling cybersecurity issues in the energy sector has become a top priority, as all Europeans depend on the availability of energy. To address potential threats, the EU adopted a </span><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/energy/sites/ener/files/commission_recommendation_on_cybersecurity_in_the_energy_sector_c2019_2400_final.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">recommendation</span></span></a><span data-dcnode-id="5044" instrument_node=""> that provides guidance on how to address specific cybersecurity challenges.</span></p><span data-dcnode-id="5042" instrument_node="">
</span><p data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">The EU continued working on safe, secure and innovative applications of nuclear science and technology for purposes other than generating nuclear energy. Cooperation with non-EU countries to ensure the highest level of nuclear safety continued throughout 2019. </span></p><span data-dcnode-id="5039" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5036"><span data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">Decarbonising the economy </span></span></h2><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5029"><span data-dcnode-id="5034" instrument_node="">The EU Emissions Trading System continued to show positive results, with </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/news/emissions-trading-emissions-have-decreased-39-2018_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">emissions from installations falling</span></span></a><span data-dcnode-id="5030" instrument_node=""> by 4.1&nbsp;% in 2018 compared to 2017. </span></p><span data-dcnode-id="5028" instrument_node="">
</span><p data-dcnode-id="5022"><span data-dcnode-id="5027" instrument_node="">To address the current surplus of allowances in the system, a </span><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/ets/reform_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">market stability reserve</span></span></a><span data-dcnode-id="5023" instrument_node=""> began operating in January. This will improve the system’s resilience to major shocks by adjusting the supply of allowances to be auctioned. The EU increased the incentive for businesses to reduce their emissions by placing almost 400&nbsp;million allowances from the system in the reserve between September 2019 and August 2020, thereby increasing the price of emissions and making clean technologies more cost effective. Higher prices in the European carbon market in 2018 led to a record amount of revenue for Member States, generating some €14&nbsp;billion – more than double the amount in 2017. </span></p><span data-dcnode-id="5021" instrument_node="">
</span><p data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">In December, the EU and Switzerland completed the process enabling them to link their emissions trading systems. From 2020, allowances from both systems can be used for compliance to compensate for emissions occurring in either system. This Linking Agreement is the first of its kind and demonstrates that such systems can pave the way to broader international carbon markets. Earlier in the year, the removal of regulatory barriers had enabled Iceland, Liechtenstein and Norway to fully participate in the EU auctioning platform for trading emissions allowances. </span></p><span data-dcnode-id="5018" instrument_node="">
</span><p data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">To accelerate international progress on building a robust international framework for carbon markets, the Commission hosted several conferences to identify potential solutions to obstacles when setting up reliable international emissions trading systems. </span></p><span data-dcnode-id="5015" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5012"><span data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">Clean and sustainable transport </span></span></h3><span data-dcnode-id="5011" instrument_node="">
</span><p data-dcnode-id="4999"><span data-dcnode-id="5010" instrument_node="">A faster shift to clean and sustainable transport is essential to improve Europeans’ health and quality of life, contribute to the EU’s climate objectives and boost the industry’s competitiveness. In March, the Commission presented a roadmap of actions to ensure a faster transition to clean vehicles. Among the major achievements in 2019 under the EU’s agenda for </span><a data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-18-3708_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">clean, safe and connected mobility</span></span></a><span data-dcnode-id="5006" instrument_node=""> was the adoption of the first EU-wide CO</span><span class="basic-subscript" data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">2</span></span><span data-dcnode-id="5003" instrument_node=""> emissions targets for trucks, new CO</span><span class="basic-subscript" data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">2</span></span><span data-dcnode-id="5000" instrument_node=""> emission standards for cars and vans, and new rules to encourage public authorities to use environmentally friendly transport.</span></p><span data-dcnode-id="4998" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="4985"><span data-dcnode-id="4997" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="4993"><span data-dcnode-id="4996" instrument_node="">
</span><img alt="A scientist using his equipment in a laboratory" data-dcnode-id="4995" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_PH17.jpg&amp;raw"><span data-dcnode-id="4994" instrument_node="">
</span></div><span data-dcnode-id="4992" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="4989"><p class="caption" data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">A scientist from the Joint Research Centre monitors air pollutants, as required by EU legislation, European Commission Atmospheric Observatory, Ispra, Italy, 1&nbsp;May 2019.</span></p></div><span data-dcnode-id="4988" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="4987"></span><span data-dcnode-id="4986" instrument_node="">
</span></div><span data-dcnode-id="4984" instrument_node="">
</span><p data-dcnode-id="4978"><span data-dcnode-id="4983" instrument_node="">Following the </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/content/eu-actions-dieselgate_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Dieselgate</span></span></a><span data-dcnode-id="4979" instrument_node=""> scandal, the EU has significantly tightened rules to ensure more independent and reliable testing procedures for vehicles. In January, the Worldwide Harmonised Light Vehicles Test Procedure and new Real Driving Emissions rules entered into force. In September, the NOx (nitrogen oxides) measurements carried out using the Real Driving Emissions rules became mandatory for all new cars sold in Europe. </span></p><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4972"><span data-dcnode-id="4976" instrument_node="">Progress was also made in tackling emissions from maritime transport with the adoption of a proposal to revise the EU system for monitoring, reporting and verifying CO</span><span class="basic-subscript" data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">2</span></span><span data-dcnode-id="4973" instrument_node=""> emissions from ships, as well as the first-ever publication of these data. This represents an important step towards ensuring that international shipping contributes its fair share of global reductions of greenhouse gas emissions. </span></p><span data-dcnode-id="4971" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="4968"><span data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">Batteries </span></span></h3><span data-dcnode-id="4967" instrument_node="">
</span><p data-dcnode-id="4949"><span data-dcnode-id="4966" instrument_node="">Batteries are crucial to the transition to clean energy as well as for electro-mobility. The Commission is working with Member States and industry stakeholders to build a competitive, sustainable and innovative battery ecosystem in Europe. This is the main objective behind the </span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/industry/policy/european-battery-alliance_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">European Battery Alliance</span></span></a><span data-dcnode-id="4962" instrument_node="">, an industry-led initiative with around 260 industrial and innovation organisations that is currently evaluating the potential for cross-border projects. In April, the Commission </span><a data-dcnode-id="4959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/report-building-strategic-battery-value-chain-april2019_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">reported</span></span></a><span data-dcnode-id="4958" instrument_node=""> on progress in implementing the Commission’s </span><a data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/resource.html%3Furi%3Dcellar%3A0e8b694e-59b5-11e8-ab41-01aa75ed71a1.0003.02/DOC_3%26format%3DPDF" target="_blank"><span class="hyperlink_text" data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">Strategic Action Plan</span></span></a><span data-dcnode-id="4954" instrument_node=""> on batteries. In June, the Commission launched a new </span><a data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/launch-batteries-europe-platform-2019-jun-25_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">European technology and innovation platform on batteries</span></span></a><span data-dcnode-id="4950" instrument_node=""> to boost support for research and innovation. The EU also made €132&nbsp;million available in 2019 for battery projects under the Horizon 2020 programme. </span></p><span data-dcnode-id="4948" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4938"><span data-dcnode-id="4947" instrument_node="">
</span><div class="img-large" data-dcnode-id="4940"><span data-dcnode-id="4946" instrument_node="">
</span><img alt="Graphic showing supply-and-demand forecasts for sustainable energy technologies" aria-describedby="GR24" data-dcnode-id="4945" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR24-EN.jpg&amp;raw"><span data-dcnode-id="4944" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4942" id="GR24"><span data-dcnode-id="4943" instrument_node="">In 2018, there were more than 4 million electric vehicles on the road; by 2028, electric vehicles are expected to reach between 50 million and 200 million, increasing to 900 million electric vehicles on European roads by 2040.

										In 2018, the amount of lithium-ion battery cells sold represented more than 77 Gigawatt hours and are expected to reach between 250 Gigawatt hours and 1 100 Gigawatt hours by 2028, and between 600 Gigawatt hours and 4 000 Gigawatt hours by 2040.

										The European share of global cell manufacturing is expected to increase from 3 % in 2018 to between 7 % and 25 % in 2028, with a view to continuous improvement towards 2040.

										Source: JRC</span></p><span data-dcnode-id="4941" instrument_node="">
</span></div><span data-dcnode-id="4939" instrument_node="">
</span></div><span data-dcnode-id="4937" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4934"><span data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">Towards a circular economy </span></span></h2><span data-dcnode-id="4933" instrument_node="">
</span><p data-dcnode-id="4927"><span data-dcnode-id="4932" instrument_node="">While transforming how we produce and use energy is essential for tackling climate change, it is only part of the solution. The circular economy has already become a central element in the EU’s industrial and economic strategy and underpins EU action for waste prevention, better design and higher rates of recycling. All 54 actions under the Commission’s </span><a data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1480" target="_blank"><span class="hyperlink_text" data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">Circular Economy Action Plan</span></span></a><span data-dcnode-id="4928" instrument_node=""> have now been delivered or are being implemented, laying the foundations for further development.</span></p><span data-dcnode-id="4926" instrument_node="">
</span><p data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">Tackling plastics has been a top priority, as the way they are produced, used and discarded too often harms the environment and fails to capture the economic benefits of a more ‘circular’ approach. The million tonnes of plastic litter that end up in the oceans every year is one of the most visible and alarming signs of this problem. </span></p><span data-dcnode-id="4923" instrument_node="">
</span><p data-dcnode-id="4913"><span data-dcnode-id="4922" instrument_node="">In July, </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/21/council-adopts-ban-on-single-use-plastics/" target="_blank"><span class="hyperlink_text" data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">new EU rules</span></span></a><span data-dcnode-id="4918" instrument_node=""> came into force to tackle marine litter coming from the 10 items that are most often found polluting European beaches, such as single-use plastic plates, cutlery, straws, balloon sticks and cotton buds, which will be banned by 2021. Member States agreed to achieve a 90&nbsp;% collection target for plastic bottles by 2029 and to meet the requirement that they contain at least 25&nbsp;% of recycled content by 2025 and 30&nbsp;% by 2030. This action is part of the first-ever </span><a data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/plastics-factsheet-industry_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">Europe-wide plastics strategy</span></span></a><span data-dcnode-id="4914" instrument_node=""> launched in 2018 with the vision of having all plastic packaging placed on the EU market as reusable or recyclable by 2030.</span></p><span data-dcnode-id="4912" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="4899"><span data-dcnode-id="4911" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="4907"><span data-dcnode-id="4910" instrument_node="">
</span><img alt="A factory worker using a machine" data-dcnode-id="4909" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_PH18.jpg&amp;raw"><span data-dcnode-id="4908" instrument_node="">
</span></div><span data-dcnode-id="4906" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="4903"><p class="caption" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">A factory worker produces compostable bags and films from renewable materials, Herent, Belgium, 28&nbsp;October 2019.</span></p></div><span data-dcnode-id="4902" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="4901"></span><span data-dcnode-id="4900" instrument_node="">
</span></div><span data-dcnode-id="4898" instrument_node="">
</span><p data-dcnode-id="4888"><span data-dcnode-id="4897" instrument_node="">While the recycling rate for plastic packaging in Europe has almost doubled since 2005, it still makes up less than 30&nbsp;% of the 25&nbsp;million tonnes of plastic waste produced by Europeans every year. As part of efforts to further boost recycling and reuse of plastics, in October more than 170 public and private partners from the plastics industry </span><a data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_5583" target="_blank"><span class="hyperlink_text" data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">pledged</span></span></a><span data-dcnode-id="4893" instrument_node=""> to use 10&nbsp;million tonnes of recycled plastic in new products by 2025. The initiative comes from the </span><a data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/industry/policy/circular-plastics-alliance_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Circular Plastics Alliance</span></span></a><span data-dcnode-id="4889" instrument_node="">, which held its first meeting in February.</span></p><span data-dcnode-id="4887" instrument_node="">
</span><p data-dcnode-id="4881"><span data-dcnode-id="4886" instrument_node="">After assessing health and environmental risks, the European Chemicals Agency in January </span><a data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/european-commission-welcomes-echas-opinion-restricting-microplastics-intentionally-added-products-2019-jan-30_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">concluded</span></span></a><span data-dcnode-id="4882" instrument_node=""> that restricting the intentional addition of microplastics in EU products would be justified. </span></p><span data-dcnode-id="4880" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4870"><span data-dcnode-id="4879" instrument_node="">
</span><div class="img-large" data-dcnode-id="4872"><span data-dcnode-id="4878" instrument_node="">
</span><img alt="A summary of the European plastics industry" aria-describedby="GR25" data-dcnode-id="4877" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR25-EN.jpg&amp;raw"><span data-dcnode-id="4876" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4874" id="GR25"><span data-dcnode-id="4875" instrument_node="">The European plastics industry employs almost 1.5 million people with an annual turnover of 350 billion euro, accounting for 18 % of the global plastic production each year.

										Small and medium-sized enterprises say they have taken action towards better resource efficiency, by minimising waste (65 %) or saving energy (63 %). 41 % of small and medium-sized enterprises consider that resource-efficiency actions decreased production costs.

										Source: Eurobarometer, 2018.</span></p><span data-dcnode-id="4873" instrument_node="">
</span></div><span data-dcnode-id="4871" instrument_node="">
</span></div><span data-dcnode-id="4869" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4866"><span data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Finance for climate action and new technologies</span></span></h2><span data-dcnode-id="4865" instrument_node="">
</span><p data-dcnode-id="4843"><span data-dcnode-id="4864" instrument_node="">In 2019, the </span><a data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/energy-sector-factsheet-297x210-july18_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">Investment Plan for Europe</span></span></a><span data-dcnode-id="4860" instrument_node=""> helped more European citizens get their energy from renewable sources, bringing the total number of households helped by the plan to 7.4&nbsp;million. The new </span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/innovation-fund_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">Innovation Fund</span></span></a><span data-dcnode-id="4856" instrument_node=""> is a key instrument for delivering the EU’s economy-wide commitments under the </span><a data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/international/negotiations/paris_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">Paris Agreement</span></span></a><span data-dcnode-id="4852" instrument_node=""> and for supporting the Commission’s strategic vision of a </span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/clima/policies/strategies/2050_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">climate-neutral Europe by 2050</span></span></a><span data-dcnode-id="4848" instrument_node="">. In February, the Commission announced over </span><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1381" target="_blank"><span class="hyperlink_text" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">€10&nbsp;billion worth of investment</span></span></a><span data-dcnode-id="4844" instrument_node=""> for low-carbon technologies in several sectors to boost their global competitiveness through the fund. Revenues will come from the auctioning of 450&nbsp;million EU Emissions Trading System allowances from 2020 to 2030. Initiatives financed under the Horizon 2020 programme also make an important contribution to bringing new technologies to market.</span></p><span data-dcnode-id="4842" instrument_node="">
</span><p data-dcnode-id="4832"><span data-dcnode-id="4841" instrument_node="">Public money alone will not be enough to fight climate change, so the EU is making it easier to help investors </span><a data-dcnode-id="4838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/EUClimateAction/videos/2517943421628286/%3Fv%3D2517943421628286" target="_blank"><span class="hyperlink_text" data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">identify and seize green investment opportunities</span></span></a><span data-dcnode-id="4837" instrument_node=""> worldwide. In October, it launched the </span><a data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/qanda_19_6116" target="_blank"><span class="hyperlink_text" data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">International Platform on Sustainable Finance</span></span></a><span data-dcnode-id="4833" instrument_node=""> together with relevant authorities from Argentina, Canada, Chile, China, India, Kenya and Morocco.   </span></p><span data-dcnode-id="4831" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4821"><span data-dcnode-id="4830" instrument_node="">
</span><div class="img-large" data-dcnode-id="4823"><span data-dcnode-id="4829" instrument_node="">
</span><img alt="A summary of the European Union’s Innovation Fund" aria-describedby="GR26" data-dcnode-id="4828" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR26-EN.jpg&amp;raw"><span data-dcnode-id="4827" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4825" id="GR26"><span data-dcnode-id="4826" instrument_node="">The Innovation Fund’s first call for projects in 2020 will mobilise 10 billion euro of investments for the European Union’s climate-neutral future by 2030, mainly through avoiding emissions and boosting competitiveness. Thanks to the funding from the European Union Emissions Trading System, it will also support innovation in energy-intensive industries, renewables and energy storage, as well as in carbon capture, use and storage.

										Source: European Commission</span></p><span data-dcnode-id="4824" instrument_node="">
</span></div><span data-dcnode-id="4822" instrument_node="">
</span></div><span data-dcnode-id="4820" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="4810"><span data-dcnode-id="4819" instrument_node="">
</span><div class="img-large" data-dcnode-id="4812"><span data-dcnode-id="4818" instrument_node="">
</span><img alt="The virtuous cycle of sustainable finance" aria-describedby="GR27" data-dcnode-id="4817" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_GR27-EN.jpg&amp;raw"><span data-dcnode-id="4816" instrument_node="">
</span><p class="longdesc" data-dcnode-id="4814" id="GR27"><span data-dcnode-id="4815" instrument_node="">Major private and public investments are needed to transform the EU economy to deliver on climate, environmental and social sustainability goals, including the Paris Agreement and the United Nations Sustainable Development Goals. 

										Sustainable finance makes sustainability considerations part of financial decision-making. This means more climate-neutral, energy- and resource-efficient and circular projects. Sustainable ﬁnance is needed to implement the European Commission’s strategy towards achieving the Sustainable Development Goals. 

										Finally, integrating sustainability considerations will lessen the impact of natural disasters and environmental and social sustainability issues that can aﬀect the economy and ﬁnancial markets. 

										If investors use their capital for sustainable investments, the result is a healthy planet with decreased economic harm caused by increased weather-related damage, returning positively on the initial investment. In addition, consistent sustainable investments will lead to greater consideration of investors’ sustainability preferences for the future. 

										Source: European Commission</span></p><span data-dcnode-id="4813" instrument_node="">
</span></div><span data-dcnode-id="4811" instrument_node="">
</span></div><span data-dcnode-id="4809" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="4796"><span data-dcnode-id="4808" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="4804"><span data-dcnode-id="4807" instrument_node="">
</span><img alt="People in discussion around a table full of documents in front of a screen with Green Week information" data-dcnode-id="4806" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH03_PH19.jpg&amp;raw"><span data-dcnode-id="4805" instrument_node="">
</span></div><span data-dcnode-id="4803" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="4800"><p class="caption" data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Participants take part in a group discussion at a conference during the EU Green Week, Brussels, Belgium, 16&nbsp;May 2019.</span></p></div><span data-dcnode-id="4799" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="4798"></span><span data-dcnode-id="4797" instrument_node="">
</span></div><span data-dcnode-id="4795" instrument_node="">
</span><p data-dcnode-id="4785"><span data-dcnode-id="4794" instrument_node="">In June, the Commission published new </span><a data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/files/190618-climate-related-information-reporting-guidelines_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">guidelines on corporate climate-related information reporting</span></span></a><span data-dcnode-id="4790" instrument_node=""> as part of its </span><a data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/180308-action-plan-sustainable-growth_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">Sustainable Finance Action Plan</span></span></a><span data-dcnode-id="4786" instrument_node="">. This provides around 6&nbsp;000 EU-listed companies, banks and insurance firms with practical recommendations on how to report more accurately the impact their activities have on the climate as well as the impact climate change has on their business. </span></p><span data-dcnode-id="4784" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="4781"><span data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">Protecting the environment</span></span></h2><span data-dcnode-id="4780" instrument_node="">
</span><p data-dcnode-id="4774"><span data-dcnode-id="4779" instrument_node="">In April, the Commission published </span><a data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/news/environmental-implementation-review-2019-apr-05_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">the second Environmental Implementation Review</span></span></a><span data-dcnode-id="4775" instrument_node="">, as part of its 2016 initiative to improve the implementation of EU environmental policy and commonly agreed rules in all Member States. Doing so is not only essential for a healthy environment but also opens up new opportunities for sustainable economic growth, innovation and jobs. Full implementation of such legislation could save the EU economy around €55&nbsp;billion every year in health costs and direct costs to the environment. The package includes a general communication and 28 country reports showing the state of play in the implementation of EU environmental law as well as opportunities for improvement in each Member State.</span></p><span data-dcnode-id="4773" instrument_node="">
</span><p data-dcnode-id="4763"><span data-dcnode-id="4772" instrument_node="">The </span><a data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/news/eu-forest-strategy-track-achieve-its-2020-aims-2018-dec-07_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">mid-term review</span></span></a><span data-dcnode-id="4768" instrument_node=""> of the EU forest strategy concluded that significant progress has been made towards its 2020 objectives. Since its adoption, the strategy has facilitated the coordination of all EU policy areas relevant to forests and the forest-based sector, promoting a consistent approach in both domestic and international policies. In July, the Commission set out a </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4470" target="_blank"><span class="hyperlink_text" data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">new framework of action</span></span></a><span data-dcnode-id="4764" instrument_node=""> to protect and restore the world’s forests, which host 80&nbsp;% of biodiversity on land, support the livelihoods of around a quarter of the world’s population and are vital in fighting climate change. </span></p><span data-dcnode-id="4762" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4761" instrument_node="">The EU is leading international cooperation for safer, more secure, cleaner and more sustainably managed oceans in Europe and around the world. In March, it published a </span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/maritimeaffairs/press/international-ocean-governance-looking-back-two-years-firm-action_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">joint report</span></span></a><span data-dcnode-id="4757" instrument_node=""> taking stock of the EU’s international ocean governance agenda. So far, 50 concrete actions, including fighting illegal fishing and legislation countering marine pollution, have been successfully implemented. </span></p><span data-dcnode-id="4755" instrument_node="">
</span><div data-dcnode-id="4742"><span data-dcnode-id="4754" instrument_node="">
</span><button aria-controls="content3" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4744" data-target="#content3" data-toggle="collapse" type="button"><span data-dcnode-id="4753" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4750"><span data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4749" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4746"><span data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">More detail</span></span></span><span data-dcnode-id="4745" instrument_node=""> </span></button><span data-dcnode-id="4743" instrument_node="">
</span></div><span data-dcnode-id="4741" instrument_node="">

</span><div class="general-report eu-2017" data-dcnode-id="4637" id="gris3"><span data-dcnode-id="4738" instrument_node="">
</span><h2 data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">The future long-term budget of the EU</span></h2><span data-dcnode-id="4735" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">In 2019, the Commission continued working with the Parliament and Member States towards an agreement on the future long-term budget of the EU for 2021-2027.</span></p><span data-dcnode-id="4732" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4726"><span data-dcnode-id="4731" instrument_node="">In May 2018, the Commission made its </span><a data-dcnode-id="4728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_18_3570" target="_blank"><span class="hyperlink_text" data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">proposal</span></span></a><span data-dcnode-id="4727" instrument_node=""> for a fair, balanced and modern EU budget to cover that period. It was the result of an open and inclusive discussion with the Parliament, Member States, beneficiaries of EU funding and other stakeholders. It aimed to equip Europe with sufficient resources to deliver on its priorities, respond to the challenges ahead and address citizens’ demands.</span></p><span data-dcnode-id="4725" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">The proposed budget is equal to 1.114&nbsp;% of the EU-27’s gross national income (GNI) – or national wealth. In comparison, national budgets are equal to an average of 47.1&nbsp;% of the 27 Member States’ GNI (an average figure for 2014-2020). </span></p><span data-dcnode-id="4722" instrument_node="">
</span><div data-dcnode-id="4709" style="margin-right:10px;"><span data-dcnode-id="4721" instrument_node="">
</span><button aria-controls="content_gris3" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4711" data-target="#content_gris3" data-toggle="collapse" type="button"><span data-dcnode-id="4720" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4717"><span data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4716" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4713"><span data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">More detail</span></span></span><span data-dcnode-id="4712" instrument_node=""> </span></button><span data-dcnode-id="4710" instrument_node="">
</span></div><span data-dcnode-id="4708" instrument_node="">
</span><div class="clearfix" data-dcnode-id="4707"></div><span data-dcnode-id="4706" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="4639" id="content_gris3"><span data-dcnode-id="4705" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4699"><span data-dcnode-id="4704" instrument_node="">This framework proposal was immediately followed by draft legislation for the </span><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/future-europe/eu-budget-future_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">37 sectoral programmes</span></span></a><span data-dcnode-id="4700" instrument_node=""> forming part of the future long-term budget. These are the rules which specify, for example, how farmers will continue to receive their subsidies or how young people will be able to apply for the next generation of grants under Erasmus+.</span></p><span data-dcnode-id="4698" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">2019 was dedicated to intense negotiations. The Parliament, the Commission and Member States made progress towards agreements on both the overall framework and the sectoral proposals. </span></p><span data-dcnode-id="4695" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4689"><span data-dcnode-id="4694" instrument_node="">Concerning the overall framework, by June the discussions had advanced sufficiently for EU leaders to touch upon the topic for the first time since the proposal had been made. At the European Council in December, they </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/41768/12-euco-final-conclusions-en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">decided</span></span></a><span data-dcnode-id="4690" instrument_node=""> that the negotiations would be taken forward by the President of the European Council, Charles Michel, with a view to an agreement in early 2020. Once Member States reach a consensus among themselves, the Parliament’s green light will be needed for a final deal.</span></p><span data-dcnode-id="4688" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">In parallel, the negotiations on the sectoral programmes continued. The Parliament and Member States managed to reach preliminary agreements on programmes that cover priorities like research, defence, investment and digital transformation. Once agreed, these programmes will, for example: </span></p><span data-dcnode-id="4685" instrument_node="">
</span><ul class="myjustify" data-dcnode-id="4672"><span data-dcnode-id="4684" instrument_node="">
</span><li data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">allow hundreds of thousands of people to study, train, teach, work or volunteer abroad thanks to Europe’s youth mobility programme, Erasmus+;</span></li><span data-dcnode-id="4681" instrument_node="">
</span><li data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">unleash investments of several hundred billion euro under the InvestEU programme, thus creating business opportunities and jobs;</span></li><span data-dcnode-id="4678" instrument_node="">
</span><li data-dcnode-id="4674"><span data-dcnode-id="4677" instrument_node="">facilitate Europe’s digital transformation via investments in supercomputing, artificial intelligence, cybersecurity and trust, and making sure Europeans are equipped with the skills that</span><a data-dcnode-id="4676" id="_idTextAnchor001"></a><span data-dcnode-id="4675" instrument_node=""> make them fit for the digital age.</span></li><span data-dcnode-id="4673" instrument_node="">
</span></ul><span data-dcnode-id="4671" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">These are just a few of the EU budget’s benefits for Europe and its citizens. While negotiations continue, it is important to remember that the budget is not a zero-sum game. </span></p><span data-dcnode-id="4668" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4662"><span data-dcnode-id="4667" instrument_node="">Thanks to the budget, Member States </span><a data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/factsheet-eu-budget-financing_.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">gain</span></span></a><span data-dcnode-id="4663" instrument_node=""> from being part of the Single Market and being able to address challenges like migration and fighting terrorism and climate change together. They can also take advantage of the opportunities that cohesion policy – the EU’s main investment policy – creates for businesses from across the Union. </span></p><span data-dcnode-id="4661" instrument_node="">
</span><p class="myjustify" data-dcnode-id="4655"><span data-dcnode-id="4660" instrument_node="">The EU also contributes significantly to the economies of its Member States. According to </span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/about_the_european_commission/eu_budget/2019-11-05_eu_budget_technical_briefing_-_with_covers.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">data</span></span></a><span data-dcnode-id="4656" instrument_node=""> compiled by the Commission, Member States contribute some 0.9&nbsp;% of their GNI to the EU budget and get 5.92&nbsp;% of their GNI thanks to the Single Market. In other words, Member States are paying €1 to the budget, but at the same time they are getting €6 thanks to the Single Market. </span></p><span data-dcnode-id="4654" instrument_node="">
</span><div data-dcnode-id="4641" style="margin-right:10px;"><span data-dcnode-id="4653" instrument_node="">
</span><button aria-controls="content_gris3" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="4643" data-target="#content_gris3" data-toggle="collapse" type="button"><span data-dcnode-id="4652" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="4649"><span data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">Less detail</span></span></span><span data-dcnode-id="4648" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="4645"><span data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">More detail</span></span></span><span data-dcnode-id="4644" instrument_node=""> </span></button><span data-dcnode-id="4642" instrument_node="">
</span></div><span data-dcnode-id="4640" instrument_node="">

</span><div class="general-report" data-dcnode-id="4585" id="chapter4"><span data-dcnode-id="4633" instrument_node="">
</span><p class="chap_number" data-dcnode-id="4630"><span data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">Chapter 4</span></span></p><span data-dcnode-id="4629" instrument_node="">
</span><h1 data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">A deeper and fairer internal market with a strengthened industrial base</span></h1><span data-dcnode-id="4626" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="4616"><span data-dcnode-id="4625" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="4618"><span data-dcnode-id="4624" instrument_node="">
</span><img alt="Image: A series of freight trucks driving along a highway at dawn. © Fotolia" class="height_width_100pct" data-dcnode-id="4623" id="PC04-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH04.jpg&amp;raw"><span data-dcnode-id="4622" instrument_node="">
</span><p class="caption" data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">© Fotolia</span></p><span data-dcnode-id="4619" instrument_node="">
</span></div><span data-dcnode-id="4617" instrument_node="">
</span></div><span data-dcnode-id="4615" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">The internal market, also known as the Single Market, is one of the EU’s biggest achievements. It improves our daily lives and offers a unique springboard for companies to innovate and expand across borders. 2019 also saw the 25th anniversary of the European Economic Area (EEA), which extends the market to Iceland, Liechtenstein and Norway.</span></p><span data-dcnode-id="4612" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">The EU works constantly to deepen the Single Market and increase its benefits. In 2019, the Commission presented its final proposals to complete the ambitious set of measures set out in the Single Market strategy, the Capital Markets Union and the Digital Single Market strategy, while other pending proposals were adopted by the European Parliament and the Council. </span></p><span data-dcnode-id="4609" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">As a result, Europeans can now benefit from safer products on the EU market, including cleaner and safer cars, greater protection against harmful chemicals and better information about food products. </span></p><span data-dcnode-id="4606" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">The EU has further simplified administrative procedures for businesses to operate across the continent, ensuring that the rules are enforced and respected. It has also made it simpler to make euro transactions across the entire EU as well as easier for authorities to detect value added tax (VAT) fraud. A new European Labour Authority will also help to provide citizens and businesses with advice about opportunities to live, work or operate in another Member State. </span></p><span data-dcnode-id="4603" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">The Commission took several high-profile competition decisions to ensure a level playing field for companies and keep the Single Market functioning properly. The EU is also working with industry and national authorities to ensure our industries adapt to future innovation and sustainability challenges and remain globally competitive. </span></p><span data-dcnode-id="4600" instrument_node="">
</span><div data-dcnode-id="4587"><span data-dcnode-id="4599" instrument_node="">
