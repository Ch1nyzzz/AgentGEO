</span><img alt="A ring of light against a dark background" data-dcnode-id="5967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_PH08.jpg&amp;raw"><span data-dcnode-id="5966" instrument_node="">
</span></div><span data-dcnode-id="5964" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5961"><p class="caption" data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">The first photo ever taken of a black hole, published on 10&nbsp;April 2019 by Event Horizon Telescope, a global team including EU-funded researchers.</span></p></div><span data-dcnode-id="5960" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5959"></span><span data-dcnode-id="5958" instrument_node="">
</span></div><span data-dcnode-id="5956" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5953"><span data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">The EU in space </span></span></h3><span data-dcnode-id="5952" instrument_node="">
</span><p data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">To ensure that the EU remains a world leader in space technology and to promote a competitive space industry in Europe, in 2019 the European Parliament and the Council of the European Union reached a partial provisional agreement on the EU’s space programme for 2021-2027.</span></p><span data-dcnode-id="5949" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5939"><span data-dcnode-id="5948" instrument_node="">
</span><div class="img-large" data-dcnode-id="5941"><span data-dcnode-id="5947" instrument_node="">
</span><img alt="Graphic showing increased European Union investment in space" aria-describedby="GR16" data-dcnode-id="5946" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR16-EN.jpg&amp;raw"><span data-dcnode-id="5945" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5943" id="GR16"><span data-dcnode-id="5944" instrument_node="">European Union investment in space totalled 4.6 billion euro from 2007 to 2013, 11.1 billion euro from 2014 to 2020, and is planned to reach 16 billion euro for the period 2021 to 2027. Figures are in current prices.

										Source:  European Commission

										Copyright: European Union</span></p><span data-dcnode-id="5942" instrument_node="">
</span></div><span data-dcnode-id="5940" instrument_node="">
</span></div><span data-dcnode-id="5938" instrument_node="">
</span><p data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">With a proposed budget of €16&nbsp;billion, the programme would bring all of the EU’s support for space under the one roof and would increase current funding levels by more than a third. It would build on new needs and available technologies as well as reinforce Europe’s access to space and launch a European approach to supporting an innovative and competitive space industry. </span></p><span data-dcnode-id="5935" instrument_node="">
</span><p data-dcnode-id="5926"><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gsa.europa.eu/european-gnss/galileo/galileo-european-global-satellite-based-navigation-system" target="_blank"><span class="hyperlink_text" data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">Galileo</span></span></a><span data-dcnode-id="5931" instrument_node="">, Europe’s global radio navigation satellite system, is the most accurate global satnav system available. In September, the number of Galileo users, including users of Galileo-enabled smartphones or tablets, reached an estimated 1&nbsp;billion worldwide. The </span><a data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/sectors/space/copernicus_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">Copernicus programme</span></span></a><span data-dcnode-id="5927" instrument_node="">, the world’s biggest provider of Earth observation data, helps to monitor climate change and manage border security and large disasters throughout the world. Every day, Copernicus delivers 12 terabytes of data, which are fully, openly and freely available for use by people and businesses, representing a goldmine for big data and cloud processing. Since 2019, Copernicus has enabled improved transfers of data, particularly of images, and allows users to discover, download and process its data more easily thanks to new upgrades to the Data and Information Access Services.  </span></p><span data-dcnode-id="5925" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5922"><span data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">EU defence and industry </span></span></h3><span data-dcnode-id="5921" instrument_node="">
</span><p data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">Three out of four EU citizens want to see greater security (Eurobarometer, November 2018). The EU has therefore stepped up its ambition and commitment towards a Defence Union. Activated in December 2017, the Permanent Structured Cooperation brings together 25 participating Member States that are willing to make more binding commitments to work together on security and defence and to take part in the most demanding missions. A total of 34 projects have already been launched, including on military mobility, maritime surveillance and cybersecurity. The Commission participates as an observer at the invitation of participating Member States.</span></p><span data-dcnode-id="5918" instrument_node="">
</span><p data-dcnode-id="5912"><span data-dcnode-id="5917" instrument_node="">The two pilot programmes of the European Defence Fund, with a combined budget of €590&nbsp;million, were delivered as planned just as the </span><a data-dcnode-id="5914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eda.europa.eu/what-we-do/activities/activities-search/pilot-project-and-preparatory-action-for-defence-research" target="_blank"><span class="hyperlink_text" data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">Preparatory Action on Defence Research</span></span></a><span data-dcnode-id="5913" instrument_node=""> (2017-2019) entered its final year. The European Defence Industrial Development Programme (2019-2020) co-funds the cooperative development of defence capabilities; its work programme was agreed in March and calls for proposals were published in April. </span></p><span data-dcnode-id="5911" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5908"><span data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Investing in regions, cities and rural areas</span></span></h2><span data-dcnode-id="5907" instrument_node="">
</span><p data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">Throughout 2019, cohesion policy continued to support jobs and growth with thousands of investments, big and small, across the EU. Over the past 5&nbsp;years, 1&nbsp;million businesses have been supported, leading to hundreds of thousands of new jobs. Millions of people have received help for training, education or job seeking, their households have been connected to better broadband and they have benefited from improved transport infrastructure and health-sector innovations. </span></p><span data-dcnode-id="5904" instrument_node="">
</span><p data-dcnode-id="5898"><span data-dcnode-id="5903" instrument_node="">The European Regional Development Fund has also supported </span><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/regional_policy/sources/docgener/brochure/Industrial_transition_no_region_left_behind_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">two Member States and 10 EU regions in industrial transition</span></span></a><span data-dcnode-id="5899" instrument_node="">: Lithuania, Slovenia, North and East Finland (Finland), Norra Mellansverige (Sweden), Greater Manchester (United Kingdom), Sachsen (Germany), Wallonie (Belgium), Piemonte (Italy), Cantabria (Spain) and Hauts-de-France, Centre-Val de Loire and Grand Est (France). Each of these 12 pilot schemes will receive a €300&nbsp;000 EU grant to help achieve industrial transition and design development strategies based on their areas of comparative strength, so-called smart specialisation assets. </span></p><span data-dcnode-id="5897" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5884"><span data-dcnode-id="5896" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5892"><span data-dcnode-id="5895" instrument_node="">
</span><img alt="People gathered to hear a speaker in a conference area" data-dcnode-id="5894" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_PH09.jpg&amp;raw"><span data-dcnode-id="5893" instrument_node="">
</span></div><span data-dcnode-id="5891" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5888"><p class="caption" data-dcnode-id="5889"><span data-dcnode-id="5890" instrument_node="">A discussion session during the European Week of Regions and Cities, Brussels, Belgium, 9&nbsp;October 2019.</span></p></div><span data-dcnode-id="5887" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5886"></span><span data-dcnode-id="5885" instrument_node="">
</span></div><span data-dcnode-id="5883" instrument_node="">
</span><p data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">Cohesion policy funds are also being invested in innovative start-ups. For instance, thanks to €32.5&nbsp;million from the European Investment Fund, announced in April, the Venture Capital Fund in Croatia will invest in new projects with high growth potential in the country. More than 100 start-ups should benefit from better access to finance.</span></p><span data-dcnode-id="5880" instrument_node="">
</span><p data-dcnode-id="5874"><span data-dcnode-id="5879" instrument_node="">On a bigger scale, that same month the </span><a data-dcnode-id="5876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/regional_policy/en/newsroom/major-projects/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">Commission announced €4&nbsp;billion of funding</span></span></a><span data-dcnode-id="5875" instrument_node=""> from the European Regional Development Fund and the Cohesion Fund for 25 large infrastructure projects in 10 Member States. The projects cover a wide range of themes, from cross-border gas pipelines between Bulgaria and Greece to water management in Malta, research facilities at a university in Germany and modernised railway lines in northern Portugal. With national co-financing, the total investment in these projects amounts to €8&nbsp;billion. </span></p><span data-dcnode-id="5873" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5870"><span data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">Agriculture and rural development</span></span></h3><span data-dcnode-id="5869" instrument_node="">
</span><p data-dcnode-id="5863"><span data-dcnode-id="5868" instrument_node="">The Common Agricultural Policy continued to contribute to growth and investment by supporting viable food production, sustainable management of natural resources, modernisation of rural infrastructure and social inclusion. By the end of the third quarter of 2019, the </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/agriculture/rural-development-2014-2020_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">European Agricultural Fund for Rural Development</span></span></a><span data-dcnode-id="5864" instrument_node=""> (EAFRD) had provided support for Rural Development Programmes 2014-2020 worth €8&nbsp;billion. The funding went to enhancing farm viability and competitiveness of all types of agriculture and promoting innovative farm technologies and sustainable management of forests. </span></p><span data-dcnode-id="5862" instrument_node="">
</span><p data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">Rural development policy also aims to protect the environment and mitigate and adapt to climate change. Farmers could receive financial support for joining schemes to develop environmentally friendly farm-management practices, create favourable conditions for biodiversity or recreate wetlands for soil carbon sequestration. Overall, EAFRD support for the restoration, preservation and enhancement of ecosystems related to agriculture and forestry amounted to almost €27&nbsp;billion. Another €2&nbsp;billion was spent to promote resource efficiency and the shift towards a low-carbon and climate-resilient economy in the agriculture, food and forestry sectors. The EAFRD also provided almost €5&nbsp;billion to promote social inclusion, poverty reduction and economic development in rural areas.</span></p><span data-dcnode-id="5859" instrument_node="">
</span><p data-dcnode-id="5853"><span data-dcnode-id="5858" instrument_node="">To help farmers strengthen their position in an increasingly market-oriented agri-food sector, the Commission has been working towards a fairer and more balanced food-supply chain. </span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/food-farming-fisheries/key-policies/common-agricultural-policy/market-measures/agri-food-supply-chain/unfair-trading-practices_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">New rules</span></span></a><span data-dcnode-id="5854" instrument_node=""> on unfair trading practices entered into force in April, aiming to protect farmers and agri-food companies from unfair practices. Member States must transpose the rules into national law by May 2021. An initiative to increase agri-food market transparency was also adopted; this will see more information available along the food-supply chain for all market operators.</span></p><span data-dcnode-id="5852" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5849"><span data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">The Blue Economy</span></span></h3><span data-dcnode-id="5848" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5838"><span data-dcnode-id="5847" instrument_node="">
</span><div class="img-large" data-dcnode-id="5840"><span data-dcnode-id="5846" instrument_node="">
</span><img alt="Graphs showing the economic impact of the European Union’s blue economy" aria-describedby="GR17" data-dcnode-id="5845" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR17-EN.jpg&amp;raw"><span data-dcnode-id="5844" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5842" id="GR17"><span data-dcnode-id="5843" instrument_node="">The contribution of the blue economy to the overall European Union economy in terms of Gross Value Added remained relatively stable at around 1.5 % between 2009 and 2017 with a slight downward trend since 2011. In the same period, employment in the blue economy as a contribution to the overall European Union economy remained between 1.5 % and 2 %, with a marked period of growth since 2015.

										Data for 2017 are provisional. 

										Source: Eurostat (Structural Business Statistics), Data Collection Framework, Directorate-General for Maritime Affairs and Fisheries, and Joint Research Centre calculations.

										In terms of gross domestic product growth in real terms, where gross domestic product is at factor cost and therefore equivalent to Gross Value Added, growth fluctuated between 2004 and early 2020. After gross domestic product grew to over 3 % between 2004 and 2006, the 2008 financial crisis resulted in a sharp drop, to ‒ 5 % in 2009. An equally rapid rise brought gross domestic product growth of the blue economy back to 2 % in 2010, only to then go down again to just below 0 % in 2012. From 2012 to 2014, growth was stable and led to values around 2 %, where it stabilised until the beginning of 2020, except for slight fluctuations.

										Data for 2019-2020 are forecasts.

										Source: European Commission.</span></p><span data-dcnode-id="5841" instrument_node="">
</span></div><span data-dcnode-id="5839" instrument_node="">
</span></div><span data-dcnode-id="5837" instrument_node="">
</span><p data-dcnode-id="5831"><span data-dcnode-id="5836" instrument_node="">The EU’s Blue Economy, which encompasses all sustainable economic activities related to oceans, seas and coastal areas, continues to grow. According to the second </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prod5.assets-cdn.io/event/3769/assets/8442090163-fc038d4d6f.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">EU Blue Economy Report</span></span></a><span data-dcnode-id="5832" instrument_node="">, published in May, the sector produced gross profits of €74.3&nbsp;billion in 2017 and employed more than 4&nbsp;million people. The latest figures indicate high growth rates in both the traditional and emerging Blue Economy sectors. The report aims to help stimulate further growth by providing better data, analysis and knowledge about the sea.</span></p><span data-dcnode-id="5830" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5817"><span data-dcnode-id="5829" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5825"><span data-dcnode-id="5828" instrument_node="">
</span><img alt="A fisherman holds up a lobster caught on a fishing boat" data-dcnode-id="5827" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_PH10.jpg&amp;raw"><span data-dcnode-id="5826" instrument_node="">
</span></div><span data-dcnode-id="5824" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5821"><p class="caption" data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">A fisherman catches a spiny lobster, Guilvinec, France, 20&nbsp;August 2019.</span></p></div><span data-dcnode-id="5820" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5819"></span><span data-dcnode-id="5818" instrument_node="">
</span></div><span data-dcnode-id="5816" instrument_node="">
</span><p data-dcnode-id="5810"><span data-dcnode-id="5815" instrument_node="">The </span><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/en/publication-detail/-/publication/ca63ab82-c3bf-11e9-9d01-01aa75ed71a1" target="_blank"><span class="hyperlink_text" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">2019 annual economic report on the EU fishing fleet</span></span></a><span data-dcnode-id="5811" instrument_node="">, published in August, showed that the sector continued to perform strongly in 2017. This was mainly thanks to sustainable fishing methods as well as higher average fish prices, continued low fuel prices and the improved status of some important stocks. The positive trend is expected to continue. </span></p><span data-dcnode-id="5809" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5806"><span data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">Transport for a connected Europe</span></span></h3><span data-dcnode-id="5805" instrument_node="">
</span><p data-dcnode-id="5799"><span data-dcnode-id="5804" instrument_node="">In 2019, 108 projects were selected to receive €538&nbsp;million in grants from the </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/inea/en/connecting-europe-facility" target="_blank"><span class="hyperlink_text" data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">Connecting Europe Facility</span></span></a><span data-dcnode-id="5800" instrument_node=""> (CEF) for safer, smarter and greener transport infrastructure. Of those projects, 39 (€117&nbsp;million) will reduce the noise generated by freight trains, develop cross-border railway links and upgrade crucial infrastructure in ports. Another €109&nbsp;million will support multimodal logistics platforms, making it possible to shift freight between different modes of transport. Two other priorities concerned Intelligent Transport Systems for roads (€80&nbsp;million in funding) and innovation and new technologies (€71&nbsp;million).</span></p><span data-dcnode-id="5798" instrument_node="">
</span><p data-dcnode-id="5792"><span data-dcnode-id="5797" instrument_node="">In March, the European Commission, together with the European Investment Bank, launched the new </span><a data-dcnode-id="5794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/inea/en/connecting-europe-facility/cef-transport/apply-funding/blending-facility" target="_blank"><span class="hyperlink_text" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">CEF Transport Blending Facility</span></span></a><span data-dcnode-id="5793" instrument_node="">, an innovative financial instrument to support projects contributing to the environmental sustainability and efficiency of the transport sector in Europe. With an initial budget of €200&nbsp;million, the facility will finance investments in the European Rail Traffic Management System and in alternative fuels infrastructure. Both organisations also joined forces to support investments in transport safety: the Safer Transport Platform will provide easy access to technical and financial advice, in particular for roads.</span></p><span data-dcnode-id="5791" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5788"><span data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Investing in businesses </span></span></h3><span data-dcnode-id="5787" instrument_node="">
</span><p data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">SMEs represent 99&nbsp;% of all businesses in Europe and are a crucial part of the EU economy. The EU supports them by working to improve the business environment, making it easier to access finance, and by offering different services to help them expand within and beyond the EU. </span></p><span data-dcnode-id="5784" instrument_node="">
</span><p data-dcnode-id="5778"><span data-dcnode-id="5783" instrument_node="">Particularly through the </span><a data-dcnode-id="5780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/smes/cosme_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">programme for the competitiveness of small and medium-sized enterprises</span></span></a><span data-dcnode-id="5779" instrument_node=""> (COSME), in 2018 the EU helped leverage €10&nbsp;billion in funding for 140&nbsp;000 such ventures through a range of financial instruments including the European Fund for Strategic Investments (EFSI). </span></p><span data-dcnode-id="5777" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5774"><span data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">Investing in people</span></span></h2><span data-dcnode-id="5773" instrument_node="">
</span><p data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">Reforms to education and training are a high priority in most Member States and featured prominently in the 2019 European Semester. Investing in education and skills is essential to sustain innovation and productivity growth, especially in a rapidly changing world of work with rising skills shortages. Inequality in education outcomes represents a threat to social cohesion and the long-term prosperity of Europe. Equal access to quality education is also essential for disadvantaged groups, and since the world of work is changing quickly, more adults need to be encouraged to continuously improve their skills and embrace lifelong learning. All Member States have received a country-specific recommendation in the area of education and training.</span></p><span data-dcnode-id="5770" instrument_node="">
</span><p data-dcnode-id="5764"><span data-dcnode-id="5769" instrument_node="">In May, as part of the work to build a European Education Area by 2025, the Council adopted a </span><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/education/education-in-the-eu/council-recommendation-improving-teaching-and-learning-languages_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">recommendation on early childhood education and care and the teaching and learning of languages</span></span></a><span data-dcnode-id="5765" instrument_node="">. The following month, under the Erasmus+ programme, the Commission announced the first 17 European Universities alliances involving 114 higher-education institutions in 24 Member States. These alliances will enhance the quality and attractiveness of higher education and boost cooperation between institutions and their students and staff.</span></p><span data-dcnode-id="5763" instrument_node="">
</span><p data-dcnode-id="5753"><span data-dcnode-id="5762" instrument_node="">The EU also continued to invest in training. Support and co-financing for the </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.erasmus-entrepreneurs.eu/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Erasmus for Young Entrepreneurs</span></span></a><span data-dcnode-id="5758" instrument_node=""> (EYE) programme gives newly established and aspiring entrepreneurs the opportunity to train with an experienced person running an SME in another country. Last year, 1 300 new entrepreneurs took part across Europe and beyond, and 120 stand to benefit from </span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eyeglobal.eu/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">EYE Global</span></span></a><span data-dcnode-id="5754" instrument_node="">, a pilot programme involving Israel, Singapore and two US states, New York and Pennsylvania.</span></p><span data-dcnode-id="5752" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5742"><span data-dcnode-id="5751" instrument_node="">
</span><div class="img-large" data-dcnode-id="5744"><span data-dcnode-id="5750" instrument_node="">
</span><img alt="A summary of the achievements of the Youth Guarantee delivery" aria-describedby="GR18" data-dcnode-id="5749" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_GR18-EN.jpg&amp;raw"><span data-dcnode-id="5748" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5746" id="GR18"><span data-dcnode-id="5747" instrument_node="">The Youth Guarantee is a political commitment taken by Member States in April 2013 to give every person under the age of 25 a good-quality offer of employment, continued education, apprenticeship or traineeship within a period of 4 months of becoming unemployed or leaving formal education. Launched by the Commission, the guarantee has helped put a dent in youth unemployment.

										Since 2013, 2.5 million fewer young people have been unemployed and 2 million fewer young people were not in employment, education or training. Since 2014, more than 25 million young people registered, and over 18 million young people took up an offer of employment, education, traineeship or apprenticeship.

										Source:  European Commission

										Copyright: European Union</span></p><span data-dcnode-id="5745" instrument_node="">
</span></div><span data-dcnode-id="5743" instrument_node="">
</span></div><span data-dcnode-id="5741" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5740" instrument_node="">With a budget of more than €3.2&nbsp;billion, the </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eacea.ec.europa.eu/erasmus-plus_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">Erasmus+ programme for education, training, youth and sport</span></span></a><span data-dcnode-id="5736" instrument_node=""> provided opportunities for around 650&nbsp;000 young people and 237&nbsp;000 members of staff from educational institutions and youth organisations. The Youth Employment Initiative made €350&nbsp;million available to young people living in regions with particularly high youth unemployment. </span></p><span data-dcnode-id="5734" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5731"><span data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">Connecting people</span></span></h2><span data-dcnode-id="5730" instrument_node="">
</span><p data-dcnode-id="5720"><span data-dcnode-id="5729" instrument_node="">Around 35&nbsp;000 young people had the opportunity to explore Europe with a </span><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/youth/discovereu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">DiscoverEU travel pass</span></span></a><span data-dcnode-id="5725" instrument_node="">, and more than 90&nbsp;000 people registered with the </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/youth/solidarity_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">European Solidarity Corps</span></span></a><span data-dcnode-id="5721" instrument_node="">, with 12&nbsp;000 of them taking part in solidarity activities across Europe in 2019.</span></p><span data-dcnode-id="5719" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5706"><span data-dcnode-id="5718" instrument_node="">

</span></div><span data-dcnode-id="5713" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5710"><p class="caption" data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">DiscoverEU travellers at the very first DiscoverEU meet-up, Nijmegen,  the Netherlands, 12 July 2019.</span></p></div><span data-dcnode-id="5709" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5708"></span><span data-dcnode-id="5707" instrument_node="">
</span></div><span data-dcnode-id="5705" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5702"><span data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">A healthier Europe </span></span></h2><span data-dcnode-id="5701" instrument_node="">
</span><p data-dcnode-id="5695"><span data-dcnode-id="5700" instrument_node="">The Commission teamed up with the Organisation for Economic Co-operation and Development and the European Observatory on Health Systems and Policies to work on in-depth studies of health systems in the EU. The </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/health/state/summary_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">State of health in the EU and its Companion report</span></span></a><span data-dcnode-id="5696" instrument_node=""> include 30 profiles of national systems and, in 2019, zoomed in on five horizontal themes: vaccination hesitancy; the digital transformation of health promotion and disease prevention; gaps in health system accessibility; task shifting among health workers; and patient access to medicines. </span></p><span data-dcnode-id="5694" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5681"><span data-dcnode-id="5693" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5689"><span data-dcnode-id="5692" instrument_node="">
</span><img alt="Jean-Claude Juncker and Dr Tedros Adhanom Ghebreyesus hold up a t-shirt that reads ‘vaccines work’" data-dcnode-id="5691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH01_PH11.jpg&amp;raw"><span data-dcnode-id="5690" instrument_node="">
</span></div><span data-dcnode-id="5688" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5685"><p class="caption" data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Jean-Claude Juncker, President of the European Commission, holds up a #VaccinesWork shirt with Dr Tedros Adhanom Ghebreyesus, Director-General of the World Health Organization, during the Global Vaccination Summit, Brussels, Belgium, 12&nbsp;September 2019.</span></p></div><span data-dcnode-id="5684" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5683"></span><span data-dcnode-id="5682" instrument_node="">
</span></div><span data-dcnode-id="5680" instrument_node="">
</span><p data-dcnode-id="5670"><span data-dcnode-id="5679" instrument_node="">In February, the EU took action to ensure the safety of medicines sold throughout Member States by introducing new </span><a data-dcnode-id="5676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_MEMO-19-802_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">verification and safety features</span></span></a><span data-dcnode-id="5675" instrument_node=""> on prescription medicines. Since then, manufacturers must put a 2D barcode and an anti-tampering device on boxes of prescription medicines and pharmacies (including online ones) and hospitals must check the authenticity of medicines before dispensing to patients. This is the final step in the implementation of the 2011 </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/health/human-use/falsified_medicines_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">falsified medicines directive</span></span></a><span data-dcnode-id="5671" instrument_node="">, which aims to guarantee the safety and quality of medicines sold in the EU. </span></p><span data-dcnode-id="5669" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="5656"><span data-dcnode-id="5668" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="5664"><span data-dcnode-id="5667" instrument_node="">

</span></div><span data-dcnode-id="5663" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="5660"><p class="caption" data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">A rugby match for young people organised at the European Commission Berlaymont headquarters as part of the European Week of Sport, Brussels, Belgium, 23&nbsp;September 2019.</span></p></div><span data-dcnode-id="5659" instrument_node="">

</span></div><span data-dcnode-id="5655" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5652"><span data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">An EU budget focused on delivery and continuity</span></span></h2><span data-dcnode-id="5651" instrument_node="">
</span><p data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">The EU budget contributed to the strength and resilience of the European economy and to promoting solidarity and security both within and beyond its borders.</span></p><span data-dcnode-id="5648" instrument_node="">
</span><p data-dcnode-id="5638"><span data-dcnode-id="5647" instrument_node="">Measures to support economic growth and reduce the economic gaps between regions amounted to nearly half of the funds committed (€80&nbsp;billion). EU funding contributed €12.2&nbsp;billion to research and innovation under Horizon 2020, including the new </span><a data-dcnode-id="5644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/eurohpc-joint-undertaking" target="_blank"><span class="hyperlink_text" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">European High-Performance Computing Joint Undertaking</span></span></a><span data-dcnode-id="5643" instrument_node="">. The budget increased for education and training (up 17.8&nbsp;% for Erasmus+ over 2018) and transport and digital infrastructure (37.0&nbsp;% more for the CEF). Support for agriculture and rural areas remained stable at almost €60&nbsp;billion, contributing to the fight against climate change and to the promotion of sustainable growth. The 2019 budget provided the necessary flexibility to address the internal aspect of migration issues, with €386.3&nbsp;million provided to Member States via national operational programmes out of a total of €1.2&nbsp;billion support from the Asylum, Migration and Integration Fund, along with €442.7 million for border management and €92.7 million for security from the Internal Security Fund. A total of €5&nbsp;million was allocated to the creation of the new </span><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/cross-border-cases/judicial-cooperation/networks-and-bodies-supporting-judicial-cooperation/european-public-prosecutors-office_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">European Public Prosecutor’s Office</span></span></a><span data-dcnode-id="5639" instrument_node=""> to prosecute crimes against the EU budget including fraud, money laundering and corruption.</span></p><span data-dcnode-id="5637" instrument_node="">
</span><div class="clearfix" data-dcnode-id="5636"></div><span data-dcnode-id="5635" instrument_node="">
</span><div data-dcnode-id="5622"><span data-dcnode-id="5634" instrument_node="">
</span><button aria-controls="content1" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="5624" data-target="#content1" data-toggle="collapse" type="button"><span data-dcnode-id="5633" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="5630"><span data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">Less detail</span></span></span><span data-dcnode-id="5629" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="5626"><span data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">More detail</span></span></span><span data-dcnode-id="5625" instrument_node=""> </span></button><span data-dcnode-id="5623" instrument_node="">
</span></div><span data-dcnode-id="5621" instrument_node="">

</span><div class="general-report" data-dcnode-id="5568" id="chapter2"><span data-dcnode-id="5616" instrument_node="">
</span><p class="chap_number" data-dcnode-id="5613"><span data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">Chapter 2</span></span></p><span data-dcnode-id="5612" instrument_node="">
</span><h1 data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">A connected Digital Single Market</span></h1><span data-dcnode-id="5609" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="5599"><span data-dcnode-id="5608" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="5601"><span data-dcnode-id="5607" instrument_node="">
</span><img alt="Image: A primary school teacher stands over two children as they collaborate on a tablet. (© Fotolia)" class="height_width_100pct" data-dcnode-id="5606" id="PC02-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH02.jpg&amp;raw"><span data-dcnode-id="5605" instrument_node="">
</span><p class="caption" data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">© Fotolia</span></p><span data-dcnode-id="5602" instrument_node="">
</span></div><span data-dcnode-id="5600" instrument_node="">
</span></div><span data-dcnode-id="5598" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">2019 was another important year in continuing the digital transformation of our economy and society, which is already bringing benefits to consumers and businesses across the EU and beyond. This has been possible thanks to a concerted EU approach. </span></p><span data-dcnode-id="5595" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">In May, the cost of calls and texts between Member States became cheaper with the implementation of new rules setting a maximum price for calling or messaging from fixed lines or mobiles. The number of free WiFi hotspots across Europe increased thanks to an EU-funded scheme that offers towns and cities money to cover installation costs. </span></p><span data-dcnode-id="5592" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5590"><span data-dcnode-id="5591" instrument_node="">Other developments laid the groundwork for Europe’s digital future. Products and services using artificial intelligence (AI) are becoming increasingly widespread, and new EU guidelines will help reassure citizens that the technology will assist, rather than replace, humans. </span></p><span data-dcnode-id="5589" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">Europe’s ambition to become a world leader in supercomputing received a major boost with the unveiling of eight new supercomputer hosting sites. Concerns about the security of key communication networks and the data they carry were addressed. This included new proposals on strengthening the cybersecurity of 5G networks, a much bigger role for the European Union Agency for Cybersecurity, and the EU-wide rules for the cybersecurity certification of products, processes and services, as well as a commitment to develop new ultra-secure quantum security networks. </span></p><span data-dcnode-id="5586" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">New rules on copyright mean that the online work of journalists and creators will be more fairly rewarded and protected.</span></p><span data-dcnode-id="5583" instrument_node="">
</span><div data-dcnode-id="5570"><span data-dcnode-id="5582" instrument_node="">
</span><button aria-controls="content2" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="5572" data-target="#content2" data-toggle="collapse" type="button"><span data-dcnode-id="5581" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="5578"><span data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">Less detail</span></span></span><span data-dcnode-id="5577" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="5574"><span data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">More detail</span></span></span><span data-dcnode-id="5573" instrument_node=""> </span></button><span data-dcnode-id="5571" instrument_node="">
</span></div><span data-dcnode-id="5569" instrument_node="">
</span></div><span data-dcnode-id="5567" instrument_node="">
</span><div class="clearfix" data-dcnode-id="5566"></div><span data-dcnode-id="5565" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="5324" id="content2"><span data-dcnode-id="5564" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5561"><span data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">Safer, cheaper and better connectivity</span></span></h2><span data-dcnode-id="5560" instrument_node="">
</span><p data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">Connectivity was again a major issue for the EU in 2019. As our economy and society become increasingly digital and more of our time is spent using products and services online, safe, reliable and affordable connectivity is more important than ever.</span></p><span data-dcnode-id="5557" instrument_node="">
</span><div class="newvideo" data-dcnode-id="5541"><span data-dcnode-id="5556" instrument_node="">
</span><div class="newvideo_videobox col-sm-12 col-xs-12 col-md-8 col-8" data-dcnode-id="5551"><span data-dcnode-id="5555" instrument_node="">
</span><img alt="A video on the evolution of the Digital Single Market" class="GR_2015-video-poster" data-dcnode-id="5554" data-source="//europa.eu/webtools/crs/iframe/?oriurl=//www.youtube.com/embed/OkPW9mK5Vw8" data-target="CH02_VD03" data-videotype="ec" id="VD03_CH02" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/VD03_CH02.jpg&amp;raw" style="cursor: pointer;"><iframe allowfullscreen="true" data-dcnode-id="5553" frameborder="0" height="214" id="CH02_VD03" mozallowfullscreen="true" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/en&amp;raw" style="display: none;" webkitallowfullscreen="true" width="380"></iframe><span data-dcnode-id="5552" instrument_node="">
</span></div><span data-dcnode-id="5550" instrument_node="">
</span><div class="newvideo_textbox col-sm-12 col-xs-12 col-md-4 col-4" data-dcnode-id="5545"><span data-dcnode-id="5549" instrument_node="">
</span><p class="video-caption" data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">Digital Single Market: cheaper calls to other EU countries. © European Union, 2019</span></p><span data-dcnode-id="5546" instrument_node="">
</span></div><span data-dcnode-id="5544" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="5543"></span><span data-dcnode-id="5542" instrument_node="">
</span></div><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5534"><span data-dcnode-id="5539" instrument_node="">The cost of calling and messaging between Member States and other parts of Europe has varied significantly. On average, the standard price of a fixed or mobile call to a number in another country was three times higher than the standard price of a domestic call, and the standard price of a text message was more than twice as expensive. </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2429" target="_blank"><span class="hyperlink_text" data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">Price caps introduced in May</span></span></a><span data-dcnode-id="5535" instrument_node=""> set the maximum cost of calls from fixed or mobile phones at no more than €0.19&nbsp;+&nbsp;value added tax (VAT) per minute, while text messages now cost no more than €0.06&nbsp;+&nbsp;VAT. After the abolition of mobile roaming charges in 2017, the cap on international calls in Europe brings a clear and immediate benefit to consumers and businesses. </span></p><span data-dcnode-id="5533" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5523"><span data-dcnode-id="5532" instrument_node="">
</span><div class="img-large" data-dcnode-id="5525"><span data-dcnode-id="5531" instrument_node="">
</span><img alt="Graphic showing the decrease in digital barriers for the benefit of consumers and businesses" aria-describedby="GR19" data-dcnode-id="5530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH02_GR19-EN.jpg&amp;raw"><span data-dcnode-id="5529" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5527" id="GR19"><span data-dcnode-id="5528" instrument_node="">Breaking down digital barriers is crucial for consumers and businesses. In the online world, the EU’s four freedoms – the free movement of goods, capital, services and labour – are not yet a reality. For this reason, the Juncker Commission has been tackling these problems.  

										Before 2014, Europeans could not use their online subscriptions while they travelled, and streaming of their favourite TV shows might also have been blocked abroad. They also faced high roaming prices for using a phone abroad in Europe; over 0.50 euro per minute for a voice call and 0.28 euro for a text message in 2007. Consumer rights were not adapted to the digital age, and consumers were geoblocked from accessing goods and services online in other countries, for example requiring payment with a debit or credit card from a specific country only.

										Since April 2018, Europeans can access their online subscriptions to films, sports events, e-books, video games or music services while travelling to another Member State.

										They do not pay roaming charges when travelling within the European Union, a policy that, according to 70 % of Europeans, is already showing its benefits.

										Moreover, updated consumer protection rules and new digital contract rules will grant consumers more rights in the online world and will give consumers confidence when buying online and from different Member States. Since 3 December 2018, the new rules against unjustified geoblocking ensure that consumers can access goods and services online without worrying about discrimination or geographically based restrictions.

										Source: European Commission</span></p><span data-dcnode-id="5526" instrument_node="">
</span></div><span data-dcnode-id="5524" instrument_node="">
</span></div><span data-dcnode-id="5522" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="5512"><span data-dcnode-id="5521" instrument_node="">
</span><div class="img-large" data-dcnode-id="5514"><span data-dcnode-id="5520" instrument_node="">
</span><img alt="A summary of the Wifi4EU initiative" aria-describedby="GR20" data-dcnode-id="5519" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH02_GR20-EN.jpg&amp;raw"><span data-dcnode-id="5518" instrument_node="">
</span><p class="longdesc" data-dcnode-id="5516" id="GR20"><span data-dcnode-id="5517" instrument_node="">WiFi4EU-funded networks must be free of charge, free of advertising and free from commercial reuse of data. In addition, the designated public spaces must display the WiFi4EU visual identity as well as show that they are co-funded by the European Union.

										Source:  European Commission</span></p><span data-dcnode-id="5515" instrument_node="">
</span></div><span data-dcnode-id="5513" instrument_node="">
</span></div><span data-dcnode-id="5511" instrument_node="">
</span><p data-dcnode-id="5505"><span data-dcnode-id="5510" instrument_node="">Other tangible benefits came when a scheme was launched to help local authorities install free WiFi hotspots. The </span><a data-dcnode-id="5507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/wifi4eu-questions-and-answers" target="_blank"><span class="hyperlink_text" data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">WiFi4EU initiative</span></span></a><span data-dcnode-id="5506" instrument_node=""> aims to help up to 8&nbsp;000 communities across the EU to improve their connectivity. EU grants of €15&nbsp;000 are available for local authorities to finance the installation of hotspots. Two calls for applications took place, with more than 5&nbsp;000 communities benefiting from the scheme in addition to the 2&nbsp;800 that already received help in 2018. Each community has 18&nbsp;months to invest the funding in the necessary equipment to create their public WiFi hotspots. </span></p><span data-dcnode-id="5504" instrument_node="">
</span><p data-dcnode-id="5498"><span data-dcnode-id="5503" instrument_node="">Connectivity in rural areas was also given a boost during the year. Only 53&nbsp;% of people living in remote and rural areas have fast internet access compared to 82&nbsp;% in the EU as a whole. Closing this digital gap is a key priority. The </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/broadband-competence-offices" target="_blank"><span class="hyperlink_text" data-dcnode-id="5501"><span data-dcnode-id="5502" instrument_node="">Broadband Competence Offices Network</span></span></a><span data-dcnode-id="5499" instrument_node=""> grew significantly in 2019, with 116 national and regional offices now helping to coordinate efforts to expand broadband coverage to the furthest corners of the EU. Better and faster broadband coverage will improve access to education, health, government services and businesses, will facilitate jobs and investment and will support communities in these areas.</span></p><span data-dcnode-id="5497" instrument_node="">
</span><p data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">The expansion of the network came as Member States pledged in April to work together to unlock the potential of digital technologies so that important and urgent economic, social, climate and environmental challenges facing the wider rural economy, including the EU’s food and farming sector, could be tackled. </span></p><span data-dcnode-id="5494" instrument_node="">
</span><p data-dcnode-id="5488"><span data-dcnode-id="5493" instrument_node="">In the run-up to the European Parliament elections in May, a campaign to raise awareness about online violence against women, </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/digitalrespect4her" target="_blank"><span class="hyperlink_text" data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">#DigitalRespect4Her</span></span></a><span data-dcnode-id="5489" instrument_node="">, featured testimonies from female parliamentarians, experts and journalists highlighting the particular issues that women face on social media and elsewhere online. </span></p><span data-dcnode-id="5487" instrument_node="">
</span><p data-dcnode-id="5478"><span data-dcnode-id="5486" instrument_node="">Digitalisation is also helping to underpin the wider work of breaking down barriers within the EU Single Market, of which the launch of the </span><a data-dcnode-id="5483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/social/main.jsp%3FcatId%3D869" target="_blank"><span class="hyperlink_text" data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">Electronic Exchange of Social Security Information</span></span></a><span data-dcnode-id="5482" instrument_node=""> was a tangible example. The project helps social security institutions across the EU, Iceland, Liechtenstein, Norway and Switzerland exchange information on cases involving citizens moving, living and working between countries. It began live operations in January 2019 and 31 countries are now rolling out the system. They had already exchanged information on more than 175</span><span class="basic-italics CharOverride-1" data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">&nbsp;</span></span><span data-dcnode-id="5479" instrument_node="">000 cases by the end of the year. The system is designed to help citizens access their information more effectively and have their social security benefits calculated more quickly and more accurately, as well as to help social security administrations fight more effectively against fraud. </span></p><span data-dcnode-id="5477" instrument_node="">
</span><p data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">In a similar vein, the collection of VAT from online sellers will also improve thanks to new rules agreed in March that will allow online businesses to register just once for VAT purposes rather than in each Member State where they sell. This will significantly reduce the cost in time and money for smaller companies operating online across borders. The new rules will also help national tax authorities more easily collect the VAT due from non-EU companies selling goods to EU consumers from the online marketplaces they use, assisting in the recovery of the €5&nbsp;billion in tax revenues lost in the sector each year.</span></p><span data-dcnode-id="5474" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5471"><span data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">Protecting rights in the digital age</span></span></h2><span data-dcnode-id="5470" instrument_node="">
</span><p data-dcnode-id="5460"><span data-dcnode-id="5469" instrument_node="">Other initiatives designed to protect the rights of consumers and businesses online were introduced, including </span><a data-dcnode-id="5466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/04/15/eu-adopts-new-rules-on-sales-contracts-for-goods-and-digital-content/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5467"><span data-dcnode-id="5468" instrument_node="">new rules</span></span></a><span data-dcnode-id="5465" instrument_node=""> on contracts for the supply of digital content and digital services and on contracts for the sale of goods, which help make it clearer and simpler to do business online. </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/14/eu-introduces-transparency-obligations-for-online-platforms/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">One single set of rules</span></span></a><span data-dcnode-id="5461" instrument_node=""> across the EU will help businesses understand their obligations, while consumers will benefit from clear remedies when digital content, services and goods, including products with a digital element (e.g. smart fridges), are faulty.</span></p><span data-dcnode-id="5459" instrument_node="">
</span><p data-dcnode-id="5454"><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/04/15/eu-adjusts-copyright-rules-to-the-digital-age/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">New EU rules</span></span></a><span data-dcnode-id="5455" instrument_node=""> were also agreed to bring the complex regulations on copyright up to date for the digital world. Music-streaming services, video-on-demand platforms, news aggregators and user-uploaded-content platforms have become the main gateways to access creative works and press articles. The new rules guarantee fairer remuneration for creators, stronger rights for users and clearer responsibility for platforms. The aim is to improve access to online copyrighted material across borders, to set new rights and responsibilities for online platforms hosting copyrighted works, to encourage online press and journalism and improve remuneration for journalists, and to make it easier to use copyrighted material for education and research purposes. </span></p><span data-dcnode-id="5453" instrument_node="">
</span><p data-dcnode-id="5435"><span data-dcnode-id="5452" instrument_node="">Europe continued to act decisively in tackling unfair business practices in the digital economy. In March, </span><a data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1770" target="_blank"><span class="hyperlink_text" data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">Google</span></span></a><span data-dcnode-id="5448" instrument_node=""> was fined €1.49&nbsp;billion for imposing anti-competitive contractual restrictions on third-party websites, which prevented or deterred rivals from being able to place their search adverts on them. In June, a formal investigation was launched into the practices of </span><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_3410" target="_blank"><span class="hyperlink_text" data-dcnode-id="5446"><span data-dcnode-id="5447" instrument_node="">Broadcom</span></span></a><span data-dcnode-id="5444" instrument_node="">, a global leader in components for wired communication devices such as modems and TV set-top boxes, to assess whether it illegally excluded competitors. In October, the Commission imposed interim measures on Broadcom with a view to ensuring that serious and irreparable damage to competition does not occur pending its investigation on the merits of certain allegedly exclusionary practices by the company. </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4350" target="_blank"><span class="hyperlink_text" data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">Qualcomm</span></span></a><span data-dcnode-id="5440" instrument_node=""> was fined €242&nbsp;million in July for selling the chipsets that connect smartphones and tablets to cellular networks below cost with the intention of eliminating its main rival in the market segment. An investigation was also opened into how </span><a data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/ip_19_4291" target="_blank"><span class="hyperlink_text" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">Amazon</span></span></a><span data-dcnode-id="5436" instrument_node=""> uses data from other merchants that sell goods on its websites.</span></p><span data-dcnode-id="5434" instrument_node="">
</span><p data-dcnode-id="5424"><span data-dcnode-id="5433" instrument_node="">From July, new rules started to apply on </span><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/online-platforms-digital-single-market" target="_blank"><span class="hyperlink_text" data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">online platform-to-business relationships</span></span></a><span data-dcnode-id="5429" instrument_node="">, putting in place a harmonised framework for minimum transparency and redress rights. These rules protect companies that depend on online platforms for reaching consumers while safeguarding the innovation potential of platforms; they are accompanied by the </span><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/eu-observatory-online-platform-economy" target="_blank"><span class="hyperlink_text" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Observatory on the Online Platform Economy</span></span></a><span data-dcnode-id="5425" instrument_node="">.</span></p><span data-dcnode-id="5423" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5420"><span data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">Making networks more secure</span></span></h2><span data-dcnode-id="5419" instrument_node="">
</span><p data-dcnode-id="5409"><span data-dcnode-id="5418" instrument_node="">There were also </span><a data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/QANDA_19_3369" target="_blank"><span class="hyperlink_text" data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">new rules</span></span></a><span data-dcnode-id="5414" instrument_node=""> from the EU on the cybersecurity of networks as a whole. This includes recommendations on the security of </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/news/common-eu-approach-security-5g-networks-2019-mar-26_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">next-generation 5G networks</span></span></a><span data-dcnode-id="5410" instrument_node="">, where the high performance capacity is expected to lead to a further expansion in the number and range of digital products and services and to estimated revenues of €225&nbsp;billion in 2025. Between March and June, Member States carried out extensive risk assessments of their 5G network infrastructure and toughened up their rules to improve the security of public networks. </span></p><span data-dcnode-id="5408" instrument_node="">
</span><p data-dcnode-id="5398"><span data-dcnode-id="5407" instrument_node="">The </span><a data-dcnode-id="5404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/eu-cybersecurity-act" target="_blank"><span class="hyperlink_text" data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">Cybersecurity Act</span></span></a><span data-dcnode-id="5403" instrument_node=""> came into force in June, setting out the future direction of EU cybersecurity policy. This includes starting work on the development of a new cybersecurity certification framework for digital products, services and processes, and a stronger role for the </span><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/cybersecurity-eu-cybersecurity-agency-and-eu-framework-cybersecurity-certification" target="_blank"><span class="hyperlink_text" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">European Union Agency for Cybersecurity</span></span></a><span data-dcnode-id="5399" instrument_node="">. As well as playing a key role in setting up and maintaining the certification framework, the agency is mandated to increase operational cooperation at EU level, which involves helping Member States that request it to handle cybersecurity incidents and supporting the coordination of the EU in case of large-scale cross-border cyberattacks and crises.</span></p><span data-dcnode-id="5397" instrument_node="">
</span><p data-dcnode-id="5391"><span data-dcnode-id="5396" instrument_node="">The same month saw seven Member States (Belgium, Germany, Spain, Italy, Luxembourg, Malta and the Netherlands) pledge to accelerate the development of </span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/future-quantum-eu-countries-plan-ultra-secure-communication-network" target="_blank"><span class="hyperlink_text" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">ultra-secure quantum networks</span></span></a><span data-dcnode-id="5392" instrument_node=""> to boost European capabilities in quantum technologies and cybersecurity and to guarantee the safety and security of the networks of the future. Their ambitious proposals call for a new quantum communication infrastructure that would enable information and data to be transmitted and stored ultra-securely and that would link communication assets all over the EU. It would integrate quantum technologies and systems into conventional communication infrastructures and would consist of two elements: an earth-based component, making use of existing fibre communication networks linking strategic sites at national and cross-border levels, and a space-based component to cover long distances across Europe and other continents. </span></p><span data-dcnode-id="5390" instrument_node="">
</span><p data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">Using this network for critical infrastructure and encryption systems will help protect smart energy grids, air traffic control, banks, healthcare facilities and more from hacking. It will also enable data centres to store and exchange information safely and will preserve the long-term privacy of government data. </span></p><span data-dcnode-id="5387" instrument_node="">
</span><p data-dcnode-id="5381"><span data-dcnode-id="5386" instrument_node="">In May, the Council established a </span><a data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/17/cyber-attacks-council-is-now-able-to-impose-sanctions/" target="_blank"><span class="hyperlink_text" data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">framework</span></span></a><span data-dcnode-id="5382" instrument_node=""> that allows the EU to impose targeted restrictive measures to deter and respond to cyberattacks that constitute an external threat to the EU or its Member States. This includes cyberattacks against non-EU countries or international organisations where restrictive measures are considered necessary to achieve the objectives of the Common Foreign and Security Policy.</span></p><span data-dcnode-id="5380" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="5377"><span data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">Preparing for the technologies of the future</span></span></h2><span data-dcnode-id="5376" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5373"><span data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Artificial intelligence</span></span></h3><span data-dcnode-id="5372" instrument_node="">
</span><p data-dcnode-id="5366"><span data-dcnode-id="5371" instrument_node="">Also looking to the future, Europe wants to benefit fully from the many potential improvements AI could bring and in recent years has strongly invested in boosting its AI capacity. However, against a backdrop of concerns about the development of AI, in 2019 a high-level group of experts started to develop </span><a data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/ethics-guidelines-trustworthy-ai" target="_blank"><span class="hyperlink_text" data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">guidelines for the ethical development</span></span></a><span data-dcnode-id="5367" instrument_node=""> of the technology to make sure it continues to serve, and not harm, society. The ethics guidelines for trustworthy AI were drawn up by experts from across the EU and are expected to form part of future proposals on human-centric AI planned for the early part of 2020. They cover issues as diverse as how to avoid discrimination in the development of AI systems and how to make sure they are sustainable and environmentally friendly. </span></p><span data-dcnode-id="5365" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5362"><span data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">Supercomputing</span></span></h3><span data-dcnode-id="5361" instrument_node="">
</span><p data-dcnode-id="5355"><span data-dcnode-id="5360" instrument_node="">The quantities of data needed to support the development of AI require considerable amounts of computing power, and Europe has traditionally lagged behind the rest of the world in this regard. In June, eight sites across the continent were chosen to host </span><a data-dcnode-id="5357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/europe-announces-eight-sites-host-world-class-supercomputers" target="_blank"><span class="hyperlink_text" data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">new European supercomputers</span></span></a><span data-dcnode-id="5356" instrument_node="">, helped by €840&nbsp;million in EU and Member State funding. The sites in Sofia (Bulgaria), Ostrava (Czechia), Barcelona (Spain), Bologna (Italy), Bissen (Luxembourg), Minho (Portugal), Maribor (Slovenia) and Kajaani (Finland) will eventually host new supercomputers that could boost Europe’s supercomputing capacity four- to fivefold, with the aim of making it a global leader in this field. The supercomputers could be used to help develop personalised medicines, improve drug and material design and develop new bioengineering techniques, as well as for weather forecasting and climate change modelling.  </span></p><span data-dcnode-id="5354" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="5351"><span data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">Looking ahead: completing the Digital Single Market</span></span></h3><span data-dcnode-id="5350" instrument_node="">
</span><p data-dcnode-id="5340"><span data-dcnode-id="5349" instrument_node="">A completed </span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en" target="_blank"><span class="hyperlink_text" data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">Digital Single Market</span></span></a><span data-dcnode-id="5345" instrument_node=""> would help the EU maintain its position as a world leader in the digital economy. Since the launch of the strategy in 2015, 30 different legal proposals have been put forward and, by the end of 2019, 28 of these had been agreed, five more than at the end of the previous year. The two remaining proposals, the first covering online privacy and the second covering the </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/proposal-regulation-establishing-european-cybersecurity-industrial-technology-and-research" target="_blank"><span class="hyperlink_text" data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">European Cybersecurity Industrial, Technology and Research Competence Centre and the Network of National Coordination Centres</span></span></a><span data-dcnode-id="5341" instrument_node="">, are expected to be agreed in 2020. The European Commission has also prioritised a number of digital issues, including building on the ethical guidelines to put forward legislation for a coordinated European approach on the human and ethical implications of AI, and passing a new Digital Services Act to update liability and safety rules for digital platforms, services and products. </span></p><span data-dcnode-id="5339" instrument_node="">
</span><div data-dcnode-id="5326"><span data-dcnode-id="5338" instrument_node="">
</span><button aria-controls="content2" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="5328" data-target="#content2" data-toggle="collapse" type="button"><span data-dcnode-id="5337" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="5334"><span data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">Less detail</span></span></span><span data-dcnode-id="5333" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="5330"><span data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">More detail</span></span></span><span data-dcnode-id="5329" instrument_node=""> </span></button><span data-dcnode-id="5327" instrument_node="">
