</span><p data-dcnode-id="1738"><span data-dcnode-id="1751" instrument_node="">The 2018 EU–Japan Strategic Partnership Agreement, provisionally applied since February 2019, and the </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/trade/policy/in-focus/eu-japan-economic-partnership-agreement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Economic Partnership Agreement</span></span></a><span data-dcnode-id="1747" instrument_node="">, in force since then as well, started to bear fruit in 2019. The 26th EU–Japan summit took place in Brussels in April. On 7&nbsp;September, President Juncker and Prime Minister Abe signed a </span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/68018/partnership-sustainable-connectivity-and-quality-infrastructure-between-european-union-and_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Partnership on Sustainable Connectivity and Quality Infrastructure</span></span></a><span data-dcnode-id="1743" instrument_node="">. It is the first of its kind and underlines the strategic importance of this </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/delegations/japan_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">relationship</span></span></a><span data-dcnode-id="1739" instrument_node="">, which both parties have committed to strengthen.  </span></p><span data-dcnode-id="1737" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1734"><span data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">China</span></span></h3><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1732" instrument_node="">In March, against the backdrop of China’s growing economic power and political influence, the European Commission and the High Representative reviewed EU–China relations and the related opportunities and challenges in a </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/news/eu-china-strategic-outlook-2019-mar-12_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">joint communication</span></span></a><span data-dcnode-id="1728" instrument_node="">. They set out 10 concrete actions that were then discussed by leaders at the European Council on 21&nbsp;March.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1725" instrument_node="">At their </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-19-2055_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">summit</span></span></a><span data-dcnode-id="1721" instrument_node=""> in April, the EU and China committed to deepen the strategic partnership and to adopt a new cooperation agenda beyond 2020 by their next summit. Both sides agreed to identify common EU–Asia railway corridors and are working on local development in transit countries. The two are more engaged on Asian security, from military cooperation with the Association of Southeast Asian Nations to supporting the denuclearisation of the Korean peninsula.</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1718" instrument_node="">A more strategic approach to Asia in 2019 was part of the EU’s aim to pursue a coherent approach to China’s connectivity drive westwards. The EU’s </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/delegations/china/50752/european-way-connectivity-%25E2%2580%2593-new-strategy-how-better-connect-europe-and-asia_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">connectivity strategy</span></span></a><span data-dcnode-id="1714" instrument_node=""> promotes a policy that includes infrastructure projects creating fair economic opportunities and fostering sustainable connectivity. </span></p><span data-dcnode-id="1712" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1709"><span data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The Middle East</span></span></h2><span data-dcnode-id="1708" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1705"><span data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Iran </span></span></h3><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1703" instrument_node="">In 2019, the EU continued to support the Iran nuclear deal and its full and effective implementation in all its aspects. The EU regrets the withdrawal of the United States from the </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/policies/sanctions/iran/jcpoa-restrictive-measures/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Joint Comprehensive Plan of Action</span></span></a><span data-dcnode-id="1699" instrument_node=""> and its reimposition of sanctions and has been deeply concerned that Iran started to pursue activities inconsistent with its commitments under the deal. In line with the </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/02/04/iran-council-adopts-conclusions/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Council conclusions of 4 February 2019</span></span></a><span data-dcnode-id="1695" instrument_node="">, the EU is pursuing a comprehensive approach with Iran in order to address all issues of concern and to balance elements of relevant criticism with constructive high-level dialogue, including through the </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/delegations/iran/59807/eue4-hold-political-consultations-regional-issues-iran_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">EU-led political dialogue with Iran</span></span></a><span data-dcnode-id="1691" instrument_node=""> on regional issues. </span></p><span data-dcnode-id="1689" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1686"><span data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Israel, Palestine and the Middle East peace process</span></span></h3><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1684" instrument_node="">The EU continued to defend and promote the principle of a two-state solution to the Israeli–Palestinian conflict based on the agreed international parameters. The EU also provided almost </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-19-2341_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">€350&nbsp;million in financial support</span></span></a><span data-dcnode-id="1680" instrument_node=""> to the Palestinians, with much of the funding aimed at efforts to build the foundations of the future Palestinian state.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1665"><span data-dcnode-id="1677" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1673"><span data-dcnode-id="1676" instrument_node="">
</span><img alt="Erasmus+ ambassadors sitting behind a desk, fielding questions from fellow students " data-dcnode-id="1675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH32.jpg&amp;raw"><span data-dcnode-id="1674" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1669"><p class="caption" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Students at the Erasmus+ information stand during the exhibition and networking session of the #EU4YOUth campus tour promoting the EU with young people, Birzeit, Palestine, 21&nbsp;February 2019.</span></p></div><span data-dcnode-id="1668" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1667"></span><span data-dcnode-id="1666" instrument_node="">
</span></div><span data-dcnode-id="1664" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1661"><span data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Syria</span></span></h3><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1659" instrument_node="">At the </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/03/14/brussels-iii-conference-on-supporting-the-future-of-syria-and-the-region-co-chairs-declaration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Brussels&nbsp;III Conference on Syria</span></span></a><span data-dcnode-id="1655" instrument_node=""> in March, the EU pledged €560&nbsp;million for 2020 to support humanitarian, resilience and development activities in the country as well as in Jordan and Lebanon.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1650"><span data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Libya</span></span></h3><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">EU engagement in 2019 focused on supporting international and regional efforts to find a sustainable solution to the political crisis in Libya and to promote its economic development. </span></p><span data-dcnode-id="1646" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1643"><span data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Security and defence </span></span></h2><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Member States can now better protect citizens, invest in cooperation on defence, spend more efficiently and engage with partners and neighbours even more than before.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1638" instrument_node="">In 2019, the EU continued its efforts to counter hybrid threats. The High Representative and the Commission reported on the implementation of the </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/en/TXT/%3Furi%3DCELEX%253A52016JC0018" target="_blank"><span class="hyperlink_text" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">2016 joint framework</span></span></a><span data-dcnode-id="1634" instrument_node=""> on countering hybrid threats and the </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/GA/TXT/%3Furi%3DCELEX%3A52018JC0016" target="_blank"><span class="hyperlink_text" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">2018 joint communication</span></span></a><span data-dcnode-id="1630" instrument_node=""> on increasing resilience and bolstering capabilities to address them. </span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1627" instrument_node="">The EU has further strengthened the three dedicated Strategic Communications Task Forces (East, western Balkans and South). Progress was also made in tackling disinformation from external and internal sources. The 2018 </span><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/topics/countering-disinformation/54866/action-plan-against-disinformation_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Action Plan against Disinformation</span></span></a><span data-dcnode-id="1623" instrument_node=""> guided this work, focusing on detecting and analysing disinformation activities, supporting cooperation between Member States by establishing a </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/sites/eeas/files/ras_factsheet_march_2019_0.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Rapid Alert System</span></span></a><span data-dcnode-id="1619" instrument_node="">, working with social media platforms in the framework of the 2018 </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/code-practice-disinformation" target="_blank"><span class="hyperlink_text" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Code of Practice</span></span></a><span data-dcnode-id="1615" instrument_node=""> and enhancing awareness-raising activities. The EU also cooperated with international partners in the field, such as the G7 and NATO. See also Chapter&nbsp;7.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1612" instrument_node="">The </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hybridcoe.fi/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">European Centre of Excellence for Countering Hybrid Threats</span></span></a><span data-dcnode-id="1608" instrument_node=""> made progress in 2019 with more members, an approved work programme and a working budget. The centre continued to provide support in key areas such as training and exercises. </span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1605" instrument_node="">The year saw a </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/14/defence-cooperation-council-assesses-progress-made-in-the-framework-of-pesco-after-first-year-of-implementation/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">stocktake of Member States’ progress</span></span></a><span data-dcnode-id="1601" instrument_node=""> in fulfilling their commitments under </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eda.europa.eu/what-we-do/our-current-priorities/permanent-structured-cooperation-%28pesco%29" target="_blank"><span class="hyperlink_text" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Permanent Structured Cooperation</span></span></a><span data-dcnode-id="1597" instrument_node=""> (PESCO). The EU noted that participating Member States made progress in increasing defence budgets and joint defence investment, with aggregated defence budgets rising by 3.3&nbsp;% in 2018 and 4.6&nbsp;% in 2019. Participating Member States are increasingly using EU instruments in national defence planning, such as the revised </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eda.europa.eu/what-we-do/activities/activities-search/capability-development-plan" target="_blank"><span class="hyperlink_text" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Capability Development Plan</span></span></a><span data-dcnode-id="1593" instrument_node=""> and the </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eda.europa.eu/what-we-do/our-current-priorities/coordinated-annual-review-on-defence-%28card%29" target="_blank"><span class="hyperlink_text" data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Coordinated Annual Review on Defence</span></span></a><span data-dcnode-id="1589" instrument_node="">, which have informed the work programme for the </span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/growth/content/2019-calls-proposals-european-defence-industrial-development-programme-edidp_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">European Defence Industrial Development Programme</span></span></a><span data-dcnode-id="1585" instrument_node="">. </span></p><span data-dcnode-id="1583" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="1573"><span data-dcnode-id="1582" instrument_node="">
</span><div class="img-large" data-dcnode-id="1575"><span data-dcnode-id="1581" instrument_node="">
</span><img alt="Graphic explaining the benefits of a European Defence Fund" aria-describedby="GR66" data-dcnode-id="1580" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_GR66-EN.jpg&amp;raw"><span data-dcnode-id="1579" instrument_node="">
</span><p class="longdesc" data-dcnode-id="1577" id="GR66"><span data-dcnode-id="1578" instrument_node="">The European Union needs a European Defence Fund for several reasons. First, the lack of cooperation between Member States in the field of security and defence is estimated to cost between 25 billion euro and 100 billion euro every year. Additionally, around 80 % of defence procurement is currently run on a purely national basis, leading to a costly duplication of military capabilities. Finally, since 2010, less than 200 million euro have been spent each year on collaborative European research and technology in the field of defence.</span></p><span data-dcnode-id="1576" instrument_node="">
</span></div><span data-dcnode-id="1574" instrument_node="">
</span></div><span data-dcnode-id="1572" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1569"><span data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Development aid and humanitarian assistance</span></span></h2><span data-dcnode-id="1568" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1565"><span data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Development aid </span></span></h3><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">The EU continued to be one of the driving forces behind the 2030 Agenda for Sustainable Development. In New York in September, it gathered with world leaders for the first-ever UN Sustainable Development Goals Summit and reported on progress in the Joint Synthesis Report. </span></p><span data-dcnode-id="1561" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1548"><span data-dcnode-id="1560" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1556"><span data-dcnode-id="1559" instrument_node="">
</span><img alt="A group of young people sitting around a ‘Faces to Hearts’ sign" data-dcnode-id="1558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH33.jpg&amp;raw"><span data-dcnode-id="1557" instrument_node="">
</span></div><span data-dcnode-id="1555" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1552"><p class="caption" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Participants in the European Development Days 2019 ‘Faces2Hearts’ campaign discussing inequalities in global development, Brussels, Belgium, 19&nbsp;June 2019.</span></p></div><span data-dcnode-id="1551" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1550"></span><span data-dcnode-id="1549" instrument_node="">
</span></div><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">‘Inequalities’ was the theme of the 2019 European Development Days and the Commission issued a staff working document on the topic. Furthermore, the EU helped fight gender-based violence under the ‘Spotlight’ initiative, joining forces with the UN and new partner countries to continue vital work on regional programmes, including the launch of a consultation in the Pacific regarding the design of the €50&nbsp;million programme for the region.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The EU continued to build on its partnership with Africa. The Africa–Europe Alliance for Sustainable Investment and Jobs made significant progress, notably leveraging over €40&nbsp;billion in investments under the External Investment Plan so far.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="1531"><span data-dcnode-id="1540" instrument_node="">
</span><div class="img-large" data-dcnode-id="1533"><span data-dcnode-id="1539" instrument_node="">
</span><img alt="Graph showing increased European Union humanitarian funding for education in emergencies since 2015" aria-describedby="GR67" data-dcnode-id="1538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_GR67-EN.jpg&amp;raw"><span data-dcnode-id="1537" instrument_node="">
</span><p class="longdesc" data-dcnode-id="1535" id="GR67"><span data-dcnode-id="1536" instrument_node="">European Union humanitarian funding for education in emergencies has grown from 13 million euro in 2015 to 63 million euro in 2016 and 2017, to 91 million euro in 2018 and 164 million euro in 2019.</span></p><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span></div><span data-dcnode-id="1530" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1527"><span data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Responding to humanitarian crises and emergencies</span></span></h3><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The EU’s humanitarian budget of €1.6&nbsp;billion helped millions of people worldwide in 2019. The biggest share went to refugees and internally displaced persons created by the Syrian and Yemeni conflicts. More than 10&nbsp;% of the budget went to ‘forgotten crises’, such as the situation with regional refugees in Burundi, the conflict in Ukraine and humanitarian issues in Colombia.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The EU allocated a record 10&nbsp;% of its humanitarian budget to provide safe and good-quality education for children in emergencies. It was also a leading donor in the Ebola response.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1519" instrument_node="">In 2019, the EU activated its </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/echo/what/civil-protection/mechanism_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Civil Protection Mechanism</span></span></a><span data-dcnode-id="1515" instrument_node=""> on 17 occasions to respond to sudden disasters in Albania, Africa, Asia and Latin America. When Cyclone Idai struck Mozambique in 2019, eight teams of civil protection specialists were sent, together with water purification equipment, tents, hygiene kits and food.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="1503"><span data-dcnode-id="1512" instrument_node="">
</span><div class="img-large" data-dcnode-id="1505"><span data-dcnode-id="1511" instrument_node="">
</span><img alt="A summary of European Union humanitarian aid in 2019" aria-describedby="GR68" data-dcnode-id="1510" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_GR68-EN.jpg&amp;raw"><span data-dcnode-id="1509" instrument_node="">
</span><p class="longdesc" data-dcnode-id="1507" id="GR68"><span data-dcnode-id="1508" instrument_node="">The total European Union humanitarian aid budget for 2019 was 1.6 billion euro. 

										From the total budget, 385 million euro was allocated to sub-Saharan Africa; 860 million euro to the Syrian crisis, covering funding in Egypt, Jordan, Lebanon, Syria and Turkey; 88 million euro was allocated to Iraq, Palestine and Yemen; 105 million euro was allocated to Asia, Latin America, the Pacific and the Caribbean; and 32 million euro was allocated to North Africa and the European Union neighbourhood. 174 million euro went towards reserves and non-geographic allocations.

										Source: European Commission

										Copyright: European Union</span></p><span data-dcnode-id="1506" instrument_node="">
</span></div><span data-dcnode-id="1504" instrument_node="">
</span></div><span data-dcnode-id="1502" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1499"><span data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Human rights and democracy </span></span></h2><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1497" instrument_node="">The EU remained deeply engaged in promoting and defending </span><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/topics/human-rights-democracy_en%3Fpage%3D2" target="_blank"><span class="hyperlink_text" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">human rights and democracy</span></span></a><span data-dcnode-id="1493" instrument_node=""> around the world: from joint actions with the UN, such as the flagship EU–Unicef campaign </span><span class="basic-italics _idGenCharOverride-1" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">#TheRealChallenge</span></span><span data-dcnode-id="1490" instrument_node=""> to mark the 30th anniversary of the UN Convention on the Rights of the Child, to the new </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/topics/human-rights-democracy/67441/eu-steps-efforts-towards-torture-free-world_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">EU guidelines on combating torture</span></span></a><span data-dcnode-id="1486" instrument_node=""> on a global scale. The EU was active in the </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/58788/7th-world-congress-against-death-penalty_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">seventh World Congress against the Death Penalty</span></span></a><span data-dcnode-id="1482" instrument_node="">, sent numerous election observation missions and adopted new </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/10/14/democracy-eu-adopts-conclusions/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">conclusions on democracy</span></span></a><span data-dcnode-id="1478" instrument_node=""> in October. </span></p><span data-dcnode-id="1476" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1473"><span data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">EU support for multilateralism, global governance and the rules-based system </span></span></h2><span data-dcnode-id="1472" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1469"><span data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">EU–United Nations relations</span></span></h3><span data-dcnode-id="1468" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1455"><span data-dcnode-id="1467" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1463"><span data-dcnode-id="1466" instrument_node="">
</span><img alt="Donald Tusk speaking at a podium" data-dcnode-id="1465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH34.jpg&amp;raw"><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1459"><p class="caption" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Donald Tusk, President of the European Council, addresses the UN General Assembly, New York, United States, 26&nbsp;September 2019.</span></p></div><span data-dcnode-id="1458" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1457"></span><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1453" instrument_node="">In times when the UN system has been questioned, the EU has stepped up its commitment to multilateralism and to the international organisation. The EU is the largest contributor to UN peacekeeping missions and the UN budget. It has supported UN-led peace talks, from Syria to Libya, and has set up initiatives such as the trilateral partnership between the EU, the UN and the African Union. The annual </span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/67664/euunga-leading-world-cooperation-tackle-global-challenges_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">UN General Assembly</span></span></a><span data-dcnode-id="1449" instrument_node=""> showed the depth of this support.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1444"><span data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">A stronger EU–NATO partnership</span></span></h3><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1430"><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/28286/eu-nato-cooperation-factsheet_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">EU–NATO cooperation</span></span></a><span data-dcnode-id="1439" instrument_node=""> constitutes an integral part of the EU’s work in strengthening </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/topics/common-security-and-defence-policy-csdp/431/common-security-and-defence-policy-csdp_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">European security and defence</span></span></a><span data-dcnode-id="1435" instrument_node="">. Published in June, the </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/39782/fourth-report-ue-nato-cooperation-en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">fourth progress report</span></span></a><span data-dcnode-id="1431" instrument_node=""> on the implementation of the common set of proposals endorsed by NATO and the EU in 2016 and 2017 highlighted concrete deliverables in all areas of cooperation and notably in the key areas of strengthening political dialogue, military mobility, countering hybrid threats, parallel and coordinated exercises and defence capabilities.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1426"><span data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">The EU in the G7 and G20</span></span></h3><span data-dcnode-id="1425" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1412"><span data-dcnode-id="1424" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1420"><span data-dcnode-id="1423" instrument_node="">
</span><img alt="Lee Hsien Loong, Jean-Claude Juncker, Donald Trump, Shinzō Abe and Xi Jinping sitting alongside each other" data-dcnode-id="1422" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH35.jpg&amp;raw"><span data-dcnode-id="1421" instrument_node="">
</span></div><span data-dcnode-id="1419" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1416"><p class="caption" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">World leaders Lee Hsien Loong, Prime Minister of Singapore, Jean-Claude Juncker, President of the European Commission, Donald Trump, President of the United States, Shinzō Abe, Prime Minister of Japan, and Xi Jinping, President of China, gather for the G20 summit, Osaka, Japan, 28&nbsp;June 2019.</span></p></div><span data-dcnode-id="1415" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1414"></span><span data-dcnode-id="1413" instrument_node="">
</span></div><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1410" instrument_node="">The European Union is a member of the G7 and G20. In these fora, it fights to preserve the rules-based international order, which is currently under great strain, in terms of trade, security, climate change and human rights. As in previous years, throughout 2019 the EU remained a strong supporter of international cooperation. At the G20 Summit in Osaka, Japan, coordination among European leaders was instrumental in achieving a </span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/29/g20-osaka-leaders-declaration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">final declaration</span></span></a><span data-dcnode-id="1406" instrument_node=""> that preserves past commitments regarding the implementation of the Paris Agreement and the 2030 Agenda for Sustainable Development and pushes for ambitious progress on the World Trade Organization’s reform and on a global solution for digital taxation. In August in Biarritz, France, G7 leaders agreed on a </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elysee.fr/en/g7/2019/08/26/g7-leaders-declaration" target="_blank"><span class="hyperlink_text" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">declaration</span></span></a><span data-dcnode-id="1402" instrument_node=""> that addresses a number of foreign-policy challenges such as the situation in Iran, Ukraine, Libya and Hong Kong. In line with its priorities for cooperation with Africa, the EU also endorsed </span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elysee.fr/en/g7/2019/01/01/official-documents" target="_blank"><span class="hyperlink_text" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">new G7 initiatives</span></span></a><span data-dcnode-id="1398" instrument_node=""> aimed at improving conditions for public procurement, promoting digitalisation, increasing access to finance for female entrepreneurs in Africa, reinforcing cooperation in the Sahel, fighting pandemic diseases and supporting women victims of sexual violence in conflict areas.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><div data-dcnode-id="1383"><span data-dcnode-id="1395" instrument_node="">
</span><button aria-controls="content9" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="1385" data-target="#content9" data-toggle="collapse" type="button"><span data-dcnode-id="1394" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="1391"><span data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Less detail</span></span></span><span data-dcnode-id="1390" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="1387"><span data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">More detail</span></span></span><span data-dcnode-id="1386" instrument_node=""> </span></button><span data-dcnode-id="1384" instrument_node="">
</span></div><span data-dcnode-id="1382" instrument_node="">
</span></div><span data-dcnode-id="1380" instrument_node="">
</span><span data-dcnode-id="1378" instrument_node="">
</span><div class="general-report" data-dcnode-id="1334" id="chapter10"><span data-dcnode-id="1377" instrument_node="">
</span><p class="chap_number" data-dcnode-id="1374"><span data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Chapter 10</span></span></p><span data-dcnode-id="1373" instrument_node="">
</span><h1 data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">A Union of democratic change</span></h1><span data-dcnode-id="1370" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="1363"><span data-dcnode-id="1369" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="1365"><span data-dcnode-id="1368" instrument_node="">
</span><img alt="A bird’s eye view of a full house in the European Parliament during the 70th anniversary of the Universal Declaration of Human Rights. (© European Union)" class="height_width_100pct" data-dcnode-id="1367" id="PC10-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH10.jpg&amp;raw"><span data-dcnode-id="1366" instrument_node="">
</span></div><span data-dcnode-id="1364" instrument_node="">
</span></div><span data-dcnode-id="1362" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">‘Regaining citizens’ trust in the European project’ was President Jean-Claude Juncker’s objective for the cycle that started in 2014 and came to a close at the end of 2019. To fulfil this goal, the Juncker Commission committed itself to making the EU more democratic and more transparent.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="1353"><span data-dcnode-id="1358" instrument_node="">The informal meeting of EU leaders in Sibiu, Romania, on 9&nbsp;May, was the opportunity for the EU to renew its unity and sense of purpose. The </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/09/the-sibiu-declaration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Sibiu Declaration</span></span></a><span data-dcnode-id="1354" instrument_node=""> was adopted. It was the time and place to demonstrate that citizens’ concerns were being taken into account in the Union’s Strategic Agenda. Citizens responded by voting in the European Parliament elections in the highest turnout since 1994, with more than 50&nbsp;% of eligible Europeans taking the opportunity to cast their vote.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">2019 also saw a change to the rules of the European Citizens’ Initiative to make it easier for citizens to shape Europe by calling on the European Commission to make a legislative proposal. The reformed rules will make the initiative more accessible and more user friendly.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><div data-dcnode-id="1336"><span data-dcnode-id="1348" instrument_node="">
</span><button aria-controls="content10" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="1338" data-target="#content10" data-toggle="collapse" type="button"><span data-dcnode-id="1347" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="1344"><span data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Less detail</span></span></span><span data-dcnode-id="1343" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="1340"><span data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">More detail</span></span></span><span data-dcnode-id="1339" instrument_node=""> </span></button><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span></div><span data-dcnode-id="1333" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1332"></div><span data-dcnode-id="1331" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="909" id="content10"><span data-dcnode-id="1330" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1327"><span data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The European Parliament</span></span></h2><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1325" instrument_node="">In its last sessions before the elections in May, the outgoing Parliament adopted legislation </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20190321IPR32111/parliament-seals-ban-on-throwaway-plastics-by-2021" target="_blank"><span class="hyperlink_text" data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">banning single-use plastic items</span></span></a><span data-dcnode-id="1321" instrument_node=""> and ensuring better protection of the EU’s external borders. The Parliament pushed through an ambitious target of </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/RegData/etudes/BRIE/2018/614689/EPRS_BRI%282018%29614689_EN.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">reducing CO</span></span><span class="basic-subscript" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">2</span></span><span class="hyperlink_text" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node=""> emissions for new cars and vans by 2030</span></span></a><span data-dcnode-id="1313" instrument_node="">. It agreed on </span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20190321IPR32110/european-parliament-approves-new-copyright-rules-for-the-internet" target="_blank"><span class="hyperlink_text" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">new copyright rules</span></span></a><span data-dcnode-id="1309" instrument_node="">, gave its consent to the EU’s trade agreement with Japan and supported plans to improve the quality of drinking water. It also updated its internal rules of procedure.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The new legislative term started on 2&nbsp;July following the Parliament elections from 23 to 26&nbsp;May. The turnout of 50.7&nbsp;% was the highest since 1994 and up from 42.6&nbsp;% in 2014. </span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">On 16&nbsp;October, the Parliament adopted its list of ‘unfinished business’, which is essential for continuing informal negotiations between the EU institutions on draft EU rules that could not be finalised before the Parliament’s end of mandate. On 22&nbsp;October, Commission President Juncker made a statement before Members of Parliament reviewing his Commission’s key actions and achievements over the previous 5&nbsp;years. </span></p><span data-dcnode-id="1301" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1298"><span data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The European Council</span></span></h2><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">In March, the European Council discussed economic issues, climate change, disinformation and external relations. The meeting of the 27 Member States that discussed Brexit addressed the extension of Article&nbsp;50 until 12&nbsp;April or 22&nbsp;May, depending on whether the Withdrawal Agreement would be ratified by the United Kingdom during the week following the meeting. Later in April, the 27 EU leaders agreed to extend Article&nbsp;50 until 31&nbsp;October 2019.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1293" instrument_node="">EU leaders met informally in Sibiu, Romania, on 9&nbsp;May to reflect on the </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/eu-strategic-agenda-2019-2024/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Strategic Agenda for 2019-2024</span></span></a><span data-dcnode-id="1289" instrument_node="">. More information on these discussions can be found in the section</span><span class="basic-italics _idGenCharOverride-1" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node=""> </span></span><span data-dcnode-id="1286" instrument_node="">‘The future of Europe’. </span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">At an informal dinner later in the month, Members of the Council took stock of the results of the European Parliament elections and started the nomination process for the new heads of the EU institutions.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1268"><span data-dcnode-id="1280" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1276"><span data-dcnode-id="1279" instrument_node="">
</span><img alt="Donald Tusk and Charles Michel embracing" data-dcnode-id="1278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_PH36.jpg&amp;raw"><span data-dcnode-id="1277" instrument_node="">
</span></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1272"><p class="caption" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Donald Tusk, former President of the European Council, and Charles Michel, current President of the European Council, at a European Council roundtable, Brussels, Belgium.</span></p></div><span data-dcnode-id="1271" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1270"></span><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">In June, leaders continued discussions on the EU high-level appointments, the Multiannual Financial Framework, climate change, disinformation and hybrid threats, enlargement, the European Semester and external relations. They also adopted the Strategic Agenda. </span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">EU leaders met again later in the month to discuss and agree on the nominations for high-level appointments in the EU institutions.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">In October, leaders discussed the EU’s future budget (2021-2027) and the follow-up to the Strategic Agenda, as well as climate change, the enlargement of the EU, Turkey and the downing of Malaysia Airlines flight&nbsp; MH17. The European Council met in an Article&nbsp;50 format to discuss the latest developments in relation to Brexit. At the end of October, the EU-27 (all Member States except the United Kingdom) leaders agreed to extend Article&nbsp;50 until 31&nbsp;January 2020. </span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Leaders then met in December to discuss climate change and returned again to the EU’s long-term budget. </span></p><span data-dcnode-id="1255" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1252"><span data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">The Council of the European Union</span></span></h2><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Romania and Finland held the rotating Presidency of the Council of the European Union. During the first half of the year, Romania focused on subjects such as migration and security, the Multiannual Financial Framework, economy and Europe as a global player. During the second half of the year, Finland focused on climate action and security and on strengthening common values, including the rule of law, to make the EU more competitive and socially inclusive. </span></p><span data-dcnode-id="1248" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1235"><span data-dcnode-id="1247" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1243"><span data-dcnode-id="1246" instrument_node="">
</span><img alt="View of the audience watching an inauguration ceremony in a concert hall" data-dcnode-id="1245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_PH37.jpg&amp;raw"><span data-dcnode-id="1244" instrument_node="">
</span></div><span data-dcnode-id="1242" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1239"><p class="caption" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The inaugural meeting of the Romanian Presidency of the Council of the EU, Bucharest, Romania, 11&nbsp;January 2019.</span></p></div><span data-dcnode-id="1238" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1237"></span><span data-dcnode-id="1236" instrument_node="">
</span></div><span data-dcnode-id="1234" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1231"><span data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">The European Economic and Social Committee and the European Committee of the Regions</span></span></h2><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1229" instrument_node="">The European Economic and Social Committee supported the Parliament’s campaign ‘This time I’m voting’ with a number of activities. These included the February event </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eesc.europa.eu/en/agenda/our-events/events/civil-society-reunaissance" target="_blank"><span class="hyperlink_text" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Civil Society for rEUnaissance</span></span></a><span data-dcnode-id="1225" instrument_node="">, with the participation of Commission President Jean-Claude Juncker and the climate activist Greta Thunberg. </span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1222" instrument_node="">The theme of the 2019 </span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eesc.europa.eu/en/agenda/our-events/events/civil-society-days-2019" target="_blank"><span class="hyperlink_text" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Civil Society Days</span></span></a><span data-dcnode-id="1218" instrument_node=""> was ‘sustainable democracy’, with corruption and fake news identified as the main threats to Europe’s democracy. In November, the committee held a conference on the rule of law calling for a structured dialogue between governments and civil society to reverse backsliding on the rule of law in the EU.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1215" instrument_node="">In March, it presented </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eesc.europa.eu/en/our-work/opinions-information-reports/opinions/listening-citizens-europe-sustainable-future-sibiu-and-beyond" target="_blank"><span class="hyperlink_text" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">‘Sibiu and beyond’</span></span></a><span data-dcnode-id="1211" instrument_node="">, its vision for the future in which Europe would become the global leader in sustainable development. In a series of future-oriented opinions, it offered ideas on how to achieve sustainability, a just transition to a digital economy and fair taxation. </span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1208" instrument_node="">At the </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cor.europa.eu/en/summit2019" target="_blank"><span class="hyperlink_text" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">eighth European Summit of Regions and Cities</span></span></a><span data-dcnode-id="1204" instrument_node=""> in Bucharest in March, the European Committee of the Regions adopted a declaration on </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cor.europa.eu/en/news/Pages/President-Lambertz-Statement-on-Europe-Day-Building-the-EU-from-the-ground-up-with-its-regions-and-cities.aspx" target="_blank"><span class="hyperlink_text" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">‘Building the EU from the ground up with its regions and cities’</span></span></a><span data-dcnode-id="1200" instrument_node="">, arguing that EU decisions and policies must be anchored locally in order for the EU to regain citizens’ trust and be properly resourced. It strongly advocates active subsidiarity, stressing the importance of engaging national, regional and local authorities at each phase of the EU decision-making process. The committee marked its 25th anniversary by holding a ceremony during its December plenary session. </span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1197" instrument_node="">In the field of better regulation, the committee initiated a regional hubs network (‘</span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cor.europa.eu/en/our-work/Pages/network-of-regional-hubs.aspx" target="_blank"><span class="hyperlink_text" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">RegHub</span></span></a><span data-dcnode-id="1193" instrument_node="">’) to evaluate the implementation of Union legislation at local and regional levels. It includes 20 regions that report on the implementation of policies. Three evaluations were organised in 2019: on public procurement, air quality and cross-border healthcare. </span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1190" instrument_node="">Throughout the year, both committees organised activities to promote their joint idea of a permanent mechanism for structured consultations and dialogues with citizens as well as their participation in the planned </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/ip_20_89" target="_blank"><span class="hyperlink_text" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Conference on the Future of Europe</span></span></a><span data-dcnode-id="1186" instrument_node="">.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">See also the section entitled ‘The future of Europe’. </span></p><span data-dcnode-id="1181" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1178"><span data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Completing the Better Regulation Agenda</span></span></h2><span data-dcnode-id="1177" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1174"><span data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Working to simplify legislation</span></span></h3><span data-dcnode-id="1173" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="1163"><span data-dcnode-id="1172" instrument_node="">
</span><div class="img-large" data-dcnode-id="1165"><span data-dcnode-id="1171" instrument_node="">
</span><img alt="A summary of regulatory and legislative simplification over the course of the Juncker Commission" aria-describedby="GR69" data-dcnode-id="1170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_GR69-EN.jpg&amp;raw"><span data-dcnode-id="1169" instrument_node="">
</span><p class="longdesc" data-dcnode-id="1167" id="GR69"><span data-dcnode-id="1168" instrument_node="">One of the key achievements between 2014 and 2019 was regulatory and legislative simplification.

										During the Barroso II Commission, the average of key initiatives was 130 per year (117 in the last 11 months of 2010, 196 in 2012, 108 in 2013, 146 in 2014 and 79 by October 2015). During the Juncker Commission, the number of key initiatives decreased by 83 %, with 23 key initiatives presented in 2015 and 2016, 21 in 2017, 26 in 2018, and just 15 in 2019.

										During the period 2015 to 2019, there were 142 proposals for withdrawal, 84 repealed laws, and 162 initiatives for regulatory simplification.

										Source: European Commission.</span></p><span data-dcnode-id="1166" instrument_node="">
</span></div><span data-dcnode-id="1164" instrument_node="">
</span></div><span data-dcnode-id="1162" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1159"><span data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The Interinstitutional Agreement on Better Law-Making</span></span></h3><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1157" instrument_node="">In 2016 and 2017, the European Parliament, the Council and the European Commission agreed on </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/joint-declaration-eus-legislative-priorities-2018_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">two joint declarations</span></span></a><span data-dcnode-id="1153" instrument_node=""> on the EU’s legislative priorities. They highlighted 89 initiatives for which priority treatment in the legislative process was required. This represented a common commitment by the three institutions to ensure substantial progress and, where possible, delivery before the European elections in May.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">By the first half of 2018, the Commission had adopted all the initiatives announced in the joint declarations and, by the time of the European elections, 61 of the 89 initiatives in the joint declaration had been politically agreed upon or formally adopted by the Parliament and the Council. At the end of the year, 22 were still outstanding. </span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1147" instrument_node="">In 2019, the European Commission successfully concluded negotiations with the Parliament and the Council on non-binding criteria for the choice between implementing and delegated acts. This choice often complicates legislative negotiations and the criteria should help the process. These negotiations led to the conclusion of the </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/policies/better-regulation/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Interinstitutional Agreement on Better Law-Making</span></span></a><span data-dcnode-id="1143" instrument_node="">, published in July. Furthermore, the co-legislator agreed to the alignment of 68 existing acts to the Treaty of Lisbon by changing the regulatory procedure used. This is done with scrutiny to control how the Commission exercises its implementing powers on delegated acts and implementing acts according to Regulation (EU) No°182/2011 of the European Parliament and of the Council. </span></p><span data-dcnode-id="1141" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1138"><span data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Monitoring the application of EU law</span></span></h3><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1136" instrument_node="">The </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/2018-commission-report-monitoring-application-eu-law_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">annual report on monitoring the application of EU law</span></span></a><span data-dcnode-id="1132" instrument_node="">, published in July, sets out how the Commission monitored and enforced EU law in 2018. </span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">For example, the Commission acted firmly in enforcing rules in the areas of environment, mobility and transport, as well as internal market, industry, entrepreneurship and small and medium-sized enterprises. It supported national and regional authorities in implementing clear air and clean water rules. It also took action against Member States that failed to live up to their commitments and implement EU rules on passenger name records, combating terrorism and anti-money laundering. In addition, the Commission used enforcement powers when some Member States did not move fast enough to improve access to websites and other mobile applications for persons with disabilities. If EU law is not applied properly, citizens and businesses will not be able to enforce their rights or enjoy the benefits provided by such laws.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="1117"><span data-dcnode-id="1126" instrument_node="">
</span><div class="img-large" data-dcnode-id="1119"><span data-dcnode-id="1125" instrument_node="">
</span><img alt="A summary of infringement cases opened and closed by the European Commission between 2014 and 2019" aria-describedby="GR70" data-dcnode-id="1124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_GR70-EN.jpg&amp;raw"><span data-dcnode-id="1123" instrument_node="">
</span><p class="longdesc" data-dcnode-id="1121" id="GR70"><span data-dcnode-id="1122" instrument_node="">Infringement cases open between year-end 2014 and 11 October 2019. In 2014, there were 1 347 infringement cases opened by the European Commission. The Juncker Commission took office in November 2014, and the following year there were 1 368 infringement cases opened. This rose to 1 657 in 2016, dropped to 1 559 in 2017 and rose back up to 1 571 in 2018, with 1 581 infringement cases open by 11 October 2019. 

										699 infringement cases were closed in 2014 before going to the Court of Justice. Following the start of the Juncker Commission in November 2014, the number of infringement cases closed before going to the Court of Justice was 657 in 2015, 646 in 2016, 772 in 2017, 564 in 2018 and 663 by 11 October 2019. 

										Source: European Commission.</span></p><span data-dcnode-id="1120" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1113"><span data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Better regulation at the heart of the EU’s decision-making</span></span></h3><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The Commission is committed to act only where the EU adds value and provides benefits for people and businesses while avoiding unnecessary costs. It does so on the basis of the best available evidence looking at economic, social, environmental and other significant impacts. Before revising existing EU legislation, it evaluates it to understand what does and does not work, thereby helping to improve the performance of the legislation.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1108" instrument_node="">As part of its </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/strategy/better-regulation-why-and-how_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Better Regulation Agenda</span></span></a><span data-dcnode-id="1104" instrument_node="">, the Commission is listening more closely to the views of citizens and stakeholders to address their needs. Since 2015, it has organised over 400 public consultations, engaging millions of Europeans. The number of contributions to public consultations received since then has more than quadrupled. </span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1101" instrument_node="">The new ‘</span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/better-regulation/have-your-say_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Have your say</span></span></a><span data-dcnode-id="1097" instrument_node="">’ portal, a ‘one-stop-shop’ system for Europeans to contribute to EU policymaking, was visited almost 900&nbsp;000 times in 2018 and exceeded 1&nbsp;million visits in 2019. In April, the Commission issued a </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_2117" target="_blank"><span class="hyperlink_text" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">report</span></span></a><span data-dcnode-id="1093" instrument_node=""> to take stock of the measures introduced under the Juncker Commission to deliver better results for EU citizens and businesses through more open, transparent and evidence-based policymaking. The results of the stocktaking were clear: better regulation has improved the way EU policy is made and should remain at the heart of its working methods for the future while continuing to improve its tools, in particular the outreach and feedback of citizens and stakeholders, the analysis of impacts and the quality of evaluations. </span></p><span data-dcnode-id="1091" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1088"><span data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Transparency and accountability</span></span></h2><span data-dcnode-id="1087" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1084"><span data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The joint Transparency Register</span></span></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Contact with stakeholders and civil society is part of the EU institutions’ work. At the same time, transparency and accountability are essential to maintain the trust of European citizens in the legitimacy of the political, legislative and administrative processes of the EU. </span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1079" instrument_node="">The transparency of interest representation is especially important in order to allow citizens to follow the activities of those seeking to influence the EU lawmaking process. This is why the Commission tabled a proposal in 2016 for a new interinstitutional agreement on a mandatory </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/transparencyregister/public/homePage.do" target="_blank"><span class="hyperlink_text" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Transparency Register</span></span></a><span data-dcnode-id="1075" instrument_node=""> covering the Parliament, the Commission and, for the first time, the Council of the European Union. Negotiations on this proposal are currently underway. </span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1072" instrument_node="">Nearly 12&nbsp;000 entities are listed on the register. They are bound by a </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/transparencyregister/public/staticPage/displayStaticPage.do%3Flocale%3Den%26reference%3DCODE_OF_CONDUCT" target="_blank"><span class="hyperlink_text" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Code of Conduct</span></span></a><span data-dcnode-id="1068" instrument_node="">, which sets out the ethical norms that representatives must observe when interacting with the EU institutions.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1063"><span data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Code of Conduct for the Members of the Commission</span></span></h3><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1061" instrument_node="">In 2018, the Commission adopted a new Code of Conduct for Commissioners, which sets </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/about-european-commission/service-standards-and-principles/ethics-and-good-administration/commissioners-and-ethics_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">stricter rules and higher ethical standards</span></span></a><span data-dcnode-id="1057" instrument_node=""> and introduces greater transparency in a number of areas. Every 2&nbsp;months since February 2018, the Commission publishes information on the Commissioners’ travel expenses on their respective websites.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1054" instrument_node="">In June 2019, the Commission published the </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/se-2019-266_final_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">first annual report</span></span></a><span data-dcnode-id="1050" instrument_node=""> on the application of this Code of Conduct. It confirmed that since the adoption of the updated code, the Commission has achieved an even greater level of transparency when it comes to the conduct of its members. </span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1047" instrument_node="">Furthermore, under the new code, a reinforced </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/about-european-commission/service-standards-and-principles/ethics-and-good-administration/commissioners-and-ethics/independent-ethical-committee_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Independent Ethical Committee</span></span></a><span data-dcnode-id="1043" instrument_node=""> composed of three high-calibre external members was set up to give advice on all ethical issues. </span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1040" instrument_node="">Earlier in the year, the Commission published </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_854" target="_blank"><span class="hyperlink_text" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">ethical guidelines</span></span></a><span data-dcnode-id="1036" instrument_node=""> for Commissioners participating in the European parliamentary elections. These came after the new code enabled them to participate in the election campaigns without having to take a leave of absence, as had previously been the case. </span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The Commission also put into practice a new provision of the code, which provides that decisions shall be published on activities after the term of office of Members of the Commission and on related opinions of the Independent Ethical Committee. October saw the first publication, with others following before the end of the year.  </span></p><span data-dcnode-id="1031" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1028"><span data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Access to documents</span></span></h3><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1026" instrument_node="">In July, the Commission adopted its </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/transparency/regdoc/rep/1/2019/EN/COM-2019-356-F1-EN-MAIN-PART-1.PDF" target="_blank"><span class="hyperlink_text" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">report on access to documents</span></span></a><span data-dcnode-id="1022" instrument_node="">. The report shows that the number of initial requests for access to documents submitted under the relevant rules on public access to them increased by almost 9.5&nbsp;% (from 6&nbsp;716 in 2017 to 7&nbsp;257 in 2018) and the number of confirmatory requests by 4.4&nbsp;% (from 288 in 2017 to 318 in 2018). </span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The Commission remains the EU institution that handles the largest number of requests for access, with a steadily upward trend since 2016. EU citizens and other applicants are therefore making active use of this right to access documents. </span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">In 2018, the Commission disclosed the requested documents fully or partially in more than 80&nbsp;% of the cases, and wider or even full access was granted in almost 41&nbsp;% of the 288 cases reviewed at the confirmatory stage. </span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">In parallel, the Commission continued to proactively publish large amounts of documentation and information on its web pages and in its various public registers, covering all areas of EU activity. The data not only confirm the openness of the Commission but also the importance of the right of access to documents as part of the institution’s overall transparency policy.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1008"><span data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Control of the EU budget</span></span></h2><span data-dcnode-id="1007" instrument_node="">
