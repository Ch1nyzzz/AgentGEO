</span><div class="general-report" data-dcnode-id="2951" id="chapter7"><span data-dcnode-id="2996" instrument_node="">
</span><p class="chap_number" data-dcnode-id="2993"><span data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Chapter 7</span></span></p><span data-dcnode-id="2992" instrument_node="">
</span><h1 data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">An area of justice and fundamental rights based on mutual trust</span></h1><span data-dcnode-id="2989" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="2979"><span data-dcnode-id="2988" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="2981"><span data-dcnode-id="2987" instrument_node="">
</span><img alt="Image: A blindfolded Lady Justice statue holding up scales in one hand and a sword in the other. © Fotolia" class="height_width_100pct" data-dcnode-id="2986" id="PC07-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH07.jpg&amp;raw"><span data-dcnode-id="2985" instrument_node="">
</span><p class="caption" data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">© Fotolia</span></p><span data-dcnode-id="2982" instrument_node="">
</span></div><span data-dcnode-id="2980" instrument_node="">
</span></div><span data-dcnode-id="2978" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Democracy can only thrive in our society if we have independent courts that guarantee the protection of fundamental rights and civil liberties, an active civil society and free media that ensure pluralism. In 2019, the Commission decided on a series of measures to strengthen the rule of law in the European Union through its better promotion, prevention of threats and response to breaches.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Modernised EU laws reinforce consumer protection by targeting misleading marketing practices, introducing effective penalty rules and providing remedies to victims of unfair practices.  </span></p><span data-dcnode-id="2972" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">New protections for whistle-blowers strengthen the enforcement of EU rules where breaches would entail serious harm to the public interest. The EU is taking a strong stance by protecting those who take a risk in speaking out to reveal violations of EU law. These rules also protect freedom of expression and media freedom since whistle-blowers are crucial sources for investigative journalists.</span></p><span data-dcnode-id="2969" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">The 2019 elections to the European Parliament saw the highest turnout (50.7&nbsp;%) since 1994. A coordinated approach by Member States and the EU institutions, including the implementation of the Commission’s election package, helped protect the world’s second-largest democratic elections from manipulation and interference. </span></p><span data-dcnode-id="2966" instrument_node="">
</span><div data-dcnode-id="2953"><span data-dcnode-id="2965" instrument_node="">
</span><button aria-controls="content7" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="2955" data-target="#content7" data-toggle="collapse" type="button"><span data-dcnode-id="2964" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="2961"><span data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Less detail</span></span></span><span data-dcnode-id="2960" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="2957"><span data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">More detail</span></span></span><span data-dcnode-id="2956" instrument_node=""> </span></button><span data-dcnode-id="2954" instrument_node="">
</span></div><span data-dcnode-id="2952" instrument_node="">
</span></div><span data-dcnode-id="2950" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2949"></div><span data-dcnode-id="2948" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="2450" id="content7"><span data-dcnode-id="2947" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2944"><span data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Strengthening the rule of law</span></span></h2><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">The rule of law is one of the common values upon which the European Union is founded; upholding it is a shared responsibility of all Member States and EU institutions. </span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Observance of the rule of law is essential for the functioning of the EU in all areas. This ranges from the internal market to cooperation in justice and home affairs. Upholding the rule of law also means ensuring that national judges, who are also EU judges, can fulfil their role when dealing with matters concerning the application of EU law. </span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2936" instrument_node="">In April, the Commission launched a </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A52019DC0163%26from%3DEN" target="_blank"><span class="hyperlink_text" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">stocktaking exercise</span></span></a><span data-dcnode-id="2932" instrument_node=""> looking at the available tools to monitor, assess and protect the rule of law in the Union. It looked back at the experience of the past years and called for a wider European debate on how it could be further strengthened. Past experience pointed to the need for better promotion of the rule of law, early prevention of risks or breaches and an effective response when these occur.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2929" instrument_node="">In July, the Commission adopted a </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/7_en_act_part1.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">second communication</span></span></a><span data-dcnode-id="2925" instrument_node=""> setting out its own proposals in the three areas of promotion, prevention and response. </span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Concerning the first area (promotion), the Commission will strengthen its communication on the rule of law to the general public, reinforce cooperation with the Council of Europe and other international organisations and provide funding for stakeholders, including civil society, that promote a common rule of law culture. </span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2919" instrument_node="">For the second area (prevention), the Commission will establish an annual rule of law review cycle to monitor the situation in all Member States. To support this process, it will prepare an annual Rule of Law Report, further develop the </span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/justice_scoreboard_2019_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">EU Justice Scoreboard</span></span></a><span data-dcnode-id="2915" instrument_node=""> and strengthen the dialogue with other EU institutions, Member States and stakeholders. </span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">For the third area (response), the Commission will pursue a strategic approach to infringement procedures, building on the developing case-law of the Court of Justice of the European Union. </span></p><span data-dcnode-id="2910" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2900"><span data-dcnode-id="2909" instrument_node="">
</span><div class="img-large" data-dcnode-id="2902"><span data-dcnode-id="2908" instrument_node="">
</span><img alt="A summary explaining how the rule of law framework works" aria-describedby="GR55" data-dcnode-id="2907" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_GR55-EN.jpg&amp;raw"><span data-dcnode-id="2906" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2904" id="GR55"><span data-dcnode-id="2905" instrument_node="">The goal of the rule of law framework is to address systemic threats to the rule of law through a multi-stage dialogue between the Commission and the Member States concerned. It operates through a Commission assessment followed by a Commission opinion and recommendation and a monitoring process of the follow-up to the Commission’s recommendation.

										Article 7 of the Treaty on European Union is an exceptional and last-resort measure to prevent or resolve a serious breach of the rule of law in a Member State. The mechanism is activated by the Parliament, the Commission or one third of the Member States, followed by a determination by the European Council of a breach of Article 2 values. This decision comes with the possibility of far-reaching sanctions, including the suspension of voting rights in the Council.

										Infringement procedures aim to ensure that European Union law is correctly implemented and respected at national level. Infringement procedures are a three-stage process between the Commission and the Member State, at the end of which the Commission can refer the matter to the Court of Justice of the European Union.</span></p><span data-dcnode-id="2903" instrument_node="">
</span></div><span data-dcnode-id="2901" instrument_node="">
</span></div><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">The Commission has also called for the swift adoption of the proposal presented in the context of the Multiannual Financial Framework on the protection of the EU’s budget in case generalised rule of law deficiencies pose a risk to EU financial interests.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">The Commission pursued several infringement proceedings related to the rule of law. On 24&nbsp;June and 5&nbsp;November 2019, the Court of Justice issued final rulings in infringement proceedings initiated by the Commission against Poland, confirming that the Polish legislation concerning the lowering of the retirement age of Supreme Court judges and of ordinary court judges is in violation of EU law regarding judicial independence. Moreover, on 10&nbsp;October 2019, the Commission decided to refer Poland to the Court of Justice in infringement proceedings concerning the new disciplinary regime for judges, as this regime undermines judicial independence by not offering the necessary guarantees to protect Polish judges from political control.</span></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">In the context of the European Semester and based on a Commission proposal, the Council issued country-specific recommendations on the functioning of the justice system to Croatia, Italy, Cyprus, Hungary, Malta, Portugal and Slovakia. </span></p><span data-dcnode-id="2890" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2887"><span data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Protecting rights and fighting discrimination</span></span></h2><span data-dcnode-id="2886" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2883"><span data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Ensuring the rights of persons with disabilities </span></span></h3><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2881" instrument_node="">The </span><a data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/04/09/improving-accessibility-to-products-and-services-for-disabled-and-elderly-people-council-adopts-the-accessibility-act/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">European Accessibility Act</span></span></a><span data-dcnode-id="2877" instrument_node=""> was adopted in April and ensures that certain products and services such as mobile phones, computers, e-books, e-commerce, transport websites and consumer banking services will be accessible for persons with disabilities.</span></p><span data-dcnode-id="2875" instrument_node="">
</span><div class="newvideo" data-dcnode-id="2859"><span data-dcnode-id="2874" instrument_node="">
</span><div class="newvideo_videobox col-sm-12 col-xs-12 col-md-8 col-8" data-dcnode-id="2869"><span data-dcnode-id="2873" instrument_node="">
</span><img alt="A video on Warsaw’s accessibility" class="GR_2015-video-poster" data-dcnode-id="2872" data-source="//europa.eu/webtools/crs/iframe/?oriurl=//europa.eu/!PB73JJ" data-target="CH07_VD04" data-videotype="ec" id="VD04_CH07" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/VD04_CH07.jpg&amp;raw" style="cursor: pointer;"><iframe allowfullscreen="true" data-dcnode-id="2871" frameborder="0" height="214" id="CH07_VD04" mozallowfullscreen="true" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/en&amp;raw" style="display: none;" webkitallowfullscreen="true" width="380"></iframe><span data-dcnode-id="2870" instrument_node="">
</span></div><span data-dcnode-id="2868" instrument_node="">
</span><div class="newvideo_textbox col-sm-12 col-xs-12 col-md-4 col-4" data-dcnode-id="2863"><span data-dcnode-id="2867" instrument_node="">
</span><p class="video-caption" data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">In December, Warsaw won the 2020 Access City Award, which recognises a city’s willingness, ability and efforts to become more accessible.© European Union, 2019</span></p><span data-dcnode-id="2864" instrument_node="">
</span></div><span data-dcnode-id="2862" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2861"></span><span data-dcnode-id="2860" instrument_node="">
</span></div><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2857" instrument_node="">An awareness-raising campaign, ‘</span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/social/main.jsp%3FcatId%3D1437%26langId%3Den" target="_blank"><span class="hyperlink_text" data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">How the EU helps fight discrimination at work</span></span></a><span data-dcnode-id="2853" instrument_node="">’, informing people and companies about their rights and obligations, was launched by the Commission in May. </span></p><span data-dcnode-id="2851" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2848"><span data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Protecting whistle-blowers </span></span></h3><span data-dcnode-id="2847" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2846" instrument_node="">In October, </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/en/TXT/%3Furi%3DCELEX%253A32019L1937" target="_blank"><span class="hyperlink_text" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">EU-wide standards</span></span></a><span data-dcnode-id="2842" instrument_node=""> were adopted to guarantee a high level of protection for whistle-blowers who report violations of EU rules. The directive covers a broad range of key areas such as public procurement; product, food and transport safety; environmental protection; public health; and nuclear safety. The new rules establish channels for confidential reporting, both within private and public organisations and to public authorities, and will protect employees against dismissal and other forms of retaliation. </span></p><span data-dcnode-id="2840" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2837"><span data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Fighting disinformation, hate crime and hate speech</span></span></h3><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2835" instrument_node="">In January, the </span><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/policies/justice-and-fundamental-rights/combatting-discrimination/racism-and-xenophobia/countering-illegal-hate-speech-online_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">fourth evaluation</span></span></a><span data-dcnode-id="2831" instrument_node=""> of the EU Code of Conduct on countering illegal hate speech online signed in 2016 with major IT companies showed that the initiative continues to deliver positive results. IT companies review 89&nbsp;% of the flagged content within 24&nbsp;hours and remove it in 72&nbsp;% of the cases, compared to 40&nbsp;% and 28&nbsp;%, respectively, when the code was first launched in 2016. The evaluation also showed the areas where companies need to improve their feedback to users.</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Ahead of the European elections, the Commission published monthly reports by Facebook, Google and Twitter that showed some progress as regards the scrutiny of advertisement placement, transparency of political advertising, closure of fake accounts and marking systems for automated bots. However, signatories need to intensify their efforts, in particular with a view to developing tools to increase the transparency and trustworthiness of websites hosting ads.  </span></p><span data-dcnode-id="2826" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2816"><span data-dcnode-id="2825" instrument_node="">
</span><div class="img-large" data-dcnode-id="2818"><span data-dcnode-id="2824" instrument_node="">
</span><img alt="A summary of the impact of the European Union code of conduct on hate speech removals online" aria-describedby="GR56" data-dcnode-id="2823" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_GR56-EN.jpg&amp;raw"><span data-dcnode-id="2822" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2820" id="GR56"><span data-dcnode-id="2821" instrument_node="">In the first round of monitoring in December 2016, the rate of notifications reviewed within the first 24 hours reached 60 % for YouTube, 50 % for Facebook, and 20 % for Twitter. 

								In the second round of monitoring in May 2017, the rate of notifications reviewed within the first 24 hours reached 40 % for YouTube, just under 60 % for Facebook, and just under 40 % for Twitter.

								In the third round of monitoring in December 2017, the rate of notifications reviewed within the first 24 hours reached 60 % for YouTube, just under 90 % for Facebook, and 80 % for Twitter.

								In the fourth round of monitoring in December 2018, the rate of notifications reviewed within the first 24 hours reached 80 % for YouTube, over 90 % for Facebook, and just under 90 % for Twitter. Instagram and Google+ were first monitored in this round, where in the notifications reviewed within the first 24 hours they registered just under 80 % and 60 %, respectively.

								The average rate of notifications reviewed has continuously grown, from 40 % in December 2016, 50 % in May 2017 and 80 % in December 2017, to almost 90 % in December 2018.</span></p><span data-dcnode-id="2819" instrument_node="">
</span></div><span data-dcnode-id="2817" instrument_node="">
</span></div><span data-dcnode-id="2815" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2805"><span data-dcnode-id="2814" instrument_node="">
</span><div class="img-large" data-dcnode-id="2807"><span data-dcnode-id="2813" instrument_node="">
</span><img alt="An overview of European Union joint and coordinated action against disinformation" aria-describedby="GR57" data-dcnode-id="2812" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_GR57-EN.jpg&amp;raw"><span data-dcnode-id="2811" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2809" id="GR57"><span data-dcnode-id="2810" instrument_node="">The European Union has a joint and coordinated action against disinformation. It started with the launch of the European External Action Service East StratCom Task Force in March 2015, followed by the creation of a joint framework on countering hybrid threats in April 2016.  

										In spring 2018, a Communication on tackling online disinformation: a European approach was released, followed by a Package of measures to secure free and fair European elections and a Code of practice against disinformation in September 2018 and the launch of the Observatory for Social Media Analysis in November of the same year. An action plan against disinformation was released the following month.

										In January 2019, the inaugural meeting of the European cooperation network on elections was held and, between then and May 2019, reporting by the online platforms was conducted. In March 2019, the European Media Literacy Week was held and the Rapid Alert System was set up. In May 2019, the European Commission contributed to the informal EU-27 (all Member States except for the United Kingdom) leaders’ meeting in Sibiu.</span></p><span data-dcnode-id="2808" instrument_node="">
</span></div><span data-dcnode-id="2806" instrument_node="">
</span></div><span data-dcnode-id="2804" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2801"><span data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Stronger protection of personal data</span></span></h3><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2799" instrument_node="">In the first year after the launch of the </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/law-topic/data-protection_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">General Data Protection Regulation</span></span></a><span data-dcnode-id="2795" instrument_node=""> (GDPR), the Commission’s priority was to ensure its proper application. The Commission concluded in a </span><a data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4449" target="_blank"><span class="hyperlink_text" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">July report</span></span></a><span data-dcnode-id="2791" instrument_node=""> that most Member States had set up the necessary legal framework and it will monitor how they comply with the GDPR and limit the fragmentation of the data-protection framework. </span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Businesses are developing a compliance culture, while citizens have become more conscious of the importance of data protection and of their rights and are increasingly exercising them. At the same time, convergence towards high data-protection standards is progressing at international level. </span></p><span data-dcnode-id="2786" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="2773"><span data-dcnode-id="2785" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="2781"><span data-dcnode-id="2784" instrument_node="">
</span><img alt="A portrait of Wojciech Wiewiórowski" data-dcnode-id="2783" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_PH25.jpg&amp;raw"><span data-dcnode-id="2782" instrument_node="">
</span></div><span data-dcnode-id="2780" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="2777"><p class="caption" data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Wojciech Wiewiórowski was appointed European Data Protection Supervisor in December 2019 for a term of 5&nbsp;years.</span></p></div><span data-dcnode-id="2776" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2775"></span><span data-dcnode-id="2774" instrument_node="">
</span></div><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2771" instrument_node="">An example of the benefits brought by this global convergence is the EU–Japan </span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_421" target="_blank"><span class="hyperlink_text" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">mutual adequacy arrangement</span></span></a><span data-dcnode-id="2767" instrument_node=""> that entered into force in February, creating the world’s largest area of safe and free data flows. Europeans will benefit from high privacy standards when their data are transferred to Japan, and EU companies will benefit from privileged access to the Japanese market. </span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2764" instrument_node="">The Commission is also monitoring the transposition of the </span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/law-topic/data-protection/data-protection-eu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">data-protection law-enforcement directive</span></span></a><span data-dcnode-id="2760" instrument_node=""> into Member State national law and as a result has launched several infringement procedures against Member States.  </span></p><span data-dcnode-id="2758" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2755"><span data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Equality</span></span></h3><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2753" instrument_node="">The new </span><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/social/main.jsp%3FcatId%3D89%26furtherNews%3Dyes%26newsId%3D9438%26langId%3Den" target="_blank"><span class="hyperlink_text" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">directive on work–life balance</span></span></a><span data-dcnode-id="2749" instrument_node=""> adopted in June will encourage equal sharing of caring responsibilities between women and men. See Chapter&nbsp;5 for more information. </span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2746" instrument_node="">The Commission continued to raise awareness of the rights of lesbian, gay, bisexual, transgender and intersex (LGBTI) persons. The latest </span><a data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/sites/info/files/aid_development_cooperation_fundamental_rights/2018_lgbti_annual_report_final_web_3.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">annual report</span></span></a><span data-dcnode-id="2742" instrument_node=""> on advancing LGBTI equality, published in March, provides an overview of the Commission’s set of measures to combat discrimination. </span></p><span data-dcnode-id="2740" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="2727"><span data-dcnode-id="2739" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="2735"><span data-dcnode-id="2738" instrument_node="">
</span><img alt="Rainbow colours illuminating a building" data-dcnode-id="2737" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_PH26.jpg&amp;raw"><span data-dcnode-id="2736" instrument_node="">
</span></div><span data-dcnode-id="2734" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="2731"><p class="caption" data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">The EU’s European External Action Service building lit with the colours of the rainbow flag to mark the International Day against Homophobia, Transphobia and Biphobia, Brussels, Belgium, 16&nbsp;May 2019.</span></p></div><span data-dcnode-id="2730" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2729"></span><span data-dcnode-id="2728" instrument_node="">
</span></div><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2725" instrument_node="">The Commission advanced the preparation of the </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/policies/justice-and-fundamental-rights/combatting-discrimination/roma-and-eu/roma-integration-eu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">EU Framework for National Roma Integration Strategies</span></span></a><span data-dcnode-id="2721" instrument_node=""> after 2020. This framework is essential for the development of EU and national instruments and structures aiming to promote the inclusion of Roma people. </span></p><span data-dcnode-id="2719" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2716"><span data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">European Union citizenship </span></span></h2><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2714" instrument_node="">In January, the Commission published a </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_526" target="_blank"><span class="hyperlink_text" data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">report on ‘golden passport’ schemes</span></span></a><span data-dcnode-id="2710" instrument_node="">, operated by certain Member States. These investor citizenship and residence schemes allow a person to obtain the nationality or residence permit of a Member State by making an investment and without proving a genuine link to that Member State. This affects citizenship of the EU. Member States generally make such a link a condition for national citizenship and on this basis have accepted that EU citizenship accrues automatically to anyone who becomes a citizen of a Member State.  </span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">The Commission’s report identified the risks that the investor citizenship and residence schemes pose to the EU, specifically in terms of security, money laundering, tax evasion and corruption, and expressed concerns that the measures taken by Member States are not always enough to mitigate such risks. The Commission set up a group of experts from Member States to examine the risks arising from the schemes and address the issues of transparency and good governance, and will continue to monitor the compliance of these schemes with EU law. Refer to Chapter&nbsp;8 for more information.</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">As part of broad efforts to protect the 2019 European Parliament elections, the Commission supported Member States in establishing and organising meetings of a European cooperation network on elections. This network brings together representatives of Member State authorities responsible for electoral matters and enables practical exchanges on issues relevant to free and fair elections including data protection, cybersecurity, transparency and awareness raising. It will continue to address potential risks, identify solutions and contribute to building more resilient electoral and democratic systems across the EU.</span></p><span data-dcnode-id="2702" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2692"><span data-dcnode-id="2701" instrument_node="">
</span><div class="img-large" data-dcnode-id="2694"><span data-dcnode-id="2700" instrument_node="">
</span><img alt="Graphic showing increased security measures for identity cards and their benefits" aria-describedby="GR58" data-dcnode-id="2699" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_GR58-EN.jpg&amp;raw"><span data-dcnode-id="2698" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2696" id="GR58"><span data-dcnode-id="2697" instrument_node="">More secure national identity cards requires all cards to have a contactless chip and be made of solid plastic instead of paper. The highly secure chip must include a facial image and two fingerprints, which is the most reliable way to verify the identity of a person and the authenticity of a travel document. 

										There will be increased protection for citizens against falsification, copy, fraud and misuse of their documents. Easier checks will result in faster and more efficient border controls, for example in airports. New identity cards will be valid for a maximum of 10 years to take into account changes to facial images and future security developments. Identity cards issued to people aged 70 and above may be valid for more than 10 years. Old and insufficiently secure identity cards currently in use will have to be replaced to eliminate security gaps.</span></p><span data-dcnode-id="2695" instrument_node="">
</span></div><span data-dcnode-id="2693" instrument_node="">
</span></div><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2690" instrument_node="">In June, as part of its actions to facilitate exercising the right to move and reside freely within the Union, the EU adopted a </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/06/better-security-for-id-documents-council-adopts-new-rules/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">regulation on the security of identity cards and residence documents</span></span></a><span data-dcnode-id="2686" instrument_node="">. The new rules define minimum common standards for EU citizens’ identity cards and non-EU family members’ residence cards as well as minimum content for the residence documents of EU citizens. This will make these documents more secure and reliable and will increase trust and acceptance, allowing citizens to travel more easily throughout the EU, reducing obstacles to exercising the right of free movement and closing loopholes that terrorists and other criminals might seek to exploit. </span></p><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2683" instrument_node="">With a view to strengthening the right of EU citizens to consular protection in non-EU countries where their own Member State is not represented, </span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/18/council-adopts-directive-for-an-eu-emergency-travel-document/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">new rules</span></span></a><span data-dcnode-id="2679" instrument_node=""> were adopted to create a modern EU emergency travel document. These rules will ensure that EU citizens can quickly receive this secure and widely accepted document from any Member State, allowing them to return home safely.  </span></p><span data-dcnode-id="2677" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2674"><span data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Protecting consumers</span></span></h2><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2672" instrument_node="">In July, to increase awareness of protection against unfair terms in consumer contracts, such as undue limitation of consumers’ legal rights and unilateral changes, the Commission issued </span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/law-topic/consumers/consumer-contract-law/unfair-contract-terms-directive_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">guidance on the application of the unfair contract terms directive</span></span></a><span data-dcnode-id="2668" instrument_node="">.</span></p><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2656"><span data-dcnode-id="2665" instrument_node="">In November, the directive on better enforcement and modernisation of </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20190410IPR37533/european-parliament-strengthens-eu-consumer-protection-rules" target="_blank"><span class="hyperlink_text" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">EU consumer protection rules</span></span></a><span data-dcnode-id="2661" instrument_node=""> was adopted as part of the </span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_18_3041" target="_blank"><span class="hyperlink_text" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">New Deal for Consumers</span></span></a><span data-dcnode-id="2657" instrument_node=""> proposed by the Commission in April 2018. It adapts consumer rights to new technologies by introducing important new online requirements. These include prohibiting hidden advertising in search results and ‘fake’ consumer reviews; providing information about the identity of the counterpart on online platforms (private consumer or professional retailer); and providing information about the parameters used in ranking and the personalisation of prices by automated decision-making. </span></p><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2654" instrument_node="">The new rules also set deterrent fines for ‘widespread infringements’ of consumer rights subject to coordinated actions under the </span><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/law-topic/consumers/consumer-protection-cooperation-regulation_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">c</span></span><span class="hyperlink_text" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">onsumer protection cooperation regulation</span></span></a><span data-dcnode-id="2648" instrument_node="">. A separate proposal for a European system of collective redress when groups of consumers have suffered harm is still under negotiation between the Parliament and the Council.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2645" instrument_node="">Following negotiations with the Commission and national consumer protection authorities, the </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_3990" target="_blank"><span class="hyperlink_text" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">platform Airbnb</span></span></a><span data-dcnode-id="2641" instrument_node=""> brought its sales practices and conditions into full compliance with EU consumer protection rules. For instance, the final price and whether a property is offered by an individual or a professional are now clearly presented on the results pages.</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2638" instrument_node="">Following a call from the Commission and EU consumer authorities, </span><a data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/news/car-rentals-2019-mar-25_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">five industry leaders – Avis, Europcar, Enterprise, Hertz and Sixt</span></span></a><span data-dcnode-id="2634" instrument_node=""> – have changed the way they present car rental prices, making them fully transparent to consumers. </span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">In the aftermath of the Cambridge Analytica scandal and after a long dialogue with the Commission and EU consumer authorities, Facebook modified its terms of service. They now explain more clearly how the company uses its users’ data to develop profiling activities and target advertising, as a source of its revenue and to acknowledge the company’s responsibility in case of negligence. </span></p><span data-dcnode-id="2629" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2628" instrument_node="">The EU facilitates online shopping by enabling consumers to make informed decisions and buy safely. The awareness campaign </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/youreuright/home_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">#YourEURight</span></span></a><span data-dcnode-id="2624" instrument_node=""> was launched in 2019 to remind consumers that they have significant rights when buying from any online store selling to European consumers.&nbsp;</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2613"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20190410IPR37533/european-parliament-strengthens-eu-consumer-protection-rules" target="_blank"><span class="hyperlink_text" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">New rules</span></span></a><span data-dcnode-id="2618" instrument_node=""> were adopted to better tackle dual quality of consumer goods. In parallel, the Commission worked on clarifying when the sale of dual-quality products (goods sold across Europe with different compositions in identical or similar packaging) constitutes an illegal commercial practice, developing a common methodology and publishing the results of an </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_3332" target="_blank"><span class="hyperlink_text" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">EU-wide testing campaign</span></span></a><span data-dcnode-id="2614" instrument_node=""> in June 2019 that compared several food products from different Member States. This showed that while almost a third of tested food products had an identical or similar presentation but different composition, no specific geographic pattern could be identified. The results do not reach a conclusion on whether the differences affect quality or whether they are associated with a misleading practice in individual cases. </span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2611" instrument_node="">Following the adoption of </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_17_3403" target="_blank"><span class="hyperlink_text" data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">guidelines</span></span></a><span data-dcnode-id="2607" instrument_node=""> to help national authorities apply EU consumer and food legislation with regard to dual quality food products, the Commission dedicated over €4.5&nbsp;million to limit dual quality and strengthen consumer organisations. In addition, the </span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/04/09/tackling-unfair-trading-practices-in-the-agricultural-and-food-supply-chain/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">directive on unfair trading practices in the agricultural and food supply chain</span></span></a><span data-dcnode-id="2603" instrument_node=""> entered into force in April. </span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2600" instrument_node="">In June, the Commission published the </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/docsroom/documents/36045" target="_blank"><span class="hyperlink_text" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">final report</span></span></a><span data-dcnode-id="2596" instrument_node=""> of the High-Level Forum for a Better Functioning Food Supply Chain, which provides recommendations on fair and efficient trading practices and transparency. The report also highlights problems with territorial supply constraints that prevent retailers from sourcing their products where they want. The Commission also launched a project to increase consumer awareness about the distribution of money along the food supply chain.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2591"><span data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Civil justice</span></span></h2><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2589" instrument_node="">Also in June, the Council adopted a </span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/25/more-effective-rules-to-deal-with-cross-border-matrimonial-matters-and-parental-responsibility-issues/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">revision of the Brussels IIa regulation</span></span></a><span data-dcnode-id="2585" instrument_node="">, which improves the legal rules protecting children in cross-border parental-responsibility disputes, such as those related to custody, access rights and child abduction. With the new rules, judicial cooperation will be faster and more efficient to make sure that the best interests of the children come first.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2580"><span data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Company law</span></span></h2><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2578" instrument_node="">June also saw the adoption of </span><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/business-economy-euro/doing-business-eu/company-law-and-corporate-governance_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">new EU rules</span></span></a><span data-dcnode-id="2574" instrument_node=""> to make it easier for entrepreneurs to register their companies online and across borders, set up new branches or submit documents to a business register. A complementary set of EU company law rules adopted in November facilitates cross-border conversions, mergers and divisions of companies while ensuring better protection of the rights of employees, minority shareholders and creditors. The new rules create legal certainty, save money, reduce the administrative burden and give the necessary powers to block any abuse. </span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">New rules adopted in November on the governance of investment firms and remuneration of their management aim to be proportionate to the size, risks and activities of the investment firms while ensuring appropriate supervision of all large institutions that could pose a systemic risk. In May, the rules on the governance of banks and remuneration of their management were updated. In particular, they strengthened the powers of authorities to remove members of a bank’s management body if there is any suspicion of being involved in money laundering or terrorist financing.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2566"><span data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Tackling terrorism and money laundering </span></span></h2><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2564" instrument_node="">In 2019, the Commission ramped up its financial, operational and political support to Member States to help accelerate their implementation of the Security Union. By the end of the year, 16 out of the 22 Security Union legislative initiatives had become law. The EU led the way in tackling terrorist content online with a </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/press-room/20190408IPR35436/terrorist-content-online-companies-to-be-given-just-one-hour-to-remove-it" target="_blank"><span class="hyperlink_text" data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">proposed regulation</span></span></a><span data-dcnode-id="2560" instrument_node=""> obliging internet platforms to take down terrorist content within 1&nbsp;hour of receiving a removal order. The European Parliament and the Council made important progress on the Commission proposal and the work will continue in the first quarter of 2020. </span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2557" instrument_node="">In parallel, the Commission, Member States’ ministers for home affairs and representatives from the private sector endorsed an EU </span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/sites/homeaffairs/files/what-we-do/policies/european-agenda-security/20191007_agenda-security-factsheet-eu-crisis-protocol_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Crisis Protocol</span></span></a><span data-dcnode-id="2553" instrument_node=""> on responding to the viral spread of terrorist or violent extremist content on the internet as part of the global response to the Christchurch Call for Action. Measures under the 2017 Action Plan on the protection of public spaces, including from terrorist threats, continued to be implemented. </span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2550" instrument_node="">The EU continued vital work to deprive terrorists of the means to commit their acts with </span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/14/eu-reinforces-rules-on-marketing-and-use-of-explosive-precursors/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">updated rules</span></span></a><span data-dcnode-id="2546" instrument_node=""> on marketing and access to chemicals used by terrorists as components in homemade explosives as well as with </span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_1049" target="_blank"><span class="hyperlink_text" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">new measures</span></span></a><span data-dcnode-id="2542" instrument_node=""> cracking down on terrorist financing. The EU continued to cooperate internationally, including by exchanging Passenger Name Records (PNR) data with Australia and the United States, working to finalise a new draft agreement with Canada and signing the </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/61409/european-union-and-united-nations-strengthen-partnership-counter-terrorism_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">United Nations framework on counterterrorism cooperation</span></span></a><span data-dcnode-id="2538" instrument_node="">.</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2535" instrument_node="">At the end of the year, the Commission proposed to open negotiations with Japan on the exchange of PNR data and with New Zealand on the exchange of personal data for law-enforcement purposes with the European Union Agency for Law Enforcement Cooperation (Europol). The Commission also endorsed bilateral arrangements with the authorities of Albania, Bosnia and Herzegovina, Kosovo (this designation is without prejudice to positions on status, and is in line with UNSCR 1244/1999 and the ICJ Opinion on the Kosovo declaration of independence), Montenegro, North Macedonia and Serbia for the implementation of the </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/news/signature-joint-action-plan-counter-terrorism-western-balkans_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Joint Action Plan on Counterterrorism in the western Balkans</span></span></a><span data-dcnode-id="2531" instrument_node="">.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2528" instrument_node="">The EU adopted a number of measures to fight against money laundering and terrorist financing. In 2019, it reinforced the supervisory role of the European Banking Authority. Uniform EU-wide rules will be introduced to empower Member State authorities to access national centralised bank account registries or data-retrieval systems and improve cooperation between authorities. In addition, four Commission reports stressed the need to fully and correctly implement the </span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/policies/justice-and-fundamental-rights/criminal-justice/anti-money-laundering-and-counter-terrorist-financing_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">fourth and fifth anti-money laundering directives</span></span></a><span data-dcnode-id="2524" instrument_node="">. In December, the Council adopted </span><a data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/12/05/money-laundering-council-sets-strategic-priorities-for-further-reforms/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">conclusions</span></span></a><span data-dcnode-id="2520" instrument_node=""> on strategic priorities on anti-money laundering and countering the financing of terrorism. The text is ambitious as regards the need for more detailed rules and the allocation of certain tasks to EU bodies. </span></p><span data-dcnode-id="2518" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2515"><span data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Stepping up the fight against crime</span></span></h2><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">The Council authorised the Commission to negotiate, on behalf of the EU, an agreement with the United States on cross-border access to electronic evidence in criminal matters as well as to participate in the negotiation of a second additional protocol to the Council of Europe Convention on Cybercrime.</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">In 2019, the Commission worked on setting up the European Public Prosecutor’s Office, which should become operational at the end of 2020. The Parliament and the Council appointed Laura Codruţa Kövesi as the first European Chief Prosecutor. </span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2507" instrument_node="">The EU acted to prevent the illegal trafficking of cultural goods. The </span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2018/12/19/agreement-on-new-rules-to-clamp-down-on-illicit-trafficking-in-cultural-goods/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">regulation</span></span></a><span data-dcnode-id="2503" instrument_node=""> on the introduction and import of such goods into the EU, adopted in April, aims to put an end to illicit trafficking that often supports terrorism and other criminal activities. </span></p><span data-dcnode-id="2501" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2498"><span data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">A stronger European system to tackle natural disasters</span></span></h2><span data-dcnode-id="2497" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="2484"><span data-dcnode-id="2496" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="2492"><span data-dcnode-id="2495" instrument_node="">
</span><img alt="A helicopter airlifts a rescue worker out of the sea behind a coast guard boat" data-dcnode-id="2494" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_PH27.jpg&amp;raw"><span data-dcnode-id="2493" instrument_node="">
</span></div><span data-dcnode-id="2491" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="2488"><p class="caption" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Operation Shark Bait: a live demonstration of an EU rescue mission using Galileo satellite data, Ostend, Belgium, 26&nbsp;September 2019.</span></p></div><span data-dcnode-id="2487" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2486"></span><span data-dcnode-id="2485" instrument_node="">
</span></div><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2482" instrument_node="">Because the trend of more frequent and often simultaneous disasters across Europe made it harder for Member States to help each other in responding to natural disasters, the EU established </span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/echo/what/civil-protection/resceu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">rescEU</span></span></a><span data-dcnode-id="2478" instrument_node="">, strengthening the existing EU Civil Protection Mechanism. In 2019, the Commission continued working on the operationalisation of rescEU. The rescEU transition fleet proved crucial in battling forest fires in Greece in August 2019. </span></p><span data-dcnode-id="2476" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2466"><span data-dcnode-id="2475" instrument_node="">
</span><div class="img-large" data-dcnode-id="2468"><span data-dcnode-id="2474" instrument_node="">
</span><img alt="A summary of the initial rescEU fleet assets" aria-describedby="GR59" data-dcnode-id="2473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH07_GR59-EN.jpg&amp;raw"><span data-dcnode-id="2472" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2470" id="GR59"><span data-dcnode-id="2471" instrument_node="">The initial rescEU fleet (a European reserve of emergency capacities) will be composed of assets from Greece, Spain, France, Croatia, Italy and Sweden, and will include nine firefighting airplanes and six firefighting helicopters.</span></p><span data-dcnode-id="2469" instrument_node="">
</span></div><span data-dcnode-id="2467" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">
</span><div data-dcnode-id="2452"><span data-dcnode-id="2464" instrument_node="">
</span><button aria-controls="content7" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="2454" data-target="#content7" data-toggle="collapse" type="button"><span data-dcnode-id="2463" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="2460"><span data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Less detail</span></span></span><span data-dcnode-id="2459" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="2456"><span data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">More detail</span></span></span><span data-dcnode-id="2455" instrument_node=""> </span></button><span data-dcnode-id="2453" instrument_node="">
