</span><div class="general-report" data-dcnode-id="2401" id="chapter8"><span data-dcnode-id="2446" instrument_node="">
</span><p class="chap_number" data-dcnode-id="2443"><span data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Chapter 8</span></span></p><span data-dcnode-id="2442" instrument_node="">
</span><h1 data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Towards a new policy on migration</span></h1><span data-dcnode-id="2439" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="2429"><span data-dcnode-id="2438" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="2431"><span data-dcnode-id="2437" instrument_node="">
</span><img alt=" (© Fotolia)" class="height_width_100pct" data-dcnode-id="2436" id="PC08-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH08.jpg&amp;raw"><span data-dcnode-id="2435" instrument_node="">
</span><p class="caption" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">© Fotolia</span></p><span data-dcnode-id="2432" instrument_node="">
</span></div><span data-dcnode-id="2430" instrument_node="">
</span></div><span data-dcnode-id="2428" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">The EU continued to implement the European Agenda on Migration in 2019 with a comprehensive and humane approach to migration management. Since 2015, EU-funded resettlement schemes have provided over 67&nbsp;000 vulnerable refugees with legal and safe pathways to Europe, and several innovative pilot projects have been implemented with a number of interested Member States to enable labour migration from partner countries in Africa. </span></p><span data-dcnode-id="2425" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Work to prevent irregular migration continued in collaboration with partner countries to fight smuggling networks in the Sahel and improve the effective rate of return for people without a right of residence in the EU. This was possible thanks to formal readmission agreements or practical arrangements on return and readmission with 23 countries. </span></p><span data-dcnode-id="2422" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">By the end of the year, irregular border crossings were 92 % below the 2015 peak levels. The EU had shown its solidarity by providing over €12&nbsp;billion to assist vulnerable refugees and migrants in neighbouring and partner countries since 2015. In addition, almost €11.3&nbsp;billion was provided to Member States to better manage migration and borders.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">2019 was a landmark year for European border management, with new rules strengthening the European Border and Coast Guard Agency becoming law in December. This ambitious new regulation will set up a standing corps of 10&nbsp;000 operational staff, who will have executive powers and their own equipment to intervene wherever needed along the EU’s external borders, as well as when requested by non-neighbouring countries.</span></p><span data-dcnode-id="2416" instrument_node="">
</span><div data-dcnode-id="2403"><span data-dcnode-id="2415" instrument_node="">
</span><button aria-controls="content8" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="2405" data-target="#content8" data-toggle="collapse" type="button"><span data-dcnode-id="2414" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="2411"><span data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Less detail</span></span></span><span data-dcnode-id="2410" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="2407"><span data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">More detail</span></span></span><span data-dcnode-id="2406" instrument_node=""> </span></button><span data-dcnode-id="2404" instrument_node="">
</span></div><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2399"></div><span data-dcnode-id="2398" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="2028" id="content8"><span data-dcnode-id="2397" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2394"><span data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">The European Agenda on Migration</span></span></h2><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">In September 2017, Member States made the largest collective commitment on resettlement so far, pledging to resettle over 50&nbsp;000 people in need of international protection. Implementation progressed throughout 2019 and the Commission continued to assist Member States to deliver on their pledges. With global resettlement needs remaining high, continued European efforts are key. By December, 43&nbsp;800 people had been resettled under the scheme, more than 87&nbsp;% of the overall pledge by Member States.   </span></p><span data-dcnode-id="2390" instrument_node="">
</span><div class="newvideo" data-dcnode-id="2374"><span data-dcnode-id="2389" instrument_node="">
</span><div class="newvideo_videobox col-sm-12 col-xs-12 col-md-8 col-8" data-dcnode-id="2384"><span data-dcnode-id="2388" instrument_node="">
</span><img alt="A video on European Union action on migration" class="GR_2015-video-poster" data-dcnode-id="2387" data-source="//europa.eu/webtools/crs/iframe/?oriurl=//europa.eu/!Rj98yP" data-target="CH08_VD05" data-videotype="ec" id="VD05_CH08" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/VD05_CH08.jpg&amp;raw" style="cursor: pointer;"><iframe allowfullscreen="true" data-dcnode-id="2386" frameborder="0" height="214" id="CH08_VD05" mozallowfullscreen="true" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/en&amp;raw" style="display: none;" webkitallowfullscreen="true" width="380"></iframe><span data-dcnode-id="2385" instrument_node="">
</span></div><span data-dcnode-id="2383" instrument_node="">
</span><div class="newvideo_textbox col-sm-12 col-xs-12 col-md-4 col-4" data-dcnode-id="2378"><span data-dcnode-id="2382" instrument_node="">
</span><p class="video-caption" data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">The continent of solidarity: video accompanying the progress report on the Implementation of the European Agenda on Migration.© European Union, 2019</span></p><span data-dcnode-id="2379" instrument_node="">
</span></div><span data-dcnode-id="2377" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2376"></span><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2363"><span data-dcnode-id="2372" instrument_node="">
</span><div class="img-large" data-dcnode-id="2365"><span data-dcnode-id="2371" instrument_node="">
</span><img alt="A summary of the results of European Union resettlement programmes" aria-describedby="GR60" data-dcnode-id="2370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_GR60-EN.jpg&amp;raw"><span data-dcnode-id="2369" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2367" id="GR60"><span data-dcnode-id="2368" instrument_node="">Since 2015, two successful European Union resettlement programmes have helped more than 67 000 of the most vulnerable people in need of international protection find shelter in the European Union. 

								Member States resettling people in need of international protection through these programmes receive financial support from the EU budget. Under the ongoing European Union resettlement scheme (2017-2019), this contribution is set at 10 000 euro for each resettled person.</span></p><span data-dcnode-id="2366" instrument_node="">
</span></div><span data-dcnode-id="2364" instrument_node="">
</span></div><span data-dcnode-id="2362" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2359"><span data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Border management</span></span></h3><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2357" instrument_node="">In December, new rules strengthening how the EU manages its external borders became law and will enable the </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/european-union/about-eu/agencies/frontex_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">European Border and Coast Guard Agency</span></span></a><span data-dcnode-id="2353" instrument_node=""> to set up a standing corps of 10&nbsp;000 operational staff. </span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Members of the standing corps will have executive powers and their own equipment to intervene wherever needed along the EU’s external borders as well as in non-EU countries willing to accept Border and Coast Guard teams on their territory. Member States (and the non-EU countries concerned) retain their sovereignty and the responsibility for operations carried out at their borders and over their return procedures at all times. Forty fundamental rights officers will be appointed to ensure that members of the standing corps respect the rights of non-EU-country nationals who cross the external borders (whether regularly or not) or who are subject to return operations. </span></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2347" instrument_node="">The Commission successfully negotiated with five western Balkan countries status agreements that allow European Border and Coast Guard teams to be deployed. The agreement with Albania entered into force on 1&nbsp;May 2019, followed 3&nbsp;weeks later by the teams’ operational deployment. The Commission and the Finnish Presidency of the Council signed a </span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_6008" target="_blank"><span class="hyperlink_text" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">status agreement with Montenegro</span></span></a><span data-dcnode-id="2343" instrument_node=""> on 7&nbsp;October, and with </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/news/20191119_border-management-eu-signs-agreement-serbia-ebcg-european-border-coast-guard-cooperation_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Serbia</span></span></a><span data-dcnode-id="2339" instrument_node=""> on 19&nbsp;November. The finalisation of such agreements with Bosnia and Herzegovina and North Macedonia is still ongoing. </span></p><span data-dcnode-id="2337" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2334"><span data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Information systems on security, migration and border management</span></span></h3><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2332" instrument_node="">In June, </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/05/14/interoperability-between-eu-information-systems-council-adopts-regulations/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">new European legislation</span></span></a><span data-dcnode-id="2328" instrument_node=""> entered into force, allowing various information systems that support the </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/factsheets/en/sheet/150/an-area-of-freedom-security-and-justice-general-aspects" target="_blank"><span class="hyperlink_text" data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Area of Freedom, Security and Justice</span></span></a><span data-dcnode-id="2324" instrument_node=""> without internal border controls to exchange data and share information. Once this interconnected platform is in place (expected in 2023), border, migration, visa, judicial and police authorities will be able to cross-check identity data against all relevant EU information systems on a single screen and immediately be able to flag anyone trying to use multiple identities.   </span></p><span data-dcnode-id="2322" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2312"><span data-dcnode-id="2321" instrument_node="">
</span><div class="img-large" data-dcnode-id="2314"><span data-dcnode-id="2320" instrument_node="">
</span><img alt="Graphic showing the increase in funds and personnel allocated to the European Union’s border agency over the years" aria-describedby="GR62" data-dcnode-id="2319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_GR62-EN.jpg&amp;raw"><span data-dcnode-id="2318" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2316" id="GR62"><span data-dcnode-id="2317" instrument_node="">The scaling up of the European border agency has increased the number of European border guards deployed from less than 300 units in 2014 to the current 1 300, with a reserve pool of 1 500 border guards added in 2019.

										Investment in border management has been growing steadily since 2006 (2.4 billion euro from 2006 to 2013, and 5.6 billion euro from 2014 to 2020). The budget approved for the period 2021-2027 represents a considerable increase in investment, to 21.3 billion euro.

										Source: European Commission.</span></p><span data-dcnode-id="2315" instrument_node="">
</span></div><span data-dcnode-id="2313" instrument_node="">
</span></div><span data-dcnode-id="2311" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2301"><span data-dcnode-id="2310" instrument_node="">
</span><div class="img-large" data-dcnode-id="2303"><span data-dcnode-id="2309" instrument_node="">
</span><img alt="Graphic explaining the Entry/Exit System" aria-describedby="GR61" data-dcnode-id="2308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_GR61-EN.jpg&amp;raw"><span data-dcnode-id="2307" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2305" id="GR61"><span data-dcnode-id="2306" instrument_node="">The Commission has proposed the establishment of an Entry/Exit System to contribute to the modernisation of the external border management by improving the quality and efficiency of the external border controls of the Schengen area. It will help Member States to deal with the ever-increasing number of travellers to the European Union without having to increase the number of border guards.

								It will reinforce internal security and the fight against terrorism and serious crime, and will systematically identify over-stayers (individuals remaining in the Schengen area beyond the end of their authorised stay).</span></p><span data-dcnode-id="2304" instrument_node="">
</span></div><span data-dcnode-id="2302" instrument_node="">
</span></div><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2299" instrument_node="">Work continued on the implementation of the </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/sites/homeaffairs/files/what-we-do/policies/securing-eu-borders/fact-sheets/docs/factsheet_-_entryexit_system_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Entry/Exit System</span></span></a><span data-dcnode-id="2295" instrument_node=""> (EES) and the </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2018/09/05/european-travel-information-and-authorisation-system-etias-council-adopts-regulation/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">European Travel Information and Authorisation System</span></span></a><span data-dcnode-id="2291" instrument_node=""> (ETIAS). The former will replace the current method of manually stamping passports with an electronic record of identity and travel document data, as well as places and dates of entries and exits. It will help to ensure that non-EU-country nationals do not stay longer than authorised, improve the quality and efficiency of external border controls and help Member States to deal with increasing numbers of travellers. The ETIAS will also ensure that national authorities have more information on whether persons travelling visa free to the EU could pose a security or irregular immigration risk before they arrive at the external borders. If needed, their travel authorisation could be denied.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><div class="newvideo" data-dcnode-id="2273"><span data-dcnode-id="2288" instrument_node="">
</span><div class="newvideo_videobox col-sm-12 col-xs-12 col-md-8 col-8" data-dcnode-id="2283"><span data-dcnode-id="2287" instrument_node="">
</span><img alt="A video on the European Border and Coast Guard" class="GR_2015-video-poster" data-dcnode-id="2286" data-source="//europa.eu/webtools/crs/iframe/?oriurl=//europa.eu/!cH88CM" data-target="CH08_VD06" data-videotype="ec" id="VD06_CH08" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/VD06_CH08.jpg&amp;raw" style="cursor: pointer;"><iframe allowfullscreen="true" data-dcnode-id="2285" frameborder="0" height="214" id="CH08_VD06" mozallowfullscreen="true" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/en&amp;raw" style="display: none;" webkitallowfullscreen="true" width="380"></iframe><span data-dcnode-id="2284" instrument_node="">
</span></div><span data-dcnode-id="2282" instrument_node="">
</span><div class="newvideo_textbox col-sm-12 col-xs-12 col-md-4 col-4" data-dcnode-id="2277"><span data-dcnode-id="2281" instrument_node="">
</span><p class="video-caption" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Reinforcing the European Border and Coast Guard. © European Union, 2019</span></p><span data-dcnode-id="2278" instrument_node="">
</span></div><span data-dcnode-id="2276" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2275"></span><span data-dcnode-id="2274" instrument_node="">
</span></div><span data-dcnode-id="2272" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2269"><span data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Managing migration and saving lives at sea</span></span></h2><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">EU joint operations and naval missions contributed to the rescue of over 760&nbsp;000 people at sea and supported Member States hosting new arrivals from the Mediterranean.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2264" instrument_node="">In line with the 2015 </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/what-we-do/policies/irregular-migration-return-policy/facilitation-irregular-migration_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">EU Action Plan against Migrant Smuggling</span></span></a><span data-dcnode-id="2260" instrument_node="">, in August the revision of the </span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/14/immigration-liaison-officers-council-adopts-new-rules-to-improve-coordination/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">regulation on immigration liaison officers networks</span></span></a><span data-dcnode-id="2256" instrument_node=""> entered into force. This will ensure better cooperation and coordination among the immigration liaison officers that Member States, the Commission and EU agencies deploy in non-EU countries in order to respond more effectively and prevent and combat irregular immigration and related cross-border criminality. </span></p><span data-dcnode-id="2254" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2244"><span data-dcnode-id="2253" instrument_node="">
</span><div class="img-large" data-dcnode-id="2246"><span data-dcnode-id="2252" instrument_node="">
</span><img alt="A graph demonstrating the rise and fall of irregular border crossings in the Mediterranean since 2014" aria-describedby="GR63" data-dcnode-id="2251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_GR63-EN.jpg&amp;raw"><span data-dcnode-id="2250" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2248" id="GR63"><span data-dcnode-id="2249" instrument_node="">Between 2014 and 2019, irregular border crossings on the three main migratory routes, namely the eastern Mediterranean, the central Mediterranean and the western Mediterranean, experienced a fluctuating trend that mostly remained below 50 000 arrivals per month. The eastern Mediterranean route has consistently experienced the highest number of crossings, followed by the central Mediterranean route and the western Mediterranean route. Higher levels of crossings were recorded, starting from the beginning of 2015 to the beginning of 2016; the number of crossings on the eastern Mediterranean route rose much higher than the average, reaching a peak of 200 000 crossings per month in October 2015; 10 000 arrivals were recorded on 20 October alone. Since then, the number of irregular border crossings on the three main routes have decreased to 2014 levels, well below 50 000 arrivals per month.

								Source: Data from the ‘Progress report on the implementation of the European Agenda on Migration’, COM(2019) 481 final, 16 October 2019. 

								Data source: European Border and Coast Guard Agency.</span></p><span data-dcnode-id="2247" instrument_node="">
</span></div><span data-dcnode-id="2245" instrument_node="">
</span></div><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">The Commission continued its contribution towards efforts to prevent prospective migrants from embarking on irregular migratory journeys towards the EU and having their lives put in danger by smugglers. It financed eight information and awareness-raising campaigns, directly targeting prospective irregular migrant communities in non-EU countries as well as their trusted diaspora communities in Europe with objective information to allow migrants to make informed decisions. The Commission also increased its financing of Common Operational Partnerships, which include Joint Investigation Teams, to €22.5&nbsp;million. These partnerships between Member States and non-EU-country law-enforcement authorities target migrant smugglers in west and north Africa. </span></p><span data-dcnode-id="2240" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2237"><span data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Temporary arrangements</span></span></h3><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Disembarkation events in the central Mediterranean have clearly demonstrated the need for common European solutions based on solidarity, taking responsibility and respect for fundamental rights. The Commission has been actively supporting the conclusion of temporary arrangements between Member States that facilitate disembarkation following search-and-rescue operations in the Mediterranean pending an agreement on a long-term sustainable system in the reform of the European asylum system. The Commission, with the support of EU agencies and at the request of Member States, has also been coordinating voluntary relocation throughout 2019, with 1&nbsp;608 people relocated.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2230"><span data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Return and readmission</span></span></h3><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2228" instrument_node="">The European Parliament and the Council continued negotiating on the Commission’s 2018 proposal to strengthen the </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/what-we-do/policies/irregular-migration-return-policy/return-readmission_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Return Directive</span></span></a><span data-dcnode-id="2224" instrument_node="">. The changes to the EU’s common rules on return include simplifying returns for those who are refused asylum during border procedures, introducing clearer and faster procedures for issuing return decisions and requiring that a return decision be issued immediately after a decision to terminate a legal stay is taken. </span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2221" instrument_node="">The European Border and Coast Guard Agency’s ability to assist returns was strengthened in December by a </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/04/01/european-border-and-coast-guard-council-confirms-agreement-on-stronger-mandate/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">new regulation</span></span></a><span data-dcnode-id="2217" instrument_node=""> becoming EU law. This gives the agency a more proactive role in assisting Member States based on their needs and broadening the scope of potential assistance to all stages of the return procedure. </span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">The European Union has concluded 23 readmission instruments with non-EU countries. In 2019, the work continued, with ongoing negotiations of agreements or wider migration cooperation frameworks with six other countries.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2209"><span data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Protecting those in need</span></span></h2><span data-dcnode-id="2208" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2205"><span data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Asylum reform</span></span></h3><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Despite intense efforts by the Romanian and Finnish Presidencies of the Council, Member States failed to find a consensus and the proposals to reform the EU’s asylum policy remain stalled. Immediately upon taking office in December, Vice-President Margaritis Schinas and Commissioner Ylva Johansson took to the road and began a listening tour of Member State governments, with visits to Denmark, Germany, Greece, France, Italy and Hungary. Each also held a structured debate with the European Parliament. The consultation is an important aspect of President von der Leyen’s commitment to finding a way forward on the issue of migration and will help to shape the New Pact on Migration and Asylum that will be proposed in 2020.</span></p><span data-dcnode-id="2201" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2198"><span data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Hotspots and support for Greece, Cyprus, Malta, Italy and Spain</span></span></h3><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2196" instrument_node="">Since 2015, the Commission has provided €2.2&nbsp;billion in financial support to assist the Greek authorities, international organisations and non-governmental organisations (NGOs) with migration management. This was provided under the </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/financing/fundings/migration-asylum-borders/asylum-migration-integration-fund_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Asylum, Migration and Integration Fund</span></span></a><span data-dcnode-id="2192" instrument_node=""> (AMIF), the </span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/home-affairs/financing/fundings/security-and-safeguarding-liberties/internal-security-fund-police_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Internal Security Fund</span></span></a><span data-dcnode-id="2188" instrument_node=""> (ISF) and the Emergency Support Instrument. In addition, the Commission continued to provide structural support to the Greek authorities with a permanent presence on the Aegean islands. </span></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Since September 2019, the Commission has had a permanent presence in Cyprus to support the Cypriot authorities in efficiently managing migration. EU funding to the country since 2014 has reached €103.5&nbsp;million. EU support totalling €112.85&nbsp;million was provided to Malta under AMIF and ISF funding between 2014 and the end of 2019. </span></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">As regards Italy, the €59.4&nbsp;million allocated in 2019 brought the total amount of emergency assistance to €285.2&nbsp;million. This complements the €737.4&nbsp;million in EU support provided to Italy under its national programmes for the AMIF and ISF between 2014 and 2020.</span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">The Commission continued to support Spain by awarding over €52&nbsp;million in emergency assistance since 2018 to provide support to migrants, set up local registration and pre-reception centres and deploy extra Guardia Civil forces.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Migrants arriving at hotspots in Greece and Italy, as well as at registration centres on the southern coast of Spain, continued to be properly registered, identified and fingerprinted. </span></p><span data-dcnode-id="2174" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2171"><span data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Financial support for the efficient management of migration</span></span></h3><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">The EU supports national efforts to improve migration and border management with significant funding channelled through the national programmes of action managed by Member States. In 2019, it provided €467&nbsp;million under the AMIF, €442.7&nbsp;million under the ISF (Borders and Visa) and €92.7&nbsp;million under the ISF (Police). </span></p><span data-dcnode-id="2167" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="2157"><span data-dcnode-id="2166" instrument_node="">
</span><div class="img-large" data-dcnode-id="2159"><span data-dcnode-id="2165" instrument_node="">
</span><img alt="A summary of migration management funds" aria-describedby="GR64" data-dcnode-id="2164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_GR64-EN.jpg&amp;raw"><span data-dcnode-id="2163" instrument_node="">
</span><p class="longdesc" data-dcnode-id="2161" id="GR64"><span data-dcnode-id="2162" instrument_node="">The Asylum, Migration and Integration Fund supports Member States in managing migration flows, including in the fields of asylum, integration, legal migration and return. 

								The Internal Security Fund supports Member States’ efforts to better protect the security of citizens and to better protect and manage the European Union’s external borders. It is composed of two instruments: the Internal Security Fund (Borders and Visa) and the Internal Security Fund-(Police).

								Copyright: European Union</span></p><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">
</span></div><span data-dcnode-id="2156" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2153"><span data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">The EU–Turkey Statement</span></span></h3><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2151" instrument_node="">The </span><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2016/03/18/eu-turkey-statement/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">EU–Turkey Statement</span></span></a><span data-dcnode-id="2147" instrument_node=""> continued to provide alternatives to dangerous routes and save lives in the Aegean Sea. The number of irregular migrants from Turkey to Greece arriving by sea in 2019 (around 60&nbsp;000) was considerably lower than before the statement (pre-October 2015). Member States have opened up organised, safe and legal pathways for Syrian refugees in Turkey to come to Europe by resettling around 25&nbsp;700 of them (up to the end of 2019). In 2019, 3&nbsp;854 voluntary returns from Greece to non-EU countries took place under the Assisted Voluntary Return and Reintegration programme, of which 3&nbsp;260 from the mainland and 594 from the islands. Since 2016, 17&nbsp;900 migrants have returned voluntarily from both the Greek islands and the mainland with the support of the programme.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2144" instrument_node="">At the same time, the EU has continued to support Turkey in its efforts to host refugees with €6&nbsp;billion for 2016-2019 through its </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4389" target="_blank"><span class="hyperlink_text" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Facility for Refugees in Turkey</span></span></a><span data-dcnode-id="2140" instrument_node="">. </span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2137" instrument_node="">By the end of 2019, the full budget had been allocated to activities. Of the €4.7&nbsp;billion that had been contracted, €3.2&nbsp;billion had been paid out. Over 1.7&nbsp;million refugees continue to benefit from a monthly cash assistance called the </span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/QANDA_19_6212" target="_blank"><span class="hyperlink_text" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Emergency Social Safety Net</span></span></a><span data-dcnode-id="2133" instrument_node=""> to help them meet their basic needs, and more than 500&nbsp;000 refugee children have access to education.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="2118"><span data-dcnode-id="2130" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="2126"><span data-dcnode-id="2129" instrument_node="">
</span><img alt="An older man in conversation with an aid worker" data-dcnode-id="2128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH08_PH29.jpg&amp;raw"><span data-dcnode-id="2127" instrument_node="">
</span></div><span data-dcnode-id="2125" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="2122"><p class="caption" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">An EU-funded Emergency Social Safety Net beneficiary, a Syrian refugee from Raqqa, speaks with a World Food Programme staff member in his home, Ankara, Turkey, 24&nbsp;September 2019.</span></p></div><span data-dcnode-id="2121" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="2120"></span><span data-dcnode-id="2119" instrument_node="">
</span></div><span data-dcnode-id="2117" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2114"><span data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Enhancing safe, orderly and legal pathways to Europe</span></span></h2><span data-dcnode-id="2113" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2110"><span data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Visa policy</span></span></h3><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2108" instrument_node="">The EU continued to update and streamline its visa policy for non-EU-country nationals travelling to the Schengen area. From February 2020, the </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/06/visa-policy-eu-updates-rules-to-facilitate-legitimate-travel-and-fight-illegal-migration/" target="_blank"><span class="hyperlink_text" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">revised Visa Code</span></span></a><span data-dcnode-id="2104" instrument_node=""> will reduce red tape and facilitate visa procedures for trusted short-stay travellers while maintaining security. The revised code establishes a new mechanism that triggers stricter conditions for processing visas when a partner country does not cooperate sufficiently on the readmission of its own nationals who are staying in the EU irregularly. For certain categories of travellers, Member States will be able to slow down visa-processing times, reduce the length of validity of visas issued and increase the level of the visa fee, as well as modulating the exemption from such fees. </span></p><span data-dcnode-id="2102" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2099"><span data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Visa facilitation and visa suspension</span></span></h3><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">In June, the negotiations between the EU and Belarus on Visa Facilitation and Readmission Agreements were finalised and the agreements were initialled by chief negotiators. Both sides are now working to complete their internal procedures in order to enable the signature and conclusion of the agreements. The two agreements will be signed and will enter into force simultaneously.</span></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">The Visa Suspension Mechanism was strengthened in 2017 to allow a swift response in case of urgency. In June 2019, the Commission received a notification from the Netherlands under the mechanism concerning Albania. After careful consideration of the content of the notification and based on the available information and relevant data, the Commission considered that the circumstances required to trigger the mechanism had not been met, and committed to monitor the situation.  </span></p><span data-dcnode-id="2092" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2089"><span data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Visa reciprocity</span></span></h3><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Today, citizens of around 60 countries from around the world can travel to the EU without needing a visa. In turn, EU citizens should have the same ability to travel to these countries. This principle of reciprocity is central to our common visa policy. Progress was made with the United States when, in September, the US administration announced that Poland qualified to join its Visa Waiver Program. While the United States continued to require visas for citizens of Bulgaria, Croatia, Cyprus and Romania, this development explains why the Commission takes the approach of patient diplomacy with the US administration.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">The United States has indicated a willingness to admit these Member States into the Visa Waiver Program once they meet the requirements set out by US legislation, for example regarding security cooperation and lowering the visa-refusal rate.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="2079"><span data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Golden passports and golden visas</span></span></h3><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2077" instrument_node="">In January, the Commission presented a </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_526" target="_blank"><span class="hyperlink_text" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">comprehensive report on investor citizenship and residence schemes</span></span></a><span data-dcnode-id="2073" instrument_node=""> operated by a number of Member States. These schemes, commonly known as ‘golden passports’ and ‘golden visas’, respectively, allow a person to obtain a new nationality or residence permit based on an investment alone. As regards countries that enjoy visa-free access to the EU, the Commission’s report underlined that these countries must carry out security and background checks of applicants for investor citizenship schemes to the highest possible standards. The Commission is monitoring this as part of the Visa Suspension Mechanism. As concerns candidate countries and potential candidates, citizenship schemes are also monitored in the context of the EU accession process. Please refer also to Chapter&nbsp;7.</span></p><span data-dcnode-id="2071" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2068"><span data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Encouraging needs-based migration</span></span></h2><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2066" instrument_node="">In 2019, the EU strengthened bilateral cooperation with countries of origin and transit and with international organisations to address the root causes of irregular migration and forced displacement, improve border management and support voluntary returns and human mobility. It also worked with the African Union and the United Nations through their joint </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/topics/migration/54794/au-eu-un-taskforce-one-year-joint-work-delivers-results_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Taskforce.</span></span></a><span data-dcnode-id="2062" instrument_node=""> </span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The Commission continued to work on developing pathways for legal migration in order to help bring to the EU the people with the skills and talents that the labour market needs. In spring, the Commission completed an overall evaluation of the EU’s legal migration rules. The results of this ‘fitness check’ confirmed the importance of an effective legal migration policy as a key plank of a comprehensive European migration policy. </span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Throughout the year, the Commission continued to work in cooperation with Member States on the development of labour migration pilot projects with key partner countries, starting with African countries. To this end, the Commission has provided financial support, including under the Emergency Trust Fund for Africa.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="2051"><span data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Integration</span></span></h2><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2049" instrument_node="">Integration policy is a national responsibility. Nevertheless, in 2019, the Commission continued to support the efforts of Member States, local and regional authorities, NGOs and other actors through policy coordination, exchange of practices, monitoring and funding. These measures were put in place to foster the integration of non-EU-country nationals who have been given refugee status. In 2019, the Commission financed eight large transnational networks of cities and regions, bringing together more than 40 European cities and 10 regions to cooperate on integration issues. In the context of the </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/migrant-integration/network/european-integration-network-2" target="_blank"><span class="hyperlink_text" data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">European Integration Network</span></span></a><span data-dcnode-id="2045" instrument_node="">, the Commission supported several mutual learning activities for national authorities including an innovative programme of support between Member States to put in place or improve a specific policy or programme on integration.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><div data-dcnode-id="2030"><span data-dcnode-id="2042" instrument_node="">
</span><button aria-controls="content8" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="2032" data-target="#content8" data-toggle="collapse" type="button"><span data-dcnode-id="2041" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="2038"><span data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Less detail</span></span></span><span data-dcnode-id="2037" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="2034"><span data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">More detail</span></span></span><span data-dcnode-id="2033" instrument_node=""> </span></button><span data-dcnode-id="2031" instrument_node="">

</span><p class="chap_number" data-dcnode-id="2021"><span data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Chapter 9</span></span></p><span data-dcnode-id="2020" instrument_node="">
</span><h1 data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">A stronger global actor</span></h1><span data-dcnode-id="2017" instrument_node="">
</span><div class="_idGenObjectLayout-1" data-dcnode-id="2010"><span data-dcnode-id="2016" instrument_node="">
</span><div class="img_caption_photo_big" data-dcnode-id="2012"><span data-dcnode-id="2015" instrument_node="">
</span><img alt="Aid workers board an EU ECHO plane to deliver humanitarian assistance to the Democratic Republic of the Congo during its 10th Ebola outbreak.  (© European Union)" class="height_width_100pct" data-dcnode-id="2014" id="PC09-intro" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/PCH09.jpg&amp;raw"><span data-dcnode-id="2013" instrument_node="">
</span></div><span data-dcnode-id="2011" instrument_node="">
</span></div><span data-dcnode-id="2009" instrument_node="">
</span><p class="chap-intro-openpar ParaOverride-1" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">In times of global disorder, when the idea of multilateralism has come under attack, the European Union is leading a global push to address today’s challenges through international cooperation. In 2019, the EU worked to defend and strengthen the United Nations and crucial multilateral agreements, from the nuclear deal with Iran to the Paris Agreement on climate change and the Sustainable Development Goals.</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p class="chap-intro ParaOverride-2" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">The EU supported UN-led talks aimed at addressing the worst conflicts of our times, for instance in Syria and Libya, and contributed to the UN-brokered Stockholm Agreement on Yemen. It accompanied negotiations leading to the peace deal in Mozambique, witnessed its signing and supported its implementation.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">The EU created an International Contact Group on Venezuela with European and Latin American countries to help build a peaceful and democratic solution to the crisis. It also hosted an International Solidarity Conference for Venezuelan refugees and migrants. Key summits took place with Ukraine, China, Japan and, for the first time, with the League of Arab States. </span></p><span data-dcnode-id="2000" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">The EU supported reforms in the western Balkans, as well as in the eastern and southern neighbourhoods and consolidated its partnerships with these countries. </span></p><span data-dcnode-id="1997" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">The EU enhanced its role in security and defence by investing in Europe’s defence industry, military and civilian capabilities and technology. The EU took a step closer to setting up the European Defence Fund and to forging closer relations with NATO. </span></p><span data-dcnode-id="1994" instrument_node="">
</span><p class="chap-intro" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">The EU also continued its humanitarian mission by distributing €1.6&nbsp;billion of aid to countries hit by natural and man-made disasters. </span></p><span data-dcnode-id="1991" instrument_node="">
</span><div data-dcnode-id="1978"><span data-dcnode-id="1990" instrument_node="">
</span><button aria-controls="content9" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="1980" data-target="#content9" data-toggle="collapse" type="button"><span data-dcnode-id="1989" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="1986"><span data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Less detail</span></span></span><span data-dcnode-id="1985" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="1982"><span data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">More detail</span></span></span><span data-dcnode-id="1981" instrument_node=""> </span></button><span data-dcnode-id="1979" instrument_node="">
</span></div><span data-dcnode-id="1977" instrument_node="">

</span><div class="general-report collapse" data-dcnode-id="1381" id="content9"><span data-dcnode-id="1972" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1969"><span data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">The European Union’s neighbourhood</span></span></h2><span data-dcnode-id="1968" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1965"><span data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The eastern neighbourhood</span></span></h3><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1963" instrument_node="">In 2019, the EU continued to support and foster stability, security and prosperity under the </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/neighbourhood-enlargement/neighbourhood/overview_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">European Neighbourhood Policy</span></span></a><span data-dcnode-id="1959" instrument_node=""> and to develop strong partnerships with neighbouring countries to the east and south. </span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1956" instrument_node="">In May, a </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/international-ministerial-meetings/2019/05/13/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Ministerial Meeting</span></span></a><span data-dcnode-id="1952" instrument_node=""> and a </span><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/neighbourhood-enlargement/news_corner/news/celebrating-10-years-eastern-partnership-0_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">High-level Conference</span></span></a><span data-dcnode-id="1948" instrument_node=""> in Brussels celebrated 10&nbsp;years of the Eastern Partnership. Progress has been made on reforms in all areas of the 20 Deliverables for 2020 agenda, in particular in the economy, digital, transport, connectivity, energy and mobility, while challenges remain in the areas of governance and institution building. Following a wide consultation in 2019 on the future of the partnership, long-term policy objectives should be presented in advance of the Eastern Partnership Summit due to take place in the first half of 2020.</span></p><span data-dcnode-id="1946" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1933"><span data-dcnode-id="1945" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1941"><span data-dcnode-id="1944" instrument_node="">
</span><img alt="A group of young people sitting on a sports field" data-dcnode-id="1943" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH30.jpg&amp;raw"><span data-dcnode-id="1942" instrument_node="">
</span></div><span data-dcnode-id="1940" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1937"><p class="caption" data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Young people from the EU and its six Eastern Partnership countries (Armenia, Azerbaijan, Belarus, Georgia, Moldova and Ukraine) attend the third edition of the European School Summer Camp, Tbilisi, Georgia, 17&nbsp;August 2019.</span></p></div><span data-dcnode-id="1936" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1935"></span><span data-dcnode-id="1934" instrument_node="">
</span></div><span data-dcnode-id="1932" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1929"><span data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Relations with Ukraine </span></span></h3><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1927" instrument_node="">At their </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/international-summit/2019/07/08/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">summit</span></span></a><span data-dcnode-id="1923" instrument_node=""> in Kyiv in July, the EU and Ukraine issued a </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/40278/eu-ua-joint-statement-final.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">joint statement</span></span></a><span data-dcnode-id="1919" instrument_node=""> and the EU reaffirmed its commitment to Ukraine’s independence, sovereignty and territorial integrity.  The EU also affirmed its support for the implementation of the Minsk agreements and for the work of the Normandy Format, the Trilateral Contact Group on Ukraine and the Organisation for Security and Co-operation in Europe (OSCE) aimed at reaching a peaceful and sustainable solution to the conflict. The Commission and the Ukrainian government signed four programmes worth €109&nbsp;million from the Commission’s 2019 annual support package to the country. These will focus on decentralisation, the fight against corruption, supporting civil society and technical cooperation on key reforms and implementing the </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trade.ec.europa.eu/doclib/press/index.cfm%3Fid%3D1425" target="_blank"><span class="hyperlink_text" data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Association Agreement and its Deep and Comprehensive Free Trade Area</span></span></a><span data-dcnode-id="1915" instrument_node="">. </span></p><span data-dcnode-id="1913" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1910"><span data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Russia</span></span></h3><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">The EU continued to implement a double-track approach to Russia, which remained a strategic challenge: sanctions in response to Russia’s violations of Ukrainian sovereignty and territorial integrity and selective engagement as necessary on issues of interest to the EU, such as youth and cultural exchanges and EU–Russia educational cooperation.  </span></p><span data-dcnode-id="1906" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1903"><span data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The southern neighbourhood</span></span></h3><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1901" instrument_node="">EU financial and technical assistance in 2019 helped tackle the main challenges of the region: the conflicts in Syria, Libya and between Israel and Palestine (this designation shall not be construed as recognition of a State of Palestine and is without prejudice to the individual positions of the Member States on this issue), persistent migratory pressure, poor governance and a weak business environment. A renewed impetus was given to EU–Morocco relations in June with a </span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/06/27/joint-declaration-by-the-european-union-and-the-kingdom-of-morocco-for-the-fourteenth-meeting-of-the-association-council/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">joint political declaration</span></span></a><span data-dcnode-id="1897" instrument_node=""> aimed at developing a partnership for shared prosperity. The </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/eu-external-investment-plan_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">External Investment Plan</span></span></a><span data-dcnode-id="1893" instrument_node=""> has been instrumental in funding the private sector and boosting economic development and job creation in the southern neighbourhood region and Africa.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1888"><span data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The western Balkans and the enlargement process</span></span></h3><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1886" instrument_node="">The EU institutions continued to support the EU membership perspective of the western Balkans in 2019, in line with the </span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/communication-credible-enlargement-perspective-western-balkans_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Western Balkans Strategy</span></span></a><span data-dcnode-id="1882" instrument_node=""> and the </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/34776/sofia-declaration_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Sofia Priority Agenda</span></span></a><span data-dcnode-id="1878" instrument_node="">, which are aimed at strengthening the region’s political, economic and social transformation. The EU also continued to support cooperation to fully unleash the region’s economic and social potential and to overcome the legacy of the past. For example, the western Balkans </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/digital-single-market/en/news/entry-force-new-western-balkans-regional-roaming-agreement-clear-drop-roaming-charges" target="_blank"><span class="hyperlink_text" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">regional roaming agreement</span></span></a><span data-dcnode-id="1874" instrument_node=""> entered into force in July, significantly lowering roaming charges in the region and leading to zero roaming costs in 2021. The entry into force of the historic </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/57172/joint-statement-president-jean-claude-juncker-high-representativevice-president-federica_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Prespa Agreement</span></span></a><span data-dcnode-id="1870" instrument_node=""> between Greece and North Macedonia in February was a major breakthrough in the region. </span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">The first EU–western Balkans ministerial meeting on employment and social affairs took place in Luxembourg on 12&nbsp;June. Ministers from the troika Presidency of the Council (Romania, Finland and Croatia), together with the Commission, met with their western Balkans counterparts to discuss a range of employment and social policy issues. Expected to take place every year, the aim of the meeting is to exchange views on challenges to employment and social reforms that benefit all citizens in the region.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">In October, the European Council analysed the Commission’s recommendations to open accession negotiations with Albania and North Macedonia and decided to revert to the issue of enlargement before the EU–western Balkans summit in Zagreb in May 2020.  </span></p><span data-dcnode-id="1862" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1859"><span data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Turkey</span></span></h3><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1857" instrument_node="">Relations between the </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/49963/turkey-and-eu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">EU and Turkey</span></span></a><span data-dcnode-id="1853" instrument_node=""> continued to be challenged by the critical situation of the rule of law, fundamental rights and the independence of the judiciary in Turkey, as well as mounting tensions in the eastern Mediterranean. The EU has continued to assist refugees under the </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/IP_19_4389" target="_blank"><span class="hyperlink_text" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Facility for Refugees in Turkey</span></span></a><span data-dcnode-id="1849" instrument_node="">, which manages €6&nbsp;billion in funding to help over 4&nbsp;million refugees hosted in the country. </span></p><span data-dcnode-id="1847" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1844"><span data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Africa–Europe relations</span></span></h2><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1842" instrument_node="">The EU has embarked on an unprecedented partnership with Africa, investing in a true political relationship between equals. The </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/regions/africa_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">EU–Africa partnership</span></span></a><span data-dcnode-id="1838" instrument_node=""> spans a variety of fields, including development, peace and security, migration, climate, energy, agriculture, trade, sustainable investment and jobs, innovation, education, youth, democracy and human rights.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1835" instrument_node="">In 2019, the implementation of the 2018 </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/africaeuropealliance_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Africa–Europe Alliance for Sustainable Investment and Jobs</span></span></a><span data-dcnode-id="1831" instrument_node=""> progressed. The EU has already mobilised €3.7&nbsp;billion under the External Investment Plan, which is expected to leverage €37.1&nbsp;billion of investments in the EU neighbourhood and in sub-Saharan Africa. The commitment to dedicate over €300-350&nbsp;million each year between 2018 and 2020 to strengthen the business environment and investment climate is also on track, with €718&nbsp;million invested by the EU in 2018 alone. </span></p><span data-dcnode-id="1829" instrument_node="">
</span><div class="img_caption_photo" data-dcnode-id="1816"><span data-dcnode-id="1828" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1824"><span data-dcnode-id="1827" instrument_node="">
</span><img alt="Ursula von der Leyen and Gedu Andargachew in conversation" data-dcnode-id="1826" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH09_PH31.jpg&amp;raw"><span data-dcnode-id="1825" instrument_node="">
</span></div><span data-dcnode-id="1823" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1820"><p class="caption" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Ursula von der Leyen, President of the European Commission, and Gedu Andargachew, Ethiopian Minister of Foreign Affairs, meet in Addis Ababa, Ethiopia, 7&nbsp;December 2019.</span></p></div><span data-dcnode-id="1819" instrument_node="">
</span><span class="top-left-triangle" data-dcnode-id="1818"></span><span data-dcnode-id="1817" instrument_node="">
</span></div><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">As regards mobility, the EU’s commitment to support 35&nbsp;000 students and staff by 2020 is on track, with around 25&nbsp;000 benefiting by the end of 2019. As regards economic integration and trade, the EU will support the African Continental Free Trade Area with €62.5&nbsp;billion until 2020. Finally, the work of the four task forces set up with African and European experts in the areas of agriculture, the digital economy, energy and transport has borne fruit. </span></p><span data-dcnode-id="1812" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1809"><span data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">North America and Latin America </span></span></h2><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1807" instrument_node="">The EU has continued to work with one of its core partners, the </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/27291/united-states-and-eu_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">United States</span></span></a><span data-dcnode-id="1803" instrument_node="">. Examples of this cooperation are on the western Balkans and Ukraine, on energy, counterterrorism and cybersecurity. The EU’s strengthened partnership with NATO testifies to an increasingly interconnected transatlantic security space. </span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1800" instrument_node="">The EU joined forces with Canada to uphold multilateralism and the rules-based global order, including a free and fair international trade system. At their </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/07/18/eu-canada-summit-joint-declaration-montreal-17-18-july-2019/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">summit</span></span></a><span data-dcnode-id="1796" instrument_node=""> in Montreal in July, both sides committed to the full implementation of the EU–Canada free trade agreement.  </span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1793" instrument_node="">In April, the Commission and the High Representative of the Union for Foreign Affairs and Security Policy and Vice-President of the Commission published a </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/61109/european-union-latin-america-and-caribbean-joining-forces-commonfuture_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">joint communication</span></span></a><span data-dcnode-id="1789" instrument_node=""> setting out a vision for a stronger and more modern partnership with Latin America and the Caribbean that would be focused on trade, investment and sectoral cooperation. In 2019, the EU continued to lead support for the peace agreement in Colombia, consolidated the new phase in its relationship with Cuba at the </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/international-ministerial-meetings/2019/09/09/" target="_blank"><span class="hyperlink_text" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">second ministerial-level EU–Cuba Joint Council</span></span></a><span data-dcnode-id="1785" instrument_node=""> under the </span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/sites/eeas/files/cuba_factsheet_revised.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Political Dialogue and Cooperation Agreement</span></span></a><span data-dcnode-id="1781" instrument_node=""> and established the </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/delegations/russia_en/57639/International%2520Contact%2520Group%2520on%2520Venezuela" target="_blank"><span class="hyperlink_text" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">International Contact Group on Venezuela</span></span></a><span data-dcnode-id="1777" instrument_node=""> to help overcome the crisis there. In October, the </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/search/site_en%3Ff%255B0%255D%3Dim_field_tags%253A3161%26search_token%3Do723U8OfUGuCIx6p-1rePhvLcUTgHe1WG3IBGatQGxA" target="_blank"><span class="hyperlink_text" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">International Solidarity Conference</span></span></a><span data-dcnode-id="1773" instrument_node=""> on the Venezuelan refugee and migrant crisis brought together the countries of the region, the EU, the UN Refugee Agency (UNHCR) and the UN Migration Agency (IOM) to try to improve coordination of peace and the humanitarian response.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="1768"><span data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Asia and the Pacific </span></span></h2><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1766" instrument_node="">The EU and the five central Asian countries – Kazakhstan, Kyrgyzstan, Tajikistan, Turkmenistan and Uzbekistan – have a longstanding relationship based on strong mutual interests. In May, the EU set out its </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eeas.europa.eu/headquarters/headquarters-homepage/62412/new-eu-strategy-central-asia_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">vision</span></span></a><span data-dcnode-id="1762" instrument_node=""> for a </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/rapid/press-release_IP-19-2494_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">stronger partnership with these countries</span></span></a><span data-dcnode-id="1758" instrument_node="">, focusing on resilience, prosperity and better cooperation.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><h3 class="highlight_2" data-dcnode-id="1753"><span data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Japan</span></span></h3><span data-dcnode-id="1752" instrument_node="">
