</span><p data-dcnode-id="997"><span data-dcnode-id="1006" instrument_node="">A </span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/internal-control-standards_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">control framework</span></span></a><span data-dcnode-id="1002" instrument_node=""> and a </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/budget/library/biblio/documents/2019/Programmes_performance_overview.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">performance framework</span></span></a><span data-dcnode-id="998" instrument_node=""> are in place to provide reasonable assurance that EU funds are paid in accordance with the relevant rules and that measures are taken to prevent, detect and correct errors while increasing the focus on achieving results.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="995" instrument_node="">In March, following a positive recommendation from the Council, the Parliament gave its final approval to the way the Commission implemented the EU budget in 2017. Through the </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/news/en/headlines/eu-affairs/20150427STO46470/discharge-procedure-how-parliament-scrutinises-the-eu-budget" target="_blank"><span class="hyperlink_text" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">annual discharge procedure</span></span></a><span data-dcnode-id="991" instrument_node="">, the Parliament and the Council hold the Commission politically accountable for the implementation of the budget and ensure that the management of taxpayers’ money is under democratic control.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="988" instrument_node="">In July, the Commission presented its </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/publications/integrated-financial-and-accountability-reporting-2018_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Integrated Financial and Accountability Reporting</span></span></a><span data-dcnode-id="984" instrument_node=""> package, which puts together all the available information on the implementation, performance, results, sound financial management and protection of the 2018 EU budget. The reports demonstrated that the budget delivered results in line with the Commission’s priorities and was properly implemented. </span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="981" instrument_node="">The Commission continued to work towards the establishment of the </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/anti-fraud/policy/european_public_prosecutor_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">European Public Prosecutor’s Office</span></span></a><span data-dcnode-id="977" instrument_node="">, which will prosecute cross-border crime affecting the EU budget, including fraud, money laundering and corruption, in the 22 participating Member States. The Office is expected to be operational by the end of 2020. </span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="974" instrument_node="">In October, for the 12th year in a row, the European Court of Auditors issued a </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/presscorner/detail/en/ip_19_6003" target="_blank"><span class="hyperlink_text" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">clean bill of health</span></span></a><span data-dcnode-id="970" instrument_node=""> on the EU’s annual accounts, finding them to be true and fair. The Court confirmed its qualified (rather than adverse) opinion on the regularity of expenditure. The overall level of estimated error, 2.6&nbsp;%, was slightly higher than in 2017 (by 0.2&nbsp;% points), but well below that of preceding years. For roughly half of the EU’s spending the error rate did not even reach the level considered by the Court to be material. No material errors were found on the revenue side of the budget or in administrative expenditure.</span></p><span data-dcnode-id="968" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="965"><span data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">National parliaments</span></span></h2><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="963" instrument_node="">In July, the Commission adopted the </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/law/law-making-process/adopting-eu-law/relations-national-parliaments/annual-reports-application-principles-subsidiarity-and-proportionality-and-relations-national-parliaments_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">2018 annual report</span></span></a><span data-dcnode-id="959" instrument_node=""> on its relations with national parliaments and on the application of the principles of subsidiarity and proportionality. The report gives a comprehensive picture of the national parliaments’ intensive and fruitful relations with the Commission and other EU institutions. National parliaments submitted 569 opinions, a similar number to 2017. This shows that most of them are very actively engaging with the Commission on its initiatives and on a wide range of topics. </span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="956" instrument_node="">Only 37 ‘reasoned opinions’ flagged concerns about how Commission proposals respected the subsidiarity principle, meaning that European policies are decided and implemented at the most appropriate level, whether European, national or regional. The </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/priorities/democratic-change/better-regulation/task-force-subsidiarity-proportionality-and-doing-less-more-efficiently_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Task Force on Subsidiarity, Proportionality and Doing Less More Efficiently</span></span></a><span data-dcnode-id="952" instrument_node="">, set up in 2018 by President Juncker and chaired by First Vice-President Timmermans, looked at ways to better involve national parliaments as well as regional and local authorities in the preparation and follow-up of EU legislation and policies. Measures by the Commission to achieve this include giving aggregated responses if a significant number of national parliaments express subsidiarity concerns, thus presenting in one public document the full picture of all such concerns raised and the Commission’s position on them.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">The visits that Members of the Commission made to national parliaments or that delegations from national parliaments made to the Commission (55 visits in 2019 and 915 visits during the whole mandate of the Juncker Commission) reinforced the dialogue between the parties.</span></p><span data-dcnode-id="947" instrument_node="">
</span><h2 class="highlight_1" data-dcnode-id="944"><span data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The European Ombudsman</span></span></h2><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">The European Ombudsman’s inquiries into alleged maladministration in the institutions and bodies of the European Union covered a variety of topics, such as transparency of the decision-making process, the ‘revolving doors’ phenomenon, post-mandate activities of former Commissioners, access to documents, fundamental rights, ethical issues, contracts, grants or individual staff matters. On average, the Commission complies with around three quarters of the Ombudsman’s proposals (proposals for a solution, suggestions for improvement and recommendations) and no maladministration is found for around 95&nbsp;% of inquiries. </span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">In June, the Ombudsman gave its second European Award for Good Administration to Commission initiatives to reduce plastics pollution and to promote awareness raising. The award aims to recognise initiatives, projects and other types of work by different departments of the EU’s institutions that have a visible and directly positive impact on the lives of people in Europe and beyond. </span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="936" instrument_node="">In October, the Commission also adopted an opinion on the draft regulation of the Parliament, laying down the regulations and general conditions governing the performance of the Ombudsman’s duties (their </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europarl.europa.eu/doceo/document/TA-8-2019-0080_EN.html" target="_blank"><span class="hyperlink_text" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">revised statute</span></span></a><span data-dcnode-id="932" instrument_node="">).</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">In December, the Parliament reelected Emily</span><span class="basic-bold _idGenCharOverride-1" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node=""> </span></span><span data-dcnode-id="926" instrument_node="">O’Reilly as the European Ombudsman. Her second mandate will last for 5&nbsp;years.</span></p><span data-dcnode-id="924" instrument_node="">
</span><div data-dcnode-id="911"><span data-dcnode-id="923" instrument_node="">
</span><button aria-controls="content10" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="913" data-target="#content10" data-toggle="collapse" type="button"><span data-dcnode-id="922" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="919"><span data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Less detail</span></span></span><span data-dcnode-id="918" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="915"><span data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">More detail</span></span></span><span data-dcnode-id="914" instrument_node=""> </span></button><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">

</span><div class="general-report eu-2017" data-dcnode-id="679" id="gris5"><span data-dcnode-id="905" instrument_node="">
</span><h2 data-dcnode-id="901"><span data-dcnode-id="904" instrument_node="">The withdrawal of the </span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">United Kingdom from the European Union</span></h2><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">On 29&nbsp;March 2017, the United Kingdom notified the European Council of its intention to withdraw from the European Union and the European Atomic Energy Community (Euratom) in accordance with Article&nbsp;50 of the Treaty on European Union. </span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">This triggered a 2-year period to negotiate and conclude an agreement with the UK setting out the arrangements for its withdrawal while taking into account the framework for its future relationship with the EU. </span></p><span data-dcnode-id="894" instrument_node="">
</span><div data-dcnode-id="881" style="margin-right:10px;"><span data-dcnode-id="893" instrument_node="">
</span><button aria-controls="content_gris5" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="883" data-target="#content_gris5" data-toggle="collapse" type="button"><span data-dcnode-id="892" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="889"><span data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Less detail</span></span></span><span data-dcnode-id="888" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="885"><span data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">More detail</span></span></span><span data-dcnode-id="884" instrument_node=""> </span></button><span data-dcnode-id="882" instrument_node="">
</span></div><span data-dcnode-id="880" instrument_node="">
</span><div class="clearfix" data-dcnode-id="879"></div><span data-dcnode-id="878" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="681" id="content_gris5"><span data-dcnode-id="877" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="874"><span data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Negotiating a Withdrawal Agreement and Political Declaration on the framework of the future relationship</span></span></h3><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The European Commission was appointed to negotiate a Withdrawal Agreement with the UK on behalf of the European Council (Article&nbsp;50, made up of the leaders of all Member States except the UK) and nominated Michel Barnier as its chief negotiator. Formal negotiations began on 19&nbsp;June 2017, following the UK general election. </span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="869" instrument_node="">On </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//europa.eu/rapid/press-release_IP-18-6424_en.htm" target="_blank"><span class="hyperlink_text" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">14&nbsp;November 2018</span></span></a><span data-dcnode-id="865" instrument_node="">, after 17&nbsp;months of intensive negotiations, the Commission and UK negotiators agreed a </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/files/draft-agreement-withdrawal-united-kingdom-great-britain-and-northern-ireland-european-union-and-european-atomic-energy-community-agreed-negotiators-level-14-november-2018_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Withdrawal Agreement</span></span></a><span data-dcnode-id="861" instrument_node=""> on the terms of the UK’s orderly withdrawal from the EU. On 22&nbsp;November, they agreed the </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/political-declaration-setting-out-framework-future-relationship-between-european-union-and-united-kingdom_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Political Declaration</span></span></a><span data-dcnode-id="857" instrument_node=""> setting out the framework for the future EU–UK relationship. </span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="854" instrument_node="">On </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2018/11/25/european-council-art-50-conclusions-25-november-2018/" target="_blank"><span class="hyperlink_text" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">25&nbsp;November</span></span></a><span data-dcnode-id="850" instrument_node=""> 2018, the European Council formally endorsed the Withdrawal Agreement and approved the Political Declaration. </span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">On 11&nbsp;January 2019, the Council adopted a decision authorising the signature of the Withdrawal Agreement and forwarded the draft Council decision on the conclusion of the agreement to the European Parliament for its consent. </span></p><span data-dcnode-id="845" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="842"><span data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Article&nbsp;50 extensions</span></span></h3><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="840" instrument_node="">Despite clarifications presented in an exchange of letters on 14 January 2019 between the </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/37878/20190114-letter-may-to-tusk-juncker-brexit.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">UK Prime Minister</span></span></a><span data-dcnode-id="836" instrument_node=""> Theresa May and </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/letter_to_prime_minister_may.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Presidents Tusk and Juncker</span></span></a><span data-dcnode-id="832" instrument_node="">, and the additional agreement of 11&nbsp;March 2019 on </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/instrument-relating-agreement-withdrawal-united-kingdom-great-britain-and-northern-ireland-european-union-and-european-atomic-energy-community_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">an Instrument relating to the Withdrawal Agreement</span></span></a><span data-dcnode-id="828" instrument_node=""> and a </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/joint-statement-supplementing-political-declaration-setting-out-framework-future-relationship-between-european-union-and-united-kingdom-great-britain-and-northern-ireland_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Joint Statement supplementing the Political Declaration</span></span></a><span data-dcnode-id="824" instrument_node="">, the UK government did not obtain the necessary support from its Parliament to proceed with the signature and ratification of the Withdrawal Agreement.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="821" instrument_node="">Responding to a request from the United Kingdom to extend the 29&nbsp;March deadline, the European Council (Article&nbsp;50) initially granted an extension until </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/03/22/brexit-european-council-adopts-decision-extending-the-period-under-article-50/" target="_blank"><span class="hyperlink_text" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">12&nbsp;April 2019</span></span></a><span data-dcnode-id="817" instrument_node=""> and subsequently agreed to a further one until </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/european-council/2019/04/10/" target="_blank"><span class="hyperlink_text" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">31&nbsp;October 2019</span></span></a><span data-dcnode-id="813" instrument_node="">. These decisions were taken in agreement with the UK.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">The EU-27 leaders stressed that the UK would have to hold European Parliament elections between 23 and 26&nbsp;May 2019 if it were still a member of the EU. A total of 751 Members of the European Parliament were elected, including 72 from the UK.</span></p><span data-dcnode-id="808" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="805"><span data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Continued work for preparedness by all actors for all scenarios</span></span></h3><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="803" instrument_node="">Throughout the year, as in 2018, the EU continued its work, in close coordination with Member States, on </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/brexit/brexit-preparedness_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">preparedness</span></span></a><span data-dcnode-id="799" instrument_node=""> at all levels for the consequences of the UK’s withdrawal, also in the event of there not being an agreement in place. In April, June and September, the Commission adopted </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/info/brexit/brexit-preparedness/other-preparedness-activities_en%23communications-of-the-european-commission" target="_blank"><span class="hyperlink_text" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">three additional communications</span></span></a><span data-dcnode-id="795" instrument_node=""> in which it set out the Union’s coordinated approach to preparedness and the principles underpinning it and presented the state of play of EU-level preparations. It urged all actors concerned to take the necessary steps to prepare for all possible scenarios. </span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">In order to mitigate the worst consequences of a potential no-deal withdrawal scenario for the EU-27, the Commission adopted a number of unilateral contingency measures, including several legislative proposals in various areas such as social security coordination, Erasmus+, the possibility for the UK to continue to contribute to the 2019 and 2020 EU budgets, and fishing authorisations. These legislative measures were complemented by around 60 non-legislative acts in various areas. Furthermore, the Commission published 102 notices to inform stakeholders about the consequences of the UK’s withdrawal without an agreement. </span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The Commission worked closely with Member States to ensure the coherence and effectiveness of the Union approach and a large number of seminars with Member States were organised to allow for sectorial and technical discussions and to help them prepare. Between January and March, the Commission visited all 27 Member States to make sure that national contingency planning was on track and to provide the necessary clarifications on preparedness and contingency actions.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="784"><span data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Negotiations with the new UK government</span></span></h3><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="782" instrument_node="">Following the resignation of Theresa May as Prime Minister, the new UK government sought modifications of the </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/withdrawal-agreement-and-political-declaration-official-journal-european-union-19-february-2019_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Protocol on Ireland and Northern Ireland</span></span></a><span data-dcnode-id="778" instrument_node=""> attached to the Withdrawal Agreement endorsed by the European Council (Article&nbsp;50) on 25&nbsp;November 2018. The UK government also sought amendments to the Political Declaration with a view to reflecting its new level of ambition for the future relationship with the EU. </span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Following negotiations between the EU and the UK during September and October 2019, an agreement was reached on a revised text of both the Protocol and the Political Declaration. </span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="772" instrument_node="">On 17&nbsp;October 2019, the European Council </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/meetings/european-council/2019/10/17/art50/" target="_blank"><span class="hyperlink_text" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">endorsed</span></span></a><span data-dcnode-id="768" instrument_node=""> the </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/withdrawal-agreement-and-political-declaration-official-journal-european-union-12-november-2019_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">amended Withdrawal Agreement</span></span></a><span data-dcnode-id="764" instrument_node=""> and the </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/withdrawal-agreement-and-political-declaration-official-journal-european-union-12-november-2019_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">revised text of the Political Declaration</span></span></a><span data-dcnode-id="760" instrument_node="">. </span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="757" instrument_node="">On 19&nbsp;October, the UK submitted a request for an extension of the 31&nbsp;October 2019 deadline. With a view to allowing more time to finalise the ratification of the Withdrawal Agreement, the European Council adopted a decision to extend the period under Article&nbsp;50 until </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/en/press/press-releases/2019/10/29/brexit-european-council-adopts-decision-to-extend-the-period-under-article-50/" target="_blank"><span class="hyperlink_text" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">31</span></span><span class="hyperlink_text" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">&nbsp;January 2020</span></span></a><span data-dcnode-id="751" instrument_node="">. The decision was taken with the agreement of the United Kingdom.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">For the duration of the extension, the United Kingdom remained a Member State with all the rights and obligations under EU law.  </span></p><span data-dcnode-id="746" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="743"><span data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The revised Withdrawal Agreement </span></span></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/revised-protocol-ireland-and-northern-ireland-included-withdrawal-agreement_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">The revised Protocol on Ireland and Northern Ireland</span></span></a><span data-dcnode-id="738" instrument_node=""> provides for a legally operative solution to avoid a hard border on the island of Ireland, to protect the all-island economy and the Good Friday (Belfast) Agreement in all its dimensions and to safeguard the integrity of the Single Market. This solution responds to the unique circumstances on the island of Ireland with the aim of protecting peace and stability.&nbsp;</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Northern Ireland will remain aligned to a limited set of Single Market rules to avoid a hard border on the island of Ireland. The revised Protocol will also avoid any customs border on the island of Ireland. While Northern Ireland remains part of the UK’s customs territory, UK authorities will apply the Union’s Customs Code for all goods coming into Northern Ireland, and the Protocol foresees appropriate EU supervision and enforcement mechanisms. The Northern Ireland Assembly will have a decisive voice in the long-term application of relevant EU law in Northern Ireland. In contrast to the previous Protocol, this one is of a permanent nature and is not to be replaced by alternative arrangements.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">All other elements of the Withdrawal Agreement remain unchanged in substance, as per the agreement reached on 14&nbsp;November 2018. The Withdrawal Agreement brings legal certainty where the UK’s withdrawal from the EU creates uncertainty: citizens’ rights, the financial settlement, a transition period until at least the end of 2020, governance, protocols on Cyprus and Gibraltar and a range of other separation issues.</span></p><span data-dcnode-id="730" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="727"><span data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The revised Political Declaration</span></span></h3><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="725" instrument_node="">The main change in </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/publications/revised-political-declaration_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">the revised Political Declaration</span></span></a><span data-dcnode-id="721" instrument_node=""> relates to the future EU–UK economic relationship where the current UK government has opted for a free trade agreement. The declaration confirms the ambition to conclude a free trade agreement with zero tariffs and quotas between the EU and the United Kingdom and states that robust commitments on a level playing field should ensure open and fair competition and prevent unfair competitive advantages.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="718" instrument_node="">On 22&nbsp;October 2019, </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/transparency/regdoc/rep/10061/2019/EN/PV-2019-2312-F1-EN-MAIN-PART-1.PDF" target="_blank"><span class="hyperlink_text" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">the Commission decided</span></span></a><span data-dcnode-id="714" instrument_node="">, on the initiative of the then President-elect von der Leyen, to restructure the existing task force and establish a new one for relations with the United Kingdom. Michel Barnier was appointed as head of the task force, which will coordinate the Commission’s work on all strategic, operational, legal and financial issues related to the UK’s withdrawal from the EU. The decision took effect on 16&nbsp;November 2019. </span></p><span data-dcnode-id="712" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="709"><span data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Next steps</span></span></h3><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Before the Withdrawal Agreement could enter into force, it needed to be ratified by the EU and the United Kingdom. </span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Following the UK election result on 12&nbsp;December 2019, it was expected that the Withdrawal Agreement would be ratified and concluded by both sides by the end of January 2020, allowing the United Kingdom to withdraw in an orderly manner and become a non-EU country on 1&nbsp;February 2020.  </span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The Withdrawal Agreement provides for a transition period until 31&nbsp;December 2020. This can be extended once by up to 1 or 2&nbsp;years, but it must be decided on by mutual EU–UK agreement before 1&nbsp;July 2020. During this period, EU law will continue to apply to and in the United Kingdom. The EU will treat the UK as if it were a Member State, with the exception of participation in the EU institutions and governance structures.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">The EU stood ready to present a negotiation mandate to the Council for the future relationship with the United Kingdom as soon as the latter becomes a non-EU country. The Commission was also ready to start negotiations as soon as the mandate was approved.</span></p><span data-dcnode-id="696" instrument_node="">
</span><div data-dcnode-id="683" style="margin-right:10px;"><span data-dcnode-id="695" instrument_node="">
</span><button aria-controls="content_gris5" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="685" data-target="#content_gris5" data-toggle="collapse" type="button"><span data-dcnode-id="694" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="691"><span data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Less detail</span></span></span><span data-dcnode-id="690" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="687"><span data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">More detail</span></span></span><span data-dcnode-id="686" instrument_node=""> </span></button><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">

</span><div class="general-report eu-2017" data-dcnode-id="448" id="gris6"><span data-dcnode-id="675" instrument_node="">
</span><h2 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Reaching out to citizens</span></h2><span data-dcnode-id="672" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="669"><span data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">The European Citizens’ Initiative </span></span></h3><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The Commission registered 16 new citizens’ initiatives in 2019 (more than twice the number in 2018), which equals the 2012 mark (the initiative’s first year of implementation). </span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="664" instrument_node="">Much of the increase can be attributed to the dedicated </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/citizens-initiative/home_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">communication campaign</span></span></a><span data-dcnode-id="660" instrument_node=""> begun in April 2018, which aimed to increase awareness of the tool through social media promotion and targeted events in Member States. Furthermore, the </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//collab.ec.europa.eu/wiki/eci/" target="_blank"><span class="hyperlink_text" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">online collaborative platform</span></span></a><span data-dcnode-id="656" instrument_node=""> launched in May 2018 promotes best-practice exchanges via a discussion forum and provides independent advice from experts on legal or organisational matters.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">On 17&nbsp;April 2019, the European Parliament and the Council agreed to a reform of the European Citizens’ Initiative. The new rules, which apply from January 2020, aim to make it easier for citizens to organise and support initiatives. This includes improved procedures, more help and more information for citizens, and new IT tools. A key requirement and priority is the setting up of a central system for the online collection of statements of support, which the Commission will manage. </span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="650" instrument_node="">A new </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/food/safety/general_food_law/transparency-and-sustainability-eu-risk-assessment-food-chain_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">regulation on the transparency and sustainability of the EU risk assessment in the food chain</span></span></a><span data-dcnode-id="646" instrument_node=""> was formally adopted on 13&nbsp;June 2019. The text was in response to a European Citizens’ Initiative on EU policy concerning pesticides.</span></p><span data-dcnode-id="644" instrument_node="">
</span><div data-dcnode-id="631" style="margin-right:10px;"><span data-dcnode-id="643" instrument_node="">
</span><button aria-controls="content_gris6" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="633" data-target="#content_gris6" data-toggle="collapse" type="button"><span data-dcnode-id="642" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="639"><span data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Less detail</span></span></span><span data-dcnode-id="638" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="635"><span data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">More detail</span></span></span><span data-dcnode-id="634" instrument_node=""> </span></button><span data-dcnode-id="632" instrument_node="">
</span></div><span data-dcnode-id="630" instrument_node="">
</span><div class="clearfix" data-dcnode-id="629"></div><span data-dcnode-id="628" instrument_node="">
</span><div class="general-report collapse" data-dcnode-id="450" id="content_gris6"><span data-dcnode-id="627" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="624"><span data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Citizens’ Dialogues</span></span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Citizens’ Dialogues have made it even clearer that populism, myths and disinformation about Europe can be reduced if the EU gets closer to its citizens and explains how it works and what it does. Dialogues have allowed the Commission to bring the debate about Europe to a wider public and have shown an increasing demand for events that enable people to be heard.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">One of the priorities set by the Juncker Commission was to listen, engage and involve citizens in shaping the EU of the future. This engagement has translated into more than 1&nbsp;800 Citizens’ Dialogues in more than 600 cities since January 2015. Over 212&nbsp;000 people of all ages and backgrounds took part, along with the President and Vice-Presidents of the Commission, Commissioners, Members of the European Parliament, national politicians and EU officials. </span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Organised as town-hall-style debates, often with national and local partners, these dialogues have been a valuable communication tool to speak directly to citizens without any filters or intermediaries. Citizens’ views gathered during the dialogues have fed into the policymaking process and have even greater potential to do so in the future.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p class="h2gris" data-dcnode-id="611"><span data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">From a listening exercise to true engagement</span></span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Citizens’ Dialogues have evolved over the years, accompanying the debates on the future of Europe triggered by the White Paper of March 2017 and complementing the citizens’ consultations carried out in Member States. The dialogues have expanded to embrace new formats, such as bottom-up participatory workshops, online discussions and transnational dialogues in border regions.</span></p><span data-dcnode-id="607" instrument_node="">
</span><div class="c1-chart" data-dcnode-id="597"><span data-dcnode-id="606" instrument_node="">
</span><div class="img-large" data-dcnode-id="599"><span data-dcnode-id="605" instrument_node="">
</span><img alt="Map showing the geographical distribution of Citizen’s Dialogues in the period between 2014 and 2019" aria-describedby="GR71" data-dcnode-id="604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_GR71-EN.jpg&amp;raw"><span data-dcnode-id="603" instrument_node="">
</span><p class="longdesc" data-dcnode-id="601" id="GR71"><span data-dcnode-id="602" instrument_node="">Since the beginning of the Juncker Commission, Citizens’ Dialogues have been held across Europe.</span></p><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The debates have shown that citizens are at the forefront of change, with many expectations regarding the circular and digital economies and the new ways of democratic participation. People demand action on issues such as climate change and environmental protection, but they also expect the EU to guarantee their well-being, standards of living and pensions. Citizens also see the EU as the guarantor of their agricultural and rural traditions as well as their European identity, culture and values. </span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The Commission will remain committed to engaging with citizens and stimulating their participation by developing the tools for interacting with them on a closer level, as well as improving the integration of their concerns and expectations into policymaking. The expertise acquired between 2015 and 2019 can serve as a starting point to design the Conference on the Future of Europe announced by Ursula von der Leyen under the Commission’s political priority ‘A new push for European democracy’.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p class="h2gris" data-dcnode-id="587"><span data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">A forum for evolving debates</span></span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">When the dialogues began in 2015, coinciding with the peak of arrivals of refugees and migrants to the EU, one of the hottest topics was migration. The following year, concerns about the rise of terrorism and radicalisation in Europe dominated debates along with interest in the ramifications of Brexit and relations with the new Trump administration in the United States. In 2017 and 2018, Citizens’ Dialogues increasingly focused on the future of the EU, a topic that continued to dominate in 2019 in addition to concerns about populism, Euroscepticism, fake news and disinformation. The topic of digital transformation, especially artificial intelligence, also sparked many debates. In addition, the climate and environment were hot topics, especially among young people. </span></p><span data-dcnode-id="583" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="570"><span data-dcnode-id="582" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="578"><span data-dcnode-id="581" instrument_node="">
</span><img alt="Children wearing school uniforms waving European Union flags in a park" data-dcnode-id="580" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_PH40.jpg&amp;raw"><span data-dcnode-id="579" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="574"><p class="caption" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Children participate in the Our Forests, Our Future conference tree-planting event to demonstrate the EU’s commitment to a sustainable forestry sector, Brussels, Belgium, 26&nbsp;April 2019.</span></p></div><span data-dcnode-id="573" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="572"></span><span data-dcnode-id="571" instrument_node="">
</span></div><span data-dcnode-id="569" instrument_node="">
</span><p class="h2gris" data-dcnode-id="566"><span data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Preparing for the future</span></span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">In 2019, 547 Citizens’ Dialogues took place in 27 Member States, bringing together more than 60&nbsp;000 people. Their opinions informed the EU-27 leaders of citizens’ hopes and dreams for the future of Europe before their informal meeting in Sibiu, Romania, in May. </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="561" instrument_node="">Conclusions taken from the dialogues and online consultations held throughout the year contributed to the vision presented by the Commission in the document ‘</span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/euco_sibiu_communication_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Preparing for a more united, stronger and more democratic Union in an increasingly uncertain world</span></span></a><span data-dcnode-id="557" instrument_node="">’. The message was clear: for Europe to thrive, Member States must act together.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">This document, enriched by the feedback and interaction of citizens, was presented as the Commission’s contribution to the EU’s Strategic Agenda for the period 2019 to 2024, which was adopted in June. See the section entitled ‘The future of Europe’ for more information.&nbsp; </span></p><span data-dcnode-id="552" instrument_node="">
</span><h3 class="highlight_3" data-dcnode-id="549"><span data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Communicating Europe</span></span></h3><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="547" instrument_node="">Communicating effectively with citizens across a whole continent is a unique challenge for the EU. Policy and communication are two sides of the same coin. With this in mind and for the first time ever, the Commission made a set of </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/commission/sites/beta-political/files/comm_sibiu_06-05_en.pdf" target="_blank"><span class="hyperlink_text" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">five recommendations</span></span></a><span data-dcnode-id="543" instrument_node=""> on communication at the service of citizens and democracy in its contribution to the EU’s new Strategic Agenda at the Sibiu Summit on 9&nbsp;May 2019. With responsibility for communicating about the EU shared by its institutions, Member States and governments at all levels, the first recommendation underlines the need to communicate more with common messages, explaining what decisions and policies mean for people and what tangible results they bring. The second focuses on increasing engagement and interaction with citizens about EU policies and issues. The third recommendation aims to ensure that EU institutions work more closely together in the future on EU corporate communication campaigns based on shared European values. Next, the Commission highlights the need to join forces to counter disinformation, with EU communication based on facts. Finally, the Commission recommends promoting teaching and learning about the EU at all levels of education. </span></p><span data-dcnode-id="541" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="524"><span data-dcnode-id="540" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="536"><span data-dcnode-id="539" instrument_node="">
</span><img alt="The Learning Corner, launched by the European Commission in March 2019, helps primary and secondary school children to learn about the EU in a fun way, both in the classroom and at home. (© European Union, 2019)" data-dcnode-id="538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_PH43-EN.jpg&amp;raw"><span data-dcnode-id="537" instrument_node="">
</span></div><span data-dcnode-id="535" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="528"><p class="caption" data-dcnode-id="529"><span data-dcnode-id="534" instrument_node="">The </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/learning-corner/home_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Learning Corner</span></span></a><span data-dcnode-id="530" instrument_node="">, launched by the European Commission in March 2019, helps primary and secondary school children to learn about the EU in a fun way, both in the classroom and at home. </span></p></div><span data-dcnode-id="527" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="526"></span><span data-dcnode-id="525" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span><p class="h2gris" data-dcnode-id="520"><span data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">The EU in my region</span></span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="518" instrument_node="">Throughout the month of May, the ‘</span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/regional_policy/en/policy/communication/euinmyregion/" target="_blank"><span class="hyperlink_text" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">EU in my region</span></span></a><span data-dcnode-id="514" instrument_node="">’ campaign, which encourages citizens to discover EU-funded projects close to where they live, saw around half a million citizens visit more than 2&nbsp;000 projects. The campaign is co-created and run jointly by the regions and the Commission.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p class="h2gris" data-dcnode-id="509"><span data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Deliberative citizens’ workshops: getting bottom-up policy priorities from citizens</span></span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">In 2017, the Commission introduced a new type of event: participatory citizens’ workshops. During these workshops citizens discussed what matters to them, created proposals on the future they want for Europe and then debated these ideas with an EU decision-maker. They proved to be a meaningful way to find out citizens’ positions on topics while putting them in control of the conversation. In 2019, eight workshops on the future of Europe were organised in Belgium, Italy, Cyprus, Hungary, Poland and Finland. They highlighted areas where citizens believe European-level actions could make a difference. </span></p><span data-dcnode-id="505" instrument_node="">
</span><p class="h2gris" data-dcnode-id="502"><span data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Discussions on issues linked to the European Parliament elections</span></span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">In 2018 and early 2019, the European Parliament elections were often discussed during the dialogues. People were worried about the rise of populism and Euroscepticism in several Member States and many voiced concerns about the use of disinformation. Related topics discussed were countermeasures Europe can take; the destabilising effects that foreign powers can have in some countries by influencing important elections; freedom of expression; and how people can distinguish between reliable and unreliable sources of information.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p class="h2gris" data-dcnode-id="495"><span data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">A year of youthful voices and action</span></span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">At many dialogues throughout 2019, young people expressed their concerns about the state of the rule of law in various Member States and some participants wanted to know what the EU could do in order to ensure it is upheld. In some countries, there were also strong concerns about corruption.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Participants also called on both EU and national politicians to continue to actively protect the environment, fight climate change and use cleaner energy from European sources. </span></p><span data-dcnode-id="488" instrument_node="">
</span><div class="img_caption_photo2" data-dcnode-id="475"><span data-dcnode-id="487" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="483"><span data-dcnode-id="486" instrument_node="">
</span><img alt="Various shots of people listening and participating in discussions" data-dcnode-id="485" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/webpub/com/general-report-2019/img/CH10_PH42.jpg&amp;raw"><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="479"><p class="caption" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">The Young Citizens’ Dialogue event during the Sibiu summit, Sibiu, Romania, 9&nbsp;May 2019. </span></p></div><span data-dcnode-id="478" instrument_node="">
</span><span class="top-left-triangle2" data-dcnode-id="477"></span><span data-dcnode-id="476" instrument_node="">
</span></div><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">They also expected the EU to regulate and facilitate the transition to a more sustainable society and to encourage behavioural change in areas like the circular economy, food waste and the reduction of plastics.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Many Citizens’ Dialogues saw questions about the persisting gender pay gap and the need for the EU to implement measures to ensure gender equality in decision-making positions. There were also calls for a more social Europe, including an increase of the EU’s budget to deal with social issues and the reduction of inequalities between and within Member States.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">The young Citizens’ Dialogue ‘Let’s shape the future of Europe together!’ took place on 8&nbsp;May in Sibiu. More than 300 young people from all across Europe aged 18 to 25 attended to discuss the future of Europe with EU leaders ahead of the summit of 9&nbsp;May. They brainstormed and discussed issues around five key topics: engagement, democracy, fairness, digital Europe and climate change. As regards the future of the EU, they demanded more influence in policymaking, especially in the light of the recent increase in youth activism related to the climate emergency.</span></p><span data-dcnode-id="465" instrument_node="">
</span><div data-dcnode-id="452" style="margin-right:10px;"><span data-dcnode-id="464" instrument_node="">
</span><button aria-controls="content_gris6" aria-expanded="false" class="btn btn-sm arrow-toggle pull-right collapsed" data-dcnode-id="454" data-target="#content_gris6" data-toggle="collapse" type="button"><span data-dcnode-id="463" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-up" data-dcnode-id="460"><span data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Less detail</span></span></span><span data-dcnode-id="459" instrument_node=""> </span><span class="glyphicon glyphicon-chevron-down" data-dcnode-id="456"><span data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">More detail</span></span></span><span data-dcnode-id="455" instrument_node=""> </span></button><span data-dcnode-id="453" instrument_node="">
</span></div><span data-dcnode-id="451" instrument_node="">
</span></div><span data-dcnode-id="449" instrument_node="">

</span><div class="general-report eu-2017" data-dcnode-id="434" id="gris7"><span data-dcnode-id="444" instrument_node="">
</span><h2 data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Looking ahead</span></h2><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">This report has described the many achievements of the EU in 2019 and the challenges that we still face. New leaders took the helm and, with citizens ever more engaged and participating in the democratic life of Europe, the EU is well equipped to meet those challenges with confidence. </span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">As this report is published in spring 2020, the EU will be fully engaged in turning the European Green Deal into actions, making Europe fit for the digital age, working for social fairness and prosperity in an economy that works for people and preparing the Conference on the Future of Europe. These are just some of the raft of priorities and initiatives that will be described in the 2020 edition of the General Report.  </span></p><span data-dcnode-id="435" instrument_node="">
</span></div><span data-dcnode-id="433" instrument_node="">
</span><span data-dcnode-id="431" instrument_node="">

</span><p data-dcnode-id="371"><span data-dcnode-id="382" instrument_node="">You can download or order free and priced EU publications from: </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op.europa.eu/en/publications" target="_blank"><span class="hyperlink_text" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">https://op.europa.eu/en/publications</span></span></a><span data-dcnode-id="378" instrument_node=""> </span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">Multiple copies of free publications may be obtained by contacting Europe Direct or your local information centre (see </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europa.eu/european-union/contact_en" target="_blank"><span class="hyperlink_text" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">https://europa.eu/european-union/contact_en</span></span></a><span data-dcnode-id="372" instrument_node="">).</span></p><span data-dcnode-id="370" instrument_node="">

</span><p data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">For access to legal information from the EU, including all EU law since 1952 in all the official language versions, go to EUR-Lex at: </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/" target="_blank"><span class="hyperlink_text" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">https://eur-lex.europa.eu</span></span></a></p><span data-dcnode-id="361" instrument_node="">
</span><h3 data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Open data from the EU</span></h3><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="357" instrument_node="">The EU Open Data Portal (</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.europa.eu/euodp/en" target="_blank"><span class="hyperlink_text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">https://data.europa.eu/euodp/en</span></span></a><span data-dcnode-id="353" instrument_node="">) provides access to datasets from the EU. Data can be downloaded and reused for free, for both commercial and non-commercial purposes.</span></p><span data-dcnode-id="351" instrument_node="">
