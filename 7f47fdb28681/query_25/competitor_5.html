</span><h3 class="title-heading" data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Driving in the EU? Most don't need a permit</span></h3><span data-dcnode-id="2867" instrument_node="">
</span></div><span data-dcnode-id="2865" instrument_node="">
</span></div><span data-dcnode-id="2863" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2765"><span data-dcnode-id="2862" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2861" id="0782079883" style="visibility:hidden"></a><span data-dcnode-id="2860" instrument_node="">
</span><div class="richText component section default-style col-xs-12 analytics-richtext_630605773 richtext_630605773" data-dcnode-id="2794"><span data-dcnode-id="2859" instrument_node="">
</span><div class="component-content" data-dcnode-id="2796"><span data-dcnode-id="2858" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2798"><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Prior to Brexit, if you had a UK driving licence you could drive in the EU, Iceland, Liechtenstein, Norway and Switzerland without any extra documents.</span></p><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2853" instrument_node="">Prior to the trade deal being announced, the Government had warned international driving permits (IDP) could be widely required by Brits driving in the EU. However, the Department of Transport's now told us that </span><strong data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">in most cases you DON'T need an IDP </span></strong><span data-dcnode-id="2850" instrument_node="">to drive in the EU, Switzerland, Norway, Iceland or Liechtenstein.</span></p><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">The only scenarios where you may need an IDP are:&nbsp;</span></p><span data-dcnode-id="2845" instrument_node="">
</span><ul data-dcnode-id="2828"><span data-dcnode-id="2844" instrument_node="">
</span><li data-dcnode-id="2839"><span data-dcnode-id="2843" instrument_node="">If your </span><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">licence was issued in&nbsp;Gibraltar, Guernsey, Jersey or the Isle of Man</span></strong><span data-dcnode-id="2840" instrument_node="">. Here, you need to check with the embassy of the country you're planning to visit.&nbsp;&nbsp;</span></li><span data-dcnode-id="2838" instrument_node="">
</span><li data-dcnode-id="2830"><span data-dcnode-id="2837" instrument_node="">If you have a </span><strong data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">paper UK driving licence</span></strong><span data-dcnode-id="2834" instrument_node="">. Here, you'll also need to check with the embassy of the country concerned whether you need an IDP.</span><strong data-dcnode-id="2831"><br data-dcnode-id="2833"><span data-dcnode-id="2832" instrument_node=""> </span></strong></li><span data-dcnode-id="2829" instrument_node="">
</span></ul><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node="">If you do need an IDP, it costs £5.50 and it's possible you may need more than one – you can check which kind of permit is valid in which country on the&nbsp;</span><a data-dcnode-id="2824" data-link-id="govuk-website-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/driving-in-the-eu-after-brexit-international-driving-permits"><span data-dcnode-id="2825" instrument_node="">Gov.uk website</span></a><span data-dcnode-id="2823" instrument_node="">.</span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2817"><strong data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">You DON'T need a 'green card' if you're taking your own vehicle.&nbsp;</span></strong><span data-dcnode-id="2818" instrument_node="">A green card is&nbsp;an international certificate of insurance issued by insurance providers in the UK, guaranteeing that the motorist has the necessary minimum level of third-party cover.</span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">From 1 January until 1 August 2021, it was a requirement for UK drivers to show a green card when driving in the EU. But this has been scrapped as of 2 August – so you no longer need one.</span></p><span data-dcnode-id="2813" instrument_node="">
</span><h4 data-dcnode-id="2809"><span data-dcnode-id="2812" instrument_node="">UK citizen living in the EU? Exchange your licence NOW</span><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node=""> </span></h4><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2807" instrument_node="">If you're a&nbsp;UK&nbsp;licence holder living in the&nbsp;EU, the UK Government says you should&nbsp;exchange your&nbsp;UK driving licence for a local&nbsp;EU&nbsp;driving licence.&nbsp;The deadline for doing this depends on which country you live in.&nbsp;You may also need to retake your driving test depending on the country you're based in. </span><a data-dcnode-id="2805" data-link-id="see-govuk-for-full-country-by-country-info-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/driving-in-the-eu-from-1-january-2021-uk-licence-holders-living-in-the-eu" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2806" instrument_node="">See Gov.uk for full country-by-country info</span></a><span data-dcnode-id="2804" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">If you return to live in the&nbsp;UK, you'll be able to exchange your&nbsp;EU&nbsp;licence for a&nbsp;UK&nbsp;licence without taking another test, so long as you got your initial licence from passing a test in the UK. EU licences will continue to be exchanged even after the transition period, so there shouldn't be a rush to exchange them during the transition period in particular.</span></p><span data-dcnode-id="2799" instrument_node="">
</span></div><span data-dcnode-id="2797" instrument_node="">

</span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/tips/"><span data-dcnode-id="2673" instrument_node="">Past Emails</span></a><span data-dcnode-id="2671" instrument_node="">

</span><h2 class="chapter-title" data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Consumer rights and financial security</span></h2><span data-dcnode-id="2655" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="2310"><span data-dcnode-id="2654" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2653" id="0329225116" style="visibility:hidden"></a><span data-dcnode-id="2652" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_1460872786_" data-dcnode-id="2632"><span data-dcnode-id="2651" instrument_node="">
</span><div class="component-content" data-dcnode-id="2634"><span data-dcnode-id="2650" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2636"><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Much of the UK's financial services legislation comes from EU directives. These allow banks and other financial services firms to offer banking, saving or lending services across the EU without needing to be regulated by each individual country's financial regulator.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Some of the most important consumer rights laws in the UK&nbsp;– such as the Consumer Rights Act, which provides protection when you buy goods online and in store&nbsp;– are also based on EU directives.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2642" instrument_node="">Here's what Brexit means for these rules:</span><a data-dcnode-id="2641" data-link-id="-1" id="protection"></a><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node=""> </span></p><span data-dcnode-id="2637" instrument_node="">
</span></div><span data-dcnode-id="2635" instrument_node="">
</span></div><span data-dcnode-id="2633" instrument_node="">
</span></div><span data-dcnode-id="2631" instrument_node="">
</span><div class="needToKnow component numbered-need-to-know numberedList section default-style even last col-xs-12 analytics-needtoknow" data-dcnode-id="2312"><span data-dcnode-id="2630" instrument_node="">
</span><ol class="paragraphSystem content" data-dcnode-id="2314"><span data-dcnode-id="2629" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2628" id="0183517039" style="visibility:hidden"></a><span data-dcnode-id="2627" instrument_node="">
</span><li data-dcnode-id="2550"><a class="numbered-list-anchor" data-dcnode-id="2626" id="financial-1"></a><span data-dcnode-id="2625" instrument_node="">
</span><div class="numberedListItem component section first odd col-xs-12 analytics-numberedlistitem_135" data-dcnode-id="2552"><span data-dcnode-id="2624" instrument_node="">
</span><div data-dcnode-id="2616"><span data-dcnode-id="2623" instrument_node="">
</span><div class="component-content" data-dcnode-id="2618"><span data-dcnode-id="2622" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">You're still protected for up to £85,000 per person per financial institution with UK-regulated banks</span></h3><span data-dcnode-id="2619" instrument_node="">
</span></div><span data-dcnode-id="2617" instrument_node="">
</span></div><span data-dcnode-id="2615" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2554"><span data-dcnode-id="2614" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2613" id="224130197" style="visibility:hidden"></a><span data-dcnode-id="2612" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_520134469" data-dcnode-id="2583"><span data-dcnode-id="2611" instrument_node="">
</span><div class="component-content" data-dcnode-id="2585"><span data-dcnode-id="2610" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2587"><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node="">In the event a bank goes bust, the Financial Services Compensation Scheme means you are protected for up to £85,000 per person, per financial institution, provided that it is a UK-regulated bank. See </span><a data-dcnode-id="2606" data-link-id="are-your-savings-safe?-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/savings/safe-savings/" style="background-color: rgb(255, 255, 255);"><span data-dcnode-id="2607" instrument_node="">Are your savings safe?</span></a><span data-dcnode-id="2605" instrument_node=""> for more info. While much of the UK's financial services legislation comes from EU directives, the FSCS has continued post-Brexit, and will continue to apply.&nbsp;</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2602" instrument_node="">Almost all main savings accounts are UK-regulated, including the likes of </span><strong data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Santander </span></strong><span data-dcnode-id="2599" instrument_node="">(which has a Spanish parent company) and </span><strong data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">ICICI </span></strong><span data-dcnode-id="2596" instrument_node="">(which has an Indian parent company). And in the run-up to the UK leaving the EU, more foreign banks, such as </span><strong data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">RCI Bank</span></strong><span data-dcnode-id="2593" instrument_node=""> (which is French) have got UK banking licences.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">There is likely to be little change on this in future, regardless of Brexit.</span></p><span data-dcnode-id="2588" instrument_node="">
</span></div><span data-dcnode-id="2586" instrument_node="">
</span></div><span data-dcnode-id="2584" instrument_node="">
</span></div><span data-dcnode-id="2582" instrument_node="">
</span><div class="image component section default-style even last col-xs-12 analytics-image" data-dcnode-id="2556"><span data-dcnode-id="2581" instrument_node="">
</span><div class="component-content middle" data-dcnode-id="2558"><span data-dcnode-id="2580" instrument_node="">
</span><div class="analytics-image-tracking" data-dcnode-id="2579"></div><span data-dcnode-id="2578" instrument_node="">
</span><picture data-dcnode-id="2560"><span data-dcnode-id="2577" instrument_node="">
</span><span data-dcnode-id="2575" instrument_node="">

</span><li data-dcnode-id="2498"><a class="numbered-list-anchor" data-dcnode-id="2548" id="financial-2"></a><span data-dcnode-id="2547" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_599" data-dcnode-id="2500"><span data-dcnode-id="2546" instrument_node="">
</span><div data-dcnode-id="2538"><span data-dcnode-id="2545" instrument_node="">
</span><div class="component-content" data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">EU banks that operate in the UK can continue to do so for at least three years</span></h3><span data-dcnode-id="2541" instrument_node="">
</span></div><span data-dcnode-id="2539" instrument_node="">
</span></div><span data-dcnode-id="2537" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2502"><span data-dcnode-id="2536" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2535" id="1807295063" style="visibility:hidden"></a><span data-dcnode-id="2534" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2504"><span data-dcnode-id="2533" instrument_node="">
</span><div class="component-content" data-dcnode-id="2506"><span data-dcnode-id="2532" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2508"><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Firms authorised in the European Economic Area (the EU plus Iceland, Liechtenstein and Norway) can offer most of their services in the UK under a system known as 'passporting' – where a firm in one EU member state can provide services to customers in other member states without having to get direct authorisation in those other states.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2527" instrument_node="">It means that banks such as </span><strong data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Fidor Bank</span></strong><span data-dcnode-id="2524" instrument_node=""> – regulated by German regulators – are able to offer savings accounts to UK customers.</span><strong data-dcnode-id="2523"></strong></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">The Government is running a 'temporary permissions regime' after Brexit, which allows firms already in the UK to continue to operate for up to three years. This was already the case before the trade deal was agreed, and city regulator the Financial Conduct Authority has confirmed this will continue to be the case following the announcement of the trade deal.&nbsp;</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2517" instrument_node="">In the meantime, many EU-regulated banks are applying for UK licences, which mean that if you bank with them, your money will protected by the Financial Services Compensation Scheme (FSCS) – up to the value of £85,000 – in the unlikely event that the bank went bust. This is the same protection you get with a UK-based bank. Some overseas service providers, such as</span><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node=""> RCI Bank</span></strong><span data-dcnode-id="2514" instrument_node="">, have been given UK licences already. </span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">If your firm is part of the temporary permissions regime you'll be protected under the FSCS for now.&nbsp;You may need to confirm the firm is within the regime either via the FCA register or by contacting the firm directly.&nbsp;&nbsp;</span></p><span data-dcnode-id="2509" instrument_node="">
</span></div><span data-dcnode-id="2507" instrument_node="">
</span></div><span data-dcnode-id="2505" instrument_node="">
</span></div><span data-dcnode-id="2503" instrument_node="">
</span></div><span data-dcnode-id="2501" instrument_node="">
</span></div><span data-dcnode-id="2499" instrument_node=""> </span></li><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2448"><a class="numbered-list-anchor" data-dcnode-id="2496" id="financial-3"></a><span data-dcnode-id="2495" instrument_node="">
</span><div class="numberedListItem component section odd col-xs-12 analytics-numberedlistitem_480" data-dcnode-id="2450"><span data-dcnode-id="2494" instrument_node="">
</span><div data-dcnode-id="2486"><span data-dcnode-id="2493" instrument_node="">
</span><div class="component-content" data-dcnode-id="2488"><span data-dcnode-id="2492" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Your basic consumer rights haven't changed – but seeking redress from EU traders may be tougher</span></h3><span data-dcnode-id="2489" instrument_node="">
</span></div><span data-dcnode-id="2487" instrument_node="">
</span></div><span data-dcnode-id="2485" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2452"><span data-dcnode-id="2484" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2483" id="01406986386" style="visibility:hidden"></a><span data-dcnode-id="2482" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2454"><span data-dcnode-id="2481" instrument_node="">
</span><div class="component-content" data-dcnode-id="2456"><span data-dcnode-id="2480" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2458"><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Some of the most important consumer rights laws in the UK, such as the Consumer Rights Act which provides protection when you buy goods online and in store, are UK laws in their own right&nbsp;– so are unchanged by Brexit, even though some of their content is based on EU directives.&nbsp;The Consumer Contracts Regulations remain part of UK law and&nbsp;the 14 day cooling off period for items bought online remains as before.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2475" instrument_node="">However, if you're buying from a trader based in the EU post-Brexit, things may get a bit trickier.</span><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node=""> </span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">EU consumer protection legislation ensures consumers across the EU can buy goods and services from other EU countries, knowing that the protections and safety standards are the same or similar in every EU member state.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">For example, previously if a UK consumer bought an item from an EU-based trader and the item did not arrive or there is a problem, the UK consumer could use UK law and the UK courts for redress, and judgment was recognised in the EU member state in question.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2464" instrument_node="">The Government now says you need to contact&nbsp;</span><a data-dcnode-id="2462" data-link-id="uk-european-consumer-centre-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ukecc.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2463" instrument_node="">UK European Consumer Centre</span></a><span data-dcnode-id="2461" instrument_node="">&nbsp;for help with problems buying from an EU country.</span></p><span data-dcnode-id="2459" instrument_node="">
</span></div><span data-dcnode-id="2457" instrument_node="">
</span></div><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span></div><span data-dcnode-id="2451" instrument_node="">
</span></div><span data-dcnode-id="2449" instrument_node=""> </span></li><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2406"><a class="numbered-list-anchor" data-dcnode-id="2446" id="financial-4"></a><span data-dcnode-id="2445" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_990434766" data-dcnode-id="2408"><span data-dcnode-id="2444" instrument_node="">
</span><div data-dcnode-id="2436"><span data-dcnode-id="2443" instrument_node="">
</span><div class="component-content" data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Ordering an item from Europe online? You may be charged extra in tax and customs duty</span></h3><span data-dcnode-id="2439" instrument_node="">
</span></div><span data-dcnode-id="2437" instrument_node="">
</span></div><span data-dcnode-id="2435" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2410"><span data-dcnode-id="2434" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2433" id="0531153452" style="visibility:hidden"></a><span data-dcnode-id="2432" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2412"><span data-dcnode-id="2431" instrument_node="">
</span><div class="component-content" data-dcnode-id="2414"><span data-dcnode-id="2430" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2416"><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Before Brexit, Brits could generally buy items online from Europe at no extra cost (aside from delivery fees of course). And this remained the case until the end of 2020 during the Brexit transition period.</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">However, now, if you order items online from a company based in Europe, you may face extra charges&nbsp;– though what these will be depends on how big the total order is (not counting shipping and handling fees).</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2422" instrument_node="">You can read our </span><a data-dcnode-id="2420" data-link-id="buying-online-from-europe-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/shopping/buying-online-from-europe-post-brexit/"><span data-dcnode-id="2421" instrument_node="">Buying online from Europe</span></a><span data-dcnode-id="2419" instrument_node=""> guide for more details on this.</span></p><span data-dcnode-id="2417" instrument_node="">
</span></div><span data-dcnode-id="2415" instrument_node="">
</span></div><span data-dcnode-id="2413" instrument_node="">
</span></div><span data-dcnode-id="2411" instrument_node="">
</span></div><span data-dcnode-id="2409" instrument_node="">
</span></div><span data-dcnode-id="2407" instrument_node=""> </span></li><span data-dcnode-id="2405" instrument_node="">
</span><li data-dcnode-id="2369"><a class="numbered-list-anchor" data-dcnode-id="2404" id="financial-5"></a><span data-dcnode-id="2403" instrument_node="">
</span><div class="numberedListItem component section odd col-xs-12 analytics-numberedlistitem_253" data-dcnode-id="2371"><span data-dcnode-id="2402" instrument_node="">
</span><div data-dcnode-id="2394"><span data-dcnode-id="2401" instrument_node="">
</span><div class="component-content" data-dcnode-id="2396"><span data-dcnode-id="2400" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">The UK will remain part of a key euro payments system</span></h3><span data-dcnode-id="2397" instrument_node="">
</span></div><span data-dcnode-id="2395" instrument_node="">
</span></div><span data-dcnode-id="2393" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2373"><span data-dcnode-id="2392" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2391" id="1649060754" style="visibility:hidden"></a><span data-dcnode-id="2390" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2375"><span data-dcnode-id="2389" instrument_node="">
</span><div class="component-content" data-dcnode-id="2377"><span data-dcnode-id="2388" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2379"><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">UK-based payment service providers have access to central payments infrastructure such as the Single Euro Payments Area (SEPA), which allows customers to make cross-border payments at a low cost, or sometimes for free.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2383" instrument_node="">In March 2019, the UK's application to remain in the geographical scope of SEPA schemes was approved, meaning that euro SEPA payments can continue to be made through existing arrangements&nbsp;– and this isn't affected by the newly agreed trade deal.</span><a data-dcnode-id="2382" data-link-id="-1" id="#expataccounts"></a></p><span data-dcnode-id="2380" instrument_node="">
</span></div><span data-dcnode-id="2378" instrument_node="">
</span></div><span data-dcnode-id="2376" instrument_node="">
</span></div><span data-dcnode-id="2374" instrument_node="">
</span></div><span data-dcnode-id="2372" instrument_node="">
</span></div><span data-dcnode-id="2370" instrument_node=""> </span></li><span data-dcnode-id="2368" instrument_node="">
</span><li data-dcnode-id="2316"><a class="numbered-list-anchor" data-dcnode-id="2367" id="financial-6"></a><span data-dcnode-id="2366" instrument_node="">
</span><div class="numberedListItem component section even last col-xs-12 analytics-numberedlistitem" data-dcnode-id="2318"><span data-dcnode-id="2365" instrument_node="">
</span><div data-dcnode-id="2357"><span data-dcnode-id="2364" instrument_node="">
</span><div class="component-content" data-dcnode-id="2359"><span data-dcnode-id="2363" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">UK banks are shutting thousands of British expats' accounts due to Brexit</span></h3><span data-dcnode-id="2360" instrument_node="">
</span></div><span data-dcnode-id="2358" instrument_node="">
</span></div><span data-dcnode-id="2356" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2320"><span data-dcnode-id="2355" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2354" id="667369089" style="visibility:hidden"></a><span data-dcnode-id="2353" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2322"><span data-dcnode-id="2352" instrument_node="">
</span><div class="component-content" data-dcnode-id="2324"><span data-dcnode-id="2351" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2326"><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Thousands of Brits living abroad in Europe were told late last year that their UK bank accounts or credit cards would be closed as a result of Brexit. That's because so-called 'passporting' arrangements came to an end on 31 December 2020, although UK banks can still operate abroad after this date if they meet the separate laws and regulations required by individual countries.&nbsp;&nbsp;</span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2337"><strong data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Lloyds</span></strong><span data-dcnode-id="2344" instrument_node="">, </span><strong data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Halifax </span></strong><span data-dcnode-id="2341" instrument_node="">and </span><strong data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Barclaycard </span></strong><span data-dcnode-id="2338" instrument_node="">are among the big names that have told customers that due to rule changes linked to Brexit they will be closing accounts&nbsp;– though the situation may depend on which European country you live in. Many other banks have refused to rule out closing accounts, saying they're closely monitoring the situation.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2335" instrument_node="">If your account is being closed, you may still be able to open another with a different UK bank or to use a local bank instead. See our </span><a data-dcnode-id="2333" data-link-id="more-uk-banks-to-shut-british-expat-accounts-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2020/11/eu-bank-accounts-closed-brexit/"><span data-dcnode-id="2334" instrument_node="">More UK banks to shut British expat accounts</span></a><span data-dcnode-id="2332" instrument_node="">&nbsp;MSE News story for full help and the latest on who's doing what.&nbsp;</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">The major banks we spoke to all told us account closures would go ahead regardless of whether the UK reached a deal with the EU. Now that we have a deal, Barclaycard, Halifax and Lloyds have confirmed their positions on closing accounts remain the same.&nbsp;</span></p><span data-dcnode-id="2327" instrument_node="">
</span></div><span data-dcnode-id="2325" instrument_node="">
</span></div><span data-dcnode-id="2323" instrument_node="">
</span></div><span data-dcnode-id="2321" instrument_node="">
</span></div><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node=""> </span></li><span data-dcnode-id="2315" instrument_node="">
</span></ol><span data-dcnode-id="2313" instrument_node="">
</span></div><span data-dcnode-id="2311" instrument_node="">
</span></div><span data-dcnode-id="2309" instrument_node="">
</span></div><span data-dcnode-id="2307" instrument_node="">
</span></div><span data-dcnode-id="2305" instrument_node="">
</span><div class="chapter component section default-style even col-xs-12 analytics-chapter_copy_copy_59_1497218664" data-dcnode-id="1914"><span data-dcnode-id="2304" instrument_node="">
</span><div class="chapter-content col-xs-12" data-dcnode-id="1916" id="eu"><span data-dcnode-id="2303" instrument_node="">
</span><h2 class="chapter-title" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">What is the impact on EU citizens living in the UK?</span></h2><span data-dcnode-id="2300" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="1918"><span data-dcnode-id="2299" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2298" id="875617468" style="visibility:hidden"></a><span data-dcnode-id="2297" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_933117836_c" data-dcnode-id="2283"><span data-dcnode-id="2296" instrument_node="">
</span><div class="component-content" data-dcnode-id="2285"><span data-dcnode-id="2295" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2287"><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">While Brexit affects everyone in the UK, the most immediate direct impact is on the 3+ million people living here who are citizens of other EU countries.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">If you're one of them, here's what you need to know:</span></p><span data-dcnode-id="2288" instrument_node="">
</span></div><span data-dcnode-id="2286" instrument_node="">
</span></div><span data-dcnode-id="2284" instrument_node="">
</span></div><span data-dcnode-id="2282" instrument_node="">
</span><div class="needToKnow component numbered-need-to-know numberedList section default-style even last col-xs-12 analytics-needtoknow" data-dcnode-id="1920"><span data-dcnode-id="2281" instrument_node="">
</span><ol class="paragraphSystem content" data-dcnode-id="1922"><span data-dcnode-id="2280" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2279" id="0391446215" style="visibility:hidden"></a><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2049"><a class="numbered-list-anchor" data-dcnode-id="2277" id="citizens-1"></a><span data-dcnode-id="2276" instrument_node="">
</span><div class="numberedListItem component section first odd col-xs-12 analytics-numberedlistitem_133" data-dcnode-id="2051"><span data-dcnode-id="2275" instrument_node="">
</span><div data-dcnode-id="2267"><span data-dcnode-id="2274" instrument_node="">
</span><div class="component-content" data-dcnode-id="2269"><span data-dcnode-id="2273" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Check URGENTLY if you need to apply to the EU Settlement Scheme</span></h3><span data-dcnode-id="2270" instrument_node="">
</span></div><span data-dcnode-id="2268" instrument_node="">
</span></div><span data-dcnode-id="2266" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2053"><span data-dcnode-id="2265" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2264" id="1464891115" style="visibility:hidden"></a><span data-dcnode-id="2263" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_189413297" data-dcnode-id="2140"><span data-dcnode-id="2262" instrument_node="">
</span><div class="component-content" data-dcnode-id="2142"><span data-dcnode-id="2261" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2144"><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">If you're a European Economic Area or Swiss citizen living in Britain and you arrived on or before 31 December 2020, you won't have to leave the UK because we've left the EU. But you and your family may have to register with the EU Settlement Scheme to continue living in the UK.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2251" style="text-align: center;"><strong data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">Most can still&nbsp;</span><a data-dcnode-id="2254" data-link-id="apply-online-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families/applying-for-settled-status" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2255" instrument_node="">apply online</span></a><span data-dcnode-id="2253" instrument_node="">&nbsp;for FREE via the Gov.uk website.</span></strong></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2238" style="text-align: left;"><span data-dcnode-id="2249" instrument_node="">The official deadline to do this was 30 June 2021. However, you can still apply if you had "reasonable grounds" for missing the deadline (for a list of examples, see the </span><a data-dcnode-id="2247" data-link-id="govuk-website-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families/eligibility" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2248" instrument_node="">Gov.uk website</span></a><span data-dcnode-id="2246" instrument_node="">.) It's best to do this as soon as possible.</span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node=""> </span><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node=""> Full details on what you'll need to apply can be found </span><a data-dcnode-id="2240" data-link-id="on-govuk-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families"><span data-dcnode-id="2241" instrument_node="">on Gov.uk</span></a><span data-dcnode-id="2239" instrument_node="">, but in brief, you'll need information such as proof of identity and proof of residence in the UK. If your application is not successful, you won't be able to stay in the UK&nbsp;– although you can appeal against a decision and reapply.</span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Provided you lodge an application, all the existing rights you have to work and access housing, benefits and services should be protected until the application is decided.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2233" instrument_node="">You don't need to do anything else or let any other organisations know. But you're likely to be asked to prove your 'settled' or 'pre-settled' status (for more on this, see below), once it's confirmed, if&nbsp;you're renting a </span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">new</span></em><span data-dcnode-id="2230" instrument_node=""> place, applying for </span><em data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">new</span></em><span data-dcnode-id="2227" instrument_node=""> benefits or starting a </span><em data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">new </span></em><span data-dcnode-id="2224" instrument_node="">job, for example. You can prove your status via Gov.uk.&nbsp;&nbsp;</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2213"><span class="warning-selection-style" data-dcnode-id="2219"><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">WARNING:</span></strong></span><span data-dcnode-id="2218" instrument_node=""> </span><strong data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">If you claim Tax-Free Childcare you may face delays</span></strong><br data-dcnode-id="2215"><span data-dcnode-id="2214" instrument_node=""> </span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">HM Revenue &amp; Customs (HMRC) has, however, recently confirmed that European nationals living in the UK may face delays receiving Tax-Free Childcare, specifically when they apply for the first time or reconfirm their eligibility.&nbsp;</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">An HMRC spokesperson said: "We have to check their immigration status to ensure they have the right to access public funds. The vast majority of these checks occur automatically, but a small proportion require manual checking.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">"The increase in customers whose immigration status needs checking has grown because, since the start of July, this has also included EU citizens. Their applications or reconfirmations have required manual checks, correspondingly resulting in temporary delays to their being able to access Tax-Free Childcare top-ups.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">“We apologise to those affected and are working through their cases as quickly as possible.”</span></p><span data-dcnode-id="2200" instrument_node="">
</span><h4 data-dcnode-id="2196"><span data-dcnode-id="2199" instrument_node="">What having 'settled' or 'pre-settled' status means</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node=""> </span></h4><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">If your application is successful, you'll be given one of two statuses:</span></p><span data-dcnode-id="2192" instrument_node="">
</span><ul data-dcnode-id="2176"><span data-dcnode-id="2191" instrument_node="">
</span><li data-dcnode-id="2183"><strong data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Settled status</span></strong><span data-dcnode-id="2188" instrument_node=""> will be given to successful applicants who, by the time they apply, have been living in the UK for at least five years.</span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node=""> </span><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node=""> </span></li><span data-dcnode-id="2182" instrument_node="">
</span><li data-dcnode-id="2178"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Pre-settled status</span></strong><span data-dcnode-id="2179" instrument_node=""> will be given to successful applicants who won't have lived in the UK for five years by the time they apply.</span></li><span data-dcnode-id="2177" instrument_node="">
</span></ul><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Having settled or pre-settled status means you can:</span></p><span data-dcnode-id="2172" instrument_node="">
</span><ul data-dcnode-id="2152"><span data-dcnode-id="2171" instrument_node="">
</span><li data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Work in the UK</span></li><span data-dcnode-id="2168" instrument_node="">
</span><li data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Use the NHS for free</span></li><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Enrol in education or study in the UK</span></li><span data-dcnode-id="2162" instrument_node="">
</span><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Rent private housing</span></li><span data-dcnode-id="2159" instrument_node="">
</span><li data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Access benefits and pensions, if you qualify for them (but those with pre-settled status may need to show they have an additional 'right to reside' for some benefits)</span></li><span data-dcnode-id="2156" instrument_node="">
</span><li data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Travel in and out of the UK</span></li><span data-dcnode-id="2153" instrument_node="">
</span></ul><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">If you haven't yet applied, and you have no other right to stay in the UK, you will technically have been left without lawful status from 1 July 2021 – so it's best to&nbsp;</span><a data-dcnode-id="2148" data-link-id="apply-online-4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/settled-status-eu-citizens-families/applying-for-settled-status" rel="noopener noreferrer" style="background-color: rgb(255, 255, 255);" target="_blank"><span data-dcnode-id="2149" instrument_node="">apply online</span></a><span data-dcnode-id="2147" instrument_node=""> as soon as possible.</span></p><span data-dcnode-id="2145" instrument_node="">
</span></div><span data-dcnode-id="2143" instrument_node="">
</span></div><span data-dcnode-id="2141" instrument_node="">
</span></div><span data-dcnode-id="2139" instrument_node="">
</span><div class="accordion component section default-style even last col-xs-12 analytics-accordion_copy_13247 initialized" data-dcnode-id="2055"><span data-dcnode-id="2138" instrument_node="">
</span><div class="component-content" data-dcnode-id="2057"><span data-dcnode-id="2137" instrument_node="">
</span><ul class="accordion-container" data-dcnode-id="2059"><span data-dcnode-id="2136" instrument_node="">
</span><li class="accordion-slide first last odd" data-dcnode-id="2061"><span data-dcnode-id="2135" instrument_node="">
</span><header class="accordion-head" data-dcnode-id="2124"><span data-dcnode-id="2134" instrument_node="">
</span><h3 class="accordion-title component" data-dcnode-id="2126"><span data-dcnode-id="2133" instrument_node=""> </span><a class="accordion-title-link" data-dcnode-id="2128" href="#accordion-content-466155396-0" role="button" title="What's the difference between 'settled' and 'pre-settled' status?"><span data-dcnode-id="2132" instrument_node=""> </span><span class="accordion-title-text" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">What's the difference between 'settled' and 'pre-settled' status?</span></span><span data-dcnode-id="2129" instrument_node=""> </span></a><span data-dcnode-id="2127" instrument_node=""> </span></h3><span data-dcnode-id="2125" instrument_node="">
</span></header><span data-dcnode-id="2123" instrument_node="">
</span><div class="accordion-content-wrapper" data-dcnode-id="2063" id="accordion-content-466155396-0"><span data-dcnode-id="2122" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="2065"><span data-dcnode-id="2121" instrument_node="">
</span><div class="paragraphSystem item0 content" data-dcnode-id="2067"><span data-dcnode-id="2120" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2119" id="1475044536" style="visibility:hidden"></a><span data-dcnode-id="2118" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext_110321338" data-dcnode-id="2069"><span data-dcnode-id="2117" instrument_node="">
</span><div class="component-content" data-dcnode-id="2071"><span data-dcnode-id="2116" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2073"><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">As set out above, settled and pre-settled status give many of the same rights – but there are some differences.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2111" instrument_node="">If you get&nbsp;</span><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">pre-settled status</span></strong><span data-dcnode-id="2108" instrument_node="">, you can:</span></p><span data-dcnode-id="2106" instrument_node="">
</span><ul data-dcnode-id="2095"><span data-dcnode-id="2105" instrument_node="">
</span><li data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Stay in the UK for a further five years from the date you get pre-settled status.</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Apply for settled status as soon as you've lived in the UK for five years and spent at least six months of each year in the UK. You will not need to pay a fee.</span></li><span data-dcnode-id="2099" instrument_node="">
</span><li data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Spend up to two years in a row outside the UK without losing your pre-settled status.</span></li><span data-dcnode-id="2096" instrument_node="">
</span></ul><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2093" instrument_node="">If you get&nbsp;</span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">settled status</span></strong><span data-dcnode-id="2090" instrument_node="">, you can:</span><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node=""> &nbsp;</span></p><span data-dcnode-id="2086" instrument_node="">
</span><ul data-dcnode-id="2075"><span data-dcnode-id="2085" instrument_node="">
</span><li data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Stay in the UK for as long as you like.</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Apply for British citizenship&nbsp;if you meet the requirements.</span></li><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Spend up to five years in a row outside the UK without losing your settled status.</span></li><span data-dcnode-id="2076" instrument_node="">
</span></ul><span data-dcnode-id="2074" instrument_node="">
</span></div><span data-dcnode-id="2072" instrument_node="">
</span></div><span data-dcnode-id="2070" instrument_node="">
</span></div><span data-dcnode-id="2068" instrument_node="">
</span></div><span data-dcnode-id="2066" instrument_node="">
</span></div><span data-dcnode-id="2064" instrument_node="">
</span></div><span data-dcnode-id="2062" instrument_node=""> </span></li><span data-dcnode-id="2060" instrument_node="">
</span></ul><span data-dcnode-id="2058" instrument_node="">
</span></div><span data-dcnode-id="2056" instrument_node="">
</span></div><span data-dcnode-id="2054" instrument_node="">
</span></div><span data-dcnode-id="2052" instrument_node="">
</span></div><span data-dcnode-id="2050" instrument_node=""> </span></li><span data-dcnode-id="2048" instrument_node="">
</span><li data-dcnode-id="2010"><a class="numbered-list-anchor" data-dcnode-id="2047" id="citizens-2"></a><span data-dcnode-id="2046" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_cop" data-dcnode-id="2012"><span data-dcnode-id="2045" instrument_node="">
</span><div data-dcnode-id="2037"><span data-dcnode-id="2044" instrument_node="">
</span><div class="component-content" data-dcnode-id="2039"><span data-dcnode-id="2043" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Most EU citizens now need a passport to travel to the UK</span></h3><span data-dcnode-id="2040" instrument_node="">
</span></div><span data-dcnode-id="2038" instrument_node="">
</span></div><span data-dcnode-id="2036" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2014"><span data-dcnode-id="2035" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2034" id="25188126" style="visibility:hidden"></a><span data-dcnode-id="2033" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="2016"><span data-dcnode-id="2032" instrument_node="">
</span><div class="component-content" data-dcnode-id="2018"><span data-dcnode-id="2031" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2020"><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">As of 1 October 2021, most citizens of the EU (there are some exceptions) without settled or pre-settled status – as well as some citizens of Iceland, Liechtenstein, Norway and Switzerland – will need a valid passport to enter the UK, as the Government has stopped accepting national identity (ID) cards as travel documents.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2026" instrument_node="">However, if you do have settled or pre-settled status under the EU Settlement Scheme (or have equivalent rights), you'll be able to continue using your ID card to enter the UK until at least 2025. More information about travelling to the UK as an EU citizen is available </span><a data-dcnode-id="2024" data-link-id="at-govuk-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/visiting-the-uk-as-an-eu-eea-or-swiss-citizen" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2025" instrument_node="">at Gov.uk</span></a><span data-dcnode-id="2023" instrument_node="">.</span></p><span data-dcnode-id="2021" instrument_node="">
</span></div><span data-dcnode-id="2019" instrument_node="">
</span></div><span data-dcnode-id="2017" instrument_node="">
</span></div><span data-dcnode-id="2015" instrument_node="">
</span></div><span data-dcnode-id="2013" instrument_node="">
</span></div><span data-dcnode-id="2011" instrument_node=""> </span></li><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="1924"><a class="numbered-list-anchor" data-dcnode-id="2008" id="citizens-3"></a><span data-dcnode-id="2007" instrument_node="">
</span><div class="numberedListItem component section odd last col-xs-12 analytics-numberedlistitem" data-dcnode-id="1926"><span data-dcnode-id="2006" instrument_node="">
</span><div data-dcnode-id="1998"><span data-dcnode-id="2005" instrument_node="">
</span><div class="component-content" data-dcnode-id="2000"><span data-dcnode-id="2004" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">There are extra rules if you're overseas, are the family member of someone living in the UK and want to come to or return to the UK</span></h3><span data-dcnode-id="2001" instrument_node="">
</span></div><span data-dcnode-id="1999" instrument_node="">
</span></div><span data-dcnode-id="1997" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="1928"><span data-dcnode-id="1996" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="1995" id="1945275097" style="visibility:hidden"></a><span data-dcnode-id="1994" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="1930"><span data-dcnode-id="1993" instrument_node="">
</span><div class="component-content" data-dcnode-id="1932"><span data-dcnode-id="1992" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1934"><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">If you're an EU citizen who currently lives outside the UK, but you have a family member living in the UK and want to come to the UK to live, there are extra rules to consider:</span></p><span data-dcnode-id="1988" instrument_node="">
</span><ul data-dcnode-id="1936"><span data-dcnode-id="1987" instrument_node="">
</span><li data-dcnode-id="1966"><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">If you're overseas and a family member of a European Economic Area or Swiss citizen living in the UK</span></strong><span data-dcnode-id="1984" instrument_node="">,</span><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1981" instrument_node="">the deadline for you to join your family member in the UK was 31 December 2020 (or 31 December 2025 if your partner is Swiss and you get married or form a civil partnership after 31 December 2020).</span><br data-dcnode-id="1980"><span data-dcnode-id="1979" instrument_node=""> </span><br data-dcnode-id="1978"><span data-dcnode-id="1977" instrument_node=""> If you're not living in the UK by the deadline, you'll still be able to apply for settled or pre-settled status if all of the following are true:</span><br data-dcnode-id="1976"><span data-dcnode-id="1975" instrument_node=""> - Your family member has settled or pre-settled status.</span><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node=""> - Your relationship began before 31 December 2020.</span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node=""> - You remain a close family member, for example a spouse, civil partner, unmarried partner, a dependent child or grandchild, or a dependent parent or grandparent.</span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node=""> </span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node=""> </span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1938"><strong data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">If your family member is a British citizen</span></strong><span data-dcnode-id="1962" instrument_node="">,</span><strong data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1959" instrument_node="">the deadline for you to return to the UK depends on your relationship with the family member. You have until 29 March 2022 to return and apply if you're:</span><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node=""> </span><br data-dcnode-id="1956"><span data-dcnode-id="1955" instrument_node=""> - Their spouse, civil partner or unmarried partner and your relationship started before 1 February 2020.</span><br data-dcnode-id="1954"><span data-dcnode-id="1953" instrument_node=""> - Under 21 years old, and are their child or grandchild.</span><br data-dcnode-id="1952"><span data-dcnode-id="1951" instrument_node=""> - Aged 21 or older, and are their dependent child or grandchild.</span><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node=""> - Their dependent parent or grandparent.</span><br data-dcnode-id="1948"><span data-dcnode-id="1947" instrument_node=""> </span><br data-dcnode-id="1946"><span data-dcnode-id="1945" instrument_node=""> You must have returned by 31 December 2020, and apply by 11.59pm on Wednesday 30 June, if you're:</span><br data-dcnode-id="1944"><span data-dcnode-id="1943" instrument_node=""> </span><br data-dcnode-id="1942"><span data-dcnode-id="1941" instrument_node=""> - Their spouse, civil partner or unmarried partner and your relationship started on or after 1 February 2020.</span><br data-dcnode-id="1940"><span data-dcnode-id="1939" instrument_node=""> - Another dependent relative.</span></li><span data-dcnode-id="1937" instrument_node="">
</span></ul><span data-dcnode-id="1935" instrument_node="">
</span></div><span data-dcnode-id="1933" instrument_node="">
</span></div><span data-dcnode-id="1931" instrument_node="">
</span></div><span data-dcnode-id="1929" instrument_node="">
</span></div><span data-dcnode-id="1927" instrument_node="">
</span></div><span data-dcnode-id="1925" instrument_node=""> </span></li><span data-dcnode-id="1923" instrument_node="">
</span></ol><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span></div><span data-dcnode-id="1917" instrument_node="">
</span></div><span data-dcnode-id="1915" instrument_node="">
</span></div><span data-dcnode-id="1913" instrument_node="">
</span><div class="chapter component section default-style odd col-xs-12 analytics-chapter_copy_copy" data-dcnode-id="1597"><span data-dcnode-id="1912" instrument_node="">
</span><div class="chapter-content col-xs-12" data-dcnode-id="1599" id="intheeu1"><span data-dcnode-id="1911" instrument_node="">
</span><h2 class="chapter-title" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">What will the impact on UK citizens living or studying in the EU be?</span></h2><span data-dcnode-id="1908" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="1601"><span data-dcnode-id="1907" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="1906" id="444208900" style="visibility:hidden"></a><span data-dcnode-id="1905" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_1648481450_" data-dcnode-id="1891"><span data-dcnode-id="1904" instrument_node="">
</span><div class="component-content" data-dcnode-id="1893"><span data-dcnode-id="1903" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1895"><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Before Brexit, all UK citizens were also EU citizens, which meant they could go live and work anywhere in the European Union&nbsp;– from Seville to Stockholm&nbsp;– without needing to apply for a visa.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">If you do live abroad, here's what you now need to know:</span></p><span data-dcnode-id="1896" instrument_node="">
</span></div><span data-dcnode-id="1894" instrument_node="">
</span></div><span data-dcnode-id="1892" instrument_node="">
</span></div><span data-dcnode-id="1890" instrument_node="">
</span><div class="needToKnow component numbered-need-to-know numberedList section default-style even col-xs-12 analytics-needtoknow" data-dcnode-id="1661"><span data-dcnode-id="1889" instrument_node="">
</span><ol class="paragraphSystem content" data-dcnode-id="1663"><span data-dcnode-id="1888" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="1887" id="869782001" style="visibility:hidden"></a><span data-dcnode-id="1886" instrument_node="">
</span><li data-dcnode-id="1745"><a class="numbered-list-anchor" data-dcnode-id="1885" id="uk-1"></a><span data-dcnode-id="1884" instrument_node="">
</span><div class="numberedListItem component section first odd col-xs-12 analytics-numberedlistitem_105" data-dcnode-id="1747"><span data-dcnode-id="1883" instrument_node="">
</span><div data-dcnode-id="1875"><span data-dcnode-id="1882" instrument_node="">
</span><div class="component-content" data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">If you were living in an EU country by 31 December 2020, check URGENTLY whether you need to apply for a permit</span></h3><span data-dcnode-id="1878" instrument_node="">
</span></div><span data-dcnode-id="1876" instrument_node="">
</span></div><span data-dcnode-id="1874" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="1749"><span data-dcnode-id="1873" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="1872" id="2128448472" style="visibility:hidden"></a><span data-dcnode-id="1871" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_1531765999" data-dcnode-id="1806"><span data-dcnode-id="1870" instrument_node="">
</span><div class="component-content" data-dcnode-id="1808"><span data-dcnode-id="1869" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1810"><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">If you were a UK national lawfully residing in another EU country by 31 December 2020, you should be able to stay. However, crucially, depending on the individual country's rules, you may have to apply for a residence permit by a specific date – if you don't, you could face losing your rights to live there.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">That's because European countries have taken one of two approaches to protecting citizens' rights after Brexit:</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1858"><strong data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">1. Formal application needed to secure residency status.</span></strong><span data-dcnode-id="1859" instrument_node="">&nbsp;Here, generally speaking, you MUST apply for a permit or risk losing your right to live in the relevant country.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">You'll typically need to submit documents such as your passport and proof you were lawfully resident in the country before the end of the Brexit transition period on 31 December 2020.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1853" instrument_node="">This is the case for UK nationals living in&nbsp;</span><strong data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">France</span></strong><span data-dcnode-id="1850" instrument_node="">&nbsp;and the&nbsp;</span><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Netherlands</span></strong><span data-dcnode-id="1847" instrument_node="">&nbsp;– see more info on the&nbsp;</span><a data-dcnode-id="1845" data-link-id="france-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brexit.gouv.fr/sites/brexit/accueil/vous-etes-britannique-en/droit-au-sejour-en.html"><span data-dcnode-id="1846" instrument_node="">France</span></a><span data-dcnode-id="1844" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="1842" data-link-id="netherlands-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ind.nl/en/Pages/Brexit-%28UK-Withdrawal-Agreement%29.aspx"><span data-dcnode-id="1843" instrument_node="">Netherlands</span></a><span data-dcnode-id="1841" instrument_node="">&nbsp;government websites. It also applies for those in&nbsp;Austria, Belgium, Denmark, Finland, Hungary, Latvia, Luxembourg, Malta, Romania,&nbsp;Slovenia and Sweden.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1834"><strong data-dcnode-id="1836"><span class="warning-selection-style" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Important: </span></span></strong><span data-dcnode-id="1835" instrument_node="">The deadlines for applications vary by country and some may have passed already – so if you're a British citizen living in one of these countries, check urgently with the local authorities what you need to do to protect your rights.&nbsp;</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1826"><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">2. Residency status granted automatically. </span></strong><span data-dcnode-id="1830" instrument_node="">Here,&nbsp;</span><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">in theory</span></em><span data-dcnode-id="1827" instrument_node=""> you don't need to apply to keep your rights. But in practice, it's likely to be worth doing anyway as it means you'll get a document proving your status. Plus, even where you don't have to lodge a formal application, you may still have to take other action such as notifying the authorities of your residence – so check with the authorities where you live to be sure.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1812"><strong data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Germany </span></strong><span data-dcnode-id="1822" instrument_node="">and</span><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node=""> Spain</span></strong><span data-dcnode-id="1819" instrument_node="">&nbsp;are among the countries operating this second kind of system – see the </span><a data-dcnode-id="1817" data-link-id="german-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bmi.bund.de/SharedDocs/faqs/EN/topics/constitution/brexit/faqs-brexit.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1818" instrument_node="">German</span></a><span data-dcnode-id="1816" instrument_node=""> and </span><a data-dcnode-id="1814" data-link-id="spanish-4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusion.gob.es/en/brexit/residencia/br_derechoresidir/index.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1815" instrument_node="">Spanish</span></a><span data-dcnode-id="1813" instrument_node=""> government websites for full info. The other countries are:&nbsp;Bulgaria, Croatia, Cyprus, Czechia, Estonia, Greece, Italy, Lithuania, Poland, Portugal, Slovakia.</span></p><span data-dcnode-id="1811" instrument_node="">
</span></div><span data-dcnode-id="1809" instrument_node="">
</span></div><span data-dcnode-id="1807" instrument_node="">
</span></div><span data-dcnode-id="1805" instrument_node="">
</span><div class="richText component section default-style even last col-xs-12 analytics-richtext_584016648" data-dcnode-id="1751"><span data-dcnode-id="1804" instrument_node="">
</span><div class="component-content" data-dcnode-id="1753"><span data-dcnode-id="1803" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1755"><span data-dcnode-id="1802" instrument_node="">
</span><h4 data-dcnode-id="1798"><span data-dcnode-id="1801" instrument_node="">What else do UK citizens living in the EU need to know?</span><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node=""> </span></h4><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Here are some other points to bear in mind:</span></p><span data-dcnode-id="1794" instrument_node="">
</span><ul data-dcnode-id="1767"><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1785"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">If you didn't live in an EU country before 1 January 2021 </span></strong><span data-dcnode-id="1790" instrument_node="">you won't be able to apply for official residency status under the Withdrawal Agreement provisions. Instead you'll need to comply with the country's own immigration rules.</span><br data-dcnode-id="1789"><span data-dcnode-id="1788" instrument_node=""> </span><br data-dcnode-id="1787"><span data-dcnode-id="1786" instrument_node=""> </span></li><span data-dcnode-id="1784" instrument_node="">
</span><li data-dcnode-id="1776"><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">As a tourist, you can only visit most EU countries for up to 90 days in a 180 day period.&nbsp;</span></strong><span data-dcnode-id="1781" instrument_node="">Slightly different rules apply to Bulgaria, Croatia, Cyprus and Romania, though. If you visit these countries, visits to other EU countries will not count towards the 90-day total.</span><br data-dcnode-id="1780"><span data-dcnode-id="1779" instrument_node=""> </span><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node=""> </span></li><span data-dcnode-id="1775" instrument_node="">
</span><li data-dcnode-id="1769"><strong data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">If you have a property overseas, that doesn't automatically make you a resident</span></strong><span data-dcnode-id="1772" instrument_node="">, so if you don't qualify for residency the usual rules for tourists apply as above. This means you can stay for up to 90 days in a 180 day period&nbsp;– so you could stay for three months in the summer and then another three months in the winter. Again, slightly different rules will apply to Bulgaria, Croatia, Cyprus and Romania, though. If you visit these countries, visits to other EU countries will not count towards the 90-day total.</span><br data-dcnode-id="1771"><span data-dcnode-id="1770" instrument_node=""> </span></li><span data-dcnode-id="1768" instrument_node="">
</span></ul><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1765" instrument_node="">For full information you'll need to go to the government of the EU country that you live in or plan to live in, though there are more details&nbsp;</span><a data-dcnode-id="1763" data-link-id="on-govuk-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//protect-eu.mimecast.com/s/NN_KCY6k6I3PMyqf0EjY9%3Fdomain%3Dgov.uk" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1764" instrument_node="">on Gov.uk</span></a><span data-dcnode-id="1762" instrument_node="">, including&nbsp;</span><a data-dcnode-id="1760" data-link-id="living-in-guides-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//protect-eu.mimecast.com/s/IkkRCZ4l4hMylWLSjrdEw%3Fdomain%3Dgov.uk" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1761" instrument_node="">Living In Guides</span></a><span data-dcnode-id="1759" instrument_node="">.</span><a data-dcnode-id="1758" data-link-id="-3" id="passportsblue"></a></p><span data-dcnode-id="1756" instrument_node="">
</span></div><span data-dcnode-id="1754" instrument_node="">
</span></div><span data-dcnode-id="1752" instrument_node="">
</span></div><span data-dcnode-id="1750" instrument_node="">
</span></div><span data-dcnode-id="1748" instrument_node="">
</span></div><span data-dcnode-id="1746" instrument_node=""> </span></li><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1665"><a class="numbered-list-anchor" data-dcnode-id="1743" id="uk-2"></a><span data-dcnode-id="1742" instrument_node="">
</span><div class="numberedListItem component section even last col-xs-12 analytics-numberedlistitem_163" data-dcnode-id="1667"><span data-dcnode-id="1741" instrument_node="">
</span><div data-dcnode-id="1733"><span data-dcnode-id="1740" instrument_node="">
</span><div class="component-content" data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Planning to study abroad? The UK's left the Erasmus scheme</span></h3><span data-dcnode-id="1736" instrument_node="">
</span></div><span data-dcnode-id="1734" instrument_node="">
</span></div><span data-dcnode-id="1732" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="1669"><span data-dcnode-id="1731" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="1730" id="269309072" style="visibility:hidden"></a><span data-dcnode-id="1729" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd col-xs-12 col-lg-12 analytics-richtext_1203206921" data-dcnode-id="1695"><span data-dcnode-id="1728" instrument_node="">
</span><div class="component-content" data-dcnode-id="1697"><span data-dcnode-id="1727" instrument_node="">
</span><picture data-dcnode-id="1708"><span data-dcnode-id="1726" instrument_node="">
</span><source data-dcnode-id="1724" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flag.png.rendition.320.320.png" media="(min-width: 0px) and (max-width: 319px)"><span data-dcnode-id="1723" instrument_node="">

</span><source data-dcnode-id="1718" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flag.png.rendition.768.768.png" media="(min-width: 768px) and (max-width: 1199px)"><span data-dcnode-id="1717" instrument_node="">

&lt;img src="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flag.png.rendition.320.320.png" class="richText-image pull-right " alt="" /&gt;
</span></noscript><span data-dcnode-id="1709" instrument_node="">
</span></picture><span data-dcnode-id="1707" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1699"><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Erasmus+ is a programme for education, training, youth and sport. The best-known aspect of it is the university exchange programme, which allows students from the UK to study at European institutions for a year during their degree.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Students who qualify receive an Erasmus+ grant provided by the European Commission&nbsp;– this is paid through your institution. This grant contributes towards the extra costs you may encounter from studying abroad.</span></p><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span></div><span data-dcnode-id="1696" instrument_node="">
</span></div><span data-dcnode-id="1694" instrument_node="">
</span><div class="richText component section default-style even last col-xs-12 analytics-richtext" data-dcnode-id="1671"><span data-dcnode-id="1693" instrument_node="">
</span><div class="component-content" data-dcnode-id="1673"><span data-dcnode-id="1692" instrument_node="">
</span><div class="richText-content" data-dcnode-id="1675"><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">If you were awarded funding for the Erasmus+ scheme by 31 December 2020 then you'll be able to participate fully for the duration of your exchange, even if it runs into 2021.&nbsp;</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">However, beyond that the UK Government has now announced it will no longer be participating in the Erasmus+ scheme, and will instead be establishing its own overseas study scheme named after the computing pioneer Alan Turing.&nbsp;</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node="">The Department of Education says the </span><a data-dcnode-id="1682" data-link-id="turing-scheme-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turing-scheme.org.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1683" instrument_node="">Turing Scheme</span></a><span data-dcnode-id="1681" instrument_node=""> will provide funding for around 35,000 students to go on placements around the world from September 2021. The new scheme will be targeted at students from disadvantaged backgrounds. </span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Schools, colleges and higher education providers apply for funding for projects on behalf of their pupils, students and learners. If you are based in one of these organisations you may be eligible to take part. It does not matter if you are a full-time or part-time student. Ask your school, education provider, college or university for more info.&nbsp;</span></p><span data-dcnode-id="1676" instrument_node="">
</span></div><span data-dcnode-id="1674" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">

</span></div><span data-dcnode-id="1668" instrument_node="">
</span></div><span data-dcnode-id="1666" instrument_node=""> </span></li><span data-dcnode-id="1664" instrument_node="">
</span></ol><span data-dcnode-id="1662" instrument_node="">
</span></div><span data-dcnode-id="1660" instrument_node="">
