</span><header class="accordion-head" data-dcnode-id="4097"><span data-dcnode-id="4107" instrument_node="">
</span><h3 class="accordion-title component" data-dcnode-id="4099"><span data-dcnode-id="4106" instrument_node=""> </span><a class="accordion-title-link" data-dcnode-id="4101" href="#accordion-content-01543131819-0" role="button" title="How did we get here? The background to the UK leaving the EU"><span data-dcnode-id="4105" instrument_node=""> </span><span class="accordion-title-text" data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">How did we get here? The background to the UK leaving the EU</span></span><span data-dcnode-id="4102" instrument_node=""> </span></a><span data-dcnode-id="4100" instrument_node=""> </span></h3><span data-dcnode-id="4098" instrument_node="">
</span></header><span data-dcnode-id="4096" instrument_node="">
</span><div class="accordion-content-wrapper" data-dcnode-id="4034" id="accordion-content-01543131819-0"><span data-dcnode-id="4095" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="4036"><span data-dcnode-id="4094" instrument_node="">
</span><div class="paragraphSystem item1 content" data-dcnode-id="4038"><span data-dcnode-id="4093" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="4092" id="378898406" style="visibility:hidden"></a><span data-dcnode-id="4091" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="4040"><span data-dcnode-id="4090" instrument_node="">
</span><div class="component-content" data-dcnode-id="4042"><span data-dcnode-id="4089" instrument_node="">
</span><div class="richText-content" data-dcnode-id="4044"><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4087" instrument_node="">In a landmark referendum held on </span><strong data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">23 June 2016</span></strong><span data-dcnode-id="4084" instrument_node="">, those who took part voted by 52% to 48% to leave the European Union.</span></p><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">While this referendum was legally only indicative (so it didn't in its own right have the force of law), it was seen as politically binding.</span></p><span data-dcnode-id="4079" instrument_node="">
</span><p data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">However, as Martin Lewis says: "Some cared about immigration, others sovereignty, some the economy&nbsp;– yet the disgrace is we had a black-and-white vote on a rainbow of issues." Other than the phrase "leave the European Union", there was no definition on the ballot paper of what Brexit meant, leading to huge arguments since about how far the UK separates from the EU.</span></p><span data-dcnode-id="4076" instrument_node="">
</span><p data-dcnode-id="4071"><span data-dcnode-id="4075" instrument_node="">On </span><strong data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">29 March 2017</span></strong><span data-dcnode-id="4072" instrument_node="">, the Government triggered a rule known as 'Article 50', which started the UK's withdrawal from the EU. It was passed through the UK Parliament and dictated that we'd leave exactly two years later, on 29 March 2019.</span></p><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4062"><span data-dcnode-id="4069" instrument_node="">But huge political uncertainty followed, and our departure date was delayed multiple times. After months of parliamentary gridlock, there was a general election on </span><strong data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">12 December 2019</span></strong><span data-dcnode-id="4066" instrument_node="">. It resulted in a clear victory for the Conservatives, who had stood with the promise to "get Brexit done"&nbsp;– and as a result, we left the EU on&nbsp;</span><strong data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">31 January 2020</span></strong><span data-dcnode-id="4063" instrument_node="">.</span></p><span data-dcnode-id="4061" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4060" instrument_node="">We were in a transition period until the end of 2020, during which we followed EU rules but weren't a part of its decision-making processes.</span><br data-dcnode-id="4059"><span data-dcnode-id="4058" instrument_node=""> </span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4046"><span data-dcnode-id="4055" instrument_node="">The UK Government negotiated what our future partnership with the EU would be after the transition period ended on </span><strong data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">31 December 2020</span></strong><span data-dcnode-id="4052" instrument_node="">, and on </span><strong data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">24 December 2020</span></strong><span data-dcnode-id="4049" instrument_node=""> announced that a trade deal had been agreed. This deal was approved by the UK Parliament on </span><strong data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">30 December 2020.</span></strong></p><span data-dcnode-id="4045" instrument_node="">
</span></div><span data-dcnode-id="4043" instrument_node="">
</span></div><span data-dcnode-id="4041" instrument_node="">
</span></div><span data-dcnode-id="4039" instrument_node="">
</span></div><span data-dcnode-id="4037" instrument_node="">
</span></div><span data-dcnode-id="4035" instrument_node="">
</span></div><span data-dcnode-id="4033" instrument_node=""> </span></li><span data-dcnode-id="4031" instrument_node="">
</span></ul><span data-dcnode-id="4029" instrument_node="">
</span></div><span data-dcnode-id="4027" instrument_node="">
</span></div><span data-dcnode-id="4025" instrument_node="">

</span><h2 class="chapter-title" data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">What can we expect for the economy?</span></h2><span data-dcnode-id="4020" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="3865"><span data-dcnode-id="4019" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="4018" id="1992027346" style="visibility:hidden"></a><span data-dcnode-id="4017" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_1729190222" data-dcnode-id="3998"><span data-dcnode-id="4016" instrument_node="">
</span><div class="component-content" data-dcnode-id="4000"><span data-dcnode-id="4015" instrument_node="">
</span><div class="richText-content" data-dcnode-id="4002"><span data-dcnode-id="4014" instrument_node="">
</span><p data-dcnode-id="4009"><span data-dcnode-id="4013" instrument_node="">In Martin's original&nbsp;</span><a data-dcnode-id="4011" data-link-id="'how-to-vote-in-the-eu-referendum'-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.moneysavingexpert.com/2016/06/how-to-vote-in-the-eu-referendum/"><span data-dcnode-id="4012" instrument_node="">'How to vote in the EU referendum'</span></a><span data-dcnode-id="4010" instrument_node="">&nbsp;blog, the impact of Brexit on the economy was one of the most hotly debated issues. Some who voted 'leave' believed it would mean new opportunities for the UK economy. Others have predicted it will lead to economic devastation.</span></p><span data-dcnode-id="4008" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4007" instrument_node="">But right now the economic impact of Brexit is being overshadowed by the financial fallout of the pandemic:</span><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node=""> </span></p><span data-dcnode-id="4003" instrument_node="">
</span></div><span data-dcnode-id="4001" instrument_node="">
</span></div><span data-dcnode-id="3999" instrument_node="">
</span></div><span data-dcnode-id="3997" instrument_node="">
</span><div class="needToKnow component numbered-need-to-know numberedList section default-style even last col-xs-12 analytics-needtoknow_copy" data-dcnode-id="3867"><span data-dcnode-id="3996" instrument_node="">
</span><ol class="paragraphSystem content" data-dcnode-id="3869"><span data-dcnode-id="3995" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3994" id="01482298011" style="visibility:hidden"></a><span data-dcnode-id="3993" instrument_node="">
</span><li data-dcnode-id="3919"><a class="numbered-list-anchor" data-dcnode-id="3992" id="uk-1"></a><span data-dcnode-id="3991" instrument_node="">
</span><div class="numberedListItem component section first odd col-xs-12 analytics-numberedlistitem_105" data-dcnode-id="3921"><span data-dcnode-id="3990" instrument_node="">
</span><div data-dcnode-id="3982"><span data-dcnode-id="3989" instrument_node="">
</span><div class="component-content" data-dcnode-id="3984"><span data-dcnode-id="3988" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">The impact on property prices is uncertain – but in the short term, the pandemic's likely a bigger factor</span></h3><span data-dcnode-id="3985" instrument_node="">
</span></div><span data-dcnode-id="3983" instrument_node="">
</span></div><span data-dcnode-id="3981" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3923"><span data-dcnode-id="3980" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3979" id="01977150236" style="visibility:hidden"></a><span data-dcnode-id="3978" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_1531765999" data-dcnode-id="3952"><span data-dcnode-id="3977" instrument_node="">
</span><div class="component-content" data-dcnode-id="3954"><span data-dcnode-id="3976" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3956"><span data-dcnode-id="3975" instrument_node="">
</span><p data-dcnode-id="3971"><span data-dcnode-id="3974" instrument_node="">After Brexit was first voted for in 2016, there were fears a house price crisis could be just around the corner. In November 2018, the Bank of England made headlines with a report warning that in a worst case scenario a no-deal Brexit could lead to the economy shrinking and house prices falling by close to 30% – but these predictions shifted once the withdrawal deal was agreed and a more orderly Brexit process emerged.&nbsp;</span><br data-dcnode-id="3973"><span data-dcnode-id="3972" instrument_node=""> </span></p><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3965"><span data-dcnode-id="3969" instrument_node="">Over the past year, house prices have been driven by a pandemic-prompted&nbsp;</span><a data-dcnode-id="3967" data-link-id="stamp-duty-holiday-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/mortgages/stamp-duty/"><span data-dcnode-id="3968" instrument_node="">stamp duty holiday</span></a><span data-dcnode-id="3966" instrument_node="">. This has acted like rocket fuel on the housing market, seeing a 7.6% rise over the past year.</span></p><span data-dcnode-id="3964" instrument_node="">
</span><p data-dcnode-id="3958"><span data-dcnode-id="3963" instrument_node="">Of course, whether the stamp duty cut has actually been of benefit (other than for those who have been waiting to shift their houses) is debatable. The price rise has likely negated the gain from the stamp duty holiday for many, and seen a shortage of supply of smaller deposit mortgages.</span><br data-dcnode-id="3962"><span data-dcnode-id="3961" instrument_node=""> </span><br data-dcnode-id="3960"><span data-dcnode-id="3959" instrument_node=""> But for now, for most, Brexit is a secondary question compared to whether prices shift downwards once the stamp duty holiday ends on 1 October 2021, and to the pandemic's long-term impact on people's jobs and incomes.&nbsp;</span></p><span data-dcnode-id="3957" instrument_node="">
</span></div><span data-dcnode-id="3955" instrument_node="">
</span></div><span data-dcnode-id="3953" instrument_node="">
</span></div><span data-dcnode-id="3951" instrument_node="">
</span><div class="image component section default-style even last col-xs-12 analytics-image" data-dcnode-id="3925"><span data-dcnode-id="3950" instrument_node="">

</span><li data-dcnode-id="3871"><a class="numbered-list-anchor" data-dcnode-id="3917" id="uk-2"></a><span data-dcnode-id="3916" instrument_node="">
</span><div class="numberedListItem component section even last col-xs-12 analytics-numberedlistitem_163" data-dcnode-id="3873"><span data-dcnode-id="3915" instrument_node="">

</span><h3 class="title-heading" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Mortgage, loan and savings rates will also likely be driven by the pandemic more than Brexit</span></h3><span data-dcnode-id="3910" instrument_node="">
</span></div><span data-dcnode-id="3908" instrument_node="">
</span></div><span data-dcnode-id="3906" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3875"><span data-dcnode-id="3905" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3904" id="458677660" style="visibility:hidden"></a><span data-dcnode-id="3903" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd last col-xs-12 col-lg-12 analytics-richtext_1203206921" data-dcnode-id="3877"><span data-dcnode-id="3902" instrument_node="">
</span><div class="component-content" data-dcnode-id="3879"><span data-dcnode-id="3901" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3881"><span data-dcnode-id="3900" instrument_node="">
</span><p data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">After years of no change leading up to 2016, the Bank of England dropped the base rate – its official borrowing rate&nbsp;– to 0.25% in the wake of the EU referendum, to stave off a recession. Since then, the base rate has risen, but only up to 0.75%. Now due to the pandemic it's at its lowest rate in history, just 0.1%.</span></p><span data-dcnode-id="3897" instrument_node="">
</span><p data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">There's also been some talk of the risk of negative interest rates – in fact, earlier this year the Bank of England gave banks six months to prepare for that eventuality. Brexit is likely to feed into this&nbsp;– yet even if it has a short-term negative economic impact, as most economists predict,&nbsp;its impact is still for now likely dwarfed by the pandemic's, and negative rates are still a possibility more than a probability.</span></p><span data-dcnode-id="3894" instrument_node="">
</span><p data-dcnode-id="3883"><span data-dcnode-id="3893" instrument_node="">Rather than trying to second-guess economic shifts, the safest approach may be to simply focus on your own personal finances, which are more controllable and predictable. Plan for the worst; hope for the best. Ensure you've the&nbsp;</span><a data-dcnode-id="3891" data-link-id="cheapest-mortgage-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/mortgages/best-buys/"><span data-dcnode-id="3892" instrument_node="">cheapest mortgage</span></a><span data-dcnode-id="3890" instrument_node="">&nbsp;and the&nbsp;</span><a data-dcnode-id="3888" data-link-id="top-savings-accounts-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/savings/savings-accounts-best-interest/"><span data-dcnode-id="3889" instrument_node="">top savings accounts</span></a><span data-dcnode-id="3887" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="3885" data-link-id="do-a-money-makeover-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/family/money-help/"><span data-dcnode-id="3886" instrument_node="">do a money makeover</span></a><span data-dcnode-id="3884" instrument_node="">.</span></p><span data-dcnode-id="3882" instrument_node="">
</span></div><span data-dcnode-id="3880" instrument_node="">

</span><h2 class="chapter-title" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">What does Brexit mean for travel to the EU?</span></h2><span data-dcnode-id="3765" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="2755"><span data-dcnode-id="3764" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3763" id="627227861" style="visibility:hidden"></a><span data-dcnode-id="3762" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext_820169655_c" data-dcnode-id="3747"><span data-dcnode-id="3761" instrument_node="">
</span><div class="component-content" data-dcnode-id="3749"><span data-dcnode-id="3760" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3751"><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3756"><a data-dcnode-id="3758" data-link-id="-1" id="othertravel"></a><span data-dcnode-id="3757" instrument_node="">Who would have known that when the Brexit transition period ended and we made a final break from the EU, international travel would have ground to a halt due to a pandemic?&nbsp;</span></p><span data-dcnode-id="3755" instrument_node="">
</span><p data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">The impact of coronavirus on travel this year has been massive, and is still by far the biggest issue at the moment. Yet Brexit undeniably means big changes&nbsp;– before Brexit and during the transition period, UK citizens could travel, live, holiday and work anywhere in the EU without any special permits, but that is no longer the case. Here are the Brexit travel need-to-knows:</span></p><span data-dcnode-id="3752" instrument_node="">
</span></div><span data-dcnode-id="3750" instrument_node="">
</span></div><span data-dcnode-id="3748" instrument_node="">
</span></div><span data-dcnode-id="3746" instrument_node="">
</span><div class="needToKnow component numbered-need-to-know numberedList section default-style even last col-xs-12 analytics-needtoknow" data-dcnode-id="2757"><span data-dcnode-id="3745" instrument_node="">
</span><ol class="paragraphSystem content" data-dcnode-id="2759"><span data-dcnode-id="3744" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3743" id="01707405184" style="visibility:hidden"></a><span data-dcnode-id="3742" instrument_node="">
</span><li data-dcnode-id="3669"><a class="numbered-list-anchor" data-dcnode-id="3741" id="holiday-1"></a><span data-dcnode-id="3740" instrument_node="">
</span><div class="numberedListItem component section first odd col-xs-12 analytics-numberedlistitem_131" data-dcnode-id="3671"><span data-dcnode-id="3739" instrument_node="">
</span><div data-dcnode-id="3731"><span data-dcnode-id="3738" instrument_node="">
</span><div class="component-content" data-dcnode-id="3733"><span data-dcnode-id="3737" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Travel disruption is mainly due to coronavirus rather than Brexit</span></h3><span data-dcnode-id="3734" instrument_node="">
</span></div><span data-dcnode-id="3732" instrument_node="">
</span></div><span data-dcnode-id="3730" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3673"><span data-dcnode-id="3729" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3728" id="0181828862" style="visibility:hidden"></a><span data-dcnode-id="3727" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd last col-xs-12 analytics-richtext" data-dcnode-id="3675"><span data-dcnode-id="3726" instrument_node="">
</span><div class="component-content" data-dcnode-id="3677"><span data-dcnode-id="3725" instrument_node="">
</span><picture data-dcnode-id="3706"><span data-dcnode-id="3724" instrument_node="">
</span><source data-dcnode-id="3722" data-srcset="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.320.320.png" media="(min-width: 0px) and (max-width: 319px)"><span data-dcnode-id="3721" instrument_node="">
</span><source data-dcnode-id="3720" data-srcset="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.480.480.png" media="(min-width: 320px) and (max-width: 479px)"><span data-dcnode-id="3719" instrument_node="">
</span><source data-dcnode-id="3718" data-srcset="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.768.768.png" media="(min-width: 480px) and (max-width: 767px)"><span data-dcnode-id="3717" instrument_node="">
</span><source data-dcnode-id="3716" data-srcset="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.768.768.png" media="(min-width: 768px) and (max-width: 1199px)"><span data-dcnode-id="3715" instrument_node="">
</span><source data-dcnode-id="3714" data-srcset="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.768.768.png" media="(min-width: 1200px)"><span data-dcnode-id="3713" instrument_node="">
</span><img alt="" class="richText-image pull-right lazyload" data-dcnode-id="3711" data-src="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.320.320.png"><span data-dcnode-id="3710" instrument_node="">
</span><noscript data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">
&lt;img src="/content/dam/14904-coronavirus-travel-guide-img10.png.rendition.320.320.png" class="richText-image pull-right " alt="" /&gt;
</span></noscript><span data-dcnode-id="3707" instrument_node="">
</span></picture><span data-dcnode-id="3705" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3679"><span data-dcnode-id="3704" instrument_node="">
</span><p data-dcnode-id="3701"><a data-dcnode-id="3703" data-link-id="-1" id="travelins"></a><span data-dcnode-id="3702" instrument_node="">Overseas travel is anything but normal at the moment, with widespread limitations on travel both to and from Europe (and elsewhere) – but this is due to the pandemic, not Brexit.</span></p><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3699" instrument_node="">Leading up to Brexit, the Government warned of cancelled flights and major disruption to ferries, coaches and the Eurostar if we didn't agree a deal with the EU. But once the withdrawal agreement was negotiated with the EU, those fears receded and travel continued as normal following Brexit Day.</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node=""> </span><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node=""> When the coronavirus pandemic hit, it put an almost immediate stop to most travel – and while some travel has now resumed, it's still massively disrupted.</span></p><span data-dcnode-id="3693" instrument_node="">
</span><h4 data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">The rules on travel vary by country</span></h4><span data-dcnode-id="3690" instrument_node="">
</span><p data-dcnode-id="3681"><span data-dcnode-id="3689" instrument_node="">The UK government has introduced a 'traffic light' system of rules for international travel, which means fully vaccinated travellers returning to England, Northern Ireland, Scotland, and Wales from most European destinations need to take a pre- and post-departure test by day two of their return but no longer have to quarantine on arrival.&nbsp;</span><br data-dcnode-id="3688"><span data-dcnode-id="3687" instrument_node=""> </span><br data-dcnode-id="3686"><span data-dcnode-id="3685" instrument_node=""> But while restrictions on non-essential travel have largely come to an end, individual countries within the EU have also set their own rules – making the situation really complicated. However, the majority of EU countries are allowing fully vaccinated UK holidaymakers to enter without having to quarantine on arrival. For the latest on travel, see our&nbsp;</span><a data-dcnode-id="3683" data-link-id="coronavirus-travel-rights-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2020/02/coronavirus-travel-help-and-your-rights/"><span data-dcnode-id="3684" instrument_node="">Coronavirus Travel Rights</span></a><span data-dcnode-id="3682" instrument_node="">&nbsp;guide.</span></p><span data-dcnode-id="3680" instrument_node="">
</span></div><span data-dcnode-id="3678" instrument_node="">
</span></div><span data-dcnode-id="3676" instrument_node="">
</span></div><span data-dcnode-id="3674" instrument_node="">
</span></div><span data-dcnode-id="3672" instrument_node="">
</span></div><span data-dcnode-id="3670" instrument_node=""> </span></li><span data-dcnode-id="3668" instrument_node="">
</span><li data-dcnode-id="3597"><a class="numbered-list-anchor" data-dcnode-id="3667" id="holiday-2"></a><span data-dcnode-id="3666" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem" data-dcnode-id="3599"><span data-dcnode-id="3665" instrument_node="">
</span><div data-dcnode-id="3657"><span data-dcnode-id="3664" instrument_node="">
</span><div class="component-content" data-dcnode-id="3659"><span data-dcnode-id="3663" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Flight delay compensation rules haven't changed – EU rules have been written into UK law</span></h3><span data-dcnode-id="3660" instrument_node="">
</span></div><span data-dcnode-id="3658" instrument_node="">
</span></div><span data-dcnode-id="3656" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3601"><span data-dcnode-id="3655" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3654" id="0477664910" style="visibility:hidden"></a><span data-dcnode-id="3653" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd last col-xs-12 analytics-richtext" data-dcnode-id="3603"><span data-dcnode-id="3652" instrument_node="">
</span><div class="component-content" data-dcnode-id="3605"><span data-dcnode-id="3651" instrument_node="">
</span><picture data-dcnode-id="3632"><span data-dcnode-id="3650" instrument_node="">
</span><source data-dcnode-id="3648" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.320.320.png" media="(min-width: 0px) and (max-width: 319px)"><span data-dcnode-id="3647" instrument_node="">
</span><source data-dcnode-id="3646" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.480.480.png" media="(min-width: 320px) and (max-width: 479px)"><span data-dcnode-id="3645" instrument_node="">
</span><source data-dcnode-id="3644" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.768.768.png" media="(min-width: 480px) and (max-width: 767px)"><span data-dcnode-id="3643" instrument_node="">
</span><source data-dcnode-id="3642" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.768.768.png" media="(min-width: 768px) and (max-width: 1199px)"><span data-dcnode-id="3641" instrument_node="">
</span><source data-dcnode-id="3640" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.768.768.png" media="(min-width: 1200px)"><span data-dcnode-id="3639" instrument_node="">
</span><img alt="" class="richText-image pull-right lazyload" data-dcnode-id="3637" data-src="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.320.320.png"><span data-dcnode-id="3636" instrument_node="">
</span><noscript data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">
&lt;img src="/content/dam/mse/editorial-image-library/guide-images/brexit-images/igd-brexit-flight-delay.png.rendition.320.320.png" class="richText-image pull-right " alt="" /&gt;
</span></noscript><span data-dcnode-id="3633" instrument_node="">
</span></picture><span data-dcnode-id="3631" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3607"><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3625"><span data-dcnode-id="3629" instrument_node="">If you're on a flight to or from an EU country which&nbsp;– due to the airline's fault&nbsp;– is delayed by more than three hours or your flight is cancelled altogether, under EU rule 261/2004 you're entitled to between £110 and £540 per person in compensation. Full details on this can be found in our&nbsp;</span><a data-dcnode-id="3627" data-link-id="flight-delays-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/travel/flight-delays/"><span data-dcnode-id="3628" instrument_node="">Flight delays</span></a><span data-dcnode-id="3626" instrument_node="">&nbsp;guide.</span></p><span data-dcnode-id="3624" instrument_node="">
</span><p data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">Although the UK has now left the EU, UK passengers' right to flight delay compensation isn't supposed to change as a result of Brexit. The Government insists the rules remain the same, as it's written EU261 into UK law.</span></p><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">We've put various complex scenarios under which flights would currently be covered by EU261 to the Department for Transport&nbsp;– such as if you flew from the US (a non-EU country) to France (an EU country) on British Airways (a British airline) – and it's adamant that with EU rules copied into UK law you'll still get the same cover you would if the UK had remained in the EU.</span></p><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3613"><span data-dcnode-id="3617" instrument_node="">We still don't know how this will work in practice though, or if, for instance, there may be problems thrown up by how different governments and lawmakers enforce the rules. We'll be keeping a close eye on it. You can&nbsp;</span><a data-dcnode-id="3615" data-link-id="read-the-small-print-here-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/uksi/2019/278/pdfs/uksi_20190278_en.pdf" rel="noopener noreferrer" style="background-color: rgb(255, 255, 255);" target="_blank"><span data-dcnode-id="3616" instrument_node="">read the small print here</span></a><span data-dcnode-id="3614" instrument_node="">.</span></p><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3609"><span data-dcnode-id="3611" instrument_node="">It's also worth bearing in mind that if you fly between two EU countries, you'll still be covered under EU261, as the law doesn't require you to be an EU citizen to claim compensation.</span><a data-dcnode-id="3610" data-link-id="-3" id="borderchecks"></a></p><span data-dcnode-id="3608" instrument_node="">
</span></div><span data-dcnode-id="3606" instrument_node="">
</span></div><span data-dcnode-id="3604" instrument_node="">
</span></div><span data-dcnode-id="3602" instrument_node="">
</span></div><span data-dcnode-id="3600" instrument_node="">
</span></div><span data-dcnode-id="3598" instrument_node=""> </span></li><span data-dcnode-id="3596" instrument_node="">
</span><li data-dcnode-id="3493"><a class="numbered-list-anchor" data-dcnode-id="3595" id="holiday-3"></a><span data-dcnode-id="3594" instrument_node="">
</span><div class="numberedListItem component section odd col-xs-12 analytics-numberedlistitem_133_441409134" data-dcnode-id="3495"><span data-dcnode-id="3593" instrument_node="">
</span><div data-dcnode-id="3585"><span data-dcnode-id="3592" instrument_node="">
</span><div class="component-content" data-dcnode-id="3587"><span data-dcnode-id="3591" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">You may face stricter border checks – and from late 2022, you'll have to buy a £6 visa-waiver for European holidays</span></h3><span data-dcnode-id="3588" instrument_node="">
</span></div><span data-dcnode-id="3586" instrument_node="">
</span></div><span data-dcnode-id="3584" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3497"><span data-dcnode-id="3583" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3582" id="1948638443" style="visibility:hidden"></a><span data-dcnode-id="3581" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="3499"><span data-dcnode-id="3580" instrument_node="">
</span><div class="component-content" data-dcnode-id="3501"><span data-dcnode-id="3579" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3503"><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">As above, in the short term most travel to Europe is seriously disrupted anyway as a result of coronavirus. But even once those restrictions are lifted, there are a number of changes which will apply now the Brexit transition period has ended:</span></p><span data-dcnode-id="3575" instrument_node="">
</span><ul data-dcnode-id="3521"><span data-dcnode-id="3574" instrument_node="">
</span><li data-dcnode-id="3566"><strong data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">You may face stricter border checks. </span></strong><span data-dcnode-id="3571" instrument_node="">UK nationals have been warned they may need to show a return or onward ticket on arrival, show they have enough money to stay and use separate lanes from citizens of the EU, Iceland, Liechtenstein, Norway and Switzerland when queuing.</span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node=""> </span><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node=""> </span></li><span data-dcnode-id="3565" instrument_node="">
</span><li data-dcnode-id="3557"><strong data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">As a tourist, you can now only visit most EU countries for up to 90 days in a 180-day period.</span></strong><span data-dcnode-id="3562" instrument_node="">&nbsp;Slightly different rules apply to Bulgaria, Croatia, Cyprus and Romania, though. If you visit these countries, visits to other EU countries will not count towards the 90-day total.</span><br data-dcnode-id="3561"><span data-dcnode-id="3560" instrument_node=""> </span><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node=""> </span></li><span data-dcnode-id="3556" instrument_node="">
</span><li data-dcnode-id="3544"><strong data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">You may need extra documents to work or study, or for trips longer than 90 days.</span></strong><span data-dcnode-id="3553" instrument_node="">&nbsp;This will depend on what you're doing and where you're going so you'll have to check with the embassy of the country where you plan to travel for what type of documents, if any, you will need.&nbsp;</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node=""> </span><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node=""> The exception to this is if you're going to Ireland&nbsp;– you WON'T need extra documents when travelling there, even for work or study, and will continue to be able to visit in the same way as you can now.</span><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node=""> </span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node=""> </span></li><span data-dcnode-id="3543" instrument_node="">
</span><li data-dcnode-id="3528"><strong data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">There are limits on what you can bring back to the UK from the EU. </span></strong><span data-dcnode-id="3540" instrument_node="">Previously, you could bring an unlimited amount of most goods to the UK from the EU without paying taxes&nbsp;– known as 'customs duties'&nbsp;– so long as they're for your personal use.</span><br data-dcnode-id="3539"><span data-dcnode-id="3538" instrument_node=""> </span><br data-dcnode-id="3537"><span data-dcnode-id="3536" instrument_node=""> But since 1 January 2021, this tax-free limit fell to goods worth up to £390 for most. There are also separate limits on the amount of alcohol or cigarettes you can bring in without paying tax. For example, you can only bring back four litres of spirits. VAT at 20% will also be due on all imports. You are able to check your allowances, make a declaration and pay any tax using a new online service for passengers.&nbsp;</span><a data-dcnode-id="3534" data-link-id="see-govuk-for-more-details-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/bringing-goods-into-great-britain-from-outside-the-uk-from-1-january-2021" rel="noopener noreferrer" style="background-color: rgb(255, 255, 255);" target="_blank"><span data-dcnode-id="3535" instrument_node="">See Gov.uk for more details</span></a><span data-dcnode-id="3533" instrument_node="">.&nbsp;&nbsp;</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node=""> </span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node=""> </span></li><span data-dcnode-id="3527" instrument_node="">
</span><li data-dcnode-id="3523"><strong data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">By the end of 2022 (the exact date's yet to be confirmed), you'll have to buy a £6 visa-waiver for holidays and short stays.</span></strong><span data-dcnode-id="3524" instrument_node="">&nbsp;UK nationals WON'T need a visa for short trips (up to 90 days in any 180-day period) to mainland Europe if they're just going on holiday. But they WILL have to fork out for what's known as a 'visa-waiver' – this'll cost €7 (£6.28) and will be issued under the 'European Travel Information and Authorisation System' (ETIAS).</span></li><span data-dcnode-id="3522" instrument_node="">
</span></ul><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3518" style="text-align: left;"><span data-dcnode-id="3519" instrument_node="">Travellers wanting to enter the border-free Schengen area will need to fill out an online form and checks will be made automatically, unless an issue is flagged. You will then either be accepted or rejected within a four-week window and will have the ability to appeal if rejected.</span></p><span data-dcnode-id="3517" instrument_node="">
</span><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">New amendments were outlined by the European Commission in August 2021, which state there will be questions on whether you have a criminal record and whether you have previously been asked to leave an EU country.</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Airlines will be expected to check that a person has been authorised to travel to the EU under the ETIAS scheme.</span></p><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3505"><span data-dcnode-id="3510" instrument_node="">You don't have to pay this for every trip, though. The fee covers an electronic pass that will allow British citizens to go on short holidays over a period of three years before they have to renew. The pass is similar to the ESTA currently required to visit the United States (see our&nbsp;</span><a data-dcnode-id="3509" data-link-id="-2"></a><a data-dcnode-id="3507" data-link-id="esta-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/travel/esta-usa-visa/"><span data-dcnode-id="3508" instrument_node="">ESTA</span></a><span data-dcnode-id="3506" instrument_node="">&nbsp;guide for full info on how that works).</span></p><span data-dcnode-id="3504" instrument_node="">
</span></div><span data-dcnode-id="3502" instrument_node="">
</span></div><span data-dcnode-id="3500" instrument_node="">
</span></div><span data-dcnode-id="3498" instrument_node="">
</span></div><span data-dcnode-id="3496" instrument_node="">
</span></div><span data-dcnode-id="3494" instrument_node=""> </span></li><span data-dcnode-id="3492" instrument_node="">
</span><li data-dcnode-id="3426"><a class="numbered-list-anchor" data-dcnode-id="3491" id="holiday-4"></a><span data-dcnode-id="3490" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_632" data-dcnode-id="3428"><span data-dcnode-id="3489" instrument_node="">
</span><div data-dcnode-id="3481"><span data-dcnode-id="3488" instrument_node="">
</span><div class="component-content" data-dcnode-id="3483" id="bluepassports"><span data-dcnode-id="3487" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Passports are turning blue – but you don't have to get a new one until your current one's close to expiry</span></h3><span data-dcnode-id="3484" instrument_node="">
</span></div><span data-dcnode-id="3482" instrument_node="">
</span></div><span data-dcnode-id="3480" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3430"><span data-dcnode-id="3479" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3478" id="1910861768" style="visibility:hidden"></a><span data-dcnode-id="3477" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 col-lg-12 analytics-richtext_623028085" data-dcnode-id="3459"><span data-dcnode-id="3476" instrument_node="">
</span><div class="component-content" data-dcnode-id="3461"><span data-dcnode-id="3475" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3463"><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">If you've a UK passport, it'll likely be burgundy with the words "European Union" stamped on the front. Yet this is changing&nbsp;– all new or renewed passports are now blue instead, and the "European Union" has been dropped.&nbsp;</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3470" instrument_node="">You DON'T need to get a new passport straightaway though, and can continue to use your current one as normal until it's close to its expiry date (see below for </span><a data-dcnode-id="3468" data-link-id="why-you-may-not-want-to-wait-until-it-actually-expires-1" href="#passportsearly"><span data-dcnode-id="3469" instrument_node="">why you may not want to wait until it actually expires</span></a><span data-dcnode-id="3467" instrument_node="">).</span><a data-dcnode-id="3466" data-link-id="-2" id="passports"></a></p><span data-dcnode-id="3464" instrument_node="">
</span></div><span data-dcnode-id="3462" instrument_node="">
</span></div><span data-dcnode-id="3460" instrument_node="">
</span></div><span data-dcnode-id="3458" instrument_node="">

</span><div class="numberedListItem component section odd col-xs-12 analytics-numberedlistitem_541" data-dcnode-id="3359"><span data-dcnode-id="3422" instrument_node="">
</span><div data-dcnode-id="3414"><span data-dcnode-id="3421" instrument_node="">
</span><div class="component-content" data-dcnode-id="3416" id="passportsearly"><span data-dcnode-id="3420" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Visiting the EU? You'll need at least six months left on your passport – so may need to renew early</span></h3><span data-dcnode-id="3417" instrument_node="">
</span></div><span data-dcnode-id="3415" instrument_node="">
</span></div><span data-dcnode-id="3413" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3361"><span data-dcnode-id="3412" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3411" id="1023786789" style="visibility:hidden"></a><span data-dcnode-id="3410" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext" data-dcnode-id="3384"><span data-dcnode-id="3409" instrument_node="">
</span><div class="component-content" data-dcnode-id="3386"><span data-dcnode-id="3408" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3388"><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Pre-Brexit, you could travel to EU countries on your passport right up to the point it expires. However, the rules have changed. These changes were announced prior to the trade deal but they haven't changed following the deal being agreed upon.&nbsp;</span></p><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Under the new rules, when you visit most EU countries and Iceland, Liechtenstein, Norway and Switzerland, your passport will need to both:</span></p><span data-dcnode-id="3401" instrument_node="">
</span><ul data-dcnode-id="3393"><span data-dcnode-id="3400" instrument_node="">
</span><li data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">have at least six months left on it until expiry&nbsp;</span></li><span data-dcnode-id="3397" instrument_node="">
</span><li data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">AND be less than 10 years old on the day you travel.</span></li><span data-dcnode-id="3394" instrument_node="">
</span></ul><span data-dcnode-id="3392" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">This means some will need to renew their passport earlier than normal. It's worth noting though that it won't apply when visiting every EU country (for example, you won't need to do it when going to the Republic of Ireland).</span></p><span data-dcnode-id="3389" instrument_node="">
</span></div><span data-dcnode-id="3387" instrument_node="">
</span></div><span data-dcnode-id="3385" instrument_node="">
</span></div><span data-dcnode-id="3383" instrument_node="">
</span><div class="richText component section default-style even last col-xs-12 analytics-richtext_1319782341" data-dcnode-id="3363"><span data-dcnode-id="3382" instrument_node="">
</span><div class="component-content" data-dcnode-id="3365"><span data-dcnode-id="3381" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3367"><span data-dcnode-id="3380" instrument_node="">
</span><h4 data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Some passport renewals are now shorter too</span></h4><span data-dcnode-id="3377" instrument_node="">
</span><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">It's also worth noting that to prepare for Brexit, the Passport Office introduced some under-the-radar changes in September 2018 – first revealed by MoneySavingExpert.com – which mean that travellers who renew their passports now get up to nine months' less validity.</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3373" instrument_node="">See full info in our&nbsp;</span><a data-dcnode-id="3371" data-link-id="passport-applicants-given-shorter-renewals-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2018/09/passport-applicants-hit-out-after-being-given-shorter-than-expec/"><span data-dcnode-id="3372" instrument_node="">Passport applicants given shorter renewals</span></a><span data-dcnode-id="3370" instrument_node="">&nbsp;MSE News story.</span></p><span data-dcnode-id="3368" instrument_node="">
</span></div><span data-dcnode-id="3366" instrument_node="">
</span></div><span data-dcnode-id="3364" instrument_node="">
</span></div><span data-dcnode-id="3362" instrument_node="">
</span></div><span data-dcnode-id="3360" instrument_node="">
</span></div><span data-dcnode-id="3358" instrument_node=""> </span></li><span data-dcnode-id="3356" instrument_node="">
</span><li data-dcnode-id="3254"><a class="numbered-list-anchor" data-dcnode-id="3355" id="holiday-6"></a><span data-dcnode-id="3354" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_176" data-dcnode-id="3256"><span data-dcnode-id="3353" instrument_node="">
</span><div data-dcnode-id="3345"><span data-dcnode-id="3352" instrument_node="">
</span><div class="component-content" data-dcnode-id="3347" id="ehic123"><span data-dcnode-id="3351" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">EHICs will remain valid until their expiry date – but they're being replaced by GHICs</span></h3><span data-dcnode-id="3348" instrument_node="">
</span></div><span data-dcnode-id="3346" instrument_node="">
</span></div><span data-dcnode-id="3344" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3258"><span data-dcnode-id="3343" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3342" id="01415220605" style="visibility:hidden"></a><span data-dcnode-id="3341" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext" data-dcnode-id="3287"><span data-dcnode-id="3340" instrument_node="">
</span><div class="component-content" data-dcnode-id="3289"><span data-dcnode-id="3339" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3291"><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3337" instrument_node="">Before Brexit, and during 2020's transition period, most UK residents qualified for&nbsp;a free European Health Insurance Card (EHIC). This entitled you to the same treatment at state-run hospitals and GPs that locals are entitled to, at the same cost, when travelling in the EU (plus Iceland, Liechtenstein, Norway and Switzerland and some overseas territories – see our </span><a data-dcnode-id="3335" data-link-id="country-by-country-ehic-guide-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/travel/free-ehic-card/%23country"><span data-dcnode-id="3336" instrument_node="">country-by-country EHIC guide</span></a><span data-dcnode-id="3334" instrument_node="">).</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Prior to the trade deal being announced, it was expected that EHIC cover would end for most on 1 January 2021. However, the story isn't as bleak as was expected – here's what's happened.</span></p><span data-dcnode-id="3329" instrument_node="">
</span><h4 data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">What happens if I already have an EHIC?&nbsp;</span></h4><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">UK nationals living in the UK who currently have an EHIC can continue to use it in the EU after 1 January 2021 until the card expires, even if that is years away. However, from 1 January 2021, you'll no longer be able to use your EHIC in Switzerland, Norway, Iceland or Liechtenstein, which are not part of the EU, but had accepted the EHIC from UK nationals.</span></p><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3318"><span data-dcnode-id="3322" instrument_node="">If you're an EU national living in the UK, your existing EHIC ended on 31 December 2020. You can, however,&nbsp;</span><a data-dcnode-id="3320" data-link-id="continue-to-get-a-new-ehic-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2020/12/ehic-s-future-uncertain-from-next-month---but-europeans-living-i/"><span data-dcnode-id="3321" instrument_node="">continue to get a new EHIC</span></a><span data-dcnode-id="3319" instrument_node="">&nbsp;rather than a GHIC.&nbsp; &nbsp;</span></p><span data-dcnode-id="3317" instrument_node="">
</span><h4 data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">What if I don't have an EHIC (including when one expires)?&nbsp;</span></h4><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">The Global Health Insurance Card (GHIC) will take over for UK nationals living in the UK but you will need to apply for it – and you can now get one as a new user or if you're renewing your existing EHIC via the&nbsp;</span><a data-dcnode-id="3311" data-link-id="nhs-website-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/using-the-nhs/healthcare-abroad/apply-for-a-free-ehic-european-health-insurance-card/"><span data-dcnode-id="3312" instrument_node="">NHS website</span></a><span data-dcnode-id="3310" instrument_node="">.</span></p><span data-dcnode-id="3308" instrument_node="">
</span><p data-dcnode-id="3302"><span data-dcnode-id="3307" instrument_node="">You can no longer get a new EHIC (including via a renewal) if you're a UK national living in the UK, with some small exceptions&nbsp;– see&nbsp;</span><u data-dcnode-id="3304"><a data-dcnode-id="3305" data-link-id="who-can-still-apply-4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/using-the-nhs/healthcare-abroad/apply-for-a-free-uk-global-health-insurance-card-ghic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3306" instrument_node="">who can still apply</span></a></u><span data-dcnode-id="3303" instrument_node="">.</span></p><span data-dcnode-id="3301" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Like an EHIC, the GHIC will entitle holders to emergency or necessary state (not private) medical care for the same cost as a resident in the EU country they're visiting; but it won't cover you in Iceland, Liechtenstein, Norway and Switzerland.&nbsp;</span></p><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3293"><span data-dcnode-id="3297" instrument_node="">Neither card is a replacement for travel insurance though – they do not cover everything, such as mountain rescue or being flown back to the UK for treatment&nbsp;– see our&nbsp;</span><a data-dcnode-id="3295" data-link-id="cheap-travel-insurance-5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/insurance/cheap-travel-insurance/"><span data-dcnode-id="3296" instrument_node="">Cheap travel insurance</span></a><span data-dcnode-id="3294" instrument_node="">&nbsp;guide for full help.&nbsp;</span></p><span data-dcnode-id="3292" instrument_node="">
</span></div><span data-dcnode-id="3290" instrument_node="">
</span></div><span data-dcnode-id="3288" instrument_node="">

</span><h3 class="title-heading" data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Worried about holiday currency? Hedge your bets and buy some sooner</span></h3><span data-dcnode-id="3245" instrument_node="">
</span></div><span data-dcnode-id="3243" instrument_node="">
</span></div><span data-dcnode-id="3241" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3171"><span data-dcnode-id="3240" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3239" id="640432300" style="visibility:hidden"></a><span data-dcnode-id="3238" instrument_node="">
</span><div class="richText component section default-style first odd col-xs-12 analytics-richtext" data-dcnode-id="3200"><span data-dcnode-id="3237" instrument_node="">
</span><div class="component-content" data-dcnode-id="3202"><span data-dcnode-id="3236" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3204"><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3230"><span data-dcnode-id="3234" instrument_node="">As Martin explains in his&nbsp;</span><a data-dcnode-id="3232" data-link-id="buy-euros-now?-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.moneysavingexpert.com/2018/07/martin-lewis--should-i-buy-currency-now-or-wait-/"><span data-dcnode-id="3233" instrument_node="">Buy euros now?</span></a><span data-dcnode-id="3231" instrument_node="">&nbsp;blog (written in July 2018, but still relevant now), currency moves are complex, and affected both by economics and the whims of City traders trying to second-guess those movements.</span></p><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Without a crystal ball, no one knows if the pound will be stronger or weaker in future – or what the impact of the end of the transition period will be. Anyone who tells you otherwise is merely speculating.</span></p><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">However, if you're really worried about the value of the pound going down to make your holidays unaffordable, you could try following what Martin's suggested in the past and buy roughly half of what you need at today's best rate, then half nearer the time.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3218"><span data-dcnode-id="3222" instrument_node="">If you're really nervous, you could ask yourself:&nbsp;</span><em data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">"Would I be content with today's euro rate for my holiday money...?"</span></em><span data-dcnode-id="3219" instrument_node="">&nbsp;If so, and your real fear is that the rate worsens so your holiday would be unaffordable, play it safe and buy more than half now.</span></p><span data-dcnode-id="3217" instrument_node="">
</span><p data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">But if you do that, it's best to close your eyes afterwards. If the pound strengthens, you'd have been better off waiting&nbsp;– and you don't want that knowledge to ruin your holiday.</span></p><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3206"><span data-dcnode-id="3213" instrument_node="">For the best rates, see our&nbsp;</span><a data-dcnode-id="3211" data-link-id="18-cheapest-ways-to-get-travel-money-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/travel/cheap-travel-money/"><span data-dcnode-id="3212" instrument_node="">18 cheapest ways to get travel money</span></a><span data-dcnode-id="3210" instrument_node="">&nbsp;guide and&nbsp;</span><a data-dcnode-id="3208" data-link-id="travelmoneymax-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travelmoney.moneysavingexpert.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3209" instrument_node="">TravelMoneyMax</span></a><span data-dcnode-id="3207" instrument_node="">&nbsp;tool.</span></p><span data-dcnode-id="3205" instrument_node="">

</span><h3 class="title-heading" data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">EE, Three and Vodafone are bringing back roaming charges – other mobile providers could follow</span></h3><span data-dcnode-id="3158" instrument_node="">
</span></div><span data-dcnode-id="3156" instrument_node="">
</span></div><span data-dcnode-id="3154" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3050"><span data-dcnode-id="3153" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3152" id="0941473481" style="visibility:hidden"></a><span data-dcnode-id="3151" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd col-xs-12 col-lg-12 analytics-richtext" data-dcnode-id="3114"><span data-dcnode-id="3150" instrument_node="">

</span><source data-dcnode-id="3146" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/brexit-usingphone-abroad.png.rendition.320.320.png" media="(min-width: 0px) and (max-width: 319px)"><span data-dcnode-id="3145" instrument_node="">
</span><source data-dcnode-id="3144" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/brexit-usingphone-abroad.png.rendition.480.480.png" media="(min-width: 320px) and (max-width: 479px)"><span data-dcnode-id="3143" instrument_node="">

</span><source data-dcnode-id="3138" data-srcset="/content/dam/mse/editorial-image-library/guide-images/brexit-images/brexit-usingphone-abroad.png.rendition.768.768.png" media="(min-width: 1200px)"><span data-dcnode-id="3137" instrument_node="">
</span><img alt="" class="richText-image pull-right lazyload" data-dcnode-id="3135" data-src="/content/dam/mse/editorial-image-library/guide-images/brexit-images/brexit-usingphone-abroad.png.rendition.320.320.png"><span data-dcnode-id="3134" instrument_node="">
</span><noscript data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">
&lt;img src="/content/dam/mse/editorial-image-library/guide-images/brexit-images/brexit-usingphone-abroad.png.rendition.320.320.png" class="richText-image pull-right " alt="" /&gt;
</span></noscript><span data-dcnode-id="3131" instrument_node="">
</span></picture><span data-dcnode-id="3129" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3118"><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">In 2017, 'Roam Like At Home' rules were&nbsp;</span><a data-dcnode-id="3125" data-link-id="introduced-by-the-european-union-across-the-eu-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2017/06/free-mobile-roaming-in-the-eu-starts-on-thursday-10-things-you-need-to-know/"><span data-dcnode-id="3126" instrument_node="">introduced by the European Union across the EU</span></a><span data-dcnode-id="3124" instrument_node="">&nbsp;(plus Iceland,&nbsp;Liechtenstein and Norway).</span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">These meant that when travelling in the EU, you could make calls or send texts to anywhere else in the EU, or use data, and it would come out of your UK allowance (or you'd pay UK pay-as-you-go rates) just as you would at home, subject to 'fair usage' rules.</span></p><span data-dcnode-id="3119" instrument_node="">
</span></div><span data-dcnode-id="3117" instrument_node="">
</span></div><span data-dcnode-id="3115" instrument_node="">
</span></div><span data-dcnode-id="3113" instrument_node="">
</span><div class="richText component section default-style even last col-xs-12 analytics-richtext_2112721520" data-dcnode-id="3052"><span data-dcnode-id="3112" instrument_node="">
</span><div class="component-content" data-dcnode-id="3054"><span data-dcnode-id="3111" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3056"><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">However, there's now no guarantee of free mobile roaming in the EU – and we've already seen three providers announce they're ending their current free roaming arrangements for some customers:</span></p><span data-dcnode-id="3107" instrument_node="">
</span><ul data-dcnode-id="3082"><span data-dcnode-id="3106" instrument_node="">
</span><li data-dcnode-id="3100"><strong data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">EE </span></strong><a data-dcnode-id="3102" data-link-id="announced-in-june-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2021/06/ee-mobile-roaming-charges-europe-january/"><span data-dcnode-id="3103" instrument_node="">announced in June</span></a><span data-dcnode-id="3101" instrument_node=""> that it would start charging new and upgrading customers a flat £2/day mobile roaming fee if they use their phone in Europe from January 2022.</span></li><span data-dcnode-id="3099" instrument_node="">
</span><li data-dcnode-id="3092"><strong data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Vodafone</span></strong><span data-dcnode-id="3096" instrument_node=""> followed in August, </span><a data-dcnode-id="3094" data-link-id="announcing-that-it-too-would-charge-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2021/08/vodafone-roaming-europe-charges/"><span data-dcnode-id="3095" instrument_node="">announcing that it too would charge</span></a><span data-dcnode-id="3093" instrument_node=""> £2/day from January 2022 for those who use their phone in Europe.</span></li><span data-dcnode-id="3091" instrument_node="">
</span><li data-dcnode-id="3084"><strong data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Three</span></strong><span data-dcnode-id="3088" instrument_node=""> </span><a data-dcnode-id="3086" data-link-id="announced-in-september-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2021/09/three-to-introduce-roaming-charges-from-may-2022/"><span data-dcnode-id="3087" instrument_node="">announced in September</span></a><span data-dcnode-id="3085" instrument_node=""> that it would also start charging new and upgrading customers roaming fees of £2/day to use their monthly allowance in Europe from May 2022.</span></li><span data-dcnode-id="3083" instrument_node="">
</span></ul><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3080" instrument_node="">Elsewhere, </span><strong data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">O2</span></strong><span data-dcnode-id="3077" instrument_node=""> has limited its 'fair use' data cap, although other providers including </span><strong data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Sky Mobile</span></strong><span data-dcnode-id="3074" instrument_node=""> have said&nbsp;they have no plans to change their current mobile roaming policy. See our&nbsp;</span><a data-dcnode-id="3072" data-link-id="cheap-mobile-and-data-roaming-4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/mobiles/cheap-roaming-calls/"><span data-dcnode-id="3073" instrument_node="">Cheap mobile and data roaming</span></a><span data-dcnode-id="3071" instrument_node="">&nbsp;guide for more.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">If you're not sure what you'll be charged, it's best to check with your provider directly.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><h4 data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">The EU's cap on unexpected data use has been written into UK law</span></h4><span data-dcnode-id="3063" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Another feature of the EU roaming rules was that there was a default €50 (£44) cap on monthly data usage when you travel anywhere in the world&nbsp;– not just within the EU. The idea was to protect travellers from huge unexpected mobile bills.</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">The Government has now written a similar measure into UK law, which is now in effect, so this will continue to apply. The default cap has been set at £45 per monthly billing period.</span></p><span data-dcnode-id="3057" instrument_node="">
</span></div><span data-dcnode-id="3055" instrument_node="">
</span></div><span data-dcnode-id="3053" instrument_node="">
</span></div><span data-dcnode-id="3051" instrument_node="">
</span></div><span data-dcnode-id="3049" instrument_node="">
</span></div><span data-dcnode-id="3047" instrument_node=""> </span></li><span data-dcnode-id="3045" instrument_node="">
</span><li data-dcnode-id="3004"><a class="numbered-list-anchor" data-dcnode-id="3044" id="holiday-9"></a><span data-dcnode-id="3043" instrument_node="">
</span><div class="numberedListItem component section odd col-xs-12 analytics-numberedlistitem_199" data-dcnode-id="3006"><span data-dcnode-id="3042" instrument_node="">
</span><div data-dcnode-id="3034"><span data-dcnode-id="3041" instrument_node="">
</span><div class="component-content" data-dcnode-id="3036"><span data-dcnode-id="3040" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Buying a package holiday from an EU company that targets Brits? You still get the same protection</span></h3><span data-dcnode-id="3037" instrument_node="">
</span></div><span data-dcnode-id="3035" instrument_node="">
</span></div><span data-dcnode-id="3033" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="3008"><span data-dcnode-id="3032" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="3031" id="1359323588" style="visibility:hidden"></a><span data-dcnode-id="3030" instrument_node="">
</span><div class="richText component section default-style first odd last col-xs-12 analytics-richtext" data-dcnode-id="3010"><span data-dcnode-id="3029" instrument_node="">
</span><div class="component-content" data-dcnode-id="3012"><span data-dcnode-id="3028" instrument_node="">
</span><div class="richText-content" data-dcnode-id="3014"><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Under EU law, which applied until the end of the transition period, travel firms from outside the UK that targeted UK consumers had to provide protection to them in the event of their company going bust.</span></p><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">This has continued as the Government has now amended UK law so that&nbsp;EU traders selling package holidays or 'linked travel arrangements' in the UK, or specifically targeting these at customers in the UK, must comply with insolvency protection requirements. This was already the case before the trade deal was agreed.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3020" instrument_node="">It's worth bearing in mind that&nbsp;consumers who purchase packages from EU-based traders that are not targeting the UK for business will not get the same protection&nbsp;– so you may need to check.</span><a data-dcnode-id="3019" data-link-id="-1" id="pets"></a><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node=""> </span></p><span data-dcnode-id="3015" instrument_node="">
</span></div><span data-dcnode-id="3013" instrument_node="">
</span></div><span data-dcnode-id="3011" instrument_node="">
</span></div><span data-dcnode-id="3009" instrument_node="">
</span></div><span data-dcnode-id="3007" instrument_node="">
</span></div><span data-dcnode-id="3005" instrument_node=""> </span></li><span data-dcnode-id="3003" instrument_node="">
</span><li data-dcnode-id="2876"><a class="numbered-list-anchor" data-dcnode-id="3002" id="holiday-10"></a><span data-dcnode-id="3001" instrument_node="">
</span><div class="numberedListItem component section even col-xs-12 analytics-numberedlistitem_152" data-dcnode-id="2878"><span data-dcnode-id="3000" instrument_node="">
</span><div data-dcnode-id="2992"><span data-dcnode-id="2999" instrument_node="">
</span><div class="component-content" data-dcnode-id="2994"><span data-dcnode-id="2998" instrument_node="">
</span><h3 class="title-heading" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">If you take a pet to Europe in 2021, you'll face more red tape</span></h3><span data-dcnode-id="2995" instrument_node="">
</span></div><span data-dcnode-id="2993" instrument_node="">
</span></div><span data-dcnode-id="2991" instrument_node="">
</span><div class="numberedListItem-container" data-dcnode-id="2880"><span data-dcnode-id="2990" instrument_node="">
</span><a aria-hidden="true" data-dcnode-id="2989" id="1912656961" style="visibility:hidden"></a><span data-dcnode-id="2988" instrument_node="">
</span><div class="richText component section inline-image-quater-width first odd col-xs-12 col-sm-12 col-lg-12 analytics-richtext_1711313938" data-dcnode-id="2930"><span data-dcnode-id="2987" instrument_node="">

</span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Until and including 31 December 2020, owners of dogs, cats and ferrets could travel with their animals to and from EU countries under the EU Pet Travel Scheme,&nbsp;provided they hold a valid EU pet passport. To get a passport, pets had to be taken to a vet before travel, microchipped and vaccinated against rabies.</span></p><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">But if you're travelling to the EU or Northern Ireland in 2021 or beyond,&nbsp;you’ll need to take the following steps on your first trip. These steps are similar to the previous process, but you’ll need an animal health certificate (AHC) instead of a pet passport:</span></p><span data-dcnode-id="2959" instrument_node="">
</span><ul data-dcnode-id="2945"><span data-dcnode-id="2958" instrument_node="">
</span><li data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">You must have your dog, cat or ferret microchipped.</span></li><span data-dcnode-id="2955" instrument_node="">
</span><li data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">You must vaccinate your dog, cat or ferret against rabies – your pet must be at least 12 weeks old before it can be vaccinated and you must wait 21 days after the primary vaccination before travel.</span></li><span data-dcnode-id="2952" instrument_node="">
</span><li data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">You must visit your vet to get an&nbsp;AHC&nbsp;for your pet no more than 10 days before travel.</span></li><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">In addition, if travelling to Finland, Malta, Northern Ireland, Norway or Republic of Ireland with a dog, you need to ensure it's&nbsp;received treatment for tapeworm one to five days before arrival in these countries. This needs to be detailed on the pet's animal health certificate.</span></li><span data-dcnode-id="2946" instrument_node="">
</span></ul><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2943" instrument_node="">As long as you keep your pets' rabies vaccinations up-to-date, you will not need to get repeat vaccinations for subsequent trips to the EU or&nbsp;Northern Ireland (other than for tapeworm treatments for dogs visiting those countries listed above). But you will need to visit your vet to apply for a new AHC for each trip. Full details can be found in our </span><a data-dcnode-id="2941" data-link-id="taking-pets-to-the-eu-or-northern-ireland-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysavingexpert.com/news/2020/12/pets-on-hols/"><span data-dcnode-id="2942" instrument_node="">Taking Pets to the EU or Northern Ireland</span></a><span data-dcnode-id="2940" instrument_node=""> news story and on the </span><a data-dcnode-id="2938" data-link-id="government-website-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/pet-travel-to-europe-from-1-january-2021%23travelling-to-the-eu-or-ni-with-your-pet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2939" instrument_node="">Government website</span></a><span data-dcnode-id="2937" instrument_node="">.</span></p><span data-dcnode-id="2935" instrument_node="">
</span></div><span data-dcnode-id="2933" instrument_node="">

</span><h3 class="accordion-title component" data-dcnode-id="2916"><span data-dcnode-id="2923" instrument_node=""> </span><a class="accordion-title-link" data-dcnode-id="2918" href="#accordion-content-01870675718-0" role="button" title="What about other animals?"><span data-dcnode-id="2922" instrument_node=""> </span><span class="accordion-title-text" data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">What about other animals?</span></span><span data-dcnode-id="2919" instrument_node=""> </span></a><span data-dcnode-id="2917" instrument_node=""> </span></h3><span data-dcnode-id="2915" instrument_node="">
</span></header><span data-dcnode-id="2913" instrument_node="">

</span><div class="richText-content" data-dcnode-id="2900"><span data-dcnode-id="2905" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2904" instrument_node="">Most household pets, aside from cats, dogs and ferrets, aren't covered under one harmonised rule. So if you want to take one abroad, you'll have to comply with the national rules of the EU country you're going to.</span><a data-dcnode-id="2903" data-link-id="-1" id="driving"></a></p><span data-dcnode-id="2901" instrument_node="">
