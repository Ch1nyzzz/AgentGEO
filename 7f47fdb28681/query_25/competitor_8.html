</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">United Kingdom’s Exit from the European Union
</span></p><h2 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Abstract</span></h2><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1299" instrument_node="">This paper discusses the recent decision and vote in the United Kingdom (UK) to break from the European Union (EU) after being a member for over 40 years.&nbsp; Many </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ukessays.com/dissertation/examples/politics-examples/why-did-brexit-happen.php"><span data-dcnode-id="1298" instrument_node="">factors</span></a><span data-dcnode-id="1296" instrument_node=""> went into the people’s decision to leave the EU and even then, the vote to leave was very close, with the majority winning by a relatively slim number.&nbsp; Those who voted to leave think it is the correct move for the UK, just as those who voted against the separation think there could be negative effects. Even though the majority of voters voted to leave the EU, it will still take years before the process can be completed due to legal aspects that must be adhered too.&nbsp; This does not include that fact that no country has ever left the EU, so there are some areas of </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ukessays.com/essays/politics/brexit-causes-consequences-124.php"><span data-dcnode-id="1295" instrument_node="">uncertainty as well</span></a><span data-dcnode-id="1293" instrument_node="">.&nbsp; Even then, there is still a possibility that the British Prime Minister may over rule the vote and decide to remain in the EU, even if against voters’ wishes. </span></p><div class="alert alert-light border-0 my-3" data-dcnode-id="1278" data-nosnippet="data-nosnippet" data-track="In-Content Banner 1"><span data-dcnode-id="1291" instrument_node="">
</span><div class="card-body text-dark text-center" data-dcnode-id="1280"><span data-dcnode-id="1290" instrument_node="">

</span><h2 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">United
Kingdom Exit from the European Union</span></h2><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">When
it comes to politics, everyone has their own opinion on what is best and what
is not.&nbsp; To each individual, they feel that
their views are correct, and often times the other side is incorrect in their
way of thinking.&nbsp; Now imagine taking that
to a much larger scale and instead of just having a difference of opinion in
politics and what political party should run a country for the coming years,
include the actual fate of a country.&nbsp;
This is exactly what the United Kingdom (UK) did in June 2016.&nbsp; They held a vote for what direction the UK
would take for the years to come.&nbsp; This
vote was to determine whether or not to remain a part of the European Union
(EU), which they had been a member of for over 40 years.&nbsp; As with any major decision that impacts a
country, there are those that feel the move to break away was the right
decision and the UK will be better off, since they will not have to abide by
the rules that have been imposed by the EU.&nbsp;
Just as there are those that feel that leaving the EU is a major mistake
and feel that the break from the EU will be disastrous.&nbsp; This exiting of the United Kingdom has been
called Brexit, which is essentially short for Britain and exit.&nbsp;&nbsp;
</span></p><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Being
part of the EU has many advantages for those living in the UK.&nbsp; It is not just financially advantageous or
beneficial to have strength in number to being a member a of the EU.&nbsp; According to Occupytheory.org (2014), six
advantages of being a member of the EU are:
</span></p><ol data-dcnode-id="1257"><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Low prices of goods – there exists a ‘Single Market’ for all member countries wherein products are low-priced and there are no charges when it comes to custom tax; custom tax is usually charged when goods are transported or sold between states/countries but this is not applied among member countries.</span></li><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Citizens are free to move from one member country to another – citizens can freely travel, study, work, or live in any European country of their choice.</span></li><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">More jobs are generated – more or less than 3.5 million jobs have been generated over the years.</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Development of deprived regions – some member countries of the EU are economically deprived and through the ‘European Structural Funds’, deprived regions are developed.</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Louder voice – the EU is able to ensure that all their concerns are taken seriously and heard internationally since it speaks in behalf of millions of people.</span></li><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Workers are protected – this is made possible through the European Working Time Directive; the directive includes regulations regarding holidays, working hours, breaks, etc.</span></li></ol><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Essentially,
the EU is what is known as a single market.&nbsp;
What that means is that members of the EU have free roam of all EU
nations.&nbsp; They can free travel between
countries without having to have a passport or other travel documents required
by people from outside the EU.&nbsp; It also
allows for people to more easily work and live outside of their home
country.&nbsp; It also helped with trade among
EU nations as they did not have to pay tariffs for trade amongst each other.
</span></p><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Just
as there are advantages of being a member of the EU, there are also
disadvantages.&nbsp; According to Tejvan
Pettinger (n.d.), six disadvantages of being a member of the EU are:
</span></p><ol data-dcnode-id="1239"><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Cost.&nbsp; The costs of EU members to the UK is £15bn gross (0.06% of GDP) – or £6.883 billion net.</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Inefficient policies.&nbsp; A large percentage (40%) of UE spending goes on Common Agricultural Policy.</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Problems of the Euro.&nbsp;&nbsp; Members of the EU doesn’t necessarily mean membership of the EURO.</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Pressure towards austerity.&nbsp; Since 2008, many southern European countries have faced pressure from the EU to pursue austerity – spending cuts to meet budget deficit targets, but in the middle of a recession these austerity measures have contributed to prolonged economic stagnation.</span></li><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Net migration.&nbsp; Free movement of labour has caused problems of overcrowding in UK cities.</span></li><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">More bureaucracy less democracy.&nbsp; It is argued that the EU has created extra layers of bureaucracy whilst taking away decision making process further from local communities.</span></li></ol><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">When it came time for the referendum, or vote, for whether or not to stay within the EU, nearly 30 million people voted, which equated to an approximate 71.8% voter turnout.&nbsp; Once the votes were in, the margin of victor was relatively small.&nbsp; The percentage of votes to Leave was 51.9% and percentage of votes to stay was 48.1%, which means that the Leave vote only won by only 3.8 percent.&nbsp; It was not just Great Britain that was voting and would be impacted by the UK leaving the EU, due to the UK being made up of three other countries as well:&nbsp; Wales, Scotland, and Northern Ireland.&nbsp; With the exception of the vote in Scotland, votes from the other three countries taking part in the UK vote were fairly close.&nbsp; The over breakdown was “England voted for Brexit, by 53.4% to 46.6%.&nbsp; Wales also voted for Brexit, with Leave getting 52.5% of the vote and Remain 47.5%.&nbsp; Scotland and Northern Ireland both backed staying in the EU.&nbsp; Scotland backed Remain by 62% to 38%, while 55.8% in Northern Ireland voted Remain and 44.2% Leave.”&nbsp; (Hunt &amp; Wheeler, 2017).&nbsp; &nbsp;&nbsp;
</span></p><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Considering the vote, why did the vote to leave the EU come about in the first place?&nbsp; For years, the UK Independence Party has campaigned to leave the EU.&nbsp; They felt that the UK was being held back by the EU due to the rules and restrictions that were placed on businesses.&nbsp; There was also the matter of the amount of money that the UK paid annually to be a member of the EU.&nbsp; They were paying billions of pounds each year, but they did not feel that they were getting enough in return for what they paid.&nbsp; Border control was another issue that was used as part of the Leave campaign.&nbsp; Due to EU borders rules, the UK was limited on what they could do in regards to controlling their border and the amount of immigration.&nbsp; Since members of the EU had open borders to other EU nations, people from poorer countries wanted to move to richer countries to live and work, thus creating a influx of people.&nbsp; There was also concern that this influx of people was taking needed resources and jobs from those already living in the UK.&nbsp; This in turn took away jobs and added to the welfare system.&nbsp; The members of the Independence Party and their supporters are not opposed to immigration, that just wanted to be able to control the numbers and who came into the country and they were unable to do that under EU rules.&nbsp; When it came to the Leave campaign the Independence Party had support from other public officials.&nbsp; They had approximately half of the Conservative Party Members of Parliament (MP) and some of the Labour Party MPs.&nbsp; One other group that was significant was the Democratic Unionist Party (DUP) out of Northern Ireland.&nbsp; Although Northern Ireland voted to Remain, the DUP most likely helped to keep the vote closer then it could have been, similar to how the vote went in Scotland.&nbsp; There was also a concern that the EU was trying to create more a single country, similar to the Untied States of America.&nbsp; This would then take away individual countries identities, as they would be unified.&nbsp; “One of the major sticking points in the conversation has been immigration concerns, as some Brits worry that the country’s employment market and social services will drown under the weight of too many new residents. There’s also the worry that upper-crust elites and Brussels bureaucrats are pushing for a continental identity that diminishes the U.K.’s own sense of self.”&nbsp; (Rosenfeld, 2016).
</span></p><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">When it came for the campaign to stay in the EU, there was no real added bonus, besides remaining a member of the EU.&nbsp; The argument was that being a member of the EU helped economically due to single market trade.&nbsp; They tried to battle to immigration fears by saying that the people that were immigrating to the UK where helping and were not creating a burden, since they came to work which in turn helped the economy.&nbsp; The strongest argument to Remain was that they are more powerful in numbers.&nbsp; The UK on its own does not have as big a voice, since they would be a single entity, as opposed to being one of 27 other countries who could stand together as one, thus making them more powerful due to numbers and economics.
</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Although the exact numbers are not known on what demographic voted the most and whether or not they voted for Leave or Remain, there is an idea due to polling that was conducted after the referendum.&nbsp; “The results found that 64% of those young people who were registered did vote, rising to 65% among 25-to-39-year-olds and 66% among those aged between 40 and 54. It increased to 74% among the 55-to-64 age group and 90% for those aged 65 and over. It is thought that more than 70% of young voters chose to remain in the EU.”&nbsp; (Helm, 2017).&nbsp; What this shows is that the highest voter percentage turnout was from the older generation, increasing with each age group.&nbsp; What was the most surprising though is the high number of voter turnout for young voters, with young voters being between the age of 18-24. &nbsp;There was even some speculation as to what would have happened if 16-17 year olds had been allowed to vote due to that being a possible 1.6 million additional voters, which could have made the referendum a lot closer.&nbsp; Even with these numbers, there is no way to know if it would have been enough to sway the vote to Remain.
</span></p><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Since the outcome of the referendum has been determined and the UK will leave the EU, what are the steps for this to take place since it is not as easy as just not being part of the EU one day? &nbsp;The uncertainty of it all is that this has never been done, due to&nbsp; Article 50 only came into existence in 2009.&nbsp; Article 50 is what created a way for a member country of the EU to leave. To start, it will take at least two years for everything to be negotiated for its withdrawal from the EU.&nbsp; During this time the UK will still abide by EU rules, but they will not be able to take part in any decision-making process.&nbsp; According to Hunt &amp; Wheeler (2017), as posted on BBC News, the following are the steps needed for the UK to leave the EU, to include a legal challenge to invoke Article 50:
</span></p><ol data-dcnode-id="1203"><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">November 2016:&nbsp; Legal challenge to government’s right to invoke Article 50 without consulting Parliament succeeds.&nbsp; MPs approve bill in March 2017.</span></li><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Two year time limit begins.</span></li><li data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">29 March 2017:&nbsp; UK invokes Article 50 of the Treaty on European Union.</span></li><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Remaining 27 EU countries meet 29 April to discuss withdrawal.</span></li><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Negotiations begin between UK and EU.</span></li><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Draft deal put to European Council (27 members).</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Needs approval from at least 20 countries with 65% of the population.</span></li><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Ratification by European Parliament</span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">UK introduces Great Repeal Bill to revoke the 1972 European Communities Act.</span></li><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">After two years, negotiations can be extended if all 27 countries agree but if not EU treaties cease to apply to the UK.</span></li><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">The UK leaves the European Union</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Great Repeal Act comes into force, copying EU laws into UK law, to give time for UK to amend or repeal them.</span></li></ol><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Besides the political and bureaucratic process that has to be completed by the politicians, as well as questions they need answered, there are still questions from the voter as to what happens next and these questions will need to be answered during the two year exit process.&nbsp;&nbsp; Some people are worried about the safety of their products, but this is unlikely to change due to creating two items.&nbsp; Others are worried about their health care and if they will be able to continue with their health care if they live abroad.&nbsp; That in of itself is another question.&nbsp; What happens to the people from the UK that already are living or working in another EU country or those from another country working in the UK.&nbsp; For UK citizens working outside of the UK and non UK citizens working in the UK, most likely nothing will change.&nbsp; They will be able to continue working where they are.&nbsp; For those planning on retiring outside of the UK, that could be another question and will have to be part of the decision making process for all those involved within the UK government and the EU, since this type of movement was under the freedom of movement that was allowed as a member of the EU.&nbsp; People are concerned about the housing market being impacted.&nbsp; There has been a slight decrease in the housing market from June to December 2016.&nbsp; Business owners are worried about having to pay tariffs once Brexit takes effect, since they have not had to pay tariffs as part of the EU.&nbsp; This is another situation that will have to be negotiated during the exit process between the UK and the EU.&nbsp; “People are also worried about the economy itself. The U.K.’s Treasury itself reported that its analysis showed the nation “would be permanently poorer” if it left the EU and adopted any of a number of likely alternatives. Productivity and&nbsp;GDP&nbsp;per person would be lower in all these alternative scenarios, as the costs would substantially outweigh any potential benefit of leaving the EU” (Rosenfeld, 2016).&nbsp; Some people even think that the economy will become weaker due to reduced contributions from immigrants.&nbsp; The Internationla Monetary Fund, along with the Bank of England, have said that there could be long term economic impacts.
</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Besides the EU, it is possible that the financial impact to be felt globally. “In Europe, the EU could run into economic trouble for a couple of reasons. The lengthy and as-yet ambiguous exit negotiations could cripple investment, as mentioned above, but they could also lead to&nbsp;more exits.”&nbsp; (Rosenfeld, 2016).&nbsp; With the EU being a single market when it comes to trade, it has been advantageous for businesses due to no tariffs when crossing European country lines.&nbsp; However, businesses are concerned that due to the UK’s exit, they channels of free trade could go away, thus making it more expensive to ship goods in and out of the UK.&nbsp; This may make companies want to leave the UK for other European countries who still are in the single market.&nbsp; This could impact billions of dollars.&nbsp; Brexit could also end up impacting the U.S.&nbsp; “In the U.S., billions, if not trillions, of dollars could be called into question by a British exit: In 2014, American direct investment into the EU totaled about 1.81 trillion euros, and about 1.99 trillion euros flowed in the opposite direction,&nbsp;according to the European Commission.”&nbsp; (Rosenfeld, 2016).&nbsp; It is not just Europe and the U.S. that have these fears, but multiple other global companies that do business with the UK and the EU.&nbsp; Just like with the stock market, when something bad happens in one country, it can be felt in various forms across the globe, due to the would be more globalized and working together.&nbsp; With many of those that voted to Leave, they are not concerned with global corporations or investors in these companies that are looking at the bottom line, not what people think is best for their country.
</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Based on how a member of the UK voted, Leave or Remain, it is fairly easy to determine what they thought about Brexit itself.&nbsp; However, with the UK exiting the EU and the potential impact it can have on other EU countries, gauging how they feel could either help or hinder the transition and negotiation process due to emotions.&nbsp;&nbsp; “A 16-country poll by Ipsos Mori showed that almost half — 48 per cent — of respondents from Sweden said they were dismayed by the UK’s decision. It was a different story in France, where only a quarter of respondents said they were sad about Brexit.” (Mertens, 2016).&nbsp; The US and Russia were also polled on their feelings of the UK leaving the EU.&nbsp; Of those polled, in the US, approximately 20% said they were dismayed and the UK’s decision.&nbsp; In Russia, only about 6% of Russians polled were dismayed, with 54% thinking that the UK deciding to part ways with the EU was a good idea and in their own best interest.&nbsp; However, “a majority of respondents in most countries felt that Brexit would be bad for the UK economy.&nbsp; Japan was especially gloomy, with more than two-thirds of respondents expecting Britain to experience an economic downturn.” (Mertens, 2016).&nbsp; Polls that were conducted can give a general idea of what the common people thought of Brexit, but there were also mixed and neutral thoughts from world leaders.&nbsp; The following quotes from world leaders, as posted on BBC news Brexit: World reaction as UK votes to leave EU (2016), are just a few of the world leader reactions.
</span></p><blockquote class="wp-block-quote" data-dcnode-id="1188"><p data-dcnode-id="1189"><span data-dcnode-id="1195" instrument_node="">“This is a painful choice and it is deeply regrettable both for the UK and Europe. But this choice is theirs and we must respect it, accepting all the consequences.” </span><cite data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node=""> </span><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Francois Hollande, French President</span></strong><span data-dcnode-id="1191" instrument_node=""> </span></cite></p></blockquote><span data-dcnode-id="1187" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1182"><p data-dcnode-id="1183"><span data-dcnode-id="1186" instrument_node="">“We take note of the British people’s decision with regret. There is no doubt that this is a blow to Europe and to the European unification process.” </span><cite data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Angela Merkel, Chancellor of Germany </span></cite></p></blockquote><span data-dcnode-id="1181" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1176"><p data-dcnode-id="1177"><span data-dcnode-id="1180" instrument_node="">“The people of the United Kingdom have spoken, and we respect their decision. The special relationship between the United States and the United Kingdom is enduring, and the United Kingdom’s membership in Nato remains a vital cornerstone of US foreign, security, and economic policy.”&nbsp; </span><cite data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Barack Obama, US President </span></cite></p></blockquote><span data-dcnode-id="1175" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1170"><p data-dcnode-id="1171"><span data-dcnode-id="1174" instrument_node="">“Victory for freedom! The British people have given to Europeans and to all the people of the world a shining lesson in democracy. </span><cite data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Geert Wilders, Dutch Freedom Party leader </span></cite></p></blockquote><span data-dcnode-id="1169" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1162"><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">“It’s an explosive shock. At stake is the break-up pure and simple of the union.&nbsp; </span></p><p data-dcnode-id="1163"><span data-dcnode-id="1166" instrument_node="">“Now is the time to invent another Europe.” </span><cite data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Manuel Valls, French Prime Minister </span></cite></p></blockquote><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Depending on who one asks, there is a difference of opinions on whether or not the UK can survive Brexit.&nbsp; Tom Campbell (2017) quoted the research director at the Centre for London as saying “Brown agrees that London will retain its dominance – even if terms are less favourable: “London has an unrivalled agglomeration of financial and other service firms. Some may relocate, some may choose to expand elsewhere, but many will remain in London.”&nbsp; Just as Richard Brown thinks that the UK will be ok after Brexit, others still hold a different opinion and feel that Brexit will be detrimental for the UK.&nbsp; Direcctor of World Cities Cultural Forum, Paul Owens, is one of these peole that feels Brexit was bad.&nbsp; He stated “There’s no doubt the decision to leave the EU poses a threat to London’s creative economy. The sector has prospered on diversity, free movement of artistic talent and international supply chains. London’s cultural assets are considerable, but it is likely to be diminished over the next decade unless there is a suitable policy response.” (Campbell, 2017).&nbsp; Ashoka Mody is another believer that the UK will survive Brexit and even points out that much of the UK’s trade is outside of the EU.&nbsp; “Following Brexit, productive British trade with the European Union&nbsp;will survive just fine&nbsp;wherever it is based on long-lasting economic gains and social relationships. At the same time, the shift toward trade with the faster-growing United States and Asia will continue.” and “Almost all new British trade is being created outside of Europe.”&nbsp;(Mody, 2016).&nbsp; So even if members of the EU are initially upset with the UK and make trade difficult initially, the UK still has other sources of economic stability.&nbsp; Another aspect of why the UK will survive is literally about money. “As Nobel Prize winning economist Paul Krugman points out, the U.K. has a significant advantage compared to other nations:&nbsp; they have the British pound.” (Tepper, 2016).&nbsp; Even with some people thinking that the UK leaving the EU could ending up irreversibly harming the UK, there are still others that have a good understanding of what is going on and understand that although there may be some set backs, thing will not be as bad as some would like things to appear at face value. </span></p><div class="alert alert-info border-0 my-3" data-dcnode-id="1145" data-nosnippet="data-nosnippet" data-track="In-Content Banner 2"><span data-dcnode-id="1158" instrument_node="">
</span><div class="card-body text-center" data-dcnode-id="1147"><span data-dcnode-id="1157" instrument_node="">

</span></div><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">There are also those that look at whether or not the EU will be able to survive the UK’s departure.&nbsp; Realistically, those that think the EU can’t not survive without the UK, do not know history, since the UK was not initially part of the EU.&nbsp; Plus, there multiple other counties that want to the EU.&nbsp; A potential issue with the countries that want to join, and may be the reason they have not been allowed to join yet, is these countries are poorer countries.&nbsp; Due to this they would most likely not provide as many resources to into the EU as they would receive.&nbsp; This is part of the reason the UK voted to Leave, paying more into the EU then they received back.&nbsp; “The EU can certainly survive without Britain – but it cannot survive without buy-in from the public. Without a substantial change in how the EU communicates to the people in member countries, there will be a much greater threat to the EU than Brexit – and that threat is the EU itself.” (Can the EU survive after Brexit?, 2017).&nbsp;
</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Even though the some people do not feel that the future of the UK is a bleak as others would have people believe, they still have an up hill battle ahead of him.&nbsp; Especially when it comes to to having to renegotiate trade deals within the EU, since the other 27 countries that the UK just divorced are likely to not be overly happy about their departure.&nbsp; With the EU being the more powerful entity, they may have an upper hand when it comes to the negotiating table.&nbsp; In an opinion poll that was conducted in 2016, French, German, Swedish, and Finnish feel that when it comes to post-Brexit negotiations, the UK should not receive any favors.&nbsp; “Germans and the French were the most opposed to offering Britain a “generous deal” that pays tribute to Britain’s role as a neighbour and “important trading partner”, according to the YouGov survey.&nbsp;
</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">In both countries,&nbsp;53 per cent of respondents&nbsp;said it
should not expect any favours, compared to&nbsp;27 per cent who said the EU
should offer Britain a “generous deal”.” (Sims, 2016).&nbsp; One the flip side of that, people are willing
to take a softer stance if the UK is still willing to continue with the free
movement of workers and to keep with the pre-Brexit agreements about letting EU
citizens to work and live in the EU.&nbsp;
Although that could potentially alleviate some of the Brexit negotiation
headaches, at the same time it goes against one of the big reasons that many
people wanted to vote Leave.&nbsp; That is the
free movement of people into the UK and not have control of their own border.
</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">No matter how it is looked at, the topic of the UK wanting to leave the EU is a hot topic item.&nbsp; People on both sides of the fence have strong opinions of whether to Leave or Remain, and rightly so considering the referendum was and probably will be one of the most impactful decisions they will see in their life.&nbsp; It is also hard to say which side is correct in their way of thinking.&nbsp; One could look at it as the older more experienced generation, choose to leave due to what they have seen and experienced in their life time and tend to have more of a nationalistic point of view.&nbsp; Just as the younger generation tended to vote to remain, although they do not have as much life experience or have seen as much, they tend to have more of an open mindset of how things should be.&nbsp; When it came to the vote to leave and the two sides were campaigning for what they thought was right, there seemed to be two main reasons.&nbsp; The first was the immigration issue and not having conrol of their own borders.&nbsp; Whether or not the huge influx of immigrants actually took many jobs or economically taxed the UK systems, could be a matter of opinion, depending on how the numbers were spun and ones point of view.&nbsp; Some even cited the immigration issue as a threat to society due to not border control, so extremists could more easily travel and hide within EU contries.&nbsp; The other main topic was that many people felt that the EU was holding the UK back due to their rules and regulations.&nbsp; They felt that it restricted business and did not allow them to thrive they way they felt they could.
</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">No matter what the reason, a big concern for many people is whether or not the UK can survive Brexit.&nbsp; The answer is yes.&nbsp; Will they be as strong or globally powerful as they were when part of the EU, that is yet to be seen as only time will tell.&nbsp; However, the UK is still an economic power with many resources and the UK failing would spell global disaster.&nbsp; So even with the EU being upset up what is going on, it is not in their best interest for the UK to fail.&nbsp; This does not mean that it will be an easy road for the UK during the two years leading up to their actually departure date.&nbsp; There are a multitude of negotations that much be completed, with the UK possibly having to not get as good of deals as they would prefer.&nbsp; There are also many laws within the UK that will need to be looked at and either used, amended, or be thrown out based on what is in their best interest.&nbsp; All in all, the situation is overcomeable and there will not be any major catastrophic outcomes that topples a government, although some would believe that is the case.&nbsp; However, a very real possibility, based on how the transition for the UK goes from being a member of the EU to not being a member of the EU, is if other EU countries will follow suit.&nbsp; As it is very possibily that the UK could be paving the way for others to follow.&nbsp; After all, Article 50 came about in 2009 and it only took eight years for an EU member country to use it.&nbsp; Whose to say that once this divorce of the UK and EU is done, someone else doesn’t follow suit.&nbsp; That is the EU’s biggest fear.
