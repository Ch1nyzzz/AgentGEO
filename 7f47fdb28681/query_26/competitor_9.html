d — the system must change with it" data-o-component="o-comments" href="#comments-anchor" id="o-comments-count" style="visibility: visible;" title="Jump to comments section"><span data-dcnode-id="4105" instrument_node="">72</span></a><a class="article-print" data-component="print-button" data-dcnode-id="4101" data-trackable="print" href="javascript:void(0)" title="Print this page"><span class="o-normalise-visually-hidden" data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Print this page</span></span></a></div><div class="article__content-sign-up" data-dcnode-id="4086"><div class="article__content-sign-up-topic-title" data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">Receive free Health Care updates</span></div><p class="article__content-sign-up-topic-description" data-dcnode-id="4088"><span data-dcnode-id="4089"><span data-dcnode-id="4097" instrument_node="">We’ll send you a </span><i data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">myFT Daily Digest</span></i><span data-dcnode-id="4094" instrument_node=""> email rounding up the latest </span><span data-dcnode-id="4092" instrument_node="">Health Care</span><span data-dcnode-id="4090" instrument_node=""> news every morning.</span></span></p><iframe class="article__content-sign-up-iframe close" data-dcnode-id="4087" height="64px" id="signUpIframe" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/register/in-article-sign-up%3Fft-content-uuid%3D71dd6d82-2f69-4f74-826f-5507cce12d62%26concept-id%3D9f539c73-3ee3-4025-9578-43de5dd6c213&amp;raw"></iframe></div><div class="article__content-body n-content-body js-article__content-body" data-dcnode-id="4053"><div class="article__content-body n-content-body js-article__content-body" data-attribute="article-content-body" data-dcnode-id="4054"><span data-dcnode-id="4085" instrument_node="">
</span><p data-dcnode-id="4082"><em data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">The writer is a GP in London</span></em></p><p data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">It is often said that primary care is the foundation of the health service and that general practitioners are the bedrock of the NHS. This status comes with privilege and responsibility. Privilege because the NHS remains one of the most comprehensive and fair health systems globally. Responsibility because just over 1m consultations occur every weekday across the country in general practice, providing patients with a safe space to share information about their illnesses, woes and challenges. When they do not know where to seek help, patients turn to general practice. These values are the reasons I became a GP. </span></p><p data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">However, the job is now far more demanding and stressful than I could have imagined when I first entered a surgery a few years ago. The anxiety and uncertainty with Covid-19 has exacerbated this as interactions with patients have become limited. The nature of general practice is different now. </span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="4075" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu" data-o-ads-targeting="pos=mid;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="4076" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="4077"></div></div></div><p data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Expectations have shifted. Many patients want the same healthcare service as they see in banking, retail, transport and hospitality. Instant access and on demand. Why can’t I book an appointment when it is convenient for me? Why can’t I access the doctor when I need it most? Why do I have to go through so many hoops to get a blood test? These desires are valid but there is limited staff and infrastructure to provide this level of service. </span></p><p data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">The concept and meaning of work is also changing. Among my peers, many are now salaried, or locum, GPs rather than pursuing the traditional route of investing in a practice and becoming a partner and an independent contractor to the NHS, which comes with administrative and human resources responsibilities. As a salaried GP, many see the role as a job like any other — they see their allocated patients, do their jobs and referrals, and then go home. They want flexibility and seek no additional commitment. This makes the role transactional. </span></p><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Many newly qualified GPs now have a choice of roles and of work patterns that were simply not open to their predecessors. I have seen peers join pharmaceutical companies, work in big tech, become venture capitalists, technology entrepreneurs, social media influencers and still continue to work one or two days as a GP. The concept of a portfolio GP is not new but it is more prominent. The challenge for a practice as an employer is that they must compete with this level of choice for talent. The portfolio work pattern also makes it a challenge for practice management to plan for the number of GPs available to see patients. This is where a multidisciplinary approach can make a huge difference, with nurses, physios and pharmacists all sharing the workload.</span></p><p data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">Yet, while this approach is imaginative and necessary, the recent media frenzy around access to appointments and whether patients should be seen face to face or virtually has focused on an outdated model. The focus needs to be on reform and what the future of primary care is and should be. </span></p><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">How do we bring more appropriate care to our patients and continue to be safe and effective? How do we build multidisciplinary teams to ensure continuity of care? How do we ensure the use of technology is used effectively and safely? How do we bring diagnostics into the community? There needs to be a model that incentivises change and measures performance, clinical outcomes, quality and safety. </span></p><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">The new generation of GPs need to have a voice in what the future holds for the profession and how primary care is delivered. This should be done through engagement with the organisations that represent them in order to demonstrate what is possible. If primary care is to remain a foundation of our health system, modernisation is needed. Both the career and role need to change if newly qualified GPs are to contribute their energy and ideas over the many decades of their working lifetime. The health of Britons demands nothing less. </span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="4060" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu1" data-o-ads-targeting="pos=mid1;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="4061" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="4062"></div></div></div><p data-dcnode-id="4055"><br data-dcnode-id="4059"><br data-dcnode-id="4058"><br data-dcnode-id="4057"><br data-dcnode-id="4056"></p></div></div><div aria-hidden="true" class="o-ads advert in-article-advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="4050" data-o-ads-center="true" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="third-mpu" data-o-ads-targeting="pos=mid2;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="4051" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="4052"></div></div></div><div class="magnet-cta js-magnet-cta" data-dcnode-id="4047" data-trackable="magnet-cta"></div><div class="instant-alert-cta js-instant-alert-cta" data-concept-id="9f539c73-3ee3-4025-9578-43de5dd6c213" data-dcnode-id="4038" data-trackable="instant-alert-cta"><p class="instant-alert-cta__text" data-dcnode-id="4041"><span data-dcnode-id="4046" instrument_node="">Get alerts on </span><span data-dcnode-id="4044" instrument_node="">Health Care</span><span data-dcnode-id="4042" instrument_node=""> when a new story is published</span></p><button class="instant-alert-cta__enable" data-concept-id="9f539c73-3ee3-4025-9578-43de5dd6c213" data-dcnode-id="4039" data-trackable="enable"><span data-dcnode-id="4040" instrument_node="">Get alerts</span></button></div></div><div data-dcnode-id="4034"></div><div class="article-tools" data-dcnode-id="4013" data-trackable="article-tools"><footer class="n-content-copyright" data-dcnode-id="4024"><a data-dcnode-id="4032" data-trackable="link-copyright" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//help.ft.com/help/legal-privacy/copyright/copyright-policy/"><span data-dcnode-id="4033" instrument_node="">Copyright</span></a><span data-dcnode-id="403 a3e2561137cb coral coral-timestamp coral-comment-timestamp" data-dcnode-id="3616" datetime="2021-12-21T20:59:26.723Z" title="2021-12-21T20:59:26.723Z"><span data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">5 months ago</span></span></time></button></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29" data-dcnode-id="3611"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="3612"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="3578"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="3602"><div data-dcnode-id="3607"><span data-dcnode-id="3609" instrument_node="">A most interesting opinion piece. Dare I suggest that another factor changing the role of the GP is the technology itself? For example where previously doctors had to rely on snapshots of a patient's health when seen by a doctor or nurse, in many cases it can now be continuously monitored, remotely. Technology also enables patients to be treated more as individuals so that, for example, deviations in body temperature or blood oxygen saturation levels due to illness are measured against that patient's normal levels, which may differ significantly from the normal or the population. Finally genomic analysis now enables far more precise treatment of many conditions.  </span><br data-dcnode-id="3608"/></div><div data-dcnode-id="3605"><br data-dcnode-id="3606"/></div><div data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Finally, whilst engagement with the professional organisations is necessary, so is engagement with patient organisations too: patients should have a strong voice in agreeing the changes. </span></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="3579"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="3587"><button aria-label="Reply to comment by Charle L" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-comment-replyButton" data-dcnode-id="3596" data-testid="comment-reply-button" data-variant="flat" disabled="" id="comments-commentContainer-replyButton-931d9db6-f6f9-4056-b5b8-36efbac78f97" type="button"><span class="Box-root-acb8bd0953d79 9868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="3477"></div></div></div><div class="Comment-subBar-ba921fc4a55c74fb77d6d022771ac877" data-dcnode-id="3464"><button class="BaseButton-root-464189d43068742128bd39653c671d89 InReplyTo-button-1b97bda15992c6234c828006997068dd" data-dcnode-id="3465" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-inReplyTo Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="3466"><i aria-hidden="true" class="Icon-root-c1fc955f8607c3696518db8f02fb9080 Icon-sm-b43dbbab3c3f2b00596ba477436b5c63 InReplyTo-icon-9e2a7d5b036117ad5a18bd238ecd12e9" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">reply</span></i><span data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node=""> </span></span><span class="InReplyTo-inReplyTo-8e663cd21030e01c5faa3c438231177c coral coral-comment-inReplyToText" data-dcnode-id="3467"><span data-dcnode-id="3470" instrument_node="">In reply to </span><span class="InReplyTo-username-b1a83d4fe2733eac13578709b49e9d24 coral coral-comment-inReplyToUsername" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Notable</span></span></span></span></button></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="3412"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="3444"><div data-dcnode-id="3461"><span data-dcnode-id="3463" instrument_node="">No, spending on the NHS as a percentage of GDP rose almost every year until 2010 rising to a peak of 7.59%, until the country went into austerity because of high national debt. In 2019, it had fallen to 7.20% of GDP, but in real terms at £160 billion before Covid, it is at the highest spending level ever.</span><br data-dcnode-id="3462"/></div><div data-dcnode-id="3459"><br data-dcnode-id="3460"/></div><div data-dcnode-id="3455"><a data-dcnode-id="3457" href="https://www.nuffieldtrust.org.uk/chart/nhs-spending-as-a-percentage-of-gdp-1950-2020" rel="noopener noreferrer ugc" target="_blank"><span data-dcnode-id="3458" instrument_node="">https://www.nuffieldtrust.org.uk/chart/nhs-spending-as-a-percentage-of-gdp-1950-2020</span></a><br data-dcnode-id="3456"/></div><div data-dcnode-id="3453"><br data-dcnode-id="3454"/></div><div data-dcnode-id="3450"><span data-dcnode-id="3452" instrument_node="">In 2010, £2.50 of £10 raised in tax was spent on the NHS. Just before Covid, it had risen to £4 in every £10. Very soon, we will have an economy, whose sole purpose is to fund its national health service, because on it current trajectory and with an ageing population, there is no other course. </span><br data-dcnode-id="3451"/></div><div data-dcnode-id="3448"><br data-dcnode-id="3449"/></div><div data-dcnode-id="3445"><span data-dcnode-id="3447" instrument_node="">A 1950s model is no longer fit for purpose. Instead of the NHS becoming a political pinball machine, how the NHS operates should be reviewed and changes made to make it more efficient. This will require adopting best practices be it from Germany and/or USA and/or Singapore and/or anywhere else. Whilst, this is an anathema to many, it may well include the private sector. </span><br data-dcnode-id="3446"/></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data- 3054"><span data-dcnode-id="3055" instrument_node="">5 months ago</span></span></time></button></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29" data-dcnode-id="3048"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="3049"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="3009"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="3041"><div data-dcnode-id="3044"><span data-dcnode-id="3046" instrument_node="">As a derelict has been who is now merely a old patient the biggest change I see is that a GPs job now is absolutely nothing like the job we did 30 years ago. The big plus was continuity of care while now in many practices you rarely see the same person twice in a row. That may suit the part time 'GP' who does a few sessions a week and fit well for young people with an acute problem who really don't care who diagnoses and prescribes the antibiotic for their pneumonia. For those who think the notes will tell all the answer is they dont. There are dozens of subtile clues that one recognised instantly that are too subtile and numerous to record. Multidisciplinary integrated teams work very well for something like diabetes but it doesn't work for the frail elderly, many of the mentally ill or those with chronic or difficult problems where time and again it results in poor practice. We see examples of a patient seen by multiple people none of whom can compare the condition now with what it was before leading to late or failed treatment.</span><br data-dcnode-id="3045"/></div><div data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Then let us get on to the GP referrals that are refused by hospitals. Is this purely work load related or are there poor GPs that need a lot of extra training? In the far off days when I worked in hospital we got to know the quality of the local GPs and while there were many for whom we had great respect every area I worked in had a few useless rogues.</span></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="3010"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="3018"><button aria-label="Recommend comment by Time expired GP (Total: 15)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2 2c-4634-9e50-0e44227b39ef" role="dialog"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d" data-dcnode-id="2981"><button class="BaseButton-root-464189d43068742128bd39653c671d89 Timestamp-root-f0b3ebf43486d31ba5226a30c0e02f22" data-dcnode-id="2982" type="button"><time class="RelativeTime-root-d30b4f3b231d2f240c2f63990321529f Timestamp-text-b943991e0f8e51bb4bdba60eabe40535 Comment-timestamp-b603d74501b527b492dba3e2561137cb coral coral-timestamp coral-comment-timestamp" data-dcnode-id="2983" datetime="2021-12-21T09:53:20.631Z" title="2021-12-21T09:53:20.631Z"><span data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">5 months ago</span></span></time></button></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29" data-dcnode-id="2978"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="2979"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="2900"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="2932"><div data-dcnode-id="2974"><span data-dcnode-id="2976" instrument_node="">My observation on the NHS generally…</span><br data-dcnode-id="2975"/></div><div data-dcnode-id="2971"><span data-dcnode-id="2973" instrument_node="">- out moded ways of working</span><br data-dcnode-id="2972"/></div><div data-dcnode-id="2968"><span data-dcnode-id="2970" instrument_node="">- poor IT skills</span><br data-dcnode-id="2969"/></div><div data-dcnode-id="2965"><span data-dcnode-id="2967" instrument_node="">- hybrid processes and procedures which use a mix of paper and software which causes gross inefficiencies - re typing of written notes into multiple systems </span><br data-dcnode-id="2966"/></div><div data-dcnode-id="2962"><span data-dcnode-id="2964" instrument_node="">- GP’s are gate keepers for access to consultants</span><br data-dcnode-id="2963"/></div><div data-dcnode-id="2959"><span data-dcnode-id="2961" instrument_node="">- the “well we’ve always done it this way” attitude with a strong resistance to change</span><br data-dcnode-id="2960"/></div><div data-dcnode-id="2956"><span data-dcnode-id="2958" instrument_node="">- IT systems that lack any kind of integration and hence no inter working capability to support multiple clinical requirements and admin support of those clinical requirements.</span><br data-dcnode-id="2957"/></div><div data-dcnode-id="2953"><span data-dcnode-id="2955" instrument_node="">- institutionalised senior managers who don’t support or promote a continuous improvements ethos. </span><br data-dcnode-id="2954"/></div><div data-dcnode-id="2950"><span data-dcnode-id="2952" instrument_node="">- GP practices who cannot and will not use email to communicate referrals or anything else with hospitals or indeed their patients and use the argument that’s it’s not a secure media - but private practices and hospitals do it all the time.</span><br data-dcnode-id="2951"/></div><div data-dcnode-id="2947"><span data-dcnode-id="2949" instrument_node="">- patients web portals out sourced to the private sector and GP practices not enabling the full feature sets available such as access to medical records - prescription repeats - booking an appointment with a GP. I recently tried to set up my portal n Warwickshire and I was presented with 27 private providers by which I could access my practice. You guessed it it didn't work. It took time to fail and I’m an IT professional. Just think of the security issues and the potential likelihood of data breaches with all these interfaces. Oh and no response from the practice manager BTW. </span><br data-dcnode-id="2948"/></div><div data-dcnode-id="2945"><br data-dcnode-id="2946"/></div><div data-dcnode-id="2942"><span data-dcnode-id="2944" instrument_node="">In a previous life I recruited staff who worked on the NHS Digitisation programme that was scrapped due to cost. The explanations given to me by these people as to why the failures occurred were due to the inability of Ministers and Senior NHS Managers to understand the major step changes needed urgently  because of years and years of neglect and the inability to make gradual changes and invest in administrative tools and training needed to keep abreast of the rising demands on the service. Essentially the services is broken because it’s procedures have not been scalable to such a level to meet demand and that was before Covid hit. </span><br data-dcnode-id="2943"/></div><div data-dcnode-id="2940"><br data-dcnode-id="2941"/></div><div data-dcnode-id="2937"><span data-dcnode-id="2939" instrument_node="">Reform is seriously overdue. The bang for the tax payers buck is low, mainly admin costs consume the billions instead of clinical care. I don’t think this government has the intellectual horse power to solve any of these problems but for sure add to them!</span><br data-dcnode-id="2938"/></div><div data-dcnode-id="2935"><br data-dcnode-id="2936"/></div><div data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">But it’s all we’ve got. The Drs and nurses are first class but are fighting the system too. Sad!</span></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="2901"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="2909"><button aria-label="Recommend comment by Mr Facts (Total: 7)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 ReactionButton-readOnly-6058d265939b4a012ffbb05d25f02783 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="2924" data-testid="comment-reaction-button" data-variant="flat" disabled="" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="2925"><i aria-hidden="true" class="Icon-root-c1fc955f8607c3696518db8f02fb9080 Icon-sm-b43dbbab3c3f2b00596ba477436b5c63 Rea t retaining the human/personal touch is fairly unique to medicine.</span></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="1227"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="1235"><button aria-label="Recommend comment by $h!nobi (Total: 2)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 ReactionButton-readOnly-6058d265939b4a012ffbb05d25f02783 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="1250" data-testid="comment-reaction-button" data-variant="flat" disabled="" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="1251"><i aria-hidden="true" class="Icon-root-c1fc955f8  data-dcnode-id="1138"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-topBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignFlexStart-776800b267a72ebf925def0a6e8dde5e Flex-directionRow-2454f15d2085c2be40d132bad0acd66d" data-dcnode-id="1194"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="1197"><div class="Comment-username-ca460b6a92448c2c4f5e8bf0281046d9" data-dcnode-id="1203"><div class="Popover-root-3f2ec388eb9c8afe569f3401d3c59b59" data-dcnode-id="1204"><button aria-controls="username-popover-75377ffb-b225-43e4-98ff-0de32fd01f98" class="BaseButton-root-464189d43068742128bd39653c671d89 CommentContainer-usernameButton-4ac74d170407b2cad24a64c2253db856 coral coral-username coral-comment-username" data-dcnode-id="1206" type="button"><span class="Username-root-c00565d265d60c03a8fd24001a836d2b" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">WazDoc1</span></span></button><div aria-hidden="true" aria-label="A popover with more user information" data-dcnode-id="1205" id="username-popover-75377ffb-b225-43e4-98ff-0de32fd01f98" role="dialog"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d" data-dcnode-id="1198"><button class="BaseButton-root-464189d43068742128bd39653c671d89 Timestamp-root-f0b3ebf43486d31ba5226a30c0e02f22" data-dcnode-id="1199" type="button"><time class="RelativeTime-root-d30b4f3b231d2f240c2f63990321529f Timestamp-text-b943991e0f8e51bb4bdba60eabe40535 Comment-timestamp-b603d74501b527b492dba3e2561137cb coral coral-timestamp coral-comment-timestamp" data-dcnode-id="1200" datetime="2021-12-21T07:49:37.171Z" title="2021-12-21T07:49:37.171Z"><span data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">5 months ago</span></span></time></button></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29" data-dcnode-id="1195"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="1196"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="1139"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="1171"><div data-dcnode-id="1191"><span data-dcnode-id="1193" instrument_node="">1. I think this article needs to have a focus - currently trying to achieve a broad overview that simply can’t be done in the short space allocated.</span><br data-dcnode-id="1192"/></div><div data-dcnode-id="1189"><br data-dcnode-id="1190"/></div><div data-dcnode-id="1186"><span data-dcnode-id="1188" instrument_node="">2. Its lack of comparisons with existing systems - therefore makes for a  superficial analysis that adds little to the conversation. The discussion on patient engagement and patient devised systems is not new -  the occasional tinkering does little to change the system as a whole, whilst enabling good practice to appear in select places, and standard practice to continue in most. </span><br data-dcnode-id="1187"/></div><div data-dcnode-id="1184"><br data-dcnode-id="1185"/></div><div data-dcnode-id="1181"><span data-dcnode-id="1183" instrument_node="">3. Managing patient/physician expectations - how do we do that with technology? does every patient need an audiogram performed by an audiologist to assess their hearing or can we rely on less formal testing that is freely available on smart phone apps? I think for the worried well (and those with age related hearing loss) - utilising these apps is more than sufficient. Am sure there are other examples for differing problems/specialities can be given. </span><br data-dcnode-id="1182"/></div><div data-dcnode-id="1179"><br data-dcnode-id="1180"/></div><div data-dcnode-id="1176"><span data-dcnode-id="1178" instrument_node="">4. How do you engage staff? My own sibling - a pharmacist, spent many a year in hospital departments and now is in community practice - finds that her role is under utilised. The uptake of this MDT model is still inadequate compared to the demands put on the service. Lip service and a lack of resources means that the ability to extend this service is hampered. Educating patients about the role of such professionals helps maintain confidence in the system. Otherwise patients will still want to see GPs and GPs alone. They can also play a role in preempting issues, enabling prevention that is sorely missing in our current system.  </span><br data-dcnode-id="1177"/></div><div data-dcnode-id="1174"><br data-dcnode-id="1175"/></div><div data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">4. Charging - it’s a sensitive topic. But from what I see in my own practice, there are so many soft referrals! By introducing an upfront charge - it will discourage those individuals from pursuing frivolous complaints. It will also help patients engage with their own health - help them take personal responsibility. Many many many European countries achieve this without disadvantaging the poor and the unwell. Rather than fighting this on ideological grounds - learn from others who have managed to make a success of it. </span></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="1140"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="1148"><button aria-label="Recommend comment by WazDoc1 (Total: 6)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 ReactionButton-readOnly-6058d265939b4a012ffbb05d25f02783 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="1163" data-testid="comment-reaction-button" data-variant="flat" disabled="" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74a ype="button"><time class="RelativeTime-root-d30b4f3b231d2f240c2f63990321529f Timestamp-text-b943991e0f8e51bb4bdba60eabe40535 Comment-timestamp-b603d74501b527b492dba3e2561137cb coral coral-timestamp coral-comment-timestamp" data-dcnode-id="1113" datetime="2021-12-21T06:47:48.367Z" title="2021-12-21T06:47:48.367Z"><span data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">5 months ago</span></span></time></button><div class="EditedMarker-root-0b8fa4556fa9011921be1747687a80c7 coral coral-comment-edited" data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">(</span><span data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Edited</span></span><span data-dcnode-id="1108" instrument_node="">)</span></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-wrap-6d1b6ac029ed4bb936d308545730f2ca Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29" data-dcnode-id="1103"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-itemGutter-877c8524cc53828abc11c7fa63399cc4 Flex-justifyFlexEnd-d6022468a77727a492ca2de47024ec29 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd gutter" data-dcnode-id="1104"></div></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="1057"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="1089"><div data-dcnode-id="1099"><span data-dcnode-id="1101" instrument_node="">The huge rate at which medicine is being changed by engineering technology and scientific knowledge is making a sea change where the physician has to exert a huge amount of effort to keep his boat of expertise and fundamental knowledge afloat. The role of AI and genetic testing will probably  soon change whole methodologies of diagnosis and treatment.  The patient however deserves the attention of a sharp mind with the capacity to find solutions to his or her   problems. This has to be blended with all of the humanistic needs of communication and compassion. Currently the practice method relies on GP's and Specialists.    However perhaps the changes that are occurring will change this configuration?</span><br data-dcnode-id="1100"/></div><div data-dcnode-id="1096"><span data-dcnode-id="1098" instrument_node="">Perhaps an observation of the physicians in Emergency Rooms will  reveal that physicians with the necessary tools can rapidly achieve solutions that take weeks or months in the present system. The system also gives the physicians an increased sense of worth and capability though it is extremely challenging. If the costs could be greatly reduced would that greatly improve medical care and give worthwhile participation of nurses and other personnel in this accelerated process.? A  big part of the system is that the physician has skills that he can immediately employ and has available special services and collleagues that he can rapidly call on. Perhaps the physicians should have the capability to design the system rather than being put in slots which destroys the value of their knowledge and interest?</span><br data-dcnode-id="1097"/></div><div data-dcnode-id="1093"><span data-dcnode-id="1095" instrument_node="">The problem is that it might  flatten the present hierarchy in medicine. However the specialisation of knowledge and the needed research capability is itself being blown apart by the improving technology and knowledge. Thus being a Cardiologist  currently requires a subdivision of skills which probably will continue to expand as finer aspects of knowledge of disease processes, are defined.  Perhaps the GP will conduct this orchestra  of care or on the other hand might be absorbed into it.</span><br data-dcnode-id="1094"/></div><div data-dcnode-id="1090"><span data-dcnode-id="1092" instrument_node="">It should all be a source of creativity and satisfaction for all of the players.</span><br data-dcnode-id="1091"/></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="1058"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="1066"><button aria-label="Recommend comment by Mouldover (Total: 1)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 ReactionButton-readOnly-6058d265939b4a012ffbb05d25f02783 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="1081" data-testid="comment-reaction-button" data-variant="flat" disabled="" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 es are being made, and who is responsible.  That helps to sharpen peoples attention.</span><br data-dcnode-id="921"/></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="888"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="896"><button aria-label="Recommend comment by Mouldover (Total: 1)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 Button-disabled-11fc2a834ab017309e2cece13844bc48 ReactionButton-readOnly-6058d265939b4a012ffbb05d25f02783 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="911" data-testid="comment-reaction-button" data-variant="flat" disabled="" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="912"><i ari
