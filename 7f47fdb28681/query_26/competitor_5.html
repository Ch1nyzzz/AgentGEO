</span><div class="small-10 medium-5 columns" data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">
</span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DAdrienne%2BKisner%2Brecommends%2Bthe%2Bbest%2Bbooks%2Bon%2BPolitical%2BEngagement%2BFor%2BTeens%26url%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fpolitics-teens-adrienne-kisner%252F%26via%3Dfive_books" target="_blank"><i class="fa fa-twitter" data-dcnode-id="1410"></i></a><span data-dcnode-id="1408" instrument_node="">

</span><div class="small-10 medium-5 columns end" data-dcnode-id="1400"><span data-dcnode-id="1405" instrument_node="">
</span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/dialog/share%3Fapp_id%3D179767102823809%26href%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fpolitics-teens-adrienne-kisner%252F%26redirect_uri%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fpolitics-teens-adrienne-kisner%252F" target="_blank"><i class="fa fa-facebook facebook" data-dcnode-id="1404"></i></a><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">
</span></div><span data-dcnode-id="1399" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
</span></div><span data-dcnode-id="1395" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1391"><span class="drop-cap w" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">W</span></span><span data-dcnode-id="1392" instrument_node="">hat skills do you think this generation of teens will need to equip themselves with in order to become politically effective?</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Resilience.&nbsp;Skepticism. A dedication to being an informed voter. A local or online group of people passionate about systemic change. Curiosity.&nbsp;Also, their self-care mechanism of choice. Might I suggest birding or knitting? Don’t underestimate how bad-ass birding can be.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">How would you define youth activism?&nbsp;</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1376"><span data-dcnode-id="1383" instrument_node="">I say any time you take an interest in something outside yourself and act, you are engaged in activism.&nbsp; Maybe it’s calling elected officials.&nbsp; Maybe it’s exercising your right to peacefully assemble. Maybe it’s using whatever talent you have (knitting, cooking, playing an instrument) to make society more just for all.&nbsp; I would encourage teens (or anyone) to do so not because they </span><em data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">should</span></em><span data-dcnode-id="1380" instrument_node="">, but because they </span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">can.&nbsp; </span></em><span data-dcnode-id="1377" instrument_node="">You can work towards a better world, so why not do it?</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Politics is incredibly complex and offers few simple answers even when the politicians are honest. How can we make it more accessible to teens?</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1368"><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.msnbc.com/the-rachel-maddow-show/rachel-maddow-biography" target="_blank"><span data-dcnode-id="1371" instrument_node="">Rachel Maddow</span></a><span data-dcnode-id="1369" instrument_node=""> –&nbsp;the MSNBC television host – does a good job.&nbsp; So does Teen Vogue.&nbsp; So do the books I suggest here!&nbsp; This generation is tech savvy and connected—interested adults need to ask what makes their teens mad, and then encourage them to learn more about it.&nbsp;Adults can research too, and share sources with their teens. But help teens learn how to do due diligence in terms of finding reputable sources of information as well.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">Your debut novel, </span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Dear Rachel Maddow</span></em><span data-dcnode-id="1363" instrument_node="">, feels timely given current events in America and across the world. It’s about a young woman working out what she wants and realising that she is going to have to fight for it. One line struck me particularly: “What would have to happen to make me act?”</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1350"><span data-dcnode-id="1360" instrument_node="">It took me a long time from thinking up the premise of this story—girl writes to Rachel Maddow à la </span><em data-dcnode-id="1356"><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fivebooks.com/buy/0380709589" rel="nofollow" target="_blank"><span data-dcnode-id="1359" instrument_node="">Dear Mr. Henshaw</span></a><span data-dcnode-id="1357" instrument_node="">—</span></em><span data-dcnode-id="1355" instrument_node="">to when I finished it.&nbsp; In between, sometimes the only thing I could do to work on the book would be to watch her show.&nbsp; One day while doing such ‘research,’ Rachel had a segment on about voter suppression.&nbsp;She really did ask that question—what infuriates me, a viewer and a citizen?&nbsp; And I had to admit that voter suppression is something that gets me.&nbsp;It is a fundamental right, and there are people trying to keep others from exercising it to maintain power! No. Just, no.&nbsp; I took to my keyboard, infuriated.&nbsp; I thought, what would similarly infuriate my character Brynn?&nbsp; So that particular line was inspired directly by </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msnbc.com/rachel-maddow-show" target="_blank"><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">The Rachel Maddow Show</span></em></a><span data-dcnode-id="1351" instrument_node="">.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Do you feel that&nbsp;this generation of teens is stepping-up to enact political change?&nbsp;</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">I think a lot of teens do, regardless of generation. But I think now, in particular, kids are more connected to the world at large. They can see the terror of a shooting across the country and know that it could next be them. They see in real time islands of plastic choking birds.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">They have their own media, explaining in their terms, what it means that electoral systems are in peril from totalitarian regimes. They want to live, so what else is there to do but stand up and fight? Some won’t, some can’t, but there are many who do.&nbsp;Someone has to save the world.&nbsp;The adults sure aren’t doing a bang-up job.&nbsp; My money is on teenagers to lead the charge.</span></p><span data-dcnode-id="1340" instrument_node="">

</span></aside><span data-dcnode-id="1288" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">Let’s take a look at your five book recommendations. Your first choice is the&nbsp;</span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">March</span></em><span data-dcnode-id="1284" instrument_node=""> trilogy by John Lewis, Andrew Aydin and the graphic artist Nate Powell.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">If you only have the bandwidth for one activism-related narrative, you should read </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">March</span></em><span data-dcnode-id="1278" instrument_node="">.&nbsp; This should be required reading in every school.&nbsp; John Lewis takes readers through the experience of fighting for civil rights alongside Martin Luther King Jr. and other prominent figures in the movement.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1271"><span data-dcnode-id="1275" instrument_node="">It’s a </span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/best-books/hillary-chute-on-graphic-narratives/"><span data-dcnode-id="1274" instrument_node="">graphic novel</span></a><span data-dcnode-id="1272" instrument_node="">, so it’s a quick read that never bogs the reader down with tragedy. It shows that ordinary people can do extraordinary things when powered by belief in their cause.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="34807" data-dcnode-id="1257" id="book-34807"><span data-dcnode-id="1269" instrument_node="">

</span><h3 class="author" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">
                    by Jennifer Mathieu                </span></h3><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span><a class="buy-button" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/moxie/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="1226" instrument_node="">Read</span></a><span data-dcnode-id="1224" instrument_node=""> </span></div><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span></aside><span data-dcnode-id="1218" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">Your second is </span><em data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Moxie&nbsp;</span></em><span data-dcnode-id="1214" instrument_node="">by Jennifer Mathieu.&nbsp;Please tell me about this book.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">I love stories of unlikely people who inadvertently start a revolution not because they want to but because they just can’t live with the status quo any longer. &nbsp;Even in the age of the #MeToo movement it can feel impossible to confront sexual harassment.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Systems of power and oppression long in place make it seem like that is the way life is and should always be. But sometimes all it takes is one fed up one high school junior to shake up the world.&nbsp;This book is about a girl confronting the accepted </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/best-books/erica-jong-on-unmissable-books-on-women-feminism-and-life/"><span data-dcnode-id="1207" instrument_node="">sexism</span></a><span data-dcnode-id="1205" instrument_node=""> in her school is poignant, funny, and sneaks in rebellious inspiration where you least expect it.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">In what ways do you think reading fiction can inspire readers to take a chance and spring into action?</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">When we read fiction, we are that character.&nbsp; We have all the potential that the heroine does.&nbsp; We leave that story cognitively changed, if only on the micro-level.&nbsp; Fiction plants seeds of what is possible.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Someone once said to me that you “can’t teach passion.” Maybe.&nbsp; But you can inspire it.&nbsp; Fiction inspires the imagination, which can encourage real world action.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="34808" data-dcnode-id="1181" id="book-34808"><span data-dcnode-id="1193" instrument_node="">

</span></h2><span data-dcnode-id="1156" instrument_node="">
</span><h3 class="author" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">

</span></div><span data-dcnode-id="1151" instrument_node="">
</span><a class="buy-button" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/i-am-malala/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="1150" instrument_node="">Read</span></a><span data-dcnode-id="1148" instrument_node=""> </span></div><span data-dcnode-id="1146" instrument_node="">

</span></aside><span data-dcnode-id="1142" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">You’ve chosen&nbsp;</span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">I am Malala </span></em><span data-dcnode-id="1138" instrument_node="">by Malala Yousafzai as your third choice.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Malala’s story of triumph is a battle cry for girls—and boys—everywhere.&nbsp; Education can set you free and fighting for education for all should be a top priority. Malala says: “I tell my story not because it is unique, but because it is the story of many girls.”&nbsp; Malala’s story isn’t pretty.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Speaking out in the face of injustice often makes you a target, like it did her, and sometimes you don’t escape.&nbsp; But even if you don’t escape, you can survive. Survival is often revolutionary in and of itself; it is enough—you are enough—if that is all you can do.</span></p><span data-dcnode-id="1130" instrument_node="">

</span></aside><span data-dcnode-id="1078" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">Your fourth choice is&nbsp;</span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Girls Resist!: A Guide to Activism, Leadership, and Starting a Revolution </span></em><span data-dcnode-id="1074" instrument_node="">by KaeLyn Rich, illustrated by Giulia Sagramola.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">This book is not out yet, but I am smitten by what I know of it.&nbsp;The art is as fun as it is gorgeous, and teens I know have already been drawn to it by the graphic component alone.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The resistance needs a good how-to guide, because it is easy to feel powerless and overwhelmed when trying to find ways in which you can be involved.&nbsp; This helps teens find a place to start, and a road map of where to go after that.&nbsp; If you are “mad as heck about the way the world is going”—and who isn’t these days?—this book wants to make you an “effective leader who gets stuff done.”</span></p><span data-dcnode-id="1066" instrument_node="">

</span><a class="buy-button" data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/this-is-our-constitution/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="1022" instrument_node="">Read</span></a><span data-dcnode-id="1020" instrument_node=""> </span></div><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1016" instrument_node="">
</span></aside><span data-dcnode-id="1014" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">Your fifth book is&nbsp;</span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">This is Our Constitution&nbsp;</span></em><span data-dcnode-id="1010" instrument_node="">by Khizr Khan</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">This is a book for younger readers, but how many of us citizens really understand </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/best-books/jack-rakove-on-the-us-constitution/"><span data-dcnode-id="1006" instrument_node="">the US Constitution</span></a><span data-dcnode-id="1004" instrument_node="">?&nbsp; I mean really, truly understand it?&nbsp; This is particularly important because the Supreme Court figures prominently in the news, and to understand the Supreme Court is to understand its link to the founding document of the United States.&nbsp; The book includes pictures and short snippets of explanation and narrative—but this does not rob it its message of nuance.&nbsp; This is a great one for kids (of all ages) and parents to reach and discuss together.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Finally, are there any particularly good websites or internet organisations that you would like to recommend here as&nbsp;further resources?</span></p><span data-dcnode-id="999" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="992"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medialiteracynow.org/resources/" target="_blank"><span data-dcnode-id="998" instrument_node="">Media Literacy Now</span></a><span data-dcnode-id="996" instrument_node=""> is a great place to find a lot of resources to help teens navigate the deluge of information out there.&nbsp; </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/" target="_blank"><span data-dcnode-id="995" instrument_node="">Teen Vogue</span></a><span data-dcnode-id="993" instrument_node="">&nbsp;is a great, accessible source for political news.&nbsp;But I would most encourage parents to subscribe to their local paper, or the national paper of their choice, and read with their teen.&nbsp; The free press is one of the guardians of liberty—support it.&nbsp; Read it at the library if need be. Most papers and periodicals (online and print) are written at a level that high schoolers can understand.&nbsp; Let us all shove long form journalism into their hands and heads as often as possible.</span></p><span data-dcnode-id="991" instrument_node="">
