de-id="2393" instrument_node="">                         Presented by:</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">                         Aneri</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">                         Gopi</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">                         Batul</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">                         Tamanna</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">                         Vaishali</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">                         Twinkle</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">fWhat does Brexit mean?</span></p><p data-dcnode-id="2377"></p><h2 data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node=""> It is a word that is used as a shorthand</span></h2><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node=""> way of saying the UK leaving the EU -</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node=""> merging the words Britain and exit to</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node=""> get Brexit</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">fWhy is Britain leaving the</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">European Union?</span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">   Major three reasons</span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node="">       1) Economics</span><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">       2) Sovereignty</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">       3) Political Elitism</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">   They said Britain was being held back by the EU, which they said imposed too</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">    many rules on business and charged billions of pounds a year in membership fees</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">    for little in return. They also wanted the UK to make all of its own laws again,</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">    rather than being created through shared decision making with other EU nations.</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">   Immigration was also a big issue for Brexit supporters, They wanted Britain to</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">    take back full control of its borders and reduce the number of people coming</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">    here to live and/or work.</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">   One of the main principles of EU membership is "free movement", which means</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">    you don't need to get a visa to go and live in another EU country. The Leave</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">    campaign also objected to the idea of "ever closer union" between EU member</span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">    states and what they see as moves towards the creation of a "United States of</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">    Europe".</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">   The difference between the lives of southern Europeans and Germans—who</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">    enjoy 4.2% unemployment—is profound. Europe as a whole has stagnated</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">    economically.</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">fConti…</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node=""> Obviously, they didn’t think that Europe would throw up</span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">  trade barriers against Britain. The UK is Germany’s third</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">  most important export target. The last thing Germany</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">  wants is a trade war with Britain.</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node=""> The second reason for Brexit is the rise of nationalism</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">  across the world.</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node=""> The immigration crisis in Europe was a trigger. Some EU</span><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">  leaders argued that aiding the refugees was a moral</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">  obligation. But EU opponents saw immigration as a</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">  national issue, as it affected the internal life of the country.</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">  Steering clear of this issue was an important driver for the</span><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">  “leave” vote.</span><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node=""> It’s vital to understand that Brexit was a vote against the</span><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">  British elite. Voters thought politicians, business leaders,</span><br data-dcnode-id="2296"><span data-dcnode-id="2295" instrument_node="">  and intellectuals had lost their right to control the system</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">f    Advantages of Brexit on EU &amp; UK</span><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">   Positive Impact of BREXIT:</span><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node=""> Free International trade: Leaving the EU, Britain will be able to</span><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node="">independently access the international trade deals. You will have an</span><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">opportunity to negotiate for new deals and a chance to move goods</span><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">freely.</span><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node=""> No membership cost: You no longer have to pay for EU membership</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">fee which can hinder the free movement of goods to the international</span><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">market.</span><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node=""> No more EU trade regulations costs: Exit from EU will allow Britain to</span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">set its own regulations for the members. E.g. rules on value-added tax.</span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node=""> Reduced red tapes: Reduced policies have enabled firms to increase</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">their productivity potential and reduce cost spend on adhering to</span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">bureaucratic policies. Consumers can also benefit from reduced cost.</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">Control immigration: The UK government will be able to control and</span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">regulate the immigration of individual in its member state.</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node=""> Britain will have a chance to influence world decisions as an</span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">independent nation.</span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">fDisadvantages of Brexit on EU &amp; UK</span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">Negative Impact of BREXIT:</span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node=""> Membership to EU will make Britain attractive for foreign investment</span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">   and exit from EU, they will lose 45% and 50% of UK’s Export and import.</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node=""> Britain will not take part in the world largest free trade negotiations</span><br data-dcnode-id="2248"><span data-dcnode-id="2247" instrument_node="">   between EU and the US.</span><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node=""> Loss of influence. Leaving the EU will limit Britain’s opportunity to take</span><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node="">   part in EU’s decisions concerning world affairs or in setting European</span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">   laws.</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node=""> Barriers to EU workers. With the implementation of Brexit, there will be a</span><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">   skills gap in the market because of the barriers put in the workplace.</span><br data-dcnode-id="2236"><span data-dcnode-id="2235" instrument_node=""> Impacts on the economy: Leaving EU has an impact on the economy,</span><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">   businesses and individuals will have a hard time raising funds for any</span><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">   developments.</span><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node=""> EU negotiates for energy bills for its member state, leaving EU will</span><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">   increase energy bills for Britain. They will also not be able to uphold the</span><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">   EU plans for reducing air pollution.</span><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">fConclusion:</span><p data-dcnode-id="2222"></p><p data-dcnode-id="2221"></p><h2 data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node=""> The whole essay would be concluded by saying</span></h2><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">  that we should take our personal benefits to a</span><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node="">  side and think global benefits. This will help us to</span><br data-dcnode-id="2214"><span data-dcnode-id="2213" instrument_node="">  be united and develop better inter-country</span><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">  relationships. UK is now free to have</span><br data-dcnode-id="2210"><span data-dcnode-id="2209" instrument_node="">  partnerships with any of the countries. At this</span><br data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node="">  time it is hard to say that either it is a good</span><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node="">  decision or not but business analysts say it would</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">  be a fruitful decision for UK in future, as UK will</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">  have Positive And Negative Impacts of Brexit on</span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">  its economy.</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">f   What's happening now?</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node=""> Withdrawal agreement:</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">       This covers how much money the UK owes the EU - an</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">       estimated £39bn - and what happens to UK citizens</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">       living elsewhere in the EU and EU citizens living in the</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">       UK. It also proposes a method of avoiding the return of a</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">       physical Northern Ireland border.</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">Brexit withdrawal agreement</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node=""> A separate and much shorter 26-page statement on future</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">  relations has also been drawn up. This gives an overview of</span><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">  what the UK and EU's relationship will be in the longer-term.</span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">f                   Conti…</span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">Declaration on future relations</span><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node=""> The UK cabinet agreed the withdrawal</span><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">  agreement text on 14 November, but there were</span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">  two resignations, including Brexit Secretary</span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">  Dominic Raab and there was an, as yet</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">  unsuccessful, attempt by Brexiteer MPs to force</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">  a confidence vote in Theresa May.</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node=""> An EU summit on Sunday 25 November is when</span><br data-dcnode-id="2158"><span data-dcnode-id="2157" instrument_node="">  both sides are due to sign up to the deal. The</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">  next step is for the UK parliament and EU</span><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">  member states to each ratify the agreement,</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node="">  before Brexit day next March.</span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node=""> Theresa May threatens ‘no Brexit at all’ as</span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">  senior Tories put new referendum on table.</span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">fWhen is the UK due to leave the</span><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">EU?</span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node=""> For the UK to leave the EU it had to invoke</span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">  Article 50 of the Lisbon Treaty which gives the</span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">  two sides two years to agree the terms of the</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">  split.</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node=""> Theresa May triggered this process on 29 March,</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">  2017, meaning the UK is scheduled to leave at</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">  11pm UK time on Friday, 29 March 2019.</span><br data-dcnode-id="2128"><span data-dcnode-id="2127" instrument_node=""> It can be extended if all 28 EU members agree,</span><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">  but at the moment all sides are focusing on that</span><br data-dcnode-id="2124"><span data-dcnode-id="2123" instrument_node="">  date as being the key one, and Theresa May has</span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">  now put it into British law.</span><p data-dcnode-id="2120"></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2099"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2100"><h2 class="title" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2101"><li class="link_wrapper" data-dcnode-id="2114"><a class="interest_link link" data-category_id="53354" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Brexit/explore"><span data-dcnode-id="2116" instrument_node="">Brexit</span></a></li><li class="link_wrapper" data-dcnode-id="2111"><a class="interest_link link" da
