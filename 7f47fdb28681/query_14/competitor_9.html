</span><meta content="Migrant care workers play a significant role in meeting the escalating demand for social care in the UK. Workforce shortages create opportunities for new migrants to enter the social care workforce. This scoping review aims to identify and synthesise available evidence on the contribution of migrant workers to the provision of home care in the UK focusing on care worker and service outcomes as well as sustainability, and identify challenges and gaps in the context of Brexit and changing immigration policies. Twenty-two articles were identified for inclusion in the review and extracted using a structured format. The analysis presents a narrative description and synthesis of the research. Findings from the reviewed articles were grouped into five main themes: migrant, user and employer outcomes, effect on workforce, and sustainability—and 15 sub-themes that were described in detail. Much of the existing research on migrant care work is qualitative and focuses on migrant outcomes. The review identified some important gaps in research, namely, the impact of immigration status on migrant care worker outcomes, the cultural and psychological adaptation of migrant care workers to care practices, and the emerging UK live-in care market. Implications of findings are discussed in the context of post-Brexit immigration system." data-dcnode-id="3507" name="dc.description"><span data-dcnode-id="3506" instrument_node="">

</span><meta content="Migrant Home Care Workers in the UK: a Scoping Review of Outcomes and Sustainability and Implications in the Context of Brexit - Journal of International Migration and Integration" data-dcnode-id="3259" property="og:title"><span data-dcnode-id="3258" instrument_node="">
</span><meta content="Migrant care workers play a significant role in meeting the escalating demand for social care in the UK. Workforce shortages create opportunities for new migrants to enter the social care workforce. This scoping review aims to identify and synthesise available evidence on the contribution of migrant workers to the provision of home care in the UK focusing on care worker and service outcomes as well as sustainability, and identify challenges and gaps in the context of Brexit and changing immigration policies. Twenty-two articles were identified for inclusion in the review and extracted using a structured format. The analysis presents a narrative description and synthesis of the research. Findings from the reviewed articles were grouped into five main themes: migrant, user and employer outcomes, effect on workforce, and sustainability—and 15 sub-themes that were described in detail. Much of the existing research on migrant care work is qualitative and focuses on migrant outcomes. The review identified some important gaps in research, namely, the impact of immigration status on migrant care worker outcomes, the cultural and psychological adaptation of migrant care workers to care practices, and the emerging UK live-in care market. Implications of findings are discussed in the context of post-Brexit immigration system." data-dcnode-id="3257" property="og:description"><span data-dcnode-id="3256" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1096" data-track-component="article body"><span data-dcnode-id="2809" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2802" data-gtm-vis-first-on-screen-50443292_562="730" data-gtm-vis-first-on-screen-50443292_563="730" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="730" data-gtm-vis-recent-on-screen-50443292_563="730" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2803" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2807" id="Abs1"><span data-dcnode-id="2808" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2804" id="Abs1-content"><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Migrant care workers play a significant role in meeting the escalating demand for social care in the UK. Workforce shortages create opportunities for new migrants to enter the social care workforce. This scoping review aims to identify and synthesise available evidence on the contribution of migrant workers to the provision of home care in the UK focusing on care worker and service outcomes as well as sustainability, and identify challenges and gaps in the context of Brexit and changing immigration policies. Twenty-two articles were identified for inclusion in the review and extracted using a structured format. The analysis presents a narrative description and synthesis of the research. Findings from the reviewed articles were grouped into five main themes: migrant, user and employer outcomes, effect on workforce, and sustainability—and 15 sub-themes that were described in detail. Much of the existing research on migrant care work is qualitative and focuses on migrant outcomes. The review identified some important gaps in research, namely, the impact of immigration status on migrant care worker outcomes, the cultural and psychological adaptation of migrant care workers to care practices, and the emerging UK live-in care market. Implications of findings are discussed in the context of post-Brexit immigration system.</span></p></div></div></section><span data-dcnode-id="2801" instrument_node="">
</span><section data-dcnode-id="2613" data-gtm-vis-first-on-screen-50443292_562="731" data-gtm-vis-first-on-screen-50443292_563="730" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="731" data-gtm-vis-recent-on-screen-50443292_563="730" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Background"><div class="c-article-section" data-dcnode-id="2614" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2799" id="Sec1"><span data-dcnode-id="2800" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="2615" id="Sec1-content"><p data-dcnode-id="2779"><span data-dcnode-id="2798" instrument_node="">Migrant workers are increasingly filling labour gaps in long-term care across the world, driven by demographic changes and responding to major challenges in the delivery and cost of care (Anderson, </span><a aria-label="Reference 2012" data-dcnode-id="2796" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d89360573e437" title="Anderson, A. (2012). Europe’s care regimes and the role of migrant care workers within them. Journal of population ageing, 5(2), 135–146."><span data-dcnode-id="2797" instrument_node="">2012</span></a><span data-dcnode-id="2795" instrument_node="">). Although migrant care workers are present in most countries, their share and roles vary significantly and are affected by different factors. Major among these are the welfare state and immigration regimes of host countries (van Hooren, </span><a aria-label="Reference 2012" data-dcnode-id="2793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d89360573e440" title="Van Hooren, F. J. (2012). Varieties of migrant care work: Comparing patterns of migrant labour in social care. Journal of European Social Policy, 22(2), 133–147. 
                  https://doi.org/10.1177/0958928711433654
                  
                ."><span data-dcnode-id="2794" instrument_node="">2012</span></a><span data-dcnode-id="2792" instrument_node="">). Demand for migrant care workers is shaped by the institutional structure and specific configurations of the social care system (Anttonen et al., </span><a aria-label="Reference 2003" data-dcnode-id="2790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d89360573e443" title="Anttonen, A., Baldock, J., &amp; Sipilä, J. (2003). The young, the old, and the state: Social care systems in five industrial nations (p. 13). Edward Elgar Publishing."><span data-dcnode-id="2791" instrument_node="">2003</span></a><span data-dcnode-id="2789" instrument_node="">, p. 13; Simonazzi, </span><a aria-label="Reference 2008" data-dcnode-id="2787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d89360573e446" title="Simonazzi, A. (2008). Care regimes and national employment models. Cambridge Journal of Economics, 33(2), 211–232."><span data-dcnode-id="2788" instrument_node="">2008</span></a><span data-dcnode-id="2786" instrument_node="">; Lyon &amp; Glucksmann, </span><a aria-label="Reference 2008" data-dcnode-id="2784" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d89360573e449" title="Lyon, D., &amp; Glucksmann, M. (2008). Comparative configurations of care work across Europe. Sociology, 42(1), 101–118."><span data-dcnode-id="2785" instrument_node="">2008</span></a><span data-dcnode-id="2783" instrument_node="">). Williams (</span><a aria-label="Reference 2012" data-dcnode-id="2781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d89360573e453" title="Williams, F. (2012). Converging variations in migrant care work in Europe. Journal of European Social Policy, 22(4), 363–376. 
                  https://doi.org/10.1177/09589287124497
                  
                ."><span data-dcnode-id="2782" instrument_node="">2012</span></a><span data-dcnode-id="2780" instrument_node="">) argues that variations in the employment of migrant care workers are influenced by how employment, migration, and social care systems interact. These systems alone and in interaction also create or contribute to the vulnerability of migrant care workers.</span></p><p data-dcnode-id="2771"><span data-dcnode-id="2778" instrument_node="">The UK is similar to many European Union (EU) and OECD countries in that it relies heavily on migrant care workers, who are over-represented in&nbsp;the long-term care sector (Cangiano, </span><a aria-label="Reference 2014" data-dcnode-id="2776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d89360573e459" title="Cangiano, A. (2014). Elder care and migrant labor in Europe: A demographic outlook. Population and Development Review, 40(1), 131–154."><span data-dcnode-id="2777" instrument_node="">2014</span></a><span data-dcnode-id="2775" instrument_node="">). In 2020 (prior to the COVID-19 pandemic), non-UK nationals represented 17 per cent of the social care workforce in England (Skills for Care, </span><a aria-label="Reference 2020" data-dcnode-id="2773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d89360573e462" title="Skills for Care. (2020). Individual employers and the personal assistant workforce report, 2020. Leeds: Skills for Care, Available at 
                  www.skillsforcare.org.uk/topics
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2774" instrument_node="">2020</span></a><span data-dcnode-id="2772" instrument_node="">), compared to approximately 11 per cent of all people in employment (ONS EMP06).</span></p><p data-dcnode-id="2757"><span data-dcnode-id="2770" instrument_node="">In 2016, the UK voted to leave the EU and as part of the Brexit process, to ‘take back control’ of its borders and ‘end free movement and the preferential treatment’ of EU migrants.</span><sup data-dcnode-id="2765"><a data-dcnode-id="2766" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Footnote </span></span><span data-dcnode-id="2767" instrument_node="">1</span></a></sup><span data-dcnode-id="2764" instrument_node=""> The Brexit decision was followed by years of political uncertainty about the shape and nature the UK’s future relationship with the EU. In 2020, the UK left the EU with a transition period until the end of the year. Following its election manifesto in 2019 (Conservative and Unionist Party, </span><a aria-label="Reference 2019" data-dcnode-id="2762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d89360573e479" title="Conservative and Unionist Party. (2019). Get Brexit done. Unleash Britain’s Potential. Available: 
                  https://www.conservatives.com/our-plan
                  
                "><span data-dcnode-id="2763" instrument_node="">2019</span></a><span data-dcnode-id="2761" instrument_node="">, p. 20), the government will introduce a new immigration system in 2021 that ends rights to free movement for EU workers and implements a points-based immigration system for everyone moving to the UK for work (Home Office, </span><a aria-label="Reference 2020" data-dcnode-id="2759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d89360573e482" title="Home Office. (2020). Policy paper: The UK's points-based immigration system: Policy statement. Available: 
                  https://www.gov.uk/government/publications/the-uks-points-based-immigration-system-policy-statement/the-uks-points-based-immigration-system-policy-statement#the-uks-points-based-system
                  
                "><span data-dcnode-id="2760" instrument_node="">2020</span></a><span data-dcnode-id="2758" instrument_node="">).</span></p><p data-dcnode-id="2743"><span data-dcnode-id="2756" instrument_node="">Under the new immigration system, few—if any—care worker jobs will allow applicants to collect the required number of points to qualify for a work visa: the majority of positions in social care are below the minimum qualification level. The impact of the new rules on social care are not yet evident, however are likely to be significant in the broader context of high vacancies and turnover in the sector and pressures created by the COVID-19 pandemic (Dromey &amp; Hochlaf, </span><a aria-label="Reference 2018" data-dcnode-id="2754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d89360573e488" title="Dromey, J., &amp; Hochlaf, D. (2018). Fair care: A workforce strategy for social care. IPPR."><span data-dcnode-id="2755" instrument_node="">2018</span></a><span data-dcnode-id="2753" instrument_node="">; MAC </span><a aria-label="Reference 2018" data-dcnode-id="2751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d89360573e491" title="MAC (Migration Advisory Committee). (2018). EEA migration in the UK: Final report. London: Migration Advisory Committee 
                  https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/741926/Final_EEA_report.PDF
                  
                . (Accessed: 10/06/2019)"><span data-dcnode-id="2752" instrument_node="">2018</span></a><span data-dcnode-id="2750" instrument_node="">; Morris, </span><a aria-label="Reference 2020" data-dcnode-id="2748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d89360573e494" title="Morris, M. (2020). Building a post-Brexit immigration system for the economic recovery, IPPR. 
                  http://www.ippr.org/research/publications/post-brexit-immigration
                  
                "><span data-dcnode-id="2749" instrument_node="">2020</span></a><span data-dcnode-id="2747" instrument_node="">; Skills for Care, </span><a aria-label="Reference 2020" data-dcnode-id="2745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d89360573e497" title="Skills for Care. (2020). Individual employers and the personal assistant workforce report, 2020. Leeds: Skills for Care, Available at 
                  www.skillsforcare.org.uk/topics
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2746" instrument_node="">2020</span></a><span data-dcnode-id="2744" instrument_node="">).</span></p><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">The aim of this review is to scope and present the available research on the migrant care workforce in one of the segments of the UK social care sector—home care. The analysis will focus on key worker and user outcomes and contribute to the assessment of challenges in the context of Brexit and changing immigration rules.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2739" id="Sec2"><span data-dcnode-id="2740" instrument_node="">Social Care in the UK</span></h3><p data-dcnode-id="2731"><span data-dcnode-id="2738" instrument_node="">Social care in the UK covers personal care and practical support for people who need care and support due to disability, illness, old age, and their carers (NAO, </span><a aria-label="Reference 2018" data-dcnode-id="2736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d89360573e511" title="NAO. (2018). Adult social care at a glance. London: National Audit Office. Available: 
                  https://www.nao.org.uk/wp-content/uploads/2018/07/Adult-social-care-at-a-glance.pdf
                  
                 (accessed on 10/06/2019)"><span data-dcnode-id="2737" instrument_node="">2018</span></a><span data-dcnode-id="2735" instrument_node="">). The two main components are residential care (i.e. care homes and nursing homes) and domiciliary care (care and support provided in one’s home). Social care is a devolved responsibility of the four national governments—England, Scotland, Wales, and Northern Ireland (NI)—that have taken diverging policy directions with funding and individual outcomes (wellbeing) at the centre of reforms over recent decades (Hall et al., </span><a aria-label="Reference 2020" data-dcnode-id="2733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d89360573e514" title="Hall, P., Needham, C., &amp; Hamblin, K. (2020). Social care. In Handbook on Society and Social Policy. Edward Elgar Publishing."><span data-dcnode-id="2734" instrument_node="">2020</span></a><span data-dcnode-id="2732" instrument_node="">).</span></p><p data-dcnode-id="2723"><span data-dcnode-id="2730" instrument_node="">Pressures on workers’ wages and&nbsp;rights have had a negative effect on the sector’s ability to attract or retain workers (Hudson, </span><a aria-label="Reference 2019" data-dcnode-id="2728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d89360573e520" title="Hudson, B. (2019). Commissioning for change: A new model for commissioning adult social care in England. Critical Social Policy, 39(3), 413–433."><span data-dcnode-id="2729" instrument_node="">2019</span></a><span data-dcnode-id="2727" instrument_node="">). Vacancy and turnover rates have been persistently high (Hussein et al., </span><a aria-label="Reference 2016" data-dcnode-id="2725" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d89360573e523" title="Hussein, S., Ismail, M., &amp; Manthorpe, J. (2016). Changes in turnover and vacancy rates of care workers in England from 2008 to 2010: panel analysis of national workforce data. Health &amp; social care in the community, 24(5), 547–556. 
                  https://doi.org/10.1111/hsc.12214
                  
                ."><span data-dcnode-id="2726" instrument_node="">2016</span></a><span data-dcnode-id="2724" instrument_node="">).</span></p><p data-dcnode-id="2709"><span data-dcnode-id="2722" instrument_node="">These trends have been set in a broader context of ‘personalisation’ and ‘consumer choice’ primarily delivered via cash for care policies (such as personal budgets and direct payments) in quasi-markets of suppliers of care services (Needham, </span><a aria-label="Reference 2011" data-dcnode-id="2720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d89360573e529" title="Needham, C. (2011). Personalization: From story-line to practice. Social policy &amp; administration, 45(1), 54–68."><span data-dcnode-id="2721" instrument_node="">2011</span></a><span data-dcnode-id="2719" instrument_node="">; Owens et al., </span><a aria-label="Reference 2017" data-dcnode-id="2717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d89360573e532" title="Owens, J., Mladenov, T., &amp; Cribb, A. (2017). What justice, what autonomy? The ethical constraints upon personalisation. Ethics and Social Welfare, 11(1), 3–18."><span data-dcnode-id="2718" instrument_node="">2017</span></a><span data-dcnode-id="2716" instrument_node="">). Marketisation and personalisation have created a complex and fragmented landscape of services, particularly in England, where there were 18,200 organisations and 38,000 establishments (e.g. care homes) involved in the provision of adult social care in 2019/2020, ranging from micro-providers to large corporate chains (Skills for Care, </span><a aria-label="Reference 2020" data-dcnode-id="2714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d89360573e535" title="Skills for Care. (2020). Individual employers and the personal assistant workforce report, 2020. Leeds: Skills for Care, Available at 
                  www.skillsforcare.org.uk/topics
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2715" instrument_node="">2020</span></a><span data-dcnode-id="2713" instrument_node="">). While the majority of social care services are publicly funded and purchased by local authorities via competitive tendering, it is estimated that approximately 35–40% of service users self-fund their own care by sourcing services from an open market (Hall et al., </span><a aria-label="Reference 2020" data-dcnode-id="2711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d89360573e538" title="Hall, P., Needham, C., &amp; Hamblin, K. (2020). Social care. In Handbook on Society and Social Policy. Edward Elgar Publishing."><span data-dcnode-id="2712" instrument_node="">2020</span></a><span data-dcnode-id="2710" instrument_node="">).</span></p><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Domiciliary or home care represents nearly half of social care jobs and workforce, and it has some distinct features:
</span></p><ul class="u-list-style-dash" data-dcnode-id="2651"><span data-dcnode-id="2706" instrument_node="">
</span><li data-dcnode-id="2701"><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">High number of ‘direct care’ jobs and fewer roles requiring formal qualifications. Over half of the domiciliary care workforce in England have no care related qualifications (higher than any other social care sector).</span></p><span data-dcnode-id="2702" instrument_node="">
</span></li><span data-dcnode-id="2700" instrument_node="">
</span><li data-dcnode-id="2692"><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2698" instrument_node="">Insecure and precarious employment practices: Nearly half of the home care workforce in England are on a zero-hour contract, highest rate within the social care sector. Zero-hour contracts are a source of additional stress for home care workers (Ravalier et al., </span><a aria-label="Reference 2019" data-dcnode-id="2696" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d89360573e556" title="Ravalier, J., Morton, R., Russell, L., &amp; Rei Fidalgo, A. (2019). Zero-hour contracts and stress in UK domiciliary care workers. Health &amp; social care in the community, 27(2), 348–355."><span data-dcnode-id="2697" instrument_node="">2019</span></a><span data-dcnode-id="2695" instrument_node="">).</span></p><span data-dcnode-id="2693" instrument_node="">
</span></li><span data-dcnode-id="2691" instrument_node="">
</span><li data-dcnode-id="2686"><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Highest vacancy and turnover rates within the sector. In England, the vacancy rate in domiciliary care was 10% in 2018/2019 compared to 7.8% for the sector as a whole or 5.9% in residential care.</span></p><span data-dcnode-id="2687" instrument_node="">
</span></li><span data-dcnode-id="2685" instrument_node="">
</span><li data-dcnode-id="2680"><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Live-in care is a small but significant segment of the home care market in the UK. It relies heavily on migrant care workers, often recruited directly from abroad.</span></p><span data-dcnode-id="2681" instrument_node="">
</span></li><span data-dcnode-id="2679" instrument_node="">
</span><li data-dcnode-id="2671"><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2673"><span data-dcnode-id="2677" instrument_node="">Home care workers are significantly more likely to experience ‘high strain’ jobs than their colleagues working in residential care (Hussein, </span><a aria-label="Reference 2018" data-dcnode-id="2675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d89360573e577" title="Hussein, S. (2018). Job demand, control and unresolved stress within the emotional work of long term care in England. International Journal of Care and Caring, 2(1), 89–107."><span data-dcnode-id="2676" instrument_node="">2018</span></a><span data-dcnode-id="2674" instrument_node="">).</span></p><span data-dcnode-id="2672" instrument_node="">
</span></li><span data-dcnode-id="2670" instrument_node="">
</span><li data-dcnode-id="2662"><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2664"><span data-dcnode-id="2668" instrument_node="">Care is delivered in clients’ homes, and home care workers often work alone and thus have less organisational and peer support than those working in residential settings. The relational aspects of home care are also different from institutional forms of care (Denton et al., </span><a aria-label="Reference 2002" data-dcnode-id="2666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d89360573e587" title="Denton, M. A., Zeytinoğlu, I. U., &amp; Davies, S. (2002). Working in clients' homes: The impact on the mental health and well-being of visiting home care workers. Home health care services quarterly, 21(1), 1–27."><span data-dcnode-id="2667" instrument_node="">2002</span></a><span data-dcnode-id="2665" instrument_node="">).</span></p><span data-dcnode-id="2663" instrument_node="">
</span></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2653"><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2659" instrument_node="">The rapid spread of “disruptive technologies” such as introductory agencies and “uber-style” technology platforms that connect people who use services directly to those who provide them and its implications for worker and user rights and liability (Bolton &amp; Townson, </span><a aria-label="Reference 2018" data-dcnode-id="2657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d89360573e596" title="Bolton, J. &amp; Townson, J. (2018). Messages on the future of domiciliary care services. Oxford: Institute of Public Care. Available: 
                  https://ipc.brookes.ac.uk/publications/Messages-on-the-future-of-domiciliary-care-services.html
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2658" instrument_node="">2018</span></a><span data-dcnode-id="2656" instrument_node="">).</span></p><span data-dcnode-id="2654" instrument_node="">
</span></li><span data-dcnode-id="2652" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="2649" id="Sec3"><span data-dcnode-id="2650" instrument_node="">Social Care Workforce and Migrant Care Workers</span></h3><p data-dcnode-id="2641"><span data-dcnode-id="2648" instrument_node="">The social care workforce is predominantly female (over 80% in England and Scotland) and one of the lowest paid in the UK economy with average pay close to the statutory minimum wage (Skills for Care, </span><a aria-label="Reference 2020" data-dcnode-id="2646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d89360573e609" title="Skills for Care. (2020). Individual employers and the personal assistant workforce report, 2020. Leeds: Skills for Care, Available at 
                  www.skillsforcare.org.uk/topics
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2647" instrument_node="">2020</span></a><span data-dcnode-id="2645" instrument_node="">). Non-UK nationals make up 17 per cent of the social care workforce as a whole and 15 per cent of the home care workforce in England (no data are available for the other UK nations), with very little change since 2012 (Skills for Care, </span><a aria-label="Reference 2020" data-dcnode-id="2643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d89360573e612" title="Skills for Care. (2020). Individual employers and the personal assistant workforce report, 2020. Leeds: Skills for Care, Available at 
                  www.skillsforcare.org.uk/topics
                  
                 (last accessed: 29/08/2020)"><span data-dcnode-id="2644" instrument_node="">2020</span></a><span data-dcnode-id="2642" instrument_node="">).</span></p><p data-dcnode-id="2630"><span data-dcnode-id="2640" instrument_node="">Migrant workers have traditionally contributed significantly to health and social care in the UK (Simpson et al., </span><a aria-label="Reference 2010" data-dcnode-id="2638" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d89360573e618" title="Simpson, J. M., Esmail, A., Kalra, V. S., &amp; Snow, S. J. (2010). Writing migrants back into NHS history: Addressing a ‘collective amnesia’and its policy implications. Journal of the Royal Society of Medicine, 103(10), 392–396."><span data-dcnode-id="2639" instrument_node="">2010</span></a><span data-dcnode-id="2637" instrument_node="">). The share of EU migrants working in social care has increased since the accession of new Member States from Eastern Europe in 2004 and 2007 and the 2008 immigration reform that introduced restrictions on the direct recruitment of non-EEA workers to ‘low-skilled’ occupations. Currently eight per cent of non-British care workers are EEA, and nine per cent are non-EEA nationals, with significant regional variation (Skills for Care 2019). In 2017, the UK was the second largest destination of ‘mobile personal care workers’ within the EU, receiving a fifth of the intra-EU mobility (Fries-Tersch et al., </span><a aria-label="Reference 2018" data-dcnode-id="2635" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d89360573e621" title="Fries-Tersch, E., Tugran, T., Rossi, L., &amp; Bradley, H. (2018). 2017 Annual Report on Intra-EU Labour Mobility. Brussels, European Commission. 
                  https://doi.org/10.2767/974797
                  
                ."><span data-dcnode-id="2636" instrument_node="">2018</span></a><span data-dcnode-id="2634" instrument_node="">). By 2018, Romanian and Polish nationals were the two largest groups of workers in social care, followed by nationals from the Philippines, Nigeria, India, and Zimbabwe (Skills for Care 2019). Thus, migrants constitute a significant part of the formal care workforce and offer an additional recruitment pool from which providers in the sector have been filling labour gaps (Cangiano, </span><a aria-label="Reference 2014" data-dcnode-id="2632" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d89360573e624" title="Cangiano, A. (2014). Elder care and migrant labor in Europe: A demographic outlook. Population and Development Review, 40(1), 131–154."><span data-dcnode-id="2633" instrument_node="">2014</span></a><span data-dcnode-id="2631" instrument_node="">).</span></p><p data-dcnode-id="2616"><span data-dcnode-id="2629" instrument_node="">Reliance on migrant workers in the UK is among the highest in the EU, and it has been referred to as ‘a structural feature of the [UK] care sector’ (Cangiano et al., </span><a aria-label="Reference 2009" data-dcnode-id="2627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d89360573e630" title="Cangiano, A., Shutes, I., Spencer, S., &amp; Leeson, G. (2009). Migrant care workers in ageing societies: Research findings in the United Kingdom. COMPAS, University of Oxford."><span data-dcnode-id="2628" instrument_node="">2009</span></a><span data-dcnode-id="2626" instrument_node="">; p. 163). This has also been described as the ‘migrant in the market’ model, where reliance on migrant workers is largely attributed to their willingness to accept—at least temporarily—the low pay and difficult working conditions characteristic of a privatised and residual social care system in exchange for a relatively easy entry to the local labour market (van Hooren, </span><a aria-label="Reference 2012" data-dcnode-id="2624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d89360573e633" title="Van Hooren, F. J. (2012). Varieties of migrant care work: Comparing patterns of migrant labour in social care. Journal of European Social Policy, 22(2), 133–147. 
                  https://doi.org/10.1177/0958928711433654
                  
                ."><span data-dcnode-id="2625" instrument_node="">2012</span></a><span data-dcnode-id="2623" instrument_node="">; da Roit &amp; Weicht, </span><a aria-label="Reference 2013" data-dcnode-id="2621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d89360573e636" title="Da Roit, B., &amp; Weicht, B. (2013). Migrant care work and care, migration and employment regimes: A fuzzy-set analysis. Journal of European Social Policy, 23(5), 469–486."><span data-dcnode-id="2622" instrument_node="">2013</span></a><span data-dcnode-id="2620" instrument_node="">). All else being equal, non-UK nationals were more likely to leave a social care job than their British national colleagues (Vadean et al. forthcoming). An important feature of the UK migrant care workforce, currently, is that the majority are recruited locally and have unrestricted right to work in the country (Cangiano et al., </span><a aria-label="Reference 2009" data-dcnode-id="2618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d89360573e639" title="Cangiano, A., Shutes, I., Spencer, S., &amp; Leeson, G. (2009). Migrant care workers in ageing societies: Research findings in the United Kingdom. COMPAS, University of Oxford."><span data-dcnode-id="2619" instrument_node="">2009</span></a><span data-dcnode-id="2617" instrument_node="">, p. 66-67), and they participate in formalised care provision and labour market.</span></p></div></div></section><section data-dcnode-id="2574" data-gtm-vis-first-on-screen-50443292_562="731" data-gtm-vis-first-on-screen-50443292_563="730" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="731" data-gtm-vis-recent-on-screen-50443292_563="730" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Aims and Review Questions"><div class="c-article-section" data-dcnode-id="2575" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2611" id="Sec4"><span data-dcnode-id="2612" instrument_node="">Aims and Review Questions</span></h2><div class="c-article-section__content" data-dcnode-id="2576" id="Sec4-content"><p data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">This scoping review is part of a larger study investigating migrant labour in the UK home care sector. The review undertaken aimed to take stock of available evidence on the contribution of migrant workers to the provision of home care in the UK and contribute to the assessment of challenges in the context of Brexit and changing immigration rules. In particular, the review set out to examine the following questions:
</span></p><ul class="u-list-style-dash" data-dcnode-id="2577"><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2603"><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">What are the experiences of migrant care workers in the UK (migrant outcomes)? What is known about the wellbeing of migrant care workers?</span></p><span data-dcnode-id="2604" instrument_node="">
</span></li><span data-dcnode-id="2602" instrument_node="">
</span><li data-dcnode-id="2597"><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">What drives the recruitment of migrant care workers and what are the actual and perceived benefits of employing them from the perspective of employers (employer outcomes)?</span></p><span data-dcnode-id="2598" instrument_node="">
</span></li><span data-dcnode-id="2596" instrument_node="">
</span><li data-dcnode-id="2591"><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">What are the experiences of care users in relation to home care provided by migrant workers (service user outcomes)?</span></p><span data-dcnode-id="2592" instrument_node="">
</span></li><span data-dcnode-id="2590" instrument_node="">
</span><li data-dcnode-id="2585"><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">What is the impact of migrant workers on the workforce as a whole (workforce outcomes)?</span></p><span data-dcnode-id="2586" instrument_node="">
</span></li><span data-dcnode-id="2584" instrument_node="">
</span><li data-dcnode-id="2579"><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">What is known about the sustainability of supply and demand for migrant care workers (sustainability)?</span></p><span data-dcnode-id="2580" instrument_node="">
</span></li><span data-dcnode-id="2578" instrument_node="">
</span></ul></div></div></section><section data-dcnode-id="2526" data-title="Methods"><div class="c-article-section" data-dcnode-id="2527" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2572" id="Sec5"><span data-dcnode-id="2573" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="2528" id="Sec5-content"><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">The review used systematic searches and developed a narrative synthesis of the literature.</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2569" instrument_node="">Studies that comment on any type or aspect of home care provided by migrant care workers in the UK, including comparative studies, were considered for inclusion in the review. Given our focus on current patterns and challenges in the context of Brexit—the end of free movement—only literature published between 2004 and 2019 were included. The year was selected to coincide with the EU’s first Eastward enlargement and the opening up of the labour market to a large number of workers from the new member states (Pollard et al., </span><a aria-label="Reference 2008" data-dcnode-id="2567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d89360573e694" title="Pollard, N., Latorre, M., &amp; Sriskandarajah, D. (2008). Floodgates or turnstiles. Post-EU Enlargement Migration Flows to (and from) the UK."><span data-dcnode-id="2568" instrument_node="">2008</span></a><span data-dcnode-id="2566" instrument_node="">).</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Peer-reviewed publications, PhD dissertations, and reports published as grey literature were eligible for inclusion if they included some empirical analysis of primary or secondary data. Non-empirical studies (e.g. commentaries) and books were excluded. Systematic reviews were screened for potentially eligible studies. Only research published in English was included in the review.</span></p><p data-dcnode-id="2558"><span data-dcnode-id="2562" instrument_node="">Eight electronic databases were searched using both free text and keyword terms combined with Boolean operators AND and OR (see Table </span><a data-dcnode-id="2560" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2561" instrument_node="">1</span></a><span data-dcnode-id="2559" instrument_node="">). No geographical filters were used to ensure that UK literature was fully captured in the search results. Language and publication date filters were applied to search results.
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2543" data-test="inline-table" id="table-1"><figure data-dcnode-id="2544"><figcaption class="c-article-table__figcaption" data-dcnode-id="2555"><b data-dcnode-id="2556" data-test="table-caption" id="Tab1"><span data-dcnode-id="2557" instrument_node="">Table 1 Databases and search terms used</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2545"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2546" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/tables/1" rel="nofollow"><span data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2547" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2548" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2549" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2552" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2551" fill-rule="evenodd"></path><span data-dcnode-id="2550" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Titles and abstracts of studies identified through electronic searching were screened against the eligibility criteria by AT, and decisions were reviewed by SH. Original searches were conducted in May–June 2018 and updated in May 2019 and August 2020, and this resulted in no further studies.</span></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">A form (in Microsoft Excel) with the following categories was used to extract information from the studies: study aims, review themes, participants, methods, theoretical framework, findings, implications for Brexit, and limitations.</span></p><p data-dcnode-id="2534"><span data-dcnode-id="2538" instrument_node="">The quality of studies was not assessed in a formal way, and no papers were excluded from the analysis on the basis of risk of bias (Arksey &amp; O’Malley, </span><a aria-label="Reference 2005" data-dcnode-id="2536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d89360573e781" title="Arksey, H., &amp; O'Malley, L. (2005). Scoping studies: Towards a methodological framework. International journal of social research methodology, 8(1), 19–32."><span data-dcnode-id="2537" instrument_node="">2005</span></a><span data-dcnode-id="2535" instrument_node="">). However, in the process of data extraction, limitations and potential sources of bias were noted for each paper. The quality of research and the limitations of the evidence base are discussed in more detail in the findings section.</span></p><p data-dcnode-id="2529"><span data-dcnode-id="2533" instrument_node="">The analysis presents a narrative description and synthesis of the existing literature using the review questions as a conceptual framework. Studies were coded according to their relevance to each of the key topics of the review (i.e. review questions), and data was extracted into the template. This was then analysed using a framework approach (Thomas et al., </span><a aria-label="Reference 2012" data-dcnode-id="2531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d89360573e787" title="Thomas, J., Harden, A., &amp; Newman, M. (2012). Synthesis: Combining results systematically and appropriately. In D. Gough, S. Oliver, &amp; J. Thomas (Eds.), An Introduction to Systematic Reviews (pp. 179–227). Sage Publications."><span data-dcnode-id="2532" instrument_node="">2012</span></a><span data-dcnode-id="2530" instrument_node="">; pp. 191-93).</span></p></div></div></section><section data-dcnode-id="2132" data-title="Results"><div class="c-article-section" data-dcnode-id="2133" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2524" id="Sec6"><span data-dcnode-id="2525" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2134" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="2522" id="Sec7"><span data-dcnode-id="2523" instrument_node="">Search Results</span></h3><p data-dcnode-id="2517"><span data-dcnode-id="2521" instrument_node="">The search of electronic databases yielded 4274 titles, before removal of duplicates across databases. After the removal of duplicates, initial screening, and application of eligibility criteria based on the abstract, 49 papers were marked as potentially relevant (Fig. </span><a data-dcnode-id="2519" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2520" instrument_node="">1</span></a><span data-dcnode-id="2518" instrument_node="">). If a study was available as both a report and a peer-reviewed publication, only the published peer-reviewed paper was included in the review.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2493" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2494"><figcaption data-dcnode-id="2514"><b class="c-article-section__figure-caption" data-dcnode-id="2515" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2516" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2505"><div class="c-article-section__figure-item" data-dcnode-id="2509"><a class="c-article-section__figure-link" data-dcnode-id="2510" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/figures/1" rel="nofollow"><picture data-dcnode-id="2511"><source data-dcnode-id="2513" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12134-021-00807-3/MediaObjects/12134_2021_807_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2512" height="694" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12134-021-00807-3/MediaObjects/12134_2021_807_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2506" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Prisma flow chart</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2495"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2496" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/figures/1" rel="nofollow"><span data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2497" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2498" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2499" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2502" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2501" fill-rule="evenodd"></path><span data-dcnode-id="2500" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2488"><span data-dcnode-id="2492" instrument_node="">Of the 49 studies retrieved, 28 were excluded due to eligibility: lack of empirical analysis or non-UK focus. This left 21 studies for full-text screening and data extraction. At this stage, another study was excluded because it did not include any home care workers, and two further papers were identified through citation tracking. This resulted in a total of 22 studies included in the review (Table </span><a data-dcnode-id="2490" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2491" instrument_node="">2</span></a><span data-dcnode-id="2489" instrument_node="">).
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2473" data-test="inline-table" id="table-2"><figure data-dcnode-id="2474"><figcaption class="c-article-table__figcaption" data-dcnode-id="2485"><b data-dcnode-id="2486" data-test="table-caption" id="Tab2"><span data-dcnode-id="2487" instrument_node="">Table 2 Studies in included in the review</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2475"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2476" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/tables/2" rel="nofollow"><span data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2477" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2478" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2479" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2482" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2481" fill-rule="evenodd"></path><span data-dcnode-id="2480" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2471" id="Sec8"><span data-dcnode-id="2472" instrument_node="">Description of the Literature</span></h3><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">The 22 papers in the review came from a total of seven studies. Four studies contributed more than one publication:
</span></p><ul class="u-list-style-dash" data-dcnode-id="2443"><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2463"><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">International social care workers: initial outcomes, workforce experiences, and future expectations, 2007-10 (NIHR-CCF 056/0013) (Hussein, Manthorpe, Stevens)</span></p><span data-dcnode-id="2464" instrument_node="">
</span></li><span data-dcnode-id="2462" instrument_node="">
</span><li data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Longitudinal Care Work Study, 2009-18 (DH/035/0095) (Hussein, Manthorpe, Stevens, Moriarty)</span></p><span data-dcnode-id="2458" instrument_node="">
</span></li><span data-dcnode-id="2456" instrument_node="">
</span><li data-dcnode-id="2451"><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">The Role of Migrant Care Workers in Ageing Societies, 2007-09 (The Atlantic Philanthropies and Nuffield Foundation) (Shutes, Walsh, Cangiano)</span></p><span data-dcnode-id="2452" instrument_node="">
</span></li><span data-dcnode-id="2450" instrument_node="">
</span><li data-dcnode-id="2445"><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Welfare policy and care work. A cross-national Norwegian / UK social study of migrants in care work, 2011-12, (Meltzer Foundation, Norway) (Christensen, Manthorpe, Hussein)</span></p><span data-dcnode-id="2446" instrument_node="">
</span></li><span data-dcnode-id="2444" instrument_node="">
</span></ul><p data-dcnode-id="2420"><span data-dcnode-id="2442" instrument_node="">Only three papers focused specifically on home care (Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e1801" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2441" instrument_node="">2010</span></a><span data-dcnode-id="2439" instrument_node="">; Christensen &amp; Manthorpe, </span><a aria-label="Reference 2016" data-dcnode-id="2437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d89360573e1804" title="Christensen, K., &amp; Manthorpe, J. (2016). Personalised risk: New risk encounters facing migrant care workers. Health, Risk &amp; Society, 18(3-4), 137–152."><span data-dcnode-id="2438" instrument_node="">2016</span></a><span data-dcnode-id="2436" instrument_node="">; Christensen, </span><a aria-label="Reference 2017" data-dcnode-id="2434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d89360573e1807" title="Christensen, K. (2017). Life trajectories of migrant care workers in the long-term care sectors in Norway and the UK. Social Policy and Society, 16(4), 635–644."><span data-dcnode-id="2435" instrument_node="">2017</span></a><span data-dcnode-id="2433" instrument_node="">). The others included both home and residential care, and one also included social workers. Two studies (McGregor, </span><a aria-label="Reference 2007" data-dcnode-id="2431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1810" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2432" instrument_node="">2007</span></a><span data-dcnode-id="2430" instrument_node="">; Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e1813" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2429" instrument_node="">2010</span></a><span data-dcnode-id="2427" instrument_node="">) focused on migrants from a specific region (Africa); Hussein et al. (</span><a aria-label="Reference 2011a" data-dcnode-id="2425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d89360573e1817" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011a). Exploring the potential of refugees and asylum seekers for social care work in England: A qualitative study. Health &amp; social care in the community, 19(5), 468–475."><span data-dcnode-id="2426" instrument_node="">2011a</span></a><span data-dcnode-id="2424" instrument_node="">) considered the experiences of care workers who came to the UK as refugees and asylum seekers, and one paper (Read &amp; Fenge, </span><a aria-label="Reference 2019" data-dcnode-id="2422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d89360573e1820" title="Read, R., &amp; Fenge, L. A. (2019). What does Brexit mean for the UK social care workforce? Perspectives from the recruitment and retention frontline. Health &amp; social care in the community, 27(3), 676–682."><span data-dcnode-id="2423" instrument_node="">2019</span></a><span data-dcnode-id="2421" instrument_node="">) explored the perspectives of employers on workforce challenges associated with Brexit. All other papers had a broad focus on migrants from any countries, although some commented on similarities and differences between various groups (e.g. EEA, Commonwealth, and non-EEA).</span></p><p data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">Most papers (</span><i data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">n</span></i><span data-dcnode-id="2416" instrument_node="">=13) were qualitative; there was one quantitative analysis, and eight studies adopted a mixed methods approach combining survey/secondary analysis with qualitative methods.</span></p><p data-dcnode-id="2392"><span data-dcnode-id="2414" instrument_node="">Most papers addressed more than one topic, and the highest number of studies contributed to the questions of migrant care worker (MCW) outcomes (</span><i data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">n</span></i><span data-dcnode-id="2411" instrument_node=""> = 12) and sustainability (</span><i data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">n</span></i><span data-dcnode-id="2408" instrument_node=""> = 9), while relatively few studies explored employer (</span><i data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">n</span></i><span data-dcnode-id="2405" instrument_node=""> = 4), workforce (</span><i data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">n</span></i><span data-dcnode-id="2402" instrument_node=""> = 3), or service user outcomes (</span><i data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">n</span></i><span data-dcnode-id="2399" instrument_node=""> = 3) (Fig. </span><a data-dcnode-id="2397" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2398" instrument_node="">2</span></a><span data-dcnode-id="2396" instrument_node="">). The characteristics of studies are summarised in Table </span><a data-dcnode-id="2394" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2395" instrument_node="">2</span></a><span data-dcnode-id="2393" instrument_node="">.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2368" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2369"><figcaption data-dcnode-id="2389"><b class="c-article-section__figure-caption" data-dcnode-id="2390" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2391" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2380"><div class="c-article-section__figure-item" data-dcnode-id="2384"><a class="c-article-section__figure-link" data-dcnode-id="2385" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/figures/2" rel="nofollow"><picture data-dcnode-id="2386"><source data-dcnode-id="2388" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12134-021-00807-3/MediaObjects/12134_2021_807_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2387" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12134-021-00807-3/MediaObjects/12134_2021_807_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2381" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Themes identified in the literature</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2370"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2371" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12134-021-00807-3/figures/2" rel="nofollow"><span data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2372" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2373" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2374" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2377" instrument_node="">
