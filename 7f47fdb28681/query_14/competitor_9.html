</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2366" id="Sec9"><span data-dcnode-id="2367" instrument_node="">Synthesis of the Literature</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2364" id="Sec10"><span data-dcnode-id="2365" instrument_node="">Migrant Care Worker Outcomes</span></h4><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Four themes were identified in relation to migrant care worker outcomes: migrant agency, migrant experience, risks and vulnerabilities, and relationships and values in care.</span></p><p data-dcnode-id="2339"><span data-dcnode-id="2361" instrument_node="">The relevance of ‘migrant agency’ is highlighted in several papers (Christensen, </span><a aria-label="Reference 2017" data-dcnode-id="2359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d89360573e1886" title="Christensen, K. (2017). Life trajectories of migrant care workers in the long-term care sectors in Norway and the UK. Social Policy and Society, 16(4), 635–644."><span data-dcnode-id="2360" instrument_node="">2017</span></a><span data-dcnode-id="2358" instrument_node="">; Christensen et al., </span><a aria-label="Reference 2017" data-dcnode-id="2356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d89360573e1889" title="Christensen, K., Hussein, S., &amp; Ismail, M. (2017). Migrants’ decision-process shaping work destination choice: The case of long-term care work in the United Kingdom and Norway. European Journal of Ageing, 14(3), 219–232."><span data-dcnode-id="2357" instrument_node="">2017</span></a><span data-dcnode-id="2355" instrument_node="">; Hussein et al., </span><a aria-label="Reference 2013" data-dcnode-id="2353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d89360573e1892" title="Hussein, S., Stevens, M., &amp; Manthorpe, J. (2013). Migrants’ motivations to work in the care sector: experiences from England within the context of EU enlargement. European journal of ageing, 10(2), 101–109."><span data-dcnode-id="2354" instrument_node="">2013</span></a><span data-dcnode-id="2352" instrument_node="">). The decision to move to the UK and taking up employment in social care are separate steps in the migration trajectory. The UK is often chosen as a direct destination (Christensen, </span><a aria-label="Reference 2017" data-dcnode-id="2350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d89360573e1895" title="Christensen, K. (2017). Life trajectories of migrant care workers in the long-term care sectors in Norway and the UK. Social Policy and Society, 16(4), 635–644."><span data-dcnode-id="2351" instrument_node="">2017</span></a><span data-dcnode-id="2349" instrument_node="">), and the status of the English language as an ‘exportable asset’ potentially facilitates short-term and temporary migration (Christensen et al., </span><a aria-label="Reference 2017" data-dcnode-id="2347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d89360573e1898" title="Christensen, K., Hussein, S., &amp; Ismail, M. (2017). Migrants’ decision-process shaping work destination choice: The case of long-term care work in the United Kingdom and Norway. European Journal of Ageing, 14(3), 219–232."><span data-dcnode-id="2348" instrument_node="">2017</span></a><span data-dcnode-id="2346" instrument_node="">). The decision to work in social care is often pragmatic and instrumental (Hussein et al., </span><a aria-label="Reference 2011b" data-dcnode-id="2344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d89360573e1902" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011b). The experiences of migrant social work and social care practitioners in the UK: Findings from an online survey. European Journal of Social Work, 14(4), 479–496."><span data-dcnode-id="2345" instrument_node="">2011b</span></a><span data-dcnode-id="2343" instrument_node="">). Although migrants recognise the disadvantages of working in social care—low pay, low status, and precarious conditions—they also see it as a stepping stone towards other jobs in the sector or beyond. Researching the Zimbabwean community in the UK, McGregor (</span><a aria-label="Reference 2007" data-dcnode-id="2341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1905" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2342" instrument_node="">2007</span></a><span data-dcnode-id="2340" instrument_node="">) shows how becoming a care worker is part of the arrival narrative, and although entry to care often occurs for pragmatic reasons, a number of positive comparisons are made with other sectors that employ large numbers of migrants (such as construction).</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2338" instrument_node="">Migrant care workers represent a very diverse group in the UK. Christensen et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d89360573e1911" title="Christensen, K., Hussein, S., &amp; Ismail, M. (2017). Migrants’ decision-process shaping work destination choice: The case of long-term care work in the United Kingdom and Norway. European Journal of Ageing, 14(3), 219–232."><span data-dcnode-id="2337" instrument_node="">2017</span></a><span data-dcnode-id="2335" instrument_node="">) found no dominant settlement tradition in life stories of migrant care workers: some settle and acquire British citizenship but maintain a strong sense of belonging, while others return or move to other countries.</span></p><p data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node="">Crossing more traditional gender divisions of labour is another aspect of migrant agency. Migrant men are overrepresented in care work, and their entry and settlement dynamics are also distinct from those of women. Hussein and Christensen (</span><a aria-label="Reference 2017" data-dcnode-id="2331" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d89360573e1917" title="Hussein, S., &amp; Christensen, K. (2017). Migration, gender and low-paid work: on migrant men’s entry dynamics into the feminised social care work in the UK. Journal of Ethnic and Migration Studies, 43(5), 749–765."><span data-dcnode-id="2332" instrument_node="">2017</span></a><span data-dcnode-id="2330" instrument_node="">) identify three such dynamics: ‘stumbling upon care work’; negotiating a ‘trapdoor’ of gendered expectations to gain access to the sector; and developing compensating perspectives, including material and relational justifications and positive male roles.</span></p><p data-dcnode-id="2288"><span data-dcnode-id="2328" instrument_node="">The second theme, ‘the migrant experience’, refers to a range of lived experiences associated with being a migrant, first and foremost. Migrant care workers often describe themselves in interviews as ‘resilient’, ‘committed’, or ‘determined’ and view these characteristics as assets and a positive contribution to social care (Hussein et al., </span><a aria-label="Reference 2011b" data-dcnode-id="2326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d89360573e1924" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011b). The experiences of migrant social work and social care practitioners in the UK: Findings from an online survey. European Journal of Social Work, 14(4), 479–496."><span data-dcnode-id="2327" instrument_node="">2011b</span></a><span data-dcnode-id="2325" instrument_node="">). These characteristics are also evoked to cope with negative experiences many migrant care workers encounter. Discrimination, racism, and unfair treatment were often mentioned in the reviewed literature, especially for non-white migrant care workers (Hussein et al., </span><a aria-label="Reference 2011a" data-dcnode-id="2323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d89360573e1927" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011a). Exploring the potential of refugees and asylum seekers for social care work in England: A qualitative study. Health &amp; social care in the community, 19(5), 468–475."><span data-dcnode-id="2324" instrument_node="">2011a</span></a><span data-dcnode-id="2322" instrument_node="">, </span><a aria-label="Reference 2011b" data-dcnode-id="2320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d89360573e1930" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011b). The experiences of migrant social work and social care practitioners in the UK: Findings from an online survey. European Journal of Social Work, 14(4), 479–496."><span data-dcnode-id="2321" instrument_node="">2011b</span></a><span data-dcnode-id="2319" instrument_node="">; Shutes &amp; Walsh, </span><a aria-label="Reference 2012" data-dcnode-id="2317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d89360573e1933" title="Shutes, I., &amp; Walsh, K. (2012). Negotiating user preferences, discrimination, and demand for migrant labour in long-term care. Social politics, 19(1), 78–104."><span data-dcnode-id="2318" instrument_node="">2012</span></a><span data-dcnode-id="2316" instrument_node="">; Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e1936" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2315" instrument_node="">2010</span></a><span data-dcnode-id="2313" instrument_node="">; McGregor, </span><a aria-label="Reference 2007" data-dcnode-id="2311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1940" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2312" instrument_node="">2007</span></a><span data-dcnode-id="2310" instrument_node="">; Stevens et al., </span><a aria-label="Reference 2012" data-dcnode-id="2308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d89360573e1943" title="Stevens, M., Hussein, S., &amp; Manthorpe, J. (2012). Experiences of racism and discrimination among migrant care workers in England: findings from a mixed-methods research project. Ethnic and Racial Studies, 35(2), 259–280."><span data-dcnode-id="2309" instrument_node="">2012</span></a><span data-dcnode-id="2307" instrument_node="">; Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e1946" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2306" instrument_node="">2013</span></a><span data-dcnode-id="2304" instrument_node="">). Racism, however, is not necessarily open and direct; it is often expressed through cultural and linguistic ‘grievances’ as well as racialised assumptions/expectations about competence and character (Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e1949" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2303" instrument_node="">2013</span></a><span data-dcnode-id="2301" instrument_node="">). Support from management and co-workers is crucial, but not always offered in the context of personalisation and user choice, where migrant care workers are often expected to tolerate racism, particularly from people seen as ‘vulnerable’ (Shutes &amp; Walsh, </span><a aria-label="Reference 2012" data-dcnode-id="2299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d89360573e1952" title="Shutes, I., &amp; Walsh, K. (2012). Negotiating user preferences, discrimination, and demand for migrant labour in long-term care. Social politics, 19(1), 78–104."><span data-dcnode-id="2300" instrument_node="">2012</span></a><span data-dcnode-id="2298" instrument_node="">; Stevens et al., </span><a aria-label="Reference 2012" data-dcnode-id="2296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d89360573e1955" title="Stevens, M., Hussein, S., &amp; Manthorpe, J. (2012). Experiences of racism and discrimination among migrant care workers in England: findings from a mixed-methods research project. Ethnic and Racial Studies, 35(2), 259–280."><span data-dcnode-id="2297" instrument_node="">2012</span></a><span data-dcnode-id="2295" instrument_node="">). Many migrant care workers are part of global care chains, with families left behind and/or a lack of familial networks in the UK. In the context of restrictive migration policies, family expectations and managing their own caring arrangements can put pressure on migrants and increase their vulnerability to exploitation or limit their opportunities for advancement (Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2293" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e1959" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2294" instrument_node="">2010</span></a><span data-dcnode-id="2292" instrument_node="">; McGregor, </span><a aria-label="Reference 2007" data-dcnode-id="2290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1962" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2291" instrument_node="">2007</span></a><span data-dcnode-id="2289" instrument_node="">).</span></p><p data-dcnode-id="2274"><span data-dcnode-id="2287" instrument_node="">The third theme ‘risks and vulnerabilities’ highlights that migrant care workers are more vulnerable to risks created by the structural combination of personalisation and care work organisation. These include precarity, isolation, emotional challenges, gendered risks of abuse, and unfair treatment (Shutes, </span><a aria-label="Reference 2012" data-dcnode-id="2285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d89360573e1968" title="Shutes, I. (2012). The employment of migrant workers in long-term care: Dynamics of choice and control. Journal of Social Policy, 41(1), 43–59."><span data-dcnode-id="2286" instrument_node="">2012</span></a><span data-dcnode-id="2284" instrument_node="">; Shutes &amp; Walsh, </span><a aria-label="Reference 2012" data-dcnode-id="2282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d89360573e1971" title="Shutes, I., &amp; Walsh, K. (2012). Negotiating user preferences, discrimination, and demand for migrant labour in long-term care. Social politics, 19(1), 78–104."><span data-dcnode-id="2283" instrument_node="">2012</span></a><span data-dcnode-id="2281" instrument_node="">; Christensen &amp; Manthorpe, </span><a aria-label="Reference 2016" data-dcnode-id="2279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d89360573e1974" title="Christensen, K., &amp; Manthorpe, J. (2016). Personalised risk: New risk encounters facing migrant care workers. Health, Risk &amp; Society, 18(3-4), 137–152."><span data-dcnode-id="2280" instrument_node="">2016</span></a><span data-dcnode-id="2278" instrument_node="">). The nature of home care, particularly the blurring between private and public, employer, and client aspects, can further complicate this problem in the context of a marketised system (Shutes &amp; Walsh, </span><a aria-label="Reference 2012" data-dcnode-id="2276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d89360573e1977" title="Shutes, I., &amp; Walsh, K. (2012). Negotiating user preferences, discrimination, and demand for migrant labour in long-term care. Social politics, 19(1), 78–104."><span data-dcnode-id="2277" instrument_node="">2012</span></a><span data-dcnode-id="2275" instrument_node="">).</span></p><p data-dcnode-id="2251"><span data-dcnode-id="2273" instrument_node="">The fourth theme to emerge from this review is ‘relationships and values in care’. This is about how migrants see their role and contribution to social care. Several studies highlight that working in care—despite all the difficulties—is a valued experience for many migrant care workers and find that relationships with clients are a core determinant of positive outcomes (McGregor, </span><a aria-label="Reference 2007" data-dcnode-id="2271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1983" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2272" instrument_node="">2007</span></a><span data-dcnode-id="2270" instrument_node="">; Hussein et al., </span><a aria-label="Reference 2013" data-dcnode-id="2268" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d89360573e1986" title="Hussein, S., Stevens, M., &amp; Manthorpe, J. (2013). Migrants’ motivations to work in the care sector: experiences from England within the context of EU enlargement. European journal of ageing, 10(2), 101–109."><span data-dcnode-id="2269" instrument_node="">2013</span></a><span data-dcnode-id="2267" instrument_node="">). Relational aspects of care are seen as particularly important in home care (Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e1989" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2266" instrument_node="">2013</span></a><span data-dcnode-id="2264" instrument_node="">), and many migrant workers construct work as ‘nurturing’ and ‘holistic’ and clients as ‘family’, placing emphasis on their own societal and cultural values, such as respect and care (McGregor, </span><a aria-label="Reference 2007" data-dcnode-id="2262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d89360573e1992" title="McGregor, J. (2007). ‘Joining the BBC (British Bottom Cleaners)’: Zimbabwean migrants and the UK care industry. Journal of ethnic and migration studies, 33(5), 801–824."><span data-dcnode-id="2263" instrument_node="">2007</span></a><span data-dcnode-id="2261" instrument_node="">; Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e1995" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2260" instrument_node="">2010</span></a><span data-dcnode-id="2258" instrument_node="">; Hussein et al., </span><a aria-label="Reference 2013" data-dcnode-id="2256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d89360573e1999" title="Hussein, S., Stevens, M., &amp; Manthorpe, J. (2013). Migrants’ motivations to work in the care sector: experiences from England within the context of EU enlargement. European journal of ageing, 10(2), 101–109."><span data-dcnode-id="2257" instrument_node="">2013</span></a><span data-dcnode-id="2255" instrument_node="">). This might result in tensions between personal values and the commodified and corporatised system of care, with implications for the emotional wellbeing of migrant care workers (Datta et al., </span><a aria-label="Reference 2010" data-dcnode-id="2253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d89360573e2002" title="Datta, K., McIlwaine, C., Evans, Y., Herbert, J., May, J., &amp; Wills, J. (2010). A migrant ethic of care? Negotiating care and caring among migrant workers in London's low-pay economy. Feminist Review, 94(1), 93–116."><span data-dcnode-id="2254" instrument_node="">2010</span></a><span data-dcnode-id="2252" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2249" id="Sec11"><span data-dcnode-id="2250" instrument_node="">Service User Outcomes</span></h4><p data-dcnode-id="2226"><span data-dcnode-id="2248" instrument_node="">Few studies explored the experiences of service users in relation to social care provided by migrant workers (Manthorpe et al., </span><a aria-label="Reference 2012a" data-dcnode-id="2246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d89360573e2013" title="Manthorpe, J., Hussein, S., &amp; Stevens, M. (2012a). Communication with migrant workers: The perspectives of people using care services in England. Practice, 24(5), 299–314."><span data-dcnode-id="2247" instrument_node="">2012a</span></a><span data-dcnode-id="2245" instrument_node="">; Manthorpe et al., </span><a aria-label="Reference 2012b" data-dcnode-id="2243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d89360573e2016" title="Manthorpe, J., Hussein, S., Stevens, M., &amp; Moriarty, J. (2012b). User and carer experiences of international social care workers in England: Listening to their accounts of choice and control. Australian Social Work, 65(4), 442–456."><span data-dcnode-id="2244" instrument_node="">2012b</span></a><span data-dcnode-id="2242" instrument_node="">; Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e2019" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2241" instrument_node="">2013</span></a><span data-dcnode-id="2239" instrument_node="">). Manthorpe et al. (</span><a aria-label="Reference 2012b" data-dcnode-id="2237" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d89360573e2022" title="Manthorpe, J., Hussein, S., Stevens, M., &amp; Moriarty, J. (2012b). User and carer experiences of international social care workers in England: Listening to their accounts of choice and control. Australian Social Work, 65(4), 442–456."><span data-dcnode-id="2238" instrument_node="">2012b</span></a><span data-dcnode-id="2236" instrument_node="">) identified four ‘ideal types’ in terms of satisfaction with care and preference for British care workers. While some service users voice openly racist and discriminatory views and preferences for care workers, many people are more cautious in expressing such views. Key concerns from the perspective of service users are cultural and linguistic proficiency and relationships with migrant care workers. While cultural and linguistic ‘grievances’ are often an expression of racism and discrimination, there is also evidence that a lack of cultural and linguistic proficiency—which makes communication ‘hard work’—may be associated with negative user outcomes, such as loneliness and isolation, especially for more vulnerable people (Manthorpe et al., </span><a aria-label="Reference 2012a" data-dcnode-id="2234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d89360573e2025" title="Manthorpe, J., Hussein, S., &amp; Stevens, M. (2012a). Communication with migrant workers: The perspectives of people using care services in England. Practice, 24(5), 299–314."><span data-dcnode-id="2235" instrument_node="">2012a</span></a><span data-dcnode-id="2233" instrument_node="">). Characteristics associated with the ‘migrant experience’ such as resilience, commitment, and maturity, however, are often highly valued by service users and can to some extent compensate for a lack of cultural and linguistic proficiency that has the potential to improve with time and continuity (Manthorpe et al., </span><a aria-label="Reference 2012a" data-dcnode-id="2231" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d89360573e2029" title="Manthorpe, J., Hussein, S., &amp; Stevens, M. (2012a). Communication with migrant workers: The perspectives of people using care services in England. Practice, 24(5), 299–314."><span data-dcnode-id="2232" instrument_node="">2012a</span></a><span data-dcnode-id="2230" instrument_node="">; Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e2032" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2229" instrument_node="">2013</span></a><span data-dcnode-id="2227" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2224" id="Sec12"><span data-dcnode-id="2225" instrument_node="">Employer Outcomes</span></h4><p data-dcnode-id="2207"><span data-dcnode-id="2223" instrument_node="">The three themes for employer outcomes are the following: migrant workers are a </span><i data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">source of flexibility</span></i><span data-dcnode-id="2220" instrument_node="">; impact on </span><i data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">quality of care</span></i><span data-dcnode-id="2217" instrument_node="">; and the </span><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">burden of employing</span></i><span data-dcnode-id="2214" instrument_node=""> migrant care workers. Migrant care workers fill gaps in the supply of British-born workers and provide an important ‘source of flexibility’ for providers in three key aspects (Shutes &amp; Chiatti, </span><a aria-label="Reference 2012" data-dcnode-id="2212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d89360573e2052" title="Shutes, I., &amp; Chiatti, C. (2012). Migrant labour and the marketisation of care for older people: The employment of migrant care workers by families and service providers. Journal of European social policy, 22(4), 392–405."><span data-dcnode-id="2213" instrument_node="">2012</span></a><span data-dcnode-id="2211" instrument_node="">): (1) migrant workers, especially initially, are more likely to accept less favourable conditions; (2) they are more ‘available’ for work (i.e. willing to work longer or unsocial hours); and (3) they are perceived to be more ‘committed’ and ‘reliable’ by their employers, most likely due to their immigration status or recent migration experience. As put by Hussein et al. (</span><a aria-label="Reference 2011b" data-dcnode-id="2209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d89360573e2055" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011b). The experiences of migrant social work and social care practitioners in the UK: Findings from an online survey. European Journal of Social Work, 14(4), 479–496."><span data-dcnode-id="2210" instrument_node="">2011b</span></a><span data-dcnode-id="2208" instrument_node="">), ‘the main reason why the English care sector recruits migrants is their willingness to do work that may be seen as unattractive by the local population. This appears to be more important than other attributes’ (p. 295).</span></p><p data-dcnode-id="2190"><span data-dcnode-id="2206" instrument_node="">The ‘burden and challenges’ theme highlights some of the difficulties associated with employing migrant workers: induction and training for new migrants; tensions arising from mediating racialised/discriminatory user preferences and workers’ rights to non-discrimination and dignity; and ‘paperwork’ (Cangiano &amp; Shutes, </span><a aria-label="Reference 2010" data-dcnode-id="2204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d89360573e2061" title="Cangiano, A., &amp; Shutes, I. (2010). Ageing, demand for care and the role of migrant care workers in the UK. Journal of Population Ageing, 3(1-2), 39–57."><span data-dcnode-id="2205" instrument_node="">2010</span></a><span data-dcnode-id="2203" instrument_node="">; Shutes &amp; Walsh, </span><a aria-label="Reference 2012" data-dcnode-id="2201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d89360573e2064" title="Shutes, I., &amp; Walsh, K. (2012). Negotiating user preferences, discrimination, and demand for migrant labour in long-term care. Social politics, 19(1), 78–104."><span data-dcnode-id="2202" instrument_node="">2012</span></a><span data-dcnode-id="2200" instrument_node="">). Increasingly complex immigration rules and requirements put administrative and financial pressure on employers and create ‘risk work’ associated with ‘getting it wrong’, an issue that particularly affects smaller providers and may prevent some from employing job applicants subject to immigration control (Manthorpe et al., </span><a aria-label="Reference 2018" data-dcnode-id="2198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d89360573e2067" title="Manthorpe, J., Harris, J., Stevens, M., &amp; Moriarty, J. (2018). ‘We’re effectively becoming immigration officers’: Social care managers’ experiences of the risk work of employing migrant care workers. Health, Risk &amp; Society, 20(3-4), 113–125."><span data-dcnode-id="2199" instrument_node="">2018</span></a><span data-dcnode-id="2197" instrument_node="">). There are some suggestions of relatively high levels of irregular employment of migrant workers in social care (Cangiano &amp; Shutes, </span><a aria-label="Reference 2010" data-dcnode-id="2195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d89360573e2070" title="Cangiano, A., &amp; Shutes, I. (2010). Ageing, demand for care and the role of migrant care workers in the UK. Journal of Population Ageing, 3(1-2), 39–57."><span data-dcnode-id="2196" instrument_node="">2010</span></a><span data-dcnode-id="2194" instrument_node="">; Shutes, </span><a aria-label="Reference 2012" data-dcnode-id="2192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d89360573e2073" title="Shutes, I. (2012). The employment of migrant workers in long-term care: Dynamics of choice and control. Journal of Social Policy, 41(1), 43–59."><span data-dcnode-id="2193" instrument_node="">2012</span></a><span data-dcnode-id="2191" instrument_node="">); however, evidence is lacking in this area.</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2189" instrument_node="">No studies were set out to specifically investigate the impact of employing migrant care workers on ‘quality of care’, but where this is discussed, provider organisations do not report any negative impact and some note improvements (Walsh &amp; Shutes, </span><a aria-label="Reference 2013" data-dcnode-id="2187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d89360573e2079" title="Walsh, K., &amp; Shutes, I. (2013). Care relationships, quality of care and migrant workers caring for older people. Ageing &amp; Society, 33(3), 393–420."><span data-dcnode-id="2188" instrument_node="">2013</span></a><span data-dcnode-id="2186" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2183" id="Sec13"><span data-dcnode-id="2184" instrument_node="">Workforce Outcomes</span></h4><p data-dcnode-id="2175"><span data-dcnode-id="2182" instrument_node="">Only two studies commented on workforce outcomes and highlighted that migrant care workers are ‘structurally different’ from the general social care workforce. Firstly, they are ‘structurally positioned’ in low-paid and precarious jobs, especially in the private sector (Shutes &amp; Chiatti, </span><a aria-label="Reference 2012" data-dcnode-id="2180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d89360573e2090" title="Shutes, I., &amp; Chiatti, C. (2012). Migrant labour and the marketisation of care for older people: The employment of migrant care workers by families and service providers. Journal of European social policy, 22(4), 392–405."><span data-dcnode-id="2181" instrument_node="">2012</span></a><span data-dcnode-id="2179" instrument_node="">). Secondly, recent migrant workers are more likely to be employed in ‘direct care’ roles, more likely to be working full time, and they are better qualified yet less likely to hold managerial or supervisory positions; they are younger, and a higher proportion are male compared to the social care workforce as a whole (Hussein et al., </span><a aria-label="Reference 2011c" data-dcnode-id="2177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d89360573e2093" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011c). Social care as first work experience in England: A secondary analysis of the profile of a national sample of migrant workers. Health &amp; social care in the community, 19(1), 89–97."><span data-dcnode-id="2178" instrument_node="">2011c</span></a><span data-dcnode-id="2176" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2173" id="Sec14"><span data-dcnode-id="2174" instrument_node="">Sustainability</span></h4><p data-dcnode-id="2165"><span data-dcnode-id="2172" instrument_node="">We considered the factors that would allow the supply and demand for migrant care workers to be maintained at functional (i.e. existing) levels. On the supply side, two key themes were identified. First is the ‘role of perception’ in destination country and sector choice. Migrants exercise a degree of agency in their decisions, and thus, the perceived accessibility and attraction of a country may be as important as its immigration policies (Christensen et al., </span><a aria-label="Reference 2017" data-dcnode-id="2170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d89360573e2105" title="Christensen, K., Hussein, S., &amp; Ismail, M. (2017). Migrants’ decision-process shaping work destination choice: The case of long-term care work in the United Kingdom and Norway. European Journal of Ageing, 14(3), 219–232."><span data-dcnode-id="2171" instrument_node="">2017</span></a><span data-dcnode-id="2169" instrument_node="">). Migration to the UK is aided by historical ties, existing migrant networks, and pragmatism, such as acquisition of English language. The availability of jobs in social care that do not require formal qualifications is recognised by migrants and acts as a ‘pull’ factor for those seeking to gain a foothold in the local labour market (Hussein et al., </span><a aria-label="Reference 2013" data-dcnode-id="2167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d89360573e2108" title="Hussein, S., Stevens, M., &amp; Manthorpe, J. (2013). Migrants’ motivations to work in the care sector: experiences from England within the context of EU enlargement. European journal of ageing, 10(2), 101–109."><span data-dcnode-id="2168" instrument_node="">2013</span></a><span data-dcnode-id="2166" instrument_node="">).</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2164" instrument_node="">Second, social care taps into the </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">stock of migrants</span></i><span data-dcnode-id="2161" instrument_node=""> with right to work already in the country, and only a minority of migrant care workers were recruited directly from outside the UK (Cangiano &amp; Shutes, </span><a aria-label="Reference 2010" data-dcnode-id="2159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d89360573e2117" title="Cangiano, A., &amp; Shutes, I. (2010). Ageing, demand for care and the role of migrant care workers in the UK. Journal of Population Ageing, 3(1-2), 39–57."><span data-dcnode-id="2160" instrument_node="">2010</span></a><span data-dcnode-id="2158" instrument_node="">). Fluctuations and a fall in the number of migrants in the context of Brexit create uncertainties and challenges for employers particularly in home care and certain areas of the country (Read &amp; Fenge, </span><a aria-label="Reference 2019" data-dcnode-id="2156" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d89360573e2120" title="Read, R., &amp; Fenge, L. A. (2019). What does Brexit mean for the UK social care workforce? Perspectives from the recruitment and retention frontline. Health &amp; social care in the community, 27(3), 676–682."><span data-dcnode-id="2157" instrument_node="">2019</span></a><span data-dcnode-id="2155" instrument_node="">). Although there is increased interest in employing refugees in social care, this is unlikely to be sufficient to fill gaps in workforce supply (Hussein et al., </span><a aria-label="Reference 2011a" data-dcnode-id="2153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d89360573e2123" title="Hussein, S., Manthorpe, J., &amp; Stevens, M. (2011a). Exploring the potential of refugees and asylum seekers for social care work in England: A qualitative study. Health &amp; social care in the community, 19(5), 468–475."><span data-dcnode-id="2154" instrument_node="">2011a</span></a><span data-dcnode-id="2152" instrument_node="">).</span></p><p data-dcnode-id="2140"><span data-dcnode-id="2150" instrument_node="">On the demand side, ‘structural factors’ and </span><i data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">immigration rules</span></i><span data-dcnode-id="2147" instrument_node=""> shape demand for migrant workers. The relative importance of migrant care workers has increased within an expanding sector in the recent decade. Due to the uneven distribution of migrant workers, some regions and sectors are likely to be more vulnerable to a sharp drop in the supply of migrant workforce than others (Cangiano&nbsp;&amp; Shutes, </span><a aria-label="Reference 2010" data-dcnode-id="2145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d89360573e2132" title="Cangiano, A., &amp; Shutes, I. (2010). Ageing, demand for care and the role of migrant care workers in the UK. Journal of Population Ageing, 3(1-2), 39–57."><span data-dcnode-id="2146" instrument_node="">2010</span></a><span data-dcnode-id="2144" instrument_node="">). Demand for migrant care workers can be negatively affected by complex immigration rules and the requirement for employers to enforce immigration regulations, which can make it financially unfeasible and unsustainable for smaller employers to hire migrant workers, as highlighted by provider experiences after the 2012 visa reforms (Manthorpe et al., </span><a aria-label="Reference 2018" data-dcnode-id="2142" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d89360573e2135" title="Manthorpe, J., Harris, J., Stevens, M., &amp; Moriarty, J. (2018). ‘We’re effectively becoming immigration officers’: Social care managers’ experiences of the risk work of employing migrant care workers. Health, Risk &amp; Society, 20(3-4), 113–125."><span data-dcnode-id="2143" instrument_node="">2018</span></a><span data-dcnode-id="2141" instrument_node="">).</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2139" instrument_node="">One report (Independent Age,&nbsp;</span><a aria-label="Reference 2016" data-dcnode-id="2137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d89360573e2141" title="Independent Age. (2016). Brexit and the future of migrants in the social care workforce."><span data-dcnode-id="2138" instrument_node="">2016</span></a><span data-dcnode-id="2136" instrument_node="">) examines the combination of supply and demand side factors to estimate the workforce gap in social care by 2037. Taking the current ratio of care workers to older people taken as a baseline, it was projected that demand would outstrip the supply of social care workers, with migrant care workers needed to fill gaps. The report shows that zero net migration could leave a shortfall of up to 400,000 workers in the sector.</span></p></div></div></section><section data-dcnode-id="2056" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2057" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2130" id="Sec15"><span data-dcnode-id="2131" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2058" id="Sec15-content"><p data-dcnode-id="2110"><span data-dcnode-id="2129" instrument_node="">Migrant care workers provide more than a flexible source of labour to fill gaps in social care provision in the UK; they contribute to the sector in several ways, as highlighted by the findings of this scoping review. There has been a significant emphasis in the reviewed literature on ‘wellbeing failures’ (McGregor, </span><a aria-label="Reference 2014" data-dcnode-id="2127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d89360573e2154" title="McGregor, J. A. (2014). Chapter 14: Human wellbeing and sustainability: interdependent and intertwined. In G. Atkinson, S. Dietz, E. Neumayer, &amp; M. Agarwala (Eds.), 2014. Handbook of sustainable development (pp. 217–234). Edward Elgar Publishing."><span data-dcnode-id="2128" instrument_node="">2014</span></a><span data-dcnode-id="2126" instrument_node="">) experienced by migrant care workers, as well as migrant agency and experiences. Many of the findings in the reviewed studies resonate with the international literature on migrant care workers (e.g. Doyle &amp; Timonen, </span><a aria-label="Reference 2010" data-dcnode-id="2124" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d89360573e2157" title="Doyle, M., &amp; Timonen, V. (2010). Obligations, ambitions, calculations: Migrant care workers' negotiation of work, career, and family responsibilities. Social Politics, 17(1), 29–52."><span data-dcnode-id="2125" instrument_node="">2010</span></a><span data-dcnode-id="2123" instrument_node="">; Bauer &amp; Österle, </span><a aria-label="Reference 2013" data-dcnode-id="2121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d89360573e2160" title="Bauer, G., &amp; Österle, A. (2013). Migrant care labour: The commodification and redistribution of care and emotional work. Social Policy and Society, 12(3), 461–473."><span data-dcnode-id="2122" instrument_node="">2013</span></a><span data-dcnode-id="2120" instrument_node="">; Di Rosa et al., </span><a aria-label="Reference 2012" data-dcnode-id="2118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d89360573e2163" title="Di Rosa, M., Melchiorre, M. G., Lucchetti, M., &amp; Lamura, G. (2012). The impact of migrant work in the elder care sector: Recent trends and empirical evidence in Italy. European Journal of Social Work, 15(1), 9–27."><span data-dcnode-id="2119" instrument_node="">2012</span></a><span data-dcnode-id="2117" instrument_node="">; Da Roit &amp; Van Bochove, </span><a aria-label="Reference 2017" data-dcnode-id="2115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d89360573e2166" title="Da Roit, B., &amp; Van Bochove, M. (2017). Migrant care work going Dutch? The emergence of a live-in migrant care market and the restructuring of the Dutch long-term care system. Social Policy &amp; Administration, 51(1), 76–94."><span data-dcnode-id="2116" instrument_node="">2017</span></a><span data-dcnode-id="2114" instrument_node="">; Theobald, </span><a aria-label="Reference 2017" data-dcnode-id="2112" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d89360573e2170" title="Theobald, H. (2017). Care workers with migration backgrounds in formal care services in Germany: A multi-level intersectional analysis. International Journal of Care and Caring, 1(2), 209–226."><span data-dcnode-id="2113" instrument_node="">2017</span></a><span data-dcnode-id="2111" instrument_node="">).</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2109" instrument_node="">The review identified some gaps and limitations of existing UK research, particularly in the context of Brexit and changing immigration policies. To date, there has been less focus on what fosters positive wellbeing outcomes of migrant care workers and how migrant agency is mediated by immigration status (e.g. those with full right to work and those without, EU nationals, and non-EU nationals), race, class, and gender in the UK literature (Schwiter et al., </span><a aria-label="Reference 2018" data-dcnode-id="2107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d89360573e2176" title="Schwiter, K., Strauss, K., &amp; England, K. (2018). At home with the boss: Migrant live-in caregivers, social reproduction and constrained agency in the UK, Canada, Austria and Switzerland. Transactions of the Institute of British Geographers, 43(3), 462–476."><span data-dcnode-id="2108" instrument_node="">2018</span></a><span data-dcnode-id="2106" instrument_node="">; Hamilton et al., </span><a aria-label="Reference 2019" data-dcnode-id="2104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d89360573e2179" title="Hamilton, M., Hill, E., &amp; Adamson, E. (2019). A ‘career shift’? Bounded agency in migrant employment pathways in the aged care and early childhood education and care sectors in Australia. Journal of Ethnic and Migration Studies, 1–21."><span data-dcnode-id="2105" instrument_node="">2019</span></a><span data-dcnode-id="2103" instrument_node="">).</span></p><p data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">Although cultural and linguistic ‘grievances’ as well as racialised assumptions about competence and character have been highlighted in the reviewed literature, there has been limited research on sociocultural and psychological adaptation and socialisation—whereby migrant care workers adopt the rules and patterns of the receiving country (Ho &amp; Chiang, </span><a aria-label="Reference 2015" data-dcnode-id="2099" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d89360573e2185" title="Ho, K. H., &amp; Chiang, V. C. (2015). A meta-ethnography of the acculturation and socialization experiences of migrant care workers. Journal of advanced nursing, 71(2), 237–254."><span data-dcnode-id="2100" instrument_node="">2015</span></a><span data-dcnode-id="2098" instrument_node="">). The outcomes of these directly influence migrant care workers’ ability to provide ‘culturally congruent’ care (p. 239), as well as psychological wellbeing, and as a result affect the quality of care provided.</span></p><p data-dcnode-id="2083"><span data-dcnode-id="2096" instrument_node="">Racism towards migrant workers has received some attention in the literature, but the focus to date has been on ‘visible’ minorities. Eastern European migrants, even though they are predominantly white, have been described as a ‘racialised’ minority in the UK (Fox et al., </span><a aria-label="Reference 2012" data-dcnode-id="2094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d89360573e2191" title="Fox, J. E., Moroşanu, L., &amp; Szilassy, E. (2012). The racialization of the new European migration to the UK. Sociology, 46(4), 680–695."><span data-dcnode-id="2095" instrument_node="">2012</span></a><span data-dcnode-id="2093" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="2091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d89360573e2194" title="Fox, J. E., Moroşanu, L., &amp; Szilassy, E. (2015). Denying discrimination: Status, ‘race’, and the whitening of Britain's new Europeans. Journal of Ethnic and Migration Studies, 41(5), 729–748."><span data-dcnode-id="2092" instrument_node="">2015</span></a><span data-dcnode-id="2090" instrument_node="">). Yet, their experiences in social care are not well explored or understood, especially in the context of Brexit (Kilkey &amp; Ryan, </span><a aria-label="Reference 2020" data-dcnode-id="2088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d89360573e2197" title="Kilkey, M., &amp; Ryan, L. (2020). Unsettling events: understanding migrants’ responses to geopolitical transformative episodes through a life-course lens. International Migration Review early on-line view."><span data-dcnode-id="2089" instrument_node="">2020</span></a><span data-dcnode-id="2087" instrument_node="">; Sotkasiira &amp; Gawlewicz, </span><a aria-label="Reference 2020" data-dcnode-id="2085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d89360573e2200" title="Sotkasiira, T., &amp; Gawlewicz, A. (2020). The politics of embedding and the right to remain in post-Brexit Britain. Ethnicities, early on-line view."><span data-dcnode-id="2086" instrument_node="">2020</span></a><span data-dcnode-id="2084" instrument_node="">). There is limited research on the perception and lived experiences of discrimination among migrant care workers, including employer and wage discrimination.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2082" instrument_node="">Few studies focused on home care or live-in care, or compared different social care sectors, even though they are associated with different risks and challenges (Charlesworth &amp; Howe, </span><a aria-label="Reference 2018" data-dcnode-id="2080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d89360573e2207" title="Charlesworth, S., &amp; Howe, J. (2018). The enforcement of employment standards in Australia: Successes and challenges in aged care. International Journal of Comparative Labour Law and Industrial Relations, 34(2), 111–140."><span data-dcnode-id="2081" instrument_node="">2018</span></a><span data-dcnode-id="2079" instrument_node="">). There is limited knowledge on how demand for, recruitment, and ‘matching’ of live-in migrant care workers to the needs or preferences of older care users or their families are shaped by their (real or assumed) attributes in the context of privately purchased care and the role of labour market intermediaries (Leiber et al., </span><a aria-label="Reference 2019" data-dcnode-id="2077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d89360573e2210" title="Leiber, S., Matuszczyk, K., &amp; Rossow, V. (2019). Private labor market intermediaries in the Europeanized live-in care market between Germany and Poland: A typology. Zeitschrift für Sozialreform, 65(3), 365–392."><span data-dcnode-id="2078" instrument_node="">2019</span></a><span data-dcnode-id="2076" instrument_node="">; van Bochove &amp; zur Kleinsmiede, </span><a aria-label="Reference 2020" data-dcnode-id="2074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d89360573e2213" title="van Bochove, M., &amp; zur Kleinsmiede, D. (2020). Broadening the scope of live-in migrant care research: How care networks shape the experience of precarious work. Health &amp; Social Care in the Community, 28(1), 51–59."><span data-dcnode-id="2075" instrument_node="">2020</span></a><span data-dcnode-id="2073" instrument_node="">).</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2071" instrument_node="">Social care has several distinguishing features that set it apart from other low-paid sectors with a high proportion of migrants (e.g. food processing, retail, and hospitality). Van Hooren et al. (</span><a aria-label="Reference 2019" data-dcnode-id="2069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d89360573e2219" title="Van Hooren, F., Apitzsch, B., &amp; Ledoux, C. (2019). The politics of care work and migration. In A. Weinar, S. Bonjour, &amp; L. Zhyznomirska (Eds.), The Routledge Handbook of the Politics of Migration in Europe (pp. 363–373). Routledge. 
                  https://doi.org/10.4324/9781315512853-34
                  
                ."><span data-dcnode-id="2070" instrument_node="">2019</span></a><span data-dcnode-id="2068" instrument_node="">) highlight three points: first, “migrants directly enter the sphere of the welfare state”; second, it is a “distinctly gendered segment of labour migration, not only because many of the migrants involved are women but also because the politics of care is often strongly gendered” (see also Hayes, </span><a aria-label="Reference 2018" data-dcnode-id="2066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d89360573e2222" title="Hayes, L. (2018). The crisis in social care is connected to the gendered inadequacy of labour law. British Politics and Policy at LSE (24 Apr 2018). Blog Entry. 
                  https://blogs.lse.ac.uk/politicsandpolicy/gender-in-social-care-and-labour-law/
                  
                 (accessed: 10/06/2019)"><span data-dcnode-id="2067" instrument_node="">2018</span></a><span data-dcnode-id="2065" instrument_node="">); and third, much migrant care work “takes place within the intimate sphere of the home”, which can create a demand for undocumented migration even in countries where this is relatively limited (p. 364). The UK social care sector is already vulnerable to risks of exploitation and modern slavery due to its purchaser-provider split and the use of complex tendering (commissioning) practices with weak oversight over labour supply chains (Emberson &amp; Trautrims, </span><a aria-label="Reference 2019" data-dcnode-id="2063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d89360573e2225" title="Emberson, C., &amp; Trautrims, A. (2019). Public procurement and modern slavery risks in the English adult social care sector. In O. Martin-Ortega &amp; C. M. O’Brien (Eds.), Public Procurement and Human Rights: Opportunities, risks and dilemmas for the state as a buyer. Edward Elgar Publishing. 
                  https://doi.org/10.4337/9781788116312.00021
                  
                ."><span data-dcnode-id="2064" instrument_node="">2019</span></a><span data-dcnode-id="2062" instrument_node="">). The post-Brexit immigration system—the lack of legal work migration route for care work—is likely to add to existing pressures.</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Finally, there is limited information on wellbeing outcomes for people who are supported by migrant care workers, although there is some suggestion in the literature that any negative outcomes may be outweighed or overcome by positive contribution of care workers’ experience and resilience. A better understanding of this, alongside future demand from an increasingly diverse ageing population, could provide an important contribution to any discussion on the future shape of care migration.</span></p></div></div></section><section data-dcnode-id="2040" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="2041" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2054" id="Sec16"><span data-dcnode-id="2055" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="2042" id="Sec16-content"><p data-dcnode-id="2043"><span data-dcnode-id="2053" instrument_node="">In the current UK context, migrant care workers combine the risks and vulnerabilities of migrant status with the pressures of an already marginalised social care sector (Hussein, Manthorpe &amp; Stevens 2011; Cunningham &amp; James, </span><a aria-label="Reference 2014" data-dcnode-id="2051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d89360573e2240" title="Cunningham, I., &amp; James, P. (2014). Public service outsourcing and its employment implications in an era of austerity: The case of British social care. Competition &amp; Change, 18(1), 1–19."><span data-dcnode-id="2052" instrument_node="">2014</span></a><span data-dcnode-id="2050" instrument_node="">). With a growing and increasingly diverse ageing population, it is likely that the UK home care sector will continue to need migrant care workers to fill gaps in the workforce. The end of free movement of EEA workers and the new post-Brexit immigration system will create new risks and challenges that will be unfolding in the context of the COVID-19 pandemic. While the new immigration system is expected to reduce the labour supply by restricting migration into social care, the pandemic and its broader economic impact—the collapse of vacancies and job losses in other low-paid sectors (i.e. retail and hospitality)—has increased (at least temporarily) the labour supply in the care sector. Furthermore, the high rates of COVID-19 mortality in UK care homes (ONS, </span><a aria-label="Reference 2020a" data-dcnode-id="2048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d89360573e2243" title="ONS. (2020a). Deaths involving COVID-19 in the care sector, England and Wales: Deaths occurring up to 12 June 2020 and registered up to 20 June 2020 (provisional). Office for National Statistics. Available: 
                  https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/articles/deathsinvolvingcovid19inthecaresectorenglandandwales/deathsoccurringupto12june2020andregisteredupto20june2020provisional
                  
                 (accessed: 29/08/2020)"><span data-dcnode-id="2049" instrument_node="">2020a</span></a><span data-dcnode-id="2047" instrument_node="">, </span><a aria-label="Reference 2020b" data-dcnode-id="2045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d89360573e2246" title="ONS. (2020b). EMP06: Employment by country of birth and nationality. Availability: 
                  https://www.ons.gov.uk/employmentandlabourmarket/peopleinwork/employmentandemployeetypes/datasets/employmentbycountryofbirthandnationalityemp06
                  
                 (accessed 01/12/2020)"><span data-dcnode-id="2046" instrument_node="">2020b</span></a><span data-dcnode-id="2044" instrument_node="">) might turn people in need of care and support to sectors perceived as ‘safer options’, particularly live-in care that traditionally relies on migrants. Combined with the introduction of a more restrictive immigration system, this could create incentives for the emergence of an unregulated and informal ‘grey’ market of care in people’s homes.</span></p></div></div></section><span data-dcnode-id="2039" instrument_node="">
</span><section data-dcnode-id="2028" data-title="Notes"><div class="c-article-section" data-dcnode-id="2029" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2037" id="notes"><span data-dcnode-id="2038" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2030" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2031"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2032" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2033"><p data-dcnode-id="2034"><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.conservatives.com/our-commitments/taking-back-control-of-our-borders"><span data-dcnode-id="2036" instrument_node="">https://www.conservatives.com/our-commitments/taking-back-control-of-our-borders</span></a></p></div></li></ol></div></div></section><div data-dcnode-id="1310" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1311" data-title="References"><div class="c-article-section" data-dcnode-id="1312" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2026" id="Bib1"><span data-dcnode-id="2027" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1313" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1314"><ul class="c-article-references" data-dcnode-id="1324"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="2016"><p class="c-article-references__text" data-dcnode-id="2021" id="ref-CR1"><span data-dcnode-id="2025" instrument_node="">Anderson, A. (2012). Europe’s care regimes and the role of migrant care workers within them. </span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Journal of population ageing, 5</span></i><span data-dcnode-id="2022" instrument_node="">(2), 135–146.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="2017"><a aria-label="Google Scholar reference 1" data-dcnode-id="2019" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3F%26title%3DEurope%25E2%2580%2599s%2520care%2520regimes%2520and%2520the%2520role%2520of%2520migrant%2520care%2520workers%2520within%2520them%26journal%3DJournal%2520of%2520population%2520ageing%26volume%3D5%26issue%3D2%26pages%3D135-146%26publication_year%3D2012%26author%3DAnderson%252CA"><span data-dcnode-id="2020" instrument_node="">
                    Google Scholar</span></a><span data-dcnode-id="2018" instrument_node="">&nbsp;
