</span><h4 data-dcnode-id="6142"><span class="mw-headline" data-dcnode-id="6150" id="Locational_identity"><span data-dcnode-id="6151" instrument_node="">Locational identity</span></span><span class="mw-editsection" data-dcnode-id="6143"><span class="mw-editsection-bracket" data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">[</span></span><a data-dcnode-id="6146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D11" title="Edit section: Locational identity"><span data-dcnode-id="6147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6141" instrument_node="">
</span><p data-dcnode-id="6132"><span data-dcnode-id="6140" instrument_node="">Although the </span><a data-dcnode-id="6138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="6139" instrument_node="">United Kingdom</span></a><span data-dcnode-id="6137" instrument_node=""> as a whole voted to leave the EU on a narrow majority of only 4%, what was most influential was the staggering leave support from England that had a 7-point majority lead over the remain support. Although not the most influential factor, the support for the leave campaign came most predominantly from England compared to other regions of the UK such as Scotland that voted (62.0%–38.0%) in favour of remaining. This phenomenon has been argued by experts such as Henderson A, Jeffery C, Wincott D, Wyn Jones R, to be driven heavily by national identity in England that makes up 84% of the UK population and therefore holds the most sway over referendums that support the populous vote.</span><sup class="reference" data-dcnode-id="6134" id="cite_ref-61"><a data-dcnode-id="6135" href="#cite_note-61"><span data-dcnode-id="6136" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6133" instrument_node="">
</span></p><p data-dcnode-id="6114"><span data-dcnode-id="6131" instrument_node="">Some Brexit supporters found the West Lothian question to be a heavy driver for the leave vote as ongoing disputes between the Uk and Scotland over issues arguable in both the Westminster and Scottish Parliament became a leading cause of weakened national identity and a challenge to </span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_sovereignty" title="Parliamentary sovereignty"><span data-dcnode-id="6130" instrument_node="">Parliamentary Sovereignty</span></a><span data-dcnode-id="6128" instrument_node="">.  This factor was argued several times by </span><a data-dcnode-id="6126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Standage" title="Tom Standage"><span data-dcnode-id="6127" instrument_node="">Tom Standage</span></a><span data-dcnode-id="6125" instrument_node=""> to be a driver for politicians in England to push for the leave campaign over nationalist beliefs that also drove the </span><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Scottish_independence_referendum" title="2014 Scottish independence referendum"><span data-dcnode-id="6124" instrument_node="">Scottish independence campaign in 2014</span></a><span data-dcnode-id="6122" instrument_node="">. This argument of </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_identity" title="National identity"><span data-dcnode-id="6121" instrument_node="">national identity</span></a><span data-dcnode-id="6119" instrument_node=""> was central to the entire campaign for Scottish Independence. This was crucial in shaping the debate until the Referendum was called, culminating on the failed 18 September 2014, ballot. This same scenario was reflected through the entire UK against the European Union with calls for greater sovereignty and national devolvement from the Union as campaigners argued the restrictions imposed by the Union were a more significant deficit to the country over the benefits of staying.</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-62"><a data-dcnode-id="6117" href="#cite_note-62"><span data-dcnode-id="6118" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6115" instrument_node="">
</span></p><span data-dcnode-id="6113" instrument_node="">
</span><h2 data-dcnode-id="6103"><span class="mw-headline" data-dcnode-id="6111" id="Economy"><span data-dcnode-id="6112" instrument_node="">Economy</span></span><span class="mw-editsection" data-dcnode-id="6104"><span class="mw-editsection-bracket" data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">[</span></span><a data-dcnode-id="6107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D12" title="Edit section: Economy"><span data-dcnode-id="6108" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6102" instrument_node="">
</span><p data-dcnode-id="6082"><span data-dcnode-id="6101" instrument_node="">Some Brexit supporters viewed the EU as an economic opportunity for Britain. This contradicted the Remain campaign's warnings of a potential 'economic black hole'.</span><sup class="reference" data-dcnode-id="6098" id="cite_ref-63"><a data-dcnode-id="6099" href="#cite_note-63"><span data-dcnode-id="6100" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6097" instrument_node=""> Those who saw economic opportunity tended to be sympathetic towards </span><a data-dcnode-id="6095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_market" title="Free market"><span data-dcnode-id="6096" instrument_node="">free market</span></a><span data-dcnode-id="6094" instrument_node=""> and </span><a data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="6093" instrument_node="">free trade</span></a><span data-dcnode-id="6091" instrument_node=""> ideas, viewing the regulatory nature of the EU as imposing on personal market freedom.</span><sup class="reference" data-dcnode-id="6088" id="cite_ref-UK_in_a_changing_Europe_52-3"><a data-dcnode-id="6089" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6090" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6087" instrument_node=""> Proponents of free trade post-Brexit hoped to strike trade deals with nations outside of the EU. For instance, Nigel Farage argued that Brexit needed to happen in order for Britain to be free to make trade deals with countries such as the United States. He also stated that this negotiation is key for Britain as "Trump is the best ally in the world" and the negotiation of this trade deal would only take 48 hours.</span><sup class="reference" data-dcnode-id="6084" id="cite_ref-64"><a data-dcnode-id="6085" href="#cite_note-64"><span data-dcnode-id="6086" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6083" instrument_node="">
</span></p><p data-dcnode-id="6076"><span data-dcnode-id="6081" instrument_node="">Budget negotiations in 2013 led to both Labour Party and Conservative Eurosceptics voting against the government in favour of passing an amendment calling for a real term cut in EU spending.</span><sup class="reference" data-dcnode-id="6078" id="cite_ref-65"><a data-dcnode-id="6079" href="#cite_note-65"><span data-dcnode-id="6080" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6077" instrument_node="">
</span></p><p data-dcnode-id="6050"><span data-dcnode-id="6075" instrument_node="">In addition to this, it was argued that the UK being away from EU regulations would boost Britain as a market, because policies such as the common fisheries policy would be no longer applicable to the UK.</span><sup class="reference" data-dcnode-id="6072" id="cite_ref-UK_in_a_changing_Europe_52-4"><a data-dcnode-id="6073" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6074" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6071" instrument_node=""> Politicians such as </span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="6070" instrument_node="">Boris Johnson</span></a><span data-dcnode-id="6068" instrument_node=""> and </span><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Rees-Mogg" title="Jacob Rees-Mogg"><span data-dcnode-id="6067" instrument_node="">Jacob Rees-Mogg</span></a><span data-dcnode-id="6065" instrument_node=""> were associated with this point of view.</span><sup class="reference" data-dcnode-id="6062" id="cite_ref-UK_in_a_changing_Europe_52-5"><a data-dcnode-id="6063" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6064" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6061" instrument_node="">  Additionally, the </span><a data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%25932008" title="Financial crisis of 2007–2008"><span data-dcnode-id="6060" instrument_node="">2008 financial crash</span></a><span data-dcnode-id="6058" instrument_node=""> and the </span><a data-dcnode-id="6056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_debt_crisis" title="European debt crisis"><span data-dcnode-id="6057" instrument_node="">Eurozone crisis of late 2009</span></a><span data-dcnode-id="6055" instrument_node=""> may have encouraged others to want to move the UK's economy further away from the EU's increasingly integrated economy as a means of protecting it.</span><sup class="reference" data-dcnode-id="6052" id="cite_ref-Inevitability_and_contingency_26-1"><a data-dcnode-id="6053" href="#cite_note-Inevitability_and_contingency-26"><span data-dcnode-id="6054" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6051" instrument_node="">
</span></p><p data-dcnode-id="6034"><span data-dcnode-id="6049" instrument_node="">According to a 2019 study in the </span><i data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">American Economic Review,</span></i><span data-dcnode-id="6046" instrument_node=""> </span><a data-dcnode-id="6044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_government_austerity_programme" title="United Kingdom government austerity programme"><span data-dcnode-id="6045" instrument_node="">austerity reforms introduced in 2010</span></a><span data-dcnode-id="6043" instrument_node=""> may have contributed to a Leave victory in the Brexit referendum by raising political dissatisfaction.</span><sup class="reference" data-dcnode-id="6040" id="cite_ref-66"><a data-dcnode-id="6041" href="#cite_note-66"><span data-dcnode-id="6042" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6039" instrument_node=""> The combination of immigration and austerity may have also increased sympathy towards the leave campaign because due to the cuts in public services and welfare, and the increase in population immigration had brought, there was a perceived fear public services such as the NHS would collapse due to this increase in pressures immigration brought.</span><sup class="reference" data-dcnode-id="6036" id="cite_ref-67"><a data-dcnode-id="6037" href="#cite_note-67"><span data-dcnode-id="6038" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6035" instrument_node="">
</span></p><p data-dcnode-id="6024"><span data-dcnode-id="6033" instrument_node="">Many academics have since pointed to a public survey identified how “people’s subjective judgments of their surrounding economic conditions were more important predictors of attitudes towards the EU” compared to “how the economy was actually performing [as a whole]”.</span><sup class="reference" data-dcnode-id="6030" id="cite_ref-68"><a data-dcnode-id="6031" href="#cite_note-68"><span data-dcnode-id="6032" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6029" instrument_node=""> When we consider this relative to geographical area, we see a clear correlation between localised economically poorer areas - such as parts of the Midlands and the North-West of England - and voting ‘Leave’ </span><sup class="reference" data-dcnode-id="6026" id="cite_ref-69"><a data-dcnode-id="6027" href="#cite_note-69"><span data-dcnode-id="6028" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6025" instrument_node="">
</span></p><span data-dcnode-id="6023" instrument_node="">
</span><h2 data-dcnode-id="6013"><span class="mw-headline" data-dcnode-id="6021" id="Anti-establishment_populism"><span data-dcnode-id="6022" instrument_node="">Anti-establishment populism</span></span><span class="mw-editsection" data-dcnode-id="6014"><span class="mw-editsection-bracket" data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">[</span></span><a data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D13" title="Edit section: Anti-establishment populism"><span data-dcnode-id="6018" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6012" instrument_node="">
</span><p data-dcnode-id="5980"><span data-dcnode-id="6011" instrument_node="">The idea of voting in favour of Brexit was seen by many as a way to protest against </span><a data-dcnode-id="6009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Establishment" title="The Establishment"><span data-dcnode-id="6010" instrument_node="">the Establishment</span></a><span data-dcnode-id="6008" instrument_node=""> and the elite who were seen to have ignored "the will of the people" for too long.</span><sup class="reference" data-dcnode-id="6005" id="cite_ref-Jennings_1–18_4-1"><a data-dcnode-id="6006" href="#cite_note-Jennings_1%E2%80%9318-4"><span data-dcnode-id="6007" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6004" instrument_node=""> The result of the referendum was branded as such by </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigel_Farage" title="Nigel Farage"><span data-dcnode-id="6003" instrument_node="">Nigel Farage</span></a><span data-dcnode-id="6001" instrument_node="">, who claimed it to be a victory against "big merchant banks" and "big politics".</span><sup class="reference" data-dcnode-id="5998" id="cite_ref-Jennings_1–18_4-2"><a data-dcnode-id="5999" href="#cite_note-Jennings_1%E2%80%9318-4"><span data-dcnode-id="6000" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5997" instrument_node=""> Many voters saw the referendum itself as an example of power being given back to the citizens to make decisions and not the elites, with many voters harbouring discontent for these elites and the power they hold.</span><sup class="reference" data-dcnode-id="5994" id="cite_ref-Jennings_1–18_4-3"><a data-dcnode-id="5995" href="#cite_note-Jennings_1%E2%80%9318-4"><span data-dcnode-id="5996" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5993" instrument_node=""> For some voters, voting 'leave' defied the Establishment that was seen to be pro-Remain.</span><sup class="reference" data-dcnode-id="5990" id="cite_ref-70"><a data-dcnode-id="5991" href="#cite_note-70"><span data-dcnode-id="5992" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5989" instrument_node=""> The populist nature of the referendum was an incentive for many to take the opportunity they felt they had to have their voices heard over those of the elite and vote 'leave'.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5982" style="white-space:nowrap;"><span data-dcnode-id="5988" instrument_node="">[</span><i data-dcnode-id="5984"><a data-dcnode-id="5985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5986" title="This claim needs references to reliable sources. (October 2019)"><span data-dcnode-id="5987" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5983" instrument_node="">]</span></sup><span data-dcnode-id="5981" instrument_node="">
</span></p><p data-dcnode-id="5958"><span data-dcnode-id="5979" instrument_node="">It has been argued that anti-politics played a part in the referendum. Marsh argues that ‘the distrust of the political elite’ is an important feature of anti-politics.</span><sup class="reference" data-dcnode-id="5976" id="cite_ref-71"><a data-dcnode-id="5977" href="#cite_note-71"><span data-dcnode-id="5978" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5975" instrument_node=""> Furthermore, Marsh relates this to populism, stating that the ‘distrust in the political elite was particularly evident in the campaign’.</span><sup class="reference" data-dcnode-id="5972" id="cite_ref-72"><a data-dcnode-id="5973" href="#cite_note-72"><span data-dcnode-id="5974" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5971" instrument_node=""> According to Jennings and Lodge, David Cameron made arguably a futile attempt to reduce the impact that anti-politics was having on British politics by calling the referendum, which ultimately did not succeed.</span><sup class="reference" data-dcnode-id="5968" id="cite_ref-73"><a data-dcnode-id="5969" href="#cite_note-73"><span data-dcnode-id="5970" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5967" instrument_node=""> Iaknis et al. conduct a survey which shows how the vote to leave the European Union was influenced by nativism and anti-establishmentarianism.</span><sup class="reference" data-dcnode-id="5964" id="cite_ref-74"><a data-dcnode-id="5965" href="#cite_note-74"><span data-dcnode-id="5966" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5963" instrument_node=""> This survey gives an indication as to how anti-politics influenced the Brexit vote. Baldini et al. discuss how during the 2015 and 2017 general elections, voters were more likely to change their vote, which was then linked to the rise of anti-politics.</span><sup class="reference" data-dcnode-id="5960" id="cite_ref-75"><a data-dcnode-id="5961" href="#cite_note-75"><span data-dcnode-id="5962" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5959" instrument_node="">
</span></p><span data-dcnode-id="5957" instrument_node="">
</span><h2 data-dcnode-id="5947"><span class="mw-headline" data-dcnode-id="5955" id="Role_and_influence_of_politicians"><span data-dcnode-id="5956" instrument_node="">Role and influence of politicians</span></span><span class="mw-editsection" data-dcnode-id="5948"><span class="mw-editsection-bracket" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">[</span></span><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D14" title="Edit section: Role and influence of politicians"><span data-dcnode-id="5952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5946" instrument_node="">
</span><h3 data-dcnode-id="5936"><span class="mw-headline" data-dcnode-id="5944" id="Decision_to_call_referendum"><span data-dcnode-id="5945" instrument_node="">Decision to call referendum</span></span><span class="mw-editsection" data-dcnode-id="5937"><span class="mw-editsection-bracket" data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">[</span></span><a data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D15" title="Edit section: Decision to call referendum"><span data-dcnode-id="5941" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5935" instrument_node="">
</span><p data-dcnode-id="5911"><span data-dcnode-id="5934" instrument_node="">The referendum was first announced by then-Prime Minister </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Cameron" title="David Cameron"><span data-dcnode-id="5933" instrument_node="">David Cameron</span></a><span data-dcnode-id="5931" instrument_node=""> on 23 January 2013. Cameron announced that he would attempt to re-negotiate Britain's terms with the EU before holding an in-out referendum no later than two years after the next </span><a data-dcnode-id="5929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_United_Kingdom_general_election" title="2015 United Kingdom general election"><span data-dcnode-id="5930" instrument_node="">general election</span></a><span data-dcnode-id="5928" instrument_node=""> – should he still be Prime Minister.</span><sup class="reference" data-dcnode-id="5925" id="cite_ref-76"><a data-dcnode-id="5926" href="#cite_note-76"><span data-dcnode-id="5927" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5924" instrument_node=""> This was seen as a move to appease Eurosceptics within his own party as well as an attempt to regain voters who had been switching allegiance to UKIP since the previous election.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5917" style="white-space:nowrap;"><span data-dcnode-id="5923" instrument_node="">[</span><i data-dcnode-id="5919"><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5921" title="This claim needs references to reliable sources. (August 2020)"><span data-dcnode-id="5922" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5918" instrument_node="">]</span></sup><span data-dcnode-id="5916" instrument_node=""> Upon the Conservatives surprise majority victory in the 2015 general election, Cameron upheld his pledge and announced the date for the referendum to be 23 June 2016.</span><sup class="reference" data-dcnode-id="5913" id="cite_ref-77"><a data-dcnode-id="5914" href="#cite_note-77"><span data-dcnode-id="5915" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5912" instrument_node="">
</span></p><span data-dcnode-id="5910" instrument_node="">
</span><h3 data-dcnode-id="5900"><span class="mw-headline" data-dcnode-id="5908" id="Effect_on_voters"><span data-dcnode-id="5909" instrument_node="">Effect on voters</span></span><span class="mw-editsection" data-dcnode-id="5901"><span class="mw-editsection-bracket" data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">[</span></span><a data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D16" title="Edit section: Effect on voters"><span data-dcnode-id="5905" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5899" instrument_node="">
</span><p data-dcnode-id="5881"><a data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="5898" instrument_node="">Boris Johnson</span></a><span data-dcnode-id="5896" instrument_node=""> and </span><a data-dcnode-id="5894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cabinet_of_the_United_Kingdom" title="Cabinet of the United Kingdom"><span data-dcnode-id="5895" instrument_node="">cabinet</span></a><span data-dcnode-id="5893" instrument_node=""> minister </span><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Gove" title="Michael Gove"><span data-dcnode-id="5892" instrument_node="">Michael Gove</span></a><span data-dcnode-id="5890" instrument_node=""> becoming leading figures in the Leave Campaign is a factor considered to have given the pro-Brexit side a wider appeal and greater credibility.</span><sup class="reference" data-dcnode-id="5887" id="cite_ref-Curtice_19–37_23-4"><a data-dcnode-id="5888" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5889" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5886" instrument_node=""> Johnson is believed to have been heavily influential during the campaign, with polling results revealing that the public trusted the words of Boris Johnson on Brexit more than any other politician, including David Cameron.</span><sup class="reference" data-dcnode-id="5883" id="cite_ref-Curtice_19–37_23-5"><a data-dcnode-id="5884" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5885" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5882" instrument_node="">
</span></p><p data-dcnode-id="5841"><span data-dcnode-id="5880" instrument_node="">In regard to the </span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="5879" instrument_node="">Labour Party</span></a><span data-dcnode-id="5877" instrument_node="">, there was some perceived ambiguity as to the party's stance with only 52% of voters believing Labour MPs were in favour of Remain, according to polling.</span><sup class="reference" data-dcnode-id="5874" id="cite_ref-Curtice_19–37_23-6"><a data-dcnode-id="5875" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5876" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5873" instrument_node=""> In actuality it is thought that as many as 96% of Labour MPs backed remain.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5866" style="white-space:nowrap;"><span data-dcnode-id="5872" instrument_node="">[</span><i data-dcnode-id="5868"><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5870" title="This claim needs references to reliable sources. (October 2019)"><span data-dcnode-id="5871" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5867" instrument_node="">]</span></sup><span data-dcnode-id="5865" instrument_node=""> Party leader </span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremy_Corbyn" title="Jeremy Corbyn"><span data-dcnode-id="5864" instrument_node="">Jeremy Corbyn</span></a><span data-dcnode-id="5862" instrument_node=""> is known to have been a longtime </span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euroscepticism_in_the_United_Kingdom" title="Euroscepticism in the United Kingdom"><span data-dcnode-id="5861" instrument_node="">eurosceptic</span></a><span data-dcnode-id="5859" instrument_node="">, having voted against staying in the </span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Economic_Community" title="European Economic Community"><span data-dcnode-id="5858" instrument_node="">Common Market</span></a><span data-dcnode-id="5856" instrument_node="">.</span><sup class="reference" data-dcnode-id="5853" id="cite_ref-Curtice_19–37_23-7"><a data-dcnode-id="5854" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5855" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5852" instrument_node=""> Furthermore, the chair of the </span><a data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_Leave" title="Vote Leave"><span data-dcnode-id="5851" instrument_node="">official Leave campaign</span></a><span data-dcnode-id="5849" instrument_node=""> was Labour MP </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gisela_Stuart" title="Gisela Stuart"><span data-dcnode-id="5848" instrument_node="">Gisela Stuart</span></a><span data-dcnode-id="5846" instrument_node="">. It is thought that the perceived lack of clear direction from the party may have played a role in some Labour voters backing 'leave' despite most of its MPs backing 'remain'.</span><sup class="reference" data-dcnode-id="5843" id="cite_ref-Curtice_19–37_23-8"><a data-dcnode-id="5844" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5845" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5842" instrument_node="">
</span></p><span data-dcnode-id="5840" instrument_node="">
</span><h3 data-dcnode-id="5830"><span class="mw-headline" data-dcnode-id="5838" id="Establishment_Euroscepticism"><span data-dcnode-id="5839" instrument_node="">Establishment Euroscepticism</span></span><span class="mw-editsection" data-dcnode-id="5831"><span class="mw-editsection-bracket" data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">[</span></span><a data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D17" title="Edit section: Establishment Euroscepticism"><span data-dcnode-id="5835" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5829" instrument_node="">
</span><p data-dcnode-id="5794"><span data-dcnode-id="5828" instrument_node="">Despite many perceiving </span><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Establishment" title="The Establishment"><span data-dcnode-id="5827" instrument_node="">the Establishment</span></a><span data-dcnode-id="5825" instrument_node=""> as being pro-Remain, the British Establishment has historically contained a significant eurosceptic fraction that has cut across both the </span><a data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="5824" instrument_node="">Labour</span></a><span data-dcnode-id="5822" instrument_node=""> and </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="5821" instrument_node="">Conservative</span></a><span data-dcnode-id="5819" instrument_node=""> parties. It is thought that the existence of such euroscepticism within Britain's elite has helped ensure that eurosceptic thoughts, voices, opinions and sometimes policies have had somewhat of a platform, consequently influencing public opinion.</span><sup class="reference" data-dcnode-id="5816" id="cite_ref-Curtice_19–37_23-9"><a data-dcnode-id="5817" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5818" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> During the 2016 EU referendum campaign, 45% of Conservative MPs were in favour of leaving the European Union - a considerable amount which held significant influence over public opinion.</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-Curtice_19–37_23-10"><a data-dcnode-id="5813" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5814" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5811" instrument_node=""> Historical examples of euroscepticism within the Labour party include </span><a data-dcnode-id="5809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1975_United_Kingdom_European_Communities_membership_referendum" title="1975 United Kingdom European Communities membership referendum"><span data-dcnode-id="5810" instrument_node="">the 1975 referendum</span></a><span data-dcnode-id="5808" instrument_node=""> on European membership, the position and influence of </span><a data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Benn" title="Tony Benn"><span data-dcnode-id="5807" instrument_node="">Tony Benn</span></a><span data-dcnode-id="5805" instrument_node=""> and </span><a data-dcnode-id="5803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugh_Gaitskell" title="Hugh Gaitskell"><span data-dcnode-id="5804" instrument_node="">Hugh Gaitskell's</span></a><span data-dcnode-id="5802" instrument_node=""> famous 1962 speech in which he said joining the </span><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Economic_Community" title="European Economic Community"><span data-dcnode-id="5801" instrument_node="">EEC</span></a><span data-dcnode-id="5799" instrument_node=""> would be "the end of a thousand years of history".</span><sup class="reference" data-dcnode-id="5796" id="cite_ref-78"><a data-dcnode-id="5797" href="#cite_note-78"><span data-dcnode-id="5798" instrument_node="">[78]</span></a></sup><span data-dcnode-id="5795" instrument_node="">
</span></p><span data-dcnode-id="5793" instrument_node="">
</span><h2 data-dcnode-id="5783"><span class="mw-headline" data-dcnode-id="5791" id="Presentational_factors_during_the_campaign"><span data-dcnode-id="5792" instrument_node="">Presentational factors during the campaign</span></span><span class="mw-editsection" data-dcnode-id="5784"><span class="mw-editsection-bracket" data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">[</span></span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D18" title="Edit section: Presentational factors during the campaign"><span data-dcnode-id="5788" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5782" instrument_node="">
</span><h3 data-dcnode-id="5772"><span class="mw-headline" data-dcnode-id="5780" id="Information_interpretation"><span data-dcnode-id="5781" instrument_node="">Information interpretation</span></span><span class="mw-editsection" data-dcnode-id="5773"><span class="mw-editsection-bracket" data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">[</span></span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D19" title="Edit section: Information interpretation"><span data-dcnode-id="5777" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5771" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5759"><div class="thumbinner" data-dcnode-id="5760" style="width:222px;"><a class="image" data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVote_Leave_poster%2C_Omagh.jpg"><img alt="" class="thumbimage" data-dcnode-id="5770" data-file-height="480" data-file-width="640" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vote_Leave_poster%252C_Omagh.jpg/220px-Vote_Leave_poster%252C_Omagh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vote_Leave_poster%2C_Omagh.jpg/330px-Vote_Leave_poster%2C_Omagh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vote_Leave_poster%2C_Omagh.jpg/440px-Vote_Leave_poster%2C_Omagh.jpg 2x" width="220"></a><span data-dcnode-id="5768" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5761"><div class="magnify" data-dcnode-id="5766"><a class="internal" data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVote_Leave_poster%2C_Omagh.jpg" title="Enlarge"></a></div><span data-dcnode-id="5765" instrument_node="">A "Vote Leave" poster in </span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omagh" title="Omagh"><span data-dcnode-id="5764" instrument_node="">Omagh</span></a><span data-dcnode-id="5762" instrument_node=""> saying "We send the EU £50 million every day. Let's spend it on our NHS instead."</span></div></div></div><span data-dcnode-id="5758" instrument_node="">
</span><p data-dcnode-id="5741"><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Dougan" title="Michael Dougan"><span data-dcnode-id="5757" instrument_node="">Michael Dougan</span></a><span data-dcnode-id="5755" instrument_node="">, Professor of </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union_law" title="European Union law"><span data-dcnode-id="5754" instrument_node="">European Law</span></a><span data-dcnode-id="5752" instrument_node=""> at the </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Liverpool" title="University of Liverpool"><span data-dcnode-id="5751" instrument_node="">University of Liverpool</span></a><span data-dcnode-id="5749" instrument_node="">, in a viral video of one of his lectures prior to the referendum, described the Leave campaign as peddling "dishonesty on an industrial scale".</span><sup class="reference" data-dcnode-id="5746" id="cite_ref-79"><a data-dcnode-id="5747" href="#cite_note-79"><span data-dcnode-id="5748" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="5743" id="cite_ref-80"><a data-dcnode-id="5744" href="#cite_note-80"><span data-dcnode-id="5745" instrument_node="">[80]</span></a></sup><span data-dcnode-id="5742" instrument_node="">
</span></p><p data-dcnode-id="5724"><span data-dcnode-id="5740" instrument_node="">Perhaps the most commonly criticised claim by the Leave campaign was that voting to leave the EU would allow for increased spending on the NHS of £350m a week.</span><sup class="reference" data-dcnode-id="5737" id="cite_ref-81"><a data-dcnode-id="5738" href="#cite_note-81"><span data-dcnode-id="5739" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="5734" id="cite_ref-82"><a data-dcnode-id="5735" href="#cite_note-82"><span data-dcnode-id="5736" instrument_node="">[82]</span></a></sup><span data-dcnode-id="5733" instrument_node=""> Vote Leave claimed that the UK sends £350 million to the EU every week.</span><sup class="reference" data-dcnode-id="5730" id="cite_ref-83"><a data-dcnode-id="5731" href="#cite_note-83"><span data-dcnode-id="5732" instrument_node="">[83]</span></a></sup><span data-dcnode-id="5729" instrument_node=""> The Office for National Statistics, quoting analysis from the European Commission, states the UK's actual net average annual contribution to the EU budget, taken from a five-year average from 2014 to 2018, when its annual rebate and public and private sector receipts are excluded, is £7.7 bn.</span><sup class="reference" data-dcnode-id="5726" id="cite_ref-84"><a data-dcnode-id="5727" href="#cite_note-84"><span data-dcnode-id="5728" instrument_node="">[84]</span></a></sup><span data-dcnode-id="5725" instrument_node=""> Divided by 52, this equates to £150 million per week.
</span></p><p data-dcnode-id="5705"><span data-dcnode-id="5723" instrument_node="">Sir </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Major" title="John Major"><span data-dcnode-id="5722" instrument_node="">John Major</span></a><span data-dcnode-id="5720" instrument_node=""> claimed that Vote Leave had deliberately misled voters by using the gross contribution to the EU before the automatically deducted </span><a class="mw-redirect" data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Rebate" title="UK Rebate"><span data-dcnode-id="5719" instrument_node="">UK Rebate</span></a><span data-dcnode-id="5717" instrument_node="">.</span><sup class="reference" data-dcnode-id="5714" id="cite_ref-85"><a data-dcnode-id="5715" href="#cite_note-85"><span data-dcnode-id="5716" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5713" instrument_node=""> The gross contribution is the amount the UK would pay under the standard formula before any discounts and rebates. At the time of the Brexit vote, the UK received a 40% discount from the gross contribution which was negotiated by </span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Thatcher" title="Margaret Thatcher"><span data-dcnode-id="5712" instrument_node="">Margaret Thatcher</span></a><span data-dcnode-id="5710" instrument_node=""> in the 1980s (worth about £144 million) plus various agricultural, economic development and scientific research 'rebates' (worth approximately a further £96 million).</span><sup class="reference" data-dcnode-id="5707" id="cite_ref-86"><a data-dcnode-id="5708" href="#cite_note-86"><span data-dcnode-id="5709" instrument_node="">[86]</span></a></sup><span data-dcnode-id="5706" instrument_node="">
</span></p><p data-dcnode-id="5684"><span data-dcnode-id="5704" instrument_node="">Elements of the Leave campaign have been identified as exemplifying "</span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-truth_politics" title="Post-truth politics"><span data-dcnode-id="5703" instrument_node="">post-truth politics</span></a><span data-dcnode-id="5701" instrument_node="">", in which debate is framed largely by </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appeal_to_emotion" title="Appeal to emotion"><span data-dcnode-id="5700" instrument_node="">appeals to emotion</span></a><span data-dcnode-id="5698" instrument_node=""> rather than the details of </span><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_policy" title="Public policy"><span data-dcnode-id="5697" instrument_node="">policy</span></a><span data-dcnode-id="5695" instrument_node=""> or objective factual analysis.</span><sup class="reference" data-dcnode-id="5692" id="cite_ref-WaPo_87-0"><a data-dcnode-id="5693" href="#cite_note-WaPo-87"><span data-dcnode-id="5694" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="5689" id="cite_ref-Deacon_88-0"><a data-dcnode-id="5690" href="#cite_note-Deacon-88"><span data-dcnode-id="5691" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="5686" id="cite_ref-Wollaston_89-0"><a data-dcnode-id="5687" href="#cite_note-Wollaston-89"><span data-dcnode-id="5688" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5685" instrument_node="">
</span></p><p data-dcnode-id="5678"><span data-dcnode-id="5683" instrument_node="">This potentially deliberate attempt to mislead the public finds relevance with Hobolt's theory, that campaigns prey on voters' insecurities. Individuals with low education levels will be less likely to be able to separate factual and false information, thus forming the existential link between educational and campaigning factors. This makes voting behaviour hard to analyse because it uses the incorrect assumption that all citizens vote rationally and have the ability to critique policy.</span><sup class="reference" data-dcnode-id="5680" id="cite_ref-auto_38-1"><a data-dcnode-id="5681" href="#cite_note-auto-38"><span data-dcnode-id="5682" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5679" instrument_node="">
</span></p><p data-dcnode-id="5666"><span data-dcnode-id="5677" instrument_node="">The Remain campaign was also urged by </span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Tyrie" title="Andrew Tyrie"><span data-dcnode-id="5676" instrument_node="">Andrew Tyrie</span></a><span data-dcnode-id="5674" instrument_node="">, chair of the </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treasury_Select_Committee" title="Treasury Select Committee"><span data-dcnode-id="5673" instrument_node="">Commons Treasury Select Committee</span></a><span data-dcnode-id="5671" instrument_node="">, to remove the 'intellectually dishonest' claim that EU membership was worth £3,000.</span><sup class="reference" data-dcnode-id="5668" id="cite_ref-90"><a data-dcnode-id="5669" href="#cite_note-90"><span data-dcnode-id="5670" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5667" instrument_node="">
</span></p><span data-dcnode-id="5665" instrument_node="">
</span><h3 data-dcnode-id="5655"><span class="mw-headline" data-dcnode-id="5663" id="Branding_and_wording_choices"><span data-dcnode-id="5664" instrument_node="">Branding and wording choices</span></span><span class="mw-editsection" data-dcnode-id="5656"><span class="mw-editsection-bracket" data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">[</span></span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D20" title="Edit section: Branding and wording choices"><span data-dcnode-id="5660" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5654" instrument_node="">
</span><p data-dcnode-id="5644"><span data-dcnode-id="5653" instrument_node="">It has been argued that the 'Leave' brand was stronger and more effective than the 'Remain' brand. According to Mike Hind, a marketing professional, "The Britain Stronger In Europe brand was stillborn. On the basis of preparation, presentation and messaging, it deserved the kicking it got."</span><sup class="reference" data-dcnode-id="5650" id="cite_ref-91"><a data-dcnode-id="5651" href="#cite_note-91"><span data-dcnode-id="5652" instrument_node="">[91]</span></a></sup><span data-dcnode-id="5649" instrument_node=""> Additionally behavioural practitioner Warren Hatter argues that 'Leave' as a word places a lower cognitive load on observers than 'Remain a member of'.</span><sup class="reference" data-dcnode-id="5646" id="cite_ref-92"><a data-dcnode-id="5647" href="#cite_note-92"><span data-dcnode-id="5648" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5645" instrument_node="">
</span></p><span data-dcnode-id="5643" instrument_node="">
</span><h3 data-dcnode-id="5633"><span class="mw-headline" data-dcnode-id="5641" id="Prospect_theory"><span data-dcnode-id="5642" instrument_node="">Prospect theory</span></span><span class="mw-editsection" data-dcnode-id="5634"><span class="mw-editsection-bracket" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">[</span></span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D21" title="Edit section: Prospect theory"><span data-dcnode-id="5638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5632" instrument_node="">
</span><p data-dcnode-id="5623"><span data-dcnode-id="5631" instrument_node="">Economics writer Chris Dillow has argued that, among other factors, </span><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prospect_theory" title="Prospect theory"><span data-dcnode-id="5630" instrument_node="">Prospect Theory</span></a><span data-dcnode-id="5628" instrument_node=""> may explain the willingness of many voters to take a path that he sees as the more risky of two (change vs status quo). In his words Prospect Theory 'Tells us that people who feel they've lost want to gamble to break even. This is why they back longshots on the last race of the day or why they hold onto badly performing stocks. People who had lost out from globalization, or felt discomforted by immigration, voted Leave because they felt they had little to lose from doing so.'</span><sup class="reference" data-dcnode-id="5625" id="cite_ref-93"><a data-dcnode-id="5626" href="#cite_note-93"><span data-dcnode-id="5627" instrument_node="">[93]</span></a></sup><span data-dcnode-id="5624" instrument_node="">
</span></p><span data-dcnode-id="5622" instrument_node="">
</span><h3 data-dcnode-id="5612"><span class="mw-headline" data-dcnode-id="5620" id="The_role_of_Vote_Leave"><span data-dcnode-id="5621" instrument_node="">The role of Vote Leave</span></span><span class="mw-editsection" data-dcnode-id="5613"><span class="mw-editsection-bracket" data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">[</span></span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D22" title="Edit section: The role of Vote Leave"><span data-dcnode-id="5617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5611" instrument_node="">
</span><p data-dcnode-id="5596"><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominic_Cummings" title="Dominic Cummings"><span data-dcnode-id="5610" instrument_node="">Dominic Cummings</span></a><span data-dcnode-id="5608" instrument_node="">, Campaign Director of </span><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_Leave" title="Vote Leave"><span data-dcnode-id="5607" instrument_node="">Vote Leave</span></a><span data-dcnode-id="5605" instrument_node=""> wrote in </span><i data-dcnode-id="5602"><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Spectator" title="The Spectator"><span data-dcnode-id="5604" instrument_node="">The Spectator</span></a></i><span data-dcnode-id="5601" instrument_node=""> in January 2017 on "how the Brexit referendum was won".</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-94"><a data-dcnode-id="5599" href="#cite_note-94"><span data-dcnode-id="5600" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5597" instrument_node="">
</span></p><p data-dcnode-id="5579"><span data-dcnode-id="5595" instrument_node="">He wrote: "Leave won because 1) three big forces [the </span><a class="mw-redirect" data-dcnode-id="5593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_migrant_crisis" title="European migrant crisis"><span data-dcnode-id="5594" instrument_node="">immigration crisis</span></a><span data-dcnode-id="5592" instrument_node="">, the </span><a data-dcnode-id="5590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%25932008" title="Financial crisis of 2007–2008"><span data-dcnode-id="5591" instrument_node="">2008 financial crisis</span></a><span data-dcnode-id="5589" instrument_node=""> and the </span><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_debt_crisis" title="European debt crisis"><span data-dcnode-id="5588" instrument_node="">euro crisis</span></a><span data-dcnode-id="5586" instrument_node="">] created conditions in which the contest was competitive, AND 2) Vote Leave exploited the situation imperfectly but effectively, AND 3) </span><a data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Cameron" title="David Cameron"><span data-dcnode-id="5585" instrument_node="">Cameron</span></a><span data-dcnode-id="5583" instrument_node="">/</span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Osborne" title="George Osborne"><span data-dcnode-id="5582" instrument_node="">Osborne</span></a><span data-dcnode-id="5580" instrument_node=""> made big mistakes. If just one of these had been different, it is very likely IN would have won."
</span></p><p data-dcnode-id="5574"><span data-dcnode-id="5578" instrument_node="">"Pundits and MPs kept saying ‘why isn’t Leave arguing about the economy and living standards’. They did not realise that for millions of people, £350m/NHS was about the economy and living standards – that's why it was so effective. It was clearly the most effective argument not only with the crucial swing fifth but with almost every demographic. Even with </span><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Independence_Party" title="UK Independence Party"><span data-dcnode-id="5577" instrument_node="">UKIP</span></a><span data-dcnode-id="5575" instrument_node=""> voters it was level-pegging with immigration. Would we have won without immigration? No. Would we have won without £350m/NHS? All our research and the close result strongly suggests No."
</span></p><p data-dcnode-id="5563"><span data-dcnode-id="5573" instrument_node="">"If </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="5572" instrument_node="">Boris</span></a><span data-dcnode-id="5570" instrument_node="">, </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Gove" title="Michael Gove"><span data-dcnode-id="5569" instrument_node="">Gove</span></a><span data-dcnode-id="5567" instrument_node="">, and </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gisela_Stuart" title="Gisela Stuart"><span data-dcnode-id="5566" instrument_node="">Gisela</span></a><span data-dcnode-id="5564" instrument_node=""> had not supported us and picked up the baseball bat marked 'Turkey/NHS/£350 million' with five weeks to go, then 650,000 votes might have been lost."
</span></p><p data-dcnode-id="5557"><span data-dcnode-id="5562" instrument_node="">The regional economic inequalities are critical to explain the cultural grievances that influenced a ‘leave’ vote.</span><sup class="reference" data-dcnode-id="5559" id="cite_ref-95"><a data-dcnode-id="5560" href="#cite_note-95"><span data-dcnode-id="5561" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5558" instrument_node=""> People who live in districts that have suffered from long periods of economic decline have grown to adopt anti-immigrant and Eurosceptic views, which leads to support for Brexit.
</span></p><p data-dcnode-id="5553"><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominic_Cummings" title="Dominic Cummings"><span data-dcnode-id="5556" instrument_node="">Dominic Cummings</span></a><span data-dcnode-id="5554" instrument_node=""> also has discussed how the Leave campaign that he spearheaded, was able to mobilise as well as appeal to two vast groups of the electorate; the traditional labour industrial voter and the more middle class older conservative-leaning voter. Cummings stated that the campaign that focused on Turkey/NHS mainly appealed to Labour voters living in the north of England. The attention of these issues was at the top of the policies that these voters feared (immigration and the lack of resources). The ability to mobilise these voters appeared to pave the way for a Leave-win in the north.
</span></p><p data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">The ability and decision making of the leave campaign to choose to hand-pick policies in certain areas of the country resulted in the campaign having vast support in the two ends of the country. This was different from that of remain who campaigned around solely on the economic argument across the country. This worked well with the southern voters, yet the Northern voters who had seen the brunt of de-industrialisation and austerity did not agree with the premise that the European Union was the height of economic prosperity.
</span></p><span data-dcnode-id="5550" instrument_node="">
</span><h3 data-dcnode-id="5540"><span class="mw-headline" data-dcnode-id="5548" id="Shortcomings_of_the_Remain_campaign"><span data-dcnode-id="5549" instrument_node="">Shortcomings of the Remain campaign</span></span><span class="mw-editsection" data-dcnode-id="5541"><span class="mw-editsection-bracket" data-dcnode-id="5546"><span data-dcnode-id="5547" instrument_node="">[</span></span><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D23" title="Edit section: Shortcomings of the Remain campaign"><span data-dcnode-id="5545" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5539" instrument_node="">
</span><p data-dcnode-id="5517"><span data-dcnode-id="5538" instrument_node="">Whilst the Leave side may have made good tactical decisions during the campaign, part of its success came from the </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Britain_Stronger_in_Europe" title="Britain Stronger in Europe"><span data-dcnode-id="5537" instrument_node="">Remain campaign</span></a><span data-dcnode-id="5535" instrument_node=""> failing to provide convincing enough counter arguments or arguments of their own. A lot of the Remain's campaign was built around spreading the notion that Brexit would weaken Britain, yet </span><a data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Curtice" title="John Curtice"><span data-dcnode-id="5534" instrument_node="">Curtice</span></a><span data-dcnode-id="5532" instrument_node=""> notes that the campaign offered little explanation as to "how the UK economy might be strengthened further by continued EU membership".</span><sup class="reference" data-dcnode-id="5529" id="cite_ref-Curtice_19–37_23-11"><a data-dcnode-id="5530" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5531" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5528" instrument_node=""> He goes on to argue that the </span><a class="mw-redirect" data-dcnode-id="5526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campaigning_in_the_United_Kingdom_European_Union_membership_referendum%2C_2016" title="Campaigning in the United Kingdom European Union membership referendum, 2016"><span data-dcnode-id="5527" instrument_node="">Leave campaign</span></a><span data-dcnode-id="5525" instrument_node=""> were offering such explanations, exemplified by the claim that £350 million a week could be spent on the </span><a data-dcnode-id="5523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Health_Service" title="National Health Service"><span data-dcnode-id="5524" instrument_node="">NHS</span></a><span data-dcnode-id="5522" instrument_node="">, regardless of whether or not this was a valid claim.</span><sup class="reference" data-dcnode-id="5519" id="cite_ref-Curtice_19–37_23-12"><a data-dcnode-id="5520" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5521" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5518" instrument_node="">
</span></p><p data-dcnode-id="5491"><span data-dcnode-id="5516" instrument_node="">One analysis of the Remain campaign has concluded that the campaign did little to counter </span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_Leave" title="Vote Leave"><span data-dcnode-id="5515" instrument_node="">Vote Leave's</span></a><span data-dcnode-id="5513" instrument_node=""> arguments surrounding immigration, an area that was considered one of Leave's biggest pulling factors in attracting voters.</span><sup class="reference" data-dcnode-id="5510" id="cite_ref-Curtice_19–37_23-13"><a data-dcnode-id="5511" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5512" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5509" instrument_node=""> Furthermore, the official leaflet supplied by the government to make the case for remaining in the EU failed to address the issue of sovereignty, which was another area that Vote Leave was gaining a lot of support.</span><sup class="reference" data-dcnode-id="5506" id="cite_ref-Curtice_19–37_23-14"><a data-dcnode-id="5507" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5508" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5505" instrument_node=""> In addition, the remain campaign focused very heavily on the 'risk' posed by Brexit, but analysis in the time since shows this may have been a mistake. Analysis carried out by </span><a class="external text" data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20190123145427/https%3A//www.utdallas.edu/epps/hclarke/" rel="nofollow"><span data-dcnode-id="5504" instrument_node="">Harold D. Clarke</span></a><span data-dcnode-id="5502" instrument_node="">, </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Goodwin" title="Matthew Goodwin"><span data-dcnode-id="5501" instrument_node="">Matthew Godwin</span></a><span data-dcnode-id="5499" instrument_node=""> and </span><a class="external text" data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.essex.ac.uk/people/white62605/paul-whiteley" rel="nofollow"><span data-dcnode-id="5498" instrument_node="">Paul Whiteley</span></a><span data-dcnode-id="5496" instrument_node="">, appears to show that those who had an unfavourable view of immigration and felt that too much decision making had been taken away from the British government, were much more likely to minimise the risk of Brexit, partially because they perceived they had little to lose.</span><sup class="reference" data-dcnode-id="5493" id="cite_ref-96"><a data-dcnode-id="5494" href="#cite_note-96"><span data-dcnode-id="5495" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5492" instrument_node="">
</span></p><span data-dcnode-id="5490" instrument_node="">
</span><h2 data-dcnode-id="5480"><span class="mw-headline" data-dcnode-id="5488" id="Policy_decisions"><span data-dcnode-id="5489" instrument_node="">Policy decisions</span></span><span class="mw-editsection" data-dcnode-id="5481"><span class="mw-editsection-bracket" data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">[</span></span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D24" title="Edit section: Policy decisions"><span data-dcnode-id="5485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5479" instrument_node="">
</span><h3 data-dcnode-id="5469"><span class="mw-headline" data-dcnode-id="5477" id="Decision_not_to_impose_tougher_migration_restrictions"><span data-dcnode-id="5478" instrument_node="">Decision not to impose tougher migration restrictions</span></span><span class="mw-editsection" data-dcnode-id="5470"><span class="mw-editsection-bracket" data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">[</span></span><a data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D25" title="Edit section: Decision not to impose tougher migration restrictions"><span data-dcnode-id="5474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5468" instrument_node="">
</span><p data-dcnode-id="5458"><span data-dcnode-id="5467" instrument_node="">It has been claimed that the role of migration as a key factor in driving voting behaviour at the referendum originates from the relatively high levels of net migration into the UK in the last decade.</span><sup class="reference" data-dcnode-id="5464" id="cite_ref-97"><a data-dcnode-id="5465" href="#cite_note-97"><span data-dcnode-id="5466" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5463" instrument_node=""> In particular it is claimed that the decision not to impose restrictions on EU migrants after the addition of the 'A8' (Eastern European) countries to the EU in 2004</span><sup class="reference" data-dcnode-id="5460" id="cite_ref-EU_Migration_to_and_from_the_UK_14-1"><a data-dcnode-id="5461" href="#cite_note-EU_Migration_to_and_from_the_UK-14"><span data-dcnode-id="5462" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5459" instrument_node=""> (at a time when other European countries did impose such restrictions) contributed to a spike in migration levels that underpins contemporary voter attitudes.
</span></p><span data-dcnode-id="5457" instrument_node="">
</span><h3 data-dcnode-id="5447"><span class="mw-headline" data-dcnode-id="5455" id="European_migrant_crisis"><span data-dcnode-id="5456" instrument_node="">European migrant crisis</span></span><span class="mw-editsection" data-dcnode-id="5448"><span class="mw-editsection-bracket" data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">[</span></span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D26" title="Edit section: European migrant crisis"><span data-dcnode-id="5452" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5446" instrument_node="">
</span><link data-dcnode-id="5445" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5441" role="note"><span data-dcnode-id="5444" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_migrant_crisis" title="European migrant crisis"><span data-dcnode-id="5443" instrument_node="">European migrant crisis</span></a></div><span data-dcnode-id="5440" instrument_node="">
</span><p data-dcnode-id="5416"><span data-dcnode-id="5439" instrument_node="">In 2017 </span><a data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="5438" instrument_node="">U.S. President</span></a><span data-dcnode-id="5436" instrument_node=""> </span><a data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5435" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5433" instrument_node=""> stated that </span><a class="mw-redirect" data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Chancellor" title="German Chancellor"><span data-dcnode-id="5432" instrument_node="">German Chancellor</span></a><span data-dcnode-id="5430" instrument_node=""> </span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="5429" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="5427" instrument_node="">'s decision to open her country's borders for more than a million refugees and illegal immigrants was a "catastrophic mistake" and "the final straw that broke the camel's back", allowing the Leave campaign to win.</span><sup class="reference" data-dcnode-id="5424" id="cite_ref-98"><a data-dcnode-id="5425" href="#cite_note-98"><span data-dcnode-id="5426" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="5421" id="cite_ref-99"><a data-dcnode-id="5422" href="#cite_note-99"><span data-dcnode-id="5423" instrument_node="">[99]</span></a></sup><sup class="reference" data-dcnode-id="5418" id="cite_ref-100"><a data-dcnode-id="5419" href="#cite_note-100"><span data-dcnode-id="5420" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5417" instrument_node="">
</span></p><p data-dcnode-id="5388"><span data-dcnode-id="5415" instrument_node="">Furthermore, </span><a data-dcnode-id="5413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigel_Farage" title="Nigel Farage"><span data-dcnode-id="5414" instrument_node="">Nigel Farage</span></a><span data-dcnode-id="5412" instrument_node=""> and long-term </span><a data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euroscepticism" title="Euroscepticism"><span data-dcnode-id="5411" instrument_node="">Eurosceptic</span></a><span data-dcnode-id="5409" instrument_node=""> party </span><a data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Independence_Party" title="UK Independence Party"><span data-dcnode-id="5408" instrument_node="">UKIP</span></a><span data-dcnode-id="5406" instrument_node=""> used images from the refugee crisis during their campaign to increase the anxiety about immigration that the crisis caused, prompting criticism from some "Leave" and "Remain" supporters.</span><sup class="reference" data-dcnode-id="5403" id="cite_ref-101"><a data-dcnode-id="5404" href="#cite_note-101"><span data-dcnode-id="5405" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="5400" id="cite_ref-'breaking_point'_poster_102-0"><a data-dcnode-id="5401" href="#cite_note-'breaking_point'_poster-102"><span data-dcnode-id="5402" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5399" instrument_node=""> Leading Leave campaigner </span><a data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Gove" title="Michael Gove"><span data-dcnode-id="5398" instrument_node="">Michael Gove</span></a><span data-dcnode-id="5396" instrument_node=""> said that it was "the wrong thing to do", whilst then-Chancellor </span><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Osborne" title="George Osborne"><span data-dcnode-id="5395" instrument_node="">George Osborne</span></a><span data-dcnode-id="5393" instrument_node=""> of the Remain side stated that the poster "had echoes of literature used in the 1930s" in Germany.</span><sup class="reference" data-dcnode-id="5390" id="cite_ref-'breaking_point'_poster_102-1"><a data-dcnode-id="5391" href="#cite_note-'breaking_point'_poster-102"><span data-dcnode-id="5392" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5389" instrument_node="">
</span></p><span data-dcnode-id="5387" instrument_node="">
</span><h2 data-dcnode-id="5377"><span class="mw-headline" data-dcnode-id="5385" id="Role_of_the_media"><span data-dcnode-id="5386" instrument_node="">Role of the media</span></span><span class="mw-editsection" data-dcnode-id="5378"><span class="mw-editsection-bracket" data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">[</span></span><a data-dcnode-id="5381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D27" title="Edit section: Role of the media"><span data-dcnode-id="5382" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5376" instrument_node="">
</span><link data-dcnode-id="5375" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5371" role="note"><span data-dcnode-id="5374" instrument_node="">Further information: </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euromyth" title="Euromyth"><span data-dcnode-id="5373" instrument_node="">Euromyth</span></a></div><span data-dcnode-id="5370" instrument_node="">
</span><p data-dcnode-id="5362"><span data-dcnode-id="5369" instrument_node="">At the heart of the political debates seen across the British media in the run up to June 2016, we saw two specific subjects dominate; the economy and immigration. As highlighted in a report by the Centre for the Study of Media, Communication and Power, “The economy was the most-covered political issue during the campaign...appearing in 48% of all “4,383 articles [referring] to immigration during the campaign”[explicitly Brexit related] articles</span><i data-dcnode-id="5364"><span data-dcnode-id="5368" instrument_node=""> </span><sup class="reference" data-dcnode-id="5365" id="cite_ref-103"><a data-dcnode-id="5366" href="#cite_note-103"><span data-dcnode-id="5367" instrument_node="">[103]</span></a></sup></i><span data-dcnode-id="5363" instrument_node="">
</span></p><p data-dcnode-id="5327"><i data-dcnode-id="5359"><a data-dcnode-id="5360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Guardian" title="The Guardian"><span data-dcnode-id="5361" instrument_node="">The Guardian</span></a></i><span data-dcnode-id="5358" instrument_node=""> journalist </span><a data-dcnode-id="5356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane_Martinson" title="Jane Martinson"><span data-dcnode-id="5357" instrument_node="">Jane Martinson</span></a><span data-dcnode-id="5355" instrument_node=""> noted that many of the UK's biggest selling newspapers, </span><i data-dcnode-id="5352"><a data-dcnode-id="5353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sun_%28United_Kingdom%29" title="The Sun (United Kingdom)"><span data-dcnode-id="5354" instrument_node="">The Sun</span></a></i><span data-dcnode-id="5351" instrument_node=""> and the </span><i data-dcnode-id="5348"><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Mail" title="Daily Mail"><span data-dcnode-id="5350" instrument_node="">Daily Mail</span></a></i><span data-dcnode-id="5347" instrument_node=""> in particular, but also including </span><i data-dcnode-id="5344"><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Daily_Telegraph" title="The Daily Telegraph"><span data-dcnode-id="5346" instrument_node="">The Daily Telegraph</span></a></i><span data-dcnode-id="5343" instrument_node=""> and </span><i data-dcnode-id="5340"><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Express" title="Daily Express"><span data-dcnode-id="5342" instrument_node="">Daily Express</span></a></i><span data-dcnod
