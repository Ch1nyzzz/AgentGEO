</span><p data-dcnode-id="7122"><span data-dcnode-id="7160" instrument_node="">The result in favour of Brexit of the </span><a data-dcnode-id="7158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_United_Kingdom_European_Union_membership_referendum" title="2016 United Kingdom European Union membership referendum"><span data-dcnode-id="7159" instrument_node="">2016 United Kingdom European Union membership referendum</span></a><span data-dcnode-id="7157" instrument_node=""> is one of the most significant political events for Britain during the 21st century. The debate provoked major consideration to an array of topics, argued up-to, and beyond, the referendum on 23 June 2016. Factors including </span><a data-dcnode-id="7155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereignty" title="Sovereignty"><span data-dcnode-id="7156" instrument_node="">sovereignty</span></a><span data-dcnode-id="7154" instrument_node="">, </span><a data-dcnode-id="7152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration" title="Immigration"><span data-dcnode-id="7153" instrument_node="">immigration</span></a><span data-dcnode-id="7151" instrument_node="">, </span><a data-dcnode-id="7149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy" title="Economy"><span data-dcnode-id="7150" instrument_node="">the economy</span></a><span data-dcnode-id="7148" instrument_node=""> and anti-establishment politics, amongst various other influences. The result of the non-legally binding </span><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendums_in_the_United_Kingdom" title="Referendums in the United Kingdom"><span data-dcnode-id="7147" instrument_node="">referendum</span></a><span data-dcnode-id="7145" instrument_node=""> was that 51.8% of the votes were in favour of leaving the </span><a data-dcnode-id="7143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="7144" instrument_node="">European Union</span></a><span data-dcnode-id="7142" instrument_node="">. The formal </span><a data-dcnode-id="7140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withdrawal_from_the_European_Union" title="Withdrawal from the European Union"><span data-dcnode-id="7141" instrument_node="">withdrawal</span></a><span data-dcnode-id="7139" instrument_node=""> from the EU took place at 23:00 on 30 January 2020, almost three years after </span><a data-dcnode-id="7137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theresa_May" title="Theresa May"><span data-dcnode-id="7138" instrument_node="">Theresa May</span></a><span data-dcnode-id="7136" instrument_node=""> triggered </span><a data-dcnode-id="7134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withdrawal_from_the_European_Union" title="Withdrawal from the European Union"><span data-dcnode-id="7135" instrument_node="">Article 50</span></a><span data-dcnode-id="7133" instrument_node=""> of the </span><a data-dcnode-id="7131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Lisbon" title="Treaty of Lisbon"><span data-dcnode-id="7132" instrument_node="">Lisbon Treaty</span></a><span data-dcnode-id="7130" instrument_node=""> on 29 March 2017. This page provides an overarching analysis of the different arguments which were presented by both the Leave and Remain campaigns.</span><sup class="reference" data-dcnode-id="7127" id="cite_ref-1"><a data-dcnode-id="7128" href="#cite_note-1"><span data-dcnode-id="7129" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="7124" id="cite_ref-:0_2-0"><a data-dcnode-id="7125" href="#cite_note-:0-2"><span data-dcnode-id="7126" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7123" instrument_node="">

</span><h2 data-dcnode-id="6847"><span class="mw-headline" data-dcnode-id="6855" id="Sovereignty"><span data-dcnode-id="6856" instrument_node="">Sovereignty</span></span><span class="mw-editsection" data-dcnode-id="6848"><span class="mw-editsection-bracket" data-dcnode-id="6853"><span data-dcnode-id="6854" instrument_node="">[</span></span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D1" title="Edit section: Sovereignty"><span data-dcnode-id="6852" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6846" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6840" role="note"><span data-dcnode-id="6843" instrument_node="">Main article: </span><a data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union_law" title="European Union law"><span data-dcnode-id="6842" instrument_node="">European Union law</span></a></div><span data-dcnode-id="6839" instrument_node="">
</span><link data-dcnode-id="6838" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6834" role="note"><span data-dcnode-id="6837" instrument_node="">See also: </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_legitimacy_of_the_European_Union" title="Democratic legitimacy of the European Union"><span data-dcnode-id="6836" instrument_node="">Democratic legitimacy of the European Union</span></a></div><span data-dcnode-id="6833" instrument_node="">
</span><p data-dcnode-id="6810"><span data-dcnode-id="6832" instrument_node="">On the day of the referendum </span><a data-dcnode-id="6830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Ashcroft" title="Michael Ashcroft"><span data-dcnode-id="6831" instrument_node="">Lord Ashcroft</span></a><span data-dcnode-id="6829" instrument_node="">'s polling team questioned 12,369 people who had completed voting.</span><sup class="reference" data-dcnode-id="6826" id="cite_ref-lordashcroftpolls.com_3-0"><a data-dcnode-id="6827" href="#cite_note-lordashcroftpolls.com-3"><span data-dcnode-id="6828" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6825" instrument_node=""> This poll produced data that showed that 'Nearly half (49%) of leave voters said the biggest single reason for wanting to leave the </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6824" instrument_node="">European Union</span></a><span data-dcnode-id="6822" instrument_node=""> was "the principle that decisions about the UK should be taken in the UK". ("in the UK." meaning: "by the UK." logically implying: "on behalf of 66 million UK citizens not 508 million EU residents.") The sense that EU membership took decision making further away from 'the people' in favour of domination by regulatory bodies – in particular the European Commission, seen as the supposed key decision-taking body, is said to have been a strong motivating factor for leave voters wanting to end or reverse the process of EU influence in the UK.</span><sup class="reference" data-dcnode-id="6819" id="cite_ref-Jennings_1–18_4-0"><a data-dcnode-id="6820" href="#cite_note-Jennings_1%E2%80%9318-4"><span data-dcnode-id="6821" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6818" instrument_node=""> Immediately prior to the vote, </span><a data-dcnode-id="6816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ipsos_MORI" title="Ipsos MORI"><span data-dcnode-id="6817" instrument_node="">Ipsos MORI</span></a><span data-dcnode-id="6815" instrument_node=""> data showed that the European Union was the third most highly ranked problem by Britons who were asked to name the most important issues facing the country, with 32% of respondents naming it as an issue.</span><sup class="reference" data-dcnode-id="6812" id="cite_ref-ipsos-mori.com_5-0"><a data-dcnode-id="6813" href="#cite_note-ipsos-mori.com-5"><span data-dcnode-id="6814" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6811" instrument_node="">
</span></p><p data-dcnode-id="6804"><span data-dcnode-id="6809" instrument_node="">Two years later, in December 2018, pollsters from Survation asked 1,030 people whether they approved or disapproved with the Brexit deal negotiated by EU leaders and the British government in relation to sovereignty. 35% of participants approved while 24% of participants didn't, leaving 41% either neutral or didn't know.</span><sup class="reference" data-dcnode-id="6806" id="cite_ref-6"><a data-dcnode-id="6807" href="#cite_note-6"><span data-dcnode-id="6808" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6805" instrument_node=""> This suggests that the majority of people either didn't have an opinion on the issue, or could be fed up with the Brexit process dragging on.
</span></p><p data-dcnode-id="6780"><span data-dcnode-id="6803" instrument_node="">However, Pollsters from 'UK in a Changing Europe', which conducts independent and authoritative </span><a data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom%25E2%2580%2593European_Union_relations" title="United Kingdom–European Union relations"><span data-dcnode-id="6802" instrument_node="">UK-EU relations</span></a><span data-dcnode-id="6800" instrument_node="">, conducted a poll in July 2018 which surveyed over 7,000 participants showing the differences between </span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="6799" instrument_node="">Conservative</span></a><span data-dcnode-id="6797" instrument_node=""> and </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="6796" instrument_node="">Labour's</span></a><span data-dcnode-id="6794" instrument_node=""> </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Britain_Stronger_in_Europe" title="Britain Stronger in Europe"><span data-dcnode-id="6793" instrument_node="">Remain</span></a><span data-dcnode-id="6791" instrument_node=""> and </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leave.EU" title="Leave.EU"><span data-dcnode-id="6790" instrument_node="">Leave</span></a><span data-dcnode-id="6788" instrument_node=""> forces within the party. Leave voters, for the most part, regarded control of British laws and regulations as the most important factor in the next 5 years, with the ability to strike trade deals independently as the second most important factor. Leave voters would prioritise control and trade over immigration by 67% to 33%, and 59% to 41% respectively. They also preferred control and trade over strong economic growth by 69% to 31% and 61% to 39% respectively.</span><sup class="reference" data-dcnode-id="6785" id="cite_ref-7"><a data-dcnode-id="6786" href="#cite_note-7"><span data-dcnode-id="6787" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6784" instrument_node=""> Yet in the same poll, Remain voters strongly favoured economic growth over immigration, control and trade deals by margins of 77% vs 23%, 79% vs 21% as well as 84% vs 16% respectively. Such large margins here comparatively to Leave voters slimmer favour of control and trade, and in relation to how close the referendum result was, shows that actually there is no overall majority for a </span><a data-dcnode-id="6782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glossary_of_Brexit_terms" title="Glossary of Brexit terms"><span data-dcnode-id="6783" instrument_node="">Hard Brexit</span></a><span data-dcnode-id="6781" instrument_node=""> and that economic growth is the most important to all voters.
</span></p><span data-dcnode-id="6779" instrument_node="">
</span><h2 data-dcnode-id="6769"><span class="mw-headline" data-dcnode-id="6777" id="Immigration"><span data-dcnode-id="6778" instrument_node="">Immigration</span></span><span class="mw-editsection" data-dcnode-id="6770"><span class="mw-editsection-bracket" data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">[</span></span><a data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D2" title="Edit section: Immigration"><span data-dcnode-id="6774" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6768" instrument_node="">
</span><p data-dcnode-id="6759"><span data-dcnode-id="6767" instrument_node="">Lord Ashcroft's election day poll of 12,369 voters also discovered that 'One third (33%) [of leave voters] said the main reason was that leaving "offered the best chance for the UK to regain control over immigration and its own borders.</span><span data-dcnode-id="6765" style="padding-right:.15em;"><span data-dcnode-id="6766" instrument_node="">"</span></span><span data-dcnode-id="6764" instrument_node="">'.</span><sup class="reference" data-dcnode-id="6761" id="cite_ref-lordashcroftpolls.com_3-1"><a data-dcnode-id="6762" href="#cite_note-lordashcroftpolls.com-3"><span data-dcnode-id="6763" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6760" instrument_node="">
</span></p><p data-dcnode-id="6737"><span data-dcnode-id="6758" instrument_node="">In 2015, net immigration to the UK from other EU countries was approximately 172,000, compared to 191,000 from non-EU countries.</span><sup class="reference" data-dcnode-id="6755" id="cite_ref-8"><a data-dcnode-id="6756" href="#cite_note-8"><span data-dcnode-id="6757" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6754" instrument_node="">
The population of the EU was around 500 million at the time of the referendum </span><sup class="reference" data-dcnode-id="6751" id="cite_ref-9"><a data-dcnode-id="6752" href="#cite_note-9"><span data-dcnode-id="6753" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6750" instrument_node=""> while the population of the world was 7.4 billion.</span><sup class="reference" data-dcnode-id="6747" id="cite_ref-10"><a data-dcnode-id="6748" href="#cite_note-10"><span data-dcnode-id="6749" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6746" instrument_node="">  Based on these figures, a mere 6.7% of the world's population accounted for 47% of immigration to the UK (or 49% according to a BBC report from 2016).</span><sup class="reference" data-dcnode-id="6743" id="cite_ref-11"><a data-dcnode-id="6744" href="#cite_note-11"><span data-dcnode-id="6745" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6742" instrument_node="">  Commentators have pointed out that this is unfair on non-EU immigrants, since it caused the UK Visa and Immigration service to bring in restrictions on non-EU immigration in order to keep immigration to a manageable level.</span><sup class="reference" data-dcnode-id="6739" id="cite_ref-12"><a data-dcnode-id="6740" href="#cite_note-12"><span data-dcnode-id="6741" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6738" instrument_node="">
</span></p><p data-dcnode-id="6731"><span data-dcnode-id="6736" instrument_node="">Immediately prior to the referendum, data from the University of Oxford’s The Migration Observatory stated, “between June 2015 and June 2016, immigration was consistently named as the most salient issue facing the country, peaking at 56% in September 2015”</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-Migration_Observatory_13-0"><a data-dcnode-id="6734" href="#cite_note-Migration_Observatory-13"><span data-dcnode-id="6735" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6732" instrument_node="">
</span></p><p data-dcnode-id="6719"><span data-dcnode-id="6730" instrument_node="">In the decade before the Brexit </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="6729" instrument_node="">referendum</span></a><span data-dcnode-id="6727" instrument_node=""> there was a significant increase in migration from EU countries, as outlined by the </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Migration_Observatory_at_the_University_of_Oxford" title="Migration Observatory at the University of Oxford"><span data-dcnode-id="6726" instrument_node="">Migration Observatory</span></a><span data-dcnode-id="6724" instrument_node="">:
'Inflows of EU nationals migrating to the UK stood at 268,000 in 2014, up from 201,000 in 2013. EU inflows were mainly flat for the 1991–2003 period, averaging close to 61,000 per year.'</span><sup class="reference" data-dcnode-id="6721" id="cite_ref-EU_Migration_to_and_from_the_UK_14-0"><a data-dcnode-id="6722" href="#cite_note-EU_Migration_to_and_from_the_UK-14"><span data-dcnode-id="6723" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6720" instrument_node="">
</span></p><p data-dcnode-id="6692"><span data-dcnode-id="6718" instrument_node="">According to </span><i data-dcnode-id="6715"><a data-dcnode-id="6716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Economist" title="The Economist"><span data-dcnode-id="6717" instrument_node="">The Economist</span></a></i><span data-dcnode-id="6714" instrument_node="">, areas that saw increases of over 200% in foreign-born population between 2001 and 2014 saw a majority of voters back leave in 94% of cases.</span><sup class="reference" data-dcnode-id="6711" id="cite_ref-15"><a data-dcnode-id="6712" href="#cite_note-15"><span data-dcnode-id="6713" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6710" instrument_node=""> </span><i data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">The Economist</span></i><span data-dcnode-id="6707" instrument_node=""> concluded 'High numbers of migrants don't bother Britons; high rates of change do.' Consistent with that notion, research suggests that areas that saw significant influx of migration from Eastern Europe following the accession of 12 mainly Eastern European countries to the </span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6706" instrument_node="">European Union</span></a><span data-dcnode-id="6704" instrument_node=""> in 2004 saw significant growth in support for </span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Independence_Party" title="UK Independence Party"><span data-dcnode-id="6703" instrument_node="">UKIP</span></a><span data-dcnode-id="6701" instrument_node=""> and more likely to vote to leave the European Union.</span><sup class="reference" data-dcnode-id="6698" id="cite_ref-16"><a data-dcnode-id="6699" href="#cite_note-16"><span data-dcnode-id="6700" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6697" instrument_node=""> Academic research investigating differences in Brexit vote among local authorities concluded that the Brexit vote was bigger in areas that had seen a large rise in the proportion of immigrants between 2004 and 2011.</span><sup class="reference" data-dcnode-id="6694" id="cite_ref-Tammes_17-0"><a data-dcnode-id="6695" href="#cite_note-Tammes-17"><span data-dcnode-id="6696" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6693" instrument_node="">
</span></p><p data-dcnode-id="6668"><span data-dcnode-id="6691" instrument_node="">Goodwin and Milazzo said that "in areas where there were previously few migrants, increases in immigration will have a more noticeable effect – and will be more likely to influence political behaviour" whereas ethnically diverse areas will perceive additional immigration as having little effect.</span><sup class="reference" data-dcnode-id="6688" id="cite_ref-GoodwinMilazzo_18-0"><a data-dcnode-id="6689" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6690" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6687" instrument_node=""> They go on to explain that the non-British population of </span><a data-dcnode-id="6685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston%2C_Lincolnshire" title="Boston, Lincolnshire"><span data-dcnode-id="6686" instrument_node="">Boston in Lincolnshire</span></a><span data-dcnode-id="6684" instrument_node=""> became 16 times larger between 2005 and 2015, rising from 1,000 to 16,000.</span><sup class="reference" data-dcnode-id="6681" id="cite_ref-GoodwinMilazzo_18-1"><a data-dcnode-id="6682" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6683" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6680" instrument_node=""> Boston also had the highest vote in favour of 'leave' in the UK, at just over 75% in favour of leaving the EU, which they believe is due to the effects of immigration seeming sudden and intense.</span><sup class="reference" data-dcnode-id="6677" id="cite_ref-GoodwinMilazzo_18-2"><a data-dcnode-id="6678" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6679" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6676" instrument_node=""> They also argue that their data suggests that if Boston had experienced the British average level of demographic change then the vote in favour of 'leave' would have been reduced by nearly 15% and they even suggest that areas such as </span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Lancashire_%28UK_Parliament_constituency%29" title="West Lancashire (UK Parliament constituency)"><span data-dcnode-id="6675" instrument_node="">West Lancashire</span></a><span data-dcnode-id="6673" instrument_node=""> may have had a majority for 'remain' if residents had experienced the average rate of demographic change.</span><sup class="reference" data-dcnode-id="6670" id="cite_ref-GoodwinMilazzo_18-3"><a data-dcnode-id="6671" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6672" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6669" instrument_node="">
</span></p><p data-dcnode-id="6636"><span data-dcnode-id="6667" instrument_node="">Furthermore, immigration has long been a contentious issue in Britain, with scepticism over the inherent value of immigration going back to well before the UK joined even the </span><a data-dcnode-id="6665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Communities" title="European Communities"><span data-dcnode-id="6666" instrument_node="">EEC</span></a><span data-dcnode-id="6664" instrument_node=""> in 1973 (which would later be incorporated into the EU in 1993). Britain had faced a surge in immigration in the post war period due to the influx of people arriving from former British colonies (immigration rules had been relaxed as a way of increasing the labour supply after the war).</span><sup class="reference" data-dcnode-id="6661" id="cite_ref-19"><a data-dcnode-id="6662" href="#cite_note-19"><span data-dcnode-id="6663" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6660" instrument_node=""> By the mid to late 1960s, there was concern from some people that the new immigrant population were arriving in excessively large numbers and were not integrating into British society sufficiently well. This concern is most widely recognised in former British MP </span><a data-dcnode-id="6658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enoch_Powell" title="Enoch Powell"><span data-dcnode-id="6659" instrument_node="">Enoch Powell</span></a><span data-dcnode-id="6657" instrument_node="">'s famous </span><a data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rivers_of_Blood_speech" title="Rivers of Blood speech"><span data-dcnode-id="6656" instrument_node="">Rivers of Blood</span></a><span data-dcnode-id="6654" instrument_node=""> speech made in 1968, in which he warns of the dangers of mass immigration. Powell's subsequent surge in popularity is often seen as a contributing factor in the </span><a data-dcnode-id="6652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="6653" instrument_node="">Conservative party</span></a><span data-dcnode-id="6651" instrument_node="">'s surprise victory in the </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1970_United_Kingdom_general_election" title="1970 United Kingdom general election"><span data-dcnode-id="6650" instrument_node="">1970 general election</span></a><span data-dcnode-id="6648" instrument_node="">. Powell was influential on prominent Brexiteer </span><a data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigel_Farage" title="Nigel Farage"><span data-dcnode-id="6647" instrument_node="">Nigel Farage</span></a><span data-dcnode-id="6645" instrument_node="">, who lists the politician as one of his political heroes.</span><sup class="reference" data-dcnode-id="6642" id="cite_ref-heraldscotland.com_20-0"><a data-dcnode-id="6643" href="#cite_note-heraldscotland.com-20"><span data-dcnode-id="6644" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6641" instrument_node=""> although he specifically stated that it was not Powell's rivers of blood speech that inspired him. The Ukip leader told the Press Association: "You can agree or disagree with much of the Powell doctrine, but his belief in the state having less of a say over our lives, in us not having our laws made in Brussels and having sensible controls over our borders - whilst his language may seem out-of-date now, the principles remain good and true."</span><sup class="reference" data-dcnode-id="6638" id="cite_ref-heraldscotland.com_20-1"><a data-dcnode-id="6639" href="#cite_note-heraldscotland.com-20"><span data-dcnode-id="6640" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6637" instrument_node="">
</span></p><span data-dcnode-id="6635" instrument_node="">
</span><h2 data-dcnode-id="6625"><span class="mw-headline" data-dcnode-id="6633" id="Demographic_and_cultural_factors"><span data-dcnode-id="6634" instrument_node="">Demographic and cultural factors</span></span><span class="mw-editsection" data-dcnode-id="6626"><span class="mw-editsection-bracket" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">[</span></span><a data-dcnode-id="6629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D3" title="Edit section: Demographic and cultural factors"><span data-dcnode-id="6630" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6624" instrument_node="">
</span><h3 data-dcnode-id="6614"><span class="mw-headline" data-dcnode-id="6622" id="EU_integration"><span data-dcnode-id="6623" instrument_node="">EU integration</span></span><span class="mw-editsection" data-dcnode-id="6615"><span class="mw-editsection-bracket" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">[</span></span><a data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D4" title="Edit section: EU integration"><span data-dcnode-id="6619" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6613" instrument_node="">
</span><link data-dcnode-id="6612" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6605" role="note"><span data-dcnode-id="6611" instrument_node="">See also: </span><a data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_opt-outs_from_EU_legislation" title="United Kingdom opt-outs from EU legislation"><span data-dcnode-id="6610" instrument_node="">United Kingdom opt-outs from EU legislation</span></a><span data-dcnode-id="6608" instrument_node=""> and </span><a data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opt-outs_in_the_European_Union" title="Opt-outs in the European Union"><span data-dcnode-id="6607" instrument_node="">Opt-outs in the European Union</span></a></div><span data-dcnode-id="6604" instrument_node="">
</span><p data-dcnode-id="6598"><span data-dcnode-id="6603" instrument_node="">From the early days many in politics in the UK have been unsettled and skeptical of how integrated the UK should be in the European Project and the effect it would have on UK sovereignty. According to MacShane author of 'Brexit: How Britain Will Leave Europe': “No one could decide if Britain should join a limited Europe, at best a common market but not a union or accept the full implication of sharing sovereignty. Thus, since 1945, there has never been a moment when leaders of British politics or the formers of public opinion have been calm and settled on Europe.”</span><sup class="reference" data-dcnode-id="6600" id="cite_ref-21"><a data-dcnode-id="6601" href="#cite_note-21"><span data-dcnode-id="6602" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6599" instrument_node="">
</span></p><p data-dcnode-id="6590"><span data-dcnode-id="6597" instrument_node="">At a macro-level avoiding demographics, the United Kingdom was widely considered to be more detached from European Union than other countries for a number of reasons. This manifested in terms of geography as an island country with few shared land borders, numerous opt-outs (such as currency and Schengen), historical links to the </span><a data-dcnode-id="6595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglosphere" title="Anglosphere"><span data-dcnode-id="6596" instrument_node="">Anglosphere</span></a><span data-dcnode-id="6594" instrument_node=""> and </span><a data-dcnode-id="6592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Nations" title="Commonwealth of Nations"><span data-dcnode-id="6593" instrument_node="">Commonwealth</span></a><span data-dcnode-id="6591" instrument_node=""> from which diaspora had settled in the UK. For these reasons, the UK would always be an "awkward partner" in the European Union and which filtered into the mentality of voters.
</span></p><p data-dcnode-id="6578"><span data-dcnode-id="6589" instrument_node="">Academics James Dennison and </span><a data-dcnode-id="6587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noah_Carl" title="Noah Carl"><span data-dcnode-id="6588" instrument_node="">Noah Carl</span></a><span data-dcnode-id="6586" instrument_node=""> argue that "the most important phenomenon to be explained vis-à-vis the referendum result in our view is that a sizeable Eurosceptic faction has remained extant in Britain over the last four decades".</span><sup class="reference" data-dcnode-id="6583" id="cite_ref-22"><a data-dcnode-id="6584" href="#cite_note-22"><span data-dcnode-id="6585" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6582" instrument_node=""> Using data from the </span><a data-dcnode-id="6580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurobarometer" title="Eurobarometer"><span data-dcnode-id="6581" instrument_node="">Eurobarometer</span></a><span data-dcnode-id="6579" instrument_node=""> survey they showed that fewer Britons considered themselves European than any other EU nationality. Furthermore, they show that British trading patterns, capital flows and emigration patterns were the least Europeanised of any EU member state.
</span></p><p data-dcnode-id="6570"><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Curtice" title="John Curtice"><span data-dcnode-id="6577" instrument_node="">John Curtice</span></a><span data-dcnode-id="6575" instrument_node=""> says that if voters "felt that membership of the EU undermined Britain's distinctive identity were more likely to vote for Leave" and goes on to report that the same was true for voters "with a weak sense of European identity".</span><sup class="reference" data-dcnode-id="6572" id="cite_ref-Curtice_19–37_23-0"><a data-dcnode-id="6573" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="6574" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6571" instrument_node=""> Such research implies that how attached voters felt to either Britain or to the EU influenced their decision, voting in favour of whichever identity they felt more strongly attached to.
</span></p><p data-dcnode-id="6550"><span data-dcnode-id="6569" instrument_node="">Furthermore, in terms of integration, Britain had developed a reputation of being "an awkward partner" in Europe. Britain's reluctance to integrate itself with Europe was reaffirmed by the position it was in following the conclusion of the </span><a data-dcnode-id="6567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="6568" instrument_node="">Second World War</span></a><span data-dcnode-id="6566" instrument_node="">. Its distinct sense of 'otherness' was reinforced by the fact that it was one of the only European states not to be occupied during the war. Its empire, while exhausted, remained intact, and senior civil servants still regarded Britain as a major global power. A Foreign Office assessment following the war's end noted that "Great Britain must be regarded as world power of the second rank and not merely as a unit in a federated Europe".</span><sup class="reference" data-dcnode-id="6563" id="cite_ref-24"><a data-dcnode-id="6564" href="#cite_note-24"><span data-dcnode-id="6565" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6562" instrument_node="">  Once Britain joined the EEC, this reluctance towards integration was seen further. The UK had the most opt-outs of any member state, and along with Ireland was the only member to acquire an opt-out of the </span><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schengen_Area" title="Schengen Area"><span data-dcnode-id="6561" instrument_node="">Schengen Area</span></a><span data-dcnode-id="6559" instrument_node=""> agreement. It has notable opt-outs from the European monetary union, and individual pieces of European legislation regarding Justice and Home Affairs.</span><sup class="reference" data-dcnode-id="6556" id="cite_ref-25"><a data-dcnode-id="6557" href="#cite_note-25"><span data-dcnode-id="6558" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6555" instrument_node=""> It has been suggested that Britain's reservations about European integration, as well as its unique historical position within Europe and stance of remaining less integrated than other EU states, laid the groundwork for the potential that Britain would decide to exit the bloc.</span><sup class="reference" data-dcnode-id="6552" id="cite_ref-Inevitability_and_contingency_26-0"><a data-dcnode-id="6553" href="#cite_note-Inevitability_and_contingency-26"><span data-dcnode-id="6554" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6551" instrument_node="">
</span></p><p data-dcnode-id="6524"><span data-dcnode-id="6549" instrument_node="">Taylor posits the idea of Britain being enmeshed in a 'post-imperial crisis'.</span><sup class="reference" data-dcnode-id="6546" id="cite_ref-Taylor_2017_4_27-0"><a data-dcnode-id="6547" href="#cite_note-Taylor_2017_4-27"><span data-dcnode-id="6548" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> Taylor writes Britain is defined by being at the centre of relations, whether from the </span><a data-dcnode-id="6543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_Relationship" title="Special Relationship"><span data-dcnode-id="6544" instrument_node="">Special Relationship</span></a><span data-dcnode-id="6542" instrument_node=""> or in the </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_realm" title="Commonwealth realm"><span data-dcnode-id="6541" instrument_node="">Commonwealth</span></a><span data-dcnode-id="6539" instrument_node="">.</span><sup class="reference" data-dcnode-id="6536" id="cite_ref-Taylor_2017_4_27-1"><a data-dcnode-id="6537" href="#cite_note-Taylor_2017_4-27"><span data-dcnode-id="6538" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6535" instrument_node=""> Therefore, belonging to a collection of member states on equal footing does not fit into the ideal of </span><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exceptionalism" title="Exceptionalism"><span data-dcnode-id="6534" instrument_node="">British 'exceptionalism'.</span></a><sup class="reference" data-dcnode-id="6530" id="cite_ref-Taylor_2017_15_28-0"><a data-dcnode-id="6531" href="#cite_note-Taylor_2017_15-28"><span data-dcnode-id="6532" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6529" instrument_node=""> He suggests that Britain still viewed the EU from an 'imperial lens' as rivals; begetting the historically negative British opinion of the EU.</span><sup class="reference" data-dcnode-id="6526" id="cite_ref-Taylor_2017_15_28-1"><a data-dcnode-id="6527" href="#cite_note-Taylor_2017_15-28"><span data-dcnode-id="6528" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6525" instrument_node="">
</span></p><span data-dcnode-id="6523" instrument_node="">
</span><h3 data-dcnode-id="6513"><span class="mw-headline" data-dcnode-id="6521" id="Age_of_voters"><span data-dcnode-id="6522" instrument_node="">Age of voters</span></span><span class="mw-editsection" data-dcnode-id="6514"><span class="mw-editsection-bracket" data-dcnode-id="6519"><span data-dcnode-id="6520" instrument_node="">[</span></span><a data-dcnode-id="6517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D5" title="Edit section: Age of voters"><span data-dcnode-id="6518" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6512" instrument_node="">
</span><p data-dcnode-id="6481"><span data-dcnode-id="6511" instrument_node="">It has been argued that the result was caused by differential voting patterns among younger and older people. According to Opinium, 64% of eligible people aged 18–24 voted, whereas 90% of eligible individuals over 65 voted.</span><sup class="reference" data-dcnode-id="6508" id="cite_ref-29"><a data-dcnode-id="6509" href="#cite_note-29"><span data-dcnode-id="6510" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6507" instrument_node="">  It is argued that older voters were more likely to vote 'leave' due to having experienced life in the UK prior to 1973, when the UK joined the European Economic Community which later became the EU, and this memory as well as any potential nostalgia may have influenced their decision. It is also argued that national identity is another reason older people voted Leave. Additionally, it is argued that some older people view immigration as a threat to national identity and culture, which is speculated to be why older people were more in favour of Leave than Remain.</span><sup class="reference" data-dcnode-id="6504" id="cite_ref-30"><a data-dcnode-id="6505" href="#cite_note-30"><span data-dcnode-id="6506" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6503" instrument_node=""> Furthermore, polls by </span><a data-dcnode-id="6501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ipsos_MORI" title="Ipsos MORI"><span data-dcnode-id="6502" instrument_node="">Ipsos-Mori</span></a><span data-dcnode-id="6500" instrument_node="">, </span><a data-dcnode-id="6498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouGov" title="YouGov"><span data-dcnode-id="6499" instrument_node="">YouGov</span></a><span data-dcnode-id="6497" instrument_node=""> and </span><a data-dcnode-id="6495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Ashcroft" title="Michael Ashcroft"><span data-dcnode-id="6496" instrument_node="">Lord Ashcroft</span></a><span data-dcnode-id="6494" instrument_node=""> all assert that 70–75% of under 25s voted 'remain'.</span><sup class="reference" data-dcnode-id="6491" id="cite_ref-31"><a data-dcnode-id="6492" href="#cite_note-31"><span data-dcnode-id="6493" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6490" instrument_node=""> Therefore, it has been argued that a higher turnout of older people and a lower turnout of younger people affected the overall result of the referendum as the older generation was more in favour of 'leave' than the 'remain' favouring younger voters. Additionally according to YouGov, only 54% of 25–49 year olds voted 'remain', whilst 60% of 50–64 year olds and 64% of over 65s voted 'leave' meaning that the support for 'remain' was not as strong outside the youngest demographic.</span><sup class="reference" data-dcnode-id="6487" id="cite_ref-How_Britain_Voted_32-0"><a data-dcnode-id="6488" href="#cite_note-How_Britain_Voted-32"><span data-dcnode-id="6489" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6486" instrument_node=""> Also, YouGov found that around 87% of under-25s in 2018 would now vote to stay in the EU.</span><sup class="reference" data-dcnode-id="6483" id="cite_ref-33"><a data-dcnode-id="6484" href="#cite_note-33"><span data-dcnode-id="6485" instrument_node="">[33]</span></a></sup><span data-dcnode-id="6482" instrument_node="">
</span></p><p data-dcnode-id="6475"><span data-dcnode-id="6480" instrument_node="">Harald Wilkoszewski argues that even if the youth vote (18-24) had achieved a 100% turnout, this would not have been enough to allow for a 'remain' victory, as while the majority of youth voters would vote for 'remain', the minority of youth voters that would vote for 'leave' would still be enough to secure a 'leave' victory. Even if the voting age was lowered to 16 and there was a 100% turnout amongst the youth vote, 'leave' would still win by a slim margin. If all age groups had a 100% turnout and the voting age was lowered to 16, 'leave' would again still win.</span><sup class="reference" data-dcnode-id="6477" id="cite_ref-34"><a data-dcnode-id="6478" href="#cite_note-34"><span data-dcnode-id="6479" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6476" instrument_node="">
</span></p><span data-dcnode-id="6474" instrument_node="">
</span><h3 data-dcnode-id="6464"><span class="mw-headline" data-dcnode-id="6472" id="Education_level"><span data-dcnode-id="6473" instrument_node="">Education level</span></span><span class="mw-editsection" data-dcnode-id="6465"><span class="mw-editsection-bracket" data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">[</span></span><a data-dcnode-id="6468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D6" title="Edit section: Education level"><span data-dcnode-id="6469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6463" instrument_node="">
</span><p data-dcnode-id="6444"><span data-dcnode-id="6462" instrument_node="">Multiple sources have found a correlation between having a higher level of education and voting 'remain', as well as a correlation between having  lower educational level and voting 'leave'. YouGov found that, among those who voted in the referendum, 68% of voters with a </span><a data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academic_degree" title="Academic degree"><span data-dcnode-id="6461" instrument_node="">university degree</span></a><span data-dcnode-id="6459" instrument_node=""> voted 'remain', whereas 70% of voters educated only to </span><a data-dcnode-id="6457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Certificate_of_Secondary_Education" title="General Certificate of Secondary Education"><span data-dcnode-id="6458" instrument_node="">GCSE</span></a><span data-dcnode-id="6456" instrument_node=""> level or lower voted 'leave'.</span><sup class="reference" data-dcnode-id="6453" id="cite_ref-How_Britain_Voted_32-1"><a data-dcnode-id="6454" href="#cite_note-How_Britain_Voted-32"><span data-dcnode-id="6455" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6452" instrument_node=""> Similarly, </span><a data-dcnode-id="6450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Curtice" title="John Curtice"><span data-dcnode-id="6451" instrument_node="">Curtice</span></a><span data-dcnode-id="6449" instrument_node=""> reports that "university graduates voted by around three to one in favour of Remain, whereas nearly four in five of those without any educational qualifications voted to Leave".</span><sup class="reference" data-dcnode-id="6446" id="cite_ref-Curtice_19–37_23-1"><a data-dcnode-id="6447" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="6448" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6445" instrument_node="">
</span></p><p data-dcnode-id="6435"><span data-dcnode-id="6443" instrument_node="">In fact according to a study carried out by the peer-reviewed journal, '</span><a data-dcnode-id="6441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Development_%28journal%29" title="World Development (journal)"><span data-dcnode-id="6442" instrument_node="">World development</span></a><span data-dcnode-id="6440" instrument_node="">', they estimate that an increase of about 3% of British adults accessing higher education in England and Wales could have reversed the referendum result.</span><sup class="reference" data-dcnode-id="6437" id="cite_ref-35"><a data-dcnode-id="6438" href="#cite_note-35"><span data-dcnode-id="6439" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6436" instrument_node="">
</span></p><p data-dcnode-id="6415"><span data-dcnode-id="6434" instrument_node="">It is proposed that those with higher education and higher occupational skills are more likely to value the economic benefits of </span><a data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="6433" instrument_node="">globalisation</span></a><span data-dcnode-id="6431" instrument_node="">, the </span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Single_Market" title="European Single Market"><span data-dcnode-id="6430" instrument_node="">Single Market</span></a><span data-dcnode-id="6428" instrument_node=""> and European membership, and so would be more inclined to vote 'remain'.</span><sup class="reference" data-dcnode-id="6425" id="cite_ref-Curtice_19–37_23-2"><a data-dcnode-id="6426" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="6427" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6424" instrument_node=""> Typically, educated urban professionals tend to have more liberal views on issues such as immigration that were highly debated during the referendum.</span><sup class="reference" data-dcnode-id="6421" id="cite_ref-36"><a data-dcnode-id="6422" href="#cite_note-36"><span data-dcnode-id="6423" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6420" instrument_node="">  Additionally, studies have shown that those with lower educational qualifications are more likely to be socially conservative and feel that European membership brings about constant and dramatic change to the UK, which would be an incentive to vote 'leave'.</span><sup class="reference" data-dcnode-id="6417" id="cite_ref-Curtice_19–37_23-3"><a data-dcnode-id="6418" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="6419" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6416" instrument_node="">
</span></p><span data-dcnode-id="6414" instrument_node="">
</span><h3 data-dcnode-id="6404"><span class="mw-headline" data-dcnode-id="6412" id="Social_attitudes"><span data-dcnode-id="6413" instrument_node="">Social attitudes</span></span><span class="mw-editsection" data-dcnode-id="6405"><span class="mw-editsection-bracket" data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">[</span></span><a data-dcnode-id="6408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D7" title="Edit section: Social attitudes"><span data-dcnode-id="6409" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6403" instrument_node="">
</span><p data-dcnode-id="6384"><span data-dcnode-id="6402" instrument_node="">Academic </span><a data-dcnode-id="6400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Kaufmann" title="Eric Kaufmann"><span data-dcnode-id="6401" instrument_node="">Eric Kaufmann</span></a><span data-dcnode-id="6399" instrument_node=""> notes the relatively strong positive correlation between a voter's support for the </span><a class="mw-redirect" data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_penalty" title="Death penalty"><span data-dcnode-id="6398" instrument_node="">death penalty</span></a><span data-dcnode-id="6396" instrument_node=""> and their choice to vote 'leave'.</span><sup class="reference" data-dcnode-id="6393" id="cite_ref-:0_2-1"><a data-dcnode-id="6394" href="#cite_note-:0-2"><span data-dcnode-id="6395" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6392" instrument_node=""> He says that this highlights a social division that he calls 'order versus openness'. He further argues that 'The order-openness divide is emerging as the key political cleavage, overshadowing the </span><a data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Left%25E2%2580%2593right_political_spectrum" title="Left–right political spectrum"><span data-dcnode-id="6391" instrument_node="">left-right economic dimension</span></a><span data-dcnode-id="6389" instrument_node="">'.</span><sup class="reference" data-dcnode-id="6386" id="cite_ref-:0_2-2"><a data-dcnode-id="6387" href="#cite_note-:0-2"><span data-dcnode-id="6388" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6385" instrument_node="">
</span></p><p data-dcnode-id="6378"><span data-dcnode-id="6383" instrument_node="">As it states in the academic article: 'Confounding and collinearity in regression analysis: a cautionary tale and an alternative procedure, illustrated by studies of British voting behaviour', "The United Kingdom Independence Party’s (UKIP) success at recent British elections— notably for the European Parliament in 2014 and in the 2015 general election—is generally linked to the attractiveness of its right-wing populist appeal to those who have gained least from globalisation over recent decades in particular among: older people (especially males); those with few, if any, formal educational qualifications; and those living in areas with high levels of economic and social deprivation.</span><sup class="reference" data-dcnode-id="6380" id="cite_ref-37"><a data-dcnode-id="6381" href="#cite_note-37"><span data-dcnode-id="6382" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6379" instrument_node="">
</span></p><p data-dcnode-id="6372"><span data-dcnode-id="6377" instrument_node="">This also links with educational factors, those who are educated to a lower level, generally, feel left behind by globalisation and ‘favour a ‘drawbridge up’ policy of less European integration, closed borders and fewer migrants, whereas the latter group are in favour of greater openness and international cooperation.’</span><sup class="reference" data-dcnode-id="6374" id="cite_ref-auto_38-0"><a data-dcnode-id="6375" href="#cite_note-auto-38"><span data-dcnode-id="6376" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6373" instrument_node="">
</span></p><p data-dcnode-id="6366"><span data-dcnode-id="6371" instrument_node="">Such social attitudes are argued to have stemmed from individuals with exclusive identities, whether British, English, Welsh or Scottish, tended to be more Eurosceptic than individuals with ‘nested identities ’such as a ‘nested’ English, British, European identity.</span><sup class="reference" data-dcnode-id="6368" id="cite_ref-39"><a data-dcnode-id="6369" href="#cite_note-39"><span data-dcnode-id="6370" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6367" instrument_node="">
</span></p><p data-dcnode-id="6356"><span data-dcnode-id="6365" instrument_node="">It is argued that data from the British Election Study suggests that support for the death penalty is an example of how valuing 'order' over 'openness' could have affected voting behaviour in the referendum.</span><sup class="reference" data-dcnode-id="6362" id="cite_ref-Burton_40-0"><a data-dcnode-id="6363" href="#cite_note-Burton-40"><span data-dcnode-id="6364" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6361" instrument_node=""> Those who valued 'order' were more likely to support the death penalty and vote 'leave' than those who were 'pro-remain' and against the death penalty, which are stances considered to value 'openness' more.</span><sup class="reference" data-dcnode-id="6358" id="cite_ref-Burton_40-1"><a data-dcnode-id="6359" href="#cite_note-Burton-40"><span data-dcnode-id="6360" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6357" instrument_node="">
</span></p><span data-dcnode-id="6355" instrument_node="">
</span><h3 data-dcnode-id="6345"><span class="mw-headline" data-dcnode-id="6353" id="Left_behind"><span data-dcnode-id="6354" instrument_node="">Left behind</span></span><span class="mw-editsection" data-dcnode-id="6346"><span class="mw-editsection-bracket" data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">[</span></span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D8" title="Edit section: Left behind"><span data-dcnode-id="6350" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6344" instrument_node="">
</span><p data-dcnode-id="6318"><a data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Goodwin" title="Matthew Goodwin"><span data-dcnode-id="6343" instrument_node="">Matthew Goodwin</span></a><span data-dcnode-id="6341" instrument_node=""> and Rob Ford coined the term 'The Left Behind' to refer to 'older, white, socially conservative voters in more economically marginal neighbourhoods'.</span><sup class="reference" data-dcnode-id="6338" id="cite_ref-41"><a data-dcnode-id="6339" href="#cite_note-41"><span data-dcnode-id="6340" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6337" instrument_node=""> Analysing data the day after the Referendum, Ford concluded that 'Such voters had turned against a </span><a data-dcnode-id="6335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_class" title="Political class"><span data-dcnode-id="6336" instrument_node="">political class</span></a><span data-dcnode-id="6334" instrument_node=""> they saw as dominated by </span><a data-dcnode-id="6332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_liberalism" title="Cultural liberalism"><span data-dcnode-id="6333" instrument_node="">socially liberal</span></a><span data-dcnode-id="6331" instrument_node=""> university graduates with values fundamentally opposed to theirs, on identity, Europe – and particularly immigration.' This was described as "if you've got money, you vote in... if you haven't got money, you vote out".</span><sup class="reference" data-dcnode-id="6328" id="cite_ref-42"><a data-dcnode-id="6329" href="#cite_note-42"><span data-dcnode-id="6330" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6327" instrument_node=""> In looser terms, these groups' wider dissatisfaction with the major political parties also had a significant impact on the vote – with a particular focus placed on Labour's decline in support in the working class heartlands where it saw a significant number of votes lost to UKIP and the Conservatives in 2015.</span><sup class="reference" data-dcnode-id="6324" id="cite_ref-43"><a data-dcnode-id="6325" href="#cite_note-43"><span data-dcnode-id="6326" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6323" instrument_node=""> This was exemplified in 2019 when Labour lost several more seats to the Conservatives in their traditional heartlands, including seats such as Burnley who hadn't had a Tory MP for more than a decade.</span><sup class="reference" data-dcnode-id="6320" id="cite_ref-44"><a data-dcnode-id="6321" href="#cite_note-44"><span data-dcnode-id="6322" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6319" instrument_node="">
</span></p><p data-dcnode-id="6299"><span data-dcnode-id="6317" instrument_node="">Many other academics have also suggested the link between voting 'leave' and a rejection of </span><a data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="6316" instrument_node="">neoliberalism</span></a><span data-dcnode-id="6314" instrument_node=""> and </span><a data-dcnode-id="6312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="6313" instrument_node="">globalisation</span></a><span data-dcnode-id="6311" instrument_node=""> and the sense of economic insecurity that some members of society have felt as a result of these economic processes. Bateman suggests that today's globalised world has contributed to the feeling of fast-paced changes in society and the economy, leading to the sense of being 'left behind', which she argues motivated some voters to vote 'leave'.</span><sup class="reference" data-dcnode-id="6308" id="cite_ref-45"><a data-dcnode-id="6309" href="#cite_note-45"><span data-dcnode-id="6310" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6307" instrument_node=""> In a similar manner to the arguments of Goodwin, Ford and Bateman it has also been suggested that both economically and socially 'left behind' groups "are united by a general sense of insecurity, pessimism and marginalisation", increasingly feeling as though liberalised society as well as the British and European </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Establishment" title="The Establishment"><span data-dcnode-id="6306" instrument_node="">establishments</span></a><span data-dcnode-id="6304" instrument_node=""> do not represent their interests or share their concerns.</span><sup class="reference" data-dcnode-id="6301" id="cite_ref-auto1_46-0"><a data-dcnode-id="6302" href="#cite_note-auto1-46"><span data-dcnode-id="6303" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6300" instrument_node="">
</span></p><p data-dcnode-id="6290"><span data-dcnode-id="6298" instrument_node="">The left-behind hypothesis is furthered using data on the EU referendum result across electoral wards level as well as across local authorities, suggesting that especially areas with high degrees of social deprivation and low educational attainment strongly voted in favour of leaving the EU.</span><sup class="reference" data-dcnode-id="6295" id="cite_ref-47"><a data-dcnode-id="6296" href="#cite_note-47"><span data-dcnode-id="6297" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="6292" id="cite_ref-Tammes_17-1"><a data-dcnode-id="6293" href="#cite_note-Tammes-17"><span data-dcnode-id="6294" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6291" instrument_node="">
</span></p><p data-dcnode-id="6284"><span data-dcnode-id="6289" instrument_node="">Since the result of the 2016 referendum, it is argued that euroscepticism has only increased, treating the notion as a consequence of the 'left behind' as opposed to a cause.</span><sup class="reference" data-dcnode-id="6286" id="cite_ref-auto1_46-1"><a data-dcnode-id="6287" href="#cite_note-auto1-46"><span data-dcnode-id="6288" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6285" instrument_node="">
</span></p><p data-dcnode-id="6274"><span data-dcnode-id="6283" instrument_node="">Furthermore, the Brexit referendum is seen to have been a reaction against the austerity measures and the fact that people are living in poverty despite being in employment. More specifically, Brexit has also managed to further divide between those living in London and other cities that are in a strong economic position and those who live in small towns or the countryside where most votes to leave the EU were recorded.</span><sup class="reference" data-dcnode-id="6280" id="cite_ref-48"><a data-dcnode-id="6281" href="#cite_note-48"><span data-dcnode-id="6282" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6279" instrument_node=""> Similarly, support for UKIP was propped up because of austerity, and the EU referendum could have resulted in a remain victory if it wasn't for the austerity programme that was implemented. Calculations suggest leave support could well have been 6 percentage points lower. Consequently, the overall picture suggests that those affected by reforms in welfare, showed greater support for UKIP, and therefore voted Leave in 2016.</span><sup class="reference" data-dcnode-id="6276" id="cite_ref-49"><a data-dcnode-id="6277" href="#cite_note-49"><span data-dcnode-id="6278" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6275" instrument_node="">
</span></p><p data-dcnode-id="6268"><span data-dcnode-id="6273" instrument_node="">Many of the same areas that voted for Brexit would later go on to vote for the Conservative Party in the 2019 general election showing with most Conservative voters saying they chose that party due to their referendum position. This was particularly true in Labour to Conservative switchers in 2019.</span><sup class="reference" data-dcnode-id="6270" id="cite_ref-50"><a data-dcnode-id="6271" href="#cite_note-50"><span data-dcnode-id="6272" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6269" instrument_node="">
</span></p><p data-dcnode-id="6262"><span data-dcnode-id="6267" instrument_node="">Nevertheless, what is most striking economically, is that most people thought that Brexit would be bad for the economy and their own finances. However, they thought it would ensure lower immigration levels and the ability to claim back national sovereignty, even though most were not wary of the repercussions or did not think it would make any difference at all.</span><sup class="reference" data-dcnode-id="6264" id="cite_ref-51"><a data-dcnode-id="6265" href="#cite_note-51"><span data-dcnode-id="6266" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6263" instrument_node="">
</span></p><span data-dcnode-id="6261" instrument_node="">
</span><h3 data-dcnode-id="6251"><span class="mw-headline" data-dcnode-id="6259" id="Identity_and_change"><span data-dcnode-id="6260" instrument_node="">Identity and change</span></span><span class="mw-editsection" data-dcnode-id="6252"><span class="mw-editsection-bracket" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">[</span></span><a data-dcnode-id="6255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D9" title="Edit section: Identity and change"><span data-dcnode-id="6256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6250" instrument_node="">
</span><p data-dcnode-id="6227"><span data-dcnode-id="6249" instrument_node="">The widening of the </span><a data-dcnode-id="6247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North%25E2%2580%2593South_divide_in_England" title="North–South divide in England"><span data-dcnode-id="6248" instrument_node="">north–south divide</span></a><span data-dcnode-id="6246" instrument_node=""> and the increased concentration of wealth held by (usually London-based) financial and educated elites, is also thought to have played a role in the referendum outcome.</span><sup class="reference" data-dcnode-id="6243" id="cite_ref-UK_in_a_changing_Europe_52-0"><a data-dcnode-id="6244" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6245" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6242" instrument_node=""> De-industrialisation in </span><a data-dcnode-id="6240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_England" title="Northern England"><span data-dcnode-id="6241" instrument_node="">Northern England</span></a><span data-dcnode-id="6239" instrument_node=""> left many feeling economically left behind and forgotten about compared to the </span><a data-dcnode-id="6237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_East_England" title="South East England"><span data-dcnode-id="6238" instrument_node="">South East</span></a><span data-dcnode-id="6236" instrument_node=""> in particular, a feeling intensified by the globalisation associated with EU membership.</span><sup class="reference" data-dcnode-id="6233" id="cite_ref-UK_in_a_changing_Europe_52-1"><a data-dcnode-id="6234" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6235" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6232" instrument_node=""> It is believed that this  feeling of change happening elsewhere in the country whilst there was economic stagnation in the North was an incentive for many to vote 'leave' and indeed much of Northern England voted strongly in favour of Brexit.</span><sup class="reference" data-dcnode-id="6229" id="cite_ref-53"><a data-dcnode-id="6230" href="#cite_note-53"><span data-dcnode-id="6231" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6228" instrument_node=""> A more nuanced analysis shows that a north–south division is too simplistic, as many great northern cities (Liverpool, Manchester, Leeds, Newcastle, York) voted 'remain' whereas many small towns and rural areas in the South voted 'leave'.
</span></p><p data-dcnode-id="6217"><span data-dcnode-id="6226" instrument_node="">Feeling as though the UK has been rapidly changing and feeling negatively towards that change is considered to have been a reason that many voters backed 'leave'. Goodwin and Milazzo report that identity and preventing a loss of national identity as a result of national change, were highly important to many leave voters.</span><sup class="reference" data-dcnode-id="6223" id="cite_ref-GoodwinMilazzo_18-4"><a data-dcnode-id="6224" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6225" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6222" instrument_node=""> Furthermore, they found that among those who felt that during the preceding ten years Britain had gotten ‘a lot worse’ the average Leave vote was 73%, compared to 40% among those who felt the country had gotten ‘a lot better’.</span><sup class="reference" data-dcnode-id="6219" id="cite_ref-GoodwinMilazzo_18-5"><a data-dcnode-id="6220" href="#cite_note-GoodwinMilazzo-18"><span data-dcnode-id="6221" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6218" instrument_node="">
</span></p><p data-dcnode-id="6207"><span data-dcnode-id="6216" instrument_node="">Additionally, it is thought that the rise in liberal social movements and an increase in social change played a role in leading some voters to vote 'leave' as a rejection of such change.</span><sup class="reference" data-dcnode-id="6213" id="cite_ref-UK_in_a_changing_Europe_52-2"><a data-dcnode-id="6214" href="#cite_note-UK_in_a_changing_Europe-52"><span data-dcnode-id="6215" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6212" instrument_node=""> Polls conducted by Lord Ashcroft showed that "of those who think that feminism, the internet and the Green Movement are bad for us were, respectively, 22%, 6% and 26% of those polled, and of those groups, 74%, 71% and 78% respectively were Leave voters".</span><sup class="reference" data-dcnode-id="6209" id="cite_ref-54"><a data-dcnode-id="6210" href="#cite_note-54"><span data-dcnode-id="6211" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6208" instrument_node="">
</span></p><p data-dcnode-id="6201"><span data-dcnode-id="6206" instrument_node="">Ward-level polling data revealed that significant pockets of Asian British voted Leave.  This was seen in Luton (56.5% Leave), Hillingdon (56.4% Leave), Slough (54.3% Leave) and Bradford (54.2% Leave) (these jurisdictions had South Asian populations of 25% or greater), and boroughs in London with stronger South Asian concentrations voted Leave in greater numbers than in predominantly whiter neighbouring boroughs.  It was suggested that many British South Asian voters did not feel European, were attracted to the pro-Commonwealth messaging of the Leave campaign, and considered that ending the "Freedom of Movement" provisions provided by Brexit was one way to level out the perceived unfairness that denied South Asians the same entry and work rights as Europeans.</span><sup class="reference" data-dcnode-id="6203" id="cite_ref-55"><a data-dcnode-id="6204" href="#cite_note-55"><span data-dcnode-id="6205" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6202" instrument_node="">
</span></p><span data-dcnode-id="6200" instrument_node="">
</span><h4 data-dcnode-id="6190"><span class="mw-headline" data-dcnode-id="6198" id="English_national_identity"><span data-dcnode-id="6199" instrument_node="">English national identity</span></span><span class="mw-editsection" data-dcnode-id="6191"><span class="mw-editsection-bracket" data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">[</span></span><a data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCauses_of_the_vote_in_favour_of_Brexit%26action%3Dedit%26section%3D10" title="Edit section: English national identity"><span data-dcnode-id="6195" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6192"><span data-dcnode-id="6193" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6189" instrument_node="">
</span><p data-dcnode-id="6176"><span data-dcnode-id="6188" instrument_node="">The </span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Economic_Forum" title="World Economic Forum"><span data-dcnode-id="6187" instrument_node="">World Economic Forum</span></a><span data-dcnode-id="6185" instrument_node=""> 2016 acknowledged in its </span><i data-dcnode-id="6182"><a data-dcnode-id="6183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Risks_Report" title="Global Risks Report"><span data-dcnode-id="6184" instrument_node="">Global Risks Report</span></a></i><span data-dcnode-id="6181" instrument_node=""> that "the Brexit and President-elect Trump victories featured (...) appeals to sovereignty rooted in national identity and pride" and that it would "be challenging to find political narratives and policies that can repair decades-long cultural fault-lines".</span><sup class="reference" data-dcnode-id="6178" id="cite_ref-56"><a data-dcnode-id="6179" href="#cite_note-56"><span data-dcnode-id="6180" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6177" instrument_node="">
</span></p><p data-dcnode-id="6159"><span data-dcnode-id="6175" instrument_node="">It has been argued that </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_nationalism" title="English nationalism"><span data-dcnode-id="6174" instrument_node="">English nationalism</span></a><span data-dcnode-id="6172" instrument_node=""> played a key role in shaping the result of the referendum. As the largest constituent country within the United Kingdom, England provided the largest share of 'Leave' voters, 15,188,406 to 'Remain's' 13,266,996, and saw the largest margin of victory for 'Leave' at 53.4% to 46.6% slightly larger than the 52.5% to 47.5% leave result produced by Wales. In Scotland and Northern Ireland, on the other hand, a majority of voters supported 'Remain' by 62.0% to 38.0% and 55.8% to 44.2% respectively.</span><sup class="reference" data-dcnode-id="6169" id="cite_ref-57"><a data-dcnode-id="6170" href="#cite_note-57"><span data-dcnode-id="6171" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6168" instrument_node=""> Some academics have argued that "England's choice for Brexit was driven disproportionately by those prioritising the English national identity", and that English nationalism is a "cluster point" for other attitudes and concerns, such as "hostility to European integration, the sense of absence of political voice, concern about immigration, and support for parties of the right".</span><sup class="reference" data-dcnode-id="6165" id="cite_ref-58"><a data-dcnode-id="6166" href="#cite_note-58"><span data-dcnode-id="6167" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6164" instrument_node=""> Polling conducted in the immediate aftermath of the referendum suggested that people in England who put more emphasis on the idea of being English as opposed to the idea of being British as a part of their identity were more likely to vote leave.</span><sup class="reference" data-dcnode-id="6161" id="cite_ref-59"><a data-dcnode-id="6162" href="#cite_note-59"><span data-dcnode-id="6163" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6160" instrument_node="">
</span></p><p data-dcnode-id="6153"><span data-dcnode-id="6158" instrument_node="">However, a Binomial logit analysis was conducted to determine the factors of voting to leave the EU and it was determined that national identity was not directly involved with the decision to vote for leave or remain.</span><sup class="reference" data-dcnode-id="6155" id="cite_ref-60"><a data-dcnode-id="6156" href="#cite_note-60"><span data-dcnode-id="6157" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6154" instrument_node=""> Although, people who identified as Scottish were less likely to vote leave than people who identified as British.
</span></p><span data-dcnode-id="6152" instrument_node="">
