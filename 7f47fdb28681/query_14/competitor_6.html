e-id="5339" instrument_node="">, have been Eurosceptic for many years.</span><sup class="reference" data-dcnode-id="5336" id="cite_ref-104"><a data-dcnode-id="5337" href="#cite_note-104"><span data-dcnode-id="5338" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5335" instrument_node=""> The implication of this as supported by academic author of 'Media definitely </span><i data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">do</span></i><span data-dcnode-id="5332" instrument_node=""> matter: Brexit, immigration, climate change and beyond', 'Neil T. Gavin', is that the political stance of the print media could have shaped the public's opinion before the referendum.</span><sup class="reference" data-dcnode-id="5329" id="cite_ref-105"><a data-dcnode-id="5330" href="#cite_note-105"><span data-dcnode-id="5331" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5328" instrument_node="">
</span></p><p data-dcnode-id="5293"><span data-dcnode-id="5326" instrument_node="">The Guardian accused the </span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC" title="BBC"><span data-dcnode-id="5325" instrument_node="">BBC</span></a><span data-dcnode-id="5323" instrument_node=""> of not supporting remain strongly enough, purporting so-called </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/False_balance" title="False balance"><span data-dcnode-id="5322" instrument_node="">false balance</span></a><span data-dcnode-id="5320" instrument_node=""> which helped provide visibility to the leave campaign.</span><sup class="reference" data-dcnode-id="5317" id="cite_ref-106"><a data-dcnode-id="5318" href="#cite_note-106"><span data-dcnode-id="5319" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5316" instrument_node=""> This was despite the BBC being strongly criticized by leave voters for its perceived remain bias.</span><sup class="reference" data-dcnode-id="5313" id="cite_ref-107"><a data-dcnode-id="5314" href="#cite_note-107"><span data-dcnode-id="5315" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5312" instrument_node="">  Leading up to and during the EU referendum campaign, </span><i data-dcnode-id="5303"><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Mail" title="Daily Mail"><span data-dcnode-id="5311" instrument_node="">Daily Mail</span></a><span data-dcnode-id="5309" instrument_node="">, </span><a data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Daily_Telegraph" title="The Daily Telegraph"><span data-dcnode-id="5308" instrument_node="">the Daily Telegraph</span></a><span data-dcnode-id="5306" instrument_node="">, </span><a data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Express" title="Daily Express"><span data-dcnode-id="5305" instrument_node="">Daily Express</span></a></i><span data-dcnode-id="5302" instrument_node=""> and </span><i data-dcnode-id="5299"><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sun_%28United_Kingdom%29" title="The Sun (United Kingdom)"><span data-dcnode-id="5301" instrument_node="">The Sun</span></a></i><span data-dcnode-id="5298" instrument_node=""> were all pro-Leave. Curtice argues that as these were "more popular" newspapers, their support not only provided credibility to the Leave campaign but also meant that there would be "sympathetic coverage" for its pro-Brexit arguments.</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-Curtice_19–37_23-15"><a data-dcnode-id="5296" href="#cite_note-Curtice_19%E2%80%9337-23"><span data-dcnode-id="5297" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5294" instrument_node="">
</span></p><p data-dcnode-id="5265"><span data-dcnode-id="5292" instrument_node="">Research carried out by </span><a data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loughborough_University" title="Loughborough University"><span data-dcnode-id="5291" instrument_node="">Loughborough University</span></a><sup class="reference" data-dcnode-id="5287" id="cite_ref-blog.lboro.ac.uk_108-0"><a data-dcnode-id="5288" href="#cite_note-blog.lboro.ac.uk-108"><span data-dcnode-id="5289" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5286" instrument_node=""> found that the </span><a data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Express" title="Daily Express"><span data-dcnode-id="5285" instrument_node="">Daily Express</span></a><span data-dcnode-id="5283" instrument_node=""> was the most in favour of leave while the </span><a data-dcnode-id="5281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Times" title="Financial Times"><span data-dcnode-id="5282" instrument_node="">Financial Times</span></a><span data-dcnode-id="5280" instrument_node=""> was most pro-remain. Moreover, it was discovered that the </span><a data-dcnode-id="5278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Guardian" title="The Guardian"><span data-dcnode-id="5279" instrument_node="">Guardian</span></a><span data-dcnode-id="5277" instrument_node=""> provided the most balanced coverage of the referendum while the </span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Express" title="Daily Express"><span data-dcnode-id="5276" instrument_node="">Daily Express</span></a><span data-dcnode-id="5274" instrument_node=""> was the least neutral. However, while there was an even split of support for leave and remain in the newspapers analysed when circulation numbers and the strength of their endorsements were factored in, leave had an 82% advantage to remains 18%.</span><sup class="reference" data-dcnode-id="5271" id="cite_ref-blog.lboro.ac.uk_108-1"><a data-dcnode-id="5272" href="#cite_note-blog.lboro.ac.uk-108"><span data-dcnode-id="5273" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5270" instrument_node=""> The newspaper bias towards pro-Brexit reporting is further evidenced by Levy, Aslan and Bironzo </span><sup class="reference" data-dcnode-id="5267" id="cite_ref-109"><a data-dcnode-id="5268" href="#cite_note-109"><span data-dcnode-id="5269" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5266" instrument_node=""> whereby a sample of 1558 articles, from nine national newspapers, found that 41% were in favour of leaving and only 27% in favour of remaining.
</span></p><p data-dcnode-id="5255"><span data-dcnode-id="5264" instrument_node="">Seaton explains that long-term anti-EU reporting, demonisation of foreign nationals and the working class in mainstream media could have made the public more susceptible to pro-Brexit arguments, as well as having "shaped the debate".</span><sup class="reference" data-dcnode-id="5261" id="cite_ref-Seaton_333–337_110-0"><a data-dcnode-id="5262" href="#cite_note-Seaton_333%E2%80%93337-110"><span data-dcnode-id="5263" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5260" instrument_node=""> Seaton also comments on the effect of social media on the referendum, which played a much more prominent role in the campaign and the vote than in previous votes in the UK. Seaton argues that social media was highly influential in shaping voters' opinions as social media enables users to "get more of what you like" whilst being able to "avoid exposure to what you disagree with" on a platform that is "driven by popularity".</span><sup class="reference" data-dcnode-id="5257" id="cite_ref-Seaton_333–337_110-1"><a data-dcnode-id="5258" href="#cite_note-Seaton_333%E2%80%93337-110"><span data-dcnode-id="5259" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5256" instrument_node="">
</span></p><p data-dcnode-id="5249"><span data-dcnode-id="5254" instrument_node="">Another element of media which has yet to be mentioned is the role of social media which arguably was the most effective platform. Media democracy is the way journalists were more concerned by the entertainment factor of news content, rather than being informative. Some accused printed media of being too "politically correct", whereas the same limitations were not shared by social media.</span><sup class="reference" data-dcnode-id="5251" id="cite_ref-111"><a data-dcnode-id="5252" href="#cite_note-111"><span data-dcnode-id="5253" instrument_node="">[111]</span></a></sup><span data-dcnode-id="5250" instrument_node="">
</span></p><p data-dcnode-id="5243"><span data-dcnode-id="5248" instrument_node="">There have been concerns about opinions manipulation by the spread of political misinformation through social media. The degree of message influence is highly dependent on how much the content of the message is consistent with the human priory. M. Ahmadi devised series of metrics on quantitatively evaluating the effectiveness of generated messages by robots. Factors like message polarity, threats to the core values, and causal arguments constitute the main metrics incorporates with the potential of message in changing one's beliefs.</span><sup class="reference" data-dcnode-id="5245" id="cite_ref-112"><a data-dcnode-id="5246" href="#cite_note-112"><span data-dcnode-id="5247" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5244" instrument_node="">
</span></p><p data-dcnode-id="5229"><span data-dcnode-id="5242" instrument_node="">Twitter was the most utilised social media platform and the campaigns were led through the use of 'hashtags'. Llewellyn and Cram conducted a study that involved tallying how often certain 'hashtags' were used and concluded by noting that overall there were more ‘leave’ hashtags than ‘stay’ even though ‘stay’ equated to the largest percentage.</span><sup class="reference" data-dcnode-id="5239" id="cite_ref-113"><a data-dcnode-id="5240" href="#cite_note-113"><span data-dcnode-id="5241" instrument_node="">[113]</span></a></sup><span data-dcnode-id="5238" instrument_node=""> This referendum also saw the intense use of 'twitter bots'. Gorodnichenko et al. analysed two types of social media agents – real (human users and bots) and social bots (composed of algorithm). Social media platforms such as Twitter supported ideas such as ‘echo chambers’ and therefore enhanced ideological segmentation and made information more fragmented to separate rather than unite people.  In turn Twitter became known as the best platform for spreading 'fake news'.</span><sup class="reference" data-dcnode-id="5235" id="cite_ref-114"><a data-dcnode-id="5236" href="#cite_note-114"><span data-dcnode-id="5237" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5234" instrument_node=""> On the other hand, others claim that the sentiment results always indicated a likely 'Leave' result but it is not pinned down to bots or any dark loitering propaganda systems, instead it was lack of ‘remainers online mobility’ that caused the outcome. On the day of the referendum, ‘remain’ activity reached an all-time high of 38.5% on Twitter, but also Instagram came into play almost as much as Twitter did but due to it being a less direct platform, was not as noticed.</span><sup class="reference" data-dcnode-id="5231" id="cite_ref-115"><a data-dcnode-id="5232" href="#cite_note-115"><span data-dcnode-id="5233" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5230" instrument_node="">
</span></p><span data-dcnode-id="5228" instrument_node="">

</span><li data-dcnode-id="5146" id="cite_note-1"><span class="mw-cite-backlink" data-dcnode-id="5171"><b data-dcnode-id="5172"><a aria-label="Jump up" data-dcnode-id="5173" href="#cite_ref-1" title="Jump up"><span data-dcnode-id="5174" instrument_node="">^</span></a></b></span><span data-dcnode-id="5170" instrument_node=""> </span><span class="reference-text" data-dcnode-id="5148"><cite class="citation news cs1" data-dcnode-id="5150"><a class="external text" data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/news/britain/21702228-areas-lots-migrants-voted-mainly-remain-or-did-they-explaining-brexit-vote" rel="nofollow"><span data-dcnode-id="5167" instrument_node="">"Explaining the Brexit vote"</span></a><span data-dcnode-id="5165" instrument_node="">. </span><i data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">The Economist</span></i><span data-dcnode-id="5162" instrument_node="">. 16 July 2016. </span><a class="mw-redirect" data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISSN_%28identifier%29" title="ISSN (identifier)"><span data-dcnode-id="5161" instrument_node="">ISSN</span></a><span data-dcnode-id="5159" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldcat.org/issn/0013-0613" rel="nofollow"><span data-dcnode-id="5158" instrument_node="">0013-0613</span></a><span class="reference-accessdate" data-dcnode-id="5152"><span data-dcnode-id="5156" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">15 July</span></span><span data-dcnode-id="5153" instrument_node=""> 2016</span></span><span data-dcnode-id="5151" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="5149" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=
