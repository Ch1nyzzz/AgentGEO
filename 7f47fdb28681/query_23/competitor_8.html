"">Our maps are primarily designed to help young people find vocational education and training near them; making way for careers in areas that require workers with their specific skills and boosting the UK economy. This will have a direct, positive impact on both the expected post-COVID downturn and the uncertainty surrounding Brexit.</span></h2><span data-dcnode-id="435" instrument_node=""> </span><div class="nicdark_section" data-dcnode-id="434" style="background-color:; height: 25px;"></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="399"><div class="wpb_column vc_column_container vc_col-sm-4" data-dcnode-id="420"><div class="vc_column-inner" data-dcnode-id="421"><div class="wpb_wrapper" data-dcnode-id="422"><span data-dcnode-id="429" instrument_node="">

ign:center; font-size:15px; line-height:30px; letter-spacing: 2px; font-weight:lighter;"><span data-dcnode-id="366" instrument_node="">UK YOUTH UNEMPLOYMENT</span></p><span data-dcnode-id="364" instrument_node=""> </span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-3" data-dcnode-id="349"><div class="vc_column-inner vc_custom_1469630283566" data-dcnode-id="350"><div class="wpb_wrapper" data-dcnode-id="351"><span data-dcnode-id="360" instrument_node=""> </span><p class="nd_options_first_font" data-dcnode-id="358" style="color:#ffffff; padding:px; text-align:center; font-size:45px; line-height:30px; letter-spacing: 2px; font-weight:bold;"><span data-dcnode-id="359" instrument_node="">1/3</span></p><span data-dcnode-id="357" instrument_node=""> </span><div class="nicdark_section" data-dcnode-id="356" style="background-color:; height: 20px;"></div><span data-dcnode-id="355" instrument_node=""> </span><p class="nd_options_second_font" data-dcnode-id="353" style="color:#ffffff; padding:px; text-align:center; font-size:15px; line-height:30px; letter-spacing: 2px; font-weight:lighter;"><span data-dcnode-id="354" instrument_node="">UK 18-24 YR OLD LOST JOBS</span></p><span data-dcnode-id="352" instrument_node=""> </span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-3" data-dcnode-id="337"><div class="vc_column-inner vc_custom_1469630289168" data-dcnode-id="338"><div class="wpb_wrapper" data-dcnode-id="339"><span data-dcnode-id="348" instrument_node=""> </span><p class="nd_options_first_font" data-dcnode-id="346" style="color:#ffffff; padding:px; text-align:center; font-size:45px; line-height:30px; letter-spacing: 2px; font-weight:bold;"><span data-dcnode-id="347" instrument_node="">1.37M</span></p><span data-dcnode-id="345" instrument_node=""> </span><div class="nicdark_section" data-dcnode-id="344" style="background-color:; height: 20px;"></div><span data-dcnode-id="343" instrument_node=""> </span><p class="nd_options_second_font" data-dcnode-id="341" style="color:#ffffff; padding:px; text-align:center; font-size:15px; line-height:30px; letter-spacing: 2px; font-weight:lighter;"><span data-dcnode-id="342" instrument_node="">UK COVID-19 CASES</span></p><span data-dcnode-id="340" instrument_node=""> </span></div></div></div></div></div></div></div><div class="vc_parallax-inner skrollable skrollable-between" data-bottom-top="top: -50%;" data-dcnode-id="332" data-top-bottom="top: 0%;" style="height: 150%; background-image: url(&quot;https://www.globalmapaid.org/wp-content/uploads/2017/04/parallax-8-1.jpg&quot;); top: -20.5133%;"></div></div><div class="vc_row-full-width vc_clearfix" data-dcnode-id="330"></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="188"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="189"><div class="vc_column-inner" data-dcnode-id="190"><div class="wpb_wrapper" data-dcnode-id="191"><div class="nicdark_section" data-dcnode-id="329" style="background-color:; height: 30px;"></div><span data-dcnode-id="328" instrument_node=""> </span><h2 class="" data-dcnode-id="326" style="color:#727475; padding:px; text-align:center; font-size:30px; line-height:30px; letter-spacing: 2px; font-weight:normal;"><span data-dcnode-id="327" instrument_node="">MapAid considers Youth Employment</span></h2><span data-dcnode-id="325" instrument_node=""> </span><div class="nicdark_section" data-dcnode-id="324" style="background-color:; height: 30px;"></div><span data-dcnode-id="323" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="262"><span data-dcnode-id="322" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="264"><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="316"><strong data-dcnode-id="317"><span data-dcnode-id="320" instrument_node="">MapAid is mapping youth unemployment and vocational education and apprenticeships or “easy access education,” on the basis that </span><i data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">what you can see and measure, is what you can do something about.</span></i></strong></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">&nbsp;</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Put another way, if youth unemployment problems are out of sight, then stakeholders such as you, policymakers, and unemployed people, are unable to focus their common efforts. Taxpayers resources and time are therefore collectively misspent.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">&nbsp;</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="305" instrument_node="">The overall rate of unemployment in the UK today is 3.9% </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/employmentandlabourmarket/peoplenotinwork/unemployment"><span data-dcnode-id="304" instrument_node="">(a)</span></a><span data-dcnode-id="302" instrument_node=""> however youth unemployment is 11.5% </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/employmentandlabourmarket/peoplenotinwork/unemployment/bulletins/youngpeoplenotineducationemploymentortrainingneet/february2020"><span data-dcnode-id="301" instrument_node="">(b)</span></a><span data-dcnode-id="299" instrument_node=""> or 2.9 times higher. However, the UK government </span><i data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">only reports</span></i><span data-dcnode-id="296" instrument_node=""> those people who are unemployed, </span><i data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">as those&nbsp;who actually sign up</span></i><span data-dcnode-id="293" instrument_node="">, or </span><i data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">get registered,</span></i><span data-dcnode-id="290" instrument_node=""> at their Job Centre, and they also count anyone on a zero-hours contract as “employed” even if the work is very thin on the ground, and they are seriously </span><i data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">under-employed.&nbsp;</span></i></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">&nbsp;</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="282" instrument_node="">Unfortunately, there is also a “hidden unemployed youth” cohort in addition to the registered cohort, that may have constituted as much as 60% of the unemployed youth, </span><i data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">before </span></i><span data-dcnode-id="279" instrument_node="">the Covid-19 outbreak </span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/uk/politics/young-people-uk-unemployment-poverty-life-state-support-benefits-cuts-a8347401.html"><span data-dcnode-id="278" instrument_node="">(c)</span></a><span data-dcnode-id="276" instrument_node=""> and will possibly account for a higher percentage today.</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">&nbsp;</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="270" instrument_node="">These hidden unemployed youth, who are often qualified, may not be&nbsp;signing up due to a sense of pride. Computing the absolute numbers of unemployed youth (signed up and hidden) is tricky, but according to the government there were an estimated 763,000 young people (aged 16 to 24 years) in the UK who were not in education, employment or training (NEET) in October to December 2019 </span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/employmentandlabourmarket/peoplenotinwork/unemployment/bulletins/youngpeoplenotineducationemploymentortrainingneet/february2020"><span data-dcnode-id="269" instrument_node="">(d)</span></a><span data-dcnode-id="267" instrument_node="">. On this basis, it is likely that over 1.1 million youth are now unemployed, without accounting for recent Covid-19 job losses.</span></p><span data-dcnode-id="265" instrument_node="">
</span></div><span data-dcnode-id="263" instrument_node="">
</span></div><span data-dcnode-id="261" instrument_node="">
</span><div class="nicdark_section" data-dcnode-id="260" style="background-color:; height: 10px;"></div><span data-dcnode-id="259" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_left" data-dcnode-id="249"><span data-dcnode-id="258" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="251"><span data-dcnode-id="257" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="253"><img alt="" class="vc_single_image-img attachment-full lazyloaded" data-dcnode-id="256" data-sizes="(max-width: 985px) 100vw, 985px" data-src="https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png" data-srcset="https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png 985w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-300x227.png 300w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-768x582.png 768w" height="746" sizes="(max-width: 985px) 100vw, 985px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png&amp;raw" srcset="https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png 985w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-300x227.png 300w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-768x582.png 768w" width="985"><noscript data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">&lt;img width="985" height="746" src="https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png" class="vc_single_image-img attachment-full" alt="" srcset="https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666.png 985w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-300x227.png 300w, https://www.globalmapaid.org/wp-content/uploads/2020/05/Employment_graph-e1590927997666-768x582.png 768w" sizes="(max-width: 985px) 100vw, 985px" /&gt;</span></noscript></div><span data-dcnode-id="252" instrument_node="">
</span></figure><span data-dcnode-id="250" instrument_node="">
</span></div><span data-dcnode-id="248" instrument_node="">
</span><div class="nicdark_section" data-dcnode-id="247" style="background-color:; height: 40px;"></div><div class="vc_empty_space" data-dcnode-id="245" style="height: 32px"><span class="vc_empty_space_inner" data-dcnode-id="246"></span></div><span data-dcnode-id="244" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="220"><span data-dcnode-id="243" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="222"><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="236"><strong data-dcnode-id="237"><span data-dcnode-id="241" instrument_node="">The Mental Health Foundation has reported that 14.7% of people in stable jobs experience mental health problems from time to time </span><a data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealth.org.uk/statistics/mental-health-statistics-mental-health-work"><span data-dcnode-id="240" instrument_node="">(e)</span></a><span data-dcnode-id="238" instrument_node="">.</span></strong></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">&nbsp;</span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="231" instrument_node="">However, a BBC report on a survey of the economic activity and health of 25 year-olds found that a person was x 2.36 more likely to experience mental health problems when unemployed, even when all background factors – including gender, ethnicity, social class, and prior mental health had been accounted for </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/bbcthree/article/05fa5b92-5281-4fa2-a817-ecd7b31f4e84"><span data-dcnode-id="230" instrument_node="">(f)</span></a><span data-dcnode-id="228" instrument_node="">. This would represent a rate of 34.7% mental health problems among unemployed youth, with potentially devastating long terms effects on long term employability. Further, those participants on zero-hours contracts are reported as 50% more likely to experience poor mental health and 41% less likely to report good general health </span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/bbcthree/article/05fa5b92-5281-4fa2-a817-ecd7b31f4e84"><span data-dcnode-id="227" instrument_node="">(f)</span></a><span data-dcnode-id="225" instrument_node="">.</span></p><span data-dcnode-id="223" instrument_node="">
</span></div><span data-dcnode-id="221" instrument_node="">
</span></div><span data-dcnode-id="219" instrument_node="">
</span><div class="vc_empty_space" data-dcnode-id="217" style="height: 24px"><span class="vc_empty_space_inner" data-dcnode-id="218"></span></div><span data-dcnode-id="216" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="205"><span data-dcnode-id="215" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="207"><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">As a result of Covid-19, according to a May 2020 Resolution Foundation survey, younger and older workers have experienced the brunt of the hit to jobs and pay, with the very youngest in the most challenging position. One-third of 18 to 24-year-old employees (excluding students) have lost jobs or been furloughed, compared to one-in-six prime-age adults, with these experiences also more common among employees in atypical jobs </span><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.resolutionfoundation.org/publications/young-workers-in-the-coronavirus-crisis/"><span data-dcnode-id="212" instrument_node="">(g)</span></a><span data-dcnode-id="210" instrument_node="">.</span></p><span data-dcnode-id="208" instrument_node="">
</span></div><span data-dcnode-id="206" instrument_node="">
</span></div><span data-dcnode-id="204" instrument_node="">
</span><div class="vc_empty_space" data-dcnode-id="202" style="height: 24px"><span class="vc_empty_space_inner" data-dcnode-id="203"></span></div><span data-dcnode-id="201" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="193"><span data-dcnode-id="200" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="195"><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">One great example is making maps that show where gainful employment can be encouraged, so that local people are enabled to sustain their families. So we could map UK poverty hotspots and unemployment, as well as vital livelihood capabilities including access to easy join-education and apprenticeship.</span></p><span data-dcnode-id="196" instrument_node="">
