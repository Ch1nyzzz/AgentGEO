ass="responsiveSection padding-all-50 padding-all-s-0 overflow-hidden" data-dcnode-id="294"><div class="responsiveSection__grid" data-dcnode-id="295"><div class="contentGrid" data-dcnode-id="296"><section aria-labelledby="topicTitle" class="mainContent" data-dcnode-id="736"><div class="headerPosition" data-dcnode-id="1015"><div aria-label="breadcrumbs" class="margin-top-0" data-dcnode-id="1094" id="topic-breadcrumb" role="navigation"><ul class="breadcrumbs" data-dcnode-id="1095"><li data-dcnode-id="1100"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/markets/2535/economy-politics/"><span data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Economy &amp; Politics</span></span></a><span aria-hidden="true" class="divider" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">›</span></span></li><li data-dcnode-id="1096"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/markets/2535/topic/966/politics-government/"><span data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Politics &amp; Government</span></span></a></li></ul></div><div data-dcnode-id="1016" data-observe="" id="topicHeader__wrapper"><div class="margin-bottom-20" data-dcnode-id="1017" id="topic-header"><h1 class="h2 margin-bottom-15 margin-bottom-s-20" data-dcnode-id="1092" id="topicTitle"><span data-dcnode-id="1093" instrument_node="">Brexit in Scotland - Statistics &amp; Facts</span></h1><div class="topicQuickNav showMobile" data-dcnode-id="1084" data-sticky-nav="" data-sticky-onscroll=""><ul class="topicQuickNav__list" data-dcnode-id="1085" data-observe-navigation=""><li class="topicQuickNav__item" data-dcnode-id="1089"><a class="topicQuickNav__link" data-dcnode-id="1090" data-gtm="stickyNav__1" data-nav-id="topicHeader__wrapper" data-scroll-offset="80" data-smoothscroll="" data-status="active" href="#topicHeader__wrapper"><span data-dcnode-id="1091" instrument_node="">Overview</span></a></li><li class="topicQuickNav__item" data-dcnode-id="1086"><a class="topicQuickNav__link" data-dcnode-id="1087" data-gtm="stickyNav__2" data-nav-id="dossierKeyfigures" data-scroll-offset="80" data-smoothscroll="" href="#dossierKeyfigures"><span data-dcnode-id="1088" instrument_node="">Key figures</span></a></li></ul></div><div class="content__author" data-dcnode-id="1076"><span class="content__author--name" data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">
                        Published by
                </span><a class="text-underline" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/aboutus/our-research-commitment"><span data-dcnode-id="1082" instrument_node="">D. Clark</span></a><span data-dcnode-id="1080" instrument_node="">,
                    </span></span><span class="content__author--date" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">
                Sep 10, 2021</span></span></div><article class="article readingAid__text responsiveText responsiveText--underlinedLinks margin-right-20 margin-right-s-0" data-dcnode-id="1018"><span data-dcnode-id="1075" instrument_node="">
        The </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/570118/eu-referendum-results/"><span data-dcnode-id="1074" instrument_node="">result of the UK referendum on European Union membership</span></a><span data-dcnode-id="1072" instrument_node=""> meant that as of June 23rd 2016 the United Kingdom would take steps to ensure a political and bureaucratic departure from EU membership. Yet, pro-EU electors in </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/569384/regional-amount-of-eu-referendum-votes/"><span data-dcnode-id="1071" instrument_node="">Scotland</span></a><span data-dcnode-id="1069" instrument_node=""> outnumbered the pro-Brexit population by over 640 thousands votes. A majority of Scottish balloters wanted to remain, despite the collective result throughout the UK in favor of leaving.

                    </span><br data-dcnode-id="1068"><div class="hide padding-top-0 margin-top-0" data-dcnode-id="1022" id="additionalText"><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node=""> 
Prompted by the result, Scotland’s First Minister </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/631221/public-approval-rating-of-nicola-sturgeon-in-the-uk/"><span data-dcnode-id="1065" instrument_node="">Nicola Sturgeon</span></a><span data-dcnode-id="1063" instrument_node="">, announced that she intended to find a way for Scotland to remain an EU member. As a result, this brought in to question the prospect of a </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/569181/britain-second-eu-referendum-if-scotland-left-uk/"><span data-dcnode-id="1062" instrument_node=""> second referendum on Scottish independence, </span></a><span data-dcnode-id="1060" instrument_node=""> which in the </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/575519/public-opinion-of-a-second-scottish-referendum-uk-by-age/"><span data-dcnode-id="1059" instrument_node="">days following the referendum</span></a><span data-dcnode-id="1057" instrument_node=""> showed promise.
</span><br data-dcnode-id="1056"><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">
The first polls published after the referendum showed that a significant majority of eurosceptics would still </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/634763/pro-brexit-attitudes-on-scotland-leaving-the-uk-post-brexit-2016-by-region/"><span data-dcnode-id="1053" instrument_node=""> support a “Brexit” even if UK exiting the EU meant Scotland leaving the United Kingdom</span></a><span data-dcnode-id="1051" instrument_node="">. Such results showed a significant polarization in the public attitudes between Scotland and the rest of the UK.
</span><br data-dcnode-id="1050"><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node=""> 
Indeed, across the whole country a similar opinion took prominence, as many pro-Brexit supporters throughout the nation also backed </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/634763/pro-brexit-attitudes-on-scotland-leaving-the-uk-post-brexit-2016-by-region/"><span data-dcnode-id="1047" instrument_node=""> Scotland leaving the UK</span></a><span data-dcnode-id="1045" instrument_node="">. By this time there was a growing amount of citizens that perceived an increasing likelihood that Britain is leaving the European Union (EU), as 43 percent of British respondents stated that </span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/640620/public-opinion-in-great-britain-on-possible-scottish-independence-post-brexit/"><span data-dcnode-id="1044" instrument_node=""> Scotland will leave the United Kingdom</span></a><span data-dcnode-id="1042" instrument_node="">.
</span><br data-dcnode-id="1041"><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">
Despite being a “remain” stronghold throughout the lead-up to the referendum, and all 32 Scottish local authorities voted with a majority to remain, as of November 2016 a poll regarding </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/310030/scottish-support-rates-in-for-a-second-referendum-2016/"><span data-dcnode-id="1038" instrument_node=""> Scottish support for a second EU referendum</span></a><span data-dcnode-id="1036" instrument_node=""> had shown that levels of remain support in Scotland has been dwindling, as a greater number of Scots would oppose having a second referendum on EU membership.
This came at a time whereby there was a growing consensus across the UK to hasten the process of a "Brexit" rather than hinder, impede and complicate it further.
</span><br data-dcnode-id="1035"><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">
Currently the EU has a strong hold over Scotland's policy and legislation in areas such as the environment, in agricultural and fishing industry sectors. Scotland’s departure from the EU would have an uncertain effect on the economy and environment of Scotland and for the UK as a whole. Contrarily, in the event that Scotland left the UK this would pose immense problems concerning the location of tactical nuclear deterrents. The expenses of identifying suitable alternative locations would be substantial. Problems concerning North Sea oil would also undoubtedly arise.</span><br data-dcnode-id="1032"><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
While many people did indeed think it would be more likely that </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/640620/public-opinion-in-great-britain-on-possible-scottish-independence-post-brexit/"><span data-dcnode-id="1029" instrument_node="">Scotland leaves the UK </span></a><span data-dcnode-id="1027" instrument_node="">given the already gargantuan task of Brexit negotiations and the process of withdrawal, it seems that UK without Scotland wouldn't assist the process.

                </span><br data-dcnode-id="1026"><br data-dcnode-id="1025"><span class="byline italic" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">
                    This text provides general information. Statista assumes no
                    liability for the information given being complete or correct.
