</span><h1 class="entry-title" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The potential impact of Brexit on the third sector</span></h1><span data-dcnode-id="879" instrument_node="">
</span><p class="p-meta" data-dcnode-id="870"><span data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">In </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/category/charity-and-third-sector/" title="View all posts in: “Charity and Third Sector”"><span data-dcnode-id="877" instrument_node=""> Charity and Third Sector</span></a><span data-dcnode-id="875" instrument_node=""> by Jen Steadman</span></span><span data-dcnode-id="871"><time class="entry-date" data-dcnode-id="872" datetime="2018-11-28T11:33:55+00:00"><span data-dcnode-id="873" instrument_node="">28th November 2018</span></time></span></p></header><span data-dcnode-id="868" instrument_node="">
</span><div class="entry-content content" data-dcnode-id="610"><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">Brexit is set to impact all sectors in the UK, including charities. In fact, </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirdsector.co.uk/nearly-half-charity-workers-already-seeing-effects-brexit/management/article/1437967" rel="noopener" target="_blank"><span data-dcnode-id="865" instrument_node="">almost half</span></a><span data-dcnode-id="863" instrument_node=""> of charity workers say they are </span><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">already</span></em><span data-dcnode-id="860" instrument_node=""> seeing the effects of Brexit. While these are unprecedented times, and it’s impossible to know the full impact, we spoke with some experts on the topic to find out more and see how charities can best prepare for a post-Brexit era. Below you’ll find insight from:</span></p><span data-dcnode-id="858" instrument_node="">
</span><ul data-dcnode-id="829"><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">Caron Bradshaw, Chief Executive Officer at the Charity Finance Group (</span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfg.org.uk/home" rel="noopener" target="_blank"><span data-dcnode-id="855" instrument_node="">CFG</span></a><span data-dcnode-id="853" instrument_node="">)</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">Elizabeth Chamberlain, Head of Policy and Public Services at the National Council for Voluntary Organisations (</span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncvo.org.uk/" rel="noopener" target="_blank"><span data-dcnode-id="849" instrument_node="">NCVO</span></a><span data-dcnode-id="847" instrument_node="">)</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="841"><span data-dcnode-id="844" instrument_node="">Duncan Spokes, Strategic Markets Manager at </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ypo.co.uk/" rel="noopener" target="_blank"><span data-dcnode-id="843" instrument_node="">YPO</span></a></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="839" instrument_node="">Gary McIndoe, Immigration Lawyer and Managing Director at </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//latitudelaw.com/" rel="noopener" target="_blank"><span data-dcnode-id="838" instrument_node="">Latitude Law</span></a></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="834" instrument_node="">Chris Willis Pickup, Charities and Social Ventures Partner at </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taylorvinters.com/" rel="noopener" target="_blank"><span data-dcnode-id="833" instrument_node="">Taylor Vinters</span></a></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><img alt="A work team putting their hands together in the centre of a table" class="aligncenter wp-image-13923 size-full" data-dcnode-id="827" height="350" loading="lazy" sizes="(max-width: 541px) 100vw, 541px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1083623.jpeg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1083623.jpeg 541w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1083623-300x194.jpeg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1083623-100x65.jpeg 100w" width="541"></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" style="color: #800000;"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Brexit: The big issues </span></strong></span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" style="color: #800000;"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">1. Workforce</span></strong></span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">One of the most pressing issues facing charities is how future immigration policy may affect their workforce and volunteers. And it appears these changes are already happening. Between June 2016 and June 2017, while the charity sector workforce grew as a whole, the number of European staff in the sector fell by </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.ncvo.org.uk/2018/06/04/are-eu-staff-leaving-the-charity-sector/" rel="noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">20%</span></a><span data-dcnode-id="811" instrument_node="">. “Although we don’t know for sure what is causing this, it could be in part a reaction to the referendum result,” says Elizabeth.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Caron agrees that the Brexit debate could have contributed to some EU nationals’ decision to leave the UK. “Although there have been some positive noises about EU nationals already here&nbsp;retaining rights to stay and work, there is a high level of uncertainty about their status,” she says. “The impact of the Brexit debate has had, anecdotally, a negative impact on some EU nationals and their desire to remain in the UK,” she says.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">But what will it mean going forward? Gary is an immigration lawyer and he told us that the end of Free Movement on Brexit should not affect existing EU staff and won’t prevent them from continuing in their paid roles. “However they will need to establish their immigration status by 1</span><sup data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">st</span></sup><span data-dcnode-id="802" instrument_node=""> July 2021. Volunteers are a little more complicated; if they don’t derive income from their charity or any other work they may qualify as economically self-sufficient, but will have to prove access to funds if they are to maintain UK residence,” he says.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Ultimately, it seems like Brexit is likely to make things more challenging for charities with EU employees. “More complicated immigration processes and a feeling of ‘not being wanted’ are likely to result in a decrease in the EU workforce in the UK. Charities could be faced with the big challenges in recruiting, and possible shortages of staff, particularly in sectors that rely heavily on staff from Europe, such as health and social care and international and overseas organisations,” says Elizabeth.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" style="color: #800000;"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">2. Economic uncertainty</span></strong></span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">No matter one’s position on Brexit, it has certainly cultivated a climate of uncertainty. And economic uncertainty is a big issue for charities at present, as so much remains unclear in this area. “Charities should be planning for financial uncertainty – we don’t yet know what the economic impacts of Brexit will be, but there is a widespread expectation that we will enter tough times. For example, if Brexit does mean that the pound loses value, charities that work overseas could end up being able to deliver less work for the same costs,” says Elizabeth. “Charities should think about what financial planning they need to do to get through a period where income could dwindle while costs and demand could rise. In short, the healthier an economy is, the healthier the charity sector should be. Government focus on economic stability during and after leaving the EU will be incredibly important in reducing the impact of Brexit on charities.”</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Not only does it mean charities may have to do more with less, but it could also result in lower levels of giving. “It is expected that the impact on the UK economy may affect charitable giving in the future due to the fact many are expecting wages to be affected which will in turn reduce disposable income and individual giving. The impact is unlikely to be immediate, with issues developing on a long-term basis with individual giving and limitations in terms of EU funding streams,” says Duncan.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">It has also been hypothesised that people will have less time available to spend volunteering, which will naturally adversely affect charities.&nbsp; “As the nation’s disposable income shrinks, so will their leisure time and capacity to support charities on a voluntary basis. This is likely to reduce resource in areas which are traditionally under resourced and limit the skilled expertise available from board members who may be under increased pressure from their day jobs,” says Duncan.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" style="color: #800000;"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">3. Funding</span></strong></span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">“The charity sector receives funding direct from EU institutions. Without a deal to continue this or replace it from national funds, charities will have a shortfall and will need to reduce services. There are various estimates for the financial impact – well over £300 million per year&nbsp;</span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.ncvo.org.uk/2016/12/16/what-do-we-know-about-charities-and-the-european-union/" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">according to NCVO</span></a><span data-dcnode-id="774" instrument_node="">,” says Chris.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">And even charities who don’t receive EU funding are not necessarily immune to this loss. “This might impact charities indirectly because they are the beneficiaries of another’s EU funding e.g. a lot of regeneration and community building that is supported by EU funding will also result in support for local voluntary sector organisations.&nbsp;The </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dsc.org.uk/content/uk-charities-brexit-funding-cliff-edge-250m/" rel="noopener" target="_blank"><span data-dcnode-id="770" instrument_node="">Directory of Social Change</span></a><span data-dcnode-id="768" instrument_node=""> (DSC) estimated that the loss of funding would be in the region of £250 million for charities and around a further £500 million to a range of businesses and social enterprises,” says Caron.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="762"><img alt="Pound coins" class="aligncenter wp-image-13915 size-full" data-dcnode-id="765" height="340" loading="lazy" sizes="(max-width: 604px) 100vw, 604px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/business-18107__340.jpg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/business-18107__340.jpg 604w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/business-18107__340-300x169.jpg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/business-18107__340-100x56.jpg 100w" width="604"><strong data-dcnode-id="763" style="color: #800000;"><span data-dcnode-id="764" instrument_node="">4. Partnerships</span></strong></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">One lesser discussed aspect of Brexit is the potential loss of partnerships with similar EU organisations. “Charities have built effective partnerships with similar organisations around the EU and these groups have worked together to have a greater impact globally. The international aid sector is a good example, and one where UK charities are recognised experts. There is now doubt over whether and how these relationships continue, as the UK moves away from the EU, legally and perhaps, culturally. There have been some reports of warnings to UK charities in new EU funding rounds. There have been challenges, but are likely to discourage effective collaboration,” says Chris.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" style="color: #800000;"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">5. New rules</span></strong></span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">From speaking with the experts it appears that Brexit offers one major positive to charities: the opportunity to develop new rules and improve the current landscape.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">“There are some areas where Brexit that, if managed well, could support the sector. For example, changes to the state aid, procurement rules and VAT legislation could improve the environment for charities,” says Caron.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">One area of particular interest would be changes to VAT rules as it’s currently estimated that each year the charity sector loses around </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirdsector.co.uk/taxing-problem/finance/article/1454852" rel="noopener" target="_blank"><span data-dcnode-id="745" instrument_node="">£1.5bn</span></a><span data-dcnode-id="743" instrument_node=""> of irrecoverable VAT. Caron says, “Freedom to change the VAT rules – if you accept that it was the EU who prevented a solution being found – would be positive. But the sector would only benefit if the UK government decided to makes the amendments necessary to reduce this VAT loss to the sector.”</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Another opportunity for improvement lurks within the government’s newly pledged Shared Prosperity Fund, which has been suggested as a replacement for the European Social Fund. “NCVO sees the Shared Prosperity Fund as a real chance for the government to iron out some of the difficulties that were associated with ESF by reducing bureaucracy and improving access to the scheme. We’ve worked closely with leaders from organisations who work with disadvantaged groups, private sector organisations, as well as frontline providers of ESF to outline how we believe its successor should function,” says Elizabeth.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Duncan also thinks Brexit could offer a chance for improvement where public procurement regulations are concerned. “Brexit could be a catalyst for reforming public procurement regulations and place a greater emphasis on social value and social outcomes. The topic of social value has received increasing media attention and there is ambition across the Public Sector and increasing desire for there to be less focus on price within procurement to allow social value to be at the forefront of considerations. This in turn could create an opportunity for charities to develop service opportunities in partnership with Local Authorities and Health,” he says.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Ultimately, all of the above hinges on the sort of deal the UK gets and whether or not the government chooses to prioritise the third sector. “Some have argued that leaving the EU could make things better for charities, by unlocking financial resources and ‘cutting red tape’: see </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfg.org.uk/item%3Fp%3D20" rel="noopener" target="_blank"><span data-dcnode-id="733" instrument_node="">CFG briefing of 28 July 2017</span></a><span data-dcnode-id="731" instrument_node="">. I agree that it could make improvements in some areas, but it wholly depends on what Brexit deal is done with the EU, and what the UK government does next. It relies on the UK government choosing to, for example, simplify and improve the VAT regime for charities, and adopt a more flexible state aid and public procurement regime to improve charities’ access to funds and supply to public bodies. But all of this relies on a Brexit deal giving the UK this flexibility to set its own rules, and the UK choosing to use flexibility to help charities,” says Chris.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><img alt="Woman at the front of a meeting, putting post-its on a board" class="aligncenter wp-image-13916 size-large" data-dcnode-id="728" height="574" loading="lazy" sizes="(max-width: 862px) 100vw, 862px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-1024x682.jpg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-1024x682.jpg 1024w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-300x200.jpg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-768x512.jpg 768w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-100x67.jpg 100w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-862x575.jpg 862w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/adult-american-board-1157859-1170x780.jpg 1170w" width="862"></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" style="color: #800000;"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">How charities can plan for Brexit </span></strong></span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" style="color: #800000;"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">1. Prepare for a no deal </span></strong></span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">“At this point, charities should be reviewing their operations – especially people, funding and partnerships – and working out what would happen if the UK exits the EU in March 2019 with no transactional deal. For many charities the impact will be quite limited, for others it could be existential. It’s important to know where you sit, and to come up with a contingency plan if there would be a big impact,” says Chris.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">“No one can really pinpoint just how likely a no deal scenario is, but it’s far from inconceivable so charities do need prepare for every eventuality. If your charity needs specialist goods or equipment from overseas, you need to be making contingency plans for this in the event that a no deal outcome results in trade problems,” says Elizabeth.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" style="color: #800000;"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">2. Stay hyper aware </span></strong></span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">“Brexit has created a huge amount of uncertainty and complexity over the future legal and regulatory environment. It’s important for charities to keep an eye on any changes that will affect their operations or their beneficiaries – such as consumer or human rights legislation or environmental protections,” says Elizabeth, while Duncan suggests,&nbsp;“While research and assessments are ongoing, charities should be looking to understand the ways in which the Government could be changing the way in which social value is evaluated within the public sector. This is likely to create an opportunity for the sector and charities should be prepared to transform and organise themselves to take advantage of the opportunities that will arise from this change.”</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">“Charities often need to check compliance with EU state aid rules as part of grant applications from public funds. The government has said there will be UK state aid rules in future, and the Competition and Markets Authority will take the lead. Charities should be looking out for these new rules, and seeking to improve them. As the CFG has said, more flexible state aid rules for charities would be a big help,” says Chris.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><img alt="Man reading newspaper while woman on a laptop checks her phone" class="aligncenter size-large wp-image-13917" data-dcnode-id="698" height="580" loading="lazy" sizes="(max-width: 862px) 100vw, 862px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-1024x689.jpeg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-1024x689.jpeg 1024w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-300x202.jpeg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-768x517.jpeg 768w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-100x67.jpeg 100w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-862x580.jpeg 862w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1153212-1170x787.jpeg 1170w" width="862"></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" style="color: #800000;"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">3. Press for a sectoral assessment </span></strong></span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Duncan says, “Charities trying to plan for post-Brexit outcomes will need to press Government to undertake a sectoral assessment. The assessment should review the expected impact of Brexit on charities and the Voluntary Charity Sector (VCS) which in turn could impact on public well-being and the public sector itself. Similarly, Parliamentary Committees will need to be lobbied to undertake assessments and provide recommendations for charities to safeguard their services, which by their nature support the most vulnerable in society.”</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" style="color: #800000;"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">4. Conduct internal assessments </span></strong></span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">“It is important for the sector to also commission and develop their own assessments which can guide their preparations and highlight any concerns with the VCS and government stakeholders. The research from assessments will provide charitable organisations with relevant data should they need to speak out against policies and potential agreements that could be damaging to the sector, its beneficiaries and society,” says Duncan.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" style="color: #800000;"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">5. Research funding</span></strong></span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">As Caron points out, “It may be tempting for charities to assume that Brexit won’t impact them because, for example, they receive no funds direct from the EU. However, there may be an indirect impact, so it is wise to examine all these areas. In the example of funding – who are the charities funders and do they suffer if funding is cut from the EU? Will it change the local authority’s funding?&nbsp;Will businesses change their support of charity due to funding shortages? Will donors have less to support their cause?&nbsp;Charities need to look beyond the obvious and think about the more seemingly remote risks.”</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" style="color: #800000;"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">6. Review all contracts</span></strong></span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">“It is worth charities checking any major contracts they signed before the Brexit referendum, and that will last beyond Brexit. These contracts were probably signed with the assumption that the UK would stay in the EU – they may therefore need updating for Brexit. This is quite a detailed exercise and depends partly on what Brexit deal is done (if any), but charities can start to identify any key contracts and do some scenario planning,” says Chris.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="659"><img alt="Two people looking at contract details" class="aligncenter size-full wp-image-13922" data-dcnode-id="663" height="350" loading="lazy" sizes="(max-width: 525px) 100vw, 525px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1089549.jpeg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1089549.jpeg 525w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1089549-300x200.jpeg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1089549-100x67.jpeg 100w" width="525"><span data-dcnode-id="660" style="color: #800000;"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">7. Identity future employment needs </span></strong></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">“While the British government has set out its position on EU workers, this has yet to be fully approved by the EU-27 with whom they are negotiating. &nbsp;The challenge for charities will be to identify future employment needs early – both in terms of paid and unpaid roles – and stay up to date with the changing immigration landscape,” says&nbsp;Gary.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" style="color: #800000;"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">8. Help EU employees </span></strong></span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">“Charities need to be thinking about how to guide existing staff through the proposed settlement process for European citizens. They also need to plan for a tighter labour market in the future,” says Elizabeth.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Gary’s advice is for charities to move quickly: “They would be sensible to help their EU workers to secure settled immigration status sooner rather than later, and in line with the usual right-to-work checks that any employer must conduct, to ensure non-EU workers comply with their visa requirements to the letter.”</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" style="color: #800000;"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">9. Prepare for the specifics of your charity </span></strong></span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">“Charities should map out their own positions in relation to the economy, tax, skills, public spending and regulation. Depending on how much impact there could be on the charity, discuss with the trustees the position (and regularly review any changes), discuss cross organisation at exec level these areas, engage with stakeholders –&nbsp; like local government and funders –&nbsp; and generally follow the debate (making adjustments in their own planning as things become clearer).&nbsp; For some charities this will be a large issue (e.g. due to funding or workers) or others it will be an issue that has less of a direct impact thus being aware of possible changes in their risks, funding and operating environment will be all they can do at this stage,” says Caron.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" style="color: #800000;"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">10. Be vocal </span></strong></span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Chris supports a proactive approach to effecting change. He says, “I would encourage charities to be vocal about their needs and ambitions for the charity sector post-Brexit. If Brexit is to have any positive impact for charities, this requires the UK government to build into its negotiations with the EU now, and its plans for new UK-specific laws. The CFG has made a good start with this, but needs wider support.”</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><img alt="Man posing with cardboard megaphone while his colleagues watch" class="aligncenter size-large wp-image-13919" data-dcnode-id="627" height="576" loading="lazy" sizes="(max-width: 862px) 100vw, 862px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-1024x684.jpeg&amp;raw" srcset="https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-1024x684.jpeg 1024w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-300x200.jpeg 300w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-768x513.jpeg 768w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-100x67.jpeg 100w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-862x576.jpeg 862w, https://www.redbrickresearch.com/wp-content/uploads/2018/11/pexels-photo-1571167-1170x782.jpeg 1170w" width="862"></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" style="color: #800000;"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">In conclusion…</span></strong></span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Brexit has brought forth many issues that charities need to consider. Future immigration policies may impact the current workforce and economic uncertainty could result in funding issues, lower levels of giving and a lack of volunteers. Certain EU partnerships may also be under threat which could impact the collaborative work done in this sector globally. The good news is that Brexit brings with it the opportunity for improvement too, such as addressing the rules surrounding irrecoverable VAT.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">While these issues are far from finalised, there are a number of steps charities can take to start preparing for a post-Brexit era. From staying as informed as possible and being vocal about their needs to reviewing all contracts and preparing for trade issues, charities should feel empowered to take positive steps forward to prepare for a post-Brexit era.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Given the issues outlined above, it may prove easy to feel disheartened. But Caron has some wonderful advice for taking this situation and turning into a golden opportunity: “Brexit arguably happened because of communities feeling left behind, disconnected from the benefits enjoyed by many.&nbsp;Brexit has highlighted deep divides in our communities and&nbsp;across the UK.&nbsp;The UK is crying out for a social solution to the hard to resolve issues like social mobility, health and wellbeing and equality. This is the sector’s space. This is where we thrive. Charities’ place of operation is where markets have failed and where solutions are beyond the state or private sector – so this is the sector’s moment to shine. We can build better communities and, if included in the reshaping of the UK, play a significant part in healing those divisions.”</span></p><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
</span></div><span data-dcnode-id="607" instrument_node="">
</span></article><span data-dcnode-id="605" instrument_node="">

</span></div><div class="widget widget_archive" data-dcnode-id="251" id="archives-2"><h4 class="h-widget" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Archives</span></h4><span data-dcnode-id="511" instrument_node="">
