about the </span><span data-dcnode-id="4294" style="color: #993300;"><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withdrawal_from_the_European_Union" rel="noopener noreferrer" style="color: #993300;" target="_blank"><span data-dcnode-id="4296" instrument_node="">European Union on good ole Wiki</span></a></span><span data-dcnode-id="4293" instrument_node=""> and Brexit simply means “Britain Exit European Union!” And on Thursday 23.06.2016 </span><strong data-dcnode-id="4290"><em data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Britain Decided by a Ballot to </span></em></strong><span data-dcnode-id="4285" style="color: #993300;"><a data-dcnode-id="4286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirror.co.uk/news/uk-news/eu-referendum-results-live-cameron-8262829" rel="noopener noreferrer" style="color: #993300;" target="_blank"><strong data-dcnode-id="4287"><em data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">leave its 43-year-old Economic and Free Travel marriage with Europe</span></em></strong></a></span><strong data-dcnode-id="4282"><em data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">.</span></em></strong></span></p><p data-dcnode-id="4274" style="text-align: justify;"><span data-dcnode-id="4275" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4279" instrument_node="">We don’t usually focus on such touchy subjects, we prefer to inspire, entertain and maybe educate you every so often…yet what happened on Thursday 23</span><sup data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">rd</span></sup><span data-dcnode-id="4276" instrument_node=""> June 2016 in UK could be of seismic effect on British Travel!</span></span></p><span data-dcnode-id="4273" instrument_node=""> </span><a class="dpsp-click-to-tweet dpsp-style-1 dpsp-click-to-tweet-cta-left dpsp-click-to-tweet-cta-icon-animation" data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DWhat%2520will%2520be%2520the%2520consequences%2520of%2520Brexit%2520on%2520UK%2520%2526amp%253B%2520Europe%2520Travel%253F%26url%3Dhttps%253A%252F%252Fpkjulesworld.com%252Fpotential-effects-of-brexit-on-uk-travel%252F%26via%3Dpkjulesworld"><span data-dcnode-id="4272" instrument_node=""> </span><span class="dpsp-click-to-tweet-content" data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node=""> What will be the consequences of Brexit on UK &amp; Europe Travel? </span></span><span data-dcnode-id="4269" instrument_node=""> </span><span class="dpsp-click-to-tweet-footer" data-dcnode-id="4249"><span data-dcnode-id="4268" instrument_node=""> </span><span class="dpsp-click-to-tweet-cta" data-dcnode-id="4251"><span data-dcnode-id="4267" instrument_node=""> </span><span data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Click to Tweet</span></span><span data-dcnode-id="4264" instrument_node=""> </span><i class="dpsp-network-btn dpsp-twitter" data-dcnode-id="4253"><span data-dcnode-id="4263" instrument_node=""> </span><span class="dpsp-network-icon" data-dcnode-id="4255"><span data-dcnode-id="4262" instrument_node=""> </span><span class="dpsp-network-icon-inner" data-dcnode-id="4257"><span data-dcnode-id="4261" instrument_node=""> </span><svg data-dcnode-id="4259" height="32" version="1.1" viewBox="0 0 30 32" width="32" xmlns="http://www.w3.org/2000/svg"><path d="M28.928 7.296q-1.184 1.728-2.88 2.976 0 0.256 0 0.736 0 2.336-0.672 4.64t-2.048 4.448-3.296 3.744-4.608 2.624-5.792 0.96q-4.832 0-8.832-2.592 0.608 0.064 1.376 0.064 4.032 0 7.168-2.464-1.888-0.032-3.36-1.152t-2.048-2.848q0.608 0.096 1.088 0.096 0.768 0 1.536-0.192-2.016-0.416-3.328-1.984t-1.312-3.68v-0.064q1.216 0.672 2.624 0.736-1.184-0.8-1.888-2.048t-0.704-2.752q0-1.568 0.8-2.912 2.176 2.656 5.248 4.256t6.656 1.76q-0.16-0.672-0.16-1.312 0-2.4 1.696-4.064t4.064-1.696q2.528 0 4.224 1.824 1.952-0.384 3.68-1.408-0.672 2.048-2.56 3.2 1.664-0.192 3.328-0.896z" data-dcnode-id="4260"></path></svg><span data-dcnode-id="4258" instrument_node=""> </span></span><span data-dcnode-id="4256" instrument_node=""> </span></span><span data-dcnode-id="4254" instrument_node=""> </span></i><span data-dcnode-id="4252" instrument_node=""> </span></span><span data-dcnode-id="4250" instrument_node=""> </span></span><span data-dcnode-id="4248" instrument_node=""> </span></a><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4238" style="text-align: justify;"><span data-dcnode-id="4239" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4244" instrument_node="">To be honest all we have got thus far on any inquiry based on the question “</span><strong data-dcnode-id="4241"><em data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">what will be the consequences of Brexit on …?</span></em></strong><span data-dcnode-id="4240" instrument_node="">” Have of necessity been answered by; “we don’t know.”</span></span></p><p data-dcnode-id="4229" style="text-align: justify;"><span data-dcnode-id="4230" style="font-size: 14pt;"><span data-dcnode-id="4236" style="color: #000000;"><span data-dcnode-id="4237" instrument_node="">Thing is the Brexit politicians gave people the impression they had it figured out. Clearly, they did not imagine the paperwork, the red tape, the amount of Legalese tied to UK &amp; European Laws Rules &amp; Regulations that now have to be undone, negotiated, started from scratch. The sheer cost of this will be felt for generations to come and hasn’t been shared with the taxpayer…</span></span><strong data-dcnode-id="4231"><em data-dcnode-id="4232"><u data-dcnode-id="4233"><span data-dcnode-id="4234" style="color: #000000;"><span data-dcnode-id="4235" instrument_node="">So what does Brexit mean for the&nbsp;Brit&nbsp; &amp; European traveller?</span></span></u></em></strong></span></p><p data-dcnode-id="4226" style="text-align: justify;"><span data-dcnode-id="4227" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4228" instrument_node="">Well while we don’t know, we can definitely make a reasonably educated guess.&nbsp;</span></span></p><p data-dcnode-id="4223" style="text-align: justify;"><span data-dcnode-id="4224" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4225" instrument_node="">To be honest we believe that short term – very little will change. You still have to mow your garden, take out your trash, walk ya dog and book your own flights. No lil Aliens have flown in to do that. Longer-term, well that depends on the withdrawal negotiations &amp; treaty which the rest of the EU will offer UK!</span></span></p><p data-dcnode-id="4218" style="text-align: justify;"><span data-dcnode-id="4219" style="color: #000000; font-size: 18pt;"><strong data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">“Disclaimer:</span></strong><span data-dcnode-id="4220" instrument_node=""> the opinions expressed here are our own, they have no political or social leanings whatsoever and aren’t meant to be used as Fact!</span></span></p><p data-dcnode-id="4210" style="text-align: justify;"><span data-dcnode-id="4211" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4217" instrument_node="">First I suggest anyone who wants to travel to Europe Pack your passport and go enjoy Europe in the next 2 years, before the switch is flicked i.e. the </span><span data-dcnode-id="4213" style="text-decoration: underline;"><span data-dcnode-id="4214" style="color: #993300;"><em data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Lisbon Treaty article 50</span></em></span></span><span data-dcnode-id="4212" instrument_node="">!</span></span></p><p data-dcnode-id="4207" style="text-align: justify;"><span data-dcnode-id="4208" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4209" instrument_node="">So having chewed upon this particular bone over the weekend and listening to all kinds of expert and otherwise opinions, here is @Pkjulesworld views to the question.</span></span></p><p data-dcnode-id="4200" style="text-align: justify;"><span data-dcnode-id="4201" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4206" instrument_node="">Let’s look at </span><strong data-dcnode-id="4203"><em data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">possible short term and long term outcomes of a Brexit vote to UK and Europe travel</span></em></strong><span data-dcnode-id="4202" instrument_node="">. Focus is on leisure and business travel! These are closely linked to residency &amp; citizenship too, but that’s for another day maybe!</span></span></p><p data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="4192" style="text-align: justify;"><span data-dcnode-id="4193" style="color: #800080; font-size: 20pt;"><strong data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">Short Term Effects of Brexit to UK Travel:</span></strong></span></h3><p data-dcnode-id="4189" style="text-align: justify;"><span data-dcnode-id="4190" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4191" instrument_node="">First and foremost, the travel industry will continue to grow, irrespective of the post Brexit drop on the Pound Sterling. Travel and Immigration to &amp; from the UK will continue regardless of what has happened. The referendum ballot result may mean an end to Visa-free travel between UK and EU states. This remains to be seen. </span></span></p><p data-dcnode-id="4186" style="text-align: justify;"><span data-dcnode-id="4187" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4188" instrument_node="">Definitely, workers will have to think about Work Permits. But these aren’t immediate concerns! Yet be prepared to face these gremlins now.</span></span></p><p data-dcnode-id="4183" style="text-align: justify;"><span data-dcnode-id="4184" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4185" instrument_node="">Your EU branded passport will definitely be changing back to a British one! Arrrg we just renewed ours lol!</span></span></p><p data-dcnode-id="4181" style="text-align: center;"><img alt="Potential effects of Brexit on UK Travel! " class="aligncenter wp-image-1425 size-full" data-dcnode-id="4182" data-pin-media="https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit-and-UK-Travel.png" data-pin-nopin="true" height="315" loading="lazy" sizes="(max-width: 560px) 100vw, 560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/wp-content/uploads/2016/06/Brexit-and-UK-Travel.png&amp;raw" srcset="https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit-and-UK-Travel.png 560w, https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit-and-UK-Travel-300x169.png 300w" width="560"></p><p data-dcnode-id="4176" style="text-align: justify;"><span data-dcnode-id="4177" style="color: #000000;"><strong data-dcnode-id="4178"><em data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">&nbsp;</span></em></strong></span></p><p data-dcnode-id="4173" style="text-align: justify;"><span data-dcnode-id="4174" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4175" instrument_node="">This ballot has not determined how many immigrants are allowed into the UK, where they come from, and what criteria will be used. The journey has just started really!</span></span></p><p data-dcnode-id="4144"><span data-dcnode-id="4145" style="font-size: 14pt;"><a class="dpsp-click-to-tweet dpsp-style-1 dpsp-click-to-tweet-cta-left dpsp-click-to-tweet-cta-icon-animation" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DFlights%2520are%2520still%2520taking%2520off%2520for%2520Europe%252C%2520your%2520cruise%2520still%2520sets%2520sail%2520and%2520so%2520will%2520the%2520ferry%2521%2520%26url%3Dhttps%253A%252F%252Fpkjulesworld.com%252Fpotential-effects-of-brexit-on-uk-travel%252F%26via%3Dpkjulesworld"><span data-dcnode-id="4172" instrument_node=""> </span><span class="dpsp-click-to-tweet-content" data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node=""> Flights are still taking off for Europe, your cruise still sets sail and so will the ferry! #travelnews </span></span><span data-dcnode-id="4169" instrument_node=""> </span><span class="dpsp-click-to-tweet-footer" data-dcnode-id="4149"><span data-dcnode-id="4168" instrument_node=""> </span><span class="dpsp-click-to-tweet-cta" data-dcnode-id="4151"><span data-dcnode-id="4167" instrument_node=""> </span><span data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Click to Tweet</span></span><span data-dcnode-id="4164" instrument_node=""> </span><i class="dpsp-network-btn dpsp-twitter" data-dcnode-id="4153"><span data-dcnode-id="4163" instrument_node=""> </span><span class="dpsp-network-icon" data-dcnode-id="4155"><span data-dcnode-id="4162" instrument_node=""> </span><span class="dpsp-network-icon-inner" data-dcnode-id="4157"><span data-dcnode-id="4161" instrument_node=""> </span><svg data-dcnode-id="4159" height="32" version="1.1" viewBox="0 0 30 32" width="32" xmlns="http://www.w3.org/2000/svg"><path d="M28.928 7.296q-1.184 1.728-2.88 2.976 0 0.256 0 0.736 0 2.336-0.672 4.64t-2.048 4.448-3.296 3.744-4.608 2.624-5.792 0.96q-4.832 0-8.832-2.592 0.608 0.064 1.376 0.064 4.032 0 7.168-2.464-1.888-0.032-3.36-1.152t-2.048-2.848q0.608 0.096 1.088 0.096 0.768 0 1.536-0.192-2.016-0.416-3.328-1.984t-1.312-3.68v-0.064q1.216 0.672 2.624 0.736-1.184-0.8-1.888-2.048t-0.704-2.752q0-1.568 0.8-2.912 2.176 2.656 5.248 4.256t6.656 1.76q-0.16-0.672-0.16-1.312 0-2.4 1.696-4.064t4.064-1.696q2.528 0 4.224 1.824 1.952-0.384 3.68-1.408-0.672 2.048-2.56 3.2 1.664-0.192 3.328-0.896z" data-dcnode-id="4160"></path></svg><span data-dcnode-id="4158" instrument_node=""> </span></span><span data-dcnode-id="4156" instrument_node=""> </span></span><span data-dcnode-id="4154" instrument_node=""> </span></i><span data-dcnode-id="4152" instrument_node=""> </span></span><span data-dcnode-id="4150" instrument_node=""> </span></span><span data-dcnode-id="4148" instrument_node=""> </span></a><span data-dcnode-id="4146" instrument_node=""> </span></span></p><p data-dcnode-id="4138" style="text-align: justify;"><span data-dcnode-id="4139" style="color: #000000; font-size: 14pt;"><span data-dcnode-id="4143" instrument_node="">Let’s be realistic, right now, nothing much changes: Holidaymakers should not panic. Flights are still taking off for Europe, your cruise still sets sail and so will the ferry! On the face of it, you won’t see a big change in the short term…</span><em data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">things will tick along</span></em><span data-dcnode-id="4140" instrument_node=""> as before!</span></span></p><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4130"><span data-dcnode-id="4131" style="font-size: 14pt;"><span data-dcnode-id="4135" instrument_node="">By the way, did you see the </span><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ryanair.com/gb/en/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4134" instrument_node="">@Ryanair</span></a><span data-dcnode-id="4132" instrument_node=""> Twitter gaff, Wow £9.99 flights to celebrate Remain in EU…Clever Marketing or gaff?</span></span></p><p data-dcnode-id="4122" style="text-align: center;"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-1426 size-full" data-dcnode-id="4123"><img alt="Potential Effects of Brexit to Air Travel #Ryanairgaff" class="" data-dcnode-id="4129" data-pin-description="Is this the end of Cheap travel for UK travellers? Do UK Citizens Need Visas to travel to European Countries After Brexit? Potential effects of Brexit on UK Travel industry and European Immigration! A Must Read!" data-pin-media="https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff.png" data-pin-title="What're the Consequences and Effects of Brexit on  European/UK Travel" height="727" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff.png&amp;raw" srcset="https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff.png 733w, https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff-150x150.png 150w, https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff-300x298.png 300w, https://pkjulesworld.com/wp-content/uploads/2016/06/Brexit_UK_Travel_Ryan_Air_Gaff-100x100.png 100w" style="" width="733"><span class="dpsp-pin-it-overlay" data-dcnode-id="4128"></span><a class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular" data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fpkjulesworld.com%252Fwp-content%252Fuploads%252F2016%252F06%252Fpablo-9.png%26url%3Dhttps%253A%252F%252Fpkjulesworld.com%252Fpotential-effects-of-brexit-on-uk-travel%252F%26is_video%3Dfalse%26description%3DIs%2520this%2520the%2520end%2520of%2520Cheap%2520travel%2520for%2520UK%2520travellers%253F%2520Do%2520UK%2520Citizens%2520Need%2520Visas%2520to%2520travel%2520to%2520European%2520Countries%2520After%2520Brexit%253F%2520Potential%2520effects%2520of%2520Brexit%2520on%2520UK%2520Travel%2520industry%2520and%2520European%2520Immigration%21%2520A%2520Must%2520Read%21" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="4125"><svg data-dcnode-id="4126" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="4127"></path></svg></span></a></div><p></p><p data-dcnode-id="4119"><span data-dcnode-id="4120" style="font-size: 14pt;"><span data-dcnode-id="4121" instrument_node="">Ryanair spokesperson had this to say:</span></span></p><blockquote data-dcnode-id="4109"><p data-dcnode-id="4116" style="text-align: justify;"><span data-dcnode-id="4117" style="font-size: 14pt;"><span data-dcnode-id="4118" instrument_node="">It’s a good job we’re better at running an airline than political campaigns.</span></span></p><p data-dcnode-id="4110" style="text-align: justify;"><span data-dcnode-id="4111" style="font-size: 14pt;"><span data-dcnode-id="4115" instrument_node="">Britons are booking our £9.99 seats in record numbers in what will be the last big seat sale of its kind, as they look to flee a country which will be run by Boris, Gove and Farage.” </span><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirror.co.uk/news/uk-news/ryanair-sends-awkward-eu-referendum-8271998"><span data-dcnode-id="4114" instrument_node="">Mirror News</span></a><span data-dcnode-id="4112" instrument_node="">.</span></span></p></blockquote><p data-dcnode-id="4106"><span data-dcnode-id="4107" style="font-size: 14pt;"><span data-dcnode-id="4108" instrument_node="">Their Follow up Advert was funny and clever too!</span></span></p><p data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4099" style="text-align: center;"><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/afro" rel="noopener noreferrer" target="_blank"><img alt="Journey without Limits - Amazon review Artwork" class="alignright wp-image-4370" data-dcnode-id="4101" data-pin-media="https://pkjulesworld.com/wp-content/uploads/2017/11/JWL_Promo1-min.jpg" data-pin-nopin="true" height="317" loading="lazy" sizes="(max-width: 522px) 100vw, 522px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/wp-content/uploads/2017/11/JWL_Promo1-min.jpg&amp;raw" srcset="https://pkjulesworld.com/wp-content/uploads/2017/11/JWL_Promo1-min.jpg 650w, https://pkjulesworld.com/wp-content/uploads/2017/11/JWL_Promo1-min-300x182.jpg 300w" width="522"></a></p><p data-dcnode-id="4095"><span data-dcnode-id="4096" style="color: #800080; font-size: 20pt;"><strong data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Effects of Brexit on UK Travel and Life! </span></strong></span></p><p data-dcnode-id="4092" style="text-align: justify;"><span data-dcnode-id="4093" style="font-size: 14pt;"><span data-dcnode-id="4094" instrument_node="">The success of the “Leave Vote” has caused division, raised the ugly head of racism, bigotry and stirred discord among communities, neighbours, workmates and even families. They played on people’s immigration fears and deep ingrained racist tendencies.</span></span></p><p data-dcnode-id="4089" style="text-align: justify;"><span data-dcnode-id="4090" style="font-size: 14pt;"><span data-dcnode-id="4091" instrument_node="">The work is in putting it all behind us now and work together to rebuild the torn UK so we can travel freely and continue to enjoy benefits as global citizens.</span></span></p><blockquote data-dcnode-id="4081"><p data-dcnode-id="4082"><span data-dcnode-id="4083" style="font-size: 14pt;"><span data-dcnode-id="4088" instrument_node="">“</span><strong data-dcnode-id="4085"><em data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Change is normal, let’s work with what we got…and play the hand we’ve been served!</span></em></strong><span data-dcnode-id="4084" instrument_node="">&nbsp;</span></span></p></blockquote><p data-dcnode-id="4078" style="text-align: justify;"><span data-dcnode-id="4079" style="font-size: 14pt;"><span data-dcnode-id="4080" instrument_node="">So you got our views and thoughts on the possible effects of Brexit on UK Travel and immigration. Of course, we are facing uncharted territory at the moment. Yet the UK will survive. More people may choose to stay home and so Britain may see a rise in Hotel bookings.</span></span></p><p data-dcnode-id="4070" style="text-align: justify;"><span data-dcnode-id="4071" style="font-size: 14pt;"><span class="bctt-click-to-tweet" data-dcnode-id="4072"><span class="bctt-ctt-text" data-dcnode-id="4075"><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fwp.me%252Fp8oSZG-mT%26text%3DAs%2520a%2520UK%2520traveller%2520continue%2520to%2520Build%2520Bridges%2520%2523UKBrexiteffects%26via%3Dpkjulesworld%26related%3Dpkjulesworld" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4077" instrument_node="">As a UK traveller continue to Build Bridges #UKBrexiteffects </span></a></span><a class="bctt-ctt-btn" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fwp.me%252Fp8oSZG-mT%26text%3DAs%2520a%2520UK%2520traveller%2520continue%2520to%2520Build%2520Bridges%2520%2523UKBrexiteffects%26via%3Dpkjulesworld%26related%3Dpkjulesworld" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4074" instrument_node="">Click To Tweet</span></a></span></span></p><p data-dcnode-id="4067" style="text-align: justify;"><span data-dcnode-id="4068" style="font-size: 14pt;"><span data-dcnode-id="4069" instrument_node="">Remember you as a Brit Traveller still have a lot of clout. Most EU countries that depend on tourism need your Pound Sterling! We are big holiday spenders so travel and hospitality companies will work hard to keep our custom! &nbsp;As a UK traveller continue to Build Bridges, As I stated on Facebook;</span></span></p><blockquote data-dcnode-id="4057"><p data-dcnode-id="4058" style="text-align: justify;"><span data-dcnode-id="4059" style="font-size: 14pt;"><span data-dcnode-id="4066" instrument_node="">“The youth, millennials &amp; boomers: Travel, embrace Europe, Study and work abroad, Love abroad, Show how great Britons are. Its time to Step up and Show that Britain is still Great…! The old and insular have let you down.&nbsp;</span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/hashtag/keeptheunionjack%3Fsource%3Dfeed_text%26story_id%3D1752635505014029"><span data-dcnode-id="4065" instrument_node="">‪#‎KeeptheUnionJack</span></a><span data-dcnode-id="4063" instrument_node="">&nbsp;I always say&nbsp;</span><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/hashtag/yourpowerechoes%3Fsource%3Dfeed_text%26story_id%3D1752635505014029"><span data-dcnode-id="4062" instrument_node="">‪#‎YourPowerEchoes</span></a><span data-dcnode-id="4060" instrument_node="">”</span></span></p></blockquote><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="4051" style="text-align: center;"><strong data-dcnode-id="4052"><span data-dcnode-id="4053" style="color: #800080; font-size: 22pt;"><span data-dcnode-id="4054" instrument_node="">UPDATE ON EFFECT OF BREXIT ON UK TRAVEL – EUROPEAN IMMIGRATION</span></span></strong></h3><p data-dcnode-id="4049" style="text-align: center;"><img alt="Effects of BREXIT onUK Travel and Immigration #ukimmigration #brexitupdate" class="alignleft wp-image-1563" data-dcnode-id="4050" data-pin-media="https://pkjulesworld.com/wp-content/uploads/2016/06/6.png" data-pin-nopin="true" height="254" loading="lazy" sizes="(max-width: 452px) 100vw, 452px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/wp-content/uploads/2016/06/6.png&amp;raw" srcset="https://pkjulesworld.com/wp-content/uploads/2016/06/6.png 560w, https://pkjulesworld.com/wp-content/uploads/2016/06/6-300x169.png 300w" width="452"></p><p data-dcnode-id="4043" style="text-align: justify;"><span data-dcnode-id="4044" style="font-size: 14pt;"><span data-dcnode-id="4048" instrument_node="">We promised to keep you updated on matters that could affect your Europe, UK Travel and Immigration following the #Brexit Vote on 23</span><sup data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">rd</span></sup><span data-dcnode-id="4045" instrument_node=""> June 2016. So here goes…</span></span></p><ul data-dcnode-id="4039" style="text-align: justify;"><li data-dcnode-id="4040"><span data-dcnode-id="4041" style="font-size: 14pt;"><span data-dcnode-id="4042" instrument_node="">There are no immediate changes to the UK employment and immigration laws as a result …for now!</span></span></li></ul><ul data-dcnode-id="4030" style="text-align: justify;"><li data-dcnode-id="4031"><span data-dcnode-id="4032" style="font-size: 14pt;"><span data-dcnode-id="4038" instrument_node="">The legal process for Leaving the EU will only begin when the UK notifies the European Union of its intention to withdraw under </span><em data-dcnode-id="4034"><span data-dcnode-id="4036" style="text-decoration: underline;"><span data-dcnode-id="4037" instrument_node="">Article 50 of the Lisbon Treaty</span></span><span data-dcnode-id="4035" instrument_node="">.</span></em><span data-dcnode-id="4033" instrument_node="">&nbsp;We have up to 2 years from that notification to agree terms. (Can be longer if terms are agreed!)</span></span></li></ul><ul data-dcnode-id="4026" style="text-align: justify;"><li data-dcnode-id="4027"><span data-dcnode-id="4028" style="font-size: 14pt;"><span data-dcnode-id="4029" instrument_node="">All European Economic Area and Swiss nationals will continue to have the same rights to Live, Travel and work in the UK and Europe for the immediate future.</span></span></li></ul><ul data-dcnode-id="4007"><li data-dcnode-id="4017" style="text-align: justify;"><span data-dcnode-id="4018" style="font-size: 14pt;"><span data-dcnode-id="4025" instrument_node="">If you are an EU National based in the UK, you may wish to apply to the Home Office for a document certifying permanent residence to prove your right to live in the UK permanently. If you have been living in the UK for five years or more. Your family members may also be eligible to make such an application. More information can be found on the </span><span data-dcnode-id="4020" style="text-decoration: underline;"><em data-dcnode-id="4021"><strong data-dcnode-id="4022"><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/news/statement-the-status-of-eu-nationals-in-the-uk"><span data-dcnode-id="4024" instrument_node="">This Government website</span></a></strong></em></span><span data-dcnode-id="4019" instrument_node="">.</span></span></li><li data-dcnode-id="4008"><p data-dcnode-id="4012" style="text-align: justify;"><span data-dcnode-id="4015" style="font-size: 14pt; color: #000000;"><span data-dcnode-id="4016" instrument_node="">From 1 January, the guarantee of free mobile phone roaming throughout the EU, including Liechtenstein, Iceland, and Norway ended. Travellers are advised</span></span><span data-dcnode-id="4013" style="font-size: 14pt; color: #000000;"><span data-dcnode-id="4014" instrument_node=""> to check with their phone operator regarding roaming charges.</span></span></p><p data-dcnode-id="4009" style="text-align: justify;"><span data-dcnode-id="4010" style="font-size: 14pt; color: #000000;"><span data-dcnode-id="4011" instrument_node="">Some mobile operators – O2, EE, and Vodafone say they have no current plans to change their mobile roaming policies 2021.</span></span></p></li></ul><p data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">&nbsp;</span></p><p data-dcnode-id="4001"><span data-dcnode-id="4002" style="color: #000000; font-size: 22pt;"><strong data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">So BREXIT Happened 1st January 2021 and Below is the Immigration Update</span></strong></span></p><p data-dcnode-id="3998" style="text-align: justify;"><span data-dcnode-id="3999" style="font-size: 14pt;"><span data-dcnode-id="4000" instrument_node="">The UK’s new points-based immigration system will come into force for immigrants.</span></span></p><p data-dcnode-id="3993" style="text-align: justify;"><span data-dcnode-id="3996" style="font-size: 14pt;"><span data-dcnode-id="3997" instrument_node="">And now, EU nationals will be treated the same way as non-EU citizens. They will now have to apply for visas to live, work or study in the UK. But, </span></span><span data-dcnode-id="3994" style="font-size: 14pt;"><span data-dcnode-id="3995" instrument_node="">Irish citizens will continue to enter and live in the UK as before Brexit.</span></span></p><p data-dcnode-id="3990" style="text-align: justify;"><span data-dcnode-id="3991" style="font-size: 14pt;"><span data-dcnode-id="3992" instrument_node="">EU citizens will not require a visa to enter the UK when visiting the UK for up to six months.</span></span></p><p data-dcnode-id="3987" style="text-align: justify;"><span data-dcnode-id="3988" style="font-size: 14pt;"><span data-dcnode-id="3989" instrument_node="">Those EU nationals already living in the UK, as well as those from Switzerland,&nbsp; Norway, Iceland, Liechtenstein, have to apply to continue living in the UK after 1st January 2021 under the settled status scheme.</span></span></p><p data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="3984"><p data-dcnode-id="3974" style="text-align: center;"><span data-dcnode-id="3975" style="font-size: 18pt; color: #800080;"><strong data-dcnode-id="3976"><span data-dcnode-id="3983" instrument_node="">[</span><span data-dcnode-id="3981" style="color: #003300;"><span data-dcnode-id="3982" instrument_node="">RECOMMENDED:</span></span><span data-dcnode-id="3980" instrument_node=""> </span><a data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//juleskalpauli.com/academy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3979" instrument_node="">HOW TO CREATE SUCCESS IN YOUR ONLINE MARKETING BUSINESS!</span></a><span data-dcnode-id="3977" instrument_node="">]</span></strong></span></p><hr data-dcnode-id="3973"><h3 data-dcnode-id="3972"></h3><h3 data-dcnode-id="3971"></h3><h3 data-dcnode-id="3965"><span data-dcnode-id="3966" style="color: #800080;"><strong data-dcnode-id="3967"><span data-dcnode-id="3969" style="font-size: 22pt;"><span data-dcnode-id="3970" instrument_node="">IF YOU WISH TO COME TO UK TO STAY:</span></span><span data-dcnode-id="3968" instrument_node="">&nbsp;</span></strong></span></h3><p data-dcnode-id="3962" style="text-align: justify;"><span data-dcnode-id="3963" style="font-size: 14pt;"><span data-dcnode-id="3964" instrument_node="">So now that the hoohah about Brexit is a little down and the pound is as strong as ever, I can’t help but update this post.</span></span></p><p data-dcnode-id="3959" style="text-align: justify;"><span data-dcnode-id="3960" style="font-size: 14pt;"><span data-dcnode-id="3961" instrument_node="">This is especially for those who would love not just to travel to UK, but to migrate for maybe work! I share some tips on what you can do and I am sure if you are a frequent UK traveller you will love this post!</span></span></p><p data-dcnode-id="3955" style="text-align: justify;"><span data-dcnode-id="3956" style="font-size: 18pt;"><strong data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Like all Important Things, Have a Plan</span></strong></span></p><p data-dcnode-id="3952" style="text-align: justify;"><span data-dcnode-id="3953" style="font-size: 14pt;"><span data-dcnode-id="3954" instrument_node="">If you don’t know where you are going how can you get there? So Very important: Know what you want from your trip or stay in UK and Make a PLAN! This may include the documentation you will need, Visas and the type of Jobs you want to do and their availability as well as skills you will need to access them!</span></span></p><p data-dcnode-id="3949" style="text-align: justify;"><span data-dcnode-id="3950" style="font-size: 14pt;"><span data-dcnode-id="3951" instrument_node="">FOCUS and RESEARCH are key here!</span></span></p><p data-dcnode-id="3945" style="text-align: justify;"><span data-dcnode-id="3946" style="font-size: 20pt;"><strong data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Have a Budget?</span></strong></span></p><p data-dcnode-id="3942" style="text-align: justify;"><span data-dcnode-id="3943" style="font-size: 14pt;"><span data-dcnode-id="3944" instrument_node="">Until you bag that job or unless you have a rich sponsor, you will need to have some money with you or access to credit. So, what is that minimum amount you can live on for at least 3 months? Make sure you have or can access it!</span></span></p><p data-dcnode-id="3934" style="text-align: justify;"><span data-dcnode-id="3935" style="font-size: 14pt;"><span data-dcnode-id="3941" instrument_node="">If you did your RESEARCH as advised above, you will have a job offer on the table, and hopefully somewhere to stay for free and </span><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/travel-like-a-local/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="3938"><u data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">live like a local</span></u></strong></a><span data-dcnode-id="3936" instrument_node="">, to start with. So, you won’t need much.</span></span></p><p data-dcnode-id="3931" style="text-align: justify;"><span data-dcnode-id="3932" style="font-size: 14pt;"><span data-dcnode-id="3933" instrument_node="">Otherwise, your minimum budget must be able to cover your meals, accommodation, and transport for 1-3 months. Meaning that to be on the safe side, you may need anything from £1500 – £3000 GBP.</span></span></p><p data-dcnode-id="3923" style="text-align: justify;"><span data-dcnode-id="3924" style="font-size: 14pt;"><span data-dcnode-id="3930" instrument_node="">This figure will vary, depending on your choice of city or destination within UK. London being the most expensive as a melting point. Of course, you must plan a </span><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pkjulesworld.com/experience-london-culture-one-weekend/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="3927"><u data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">London experience</span></u></strong></a><span data-dcnode-id="3925" instrument_node="">.</span></span></p><p data-dcnode-id="3920" style="text-align: justify;"><span data-dcnode-id="3921" style="font-size: 14pt;"><span data-dcnode-id="3922" instrument_node="">If you did not plan your accommodation, then you will need to get up and close with some online property search resources like:</span></span></p><p data-dcnode-id="3916" style="text-align: justify; padding-left: 60px;"><span data-dcnode-id="3917" style="font-size: 14pt;"><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rightmove.co.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3919" instrument_node="">Rightmove</span></a></span></p><p data-dcnode-id="3912" style="text-align: justify; padding-left: 60px;"><span data-dcnode-id="3913" style="font-size: 14pt;"><a data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spareroom.co.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3915" instrument_node="">SpareRoom</span></a></span></p><p data-dcnode-id="3908" style="text-align: justify; padding-left: 60px;"><span data-dcnode-id="3909" style="font-size: 14pt;"><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zoopla.co.uk/to-rent/flats/uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3911" instrument_node="">Zoopla</span></a></span></p><p data-dcnode-id="3904" style="text-align: justify; padding-left: 60px;"><span data-dcnode-id="3905" style="font-size: 14pt;"><a data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roombuddies.co.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3907" instrument_node="">Roombuddies</span></a></span></p><p data-dcnode-id="3898" style="text-align: justify;"><span data-dcnode-id="3899" style="font-size: 14pt;"><span data-dcnode-id="3903" instrument_node="">Meaning you wi
