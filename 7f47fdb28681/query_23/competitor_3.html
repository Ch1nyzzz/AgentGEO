</span><h1 class="entry-single-title" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">UK Immigration Rules Pre-Brexit</span></h1><span data-dcnode-id="1106" instrument_node="">
</span><div class="entry-post-meta clearfix" data-dcnode-id="1100"><span data-dcnode-id="1105" instrument_node="">
			 by </span><span class="author vcard" data-dcnode-id="1102"><a class="url fn n" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brexitlegalguide.co.uk/author/modified-public-sector-infomation/" rel="author" title="View all posts by Modified Public Information - See Note in Bottom Menu"><span data-dcnode-id="1104" instrument_node="">Modified Public Information - See Note in Bottom Menu</span></a></span><span data-dcnode-id="1101" instrument_node=""> </span></div><span data-dcnode-id="1099" instrument_node=""> </span><span data-dcnode-id="1097" instrument_node="">
</span><div class="entry-post-category" data-dcnode-id="1093"><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brexitlegalguide.co.uk/category/free-movement-citizens-rights/eu-26-citizens-in-uk/" title="View all posts in EU 26 Citizens in UK"><span class="category-item" data-dcnode-id="1095" style="background-color:#42586a"><span data-dcnode-id="1096" instrument_node="">EU 26 Citizens in UK</span></span></a></div><span data-dcnode-id="1092" instrument_node=""> </span><span data-dcnode-id="1090" instrument_node=""> </span></header><span data-dcnode-id="1088" instrument_node="">
</span><div class="entry-content page-content clearfix" data-dcnode-id="691"><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Summary</span></h3><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">This chapter sets out requirements for employer sponsorship under the general UK employment visa scheme. In effect, a sponsoring employer must have a UK base. If a trader’s employees were employed through such a base, this might preclude them being categorised as business visitors and may also impact on their personal taxation status.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">This chapter also sets out certain current UK immigration rules in relation to employers’ responsibilities, visa types and conditions. These rules change from time to time. This is the current set of rules applicable to third-country nationals. The purpose of setting out the rules is to state the worst-case scenario of full immigration controls in the UK, applying to EU 26 citizens.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><h3 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Sponsor Licence</span></h3><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">UK work visas are required for almost all employment of non-EU nationals in the UK. In almost all cases and particularly for the standard skills-based Visa, the employer must hold a sponsorship licence. In practice, it would be very difficult for a sponsorship licence to be obtained by an entity which is not UK established.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">A sponsorship licence is not required for a business visitor Visa.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">For a general migrant Visa, the UK sponsor must be a genuine organisation or sole trader operating legally in the UK. For an intracompany transfer, migrant there must be a UK entity was a direct link by common ownership or control with the overseas entity for the migrant is currently working.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">An employer&nbsp;needs a sponsor licence to employ someone from outside the European Economic Area (EEA) and Switzerland to work for the applicant in the UK. Sponsorship must be applied for. There are significant conditions and requirements.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The application is made on-line, and a prescribed fee is payable. The licence sponsor has certain duties including reporting certain matters to the Home Office including particulars of migrants, changes in circumstances, termination of employment absence and work et cetera. The strip typically sponsorship is a unique reference number. It does not guarantee that clearance visas will be given.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">The employer normally has to pay the immigration skills charge to the UK government to assign the certificate of sponsorship to a tier 2 general migrant worker to intracompany transfer migrant entry to work for six months or more. The size of the sponsor’s organisation and period of employment determines the fee. Smaller employers take £364 for the 1</span><sup data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">st</span></sup><span data-dcnode-id="1056" instrument_node=""> 12 months and £182 for each additional six months. Other sponsors pay £1000 for the first 12 months and £500 for each additional six months.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">The relevant UK guidance at present is here</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1048"><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/uk-visa-sponsorship-employers"><span data-dcnode-id="1050" instrument_node="">https://www.gov.uk/uk-visa-sponsorship-employers</span></a></p><span data-dcnode-id="1047" instrument_node="">
</span><h3 data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Licensing of Sponsors</span></h3><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Under the points-based system, an employer or education provider who wants to act as a sponsor needs a licence. When licensed, they are added to the register of sponsors. The register of sponsors lists the name, location and sponsor rating of every registered organisation.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Licensing depends on</span></p><span data-dcnode-id="1038" instrument_node="">
</span><ul data-dcnode-id="1030"><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">whether the business is eligible.</span></li><span data-dcnode-id="1034" instrument_node="">
</span><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">the type of licence the applicant wants to apply for – this will depend on what type of worker the applicant wants to sponsor.</span></li><span data-dcnode-id="1031" instrument_node="">
</span></ul><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The applicant is given a licence rating if his / her application is successful. He will be able to issue certificates of sponsorship if the applicant has jobs that are suitable for sponsorship. The licence will be valid for four years. The applicant may lose his / her license if the applicant doesn’t meet his / her responsibilities as a sponsor.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Licences can only be applied for if:</span></p><span data-dcnode-id="1023" instrument_node="">
</span><ul data-dcnode-id="1012"><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The potential sponsor is a legitimate organisation working within the law in the UK;</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">There are no reasons to believe that the potential sponsor is a threat to immigration control; and</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">the organisation will meet its sponsorship duties.</span></li><span data-dcnode-id="1013" instrument_node="">
</span></ul><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">These criteria are to ensure that those working or studying in the UK do so legally. If the potential sponsor is awarded a sponsor licence, they will be given a sponsor rating – this will be an ‘A rating’ or a ‘B rating’ and will be listed on the register. Instead of an A or B rating, Tier 4 (General) sponsors could apply for a Highly Trusted sponsor licence.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Points are awarded under the points-based system for the following:</span></p><span data-dcnode-id="1005" instrument_node="">
</span><ul data-dcnode-id="988"><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Qualifications (this ranges from GCSE A-Level equivalents to PHD’s);</span></li><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Future Expected Earnings (the salary that is received by the applicant);</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Sponsorship (the type of sponsorship);</span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">English language skills;</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Available maintenance (funds used to support)</span></li><span data-dcnode-id="989" instrument_node="">
</span></ul><span data-dcnode-id="987" instrument_node="">
</span><h3 data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Sponsors Obligations</span></h3><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Employers seeking to sponsor migrants have duties to:</span></p><span data-dcnode-id="981" instrument_node="">
</span><ol data-dcnode-id="964"><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">keep accurate and up-to-date records,</span></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">report changes in circumstances,</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">comply with the law,</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">co-operate with the UK Border Agency and</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">meet any additional tier-specific duties.</span></li><span data-dcnode-id="965" instrument_node="">
</span></ol><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Those duties last until either (a) the sponsoring employer notifies the UK Border Agency that the migrant has ceased to be in their employment, (b) when the migrant leaves the UK and their entry clearance or leave to remain lapses, (c) when the migrant is granted leave to remain with a different sponsor or in another immigration category, (d) if the sponsoring employer surrender their licence, or (e) the UK Border Agency revokes the licence.</span></p><span data-dcnode-id="960" instrument_node="">
</span><h3 data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Employment Visas</span></h3><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">In respect of non-EU nationals, the UK&nbsp;operates a points-based system of work visas. Tier 1 relates to self-employed persons. Tier 2 covers the majority of work-related visas. There is a cap on Tier 2 general visas. They are subject to the skills requirement and pay thresholds for the jobs concerned.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">There two routes; the short occupation list and the labour market test.&nbsp; Under the latter route, the employer – needs to show there is no suitable resident worker available to fill the post, having advertised it for a certain period. Jobs offered through the resident labour market test must meet skills and salary thresholds; £30,000 subject to occupations specific requirements.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Jobs under the shortage occupation list do not need to meet the resident market labour test and are subject to salary thresholds for each job, which may be lower than the above level. Each year two shortage occupation lists are published, one for the UK as a whole and one for Scotland only.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">There are six broad categories of employment visa described by reference to various tiers. Three are based on points namely those applicable</span></p><span data-dcnode-id="945" instrument_node="">
</span><ul data-dcnode-id="934"><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">to certain skilled workers who have been offered employment sponsored by an employer,</span></li><span data-dcnode-id="941" instrument_node="">
</span><li data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">high-value migrants including investors, entrepreneurs and exceptionally talented persons who may enter without a job offer and</span></li><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">temporary workers with a UK sponsoring employer participating in a youth mobility scheme</span></li><span data-dcnode-id="935" instrument_node="">
</span></ul><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Non-points-based visas are potentially applicable to certain categories including</span></p><span data-dcnode-id="930" instrument_node="">
</span><ul data-dcnode-id="919"><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Commonwealth citizens with UK ancestry (at least one grandparent born in the UK),</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">employees and business owners from Turkey wishing to establish a business or already employed in the UK,</span></li><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">certain other categories including representatives of overseas firms and businesses, domestic workers and others</span></li><span data-dcnode-id="920" instrument_node="">
</span></ul><span data-dcnode-id="918" instrument_node="">
</span><h3 data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Tier 2 (General) visa</span></h3><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Conditions for visa:</span></p><span data-dcnode-id="912" instrument_node="">
</span><ol data-dcnode-id="901"><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">offered a skilled job in the UK</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">from outside the European Economic Area (EEA) and Switzerland</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">employed by a licensed sponsor to apply to live in the UK.</span></li><span data-dcnode-id="902" instrument_node="">
</span></ol><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">His / her sponsor checks that the applicant can do the job they’re hiring the applicant for and if it qualifies the applicant for a visa. They’ll assign the applicant a certificate of sponsorship to prove this.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">The applicant can come to the UK with a Tier 2 (General) visa for a maximum of 5 years and 14 days, or the time given on his / her certificate of sponsorship plus 1 month, whichever is shorter.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">The applicant can start his / her stay up to 14 days before the start date on his / her certificate of sponsorship.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The applicant can:</span></p><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="868"><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">work for his / her sponsor in the job described in his / her certificate of sponsorship</span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">do a second job in certain circumstances</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">do voluntary work</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">study as long as it doesn’t interfere with the job sponsored for</span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">travel abroad and return to the UK</span></li><span data-dcnode-id="872" instrument_node="">
</span><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">bring family members</span></li><span data-dcnode-id="869" instrument_node="">
</span></ul><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">The applicant can’t:</span></p><span data-dcnode-id="864" instrument_node="">
</span><ul data-dcnode-id="853"><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">own more than 10% of his / her sponsor’s shares (unless the applicant earns more than £159,600 a year)</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">get public funds</span></li><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">apply for a second job until started working for his / her sponsor</span></li><span data-dcnode-id="854" instrument_node="">
</span></ul><span data-dcnode-id="852" instrument_node="">
</span><h3 data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Tier 2 (Intra-company Transfer) visa:</span></h3><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Conditions for visa:</span></p><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="835"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">his / her overseas employer has offered the applicant a role in a UK branch of the organisation</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">from outside the European Economic Area (EEA) and Switzerland</span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">the applicant meets the other eligibility requirements</span></li><span data-dcnode-id="836" instrument_node="">
</span></ul><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The applicant needs to be employed by a licensed sponsor to apply to live in the UK.&nbsp; His / her sponsor checks that the applicant can do the job they’re hiring the applicant for and if it qualifies the applicant for a visa. They’ll assign the applicant a certificate of sponsorship to prove this.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">They must also give the applicant other information the applicant needs when the applicant applies, for example, how much paid.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">There are two types of Intra-company Transfer visa.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Long-term Staff -if transferring into a role that requires the applicant to have had previous experience working for the company.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Graduate Trainee&nbsp;This visa is for transfers into graduate trainee programmes for specialist roles. The applicant needs to be a recent graduate with at least three months’ experience with his / her employer overseas.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The applicant can come to the UK with a Tier 2 (Intra-company Transfer) visa for up to the maximum stay allowed for his / her visa type, or the time given on his / her certificate of sponsorship, whichever is shorter.&nbsp;The maximum stay for each type of Tier 2 (Intra-company Transfer) visa is:</span></p><span data-dcnode-id="816" instrument_node="">
</span><ul data-dcnode-id="808"><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Long-term Staff (if the applicant earn more than £120,000 a year): 9 years</span></li><span data-dcnode-id="812" instrument_node="">
</span><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Long-term Staff (if the applicant earn less than £120,000 a year): 5 years, 1 month</span></li><span data-dcnode-id="809" instrument_node="">
</span></ul><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Graduate Trainee: 12 months</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The applicant can start his / her stay up to 14 days before the start date on his / her certificate of sponsorship.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">The applicant can:</span></p><span data-dcnode-id="798" instrument_node="">
</span><ul data-dcnode-id="778"><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">work for his / her sponsor in the job described in his / her certificate of sponsorship</span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">do a second job in the same profession and at the same level as his / her main job for up to 20 hours per week</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">do voluntary work</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">study as long as it doesn’t interfere with the job sponsored for</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">travel abroad and return to the UK</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">bring family members</span></li><span data-dcnode-id="779" instrument_node="">
</span></ul><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">The applicant can’t:</span></p><span data-dcnode-id="774" instrument_node="">
</span><ul data-dcnode-id="766"><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">get public funds</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">start working before the applicant get a visa</span></li><span data-dcnode-id="767" instrument_node="">
</span></ul><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Other Conditions</span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">It is usually a condition of leave that the person does not have recourse to public funds. This may be obliged to register with the police if this is required under the immigration rules.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Generally, a migrant must have a job offer from a UK based licence employer that fills a recognised gap in the UK labour market. Job must be on a list of occupations in accordance with codes of practice which are one of a specified number of occupations or on the shortage occupation list.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">A Tier 2 migrant must be able to demonstrate he can support himself in the UK. He must not have been in the UK with entry clearance or leave to remain as a Tier 2 migrant any time within 12 months before the date of the application other than under certain conditions including gross salary &gt; £120,000 certain intracompany transfers or in respect of certain short assignments.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Applicants must pay the immigration health surcharge for themselves and any dependents.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">A tier 2 general migrant Visa may be granted a visa for five years and one month. The person may thereafter apply for settlement.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">There are rules on intracompany transfers which differ in some respects might be relevant if traders had an Irish and UK company.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">The shortage occupation list is published. The resident labour market test requires certain advertisements for the job and a failure to recruit a suitably qualified settled worker.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">For an intracompany transfer worker, there must be at least the appropriate annual salary of £30,000 or more and a certificate of sponsorship.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">If the gross annual salary is below £73,900 no points will be awarded unless the applicant has been working outside the UK for at least 12 months in a business established outside the territory of the UK which is linked by common ownership/control of the sponsor, in order to meet the requisite 50 points threshold.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">No points are awarded for a certificate of sponsorship if the Secretary of State has reasonable grounds to believe that the job described in the application is not a genuine vacancy or the stated requirements are inappropriate or have been tailored to exclude resident workers.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">The government has also imposed overall limits on the number of tier 2 certificates of sponsorship that may be granted.</span></p><span data-dcnode-id="729" instrument_node="">
