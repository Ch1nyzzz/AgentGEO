</span><div contenteditable="false" data-beyondwords-player="true" data-dcnode-id="1273"></div><h5 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Ferret Fact Service first answered this question in 2017, when Nicola Sturgeon asked Theresa May for the power to hold a second referendum. Now the debate has moved on, we have updated our piece with new context.</span></h5><span data-dcnode-id="1270" instrument_node="">
</span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/ferret-fact-service/"><span data-dcnode-id="1269" instrument_node="">
</span><img alt="Ferret Fact Service | Scotlands impartial fact check project" class="aligncenter size-full wp-image-12934 lazyloaded" data-dcnode-id="1268" data-src="https://ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png?strip=all&amp;lossy=0&amp;resize=701%2C152&amp;ssl=1" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png%3Fstrip%3Dall%26lossy%3D0%26resize%3D701%252C152%26ssl%3D1&amp;raw" width="701"><noscript data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">&lt;img src="https://ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png?strip=all&amp;lossy=0&amp;resize=701%2C152&amp;ssl=1" alt="Ferret Fact Service | Scotlands impartial fact check project" width="701" height="152" class="aligncenter size-full wp-image-12934" data-eio="l"&gt;</span></noscript></a><span data-dcnode-id="1264" instrument_node=""> </span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1259"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">The First Minister has set out her plans for securing a second referendum, saying they would “focus on building and winning the political case for independence.”</span></strong></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1257" instrument_node="">The </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/uk-scotland-scotland-politics-51311288" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1256" instrument_node="">speech</span></a><span data-dcnode-id="1254" instrument_node=""> comes after Boris Johnson </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/857586/Nicola_Sturgeon_20200114.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1253" instrument_node="">denied her request</span></a><span data-dcnode-id="1251" instrument_node=""> for a section 30 order. This would transfer to Scotland the power to hold a referendum. </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/tag/nicola-sturgeon/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1250" instrument_node="">Nicola Sturgeon</span></a><span data-dcnode-id="1248" instrument_node=""> had said </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/uk-scotland-scotland-politics-50813510" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1247" instrument_node="">she would push</span></a><span data-dcnode-id="1245" instrument_node=""> for a referendum to take place in 2020.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">She previously asked Westminster for this in 2017, but was </span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parliament.uk/business/news/2017/march/prime-ministers-questions-29-march-2017/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1241" instrument_node="">rejected</span></a><span data-dcnode-id="1239" instrument_node=""> by then-Prime Minister Theresa May.</span></p><div class="thefe-41928989994e55cc7f9f39c256ec5998 thefe-3rd-paragraph" data-dcnode-id="1237" id="thefe-41928989994e55cc7f9f39c256ec5998"></div><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Since then there have been increasing calls from some supporters and party representatives to explore possible ways to gain independence without requiring Westminster’s permission.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Section 30</span></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">The formal route to a second referendum is through a section 30 order, which Sturgeon asked Johnson for at the </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heraldscotland.com/news/18112732.text-nicola-sturgeons-indyref2-letter-revealed/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1228" instrument_node="">end of 2019</span></a><span data-dcnode-id="1226" instrument_node="">.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">Constitutional matters – which include the </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/1998/46/schedule/5" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1222" instrument_node="">union</span></a><span data-dcnode-id="1220" instrument_node=""> of Scotland and England – are considered to be ‘reserved’, meaning that the Scottish Parliament does not have the power to make laws relating to these areas.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">But section 30 of the </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/1998/46/contents" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1216" instrument_node="">Scotland Act 1998</span></a><span data-dcnode-id="1214" instrument_node=""> allows the UK government to temporarily transfer power to the Scottish Parliament to legislate for a referendum.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1211" instrument_node="">Crucially, a section 30 order can only be introduced to the Westminster parliament by the UK government, and is not </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2017/03/13/stephen-tierney-a-second-independence-referendum-in-scotland-the-legal-issues/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1210" instrument_node="">legally obliged</span></a><span data-dcnode-id="1208" instrument_node=""> to do so. This allows the Prime Minister to </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/857586/Nicola_Sturgeon_20200114.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1207" instrument_node="">reject a section 30</span></a><span data-dcnode-id="1205" instrument_node=""> as Johnson has done.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">He said he “cannot agree to any request for a transfer of power that would lead to further independence referendums”, suggesting that Sturgeon and her predecessor, Alex Salmond, had promised that the last referendum would be a “once in a generation” vote.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1199" instrument_node="">A section 30 was used in 2012 to allow Scotland’s last </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/asp/2013/14/contents" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1198" instrument_node="">independence referendum</span></a><span data-dcnode-id="1196" instrument_node="">, which took place two years later in 2014.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">Even if a new section 30 order were approved and a referendum went ahead, it would be an </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publications.parliament.uk/pa/ld201314/ldselect/ldconst/188/18806.htm%23n54" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1192" instrument_node="">advisory</span></a><span data-dcnode-id="1190" instrument_node=""> rather than legally binding referendum, meaning that a change in the legal status of Scotland would still depend on further negotiation with the UK and legislation in both parliaments.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><blockquote class="wp-embedded-content" data-dcnode-id="1184" data-secret="HQNhhgyz1f" style="display: none;"><p data-dcnode-id="1185"><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/independent-scotland-join-the-euro/"><span data-dcnode-id="1187" instrument_node="">Claim an independent Scotland would need to join the euro is Mostly False</span></a></p></blockquote><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><iframe class="wp-embedded-content lazyloaded" data-dcnode-id="1182" data-secret="HQNhhgyz1f" data-src="https://theferret.scot/independent-scotland-join-the-euro/embed/#?secret=HQNhhgyz1f" frameborder="0" height="555" marginheight="0" marginwidth="0" sandbox="allow-scripts" scrolling="no" security="restricted" title="“Claim an independent Scotland would need to join the euro is Mostly False” — The Ferret" width="600"></iframe></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">This is the case with most UK referendums, except for the </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/2011/1/section/8/enacted" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1178" instrument_node="">2011 alternative vote referendum</span></a><span data-dcnode-id="1176" instrument_node=""> which explicitly required the government to change the law based on the result.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">In 2012, Alex Salmond and David Cameron negotiated the terms of a section 30 order in the Edinburgh Agreement, which was then debated and approved by the UK parliament.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1170" instrument_node="">The Scottish Parliament passed a bill which set a “</span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/news/approval-for-referendums-bill/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1169" instrument_node="">legislative framework</span></a><span data-dcnode-id="1167" instrument_node="">” for any future referendum, and in 2017 a </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parliament.scot/parliamentarybusiness/28877.aspx%3FSearchType%3DAdvance%26ReferenceNumbers%3DS5M-04710%26ResultsPerPage%3D10" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1166" instrument_node="">motion on a second referendum</span></a><span data-dcnode-id="1164" instrument_node=""> was passed at Holyrood with the support of the SNP and Scottish Greens.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><h3 data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Does she need a section 30?</span></h3><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">It is the preference of Sturgeon to gain a section 30 agreement before holding a second referendum. So far, the First Minister has resisted calls for another route to be explored, and in her speech at the end of January she again </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/uk-scotland-scotland-politics-51311288" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1157" instrument_node="">called for patience</span></a><span data-dcnode-id="1155" instrument_node=""> and said any referendum “must be legal and legitimate”.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Her comments suggested that a second referendum was unlikely in 2020, and her government may push for a new vote after the next Scottish Parliament election in 2021, should the SNP be victorious.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">The claim to legality depends largely on how the Scottish Parliament’s power over “reserved matters” is interpreted. These </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pages.citebite.com/m5v8d3l3r5axn" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1148" instrument_node="">differences of interpretation</span></a><span data-dcnode-id="1146" instrument_node=""> can only be determined by the courts.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1143" instrument_node="">While it is widely held that a referendum relating to Scottish independence requires approval from Westminster, this has yet to be tested in court. The Scottish Government has </span><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instituteforgovernment.org.uk/explainers/second-referendum-scottish-independence" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1142" instrument_node="">not explicitly conceded</span></a><span data-dcnode-id="1140" instrument_node=""> that a second vote could not be held without approval from the UK Parliament, and a number of experts have concluded that the matter is not </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitution-unit.com/2017/03/22/a-second-scottish-independence-referendum-without-a-s-30-order-a-legal-question-that-demands-a-political-answer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1139" instrument_node="">legally settled</span></a><span data-dcnode-id="1137" instrument_node="">.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">What other routes are there?</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1131" instrument_node="">According to legal expert Nick McKerrell, a&nbsp;</span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/scottish-referendum-the-law-may-not-be-on-snps-side-but-boris-johnsons-refusal-makes-for-increasingly-unstable-union-129121" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1130" instrument_node="">referendum bill</span></a><span data-dcnode-id="1128" instrument_node=""> could be introduced into the Scottish Parliament regardless.&nbsp; The Presiding Officer could then decide the bill falls outside the </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legislation.gov.uk/ukpga/1998/46/section/31" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1127" instrument_node="">legislative powers of Holyrood</span></a><span data-dcnode-id="1125" instrument_node=""> although this may not prevent the parliament from debating it.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">If a referendum bill were debated and passed, it would then be open to legal challenge by any citizen based in Scotland or organisation directly affected by Scots law. For example, in 2016 the UK Supreme Court, which has the power to overrule the Scottish Government, </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parliament.scot/ResearchBriefingsAndFactsheets/S5/SB_16-66_Named_Person.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1121" instrument_node="">blocked the “named person” scheme</span></a><span data-dcnode-id="1119" instrument_node=""> until it had been amended.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">If the bill went unchallenged in Scotland, the UK government could then </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parliament.scot/parliamentarybusiness/Bills/25685.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1115" instrument_node="">refuse to send it</span></a><span data-dcnode-id="1113" instrument_node=""> for royal assent and instead ask the Supreme Court to rule on its legality.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1110" instrument_node="">A consultative referendum has been suggested as an option by a number of </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2012/01/31/gavin-anderson-et-al-the-independence-referendum-legality-and-the-contested-constitution-widening-the-debate/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1109" instrument_node="">constitutional</span></a><span data-dcnode-id="1107" instrument_node=""> experts. Stephen Tierney from Edinburgh Law School </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2012/01/31/gavin-anderson-et-al-the-independence-referendum-legality-and-the-contested-constitution-widening-the-debate/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1106" instrument_node="">has suggested</span></a><span data-dcnode-id="1104" instrument_node=""> there is a “plausible, albeit far from irrefutable” argument that the power to hold referendums could be with the Scottish Parliament.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">Another option, should the UK government continue to refuse to issue a section 30 order, would be a </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2020/01/13/chris-mccorkindale-and-aileen-mcharg-constitutional-pathways-to-a-second-scottish-independence-referendum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1100" instrument_node="">legal challenge</span></a><span data-dcnode-id="1098" instrument_node="">. Constitutional experts Aileen McHarg and Chris McCorkindale have concluded that this would be very unlikely to succeed, as “there is no duty to make a section 30 order, still less to introduce primary legislation”.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">There is a recognition under international law that national minorities have a right to self-determination, including leaving a “parent state”. But given Scotland already has significant autonomy and political representation, McHarg and McCorkindale </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2020/01/13/chris-mccorkindale-and-aileen-mcharg-constitutional-pathways-to-a-second-scottish-independence-referendum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1094" instrument_node="">argue this does not apply</span></a><span data-dcnode-id="1092" instrument_node="">.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">There’s also the option of an “extra-legal” referendum, meaning it would be without the authorisation of either the UK or Scottish parliaments.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1086" instrument_node="">Attempts by Catalonian nationalists to engineer its independence from Spain are often used as a </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-europe-38582121" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1085" instrument_node="">potential parallel</span></a><span data-dcnode-id="1083" instrument_node=""> for such a move. The autonomous community held an unofficial referendum in 2014 which was found to be </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abc.es/gestordocumental/uploads/nacional/FALLO.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1082" instrument_node="">unconstitutional</span></a><span data-dcnode-id="1080" instrument_node="">.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">But while the UK government previously agreed to a referendum, the Spanish government has consistently opposed Catalonia’s calls for independence and the Spanish constitution </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lamoncloa.gob.es/documents/constitucion_es1.pdf%23page%3D14" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1076" instrument_node="">stated</span></a><span data-dcnode-id="1074" instrument_node=""> that regions cannot unilaterally hold referendums.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">In Scotland’s case an extra-legal referendum looks unlikely. There is no precedent for this on a national level in the UK, so it would be extremely complex legally and there appears to be little appetite for such a vote.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><blockquote class="wp-embedded-content" data-dcnode-id="1065" data-secret="gK79aFeMvZ" style="display: none;"><p data-dcnode-id="1066"><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/ffs-estimating-crowds-indyref-brexit/"><span data-dcnode-id="1068" instrument_node="">FFS explains: estimating the crowds at Scottish independence and anti-Brexit marches</span></a></p></blockquote><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><iframe class="wp-embedded-content lazyloaded" data-dcnode-id="1063" data-secret="gK79aFeMvZ" data-src="https://theferret.scot/ffs-estimating-crowds-indyref-brexit/embed/#?secret=gK79aFeMvZ" frameborder="0" height="292" marginheight="0" marginwidth="0" sandbox="allow-scripts" scrolling="no" security="restricted" title="“FFS explains: estimating the crowds at Scottish independence and anti-Brexit marches” — The Ferret" width="600"></iframe></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1060" instrument_node="">A further option which has been debated among supporters and promoted by some senior figures in the independence movement is the </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenational.scot/news/17958232.rebels-plot-bit-independence-plan-b-snp-agenda/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1059" instrument_node="">‘plan B’ option</span></a><span data-dcnode-id="1057" instrument_node="">. This would seek to use a pro-independence majority at the 2021 Holyrood elections as a </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2020/01/13/chris-mccorkindale-and-aileen-mcharg-constitutional-pathways-to-a-second-scottish-independence-referendum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1056" instrument_node="">mandate for independence</span></a><span data-dcnode-id="1054" instrument_node="">, and start negotiations with the UK government on that basis.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">This has been rejected by party members at the SNP conference and is not supported by the leadership. It also requires the UK Government to agree to talks over Scottish secession, and </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukconstitutionallaw.org/2020/01/13/chris-mccorkindale-and-aileen-mcharg-constitutional-pathways-to-a-second-scottish-independence-referendum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" instrument_node="">may be less likely</span></a><span data-dcnode-id="1048" instrument_node=""> to be accepted by the international community.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Verdict</span></h3><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Nicola Sturgeon could opt to push a referendum bill through parliament without a section 30 order, or begin a legal challenge against the UK government, but neither option would necessarily succeed. While it is theoretically possible that a vote could go ahead without Westminster’s permission, it would likely run into significant legal challenges and it appears unlikely that the result would be respected by the UK or international community.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/ferret-fact-service/"><span data-dcnode-id="1039" instrument_node="">
</span><img alt="Ferret Fact Service | Scotlands impartial fact check project" class="aligncenter size-full wp-image-12934 ls-is-cached lazyloaded" data-dcnode-id="1038" data-src="https://ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png?strip=all&amp;lossy=0&amp;resize=701%2C152&amp;ssl=1" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png%3Fstrip%3Dall%26lossy%3D0%26resize%3D701%252C152%26ssl%3D1&amp;raw" width="701"><noscript data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&lt;img src="https://ez9mxwef6ut.exactdn.com/wp-content/uploads/2017/04/ffs_banner_red1__3_.png?strip=all&amp;lossy=0&amp;resize=701%2C152&amp;ssl=1" alt="Ferret Fact Service | Scotlands impartial fact check project" width="701" height="152" class="aligncenter size-full wp-image-12934" data-eio="l"&gt;</span></noscript></a><span data-dcnode-id="1034" instrument_node=""> </span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">

</span><p data-dcnode-id="1009"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Note:</span></strong><span data-dcnode-id="1010" instrument_node=""> An earlier version of this factcheck said that the Holyrood Presiding Officer could prevent a Bill from being debated in the Scottish Parliament, if they conclude that a Bill falls outwith the devolved powers of the chamber. This is not correct. The correction was made on the same day of publication, 7 February 2020.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><div class="related_content" data-dcnode-id="976" style="clear:both;"><h3 class="widget-title" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">More like this</span></h3><span data-dcnode-id="1005" instrument_node="">
</span><ul class="related-posts" data-dcnode-id="979"><span data-dcnode-id="1004" instrument_node="">
</span><li class="related-post" data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">
</span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theferret.scot/independent-scotland-queue-eu-membership/"><span data-dcnode-id="1002" instrument_node="">Would an independent Scotland have to join a queue for EU membership?</span></a><span data-dcnode-id="1000" instrument_node="">
</span></li><span data-dcnode-id="998" instrument_node="">
</span><li class="related-post" data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">

</span></footer><span data-dcnode-id="811" instrument_node="">
</span><div class="comment-content" data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">This is a valuable authoritative overview of the Scottish independence legal debate, which explains why persistent SNP demands for a second referendum are unlikely to be successful on legal grounds. More importantly the 2014 independence referendum revealed that the SNP and their supporters for leave produced a total of approximately 1.7 million votes. The vote to remain as part of the UK was over 2.o million votes. In the 2016 EU referendum the SNP and others vote to remain part of the EU securing some 1.7 million and where just over 1.0 million voted to leave.  In the 2019 general election 1.242,380 million Scots vote for the SNP with 1.467,930 voted for other parties. The Scots have always supported socialism and the SNP have moved their policies to the left of Labour to gain support in Scotland and this encourages mistakenly the 1.7 million SNP voters that Scotland at large supports their ambition for an independent Scotland. In a second referendum the nearly half million Scots who voted in the the 2014 referendum to remain but did not vote  in the 2016 EU referendum would vote once again to remain</span></p><span data-dcnode-id="807" instrument_node="">
</span></div><span data-dcnode-id="805" instrument_node="">

</span></footer><span data-dcnode-id="777" instrument_node="">
</span><div class="comment-content" data-dcnode-id="772"><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Marcus, a lot of the half million who voted ‘no’ to Scottish Independence but did not vote in the 2016 EU referrendum were EU citizens (or some 16 year olds who could vote in 2014 who might have been still under age in 2016 under the EU referendum rules)  EU citizens, some of whom had lived in the country for 40 or 50 years or more were allowed to vote in 2014 but not allowed to vote in 2016. They were promised the best way of staying in the EU was to vote ‘no’  but not given a vote in 2016. They would mainly now vote ‘yes’. That is why Boris is so risk averse.</span></p><span data-dcnode-id="773" instrument_node="">
