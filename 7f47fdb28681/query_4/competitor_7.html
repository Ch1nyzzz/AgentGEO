</span><meta content="Theresa May became prime minister in July 2016 as a direct result of the Brexit referendum. This article examines her political inheritance and leadership in the immediate wake of the vote. It analyses the factors that led to her victory in the ensuing Tory leadership contest and explores both the main challenges that confronted her and the main features of her response to them. During her first 9&amp;nbsp;months in office, May gave effect to the referendum, defined Brexit as entailing Britain’s removal from membership of the European Union’s single market and customs union and sought to reposition her party. However, her failure to secure a majority in the 2017 general election gravely weakened her authority and the viability of her plans. At time of writing, it is unclear how much longer her premiership can last or if she will be able to exercise effective leadership over Brexit." data-dcnode-id="2502" name="dc.description"><span data-dcnode-id="2501" instrument_node="">

</span><meta content="‘Brexit means Brexit’: Theresa May and post-referendum British politics - British Politics" data-dcnode-id="2294" property="og:title"><span data-dcnode-id="2293" instrument_node="">
</span><meta content="Theresa May became prime minister in July 2016 as a direct result of the Brexit referendum. This article examines her political inheritance and leadership in the immediate wake of the vote. It analyses the factors that led to her victory in the ensuing Tory leadership contest and explores both the main challenges that confronted her and the main features of her response to them. During her first 9 months in office, May gave effect to the referendum, defined Brexit as entailing Britain’s removal from membership of the European Union’s single market and customs union and sought to reposition her party. However, her failure to secure a majority in the 2017 general election gravely weakened her authority and the viability of her plans. At time of writing, it is unclear how much longer her premiership can last or if she will be able to exercise effective leadership over Brexit." data-dcnode-id="2292" property="og:description"><span data-dcnode-id="2291" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="819" data-track-component="article body"><span data-dcnode-id="1865" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1858" data-gtm-vis-first-on-screen-50443292_562="750" data-gtm-vis-first-on-screen-50443292_563="751" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="750" data-gtm-vis-recent-on-screen-50443292_563="751" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1859" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1863" id="Abs1"><span data-dcnode-id="1864" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1860" id="Abs1-content"><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Theresa May became prime minister in July 2016 as a direct result of the Brexit referendum. This article examines her political inheritance and leadership in the immediate wake of the vote. It analyses the factors that led to her victory in the ensuing Tory leadership contest and explores both the main challenges that confronted her and the main features of her response to them. During her first 9&nbsp;months in office, May gave effect to the referendum, defined Brexit as entailing Britain’s removal from membership of the European Union’s single market and customs union and sought to reposition her party. However, her failure to secure a majority in the 2017 general election gravely weakened her authority and the viability of her plans. At time of writing, it is unclear how much longer her premiership can last or if she will be able to exercise effective leadership over Brexit.</span></p></div></div></section><span data-dcnode-id="1857" instrument_node="">
</span><section data-dcnode-id="1820" data-gtm-vis-first-on-screen-50443292_562="750" data-gtm-vis-first-on-screen-50443292_563="751" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="750" data-gtm-vis-recent-on-screen-50443292_563="751" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1821" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1855" id="Sec1"><span data-dcnode-id="1856" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1822" id="Sec1-content"><p data-dcnode-id="1844"><span data-dcnode-id="1854" instrument_node="">According to an old university friend, Theresa May had once wanted to be Britain’s first female prime minister (Weaver </span><a aria-label="Reference 2016" data-dcnode-id="1852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d80415175e268" title="Weaver, M. 2016. Theresa May nursed ambition to be Britain’s first female PM. The Guardian, 12 July."><span data-dcnode-id="1853" instrument_node="">2016</span></a><span data-dcnode-id="1851" instrument_node="">). After David Cameron resigned as Conservative party leader and prime minister in the wake of the June 2016 Brexit referendum, she became Britain’s second. The premiership stands at the apex of the British political system and confers on its holder great prestige, a place in the history books and enormous potential influence (King </span><a aria-label="Reference 1991" data-dcnode-id="1849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d80415175e271" title="King, A. 1991. The British prime ministership in the age of the career politician. West European Politics 14 (2): 25–47."><span data-dcnode-id="1850" instrument_node="">1991</span></a><span data-dcnode-id="1848" instrument_node="">). It is the job that most ambitious career politicians want (Riddell </span><a aria-label="Reference 1993" data-dcnode-id="1846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d80415175e274" title="Riddell, P. 1993. Honest opportunism: The rise of the career politician. London: Hamish Hamilton."><span data-dcnode-id="1847" instrument_node="">1993</span></a><span data-dcnode-id="1845" instrument_node="">). In becoming prime minister, May achieved her lifelong ambition but her prize resembled a poisoned chalice. She would now be&nbsp;responsible for leading a government committed to taking the country out of the European Union (EU).</span></p><p data-dcnode-id="1836"><span data-dcnode-id="1843" instrument_node="">While the referendum’s outcome may have been advisory in a strictly legal sense, it was politically binding on the new prime minister. The 2015 Conservative manifesto had committed the party to respecting the result, the campaign had been fought in that spirit, and Cameron’s government, of which May had been part, had promptly accepted the&nbsp;electorate’s decision. Despite having campaigned against leaving the EU, May was now&nbsp;obliged to pursue this goal. Achieving it, however, would be fraught with difficulty. The paving legislation for the referendum had not explicitly authorised the government to give effect to the result, the vote in favour of leaving the EU had been won by narrow margin, and three-quarters of MPs had campaigned against Brexit (BBC News </span><a aria-label="Reference 2016" data-dcnode-id="1841" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d80415175e280" title="BBC News. 2016. EU vote: Where the cabinet and other MPs stand, 22 June. 
                    http://www.bbc.co.uk/news/uk-politics-eu-referendum-35616946
                    
                  . Accessed 13 September 2016."><span data-dcnode-id="1842" instrument_node="">2016</span></a><span data-dcnode-id="1840" instrument_node="">). To cap it all, no one was prepared for what would come next, and there was little consensus in either May’s party or the country as to what </span><i data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">should</span></i><span data-dcnode-id="1837" instrument_node=""> come next. The political and practical difficulties of delivering Brexit threatened to overwhelm the new prime minister.</span></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">This article examines May’s political inheritance and response to the Brexit vote. It focuses primarily on the period up to her fateful decision in April 2017 to call an early general election. No assessment of May’s response to the referendum would be complete without reference to the subsequent loss of her parliamentary majority and her return at the head of a minority government, but nor should it be distorted by these events. During her first 9&nbsp;months in office, she showed herself to be cautious but dogged in pursuit of delivering Brexit. She provided her government and party with a sense of direction in the chaotic wake of the referendum, and she succeeded in overcoming the initial challenge of giving effect to its result. It should also be remembered that her party’s share of the vote in 2017 increased by 5.5 percentage points on what Cameron had achieved in 2015. Had the vagaries of Britain’s voting system been kinder to the Conservatives, the course of events, and evaluations of May’s leadership, might have been very different.</span></p><p data-dcnode-id="1823"><span data-dcnode-id="1833" instrument_node="">On this last point, expert surveys suggest that the most successful prime ministers are considered to be those who provide clear leadership at times of national emergency and/or set the political agenda for years to come (see Theakston </span><a aria-label="Reference 2013" data-dcnode-id="1831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d80415175e292" title="Theakston, K. 2013. Evaluating prime-ministerial performance: The British experience. In Understanding prime-ministerial performance: Comparative perspective, ed. P. Strangio, P. ‘t Hart, and J. Walter, 221–241. Oxford: Oxford University Press."><span data-dcnode-id="1832" instrument_node="">2013</span></a><span data-dcnode-id="1830" instrument_node="">). It also helps if prime ministers win elections (see Buller and James </span><a aria-label="Reference 2012" data-dcnode-id="1828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d80415175e295" title="Buller, J., and T.S. James. 2012. Statecraft and the assessment of national political leaders: The case of New Labour and Tony Blair. British Journal of Politics and International Relations 14 (4): 534–555."><span data-dcnode-id="1829" instrument_node="">2012</span></a><span data-dcnode-id="1827" instrument_node="">). Had the Tories won convincingly in June 2017, May could perhaps have joined the likes of Clement Attlee and Margaret Thatcher on the list of political ‘weather-makers’ (Hennessy </span><a aria-label="Reference 2000" data-dcnode-id="1825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d80415175e298" title="Hennessy, P. 2000. The prime minister: The office and its holders since 1945. London: Allen Lane."><span data-dcnode-id="1826" instrument_node="">2000</span></a><span data-dcnode-id="1824" instrument_node="">, p. 531) by leading Britain out of the EU on the terms she had defined. Instead, she now looks set to join the list of prime ministerial failures. At time of writing, it remains to be seen what fate has in store for the remainder of May’s premiership, including how long it will last, but it would be an enormous turnaround if she were able to resurrect her long-term prospects in the wake of the election and her catastrophic loss of authority.</span></p></div></div></section><section data-dcnode-id="1747" data-gtm-vis-first-on-screen-50443292_562="750" data-gtm-vis-first-on-screen-50443292_563="751" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="750" data-gtm-vis-recent-on-screen-50443292_563="751" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="A vacancy in Downing Street"><div class="c-article-section" data-dcnode-id="1748" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1818" id="Sec2"><span data-dcnode-id="1819" instrument_node="">A vacancy in Downing Street</span></h2><div class="c-article-section__content" data-dcnode-id="1749" id="Sec2-content"><p data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">It was virtually impossible for David Cameron to continue as prime minister after nearly 52% of voters opted for Britain to leave the EU in the June 2016 referendum. He announced his resignation within hours, asserting that ‘fresh leadership’ was required to implement the result (Keate et al. </span><a aria-label="Reference 2016" data-dcnode-id="1815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d80415175e309" title="Keate, G., G. Paton, and J. Sherman. 2016. I’ll steady the ship but I can’t be its captain. The Times, 25 June."><span data-dcnode-id="1816" instrument_node="">2016</span></a><span data-dcnode-id="1814" instrument_node="">). While Cameron would remain in office until the Tories elected a new leader, his announcement multiplied a post-referendum sense of uncertainty. No one seemed to be in control.</span></p><p data-dcnode-id="1805"><span data-dcnode-id="1812" instrument_node="">The ensuing leadership contest was conducted according to rules introduced in 1998 in William Hague’s </span><i data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Fresh Future</span></i><span data-dcnode-id="1809" instrument_node=""> reforms (see Quinn </span><a aria-label="Reference 2012" data-dcnode-id="1807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d80415175e318" title="Quinn, T. 2012. Electing and ejecting party leaders in Britain. Basingstoke: Palgrave Macmillan."><span data-dcnode-id="1808" instrument_node="">2012</span></a><span data-dcnode-id="1806" instrument_node="">, pp. 97–130). Aspiring candidates would first need to be nominated by two Conservative MPs. Successful nominees would then participate in a series of eliminative parliamentary ballots, which would whittle the field down to two. Finally, these two candidates would face each other in a simple ballot of all Conservative party members.</span></p><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Befitting the unusual circumstances of the contest, there was a dramatic twist even before nominations closed. Boris Johnson, the ambitious former mayor of London and a high-profile Leave campaigner, was set to run but suddenly withdrew after Michael Gove, the justice secretary, fellow Leaver and Johnson’s own campaign manager, denounced him and announced his own candidacy. Facing a likely defeat, Johnson withdrew from the race. In the event, five candidates were nominated: Gove himself; Liam Fox, a former defence secretary and another Leave campaigner; Andrea Leadsom, the energy minister and yet another Leave campaigner; Stephen Crabb, the work and pensions secretary and a supporter of remaining in the EU; and Theresa May, the home secretary and a seemingly lukewarm Remainer.</span></p><p data-dcnode-id="1795"><span data-dcnode-id="1802" instrument_node="">The first round of voting among Tory MPs was held on 5 July. May established herself as the clear frontrunner, receiving just over half the votes cast (165 out of 329). Leadsom (66 votes) was a distant second, ahead of Gove (48 votes) in third. Fox (16 votes) came last and was duly eliminated, while fourth-placed Crabb (34 votes) also withdrew (Elliott </span><a aria-label="Reference 2016a" data-dcnode-id="1800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d80415175e327" title="Elliott, F. 2016a. May storms into lead as rivals battle for No 10. The Times, 6 July."><span data-dcnode-id="1801" instrument_node="">2016a</span></a><span data-dcnode-id="1799" instrument_node="">). May, Leadsom and Gove then went through to a second round of voting among MPs on 7 July. May picked up nearly three-dozen votes, giving her the backing of more than 60% of the Conservative parliamentary party (199 out of 329 votes cast). Leadsom (84 votes) picked up some additional support, whereas Gove (46 votes) lost ground (Elliott </span><a aria-label="Reference 2016b" data-dcnode-id="1797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d80415175e330" title="Elliott, F. 2016b. Leadsom steps from the shadows to take on May. The Times, 8 July."><span data-dcnode-id="1798" instrument_node="">2016b</span></a><span data-dcnode-id="1796" instrument_node="">). Gove’s elimination from the contest meant that May and Leadsom would proceed to a ballot of party members.</span></p><p data-dcnode-id="1775"><span data-dcnode-id="1794" instrument_node="">Three factors help to explain May’s clear victory in the first stage of the contest. The first was basic parliamentary arithmetic. During the referendum campaign, 56% of Conservative MPs had supported remaining in the EU, and 42% had supported Brexit (BBC News </span><a aria-label="Reference 2016" data-dcnode-id="1792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d80415175e337" title="BBC News. 2016. EU vote: Where the cabinet and other MPs stand, 22 June. 
                    http://www.bbc.co.uk/news/uk-politics-eu-referendum-35616946
                    
                  . Accessed 13 September 2016."><span data-dcnode-id="1793" instrument_node="">2016</span></a><span data-dcnode-id="1791" instrument_node="">). A large proportion of the former were now disposed towards backing a Remainer. May had kept a low profile ahead of the referendum (see Oliver </span><a aria-label="Reference 2016" data-dcnode-id="1789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d80415175e340" title="Oliver, C. 2016. Unleashing demons: The inside story of Brexit. London: Hodder and Stoughton."><span data-dcnode-id="1790" instrument_node="">2016</span></a><span data-dcnode-id="1788" instrument_node="">), but she had still come out against Brexit. A second factor was May’s success in presenting herself as the unity candidate. Her qualified support for EU membership and her immediate acceptance of the referendum result enabled her to win over some pro-Brexit MPs. More generally, May sold herself as the representative of mainstream Conservatism. Her wider acceptability to all parts of the party was probably enhanced by her occasionally frosty relationship with Cameron and his ‘modernising’ allies (Laws </span><a aria-label="Reference 2016" data-dcnode-id="1786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d80415175e343" title="Laws, D. 2016. Coalition: The inside story of the Conservative-Liberal Democrat coalition government. London: Biteback Publishing."><span data-dcnode-id="1787" instrument_node="">2016</span></a><span data-dcnode-id="1785" instrument_node="">, p. 274). Modernisation had been a central theme of Cameron’s party leadership (see Bale </span><a aria-label="Reference 2010" data-dcnode-id="1783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d80415175e346" title="Bale, T. 2010. The Conservative Party from Thatcher to Cameron. Cambridge: Polity."><span data-dcnode-id="1784" instrument_node="">2010</span></a><span data-dcnode-id="1782" instrument_node="">). It had been both an agenda to make the party’s policies and image more appealing to contemporary society, and a discursive device for justifying change (see Dommett </span><a aria-label="Reference 2015" data-dcnode-id="1780" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d80415175e349" title="Dommett, K. 2015. The theory and practice of party modernisation: The Conservative Party under David Cameron, 2005-2015. British Politics 10 (2): 249–266."><span data-dcnode-id="1781" instrument_node="">2015</span></a><span data-dcnode-id="1779" instrument_node="">; Kerr and Hayton </span><a aria-label="Reference 2015" data-dcnode-id="1777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d80415175e353" title="Kerr, P., and R. Hayton. 2015. Whatever happened to Conservative Party modernisation? British Politics 10 (2): 114–130."><span data-dcnode-id="1778" instrument_node="">2015</span></a><span data-dcnode-id="1776" instrument_node="">). But modernisation had been only tolerated at best by the party’s traditionalist base. Many were glad to move on.</span></p><p data-dcnode-id="1758"><span data-dcnode-id="1774" instrument_node="">A final factor, especially important in the chaotic aftermath of the referendum, was May’s reputation as a ‘safe pair of hands’ (Coulson </span><a aria-label="Reference 2016" data-dcnode-id="1772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d80415175e359" title="Coulson, A. 2016. Theresa, the safe pair of hands, versus Michael, the wit of Westminster. The Daily Telegraph, 2 July."><span data-dcnode-id="1773" instrument_node="">2016</span></a><span data-dcnode-id="1771" instrument_node="">; Parker and Warrell </span><a aria-label="Reference 2014" data-dcnode-id="1769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d80415175e362" title="Parker G., and H. Warrell. 2014. Theresa May: Britain’s Angela Merkel? Financial Times Magazine, 25 July."><span data-dcnode-id="1770" instrument_node="">2014</span></a><span data-dcnode-id="1768" instrument_node="">). Much of this reputation stemmed from sheer longevity in office. She had been home secretary since 2010 and was the longest-serving holder of the post since James Chuter Ede in the 1945–1951 Labour government. May’s style as home secretary had won her few friends, however. For the former Liberal Democrat minister David Laws (</span><a aria-label="Reference 2016" data-dcnode-id="1766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d80415175e365" title="Laws, D. 2016. Coalition: The inside story of the Conservative-Liberal Democrat coalition government. London: Biteback Publishing."><span data-dcnode-id="1767" instrument_node="">2016</span></a><span data-dcnode-id="1765" instrument_node="">, p. 276), she was ‘instinctively secretive and very rigid’. For an unnamed Conservative, her team and working style were ‘very closed, very controlling, very untrusting’ (quoted in Day </span><a aria-label="Reference 2014" data-dcnode-id="1763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d80415175e368" title="Day, E. 2014. Theresa May: What lies beyond the public image. The Observer, 27 July."><span data-dcnode-id="1764" instrument_node="">2014</span></a><span data-dcnode-id="1762" instrument_node="">). For Kenneth Clarke, one of the former Tory ministers with whom she had clashed, May was a ‘bloody difficult woman’ (quoted in Savage </span><a aria-label="Reference 2016" data-dcnode-id="1760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d80415175e371" title="Savage, M. 2016. Candid on camera: Clarke derides leadership hopefuls. The Times, 6 July."><span data-dcnode-id="1761" instrument_node="">2016</span></a><span data-dcnode-id="1759" instrument_node="">). But if she was not much liked, she was respected. Compared to her rivals, May exuded experience and competence.</span></p><p data-dcnode-id="1750"><span data-dcnode-id="1757" instrument_node="">Having made it through the parliamentary stage of the contest, May was now the clear favourite to win the ballot of Tory members, which was planned to take place later in the summer. A YouGov (</span><a aria-label="Reference 2016a" data-dcnode-id="1755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d80415175e377" title="YouGov. 2016a. YouGov/Times Survey Results [Conservative Party Members, Fieldwork: 1–4 July]. 
                    https://d25d2506sfb94s.cloudfront.net/cumulus_uploads/document/dgak27s1eh/TimesResults_160704_ConservativeMembers.pdf
                    
                  . Accessed on 20 April 2017."><span data-dcnode-id="1756" instrument_node="">2016a</span></a><span data-dcnode-id="1754" instrument_node="">) survey of the party’s membership suggested that the home secretary would beat Leadsom by a 2-to-1 majority in a straight fight. Yet, there was one final twist in the leadership race. On 11 July, Leadsom suddenly announced her withdrawal from the contest following some ill-advised remarks about motherhood and the implication that she would make a better prime minister than the childless May (Sylvester </span><a aria-label="Reference 2016" data-dcnode-id="1752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d80415175e380" title="Sylvester, R. 2016. ‘I’m sure Theresa will be really sad that she doesn’t have children…’. The Times, 9 July."><span data-dcnode-id="1753" instrument_node="">2016</span></a><span data-dcnode-id="1751" instrument_node="">). As the only candidate left, May was duly proclaimed the new party leader. On 13 July, she succeeded Cameron as prime minister.</span></p></div></div></section><section data-dcnode-id="1648" data-gtm-vis-first-on-screen-50443292_562="750" data-gtm-vis-first-on-screen-50443292_563="751" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="750" data-gtm-vis-recent-on-screen-50443292_563="751" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="May’s challenges"><div class="c-article-section" data-dcnode-id="1649" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1745" id="Sec3"><span data-dcnode-id="1746" instrument_node="">May’s challenges</span></h2><div class="c-article-section__content" data-dcnode-id="1650" id="Sec3-content"><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">Theresa May was the seventh prime minister since 1945 to take office after becoming party leader during the lifetime of a parliament (see Worthy </span><a aria-label="Reference 2016" data-dcnode-id="1742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d80415175e391" title="Worthy, B. 2016. Ending in failure? The performance of ‘takeover’ prime ministers 1916–2016. The Political Quarterly 87 (4): 509–517."><span data-dcnode-id="1743" instrument_node="">2016</span></a><span data-dcnode-id="1741" instrument_node="">). Like others before her, she faced a steep learning curve. She immediately had to form a government, and she would soon be expected to answer prime minister’s questions in the House of Commons. She also had to escape the mindset of being a departmental minister: as head of government, she now had to see the bigger picture. Last but certainly not least, May now had to make good on her promise to deliver Brexit.</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1739" instrument_node="">In leading this process, May would need to grapple with a number of challenges. The first of these was simply to make the most of her limited capacity to influence people and events. Prime ministers have little executive power and few institutional resources of their own. They must rely largely on ministers and officials to develop and implement policy. They are constrained too by their cabinet colleagues and MPs, as well as by public opinion. To be sure, May enjoyed an array of powers that ensured her primacy within the government, not least the right to hire and fire ministers and control over the cabinet’s agenda and the rules of cabinet decision making (King </span><a aria-label="Reference 1991" data-dcnode-id="1737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d80415175e397" title="King, A. 1991. The British prime ministership in the age of the career politician. West European Politics 14 (2): 25–47."><span data-dcnode-id="1738" instrument_node="">1991</span></a><span data-dcnode-id="1736" instrument_node="">). She could also use her office as a ‘bully pulpit’ to communicate directly with the public and other audiences (Heffernan </span><a aria-label="Reference 2006" data-dcnode-id="1734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d80415175e400" title="Heffernan, R. 2006. The prime minister and the news media: Political communication as a leadership resource. Parliamentary Affairs 59 (4): 582–598."><span data-dcnode-id="1735" instrument_node="">2006</span></a><span data-dcnode-id="1733" instrument_node="">). Yet her ability to access these resources would be contingent on her own ‘personal resources’, including her skills, her standing in the party and her wider popularity and prestige (Heffernan </span><a aria-label="Reference 2003" data-dcnode-id="1731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d80415175e403" title="Heffernan, R. 2003. Prime ministerial predominance? Core executive politics in the UK. The British Journal of Politics and International Relations 5 (3): 347–372."><span data-dcnode-id="1732" instrument_node="">2003</span></a><span data-dcnode-id="1730" instrument_node="">).</span></p><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">For the time being at least, May was in a fortuitous situation. The new prime minister may not have won a general election but she had convincingly won the leadership contest, and she faced no immediate threats from rivals. May benefited further from facing a demoralised and divided opposition. Indeed, a virtual civil war had broken out in the Labour party immediately after the June referendum. Already unhappy with the direction of Jeremy Corbyn’s leadership, three-quarters of Labour MPs now expressed their disapproval by supporting a motion of no-confidence in him as leader. Corbyn ignored the non-binding vote. Owen Smith, a Welsh MP, then mounted a formal leadership challenge against Corbyn. The contest dragged on until September, when Corbyn was re-elected with a resounding 62% of the vote (Rawnsley </span><a aria-label="Reference 2016" data-dcnode-id="1726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d80415175e409" title="Rawnsley, A. 2016. If you can’t beat Jeremy Corbyn, you’d better try to learn from him. The Observer, 25 September."><span data-dcnode-id="1727" instrument_node="">2016</span></a><span data-dcnode-id="1725" instrument_node="">). Labour’s strife paralysed the opposition and reinforced the Tories’ comfortable lead in the polls. It also gave the new prime minister some initial extra room for manoeuvre.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1723" instrument_node="">A second and perhaps more fundamental challenge confronting May was more obviously political: to bring together her bitterly divided party. She inherited residual tensions between traditionalists and modernisers, or those who were socially conservative and socially liberal, and very pronounced tensions over Europe (see Heppell </span><a aria-label="Reference 2013" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d80415175e415" title="Heppell, T. 2013. Cameron and liberal conservatism: Attitudes within the parliamentary Conservative Party and Conservative ministers. The British Journal of Politics and International Relations 15 (3): 340–361."><span data-dcnode-id="1722" instrument_node="">2013</span></a><span data-dcnode-id="1720" instrument_node="">). For nearly three decades the Tories had been torn over Britain’s relationship with the EU. The referendum campaign had only exacerbated these divisions. Colleagues had taken different sides and questioned each other’s judgement and integrity. Many of those who had opposed Brexit now felt a sense of resentment towards those who had campaigned for it. Looking ahead, May could expect dissent from Tory Leavers if there was any delay in implementing the result, and she could expect dissent from some Tory Remainers if doing so threatened Britain’s economic interests. On past form, the risk of dissent was always likely to be greater among pro-Brexit Tories, whose opposition to the EU was almost an article of faith, than it was among anti-Brexit Conservatives, whose support for the EU was generally pragmatic and conditional (Lynch and Whitaker </span><a aria-label="Reference 2013" data-dcnode-id="1718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d80415175e418" title="Lynch, P., and R. Whitaker. 2013. Where there is discord, can they bring harmony? Managing intra-party dissent on European integration in the Conservative Party. The British Journal of Politics and International Relations 15 (3): 317–339."><span data-dcnode-id="1719" instrument_node="">2013</span></a><span data-dcnode-id="1717" instrument_node="">). Within weeks, pro-Brexit Tories had even formed a new campaign group, ‘Leave Means Leave’, which called for Britain to cut all ties with the EU as soon as possible (Ross </span><a aria-label="Reference 2016" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d80415175e421" title="Ross, T. 2016. Tory MPs set up new group to push for Brexit. The Sunday Telegraph, 18 September."><span data-dcnode-id="1716" instrument_node="">2016</span></a><span data-dcnode-id="1714" instrument_node="">).</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1712" instrument_node="">Compounding the second challenge was a third: May inherited a working majority of only 16.</span><sup data-dcnode-id="1707"><a data-dcnode-id="1708" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Footnote </span></span><span data-dcnode-id="1709" instrument_node="">1</span></a></sup><span data-dcnode-id="1706" instrument_node=""> As a result, a dozen Tory MPs could hold her to ransom on any issue, including her plans for Brexit. Moreover, May would need to govern with this constraint potentially until 2020. As a consequence of the Fixed-term Parliaments Act 2011, the prime minister had lost the right to call an election at the time of her choosing (see Norton </span><a aria-label="Reference 2016" data-dcnode-id="1704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d80415175e434" title="Norton, P. 2016. The Fixed-term Parliaments Act and votes of confidence. Parliamentary Affairs 69 (1): 3–18."><span data-dcnode-id="1705" instrument_node="">2016</span></a><span data-dcnode-id="1703" instrument_node="">). Even if the electoral circumstances were favourable, there was no guarantee that May would be able to secure the two-thirds vote in the House of Commons needed to trigger an early election.</span></p><p data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node="">A fourth challenge confronting May was to establish what leaving the EU would actually entail. The referendum had asked voters whether or not the United Kingdom should remain a member of the EU. It had not asked voters what kind of relationship with the EU they wanted if Britain left. While many people now wanted to retain access to the EU’s single market and membership of its customs union, there was considerable disagreement over what Britain should concede in return. And there was little prospect of Britain enjoying such access or membership without making significant concessions to the EU (Wright and Coates </span><a aria-label="Reference 2016" data-dcnode-id="1699" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d80415175e440" title="Wright, O. and S. Coates. 2016. Your choice is hard Brexit or remain, EU chief warns. The Times, 14 October."><span data-dcnode-id="1700" instrument_node="">2016</span></a><span data-dcnode-id="1698" instrument_node="">). One position, soon dubbed ‘hard Brexit’, favoured complete control of national borders, laws and finances, even if this meant no free access to the single market and potentially falling back on World Trade Organisation (WTO) rules in future trade with the EU. The alternative position, termed ‘soft Brexit’, favoured compromise on these points in order to maximise access to the single market and the opportunity for free trade with the EU.</span></p><p data-dcnode-id="1677"><span data-dcnode-id="1696" instrument_node="">There were arguably good economic reasons for pursuing a soft Brexit. Being outside of the single market threatened growth and the City of London’s pre-eminence in financial services. Leaked government papers suggested that a hard Brexit could cost the government £66 billion a year in tax revenues (Coates and Wright </span><a aria-label="Reference 2016" data-dcnode-id="1694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d80415175e446" title="Coates, S., and O. Wright. 2016. Hard Brexit could cost £66bn a year. The Times, 1 October."><span data-dcnode-id="1695" instrument_node="">2016</span></a><span data-dcnode-id="1693" instrument_node="">). But while economic logic pointed towards a soft Brexit, political realities pointed towards a harder version. The balance and relative intensity of opinion on the Conservative backbenches was one factor. So too was the mood among the Tory grassroots. A YouGov (</span><a aria-label="Reference 2016a" data-dcnode-id="1691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d80415175e449" title="YouGov. 2016a. YouGov/Times Survey Results [Conservative Party Members, Fieldwork: 1–4 July]. 
                    https://d25d2506sfb94s.cloudfront.net/cumulus_uploads/document/dgak27s1eh/TimesResults_160704_ConservativeMembers.pdf
                    
                  . Accessed on 20 April 2017."><span data-dcnode-id="1692" instrument_node="">2016a</span></a><span data-dcnode-id="1690" instrument_node="">) survey of party members in July 2016 found that 57% said the new prime minister should try to negotiate a free-trade deal with the EU, but only if it could be done without allowing EU citizens the right to live and work in Britain. Meanwhile, there was little popular appetite for the concessions that might be needed to secure access to the single market. Controlling immigration had been a central promise of the Leave campaign, and survey data suggested that few voters were willing to compromise on this point (YouGov </span><a aria-label="Reference 2016b" data-dcnode-id="1688" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d80415175e452" title="YouGov. 2016b. YouGov Survey Results [GB adults, Fieldwork: 31 July–August]. 
                    https://d25d2506sfb94s.cloudfront.net/cumulus_uploads/document/k5u0h1qgsi/BrexitScenarios_160818.pdf
                    
                  . Accessed on 20 April 2017."><span data-dcnode-id="1689" instrument_node="">2016b</span></a><span data-dcnode-id="1687" instrument_node="">). Any concessions would also be pounced upon by the Tory press and especially those newspapers, such as </span><i data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">The Sun</span></i><span data-dcnode-id="1684" instrument_node="">, the </span><i data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Daily Mail</span></i><span data-dcnode-id="1681" instrument_node=""> and the </span><i data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Daily Express</span></i><span data-dcnode-id="1678" instrument_node="">, which had campaigned for Brexit.</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1676" instrument_node="">A fifth challenge confronting May concerned the means by which Britain would actually leave the EU. Article 50 of the Lisbon Treaty allowed for only two years of negotiations, but it was unclear if May’s government could trigger the process through the use of the royal prerogative, or if parliament would need to pass legislation. If legislative authorisation were needed, MPs opposed to Brexit could potentially delay the whole process, opening up further divisions on the government benches. The uncertainty stemmed from the fact that British membership of the EU was established in statute, specifically the European Communities Act 1972. It was also recognised in the various statutes that provided for devolution (Douglas-Scott </span><a aria-label="Reference 2016" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d80415175e468" title="Douglas-Scott, S. 2016. Removing references to EU law from the devolution legislation would require the consent of the devolved assemblies. Constitution Unit blog, 13 June. 
                    https://constitution-unit.com/2016/06/13/removing-references-to-eu-law-from-the-devolution-legislation-would-invoke-the-sewel-convention/
                    
                  ."><span data-dcnode-id="1675" instrument_node="">2016</span></a><span data-dcnode-id="1673" instrument_node="">). The European Referendum Act 2015, which had legislated for the referendum, had not explicitly authorised the government to trigger Article 50. Even before the first round of voting in the Tory leadership contest, a number of groups had announced plans to submit a legal challenge to the high court on the grounds that explicit parliamentary approval was needed (Zeffman et al. </span><a aria-label="Reference 2016" data-dcnode-id="1671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d80415175e471" title="Zeffman, H., F. Gibb, and J. Ames. 2016. Businesses start legal fight to give MPs vote on exit, The Times, 5 July."><span data-dcnode-id="1672" instrument_node="">2016</span></a><span data-dcnode-id="1670" instrument_node="">).</span></p><p data-dcnode-id="1661"><span data-dcnode-id="1668" instrument_node="">The process of leaving the EU was further complicated by the fact that it would actually require a number of separate negotiations. The Article 50 negotiations would cover the formality of withdrawal and matters such as the division of EU liabilities and assets—in effect, the ‘divorce bill’—the rights of EU citizens living in Britain and the status of the Northern Irish border (see The Economist </span><a aria-label="Reference 2016" data-dcnode-id="1666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d80415175e477" title="
                    The Economist. 2016. Mind your step. 8 October."><span data-dcnode-id="1667" instrument_node="">2016</span></a><span data-dcnode-id="1665" instrument_node="">). Britain would then need to negotiate a new trade deal with the EU, and it would also need to negotiate new free-trade agreements with the 53 countries that Britain presently enjoyed by virtue of being in the EU. Furthermore, Britain would also need to negotiate the terms of its WTO membership, since these were presently defined by its status as an EU member. Since all these negotiations were likely to take longer than two years, it was likely that Britain would need to negotiate an interim relationship with the EU. Frustratingly, the other EU member states refused to enter into pre-negotiations. Worryingly, Whitehall lacked the capacity and expertise to plan for and conduct all these negotiations simultaneously (Rutter and McCrae </span><a aria-label="Reference 2016" data-dcnode-id="1663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d80415175e480" title="Rutter, J., and J. McCrae. 2016. Brexit: Organising whitehall to deliver. Briefing Paper. London: Institute for Government."><span data-dcnode-id="1664" instrument_node="">2016</span></a><span data-dcnode-id="1662" instrument_node="">).</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">A sixth and rather more domestic challenge confronting the prime minister was to keep the country united as it left the EU. On the one hand, the referendum risked creating tensions between a pro-Brexit England and an anti-Brexit Scotland. Some 62% of Scots had voted to remain inside the EU, and Scotland’s first minister Nicola Sturgeon immediately made it clear that a second independence referendum was now very much on the agenda (McIntosh and Macdonell </span><a aria-label="Reference 2016" data-dcnode-id="1658" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d80415175e486" title="McIntosh, L., and H. Macdonell. 2016. Scotland prepares for second ballot on independence. The Times, 25 June."><span data-dcnode-id="1659" instrument_node="">2016</span></a><span data-dcnode-id="1657" instrument_node="">). May’s government could well face a constitutional struggle to keep Scotland in one union as it looked to secure Britain’s withdrawal from another. On the other hand, leaving the EU would also have significant implications for Northern Ireland. Like their Scots counterparts, a majority of Northern Irish voters (56%) had supported remaining in the EU. More importantly, Northern Ireland shared a land border with the Republic of Ireland, an EU member state, and the openness of this border was a major component of the Northern Irish peace process. Brexit now potentially threatened that process. In negotiating withdrawal, the British government would somehow need to devise a way of avoiding the re-imposition of border controls between the North and the Republic.</span></p><p data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">A final challenge facing May was to avoid being defined exclusively by Brexit. While leaving the EU would inevitably dominate politics for the remainder of the parliament, her government could not neglect other issues. Bread-and-butter concerns with the economy, public services and immigration would continue to structure domestic politics, and they were also likely to matter come the next general election. Voters would not judge the Conservatives solely on their handling of Brexit. May’s government would need some sort of policy vision or long-term programme if it were to set the broader terms of debate. After the referendum, the Conservatives’ mission could no longer be one of balancing the books and fixing Labour’s alleged past profligacy, the narrative developed by David Cameron and his chancellor of the exchequer, George Osborne (Gamble </span><a aria-label="Reference 2015" data-dcnode-id="1653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d80415175e493" title="Gamble, A. 2015. Austerity as statecraft. Parliamentary Affairs 68 (1): 42–57."><span data-dcnode-id="1654" instrument_node="">2015</span></a><span data-dcnode-id="1652" instrument_node="">). As party leader, May would need to provide a new sense of purpose for her party.</span></p></div></div></section><section data-dcnode-id="1503" data-title="Leading in the referendum’s aftermath"><div class="c-article-section" data-dcnode-id="1504" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1646" id="Sec4"><span data-dcnode-id="1647" instrument_node="">Leading in the referendum’s aftermath</span></h2><div class="c-article-section__content" data-dcnode-id="1505" id="Sec4-content"><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Theresa May had very little time to develop a strategy for managing the politics of Brexit and overcoming the challenges she faced. She had to hit the ground running. Her response began to take shape before she took office, and it became clearer over the following weeks and months.</span></p><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">The first and perhaps most obvious feature of May’s response was her immediate and unambiguous acceptance of the referendum result. As she put it when announcing her candidacy for the Tory leadership:</span></p><blockquote class="c-blockquote" data-dcnode-id="1633"><div class="c-blockquote__body" data-dcnode-id="1634"><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">Brexit means Brexit. The campaign was fought, the vote was held, turnout was high, and the public gave their verdict. There must be no attempts to remain inside the EU, no attempts to rejoin it through the back door, and no second referendum. (May </span><a aria-label="Reference 2016a" data-dcnode-id="1638" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d80415175e511" title="May, T. 2016a. Theresa May’s launch statement, 30 June. 
                    http://press.conservatives.com/post/147947693170/theresa-mays-launch-statement
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1639" instrument_node="">2016a</span></a><span data-dcnode-id="1637" instrument_node="">)</span></p><span data-dcnode-id="1635" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1631" instrument_node="">‘Brexit means Brexit’ became the prime minister’s mantra. She repeated it on many subsequent occasions, including in her first speech at the October party conference: ‘The referendum result was clear. It was legitimate … Brexit means Brexit’ (May </span><a aria-label="Reference 2016c" data-dcnode-id="1629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d80415175e519" title="May, T. 2016c. Britain after Brexit: A vision of a global Britain. Speech to Conservative party conference, Birmingham, 2 October. 
                    http://press.conservatives.com/post/151239411635/prime-minister-britain-after-brexit-a-vision-of
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1630" instrument_node="">2016c</span></a><span data-dcnode-id="1628" instrument_node="">). Like prime ministers before her, May used the bully pulpit of her office to articulate her intended direction of travel: Britain would be leaving the European Union. Her forceful tone served to provide some sense of certainty amidst the wider uncertainty generated by the referendum. It also served to reassure pro-Brexit MPs in her party, not to mention the 52% of voters who had opted to leave the EU. It did not, however, suggest any particular interest in reaching out to many of the 48% who had voted to remain or to the 74% of MPs who had previously declared their opposition to Brexit (BBC News </span><a aria-label="Reference 2016" data-dcnode-id="1626" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d80415175e522" title="BBC News. 2016. EU vote: Where the cabinet and other MPs stand, 22 June. 
                    http://www.bbc.co.uk/news/uk-politics-eu-referendum-35616946
                    
                  . Accessed 13 September 2016."><span data-dcnode-id="1627" instrument_node="">2016</span></a><span data-dcnode-id="1625" instrument_node="">).</span></p><p data-dcnode-id="1613"><span data-dcnode-id="1623" instrument_node="">A second feature of May’s response was to rule out emphatically an early election. When launching her leadership campaign, May had insisted that ‘there should be no general election until 2020’ (May </span><a aria-label="Reference 2016a" data-dcnode-id="1621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d80415175e528" title="May, T. 2016a. Theresa May’s launch statement, 30 June. 
                    http://press.conservatives.com/post/147947693170/theresa-mays-launch-statement
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1622" instrument_node="">2016a</span></a><span data-dcnode-id="1620" instrument_node="">). She downplayed the prospect of going to the country at every subsequent opportunity, even as the Tories opened up a double-digit polling lead over Labour in the spring of 2017 (Elliott et al. </span><a aria-label="Reference 2017" data-dcnode-id="1618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d80415175e531" title="Elliott, F., S. Coates, and M. Savage. 2017. Call snap election to crush Labour, cabinet ministers tell May. The Times, 8 March."><span data-dcnode-id="1619" instrument_node="">2017</span></a><span data-dcnode-id="1617" instrument_node="">). The line was unambiguous: an early election would create instability, and there was no need for one in any event. The prime minister might have felt constrained by the Fixed-term Parliaments Act; above all, she was probably mindful of the speculation that had damaged Gordon Brown’s reputation in 2007 (Allen </span><a aria-label="Reference 2011" data-dcnode-id="1615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d80415175e534" title="Allen, N. 2011. Labour’s third term: A tale of two prime ministers. In Britain at the Polls 2010, ed. N. Allen, and J. Bartle, 1–36. London: Sage Publications."><span data-dcnode-id="1616" instrument_node="">2011</span></a><span data-dcnode-id="1614" instrument_node="">, pp. 9–10). By allowing expectations to build and then not calling an early election, Brown had appeared indecisive and weak. His premiership never fully recovered. May was not going to repeat that mistake. Downing Street’s line was always consistent and clear, and it successfully closed down destabilising speculation. When the prime minister changed her mind in April 2017, the surprise was complete.</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">A third feature of May’s response was to delay as long as possible saying what form of Brexit she preferred and even when she would trigger Article 50. If the prime minister was clear that Brexit meant Brexit, she was opaque on what Brexit would actually entail. When in early September David Davis, the new secretary for state for exiting the EU, suggested that Britain would probably leave the single market, the prime minister’s spokeswoman made it clear that he was expressing his ‘own opinion’, not government policy (Pickard and Warrell </span><a aria-label="Reference 2016" data-dcnode-id="1610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d80415175e541" title="Pickard, J., and H. Warrell. 2016. David Davis view on leaving single market ‘not government policy’. The Financial Times, 6 September."><span data-dcnode-id="1611" instrument_node="">2016</span></a><span data-dcnode-id="1609" instrument_node="">). A few days later, in a statement to MPs, May refused to reveal her hand ‘prematurely’ and further refused to ‘provide a running commentary’.</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">From May’s point of view, vagueness was necessary. Her government needed time to explore its options and prepare for the negotiations. Vagueness also enabled her to avoid an immediate public confrontation with one section or other of her own party. Once she declared her position, she was bound to antagonise either those who favoured a softer Brexit, or those who favoured a harder Brexit. From others’ points of view, however, vagueness added to the political and economic uncertainty. With demands for clarity mounting, May announced in October that Article 50 would be triggered before the end of March 2017. She also hinted that her government was gearing up for a harder form of Brexit: ‘We are not leaving the European Union only to give up control of immigration again. And we are not leaving only to return to the jurisdiction of the European Court of Justice’ (May </span><a aria-label="Reference 2016b" data-dcnode-id="1605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d80415175e547" title="May, T. 2016b. Statement from the new prime minister Theresa May, 13 July. 
                    https://www.gov.uk/government/speeches/statement-from-the-new-prime-minister-theresa-may
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1606" instrument_node="">2016b</span></a><span data-dcnode-id="1604" instrument_node="">). The tone was red meat for the Tory right. It was also perhaps part of a strategy to lower the expectations of those clamouring for a soft Brexit.</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">Three months later, in a speech at Lancaster House in January 2017, the prime minister confirmed her intention of pursuing a harder Brexit. She ruled out continued membership of the single market and the contribution of ‘huge sums to the EU budget’. She also ruled out membership of the EU’s customs union: ‘I want Britain to be free to establish our own tariff schedules at the World Trade Organisation, meaning we can reach new trade agreements not just with the European Union but with old friends and new allies from outside Europe too’ (May </span><a aria-label="Reference 2017" data-dcnode-id="1600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d80415175e553" title="May, T. 2017. The government’s negotiating objectives for exiting the EU. Speech at Lancaster House, London, 17 January. 
                    https://www.gov.uk/government/speeches/the-governments-negotiating-objectives-for-exiting-the-eu-pm-speech
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1601" instrument_node="">2017</span></a><span data-dcnode-id="1599" instrument_node="">). The opposition among Tory MPs who advocated a soft Brexit was surprisingly muted.</span></p><p data-dcnode-id="1590"><span data-dcnode-id="1597" instrument_node="">A fourth feature of May’s response was to co-opt some of the Leavers in her party and oblige them to share the responsibility for delivering Brexit. Using her powers of appointment, May dismissed or demoted no fewer than thirteen cabinet-level ministers in a wide-ranging reshuffle, most notably George Osborne and Michael Gove, and promoted or brought into cabinet several high-profile Leavers, including Boris Johnson, David Davis, Liam Fox, Andrea Leadsom and Priti Patel. Pro-Brexit ministers now constituted over a quarter of her senior ministerial team.</span><sup data-dcnode-id="1592"><a data-dcnode-id="1593" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Footnote </span></span><span data-dcnode-id="1594" instrument_node="">2</span></a></sup><span data-dcnode-id="1591" instrument_node="">
</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Even more important than numbers was May’s allocation of portfolios. She gave three key Brexit-related posts to prominent Leavers: Davis was made secretary of state for exiting the EU with responsibility for planning Britain’s withdrawal; Fox was made international trade secretary with responsibility for cultivating post-Brexit trade agreements; and Johnson was made foreign secretary with responsibility for representing British interests more generally. The appointment of ‘the three Brexiteers’ provided further reassurance to the pro-Brexit wing of her party. It also bound them to the prime minister and obliged them to defend the government in any dealings with awkward Leave MPs.</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1587" instrument_node="">A fifth feature of May’s response was to assert the government’s ultimate control over the Brexit process. She would proceed not by consensus but by taking advantage of what remained of Britain’s traditional power-hoarding constitution (King </span><a aria-label="Reference 2007" data-dcnode-id="1585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d80415175e571" title="King, A. 2007. The British Constitution. Oxford: Oxford University Press."><span data-dcnode-id="1586" instrument_node="">2007</span></a><span data-dcnode-id="1584" instrument_node="">). The most obvious manifestation of this approach was in the government’s initial plans to trigger Article 50 on the basis of prerogative powers (Swinford </span><a aria-label="Reference 2016" data-dcnode-id="1582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d80415175e574" title="Swinford, S. 2016. May heads for Brexit without vote by MPs. The Daily Telegraph, 27 August."><span data-dcnode-id="1583" instrument_node="">2016</span></a><span data-dcnode-id="1581" instrument_node="">). It would seek neither parliamentary authorisation nor the consent of the devolved institutions in Edinburgh, Belfast and Cardiff. In October at the Tory party conference, May (</span><a aria-label="Reference 2016b" data-dcnode-id="1579" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d80415175e577" title="May, T. 2016b. Statement from the new prime minister Theresa May, 13 July. 
                    https://www.gov.uk/government/speeches/statement-from-the-new-prime-minister-theresa-may
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1580" instrument_node="">2016b</span></a><span data-dcnode-id="1578" instrument_node="">) spelt out her stance: ‘the negotiations between the United Kingdom and the European Union are the responsibility of the Government and nobody else’. Parliament would, of course, have an opportunity to scrutinise the government’s actions, and the Scottish, Northern Irish and Welsh governments would be consulted. Parliament would also be asked to pass a ‘Great Repeal Bill’, which would repeal the European Communities Act 1972 and the primacy of EU law, and simultaneously transform all existing EU law into British law. Parliament would even be asked to vote on the final Brexit settlement. But no one would be allowed to dictate the government’s negotiating position.</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Political calculations underpinned this feature of May’s strategy. In essence, she needed to prevent MPs and peers and the devolved institutions from delaying or even vetoing Brexit, since either outcome could antagonise the most ardent Brexiteers and threaten her government’s survival. The simplest way to do so was to use prerogative powers to trigger Article 50. Once negotiations started, it would be virtually impossible for anyone to halt them. Opponents of Brexit would then be bound to accept whatever deal the government brought back, which meant in practice whatever the EU was willing to offer.</span></p><p data-dcnode-id="1564"><span data-dcnode-id="1574" instrument_node="">The problem with this approach, however, was its potential illegality. A challenge had been presented to the high court in July, as noted, which argued that the government had no right to trigger Article 50 through prerogative powers. The high court duly ruled against the government in early November, prompting a wave of hysterical headlines in some newspapers: the </span><i data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Daily Mail</span></i><span data-dcnode-id="1571" instrument_node="">’s front page proclaimed the three judges&nbsp;hearing the case to be the ‘enemies of the people’ (Slack </span><a aria-label="Reference 2016" data-dcnode-id="1569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d80415175e590" title="Slack, J. 2016. Enemies of the people. Daily Mail, 4 November."><span data-dcnode-id="1570" instrument_node="">2016</span></a><span data-dcnode-id="1568" instrument_node="">). The government immediately appealed to the supreme court, which heard the case in December and issued its judgment in late January. By a majority of 8 to 3, the judges ruled that legislation was required to authorise the triggering of Article 50 (Wright </span><a aria-label="Reference 2017" data-dcnode-id="1566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d80415175e593" title="Wright, O. 2017. Judges make history in Brexit blow to ministers. The Times, 25 January."><span data-dcnode-id="1567" instrument_node="">2017</span></a><span data-dcnode-id="1565" instrument_node="">). The supreme court also ruled on the question of whether or not the consent of the devolved institutions was required. Much to ministers’ relief, it unanimously decided that it was not.</span></p><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">The government, which had had plenty of time to prepare for the ruling, immediately published a short bill that authorised the prime minister to trigger Article 50. MPs quickly passed the bill with surprisingly little fuss. The House of Lords then sought to amend it, with provisions to guarantee the rights of EU nationals living in the UK and to give parliament ‘a meaningful vote’ on the final Brexit deal—but peers ultimately backed down. The European Union (Notification of Withdrawal) Act received royal assent on 16 March. Its passage had been virtually guaranteed by the Labour party’s decision to support it. Two weeks later, May formally notified the European Council of the United Kingdom’s intention to withdraw from the EU. The whole episode ought to have been extremely embarrassing for the government. Instead, the political damage was limited. May’s insistence on appealing to the supreme court after the initial ruling, rather than rushing straight to parliament, had had the effect of signalling her intent and reinforcing her reputation for persistence. It also bought the government some time to prepare.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1561" instrument_node="">A sixth feature of May’s response to the referendum was to assert her personal influence over the Brexit process </span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">within</span></i><span data-dcnode-id="1558" instrument_node=""> government. To do so, she utilised many of the powers traditionally associated with the premiership. When initially forming her government, for instance, she sacked a number of senior ministers with whom she had previously clashed, notably Osborne and Gove. It served as a powerful statement of intent. At the same time, May created additional Brexit-related portfolios, as seen, thereby making it harder for anyone else to ‘own’ the issue. She also reserved to herself the most important policy statements on Brexit and made occasional public interventions to rebuke or correct her ministers if they deviated from her line. Lastly, May used her powers to set the rules of collective decision making, in particular reorganising the cabinet-committee system and making herself the chair of four core policy committees, including a new Brexit committee. Early reports suggested a return to ‘traditional cabinet government’ (Thomson and Sylvester </span><a aria-label="Reference 2016" data-dcnode-id="1556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d80415175e605" title="Thomson, A. and Sylvester, R. (2016) Inside the new No 10: purges, puritanism and zebra-prints. The Times, 1 October."><span data-dcnode-id="1557" instrument_node="">2016</span></a><span data-dcnode-id="1555" instrument_node="">). But while there might have been more discussion among ministers, it was abundantly clear who was calling the shots.</span></p><p data-dcnode-id="1549"><span data-dcnode-id="1553" instrument_node="">Throughout, May’s style of leadership was largely consistent with her conduct as home secretary. She demonstrated a characteristic stubbornness in pursuit of her goals, and a reluctance to be rushed into making decisions. She also demonstrated a characteristic disinterest in building coalitions. The way in which May dismissed Osborne and others in July 2016—and later her sacking of Tory grandee Lord Heseltine from a government advisory position after he voted to amend the then European Union (Notification of Withdrawal) Bill—revealed an almost vindictive streak. She seemed set on following Machiavelli’s dictum that it was ‘better to be feared than loved’ without heeding his advice to avoid ‘hatred’. The continuity in May’s operating style was further reinforced by the import into Downing Street of several long-serving advisers from her spell in the Home Office. She appointed Nick Timothy and Fiona Hill, two loyal former special advisers, as her co-chiefs of staff, and a number of other trusted personnel to key positions (Warrell et al. </span><a aria-label="Reference 2017" data-dcnode-id="1551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d80415175e611" title="Warrell, H., G. Parker, and J. Blitz. 2017. Theresa May reshapes administration in Home Office mould. The Financial Times, 26 February."><span data-dcnode-id="1552" instrument_node="">2017</span></a><span data-dcnode-id="1550" instrument_node="">). The result was to create a tight-knit circle around the prime minister but one that potentially isolated her from other senior figures in the government and alternative sources of advice.</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node="">A final feature of May’s response to the referendum was to make Brexit part of a new governing narrative, an account of what her government was doing and why. May had set out the narrative’s key themes at the start of her leadership bid: the referendum was a vote to regain control over laws and immigration, Britain would withdraw from the EU but continue to be a global player, and it was her ‘mission’ to create a more meritocratic society that worked for everyone, especially those who were ‘just about’ managing and not just the ‘privileged few’ (May </span><a aria-label="Reference 2016a" data-dcnode-id="1546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d80415175e617" title="May, T. 2016a. Theresa May’s launch statement, 30 June. 
                    http://press.conservatives.com/post/147947693170/theresa-mays-launch-statement
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1547" instrument_node="">2016a</span></a><span data-dcnode-id="1545" instrument_node="">). Put another way, leaving the EU would be an opportunity for a national fresh start.</span></p><p data-dcnode-id="1530"><span data-dcnode-id="1543" instrument_node="">May promoted this narrative at every opportunity. Immediately after taking office, she again talked of her ‘mission to make Britain a country that works for everyone’ (May </span><a aria-label="Reference 2016b" data-dcnode-id="1541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d80415175e624" title="May, T. 2016b. Statement from the new prime minister Theresa May, 13 July. 
                    https://www.gov.uk/government/speeches/statement-from-the-new-prime-minister-theresa-may
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1542" instrument_node="">2016b</span></a><span data-dcnode-id="1540" instrument_node="">). In the first of two speeches at her party’s autumn conference, she called the referendum ‘the biggest vote for change this country has ever known’, and set out a positive vision of an ‘independent, sovereign’ Britain (May </span><a aria-label="Reference 2016c" data-dcnode-id="1538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d80415175e627" title="May, T. 2016c. Britain after Brexit: A vision of a global Britain. Speech to Conservative party conference, Birmingham, 2 October. 
                    http://press.conservatives.com/post/151239411635/prime-minister-britain-after-brexit-a-vision-of
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1539" instrument_node="">2016c</span></a><span data-dcnode-id="1537" instrument_node="">). In her second conference speech, she hailed this ‘once-in-a-generation chance to change the direction of our nation’, and promised a government that ‘steps up—and not back—to act on behalf of us all’ (May </span><a aria-label="Reference 2016d" data-dcnode-id="1535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d80415175e630" title="May, T. 2016d. The good that government can do. Speech to Conservative party conference, Birmingham, 5 October. 
                    http://press.conservatives.com/post/151378268295/prime-minister-the-good-that-government-can-do
                    
                  . Accessed on 31 January 2017."><span data-dcnode-id="1536" instrument_node="">2016d</span></a><span data-dcnode-id="1534" instrument_node="">). Three months later, when introducing her ‘plan for Britain’, the prime minister promised to ‘use this moment of change to build a stronger economy and a fairer society by embracing genuine economic and social reform’ (May </span><a aria-label="Reference 2017" data-dcnode-id="1532" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d80415175e633" title="May, T. 2017. The government’s negotiating objectives for exiting the EU. Speech at Lancaster House, London, 17 January. 
                    https://www.gov.uk/government/speeches/the-governments-negotiating-objectives-for-exiting-the-eu-pm-speech
