                  . Accessed 31 January 2017."><span data-dcnode-id="1533" instrument_node="">2017</span></a><span data-dcnode-id="1531" instrument_node="">).</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1529" instrument_node="">In some respects, May’s rhetoric was standard fare. All new prime ministers try to persuade voters that they stand for something new, all give hints of moving to the centre ground of British politics, and all promise to do more for ordinary working people. But in other respects, May’s narrative was remarkable. In making her own pitch to the centre ground, May sought to accommodate those voters who resented or felt ‘left behind’ by globalisation and mainstream political parties (Ford and Goodwin </span><a aria-label="Reference 2014" data-dcnode-id="1527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d80415175e639" title="Ford, R., and M. Goodwin. 2014. Revolt on the right: Explaining support for the radical right in Britain. Abingdon: Routledge."><span data-dcnode-id="1528" instrument_node="">2014</span></a><span data-dcnode-id="1526" instrument_node="">). She did so by distancing herself from some of the prevailing orthodoxies of neoliberalism, as well as the party modernisation agenda associated with her predecessor. In an interventionist break with Cameron and recent Conservative party policy, she called for workers to be represented on company boards, for shareholder votes on executive pay to be binding, and for the country to develop a ‘proper industrial strategy’ (May </span><a aria-label="Reference 2016a" data-dcnode-id="1524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d80415175e642" title="May, T. 2016a. Theresa May’s launch statement, 30 June. 
                    http://press.conservatives.com/post/147947693170/theresa-mays-launch-statement
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1525" instrument_node="">2016a</span></a><span data-dcnode-id="1523" instrument_node="">). This rhetorical enthusiasm for greater intervention certainly marked a departure from the party’s Thatcherite commitment to the free market. So too did May’s decision to prioritise immigration controls over economic growth and access to the EU’s single market.</span></p><p data-dcnode-id="1511"><span data-dcnode-id="1521" instrument_node="">The prime minister’s narrative was also remarkable, if only in the sense of meriting comment, because of the tension between its vision of a ‘global Britain’, underpinned by free trade, and its simultaneous and potentially conflicting commitment to ‘a better deal for ordinary working people at home’, underpinned by controlled immigration, greater state intervention and the reassertion of national sovereignty (May </span><a aria-label="Reference 2017" data-dcnode-id="1519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d80415175e648" title="May, T. 2017. The government’s negotiating objectives for exiting the EU. Speech at Lancaster House, London, 17 January. 
                    https://www.gov.uk/government/speeches/the-governments-negotiating-objectives-for-exiting-the-eu-pm-speech
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1520" instrument_node="">2017</span></a><span data-dcnode-id="1518" instrument_node="">). The difficulties in squaring this circle were highlighted during May’s November 2016 trip to India, where British hopes of greater access for its financial services clashed with Indian hopes for relaxed immigration controls (Coates </span><a aria-label="Reference 2016" data-dcnode-id="1516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d80415175e651" title="Coates, S. 2016. May resists pressure to relax visa rules for Indian migrants. The Times, 8 November."><span data-dcnode-id="1517" instrument_node="">2016</span></a><span data-dcnode-id="1515" instrument_node="">). They were also highlighted in the prime minister’s 2017 threat to set ‘competitive tax rates’ in a bid to ‘attract the world’s best companies and biggest investors to Britain’ (May </span><a aria-label="Reference 2017" data-dcnode-id="1513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d80415175e654" title="May, T. 2017. The government’s negotiating objectives for exiting the EU. Speech at Lancaster House, London, 17 January. 
                    https://www.gov.uk/government/speeches/the-governments-negotiating-objectives-for-exiting-the-eu-pm-speech
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1514" instrument_node="">2017</span></a><span data-dcnode-id="1512" instrument_node="">). It was not immediately clear how such a position would address the concerns of the ‘left behind’.</span></p><p data-dcnode-id="1506"><span data-dcnode-id="1510" instrument_node="">Finally, May’s narrative was remarkable in being premised on a contested and contestable interpretation of the June referendum. Apparently disregarding the 48% who rejected Brexit, she insisted that: ‘the message from the public before and during the referendum campaign was clear: Brexit must mean control of the number of people who come to Britain from Europe’ (May </span><a aria-label="Reference 2017" data-dcnode-id="1508" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d80415175e660" title="May, T. 2017. The government’s negotiating objectives for exiting the EU. Speech at Lancaster House, London, 17 January. 
                    https://www.gov.uk/government/speeches/the-governments-negotiating-objectives-for-exiting-the-eu-pm-speech
                    
                  . Accessed 31 January 2017."><span data-dcnode-id="1509" instrument_node="">2017</span></a><span data-dcnode-id="1507" instrument_node="">). Such an interpretation was not shared by everyone in her party, let alone the country. There were long-term risks in claiming a mandate to change the general direction of government policy on the basis of a narrow referendum result.</span></p></div></div></section><section data-dcnode-id="1474" data-title="Throwing it all away?"><div class="c-article-section" data-dcnode-id="1475" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1501" id="Sec5"><span data-dcnode-id="1502" instrument_node="">Throwing it all away?</span></h2><div class="c-article-section__content" data-dcnode-id="1476" id="Sec5-content"><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Theresa May’s first months in office were a critical period for the new prime minister. She came to power off the back of a referendum result that she had campaigned against, that few had planned for, and that a majority of MPs and peers had opposed. Her response was to embrace Brexit and to make it her mission to deliver it. By the end of March 2016, May had at least cleared her first major hurdle. She had secured parliamentary authorisation to trigger Article 50, and had then done so. May had also defined what form of Brexit the UK would pursue: it would be a harder Brexit, with Britain outside of the EU single market and customs union. Neither of these achievements was insignificant.</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">Nevertheless, many challenges still lay ahead. Brexit negotiations had not started, and her party and the country remained divided. May’s parliamentary majority also remained wafer thin. Indeed, its precariousness had been reinforced by the resignation in late 2016 of two Tory MPs, Zac Goldsmith, who quit in protest at the government’s decision to proceed with the development of a third runway at Heathrow, and Stephen Phillips, who resigned over the government’s approach to Brexit (Keate </span><a aria-label="Reference 2016" data-dcnode-id="1496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d80415175e674" title="Keate, G. 2016. May’s majority slips as quitting Brexiteer calls Tories ‘Ukip lite’. The Times, 5 November."><span data-dcnode-id="1497" instrument_node="">2016</span></a><span data-dcnode-id="1495" instrument_node="">). While the Conservatives had retained Phillips’ Sleaford and North Hykeham seat in the subsequent by-election, they had lost Goldsmith’s Richmond Park constituency to the Liberal Democrats.</span></p><p data-dcnode-id="1486"><span data-dcnode-id="1493" instrument_node="">In April 2017, and reversing her earlier position, May suddenly announced her intention to seek an early election to be held on 8 June. The reasoning seemed impeccable. Her party had long enjoyed a comfortable lead over Labour in the opinion polls, and she enjoyed a considerable personal lead over Jeremy Corbyn (YouGov </span><a aria-label="Reference 2017" data-dcnode-id="1491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d80415175e680" title="YouGov. 2017. YouGov Results Theresa May [GB adults, Fieldwork: 2–3 March]. 
                    http://d25d2506sfb94s.cloudfront.net/cumulus_uploads/document/7xzfbpppjy/Internal_Results_170303_TheresaMay_w.pdf
                    
                  . Accessed 20 April 2017."><span data-dcnode-id="1492" instrument_node="">2017</span></a><span data-dcnode-id="1490" instrument_node="">). The Tories had even taken the Copeland constituency from Labour in a by-election in February 2017. Assuming the polls were accurate, May now looked certain to increase significantly her majority. This would strengthen her position vis-à-vis both her parliamentary party and the EU. It would also give the prime minister a clear electoral mandate to pursue her vision of Brexit, not to mention extra time to achieve a deal before the next general election, now due in 2022. In terms of ‘statecraft’, her decision seemed to be an act of strategic genius (Buller and James </span><a aria-label="Reference 2012" data-dcnode-id="1488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d80415175e683" title="Buller, J., and T.S. James. 2012. Statecraft and the assessment of national political leaders: The case of New Labour and Tony Blair. British Journal of Politics and International Relations 14 (4): 534–555."><span data-dcnode-id="1489" instrument_node="">2012</span></a><span data-dcnode-id="1487" instrument_node="">).</span></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">At first, everything went smoothly. The prime minister easily secured the parliamentary votes needed to hold an early election, and the Tories performed strongly in the local elections on 4 May. The Conservative campaign also had a seemingly clear focus: May’s reputedly ‘strong and stable leadership’ and ability to secure a good Brexit deal. But the Tory campaign was soon shown to be wanting. May struggled to construct a likable public persona. Introverted by nature, she seemed robotic and temperamentally unsuited to being the centre of a highly personalised campaign. May also struggled to live up to her billing&nbsp;as a strong and stable leader. Days after her party’s manifesto launch, the prime minister performed an embarrassing U-turn on the issue of funding for domiciliary social care. Doubts about the strength and stability of her leadership grew, exacerbated by her refusal to participate in a televised leaders’ debate. Terrorist attacks in Manchester and London further shifted attention away from Brexit and onto May’s past record as home secretary. Labour and Corbyn, meanwhile, had a good campaign. Indeed, Labour’s leader came into his own in front of enthusiastic crowds of supporters. Gradually, the polls narrowed.</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">In the event, the Conservatives won only 317 seats, 55 more than Labour but 13 fewer than in 2015. Even though initial expectations of a Tory landslide had faded, the final outcome was still something of a shock. To be sure, the Tories polled 42.4% of the popular vote, their highest share since 1983 and a significant increase on the 36.9% achieved 2&nbsp;years earlier. They also did very well in Scotland, winning no fewer than 13 seats. But the fact remains that May lost her parliamentary majority in an election that she had called and which had been framed around her abilities as a leader. She was able to continue in office at the head of a minority government thanks to a confidence-and-supply agreement reached with the Democratic Unionist Party (DUP). She was also able to continue for the good reason that she had made the premiership even more of a poisoned chalice than when she had inherited it. Who in their right mind would want to usurp her as the head of a divided minority government? Even for an ambitious career politician, it was possibly the worst time to become prime minister. Crucially, there was no obvious successor around whom her divided party could unite. May’s personal authority, however, was left in tatters. She was obliged to sack her key advisers, Nick Timothy and Fiona Hill, and she was unable to conduct a wide-ranging reshuffle of her government. She had squandered most of her ability to provide prime ministerial leadership.</span></p><p data-dcnode-id="1477"><span data-dcnode-id="1481" instrument_node="">At the time of writing, it would be unwise to make too many predictions about the ultimate fate of Britain’s second female prime minister or the final outcome of the Brexit negotiations. Much will depend on the durability of the Conservative–DUP agreement. Britain still seems destined to leave the EU, but the result of the 2017 general election has made it more difficult for May to strike a deal that reflects her vision of Brexit. Indeed, it has made it more difficult for her government to strike any deal with the EU. Even with the DUP’s backing, May is utterly reliant on the support of the most ardent Leavers in her party, some of whom are reluctant to pay a large divorce bill to the EU. In the language of Putnam’s (</span><a aria-label="Reference 1988" data-dcnode-id="1479" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d80415175e696" title="Putnam, R.D. 1988. Diplomacy and domestic politics: The logic of two-level games. International Organization 42 (3): 427–460."><span data-dcnode-id="1480" instrument_node="">1988</span></a><span data-dcnode-id="1478" instrument_node="">) two-level game, the ‘win-set’ among Tory MPs for a deal is thus very narrow. The result of the 2017 election also casts doubts on the feasibility of May’s attempts to reposition her party and take it in a more interventionist direction. Lastly, the result casts obvious doubt on the viability of May continuing as Conservative leader and prime minister. The Westminster consensus is that May is on borrowed time. That may well be the case; but as both the Brexit referendum and 2017 general election have taught us, events can often confound general expectations.</span></p></div></div></section><span data-dcnode-id="1473" instrument_node="">
</span><section data-dcnode-id="1459" data-title="Notes"><div class="c-article-section" data-dcnode-id="1460" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1471" id="notes"><span data-dcnode-id="1472" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1461" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1462"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1467" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1468"><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Although the Conservatives’ 330 MPs (out of 650) suggested an absolute majority of only ten, the four Sinn Féin MPs refused to take their seats in the House of Commons, and neither the speaker nor his three deputies—one Tory and two Labour MPs—would be expected to vote. As a result, the government’s majority was 16 in practice.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1463" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1464"><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">This proportion refers to the seven out of 27 ministers entitled to attend cabinet.</span></p></div></li></ol></div></div></section><div data-dcnode-id="960" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="961" data-title="References"><div class="c-article-section" data-dcnode-id="962" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1457" id="Bib1"><span data-dcnode-id="1458" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="963" id="Bib1-content"><div data-container-section="references" data-dcnode-id="964"><ul class="c-article
