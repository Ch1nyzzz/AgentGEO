ass="responsiveSection padding-all-50 padding-all-s-0 overflow-hidden" data-dcnode-id="294"><div class="responsiveSection__grid" data-dcnode-id="295"><div class="contentGrid" data-dcnode-id="296"><section aria-labelledby="topicTitle" class="mainContent" data-dcnode-id="672"><div class="headerPosition" data-dcnode-id="951"><div aria-label="breadcrumbs" class="margin-top-0" data-dcnode-id="1022" id="topic-breadcrumb" role="navigation"><ul class="breadcrumbs" data-dcnode-id="1023"><li data-dcnode-id="1028"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/markets/2535/economy-politics/"><span data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Economy &amp; Politics</span></span></a><span aria-hidden="true" class="divider" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">›</span></span></li><li data-dcnode-id="1024"><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/markets/2535/topic/966/politics-government/"><span data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Politics &amp; Government</span></span></a></li></ul></div><div data-dcnode-id="952" data-observe="" id="topicHeader__wrapper"><div class="margin-bottom-20" data-dcnode-id="953" id="topic-header"><h1 class="h2 margin-bottom-15 margin-bottom-s-20" data-dcnode-id="1020" id="topicTitle"><span data-dcnode-id="1021" instrument_node="">The Brexit referendum - Statistics &amp; Facts</span></h1><div class="topicQuickNav showMobile" data-dcnode-id="1012" data-sticky-nav="" data-sticky-onscroll=""><ul class="topicQuickNav__list" data-dcnode-id="1013" data-observe-navigation=""><li class="topicQuickNav__item" data-dcnode-id="1017"><a class="topicQuickNav__link" data-dcnode-id="1018" data-gtm="stickyNav__1" data-nav-id="topicHeader__wrapper" data-scroll-offset="80" data-smoothscroll="" data-status="active" href="#topicHeader__wrapper"><span data-dcnode-id="1019" instrument_node="">Overview</span></a></li><li class="topicQuickNav__item" data-dcnode-id="1014"><a class="topicQuickNav__link" data-dcnode-id="1015" data-gtm="stickyNav__2" data-nav-id="dossierKeyfigures" data-scroll-offset="80" data-smoothscroll="" href="#dossierKeyfigures"><span data-dcnode-id="1016" instrument_node="">Key figures</span></a></li></ul></div><div class="content__author" data-dcnode-id="1004"><span class="content__author--name" data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">
                        Published by
                </span><a class="text-underline" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/aboutus/our-research-commitment"><span data-dcnode-id="1010" instrument_node="">D. Clark</span></a><span data-dcnode-id="1008" instrument_node="">,
                    </span></span><span class="content__author--date" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">
                Mar 12, 2021</span></span></div><article class="article readingAid__text responsiveText responsiveText--underlinedLinks margin-right-20 margin-right-s-0" data-dcnode-id="954"><span data-dcnode-id="1003" instrument_node="">
        At 11pm on January 31, 2020 the United Kingdom officially left the European Union, ending a partnership that stretched back almost fifty years. Between the Brexit </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/570124/eu-referendum-results-number-of-voters/" rel="noopener" target="_blank"><span data-dcnode-id="1002" instrument_node="">vote </span></a><span data-dcnode-id="1000" instrument_node=""> in 2016 and the eventual departure date, the UK witnessed three different Prime Ministers and two general elections, highlighting the political turmoil of those three and a half years. For the rest of 2020, the UK entered into a transition period whereby little changed in terms of travel restrictions or access to the single market. Arguably the real starting date of Brexit is January 1, 2021, as this is when the new EU-UK free trade agreement came into force, and virtually reset trade and travel relations between the two parties.

                    </span><br data-dcnode-id="999"><div class="hide padding-top-0 margin-top-0" data-dcnode-id="958" id="additionalText"><br data-dcnode-id="998"><h2 data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The build-up to Brexit</span></h2><span data-dcnode-id="995" instrument_node="">
The UK first joined the European Economic Community (the forerunner organization to the EU) in 1973, after spending years on the sidelines of European integration. Due to political divisions about membership however, a </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/1043098/eec-referendum-result/" rel="noopener" target="_blank"><span data-dcnode-id="994" instrument_node="">referendum </span></a><span data-dcnode-id="992" instrument_node="">was held two years later in 1975, which was ultimately won by those campaigning to stay in the European community. Opposition to membership continued nonetheless, and expressed itself most obviously in the creation of the United Kingdom Independence Party (UKIP). In the 2014 </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/1057984/uk-euro-election-results/" rel="noopener" target="_blank"><span data-dcnode-id="991" instrument_node="">European Elections</span></a><span data-dcnode-id="989" instrument_node="">, UKIP won the highest share of the vote, and probably forced the hand of the Conservative Prime Minister, David Cameron, to promise a referendum on Britain's EU membership should he win re-election in 2015. After winning a decisive majority in the </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/283622/united-kingdom-uk-general-election-results-by-party/" rel="noopener" target="_blank"><span data-dcnode-id="988" instrument_node="">2015 General Election</span></a><span data-dcnode-id="986" instrument_node=""> Cameron set out to renegotiate more favorable terms of with the EU, and then to hold a referendum on membership in 2016. 
</span><br data-dcnode-id="985"><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">
After securing what he believed to be significant concessions from the EU, Cameron campaigned to remain in the organization, although the issue split his government down the middle, and key allies such as Boris Johnson notably joined the leave side. In the weeks leading up to the referendum, </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/517049/uk-eu-referendum-voting-intention/" rel="noopener" target="_blank"><span data-dcnode-id="982" instrument_node="">opinion polls </span></a><span data-dcnode-id="980" instrument_node="">indicated that the vote would be close, whoever should emerge victorious. While the remain camp focused on the economic impact of Brexit, leave campaigners highlighted the cost of EU membership, claiming that 350 million pounds a week in recuperated costs could be spent on the NHS, with this claim famously written on the side of giant red bus. One week before the vote, UKIP-leader Nigel Farage faced widespread criticism when he unveiled an anti-immigration poster which featured a picture of refugees and the words ‘breaking point’ on it. On the same day, the Labour MP Jo Cox was assassinated on the streets of her constituency by a far-right extremist, putting a temporary halt to the campaigning just one week before the referendum.
</span><br data-dcnode-id="979"><br data-dcnode-id="978"><h2 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Brexit becomes a reality</span></h2><span data-dcnode-id="975" instrument_node="">
On June 23, 2016, the </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/570118/eu-referendum-results/" rel="noopener" target="_blank"><span data-dcnode-id="974" instrument_node="">referendum </span></a><span data-dcnode-id="972" instrument_node="">went ahead as planned and attracted a huge voter </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/1050929/voter-turnout-in-the-uk/" rel="noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">turnout</span></a><span data-dcnode-id="969" instrument_node="">. As the results came in overnight, it became clear that leave had won a shock victory gaining 51.9 percent of the votes. Throughout England and Wales the leave vote was victorious, with London being the only </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/642636/brexit-votes-by-region/" rel="noopener" target="_blank"><span data-dcnode-id="968" instrument_node="">region </span></a><span data-dcnode-id="966" instrument_node="">where there were more remain voters. In Scotland and Northern Ireland, the reverse was true, giving fresh impetus to the question of Scottish Independence. A majority of 18 to 24-year-old's had also </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/520954/brexit-votes-by-age/" rel="noopener" target="_blank"><span data-dcnode-id="965" instrument_node="">voted </span></a><span data-dcnode-id="963" instrument_node="">to remain in the European Union, with older voters more likely to have voted to leave. Following the victory of the leave campaign, Brexit was now a reality, but how it would be executed was yet to be decided.


                </span><br data-dcnode-id="962"><br data-dcnode-id="961"><span class="byline italic" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">
                    This text provides general information. Statista assumes no
                    liability for the information given being complete or correct.
