Most mobile phone providers now charge us to use phones in the EU
</span></span><span data-dcnode-id="1565" instrument_node="">
</span><span class="e-caption__credit" data-dcnode-id="1560" data-test="credit" itemprop="copyrightHolder"><span data-dcnode-id="1564" instrument_node="">
</span><span class="e-caption__credit-description" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Credit</span></span><span data-dcnode-id="1561" instrument_node="">: massimo colombo
</span></span><span data-dcnode-id="1559" instrument_node="">
</span></figcaption><span data-dcnode-id="1557" instrument_node="">

</span></div><span data-dcnode-id="1553" instrument_node="">
</span><div class="grid-col grid-col-12 article__layout article__layout--content" data-dcnode-id="1212"><span data-dcnode-id="1552" instrument_node="">
</span><div data-dcnode-id="1375" data-js="article-body" itemprop="articleBody"><span data-dcnode-id="1551" instrument_node="">
</span><div class="articleBodyText section" data-dcnode-id="1456"><span data-dcnode-id="1550" instrument_node="">
</span><div class="js-advert advert" data-adtype="nat_story_top" data-dcnode-id="1549" id="advert_tmg_nat_story_top"></div><div class="component article-body-text" data-dcnode-id="1458" data-test="article-body-text"><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">It’s been a year since the transition arrangements ended and we left the EU completely. The impact on travel has been complicated by the pandemic, but a clearer picture is beginning to emerge of how Brexit is affecting us.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">&nbsp;A few issues, such as emergency healthcare, have been sorted with little change. Others – such as mobile phone charges – are likely to add to your travel costs. The most significant changes have been – in the short term – complications around passport validity, and – in the long term – for those, mostly young people, who were hoping to fund their travels by working in the EU. Here is my&nbsp;analysis.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Passports and visas</span></h2><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1535"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Then:</span></strong><span data-dcnode-id="1536" instrument_node=""> UK citizens have had freedom of&nbsp;movement between and within member countries of the EU or its ­previous incarnations since 1973. We could stay as long as we liked and we were able to use our passport until its final validity date.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><div class="js-advert advert dynamicMpu" data-adtype="dyn_0" data-dcnode-id="1533" id="advert_tmg_dyn_0" style="background-color: rgb(245, 245, 245); margin-bottom: 20px;"></div><p data-dcnode-id="1529"><strong data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Now:</span></strong><span data-dcnode-id="1530" instrument_node=""> UK citizens are allowed to enter the EU’s Schengen Area for up to 90 days in any 180-day period. Fears that it would take significantly longer for British citizens to be processed at airports and other immigration points in the EU haven’t yet materialised, but impacts are impossible to assess properly because of the reduction in travel caused by the pandemic and the bureaucracy created by Covid rules.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">There will be a further adjustment in 2023 (exact date to be confirmed) with the introduction of the new computerised Etias (European Travel Information and Authorisation System) visa waiver scheme. This is similar to an American Esta, and will probably cost £6 and be valid for several years. It is not a direct consequence of Brexit negotiations, since it will be imposed on many other countries, but it affects us because we are no longer EU citizens.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1524" instrument_node="">Meanwhile, the new passport validity rules have already caught out some readers – in some cases forcing them to abandon their holidays because they hadn’t realised they needed to renew it before they travelled as it still had three months of validity before the expiry date. The problem is that the EU counts a maximum of 10 years’ validity from the issue date – so in practice it is valid for nine years and nine months after that. However, the British government often issues passports with an extra few months added to the overall 10 year validity. This, the Foreign, Commonwealth &amp; Development Office says, is because “If you renewed your current passport before the previous one expired, extra months may have been added to its expiry date.” So you need to be sure that your passport was issued less than nine years nine months before your travel date, and if not, get it renewed in plenty of time: </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gov.uk/renew-adult-passport/renew" rel="nofollow"><span data-dcnode-id="1523" instrument_node="">gov.uk/renew-adult-passport/renew</span></a><span data-dcnode-id="1521" instrument_node="">.</span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1517" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Health and insurance</span></h2><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1510"><strong data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Then:</span></strong><span data-dcnode-id="1511" instrument_node=""> As members of the EU, British citizens had the right to free or reduced-cost medical treatment in other member countries, through the European Health Insurance Card (Ehic) scheme. This was especially vital for older ­travellers and those who have existing medical conditions because of the difficulty of getting insurance that would cover them.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1505"><strong data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Now: </span></strong><span data-dcnode-id="1506" instrument_node="">A new scheme has been ­introduced – the Ghic – which gives travellers similar protections to the old&nbsp;Ehic. Never­theless, France now requires ­British ­citizens to travel with proof of&nbsp;travel insurance that covers ­medical&nbsp;treatment.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Holiday protection and compensation</span></h2><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1497"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Then: </span></strong><span data-dcnode-id="1498" instrument_node="">The EU Travel Directive has long been a guarantee of financial protection against the failure of your holiday operator and sets time limits on when refunds must be made, as well as imposing other duties on travel com­panies. During the pandemic, it has been a particularly important fallback. Another EU directive, which also became UK law, entitles us to remark­ably high levels of compensation for delayed or cancelled flights.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1492"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Now: </span></strong><span data-dcnode-id="1493" instrument_node="">Under EU rules, the directive was enshrined in UK law, so it would require an Act of Parliament to revoke or alter it and it currently seems unlikely that this would happen. It must be said, though, that the Government did little to ensure that operators met their obligations to make prompt refunds for cancelled holidays during the first wave of the pandemic. We wait to see if British airlines will lobby to get delay compensation rules watered down, but I wouldn’t bet against it.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Driving abroad</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1484"><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Then:</span></strong><span data-dcnode-id="1485" instrument_node=""> Before Brexit, if you wanted to&nbsp;drive in the EU, you needed to carry only a full UK driving licence, and UK&nbsp;insurers were obliged to extend your insurance.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1479"><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Now:</span></strong><span data-dcnode-id="1480" instrument_node=""> The EU advises that “an Inter­national Driving Permit (IDP) might be needed by drivers who have a paper licence or a licence issued by Gibraltar, Guernsey, Jersey, or the Isle of Man”, and that you should check specific rules with the embassy of the country you are visiting. An IDP is obtainable at post offices (£5.50). If you take your own vehicle abroad, you also need to obtain a “green card” from your insurer to prove you have insurance (there may be&nbsp;a charge for this) and display a GB&nbsp;sticker.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Roaming charges</span></h2><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Then:</span></strong><span data-dcnode-id="1472" instrument_node=""> When we were part of the EU, UK mobile phone companies were not allowed to charge us extra for calls made and data used in other member countries. That rule ceased on Dec 31 last year. Vodafone, O2 and Three all indicated that they would continue to allow free roaming – though they didn’t indicate how long this would last.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1466"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Now: </span></strong><span data-dcnode-id="1467" instrument_node="">Three of the four biggest mobile operators have now said they will introduce charges for UK phones used in Europe. On most of its tariffs, Vodafone will offer roaming for £2 a day, or £8 a week, from Jan 6, 2022.&nbsp;</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Operator Three will charge £2 a day from May 23 for customers who have signed up or upgraded since October 2021. EE will also charge £2 a day from January for those who joined or upgraded after July&nbsp;7 2021.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Meanwhile, the Government has capped automatic data charges at £45 per month for operators that do not continue free roaming. But that doesn’t limit the rate at which you will be charged, just the total amount you can be billed automatically. So you could find that you reach the £45 limit rather quickly, then have to decide whether to&nbsp;stop using your phone or pay for more data.</span></p><span data-dcnode-id="1459" instrument_node="">
</span></div><span data-dcnode-id="1457" instrument_node="">
</span></div><span data-dcnode-id="1455" instrument_node="">
</span><figure class="article-body-image section" data-dcnode-id="1425" data-js="article-body-image" data-test="article-body-image" itemprop="image" itemscope="true" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="1454" instrument_node="">
</span><meta content="/content/dam/travel/2021/12/23/TELEMMGLPICT000281341850_trans_NvBQzQNjv4BqpVlberWd9EgFPZtcLiMQf0Rf_Wk3V23H2268P_XkPxc.jpeg" data-dcnode-id="1453" itemprop="url"><span data-dcnode-id="1452" instrument_node="">
</span><meta content="2500" data-dcnode-id="1451" itemprop="width"><span data-dcnode-id="1450" instrument_node="">
</span><meta content="1563" data-dcnode-id="1449" itemprop="height"><span data-dcnode-id="1448" instrument_node="">
</span><div class="article-body-image__container" data-dcnode-id="1439"><span data-dcnode-id="1447" instrument_node="">

Gone is the right to work in any other EU country; now a visa is required for the country you want to work in
</span></span><span data-dcnode-id="1434" instrument_node="">
</span><span class="e-caption__credit" data-dcnode-id="1429" data-test="credit" itemprop="copyrightHolder"><span data-dcnode-id="1433" instrument_node="">

</span><div class="articleBodyText section" data-dcnode-id="1377"><span data-dcnode-id="1423" instrument_node="">
</span><div class="component article-body-text" data-dcnode-id="1379" data-test="article-body-text"><span data-dcnode-id="1422" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Working abroad</span></h2><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1415"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Then: </span></strong><span data-dcnode-id="1416" instrument_node="">The right to work in any other&nbsp;EU country was a key privilege of&nbsp;membership.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1410"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Now: </span></strong><span data-dcnode-id="1411" instrument_node="">This right ended when we left the EU. From a traveller’s point of view, the change is most likely to affect young people who might want to fund a trip around Europe or learn a language by taking casual jobs, or work a ski season. They now need a visa from each country they want to work in. The pandemic has made it difficult to judge the real impact of this, but it looks as though numbers and opportunities have dropped sharply. For example, Tui, Britain’s biggest tour operator, told me that, “We’re still offering as many Brits as possible the opportunity to work for us as reps in EU countries, but as this has become much more limited since Brexit, next summer we will only be able to employ around a third of the number of Brits we normally would have in pre-Brexit years.”</span></p><span data-dcnode-id="1409" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Travelling with pets</span></h2><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Then:</span></strong><span data-dcnode-id="1403" instrument_node=""> Pet owners used to be able to get a pet passport issued in England, Wales or Scotland for travel to an EU country.&nbsp;</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1394"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Now:</span></strong><span data-dcnode-id="1398" instrument_node=""> TThe old pet passport scheme is no longer valid for British pets. You now need a new health certificate (valid for four months) for your pet each time it travels from England, Scotland or Wales to the EU or Northern Ireland. This must be obtained within 10 days of departure and is also valid for your return to the UK. The certificate must be issued by a vet, and will cost about £100-£150, though some vets charge more. There are other requirements for&nbsp;a microchip and vaccination – see </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gov.uk/guidance/pet-travel-to-europe-after-brexit" rel="nofollow"><span data-dcnode-id="1397" instrument_node="">gov.uk/guidance/pet-travel-to-europe-after-brexit</span></a><span data-dcnode-id="1395" instrument_node="">. Note that you can still use a pet passport issued in an EU country or Northern Ireland.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><h2 class="u-heading-size-large u-heading-style-colour" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Duty free shopping</span></h2><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Then: </span></strong><span data-dcnode-id="1387" instrument_node="">We lost the right to buy duty free when travelling between EU countries in 1999. But we gained the right to&nbsp;bring home virtually unlimited amounts of duty-paid goods – such as wine from France, where it is significantly cheaper than in the UK.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1381"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Now:</span></strong><span data-dcnode-id="1382" instrument_node=""> Duty free has been reintroduced, but the main beneficiaries are likely to be the sales outlets rather than the consumer. Most duty free brought back into the UK is bought in overseas airports – I haven’t managed to do a survey of these to see how they compare with costs on the UK high street. But I did compare current prices for some random examples of famous brands at World Duty Free in Gatwick with the current best offers in British supermarkets. A 70cl bottle of Original 10-Year-Old Glenmorangie costs £35.99 duty free, but is only slightly more expensive in Sainsbury’s, at £37. A 75cl bottle of Moët &amp; Chandon Brut Impérial is £36.99 duty free, but is currently much cheaper in Morrisons, at £28. You might be able to find some decent duty free savings, but I wouldn’t bank on it. Meanwhile, your duty-paid and duty-free limits have been merged, so you can only bring in 42 litres of beer, two cases of still wine or one case of champagne or sparkling wine.</span></p><span data-dcnode-id="1380" instrument_node="">
</span></div><span data-dcnode-id="1378" instrument_node="">
