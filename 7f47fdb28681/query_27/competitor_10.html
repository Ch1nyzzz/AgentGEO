  </span></span><span data-dcnode-id="886" instrument_node="">
</span><h1 class="gem-c-title__text govuk-heading-l" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">
    Beyond Brexit: a Global Britain
  </span></h1><span data-dcnode-id="883" instrument_node="">
</span></div><span data-dcnode-id="881" instrument_node="">
</span></div><span data-dcnode-id="879" instrument_node="">
</span><div class="govuk-grid-column-two-thirds" data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">
</span><p class="gem-c-lead-paragraph" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Foreign Secretary delivers first major policy speech at Chatham House.</span></p><span data-dcnode-id="875" instrument_node="">
</span></div><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="871" instrument_node="">
</span><div class="govuk-grid-row" data-dcnode-id="836"><span data-dcnode-id="870" instrument_node="">

</span><div class="gem-c-metadata" data-dcnode-id="845" data-gem-toggle-module-started="true" data-metadata-module-started="true" data-module="gem-toggle metadata"><span data-dcnode-id="867" instrument_node="">

</span><div class="app-c-important-metadata app-c-important-metadata--bottom-margin" data-dcnode-id="814"><span data-dcnode-id="830" instrument_node="">
</span><dl class="app-c-important-metadata__list" data-dcnode-id="816" data-gem-track-click-module-started="true" data-module="gem-track-click"><span data-dcnode-id="829" instrument_node="">
</span><dt class="app-c-important-metadata__term" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Location: </span></dt><span data-dcnode-id="826" instrument_node="">
</span><dd class="app-c-important-metadata__definition" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Chatham House, London</span></dd><span data-dcnode-id="823" instrument_node="">
</span><dt class="app-c-important-metadata__term" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Delivered on: </span></dt><span data-dcnode-id="820" instrument_node="">
</span><dd class="app-c-important-metadata__definition" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">2 December 2016 (Transcript of the speech, exactly as it was delivered)</span></dd><span data-dcnode-id="817" instrument_node="">
</span></dl><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span><figure class="app-c-figure" data-dcnode-id="806" lang="en"><span data-dcnode-id="812" instrument_node="">
</span><img alt="Foreign Secretary" class="app-c-figure__image" data-dcnode-id="811" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/feature/image/50012/FS.jpg&amp;raw"><span data-dcnode-id="810" instrument_node="">
</span><figcaption class="app-c-figure__figcaption" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">
</span></figcaption><span data-dcnode-id="807" instrument_node="">
</span></figure><span data-dcnode-id="805" instrument_node="">
</span><div class="gem-c-govspeak govuk-govspeak direction-ltr" data-dcnode-id="458" data-govspeak-module-started="true" data-module="govspeak"><span data-dcnode-id="804" instrument_node="">
</span><div class="govspeak" data-dcnode-id="460"><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">There is a sense in which the British cemetery in Kabul is a monument to the human spirit.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">A triumph of hope over experience and as I stood there last Saturday on a chilly and foggy morning I felt the eerie pathos of the place.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">It was here in 1842 that the Victorian catastrophist William Elphinstone was driven from his cantonment with a great rabble of camp-followers and it was not far from here that the knives of the Gilzais rose and fell until the British army of Afghanistan was wiped out – almost to a man</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Of Britain’s 19th century presence in Kabul there is now no legacy save this handful of broken gravestones, so defaced that you can hardly read the names of the dead except to see that one man had won a VC.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">They fell into decrepitude during Afghanistan’s civil wars and then the Taleban came and smashed them up again and then – almost incredibly -  in the 21st century the Brits came back and repaired the cemetery.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">And there on the walls are fresh names of the British dead of the 456 who gave their lives in the last 15 years from every part of the United Kingdom for the sake not of imperial glory but in the hope of improving the lives of the people of Afghanistan.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">And when you look at those names you imagine the pain of their families today, back in Britain and the suffering of the many more who have been badly injured and you ask yourself what manner of people are we – the British that we have come back here – to this country thousands of miles from home?</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">And we keep sending our soldiers to lay down their lives? Why? With one in eight of the people born in this country now living abroad a bigger diaspora than any other rich nation, you ask yourself what impulse drives this astonishing globalism, this wanderlust of aid workers and journalists and traders and diplomats and entrepreneurs, because whatever that feeling is, it isn’t xenophobia.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">And I imagine there are people in this distinguished audience today who are wondering whether the next generation of Brits will be possessed of the same drive, the same curiosity, the same willingness to take risks for far flung peoples and places.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Because this is the year in which, as we periodically do, we did something that startled our friends and rivals. We voted to leave the European Union.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">And ever since that extraordinary vote on June 23 there have been efforts to psychoanalyse the result and to impute bad motives to the British people and there have been plenty who have been only too quick to draw comparisons with populist movements across the world.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">All I will say is that we should not let these glib analogies replace individual analysis.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">In the famous words of Tolstoy [opening to Anna Karenina] “all happy families are alike, every unhappy family is unhappy in its own way”.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Discontent can have subtly different wellsprings. There were plenty of people who voted to leave the EU, and I count myself as one who thought on these lines, not because they disliked or feared foreigners, but because they believed in democracy.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">And after 43 years, because they had still not come to endorse the finalite politique of the EU, and it is my passionate belief that there is no contradiction whatever between a trust in the nation-state as the key building block of the global order and a generous and open mindset towards the rest of the world, and so my message to all those who are wondering – as Metternich supposedly did on the death of Talleyrand – what we meant by that is that Brexit emphatically does not mean a Britain that turns in on herself.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Yes – a country taking back control of its democratic institutions.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">But not a nation hauling up the drawbridge or slamming the door.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">A nation that is now on its mettle.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">A nation that refuses to be defined by this decision.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">A country galvanised by new possibilities and a country that is politically and economically and morally fated.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">To be more outward-looking and more engaged with the world than ever before.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">When I speak of Global Britain – and the need for us to commit ourselves to the peace and prosperity of the world. I know that there will be some who are wary that this sounds pretentious, in a nation that comprises less than one per cent of the world’s population.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">I know there will be cynics who say we can’t afford it. I say we can’t afford not to.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">To those who say we are now too small, too weak, too poor to have any influence on the world, I say in the words of Robert Burns:</span></p><span data-dcnode-id="731" instrument_node="">
</span><blockquote data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">
</span><p class="last-child" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">O wad some Power the giftie gie us
To see oursels as ithers see us!</span></p><span data-dcnode-id="727" instrument_node="">
</span></blockquote><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Because there are plenty of people who do understand what this country can do and the effect it can have – and you will find them overseas.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Indeed, there are probably a lot of British people who would not recognise the image of Britain – of ourselves – as seen through the eyes of others.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">I would not perhaps go as far as the people of Iran. Many of these, I am told, are still convinced that we are the Old Fox manipulating America and Israel in such a way as to be effectively running the world ourselves – a fact unbeknownst to most foreign policy experts.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">But I have been repeatedly impressed by the way people around the world are looking for a lead from Britain, engagement from Britain.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">And so whether we like it or not we are not some bit part or spear carrier on the world stage. We are a protagonist – a global Britain running a truly global foreign policy.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">And my message to you today, and I serve due warning that this is the first in a series of speeches setting out our foreign policy strategy, is that this global approach is in the interests both of Britain and the world.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">And there are three reasons why this is so:</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">The first is that it is in our interests to contribute to global stability; peace; order.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The security to invest that is the bedrock of economic growth. We have to acknowledge that the world is now not in good shape, indeed is more dangerous and volatile than for several decades.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">We have the cult of the strongman. We have democracy in retreat. We have an arc of instability across the Middle East from Iraq to Syria to Libya.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Is it our answer to cower and put our heads under the pillow? Emphatically not.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">We know vividly and tragically that events in Afghanistan can affect our lives here in London and that is partly why we are still there today.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">It is in the interests of global order that we are at the centre of a network of relationships and alliances that span the world.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">It is one of the great achievements of British diplomacy in the 20th century that – together with others - we effectively changed the basis and assumptions on which those relationships work</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">It was Britain in 1815 that helped to create the balance of power system of politics, a system that was remarkably successful for about a century in keeping the peace, until it could not cope with the rise of new states in the European order.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">And then we had the two world wars – which some historians now interpret as a single appalling event – and at the end of that, 1945, we had what you might call a translatio imperii. Hegemony had been transferred.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">And what AJP Taylor said he was tempted to call “the war of the British succession” was won convincingly by the United States. It was in that idealistic post war period that on either side of the Atlantic there were attempts to build institutions that could answer these nagging questions of nations and nationalism.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">A group of European countries responded to an instinct deep in the history of the continent and launched a project for a federal system of government, with a single court, a single legal system, and of course a customs union modelled on the zollverein that was the precursor to a unified German state.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">It would be fair to say that Britain and America had a different approach and together they sought to create a new system based not on power, not on centralised and federal law-making but on rules embodied by genuinely global institutions.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Alongside our American ally, we were present at the creation of the United Nations, of the UN Charter, of Nato and later of the Helsinki Final Acts. And of course Europe and North America ultimately worked together to build this new world.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">We stood together, with our west European allies, throughout the cold war and when that cold war ended 26 years ago we hoped that our rules-based liberal order would catch on and embrace the whole world. Alas, that vision has not really come to pass.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">And instead the great attempt at a post war liberal settlement is under unprecedented strain. The hard reality is that other nations were not swept along by the euphoria that I remember so well, many of you will remember.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">And there is a whole region of the world – the Middle East – where the nation-state system itself is in peril, where we are struggling against non-state actors who view the very concept of a global liberal order with contempt. It is precisely because of the intensity of these challenges that we need to redouble our resolve, to defend and preserve the best of the rules-based international order.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">If we fail, then we risk reverting to an older and more brutal system where the strong are free to bully or devour the weak. Where might is always right and the rules and institutions we have so painstakingly built fade away into irrelevance.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">We cannot allow this to happen. And so it is right that we stand shoulder to shoulder with America, and others, in the fight against Daesh. We are the second biggest contributor to the air campaign after the US.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">And that’s why we work ever more intensively with our five eyes intelligence partners – the United States, Canada, Australia, and New Zealand – in a network of like-minded democracies that spans the globe.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">We work on security with our European friends – and as I have said before, our role is to be a flying buttress, supportive of the EU project, but outside the main body of the church.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Now is the time to build a new and productive relationship, based on friendship and free trade, and a new European partnership where we continue to develop our work on things that matter to all of us in Europe.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">We are there with our EU friends – I’ve just been to a conference in Rome – in the fight against piracy off the horn of Africa and in dealing with the migration crisis in the Mediterranean.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Because we know that in keeping Britain safe our security depends on stabilising Europe’s wider neighbourhood. The southern Mediterranean and the ungoverned expanses of the Middle East and along the eastern borders of Nato. There we find British troops already set to deploy in our enhanced forward presence in the Baltic states.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Our resolve to fulfil our Nato obligations will be unbreakable.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">At the heart of this institution, Nato, the most durable and successful defensive alliance in history lies the security guarantee contained in the North Atlantic treaty article 5, that an attack on any one member “shall be considered an attack against them all”.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">And in offering that guarantee, President Elect Donald Trump has a point. It cannot be justified that one Nato ally – America – accounts for about 70 per cent of the alliance’s defence spending while the other 27 countries manage only 30 per cent between them.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">I want every Nato member to meet the agreed target of spending 2 per cent of GDP on defence and 20 per cent of their defence budget on new equipment. Britain already abides by this target and I note that Nato’s most exposed members – including Estonia and Poland – do so as well.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">But as Jens Stoltenberg, Nato Secretary General has pointed out, there is no contradiction between deterrence and dialogue. Britain is prepared to be tough with Russia. But that does not mean it is wrong to talk and to engage.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Yes, it is Britain that insists on our resolve to enforce sanctions against Russia for their occupation of Crimea and their hand in the war against eastern Ukraine. It is Britain again that has been the firmest in denouncing Russia’s part in the destruction of Aleppo.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">For all these reasons we cannot normalise relations with Russia or go back to “business as usual”.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">But as I have said time and again Russia could win the acclaim of the world by halting its bombing campaign of Syria, delivering Assad to peace talks, abiding by the letter of the Minsk agreements in Ukraine.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">I know that neither the Prime Minister Theresa May nor I will relent in our pressure or in delivering those messages face to face.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">But, as Global Britain our range is not confined to the immediate European hinterland as we see the rise of new powers. It is right that we should make a distinctive approach to policy-making as regards China and East Asia.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Our approach in that region must go beyond the quest for exports and commercial contracts, vital though they are.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">The emerging balance of power system in Asia needs the influence of friendly countries – with our emphasis on the rules-based system - in order to reduce the risk of miscalculation and unwanted confrontation.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">But one lesson that Britain has learned from centuries of evolutionary change in our own institutions is that you must be willing to reform a system in order to save it.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">We should be realistic enough to accept that the international order needs to change. That is why Britain supports enlarging the permanent membership of the Security Council to other global powers, including India</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">And we were one of the first countries to join the Asian Infrastructure Investment Bank, which is capitalised largely by China.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">And then there are some great international institutions that do not so much need to reform, but simply to receive a new burst of energy.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">That brings me to the second area where global Britain can make a difference.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Back in that post-war moment, the end of the Second World War, we not only helped to found Nato and the UN – it was JM Keynes who was instrumental in bringing to birth the Bretton Woods institutions, the IMF and World Bank.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">And then next year we helped to found the General Agreement on Tariffs and Trade (GATT).</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Now the WTO, that over decades has helped to break down the folly of protectionism and open markets, a benign and transformative process that is not only good for Britain, since our trade amounts to nearly 60% of our GDP, but which is good for the world, lifting billions of people out of poverty in the last 40 years.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">And yet the gossamer web of obstruction is growing thicker every year, and the political support for openness in trade is draining away across the world, and for the first time in decades trade is no longer growing as fast as global GDP, with volumes rising by only 2.8 per cent this year compared with an average of 5 per cent since 1990.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">And since it is the world’s poorest who will suffer most from this atrophy, it is our historic post-Brexit function, as the PM has said, to be the leading agitators for free trade. Again confounding those who are willing to misread Brexit by seizing the moment to campaign for openness and open markets across the globe beginning with some of those dynamic commonwealth economies that are already queuing up to do free trade deals.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">And then there is the third way that Global Britain can do good for the world and for itself and that is in the projection of our values and our priorities; and we have enormous scope to do this.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">We are not only the second biggest defence spender in NATO, we also have the largest overseas aid budget in Europe.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">In the last five months I have seen going around the world how Priti Patel is making every pound count to change the lives of the neediest and to tackle the world’s biggest and most intractable problems. Not just poverty and disease, but mass migration exhaustion of resources and the  consequent  extinction of species.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">If I may be permitted to take one example that obsesses me almost as much as it obsesses my father, it is the tragic fate of the African elephant.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">It is mankind’s privilege to share the planet with these magnificent and curious creatures, these throwbacks from the Pleistocene, and it is heart-breaking to see that their numbers have shrunk from 1.2 m in the 1990s to a mere 415,000 today.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">That is 110,000 elephants gone since 2006. In our lifetimes they could be gone altogether.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Animals who have filled our imaginations since childhood and whose every attribute is a walking metaphor and even if you don’t care if they all get turned into umbrella stands and billiard balls.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Even if you don’t mind if our great grandchildren grow up in a world without elephants - and I do mind deeply - let me suggest to you that the death of the elephant is a disaster that proceeds from other disasters.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Not just poaching, and the gangs that run the poaching are also of course the people who engage in human trafficking, but the massive growth in population that means a contest for resources that an elephant is never going to win.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The population of Africa is now pushing a billion and in many countries it is doubling every 20 or 25 years.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">What is the answer to this population boom? - which, by the way, global population growth is another of those things that we thought had got better 20 or 25 years ago we thought we were turning the tide.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">I will give you one of the answers.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">I saw it in Pakistan the other day, which has itself its own population boom, they’re heading for 200 million people, 250 million in the next few years where two thirds of adult women cannot read or write.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">I saw what we’re doing to tackle this, I stood in a DFID–funded classroom in the Punjab and asked the girls what they had been reading. You know what they said, Harry Potter – in Urdu. I asked them who was the headmaster of Hogwarts, and you know what they said.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Of course I suppose you could and I will make a commercial case for Britain’s interest in this.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">The more girls who can read around the world the more copies of Harry Potter you can sell.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">But that isn’t why your money - British taxpayers’ money - is being used to teach 6m girls in the Punjab to read. It is about giving them the chance to take control of their lives.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">All evidence confirms that wherever women are empowered and educated there are immediate improvements in the prosperity of that society and the stabilisation of the birth rate.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">And with the world now likely to hit 11 bn people by 2050 - not 9 bn as we thought a decade or so ago, but 11 bn people - that British mission to educate young women and girls, to save them from the evil of modern slavery, to uphold our belief in equality wherever we go is as profoundly in our interests as it is of girls in the developing world.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">We do not now run an empire and it is a relief, frankly to us, that we don’t and perhaps to others as well.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">We are not the greatest military power on earth.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">We of course recognise the limits of what we can achieve on our own.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">But we should never underestimate the catalytic power of our creativity and the sheer concentration of intellectual resources to be found on this island.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Of all the world’s kings and queens and presidents and prime ministers one in every seven was educated in Britain.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Cambridge University alone has produced more Nobel Prize winners than every university in Russia and China added together and multiplied by two and in the words of a Russian spectator at the Olympic opening ceremony, Britain wrote the soundtrack of the world.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Britain is not just a link or a bridge between Europe and America, we are not merely the intersecting set of a complex Venn diagram, we have our own distinctive identity and contribution.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">And of course like all nations who attempt to project their values overseas, we have our mistakes and our failures. We should have the wisdom to know our limitations and to face the world with humility.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">But we should not let that proper sense of realism obscure the extraordinary things we are capable of doing.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">I end with a conversation I had last week in Afghanistan  talking to President Ghani, a highly intelligent guy – a Pashtun whose forefathers cut down our troops in the passes in 1842.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">I have to admit that he embarrassed me, not because he railed at the British for the Durand line or for our colonial misdemeanours, no – he thanked me, profusely and repeatedly for the sacrifice of the 456 British troops who have given their lives and whose names I saw on that wall.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">He was absolutely categorical that this time – this century - our legacy was positive and lasting.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Millions of girls we have helped to teach in Afghanistan fields that are now irrigated and clear of mines and some of the poorest and most isolated villages in the world now with the blessing of electricity thanks to the labour of British troops.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Since I felt a little bit nonplussed at being thanked for things I personally had no hand whatever in delivering I pass on those thanks to this distinguished foreign policy audience today.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Britain has not always acquitted itself well in Afghanistan and we in our generation have rightly found much to reproach in the vaulting jingo of our Victorian ancestors.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">But in sticking up for a liberal international order in the confusion and discord of the early 21st century, I believe this country is overwhelmingly a force for the good with the potential to do even more and we should not be nervous of saying so.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Thank you very much.</span></p><span data-dcnode-id="461" instrument_node="">
</span></div><span data-dcnode-id="459" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
