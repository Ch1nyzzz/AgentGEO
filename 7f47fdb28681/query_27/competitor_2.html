</span><p class="entry-meta" data-dcnode-id="2508"><span data-dcnode-id="2516" instrument_node="">Last updated on </span><time class="entry-modified-time" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">February 7, 2020</span></time><span data-dcnode-id="2513" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2509"><a class="entry-author-link" data-dcnode-id="2510" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearias.com/author/alex-andrews-george/" rel="author"><span class="entry-author-name" data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Alex Andrews George</span></span></a></span></p></header><div class="entry-content" data-dcnode-id="1947"><div class="pf-content" data-dcnode-id="2099"><p data-dcnode-id="2503"><img alt="Brexit: Right-Wing Conservatism" class="aligncenter size-full wp-image-10897" data-dcnode-id="2506" height="442" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearias.com/up/Brexit-Right-Wing-Conservatism.jpg&amp;raw" srcset="https://www.clearias.com/up/Brexit-Right-Wing-Conservatism.jpg 640w, https://www.clearias.com/up/Brexit-Right-Wing-Conservatism-300x207.jpg 300w" width="640"><strong data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">What is Brexit? How does Brexit affect UK, India, and the European Union?</span></strong></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">We have tried to include everything you need to know about the Brexit here after much research.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">We hope our readers would get clear answers to many questions like ‘What is Brexit?’, ‘What is the European Union?’, Why the ‘Leave EU’ campaign?’, ‘Brexit referendum and the result’, ‘positive and negative impact of Brexit referendum to India and the world’ etc.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><h2 data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">What is Brexit?</span></h2><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2492" instrument_node="">It is the abbreviation of “British Exit” from the </span><a data-dcnode-id="2490" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearias.com/european-union-eu/"><span data-dcnode-id="2491" instrument_node="">European Union (EU)</span></a><span data-dcnode-id="2489" instrument_node="">.</span></p><div class="code-block code-block-1" data-dcnode-id="2475" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2487" instrument_node="">
</span><div class="noprint" data-dcnode-id="2477"><div data-dcnode-id="2478" style="background-color:#FFF3BE; padding: 20px; margin: 1px; border-style: solid; border-width: 2px; border-color: #FFF3BE; text-align: center; color:#000000; background-image: linear-gradient(to bottom, #FFF3BE, #FFF3BE);"><h3 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">UPSC Prelims Test Series 2022</span></h3><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Enroll now and get 40% OFF.</span></p><span data-dcnode-id="2482" instrument_node=""> </span><p data-dcnode-id="2479"><a class="button small" data-dcnode-id="2480" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleariasexam.com/upsc-prelims-online-mock-test-series-2022-eab/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="2481" instrument_node="">Join Now</span></a></p></div></div><span data-dcnode-id="2476" instrument_node="">
</span></div><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Brexit&nbsp;mirrors the term Grexit — a term which was coined and used by two Citigroup’s economists in February 2012 to refer to the possible exit of Greece from the EU.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Britain has had a troubled relationship with the EU since the beginning and has made various attempts in the past to break away from it.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><h2 data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">What is the European Union?</span></h2><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">The EU is a political, trade and economic union founded in 1957. It evolved over decades and reached its present model in 1992.</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">There are 51 countries in Europe, out of which 28 countries have signed a treaty to become a part of the European Union. So, clearly, there are countries in Europe which are not part of the European Union.</span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">The EU treaty provided for a European Parliament and European Council which consisted of representatives of the member states.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">EU members account for 16 per cent of world imports and exports.</span></p><div class="code-block code-block-2" data-dcnode-id="2443" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2453" instrument_node="">
</span><div class="noprint" data-dcnode-id="2444"><div data-dcnode-id="2445" style="background-color:#FFF3BE; padding: 20px; margin: 1px; border-style: solid; border-width: 2px; border-color: #FFF3BE; text-align: center; color:#000000; background-image: linear-gradient(to bottom, #FFF3BE, #FFF3BE);"><h3 data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">UPSC Prelims Marks Booster Program 2022</span></h3><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Make a big jump in your marks.</span></p><p data-dcnode-id="2446"><a class="button small" data-dcnode-id="2447" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleariasclasses.com/prelims-marks-booster-2022" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="2448" instrument_node="">Join Now</span></a></p></div></div></div><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">It is the largest trading bloc in the world surpassing the US.</span></p><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">In 2012, the EU was awarded the Nobel Peace Prize for advancing the causes of peace, reconciliation, democracy and human rights in Europe.</span></p><span data-dcnode-id="2436" instrument_node="">
</span><h2 data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">What is the Euro Area?</span></h2><span data-dcnode-id="2433" instrument_node="">
</span><ul data-dcnode-id="2422"><span data-dcnode-id="2432" instrument_node="">
</span><li data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">The Euro Area (EA) is a subset of the EU, which is a monetary union of 19 of the 28 countries which use the common currency, Euro.</span></li><span data-dcnode-id="2429" instrument_node="">
</span><li data-dcnode-id="2424"><span data-dcnode-id="2428" instrument_node="">Not all EU members use the Euro. </span><a data-dcnode-id="2426" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newindianexpress.com/columns/Brexit-What-it-means-for-Europe-and-the-world/2016/06/25/article3498555.ece1" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2427" instrument_node="">Britain is an EU member, it is not part of the EA</span></a><span data-dcnode-id="2425" instrument_node="">. It does not use the Euro and has retained its own currency, the Pound Sterling.</span></li><span data-dcnode-id="2423" instrument_node="">
</span></ul><span data-dcnode-id="2421" instrument_node="">
</span><h2 data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Why the ‘Leave EU’ campaign?</span></h2><span data-dcnode-id="2418" instrument_node="">
</span><ul data-dcnode-id="2401"><span data-dcnode-id="2417" instrument_node="">
</span><li data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">The Leave Campaign argues that Britain is losing out a big deal by staying in the EU.</span></li><span data-dcnode-id="2414" instrument_node="">
</span><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">It has to pay millions of pounds each week as a contribution to the European budget.</span></li><span data-dcnode-id="2411" instrument_node="">
</span><li data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">The extremely bureaucratic nature of the European parliament is hurting British exporters</span></li><span data-dcnode-id="2408" instrument_node="">
</span><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Migration from the European Union into Britain (mainly PIGS economies) is creating an imbalance in the welfare schemes of the UK government.</span></li><span data-dcnode-id="2405" instrument_node="">
</span><li data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">But, those who oppose the campaign say that Britain is a net gainer if She stays in the EU.</span></li><span data-dcnode-id="2402" instrument_node="">
</span></ul><span data-dcnode-id="2400" instrument_node="">
</span><h2 data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">About the referendum and the result</span></h2><span data-dcnode-id="2397" instrument_node="">
</span><ul data-dcnode-id="2374"><span data-dcnode-id="2396" instrument_node="">
</span><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">A referendum denotes voting in which everyone (or nearly everyone) of voting age can take part, normally giving a ‘Yes’ or ‘No’ answer to a question. The side which gets more than half of all votes cast is declared a winner.</span></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Prime Minister David Cameron (Conservative Party) had promised to hold a referendum for Brexit if he won the 2015 general election. But, he led&nbsp;the campaign for ‘stay’ vote.</span></li><span data-dcnode-id="2390" instrument_node="">
</span><li data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">There were&nbsp;growing calls from many MPs of the Conservative Party&nbsp;and the UK Independence Party (UKIP), for a new referendum. (</span><a data-dcnode-id="2387" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livemint.com/Politics/oS6jJi0YjwvZsNcTwEQlSM/The-ins-and-outs-of-Brexit-and-the-consequences-for-India.html" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2388" instrument_node="">In 1975, Britain had&nbsp;voted to stay in the EU in a referendum</span></a><span data-dcnode-id="2386" instrument_node="">).</span></li><span data-dcnode-id="2384" instrument_node="">
</span><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">A referendum was held on&nbsp;June 23, 2016, to decide whether Britain should exit or remain in the European Union.</span></li><span data-dcnode-id="2381" instrument_node="">
</span><li data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Eligible voters: All British, Irish and Commonwealth citizens over 18 who are resident in the UK, along with UK nationals living abroad who have been on the electoral register in the UK in the past 15 years.</span></li><span data-dcnode-id="2378" instrument_node="">
</span><li data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">51.9% of voters favoured exit of Britain from the EU.&nbsp;It is the first time since the EU was founded in 1957 that a member country is leaving.</span></li><span data-dcnode-id="2375" instrument_node="">
</span></ul><span data-dcnode-id="2373" instrument_node="">
</span><h2 data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">India, the UK, and the European Union</span></h2><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><img alt="Brexit" class="aligncenter size-full wp-image-9325" data-dcnode-id="2369" height="371" loading="lazy" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearias.com/up/Brexit-Mod-and-Cameron.jpg&amp;raw" srcset="https://www.clearias.com/up/Brexit-Mod-and-Cameron.jpg 660w, https://www.clearias.com/up/Brexit-Mod-and-Cameron-300x169.jpg 300w" width="660"></p><span data-dcnode-id="2367" instrument_node="">
</span><ul data-dcnode-id="2332"><span data-dcnode-id="2366" instrument_node="">
</span><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">India is one of the top investors in the UK.</span></li><span data-dcnode-id="2363" instrument_node="">
</span><li data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">There are about 800 Indian-owned companies in the country employing roughly 110,000 people. (Eg:&nbsp;Jaguar Land Rover is owned by the Tata group)</span></li><span data-dcnode-id="2360" instrument_node="">
</span><li data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Many of these firms made investments with the wider European market in mind.</span></li><span data-dcnode-id="2357" instrument_node="">
</span><li data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Together, the UK and Europe account for over-a-quarter of the country’s IT exports, worth around $30bn.</span></li><span data-dcnode-id="2354" instrument_node="">
</span><li data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">The UK is the third-largest source of foreign direct investment in India and India’s largest G20 investor.</span></li><span data-dcnode-id="2351" instrument_node="">
</span><li data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">India is the third-largest source of FDI to the UK in terms of numbers of projects. India invests more in the UK than in the rest of Europe combined, emerging as the UK’s third-largest FDI investor.</span></li><span data-dcnode-id="2348" instrument_node="">
</span><li data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">The key sectors attracting Indian investment include healthcare, agritech,&nbsp;food, and drink.</span></li><span data-dcnode-id="2345" instrument_node="">
</span><li data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node="">In November 2015, Prime Minister Modi has said, ”</span><a data-dcnode-id="2342" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-asia-india-36624507" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2343" instrument_node="">As far as India is concerned, if there is an entry point for us to the EU, that is the UK</span></a><span data-dcnode-id="2341" instrument_node="">.”</span></li><span data-dcnode-id="2339" instrument_node="">
</span><li data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">But, the UK is only India’s 12th largest trade partner, well behind other European countries such as Germany and Switzerland.</span></li><span data-dcnode-id="2336" instrument_node="">
</span><li data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Interestingly, the UK is also among just seven in 25 top countries with which India enjoys a trade surplus.</span></li><span data-dcnode-id="2333" instrument_node="">
</span></ul><span data-dcnode-id="2331" instrument_node="">
</span><h2 data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Negative Impacts of the Brexit referendum on India</span></h2><span data-dcnode-id="2328" instrument_node="">
</span><ul data-dcnode-id="2279"><span data-dcnode-id="2327" instrument_node="">
</span><li data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">India will have to adjust to changing world order.</span></li><span data-dcnode-id="2324" instrument_node="">
</span><li data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">There may be foreign fund outflow and dollar rise.</span></li><span data-dcnode-id="2321" instrument_node="">
</span><li data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Rupee may depreciate because of the double effect of foreign fund outflow and dollar rise.</span></li><span data-dcnode-id="2318" instrument_node="">
</span><li data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">This may&nbsp;increase petrol and diesel prices to an extent.</span></li><span data-dcnode-id="2315" instrument_node="">
</span><li data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">The government then may want to reduce additional excise duty imposed on fuel when it was on a downward&nbsp;trajectory. This may&nbsp;increase fiscal deficit unless revenue increased.</span></li><span data-dcnode-id="2312" instrument_node="">
</span><li data-dcnode-id="2308"><a data-dcnode-id="2310" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.business-standard.com/article/international/what-is-brexit-and-how-does-it-impact-india-116062000026_1.html" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2311" instrument_node="">Prices of gold, electronic goods, among others may also increase</span></a><span data-dcnode-id="2309" instrument_node="">.</span></li><span data-dcnode-id="2307" instrument_node="">
</span><li data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Sensex and Nifty may tumble in the short-run.</span></li><span data-dcnode-id="2304" instrument_node="">
</span><li data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">The falling value of the pound could render several existing contracts loss-making.</span></li><span data-dcnode-id="2301" instrument_node="">
</span><li data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">The vote is also </span><a data-dcnode-id="2298" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.wsj.com/indiarealtime/2016/06/24/what-the-brexit-vote-means-for-indian-companies-with-ties-to-u-k/" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2299" instrument_node="">bad news for Indian outsourcers</span></a><span data-dcnode-id="2297" instrument_node="">.</span></li><span data-dcnode-id="2295" instrument_node="">
</span><li data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Foreign funds are likely to move out if the world outside thinks that investment in India is risky.</span></li><span data-dcnode-id="2292" instrument_node="">
</span><li data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">India’s Forex (currently a record 363 billion dollars) may diminish, particular if the currency is stored in Euros or Pound (this comes around&nbsp;20% of total forex).</span></li><span data-dcnode-id="2289" instrument_node="">
</span><li data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Brexit will have a negative impact on the $108 billion Indian IT sector in the short term.</span></li><span data-dcnode-id="2286" instrument_node="">
</span><li data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Many Indian companies are listed on the London Stock Exchange and many have European headquarters in London. Brexit will take away this advantage.</span></li><span data-dcnode-id="2283" instrument_node="">
</span><li data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Due to fall in the value of Pound sterling, Indian&nbsp;exports to the UK will suffer. Cheaper rupee will make Indian exports, including IT and ITeS, competitive. Indian import companies operating in the UK may also report a loss. Also, note that India is exporting more than what it is importing from Britain.</span></li><span data-dcnode-id="2280" instrument_node="">
</span></ul><span data-dcnode-id="2278" instrument_node="">
</span><h2 data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Positive&nbsp;Impacts of the Brexit referendum on India</span></h2><span data-dcnode-id="2275" instrument_node="">
</span><ul data-dcnode-id="2228"><span data-dcnode-id="2274" instrument_node="">
</span><li data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">There are many&nbsp;who think a weakening British currency might be good news.</span></li><span data-dcnode-id="2271" instrument_node="">
</span><li data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">India being more of an importing country than an exporting nation, the overall effect may turn out positive for India (if the dollar doesn’t appreciate much against rupee).</span></li><span data-dcnode-id="2268" instrument_node="">
</span><li data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">With lower pound value, Indian companies may be able to acquire many hi-tech assets.</span></li><span data-dcnode-id="2265" instrument_node="">
</span><li data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">As investors look around the world for safe havens in these turbulent times, India stands out both in terms of stability and of growth.</span></li><span data-dcnode-id="2262" instrument_node="">
</span><li data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Brexit might give a boost to trade ties between India and the UK.</span></li><span data-dcnode-id="2259" instrument_node="">
</span><li data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Britain will now be free to discuss a bilateral trade pact with India.</span></li><span data-dcnode-id="2256" instrument_node="">
</span><li data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Due to the fall in the value of Pound sterling, those who import from the UK will gain. Indian export companies operating in the UK may also gain.</span></li><span data-dcnode-id="2253" instrument_node="">
</span><li data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">More Indian&nbsp;tourists can afford to visit Britain in the coming days as the currency value has fallen.</span></li><span data-dcnode-id="2250" instrument_node="">
</span><li data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">More Indian&nbsp;students can afford to study in Britain (for higher education) as the fees may seem cheaper.</span></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">Britain will need a steady inflow of talented labour, and </span><a data-dcnode-id="2244" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ndtv.com/opinion/your-guide-to-brexit-and-5-ways-it-will-impact-india-1421554" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2245" instrument_node="">India fits the bill perfectly due to its English-speaking population</span></a><span data-dcnode-id="2243" instrument_node="">.</span></li><span data-dcnode-id="2241" instrument_node="">
</span><li data-dcnode-id="2236"><span data-dcnode-id="2240" instrument_node="">The fall in the prices of commodities like crude, which will help </span><a data-dcnode-id="2238" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economictimes.indiatimes.com/markets/stocks/news/when-the-world-is-jittery-over-brexit-india-has-reasons-to-smile-heres-why/articleshow/52899012.cms" rel="noopener noreferrer external" target="_blank"><span data-dcnode-id="2239" instrument_node="">India save a lot on its import bill</span></a><span data-dcnode-id="2237" instrument_node=""> (every $1 drop in crude prices leads to roughly $1 billion savings in India’s oil import bill), reducing its trade and current account deficits (CAD).</span></li><span data-dcnode-id="2235" instrument_node="">
</span><li data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Brexit would weaken global growth and lead to a meaningful decline in commodity prices. This is only going to enhance both the relative and absolute appeal of India.</span></li><span data-dcnode-id="2232" instrument_node="">
</span><li data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Lower commodity prices will help the macro fundamentals: be it fiscal deficit, current account deficit or inflation, which will give the government more levers to pump up the investment cycle.</span></li><span data-dcnode-id="2229" instrument_node="">
</span></ul><span data-dcnode-id="2227" instrument_node="">
</span><h2 data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Brexit: What does it mean to Britain?</span></h2><span data-dcnode-id="2224" instrument_node="">
</span><ul data-dcnode-id="2192"><span data-dcnode-id="2223" instrument_node="">
</span><li data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">As per International Monetary Fund (IMF), a vote to exit the European Union in the referendum could leave Britain’s economy more than 5 per cent smaller by 2019 than if it stays in the 28-nation club.</span></li><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Brexit could cause the country’s economy to be between 3.8 and 7.5 per cent smaller by 2030.</span></li><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The pound expected to fall by around 20 per cent. This would mean that exports to the UK will suffer and imports from the UK will gain. Export companies operating in the UK will gain, while import companies will lose.</span></li><span data-dcnode-id="2214" instrument_node="">
</span><li data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">More foreign tourists will visit Britain in the coming days as the currency value has fallen.</span></li><span data-dcnode-id="2211" instrument_node="">
</span><li data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">More foreign students may prefer Britain for higher education as the fees may seem cheaper.</span></li><span data-dcnode-id="2208" instrument_node="">
</span><li data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">EU citizens in Britain and Brits living in other EU nations would have to update their immigration statuses.</span></li><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Companies operating in both the UK and the EU would have to verify that they’re compliant with two sets of laws.</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">US President Obama has warned that it could take 10 years for Britain to negotiate a new trade deal with the US.</span></li><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">The referendum results (52:48) is very close. This means a&nbsp;major division of opinion in Britain which has social implications too. While the less educated and the old seems to favour the ‘leave EU’ campaign, the young and the employed are more in favour of Britain staying in the EU.</span></li><span data-dcnode-id="2196" instrument_node="">
</span><li data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Brexit could encourage England, Wales, Scotland, or Northern Ireland to appeal for quitting the United Kingdom.</span></li><span data-dcnode-id="2193" instrument_node="">
</span></ul><span data-dcnode-id="2191" instrument_node="">
</span><h2 data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Brexit: What does it mean to the World?</span></h2><span data-dcnode-id="2188" instrument_node="">
</span><ul data-dcnode-id="2162"><span data-dcnode-id="2187" instrument_node="">
</span><li data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Remittance from the UK to countries outside in terms of Pound will fetch lesser returns compared to the past.</span></li><span data-dcnode-id="2184" instrument_node="">
</span><li data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Export dominated countries may be affected, whether exporting to the UK or not. If the UK is the major trading partner, the effect will be more.</span></li><span data-dcnode-id="2181" instrument_node="">
</span><li data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">The United States will bear the major brunt of a Brexit being the UK’s biggest trading partner.</span></li><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">A&nbsp;direct impact on Asian economies from Brexit is unlikely in the </span><strong data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">long term</span></strong><span data-dcnode-id="2174" instrument_node=""> because as a percentage of GDP, exports to the UK is less than 2% for most economies.</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">But businesses in some major Asian economies – like India and Japan- will be hit.</span></li><span data-dcnode-id="2169" instrument_node="">
</span><li data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Companies which have set up operations in the UK to gain access to EU markets will be affected.</span></li><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">BREXIT would likely allow any US Dollar strength to play out. This may cause other currencies to decline in value.</span></li><span data-dcnode-id="2163" instrument_node="">
</span></ul><span data-dcnode-id="2161" instrument_node="">
</span><h2 data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Is India ready to handle the Brexit?</span></h2><span data-dcnode-id="2158" instrument_node="">
</span><ul data-dcnode-id="2141"><span data-dcnode-id="2157" instrument_node="">
</span><li data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">The finance ministry said that&nbsp;the country has sufficient foreign exchange reserves to handle any impact.</span></li><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">RBI Governor then, Raghuram Rajan, said the central bank will infuse whatever liquidity is needed into the Indian market to keep it “well behaved”.</span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">SEBI and stock exchanges have beefed up their surveillance mechanism to deal with any excessive volatility.</span></li><span data-dcnode-id="2148" instrument_node="">
</span><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">If exports to the UK are costly and imports are cheaper, India can think of utilizing the import-advantage by reversing the present trade scenario.</span></li><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Once the dust settles, India may&nbsp;be seen to be a net gainer and inflows would continue to gravitate towards the Indian shores.</span></li><span data-dcnode-id="2142" instrument_node="">
</span></ul><span data-dcnode-id="2140" instrument_node="">
</span><h2 data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Latest Updates on Brexit</span></h2><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><img alt="Theresa May on Brexit" class="aligncenter size-full wp-image-19959" data-dcnode-id="2136" height="477" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearias.com/up/Theresa-May.png&amp;raw" srcset="https://www.clearias.com/up/Theresa-May.png 800w, https://www.clearias.com/up/Theresa-May-300x179.png 300w, https://www.clearias.com/up/Theresa-May-768x458.png 768w" width="800"></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2130"><span data-dcnode-id="2133" instrument_node="">Negotiations with the EU officially started in June 2017, aiming to complete the withdrawal agreement by October 2018. However, that didn’t happen. </span><sup class="reference" data-dcnode-id="2132" id="cite_ref-12"></sup><span data-dcnode-id="2131" instrument_node="">Having failed to get her agreement approved, May resigned as prime minister in July 2019 and was succeeded by Boris Johnson.</span></p><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Boris Johnson sought to replace parts of the agreement and vowed to leave the EU by the new deadline. An early general election was then held on 12 December. The Conservatives won a large majority in that election, with Johnson declaring that the UK would leave the EU in early 2020.</span></p><div class="code-block code-block-3" data-dcnode-id="2116" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2126" instrument_node="">
</span><div class="noprint" data-dcnode-id="2117"><div data-dcnode-id="2118" style="background-color:#FFF3BE; padding: 20px; margin: 1px; border-style: solid; border-width: 2px; border-color: #FFF3BE; text-align: center; color:#000000; background-image: linear-gradient(to bottom, #FFF3BE, #FFF3BE);"><h3 data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">UPSC Prelims cum Mains 1-Year Online Program</span></h3><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Starts @ Rs.49000.</span></p><p data-dcnode-id="2119"><a class="button small" data-dcnode-id="2120" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleariasclasses.com/programs%23pcm" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="2121" instrument_node="">Join Now</span></a></p></div></div></div><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">The Withdrawal Agreement was ratified by the UK Parliament on 23 January 2020, and by the European Parliament on 29 January, ensuring the UK leaves the EU on 31 January.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">UK left the EU at 11 p.m. GMT on 31 January 2020.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">However, the UK is still negotiating the future trade relationship with the EU. Britain is now going through a transition period where negotiations are open. The transition period will end on 31 December 2020.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">During the transition, the UK still remains subject to EU law and remains part of the EU customs union and single market, but is no longer part of the EU’s political institutions.</span></p><span data-dcnode-id="2103" instrument_node="">
