</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">The question of how </span><a data-dcnode-id="1115" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ft.com/eu-referendum"><span data-dcnode-id="1116" instrument_node="">Brexit</span></a><span data-dcnode-id="1114" instrument_node=""> will affect the UK economy is one of the crucial issues now that Britain has voted to leave the EU. The fall in sterling, the slide in stock markets and the freeze in investment are all indications that the short-term impact will be serious.</span></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">But the bigger question is how breaking up with Brussels will affect the economy longer term.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Millions of words on the topic — including economists’ majority view that leaving the bloc will slow growth and the Leave campaign’s counterarguments that Britain will prosper — could be replaced by seven charts.</span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="1106" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu" data-o-ads-targeting="pos=mid;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="1107" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="1108"></div></div></div><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">These sum up the arguments over what breaking up with Brussels will really mean for jobs, growth and public finances. </span></p><h2 class="n-content-heading-4" data-dcnode-id="1102" id="the-eu-was-good-for-britain-0"><span data-dcnode-id="1103" instrument_node="">The EU was good for Britain</span></h2><span data-dcnode-id="1101" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="1097" style="width: 600px; max-width: 100%;"><span data-dcnode-id="1100" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="1099" data-id="https://api.ft.com/content/ccb503c8-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="433" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/ccb503c8-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="1098" instrument_node="">
</span></figure><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The UK used to be the sick man of Europe. Its annual growth in prosperity improved from bottom of the league among the G7 leading economies before it joined the European Economic Community to top spot in the 43 years after 1973. This does not prove that becoming a member improved Britain’s international performance. It does, however, allow the Remain campaign to argue that membership did not prevent UK national renewal. </span></p><p data-dcnode-id="1088"><strong data-dcnode-id="1091"><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">Economists from the Leave side would point out that the absolute growth rates were lower after 1973 than before and that the main reason for Britain’s improved performance was Margaret Thatcher’s reforms, not EU membership. </span></p><p data-dcnode-id="1082"><strong data-dcnode-id="1085"><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">Splitting correlation from causation is difficult. All countries’ growth slowed after the postwar surge petered out. But, given the dramatic improvement in Britain’s position, it is nearly impossible to argue that the EU stood in the way of Britain pulling up its socks. In the most detailed assessment to date, professor Nick Crafts of Warwick university, Britain’s leading economic historian, estimates that the EU directly raised UK prosperity by about 10 per cent, largely due to increased competition and better access to the single European market. </span></p><h2 class="n-content-heading-4" data-dcnode-id="1080" id="what-trade-deals-will-replace-eu-membership-1"><span data-dcnode-id="1081" instrument_node="">What trade deals will replace EU membership?</span></h2><span data-dcnode-id="1079" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="1075" style="width: 600px; max-width: 100%;"><span data-dcnode-id="1078" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="1077" data-id="https://api.ft.com/content/cd8ef6dc-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="397" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/cd8ef6dc-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="1076" instrument_node="">
</span></figure><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">What will a new ministry of trade have to do after the country breaks off with the EU to replace current trading relationships? Sign a deal with the remaining 27 members of the EU, come to an arrangement with about 50 additional countries with which the EU has preferential deals, or all the remaining 161 members of the World Trade Organisation? </span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">A bilateral deal with the bloc is likely to take years to negotiate, say experienced trade negotiators. Barack Obama, US president, has also cautioned that Britain would be “at the back of the queue” for a US-UK trade deal.</span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="1067" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu1" data-o-ads-targeting="pos=mid1;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="1068" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="1069"></div></div></div><p data-dcnode-id="1061"><strong data-dcnode-id="1064"><em data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">The Leave campaign said the UK does not need trade agreements to trade. It said that Germany and other countries running trade surpluses with the UK would eagerly seek a preferential deal and the UK could be much more nimble in negotiating deals with other countries. </span></p><p data-dcnode-id="1055"><strong data-dcnode-id="1058"><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">Leave was right that trade deals are not necessary for trade. But such agreements do set the rules for commerce and protect Britain and UK companies from disputes and arbitrary actions from other countries. Leaving the EU will require a mammoth negotiation process, since Britain cannot even guarantee to be able to trade securely under WTO rules, since it does not have its own schedule of tariffs, commitments on services and agricultural subsidies. Without this, Britain will be left vulnerable to legal action under WTO dispute settlement rules. </span></p><h2 class="n-content-heading-4" data-dcnode-id="1053" id="can-britain-cut-migration-significantly-2"><span data-dcnode-id="1054" instrument_node="">Can Britain cut migration significantly?</span></h2><span data-dcnode-id="1052" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="1048" style="width: 600px; max-width: 100%;"><span data-dcnode-id="1051" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="1050" data-id="https://api.ft.com/content/ce5ecd12-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="426" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/ce5ecd12-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="1049" instrument_node="">
</span></figure><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Britain’s net migration stood at 333,000 in 2015, the second-highest figure on record and more than three times David Cameron’s 2010 pledge to bring the figure down to the tens of thousands. Net immigration from EU countries, particularly central and eastern European member states, rose rapidly after their accession to the EU in 2004 and more recently when citizens of Bulgaria and Romania acquired the right to work and settle in the UK. Only by leaving the EU can the government reduce the numbers of EU migrants. </span></p><p data-dcnode-id="1039"><strong data-dcnode-id="1042"><em data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">EU migrants tend to be young and are likely to be employed. They contribute more to the UK public finances than they take out and much more than UK-born citizens. And their numbers already appeared to be plateauing, now that the initial surge from Romania and Bulgaria has abated. </span></p><p data-dcnode-id="1033"><strong data-dcnode-id="1036"><em data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">Even if EU net migration was cut to zero, Britain would have far more migrants from non-EU countries than the prime minister’s tens of thousands pledge. As long as Britain’s economy does well, it will attract immigrants. </span></p><h2 class="n-content-heading-4" data-dcnode-id="1031" id="do-migrants-reduce-uk-wages-3"><span data-dcnode-id="1032" instrument_node="">Do migrants reduce UK wages?</span></h2><span data-dcnode-id="1030" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="1026" style="width: 600px; max-width: 100%;"><span data-dcnode-id="1029" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="1028" data-id="https://api.ft.com/content/cf30cd9e-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="433" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/cf30cd9e-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="1027" instrument_node="">
</span></figure><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The chart shows the change in the share of EU immigrants for every local area in the UK (left to right) and the change in local wage levels (up and down). There is no correlation, indicating that areas with high levels of immigration do not have lower wage growth. There is no indication that immigration reduces wages. </span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">A Bank of England study found a small effect on the lower paid, with a 10 percentage point rise in the share of low-skilled migrants reducing wages of the lower paid by 2 per cent. But the increase in EU migration share has been only about 2 percentage points between 2008 and 2015, suggesting the effect on low pay is about a cut of 0.4 per cent over seven years. </span></p><p data-dcnode-id="1015"><strong data-dcnode-id="1018"><em data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">While the Leave campaign grossly exaggerated the very small measured effect of migration on low skill wages, there is a question whether normally high growth areas should be expected to have had larger increases in wages. This could explain why there is no positive correlation in the chart between areas of high immigration and higher wage rises. </span></p><p data-dcnode-id="1009"><strong data-dcnode-id="1012"><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">The available evidence suggests EU migration does not cut people’s pay, even for the low paid. But there is a possibility that it allows employers to increase employment in high demand areas without raising pay but allowing EU migration to be a buffer. </span></p><h2 class="n-content-heading-4" data-dcnode-id="1007" id="were-eu-regulations-a-yoke-around-the-neck-of-the-uk-economy-4"><span data-dcnode-id="1008" instrument_node="">Were EU regulations a yoke around the neck of the UK economy?</span></h2><span data-dcnode-id="1006" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="1002" style="width: 600px; max-width: 100%;"><span data-dcnode-id="1005" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="1004" data-id="https://api.ft.com/content/d00718f4-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="805" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/d00718f4-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="1003" instrument_node="">
</span></figure><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Evidence that EU regulations stifled British creativity, innovation, competition and growth is thin on the ground. The OECD assesses that the UK has the second lowest level of product market regulation among its members, just below the Netherlands. There is no figure for the US in 2013. </span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The differences between EU member states in this measure and in assessments of labour market regulation suggests that, far from harmonising practices across member states, Brussels’ rules allow countries to maintain their own rules to have highly or lightly regulated economies. </span></p><p data-dcnode-id="990"><strong data-dcnode-id="993"><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">Leave campaigners said that even these regulations are too many and should not be set for the whole single market. They think that British regulations would be better and even less onerous on business.</span></p><p data-dcnode-id="984"><strong data-dcnode-id="987"><em data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">Britain has a good record in international league tables and by far the most costly regulations are not shown here, such as rules governing planning and the use of land. There is no guarantee that repatriating regulatory activity from Brussels will not make the rules worse. Such repatriation will itself be a massive bureaucratic undertaking. It would be better to improve the regulatory environment where Britain has always been in control, but failed to take action. </span></p><h2 class="n-content-heading-4" data-dcnode-id="982" id="what-about-the-350m-a-week-sent-to-brussels-5"><span data-dcnode-id="983" instrument_node="">What about the £350m a week sent to Brussels?</span></h2><span data-dcnode-id="981" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="977" style="width: 600px; max-width: 100%;"><span data-dcnode-id="980" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="979" data-id="https://api.ft.com/content/d0ee9e0e-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="433" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/d0ee9e0e-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="978" instrument_node="">
</span></figure><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">This figure — widely promoted by the Leave campaign — is not correct, as several Brexiters acknowledged after the polls had closed. When pushed, the Leave campaign accepts that Britain’s net contributions are much lower after the rebate secured by Margaret Thatcher and payments to farmers, poorer regions and science. Britain does, however, make net contributions to the EU budget of £8.5bn in 2015, about £163m a week. This will be saved once the UK had left the EU and Britain would get to choose how it spent the money currently allocated for farmers and others by common EU rules. </span></p><p data-dcnode-id="968"><strong data-dcnode-id="971"><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">A net contribution of £8.5bn is roughly £1 out of every £100 the British government spends every year, so any savings will be small. The Institute for Fiscal Studies and others have pointed out that if leaving the EU implies slower growth, the net saving would be wiped out through lower tax revenues and higher benefit spending — even if the growth reduction was merely 0.6 per cent. The IFS estimated that if the economic assessments of Brexit were accurate, leaving the EU would cost UK taxpayers between £20bn and £40bn a year. </span></p><p data-dcnode-id="962"><strong data-dcnode-id="965"><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">There is no doubt that the effect of EU membership on national income was more important for the UK public finances than the annual membership fee. This is the dominant issue and a small hit would leave Britain’s public sector worse off. </span></p><h2 class="n-content-heading-4" data-dcnode-id="960" id="put-it-all-together-economists-what-do-you-get-6"><span data-dcnode-id="961" instrument_node="">Put it all together economists. What do you get?</span></h2><span data-dcnode-id="959" instrument_node="">
</span><figure class="n-content-image n-content-image--center p402_hide" data-dcnode-id="955" style="width: 600px; max-width: 100%;"><span data-dcnode-id="958" instrument_node="">
</span><img alt="" aria-hidden="true" data-dcnode-id="957" data-id="https://api.ft.com/content/d1c6407a-370b-11e6-a780-b48ed7b6126f" data-image-type="image" data-original-image-height="395" data-original-image-width="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/http%253A//com.ft.imagepublish.upp-prod-eu.s3.amazonaws.com/d1c6407a-370b-11e6-a780-b48ed7b6126f%3Ffit%3Dscale-down%26source%3Dnext%26width%3D600&amp;raw"><span data-dcnode-id="956" instrument_node="">
</span></figure><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Brexit hurts. The main groups of economists who have published studies in the campaign use different models and different data but speak with more unanimity on this subject than on any other. Erecting trade barriers with the EU would hit prosperity, which is not easily replaced by greater free trade elsewhere. Leaving the bloc will afford the country little additional regulatory freedom and there could be long-term consequences from the short-term upheaval of Brexit. Economists overwhelmingly think leaving the EU is bad for the UK economy. </span></p><p data-dcnode-id="946"><strong data-dcnode-id="949"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Alternative explanation</span></em></strong><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">One group — economists for Brexit — believes Britain’s economy will be stronger if it adopts unilateral free trade, dropping all barriers on imports and letting other countries decide whether to maintain tariffs on British exports. This diverts all trade away from the EU, lowers prices and produces gains</span></p><p data-dcnode-id="940"><strong data-dcnode-id="943"><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Assessment</span></em></strong><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">The economists for Brexit are out on a limb, both because of their desire for unilateral tariff reduction and due to their assessment of the benefits. Many other economists say the model the group uses is far removed from the real world and is not related to real current data on trade patterns. </span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Rarely has there been such a consensus among economists, as there is on the damage that Brexit will wreak on the British economy. The warning may turn out to be wrong — but it is difficult to ignore.</span></p><span data-dcnode-id="937" instrument_node="">
