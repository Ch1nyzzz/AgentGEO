</span><p class="book-number -display selectionShareable" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">4</span></p><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><div class="small-6 columns" data-dcnode-id="960"><span data-dcnode-id="966" instrument_node="">
</span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-britain-voted-leave-european-union/buy" rel="nofollow" target="_blank"><span data-dcnode-id="965" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="964" height="500" loading="lazy" sizes="(max-width: 329px) 100vw, 329px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_.jpg 329w, https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_-197x300.jpg 197w, https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_-314x477.jpg 314w" width="329"><span data-dcnode-id="963" instrument_node=""> </span></a><span data-dcnode-id="961" instrument_node=""> </span></div><span data-dcnode-id="959" instrument_node="">
</span><div class="small-12 columns" data-dcnode-id="942"><span data-dcnode-id="958" instrument_node="">
</span><div class="book-title -inline" data-dcnode-id="947"><span data-dcnode-id="957" instrument_node="">
</span><h2 class="title" data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">
</span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-britain-voted-leave-european-union/"><span data-dcnode-id="955" instrument_node="">Brexit: Why Britain Voted to Leave the European Union</span></a><span data-dcnode-id="953" instrument_node="">
</span></h2><span data-dcnode-id="951" instrument_node="">
</span><h3 class="author" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">
                    by Harold Clarke, Matthew Goodwin &amp; Paul Whiteley                </span></h3><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span><a class="buy-button" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-britain-voted-leave-european-union/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="945" instrument_node="">Read</span></a><span data-dcnode-id="943" instrument_node=""> </span></div><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></aside><span data-dcnode-id="937" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">Book number 4 on your list is </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Brexit: Why Britain Voted to Leave the European Union. </span></em><span data-dcnode-id="933" instrument_node="">This isn’t coming out until April, but you’re familiar with the research it’s based on. So, tell me, why did Britain vote to leave the EU?</span></p><span data-dcnode-id="931" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">This is written by my friend and colleague Matthew Goodwin and co-authors. Matt is an expert on the rise of UKIP. The underlying cause is this sense that people felt left behind by rapid economic change and adrift from the global economy or the modern economy of London and the southeast.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">In terms of voting for Leave, distance from London was a factor, communities which had lower skill levels was a factor, and people who were older. There was this combination of economic and social disconnection from the global economy in some areas, and the perceived contrast with London and other more prosperous areas like Oxford and Cambridge, York, and so on, that appeared to be doing relatively well.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">“In terms of voting for Leave, distance from London was a factor, communities which had lower skill levels was a factor, and people who were older.”</span></p><span data-dcnode-id="922" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The point that’s important is that this was not just about immigration. In some areas—say Lincolnshire and East Anglia—it related very much to immigration from the EU. But in lots of other areas that was not the case. These are places that have been economically depressed since the deindustrialisation and decline of the manufacturing industry in the 1980s and 1990s, i.e. well before the current wave of immigration from eastern Europe. It’s much more deeply rooted. It relates not just to the social impact of immigration but also of deindustrialisation, trade, technological progress, and so on.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">But there’s a bit of </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fivebooks.com/interview/immigration/"><span data-dcnode-id="917" instrument_node="">immigration</span></a><span data-dcnode-id="915" instrument_node=""> in there, isn’t there?</span></p><span data-dcnode-id="913" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">There is, but it came on top of these broader and more well-established economic drivers. Immigration, for some people, has become a symbol of something that was there already—the fact that some communities were being left behind, the fact that people with lower skills or qualifications are relatively very disadvantaged in the UK labour market.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Now, the fact that there has been a recent arrival of quite large numbers of people from Europe who are more skilled and better qualified and yet willing to work in low skilled jobs for relatively low wages has provided a visible focus and intensification for those feelings. The evidence suggests it hasn’t really made things any worse for those people—things were bad already—but it has provided a visible focus for things which may have been happening anyway in a more invisible way because of changes to technology in the labour market.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Which means, I suppose, that the EU is a kind of scapegoat for problems that were already there and Brexit a huge distraction from dealing with the underlying issues. Presumably, these can only be solved by focusing on education and developing people’s skills—that kind of thing?</span></p><span data-dcnode-id="904" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">That’s the real challenge going forward, because it’s far from clear that Brexit will solve any of these problems. It depends on a lot of things we don’t know yet but, still, I think that most economists would say that Brexit will not lead to an immediate improvement for people who have been suffering from these broader forces.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">It is almost a truism, certainly among economists, that the big structural problems in the UK—to do with the labour market position of the low-skilled, the education system and the housing market—actually have little or nothing to do with the UK’s membership of the EU one way or the other. The EU has not messed up our housing market, we did that for ourselves. And, equally, leaving the EU won’t solve it.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Then there’s a political economy question—whether leaving the EU will, in some ways, make it easier to solve some of these issues or whether it will make it more difficult. That, we don’t know.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">The other thing—and I’ll be interested to see what Matt’s book says about this—is that these economic factors also overlap very considerably with people’s social attitudes. As well as people being more likely to vote Leave if they were poorer, or lived in areas that were left behind, people were also much more likely to vote Leave if they had socially conservative attitudes—including on issues that have nothing to do with Brexit, like gay marriage and the death penalty.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">“Most people do not live in big cities or remote rural villages. They live in greater suburbia/small-to-medium sized towns.&nbsp;”</span></p><span data-dcnode-id="889" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">So there is this sense that a vote for Brexit was a reaction against a trend of social liberalism in the country as a whole which is, again, associated with the EU but of which the EU is not really the main driver. Although there are issues relating to the European Court of Human Rights, no one believes that leaving the EU means we’re going to roll back gay marriage or reintroduce the death penalty. And yet, views on these things were very strongly correlated with how people voted on Brexit.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">This ties in with a much wider social science literature which people are also looking at in the context of Trump. It’s very important to say that Trump and Brexit are different in all sorts of very important ways, but there is a common strand. Social scientists—like the authors of the book but also authors on the other side of the Atlantic—are looking at this divide between an authoritarian view of the world and a liberal one. David Goodhart’s new book talks about people from ‘somewhere’ versus people from ‘anywhere.’ I think that’s a bit of an oversimplification, to say the least. But there is clearly this dichotomy that is not based on purely economic grounds but is also about social attitudes.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">So, just to summarize, this book is very much data driven?</span></p><span data-dcnode-id="880" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Yes, it’s data-driven analysis looking in more detail at what drove the vote to Leave.</span></p><span data-dcnode-id="877" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="24647" data-dcnode-id="864" id="book-24647"><span data-dcnode-id="876" instrument_node="">
</span><div class="single-book inline -placeholders" data-dcnode-id="866"><span data-dcnode-id="875" instrument_node="">
</span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/autumn/buy" id="book-autumn" rel="nofollow" target="_blank"><span data-dcnode-id="874" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="873" height="500" loading="lazy" sizes="(max-width: 310px) 100vw, 310px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_.jpg 310w, https://fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_-186x300.jpg 186w" width="310"><span data-dcnode-id="872" instrument_node=""> </span><p class="buy-button selectionShareable" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Read</span></p><span data-dcnode-id="869" instrument_node=""> </span></a><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span></aside><span data-dcnode-id="863" instrument_node="">
</span><aside class="show-for-small-only inline-el" data-book-id="24647" data-dcnode-id="826"><span data-dcnode-id="862" instrument_node="">
</span><div class="row single-book -with-number _small-tint" data-dcnode-id="828"><span data-dcnode-id="861" instrument_node="">
</span><div class="small-2 columns" data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">
</span><p class="book-number -display selectionShareable" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">5</span></p><span data-dcnode-id="857" instrument_node="">
</span></div><span data-dcnode-id="855" instrument_node="">
</span><div class="small-6 columns" data-dcnode-id="848"><span data-dcnode-id="854" instrument_node="">
</span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/autumn/buy" rel="nofollow" target="_blank"><span data-dcnode-id="853" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="852" height="500" loading="lazy" sizes="(max-width: 310px) 100vw, 310px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_.jpg 310w, https://fivebooks.com/app/uploads/2017/03/0241207002.01.LZ_-186x300.jpg 186w" width="310"><span data-dcnode-id="851" instrument_node=""> </span></a><span data-dcnode-id="849" instrument_node=""> </span></div><span data-dcnode-id="847" instrument_node="">
</span><div class="small-12 columns" data-dcnode-id="830"><span data-dcnode-id="846" instrument_node="">
</span><div class="book-title -inline" data-dcnode-id="835"><span data-dcnode-id="845" instrument_node="">
</span><h2 class="title" data-dcnode-id="840"><span data-dcnode-id="844" instrument_node="">
</span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/autumn/"><span data-dcnode-id="843" instrument_node="">Autumn</span></a><span data-dcnode-id="841" instrument_node="">
</span></h2><span data-dcnode-id="839" instrument_node="">
</span><h3 class="author" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">
                    by Ali Smith                </span></h3><span data-dcnode-id="836" instrument_node="">
</span></div><span data-dcnode-id="834" instrument_node="">
</span><a class="buy-button" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/autumn/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="833" instrument_node="">Read</span></a><span data-dcnode-id="831" instrument_node=""> </span></div><span data-dcnode-id="829" instrument_node="">
</span></div><span data-dcnode-id="827" instrument_node="">
</span></aside><span data-dcnode-id="825" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">Lastly, we have the novel </span><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Autumn</span></em><span data-dcnode-id="821" instrument_node=""> by Ali Smith. It’s been described in </span><em data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The New York Times</span></em><span data-dcnode-id="818" instrument_node=""> as, “the first great Brexit novel.”</span></p><span data-dcnode-id="816" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">Yes. That sounds slightly damning with faint praise because, how many Brexit novels have there been? But, that said, I do think Ali Smith is a wonderful writer. This is perhaps more of a novella than a novel—it’s quite short, and I think it’s intended to be the first of four. It’s called </span><em data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Autumn</span></em><span data-dcnode-id="812" instrument_node=""> so I think we can guess what the others will be called in due course.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">It’s wonderfully written and it does capture this atmosphere of a society not in chaos but unsure of itself, not clear where it’s going—and of a young woman who feels disorientated by what our society is doing or doing to itself, and trying to work out where she’s going.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">I like the way it starts with a play on the opening lines of Dickens’s </span><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">A Tale of Two Cities,</span></em><span data-dcnode-id="803" instrument_node=""> about the French Revolution: “It was the best of times, it was the worst of times.” There is this feeling that Brexit is quite momentous, isn’t there?</span></p><span data-dcnode-id="801" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Yes, absolutely. As I say, one might guess from the tone that Ali Smith didn’t vote to leave but it’s not an attack on Brexit, or politicised in any particular way. It’s more that it conveys the atmosphere of what the UK and, particularly, England feels like now. It’s not a London book. It’s a book set somewhere in the sort of England that most people actually live in. Statistically that is—I’m speaking as a social scientist here, this is not what the book says—most people do not live in big cities or remote rural villages. They live in greater suburbia/small-to-medium sized towns.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">It’s not set in somewhere that’s particularly left behind. It’s not set in a decaying, northern ex-mill town or somewhere like that. It’s set in a moderately prosperous part of the country. Statistically (going back to the previous book) you could probably guess that the place that it’s set probably voted to leave by not much—maybe 55-45—so is reasonably reflective of the country as a whole.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">At one point, her mother says that one half of the town is not talking to the other half. Have you come across big divisions between families or friends over which way they voted?</span></p><span data-dcnode-id="792" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">There is some of that. I think it’s possibly a bit exaggerated in the sense that lots of people who voted didn’t necessarily feel that strongly either way. But there are a lot of people who did. Certainly, on Twitter you see people getting very, very upset.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">At least two people I know who voted Brexit said they did so because they’d always felt more English than European. That seemed to be about all there was to it. </span></p><span data-dcnode-id="786" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Yes, but that does symbolise something and ties in with what I was saying before about values. If you say, in response to an opinion pollster, that you feel European, the chances that you support the death penalty are close to zero, and the chance you support gay marriage is very, very high. If you say you feel English, it’s not entirely the reverse but the figures are very, very different. It’s quite a strong correlation.</span></p><span data-dcnode-id="783" instrument_node="">
</span><div class="date-and-credit" data-dcnode-id="775"><span data-dcnode-id="782" instrument_node="">
</span><p class="credit selectionShareable" data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">Interview by </span><a class="interviewer-name" data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/interviewer/sophie-roell/"><span data-dcnode-id="780" instrument_node="">Sophie Roell</span></a><span data-dcnode-id="778" instrument_node="">, Editor</span></p><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
