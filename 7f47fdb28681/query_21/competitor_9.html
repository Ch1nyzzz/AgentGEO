</span></a></div><span data-dcnode-id="1475" instrument_node="">
</span></li><span data-dcnode-id="1473" instrument_node="">
</span><li class="row" data-book-id="24646" data-dcnode-id="1459" data-position="3" id="mobile-book-3" style="margin-bottom:1rem;"><span data-dcnode-id="1472" instrument_node="">
</span><div class="column small-20" data-dcnode-id="1461"><span data-dcnode-id="1471" instrument_node="">
</span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-britain-voted-leave-european-union/buy" rel="nofollow" target="_blank"><h2 class="book-title -listbook" data-dcnode-id="1464"><span class="book-number" data-dcnode-id="1469" style="display: inline-block; font-style: normal;"><span data-dcnode-id="1470" instrument_node="">4</span></span><span data-dcnode-id="1468" instrument_node=""> </span><span class="title" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Brexit: Why Britain Voted to Leave the European Union</span></span><span data-dcnode-id="1465" instrument_node=""> 
    by Harold Clarke, Matthew Goodwin &amp; Paul Whiteley</span></h2><span data-dcnode-id="1463" instrument_node="">
</span></a></div><span data-dcnode-id="1460" instrument_node="">
</span></li><span data-dcnode-id="1458" instrument_node="">
</span><li class="row" data-book-id="24647" data-dcnode-id="1444" data-position="4" id="mobile-book-4" style="margin-bottom:1rem;"><span data-dcnode-id="1457" instrument_node="">
</span><div class="column small-20" data-dcnode-id="1446"><span data-dcnode-id="1456" instrument_node="">
</span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/autumn/buy" rel="nofollow" target="_blank"><h2 class="book-title -listbook" data-dcnode-id="1449"><span class="book-number" data-dcnode-id="1454" style="display: inline-block; font-style: normal;"><span data-dcnode-id="1455" instrument_node="">5</span></span><span data-dcnode-id="1453" instrument_node=""> </span><span class="title" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Autumn</span></span><span data-dcnode-id="1450" instrument_node=""> 
    by Ali Smith</span></h2><span data-dcnode-id="1448" instrument_node="">
</span></a></div><span data-dcnode-id="1445" instrument_node="">
</span></li><span data-dcnode-id="1443" instrument_node="">
</span></ul><span data-dcnode-id="1441" instrument_node="">
</span></div></section><span data-dcnode-id="1438" instrument_node=""> </span></div><span data-dcnode-id="1436" instrument_node="">
</span></div><span data-dcnode-id="1434" instrument_node="">
</span></div><span data-dcnode-id="1432" instrument_node="">
</span><div class="small-20 medium-13 columns medium-push-4 interview-content -with-drop-cap" data-dcnode-id="703" id="interviewcontent"><span data-dcnode-id="1431" instrument_node="">
</span><div class="social-buttons show-for-small" data-dcnode-id="1413"><span data-dcnode-id="1430" instrument_node="">
</span><div class="row" data-dcnode-id="1415"><span data-dcnode-id="1429" instrument_node="">
</span><div class="small-10 medium-5 columns" data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">
</span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DJonathan%2BPortes%2Brecommends%2BThe%2BBest%2BThings%2Bto%2BRead%2Bon%2BBrexit%26url%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fjonathan-portes-brexit%252F%26via%3Dfive_books" target="_blank"><i class="fa fa-twitter" data-dcnode-id="1427"></i></a><span data-dcnode-id="1425" instrument_node="">
</span></div><span data-dcnode-id="1423" instrument_node="">
</span><div class="small-10 medium-5 columns end" data-dcnode-id="1417"><span data-dcnode-id="1422" instrument_node="">
</span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/dialog/share%3Fapp_id%3D179767102823809%26href%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fjonathan-portes-brexit%252F%26redirect_uri%3Dhttps%253A%252F%252Ffivebooks.com%252Fbest-books%252Fjonathan-portes-brexit%252F" target="_blank"><i class="fa fa-facebook facebook" data-dcnode-id="1421"></i></a><br data-dcnode-id="1419"><span data-dcnode-id="1418" instrument_node="">
</span></div><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">
</span></div><span data-dcnode-id="1412" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1405"><span class="drop-cap y" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Y</span></span><span data-dcnode-id="1409" instrument_node="">ou’re recommending books and other readings&nbsp;on </span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/category/world/europe/britain/brexit/"><span data-dcnode-id="1408" instrument_node="">Brexit</span></a><span data-dcnode-id="1406" instrument_node="">—a topic it seems a good time to get well informed about. Could you start by saying how you went about making your selections?</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Choosing books on Brexit is obviously quite difficult, at this point, because there aren’t many books about it. There are a few that have been rushed out as blow-by-blow accounts of the campaign that are not necessarily particularly interesting.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">What I wanted to do was have both some books that illustrated where Brexit was coming from—some of the underlying analysis of the broader social and political trends in the UK that underlie Brexit—at the same time as having some with a forward-looking perspective—on what Brexit might actually mean in terms of economics and the UK’s future relationship with the EU.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">“Lots of people who voted didn’t necessarily feel that strongly either way.”</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Also, some sense of the broader social/cultural impact of Brexit which, of course, is far too early to say. It will, in any case, vary a lot by person and, therefore, I included a novel. A novel is just one person’s very subjective account of how Brexit affects some fictional characters, indirectly rather than directly. But I think that’s the best that you can do at the moment.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">You’re an economist. According to one MORI poll—conducted before the referendum—just under 90 percent of UK economists think that Brexit will be bad for the economy. Given how hard it is to predict the future, how can economists be so sure that it’s a bad move? </span></p><span data-dcnode-id="1389" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Essentially, economists are basing their predictions about Brexit on the record of history. We know both from economic theory—going back to Adam Smith and David Ricardo—and from empirical evidence, that increased openness to trade and increased trade is, generally, associated with stronger economic growth, stronger growth in productivity and greater prosperity.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">We also know, again both from theory and particularly from empirical evidence, that participation in free trade areas and, even more than free trade areas, very deep integrated economic and trading relationships like the European Union, tends to promote trade. These are the sort of things we know from history and data.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">“If you say, in response to an opinion pollster, that you feel European, the chances that you support the death penalty are close to zero.”</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">What economists are saying is that leaving the European Union is very likely going to lead to a reduction in the UK’s trade, and that that reduction in trade is very likely to make us less prosperous than we otherwise would have been.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Now, we cannot be certain about that for two reasons. One is a logical one which is that the past can’t, by definition, tell you for certain what will happen in the future in the social sciences. It’s not like testing a drug on an illness. There is some uncertainty about whether the future will be like the past. That’s true of almost all economic predictions. But there is a fair amount of historical record to go on.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1369"><span data-dcnode-id="1373" instrument_node="">The second is that the UK may be able to make new trading agreements with other countries that somehow make up for the loss of our membership of the European Union and the single market. Here there is an element of political judgement. I think most economists think it’s very unlikely we’re going to have deep, lasting and integrated trading relationships with India, China, and the US, the way that we have with the European Union. It’s not </span><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">impossible</span></em><span data-dcnode-id="1370" instrument_node=""> and it’s not a purely economic judgement, but it seems a reasonable one, to most of us.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><div class="inline-box -newsletter inline-el" data-dcnode-id="1356"><span data-dcnode-id="1367" instrument_node="">
</span><p class="explanation selectionShareable" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Get the weekly Five Books newsletter</span></p><span data-dcnode-id="1364" instrument_node="">
</span><form action="//fivebooks.us8.list-manage.com/subscribe/post?u=ce22475e3f1c122db90ab6515&amp;id=31a730e97e" class="plain-form -red sign-up" data-dcnode-id="1358" method="post"><span data-dcnode-id="1363" instrument_node="">
</span><input class="field" data-dcnode-id="1362" name="EMAIL" type="email"><span data-dcnode-id="1361" instrument_node="">
</span><input class="submit" data-dcnode-id="1360" type="submit" value="Subscribe"><span data-dcnode-id="1359" instrument_node="">
</span></form><span data-dcnode-id="1357" instrument_node="">
</span></div><span data-dcnode-id="1355" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">There are no certainties here. It is not certain that leaving the EU will make us worse off than we otherwise would have been. But, based on the data and the historical record and what seems a plausible set of outcomes for the UK’s future in economic trading relationships—both with the remaining EU and the rest of the world—it does seem the most probable outcome is that we will be somewhat poorer.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Now, I should say that although economists produce a lot of numerical estimates of what that would mean, even the people who produce those estimates would emphasise that there is a very large amount of uncertainty. Although the nature of the models that we use to make these predictions means that you get numbers coming out of them, one should definitely not place too much weight on the numbers themselves.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="24640" data-dcnode-id="1336" id="book-24640"><span data-dcnode-id="1348" instrument_node="">
</span><div class="single-book inline -placeholders" data-dcnode-id="1338"><span data-dcnode-id="1347" instrument_node="">
</span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/next-get-best-brexit/buy" id="book-next-get-best-brexit" rel="nofollow" target="_blank"><span data-dcnode-id="1346" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1345" height="500" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_.jpg 308w, https://fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_-185x300.jpg 185w" width="308"><span data-dcnode-id="1344" instrument_node=""> </span><p class="buy-button selectionShareable" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Read</span></p><span data-dcnode-id="1341" instrument_node=""> </span></a><span data-dcnode-id="1339" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span></aside><span data-dcnode-id="1335" instrument_node="">
</span><aside class="show-for-small-only inline-el" data-book-id="24640" data-dcnode-id="1298"><span data-dcnode-id="1334" instrument_node="">
</span><div class="row single-book -with-number _small-tint" data-dcnode-id="1300"><span data-dcnode-id="1333" instrument_node="">
</span><div class="small-2 columns" data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node="">
</span><p class="book-number -display selectionShareable" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">1</span></p><span data-dcnode-id="1329" instrument_node="">
</span></div><span data-dcnode-id="1327" instrument_node="">
</span><div class="small-6 columns" data-dcnode-id="1320"><span data-dcnode-id="1326" instrument_node="">
</span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/next-get-best-brexit/buy" rel="nofollow" target="_blank"><span data-dcnode-id="1325" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1324" height="500" loading="lazy" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_.jpg 308w, https://fivebooks.com/app/uploads/2017/03/1786691930.01.LZ_-185x300.jpg 185w" width="308"><span data-dcnode-id="1323" instrument_node=""> </span></a><span data-dcnode-id="1321" instrument_node=""> </span></div><span data-dcnode-id="1319" instrument_node="">
</span><div class="small-12 columns" data-dcnode-id="1302"><span data-dcnode-id="1318" instrument_node="">
</span><div class="book-title -inline" data-dcnode-id="1307"><span data-dcnode-id="1317" instrument_node="">
</span><h2 class="title" data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">
</span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/next-get-best-brexit/"><span data-dcnode-id="1315" instrument_node="">What Next: How to get the best from Brexit</span></a><span data-dcnode-id="1313" instrument_node="">
</span></h2><span data-dcnode-id="1311" instrument_node="">
</span><h3 class="author" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">
                    by Daniel Hannan                </span></h3><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span><a class="buy-button" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/next-get-best-brexit/buy" rel="nofollow" style="float: left" target="_blank"><span data-dcnode-id="1305" instrument_node="">Read</span></a><span data-dcnode-id="1303" instrument_node=""> </span></div><span data-dcnode-id="1301" instrument_node="">
</span></div><span data-dcnode-id="1299" instrument_node="">
</span></aside><span data-dcnode-id="1297" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">Talking about the opportunities for global trade after Brexit, let’s turn to the first book on your list, which is Daniel Hannan’s </span><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">What Next: How to get the best from Brexit.</span></em><span data-dcnode-id="1293" instrument_node=""> He has visions of the UK becoming like Singapore or Hong Kong and entering a new era of free trade and prosperity. Why have you chosen this as a good book to read on Brexit?</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">I want to emphasise that I was neutral, during the campaign, between Remain and Leave. I have very strong views on some of the economic aspects, particularly relating to free movement and immigration. But I do think that there are arguments on both sides. I try to be as objective as I can in weighing them up.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Daniel Hannan’s book illustrates the naïve and fact-free approach, of some people on the Brexit side, to our future outside the EU. As you say, he’s quite good at painting this picture of the UK as a very globalized free trading nation, trading with other countries of the world with very low tariffs—while not being part of any particular economic union itself. But it really fails to engage with the realities of the UK economy—both how the UK economy actually works and how international trade actually works.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">He has this blithe disregard for any actual facts, so he does have this tendency to simply make things up, which I think is an illustration of what we got from some on the Brexit side. They said things and the fact that they weren’t actually true didn’t really seem to matter. By the time anybody pulled them up on their factual inaccuracies, they were onto the next thing. Hannan epitomises that disregard for facts.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">But it’s a very appealing vision, isn’t it? Also, I got the sense from the book that he means it: he is a true believer. </span></p><span data-dcnode-id="1279" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">It’s entirely sincere. What I think is interesting is that Hannan is clearly an intelligent person. He’s lucid, he’s sincere and he believes in it. And yet, as soon as you start to apply any depth of knowledge into any of the things he’s talking about, it becomes clear that what he’s saying doesn’t add up. He combines intelligence, vision, and honesty with a complete superficiality about how trading arrangements work.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Give me an example of something he gets wrong in the book.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">For example, he talks about how the EU is this rigid, protectionist organisation that imposes huge tariffs on things from outside the EU—like a 32% tariff on wine. To bring that back to reality—when you were last at the supermarket, did you notice that there was only French and Italian wine and none from Australia and Chile? I suspect you probably didn’t notice the absence of wine from Australia and Chile, because there </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">is</span></em><span data-dcnode-id="1269" instrument_node=""> wine from Australia and Chile in our supermarkets, despite our membership of the EU. Why is that? Well, as it happens, as members of the EU, we have a free trade agreement with Chile which means that there is no tariff on Chilean wine.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Dan Hannan, in fact, tweeted his outrage at the 32% tariff on Chilean wine. One of the nice things about social media is there are all sorts of people—expert and non-expert—who immediately spot people who are talking nonsense. So this was immediately pointed out.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">“It is not certain that leaving the EU will make us worse off than we otherwise would have been.”</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">He then said, ‘Well, what about the 32% tariff on Australian wine?’ And it turns out that while there is a tariff on Australian wine, it isn’t 32%, again, otherwise it wouldn’t be in the shops.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">It’s quite interesting because Hannan has been a member of the European Parliament for a long time. He sits on the committees which supposedly discuss free trade agreements and all this detailed stuff that the EU does when making trade agreements with other countries. And, yet, when it comes to these very simple things, he just makes things up. It’s just not true. I find that very odd.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">He’s clearly given a lot of thought to this stuff, but you don’t have to be a trade expert to find out that the EU doesn’t have a tariff on Chilean wine, and that the tariff on Australian wine isn’t 32%. You’d think that a member of the European Parliament would know that, but you’d be wrong, in this case.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">He seems to be very exercised about the EU’s ban on some vitamins and herbal remedies. It comes up twice in the book. I thought it was quite funny, in terms of the bigger picture, that this should be viewed as a key issue. </span></p><span data-dcnode-id="1249" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">There are a few people out there who think it’s awful, and others who don’t. I think, again, it illustrates the superficiality. Suppose you do think it’s a bad thing that the EU over-regulates herbal medicine. The big issue here, in terms of leaving the EU, is that the European Medicines Agency or EMA, which regulates whether pharmaceuticals are safe to sell in the EU, is actually based in London. That’s one of the reasons—though by no means the only reason—the UK has such a large pharmaceutical industry.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">After we leave the EU, the EMA will not be able to be in London anymore because we won’t be in the EU. It will go off to Dublin or Rome or somewhere else. We are then faced with a choice. How are we going to regulate drugs in this country, including herbal medicines, for that matter? Are we going to set up a British Medicines Agency that will have to approve every drug that’s sold here?</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">“The European Medicines Agency, which regulates whether pharmaceuticals are safe to sell in the EU, is actually based in London. That’s one of the reasons—though by no means the only reason—the UK has such a large pharmaceutical industry.”</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">There are a bunch of problems with this. First of all, it’s going to take a while. It’s going to be expensive and messy, and it’s not something you can do overnight.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Secondly, and more seriously, there are two really big pharmaceutical regulators in the world: the Food and Drug Administration or FDA in the United States and the EMA for the European Union. Will drug companies even bother to submit their medicines for approval to the British Medicines Agency?</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Certainly for the big drug companies based here—AstraZeneca and Glaxo—their priority will be with the EMA and the FDA, because that’s where their big markets are. In the end, what does that mean? Are we just going to say that drugs that have been approved by the EMA are safe to sell here? Well, we might well do that.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">And Hannan would be happy with that, according to his book. He wants less regulation—and argues that if something is good enough for the US and the EU or indeed Australia, then it’ll be good enough for us.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">The net result of the changes is that the EMA has gone off somewhere else, our drugs are still approved by the EMA—except that we no longer have any vote or voice or influence on how the EMA is run, or what procedures it follows. We’ve gone from a situation where there are a bunch of rules that apply to us, which we have a voice in—sometimes we win the arguments and sometimes we lose them and most of the time there’s some sort of half-baked compromise—to a situation where we have no voice and just say, ‘Well, OK. That’s alright with us!’</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1217"><span data-dcnode-id="1224" instrument_node="">It’s not clear what exactly we’ve gained. We haven’t become </span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">less</span></em><span data-dcnode-id="1221" instrument_node=""> regulated. We’ve just accepted that we don’t have a say in the regulations that apply to us. And AstraZeneca and other pharmaceutical companies </span><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">want</span></em><span data-dcnode-id="1218" instrument_node=""> regulatory approval. They might not like what the regulators do but they need regulators. They’ll tell you that.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">What about his argument about Volkswagen and the emissions scandal, that it was successful EU lobbying from the German car company that made everyone turn to diesel, with disastrous results for our air quality?</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">It was clearly an appalling outcome and reflects very badly on VW and very badly on European regulators. But it’s not clear, to me, how it would necessarily have been different if the UK had been doing the regulation. Certainly, it was the UK political process that was responsible for the tax privileges that diesel has had in the UK. That’s the main reason we have an air pollution crisis in London now that is killing thousands of people a year. For the last 25 years, we’ve got tax policy on diesel wrong and it’s had very, very damaging consequences. But those decisions were taken in the UK Treasury—they weren’t taken in Brussels. Will we do better if we do this sort of thing in the UK? Maybe, maybe not. We just don’t know.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">“Daniel Hannan’s book illustrates the naïve and fact-free approach, of some people on the Brexit side, to our future outside the EU.”</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">What is certain, though, is that just as with pharmaceuticals, the thing that will change is that decisions will be made without our input. We’ll still have emission standards made in Brussels but without our voice or vote. Alternatively, we could have emissions standards made in the UK. In that case, are we going to stop exporting cars to the rest of Europe? That’s not a particularly attractive outcome for the UK car industry.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node="">One of the key things that comes out of the book is that Hannan—and many others in the UK—never wanted to be part of this political union, this ever closer integration of the EU. When he looks at the history, he argues that Britain would have been more comfortable with a </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.efta.int/" target="_blank"><span data-dcnode-id="1202" instrument_node="">European Free Trade Association or EFTA</span></a><span data-dcnode-id="1200" instrument_node="">-type arrangement. Don’t you sympathise with that Brexiteer sentiment, that they never bought into the European project in the first place and are much happier on the periphery? </span></p><span data-dcnode-id="1198" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">It clearly is the case that there is a much larger political constituency in this country against deep political integration and for detachment than there is in any other member state in the EU. That’s absolutely right and we wouldn’t be here if there wasn’t. I’m not an expert on the history, but the UK’s very conflicted relationship with European integration has indeed been obvious since the start, since we decided not to participate in the original Treaty of Rome.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">“It was clearly an appalling outcome and reflects very badly on VW and on European regulators.”</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">And there clearly is a good argument for saying that both we and the rest of Europe would have been much better off if we had been able to come to some sort of arrangement that had a large degree of economic integration without the degree of political integration.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">It is interesting and, to be fair to Dan Hannan and some of the people on his side of the Brexit camp, that was what they were arguing for before the vote. Things have changed rather now. Currently, the government is pursuing a type of Brexit which does not envisage that degree of economic integration and people like Mr Hannan have largely gone along with that. There does not seem to be much of a contingent calling, for example, for us to remain in the </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.efta.int/eea" target="_blank"><span data-dcnode-id="1187" instrument_node="">European Economic Area</span></a><span data-dcnode-id="1185" instrument_node="">.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="24642" data-dcnode-id="1170" id="book-24642"><span data-dcnode-id="1182" instrument_node="">
</span><div class="single-book inline -placeholders" data-dcnode-id="1172"><span data-dcnode-id="1181" instrument_node="">
</span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//voxeu.org/article/new-ebook-brexit-beckons" id="book-brexit-beckons" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1180" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1179" height="170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/front-cover_3.png&amp;raw" width="119"><span data-dcnode-id="1178" instrument_node=""> </span><p class="buy-button selectionShareable" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Read</span></p><span data-dcnode-id="1175" instrument_node=""> </span></a><span data-dcnode-id="1173" instrument_node="">
</span></div><span data-dcnode-id="1171" instrument_node="">
</span></aside><span data-dcnode-id="1169" instrument_node="">
</span><aside class="show-for-small-only inline-el" data-book-id="24642" data-dcnode-id="1132"><span data-dcnode-id="1168" instrument_node="">
</span><div class="row single-book -with-number _small-tint" data-dcnode-id="1134"><span data-dcnode-id="1167" instrument_node="">
</span><div class="small-2 columns" data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">
</span><p class="book-number -display selectionShareable" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">2</span></p><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><div class="small-6 columns" data-dcnode-id="1154"><span data-dcnode-id="1160" instrument_node="">
</span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//voxeu.org/article/new-ebook-brexit-beckons" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1159" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1158" height="170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/front-cover_3.png&amp;raw" width="119"><span data-dcnode-id="1157" instrument_node=""> </span></a><span data-dcnode-id="1155" instrument_node=""> </span></div><span data-dcnode-id="1153" instrument_node="">
</span><div class="small-12 columns" data-dcnode-id="1136"><span data-dcnode-id="1152" instrument_node="">
</span><div class="book-title -inline" data-dcnode-id="1141"><span data-dcnode-id="1151" instrument_node="">
</span><h2 class="title" data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">
</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-beckons/"><span data-dcnode-id="1149" instrument_node="">Brexit Beckons: Thinking ahead by leading economists</span></a><span data-dcnode-id="1147" instrument_node="">
</span></h2><span data-dcnode-id="1145" instrument_node="">
</span><h3 class="author" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">
                    by Richard Baldwin (ed)                </span></h3><span data-dcnode-id="1142" instrument_node="">
</span></div><span data-dcnode-id="1140" instrument_node="">
</span><a class="buy-button" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//voxeu.org/article/new-ebook-brexit-beckons" rel="nofollow noopener" style="float: left" target="_blank"><span data-dcnode-id="1139" instrument_node="">Read</span></a><span data-dcnode-id="1137" instrument_node=""> </span></div><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span></aside><span data-dcnode-id="1131" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">On that note, let’s go to your next book. This is </span><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Brexit Beckons: Thinking Ahead by Leading Economists</span></em><span data-dcnode-id="1127" instrument_node="">, which includes 19 essays by different economists. It’s available as a free eBook. In the introduction, the editor, Richard Baldwin, notes that, in terms of the future, the alternative that seems most sensible for the UK, from an economic perspective, is the Norway option.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Indeed and, going back to what we were just saying, there were some people on the Brexit side who before and immediately after the vote were advocating some form of the Norway option. As Richard says, most economists think that the Norway option would be optimal. It’s not obvious to me, because the Norway option still has some of the disadvantages that I was just talking about—that you have to accept the rules while having a significantly lesser voice in how those rules are constructed.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">“It’s not obvious, once you’ve taken the decision to Brexit, that you shouldn’t go the whole hog.”</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">There is a counterargument to that, which is to say, ‘Well, actually, even if you thought Brexit was not the right thing to do from an economic perspective, if you’re going to do it then maybe you should do it properly.’ ‘Properly’ meaning making your own regulations, making your own trade deals—although Norway can, to a certain extent, make its own trade deals—and setting your own immigration policy. Norway cannot set its own immigration policy with respect to citizens from other EU and EEA countries. It’s not obvious, once you’ve taken the decision to Brexit, that you shouldn’t go the whole hog.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Are there any articles in there that you particularly want to highlight as illustrating something important about Brexit?</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">There are some interesting ones on what caused the Leave vote, from an economic perspective. To what extent was it immigration? To what extent was it economic decline? </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fivebooks.com/interview/best-economics-books-2016/"><span data-dcnode-id="1111" instrument_node="">Diane Coyle’s</span></a><span data-dcnode-id="1109" instrument_node=""> essay on that is very interesting. She is very much a believer that technological and globalisation have, on the whole, improved our economic outcomes. But she also feels—very strongly—that the policy response, in the 80s and 90s, to deindustrialisation in the parts of the UK that were left behind by globalisation, was very badly lacking. There’s this idea that it was a failure of previous governments to have anything that looked like an industrial or regional development strategy.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">There’s also an essay by Kevin O’Rourke, a highly respected economic historian, drawing on the work of </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fivebooks.com/interview/dani-rodrik-on-globalisation/"><span data-dcnode-id="1105" instrument_node="">Dani Rodrik</span></a><span data-dcnode-id="1103" instrument_node="">, arguing that too much market and too little state invites a backlash.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Exactly. Diane and Kevin’s pieces are complementary.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The other important chapters are those that are looking forward and deal with the UK’s future trade relationships both with the EU and the rest of the world. There’s an incredibly good line-up of trade economists—including Alan Winters and Jim Rollo—who have been doing this stuff for decades. Richard Baldwin is also a very eminent trade economist. Their moment has now come. Trade economics is back in fashion.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">“Free trade in cars is not just a matter of having zero tariffs—it’s a lot more complicated.”</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">The important thing that comes from looking at all their chapters together is the extent to which free trade is not just about abolishing tariffs. There are a number of different aspects to that. First of all, even trade in goods is much more influenced by regulation than it used to be. Cars are the classic example. Parts shuffle back and forth across borders before being assembled. Regulation matters a lot: We have emissions standards, safety standards, and all the rest of it. Free trade in cars is not just a matter of having zero tariffs—it’s a lot more complicated.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Then, when you get to trade in services and movement of capital, and the role of the City, things get even more complicated. Just the sheer complexity of the issues that are involved both in reshaping our trade relationship with the EU, and in working out what our relationships with other countries in the future will be, is just fascinating.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">And getting all sorts of people up to speed on these complexities is going to be expensive. </span></p><span data-dcnode-id="1083" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Expensive and complicated. We’re a very, very long way off. We don’t even know what we want yet.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="24644" data-dcnode-id="1067" id="book-24644"><span data-dcnode-id="1079" instrument_node="">
</span><div class="single-book inline -placeholders" data-dcnode-id="1069"><span data-dcnode-id="1078" instrument_node="">
</span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dominiccummings.wordpress.com/2017/01/09/on-the-referendum-21-branching-histories-of-the-2016-referendum-and-the-frogs-before-the-storm-2/" id="book-branching-histories-2016-referendum-frogs-storm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1077" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1076" height="323" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/vl_tbc.png&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/vl_tbc.png 450w, https://fivebooks.com/app/uploads/2017/03/vl_tbc-300x215.png 300w, https://fivebooks.com/app/uploads/2017/03/vl_tbc-314x225.png 314w" width="450"><span data-dcnode-id="1075" instrument_node=""> </span><p class="buy-button selectionShareable" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Read</span></p><span data-dcnode-id="1072" instrument_node=""> </span></a><span data-dcnode-id="1070" instrument_node="">

</span></aside><span data-dcnode-id="1066" instrument_node="">
</span><aside class="show-for-small-only inline-el" data-book-id="24644" data-dcnode-id="1029"><span data-dcnode-id="1065" instrument_node="">
</span><div class="row single-book -with-number _small-tint" data-dcnode-id="1031"><span data-dcnode-id="1064" instrument_node="">
</span><div class="small-2 columns" data-dcnode-id="1059"><span data-dcnode-id="1063" instrument_node="">
</span><p class="book-number -display selectionShareable" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">3</span></p><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span><div class="small-6 columns" data-dcnode-id="1051"><span data-dcnode-id="1057" instrument_node="">
</span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dominiccummings.wordpress.com/2017/01/09/on-the-referendum-21-branching-histories-of-the-2016-referendum-and-the-frogs-before-the-storm-2/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1056" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="1055" height="323" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/vl_tbc.png&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/vl_tbc.png 450w, https://fivebooks.com/app/uploads/2017/03/vl_tbc-300x215.png 300w, https://fivebooks.com/app/uploads/2017/03/vl_tbc-314x225.png 314w" width="450"><span data-dcnode-id="1054" instrument_node=""> </span></a><span data-dcnode-id="1052" instrument_node=""> </span></div><span data-dcnode-id="1050" instrument_node="">
</span><div class="small-12 columns" data-dcnode-id="1033"><span data-dcnode-id="1049" instrument_node="">
</span><div class="book-title -inline" data-dcnode-id="1038"><span data-dcnode-id="1048" instrument_node="">
</span><h2 class="title" data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">
</span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/branching-histories-2016-referendum-frogs-storm/"><span data-dcnode-id="1046" instrument_node="">Branching histories of the 2016 referendum and ‘the frogs before the storm’</span></a><span data-dcnode-id="1044" instrument_node="">
</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><h3 class="author" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">
                    by Dominic Cummings                </span></h3><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">
</span><a class="buy-button" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dominiccummings.wordpress.com/2017/01/09/on-the-referendum-21-branching-histories-of-the-2016-referendum-and-the-frogs-before-the-storm-2/" rel="nofollow noopener" style="float: left" target="_blank"><span data-dcnode-id="1036" instrument_node="">Read</span></a><span data-dcnode-id="1034" instrument_node=""> </span></div><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span></aside><span data-dcnode-id="1028" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">Let’s move on to number three on your reading list. This is </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dominiccummings.wordpress.com/2017/01/09/on-the-referendum-21-branching-histories-of-the-2016-referendum-and-the-frogs-before-the-storm-2/" target="_blank"><span data-dcnode-id="1026" instrument_node="">a blog post by Dominic Cummings</span></a><span data-dcnode-id="1024" instrument_node="">, who was the campaign director of Vote Leave.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Dominic is an absolutely fascinating character and has often been described as the ‘brains’ of the Vote Leave campaign. I’ve chosen this as an illustration of how the campaign was won on the Leave side. What I really like about this is that, in contrast to Dan Hannan, Dominic is very frank and honest. He’s quite prepared to say, ‘We did this, and we think it works, we weren’t so sure about that but we did it anyway. This is what we know, this is what we don’t know, this is what I think.’ He’s very dispassionate and there’s a degree of scientific method and rigour in his approach that you rarely see. At the same time, he’s very entertaining.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">“When I first saw the slogan “Vote Leave, take back control” I thought, ‘Really? What does that even mean? Is that going to work?’”</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">It’s very revealing. I don’t think Dominic would claim that he won it himself or that he necessarily knows which of these particular things won it, but it’s a very good insight into how they were thinking. And I do think that there was a contrast with the Remain campaign which was very old-fashioned and did not apply this sort of rigour in analysis that Dominic and his team did.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Having read the blog post, his overall conclusion seems to be that there were two things that won it for them. One was the “Let’s give our NHS the £350 million the EU takes every week” slogan, and the other was keeping Nigel Farage out of sight as much as possible. Those seemed to be two tactics he is particularly proud of. </span></p><span data-dcnode-id="1010" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Yes, the other side is that Dominic is pretty cynical and ruthless about his approach to campaigning. The £350 million figure was, of course, simply untrue. Everyone knows that and I think pretty much everyone on both sides will admit it, at least privately. With Farage, Dominic was quite ruthless. But politics is a ruthless business. It’s quite reasonable, I suppose, for Nigel Farage to say, ‘We’d have never got the referendum without me.’ Equally, Dominic’s priority was winning and his view —and I think he had some pretty good evidence for it—was that the right way to win was to approach Farage in the way that he did. By and large, I find that convincing.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p class="pullquote inline-el selectionShareable" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">“Dominic is an absolutely fascinating character and has often been described as the ‘brains’ of the Vote Leave campaign.”</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">I have to say, when I first saw the slogan “Vote Leave, take back control” I thought, ‘Really? What does that even mean? Is that going to work?’ I was completely wrong. I’m not just saying that because Leave won, I think there is enough evidence—some of which is here and some of which is elsewhere—that that did genuinely resonate with people. That was Dominic and he was right.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">So, I think he has a pretty good case to make. He doesn’t oversell himself too much in this post, at least. He admits somewhere that the result was over-determined in that, if you have a very close result like 52-48, there’s a lot of different things that could have won it. You can’t point to any one single factor. And you can’t say that it was inevitable. He’s quite clear that it wasn’t inevitable.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p class="question selectionShareable" data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">He seems to have read a few </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fivebooks.com/interview/dan-ariely-on-behavioural-economics/"><span data-dcnode-id="996" instrument_node="">behavioural economics books</span></a><span data-dcnode-id="994" instrument_node="">—or looked at that type of psychological study.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Yes. Again, I think one of the impressive things about Dominic—whether or not you agree with his objectives—is that he takes proper scientific evidence in the social sciences seriously and tries to apply it. Again, I think this was in contrast to the Remain campaign, which was a much more traditional election campaign by PR professionals and special advisors.</span></p><span data-dcnode-id="989" instrument_node="">
</span><aside class="ancillary-block -left show-for-medium-up anchor-offset" data-book-id="24646" data-dcnode-id="976" id="book-24646"><span data-dcnode-id="988" instrument_node="">
</span><div class="single-book inline -placeholders" data-dcnode-id="978"><span data-dcnode-id="987" instrument_node="">
</span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/book/brexit-britain-voted-leave-european-union/buy" id="book-brexit-britain-voted-leave-european-union" rel="nofollow" target="_blank"><span data-dcnode-id="986" instrument_node=""> </span><img alt="" class="cover wp-post-image" data-dcnode-id="985" height="500" loading="lazy" sizes="(max-width: 329px) 100vw, 329px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_.jpg&amp;raw" srcset="https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_.jpg 329w, https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_-197x300.jpg 197w, https://fivebooks.com/app/uploads/2017/03/1316605043.01.LZ_-314x477.jpg 314w" width="329"><span data-dcnode-id="984" instrument_node=""> </span><p class="buy-button selectionShareable" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Read</span></p><span data-dcnode-id="981" instrument_node=""> </span></a><span data-dcnode-id="979" instrument_node="">
