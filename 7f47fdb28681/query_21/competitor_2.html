</span><h3 data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Long List of Equalities Impacts</span></h3><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Having explored the general impacts of Brexit for equalities groups, the remainder of this report will focus on how Brexit may impact specific groups of people in different ways. </span></p><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3261"><span data-dcnode-id="3265" instrument_node="">To begin with, the following 'long-list' captures the main impacts of Brexit on 20 equalities groups in Scotland/the </span><acronym data-dcnode-id="3263" title="United Kingdom"><span data-dcnode-id="3264" instrument_node="">UK</span></acronym><span data-dcnode-id="3262" instrument_node="">, including people with the nine 'protected characteristics' listed under the Equality Act, and other additional groups who may experience discrimination, exclusion or inequality due to personal characteristics. The table focuses on three areas: </span></p><span data-dcnode-id="3260" instrument_node="">
</span><ul data-dcnode-id="3249"><span data-dcnode-id="3259" instrument_node="">
</span><li data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">legal rights</span></li><span data-dcnode-id="3256" instrument_node="">
</span><li data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">public services and funding </span></li><span data-dcnode-id="3253" instrument_node="">
</span><li data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">employment, housing, spending/consumer and wider community impacts.</span></li><span data-dcnode-id="3250" instrument_node="">
</span></ul><span data-dcnode-id="3248" instrument_node="">
</span><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">The 137 potential impacts identified below are ones that are considered to be most significant and most widely felt across equalities groups. And while they may represent similar trends (such as the loss of certain rights or services), they are considered distinct in terms of how they occur, who they affect, or both. </span></p><span data-dcnode-id="3245" instrument_node="">
</span><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Whether or not they are likely to happen depends on a number of variables that are at present difficult to forecast, including: </span></p><span data-dcnode-id="3242" instrument_node="">
</span><ul data-dcnode-id="3198"><span data-dcnode-id="3241" instrument_node="">
</span><li data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">whether there is a hard, softer or no-trade deal Brexit; </span></li><span data-dcnode-id="3238" instrument_node="">
</span><li data-dcnode-id="3230"><span data-dcnode-id="3237" instrument_node="">whether, under a 'softer' Brexit, the </span><acronym data-dcnode-id="3235" title="United Kingdom"><span data-dcnode-id="3236" instrument_node="">UK</span></acronym><span data-dcnode-id="3234" instrument_node=""> makes a commitment to non-regression for </span><acronym data-dcnode-id="3232" title="European Union"><span data-dcnode-id="3233" instrument_node="">EU</span></acronym><span data-dcnode-id="3231" instrument_node=""> rights and protections; </span></li><span data-dcnode-id="3229" instrument_node="">
</span><li data-dcnode-id="3221"><span data-dcnode-id="3228" instrument_node="">whether the </span><acronym data-dcnode-id="3226" title="United Kingdom"><span data-dcnode-id="3227" instrument_node="">UK</span></acronym><span data-dcnode-id="3225" instrument_node=""> signs up to the </span><acronym data-dcnode-id="3223" title="European Union"><span data-dcnode-id="3224" instrument_node="">EU</span></acronym><span data-dcnode-id="3222" instrument_node="">'s shared information systems to protect rights; </span></li><span data-dcnode-id="3220" instrument_node="">
</span><li data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">whether the </span><acronym data-dcnode-id="3217" title="United Kingdom"><span data-dcnode-id="3218" instrument_node="">UK</span></acronym><span data-dcnode-id="3216" instrument_node=""> Government's proposed Shared Prosperity Fund adequately compensates equalities groups for the loss of </span><acronym data-dcnode-id="3214" title="European Union"><span data-dcnode-id="3215" instrument_node="">EU</span></acronym><span data-dcnode-id="3213" instrument_node=""> funding and meets their needs; </span></li><span data-dcnode-id="3211" instrument_node="">
</span><li data-dcnode-id="3206"><span data-dcnode-id="3210" instrument_node="">whether the </span><acronym data-dcnode-id="3208" title="United Kingdom"><span data-dcnode-id="3209" instrument_node="">UK</span></acronym><span data-dcnode-id="3207" instrument_node=""> Government unfreezes benefits and increases public spending to mitigate against any adverse economic impacts of Brexit; and</span></li><span data-dcnode-id="3205" instrument_node="">
</span><li data-dcnode-id="3200"><span data-dcnode-id="3204" instrument_node="">whether the </span><acronym data-dcnode-id="3202" title="United Kingdom"><span data-dcnode-id="3203" instrument_node="">UK</span></acronym><span data-dcnode-id="3201" instrument_node=""> includes equalities clauses in any future trade agreements.</span></li><span data-dcnode-id="3199" instrument_node="">
</span></ul><span data-dcnode-id="3197" instrument_node="">
</span><p data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">As such, some of these possible impacts may not come to pass, however, they are important to consider for risk and contingency planning.</span></p><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3191"><strong data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Women</span></strong></p><span data-dcnode-id="3190" instrument_node="">
</span><span data-dcnode-id="3189" instrument_node="">
</span><span data-dcnode-id="3188" instrument_node="">
</span><span data-dcnode-id="3187" instrument_node="">
</span><span data-dcnode-id="3180" instrument_node="">
</span><span data-dcnode-id="3173" instrument_node="">
</span><span data-dcnode-id="3166" instrument_node="">
</span><span data-dcnode-id="3164" instrument_node="">
</span><span data-dcnode-id="3163" instrument_node="">
</span><span data-dcnode-id="3119" instrument_node="">
</span><span data-dcnode-id="3053" instrument_node="">
</span><span data-dcnode-id="3020" instrument_node="">
