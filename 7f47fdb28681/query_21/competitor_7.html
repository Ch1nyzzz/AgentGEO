</span><p data-dcnode-id="6057"><span data-dcnode-id="6077" instrument_node="">United States housing prices experienced a major </span><a data-dcnode-id="6075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_correction" title="Market correction"><span data-dcnode-id="6076" instrument_node="">market correction</span></a><span data-dcnode-id="6074" instrument_node=""> after the </span><a data-dcnode-id="6072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_housing_bubble" title="United States housing bubble"><span data-dcnode-id="6073" instrument_node="">housing bubble</span></a><span data-dcnode-id="6071" instrument_node=""> that </span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_the_United_States_housing_bubble" title="Timeline of the United States housing bubble"><span data-dcnode-id="6070" instrument_node="">peaked in early 2006</span></a><span data-dcnode-id="6068" instrument_node="">. Prices of real estate then adjusted downwards in late 2006, causing a loss of </span><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_liquidity" title="Market liquidity"><span data-dcnode-id="6067" instrument_node="">market liquidity</span></a><span data-dcnode-id="6065" instrument_node=""> and </span><a data-dcnode-id="6063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_lending" title="Subprime lending"><span data-dcnode-id="6064" instrument_node="">subprime defaults</span></a><span data-dcnode-id="6062" instrument_node="">.</span><sup class="reference" data-dcnode-id="6059" id="cite_ref-1"><a data-dcnode-id="6060" href="#cite_note-1"><span data-dcnode-id="6061" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6058" instrument_node="">
</span></p><p data-dcnode-id="5991"><span data-dcnode-id="6056" instrument_node="">A </span><a class="mw-redirect" data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate_bubble" title="Real estate bubble"><span data-dcnode-id="6055" instrument_node="">real estate bubble</span></a><span data-dcnode-id="6053" instrument_node=""> is a type of </span><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_bubble" title="Economic bubble"><span data-dcnode-id="6052" instrument_node="">economic bubble</span></a><span data-dcnode-id="6050" instrument_node=""> that occurs periodically in local, regional, national or global </span><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate" title="Real estate"><span data-dcnode-id="6049" instrument_node="">real estate</span></a><span data-dcnode-id="6047" instrument_node=""> markets. A </span><a data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Housing_bubble" title="Housing bubble"><span data-dcnode-id="6046" instrument_node="">housing bubble</span></a><span data-dcnode-id="6044" instrument_node=""> is characterized by rapid and sustained increases in the </span><a data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate_appraisal" title="Real estate appraisal"><span data-dcnode-id="6043" instrument_node="">price</span></a><span data-dcnode-id="6041" instrument_node=""> of </span><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_property" title="Real property"><span data-dcnode-id="6040" instrument_node="">real property</span></a><span data-dcnode-id="6038" instrument_node="">, such as </span><a data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House" title="House"><span data-dcnode-id="6037" instrument_node="">housing</span></a><span data-dcnode-id="6035" instrument_node="">' usually due to some combination of </span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overconfidence_effect" title="Overconfidence effect"><span data-dcnode-id="6034" instrument_node="">over-confidence</span></a><span data-dcnode-id="6032" instrument_node=""> and emotion, fraud,</span><sup class="reference" data-dcnode-id="6029" id="cite_ref-2"><a data-dcnode-id="6030" href="#cite_note-2"><span data-dcnode-id="6031" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6028" instrument_node=""> the synthetic</span><sup class="reference" data-dcnode-id="6025" id="cite_ref-3"><a data-dcnode-id="6026" href="#cite_note-3"><span data-dcnode-id="6027" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6024" instrument_node=""> offloading of risk using </span><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortgage-backed_security" title="Mortgage-backed security"><span data-dcnode-id="6023" instrument_node="">mortgage-backed securities</span></a><span data-dcnode-id="6021" instrument_node="">, the ability to repackage conforming debt </span><sup class="reference" data-dcnode-id="6018" id="cite_ref-4"><a data-dcnode-id="6019" href="#cite_note-4"><span data-dcnode-id="6020" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6017" instrument_node=""> via </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government-sponsored_enterprise" title="Government-sponsored enterprise"><span data-dcnode-id="6016" instrument_node="">government-sponsored enterprises</span></a><span data-dcnode-id="6014" instrument_node="">, public and central bank policy</span><sup class="reference" data-dcnode-id="6011" id="cite_ref-5"><a data-dcnode-id="6012" href="#cite_note-5"><span data-dcnode-id="6013" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6010" instrument_node=""> availability of credit, and speculation.  Housing bubbles tend to distort valuations upward relative to historic, sustainable, and statistical norms as described by economists </span><a class="mw-redirect" data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Case" title="Karl Case"><span data-dcnode-id="6009" instrument_node="">Karl Case</span></a><span data-dcnode-id="6007" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Shiller" title="Robert Shiller"><span data-dcnode-id="6006" instrument_node="">Robert Shiller</span></a><span data-dcnode-id="6004" instrument_node=""> in their book, </span><i data-dcnode-id="6001"><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irrational_Exuberance_%28book%29" title="Irrational Exuberance (book)"><span data-dcnode-id="6003" instrument_node="">Irrational Exuberance</span></a></i><span data-dcnode-id="6000" instrument_node="">.</span><sup class="reference" data-dcnode-id="5997" id="cite_ref-6"><a data-dcnode-id="5998" href="#cite_note-6"><span data-dcnode-id="5999" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5996" instrument_node="">  As early as 2003  Shiller questioned whether or not there was, "a bubble in the housing market"</span><sup class="reference" data-dcnode-id="5993" id="cite_ref-7"><a data-dcnode-id="5994" href="#cite_note-7"><span data-dcnode-id="5995" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5992" instrument_node=""> that might in the near future correct.

</span></td></tr><tr data-dcnode-id="5826"><td data-dcnode-id="5827"><div class="thumb tright" data-dcnode-id="5829"><div class="thumbinner" data-dcnode-id="5830" style="width:352px;"><a class="image" data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACshpi-peak.svg"><img alt="" class="thumbimage" data-dcnode-id="5849" data-file-height="310" data-file-width="300" decoding="async" height="362" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Cshpi-peak.svg/350px-Cshpi-peak.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Cshpi-peak.svg/525px-Cshpi-peak.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Cshpi-peak.svg/700px-Cshpi-peak.svg.png 2x" width="350"></a><span data-dcnode-id="5847" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5831"><div class="magnify" data-dcnode-id="5845"><a class="internal" data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACshpi-peak.svg" title="Enlarge"></a></div><span data-dcnode-id="5844" instrument_node="">Percentage change of the </span><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_price_index" title="House price index"><span data-dcnode-id="5843" instrument_node="">Case-Shiller Home Price Index</span></a><span data-dcnode-id="5841" instrument_node=""> for the housing correction beginning in 2006 (</span><span data-dcnode-id="5839" style="color:maroon;"><span data-dcnode-id="5840" instrument_node="">red</span></span><span data-dcnode-id="5838" instrument_node="">) and the correction (</span><span data-dcnode-id="5836" style="color:navy;"><span data-dcnode-id="5837" instrument_node="">blue</span></span><span data-dcnode-id="5835" instrument_node="">) beginning in 1989, comparing monthly </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_price_index" title="House price index"><span data-dcnode-id="5834" instrument_node="">CSI</span></a><span data-dcnode-id="5832" instrument_node=""> values from the peak value seen just prior to the first declining month all the way through the downturn and the full recovery of home prices.</span></div></div></div><span data-dcnode-id="5828" instrument_node="">

</span><p data-dcnode-id="5791"><span data-dcnode-id="5822" instrument_node="">Based on the historic trends in valuations of U.S. housing,</span><sup class="reference" data-dcnode-id="5819" id="cite_ref-IE2_8-0"><a data-dcnode-id="5820" href="#cite_note-IE2-8"><span data-dcnode-id="5821" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5816" id="cite_ref-9"><a data-dcnode-id="5817" href="#cite_note-9"><span data-dcnode-id="5818" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> many economists and business writers predicted a market correction, ranging from a few percentage points, to 50% or more from peak values in some markets,</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-10"><a data-dcnode-id="5813" href="#cite_note-10"><span data-dcnode-id="5814" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="5809" id="cite_ref-11"><a data-dcnode-id="5810" href="#cite_note-11"><span data-dcnode-id="5811" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="5806" id="cite_ref-12"><a data-dcnode-id="5807" href="#cite_note-12"><span data-dcnode-id="5808" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="5803" id="cite_ref-Barron's_crisis_13-0"><a data-dcnode-id="5804" href="#cite_note-Barron's_crisis-13"><span data-dcnode-id="5805" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="5800" id="cite_ref-NW_bubble_bloggers_14-0"><a data-dcnode-id="5801" href="#cite_note-NW_bubble_bloggers-14"><span data-dcnode-id="5802" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5799" instrument_node=""> and, although this cooling did not affect all areas of the United States, some warned that the correction could and would be "nasty" and "severe".</span><sup class="reference" data-dcnode-id="5796" id="cite_ref-15"><a data-dcnode-id="5797" href="#cite_note-15"><span data-dcnode-id="5798" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5793" id="cite_ref-16"><a data-dcnode-id="5794" href="#cite_note-16"><span data-dcnode-id="5795" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5792" instrument_node="">
</span></p><p data-dcnode-id="5756"><span data-dcnode-id="5790" instrument_node="">Chief economist </span><a data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Zandi" title="Mark Zandi"><span data-dcnode-id="5789" instrument_node="">Mark Zandi</span></a><span data-dcnode-id="5787" instrument_node=""> of the research firm </span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moody%2527s_Analytics" title="Moody's Analytics"><span data-dcnode-id="5786" instrument_node="">Moody's Economy.com</span></a><span data-dcnode-id="5784" instrument_node=""> predicted a crash of double-digit depreciation in some U.S. cities by 2007–2009.</span><sup class="reference" data-dcnode-id="5781" id="cite_ref-Moody_crash_17-0"><a data-dcnode-id="5782" href="#cite_note-Moody_crash-17"><span data-dcnode-id="5783" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5778" id="cite_ref-18"><a data-dcnode-id="5779" href="#cite_note-18"><span data-dcnode-id="5780" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5777" instrument_node="">
</span><a data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dean_Baker" title="Dean Baker"><span data-dcnode-id="5776" instrument_node="">Dean Baker</span></a><span data-dcnode-id="5774" instrument_node=""> of the </span><a data-dcnode-id="5772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Center_for_Economic_and_Policy_Research" title="Center for Economic and Policy Research"><span data-dcnode-id="5773" instrument_node="">Center for Economic and Policy Research</span></a><span data-dcnode-id="5771" instrument_node=""> was the first economist to identify the housing bubble, in a report in the summer of 2002.</span><sup class="reference" data-dcnode-id="5768" id="cite_ref-Baker_bubble_19-0"><a data-dcnode-id="5769" href="#cite_note-Baker_bubble-19"><span data-dcnode-id="5770" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5767" instrument_node="">
Investor </span><a data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Schiff" title="Peter Schiff"><span data-dcnode-id="5766" instrument_node="">Peter Schiff</span></a><span data-dcnode-id="5764" instrument_node=""> acquired fame in a series of TV appearances where he opposed a multitude of financial experts and claimed that a bust was to come.</span><sup class="reference" data-dcnode-id="5761" id="cite_ref-Youtube.com_20-0"><a data-dcnode-id="5762" href="#cite_note-Youtube.com-20"><span data-dcnode-id="5763" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="5758" id="cite_ref-21"><a data-dcnode-id="5759" href="#cite_note-21"><span data-dcnode-id="5760" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5757" instrument_node="">
</span></p><p data-dcnode-id="5744"><span data-dcnode-id="5755" instrument_node="">The housing bubble was partly subsidized by government-sponsored entities like </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fannie_Mae" title="Fannie Mae"><span data-dcnode-id="5754" instrument_node="">Fannie Mae</span></a><span data-dcnode-id="5752" instrument_node=""> and </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freddie_Mac" title="Freddie Mac"><span data-dcnode-id="5751" instrument_node="">Freddie Mac</span></a><span data-dcnode-id="5749" instrument_node=""> and federal policies intended to make housing affordable for all.</span><sup class="reference" data-dcnode-id="5746" id="cite_ref-22"><a data-dcnode-id="5747" href="#cite_note-22"><span data-dcnode-id="5748" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5745" instrument_node="">

</span><p data-dcnode-id="5667"><span data-dcnode-id="5675" instrument_node="">The booming housing market halted abruptly in many parts of the United States in late summer of 2005, and as of summer 2006, several markets faced the issues of ballooning inventories, falling prices, and sharply reduced sales volumes. In August 2006, </span><i data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">Barron's</span></i><span data-dcnode-id="5672" instrument_node=""> magazine warned, "a housing crisis approaches", and noted that the median price of new homes dropped almost 3% since January 2006, that new-home inventories hit a record in April and remained near all-time highs, that existing-home inventories were 39% higher than they were just one year earlier, and that sales were down more than 10%, and predicted that "the national median price of housing will probably fall by close to 30% in the next three years ... simple reversion to the mean."</span><sup class="reference" data-dcnode-id="5669" id="cite_ref-Barron's_crisis_13-1"><a data-dcnode-id="5670" href="#cite_note-Barron's_crisis-13"><span data-dcnode-id="5671" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5668" instrument_node="">
</span></p><p data-dcnode-id="5629"><i data-dcnode-id="5664"><a class="mw-redirect" data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fortune_magazine" title="Fortune magazine"><span data-dcnode-id="5666" instrument_node="">Fortune</span></a></i><span data-dcnode-id="5663" instrument_node=""> magazine labeled many previously strong housing markets as "Dead Zones";</span><sup class="reference" data-dcnode-id="5660" id="cite_ref-Fortune_deadzone_24-0"><a data-dcnode-id="5661" href="#cite_note-Fortune_deadzone-24"><span data-dcnode-id="5662" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5659" instrument_node=""> other areas were classified as "Danger Zones" and "Safe Havens". </span><i data-dcnode-id="5656"><a class="mw-redirect" data-dcnode-id="5657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fortune_magazine" title="Fortune magazine"><span data-dcnode-id="5658" instrument_node="">Fortune</span></a></i><span data-dcnode-id="5655" instrument_node=""> also dispelled "four myths about the future of home prices".</span><sup class="reference" data-dcnode-id="5652" id="cite_ref-Tully_Fortune_myths_25-0"><a data-dcnode-id="5653" href="#cite_note-Tully_Fortune_myths-25"><span data-dcnode-id="5654" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5651" instrument_node=""> In </span><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston" title="Boston"><span data-dcnode-id="5650" instrument_node="">Boston</span></a><span data-dcnode-id="5648" instrument_node="">, year-over-year prices dropped,</span><sup class="reference" data-dcnode-id="5645" id="cite_ref-Blanton20060426_26-0"><a data-dcnode-id="5646" href="#cite_note-Blanton20060426-26"><span data-dcnode-id="5647" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5644" instrument_node=""> sales fell, inventory increased, foreclosures were up,</span><sup class="reference" data-dcnode-id="5641" id="cite_ref-BG_ARM_27-0"><a data-dcnode-id="5642" href="#cite_note-BG_ARM-27"><span data-dcnode-id="5643" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="5638" id="cite_ref-BH_Mass_foreclosures_28-0"><a data-dcnode-id="5639" href="#cite_note-BH_Mass_foreclosures-28"><span data-dcnode-id="5640" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5637" instrument_node=""> and the correction in </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Massachusetts" title="Massachusetts"><span data-dcnode-id="5636" instrument_node="">Massachusetts</span></a><span data-dcnode-id="5634" instrument_node=""> was called a "hard landing".</span><sup class="reference" data-dcnode-id="5631" id="cite_ref-Blanton20051209_29-0"><a data-dcnode-id="5632" href="#cite_note-Blanton20051209-29"><span data-dcnode-id="5633" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5630" instrument_node="">
</span></p><p data-dcnode-id="5565"><span data-dcnode-id="5628" instrument_node="">The previously booming</span><sup class="reference" data-dcnode-id="5625" id="cite_ref-Barron's_BNH1_30-0"><a data-dcnode-id="5626" href="#cite_note-Barron's_BNH1-30"><span data-dcnode-id="5627" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5624" instrument_node=""> housing markets in </span><a data-dcnode-id="5622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="5623" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="5621" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Diego%2C_California" title="San Diego, California"><span data-dcnode-id="5620" instrument_node="">San Diego, California</span></a><span data-dcnode-id="5618" instrument_node="">, </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoenix%2C_Arizona" title="Phoenix, Arizona"><span data-dcnode-id="5617" instrument_node="">Phoenix, Arizona</span></a><span data-dcnode-id="5615" instrument_node="">, and other cities stalled as well.</span><sup class="reference" data-dcnode-id="5612" id="cite_ref-BW20051219_31-0"><a data-dcnode-id="5613" href="#cite_note-BW20051219-31"><span data-dcnode-id="5614" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="5609" id="cite_ref-32"><a data-dcnode-id="5610" href="#cite_note-32"><span data-dcnode-id="5611" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5608" instrument_node=""> The Arizona Regional </span><a class="mw-redirect" data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiple_Listing_Service" title="Multiple Listing Service"><span data-dcnode-id="5607" instrument_node="">Multiple Listing Service</span></a><span data-dcnode-id="5605" instrument_node=""> (ARMLS) showed that in summer 2006, the for-sale housing inventory in Phoenix hads grown to over 50,000 homes, of which nearly half were vacant (see graphic).</span><sup class="reference" data-dcnode-id="5602" id="cite_ref-PHX_homes_vacant_33-0"><a data-dcnode-id="5603" href="#cite_note-PHX_homes_vacant-33"><span data-dcnode-id="5604" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5601" instrument_node=""> Several home builders revised their forecasts sharply downward during the summer of 2006, e.g., </span><a class="mw-redirect" data-dcnode-id="5599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D.R._Horton" title="D.R. Horton"><span data-dcnode-id="5600" instrument_node="">D.R. Horton</span></a><span data-dcnode-id="5598" instrument_node=""> cut its yearly earnings forecast by one-third in July 2006,</span><sup class="reference" data-dcnode-id="5595" id="cite_ref-MarketWatch20060714_34-0"><a data-dcnode-id="5596" href="#cite_note-MarketWatch20060714-34"><span data-dcnode-id="5597" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5594" instrument_node=""> the value of luxury home builder </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toll_Brothers" title="Toll Brothers"><span data-dcnode-id="5593" instrument_node="">Toll Brothers</span></a><span data-dcnode-id="5591" instrument_node="">' stock fell 50% between August 2005 and August 2006,</span><sup class="noprint Inline-Template" data-dcnode-id="5584" style="white-space:nowrap;"><span data-dcnode-id="5590" instrument_node="">[</span><i data-dcnode-id="5586"><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research" title="Wikipedia:No original research"><span data-dcnode-id="5588" title="The material near this tag possibly contains original research. (December 2010)"><span data-dcnode-id="5589" instrument_node="">original research?</span></span></a></i><span data-dcnode-id="5585" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="5581" id="cite_ref-TOL_35-0"><a data-dcnode-id="5582" href="#cite_note-TOL-35"><span data-dcnode-id="5583" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5580" instrument_node=""> and the </span><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%2526P_Dow_Jones_Indices" title="S&amp;P Dow Jones Indices"><span data-dcnode-id="5579" instrument_node="">Dow Jones</span></a><span data-dcnode-id="5577" instrument_node=""> U.S. Home Construction Index was down over 40% as of mid-August 2006.</span><sup class="noprint Inline-Template" data-dcnode-id="5570" style="white-space:nowrap;"><span data-dcnode-id="5576" instrument_node="">[</span><i data-dcnode-id="5572"><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research" title="Wikipedia:No original research"><span data-dcnode-id="5574" title="The material near this tag possibly contains original research. (December 2010)"><span data-dcnode-id="5575" instrument_node="">original research?</span></span></a></i><span data-dcnode-id="5571" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="5567" id="cite_ref-DJUSHB_36-0"><a data-dcnode-id="5568" href="#cite_note-DJUSHB-36"><span data-dcnode-id="5569" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5566" instrument_node="">
</span></p><p data-dcnode-id="5548"><span data-dcnode-id="5564" instrument_node="">CEO Robert Toll of Toll Brothers explained, "builders that built speculative homes are trying to move them by offering large incentives and discounts; and some buyers are canceling contracts for homes already being built".</span><sup class="reference" data-dcnode-id="5561" id="cite_ref-Toll_Brothers_37-0"><a data-dcnode-id="5562" href="#cite_note-Toll_Brothers-37"><span data-dcnode-id="5563" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5560" instrument_node=""> Homebuilder </span><a class="new" data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKara_Homes%26action%3Dedit%26redlink%3D1" title="Kara Homes (page does not exist)"><span data-dcnode-id="5559" instrument_node="">Kara Homes</span></a><span data-dcnode-id="5557" instrument_node=""> announced on 13&nbsp;September 2006 the "two most profitable quarters in the history of our company", yet the company filed for bankruptcy protection less than one month later on 6&nbsp;October.</span><sup class="reference" data-dcnode-id="5554" id="cite_ref-38"><a data-dcnode-id="5555" href="#cite_note-38"><span data-dcnode-id="5556" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5553" instrument_node=""> Six months later on 10&nbsp;April 2007, Kara Homes sold unfinished developments, causing prospective buyers from the previous year to lose deposits, some of whom put down more than $100,000.</span><sup class="reference" data-dcnode-id="5550" id="cite_ref-39"><a data-dcnode-id="5551" href="#cite_note-39"><span data-dcnode-id="5552" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5549" instrument_node="">
</span></p><p data-dcnode-id="5525"><span data-dcnode-id="5547" instrument_node="">As the housing market began to soften from winter 2005 through summer 2006,</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-40"><a data-dcnode-id="5545" href="#cite_note-40"><span data-dcnode-id="5546" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="5541" id="cite_ref-NYTPeters20060726_41-0"><a data-dcnode-id="5542" href="#cite_note-NYTPeters20060726-41"><span data-dcnode-id="5543" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5540" instrument_node=""> </span><a data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Association_of_Realtors" title="National Association of Realtors"><span data-dcnode-id="5539" instrument_node="">NAR</span></a><span data-dcnode-id="5537" instrument_node=""> chief economist </span><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Lereah" title="David Lereah"><span data-dcnode-id="5536" instrument_node="">David Lereah</span></a><span data-dcnode-id="5534" instrument_node=""> predicted a "soft landing" for the market.</span><sup class="reference" data-dcnode-id="5531" id="cite_ref-42"><a data-dcnode-id="5532" href="#cite_note-42"><span data-dcnode-id="5533" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5530" instrument_node=""> However, based on unprecedented rises in inventory and a sharply slowing market throughout 2006, Leslie Appleton-Young, the chief economist of the California Association of Realtors, said that she was not comfortable with the mild term "soft landing" to describe what was actually happening in California's real estate market.</span><sup class="reference" data-dcnode-id="5527" id="cite_ref-43"><a data-dcnode-id="5528" href="#cite_note-43"><span data-dcnode-id="5529" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5526" instrument_node="">
</span></p><p data-dcnode-id="5505"><span data-dcnode-id="5524" instrument_node="">The </span><i data-dcnode-id="5521"><a data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_Times" title="Financial Times"><span data-dcnode-id="5523" instrument_node="">Financial Times</span></a></i><span data-dcnode-id="5520" instrument_node=""> warned of the impact on the </span><a data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_United_States" title="Economy of the United States"><span data-dcnode-id="5519" instrument_node="">U.S. economy</span></a><span data-dcnode-id="5517" instrument_node=""> of the "hard edge" in the "soft landing" scenario, saying "A slowdown in these red-hot markets is inevitable. It may be gentle, but it is impossible to rule out a collapse of sentiment and of prices. ... If housing wealth stops rising ... the effect on the world's economy could be depressing indeed".</span><sup class="reference" data-dcnode-id="5514" id="cite_ref-44"><a data-dcnode-id="5515" href="#cite_note-44"><span data-dcnode-id="5516" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5513" instrument_node="">
"It would be difficult to characterize the position of home builders as other than in a hard landing", said </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_I._Toll" title="Robert I. Toll"><span data-dcnode-id="5512" instrument_node="">Robert I. Toll</span></a><span data-dcnode-id="5510" instrument_node="">, CEO of Toll Brothers.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-45"><a data-dcnode-id="5508" href="#cite_note-45"><span data-dcnode-id="5509" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5506" instrument_node="">
</span></p><p data-dcnode-id="5486"><span data-dcnode-id="5504" instrument_node="">Angelo Mozilo, CEO of </span><a class="mw-redirect" data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Countrywide_Financial" title="Countrywide Financial"><span data-dcnode-id="5503" instrument_node="">Countrywide Financial</span></a><span data-dcnode-id="5501" instrument_node="">, said "I've never seen a soft-landing in 53 years, so we have a ways to go before this levels out. I have to prepare the company for the worst that can happen."</span><sup class="reference" data-dcnode-id="5498" id="cite_ref-46"><a data-dcnode-id="5499" href="#cite_note-46"><span data-dcnode-id="5500" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5497" instrument_node=""> Following these reports, Lereah admitted that "he expects home prices to come down 5% nationally", and said that some cities in </span><a data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Florida" title="Florida"><span data-dcnode-id="5496" instrument_node="">Florida</span></a><span data-dcnode-id="5494" instrument_node=""> and </span><a data-dcnode-id="5492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California" title="California"><span data-dcnode-id="5493" instrument_node="">California</span></a><span data-dcnode-id="5491" instrument_node=""> could have "hard landings."</span><sup class="reference" data-dcnode-id="5488" id="cite_ref-Lereah_hard_landing_47-0"><a data-dcnode-id="5489" href="#cite_note-Lereah_hard_landing-47"><span data-dcnode-id="5490" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5487" instrument_node="">
</span></p><p data-dcnode-id="5469"><span data-dcnode-id="5485" instrument_node="">National home sales and prices both fell dramatically again in March 2007 according to NAR data, with sales down 13% to 482,000 from the peak of 554,000 in March 2006 and the national median price falling nearly 6% to $217,000 from the peak of $230,200 in July 2006. The plunge in existing-home sales was the steepest since 1989.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5478" style="white-space:nowrap;"><span data-dcnode-id="5484" instrument_node="">[</span><i data-dcnode-id="5480"><a data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5482" title="This claim needs references to reliable sources. (May 2008)"><span data-dcnode-id="5483" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5479" instrument_node="">]</span></sup><span data-dcnode-id="5477" instrument_node=""> The new home market also suffered. The biggest year over year drop in median home prices since 1970 occurred in April 2007. Median prices for new homes fell 10.9 percent according to the </span><a class="mw-redirect" data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Department_of_Commerce" title="U.S. Department of Commerce"><span data-dcnode-id="5476" instrument_node="">U.S. Department of Commerce</span></a><span data-dcnode-id="5474" instrument_node="">.</span><sup class="reference" data-dcnode-id="5471" id="cite_ref-msnbc20070524_48-0"><a data-dcnode-id="5472" href="#cite_note-msnbc20070524-48"><span data-dcnode-id="5473" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5470" instrument_node="">
</span></p><p data-dcnode-id="5444"><span data-dcnode-id="5468" instrument_node="">Based on slumping sales and prices in August 2006, economist </span><a data-dcnode-id="5466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nouriel_Roubini" title="Nouriel Roubini"><span data-dcnode-id="5467" instrument_node="">Nouriel Roubini</span></a><span data-dcnode-id="5465" instrument_node=""> warned that the housing sector was in "free fall" and would derail the rest of the economy, causing a </span><a data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recession" title="Recession"><span data-dcnode-id="5464" instrument_node="">recession</span></a><span data-dcnode-id="5462" instrument_node=""> in 2007.</span><sup class="reference" data-dcnode-id="5459" id="cite_ref-Roubini_free_fall_49-0"><a data-dcnode-id="5460" href="#cite_note-Roubini_free_fall-49"><span data-dcnode-id="5461" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5458" instrument_node=""> </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stiglitz" title="Joseph Stiglitz"><span data-dcnode-id="5457" instrument_node="">Joseph Stiglitz</span></a><span data-dcnode-id="5455" instrument_node="">, winner of the </span><a class="mw-redirect" data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Sweden_Prize_in_Economic_Sciences_in_Memory_of_Alfred_Nobel" title="Bank of Sweden Prize in Economic Sciences in Memory of Alfred Nobel"><span data-dcnode-id="5454" instrument_node="">Nobel Prize in economics</span></a><span data-dcnode-id="5452" instrument_node=""> in 2001, agreed, saying that the U.S. might enter a </span><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recession" title="Recession"><span data-dcnode-id="5451" instrument_node="">recession</span></a><span data-dcnode-id="5449" instrument_node=""> as house prices declined.</span><sup class="reference" data-dcnode-id="5446" id="cite_ref-50"><a data-dcnode-id="5447" href="#cite_note-50"><span data-dcnode-id="5448" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5445" instrument_node=""> The extent to which the economic slowdown, or possible recession, would last depended in large part on the resiliency of the U.S. consumer spending, which made up approximately 70% of the US$13.7 trillion economy. The evaporation of the wealth effect amid the current housing downturn could negatively affect the consumer confidence and provide further headwind for the U.S. economy and that of the rest of the world.
</span></p><p data-dcnode-id="5429"><span data-dcnode-id="5443" instrument_node="">The </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="5442" instrument_node="">World Bank</span></a><span data-dcnode-id="5440" instrument_node=""> lowered the global economic growth rate due to a housing slowdown in the United States, but it did not believe that the U.S. housing malaise would further spread to the rest of the world. The </span><a class="mw-redirect" data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Reserve_Board" title="Federal Reserve Board"><span data-dcnode-id="5439" instrument_node="">Fed</span></a><span data-dcnode-id="5437" instrument_node=""> chairman </span><a class="mw-redirect" data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Bernanke" title="Benjamin Bernanke"><span data-dcnode-id="5436" instrument_node="">Benjamin Bernanke</span></a><span data-dcnode-id="5434" instrument_node=""> said in October 2006 that there was currently a "substantial correction" going on in the housing market and that the decline of residential housing construction was one of the "major drags that is causing the economy to slow"; he predicted that the correcting market would decrease U.S. economic growth by about one percent in the second half of 2006 and remain a drag on expansion into 2007.</span><sup class="reference" data-dcnode-id="5431" id="cite_ref-51"><a data-dcnode-id="5432" href="#cite_note-51"><span data-dcnode-id="5433" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5430" instrument_node="">
</span></p><p data-dcnode-id="5407"><span data-dcnode-id="5428" instrument_node="">Others speculated on the negative impact of the retirement of the </span><a class="mw-redirect" data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baby_Boom" title="Baby Boom"><span data-dcnode-id="5427" instrument_node="">Baby Boom</span></a><span data-dcnode-id="5425" instrument_node=""> generation and the relative cost to rent on the declining housing market.</span><sup class="reference" data-dcnode-id="5422" id="cite_ref-52"><a data-dcnode-id="5423" href="#cite_note-52"><span data-dcnode-id="5424" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="5419" id="cite_ref-NYTEditorial20060905_53-0"><a data-dcnode-id="5420" href="#cite_note-NYTEditorial20060905-53"><span data-dcnode-id="5421" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5418" instrument_node=""> In many parts of the United States, it was significantly cheaper to rent the same property than to purchase it; the national </span><a data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Median" title="Median"><span data-dcnode-id="5417" instrument_node="">median</span></a><span data-dcnode-id="5415" instrument_node=""> mortgage payment is $1,687 per month, nearly twice the </span><a data-dcnode-id="5413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Median" title="Median"><span data-dcnode-id="5414" instrument_node="">median</span></a><span data-dcnode-id="5412" instrument_node=""> rent payment of $868 per month.</span><sup class="reference" data-dcnode-id="5409" id="cite_ref-USAT_rent_54-0"><a data-dcnode-id="5410" href="#cite_note-USAT_rent-54"><span data-dcnode-id="5411" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5408" instrument_node="">
</span></p><span data-dcnode-id="5406" instrument_node="">
</span><h2 data-dcnode-id="5395"><span data-dcnode-id="5405" id="Major_downturn_and_subprime_mortgage_collapse.2C_2007"></span><span class="mw-headline" data-dcnode-id="5403" id="Major_downturn_and_subprime_mortgage_collapse,_2007"><span data-dcnode-id="5404" instrument_node="">Major downturn and subprime mortgage collapse, 2007</span></span><span class="mw-editsection" data-dcnode-id="5396"><span class="mw-editsection-bracket" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">[</span></span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUnited_States_housing_market_correction%26action%3Dedit%26section%3D4" title="Edit section: Major downturn and subprime mortgage collapse, 2007"><span data-dcnode-id="5400" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5394" instrument_node="">
