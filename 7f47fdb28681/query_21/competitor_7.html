</span><div class="thumb tright" data-dcnode-id="5329"><div class="thumbinner" data-dcnode-id="5330" style="width:352px;"><a class="image" data-dcnode-id="5336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASales_Prices_of_New_Houses_Sold_in_the_United_States.png"><img alt="" class="thumbimage" data-dcnode-id="5337" data-file-height="461" data-file-width="794" decoding="async" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sales_Prices_of_New_Houses_Sold_in_the_United_States.png/350px-Sales_Prices_of_New_Houses_Sold_in_the_United_States.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sales_Prices_of_New_Houses_Sold_in_the_United_States.png/525px-Sales_Prices_of_New_Houses_Sold_in_the_United_States.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sales_Prices_of_New_Houses_Sold_in_the_United_States.png/700px-Sales_Prices_of_New_Houses_Sold_in_the_United_States.png 2x" width="350"></a><span data-dcnode-id="5335" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5331"><div class="magnify" data-dcnode-id="5333"><a class="internal" data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASales_Prices_of_New_Houses_Sold_in_the_United_States.png" title="Enlarge"></a></div><span data-dcnode-id="5332" instrument_node="">Sales prices of homes sold 2002–2010.</span></div></div></div><span data-dcnode-id="5328" instrument_node="">
</span><p data-dcnode-id="5320"><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Economic_Advisers" title="Council of Economic Advisers"><span data-dcnode-id="5327" instrument_node="">The White House Council of Economic Advisers</span></a><span data-dcnode-id="5325" instrument_node=""> lowered its forecast for U.S. economic growth in 2008 from 3.1 per cent to 2.7 per cent and forecast higher unemployment, reflecting the turmoil in the credit and residential real-estate markets. The Bush Administration economic advisers also revised their unemployment outlook and predicted the unemployment rate could rise slightly above 5 per cent, up from the prevailing unemployment rate of 4.6 per cent.</span><sup class="reference" data-dcnode-id="5322" id="cite_ref-57"><a data-dcnode-id="5323" href="#cite_note-57"><span data-dcnode-id="5324" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5321" instrument_node="">
</span></p><p data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">The appreciation of home values far exceeded the income growth of many of these homebuyers, pushing them to leverage themselves beyond their means. They borrowed even more money in order to purchase homes whose cost was much greater than their ability to meet their mortgage obligations. Many of these homebuyers took out adjustable-rate mortgages during the period of low interest rates in order to purchase the home of their dreams. Initially, they were able to meet their mortgage obligations thanks to the low "teaser" rates being charged in the early years of the mortgage.
</span></p><p data-dcnode-id="5313"><span data-dcnode-id="5317" instrument_node="">As the </span><a data-dcnode-id="5315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Reserve_Bank" title="Federal Reserve Bank"><span data-dcnode-id="5316" instrument_node="">Federal Reserve Bank</span></a><span data-dcnode-id="5314" instrument_node=""> applied its monetary contraction policy in 2005, many homeowners were stunned when their adjustable-rate mortgages began to reset to much higher rates in mid-2007 and their monthly payments jumped far above their ability to meet the monthly mortgage payments. Some homeowners began defaulting on their mortgages in mid-2007, and the cracks in the U.S. housing foundation became apparent.
</span></p><span data-dcnode-id="5312" instrument_node="">
</span><h3 data-dcnode-id="5302"><span class="mw-headline" data-dcnode-id="5310" id="Subprime_mortgage_industry_collapse"><span data-dcnode-id="5311" instrument_node="">Subprime mortgage industry collapse</span></span><span class="mw-editsection" data-dcnode-id="5303"><span class="mw-editsection-bracket" data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">[</span></span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUnited_States_housing_market_correction%26action%3Dedit%26section%3D5" title="Edit section: Subprime mortgage industry collapse"><span data-dcnode-id="5307" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5301" instrument_node="">
</span><link data-dcnode-id="5300" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5296" role="note"><span data-dcnode-id="5299" instrument_node="">Main article: </span><a data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_mortgage_crisis" title="Subprime mortgage crisis"><span data-dcnode-id="5298" instrument_node="">Subprime mortgage crisis</span></a></div><span data-dcnode-id="5295" instrument_node="">
</span><p data-dcnode-id="5267"><span data-dcnode-id="5294" instrument_node="">In March 2007, the United States' </span><a data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_lending" title="Subprime lending"><span data-dcnode-id="5293" instrument_node="">subprime</span></a><span data-dcnode-id="5291" instrument_node=""> mortgage industry </span><a data-dcnode-id="5289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_mortgage_crisis" title="Subprime mortgage crisis"><span data-dcnode-id="5290" instrument_node="">collapsed</span></a><span data-dcnode-id="5288" instrument_node=""> due to higher-than-expected home </span><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreclosure" title="Foreclosure"><span data-dcnode-id="5287" instrument_node="">foreclosure</span></a><span data-dcnode-id="5285" instrument_node=""> rates, with more than 25 subprime lenders declaring bankruptcy, announcing significant losses, or putting themselves up for sale.</span><sup class="reference" data-dcnode-id="5282" id="cite_ref-BW_mortgage_meltdown_58-0"><a data-dcnode-id="5283" href="#cite_note-BW_mortgage_meltdown-58"><span data-dcnode-id="5284" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5281" instrument_node=""> The stock of the country's largest subprime lender, </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Century_Financial" title="New Century Financial"><span data-dcnode-id="5280" instrument_node="">New Century Financial</span></a><span data-dcnode-id="5278" instrument_node="">, plunged 84% amid </span><a class="mw-redirect" data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_Department_of_Justice" title="US Department of Justice"><span data-dcnode-id="5277" instrument_node="">Justice Department</span></a><span data-dcnode-id="5275" instrument_node=""> investigations, before ultimately filing for </span><a class="mw-redirect" data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chapter_11" title="Chapter 11"><span data-dcnode-id="5274" instrument_node="">Chapter 11</span></a><span data-dcnode-id="5272" instrument_node=""> bankruptcy on 2&nbsp;April 2007 with liabilities exceeding $100 million.</span><sup class="reference" data-dcnode-id="5269" id="cite_ref-59"><a data-dcnode-id="5270" href="#cite_note-59"><span data-dcnode-id="5271" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5268" instrument_node="">
</span></p><p data-dcnode-id="5246"><span data-dcnode-id="5266" instrument_node="">
The manager of the world's largest bond fund </span><a data-dcnode-id="5264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PIMCO" title="PIMCO"><span data-dcnode-id="5265" instrument_node="">PIMCO</span></a><span data-dcnode-id="5263" instrument_node="">, warned in June 2007 that the </span><a data-dcnode-id="5261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_mortgage_crisis" title="Subprime mortgage crisis"><span data-dcnode-id="5262" instrument_node="">subprime mortgage crisis</span></a><span data-dcnode-id="5260" instrument_node=""> was not an isolated event and would eventually take a toll on the economy and impact the impaired prices of homes.</span><sup class="reference" data-dcnode-id="5257" id="cite_ref-CNN_PIMCO_not_isolated_60-0"><a data-dcnode-id="5258" href="#cite_note-CNN_PIMCO_not_isolated-60"><span data-dcnode-id="5259" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5256" instrument_node=""> </span><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_H._Gross" title="Bill H. Gross"><span data-dcnode-id="5255" instrument_node="">Bill Gross</span></a><span data-dcnode-id="5253" instrument_node="">, "a most reputable financial guru", sarcastically and ominously criticized the </span><a class="mw-redirect" data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moody%2527s" title="Moody's"><span data-dcnode-id="5252" instrument_node="">credit ratings</span></a><span data-dcnode-id="5250" instrument_node=""> of the mortgage-based </span><a data-dcnode-id="5248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collateralized_debt_obligation" title="Collateralized debt obligation"><span data-dcnode-id="5249" instrument_node="">CDOs</span></a><span data-dcnode-id="5247" instrument_node=""> now facing collapse: </span></p><blockquote data-dcnode-id="5221"><p data-dcnode-id="5222"><span data-dcnode-id="5245" instrument_node="">AAA? You were wooed Mr.&nbsp;</span><a class="mw-redirect" data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moody%2527s" title="Moody's"><span data-dcnode-id="5244" instrument_node="">Moody's</span></a><span data-dcnode-id="5242" instrument_node=""> and Mr.&nbsp;</span><a class="mw-redirect" data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_%2526_Poor%2527s" title="Standard &amp; Poor's"><span data-dcnode-id="5241" instrument_node="">Poor's</span></a><span data-dcnode-id="5239" instrument_node="">, by the makeup, those six-inch hooker heels, and a "</span><a class="mw-redirect" data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tramp_stamp" title="Tramp stamp"><span data-dcnode-id="5238" instrument_node="">tramp stamp</span></a><span data-dcnode-id="5236" instrument_node="">." Many of these good looking girls are not high-class assets worth 100 cents on the dollar. ... And sorry Ben, but derivatives are a two-edged sword. Yes, they diversify risk and direct it away from the banking system into the eventual hands of unknown buyers, but they multiply leverage like the Andromeda strain. When interest rates go up, the Petri dish turns from a benign experiment in financial engineering to a destructive virus because the cost of that leverage ultimately reduces the price of assets. Houses anyone? ... AAAs? [T]he point is that there are hundreds of billions of dollars of this toxic waste and whether or not they're in </span><a data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collateralized_debt_obligation" title="Collateralized debt obligation"><span data-dcnode-id="5235" instrument_node="">CDOs</span></a><span data-dcnode-id="5233" instrument_node=""> or </span><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="5232" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="5230" instrument_node=""> hedge funds matters only to the extent of the timing of the unwind. [T]he subprime crisis is not an isolated event and it won't be contained by a few days of headlines in </span><i data-dcnode-id="5227"><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="5229" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="5226" instrument_node=""> ... The flaw lies in the homes that were financed with cheap and in some cases gratuitous money in 2004, 2005, and 2006. Because while the Bear hedge funds are now primarily history, those millions and millions of homes are not. They're not going anywhere ... except for their mortgages that is. Mortgage payments are going up, up, and up ... and so are delinquencies and defaults. A recent research piece by Bank of America estimates that approximately $500 billion of adjustable rate mortgages are scheduled to reset skyward in 2007 by an average of over 200 basis points. 2008 holds even more surprises with nearly $700 billion ARMS subject to reset, nearly ¾ of which are subprimes ... This problem—aided and abetted by Wall Street—ultimately resides in America's heartland, with millions and millions of overpriced homes and asset-backed collateral with a different address—Main Street.</span><sup class="reference" data-dcnode-id="5223" id="cite_ref-RGE_tramp_stamp_61-0"><a data-dcnode-id="5224" href="#cite_note-RGE_tramp_stamp-61"><span data-dcnode-id="5225" instrument_node="">[61]</span></a></sup></p></blockquote><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5180"><span data-dcnode-id="5219" instrument_node="">Financial analysts predicted that the subprime mortgage collapse would result in earnings reductions for large </span><a data-dcnode-id="5217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wall_Street" title="Wall Street"><span data-dcnode-id="5218" instrument_node="">Wall Street</span></a><span data-dcnode-id="5216" instrument_node=""> investment banks trading in </span><a data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortgage-backed_security" title="Mortgage-backed security"><span data-dcnode-id="5215" instrument_node="">mortgage-backed securities</span></a><span data-dcnode-id="5213" instrument_node="">, especially </span><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="5212" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="5210" instrument_node="">, </span><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehman_Brothers" title="Lehman Brothers"><span data-dcnode-id="5209" instrument_node="">Lehman Brothers</span></a><span data-dcnode-id="5207" instrument_node="">, </span><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goldman_Sachs" title="Goldman Sachs"><span data-dcnode-id="5206" instrument_node="">Goldman Sachs</span></a><span data-dcnode-id="5204" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merrill_Lynch" title="Merrill Lynch"><span data-dcnode-id="5203" instrument_node="">Merrill Lynch</span></a><span data-dcnode-id="5201" instrument_node="">, and </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morgan_Stanley" title="Morgan Stanley"><span data-dcnode-id="5200" instrument_node="">Morgan Stanley</span></a><span data-dcnode-id="5198" instrument_node="">.</span><sup class="reference" data-dcnode-id="5195" id="cite_ref-BW_mortgage_meltdown_58-1"><a data-dcnode-id="5196" href="#cite_note-BW_mortgage_meltdown-58"><span data-dcnode-id="5197" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5194" instrument_node=""> The solvency of two troubled </span><a data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hedge_fund" title="Hedge fund"><span data-dcnode-id="5193" instrument_node="">hedge funds</span></a><span data-dcnode-id="5191" instrument_node=""> managed by </span><a data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="5190" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="5188" instrument_node=""> was imperliled in June 2007 after </span><a class="mw-redirect" data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merrill_Lynch" title="Merrill Lynch"><span data-dcnode-id="5187" instrument_node="">Merrill Lynch</span></a><span data-dcnode-id="5185" instrument_node=""> sold off assets seized from the funds and three other banks closed out their positions with them. The Bear Stearns funds once had over $20 billion of assets, but lost billions of dollars on securities backed by subprime mortgages.</span><sup class="reference" data-dcnode-id="5182" id="cite_ref-62"><a data-dcnode-id="5183" href="#cite_note-62"><span data-dcnode-id="5184" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5181" instrument_node="">
</span></p><p data-dcnode-id="5162"><a data-dcnode-id="5178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%2526R_Block" title="H&amp;R Block"><span data-dcnode-id="5179" instrument_node="">H&amp;R Block</span></a><span data-dcnode-id="5177" instrument_node=""> reported a quarterly loss of $677 million on discontinued operations, which included subprime lender </span><a class="new" data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOption_One%26action%3Dedit%26redlink%3D1" title="Option One (page does not exist)"><span data-dcnode-id="5176" instrument_node="">Option One</span></a><span data-dcnode-id="5174" instrument_node="">, as well as writedowns, loss provisions on mortgage loans and the lower prices available for mortgages in the secondary market for mortgages. The units net asset value fell 21% to $1.1 billion as of April 30, 2007.</span><sup class="reference" data-dcnode-id="5171" id="cite_ref-63"><a data-dcnode-id="5172" href="#cite_note-63"><span data-dcnode-id="5173" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5170" instrument_node=""> The head of the mortgage industry consulting firm Wakefield Co. warned, "This is going to be a meltdown of unparalleled proportions. Billions will be lost." </span><a data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="5169" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="5167" instrument_node=""> pledged up to US$3.2 billion in loans on 22&nbsp;June 2007 to bail out one of its hedge funds that was collapsing because of bad bets on subprime mortgages.</span><sup class="reference" data-dcnode-id="5164" id="cite_ref-NYT_hedge_crisis_64-0"><a data-dcnode-id="5165" href="#cite_note-NYT_hedge_crisis-64"><span data-dcnode-id="5166" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5163" instrument_node="">
</span></p><p data-dcnode-id="5151"><a data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Schiff" title="Peter Schiff"><span data-dcnode-id="5161" instrument_node="">Peter Schiff</span></a><span data-dcnode-id="5159" instrument_node="">, president of Euro Pacific Capital, argued that if the bonds in the </span><a data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="5158" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="5156" instrument_node=""> funds were auctioned on the open market, much weaker values would be plainly revealed. Schiff added, "This would force other hedge funds to similarly mark down the value of their holdings. Is it any wonder that Wall street is pulling out the stops to avoid such a catastrophe? ... Their true weakness will finally reveal the abyss into which the housing market is about to plummet."</span><sup class="reference" data-dcnode-id="5153" id="cite_ref-65"><a data-dcnode-id="5154" href="#cite_note-65"><span data-dcnode-id="5155" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5152" instrument_node="">
</span></p><p data-dcnode-id="5138"><span data-dcnode-id="5150" instrument_node="">A </span><i data-dcnode-id="5147"><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="5149" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="5146" instrument_node=""> report connected the hedge fund crisis with </span><a data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_housing_bubble%23Interest-only%2C_adjustable_rate%2C_and_stated_income_mortgages" title="United States housing bubble"><span data-dcnode-id="5145" instrument_node="">lax lending standards</span></a><span data-dcnode-id="5143" instrument_node="">: "The crisis this week from the near collapse of two hedge funds managed by Bear Stearns stems directly from the slumping housing market and the fallout from loose lending practices that showered money on people with weak, or subprime, credit, leaving many of them struggling to stay in their homes."</span><sup class="reference" data-dcnode-id="5140" id="cite_ref-NYT_hedge_crisis_64-1"><a data-dcnode-id="5141" href="#cite_note-NYT_hedge_crisis-64"><span data-dcnode-id="5142" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5139" instrument_node="">
</span></p><p data-dcnode-id="5123"><span data-dcnode-id="5137" instrument_node="">In the wake of the mortgage industry meltdown, Senator </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chris_Dodd" title="Chris Dodd"><span data-dcnode-id="5136" instrument_node="">Chris Dodd</span></a><span data-dcnode-id="5134" instrument_node="">, Chairman of the </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate_Committee_on_Banking%2C_Housing%2C_and_Urban_Affairs" title="United States Senate Committee on Banking, Housing, and Urban Affairs"><span data-dcnode-id="5133" instrument_node="">Banking Committee</span></a><span data-dcnode-id="5131" instrument_node=""> held hearings in March 2007 and asked executives from the top five subprime mortgage companies to testify and explain their lending practices.  Dodd said, "Predatory lending practices endangered the home ownership for millions of people".</span><sup class="reference" data-dcnode-id="5128" id="cite_ref-Reuters_Dodd_66-0"><a data-dcnode-id="5129" href="#cite_note-Reuters_Dodd-66"><span data-dcnode-id="5130" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5127" instrument_node=""> Moreover, Democratic senators such as Senator </span><a class="mw-redirect" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Schumer" title="Charles Schumer"><span data-dcnode-id="5126" instrument_node="">Charles Schumer</span></a><span data-dcnode-id="5124" instrument_node=""> of New York were proposing a federal government bailout of subprime borrowers in order to save homeowners from losing their residences. Opponents of such proposal asserted that government bailout of subprime borrowers was not in the best interests of the U.S. economy because it would set a bad precedent, create a moral hazard, and worsen the speculation problem in the housing market.
</span></p><span data-dcnode-id="5122" instrument_node="">
</span><p data-dcnode-id="5108"><a class="mw-redirect" data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lou_Ranieri" title="Lou Ranieri"><span data-dcnode-id="5121" instrument_node="">Lou Ranieri</span></a><span data-dcnode-id="5119" instrument_node=""> of </span><a data-dcnode-id="5117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salomon_Brothers" title="Salomon Brothers"><span data-dcnode-id="5118" instrument_node="">Salomon Brothers</span></a><span data-dcnode-id="5116" instrument_node="">, inventor of the mortgage-backed securities market in the 1970s, warned of the future impact of mortgage defaults: "This is the leading edge of the storm. ... If you think this is bad, imagine what it's going to be like in the middle of the crisis." In his opinion, more than $100 billion of home loans are likely to default when the problems in the subprime industry appear in the prime mortgage markets.</span><sup class="reference" data-dcnode-id="5113" id="cite_ref-MSN_real_estate_freeze_67-0"><a data-dcnode-id="5114" href="#cite_note-MSN_real_estate_freeze-67"><span data-dcnode-id="5115" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5112" instrument_node=""> Fed Chairman </span><a data-dcnode-id="5110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alan_Greenspan" title="Alan Greenspan"><span data-dcnode-id="5111" instrument_node="">Alan Greenspan</span></a><span data-dcnode-id="5109" instrument_node=""> praised the rise of the subprime mortgage industry and the tools used to assess credit-worthiness in an April 2005 speech: </span></p><blockquote data-dcnode-id="5102"><p data-dcnode-id="5103"><span data-dcnode-id="5107" instrument_node="">Innovation has brought about a multitude of new products, such as subprime loans and niche credit programs for immigrants. Such developments are representative of the market responses that have driven the financial services industry throughout the history of our country ... With these advances in technology, lenders have taken advantage of credit-scoring models and other techniques for efficiently extending credit to a broader spectrum of consumers. ... Where once more-marginal applicants would simply have been denied credit, lenders are now able to quite efficiently judge the risk posed by individual applicants and to price that risk appropriately. These improvements have led to rapid growth in subprime mortgage lending; indeed, today subprime mortgages account for roughly 10 percent of the number of all mortgages outstanding, up from just 1 or 2 percent in the early 1990s.</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-68"><a data-dcnode-id="5105" href="#cite_note-68"><span data-dcnode-id="5106" instrument_node="">[68]</span></a></sup></p></blockquote><span data-dcnode-id="5101" instrument_node="">
</span><p data-dcnode-id="5092"><span data-dcnode-id="5100" instrument_node="">Because of these remarks, along with his encouragement for the use of adjustable-rate mortgages, Greenspan was criticized for his role in the rise of the housing bubble and the subsequent problems in the mortgage industry.</span><sup class="reference" data-dcnode-id="5097" id="cite_ref-69"><a data-dcnode-id="5098" href="#cite_note-69"><span data-dcnode-id="5099" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="5094" id="cite_ref-70"><a data-dcnode-id="5095" href="#cite_note-70"><span data-dcnode-id="5096" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5093" instrument_node="">
</span></p><span data-dcnode-id="5091" instrument_node="">
</span><h2 data-dcnode-id="5081"><span class="mw-headline" data-dcnode-id="5089" id="Alt-A_mortgage_problems"><span data-dcnode-id="5090" instrument_node="">Alt-A mortgage problems</span></span><span class="mw-editsection" data-dcnode-id="5082"><span class="mw-editsection-bracket" data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">[</span></span><a data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUnited_States_housing_market_correction%26action%3Dedit%26section%3D6" title="Edit section: Alt-A mortgage problems"><span data-dcnode-id="5086" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5071"><span data-dcnode-id="5079" instrument_node="">Subprime and </span><a data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alt-A" title="Alt-A"><span data-dcnode-id="5078" instrument_node="">Alt-A</span></a><span data-dcnode-id="5076" instrument_node=""> loans account for about 21 percent of loans outstanding and 39 percent of mortgages made in 2006.</span><sup class="reference" data-dcnode-id="5073" id="cite_ref-NYT_Alt-A_loans_71-0"><a data-dcnode-id="5074" href="#cite_note-NYT_Alt-A_loans-71"><span data-dcnode-id="5075" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5072" instrument_node="">
</span></p><p data-dcnode-id="5058"><span data-dcnode-id="5070" instrument_node="">In April 2007, financial problems similar to the subprime mortgages began to appear with Alt-A loans made to homeowners who were thought to be less risky.</span><sup class="reference" data-dcnode-id="5067" id="cite_ref-NYT_Alt-A_loans_71-1"><a data-dcnode-id="5068" href="#cite_note-NYT_Alt-A_loans-71"><span data-dcnode-id="5069" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5066" instrument_node=""> </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Home_Mortgage" title="American Home Mortgage"><span data-dcnode-id="5065" instrument_node="">American Home Mortgage</span></a><span data-dcnode-id="5063" instrument_node=""> said that it would earn less and pay out a smaller dividend to its shareholders because it was being asked to buy back and write down the value of Alt-A loans made to borrowers with decent credit; causing company stocks to tumble 15.2 percent. The delinquency rate for Alt-A mortgages has been rising in 2007.</span><sup class="reference" data-dcnode-id="5060" id="cite_ref-NYT_Alt-A_loans_71-2"><a data-dcnode-id="5061" href="#cite_note-NYT_Alt-A_loans-71"><span data-dcnode-id="5062" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5059" instrument_node="">
</span></p><p data-dcnode-id="5042"><span data-dcnode-id="5057" instrument_node="">In June 2007, </span><a class="mw-redirect" data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_%2526_Poor%2527s" title="Standard &amp; Poor's"><span data-dcnode-id="5056" instrument_node="">Standard &amp; Poor's</span></a><span data-dcnode-id="5054" instrument_node=""> warned that U.S. homeowners with good credit are increasingly falling behind on mortgage payments, an indication that lenders have been offering higher risk loans outside the </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_lending" title="Subprime lending"><span data-dcnode-id="5053" instrument_node="">subprime market</span></a><span data-dcnode-id="5051" instrument_node="">; they said that rising late payments and defaults on Alt-A mortgages made in 2006 are "disconcerting" and delinquent borrowers appear to be "finding it increasingly difficult to refinance" or catch up on their payments.</span><sup class="reference" data-dcnode-id="5048" id="cite_ref-autogenerated1_72-0"><a data-dcnode-id="5049" href="#cite_note-autogenerated1-72"><span data-dcnode-id="5050" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5047" instrument_node=""> Late payments of at least 90 days and defaults on 2006 Alt-A mortgages have increased to 4.21 percent, up from 1.59 percent for 2005 mortgages and 0.81 percent for 2004, indicating that "subprime carnage is now spreading to near prime mortgages".</span><sup class="reference" data-dcnode-id="5044" id="cite_ref-RGE_tramp_stamp_61-1"><a data-dcnode-id="5045" href="#cite_note-RGE_tramp_stamp-61"><span data-dcnode-id="5046" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5043" instrument_node="">
</span></p><span data-dcnode-id="5041" instrument_node="">
</span><h2 data-dcnode-id="5031"><span class="mw-headline" data-dcnode-id="5039" id="COVID-19_impact"><span data-dcnode-id="5040" instrument_node="">COVID-19 impact</span></span><span class="mw-editsection" data-dcnode-id="5032"><span class="mw-editsection-bracket" data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">[</span></span><a data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUnited_States_housing_market_correction%26action%3Dedit%26section%3D7" title="Edit section: COVID-19 impact"><span data-dcnode-id="5036" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5030" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5029" instrument_node="">The </span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="5028" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="5026" instrument_node=""> raised the spectre of a U.S. housing market collapse due to "“The confluence of high unemployment and the end of the forbearance measures."</span><sup class="reference" data-dcnode-id="5023" id="cite_ref-73"><a data-dcnode-id="5024" href="#cite_note-73"><span data-dcnode-id="5025" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5022" instrument_node=""> 
Regional weakness in the spring housing market in </span><a data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco" title="San Francisco"><span data-dcnode-id="5021" instrument_node="">San Francisco</span></a><span data-dcnode-id="5019" instrument_node=""> was attributed to the pandemic, as shelter-in-place orders went into effect, and at a time the market would usually be rising.</span><sup class="reference" data-dcnode-id="5016" id="cite_ref-74"><a data-dcnode-id="5017" href="#cite_note-74"><span data-dcnode-id="5018" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5015" instrument_node="">
</span></p><span data-dcnode-id="5013" instrument_node="">
</span><h2 data-dcnode-id="5003"><span class="mw-headline" data-dcnode-id="5011" id="Foreclosure_rates_increase"><span data-dcnode-id="5012" instrument_node="">Foreclosure rates increase</span></span><span class="mw-editsection" data-dcnode-id="5004"><span class="mw-editsection-bracket" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">[</span></span><a data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUnited_States_housing_market_correction%26action%3Dedit%26section%3D8" title="Edit section: Foreclosure rates increase"><span data-dcnode-id="5008" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5002" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4990"><div class="thumbinner" data-dcnode-id="4991" style="width:252px;"><a class="image" data-dcnode-id="5000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AForeclosedhome.JPG"><img alt="" class="thumbimage" data-dcnode-id="5001" data-file-height="480" data-file-width="640" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Foreclosedhome.JPG/250px-Foreclosedhome.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Foreclosedhome.JPG/375px-Foreclosedhome.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Foreclosedhome.JPG/500px-Foreclosedhome.JPG 2x" width="250"></a><span data-dcnode-id="4999" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4992"><div class="magnify" data-dcnode-id="4997"><a class="internal" data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AForeclosedhome.JPG" title="Enlarge"></a></div><span data-dcnode-id="4996" instrument_node="">House in </span><a data-dcnode-id="4994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salinas%2C_California" title="Salinas, California"><span data-dcnode-id="4995" instrument_node="">Salinas, California</span></a><span data-dcnode-id="4993" instrument_node=""> under foreclosure, following the bursting of the U.S. real estate bubble.</span></div></div></div><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4980"><span data-dcnode-id="4988" instrument_node="">The 30-year mortgage rates increased by more than a half a percentage point to 6.74 percent during May–June 2007,</span><sup class="reference" data-dcnode-id="4985" id="cite_ref-75"><a data-dcnode-id="4986" href="#cite_note-75"><span data-dcnode-id="4987" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4984" instrument_node=""> affecting borrowers with the best credit just as a crackdown in subprime lending standards limits the pool of qualified buyers. The national median home price is poised for its first annual decline since the </span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="4983" instrument_node="">Great Depression</span></a><span data-dcnode-id="4981" instrument_node="">, and the NAR reported that supply of unsold homes is at a record 4.2 million.
</span></p><span data-dcnode-id="4979" instrument_node="">
</span><p data-dcnode-id="4966"><a data-dcnode-id="4977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goldman_Sachs" title="Goldman Sachs"><span data-dcnode-id="4978" instrument_node="">Goldman Sachs</span></a><span data-dcnode-id="4976" instrument_node=""> and </span><a data-dcnode-id="4974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear_Stearns" title="Bear Stearns"><span data-dcnode-id="4975" instrument_node="">Bear Stearns</span></a><span data-dcnode-id="4973" instrument_node="">, respectively the world's largest securities firm and largest underwriter of mortgage-backed securities in 2006, said in June 2007 that rising foreclosures reduced their earnings and the loss of billions from bad investments in the </span><a class="mw-redirect" data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_mortgage" title="Subprime mortgage"><span data-dcnode-id="4972" instrument_node="">subprime market</span></a><span data-dcnode-id="4970" instrument_node=""> imperiled the solvency of several </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hedge_fund" title="Hedge fund"><span data-dcnode-id="4969" instrument_node="">hedge funds</span></a><span data-dcnode-id="4967" instrument_node="">. Mark Kiesel, executive vice president of a California-based Pacific Investment Management Co. said, </span></p><blockquote data-dcnode-id="4960"><p data-dcnode-id="4961"><span data-dcnode-id="4965" instrument_node="">It's a blood bath. ... We're talking about a two- to three-year downturn that will take a whole host of characters with it, from job creation to consumer confidence. Eventually it will take the stock market and corporate profit.</span><sup class="reference" data-dcnode-id="4962" id="cite_ref-Bloomberg_bloodbath_76-0"><a data-dcnode-id="4963" href="#cite_note-Bloomberg_bloodbath-76"><span data-dcnode-id="4964" instrument_node="">[76]</span></a></sup></p></blockquote><p data-dcnode-id="4951"><span data-dcnode-id="4959" instrument_node=""> According to Donald Burnette of Brightgreen Homeloans in Florida (one of the states hit hardest by the bursting housing bubble) the corresponding loss in equity from the drop in housing values caused new problems. "It is keeping even borrowers with good credit and solid resources from refinancing to much better terms. Even with tighter lending restrictions and the disappearance of subprime programs, there are many borrowers who would indeed qualify as "A" borrowers who can't refinance as they no longer have the equity in their homes that they had in 2005 or 2006. They will have to wait for the market to recover to refinance to the terms they deserve, and that could be years, or even a decade." It is foreseen, especially in </span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California" title="California"><span data-dcnode-id="4958" instrument_node="">California</span></a><span data-dcnode-id="4956" instrument_node="">, that this recovery process could take until 2014 or later.</span><sup class="reference" data-dcnode-id="4953" id="cite_ref-Bloomberg_bloodbath_76-1"><a data-dcnode-id="4954" href="#cite_note-Bloomberg_bloodbath-76"><span data-dcnode-id="4955" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4952" instrument_node="">
</span></p><p data-dcnode-id="4939"><span data-dcnode-id="4950" instrument_node="">A 2012 report from the </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Michigan" title="University of Michigan"><span data-dcnode-id="4949" instrument_node="">University of Michigan</span></a><span data-dcnode-id="4947" instrument_node=""> analyzed data from the Panel Study of Income Dynamics (PSID), which surveyed roughly 9,000 representative households in 2009 and 2011. The data seemed to indicate that, while conditions were still difficult, in some ways the crisis was easing: Over the period studied, the percentage of families behind on mortgage payments fell from 2.2 to 1.9; homeowners who thought it was "very likely or somewhat likely" that they would fall behind on payments fell from 6% to 4.6% of families. On the other hand, family's financial liquidity had decreased: "As of 2009, 18.5% of families had no liquid assets, and by 2011 this had grown to 23.4% of families."</span><sup class="reference" data-dcnode-id="4944" id="cite_ref-77"><a data-dcnode-id="4945" href="#cite_note-77"><span data-dcnode-id="4946" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="4941" id="cite_ref-78"><a data-dcnode-id="4942" href="#cite_note-78"><span data-dcnode-id="4943" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4940" instrument_node="">

ode="">the original</span></a><span data-dcnode-id="2680" instrument_node=""> on October 13, 2007.</span></cite><span class="Z3988" data-dcnode-id="2678" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=Forbes&amp;rft.atitle=Realtors%27+Lereah%3A+Housing+To+Make+%27Soft+Landing%27&amp;rft.date=2006-01-01&amp;rft.aulast=Lereah&amp;rft.aufirst=David&amp;rft_id=https%3A%2F%2Fwww.forbes.com%2Ffacesinthenews%2F2006%2F01%2F25%2Fexisting-home-sales-cx_gl_0125autofacescan08.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AUnited+States+housing+market+correction"></span></span><span data-dcnode-id="2676" instrument_node="">

</span><li data-dcnode-id="2457" id="cite_note-52"><span class="mw-cite-backlink" data-dcnode-id="2474"><b data-dcnode-id="2475"><a aria-label="Jump up" data-dcnode-id="2476" href="#cite_ref-52" title="Jump up"><span data-dcnode-id="2477" instrument_node="">^</span></a></b></span><span data-dcnode-id="2473" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2459"><link data-dcnode-id="2472" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation news cs1" data-dcnode-id="2461" id="CITEREFFletcher2006"><span data-dcnode-id="2471" instrument_node="">Fletcher, June (19 July 2006). </span><a class="external text" data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.realestatejournal.com/buysell/markettrends/20060619-fletcher.html" rel="nofollow"><span data-dcnode-id="2470" instrument_node="">"Slowing Sales, Baby Boomers Spur a Glut of McMansions"</span></a><span data-dcnode-id="2468" instrument_node="">. </span><i data-dcnode-id="2465"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wall_Street_Journal" title="The Wall Street Journal"><span data-dcnode-id="2467" instrument_node="">The Wall Street Journal</span></a></i><span data-dcnode-id="2464" instrument_node="">. </span><q data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">The golden age of McMansions may be coming to an end. These oversized homes—characterized by sprawling layouts on small lots, and built in cookie-cutter style by big developers—fueled much of the housing boom. But thanks to rising energy and mortgage costs, shrinking families and a growing number of retirement-age baby boomers set on downsizing, there are signs of an emerging glut. ... Some boomers in their late 50s are counting on selling their huge houses to help fund retirement. Yet a number of factors are weighing down demand. With the rise in home heating and cooling costs, McMansions are increasingly expensive to maintain. ... The overall slump in the housing market also is crimping big-home sales. ... Meantime, the jump in interest rates has put the cost of a big house out of more people's reach.</span></q></cite><span class="Z3988" data-dcnode-id="2460" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=The+Wall+Street+Journal&amp;rft.atitle=Slowing+Sales%2C+Baby+Boomers+Spur+a+Glut+of+McMansions&amp;rft.date=2006-07-19&amp;rft.aulast=Fletcher&amp;rft.aufirst=June&amp;rft_id=http%3A%2F%2Fwww.realestatejournal.com%2Fbuysell%2Fmarkettrends%2F20060619-fletcher.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AUnited+States+housing+market+correction"></span></span><span data-dcnode-id="2458" instrument_node="">

 services industry throughout the history of our country ... </span><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node=""> With these advances in technology, lenders have taken advantage of credit-scoring models and other techniques for efficiently extending credit to a broader spectrum of consumers. The widespread adoption of these models has reduced the costs of evaluating the creditworthiness of borrowers, and in competitive markets cost reductions tend to be passed through to borrowers. Where once more-marginal applicants would simply have been denied credit, lenders are now able to quite efficiently judge the risk posed by individual applicants and to price that risk appropriately. These improvements have led to rapid growth in subprime mortgage lending; indeed, today subprime mortgages account for roughly 10 percent of the number of all mortgages outstanding, up from just 1 or 2 percent in the early 1990s.</span></q></cite><span class="Z3988" data-dcnode-id="2047" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=Federal+Reserve+Board&amp;rft.atitle=Remarks+by+Chairman+Alan+Greenspan%2C+Consumer+Finance+At+the+Federal+Reserve+System%27s+Fourth+Annual+Community+Affairs+Research+Conference%2C+Washington%2C+D.C.&amp;rft.date=2005-04-04&amp;rft.aulast=Greenspan&amp;rft.aufirst=Alan&amp;rft_id=http%3A%2F%2Fwww.federalreserve.gov%2FBoardDocs%2Fspeeches%2F2005%2F20050408%2Fdefault.htm&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AUnited+States+housing+market+correction"></span></span><span data-dcnode-id="2045" instrument_node="">

n unabashed cheerleader for the excesses of an increasingly asset-dependent U.S. economy. I fear history will not judge the Maestro's legacy kindly.</span></q></cite><span class="Z3988" data-dcnode-id="2023" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=Morgan+Stanley&amp;rft.atitle=The+Great+Unraveling&amp;rft.date=2007-03-16&amp;rft.aulast=Roach&amp;rft.aufirst=Stephen+S.&amp;rft_id=http%3A%2F%2Fwww.morganstanley.com%2Fviews%2Fgef%2Farchive%2F2007%2F20070316-Fri.html%23anchore0b0b9cc-419e-11de-a1b3-c771ef8db296&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AUnited+States+housing+market+correction"></span></span><span data-dcnode-id="2021" instrument_node="">

 data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Greenspan allowed the tech bubble to fester by first warning about irrational exuberance and then doing nothing about via either monetary policy or, better, proper regulation of the financial system while at the same time becoming the "cheerleader of the new economy". And Greenspan/Bernanke allowed the housing bubble to develop in three ways of increasing importance: first, easy Fed Funds policy (but this was a minor role); second, being asleep at the wheel (together with all the banking regulators) in regulating housing lending; third, by becoming the cheerleaders of the monstrosities that were going under the name of "financial innovations" of housing finance. Specifically, Greenspan explicitly supported in public speeches the development and growth of the risky option ARMs and other exotic mortgage innovations that allowed the subprime and near-prime toxic waste to mushroom.</span></q></cite><span class="Z3988" data-dcnode-id="1996" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=RGE+Monitor&amp;rft.atitle=Who+is+to+Blame+for+the+Mortgage+Carnage+and+Coming+Financial+Disaster%3F+Unregulated+Free+Market+Fundamentalism+Zealotry&amp;rft.date=2007-03-19&amp;rft.aulast=Roubini&amp;rft.aufirst=Nouriel&amp;rft_id=http%3A%2F%2Fwww.rgemonitor.com%2Fblog%2Froubini%2F184125&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AUnited+States+housing+market+correction"></span></span><span data-dcnode-id="1994" instrument_node="">
