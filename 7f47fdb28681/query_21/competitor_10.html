</span><p data-dcnode-id="2031"><span data-dcnode-id="2053" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2054"><u data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Operation Brock</span></u></strong></span><br data-dcnode-id="2052"><span data-dcnode-id="2051" instrument_node="">
</span><span data-dcnode-id="2049" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2050" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">
</span><span data-dcnode-id="2044" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">What UK Government proposed in their Consultation</span></strong></span><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">
</span><span data-dcnode-id="2040" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2041" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">
</span><span data-dcnode-id="2036" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2037" instrument_node="">We outlined that there may be a need for a contingency plan which would provide certain commodities the opportunity to bypass part of the Operation Brock system if queues build up.</span></span><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">
</span><span data-dcnode-id="2032" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2033" instrument_node="">We set out the government’s view that prioritisation of goods would be justifiable if 2 or more of the following criteria were met:</span></span></p><span data-dcnode-id="2030" instrument_node="">
</span><ul data-dcnode-id="2016"><span data-dcnode-id="2029" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2028" instrument_node="">the goods are highly perishable and will lose most of, or all their value, within 5 days or less (for example, without additional refrigeration, freezing or other intervention, which would not be possible)</span></span></li><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2022"><span data-dcnode-id="2023" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2024" instrument_node="">the ‘perishable’ goods concerned are live animals and would give rise to animal welfare concerns if not moved in a timely manner</span></span></li><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2018"><span data-dcnode-id="2019" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2020" instrument_node="">delays to the goods would give rise to a disproportionate economic impact on a geographical area of the UK</span></span></li><span data-dcnode-id="2017" instrument_node="">
</span></ul><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2014" instrument_node="">Based upon the criteria above, the government identified 2 sectors where a contingency to prioritise goods would be justifiable. These were single loads of live or fresh seafood products for human consumption, or of day-old chicks. These products are highly perishable and are highly dependent upon being exported through the Short Straits (as the most efficient route to the&nbsp;EU&nbsp;market, or as transit for onward movement to third countries) in a timely and financially viable fashion.&nbsp;DOCs&nbsp;are live animals and must arrive at their destination within 72 hours of hatching, to ensure compliance with animal health legislation. They cannot be fed in their vehicle and delays risk dehydration and mortality.</span></span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="2008" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Government response</span></strong></span><br data-dcnode-id="2007"><span data-dcnode-id="2006" instrument_node="">
</span><span data-dcnode-id="2004" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2005" instrument_node="">The overall response to the proposed contingency arrangements for prioritising these goods was positive, so we’ll be taking forward our proposals.</span></span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">
</span><span data-dcnode-id="2000" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2001" instrument_node="">Defra&nbsp;estimates that on average about 70&nbsp;HCVs&nbsp;a day would be carrying live or fresh seafood products or&nbsp;DOCs. In the context of the overall volumes of vehicles using the Short Straits, we consider that this is a small enough number to accommodate such arrangements. A specific route for the prioritised vehicles has been agreed with the&nbsp;KRF, with use of the contraflow past the Operation Brock queues by outbound&nbsp;HCVs&nbsp;conditional on having a ‘priority goods permit’. Using the contraflow without the requisite permit could see the&nbsp;HCV&nbsp;driver stopped and fined.</span></span><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">
</span><span data-dcnode-id="1996" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1997" instrument_node="">In summary, implementation of a prioritisation approach will work as follows:</span></span></p><span data-dcnode-id="1994" instrument_node="">
</span><ul data-dcnode-id="1976"><span data-dcnode-id="1993" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1992" instrument_node="">a driver of a prioritised&nbsp;HCV&nbsp;would need to obtain a valid&nbsp;KAP&nbsp;from the ‘Check an&nbsp;HGV’ service</span></span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1986"><span data-dcnode-id="1987" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1988" instrument_node="">they would then be instructed to travel to a Prioritisation Control Site (PCS) where the presence of a valid&nbsp;KAP&nbsp;would be confirmed. If they do not have a valid&nbsp;KAP, they’d be liable to be issued with an&nbsp;FPN&nbsp;and fine. Further guidance on the location of the&nbsp;PCS&nbsp;and the instructions on when the site is in use will be confirmed shortly</span></span></li><span data-dcnode-id="1985" instrument_node="">
</span><li data-dcnode-id="1982"><span data-dcnode-id="1983" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1984" instrument_node="">if the ‘Check an&nbsp;HGV’ service were unavailable, a manual border readiness check would also be conducted at the&nbsp;PCS</span></span></li><span data-dcnode-id="1981" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1980" instrument_node="">an&nbsp;HCV&nbsp;carrying prioritised exports that was deemed to be border ready and with a valid&nbsp;KAP, will be issued with a physical Priority Goods Permit and 2 retro-reflective stickers (one to be displayed at the front and back of the vehicle), and would be allowed to proceed down the priority route to the border, using the contraflow to bypass the Operation Brock queues</span></span></li><span data-dcnode-id="1977" instrument_node="">
</span></ul><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1973" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1974" instrument_node="">To reduce the risk of abuse, document checks and some spot checks (that is, physical inspections of the cargo of the&nbsp;HCV) would be conducted at the&nbsp;PCS&nbsp;to ensure the load is as stated, and qualifies for prioritisation.</span></span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">
</span><span data-dcnode-id="1969" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1970" instrument_node="">Those found to be abusing the system, that is, not carrying only priority goods, would be issued a £300 fine and instructed, if in possession of a valid&nbsp;KAP, to proceed via the normal, prescribed route, joining any queues that have formed</span></span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">
</span><span data-dcnode-id="1965" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1966" instrument_node="">No further commodities have been deemed to meet the criteria for prioritisation for the purpose of this contingency plan</span></span><br data-dcnode-id="1964"><span data-dcnode-id="1963" instrument_node="">
</span><span data-dcnode-id="1960" style="font-family: georgia, palatino, serif; font-size: 12pt;"><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D65fa234080%26e%3Df689d769a3"><span data-dcnode-id="1962" instrument_node="">https://www.gov.uk/government/consultations/enforcing-operation-brock-plans-in-2021/outcome/enforcing-operation-brock-in-2021-government-response-to-consultation-on-proposed-legislative-amendments</span></a></span><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">
</span><span data-dcnode-id="1956" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1957" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1955"><span data-dcnode-id="1954" instrument_node="">
</span><span data-dcnode-id="1952" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1953" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">
</span><span data-dcnode-id="1945" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1947"><u data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Migration Advisory Committee (MAC) Final Report on UK Shortage Occupation List (SOL) – recommendations to UK Govt</span></u></strong><span data-dcnode-id="1946" instrument_node="">, the MAC’s recommendations relevant to the seafood sector are:</span></span></p><span data-dcnode-id="1943" instrument_node="">
</span><ul data-dcnode-id="1928"><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1930"><span data-dcnode-id="1931" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1941" instrument_node="">The MAC recommends partially adding SOC code </span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">5119</span></strong><span data-dcnode-id="1938" instrument_node=""> (agricultural and </span><strong data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">fishing</span></strong><span data-dcnode-id="1935" instrument_node=""> trades n.e.c.) to the UK SOL </span><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">only for those in the fishing industry</span></strong><span data-dcnode-id="1932" instrument_node="">.</span></span></li><span data-dcnode-id="1929" instrument_node="">
</span></ul><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1925" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1926" instrument_node="">This occupation is ranked low on the RQF3-5 shortage indicators and the vacancy to employee ratio is well below the median for eligible occupations.</span></span><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">
</span><span data-dcnode-id="1921" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1922" instrument_node="">However, stakeholders in the fishing industry have stated their concerns and there is evidence to suggest a UK-wide shortage in this part of the occupation.</span></span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">
</span><span data-dcnode-id="1914" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1918" instrument_node="">Job roles including ‘captain’, ‘skipper’ and ‘fisherman’ are classified under SOC </span><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">5119</span></strong><span data-dcnode-id="1915" instrument_node="">.</span></span></p><span data-dcnode-id="1912" instrument_node="">
</span><ul data-dcnode-id="1894"><span data-dcnode-id="1911" instrument_node="">
</span><li data-dcnode-id="1896"><span data-dcnode-id="1897" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1910" instrument_node="">The MAC recommends classifying ‘</span><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">deckhands on large fishing vessels (9 metres and above)</span></strong><span data-dcnode-id="1907" instrument_node="">’ under SOC code </span><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">9119</span></strong><span data-dcnode-id="1904" instrument_node=""> as </span><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">RQF3 </span></strong><span data-dcnode-id="1901" instrument_node="">and therefore to be </span><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">eligible for the Skilled Worker route</span></strong><span data-dcnode-id="1898" instrument_node="">.</span></span></li><span data-dcnode-id="1895" instrument_node="">
</span></ul><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1888" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1892" instrument_node="">For this job title, they recommend including a </span><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">requirement for the applicant to have at least three years full time experience</span></strong><span data-dcnode-id="1889" instrument_node=""> using their skills.</span></span><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">
</span><span data-dcnode-id="1878" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1885" instrument_node="">The MAC said they recognise that there may be operational challenges given the rules on operating inside compared to outside territorial waters, which the Home Office will want to consider. Other relevant roles under code </span><strong data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">9119 </span></strong><span data-dcnode-id="1882" instrument_node="">(including fish husbandry in the aquaculture sector) are </span><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">not</span></strong><span data-dcnode-id="1879" instrument_node=""> recommended for classifying/upgrading to RQF3.</span></span></p><span data-dcnode-id="1876" instrument_node="">
</span><ul data-dcnode-id="1841"><span data-dcnode-id="1875" instrument_node="">
</span><li data-dcnode-id="1869"><span data-dcnode-id="1870" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1874" instrument_node="">All jobs in occupation code </span><strong data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">2112</span></strong><span data-dcnode-id="1871" instrument_node=""> (biological scientists and biochemists – includes broodstock geneticists) are recommended to go on UK SOL (relevant to aquaculture).</span></span></li><span data-dcnode-id="1868" instrument_node="">
</span><li data-dcnode-id="1853"><span data-dcnode-id="1854" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1867" instrument_node="">The MAC does </span><strong data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">not</span></strong><span data-dcnode-id="1864" instrument_node=""> recommend adding SOC Code </span><strong data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">5433</span></strong><span data-dcnode-id="1861" instrument_node=""> (fishmongers, fish processors and poultry dressers) to the UK SOL but </span><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">does </span></strong><span data-dcnode-id="1858" instrument_node="">recommend inclusion to the </span><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">NI-only</span></strong><span data-dcnode-id="1855" instrument_node=""> SOL.</span></span></li><span data-dcnode-id="1852" instrument_node="">
</span><li data-dcnode-id="1843"><span data-dcnode-id="1844" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1851" instrument_node="">The MAC does </span><strong data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">not</span></strong><span data-dcnode-id="1848" instrument_node=""> recommend adding SOC code </span><strong data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">4134</span></strong><span data-dcnode-id="1845" instrument_node=""> (transport and distribution clerks and assistants) to the UK SOL.</span></span></li><span data-dcnode-id="1842" instrument_node="">
</span></ul><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1839" instrument_node="">The online job posts to employee ratio is above the median, however, the occupation ranks low by RQF3-5 shortage indicator rank and pay growth has been negative (2016-2019). Although some stakeholder evidence highlighting difficulties was received, on balance there was not enough evidence in the MAC’s view to indicate a UK-wide shortage.</span></span></p><span data-dcnode-id="1836" instrument_node="">
</span><ul data-dcnode-id="1814"><span data-dcnode-id="1835" instrument_node="">
</span><li data-dcnode-id="1826"><span data-dcnode-id="1827" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1834" instrument_node="">It is unclear/not explicit but SOC Code </span><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">8211 </span></strong><span data-dcnode-id="1831" instrument_node="">(drivers of large goods vehicles) does </span><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">not</span></strong><span data-dcnode-id="1828" instrument_node=""> appear to be recommended for classifying/upgrading to RQF3 and thus is not eligible for inclusion on the UK SOL.</span></span></li><span data-dcnode-id="1825" instrument_node="">
</span><li data-dcnode-id="1816"><span data-dcnode-id="1817" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1824" instrument_node="">Occupations </span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">below</span></strong><span data-dcnode-id="1821" instrument_node=""> RQF3 have never been eligible for the current Tier 2 (General) route and will </span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">not</span></strong><span data-dcnode-id="1818" instrument_node=""> be eligible for the new Skilled Worker route.</span></span></li><span data-dcnode-id="1815" instrument_node="">
</span></ul><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1812" instrument_node="">The report is available here: </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3De4bc524c4c%26e%3Df689d769a3"><span data-dcnode-id="1811" instrument_node="">https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/922019/SOL_2020_Report_Final.pdf</span></a></span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1804" instrument_node="">
</span><br data-dcnode-id="1803" style="clear: both;"><span data-dcnode-id="1802" instrument_node="">
</span><br data-dcnode-id="1801" style="clear: both;"><span data-dcnode-id="1800" instrument_node="">
</span></div><span data-dcnode-id="1798" instrument_node="">
</span><br data-dcnode-id="1797" style="clear: both;"><span data-dcnode-id="1796" instrument_node="">
</span><h4 data-dcnode-id="1794" data-subitem="2" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="1795" instrument_node="">13th October</span></h4><span data-dcnode-id="1793" instrument_node="">
</span><div class="subitems subitem-2" data-dcnode-id="1633" style="width: 100%; float: left; margin-top: 10px; display: none;"><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1789" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Government publishes updated GB-EU border operating model</span></strong></span><br data-dcnode-id="1788"><span data-dcnode-id="1787" instrument_node="">
</span><span data-dcnode-id="1780" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1786" instrument_node="">On Thursday 8 October the Government published an updated </span><u data-dcnode-id="1782"><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3D81d438387b%26e%3D7d23d8809c"><span data-dcnode-id="1785" instrument_node="">Border Operating Mode</span></a><span data-dcnode-id="1783" instrument_node="">l</span></u><span data-dcnode-id="1781" instrument_node="">, which provides further detail on how the GB-EU border will work and the actions that traders, hauliers and passengers need to take.&nbsp;</span></span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1777" instrument_node="">The updated GB-EU Border Operating Model:</span></span></p><span data-dcnode-id="1774" instrument_node="">
</span><ul data-dcnode-id="1760"><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1770"><span data-dcnode-id="1771" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1772" instrument_node="">Maps out the intended locations of inland border infrastructure. The sites will provide additional capacity to carry out checks on freight.</span></span></li><span data-dcnode-id="1769" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1768" instrument_node="">Announces that passports will be required for entry into the UK from October 2021 as the Government phases out the use of EU, EEA and Swiss national identity cards.</span></span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1762"><span data-dcnode-id="1763" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1764" instrument_node="">Confirms, after extensive engagement with industry, that a Kent Access Permit will be mandatory for HGVs over 7.5 tonnes using the short strait channel crossings in Kent. The easy-to-use ‘Check an HGV’ service will allow hauliers to check if they have the correct customs documentation and obtain a Kent Access Permit.</span></span></li><span data-dcnode-id="1761" instrument_node="">
</span></ul><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1756" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Exports of seafood to the EU</span></strong></span><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node="">
</span><span data-dcnode-id="1752" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1753" instrument_node="">Exporters are encouraged to take three simple steps:</span></span></p><span data-dcnode-id="1750" instrument_node="">
</span><ol data-dcnode-id="1736"><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1746"><span data-dcnode-id="1747" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1748" instrument_node="">Go online and apply for a GB EORI number (a number which helps customs identify their goods). You will need this to trade with the EU after 31 December 2020.</span></span></li><span data-dcnode-id="1745" instrument_node="">
</span><li data-dcnode-id="1742"><span data-dcnode-id="1743" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1744" instrument_node="">Decide how you want to fulfil new customs requirements – some businesses will do this themselves; many will want to use a customs agent or intermediary and should identify one now.</span></span></li><span data-dcnode-id="1741" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1740" instrument_node="">Talk to businesses in the EU you trade with to ensure they are familiar with the new import requirements from the end of the transition period.</span></span></li><span data-dcnode-id="1737" instrument_node="">
</span></ol><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1734" instrument_node="">Details of the specific requirements for exporting fish and shellfish are provided from page 167 of the Border Operating model.</span></span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1728" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Imports of seafood from the EU</span></strong></span><br data-dcnode-id="1727"><span data-dcnode-id="1726" instrument_node="">
</span><span data-dcnode-id="1724" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1725" instrument_node="">The UK Government has taken the decision to introduce the new border controls in three stages up until 1 July 2021to give industry extra time to make necessary arrangements.</span></span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1721" instrument_node="">The stages are:</span></span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">1. From January 2021: </span></strong><span data-dcnode-id="1715" instrument_node="">Most imports of marine caught fish and some shellfish will need to be accompanied by a Catch Certificate (and other relevant IUU documents as required).EU-registered fishing vessels intending to land their catch directly into GB must land into an appropriately designated port in line with IUU fishing rules and the North East Atlantic Fisheries Commission (NEAFC) convention.</span></span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">2. From April 2021: </span></strong><span data-dcnode-id="1709" instrument_node="">there will be new requirements for fishery products for human consumption&nbsp;to be accompanied by an EHC. There will also be new requirements for importers to submit prenotifications for fishery products via IPAFFS in advance of the goods’ arrival</span></span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1699" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">3.</span></strong><span data-dcnode-id="1703" instrument_node="">&nbsp;</span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">From July 2021: </span></strong><span data-dcnode-id="1700" instrument_node="">Commodities subject to sanitary and phytosanitary (SPS) controls, these must arrive at an established point of entry with an appropriate BCP.</span></span><br data-dcnode-id="1698"><span data-dcnode-id="1697" instrument_node="">
</span><span data-dcnode-id="1695" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1696" instrument_node="">Further details of the import requirements for seafood are on pages 61, 94 and 123 of the Border Operating Model.</span></span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1690" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">EHC Online registration now open</span></strong></span><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">
</span><span data-dcnode-id="1677" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1687" instrument_node="">From 1 January 2021 all exports of fish and seafood, including aquaculture products, except direct landings of fish from UK-flagged fishing vessels to the EU will require an Export Health Certificate (EHC). Exporters can apply for EHCs online and can register for the online service before their first application is made. You can prepare now by registering via </span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3D04c6c38f6c%26e%3D7d23d8809c"><span data-dcnode-id="1686" instrument_node="">gov.uk</span></a><span data-dcnode-id="1684" instrument_node="">. Guidance is available on how to get an EHC and when is the right time to apply </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3D2882f7f56d%26e%3D7d23d8809c"><span data-dcnode-id="1683" instrument_node="">here</span></a><span data-dcnode-id="1681" instrument_node="">. You can also view examples of EU EHCs on Defra’s </span><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3D84691c3aff%26e%3D7d23d8809c"><span data-dcnode-id="1680" instrument_node="">Form Finder</span></a><span data-dcnode-id="1678" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1672" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Protecting food and drink names from 1 January 2021 – new UK GI logos</span></strong></span><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">
</span><span data-dcnode-id="1662" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1669" instrument_node="">On 28 September the new UK GI logos were made </span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3D104020ac39%26e%3D7d23d8809c"><span data-dcnode-id="1668" instrument_node="">available to download</span></a><span data-dcnode-id="1666" instrument_node=""> on GOV.UK. These logos, and the rules for using them, were shared with GI producers, retailers and enforcement bodies via email. The GIs policy team will be hosting an online teach-in session on the new UK GI schemes. Please contact the team at </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.us20.list-manage.com/track/click%3Fu%3D0a593e0425c4d94483b10bc1f%26id%3Dc2330ff256%26e%3D7d23d8809c"><span data-dcnode-id="1665" instrument_node="">protectedfoodnames@defra.gov.uk</span></a><span data-dcnode-id="1663" instrument_node=""> if you would like to attend.</span></span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1657" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Funding Support for Remote Training in Scotland’s Seafood Industry&nbsp;</span></strong></span><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">
</span><span data-dcnode-id="1651" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1654" instrument_node="">There is still a very limited amount of&nbsp;funding support available for seafood companies to undertake training. Full details of the courses can be found </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodacademy.org/pdfs/Temp-docs/Scottish-Funding-2020.pdf%3F_cldee%3DZG9ubmEuZm9yZHljZUBzZWFmb29kc2NvdGxhbmQub3Jn%26recipientid%3Dcontact-20791d942821e81180f200505684117c-24621b522a1a420bb907954419850fbc%26utm_source%3DClickDimensions%26utm_medium%3Demail%26utm_campaign%3DSeafood%2520Training%2520Newsletter%26esid%3D5c93aac4-0efc-ea11-8119-00505684117c"><span data-dcnode-id="1653" instrument_node="">here</span></a></span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1646" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Production Staff Wanted</span></strong></span><br data-dcnode-id="1645"><span data-dcnode-id="1644" instrument_node="">
</span><span data-dcnode-id="1640" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="1643" instrument_node="">There is a growing number of companies throughout Scotland making contact with vacancies within their operations. If any companies are making redundancies or knows of anyone looking for employment can they please contact </span><a data-dcnode-id="1641" href="mailto:enquiries@seafoodscotland.org"><span data-dcnode-id="1642" instrument_node="">enquiries@seafoodscotland.org</span></a></span></p><span data-dcnode-id="1638" instrument_node="">
</span><br data-dcnode-id="1637" style="clear: both;"><span data-dcnode-id="1636" instrument_node="">
</span><br data-dcnode-id="1635" style="clear: both;"><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span></div><span data-dcnode-id="1630" instrument_node="">
</span></div><span data-dcnode-id="1628" instrument_node="">
</span><div data-dcnode-id="278" style="width: 100%; float: left; margin: 0 0 10px 0; padding: 0 0 10px 0; border-bottom: 1px solid #0e3160;"><span data-dcnode-id="1627" instrument_node="">

</span><span data-dcnode-id="1421" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1422" instrument_node="">What’s&nbsp;changing in Jan&nbsp;2021 and how this impacts current Tier 2 licence holders</span></span></h1><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">14th October 10-11am&nbsp;</span></strong></span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1413" instrument_node="">What’s changing in January 2021 and how this impacts current Tier 2 licence holders For Scottish employers faced with skills shortages in the domestic labour market, recruiting talent from overseas is often critical to the growth of the business. With the imminent changes to the UK immigration system as a result of Brexit, the aim of this webinar is to inform companies who already have a sponsor licence on what is changing once free movement of people ends. This 60 minute webinar is aimed at Scottish based SMEs. The webinar will be led by TalentScotland and supported by their immigration specialists Brodies LLP and will cover: • Overview of the new UK immigration system • Who is exempt from sponsorship • What you can do to prepare now • Potential Costs and time associated with this • Brief overview of Tier 2 sponsorship duties • Outline of support available through TalentScotland</span></span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1409" instrument_node="">Register </span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dad2c5044ce%26e%3Df689d769a3"><span data-dcnode-id="1408" instrument_node="">here</span></a><span data-dcnode-id="1406" instrument_node="">.</span></span></p><span data-dcnode-id="1403" instrument_node="">

</span><span data-dcnode-id="1301" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1305" instrument_node="">As a general portal to all things related to the end of the transition period, the UK government has launched its </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dde6d9cca8a%26e%3Df689d769a3"><span data-dcnode-id="1304" instrument_node="">Transition website</span></a><span data-dcnode-id="1302" instrument_node="">.</span></span><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node="">
</span><span data-dcnode-id="1297" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1298" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">
</span><span data-dcnode-id="1292" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The Border Operating Model</span></strong></span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">

</span><span data-dcnode-id="1275" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1285" instrument_node="">Much of the information you will need to trade with EU Member States, whether as an importer or an exporter, is contained within the recently published </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D6c5f1bff6e%26e%3Df689d769a3"><span data-dcnode-id="1284" instrument_node="">Border Operating Model</span></a><span data-dcnode-id="1282" instrument_node="">. This is an extensive document, and much of it is not relevant to the seafood sector. Nevertheless, some of the generic guidance to importers and exporters is valuable, and there are specific sections related to seafood sector trade. </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Deb2d411ba6%26e%3Df689d769a3"><span data-dcnode-id="1281" instrument_node="">Webinars</span></a><span data-dcnode-id="1279" instrument_node=""> are available. Importers should note the UK government’s proposal to phase the requirements for imports over the first six months of 2021. In addition, there is a UK government </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D25b838b9ea%26e%3Df689d769a3"><span data-dcnode-id="1278" instrument_node="">consultation for 2025</span></a><span data-dcnode-id="1276" instrument_node="">.</span></span><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">
</span><span data-dcnode-id="1271" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1272" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">
</span><span data-dcnode-id="1267" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1268" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">
</span><span data-dcnode-id="1262" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">How to import and export goods between Great Britain and the EU from 1 January 2021</span></strong></span><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">
</span><span data-dcnode-id="1258" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1259" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
</span><span data-dcnode-id="1248" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1255" instrument_node="">HM Revenue and Customs put this </span><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D47aa64110c%26e%3Df689d769a3"><span data-dcnode-id="1254" instrument_node="">guidance</span></a><span data-dcnode-id="1252" instrument_node=""> material online on the 13</span><sup data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">th</span></sup><span data-dcnode-id="1249" instrument_node=""> of July.</span></span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
</span><span data-dcnode-id="1244" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1245" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1239" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Export Health Certificates</span></strong></span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">
</span><span data-dcnode-id="1235" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1236" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
</span><span data-dcnode-id="1223" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1232" instrument_node="">Seafood sector exporters will be aware of the need for Export Health Certificates after the end of the transition period, and this topic is covered in some of the other guidance referred to in this paper. &nbsp;There is a lot of useful information contained within the following </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D7d604c55b7%26e%3Df689d769a3"><span data-dcnode-id="1231" instrument_node="">webpages</span></a><span data-dcnode-id="1229" instrument_node="">. In addition you can search for </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D8cf1412740%26e%3Df689d769a3"><span data-dcnode-id="1228" instrument_node="">available certificates</span></a><span data-dcnode-id="1226" instrument_node="">. SG and FSS are proposing FSS leads on EHC provision at a minimum of two key logistics hubs in Scotland, which will operate a ‘groupage’ system to help food business export effectively and efficiently after the EU-exit transition period. More information will shortly be communicated, and will be available through the Brexit section of the FSS website: </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9b232db51b%26e%3Df689d769a3"><span data-dcnode-id="1225" instrument_node="">https://www.foodstandards.gov.scot/about-us/brexit</span></a></span><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">
</span><span data-dcnode-id="1219" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1220" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">
</span><span data-dcnode-id="1214" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Marine and Fisheries Compliance</span></strong></span><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">
</span><span data-dcnode-id="1210" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1211" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">
</span><span data-dcnode-id="1203" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1207" instrument_node="">Effective monitoring and enforcement of marine and fishing laws is vital if we are to protect Scotland’s valuable marine areas and fisheries. It is important that these are protected by detecting breaches of fisheries regulations by monitoring and inspection at sea and in ports, and then reporting as appropriate to the prosecuting authorities, and by providing intelligence on fishing activity in the sea areas around Scotland. Comprehensive guidance on all relevant issues, and particularly Illegal, Unreported and Unregulated (IUU) fishing and Catch Certificates can be found here: </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D590ad2b34b%26e%3Df689d769a3"><span data-dcnode-id="1206" instrument_node="">guidance</span></a><span data-dcnode-id="1204" instrument_node="">.</span></span><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">
</span><span data-dcnode-id="1199" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1200" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node="">
</span><span data-dcnode-id="1194" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The Northern Ireland Protocol</span></strong></span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1191" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
</span><span data-dcnode-id="1180" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1187" instrument_node="">The UK government recently published first a ‘</span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D035fb169c6%26e%3Df689d769a3"><span data-dcnode-id="1186" instrument_node="">command paper</span></a><span data-dcnode-id="1184" instrument_node="">’ on the NI border, then the </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da310a423bd%26e%3Df689d769a3"><span data-dcnode-id="1183" instrument_node="">NI Business Guidance</span></a><span data-dcnode-id="1181" instrument_node="">, which is intended to outline some of the requirements for the movement of goods between Great Britain and Northern Ireland. The guidance includes a section on moving consignments of fish from GB to NI, and for GB vessels landing fish directly into NI. Other aspects of the operation of the Northern Ireland Protocol are still subject to the outcome of negotiations. The working assumption is that Export Health Certificates (EHCs) will be required for trade in products of animal origin between GB and NI. Further guidance will be issued in due course.</span></span><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">
</span><span data-dcnode-id="1176" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1177" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">
</span><span data-dcnode-id="1171" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">MMO survey </span></strong></span><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">
</span><span data-dcnode-id="1167" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1168" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">
</span><span data-dcnode-id="1160" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1164" instrument_node="">The Marine Management Organisation has just launched a survey with registered users of the Catch Certificate system. MMO is only going to contact its English registered users, but there is an expectation that Scottish registered users should also get involved in the survey – and we would urge you to do so. The link to the survey is </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Db3003ae93a%26e%3Df689d769a3"><span data-dcnode-id="1163" instrument_node="">here</span></a><span data-dcnode-id="1161" instrument_node="">.</span></span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
</span><span data-dcnode-id="1156" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1157" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
</span><span data-dcnode-id="1152" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1153" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">
</span><span data-dcnode-id="1147" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Seafish Guidance</span></strong></span><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1143" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1144" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">
</span><span data-dcnode-id="1136" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1140" instrument_node="">Seafish has produced </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D07e3a66c4e%26e%3Df689d769a3"><span data-dcnode-id="1139" instrument_node="">guidance</span></a><span data-dcnode-id="1137" instrument_node=""> that will help prepare seafood businesses for the end of the transition period. It focusses on the day-to-day scenarios likely to be encountered. This includes food safety, traceability and trade, but does not cover issues arising from the UK’s future relationship with the EU.</span></span><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">
</span><span data-dcnode-id="1132" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1133" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node="">
</span><span data-dcnode-id="1127" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Seafood Scotland Guidance</span></strong></span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
</span><span data-dcnode-id="1123" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1124" instrument_node="">&nbsp;</span></span><br data-dcnode-id="1122"><span data-dcnode-id="1121" instrument_node="">
</span><span data-dcnode-id="1116" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1120" instrument_node="">As Seafood Scotland notes “In light of the imminent departure of the United Kingdom from the European Union, it is essential that actions are taken by the Seafood industry to ensure continued success, deal or no deal”. The </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D299b608ea1%26e%3Df689d769a3"><span data-dcnode-id="1119" instrument_node="">website</span></a><span data-dcnode-id="1117" instrument_node=""> contains helpful information and links.</span></span></p><span data-dcnode-id="1114" instrument_node="">
</span><br data-dcnode-id="1113" style="clear: both;"><span data-dcnode-id="1112" instrument_node="">
</span><br data-dcnode-id="1111" style="clear: both;"><span data-dcnode-id="1110" instrument_node="">
</span></div><span data-dcnode-id="1108" instrument_node="">
</span><br data-dcnode-id="1107" style="clear: both;"><span data-dcnode-id="1106" instrument_node="">
</span><h4 data-dcnode-id="1104" data-subitem="2" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="1105" instrument_node="">22nd September</span></h4><span data-dcnode-id="1103" instrument_node="">
</span><div class="subitems subitem-2" data-dcnode-id="575" style="width: 100%; float: left; margin-top: 10px; display: none;"><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1101" instrument_node="">As we know we are coming to the end of the transition period and come the 1st January we will become an independent coastal state. A lot of information is in the public domain and a lot of organisations are issuing guidance. Seafood Scotland has&nbsp;set up a Brexit Working Group and will work through the key issues with stakeholders and provide all the information you require to continue to trade on the 1st January 2021. Over the coming weeks Seafood Scotland and other key&nbsp;stakeholders will work together to provide easy to follow guidance, webinars and a forum to highlight&nbsp;issues and concerns that are not being addressed or where&nbsp;there is no clear guidance.</span></span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1097" instrument_node="">In the blue box below you will see the guidance that has been produced by Scottish Government Brexit team for anyone wanting to access further information. We will be breaking this information down over the coming weeks for key subjects.</span></span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1093" instrument_node="">Last week we highlighted the&nbsp;very first step companies should be doing if they haven’t already done so is the Check, Change, Go survey </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dc3b028b509%26e%3Df689d769a3"><span data-dcnode-id="1092" instrument_node="">here</span></a><span data-dcnode-id="1090" instrument_node=""> which will highlight any gaps in your preparations. Hopefully you have already done this.</span></span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="1086" instrument_node="">DEFRA&nbsp;have organised a series of webinars to assist you with your preparations for the end of the transition period. The webinars are scheduled take place throughout October and November and will provide key information to enable you to continue exporting your products from Great Britain to the European Union. Please see relevant webinar details below</span></span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="1080"><u data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&nbsp;Exporting Products of Animal Origin (POAO) from Great Britain to the European Union </span></u></strong></span></p><span data-dcnode-id="1077" instrument_node="">

</span><span data-dcnode-id="758" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="759" instrument_node="">&nbsp;</span></span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
</span><span data-dcnode-id="745" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="755" instrument_node="">Much of the information you will need to trade with EU Member States, whether as an importer or an exporter, is contained within the recently published </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D41e70f5c05%26e%3Df689d769a3"><span data-dcnode-id="754" instrument_node="">Border Operating Model</span></a><span data-dcnode-id="752" instrument_node="">. This is an extensive document, and much of it is not relevant to the seafood sector. Nevertheless, some of the generic guidance to importers and exporters is valuable, and there are specific sections related to seafood sector trade. </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Db910ae9159%26e%3Df689d769a3"><span data-dcnode-id="751" instrument_node="">Webinars</span></a><span data-dcnode-id="749" instrument_node=""> are available. Importers should note the UK government’s proposal to phase the requirements for imports over the first six months of 2021. In addition, there is a UK government </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D743c00c39f%26e%3Df689d769a3"><span data-dcnode-id="748" instrument_node="">consultation for 2025</span></a><span data-dcnode-id="746" instrument_node="">.</span></span><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">
</span><span data-dcnode-id="741" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="742" instrument_node="">&nbsp;</span></span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">
</span><span data-dcnode-id="737" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="738" instrument_node="">&nbsp;</span></span><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">
</span><span data-dcnode-id="732" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">How to import and export goods between Great Britain and the EU from 1 January 2021</span></strong></span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">
</span><span data-dcnode-id="728" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="729" instrument_node="">&nbsp;</span></span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
</span><span data-dcnode-id="718" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="725" instrument_node="">HM Revenue and Customs put this </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9d95489d59%26e%3Df689d769a3"><span data-dcnode-id="724" instrument_node="">guidance</span></a><span data-dcnode-id="722" instrument_node=""> material online on the 13</span><sup data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">th</span></sup><span data-dcnode-id="719" instrument_node=""> of July.</span></span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
</span><span data-dcnode-id="714" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="715" instrument_node="">&nbsp;</span></span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
</span><span data-dcnode-id="709" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Export Health Certificates</span></strong></span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">
</span><span data-dcnode-id="705" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="706" instrument_node="">&nbsp;</span></span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
</span><span data-dcnode-id="693" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="702" instrument_node="">Seafood sector exporters will be aware of the need for Export Health Certificates after the end of the transition period, and this topic is covered in some of the other guidance referred to in this paper. &nbsp;There is a lot of useful information contained within the following </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4d1d82dbe7%26e%3Df689d769a3"><span data-dcnode-id="701" instrument_node="">webpages</span></a><span data-dcnode-id="699" instrument_node="">. In addition you can search for </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3ebe11dc59%26e%3Df689d769a3"><span data-dcnode-id="698" instrument_node="">available certificates</span></a><span data-dcnode-id="696" instrument_node="">. SG and FSS are proposing FSS leads on EHC provision at a minimum of two key logistics hubs in Scotland, which will operate a ‘groupage’ system to help food business export effectively and efficiently after the EU-exit transition period. More information will shortly be communicated, and will be available through the Brexit section of the FSS website: </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D31d3c5c9fa%26e%3Df689d769a3"><span data-dcnode-id="695" instrument_node="">https://www.foodstandards.gov.scot/about-us/brexit</span></a></span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><span data-dcnode-id="689" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="690" instrument_node="">&nbsp;</span></span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">
</span><span data-dcnode-id="684" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Marine and Fisheries Compliance</span></strong></span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
</span><span data-dcnode-id="680" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="681" instrument_node="">&nbsp;</span></span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
</span><span data-dcnode-id="673" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="677" instrument_node="">Effective monitoring and enforcement of marine and fishing laws is vital if we are to protect Scotland’s valuable marine areas and fisheries. It is important that these are protected by detecting breaches of fisheries regulations by monitoring and inspection at sea and in ports, and then reporting as appropriate to the prosecuting authorities, and by providing intelligence on fishing activity in the sea areas around Scotland. Comprehensive guidance on all relevant issues, and particularly Illegal, Unreported and Unregulated (IUU) fishing and Catch Certificates can be found here: </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D91d31a9a91%26e%3Df689d769a3"><span data-dcnode-id="676" instrument_node="">guidance</span></a><span data-dcnode-id="674" instrument_node="">.</span></span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
</span><span data-dcnode-id="669" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="670" instrument_node="">&nbsp;</span></span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="664" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The Northern Ireland Protocol</span></strong></span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">
</span><span data-dcnode-id="660" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="661" instrument_node="">&nbsp;</span></span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">
</span><span data-dcnode-id="650" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="657" instrument_node="">The UK government recently published first a ‘</span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9a6fe654d1%26e%3Df689d769a3"><span data-dcnode-id="656" instrument_node="">command paper</span></a><span data-dcnode-id="654" instrument_node="">’ on the NI border, then the </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D1f3103b5ab%26e%3Df689d769a3"><span data-dcnode-id="653" instrument_node="">NI Business Guidance</span></a><span data-dcnode-id="651" instrument_node="">, which is intended to outline some of the requirements for the movement of goods between Great Britain and Northern Ireland. The guidance includes a section on moving consignments of fish from GB to NI, and for GB vessels landing fish directly into NI. Other aspects of the operation of the Northern Ireland Protocol are still subject to the outcome of negotiations. The working assumption is that Export Health Certificates (EHCs) will be required for trade in products of animal origin between GB and NI. Further guidance will be issued in due course.</span></span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">
</span><span data-dcnode-id="646" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="647" instrument_node="">&nbsp;</span></span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="641" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">MMO survey </span></strong></span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
</span><span data-dcnode-id="637" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="638" instrument_node="">&nbsp;</span></span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
</span><span data-dcnode-id="630" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="634" instrument_node="">The Marine Management Organisation has just launched a survey with registered users of the Catch Certificate system. MMO is only going to contact its English registered users, but there is an expectation that Scottish registered users should also get involved in the survey – and we would urge you to do so. The link to the survey is </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D618766994e%26e%3Df689d769a3"><span data-dcnode-id="633" instrument_node="">here</span></a><span data-dcnode-id="631" instrument_node="">.</span></span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">
</span><span data-dcnode-id="626" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="627" instrument_node="">&nbsp;</span></span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
</span><span data-dcnode-id="622" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="623" instrument_node="">&nbsp;</span></span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
</span><span data-dcnode-id="617" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Seafish Guidance</span></strong></span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
</span><span data-dcnode-id="613" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="614" instrument_node="">&nbsp;</span></span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
</span><span data-dcnode-id="606" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="610" instrument_node="">Seafish has produced </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D38a20fc92a%26e%3Df689d769a3"><span data-dcnode-id="609" instrument_node="">guidance</span></a><span data-dcnode-id="607" instrument_node=""> that will help prepare seafood businesses for the end of the transition period. It focusses on the day-to-day scenarios likely to be encountered. This includes food safety, traceability and trade, but does not cover issues arising from the UK’s future relationship with the EU.</span></span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="602" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="603" instrument_node="">&nbsp;</span></span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">

</span><span data-dcnode-id="586" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="590" instrument_node="">As Seafood Scotland notes “In light of the imminent departure of the United Kingdom from the European Union, it is essential that actions are taken by the Seafood industry to ensure continued success, deal or no deal”. The </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dc41506814c%26e%3Df689d769a3"><span data-dcnode-id="589" instrument_node="">website</span></a><span data-dcnode-id="587" instrument_node=""> contains helpful information and links.</span></span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">
</span><span data-dcnode-id="582" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="583" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="580" instrument_node="">

</span><span data-dcnode-id="554" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="558" instrument_node="">Marine Scotland produced guidance material on international trade in 2019, preparatory to a potential no-deal Brexit – </span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D84acdd0f0d%26e%3Df689d769a3"><span data-dcnode-id="557" instrument_node="">guidance</span></a><span data-dcnode-id="555" instrument_node="">. We would urge you to visit this website in the first instance, and consider downloading the guidance leaflets and following up the links that would be relevant to your business.</span></span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
</span><span data-dcnode-id="550" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="551" instrument_node="">&nbsp;</span></span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">

</span><span data-dcnode-id="541" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="542" instrument_node="">&nbsp;</span></span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><span data-dcnode-id="534" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="538" instrument_node="">For additional comprehensive guidance from the Scottish Government, please visit this website: </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D901554116b%26e%3Df689d769a3"><span data-dcnode-id="537" instrument_node="">preparing for Brexit</span></a><span data-dcnode-id="535" instrument_node="">.</span></span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">
</span><span data-dcnode-id="530" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="531" instrument_node="">&nbsp;</span></span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
</span><span data-dcnode-id="525" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Fishing Vessel Registration and Inspection by LA’s – URGENT</span></strong></span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">

</span><span data-dcnode-id="514" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="518" instrument_node="">Marine Scotland believes there is now good industry knowledge about the requirement for all vessels intending to put their catch into an export supply chain to be a registered food business. This requires an inspection, which will be undertaken by Local Authority officials. Food Standards Scotland has been leading this initiative, and details can be found here: </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3De9314dc568%26e%3Df689d769a3"><span data-dcnode-id="517" instrument_node="">guidance</span></a><span data-dcnode-id="515" instrument_node="">.</span></span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
