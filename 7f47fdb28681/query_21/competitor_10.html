</span><span data-dcnode-id="470" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="471" instrument_node="">&nbsp;</span></span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
</span><span data-dcnode-id="465" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">The Border Operating Model</span></strong></span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">
</span><span data-dcnode-id="461" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="462" instrument_node="">&nbsp;</span></span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
</span><span data-dcnode-id="448" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="458" instrument_node="">Much of the information you will need to trade with EU Member States, whether as an importer or an exporter, is contained within the recently published </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dd565bf718b%26e%3Df689d769a3"><span data-dcnode-id="457" instrument_node="">Border Operating Model</span></a><span data-dcnode-id="455" instrument_node="">. This is an extensive document, and much of it is not relevant to the seafood sector. Nevertheless, some of the generic guidance to importers and exporters is valuable, and there are specific sections related to seafood sector trade. </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D172b53b1ec%26e%3Df689d769a3"><span data-dcnode-id="454" instrument_node="">Webinars</span></a><span data-dcnode-id="452" instrument_node=""> are available. Importers should note the UK government’s proposal to phase the requirements for imports over the first six months of 2021. In addition, there is a UK government </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D77bd5f9320%26e%3Df689d769a3"><span data-dcnode-id="451" instrument_node="">consultation for 2025</span></a><span data-dcnode-id="449" instrument_node="">.</span></span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">
</span><span data-dcnode-id="444" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="445" instrument_node="">&nbsp;</span></span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
</span><span data-dcnode-id="440" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="441" instrument_node="">&nbsp;</span></span><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">
</span><span data-dcnode-id="435" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">How to import and export goods between Great Britain and the EU from 1 January 2021</span></strong></span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">
</span><span data-dcnode-id="431" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="432" instrument_node="">&nbsp;</span></span><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">
</span><span data-dcnode-id="421" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="428" instrument_node="">HM Revenue and Customs put this </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Db25f430f86%26e%3Df689d769a3"><span data-dcnode-id="427" instrument_node="">guidance</span></a><span data-dcnode-id="425" instrument_node=""> material online on the 13</span><sup data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">th</span></sup><span data-dcnode-id="422" instrument_node=""> of July.</span></span><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">
</span><span data-dcnode-id="417" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="418" instrument_node="">&nbsp;</span></span><br data-dcnode-id="416"><span data-dcnode-id="415" instrument_node="">
</span><span data-dcnode-id="412" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Export Health Certificates</span></strong></span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">
</span><span data-dcnode-id="408" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="409" instrument_node="">&nbsp;</span></span><br data-dcnode-id="407"><span data-dcnode-id="406" instrument_node="">
</span><span data-dcnode-id="396" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="405" instrument_node="">Seafood sector exporters will be aware of the need for Export Health Certificates after the end of the transition period, and this topic is covered in some of the other guidance referred to in this paper. &nbsp;There is a lot of useful information contained within the following </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dde5f7ba372%26e%3Df689d769a3"><span data-dcnode-id="404" instrument_node="">webpages</span></a><span data-dcnode-id="402" instrument_node="">. In addition you can search for </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3e908bc2be%26e%3Df689d769a3"><span data-dcnode-id="401" instrument_node="">available certificates</span></a><span data-dcnode-id="399" instrument_node="">. SG and FSS are proposing FSS leads on EHC provision at a minimum of two key logistics hubs in Scotland, which will operate a ‘groupage’ system to help food business export effectively and efficiently after the EU-exit transition period. More information will shortly be communicated, and will be available through the Brexit section of the FSS website: </span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D69bbe742da%26e%3Df689d769a3"><span data-dcnode-id="398" instrument_node="">https://www.foodstandards.gov.scot/about-us/brexit</span></a></span><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">
</span><span data-dcnode-id="392" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="393" instrument_node="">&nbsp;</span></span><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node="">
</span><span data-dcnode-id="387" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Marine and Fisheries Compliance</span></strong></span><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">
</span><span data-dcnode-id="383" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="384" instrument_node="">&nbsp;</span></span><br data-dcnode-id="382"><span data-dcnode-id="381" instrument_node="">
</span><span data-dcnode-id="376" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="380" instrument_node="">Effective monitoring and enforcement of marine and fishing laws is vital if we are to protect Scotland’s valuable marine areas and fisheries. It is important that these are protected by detecting breaches of fisheries regulations by monitoring and inspection at sea and in ports, and then reporting as appropriate to the prosecuting authorities, and by providing intelligence on fishing activity in the sea areas around Scotland. Comprehensive guidance on all relevant issues, and particularly Illegal, Unreported and Unregulated (IUU) fishing and Catch Certificates can be found here: </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D42cda13ccb%26e%3Df689d769a3"><span data-dcnode-id="379" instrument_node="">guidance</span></a><span data-dcnode-id="377" instrument_node="">.</span></span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
</span><span data-dcnode-id="372" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="373" instrument_node="">&nbsp;</span></span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
</span><span data-dcnode-id="367" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">The Northern Ireland Protocol</span></strong></span><br data-dcnode-id="366"><span data-dcnode-id="365" instrument_node="">
</span><span data-dcnode-id="363" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="364" instrument_node="">&nbsp;</span></span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">
</span><span data-dcnode-id="353" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="360" instrument_node="">The UK government recently published first a ‘</span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Debc9a8551c%26e%3Df689d769a3"><span data-dcnode-id="359" instrument_node="">command paper</span></a><span data-dcnode-id="357" instrument_node="">’ on the NI border, then the </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9582093496%26e%3Df689d769a3"><span data-dcnode-id="356" instrument_node="">NI Business Guidance</span></a><span data-dcnode-id="354" instrument_node="">, which is intended to outline some of the requirements for the movement of goods between Great Britain and Northern Ireland. The guidance includes a section on moving consignments of fish from GB to NI, and for GB vessels landing fish directly into NI. Other aspects of the operation of the Northern Ireland Protocol are still subject to the outcome of negotiations. The working assumption is that Export Health Certificates (EHCs) will be required for trade in products of animal origin between GB and NI. Further guidance will be issued in due course.</span></span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
</span><span data-dcnode-id="349" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="350" instrument_node="">&nbsp;</span></span><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">
</span><span data-dcnode-id="344" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">MMO survey </span></strong></span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">
</span><span data-dcnode-id="340" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="341" instrument_node="">&nbsp;</span></span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">
</span><span data-dcnode-id="333" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="337" instrument_node="">The Marine Management Organisation has just launched a survey with registered users of the Catch Certificate system. MMO is only going to contact its English registered users, but there is an expectation that Scottish registered users should also get involved in the survey – and we would urge you to do so. The link to the survey is </span><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D73e92b1935%26e%3Df689d769a3"><span data-dcnode-id="336" instrument_node="">here</span></a><span data-dcnode-id="334" instrument_node="">.</span></span><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node="">

</span><span data-dcnode-id="316" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="317" instrument_node="">&nbsp;</span></span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">
</span><span data-dcnode-id="309" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="313" instrument_node="">Seafish has produced </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D0eee5893ba%26e%3Df689d769a3"><span data-dcnode-id="312" instrument_node="">guidance</span></a><span data-dcnode-id="310" instrument_node=""> that will help prepare seafood businesses for the end of the transition period. It focusses on the day-to-day scenarios likely to be encountered. This includes food safety, traceability and trade, but does not cover issues arising from the UK’s future relationship with the EU.</span></span><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">

</span><span data-dcnode-id="289" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="293" instrument_node="">As Seafood Scotland notes “In light of the imminent departure of the United Kingdom from the European Union, it is essential that actions are taken by the Seafood industry to ensure continued success, deal or no deal”. The </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da3fd3ca58b%26e%3Df689d769a3"><span data-dcnode-id="292" instrument_node="">website</span></a><span data-dcnode-id="290" instrument_node=""> contains helpful information and links.</span></span></p><span data-dcnode-id="287" instrument_node="">
