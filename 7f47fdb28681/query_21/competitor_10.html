</span><article class="post-4679 page type-page status-publish hentry" data-dcnode-id="274" id="post-4679"><span data-dcnode-id="7169" instrument_node="">
</span><h1 data-dcnode-id="7167" style="font-size: 30px;letter-spacing: 1px;padding: 0; text-align: left; margin-bottom: 20px; color: #9F9861;"><span data-dcnode-id="7168" instrument_node="">Brexit</span></h1><span data-dcnode-id="7166" instrument_node="">
</span><h2 data-dcnode-id="7162"><strong data-dcnode-id="7163"><span data-dcnode-id="7164" style="color: #000080;"><span data-dcnode-id="7165" instrument_node="">Brexit Working Group Refocused as PISCES Forum</span></span></strong></h2><span data-dcnode-id="7161" instrument_node="">
</span><p data-dcnode-id="7156"><span data-dcnode-id="7160" instrument_node="">For information on the new PISCES Forum, Terms of Reference and meeting dates, check out our new PISCES </span><a data-dcnode-id="7158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seafoodscotland.org/brexit/pisces/"><span data-dcnode-id="7159" instrument_node="">page</span></a><span data-dcnode-id="7157" instrument_node="">.</span></p><span data-dcnode-id="7155" instrument_node="">
</span><hr data-dcnode-id="7154"><span data-dcnode-id="7153" instrument_node="">
</span><p data-dcnode-id="7149"><span data-dcnode-id="7150" style="font-size: 18pt; color: #000080;"><strong data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">Export Health Certificates from 15 January 2022</span></strong></span></p><span data-dcnode-id="7148" instrument_node="">
</span><p data-dcnode-id="7143"><span data-dcnode-id="7147" instrument_node="">Information on the changes to Export Health Certificates can be found </span><a data-dcnode-id="7145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seafoodscotland.org/brexit/export-health-certificates-from-15-january-2022/"><span data-dcnode-id="7146" instrument_node="">here</span></a><span data-dcnode-id="7144" instrument_node="">.</span></p><span data-dcnode-id="7142" instrument_node="">
</span><hr data-dcnode-id="7141"><span data-dcnode-id="7140" instrument_node="">
</span><p data-dcnode-id="7136"><span data-dcnode-id="7137" style="font-size: 18pt; color: #000080;"><strong data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">Latest webinars now available to view !</span></strong></span></p><span data-dcnode-id="7135" instrument_node="">
</span><p data-dcnode-id="7131"><span data-dcnode-id="7134" instrument_node="">VAT into Europe, November 2021 –</span><a data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/MMzXAaJUONY"><span data-dcnode-id="7133" instrument_node="">https://youtu.be/Yp0-J-Fp0j8</span></a></p><span data-dcnode-id="7130" instrument_node="">
</span><p data-dcnode-id="7126"><span data-dcnode-id="7129" instrument_node="">Export Health Certification, December 2021 –&nbsp;</span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/ly61IkNtva4"><span data-dcnode-id="7128" instrument_node="">https://youtu.be/bgrbHK01pCc</span></a></p><span data-dcnode-id="7125" instrument_node="">
</span><p data-dcnode-id="7120"><span data-dcnode-id="7124" instrument_node="">Export Health Certification, December 2021 – Presentation available </span><a data-dcnode-id="7122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seafoodscotland.org/wp-content/uploads/2021/12/EHC-PRESENTATION-15-DEC-2021.pdf"><span data-dcnode-id="7123" instrument_node="">here</span></a><span data-dcnode-id="7121" instrument_node="">.</span></p><span data-dcnode-id="7119" instrument_node="">
</span><p data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">As we know we have come at the end of the transition period and since 1st January we have become an independent coastal state. A lot of information is in the public domain and a lot of organisations are issuing guidance. Seafood Scotland has&nbsp;set up a Brexit Working Group and will work through the key issues with stakeholders and provide all the information you require to continue to trade on. Seafood Scotland and other key&nbsp;stakeholders will work together to provide easy to follow guidance, webinars and a forum to highlight&nbsp;issues and concerns that are not being addressed or where&nbsp;there is no clear guidance.</span></p><span data-dcnode-id="7116" instrument_node="">
</span><div data-dcnode-id="7090" style="padding: 30px 0; text-align: center; border-top: 1px solid #0e3160; border-bottom: 1px solid #0e3160; margin: 30px 0;"><span data-dcnode-id="7115" instrument_node="">
</span><h2 data-dcnode-id="7112" style="text-align: left;"><span data-dcnode-id="7113" style="color: #000080;"><span data-dcnode-id="7114" instrument_node="">EMERGENCY CONTACT DETAILS</span></span></h2><span data-dcnode-id="7111" instrument_node="">
</span><p data-dcnode-id="7105"><span data-dcnode-id="7106" style="font-size: 12pt;"><span data-dcnode-id="7110" instrument_node="">For enquiries relating to export issues such as&nbsp; goods stuck at port, please redirect your email to APHA at&nbsp;</span><a data-dcnode-id="7108" href="mailto:exports@apha.gov.uk" rel="noopener" target="_blank" title="mailto:exports@apha.gov.uk"><span data-dcnode-id="7109" instrument_node="">exports@apha.gov.uk</span></a><span data-dcnode-id="7107" instrument_node="">&nbsp;or, you can contact them directly on 03000 200 301.</span></span></p><span data-dcnode-id="7104" instrument_node="">
</span><p data-dcnode-id="7098"><span data-dcnode-id="7099" style="font-size: 12pt;"><span data-dcnode-id="7103" instrument_node="">The inbox </span><a data-dcnode-id="7101" href="mailto:MarineFisheries.PreparednessCentre@defra.gov.uk"><span data-dcnode-id="7102" instrument_node="">MarineFisheries.PreparednessCentre@defra.gov.uk</span></a><span data-dcnode-id="7100" instrument_node=""> will&nbsp; be continually monitored.&nbsp;</span></span></p><span data-dcnode-id="7097" instrument_node="">
</span><p data-dcnode-id="7092"><span data-dcnode-id="7093" style="font-size: 12pt;"><span data-dcnode-id="7096" instrument_node="">For all other emergencies, please contact Alastair Kennedy on&nbsp; 07800 918038 or&nbsp;</span><a data-dcnode-id="7094" href="mailto:Alastair.kennedy@seafoodscotland.org"><span data-dcnode-id="7095" instrument_node="">Alastair.kennedy@seafoodscotland.org</span></a></span></p><span data-dcnode-id="7091" instrument_node="">
</span></div><span data-dcnode-id="7089" instrument_node="">
</span><p data-dcnode-id="7085"><span data-dcnode-id="7086" style="color: #000080;"><strong data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">EXPORT HEALTH CERTIFICATION CHANGES&nbsp;</span></strong></span></p><span data-dcnode-id="7084" instrument_node="">
</span><p data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">New health certification rules which will apply to seafood exports from GB to the European Union will be mandatory from 15th January 2022. From this date the use of new Export Health Certificates (EHCs) will be required for fish, crustaceans and molluscs.</span></p><span data-dcnode-id="7081" instrument_node="">
</span><p data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">For more information on these changes, see our Export Health Certification page.</span></p><span data-dcnode-id="7078" instrument_node="">
</span><div data-dcnode-id="7060" style="padding: 30px 0; text-align: center; border-top: 1px solid #0e3160; border-bottom: 1px solid #0e3160; margin: 30px 0;"><span data-dcnode-id="7077" instrument_node="">
</span><hr data-dcnode-id="7076"><span data-dcnode-id="7075" instrument_node="">
</span><h2 data-dcnode-id="7072" style="text-align: left;"><span data-dcnode-id="7073" style="color: #000080;"><span data-dcnode-id="7074" instrument_node="">Seafood Scotland Brexit Advisory Service</span></span></h2><span data-dcnode-id="7071" instrument_node="">
</span><p data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">This service provides tailored one-to-one advice and support on Brexit related issues for seafood businesses in Scotland. The service is provided by Brexit specialists who will provide immediate support and advice to businesses, supported by a number of expert seafood trade advisors.</span></p><span data-dcnode-id="7068" instrument_node="">
</span><p data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">The service can be accessed by email</span></p><span data-dcnode-id="7065" instrument_node="">
</span><p data-dcnode-id="7062"><a data-dcnode-id="7063" href="mailto:enquiries@seafoodscotland.org" style="display: inline-block; color: #fff; border-radius: 10px; padding: 10px 25px; background-color: #0e3160;"><span data-dcnode-id="7064" instrument_node="">Get in touch</span></a></p><span data-dcnode-id="7061" instrument_node="">
</span></div><span data-dcnode-id="7059" instrument_node="">
</span><div data-dcnode-id="6986" style="padding: 0 0 30px 0; text-align: center; border-bottom: 1px solid #0e3160; margin: 0 0 30px 0;"><span data-dcnode-id="7058" instrument_node="">

</span><h3 class="cv_title" data-dcnode-id="6975" data-item="1" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="6976" instrument_node="">September 2021 Update</span></h3><span data-dcnode-id="6974" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-1" data-dcnode-id="6913" style="display: none;"><span data-dcnode-id="6973" instrument_node="">
</span><br data-dcnode-id="6972" style="clear: both;"><span data-dcnode-id="6971" instrument_node="">
</span><h4 data-dcnode-id="6969" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6970" instrument_node="">23 September</span></h4><span data-dcnode-id="6968" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="6915" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="6967" instrument_node="">
</span><h3 data-dcnode-id="6965"><span data-dcnode-id="6966" instrument_node="">Calendar Month Supplier Declaration- Processors Sending Product to EU Through Hubs</span></h3><span data-dcnode-id="6964" instrument_node="">
</span><p data-dcnode-id="6959"><span data-dcnode-id="6963" instrument_node="">The guidance on Export Health Certification for Products of Animal Origin away from the Premises of Origin &lt;</span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apha.defra.gov.uk/external-operations-admin/library/documents/exports/ET197.pdf"><span data-dcnode-id="6962" instrument_node="">http://apha.defra.gov.uk/external-operations-admin/library/documents/exports/ET197.pdf</span></a><span data-dcnode-id="6960" instrument_node="">&gt; (ET197) released by DEFRA, allows the Supplier Declarations to be valid for a whole calendar month.</span></p><span data-dcnode-id="6958" instrument_node="">
</span><p data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">To facilitate suppliers in making the transition to the new format, we have attached 3 documents all which can be downloaded.</span></p><span data-dcnode-id="6955" instrument_node="">
</span><ol data-dcnode-id="6944"><span data-dcnode-id="6954" instrument_node="">
</span><li data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">A ‘blank’ version of the new Calendar Month Supplier Declaration Template ( word format ) to be used by Suppliers to submit future Declarations</span></li><span data-dcnode-id="6951" instrument_node="">
</span><li data-dcnode-id="6949"><span data-dcnode-id="6950" instrument_node="">A completion guidance document, Calendar Month Supplier Declaration Completion Guidance – Griesham Ltd (Fictitious company)Yellow Coloured references relate to existing and ongoing information elementsBlue Coloured references relate to elements which are additional, have changed or contain specific requirements</span></li><span data-dcnode-id="6948" instrument_node="">
</span><li data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">A completed sample of the new Calendar Month Supplier Declaration – John Allan Ltd (Fictitious company)</span></li><span data-dcnode-id="6945" instrument_node="">
</span></ol><span data-dcnode-id="6943" instrument_node="">
</span><p data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">All processors using the hubs are encouraged to begin using the new Calendar Month Supplier Declaration format for their October 2021 submission (can be submitted from 24th September 2021).</span></p><span data-dcnode-id="6940" instrument_node="">
</span><ul data-dcnode-id="6932"><span data-dcnode-id="6939" instrument_node="">
</span><li data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">From 1st October 2021, our Food Standards Scotland Certifying Officers will work with the seafood export Hubs to support feedback to suppliers regarding Supplier Declarations which do not conform to the new formats defined above. Note one supplier declaration is required for each hub used.</span></li><span data-dcnode-id="6936" instrument_node="">
</span><li data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">From 1st November 2021, products may face delay in shipping if the new supplier format is not submitted. Declaration can be submitted from the 23rd of October.</span></li><span data-dcnode-id="6933" instrument_node="">
</span></ul><span data-dcnode-id="6931" instrument_node="">
</span><p data-dcnode-id="6929"><span data-dcnode-id="6930" instrument_node="">Market research has shown positive feedback from processors that this system will help their administration process.</span></p><span data-dcnode-id="6928" instrument_node="">
</span><p data-dcnode-id="6926"><span data-dcnode-id="6927" instrument_node="">If you have any enquiries, please contact Alastair Kennedy or Steve Galloway at:</span></p><span data-dcnode-id="6925" instrument_node="">
</span><p data-dcnode-id="6921"><span data-dcnode-id="6924" instrument_node="">Alastair.kennedy@seafoodscotland.org</span><br data-dcnode-id="6923"><span data-dcnode-id="6922" instrument_node="">
07800 918038</span></p><span data-dcnode-id="6920" instrument_node="">

</span><div data-dcnode-id="6584" style="width: 100%; float: left; margin: 0 0 10px 0; padding: 0 0 10px 0; border-bottom: 1px solid #0e3160;"><span data-dcnode-id="6909" instrument_node="">
</span><h3 class="cv_title" data-dcnode-id="6907" data-item="2" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="6908" instrument_node="">June 2021 Update</span></h3><span data-dcnode-id="6906" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-2" data-dcnode-id="6586" style="display: none;"><span data-dcnode-id="6905" instrument_node="">
</span><br data-dcnode-id="6904" style="clear: both;"><span data-dcnode-id="6903" instrument_node="">
</span><h4 data-dcnode-id="6901" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6902" instrument_node="">18th June</span></h4><span data-dcnode-id="6900" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="6770" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="6899" instrument_node="">
</span><h3 data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">Webinar: A focus on the retailers recording</span></h3><span data-dcnode-id="6896" instrument_node="">
</span><p data-dcnode-id="6888"><span data-dcnode-id="6895" instrument_node="">For those who couldn’t attend ‘A Focus on the Retailers’ exploring the performances of Tesco and The Co-op in Scotland here is the webinar</span><em data-dcnode-id="6891"><a data-dcnode-id="6893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dd141aacd30%26e%3Df689d769a3"><span data-dcnode-id="6894" instrument_node="">here</span></a><span data-dcnode-id="6892" instrument_node=""> &nbsp;</span></em><br data-dcnode-id="6890"><span data-dcnode-id="6889" instrument_node="">
Listen to&nbsp;Lesley Ann Gray of Kantar sharing market insight&nbsp;alongside Amanda Brown providing some wider GB market context on both retailers.</span></p><span data-dcnode-id="6887" instrument_node="">
</span><h3 data-dcnode-id="6884"><strong data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">New EHCs from 21 August 2021</span></strong></h3><span data-dcnode-id="6883" instrument_node="">
</span><p data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">The EU is making changes to its laws, which means&nbsp;it is necessary to make updates to Export Health Certificates (EHCs) and Notes for Guidance used to export goods to the EU. If you are a GB trader, who exports certain animals, germinal products and products of animal origin, these changes will affect you.</span></p><span data-dcnode-id="6880" instrument_node="">
</span><p data-dcnode-id="6878"><span data-dcnode-id="6879" instrument_node="">GB traders exporting their goods to the EU will need to use the new EHCs from 21 August 2021. Current EHCs signed before 21 August may be used until October for goods on route to the EU.</span></p><span data-dcnode-id="6877" instrument_node="">
</span><p data-dcnode-id="6872"><span data-dcnode-id="6876" instrument_node="">In April, Defra made available new EHCs for composite products, some POAO and a new ‘private attestation for composite products exempt from certification by an Official Vet or a Food Competent Certifying Officer (FCCO). You can find further information </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D267aafb523%26e%3Df689d769a3"><span data-dcnode-id="6875" instrument_node="">here</span></a><span data-dcnode-id="6873" instrument_node="">.</span></p><span data-dcnode-id="6871" instrument_node="">
</span><p data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">Defra are now preparing to publish the remainder of the new EHCs and their associated Notes for Guidance. To help traders and exporters familiarise themselves in advance, around 30 of the new EHCs for some of the most commonly traded commodities will be available for viewing on Form Finder from 30 June 2021. The remaining EHCs will follow on 29 July 2021.</span></p><span data-dcnode-id="6868" instrument_node="">
</span><p data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">Defra will also issue detailed guidance and a summary document highlighting the key changes that you need to know about and will continue to work with the EU to provide clarity on any outstanding issues.</span></p><span data-dcnode-id="6865" instrument_node="">
</span><p data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">With each release of EHCs, Defra will provide support to Traders with webinars and live Q&amp;A sessions with an expert panel. We&nbsp;will provide more information nearer the time.</span></p><span data-dcnode-id="6862" instrument_node="">
</span><p data-dcnode-id="6856"><strong data-dcnode-id="6859"><u data-dcnode-id="6860"><span data-dcnode-id="6861" instrument_node="">Key Changes</span></u></strong><br data-dcnode-id="6858"><span data-dcnode-id="6857" instrument_node="">
The new certificates represent changes for all commodities, but the most significant changes affect: Composites, Germinal Products, Meat Products, Fish and Animals from Confined Establishments. Defra will provide webinars where there are significant changes for commodities, as well as summary documents for use by traders.</span></p><span data-dcnode-id="6855" instrument_node="">
</span><p data-dcnode-id="6852"><strong data-dcnode-id="6853"><span data-dcnode-id="6854" instrument_node="">Write to your MP re the Driver Shortage – Prewritten Letter, it only take a couple of seconds to send it.</span></strong></p><span data-dcnode-id="6851" instrument_node="">
</span><h3 data-dcnode-id="6848"><strong data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">The Road Haulage Association has asked us to share this with the industry</span></strong></h3><span data-dcnode-id="6847" instrument_node="">
</span><p data-dcnode-id="6844"><em data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">The shortage of HGV drivers in the UK is at crisis point with a combination of factors, many of them long-standing, contributing to the current situation including reduced access to labour because of COVID and Brexit, the loss of ability to train and test new drivers and the introduction of IR-35</span></em></p><span data-dcnode-id="6843" instrument_node="">
</span><p data-dcnode-id="6833"><em data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">The industry needs immediate access to the global labour market so that we can access a workforce that can live and work in the UK more easily and encourage those that have left to return. For this, we need the Home Office to add HGV drivers to the UK Shortage Occupation List and consider a Seasonal or Temporary Visa Scheme for qualified lorry drivers, like the one that is currently available to farm workers.</span></em><br data-dcnode-id="6840"><span data-dcnode-id="6839" instrument_node="">
</span><em data-dcnode-id="6834"><span data-dcnode-id="6838" instrument_node="">Operators are encouraged to write to their MP </span><a data-dcnode-id="6836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Defa462189b%26e%3Df689d769a3"><span data-dcnode-id="6837" instrument_node="">using this quick and easy tool</span></a><span data-dcnode-id="6835" instrument_node=""> to request their support for these asks. The letter has already been written for you, all you need to do is enter a few brief details so that we can identify who your MP is and the system will then send the letter to the appropriate MP. The more letters sent, the more pressure that will be applied to Government and so this is a really important exercise that will only take a few short moments to complete.</span></em></p><span data-dcnode-id="6832" instrument_node="">
</span><h3 data-dcnode-id="6828"><span data-dcnode-id="6831" instrument_node="">&nbsp;</span><strong data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">UK-EU fisheries agreement written record</span></strong></h3><span data-dcnode-id="6827" instrument_node="">
</span><p data-dcnode-id="6822"><span data-dcnode-id="6826" instrument_node="">Following on from the </span><a data-dcnode-id="6824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D95ec6cad2c%26e%3Df689d769a3"><span data-dcnode-id="6825" instrument_node="">announcement</span></a><span data-dcnode-id="6823" instrument_node=""> yesterday on the UK-EU fisheries agreement please find the following pages which lay out the written record of the agreement and statements from ministers.</span></p><span data-dcnode-id="6821" instrument_node="">
</span><p data-dcnode-id="6809"><span data-dcnode-id="6820" instrument_node="">–</span><a data-dcnode-id="6818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dd01c217851%26e%3Df689d769a3"><span data-dcnode-id="6819" instrument_node="">Fisheries: consultations between the UK and the EU in 2021 Policy paper</span></a><br data-dcnode-id="6817"><span data-dcnode-id="6816" instrument_node="">
–</span><a data-dcnode-id="6814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da221f6cecd%26e%3Df689d769a3"><span data-dcnode-id="6815" instrument_node="">Minister Prentis Written Ministerial Statement</span></a><br data-dcnode-id="6813"><span data-dcnode-id="6812" instrument_node="">
</span><a data-dcnode-id="6810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D85ef85d29e%26e%3Df689d769a3"><span data-dcnode-id="6811" instrument_node="">-Lord Benyon Written Ministerial Statement</span></a></p><span data-dcnode-id="6808" instrument_node="">
</span><h3 data-dcnode-id="6805"><strong data-dcnode-id="6806"><span data-dcnode-id="6807" instrument_node="">Get involved with Career Ready </span></strong></h3><span data-dcnode-id="6804" instrument_node="">
</span><p data-dcnode-id="6800"><span data-dcnode-id="6803" instrument_node="">Career Ready is looking for organisations to provide mentors and paid internships for students across Scotland, changing young people’s lives in the process.</span><br data-dcnode-id="6802"><span data-dcnode-id="6801" instrument_node="">
Career Ready is a UK wide social mobility charity that helps to raise the aspirations of school students in S5 and S6 with limited social capital and access to professional networks from the world of work. The Career Ready programme is an eighteen month employer/ volunteer employee led programme that gives students real experience of the world of work, supporting them with:</span></p><span data-dcnode-id="6799" instrument_node="">
</span><ul data-dcnode-id="6788"><span data-dcnode-id="6798" instrument_node="">
</span><li data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">A mentor from the world of work over two years, (meet once per month for 1-1.5 hours)</span></li><span data-dcnode-id="6795" instrument_node="">
</span><li data-dcnode-id="6793"><span data-dcnode-id="6794" instrument_node="">A four-week paid internship at the end of their first year on the programme, in the workplace of their mentor</span></li><span data-dcnode-id="6792" instrument_node="">
</span><li data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">Six masterclasses focussing on Skills for Career Success learning outcomes, and delivered by employer volunteers.</span></li><span data-dcnode-id="6789" instrument_node="">
</span></ul><span data-dcnode-id="6787" instrument_node="">
</span><p data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">The Career Ready programme can provide your employees with an opportunity to develop their own skills and networks. It can also help you to actively contribute towards the Scottish Government’s Young Persons Guarantee, Developing the Young Workforce and fair work policies and pledges as part of the employability and skills agenda.</span></p><span data-dcnode-id="6784" instrument_node="">
</span><p data-dcnode-id="6776"><span data-dcnode-id="6783" instrument_node="">More details are on their </span><a data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D556f4eedfa%26e%3Df689d769a3"><span data-dcnode-id="6782" instrument_node="">website</span></a><span data-dcnode-id="6780" instrument_node=""> or you can get in touch with </span><a data-dcnode-id="6778" href="mailto:lindsey.docherty@careerready.com"><span data-dcnode-id="6779" instrument_node="">Lindsey Docherty</span></a><span data-dcnode-id="6777" instrument_node=""> who would be happy to have a conversation.</span></p><span data-dcnode-id="6775" instrument_node="">
</span><br data-dcnode-id="6774" style="clear: both;"><span data-dcnode-id="6773" instrument_node="">

</span><h4 data-dcnode-id="6765" data-subitem="2" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6766" instrument_node="">4th June</span></h4><span data-dcnode-id="6764" instrument_node="">
</span><div class="subitems subitem-2" data-dcnode-id="6588" style="width: 100%; float: left; margin-top: 10px; display: none;"><span data-dcnode-id="6763" instrument_node="">
</span><p data-dcnode-id="6759"><span data-dcnode-id="6762" instrument_node="">Two significant updates impacting the seafood sector this week is the announcement of the UK and EU reaching an agreement on fishing quota, and the other is that Portugal has been put back onto the amber list and no new companies have been put on the green list.</span><br data-dcnode-id="6761"><span data-dcnode-id="6760" instrument_node="">
This restriction of tourism in Europe and no sign of progress is a blow to many companies who trade into Europe hoping for the upturn in trade with tourism over the summer. Let’s hope the vaccine rollout continues at a pace throughout Europe and new variants are under control which would allow tourism to start opening back up</span></p><span data-dcnode-id="6758" instrument_node="">
</span><h2 data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">Food Crime</span></h2><span data-dcnode-id="6755" instrument_node="">
</span><p data-dcnode-id="6747"><span data-dcnode-id="6754" instrument_node="">The Scottish Food Crime &amp; Incidents Unit (SFCIU) within Food Standard Scotland is requesting&nbsp;any intelligence you hold that might relate to food crime occurring in the </span><a data-dcnode-id="6752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D6d6b480134%26e%3Df689d769a3"><span data-dcnode-id="6753" instrument_node="">White Fish</span></a><span data-dcnode-id="6751" instrument_node=""> and/or </span><a data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D2ea0131d39%26e%3Df689d769a3"><span data-dcnode-id="6750" instrument_node="">Salmon</span></a><span data-dcnode-id="6748" instrument_node=""> supply chains.</span></p><span data-dcnode-id="6746" instrument_node="">
</span><p data-dcnode-id="6744"><span data-dcnode-id="6745" instrument_node="">Fish was identified as a Scottish Food Crime priority and these intelligence requirements are part of developing an enhanced picture of food crime within these supply chains. SFCIU would be grateful if you can consider the two requirements and provide any intelligence or information that might be relevant.</span></p><span data-dcnode-id="6743" instrument_node="">
</span><p data-dcnode-id="6735"><span data-dcnode-id="6742" instrument_node="">The Intelligence Requirements for </span><a data-dcnode-id="6740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dc9dcf11f53%26e%3Df689d769a3"><span data-dcnode-id="6741" instrument_node="">White Fish</span></a><span data-dcnode-id="6739" instrument_node=""> and </span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D8f79eb6fa1%26e%3Df689d769a3"><span data-dcnode-id="6738" instrument_node="">Salmon</span></a><span data-dcnode-id="6736" instrument_node=""> highlight a number of areas that would be of interest for gathering intelligence or developing a fuller picture on the vulnerabilities that can be exploited by criminals. They would welcome any inputs reflecting your experience and where there are significant challenges in the supply chains.</span></p><span data-dcnode-id="6734" instrument_node="">
</span><p data-dcnode-id="6720"><strong data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">Please send all emails regarding intelligence to&nbsp;</span></strong><a data-dcnode-id="6729" href="mailto:foodcrime@fss.scot"><strong data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">foodcrime@fss.scot</span></strong></a><span data-dcnode-id="6728" instrument_node="">&nbsp;by&nbsp;</span><strong data-dcnode-id="6722"><u data-dcnode-id="6723"><span data-dcnode-id="6727" instrument_node="">23</span><sup data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">rd</span></sup><span data-dcnode-id="6724" instrument_node=""> June</span></u></strong><span data-dcnode-id="6721" instrument_node="">.</span></p><span data-dcnode-id="6719" instrument_node="">
</span><h2 data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">Canada and Mexico Trade Input Required</span></h2><span data-dcnode-id="6716" instrument_node="">
</span><p data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">DIT launched the call for input regarding the UK’s trade with Canada and Mexico ahead of upcoming trade negotiations, to build on our existing trade deals. This is an opportunity to provide evidence on behalf of your business or sector within the UK seafood industry and to help inform the Government’s approach to these negotiations.</span></p><span data-dcnode-id="6713" instrument_node="">
</span><p data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">For context (using 2017/18/19 averages from HMRC trade data, aligned to European Market Observatory for Fisheries and Aquaculture):</span></p><span data-dcnode-id="6710" instrument_node="">
</span><p data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">The UK exports around £90k of seafood to Mexico per year (mainly salmon), and imports around £1.18m (mainly prawns and fish ‘not elsewhere specified’).</span></p><span data-dcnode-id="6707" instrument_node="">
</span><p data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">The UK exports around £13m of seafood to Canada each year (mainly salmon and other fish fillets, including battered product), and imports around £97m (mainly prawns, salmon and lobsters).</span></p><span data-dcnode-id="6704" instrument_node="">
</span><p data-dcnode-id="6699"><span data-dcnode-id="6703" instrument_node="">If this is of interest, please follow </span><a data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dab17edab53%26e%3Df689d769a3"><span data-dcnode-id="6702" instrument_node="">this</span></a><span data-dcnode-id="6700" instrument_node=""> link to fill in the online forms, the consultation closes on 12th July.</span></p><span data-dcnode-id="6698" instrument_node="">
</span><h2 data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">EU Settlement Scheme</span></h2><span data-dcnode-id="6695" instrument_node="">
</span><p data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">To stay in the UK, EU citizens, including children, who were living in the UK by 31 December 2020 and who do not have indefinite leave to remain must apply to the UK Government’s EU Settlement Scheme. The deadline for applications is fast approaching, with the scheme closing on 30 June 2021. Non-EU family members can also apply. If you have an EU permanent residence card or an EU residence certificate, you will still need to apply. If you do not apply, you may lose your right to live, work and study in the UK.</span></p><span data-dcnode-id="6692" instrument_node="">
</span><p data-dcnode-id="6687"><span data-dcnode-id="6691" instrument_node="">A package of support is available for anyone who needs additional help. The Stay in Scotland toolkit includes information on the EU Settlement Scheme, details of the application process, and links to other resources. Full details can be found at </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dbcc3a786e1%26e%3Df689d769a3"><span data-dcnode-id="6690" instrument_node="">www.mygov.scot/stayinscotland</span></a><span data-dcnode-id="6688" instrument_node="">.</span></p><span data-dcnode-id="6686" instrument_node="">
</span><p data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">Citizens Advice Scotland operate a free national helpline as part of their EU Citizen Support Service. You can receive information, advice and support for applying to the EU Settlement Scheme by calling the freephone helpline on 0800 916 9847. The service has qualified advisers who will help you apply to the EU Settlement Scheme. Citizens Advice Scotland have two solicitors who can help people with more complex immigration histories.</span></p><span data-dcnode-id="6683" instrument_node="">
</span><p data-dcnode-id="6679"><span data-dcnode-id="6682" instrument_node="">The legal charity, JustRight Scotland, have published a series of factsheets on EU citizens’ rights. These factsheets detail your rights to vote and work, and to access healthcare, education, housing and benefits in Scotland. These factsheets can be found at </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D997e1bf928%26e%3Df689d769a3"><span data-dcnode-id="6681" instrument_node="">www.justcitizens.scot/EU/</span></a></p><span data-dcnode-id="6678" instrument_node="">
</span><p data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">If you haven’t done so already, please apply to the scheme. If you have colleagues, neighbours, friends or family members who are from the EU, please share these ‘Stay in Scotland’ resources.</span></p><span data-dcnode-id="6675" instrument_node="">
</span><h3 data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">COMPANY DATA ON TRACES Webinar 9th June from 2-3pm</span></h3><span data-dcnode-id="6672" instrument_node="">
</span><p data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">TRACES is the European Commission’s online platform for the sanitary and phytosanitary certification required for the importation of live animals and animal products into the European Union. The TRACES system streamlines certification and all linked entry procedures in a fully digitised process. When you export, the details held on the TRACES system about your company and what it is authorised to export must match the paperwork accompanying your shipment for entry to be permitted into the EU.</span></p><span data-dcnode-id="6669" instrument_node="">
</span><p data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">Recently we have received a number of enquiries from companies/processors who have experienced issues at the BCP where information on TRACES has not matched the paperwork. Companies involved were not sure how their details could then be updated or amended on TRACES.</span></p><span data-dcnode-id="6666" instrument_node="">
</span><p data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">To help with this, Seafood Scotland will be running a webinar on 9th June from 2-3pm for all companies to join, to explain how the whole end to end process works for checking, updating or changing your details on TRACES, the different databases involved on the UK and EU sides, how these are linked, and the timings involved, to help reduce the chances of TRACES-related issues at the Border Control Post.</span></p><span data-dcnode-id="6663" instrument_node="">
</span><p data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">We have gathered a number of speakers from the competent authorities across the entire TRACES process responsible for monitoring, managing and inputting the data that is then used to update TRACES so that companies can be clear how this works and what you need to do to ensure your own information is complete and correct.</span></p><span data-dcnode-id="6660" instrument_node="">
</span><p data-dcnode-id="6655"><span data-dcnode-id="6659" instrument_node="">Click </span><a data-dcnode-id="6657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D43d67a24a0%26e%3Df689d769a3"><span data-dcnode-id="6658" instrument_node="">here</span></a><span data-dcnode-id="6656" instrument_node=""> to sign in to the webinar</span></p><span data-dcnode-id="6654" instrument_node="">
</span><h3 data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">Future routes to market webinar, 8 June 2021</span></h3><span data-dcnode-id="6651" instrument_node="">
</span><p data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">You are invited to join the North East Scotland Food &amp; Drink Network on 8 June (10.00am to 11.30am) for a future routes to market webinar. Consumer behaviour has shifted significantly over the past year. This webinar will provide insights for businesses on the changes and what they mean for new routes to market for food and drink producers.</span></p><span data-dcnode-id="6648" instrument_node="">
</span><p data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">Levercliff will present the findings of its latest consumer tracking survey and Spar Scotland will share its experience of changes in convenience retail.</span></p><span data-dcnode-id="6645" instrument_node="">
</span><p data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">The session will include a regional business case study and the opportunity for questions and answers with the speakers</span></p><span data-dcnode-id="6642" instrument_node="">
</span><p data-dcnode-id="6638"><span data-dcnode-id="6641" instrument_node="">Click here to register for this free webinar – </span><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D1bd2176f81%26e%3Df689d769a3"><span data-dcnode-id="6640" instrument_node="">ONE FDA Future routes to market webinar</span></a></p><span data-dcnode-id="6637" instrument_node="">
</span><p data-dcnode-id="6633"><strong data-dcnode-id="6634"><u data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">Our speakers</span></u></strong></p><span data-dcnode-id="6632" instrument_node="">
</span><p data-dcnode-id="6629"><strong data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">David Craig, Director, Levercliff</span></strong></p><span data-dcnode-id="6628" instrument_node="">
</span><p data-dcnode-id="6626"><span data-dcnode-id="6627" instrument_node="">David will share the findings of Levercliff’s latest consumer tracking survey. The survey has been following the changing habits of consumers since the start of the Covid-19 pandemic, with questions evolving as their habits have changed.</span></p><span data-dcnode-id="6625" instrument_node="">
</span><p data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">The survey results explore six key themes in detail: food to go habits; changes in brand and product choices; the likely continuation of online shopping; attitudes towards health and wellness; plus key attitudes around cooking behaviours and food delivery.</span></p><span data-dcnode-id="6622" instrument_node="">
</span><p data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">The presentation is future focussed and will help suppliers identify potential areas of focus for their food and drink business as we emerge from a period of sustained restrictions on everyday life.</span></p><span data-dcnode-id="6619" instrument_node="">
</span><p data-dcnode-id="6616"><strong data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">Stephen Brown, Head of Food-to-Go, Spar Scotland</span></strong></p><span data-dcnode-id="6615" instrument_node="">
</span><p data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">Stephen will share his views on how consumer shopping behaviours have changed in convenience retailing, the trends that have emerged and which ones may be set to stay. Stephen will expand on how they want to create destination stores by offering a differentiated range and where this might create opportunities.</span></p><span data-dcnode-id="6612" instrument_node="">
</span><p data-dcnode-id="6609"><strong data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">Anna Mitchell, Owner, Castleton Farm Shop and Café</span></strong></p><span data-dcnode-id="6608" instrument_node="">
</span><p data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Anna will share how the business has adapted and evolved its model and routes to market to service customers in response to major behaviour and market changes and what this means for the future of the business.</span></p><span data-dcnode-id="6605" instrument_node="">
</span><p data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">Priority is given to food and drink producers based in Aberdeen, Aberdeenshire or Moray.</span></p><span data-dcnode-id="6602" instrument_node="">
</span><p data-dcnode-id="6597"><span data-dcnode-id="6601" instrument_node="">For more information on the North East Scotland Food &amp; Drink Network, please email </span><a data-dcnode-id="6599" href="mailto:elizabeth.mathie@opportunitynortheast.com"><span data-dcnode-id="6600" instrument_node="">elizabeth.mathie@opportunitynortheast.com</span></a><span data-dcnode-id="6598" instrument_node="">.</span></p><span data-dcnode-id="6596" instrument_node="">
</span><p data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">The North East Food &amp; Drink Network is organised by Opportunity North East in partnership with Aberdeenshire Council and aims to support the growth of the region’s food and drink sector.</span></p><span data-dcnode-id="6593" instrument_node="">
</span><br data-dcnode-id="6592" style="clear: both;"><span data-dcnode-id="6591" instrument_node="">

</span><div data-dcnode-id="6327" style="width: 100%; float: left; margin: 0 0 10px 0; padding: 0 0 10px 0; border-bottom: 1px solid #0e3160;"><span data-dcnode-id="6582" instrument_node="">
</span><h3 class="cv_title" data-dcnode-id="6580" data-item="3" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="6581" instrument_node="">May 2021 Update</span></h3><span data-dcnode-id="6579" instrument_node="">

</span><br data-dcnode-id="6577" style="clear: both;"><span data-dcnode-id="6576" instrument_node="">
</span><h4 data-dcnode-id="6574" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6575" instrument_node="">28th May 2021</span></h4><span data-dcnode-id="6573" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="6331" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="6572" instrument_node="">
</span><h3 data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">Trading to EU Approval Status</span></h3><span data-dcnode-id="6569" instrument_node="">
</span><p data-dcnode-id="6564"><span data-dcnode-id="6568" instrument_node="">Businesses are being reminded that they can check their approval status and approved categories for export to the EU and find out their Trade Control and Expert System (TRACES) numbers on the </span><a data-dcnode-id="6566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D46ec68d58a%26e%3Df689d769a3"><span data-dcnode-id="6567" instrument_node="">Defra website.</span></a><span data-dcnode-id="6565" instrument_node=""> This number needs to be added to the Export Health Certificate for any products that are being exported and the approval needs to match the commodity being exported.</span></p><span data-dcnode-id="6563" instrument_node="">
</span><p data-dcnode-id="6558"><span data-dcnode-id="6562" instrument_node="">Fish exporters are also being advised that from today (21 May) they will be able to clone or copy a previously submitted Export Catch Certificate on the </span><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D1ac46d42c5%26e%3Df689d769a3"><span data-dcnode-id="6561" instrument_node="">Fish Export Service</span></a><span data-dcnode-id="6559" instrument_node="">. Users will also be able to clone a document while voiding the previously submitted version, which will significantly reduce the effort needed to correct a document.</span></p><span data-dcnode-id="6557" instrument_node="">
</span><h3 data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">A Guide to Selecting the Correct Commodity Codes for Exports to the EU</span></h3><span data-dcnode-id="6554" instrument_node="">
</span><p data-dcnode-id="6551"><u data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">Background</span></u></p><span data-dcnode-id="6550" instrument_node="">
</span><p data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">All goods that are traded internationally must be identified by a number. This number is known as the “commodity code”. It&nbsp; is also known as the&nbsp;“tariff classification” of the goods, or the “tariff number” because it is&nbsp;found in the&nbsp;UK Trade&nbsp;Tariff.</span></p><span data-dcnode-id="6547" instrument_node="">
</span><p data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">Seafood Scotland have developed a new guide to help determine commodity codes. It uses a searchable spreadsheet that allows product to be identified by key parameters such as Scientific Name, Fresh/Frozen, Gutted/Whole or commodity code. The searchable database can help to determine the 8 digit version code and there is also a further guide on how to find the other two digits to determine the 10 digit version of the code.</span></p><span data-dcnode-id="6544" instrument_node="">
</span><p data-dcnode-id="6539"><span data-dcnode-id="6543" instrument_node="">This guide can be found </span><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D7b6917cfcc%26e%3Df689d769a3"><span data-dcnode-id="6542" instrument_node="">here</span></a><span data-dcnode-id="6540" instrument_node="">.</span></p><span data-dcnode-id="6538" instrument_node="">
</span><p data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">**Please use the excel spreadsheet on the website for your search and do not download as the data on the website will be updated continually.</span></p><span data-dcnode-id="6535" instrument_node="">
</span><h3 data-dcnode-id="6533"><span data-dcnode-id="6534" instrument_node="">COVID-19 delays inaugural Seafood Expo Global/Seafood Processing Global in Barcelona</span></h3><span data-dcnode-id="6532" instrument_node="">
</span><p data-dcnode-id="6528"><span data-dcnode-id="6531" instrument_node="">The first edition of Seafood Expo Global/Seafood Processing Global to take place in Barcelona has been pushed back due to COVID-19.</span><br data-dcnode-id="6530"><span data-dcnode-id="6529" instrument_node="">
The 28th edition of the world’s largest seafood expo, which was scheduled to take place in Barcelona, Spain from 7 to 9 September, 2021, will now take place 26 to 28 April, 2022.</span></p><span data-dcnode-id="6527" instrument_node="">
</span><p data-dcnode-id="6522"><span data-dcnode-id="6526" instrument_node="">The 2022 edition of the event will take place at the Fira de Barcelona Gran Via venue, which was set to host the event in April 2021 after a move from Brussels, until the COVID-19 pandemic&nbsp;</span><a data-dcnode-id="6524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfd6d02f84f%26e%3Df689d769a3"><span data-dcnode-id="6525" instrument_node="">forced its postponement</span></a><span data-dcnode-id="6523" instrument_node="">&nbsp;to September.</span></p><span data-dcnode-id="6521" instrument_node="">
</span><p data-dcnode-id="6519"><span data-dcnode-id="6520" instrument_node="">“Keeping our customers’ best interest in mind is our top priority,” Diversified Communications Group Vice President Liz Plizga said in a press release. “After evaluation of suppliers and buyers’ concerns around the continued uncertainties caused by the ongoing COVID-19 situation worldwide, it became evident that 2021 would still be too soon to host an international event that would provide the global experience the seafood community would find valuable.”</span></p><span data-dcnode-id="6518" instrument_node="">
</span><p data-dcnode-id="6514"><span data-dcnode-id="6517" instrument_node="">Plizga said the complexities of the various COVID-19 regulations and governmental restrictions around the world “make it impossible to hold a large-scale global event in September 2021.”</span><br data-dcnode-id="6516"><span data-dcnode-id="6515" instrument_node="">
Diversified is looking forward to welcoming seafood industry professionals at the&nbsp;next edition of Seafood Expo Global in 2022, Plizga said.</span></p><span data-dcnode-id="6513" instrument_node="">
</span><p data-dcnode-id="6511"><span data-dcnode-id="6512" instrument_node="">“We are committed to Barcelona,” Plizga said. “We will continue working with Fira de Barcelona and the city to ensure we can host a valuable in-person event that will bring back, at the Gran Via venue in 2022, the international representation that makes Seafood Expo Global/Seafood Processing Global the global seafood marketplace and the largest seafood trade event in the world.”</span></p><span data-dcnode-id="6510" instrument_node="">
</span><p data-dcnode-id="6506"><span data-dcnode-id="6509" instrument_node="">Diversified said it is expecting around 29,000 industry professionals from 158 countries at its 2022 event, according to Diversified Communications Event Director Wynter Courmont.</span><br data-dcnode-id="6508"><span data-dcnode-id="6507" instrument_node="">
“We have already received contracts for the 2022 edition and strong participation interest from all sectors of the global seafood industry. We look forward to having the most successful first edition in the beautiful city of Barcelona, Spain,” Courmont said.</span></p><span data-dcnode-id="6505" instrument_node="">
</span><p data-dcnode-id="6501"><span data-dcnode-id="6504" instrument_node="">Courmont said Diversified will aim to provide events and other networking and business-related activities in the interim time before the 2022 event.</span><br data-dcnode-id="6503"><span data-dcnode-id="6502" instrument_node="">
“Until the 2022 edition in Barcelona, we will be exploring online event opportunities to connect suppliers and buyers together and keep the seafood community informed on the latest topics in the industry,” she said.</span></p><span data-dcnode-id="6500" instrument_node="">
</span><h3 data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">EU Settlement Scheme</span></h3><span data-dcnode-id="6497" instrument_node="">
</span><p data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">To stay in the UK, EU citizens, including children, who were living in the UK by 31 December 2020 and who do not have indefinite leave to remain must apply to the UK Government’s EU Settlement Scheme. The deadline for applications is fast approaching, with the scheme closing on 30 June 2021. Non-EU family members can also apply. If you have an EU permanent residence card or an EU residence certificate, you will still need to apply. If you do not apply, you may lose your right to live, work and study in the UK.</span></p><span data-dcnode-id="6494" instrument_node="">
</span><p data-dcnode-id="6489"><span data-dcnode-id="6493" instrument_node="">A package of support is available for anyone who needs additional help. The Stay in Scotland toolkit includes information on the EU Settlement Scheme, details of the application process, and links to other resources. Full details can be found at </span><a data-dcnode-id="6491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D137fed8848%26e%3Df689d769a3"><span data-dcnode-id="6492" instrument_node="">www.mygov.scot/stayinscotland</span></a><span data-dcnode-id="6490" instrument_node="">.</span></p><span data-dcnode-id="6488" instrument_node="">
</span><p data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">Citizens Advice Scotland operate a free national helpline as part of their EU Citizen Support Service. You can receive information, advice and support for applying to the EU Settlement Scheme by calling the freephone helpline on 0800 916 9847. The service has qualified advisers who will help you apply to the EU Settlement Scheme. Citizens Advice Scotland have two solicitors who can help people with more complex immigration histories.</span></p><span data-dcnode-id="6485" instrument_node="">
</span><p data-dcnode-id="6481"><span data-dcnode-id="6484" instrument_node="">The legal charity, JustRight Scotland, have published a series of factsheets on EU citizens’ rights. These factsheets detail your rights to vote and work, and to access healthcare, education, housing and benefits in Scotland. These factsheets can be found at </span><a data-dcnode-id="6482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D575078d284%26e%3Df689d769a3"><span data-dcnode-id="6483" instrument_node="">www.justcitizens.scot/EU/</span></a></p><span data-dcnode-id="6480" instrument_node="">
</span><p data-dcnode-id="6478"><span data-dcnode-id="6479" instrument_node="">If you haven’t done so already, please apply to the scheme. If you have colleagues, neighbours, friends or family members who are from the EU, please share these ‘Stay in Scotland’ resources.</span></p><span data-dcnode-id="6477" instrument_node="">
</span><h3 data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">COMPANY DATA ON TRACES Webinar 9th June from 2-3pm</span></h3><span data-dcnode-id="6474" instrument_node="">
</span><p data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">TRACES is the European Commission’s online platform for the sanitary and phytosanitary certification required for the importation of live animals and animal products into the European Union. The TRACES system streamlines certification and all linked entry procedures in a fully digitised process. When you export, the details held on the TRACES system about your company and what it is authorised to export must match the paperwork accompanying your shipment for entry to be permitted into the EU.</span></p><span data-dcnode-id="6471" instrument_node="">
</span><p data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">Recently we have received a number of enquires from companies/processors who have experienced issues at the BCP where information on TRACES has not matched the paperwork. Companies involved were not sure how their details could then be updated or amended on TRACES.</span></p><span data-dcnode-id="6468" instrument_node="">
</span><p data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">To help with this, Seafood Scotland will be running a webinar on 9th June from 2-3pm for all companies to join, to explain how the whole end to end process works for checking, updating or changing your details on TRACES, the different databases involved on the UK and EU sides, how these are linked, and the timings involved, to help reduce the chances of TRACES-related issues at the Border Control Post.</span></p><span data-dcnode-id="6465" instrument_node="">
</span><p data-dcnode-id="6458"><span data-dcnode-id="6464" instrument_node="">We have gathered a number of speakers from the competent authorities across the entire TRACES process responsible for monitoring, managing and inputting the data that is then used to update TRACES so that companies can be clear how this works and what you need to do to ensure your own information is complete and correct.</span><br data-dcnode-id="6463"><span data-dcnode-id="6462" instrument_node="">
Click </span><a data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D25f3e6a897%26e%3Df689d769a3"><span data-dcnode-id="6461" instrument_node="">here</span></a><span data-dcnode-id="6459" instrument_node=""> to sign in to the webinar</span></p><span data-dcnode-id="6457" instrument_node="">
</span><h3 data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">Retail Performance Webinar</span></h3><span data-dcnode-id="6454" instrument_node="">
</span><p data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">As part of the Scotland Food &amp; Drink Partnership, The Knowledge Bank is hosting the first in a series of webinars looking at retailer performance in Scotland.</span></p><span data-dcnode-id="6451" instrument_node="">
</span><p data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">A Focus on the Discounters will look at how Aldi and Lidl have built their stature in grocery with insight from Lesley Ann Gray of Kantar, who will provide an overview of their performances, and Lucy Husband, Director for Market Development and Business Engagement at Scotland Food &amp; Drink.</span></p><span data-dcnode-id="6448" instrument_node="">
</span><p data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">The webinar, hosted by Amanda Brown, will examine Aldi and Lidl’s paths to success as well as look at their current performances in Scotland and the dynamics currently driving those performances in the current Scottish grocery market.</span></p><span data-dcnode-id="6445" instrument_node="">
</span><p data-dcnode-id="6435"><span data-dcnode-id="6444" instrument_node="">Date: Wednesday 2 June</span><br data-dcnode-id="6443"><span data-dcnode-id="6442" instrument_node="">
Time: 10am – 11am</span><br data-dcnode-id="6441"><span data-dcnode-id="6440" instrument_node="">
Platform: Zoom</span><br data-dcnode-id="6439"><span data-dcnode-id="6438" instrument_node="">
</span><a data-dcnode-id="6436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D0ec71b58cd%26e%3Df689d769a3"><span data-dcnode-id="6437" instrument_node="">https://us02web.zoom.us/webinar/register/WN_iFu1xEP7RneRWAg-1hR9UQ</span></a></p><span data-dcnode-id="6434" instrument_node="">
</span><h3 data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node="">Future routes to market webinar, 8 June 2021</span></h3><span data-dcnode-id="6431" instrument_node="">
</span><p data-dcnode-id="6429"><span data-dcnode-id="6430" instrument_node="">You are invited to join the North East Scotland Food &amp; Drink Network on 8 June (10.00am to 11.30am) for a future routes to market webinar. Consumer behaviour has shifted significantly over the past year. This webinar will provide insights for businesses on the changes and what they mean for new routes to market for food and drink producers.</span></p><span data-dcnode-id="6428" instrument_node="">
</span><p data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">Levercliff will present the findings of its latest consumer tracking survey and Spar Scotland will share its experience of changes in convenience retail.</span></p><span data-dcnode-id="6425" instrument_node="">
</span><p data-dcnode-id="6418"><span data-dcnode-id="6424" instrument_node="">The session will include a regional business case study and the opportunity for questions and answers with the speakers.</span><br data-dcnode-id="6423"><span data-dcnode-id="6422" instrument_node="">
Click here to register for this free webinar – </span><a data-dcnode-id="6419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D2de889b0b7%26e%3Df689d769a3"><strong data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">ONE FDA Future routes to market webinar</span></strong></a></p><span data-dcnode-id="6417" instrument_node="">
</span><p data-dcnode-id="6414"><u data-dcnode-id="6415"><span data-dcnode-id="6416" instrument_node="">Our speakers</span></u></p><span data-dcnode-id="6413" instrument_node="">
</span><p data-dcnode-id="6408"><strong data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">David Craig, Director, Levercliff</span></strong><br data-dcnode-id="6410"><span data-dcnode-id="6409" instrument_node="">
David will share the findings of Levercliff’s latest consumer tracking survey. The survey has been following the changing habits of consumers since the start of the Covid-19 pandemic, with questions evolving as their habits have changed.</span></p><span data-dcnode-id="6407" instrument_node="">
</span><p data-dcnode-id="6403"><span data-dcnode-id="6406" instrument_node="">The survey results explore six key themes in detail: food to go habits; changes in brand and product choices; the likely continuation of online shopping; attitudes towards health and wellness; plus key attitudes around cooking behaviours and food delivery.</span><br data-dcnode-id="6405"><span data-dcnode-id="6404" instrument_node="">
The presentation is future focussed and will help suppliers identify potential areas of focus for their food and drink business as we emerge from a period of sustained restrictions on everyday life.</span></p><span data-dcnode-id="6402" instrument_node="">
</span><p data-dcnode-id="6397"><strong data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">Stephen Brown, Head of Food-to-Go, Spar Scotland</span></strong><br data-dcnode-id="6399"><span data-dcnode-id="6398" instrument_node="">
Stephen will share his views on how consumer shopping behaviours have changed in convenience retailing, the trends that have emerged and which ones may be set to stay. Stephen will expand on how they want to create destination stores by offering a differentiated range and where this might create opportunities.</span></p><span data-dcnode-id="6396" instrument_node="">
</span><p data-dcnode-id="6391"><strong data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">Anna Mitchell, Owner, Castleton Farm Shop and Café</span></strong><br data-dcnode-id="6393"><span data-dcnode-id="6392" instrument_node="">
Anna will share how the business has adapted and evolved its model and routes to market to service customers in response to major behaviour and market changes and what this means for the future of the business.</span></p><span data-dcnode-id="6390" instrument_node="">
</span><p data-dcnode-id="6383"><span data-dcnode-id="6389" instrument_node="">Priority is given to food and drink producers based in Aberdeen, Aberdeenshire or Moray.</span><br data-dcnode-id="6388"><span data-dcnode-id="6387" instrument_node="">
For more information on the North East Scotland Food &amp; Drink Network, please email </span><a data-dcnode-id="6385" href="mailto:elizabeth.mathie@opportunitynortheast.com"><span data-dcnode-id="6386" instrument_node="">elizabeth.mathie@opportunitynortheast.com</span></a><span data-dcnode-id="6384" instrument_node="">.</span></p><span data-dcnode-id="6382" instrument_node="">
</span><p data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">The North East Food &amp; Drink Network is organised by Opportunity North East in partnership with Aberdeenshire Council and aims to support the growth of the region’s food and drink sector.</span></p><span data-dcnode-id="6379" instrument_node="">
</span><h3 data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">Scottish Seafood Upskilling Programme</span></h3><span data-dcnode-id="6376" instrument_node="">
</span><p data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">Two new training opportunities have been added to the Scottish Seafood Upskilling programme.&nbsp; Both are 50% funded and are available for registration from today.</span></p><span data-dcnode-id="6373" instrument_node="">
</span><p data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">Elementary HACCP by eLearning.&nbsp; Developed by REHIS, primarily to support food manufacturing, this short eLearning programme is ideal for individuals who do not need a full intermediate HACCP programme (also available by eLearning).&nbsp; The e-EHACCP programme is short (approx. 2 hrs), low cost (£50) and builds upon the elementary food hygiene principles that are essential for many food handlers in the seafood industry.</span></p><span data-dcnode-id="6370" instrument_node="">
</span><p data-dcnode-id="6366"><span data-dcnode-id="6369" instrument_node="">A recent Elementary Food Hygiene qualification is a requirement to undertake this course.</span><br data-dcnode-id="6368"><span data-dcnode-id="6367" instrument_node="">
Employers pay an upfront fee of £25.00 per person for the learning materials and our matched funding makes the exam free.</span></p><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6359"><span data-dcnode-id="6364" instrument_node="">An online, invigilated multiple choice exam (30 questions, 60% pass mark) is the final step in achieving the qualification.</span><br data-dcnode-id="6363"><span data-dcnode-id="6362" instrument_node="">
Applications are initially via </span><a data-dcnode-id="6360" href="mailto:enquiries@seafoodscotland.org"><span data-dcnode-id="6361" instrument_node="">enquiries@seafoodscotland.org</span></a></p><span data-dcnode-id="6358" instrument_node="">
</span><p data-dcnode-id="6353"><span data-dcnode-id="6357" instrument_node="">Elementary Food Hygiene (remote taught course).&nbsp; Seafish’s highly successful online food hygiene programme is free of charge and </span><a data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da80172ae5d%26e%3Df689d769a3"><span data-dcnode-id="6356" instrument_node="">available here</span></a><span data-dcnode-id="6354" instrument_node="">.&nbsp; However, as online learning is not to everyone’s taste we are now offering a taught one-day training programme as an alternative.</span></p><span data-dcnode-id="6352" instrument_node="">
</span><p data-dcnode-id="6348"><span data-dcnode-id="6351" instrument_node="">The course is delivered remotely by a Seafish approved REHIS trainer using Zoom.</span><br data-dcnode-id="6350"><span data-dcnode-id="6349" instrument_node="">
Courses are organised on demand.</span></p><span data-dcnode-id="6347" instrument_node="">
</span><p data-dcnode-id="6345"><span data-dcnode-id="6346" instrument_node="">The course costs £100 and is eligible for 50% funding, so the cost is only £50 per person.</span></p><span data-dcnode-id="6344" instrument_node="">
</span><p data-dcnode-id="6342"><span data-dcnode-id="6343" instrument_node="">An online, invigilated multiple choice exam (30 questions, 60% pass mark) is the final step in achieving the qualification.</span></p><span data-dcnode-id="6341" instrument_node="">
</span><p data-dcnode-id="6337"><span data-dcnode-id="6340" instrument_node="">Applications are initially via </span><a data-dcnode-id="6338" href="mailto:enquiries@seafoodscotland.org"><span data-dcnode-id="6339" instrument_node="">enquiries@seafoodscotland.org</span></a></p><span data-dcnode-id="6336" instrument_node="">
