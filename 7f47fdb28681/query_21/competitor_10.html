</span><h3 class="cv_title" data-dcnode-id="6323" data-item="4" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="6324" instrument_node="">April 2021 Update</span></h3><span data-dcnode-id="6322" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-4" data-dcnode-id="5616" style="display: none;"><span data-dcnode-id="6321" instrument_node="">
</span><br data-dcnode-id="6320" style="clear: both;"><span data-dcnode-id="6319" instrument_node="">
</span><h4 data-dcnode-id="6317" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6318" instrument_node="">23rd April</span></h4><span data-dcnode-id="6316" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="6100" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="6315" instrument_node="">
</span><p data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">This week has seen more international markets being restricted further with a state of emergency being declared in Japan and further lockdown restrictions in Canada, coupled with further lock downs across Europe the export market is very unstable at present. Over the coming weeks we do see an easing of lockdown across the UK which will hopefully stimulate demand for seafood.</span></p><span data-dcnode-id="6312" instrument_node="">
</span><p data-dcnode-id="6310"><span data-dcnode-id="6311" instrument_node="">The Scottish Seafood Export Taskforce met again this week and we were updated with a number of areas within the systems that are being upgrading in the next couple of months and beyond. There is the hope of a fully digitalised system but that is looking like another year before that is possible.</span></p><span data-dcnode-id="6309" instrument_node="">
</span><p data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">The changes that have already happened include:</span></p><span data-dcnode-id="6306" instrument_node="">
</span><ul data-dcnode-id="6295"><span data-dcnode-id="6305" instrument_node="">
</span><li data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">Blank pages and automatic numbering</span></li><span data-dcnode-id="6302" instrument_node="">
</span><li data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">Increased the number of draft documents from 10 to 50</span></li><span data-dcnode-id="6299" instrument_node="">
</span><li data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">Increased the weight that can be submitted</span></li><span data-dcnode-id="6296" instrument_node="">
</span></ul><span data-dcnode-id="6294" instrument_node="">
</span><p data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">The changes that are being made include:</span></p><span data-dcnode-id="6291" instrument_node="">
</span><ul data-dcnode-id="6262"><span data-dcnode-id="6290" instrument_node="">
</span><li data-dcnode-id="6264"><span data-dcnode-id="6289" instrument_node="">Working with processors and industry representatives we have identified the top six improvements:
</span><ul data-dcnode-id="6266"><span data-dcnode-id="6288" instrument_node="">
</span><li data-dcnode-id="6283"><span data-dcnode-id="6287" instrument_node="">Cloning of catch certificates- 20</span><sup data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">th</span></sup><span data-dcnode-id="6284" instrument_node=""> May</span></li><span data-dcnode-id="6282" instrument_node="">
</span><li data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">Cloning and voiding, resubmit with updates</span></li><span data-dcnode-id="6279" instrument_node="">
</span><li data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">Data uploads- enable landings to be updated separately</span></li><span data-dcnode-id="6276" instrument_node="">
</span><li data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">Process statements and documents- late summer</span></li><span data-dcnode-id="6273" instrument_node="">
</span><li data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">Redesigning product and landing pages- Working with users continually, prototypes being tested</span></li><span data-dcnode-id="6270" instrument_node="">
</span><li data-dcnode-id="6268"><span data-dcnode-id="6269" instrument_node="">Redesigning the user flow, more of a checklist system so information can be uploaded as it is received</span></li><span data-dcnode-id="6267" instrument_node="">
</span></ul><span data-dcnode-id="6265" instrument_node="">
</span></li><span data-dcnode-id="6263" instrument_node="">
</span></ul><span data-dcnode-id="6261" instrument_node="">
</span><p data-dcnode-id="6258"><strong data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">Easing of restrictions across retail, hospitality and travel going ahead from Monday</span></strong></p><span data-dcnode-id="6257" instrument_node="">
</span><p data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">The First Minister has confirmed this week that the planned easing of restrictions from Monday will be going ahead.&nbsp;For our food and drink sector, the most significant easing is obviously the initial re-opening of hospitality. From Monday 26 April, cafés, pubs and restaurants can re-open, along with tourist accommodation. Non-essential retail outlets as well as indoor attractions and public buildings such as galleries, museums and libraries can also open.&nbsp;All of Scotland (mainland and islands) will be in level 3 from Monday. This also means that the remaining travel restrictions within Scotland will be lifted and travel within the UK will be permitted for any purpose. If everything continues to go to plan, all of Scotland will move to Level 2 on Monday 17 May.</span></p><span data-dcnode-id="6254" instrument_node="">
</span><p data-dcnode-id="6249"><span data-dcnode-id="6253" instrument_node="">In hospitality, full outdoor service subject to local licensing can commence on Monday with a maximum of six people from six households in a single group.&nbsp;Service indoors can also start but it is subject to an 8pm curfew, a limit of six&nbsp;people from two households and alcohol cannot be served.&nbsp;The quick guide to what you can and can’t do in level 3 is available </span><a data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D2446d7e4e7%26e%3Df689d769a3"><span data-dcnode-id="6252" instrument_node="">here</span></a><span data-dcnode-id="6250" instrument_node="">.</span></p><span data-dcnode-id="6248" instrument_node="">
</span><p data-dcnode-id="6245"><strong data-dcnode-id="6246"><span data-dcnode-id="6247" instrument_node="">Commodity Code Guide Webinar</span></strong></p><span data-dcnode-id="6244" instrument_node="">
</span><p data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">Seafood Scotland have developed a new guide to help determine commodity codes. It uses a searchable spreadsheet that allows product to be identified by key parameters such as Scientific Name, Fresh/Frozen, Gutted/Whole or commodity code. The searchable database can help to determine the 8 digit version code and there is also a further guide on how to find the other two digits to determine the 10 digit version of the code.&nbsp; We will also show how commodity codes are built up starting from a two digit initial code.</span></p><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6236"><span data-dcnode-id="6240" instrument_node="">We will be running a webinar on Wednesday 28</span><sup data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">th</span></sup><span data-dcnode-id="6237" instrument_node=""> April 24 from 14.00 hours to 15.00 hours, showing how the spreadsheet and guide works We will also show on the EU Taric on how codes can be used to determine if any duty is due, dependent upon origin.</span></p><span data-dcnode-id="6235" instrument_node="">
</span><p data-dcnode-id="6233"><span data-dcnode-id="6234" instrument_node="">We will also show how to get confirmation from HMRC that you have selected the right commodity code for your product(s)</span></p><span data-dcnode-id="6232" instrument_node="">
</span><p data-dcnode-id="6227"><span data-dcnode-id="6231" instrument_node="">To book on the this webinar click </span><a data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9b3a4afd92%26e%3Df689d769a3"><span data-dcnode-id="6230" instrument_node="">here</span></a><span data-dcnode-id="6228" instrument_node="">.</span></p><span data-dcnode-id="6226" instrument_node="">
</span><p data-dcnode-id="6223"><strong data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">&nbsp;Government sets provisional fishing catch limits for 2021</span></strong></p><span data-dcnode-id="6222" instrument_node="">
</span><p data-dcnode-id="6217"><span data-dcnode-id="6221" instrument_node="">On the 14 April, the Government set</span><a data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da0f0735e1f%26e%3Df689d769a3"><span data-dcnode-id="6220" instrument_node=""> provisional catch limits for UK-EU shared fish stocks</span></a><span data-dcnode-id="6218" instrument_node=""> for the remainder of 2021, or until an agreement is reached with the EU.</span></p><span data-dcnode-id="6216" instrument_node="">
</span><p data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">The UK remains committed to working closely with the EU on the sustainable management of shared stocks and to seeking an agreement on outstanding fisheries issues for 2021. If catch limits are agreed with the EU then these will be updated accordingly.</span></p><span data-dcnode-id="6213" instrument_node="">
</span><p data-dcnode-id="6210"><strong data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">Job Vacancies</span></strong></p><span data-dcnode-id="6209" instrument_node="">
</span><p data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">The Sea A Bright Future team are looking to update the current vacancies that are available on the Scottish Seafood Association website.</span></p><span data-dcnode-id="6206" instrument_node="">
</span><p data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">If you have vacancies that you have not yet shared with us so far and you still wish to, please send me any links to your website recruitment pages.</span></p><span data-dcnode-id="6203" instrument_node="">
</span><p data-dcnode-id="6198"><span data-dcnode-id="6202" instrument_node="">If you do not have a website, or if you do not have a specific recruitment page, but you have an online job advert for example on Indeed, then you can share the link to this with us and we can add it to the site. Please contact </span><a data-dcnode-id="6200" href="mailto:jean@scottishseafoodassociation.com"><span data-dcnode-id="6201" instrument_node="">jean@scottishseafoodassociation.com</span></a><span data-dcnode-id="6199" instrument_node=""> for further information.</span></p><span data-dcnode-id="6197" instrument_node="">
</span><p data-dcnode-id="6194"><strong data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">Review of Seafish event and business to business marketing activities </span></strong></p><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6180"><span data-dcnode-id="6192" instrument_node="">We are currently looking at our calendar of events, and appraising ways in which we can continue to support industry in a post-Covid world where the format of ‘real world events’ has changed considerably. We aim to find the most effective and efficient way to deliver benefits to businesses and support a thriving seafood industry in the UK. Any marketing event related plans will also seek to fit into the overall strategy of our new consumer marketing initiative, </span><a data-dcnode-id="6190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D7c2344435f%26e%3Df689d769a3"><span data-dcnode-id="6191" instrument_node="">Love Seafood</span></a><span data-dcnode-id="6189" instrument_node="">.</span><br data-dcnode-id="6188"><span data-dcnode-id="6187" instrument_node="">
</span><u data-dcnode-id="6185"><span data-dcnode-id="6186" instrument_node="">&nbsp;</span></u><br data-dcnode-id="6184"><span data-dcnode-id="6183" instrument_node="">
</span><strong data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">Seeking Stakeholder Views</span></strong></p><span data-dcnode-id="6179" instrument_node="">
</span><p data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">As you may be aware, we’re seeking views from across the seafood sector throughout the UK, to help us reach a proposed plan for B2B activities under our overall strategic approach to marketing. We’re inviting stakeholders to participate in a short questionnaire-style online survey – taking no more than a few minutes to complete.</span></p><span data-dcnode-id="6176" instrument_node="">
</span><p data-dcnode-id="6174"><span data-dcnode-id="6175" instrument_node="">In due course we’ll appraise collated views against our overall strategic approach to marketing, and prepare proposals which will be presented to our Sector Panels for discussion. Subsequent activity plans will depend on available budget and resources.</span></p><span data-dcnode-id="6173" instrument_node="">
</span><p data-dcnode-id="6168"><span data-dcnode-id="6172" instrument_node="">The survey process is being facilitated by an independent survey management company and all submitted responses to the survey will be treated with due confidentiality. The survey will remain open to participation until midnight on </span><u data-dcnode-id="6170"><span data-dcnode-id="6171" instrument_node="">30 April 2021</span></u><span data-dcnode-id="6169" instrument_node="">.</span></p><span data-dcnode-id="6167" instrument_node="">
</span><p data-dcnode-id="6161"><strong data-dcnode-id="6162"><span data-dcnode-id="6166" instrument_node="">To participate in and complete the survey, please visit:&nbsp;</span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D63e1e5bfca%26e%3Df689d769a3"><span data-dcnode-id="6165" instrument_node="">https://survey.alchemer.com/s3/6255843/Seafish-Marketing-Survey</span></a><span data-dcnode-id="6163" instrument_node="">&nbsp;&nbsp; </span></strong></p><span data-dcnode-id="6160" instrument_node="">
</span><p data-dcnode-id="6157"><strong data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">Skills for resilience case studies&nbsp;</span></strong></p><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6151"><span data-dcnode-id="6155" instrument_node="">FDF Scotland and Skills Development Scotland, with support from the Scotland Food &amp; Drink Partnership, have produced case studies of businesses who have used skill development and Modern Apprenticeships to respond to recent challenges and to build future resilience. Click </span><a data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D42bdde027a%26e%3Df689d769a3"><span data-dcnode-id="6154" instrument_node="">here</span></a><span data-dcnode-id="6152" instrument_node=""> to learn more about it.</span></p><span data-dcnode-id="6150" instrument_node="">
</span><p data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">To find out more about the employer benefits from apprenticeships, go to Apprenticeships.Scot.</span></p><span data-dcnode-id="6147" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">To share the case studies on your social media, please refer to this communications pack:</span></p><span data-dcnode-id="6144" instrument_node="">
</span><ul data-dcnode-id="6130"><span data-dcnode-id="6143" instrument_node="">
</span><li data-dcnode-id="6140"><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Db486e7cbbf%26e%3Df689d769a3"><span data-dcnode-id="6142" instrument_node="">Communications pack</span></a></li><span data-dcnode-id="6139" instrument_node="">
</span><li data-dcnode-id="6136"><a data-dcnode-id="6137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D014cb3cea2%26e%3Df689d769a3"><span data-dcnode-id="6138" instrument_node="">Mimi’s Bakehouse</span></a></li><span data-dcnode-id="6135" instrument_node="">
</span><li data-dcnode-id="6132"><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D8a54db7f44%26e%3Df689d769a3"><span data-dcnode-id="6134" instrument_node="">Christie the Baker</span></a></li><span data-dcnode-id="6131" instrument_node="">
</span></ul><span data-dcnode-id="6129" instrument_node="">
</span><p data-dcnode-id="6126"><strong data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">Seafood Future Leaders Programme</span></strong></p><span data-dcnode-id="6125" instrument_node="">
</span><p data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">Seafood Scotland has developed a Seafood Future Leaders Programme in partnership with funding partners Skills Development Scotland, Scottish Enterprise’s core leadership programme and Opportunity North.</span></p><span data-dcnode-id="6122" instrument_node="">
</span><p data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">We are looking to develop future leaders of not only the business they operate in but also future leaders of the industry.</span></p><span data-dcnode-id="6119" instrument_node="">
</span><p data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node="">The first cohort was filled in 24 hours and we have now managed to secure a second cohort starting late May running until September (excluding the summer holidays) and will be a variety of workshops and masterclasses with topics including leadership, productivity, innovation, new business models and resilience, the political environment, coaching and media training. The programme will also end with an exciting learning journey to Iceland to look at the innovation the supply chain has undertaken there.</span></p><span data-dcnode-id="6116" instrument_node="">
</span><p data-dcnode-id="6114"><span data-dcnode-id="6115" instrument_node="">We are now down to our last space.</span></p><span data-dcnode-id="6113" instrument_node="">
</span><p data-dcnode-id="6109"><span data-dcnode-id="6112" instrument_node="">If you wish to register your interest or&nbsp;if you have any questions, please email </span><a data-dcnode-id="6110" href="mailto:donna.fordyce@seafoodscotland.org"><span data-dcnode-id="6111" instrument_node="">donna.fordyce@seafoodscotland.org</span></a></p><span data-dcnode-id="6108" instrument_node="">
</span><p data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">Thanks and have a great weekend</span></p><span data-dcnode-id="6105" instrument_node="">
</span><br data-dcnode-id="6104" style="clear: both;"><span data-dcnode-id="6103" instrument_node="">
</span><br data-dcnode-id="6102" style="clear: both;"><span data-dcnode-id="6101" instrument_node="">
</span></div><span data-dcnode-id="6099" instrument_node="">
</span><br data-dcnode-id="6098" style="clear: both;"><span data-dcnode-id="6097" instrument_node="">
</span><h4 data-dcnode-id="6095" data-subitem="2" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="6096" instrument_node="">12th April</span></h4><span data-dcnode-id="6094" instrument_node="">
</span><div class="subitems subitem-2" data-dcnode-id="5618" style="width: 100%; float: left; margin-top: 10px; display: none;"><span data-dcnode-id="6093" instrument_node="">
</span><h3 data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">Seafish Processor Survey</span></h3><span data-dcnode-id="6090" instrument_node="">
</span><p data-dcnode-id="6087"><strong data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">2021 Processing Survey</span></strong></p><span data-dcnode-id="6086" instrument_node="">
</span><p data-dcnode-id="6081"><strong data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">Seafish’s survey of UK seafood processing businesses will begin on 6 April 2021.</span></strong><br data-dcnode-id="6083"><span data-dcnode-id="6082" instrument_node="">
The timeline for the 2021 survey is:</span></p><span data-dcnode-id="6080" instrument_node="">
</span><ul data-dcnode-id="6069"><span data-dcnode-id="6079" instrument_node="">
</span><li data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">April – May: Survey period</span></li><span data-dcnode-id="6076" instrument_node="">
</span><li data-dcnode-id="6074"><span data-dcnode-id="6075" instrument_node="">June – September: Data collation and analysis</span></li><span data-dcnode-id="6073" instrument_node="">
</span><li data-dcnode-id="6071"><span data-dcnode-id="6072" instrument_node="">October – December: Share results with industry and government</span></li><span data-dcnode-id="6070" instrument_node="">
</span></ul><span data-dcnode-id="6068" instrument_node="">
</span><p data-dcnode-id="6063"><strong data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">Why participate in the survey?&nbsp;</span></strong><br data-dcnode-id="6065"><span data-dcnode-id="6064" instrument_node="">
The seafood processing sector faces potential challenges and opportunities:</span></p><span data-dcnode-id="6062" instrument_node="">
</span><ul data-dcnode-id="6051"><span data-dcnode-id="6061" instrument_node="">
</span><li data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">changes to the regulatory landscape</span></li><span data-dcnode-id="6058" instrument_node="">
</span><li data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">new trading relationships, immigration policy and workforce availability</span></li><span data-dcnode-id="6055" instrument_node="">
</span><li data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">continuing to work in a ‘Covid-safe way’ and responding to the ongoing pandemic</span></li><span data-dcnode-id="6052" instrument_node="">
</span></ul><span data-dcnode-id="6050" instrument_node="">
</span><p data-dcnode-id="6046"><span data-dcnode-id="6049" instrument_node="">At a time of change it is important for industry and government to have accurate, up-to-date information on the sector. The survey helps to put together an accurate picture of financial performance and socio-economic importance in terms of jobs and Gross Value Added (GVA). The more data that businesses can provide the more accurately the sector will be represented in the industry estimates.</span><br data-dcnode-id="6048"><span data-dcnode-id="6047" instrument_node="">
The survey data also informs all the other work done for the sector. It provides an opportunity for you to feedback on further support or resources that could help your business.</span></p><span data-dcnode-id="6045" instrument_node="">
</span><p data-dcnode-id="6042"><strong data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">What does the survey involve?</span></strong></p><span data-dcnode-id="6041" instrument_node="">
</span><p data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">A ten to fifteen-minute phone call during which you will be asked about:</span></p><span data-dcnode-id="6038" instrument_node="">
</span><ul data-dcnode-id="6024"><span data-dcnode-id="6037" instrument_node="">
</span><li data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">main activities of your business</span></li><span data-dcnode-id="6034" instrument_node="">
</span><li data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">species you process</span></li><span data-dcnode-id="6031" instrument_node="">
</span><li data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">size and make-up of your workforce</span></li><span data-dcnode-id="6028" instrument_node="">
</span><li data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">accounts information to supplement publicly available data</span></li><span data-dcnode-id="6025" instrument_node="">
</span></ul><span data-dcnode-id="6023" instrument_node="">
</span><p data-dcnode-id="6019"><span data-dcnode-id="6022" instrument_node="">In some cases you will also receive an email to a financial survey to complete.</span><br data-dcnode-id="6021"><span data-dcnode-id="6020" instrument_node="">
Seafish will attempt to contact all UK seafood processing businesses and invite them to take part.</span></p><span data-dcnode-id="6018" instrument_node="">
</span><ul data-dcnode-id="6006"><span data-dcnode-id="6017" instrument_node="">
</span><li data-dcnode-id="6014"><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3De0dea597b0%26e%3Df689d769a3"><span data-dcnode-id="6016" instrument_node="">Recruitment letter and survey questions</span></a></li><span data-dcnode-id="6013" instrument_node="">
</span><li data-dcnode-id="6008"><a data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D755e684cd5%26e%3Df689d769a3"><span data-dcnode-id="6012" instrument_node="">Foodservice webina</span></a><a data-dcnode-id="6009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da735ce6964%26e%3Df689d769a3"><span data-dcnode-id="6010" instrument_node="">r communications pack</span></a></li><span data-dcnode-id="6007" instrument_node="">
</span></ul><span data-dcnode-id="6005" instrument_node="">
</span><h2 data-dcnode-id="6002"><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D458535f29f%26e%3Df689d769a3"><span data-dcnode-id="6004" instrument_node="">Support for retail sector</span></a></h2><span data-dcnode-id="6001" instrument_node="">
</span><p data-dcnode-id="5996"><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcusercontent.com/6d09d813ba304ad42395ffb1b/images/f712ee2e-0e45-4de0-b4be-5d4253fa94c9.jpg"><img data-dcnode-id="6000" data-lazy-src="https://mcusercontent.com/6d09d813ba304ad42395ffb1b/images/f712ee2e-0e45-4de0-b4be-5d4253fa94c9.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">&lt;img src="https://mcusercontent.com/6d09d813ba304ad42395ffb1b/images/f712ee2e-0e45-4de0-b4be-5d4253fa94c9.jpg" /&gt;</span></noscript></a></p><span data-dcnode-id="5995" instrument_node="">
</span><h2 data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">Notice to Scottish Importers</span></h2><span data-dcnode-id="5992" instrument_node="">
</span><p data-dcnode-id="5989"><strong data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">Update: Changes to import requirements for EU Sanitary and Phytosanitary (SPS) goods</span></strong></p><span data-dcnode-id="5988" instrument_node="">
</span><p data-dcnode-id="5983"><span data-dcnode-id="5987" instrument_node="">Following the end of the EU Exit transition period on 31</span><sup data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">st</span></sup><span data-dcnode-id="5984" instrument_node=""> December 2020, the UK Government set out a phased approach for implementing import checks on SPS goods, published in the Border Operating Model.</span></p><span data-dcnode-id="5982" instrument_node="">
</span><p data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">For clarity SPS goods include animals and animal products, fish, shellfish (including fish and shellfish landed by EU/EEA/EFTA flagged vessels, and fish ova) and their products, high-risk food and feed not of animal origin, germinal products, organics, plants and plant products (including wood and wood products).</span></p><span data-dcnode-id="5979" instrument_node="">
</span><p data-dcnode-id="5974"><span data-dcnode-id="5978" instrument_node="">On the 11</span><sup data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">th</span></sup><span data-dcnode-id="5975" instrument_node=""> March 2021 the UK Government announced substantial changes to delay the implementation of the previously published SPS phases. Scottish Ministers have agreed to align with the UK Government for EU SPS goods (including EEA and EU SPS aligned territories) imported directly into Scotland and an overview of the changes are:</span></p><span data-dcnode-id="5973" instrument_node="">
</span><ul data-dcnode-id="5956"><span data-dcnode-id="5972" instrument_node="">
</span><li data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">Pre-notification requirements for Products of Animal Origin (POAO), certain animal by-products (ABP), and High Risk Food and Feed Not Of Animal Origin (HRFNAO) will be required from 1 October 2021.&nbsp; Export Health Certificate requirements for POAO and certain ABP will come into force on the same date.</span></li><span data-dcnode-id="5969" instrument_node="">
</span><li data-dcnode-id="5967"><span data-dcnode-id="5968" instrument_node="">Risk based physical SPS checks for POAO, certain ABP, and HRFNAO will be required from 1 January 2022 at Border Control Posts.</span></li><span data-dcnode-id="5966" instrument_node="">
</span><li data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">Physical SPS checks on high risk plants will take place at Border Control Posts from 1 January 2022.</span></li><span data-dcnode-id="5963" instrument_node="">
</span><li data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">Pre-notification requirements and documentary checks, including phytosanitary certificates will be required for low risk plants and plant products from 1 January 2022.</span></li><span data-dcnode-id="5960" instrument_node="">
</span><li data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">From March 2022 live animals and low risk plants and plant products will be required to enter through a Border Control Post and be subjected to checks.</span></li><span data-dcnode-id="5957" instrument_node="">
</span></ul><span data-dcnode-id="5955" instrument_node="">
</span><p data-dcnode-id="5950"><span data-dcnode-id="5954" instrument_node="">Full details of the Border Operating Model and the changes can be found </span><a data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3d0975af86%26e%3Df689d769a3"><span data-dcnode-id="5953" instrument_node="">here</span></a><span data-dcnode-id="5951" instrument_node="">. The detail does not apply to goods arriving from or via Northern Ireland and further information on those arrangements will follow in due course.</span></p><span data-dcnode-id="5949" instrument_node="">
</span><p data-dcnode-id="5944"><span data-dcnode-id="5948" instrument_node="">The Import of Products, Animals, Food and Feed System (IPAFFS) has replaced the EU’s system TRACES in GB. Pre notification of imports must take place through IPAFFS. You must register for IPAFFS and details can be found </span><a data-dcnode-id="5946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da2e055d642%26e%3Df689d769a3"><span data-dcnode-id="5947" instrument_node="">here</span></a><span data-dcnode-id="5945" instrument_node="">.</span></p><span data-dcnode-id="5943" instrument_node="">
</span><p data-dcnode-id="5940"><strong data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Border Control Posts (BCPs) in Scotland </span></strong></p><span data-dcnode-id="5939" instrument_node="">
</span><p data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">The changes outlined above include requirements for EU SPS goods to enter GB through a BCP from January and March 2022. Importers who import SPS goods directly to Scotland should familiarise themselves with available BCPs and the products they can accept. SPS products can also be imported through BCP facilities in Wales and England for clearance before onward travel to Scotland. Direct landings of fresh fisheries products have alternative requirements. Information on designated BCPs in Scotland, Wales and England can be found here;</span></p><span data-dcnode-id="5936" instrument_node="">
</span><ul data-dcnode-id="5926"><span data-dcnode-id="5935" instrument_node="">
</span><li data-dcnode-id="5932"><a data-dcnode-id="5933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfa44df71c9%26e%3Df689d769a3"><span data-dcnode-id="5934" instrument_node="">Authorised BCPs for live animals, animal products and food and feed of non-animal origin imports</span></a></li><span data-dcnode-id="5931" instrument_node="">
</span><li data-dcnode-id="5928"><a data-dcnode-id="5929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D37c6f7139e%26e%3Df689d769a3"><span data-dcnode-id="5930" instrument_node="">Authorised BCPs for plant imports</span></a></li><span data-dcnode-id="5927" instrument_node="">
</span></ul><span data-dcnode-id="5925" instrument_node="">
</span><p data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">The BCP list on the UK Gov webpages will be kept up to date with new BCP designations in Great Britain. Current and expected Scottish BCPs can be found at Annex A.</span></p><span data-dcnode-id="5922" instrument_node="">
</span><p data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">If you are planning on using newly designated BCP facilities in Scotland, and you do not have a pre-existing relationship with the port, it would be helpful to get in touch with the operator to discuss product type and expected import volumes.</span></p><span data-dcnode-id="5919" instrument_node="">
</span><p data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">We will be able to facilitate the exchange of this type of information or provide direct contact details with permission of the port operator.</span></p><span data-dcnode-id="5916" instrument_node="">
</span><p data-dcnode-id="5911"><span data-dcnode-id="5915" instrument_node="">For further information on the changes to the phased approach for SPS goods or listed BCP’s in Scotland, please contact the Border Control Post team at </span><a data-dcnode-id="5913" href="mailto:BCPScotland@gov.scot"><span data-dcnode-id="5914" instrument_node="">BCPScotland@gov.scot</span></a><span data-dcnode-id="5912" instrument_node="">. The Scottish Government would also welcome any feedback to this mailbox.</span></p><span data-dcnode-id="5910" instrument_node="">
</span><p data-dcnode-id="5907"><strong data-dcnode-id="5908"><span data-dcnode-id="5909" instrument_node="">Brexit Support Grants</span></strong></p><span data-dcnode-id="5906" instrument_node="">
</span><p data-dcnode-id="5901"><span data-dcnode-id="5905" instrument_node="">The UK Government has made available small grants (Brexit Support Fund) up to the value of £2,000 to help businesses either undertake training on custom declarations, processes and VAT/excise rules, or to obtain professional advice to help them navigate the issues. The fund is open until&nbsp;30 June but it is demand led so the sooner you apply the better. It is&nbsp;aimed at supporting SMEs, although the threshold for eligible businesses is up to 500 employees and £100m turnover. As usual there is some criteria that needs to be met but there is a helpful overview </span><a data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9cfc1d5fa5%26e%3Df689d769a3"><span data-dcnode-id="5904" instrument_node="">here</span></a><span data-dcnode-id="5902" instrument_node="">.</span></p><span data-dcnode-id="5900" instrument_node="">
</span><p data-dcnode-id="5897"><strong data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">Seafood Future Leaders Programme</span></strong></p><span data-dcnode-id="5896" instrument_node="">
</span><p data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Seafood Scotland has developed a Seafood Future Leaders Programme in partnership with funding partners Skills Development Scotland, Scottish Enterprise’s core leadership programme and Opportunity North.</span></p><span data-dcnode-id="5893" instrument_node="">
</span><p data-dcnode-id="5891"><span data-dcnode-id="5892" instrument_node="">We are looking to develop future leaders of not only the business they operate in but also future leaders of the industry.</span></p><span data-dcnode-id="5890" instrument_node="">
</span><p data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">The first cohort was filled in 24 hours and we have now managed to secure a second cohort starting late May running until September (excluding the summer holidays) and will be a variety of workshops and masterclasses with topics including leadership, productivity, innovation, new business models and resilience, the political environment, coaching and media training. The programme will also end with an exciting learning journey to Iceland to look at the innovation the supply chain has undertaken there.</span></p><span data-dcnode-id="5887" instrument_node="">
</span><p data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">We are now down to our last remaining couple of spaces.</span></p><span data-dcnode-id="5884" instrument_node="">
</span><p data-dcnode-id="5880"><span data-dcnode-id="5883" instrument_node="">If you wish to register your interest or&nbsp;if you have any questions, please email </span><a data-dcnode-id="5881" href="mailto:donna.fordyce@seafoodscotland.org"><span data-dcnode-id="5882" instrument_node="">donna.fordyce@seafoodscotland.org</span></a></p><span data-dcnode-id="5879" instrument_node="">
</span><p data-dcnode-id="5876"><strong data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">Launch of Marine Fund Scotland</span></strong></p><span data-dcnode-id="5875" instrument_node="">
</span><p data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">Investments and jobs in seafood sectors, the marine environment and coastal communities will be supported through a new marine fund.</span></p><span data-dcnode-id="5872" instrument_node="">
</span><p data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Marine Fund Scotland (MFS) replaces the European Maritime and Fisheries Fund (EMFF), following the UK’s exit from the EU. The EMFF supported the sustainable growth of the marine economy in coastal communities, in sectors such as fishing, aquaculture and seafood processing.</span></p><span data-dcnode-id="5869" instrument_node="">
</span><p data-dcnode-id="5862"><span data-dcnode-id="5868" instrument_node="">The EMFF has committed over £96 million to coastal communities across Scotland since it opened in 2016. It is now closed for new applications, but will continue paying grants until 2023.</span><br data-dcnode-id="5867"><span data-dcnode-id="5866" instrument_node="">
The MFS has a one year budget of £14 million, meaning all projects must be completed by 31</span><sup data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">st</span></sup><span data-dcnode-id="5863" instrument_node="">&nbsp;March 2022.</span></p><span data-dcnode-id="5861" instrument_node="">
</span><p data-dcnode-id="5857"><span data-dcnode-id="5860" instrument_node="">Announcing the fund, Fisheries Secretary Fergus Ewing said:</span><br data-dcnode-id="5859"><span data-dcnode-id="5858" instrument_node="">
“MFS will replace the outgoing EMFF and support growth in our Blue Economy, provide vital investment in the Scottish marine industries and seafood sectors and protect jobs and livelihoods in our coastal communities at a time when many are facing acute hardship due to Brexit and the pandemic.”</span></p><span data-dcnode-id="5856" instrument_node="">
</span><p data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">The Marine Fund Scotland for an initial period will operate on the basis of Expressions of Interest (EOI) to allow them to assess and engage with initial proposals for projects.&nbsp;The fund is being launched under the Blue Economy policy approach and the developing Blue Economy Action Plan (BEAP).&nbsp; Projects which best fit with the new approach will be invited to submit an full application and supporting documents.&nbsp; After this initial phase they will move directly to online applications.</span></p><span data-dcnode-id="5853" instrument_node="">
</span><p data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">The Expression of Interest Form does not form part of the formal application process for grant funding under the Marine Fund Scotland. Any response to an Expression of Interest Form does not confirm the acceptance or otherwise of any related application for funding.</span></p><span data-dcnode-id="5850" instrument_node="">
</span><p data-dcnode-id="5846"><span data-dcnode-id="5849" instrument_node="">All details can be found </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D668c981f56%26e%3Df689d769a3"><span data-dcnode-id="5848" instrument_node="">here&nbsp;</span></a></p><span data-dcnode-id="5845" instrument_node="">
</span><h2 data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">The Academy</span></h2><span data-dcnode-id="5842" instrument_node="">
</span><p data-dcnode-id="5831"><strong data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">What is the Academy and how will it benefit me and my business? </span></strong><br data-dcnode-id="5839"><span data-dcnode-id="5838" instrument_node="">
The Academy is a commercially focused training programme designed by food and drink industry experts to enable real and sustainable business growth for Scottish food and drink businesses. There are three distinct programmes for businesses at different stages of the growth journey.</span><br data-dcnode-id="5837"><span data-dcnode-id="5836" instrument_node="">
It is focused on knowledge-sharing, upskilling, innovating and succeeding and giving you the practical tools and know-how to help deliver a real step change for your business.</span><br data-dcnode-id="5835"><span data-dcnode-id="5834" instrument_node="">
</span><strong data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">What are the programmes on offer, and what are the differences between each? </span></strong></p><span data-dcnode-id="5830" instrument_node="">
</span><ul data-dcnode-id="5813"><span data-dcnode-id="5829" instrument_node="">
</span><li data-dcnode-id="5825"><strong data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">Seeding Growth </span></strong><span data-dcnode-id="5826" instrument_node="">is geared toward early-stage businesses or those towards the start of their growth journey to drive sales and opportunities beyond your local market. To read more about this programme click here</span></li><span data-dcnode-id="5824" instrument_node="">
</span><li data-dcnode-id="5820"><strong data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">Accelerating Growth </span></strong><span data-dcnode-id="5821" instrument_node="">is for SMEs with aspirations to enter the next phase of growth and will help identify and unlock opportunities to increase penetration and sales in UK markets. To read more about this programme click here</span></li><span data-dcnode-id="5819" instrument_node="">
</span><li data-dcnode-id="5815"><strong data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">Commercial Excellence </span></strong><span data-dcnode-id="5816" instrument_node="">is for highly ambitious commercial professionals and sales leaders in well established businesses looking to achieve significant market growth. To read more about this programme click here</span></li><span data-dcnode-id="5814" instrument_node="">
</span></ul><span data-dcnode-id="5812" instrument_node="">
</span><p data-dcnode-id="5805"><strong data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">Which Programme is right for me? </span></strong><br data-dcnode-id="5809"><span data-dcnode-id="5808" instrument_node="">
If you are still not sure what programme is best suited for you and your business let our diagnostic tool help guide you &gt;&gt; </span><a data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D80de90c2de%26e%3Df689d769a3"><span data-dcnode-id="5807" instrument_node="">https://survey.cmix.com/0E19A16E/7E301C4Q/en-GB</span></a></p><span data-dcnode-id="5804" instrument_node="">
</span><p data-dcnode-id="5801"><strong data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">How much time will be required of me to participate in the Academy programmes? </span></strong></p><span data-dcnode-id="5800" instrument_node="">
</span><ul data-dcnode-id="5783"><span data-dcnode-id="5799" instrument_node="">
</span><li data-dcnode-id="5795"><strong data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">Seeding Growth </span></strong><span data-dcnode-id="5796" instrument_node="">spans 3 months, with 6 modules requiring 2 half-day sessions per module.</span></li><span data-dcnode-id="5794" instrument_node="">
</span><li data-dcnode-id="5790"><strong data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">Accelerating Growth </span></strong><span data-dcnode-id="5791" instrument_node="">spans 6 months, with 4 modules requiring 2 half-day sessions per module.</span></li><span data-dcnode-id="5789" instrument_node="">
</span><li data-dcnode-id="5785"><strong data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">Commercial Excellence </span></strong><span data-dcnode-id="5786" instrument_node="">spans 12 months, with 3 modules requiring 2 half-day session per module.</span></li><span data-dcnode-id="5784" instrument_node="">
</span></ul><span data-dcnode-id="5782" instrument_node="">
</span><p data-dcnode-id="5778"><span data-dcnode-id="5781" instrument_node="">As well as module attendance, delegates will be expected to commit to furthering their learning through set activity between sessions. Delegates will also benefit from the support of a mentor matched to your personal business needs. Additionally, delegates on the Commercial Excellence programme will need to devote time to developing a commercial project aligned to the business strategy.</span><br data-dcnode-id="5780"><span data-dcnode-id="5779" instrument_node="">
Delivery of each programme will be carried out during the working week, and enough notice will be given to ensure it can be balanced with the day to day running and operations within your business.</span></p><span data-dcnode-id="5777" instrument_node="">
</span><p data-dcnode-id="5770"><strong data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">How much will it cost? </span></strong><br data-dcnode-id="5774"><span data-dcnode-id="5773" instrument_node="">
There is a standard fee for each programme. Members of Scotland Food &amp; Drink receive a discount relative to the business turnover. Members of Scotland Food &amp; Drink Partner organisations receive a 25% discount.</span><br data-dcnode-id="5772"><span data-dcnode-id="5771" instrument_node="">
The full list of fees, including discounts, can be found here.</span></p><span data-dcnode-id="5769" instrument_node="">
</span><p data-dcnode-id="5764"><strong data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">I’m not a member of Scotland Food &amp; Drink, can I still apply? </span></strong><br data-dcnode-id="5766"><span data-dcnode-id="5765" instrument_node="">
Yes of course. These programmes have been designed to benefit all Scottish food and drink producers. To discuss membership please contact us prior to application to benefit from discounted pricing.</span></p><span data-dcnode-id="5763" instrument_node="">
</span><p data-dcnode-id="5756"><strong data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">Who will be delivering the Academy programmes and how will they be delivered? </span></strong><br data-dcnode-id="5760"><span data-dcnode-id="5759" instrument_node="">
The Academy programmes will be delivered by a curated team of highly experienced specialists with specific skills and real market experience in the food and drink industry.</span><br data-dcnode-id="5758"><span data-dcnode-id="5757" instrument_node="">
All group and mentoring sessions will be delivered virtually using the Zoom platform. There will also be programme materials and handouts available to access and download digitally.</span></p><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5750"><strong data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">How many places will be available on each programme? </span></strong><br data-dcnode-id="5752"><span data-dcnode-id="5751" instrument_node="">
To ensure maximum group and peer-to-peer learning, each programme will be limited to a small cohort/group of businesses.</span></p><span data-dcnode-id="5749" instrument_node="">
</span><p data-dcnode-id="5744"><strong data-dcnode-id="5747"><span data-dcnode-id="5748" instrument_node="">When does each programme start? </span></strong><br data-dcnode-id="5746"><span data-dcnode-id="5745" instrument_node="">
Each programme has multiple intake dates over the two-and-a-half-year cycle. Cohort one will commence:</span></p><span data-dcnode-id="5743" instrument_node="">
</span><ul data-dcnode-id="5732"><span data-dcnode-id="5742" instrument_node="">
</span><li data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">Seeding Growth on 4th May</span></li><span data-dcnode-id="5739" instrument_node="">
</span><li data-dcnode-id="5737"><span data-dcnode-id="5738" instrument_node="">Accelerating Growth on 8th June</span></li><span data-dcnode-id="5736" instrument_node="">

</span><p data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">There will be a welcome meeting the week before the programme commence date. Dates for future cohorts will be announced soon.</span></p><span data-dcnode-id="5728" instrument_node="">
</span><p data-dcnode-id="5723"><strong data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">Do I have to do all modules? </span></strong><br data-dcnode-id="5725"><span data-dcnode-id="5724" instrument_node="">
To benefit fully from the programme, delegates are required to attend all modules. Second delegate places are subject to availability.</span></p><span data-dcnode-id="5722" instrument_node="">
</span><p data-dcnode-id="5717"><strong data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">How do I submit my application? </span></strong><br data-dcnode-id="5719"><span data-dcnode-id="5718" instrument_node="">
Applications are submitted online: Seeding Growth, Accelerating Growth, Commercial Excellence</span></p><span data-dcnode-id="5716" instrument_node="">
</span><p data-dcnode-id="5711"><strong data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">What is the selection process? </span></strong><br data-dcnode-id="5713"><span data-dcnode-id="5712" instrument_node="">
Applications will be reviewed by a panel to ensure applicants are matched to the right programme to suit their needs and ambitions for growth. After which, places will be allocated, and successful delegates will be directed to the payment portal.</span></p><span data-dcnode-id="5710" instrument_node="">
</span><p data-dcnode-id="5705"><strong data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">When will I find out if I have been successful in securing a place? </span></strong><br data-dcnode-id="5707"><span data-dcnode-id="5706" instrument_node="">
Scotland Food &amp; Drink will notify applicants within 4 weeks prior to the programme commencing.</span></p><span data-dcnode-id="5704" instrument_node="">
</span><p data-dcnode-id="5697"><strong data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">What if I am not accepted for the programme I have applied for, or the programme I have applied for is fully subscribed? </span></strong><br data-dcnode-id="5701"><span data-dcnode-id="5700" instrument_node="">
If you are unsuccessful in your application, a member of the Business Development team at Scotland Food &amp; Drink will be in touch to discuss this with you and look at the best way to either re-apply or provide the relevant alternative support.</span><br data-dcnode-id="5699"><span data-dcnode-id="5698" instrument_node="">
If the cohort you apply for is oversubscribed, or you miss the deadline, we can work with you to confirm your place and participation in the next available cohort start date.</span></p><span data-dcnode-id="5696" instrument_node="">
</span><p data-dcnode-id="5691"><strong data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">I’m pre-start up, can I still apply? </span></strong><br data-dcnode-id="5693"><span data-dcnode-id="5692" instrument_node="">
Unfortunately not. The current programmes require businesses to have a market ready product.</span></p><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5685"><strong data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">I am a business involved in the food &amp; drink sector, but I am not a food and drink producer. Can I still participate? </span></strong><br data-dcnode-id="5687"><span data-dcnode-id="5686" instrument_node="">
No. The Academy is for businesses who produce a food or drink product in Scotland and is not applicable to third party consultants, sales representatives, agencies or supply chain operators (logistics providers, wholesalers, foodservice or retailers).</span></p><span data-dcnode-id="5684" instrument_node="">
</span><p data-dcnode-id="5679"><strong data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">Will I get a certificate? </span></strong><br data-dcnode-id="5681"><span data-dcnode-id="5680" instrument_node="">
Yes, upon completion, each delegate will receive The Academy certificate relative to the programme they have participated in.</span></p><span data-dcnode-id="5678" instrument_node="">

</span><h4 data-dcnode-id="5604" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="5605" instrument_node="">5th March</span></h4><span data-dcnode-id="5603" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="5272" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="5602" instrument_node="">
</span><p data-dcnode-id="5553"><span data-dcnode-id="5600" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5601" instrument_node="">This week we have continued to engage with Scottish Government and UK Government which saw CEO Donna Fordyce give evidence to the EFRA committee on the impact of Brexit on the seafood sector. The Scottish Seafood Export Taskforce met again last week and the focus is on efficiencies and costs, the outcome of this is a technical working group focusing on the issues to develop solutions. This group met this week and included seafood businesses who are experiencing this first hand.</span></span><br data-dcnode-id="5599"><span data-dcnode-id="5598" instrument_node="">
</span><span data-dcnode-id="5596" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5597" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5595"><span data-dcnode-id="5594" instrument_node="">
</span><span data-dcnode-id="5591" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">Seafood Producers Resilience Fund</span></strong></span><br data-dcnode-id="5590"><span data-dcnode-id="5589" instrument_node="">
</span><span data-dcnode-id="5587" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5588" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5586"><span data-dcnode-id="5585" instrument_node="">
</span><span data-dcnode-id="5583" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5584" instrument_node="">The deadline for eligible vessels to apply for the Seafood Producers Resilience Fund has been extended until 23.59 on Sunday 7 March.</span></span><br data-dcnode-id="5582"><span data-dcnode-id="5581" instrument_node="">
</span><span data-dcnode-id="5579" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5580" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5578"><span data-dcnode-id="5577" instrument_node="">
</span><span data-dcnode-id="5571" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5576" instrument_node="">For information on applications and an example of a completed application go to the </span><u data-dcnode-id="5573"><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfdc70e8ea3%26e%3Df689d769a3"><span data-dcnode-id="5575" instrument_node="">Seafood Producers Resilience Fund section</span></a></u><span data-dcnode-id="5572" instrument_node=""> of the Marine Scotland website.</span></span><br data-dcnode-id="5570"><span data-dcnode-id="5569" instrument_node="">

</span><span data-dcnode-id="5563" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5564" instrument_node="">If you have already applied you will get a response in 15 days.</span></span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">
</span><span data-dcnode-id="5559" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5560" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">
</span><span data-dcnode-id="5554" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">Seafood Response Scheme</span></strong></span></p><span data-dcnode-id="5552" instrument_node="">
</span><p data-dcnode-id="5513"><span data-dcnode-id="5547" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5551" instrument_node="">UK Government have announced this scheme and full details can be found </span><a data-dcnode-id="5549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dec886e9de8%26e%3Df689d769a3"><span data-dcnode-id="5550" instrument_node="">here</span></a><span data-dcnode-id="5548" instrument_node="">. It is wider than the Seafood Producers Resilience Fund in that it includes all vessels under 40 meters, turnover is £10k for example. Full details of the scheme will be announced on the 1st March with invite for applications the 8th March (as of today we still haven’t seen any update)</span></span><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">

</span><span data-dcnode-id="5430" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5431" instrument_node="">As you are aware, the transition period with the European Union (EU) came to an end on 31 December 2020, with new import controls being introduced in stages from January until July 2021.</span></span><br data-dcnode-id="5429"><span data-dcnode-id="5428" instrument_node="">

</span><span data-dcnode-id="5419" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5423" instrument_node="">In April, there will be a further set of changes coming into effect on imports of products of animal origin (POAO) for human consumption, as outlined in the </span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfd6726f425%26e%3Df689d769a3"><span data-dcnode-id="5422" instrument_node="">Border operating Model</span></a><span data-dcnode-id="5420" instrument_node="">. These changes affect imports of food and drink containing animal products.</span></span><br data-dcnode-id="5418"><span data-dcnode-id="5417" instrument_node="">
</span><span data-dcnode-id="5415" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5416" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5414"><span data-dcnode-id="5413" instrument_node="">
</span><span data-dcnode-id="5411" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5412" instrument_node="">SPS Borders &amp; Boundaries Programme at Defra invite you to join our webinar series, which will run throughout February and March (please see a full timetable below), starting with:</span></span></p><span data-dcnode-id="5409" instrument_node="">
</span><p data-dcnode-id="5406"><span data-dcnode-id="5407" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5408" instrument_node="">Importing Products of Animal Origin (POAO) from the European Union into Great Britain</span></span></p><span data-dcnode-id="5405" instrument_node="">

</span></ul><span data-dcnode-id="5357" instrument_node="">
</span><p data-dcnode-id="5353"><span data-dcnode-id="5354" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Mass Covid testing scheme for food sector in Scotland opens, for businesses over 25 employees</span></strong></span></p><span data-dcnode-id="5352" instrument_node="">
</span><p data-dcnode-id="5349"><span data-dcnode-id="5350" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5351" instrument_node="">The Scottish Government is now expanding free lateral flow antigen testing to eligible seafood businesses.&nbsp;This scheme is voluntary for businesses and their employees.&nbsp;The lateral flow antigen test kit produces results within 30 minutes which is very quick compared to other testing options, so provides the ability to limit infection spread quickly. Staff who choose to participate will undertake a lateral flow test twice weekly (with government providing the test kits free of charge).&nbsp;</span></span></p><span data-dcnode-id="5348" instrument_node="">
</span><p data-dcnode-id="5341"><span data-dcnode-id="5346" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5347" instrument_node="">If there is a positive result, the member of staff should return home immediately and book a confirmatory PCR test (lab-processed test) through the usual online system.&nbsp;&nbsp;</span></span><br data-dcnode-id="5345"><span data-dcnode-id="5344" instrument_node="">
</span><span data-dcnode-id="5342" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5343" instrument_node="">The Scottish Government&nbsp;would like to hear from larger (over 25 employees. However, if you are a smaller business, get in touch anyway as government is keen to gauge levels of interest as the programme may be expanded.&nbsp;Full and detailed guidance will be available to help businesses.&nbsp;This will be accessible via the online system called “Egress” used for ordering test kits.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="5340" instrument_node="">
</span><p data-dcnode-id="5334"><span data-dcnode-id="5335" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5339" instrument_node="">In the meantime, if your business would be interested in taking part, please email </span><a data-dcnode-id="5337" href="mailto:FoodSupplyInformation@gov.scot"><span data-dcnode-id="5338" instrument_node="">FoodSupplyInformation@gov.scot</span></a><span data-dcnode-id="5336" instrument_node=""> with the following information:</span></span></p><span data-dcnode-id="5333" instrument_node="">
</span><ul data-dcnode-id="5319"><span data-dcnode-id="5332" instrument_node="">
</span><li data-dcnode-id="5329"><span data-dcnode-id="5330" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5331" instrument_node="">Name, business name, address (where test kits will be sent to) and email with the main point of contact</span></span></li><span data-dcnode-id="5328" instrument_node="">
</span><li data-dcnode-id="5325"><span data-dcnode-id="5326" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5327" instrument_node="">Company registration number and industry sector (standard industry code which can be found on your Companies House registration)</span></span></li><span data-dcnode-id="5324" instrument_node="">
</span><li data-dcnode-id="5321"><span data-dcnode-id="5322" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5323" instrument_node="">Number of employees</span></span></li><span data-dcnode-id="5320" instrument_node="">
</span></ul><span data-dcnode-id="5318" instrument_node="">
</span><p data-dcnode-id="5310"><span data-dcnode-id="5315" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Regional Food Fund opens for new applications</span></strong></span><br data-dcnode-id="5314"><span data-dcnode-id="5313" instrument_node="">
</span><span data-dcnode-id="5311" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5312" instrument_node="">This fund aims to support the food and drink sector’s recovery from COVID-19 and has been made possible with £100,000 of Scottish Government funding. The fund is part of the Scotland Food and Drink Partnership’s Recovery plan, with grants of up to £5,000 available to applicants.&nbsp;The fund is open to:</span></span></p><span data-dcnode-id="5309" instrument_node="">
</span><ul data-dcnode-id="5295"><span data-dcnode-id="5308" instrument_node="">
</span><li data-dcnode-id="5305"><span data-dcnode-id="5306" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5307" instrument_node="">individual businesses in the food and drink sector, including primary producers, on behalf of a collaborative group or project</span></span></li><span data-dcnode-id="5304" instrument_node="">
</span><li data-dcnode-id="5301"><span data-dcnode-id="5302" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5303" instrument_node="">regional and community groups (both rural and urban)</span></span></li><span data-dcnode-id="5300" instrument_node="">
</span><li data-dcnode-id="5297"><span data-dcnode-id="5298" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5299" instrument_node="">individuals on behalf of a collaborative group or project</span></span></li><span data-dcnode-id="5296" instrument_node="">
</span></ul><span data-dcnode-id="5294" instrument_node="">
</span><p data-dcnode-id="5288"><span data-dcnode-id="5289" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5293" instrument_node="">The deadline for applications is 15 March 2021 and you’ll find more detail </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dd1b0653579%26e%3Df689d769a3"><span data-dcnode-id="5292" instrument_node="">here</span></a><span data-dcnode-id="5290" instrument_node="">.</span></span></p><span data-dcnode-id="5287" instrument_node="">
</span><h3 data-dcnode-id="5283"><span data-dcnode-id="5284" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">Webinar recording</span></strong></span></h3><span data-dcnode-id="5282" instrument_node="">
</span><p data-dcnode-id="5278"><span data-dcnode-id="5279" style="font-size: 12pt; font-family: georgia, palatino, serif;"><a data-dcnode-id="5280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3De6b9442a85%26e%3Df689d769a3"><span data-dcnode-id="5281" instrument_node="">Recording of the webinar on ‘The practicalities of VAT and Brexit in the Seafood Sector – What you need to know.’</span></a></span></p><span data-dcnode-id="5277" instrument_node="">

</span><h3 class="cv_title" data-dcnode-id="5264" data-item="6" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="5265" instrument_node="">February 2021 Update</span></h3><span data-dcnode-id="5263" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-6" data-dcnode-id="4419" style="display: none;"><span data-dcnode-id="5262" instrument_node="">
</span><br data-dcnode-id="5261" style="clear: both;"><span data-dcnode-id="5260" instrument_node="">
</span><h4 data-dcnode-id="5258" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="5259" instrument_node="">12th February</span></h4><span data-dcnode-id="5257" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="4788" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="5256" instrument_node="">
</span><p data-dcnode-id="5253"><span data-dcnode-id="5254" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5255" instrument_node="">This week has been another week dominated by Brexit challenges and discussions. Things are progressing and we are starting to experience more issues at the ports and border control points throughout Europe. Work is ongoing to resolve all these issues and everyone continues to work together to try and support the sector to get seafood flowing as frictionless as possible into Europe. The Seafood Taskforce met today to push forward with major issues still facing the sector</span></span></p><span data-dcnode-id="5252" instrument_node="">
</span><h3 data-dcnode-id="5249"><span data-dcnode-id="5250" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5251" instrument_node="">Seafood Producers Resilience fund&nbsp;&nbsp;</span></span></h3><span data-dcnode-id="5248" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5243" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5247" instrument_node="">The Seafood Producers Resilience Fund will provide support to eligible shellfish catchers and eligible shellfish and trout aquaculture undertakings. These businesses have lost access to domestic and international food markets as a result of COVID-19, and the difficult trading conditions that have resulted from the end of the transition period following the UK’s withdrawal from the EU. To apply please find details </span><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dbf3efd3fc9%26e%3Df689d769a3"><span data-dcnode-id="5246" instrument_node="">here</span></a><span data-dcnode-id="5244" instrument_node="">.</span></span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5232"><span data-dcnode-id="5239" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5240" instrument_node="">£23m Seafood Disruption Support Scheme open for applications</span></span><br data-dcnode-id="5238"><span data-dcnode-id="5237" instrument_node="">
</span><span data-dcnode-id="5233" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5236" instrument_node="">Some weeks after it was announced, Defra has opened this Brexit compensation scheme.&nbsp;Despite its name, it doesn’t actually compensate for disruption.&nbsp;It will only compensate for losses, where there&nbsp;is evidence of sales not being completed with a customer due to a delay or if the product&nbsp;value was reduced.&nbsp;The scheme – open SMEs only (less than 250 employees and under £36M turnover) – will pay a percentage of those losses.&nbsp;The percentage won’t be determined until all applications are received (but is understood to be at least 50%).&nbsp;To be honest, it looks difficult to apply for given the evidence required to prove losses and the narrow eligibility criteria.&nbsp;Applications close at the end of February and the detail is all here &nbsp;</span><a data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4129d41bb7%26e%3Df689d769a3"><span data-dcnode-id="5235" instrument_node="">https://www.gov.uk/guidance/seafood-disruption-support-scheme</span></a></span></p><span data-dcnode-id="5231" instrument_node="">
</span><h3 data-dcnode-id="5228"><span data-dcnode-id="5229" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5230" instrument_node="">Scottish Brexit Support</span></span></h3><span data-dcnode-id="5227" instrument_node="">
</span><p data-dcnode-id="5208"><span data-dcnode-id="5225" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5226" instrument_node="">Our Brexit specialists are available now to help and advise you and your businesses regarding any urgent post-Brexit EU exporting issues. We have worked with 20 companies this week on their issues.</span></span><br data-dcnode-id="5224"><span data-dcnode-id="5223" instrument_node="">
</span><span data-dcnode-id="5221" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5222" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5220"><span data-dcnode-id="5219" instrument_node="">
</span><span data-dcnode-id="5217" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5218" instrument_node="">The consultants appointed by Seafood Scotland are now in place and can be contacted with specific issues or challenges you are facing to do with any aspect of exporting your product to the EU.</span></span><br data-dcnode-id="5216"><span data-dcnode-id="5215" instrument_node="">
</span><span data-dcnode-id="5213" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5214" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5212"><span data-dcnode-id="5211" instrument_node="">
</span><span data-dcnode-id="5209" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5210" instrument_node="">This might include clarity on customs and export certification processes and systems, or on documentation or paperwork or issues, such as:</span></span></p><span data-dcnode-id="5207" instrument_node="">
</span><ul data-dcnode-id="5185"><span data-dcnode-id="5206" instrument_node="">
</span><li data-dcnode-id="5203"><span data-dcnode-id="5204" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5205" instrument_node="">Catch certificates</span></span></li><span data-dcnode-id="5202" instrument_node="">
</span><li data-dcnode-id="5199"><span data-dcnode-id="5200" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5201" instrument_node="">Health certificates</span></span></li><span data-dcnode-id="5198" instrument_node="">
</span><li data-dcnode-id="5195"><span data-dcnode-id="5196" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5197" instrument_node="">Commodity codes</span></span></li><span data-dcnode-id="5194" instrument_node="">
</span><li data-dcnode-id="5191"><span data-dcnode-id="5192" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5193" instrument_node="">Labels</span></span></li><span data-dcnode-id="5190" instrument_node="">
</span><li data-dcnode-id="5187"><span data-dcnode-id="5188" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5189" instrument_node="">Export declarations</span></span></li><span data-dcnode-id="5186" instrument_node="">
</span></ul><span data-dcnode-id="5184" instrument_node="">
</span><p data-dcnode-id="5160"><span data-dcnode-id="5182" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="5183" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5181"><span data-dcnode-id="5180" instrument_node="">
