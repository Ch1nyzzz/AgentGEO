</span><h2 data-dcnode-id="4979"><span data-dcnode-id="4980" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4981" instrument_node="">Trader Support Service (TSS) for NI trade</span></span></h2><span data-dcnode-id="4978" instrument_node="">
</span><h3 data-dcnode-id="4975"><span data-dcnode-id="4976" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4977" instrument_node="">Updated process for controlled goods</span></span></h3><span data-dcnode-id="4974" instrument_node="">
</span><p data-dcnode-id="4971"><span data-dcnode-id="4972" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4973" instrument_node="">If you are moving controlled goods, the declarations you submit from 15 February will require additional data so we can generate the required ENS Safety &amp; Security declarations and Simplified Frontier declarations (SFDs).</span></span></p><span data-dcnode-id="4970" instrument_node="">
</span><p data-dcnode-id="4967"><span data-dcnode-id="4968" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4969" instrument_node="">This is because TSS has enhanced its processes to align with CDS declaration requirements. The exceptions to this are:</span></span></p><span data-dcnode-id="4966" instrument_node="">
</span><ul data-dcnode-id="4952"><span data-dcnode-id="4965" instrument_node="">
</span><li data-dcnode-id="4962"><span data-dcnode-id="4963" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4964" instrument_node="">Import declarations that are pre-lodged before February 15 will not be affected by this change.</span></span></li><span data-dcnode-id="4961" instrument_node="">
</span><li data-dcnode-id="4958"><span data-dcnode-id="4959" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4960" instrument_node="">If you need to use the TSS bulk upload API, these changes will not be required from 15 February. We will contact you directly to share the timeline and specification for the API when it has been updated for controlled goods.</span></span></li><span data-dcnode-id="4957" instrument_node="">
</span><li data-dcnode-id="4954"><span data-dcnode-id="4955" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4956" instrument_node="">For supermarkets with easements through DEFRA and HMRC, we will contact you directly to discuss how these new processes apply to you.</span></span></li><span data-dcnode-id="4953" instrument_node="">
</span></ul><span data-dcnode-id="4951" instrument_node="">
</span><p data-dcnode-id="4942"><span data-dcnode-id="4943" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4950" instrument_node="">Controlled goods typically require additional processes, licences or certification. You can find examples of controlled goods </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dbec3c9aad9%26e%3Df689d769a3"><span data-dcnode-id="4949" instrument_node="">here</span></a><span data-dcnode-id="4947" instrument_node=""> and visit the </span><a data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D0177d0e3a1%26e%3Df689d769a3"><span data-dcnode-id="4946" instrument_node="">Northern Ireland (EU) Tariff tool</span></a><span data-dcnode-id="4944" instrument_node=""> to identify whether goods you move are controlled or not.</span></span></p><span data-dcnode-id="4941" instrument_node="">
</span><p data-dcnode-id="4934"><span data-dcnode-id="4939" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4940" instrument_node="">As with the current process, you will need to submit data that is accepted and authorised by TSS ahead of any goods movement.</span></span><br data-dcnode-id="4938"><span data-dcnode-id="4937" instrument_node="">
</span><span data-dcnode-id="4935" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4936" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="4933" instrument_node="">
</span><h4 data-dcnode-id="4930"><span data-dcnode-id="4931" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4932" instrument_node="">Preparations to make now</span></span></h4><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4919"><span data-dcnode-id="4924" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4928" instrument_node="">Traders should be ready to either supply the information direct to TSS or indirectly via their haulier/carrier. As commercial data is needed, you may prefer to supply information independently to maintain confidentiality of the item price. Full details of the data required are </span><a data-dcnode-id="4926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dadfd9dc344%26e%3Df689d769a3"><span data-dcnode-id="4927" instrument_node="">outlined in this guide</span></a><span data-dcnode-id="4925" instrument_node="">.</span></span><br data-dcnode-id="4923"><span data-dcnode-id="4922" instrument_node="">
</span><span data-dcnode-id="4920" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4921" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="4918" instrument_node="">
</span><h4 data-dcnode-id="4915"><span data-dcnode-id="4916" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4917" instrument_node="">Action list</span></span></h4><span data-dcnode-id="4914" instrument_node="">
</span><p data-dcnode-id="4911"><span data-dcnode-id="4912" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4913" instrument_node="">Preparing for these enhanced processes is critical, as the additional data for controlled goods must be submitted and approved before they are transported. The following actions should be taken immediately if you plan to move goods in the week following 15 February:</span></span></p><span data-dcnode-id="4910" instrument_node="">
</span><ul data-dcnode-id="4886"><span data-dcnode-id="4909" instrument_node="">
</span><li data-dcnode-id="4906"><span data-dcnode-id="4907" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4908" instrument_node="">Step 1: Consult the Northern Ireland (EU) Tariff tool referred to above to identify whether your goods are controlled, and if so, if there are any additional documentation or certification requirements.</span></span></li><span data-dcnode-id="4905" instrument_node="">
</span><li data-dcnode-id="4902"><span data-dcnode-id="4903" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4904" instrument_node="">Step 2: Determine who will provide the additional consignment data (e.g. you, the GB supplier or the NI purchaser etc.)</span></span></li><span data-dcnode-id="4901" instrument_node="">
</span><li data-dcnode-id="4896"><span data-dcnode-id="4897" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4900" instrument_node="">Step 3: Review </span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dd5d729a674%26e%3Df689d769a3"><span data-dcnode-id="4899" instrument_node="">the data guide here</span></a></span></li><span data-dcnode-id="4895" instrument_node="">
</span><li data-dcnode-id="4892"><span data-dcnode-id="4893" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4894" instrument_node="">Step 4: Pre-lodge declarations well in advance of goods movements; as with any new process, it may take some time for you and your partners to become familiar with these requirements. Allowing time for TSS to clarify any issues with your information is advisable.</span></span></li><span data-dcnode-id="4891" instrument_node="">
</span><li data-dcnode-id="4888"><span data-dcnode-id="4889" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4890" instrument_node="">Step 5: Ensure you and your haulier have an agreed process in place to share and upload licences or documents, in the event that checks are required.</span></span></li><span data-dcnode-id="4887" instrument_node="">
</span></ul><span data-dcnode-id="4885" instrument_node="">
</span><p data-dcnode-id="4880"><span data-dcnode-id="4883" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4884" instrument_node="">We appreciate this process change for controlled goods will mean you need to take more time to get ready before your first movement. You can pre-lodge import declarations up to 14 days in advance of departure. We recommend you pre-lodge declarations at least 48 hours ahead of your planned goods movement.</span></span><span data-dcnode-id="4881" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4882" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="4879" instrument_node="">
</span><h3 data-dcnode-id="4876"><span data-dcnode-id="4877" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4878" instrument_node="">Supplementary declarations – a reminder</span></span></h3><span data-dcnode-id="4875" instrument_node="">
</span><p data-dcnode-id="4869"><span data-dcnode-id="4870" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4874" instrument_node="">To help you prepare for the imminent need to complete supplementary declarations, we have published new guidance here on </span><a data-dcnode-id="4872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D69d10b5d52%26e%3Df689d769a3"><span data-dcnode-id="4873" instrument_node="">the NICTA portal</span></a><span data-dcnode-id="4871" instrument_node="">.</span></span></p><span data-dcnode-id="4868" instrument_node="">
</span><p data-dcnode-id="4859"><span data-dcnode-id="4860" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4867" instrument_node="">This guidance is in addition to the existing Supplementary Declarations </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3cb839260a%26e%3Df689d769a3"><span data-dcnode-id="4866" instrument_node="">guide</span></a><span data-dcnode-id="4864" instrument_node=""> on NICTA, covering the data required. A webinar recording on preparing for supplementary declarations is </span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D44e6b1ac24%26e%3Df689d769a3"><span data-dcnode-id="4863" instrument_node="">available here</span></a><span data-dcnode-id="4861" instrument_node="">.</span></span></p><span data-dcnode-id="4858" instrument_node="">
</span><p data-dcnode-id="4852"><span data-dcnode-id="4853" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4857" instrument_node="">The declarant of record is responsible for completing the Supplementary declaration. Please refer to the </span><a data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3ee308273c%26e%3Df689d769a3"><span data-dcnode-id="4856" instrument_node="">guidance</span></a><span data-dcnode-id="4854" instrument_node=""> if you are unsure who the declarant of record is for any goods movements you are involved in.</span></span></p><span data-dcnode-id="4851" instrument_node="">
</span><h3 data-dcnode-id="4848"><span data-dcnode-id="4849" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4850" instrument_node="">‘Consignment first’ groupage: evolving the TSS service</span></span></h3><span data-dcnode-id="4847" instrument_node="">
</span><p data-dcnode-id="4844"><span data-dcnode-id="4845" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4846" instrument_node="">Groupage is the commercial grouping of multiple consignments within a single trailer or vehicle.</span></span></p><span data-dcnode-id="4843" instrument_node="">
</span><p data-dcnode-id="4836"><span data-dcnode-id="4841" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4842" instrument_node="">This can involve several independent hauliers combining their separate part-load consignments into a single full load or a single haulier collecting multiple distinct consignments from different suppliers or from different locations to create a single load for shipment to NI.</span></span><br data-dcnode-id="4840"><span data-dcnode-id="4839" instrument_node="">
</span><span data-dcnode-id="4837" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4838" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="4835" instrument_node="">
</span><h4 data-dcnode-id="4832"><span data-dcnode-id="4833" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4834" instrument_node="">Haulier feedback</span></span></h4><span data-dcnode-id="4831" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4829" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4830" instrument_node="">After consulting hauliers, from the 15 February TSS will be making changes to its declarations submission process to better accommodate groupage loads.</span></span></p><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4824"><span data-dcnode-id="4825" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4826" instrument_node="">Traders can now input consignments into the TSS portal, create your MRN numbers and then pass this information to your haulier.</span></span></p><span data-dcnode-id="4823" instrument_node="">
</span><p data-dcnode-id="4820"><span data-dcnode-id="4821" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4822" instrument_node="">Hauliers can then create their final ENS by combining all consignments under one ENS header once the full trailer or vehicle load has been completed, submitting the declaration through TSS.</span></span></p><span data-dcnode-id="4819" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4817" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4818" instrument_node="">Full instructions and guidance will be available on NICTA shortly.</span></span></p><span data-dcnode-id="4815" instrument_node="">
</span><h3 data-dcnode-id="4812"><span data-dcnode-id="4813" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4814" instrument_node="">Moving fish</span></span></h3><span data-dcnode-id="4811" instrument_node="">
</span><p data-dcnode-id="4805"><span data-dcnode-id="4806" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4810" instrument_node="">This is a new entrant into our weekly list of top queries. If moving fish from GB to NI, there is guidance from HM Government </span><a data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4c4937dbc3%26e%3Df689d769a3"><span data-dcnode-id="4809" instrument_node="">here</span></a><span data-dcnode-id="4807" instrument_node="">.</span></span></p><span data-dcnode-id="4804" instrument_node="">
</span><h4 data-dcnode-id="4801"><span data-dcnode-id="4802" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4803" instrument_node="">Transit</span></span></h4><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4794"><span data-dcnode-id="4795" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4799" instrument_node="">Goods movement journeys from NI to GB via Ireland (the EU) require export declarations that are supported by TSS. It’s a </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D16377130de%26e%3Df689d769a3"><span data-dcnode-id="4798" instrument_node="">process we have outlined in summary here</span></a><span data-dcnode-id="4796" instrument_node="">.</span></span></p><span data-dcnode-id="4793" instrument_node="">
</span><br data-dcnode-id="4792" style="clear: both;"><span data-dcnode-id="4791" instrument_node="">
</span><br data-dcnode-id="4790" style="clear: both;"><span data-dcnode-id="4789" instrument_node="">
</span></div><span data-dcnode-id="4787" instrument_node="">
</span><br data-dcnode-id="4786" style="clear: both;"><span data-dcnode-id="4785" instrument_node="">
</span><h4 data-dcnode-id="4783" data-subitem="2" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="4784" instrument_node="">5th February</span></h4><span data-dcnode-id="4782" instrument_node="">
</span><div class="subitems subitem-2" data-dcnode-id="4421" style="width: 100%; float: left; margin-top: 10px; display: none;"><span data-dcnode-id="4781" instrument_node="">
</span><p data-dcnode-id="4776"><span data-dcnode-id="4777" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4778"><u data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">Latest situation</span></u></strong></span></p><span data-dcnode-id="4775" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4773" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4774" instrument_node="">This week has been another week dominated by Brexit challenges and discussions. Things are progressing but still very slowly and we are starting to experience more issues at the ports and border control points throughout Europe. Work is ongoing to resolve all these issues and everyone continues to work together to try and support the sector to get seafood flowing as frictionless as possible into Europe.</span></span><br data-dcnode-id="4772"><span data-dcnode-id="4771" instrument_node="">
</span><span data-dcnode-id="4769" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4770" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">
</span><span data-dcnode-id="4763" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4764"><u data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">Seafood Producers Resilience fund – went live today. </span></u></strong></span><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">
</span><span data-dcnode-id="4759" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4760" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4758"><span data-dcnode-id="4757" instrument_node="">
</span><span data-dcnode-id="4755" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4756" instrument_node="">The Seafood Producers Resilience Fund will provide support to eligible shellfish catchers and eligible shellfish and trout aquaculture undertakings. These businesses have lost access to domestic and international food markets as a result of COVID-19, and the difficult trading conditions that have resulted from the end of the transition period following the UK’s withdrawal from the EU.</span></span></p><span data-dcnode-id="4753" instrument_node="">
</span><p data-dcnode-id="4745"><span data-dcnode-id="4746" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4752" instrument_node="">The scheme was&nbsp;</span><u data-dcnode-id="4748"><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Df4e5a71460%26e%3Df689d769a3"><span data-dcnode-id="4751" instrument_node="">announced by Rural Economy Secretary Fergus Ewing</span></a><span data-dcnode-id="4749" instrument_node="">&nbsp;</span></u><span data-dcnode-id="4747" instrument_node="">on 3 February.&nbsp;</span></span></p><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4741"><span data-dcnode-id="4742" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4743" instrument_node="">This new funding worth £6.45m will benefit:</span></span></p><span data-dcnode-id="4740" instrument_node="">
</span><ul data-dcnode-id="4730"><span data-dcnode-id="4739" instrument_node="">
</span><li data-dcnode-id="4736"><span data-dcnode-id="4737" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4738" instrument_node="">around 1000 vessels landing shellfish such as crab, lobster, scallops, langoustines and squid</span></span></li><span data-dcnode-id="4735" instrument_node="">
</span><li data-dcnode-id="4732"><span data-dcnode-id="4733" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4734" instrument_node="">round 75 aquaculture businesses that produce shellfish or trout for table markets.</span></span></li><span data-dcnode-id="4731" instrument_node="">
</span></ul><span data-dcnode-id="4729" instrument_node="">
</span><p data-dcnode-id="4726"><span data-dcnode-id="4727" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4728" instrument_node="">The scheme will provide&nbsp;vital cash to vulnerable fishers and producers as quickly as possible in order to contribute to our objectives to:</span></span></p><span data-dcnode-id="4725" instrument_node="">
</span><ul data-dcnode-id="4711"><span data-dcnode-id="4724" instrument_node="">
</span><li data-dcnode-id="4721"><span data-dcnode-id="4722" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4723" instrument_node="">support the seafood producing sector</span></span></li><span data-dcnode-id="4720" instrument_node="">
</span><li data-dcnode-id="4717"><span data-dcnode-id="4718" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4719" instrument_node="">ensure that viable businesses are not lost in the short term whilst we seek resolution to the current issues, and await improvements to the public health situation</span></span></li><span data-dcnode-id="4716" instrument_node="">
</span><li data-dcnode-id="4713"><span data-dcnode-id="4714" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4715" instrument_node="">keep jobs in remote coastal communities</span></span></li><span data-dcnode-id="4712" instrument_node="">
</span></ul><span data-dcnode-id="4710" instrument_node="">
</span><p data-dcnode-id="4690"><span data-dcnode-id="4708" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4709" instrument_node="">This funding does not prevent vessels from fishing, or businesses from operating</span></span><br data-dcnode-id="4707"><span data-dcnode-id="4706" instrument_node="">
</span><span data-dcnode-id="4701" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4705" instrument_node="">To apply please find details </span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D10b715e835%26e%3Df689d769a3"><span data-dcnode-id="4704" instrument_node="">here</span></a><span data-dcnode-id="4702" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4700"><span data-dcnode-id="4699" instrument_node="">
</span><span data-dcnode-id="4697" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4698" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4696"><span data-dcnode-id="4695" instrument_node="">
</span><span data-dcnode-id="4691" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4692"><u data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">£23m Funding Announcement</span></u></strong></span></p><span data-dcnode-id="4689" instrument_node="">
</span><p data-dcnode-id="4633"><span data-dcnode-id="4687" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4688" instrument_node="">After the announcement by Defra and Treasury of a £23 million compensation scheme for fishing and seafood businesses hit by lost export sales over 2 weeks ago, there is still no detail.&nbsp; We understand more details may emerge next week but we await more information.&nbsp;</span></span><br data-dcnode-id="4686"><span data-dcnode-id="4685" instrument_node="">
</span><span data-dcnode-id="4683" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4684" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4682"><span data-dcnode-id="4681" instrument_node="">
</span><span data-dcnode-id="4677" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4678"><u data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">Seafood Scotland Expert Brexit Support Now Available</span></u></strong></span><br data-dcnode-id="4676"><span data-dcnode-id="4675" instrument_node="">
</span><span data-dcnode-id="4673" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4674" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4672"><span data-dcnode-id="4671" instrument_node="">
</span><span data-dcnode-id="4669" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4670" instrument_node="">Thanks to funding from Scotland Food &amp; Drink Partnership’s recovery plan, underpinned by Scottish Government funding, new temporary Brexit specialist posts in Seafood Scotland have been created to support companies with the new bureaucratic requirements – details below.&nbsp;</span></span><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">
</span><span data-dcnode-id="4665" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4666" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4664"><span data-dcnode-id="4663" instrument_node="">
</span><span data-dcnode-id="4659" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4660"><u data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">Scottish Brexit Support</span></u></strong></span><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">
</span><span data-dcnode-id="4655" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4656" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4654"><span data-dcnode-id="4653" instrument_node="">
</span><span data-dcnode-id="4650" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">Our Brexit specialists are available now to help and advise you and your businesses regarding any urgent post-Brexit EU exporting issues.</span></strong></span><br data-dcnode-id="4649"><span data-dcnode-id="4648" instrument_node="">
</span><span data-dcnode-id="4646" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4647" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4645"><span data-dcnode-id="4644" instrument_node="">
</span><span data-dcnode-id="4642" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4643" instrument_node="">The consultants appointed by Seafood Scotland are now in place and can be contacted with specific issues or challenges you are facing to do with any aspect of exporting your product to the EU.</span></span><br data-dcnode-id="4641"><span data-dcnode-id="4640" instrument_node="">
</span><span data-dcnode-id="4638" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4639" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4637"><span data-dcnode-id="4636" instrument_node="">
</span><span data-dcnode-id="4634" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4635" instrument_node="">This might include clarity on customs and export certification processes and systems, or on documentation or paperwork or issues, such as:</span></span></p><span data-dcnode-id="4632" instrument_node="">
</span><ul data-dcnode-id="4610"><span data-dcnode-id="4631" instrument_node="">
</span><li data-dcnode-id="4628"><span data-dcnode-id="4629" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4630" instrument_node="">Catch certificates</span></span></li><span data-dcnode-id="4627" instrument_node="">
</span><li data-dcnode-id="4624"><span data-dcnode-id="4625" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4626" instrument_node="">Health certificates</span></span></li><span data-dcnode-id="4623" instrument_node="">

</span><span data-dcnode-id="4480" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4481"><u data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">The Academy – Scotland Food &amp; Drink</span></u></strong></span></p><span data-dcnode-id="4478" instrument_node="">
</span><p data-dcnode-id="4458"><span data-dcnode-id="4476" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4477" instrument_node="">The Academy is a unique, market-focused, and&nbsp;commercially orientated training programme&nbsp;that helps Scottish food and drink businesses – at every stage of their growth journey – sell themselves, build their brands and thrive in grocery and foodservice markets.</span></span><br data-dcnode-id="4475"><span data-dcnode-id="4474" instrument_node="">
</span><span data-dcnode-id="4472" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4473" instrument_node="">This unique series of structured training programmes is designed by market-focused industry experts to enable real and sustainable business growth. Underpinned by tailored one-to-one support, each programme matches the needs of your business with appropriate specialists and mentors.</span></span><br data-dcnode-id="4471"><span data-dcnode-id="4470" instrument_node="">
</span><span data-dcnode-id="4468" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4469" instrument_node="">The Academy is focused on knowledge-sharing, upskilling, innovating and succeeding. It’s fundamentally about delivering real change for long term growth for your business. Change that’s rooted in the here and now, in the commercial realities of the world we live in but with an eye to the future, to ensure your business is agile.</span></span><br data-dcnode-id="4467"><span data-dcnode-id="4466" instrument_node="">
</span><span data-dcnode-id="4464" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4465" instrument_node="">No matter whether you’re a two-person start-up or a renowned, established brand we can offer you the expertise you need to give your business the extra edge.</span></span><br data-dcnode-id="4463"><span data-dcnode-id="4462" instrument_node="">
</span><span data-dcnode-id="4459" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">What are the programmes on offer, and what are the differences between each? </span></strong></span></p><span data-dcnode-id="4457" instrument_node="">

</span><li data-dcnode-id="4445"><span data-dcnode-id="4446" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Accelerating Growth </span></strong><span data-dcnode-id="4447" instrument_node="">is for SMEs with aspirations to enter the next phase of growth and will help identify and unlock opportunities to increase penetration and sales in UK markets.</span></span></li><span data-dcnode-id="4444" instrument_node="">

</span><div data-dcnode-id="4014" style="width: 100%; float: left; margin: 0 0 10px 0; padding: 0 0 10px 0; border-bottom: 1px solid #0e3160;"><span data-dcnode-id="4415" instrument_node="">
</span><h3 class="cv_title" data-dcnode-id="4413" data-item="7" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="4414" instrument_node="">January 2021 Update</span></h3><span data-dcnode-id="4412" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-7" data-dcnode-id="4016" style="display: none;"><span data-dcnode-id="4411" instrument_node="">
</span><br data-dcnode-id="4410" style="clear: both;"><span data-dcnode-id="4409" instrument_node="">
</span><h4 data-dcnode-id="4407" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="4408" instrument_node="">22nd January</span></h4><span data-dcnode-id="4406" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="4018" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4402" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Latest situation</span></strong></span><br data-dcnode-id="4401"><span data-dcnode-id="4400" instrument_node="">
</span><span data-dcnode-id="4398" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4399" instrument_node="">It has been a dreadful three weeks of challenges for exporters.&nbsp;Groupage has been the source of greatest trouble with bureaucratic requirements being initially impossible for many consolidated loads.&nbsp;Alongside my other industry colleagues, I have been involved in separate Ministerial meetings with Fergus Ewing, DEFRA Ministers George Eustice and Victoria Prentice this week.&nbsp;There is now UK Government acknowledgement of the scale of the problem and officials in Scotland and London are working hard to tackle immediate problems.&nbsp;It should be noted that freight volumes between GB and the Continent remain considerably lower than normal so challenges may exacerbate in the coming weeks.</span></span></p><span data-dcnode-id="4396" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4393" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Groupage – a tentative restart</span></strong></span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">
</span><span data-dcnode-id="4389" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4390" instrument_node="">The movement of consolidated loads for different companies – groupage – restarted this week with very modest volumes. There needs to be a ramping up of this over the coming days for more companies to start trading again into the EU.</span></span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">
</span><span data-dcnode-id="4385" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4386" instrument_node="">In the medium-term (within the coming weeks) ourselves and partners are exploring options to look at streamlining of bureaucracy, based on the evidence of the first three weeks of post-Brexit trade.&nbsp;There may be more information next week on a process to take that crucial work forward.&nbsp;</span></span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4362"><span data-dcnode-id="4380" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Identifying common problems and steps to address them</span></strong></span><br data-dcnode-id="4379"><span data-dcnode-id="4378" instrument_node="">
</span><span data-dcnode-id="4376" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4377" instrument_node="">One of the great challenges of recent days has been the sheer number of problem areas around the new, post-Brexit bureaucracy.&nbsp;As one problem is addressed, it seems as though another two emerge. In the last 24 hours, problems have ranged from typos on documents, incorrect batch numbers and wrong importer addresses to ridiculous debates about whether fish species needed translated into Dutch and whether official stamps should be in red or blue ink.&nbsp;Food Standards Scotland (FSS) continues to work hard on the ground at the three hubs to issue Export Health Certificates and tackle many of these individual problems.&nbsp;However problems exist on both sides of the Channel and within our member companies, whom are grappling with the new requirements.&nbsp;</span></span><br data-dcnode-id="4375"><span data-dcnode-id="4374" instrument_node="">
</span><span data-dcnode-id="4372" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4373" instrument_node="">FSS have very kindly pulled together a list of the key issues the hubs are experiencing</span></span><br data-dcnode-id="4371"><span data-dcnode-id="4370" instrument_node="">
</span><span data-dcnode-id="4368" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4369" instrument_node="">&nbsp;</span></span><br data-dcnode-id="4367"><span data-dcnode-id="4366" instrument_node="">
</span><span data-dcnode-id="4363" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">For suppliers</span></strong></span></p><span data-dcnode-id="4361" instrument_node="">
</span><ul data-dcnode-id="4331"><span data-dcnode-id="4360" instrument_node="">
</span><li data-dcnode-id="4357"><span data-dcnode-id="4358" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4359" instrument_node="">Discrepancies between the documents provided to the COs and the labels on the products checked (wrong ID mark, different batch numbers, different production dates, total number of boxes, weights, wrong supplier, etc.)</span></span></li><span data-dcnode-id="4356" instrument_node="">
</span><li data-dcnode-id="4353"><span data-dcnode-id="4354" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4355" instrument_node="">Delays in the Hub obtaining the information from their suppliers</span></span></li><span data-dcnode-id="4352" instrument_node="">
</span><li data-dcnode-id="4349"><span data-dcnode-id="4350" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4351" instrument_node="">Incomplete information from suppliers(number or incorrect commodity code, common name of product with no scientific name, etc)</span></span></li><span data-dcnode-id="4348" instrument_node="">
</span><li data-dcnode-id="4345"><span data-dcnode-id="4346" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4347" instrument_node="">Excessive time required for the Hubs to verify the information before presenting the loads to the COs – if there is incomplete information the Hubs need to go back to the suppliers to get the right information – eg 3 separate batch numbers in the chiller for one load but the paperwork had two completely different batch numbers</span></span></li><span data-dcnode-id="4344" instrument_node="">
</span><li data-dcnode-id="4341"><span data-dcnode-id="4342" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4343" instrument_node="">Mix up’s with destination – some goods for Northern Ireland were recorded on paperwork for Europe</span></span></li><span data-dcnode-id="4340" instrument_node="">
</span><li data-dcnode-id="4337"><span data-dcnode-id="4338" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4339" instrument_node="">Wrong trailer numbers and wrong seal numbers given by hub</span></span></li><span data-dcnode-id="4336" instrument_node="">
</span><li data-dcnode-id="4333"><span data-dcnode-id="4334" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4335" instrument_node="">Some loads arriving late so EHCs delayed</span></span></li><span data-dcnode-id="4332" instrument_node="">
</span></ul><span data-dcnode-id="4330" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4328" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4329" instrument_node="">We also have numerous issues that have arisen and we are currently working with SG, APHA and Defra colleagues to resolve;</span></span></p><span data-dcnode-id="4326" instrument_node="">
</span><ul data-dcnode-id="4280"><span data-dcnode-id="4325" instrument_node="">
</span><li data-dcnode-id="4322"><span data-dcnode-id="4323" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4324" instrument_node="">Lack of clarity on how to certify Faroes product for EU</span></span></li><span data-dcnode-id="4321" instrument_node="">
</span><li data-dcnode-id="4318"><span data-dcnode-id="4319" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4320" instrument_node="">BCPs want wild caught and farmed salmon on separate EHCs contrary to DEFRA guidance</span></span></li><span data-dcnode-id="4317" instrument_node="">

</span><span data-dcnode-id="4264" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4268" instrument_node="">UK Government has released a new easy to follow guide of the Top Things Exporters Need to do Now which can be found&nbsp;</span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcusercontent.com/6d09d813ba304ad42395ffb1b/files/00602617-f649-49ff-8d14-95e204897117/UKT_Top_things_to_do_now_1_.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4267" instrument_node="">here</span></a><span data-dcnode-id="4265" instrument_node="">.</span></span></p><span data-dcnode-id="4262" instrument_node="">
</span><p data-dcnode-id="4254"><span data-dcnode-id="4259" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Compensation scheme for the seafood sector</span></strong></span><br data-dcnode-id="4258"><span data-dcnode-id="4257" instrument_node="">
</span><span data-dcnode-id="4255" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4256" instrument_node="">There was good news and bad news within a £23 million compensation scheme announced by the UK Government for the seafood sector. The good news is that there are funds available. The bad news is that the detail is sketchy and some of it contradictory.&nbsp;It is not clear whether those catching can claim for damages as well as those processing.&nbsp;Proof is also required to show genuine loss and it’s unclear what the bureaucracy surrounding that will look like.&nbsp;Again, there will be more detail when it is published.</span></span></p><span data-dcnode-id="4253" instrument_node="">
</span><p data-dcnode-id="4242"><span data-dcnode-id="4250" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">Dealing with freight on the “non-short straits”, to Netherlands and Belgium.</span></strong></span><br data-dcnode-id="4249"><span data-dcnode-id="4248" instrument_node="">
</span><span data-dcnode-id="4243" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4247" instrument_node="">Much of the focus has been on challenges on routes to Calais and North West France.&nbsp;However, trade to Belgium and the Netherlands is also problematic.&nbsp;A webinar with the relevant authorities is taking place next Wednesday (27th) at 2pm.&nbsp;You’ll find the detail to register&nbsp;</span><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scotlandfooddrink.cmail19.com/t/d-l-cukhuuk-tyehtthdi-t/"><span data-dcnode-id="4246" instrument_node="">here</span></a><span data-dcnode-id="4244" instrument_node="">.</span></span></p><span data-dcnode-id="4241" instrument_node="">

</span><span data-dcnode-id="4234" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="4235" instrument_node="">Defra has confirmed to us this morning that a derogation to the normal drivers hours regulation is now in effect across the UK. This will assist in providing some flexibility should delays occur.</span></span><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">

</span><h4 data-dcnode-id="4004" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="4005" instrument_node="">23rd December</span></h4><span data-dcnode-id="4003" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="3726" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="4002" instrument_node="">
</span><h2 class="null" data-dcnode-id="3997"><span data-dcnode-id="3998" style="font-size: 12pt; font-family: georgia, palatino, serif;"><u data-dcnode-id="3999"><strong data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Support During the Festive Period</span></strong></u></span></h2><span data-dcnode-id="3996" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3994" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3995" instrument_node="">Below is key websites and details of who to contact during the festive period for Brexit related issues.</span></span><br data-dcnode-id="3993"><span data-dcnode-id="3992" instrument_node="">
</span><span data-dcnode-id="3990" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3991" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3989"><span data-dcnode-id="3988" instrument_node="">
</span><span data-dcnode-id="3983" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3987" instrument_node="">The Website&nbsp;</span><a data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prepareforbrexit.scot/"><span data-dcnode-id="3986" instrument_node="">https://www.prepareforbrexit.scot/</span></a><span data-dcnode-id="3984" instrument_node="">&nbsp;&nbsp;will be continually updated with the latest guidance and should be the first place to look for information</span></span><br data-dcnode-id="3982"><span data-dcnode-id="3981" instrument_node="">
</span><span data-dcnode-id="3979" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3980" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3978"><span data-dcnode-id="3977" instrument_node="">
</span><span data-dcnode-id="3975" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3976" instrument_node="">If you cannot find what you are looking for on the website and would like to speak to someone please call &nbsp;0300 303 0661</span></span><br data-dcnode-id="3974"><span data-dcnode-id="3973" instrument_node="">
</span><span data-dcnode-id="3971" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3972" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">
</span><span data-dcnode-id="3963" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Seafish</span></strong><span data-dcnode-id="3966" instrument_node="">&nbsp;will also be updated their website with guidance which can be found&nbsp;</span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seafish.org/trade-and-regulation/uk-exit-from-the-eu/%3F_cldee%3DZG9ubmEuZm9yZHljZUBzZWFmb29kc2NvdGxhbmQub3Jn%26recipientid%3Dcontact-20791d942821e81180f200505684117c-fe88a171d66d49c895d4dbdc1dc3c52c%26utm_source%3DClickDimensions%26utm_medium%3Demail%26utm_campaign%3DSeafish%26esid%3D8719e1d0-4840-eb11-811a-00505684117c"><span data-dcnode-id="3965" instrument_node="">here</span></a></span><br data-dcnode-id="3962"><span data-dcnode-id="3961" instrument_node="">
</span><span data-dcnode-id="3959" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3960" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3958"><span data-dcnode-id="3957" instrument_node="">
</span><span data-dcnode-id="3955" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3956" instrument_node="">If you are unable to find the answer to your question in their guidance then Seafish’s regulation team will be available to answer further questions on the end of the Brexit transition period over Christmas and New Year through a pre-bookable service. Between Monday 21 December 2020 and Monday 4&nbsp;January 2021, seafood businesses looking for additional advice with specific issues, can book a half hour slot with one of Seafish’s team. This helpline service replaces the usual contact details for their team during the above period.</span></span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">
</span><span data-dcnode-id="3951" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3952" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">
</span><span data-dcnode-id="3944" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3948" instrument_node="">Follow the link&nbsp;</span><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calendly.com/seafish/30-minute-1-2-1%3F_cldee%3DZG9ubmEuZm9yZHljZUBzZWFmb29kc2NvdGxhbmQub3Jn%26recipientid%3Dcontact-20791d942821e81180f200505684117c-fe88a171d66d49c895d4dbdc1dc3c52c%26utm_source%3DClickDimensions%26utm_medium%3Demail%26utm_campaign%3DSeafish%26esid%3D8719e1d0-4840-eb11-811a-00505684117c%26month%3D2020-12"><span data-dcnode-id="3947" instrument_node="">here</span></a><span data-dcnode-id="3945" instrument_node="">&nbsp;to pre-book a time slot which suits you. When making your booking please provide as much information as you can about the issues you are experiencing.</span></span></p><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3937"><span data-dcnode-id="3938" style="font-size: 12pt; font-family: georgia, palatino, serif;"><u data-dcnode-id="3939"><strong data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Other Brexit Information</span></strong></u></span></p><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3933" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Important update for Hauliers on market access rules from 1 January 2021 if there is no Free Trade Agreement</span></strong></span></p><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3928"><span data-dcnode-id="3929" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3930" instrument_node="">We appreciate current circumstances are very challenging for the haulage sector. &nbsp;We are working to ensure that the appropriate arrangements are in place for hauliers after the Transition Period ends.&nbsp; We said we would keep you updated on changes that affect you.&nbsp;</span></span></p><span data-dcnode-id="3927" instrument_node="">
</span><h1 data-dcnode-id="3924"><span data-dcnode-id="3925" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3926" instrument_node="">Latest position</span></span></h1><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3920"><span data-dcnode-id="3921" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3922" instrument_node="">We continue to work hard to finalise an overall trade agreement with the EU.&nbsp; That agreement should allow UK hauliers to carry goods to, from and through the EU with no restrictions.&nbsp; Both sides continue to prepare for a situation where a trade agreement has not been concluded by 31 December.</span></span></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3917" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3918" instrument_node="">On 10 December, the European Commission published a proposal for a Regulation covering basic connectivity with regard to both road freight, and road passenger transport. The EU Council has since approved the text with some changes (including the addition of some cabotage rights) and if the European Parliament endorses the text then it will be formally adopted.&nbsp; This is expected to happen shortly.</span></span><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node="">
</span><span data-dcnode-id="3910" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3914" instrument_node="">If the Regulation is adopted in its current form, it will allow&nbsp;</span><strong data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">UK hauliers to make unlimited journeys to or from the EU until 30 June 2021</span></strong><span data-dcnode-id="3911" instrument_node="">, and some additional movements until 31 May:</span></span></p><span data-dcnode-id="3908" instrument_node="">
</span><ul data-dcnode-id="3898"><span data-dcnode-id="3907" instrument_node="">
</span><li data-dcnode-id="3904"><span data-dcnode-id="3905" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3906" instrument_node="">Until 28 Feb UK hauliers will be allowed to make two additional movements which can be either cross-trade*, cabotage** or one of each;</span></span></li><span data-dcnode-id="3903" instrument_node="">
</span><li data-dcnode-id="3900"><span data-dcnode-id="3901" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3902" instrument_node="">between 1 March and 31 May hauliers will be allowed to make 1 additional movement which can be either cross-trade* or cabotage**.</span></span></li><span data-dcnode-id="3899" instrument_node="">
</span></ul><span data-dcnode-id="3897" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3895" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3896" instrument_node="">This will cover the majority of journeys performed by UK hauliers to EU countries.&nbsp; If an overall trade agreement with the EU is not concluded we will be working to put in place longer-term arrangements with the EU or Member States.</span></span><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">
</span><span data-dcnode-id="3888" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3892" instrument_node="">The EU Regulation will not allow transit to third countries.&nbsp; If an overall trade agreement is not concluded, and if you need to transit the EU to a third country you will need an ECMT permit.&nbsp;&nbsp; If you have been allocated an annual ECMT permit you have until 23.59&nbsp;</span><strong data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">today</span></strong><span data-dcnode-id="3889" instrument_node="">&nbsp;to pay for the permit.&nbsp;</span></span></p><span data-dcnode-id="3886" instrument_node="">
</span><h1 data-dcnode-id="3883"><span data-dcnode-id="3884" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3885" instrument_node="">What action should I take?</span></span></h1><span data-dcnode-id="3882" instrument_node="">
</span><ul data-dcnode-id="3872"><span data-dcnode-id="3881" instrument_node="">
</span><li data-dcnode-id="3874"><span data-dcnode-id="3875" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3880" instrument_node="">Check your journeys are covered by the EU Regulation and consider in particular whether you need a permit for&nbsp;</span><strong data-dcnode-id="3877"><u data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">transit</span></u></strong><span data-dcnode-id="3876" instrument_node="">&nbsp;in January.</span></span></li><span data-dcnode-id="3873" instrument_node="">
</span></ul><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3864" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">We will be able to issue short term permits for these journeys</span></strong><span data-dcnode-id="3868" instrument_node="">.&nbsp; If you have not been allocated an annual ECMT permit then you should contact the DVSA at&nbsp;</span><a data-dcnode-id="3866" href="mailto:shorttermecmt@dvsa.gov.uk"><span data-dcnode-id="3867" instrument_node="">shorttermecmt@dvsa.gov.uk</span></a><span data-dcnode-id="3865" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="3862" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3861" instrument_node="">Permits will only be issued for journeys to the countries listed below and you may be asked to provide evidence of previous trips or future contracts.&nbsp; While we assess demand, we will only issue permits to cover journeys that commence in January and you must return completed ECMT logbooks within two weeks of the expiry of the permit.&nbsp; Arrangements for access after January will be confirmed in the New Year.</span></span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3852"><span data-dcnode-id="3853" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3857" instrument_node="">We are not able at this stage to issue short term permits for additional cross-trade journeys: hauliers must therefore operate within the rules of the EU Regulation and may also make use of the permit-free movements allowed under the ECMT regime – see pages 11 and 13 of the&nbsp;</span><a data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur01.safelinks.protection.outlook.com/%3Furl%3Dhttps%253A%252F%252Flnks.gd%252Fl%252FeyJhbGciOiJIUzI1NiJ9.eyJidWxsZXRpbl9saW5rX2lkIjoxMDAsInVyaSI6ImJwMjpjbGljayIsImJ1bGxldGluX2lkIjoiMjAyMDEyMjMuMzI0MzM5NDEiLCJ1cmwiOiJodHRwczovL3d3dy5pdGYtb2VjZC5vcmcvc2l0ZXMvZGVmYXVsdC9maWxlcy9kb2NzLzEzbXFndWlkZS5wZGYifQ.tUMlst1UgS820NZuSLW9lzSfX6CAt4XWuyxk4smYc5A%252Fs%252F1295697195%252Fbr%252F92309808015-l%26data%3D04%257C01%257Crlandsburgh%2540scottishsalmon.co.uk%257Cfe7c04fa36b143dcf98308d8a74ba231%257C7b6c2d70e7c148f0a2d03ea3d34e939c%257C1%257C0%257C637443291332194158%257CUnknown%257CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%253D%257C3000%26sdata%3D5MIBdwPzVeDX1ejXEBMfqaCeym%252Fi%252FOfObh1rwJj3WQM%253D%26reserved%3D0" rel="noopener" target="_blank"><span data-dcnode-id="3856" instrument_node="">ECMT User Guide</span></a><span data-dcnode-id="3854" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" style="font-size: 12pt; font-family: georgia, palatino, serif;"><strong data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Third countries where you may need an ECMT permit to transit the EU in January:</span></strong></span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3841" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3845" instrument_node="">Albania, Armenia, Azerbaijan, Belarus, Bosnia and Herzegovina, Georgia, Kazakhstan, Liechtenstein, North Macedonia, Moldova, Montenegro, Norway, Serbia,&nbsp;</span><strong data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Switzerland</span></strong><span data-dcnode-id="3842" instrument_node="">, Tunisia, Turkey, Ukraine***</span></span></p><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3830"><span data-dcnode-id="3831" style="font-size: 12pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="3835" instrument_node="">*&nbsp;</span><strong data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Cross-trade</span></strong><span data-dcnode-id="3832" instrument_node="">&nbsp;is moving goods between two EU Member States, e.g taking a load from Paris to Brussels.</span></span></p><span data-dcnode-id="3829" instrument_node="">

</span><p data-dcnode-id="3715"><span data-dcnode-id="3718" instrument_node="">Scotland Food and Drink has a very comprehensive guide to trading with the EU and can be found </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D7ec4b940bc%26e%3Df689d769a3"><span data-dcnode-id="3717" instrument_node="">here</span></a></p><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3713" instrument_node="">The Seafish Website has a number of resources that will be very useful for companies including Trade agreements and seafood tariffs </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D725341dcb1%26e%3Df689d769a3"><span data-dcnode-id="3712" instrument_node="">https://www.seafish.org/trade-and-regulation/uk-exit-from-the-eu/trade-agreements-and-seafood-tariffs/</span></a></p><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3701"><span data-dcnode-id="3708" instrument_node="">For companies who will be trading with </span><strong data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Northern Ireland</span></strong><span data-dcnode-id="3705" instrument_node=""> you need to make sure you have signed up to the Trader Support Service which can be found </span><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9b82055475%26e%3Df689d769a3"><span data-dcnode-id="3704" instrument_node="">here</span></a><span data-dcnode-id="3702" instrument_node=""> – you will not be able to trade with this. You will also need to ensure your customers sign up to this too.</span></p><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Marine Scotland and Seafish’s webinar series material to download:</span></p><span data-dcnode-id="3697" instrument_node="">

</span><li data-dcnode-id="3691"><a data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D0368cd14da%26e%3Df689d769a3"><span data-dcnode-id="3695" instrument_node="">Trading non-live fishery product with the EU from the 1st January 2020</span></a><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dcc1e79dd83%26e%3Df689d769a3"><span data-dcnode-id="3693" instrument_node="">&nbsp;PowerPoint&nbsp;</span></a></li><span data-dcnode-id="3690" instrument_node="">

</span><li data-dcnode-id="3679"><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D180fbad8c7%26e%3Df689d769a3"><span data-dcnode-id="3683" instrument_node="">Webinar series questions</span></a><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da38f120809%26e%3Df689d769a3"><span data-dcnode-id="3681" instrument_node="">&nbsp;Word document</span></a></li><span data-dcnode-id="3678" instrument_node="">

</span><p data-dcnode-id="3671"><span data-dcnode-id="3675" instrument_node="">If there is any company who is really struggling to get answers to questions please ask </span><a data-dcnode-id="3673" href="mailto:enquiries@seafoodscotland.org?subject=Brexit%20Question"><span data-dcnode-id="3674" instrument_node="">us</span></a><span data-dcnode-id="3672" instrument_node=""> and we will try and find out the answer for you.</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3667" instrument_node="">
</span><h2 data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Export Markets Updates</span></h2><span data-dcnode-id="3664" instrument_node="">
</span><h3 data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Middle East</span></h3><span data-dcnode-id="3661" instrument_node="">
</span><p data-dcnode-id="3658"><u data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">Update on food service</span></u></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Food service sector is now finally picking up. Most restaurants are doing well during the weekends. However, with the lack of</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">tourists most restaurants situated in hotels aren’t doing as much business as they aren’t frequently visited by residents.</span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3648"><u data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Update on retail</span></u></p><span data-dcnode-id="3647" instrument_node="">
</span><p data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Going strong with online and in-store sales showing an increase. However, people still a bit cautious and not buying premium products as much as they would pre-Covid. This should change in 2021.</span></p><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3641"><u data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">Feedback from the buyers</span></u></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Retailers are now keen to look at new products, however, more of those that can generate volume sales, to start with.</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3634"><u data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Changes/impact on consumer behaviour</span></u></p><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Most residents now eating outside on weekends, and physically going to supermarkets for shopping, in the UAE. It seems life is returning to normal.</span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3627"><u data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Freight and logistics issues</span></u></p><span data-dcnode-id="3626" instrument_node="">
</span><p data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">In order to reduce airfreight (due to the high cost and reliance on it), many retailers are now looking at bringing in chilled products as frozen (via sea freight) and then defrost those products in the UAE and date code in their stores. Two major retailers, Spinneys and MAF Carrefour are looking into this and if this works (and okayed by Dubai Municipality) they would then import other chilled products in the same way, going forward.</span></p><span data-dcnode-id="3623" instrument_node="">
</span><h3 data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Canada</span></h3><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3617"><u data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Update on food service</span></u></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Across Canada the elevated rates of positivity since Thanskgiving, particularly in western provinces have meant a tightening of restriction for dining. In Alberta, this has meant reduced seating or total closure of restaurants. The greater Toronto Area, the largest foodservice market, has moved to tighter restrictions from November 21st for 4 weeks, ostensibly closing in restaurant dining. The Province is also considering legislation to cap delivery fees in order to assist in business costs. The Government also introduced a federal rent subsidy which has been welcomed by Restaurant Canada (RC) in addition to extending the wage subsidy programme CERB. RC has reported the industry is at a tipping point and has urged the federal and provincial governments to continue to support the industry through the programmes until vaccines are widely distributed and cases reduce significantly. However out of restaurant dining continues to experience increases week on week as factors such as colder weather and more supply meet the demand from consumers and innovation in food formats continues.</span></p><span data-dcnode-id="3613" instrument_node="">
</span><p data-dcnode-id="3610"><u data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Update on retail</span></u></p><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Retail sales continue to grow Q on Q with major retailers reporting strong results in Q3. However, Q4 sales will be impacted by restrictions to family gathering sizes</span></p><span data-dcnode-id="3606" instrument_node="">
</span><h3 data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">USA</span></h3><span data-dcnode-id="3603" instrument_node="">
</span><p data-dcnode-id="3600"><u data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Update on food service</span></u></p><span data-dcnode-id="3599" instrument_node="">
</span><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">FS continues to be patchy across the US. Despite record case numbers in 25 states, with all but 10 states seeing increases, restriction vary considerably. However, out of restaurant is strong with delivery / takeout representing up 2/3 of revenues for some operators.</span></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">All eyes continue to be on Q4 where results are usually strongest. The prospect of the first wave of vaccines (up to 20 million) in December has seen hope for a quicker recovery.</span></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3590"><u data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Freight and logistics issues</span></u></p><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Transatlantic flights remain at 1/3 of previous volume which continue to cause elevated pricing for freight particularly salmon / seafood. We may see this pick up in the next 2 quarters if capacity returns with vaccine rollouts.</span></p><span data-dcnode-id="3586" instrument_node="">
</span><h3 data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">China</span></h3><span data-dcnode-id="3583" instrument_node="">
</span><p data-dcnode-id="3578"><u data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Update on retail</span></u><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">
E-commerce:</span></p><span data-dcnode-id="3577" instrument_node="">
</span><ul data-dcnode-id="3563"><span data-dcnode-id="3576" instrument_node="">
</span><li data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">China’s Singles Day shopping festival has grown into the world’s biggest shopping event. The sales figures showed that China’s potential in domestic demand remained promising.</span></li><span data-dcnode-id="3573" instrument_node="">
</span><li data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">This year, at the shopping peak, 583,000 orders were placed in a single second on Alibaba’s business-to-customer platform Tmall, setting a new shopping record, while total sales on the platform surged to 498.2 billion yuan (about $74.1 billion) from Nov 1 to Nov 11, up 26 % year-on-year.</span></li><span data-dcnode-id="3570" instrument_node="">
</span><li data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Singles Day has become a national shopping festival. In addition to e-commerce platforms, offline convenience stores and supermarkets joined in offering discounts and service upgrades. Offline merchants, which take up more than 70 % of China’s total retail sales, have been actively participating in the event, leveraging online marketing tools to cash in on rising consumer enthusiasm.</span></li><span data-dcnode-id="3567" instrument_node="">
</span><li data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Livestreaming has become an increasingly important method for marketing in China with about 309 million live streaming e-commerce users as of June, China’s top live streaming host Viya, has sold 5.87 billion yuan ($890 million) in products from July to September.</span></li><span data-dcnode-id="3564" instrument_node="">
</span></ul><span data-dcnode-id="3562" instrument_node="">
</span><p data-dcnode-id="3557"><u data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Changes/impact on consumer behaviour</span></u><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node="">
E-commerce:</span></p><span data-dcnode-id="3556" instrument_node="">
</span><ul data-dcnode-id="3548"><span data-dcnode-id="3555" instrument_node="">
</span><li data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">COVID-19 has altered the online shopping habits of elderly consumers. Elderly consumers prefer to spend more each time and buy less frequently. They favour fresh foods to ready-to-eat alternatives, which is in line with their habit of cooking at home.</span></li><span data-dcnode-id="3552" instrument_node="">
</span><li data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">The cities with the highest per capita consumption of new users online are from lower-tier cities. The fourth to sixth- tier cities and townships will become new battlefields for e-commerce players due to the rise in local buyers’ disposable incomes and desire to upgrade their lifestyles by purchasing high-quality imported products.</span></li><span data-dcnode-id="3549" instrument_node="">
</span></ul><span data-dcnode-id="3547" instrument_node="">
</span><p data-dcnode-id="3542"><u data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Freight and logistics issues</span></u><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">
E-commerce:</span></p><span data-dcnode-id="3541" instrument_node="">
</span><p data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">On Nov 11 alone, China’s express delivery firms handled 675 million parcels nationwide, up 26.16 % year-on- year, while the total number of parcels handled from Nov 1 to 11 reached 3.965 billion. ( source: the State Post Bureau)</span></p><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3533"><u data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Any other comments / challenges / opportunities</span></u><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">
E-commerce</span></p><span data-dcnode-id="3532" instrument_node="">
</span><ul data-dcnode-id="3527"><span data-dcnode-id="3531" instrument_node="">
</span><li data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">The Regional Comprehensive Economic Partnership agreement (RECP) has been signed by 15 Asia-Pacific countries on Nov.15. The RCEP is expected to increase trade integration between the 10 ASEAN countries, East Asian leaders (China, Japan, South Korea), and Oceania (Australia, New Zealand). It will boost the development of regional e- commerce, which includes the facilitation of paperless trading, electronic authentication and electronic signatures, as well as online personal information protection. (source : Ministry of Commerce)</span></li><span data-dcnode-id="3528" instrument_node="">
</span></ul><span data-dcnode-id="3526" instrument_node="">
</span><p data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3523" instrument_node="">
