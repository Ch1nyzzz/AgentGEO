</span><p data-dcnode-id="3517"><u data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Update on food service</span></u></p><span data-dcnode-id="3516" instrument_node="">
</span><ul data-dcnode-id="3502"><span data-dcnode-id="3515" instrument_node="">
</span><li data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">As the number of new covid cases rose to the peak in recent weeks, HK government has reduced the maximum number of people per table at restaurants is restricted from 6 to 4; dine-in services are to cease operations at midnight.</span></li><span data-dcnode-id="3512" instrument_node="">
</span><li data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Live performance and dancing will be suspended in catering premises, including bars and nightclubs, and party rooms for holding social gatherings will be closed. These measures would be effective for 5 days starting from 22nd&nbsp;Nov.</span></li><span data-dcnode-id="3509" instrument_node="">
</span><li data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Attendance at banquets will be capped at 40.</span></li><span data-dcnode-id="3506" instrument_node="">
</span><li data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">HK government made it compulsory for restaurants to display the Leave Home Safe QR code for easier tracing close contact with new cases.</span></li><span data-dcnode-id="3503" instrument_node="">
</span></ul><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3498"><u data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Feedback from the buyers</span></u></p><span data-dcnode-id="3497" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">An importer said the demand in healthy and natural products (e.g. products for keto diet, organic products, planted-based and vegan products) in HK is rising rapidly, so he has to adapt such demand by sourcing different products worldwide.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3489"><u data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Freight and logistics issues</span></u><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">
According to OAG Aviation Worldwide Ltd, the total passengers handled at HK International Airport dropped 85% in Nov 2020 compared to same time last year; yet if it just decreased 1.5% in Nov compared to Oct 2020.</span></p><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3485"><u data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Any other comments / challenges / opportunities</span></u></p><span data-dcnode-id="3484" instrument_node="">
</span><ul data-dcnode-id="3476"><span data-dcnode-id="3483" instrument_node="">
</span><li data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">The travel bubble between HK and Singapore was suspended for 2 weeks which was announced by the HK government on 21st Nov due to a sudden spike in Covid cases in HK.</span></li><span data-dcnode-id="3480" instrument_node="">
</span><li data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">The government is planning to give a one-off HK$5,000 subsidy to employed citizens who are diagnosed with Covid- 19 and not covered by employee benefits. Such scheme was announced on 22nd Nov as an outbreak tied to dance clubs across HK ballooned and recorded the highest number of daily new infections in over 3 months.</span></li><span data-dcnode-id="3477" instrument_node="">
</span></ul><span data-dcnode-id="3475" instrument_node="">

</span><ul data-dcnode-id="3454"><span data-dcnode-id="3464" instrument_node="">
</span><li data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Nationwide, Japan reported 2,596 new cases 21/Nov, the fourth consecutive record-breaking day amid an ongoing nationwide surge that began in late October.</span></li><span data-dcnode-id="3461" instrument_node="">
</span><li data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Prime Minister Suga said the central government will secure ¥50 billion to provide financial support if and when governors call on local businesses to reduce or suspend operations.</span></li><span data-dcnode-id="3458" instrument_node="">
</span><li data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Government-funded programs (Go to Travel, Go to Eat) meant to subsidize the food, entertainment and tourism industries would proceed.</span></li><span data-dcnode-id="3455" instrument_node="">
</span></ul><span data-dcnode-id="3453" instrument_node="">

</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Most retail shops and restaurants are open though may have reduced hours. Large gatherings are restricted in size.</span></p><span data-dcnode-id="3446" instrument_node="">

</span><li data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">The majority of buyers are even more reluctant to do new business since Covid-19 3rd wave has come late Oct.</span></li><span data-dcnode-id="3438" instrument_node="">
</span><li data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Watching carefully FTA between UK and Japan</span></li><span data-dcnode-id="3435" instrument_node="">

</span><h3 data-dcnode-id="3351"><strong data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Brexit Information Hub</span></strong></h3><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3347"><strong data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">Guidance on the Marine Scotland website</span></strong></p><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3341"><span data-dcnode-id="3345" instrument_node="">Marine Scotland produced guidance material on international trade in 2019, preparatory to a potential no-deal Brexit – </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4cb5f49568%26e%3Df689d769a3"><span data-dcnode-id="3344" instrument_node="">guidance</span></a><span data-dcnode-id="3342" instrument_node="">. We would urge you to visit this website in the first instance, and consider downloading the guidance leaflets and following up the links that would be relevant to your business.</span></p><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3337"><strong data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Preparing for Brexit on Scottish Government website</span></strong></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3331"><span data-dcnode-id="3335" instrument_node="">For additional comprehensive guidance from the Scottish Government, please visit this website: </span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D3a510dfca1%26e%3Df689d769a3"><span data-dcnode-id="3334" instrument_node="">preparing for Brexit</span></a><span data-dcnode-id="3332" instrument_node="">.</span></p><span data-dcnode-id="3330" instrument_node="">
</span><p data-dcnode-id="3327"><strong data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Fishing Vessel Registration and Inspection by LA’s – URGENT</span></strong></p><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3325" instrument_node="">Marine Scotland believes there is now good industry knowledge about the requirement for all vessels intending to put their catch into an export supply chain to be a registered food business. This requires an inspection, which will be undertaken by Local Authority officials. Food Standards Scotland has been leading this initiative, and details can be found here: </span><a data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfa654c2f30%26e%3Df689d769a3"><span data-dcnode-id="3324" instrument_node="">guidance</span></a><span data-dcnode-id="3322" instrument_node="">.</span></p><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3317"><strong data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Listed Food Businesses</span></strong></p><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3315" instrument_node="">Although this topic will potentially be covered in some of the other guidance referred to in this paper, please also see: </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dfa590d68e6%26e%3Df689d769a3"><span data-dcnode-id="3314" instrument_node="">guidance</span></a><span data-dcnode-id="3312" instrument_node="">.</span></p><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3307"><strong data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">UK Transition website</span></strong></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3305" instrument_node="">As a general portal to all things related to the end of the transition period, the UK government has launched its </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D8adc32e929%26e%3Df689d769a3"><span data-dcnode-id="3304" instrument_node="">Transition website</span></a><span data-dcnode-id="3302" instrument_node="">.</span></p><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3297"><strong data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">The Border Operating Model</span></strong></p><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3295" instrument_node="">Much of the information you will need to trade with EU Member States, whether as an importer or an exporter, is contained within the recently published </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D6c28f8cf39%26e%3Df689d769a3"><span data-dcnode-id="3294" instrument_node="">Border Operating Model</span></a><span data-dcnode-id="3292" instrument_node="">. This is an extensive document, and much of it is not relevant to the seafood sector. Nevertheless, some of the generic guidance to importers and exporters is valuable, and there are specific sections related to seafood sector trade. </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D358d2cf03c%26e%3Df689d769a3"><span data-dcnode-id="3291" instrument_node="">Webinars</span></a><span data-dcnode-id="3289" instrument_node=""> are available. Importers should note the UK government’s proposal to phase the requirements for imports over the first six months of 2021. In addition, there is a UK government </span><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D8251135b06%26e%3Df689d769a3"><span data-dcnode-id="3288" instrument_node="">consultation for 2025</span></a><span data-dcnode-id="3286" instrument_node="">.</span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3281"><strong data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">How to import and export goods between Great Britain and the EU from 1 January 2021</span></strong></p><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3279" instrument_node="">HM Revenue and Customs put this </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D934b4597ea%26e%3Df689d769a3"><span data-dcnode-id="3278" instrument_node="">guidance</span></a><span data-dcnode-id="3276" instrument_node=""> material online on the 13</span><sup data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">th</span></sup><span data-dcnode-id="3273" instrument_node=""> of July.</span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3268"><strong data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Export Health Certificates</span></strong></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3266" instrument_node="">Seafood sector exporters will be aware of the need for Export Health Certificates after the end of the transition period, and this topic is covered in some of the other guidance referred to in this paper. &nbsp;There is a lot of useful information contained within the following </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D63f0ba3f28%26e%3Df689d769a3"><span data-dcnode-id="3265" instrument_node="">webpages</span></a><span data-dcnode-id="3263" instrument_node="">. In addition you can search for </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D519bd92dc3%26e%3Df689d769a3"><span data-dcnode-id="3262" instrument_node="">available certificates</span></a><span data-dcnode-id="3260" instrument_node="">. SG and FSS are proposing FSS leads on EHC provision at a minimum of two key logistics hubs in Scotland, which will operate a ‘groupage’ system to help food business export effectively and efficiently after the EU-exit transition period. More information will shortly be communicated, and will be available through the Brexit section of the FSS website: </span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D5f4d2f2c0e%26e%3Df689d769a3"><span data-dcnode-id="3259" instrument_node="">https://www.foodstandards.gov.scot/about-us/brexit</span></a></p><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3253"><strong data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Marine and Fisheries Compliance</span></strong></p><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3247"><span data-dcnode-id="3251" instrument_node="">Effective monitoring and enforcement of marine and fishing laws is vital if we are to protect Scotland’s valuable marine areas and fisheries. It is important that these are protected by detecting breaches of fisheries regulations by monitoring and inspection at sea and in ports, and then reporting as appropriate to the prosecuting authorities, and by providing intelligence on fishing activity in the sea areas around Scotland. Comprehensive guidance on all relevant issues, and particularly Illegal, Unreported and Unregulated (IUU) fishing and Catch Certificates can be found here: </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dde3591ff29%26e%3Df689d769a3"><span data-dcnode-id="3250" instrument_node="">guidance</span></a><span data-dcnode-id="3248" instrument_node="">.</span></p><span data-dcnode-id="3246" instrument_node="">
</span><p data-dcnode-id="3243"><strong data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">The Northern Ireland Protocol</span></strong></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3241" instrument_node="">The UK government recently published first a ‘</span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D12a2e13634%26e%3Df689d769a3"><span data-dcnode-id="3240" instrument_node="">command paper</span></a><span data-dcnode-id="3238" instrument_node="">’ on the NI border, then the </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4db563fb05%26e%3Df689d769a3"><span data-dcnode-id="3237" instrument_node="">NI Business Guidance</span></a><span data-dcnode-id="3235" instrument_node="">, which is intended to outline some of the requirements for the movement of goods between Great Britain and Northern Ireland. The guidance includes a section on moving consignments of fish from GB to NI, and for GB vessels landing fish directly into NI. Other aspects of the operation of the Northern Ireland Protocol are still subject to the outcome of negotiations. The working assumption is that Export Health Certificates (EHCs) will be required for trade in products of animal origin between GB and NI. Further guidance will be issued in due course.</span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3230"><strong data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">MMO survey </span></strong></p><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3228" instrument_node="">The Marine Management Organisation has just launched a survey with registered users of the Catch Certificate system. MMO is only going to contact its English registered users, but there is an expectation that Scottish registered users should also get involved in the survey – and we would urge you to do so. The link to the survey is </span><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D1b38362ccc%26e%3Df689d769a3"><span data-dcnode-id="3227" instrument_node="">here</span></a><span data-dcnode-id="3225" instrument_node="">.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3220"><strong data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Seafish Guidance</span></strong></p><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3214"><span data-dcnode-id="3218" instrument_node="">Seafish has produced </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Da30ed093a9%26e%3Df689d769a3"><span data-dcnode-id="3217" instrument_node="">guidance</span></a><span data-dcnode-id="3215" instrument_node=""> that will help prepare seafood businesses for the end of the transition period. It focusses on the day-to-day scenarios likely to be encountered. This includes food safety, traceability and trade, but does not cover issues arising from the UK’s future relationship with the EU.</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3210"><strong data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Seafood Scotland Guidance</span></strong></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3204"><span data-dcnode-id="3208" instrument_node="">As Seafood Scotland notes “In light of the imminent departure of the United Kingdom from the European Union, it is essential that actions are taken by the Seafood industry to ensure continued success, deal or no deal”. The </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D6d0d791e04%26e%3Df689d769a3"><span data-dcnode-id="3207" instrument_node="">website</span></a><span data-dcnode-id="3205" instrument_node=""> contains helpful information and links.</span></p><span data-dcnode-id="3203" instrument_node="">
</span><br data-dcnode-id="3202" style="clear: both;"><span data-dcnode-id="3201" instrument_node="">
</span><br data-dcnode-id="3200" style="clear: both;"><span data-dcnode-id="3199" instrument_node="">

</span><p data-dcnode-id="3095"><span data-dcnode-id="3096" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3100" instrument_node="">Three webinars are being organised by Marine Scotland and Seafish to help seafood businesses prepare for changes to import and export processes for trade with the EU and Northern Ireland, that will come into effect from 1 January 2021. Click </span><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Ddba1cc1499%26e%3Df689d769a3"><span data-dcnode-id="3099" instrument_node="">here</span></a><span data-dcnode-id="3097" instrument_node=""> for more information.</span></span></p><span data-dcnode-id="3094" instrument_node="">
</span><ul data-dcnode-id="3056"><span data-dcnode-id="3093" instrument_node="">
</span><li data-dcnode-id="3078"><span data-dcnode-id="3079" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3092" instrument_node="">12 November 10am – 11.30am&nbsp; –&nbsp;</span><strong data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Importing and exporting non-live fishery products –&nbsp;</span></strong><span data-dcnode-id="3089" instrument_node="">&nbsp;Please register by emailing </span><a data-dcnode-id="3087" href="mailto:Jacquelyn.McDonald@gov.scot"><span data-dcnode-id="3088" instrument_node="">Jacquelyn.McDonald@gov.scot</span></a><span data-dcnode-id="3086" instrument_node=""> by&nbsp;</span><strong data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">4pm on 11 November</span></strong><span data-dcnode-id="3083" instrument_node="">&nbsp;or sign in via&nbsp;</span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D4cefae968e%26e%3Df689d769a3"><span data-dcnode-id="3082" instrument_node="">Zoom Link</span></a><span data-dcnode-id="3080" instrument_node="">&nbsp;– Meeting ID 844 3330 8159 / Passcode: 744400.</span></span></li><span data-dcnode-id="3077" instrument_node="">

</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3049" style="font-family: georgia, palatino, serif; font-size: 12pt;"><u data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">EU Settlement Scheme</span></u></span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">
</span><span data-dcnode-id="3045" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3046" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">
</span><span data-dcnode-id="3038" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3042" instrument_node="">the UK has now left the EU. &nbsp;EU citizens and their families will have to apply to the UK Government’s EU Settlement Scheme by </span><strong data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">30 June 2021 </span></strong><span data-dcnode-id="3039" instrument_node="">in order to continue living, working and studying in the UK after that date.</span></span><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">
</span><span data-dcnode-id="3034" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3035" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">
</span><span data-dcnode-id="3027" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3031" instrument_node="">Scotland deeply values the contribution EU citizens make to our society, culture and economy and we want people to stay in Scotland. We have produced a </span><strong data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">package of support</span></strong><span data-dcnode-id="3028" instrument_node=""> to help guide people on how to apply to the EU Settlement Scheme. &nbsp;</span></span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">
</span><span data-dcnode-id="3023" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3024" instrument_node="">&nbsp;</span></span><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">
</span><span data-dcnode-id="3016" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="3020" instrument_node="">We need your help to get the word out to all EU citizens living in Scotland. &nbsp;To help you do this we have created a </span><strong data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Stay in Scotland Toolkit</span></strong><span data-dcnode-id="3017" instrument_node=""> with a range of materials:</span></span></p><span data-dcnode-id="3014" instrument_node="">

</span></ul><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2975" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2978" instrument_node="">Download all the assets and toolkit via WeTransfer here: </span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D9d2027f457%26e%3Df689d769a3"><span data-dcnode-id="2977" instrument_node="">https://we.tl/t-yR4hkIr2me</span></a></span><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">
</span><span data-dcnode-id="2971" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2972" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">
</span><span data-dcnode-id="2962" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2968" instrument_node="">We would be most grateful if you can print and display these in public spaces and areas visible to EU citizens and share across your networks using </span><strong data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">#WeAreScotland</span></strong><span data-dcnode-id="2965" instrument_node="">, pointing people to </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D34d7064f67%26e%3Df689d769a3"><span data-dcnode-id="2964" instrument_node="">www.mygov.scot/stayinscotland</span></a></span><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">
</span><span data-dcnode-id="2958" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2959" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2957"><span data-dcnode-id="2956" instrument_node="">
</span><span data-dcnode-id="2954" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2955" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2953"><span data-dcnode-id="2952" instrument_node="">
</span><span data-dcnode-id="2949" style="font-family: georgia, palatino, serif; font-size: 12pt;"><a data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D348d4c67b5%26e%3Df689d769a3"><span data-dcnode-id="2951" instrument_node="">HMRC urges traders to act now to prepare for 1 January 2021</span></a></span><br data-dcnode-id="2948"><span data-dcnode-id="2947" instrument_node="">
</span><span data-dcnode-id="2945" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2946" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">
</span><span data-dcnode-id="2941" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2942" instrument_node="">HMRC has written to VAT-registered traders highlighting actions they need to take to continue trading with the EU from 1 January 2021.</span></span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">
</span><span data-dcnode-id="2937" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2938" instrument_node="">Below is also basic guidance taken from Gov.UK &nbsp;as to when you are required to register for VAT</span></span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">
</span><span data-dcnode-id="2932" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">“You must register for&nbsp;VAT&nbsp;if:</span></em></span></p><span data-dcnode-id="2930" instrument_node="">
</span><ul data-dcnode-id="2918"><span data-dcnode-id="2929" instrument_node="">
</span><li data-dcnode-id="2925"><span data-dcnode-id="2926" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">you expect your&nbsp;VAT&nbsp;taxable turnover to be more than £85,000 in the next 30-day period</span></em></span></li><span data-dcnode-id="2924" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2921" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">your business had a&nbsp;VAT&nbsp;taxable turnover of more than £85,000 over the last 12 months</span></em></span></li><span data-dcnode-id="2919" instrument_node="">
</span></ul><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2914" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">You might also need to register in some other cases, depending on the kinds of goods or services you sell and where you sell them.</span></em></span><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node="">
</span><span data-dcnode-id="2908" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2909"><strong data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">If you’ll exceed the&nbsp;VAT&nbsp;threshold in the next 30-day period</span></strong></em></span><br data-dcnode-id="2907"><span data-dcnode-id="2906" instrument_node="">
</span><span data-dcnode-id="2903" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">You must register if you realise that your total&nbsp;VAT&nbsp;taxable turnover is going to be more than £85,000 in the next 30-day period.</span></em></span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">
</span><span data-dcnode-id="2898" style="font-family: georgia, palatino, serif; font-size: 12pt;"><em data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">You have to register by the end of that 30-day period. Your effective date of registration is the date you realised, not the date your turnover went over the threshold.”</span></em></span></p><span data-dcnode-id="2896" instrument_node="">
</span><ul data-dcnode-id="2888"><span data-dcnode-id="2895" instrument_node="">
</span><li data-dcnode-id="2890"><span data-dcnode-id="2891" style="font-family: georgia, palatino, serif; font-size: 12pt;"><u data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Border Operating Model</span></u><span data-dcnode-id="2892" instrument_node="">.</span></span></li><span data-dcnode-id="2889" instrument_node="">
</span></ul><span data-dcnode-id="2887" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2885" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2886" instrument_node="">Key aspects of the BOM:</span></span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">
</span><span data-dcnode-id="2881" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2882" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">
</span><span data-dcnode-id="2870" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2876"><u data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">From 1 January 2021</span></u></strong><u data-dcnode-id="2872"><span data-dcnode-id="2875" instrument_node="">, the model states that </span><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">traders need to</span></strong></u><span data-dcnode-id="2871" instrument_node="">:</span></span></p><span data-dcnode-id="2868" instrument_node="">
</span><ul data-dcnode-id="2822"><span data-dcnode-id="2867" instrument_node="">
</span><li data-dcnode-id="2864"><span data-dcnode-id="2865" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2866" instrument_node="">Understand the requirements of EU Member States. The necessary processes must have been done and documentation completed to comply with these requirements.</span></span></li><span data-dcnode-id="2863" instrument_node="">
</span><li data-dcnode-id="2860"><span data-dcnode-id="2861" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2862" instrument_node="">GB EORI – Traders will need a GB EORI number to move goods to or from the UK. Check your EORI number. Apply for a new one if yours does not start with GB.</span></span></li><span data-dcnode-id="2859" instrument_node="">
</span><li data-dcnode-id="2856"><span data-dcnode-id="2857" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2858" instrument_node="">EU EORI – If undertaking any EU customs processes, traders will need an EU EORI.</span></span></li><span data-dcnode-id="2855" instrument_node="">
</span><li data-dcnode-id="2852"><span data-dcnode-id="2853" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2854" instrument_node="">If you are an importer, check which goods are on the controlled goods list- If your good is on the controlled goods list, you will need to complete full customs declarations from January.</span></span></li><span data-dcnode-id="2851" instrument_node="">
</span><li data-dcnode-id="2848"><span data-dcnode-id="2849" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2850" instrument_node="">If you are importing non-controlled goods, decide whether to delay the customs declaration for up to six months or complete full customs declarations on import.</span></span></li><span data-dcnode-id="2847" instrument_node="">
</span><li data-dcnode-id="2844"><span data-dcnode-id="2845" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2846" instrument_node="">Decide how to complete customs formalities: Most traders are expected to use a customs intermediary. These are experts who can make declarations on your behalf.</span></span></li><span data-dcnode-id="2843" instrument_node="">
</span><li data-dcnode-id="2840"><span data-dcnode-id="2841" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2842" instrument_node="">Duty Deferment Account (DDA) – A DDA allows holders to delay customs duty, excise duty and import duty, to be paid once a month rather than on individual consignments.</span></span></li><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2836"><span data-dcnode-id="2837" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2838" instrument_node="">Check to see if a facilitation would benefit the business- there are a number of facilitations, including the Common Transit Convention, to help import and export goods.</span></span></li><span data-dcnode-id="2835" instrument_node="">
</span><li data-dcnode-id="2832"><span data-dcnode-id="2833" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2834" instrument_node="">If you are importing live animals or high-priority plants and plant products, you need to be prepared for submitting additional documentation and checks taking place at point of destination.</span></span></li><span data-dcnode-id="2831" instrument_node="">
</span><li data-dcnode-id="2828"><span data-dcnode-id="2829" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2830" instrument_node="">If you are an exporter, be prepared to submit customs export declarations from January.</span></span></li><span data-dcnode-id="2827" instrument_node="">
</span><li data-dcnode-id="2824"><span data-dcnode-id="2825" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2826" instrument_node="">If you are a haulier, be ready to use the “Check an HGV is ready” service.</span></span></li><span data-dcnode-id="2823" instrument_node="">
</span></ul><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2816"><span data-dcnode-id="2820" instrument_node="">At this first stage, you do </span><u data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">not</span></u><span data-dcnode-id="2817" instrument_node=""> need to: </span></strong></span></p><span data-dcnode-id="2813" instrument_node="">
</span><ul data-dcnode-id="2773"><span data-dcnode-id="2812" instrument_node="">
</span><li data-dcnode-id="2809"><span data-dcnode-id="2810" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2811" instrument_node="">Submit Safety &amp; Security declarations.</span></span></li><span data-dcnode-id="2808" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2806" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2807" instrument_node="">Submit full customs declarations at the point of import, if you are importing a non-controlled good and you decide to delay your declaration for up to six months.</span></span></li><span data-dcnode-id="2804" instrument_node="">
</span><li data-dcnode-id="2792"><span data-dcnode-id="2793" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2803" instrument_node="">Traders importing non-controlled goods, covering everything from clothes to electronics, </span><strong data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">will need to</span></strong><span data-dcnode-id="2800" instrument_node=""> prepare for basic customs requirements, such as keeping sufficient records of imported goods. Traders will also need to consider how they account for and pay VAT on imported goods. Traders will then have up to six months to complete customs declarations. While tariffs will be payable where due on relevant goods, payments can be deferred until the customs declaration has been made. UK Safety and Security declarations will </span><strong data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">not</span></strong><span data-dcnode-id="2797" instrument_node=""> be required on </span><strong data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">imports</span></strong><span data-dcnode-id="2794" instrument_node=""> for the first six months.</span></span></li><span data-dcnode-id="2791" instrument_node="">
</span><li data-dcnode-id="2785"><span data-dcnode-id="2786" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2790" instrument_node="">There will also be physical checks at the point of destination or other approved premises on all high-risk live animals and high-priority plants and plant products, and a requirement to obtain the relevant documentation and pre-notify for certain movements, but they will </span><strong data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">not</span></strong><span data-dcnode-id="2787" instrument_node=""> be required to enter GB via a point of entry with an appropriate Border Control Post (BCP).</span></span></li><span data-dcnode-id="2784" instrument_node="">
</span><li data-dcnode-id="2775"><span data-dcnode-id="2776" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2783" instrument_node="">Export declarations and UK </span><strong data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">exit</span></strong><span data-dcnode-id="2780" instrument_node=""> Safety and Security declarations will be required for all goods. Traders importing and exporting goods using the Common Transit Convention will need to follow all of the transit procedures – these will </span><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">not</span></strong><span data-dcnode-id="2777" instrument_node=""> be introduced in stages. The Goods Vehicle Movement Service (GVMS) will be introduced from January only for transit movements.</span></span></li><span data-dcnode-id="2774" instrument_node="">
</span></ul><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2767" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2769"><u data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">From April 2021</span></u></strong><span data-dcnode-id="2768" instrument_node="">:</span></span></p><span data-dcnode-id="2765" instrument_node="">
</span><ul data-dcnode-id="2751"><span data-dcnode-id="2764" instrument_node="">
</span><li data-dcnode-id="2753"><span data-dcnode-id="2754" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">All products of animal origin (POAO)</span></strong><span data-dcnode-id="2761" instrument_node=""> and all regulated plants and plant products will also require </span><strong data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">pre-notification</span></strong><span data-dcnode-id="2758" instrument_node=""> and the </span><strong data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">relevant health documentation</span></strong><span data-dcnode-id="2755" instrument_node="">. Any physical checks will continue to be conducted at the point of destination until July 2021.</span></span></li><span data-dcnode-id="2752" instrument_node="">
</span></ul><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2749" instrument_node="">From </span><strong data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">April 2021</span></strong><span data-dcnode-id="2746" instrument_node="">, </span><strong data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">you must</span></strong><span data-dcnode-id="2743" instrument_node="">:</span></span></p><span data-dcnode-id="2740" instrument_node="">
</span><ul data-dcnode-id="2734"><span data-dcnode-id="2739" instrument_node="">
</span><li data-dcnode-id="2736"><span data-dcnode-id="2737" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2738" instrument_node="">If traders are importing Products of Animal Origin (POAO) or a regulated plant and plant product, traders must be prepared to submit pre-notification and the relevant health documentation.</span></span></li><span data-dcnode-id="2735" instrument_node="">
</span></ul><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">You do not need to</span></strong><span data-dcnode-id="2730" instrument_node="">:</span></span></p><span data-dcnode-id="2727" instrument_node="">
</span><ul data-dcnode-id="2721"><span data-dcnode-id="2726" instrument_node="">
</span><li data-dcnode-id="2723"><span data-dcnode-id="2724" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2725" instrument_node="">If you are not importing Products of Animal Origin or a regulated plant, you do not need to make any changes from January 2021 requirements.</span></span></li><span data-dcnode-id="2722" instrument_node="">
</span></ul><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2717"><u data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">From July 2021</span></u></strong><span data-dcnode-id="2716" instrument_node="">:</span></span></p><span data-dcnode-id="2713" instrument_node="">
</span><ul data-dcnode-id="2661"><span data-dcnode-id="2712" instrument_node="">
</span><li data-dcnode-id="2706"><span data-dcnode-id="2707" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2711" instrument_node="">Traders moving any goods will have to make full customs declarations at the point of importation and pay relevant tariffs. Delaying declarations will </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">not</span></strong><span data-dcnode-id="2708" instrument_node=""> be possible.</span></span></li><span data-dcnode-id="2705" instrument_node="">
</span><li data-dcnode-id="2702"><span data-dcnode-id="2703" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2704" instrument_node="">Full Safety &amp; Security declarations will be required, while for commodities subject to sanitary and phytosanitary (SPS) controls, these must arrive at an established point of entry with an appropriate BCP and there will be an increase in physical checks and the taking of samples. SPS checks for animals, plants and their products will take place at GB BCPs. The GVMS will be in place for all imports, exports and transit movements at border locations which have chosen to introduce it.</span></span></li><span data-dcnode-id="2701" instrument_node="">

</span><span data-dcnode-id="2456" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2465" instrument_node="">Seafood sector exporters will be aware of the need for Export Health Certificates after the end of the transition period, and this topic is covered in some of the other guidance referred to in this paper. &nbsp;There is a lot of useful information contained within the following </span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D1321ef08ec%26e%3Df689d769a3"><span data-dcnode-id="2464" instrument_node="">webpages</span></a><span data-dcnode-id="2462" instrument_node="">. In addition you can search for </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D0267cc2eff%26e%3Df689d769a3"><span data-dcnode-id="2461" instrument_node="">available certificates</span></a><span data-dcnode-id="2459" instrument_node="">. SG and FSS are proposing FSS leads on EHC provision at a minimum of two key logistics hubs in Scotland, which will operate a ‘groupage’ system to help food business export effectively and efficiently after the EU-exit transition period. More information will shortly be communicated, and will be available through the Brexit section of the FSS website: </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dbc799e9b40%26e%3Df689d769a3"><span data-dcnode-id="2458" instrument_node="">https://www.foodstandards.gov.scot/about-us/brexit</span></a></span><br data-dcnode-id="2455"><span data-dcnode-id="2454" instrument_node="">

</span><span data-dcnode-id="2443" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2444" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">
</span><span data-dcnode-id="2436" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2440" instrument_node="">Effective monitoring and enforcement of marine and fishing laws is vital if we are to protect Scotland’s valuable marine areas and fisheries. It is important that these are protected by detecting breaches of fisheries regulations by monitoring and inspection at sea and in ports, and then reporting as appropriate to the prosecuting authorities, and by providing intelligence on fishing activity in the sea areas around Scotland. Comprehensive guidance on all relevant issues, and particularly Illegal, Unreported and Unregulated (IUU) fishing and Catch Certificates can be found here: </span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Df8933c92db%26e%3Df689d769a3"><span data-dcnode-id="2439" instrument_node="">guidance</span></a><span data-dcnode-id="2437" instrument_node="">.</span></span><br data-dcnode-id="2435"><span data-dcnode-id="2434" instrument_node="">
</span><span data-dcnode-id="2432" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2433" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">
</span><span data-dcnode-id="2427" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">The Northern Ireland Protocol</span></strong></span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node="">
</span><span data-dcnode-id="2423" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2424" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">
</span><span data-dcnode-id="2413" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2420" instrument_node="">The UK government recently published first a ‘</span><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D86beeefb6a%26e%3Df689d769a3"><span data-dcnode-id="2419" instrument_node="">command paper</span></a><span data-dcnode-id="2417" instrument_node="">’ on the NI border, then the </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D5e96bb6df7%26e%3Df689d769a3"><span data-dcnode-id="2416" instrument_node="">NI Business Guidance</span></a><span data-dcnode-id="2414" instrument_node="">, which is intended to outline some of the requirements for the movement of goods between Great Britain and Northern Ireland. The guidance includes a section on moving consignments of fish from GB to NI, and for GB vessels landing fish directly into NI. Other aspects of the operation of the Northern Ireland Protocol are still subject to the outcome of negotiations. The working assumption is that Export Health Certificates (EHCs) will be required for trade in products of animal origin between GB and NI. Further guidance will be issued in due course.</span></span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">
</span><span data-dcnode-id="2409" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2410" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">
</span><span data-dcnode-id="2404" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">MMO survey </span></strong></span><br data-dcnode-id="2403"><span data-dcnode-id="2402" instrument_node="">
</span><span data-dcnode-id="2400" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2401" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2399"><span data-dcnode-id="2398" instrument_node="">
</span><span data-dcnode-id="2393" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2397" instrument_node="">The Marine Management Organisation has just launched a survey with registered users of the Catch Certificate system. MMO is only going to contact its English registered users, but there is an expectation that Scottish registered users should also get involved in the survey – and we would urge you to do so. The link to the survey is </span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3De99d5e3d09%26e%3Df689d769a3"><span data-dcnode-id="2396" instrument_node="">here</span></a><span data-dcnode-id="2394" instrument_node="">.</span></span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">
</span><span data-dcnode-id="2389" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2390" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">
</span><span data-dcnode-id="2385" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2386" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">
</span><span data-dcnode-id="2380" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Seafish Guidance</span></strong></span><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">
</span><span data-dcnode-id="2376" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2377" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2375"><span data-dcnode-id="2374" instrument_node="">
</span><span data-dcnode-id="2369" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2373" instrument_node="">Seafish has produced </span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3Dc76a66b300%26e%3Df689d769a3"><span data-dcnode-id="2372" instrument_node="">guidance</span></a><span data-dcnode-id="2370" instrument_node=""> that will help prepare seafood businesses for the end of the transition period. It focusses on the day-to-day scenarios likely to be encountered. This includes food safety, traceability and trade, but does not cover issues arising from the UK’s future relationship with the EU.</span></span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">
</span><span data-dcnode-id="2365" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2366" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">
</span><span data-dcnode-id="2360" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Seafood Scotland Guidance</span></strong></span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node="">
</span><span data-dcnode-id="2356" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2357" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2355"><span data-dcnode-id="2354" instrument_node="">
</span><span data-dcnode-id="2349" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2353" instrument_node="">As Seafood Scotland notes “In light of the imminent departure of the United Kingdom from the European Union, it is essential that actions are taken by the Seafood industry to ensure continued success, deal or no deal”. The </span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D2fb6fc2aaf%26e%3Df689d769a3"><span data-dcnode-id="2352" instrument_node="">website</span></a><span data-dcnode-id="2350" instrument_node=""> contains helpful information and links.</span></span></p><span data-dcnode-id="2347" instrument_node="">
</span><br data-dcnode-id="2346" style="clear: both;"><span data-dcnode-id="2345" instrument_node="">
</span><br data-dcnode-id="2344" style="clear: both;"><span data-dcnode-id="2343" instrument_node="">
</span></div><span data-dcnode-id="2341" instrument_node="">
</span></div><span data-dcnode-id="2339" instrument_node="">
</span></div><span data-dcnode-id="2337" instrument_node="">
</span><div data-dcnode-id="1629" style="width: 100%; float: left; margin: 0 0 10px 0; padding: 0 0 10px 0; border-bottom: 1px solid #0e3160;"><span data-dcnode-id="2336" instrument_node="">
</span><h3 class="cv_title" data-dcnode-id="2334" data-item="10" style="font-size: 18px; font-weight: bold;"><span data-dcnode-id="2335" instrument_node="">October 2020 Update</span></h3><span data-dcnode-id="2333" instrument_node="">
</span><div class="elementor-widget-text-editor cv_item item-10" data-dcnode-id="1631" style="display: none;"><span data-dcnode-id="2332" instrument_node="">
</span><br data-dcnode-id="2331" style="clear: both;"><span data-dcnode-id="2330" instrument_node="">
</span><h4 data-dcnode-id="2328" data-subitem="1" style="background-color: #efefef !important; padding: 10px; margin: 0;"><span data-dcnode-id="2329" instrument_node="">27th October</span></h4><span data-dcnode-id="2327" instrument_node="">
</span><div class="subitems subitem-1" data-dcnode-id="1799" style="width: 100%; float: left; margin-top: 10px;"><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2322" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2323"><u data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Customs documentation. </span></u></strong></span><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">
</span><span data-dcnode-id="2318" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2319" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2317"><span data-dcnode-id="2316" instrument_node="">
</span><span data-dcnode-id="2312" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2315" instrument_node="">This is an area that will be unfamiliar to a number of companies if you have only exported within the EU. Companies will need to decide who they want to use as a customs agent, a list can be found here &nbsp;</span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D35df0492b6%26e%3Df689d769a3"><span data-dcnode-id="2314" instrument_node="">https://www.gov.uk/guidance/list-of-customs-agents-and-fast-parcel-operators</span></a></span><br data-dcnode-id="2311"><span data-dcnode-id="2310" instrument_node="">
</span><span data-dcnode-id="2308" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2309" instrument_node="">. It would also be beneficial for your company to also have knowledge within this area and there is funding available to support this training.</span></span><br data-dcnode-id="2307"><span data-dcnode-id="2306" instrument_node="">
</span><span data-dcnode-id="2304" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2305" instrument_node="">&nbsp;</span></span><br data-dcnode-id="2303"><span data-dcnode-id="2302" instrument_node="">
</span><span data-dcnode-id="2300" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2301" instrument_node="">You can apply for 3 grants to help your business complete customs declarations.</span></span><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node="">
</span><span data-dcnode-id="2296" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2297" instrument_node="">You can apply to get funding for:</span></span></p><span data-dcnode-id="2294" instrument_node="">
</span><ul data-dcnode-id="2280"><span data-dcnode-id="2293" instrument_node="">
</span><li data-dcnode-id="2290"><span data-dcnode-id="2291" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2292" instrument_node="">training that helps your business to complete customs declarations and processes</span></span></li><span data-dcnode-id="2289" instrument_node="">
</span><li data-dcnode-id="2286"><span data-dcnode-id="2287" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2288" instrument_node="">hiring new staff to help your business complete customs declarations</span></span></li><span data-dcnode-id="2285" instrument_node="">
</span><li data-dcnode-id="2282"><span data-dcnode-id="2283" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2284" instrument_node="">IT improvements to help your business complete customs declarations more efficiently</span></span></li><span data-dcnode-id="2281" instrument_node="">
</span></ul><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">What you must use the grants for:</span></strong></span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2271" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Recruitment</span></strong></span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">
</span><span data-dcnode-id="2267" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2268" instrument_node="">You must use the funding to cover the recruitment and salary costs of new employees, where the new employee started on or after 12 June 2020, who will help your business complete customs declarations.</span></span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">
</span><span data-dcnode-id="2263" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2264" instrument_node="">You can also use the funding to cover the salary costs of employees who are redeployed from another part of your business in order to undertake customs declarations. These employees new roles must increase the capacity of the company to deal with customs declarations.</span></span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2258" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Training</span></strong></span><br data-dcnode-id="2257"><span data-dcnode-id="2256" instrument_node="">
</span><span data-dcnode-id="2254" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2255" instrument_node="">The training must give you or your employees the skills to:</span></span></p><span data-dcnode-id="2252" instrument_node="">
</span><ul data-dcnode-id="2242"><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2248"><span data-dcnode-id="2249" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2250" instrument_node="">complete customs declarations</span></span></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2244"><span data-dcnode-id="2245" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2246" instrument_node="">carry out customs processes – this can include relevant training in safety and security</span></span></li><span data-dcnode-id="2243" instrument_node="">
</span></ul><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2239" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2240" instrument_node="">The training does not have to lead to a formal qualification.</span></span><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">
</span><span data-dcnode-id="2235" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2236" instrument_node="">If you want to arrange the training internally, you can use the funding for the</span></span><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">
</span><span data-dcnode-id="2231" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2232" instrument_node="">cost of delivering the training, like related stationery, room hire, catering and travel and subsistence costs.</span></span><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node="">
</span><span data-dcnode-id="2227" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2228" instrument_node="">If the training will be delivered by an in-house trainer, you can also use the funding to cover the (reasonable) day rate of the trainer.</span></span><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">
</span><span data-dcnode-id="2223" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2224" instrument_node="">You cannot use the funding for other unrelated training</span></span><br data-dcnode-id="2222"><span data-dcnode-id="2221" instrument_node="">
</span><span data-dcnode-id="2219" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2220" instrument_node="">You can also use the grant to reimburse what your business has spent on relevant training since 12 June 2020.</span></span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2214" style="font-family: georgia, palatino, serif; font-size: 12pt;"><strong data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">IT improvements</span></strong></span><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">
</span><span data-dcnode-id="2210" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2211" instrument_node="">You must use the funding to buy software that will help your business to complete customs declarations more efficiently.</span></span><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">
</span><span data-dcnode-id="2206" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2207" instrument_node="">It must be a ready-made solution – you cannot use the funding to commission bespoke software.</span></span><br data-dcnode-id="2205"><span data-dcnode-id="2204" instrument_node="">
</span><span data-dcnode-id="2202" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2203" instrument_node="">You can also use the funding to:</span></span></p><span data-dcnode-id="2200" instrument_node="">
</span><ul data-dcnode-id="2182"><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2196"><span data-dcnode-id="2197" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2198" instrument_node="">buy hardware that’s needed for the software to run</span></span></li><span data-dcnode-id="2195" instrument_node="">
</span><li data-dcnode-id="2192"><span data-dcnode-id="2193" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2194" instrument_node="">install and configure the software and hardware</span></span></li><span data-dcnode-id="2191" instrument_node="">
</span><li data-dcnode-id="2188"><span data-dcnode-id="2189" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2190" instrument_node="">buy the first year licence</span></span></li><span data-dcnode-id="2187" instrument_node="">
</span><li data-dcnode-id="2184"><span data-dcnode-id="2185" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2186" instrument_node="">train employees to use the software</span></span></li><span data-dcnode-id="2183" instrument_node="">
</span></ul><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2179" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2180" instrument_node="">You cannot use the funding for unrelated networking costs.</span></span><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">
</span><span data-dcnode-id="2175" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2176" instrument_node="">You can also use the grant to reimburse what your business has spent on relevant IT improvements since 12 June 2020.</span></span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">
</span><span data-dcnode-id="2169" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2172" instrument_node="">You can apply for the funding here </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seafoodscotland.us19.list-manage.com/track/click%3Fu%3D6d09d813ba304ad42395ffb1b%26id%3D2fa4a4b03a%26e%3Df689d769a3"><span data-dcnode-id="2171" instrument_node="">https://www.gov.uk/guidance/grants-for-businesses-that-complete-customs-declarations</span></a></span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">
</span><span data-dcnode-id="2165" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2166" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" style="font-family: georgia, palatino, serif; font-size: 12pt;"><u data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Trade with non-EU countries at the end of Transition</span></u><span data-dcnode-id="2160" instrument_node="">.</span></span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2156" instrument_node="">the UK is pursuing its own independent trade policy, having left the EU, including the Single Market and Customs Union (in the case of GB, at least). The UK had signed, in principle a new free trade agreement with Japan which, though not a like-for-like replacement of the EU-Japan FTA which came into force in February 2019, it is largely based on its provisions. This will come into force for the UK once we leave the Transition Period. The removal of tariffs as part of the agreement was destined to take many years, with full application of a tariff-free agreement for seafood not expected until 2033, it is understood that the UK-Japan agreement replicated the EU-Japan agreement with regard to seafood tariffs.</span></span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2152" instrument_node="">the UK was also now in trade negotiations with the United States, Australia and New Zealand, and seeking accession to the Comprehensive and Progressive Agreement for Trans-Pacific Partnership (CPTPP). This agreement includes countries like Mexico, Australia, Japan, Singapore and Canada and is the third largest free trade area under an overarching agreement in the world. RL also added that the UK was additionally in bilateral negotiations to try to replicate as far as possible EU agreements with the likes of Canada, Mexico and Vietnam. RL went on to confirm that trade agreements with two of the three EEA-EFTA countries (Iceland and Norway), as well as agreements with Turkey and a number of countries in the Western Balkans, were still under negotiation, while a trade and cooperation agreement with Ukraine has actually been announced earlier in the day. RD confirmed that Ukraine was one of the main export markets for Scottish mackerel. &nbsp;</span></span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2148" instrument_node="">Negotiations with Iceland and Norway are closely linked to the negotiations with the EU before adding that rollover trade agreements had already been negotiated and agreed with Switzerland, Liechtenstein, the Faroe Islands and various North African and Middle Eastern countries. RL confirmed that, in total, there were about 19 finalised rolled over agreements with about 18 others that are still being negotiated but with no guarantees that these will be finalised by the end of the Transition Period.</span></span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2143" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="2144" instrument_node="">sometimes there is a lack of clarity on the practical implications of agreements either being signed or lapsing but that DIT has improved their reporting of details on their website recently. Without an agreement, it should be expected by companies that WTO Rules would underpin the trade relationships in question and that Most Favoured Nation (MFN) tariffs would apply.</span></span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node="">
