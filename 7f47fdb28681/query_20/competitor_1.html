</span><li data-dcnode-id="775"><a data-dcnode-id="776" href="javascript:window.print();" title="Print"><i class="fa fa-print" data-dcnode-id="777"></i></a></li><span data-dcnode-id="774" instrument_node="">

            March 11, 2021        </span></div><span data-dcnode-id="766" instrument_node="">
</span></header><span data-dcnode-id="763" instrument_node="">
</span><div class="entry-content" data-dcnode-id="535"><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="756"><em data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">The post below was first published on our </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/"><span data-dcnode-id="760" instrument_node="">Energy Notes</span></a><span data-dcnode-id="758" instrument_node=""> blog.</span></em></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">The end of the Brexit transition period on 31 December 2020 brought an end to the UK’s participation in the EU Emissions Trading System (the </span><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">EU ETS</span></strong><span data-dcnode-id="751" instrument_node="">), the bloc’s flagship ‘cap and trade’ scheme for reducing greenhouse gas (</span><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">GHG</span></strong><span data-dcnode-id="748" instrument_node="">) emissions. Having substituted this scheme for a near-identical UK alternative, there is now the possibility of divergence which recent UK climate policy suggests could be towards a stricter, rather than looser, regime.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">New but familiar</span></strong></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="741" instrument_node="">Having explored several options for carbon pricing post-Brexit, including continued participation in the EU ETS and a carbon emissions tax,</span><sup data-dcnode-id="738"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftn1" name="_ftnref1"><span data-dcnode-id="740" instrument_node="">[1]</span></a></sup><span data-dcnode-id="737" instrument_node=""> the UK Government opted in its December 2020 Energy White Paper for a separate UK ETS which nonetheless mirrors its predecessor in almost all regards.</span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftn2" name="_ftnref2" style="background-color: #ffffff;"><sup data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">[2]</span></sup></a><span data-dcnode-id="733" instrument_node=""> The UK ETS adopts the same principle of a cap on emissions reducing over time and, within this, freely tradeable emission allowances. The industries within the scope of the two systems are the same, covering electricity and heat generation, heavy industry and aviation, as are their approaches to free allocations, which aim to prevent carbon leakage from manufacturers moving carbon-intensive industries overseas.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" id="more-3626"></span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="727" instrument_node="">The systems may become closer still, with the </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/948119/EU-UK_Trade_and_Cooperation_Agreement_24.12.2020.pdf" style="background-color: #ffffff;"><span data-dcnode-id="726" instrument_node="">EU-UK Trade and Co-operation Agreement</span></a><span data-dcnode-id="724" instrument_node=""> (the </span><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">TCA</span></strong><span data-dcnode-id="721" instrument_node="">) committing both parties to co-operate on carbon pricing and “give serious consideration” to linking the UK and EU ETSs</span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftn3" name="_ftnref3" style="background-color: #ffffff;"><sup data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">[3]</span></sup></a><span data-dcnode-id="717" instrument_node="">, akin to the landmark link between the EU and Swiss ETS which occurred in 2020. While business groups have encouraged such a move, the Government appears less enthusiastic, having said in its </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/energy-white-paper-powering-our-net-zero-future" style="background-color: #ffffff;"><span data-dcnode-id="716" instrument_node="">Energy White Paper</span></a><span data-dcnode-id="714" instrument_node=""> that it was “open to linking the UK ETS internationally in principle”, but had made “no decision on our preferred linking partners”. Linking would be easiest now, while the schemes are almost identical, and will only become more difficult as any divergence begins to occur.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Without a link, certain operators now face complex situations. Northern Irish industrial installations are now subject to the UK ETS, while Northern Irish electricity generators remain part of the EU ETS. Aircraft operators flying between the UK and Europe are under UK ETS obligations for outbound flights to EEA countries and EU ETS obligations for inbound flights to the UK.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="706"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Alignment to net zero</span></strong></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="704" instrument_node="">Although the UK ETS remains detached from its EU counterpart, giving the UK Government autonomy to reshape domestic carbon pricing policy, it must do so carefully, as the TCA includes strict obligations of non-regression, including on carbon pricing. Still, early indications are that regression fears are unfounded, with the UK ETS having been launched as the “world’s first net zero carbon cap and trade market”</span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftn4" name="_ftnref4" style="background-color: #ffffff;"><sup data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">[4]</span></sup></a><span data-dcnode-id="700" instrument_node=""> with plans to align the cap to ensure the UK meets its commitment to net zero emissions by 2050.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">In the short term, the cap on UK ETS allowances will be set 5% below the UK’s notional share of the EU ETS cap for Phase IV (2021-30), and will reduce to remain proportionally so in future years. Consultation on the cap’s trajectory will form part of the Government’s work on the UK’s next carbon budget and the Government intends that net zero changes will be implemented by 2023 if possible, and no later than 2024, with market participants given at least a year’s notice of any changes. The UK’s greater ambition on the ETS cap mirrors its greater climate ambitions more widely, such as the UK Government’s loftier target of cutting emissions by 68% by 2030, compared to the EU’s 55% target.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="692"><u data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Auctions</span></u></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="690" instrument_node="">In February 2021, the Government published draft </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.uk/ukdsi/2021/9780348220049/contents" style="background-color: #ffffff;"><span data-dcnode-id="689" instrument_node="">Auctioning Regulations</span></a><span data-dcnode-id="687" instrument_node=""> and </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.uk/ukdsi/2021/9780348220049/memorandum/contents" style="background-color: #ffffff;"><span data-dcnode-id="686" instrument_node="">updated guidance</span></a><span data-dcnode-id="684" instrument_node=""> for UK ETS participants. These confirmed that the auction reserve price for allowances would be higher than initially planned, at £22 per tonne of CO</span><sub data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">2</span></sub><span data-dcnode-id="681" instrument_node=""> compared to £15</span><sup data-dcnode-id="678"><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftn5" name="_ftnref5"><span data-dcnode-id="680" instrument_node="">[5]</span></a></sup><span data-dcnode-id="677" instrument_node="">. This pricing likely seeks to minimise the risk of a significant fall in the UK carbon price, caused by a sharp price fluctuation due to the UK ETS market’s much smaller size than the EU’s, which could undermine confidence in the UK’s new system. Later in 2021, as part of its consultation on the UK ETS cap, the Government will consider withdrawing the auction reserve price. Auctions will start as soon as feasible and no later than Q2 2021.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="672"><u data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Carbon border tax</span></u></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">An open question is whether the UK will introduce a carbon border tax, similar to that currently being drawn up by the EU, which would see penalties on goods imported from countries with weaker climate measures. The UK Government is thought to be monitoring developments on such measures in the EU and is thought to be aiming to foster international agreement over such an adjustment when the UK hosts the G7 later in 2021.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Follow the HSF </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/" style="background-color: #ffffff;"><span data-dcnode-id="666" instrument_node="">Energy Notes blog</span></a><span data-dcnode-id="664" instrument_node=""> for all the latest on the UK ETS and the UK’s carbon pricing regime.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="655"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftnref1" name="_ftn1" style="background-color: #ffffff;"><sup data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">[1]</span></sup></a><span data-dcnode-id="658" instrument_node=""> “The future of UK carbon pricing”, Department for Business, Energy &amp; Industrial Strategy (BEIS) (June 2020), available at </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/consultations/the-future-of-uk-carbon-pricing" style="background-color: #ffffff;"><span data-dcnode-id="657" instrument_node="">https://www.gov.uk/government/consultations/the-future-of-uk-carbon-pricing</span></a></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="647"><sup data-dcnode-id="651"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftnref2" name="_ftn2"><span data-dcnode-id="653" instrument_node="">[2]</span></a></sup><span data-dcnode-id="650" instrument_node=""> “Energy white paper: Powering our net zero future”, BEIS, available at </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/energy-white-paper-powering-our-net-zero-future" style="background-color: #ffffff;"><span data-dcnode-id="649" instrument_node="">https://www.gov.uk/government/publications/energy-white-paper-powering-our-net-zero-future</span></a></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="639"><sup data-dcnode-id="643"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftnref3" name="_ftn3"><span data-dcnode-id="645" instrument_node="">[3]</span></a></sup><span data-dcnode-id="642" instrument_node=""> Article 7.3, EU-UK Trade and Cooperation Agreement, available at </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A22020A1231%2801%29%26from%3DEN" style="background-color: #ffffff;"><span data-dcnode-id="641" instrument_node="">https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:22020A1231(01)&amp;from=EN</span></a></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="633"><sup data-dcnode-id="635"><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsfnotes.com/energy/2021/03/11/the-uk-ets-after-brexit/%23_ftnref4" name="_ftn4"><span data-dcnode-id="637" instrument_node="">[4]</span></a></sup><span data-dcnode-id="634" instrument_node=""> p.129, Energy White Paper</span></p><span data-dcnode-id="632" instrument_node="">
