</span><p data-dcnode-id="3904"><span data-dcnode-id="3909" instrument_node="">EU-28 GDP by currency group (2017)</span><sup class="reference" data-dcnode-id="3906" id="cite_ref-EDJN_14-0"><a data-dcnode-id="3907" href="#cite_note-EDJN-14"><span data-dcnode-id="3908" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3905" instrument_node="">
</span></p><span data-dcnode-id="3903" instrument_node="">
</span><div class="legend" data-dcnode-id="3897"><span class="legend-color" data-dcnode-id="3899" style="background-color:blue; color:white;"><span data-dcnode-id="3900" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3898" instrument_node="">&nbsp;Eurozone (72.9%)</span></div><link data-dcnode-id="3896" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="3892"><span class="legend-color" data-dcnode-id="3894" style="background-color:green; color:white;"><span data-dcnode-id="3895" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3893" instrument_node="">&nbsp;Non-Eurozone (Minus UK) (12%)</span></div><link data-dcnode-id="3891" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="3887"><span class="legend-color" data-dcnode-id="3889" style="background-color:red; color:black;"><span data-dcnode-id="3890" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3888" instrument_node="">&nbsp;United Kingdom (15.1%)</span></div><span data-dcnode-id="3886" instrument_node="">
</span></div><span data-dcnode-id="3884" instrument_node="">
</span></div></div><span data-dcnode-id="3881" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">The relationship between euro and non-euro states has been on debate both during the UK's membership (as a large opt-out state) and in light of its withdrawal from the EU. The question is how Brexit might impact the balance of power between those in and out of the euro, namely avoiding a eurozone caucus out-voting non-euro states.
</span></p><p data-dcnode-id="3864"><span data-dcnode-id="3878" instrument_node="">The UK had called for the EU treaties to be amended to declare the EU to be a "multi-currency union", which sparked concerns that to do so might undermine the progress of euro adoption in remaining countries.</span><sup class="reference" data-dcnode-id="3875" id="cite_ref-FTalarm_15-0"><a data-dcnode-id="3876" href="#cite_note-FTalarm-15"><span data-dcnode-id="3877" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3872" id="cite_ref-handelsblatt_16-0"><a data-dcnode-id="3873" href="#cite_note-handelsblatt-16"><span data-dcnode-id="3874" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="3869" id="cite_ref-LSE_ins_and_outs_17-0"><a data-dcnode-id="3870" href="#cite_note-LSE_ins_and_outs-17"><span data-dcnode-id="3871" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="3866" id="cite_ref-EDJN_14-1"><a data-dcnode-id="3867" href="#cite_note-EDJN-14"><span data-dcnode-id="3868" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3865" instrument_node="">
</span></p><p data-dcnode-id="3847"><span data-dcnode-id="3863" instrument_node="">Professor </span><a data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simon_Hix" title="Simon Hix"><span data-dcnode-id="3862" instrument_node="">Simon Hix</span></a><span data-dcnode-id="3860" instrument_node=""> contended that Brexit would strengthen the Eurozone, which may well replace the single market as the EU's core and driving force.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3853" style="white-space:nowrap;"><span data-dcnode-id="3859" instrument_node="">[</span><i data-dcnode-id="3855"><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3857" title="This claim needs references to reliable sources. (March 2019)"><span data-dcnode-id="3858" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3854" instrument_node="">]</span></sup><span data-dcnode-id="3852" instrument_node=""> In the pre-referendum negotiation, David Cameron emphasised the importance (in his view) of keeping the Eurozone clearly distinct from the EU. Following a British withdrawal, such pressure may well dissipate.</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-UCL_7-4"><a data-dcnode-id="3850" href="#cite_note-UCL-7"><span data-dcnode-id="3851" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3848" instrument_node="">
</span></p><span data-dcnode-id="3846" instrument_node="">
</span><h3 data-dcnode-id="3836"><span class="mw-headline" data-dcnode-id="3844" id="Speaking_English_in_the_European_Parliament"><span data-dcnode-id="3845" instrument_node="">Speaking English in the European Parliament</span></span><span class="mw-editsection" data-dcnode-id="3837"><span class="mw-editsection-bracket" data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">[</span></span><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D9" title="Edit section: Speaking English in the European Parliament"><span data-dcnode-id="3841" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3835" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3834" instrument_node="">As a result of Brexit, there are now fewer native English speakers in the European Parliament and in workings groups. </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_McAllister" title="David McAllister"><span data-dcnode-id="3833" instrument_node="">David McAllister</span></a><span data-dcnode-id="3831" instrument_node="">, a German politician, stated that his former British colleagues are missed for their pragmatism, humor, and rhetoric. McAllister said that English is still the most common language spoken by members of the European Parliament despite it having </span><a class="mw-redirect" data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_languages_of_the_European_Union" title="Official languages of the European Union"><span data-dcnode-id="3830" instrument_node="">24 official languages</span></a><span data-dcnode-id="3828" instrument_node="">.</span><sup class="reference" data-dcnode-id="3825" id="cite_ref-18"><a data-dcnode-id="3826" href="#cite_note-18"><span data-dcnode-id="3827" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3824" instrument_node="">
</span></p><span data-dcnode-id="3822" instrument_node="">
</span><h2 data-dcnode-id="3812"><span class="mw-headline" data-dcnode-id="3820" id="Economic_impacts"><span data-dcnode-id="3821" instrument_node="">Economic impacts</span></span><span class="mw-editsection" data-dcnode-id="3813"><span class="mw-editsection-bracket" data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">[</span></span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D10" title="Edit section: Economic impacts"><span data-dcnode-id="3817" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3811" instrument_node="">
</span><h3 data-dcnode-id="3801"><span class="mw-headline" data-dcnode-id="3809" id="Trade_with_the_UK"><span data-dcnode-id="3810" instrument_node="">Trade with the UK</span></span><span class="mw-editsection" data-dcnode-id="3802"><span class="mw-editsection-bracket" data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">[</span></span><a data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D11" title="Edit section: Trade with the UK"><span data-dcnode-id="3806" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3795"><span data-dcnode-id="3799" instrument_node="">After Brexit, the EU becomes UK's biggest trading partner, and the UK becomes EU's </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_the_largest_trading_partners_of_the_European_Union" title="List of the largest trading partners of the European Union"><span data-dcnode-id="3798" instrument_node="">third biggest trading partner</span></a><span data-dcnode-id="3796" instrument_node=""> after the United States and China.
</span></p><p data-dcnode-id="3777"><span data-dcnode-id="3794" instrument_node="">Some member states, notably Belgium, Cyprus, Ireland, Germany and the Netherlands, are more exposed to a Brexit-induced </span><a data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shock_%28economics%29" title="Shock (economics)"><span data-dcnode-id="3793" instrument_node="">economic shock</span></a><span data-dcnode-id="3791" instrument_node="">. The </span><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_Republic_of_Ireland" title="Economy of the Republic of Ireland"><span data-dcnode-id="3790" instrument_node="">economy of the Republic of Ireland</span></a><span data-dcnode-id="3788" instrument_node=""> is particularly sensitive due to its </span><a class="mw-redirect" data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_border" title="Irish border"><span data-dcnode-id="3787" instrument_node="">common land border with the United Kingdom</span></a><span data-dcnode-id="3785" instrument_node=""> and its close </span><a data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agribusiness" title="Agribusiness"><span data-dcnode-id="3784" instrument_node="">agribusiness</span></a><span data-dcnode-id="3782" instrument_node=""> integration with Northern Ireland.</span><sup class="reference" data-dcnode-id="3779" id="cite_ref-19"><a data-dcnode-id="3780" href="#cite_note-19"><span data-dcnode-id="3781" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3778" instrument_node="">
</span></p><p data-dcnode-id="3729"><span data-dcnode-id="3776" instrument_node="">The reintroduction of a customs border would have been economically and politically damaging to both sides,</span><sup class="reference" data-dcnode-id="3773" id="cite_ref-chen_20-0"><a data-dcnode-id="3774" href="#cite_note-chen-20"><span data-dcnode-id="3775" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="3770" id="cite_ref-globalcounsel_21-0"><a data-dcnode-id="3771" href="#cite_note-globalcounsel-21"><span data-dcnode-id="3772" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3769" instrument_node=""> particularly because of the risk to the </span><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Ireland_peace_process" title="Northern Ireland peace process"><span data-dcnode-id="3768" instrument_node="">Northern Ireland peace process</span></a><span data-dcnode-id="3766" instrument_node=""> that a physical border presents.</span><sup class="reference" data-dcnode-id="3763" id="cite_ref-22"><a data-dcnode-id="3764" href="#cite_note-22"><span data-dcnode-id="3765" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3762" instrument_node=""> Despite protestations of good will on both sides, it was not obvious how border controls could have  been avoided unless the </span><a class="mw-redirect" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_has_a_Customs_Union_with_the_EU" title="UK has a Customs Union with the EU"><span data-dcnode-id="3761" instrument_node="">UK has a Customs Union with the EU</span></a><span data-dcnode-id="3759" instrument_node="">.</span><sup class="reference" data-dcnode-id="3756" id="cite_ref-23"><a data-dcnode-id="3757" href="#cite_note-23"><span data-dcnode-id="3758" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="3753" id="cite_ref-24"><a data-dcnode-id="3754" href="#cite_note-24"><span data-dcnode-id="3755" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3752" instrument_node=""> Arising from the agreements made at the Phase 1 negotiations (after the </span><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Unionist_Party" title="Democratic Unionist Party"><span data-dcnode-id="3751" instrument_node="">DUP</span></a><span data-dcnode-id="3749" instrument_node=""> intervention), any arrangements to be made to facilitate cross-border trade in Ireland will apply equally to cross-Channel trade but the details remain unclear.</span><sup class="reference" data-dcnode-id="3746" id="cite_ref-25"><a data-dcnode-id="3747" href="#cite_note-25"><span data-dcnode-id="3748" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3745" instrument_node=""> In October 2019, </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brexit_withdrawal_agreement%23Revisions_in_2019" title="Brexit withdrawal agreement"><span data-dcnode-id="3744" instrument_node="">the UK and EU renegotiated</span></a><span data-dcnode-id="3742" instrument_node=""> the </span><a data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Ireland_Protocol" title="Northern Ireland Protocol"><span data-dcnode-id="3741" instrument_node="">Northern Ireland Protocol</span></a><span data-dcnode-id="3739" instrument_node=""> of the draft </span><a class="mw-redirect" data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brexit_Withdrawal_Agreement" title="Brexit Withdrawal Agreement"><span data-dcnode-id="3738" instrument_node="">Brexit Withdrawal Agreement</span></a><span data-dcnode-id="3736" instrument_node=""> so as to keep open the border in Ireland and to have a customs border between the </span><a data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="3735" instrument_node="">island of Ireland</span></a><span data-dcnode-id="3733" instrument_node=""> and the </span><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="3732" instrument_node="">island of Great Britain</span></a><span data-dcnode-id="3730" instrument_node=""> (leaving Northern Ireland 'de facto' in the EU Customs Union in some respects).
</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3728" instrument_node="">The sectors across the EU that would be most hit by the UK's withdrawal are motor vehicles and parts (the UK is a large manufacturer and depends on an EU chain of supply for parts), electronics equipment and processed foods. Export of raw materials from the </span><a class="mw-redirect" data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruhr_valley" title="Ruhr valley"><span data-dcnode-id="3727" instrument_node="">Ruhr valley</span></a><span data-dcnode-id="3725" instrument_node=""> would also be impacted.</span><sup class="reference" data-dcnode-id="3722" id="cite_ref-chen_20-1"><a data-dcnode-id="3723" href="#cite_note-chen-20"><span data-dcnode-id="3724" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3721" instrument_node="">
</span></p><span data-dcnode-id="3719" instrument_node="">
</span><h3 data-dcnode-id="3709"><span class="mw-headline" data-dcnode-id="3717" id="Internal_trade"><span data-dcnode-id="3718" instrument_node="">Internal trade</span></span><span class="mw-editsection" data-dcnode-id="3710"><span class="mw-editsection-bracket" data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">[</span></span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D12" title="Edit section: Internal trade"><span data-dcnode-id="3714" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3693"><span data-dcnode-id="3707" instrument_node="">Ferry companies </span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DFDS" title="DFDS"><span data-dcnode-id="3706" instrument_node="">DFDS</span></a><span data-dcnode-id="3704" instrument_node=""> and </span><a class="new" data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCLdN%26action%3Dedit%26redlink%3D1" title="CLdN (page does not exist)"><span data-dcnode-id="3703" instrument_node="">CLdN</span></a><span data-dcnode-id="3701" instrument_node=""> have announced plans for new or additional direct services from </span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="3700" instrument_node="">Ireland</span></a><span data-dcnode-id="3698" instrument_node=""> to the mainland, avoiding anticipated delays and disruption on the traditional route via Great Britain.</span><sup class="reference" data-dcnode-id="3695" id="cite_ref-26"><a data-dcnode-id="3696" href="#cite_note-26"><span data-dcnode-id="3697" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3694" instrument_node="">
</span></p><span data-dcnode-id="3692" instrument_node="">
</span><h3 data-dcnode-id="3682"><span class="mw-headline" data-dcnode-id="3690" id="Fisheries"><span data-dcnode-id="3691" instrument_node="">Fisheries</span></span><span class="mw-editsection" data-dcnode-id="3683"><span class="mw-editsection-bracket" data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">[</span></span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D13" title="Edit section: Fisheries"><span data-dcnode-id="3687" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3681" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3680" instrument_node="">In May 2021, France threatened to cut off electricity to the British </span><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Channel_Islands" title="Channel Islands"><span data-dcnode-id="3679" instrument_node="">Channel Island</span></a><span data-dcnode-id="3677" instrument_node=""> of </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jersey" title="Jersey"><span data-dcnode-id="3676" instrument_node="">Jersey</span></a><span data-dcnode-id="3674" instrument_node=""> in a fight over post-Brexit fishing rights.</span><sup class="reference" data-dcnode-id="3671" id="cite_ref-27"><a data-dcnode-id="3672" href="#cite_note-27"><span data-dcnode-id="3673" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="3668" id="cite_ref-28"><a data-dcnode-id="3669" href="#cite_note-28"><span data-dcnode-id="3670" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3667" instrument_node="">
</span></p><span data-dcnode-id="3665" instrument_node="">
</span><h3 data-dcnode-id="3655"><span class="mw-headline" data-dcnode-id="3663" id="People"><span data-dcnode-id="3664" instrument_node="">People</span></span><span class="mw-editsection" data-dcnode-id="3656"><span class="mw-editsection-bracket" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">[</span></span><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D14" title="Edit section: People"><span data-dcnode-id="3660" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3654" instrument_node="">
</span><h4 data-dcnode-id="3644"><span class="mw-headline" data-dcnode-id="3652" id="EU_migration_or_Freedom_of_movement"><span data-dcnode-id="3653" instrument_node="">EU migration or Freedom of movement</span></span><span class="mw-editsection" data-dcnode-id="3645"><span class="mw-editsection-bracket" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">[</span></span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D15" title="Edit section: EU migration or Freedom of movement"><span data-dcnode-id="3649" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3642" instrument_node="">The impact of this would be felt most on eastern European member states who have approximately 1.2 million workers in the UK by the end of 2015; the largest groups from Poland (853,000), Romania (175,000) and Lithuania (155,000).</span><sup class="reference" data-dcnode-id="3639" id="cite_ref-reuters_3-1"><a data-dcnode-id="3640" href="#cite_note-reuters-3"><span data-dcnode-id="3641" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3638" instrument_node=""> A year after the Brexit vote, net annual immigration to the UK fell by 106,000 with most attributed to EU citizens leaving for other states, with the biggest drop among those from the western European states.</span><sup class="reference" data-dcnode-id="3635" id="cite_ref-29"><a data-dcnode-id="3636" href="#cite_note-29"><span data-dcnode-id="3637" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3634" instrument_node="">
</span></p><p data-dcnode-id="3623"><span data-dcnode-id="3632" instrument_node="">The Polish government is encouraging its young emigrant workforce to return to Poland, but due to regulatory or political reasons many would either stay in the UK or move to other western cities such as Amsterdam or Berlin.</span><sup class="reference" data-dcnode-id="3629" id="cite_ref-30"><a data-dcnode-id="3630" href="#cite_note-30"><span data-dcnode-id="3631" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3628" instrument_node=""> Other western European member states may see much of the flow coming from eastern states in future. The influx of workers from the east would be economically beneficial to countries such as Germany, but may be politically problematic.</span><sup class="reference" data-dcnode-id="3625" id="cite_ref-reuters_3-2"><a data-dcnode-id="3626" href="#cite_note-reuters-3"><span data-dcnode-id="3627" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3624" instrument_node="">
</span></p><p data-dcnode-id="3617"><span data-dcnode-id="3622" instrument_node="">In a similar manner, in October 2019 the Romanian government was encouraging Romanian workers to go home. According to an interview done with the minister of labour at that time, he was saying "we want all Romanians to come home if possible" and that "the government in Bucharest has launched an advertising campaign to encourage workers home. It is putting in place a range of incentives made up of grants and loans". Apparently at that time, 4,452 Romanians worked for the NHS while Eastern European workers accounted for 67% of seasonal workers in British agriculture.</span><sup class="reference" data-dcnode-id="3619" id="cite_ref-31"><a data-dcnode-id="3620" href="#cite_note-31"><span data-dcnode-id="3621" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3618" instrument_node="">
</span></p><p data-dcnode-id="3607"><span data-dcnode-id="3616" instrument_node="">British residents in the European Union have lost their European Citizen rights but otherwise are to be unaffected  because of the terms of the Withdrawal Agreement. However, according to evidence presented by lobby group "British in Europe" (representing British citizens resident in EU countries) to the Brexit Select Committee of the House of Commons in June 2020, "as many as 23 EU member states [had] yet to implement systems to document the future rights of the estimated 1.2 million British citizens already living on the continent, who are in the dark over their future rights and obligations".</span><sup class="reference" data-dcnode-id="3613" id="cite_ref-Graun200630_32-0"><a data-dcnode-id="3614" href="#cite_note-Graun200630-32"><span data-dcnode-id="3615" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3612" instrument_node=""> "The UK launched its [registration] system for EU citizens last March [2020], with more than 3.3 million people granted pre-settled or settled status to remain in the country after Brexit", the Committee was told.</span><sup class="reference" data-dcnode-id="3609" id="cite_ref-Graun200630_32-1"><a data-dcnode-id="3610" href="#cite_note-Graun200630-32"><span data-dcnode-id="3611" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3608" instrument_node="">
</span></p><p data-dcnode-id="3601"><span data-dcnode-id="3606" instrument_node="">As notable impact, in May 2021 EU nationals (mostly young women) and from various countries such as Spain, Italy, France, Bulgaria and Greece were detained, sent to immigration detention centers and expelled as considered in breach of the post-Brexit travel terms .</span><sup class="reference" data-dcnode-id="3603" id="cite_ref-33"><a data-dcnode-id="3604" href="#cite_note-33"><span data-dcnode-id="3605" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3602" instrument_node="">
</span></p><span data-dcnode-id="3600" instrument_node="">
</span><h4 data-dcnode-id="3590"><span class="mw-headline" data-dcnode-id="3598" id="Political_asylum"><span data-dcnode-id="3599" instrument_node="">Political asylum</span></span><span class="mw-editsection" data-dcnode-id="3591"><span class="mw-editsection-bracket" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">[</span></span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D16" title="Edit section: Political asylum"><span data-dcnode-id="3595" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3577"><span data-dcnode-id="3588" instrument_node="">At the end of the transition period, the EU's </span><a class="mw-redirect" data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dublin_regulation" title="Dublin regulation"><span data-dcnode-id="3587" instrument_node="">Dublin regulation</span></a><span data-dcnode-id="3585" instrument_node="">&nbsp;–  which specifies that </span><a class="mw-redirect" data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_asylum" title="Political asylum"><span data-dcnode-id="3584" instrument_node="">political asylum</span></a><span data-dcnode-id="3582" instrument_node=""> should be claimed at the first point of entry to the Union&nbsp;–  will cease to apply to the UK and with it any obligation on EU member states to accept return from the UK any asylum seekers that have transited that state en route to the UK.</span><sup class="reference" data-dcnode-id="3579" id="cite_ref-34"><a data-dcnode-id="3580" href="#cite_note-34"><span data-dcnode-id="3581" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3578" instrument_node="">
</span></p><span data-dcnode-id="3576" instrument_node="">
</span><h4 data-dcnode-id="3566"><span class="mw-headline" data-dcnode-id="3574" id="Home_Office_hostile_environment_policy"><span data-dcnode-id="3575" instrument_node="">Home Office hostile environment policy</span></span><span class="mw-editsection" data-dcnode-id="3567"><span class="mw-editsection-bracket" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">[</span></span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D17" title="Edit section: Home Office hostile environment policy"><span data-dcnode-id="3571" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3565" instrument_node="">
</span><p data-dcnode-id="3555"><span data-dcnode-id="3564" instrument_node="">Originally the 'Hostile Environment Policy' was created in 2012 by Theresa May, the Conservative Home Secretary at that time with the purpose to create in Britain 'a really hostile environment for illegal immigrants'.</span><sup class="reference" data-dcnode-id="3561" id="cite_ref-35"><a data-dcnode-id="3562" href="#cite_note-35"><span data-dcnode-id="3563" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3560" instrument_node=""> In practical terms, this policy "effectively outsources immigration control to civil society. Landlords, doctors, employers and others have come under a strict legal obligation to check people's documentation". In Brexit context 'up to 90,000 people may be left outside the system' and 'face the impact of the hostile environment': losing the right to work, access to medical care or stay in their home, or potentially put in a detention centre and removed from the country. </span><sup class="reference" data-dcnode-id="3557" id="cite_ref-36"><a data-dcnode-id="3558" href="#cite_note-36"><span data-dcnode-id="3559" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3556" instrument_node="">
</span></p><span data-dcnode-id="3554" instrument_node="">
</span><h3 data-dcnode-id="3544"><span class="mw-headline" data-dcnode-id="3552" id="Company"><span data-dcnode-id="3553" instrument_node="">Company</span></span><span class="mw-editsection" data-dcnode-id="3545"><span class="mw-editsection-bracket" data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">[</span></span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D18" title="Edit section: Company"><span data-dcnode-id="3549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3537"><span data-dcnode-id="3542" instrument_node="">With the end of the transition period planned on 1 January 2021, companies operating business with British nations will need to change their trade mark, border and copyright policies to comply with new British procedures and their associated costs.</span><sup class="reference" data-dcnode-id="3539" id="cite_ref-37"><a data-dcnode-id="3540" href="#cite_note-37"><span data-dcnode-id="3541" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3538" instrument_node="">
</span></p><span data-dcnode-id="3536" instrument_node="">
</span><h3 data-dcnode-id="3526"><span class="mw-headline" data-dcnode-id="3534" id="Duty_and_VAT"><span data-dcnode-id="3535" instrument_node="">Duty and VAT</span></span><span class="mw-editsection" data-dcnode-id="3527"><span class="mw-editsection-bracket" data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">[</span></span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D19" title="Edit section: Duty and VAT"><span data-dcnode-id="3531" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3519"><span data-dcnode-id="3524" instrument_node="">The Brexit/trade agreement led to a change in duty and in VAT. For instance, EU buyers of British-made items now pay their national VAT rather than the (previously applicable) British one. Products sold by British vendors but made (for example) in China may be subject to additional import duties. These tax and duty charges are collected by the forwarding agent at the point of delivery.</span><sup class="reference" data-dcnode-id="3521" id="cite_ref-38"><a data-dcnode-id="3522" href="#cite_note-38"><span data-dcnode-id="3523" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3520" instrument_node="">
</span></p><span data-dcnode-id="3518" instrument_node="">
</span><h2 data-dcnode-id="3508"><span class="mw-headline" data-dcnode-id="3516" id="Institutional_changes"><span data-dcnode-id="3517" instrument_node="">Institutional changes</span></span><span class="mw-editsection" data-dcnode-id="3509"><span class="mw-editsection-bracket" data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">[</span></span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D20" title="Edit section: Institutional changes"><span data-dcnode-id="3513" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3507" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3498"><div class="thumbinner" data-dcnode-id="3499" style="width:152px;"><a class="image" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2020_European_Medicines_Agency.jpg"><img alt="" class="thumbimage" data-dcnode-id="3506" data-file-height="5312" data-file-width="2988" decoding="async" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/2020_European_Medicines_Agency.jpg/150px-2020_European_Medicines_Agency.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/48/2020_European_Medicines_Agency.jpg/225px-2020_European_Medicines_Agency.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/48/2020_European_Medicines_Agency.jpg/300px-2020_European_Medicines_Agency.jpg 2x" width="150"></a><span data-dcnode-id="3504" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3500"><div class="magnify" data-dcnode-id="3502"><a class="internal" data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2020_European_Medicines_Agency.jpg" title="Enlarge"></a></div><span data-dcnode-id="3501" instrument_node="">European Medicines Agency offices in Amsterdam (April 2020)</span></div></div></div><span data-dcnode-id="3497" instrument_node="">
</span><h3 data-dcnode-id="3487"><span class="mw-headline" data-dcnode-id="3495" id="Agencies_located_in_the_UK"><span data-dcnode-id="3496" instrument_node="">Agencies located in the UK</span></span><span class="mw-editsection" data-dcnode-id="3488"><span class="mw-editsection-bracket" data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">[</span></span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D21" title="Edit section: Agencies located in the UK"><span data-dcnode-id="3492" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3468"><span data-dcnode-id="3485" instrument_node="">Until 2017, the UK had been hosting the </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Medicines_Agency" title="European Medicines Agency"><span data-dcnode-id="3484" instrument_node="">European Medicines Agency</span></a><span data-dcnode-id="3482" instrument_node=""> and the </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Banking_Authority" title="European Banking Authority"><span data-dcnode-id="3481" instrument_node="">European Banking Authority</span></a><span data-dcnode-id="3479" instrument_node=""> for many years. As an EU agency could not be located outside the Union, the Council began a process to identify new host cities for the agencies. Hosting an agency is seen as a valuable prize for a city, so the process was hotly contested by nearly two dozen cities not just on the objective criteria, but on political grounds. By November 2017, it was agreed that they would relocate to </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amsterdam" title="Amsterdam"><span data-dcnode-id="3478" instrument_node="">Amsterdam</span></a><span data-dcnode-id="3476" instrument_node=""> and </span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="3475" instrument_node="">Paris</span></a><span data-dcnode-id="3473" instrument_node="">.</span><sup class="reference" data-dcnode-id="3470" id="cite_ref-agencyroad_39-0"><a data-dcnode-id="3471" href="#cite_note-agencyroad-39"><span data-dcnode-id="3472" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3469" instrument_node="">
</span></p><p data-dcnode-id="3459"><span data-dcnode-id="3467" instrument_node="">The backup data centre for the security behind the </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_%28satellite_navigation%29" title="Galileo (satellite navigation)"><span data-dcnode-id="3466" instrument_node="">Galileo satellite navigation system</span></a><span data-dcnode-id="3464" instrument_node=""> was also relocated from the UK to Spain due to Brexit.</span><sup class="reference" data-dcnode-id="3461" id="cite_ref-40"><a data-dcnode-id="3462" href="#cite_note-40"><span data-dcnode-id="3463" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3460" instrument_node="">
</span></p><span data-dcnode-id="3458" instrument_node="">
</span><h3 data-dcnode-id="3448"><span class="mw-headline" data-dcnode-id="3456" id="European_Parliament_seats"><span data-dcnode-id="3457" instrument_node="">European Parliament seats</span></span><span class="mw-editsection" data-dcnode-id="3449"><span class="mw-editsection-bracket" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">[</span></span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D22" title="Edit section: European Parliament seats"><span data-dcnode-id="3453" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3447" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3441" role="note"><span data-dcnode-id="3444" instrument_node="">See also: </span><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apportionment_in_the_European_Parliament" title="Apportionment in the European Parliament"><span data-dcnode-id="3443" instrument_node="">Apportionment in the European Parliament</span></a></div><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3439" instrument_node="">The UK was allotted 73 seats in the 751 seat European Parliament, which became vacant upon its withdrawal in 2020. 27 of these seats were redistributed to other countries, with the remaining 46 reserved for potential new member states, reducing the number of MEPs to 705.</span><sup class="reference" data-dcnode-id="3436" id="cite_ref-41"><a data-dcnode-id="3437" href="#cite_note-41"><span data-dcnode-id="3438" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3435" instrument_node="">
</span></p><p data-dcnode-id="3401"><span data-dcnode-id="3433" instrument_node="">Under normal procedures, the UK's seats would have been redistributed between the remaining members according to the standard formula, but there were a number of alternative proposals. The European Parliament originally proposed that 22 seats would be redistributed and the remaining 50 would be reserved either for new members, or an additional transnational list of MEPs which would be elected across the Union in an effort to deepen a direct democratic link. This was a long-standing proposal, notably supported by the </span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Green_Party" title="European Green Party"><span data-dcnode-id="3432" instrument_node="">European Green Party</span></a><span data-dcnode-id="3430" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_President" title="French President"><span data-dcnode-id="3429" instrument_node="">French President</span></a><span data-dcnode-id="3427" instrument_node=""> </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emmanuel_Macron" title="Emmanuel Macron"><span data-dcnode-id="3426" instrument_node="">Emmanuel Macron</span></a><span data-dcnode-id="3424" instrument_node="">. However, due to the legal uncertainty around Brexit, any bold moves were opposed by constitutional affairs committee chair </span><a class="mw-redirect" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danuta_Huebner" title="Danuta Huebner"><span data-dcnode-id="3423" instrument_node="">Danuta Huebner</span></a><span data-dcnode-id="3421" instrument_node="">.</span><sup class="reference" data-dcnode-id="3418" id="cite_ref-transnat_ep_42-0"><a data-dcnode-id="3419" href="#cite_note-transnat_ep-42"><span data-dcnode-id="3420" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3415" id="cite_ref-transnat_euo_43-0"><a data-dcnode-id="3416" href="#cite_note-transnat_euo-43"><span data-dcnode-id="3417" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3414" instrument_node=""> Computations were proposed in a paper titled "The Composition of the European Parliament" on 30 January 2017.</span><sup class="reference" data-dcnode-id="3411" id="cite_ref-44"><a data-dcnode-id="3412" href="#cite_note-44"><span data-dcnode-id="3413" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3410" instrument_node=""> The constitutional affairs committee eventually decided on 23 January 2018 that 27 of the UK's seats would be redistributed and 46 reserved for new member states and transnational lists.</span><sup class="reference" data-dcnode-id="3407" id="cite_ref-45"><a data-dcnode-id="3408" href="#cite_note-45"><span data-dcnode-id="3409" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3406" instrument_node=""> On 7 February 2018, MEPs approved the redistribution of 27 seats, but voted against the introduction of transnational lists.</span><sup class="reference" data-dcnode-id="3403" id="cite_ref-46"><a data-dcnode-id="3404" href="#cite_note-46"><span data-dcnode-id="3405" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3402" instrument_node=""> On 31 January 2020, all British MEPs vacated their seats; reallocation began on 1 February 2020.
</span></p><span data-dcnode-id="3400" instrument_node="">
</span><h3 data-dcnode-id="3390"><span class="mw-headline" data-dcnode-id="3398" id="European_Commissioners"><span data-dcnode-id="3399" instrument_node="">European Commissioners</span></span><span class="mw-editsection" data-dcnode-id="3391"><span class="mw-editsection-bracket" data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">[</span></span><a data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D23" title="Edit section: European Commissioners"><span data-dcnode-id="3395" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3389" instrument_node="">
</span><p data-dcnode-id="3384"><span data-dcnode-id="3388" instrument_node="">Since </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Von_der_Leyen_Commission" title="Von der Leyen Commission"><span data-dcnode-id="3387" instrument_node="">Von der Leyen Commission</span></a><span data-dcnode-id="3385" instrument_node=""> the number of Commissioners has reduced to 27 from 28.
</span></p><span data-dcnode-id="3383" instrument_node="">
</span><h2 data-dcnode-id="3373"><span class="mw-headline" data-dcnode-id="3381" id="Costs_and_benefits"><span data-dcnode-id="3382" instrument_node="">Costs and benefits</span></span><span class="mw-editsection" data-dcnode-id="3374"><span class="mw-editsection-bracket" data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">[</span></span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D24" title="Edit section: Costs and benefits"><span data-dcnode-id="3378" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3372" instrument_node="">
</span><h3 data-dcnode-id="3362"><span class="mw-headline" data-dcnode-id="3370" id="Five_billion_euro_adjustment_fund"><span data-dcnode-id="3371" instrument_node="">Five billion euro adjustment fund</span></span><span class="mw-editsection" data-dcnode-id="3363"><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">[</span></span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D25" title="Edit section: Five billion euro adjustment fund"><span data-dcnode-id="3367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3353"><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Michel" title="Charles Michel"><span data-dcnode-id="3360" instrument_node="">Charles Michel</span></a><span data-dcnode-id="3358" instrument_node=""> proposed a five billion euro fund which could be used to reduce the shock of the British divorce when the British transition period ends. This reserve is a part of the €1,074 billion European Union budget.</span><sup class="reference" data-dcnode-id="3355" id="cite_ref-47"><a data-dcnode-id="3356" href="#cite_note-47"><span data-dcnode-id="3357" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3354" instrument_node="">
</span></p><p data-dcnode-id="3330"><span data-dcnode-id="3352" instrument_node="">Ireland and Netherlands are the countries which will have greatest benefit from the shock absorber.</span><sup class="reference" data-dcnode-id="3349" id="cite_ref-48"><a data-dcnode-id="3350" href="#cite_note-48"><span data-dcnode-id="3351" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3348" instrument_node=""> According to the </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_National_Party" title="Scottish National Party"><span data-dcnode-id="3347" instrument_node="">Scottish National Party</span></a><span data-dcnode-id="3345" instrument_node=""> leader in the </span><a class="mw-redirect" data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Commons_%28UK%29" title="House of Commons (UK)"><span data-dcnode-id="3344" instrument_node="">House of Commons</span></a><span data-dcnode-id="3342" instrument_node="">, Ireland "has received" [the equivalent of] one billion </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pound_sterling" title="Pound sterling"><span data-dcnode-id="3341" instrument_node="">pounds</span></a><span data-dcnode-id="3339" instrument_node=""> from the reserve.</span><sup class="reference" data-dcnode-id="3336" id="cite_ref-49"><a data-dcnode-id="3337" href="#cite_note-49"><span data-dcnode-id="3338" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3335" instrument_node=""> Other sources put the figure at €991.2 million.</span><sup class="reference" data-dcnode-id="3332" id="cite_ref-Euractiv_dotees_50-0"><a data-dcnode-id="3333" href="#cite_note-Euractiv_dotees-50"><span data-dcnode-id="3334" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3331" instrument_node="">
</span></p><p data-dcnode-id="3324"><span data-dcnode-id="3329" instrument_node="">For the Netherlands, the allocation is 713,7 million euros.</span><sup class="reference" data-dcnode-id="3326" id="cite_ref-Euractiv_dotees_50-1"><a data-dcnode-id="3327" href="#cite_note-Euractiv_dotees-50"><span data-dcnode-id="3328" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3325" instrument_node="">
</span></p><p data-dcnode-id="3318"><span data-dcnode-id="3323" instrument_node="">For Germany, the allocation is €429.1 million.</span><sup class="reference" data-dcnode-id="3320" id="cite_ref-Euractiv_dotees_50-2"><a data-dcnode-id="3321" href="#cite_note-Euractiv_dotees-50"><span data-dcnode-id="3322" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3319" instrument_node="">
</span></p><p data-dcnode-id="3308"><span data-dcnode-id="3317" instrument_node="">For France it is €396.5 million.</span><sup class="reference" data-dcnode-id="3314" id="cite_ref-Euractiv_dotees_50-3"><a data-dcnode-id="3315" href="#cite_note-Euractiv_dotees-50"><span data-dcnode-id="3316" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3313" instrument_node=""> Other sources suggest that France may receive more than €420 million.</span><sup class="reference" data-dcnode-id="3310" id="cite_ref-51"><a data-dcnode-id="3311" href="#cite_note-51"><span data-dcnode-id="3312" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3309" instrument_node="">
</span></p><p data-dcnode-id="3299"><span data-dcnode-id="3307" instrument_node="">Belgium should receive up to €325 million euros from the EU budget for the impact of Brexit. This includes €200 million from the first tranche for </span><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flanders" title="Flanders"><span data-dcnode-id="3306" instrument_node="">Flanders</span></a><span data-dcnode-id="3304" instrument_node="">.</span><sup class="reference" data-dcnode-id="3301" id="cite_ref-52"><a data-dcnode-id="3302" href="#cite_note-52"><span data-dcnode-id="3303" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3300" instrument_node="">
</span></p><span data-dcnode-id="3298" instrument_node="">
</span><h3 data-dcnode-id="3288"><span class="mw-headline" data-dcnode-id="3296" id="Brexit_Adjustment_Reserve"><span data-dcnode-id="3297" instrument_node="">Brexit Adjustment Reserve</span></span><span class="mw-editsection" data-dcnode-id="3289"><span class="mw-editsection-bracket" data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">[</span></span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D26" title="Edit section: Brexit Adjustment Reserve"><span data-dcnode-id="3293" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">On 12 January 2021, the European Commission published a detailed breakdown by Member State
of the pre-financing allocation under the Brexit Adjustment Reserve in 2021.
</span></p><span data-dcnode-id="3284" instrument_node="">
</span><h2 data-dcnode-id="3274"><span class="mw-headline" data-dcnode-id="3282" id="Public_opinion"><span data-dcnode-id="3283" instrument_node="">Public opinion</span></span><span class="mw-editsection" data-dcnode-id="3275"><span class="mw-editsection-bracket" data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">[</span></span><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D27" title="Edit section: Public opinion"><span data-dcnode-id="3279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3272" instrument_node="">In the wake of the UK's vote to withdraw, opinion polls showed that support for the EU surged across Europe. Surveying shows that the EU has the highest support in 35 years.</span><sup class="reference" data-dcnode-id="3269" id="cite_ref-53"><a data-dcnode-id="3270" href="#cite_note-53"><span data-dcnode-id="3271" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3268" instrument_node=""> The UK has also seen a resurgence of EU based support with polls showing that in September 2018 more British residents thought Brexit would be wrong, by 46% to 43%.</span><sup class="reference" data-dcnode-id="3265" id="cite_ref-54"><a data-dcnode-id="3266" href="#cite_note-54"><span data-dcnode-id="3267" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="3262" id="cite_ref-Guardiansupport_55-0"><a data-dcnode-id="3263" href="#cite_note-Guardiansupport-55"><span data-dcnode-id="3264" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="3259" id="cite_ref-FTsupportincrease_56-0"><a data-dcnode-id="3260" href="#cite_note-FTsupportincrease-56"><span data-dcnode-id="3261" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="3256" id="cite_ref-balance_6-2"><a data-dcnode-id="3257" href="#cite_note-balance-6"><span data-dcnode-id="3258" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3255" instrument_node=""> By November 2020, 47% of respondent to a </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouGov" title="YouGov"><span data-dcnode-id="3254" instrument_node="">YouGov</span></a><span data-dcnode-id="3252" instrument_node="">/Eurotrack poll would vote to rejoin compared with 38% committed to leaving.</span><sup class="reference" data-dcnode-id="3249" id="cite_ref-yougov0221_57-0"><a data-dcnode-id="3250" href="#cite_note-yougov0221-57"><span data-dcnode-id="3251" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3248" instrument_node=""> By February 2021 the YouGov/Eurotrack poll showed that the ratio had reversed: 39% of the UK electorate would wish to rejoin the EU as against 41% who would vote against that option.</span><sup class="reference" data-dcnode-id="3245" id="cite_ref-yougov0221_57-1"><a data-dcnode-id="3246" href="#cite_note-yougov0221-57"><span data-dcnode-id="3247" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3244" instrument_node=""> The same poll showed pro-remain majorities in Germany (55%/22%), France (51%/26%), Denmark (62%/23%) and Sweden (56%/25%).</span><sup class="reference" data-dcnode-id="3241" id="cite_ref-yougov0221_57-2"><a data-dcnode-id="3242" href="#cite_note-yougov0221-57"><span data-dcnode-id="3243" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3240" instrument_node="">
</span></p><p data-dcnode-id="3197"><span data-dcnode-id="3238" instrument_node="">In campaign of </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marine_Le_Pen" title="Marine Le Pen"><span data-dcnode-id="3237" instrument_node="">Marine Le Pen</span></a><span data-dcnode-id="3235" instrument_node=""> in the </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_French_presidential_election" title="2017 French presidential election"><span data-dcnode-id="3234" instrument_node="">2017 French presidential election</span></a><span data-dcnode-id="3232" instrument_node="">, her party </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Rally" title="National Rally"><span data-dcnode-id="3231" instrument_node="">National Rally</span></a><span data-dcnode-id="3229" instrument_node=""> held a eurosceptic position but at the same time, Le Pen stopped promoting </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frexit" title="Frexit"><span data-dcnode-id="3228" instrument_node="">Frexit</span></a><span data-dcnode-id="3226" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3219" style="white-space:nowrap;"><span data-dcnode-id="3225" instrument_node="">[</span><i data-dcnode-id="3221"><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3223" title="This claim needs references to reliable sources. (January 2021)"><span data-dcnode-id="3224" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3220" instrument_node="">]</span></sup><span data-dcnode-id="3218" instrument_node=""> In the </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_Italian_general_election" title="2018 Italian general election"><span data-dcnode-id="3217" instrument_node="">2018 Italian general election</span></a><span data-dcnode-id="3215" instrument_node="">, the populist </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Five_Star_Movement" title="Five Star Movement"><span data-dcnode-id="3214" instrument_node="">Five Star Movement</span></a><span data-dcnode-id="3212" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_wing" title="Right wing"><span data-dcnode-id="3211" instrument_node="">right wing</span></a><span data-dcnode-id="3209" instrument_node=""> </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lega_Nord" title="Lega Nord"><span data-dcnode-id="3208" instrument_node="">Lega Nord</span></a><span data-dcnode-id="3206" instrument_node="">, both Eurosceptic, received 32% and 17% respectively.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3199" style="white-space:nowrap;"><span data-dcnode-id="3205" instrument_node="">[</span><i data-dcnode-id="3201"><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3203" title="This claim needs references to reliable sources. (January 2021)"><span data-dcnode-id="3204" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3200" instrument_node="">]</span></sup><span data-dcnode-id="3198" instrument_node="">
</span></p><span data-dcnode-id="3196" instrument_node="">
</span><h2 data-dcnode-id="3186"><span class="mw-headline" data-dcnode-id="3194" id="Languages"><span data-dcnode-id="3195" instrument_node="">Languages</span></span><span class="mw-editsection" data-dcnode-id="3187"><span class="mw-editsection-bracket" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">[</span></span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D28" title="Edit section: Languages"><span data-dcnode-id="3191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3185" instrument_node="">
</span><link data-dcnode-id="3184" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3177" role="note"><span data-dcnode-id="3183" instrument_node="">See also: </span><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Languages_of_the_European_Union" title="Languages of the European Union"><span data-dcnode-id="3182" instrument_node="">Languages of the European Union</span></a><span data-dcnode-id="3180" instrument_node=""> and </span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_language_in_Europe" title="English language in Europe"><span data-dcnode-id="3179" instrument_node="">English language in Europe</span></a></div><span data-dcnode-id="3176" instrument_node="">
</span><p data-dcnode-id="3165"><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danuta_H%25C3%25BCbner" title="Danuta Hübner"><span data-dcnode-id="3175" instrument_node="">Danuta Hübner</span></a><span data-dcnode-id="3173" instrument_node="">, the head of the </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Parliament_Committee_on_Constitutional_Affairs" title="European Parliament Committee on Constitutional Affairs"><span data-dcnode-id="3172" instrument_node="">European Parliament Committee on Constitutional Affairs</span></a><span data-dcnode-id="3170" instrument_node="">, has argued that after Brexit, English would no longer be an official EU language: "We have a regulation … where every EU country has the right to notify one official language. The Irish have notified Gaelic, and the Maltese have notified Maltese, so you have only the U.K. notifying English ... If we don’t have the U.K., we don't have English."</span><sup class="reference" data-dcnode-id="3167" id="cite_ref-Hübner_58-0"><a data-dcnode-id="3168" href="#cite_note-H%C3%BCbner-58"><span data-dcnode-id="3169" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3166" instrument_node="">
</span></p><p data-dcnode-id="3138"><span data-dcnode-id="3164" instrument_node="">However, this statement has been contradicted by the European Commission Representation in Ireland, whose spokesperson argued that changing the current language regime would require a unanimous vote by the Council,</span><sup class="reference" data-dcnode-id="3161" id="cite_ref-59"><a data-dcnode-id="3162" href="#cite_note-59"><span data-dcnode-id="3163" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3160" instrument_node=""> as well as by </span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_European_Commission" title="President of the European Commission"><span data-dcnode-id="3159" instrument_node="">President</span></a><span data-dcnode-id="3157" instrument_node=""> </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Claude_Juncker" title="Jean-Claude Juncker"><span data-dcnode-id="3156" instrument_node="">Jean-Claude Juncker</span></a><span data-dcnode-id="3154" instrument_node=""> in an answer to a Parliamentary Question on 9 August 2017.</span><sup class="reference" data-dcnode-id="3151" id="cite_ref-60"><a data-dcnode-id="3152" href="#cite_note-60"><span data-dcnode-id="3153" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3150" instrument_node=""> However, Juncker has also stated that despite this, in the wake of Brexit, English is losing its importance in Europe</span><sup class="reference" data-dcnode-id="3147" id="cite_ref-61"><a data-dcnode-id="3148" href="#cite_note-61"><span data-dcnode-id="3149" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3146" instrument_node=""> and members of the German </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bundestag" title="Bundestag"><span data-dcnode-id="3145" instrument_node="">Bundestag</span></a><span data-dcnode-id="3143" instrument_node=""> have called on staff in EU institutions to use German more often.</span><sup class="reference" data-dcnode-id="3140" id="cite_ref-62"><a data-dcnode-id="3141" href="#cite_note-62"><span data-dcnode-id="3142" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3139" instrument_node="">
</span></p><p data-dcnode-id="3119"><span data-dcnode-id="3137" instrument_node="">When the United Kingdom and Ireland joined the EU's predecessor in 1973, </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_language" title="French language"><span data-dcnode-id="3136" instrument_node="">French</span></a><span data-dcnode-id="3134" instrument_node=""> was the dominant language of the institutions. With the addition of Sweden and Finland in the 1990s, and the Eastern European states in the 2000s, English slowly supplanted French as the dominant working language of the institutions. In 2015, it was estimated that 80% of legislative proposals were drafted first in English. The role of English as a </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lingua_franca" title="Lingua franca"><span data-dcnode-id="3133" instrument_node="">lingua franca</span></a><span data-dcnode-id="3131" instrument_node=""> is believed to be likely to continue, given how heavily staff rely on it,</span><sup class="reference" data-dcnode-id="3128" id="cite_ref-63"><a data-dcnode-id="3129" href="#cite_note-63"><span data-dcnode-id="3130" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="3125" id="cite_ref-Hübner_58-1"><a data-dcnode-id="3126" href="#cite_note-H%C3%BCbner-58"><span data-dcnode-id="3127" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3124" instrument_node=""> and that in European schools, 97% of children learn English as an additional language, compared with 34% learning French and 23% learning German.</span><sup class="reference" data-dcnode-id="3121" id="cite_ref-64"><a data-dcnode-id="3122" href="#cite_note-64"><span data-dcnode-id="3123" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3120" instrument_node="">
</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3118" instrument_node="">Dr Marko Modiano has suggested, in an academic paper, that </span><a data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euro_English" title="Euro English"><span data-dcnode-id="3117" instrument_node="">Euro English</span></a><span data-dcnode-id="3115" instrument_node=""> could be codified in a similar way to native English varieties following Brexit.</span><sup class="reference" data-dcnode-id="3112" id="cite_ref-Marko_65-0"><a data-dcnode-id="3113" href="#cite_note-Marko-65"><span data-dcnode-id="3114" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="3109" id="cite_ref-66"><a data-dcnode-id="3110" href="#cite_note-66"><span data-dcnode-id="3111" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3108" instrument_node="">
</span></p><p data-dcnode-id="3087"><span data-dcnode-id="3106" instrument_node="">Language rules are currently covered, amongst others, by: Article 55 of the </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_European_Union" title="Treaty on European Union"><span data-dcnode-id="3105" instrument_node="">Treaty on European Union</span></a><span data-dcnode-id="3103" instrument_node=""> (TEU) (which lists the 24 "Treaty languages" in which the Treaty is drawn up);</span><sup class="reference" data-dcnode-id="3100" id="cite_ref-67"><a data-dcnode-id="3101" href="#cite_note-67"><span data-dcnode-id="3102" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3099" instrument_node=""> Articles 20 and 24 of the </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Functioning_of_the_European_Union" title="Treaty on the Functioning of the European Union"><span data-dcnode-id="3098" instrument_node="">Treaty on the Functioning of the European Union</span></a><span data-dcnode-id="3096" instrument_node=""> (TFEU), which lay down the rights of citizens to petition the European Parliament and to address the institutions in any of the Treaty languages and to obtain a reply in the same language, and Article 342 TFEU, which states that "the rules governing the languages of the institutions of the Union shall, without prejudice to the provisions contained in the Statute of the Court of Justice of the European Union, be determined by the Council, acting unanimously by means of regulations";</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-68"><a data-dcnode-id="3094" href="#cite_note-68"><span data-dcnode-id="3095" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3092" instrument_node=""> and Council Regulation No 1/1958,</span><sup class="reference" data-dcnode-id="3089" id="cite_ref-69"><a data-dcnode-id="3090" href="#cite_note-69"><span data-dcnode-id="3091" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3088" instrument_node=""> which lists the current 24 official languages.
</span></p><span data-dcnode-id="3086" instrument_node="">
