</a><span data-dcnode-id="5787" instrument_node="">, as well as sharing criminal intelligence and other matters, there is a clear impact with consequences for both institutions.

</span><p data-dcnode-id="4233"><span data-dcnode-id="4241" instrument_node="">The UK's contribution to the </span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budget_of_the_European_Union" title="Budget of the European Union"><span data-dcnode-id="4240" instrument_node="">EU budget</span></a><span data-dcnode-id="4238" instrument_node=""> in 2016, after accounting for its rebate, was €19.4 billion. After removing about €7 billion that the UK receives in EU subsidies, the loss to the EU budget comes to about 5% of the total. Unless the budget is reduced, Germany (already the largest net contributor) seems likely to be asked to provide the largest share of the cash, its share estimated at about €2.5 billion.</span><sup class="reference" data-dcnode-id="4235" id="cite_ref-reuters_3-0"><a data-dcnode-id="4236" href="#cite_note-reuters-3"><span data-dcnode-id="4237" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4234" instrument_node="">
</span></p><p data-dcnode-id="4223"><span data-dcnode-id="4232" instrument_node="">As of March 2020</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="4229" style="display:none;"><a class="external text" data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit"><span data-dcnode-id="4231" instrument_node="">[update]</span></a></sup><span data-dcnode-id="4228" instrument_node="">, debate continues between those members who wish the budget to be limited to no more than 1% of members' combined GDP and those who want it to be 1.074%.</span><sup class="reference" data-dcnode-id="4225" id="cite_ref-4"><a data-dcnode-id="4226" href="#cite_note-4"><span data-dcnode-id="4227" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4224" instrument_node="">
</span></p><span data-dcnode-id="4222" instrument_node="">
</span><h2 data-dcnode-id="4212"><span class="mw-headline" data-dcnode-id="4220" id="Readiness"><span data-dcnode-id="4221" instrument_node="">Readiness</span></span><span class="mw-editsection" data-dcnode-id="4213"><span class="mw-editsection-bracket" data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">[</span></span><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D3" title="Edit section: Readiness"><span data-dcnode-id="4217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4211" instrument_node="">
</span><p data-dcnode-id="4205"><span data-dcnode-id="4210" instrument_node="">In response to Brexit, the European Commission issued a communication on readiness named: "Communication on readiness at the end of the transition period between the European Union and the United Kingdom".</span><sup class="reference" data-dcnode-id="4207" id="cite_ref-5"><a data-dcnode-id="4208" href="#cite_note-5"><span data-dcnode-id="4209" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4206" instrument_node="">
</span></p><span data-dcnode-id="4204" instrument_node="">
</span><h2 data-dcnode-id="4194"><span class="mw-headline" data-dcnode-id="4202" id="Policy_changes"><span data-dcnode-id="4203" instrument_node="">Policy changes</span></span><span class="mw-editsection" data-dcnode-id="4195"><span class="mw-editsection-bracket" data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">[</span></span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D4" title="Edit section: Policy changes"><span data-dcnode-id="4199" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4193" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="4170" style="width:300px; ;"><span data-dcnode-id="4190" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="4185" style=""><span data-dcnode-id="4189" instrument_node="">
</span><p data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">The years are over when Europe cannot follow a course because the British will object. Now the British are going, Europe can find a new élan.
</span></p><span data-dcnode-id="4186" instrument_node="">
</span></blockquote><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4172"><cite class="left-aligned" data-dcnode-id="4174" style=""><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christine_Lagarde" title="Christine Lagarde"><span data-dcnode-id="4183" instrument_node="">Christine Lagarde</span></a><span data-dcnode-id="4181" instrument_node="">, Director of the </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Monetary_Fund" title="International Monetary Fund"><span data-dcnode-id="4180" instrument_node="">IMF</span></a><span data-dcnode-id="4178" instrument_node="">, </span><sup class="reference" data-dcnode-id="4175" id="cite_ref-balance_6-0"><a data-dcnode-id="4176" href="#cite_note-balance-6"><span data-dcnode-id="4177" instrument_node="">[6]</span></a></sup></cite><span data-dcnode-id="4173" instrument_node="">
</span></p><span data-dcnode-id="4171" instrument_node="">
</span></div><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4163"><span data-dcnode-id="4168" instrument_node="">The UK was a major player in the EU which served as both an asset to the Union, but also a hindrance to those who supported a direction firmly opposed by the British government.</span><sup class="reference" data-dcnode-id="4165" id="cite_ref-balance_6-1"><a data-dcnode-id="4166" href="#cite_note-balance-6"><span data-dcnode-id="4167" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4164" instrument_node="">
</span></p><span data-dcnode-id="4162" instrument_node="">
</span><h3 data-dcnode-id="4152"><span class="mw-headline" data-dcnode-id="4160" id="Ideological_shift"><span data-dcnode-id="4161" instrument_node="">Ideological shift</span></span><span class="mw-editsection" data-dcnode-id="4153"><span class="mw-editsection-bracket" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">[</span></span><a data-dcnode-id="4156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D5" title="Edit section: Ideological shift"><span data-dcnode-id="4157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4151" instrument_node="">
</span><p data-dcnode-id="4139"><span data-dcnode-id="4150" instrument_node="">As the EU's third most populous state, with over 12% of the Union's population, the UK was an influential player in the </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Parliament" title="European Parliament"><span data-dcnode-id="4149" instrument_node="">European Parliament</span></a><span data-dcnode-id="4147" instrument_node=""> and the </span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_the_European_Union" title="Council of the European Union"><span data-dcnode-id="4146" instrument_node="">Council of the European Union</span></a><span data-dcnode-id="4144" instrument_node="">. Its absence will impact the ideological balance within the EU institutions.</span><sup class="reference" data-dcnode-id="4141" id="cite_ref-UCL_7-0"><a data-dcnode-id="4142" href="#cite_note-UCL-7"><span data-dcnode-id="4143" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4140" instrument_node="">
</span></p><span data-dcnode-id="4138" instrument_node="">
</span><dl data-dcnode-id="4135"><dt data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Council</span></dt></dl><span data-dcnode-id="4134" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4133" instrument_node="">In the Council, during the UK's membership there were two blocs, each capable of forming a blocking minority against the other: the </span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectionism" title="Protectionism"><span data-dcnode-id="4132" instrument_node="">protectionist</span></a><span data-dcnode-id="4130" instrument_node=""> bloc of mainly southern states and the </span><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_liberalism" title="Economic liberalism"><span data-dcnode-id="4129" instrument_node="">liberal</span></a><span data-dcnode-id="4127" instrument_node=""> bloc of mainly northern states. As a member of the latter, the UK's departure will weaken the liberal bloc as the UK has been a sizeable and fervent proponent of an economically liberal Europe, larger trade deals with third countries and of </span><a class="mw-redirect" data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Future_enlargement_of_the_European_Union" title="Future enlargement of the European Union"><span data-dcnode-id="4126" instrument_node="">further EU enlargement</span></a><span data-dcnode-id="4124" instrument_node="">. While weakening the liberal bloc, it will also strengthen Germany's individual position in the Council through the loss of a key counterweight. However, Germany remains uneasy about this role lest other member states anxious of German dominance may be more tempted to ally against it.</span><sup class="reference" data-dcnode-id="4121" id="cite_ref-UCL_7-1"><a data-dcnode-id="4122" href="#cite_note-UCL-7"><span data-dcnode-id="4123" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="4118" id="cite_ref-CER_8-0"><a data-dcnode-id="4119" href="#cite_note-CER-8"><span data-dcnode-id="4120" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4117" instrument_node="">
</span></p><span data-dcnode-id="4115" instrument_node="">
</span><dl data-dcnode-id="4112"><dt data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">European Parliament</span></dt></dl><span data-dcnode-id="4111" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4102"><div class="thumbinner" data-dcnode-id="4103" style="width:222px;"><a class="image" data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEP_Group_Change_Brexit.png"><img alt="" class="thumbimage" data-dcnode-id="4110" data-file-height="474" data-file-width="564" decoding="async" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c4/EP_Group_Change_Brexit.png/220px-EP_Group_Change_Brexit.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c4/EP_Group_Change_Brexit.png/330px-EP_Group_Change_Brexit.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c4/EP_Group_Change_Brexit.png/440px-EP_Group_Change_Brexit.png 2x" width="220"></a><span data-dcnode-id="4108" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4104"><div class="magnify" data-dcnode-id="4106"><a class="internal" data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEP_Group_Change_Brexit.png" title="Enlarge"></a></div><span data-dcnode-id="4105" instrument_node="">UK seats in EP groups highlighted in red (seat numbers based on EP groups in December 2017</span></div></div></div><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4093"><span data-dcnode-id="4100" instrument_node="">In the European Parliament, Brexit led to </span><a data-dcnode-id="4098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_European_Parliament_election%23Changes_in_group_representation" title="2019 European Parliament election"><span data-dcnode-id="4099" instrument_node="">Changes in group representation</span></a><span data-dcnode-id="4097" instrument_node="">: Brexit gave 5 seats to the EPP and 3 seats to the ID, while 29 seats were lost by the NI (including Brexit party) 11 seats lost by the </span><i data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Renew Europe</span></i><span data-dcnode-id="4094" instrument_node=""> (LibDem) 7 seats losts by the green, and six seats lost by the alliance of socialists and democrats (S&amp;D).
</span></p><p data-dcnode-id="4063"><span data-dcnode-id="4092" instrument_node="">Similarly, a majority of the UK's representatives sat with </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right-wing_politics" title="Right-wing politics"><span data-dcnode-id="4091" instrument_node="">right-leaning</span></a><span data-dcnode-id="4089" instrument_node=""> groups, namely the </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Conservatives_and_Reformists" title="European Conservatives and Reformists"><span data-dcnode-id="4088" instrument_node="">European Conservatives and Reformists</span></a><span data-dcnode-id="4086" instrument_node=""> and the </span><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe_of_Freedom_and_Direct_Democracy" title="Europe of Freedom and Direct Democracy"><span data-dcnode-id="4085" instrument_node="">Europe of Freedom and Direct Democracy</span></a><span data-dcnode-id="4083" instrument_node="">, both of which were built around, and led by members of, the British </span><a data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="4082" instrument_node="">Conservative Party</span></a><span data-dcnode-id="4080" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UKIP" title="UKIP"><span data-dcnode-id="4079" instrument_node="">UKIP</span></a><span data-dcnode-id="4077" instrument_node="">. The </span><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Alliance_of_Socialists_and_Democrats" title="Progressive Alliance of Socialists and Democrats"><span data-dcnode-id="4076" instrument_node="">Progressive Alliance of Socialists and Democrats</span></a><span data-dcnode-id="4074" instrument_node=""> also lost its members from the UK's </span><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="4073" instrument_node="">Labour Party</span></a><span data-dcnode-id="4071" instrument_node="">, but on the whole would be left strengthened by the greater loss to the right, and thus able to form majorities without seeking support from the (conservative) </span><a data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_People%2527s_Party" title="European People's Party"><span data-dcnode-id="4070" instrument_node="">European People's Party</span></a><span data-dcnode-id="4068" instrument_node="">. This may lead to a Parliament which may:</span><sup class="reference" data-dcnode-id="4065" id="cite_ref-UCL_7-2"><a data-dcnode-id="4066" href="#cite_note-UCL-7"><span data-dcnode-id="4067" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4064" instrument_node="">
</span></p><span data-dcnode-id="4062" instrument_node="">
</span><ul data-dcnode-id="4029"><li data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">be more willing to pass extra regulations;</span></li><span data-dcnode-id="4059" instrument_node="">
</span><li data-dcnode-id="4054"><span data-dcnode-id="4058" instrument_node="">have less support for strong </span><a class="mw-redirect" data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copyright_protection" title="Copyright protection"><span data-dcnode-id="4057" instrument_node="">copyright protection</span></a><span data-dcnode-id="4055" instrument_node="">;</span></li><span data-dcnode-id="4053" instrument_node="">
</span><li data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">pass a smaller budget, but with increased member-state contributions;</span></li><span data-dcnode-id="4050" instrument_node="">
</span><li data-dcnode-id="4042"><span data-dcnode-id="4049" instrument_node="">support </span><a class="mw-redirect" data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_harmonisation" title="Tax harmonisation"><span data-dcnode-id="4048" instrument_node="">tax harmonisation</span></a><span data-dcnode-id="4046" instrument_node=""> and a </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_transaction_tax" title="Financial transaction tax"><span data-dcnode-id="4045" instrument_node="">financial transaction tax</span></a><span data-dcnode-id="4043" instrument_node=""> (taxation is outwith current treaties);</span></li><span data-dcnode-id="4041" instrument_node="">
</span><li data-dcnode-id="4030"><span data-dcnode-id="4040" instrument_node="">give less support to </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power" title="Nuclear power"><span data-dcnode-id="4039" instrument_node="">nuclear energy</span></a><span data-dcnode-id="4037" instrument_node=""> and </span><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shale_gas" title="Shale gas"><span data-dcnode-id="4036" instrument_node="">shale gas</span></a><span data-dcnode-id="4034" instrument_node=""> in favour of </span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renewable_energy" title="Renewable energy"><span data-dcnode-id="4033" instrument_node="">renewable energy</span></a><span data-dcnode-id="4031" instrument_node=""> sources.</span></li></ul><span data-dcnode-id="4028" instrument_node="">
</span><h3 data-dcnode-id="4018"><span class="mw-headline" data-dcnode-id="4026" id="Defence_and_foreign_affairs"><span data-dcnode-id="4027" instrument_node="">Defence and foreign affairs</span></span><span class="mw-editsection" data-dcnode-id="4019"><span class="mw-editsection-bracket" data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">[</span></span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D6" title="Edit section: Defence and foreign affairs"><span data-dcnode-id="4023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4017" instrument_node="">
</span><p data-dcnode-id="4007"><span data-dcnode-id="4016" instrument_node="">The UK was a key asset for the EU in the fields of foreign affairs and defence given that the UK was (with France) one of the EU's two major military powers, and had significant intelligence capabilities, soft power and a far reaching diplomatic network. Without the UK, EU foreign policy could be less influential.</span><sup class="reference" data-dcnode-id="4013" id="cite_ref-UCL_7-3"><a data-dcnode-id="4014" href="#cite_note-UCL-7"><span data-dcnode-id="4015" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4012" instrument_node=""> The US saw the UK as a bridge between the US and Europe, and the UK helped align the EU positions to the US and provide tougher policy towards Russia.</span><sup class="reference" data-dcnode-id="4009" id="cite_ref-CER_8-1"><a data-dcnode-id="4010" href="#cite_note-CER-8"><span data-dcnode-id="4011" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4008" instrument_node="">
</span></p><p data-dcnode-id="3970"><span data-dcnode-id="4006" instrument_node="">However, Brexit also produced new opportunities for the </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Security_and_Defence_Policy" title="Common Security and Defence Policy"><span data-dcnode-id="4005" instrument_node="">European defence cooperation</span></a><span data-dcnode-id="4003" instrument_node="">, as the UK consistently vetoed moves in this direction, arguing it would undermine </span><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="4002" instrument_node="">NATO</span></a><span data-dcnode-id="4000" instrument_node="">. It attempted to do so again&nbsp;–  even after its withdrawal referendum, in relation to the establishment of a </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_Planning_and_Conduct_Capability" title="Military Planning and Conduct Capability"><span data-dcnode-id="3999" instrument_node="">military HQ</span></a><span data-dcnode-id="3997" instrument_node="">.</span><sup class="reference" data-dcnode-id="3994" id="cite_ref-vetoarmy_9-0"><a data-dcnode-id="3995" href="#cite_note-vetoarmy-9"><span data-dcnode-id="3996" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3993" instrument_node=""> With the UK's withdrawal and a feeling that the US under </span><a class="mw-redirect" data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_J._Trump" title="Donald J. Trump"><span data-dcnode-id="3992" instrument_node="">Donald J. Trump</span></a><span data-dcnode-id="3990" instrument_node=""> may not honour NATO commitments, the </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Council" title="European Council"><span data-dcnode-id="3989" instrument_node="">European Council</span></a><span data-dcnode-id="3987" instrument_node=""> has put defence cooperation as a major project in its [post-Brexit vote] Bratislava and Rome declarations and moved forward with setting up a </span><a data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Defence_Fund" title="European Defence Fund"><span data-dcnode-id="3986" instrument_node="">European Defence Fund</span></a><span data-dcnode-id="3984" instrument_node=""> and activating </span><a data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Permanent_Structured_Cooperation" title="Permanent Structured Cooperation"><span data-dcnode-id="3983" instrument_node="">Permanent Structured Cooperation</span></a><span data-dcnode-id="3981" instrument_node=""> (a defence clause in the </span><a class="mw-redirect" data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lisbon_Treaty" title="Lisbon Treaty"><span data-dcnode-id="3980" instrument_node="">Lisbon Treaty</span></a><span data-dcnode-id="3978" instrument_node="">).</span><sup class="reference" data-dcnode-id="3975" id="cite_ref-sleeping_beauty_10-0"><a data-dcnode-id="3976" href="#cite_note-sleeping_beauty-10"><span data-dcnode-id="3977" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="3972" id="cite_ref-merkel_rally_11-0"><a data-dcnode-id="3973" href="#cite_note-merkel_rally-11"><span data-dcnode-id="3974" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3971" instrument_node="">
</span></p><span data-dcnode-id="3969" instrument_node="">
</span><h3 data-dcnode-id="3959"><span class="mw-headline" data-dcnode-id="3967" id="Freedom_of_movement"><span data-dcnode-id="3968" instrument_node="">Freedom of movement</span></span><span class="mw-editsection" data-dcnode-id="3960"><span class="mw-editsection-bracket" data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">[</span></span><a data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D7" title="Edit section: Freedom of movement"><span data-dcnode-id="3964" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3937"><a class="mw-redirect" data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_movement_for_workers" title="Freedom of movement for workers"><span data-dcnode-id="3957" instrument_node="">Freedom of movement for workers</span></a><span data-dcnode-id="3955" instrument_node=""> is an integral part of EU policy and is a foundation of European Union ideals. In addition, the </span><a class="mw-redirect" data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schengen_agreement" title="Schengen agreement"><span data-dcnode-id="3954" instrument_node="">Schengen agreement</span></a><span data-dcnode-id="3952" instrument_node=""> removes the necessity for passports and visas for travel within the </span><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schengen_Area" title="Schengen Area"><span data-dcnode-id="3951" instrument_node="">Schengen Area</span></a><span data-dcnode-id="3949" instrument_node="">, thus allowing the </span><a class="mw-redirect" data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_borders" title="Open borders"><span data-dcnode-id="3948" instrument_node="">free movement of people</span></a><span data-dcnode-id="3946" instrument_node="">.</span><sup class="reference" data-dcnode-id="3943" id="cite_ref-12"><a data-dcnode-id="3944" href="#cite_note-12"><span data-dcnode-id="3945" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3942" instrument_node=""> This concept is designed to benefit the various member states' economy and society by allowing for business to thrive in Europe and also for the EU to be more culturally interconnected.</span><sup class="reference" data-dcnode-id="3939" id="cite_ref-13"><a data-dcnode-id="3940" href="#cite_note-13"><span data-dcnode-id="3941" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3938" instrument_node=""> (Visitors from outside the Area are subject to the usual passport and visa controls at the external border of any Area member state. Not all members of the EU are members of Schengen, and not all members of Schengen are members of the EU).
</span></p><span data-dcnode-id="3936" instrument_node="">
</span><h3 data-dcnode-id="3926"><span class="mw-headline" data-dcnode-id="3934" id="Eurozone"><span data-dcnode-id="3935" instrument_node="">Eurozone</span></span><span class="mw-editsection" data-dcnode-id="3927"><span class="mw-editsection-bracket" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">[</span></span><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImpact_of_Brexit_on_the_European_Union%26action%3Dedit%26section%3D8" title="Edit section: Eurozone"><span data-dcnode-id="3931" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3925" instrument_node="">
</span><div class="PieChartTemplate thumb tright" data-dcnode-id="3882"><div class="thumbinner" data-dcnode-id="3883" style="width:202px"><span data-dcnode-id="3924" instrument_node="">
</span><div data-dcnode-id="3912" style="background-color:white;margin:auto;position:relative;width:200px;height:200px;overflow:hidden;border-radius:100px;border:1px solid black"><span data-dcnode-id="3923" instrument_node="">
</span><div data-dcnode-id="3922" style="border:solid transparent;position:absolute;width:100px;line-height:0;left:0; top:0; border-width:0 200px 200px 0; border-color:red"></div><div data-dcnode-id="3921" style="border:solid transparent;position:absolute;width:100px;line-height:0;left:100px; top:100px; border-width:100px 0 0 71.69861740979px; border-left-color:green"></div><span data-dcnode-id="3920" instrument_node="">
</span><div data-dcnode-id="3919" style="position:absolute;line-height:0;border-style:solid;left:0;top:0;border-width:0 200px 100px 0;border-color:green"></div><span data-dcnode-id="3918" instrument_node="">
</span><div data-dcnode-id="3917" style="position:absolute;line-height:0;border-style:solid;left:0;top:0;border-width:0 100px 200px 0;border-color:green"></div><div data-dcnode-id="3916" style="border:solid transparent;position:absolute;width:100px;line-height:0;right:100px; top:100px; border-width:99.130763106951px 13.156435909228px 0 0; border-top-color:blue"></div><span data-dcnode-id="3915" instrument_node="">
</span><div data-dcnode-id="3914" style="position:absolute;line-height:0;border-style:solid;left:0;top:0;border-width:0 200px 100px 0;border-color:blue"></div><span data-dcnode-id="3913" instrument_node="">
