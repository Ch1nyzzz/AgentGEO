</span><h3 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Case Study: Minority Ethnic People </span></h3><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="912" instrument_node="">Minority ethnic groups make up 4% of Scotland's population.</span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">[394]</span></sup></a><span data-dcnode-id="908" instrument_node=""> According to several charities, Brexit is likely to have a negative impact on minority ethnic communities – in particular, their household incomes, spending power, career prospects and legal rights.</span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">[395]</span></sup></a><span data-dcnode-id="904" instrument_node=""> Furthermore, since the </span><acronym data-dcnode-id="902" title="European Union"><span data-dcnode-id="903" instrument_node="">EU</span></acronym><span data-dcnode-id="901" instrument_node=""> referendum in June 2016, there has been evidence of rising levels of racism, xenophobia and intolerance. Though, as indicated earlier, the marked rise in recorded hate crime since the 2016 </span><acronym data-dcnode-id="899" title="European Union"><span data-dcnode-id="900" instrument_node="">EU</span></acronym><span data-dcnode-id="898" instrument_node=""> referendum in England and Wales has not been reported in Scotland or Northern Ireland. However, the </span><acronym data-dcnode-id="896" title="United Nations"><span data-dcnode-id="897" instrument_node="">UN</span></acronym><span data-dcnode-id="895" instrument_node=""> Special Rapporteur on Racism has identified a Brexit-related growth in "explicit racial, ethnic and religious intolerance" and a stark increase in hate crimes across the </span><acronym data-dcnode-id="893" title="United Kingdom"><span data-dcnode-id="894" instrument_node="">UK</span></acronym><span data-dcnode-id="892" instrument_node=""> since the referendum.</span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">[396]</span></sup></a><span data-dcnode-id="888" instrument_node=""> A nationwide survey by Opinium in May 2019 reveals that 71% of people from ethnic minorities have experienced racial discrimination (an increase from 58% in January 2016) and that online racism has doubled since 2016.</span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">[397]</span></sup></a></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="882" instrument_node="">However, despite these real and potential impacts of Brexit on minority ethnic people, the Runnymede Trust has complained that "Britain's ethnic minorities have not featured much in the Brexit debate."</span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">[398]</span></sup></a><span data-dcnode-id="878" instrument_node=""> Minority ethnic organisations, such as Race on the Agenda, argue that "their voice and concerns have been missing from both the Brexit campaign and negotiations" and consultations or impact assessments have been lacking.</span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">[399]</span></sup></a></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="872" instrument_node="">The Runnymede Trust also analysed the implications of the </span><acronym data-dcnode-id="870" title="United Kingdom"><span data-dcnode-id="871" instrument_node="">UK</span></acronym><span data-dcnode-id="869" instrument_node=""> Government's earlier Withdrawal Agreement (October 2019) for ethnic minorities. The deputy director of the trust argues that the deal 'harms' ethnic minorities by weakening equalities protections and worker's rights, and any negative economic impact of the proposed deal, which could reduce income per capita by 2.5%, would hit ethnic minorities, women and other people on lower and insecure incomes hardest, as they are "less able to buffer reductions in income.</span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">[400]</span></sup></a><span data-dcnode-id="865" instrument_node=""> </span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">The potential impacts of Brexit on minority ethnic people (both the legal and the socio-economic impacts) are summarised in the infographic below:</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><img alt="summary of potential impacts of Brexit on black and minority ethnic people, both legal and socio-economic  " data-dcnode-id="859" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/binaries/content/gallery/publications/research-analysis/2020/01/social-equality-impacts-brexit/SCT12197154401_g09.gif&amp;raw" title="summary of potential impacts of Brexit on black and minority ethnic people, both legal and socio-economic  "></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="854"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Minority Ethnic communities: Legal Rights</span></strong></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="852" instrument_node="">People from a minority ethnic background currently enjoy – along with other equalities groups – extensive rights and protections under </span><acronym data-dcnode-id="850" title="European Union"><span data-dcnode-id="851" instrument_node="">EU</span></acronym><span data-dcnode-id="849" instrument_node=""> legislation. </span><acronym data-dcnode-id="847" title="European Union"><span data-dcnode-id="848" instrument_node="">EU</span></acronym><span data-dcnode-id="846" instrument_node=""> employment legislation that protects individuals from discrimination is especially important to minority ethnic communities, given their experiences of structural discrimination in the workplace. However, while the bulk of </span><acronym data-dcnode-id="844" title="European Union"><span data-dcnode-id="845" instrument_node="">EU</span></acronym><span data-dcnode-id="843" instrument_node=""> equalities laws are embedded in primary legislation in the </span><acronym data-dcnode-id="841" title="United Kingdom"><span data-dcnode-id="842" instrument_node="">UK</span></acronym><span data-dcnode-id="840" instrument_node=""> – through the Equality Act – and will continue to offer protections to minority groups after the </span><acronym data-dcnode-id="838" title="United Kingdom"><span data-dcnode-id="839" instrument_node="">UK</span></acronym><span data-dcnode-id="837" instrument_node=""> leaves the </span><acronym data-dcnode-id="835" title="European Union"><span data-dcnode-id="836" instrument_node="">EU</span></acronym><span data-dcnode-id="834" instrument_node="">, a number of </span><acronym data-dcnode-id="832" title="European Union"><span data-dcnode-id="833" instrument_node="">EU</span></acronym><span data-dcnode-id="831" instrument_node=""> rights and protections are spread among secondary legislation, regulations and </span><acronym data-dcnode-id="829" title="Court of Justice of the European Union"><span data-dcnode-id="830" instrument_node="">CJEU</span></acronym><span data-dcnode-id="828" instrument_node=""> case law, which are more vulnerable to being repealed post-Brexit.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="825" instrument_node="">For instance, </span><acronym data-dcnode-id="823" title="European Union"><span data-dcnode-id="824" instrument_node="">EU</span></acronym><span data-dcnode-id="822" instrument_node=""> secondary legislation that is important to people from a minority ethnic background include flexible workers' provisions, including the Part-time Workers' Directive and the Agency Worker's Directive, which protect the rights of people on part-time, agency or zero-hours contracts. (Alongside women, people from minority ethnic communities are more likely to be on part-time, temporary or zero-hours contracts</span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">[401]</span></sup></a><span data-dcnode-id="818" instrument_node="">). There is a concern that, without the binding force of </span><acronym data-dcnode-id="816" title="European Union"><span data-dcnode-id="817" instrument_node="">EU</span></acronym><span data-dcnode-id="815" instrument_node=""> law – provided through the European Charter of Fundamental Rights and overseen by the </span><acronym data-dcnode-id="813" title="Court of Justice of the European Union"><span data-dcnode-id="814" instrument_node="">CJEU</span></acronym><span data-dcnode-id="812" instrument_node=""> – a it may be possible that these protections could be amended and retracted after Brexit, given the antipathy of some </span><acronym data-dcnode-id="810" title="United Kingdom"><span data-dcnode-id="811" instrument_node="">UK</span></acronym><span data-dcnode-id="809" instrument_node=""> officials to such Directives.</span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">[402]</span></sup></a></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The charity Race on the Agenda is particularly concerned that legislation protecting people with protected characteristics from workplace discrimination could be rolled back after Brexit. This would be especially concerning to people from a minority ethnic background, as:</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="800" instrument_node="">"</span><acronym data-dcnode-id="798" title="Black, Asian, Minority Ethnic"><span data-dcnode-id="799" instrument_node="">BAME</span></acronym><span data-dcnode-id="797" instrument_node=""> [Black, Asian and Minority Ethnic] Britons already face widespread discrimination and institutionalised racism in the work place. Without the protection of legislation, the situation could become significantly worse."</span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">[403]</span></sup></a><span data-dcnode-id="793" instrument_node=""> </span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">The rights of minority ethnic people with other equalities characteristics – such as minority ethnic women and disabled minority ethnic people – could also lose other </span><acronym data-dcnode-id="788" title="European Union"><span data-dcnode-id="789" instrument_node="">EU</span></acronym><span data-dcnode-id="787" instrument_node=""> protections, as discussed above. The reduction of any workplace protections for minority ethnic communities could further exacerbate issues of employment security, poverty and financial insecurity, as we will discuss below.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="782"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Minority Ethnic communities: Public Services and Funding</span></strong></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">People from minority ethnic backgrounds are amongst the highest users of public services and would therefore be disproportionately affected by any post-Brexit cuts to public spending.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="777" instrument_node="">"</span><acronym data-dcnode-id="775" title="Black, Asian, Minority Ethnic"><span data-dcnode-id="776" instrument_node="">BAME</span></acronym><span data-dcnode-id="774" instrument_node=""> [Black, Asian and Minority Ethnic] people are more likely to earn less, own fewer assets and have lower household resources… it is local authorities in the most deprived areas, where </span><acronym data-dcnode-id="772" title="Black, Asian, Minority Ethnic"><span data-dcnode-id="773" instrument_node="">BAME</span></acronym><span data-dcnode-id="771" instrument_node=""> people are more likely to live, that have suffered the greatest cuts to spending."</span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">[404]</span></sup></a></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">As discussed earlier, several economic forecasts predict a fall in </span><acronym data-dcnode-id="763" title="Gross Domestic Product"><span data-dcnode-id="764" instrument_node="">GDP</span></acronym><span data-dcnode-id="762" instrument_node=""> and an economic downturn following Brexit (which could be exacerbated under a no-trade deal Brexit scenario), which could lead to reductions in government spending. If this happens, minority ethnic people – who are disproportionately reliant on public services – including schools, hospitals, transport and education – will be negatively affected.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="759" instrument_node="">In addition to being amongst the highest users of public health and social services</span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">[405]</span></sup></a><span data-dcnode-id="755" instrument_node="">, people from a minority ethnic background are also more likely to work in these areas.</span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">[406]</span></sup></a><span data-dcnode-id="751" instrument_node=""> For instance, minority ethnic people have a high representation in healthcare, education, and social care services.</span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">[407]</span></sup></a><span data-dcnode-id="747" instrument_node=""> Minority ethnic people are therefore more vulnerable to any job losses in these sectors.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="744" instrument_node="">Minority ethnic communities are also likely to lose out from the </span><acronym data-dcnode-id="742" title="United Kingdom"><span data-dcnode-id="743" instrument_node="">UK</span></acronym><span data-dcnode-id="741" instrument_node="">'s withdrawal from the European Structural and Investment Funds (</span><acronym data-dcnode-id="739" title="European Structural and Investment Fund"><span data-dcnode-id="740" instrument_node="">ESIF</span></acronym><span data-dcnode-id="738" instrument_node="">) programme. Minority ethnic people are included as a specific target group for funding, especially under the </span><acronym data-dcnode-id="736" title="European Social Fund"><span data-dcnode-id="737" instrument_node="">ESF</span></acronym><span data-dcnode-id="735" instrument_node=""> rules</span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">[408]</span></sup></a><span data-dcnode-id="731" instrument_node="">, and </span><acronym data-dcnode-id="729" title="European Structural and Investment Fund"><span data-dcnode-id="730" instrument_node="">ESIF</span></acronym><span data-dcnode-id="728" instrument_node=""> support for minority ethnic organisations has led to the creation of "inventions and infrastructure that supported </span><acronym data-dcnode-id="726" title="Black, Asian, Minority Ethnic"><span data-dcnode-id="727" instrument_node="">BAME</span></acronym><span data-dcnode-id="725" instrument_node=""> men and women to get work, helped families make ends meet, protected those who were suffering from domestic violence, and provided young people with supplementary education and training."</span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">[409]</span></sup></a><span data-dcnode-id="721" instrument_node=""> It is currently uncertain if the </span><acronym data-dcnode-id="719" title="United Kingdom"><span data-dcnode-id="720" instrument_node="">UK</span></acronym><span data-dcnode-id="718" instrument_node=""> Government's proposed Shared Prosperity Fund would match the same level of funding to organisations to support the social inclusion of minority ethnic communities, owing to a lack of detail about the operation of the proposed fund.</span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">[410]</span></sup></a><span data-dcnode-id="714" instrument_node=""> </span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="709"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Minority Ethnic communities: Employment, Housing and Spending</span></strong></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">It is possible that Brexit could have an adverse impact on the employment, housing situation and consumer spending power of minority ethnic people.</span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">[411]</span></sup></a></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="701" instrument_node="">According to the Deputy Director of the Runnymede Trust, a large number of minority ethnic individuals and families are "in low paid and insecure work, spend a greater proportion of income on rent and have very little disposable income for food."</span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">[412]</span></sup></a><span data-dcnode-id="697" instrument_node=""> Research by the Trades Union Congress and Resolution Foundation has found that black men and women are more likely to be in precarious employment than white people, including agency and seasonal work.</span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">[413]</span></sup></a><span data-dcnode-id="693" instrument_node=""> Furthermore, people from Black, Asian and Minority Ethnic (</span><acronym data-dcnode-id="691" title="Black, Asian, Minority Ethnic"><span data-dcnode-id="692" instrument_node="">BAME</span></acronym><span data-dcnode-id="690" instrument_node="">) backgrounds are twice as likely to be unemployed than white people in the </span><acronym data-dcnode-id="688" title="United Kingdom"><span data-dcnode-id="689" instrument_node="">UK</span></acronym><span data-dcnode-id="687" instrument_node=""> (as the chart below shows). These factors make the welfare and living standards of minority ethnic communities far more susceptible to any economic downturn or austerity measures.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><img alt="Unemployment rate by ethnic background: UK, 2008-19" data-dcnode-id="684" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/binaries/content/gallery/publications/research-analysis/2020/01/social-equality-impacts-brexit/SCT12197154401_g10.gif&amp;raw" title="Unemployment rate by ethnic background: UK, 2008-19"></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="681" instrument_node="">Research has also revealed that minority ethnic workers are clustered in particular industries and sectors, which may be vulnerable to Brexit due to their reliance on </span><acronym data-dcnode-id="679" title="European Union"><span data-dcnode-id="680" instrument_node="">EU</span></acronym><span data-dcnode-id="678" instrument_node=""> trade. These include the clothing industry, the health and social work sector, and plant and machine operators. For instance, Pakistani and Bangladeshi people are most likely to work in distribution, hotels and restaurants.</span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">[414]</span></sup></a><span data-dcnode-id="674" instrument_node=""> Pakistani and Bangladeshi men are furthermore twice as likely as white British men to work as plant and machine operators, which are vulnerable to Brexit job losses, "and are less likely to have skills which are transferable to other sectors."</span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">[415]</span></sup></a><span data-dcnode-id="670" instrument_node=""> </span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="667" instrument_node="">Black people are more likely to work in the public sector, especially black women.</span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">[416]</span></sup></a><span data-dcnode-id="663" instrument_node=""> This makes them more vulnerable to any cuts in the public sector that may lead to job losses. There is also a predominance of women, especially Black African and Caribbean women, working in health and social work, which "has made them more vulnerable to being engaged on zero-hours contracts and in other forms of temporary work, with such arrangements common in this industry grouping."</span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">[417]</span></sup></a><span data-dcnode-id="659" instrument_node=""> Across these sectors, minority ethnic women predominate in lower-paid/lower-skilled occupations and are under-represented in senior management.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="656" instrument_node="">A recent study revealed that a majority of minority ethnic people fear that Brexit will have a negative impact on their career progression.</span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">[418]</span></sup></a><span data-dcnode-id="652" instrument_node=""> The research, which surveyed over 2000 adults across the </span><acronym data-dcnode-id="650" title="United Kingdom"><span data-dcnode-id="651" instrument_node="">UK</span></acronym><span data-dcnode-id="649" instrument_node="">, was commissioned by the Equality Group. It found that over half (52%) of minority ethnic respondents believe that Brexit will negatively impact their career progression, compared to 16% of non-minority ethnic respondents. Furthermore, the study found that 62% of minority ethnic respondents are concerned about the impact of Brexit on professional and societal culture, compared to 35% of non-minority ethnic respondents.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="646" instrument_node="">These concerns reflect a climate of increased racism and xenophobia in the </span><acronym data-dcnode-id="644" title="United Kingdom"><span data-dcnode-id="645" instrument_node="">UK</span></acronym><span data-dcnode-id="643" instrument_node="">, where there are increased tensions surrounding the notion of 'Britishness' and who is considered to belong to this identity in the wake of Brexit. Increased racism is unlikely to help the job prospects of minority ethnic people, who already experience historical structural discrimination in the workplace, and it will likely lead to further discrimination against minority ethnic communities. The Head of Diversity and Inclusion at the House of Commons has, for instance, has been reported as stating that the bullying and harassment of minority ethnic people in the workforce has increased by 23% since the </span><acronym data-dcnode-id="641" title="European Union"><span data-dcnode-id="642" instrument_node="">EU</span></acronym><span data-dcnode-id="640" instrument_node=""> referendum in 2016, as a direct result of the Leave vote.</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">[419]</span></sup></a></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="634" instrument_node="">Brexit-related discrimination against minority ethnic people is already happening to some extent under the </span><acronym data-dcnode-id="632" title="United Kingdom"><span data-dcnode-id="633" instrument_node="">UK</span></acronym><span data-dcnode-id="631" instrument_node="">'s increasingly restrictive immigration regime. Some evidence suggests that under recent changes to immigration measures in the </span><acronym data-dcnode-id="629" title="United Kingdom"><span data-dcnode-id="630" instrument_node="">UK</span></acronym><span data-dcnode-id="628" instrument_node="">, landlords have been racially discriminating against minority ethnic Britons through the 'Right to Rent' scheme. This law requires landlords to check the immigration status of potential tenants, and it was found that landlords had been discriminating against minority ethnic Britons and foreign-born residents, in contravention to equalities and human rights legislation that protects people from discrimination.</span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">[420]</span></sup></a></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="616"><acronym data-dcnode-id="621" title="European Union"><span data-dcnode-id="622" instrument_node="">EU</span></acronym><span data-dcnode-id="620" instrument_node=""> nationals of colour face additional potential forms of discrimination, as they experience the "further challenge of looking visibly different. As a result, they are more likely to be asked for identification to access employment, housing and healthcare."</span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">[421]</span></sup></a></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="614" instrument_node="">Minority ethnic people are also more vulnerable to any restrictions to housing availability following a potential post-Brexit economic downturn. The Race Disparity Audit revealed that minority ethnic groups are less likely to own their homes, and more likely to rent social housing, than average.</span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">[422]</span></sup></a><span data-dcnode-id="610" instrument_node=""> Furthermore, the study found that overcrowding disproportionately affects minority ethnic households, and the number of minority ethnic households registering as homeless has increased.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="607" instrument_node="">Finally, any economic downturn resulting from Brexit is likely to impact the socioeconomic position, spending power and wellbeing of minority ethnic people. As we discussed earlier, minority ethnic people are likely to be lower-paid, have less disposable income, and spend more of their income on daily essentials than non-minority ethnic people. Furthermore, they are more likely to receive 'top-ups' to their wages from Working Tax Credits and help with housing costs.</span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">[423]</span></sup></a><span data-dcnode-id="603" instrument_node=""> Any rise in food and energy prices, cuts to benefits and public services, and restriction to flexible employment protections, are therefore likely to have a disproportionately negative effect on minority ethnic people. </span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Minority Ethnic communities: Resilience</span></strong></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">Minority ethnic people are represented by a dispersed network of groups in Scotland/the </span><acronym data-dcnode-id="594" title="United Kingdom"><span data-dcnode-id="595" instrument_node="">UK</span></acronym><span data-dcnode-id="593" instrument_node="">. Some of these groups have been active in developing research, analysis and recommendations for how to mitigate potential adverse effects of Brexit on minority ethnic communities. In particular, the Runnymede Trust has made important contributions to the Brexit debate as a vocal advocate of the rights of minority ethnic communities, the charity Race on the Agenda have produced an important analysis on Brexit impacts, and the Institute of Race Relations have been tracking increases in racism and hate crimes against minority ethnic communities since Brexit. As the category 'minority ethnic' tends to comprise a number of different groups – such as black, Muslim, migrant, refugee, Gypsy/Traveller and visible minorities – there is more of a challenge to capture diverse voices and potential impacts. This is aided by the activities of organisations that focus on particular minority ethnic groups, such as the Muslim Council of Scotland, the Scottish Refugee Council and Sikh Sanjog, for instance.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="590" instrument_node="">In the </span><acronym data-dcnode-id="588" title="United Kingdom"><span data-dcnode-id="589" instrument_node="">UK</span></acronym><span data-dcnode-id="587" instrument_node=""> Parliament, 10% of </span><acronym data-dcnode-id="585" title="Member of Parliament"><span data-dcnode-id="586" instrument_node="">MP</span></acronym><span data-dcnode-id="584" instrument_node="">s are from non-white ethnic backgrounds (since December 2019) and they make up 5.8% of the members of the House of Lords, while minority ethnic people comprise 13.8% of the </span><acronym data-dcnode-id="582" title="United Kingdom"><span data-dcnode-id="583" instrument_node="">UK</span></acronym><span data-dcnode-id="581" instrument_node=""> population.</span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">[424]</span></sup></a><span data-dcnode-id="577" instrument_node=""> No Scottish </span><acronym data-dcnode-id="575" title="Member of Parliament"><span data-dcnode-id="576" instrument_node="">MP</span></acronym><span data-dcnode-id="574" instrument_node="">s are from minority ethnic backgrounds. In the Scottish Parliament, two </span><acronym data-dcnode-id="572" title="Member of the Scottish Parliament"><span data-dcnode-id="573" instrument_node="">MSP</span></acronym><span data-dcnode-id="571" instrument_node="">s (1.6% of all </span><acronym data-dcnode-id="569" title="Member of the Scottish Parliament"><span data-dcnode-id="570" instrument_node="">MSP</span></acronym><span data-dcnode-id="568" instrument_node="">s) are from minority ethnic backgrounds, while minority ethnic people make up 4% of the Scottish population.</span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">[425]</span></sup></a><span data-dcnode-id="564" instrument_node=""> </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="561" instrument_node="">Minority ethnic organisations also provide important sources of information and support to minority ethnic groups, including legal advice and representation,</span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">[426]</span></sup></a><span data-dcnode-id="557" instrument_node=""> employability support,</span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">[427]</span></sup></a><span data-dcnode-id="553" instrument_node=""> advice on moving towards and into work,</span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">[428]</span></sup></a><span data-dcnode-id="549" instrument_node=""> and mental health and wellbeing support for minority ethnic women and girls.</span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">[429]</span></sup></a><span data-dcnode-id="545" instrument_node=""> Minority ethnic groups in Scotland including </span><acronym data-dcnode-id="543" title="Black and Ethnic Minority Infrastructure in Scotland"><span data-dcnode-id="544" instrument_node="">BEMIS</span></acronym><span data-dcnode-id="542" instrument_node=""> – national umbrella body supporting the development of the ethnic minorities voluntary sector in Scotland, </span><acronym data-dcnode-id="540" title="Council of Ethnic Minority Voluntary Sector Organisations"><span data-dcnode-id="541" instrument_node="">CEMVO</span></acronym><span data-dcnode-id="539" instrument_node=""> Scotland, Saheliya, Amina </span><acronym data-dcnode-id="537" title="Muslim Women's Resource Centre"><span data-dcnode-id="538" instrument_node="">WMRC</span></acronym><span data-dcnode-id="536" instrument_node="">, Ethnic Minorities Law Centre, Amina, Shakti Women's Aid, Andescot, and </span><acronym data-dcnode-id="534" title="REACH Community Health Project, Glasgow"><span data-dcnode-id="535" instrument_node="">REACH</span></acronym><span data-dcnode-id="533" instrument_node=""> Community Health Project.</span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">[430]</span></sup></a></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">There are also generic advice services available to everyone, including minority ethnic people, for instance on debt management, social security benefits and legal rights and protections. These vital publicly funded advice services are offered by local councils, statutory bodies such as the Scottish Legal Aid Board (</span><acronym data-dcnode-id="525" title="Scottish Legal Aid Board"><span data-dcnode-id="526" instrument_node="">SLAB</span></acronym><span data-dcnode-id="524" instrument_node="">), and third-sector providers, such as the network of Citizens Advice Bureaux.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">However, the extent to which minority ethnic people are connected to these groups, able to access support networks, or are resilient to the impact of Brexit, is mixed. While some minority ethnic people are active in community networks and engaged in/aware of political campaigns, those minority ethnic communities who lack literacy, economic resources and time to dedicate to self-education – in particular, people on precarious employment contracts, single mothers, refugees and asylum seekers – may not have the resources to access this support/information.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="518" instrument_node="">Out of the three case studies analysed, people from minority ethnic communities are less likely to be financially resilient to any adverse economic impacts of Brexit. This is because, out of all ethnic groups in the </span><acronym data-dcnode-id="516" title="United Kingdom"><span data-dcnode-id="517" instrument_node="">UK</span></acronym><span data-dcnode-id="515" instrument_node="">, people from Asian, Black or other non-white ethnic groups were most likely to be in persistent low-income positions.</span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">[431]</span></sup></a><span data-dcnode-id="511" instrument_node=""> We can also assume that minority ethnic people facing multiple disadvantages – for instance, women, people on precarious employment contracts, migrants, and disabled people from minority ethnic backgrounds – will face multiple legal and economic impacts of Brexit, reducing their overall resilience to these.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="506"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Impacts under different Brexit scenarios</span></strong></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="504" instrument_node="">The following table provides a general indication of which of the impacts on minority ethnic people analysed in this section are most likely to occur under each of the Brexit scenarios discussed in the report – a hard Brexit (withdrawal under the terms of the Withdrawal Agreement and Political Declaration, with no binding commitment to comprehensive level playing-field provisions), a softer Brexit (</span><acronym data-dcnode-id="502" title="United Kingdom"><span data-dcnode-id="503" instrument_node="">UK</span></acronym><span data-dcnode-id="501" instrument_node="">-</span><acronym data-dcnode-id="499" title="European Union"><span data-dcnode-id="500" instrument_node="">EU</span></acronym><span data-dcnode-id="498" instrument_node=""> negotiations to include strengthened level playing-field commitments and closer alignment with </span><acronym data-dcnode-id="496" title="European Union"><span data-dcnode-id="497" instrument_node="">EU</span></acronym><span data-dcnode-id="495" instrument_node=""> law) and a no-trade deal Brexit (the </span><acronym data-dcnode-id="493" title="United Kingdom"><span data-dcnode-id="494" instrument_node="">UK</span></acronym><span data-dcnode-id="492" instrument_node=""> fails to obtain an </span><acronym data-dcnode-id="490" title="European Union"><span data-dcnode-id="491" instrument_node="">EU</span></acronym><span data-dcnode-id="489" instrument_node=""> trade deal and reverts back to trading on </span><acronym data-dcnode-id="487" title="World Trade Organisation"><span data-dcnode-id="488" instrument_node="">WTO</span></acronym><span data-dcnode-id="486" instrument_node=""> rules). </span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><img alt="Impact on ethnic minority people of the three Brexit scenarios discussed in the report – hard Brexit, softer Brexit and No trade deal" data-dcnode-id="483" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/binaries/content/gallery/publications/research-analysis/2020/01/social-equality-impacts-brexit/SCT12197154401_g11.gif&amp;raw" title="Impact on ethnic minority people of the three Brexit scenarios discussed in the report – hard Brexit, softer Brexit and No trade deal"></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="480" instrument_node="">* 'higher risk' implies that there is a higher risk that this impact is likely to happen compared to the status quo of the </span><acronym data-dcnode-id="478" title="United Kingdom"><span data-dcnode-id="479" instrument_node="">UK</span></acronym><span data-dcnode-id="477" instrument_node=""> being a full member of the </span><acronym data-dcnode-id="475" title="European Union"><span data-dcnode-id="476" instrument_node="">EU</span></acronym><span data-dcnode-id="474" instrument_node="">, given the </span><acronym data-dcnode-id="472" title="United Kingdom"><span data-dcnode-id="473" instrument_node="">UK</span></acronym><span data-dcnode-id="471" instrument_node=""> Government's economic forecasts</span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">[432]</span></sup></a></p><span data-dcnode-id="466" instrument_node="">
</span><span data-dcnode-id="464" instrument_node=""> </span></div><span data-dcnode-id="462" instrument_node="">
