</span><span data-dcnode-id="601" instrument_node="">
</span><h3 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Conclusion</span></h3><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">This report has examined 137 potential social and equalities impacts resulting from Brexit. While there is still great uncertainty about the exact form that Brexit will take ( 'soft' or 'hard', with or without a comprehensive trade agreement), the effects will likely be felt across all equalities groups in Scotland/the </span><acronym data-dcnode-id="595" title="United Kingdom"><span data-dcnode-id="596" instrument_node="">UK</span></acronym><span data-dcnode-id="594" instrument_node="">.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="591" instrument_node="">Some of these impacts will be shared across different groups of people. In particular, if the majority of economic forecasts are correct and the </span><acronym data-dcnode-id="589" title="United Kingdom"><span data-dcnode-id="590" instrument_node="">UK</span></acronym><span data-dcnode-id="588" instrument_node="">'s economy will suffer post-Brexit, the negative socio-economic effects of the </span><acronym data-dcnode-id="586" title="United Kingdom"><span data-dcnode-id="587" instrument_node="">UK</span></acronym><span data-dcnode-id="585" instrument_node="">'s withdrawal from the </span><acronym data-dcnode-id="583" title="European Union"><span data-dcnode-id="584" instrument_node="">EU</span></acronym><span data-dcnode-id="582" instrument_node=""> will impact across all equalities groups that are disproportionately represented in the low-income bracket. </span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">This category includes: women, disabled people, older people, minority ethnic communities, people from a migrant background, people with caring responsibilities, care-experienced young people, refugees and asylum seekers, offenders and ex-offenders, homeless people, Gypsy/Traveller communities, precarious workers, and people with substance abuse issues. These groups are more likely to rely on public services and benefits and have less disposable income and spending power. </span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">The socio-economic impacts of Brexit across equalities groups – with regard to their access to public services (especially health and social care), their ability to buy daily essentials in the case of price rises, and their ability to access affordable housing – are likely to be widespread and, according to economic analysis, most likely to happen. In some cases, </span><abbr data-dcnode-id="574" title="id est"><span data-dcnode-id="575" instrument_node="">i.e.</span></abbr><span data-dcnode-id="573" instrument_node=""> for those living in poverty or suffering job losses, these impacts will also be deeply felt.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="570" instrument_node="">There are also likely to be legal impacts of Brexit across equalities groups, with regard to the rights and protections they currently enjoy, and which they may have otherwise enjoyed in the future had the </span><acronym data-dcnode-id="568" title="United Kingdom"><span data-dcnode-id="569" instrument_node="">UK</span></acronym><span data-dcnode-id="567" instrument_node=""> not decided to leave the </span><acronym data-dcnode-id="565" title="European Union"><span data-dcnode-id="566" instrument_node="">EU</span></acronym><span data-dcnode-id="564" instrument_node="">. At a general level, all equalities groups are likely to experience the loss of the </span><acronym data-dcnode-id="562" title="European Union"><span data-dcnode-id="563" instrument_node="">EU</span></acronym><span data-dcnode-id="561" instrument_node=""> Charter of Fundamental Rights – which guarantees a freestanding right to non-discrimination – and recourse to the rulings and case law of the European Court of Justice. This impact is likely to be widespread across equalities groups and, given that the </span><acronym data-dcnode-id="559" title="United Kingdom"><span data-dcnode-id="560" instrument_node="">UK</span></acronym><span data-dcnode-id="558" instrument_node=""> Government has made it clear that the Charter and </span><acronym data-dcnode-id="556" title="Court of Justice of the European Union"><span data-dcnode-id="557" instrument_node="">CJEU</span></acronym><span data-dcnode-id="555" instrument_node=""> will have no jurisdiction in the </span><acronym data-dcnode-id="553" title="United Kingdom"><span data-dcnode-id="554" instrument_node="">UK</span></acronym><span data-dcnode-id="552" instrument_node=""> after Brexit, most likely to happen. </span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="549" instrument_node="">Equalities groups are also – across the board – likely to feel the widespread loss of European Structural and Investment Funds (</span><acronym data-dcnode-id="547" title="European Structural and Investment Fund"><span data-dcnode-id="548" instrument_node="">ESIF</span></acronym><span data-dcnode-id="546" instrument_node="">), from which they have greatly benefitted over the years. It is as yet unclear whether equalities groups will continue to be funded in the same way, and at the same level, through the </span><acronym data-dcnode-id="544" title="United Kingdom"><span data-dcnode-id="545" instrument_node="">UK</span></acronym><span data-dcnode-id="543" instrument_node="">'s proposed post-Brexit Shared Prosperity Fund.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="540" instrument_node="">Different equalities groups will also feel the effects of the potential amendment or repeal of specific piece of </span><acronym data-dcnode-id="538" title="European Union"><span data-dcnode-id="539" instrument_node="">EU</span></acronym><span data-dcnode-id="537" instrument_node=""> legislation. For instance, women would be adversely affected by the loss of the </span><acronym data-dcnode-id="535" title="European Union"><span data-dcnode-id="536" instrument_node="">EU</span></acronym><span data-dcnode-id="534" instrument_node=""> Pregnant Workers' Directive. Several equalities groups that have high representation amongst precarious workers (women, minority ethnic people, carers, disabled people) would be adversely affected by the loss of the </span><acronym data-dcnode-id="532" title="European Union"><span data-dcnode-id="533" instrument_node="">EU</span></acronym><span data-dcnode-id="531" instrument_node=""> Agency Workers' Directive. Disabled people would be adversely affected by the loss of the </span><acronym data-dcnode-id="529" title="European Union"><span data-dcnode-id="530" instrument_node="">EU</span></acronym><span data-dcnode-id="528" instrument_node=""> Passenger Rights Directive and any decision not to implement the European Accessibility Act. Mothers, fathers and carers are also likely to lose out on the decision not to implement the Work-Life Balance Directive. Refugee children will be adversely affected by their loss of rights to family reunion in the </span><acronym data-dcnode-id="526" title="United Kingdom"><span data-dcnode-id="527" instrument_node="">UK</span></acronym><span data-dcnode-id="525" instrument_node="">. These impacts will be widespread and deeply felt by people who are discriminated against as a result of their loss. </span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="522" instrument_node="">However, the impacts of Brexit will be gravest for people who face multiple inequalities. For instance: a disabled </span><acronym data-dcnode-id="520" title="European Union"><span data-dcnode-id="521" instrument_node="">EU</span></acronym><span data-dcnode-id="519" instrument_node=""> woman on a fixed-term contract, a minority ethnic single mother on a low-income, a man with a mental health disability who is homeless and has substance abuse problems, or a young, care-experienced member of the </span><acronym data-dcnode-id="517" title="Lesbian, gay, bisexual, transgender, queer/questioning, intersex, and asexual."><span data-dcnode-id="518" instrument_node="">LGBTQIA</span></acronym><span data-dcnode-id="516" instrument_node="">+ community. People with several protected or personal characteristics who face multiple disadvantage will likely face the deepest socio-economic impacts and the widest forms of discrimination in the workplace and society at large. It is these groups that the Scottish Government should consider focussing on first and foremost, to mitigate any adverse effects of Brexit, as they are also the groups least likely to be resilient to changes.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="513" instrument_node="">To take one example, minority ethnic women – especially those from a non-Christian religious background – have faced mounting discrimination hostility since the </span><acronym data-dcnode-id="511" title="European Union"><span data-dcnode-id="512" instrument_node="">EU</span></acronym><span data-dcnode-id="510" instrument_node=""> referendum in June 2016 and would likely suffer the most from any economic downturn post-Brexit. Minority ethnic women have reported a sizable increase in racial discrimination (from 61% in 2016 to 74% in 2019). There has been a rise in Islamophobic and sexist incidents, and </span><acronym data-dcnode-id="508" title="European Union"><span data-dcnode-id="509" instrument_node="">EU</span></acronym><span data-dcnode-id="507" instrument_node=""> migrant women have also reported feeling more prone to racial harassment.</span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">[433]</span></sup></a><span data-dcnode-id="503" instrument_node=""> Studies have also shown that austerity and public services cuts will disproportionately impact minority ethnic women "as a result of structural inequalities, which means they earn less, own less and have more responsibility for unpaid care and domestic work".</span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">[434]</span></sup></a><span data-dcnode-id="499" instrument_node=""> </span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">This report strongly recommends, therefore, that future research on the social impacts of Brexit should adopt an intersectional perspective, by examining the impacts on vulnerable people facing multiple inequalities. While this type of research is more complex to measure and analyse it is here that the impacts of Brexit will likely be most deeply felt. </span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">As Baroness Burt of Solihull asked in the House of Lords, </span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="490" instrument_node="">"What work has been done to see what happens when a number of these protected characteristics overlap, for example, in the case of a pregnant woman from a minority in a low-paid job? This is called intersectionality, and we know that the people affected suffer disproportionately, but it seems to have been consigned to the "too difficult" box when it comes to measuring the effects of government legislation."</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.scot/publications/social-equality-impacts-brexit/pages/19/"><sup data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">[435]</span></sup></a><span data-dcnode-id="486" instrument_node=""> </span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="483" instrument_node="">On a final note, it is worth stressing that while this report has sought to identify a broad range of potential impacts of Brexit, some of these impacts are more likely to occur than others under different Brexit scenarios. While some impacts appear to be certain at the time of writing – resulting from the clauses contained in the revised </span><acronym data-dcnode-id="481" title="European Union"><span data-dcnode-id="482" instrument_node="">EU</span></acronym><span data-dcnode-id="480" instrument_node=""> (Withdrawal Agreement) Bill and the </span><acronym data-dcnode-id="478" title="United Kingdom"><span data-dcnode-id="479" instrument_node="">UK</span></acronym><span data-dcnode-id="477" instrument_node=""> Government's statements that it does or does not intend to stay affiliated to certain </span><acronym data-dcnode-id="475" title="European Union"><span data-dcnode-id="476" instrument_node="">EU</span></acronym><span data-dcnode-id="474" instrument_node=""> laws, funding and institutions – other impacts (for instance the loss of certain protections, or socioeconomic impacts) are as yet unclear, and will depend very much on negotiations between the </span><acronym data-dcnode-id="472" title="United Kingdom"><span data-dcnode-id="473" instrument_node="">UK</span></acronym><span data-dcnode-id="471" instrument_node=""> and the </span><acronym data-dcnode-id="469" title="European Union"><span data-dcnode-id="470" instrument_node="">EU</span></acronym><span data-dcnode-id="468" instrument_node=""> in the coming months.</span></p><span data-dcnode-id="466" instrument_node="">
</span><span data-dcnode-id="464" instrument_node=""> </span></div><span data-dcnode-id="462" instrument_node="">
</span><span data-dcnode-id="460" instrument_node="">
