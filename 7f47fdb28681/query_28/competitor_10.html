 670w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2018/11/Kid-2.png?w=2480 2480w" width="222"></a><div class="article__gallery-count" data-dcnode-id="591"><span class="article__gallery-count-value" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">11</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="587"><span class="article__media-span" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node=""> Friends can be heard in the background screaming as the teen goes up in flames</span></span></figcaption></figure><span data-dcnode-id="585" instrument_node="">
</span><figure class="article__media" data-dcnode-id="573"><div class="article__media-img-container open-gallery" data-dcnode-id="579" data-index="494088"><a data-dcnode-id="583" href="#"><img alt=" Hospital staff have issued a warning about the Fire Challenge" class="lazyload" data-credit="Getty - Contributor" data-dcnode-id="584" data-img="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?strip=all&amp;w=960" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000449894285.jpg?w=2480 2480w" height="640" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201.5%201%22%3E%3C/svg%3E" width="960"></a><div class="article__gallery-count" data-dcnode-id="580"><span class="article__gallery-count-value" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">11</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="574"><span class="article__media-span" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node=""> Hospital staff have issued a warning about the Fire Challenge</span></span><span class="article__credit" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Credit: Getty - Contributor</span></span></figcaption></figure><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">The "Fire Challenge", which originated in the US, sees kids pouring themselves in flammable liquid and then setting themselves on fire.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">The point of the craze is to film the stunt and then post it to social media in an attempt get more “likes”.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">This reckless challenge has resulted in people needing surgery and life support treatment.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu" data-dcnode-id="562"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="563" id="advert-inarticle-mpu"></div></div><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Abertawe Bro Morgannwg University Health Board has now issued a health warning about the hazardous craze.</span></p><span data-dcnode-id="558" instrument_node="">
</span><hr data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Have you been affected by the Fire Challenge?&nbsp;</span></strong><b data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">Email us at </span><a data-dcnode-id="551" href="mailto:tips@the-sun.co.uk" rel="noopener" target="_blank"><span data-dcnode-id="552" instrument_node="">tips@the-sun.co.uk</span></a><span data-dcnode-id="550" instrument_node=""> or call 0207 782 4368. You can WhatsApp us on 07810 791 502</span></b></p><span data-dcnode-id="547" instrument_node="">
</span><hr data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">
</span><figure class="article__media" data-dcnode-id="535"><div class="article__media-img-container open-gallery" data-dcnode-id="539" data-index="494089"><a data-dcnode-id="543" href="#"><img alt=" Timiyah Landers suffered burns on 49 per cent of body after doing the challenge in the US" class="lazyload" data-credit="" data-dcnode-id="544" data-img="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?strip=all&amp;w=634" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037456.jpg?w=2480 2480w" height="819" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%200.8%201%22%3E%3C/svg%3E" width="634"></a><div class="article__gallery-count" data-dcnode-id="540"><span class="article__gallery-count-value" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">11</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="536"><span class="article__media-span" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node=""> Timiyah Landers suffered burns on 49 per cent of body after doing the challenge in the US</span></span></figcaption></figure><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Jeremy Yarrow, a plastic surgeon at Morriston Hospital, said he knows that young people feel pressured to boost their social media presence by participating in these challenges.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">He said: “I can understand there is pressure on young people to gain acceptance or boost their online profiles by doing such risky things as these challenges.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu-1" data-dcnode-id="527"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="528" id="advert-inarticle-mpu-1"></div></div><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">“But from the patients I see, the results can be very different, with some requiring life support treatment and many left with lifelong scars.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">“In some severe and sometimes life-threatening cases, they are admitted to hospital for long periods of time for complex surgery resulting in long term mental and physical issues."</span></p><span data-dcnode-id="520" instrument_node="">
</span><figure class="article__media" data-dcnode-id="508"><div class="article__media-img-container open-gallery" data-dcnode-id="514" data-index="494090"><a data-dcnode-id="518" href="#"><img alt=" The 12-year-old took part in the challenge after seeing it online" class="lazyload" data-credit="Refer to Caption" data-dcnode-id="519" data-img="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?strip=all&amp;w=306" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2018/11/NINTCHDBPICT000428037458.jpg?w=2480 2480w" height="396" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%200.8%201%22%3E%3C/svg%3E" width="306"></a><div class="article__gallery-count" data-dcnode-id="515"><span class="article__gallery-count-value" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">11</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="509"><span class="article__media-span" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node=""> The 12-year-old took part in the challenge after seeing it online</span></span><span class="article__credit" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Credit: Refer to Caption</span></span></figcaption></figure><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">The health board did not disclose the specific number of patients they have treated, but staff did say the number has gone up.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">Ana Biney, a staff nurse at Morriston Hospital's Welsh Centre for Burns and Plastic Surgery, told </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walesonline.co.uk/news/health/children-ending-up-hospital-serious-15423110" rel="nofollow noopener" target="_blank"><span data-dcnode-id="502" instrument_node="">Wales Online</span></a><span data-dcnode-id="500" instrument_node="">: “We have definitely seen an increase in the number of teenagers who have suffered quite serious burns because of this.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu-2" data-dcnode-id="497"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="498" id="advert-inarticle-mpu-2"></div></div><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">“They could be killed or scarred for life.”</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">In the US, a 12-year-old was hospitalised with severe burns after participating in the challenge.</span></p><span data-dcnode-id="490" instrument_node="">
