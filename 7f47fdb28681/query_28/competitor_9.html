/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 976w" width="976"><noscript data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">&lt;img alt="A union jack umbrella in front of the Palace of Westminster" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/174C3/production/_90372459_gettyimages-542984918.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="947" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Image source, </span></span><span data-dcnode-id="948" instrument_node="">Getty Images</span></span></div></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="939"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="940"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="941"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Is the new prime minister's slogan as firm and unambiguous as it first seems?</span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="932"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="933"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">"</span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-36764525"><span data-dcnode-id="937" instrument_node="">Brexit means Brexit</span></a><span data-dcnode-id="935" instrument_node="">".  "We are all Brexiters now." </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="925"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="926"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Our new prime minister's statements, and those of her supporters, are perhaps the opposite of a </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buddhism.about.com/od/chanandzenbuddhism/a/Introduction-To-Koans.htm"><span data-dcnode-id="930" instrument_node="">Zen koan</span></a><span data-dcnode-id="928" instrument_node="">. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="921"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="922"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Those philosophical puzzles - like "the sound of one hand clapping" - are apparently meaningless, but long meditation on their internal contradiction is supposed to allow enlightenment to blossom.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="917"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="918"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Mrs May's slogans, on the other hand, seem firm and unambiguous, but after a little reflection unravel into a world of trouble ahead. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="913"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="914"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">She rises from the ashes of the defeat of her side in the referendum, but how she copes with its implications will determine her success or failure in No 10.</span></p></div></div><div data-dcnode-id="912" id="piano-inline1"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="908"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="909"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">"Brexit means Brexit," does mean of course, that she will take the UK out of the EU. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="901"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="902"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">About the only thing she said about the whole central matter </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/news/2016/07/11/theresa-may-launches-conservative-leadership-bid-as-andrea-leads/"><span data-dcnode-id="906" instrument_node="">in her Birmingham speech launching her campaign</span></a><span data-dcnode-id="904" instrument_node=""> was: "There will be no attempts to remain inside the EU, no attempts to rejoin it by the back door, and no second referendum. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="897"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="898"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">"The country voted to leave the European Union, and as prime minister I will make sure that we leave the European Union."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="890"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="891"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">While there are many outside Westminster who will be furious (disMayed, even) at that, few inside the Palace can conceive of anything else. MPs will at least now </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.itv.com/news/2016-07-12/mps-to-debate-second-referendum-after-record-breaking-petition/"><span data-dcnode-id="895" instrument_node="">debate the matter</span></a><span data-dcnode-id="893" instrument_node="">, as a sort of consolation prize.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="886"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="887"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">But the manner of withdrawal, and the subsequent relationship, is up for grabs.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="869"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="870"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="876"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="881"><span data-dcnode-id="882"><img alt="Theresa May" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="885" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 976w" width="976"><noscript data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">&lt;img alt="Theresa May" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/DC6B/production/_90372465_gettyimages-546073318.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="877" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Image source, </span></span><span data-dcnode-id="878" instrument_node="">Getty Images</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="871"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="872" spacing="6"><span data-dcnode-id="873" instrument_node="">Mrs May has insisted the will of the British electorate to leave the EU must be respected</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="865"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="866"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Again, all Mrs May has said is that she will "negotiate the best terms for Britain's departure from the European Union - and forge a new role for ourselves in the world".</span></p></div></div><div data-dcnode-id="864" id="piano-inline2"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="860"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="861"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">This is pretty much empty rhetoric. She would hardly negotiate the worse deal possible.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="853"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="854"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">It tells us nothing of her stance - </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-36723220"><span data-dcnode-id="858" instrument_node="">as I wrote last week</span></a><span data-dcnode-id="856" instrument_node=""> the new battle lines are between hard and soft Brexit.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="849"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="850"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">At its core, this is an argument over the balance between the value of the single market and the perceived need to reduce EU immigration.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="842"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="843"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">The first decision for the new prime minister will be about timing. Should the formal mechanism for leaving the EU, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lisbon-treaty.org/wcm/the-lisbon-treaty/treaty-on-European-union-and-comments/title-6-final-provisions/137-article-50.html"><span data-dcnode-id="847" instrument_node="">Article 50</span></a><span data-dcnode-id="845" instrument_node="">, be triggered in the next few days, as her prime ministerial rival Andrea Leadsom wanted, or a little bit farther down the road?</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="838"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="839"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">More important is what is behind this. Formally declaring could mean a desire for an orderly exit, by detailed negotiation,  or simply a desire to get it all over with. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="828"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="829"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="830"><span data-dcnode-id="837" instrument_node="">Real hardliners </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2016/jun/27/stop-brexit-mp-vote-referendum-members-parliament-act-europe"><span data-dcnode-id="836" instrument_node="">argue that the most important step is repealing the European Communities Act 1972</span></a><span data-dcnode-id="834" instrument_node="">. The former cabinet minister and veteran Eurosceptic </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//johnredwoodsdiary.com/2016/07/13/how-to-write-a-letter-using-article-50/"><span data-dcnode-id="833" instrument_node="">John Redwood</span></a><span data-dcnode-id="831" instrument_node=""> set this out very clearly.</span></p></div></div><div data-dcnode-id="827" id="piano-inline3"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="823"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="824"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">"Article 50 is not a great basis for the negotiation, as it implies all is in the pot for debate and all could take a long time. I would rather trigger it to complete the process after all has been sorted out. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="819"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="820"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">"If the government refuses to get on with legislating, then a poor second would be immediate Article 50 followed by very tough negotiations, and a willingness to simply pull out of talks and legislate if they are unrealistic."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="815"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="816"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Mrs May's every move will be watched by a number of very hawkish hawks who have decades of experience of hand-to-hand fighting in the Tories' European civil war. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="811"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="812"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">One clue to her intentions will be how quickly Mrs May sets out her plan. A firm bottom line will satisfy the hawks. More waffle will suggest she genuinely wants to explore how much wiggle room the other 27 nations will give her. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="807"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="808"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">It is critical to hear Mrs May's thoughts on what she want to do about European immigration. This is the stumbling block for those who want pretty much the same access as we have now to the European single market. It is highly unlikely we will get it, if the government wants to curb free movement of people.</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="790"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="791"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="797"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="802"><span data-dcnode-id="803"><img alt="Michael Gove (l) and Boris Johnson" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="806" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 976w" width="976"><noscript data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">&lt;img alt="Michael Gove (l) and Boris Johnson" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/14273/production/_90374528_gettyimages-542748016.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="798" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Image source, </span></span><span data-dcnode-id="799" instrument_node="">Getty Images</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="792"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="793" spacing="6"><span data-dcnode-id="794" instrument_node="">The issue of migration dominated the EU Referendum campaign</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="786"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="787"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">We know what those Brexiters who backed the Vote Leave campaign desire. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="779"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="780"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">In what amounted to </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.voteleavetakecontrol.org/why_vote_leave"><span data-dcnode-id="784" instrument_node="">a mini-manifesto from Boris Johnson and Michael Gove during the campaign</span></a><span data-dcnode-id="782" instrument_node="">, they proposed  an "asylum and immigration control bill" by the end of the Parliament, and that "a process should be established to consider the details of this new system" right away.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="775"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="776"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">They promised that: "This would end the automatic right of all EU citizens to enter the UK by the next election. We will be able to carry out proper security checks on those entering and refuse entry to known criminals. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="771"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="772"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">"EU citizens will be subject to UK law rather than EU immigration legislation. The Bill would end the discrimination against non-EU citizens and create a genuine points-based immigration system in which the possession of suitable skills is a key element."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="761"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="762"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="763"><span data-dcnode-id="770" instrument_node="">There is a bit of a problem here for PM May, aka the former home secretary. It can be argued that the UK already has </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/browse/visas-immigration"><span data-dcnode-id="769" instrument_node="">a "points-based immigration system"</span></a><span data-dcnode-id="767" instrument_node="">  for people who come from outside the European Union. And </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-eu-referendum-36382199"><span data-dcnode-id="766" instrument_node="">it has been a spectacular failure</span></a><span data-dcnode-id="764" instrument_node="">.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="757"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="758"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The UK hasn't been able to control immigration, even when it had the legal right to do so, and Mrs May would have to explain how any new system would work any better, simply because it was extended to EU citizens as well.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="753"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="754"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The Vote Leave mini-manifesto misses out a couple of words its supporters usually added in interviews: "Australian-style". </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="736"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="737"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="743"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="748"><span data-dcnode-id="749"><img alt="A protestor holds up a pro-refugee placard at a rally" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="752" height="351" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/624/mcs/media/images/78177000/jpg/_78177944_astralia.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 976w" width="624"><noscript data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">&lt;img alt="A protestor holds up a pro-refugee placard at a rally" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/78177000/jpg/_78177944_astralia.jpg 976w" src="https://ichef.bbci.co.uk/news/624/mcs/media/images/78177000/jpg/_78177944_astralia.jpg" width="624" height="351" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="744" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Image source, </span></span><span data-dcnode-id="745" instrument_node="">AFP/Getty Images</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="738"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="739" spacing="6"><span data-dcnode-id="740" instrument_node="">Australia's immigration policy is a hot-button issue in every election</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="729"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="730"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">As I understand, it </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.workpermit.com/australia/point_calculator.htm"><span data-dcnode-id="734" instrument_node="">the Australian system</span></a><span data-dcnode-id="732" instrument_node=""> relies on visas - otherwise you don't really know who is coming in to work, or just on holiday, whether they should be gone after a month or have the right to stay for a couple of years and so forth. Visas for the French would be a pretty big step. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="725"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="726"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Then the UK's problem is not just attracting skilled labour, to do all the jobs Brits haven't the know-how to do, from nursing to engineering. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="721"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="722"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">We seem to be short of unskilled labour too. It may be that European immigration has deprived British people of those jobs. We will see.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="717"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="718"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The free-market right of the Conservative Party might point our that food-processing plants and fruit fields are being robbed of a plentiful supply of cheap labour. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="713"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="714"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Now it is possible all the unskilled and unemployed Leave voters of Sunderland and Boston will borrow Norman Tebbit's bike, and cycle merrily down to the blackberry fields, grateful for the opportunity for a bit of back-breaking labour. </span></p></div></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="709"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="710" id="Unwanted-legacy" tabindex="-1"><span data-dcnode-id="711" role="text"><span data-dcnode-id="712" instrument_node="">Unwanted legacy</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="705"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="706"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Or maybe the points-style system could allow a certain number of unskilled Poles into the country to do the jobs they've been doing, but this would rather run counter to the apparent instruction of the electorate, who are not required to be economically literate.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="698"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="699"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">As I write, </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-36790710"><span data-dcnode-id="703" instrument_node="">the whole cabinet has not been announced</span></a><span data-dcnode-id="701" instrument_node="">, but so far it seems a balanced team, with Boris Johnson's first ministerial job one of the biggest available. It is no accident that of the first six people to be announced, three campaigned to remain, three to leave. The new foreign secretary, the minister for Brexit and the new job of international trade are all prominent leave campaigners.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="694"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="695"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">There will be a lot about the rise of women. We like the big picture here, and we shouldn't ignore the biggest and oldest divide in human society. But agenda matters more than gender in this debate. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="690"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="691"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">But I predict there will be an unwanted legacy. There are simply too many teeth for the mouth. Too many people who think they are entitled to a big job. There is a whole swathe of "leavers" currently outside the cabinet who think they should be in it. </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="673"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="674"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="680"><span class="ssrcss-11kpz0x-Placeholder e16icw910" data-dcnode-id="685"><span data-dcnode-id="686"><img alt="Andrea Leadsom" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="689" height="549" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/976/cpsprodpb/114B/production/_90172440_leadsom2.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/114B/production/_90172440_leadsom2.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/114B/production/_90172440_leadsom2.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/114B/production/_90172440_leadsom2.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/114B/production/_90172440_leadsom2.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/114B/production/_90172440_leadsom2.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/114B/production/_90172440_leadsom2.jpg 976w" width="976"><noscript data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">&lt;img alt="Andrea Leadsom" srcSet="https://ichef.bbci.co.uk/news/240/cpsprodpb/114B/production/_90172440_leadsom2.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/114B/production/_90172440_leadsom2.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/114B/production/_90172440_leadsom2.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/114B/production/_90172440_leadsom2.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/114B/production/_90172440_leadsom2.jpg 800w, https://ichef.bbci.co.uk/news/976/cpsprodpb/114B/production/_90172440_leadsom2.jpg 976w" src="https://ichef.bbci.co.uk/news/976/cpsprodpb/114B/production/_90172440_leadsom2.jpg" width="976" height="549" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="681" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Image source, </span></span><span data-dcnode-id="682" instrument_node="">Reuters</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="675"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="676" spacing="6"><span data-dcnode-id="677" instrument_node="">Will there be a place for Andrea Leadsom in Theresa May's cabinet?</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="669"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="670"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">There are current members who have done nothing wrong except be loyal to the prime minister, just like Mrs May. There are friends she wishes to promote. There are those who backed her at once, who deserve a reward. There are those on the other teams, who need to be soothed. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="665"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="666"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">There may be those who are shunted to one side by those of less ability because of the need to balance Leavers and Remainers. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="661"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="662"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Such positive discrimination can lead to bitterness. It all adds up to quite a few people sitting on the green benches behind Mrs May with an axe to grind. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="657"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="658"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Some of them have been rather good, for years, at polishing, and honing that axe, and when they last swung it they decapitated a prime minister. They will bide their time, nursing grudges. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="650"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="651"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">A </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zentexts.org/mu.html"><span data-dcnode-id="655" instrument_node="">Zen master once said</span></a><span data-dcnode-id="653" instrument_node=""> a koan is like "swallowing a red-hot iron ball. You try to vomit it out, but you can't." </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="646"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="647"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Brexit could be a bit like that for the new prime minister.</span></p></div></div><div class="ssrcss-5i1hhv-LinksComponentWrapper e1xue1i83" data-component="links-block" data-dcnode-id="544"><section class="ssrcss-msolhr-LinksWrapper e3eyuya4" data-dcnode-id="545"><div class="ssrcss-1lqqmgw-LinksHeadingWrapper e3eyuya3" data-dcnode-id="643"><h2 class="ssrcss-axlwsg-StyledHeading e1fj1fc10" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">More on this story</span></h2></div><ul class="ssrcss-10bv2vf-EndOfContentLinksGrid e3eyuya1" data-dcnode-id="546" role="list"><li class="ssrcss-547yr3-PromoItem e3eyuya0" data-dcnode-id="617"><div class="ssrcs
