</span><p data-dcnode-id="274"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">“Surviving your own suicide”</span></strong><span data-dcnode-id="275" instrument_node=""> (Chris Patten, former EU Commissioner, Conservative Party)</span></p><span data-dcnode-id="273" instrument_node="">
</span><ul data-dcnode-id="267"><span data-dcnode-id="272" instrument_node="">
</span><li data-dcnode-id="269"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">UK public expects disintegration of the United Kingdom -- 18 March 2017</span></strong></li><span data-dcnode-id="268" instrument_node="">
</span></ul><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="265" instrument_node="">A poll from 14 to 17 March 2017 shows 54% of Britons (63% of Scots) believe the Brexit vote increases the chances of the United Kingdom breaking apart (see </span><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2017/mar/18/majority-britons-believe-brexit-break-up-uk-nicola-sturgeon-theresa-may"><span data-dcnode-id="264" instrument_node="">press report</span></a><span data-dcnode-id="262" instrument_node="">).</span></p><span data-dcnode-id="260" instrument_node="">
</span><ul data-dcnode-id="254"><span data-dcnode-id="259" instrument_node="">
</span><li data-dcnode-id="256"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">60% of Britons want to keep their EU citizenship after Brexit -- 1 July 2017</span></strong></li><span data-dcnode-id="255" instrument_node="">
</span></ul><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="252" instrument_node="">This would include the rights to live, work, study and travel in the EU – and many would be prepared to pay large sums to do so (see </span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2017/jul/01/poll-european-eu-rights-brexit"><span data-dcnode-id="251" instrument_node="">press report</span></a><span data-dcnode-id="249" instrument_node="">).</span></p><span data-dcnode-id="247" instrument_node="">
</span><ul data-dcnode-id="241"><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="243"><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Brexit vision isn't achievable -- 24 August 2017</span></strong></li><span data-dcnode-id="242" instrument_node="">
</span></ul><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="239" instrument_node="">England has yet to answer fundamental questions raised by Brexit, former Irish Prime Minister John Bruton said. Brexit is intimately linked to deeper questions of identity, who they are and their place in the world. And that's a psychological process rather than an economic one (see </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/united-kingdom-may-decide-brexit-vision-not-achievable-irish-ex-pm"><span data-dcnode-id="238" instrument_node="">press report</span></a><span data-dcnode-id="236" instrument_node="">).</span></p><span data-dcnode-id="234" instrument_node="">
</span><ul data-dcnode-id="228"><span data-dcnode-id="233" instrument_node="">
</span><li data-dcnode-id="230"><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">UK would vote to stay in EU by 12 percent point margin -- 17 January 2019</span></strong></li><span data-dcnode-id="229" instrument_node="">
</span></ul><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="226" instrument_node="">The proportion of people wishing to stay in the EU reached the highest level since the 2016 Brexit referendum (see </span><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/brexit-uk-poll-support-for-staying-in-eu-at-highest-level-since-referendum"><span data-dcnode-id="225" instrument_node="">press report</span></a><span data-dcnode-id="223" instrument_node="">).</span></p><span data-dcnode-id="221" instrument_node="">
</span><ul data-dcnode-id="215"><span data-dcnode-id="220" instrument_node="">
</span><li data-dcnode-id="217"><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Majority of Tory members would accept destruction of their own party -- 18 June 2019</span></strong></li><span data-dcnode-id="216" instrument_node="">
</span></ul><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">According to a survey, 54% of Conservative party members say they would rather see their own party destroyed than have Brexit not take place. 61% would prefer to see significant damage to the economy and 63% would consider Scotland leaving the UK to be a price worth paying (see </span><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yougov.co.uk/topics/politics/articles-reports/2019/06/18/most-conservative-members-would-see-party-destroye" target="_blank"><span data-dcnode-id="212" instrument_node="">report</span></a><span data-dcnode-id="210" instrument_node="">).</span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="204"><strong data-dcnode-id="205"><img alt="" data-dcnode-id="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="206" instrument_node=""> Brexit is “going badly” -- 29 September 2021</span></strong></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="202" instrument_node="">According to new polling, 53 percent of Brits said Brexit is working out badly, a rise of 15 percentage points from June 2021 (see </span><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/brexit-is-going-badly-say-brits-in-new-poll" target="_blank"><span data-dcnode-id="201" instrument_node="">press report</span></a><span data-dcnode-id="199" instrument_node="">).</span></p><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="193"><strong data-dcnode-id="194"><img alt="" data-dcnode-id="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="195" instrument_node=""> Brexit is&nbsp;affecting shop prices -- 30 October 2021</span></strong></p><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="191" instrument_node="">Almost twice as many voters believe Brexit is having a negative effect on the UK economy as think it is benefiting the nation's finances (see </span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/oct/30/brexit-is-harming-the-uk-economy-say-44-of-voters" target="_blank"><span data-dcnode-id="190" instrument_node="">press report</span></a><span data-dcnode-id="188" instrument_node="">).</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="182"><strong data-dcnode-id="183"><img alt="" data-dcnode-id="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="184" instrument_node=""> Significant proportion of Brits in favour of a new Brexit referendum -- 12 November 2021</span></strong></p><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="176"><span data-dcnode-id="180" instrument_node="">A clear majority would vote to rejoin the EU and many younger voters would like a new referendum to be held in the next five years (see </span><a data-dcnode-id="178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/most-brits-would-rejoin-eu-if-new-vote-held-survey-shows" target="_blank"><span data-dcnode-id="179" instrument_node="">press report</span></a><span data-dcnode-id="177" instrument_node="">).</span></p></div></div><span data-dcnode-id="173" instrument_node="">
</span><div class="span4" data-dcnode-id="80"><span data-dcnode-id="172" instrument_node="">
</span><div class="top40 left10" data-dcnode-id="81" id="content"><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><img alt="" data-dcnode-id="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ewc-academy.eu/image/Fotos_Abbildungen/brexit-karte.jpg&amp;raw" width="100%"></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">&nbsp;</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="162"><a class="deu" data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ewc-academy.eu/de/consulting/brexit.html%3Fm%3D1647339785%26"><span data-dcnode-id="164" instrument_node="">Für die deutsche Version klicken Sie bitte hier</span></a></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">&nbsp;</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="155"><strong data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">The new Brexit video</span></strong></p><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="151"><a data-dcnode-id="152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DsvwslRDTyzU" target="_blank"><img alt="" data-dcnode-id="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/titanic.png&amp;raw"></a></p><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">&nbsp;</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="144"><strong data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">How to explain Brexit to children:</span></strong></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">Boris Johnson: I don’t want free movement of people but I want the single market.</span></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">Carlo Calenda, Italian economics minister: No way.</span></p><span data-dcnode-id="137" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Johnson: You’ll sell less prosecco.</span></p><span data-dcnode-id="134" instrument_node="">
</span><p data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Calenda: OK, you’ll sell less fish and chips, but I’ll sell less prosecco to one country and you’ll sell less to 27 countries.</span></p><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="130" instrument_node="">Conversation during a meeting, November 2016 (see </span><a data-dcnode-id="128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2016/nov/16/european-ministers-boris-johnson-prosecco-claim-brexit%3FCMP%3Dtwt_a-politics_b-gdnukpolitics" target="_blank"><span data-dcnode-id="129" instrument_node="">press report</span></a><span data-dcnode-id="127" instrument_node="">)</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Question to the children: which politician has always skived off math lessons?</span></p><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">&nbsp;</span></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="116"><strong data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Ryanair boss O’Leary favors “really hard” Brexit</span></strong></p><span data-dcnode-id="115" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="114" instrument_node="">“I think we should enjoy the entertainment and the spectacle that Brexit is bringing to us. The British will realize a really hard Brexit will be so damaging to the economy. I suspect they will fudge it to the next general election, while UK politicians make a complete balls of Brexit since they haven’t a clue what they’re trying to do or achieve.” (see </span><a data-dcnode-id="112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/ryanair-boss-oleary-favors-really-hard-brexit" target="_blank"><span data-dcnode-id="113" instrument_node="">press report</span></a><span data-dcnode-id="111" instrument_node="">)</span></p><span data-dcnode-id="109" instrument_node="">
