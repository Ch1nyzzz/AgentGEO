</span><h2 data-dcnode-id="1128"><span data-dcnode-id="1131" instrument_node="">Brexit – What consequences for European Works Councils </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">?</span></strong></h2><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1124"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">A referendum was held on 23 June 2016, to decide whether the UK should leave or remain in the EU, the so called Brexit (“British” and “exit”). England and Wales voted for leave. Scotland, Northern Ireland, Greater London and Gibraltar backed staying in the EU. Liverpool, Manchester, Bristol, Cardiff and the regions around the university cities such as Cambridge, Oxford and Warwick backed staying in the EU.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1120"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">The referendum was non-binding</span></strong></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Article 50 of the Treaty on European Union establishes the procedures for a member state to withdraw from the EU. It requires the member state to notify the EU of its withdrawal and obliges the EU to then try to negotiate a withdrawal agreement with that state. Britain's “Leave” vote does not represent that formal notification.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The High Court in London ruled on 3 November 2016, that only parliament – not the prime minister – can authorise the signing of Article 50. The government appealed against the judgment. The Supreme Court heard the case from 5 to 8 December 2016 and confirmed the High Court ruling on 24 January 2017.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">On 13 March 2017 both Houses of Parliament endorsed the activation of Article 50. The prime minister started the formal legal process of withdrawing from the EU on 29 March 2017 and negotiations started on 19 June 2017. Meanwhile politicians in Scotland, Northern Ireland and Wales called for a referendum on leaving the UK (see </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/sinn-fein-calls-for-northern-irish-referendum-as-soon-as-possible"><span data-dcnode-id="1111" instrument_node="">press report</span></a><span data-dcnode-id="1109" instrument_node="">).</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1104"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The general election on 8 June 2017</span></strong></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Theresa May called a snap election to strengthen her parliamentary majority and have more power and freedom to negotiate Britain's exit from the European Union, but she lost her parliamentary majority. The increase in Labour’s vote share was the largest for any party between two general elections since 1945.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1099" instrument_node="">The government lost a crucial vote in the House of Commons on 13 December 2017 due to critics within the conservative party who sided with the opposition to back an amendment for a right of veto over the final Brexit deal (see </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2017/dec/13/tory-brexit-rebels-inflict-major-defeat-on-theresa-may"><span data-dcnode-id="1098" instrument_node="">press report</span></a><span data-dcnode-id="1096" instrument_node="">). There was however no majority in Parliament for a particular form of Brexit. The Parliament voted on three occasions (15 January, 12 and 29 March 2019) with a substantial majority each time against the withdrawal agreement that the government has negotiated with the EU. This political deadlock led to delaying Brexit initially by two weeks and subsequently until 31 October 2019. The Commons backed a bill to block a no-deal departure on 4 September 2019 (see </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/uk-mps-back-bill-to-block-no-deal-brexit" target="_blank"><span data-dcnode-id="1095" instrument_node="">press report</span></a><span data-dcnode-id="1093" instrument_node="">). As a result, Brexit was postponed again until 31 January 2020 (see </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/eu-agrees-to-january-31-brexit-extension" target="_blank"><span data-dcnode-id="1092" instrument_node="">press report</span></a><span data-dcnode-id="1090" instrument_node="">).</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1085"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">The general election on 12 December 2019</span></strong></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Although 50.8% of all votes went to parties critical of Brexit and only 45.7% to Brexit supporters, Prime Minister Boris Johnson was able to win most of the seats in Parliament thanks to the electoral system and the fragmented opposition. The Labour Party is far behind and has achieved the worst result since 1935. Johnson has a larger majority than Margaret Thatcher in 1987. The Tories have won the fourth election in a row and after nine years will be able to govern for another five years. Scotland's quest for independence has received a new boost. The Scottish National Party has won three quarters of all seats in Scotland, which is an important argument for another independence referendum.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1078"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The legal situation after 1 February 2020</span></strong></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">With the withdrawal from the EU, almost nothing did change, since the withdrawal agreement includes a transition period until 31 December 2020. During this period the UK was no longer a member state, but had to comply with EU law without having a say (comparable to Norway). During the transition period, the future relationship with the EU was negotiated.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><ul data-dcnode-id="1068"><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1070"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Masses of customs paperwork and increased costs for traders are becoming reality</span></strong></li><span data-dcnode-id="1069" instrument_node="">
</span></ul><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">On 13 July 2020 the UK government unveiled a guide detailing new regulations for hauliers exchanging goods with EU member countries. Hundreds of millions of customs forms will be required each year, collectively costing firms billions of pounds. Britain is also set to hire thousands more customs staff and build new truck parks and border control posts near ports (see </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/brexit-britain-takes-shape-paperwork-red-tape-bureaucracy" target="_blank"><span data-dcnode-id="1065" instrument_node="">press report</span></a><span data-dcnode-id="1063" instrument_node="">).</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1058" instrument_node="">
</span><h2 data-dcnode-id="1055"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Do British EWC members lose their mandate?</span></strong></h2><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Prior to 15 December 1999 there was no EWC legislation in the United Kingdom. Nevertheless, at that time many large British companies had established a EWC. The EWC agreement was then, for example under Belgian, German or French jurisdiction. Usually the UK workforce was also integrated into the EWC. In companies with headquarters in Switzerland, the Swiss workforce is represented on the EWC in over 70% of the cases. This suggests that in practice, a massive loss of British mandates will probably not happen. The situation is different in EWC agreements under British jurisdiction. It remains entirely uncertain, as to whether or not they will continue to apply or have to be completely renegotiated.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">At the conservative party convention held in Birmingham, government members declared on 2 October 2016, that the currently applicable labour legislation would not be touched. On 8 August 2019, the UK government said it will not abolish the British EWC legislation (TICER 2010), but freeze it. All European works councils already in existence on British soil, would continue to operate and no British delegate in continental-European EWCs would lose his mandate. Furthermore, requests for establishing a European works council, which have been registered before the end of the transition period, are to remain valid and may be negotiated up to the conclusion. However it would no longer be possible in the future to establish new European works councils under British jurisdiction.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><img alt="" data-dcnode-id="1047" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="1046" instrument_node=""> </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/participating-in-a-european-works-council%23european-works-councils" target="_blank"><span data-dcnode-id="1045" instrument_node="">UK government guidance on the legal situation as of 1 January 2021</span></a></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1036"><img alt="" data-dcnode-id="1041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="1040" instrument_node=""> </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uni-europa.org/wp-content/uploads/2021/01/ETUF-recommendations-to-EWC-SE-on-Brexit_Jan-2021-update-EN.pdf" target="_blank"><span data-dcnode-id="1039" instrument_node="">Trade Union Recommendations for EWC and SE Agreements</span></a><span data-dcnode-id="1037" instrument_node=""> (January 2021)</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1032" instrument_node="">
</span><h2 data-dcnode-id="1029"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">The economy after the referendum</span></strong></h2><span data-dcnode-id="1028" instrument_node="">
</span><ul data-dcnode-id="773"><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024"><span data-dcnode-id="1026" instrument_node="">The Swiss pharmaceutical group Roche warns of drug shortages in the United Kingdom and will reconsider its investments there. (Press report, 21 July 2016)</span><br data-dcnode-id="1025"></span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">Japanese businesses with their European headquarters in the UK may decide to transfer their head-office to continental Europe, says Japan's government. (</span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2016/sep/04/japan-brexit-demands-range-from-possible-to-fanciful"><span data-dcnode-id="1020" instrument_node="">Press report, 4 September 2016</span></a><span data-dcnode-id="1018" instrument_node="">)</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Three-quarters of British chief executives say they are considering moving their headquarters or some of their operations outside the UK as a result of Brexit. (</span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wsj.com/articles/british-ceos-consider-relocation-after-brexit-kpmg-survey-1474879279"><span data-dcnode-id="1014" instrument_node="">Press report, 26 September 2016</span></a><span data-dcnode-id="1012" instrument_node="">)</span></li><span data-dcnode-id="1010" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">“Have a break, have a Brexit!” Swiss food giant Nestlé has warned that it may have to put up prices of Nescafé, KitKat and other products because of the falling pound. (</span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailymail.co.uk/news/article-3858556/Nestle-threatens-raise-price-Kit-Kats-plunging-pound.html"><span data-dcnode-id="1008" instrument_node="">Press report, 21 October 2016</span></a><span data-dcnode-id="1006" instrument_node="">)</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">Ratings agency Moody's announced on 2 November 2016 to downgrade the UK's sovereign rating if the UK lost access to the Single Market (see </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moodys.com/research/Moodys-UK-sovereign-rating-would-be-downgraded-if-the-UK--PR_357447"><span data-dcnode-id="1002" instrument_node="">announcement</span></a><span data-dcnode-id="1000" instrument_node="">).</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">Brexit vote’s blow to the economy would force the government to borrow £122bn more than hoped, admits Chancellor Philip Hammond. (</span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2016/nov/23/philip-hammond-brexit-vote-borrowing-autumn-statement"><span data-dcnode-id="996" instrument_node="">Press report, 23 November 2016</span></a><span data-dcnode-id="994" instrument_node="">)</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">More than 100 companies based in the City of London inquiring about relocating to Ireland after Brexit. (</span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2016/dec/25/uk-banks-financial-firms-moving-ireland"><span data-dcnode-id="990" instrument_node="">Press report, 25 December 2016</span></a><span data-dcnode-id="988" instrument_node="">)</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Goldman Sachs has suspended plans to move key operations from the US to London and HSBC and UBS warn they will have to relocate staff out of Britain. (</span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2017/jan/19/goldman-sachs-uk-brexit-us-city-hsbc-ubs-london"><span data-dcnode-id="984" instrument_node="">Press report, 19 January 2017</span></a><span data-dcnode-id="982" instrument_node="">)</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">Citigroup plans new operations away from London after Brexit. (</span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2017/jan/24/citigroup-new-operations-away-london-brexit-eu-financial-hub"><span data-dcnode-id="978" instrument_node="">Press report, 24 January 2017</span></a><span data-dcnode-id="976" instrument_node="">)</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">According to a new study, one in seven businesses active in Britain is considering moving to the Continent as a result of Brexit. The top destination is Germany. (</span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/germany-rated-best-for-business-post-brexit-report"><span data-dcnode-id="972" instrument_node="">Press report, 31 January 2017</span></a><span data-dcnode-id="970" instrument_node="">)</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">Ryanair will move future investment away from the UK and into its European operations as a result of Brexit. (</span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//uk.businessinsider.com/ryanair-uk-investment-brexit-vote-2017-2"><span data-dcnode-id="966" instrument_node="">Press report, 6 February 2017</span></a><span data-dcnode-id="964" instrument_node="">)</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="961" instrument_node="">According to the Institute for Fiscal Studies, Britain is set for a return to falling real pay later this year, with this decade now set to be the worst for pay growth since the Napoleonic wars.</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">(</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2017/mar/09/uk-pay-growth-budget-resolution-foundation"><span data-dcnode-id="958" instrument_node="">Press report, 9 March 2017</span></a><span data-dcnode-id="956" instrument_node="">)</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">40% of games companies based in the UK are considering relocating out of the country in the wake of Brexit. The UK boasts more than 2,000 games companies, with 12,100 full-time employees. (</span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2017/mar/30/uk-games-companies-leaving-brexit-vote-eu-workers"><span data-dcnode-id="952" instrument_node="">Press report, 30 March 2017</span></a><span data-dcnode-id="950" instrument_node="">)</span></li><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">Britain’s essential role in the global aerospace industry could come under pressure from Brexit, since it is “hardwired” into the global supply chain. (</span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/business/2017/04/11/britains-essential-role-global-aerospace-may-come-pressure-brexit"><span data-dcnode-id="946" instrument_node="">Press report, 11 April 2017</span></a><span data-dcnode-id="944" instrument_node="">)</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">One in five small business employers have EU staff and one-third do business with the EU. Brexit could force small businesses to shut down or move abroad. (</span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/british-businesses-fear-losing-eu-workers-after-brexit"><span data-dcnode-id="940" instrument_node="">Press report, 25 April 2017</span></a><span data-dcnode-id="938" instrument_node="">)</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">The largest global banks in London plan to move about 9,000 jobs to the continent in the next two years. (</span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/business/news/brexit-latest-news-banks-move-9000-jobs-britain-mainland-europe-eu-european-union-jpmorgan-hsbc-a7724231.html"><span data-dcnode-id="934" instrument_node="">Press report, 8 May 2017</span></a><span data-dcnode-id="932" instrument_node="">)</span></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Farms have been hit with a shortage of the migrant workers that Britain relies on to bring in the fruit and vegetable harvests. (</span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2017/jun/22/farms-hit-by-labour-shortage-as-migrant-workers-shun-racist-uk"><span data-dcnode-id="928" instrument_node="">Press report, 22 June 2017</span></a><span data-dcnode-id="926" instrument_node="">)</span></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">The European Central Bank is making a bid for authority over euro clearing after Brexit, which could cost 232,000 British jobs. Frankfurt is so far beating out other cities in luring business from London. (</span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2017-06-23/britain-s-financial-power-is-already-seeping-away"><span data-dcnode-id="922" instrument_node="">Press report, 23 June 2017</span></a><span data-dcnode-id="920" instrument_node="">)</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">Leaving the EU could have “catastrophic” effects on access to new potentially life-saving medicines for decades, according to health economics consultant. (</span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/uk/politics/brexit-latest-news-life-saving-drugs-access-catastrophic-effect-healthcare-treatment-expert-ema-mhra-a7810896.html"><span data-dcnode-id="916" instrument_node="">Press report, 27 June 2017</span></a><span data-dcnode-id="914" instrument_node="">)</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">Prospect of seasonal labour crisis prompts calls for introducing new scheme to ensure UK farms have enough workers. (</span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2017/jul/06/british-strawberries-could-cost-50-more-because-of-brexit-mps-told"><span data-dcnode-id="910" instrument_node="">Press report, 6 July 2017</span></a><span data-dcnode-id="908" instrument_node="">)</span></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">US bank JP Morgan with 16,000 UK staff has warned that up to three-quarters of its workforce could be transferred to EU countries after Brexit. (</span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/uk/home-news/brexit-latest-jobs-jp-morgan-us-bank-moving-staff-eu-a7836366.html"><span data-dcnode-id="904" instrument_node="">Press report, 11 July 2017</span></a><span data-dcnode-id="902" instrument_node="">)</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">EasyJet is creating a new airline in Vienna to continue flying in the European Union after Brexit. (</span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.sky.com/story/easyjet-launches-bid-to-fly-in-eu-after-brexit-10948116"><span data-dcnode-id="898" instrument_node="">Press report, 14 July 2017</span></a><span data-dcnode-id="896" instrument_node="">)</span></li><span data-dcnode-id="894" instrument_node="">
</span><li data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">Deutsche Bank envisions shifting 4,000 jobs, almost half its UK staff, to the European continent. (</span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2017-08-01/deutsche-bank-brexit-base-case-said-to-see-4-000-jobs-move-to-eu"><span data-dcnode-id="892" instrument_node="">Press report, 1 August 2017</span></a><span data-dcnode-id="890" instrument_node="">)</span></li><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">Leaving the EU will reverse the progress made in past decades and may wipe out small suppliers, says Britain's motor society. (</span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2017/aug/04/uk-car-industry-facing-an-utterly-demoralising-brexit"><span data-dcnode-id="886" instrument_node="">Press report, 4 August 2017</span></a><span data-dcnode-id="884" instrument_node="">)</span></li><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">The UK produces only 60% of its own food and must increase production to avoid food insecurity after leaving the EU. (</span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2017/aug/05/brexit-could-leave-britain-with-a-bare-larder-farmers-warn"><span data-dcnode-id="880" instrument_node="">Press report, 5 August 2017</span></a><span data-dcnode-id="878" instrument_node="">)</span></li><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Relocation plans and a banking exodus from London will result in the creation of up to 87,667 new roles throughout the Rhein-Main-Region in Germany. (</span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.standard.co.uk/news/london/brexit-exodus-from-london-to-create-80000-jobs-in-frankfurt-a3619676.html"><span data-dcnode-id="874" instrument_node="">Press report, 25 August 2017</span></a><span data-dcnode-id="872" instrument_node="">)</span></li><span data-dcnode-id="870" instrument_node="">
</span><li data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">According to a survey, 63% of EU companies expect to move some of their supply chains out of Britain. (</span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/most-eu-firms-plan-retreat-from-uk-suppliers"><span data-dcnode-id="868" instrument_node="">Press report, 6 November 2017</span></a><span data-dcnode-id="866" instrument_node="">)</span></li><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">The chemical industry is “highly reliant on EU supply chains” and Brexit will be putting 500,000 direct and indirect jobs in jeopardy. (</span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-politics-43334860"><span data-dcnode-id="862" instrument_node="">BBC report, 8 March 2018</span></a><span data-dcnode-id="860" instrument_node="">)</span></li><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">More than a fifth of manufacturing firms are planning to lay off workers to cope with the costs of Brexit, according to a survey. (</span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2018/mar/31/manufacturing-firms-plan-job-cuts-after-brexit"><span data-dcnode-id="856" instrument_node="">Press report, 31 March 2018</span></a><span data-dcnode-id="854" instrument_node="">)</span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="851" instrument_node="">Jaguar Land Rover, UK's largest car manufacturer with around 40,000 employees, has warned that a “bad” Brexit deal may force it to close factories. (</span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2018/jul/04/jaguar-land-rovers-80bn-uk-investment-plan-at-risk-after-hard-brexit"><span data-dcnode-id="850" instrument_node="">Press report, 4 July 2018</span></a><span data-dcnode-id="848" instrument_node="">)</span></li><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">Panasonic Europe will transfer its regional headquarters from Bracknell in the UK to Amsterdam. (</span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-45351288"><span data-dcnode-id="844" instrument_node="">BBC report, 30 August 2018</span></a><span data-dcnode-id="842" instrument_node="">)</span></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">British manufacturers are pulling back sharply on investment plans due to mounting uncertainty over Brexit. (</span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/oct/01/uk-manufacturers-cutting-spending-plans-due-to-brexit"><span data-dcnode-id="838" instrument_node="">Press report, 1 October 2018</span></a><span data-dcnode-id="836" instrument_node="">)</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">German manufacturer Schaeffler has said Brexit is a factor in its decision to close two UK plants, with 500 jobs expected to be lost. (</span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.sky.com/story/german-manufacturer-schaeffler-to-shut-two-uk-plants-after-brexit-11546123"><span data-dcnode-id="832" instrument_node="">Press report, 6 November 2018</span></a><span data-dcnode-id="830" instrument_node="">)</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">London will lose up to 700bn £ in assets to rival financial hub Frankfurt, Germany by March 2019 as 37 banks start to transfer business. (</span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2018/nov/29/london-to-lose-800bn-to-frankfurt-as-banks-prepare-for-brexit"><span data-dcnode-id="826" instrument_node="">Press report, 29 November 2018</span></a><span data-dcnode-id="824" instrument_node="">)</span></li><span data-dcnode-id="822" instrument_node="">
</span><li data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Farmers are finding Brexit as disruptive as a major disease outbreak, and food companies are in danger of moving out of the UK or scaling back their investment. (</span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2019/feb/08/brexit-as-disruptive-as-disease-outbreak-says-farmers-leader"><span data-dcnode-id="820" instrument_node="">Press report, 8 February 2019</span></a><span data-dcnode-id="818" instrument_node="">)</span></li><span data-dcnode-id="816" instrument_node="">
</span><li data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">The University of Oxford finds that the UK's car industry has lost 9% of its volume due to Brexit, and overall investment has dropped by 80% over the last three years (see </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbs.ox.ac.uk/news/death-thousand-cuts" target="_blank"><span data-dcnode-id="814" instrument_node="">report, 10 April 2019</span></a><span data-dcnode-id="812" instrument_node="">).</span></li><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">British Steel enters insolvency, blaming partly “Brexit-related issues” for its difficulties (see </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2019/may/22/british-steel-to-enter-insolvency-after-rescue-talks-with-government-fail" target="_blank"><span data-dcnode-id="808" instrument_node="">press report, 23 May 2019</span></a><span data-dcnode-id="806" instrument_node="">).</span></li><span data-dcnode-id="804" instrument_node="">
</span><li data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">The economic growth for 2019 is just 1%, the weakest expansion outside a recession for more than half a century. </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2019/dec/27/uk-economy-faces-weakest-growth-outside-of-recession-since-second-world-war" target="_blank"><span data-dcnode-id="802" instrument_node="">(Press report, 27 December 2019</span></a><span data-dcnode-id="800" instrument_node="">)</span></li><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">British car manufacturing slumped to its lowest level since 2010, a decline of more than 14% on 2018. </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2020/jan/30/british-car-manufacturing-slumps-to-lowest-level-since-2010" target="_blank"><span data-dcnode-id="796" instrument_node="">(Press report, 30 January 2020</span></a><span data-dcnode-id="794" instrument_node="">)</span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">At the beginning of 2021, it will become illegal for UK banks to provide services for British customers in the EU without applying for new banking licences. </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/brits-in-eu-face-closure-of-uk-bank-accounts-over-lack-of-post-brexit-rules-report" target="_blank"><span data-dcnode-id="790" instrument_node="">(Press report, 20 September 2020</span></a><span data-dcnode-id="788" instrument_node="">)</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">U.S. carmaker Ford closed its Bridgend plant in South Wales. (</span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-wales-54267443" target="_blank"><span data-dcnode-id="784" instrument_node="">BBC report, 25 September 2020</span></a><span data-dcnode-id="782" instrument_node="">)</span></li><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">On 23 October 2020, a trade agreement between the UK and Japan was signed. The new deal is very similar to the existing EU-Japan deal, but a deal between the UK and the EU is still crucial for Japanese business. </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-54654814" target="_blank"><span data-dcnode-id="778" instrument_node="">(BBC report, 23 October 2020</span></a><span data-dcnode-id="776" instrument_node="">)</span></li><span data-dcnode-id="774" instrument_node="">
</span></ul><span data-dcnode-id="772" instrument_node="">
</span><h2 data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="769" instrument_node="">
</span><h2 data-dcnode-id="766"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The economy after the Brexit transition period</span></strong></h2><span data-dcnode-id="765" instrument_node="">
</span><ul data-dcnode-id="649"><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">Ireland has ramped up direct shipping routes to mainland Europe guaranteeing freight remains inside the single market and customs union. </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/ireland-seeks-its-own-landbridge-to-continental-eu" target="_blank"><span data-dcnode-id="762" instrument_node="">(Press report, 7 January 2021</span></a><span data-dcnode-id="760" instrument_node="">)</span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">Hundreds of UK companies could switch operations to EU countries in what is threatening to become a dramatic exodus of investment and jobs. </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/jan/30/uk-firms-plan-to-shift-across-channel-after-brexit-chaos" target="_blank"><span data-dcnode-id="756" instrument_node="">(Press report, 30 January 2021</span></a><span data-dcnode-id="754" instrument_node="">)</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">Fish exporters face extensive paperwork, rising costs and border delays following the end of the Brexit transition period (see </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-55887043" target="_blank"><span data-dcnode-id="750" instrument_node="">BBC report, 5 February 2021</span></a><span data-dcnode-id="748" instrument_node="">). This is particularly difficult for fishermen in Cornwall (see </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.sky.com/story/brexit-uk-fishermen-fear-losing-their-homes-as-export-ban-bites-12223329" target="_blank"><span data-dcnode-id="747" instrument_node="">press report, 20 February 2021</span></a><span data-dcnode-id="745" instrument_node="">).</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">Half of British exporters to the EU are facing difficulties with mounting Brexit red tape and border disruption, according to the British Chambers of Commerce (see </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/feb/11/half-of-uk-exporters-to-eu-are-having-brexit-difficulties-survey-finds" target="_blank"><span data-dcnode-id="741" instrument_node="">press report, 11 February 2021</span></a><span data-dcnode-id="739" instrument_node="">).</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">London stock trading is the first casualty of a post-Brexit battle over financial services. Amsterdam is now more important in handling share transactions (see </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/amsterdam-set-to-remain-europes-top-share-trading-capital-over-london-as-brexit-sets-in" target="_blank"><span data-dcnode-id="735" instrument_node="">press report, 11 February 2021</span></a><span data-dcnode-id="733" instrument_node="">).</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">The number of Japanese firms based in the UK fell 12% between 2014 and 2019, the number of firms in the Netherlands grew by 67% over the same period (see </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/brexit-trade-japan-exodus-firms-uk-eu" target="_blank"><span data-dcnode-id="729" instrument_node="">press report, 9 March 2021</span></a><span data-dcnode-id="727" instrument_node="">).</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">Whisky, cheese and chocolate producers have suffered the biggest post-Brexit export losses and exports of salmon and beef almost stopped altogether. UK food and drink exports to Germany is down 81% (see </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/mar/22/data-shows-collapse-of-uk-food-and-drink-exports-post-brexit" target="_blank"><span data-dcnode-id="723" instrument_node="">press report, 22 March 2021</span></a><span data-dcnode-id="721" instrument_node="">).</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">More than 440 firms operating in the UK banking and finance sector have relocated parts of their business, moved staff or established new EU entities due to Brexit (see </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/brexit-sparks-1-trillion-uk-assets-switch-to-eu-study" target="_blank"><span data-dcnode-id="717" instrument_node="">press report, 16 April 2021</span></a><span data-dcnode-id="715" instrument_node="">).</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">Brexit-related&nbsp;driver shortage hits supermarket shelves affecting fresh goods such as meat and milk (see </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/aug/03/call-for-action-as-uk-driver-shortage-hits-supermarket-shelves" target="_blank"><span data-dcnode-id="711" instrument_node="">press report, 3 August 2021</span></a><span data-dcnode-id="709" instrument_node="">).</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">In the first half of 2021, the UK food and drink sector has taken a £2 billion hit in lost exports to the EU (see </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/sep/02/brexit-uk-food-drink-exports-eu-disastrous-decline" target="_blank"><span data-dcnode-id="705" instrument_node="">press report, 2 September 2021</span></a><span data-dcnode-id="703" instrument_node="">).</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">UK is losing its overall competitiveness following Brexit and will fall out of Germany's top ten trading partners for the first time in 70 years (see </span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/sep/10/uk-trade-with-eu-falls-as-brexit-and-covid-drive-down-exports" target="_blank"><span data-dcnode-id="699" instrument_node="">press report, 10 September 2021</span></a><span data-dcnode-id="697" instrument_node="">).</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">Shortage of truck drivers, a result of workers leaving the country following Brexit, has led to fuel rationing and some pumps running dry (see </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/long-queues-and-fuel-rationing-as-britain-faces-truck-driver-shortage" target="_blank"><span data-dcnode-id="693" instrument_node="">press report, 27 September 2021</span></a><span data-dcnode-id="691" instrument_node="">).</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">Restaurants and hotels facing 18% inflation due to supply chain chaos and labour shortages (see </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2021/oct/19/restaurants-and-hotels-facing-terrifying-18-inflation-mps-told" target="_blank"><span data-dcnode-id="687" instrument_node="">press report, 19 October 2021</span></a><span data-dcnode-id="685" instrument_node="">).</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="682" instrument_node="">The impact of Brexit on the UK economy will reduce the GDP by about 4%, the chairman of the Office for Budget Responsibility has said (see </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-59070020" target="_blank"><span data-dcnode-id="681" instrument_node="">BBC report, 27 October 2021</span></a><span data-dcnode-id="679" instrument_node="">).</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">The volume of traffic through Dublin Port in the first nine months of 2021 with Britain is down 21.2%, to and from Continental ports increased by 36.3% (see </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rte.ie/news/business/2021/1026/1255971-dublin-port-traffic-down-3-3-in-first-nine-months" target="_blank"><span data-dcnode-id="675" instrument_node="">press report, 27 October 2021</span></a><span data-dcnode-id="673" instrument_node="">).</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">British Meat producers send beef to Ireland amid shortages of butchers and pork producers send pigs to the Netherlands for butchering and packing (see </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-59150767" target="_blank"><span data-dcnode-id="669" instrument_node="">BCC report, 3 November 2021</span></a><span data-dcnode-id="667" instrument_node="">).</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Britain's share of imports to Ireland has been slashed by two-thirds because of Brexit, while Northern Ireland's share of UK exports to Ireland is surging (see </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/ireland-brexit-trade-britain-northern-ireland" target="_blank"><span data-dcnode-id="663" instrument_node="">press report, 21 December 2021</span></a><span data-dcnode-id="661" instrument_node="">).</span></li><span data-dcnode-id="659" instrument_node="">
</span><li data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">UK exporters are continuing to lose market share, UK exports of goods to the EU have fallen by 12% in 2021 compared with 2018 (see </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2022/feb/11/uk-exports-to-eu-fell-by-20bn-last-year-new-ons-data-shows" target="_blank"><span data-dcnode-id="657" instrument_node="">press report, 11 February 2022</span></a><span data-dcnode-id="655" instrument_node="">).</span></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Customs duties paid by UK businesses increased by 64% in the year to 31 January 2022 (see</span></li><span data-dcnode-id="650" instrument_node="">
</span></ul><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="644"><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/uk-firms-stung-by-e5bn-in-customs-fees-as-confusion-reigns-over-eu-trade-pact" target="_blank"><span data-dcnode-id="647" instrument_node="">press report, 24 February 2022</span></a><span data-dcnode-id="645" instrument_node="">).</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="637"><img alt="" data-dcnode-id="642" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="641" instrument_node=""> Labour shortages caused by Brexit have badly affected businesses across the food and farming sector and could cause “permanent” damage (see </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/uk-europe/news/post-brexit-labour-shortages-risk-permanent-damage-to-uk-farming" target="_blank"><span data-dcnode-id="640" instrument_node="">press report, 7 April 2022</span></a><span data-dcnode-id="638" instrument_node="">).</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">&nbsp;</span></p><span data-dcnode-id="633" instrument_node="">
</span><h2 data-dcnode-id="630"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Brexit could lead to the “disintegration” of the whole UK</span></strong></h2><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="625"><em data-dcnode-id="626"><span data-dcnode-id="628" instrument_node="">“People thought there was something patriotic or particularly pro-British about leaving the EU only to discover that it led to the disintegration of our country.” (William Hague, former Foreign Secretary)</span><br data-dcnode-id="627"></em></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="619"><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">“I have met in my life two big destroyers: Gorbachev, who destroyed the Soviet Union, and Cameron, who destroyed the United Kingdom.” (Jean-Claude Juncker, former European Commission president</span></em><em data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">)</span></em></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">1. Scottish independence</span></strong></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">Scotland voted to remain in the European Union. The Scottish Government started discussions with the EU institutions and other member states about Scotland remaining in the EU. Since early August 2016 there is a call for a referendum whether the country should continue as a monarchy or republic. On 30 March 2017 Scotland's first minister formally asked for powers to hold a second Scottish independence referendum (see </span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-scotland-39449459"><span data-dcnode-id="612" instrument_node="">BBC report</span></a><span data-dcnode-id="610" instrument_node="">).</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">The Labour Party published a plan for a federal UK, a “third option” for Scotland's future. The Scottish government should be given the power to set VAT rates and sign international treaties (see </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-scotland-scotland-politics-39309133"><span data-dcnode-id="606" instrument_node="">BBC report</span></a><span data-dcnode-id="604" instrument_node="">).</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="601" instrument_node="">Former Prime Minister Tony Blair said in January 2016, that he thinks Scotland will leave the United Kingdom if the United Kingdom leaves the European Union (see </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-scotland-scotland-politics-35412473"><span data-dcnode-id="600" instrument_node="">BBC report</span></a><span data-dcnode-id="598" instrument_node="">). The U.S. bank JP Morgan said on 29 June 2016 it now expects Scotland to vote for independence and introduce its own currency (see </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reuters.com/article/us-britain-eu-scotland-jpmorgan-idUSKCN0ZF15Z"><span data-dcnode-id="597" instrument_node="">press report</span></a><span data-dcnode-id="595" instrument_node="">). Scotland is looking to open its own trade representations abroad and signed its first economic collaboration declaration with Bavaria on 24 March 2017 (see </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/when-scotland-met-germany"><span data-dcnode-id="594" instrument_node="">press report</span></a><span data-dcnode-id="592" instrument_node="">).</span></p><span data-dcnode-id="590" instrument_node="">
</span><ul data-dcnode-id="583"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="585"><strong data-dcnode-id="586"><span data-dcnode-id="588" instrument_node="">Scotland rejoining EU “could be speedy”</span><br data-dcnode-id="587"></strong></li><span data-dcnode-id="584" instrument_node="">
</span></ul><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="581" instrument_node="">Spain's foreign minister confirmed his government would not veto any attempt from Scotland to join the EU after Brexit (see </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-scotland-scotland-politics-39507794" target="_blank"><span data-dcnode-id="580" instrument_node="">BBC report</span></a><span data-dcnode-id="578" instrument_node="">). The former European Council president Donald Tusk said, Brussels “would be enthusiastic” if an independent Scotland sought to rejoin the EU (see </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/donald-tusk-scotland-rejoin-eu" target="_blank"><span data-dcnode-id="577" instrument_node="">press report</span></a><span data-dcnode-id="575" instrument_node="">).</span></p><span data-dcnode-id="573" instrument_node="">
</span><ul data-dcnode-id="566"><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="568"><strong data-dcnode-id="569"><span data-dcnode-id="571" instrument_node="">Scottish Parliament against the post-Brexit trade deal -- 30 December 2020</span><br data-dcnode-id="570"></strong></li><span data-dcnode-id="567" instrument_node="">
</span></ul><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">A motion said parliament “does not consent to” the UK legislation, which is seen as “a principled vote against Brexit” and in favour of Scottish independence (see </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-scotland-scotland-politics-55474218" target="_blank"><span data-dcnode-id="563" instrument_node="">BBC report</span></a><span data-dcnode-id="561" instrument_node="">).</span></p><span data-dcnode-id="559" instrument_node="">
</span><ul data-dcnode-id="553"><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">British government to tackle Scottish independence threat -- 25 February 2021</span></strong></li><span data-dcnode-id="554" instrument_node="">
</span></ul><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">Boris Johnson has set up a cabinet committee to focus on keeping the UK together (see </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/feb/25/boris-johnson-sets-up-committee-to-focus-on-keeping-uk-together" target="_blank"><span data-dcnode-id="550" instrument_node="">press report</span></a><span data-dcnode-id="548" instrument_node="">).</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="536"><img alt="" data-dcnode-id="545" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="544" instrument_node="">&nbsp; </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">British government&nbsp;would not stand in the way of another vote</span></strong><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node=""> -- 1 August 202</span></strong><strong data-dcnode-id="537"><span data-dcnode-id="539" instrument_node="">1</span><br data-dcnode-id="538"></strong></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">For the first time, the Cabinet Office minister said if the public desire a second referendum on Scottish independence, “one would occur” (see </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/aug/01/scottish-independence-vote-will-happen-if-public-wants-it-says-michael-gove" target="_blank"><span data-dcnode-id="533" instrument_node="">press report</span></a><span data-dcnode-id="531" instrument_node="">).</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="526"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">2. Irish reunification</span></strong></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">An independence referendum is under discussion on Irish reunification.</span></p><span data-dcnode-id="522" instrument_node="">
</span><ul data-dcnode-id="516"><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="518"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">European leaders to recognise a united Ireland -- 29 April 2017</span></strong></li><span data-dcnode-id="517" instrument_node="">
</span></ul><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="514" instrument_node="">The 2 March 2017 poll brought an end to the unionist majority in the Northern Ireland Assembly. The two main nationalist parties now have more seats than the two main unionist parties (see </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2017/mar/05/the-guardian-view-on-the-northern-ireland-assembly-election-a-warning-to-brexit-britain"><span data-dcnode-id="513" instrument_node="">press report</span></a><span data-dcnode-id="511" instrument_node="">). Population change will bring a majority for Irish unity in a few years' time anyway (see </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politics.co.uk/comment-analysis/2017/03/17/it-s-now-clear-northern-ireland-is-leaving-the-union"><span data-dcnode-id="510" instrument_node="">political analysis</span></a><span data-dcnode-id="508" instrument_node="">). If the island reunifies, the north will automatically regain EU membership (see </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/european-council-will-nod-to-prospect-of-united-ireland"><span data-dcnode-id="507" instrument_node="">press report</span></a><span data-dcnode-id="505" instrument_node="">). So the EU has done something it has never done before: it has offered an incentive to part of an existing state to join another state.</span></p><span data-dcnode-id="503" instrument_node="">
</span><ul data-dcnode-id="497"><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="499"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Northern Ireland Assembly against Brexit bill -- 20 January 2020</span></strong></li><span data-dcnode-id="498" instrument_node="">
</span></ul><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="495" instrument_node="">The motion was to “affirm that the assembly does not agree to give its consent”, because the UK government's Brexit plans will do “untold damage” to Northern Ireland businesses (see </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-northern-ireland-51174448" target="_blank"><span data-dcnode-id="494" instrument_node="">BBC report</span></a><span data-dcnode-id="492" instrument_node="">).</span></p><span data-dcnode-id="490" instrument_node="">
</span><ul data-dcnode-id="480"><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="482"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Brexit is a gamechanger for Northern Ireland</span></strong><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node=""> -- 1 January 202</span></strong><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">1</span></strong></li><span data-dcnode-id="481" instrument_node="">
</span></ul><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">England, Scotland and Wales left the European Union's single market for goods on 31 December 2020 but Northern Ireland did not. It's hugely symbolic that Northern Ireland will now be treated differently to the rest of the UK (see </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.sky.com/story/a-dagger-at-the-heart-of-the-union-brexit-reality-for-northern-ireland-will-fuel-nationalist-hopes-of-irish-unity-12176596" target="_blank"><span data-dcnode-id="477" instrument_node="">press report</span></a><span data-dcnode-id="475" instrument_node="">).</span></p><span data-dcnode-id="473" instrument_node="">
</span><ul data-dcnode-id="463"><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="465"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Disruption to trade across the Irish Sea border</span></strong><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node=""> -- 13 January 202</span></strong><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">1</span></strong></li><span data-dcnode-id="464" instrument_node="">
</span></ul><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">There are shortages in supermarkets due to Brexit checks on food goods entering Northern Ireland from the rest of the UK (see </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-northern-ireland-55641544" target="_blank"><span data-dcnode-id="460" instrument_node="">BBC report</span></a><span data-dcnode-id="458" instrument_node="">).</span></p><span data-dcnode-id="456" instrument_node="">
</span><ul data-dcnode-id="446"><span data-dcnode-id="455" instrument_node="">
</span><li data-dcnode-id="448"><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Legal action over alleged breach of Northern Ireland Protocol</span></strong><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node=""> -- 15 March 202</span></strong><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">1</span></strong></li><span data-dcnode-id="447" instrument_node="">
</span></ul><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">The EU has begun legal action, because the UK delayed the introduction of new sea border checks. It could lead to the UK having to defend its actions at the European Court of Justice (see </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-northern-ireland-56381046" target="_blank"><span data-dcnode-id="443" instrument_node="">BBC report</span></a><span data-dcnode-id="441" instrument_node="">).</span></p><span data-dcnode-id="439" instrument_node="">
</span><ul data-dcnode-id="429"><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="431"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Two-thirds of voters in Northern Ireland want a vote over its place in the UK</span></strong><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node=""> -- 29 August 202</span></strong><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">1</span></strong></li><span data-dcnode-id="430" instrument_node="">
</span></ul><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="427" instrument_node="">There are concerns within the UK government that the fallout from Brexit could lead to increased support for a united Ireland (see </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/aug/29/majority-of-northern-irish-voters-want-vote-on-staying-in-uk" target="_blank"><span data-dcnode-id="426" instrument_node="">press report</span></a><span data-dcnode-id="424" instrument_node="">).</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="413"><img alt="" data-dcnode-id="421" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="420" instrument_node="">&nbsp; </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">65% increase of Northern Ireland goods exported to the Republic</span></strong><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node=""> -- 15 February 2022</span></strong><strong data-dcnode-id="414"><br data-dcnode-id="415"></strong></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">Northern Ireland has remained in the EU's single market for goods. Therefore it has become more difficult for businesses in either part of Ireland to import goods from Great Britain (see </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-northern-ireland-60390800" target="_blank"><span data-dcnode-id="410" instrument_node="">BBC report</span></a><span data-dcnode-id="408" instrument_node="">).</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="398"><img alt="" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="404" instrument_node="">&nbsp;&nbsp;</span><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Court of Appeal rejects challenge to Northern Ireland protocol</span></strong><strong data-dcnode-id="399"><span data-dcnode-id="401" instrument_node=""> -- 14 March 2022</span><br data-dcnode-id="400"></strong></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="396" instrument_node="">The Court of Appeal in Belfast dismissed a legal challenge to the Northern Ireland protocol launched by unionist politicians&nbsp;(see </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-northern-ireland-60738556" target="_blank"><span data-dcnode-id="395" instrument_node="">BBC report</span></a><span data-dcnode-id="393" instrument_node="">).</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="388"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">3. Status of London</span></strong></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="386" instrument_node="">London voted to remain in the EU. A </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.change.org/p/sadiq-khan-declare-london-independent-from-the-uk-and-apply-to-join-the-eu" target="_blank"><span data-dcnode-id="385" instrument_node="">petition calling to declare London independent from the UK</span></a><span data-dcnode-id="383" instrument_node=""> has received more than 180,000 signatures. Supporters of London's independence argued that London's demographic, culture and values are different from the rest of England, and that it should become a city state similar to Singapore, while remaining an EU member state (see </span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/voices/brexit-latest-london-independence-time-to-leave-uk-eu-referendum-sadiq-khan-boris-johnson-a7100601.html" target="_blank"><span data-dcnode-id="382" instrument_node="">press report</span></a><span data-dcnode-id="380" instrument_node="">).</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="374"><strong data-dcnode-id="375"><span data-dcnode-id="377" instrument_node="">4. Status of Wales</span><br data-dcnode-id="376"></strong></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">On 2 July 2016 demonstrations for the independence of Wales and to remain in the EU took place for the first time in two cities.</span></p><span data-dcnode-id="370" instrument_node="">
</span><ul data-dcnode-id="364"><span data-dcnode-id="369" instrument_node="">
</span><li data-dcnode-id="366"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Warning of inner-UK “trade war”</span></strong></li><span data-dcnode-id="365" instrument_node="">
</span></ul><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">On 18 March 2017, the first minister of Wales warned of a “trade war” between the nations of the United Kingdom after Brexit (see </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.com/news/uk-wales-politics-39311196"><span data-dcnode-id="361" instrument_node="">BBC report</span></a><span data-dcnode-id="359" instrument_node="">).</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="352"><img alt="" data-dcnode-id="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-betriebsrat.de/images/signs/newgelb.gif&amp;raw"><span data-dcnode-id="355" instrument_node=""> </span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Brexit could lead to Welsh independence</span></strong></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">For many years the number in favour of independence for Wales remained static on roughly 10%, but a poll in March 2021 showed a “dramatic uplift” with 40% backing independence and with most support amongst young people (see </span><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2021/mar/04/westminster-warned-as-poll-shows-record-backing-for-welsh-independence" target="_blank"><span data-dcnode-id="349" instrument_node="">press report</span></a><span data-dcnode-id="347" instrument_node="">).</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="344" instrument_node="">5. Status of Gibraltar</span><br data-dcnode-id="343"></strong></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="339" instrument_node="">Gibraltar voted with 96% majority to remain in the EU. As of 1 January 2021, Gibraltar has become part of the Schengen passport-free area with the sponsorship of Spain. This represents a turning point since Gibraltar was ceded to Britain in 1713 (see </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/what-the-post-brexit-gibraltar-deal-means-uk-spain" target="_blank"><span data-dcnode-id="338" instrument_node="">press report</span></a><span data-dcnode-id="336" instrument_node="">).</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">6. Falkland-Islands</span></strong></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="329" instrument_node="">Brexit could have “catastrophic” implications for the future and the sovereignty of the Falkland Islands. Argentina is watching developments closely (see </span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/uk-news/2017/apr/20/falkland-islands-argentina-brexit"><span data-dcnode-id="328" instrument_node="">press report</span></a><span data-dcnode-id="326" instrument_node="">).</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="321"><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">A new Constitution?</span></strong></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="319" instrument_node="">Since July 2015 the all-party Constitution Reform Group is already working on a new constitutional settlement for the United Kingdom: </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.constitutionreformgroup.co.uk/"><span data-dcnode-id="318" instrument_node="">http://www.constitutionreformgroup.co.uk</span></a></p><span data-dcnode-id="315" instrument_node="">
</span><ul data-dcnode-id="309"><span data-dcnode-id="314" instrument_node="">
</span><li data-dcnode-id="311"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Call for a “more federal UK”</span></strong></li><span data-dcnode-id="310" instrument_node="">
</span></ul><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="307" instrument_node="">On 28 March 2017, former British prime minister Gordon Brown called for the creation of councils for England’s regions (see </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/gordon-brown-brexit-an-opportunity-to-create-federal-uk-article-50-op-ed"><span data-dcnode-id="306" instrument_node="">press report</span></a><span data-dcnode-id="304" instrument_node="">). Andy Burnham, the first elected mayor of Greater Manchester, is seeking the establishment of a new body: the Council of the North (see </span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politico.eu/article/north-of-england-game-of-thrones-brexit-britain-andy-burnham"><span data-dcnode-id="303" instrument_node="">press report</span></a><span data-dcnode-id="301" instrument_node="">).</span></p><span data-dcnode-id="299" instrument_node="">
</span><ul data-dcnode-id="293"><span data-dcnode-id="298" instrument_node="">
</span><li data-dcnode-id="295"><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">“UK at risk of becoming failed state”</span></strong></li><span data-dcnode-id="294" instrument_node="">
</span></ul><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="291" instrument_node="">On 24 January 2021, Gordon Brown called for fundamental constitutional changes led by a “commission on democracy” that would “review the way the whole United Kingdom is governed” (see </span><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2021/jan/25/uk-at-risk-of-becoming-failed-state-says-gordon-brown" target="_blank"><span data-dcnode-id="290" instrument_node="">press report</span></a><span data-dcnode-id="288" instrument_node="">).</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">&nbsp;</span></p><span data-dcnode-id="283" instrument_node="">
</span><h2 data-dcnode-id="279"><strong data-dcnode-id="280"><span data-dcnode-id="282" instrument_node="">What is the most likely scenario?</span><br data-dcnode-id="281"></strong></h2><span data-dcnode-id="278" instrument_node="">
