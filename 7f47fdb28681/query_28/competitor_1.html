</span><h1 class="title black" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">BRIT 2022 Challenge</span></h1><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><img alt="" data-dcnode-id="563" height="345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unihub.mdx.ac.uk/__data/assets/image/0034/636289/brit-web-banner1160x345px.jpg&amp;raw" width="1160"></p><span data-dcnode-id="561" instrument_node="">
</span><div data-dcnode-id="553" id="new_content_container_601099_601099"><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="557"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Join MDX for the BRIT 2022 Challenge and raise awareness and funds for student mental health throughout the UK.</span></strong></h2><h3 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The challenge will run from 1 February – 3 March 2022.</span></h3><span data-dcnode-id="554" instrument_node="">
</span></div><span data-dcnode-id="552" instrument_node="">
</span><div data-dcnode-id="514" id="mdxmoves_points_638390"><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Are you taking part in the BRIT Challenge on MDXMoves? SUBMIT your Selfie Video and if we use it you are automatically awarded 2500 MDXMoves points</span></strong></p><p data-dcnode-id="545"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">VIDEO Criteria</span></strong></p><ul data-dcnode-id="538"><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">30 - 40 seconds long</span></li><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Film in portrait format</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Tell us and show us in your own words what activity you are doing. eg walking, cycling, etc</span></li></ul><p data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Complete these 2 phrases within your video</span></strong></p><ul data-dcnode-id="526"><li data-dcnode-id="532"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">" I enjoy MDXMoves because.....</span></strong></li><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">some examples you may want to think about could include -&nbsp;"it keeps me connected with friends, i enjoy the challenges, i like the rewards, i enjoy a free coffee every week, i like competing in the challenges, it keeps me motivated and active, it remonds me and challenges me to be active". etc...</span></li><li data-dcnode-id="527"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">" I'm taking part in the MDXMoves BRIT challenge, helping&nbsp;raise funds for young adult mental health- Join the challenge on MDXMoves"</span></strong></li></ul><p data-dcnode-id="520"><strong data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">SEND YOUR COMPLETED 30 SEC VIDEOES TO </span><a data-dcnode-id="523" href="mailto:t.hannan@mdx.ac.uk"><span data-dcnode-id="524" instrument_node="">T.hannan@mdx.ac.uk</span></a><span data-dcnode-id="522" instrument_node=""> BY MONDAY 14TH FEBRUARY 2022)</span></strong></p><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Please feel free to be creative as you like. Keep it fun, upbeat and if we use your video you will automatically be rewarded with 2500 MDXMoves points. Please email me if you have any questions.</span></p><p data-dcnode-id="516"><img alt="" data-dcnode-id="517" height="526" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unihub.mdx.ac.uk/__data/assets/image/0031/638392/Social-media-BRIT.jpg&amp;raw" width="801"></p><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span><div data-dcnode-id="463" id="new_content_container_600991_600991"><span data-dcnode-id="512" instrument_node="">
</span><h2 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">The Challenge</span></h2><h3 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">We have 2 challenges running this year, to suit all levels of activity.</span></h3><h4 data-dcnode-id="500"><span data-dcnode-id="507" instrument_node="">The </span><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">‘Step Challenge’ </span></strong><span data-dcnode-id="504" instrument_node="">and for the crazy ones amongst us we have the </span><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">‘Ultimate Challenge’.</span></strong><span data-dcnode-id="501" instrument_node=""> Decide which is best suited to you, join in and help raise awareness and funds for the BRIT challenge charities. The challenge will run from 1 February – 3 March 2022.</span></h4><h3 data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">2022 point Step Challenge</span></strong></h3><p data-dcnode-id="489"><span data-dcnode-id="496" instrument_node="">We challenge you to accumulate 2022 MDXMoves points over the course of the 4 week challenge. This roughly equates to 6740 steps per day…. Not much I hear you say? Well try being consistent over the course of the full challenge period. Miss a day and you have double to catch up! Think you can do it? </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unihub.mdx.ac.uk/student-life/sport/mdxmoves" target="_blank"><span data-dcnode-id="495" instrument_node="">Sign up on the 1</span><sup data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">st</span></sup><span data-dcnode-id="492" instrument_node=""> February on the MDXMoves challenges</span></a><span data-dcnode-id="490" instrument_node="">. Clock up those points anyway you like. Go for a walk to the shops, do a spot of hoovering or maybe go for a long hike somewhere gorgeous and really smash those points. Don’t forget you can also compete against your friends in the leader board to help keep motivate and have a bit of fun.</span></p><h3 data-dcnode-id="486"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">2022 Ultimate Challenge</span></strong></h3><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">We understand that some of our MDXMoves users are seriously active. Clocking up a 100 mile cycle one weekend is simply a gentle weekend ride for some. Completing a half marathon may be just your warm up routine. If this sounds like you then you need to enter the MDXMoves BRIT 2022 Ultimate Challenge. Your challenge is to achieve 20,220 steps per day!</span></p><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Plus all entrants receive a BRIT challenge T-Shirt and 1000 MDXMoves bonus points.</span></p><h3 data-dcnode-id="479"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Helping #TeamMDX raise £2022 for charity</span></strong></h3><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">This year we encourage all participants to help #TeamMDX raise £2022 for the BRIT and Redthread charity. Sponsor a friend, colleague or even yourself. If every person entering raises a small amount we should reach our very achievable target of £2022, which will make a significant difference to our 2 charities. We are raising funds for two amazing charities: </span><a data-canonicalurl="https://www.thebritchallenge.org.uk/brit-2021-challenge" data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//middlesexuniversitysportandrecreation.newsweaver.com/march/kwao70p8pt34s3s3kb1ht0/external%3Fa%3D6%26p%3D8909566%26t%3D201040" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="477" instrument_node="">BRIT</span></a><span data-dcnode-id="475" instrument_node=""> which supports young adult and student mental health and </span><a data-canonicalurl="https://www.redthread.org.uk/about-us/" data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//middlesexuniversitysportandrecreation.newsweaver.com/march/7dui0gy2blt4s3s3kb1ht0/external%3Fa%3D6%26p%3D8909566%26t%3D201040" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="474" instrument_node="">Redthread</span></a><span data-dcnode-id="472" instrument_node=""> one of the MDXSU's charities which supports young people affected by violence and exploitation to help them break the cycle of harm.</span></p><p data-dcnode-id="468"><a data-canonicalurl="https://gofund.me/c7dd9619" data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//middlesexuniversitysportandrecreation.newsweaver.com/march/h6po330b6534s3s3kb1ht0/external%3Fa%3D6%26p%3D8909566%26t%3D201040" rel="noopener" target="_blank"><span data-dcnode-id="470" instrument_node="">Donate and share the link</span></a></p><p data-dcnode-id="465"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">So get your skates on, and lets get Moving!</span></strong></p><span data-dcnode-id="464" instrument_node="">
</span></div><span data-dcnode-id="462" instrument_node="">
