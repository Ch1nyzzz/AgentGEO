</span><h3 class="post-title entry-title" data-dcnode-id="3084" itemprop="name"><span data-dcnode-id="3088" instrument_node="">
</span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2021/04/history-true-story-uncovered-part-1.html"><span data-dcnode-id="3087" instrument_node="">History: The True Story Uncovered (Part 1)</span></a><span data-dcnode-id="3085" instrument_node="">
</span></h3><span data-dcnode-id="3083" instrument_node="">
</span><div class="post-header" data-dcnode-id="3079"><span data-dcnode-id="3082" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="3081"></div><span data-dcnode-id="3080" instrument_node="">
</span></div><span data-dcnode-id="3078" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="2328" id="post-body-4363250051754656816" itemprop="description articleBody"><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3059" style="text-align: justify;"><span data-dcnode-id="3076" instrument_node="">[</span><i data-dcnode-id="3073"><span data-dcnode-id="3074" style="color: #2b00fe;"><span data-dcnode-id="3075" instrument_node="">As some of you know, I have for the last decade been trying to put together my ideas on a philosophy of history that attempts to do two things: first returning academic history to a place (if it ever had one) where it is taken seriously as an intellectual discipline rather than a bourgeois pastime or a service industry for popular entertainment; and second where it has a coherent ethical/political framework for those who, like me, think that the writing of history is inescapably political and that the politics of history should be emancipatory.&nbsp;The first part of this book (</span></span></i><span data-dcnode-id="3060" style="color: #2b00fe;"><span data-dcnode-id="3072" instrument_node="">Why History </span><i data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Doesn't</span></i><span data-dcnode-id="3069" instrument_node="">&nbsp;Matter</span><i data-dcnode-id="3061"><span data-dcnode-id="3068" instrument_node="">) essays a deconstruction of the current practice of history by setting what seem to be uncontroversial ideas about the practice of history against the most frequent statements about its </span><u data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">purpose</span></u><span data-dcnode-id="3065" instrument_node=""> and </span><u data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">value</span></u><span data-dcnode-id="3062" instrument_node="">, and finding them contradictory and incoherent.</span></i></span></p><p data-dcnode-id="3034" style="text-align: justify;"><i data-dcnode-id="3057" style="color: #2b00fe;"><span data-dcnode-id="3058" instrument_node="">This is the current draft of the projected chapter 1 ('The True Story Uncovered')&nbsp;</span></i><i data-dcnode-id="3055" style="color: #2b00fe;"><span data-dcnode-id="3056" instrument_node="">of that book</span></i><i data-dcnode-id="3053" style="color: #2b00fe;"><span data-dcnode-id="3054" instrument_node="">, which I want to share because discussions of the teaching of history (especially with regard to the British Empire) have come round again. I am fairly sure I have posted at least some of it before but if nothing else, this is an updated version. Here I have split it into two parts for ease of reading. In this first part, I set out why history is inescapably - always - about the writing of stories. I set out how histories are always shaped by various choices about where and when to start and end and about how they can always be read in any number of different ways, regardless of the writer's intention. They can't be pinned down. Then I use a medieval story to show how, as a narrative rather than an atomised collection of facts, history (as opposed to 'the past) never happens - that </span></i><span data-dcnode-id="3051" style="color: #2b00fe;"><span data-dcnode-id="3052" instrument_node="">narratives </span></span><i data-dcnode-id="3049" style="color: #2b00fe;"><span data-dcnode-id="3050" instrument_node="">are not in themselves </span></i><span data-dcnode-id="3047" style="color: #2b00fe;"><span data-dcnode-id="3048" instrument_node="">facts</span></span><i data-dcnode-id="3045" style="color: #2b00fe;"><span data-dcnode-id="3046" instrument_node="">. They are conected by imaginative, narrative, argumentative links which can be more or less plausible but are never empirical. None of this means that facts aren't important. Nor does any of this render history impossible;&nbsp;</span></i><i data-dcnode-id="3043" style="color: #2b00fe;"><span data-dcnode-id="3044" instrument_node="">it is just how history is</span></i><i data-dcnode-id="3041" style="color: #2b00fe;"><span data-dcnode-id="3042" instrument_node="">&nbsp;Indeed it is History's very condition of possibility. Think about it, if all this weren't the case, if explanations and narratives could be </span></i><span data-dcnode-id="3037" style="color: #2b00fe;"><span data-dcnode-id="3040" instrument_node="">proved,</span><i data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node=""> the whole historical project would be finite.&nbsp;</span></i></span><i data-dcnode-id="3035" style="color: #2b00fe;"><span data-dcnode-id="3036" instrument_node="">Finally in this part I try to demonstrate how the past cannot even be conceived of effectively without turning it into a story.</span></i></p><p data-dcnode-id="3028" style="text-align: justify;"><i data-dcnode-id="3032" style="color: #2b00fe;"><span data-dcnode-id="3033" instrument_node="">Note that this is still a draft and that the footnotes are neither complete nor consistent. Note also that for reasons to do with cutting, pasting and rearranging this text from it's original word document, the notes start again from i in the last section.</span></i><span data-dcnode-id="3031" instrument_node="">]</span><i data-dcnode-id="3029" style="color: #2b00fe;"><span data-dcnode-id="3030" instrument_node="">&nbsp;</span></i></p><blockquote data-dcnode-id="3022"><span data-dcnode-id="3027" instrument_node="">But let us be wise enough to learn the true history so that we can recognise a myth when we see one.</span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">- Dee Brown</span><a ch.01="" data-dcnode-id="3023" edn1="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="3024" instrument_node="">[i]</span></a></blockquote><div data-dcnode-id="3017" style="text-align: justify;"><span data-dcnode-id="3021" instrument_node="">In a newspaper piece setting out his vision of how history should be taught in British schools, Simon Schama enjoined educators to “[t]ell a classroom of 12-year-olds the story of the British (for they took place across our [sic] nations) civil wars of the 17th century…”</span><a ch.01="" data-dcnode-id="3019" edn2="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="3020" instrument_node="">[ii]</span></a><span data-dcnode-id="3018" instrument_node="">  It is difficult to disagree with many of the points Schama makes along the way but overall his argument is profoundly incoherent.  My response to Schama’s injunction that we tell a classroom of 12-year-olds “the story of the British civil wars” is simple enough: which story?  Let me explain.</span></div><h2 data-dcnode-id="3015" style="text-align: justify;"><span data-dcnode-id="3016" instrument_node="">Zulus and Redcoats</span></h2><div data-dcnode-id="2987" style="text-align: justify;"><span data-dcnode-id="3014" instrument_node="">When I was young, my family habitually spent Christmas with my paternal grandparents in Blackpool.  One Christmas I forewent a last-minute shopping trip into town to watch the TV première of the film </span><i data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="3011" instrument_node=""> about the disastrous British defeat at the battle of iSandlwana (1879).</span><a ch.01="" data-dcnode-id="3009" edn3="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="3010" instrument_node="">[iii]</span></a><span data-dcnode-id="3008" instrument_node="">  When my family got back later, my father, aware of the movie’s subject-matter, asked drily if it had “had a happy ending”: we laughed.  A few years later, I read an article in a wargaming magazine which described </span><i data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="3005" instrument_node=""> as “very good historically” but “less satisfying [than the 1964 classic </span><i data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Zulu</span></i><span data-dcnode-id="3002" instrument_node="">] as a piece of cinema”.</span><a ch.01="" data-dcnode-id="3000" edn4="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="3001" instrument_node="">[iv]</span></a><span data-dcnode-id="2999" instrument_node="">  I imagine, of course, that it has a happier ending and is less unsatisfying as a movie if you don’t view the story from the British side.  Indeed, I once read a reminiscence by someone who had seen </span><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Zulu</span></i><span data-dcnode-id="2996" instrument_node=""> in a Jamaican cinema, where the audience greeted each shooting or skewering of a redcoat with rapturous cheers. [</span><b data-dcnode-id="2992"><i data-dcnode-id="2993"><span data-dcnode-id="2994" style="color: #2b00fe;"><span data-dcnode-id="2995" instrument_node="">n.b.&nbsp;</span></span></i></b><i data-dcnode-id="2989"><span data-dcnode-id="2990" style="color: #2b00fe;"><span data-dcnode-id="2991" instrument_node="">I cannot for the life of me track down this story, but I haven't made it up. I have discussed it in correspondence with Ian Knight who also remembered reading it but could not identify it either. If anyone can help, please get in touch.</span></span></i><span data-dcnode-id="2988" instrument_node="">]</span></div><div data-dcnode-id="2985" style="text-align: justify;"><br data-dcnode-id="2986"></div><div data-dcnode-id="2968" style="text-align: justify;"><span data-dcnode-id="2984" instrument_node="">Among aficionados at least, it is well-known that </span><i data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Zulu </span></i><span data-dcnode-id="2981" instrument_node="">barely comes within waving distance of being an accurate portrayal of the battle of Rorke’s Drift and that even </span><i data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="2978" instrument_node=""> makes some inexplicable departures from fact.</span><a ch.01="" data-dcnode-id="2976" edn5="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2977" instrument_node="">[v]</span></a><span data-dcnode-id="2975" instrument_node="">  To an extent of course, this is understandable in the process of rendering a historical event into an entertaining cinematic experience lasting a couple of hours.  </span><i data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="2972" instrument_node=""> – one can legitimately argue – has little choice but to telescope the events between Chelmsford’s crossing of the Mzinyathi/Buffalo River and the battle itself, fusing discrete episodes into single actions.  Nonetheless, even if both movies stuck rigidly to historically-attestable fact or academically defensible interpretations thereof,</span><a ch.01="" data-dcnode-id="2970" edn6="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2971" instrument_node="">[vi]</span></a><span data-dcnode-id="2969" instrument_node=""> several points would remain unchanged and would apply just as well to historians.</span></div><div data-dcnode-id="2966" style="text-align: justify;"><br data-dcnode-id="2967"></div><div data-dcnode-id="2952" style="text-align: justify;"><span data-dcnode-id="2965" instrument_node="">Some things, naturally, differ profoundly between composing the screenplay for a “historical” drama and writing actual history.  Historians get things wrong for all sorts of reasons. Mistakes are made in the reading of sources whether through carelessness, a lack of scholarly sophistication or simple human error. Sometimes historians get things wrong for reasons beyond their control: new evidence is discovered that renders earlier accounts obsolete;</span><a ch.01="" data-dcnode-id="2963" edn7="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2964" instrument_node="">[vii]</span></a><span data-dcnode-id="2962" instrument_node=""> new scholarship reveals that what had hitherto been regarded as solid evidence is anything but reliable.  But one of the very few things that all historians would agree on would be that writers who knowingly distorted the empirical picture given in the surviving evidence would be committing gross professional malpractice. Nonetheless, important similarities with screenplay-writing remain.  One is the element of selection to which we will return; even if it wanted to, no history (or film) can tell everything, even if it is aware of everything (which inevitably it is not).</span><a ch.01="" data-dcnode-id="2960" edn8="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2961" instrument_node="">[viii]</span></a><span data-dcnode-id="2959" instrument_node="">  All historians decide which events are important to the story they want to tell.  Most importantly they decide the beginning- and end-points of the story.  That itself shapes a “narrative arc” and the flavour or form of the story told.  To return to our cinematic examples, the choice to start</span><i data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node=""> Zulu Dawn </span></i><span data-dcnode-id="2956" instrument_node="">in the discussions immediately preceding the invasion of Zululand and to end with Chelmsford’s return to the wreckage of his camp governs the tone of the narrative, of hubris and tragedy.  On the other hand, </span><i data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Zulu</span></i><span data-dcnode-id="2953" instrument_node="">’s opening with the aftermath of iSandlwana and closure with the relief of the post at Rorke’s Drift frames a story of heroism and triumph over the odds.  The same points apply to historical writing.  A history that starts with the rise to power of Napoleon and ends with Waterloo, for example, tells one type of story.  One that begins with Waterloo and ends with the accession to power of Napoleon III tells quite another.  The “facts”, in and of themselves, whether disputed or not, determine neither the content nor the shape of history.</span></div><div data-dcnode-id="2950" style="text-align: justify;"><br data-dcnode-id="2951"></div><div data-dcnode-id="2930" style="text-align: justify;"><span data-dcnode-id="2949" instrument_node="">Historical narrative is also much more than a string of events placed in chronological order.  Schama thought schoolteachers should tell their classes the story of the seventeenth-century British Civil Wars, but he knows that the story is not composed simply of a sequence of events of indisputable facticity.  In the same article, he further instructs schoolteachers to “reinvent the art and science of storytelling in the classroom”.  Once you recognise that history is about storytelling, arguments about the value of knowing historical facts begin to empty out their content.  Schama wants children to learn “the history of how we [</span><i data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">sic</span></i><span data-dcnode-id="2946" instrument_node="">] came to execute our [</span><i data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">sic</span></i><span data-dcnode-id="2943" instrument_node="">] king”.  Leaving aside the use of the first person plural,</span><a ch.01="" data-dcnode-id="2941" edn9="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2942" instrument_node="">[ix]</span></a><span data-dcnode-id="2940" instrument_node=""> several important points arise.  First, history lies in the “how people came to execute their king”.  That “how they came to” cannot be not encompassed in any selection and sequence of events but in the story that the events are chosen to support.  Some historians might see that story as reaching right back into the reign of Elizabeth I and composed of a serious of constitutional steps (or mis-steps) leading inevitably to crisis; others might see the story as having a much shorter arc and as being characterised by the failure by various parliamentarians, even Cromwell, to get an obdurate Charles to accept any number of compromises that would have kept his bum on his throne and his head on his shoulders after the end of the First Civil War.  What sort of end-point does Charles’ execution represent?  Was it a dramatic constitutional (as well as personal) moment, altering the nature of monarchy, or had monarchy already been irrevocably changed with the Elizabethan settlement?  In other words, were the parliamentarians, in killing Charles, doing any more than – metaphorically – beheading a corpse?</span><a ch.01="" data-dcnode-id="2938" edn10="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2939" instrument_node="">[x]</span></a><span data-dcnode-id="2937" instrument_node="">  There is still more to it than that.  Do children learn of Charles I’s beheading as some sort of whiggish</span><a ch.01="" data-dcnode-id="2935" edn11="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2936" instrument_node="">[xi]</span></a><span data-dcnode-id="2934" instrument_node=""> step on the road to modern constitutional monarchy and representative parliamentary democracy, or as the martyrdom of “Saint Charles”?  Are Cromwell, Ireton and the rest champions of democracy or regicides, king-killers?  Does 1649 represent triumph or tragedy?  All of these stories are equally possible; none of them is empirically wrong.  Which one does Schama want “all schoolchildren” to learn?  Arguments like Schama’s</span><a ch.01="" data-dcnode-id="2932" edn12="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2933" instrument_node="">[xii]</span></a><span data-dcnode-id="2931" instrument_node=""> that all schoolchildren must learn certain things about “our” history and that the story of the British Civil Wars would be one of them, clearly imply that someone, somewhere, must decide which story they learn, from all the permutations just mentioned.  I do not think that that would serve children well and it certainly restricts history to a form of fact-learning, no matter how lively the story is that you put those facts into.</span></div><div data-dcnode-id="2928" style="text-align: justify;"><br data-dcnode-id="2929"></div><div data-dcnode-id="2920" style="text-align: justify;"><span data-dcnode-id="2927" instrument_node="">One might suggest getting schoolchildren to discuss whether the events of January 1649 were the inevitable outcome of eighty years of political events or a historical accident, contingent on the personalities of 1646-48, which no one had really wanted to bring about.  You could ask them whether they thought it was a triumph in the rise of parliament or a tragedy of the demise of kingship.</span><a ch.01="" data-dcnode-id="2925" edn13="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2926" instrument_node="">[xiii]</span></a><span data-dcnode-id="2924" instrument_node=""> I would suggest that both of those would be educationally more valuable than telling them a predetermined story that everyone learnt.  However, if you accept that those activities, interpretations and debates are, educationally, the bit that matters, that undermines the argument about having to know certain stories.  The choice of which story to use becomes incidental.</span><a ch.01="" data-dcnode-id="2922" edn14="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2923" instrument_node="">[xiv]</span></a><span data-dcnode-id="2921" instrument_node=""> The educational value of that sort of unpicking of narrative could equally well be served by a study of the Ming dynasty or indeed the downfall of the Zulu kingdom.</span></div><div data-dcnode-id="2918" style="text-align: justify;"><br data-dcnode-id="2919"></div><div data-dcnode-id="2901" style="text-align: justify;"><span data-dcnode-id="2917" instrument_node="">One vital lesson to emerge from the very brief discussion of cinematic history with which I began is that the producer of history (whether the latter be on celluloid or in scholarly monograph) has no control over how it is received.  The story arc of </span><i data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="2914" instrument_node=""> may have been conceived as the tale of how Victorian imperial hubris and injustice led to a disaster and the slaughter of over 1,000 men, a rather clunky but well-intentioned critique of imperialism and the British class system, but it might as easily be consumed as the story of how the arrogant white man picked a fight with the Zulu and how the whole might of the British Empire was humbled by brave African warriors as a result: a happy ending indeed.  Then again, even this might be too simplistic.  King Cetshwayo and many other Zulus regarded the battle and the heavy losses as anything but a triumph.  </span><i data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Zulu </span></i><span data-dcnode-id="2911" instrument_node="">was intended to tell the tale of how brave, heroic British soldiers fought off 4,000 Zulus.</span><a ch.01="" data-dcnode-id="2909" edn15="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2910" instrument_node="">[xv]</span></a><span data-dcnode-id="2908" instrument_node="">  The plot clearly aims to create a sort of “will they be able to hold out?” tension, especially as casualties mount and the Zulus take the hospital, the British being gradually forced back.</span><a ch.01="" data-dcnode-id="2906" edn16="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2907" instrument_node="">[xvi]</span></a><span data-dcnode-id="2905" instrument_node="">  Yet the Jamaican audience cheered when the Zulus speared a soldier, seemingly urging the warriors to press on heroically and finish the job in the teeth of the white man’s murderous modern rifle-fire.  Ian Knight, furthermore, estimates that perhaps as many as one in three of the Zulus who attacked the British post became casualties, and most of those were killed.  It’s worth noting that these were for the most part not young men but they pressed their attacks for four hours.</span><a ch.01="" data-dcnode-id="2903" edn17="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2904" instrument_node="">[xvii]</span></a><span data-dcnode-id="2902" instrument_node="">  That would make for a quite different narrative (or reading) of bravery and determination without any of the “facts” changing at all.  Tell the story of how the English executed their king in 1649 as a triumphal step on the road to modern democracy and students may still consume it as the tragic downfall of Renaissance monarchy. The facts of the matter remain the same, be they the events of recorded history or the actions depicted on the screen, but the stories and their reading take on lives of their own.  History is about the writing and reading of stories and, as we have seen, stories or narratives are compositions, not “facts”.</span></div><div data-dcnode-id="2899" style="text-align: justify;"><br data-dcnode-id="2900"></div><div data-dcnode-id="2897" style="text-align: justify;"><span data-dcnode-id="2898" instrument_node="">It is important to stress this because some historians have been wont to dismiss the idea that history is a “literary fiction” on the basis that the historian is chained to the immovable rocks of things that did or did not happen – or at least which are (or are not) recorded as happening in our surviving evidence.  The recorded events are indeed immovable rocks for the historian but the argument that this renders historical writing other than a literary creation is flimsy.  History flows lightly over and around the rocks that it chooses and it takes its shape from the spaces in between.  This by no means reduces history’s power to do what it does (or has always done); it is simply enough how history is.  If we want to restore to the historical discipline some power to matter intellectually, we need to recognise that and embrace its possibilities.</span></div><h2 data-dcnode-id="2895" style="text-align: justify;"><span data-dcnode-id="2896" instrument_node="">Thurbrand and Uhtred: History never happened</span></h2><div data-dcnode-id="2890" style="text-align: justify;"><span data-dcnode-id="2894" instrument_node="">The implication of what I have been saying is that, if you conceive of it as stories, as more than simple collections of fact, then “history” never happened.  To explain, I will employ a tale written in twelfth-century northern England.</span><a ch.01="" data-dcnode-id="2892" edn18="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2893" instrument_node="">[xviii]</span></a><span data-dcnode-id="2891" instrument_node="">  It goes like this:  Once upon a time there was a powerful and energetic earl called Uhtred who saved Durham from the Scots.  Uhtred was married three times.  His second marriage was to the daughter of one Styr Ulfsson and was contracted on condition that Uhtred would kill Styr’s enemy, Thurbrand.  Alas, when Uhtred came to swear allegiance to King Cnut, his new ruler (and old enemy), in around 1018-20, Thurbrand and the king’s soldiers ambushed him and forty other chief men and killed them all.  Uhtred’s brother Eadwulf succeeded him in the earldom but when he died Ealdred, Uhtred’s son by his first wife, became earl and killed Thurbrand.  Thurbrand’s son, Carl, then campaigned against Ealdred until the two were prevailed upon to become sworn brothers and go on pilgrimage together to Rome.  Unfortunately, the ship upon which they were to sail was delayed by bad weather so whilst they waited, Carl entertained Ealdred at his home in Holderness in the Yorkshire East Riding.  One day, whilst showing Ealdred around his estate Carl killed Ealdred in (to quote the source)</span></div><div data-dcnode-id="2887" style="text-align: justify;"><blockquote data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">a wood called Risewood and still today the place of his murder is marked by a small stone cross.  Sometime later, the grandson of Earl Ealdred, Earl Waltheof, who was the son of his daughter, sent a large band of young men and avenged the killing of his grandfather with the utmost slaughter.  For when the sons of Carl were feasting together at their elder brother’s house at Settrington, not far from York, the men who had been sent caught them unawares and savagely killed them together, except for Cnut whose life they spared because of his innate goodness.  Sumerled, who was not there, survives to this day.  Having massacred the sons and grandsons of Carl, they returned home bringing with them much booty of various kinds.</span></blockquote></div><div data-dcnode-id="2873" style="text-align: justify;"><span data-dcnode-id="2886" instrument_node="">This is a fascinating story for many reasons; what makes it relevant to my argument is how historians have read it as the tale of a “feud”: a vendetta with each murder justified by the last and justifying the next.</span><a ch.01="" data-dcnode-id="2884" edn19="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2885" instrument_node="">[xix]</span></a><span data-dcnode-id="2883" instrument_node="">  But let us look at this story more closely.  It illustrates beautifully the fact that history is only constructed after the event.  It is written as a story; English is perhaps the only western European language where the word for “history” is not also the usual word for “a story”.</span><a ch.01="" data-dcnode-id="2881" edn20="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2882" instrument_node="">[xx]</span></a><span data-dcnode-id="2880" instrument_node="">  The account also confirms that, as suggested earlier, how we choose to tell that story is crucial.  This point is often associated with the “post-modern” turn in historiography</span><a ch.01="" data-dcnode-id="2878" edn21="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2879" instrument_node="">[xxi]</span></a><span data-dcnode-id="2877" instrument_node=""> but it has actually been made since the very earliest days of what we might think of as modern history-writing.</span><a ch.01="" data-dcnode-id="2875" edn22="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2876" instrument_node="">[xxii]</span></a><span data-dcnode-id="2874" instrument_node="">  People like the author of this story (known to scholars as “the Durham Anonymous”) select episodes from the past and link them together to make a single strand of narrative.  In this case, it was the story of a feud.  But did it really happen like that or were the events simply written up in that way?</span></div><div data-dcnode-id="2871" style="text-align: justify;"><br data-dcnode-id="2872"></div><div data-dcnode-id="2863" style="text-align: justify;"><span data-dcnode-id="2870" instrument_node="">As related by the anonymous author, the story of the Northumbrian “feud” sounds unproblematic, united by a straightforward thread of cause and effect unfolding through time.  In fact, though, long gaps separated the acts of violence and cut that thread.  It took ten years for any violence to erupt as a result of Styr’s alleged injunction to Uhtred to kill Thurbrand.  Styr’s daughter had died and Uhtred had remarried in the interim, surely freeing him from Styr’s demand.  Furthermore, it was actually Thurbrand who did the only recorded attacking.  A further seven years or more must have elapsed before Ealdred exacted his revenge on Thurbrand.  The episode after that is interesting.  Thurbrand’s son Carl is not described as trying to find an occasion to carry out his vengeance killing.  Instead, he and Ealdred tried to do away with </span><i data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">each other</span></i><span data-dcnode-id="2867" instrument_node="">.  This period was another long one.  Carl’s killing of Ealdred dates to 1038, twenty-three years after his father had killed Ealdred’s father (the first event in the “feud”), and at least ten after Thurbrand’s murder (the second event).  The anonymous narrator proceeds from Ealdred’s death to say simply that “sometime later, the grandson of Earl Ealdred, Earl Waltheof, … avenged the killing of his grandfather with the utmost slaughter.”  Sometime later …  In fact, the Settrington massacre, the fourth and final episode of the Northumbrian “feud”, took place in 1073/4, thirty-six years after Ealdred’s murder.  Carl killed Ealdred four years before Waltheof was even born.  A lot of selection is going on here, from a background of violence and killing, in order to create this long, unilinear saga of murder and revenge.</span><a ch.01="" data-dcnode-id="2865" edn23="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2866" instrument_node="">[xxiii]</span></a><span data-dcnode-id="2864" instrument_node="">  Like all historians, the “Durham Anonymous” chose which story to tell and how to tell it.  The history of eleventh-century Northumbria has thus come to be that of the “feud” between the families of Uhtred and Thurbrand.  However, the events were not experienced like that that as they occurred, as the complex mass of events unfolded.  The hi/story of the Northumbrian feud was made after the event.  There’s no reason to doubt that the different events described happened; the “story”, however, never did.</span></div><div data-dcnode-id="2861" style="text-align: justify;"><br data-dcnode-id="2862"></div><div data-dcnode-id="2859" style="text-align: justify;"><span data-dcnode-id="2860" instrument_node="">Selection and narrative composition are inevitable; they are not things that “bad historians” do.  The past includes everything that happened between the Big Bang and a second ago: innumerable doings, sayings, thoughts.  The past is incapable even of being comprehended as such, except in the most abstract temporal sense of “stuff that has happened”.  Before it can properly be envisaged, it must be converted into a narrative, a hi/story.  I will return to this.  In an important sense, therefore, history comes before the past!  To be comprehended, the past must be given a plot with a beginning, a middle and an end (even if that end is not really an end but simply the present – a deferred ending).</span></div><div data-dcnode-id="2822" style="text-align: justify;"><h2 data-dcnode-id="2857" style="text-align: left;"><span data-dcnode-id="2858" instrument_node="">Yesterday, all my troubles seemed so far away</span></h2><div data-dcnode-id="2852"><span data-dcnode-id="2856" instrument_node="">A simple thought experiment illustrates this further. At any given time, we can conceive of yesterday in general abstract terms as “the day before today” but before we can have any real grasp of it, for example in writing up a diary, we have to decide upon what things happened that give shape to that general concept, in other words the things that turn it into a narrative. It may be that one simply selects the main structuring events of the day: got up; had breakfast; went to work; came home; watched TV; went to bed. It might be that, as here, these things have no especially marked “plot” to them; they are just the things that happened: a sort of bare chronicle.</span><a ch.01="" data-dcnode-id="2854" edn1="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2855" instrument_node="">[i]</span></a><span data-dcnode-id="2853" instrument_node="">&nbsp;But even here the meaning of the events takes shape not just from their naming (“breakfast”, “work”) but from their sequence and juxtaposition. That record gives shape and meaning to the abstract twenty-four hours of “yesterday” and turns it into the narrative of an ordinary day. There has still been selection. This is hardly a record, even a chronicle, of the whole day. A selection of what, at the time, we thought mattered has been made. All the conversations at work and at home, the details of the trip to and from work, what was on the telly, what was eaten for breakfast (and lunch and dinner have even been omitted) and many other things have been left out.</span></div><div data-dcnode-id="2850"><br data-dcnode-id="2851"></div><div data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Now suppose that, having written our diary for the previous day, we have breakfast, go to work and are summoned to see the boss. We are then told that we’re to be made redundant. Now yesterday goes from being a dull day, its hours frittered and wasted in an off-hand way, to being “my last day in the job”. From being just another day those twenty-four little hours now acquire an added, perhaps even a certain tragic, quality. The diary could be amended accordingly. Certainly, how our diarist saw that day would change importantly.</span></div><div data-dcnode-id="2846"><br data-dcnode-id="2847"></div><div data-dcnode-id="2841"><span data-dcnode-id="2845" instrument_node="">Let us continue the experiment. Suppose that the person who asked you the time at the bus stop yesterday, and with whom you had a brief exchange of pleasantries, began to be a regular at the bus stop, someone you got to know, and who in time became your husband/wife/partner. Something that didn’t even seem worth recording on the day it happened and possibly for some time afterwards becomes a major shaping event of your life. The dull day has become the day you met your partner, possibly one of the most important days of your life – one would like to think so. Yet, when that event happened, at the time that that “history” was made, you didn’t even notice it. Only later did it become part of a history that made you who you are. Any number of variations on this basic scenario are possible, turning a bland unit of time into a key structuring element of the history of a life. The occurrences that matter have been chosen and placed in order (sometimes, of course, they are moved out of chronological sequence, whether deliberately or otherwise</span><a ch.01="" data-dcnode-id="2843" edn2="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2844" instrument_node="">[ii]</span></a><span data-dcnode-id="2842" instrument_node="">).</span></div><div data-dcnode-id="2839"><br data-dcnode-id="2840"></div><div data-dcnode-id="2834"><span data-dcnode-id="2838" instrument_node="">Note, though, that – underlining the point made earlier – the events, the elements themselves, do not change; only how one characterises them, how one selects them and positions them within the narrative, and how one casts that narrative. Events rarely carry an inherent meaning – those that do are often the really traumatic ones. If we return to the diarist, losing her job that day may have been the beginning of a long period of unemployment and of being treated, in spite of one’s best efforts, as an idle scrounger by tabloid editors, journalists and their readers and by populist Conservative (and Labour) governments. Every moment of that conversation with the boss, every vain attempt to keep the job, to talk the boss out of her decision might become etched on the memory; the last day at work becomes a poignant twenty-four hours. Alternatively, though, the diarist might have gone home and applied for another job, been successful, risen to the top of the company, met her partner and lived a very happy period of her life. In that case, one doubts that any especial elements of the redundancy conversation are remembered and the event itself becomes something of a happy moment of transition to something better. And didn’t I show </span><i data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">her</span></i><span data-dcnode-id="2835" instrument_node=""> in the end? That “last day at work” remains just as it was remembered at the start of the following day, as a boring, barely-remembered twenty-four hours. But in all the different scenarios just set out it happened just the same, in just the same way.</span></div><div data-dcnode-id="2832"><br data-dcnode-id="2833"></div><div data-dcnode-id="2827"><span data-dcnode-id="2831" instrument_node="">In the tale of Thurbrand and Uhtred, the “Northumbrian feud”, the same procedures were followed. A selection was made (whether by the anonymous writer or his informants) from a vast number of different events and this was then arranged in a sequence to form the story of a feud, culminating in the tale of how Earl Waltheof avenged his grandfather. Had the author or his sources been more inclined to support Carl’s family, one imagines that it would have been constructed in a very different way, probably from a different selection of past happenings.</span><a ch.01="" data-dcnode-id="2829" edn3="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2830" instrument_node="">[iii]</span></a><span data-dcnode-id="2828" instrument_node="">&nbsp;This compels us to think more closely about storytelling and especially about its linguistic and literary aspects.</span></div><div data-dcnode-id="2825"><br data-dcnode-id="2826"></div><div data-dcnode-id="2823"><br data-dcnode-id="2824"></div></div><div data-dcnode-id="2820" style="mso-element: endnote-list;"><span data-dcnode-id="2821" instrument_node="">

I. Knight, ‘The Zulu Wars Part 3: 1879’, </span><i data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Miniature Wargames</span></i><span data-dcnode-id="2722" instrument_node=""> 18 (November
1984), pp.39-43, at p.43.</span><span data-dcnode-id="2720" style="mso-spacerun: yes;"><span data-dcnode-id="2721" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2719" instrument_node="">Knight went on
to be the pre-eminent authority on the Anglo-Zulu War (see p.000, n.000,
above).</span><span data-dcnode-id="2717" style="mso-spacerun: yes;"><span data-dcnode-id="2718" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2716" instrument_node="">Knight’s cinematic judgment was certainly
not based on pro-British/Imperial sympathies.</span></p><span data-dcnode-id="2714" instrument_node="">
</span></div><span data-dcnode-id="2712" instrument_node="">
</span><div data-dcnode-id="2669" id="edn5" style="mso-element: endnote;"><span data-dcnode-id="2711" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2671" style="text-align: justify;"><a data-dcnode-id="2703" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref5" name="_edn5" style="mso-endnote-id: edn5;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2704"><span data-dcnode-id="2705" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2707"><span data-dcnode-id="2708" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2709" instrument_node="">[v]</span></span></span></span></span></a><span data-dcnode-id="2702" instrument_node="">
</span><i data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Zulu Dawn</span></i><span data-dcnode-id="2699" instrument_node=""> made focused its story on Lt the Hon Standish Vereker, whom it
depicts escaping the battle and, with his (presumably) dying shot, killing the
Zulu making off with the captured British flag.</span><span data-dcnode-id="2697" style="mso-spacerun: yes;"><span data-dcnode-id="2698" instrument_node="">&nbsp;
</span></span><span data-dcnode-id="2696" instrument_node="">Vereker played a minor and little-documented role in the battle before
being killed in the camp, shortly after having gallantly given a horse to an
African soldier to escape on.</span><span data-dcnode-id="2694" style="mso-spacerun: yes;"><span data-dcnode-id="2695" instrument_node="">&nbsp;
</span></span><span data-dcnode-id="2693" instrument_node="">Ironically, and somewhat cruelly to Vereker’s memory, this episode is
obviously not depicted.</span><span data-dcnode-id="2691" style="mso-spacerun: yes;"><span data-dcnode-id="2692" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2690" instrument_node="">“Boy” Pullen,
played as a callow and nervous recruit by then twenty-year-old Phil Daniels was
based on Quartermaster James Pullen.</span><span data-dcnode-id="2688" style="mso-spacerun: yes;"><span data-dcnode-id="2689" instrument_node="">&nbsp;
</span></span><span data-dcnode-id="2687" instrument_node="">Pullen, though, enlisted in 1851 and thus, at iSandlwana, must have been
well over twenty years older than Daniels’ character.</span><span data-dcnode-id="2685" style="mso-spacerun: yes;"><span data-dcnode-id="2686" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2684" instrument_node="">Conversely, </span><i data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Zulu </span></i><span data-dcnode-id="2681" instrument_node="">featured
thirty-nine-year-old Nigel Green (a commanding 1.85m [6ft, 1”] tall) as a
phlegmatic Colour Sergeant-Major Frank Bourne, who was actually only
twenty-four at the time of Rorke’s Drift, only 1.6m (5ft, 4”) tall and
nicknamed “the kid”!</span><span data-dcnode-id="2679" style="mso-spacerun: yes;"><span data-dcnode-id="2680" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2678" instrument_node="">The decision by </span><i data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Zulu</span></i><span data-dcnode-id="2675" instrument_node="">’s
script-writers to portray the upright teetotaller Private Alfred Henry Hook VC
as a dissolute, malingering drunk raises rather different ethical questions,
even if it did provide James Booth with his career-defining role. Knight, </span><i data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Zulu
Rising</span></i><span data-dcnode-id="2672" instrument_node="">.</span></p><span data-dcnode-id="2670" instrument_node="">
</span></div><span data-dcnode-id="2668" instrument_node="">
</span><div data-dcnode-id="2635" id="edn6" style="mso-element: endnote;"><span data-dcnode-id="2667" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2637" style="text-align: justify;"><a data-dcnode-id="2659" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref6" name="_edn6" style="mso-endnote-id: edn6;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2660"><span data-dcnode-id="2661" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2663"><span data-dcnode-id="2664" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2665" instrument_node="">[vi]</span></span></span></span></span></a><span data-dcnode-id="2657" style="mso-spacerun: yes;"><span data-dcnode-id="2658" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2656" instrument_node="">And, in so doing, doubtless condemned
themselves to never getting beyond a screen-play.</span><span data-dcnode-id="2654" style="mso-spacerun: yes;"><span data-dcnode-id="2655" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2653" instrument_node="">Rigorously historically-accurate portrayals
of battles rarely make great cinema.</span><span data-dcnode-id="2651" style="mso-spacerun: yes;"><span data-dcnode-id="2652" instrument_node="">&nbsp;
</span></span><span data-dcnode-id="2650" instrument_node="">See, e.g., </span><i data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Gettysburg</span></i><span data-dcnode-id="2647" instrument_node=""> (dir. R.F. Maxwell, 1993), which, while sometimes
visually spectacular, doubtless represents </span><span data-dcnode-id="2645" style="mso-bidi-font-style: italic;"><span data-dcnode-id="2646" instrument_node="">four hours</span></span><span data-dcnode-id="2644" instrument_node=""> (244 minutes) irretrievably lost from the lives of
viewers not interested in Civil War minutiae or typologies of mid-19</span><sup data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">th</span></sup><span data-dcnode-id="2641" instrument_node="">-century
facial hair.</span><span data-dcnode-id="2639" style="mso-spacerun: yes;"><span data-dcnode-id="2640" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2638" instrument_node="">I loved it.</span></p><span data-dcnode-id="2636" instrument_node="">
</span></div><span data-dcnode-id="2634" instrument_node="">
</span><div data-dcnode-id="2618" id="edn7" style="mso-element: endnote;"><span data-dcnode-id="2633" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2620" style="text-align: justify;"><a data-dcnode-id="2625" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref7" name="_edn7" style="mso-endnote-id: edn7;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2626"><span data-dcnode-id="2627" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2629"><span data-dcnode-id="2630" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2631" instrument_node="">[vii]</span></span></span></span></span></a><span data-dcnode-id="2624" instrument_node="">
This is especially true in periods like late antiquity and the Early Middle
Ages which are heavily reliant upon archaeology for much of the “big
picture”.</span><span data-dcnode-id="2622" style="mso-spacerun: yes;"><span data-dcnode-id="2623" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2621" instrument_node="">This is not because of the
“dramatic discoveries” beloved of the media but because the gradual assembly of
information from excavations permits, in kaleidoscopic fashion, quite different
pictures to emerge.</span></p><span data-dcnode-id="2619" instrument_node="">
</span></div><span data-dcnode-id="2617" instrument_node="">
</span><div data-dcnode-id="2593" id="edn8" style="mso-element: endnote;"><span data-dcnode-id="2616" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2595" style="text-align: justify;"><a data-dcnode-id="2608" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref8" name="_edn8" style="mso-endnote-id: edn8;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2609"><span data-dcnode-id="2610" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2612"><span data-dcnode-id="2613" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2614" instrument_node="">[viii]</span></span></span></span></span></a><span data-dcnode-id="2607" instrument_node="">
The point is nicely made satirically by </span><i data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">The Onion</span></i><span data-dcnode-id="2603" style="mso-bidi-font-style: italic;"><span data-dcnode-id="2604" instrument_node="">’s</span></span><span data-dcnode-id="2602" instrument_node=""> review of </span><i data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Captain America: Civil War</span></i><span data-dcnode-id="2599" instrument_node=""> (</span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theonion.com/the-onion-reviews-captain-america-civil-war-1819595940%2520accessed%252017%2520November%25202017"><span data-dcnode-id="2598" instrument_node="">https://www.theonion.com/the-onion-reviews-captain-america-civil-war-1819595940
accessed 17 November 2017</span></a><span data-dcnode-id="2596" instrument_node="">) which notes that while some characters are known
to viewers from earlier films, the directors had failed to make the other 2,500
films necessary to explain the back-stories and motivations of all the other
people who appear in the movie, thus (allegedly) rendering the latter entirely
confusing.</span></p><span data-dcnode-id="2594" instrument_node="">
</span></div><span data-dcnode-id="2592" instrument_node="">
</span><div data-dcnode-id="2579" id="edn9" style="mso-element: endnote;"><span data-dcnode-id="2591" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2581" style="text-align: justify;"><a data-dcnode-id="2583" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref9" name="_edn9" style="mso-endnote-id: edn9;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2584"><span data-dcnode-id="2585" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2587"><span data-dcnode-id="2588" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2589" instrument_node="">[ix]</span></span></span></span></span></a><span data-dcnode-id="2582" instrument_node="">
See below, ch.2</span></p><span data-dcnode-id="2580" instrument_node="">
</span></div><span data-dcnode-id="2578" instrument_node="">
</span><div data-dcnode-id="2559" id="edn10" style="mso-element: endnote;"><span data-dcnode-id="2577" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2561" style="text-align: justify;"><a data-dcnode-id="2569" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref10" name="_edn10" style="mso-endnote-id: edn10;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2570"><span data-dcnode-id="2571" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2573"><span data-dcnode-id="2574" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2575" instrument_node="">[x]</span></span></span></span></span></a><span data-dcnode-id="2568" instrument_node="">
To adapt Jacques Rancière’s account of Furet’s view of the significance of
Louis XVI’s execution. J. Rancière, </span><i data-dcnode-id="2566" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2567" instrument_node="">The
Names of History</span></i><span data-dcnode-id="2565" instrument_node="">, trans. H. Melehy (Minneapolis, 1994), p.39. On Rancière
and history, see O. Davis, </span><i data-dcnode-id="2563" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2564" instrument_node="">Jacques
Ranciere</span></i><span data-dcnode-id="2562" instrument_node=""> (Cambridge, 2010), pp.36-73</span></p><span data-dcnode-id="2560" instrument_node="">
</span></div><span data-dcnode-id="2558" instrument_node="">
</span><div data-dcnode-id="2545" id="edn11" style="mso-element: endnote;"><span data-dcnode-id="2557" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2547" style="text-align: justify;"><a data-dcnode-id="2549" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref11" name="_edn11" style="mso-endnote-id: edn11;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2550"><span data-dcnode-id="2551" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2553"><span data-dcnode-id="2554" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2555" instrument_node="">[xi]</span></span></span></span></span></a><span data-dcnode-id="2548" instrument_node="">
Explain Whig history</span></p><span data-dcnode-id="2546" instrument_node="">
</span></div><span data-dcnode-id="2544" instrument_node="">
</span><div data-dcnode-id="2531" id="edn12" style="mso-element: endnote;"><span data-dcnode-id="2543" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2533" style="text-align: justify;"><a data-dcnode-id="2535" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref12" name="_edn12" style="mso-endnote-id: edn12;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2536"><span data-dcnode-id="2537" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2539"><span data-dcnode-id="2540" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2541" instrument_node="">[xii]</span></span></span></span></span></a><span data-dcnode-id="2534" instrument_node="">
Above, pp.000-000.</span></p><span data-dcnode-id="2532" instrument_node="">
</span></div><span data-dcnode-id="2530" instrument_node="">
</span><div data-dcnode-id="2517" id="edn13" style="mso-element: endnote;"><span data-dcnode-id="2529" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2519" style="text-align: justify;"><a data-dcnode-id="2521" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref13" name="_edn13" style="mso-endnote-id: edn13;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2522"><span data-dcnode-id="2523" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2525"><span data-dcnode-id="2526" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2527" instrument_node="">[xiii]</span></span></span></span></span></a><span data-dcnode-id="2520" instrument_node="">
I have no idea whether or to what extent this would be feasible; I’m not a
schoolteacher.</span></p><span data-dcnode-id="2518" instrument_node="">
</span></div><span data-dcnode-id="2516" instrument_node="">
</span><div data-dcnode-id="2503" id="edn14" style="mso-element: endnote;"><span data-dcnode-id="2515" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2505" style="text-align: justify;"><a data-dcnode-id="2507" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref14" name="_edn14" style="mso-endnote-id: edn14;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2508"><span data-dcnode-id="2509" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2511"><span data-dcnode-id="2512" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2513" instrument_node="">[xiv]</span></span></span></span></span></a><span data-dcnode-id="2506" instrument_node="">
It seems to me that most arguments for the value of “cultural literacy” have in
any case been undermined by the existence of Google.com and 4G wifi technology</span></p><span data-dcnode-id="2504" instrument_node="">
</span></div><span data-dcnode-id="2502" instrument_node="">
</span><div data-dcnode-id="2489" id="edn15" style="mso-element: endnote;"><span data-dcnode-id="2501" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2491" style="text-align: justify;"><a data-dcnode-id="2493" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref15" name="_edn15" style="mso-endnote-id: edn15;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2494"><span data-dcnode-id="2495" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2497"><span data-dcnode-id="2498" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2499" instrument_node="">[xv]</span></span></span></span></span></a><span data-dcnode-id="2492" instrument_node="">
Probably nearer 3,000 for what it’s worth; it still left the defenders facing
odds of nearly 30:1.</span></p><span data-dcnode-id="2490" instrument_node="">
</span></div><span data-dcnode-id="2488" instrument_node="">
</span><div data-dcnode-id="2475" id="edn16" style="mso-element: endnote;"><span data-dcnode-id="2487" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2477" style="text-align: justify;"><a data-dcnode-id="2479" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref16" name="_edn16" style="mso-endnote-id: edn16;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2480"><span data-dcnode-id="2481" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2483"><span data-dcnode-id="2484" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2485" instrument_node="">[xvi]</span></span></span></span></span></a><span data-dcnode-id="2478" instrument_node="">
One episode in the film that, broadly, conforms to the accounts of what
happened.</span></p><span data-dcnode-id="2476" instrument_node="">
</span></div><span data-dcnode-id="2474" instrument_node="">
</span><div data-dcnode-id="2443" id="edn17" style="mso-element: endnote;"><span data-dcnode-id="2473" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2445" style="text-align: justify;"><a data-dcnode-id="2465" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref17" name="_edn17" style="mso-endnote-id: edn17;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2466"><span data-dcnode-id="2467" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2469"><span data-dcnode-id="2470" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2471" instrument_node="">[xvii]</span></span></span></span></span></a><span data-dcnode-id="2464" instrument_node="">
Three Zulu </span><i data-dcnode-id="2462" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2463" instrument_node="">amabutho</span></i><span data-dcnode-id="2461" instrument_node=""> (loosely,
regiments) at Rorke’s Drift – the uThulwana, the nDloko, and the iNdlondlo –
were formed of men born between c.1830 and c.1835, so in their mid- to late
forties.</span><span data-dcnode-id="2459" style="mso-spacerun: yes;"><span data-dcnode-id="2460" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2458" instrument_node="">The other </span><i data-dcnode-id="2456" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2457" instrument_node="">imbutho</span></i><span data-dcnode-id="2455" instrument_node="">, the iNdluyengwe were comparative youngsters in their early
thirties. I. Knight, </span><i data-dcnode-id="2453" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2454" instrument_node="">The Anatomy of the
Zulu Army from Shaka to Cetshwayo 1818-1879</span></i><span data-dcnode-id="2452" instrument_node=""> (London, 1995), pp.265-7.</span><span data-dcnode-id="2450" style="mso-spacerun: yes;"><span data-dcnode-id="2451" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2449" instrument_node="">Before launching their attacks, these men had
walked and (mostly) run 18km and crossed a flooded river, on an empty stomach.
Knight, </span><i data-dcnode-id="2447" style="mso-bidi-font-style: normal;"><span data-dcnode-id="2448" instrument_node="">Zulu Rising</span></i><span data-dcnode-id="2446" instrument_node="">, p.594.</span></p><span data-dcnode-id="2444" instrument_node="">
</span></div><span data-dcnode-id="2442" instrument_node="">
</span><div data-dcnode-id="2423" id="edn18" style="mso-element: endnote;"><span data-dcnode-id="2441" instrument_node="">
</span><p class="MsoEndnoteText" data-dcnode-id="2425" style="text-align: justify;"><a data-dcnode-id="2433" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref18" name="_edn18" style="mso-endnote-id: edn18;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2434"><span data-dcnode-id="2435" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2437"><span data-dcnode-id="2438" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2439" instrument_node="">[xviii]</span></span></span></span></span></a><span data-dcnode-id="2432" instrument_node="">
The story comes from an anonymous source called the </span><i data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">De Obsessio Dunelmi</span></i><span data-dcnode-id="2429" instrument_node="">
– </span><i data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Concerning the Siege of Durham</span></i><span data-dcnode-id="2426" instrument_node=""> (a misleading title as the siege of
Durham hardly features in this short but interesting tract). Refs</span></p><span data-dcnode-id="2424" instrument_node="">
</span></div><span data-dcnode-id="2422" instrument_node="">

</span><p class="MsoEndnoteText" data-dcnode-id="2411" style="text-align: justify;"><a data-dcnode-id="2413" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref19" name="_edn19" style="mso-endnote-id: edn19;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2414"><span data-dcnode-id="2415" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2417"><span data-dcnode-id="2418" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2419" instrument_node="">[xix]</span></span></span></span></span></a><span data-dcnode-id="2412" instrument_node="">
See further, below, ch.5.</span></p><span data-dcnode-id="2410" instrument_node="">

Compare Geschichte, histoire, storia, historía, história, etc.</span></p><span data-dcnode-id="2396" instrument_node="">

</span><p class="MsoEndnoteText" data-dcnode-id="2369" style="text-align: justify;"><a data-dcnode-id="2371" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn't%20matter/Version%203.0/v.3.0%20Ch.01%20The%20True%20Story%20Uncovered.docx#_ednref22" name="_edn22" style="mso-endnote-id: edn22;" title=""><span class="MsoEndnoteReference" data-dcnode-id="2372"><span data-dcnode-id="2373" style="mso-special-character: footnote;"><span class="MsoEndnoteReference" data-dcnode-id="2375"><span data-dcnode-id="2376" face="&quot;Calibri&quot;,sans-serif" style="font-size: 10pt; line-height: 107%; mso-ansi-language: EN-GB; mso-ascii-theme-font: minor-latin; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-bidi-language: AR-SA; mso-bidi-theme-font: minor-bidi; mso-fareast-font-family: Calibri; mso-fareast-language: EN-US; mso-fareast-theme-font: minor-latin; mso-hansi-theme-font: minor-latin;"><span data-dcnode-id="2377" instrument_node="">[xxii]</span></span></span></span></span></a><span data-dcnode-id="2370" instrument_node="">

</span></div><span data-dcnode-id="2366" instrument_node="">

See, further, below, pp.000-000</span></p><div data-dcnode-id="2351" style="text-align: justify;"><a ch.01="" data-dcnode-id="2353" ednref1="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2354" instrument_node="">[i]</span></a><span data-dcnode-id="2352" instrument_node="">&nbsp;See above, p.000,</span></div><div data-dcnode-id="2349" style="text-align: justify;"><br data-dcnode-id="2350"></div><div data-dcnode-id="2342" style="text-align: justify;"><a ch.01="" data-dcnode-id="2347" ednref2="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2348" instrument_node="">[ii]</span></a><span data-dcnode-id="2346" instrument_node="">&nbsp;Modern scholars don’t do this, intentionally at least, but it happens regularly, alongside the confusion and conflation of events, in the sources upon which they base their analyses and it is frequently impossible to know if or when this has happened. In Late Antiquity and the Early Middle Ages this is a particular problem even at the level of high politics, but it is hardly confined to periods where documentary evidence is comparatively restricted. Exactly the same issues occur when looking at accounts of modern events. To return to the Zulu War example with which I started, the point is more than adequately illustrated throughout Knight’s examination of the surviving accounts of iSandlwana and Rorke’s Drift: Knight,&nbsp;</span><i data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Zulu Rising</span></i><span data-dcnode-id="2343" instrument_node="">.</span></div><div data-dcnode-id="2340" style="text-align: justify;"><br data-dcnode-id="2341"></div><div data-dcnode-id="2336" style="text-align: justify;"><a ch.01="" data-dcnode-id="2338" ednref3="" href="file:///C:/Users/User/Dropbox/Books/Why%20history%20doesn" matter="" story="" t="" the="" true="" uncovered.docx="" v.3.0="" version=""><span data-dcnode-id="2339" instrument_node="">[iii]</span></a><span data-dcnode-id="2337" instrument_node="">&nbsp;See chapter 5, below</span></div><span data-dcnode-id="2335" instrument_node="">
</span></div><span data-dcnode-id="2333" instrument_node="">
