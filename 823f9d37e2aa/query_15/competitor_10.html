</span><div class="post hentry uncustomized-post-template" data-dcnode-id="3929" itemprop="blogPost" itemscope="itemscope" itemtype="http://schema.org/BlogPosting"><span data-dcnode-id="4162" instrument_node="">

</span><a data-dcnode-id="4157" name="2819778738929815965"></a><span data-dcnode-id="4156" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="4151" itemprop="name"><span data-dcnode-id="4155" instrument_node="">
</span><a data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2021/11/facts-and-legends-britannia-after.html"><span data-dcnode-id="4154" instrument_node="">Facts and Legends: Britannia after the Romans (until around 700)</span></a><span data-dcnode-id="4152" instrument_node="">
</span></h3><span data-dcnode-id="4150" instrument_node="">
</span><div class="post-header" data-dcnode-id="4146"><span data-dcnode-id="4149" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="4148"></div><span data-dcnode-id="4147" instrument_node="">
</span></div><span data-dcnode-id="4145" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="3997" id="post-body-2819778738929815965" itemprop="description articleBody"><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4132"><span data-dcnode-id="4143" instrument_node="">&nbsp;</span><span data-dcnode-id="4141" style="background-color: white; color: #222222; font-family: Arial, sans-serif; font-size: 12pt; text-align: justify;"><span data-dcnode-id="4142" instrument_node="">[</span></span><span data-dcnode-id="4135" style="background-color: white; color: #2b00fe; font-family: Arial, sans-serif; font-size: 12pt; text-align: justify;"><i data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">This the English original of the short piece I wrote for the German history magazine </span></i><span data-dcnode-id="4138" instrument_node="">Damals</span><i data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">. My thanks to Mischa Meier and Steffen Patzold for the invitation to participate in that issue.</span></i></span><span data-dcnode-id="4133" style="background-color: white; color: #222222; font-family: Arial, sans-serif; font-size: 12pt; text-align: justify;"><span data-dcnode-id="4134" instrument_node="">]</span></span></p><p class="MsoNormal" data-dcnode-id="4113" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4114" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4131" instrument_node="">Historians nowadays very rarely use the phrase ‘The
Dark Ages’ to describe the period after the disintegration of the western Roman
Empire. It is now understood that it wholly misrepresents the early middle ages
by implying that it was somehow a period of cultural collapse, or even an end (or
near-end) of civilisation, or that there exists so little information that no
one can know anything about it. Yet there is one part of the period that can –
in at least one sense – be described as a Dark Age, and that is Britain in the
period between about 400 and about 600. In the area of ‘the history of events’
or political history an impenetrable darkness descends upon the island. Around
550, the only stories that reached Procopius from Britain involved such things
as a wall dividing the island in two, with a fertile territory to the east and
a land where even the air was toxic to the west, and the ferrying of the souls
of the dead to this island from the Frankish coast. These seem to have been so
absurd, and so incompatible with what he knew of the history of the formerly
Roman island of </span><i data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Britannia</span></i><span data-dcnode-id="4128" instrument_node="">,</span><i data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node=""> </span></i><span data-dcnode-id="4125" instrument_node="">that Procopius invented a whole new
island, called </span><i data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Brittia,</span></i><span data-dcnode-id="4122" instrument_node=""> in which to localise them. In Britain itself, in
the early eighth century, when Bede wrote his </span><i data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Ecclesiastical History of the
English People</span></i><span data-dcnode-id="4119" instrument_node="">, he could barely find any more information than we still
have today. </span><i data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">Britannia</span></i><span data-dcnode-id="4116" instrument_node=""> had fallen off the historical map.</span><o:p data-dcnode-id="4115"></o:p></span></p><span data-dcnode-id="4112" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4096" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4097" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4111" instrument_node="">Apart from a couple of brief and extremely vague entries
in the </span><i data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Gallic Chronicle of 452</span></i><span data-dcnode-id="4108" instrument_node="">, there is only one reliable written source
that describes some outlines of British political history in this period. That
is the </span><i data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">De Excidio Britanniae</span></i><span data-dcnode-id="4105" instrument_node=""> (</span><i data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">On the Ruin of Britain</span></i><span data-dcnode-id="4102" instrument_node="">) written by
someone called Gildas. Gildas included a short historical section in what was
otherwise a sermon about the moral back-sliding of the Britons’ secular and
ecclesiastical leaders. Given that this section was only written as part of a
rhetorical composition, it was never meant to represent a serious historical
narrative; indeed, had we any actual historical sources for the period no one
would be very interested in this passage at all! Because we don’t, however, it
has acquired an importance that probably would have dismayed its author, who
wanted people to concentrate on the important part of his sermon and mend their
ways. Gildas gives us two actual names (Ambrosius Aurelianus, who was a British
leader, and ‘Agitius’, who seems to be Aëtius, the Roman general in Gaul), one
allusive reference to someone else (the ‘proud tyrant’), the name of a siege (</span><i data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Mons
Badonis</span></i><span data-dcnode-id="4099" instrument_node="">) and a general outline of events. Unfortunately, no one knows for
sure where or when Gildas wrote, who Ambrosius or the tyrant were or where
Badon Hill was, and even his narrative is so rhetorical and stylised that it
might not represent one sequence but two, which overlapped in time. It is very
difficult to do very much with this, and almost all of the other sources we
have are later and entirely unreliable.</span><o:p data-dcnode-id="4098"></o:p></span></p><span data-dcnode-id="4095" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4088" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4089" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4094" instrument_node="">Only the very beginning and the very end of the
period are quite well documented. In the first, ‘Rome’, in the form of the army
in Britain, leaves Britain; in the second, ‘Rome’ in the form of the papal
mission to the Anglo-Saxons, returns. In 406 the British garrison rebelled
against the Emperor Honorius and eventually chose a soldier called Constantine
(usually called Constantine III by historians) to be their emperor. Like most
previous British usurpers, Constantine immediately took the British army across
to Gaul. The point was not to </span><i data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">leave</span></i><span data-dcnode-id="4091" instrument_node=""> the Roman Empire (this was no
fifth-century ‘Brexit’, as some have claimed!) but to take control of it and
re-establish the fourth-century system of imperial rule, from northern Gaul,
with the close involvement of the Gallic and British provincials. Of course,
Constantine III failed; he was captured at Arles and executed in 411. At the
end of his rebellion, the Britons saw the way the war was going, expelled
Constantine’s officials and seem to have declared loyalty to Honorius. Some
garrison must have remained in Britain but no reinforcements ever reached it;
regular imperial government and administration was never restored in Britain or
even across much of neighbouring northern Gaul. </span><o:p data-dcnode-id="4090"></o:p></span></p><span data-dcnode-id="4087" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4080" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4081" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4086" instrument_node="">The political history of Roman Britain ends with
these events. Nearly two decades later, in 428, Bishop Germanus of Auxerre came
to Britain to help resolve a dispute within the island’s Christian community,
as is described in his </span><i data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Life</span></i><span data-dcnode-id="4083" instrument_node="">, written in the 480s. Clearly some British
institutions still functioned and the Britons could still get in contact with
Romans across the Channel, even if, by then, some Romans considered the island
lost. After that we have nothing to help us other than Gildas’ vague allusions,
until Saint Augustine of Canterbury, despatched to Kent by Pope Gregory I,
arrived in Kent and began the conversion of the Anglo-Saxons. Between those two
visits by churchmen – Germanus and Augustine – it is impossible to say anything
precise.</span><o:p data-dcnode-id="4082"></o:p></span></p><span data-dcnode-id="4079" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4075" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4076" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4078" instrument_node="">That does not, of course, mean that no history of
any sort is possible. We have a huge amount of archaeological evidence in the
form of burials, settlement-sites, individual finds, palaeobotanical evidence,
and so on. Sometimes the negative evidence – the abandonment of Roman villas
and towns – is as interesting as the positive. These data can tell us a great
deal about a wide range of issues, ranging from the health and diet of the
population, through their economy and management of the land, and the
organisation of their communities, through to their attitudes to issues like
gender and age. What this material does not and cannot tell us about, however,
are the details of political history.</span><o:p data-dcnode-id="4077"></o:p></span></p><span data-dcnode-id="4074" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4070" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4071" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4073" instrument_node="">For many years, nonetheless, it was believed that
the archaeological data could tell us about the ways by which the Roman
provinces of Britain became the Anglo-Saxon kingdoms of England. One thing that
is certain is that between the visit of Germanus and the arrival of Augustine
the usual or default ethnic identity in the lowlands of Britain changed from
being Roman or British to being Angle or Saxon. How did this happen? This has
been one of the major debates in the academic study of this period. Some have
proposed a mass migration from the northern regions of Germany while others
(albeit not many) have gone as far as to suggest that there was no Anglo-Saxon
migration at all. A variety of positions in between those two extremes have
also been taken. Of the latter, perhaps the best known is that of ‘élite
replacement’ or ‘élite take-over’, by which is understood the replacement of
the Romano-British aristocracy by one of north German origin. In some ways this is
analogous to the ‘ethnogenesis’ interpretation put forward by scholars such as
Herwig Wolfram: a militarised elite becomes the focus for a social aggregation,
with those who join the group adopting the leaders’ culture, origin story and
so on. In this case the cultural ‘package’ to which people subscribed would
include the English language as well as a range of cultural practices.</span><o:p data-dcnode-id="4072"></o:p></span></p><span data-dcnode-id="4069" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4059" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4060" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4068" instrument_node="">The extreme arguments are difficult to sustain,
especially the proposal, recently elaborated in a short book, that there was no
migration. The notion of a mass population movement, leaving parts of the north
of Germany deserted, and large-scale population-replacement is also much too
crude. That being said, it seems to me to be very difficult to understand some
aspects of the culture of early medieval lowland Britain without envisaging a
significant movement of people from the northern, coastal regions of what the
Romans called </span><i data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Germania Magna</span></i><span data-dcnode-id="4065" instrument_node="">. The linguistic change is one such aspect;
another is the appearance in Britain of a cremation rite very similar to that
in the Saxon territories in </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Germania</span></i><span data-dcnode-id="4062" instrument_node="">. </span><o:p data-dcnode-id="4061"></o:p></span></p><span data-dcnode-id="4058" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4042" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4043" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4057" instrument_node="">There is, however, a subtle but vitally important
distinction to be made in how we understand such changes. The change of
language, or the introduction of cremation, or the popularity of artefacts of
styles that originate on the eastern shore of the North Sea may be difficult to
understand without population movement; that does not however, mean that such
movement </span><i data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">explains</span></i><span data-dcnode-id="4054" instrument_node=""> such changes. Mass migration might occur and yet leave
almost no archaeological trace. Take, for instance, the movement of </span><i data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Germani</span></i><span data-dcnode-id="4051" instrument_node="">
into the Roman Empire between c.AD 1 and c.AD 400. During that period, many
thousands – perhaps hundreds of thousands – of people left </span><i data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">barbaricum</span></i><span data-dcnode-id="4048" instrument_node="">
and entered the Empire of their own volition, to serve in the army, or to seek
work or lands to farm. There is almost no archaeological evidence of their
presence. That which exists, ironically, is usually Roman in form: the name of,
for example, a certain Hnothfrith who commanded an auxiliary unit on the
Hadrian’s Wall frontier, is recorded in the inscription on an altar he set up, in
good Roman fashion, in the fort at Housesteads. Immigrants keen to assimilate
into a host population, especially one in which attitudes towards outsiders
could be violently hostile, will frequently adopt that population’s material
culture at the expense of their own cultural practices. In other cases, we know
of the presence of fourth-century </span><i data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Germani </span></i><span data-dcnode-id="4045" instrument_node="">in the Empire not because of any
barbarian traces they left there but because they went home again and were
eventually buried with elements of their Roman uniform</span><o:p data-dcnode-id="4044"></o:p></span></p><span data-dcnode-id="4041" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4031" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4032" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4040" instrument_node="">Hnothfrith is only known to history because he erected
an altar to three of his gods and, sensibly, the </span><i data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">numen augusti</span></i><span data-dcnode-id="4037" instrument_node="">. Perhaps,
like the fourth-century men whose ashes were buried with their old army belts in
northern German cremation cemeteries, he went home to </span><i data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Germania</span></i><span data-dcnode-id="4034" instrument_node=""> at the
end of his service and, until the end of his days, used his Roman material to show
off the impressive fact that he had served the mighty Emperor. Or perhaps he
settled down on a farm in the Roman provinces and lived out his life as a
respectable veteran, his barbarian origins entirely invisible. And yet, any
distant descendants or relatives of his who arrived in Britain in the earlier fifth
century actively proclaimed their non-Roman origins. This was a very different
situation. The shifts we can detect on fifth-century lowland Britain manifest different
cultural relationships, not necessarily a change in the patterns of human
mobility.</span><o:p data-dcnode-id="4033"></o:p></span></p><span data-dcnode-id="4030" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4023" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4024" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4029" instrument_node="">Romano-British society and economy collapsed in the
fifth century; the decline had already set in by around 400, possibly in
connection with the retreat of the centre of western imperial government from
Trier to Milan in the early 380s. It may have contributed to Constantine III’s
rebellion. There can be no doubt about that collapse, though nuance can be
added to the statement. The melt-down might not have been as absolute as was
once believed; some areas – especially those further west – might have survived
better and for longer. Nevertheless it is indisputable that the lowlands of
Britain in c.475 were unrecognisable from those of a century earlier. In a
world where traditional Roman cultural forms, such as villas and towns, had
disappeared, new forms of identity and new bases of power had to be
established. This did not necessarily mean abandoning Roman-ness; the fourth-century
army had adopted all sorts of ‘barbarian’ or ‘barbarised’ identities without
thereby ceasing to be Roman. The multiple layers of late Roman identity
probably allowed people to navigate these changes, make common cause with
soldiers from </span><i data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">barbaricum</span></i><span data-dcnode-id="4026" instrument_node=""> (as throughout the fifth-century West) and even
perhaps accept their leadership.</span><o:p data-dcnode-id="4025"></o:p></span></p><span data-dcnode-id="4022" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4012" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4013" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4021" instrument_node="">In my own book on this period I suggested a
‘two-pronged’ model for political change in lowland Britain, on analogy with a
reading of how northern Gaul became Francia. Gildas’ story of how Saxon troops
were hired and posted to the British frontier might in reality have meant that
they were stationed on the edges of the lowland zone, to which some
archaeological evidence might suggest the frontier had been withdrawn in the late
fourth century. This border region between highlands and lowlands was the
wealthiest part of late Roman Britain and was also the area where the most
powerful Anglo-Saxon kingdoms emerged. Whoever controlled the forces in this
band of territory would have an enormous advantage. It is also possible that
the language of the Saxon leaders could act as a lingua franca in areas like
these, where there were Latin- and British-speakers. The other ‘prong’ would be
the people migrating from northern </span><i data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Germania</span></i><span data-dcnode-id="4018" instrument_node=""> and arriving in the eastern
coastal regions. The social and economic crisis around 400 had affected the
coastal regions of northern Germany too, causing political upheavals and, as
was often the case in such circumstances, migration from </span><i data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">barbaricum</span></i><span data-dcnode-id="4015" instrument_node=""> into
Roman territory, in this case Britannia, as well as the coast of Gaul.</span><o:p data-dcnode-id="4014"></o:p></span></p><span data-dcnode-id="4011" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="4001" style="background: white; line-height: 18.0pt; margin-bottom: 6.0pt; text-align: justify;"><span data-dcnode-id="4002" lang="EN-GB" style="color: #222222; font-family: &quot;Arial&quot;,sans-serif; font-size: 12.0pt; mso-fareast-font-family: &quot;Times New Roman&quot;; mso-fareast-language: EN-GB;"><span data-dcnode-id="4010" instrument_node="">This political struggle for mastery of the lowlands
is usually the backdrop for the legends of ‘King Arthur’, a doomed ‘last of the
Romans’ attempting to defend civilisation against an onslaught of barbarians.
Sadly, we can never know whether Arthur existed. There is no reliable evidence
that he was a real historical personage, but equally there is no way of being
sure that a genuine figure did not lie behind the later legend. In the fifth
century, real figures could easily disappear from history. The Roman general
Syagrius (possibly an analogue for Arthur) would have been forgotten, had not
Gregory of Tours read a lost source (probably a </span><i data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Life</span></i><span data-dcnode-id="4007" instrument_node=""> of Remigius of
Rheims) that mentioned him in connection with the tale of the Vase of Soissons.
But, as is shown by the story of Syagrius and his father Aegidius and their
rivalry with Childeric and his son Clovis for control of the Frankish army on
the Loire, fifth-century politics very rarely settled down into a neat binary
opposition between barbarian invaders on one side and Roman defenders on the
other. Gildas talks of ‘civil war’ in Britain as dominating the former
provinces’ recent history, rather than barbarian invasions. If the rest of the
western Empire provides any sort of guide to the sorts of process that went on
in lowland Britain between 400 and 500 we ought to envisage warfare between different
factions, each one made up of alliances of Romans </span><i data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">and</span></i><span data-dcnode-id="4004" instrument_node=""> Barbarians.
‘Roman’ generals could command ‘barbarian’ armies, or ‘barbarian’ generals
might lead the armies of a ‘Roman’ polity. When, in the eighth, ninth and tenth
centuries, writers came to compose their histories of fifth- and sixth-century
Britain, what they wanted (as their contemporaries in mainland Europe also
wanted) was a story of how one people – that which by their day dominated the
area in which they lived – had come to oust those who had occupied these lands
before. Conquest and expulsion was the only model they had for explaining how
one ethnic identity had replaced another. How had the barbarian Franks or
Saxons ousted the Romans? Roman commanders of Saxon troops in a
Romano-Barbarian faction had no place in that kind of narrative. In that
scenario any Arthur figure who might once have existed had only one place left
open for him, and that was legend.</span><o:p data-dcnode-id="4003"></o:p></span></p><span data-dcnode-id="4000" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3908"><span data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Thursday, 7 October 2021</span></span></h2><span data-dcnode-id="3907" instrument_node="">
</span><div class="date-posts" data-dcnode-id="3664"><span data-dcnode-id="3906" instrument_node="">
</span><div class="post-outer" data-dcnode-id="3666"><span data-dcnode-id="3905" instrument_node="">
</span><div class="post hentry uncustomized-post-template" data-dcnode-id="3668" itemprop="blogPost" itemscope="itemscope" itemtype="http://schema.org/BlogPosting"><span data-dcnode-id="3904" instrument_node="">
</span><meta content="3910237413712551558" data-dcnode-id="3903" itemprop="blogId"><span data-dcnode-id="3902" instrument_node="">
</span><meta content="5011457536643008357" data-dcnode-id="3901" itemprop="postId"><span data-dcnode-id="3900" instrument_node="">
</span><a data-dcnode-id="3899" name="5011457536643008357"></a><span data-dcnode-id="3898" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="3893" itemprop="name"><span data-dcnode-id="3897" instrument_node="">
</span><a data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2021/10/how-world-forgot-about-far-western.html"><span data-dcnode-id="3896" instrument_node="">How the World forgot about Far-Western Eurasia</span></a><span data-dcnode-id="3894" instrument_node="">
</span></h3><span data-dcnode-id="3892" instrument_node="">
</span><div class="post-header" data-dcnode-id="3888"><span data-dcnode-id="3891" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="3890"></div><span data-dcnode-id="3889" instrument_node="">
</span></div><span data-dcnode-id="3887" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="3736" id="post-body-5011457536643008357" itemprop="description articleBody"><span data-dcnode-id="3886" instrument_node="">
</span><div data-dcnode-id="3874" style="text-align: justify;"><span data-dcnode-id="3875" style="color: #2b00fe;"><span data-dcnode-id="3885" instrument_node="">[</span><i data-dcnode-id="3877"><span data-dcnode-id="3884" instrument_node="">I am at a bit of a loss as to how to open The End of Western Antiquity. I essayed an alternative opening on here </span><a data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2015/04/the-ghostly-horizon-of-year-600.html"><span data-dcnode-id="3883" instrument_node="">before</span></a><span data-dcnode-id="3881" instrument_node="">. I still like that, but one of the things that I want to do in this book is, while writing about western Europe, not give the impression that this history is in some sense privileged. I want to attempt to decentre Europe while writing about it (indeed I would argue that the western concept of 'Europe' belongs to this period of what I think of as the 'closing of far western Eurasia'). I have talked about this </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2019/01/decentring-western-european-history-in.html"><span data-dcnode-id="3880" instrument_node="">before</span></a><span data-dcnode-id="3878" instrument_node="">. A lot of recent history has tried to make the case for information networks between east and west and these, to be sure, existed. I think, though, that for all the effort the harvest is pretty meagre and that the interest is largely one-way. At the same time, though, I don't think that the West was in thrall to the 'Byzantine' East or slavishly copying it. I think it was going its own way, but it was a way that ran separately to the great networks of early medieval world history.  See what you think, anyway. This is very much a first draft and, in this version at any rate, it lacks any references.</span></i><span data-dcnode-id="3876" instrument_node="">]</span></span></div><p data-dcnode-id="3830" style="text-align: justify;"><span data-dcnode-id="3873" instrument_node="">Sometime around the middle of the sixth century, the scholar and bureaucrat Procopius of Caesarea was finishing the eighth and final book of his greatest work, </span><i data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">The Histories</span></i><span data-dcnode-id="3870" instrument_node="">, narrating the closing stages of the Gothic War in Italy. Around the middle of that book, however, in a somewhat unexpected detour, he decided to tell a story that he had heard about a war between the Varni (a people) and the soldiers who live on the island of </span><i data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Brittia</span></i><span data-dcnode-id="3867" instrument_node="">.&nbsp; In this tale he locates the Varni beyond the Ister (the river Danube) with their territory reaching as far as the Ocean, along the other side of the Rhine from the Franks, the people who by this time ruled what had been Roman Gaul (and who obviously gave their name to modern France). Procopius says that peoples like the Franks, the Varni and others all had their own tribal names but really they were all </span><i data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Germanoi </span></i><span data-dcnode-id="3864" instrument_node="">(‘Germans’).&nbsp; This is intriguing in its own right but when Procopius turns to the island of </span><i data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Brittia </span></i><span data-dcnode-id="3861" instrument_node="">things get stranger. </span><i data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Brittia</span></i><span data-dcnode-id="3858" instrument_node="">, he says, lies opposite the mouth of the Rhine. We could be forgiven for thinking, on those grounds, that Procopius means Britain but he confounds that expectation. </span><i data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Brittia</span></i><span data-dcnode-id="3855" instrument_node="">, he tells us, lies between Britain (</span><i data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Brettania</span></i><span data-dcnode-id="3852" instrument_node="">) and Thule, which in his geography appears to be Scandinavia. Procopius says that </span><i data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Brittia</span></i><span data-dcnode-id="3849" instrument_node=""> is inhabited by three peoples: the </span><i data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Angiloi</span></i><span data-dcnode-id="3846" instrument_node="">, the </span><i data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">Frissones</span></i><span data-dcnode-id="3843" instrument_node="">, and the </span><i data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Brittones </span></i><span data-dcnode-id="3840" instrument_node="">– the Angles (eventually the English), the Frisians and the Britons. Later, Procopius mentions a great wall built in ancient times, which divides this island into two. The replacement of the Saxons by the Frisians in the list of peoples we might expect to encounter in sixth-century Britain is interesting and the account of Hadrian’s wall is garbled but nonetheless </span><i data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Brittia </span></i><span data-dcnode-id="3837" instrument_node="">seems, in spite of Procopius’ earlier comment, to be Britain after all. What is this </span><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Brittia </span></i><span data-dcnode-id="3834" instrument_node="">that is not </span><i data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Britannia</span></i><span data-dcnode-id="3831" instrument_node="">, this Britain that is not Britain?&nbsp;</span></p><p data-dcnode-id="3807" style="text-align: justify;"><span data-dcnode-id="3829" instrument_node="">There are plausible-looking elements of sixth-century history in Procopius’ story but they are embedded in what looks like a fairy tale. In his account, the Varni were ruled by a king called Hermegiscel who allied with Theudebert, king of the Austrasian Franks, and married his sister. Hermegiscel had a son called Radegis by a previous, deceased wife, whom he had betrothed to a princess, born in Brittia and sister of the king of the </span><i data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Angiloi</span></i><span data-dcnode-id="3826" instrument_node="">. After allegedly predicting his own death from something he heard in the croak of a bird in a tree, Hermegiscel advised his son to discard his betrothed and instead marry his stepmother, on the grounds that the Franks were a more dangerous neighbour than the Angiloi. After his father died (as predicted), Radegis did as he had been advised and married his father’s widow. Although he compensated his fiancée, the latter was not satisfied and, when diplomacy failed to make a difference, she led an expedition of 100,000 men in 400 ships to the land of the Varni, alongside one of her other brothers. After describing the sail-less vessels of the </span><i data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Angiloi </span></i><span data-dcnode-id="3823" instrument_node="">and how neither they nor the Varni have any mounted warriors (in the case of the </span><i data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Angiloi </span></i><span data-dcnode-id="3820" instrument_node="">because no horse has, according to Procopius, ever been seen in </span><i data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">Brittia</span></i><span data-dcnode-id="3817" instrument_node="">) Procopius tells how the Angiloi defeated the Varni. Radegis, hiding in a wood, was captured but the spurned princess, far from killing or injuring him, berated him for his fickleness and compelled him to make good his promise of marriage. So Radegis returned his step-mother to the Franks and married the young woman from </span><i data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Brittia</span></i><span data-dcnode-id="3814" instrument_node="">.&nbsp; This is one of those stories that present a puzzle to historians of Late Antiquity. Some of its elements admittedly look interesting and plausible&nbsp; but can we justifiably sift them from a context that is obviously mired in the mythic? A garbled – but genuine – historical event or an old folktale with modern names inserted to increase its plausibility? The remainder of the chapter does not reduce the problem, for Procopius goes on to tell us about the ancient wall that divides the island. Unlike Hadrian’s Wall, this divides the island east from west. More than that, according to Procopius, whereas all the land east of the wall is fertile and prosperous, the land to the west is so fetid and toxic that no man can live once he has entered it. As if that is not strange enough, Procopius rounds off the chapter with a story that even he admits sounds like mythology. However, says he, since many other people have written about the story or claim to be first-hand witnesses of it, he will record it because, although he thinks people must just have dreamed it, it would look as though he was ignorant of the nature of this island if he left it out. On the coast of the kingdom of the Franks, says Procopius, live fishermen who pay no tribute to the Franks in return for performing the service of transporting the souls of the dead to the island of </span><i data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">Brittia</span></i><span data-dcnode-id="3811" instrument_node="">. At night they hear a mysterious voice summoning them to this task and are drawn to crew boats which appear on the shore. Although no one can be seen in them, they feel heavy and sink low in the water. The fishermen row these boats across to the island of </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Brittia </span></i><span data-dcnode-id="3808" instrument_node="">where they hear a voice which calls out the names, careers and fathers’ names of the men or the names of the husbands of the women, feminism evidently not really being a thing on the Isle of the Dead. After this, the boats seem quite empty and skip lightly over the water back to the land of the Franks.&nbsp;&nbsp;</span></p><p data-dcnode-id="3781" style="text-align: justify;"><span data-dcnode-id="3806" instrument_node="">What is going on here? The wall is clearly a bizarre rendition of Hadrian’s Wall, and the story of </span><i data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">Brittia </span></i><span data-dcnode-id="3803" instrument_node="">as the Isle of the Dead is possibly a play on the similarity between </span><i data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">Thanatos </span></i><span data-dcnode-id="3800" instrument_node="">– death – and Thanet, the eastern tip of Kent, and an island in antiquity.&nbsp; That misunderstanding, or possibly pun, was known in late antiquity. In the early seventh century, Isidore of Seville repeated information from Julius Solinus’ third-century </span><i data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Wonders of the World</span></i><span data-dcnode-id="3797" instrument_node="">, which said that the name of the island of Thanet came from the Greek word for death but (possibly confusing it with Ireland) that this was because snakes could not live there and that soil from the island would kill them.&nbsp; Something like this might lie behind Procopius’ story but two points should be made.&nbsp; One is that the text itself does not name the island as </span><i data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">Tanatos </span></i><span data-dcnode-id="3794" instrument_node="">(Thanet), rather than </span><i data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Brittia</span></i><span data-dcnode-id="3791" instrument_node="">, or speak of death or the dead; it talks rather of souls (</span><i data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">psyche</span></i><span data-dcnode-id="3788" instrument_node="">). The other is that a Thanet/</span><i data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Thanatos </span></i><span data-dcnode-id="3785" instrument_node="">wordplay could only have originated among native Greek-speakers in Procopius’ own world or the much reduced and rapidly declining number of educated westerners who, like Isidore, knew Greek.&nbsp; The fruitfulness of the east of the island possibly came from a source like Solinus, who says that Thanet is bounteous and fertile, but if so it had been badly mangled by the time it reached Procopius, for Solinus clearly gives the name of the island as Thanet; there is no </span><i data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Brittia </span></i><span data-dcnode-id="3782" instrument_node="">in his account. In any case Procopius’ story of the isle of the dead contains not the faintest echo of anything in Solinus’ account, in which Thanet is simply the most prosperous of the many islands off Britain.&nbsp;</span></p><p data-dcnode-id="3758" style="text-align: justify;"><span data-dcnode-id="3780" instrument_node="">Wherever he obtained his information, the strange reports about </span><i data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Brittia </span></i><span data-dcnode-id="3777" instrument_node="">seem to have been a problem to Procopius, who made clear his scepticism about at least some of them. The difference between the islands of </span><i data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Britannia</span></i><span data-dcnode-id="3774" instrument_node=""> and </span><i data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Brittia</span></i><span data-dcnode-id="3771" instrument_node="">, which Procopius expressed as geographical, is probably historical.&nbsp; Until the end of the fourth century, Britain had been part of the Roman world, close to its administrative centre and frequently involved in high-level politics, as Procopius was aware. He knew from various written sources that early in the fifth century it had raised the usurper Constantine against Emperor Honorius and that, after Constantine’s suppression, it had not been recovered by the Empire but had been ruled by tyrants. In his own day, the stories that reached him from Britain were of a quite different order; Procopius himself thought they were only marginally credible. They were more akin to the tales told in classical ethnography about the isles of remote north-western </span><i data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Barbaricum</span></i><span data-dcnode-id="3768" instrument_node="">, at the end of the world.&nbsp; How could a Roman province, even one now ruled by ‘tyrants’, be the source of such mad tales? Procopius appears to have refused to accept that it could be; the stories must have originated in Barbaricum and so he invented the additional North Sea island of </span><i data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Brittia</span></i><span data-dcnode-id="3765" instrument_node="">. The opposition between civilised </span><i data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Bretannia</span></i><span data-dcnode-id="3762" instrument_node=""> and weird, barbarous </span><i data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Brittia </span></i><span data-dcnode-id="3759" instrument_node="">illustrates how, between the beginning of the fifth and the middle of the sixth century, the former north-western provinces of the Roman Empire had, for educated inhabitants of the Mediterranean, simply dropped off the edge of the known world.&nbsp;</span></p><p data-dcnode-id="3753" style="text-align: justify;"><span data-dcnode-id="3757" instrument_node="">Procopius’ ignorance about Britain is nonetheless not surprising. When Procopius was finishing his Histories, Georgius Florentius was a young boy growing up in the Auvergne, the heart of the Massif Central in the centre of the southern Gaul. Thirty years later, as Bishop Gregory of Tours, he would be composing his own </span><i data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Histories</span></i><span data-dcnode-id="3754" instrument_node="">, moved to write by the profound changes of the later sixth-century whose analysis lies at the heart of the present book. Gregory was fairly well-informed about the Mediterranean world and had a reasonable knowledge of political events in the Eastern Roman Empire. But of Britain, he knew, or at least said, next to nothing in spite of it lying considerably closer to his world than to that of Procopius; indeed, it was geographically much closer to his world than the Mediterranean regions he tells us so much more about. He twice mentions the marriage of a Frankish princess to a Kentish notable, variously described as a ‘man’ and as a ‘son of a king’, and that is it. His gaze, as is well-known, firmly faced the south and the east. When one remembers that, during this period, it produced no historians of its own to make up for mainland European writers’ lack of interest in its affairs, it is no surprise that Britain effectively falls out of recorded history between c.410 and c.597.&nbsp;</span></p><p data-dcnode-id="3748" style="text-align: justify;"><span data-dcnode-id="3752" instrument_node="">Procopius’ ignorance did not start at the Channel, though. His knowledge even of Gallic history and geography was tenuous and littered with strange stories and misunderstandings. Here, the contrast with his fourth-century precursor Ammianus Marcellinus, another Greek-speaker from the Levantine coast,&nbsp; is if anything even clearer. Ammianus finished his </span><i data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">Res Gestae</span></i><span data-dcnode-id="3749" instrument_node=""> (loosely ‘Deeds Done’) a little over 150 years before Procopius completed the first seven books of his Histories but it is inconceivable that he could have been as confused about Gallic geography as Procopius was. It would be wrong to say that the western provinces had been central to fourth- and fifth-century works composed in the Eastern Empire but they had featured nevertheless. How could they not? An Emperor resided in northern Gaul for much of that period; Gallic bishops like Hilary of Poitiers had played important roles in imperial theological controversies. Within two or three generations of Procopius, however, Eastern Roman historians barely mentioned Gaul, let alone Britain. Italy mattered of course; some of it remained imperial territory and the home of the Pope. The Iberian peninsula, however, was drifting beyond their consciousness.&nbsp; By contrast, western writers, especially in Spain and Italy, continued to write about events in the East. The mid-seventh-century Burgundian chronicler known as Fredegar knew of some political and military happenings in the Eastern Empire and its neighbours, even if his accounts were sometimes confused. This interest was, however, barely reciprocated by writers in the eastern Mediterranean or beyond. East of the Adriatic, among even educated people, by the seventh century the western tip of the Eurasian land-mass had, for whatever reason, simply ceased to matter.</span></p><p data-dcnode-id="3746" style="text-align: justify;"><span data-dcnode-id="3747" instrument_node="">Nonetheless, as will be discussed in more detail later in this volume, maritime trade continued to connect the eastern and western Mediterranean until well into the last quarter of the sixth century and beyond. When Procopius was writing, such seaborne networks continued to reach around the Iberian Peninsula, up the west coast of Gaul and thence to the eastern shores, especially, of the Irish Sea. In fact, in the fifth and earlier sixth centuries the western regions of what had been Roman Britain had more extensive and important contacts with the Mediterranean world than they had during the four centuries of imperial rule. One reason for that was that the longer-distance seaborne routes between the formerly Roman parts of mainland Europe and lowland Britain – now becoming ‘Anglo-Saxon’ kingdoms – appear generally to have atrophied in the fifth century. Stories could have reached Procopius from the Romanised magnates of Western Britain suggesting that Britannia was still recognisably a former Roman province. Whatever stories arrived from the eastern side of the island came via another route and seemed to represent a very different world resembling the mythical islands described by classical authors. By the end of the period that concerns this book these commercial networks too had largely vanished, replaced by rather different webs of interaction.</span></p><p data-dcnode-id="3744" style="text-align: justify;"><span data-dcnode-id="3745" instrument_node="">This disjuncture between the trading links and the seeming disconnection of the written sources is important. Historians and archaeologists have become ever more interested in recreating past networks, an interest boosted by the development of statistical tools and ‘network theory’. Yet, although we can plot lines on maps that ultimately connect places like Tintagel in Cornwall with Carthage in North Africa or Phocaea in the Levant, what did that mean to the people who lived their lives at each end of such a connection? In the last third of the sixth century there were sailors who knew of certain products, such as tin,&nbsp; that could be obtained from formerly Roman Britain. They knew that there was a market there for Mediterranean wine, oil and high-quality table-ware. The people from whom they bought, or perhaps for whom they sold, their wares and to whom they brought back, and possibly sold, other goods and materials seem, however, to have had no more interest in these far western lands than they had had, in previous centuries, in the lands whence came the amber in their jewellery. Britain, it seems, even lost its rhetorical function as the northern limit of civilisation. Meanwhile, for those in the former western Roman provinces, the east was fast becoming a land of Christian legend and infrequent pilgrimage. Once, a network had radiated from the Mediterranean in all directions, joining up with similar webs spun from China and India; by c.600 the capes and archipelagos of far western Eurasia had largely fallen out of that network of connections.</span></p><p data-dcnode-id="3742" style="text-align: justify;"><span data-dcnode-id="3743" instrument_node="">What are the implications of this isolation? In traditional grand narratives, from Henri Pirenne through to Perry Anderson, these shifts forced western Europe to turn in on itself. For Pirenne the closure of the Mediterranean, which he ascribed to the Arab invasions of the later seventh century, compelled a shift of the western European centre of gravity from the Mediterranean northwards to the Rhineland, and an increased focus on North Sea commerce. Hence Pirenne’s famous dictum that ‘without Mohammed, Charlemagne is inconceivable’. Things did not end there, though. This was only the first chapter in a narrative of the rise of the great European trading cities which in time became the foundation for Western European capitalism and Empire. In Anderson’s Marxist vision, the ‘inward turn’ of Europe after Rome produced feudalism which, in turn, provided the dynamics for urban rebirth, technological advancement and, again, eventually capitalism and the domination of the West.&nbsp;</span></p><p data-dcnode-id="3740" style="text-align: justify;"><span data-dcnode-id="3741" instrument_node="">The isolation of the far western edges of Eurasia from the great cultural and economic networks of the Early Middle Ages has somehow become part of a triumphalist European grand narrative, explaining how those peripheral western peninsulas and the archipelago just off its shore became the centres of world-exploiting colonial empires. It is, however, worth shedding a different light on this period. It is perhaps helpful to remember that this was a period when what became western Europe (not a geographical term of the time) was peripheral in a global sense; when, as continued to be the case for a millennium afterwards, it had little to offer the great trading networks, when the Empires at the heart of the Eurasian landmass had little to no interest in it.</span></p><span data-dcnode-id="3739" instrument_node="">

</span><div class="date-posts" data-dcnode-id="3462"><span data-dcnode-id="3656" instrument_node="">

</span><div class="post hentry uncustomized-post-template" data-dcnode-id="3466" itemprop="blogPost" itemscope="itemscope" itemtype="http://schema.org/BlogPosting"><span data-dcnode-id="3654" instrument_node="">

</span><a data-dcnode-id="3649" name="3353328553719433963"></a><span data-dcnode-id="3648" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="3643" itemprop="name"><span data-dcnode-id="3647" instrument_node="">
</span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//600transformer.blogspot.com/2021/07/a-difficult-decade-apology.html"><span data-dcnode-id="3646" instrument_node="">A Difficult Decade; An Apology</span></a><span data-dcnode-id="3644" instrument_node="">
</span></h3><span data-dcnode-id="3642" instrument_node="">
</span><div class="post-header" data-dcnode-id="3638"><span data-dcnode-id="3641" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="3640"></div><span data-dcnode-id="3639" instrument_node="">
</span></div><span data-dcnode-id="3637" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="3534" id="post-body-3353328553719433963" itemprop="description articleBody"><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3635" instrument_node="">&nbsp;</span><span data-dcnode-id="3633" style="text-align: justify;"><span data-dcnode-id="3634" instrument_node="">Readers of this blog will know that I have long suffered with mental health issues, especially depression. I haven't made any secret of this, largely because I felt it was one small way of confronting the stigma which continues to be associated with mental illness.</span></span></p><p data-dcnode-id="3624" style="text-align: justify;"><span data-dcnode-id="3631" instrument_node="">It's been a difficult decade or so for me, including a minor 'breakdown' (as it would have been called) in late 2015 and several spectacular screw-ups which have been linked one way or another to my mental health.&nbsp; It was, however, only around the end of 2019 that I began to realise that the depression might be more of a symptom of something else than the whole problem in itself. Reassessing some of my own problematic behaviour led to reading some online articles&nbsp;about Autism Spectrum Disorder, then some books, and taking some fairly well-respected tests(</span><span data-dcnode-id="3629" style="color: red;"><span data-dcnode-id="3630" instrument_node="">1</span></span><span data-dcnode-id="3628" instrument_node="">). The results seemed pretty clear; I am 'on the spectrum'; neurodivergent. Now, this may not come as a surprise to a lot of you, but it did to me. Like a lot of so-called 'high-functioning' (problematic term) adults, I had managed to conceal my neurodiversity even from myself.(</span><span data-dcnode-id="3626" style="color: red;"><span data-dcnode-id="3627" instrument_node="">2</span></span><span data-dcnode-id="3625" instrument_node="">) It was also a case of me having the usual caricature preconceptions of autism. I can't draw the Houses of Parliament from memory after having looked at them for a few seconds; I can't remember 80-digit strings of numbers; whatever. Indeed, for a lot of my lifetime, nobody really was aware of quite how broad the spectrum is or of how it can present over time, at different stages of life. I still don't have a formal diagnosis; the NHS has an 18-month-to-two-year waiting list and obviously (as it should) prioritises people who need more basic support in negotiating everyday life. Private organisations have 6-month waiting lists and a diagnosis can cost £2-3k. Fortunately I am in a position to set some wheels in motion on that front. I do have an opinion from a qualified professional (a specialist counsellor), though, and for now that's good enough for me.</span></p><p data-dcnode-id="3619" style="text-align: justify;"><span data-dcnode-id="3623" instrument_node="">What has become very clear to me is that most of my 'masking' strategies were age-related or even age-appropriate. I masked my uneasiness in social situations and not 'getting' the rules either by making a joke, being a clown or otherwise being consciously unconventional. We autistic (or likely autistic) folk tend to prefer straight talking and - as is well known - don't really 'get' meanings that are wrapped up in diplomatic-speak (this is possibly even more a problem in the UK)(</span><span data-dcnode-id="3621" style="color: red;"><span data-dcnode-id="3622" instrument_node="">3</span></span><span data-dcnode-id="3620" instrument_node="">); my default setting to asking a question after a paper, if there was something I didn't agree with or wanted to discuss, was just to come out and say so; if someone asked me if X might be the case rather than Y, as I had suggested, my natural response is to say 'no - it's not'. You asked a question; I answered. What's the problem? If someone gave a bad paper or wrote a bad book, you say so, right? I never 'got' the idea that you'd be really complimentary about a piece of work and trash it in private conversation. To be honest, I still don't really get that, even if I have learned - slowly and painfully - not just to 'have a go' like I used to. It took me 20 years to learn to say 'thank you for your paper [etc]' before asking a question and to say 'thank you for your question; it's a good question...' before answering and it still seems unnatural, as though I am stiltedly reciting a script and everyone must notice that.</span></p><p data-dcnode-id="3611" style="text-align: justify;"><span data-dcnode-id="3618" instrument_node="">All of this was exacerbated by being of my generation. Most, if not all, of us have role models; we try to teach like the people who we respected as teachers, to write like the people whose writing we admire, and so on. This is especially important, though, to those of us on (or likely on) the spectrum. We learn to cope in social situations by copying the behaviour of people who seem to be good at it.(</span><span data-dcnode-id="3616" style="color: red;"><span data-dcnode-id="3617" instrument_node="">4</span></span><span data-dcnode-id="3615" instrument_node="">) Now, when I was young what we'd now see as aggressive, 'macho' - even really unnecessarily dismissive - behaviour seemed to be the mark of the 'fearsome intellectual' (of whatever sex/sexuality). I remember an interview for a Junior Research Fellowship at Oxford when, after a well-known historian of Anglo-Saxon England really laid into me and this really knocked me over, I was told that the correct response was 'to come right back at them'. My PhD viva consisted of 3 hours of another well-known Oxford historian/archaeologist basically being rude about my work (after having told me at the beginning that I had passed, so that was OK). None of this was especially easy to deal with, especially when your default reaction when confronted by people who have the sort of cast-iron self-confidence that comes with a certain British socio-educational background, is to assume they must be right. In those days, spectacularly critical book reviews - often downright rude - were frequently shared with awe and admiration. Dorothy Parker/Margot Asquith-style put-downs seemed to be prized. Not by everyone, obviously (there were some people who were forward thinking), but it was a very common attitude, and some of the forward-thinkers seemed to be just as capable of being vicious in other ways. My first head of department (who once threw a set of keys at me and, on another occasion, shouted at me and told me I didn't do any work, in front of the whole department) was someone who shouldered their way to the very top of the profession. These things make a big impression when you have no instinctive idea of how to manage social situations. Although we have difficulty with unwritten social conventions, we autistics can simultaneously rigidly observe more obvious hierarchies/rules, so I tended to look up to senior folk that behaved like this. I still find it difficult&nbsp;</span><i data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">not</span></i><span data-dcnode-id="3612" instrument_node="">&nbsp;to treat the 'great and good' with probably excessive intellectual deference. They may not realise this!&nbsp;</span></p><p data-dcnode-id="3600" style="text-align: justify;"><span data-dcnode-id="3610" instrument_node="">Anyway, all of this was OK when I was a young/er academic. You can be a clown, a joker, and also a bit brash - a bit of a fire-eater - when you're a young&nbsp;</span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">man</span></i><span data-dcnode-id="3607" instrument_node="">&nbsp;in academia.(</span><span data-dcnode-id="3605" style="color: red;"><span data-dcnode-id="3606" instrument_node="">5</span></span><span data-dcnode-id="3604" instrument_node="">) There were some of the great and good that took against me in c.1991 and have never accepted me since; I always assumed this was a class thing (and to some extent I still think it was) but I now realise this was probably mostly because of my social difficulties. But generally you can get on pretty well as an 'enfant terrible' - up to a point. If you work hard and you are a good teacher, being unconventional, a joker, etc., is 'cool' and you can get away with being a bit of a hard task-master on occasion; it was all part of the package that was 'Guy'.(</span><span data-dcnode-id="3602" style="color: red;"><span data-dcnode-id="3603" instrument_node="">6</span></span><span data-dcnode-id="3601" instrument_node="">) But - for obvious reasons - none of this still works when you're in your late 40s/50s and a 'senior professor'. Well, the reasons are obvious if you have some sort of natural understanding of social situations and how they work. If you don't, well, not so much. My masking strategies have serially failed and left me very exposed. And unhappy. In consequence I have done a number of silly things, some of which I regret for reasons other than that they made me look like a twat.</span></p><p data-dcnode-id="3598" style="text-align: justify;"><span data-dcnode-id="3599" instrument_node="">Part of the problem has also been that I treat most people in pretty much the same way (this is classic ASD behaviour) but, having that possibly excessive deference to my elders, I have expected the respect due to the status I have earned, not in obvious deference, but just in respect that Inabe been doing this a long time, know what I am talking about, and am good at what I do. I think that was what I saw as the pay-off for me generally being informal with people of whatever status (I am not saying that any of this is logically consistent or 'correct'). I have often, as a result, got really angry when I have thought people were talking down to me (of course they may very well not have been). It's symptomatic of a classic ASD obsession with fairness and justice. Unfortunately I have often not realised how what I say has different effects on different people. To be basic, when I say 'oh don't be a dick' to an old friend and (now) fellow-prof, it has very different effects to when I say the same thing to a post-grad, although I mean it no differently. This may seem obvious to you... That's the point. I have had to learn all this and it has taken too long.</span></p><p data-dcnode-id="3587" style="text-align: justify;"><span data-dcnode-id="3597" instrument_node="">The discovery that I am very likely on the spectrum has been a&nbsp;</span><i data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">lot&nbsp;</span></i><span data-dcnode-id="3594" instrument_node="">to take in. A considerable amount of that has been like turning a light on all sorts of my life; why I am the way I am. Some of it has been regret; if only I had known this when I was [whatever age], either I maybe wouldn't have behaved like that or I would have known how to explain it, or how to get support.(</span><span data-dcnode-id="3592" style="color: red;"><span data-dcnode-id="3593" instrument_node="">7</span></span><span data-dcnode-id="3591" instrument_node="">) Sometimes it makes me retrospectively angry (or yet angrier): so&nbsp;</span><i data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">that's</span></i><span data-dcnode-id="3588" instrument_node="">&nbsp;why those people bullied me, marked my card in career terms. I have essentially taken partial retirement because of the ongoing failure of my employer to take account of mental illness. It's really not been a retrospective 'get out of jail free card' for my bad behaviour, though; quite the opposite. Previously if I had a melt-down with someone, although I might have wished, for myself, that I hadn't done it, I comforted myself with the idea that at least I was in the right. Now, quite apart from realising that the effect of my words might have been much more hurtful than I supposed (see above) or intended, I also realise that there was also a very high chance that I had the wrong end of the stick and that I had not understood the situation at all.</span></p><p data-dcnode-id="3585" style="text-align: justify;"><span data-dcnode-id="3586" instrument_node="">So, with that in mind I would like, here and now, to make a public apology to the following, all of whom I have lost my rag with either in person or online in a way that - regardless of anything else - was inappropriate, offensive and possibly hurtful:</span></p><div data-dcnode-id="3577" style="text-align: center;"><span data-dcnode-id="3584" instrument_node="">Mr Jack Wiegand</span><br data-dcnode-id="3583"><span data-dcnode-id="3582" instrument_node="">Dr Jen Edwards</span><br data-dcnode-id="3581"><span data-dcnode-id="3580" instrument_node="">Dr Jon Jarrett</span><br data-dcnode-id="3579"><span data-dcnode-id="3578" instrument_node="">Dr John Jenkins</span></div><div data-dcnode-id="3573" style="text-align: center;"><span data-dcnode-id="3576" instrument_node="">Ms Kataya McKeever-Willis</span><br data-dcnode-id="3575"><span data-dcnode-id="3574" instrument_node="">Dr Rachel Stone.</span></div><p data-dcnode-id="3571" style="text-align: justify;"><span data-dcnode-id="3572" instrument_node="">Regardless of any other rights and wrongs, I shouldn't have said what I said in the way I said or in the context in which I did so.&nbsp; There are doubtless others who deserve such an apology; I may therefore add to the list above. There are certainly other people I have had rows with in public and have gone about things the wrong way; let's just say that either, for one reason or another, I don't feel as bad about them or I have publicly apologised before.</span></p><p data-dcnode-id="3569" style="text-align: justify;"><span data-dcnode-id="3570" instrument_node="">It's possible that I will blog more about my experience of neurodiversity in academia, or possibly set up a new blog for that. In the meantime, thanks for reading.</span></p><p data-dcnode-id="3566" style="text-align: justify;"><b data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Notes</span></b></p><p data-dcnode-id="3562" style="text-align: justify;"><span data-dcnode-id="3564" style="color: red;"><span data-dcnode-id="3565" instrument_node="">1</span></span><span data-dcnode-id="3563" instrument_node="">: The common tests are problematic, as is fairly well known, but the problems seem to concern subjects who aren't white males. Funnily enough, my own demographic appears to have been the default setting (hardly anything surprising about that, and far more widespread in medicine than just in issues of psychology/psychiatry). More socially disadvantaged or marginalised groups tend to 'mask' in more extensive and different ways. As far as I can tell, though, these tests are OK for white males.</span></p><p data-dcnode-id="3558" style="text-align: justify;"><span data-dcnode-id="3560" style="color: red;"><span data-dcnode-id="3561" instrument_node="">2</span></span><span data-dcnode-id="3559" instrument_node="">: To the extent that when I went through the tests with my partner I would be reading out symptoms and saying 'well, that's not really me is it?' and she'd reply 'er, hello? What about x, y and z?'</span></p><p data-dcnode-id="3554" style="text-align: justify;"><span data-dcnode-id="3556" style="color: red;"><span data-dcnode-id="3557" instrument_node="">3</span></span><span data-dcnode-id="3555" instrument_node="">: Once, when I was about to something that turned out to do me a fair amount of harm, a senior colleague told me that I needed to 'think carefully' before doing it. So I thought carefully about it. And did it. Afterwards he said 'obviously I meant you shouldn't do it; you should have realised that'.&nbsp;</span></p><p data-dcnode-id="3550" style="text-align: justify;"><span data-dcnode-id="3552" style="color: red;"><span data-dcnode-id="3553" instrument_node="">4</span></span><span data-dcnode-id="3551" instrument_node="">: Check out my writings about social theory. This all seems to take on a new significance now.</span></p><p data-dcnode-id="3546" style="text-align: justify;"><span data-dcnode-id="3548" style="color: red;"><span data-dcnode-id="3549" instrument_node="">5</span></span><span data-dcnode-id="3547" instrument_node="">: This again points up all of the everyday sexism in academia, as well as in the diagnosis of autism.</span></p><p data-dcnode-id="3542" style="text-align: justify;"><span data-dcnode-id="3544" style="color: red;"><span data-dcnode-id="3545" instrument_node="">6</span></span><span data-dcnode-id="3543" instrument_node="">: I had a colleague over a decade ago now who told me how impressed he was that all the students just refer to me as 'Guy'. I was pretty cool in those days, even if I say so myself, but that was then.&nbsp;</span></p><p data-dcnode-id="3538" style="text-align: justify;"><span data-dcnode-id="3540" style="color: red;"><span data-dcnode-id="3541" instrument_node="">7</span></span><span data-dcnode-id="3539" instrument_node="">: Obviously, for someone my age, the frustration is only increased by the fact that awareness of many relevant aspects of ASD simply didn't exist back then.&nbsp;</span></p><span data-dcnode-id="3537" instrument_node="">
</span><div data-dcnode-id="3536" style="clear: both;"></div><span data-dcnode-id="3535" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="3456"><span data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Tuesday, 6 April 2021</span></span></h2><span data-dcnode-id="3455" instrument_node="">
</span><div class="date-posts" data-dcnode-id="2256"><span data-dcnode-id="3454" instrument_node="">
</span><div class="post-outer" data-dcnode-id="3098"><span data-dcnode-id="3453" instrument_node="">
</span><div class="post hentry uncustomized-post-template" data-dcnode-id="3100" itemprop="blogPost" itemscope="itemscope" itemtype="http://schema.org/BlogPosting"><span data-dcnode-id="3452" instrument_node="">
