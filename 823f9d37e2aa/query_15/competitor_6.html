</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Becoming a practicing historian, be it in academia or elsewhere, requires a rigorous academic foundation. From a university’s history professors to the archivists at the Library of Congress, all of these people studied history in some academic capacity and now dedicate themselves to better understanding the past, its preservation, and our relationship to it.</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Beyond positions actively and directly related to the academic discipline, a degree in history offers an especially dynamic range of career options. Reading, writing, and research skills are honed, making the history graduate particularly suited for careers ranging from teaching to law. The following guide highlights the required steps for becoming a historian while also providing helpful resources.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><span data-dcnode-id="1981" instrument_node="">
</span><div class="c-dig-deeper flex flex-col mb-9 md:mb-12" data-dcnode-id="1947" id="dig-deeper"><span data-dcnode-id="1980" instrument_node="">
</span><div class="bg-quaternary-50 p-8 rounded-t-lg" data-dcnode-id="1972"><span data-dcnode-id="1979" instrument_node="">
</span><div class="text-lg font-bold text-gray-600 mb-2" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">History Degrees and Careers At-a-Glance</span></div><span data-dcnode-id="1976" instrument_node="">
</span><p class="text-base" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">A degree in history, whether bachelor’s or advanced, prepares graduates for a multitude of careers. As research and writing skills are required for many professional paths, the historian’s skills span industries. Beyond the role of educator or archivist, individuals with this degree are just as much in demand in politics, law, libraries and the literary world. While these skills are essential, this expansive set of career possibilities can be a bit daunting, making the choice of a career path difficult. This guide aims to offer a focused look into career opportunities for the potential historian.</span></p><span data-dcnode-id="1973" instrument_node="">
</span></div><span data-dcnode-id="1971" instrument_node="">
</span><div class="bg-quaternary-100 p-8 hidden" data-dcnode-id="1957" id="dig-deeper-panel"><span data-dcnode-id="1970" instrument_node="">
</span><div class="text-lg font-bold text-gray-600 mb-2" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">History Degrees and Careers In-Depth</span></div><span data-dcnode-id="1967" instrument_node="">
</span><div class="text-base" data-dcnode-id="1959"><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Although associate degrees in history are available, it is uncommon for the professional historian to hold less than a bachelor’s degree. Undergraduate degrees allow for history-specific career options while also laying the academic foundation for graduate pursuits. A bachelor’s in history opens the door for those seeking to be educators, while also preparing the historian for work in archives, historical preservation and museums. While a bachelor’s degree opens the door to more historically-focused roles, graduate-level coursework is common for those pursuing specialized history careers. For those individuals who wish to work in academia, a PhD is the standard course of study. </span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Because an undergraduate degree in history provides numerous career options, it’s worth focusing on a specific career related to history to better understand the value of this area of study. The following section highlights the role of an archivist, academic requirements, and the characteristics that make it a fascinating and valuable career. Though they may not be constantly in the spotlight, archivists are an invaluable asset to the field of history, historians, and society as as a whole. The Society of American Archivists proudly states that the selection, preservation and organization of archival materials not only protects the documentation of our social and cultural history, but establishes a catalog of information through which our government, individuals, and business can be held accountable. As a result, archivists have a seemingly quiet, though essential role in a functioning democracy.</span></p><span data-dcnode-id="1960" instrument_node="">
</span></div><span data-dcnode-id="1958" instrument_node="">

</span><h2 data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Job Growth, Prospects and Outlook for History Careers</span></h2><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">The federal government has a long history of employing historians as well as those in related fields. In fact, the BLS reported that the federal government employed almost a quarter of all U.S. historians in 2012. However, this leaves the history-related jobs at the mercy of government funding, which might explain the slow growth of many jobs in this field. Organizations that are not dependent upon government funds or donations might see higher demand for historians, librarians, and those in related fields. </span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">There are more history graduates than there are positions for those in directly related fields. Therefore, those interested in this field may have to take advantage of their wide breadth of education and branch out. Below is a list of states with the highest anticipated job growth for different history professions.</span></p><span data-dcnode-id="1933" instrument_node="">

</span><a class="subnav-waypoint" data-dcnode-id="1365" id="steps-to-become-an-archivist" name="steps-to-become-an-archivist"></a><span data-dcnode-id="1364" instrument_node="">
</span><h2 data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Careers in History: Steps to Becoming an Archivist with a History Degree</span></h2><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Careers in history are varied, and you’ll learn about several later on in this guide. Here, we’re featuring a career as an archivist with a degree in history, and we’ll show you the steps to get there.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><section class="c-step mb-9 md:mb-12" data-dcnode-id="1317"><span data-dcnode-id="1357" instrument_node="">
</span><div class="flex flex-col border-l-4 border-primary-600 pl-6 py-2 mb-6" data-dcnode-id="1349"><span data-dcnode-id="1356" instrument_node="">
</span><div class="text-primary-600 text-sm" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Step 1</span></div><span data-dcnode-id="1353" instrument_node="">
</span><div class="text-gray-900 font-bold text-2xl" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Complete a history degree</span></div><span data-dcnode-id="1350" instrument_node="">
</span></div><span data-dcnode-id="1348" instrument_node="">
</span><div data-dcnode-id="1319"><span data-dcnode-id="1347" instrument_node="">While undergraduate history degrees provide a foundation for a career in archival work, it’s becoming more and more common for institutions to require a master’s degree from their archival staff. As a result, rigorous work in an undergraduate degree is critical in gaining admittance into a graduate program. </span><h6 data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Undergraduate</span></h6><span data-dcnode-id="1344" instrument_node=""> A four-year undergraduate history degree supplies students with the academic underpinning to pursue the necessary graduate work leading to a career in the archives. The majority of history programs include both general coursework and research, giving students direct experience of what archives can offer. Upon completion of an undergraduate degree, students should then begin looking for a master’s degree program well-suited to their goals. </span><h6 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Graduate</span></h6><span data-dcnode-id="1341" instrument_node=""> According to the American Historical Association, master’s degrees in history have become the generally accepted standard for professional archival work and there are two ways of ticking this box. The first path is a master’s degree in history. Students electing to follow the first route enroll in an American history program with a concentration in public history. Within the study of public history, graduate students can focus their energies on the theoretical and practical elements of archival studies. The second route is a master’s degree in library and information science. While libraries are sometimes viewed as dusty and archaic, a graduate degree in library science is on the cutting edge of archival studies. The AHA explains that a master’s in library science will teach the nuts and bolts of archival work while simultaneously incorporating the technological advancements of the 21st century. The Society of American Archivists lays out clear expectations for graduate programs and what they should provide an aspiring archivist. The list below is a thoughtful guide that can act as a measuring stick for graduate programs:
</span><ul data-dcnode-id="1321"><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Provides students with a solid foundation in the theory, methodology, and practice of archival science, and in archival history and scholarship</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Strengthens this foundation by giving students the opportunity to acquire knowledge from allied and complementary disciplines</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Assists students to develop critical thinking and decision-making skills related to all forms of records in the context of business, government, public needs, scientific research, or the protection of cultural heritage</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Prepares students to manage and preserve authentic and trustworthy records as well as relevant materials regardless of format</span></li><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Prepares students to conduct and communicate scholarly research</span></li><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Communicates to students the knowledge of the ethical and legal dimensions of their work and impresses upon them a sense of their professional and social responsibilities</span></li><span data-dcnode-id="1322" instrument_node="">
</span></ul><span data-dcnode-id="1320" instrument_node="">
</span></div><span data-dcnode-id="1318" instrument_node="">
</span></section><span data-dcnode-id="1316" instrument_node="">
</span><section class="c-step mb-9 md:mb-12" data-dcnode-id="1296"><span data-dcnode-id="1315" instrument_node="">
</span><div class="flex flex-col border-l-4 border-primary-600 pl-6 py-2 mb-6" data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node="">
</span><div class="text-primary-600 text-sm" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Step 2</span></div><span data-dcnode-id="1311" instrument_node="">
</span><div class="text-gray-900 font-bold text-2xl" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Find an Internship</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span><div data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node="">Hands-on, experiential learning is beneficial in many educational environments, but this is especially true for students in the archives. Learning how to handle, maintain and preserve historical documents—both paper and digital—is the archivist’s job. </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//history.fas.nyu.edu/object/history.gradprog.archivespublichistory.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1304" instrument_node="">NYU</span></a><span data-dcnode-id="1302" instrument_node=""> offers a widely praised master’s in archives and public history with an internship component, and universities across the country have </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//aphdigital.org/internships/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1301" instrument_node="">robust</span></a><span data-dcnode-id="1299" instrument_node=""> networks for students to find internships that can prove critical when entering the workforce. </span></div><span data-dcnode-id="1297" instrument_node="">
</span></section><span data-dcnode-id="1295" instrument_node="">
</span><section class="c-step mb-9 md:mb-12" data-dcnode-id="1281"><span data-dcnode-id="1294" instrument_node="">
</span><div class="flex flex-col border-l-4 border-primary-600 pl-6 py-2 mb-6" data-dcnode-id="1286"><span data-dcnode-id="1293" instrument_node="">
</span><div class="text-primary-600 text-sm" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Step 3</span></div><span data-dcnode-id="1290" instrument_node="">
</span><div class="text-gray-900 font-bold text-2xl" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">FIND A J-O-B</span></div><span data-dcnode-id="1287" instrument_node="">
</span></div><span data-dcnode-id="1285" instrument_node="">
</span><div data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Experience gained during an internship is often elemental in securing the first job in the field. Being involved in activities and with organizations/groups is a great way to network and meet people in the archival and history worlds. Just as an internship provides hands-on experience, introducing yourself to people in the archival arena could be valuable when it comes time to applying for your first job. Both the Society of American Archivists and the Academy of Certified Archivists have active job boards.</span></div><span data-dcnode-id="1282" instrument_node="">
</span></section><span data-dcnode-id="1280" instrument_node="">
</span><section class="c-step mb-9 md:mb-12" data-dcnode-id="1266"><span data-dcnode-id="1279" instrument_node="">
</span><div class="flex flex-col border-l-4 border-primary-600 pl-6 py-2 mb-6" data-dcnode-id="1271"><span data-dcnode-id="1278" instrument_node="">

</span><a class="subnav-waypoint" data-dcnode-id="1139" id="degrees-concentrations" name="degrees-concentrations"></a><span data-dcnode-id="1138" instrument_node="">
</span><h2 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">History Degrees &amp; Concentrations</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Degrees in history provide both theoretical and concrete knowledge at every level, though a students understanding of each are deepened as they move further into higher education. Because history reaches far back into our collective past and covers every civilization, there are also many different concentrations available. Keep reading to learn more. </span></p><span data-dcnode-id="1132" instrument_node="">
</span><h3 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Associate History Degree</span></h3><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">An associate degree in history provides students with a basic inventory of historical knowledge in considerably less time than a bachelor’s degree. While shorter in credit hours, this degree still challenges the student to consider social, political, economic and cultural histories and how each relates to our understanding of current domestic and world climates. Completion of this degree prepares students for admission into four-year institutions and acts as an introduction into related career fields. </span></p><span data-dcnode-id="1126" instrument_node="">
</span><h4 data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">United States History up to 1865</span></h4><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Exams economic, political and social developments in the country, ranging from Colonial America until the Civil War.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h4 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">United States History since 1865</span></h4><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Acquaints students with America’s history after the Civil War through to present day, with focus on World Wars I and II, the Great Depression, the Civil Rights Movement, and the Vietnam war, among others.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><h4 data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">World Civilizations to the 16th Century</span></h4><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Traces the rise of early civilizations, ranging from Japan and India to China and Europe. Students will gain a clearer understanding of the context for later events in world history.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><h4 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">World Civilizations since the 16th Century</span></h4><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Introduces students to the main developments and central themes throughout world civilizations from the 16th century until present, with focus on areas of Europe, Asia, Africa, and the Americas.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><h3 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Bachelor’s Degree in History</span></h3><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">A bachelor’s degree in history provides students with skills in critical thinking, research and writing that are necessary for a career or graduate work. Augmented by other liberal arts coursework, students graduate with a well-rounded set of intellectual tools to investigate the past with a keen and critical eye. Students study histories, domestic and abroad, recent and ancient, and develop research and writing skills that may eventually result in substantial, original historical research. An undergraduate degree in history can lead to careers ranging from archival work to freelance writing while also laying the groundwork for graduate degrees ranging from history to law.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><h4 data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Historical Methods</span></h4><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Provides students with necessary tools for analyzing original texts and producing thoughtful historical writing. Students are introduced to historiography and varied historical theories while also learning about research methods and source evaluation.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><h4 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Historical Writing</span></h4><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Introduces students to the craft of historical research and writing and builds a toolbox for framing original research. Students also continue honing their research skills and learn about writing styles specific to the craft of history.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><h4 data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Civil War and Reconstruction</span></h4><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Explores topics related to the Civil War, including the causes and consequences. Students are asked to consider how a transformative event in history has lasting effects.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><h4 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Russian Revolutions</span></h4><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Investigates two major revolutions taking place in the Russian Empire in 1905 and 1917. Students are asked to dig into the political, social, economic, and cultural issues at work and focus on a particular component to create an extended essay.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><h3 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Master’s Degree in History</span></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">This is typically a two-year program focusing on a more specific area of history and providing graduates with specialized expertise in their area of study. Advanced courses challenge the student to perform intellectually at an especially high level and in many cases produce a thesis of publishable quality and academic heft. A master’s degree in history can also act as preparation and as a prerequisite for admittance into a PhD program. As mentioned at above, a master’s in public history is generally required for professional work in archives. </span></p><span data-dcnode-id="1066" instrument_node="">
</span><h4 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Historiography</span></h4><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Focuses on the historical profession, providing students with concrete approaches and frameworks necessary to produce sound, properly researched historical documents. </span></p><span data-dcnode-id="1060" instrument_node="">
</span><h4 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Historical Methods and Writing</span></h4><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Typically taught at all levels of a history degree; at the graduate level, this course takes a deeper look at the different fields of study, theories, and methodologies at work within the discipline.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><h4 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Introduction to Archives</span></h4><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Welcomes students to the wonderful world of archival management, highlighting common tasks and manuscript collections. Other topics may include copyright and usage rights, referencing, and disaster planning.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><h4 data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Public History</span></h4><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Method and Theory. Teaches students about the methodological and theoretical frameworks surrounding the study of public history. These courses tend to be interactive and include opportunities for fieldwork, site visits, projects and workshops.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h3 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">PhD Degree in History</span></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The most demanding and advanced study of history, obtaining a PhD requires years of discipline, patience, and work of the highest intellectual and academic quality. In most cases, this degree prepares the student for a professional life dedicated to scholarship and teaching. Although securing tenured positions as a history professor has become considerably more difficult in recent years, history will always be taught, and there will always be a need for history professors. Following the coursework required for this degree, the PhD candidate will submit a dissertation of publishable quality, effectively rendering them an expert on the topic they’ve written about. The following classes are examples of what PhD students might encounter in their studies.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><h4 data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">American History and Criticism</span></h4><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Challenges students to consider how historians have approached and written about American history throughout time, be it related to scientific discovery, religious influence, or social relations.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><h4 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Approaches to International and Global History</span></h4><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Explores topics related to world systems and civilizational approaches. Students compare historical accounts, study migration patterns, and consider cross-cultural dialogues related to international accounts of history.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><h4 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Early Modern Jewish History</span></h4><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Covers the 1450’s until the 1750’s and asks students to reflect on how individuals of Jewish descent have interacted in non-Jewish communities. Special emphasis is placed on understanding how their society and culture, along with religious practices, have influenced – or been influenced by – other cultures.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><h4 data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Historical Research</span></h4><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Focuses not on the research students are reading, but rather on how historians used their research to craft a narrative, and on the methodologies and theories employed to develop historical arguments and theses.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><a class="subnav-waypoint" data-dcnode-id="1011" id="career-paths" name="career-paths"></a><span data-dcnode-id="1010" instrument_node="">
</span><h2 data-dcnode-id="1007"><span data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">History Career Paths</span></span></h2><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">History majors are found in almost every profession. In fact, a survey of history graduates from Vanderbilt University found that 30 percent went on to careers in business, 24 percent went into law, 17 percent turned to education, seven percent went into the military, and 12 percent went into other professions such as journalism, archival research and management, consulting, </span><a class="wpil_keyword_link" data-dcnode-id="1003" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.learnhowtobecome.org/counselor/" title="counseling"><span data-dcnode-id="1004" instrument_node="">counseling</span></a><span data-dcnode-id="1002" instrument_node="">, museum administration, and legislative work. Another eight percent went on to graduate school to study something other than law, such as psychology or business administration. </span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">However, despite the versatility of a history education, there are  some jobs that put the degree to more literal use, such as those in libraries or museums. Here are a few of the interesting history careers available: </span></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Museum Curator</span></h3><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Curators are responsible for handling museums’ collections. They often oversee the collections from acquisition to exhibit, and sometimes even handle the sale of certain items. In addition to authenticating, evaluating, categorizing and properly displaying museum treasures, curators might also raise funds for the museum, conduct research on museum pieces, promote events or collections, and write grant proposals. </span></p><span data-dcnode-id="991" instrument_node="">
</span><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Education requirements</span></strong><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Master’s degree in history, art or a related field, although some employers prefer a doctoral degree, especially for museums of natural history or sciences</span></p><span data-dcnode-id="985" instrument_node="">
</span><h3 data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Museum Technician</span></h3><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Also known as registrars, museum technicians directly assist curators by preparing museum items for display and caring for items when they are on the museum floor or in storage. They might help curators evaluate and authenticate collections. They often speak with the public about the various collections and might lead museum tours. </span></p><span data-dcnode-id="979" instrument_node="">
</span><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Education requirements</span></strong><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Bachelor’s degree in history or a related field</span></p><span data-dcnode-id="973" instrument_node="">
</span><h3 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Archivist</span></h3><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Archivists focus on historical documents, especially those from a particular time period. Job duties might include authenticating rare or recently unearthed documents, carefully preserving documents that are thought to be of historical value, researching items that could be added to a collection, and providing educational or public outreach, such as guiding tours or dealing with the media. In addition to documents, archivists might also work with electronic records, photographs, maps, sound recordings and even websites. </span></p><span data-dcnode-id="967" instrument_node="">
</span><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Education requirements</span></strong><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Master’s degree in history or a related field</span></p><span data-dcnode-id="961" instrument_node="">
</span><h3 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Librarian</span></h3><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The history degree often serves as a great foundation for librarians, whose work consists of helping others locate the books, documents and other information they need, whether for work or pleasure. Librarians might work directly with the public or in administrative services; they can be found in schools, academic libraries and public libraries. </span></p><span data-dcnode-id="955" instrument_node="">
</span><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Education requirements</span></strong><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Master’s degree in library science</span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">History Teacher</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Those who love history might enjoy teaching it to others, whether at the K-12 or postsecondary level. History teachers bring history to life in the classroom with interactive educational experiences, lectures, reading assignments, creative homework requirements and the like. They might also produce original research. </span></p><span data-dcnode-id="943" instrument_node="">
</span><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Education requirements</span></strong><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Master’s degree for K-12 or community college work; doctorate for university work</span></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Historian</span></h3><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">These experts are keepers of the past. They study and collect historical documents and memorabilia; conduct research on items, places, people and times of interest; and present their findings to colleagues, organizations, museums, schools and others. Historians might work to preserve items or places, develop theories for research, publish their findings or engage with the public. </span></p><span data-dcnode-id="931" instrument_node="">
</span><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Education requirements</span></strong><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Master’s degree or doctorate in history or historical studies</span></p><span data-dcnode-id="925" instrument_node="">
</span><h2 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Components of a Successful Career in History: Skills, Tools and Technology</span></h2><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Skills</span></h3><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Although there are numerous career paths in the history field, the skills that students learn along the way will hold them in good stead for a variety of non-history-related jobs. These are some of the most sought-after skills that come naturally to many history grads: </span></p><span data-dcnode-id="916" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="914" icon="check-circle" title="Research skills"><span data-dcnode-id="915" instrument_node="">
The very nature of history requires research into the past, and that skill carries over to almost any career field. The ability to examine information and draw logical conclusions from it is an integral part of historical study and benefits anyone — from financial analysts to consultants to professors.
</span></sonic-checklist-item><span data-dcnode-id="913" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="911" icon="check-circle" title="Attention to detail"><span data-dcnode-id="912" instrument_node="">
Historical accuracy requires strict attention to detail; the wrong date entered in a research paper or incorrect information when establishing authenticity of an antique can make a huge, possibly career-ending difference. Attention to detail is a fantastic advantage in any profession, from the businessman closing a deal to the writer on a deadline.
</span></sonic-checklist-item><span data-dcnode-id="910" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="908" icon="check-circle" title="Problem-solving"><span data-dcnode-id="909" instrument_node="">
History often presents interesting problems, such as how to determine the particular date of a document or how historical events unfolded. The ability to solve problems is an excellent skill for anyone from lawyers to politicians to CEOs.
</span></sonic-checklist-item><span data-dcnode-id="907" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="905" icon="check-circle" title="Good communication"><span data-dcnode-id="906" instrument_node="">
Communication skills are honed for history majors through public speaking, research papers and roundtable discussions. Being able to speak intelligently about research findings, create a list of key points in a presentation and communicate through every medium are important parts of any career.
</span></sonic-checklist-item><span data-dcnode-id="904" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="902" icon="check-circle" title="Strong writing skills"><span data-dcnode-id="903" instrument_node="">
From writing grant proposals to finding the perfect phrasing to describe a museum exhibit, writing skills are an absolute must. This skill carries over to almost any other profession, especially those that require constant communications in written form, such as attorneys or teachers. 
</span></sonic-checklist-item><span data-dcnode-id="901" instrument_node="">
</span><sonic-checklist-item color="primary-500" data-dcnode-id="899" icon="check-circle" title="Analytical skills"><span data-dcnode-id="900" instrument_node="">
Those with an interest in history quickly learn the value of analyzing large amounts of historical data to find the truth of a matter. This is essential for anyone who works in a job that requires him or her to sift through information and get down to the key points, such as an attorney, human resource professional or manager.
</span></sonic-checklist-item><span data-dcnode-id="898" instrument_node="">
</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Tools and Technology</span></h3><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Those who work in the history field use a variety of tools and technology, depending on the specific career. These might include computer programs such as Adobe Systems, Web Scrapbook, and Microsoft Word. But there are others that are more specialized, including: </span></p><span data-dcnode-id="890" instrument_node="">
</span><sonic-columns columns="2" data-dcnode-id="873"><span data-dcnode-id="889" instrument_node="">

</span><sonic-checklist-item color="quaternary-500" data-dcnode-id="881" icon="chevron-right"><span data-dcnode-id="882" instrument_node="">Archival databases</span></sonic-checklist-item><span data-dcnode-id="880" instrument_node="">
</span><sonic-checklist-item color="quaternary-500" data-dcnode-id="878" icon="chevron-right"><span data-dcnode-id="879" instrument_node="">Gutenberg-e</span></sonic-checklist-item><span data-dcnode-id="877" instrument_node="">
</span><sonic-checklist-item color="quaternary-500" data-dcnode-id="875" icon="chevron-right"><span data-dcnode-id="876" instrument_node="">ArchiveGrid</span></sonic-checklist-item><span data-dcnode-id="874" instrument_node="">
</span></sonic-columns><span data-dcnode-id="872" instrument_node="">
</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Additional tools may also be needed, such as scanners and copiers, microfiche or microfilm machines and assistive listening devices. </span></p><span data-dcnode-id="867" instrument_node="">
</span><h2 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">History Salaries</span></h2><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">The salaries for history careers can vary widely, depending on the profession. Below is a list of history salaries for the most common careers pursued by history graduates. </span></p><span data-dcnode-id="861" instrument_node="">

</span><h2 data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">History Degree and Career Resources</span></h2><span data-dcnode-id="385" instrument_node="">
</span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.certifiedarchivists.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="384" instrument_node="">Academy of Certified Archivists</span></a><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">As a group of archivists, the Academy has essentially created uniform expectations the practice of archiving. Their website provides substantial information for archivists and prospective archivists.</span></p><span data-dcnode-id="379" instrument_node="">
</span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historians.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="378" instrument_node="">American Historical Association</span></a><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">This is the main organization for American historians, and their website is an excellent tool for individuals interested in pursuing history in any academic capacity.</span></p><span data-dcnode-id="373" instrument_node="">
</span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ala.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="372" instrument_node="">American Library Association</span></a><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Another resource for those interested in a career in the archives, ALA has an extensive database for researching master’s degree programs in library science and information.</span></p><span data-dcnode-id="367" instrument_node="">
</span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ncph.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="366" instrument_node="">National Council on Public History</span></a><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Working to build a community for public historians, this is a useful group to engage with if thinking about a degree in public history. The site has a job board and a calendar of interesting events.</span></p><span data-dcnode-id="361" instrument_node="">
</span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.archivists.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="360" instrument_node="">Society of American Archivists</span></a><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">An incredible site for archivists and those interested in the field, this website has endless resources ranging from educational materials to a career/job board. For those interested in the field, consider becoming a member.</span></p><span data-dcnode-id="355" instrument_node="">
