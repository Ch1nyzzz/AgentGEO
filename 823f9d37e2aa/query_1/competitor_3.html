E</span></td><td data-dcnode-id="7517"><span data-dcnode-id="7518" instrument_node="">1981: Rural women protest lower-than-minimum wages paid to them for famine-relief work. Roy files a case on behalf of the women against the state. The women win the case at the Supreme Court.</span></td></tr><tr data-dcnode-id="7511"><td data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">I</span></td><td data-dcnode-id="7512"><span data-dcnode-id="7513" instrument_node="">1984: The name Barefoot College is adopted (SWRC remains the registered name).</span></td></tr><tr data-dcnode-id="7506"><td data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">E</span></td><td data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">1985: A craft fair is jointly organized by SWRC and several government agencies. One thousand women from all over India participate in the four-day event.</span></td></tr><tr data-dcnode-id="7501"><td data-dcnode-id="7504"><span data-dcnode-id="7505" instrument_node="">I</span></td><td data-dcnode-id="7502"><span data-dcnode-id="7503" instrument_node="">1986: A local “architect” (no professional degree) designs the Barefoot campus. Rural employees use traditional design elements to build the college, which is solar electrified.</span></td></tr><tr data-dcnode-id="7496"><td data-dcnode-id="7499"><span data-dcnode-id="7500" instrument_node="">I</span></td><td data-dcnode-id="7497"><span data-dcnode-id="7498" instrument_node="">1988: An experimental primary school is started by Barefoot.</span></td></tr><tr data-dcnode-id="7491"><td data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node="">E</span></td><td data-dcnode-id="7492"><span data-dcnode-id="7493" instrument_node="">1989: For the first time, women begin attending local council meetings (panchayats).</span></td></tr><tr data-dcnode-id="7486"><td data-dcnode-id="7489"><span data-dcnode-id="7490" instrument_node="">I</span></td><td data-dcnode-id="7487"><span data-dcnode-id="7488" instrument_node="">1998: Kamala Devi becomes the first woman to be trained as a solar engineer.</span></td></tr><tr data-dcnode-id="7481"><td data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">I</span></td><td data-dcnode-id="7482"><span data-dcnode-id="7483" instrument_node="">2002: Barefoot is awarded the Aga Khan Award for the college building’s architecture. Barefoot later returns the award since the award citation included the name of a professional architect.</span></td></tr><tr data-dcnode-id="7476"><td data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node="">I</span></td><td data-dcnode-id="7477"><span data-dcnode-id="7478" instrument_node="">2000: Barefoot develops solar water heaters to provide rural communities access to a sustainable, smoke-free source of hot water. Rural youth, all men, are trained to build and install the heaters.</span></td></tr><tr data-dcnode-id="7471"><td data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">I</span></td><td data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">2003: Barefoot creates the Society of Women Barefoot Solar Cooker Engineers.</span></td></tr><tr data-dcnode-id="7458"><td data-dcnode-id="7468"><strong data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">I</span></strong></td><td data-dcnode-id="7459"><strong data-dcnode-id="7466"><span data-dcnode-id="7467" instrument_node="">2003</span></strong><span data-dcnode-id="7465" instrument_node=""> </span><sup data-dcnode-id="7463"><span data-dcnode-id="7464" instrument_node="">a</span></sup><span data-dcnode-id="7462" instrument_node=""> </span><strong data-dcnode-id="7460"><span data-dcnode-id="7461" instrument_node="">: The solar training program exclusively for women is formally launched.</span></strong></td></tr><tr data-dcnode-id="7453"><td data-dcnode-id="7456"><span data-dcnode-id="7457" instrument_node="">I</span></td><td data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">2004: Barefoot receives an award from the Skoll Foundation.</span></td></tr><tr data-dcnode-id="7448"><td data-dcnode-id="7451"><span data-dcnode-id="7452" instrument_node="">I</span></td><td data-dcnode-id="7449"><span data-dcnode-id="7450" instrument_node="">2006: International solar training program launched to train women from developing countries.</span></td></tr><tr data-dcnode-id="7443"><td data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">E</span></td><td data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">2010: Nauroti, a former Barefoot employee, becomes the first woman to head a local council (panchayat).</span></td></tr><tr data-dcnode-id="7435"><td data-dcnode-id="7441"><span data-dcnode-id="7442" instrument_node="">I</span></td><td data-dcnode-id="7436"><span data-dcnode-id="7440" instrument_node="">2010: Roy is recognized by </span><em data-dcnode-id="7438"><span data-dcnode-id="7439" instrument_node="">TIME</span></em><span data-dcnode-id="7437" instrument_node=""> magazine as one of the 100 most influential people in the world.</span></td></tr><tr data-dcnode-id="7430"><td data-dcnode-id="7433"><span data-dcnode-id="7434" instrument_node="">I</span></td><td data-dcnode-id="7431"><span data-dcnode-id="7432" instrument_node="">2012: Barefoot collaborates with UNESCO's Global Partnership for Girls’ and Women’s Education.</span></td></tr><tr data-dcnode-id="7425"><td data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">I</span></td><td data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">2012: The Dalai Lama visits Barefoot College.</span></td></tr><tr data-dcnode-id="7420"><td data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">I</span></td><td data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">2013: Roy receives the Clinton Global Citizen Award along with activist Malala Yousufzai.</span></td></tr><tr data-dcnode-id="7415"><td data-dcnode-id="7418"><span data-dcnode-id="7419" instrument_node="">I</span></td><td data-dcnode-id="7416"><span data-dcnode-id="7417" instrument_node="">2015: Barefoot College enters into partnerships with Hogan Lovell International and Microsoft Inc.</span></td></tr><tr data-dcnode-id="7402"><td data-dcnode-id="7412"><strong data-dcnode-id="7413"><span data-dcnode-id="7414" instrument_node="">I</span></strong></td><td data-dcnode-id="7403"><strong data-dcnode-id="7410"><span data-dcnode-id="7411" instrument_node="">2016</span></strong><span data-dcnode-id="7409" instrument_node=""> </span><sup data-dcnode-id="7407"><span data-dcnode-id="7408" instrument_node="">a</span></sup><span data-dcnode-id="7406" instrument_node=""> </span><strong data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">: Enriche program launched with the objective of supporting women to become “entrepreneurs and leaders to transform themselves and their communities.”</span></strong></td></tr><tr data-dcnode-id="7397"><td data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">I</span></td><td data-dcnode-id="7398"><span data-dcnode-id="7399" instrument_node="">2016: Barefoot launches digital literacy programs for women.</span></td></tr><tr data-dcnode-id="7392"><td data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">I</span></td><td data-dcnode-id="7393"><span data-dcnode-id="7394" instrument_node="">2016: Beekeeping and honey marketing enterprise programs are launched to train women entrepreneurs.</span></td></tr><tr data-dcnode-id="7387"><td data-dcnode-id="7390"><span data-dcnode-id="7391" instrument_node="">I</span></td><td data-dcnode-id="7388"><span data-dcnode-id="7389" instrument_node="">2017: The coffee program is launched for women entrepreneurs, providing training and access to a centralized solar roasting facility in Tilonia.</span></td></tr><tr data-dcnode-id="7382"><td data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">I</span></td><td data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">2018: The Enriche Bazaar is organized to develop business, financial, and marketing skills.</span></td></tr><tr data-dcnode-id="7377"><td data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">I</span></td><td data-dcnode-id="7378"><span data-dcnode-id="7379" instrument_node="">2018: Barefoot receives the Hillary Institute Award for sustainability.</span></td></tr><tr data-dcnode-id="7372"><td data-dcnode-id="7375"><span data-dcnode-id="7376" instrument_node="">I</span></td><td data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">2018: Barefoot develops a gender sensitization curriculum for schools in collaboration with Girl Rising.</span></td></tr><tr data-dcnode-id="7367"><td data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">E</span></td><td data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">2019: Barefoot women run a solar workshop at the UN Sustainable Development festival in Germany.</span></td></tr><tr data-dcnode-id="7362"><td data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">I</span></td><td data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">2019: Solar digital night schools are launched in collaboration with Microsoft.</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="7353"><dt data-dcnode-id="7357" id="tf0005"><span data-dcnode-id="7358" instrument_node="">a</span></dt><dd data-dcnode-id="7354"><p data-dcnode-id="7355" id="np0005"><span data-dcnode-id="7356" instrument_node="">Turning points signifying substantial shifts in practices and demarcating temporal brackets.</span></p></dd></dl></div></div></section></section><section data-dcnode-id="7316" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7343" id="st0060"><span data-dcnode-id="7348" instrument_node="">3.2</span><span data-dcnode-id="7346" instrument_node="">. </span><span data-dcnode-id="7344" instrument_node="">Research design</span></h3><p data-dcnode-id="7317" id="p0865"><span data-dcnode-id="7342" instrument_node="">We adopted a longitudinal case study methodology given our focus on social practices and processes in a locally bound context (</span><a class="workspace-trigger" data-dcnode-id="7340" href="#bb0570" name="bbb0570"><span data-dcnode-id="7341" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="7339" instrument_node="">). Our site location in rural India provided us “a textbook example of a hierarchical society” with patently obvious patterns of inequality (</span><a class="workspace-trigger" data-dcnode-id="7337" href="#bb0090" name="bbb0090"><span data-dcnode-id="7338" instrument_node="">Béteille, 1965</span></a><span data-dcnode-id="7336" instrument_node="">: 46; </span><a class="workspace-trigger" data-dcnode-id="7334" href="#bb0330" name="bbb0330"><span data-dcnode-id="7335" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="7333" instrument_node="">). The small-scale setting made ethnographic fieldwork appropriate, providing contextual understanding and rich data (</span><a class="workspace-trigger" data-dcnode-id="7331" href="#bb0330" name="bbb0330"><span data-dcnode-id="7332" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="7330" instrument_node="">). Supporting this approach was the first author's familiarity with the wider community and its conventions as well as knowledge of the local languages, which facilitated a nuanced interpretation of practices. Further, our personal connections with Barefoot's top management team and long-term association with the organization enabled greater access to information, affording opportunities for in-depth interviews and extensive periods of non-participant observation (</span><a class="workspace-trigger" data-dcnode-id="7328" href="#bb0570" name="bbb0570"><span data-dcnode-id="7329" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="7327" instrument_node="">). The organization's long history also provided us with longitudinal archival data, which allowed for a processual view (</span><a class="workspace-trigger" data-dcnode-id="7325" href="#bb0300" name="bbb0300"><span data-dcnode-id="7326" instrument_node="">Langley, 2009</span></a><span data-dcnode-id="7324" instrument_node="">) facilitating a performative analysis of values (</span><a class="workspace-trigger" data-dcnode-id="7322" href="#bb0180" name="bbb0180"><span data-dcnode-id="7323" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7321" instrument_node="">). In line with such an approach, we traced the evolution of the organization and identified temporal brackets based on periods of significant shifts in practices and the introduction of new practices. Since social practices are based on shared underlying structures and acquire meaning only when seen in context, we examined particular situated circumstances to explain the emergence of practices and their effect on the communal value system (</span><a class="workspace-trigger" data-dcnode-id="7319" href="#bb0205" name="bbb0205"><span data-dcnode-id="7320" instrument_node="">Gross, 2009</span></a><span data-dcnode-id="7318" instrument_node="">).</span></p></section><section data-dcnode-id="6984" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7310" id="st0065"><span data-dcnode-id="7315" instrument_node="">3.3</span><span data-dcnode-id="7313" instrument_node="">. </span><span data-dcnode-id="7311" instrument_node="">Data sources</span></h3><p data-dcnode-id="7305" id="p0870"><span data-dcnode-id="7309" instrument_node="">We collected data in the form of archival records, artifacts, non-participant observations, and interviews. This mix of primary and secondary data enabled data triangulation, while the constant comparative method guided our concurrent data collection and analysis (</span><a class="workspace-trigger" data-dcnode-id="7307" href="#bb0190" name="bbb0190"><span data-dcnode-id="7308" instrument_node="">Glaser, 1978</span></a><span data-dcnode-id="7306" instrument_node="">).</span></p><section data-dcnode-id="7200" id="s0055"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7299" id="st0070"><span data-dcnode-id="7304" instrument_node="">3.3.1</span><span data-dcnode-id="7302" instrument_node="">. </span><span data-dcnode-id="7300" instrument_node="">Archival records</span></h4><div data-dcnode-id="7201"><p data-dcnode-id="7287" id="p0875"><span data-dcnode-id="7298" instrument_node="">We began our research in June 2016 by accessing and examining relevant archival records from online sources, including documented interviews; the organization's website; newspaper, magazine, and journal articles; podcasts; blogs; reports; and social media posts on various sites. We also took advantage of the availability of an eclectic mix of various online datasets, such as Internet Archives' Wayback Machine.</span><a class="workspace-trigger" data-dcnode-id="7295" href="#fn0005" name="bfn0005"><sup data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">1</span></sup></a><span data-dcnode-id="7294" instrument_node=""> We collected over 297 documents and over 400 social media posts. In view of the organization's 50-year history, archival data sources were an important information source, allowing us to trace the evolution of practices and providing insights based on the absence of practices, such as early recruitment practices that did not include staffing women in the organization (</span><a class="workspace-trigger" data-dcnode-id="7292" href="#bb0305" name="bbb0305"><span data-dcnode-id="7293" instrument_node="">Langley et al., 2013</span></a><span data-dcnode-id="7291" instrument_node="">). Archival records were also important since practices at the time of founding revealed the genesis for later strategies and practices (see </span><a class="workspace-trigger" data-dcnode-id="7289" href="#t0010" name="bt0010"><span data-dcnode-id="7290" instrument_node="">Table 2</span></a><span data-dcnode-id="7288" instrument_node=""> for a detailed list of archival sources). Initially, we focused on archival data collection to gain an overview of the organization and social change processes involved. In later phases of data collection and analysis in the field, archival records helped triangulate our interview and observation data and avoid retrospective bias.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7202" id="t0010"><span class="captions" data-dcnode-id="7279"><span data-dcnode-id="7280" id="ca0035"><p data-dcnode-id="7281" id="sp0035"><span class="label" data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">Table 2</span></span><span data-dcnode-id="7284" instrument_node="">. </span><span data-dcnode-id="7282" instrument_node="">Summary of archival data.</span></p></span></span><div class="groups" data-dcnode-id="7203"><table data-dcnode-id="7204"><tbody data-dcnode-id="7205"><tr data-dcnode-id="7206"><td data-dcnode-id="7207"><dl class="list" data-dcnode-id="7208"><dt class="list-label" data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7274"><p data-dcnode-id="7275" id="p0255"><span data-dcnode-id="7276" instrument_node="">Newspaper reports (local and national)—85</span></p></dd><dt class="list-label" data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7269"><p data-dcnode-id="7270" id="p0260"><span data-dcnode-id="7271" instrument_node="">Papers in academic journals—5</span></p></dd><dt class="list-label" data-dcnode-id="7267"><span data-dcnode-id="7268" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7264"><p data-dcnode-id="7265" id="p0265"><span data-dcnode-id="7266" instrument_node="">Magazine articles—112</span></p></dd><dt class="list-label" data-dcnode-id="7262"><span data-dcnode-id="7263" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7259"><p data-dcnode-id="7260" id="p0270"><span data-dcnode-id="7261" instrument_node="">Book chapters—2</span></p></dd><dt class="list-label" data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7254"><p data-dcnode-id="7255" id="p0275"><span data-dcnode-id="7256" instrument_node="">Websites (Barefoot College, government of India, partner NGOs, others)—7</span></p></dd><dt class="list-label" data-dcnode-id="7252"><span data-dcnode-id="7253" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7249"><p data-dcnode-id="7250" id="p0280"><span data-dcnode-id="7251" instrument_node="">Reports from funding agencies, the United Nations, and governments—12</span></p></dd><dt class="list-label" data-dcnode-id="7247"><span data-dcnode-id="7248" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7244"><p data-dcnode-id="7245" id="p0285"><span data-dcnode-id="7246" instrument_node="">Transcripts of video and audio interviews—6</span></p></dd><dt class="list-label" data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7239"><p data-dcnode-id="7240" id="p0290"><span data-dcnode-id="7241" instrument_node="">Instagram posts—200+</span></p></dd><dt class="list-label" data-dcnode-id="7237"><span data-dcnode-id="7238" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7234"><p data-dcnode-id="7235" id="p0295"><span data-dcnode-id="7236" instrument_node="">Tweets—200+</span></p></dd><dt class="list-label" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7229"><p data-dcnode-id="7230" id="p0300"><span data-dcnode-id="7231" instrument_node="">Barefoot's Facebook page and posts—17</span></p></dd><dt class="list-label" data-dcnode-id="7227"><span data-dcnode-id="7228" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7224"><p data-dcnode-id="7225" id="p0305"><span data-dcnode-id="7226" instrument_node="">Photographs and videos of routine activities—16</span></p></dd><dt class="list-label" data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7219"><p data-dcnode-id="7220" id="p0310"><span data-dcnode-id="7221" instrument_node="">Archives of Barefoot College website records since 2000—15</span></p></dd><dt class="list-label" data-dcnode-id="7217"><span data-dcnode-id="7218" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7214"><p data-dcnode-id="7215" id="p0315"><span data-dcnode-id="7216" instrument_node="">Annual reports from 2000 to 2018—19</span></p></dd><dt class="list-label" data-dcnode-id="7212"><span data-dcnode-id="7213" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7209"><p data-dcnode-id="7210" id="p0320"><span data-dcnode-id="7211" instrument_node="">Barefoot's strategic plan 2015–2018—1</span></p></dd></dl></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="7187" id="s0060"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7194" id="st0075"><span data-dcnode-id="7199" instrument_node="">3.3.2</span><span data-dcnode-id="7197" instrument_node="">. </span><span data-dcnode-id="7195" instrument_node="">Interviews</span></h4><p data-dcnode-id="7192" id="p0880"><span data-dcnode-id="7193" instrument_node="">We conducted 54 interviews over four rounds of field data collection, sampling interview participants purposively to ensure a mix of respondents from different organizational levels and from various community positions. We carried out semi-structured and unstructured interviews in the participants' own languages except in the case of four interviews that were conducted in English. The interviews lasted 60&nbsp;min on average. In addition to the interviews, several shorter informal exchanges and interactions took place that were not recorded but formed part of our field notes.</span></p><p data-dcnode-id="7190" id="p0885"><span data-dcnode-id="7191" instrument_node="">We began this stage by first interviewing Roy (the social entrepreneur and founder of Barefoot) as well as top management team members to understand the organization's mission, changes in its objectives over the years, and its social change commitment. In later interviews with management, we probed deeper by asking about the organization's reasons for adopting certain practices while rejecting others, its methods for ensuring the acceptance of new practices (e.g., those of women and men eating together), and the challenges it faced in introducing new practices. We also asked questions related to individual, organizational, and social values; how the organization looked below surface values and practices to understand deeper meanings; and what the organization did to ensure agreement between various stakeholders. In the case of employees (drawn from the community) and other external community members, we asked questions regarding their views on changes in the organization and in their own lives, their own practices and beliefs, and changes in their attitudes and values. Finally, interviews with interns and volunteers from outside the community gave us a different perspective about local practices and values and provided insights about their experiences of living and adapting to life in a rural setting and the changes they had witnessed firsthand.</span></p><p data-dcnode-id="7188" id="p0890"><span data-dcnode-id="7189" instrument_node="">Overall, the first round of interviews was exploratory in nature, while the second and third rounds were more specific and theory informed, allowing us to clarify points and corroborate key findings and thus increasing reliability. Conducting the interviews over four successive periods between April 2017 and June 2019 allowed us to repeat interviews with some of the same participants to enhance robustness.</span></p></section><section data-dcnode-id="6985" id="s0065"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7181" id="st0080"><span data-dcnode-id="7186" instrument_node="">3.3.3</span><span data-dcnode-id="7184" instrument_node="">. </span><span data-dcnode-id="7182" instrument_node="">Non-participant observations</span></h4><div data-dcnode-id="6986"><p data-dcnode-id="7167" id="p0895"><span data-dcnode-id="7180" instrument_node="">The first author observed formal and informal interactions among organization and community members over 12&nbsp;days while based in the community. Such observations formed a key part of our data, providing an intimate understanding of local practices in a natural setting and allowing us to explore the social context from within (</span><a class="workspace-trigger" data-dcnode-id="7178" href="#bb0540" name="bbb0540"><span data-dcnode-id="7179" instrument_node="">Van Maanen, 1979</span></a><span data-dcnode-id="7177" instrument_node="">). Informal interactions during mealtimes, visits to participants' homes, and even attending local festivals and a wedding, allowed us to fully appreciate the context as well as detect subtle practices that were missed during interviews and were not directly visible in archival accounts. As a result, we were able to observe the actual meanings and activities around practices (</span><a class="workspace-trigger" data-dcnode-id="7175" href="#bb0130" name="bbb0130"><span data-dcnode-id="7176" instrument_node="">Czarniawska, 2007</span></a><span data-dcnode-id="7174" instrument_node="">). This immersive approach also brought to our attention several key artifacts and symbols, such as the traditional teaching aids used in the night schools and puppets used for communication. We recorded these artifacts and symbols in photographs and described them in field notes, providing further insights into values and practices. As is the case in an ethnographic approach, these detailed non-participant observations allowed us to cross-reference and confirm, “what people did against what they said” (</span><a class="workspace-trigger" data-dcnode-id="7172" href="#bb0100" name="bbb0100"><span data-dcnode-id="7173" instrument_node="">Burawoy, 1991</span></a><span data-dcnode-id="7171" instrument_node="">: 20) (see </span><a class="workspace-trigger" data-dcnode-id="7169" href="#t0015" name="bt0015"><span data-dcnode-id="7170" instrument_node="">Table 3</span></a><span data-dcnode-id="7168" instrument_node=""> for a detailed timeline of our fieldwork).</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="6987" id="t0015"><span class="captions" data-dcnode-id="7159"><span data-dcnode-id="7160" id="ca0040"><p data-dcnode-id="7161" id="sp0040"><span class="label" data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">Table 3</span></span><span data-dcnode-id="7164" instrument_node="">. </span><span data-dcnode-id="7162" instrument_node="">Summary of fieldwork.</span></p></span></span><div class="groups" data-dcnode-id="6994"><table data-dcnode-id="6995"><thead data-dcnode-id="7126"><tr class="valign-top" data-dcnode-id="7152"><th class="rowsep-1" colspan="4" data-dcnode-id="7153" scope="col"><span data-dcnode-id="7158" instrument_node="">Interviews (formal and informal semi-structured interviews)</span><a class="workspace-trigger" data-dcnode-id="7155" href="#tf0010" name="btf0010"><sup data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">a</span></sup></a><span data-dcnode-id="7154" instrument_node=""> and non-participant observations</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="7127"><th data-dcnode-id="7146" scope="col"><em data-dcnode-id="7150"><span data-dcnode-id="7151" instrument_node="">April 2017</span></em><br data-dcnode-id="7149"><em data-dcnode-id="7147"><span data-dcnode-id="7148" instrument_node="">Barefoot College, Tilonia, Rajasthan, India</span></em></th><th data-dcnode-id="7140" scope="col"><em data-dcnode-id="7144"><span data-dcnode-id="7145" instrument_node="">December 2017</span></em><br data-dcnode-id="7143"><em data-dcnode-id="7141"><span data-dcnode-id="7142" instrument_node="">Barefoot College, Tilonia, Rajasthan, India</span></em></th><th data-dcnode-id="7134" scope="col"><em data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">May 2018</span></em><br data-dcnode-id="7137"><em data-dcnode-id="7135"><span data-dcnode-id="7136" instrument_node="">Prayatna Sansthan (partner of Barefoot), Solvata, Rajasthan, India</span></em></th><th data-dcnode-id="7128" scope="col"><em data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">June 2019</span></em><br data-dcnode-id="7131"><em data-dcnode-id="7129"><span data-dcnode-id="7130" instrument_node="">Barefoot College, Tilonia, Rajasthan</span></em></th></tr></thead><tbody data-dcnode-id="6996"><tr data-dcnode-id="6997"><td data-dcnode-id="7099"><dl class="list" data-dcnode-id="7100"><dt class="list-label" data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7121"><p data-dcnode-id="7122" id="p0325"><span data-dcnode-id="7123" instrument_node="">Interviews with founder&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7119"><span data-dcnode-id="7120" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7116"><p data-dcnode-id="7117" id="p0330"><span data-dcnode-id="7118" instrument_node="">Interviews with senior staff members&nbsp;×&nbsp;4</span></p></dd><dt class="list-label" data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7111"><p data-dcnode-id="7112" id="p0335"><span data-dcnode-id="7113" instrument_node="">Group interviews with volunteers&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7106"><p data-dcnode-id="7107" id="p0340"><span data-dcnode-id="7108" instrument_node="">Non-participant observations of staff at all levels (canteen)&nbsp;×&nbsp;5&nbsp;days</span></p></dd><dt class="list-label" data-dcnode-id="7104"><span data-dcnode-id="7105" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7101"><p data-dcnode-id="7102" id="p0345"><span data-dcnode-id="7103" instrument_node="">Non-participant observations of social events&nbsp;×&nbsp;2&nbsp;days</span></p></dd></dl></td><td data-dcnode-id="7047"><dl class="list" data-dcnode-id="7048"><dt class="list-label" data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7094"><p data-dcnode-id="7095" id="p0350"><span data-dcnode-id="7096" instrument_node="">Interviews with founder&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7092"><span data-dcnode-id="7093" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7089"><p data-dcnode-id="7090" id="p0355"><span data-dcnode-id="7091" instrument_node="">Interviews with senior staff members&nbsp;×&nbsp;4</span></p></dd><dt class="list-label" data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7084"><p data-dcnode-id="7085" id="p0360"><span data-dcnode-id="7086" instrument_node="">Interviews with employees&nbsp;×&nbsp;5</span></p></dd><dt class="list-label" data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7079"><p data-dcnode-id="7080" id="p0365"><span data-dcnode-id="7081" instrument_node="">Interviews with student volunteers&nbsp;×&nbsp;3</span></p></dd><dt class="list-label" data-dcnode-id="7077"><span data-dcnode-id="7078" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7074"><p data-dcnode-id="7075" id="p0370"><span data-dcnode-id="7076" instrument_node="">Interviews with partner NGO staff&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7069"><p data-dcnode-id="7070" id="p0375"><span data-dcnode-id="7071" instrument_node="">Interviews with interns&nbsp;×&nbsp;3</span></p></dd><dt class="list-label" data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7064"><p data-dcnode-id="7065" id="p0380"><span data-dcnode-id="7066" instrument_node="">Interviews with community members&nbsp;×&nbsp;5</span></p></dd><dt class="list-label" data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7059"><p data-dcnode-id="7060" id="p0385"><span data-dcnode-id="7061" instrument_node="">Interviews with women solar trainees&nbsp;×&nbsp;6</span></p></dd><dt class="list-label" data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7054"><p data-dcnode-id="7055" id="p0390"><span data-dcnode-id="7056" instrument_node="">Non-participant observations of solar training classes&nbsp;×&nbsp;3&nbsp;days</span></p></dd><dt class="list-label" data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7049"><p data-dcnode-id="7050" id="p0395"><span data-dcnode-id="7051" instrument_node="">Non-participant observations of night school students and teachers&nbsp;×&nbsp;3&nbsp;days</span></p></dd></dl></td><td data-dcnode-id="7015"><dl class="list" data-dcnode-id="7016"><dt class="list-label" data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7042"><p data-dcnode-id="7043" id="p0400"><span data-dcnode-id="7044" instrument_node="">Group interviews with Prayatna Sansthan management team&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7037"><p data-dcnode-id="7038" id="p0405"><span data-dcnode-id="7039" instrument_node="">Interviews with solar mamas across 6 villages&nbsp;×&nbsp;8</span></p></dd><dt class="list-label" data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7032"><p data-dcnode-id="7033" id="p0410"><span data-dcnode-id="7034" instrument_node="">Interviews with village council members&nbsp;×&nbsp;2</span></p></dd><dt class="list-label" data-dcnode-id="7030"><span data-dcnode-id="7031" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7027"><p data-dcnode-id="7028" id="p0415"><span data-dcnode-id="7029" instrument_node="">Non-participant observations of solar mamas at their homes and with families&nbsp;×&nbsp;6 visits</span></p></dd><dt class="list-label" data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7022"><p data-dcnode-id="7023" id="p0420"><span data-dcnode-id="7024" instrument_node="">Non-participant observations of community members during social events&nbsp;×&nbsp;2&nbsp;days</span></p></dd><dt class="list-label" data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7017"><p data-dcnode-id="7018" id="p0425"><span data-dcnode-id="7019" instrument_node="">Non-Participant observations of night school students and staff&nbsp;×&nbsp;1&nbsp;day</span></p></dd></dl></td><td data-dcnode-id="6998"><dl class="list" data-dcnode-id="6999"><dt class="list-label" data-dcnode-id="7013"><span data-dcnode-id="7014" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7010"><p data-dcnode-id="7011" id="p0430"><span data-dcnode-id="7012" instrument_node="">Interviews with 4 senior leaders</span></p></dd><dt class="list-label" data-dcnode-id="7008"><span data-dcnode-id="7009" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7005"><p data-dcnode-id="7006" id="p0435"><span data-dcnode-id="7007" instrument_node="">Sharing of key findings with leadership team at Barefoot</span></p></dd><dt class="list-label" data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7000"><p data-dcnode-id="7001" id="p0440"><span data-dcnode-id="7002" instrument_node="">Non-participant observations of staff members&nbsp;×&nbsp;2&nbsp;days</span></p></dd></dl></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="6988"><dt data-dcnode-id="6992" id="tf0010"><span data-dcnode-id="6993" instrument_node="">a</span></dt><dd data-dcnode-id="6989"><p data-dcnode-id="6990" id="np0010"><span data-dcnode-id="6991" instrument_node="">Five interviews were video-recorded, 25 interviews were audio-recorded, and 24 interviews were manually recorded in a journal. All data was first transcribed, and then coded and analyzed using NVivo 12 (Statistical and Qualitative Data Analysis software) and Microsoft Word.</span></p></dd></dl></div></div></section></section><section data-dcnode-id="6855" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6978" id="st0085"><span data-dcnode-id="6983" instrument_node="">3.4</span><span data-dcnode-id="6981" instrument_node="">. </span><span data-dcnode-id="6979" instrument_node="">Data analysis</span></h3><p data-dcnode-id="6976" id="p0900"><span data-dcnode-id="6977" instrument_node="">We translated, transcribed, and imported all the data — archival records, interview and observation data, field notes, and memos—into MS Word and our qualitative data analysis software, NVivo 12, which enabled efficient organizing and coding of our data. Although we did not follow a structured linear process, and our analysis moved between coding, data collection, and theorizing, we outline below the major stages of our process sequentially.</span></p><p data-dcnode-id="6971" id="p0905"><span data-dcnode-id="6975" instrument_node="">We began by sorting our preliminary archival data and mapping it chronologically with the aim of familiarizing ourselves with the “setting under study” (</span><a class="workspace-trigger" data-dcnode-id="6973" href="#bb0020" name="bbb0020"><span data-dcnode-id="6974" instrument_node="">Alvesson and Kärreman, 2007</span></a><span data-dcnode-id="6972" instrument_node="">: 1270). Considering the wealth of data spanning the organization's 50-year history, we were able to establish a comprehensive overview of the organization's evolution, scanning both significant internal events and identifying pertinent external events in the community and relevant institutional structures. This overview highlighted how the organization advanced from digging wells to training women as solar energy experts and entrepreneurs, thereby establishing gender equality norms in its vicinity while retaining overriding values of tradition. In addition to providing a contextualized view of the landscape, this part of the analysis also shed light on key turning points and striking events in the organization for which we detected relatively little dissent compared to the dramatic social changes effected in and around the organization. Over time, we enriched and crosschecked this timeline with our interview and observation data as it became available, to fill in gaps and check for consistency.</span></p><div data-dcnode-id="6937"><p data-dcnode-id="6963" id="p0910"><span data-dcnode-id="6970" instrument_node="">Next, we began analyzing the interview and observation data from the field to understand later-stage changes in the organization and its surrounding community. Together with supplementary archival data and our memos, we developed a rich narrative of the case study and the change process, triangulating against our multiple data sources. Directing our attention to periods of transformation, we looked for patterns and shifts in practices associated with changes in the organization's mission and vision statements, espoused values, strategies, and tactics. This narrative shed light on key inflection points and revealed broader shifts in the organization's strategies and values, enabling us to categorize practices in and around these significant periods. Zeroing in on the large social transformation periods that corresponded with changes in the organization's strategies and underlying values, we utilized the notion of temporal bracketing to divide our process of value augmentation into three clearly delineated sub processes (</span><a class="workspace-trigger" data-dcnode-id="6968" href="#bb0300" name="bbb0300"><span data-dcnode-id="6969" instrument_node="">Langley, 2009</span></a><span data-dcnode-id="6967" instrument_node="">). For instance, one such fundamental shift was visible in a move from the stated practices of not recruiting women to practices of only recruiting and training women for the solar energy program with the accompanying morphing and intermingling of values of tradition with modern values of gender equality. Focusing on these periods of change, we noticed patterns of practices that enabled an accommodation of values that would have normally been antithetical to the community but which, through the mediating role of practices, had come to be accepted in and around the organization. The temporal brackets and points of inflection in our study are illustrated in </span><a class="workspace-trigger" data-dcnode-id="6965" href="#f0015" name="bf0015"><span data-dcnode-id="6966" instrument_node="">Fig. 3</span></a><span data-dcnode-id="6964" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6938" id="f0015"><span data-dcnode-id="6947"><img alt="Fig. 3" aria-describedby="ca0015" data-dcnode-id="6962" height="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr3.jpg&amp;raw"><span data-dcnode-id="6961" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6948"><li data-dcnode-id="6955"><a class="anchor download-link u-font-sans" data-dcnode-id="6956" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr3_lrg.jpg" target="_blank" title="Download high-res image (279KB)"><span class="anchor-text" data-dcnode-id="6957"><span data-dcnode-id="6960" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6958"><span data-dcnode-id="6959" instrument_node="">Download high-res image (279KB)</span></span></span></a></li><li data-dcnode-id="6949"><a class="anchor download-link u-font-sans" data-dcnode-id="6950" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6951"><span data-dcnode-id="6954" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6939"><span data-dcnode-id="6940" id="ca0015"><p data-dcnode-id="6941" id="sp0015"><span class="label" data-dcnode-id="6945"><span data-dcnode-id="6946" instrument_node="">Fig. 3</span></span><span data-dcnode-id="6944" instrument_node="">. </span><span data-dcnode-id="6942" instrument_node="">Temporal brackets and points of inflection.</span></p></span></span></figure></div><p data-dcnode-id="6929" id="p0915"><span data-dcnode-id="6936" instrument_node="">Throughout the data-analysis stage but more so once we had built our narrative, we discussed the main story and key findings among the co-authors and iteratively developed a coding scheme to analyze practices, values, and social change processes, which we updated and revised several times. Locating ourselves as close to the data as possible, we initially began by empirically coding practices line by line, consciously using participants' own language and employing gerunds to tease out processes. The codes were revised and edited several times, and once pruned to a more manageable number of representative codes we placed them into meaningful groupings (</span><a class="workspace-trigger" data-dcnode-id="6934" href="#bb0115" name="bbb0115"><span data-dcnode-id="6935" instrument_node="">Charmaz, 2008</span></a><span data-dcnode-id="6933" instrument_node="">). The coding software supported frequent revisions and the addition of inputs from co-authors at various times; allowed for the efficient management of changes; enabled the visualization of several options; and ensured a transparent and collaborative coding process. This process had the added benefit of balancing perspectives between the authors and reducing the field researcher bias that arises because of the subjectivity and emotionality inherent in an ethnographic approach (</span><a class="workspace-trigger" data-dcnode-id="6931" href="#bb0265" name="bbb0265"><span data-dcnode-id="6932" instrument_node="">Kisfalvi, 2006</span></a><span data-dcnode-id="6930" instrument_node="">).</span></p><p data-dcnode-id="6924" id="p0920"><span data-dcnode-id="6928" instrument_node="">Gradually, we saw our empirical codes morph into more abstract second-order categories, which then coalesced around aggregate dimensions or themes, which we divided into two broad phases based on outcomes and a more radical shift in direction (</span><a class="workspace-trigger" data-dcnode-id="6926" href="#bb0495" name="bbb0495"><span data-dcnode-id="6927" instrument_node="">Smets et al., 2012</span></a><span data-dcnode-id="6925" instrument_node="">). We compared the emergent themes against relevant literature to validate our theoretical conceptualization of a process of value augmentation and social change through practices that bring together the seemingly incompatible values of tradition and modernity, as encapsulated in our model.</span></p><p data-dcnode-id="6910" id="p0925"><span data-dcnode-id="6923" instrument_node="">We labeled the first phase of this process as one of anchoring values. The initial set of practices under this phase related to leadership discerning and evaluating social values in the community, which we captured with the second-order category of </span><em data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">cooperative discernment</span></em><span data-dcnode-id="6920" instrument_node=""> to describe the interactive and collaborative nature of practices involving extensive engagement between the organization and the community. Following this process, we classified practices related to selectively adopting and then explicitly espousing social values as part of organizational values under the second-order category of </span><em data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">empathic projection</span></em><span data-dcnode-id="6917" instrument_node="">. We aggregated these practices under the dimension of </span><em data-dcnode-id="6915"><span data-dcnode-id="6916" instrument_node="">co-opting</span></em><a class="workspace-trigger" data-dcnode-id="6912" href="#fn0010" name="bfn0010"><sup data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">2</span></sup></a><span data-dcnode-id="6911" instrument_node=""> to reflect how values were co-constructed and jointly adopted by the organization and the community.</span></p><p data-dcnode-id="6887" id="p0930"><span data-dcnode-id="6909" instrument_node="">We called the next phase of the process </span><em data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">augmenting values</span></em><span data-dcnode-id="6906" instrument_node=""> since this is where the process shifted toward expanding certain social values through practices. We labeled the first set of practices in this phase </span><em data-dcnode-id="6904"><span data-dcnode-id="6905" instrument_node="">defamiliarization</span></em><span data-dcnode-id="6903" instrument_node=""> since the social entrepreneur facilitated the altering and reshaping of common practices in the organization and its surrounding community, presenting them in a different light, while in the next phase of </span><em data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">familiarization</span></em><span data-dcnode-id="6900" instrument_node="">, the social entrepreneur encouraged and enabled the introduction of unfamiliar practices in the organization and community. We collated these categories under the aggregate dimension of </span><em data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">clustering</span></em><span data-dcnode-id="6897" instrument_node=""> since we felt this term reflected the simple but powerful task of bringing together practices infused with diverse values in the same space, providing opportunities for values to interact and overlap. Having enabled tentative conjoint trials of practices from diverse value sets, with the next set of practices the organization privileged new values through a second-order category we termed </span><em data-dcnode-id="6895"><span data-dcnode-id="6896" instrument_node="">authoritative dissemination</span></em><span data-dcnode-id="6894" instrument_node="">. Finally, practices of honoring and rewarding the performance of integrated values helped embed the augmented values in the organization and the community in a second-order category we called </span><em data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">visible endorsement</span></em><span data-dcnode-id="6891" instrument_node="">. We aggregated these categories under the dimension of </span><em data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">coalescing</span></em><span data-dcnode-id="6888" instrument_node=""> to indicate the normalization and combined performance of practices with diverse underlying values.</span></p><div data-dcnode-id="6856"><p data-dcnode-id="6882" id="p0935"><span data-dcnode-id="6886" instrument_node="">Together, these categories and dimensions illustrate a coherent, structured process of value augmentation, substantiating the centrality of values work and the mediating role of practices in stimulating social change. </span><a class="workspace-trigger" data-dcnode-id="6884" href="#f0020" name="bf0020"><span data-dcnode-id="6885" instrument_node="">Fig. 4</span></a><span data-dcnode-id="6883" instrument_node=""> provides an overview of our coding structure, showing our categories and aggregate dimensions. We present our findings next.</span></p><figure class="figure text-xs" data-dcnode-id="6857" id="f0020"><span data-dcnode-id="6866"><img alt="Fig. 4" aria-describedby="ca0020" data-dcnode-id="6881" height="951" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr4.jpg&amp;raw"><span data-dcnode-id="6880" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6867"><li data-dcnode-id="6874"><a class="anchor download-link u-font-sans" data-dcnode-id="6875" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr4_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="6876"><span data-dcnode-id="6879" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="6868"><a class="anchor download-link u-font-sans" data-dcnode-id="6869" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6870"><span data-dcnode-id="6873" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6858"><span data-dcnode-id="6859" id="ca0020"><p data-dcnode-id="6860" id="sp0020"><span class="label" data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">Fig. 4</span></span><span data-dcnode-id="6863" instrument_node="">. </span><span data-dcnode-id="6861" instrument_node="">Data structure.</span></p></span></span></figure></div></section></section><section data-dcnode-id="6317" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6848" id="st0090"><span data-dcnode-id="6853" instrument_node="">4</span><span data-dcnode-id="6851" instrument_node="">. </span><span data-dcnode-id="6849" instrument_node="">Findings</span></h2><p data-dcnode-id="6846" id="p0940"><span data-dcnode-id="6847" instrument_node="">We report our findings describing how Barefoot worked with and around entrenched community values in two parts. In the first part, Phase 1: Anchoring Values, we see how management uncovered social values of tradition and then adopted organizational values that were in agreement with these values. In the second part, Phase 2: Augmenting Values, we see how the organization leveraged and expanded previously anchored values to incorporate mission-related values of gender equality.</span></p><section data-dcnode-id="6741" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6840" id="st0095"><span data-dcnode-id="6845" instrument_node="">4.1</span><span data-dcnode-id="6843" instrument_node="">. </span><span data-dcnode-id="6841" instrument_node="">Phase 1: anchoring values</span></h3><p data-dcnode-id="6826" id="p0945"><span data-dcnode-id="6839" instrument_node="">Archival records show no specific espoused values or social mission in the founding years of the organization other than “to help the rural community” since Barefoot began “informally” and without any “pre-planning” (</span><a class="workspace-trigger" data-dcnode-id="6837" href="#bb0375" name="bbb0375"><span data-dcnode-id="6838" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="6836" instrument_node="">: 8). The initial plan centered around an integrated development process with “young, urban professionals” coming to the college and working with the local rural community, as reflected in the organization's logo depicting two people joining hands, one holding a book (the urban educated) and the other a plant (the rural farmer) (</span><a class="workspace-trigger" data-dcnode-id="6834" href="#bb0375" name="bbb0375"><span data-dcnode-id="6835" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="6833" instrument_node="">: 8). Roy soon realized this strategy was alienating community members who felt devalued and unheard, and heeding the advice of the village elders, he decided to change tactics. Consequently, Roy deliberately deferred his plan to bring in urban professionals to the community since this made the rural community “look down on their own roots” (</span><a class="workspace-trigger" data-dcnode-id="6831" href="#bb0420" name="bbb0420"><span data-dcnode-id="6832" instrument_node="">Roy, 2011</span></a><span data-dcnode-id="6830" instrument_node="">). Instead, Roy acknowledged that in order to start a dialogue, Barefoot had to begin by understanding the community: “the process could not be rushed” (</span><a class="workspace-trigger" data-dcnode-id="6828" href="#bb0375" name="bbb0375"><span data-dcnode-id="6829" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="6827" instrument_node="">: 10). However, even discerning community issues posed a challenge. For example, in one village alone there were 14 different castes with distinct beliefs and social traditions (Roy, interview, 2017). Before they could begin their work, Barefoot's leadership decided it was important to understand community issues from the point of view of the community, and instituted practices aimed at first, uncovering underlying values and second, explicitly orienting organizational values to represent the community. This phase of anchoring values consisted of a process of co-opting where the organization and the community jointly adopted organizational values that were in consonance with social values of the community.</span></p><section data-dcnode-id="6742" id="s0085"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6820" id="st0100"><span data-dcnode-id="6825" instrument_node="">4.1.1</span><span data-dcnode-id="6823" instrument_node="">. </span><span data-dcnode-id="6821" instrument_node="">Co-opting</span></h4><p data-dcnode-id="6818" id="p0950"><span data-dcnode-id="6819" instrument_node="">Co-opting—aligning organizational and community values through a participatory process—included categories of cooperative discernment and empathic projection described below.</span></p><p data-dcnode-id="6804" id="p0955"><strong data-dcnode-id="6815"><em data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">Cooperative discernment.</span></em></strong><span data-dcnode-id="6814" instrument_node=""> The organization uncovered local values through practices that involved intensive engagement with the community. A review of the first five years of the organization's operations reveals that its programs became increasingly village-based with explicit strategies to involve the community (</span><a class="workspace-trigger" data-dcnode-id="6812" href="#bb0255" name="bbb0255"><span data-dcnode-id="6813" instrument_node="">Kale and Coombs, 1978</span></a><span data-dcnode-id="6811" instrument_node="">). Archival data revealed practices of senior members residing in the community and adopting local ways. Even the decision to locate the organization in the village was unusual but Roy wanted Barefoot to be “a place where [the community] could feel a sense of ownership” (</span><a class="workspace-trigger" data-dcnode-id="6809" href="#bb0425" name="bbb0425"><span data-dcnode-id="6810" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="6808" instrument_node="">: 71). Roy (who did not belong to the local community) went to great lengths to be accepted by the community and not be seen as an outsider imposing change. He lived within the community in a “remote rural area,” learned the local language, and brought a local farmer on board as part of the organization's leadership. As he explained, “I lived and worked with them as they did. Meghraj, a local farmer became my friend. Together we understood the main issues” (Roy, interview, 2017). His appreciation and respect for community ways and values were evident: “These poor, simple people became my friends, and I spent my days listening to their stories and learning of their experiences. I saw in their skills, knowledge, and wisdom something that books and university education can never teach you” (Roy, interview, 2017). In addition to such practices of embedding in the community, the organization met on a regular basis with community members to hear their views and discuss their problems; “the idea was to listen and learn” (</span><a class="workspace-trigger" data-dcnode-id="6806" href="#bb0425" name="bbb0425"><span data-dcnode-id="6807" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="6805" instrument_node="">: 68).</span></p><p data-dcnode-id="6794" id="p0960"><span data-dcnode-id="6803" instrument_node="">The focus on understanding community viewpoints was a top-down strategy with leadership appreciating the importance of uncovering “the problems faced by the [community] as perceived by the villagers themselves” (Vasu, in </span><a class="workspace-trigger" data-dcnode-id="6801" href="#bb0415" name="bbb0415"><span data-dcnode-id="6802" instrument_node="">Rossi, 2007</span></a><span data-dcnode-id="6800" instrument_node="">: 3). This approach was given impetus by drawing employees from the community. Local recruitment practices included for example, easing requirements for formal educational qualifications since literacy rates were low in the community. At the same time, practices of consciously avoiding recruitment from urban areas was seen in the disadvantaging of professional qualifications; “this is the only place where your degree disqualifies you” (Roy, interview 2017). In fact, by the early 1980s, locals formed about 80% of the organization. The favoring of local employees was evident in the remarks of Nandan, a senior employee and head of the solar training program:</span></p><blockquote data-dcnode-id="6795"><p data-dcnode-id="6798" id="sp0060"><span data-dcnode-id="6799" instrument_node="">I joined SWRC in 1976 as a night school teacher, but later I trained to become a solar engineer. First, we had solar engineers from the cities who came to train us, but even they had to report to us and learn our ways, and eventually, we did not need them.</span></p><span data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">(Nandan, interview, 2017)</span></span></blockquote><p></p><p data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">The deliberate blurring of boundaries between the community and the organization as a result of these practices was also visible in management's frequent use of inclusive phrasing, such as the use of the pronouns “we” and “us.”</span></p><p data-dcnode-id="6787" id="p0965"><span data-dcnode-id="6791" instrument_node="">Rather than taking a “patronizing, top-down, and insensitive approach” to interpreting local ways, the organization deconstructed local ways and understood underlying values jointly with the community (</span><a class="workspace-trigger" data-dcnode-id="6789" href="#bb0425" name="bbb0425"><span data-dcnode-id="6790" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="6788" instrument_node="">: 69). For example, practices of women undertaking “masculine” tasks of collecting and carrying bundles of firewood revealed values of patriarchy underlying these practices that relegated cooking—and therefore carrying firewood—to women. Similarly, practices of fetching water by women was not seen as drudgery by the women since the trips to draw water from the well were seen as a chance to interact with other women, allowing them to escape the confines of their homes as imposed by gender norms. Slowly, Barefoot gained a clearer understanding of the diversity of values within the seemingly homogenous community and discerned nuances within broader value sets.</span></p><p data-dcnode-id="6771" id="p0970"><strong data-dcnode-id="6784"><em data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">Empathic projection.</span></em></strong><span data-dcnode-id="6783" instrument_node=""> Having identified core social values, the organization adopts and explicitly promotes selected social values through practices of empathic projection. Barefoot uncovered a range of values related to tradition and selectively proclaimed values of self-reliance and pride in rural ways, adopting them as espoused organizational values. The adoption of social values of tradition took center stage as the organization recognized “the importance of respect for the wisdom of traditional knowledge” for the local community (</span><a class="workspace-trigger" data-dcnode-id="6781" href="#bb0425" name="bbb0425"><span data-dcnode-id="6782" instrument_node="">The Blue Planet Prize Winners 2011</span></a><span data-dcnode-id="6780" instrument_node="">: 316). The embracing of this core social value was evident in the organization identifying the ideology of Barefoot as having four key components, including “Alternative Education, Valuing Traditional Knowledge and Skills, Learning for Self-Reliance, and Dissemination” (</span><a class="workspace-trigger" data-dcnode-id="6778" href="#bb0425" name="bbb0425"><span data-dcnode-id="6779" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="6777" instrument_node="">: 73). Thus, Roy instituted practices that demonstrated oneness with the community such as all employees—local and foreign—adopting local customs and wearing local clothing and serving local food in the organization. Signifying guardianship of traditional rural values central to the community, the organization also started to promote more generally traditional arts and crafts. Describing the importance given to traditional arts, Niwas told us about how even his skills in traditional puppetry were put to use:</span></p><blockquote data-dcnode-id="6772"><p data-dcnode-id="6775" id="sp0065"><span data-dcnode-id="6776" instrument_node="">When I came to Barefoot, all I knew was singing and storytelling and some puppeteering. I applied for a job at Barefoot as a clerk and was ready to do any small job. Then I was put in charge of communications for Barefoot since I could sing and tell stories. We would organize puppet shows and street plays to tell about Barefoot and its work. I feel in Barefoot hobbies become professions.</span></p><span data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">(Niwas, interview, 2017)</span></span></blockquote><p></p><p data-dcnode-id="6755" id="p0975"><span data-dcnode-id="6770" instrument_node="">When Barefoot was founded, the aim of bringing urban professionals to the rural community had resulted in many “geologists, economists, doctors, medical and social workers, chartered accountants, graduates and post graduates from universities” joining the organization (</span><a class="workspace-trigger" data-dcnode-id="6768" href="#bb2005" name="bbb2005"><span data-dcnode-id="6769" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="6767" instrument_node="">). However, changing tactics to reflect respect for local skills the organization “adopted a new approach” and “began using local skills to achieve sustainable people centric and participatory development” (</span><a class="workspace-trigger" data-dcnode-id="6765" href="#bb0425" name="bbb0425"><span data-dcnode-id="6766" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="6764" instrument_node="">). Roy not only championed the need to protect rural skills but also positioned the organization as a protector of those skills. He would frequently mention during interviews and even in TED talks, how rural skills were being threatened by urban migration:</span></p><blockquote data-dcnode-id="6756"><p data-dcnode-id="6762" id="sp0070"><span data-dcnode-id="6763" instrument_node="">When the youth fled, they took with them the dying hopes of their parents—weavers, blacksmiths, potters, builders, carpenters, farmers—to pass on the traditional skills to the next generation. They left behind not only their families but also the knowledge their elders had collected over the generations.</span></p><span data-dcnode-id="6757"><span data-dcnode-id="6761" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="6759" href="#bb0420" name="bbb0420"><span data-dcnode-id="6760" instrument_node="">Roy, 2011</span></a><span data-dcnode-id="6758" instrument_node="">)</span></span></blockquote><p></p><p data-dcnode-id="6748"><span data-dcnode-id="6754" instrument_node="">Significantly, during this phase, Barefoot was careful not to directly contradict traditions or adopt values antithetical to the community. For example, while Barefoot did not espouse patriarchy, management did initially conform to some patriarchal elements by not recruiting women since local beliefs suggested, “women could get corrupted” (Nandan, interview, 2017). Similarly, when Barefoot began running night schools to educate children, schooling was not popular, especially for girls. Rather than pointing out a child's right to schooling, the organization presented these schools to the community as a route to preserving rural traditions and customs:</span></p><blockquote data-dcnode-id="6749"><p data-dcnode-id="6752" id="sp0075"><span data-dcnode-id="6753" instrument_node="">Besides reading, writing and arithmetic, we provide information on land and land records, we teach a little bit about veterinary science, and we explain about agricultural crops and diseases. Children who grazed cattle could come because we ran these schools at night. We understood the problems of the farmers who needed children to help during the day. This was the only way a school would work. We employed local teachers and used local ways to teach children, such as traditional wooden beads and through ancient games.</span></p><span data-dcnode-id="6750"><span data-dcnode-id="6751" instrument_node="">(Devi, interview, 2017)</span></span></blockquote><p></p><p data-dcnode-id="6743" id="p0980"><span data-dcnode-id="6747" instrument_node="">Overall, this phase of anchoring values helped the organization co-opt social values of the community as their own, conferring Barefoot with legitimacy and trust in the process. In a sense, the organization “became” the community through the recursive practices of cooperative discernment and empathic projection. This important foundational phase gave Barefoot the mandate to bring in changes with a relatively low degree of opposition from the community. Co-opting allowed the organization to adopt selective aspects of community social values that could be developed and made compatible with its social mission values in the next phase of augmenting values, thus preventing the need to reject or replace social values altogether. The bedrock formed by carefully identified and selected core values reduced the conflict that could otherwise arise from openly trying to challenge and displace social values (</span><a class="workspace-trigger" data-dcnode-id="6745" href="#bb0375" name="bbb0375"><span data-dcnode-id="6746" instrument_node="">Nussbaum and Sen, 1987</span></a><span data-dcnode-id="6744" instrument_node="">). Having embedded social values and gained the trust of the community, the organization embarked on the next phase.</span></p></section></section><section data-dcnode-id="6602" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6735" id="st0105"><span data-dcnode-id="6740" instrument_node="">4.2</span><span data-dcnode-id="6738" instrument_node="">. </span><span data-dcnode-id="6736" instrument_node="">Phase 2: augmenting values</span></h3><p data-dcnode-id="6730" id="p0995"><span data-dcnode-id="6734" instrument_node="">A report on the first five years of the organization's achievements stated that although the organization's founders had “social change as the ultimate social goal including women's education and equality,” they decided to adopt a different route to secure the community's participation based on a “hands-on immersion” in the community (</span><a class="workspace-trigger" data-dcnode-id="6732" href="#bb0255" name="bbb0255"><span data-dcnode-id="6733" instrument_node="">Kale and Coombs, 1978</span></a><span data-dcnode-id="6731" instrument_node="">: 293). Consequently, mission related goals were brought into focus only after the phase of anchoring social values of the community. In the following phase of augmenting values, the organization introduced a series of practices that served to break down barriers between values of gender equality and values of tradition, thereby making them appear less divergent, followed by their integration and joint performance.</span></p><p data-dcnode-id="6717" id="p1000"><span data-dcnode-id="6729" instrument_node="">Temporally, as seen in our bracketing outlined in </span><a class="workspace-trigger" data-dcnode-id="6727" href="#f0015" name="bf0015"><span data-dcnode-id="6728" instrument_node="">Fig. 3</span></a><span data-dcnode-id="6726" instrument_node="">, this phase began after an internal crisis when the organization started recruiting employees from marginalized communities, including those from lower castes. This practice was contrary to prevalent social norms and practices but appeared to be in line with the organization's ultimate social change mission of equality. However, this new recruitment practice was not without some conflict, as Roy explained in an old interview: “Bypassing the rural hierarchy, we had antagonized the rural rich and created tensions and I wondered if in wanting to bring some change we had miscalculated on our timing and speed” (</span><a class="workspace-trigger" data-dcnode-id="6724" href="#bb0425" name="bbb0425"><span data-dcnode-id="6725" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="6723" instrument_node="">). This change was triggered by the dismissal of an employee from the upper caste on charges of embezzlement, causing upper-caste community members to file a lawsuit against the organization. However, with the traditional social structure intimidating employees, no one was willing to testify against the upper-caste employee. Unexpectedly, Barefoot went on to win the lawsuit, securing the respect and confidence of the community. This newfound authority provided a window for the organization to change practices:</span></p><blockquote data-dcnode-id="6718"><p data-dcnode-id="6721" id="sp0080"><span data-dcnode-id="6722" instrument_node="">In the eyes of the rural poor, we established a certain degree of credibility in taking on the local dominant political leadership and surviving. Looking back, I think we needed this crisis. Everyone was impressed, the high and low castes. This was a turning point for us.</span></p><span data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">(Roy, interview, 2017)</span></span></blockquote><p></p><p data-dcnode-id="6715"><span data-dcnode-id="6716" instrument_node="">Consequently, the beginning of the next phase of augmenting values was marked by the incremental introduction of practices that did not conform with community practices.</span></p><p data-dcnode-id="6713" id="p1005"><span data-dcnode-id="6714" instrument_node="">This phase of augmenting values comprised two sub processes: (1) clustering, the deliberate assembling and enacting of old and new practices in common spaces, and (2) coalescing, the integrated performance of old and new practices representing diverse values. This phase eventually led to the integration and embedding of augmented values in the community.</span></p><section data-dcnode-id="6649" id="s0095"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6707" id="st0110"><span data-dcnode-id="6712" instrument_node="">4.2.1</span><span data-dcnode-id="6710" instrument_node="">. </span><span data-dcnode-id="6708" instrument_node="">Clustering</span></h4><p data-dcnode-id="6705" id="p1015"><span data-dcnode-id="6706" instrument_node="">Following its introduction of unorthodox recruitment practices favoring marginalized communities, the organization began adjusting traditional practices through practices of defamiliarization and began introducing new practices through practices of familiarization.</span></p><p data-dcnode-id="6700" id="p1020"><strong data-dcnode-id="6702"><em data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">Defamiliarization.</span></em></strong><span data-dcnode-id="6701" instrument_node=""> Barefoot enabled changes in the performance of traditional practices and provided fresh perspectives on traditional ways of doing things in two ways: employing traditional skills in new applications and encouraging the performance of traditional skills by “outsiders”.</span></p><p data-dcnode-id="6687" id="p1025"><span data-dcnode-id="6699" instrument_node="">For instance, continuing to demonstrate respect for traditional skills, Roy asked that local materials and traditional architectural styles be employed by local employees to construct a new campus for Barefoot</span><em data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">.</span></em><span data-dcnode-id="6696" instrument_node=""> This project was entrusted to a barefoot architect, who was both surprised and gratified by the confidence shown in his abilities, “I had 12 men working under my direction, and we built a campus that uses solar energy and stores rainwater, but I am barely literate. I myself did not know I could do this” (Bhanwar, interview, 2018). The building was later awarded the prestigious Aga Khan award for its use of “traditional technologies.” In another example, Barefoot invited the women of the community to use ancient traditional techniques of waterproofing village homes to waterproof the college building. It is important to point out that these women had never worked outside their home environments, making this application of an ancient technique take on a particularly different hue. Roy made it a point to honor and publicize this achievement during several interviews:</span></p><blockquote data-dcnode-id="6688"><p data-dcnode-id="6694" id="sp0085"><span data-dcnode-id="6695" instrument_node="">During the construction of the college in 1986, the village women took ownership of a vital role—waterproofing the roof. They do this using a bit of jaggery, and other things I don’t know, but it actually doesn’t leak. Since 1986, it hasn’t leaked. So valuable is the technology that the women refuse to share their secret concoction with the men.</span></p><span data-dcnode-id="6689"><span data-dcnode-id="6693" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="6691" href="#bb0420" name="bbb0420"><span data-dcnode-id="6692" instrument_node="">Roy, 2011</span></a><span data-dcnode-id="6690" instrument_node="">)</span></span></blockquote><p></p><p data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">Interestingly, the organization began using the word “technology” when referring to traditional skills, which also helped depict these skills in a new light as being scientific and valuable rather than outmoded. It should be pointed out that the word technology is commonly associated with modern techniques and is rarely used for rural ways in this environment. This belief is echoed in Roy's strategy of “demystifying technology” as one of the organization's goals. Similarly, the use of terms like “barefoot architect” and “barefoot dentist” for community members who performed these jobs but did not have formal certificates or training also presented traditional rural skills in a modern light while simultaneously ascribing respect for rural ways. Another example of traditional practices in new applications was the use of folk music and dance to discuss modern and unfamiliar ideas. For example, traditional puppet shows and puppet characters, such as 300-year-old Jokhim "chacha" (uncle), helped spread awareness about solar electrification.</span></p><p data-dcnode-id="6678" id="p1030"><span data-dcnode-id="6684" instrument_node="">A fresh take on old ways was also engineered by the performance of traditional ways by outsiders. Having established legitimacy and trust, the organization was now in a position to implement its original strategy of bringin
