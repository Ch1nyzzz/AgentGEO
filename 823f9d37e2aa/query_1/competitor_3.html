g urban professionals into the organization and the community. This strategy is evidenced in numerous sources, including the organization's website at the time inviting interns and volunteers from across the country and abroad to work, train, and volunteer in the organization:</span></p><blockquote data-dcnode-id="6679"><p data-dcnode-id="6682" id="sp0090"><span data-dcnode-id="6683" instrument_node="">Come for the work and the challenge. This is where we want you to try crazy ideas. Whatever idea you have, come and try it. It does not matter if you fail. Battered, bruised, you start again. It is the only college where the teacher is the learner, and the learner is the teacher.</span></p><span data-dcnode-id="6680"><span data-dcnode-id="6681" instrument_node="">(Barefoot College website, from the Internet Archives, 2012)</span></span></blockquote><p></p><p data-dcnode-id="6676" id="p1035"><span data-dcnode-id="6677" instrument_node="">Since the organization mandated that all employees adopt local ways, the performance of social customs and traditions by outsiders drove an acculturation process and generated shifts in local customs for the organization that eventually seeped into the community. For instance, although interns took their meals while sitting on the floor, as was the local practice, they tended to sit in mixed groups of men and women. The local employees, however, initially sat in segregated groups, as per local customs. Over the years, the long-term employee recounted how it had now become commonplace for all employees, even those from the community, to sit in mixed-gender groups while eating. Similarly, strict social codes forbade the mingling of castes within the community but outsiders rarely followed these customs and Barefoot actively encouraged equality. For example, Ram Niwas, an accountant by day and a puppeteer by evening, told us how, as a low-caste Dalit, he had not even been allowed to enter temples. However, after joining Barefoot in 1986, he became friends with Guruji, a Brahmin high-caste priest, and now often eats lunch with him. This also demonstrated how shifts in practices initiated at the organizational level gradually led to similar shifts at the community level.</span></p><p data-dcnode-id="6659"><strong data-dcnode-id="6673"><em data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">Familiarization.</span></em></strong><span data-dcnode-id="6672" instrument_node=""> While defamiliarization practices put a new spin on the meaning of tradition, familiarization practices made modern ways appear less alien. For instance, with volunteers from all over the world flocking to Barefoot, a senior manager recalled how many of the young professionals used wind and hydroelectric power to conduct trials with the aim of resolving electricity problems (Guruji, interview, 2017). Leader sensegiving during this period ensured that these new ways were associated with the anchored values of tradition by positioning these experiments as efforts to preserve and protect rural lifestyles. Thus, when an inventor from Germany showed a female employee, Shehnaz, how giant parabolic mirrors could be used to make efficient solar-powered cookers that could replace traditional wood-fired stoves, it was not viewed as a threat to traditional ways of cooking. Instead, the entrepreneur portrayed this as ways of preserving and strengthening rural communities, making them independent and self-reliant. Gradually, women began maintaining, repairing, and even assembling solar-powered cookers. These practices not only exposed employees to new technologies but also built their confidence, as expressed by Shehnaz: “I could not believe that these things could be used for cooking. And I was far from imagining that I would one day be capable of making a stove myself” (</span><a class="workspace-trigger" data-dcnode-id="6670" href="#bb0340" name="bbb0340"><span data-dcnode-id="6671" instrument_node="">Martinez, 2011</span></a><span data-dcnode-id="6669" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="6667" href="#bb0420" name="bbb0420"><span data-dcnode-id="6668" instrument_node="">Roy (2011)</span></a><span data-dcnode-id="6666" instrument_node=""> suggested that this self-confidence was critical to adopting new ways and pointed out the benefits to the community as a whole:</span></p><blockquote data-dcnode-id="6660"><p data-dcnode-id="6661" id="sp0095"><span data-dcnode-id="6665" instrument_node="">What is remarkable is that for the first time sophisticated solar technology has been demystified, and simple village women have demonstrated how effectively they can manage and control it to improve their quality of life. They now have the opportunity to develop their competence and confidence to handle technology, providing services to their own community that gives them a new level of acceptance and the respect they deserve. (</span><a class="workspace-trigger" data-dcnode-id="6663" href="#bb0420" name="bbb0420"><span data-dcnode-id="6664" instrument_node="">Roy, 2011</span></a><span data-dcnode-id="6662" instrument_node="">)</span></p></blockquote><p></p><p data-dcnode-id="6657" id="p1040"><span data-dcnode-id="6658" instrument_node="">During this period of the organization, practices of familiarization with new technologies and tools introduced by external volunteers were typically presented to the young men in the community first, making the introduction of new practices less radical. This practice of recruiting men rather than women once again revealed an adherence to traditional values rather than their upending and replacement by modern values of equality. Similarly, with girls having begun enrolling in the Barefoot night schools, the notion of women training as barefoot solar engineers was seen as less radical. Thus, in 1997, without too much opposition, Kamla Devi became the first woman to become a barefoot solar engineer, training in a program meant primarily for male participants.</span></p><p data-dcnode-id="6655" id="p1045"><span data-dcnode-id="6656" instrument_node="">The increasing ubiquity of new practices and outsiders also indirectly mandated familiarization. For instance, Shehnaz spoke no German but had to learn how to communicate with the German inventor, while Bhanwari Devi, a local woman trained as a barefoot dentist by an Italian doctor, had to learn a host of medical terms: “I used to call the instruments kanta, aina, and cheemta instead of probe, mirror, and forceps” (Devi, interview, 2017). Devi confessed that it was harder to make other parallel changes warranted by these shifts in practices: “I was very shy when I removed my ghunghat [face covering/veil] for the first time when I trained here [in 1982]. But as a dentist, I treat men also, and now I cannot think of wearing a ghunghat” (Devi, personal communication, 2017).</span></p><p data-dcnode-id="6650"><span data-dcnode-id="6654" instrument_node="">Taken together, defamiliarization and familiarization practices brought traditional and modern values closer, reducing the gap between them and permitting opportunities for values of tradition and gender equality to interact. While defamiliarization of traditional practices opened up new perspectives on traditional ways, familiarization with new techniques and tools ensured a non-threatening introduction to modern ways, thereby prompting a more open-minded approach, and leading to an interaction of the values embodied in these practices. Importantly, even in the course of the clustering of traditional and modern practices and their underlying values, the importance of tradition was emphasized by the organization reflecting community social values. For instance, in the course of an interview, Roy suggested that although working with solar technology was new for the women, it built on their “traditional responsibility to maintain the supplies of kerosene for lighting and fuel for cooking” (</span><a class="workspace-trigger" data-dcnode-id="6652" href="#bb0420" name="bbb0420"><span data-dcnode-id="6653" instrument_node="">Roy, 2011</span></a><span data-dcnode-id="6651" instrument_node="">).</span></p></section><section data-dcnode-id="6603" id="s0100"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6643" id="st0115"><span data-dcnode-id="6648" instrument_node="">4.2.2</span><span data-dcnode-id="6646" instrument_node="">. </span><span data-dcnode-id="6644" instrument_node="">Coalescing</span></h4><p data-dcnode-id="6638" id="p1065"><span data-dcnode-id="6642" instrument_node="">In the next sub process, the clustering of values enabled previously was now consolidated and built upon through practices of authoritative dissemination and visible endorsement, leading to the integrated performance of practices with diverse underlying values. Signifying the commencement of this phase temporally, was the launch of the solar training program exclusively for women, replacing the previous program focused on training men in solar energy technology. This was an important change since not only did the new program exemplify bold practices demonstrating the joint performance of values of tradition and equality, but it was also clearly ground in gender equality beliefs. This shift should be seen against the backdrop of a society in which female education is not the norm, with the state possessing one of the lowest female literacy rates in India and the largest male-female literacy gap, with rural literacy standing at 76.16% for men and 42.20% for women (</span><a class="workspace-trigger" data-dcnode-id="6640" href="#bb0005" name="bbb0005"><span data-dcnode-id="6641" instrument_node="">Census of India, 2011</span></a><span data-dcnode-id="6639" instrument_node="">).</span></p><p data-dcnode-id="6636" id="p1070"><span data-dcnode-id="6637" instrument_node="">Unlike past instances of women making solar cookers for their kitchens or the odd case of a woman becoming a solar engineer (as in the case of Kamala Devi above), the program was a concrete initiative favoring the technical education and empowerment of women and enabled the organization to begin espousing values of gender equality directly. Although there was no dramatic single event triggering this shift, the organization explained this departure from the norm as an effort to overcome the high turnover of men migrating to cities in search of jobs after completing their solar energy training. Drawing on the organization's role of preserving rural traditions, Roy positioned the training of women, particularly older illiterate women, as meeting that objective: “Women are not compulsively mobile. Train a woman and she will stay and help the community” (Roy, interview, 2017). Illustrating the radical nature of this change were the striking images of illiterate elderly women with traditional head coverings making printed circuit boards that we observed in the college.</span></p><p data-dcnode-id="6631" id="p1075"><strong data-dcnode-id="6633"><em data-dcnode-id="6634"><span data-dcnode-id="6635" instrument_node="">Authoritative dissemination</span></em></strong><span data-dcnode-id="6632" instrument_node="">. Following the launch of the solar training program for women, we found several radical practices of authoritative dissemination that involved the privileging of new values such as practices of placing women in positions of authority</span></p><p data-dcnode-id="6629" id="p1080"><span data-dcnode-id="6630" instrument_node="">In one set of practices, as part of its solar training course, the organization mandated that all women who became solar engineers had to train other women, set up workshops in their communities, and share their knowledge. Thus, Kamla Devi, the first barefoot solar engineer, became the “head of the manufacturing, repairing and training unit of solar energy equipment” at a branch of Barefoot in 2012. Similarly, for the night schools, women who had previously studied in these schools were made teachers. During our field visits, we observed women teaching in classes with ease and solar mamas training women not just from the community but also from rural communities across the country and even across the world.</span></p><p data-dcnode-id="6622" id="p1085"><span data-dcnode-id="6628" instrument_node="">The expansion of the solar training program globally further embedded coalesced practices within the organization. This internationalization not only demonstrated the program's success but also, in representing gender equality–laden practices, endorsed new values in two significant ways. First, women were put in charge of disseminating this program, giving them greater power and authority and further entrenching gender-equality beliefs. For example, displaying feelings of self-efficacy, one of the solar mamas told us, “I thought I would never be able to understand anything let alone be able to do it on my own and even train others.” Second, with women from rural communities across the world coming to Barefoot, the community shared in the acclaim and recognition that accrued to the village, resulting in men accepting these practices and even promoting them. The obligation for barefoot solar engineers to train other women and spread their knowledge also resulted in powerful visual images of women handling sophisticated charge controllers and inverters and serving in positions of authority as they conducted workshops. Such images inspired other women and helped the men see women in dramatically different roles, gradually spreading values of gender equality. For instance, a local councilor acknowledged the following:</span></p><blockquote data-dcnode-id="6623"><p data-dcnode-id="6626" id="sp0100"><span data-dcnode-id="6627" instrument_node="">These women have become so important in the community that they inspire other women. Everyone looks up to them, not just for putting a solar lamp in the house but for all sorts of advice, from healthcare to the state of the economy. They even speak up during [village] council meetings. Before, no women would say anything, and hardly any even attended these meetings.</span></p><span data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">(Councilor, interview, 2018)</span></span></blockquote><p></p><p data-dcnode-id="6615"><span data-dcnode-id="6621" instrument_node="">The effectiveness of such practices in legitimizing social change and compelling the augmentation of values was seen in the story of Santosh, a barefoot solar engineer. As a Dalit, Santosh was used to the upper-caste people in her village avoiding her, but she said they now call on her to repair and install their solar lights: “From looking down on the ground when higher-caste people passed me to looking them in the eye, I never imagined this would have been possible” (Santosh, interview, 2018). Echoing this social change, Roy explained the following:</span></p><blockquote data-dcnode-id="6616"><p data-dcnode-id="6619" id="sp0105"><span data-dcnode-id="6620" instrument_node="">They have so much confidence that, on their return, the villagers can’t recognize the people they’ve sent. It’s amazing how much they’ve managed to change the equation between men and women. They come as mothers and go back like tigers—oozing with confidence.</span></p><span data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">(Roy, interview, 2017)</span></span></blockquote><p></p><p data-dcnode-id="6610" id="p1090"><strong data-dcnode-id="6612"><em data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">Visible endorsement.</span></em></strong><span data-dcnode-id="6611" instrument_node=""> A final set of practices that served to embed augmented values and reinforce nascent values of gender equality was that of visible endorsement. Visible endorsement was seen in practices that helped broadcast the success of the solar training program, increase the visibility of women and promote values of gender equality through practices of celebrating rewards, promoting advocacy and building partnerships. The achievements of Barefoot and its leadership resulted in numerous awards largely relating to the organization's work in the areas of solar energy, gender equality, and education from organizations like the Skoll Foundation and the Clinton Foundation. Associated with these commendations, we observed practices of celebrating and publicizing achievements across the organization and the community, including on local radio and in recent years, on social media. In addition, we observed awards and pictures of well-known visitors, such as the Dalai Lama prominently displayed in the organization.</span></p><p data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Along with the organization and the barefoot solar engineers, community members also took ownership and pride in the achievements of the solar mamas. Celebrations not only increased the acceptance of coalesced values of tradition and modernity but also instilled pride in employees, making them proponents of the organization and its values. Fostering involvement at the grassroots, Barefoot sent employees to participate in exhibitions and conferences when receiving awards. For instance, Laxman Singh proudly narrated to us the time he represented Barefoot at the United Nation's Earth Summit in 2011 in Johannesburg and had the chance to talk to Nelson Mandela about Barefoot's work. His comments were significant since here was a male employee expressing pride and ownership of a program that was contrary to values of patriarchy.</span></p><p data-dcnode-id="6606" id="p1095"><span data-dcnode-id="6607" instrument_node="">Practices of visible endorsement also resulted in increased confidence among women and a heightened awareness of their rights. Reflecting this change, we heard stories of employees volunteering to help women facing domestic violence and forming groups to counsel couples and educate women about their rights. Following these practices, Barefoot added advocacy as an espoused organizational value. However, values of tradition continued to be upheld in the organization, with the empowerment of women linked to serving the community and preserving traditions. Indeed, most of the partnerships that Barefoot entered into during this period were based on common areas of developing and promoting rural traditions.</span></p><p data-dcnode-id="6604" id="p1100"><span data-dcnode-id="6605" instrument_node="">Overall, this period saw the embedding of coalesced values and their integrated performance. Gradually, with the organization embedded in the community and employees drawn from the community, enactment of practices instituted at the organizational level seeped into the community. Although some practices were designed for and directed specifically at the community such as those related to training women, in most cases practices directed at the organization preceded those targeting the community. Consequently, changes in the enterprise's aims, values, and strategies were followed by visible changes in the community in the form of increasing activism by women (e.g., demanding equal pay) and their political participation (e.g., running in and winning local village council elections).</span></p></section></section><section data-dcnode-id="6397" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6596" id="st0120"><span data-dcnode-id="6601" instrument_node="">4.3</span><span data-dcnode-id="6599" instrument_node="">. </span><span data-dcnode-id="6597" instrument_node="">An iterative process: a second round of value augmentation</span></h3><p data-dcnode-id="6594" id="p1115"><span data-dcnode-id="6595" instrument_node="">We observed a further expansion of values in a second round of value augmentation. Since the first foundational phase of anchoring values had already been accomplished, this cycle was noticeably shorter. At the start of this process, augmented values of tradition and gender equality were already being performed in the organization. However, up until this point, the organization had continued to train only older women, positioning this strategy as a response to men leaving for cities and thus the need to train women who can preserve tradition. Marking a departure from this practice and delineating the start of another cycle of the value augmentation process was the launch of the Enriche program to train women as entrepreneurs. During and after the launch of this program, we observed in real time how practices changed from training older women to training women of all ages as well as to offering a range of courses that openly encouraged women's empowerment and economic independence. This change in practices followed a similar pattern of clustering and coalescing as illustrated in our value augmentation process model.</span></p><p data-dcnode-id="6589" id="p1120"><span data-dcnode-id="6593" instrument_node="">We again observed the clustering of defamiliarization and familiarization practices. Defamiliarization was visible in practices around areas of reproductive health and previously taboo topics, such as menstruation. Such practices were evidenced in the program curriculum, which included a “Workshop on the Healthy Living Module. Awareness around overcoming social barriers and myths to enable an improved understanding of one's body, hygiene, reproductive health, and overall nutrition. Leading women towards body positiveness and a culturally relevant healthy lifestyle” (Roy, personal communication, 2019). The use of the phrase “barriers and myths” is significant as it suggests a shift in familiar practices, while the aim of inculcating a “culturally relevant” lifestyle evidences practices that sustain rather than replace traditional values </span><em data-dcnode-id="6591"><span data-dcnode-id="6592" instrument_node="">en masse</span></em><span data-dcnode-id="6590" instrument_node="">. At the same time, familiarization was visible in training related to women's basic rights and awareness, building on “equality, education, health, domestic violence, and child marriage.” Courses related to women's rights caused shifts in thinking and presented new perspectives and as one of the trainees remarked, “I had never thought about what I wanted for myself” (Participant, interview, 2019). Other new practices included, for instance, the introduction and use of digital technologies and competencies in partnership with companies like Apple and Microsoft, with each woman receiving a smartphone upon beginning her training for use throughout the six-month program.</span></p><div data-dcnode-id="6398"><p data-dcnode-id="6581" id="p1125"><span data-dcnode-id="6588" instrument_node="">Finally, women's enterprise ownership and the launch of commercial products, such as coffee and tea, under the B.Barefoot brand indicated a coalescing of practices. Concurrently, we observed a sustained commitment to the community and the upholding of select traditional values. For example, the preservation and promotion of age-old methods of beekeeping and coffee roasting through these enterprises as well as the purity and environmental friendliness of rural products was emphasized in advertisements. The coalescence of old and new practices was also visible in the launch of “Super Five,” a product rich in iron and other nutrients. Remarkably, this product was promoted by a barefoot entrepreneur, 55-year-old Dhapu Kaki, who told us how this product has the same iron found in supplements but is far tastier and has fewer side effects since it is made with locally sourced traditional produce. This example illustrates not just a coalescence of practices but also the intermingling of values of tradition with those of gender equality and individual entrepreneurship. We also observed related changes in the community in the way some men praised their wives for working outside the home and in the way women would discuss issues of contraception. Thus, we saw a shift in the narrative, with the organization now promoting values of independence and individualism contrary to existing communal values. For instance, the website promoting the Enriche entrepreneurship program carried the slogan “Challenging Patriarchy, One Workshop at a Time,” evidencing the conspicuous rejection of patriarchy (</span><a class="workspace-trigger" data-dcnode-id="6586" href="#bb1010" name="bbb1010"><span data-dcnode-id="6587" instrument_node="">Barefoot College, 2019</span></a><span data-dcnode-id="6585" instrument_node="">). A sample of further examples and representative codes can be seen in </span><a class="workspace-trigger" data-dcnode-id="6583" href="#t0020" name="bt0020"><span data-dcnode-id="6584" instrument_node="">Table 4</span></a><span data-dcnode-id="6582" instrument_node="">.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="6399" id="t0020"><span class="captions" data-dcnode-id="6573"><span data-dcnode-id="6574" id="ca0045"><p data-dcnode-id="6575" id="sp0045"><span class="label" data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">Table 4</span></span><span data-dcnode-id="6578" instrument_node="">. </span><span data-dcnode-id="6576" instrument_node="">Sampling of codes.</span></p></span></span><div class="groups" data-dcnode-id="6400"><table data-dcnode-id="6401"><thead data-dcnode-id="6563"><tr class="rowsep-1 valign-top" data-dcnode-id="6564"><th data-dcnode-id="6571" scope="col"><span data-dcnode-id="6572" instrument_node="">Phases</span></th><th data-dcnode-id="6569" scope="col"><span data-dcnode-id="6570" instrument_node="">Dimensions</span></th><th data-dcnode-id="6567" scope="col"><span data-dcnode-id="6568" instrument_node="">Categories</span></th><th data-dcnode-id="6565" scope="col"><span data-dcnode-id="6566" instrument_node="">Representative Data</span></th></tr></thead><tbody data-dcnode-id="6402"><tr data-dcnode-id="6531"><td data-dcnode-id="6561" rowspan="2"><span data-dcnode-id="6562" instrument_node="">ANCHORING VALUES</span></td><td data-dcnode-id="6557" rowspan="2"><span data-dcnode-id="6560" instrument_node="">COOPTING</span><br data-dcnode-id="6559"><span data-dcnode-id="6558" instrument_node="">Assessing social values and adopting selected values</span></td><td data-dcnode-id="6552"><span data-dcnode-id="6556" instrument_node="">Cooperative discernment</span><br data-dcnode-id="6555"><br data-dcnode-id="6554"><span data-dcnode-id="6553" instrument_node="">Practices of discerning social values and jointly interpreting them.</span></td><td data-dcnode-id="6532"><span data-dcnode-id="6551" instrument_node="">• These poor, simple people became my friends, and I spent my days listening to their stories and learning of their experiences. We used to spend days and nights just talking to the villagers, understanding and appreciating their ways. I made no promises. I had no fixed plans. (Roy, interview, 2017)</span><br data-dcnode-id="6550"><span data-dcnode-id="6549" instrument_node="">• Initially, the main purpose of the college was to listen and learn. (</span><a class="workspace-trigger" data-dcnode-id="6547" href="#bb0295" name="bbb0295"><span data-dcnode-id="6548" instrument_node="">Kummitha, 2017</span></a><span data-dcnode-id="6546" instrument_node="">: 56). </span><br data-dcnode-id="6545"><span data-dcnode-id="6544" instrument_node="">• In order to work with the poorest of the poor in the villages one has to base oneself in the village. (Vasu, quoted in Rossi, 2007: 2) </span><br data-dcnode-id="6543"><span data-dcnode-id="6542" instrument_node="">• I lived and worked with them as they did. Meghraj, a local farmer became my friend. Together we understood the main issues. (Roy, interview, 2017)</span><br data-dcnode-id="6541"><span data-dcnode-id="6540" instrument_node="">• Bunker Roy and his friends wanted to study the community and understand the social structures that existed there. (</span><a class="workspace-trigger" data-dcnode-id="6538" href="#bb0295" name="bbb0295"><span data-dcnode-id="6539" instrument_node="">Kummitha, 2017</span></a><span data-dcnode-id="6537" instrument_node="">) </span><br data-dcnode-id="6536"><span data-dcnode-id="6535" instrument_node="">• The starting point is to understand the reality of the rural poor—about 60 or 70 percent of children never go to school in the morning because they are supposed to work and rear cattle. We spent a long time just figuring out these realities. (Devi, interview, 2017)</span><br data-dcnode-id="6534"><span data-dcnode-id="6533" instrument_node="">• I have lots of faith in the Barefoot system because I am among those who framed the system. (Devi, solar mama, interview, 2018)</span></td></tr><tr data-dcnode-id="6509"><td data-dcnode-id="6526"><span data-dcnode-id="6530" instrument_node="">Empathic projection</span><br data-dcnode-id="6529"><br data-dcnode-id="6528"><span data-dcnode-id="6527" instrument_node="">Practices of adopting and espousing key social values as organizational values</span></td><td data-dcnode-id="6510"><span data-dcnode-id="6525" instrument_node="">• Managers adopt community traditions: dress and eat like them, sit on the floor while eating and working. They avoid practices not followed by the community: no televisions or air-conditioning even in managers homes. Even Roy’s office has a low table and he sits on a mat on the floor and works. (Field notes, 2017)</span><br data-dcnode-id="6524"><span data-dcnode-id="6523" instrument_node="">• People in this college clean their own dishes, sweep their own floors, and do voluntary work to keep the Centre clean. Everybody is equal and pay scales are the same (Roy, interview, 2017).</span><br data-dcnode-id="6522"><span data-dcnode-id="6521" instrument_node="">• Barefoot became my home. Here, I can sit and talk with everyone. No one looks down on me here. (Niwas, interview, 2017)</span><br data-dcnode-id="6520"><span data-dcnode-id="6519" instrument_node="">• We realized we had to provide the children with an education that had some relevance to their lives, therefore, in addition to reading, writing and arithmetic we provide them with information on land and land records, a little bit about veterinary science and information on agricultural crops. (Vasu quoted in Rossi, 2007: 4)</span><br data-dcnode-id="6518"><span data-dcnode-id="6517" instrument_node="">• Here in Tilonia, there are no barriers. It is the local community who identifies and decides what the issues are, and everything in the college is done with the involvement of the community (Bhanwari, interview, 2017)</span><br data-dcnode-id="6516"><span data-dcnode-id="6515" instrument_node="">• We told Bunkerji, “Please do not get some outsider to teach us. We are proud of who we are.” (Community member, interview, 2017)</span><br data-dcnode-id="6514"><span data-dcnode-id="6513" instrument_node="">• Practices of employing people mainly from the community and enabling their involvement; the use of local language in the college and removing requirements for formal certifications and educational qualifications. (Field notes, 2017)</span><br data-dcnode-id="6512"><span data-dcnode-id="6511" instrument_node="">• We believe paper-qualified, urban-trained experts and professionals can easily be replaced. If you have a degree, you cannot teach here. (Nandan, interview, 2017)</span></td></tr><tr data-dcnode-id="6506"><td colspan="4" data-dcnode-id="6507"><br data-dcnode-id="6508"></td></tr><tr data-dcnode-id="6476"><td data-dcnode-id="6504" rowspan="2"><span data-dcnode-id="6505" instrument_node="">AUGMENTING VALUES</span></td><td data-dcnode-id="6500" rowspan="2"><span data-dcnode-id="6503" instrument_node="">CLUSTERING</span><br data-dcnode-id="6502"><span data-dcnode-id="6501" instrument_node="">Bringing tradition-laden practices and gender equality–laden practices closer</span></td><td data-dcnode-id="6496"><span data-dcnode-id="6499" instrument_node="">Defamiliarization</span><br data-dcnode-id="6498"><span data-dcnode-id="6497" instrument_node="">Reinterpreting tradition-infused practices</span></td><td data-dcnode-id="6477"><span data-dcnode-id="6495" instrument_node="">• An illiterate Hindu priest built the campus using age-old ways. (Roy, interview, 2018) </span><br data-dcnode-id="6494"><span data-dcnode-id="6493" instrument_node="">• We started our own radio station, Radio Tilonia, and every morning 40,000–60,000 people listen to discussions on topics like caste and sanitation (Raghav, interview, 2017) </span><br data-dcnode-id="6492"><span data-dcnode-id="6491" instrument_node="">• Since most participants were illiterate, we used color codes for training and made our own manuals with pictures that we understand here. (Nandan, interview, 2018)</span><br data-dcnode-id="6490"><span data-dcnode-id="6489" instrument_node="">• Teachers from the community and the nearby villages develop the educational material used in the night schools. We teach Math using examples of cattle and goats. (Niwas, interview, 2017) </span><br data-dcnode-id="6488"><span data-dcnode-id="6487" instrument_node="">• Traditional knowledge and skills were used to build these rainwater-harvesting tanks. We used </span><em data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">Barefoot</span></em><span data-dcnode-id="6484" instrument_node=""> technology: this was 1986 -- no engineer, no architect thought of it -- but we are collecting rainwater from the roofs (Bhanwar, interview, 2018).</span><br data-dcnode-id="6483"><span data-dcnode-id="6482" instrument_node="">• First, we had solar engineers from the cities who came to train us, but even they had to report to us and learn our ways. (Nandan, interview, 2017)</span><br data-dcnode-id="6481"><span data-dcnode-id="6480" instrument_node="">• We made our own studio at a mere cost of 500 rupees (USD 8) and used egg trays for sound insulation. (Niwas, interview, 2017)</span><br data-dcnode-id="6479"><span data-dcnode-id="6478" instrument_node="">• Puppets are the way we communicate. You have Jokhim Chacha who is 300 years old. He is my psychoanalyst. He is my teacher. He’s my doctor. He’s my lawyer. He’s my donor. He actually raises money, solves my disputes. He solves my problems in the village. If there’s tension in the village, if attendance at the schools goes down and there’s a friction between the teacher and the parent, the puppet calls the teacher and the parent in front of the whole village and says, “Shake hands. The attendance must not drop.” (Roy, TED Talk, 2011)</span></td></tr><tr data-dcnode-id="6450"><td data-dcnode-id="6471"><span data-dcnode-id="6475" instrument_node="">Familiarization</span><br data-dcnode-id="6474"><br data-dcnode-id="6473"><span data-dcnode-id="6472" instrument_node="">Introducing gender-equality infused practices</span></td><td data-dcnode-id="6451"><span data-dcnode-id="6470" instrument_node="">• Anyone from the village was welcome here—Dalits, Brahmins, Rajputs, anyone—and we were asked to help in whatever way we wanted or could. (Santhosh, interview, 2018)</span><br data-dcnode-id="6469"><span data-dcnode-id="6468" instrument_node="">• We have had volunteers from all over the world trying things like wind energy, solar energy, digital technology, computers, and so many other things. (Nandan, interview, 2017)</span><br data-dcnode-id="6467"><span data-dcnode-id="6466" instrument_node="">• You have to show that you have a skill that you can offer to the community and provide a service to the community. You can stay with me for 20 years, or go tomorrow. And no one can get more than $100 a month. You come for the money, you don’t come to Barefoot College. You come for the work and the challenge, you’ll come to the Barefoot College. (Roy, TED Talk, 2011) </span><br data-dcnode-id="6465"><span data-dcnode-id="6464" instrument_node="">• We did not want to rely on urban professionals, and slowly we trained more people from the community. (Nandan, interview, 2017)</span><br data-dcnode-id="6463"><span data-dcnode-id="6462" instrument_node="">• First, the women tried to use these solar cookers, and now they fabricate, install, and maintain parabolic solar cookers in their homes. (Roy, interview, 2018)</span><br data-dcnode-id="6461"><span data-dcnode-id="6460" instrument_node="">• I am a midwife. Here people do not like to go to the hospital. They come to me. A doctor from the city taught me some techniques, and I showed her some of our ways (Devi, interview, 2018)</span><br data-dcnode-id="6459"><span data-dcnode-id="6458" instrument_node="">• The volunteers from the city stay here in our community. They teach us about city ways, and we show them our ways. (Devi, interview, 2018)</span><br data-dcnode-id="6457"><span data-dcnode-id="6456" instrument_node="">• In our schools, we have tablets and solar-powered projectors. (Roy, interview, 2018)</span><br data-dcnode-id="6455"><span data-dcnode-id="6454" instrument_node="">• I learned how to use an English keyboard. A visitor asked me why I don’t use a Hindi keyboard. I told him, “This is what we have got here, and we are happy with this.” (Mangibai, interview, 2018)</span><br data-dcnode-id="6453"><span data-dcnode-id="6452" instrument_node="">• What I love about Barefoot College is their openness to learning from whoever comes to share, and their readiness/willingness to share with whoever comes to learn. (Intern, interview, 2017)</span></td></tr><tr data-dcnode-id="6447"><td colspan="4" data-dcnode-id="6448"><br data-dcnode-id="6449"></td></tr><tr data-dcnode-id="6424"><td data-dcnode-id="6445" rowspan="2"><span data-dcnode-id="6446" instrument_node="">AUGMENTING VALUES</span></td><td data-dcnode-id="6441" rowspan="2"><span data-dcnode-id="6444" instrument_node="">COALESCING</span><br data-dcnode-id="6443"><span data-dcnode-id="6442" instrument_node="">Promoting and rewarding the performance of integrated practices</span></td><td data-dcnode-id="6437"><span data-dcnode-id="6440" instrument_node="">Authoritative dissemination</span><br data-dcnode-id="6439"><span data-dcnode-id="6438" instrument_node="">Practices that privilege and promote new values</span></td><td data-dcnode-id="6425"><span data-dcnode-id="6436" instrument_node="">• First, no one thought I would be able to learn how to do this ⁅make solar powered lamps⁆. Now I am in charge of training other women. Even the men come to me for help. (Santosh, interview, 2018)</span><br data-dcnode-id="6435"><span data-dcnode-id="6434" instrument_node="">• Each solar mama has to return to her community and train other women. We support her by supplying spare parts and help set her up by providing some equipment. (Nandan, interview, 2018)</span><br data-dcnode-id="6433"><span data-dcnode-id="6432" instrument_node="">• During their six months of training, other semi-literate and illiterate women teach the women. (Barefoot College website, 2018)</span><br data-dcnode-id="6431"><span data-dcnode-id="6430" instrument_node="">• I had never left my village my whole life, and now I have just returned from Africa to teach women about solar electricity. (Devi, interview, 2018)</span><br data-dcnode-id="6429"><span data-dcnode-id="6428" instrument_node="">• The local people did not trust solar power, and it was only when the women went around and explained how solar energy worked and showed that they used it, did people start to listen. No one will listen if an outsider says the same thing. (Nandan, interview, 2018)</span><br data-dcnode-id="6427"><span data-dcnode-id="6426" instrument_node="">• Laxmiji, a resident of Tilonia village joined the #BarefootEnriche team last September as a sewing trainer. In a short time, she was facilitating our livelihood stitching workshops and now the team is so proud to see her single handedly manage the sanitary pad-stitching workshop (Barefoot College, Twitter feed, August 5, 2018).</span></td></tr><tr data-dcnode-id="6403"><td data-dcnode-id="6419"><span data-dcnode-id="6423" instrument_node="">Visible endorsement</span><br data-dcnode-id="6422"><br data-dcnode-id="6421"><span data-dcnode-id="6420" instrument_node="">Practices that reward and reinforce new values</span></td><td data-dcnode-id="6404"><span data-dcnode-id="6418" instrument_node="">• In the last decade Barefoot has been joined by similar philanthropic efforts as well as dozens of “social enterprise” companies, which operate micro grids or lease solar-powered lights to villagers in an effort to do good while making a profit. (</span><a class="workspace-trigger" data-dcnode-id="6416" href="#bb0510" name="bbb0510"><span data-dcnode-id="6417" instrument_node="">Strickland, 2016</span></a><span data-dcnode-id="6415" instrument_node="">: 2)</span><br data-dcnode-id="6414"><span data-dcnode-id="6413" instrument_node="">• Barefoot College operates in 1,300 villages in 80 countries worldwide. Barefoot College enters into partnerships with UNESCO, UN Women, WWF as well as several NGOs across the world (Barefoot College website, 2018) </span><br data-dcnode-id="6412"><span data-dcnode-id="6411" instrument_node="">• In case you hadn't heard, Barefoot College is to be featured in the documentary “Flip the Switch,” where filming was done with our Solar Mamas from Mexico, Belize, Guatemala, Zanzibar and India. (Barefoot College, Twitter feed, October 5, 2018)</span><br data-dcnode-id="6410"><span data-dcnode-id="6409" instrument_node="">• The very nature of empowering the rural poor requires the development of strong partnerships, capacity building, and advocating for the needs of those on the margins (Fallone, CEO, 2019).</span><br data-dcnode-id="6408"><span data-dcnode-id="6407" instrument_node="">• Meet Amri, a 12-year-old from Singla Bridge School. She is the Prime Minister of Singla's children's parliament. Amri spoke against child marriage in a national forum by NINEISMINE Campaign for the 30th anniversary of the United Nations Convention on the Rights of Child (UNCRC). (Barefoot College, Twitter feed, December 20, 2019)</span><br data-dcnode-id="6406"><span data-dcnode-id="6405" instrument_node="">• Co-produced by Barefoot College, @HoganLovells and @PosNegOrg the “Drawing on Rights” series aims to raise awareness about fundamental human rights for rural women and girls. (Barefoot College, Twitter feed, December 12, 2019)</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="6383" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6391" id="st0125"><span data-dcnode-id="6396" instrument_node="">4.4</span><span data-dcnode-id="6394" instrument_node="">. </span><span data-dcnode-id="6392" instrument_node="">Summary of findings</span></h3><p data-dcnode-id="6389" id="p1130"><span data-dcnode-id="6390" instrument_node="">Barefoot embarked on a mission with no definite agenda other than to help the poor through rural development. Over the years, the organization's work progressed from digging wells and running night schools to developing solar energy and women's entrepreneurship. In tandem, organizational values evolved from values of tradition to augmented values of tradition and gender equality. At the same time, with the organization firmly rooted in the community and comprising employees drawn from the community, the organization's emphasis on values of gender equality rubbed off on the community as well. Increasingly, women in the community who had been largely confined to their homes with little access to education were taking a more active role in community affairs and became solar energy technicians and entrepreneurs themselves.</span></p><p data-dcnode-id="6384" id="p1135"><span data-dcnode-id="6388" instrument_node="">Intrigued by the case, we examined the processes that effected this peaceful transformation within the organization and the community to understand how values of gender equality were reconciled with those of patriarchy. Built into the emergent strategy of advancing from digging wells, opening night schools, and developing solar-powered water-purification systems and cookers to training women as solar energy technicians and entrepreneurs were practices—practices infused with the underlying values they represented. Underpinning this radical change was a process of value augmentation involving expansive and purposeful values work seen in phases of first, anchoring, and then augmenting values. Notwithstanding the changing organizational strategies, we found that the initial values work involving the adoption of organizational values anchored in community social values was critical to the organization's ability to initiate and navigate social change as well as mitigate opposition to unfamiliar concepts. An early report in </span><a class="workspace-trigger" data-dcnode-id="6386" href="#bb0255" name="bbb0255"><span data-dcnode-id="6387" instrument_node="">Kale and Coombs (1978: 292)</span></a><span data-dcnode-id="6385" instrument_node=""> reflecting this deliberate strategy speaks of how other organizations can learn “ways to achieve extensive community participation” by following the route taken by Barefoot where the “ultimate social goal including women's education and equality” had to first consider more direct benefits to the community. The organization evaded confrontation by linking change initiatives to traditional values and leveraging the flexibility and plurality in practices to gradually effect social change. Consolidating our findings, we present a model of value augmentation that catalyzes non-violent and transformative social change through values work.</span></p></section><section data-dcnode-id="6318" id="s0115"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6377" id="st0130"><span data-dcnode-id="6382" instrument_node="">4.5</span><span data-dcnode-id="6380" instrument_node="">. </span><span data-dcnode-id="6378" instrument_node="">A process model of value augmentation</span></h3><div data-dcnode-id="6346"><p data-dcnode-id="6372" id="p1140"><span data-dcnode-id="6376" instrument_node="">Drawing on our results above, we show how this process advances through phases of (1) anchoring values and (2) augmenting values. Our value augmentation model illustrating this process can be seen in </span><a class="workspace-trigger" data-dcnode-id="6374" href="#f0025" name="bf0025"><span data-dcnode-id="6375" instrument_node="">Fig. 5</span></a><span data-dcnode-id="6373" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6347" id="f0025"><span data-dcnode-id="6356"><img alt="Fig. 5" aria-describedby="ca0025" data-dcnode-id="6371" height="401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr5.jpg&amp;raw"><span data-dcnode-id="6370" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6357"><li data-dcnode-id="6364"><a class="anchor download-link u-font-sans" data-dcnode-id="6365" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr5_lrg.jpg" target="_blank" title="Download high-res image (216KB)"><span class="anchor-text" data-dcnode-id="6366"><span data-dcnode-id="6369" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">Download high-res image (216KB)</span></span></span></a></li><li data-dcnode-id="6358"><a class="anchor download-link u-font-sans" data-dcnode-id="6359" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6360"><span data-dcnode-id="6363" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6348"><span data-dcnode-id="6349" id="ca0025"><p data-dcnode-id="6350" id="sp0025"><span class="label" data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Fig. 5</span></span><span data-dcnode-id="6353" instrument_node="">. </span><span data-dcnode-id="6351" instrument_node="">A process model of value augmentation.</span></p></span></span></figure></div><section data-dcnode-id="6331" id="s0120"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6340" id="st0135"><span data-dcnode-id="6345" instrument_node="">4.5.1</span><span data-dcnode-id="6343" instrument_node="">. </span><span data-dcnode-id="6341" instrument_node="">Phase 1: anchoring values</span></h4><p data-dcnode-id="6332" id="p1145"><span data-dcnode-id="6339" instrument_node="">In this foundational phase, the entrepreneur co-opts community values as organizational values through practices targeted at first discerning community values and then adopting and projecting organizational values that align with community values. Sensitive to community core values, the entrepreneur adopts organizational values that provide an essential point of reference and suggest appropriate routes for the next phase of value augmentation (</span><a class="workspace-trigger" data-dcnode-id="6337" href="#bb0370" name="bbb0370"><span data-dcnode-id="6338" instrument_node="">Nussbaum and Sen, 1987</span></a><span data-dcnode-id="6336" instrument_node="">). Values work in the initial part of this phase is directed at uncovering community values through unpacking local practices. In this sense, practices in the community are themselves treated as “values laden”—that is, representative of underlying values (</span><a class="workspace-trigger" data-dcnode-id="6334" href="#bb0180" name="bbb0180"><span data-dcnode-id="6335" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="6333" instrument_node="">). This phase is critical to a nuanced understanding of community values and the judicious adoption of organizational values and to determining strategies for augmenting values in the next phase.</span></p></section><section data-dcnode-id="6319" id="s0125"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6325" id="st0140"><span data-dcnode-id="6330" instrument_node="">4.5.2</span><span data-dcnode-id="6328" instrument_node="">. </span><span data-dcnode-id="6326" instrument_node="">Phase 2: augmenting values</span></h4><p data-dcnode-id="6320" id="p1150"><span data-dcnode-id="6324" instrument_node="">In this phase, having secured the trust of the community and anchored the community-aligned values in the organization, the social entrepreneur begins the process of augmenting values and accomplishing social change. Similar to the process of “unfreezing” suggested by </span><a class="workspace-trigger" data-dcnode-id="6322" href="#bb0310" name="bbb0310"><span data-dcnode-id="6323" instrument_node="">Lewin (1951)</span></a><span data-dcnode-id="6321" instrument_node="">, tensions between opposing values are reduced, and a reexamination of existing values is fostered through the modification of current traditional practices and the introduction of new modern practices. This clustering of practices helps break barriers between the values underlying these practices and, coupled with the entrepreneur's sensegiving tactics, presents the new practices as important for protecting core values. Finally, coalescing practices integrates and embeds the augmented values in and around the organization, setting the stage for the next round of value augmentation that further expands and sustains the social change in the community.</span></p></section></section></section><section data-dcnode-id="6160" id="s0130"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6311" id="st0145"><span data-dcnode-id="6316" instrument_node="">5</span><span data-dcnode-id="6314" instrument_node="">. </span><span data-dcnode-id="6312" instrument_node="">Discussion</span></h2><p data-dcnode-id="6309" id="p1155"><span data-dcnode-id="6310" instrument_node="">With the aim of understanding how a social enterprise works with and around entrenched community values to create social change, we examined processes at Barefoot College using a longitudinal case study methodology. Our findings revealed a deliberate and proactive process of instituting practices that in the first phase anchored social values of the community in the organization through practices of co-opting values, and in the next phase, expanded these very values through practices of clustering and coalescing to accommodate new values. We saw how Barefoot, rather than attempting to drive change by imposing values antithetical to the community, retained cores social values and brought together practices infused with divergent values, leading to gradual but sustainable change. Key contributions of our study and implications for social entrepreneurship and its social change mission are described below.</span></p><section data-dcnode-id="6204" id="s0135"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6303" id="st0150"><span data-dcnode-id="6308" instrument_node="">5.1</span><span data-dcnode-id="6306" instrument_node="">. </span><span data-dcnode-id="6304" instrument_node="">Implications for social entrepreneurship and social change</span></h3><p data-dcnode-id="6274" id="p1160"><span data-dcnode-id="6302" instrument_node="">Despite increasing interest in the potential of social enterprises to alleviate social problems, few studies investigate the processes and mechanisms that lead to social change (</span><a class="workspace-trigger" data-dcnode-id="6300" href="#bb0385" name="bbb0385"><span data-dcnode-id="6301" instrument_node="">Perrini et al., 2010</span></a><span data-dcnode-id="6299" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6297" href="#bb0505" name="bbb0505"><span data-dcnode-id="6298" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="6296" instrument_node="">). Addressing this gap, we illustrate a process of value augmentation that accomplishes “deep-level” social change (i.e., change based on altered beliefs, attitudes, and meanings) by modifying underlying values (</span><a class="workspace-trigger" data-dcnode-id="6294" href="#bb0505" name="bbb0505"><span data-dcnode-id="6295" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="6293" instrument_node="">). Unlike studies that explore how alterations and adjustments in social values effect change over time (</span><a class="workspace-trigger" data-dcnode-id="6291" href="#bb0290" name="bbb0290"><span data-dcnode-id="6292" instrument_node="">Kraatz et al., 2020</span></a><span data-dcnode-id="6290" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6288" href="#bb0395" name="bbb0395"><span data-dcnode-id="6289" instrument_node="">Rao et al., 2003</span></a><span data-dcnode-id="6287" instrument_node="">), we examine how deliberate and purposeful changes modify social values and in doing so address societal challenges. Recent work has seen </span><a class="workspace-trigger" data-dcnode-id="6285" href="#bb0330" name="bbb0330"><span data-dcnode-id="6286" instrument_node="">Mair et al. (2016)</span></a><span data-dcnode-id="6284" instrument_node=""> describe a process of planned change involving the transformation (but not replacement) of behavior patterns and structures. Regardless, both transforming and replacing social values can result in conflict and contestation (</span><a class="workspace-trigger" data-dcnode-id="6282" href="#bb0345" name="bbb0345"><span data-dcnode-id="6283" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="6281" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6279" href="#bb0400" name="bbb0400"><span data-dcnode-id="6280" instrument_node="">Raynard et al., 2020</span></a><span data-dcnode-id="6278" instrument_node="">). We show instead how social change was accomplished by working within existing value structures to expand and supplement social values of the community, thereby reducing conflict and contestation (</span><a class="workspace-trigger" data-dcnode-id="6276" href="#bb0335" name="bbb0335"><span data-dcnode-id="6277" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="6275" instrument_node="">).</span></p><p data-dcnode-id="6245" id="p1165"><span data-dcnode-id="6273" instrument_node="">Corroborating insights from recent studies (</span><a class="workspace-trigger" data-dcnode-id="6271" href="#bb0330" name="bbb0330"><span data-dcnode-id="6272" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="6270" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6268" href="#bb0535" name="bbb0535"><span data-dcnode-id="6269" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="6267" instrument_node="">), our findings emphasize the need for social entrepreneurs to take into account social values in their communities and align their organizational goals with community needs to gain community participation. At the same time, the organization's association with co-opted traditional values during the change process reduces threats to the identity of the community (</span><a class="workspace-trigger" data-dcnode-id="6265" href="#bb0165" name="bbb0165"><span data-dcnode-id="6266" instrument_node="">Galland and Lemel, 2008</span></a><span data-dcnode-id="6264" instrument_node="">). While working within existing value structures secures the support of the community, the social entrepreneur must also bring in new perspectives to effect positive social change. However, conflicts can arise when the social entrepreneur introduces social change goals that are in accordance with the social mission of the organization but oppose social values of the community. Recognizing the need to pay attention to the tensions that may arise from competing goals, </span><a class="workspace-trigger" data-dcnode-id="6262" href="#bb0330" name="bbb0330"><span data-dcnode-id="6263" instrument_node="">Mair et al. (2016)</span></a><span data-dcnode-id="6261" instrument_node=""> suggest a process of “scaffolding” that disguises the real aim of the social organization to sidestep these tensions. In our case, the social entrepreneur presented social change goals in the form of smaller, successive problems that could be tackled through incremental practices rather than advocating an outright transformation. As </span><a class="workspace-trigger" data-dcnode-id="6259" href="#bb0555" name="bbb0555"><span data-dcnode-id="6260" instrument_node="">Weick (1984: 40)</span></a><span data-dcnode-id="6258" instrument_node=""> points out, this reformulation of the social mission is important since “less arousing problems” make it easier to mobilize the community to overcome challenges that appear surmountable, facilitating “small wins” and shifting the focus to inputs and intermediate processes rather than outcomes. In effect, the organization brought antithetical goals closer and presented change as part of a gradual process rather than a radical transformation, and at the same time, small wins—as more “stable building blocks”—forged durable change (</span><a class="workspace-trigger" data-dcnode-id="6256" href="#bb0555" name="bbb0555"><span data-dcnode-id="6257" instrument_node="">Weick, 1984</span></a><span data-dcnode-id="6255" instrument_node="">: 44). This strategy of reformulating the social mission in line with the community emphasizes the importance of ascertaining the support of the community toward the social change (</span><a class="workspace-trigger" data-dcnode-id="6253" href="#bb0325" name="bbb0325"><span data-dcnode-id="6254" instrument_node="">Mair et al., 2012</span></a><span data-dcnode-id="6252" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6250" href="#bb0505" name="bbb0505"><span data-dcnode-id="6251" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="6249" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6247" href="#bb0535" name="bbb0535"><span data-dcnode-id="6248" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="6246" instrument_node="">).</span></p><p data-dcnode-id="6222" id="p1170"><span data-dcnode-id="6244" instrument_node="">In addition, our findings substantiate the need to uncover social values not only because they help garner the support of the community, but also because they are an important resource for entrepreneurs in effecting change, suggesting which aspects of values are problematic and contrary to mission objectives (e.g., patriarchal values) and which aspects can be leveraged (e.g., self-reliance, honor, and community values). However, despite acknowledging the importance of social values and recognizing that such assessments are challenging, few studies elaborate the ways social entrepreneurs can identify and accommodate group values (</span><a class="workspace-trigger" data-dcnode-id="6242" href="#bb0245" name="bbb0245"><span data-dcnode-id="6243" instrument_node="">Inglehart and Baker, 2000</span></a><span data-dcnode-id="6241" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6239" href="#bb0200" name="bbb0200"><span data-dcnode-id="6240" instrument_node="">Gregory and Lewis, 1999</span></a><span data-dcnode-id="6238" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6236" href="#bb0405" name="bbb0405"><span data-dcnode-id="6237" instrument_node="">Reed and Brown, 2003</span></a><span data-dcnode-id="6235" instrument_node="">). As seen in previous research, our findings support the importance of entrepreneurial embedding in local communities for uncovering social values (</span><a class="workspace-trigger" data-dcnode-id="6233" href="#bb0250" name="bbb0250"><span data-dcnode-id="6234" instrument_node="">Jack and Anderson, 2002</span></a><span data-dcnode-id="6232" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6230" href="#bb0260" name="bbb0260"><span data-dcnode-id="6231" instrument_node="">Kenter et al., 2019</span></a><span data-dcnode-id="6229" instrument_node="">). Building on this literature, our study details how deliberate and protracted practices of cooperative discernment can build legitimacy, foster community trust, and result in a robust and empathetic understanding of values (</span><a class="workspace-trigger" data-dcnode-id="6227" href="#bb0250" name="bbb0250"><span data-dcnode-id="6228" instrument_node="">Jack and Anderson, 2002</span></a><span data-dcnode-id="6226" instrument_node="">). Open-minded engagement with the community allows the organization to gain a rich, broad, and deep understanding of the local culture and its underlying values through deconstructing community practices (</span><a class="workspace-trigger" data-dcnode-id="6224" href="#bb0370" name="bbb0370"><span data-dcnode-id="6225" instrument_node="">Nussbaum and Sen, 1987</span></a><span data-dcnode-id="6223" instrument_node="">).</span></p><p data-dcnode-id="6205" id="p1175"><span data-dcnode-id="6221" instrument_node="">On the other hand, “the paradox of embedded agency” suggests that embedding in the community can result in a narrow view that constrains astute reflection and action on the part of entrepreneurs bounded by taken-for-granted structures (</span><a class="workspace-trigger" data-dcnode-id="6219" href="#bb0170" name="bbb0170"><span data-dcnode-id="6220" instrument_node="">Garud et al., 2007</span></a><span data-dcnode-id="6218" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6216" href="#bb0235" name="bbb0235"><span data-dcnode-id="6217" instrument_node="">Holm, 1995</span></a><span data-dcnode-id="6215" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6213" href="#bb0485" name="bbb0485"><span data-dcnode-id="6214" instrument_node="">Seo and Creed, 2002</span></a><span data-dcnode-id="6212" instrument_node="">: 226). In our study, while Roy appears to benefit from embedded agency by immersing himself in the local community, yet, not belonging to the community, he manages to retain ideological beliefs and a social change agenda that is not constrained by community social values and norms. In this sense, the social entrepreneur resembles a tempered radical who does not take an extreme stance against community beliefs and “works within systems, not against them” (</span><a class="workspace-trigger" data-dcnode-id="6210" href="#bb0360" name="bbb0360"><span data-dcnode-id="6211" instrument_node="">Meyerson and Scully, 1995</span></a><span data-dcnode-id="6209" instrument_node="">). Our findings show that Roy leveraged his knowledge of the system to gain the trust of the community and then gently departed from norms to challenge and change the system (</span><a class="workspace-trigger" data-dcnode-id="6207" href="#bb0360" name="bbb0360"><span data-dcnode-id="6208" instrument_node="">Meyerson and Scully, 1995</span></a><span data-dcnode-id="6206" instrument_node="">). Similarly, the interns that are encouraged to volunteer at the organization are characteristic of tempered radicals—they are immersed in the organization and a part of the local community, yet retain their own distinct values and innovative ideas for social change.</span></p></section><section data-dcnode-id="6161" id="s0140"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6198" id="st0155"><span data-dcnode-id="6203" instrument_node="">5.2</span><span data-dcnode-id="6201" instrument_node="">. </span><span data-dcnode-id="6199" instrument_node="">Implications for values work and practices</span></h3><p data-dcnode-id="6181" id="p1180"><span data-dcnode-id="6197" instrument_node="">Our study extends emerging theory on values work and brings to the fore a performative understanding of values (</span><a class="workspace-trigger" data-dcnode-id="6195" href="#bb0180" name="bbb0180"><span data-dcnode-id="6196" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="6194" instrument_node="">). To date, few studies examine the dynamic role that values play in social change processes. Our analysis shows how carefully crafted practices can be employed to expand and supplement values, thereby accomplishing social change. This perspective characterizes practices as tools for social entrepreneurs, who can strategically use practices to work with and around values to ensure social change is viewed as natural and is therefore less contested. Unlike the limited related studies that either show how value change spawns new practices (</span><a class="workspace-trigger" data-dcnode-id="6192" href="#bb0535" name="bbb0535"><span data-dcnode-id="6193" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="6191" instrument_node="">) or demonstrate that “practice-level improvisations” generate change (</span><a class="workspace-trigger" data-dcnode-id="6189" href="#bb0495" name="bbb0495"><span data-dcnode-id="6190" instrument_node="">Smets et al., 2012</span></a><span data-dcnode-id="6188" instrument_node="">), we show how purposive practices can be employed to amplify and supplement social values toward change. These novel findings support the view put forth by </span><a class="workspace-trigger" data-dcnode-id="6186" href="#bb0175" name="bbb0175"><span data-dcnode-id="6187" instrument_node="">Gehman (2020)</span></a><span data-dcnode-id="6185" instrument_node=""> that locates values in practices, indicating how practices, as socially constituted “doings and sayings,” can play a pivotal role in social change and values work (</span><a class="workspace-trigger" data-dcnode-id="6183" href="#bb0430" name="bbb0430"><span data-dcnode-id="6184" instrument_node="">Schatzki, 2002</span></a><span data-dcnode-id="6182" instrument_node="">: 73).</span></p><p data-dcnode-id="6170" id="p1185"><span data-dcnode-id="6180" instrument_node="">However, a rapid introduction of novel practices can cause tensions in the same way that the imposition of unfamiliar values can result in conflict. In this sense, the social entrepreneur with a social change mission needs to gradually introduce new practices that embody new values. Our findings resonate with the notion of “robust design” (</span><a class="workspace-trigger" data-dcnode-id="6178" href="#bb0215" name="bbb0215"><span data-dcnode-id="6179" instrument_node="">Hargadon and Douglas, 2001</span></a><span data-dcnode-id="6177" instrument_node="">) which paved the way for Thomas Edison to gain acceptance for his innovation of electric lighting by using design details that invoked the local public's familiarity with existing artifacts and social structures. Similarly, for the social entrepreneur introducing new practices and their underlying values, there is a need to draw on existing practices and social values and gradually introduce new practices and hence new values. This gradual and incremental introduction of practices while accomplishing the work of anchoring and augmenting values also resulted in the co-evolution of the organization and the surrounding community, making social change almost a “by-product of the pursuit of other goals and interests” (</span><a class="workspace-trigger" data-dcnode-id="6175" href="#bb0515" name="bbb0515"><span data-dcnode-id="6176" instrument_node="">Subašić et al., 2012</span></a><span data-dcnode-id="6174" instrument_node="">: 62). In this regard, practices account for both the stability of existing arrangements and their capacity for change (</span><a class="workspace-trigger" data-dcnode-id="6172" href="#bb0285" name="bbb0285"><span data-dcnode-id="6173" instrument_node="">Kraatz et al., 2010</span></a><span data-dcnode-id="6171" instrument_node="">).</span></p><p data-dcnode-id="6162" id="p1190"><span data-dcnode-id="6169" instrument_node="">Finally, our study has methodological implications regarding approaches to studying values. Values are ubiquitous in various literatures but are often overlooked as being “too subjective or too difficult to measure” (</span><a class="workspace-trigger" data-dcnode-id="6167" href="#bb0230" name="bbb0230"><span data-dcnode-id="6168" instrument_node="">Hitlin and Piliavin, 2004</span></a><span data-dcnode-id="6166" instrument_node="">: 359). In the same way that values hold the key to understanding practices, an examination of practices reveals underlying values. Rather than merely describing practices, such study calls for examining the organization of practices and the mechanisms through which they work, moving “from the what of practice to the how and why of practice” (</span><a class="workspace-trigger" data-dcnode-id="6164" href="#bb0175" name="bbb0175"><span data-dcnode-id="6165" instrument_node="">Gehman, 2020</span></a><span data-dcnode-id="6163" instrument_node="">: 113).</span></p></section></section><section data-dcnode-id="6145" id="s0145"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6154" id="st0160"><span data-dcnode-id="6159" instrument_node="">6</span><span data-dcnode-id="6157" instrument_node="">. </span><span data-dcnode-id="6155" instrument_node="">Concluding remarks</span></h2><p data-dcnode-id="6146" id="p1195"><span data-dcnode-id="6153" instrument_node="">With this research, we aim to develop scholarship on social entrepreneurship and advance practical knowledge for social enterprises engaged in addressing societal challenges. We show how purposive practices offer an important mechanism for social entrepreneurs, allowing them to navigate between antithetical values and catalyze deep-level social change (</span><a class="workspace-trigger" data-dcnode-id="6151" href="#bb0505" name="bbb0505"><span data-dcnode-id="6152" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="6150" instrument_node="">). In our value augmentation process model, practices do the work of values and mediate between communally established social values of tradition and modern values of gender equality (</span><a class="workspace-trigger" data-dcnode-id="6148" href="#bb0180" name="bbb0180"><span data-dcnode-id="6149" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="6147" instrument_node="">). Unlike past research, we present a process of social change that works within existing values, suggesting a more robust transformation that is likely to endure, and at the same time, reduces conflict. Future research could extend our findings to examine values-laden practices across organizational levels and between different stakeholder groups.</span></p></section><section data-dcnode-id="6140" id="s0150"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6143" id="st0165"><span data-dcnode-id="6144" instrument_node="">Declaration of competing interests</span></h2><p data-dcnode-id="6141" id="p1200"><span data-dcnode-id="6142" instrument_node="">The authors declare that they have no known competing financial interests or personal relationships that could have appeared to influence the work reported in this paper.</span></p></section></div><section data-dcnode-id="6134" id="ac0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6137" id="st0175"><span data-dcnode-id="6138" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="6135" id="p1220"><span data-dcnode-id="6136" instrument_node="">For suggestions on earlier drafts, we would like to thank Frank den Hond, Dean Shepherd, Virpi Sorsa, Sarah Soule, and Janne Tienari. For this paper, we thank the field editor, Joel Gehman, and three anonymous reviewers, for their extremely helpful insights, comments, and guidance throughout the review process.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="6129"><button class="button button-anchor" data-dcnode-id="6130" type="button"><span class="button-text" data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="6128"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="386" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="387" id="bs0005"><dl class="references" data-dcnode-id="388" id="reference-links-bs0005"><dt class="label" data-dcnode-id="6123"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="6124" href="#bbb0020" id="ref-id-bb0020"><span data-dcnode-id="6125" instrument_node="">Alvesson and Kärreman, 2007</span></a></dt><dd class="reference" data-dcnode-id="6068" id="rf0015"><div class="contribution" data-dcnode-id="6106"><span data-dcnode-id="6122" instrument_node="">M.</span><span data-dcnode-id="6120" instrument_node=""> </span><span data-dcnode-id="6118" instrument_node="">Alvesson</span><span data-dcnode-id="6116" instrument_node="">, </span><span data-dcnode-id="6114" instrument_node="">D.</span><span data-dcnode-id="6112" instrument_node=""> </span><span data-dcnode-id="6110" instrument_node="">Kärreman</span><div data-dcnode-id="6107" id="ref-id-rf0015"><strong class="title" data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Constructing mystery: empirical matters in theory development</span></strong></div></div><div class="host" data-dcnode-id="6080"><sp
