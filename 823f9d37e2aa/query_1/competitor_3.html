0755" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="380" id="citing-articles-article0-title"><span data-dcnode-id="381" instrument_node="">Alternative investing as brokering: The embedding process of a Social Impact Bond model in a local context</span></h3></a><div class="article-source ellipsis" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">2022, Journal of Business Venturing Insights</span></div></div><div class="buttons" data-dcnode-id="370"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="371" type="button"><span class="button-link-text" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="372" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="373"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="365"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="366" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="367"><p data-dcnode-id="368" id="abspara0010"><span data-dcnode-id="369" instrument_node="">Social Impact Bonds (SIBs) are gaining traction as a research topic. Using a longitudinal case study of a Norwegian social venture - Nature Magic - funded through a SIB model, this article explores the embedding process of a SIB model into a local context – diverging from previous research focused on empirical cases from the UK and USA and refining the social aspects of SIBs. We show that the SIB model is embedded through three processes: 1) cultivating opportunity; 2) pulling together; and 3) fostering experimentation and ‘mutation’. We find that these embedding processes were fostered through developing and activating bonding and bridging social capital. This study also extends our understanding of alternative investing by theorizing it as brokering. We find that social investors engage in brokering processes in facilitating collaboration between typically disconnected spheres - such as social ventures and municipalities - through these embedding processes.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="343"><div class="sub-heading" data-dcnode-id="358"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296321008481" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="362" id="citing-articles-article1-title"><span data-dcnode-id="363" instrument_node="">At the intersection of tourism social entrepreneurship and empathy: Development and validation of an empathy scale</span></h3></a><div class="article-source ellipsis" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">2022, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="352"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="353" type="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="344"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="345" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="346"><p data-dcnode-id="347" id="sp0010"><span data-dcnode-id="351" instrument_node="">The main purpose of the present study is to develop and validate a theoretically sound and empirically rigorous measure of cultural empathy, entitled Tourism Social Entrepreneurial Scale of Ethnocultural Empathy (abbreviated as TSE-SEE). To this end, both qualitative and quantitative approaches to data collection and analysis were employed based on four complementary and independent studies and samples (total </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">n</span></em><span data-dcnode-id="348" instrument_node="">&nbsp;=&nbsp;1182) from different sectors of the tourism industry. The final refined TSE-EES encompasses 25 items and four dimensions. The results demonstrated the validity and reliability of the TSE-SSE in China, Iran, and Poland. The TSE-SEE can be considered, among others, a diagnostic instrument for evaluating the impact of social entrepreneurship education programs and its application may prove effective means of developing emotional skills in the field of tourism social entrepreneurship.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="316"><div class="sub-heading" data-dcnode-id="337"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352673421000482" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="341" id="citing-articles-article2-title"><span data-dcnode-id="342" instrument_node="">The promise of entrepreneurial passion to advance social entrepreneurship research</span></h3></a><div class="article-source ellipsis" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">2021, Journal of Business Venturing Insights</span></div></div><div class="buttons" data-dcnode-id="331"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="332" type="button"><span class="button-link-text" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="333" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="334"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="317"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="318" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="319"><p data-dcnode-id="320" id="abspara0010"><span data-dcnode-id="330" instrument_node="">This article aims to advance the theoretical debate on the role of </span><em data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">entrepreneurial passion</span></em><span data-dcnode-id="327" instrument_node=""> and paradoxical </span><em data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">entrepreneurial interests</span></em><span data-dcnode-id="324" instrument_node="">––two influential concepts of entrepreneurship that have received little empirical validation so far––in predicting social entrepreneurial intention. Drawing on the literature on entrepreneurial passion and pecuniary vs. non-pecuniary interests in entrepreneurship, in particular the tension between money ethics, meaning in life, and public service motivation, we collected survey data from young people who were at the career choice contemplation stage (</span><em data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">N</span></em><span data-dcnode-id="321" instrument_node="">&nbsp;=&nbsp;1021) to test a model of social entrepreneurial intention. Structural equation modeling and mediation analyses supported the tested model. This article contributes to the literature by demonstrating the centrality of entrepreneurial passion in predicting social entrepreneurial intention and the complex role of pecuniary and non-pecuniary interests in the relationships.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="298"><div class="sub-heading" data-dcnode-id="310"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214629621002462" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="314" id="citing-articles-article3-title"><span data-dcnode-id="315" instrument_node="">Empowerment or employment? Uncovering the paradoxes of social entrepreneurship for women via Husk Power Systems in rural North India</span></h3></a><div class="article-source ellipsis" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">2021, Energy Research and Social Science</span></div></div><div class="buttons" data-dcnode-id="304"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="305" type="button"><span class="button-link-text" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="306" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="307"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="299"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="300" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="301"><p data-dcnode-id="302" id="sp0005"><span data-dcnode-id="303" instrument_node="">Men continue to dominate the supply-side narratives of energy access projects, leaving an unexplored gap in gendered organizations. To fill this gap, the article utilises interviews with women workers to consider their lived experience working for an energy access-based organisation. Through the use of narrative analysis, this study highlights the importance of socio-cultural contextualisation of social entrepreneurial activities and social missions. It takes a persuasive case-study approach to analysing Husk Power Systems (HPS), which operates primarily in Bihar, India. HPS, a mini grid-based social enterprise, began its operations in Bihar in 2007 with the goal of ameliorating rural Bihar’s energy access problems and secondarily, empowering women through employment opportunities. Drawing on the concepts of women’s empowerment, social inequalities, and intersectionality, this article argues that although HPS provides formal employment opportunities, its presence has not secured long-lasting women’s empowerment in Bihar. As a social enterprise, HPS has limited capacity to reform social inequalities. Although HPS guarantees local job creation, we underscore further exploration of the intersectional dimensions influencing social enterprises’ energy access business operations’ longevity and impact, including those of local systems of power, caste, gender, and class.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="287"><div class="sub-heading" data-dcnode-id="292"><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/S0733-558X20220000079003" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="296" id="citing-articles-article4-title"><span data-dcnode-id="297" instrument_node="">TACKLING GRAND CHALLENGES COLLABORATIVELY: THE ROLE OF VALUE-DRIVEN SENSEGIVING</span></h3></a><div class="article-source ellipsis" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">2022, Research in the Sociology of Organizations</span></div></div><div class="buttons" data-dcnode-id="291"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="288"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="289" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="290"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="276"><div class="sub-heading" data-dcnode-id="281"><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/00218863211033097" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="285" id="citing-articles-article5-title"><span data-dcnode-id="286" instrument_node="">Reflecting Backward to Project Forward: Refocusing on Values in Organizational Change</span></h3></a><div class="article-source ellipsis" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">2021, Journal of Applied Behavioral Science</span></div></div><div class="buttons" data-dcnode-id="280"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="277"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="278" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="279"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85096858866%26md5%3D88124487f33eb149fe7ee2a9a8c114b7" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="273" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="274"></path></svg><span class="button-alternative-text" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="240"><dl class="footnote" data-dcnode-id="258"><dt class="footnote-label" data-dcnode-id="262"><sup data-dcnode-id="263"><a data-dcnode-id="264" href="#bfn0005"><span data-dcnode-id="265" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="259"><p data-dcnode-id="260" id="np0015"><span data-dcnode-id="261" instrument_node="">The Internet Archives, a 501(c) (3) non-profit, is a digital library of internet sites and other cultural artifacts in digital form beginning in 1996. The Barefoot College website forms part of these archives.</span></p></dd></dl><dl class="footnote" data-dcnode-id="241"><dt class="footnote-label" data-dcnode-id="254"><sup data-dcnode-id="255"><a data-dcnode-id="256" href="#bfn0010"><span data-dcnode-id="257" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="242"><p data-dcnode-id="243" id="np0020"><span data-dcnode-id="253" instrument_node="">The term co-opting should not be confused with Selznick's use of the term “co-optation” (</span><a class="workspace-trigger" data-dcnode-id="251" href="#bb0470" name="bbb0470"><span data-dcnode-id="252" instrument_node="">Selznick, 1949</span></a><span data-dcnode-id="250" instrument_node="">), which is a political process of manipulating and managing opposition. We use the term co-opting positively to indicate practices that served to secure the trust and participation of the community. A similar usage of “co-opting practices” can be found in </span><a class="workspace-trigger" data-dcnode-id="248" href="#bb0110" name="bbb0110"><span data-dcnode-id="249" instrument_node="">Chambers (1994)</span></a><span data-dcnode-id="247" instrument_node=""> (to get local people to participate in “our” project) and in </span><a class="workspace-trigger" data-dcnode-id="245" href="#bb0390" name="bbb0390"><span data-dcnode-id="246" instrument_node="">Prahalad and Ramaswamy (2004)</span></a><span data-dcnode-id="244" instrument_node=""> (to get consumers to jointly develop products and become co-creators of content).</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 The Authors. Published by Elsevier Inc.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcnode-id="205"><div class="sub-heading" data-dcnode-id="221"><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?
