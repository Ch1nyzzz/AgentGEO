</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0050&quot;>Prior research on social entrepreneurship highlights the role and importance of values in managing change, yet few studies examine processes of managing values to achieve social change. Through a longitudinal case study of the social organization Barefoot College, we explored how a social entrepreneur navigated conflicting values to address issues of gender inequality and effect social change. We found that the social entrepreneur engaged in values-related work, purposively interpreting and enacting values-laden practices to bring about a quiet transformation within the community. In our resulting value augmentation model, we capture a process that anchors and amplifies social values, rather than replaces them, and with this model, we develop theory on values work and sustainable social change.</p></div></div></div>" data-dcnode-id="8961" lang="en" name="citation_abstract"><span data-dcnode-id="8960" instrument_node="">

ass="button-text" data-dcnode-id="8334"><span data-dcnode-id="8335" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="8322" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="8323" id="export-citation-popover"><div data-dcnode-id="8324" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="8325" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="8328" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="8329" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="8326"><span data-dcnode-id="8327" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="8315" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="8318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jbusvent.2020.106064" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8319" instrument_node="">https://doi.org/10.1016/j.jbusvent.2020.106064</span></a><a class="rights-and-content" data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0883902620306728%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8317" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="8306"><div class="License" data-dcnode-id="8310"><span data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="8311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8312" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="8307"><span class="access-indicator" data-dcnode-id="8309"></span><span data-dcnode-id="8308" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="8305"></section><section class="ReferencedArticles" data-dcnode-id="8304"></section><div class="PageDivider" data-dcnode-id="8303"></div><div class="Abstracts u-font-serif" data-dcnode-id="8256" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="8263" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8301"><span data-dcnode-id="8302" instrument_node="">Highlights</span></h2><div data-dcnode-id="8264" id="as0010"><p data-dcnode-id="8265" id="sp0055"></p><dl class="list" data-dcnode-id="8266"><dt class="list-label" data-dcnode-id="8299"><span data-dcnode-id="8300" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8296"><p data-dcnode-id="8297" id="p0725"><span data-dcnode-id="8298" instrument_node="">Our longitudinal case study of Barefoot College illustrates a process of transformative and non-violent social change.</span></p></dd><dt class="list-label" data-dcnode-id="8294"><span data-dcnode-id="8295" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8291"><p data-dcnode-id="8292" id="p0730"><span data-dcnode-id="8293" instrument_node="">We show how a social enterprise works with community values augmenting values of tradition with values of gender equality.</span></p></dd><dt class="list-label" data-dcnode-id="8289"><span data-dcnode-id="8290" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8277"><p data-dcnode-id="8278" id="p0735"><span data-dcnode-id="8288" instrument_node="">Our value augmentation process model anchors and augments values through practices of </span><em data-dcnode-id="8286"><span data-dcnode-id="8287" instrument_node="">co-opting</span></em><span data-dcnode-id="8285" instrument_node="">,&nbsp;</span><em data-dcnode-id="8283"><span data-dcnode-id="8284" instrument_node="">clustering</span></em><span data-dcnode-id="8282" instrument_node="">, and&nbsp;</span><em data-dcnode-id="8280"><span data-dcnode-id="8281" instrument_node="">coalescing</span></em><span data-dcnode-id="8279" instrument_node="">.</span></p></dd><dt class="list-label" data-dcnode-id="8275"><span data-dcnode-id="8276" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8272"><p data-dcnode-id="8273" id="p0740"><span data-dcnode-id="8274" instrument_node="">We present practices as a mechanism for social entrepreneurs to navigate antithetical values and enable social change.</span></p></dd><dt class="list-label" data-dcnode-id="8270"><span data-dcnode-id="8271" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8267"><p data-dcnode-id="8268" id="p0745"><span data-dcnode-id="8269" instrument_node="">Our research develops theory on proactive processes of social change and contributes to a performative view of values.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8257" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">Abstract</span></h2><div data-dcnode-id="8258" id="as0005"><p data-dcnode-id="8259" id="sp0050"><span data-dcnode-id="8260" instrument_node="">Prior research on social entrepreneurship highlights the role and importance of values in managing change, yet few studies examine processes of managing values to achieve social change. Through a longitudinal case study of the social organization Barefoot College, we explored how a social entrepreneur navigated conflicting values to address issues of gender inequality and effect social change. We found that the social entrepreneur engaged in values-related work, purposively interpreting and enacting values-laden practices to bring about a quiet transformation within the community. In our resulting value augmentation model, we capture a process that anchors and amplifies social values, rather than replaces them, and with this model, we develop theory on values work and sustainable social change.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8233" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8245"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0883902620306716"><svg class="icon icon-navigate-left" data-dcnode-id="8254" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8255"></path></svg><span class="button-alternative-text" data-dcnode-id="8247"><strong data-dcnode-id="8252"><span data-dcnode-id="8253" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8250"><span data-dcnode-id="8251" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8248"><span data-dcnode-id="8249" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8234"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S088390262030673X"><span class="button-alternative-text" data-dcnode-id="8238"><strong data-dcnode-id="8243"><span data-dcnode-id="8244" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8241"><span data-dcnode-id="8242" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8239"><span data-dcnode-id="8240" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8236" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8237"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8214"><div class="keywords-section" data-dcnode-id="8215" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8228" id="kw0005"><span data-dcnode-id="8229" id="tx0010"><span data-dcnode-id="8230" instrument_node="">Social entrepreneurship</span></span></div><div class="keyword" data-dcnode-id="8225" id="kw0010"><span data-dcnode-id="8226" id="tx0015"><span data-dcnode-id="8227" instrument_node="">Values work</span></span></div><div class="keyword" data-dcnode-id="8222" id="kw0015"><span data-dcnode-id="8223" id="tx0020"><span data-dcnode-id="8224" instrument_node="">Practices</span></span></div><div class="keyword" data-dcnode-id="8219" id="kw0020"><span data-dcnode-id="8220" id="tx0025"><span data-dcnode-id="8221" instrument_node="">Social change</span></span></div><div class="keyword" data-dcnode-id="8216" id="kw0025"><span data-dcnode-id="8217" id="tx0030"><span data-dcnode-id="8218" instrument_node="">Gender equality</span></span></div></div></div><span data-dcnode-id="8213" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6133" id="body"><div data-dcnode-id="6139"><section data-dcnode-id="8153" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8211" id="st0020"><span data-dcnode-id="8212" instrument_node="">Executive summary</span></h2><p data-dcnode-id="8179" id="p0750"><span data-dcnode-id="8210" instrument_node="">Social entrepreneurship focuses on resolving societal problems and driving social change (</span><a class="workspace-trigger" data-dcnode-id="8208" href="#bb0140" name="bbb0140"><span data-dcnode-id="8209" instrument_node="">Dees, 1998</span></a><span data-dcnode-id="8207" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8205" href="#bb0565" name="bbb0565"><span data-dcnode-id="8206" instrument_node="">Williams and Shepherd, 2016</span></a><span data-dcnode-id="8204" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8202" href="#bb0575" name="bbb0575"><span data-dcnode-id="8203" instrument_node="">Zahra and Wright, 2016</span></a><span data-dcnode-id="8201" instrument_node="">). In social entrepreneurship settings, the social entrepreneur is often confronted with a paradox: he or she must align organizational values with existing community values to mobilize support for change while simultaneously stimulating the re-evaluation of these very values to trigger progressive, beneficial societal change (</span><a class="workspace-trigger" data-dcnode-id="8199" href="#bb0330" name="bbb0330"><span data-dcnode-id="8200" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="8198" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8196" href="#bb0345" name="bbb0345"><span data-dcnode-id="8197" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="8195" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8193" href="#bb0460" name="bbb0460"><span data-dcnode-id="8194" instrument_node="">Seelos et al., 2011</span></a><span data-dcnode-id="8192" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8190" href="#bb0545" name="bbb0545"><span data-dcnode-id="8191" instrument_node="">Venkataraman, 2004</span></a><span data-dcnode-id="8189" instrument_node="">). Although scholars acknowledge the role and importance of values in the change process, few studies pay attention to processes of managing and actively negotiating values during social change efforts (</span><a class="workspace-trigger" data-dcnode-id="8187" href="#bb0025" name="bbb0025"><span data-dcnode-id="8188" instrument_node="">Alvord et al., 2004</span></a><span data-dcnode-id="8186" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8184" href="#bb0030" name="bbb0030"><span data-dcnode-id="8185" instrument_node="">Amis et al., 2002</span></a><span data-dcnode-id="8183" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8181" href="#bb0285" name="bbb0285"><span data-dcnode-id="8182" instrument_node="">Kraatz et al., 2010</span></a><span data-dcnode-id="8180" instrument_node="">).</span></p><p data-dcnode-id="8162" id="p0755"><span data-dcnode-id="8178" instrument_node="">We address this gap through a longitudinal case study of Barefoot College, a social enterprise in India that has successfully navigated conflicting social values and effected social change. We uncovered a proactive process of retaining and amplifying social values of tradition in the community to accommodate modern values of gender equality. Underpinning this process was the impactful role of strategic values work—the work involved in actions and practices that “provoke and perform values” and through which “abstract values come to be embodied and manifest” (</span><a class="workspace-trigger" data-dcnode-id="8176" href="#bb0180" name="bbb0180"><span data-dcnode-id="8177" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="8175" instrument_node="">: 102; </span><a class="workspace-trigger" data-dcnode-id="8173" href="#bb0400" name="bbb0400"><span data-dcnode-id="8174" instrument_node="">Raynard et al., 2020</span></a><span data-dcnode-id="8172" instrument_node="">). The social entrepreneur behind Barefoot College was instrumental in </span><em data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">anchoring</span></em><span data-dcnode-id="8169" instrument_node=""> and </span><em data-dcnode-id="8167"><span data-dcnode-id="8168" instrument_node="">augmenting</span></em><span data-dcnode-id="8166" instrument_node=""> social values of tradition through purposefully enacted practices that mediated between antithetical values</span><em data-dcnode-id="8164"><span data-dcnode-id="8165" instrument_node="">.</span></em><span data-dcnode-id="8163" instrument_node=""> This process helped the social enterprise co-opt existing community values and ground its progressive work toward social change in understandings that were at once novel and expansive while simultaneously being familiar.</span></p><p data-dcnode-id="8154" id="p0760"><span data-dcnode-id="8161" instrument_node="">Our study extends theory on social change and values work, suggesting practical alternatives for social entrepreneurs looking to address culturally rooted, entrenched societal problems. Unlike the majority of social entrepreneurship literature that centers on outcomes, we explicate a process of social change that overcomes societal challenges, as illustrated in our process model. Importantly, instead of transforming or replacing existing social values, we show how an organization can work within existing value structures to effect sustainable and uncontested social change (</span><a class="workspace-trigger" data-dcnode-id="8159" href="#bb0335" name="bbb0335"><span data-dcnode-id="8160" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="8158" instrument_node="">). Contrasting with studies that usually present the effects of unplanned and unintended changes in practices on values, our findings show how carefully crafted practices can expand and supplement values. As such, our study takes a dynamic view of values and builds theory in the emerging area of values work (</span><a class="workspace-trigger" data-dcnode-id="8156" href="#bb0180" name="bbb0180"><span data-dcnode-id="8157" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="8155" instrument_node="">). This perspective characterizes values-laden practices as resources for the social entrepreneur who can use them to enable social change. Recognizing the mediating role of values in supporting or inhibiting social change, our study more generally highlights the need for social entrepreneurs to work with values to bring about sustainable and non-violent social change.</span></p></section><section data-dcnode-id="7951" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8147" id="st0025"><span data-dcnode-id="8152" instrument_node="">1</span><span data-dcnode-id="8150" instrument_node="">. </span><span data-dcnode-id="8148" instrument_node="">Introduction</span></h2><p data-dcnode-id="8091" id="p0770"><span data-dcnode-id="8146" instrument_node="">Social entrepreneurship is characterized by a commitment to addressing societal problems and stimulating social change in accordance with the organization's social mission (</span><a class="workspace-trigger" data-dcnode-id="8144" href="#bb0025" name="bbb0025"><span data-dcnode-id="8145" instrument_node="">Alvord et al., 2004</span></a><span data-dcnode-id="8143" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8141" href="#bb0140" name="bbb0140"><span data-dcnode-id="8142" instrument_node="">Dees, 1998</span></a><span data-dcnode-id="8140" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8138" href="#bb0225" name="bbb0225"><span data-dcnode-id="8139" instrument_node="">Hervieux and Voltan, 2018</span></a><span data-dcnode-id="8137" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8135" href="#bb0565" name="bbb0565"><span data-dcnode-id="8136" instrument_node="">Williams and Shepherd, 2016</span></a><span data-dcnode-id="8134" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8132" href="#bb0575" name="bbb0575"><span data-dcnode-id="8133" instrument_node="">Zahra and Wright, 2016</span></a><span data-dcnode-id="8131" instrument_node="">). Accomplishing social change involves stimulating large-scale transformation in social structures—patterns of social action and interaction—in a society or group (</span><a class="workspace-trigger" data-dcnode-id="8129" href="#bb0490" name="bbb0490"><span data-dcnode-id="8130" instrument_node="">Sheldon and Moore, 1968</span></a><span data-dcnode-id="8128" instrument_node="">). Scholars tend to agree that such behavioral patterns usually represent people's underlying values with people behaving according to their values either due to a need for consistency between their personal beliefs and actions, or because value-consistent action is rewarding (</span><a class="workspace-trigger" data-dcnode-id="8126" href="#bb0055" name="bbb0055"><span data-dcnode-id="8127" instrument_node="">Bardi and Schwartz, 2003</span></a><span data-dcnode-id="8125" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8123" href="#bb0275" name="bbb0275"><span data-dcnode-id="8124" instrument_node="">Kniss, 1988</span></a><span data-dcnode-id="8122" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8120" href="#bb0355" name="bbb0355"><span data-dcnode-id="8121" instrument_node="">McMichael, 2016</span></a><span data-dcnode-id="8119" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8117" href="#bb0410" name="bbb0410"><span data-dcnode-id="8118" instrument_node="">Rokeach, 1973</span></a><span data-dcnode-id="8116" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8114" href="#bb0560" name="bbb0560"><span data-dcnode-id="8115" instrument_node="">Williams Jnr, 1979</span></a><span data-dcnode-id="8113" instrument_node="">). In the case of social values, people seek to behave according to the norms of the social system to which they belong, suggesting that a change in these values will lead to a change in these people's behavior (</span><a class="workspace-trigger" data-dcnode-id="8111" href="#bb0335" name="bbb0335"><span data-dcnode-id="8112" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="8110" instrument_node="">). Thus, social change and social values are intertwined. Several studies show that values shape, legitimate, and embed change, thereby both enabling and constraining change efforts (</span><a class="workspace-trigger" data-dcnode-id="8108" href="#bb0030" name="bbb0030"><span data-dcnode-id="8109" instrument_node="">Amis et al., 2002</span></a><span data-dcnode-id="8107" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8105" href="#bb0145" name="bbb0145"><span data-dcnode-id="8106" instrument_node="">DiMaggio, 1994</span></a><span data-dcnode-id="8104" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8102" href="#bb0365" name="bbb0365"><span data-dcnode-id="8103" instrument_node="">Ney et al., 2014</span></a><span data-dcnode-id="8101" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8099" href="#bb0450" name="bbb0450"><span data-dcnode-id="8100" instrument_node="">Schwartz, 2015</span></a><span data-dcnode-id="8098" instrument_node="">). However, to date, research on social change has tended to focus on outcomes related to behavior modifications rather than on the more deep-seated change in beliefs and values that must accompany sustainable societal transformation (</span><a class="workspace-trigger" data-dcnode-id="8096" href="#bb0505" name="bbb0505"><span data-dcnode-id="8097" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="8095" instrument_node="">). Therefore, in this paper, we examine processes that negotiate and reconcile heterogeneous values at the core of what </span><a class="workspace-trigger" data-dcnode-id="8093" href="#bb0505" name="bbb0505"><span data-dcnode-id="8094" instrument_node="">Stephan et al. (2016: 1250)</span></a><span data-dcnode-id="8092" instrument_node=""> term “deep-level” social change—that is, change based on “altered beliefs, attitudes, and meanings.”</span></p><p data-dcnode-id="8029" id="p0775"><span data-dcnode-id="8090" instrument_node="">Although research on social change recognizes the role of values in managing change, few studies examine how values themselves are negotiated during change processes (</span><a class="workspace-trigger" data-dcnode-id="8088" href="#bb0025" name="bbb0025"><span data-dcnode-id="8089" instrument_node="">Alvord et al., 2004</span></a><span data-dcnode-id="8087" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8085" href="#bb0030" name="bbb0030"><span data-dcnode-id="8086" instrument_node="">Amis et al., 2002</span></a><span data-dcnode-id="8084" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8082" href="#bb0095" name="bbb0095"><span data-dcnode-id="8083" instrument_node="">de Bruin et al., 2017</span></a><span data-dcnode-id="8081" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8079" href="#bb0180" name="bbb0180"><span data-dcnode-id="8080" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="8078" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8076" href="#bb0285" name="bbb0285"><span data-dcnode-id="8077" instrument_node="">Kraatz et al., 2010</span></a><span data-dcnode-id="8075" instrument_node="">). Attention to social values is vital for social entrepreneurs, who must “craft a vision for divergent change” and oftentimes need to shift the mindset of targeted groups toward a different understanding as encoded in their organizational missions (</span><a class="workspace-trigger" data-dcnode-id="8073" href="#bb0030" name="bbb0030"><span data-dcnode-id="8074" instrument_node="">Amis et al., 2002</span></a><span data-dcnode-id="8072" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8070" href="#bb0075" name="bbb0075"><span data-dcnode-id="8071" instrument_node="">Battilana et al., 2009</span></a><span data-dcnode-id="8069" instrument_node="">: 79; </span><a class="workspace-trigger" data-dcnode-id="8067" href="#bb0140" name="bbb0140"><span data-dcnode-id="8068" instrument_node="">Dees, 1998</span></a><span data-dcnode-id="8066" instrument_node="">). In fact, </span><a class="workspace-trigger" data-dcnode-id="8064" href="#bb0315" name="bbb0315"><span data-dcnode-id="8065" instrument_node="">Mair and Martí (2006)</span></a><span data-dcnode-id="8063" instrument_node=""> contend that social entrepreneurs' ability to change norms may be even more significant than the social problems they set out to address. However, attempts to alter prevailing social structures by introducing alternate worldviews can often take the form of confrontational approaches since they challenge the dominant norms and values of communities and larger societies (</span><a class="workspace-trigger" data-dcnode-id="8061" href="#bb0035" name="bbb0035"><span data-dcnode-id="8062" instrument_node="">Bakker et al., 2013</span></a><span data-dcnode-id="8060" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8058" href="#bb0325" name="bbb0325"><span data-dcnode-id="8059" instrument_node="">Mair et al., 2012</span></a><span data-dcnode-id="8057" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8055" href="#bb0350" name="bbb0350"><span data-dcnode-id="8056" instrument_node="">McCright and Dunlap, 2000</span></a><span data-dcnode-id="8054" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8052" href="#bb0535" name="bbb0535"><span data-dcnode-id="8053" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="8051" instrument_node="">). Previous research suggests that social entrepreneurs can circumvent such tension by presenting novel perspectives in a manner that coheres with stakeholders' and beneficiaries' familiar beliefs and values, thus making change efforts more palatable and persuasive (</span><a class="workspace-trigger" data-dcnode-id="8049" href="#bb0045" name="bbb0045"><span data-dcnode-id="8050" instrument_node="">Bansal, 2003</span></a><span data-dcnode-id="8048" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8046" href="#bb0125" name="bbb0125"><span data-dcnode-id="8047" instrument_node="">Cornelissen et al., 2011</span></a><span data-dcnode-id="8045" instrument_node="">). This situation, however, presents a paradox to social entrepreneurs: on the one hand, they must stimulate a re-evaluation of social values to trigger progressive and beneficial change, and on the other hand, their change efforts need to resonate with those very same values. This conundrum befalls many social enterprises, yet there are few empirical or theoretical studies exploring how such processes of social change are enacted by social entrepreneurs (</span><a class="workspace-trigger" data-dcnode-id="8043" href="#bb0330" name="bbb0330"><span data-dcnode-id="8044" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="8042" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8040" href="#bb0345" name="bbb0345"><span data-dcnode-id="8041" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="8039" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8037" href="#bb0385" name="bbb0385"><span data-dcnode-id="8038" instrument_node="">Perrini et al., 2010</span></a><span data-dcnode-id="8036" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8034" href="#bb0460" name="bbb0460"><span data-dcnode-id="8035" instrument_node="">Seelos et al., 2011</span></a><span data-dcnode-id="8033" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8031" href="#bb0505" name="bbb0505"><span data-dcnode-id="8032" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="8030" instrument_node="">).</span></p><p data-dcnode-id="8015" id="p0780"><span data-dcnode-id="8028" instrument_node="">We address this puzzle through a longitudinal case study of Barefoot College, a social enterprise in India. The organization successfully tackled the problem of gender inequality in a patriarchal society by nurturing a quiet yet radical transformation in the organization and its surrounding community. Specifically, in investigating this phenomenon, we asked, </span><em data-dcnode-id="8026"><span data-dcnode-id="8027" instrument_node="">How does a social enterprise work with and around entrenched community values as part of its social mission to create progressive social change</span></em><span data-dcnode-id="8025" instrument_node="">? The case study method allowed us to study social change in a real-life setting (</span><a class="workspace-trigger" data-dcnode-id="8023" href="#bb0570" name="bbb0570"><span data-dcnode-id="8024" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="8022" instrument_node="">) and provided a grounded, cultural perspective that was critical to uncovering and interpreting values work given the communal embeddedness of social values and their practices (</span><a class="workspace-trigger" data-dcnode-id="8020" href="#bb0185" name="bbb0185"><span data-dcnode-id="8021" instrument_node="">Gehman et al., 2019</span></a><span data-dcnode-id="8019" instrument_node="">). For instance, since practices tend to reflect and reinforce social values, we found that practices of women not handling finances was both a reproduction of patriarchal values and at the same time served to strengthen these very values. Furthermore, our case study of a social venture in a small-scale setting was ideal for theory building since the site afforded opportunities to minutely observe a complex problem in situ and examine socially relevant solutions (</span><a class="workspace-trigger" data-dcnode-id="8017" href="#bb0330" name="bbb0330"><span data-dcnode-id="8018" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="8016" instrument_node="">). Based on primary and secondary data about the case, we uncovered a process of social change whereby the entrepreneur garnered the support of the community through a process of retaining and amplifying social values of tradition to accommodate modern values of gender equality.</span></p><p data-dcnode-id="7983" id="p0785"><span data-dcnode-id="8014" instrument_node="">Underpinning this change process was the expansive role of strategic </span><em data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">values work</span></em><span data-dcnode-id="8011" instrument_node="">—the work involved in practices that “provoke and perform values” and through which “abstract values come to be embodied and manifest”—in the organization and, through its work, in the community (</span><a class="workspace-trigger" data-dcnode-id="8009" href="#bb0180" name="bbb0180"><span data-dcnode-id="8010" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="8008" instrument_node="">: 102; </span><a class="workspace-trigger" data-dcnode-id="8006" href="#bb0400" name="bbb0400"><span data-dcnode-id="8007" instrument_node="">Raynard et al., 2020</span></a><span data-dcnode-id="8005" instrument_node="">). Values work is especially germane to the study of social entrepreneurship with its normative orientation manifest in programs that stimulate positive social change, and calls for an understanding of values as an end in themselves (</span><a class="workspace-trigger" data-dcnode-id="8003" href="#bb0330" name="bbb0330"><span data-dcnode-id="8004" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="8002" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8000" href="#bb0475" name="bbb0475"><span data-dcnode-id="8001" instrument_node="">Selznick, 1957</span></a><span data-dcnode-id="7999" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7997" href="#bb0530" name="bbb0530"><span data-dcnode-id="7998" instrument_node="">Tsirogianni and Gaskell, 2011</span></a><span data-dcnode-id="7996" instrument_node="">). As outlined in our value augmentation process model, in our study, the social entrepreneur instituted practices of </span><em data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">co-opting, clustering</span></em><span data-dcnode-id="7993" instrument_node="">, and </span><em data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">coalescing</span></em><span data-dcnode-id="7990" instrument_node=""> to accomplish values work aimed at </span><em data-dcnode-id="7988"><span data-dcnode-id="7989" instrument_node="">anchoring</span></em><span data-dcnode-id="7987" instrument_node=""> and </span><em data-dcnode-id="7985"><span data-dcnode-id="7986" instrument_node="">augmenting</span></em><span data-dcnode-id="7984" instrument_node=""> values of tradition in and through their work. Engaging in such purposive values work, the social entrepreneur and his enterprise channeled diverse values through practices that assuaged concerns, circumvented resistance, and managed the mood of the workers and the community surrounding the enterprise.</span></p><p data-dcnode-id="7969" id="p0790"><span data-dcnode-id="7982" instrument_node="">Through our analysis, we aim to build theory in two ways. Firstly, despite growing interest in social entrepreneurship research, there are few studies on processes of transformative and positive societal change (</span><a class="workspace-trigger" data-dcnode-id="7980" href="#bb0385" name="bbb0385"><span data-dcnode-id="7981" instrument_node="">Perrini et al., 2010</span></a><span data-dcnode-id="7979" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7977" href="#bb0505" name="bbb0505"><span data-dcnode-id="7978" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="7976" instrument_node="">). We address this gap and develop theory on proactive processes of social change arising out of values work as presented in our value augmentation model. In a recent study, </span><a class="workspace-trigger" data-dcnode-id="7974" href="#bb0330" name="bbb0330"><span data-dcnode-id="7975" instrument_node="">Mair et al. (2016)</span></a><span data-dcnode-id="7973" instrument_node=""> reveal how purposive activity in the form of a social program achieved disguised goals of overcoming inequality. We build on this research, however, instead of a mechanism that transforms behavioral patterns and structures, we explicate a process that retains social values but amplifies and supplements them to accomplish change. Detailing this process, our model shows how the entrepreneur uses values-laden practices to maneuver around traditional values and make space for modern values of gender equality. In doing so, we respond to calls for research that works within existing value structures (</span><a class="workspace-trigger" data-dcnode-id="7971" href="#bb0335" name="bbb0335"><span data-dcnode-id="7972" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="7970" instrument_node="">).</span></p><p data-dcnode-id="7952" id="p0795"><span data-dcnode-id="7968" instrument_node="">Second, we contribute to a practice-based and performative view of values (</span><a class="workspace-trigger" data-dcnode-id="7966" href="#bb0180" name="bbb0180"><span data-dcnode-id="7967" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7965" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7963" href="#bb0290" name="bbb0290"><span data-dcnode-id="7964" instrument_node="">Kraatz et al., 2020</span></a><span data-dcnode-id="7962" instrument_node="">). A number of social entrepreneurship studies investigating values and practices show how the moralizing elements of values may be used to change practices (</span><a class="workspace-trigger" data-dcnode-id="7960" href="#bb0345" name="bbb0345"><span data-dcnode-id="7961" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="7959" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7957" href="#bb0535" name="bbb0535"><span data-dcnode-id="7958" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="7956" instrument_node="">). In comparison, our study is one of the first to show how carefully crafted practices can be employed to shape social values and negotiate societal change. Through our untangling of values-laden practices enabled by the social entrepreneur, our study contributes to a “performative understanding of values” and builds theory in the emerging area of values work (</span><a class="workspace-trigger" data-dcnode-id="7954" href="#bb0180" name="bbb0180"><span data-dcnode-id="7955" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7953" instrument_node="">: 84). In particular, our perspective characterizes values-infused practices as tools that social entrepreneurs can strategically use to work with and around values to achieve a more organic and uncontested form of social change. Recognizing the mediating role of values in supporting or inhibiting social change, our study more generally highlights the need for social entrepreneurs to work with values to bring about sustainable and non-violent social change.</span></p></section><section data-dcnode-id="7690" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7945" id="st0030"><span data-dcnode-id="7950" instrument_node="">2</span><span data-dcnode-id="7948" instrument_node="">. </span><span data-dcnode-id="7946" instrument_node="">Theoretical background</span></h2><p data-dcnode-id="7943" id="p0800"><span data-dcnode-id="7944" instrument_node="">Here we provide an overview of the literature framing our research including relevant findings on social entrepreneurship, societal change, social values, values work, and practices.</span></p><section data-dcnode-id="7737" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7937" id="st0035"><span data-dcnode-id="7942" instrument_node="">2.1</span><span data-dcnode-id="7940" instrument_node="">. </span><span data-dcnode-id="7938" instrument_node="">Social change and social values</span></h3><p data-dcnode-id="7899" id="p0805"><span data-dcnode-id="7936" instrument_node="">There is general agreement in the literature that social entrepreneurship is characterized by the ambition to address social problems and stimulate societal transformation (</span><a class="workspace-trigger" data-dcnode-id="7934" href="#bb0025" name="bbb0025"><span data-dcnode-id="7935" instrument_node="">Alvord et al., 2004</span></a><span data-dcnode-id="7933" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7931" href="#bb0315" name="bbb0315"><span data-dcnode-id="7932" instrument_node="">Mair and Martí, 2006</span></a><span data-dcnode-id="7930" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7928" href="#bb0580" name="bbb0580"><span data-dcnode-id="7929" instrument_node="">Zahra et al., 2009</span></a><span data-dcnode-id="7927" instrument_node="">). Studies attest to the potential of social entrepreneurship to create niche solutions designed to tackle complex and persistent problems (</span><a class="workspace-trigger" data-dcnode-id="7925" href="#bb0455" name="bbb0455"><span data-dcnode-id="7926" instrument_node="">Seelos and Mair, 2005</span></a><span data-dcnode-id="7924" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7922" href="#bb0565" name="bbb0565"><span data-dcnode-id="7923" instrument_node="">Williams and Shepherd, 2016</span></a><span data-dcnode-id="7921" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7919" href="#bb0580" name="bbb0580"><span data-dcnode-id="7920" instrument_node="">Zahra et al., 2009</span></a><span data-dcnode-id="7918" instrument_node="">). In this sense, social entrepreneurs are the “change agents in the social sector” who create systemic change and tackle the root causes of social problems (</span><a class="workspace-trigger" data-dcnode-id="7916" href="#bb0140" name="bbb0140"><span data-dcnode-id="7917" instrument_node="">Dees, 1998</span></a><span data-dcnode-id="7915" instrument_node="">: 4). Tasked with pioneering creative approaches that negotiate and embed change, social entrepreneurs must exploit resources and grapple with the factors that enable and constrain social change initiatives (</span><a class="workspace-trigger" data-dcnode-id="7913" href="#bb0135" name="bbb0135"><span data-dcnode-id="7914" instrument_node="">Dacin et al., 2010</span></a><span data-dcnode-id="7912" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7910" href="#bb0315" name="bbb0315"><span data-dcnode-id="7911" instrument_node="">Mair and Martí, 2006</span></a><span data-dcnode-id="7909" instrument_node="">). Since social change involves alterations in societal structures and arrangements, the social values that underlie community practices are important factors mediating change (</span><a class="workspace-trigger" data-dcnode-id="7907" href="#bb0345" name="bbb0345"><span data-dcnode-id="7908" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="7906" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7904" href="#bb0450" name="bbb0450"><span data-dcnode-id="7905" instrument_node="">Schwartz, 2015</span></a><span data-dcnode-id="7903" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7901" href="#bb0550" name="bbb0550"><span data-dcnode-id="7902" instrument_node="">Verplanken and Holland, 2002</span></a><span data-dcnode-id="7900" instrument_node="">).</span></p><p data-dcnode-id="7867" id="p0810"><span data-dcnode-id="7898" instrument_node="">Although values have been defined in various ways (for a review on values, and an explanation of the differences between values, ideals, attitudes, and beliefs, see </span><a class="workspace-trigger" data-dcnode-id="7896" href="#bb0230" name="bbb0230"><span data-dcnode-id="7897" instrument_node="">Hitlin and Piliavin, 2004</span></a><span data-dcnode-id="7895" instrument_node="">), they are generally conceptualized as: enduring beliefs that are ordered by relative importance (</span><a class="workspace-trigger" data-dcnode-id="7893" href="#bb3000" name="bbb3000"><span data-dcnode-id="7894" instrument_node="">Schwartz, 2012</span></a><span data-dcnode-id="7892" instrument_node="">); suggest a particular mode of conduct over another (</span><a class="workspace-trigger" data-dcnode-id="7890" href="#bb0410" name="bbb0410"><span data-dcnode-id="7891" instrument_node="">Rokeach, 1973</span></a><span data-dcnode-id="7889" instrument_node="">); and have an aspirational and normative side as “things worth having, doing, and being” (</span><a class="workspace-trigger" data-dcnode-id="7887" href="#bb0480" name="bbb0480"><span data-dcnode-id="7888" instrument_node="">Selznick, 1994</span></a><span data-dcnode-id="7886" instrument_node="">: 60). For our study, we draw on Kluckhohn's description since it encompasses groups, and define social values as the overarching principles of a group or community that orient behavior, provide a source of meaning, and suggest “modes, means, and ends of actions” (</span><a class="workspace-trigger" data-dcnode-id="7884" href="#bb0230" name="bbb0230"><span data-dcnode-id="7885" instrument_node="">Hitlin and Piliavin, 2004</span></a><span data-dcnode-id="7883" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7881" href="#bb0270" name="bbb0270"><span data-dcnode-id="7882" instrument_node="">Kluckhohn, 1951</span></a><span data-dcnode-id="7880" instrument_node="">: 395; </span><a class="workspace-trigger" data-dcnode-id="7878" href="#bb0290" name="bbb0290"><span data-dcnode-id="7879" instrument_node="">Kraatz et al., 2020</span></a><span data-dcnode-id="7877" instrument_node="">). A modification in social values must accompany social entrepreneurship efforts aimed at enhancing societal well-being to achieve deep-level positive social change (</span><a class="workspace-trigger" data-dcnode-id="7875" href="#bb0505" name="bbb0505"><span data-dcnode-id="7876" instrument_node="">Stephan et al., 2016</span></a><span data-dcnode-id="7874" instrument_node="">). Several studies discuss the ways in which values influence the change process of which two broad streams of research are particularly relevant for our study (</span><a class="workspace-trigger" data-dcnode-id="7872" href="#bb0030" name="bbb0030"><span data-dcnode-id="7873" instrument_node="">Amis et al., 2002</span></a><span data-dcnode-id="7871" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7869" href="#bb0290" name="bbb0290"><span data-dcnode-id="7870" instrument_node="">Kraatz et al., 2020</span></a><span data-dcnode-id="7868" instrument_node="">).</span></p><p data-dcnode-id="7841" id="p0815"><span data-dcnode-id="7866" instrument_node="">One research stream argues that organizations seeking to motivate change must find common ground between their values and those of the social systems within which they operate to secure trust and garner stakeholder engagement and commitment to change (</span><a class="workspace-trigger" data-dcnode-id="7864" href="#bb0150" name="bbb0150"><span data-dcnode-id="7865" instrument_node="">Dowling and Pfeffer, 1975</span></a><span data-dcnode-id="7863" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7861" href="#bb0155" name="bbb0155"><span data-dcnode-id="7862" instrument_node="">Elving, 2005</span></a><span data-dcnode-id="7860" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7858" href="#bb0220" name="bbb0220"><span data-dcnode-id="7859" instrument_node="">Henderson and Thompson, 2003</span></a><span data-dcnode-id="7857" instrument_node="">). In this view, change organizations that champion the social and cultural values of the communities they serve are able to mobilize participants. However, adhering to these values can dismiss alternate worldviews and hinder change efforts (</span><a class="workspace-trigger" data-dcnode-id="7855" href="#bb0325" name="bbb0325"><span data-dcnode-id="7856" instrument_node="">Mair et al., 2012</span></a><span data-dcnode-id="7854" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7852" href="#bb0535" name="bbb0535"><span data-dcnode-id="7853" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="7851" instrument_node="">). In effect, by aligning organizational values with community social values, social entrepreneurs may find it difficult to introduce new perspectives that oppose these very social values (</span><a class="workspace-trigger" data-dcnode-id="7849" href="#bb0235" name="bbb0235"><span data-dcnode-id="7850" instrument_node="">Holm, 1995</span></a><span data-dcnode-id="7848" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7846" href="#bb0460" name="bbb0460"><span data-dcnode-id="7847" instrument_node="">Seelos et al., 2011</span></a><span data-dcnode-id="7845" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7843" href="#bb0525" name="bbb0525"><span data-dcnode-id="7844" instrument_node="">Tobias et al., 2013</span></a><span data-dcnode-id="7842" instrument_node="">).</span></p><p data-dcnode-id="7806" id="p0820"><span data-dcnode-id="7840" instrument_node="">The other research stream underscores the importance of espousing and advancing values that align with the organization's social welfare or social change mission (</span><a class="workspace-trigger" data-dcnode-id="7838" href="#bb0120" name="bbb0120"><span data-dcnode-id="7839" instrument_node="">Cho, 2006</span></a><span data-dcnode-id="7837" instrument_node="">). In fact, </span><a class="workspace-trigger" data-dcnode-id="7835" href="#bb0210" name="bbb0210"><span data-dcnode-id="7836" instrument_node="">Haedicke (2012)</span></a><span data-dcnode-id="7834" instrument_node=""> cautions that adopting values that appear to violate an organization's social mission can be detrimental to that organization, depriving it of moral legitimacy as well as the support of important stakeholders so that organizations can end up failing to muster the support of both “the excluders and the excluded” (</span><a class="workspace-trigger" data-dcnode-id="7832" href="#bb0330" name="bbb0330"><span data-dcnode-id="7833" instrument_node="">Mair et al., 2016</span></a><span data-dcnode-id="7831" instrument_node="">: 2022; </span><a class="workspace-trigger" data-dcnode-id="7829" href="#bb0475" name="bbb0475"><span data-dcnode-id="7830" instrument_node="">Selznick, 1957</span></a><span data-dcnode-id="7828" instrument_node="">). Consequently, organizations must champion the values that align with their missions or run the risk of being seen as hypocritical by some stakeholders (</span><a class="workspace-trigger" data-dcnode-id="7826" href="#bb0080" name="bbb0080"><span data-dcnode-id="7827" instrument_node="">Besharov, 2014</span></a><span data-dcnode-id="7825" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7823" href="#bb0105" name="bbb0105"><span data-dcnode-id="7824" instrument_node="">Cha and Edmondson, 2006</span></a><span data-dcnode-id="7822" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7820" href="#bb0285" name="bbb0285"><span data-dcnode-id="7821" instrument_node="">Kraatz et al., 2010</span></a><span data-dcnode-id="7819" instrument_node="">). Notably, the inter-sectorial nature of social entrepreneurship oftentimes compels organizations to engage with diverse stakeholders and a “heterogeneity of identities, interests, cultures and values” (</span><a class="workspace-trigger" data-dcnode-id="7817" href="#bb0160" name="bbb0160"><span data-dcnode-id="7818" instrument_node="">Ferraro et al., 2015</span></a><span data-dcnode-id="7816" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7814" href="#bb0180" name="bbb0180"><span data-dcnode-id="7815" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7813" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7811" href="#bb0120" name="bbb0120"><span data-dcnode-id="7812" instrument_node="">Cho 2006: 52</span></a><span data-dcnode-id="7810" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7808" href="#bb0380" name="bbb0380"><span data-dcnode-id="7809" instrument_node="">Perrini and Vurro, 2006</span></a><span data-dcnode-id="7807" instrument_node="">). The upshot of these research streams is that on the one hand social entrepreneurs are wise to accommodate and embrace community values, whilst on the other hand they need to introduce values that present oppositional worldviews.</span></p><p data-dcnode-id="7738" id="p0825"><span data-dcnode-id="7805" instrument_node="">Scholars suggest various strategies to resolve this dichotomy, including transforming values (</span><a class="workspace-trigger" data-dcnode-id="7803" href="#bb0435" name="bbb0435"><span data-dcnode-id="7804" instrument_node="">Schultz and Zelezny, 2003</span></a><span data-dcnode-id="7802" instrument_node="">), defeating and replacing established values (</span><a class="workspace-trigger" data-dcnode-id="7800" href="#bb0075" name="bbb0075"><span data-dcnode-id="7801" instrument_node="">Battilana et al., 2009</span></a><span data-dcnode-id="7799" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7797" href="#bb0535" name="bbb0535"><span data-dcnode-id="7798" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="7796" instrument_node="">), bridging values (</span><a class="workspace-trigger" data-dcnode-id="7794" href="#bb0345" name="bbb0345"><span data-dcnode-id="7795" instrument_node="">Maurer et al., 2011</span></a><span data-dcnode-id="7793" instrument_node="">), engendering disassociation from old values, and stimulating identification with new values (</span><a class="workspace-trigger" data-dcnode-id="7791" href="#bb0040" name="bbb0040"><span data-dcnode-id="7792" instrument_node="">Balogun and Johnson, 2004</span></a><span data-dcnode-id="7790" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7788" href="#bb0400" name="bbb0400"><span data-dcnode-id="7789" instrument_node="">Raynard et al., 2020</span></a><span data-dcnode-id="7787" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7785" href="#bb0500" name="bbb0500"><span data-dcnode-id="7786" instrument_node="">Sonenshein, 2010</span></a><span data-dcnode-id="7784" instrument_node="">). Overall, for social entrepreneurs tasked with energizing and stimulating social change, it appears that prompting a shift in values is key. However, efforts to induce a shift in social values may be unsuccessful or transient due to the stability of social values and cultures that exists, having been built up over time (</span><a class="workspace-trigger" data-dcnode-id="7782" href="#bb0145" name="bbb0145"><span data-dcnode-id="7783" instrument_node="">DiMaggio, 1994</span></a><span data-dcnode-id="7781" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7779" href="#bb0335" name="bbb0335"><span data-dcnode-id="7780" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="7778" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7776" href="#bb0445" name="bbb0445"><span data-dcnode-id="7777" instrument_node="">Schwartz, 2006</span></a><span data-dcnode-id="7775" instrument_node="">). At the societal level, studies show that traditional values tend to persist despite modernization and economic development (</span><a class="workspace-trigger" data-dcnode-id="7773" href="#bb0245" name="bbb0245"><span data-dcnode-id="7774" instrument_node="">Inglehart and Baker, 2000</span></a><span data-dcnode-id="7772" instrument_node="">). Notwithstanding the persistence of social values, scholars acknowledge that systems of social values are malleable and dynamic, evolving over time as groups adapt to changes in their environments (</span><a class="workspace-trigger" data-dcnode-id="7770" href="#bb0440" name="bbb0440"><span data-dcnode-id="7771" instrument_node="">Schwartz, 1996</span></a><span data-dcnode-id="7769" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7767" href="#bb0465" name="bbb0465"><span data-dcnode-id="7768" instrument_node="">Seligman and Katz, 1996</span></a><span data-dcnode-id="7766" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7764" href="#bb0520" name="bbb0520"><span data-dcnode-id="7765" instrument_node="">Tetlock et al., 1996</span></a><span data-dcnode-id="7763" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7761" href="#bb0560" name="bbb0560"><span data-dcnode-id="7762" instrument_node="">Williams Jnr, 1979</span></a><span data-dcnode-id="7760" instrument_node="">). Consequently, recent research is seeing a small but burgeoning interest in studying value change although research on deliberately induced value adjustments remains sparse (</span><a class="workspace-trigger" data-dcnode-id="7758" href="#bb0060" name="bbb0060"><span data-dcnode-id="7759" instrument_node="">Bardi and Schwartz, 2013</span></a><span data-dcnode-id="7757" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7755" href="#bb0240" name="bbb0240"><span data-dcnode-id="7756" instrument_node="">Inglehart, 1997</span></a><span data-dcnode-id="7754" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7752" href="#bb0335" name="bbb0335"><span data-dcnode-id="7753" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="7751" instrument_node="">). Taking into account the dynamic nature of values and cognizant of the dilemmas faced by social entrepreneurs in accomplishing social change, we investigate how the performative power of values can be strategically employed to modify values and embed social change (</span><a class="workspace-trigger" data-dcnode-id="7749" href="#bb0180" name="bbb0180"><span data-dcnode-id="7750" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7748" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7746" href="#bb0290" name="bbb0290"><span data-dcnode-id="7747" instrument_node="">Kraatz et al., 2020</span></a><span data-dcnode-id="7745" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7743" href="#bb0475" name="bbb0475"><span data-dcnode-id="7744" instrument_node="">Selznick, 1957</span></a><span data-dcnode-id="7742" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7740" href="#bb0535" name="bbb0535"><span data-dcnode-id="7741" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="7739" instrument_node="">).</span></p></section><section data-dcnode-id="7691" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7731" id="st0040"><span data-dcnode-id="7736" instrument_node="">2.2</span><span data-dcnode-id="7734" instrument_node="">. </span><span data-dcnode-id="7732" instrument_node="">Values work and practices</span></h3><p data-dcnode-id="7715" id="p0830"><a class="workspace-trigger" data-dcnode-id="7729" href="#bb0180" name="bbb0180"><span data-dcnode-id="7730" instrument_node="">Gehman et al. (2013)</span></a><span data-dcnode-id="7728" instrument_node=""> conceptualize “values work” to describe the processes underlying the emergence and performance of values practices. Building on this processual view and going beyond prevalent cognitive and cultural notions of values, we see values as being deeply embedded in the world, manifesting not just in institutions, symbols, and communication patterns but also in practices (</span><a class="workspace-trigger" data-dcnode-id="7726" href="#bb0180" name="bbb0180"><span data-dcnode-id="7727" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7725" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7723" href="#bb0335" name="bbb0335"><span data-dcnode-id="7724" instrument_node="">Manfredo et al., 2016</span></a><span data-dcnode-id="7722" instrument_node="">). In this sense, values can provide critical resources for social change agents (</span><a class="workspace-trigger" data-dcnode-id="7720" href="#bb0285" name="bbb0285"><span data-dcnode-id="7721" instrument_node="">Kraatz et al., 2010</span></a><span data-dcnode-id="7719" instrument_node="">) who can use values to bring about changes in practices (</span><a class="workspace-trigger" data-dcnode-id="7717" href="#bb0535" name="bbb0535"><span data-dcnode-id="7718" instrument_node="">Vaccaro and Palazzo, 2015</span></a><span data-dcnode-id="7716" instrument_node="">).</span></p><p data-dcnode-id="7692" id="p0835"><span data-dcnode-id="7714" instrument_node="">Similarly, since the very organization of a practice—“what ends should be pursued, how actions should be carried out, who can participate, what actions are appropriate and to what end,”—suggests a normative orientation making practices themselves “values-laden” or infused with values (</span><a class="workspace-trigger" data-dcnode-id="7712" href="#bb0180" name="bbb0180"><span data-dcnode-id="7713" instrument_node="">Gehman et al., 2013</span></a><span data-dcnode-id="7711" instrument_node="">: 87; </span><a class="workspace-trigger" data-dcnode-id="7709" href="#bb0175" name="bbb0175"><span data-dcnode-id="7710" instrument_node="">Gehman, 2020</span></a><span data-dcnode-id="7708" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7706" href="#bb0430" name="bbb0430"><span data-dcnode-id="7707" instrument_node="">Schatzki, 2002</span></a><span data-dcnode-id="7705" instrument_node="">). In this sense, practices can shape and guide values. Accordingly, scholars describe how material changes in practices and artifacts can drive shifts in beliefs and values (</span><a class="workspace-trigger" data-dcnode-id="7703" href="#bb0195" name="bbb0195"><span data-dcnode-id="7704" instrument_node="">Greenwood et al., 2002</span></a><span data-dcnode-id="7702" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7700" href="#bb0495" name="bbb0495"><span data-dcnode-id="7701" instrument_node="">Smets et al., 2012</span></a><span data-dcnode-id="7699" instrument_node="">) and how social value priorities change over time as a result of exposure to new experiences, situations, and information (</span><a class="workspace-trigger" data-dcnode-id="7697" href="#bb0050" name="bbb0050"><span data-dcnode-id="7698" instrument_node="">Bardi and Goodwin, 2011</span></a><span data-dcnode-id="7696" instrument_node="">). For instance, </span><a class="workspace-trigger" data-dcnode-id="7694" href="#bb0180" name="bbb0180"><span data-dcnode-id="7695" instrument_node="">Gehman et al. (2013)</span></a><span data-dcnode-id="7693" instrument_node=""> describe how the emergence of an honor code at a business school reflecting values of honesty and integrity was preceded by extensive “values work” such as efforts to avoid cheating scandals. Although practices in this sense shape and embed values, the current literature leans toward studying unintentional and unplanned changes in practices. Besides these theoretical advancements, we know little about how social entrepreneurs introduce new practices in environments steeped in tradition to accomplish social change. To fill this gap, we undertook a case study of a social enterprise that successfully integrated values of gender equality in a patriarchal community and examined the role of purposeful practices in fostering values of gender equality in a conservative rural society.</span></p></section></section><section data-dcnode-id="6854" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7684" id="st0045"><span data-dcnode-id="7689" instrument_node="">3</span><span data-dcnode-id="7687" instrument_node="">. </span><span data-dcnode-id="7685" instrument_node="">Method</span></h2><section data-dcnode-id="7349" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7678" id="st0050"><span data-dcnode-id="7683" instrument_node="">3.1</span><span data-dcnode-id="7681" instrument_node="">. </span><span data-dcnode-id="7679" instrument_node="">Research setting</span></h3><p data-dcnode-id="7670" id="p0840"><span data-dcnode-id="7677" instrument_node="">The empirical context for our research is Barefoot College (Barefoot), a social enterprise that has been quietly effecting radical and robust change in rural societies worldwide over the course of 50&nbsp;years. Established in 1971 in a state with endemic gender inequality and low female literacy rates (</span><a class="workspace-trigger" data-dcnode-id="7675" href="#bb0005" name="bbb0005"><span data-dcnode-id="7676" instrument_node="">Census of India, 2011</span></a><span data-dcnode-id="7674" instrument_node="">), Barefoot has received worldwide acclaim for its innovative program training illiterate mothers and grandmothers from across the developing world to become technicians and solar energy entrepreneurs, or “solar mamas” (</span><a class="workspace-trigger" data-dcnode-id="7672" href="#bb6000" name="bbb6000"><span data-dcnode-id="7673" instrument_node="">Fong, 2013</span></a><span data-dcnode-id="7671" instrument_node="">). Barefoot started slowly but scaled rapidly in later years, expanding across 1300 villages in 97 countries with its model of empowering women in rural communities and bringing solar power to rural regions in the developing countries of Asia, Africa, and Latin America. Through this work, Barefoot accomplishes transformative social change—empowering women at the intersection of poverty and gender discrimination—while challenging established norms and confronting a rigid patriarchy. However, over the years, it has faced only a modicum of resistance from the communities in which it operates.</span></p><section data-dcnode-id="7350" id="s0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7664" id="st0055"><span data-dcnode-id="7669" instrument_node="">3.1.1</span><span data-dcnode-id="7667" instrument_node="">. </span><span data-dcnode-id="7665" instrument_node="">Founding and evolution of Barefoot College</span></h4><p data-dcnode-id="7662" id="p0845"><span data-dcnode-id="7663" instrument_node="">In 1971, Sanjit Roy (Roy) and a small group of friends established the Social Work and Research Centre (SWRC), later renamed Barefoot College, in Tilonia, rural Rajasthan, India, with the primary aim of “helping the poor.” Although the overriding mission has remained one of rural development and poverty alleviation, the enterprise's emergent strategy has morphed and advanced from one focused on digging wells to one focused on training and empowering women to become solar technicians and entrepreneurs.</span></p><p data-dcnode-id="7654" id="p0850"><span data-dcnode-id="7661" instrument_node="">The organization's founding was preceded by a severe drought in the region, which motivated its initial strategy of digging wells and locating ground water to help the rural community (</span><a class="workspace-trigger" data-dcnode-id="7659" href="#bb0375" name="bbb0375"><span data-dcnode-id="7660" instrument_node="">O'Brien, 1996</span></a><span data-dcnode-id="7658" instrument_node="">). According to Roy, the organization aimed “to combine urban formal learning with traditional rural wisdom and knowledge” to achieve these aims (Interview, 2017). However, its mission was hampered by a slow and bureaucratic political system and a high turnover of urban employees, prompting the organization to look within its rural community for recruitment (</span><a class="workspace-trigger" data-dcnode-id="7656" href="#bb0425" name="bbb0425"><span data-dcnode-id="7657" instrument_node="">Roy and Hartigan, 2008</span></a><span data-dcnode-id="7655" instrument_node="">). Reflecting this deliberate shift in its approach, Barefoot began eschewing all “urban” knowledge, including educational and professional degrees awarded by universities, and instead began promoting and privileging traditional rural skills. Consequently, strategies related to developing self-reliance, promoting rural skills, and building confidence emerged, and the idea of setting up a college to teach and develop local competencies took shape. This change was depicted in the organization's adoption of the name Barefoot College in 1984, with its logo of a pair of feet symbolizing its rural roots.</span></p><div data-dcnode-id="7592"><p data-dcnode-id="7646" id="p0855"><span data-dcnode-id="7653" instrument_node="">Adopting a multipronged strategy to support rural development locally, Barefoot embarked on projects related to water desalination and opened “night schools” for children who had to work on farms during the day. In the late 1990s, Barefoot launched a solar-energy training program to train men as technicians to introduce solar power in villages. However, the increasing trend of men migrating to cities after completing their training prompted Barefoot to train women instead, especially older women, thus laying the seeds for the solar mamas program, which formally launched in 2003. </span><a class="workspace-trigger" data-dcnode-id="7651" href="#f0005" name="bf0005"><span data-dcnode-id="7652" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7650" instrument_node=""> shows women training at the college to become “barefoot solar engineers,” and </span><a class="workspace-trigger" data-dcnode-id="7648" href="#f0010" name="bf0010"><span data-dcnode-id="7649" instrument_node="">Fig. 2</span></a><span data-dcnode-id="7647" instrument_node=""> shows these engineers demonstrating how a solar cooker works.</span></p><figure class="figure text-xs" data-dcnode-id="7621" id="f0005"><span data-dcnode-id="7630"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="7645" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr1.jpg&amp;raw"><span data-dcnode-id="7644" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7631"><li data-dcnode-id="7638"><a class="anchor download-link u-font-sans" data-dcnode-id="7639" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr1_lrg.jpg" target="_blank" title="Download high-res image (163KB)"><span class="anchor-text" data-dcnode-id="7640"><span data-dcnode-id="7643" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7641"><span data-dcnode-id="7642" instrument_node="">Download high-res image (163KB)</span></span></span></a></li><li data-dcnode-id="7632"><a class="anchor download-link u-font-sans" data-dcnode-id="7633" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7634"><span data-dcnode-id="7637" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7622"><span data-dcnode-id="7623" id="ca0005"><p data-dcnode-id="7624" id="sp0005"><span class="label" data-dcnode-id="7628"><span data-dcnode-id="7629" instrument_node="">Fig. 1</span></span><span data-dcnode-id="7627" instrument_node="">. </span><span data-dcnode-id="7625" instrument_node="">Women from 17 countries training to become barefoot solar technicians, or solar mamas.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="7593" id="f0010"><span data-dcnode-id="7605"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="7620" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr2.jpg&amp;raw"><span data-dcnode-id="7619" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7606"><li data-dcnode-id="7613"><a class="anchor download-link u-font-sans" data-dcnode-id="7614" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr2_lrg.jpg" target="_blank" title="Download high-res image (260KB)"><span class="anchor-text" data-dcnode-id="7615"><span data-dcnode-id="7618" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">Download high-res image (260KB)</span></span></span></a></li><li data-dcnode-id="7607"><a class="anchor download-link u-font-sans" data-dcnode-id="7608" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0883902620306728-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7609"><span data-dcnode-id="7612" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7594"><span data-dcnode-id="7595" id="ca0010"><p data-dcnode-id="7596" id="sp0010"><span class="label" data-dcnode-id="7603"><span data-dcnode-id="7604" instrument_node="">Fig. 2</span></span><span data-dcnode-id="7602" instrument_node="">. </span><span data-dcnode-id="7600" instrument_node="">A Barefoot solar cooker engineer teaches a program participant how to use a solar cooker (</span><a class="workspace-trigger" data-dcnode-id="7598" href="#bb9000" name="bbb9000"><span data-dcnode-id="7599" instrument_node="">Bhurji, 2011</span></a><span data-dcnode-id="7597" instrument_node="">).</span></p></span></span></figure></div><div data-dcnode-id="7351"><p data-dcnode-id="7587" id="p0860"><span data-dcnode-id="7591" instrument_node="">In recent years (preceding and including our field research), we noticed another subtle shift in strategy. With the solar training program for women gaining traction and spreading to countries across the world, Barefoot began emphasizing values of women empowerment and individualism (in addition to previously espoused values of gender equality) in ways that were still largely compatible with traditional values. This shift was also reflected in the appointment of a woman CEO in 2014 and, more unequivocally, in the launch of the Enriche program in 2016, which was set up to train women to become entrepreneurs and establish ventures that leverage their rural heritage but also allow space for “individual aspirations.” </span><a class="workspace-trigger" data-dcnode-id="7589" href="#t0005" name="bt0005"><span data-dcnode-id="7590" instrument_node="">Table 1</span></a><span data-dcnode-id="7588" instrument_node=""> presents a timeline of the enterprise and its evolving community-related programs.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7352" id="t0005"><span class="captions" data-dcnode-id="7579"><span data-dcnode-id="7580" id="ca0030"><p data-dcnode-id="7581" id="sp0030"><span class="label" data-dcnode-id="7585"><span data-dcnode-id="7586" instrument_node="">Table 1</span></span><span data-dcnode-id="7584" instrument_node="">. </span><span data-dcnode-id="7582" instrument_node="">Barefoot College timeline (including external [E] and internal [I] events)</span></p></span></span><div class="groups" data-dcnode-id="7359"><table data-dcnode-id="7360"><tbody data-dcnode-id="7361"><tr data-dcnode-id="7574"><td data-dcnode-id="7577"><span data-dcnode-id="7578" instrument_node="">E</span></td><td data-dcnode-id="7575"><span data-dcnode-id="7576" instrument_node="">1969–1970: Severe drought in Rajasthan.</span></td></tr><tr data-dcnode-id="7569"><td data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">I</span></td><td data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">1971: Sanjit “Bunker” Roy establishes Social Work and Research Center (SWRC) in Tilonia, Rajasthan.</span></td></tr><tr data-dcnode-id="7564"><td data-dcnode-id="7567"><span data-dcnode-id="7568" instrument_node="">E</span></td><td data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">1972–1974: The government of India launches drought-relief schemes.</span></td></tr><tr data-dcnode-id="7559"><td data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">I</span></td><td data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">1972: Drilling for wells and a rainwater-harvesting program initiated by SWRC.</span></td></tr><tr data-dcnode-id="7554"><td data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">I</span></td><td data-dcnode-id="7555"><span data-dcnode-id="7556" instrument_node="">1975: First-ever women’s craft fair organized by SWRC to sell products made by women.</span></td></tr><tr data-dcnode-id="7549"><td data-dcnode-id="7552"><span data-dcnode-id="7553" instrument_node="">E</span></td><td data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">1978: The government of India launches the Farmers’ Literacy and Adult Education programs.</span></td></tr><tr data-dcnode-id="7544"><td data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">I</span></td><td data-dcnode-id="7545"><span data-dcnode-id="7546" instrument_node="">1978: SWRC opens night schools and launches health and education programs.</span></td></tr><tr data-dcnode-id="7539"><td data-dcnode-id="7542"><span data-dcnode-id="7543" instrument_node="">I</span></td><td data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">Until 1978, few employees from the lower caste and no women employees at SWRC.</span></td></tr><tr data-dcnode-id="7534"><td data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">I</span></td><td data-dcnode-id="7535"><span data-dcnode-id="7536" instrument_node="">1979: The organization faces a crisis. SWRC dismisses an employee from the upper caste for embezzlement, and is faced with a lawsuit. SWRC wins the case.</span></td></tr><tr data-dcnode-id="7521"><td data-dcnode-id="7531"><strong data-dcnode-id="7532"><span data-dcnode-id="7533" instrument_node="">I</span></strong></td><td data-dcnode-id="7522"><strong data-dcnode-id="7529"><span data-dcnode-id="7530" instrument_node="">1980</span></strong><a class="workspace-trigger" data-dcnode-id="7525" href="#tf0005" name="btf0005"><sup data-dcnode-id="7526"><strong data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">a</span></strong></sup></a><strong data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">: SWRC begins to employ an increasing number of people from marginalized communities.</span></strong></td></tr><tr data-dcnode-id="7516"><td data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">
