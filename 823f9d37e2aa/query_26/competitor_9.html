55520636 jsx-159575334 separator" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node=""> | </span></span><span class="jsx-2155520636 jsx-159575334 Date" data-dcnode-id="646"><span data-dcnode-id="649" instrument_node="">Updated </span><span data-dcnode-id="647" instrument_node="">Sep 7, 2021</span></span><span class="jsx-2155520636 jsx-159575334 separator" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> | </span></span><span class="jsx-2155520636 jsx-159575334 Date" data-dcnode-id="640"><span data-dcnode-id="643" instrument_node="">Published </span><span data-dcnode-id="641" instrument_node="">May 17, 2018</span></span></div><div class="jsx-2155520636 jsx-159575334 single-article-hero" data-dcnode-id="635"><figure class="jsx-9900691a49693584 postImage" data-dcnode-id="636"><img alt="controversial horror books" class="postImage" data-dcnode-id="638" height="320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orion-uploads.openroadmedia.com/md_4d0ade0c9a5f-american-psycho-%281%29.jpg&amp;raw" title="controversial_horror_books" width="757"><figcaption class="jsx-9900691a49693584" data-dcnode-id="637"></figcaption></figure></div><div class="jsx-2155520636 jsx-159575334 single-article-body" data-dcnode-id="135"><div class="jsx-2155520636 jsx-159575334 single-article-center layout_v2" data-dcnode-id="136"><div class="jsx-2155520636 jsx-159575334 Lede" data-dcnode-id="632"><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">You know you’ve hit the big time as a horror writer when even dedicated horror readers can’t stomach your latest book. Whether it’s the writer’s no-holds-barred depiction of violence or the fact that no subject is off limits, not even innocent little kids, these controversial horror books are some of the most disturbing ever written. Read at your own risk.&nbsp;</span></p></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 book-listicle" data-dcnode-id="592"><span data-dcnode-id="631" instrument_node=""></span><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 info" data-dcnode-id="593"><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 image" data-dcnode-id="626"><div class="afb__book-cover" data-dcnode-id="627"><figure class="jsx-9900691a49693584" data-dcnode-id="628"><img alt="postimage" class="undefined lazyloaded" data-dcnode-id="630" data-src="https://book-assets.openroadmedia.com/9781497658264.jpg" height="320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//book-assets.openroadmedia.com/9781497658264.jpg&amp;raw" style="max-width:100%" title="https://book-assets.openroadmedia.com/9781497658264.jpg" width="210"><figcaption class="jsx-9900691a49693584" data-dcnode-id="629"></figcaption></figure></div></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 afb__description" data-dcnode-id="594"><h3 class="jsx-7103dcf9959a173d afb__title" data-dcnode-id="623"><span class="jsx-7103dcf9959a173d" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The Sopaths</span></span></h3><p class="jsx-ff72e5293151f05a afb__author" data-dcnode-id="617"><span class="jsx-ff72e5293151f05a" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">By</span></span><span data-dcnode-id="620" instrument_node=""> </span><span data-dcnode-id="618" instrument_node="">Piers Anthony</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="611"><p data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">In Piers Anthony’s darkly disturbing novel, we find ourselves in a world where children, known as “sopaths,” can be born without a soul—with no moral compass and a license to kill. After Abner must murder his own daughter in self-defense, he joins a group of sopath victims called Pariah, who are tasked with rebuilding the world from what remains. Readers called </span><em data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Sopaths </span></em><span data-dcnode-id="613" instrument_node="">“terrifying and alarming,” and point out that the book’s message raises disturbing questions about children and the future.&nbsp;</span></p></div><div class="jsx-2183639745 bookListicleAf affiliate-button" data-dcnode-id="595"><div class="jsx-2183639745 large-12" data-dcnode-id="596"><span data-dcnode-id="610" instrument_node=""></span><div class="jsx-2183639745 afb__book-cover" data-dcnode-id="608"><img alt="image" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="609" data-src="https://book-assets.openroadmedia.com/9781497658264.jpg" height="320" title="" width="210"></div><div class="jsx-2183639745 buttonContainer" data-dcnode-id="597"><div class="jsx-15c24058204017f aff__links" data-dcnode-id="598"><div class="jsx-15c24058204017f aff__link" data-dcnode-id="605"><a class="jsx-c1859e536e77902f button" data-dcnode-id="606" data-vars-event-action="Retail Click" data-vars-event-label="The Sopaths | 9781497658264 | Open Road Media" data-vars-outbound-text="Amazon" data-vars-outbound-url="https://www.amazon.com/dp/B00KLOY17S?tag=tluweb-20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00KLOY17S%3Ftag%3Dtluweb-20" rel="nofollow" target="_blank"><span data-dcnode-id="607" instrument_node="">Amazon</span></a></div><div class="jsx-15c24058204017f aff__link" data-dcnode-id="602"><a class="jsx-c1859e536e77902f button" data-dcnode-id="603" data-vars-event-action="Retail Click" data-vars-event-label="The Sopaths | 9781497658264 | Open Road Media" data-vars-outbound-text="Apple Books" data-vars-outbound-url="http://itunes.apple.com/us/book/isbn9781497658271?ct=tlusite&amp;at=10lrBN" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//itunes.apple.com/us/book/isbn9781497658271%3Fct%3Dtlusite%26at%3D10lrBN" rel="nofollow" target="_blank"><span data-dcnode-id="604" instrument_node="">Apple Books</span></a></div><div class="jsx-15c24058204017f aff__link" data-dcnode-id="599"><a class="jsx-c an data-dcnode-id="580" instrument_node=""> </span><span data-dcnode-id="578" instrument_node="">Arthur Machen</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="574"><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Though today Arthur Machen’s novel is considered an early example of modern horror, at the time it was published in 1894 readers were scandalized by its disturbing sexual and violent themes. After witnessing a controversial experiment in brain surgery, Clarke meets a woman named Helen who has left a trail of devastation in her wake. Critics of the book questioned why Machen “should be allowed . . . to cast into our midst these monstrous creations of his diseased brain?” But horror master H.P. Lovecraft was a fan of the book, writing, “no one could begin to describe the cumulative suspense and ultimate horror with which every paragraph abounds.”</span></p></div><div class="jsx-2183639745 bookListicleAf affiliate-button" data-dcnode-id="558"><div class="jsx-2183639745 large-12" data-dcnode-id="559"><span data-dcnode-id="573" instrument_node=""></span><div class="jsx-2183639745 afb__book-cover" data-dcnode-id="571"><img alt="image" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="572" data-src="https://book-assets.openroadmedia.com/9781504043625.jpg" height="320" title="" width="210"></div><div class="jsx-2183639745 buttonContainer" data-dcnode-id="560"><div class="jsx-15c24058204017f aff__links" data-dcnode-id="561"><div class="jsx-15c24058204017f aff__link" data-dcnode-id="568"><a class="jsx-c1859e536e77902f button" data-dcnode-id="569" data-vars-event-action="Retail Click" data-vars-event-label="The Great God Pan | 9781504043625 | Open Road Media" data-vars-outbound-text="Amazon" data-vars-outbound-url="https://www.amazon.com/dp/B01MYC5EY3?tag=tluweb-20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01MYC5EY3%3Ftag%3Dtluweb-20" rel="nofollow" target="_bl 9a173d afb__title" data-dcnode-id="436"><span class="jsx-7103dcf9959a173d" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">The Devil of Nanking</span></span></h3><p class="jsx-ff72e5293151f05a afb__author" data-dcnode-id="430"><span class="jsx-ff72e5293151f05a" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">By</span></span><span data-dcnode-id="433" instrument_node=""> </span><span data-dcnode-id="431" instrument_node="">Mo Hayder</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="427"><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Mo Hayder may be better known for her crime novels, but in The Devil of Nanking, she turns her formidable abilities to the horrors of history. Young Englishwoman Grey has become obsessed with the terrible events of the rape of Nanking during World War II. Compelled to discover rumored footage of the atrocities visited upon Chinese citizens, Grey travels to Japan to meet a professor who supposedly holds the film. This spine-chilling novel confronts the horrors that people visit upon each other in the name of war.</span></p></div><div class="jsx-2183639745 bookListicleAf affiliate-button" data-dcnode-id="411"><div class="jsx-2183639745 large-12" data-dcnode-id="412"><span data-dcnode-id="426" instrument_node=""></span><div class="jsx-2183639745 afb__book-cover" data-dcnode-id="424"><img alt="image" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="425" data-src="https://book-assets.openroadmedia.com/9780802199607.jpg" height="320" title="" width="210"></div><div class="jsx-2183639745 buttonContainer" data-dcnode-id="413"><div class="jsx-15c24058204017f aff__links" data-dcnode-id="414"><div class="jsx-15c24058204017f aff__link" data-dcnode-id="421"><a class="jsx-c1859e536e77902f button" data-dcnode-id="422" data-vars-event-action="Retail Click" data-vars-event-label="The Devil of Nanking | 9780802199607 | Grove Atlantic" data-vars-outbound-text="Amaz r" data-dcnode-id="403"><figure class="jsx-9900691a49693584" data-dcnode-id="404"><img alt="controversial horror books" class="undefined lazyloaded" data-dcnode-id="406" data-src="https://orion-uploads.openroadmedia.com/sm_084a3d13751b-american-psycho-(1).jpg" height="320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orion-uploads.openroadmedia.com/sm_084a3d13751b-american-psycho-%281%29.jpg&amp;raw" style="max-width:100%" title="american_psycho" width="210"><figcaption class="jsx-9900691a49693584" data-dcnode-id="405"></figcaption></figure></div></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 afb__description" data-dcnode-id="367"><h3 class="jsx-7103dcf9959a173d afb__title" data-dcnode-id="399"><span class="jsx-7103dcf9959a173d" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">American Psycho</span></span></h3><p class="jsx-ff72e5293151f05a afb__author" data-dcnode-id="393"><span class="jsx-ff72e5293151f05a" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">By</span></span><span data-dcnode-id="396" instrument_node=""> </span><span data-dcnode-id="394" instrument_node="">Bret Easton Ellis</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="384"><p data-dcnode-id="385"><span data-dcnode-id="392" instrument_node="">Quite possibly one of the most controversial novels published in the 20th century, Bret Easton Ellis’s </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">American Psycho</span></em><span data-dcnode-id="389" instrument_node=""> is a veritable smorgasbord of sexual violence. Written as a satire on capitalism and materialism, the book features the exploits of Patrick Bateman—prolific day trader and serial killer. The scenes of violence in this book are as over-the-top as any melodrama, but the social message behind them is as dark and disturbing as they come, making </span><em data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Ame /span><span data-dcnode-id="353" instrument_node=""> </span><span data-dcnode-id="351" instrument_node="">Wrath James White</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="341"><p data-dcnode-id="342"><span data-dcnode-id="349" instrument_node="">Every book on this list is guaranteed to leave you with crawling skin. But </span><i data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">The Resurrectionist</span></i><span data-dcnode-id="346" instrument_node=""> may be the most twisted horror book you’ll </span><i data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">ever</span></i><span data-dcnode-id="343" instrument_node=""> read. This hardcore horror is filled with gore, sex, violence, and the kind of chills you’ll never forget. A young man named Dale discovers that he has the power to bring people back to life… and uses it to repeatedly brutally murder people around him. Lock your doors and check every dark corner before you dig into this one.</span></p></div><div class="jsx-2859406913 bookListicleAf affiliate-button" data-dcnode-id="328"><div class="jsx-2859406913 large-12" data-dcnode-id="329"><span data-dcnode-id="340" instrument_node=""></span><div class="jsx-2859406913 afb__book-cover" data-dcnode-id="338"><img alt="disturbing horror novels" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="339" data-src="https://orion-uploads.openroadmedia.com/md_3dd34f059814-the-resurrectionist.jpg" height="320" title="disturbing-horror-novels" width="210"></div><div class="jsx-2859406913 buttonContainer external" data-dcnode-id="330"><div class="jsx-15c24058204017f aff__links" data-dcnode-id="331"><div class="jsx-15c24058204017f aff__link" data-dcnode-id="335"><a class="jsx-c1859e536e77902f button" data-dcnode-id="336" data-vars-outbound-text="Amazon" data-vars-outbound-url="https://www.amazon.com/dp/B00M6CNIRC/?tag=tluweb-20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co ta-dcnode-id="279"><h3 class="jsx-7103dcf9959a173d afb__title" data-dcnode-id="314"><span class="jsx-7103dcf9959a173d" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">It</span></span></h3><p class="jsx-ff72e5293151f05a afb__author" data-dcnode-id="308"><span class="jsx-ff72e5293151f05a" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">By</span></span><span data-dcnode-id="311" instrument_node=""> </span><span data-dcnode-id="309" instrument_node="">Stephen King</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="296"><p data-dcnode-id="297"><span data-dcnode-id="307" instrument_node="">When Stephen King published this magnum opus in 1986, an entire generation of people was forever scarred. Working in the depths of the modern psyche, "It" knows what scares you, and takes the form of a clown. (As if we weren’t already scared of clowns.) As always, King was criticized for garish violence, but this time his story focused on children who then must confront "It" again as adults. A terrifying </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Stephen-King-Tim-Curry/dp/B00HLOVKH0/%3Ftag%3Dtluweb-20" target="_blank"><span data-dcnode-id="306" instrument_node="">miniseries adaptation</span></a><span data-dcnode-id="304" instrument_node=""> starring Tim Curry as Pennywise the Clown solidified</span><i data-dcnode-id="302"><span data-dcnode-id="303" instrument_node=""> It </span></i><span data-dcnode-id="301" instrument_node="">as one of the most disturbing creations of King’s mind. The recent </span><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/video/detail/B0756VMDV5/%3Ftag%3Dtluweb-20" target="_blank"><span data-dcnode-id="300" instrument_node="">film version</span></a><span data-dcnode-id="298" instrument_node=""> proves that audiences are far from done with this controversial story.&nbsp;</span></p></div><div class="jsx-2859406913 bookListicleAf affiliate-button" data-dcnode-id="280"><div class="jsx-2859406913 large-12" data-dcnode-id="281"><span data-dcnode-id="295" instrument_node=""></span><div class="jsx-2859406913 afb__book-cover" data-dcnode-id="293"><img alt="controversial horror books" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="294" data-src="https://orion-uploads.openroadmedia.com/md_78d633eba3aa-paavpdqsbtggtmn4smxs.png" height="320" title="it" width="210"></div><div class="jsx-2859406913 buttonContainer external" data-dcnode-id="282"><div class="jsx-15c24058204017f aff__links" data-dcnode-id="283"><div class="jsx-15c24058204017f aff__link" data-dcnode-id="290"><a class="jsx-c1859e536e77902f button" data-dcnode-id="291" data-vars-outbound-text="Amazon" data-vars-outbound-url="https://www.amazon.com/Stephen-King-ebook/dp/B018ER7K5I/?tag=tluweb-20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Stephen-King-ebook/dp/B018ER7K5I/%3Ftag%3Dtluweb-20" rel="nofollow" target="_blank"><span data-dcnode-id="292" instrument_node="">Amazon</span></a></div><div class="jsx-15c24058204017f aff__link" data-dcnode-id="287"><a class="jsx-c1859e536e77902f button" data-dcnode-id="288" data-vars-outbound-text="Apple Books" data-vars-outbound-url="https://geo.itunes.apple.com/us/book/it/id1061699023?mt=11&amp;at=10lrBN&amp;ct=tlusite" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geo.itunes.apple.com/us/book/it/id1061699023%3Fmt%3D11%26at%3D10lrBN%26ct%3Dtlusite" rel="nofollow" target="_blank"><span data-dcnode-id="289" instrument_node="">Apple Books</span></a></div><div class="jsx-15c24058204017f aff__link" data-dcnode-id="284"><a class="jsx-c1859e536e77902f button" data-dcnode-id="285" data-vars-outbound-text="Barnes &amp; Noble" data-vars-outbound-url="http://www.anrdoezrs.net/links/8228302/type/dlg/fragment/%2F/https://www.barnesandnoble.com/w/it-stephen-ki
