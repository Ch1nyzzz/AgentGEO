</span><section aria-labelledby="Abs1" data-dcnode-id="2162" data-gtm-vis-first-on-screen-50443292_562="824" data-gtm-vis-first-on-screen-50443292_563="847" data-gtm-vis-polling-id-50443292_562="67" data-gtm-vis-polling-id-50443292_563="70" data-gtm-vis-recent-on-screen-50443292_562="823" data-gtm-vis-recent-on-screen-50443292_563="847" data-gtm-vis-total-visible-time-50443292_562="9200" data-gtm-vis-total-visible-time-50443292_563="9100" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2163" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2185" id="Abs1"><span data-dcnode-id="2186" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2164" id="Abs1-content"><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">In this chapter we aim to give an overview of the main societal and ethical issues that are currently voiced around industrial biotechnology. We will illustrate this with some recent cases, such as the development of synthetic artemisinin, synthetic vanillin and vegetable oil produced by engineered algae. We show that current societal and ethical issues in industrial biotechnology centre on the following five themes: sustainability, naturalness, innovation trajectories, risk management and economic justice. In each of these themes, clashing public opinions fuel the public debate on the acceptability of new industrial biotechnology. In some cases this has led to the failure of otherwise promising innovations. In the last part, we provide suggestions on how to deal with these ethical and societal aspects based on the approach of Responsible Research and Innovation (RRI).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="2165"><li class="c-article-subject-list__subject" data-dcnode-id="2178"><span data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Economic justice</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2175"><span data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Ethical and social issues</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2172"><span data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Naturalness</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2169"><span data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Responsible research and innovation</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2166"><span data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Sustainability</span></span></li></ul></div></div></section><span data-dcnode-id="2161" instrument_node="">

</span><section data-dcnode-id="2123" data-gtm-vis-first-on-screen-50443292_562="847" data-gtm-vis-first-on-screen-50443292_563="847" data-gtm-vis-polling-id-50443292_562="68" data-gtm-vis-polling-id-50443292_563="71" data-gtm-vis-recent-on-screen-50443292_562="847" data-gtm-vis-recent-on-screen-50443292_563="847" data-gtm-vis-total-visible-time-50443292_562="9300" data-gtm-vis-total-visible-time-50443292_563="9300" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2124" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2144" id="Sec1"><span data-dcnode-id="2145" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2125" id="Sec1-content"><p data-dcnode-id="2139"><span data-dcnode-id="2143" instrument_node="">Until now industrial biotechnology has not received the same kind of public scrutiny as plant biotechnology has, especially not in relation to genetic modification [</span><a aria-label="Reference 1" data-dcnode-id="2141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d3796380e801" title="Gaskell G, Stares S, Allansdottir A et al (2006) Eurobarometer 64.3: Europeans and biotechnology in 2005: patterns and trends, a report to the European Commission’s Directorate-General for Research, Brussels"><span data-dcnode-id="2142" instrument_node="">1</span></a><span data-dcnode-id="2140" instrument_node="">]. The societal and ethical issues which do emerge around industrial biotechnology are more broadly oriented to its role as enabling technology with its many claims on applications aimed at sustainability, such as biofuels and biochemicals. With industrial biotechnological applications becoming more abundant, these public concerns do increase within the broader debate on bio-based economy, sustainable development goals and climate change, but also towards specific technological issues.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2138" instrument_node="">In this chapter we aim to give an overview of the main societal and ethical issues that are currently voiced around industrial biotechnology. We will illustrate this with some recent cases, such as the development of synthetic artemisinin (see also Schürrle, this volume), synthetic vanillin and vegetable oil produced by engineered algae. We do not include a case on biofuels, because the public debate on biofuels has already been documented extensively [</span><a aria-label="Reference 2" data-dcnode-id="2136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d3796380e807" title="Asveld L, Qv E, Stemerding D (eds) (2011) Getting to the core of the bio-economy: a perspective on the sustainable promise of biomass. Rathenau Institute, The Hague"><span data-dcnode-id="2137" instrument_node="">2</span></a><span data-dcnode-id="2135" instrument_node="">, </span><a aria-label="Reference 3" data-dcnode-id="2133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d3796380e810" title="Osseweijer P, Ammann K, Kinderlerer J (2010) Societal issues in industrial biotechnology. In: Soetaert W, Vandamme EJ (eds) Industrial biotechnology: sustainable growth and economic success, 1st edn. Wiley, Oxford, pp 457–481"><span data-dcnode-id="2134" instrument_node="">3</span></a><span data-dcnode-id="2132" instrument_node="">]. Where relevant we will refer to this debate. We did not include pharmaceutical products, because that would make the chapter too wide ranging. We mainly focus on the development of a bio-based economy (or bioeconomy), here understood as an effort to derive high-quality and highly sustainable products from biomass [</span><a aria-label="Reference 2" data-dcnode-id="2130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d3796380e813" title="Asveld L, Qv E, Stemerding D (eds) (2011) Getting to the core of the bio-economy: a perspective on the sustainable promise of biomass. Rathenau Institute, The Hague"><span data-dcnode-id="2131" instrument_node="">2</span></a><span data-dcnode-id="2129" instrument_node="">]. We will also consider the wider societal debate on the bioeconomy as can be found in public reports, newspapers and websites.</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">We claim that current societal and ethical issues in industrial biotechnology centre on the following five themes: sustainability, naturalness, innovation trajectories, risk management and economic justice. In each of these themes, clashing public opinions fuel the public debate on the acceptability of new industrial biotechnology. These clashes in the public opinion bring out salient ethical and societal aspects for industrial biotechnology. In the last part, we provide suggestions on how to deal with these ethical and societal aspects based on the approach of Responsible Research and Innovation (RRI).</span></p></div></div></section><section data-dcnode-id="2009" data-gtm-vis-first-on-screen-50443292_562="847" data-gtm-vis-first-on-screen-50443292_563="848" data-gtm-vis-polling-id-50443292_562="69" data-gtm-vis-polling-id-50443292_563="72" data-gtm-vis-recent-on-screen-50443292_562="847" data-gtm-vis-recent-on-screen-50443292_563="848" data-gtm-vis-total-visible-time-50443292_562="9100" data-gtm-vis-total-visible-time-50443292_563="9200" data-title="Some Recent Controversies in Industrial Biotechnology"><div class="c-article-section" data-dcnode-id="2010" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2121" id="Sec2"><span data-dcnode-id="2122" instrument_node="">Some Recent Controversies in Industrial Biotechnology</span></h2><div class="c-article-section__content" data-dcnode-id="2011" id="Sec2-content"><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Recent controversies in industrial biotechnology are here shortly described by using three examples, namely, the production of artemisinin, vanillin and algae-based oil. These cases can be taken as indicators for the social and ethical issues that are relevant for industrial biotechnology in general. They point out clashes in perceptions and underlying values. Based on the issues that are central in these cases, we arrive at five general societal themes relevant to industrial biotechnology, namely: (1) What is sustainability and how can it be measured? (2) What is natural? (3) How should risks of emerging industrial biotechnologies be managed? (4) How will industrial biotechnological trajectories develop? and (5) Who benefits from these new technologies?</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2118" instrument_node="">In the cases mentioned, criticism is most clearly articulated by the ETC Group,</span><sup data-dcnode-id="2113"><a data-dcnode-id="2114" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Footnote </span></span><span data-dcnode-id="2115" instrument_node="">1</span></a></sup><span data-dcnode-id="2112" instrument_node=""> a Canadian NGO opposing specific technologies such as synthetic biotechnology (synbio). Although this might be seen as only one actor, the ETC Group often represents a broad group of NGOs and thereby a widely shared societal perspective. For instance, in the Ecover case discussed below, the ETC Group started a petition against the company Ecover which was signed by 17 other NGOs.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">This is not to say that the ETC Group represents a view shared by all environmental NGOs. Other environmental NGOs often express a more nuanced view on new technologies, i.e. they do not categorically condemn technologies such as synthetic biology but remain open to see if they could possibly produce benefits and, if so, under what conditions. The England, Wales, and Northern Ireland division of Friends of the Earth (FoE EWNI) is an example of such an NGO. Greenpeace, however, is often taking a position comparable to that of the ETC Group, i.e. categorically rejecting genetic technologies.</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">The position of the ETC Group is very interesting because it represents a very outspoken position, diametrically opposed to those in favour of industrial biotechnology. Many other perspectives on synthetic biology and green chemistry can be expected to be somewhere in between those strongly in favour of industrial biotechnology and those vehemently opposing it. Focussing on these two positions as indicative for societal concerns brings out the most well-articulated concerns, assumptions and beliefs.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2105" id="Sec3"><span data-dcnode-id="2106" instrument_node="">The Case of Synthetic Artemisinin Production</span></h3><p data-dcnode-id="2097"><span data-dcnode-id="2104" instrument_node="">In 2005, supported by funds from the Bill &amp; Melinda Gates Foundation, the US-based company Amyris achieved a ‘breakthrough’</span><sup data-dcnode-id="2099"><a data-dcnode-id="2100" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Footnote </span></span><span data-dcnode-id="2101" instrument_node="">2</span></a></sup><span data-dcnode-id="2098" instrument_node=""> by developing artemisinic acid, a precursor to artemisinin, the main ingredient for antimalaria drugs. Malaria treatments are currently mainly based on the Chinese sweet wormwood plant, from which artemisinin is extracted. However, this process is costly and time-consuming, according to Amyris. The semi-synthetic artemisinin (SSA) provides a viable and cost-effective alternative, as the company states. The platform for producing SSA is yeast whose metabolic pathways have been engineered. Amyris partnered with the pharmaceutical company Sanofi to produce ‘cost-effective malaria treatments’, which became available in 2013.</span></p><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">At the time, SSA was hailed as the first triumph for synthetic biology. It showed it was possible to provide a viable alternative to naturally occurring substances, with great promise for combatting a persisting global health issue: malaria. However, not everybody was convinced of the merits of this innovation. The most vocal of the opponents of SSA is the Canadian-based ETC Group. Their main objection is that the production of SSA will undermine the agricultural production of wormwood, thereby undermining the livelihoods of farmers growing the wormwood. Sanofi can keep their prices low because of the Gates Foundation support and thereby undercut the competition. Moreover, this technology allows for the concentration of economic power in the hands of one company at the expense of many small producers. Their criticism is supported by the Dutch Royal Tropical Institute who state in a 2006 report:</span></p><blockquote class="c-blockquote" data-dcnode-id="2086"><div class="c-blockquote__body" data-dcnode-id="2087"><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">The advantage of synthetic artemisinin is the combination of its predictability and, eventually, cheap production. Pharmaceutical companies will be able to enhance their control over the production process and will not have to depend on numerous supply chain actors, such as thousands of individual producers and local extractors. Long transportation distances across multiple borders will be replaced by on-the-spot production and manufacturing. However, there are also disadvantages: pharmaceutical companies will accumulate control and power over the production process; artemisia producers will lose a source of income; and local production, extraction and (possibly) manufacturing of ACT (Artemisinin based Combination Therapy, LA) in regions where malaria is prevalent will shift to the main production sites of Western pharmaceutical companies. (Heemskerk et al. [</span><a aria-label="Reference 4" data-dcnode-id="2091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d3796380e875" title="Heemskerk W, Schallig H, De Steenhuijsen Piters B (2006) The World of Artemisia in 44 questions. The Royal Tropical Institute, The Hague"><span data-dcnode-id="2092" instrument_node="">4</span></a><span data-dcnode-id="2090" instrument_node="">], p. 51)</span></p><span data-dcnode-id="2088" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Proponents of SSA such as Amyris and Sanofi state that SSA is not intended to replace agricultural production of artemisinin, but as a supplement to reduce volatility of supply and prices (ibid). The worries as expressed by ETC Group and the Dutch Royal Tropical Institute are therefore unnecessary.</span></p><p data-dcnode-id="2079"><span data-dcnode-id="2083" instrument_node="">As it turned out, the supply of artemisinin has indeed been volatile over the years; however, the availability of SSA does not seem to have had a big impact on that, although it does appear to have helped stabilise the prices [</span><a aria-label="Reference 5" data-dcnode-id="2081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d3796380e885" title="Peplow M (2016) Synthetic biology’s first malaria drug meets market resistance. Nature 530:389–390"><span data-dcnode-id="2082" instrument_node="">5</span></a><span data-dcnode-id="2080" instrument_node="">]. Sanofi has in any case not increased its production of SSA, because prices of naturally derived artemisinin are too low for them to compete with and because the demand has plateaued due to better diagnostics (ibid).</span></p><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">This case shows that where industrial biotechnology offers an alternative to agriculturally produced substances, questions arise about who benefits from the new production method and who is in disadvantage. It also shows that the consequences as well as the uptake of an innovation can be unpredictable. We will come back to this point later when we discuss strategies to deal with societal concerns in Sect. </span><a data-dcnode-id="2076" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec12"><span data-dcnode-id="2077" instrument_node="">4</span></a><span data-dcnode-id="2075" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2072" id="Sec4"><span data-dcnode-id="2073" instrument_node="">The Case of Vanillin Production</span></h3><p data-dcnode-id="2061"><span data-dcnode-id="2071" instrument_node="">In 2011 the Swiss-based company Evolva</span><sup data-dcnode-id="2066"><a data-dcnode-id="2067" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Footnote </span></span><span data-dcnode-id="2068" instrument_node="">3</span></a></sup><span data-dcnode-id="2065" instrument_node=""> developed a synthetic version of vanillin, produced by yeast whose metabolic pathways had been reprogrammed, comparable to the Amyris platform. Vanillin is the most prominent ingredient of vanilla. Most of the vanillin on the market is produced through petrochemical or chemical processes. This synthetic vanillin is much cheaper than the natural vanilla derived from the vanilla orchid, which makes up less than 1% of the vanillin used today [</span><a aria-label="Reference 6" data-dcnode-id="2063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d3796380e915" title="Bomgartner M (2016) The problem with vanilla. Chem Eng News. 94(36):38–42. 
http://cen.acs.org/articles/94/i36/problem-vanilla.html

. Accessed 19 Sept 2017"><span data-dcnode-id="2064" instrument_node="">6</span></a><span data-dcnode-id="2062" instrument_node="">].</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Evolva believes that the vanillin they produce through the yeast platform is natural and more sustainable and offers a higher quality than the other artificial vanillin. It is more sustainable because it does not rely on fossil resources or paper pulp, such as other artificial vanillin. The quality is better because it comes closer chemically to natural vanilla. It is natural because it is produced through fermentation, which under EU and US law is considered a traditional or natural food production process (ibid).</span></p><p data-dcnode-id="2048"><span data-dcnode-id="2058" instrument_node="">However, again the ETC Group, along with other environmental organisations such as Friends of the Earth USA,</span><sup data-dcnode-id="2053"><a data-dcnode-id="2054" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Footnote </span></span><span data-dcnode-id="2055" instrument_node="">4</span></a></sup><span data-dcnode-id="2052" instrument_node=""> opposed this innovation and the associated claims [</span><a aria-label="Reference 7" data-dcnode-id="2050" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d3796380e936" title="ETC group (2013) Vanilla and synthetic biology. A case-study. In: ETC group SynBio case studies. 
http://www.ETCgroup.org/files/Vanilla_SynBio_case_study_Oct2013.pdf

. Accessed 22 Sept 2017"><span data-dcnode-id="2051" instrument_node="">7</span></a><span data-dcnode-id="2049" instrument_node="">]. They do not dispute the quality of this product, but they state that this form of vanillin is not sustainable or natural because it has been produced with the use of highly engineered organisms. Furthermore, they fear this vanillin will undermine the livelihoods of vanilla farmers, who do produce in a sustainable manner, with respect for their direct natural environment. These two environmental organisations claim that industrial biotechnological processes are far from respecting local ecology since they could turn any crop into a feedstock for their processing facilities, while the ‘natural’ value chain needs to be attuned to the local ecology and support it in order to ensure ongoing production. Hence, according to the environmental organisations, this traditional value chain is better for the conservation of fragile rain forests.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2046" id="Sec5"><span data-dcnode-id="2047" instrument_node="">The Case of Algae-Based Oil Production</span></h3><p data-dcnode-id="2030"><span data-dcnode-id="2045" instrument_node="">When Ecover,</span><sup data-dcnode-id="2040"><a data-dcnode-id="2041" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Footnote </span></span><span data-dcnode-id="2042" instrument_node="">5</span></a></sup><span data-dcnode-id="2039" instrument_node=""> a Belgian company producing sustainable cleaning products, announced a change to one of the ingredients in its basic cleaning formula, it suddenly found itself under attack from a coalition of environmental organisations whose members used to be among Ecover’s most loyal customers, with the international ETC Group prominent among them. The new ingredient which invoked all these criticisms was vegetable oil produced from genetically engineered algae [</span><a aria-label="Reference 8" data-dcnode-id="2037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d3796380e959" title="Thomas J (2014) Ecover pioneers ‘synthetic biology’ in consumer products. In: Ecologist. 
https://theecologist.org/2014/jun/16/ecover-pioneers-synthetic-biology-consumer-products

. Accessed 10 Nov 2014"><span data-dcnode-id="2038" instrument_node="">8</span></a><span data-dcnode-id="2036" instrument_node="">], a procedure developed by the US-based company Solazyme.</span><sup data-dcnode-id="2031"><a data-dcnode-id="2032" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Footnote </span></span><span data-dcnode-id="2033" instrument_node="">6</span></a></sup></p><p data-dcnode-id="2025"><span data-dcnode-id="2029" instrument_node="">As far as Ecover was concerned, this ingredient did not fundamentally differ from anything it had used before. In their detergents Ecover had used enzymes produced by genetically modified bacteria for years, as most companies in this area do and had hardly received any criticism for it. In the eyes of its critics, however, the oil produced by engineered algae does represent something fundamentally different. To these critics, the engineered algae symbolise a socio-technological system that is inherently unsustainable because it reinforces existing economic inequalities. The controversy led Ecover to stop using the algae-produced oil and to reflect on its strategy as a company seeking to be a front-runner in the field of sustainable innovations as Ecover describes itself [</span><a aria-label="Reference 9" data-dcnode-id="2027" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e976" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="2028" instrument_node="">9</span></a><span data-dcnode-id="2026" instrument_node="">].</span></p><p data-dcnode-id="2017"><span data-dcnode-id="2024" instrument_node="">In an open letter in </span><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">The Ecologist</span></i><span data-dcnode-id="2021" instrument_node="">, Jim Thomas, ETC Group’s spokesperson on this matter, condemned Ecover for using what he considered to be synthetic biology which he refers to as ‘extreme genetic engineering’. In his letter that was signed by 17 other NGOs, Thomas voiced concerns about the safety risks associated with this technology as well as possible socio-economic effects such the displacement of income for small farmers that depend on coconut oil [</span><a aria-label="Reference 8" data-dcnode-id="2019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d3796380e985" title="Thomas J (2014) Ecover pioneers ‘synthetic biology’ in consumer products. In: Ecologist. 
https://theecologist.org/2014/jun/16/ecover-pioneers-synthetic-biology-consumer-products

. Accessed 10 Nov 2014"><span data-dcnode-id="2020" instrument_node="">8</span></a><span data-dcnode-id="2018" instrument_node="">]. Coconut oil could also provide a sustainable alternative to palm oil, one that is far less disruptive, in the eyes of Thomas and the wider environmental coalition.</span></p><p data-dcnode-id="2012"><span data-dcnode-id="2016" instrument_node="">This response took Ecover and Solazyme completely by surprise, as Tom Domen, long-term innovation manager at Ecover, described in an interview [</span><a aria-label="Reference 9" data-dcnode-id="2014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e991" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="2015" instrument_node="">9</span></a><span data-dcnode-id="2013" instrument_node="">]. Both companies considered the algae technology to be in line with the technologies that were already widely used, such as enzymes derived from genetically engineered bacteria, the so-called white or industrial biotechnology. Ecover has been using such enzymes in their detergents for a long time. There is hardly any opposition against this white biotechnology because they are kept in containment in industrial plants, which minimises the risk of escape and contamination of the environment. To Ecover and Solazyme, the algae-based oil production was just another variation on an existing theme, one that is supposed to solve a pressing sustainability issue, namely, the problematic production of palm oil, the demand for which continues to grow.</span></p></div></div></section><section data-dcnode-id="1699" data-title="Five Social and Ethical Issues in Industrial Biotechnology"><div class="c-article-section" data-dcnode-id="1700" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2007" id="Sec6"><span data-dcnode-id="2008" instrument_node="">Five Social and Ethical Issues in Industrial Biotechnology</span></h2><div class="c-article-section__content" data-dcnode-id="1701" id="Sec6-content"><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">These cases indicate some common societal themes that are brought forwards by innovations in industrial biotechnology. As stated above these are:</span></p><ol class="u-list-style-none" data-dcnode-id="1958"><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="1996"><span data-dcnode-id="2003" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">(a)</span></span><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Sustainability</span></p><span data-dcnode-id="1997" instrument_node="">
</span></li><span data-dcnode-id="1995" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1994" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">(b)</span></span><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Naturalness</span></p><span data-dcnode-id="1988" instrument_node="">
</span></li><span data-dcnode-id="1986" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1985" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">(c)</span></span><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Risk management</span></p><span data-dcnode-id="1979" instrument_node="">
</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1969"><span data-dcnode-id="1976" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">(d)</span></span><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Innovation trajectories</span></p><span data-dcnode-id="1970" instrument_node="">
</span></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1960"><span data-dcnode-id="1967" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">(e)</span></span><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Economic justice</span></p><span data-dcnode-id="1961" instrument_node="">
</span></li><span data-dcnode-id="1959" instrument_node="">
</span></ol><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">These themes are interesting and relevant to the advancement of industrial biotechnology because different perspectives exist on how we should deal with them. These perspectives can be related to different values, assumptions and beliefs among different actors as described below.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1954" id="Sec7"><span data-dcnode-id="1955" instrument_node="">Sustainability</span></h3><p data-dcnode-id="1931"><span data-dcnode-id="1953" instrument_node="">Whether an application of industrial biotechnology can be considered sustainable can be determined by measuring the quantifiable impact of that application, such as contribution to CO</span><sub data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">2</span></sub><span data-dcnode-id="1950" instrument_node=""> reduction, use of resources such as water, release of toxic substances and so forth [</span><a aria-label="Reference 10" data-dcnode-id="1948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d3796380e1072" title="Fröhling M, Hiete M (2018) Sustainability and life cycle assessments in industrial biotechnology: a review of current approaches and future needs. In: Fröhling M, Hiete M (eds) Sustainability and life cycle assessment in industrial biotechnology, advances in biochemical engineering/biotechnology. Springer, Berlin"><span data-dcnode-id="1949" instrument_node="">10</span></a><span data-dcnode-id="1947" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="1945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d3796380e1075" title="Venkatesh A, Posen ID, HL ML, Chu PL, Griffin WM, Saville BA (2019) Environmental aspects of biotechnology. In: Fröhling M, Hiete M (eds) Sustainability and life cycle assessment in industrial biotechnology, advances in biochemical engineering/biotechnology. Springer, Berlin"><span data-dcnode-id="1946" instrument_node="">11</span></a><span data-dcnode-id="1944" instrument_node="">]. However, as emerges from the cases discussed above, other nonquantifiable factors may also play a role in assessing sustainability. These factors may be difficult to quantify because they are very complex and surrounded by many uncertainties and/or difference in perspectives, for instance, the effect on the social well-being of people working in a bio-based value chain such as for biofuels. Although efforts are ongoing to measure this, well-being is notoriously hard to define because of the many different ways to operationalise it [</span><a aria-label="Reference 12" data-dcnode-id="1942" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d3796380e1078" title="van der Deijl W (2017) Are measures of well-being philosophically adequate? Philos Soc Sci 47(3):209–234"><span data-dcnode-id="1943" instrument_node="">12</span></a><span data-dcnode-id="1941" instrument_node="">]. Nevertheless, literature on assessment of social sustainability for bioeconomy is becoming more frequent, and several social issues like employment, working condition, labour right, gender equality, social development and food security have been discussed [</span><a data-dcnode-id="1939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d3796380e1081" title="Macombe C (2019) Social Life Cycle Assessment (sLCA) for Industrial Biotechnology. In: Fröhling M, Hiete M (eds) Sustainability and life cycle assessment in industrial biotechnology, advances in biochemical engineering/biotechnology. Springer, Berlin"><span data-dcnode-id="1940" instrument_node="">13</span></a><span data-dcnode-id="1938" instrument_node="">,</span><a data-dcnode-id="1936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d3796380e1081_1" title="Martínez SH, van Eijck J, da Cunha MP et al (2013) Analysis of socio-economic impacts of sustainable sugarcane–ethanol production by means of inter-regional input–output analysis: demonstrated for Northeast Brazil. Renew Sustain Energy Rev 28:290–316"><span data-dcnode-id="1937" instrument_node="">14</span></a><span data-dcnode-id="1935" instrument_node="">,</span><a aria-label="Reference 15" data-dcnode-id="1933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d3796380e1085" title="Wicke B, Smeets E, Tabeau A et al (2009) Macroeconomic impacts of bioenergy production on surplus agricultural land – a case study of Argentina. Renew Sustain Energy Rev 13(9):2463–2473"><span data-dcnode-id="1934" instrument_node="">15</span></a><span data-dcnode-id="1932" instrument_node="">].</span></p><p data-dcnode-id="1926"><span data-dcnode-id="1930" instrument_node="">Some other aspects of sustainability may be hard to quantify because their assessment is very ideological and relates to preferred societal structures and possible future effects of a specific technology. This may be the case when a biotechnological application competes with other applications that may be considered more natural or the production thereof requires more attention for preserving local ecosystems. This is, for instance, one of the issues that emerges in the vanillin case, where the production of natural vanilla is tied up closely with local ecosystems and local traditional farming practices. Proponents of the synbio vanillin will say that it does not compete with traditional vanilla but with chemical production of artificial vanillin, compared to which it can be considered more sustainable because it needs less land. However, many actors oppose genetic engineering in any form because they deem it inherently unsustainable, while more ecologically sound technologies, in their view, are available. They perceive genetic engineering as enabling economic monopolies and as introducing unnecessary risks [</span><a aria-label="Reference 16" data-dcnode-id="1928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d3796380e1091" title="Asveld L, Stemerding D (2018) Social learning in the bioeconomy: the case of Ecover. In: Van de Poel I, Asveld L, Mehos D (eds) Experimentation beyond the laboratory: new perspectives on technology in society. Routledge, London, pp 103–124"><span data-dcnode-id="1929" instrument_node="">16</span></a><span data-dcnode-id="1927" instrument_node="">].</span></p><p data-dcnode-id="1918"><span data-dcnode-id="1925" instrument_node="">The advancement of industrial biotechnology and many of its products depends on a reliable and widely supported system for sustainability assessment. Sustainability is not something that can be directly witnessed. Potential consumers and society at large need reliable indicators to show them which products are sustainable and which aren’t. Such indicators will only be considered reliable when people feel that they reflect the concerns they have about sustainability and hence serve the wider public good and not a particular interest. When designing indicators for the sustainability assessment of products from industrial biotechnology, it is important to acknowledge the different views on sustainability [</span><a aria-label="Reference 17" data-dcnode-id="1923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d3796380e1097" title="Asveld L, Ganzevles J, Osseweijer P, Landeweerd L (2014) Naturally sustainable: the social aspects of the transition to a sustainable bio-economy. Delft University of Technology, Delft"><span data-dcnode-id="1924" instrument_node="">17</span></a><span data-dcnode-id="1922" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="1920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d3796380e1100" title="Parada MP, Osseweijer P, Posada JA (2017) Sustainable biorefineries, an analysis of practices for incorporating sustainability in biorefinery design. Ind Crop Prod 106:105–123"><span data-dcnode-id="1921" instrument_node="">18</span></a><span data-dcnode-id="1919" instrument_node="">]. These different views will be further explicated in the following subthemes which all relate to the overarching theme of sustainability.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1916" id="Sec8"><span data-dcnode-id="1917" instrument_node="">Naturalness</span></h3><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">The issue of sustainability is closely linked to that of naturalness. The concept of naturalness raises two distinct issues. Firstly, there is the question of what natural is exactly and which products can be termed natural and which cannot. Secondly, there is the issue of what nature is and how we should relate to nature.</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1913" instrument_node="">The first question pops up around the labelling of products derived from industrial biotechnology. If a fragrance or flavour is made through microbial or enzymatic processes, it can be labelled natural under both US and European laws. However, if this production relies on engineered organisms under industrial conditions, it might not fit with commonly held conceptions of natural which mostly refer to something existing in or produced by nature, as it is described in a dictionary [</span><a aria-label="Reference 19" data-dcnode-id="1911" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d3796380e1114" title="Merriam-Webster (n.d.) Natural. In the dictionary of Merriam-Webster. Retrieved from 
https://www.merriam-webster.com/dictionary/natural

. Accessed 22 Sept 2017"><span data-dcnode-id="1912" instrument_node="">19</span></a><span data-dcnode-id="1910" instrument_node="">]. To the vanillin produced with the help of engineered organisms, natural might suggest that it is actually derived from the vanilla orchid [</span><a aria-label="Reference 20" data-dcnode-id="1908" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d3796380e1117" title="Gallage NJ, Møller BL (2015) Vanillin-bioconversion and bioengineering of the most popular plant flavor and its de novo biosynthesis in the vanilla orchid. Mol Plant 8(1):40–57"><span data-dcnode-id="1909" instrument_node="">20</span></a><span data-dcnode-id="1907" instrument_node="">]. Environmental organisations are calling to make the distinction between these two types of products clearer [</span><a aria-label="Reference 21" data-dcnode-id="1905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d3796380e1120" title="Friends of the Earth (2013) Extreme genetic engineering in your ice cream? In: Friends of the earth finance &amp; economic systems issue. 
https://foe.org/2013-08-extreme-genetic-engineering-in-your-ice-cream

. Accessed 22 Sept 2017"><span data-dcnode-id="1906" instrument_node="">21</span></a><span data-dcnode-id="1904" instrument_node="">].</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">The second issue, to which the first is connected, is a more fundamental one that originates from differences in values, beliefs and convictions. For some people (such as environmental activists), nature is something fragile that should be treated with the utmost care, so as not to upset vulnerable ecological balances. For other people (such as some working in industrial biotechnology or in high-risk investment), nature is essentially a resource, which has many wonderful things to offer and can provide viable solutions to pressing problems [</span><a aria-label="Reference 22" data-dcnode-id="1900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d3796380e1126" title="Douglas M, Wildavsky A (1983) Risk and culture: an essay on the selection of technological and environmental dangers. University of California Press, Berkeley"><span data-dcnode-id="1901" instrument_node="">22</span></a><span data-dcnode-id="1899" instrument_node="">].</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1897" instrument_node="">Different worldviews in which nature plays a pivotal part are depicted below. These are adapted from cultural theory (cf. [</span><a aria-label="Reference 16" data-dcnode-id="1895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d3796380e1132" title="Asveld L, Stemerding D (2018) Social learning in the bioeconomy: the case of Ecover. In: Van de Poel I, Asveld L, Mehos D (eds) Experimentation beyond the laboratory: new perspectives on technology in society. Routledge, London, pp 103–124"><span data-dcnode-id="1896" instrument_node="">16</span></a><span data-dcnode-id="1894" instrument_node="">, </span><a aria-label="Reference 23" data-dcnode-id="1892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d3796380e1135" title="Thompson JB (1990) Ideology and modern culture: critical theory in the era of mass communication. Polity Press, Cambridge"><span data-dcnode-id="1893" instrument_node="">23</span></a><span data-dcnode-id="1891" instrument_node="">]). The little ball represents nature and the position in which nature is supposed to be, i.e. it sits in a precarious balance (vulnerable nature) or it is safely contained and can take a hit (nature as resource). These two positions are usually the most outspoken ones in discussions on genetic technologies (Fig. </span><a data-dcnode-id="1889" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1890" instrument_node="">1</span></a><span data-dcnode-id="1888" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1863" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="1864"><figcaption data-dcnode-id="1884"><b class="c-article-section__figure-caption" data-dcnode-id="1885" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1886" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1875"><div class="c-article-section__figure-item" data-dcnode-id="1879"><a class="c-article-section__figure-link" data-dcnode-id="1880" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/10_2019_100/figures/1" rel="nofollow"><picture data-dcnode-id="1881"><source data-dcnode-id="1883" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F10_2019_100/MediaObjects/450051_1_En_100_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1882" height="479" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/10_2019_100/MediaObjects/450051_1_En_100_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1876" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Worldviews</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1865"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1866" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/10_2019_100/figures/1" rel="nofollow"><span data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1867" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1868" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1869" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1872" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1871" fill-rule="evenodd"></path><span data-dcnode-id="1870" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">The perspective described as ‘controllable nature’ can be considered a midway position between vulnerable nature and nature as a resource, i.e. nature is considered to be relatively robust, but risks to the ‘natural balance’ are also acknowledged. Within this perspective, (global) regulation is considered essential to avoid any disastrous effects. Policymakers are typically put in this perspective, but also some environmental NGOs fit here, like FoE EWNI.</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">The capricious nature perspective is mostly associated with groups that have little political power and little influence on the economic conditions of their lives. Nature is considered to be something capricious and uncontrollable, comparable to many other aspects of live. Smallholders in developing countries may, for instance, be placed in this quadrant.</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1858" instrument_node="">From the perspective that nature is essentially something vulnerable, approaching living organisms as entities that can be controlled and designed is a seriously flawed misconception about how we should deal with living organisms. In this perspective, living organisms are inherently unpredictable and should be treated as such. Pursuing a strategy in which living organisms are treated as predictable and controllable is therefore basically a mistake which diverts money and other resources away for more viable and truly sustainable solutions such as community based, organic farming practices [</span><a aria-label="Reference 7" data-dcnode-id="1856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d3796380e1168" title="ETC group (2013) Vanilla and synthetic biology. A case-study. In: ETC group SynBio case studies. 
http://www.ETCgroup.org/files/Vanilla_SynBio_case_study_Oct2013.pdf

. Accessed 22 Sept 2017"><span data-dcnode-id="1857" instrument_node="">7</span></a><span data-dcnode-id="1855" instrument_node="">, </span><a aria-label="Reference 9" data-dcnode-id="1853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e1171" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="1854" instrument_node="">9</span></a><span data-dcnode-id="1852" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="1850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d3796380e1174" title="ETC group (2011) The new biomasters. Synthetic biology and the next assault on biodiversity and livelihoods. ETC Group Communiqué # 104, Ontario"><span data-dcnode-id="1851" instrument_node="">24</span></a><span data-dcnode-id="1849" instrument_node="">].</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">From the perspective that nature is a resource that is essentially robust, industrial biotechnology is an excellent opportunity to find optimal solutions to pressing problems such as climate change and scarce resources. What’s more, we cannot afford to forego the many possibilities that nature has to offer via industrial biotechnology if we want to achieve a sustainable world. This position is diametrically opposed to that of the perspective of nature as ultimately fragile [</span><a aria-label="Reference 9" data-dcnode-id="1845" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e1180" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="1846" instrument_node="">9</span></a><span data-dcnode-id="1844" instrument_node="">].</span></p><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">The above-described perspectives are two extreme positions. There are many other positions possible that may be somewhere in between these two, or totally different altogether, such as a position that is more or less indifferent about nature and does not see any way humans could control nature. However, the positions explicated above very clearly represent a source of conflict about the acceptability of biotechnology and are therefore relevant. In considering how to assess industrial biotechnology, it can help to keep these two positions in mind to assure a complete picture of possible societal and ethical issues.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1839" id="Sec9"><span data-dcnode-id="1840" instrument_node="">Risk Management</span></h3><p data-dcnode-id="1834"><span data-dcnode-id="1838" instrument_node="">These differing perspectives on naturalness give rise to differing perspectives on the management of risk. Risk management refers to the identification (e.g. is there a risk?), estimation (e.g. how big is the risk?) and evaluation of the risk (e.g. how acceptable is the risk?) [</span><a aria-label="Reference 25" data-dcnode-id="1836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d3796380e1195" title="Chen C, Reniers G (2018) Risk assessment of processes and products in industrial biotechnology. In: Fröhling M, Hiete M (eds) Sustainability and life cycle assessment in industrial biotechnology, advances in biochemical engineering/biotechnology. Springer, Berlin"><span data-dcnode-id="1837" instrument_node="">25</span></a><span data-dcnode-id="1835" instrument_node="">]. For many people, the risks of industrial biotechnology are small, because the organisms are kept in closed vats. The chances of any of them escaping are low, and even if they would escape, they probably would not survive outside of the industrial conditions.</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">However, for other actors such as Friends of the Earth, USA, and the ETC Group, the risks of applications such as synbio are both undeniable and considerable:</span></p><blockquote class="c-blockquote" data-dcnode-id="1823"><div class="c-blockquote__body" data-dcnode-id="1824"><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">While other types of pollution such as synthetic chemicals break down over time and do not breed, synthetic biological creations are designed to self-replicate and once released into the environment they would be impossible to stop and could wipe out entire species. This type of pollution, known as genetic pollution, can be devastating since it cannot be cleaned up. (FoE [</span><a aria-label="Reference 26" data-dcnode-id="1828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d3796380e1205" title="Friends of the Earth (2010) Synthetic solutions to the climate crisis: the dangers of synthetic biology for biofuels production. Friends of the Earth, Amsterdam"><span data-dcnode-id="1829" instrument_node="">26</span></a><span data-dcnode-id="1827" instrument_node="">], p. 9)</span></p><span data-dcnode-id="1825" instrument_node="">
</span></div></blockquote><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">These environmental NGOs think that those working in industrial biotechnology should be very careful with engineered organisms because basically they cannot be controlled. Since they are living organisms, they might escape from any setting, adapt to their environment and disturb it.</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1820" instrument_node="">Experts in the field agree that there is no way to contain synthetic or genetically engineered organisms – particularly algae. According to Lissa Morganthaler-Jones, CEO and co-founder of Liverfuels Inc., a small number of genetically engineered algae have already leaked from the lab into the environment. ‘They have been carried out on skin, on hair and all sorts of other ways, like being blown on a breeze out the air conditioning system’, she said. (FoE [</span><a aria-label="Reference 26" data-dcnode-id="1818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d3796380e1215" title="Friends of the Earth (2010) Synthetic solutions to the climate crisis: the dangers of synthetic biology for biofuels production. Friends of the Earth, Amsterdam"><span data-dcnode-id="1819" instrument_node="">26</span></a><span data-dcnode-id="1817" instrument_node="">], p. 9)</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1815" instrument_node="">To other actors, the increased sophistication in biotechnology, the advancement to synthetic biology, indicates higher levels of safety. Because it is possible to control living organisms to an ever-increasing extent, the risks become smaller and smaller. Safety switches can be built in, for instance [</span><a aria-label="Reference 9" data-dcnode-id="1813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e1222" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="1814" instrument_node="">9</span></a><span data-dcnode-id="1812" instrument_node="">]. Safety switches are traits that ensure that living organisms can only survive within a specific, controlled environment. They might need a specific substance, for instance, that is only available in a laboratory. If the organisms leave the controlled environment, they will not be able to survive [</span><a aria-label="Reference 27" data-dcnode-id="1810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d3796380e1225" title="Robaey ZH (2018) Dealing with risks of biotechnology: understanding the potential of Safe-by-Design. Report commissioned by the Dutch Ministry of I&amp;W, The Hague"><span data-dcnode-id="1811" instrument_node="">27</span></a><span data-dcnode-id="1809" instrument_node="">].</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">From the above we can conclude that there is a difference in the way the risks of industrial biotechnology may be identified and estimated. Moreover, there is also a difference in the way the risks are assessed. To critics of industrial biotechnology, even if the risks are small, which they do not think is the case anyhow, they would not evaluate these risks as acceptable because they think there are other, better alternatives to achieve a sustainable society or to create high-quality products, mostly through sustainable eco-agricultural practices, such as natural vanilla in the vanillin case or sustainably sourced coconut oil in the Ecover case.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1804" id="Sec10"><span data-dcnode-id="1805" instrument_node="">Innovation Trajectories</span></h3><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Another important societal and ethical question is what kind of innovation trajectory industrial biotechnology is supporting. In the Ecover case, for instance, some of the critics thought that the engineered algae would lead to a technological lock-in. They saw the algae as a platform that enables an optimally rationalised management of biomass, which serves the interest of large industry, but which does not stimulate sustainable agriculture. Additionally, these critics state that there are more viable opportunities to achieve a sustainable agriculture which are being foregone by concentrating on engineered algae. In this case, sustainably sourced coconut oil was proposed as an alternative.</span></p><p data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">However, other actors have a different view on the future innovative potential of the algae. The sustainability manager of Ecover, for instance, considered the use of engineered algae as a first stepping stone towards even more sustainable applications, such as algae that do not have a large need for sugar as a feedstock, but instead rely on sunlight and water. Additionally the plants for these algae can be distributed in a decentralised manner thereby avoiding concentration of knowledge and power [</span><a aria-label="Reference 9" data-dcnode-id="1799" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d3796380e1242" title="Asveld L, Stemerding D (2016) Algae oil in trial. Conflicting views on technology and nature. Rathenau Instituut, The Hague"><span data-dcnode-id="1800" instrument_node="">9</span></a><span data-dcnode-id="1798" instrument_node="">]. This actor envisioned a totally different innovation trajectory connected to the algae.</span></p><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Such clashes in expectations about innovation trajectories also emerge in the vanillin case and the artemisinin case, where the developers of the product claim that their application will not compete with the plant-derived alternative, but instead will serve to stabilise the market (artemisinin) and/or compete with the less sustainable petrochemical version. Opponents instead think that the innovation will compete with their natural counterparts and will only serve the interests of specific companies.</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">A similar conflict in expectations can be seen around biofuels. When the first-generation biofuels were being put to use, many supporters of this technology claimed that these first-generation biofuels would provide a stepping stone for more sustainable second- and third-generation biofuels. However, many critics feared that the first-generation biofuels would turn out to be a technological lock-in, implying that once all the investments in first-generation biofuels had been made, there was no incentive for the industry to switch to more sustainable next-generation biofuels [</span><a aria-label="Reference 2" data-dcnode-id="1792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d3796380e1251" title="Asveld L, Qv E, Stemerding D (eds) (2011) Getting to the core of the bio-economy: a perspective on the sustainable promise of biomass. Rathenau Institute, The Hague"><span data-dcnode-id="1793" instrument_node="">2</span></a><span data-dcnode-id="1791" instrument_node="">].</span></p><p data-dcnode-id="1779"><span data-dcnode-id="1789" instrument_node="">The first-generation biofuels did indeed prove to be somewhat of a lock-in [</span><a aria-label="Reference 28" data-dcnode-id="1787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d3796380e1258" title="Asveld L (2016) The need for governance by experimentation: the case of biofuels. Sci Eng Ethics 22:815–830. 
https://doi.org/10.1007/s11948-015-9729-y

"><span data-dcnode-id="1788" instrument_node="">28</span></a><span data-dcnode-id="1786" instrument_node="">]. It turned out to be difficult for the EU to lower the cap for first-generation biofuels in the directive for sustainable transport due to resistance from the first-generation biofuels industries [</span><a aria-label="Reference 29" data-dcnode-id="1784" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d3796380e1261" title="Sharman A, Holmes J (2010) Evidence-based policy or policy-based evidence gathering? Biofuels, the EU and the 10% target. Environ Policy Gov 20(5):309–321"><span data-dcnode-id="1785" instrument_node="">29</span></a><span data-dcnode-id="1783" instrument_node="">]. However, while more sustainable second- and third-generation biofuels haven’t become available in large quantities yet, first-generation biofuels have become more sophisticated, and there is evidence suggesting that the first generation is as sustainable as the second generation, thereby questioning the need to look to second- and third-generation biofuels as sustainable solutions [</span><a aria-label="Reference 30" data-dcnode-id="1781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d3796380e1264" title="Dammer L, Carus M, Piotrowski S et al (2017) Sustainable first and second generation bioethanol for Europe. Nova-Institute, Hürth"><span data-dcnode-id="1782" instrument_node="">30</span></a><span data-dcnode-id="1780" instrument_node="">].</span></p><p data-dcnode-id="1768"><span data-dcnode-id="1778" instrument_node="">The articulation of a future innovation trajectory can serve as a legitimisation for a specific application. Even if the direct benefit of a specific application is not immediately clear, it can still seem desirable because of the future innovations the application enables [</span><a aria-label="Reference 31" data-dcnode-id="1776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d3796380e1270" title="Borup M, Brown N, Konrad K, Van Lente H (2006) The sociology of expectations in science and technology. Tech Anal Strat Manag 18(3–4):285–298"><span data-dcnode-id="1777" instrument_node="">31</span></a><span data-dcnode-id="1775" instrument_node="">]. The environmental life cycle assessment (LCA) of the engineered algae in the Ecover case, for instance, did not show a huge improvement in comparison to alternatives such as palm oil [</span><a aria-label="Reference 16" data-dcnode-id="1773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d3796380e1273" title="Asveld L, Stemerding D (2018) Social learning in the bioeconomy: the case of Ecover. In: Van de Poel I, Asveld L, Mehos D (eds) Experimentation beyond the laboratory: new perspectives on technology in society. Routledge, London, pp 103–124"><span data-dcnode-id="1774" instrument_node="">16</span></a><span data-dcnode-id="1772" instrument_node="">]. However, because Ecover perceived the algae as a contribution to a potentially more sustainable technology, they embraced the algae nonetheless. The same thing can be said to apply to first-generation biofuels, which received governmental support, at least partly, because of their potential contribution to more sophisticated second- and third-generation biofuels [</span><a aria-label="Reference 2" data-dcnode-id="1770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d3796380e1276" title="Asveld L, Qv E, Stemerding D (eds) (2011) Getting to the core of the bio-economy: a perspective on the sustainable promise of biomass. Rathenau Institute, The Hague"><span data-dcnode-id="1771" instrument_node="">2</span></a><span data-dcnode-id="1769" instrument_node="">].</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">Because these expectations about the future of innovation trajectories can have a considerable impact on the shaping of technology and society alike, it is important that they are open for input by a wide range of actors to ensure a democratic development of technology [</span><a aria-label="Reference 32" data-dcnode-id="1765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d3796380e1282" title="Owen R, Macnaghten P, Stilgoe J (2012) Responsible research and innovation: from science in society to science for society, with society. Sci Public Policy 39:751–760"><span data-dcnode-id="1766" instrument_node="">32</span></a><span data-dcnode-id="1764" instrument_node="">]. For example, some relevant questions are: What purpose do we expect an innovation to serve? Do we pursue an innovation simply because it is technologically possible? What are possible alternatives to the innovation trajectory? Wide-ranging input to such questions is not only desirable for democratic purposes but also for instrumental ones. If the envisioned innovation trajectory has wide societal support, the technology can be expected to disseminate more successfully and to reach societally desirable goals such as sustainability more easily.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1761" id="Sec11"><span data-dcnode-id="1762" instrument_node="">Economic Justice</span></h3><p data-dcnode-id="1741"><span data-dcnode-id="1760" instrument_node="">Another important issue for industrial biotechnology is that of economic justice, or put differently, who benefits from this technology? Many critics state that applications of industrial biotechnology lead to a concentration of knowledge and power in the hands of a few companies. This has been said for biofuels [</span><a aria-label="Reference 24" data-dcnode-id="1758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d3796380e1293" title="ETC group (2011) The new biomasters. Synthetic biology and the next assault on biodiversity and livelihoods. ETC Group Communiqué # 104, Ontario"><span data-dcnode-id="1759" instrument_node="">24</span></a><span data-dcnode-id="1757" instrument_node="">, </span><a aria-label="Reference 26" data-dcnode-id="1755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d3796380e1296" title="Friends of the Earth (2010) Synthetic solutions to the climate crisis: the dangers of synthetic biology for biofuels production. Friends of the Earth, Amsterdam"><span data-dcnode-id="1756" instrument_node="">26</span></a><span data-dcnode-id="1754" instrument_node="">, </span><a aria-label="Reference 33" data-dcnode-id="1752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d3796380e1299" title="Balkema A, Pols A (2015) Biofuels: sustainable innovation or gold rush? Identifying responsibilities for biofuel innovations. In: Koops BJ, Oosterlaken I, Romijn H, Swierstra T, Van den Hoven J (eds) Responsible innovation 2: concepts, approaches, and applications. Springer, Dordrecht, pp 283–303"><span data-dcnode-id="1753" instrument_node="">33</span></a><span data-dcnode-id="1751" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="1749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d3796380e1302" title="Borras Jr SM, McMichael P, Scoones I et al (2010) The politics of biofuels, land and agrarian change: editors’ introduction. J Peasant Stud 37(4):575–592"><span data-dcnode-id="1750" instrument_node="">34</span></a><span data-dcnode-id="1748" instrument_node="">] as well as for more speciality chemicals ([</span><a aria-label="Reference 4" data-dcnode-id="1746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d3796380e1305" title="Heemskerk W, Schallig H, De Steenhuijsen Piters B (2006) The World of Artemisia in 44 questions. The Royal Tropical Institute, The Hague"><span data-dcnode-id="1747" instrument_node="">4</span></a><span data-dcnode-id="1745" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="1743" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d3796380e1309" title="ETC group (2011) The new biomasters. Synthetic biology and the next assault on biodiversity and livelihoods. ETC Group Communiqué # 104, Ontario"><span data-dcnode-id="1744" instrument_node="">24</span></a><span data-dcnode-id="1742" instrument_node="">]; ETC Group 2016):</span></p><blockquote class="c-blockquote" data-dcnode-id="1732"><div class="c-blockquote__body" data-dcnode-id="1733"><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">What is being sold as a benign and beneficial switch from black carbon to green carbon is in fact a red hot resource grab (from South to North) to capture a new source of wealth. If the grab succeeds, then plundering the biomass of the South to cheaply run the industrial economies of the North will be an act of 21st century imperialism that deepens injustice and worsens poverty and hunger. Moreover, pillaging fragile ecosystems for their carbon and sugar stocks is a murderous move on an already overstressed planet. (ETC Group [</span><a aria-label="Reference 24" data-dcnode-id="1737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d3796380e1316" title="ETC group (2011) The new biomasters. Synthetic biology and the next assault on biodiversity and livelihoods. ETC Group Communiqué # 104, Ontario"><span data-dcnode-id="1738" instrument_node="">24</span></a><span data-dcnode-id="1736" instrument_node="">])</span></p><span data-dcnode-id="1734" instrument_node="">
</span></div></blockquote><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Each of the cases described above features a prominent concern for the fate of small-scale farmers producing the natural substance for which a synthetic alternative is produced. Such concerns also extend to farmers producing biomass for biofuels, or farmers who might be forced to abandon their land in favour of large biofuel producers.</span></p><p data-dcnode-id="1707"><span data-dcnode-id="1729" instrument_node="">In contrast with this concern, many authors point out that if the production of biomass for bio-based products is managed under the right conditions, biofuels can have beneficial, sustainable effects for both small-scale farmers and society as a whole [</span><a aria-label="Reference 35" data-dcnode-id="1727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d3796380e1326" title="Souza GM, Victoria RL, Joly CA et al (2015) Bioenergy &amp; sustainability: bridging the gaps. SCOPE72, Paris, Sao Paulo"><span data-dcnode-id="1728" instrument_node="">35</span></a><span data-dcnode-id="1726" instrument_node="">]. Such conditions encompass good governance [</span><a aria-label="Reference 36" data-dcnode-id="1724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d3796380e1329" title="Diaz-Chavez R, Morese MM, Colangeli M et al (2015) Social considerations. In: Souza GM, Victoria RL, Joly CA, Verdade M (eds) Scientific committee on problems of the environment (SCOPE) report: bioenergy &amp; sustainability: bridging the gaps. SCOPE72, Paris, Sao Paulo, pp 529–552"><span data-dcnode-id="1725" instrument_node="">36</span></a><span data-dcnode-id="1723" instrument_node="">], an appropriate division of responsibilities [</span><a aria-label="Reference 33" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d3796380e1332" title="Balkema A, Pols A (2015) Biofuels: sustainable innovation or gold rush? Identifying responsibilities for biofuel innovations. In: Koops BJ, Oosterlaken I, Romijn H, Swierstra T, Van den Hoven J (eds) Responsible innovation 2: concepts, approaches, and applications. Springer, Dordrecht, pp 283–303"><span data-dcnode-id="1722" instrument_node="">33</span></a><span data-dcnode-id="1720" instrument_node="">], investments in agricultural innovations and stable price regime [</span><a aria-label="Reference 37" data-dcnode-id="1718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d3796380e1335" title="Kline KL, Msangi S, Dale VH et al (2017) Reconciling food security and bioenergy: priorities for action. GCB Bioenergy 9:557–576. 
https://doi.org/10.1111/gcbb.12366
